translation:
  language: es
  text: Recuerdo mi canción en la noche[a]; con mi corazón medito[b], y mi espíritu busca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi melodía' o 'mi música'.
    reason: lexical_alternative
  - marker: b
    text: O 'reflexiono'; el verbo hebreo puede denotar meditación interior o habla reflexiva.
    reason: lexical_alternative
  - marker: c
    text: O 'mi mente' o 'mi ser interior'; 'espíritu' aquí se refiere al yo interior del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶזְכְּרָה
  english_pob_choice: I remember
  chosen_spanish: Recuerdo
  alternatives_spanish:
  - Recordaré
  - Permítame recordar
  lexicon: HALOT
  rationale: El imperfecto qal de זכר en poesía puede funcionar con valor presente, futuro o volitivo. Aquí, como secuencia introspectiva, el presente español comunica mejor la acción en curso que un futuro o un imperativo volitivo.
- source_word: נְגִינָתִי
  english_pob_choice: my song
  chosen_spanish: mi canción
  alternatives_spanish:
  - mi música
  - mi melodía
  lexicon: HALOT
  rationale: El término puede referirse a música/canto. 'Canción' es natural en español y conserva el sentido poético e introspectivo mejor que una opción más técnica como 'música' o más abstracta como 'melodía'.
- source_word: בַּלָּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - por la noche
  - de noche
  lexicon: HALOT
  rationale: La preposición hebrea conserva mejor un marco temporal poético. 'En la noche' mantiene la forma más cercana al texto y su tono literario.
- source_word: עִם לְבָבִי
  english_pob_choice: with my heart
  chosen_spanish: con mi corazón
  alternatives_spanish:
  - en mi corazón
  - con mi interior
  lexicon: HALOT
  rationale: Se preserva la estructura preposicional de עִם. En español, 'con mi corazón' suena algo marcado, pero conserva la relación explícita entre la acción meditativa y el corazón, sin reducirla a un mero lugar interior.
- source_word: אָשִׂיחָה
  english_pob_choice: I meditate
  chosen_spanish: medito
  alternatives_spanish:
  - murmuro
  - reflexiono
  - medito en voz baja
  lexicon: HALOT
  rationale: שׂיח aquí denota masticación interior/meditación más que habla externa. 'Medito' es la forma más clara y fiel en español contemporáneo; 'reflexiono' sería posible, pero pierde algo del matiz contemplativo del término hebreo.
- source_word: וַיְחַפֵּשׂ
  english_pob_choice: searches
  chosen_spanish: examina
  alternatives_spanish:
  - busca con ahínco
  - registra
  - sondea
  lexicon: HALOT
  rationale: El verbo חפשׂ expresa buscar minuciosamente o sondear. 'Examina' comunica bien el carácter penetrante de la acción en español, sin añadir un adverbio que no está en el hebreo.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: רוּחַ aquí apunta al interior personal del salmista. 'Mi espíritu' respeta el alcance antropológico del término y evita reducirlo solo a mente o emoción.
theological_decisions:
- issue: Alcance antropológico de רוּחִי
  english_pob_reading: my spirit; 'spirit' here refers to the psalmist's inward self.
  chosen_spanish_reading: mi espíritu; se entiende como el yo interior del salmista.
  alternative_spanish_readings:
  - mi mente
  - mi ser interior
  rationale: Se mantiene 'espíritu' porque el hebreo usa רוּחַ, que no debe estrecharse a 'mente'. En una nota interna de sentido, puede entenderse como el yo interior, sin perder la amplitud antropológica del término.
  doctrine_reference: Antropología bíblica; distinción entre espíritu, alma y mente sin colapsarlas.
- issue: Valor de אָשִׂיחָה en contexto poético
  english_pob_reading: I meditate; Or 'I muse'; the Hebrew verb can denote inward meditation or reflective speaking.
  chosen_spanish_reading: medito; con posible matiz de reflexionar o musitar interiormente.
  alternative_spanish_readings:
  - reflexiono
  - murmuro
  - pienso
  rationale: El contexto de recuerdo y examen interior favorece una lectura meditativa, no de discurso público. 'Medito' es adecuado, mientras que las otras opciones pueden indicarse como matices posibles sin reemplazar el sentido principal.
  doctrine_reference: Sabiduría y oración contemplativa en la poesía hebrea.
translation_notes:
  revision_awareness: La redacción inglesa de referencia pasó por una corrección de 'in my heart' a 'with my heart' para reflejar mejor עִם לְבָבִי. La versión española conserva esa relación preposicional con 'con mi corazón', mientras que la nota d preserva la alternativa natural 'con mi corazón medito' como posible reordenamiento sintáctico.
  spanish_consistency_notes:
  - Se usó 'espíritu' para רוּחִי de forma consistente con el criterio POB de mantener el alcance antropológico del término.
  - Se prefirió 'medito' por claridad actual; la nota b conserva el matiz alternativo del hebreo.
  - Se mantuvo un tono poético y sobrio, sin sustituir las imágenes del texto por paráfrasis explicativas.
  - La puntuación reproduce el paralelismo del hebreo con una pausa fuerte tras la primera cola.
