review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: «ofrecían la grasa ... hasta el atardecer» corresponde adecuadamente a οἱ ἱερεῖς ἀνέφερον τὰ στέατα ἕως ὀψίας, y «para los sacerdotes, sus hermanos, los hijos de Aarón» preserva la aposición y la designación sacerdotal. Sin embargo, «se prepararon» no corresponde a ἡτοίμασαν con dativo reflexivo ἑαυτοῖς; el griego dice que los levitas «prepararon [algo] para sí mismos», no que «se prepararon».'
  spanish_quality_summary: El texto es legible y digno, pero «los levitas se prepararon para sí mismos» suena forzado y semánticamente desviado en español. «Prepararon para sí mismos» es más fiel, y conviene explicitar el objeto implícito mínimamente con «lo» para que el español fluya sin alterar el sentido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Aarón», «sacerdotes», «levitas» y «hermanos» están bien. La nota sobre «grasa» también está alineada con la decisión léxica inglesa.
  issues:
  - severity: high
    issue: «se prepararon» traduce mal ἡτοίμασαν
    rationale: 'ἡτοίμασαν es transitivo: «prepararon». El dativo ἑαυτοῖς ya expresa «para sí mismos». La forma reflexiva española cambia el sentido a que los levitas se alistaron ellos mismos.'
  - severity: medium
    issue: Falta un objeto implícito natural en español tras «prepararon»
    rationale: El griego puede omitir el objeto por el contexto sacrificial, pero en español «prepararon para sí mismos» queda áspero. Añadir «lo» conserva la economía del original y mejora la naturalidad sin sobreespecificar.
  revised_spanish_text: Porque los sacerdotes ofrecían la grasa[a] hasta el atardecer, y los levitas lo prepararon para sí mismos y para los sacerdotes, sus hermanos, los hijos de Aarón.
  revised_footnotes:
  - marker: a
    text: O «la grasa de las víctimas». El griego se refiere a la grasa sacrificial ofrecida en el altar.
    reason: lexical_alternative
