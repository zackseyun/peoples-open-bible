translation:
  language: es
  text: Pones mis pies en los cepos[a], y vigilas todos mis caminos; trazas el contorno de las plantas de mis pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «trazas alrededor de las plantas de mis pies», conservando la imagen de inscribir o marcar un límite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּסַּד
  english_pob_choice: in the stocks
  chosen_spanish: en el cepo
  alternatives_spanish:
  - en los grillos
  - en la cepa
  lexicon: HALOT
  rationale: סַד designa un aparato de sujeción para los pies. En español, «cepo» comunica con claridad una inmovilización corporal semejante a «stocks» sin volver el verso técnico en exceso. «Grillos» sería posible, pero desplaza la imagen hacia cadenas; «cepa» es menos transparente en este contexto.
- source_word: וְתָשֵׂם
  english_pob_choice: you put
  chosen_spanish: Pones
  alternatives_spanish:
  - Colocas
  - Pusiste
  lexicon: HALOT
  rationale: שׂים es un verbo muy general de poner/colocar. En español presente poético («Pones») mantiene el valor directo y la continuidad del reproche dirigido a Dios en el discurso de Job. «Colocas» es válido pero más marcado; el pasado rompería la forma del hebreo.
- source_word: וְתִשְׁמֹר
  english_pob_choice: you watch
  chosen_spanish: vigilas
  alternatives_spanish:
  - guardas
  - observas
  lexicon: HALOT
  rationale: Aquí שׁמר expresa vigilancia hostil y control atento. «Vigilar» conserva la idea de supervisión constante mejor que «guardar», que en español suele sonar más protector.
- source_word: כָּל אָרְחוֹתַי
  english_pob_choice: all my paths
  chosen_spanish: todos mis caminos
  alternatives_spanish:
  - todas mis sendas
  - todas mis rutas
  lexicon: HALOT
  rationale: אֹרַח puede ser camino, senda o curso de vida. «Caminos» es la opción más natural y amplia en español, preservando tanto la imagen concreta como el posible trasfondo existencial.
- source_word: עַל שָׁרְשֵׁי רַגְלַי
  english_pob_choice: the soles of my feet
  chosen_spanish: las plantas de mis pies
  alternatives_spanish:
  - las suelas de mis pies
  - los raíces de mis pies
  lexicon: HALOT
  rationale: Aunque שֹׁרֶשׁ normalmente significa «raíz», en esta expresión apunta a la base/extremidad del pie. «Plantas de mis pies» es la forma española más clara y fiel a la imagen corporal; «suelas» suena más artificial y «raíces» trasladaría una imagen demasiado literal y oscura.
- source_word: תִּתְחַקֶּה
  english_pob_choice: you mark out
  chosen_spanish: trazas el contorno
  alternatives_spanish:
  - marcas
  - dibujas el límite
  lexicon: HALOT
  rationale: El hitpael de חקה sugiere marcar, inscribir o delimitar. «Trazas el contorno» conserva el valor de dibujar un límite alrededor de los pies y, en español, mantiene la fuerza visual que la nota inglesa preserva con «trace around».
theological_decisions:
- issue: Imagen de vigilancia y confinamiento atribuido a Dios en el lamento de Job
  english_pob_reading: You watch all my paths; you mark out the soles of my feet.
  chosen_spanish_reading: vigilas todos mis caminos; trazas el contorno de las plantas de mis pies
  alternative_spanish_readings:
  - guardas todos mis caminos; marcas las plantas de mis pies
  - observas todos mis caminos; delineas las plantas de mis pies
  rationale: 'Se conserva el tono acusatorio del lamento: Dios es descrito como quien restringe y vigila cada movimiento de Job. No se suaviza el verbo ni se introduce una interpretación conciliadora, porque el contexto exige mantener la tensión teológica del discurso.'
  doctrine_reference: Libro de Job; teología del lamento y la providencia divina en discurso poético
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto hebreo y con la auditoría inglesa; la única decisión relevante es cómo naturalizar en español la imagen de marcar/rodear los pies sin perder la metáfora de restricción y vigilancia. No se registran revisiones aplicadas en el tramo de referencia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del verso porque el hebreo aquí usa segunda persona implícita sin el nombre divino.
  - Se prefirió «cepo» para reflejar la sujeción física de סַד y evitar una translación demasiado técnica o arcaica.
  - Se conservó la intensidad poética con verbos en segunda persona directa, coherente con el reproche de Job.
