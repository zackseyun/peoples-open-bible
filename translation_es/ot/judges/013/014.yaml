revisions:
- from: No debe comer nada que provenga de la vid[a], ni beber vino ni bebida fuerte; ni debe comer nada impuro. Debe guardar todo lo que le he mandado.
  to: No debe comer nada que provenga de la vid[a], ni beber vino ni bebida fuerte; ni debe comer nada inmundo. Debe guardar todo lo que le mandé.
  rationale: Se revisa «impuro» a «inmundo» para preservar mejor la categoría ritual de טֻמְאָה conforme a la decisión lexical y teológica documentada en el POB. También se cambia «le he mandado» a «le mandé» para reflejar con mayor precisión el pasado narrativo de צִוִּיתִיהָ. El resto del texto es fiel, natural y bien formulado.
