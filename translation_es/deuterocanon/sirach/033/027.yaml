translation:
  language: es
  text: Un yugo y una correa[a] doblarán el cuello, y para un esclavo malvado hay potros y torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tira» para ἱμάς; el sentido es una banda o atadura de cuero que, junto con el yugo, representa sujeción física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - balanza
  - par de balanzas
  lexicon: LSJ
  rationale: Aquí el contexto de «doblarán el cuello» hace inequívoco el sentido concreto de un instrumento de sujeción; «yugo» reproduce la imagen física sin interpretarla.
- source_word: ἱμάς
  english_pob_choice: strap
  chosen_spanish: correa
  alternatives_spanish:
  - tira
  - látigo
  lexicon: LSJ
  rationale: El término puede ser una correa, tira o thongs de cuero; «correa» es natural en español y conserva la idea de una atadura junto al yugo. Se evita «látigo» porque introduce azote, no exigido por el griego.
- source_word: κάμψουσιν
  english_pob_choice: will bend
  chosen_spanish: doblarán
  alternatives_spanish:
  - inclinarán
  - forzarán hacia abajo
  lexicon: LSJ
  rationale: El futuro activo expresa una acción de torcer/doblar; «doblarán» mantiene la imagen corporal directa y no sobretraduce la intensidad.
- source_word: τράχηλον
  english_pob_choice: the neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - el pescuezo
  lexicon: LSJ
  rationale: En español contemporáneo «cuello» es claro y digno; conserva la referencia anatómica general del singular griego.
- source_word: οἰκέτῃ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado de casa
  lexicon: BDAG
  rationale: La situación de disciplina coercitiva y el paralelismo con castigos severos hacen relevante el estatus servil ligado; «esclavo» preserva esa realidad social, siguiendo la preferencia del proyecto por la fuerza léxica del término.
- source_word: κακούργῳ
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - malhechor
  - criminal
  lexicon: LSJ
  rationale: El adjetivo caracteriza moralmente al oiketēs; «malvado» es breve y contundente sin restringirlo a una categoría jurídica.
- source_word: στρέβλαι
  english_pob_choice: racks
  chosen_spanish: potros
  alternatives_spanish:
  - racks de tortura
  - instrumentos de tortura
  lexicon: LSJ
  rationale: El plural griego alude a aparatos de tortura, especialmente el potro/rack. «Potros» conserva concreción y pluralidad; en español técnico o histórico también puede entenderse como potro de tormento.
- source_word: βάσανοι
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  lexicon: LSJ
  rationale: «Torturas» reproduce bien la severidad del término y mantiene el paralelismo con «potros» sin suavizarlo.
theological_decisions:
- issue: Renderización del estatus servil en οἰκέτῃ
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado de casa
  rationale: El pasaje subraya disciplina coercitiva y castigo físico; por ello conviene conservar una denominación que haga visible la sujeción social. «Esclavo» evita diluir la dureza del texto.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos sobre servilitud; filosofía de traducción 1 y 5'
- issue: Imagen de castigo corporal en στρέβλαι καὶ βάσανοι
  english_pob_reading: racks and tortures
  chosen_spanish_reading: potros y torturas
  alternative_spanish_readings:
  - potros de tortura y suplicios
  - racks y torturas
  rationale: La secuencia griega enumera instrumentos y sufrimientos severos. «Potros» mantiene el objeto concreto; «torturas» mantiene el castigo. Se evita suavizar el alcance penal del dicho.
  doctrine_reference: Sensibilidad al valor literal de imágenes de castigo en sabiduría deuterocanónica
translation_notes:
  revision_awareness: El contexto inglés muestra una ida y vuelta editorial entre «servant» y «slave» para οἰκέτῃ, con restauración final de «slave» por fidelidad al peso social del término. La versión española sigue esa lectura final y preserva el tono coercitivo del verso. También se tuvo en cuenta la revisión inglesa que intentó suavizar el término, pero el paquete de auditoría lo revierte explícitamente.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para οἰκέτῃ en coherencia con la terminología del proyecto y con el carácter coercitivo del contexto.
  - Se eligió «correa» para ἱμάς por claridad natural en español; la nota preserva alternativas semánticas.
  - «Potros» se usa para στρέβλαι como equivalente concreto de aparato de tormento; si se prefiriera mayor transparencia histórica, podría anotarse como «potros de tortura».
