translation:
  language: es
  text: 'Pero él le dijo[a]: «Mi señor sabe que los niños son frágiles, y que los rebaños y los vacunos que crían están a mi cargo. Si los hacen avanzar demasiado por un solo día, morirá todo el rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los rebaños y los vacunos que crían están bajo mi responsabilidad». La expresión hebrea es idiomática y combina la idea de que los animales están lactando con el hecho de que su cuidado recae sobre Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: En este contexto Jacob se dirige deferentemente a Esaú; «mi señor» conserva la relación de respeto y jerarquía humana sin confundirlo con un título divino. «Señor mío» es posible, pero suena más marcado; «mi amo» no corresponde bien al registro de cortesía narrativo.
- source_word: יֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está al tanto de
  lexicon: HALOT
  rationale: El participio expresa un estado presente en el habla directa. «Sabe» es el equivalente más natural en español y mantiene la afirmación directa del conocimiento.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los pequeños
  lexicon: HALOT
  rationale: Aquí se refiere a los hijos de Jacob que viajan con él. «Niños» es claro y natural en español; «hijos» también sería posible, pero «niños» refleja mejor la referencia a menores en el marco del viaje.
- source_word: רַכִּים
  english_pob_choice: frail
  chosen_spanish: frágiles
  alternatives_spanish:
  - tiernos
  - delicados
  - débiles
  lexicon: HALOT
  rationale: El adjetivo expresa blandura/tendencia y vulnerabilidad. «Frágiles» comunica bien esa vulnerabilidad física en español moderno, sin cargarlo con un matiz meramente afectivo como podría ocurrir con «tiernos».
- source_word: וְהַצֹּאן וְהַבָּקָר
  english_pob_choice: and the flocks and herds
  chosen_spanish: los rebaños y los vacunos
  alternatives_spanish:
  - los rebaños y las reses
  - las ovejas y el ganado
  lexicon: HALOT
  rationale: El hebreo contrapone el ganado menor y mayor. «Rebaños» conserva el colectivo para el ganado menor; «vacunos» traduce con precisión el ganado mayor/cattle sin perder el paralelismo. «Reses» sería posible, pero menos transparente para lectores amplios.
- source_word: עָלוֹת עָלַי
  english_pob_choice: nursing their young are under my care
  chosen_spanish: que crían están a mi cargo
  alternatives_spanish:
  - que amamantan dependen de mí
  - que tienen cría están bajo mi responsabilidad
  lexicon: HALOT
  rationale: 'La frase es idiomática: combina la idea de animales con cría lactante y la carga de responsabilidad sobre Jacob. «Que crían» recoge el estado materno de los animales y «están a mi cargo» expresa la responsabilidad que recae sobre él, evitando una literalidad oscura.'
- source_word: וּדְפָקוּם
  english_pob_choice: If they are driven hard
  chosen_spanish: Si los fuerzan
  alternatives_spanish:
  - si los conducen con dureza
  - si los apremian
  lexicon: HALOT
  rationale: En este contexto דפק significa conducir o presionar a los animales con demasiada dureza. «Los fuerzan» mantiene el sentido de trato excesivo en un español natural; el adverbio «duro» no es necesario porque el contexto ya lo implica.
- source_word: יוֹם אֶחָד
  english_pob_choice: for one day
  chosen_spanish: por un solo día
  alternatives_spanish:
  - durante un día
  - en un solo día
  lexicon: HALOT
  rationale: La expresión temporal indica duración. «Por un solo día» es idiomático y conserva el énfasis de una única jornada.
- source_word: וָמֵתוּ כָּל הַצֹּאן
  english_pob_choice: all the flock will die
  chosen_spanish: morirán todos los rebaños
  alternatives_spanish:
  - morirá todo el rebaño
  - se morirá todo el ganado
  lexicon: HALOT
  rationale: El hebreo resume colectivamente a los animales mencionados. «Todos los rebaños» conserva el plural colectivo presente en la escena; aunque «todo el rebaño» también sería posible, el plural ayuda a reflejar la amplitud del daño en el conjunto del ganado.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una solución de equivalencia óptima para una frase hebrea idiomática difícil. La redacción española sigue esa misma línea: evita el calco mecánico de «estar sobre mí» y, a la vez, conserva el doble contenido semántico de la frase (animales con cría + responsabilidad de Jacob). No se detectaron revisiones textuales posteriores en el expediente inglés.'
  spanish_consistency_notes:
  - Se conservó el registro deferente de la dirección a Esaú con «mi señor», evitando «SEÑOR» para no introducir un valor divino inexistente aquí.
  - «Frágiles» reproduce el campo semántico de רַכִּים sin volverlo excesivamente afectivo.
  - La nota al pie preserva la alternativa idiomática documentada por el POB en inglés y la adapta al español sin añadir información ajena al expediente.
