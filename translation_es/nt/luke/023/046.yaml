base_translation:
  language: en
  yaml_path: translation/nt/luke/023/046.yaml
  text: And Jesus[a], crying out with a loud voice, said, “Father, into your hands I commit my spirit.” Having said this[c][b], he breathed his last.
  footnotes:
  - marker: a
    text: Or “I entrust my spirit.” The verb can mean to place something in another's care.
    reason: lexical_alternative
  - marker: b
    text: 'This saying echoes Psalm 31:5 in the Greek Scriptures: “Into your hands I commit my spirit.”'
    reason: cross_reference
  - marker: c
    text: Or “he expired” or simply “he died”; literally, the verb refers to breathing out.
    reason: lexical_alternative
