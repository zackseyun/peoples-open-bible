translation:
  language: es
  text: 'Habla a Aarón[a], diciendo: Todo hombre de tu descendencia, a lo largo de sus generaciones, que tenga un defecto[b] no se acercará para ofrecer el alimento de su Dios[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y dile a Aarón». El hebreo conserva una fórmula introductoria de discurso muy común en la ley.
    reason: translation_note
  - marker: b
    text: O «mancha». Hebreo mum designa un defecto físico que descalifica para esta función sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: Lit. «el pan de su Dios»; en este contexto sacerdotal, «pan» se refiere de manera más amplia al alimento sacrificial u ofrendas de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige tu palabra
  lexicon: HALOT
  rationale: El imperativo introduce una orden directa en estilo legal. «Habla» conserva el mandato y suena natural en español bíblico sin volverse arcaico.
- source_word: אֶל אַהֲרֹן לֵאמֹר
  english_pob_choice: to Aaron, saying
  chosen_spanish: a Aarón, diciendo
  alternatives_spanish:
  - 'a Aarón: diciendo'
  - a Aarón, y dile
  lexicon: HALOT
  rationale: Mantiene la fórmula hebrea de introducción del discurso con cadencia clara en español.
- source_word: אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Cualquier hombre
  - Toda persona
  lexicon: HALOT
  rationale: El hebreo está en singular masculino y, en esta legislación sacerdotal, funciona de manera representativa para un varón de la línea de Aarón. «Todo hombre» conserva ese rasgo gramatical y jurídico.
- source_word: מִזַּרְעֲךָ
  english_pob_choice: from your offspring
  chosen_spanish: de tu descendencia
  alternatives_spanish:
  - de tu linaje
  - de tus hijos
  lexicon: HALOT
  rationale: «Descendencia» expresa de modo natural la idea de línea genealógica dirigida a Aarón, sin el tono arcaico de «simiente».
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - para todas sus generaciones
  lexicon: HALOT
  rationale: Conserva la continuidad generacional del mandato. La preposición «por» en español transmite bien el alcance temporal prolongado.
- source_word: מוּם
  english_pob_choice: a defect
  chosen_spanish: un defecto
  alternatives_spanish:
  - una mancha
  - un blemish
  lexicon: HALOT
  rationale: «Defecto» refleja la restricción cultual física del término sin cargarlo con matices estéticos. Se mantiene la tensión lexical que el POB inglés resolvió con «defect».
- source_word: לֹא יִקְרַב
  english_pob_choice: shall not come near
  chosen_spanish: no se acercará
  alternatives_spanish:
  - no se aproximará
  - no podrá acercarse
  lexicon: HALOT
  rationale: «Acercarse» preserva el lenguaje técnico de aproximación al santuario y resulta idiomático en español legal-litúrgico.
- source_word: לְהַקְרִיב
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para presentar
  - para traer como ofrenda
  lexicon: HALOT
  rationale: El infinitivo hifil de קרב aquí es sacrificial. «Ofrecer» es la equivalencia española más estable y natural para el contexto culto.
- source_word: לֶחֶם אֱלֹהָיו
  english_pob_choice: the food of his God
  chosen_spanish: el pan de su Dios
  alternatives_spanish:
  - el alimento de su Dios
  - el pan-ofrenda de su Dios
  lexicon: HALOT
  rationale: En la tradición poética y cultual hebrea, לֶחֶם puede significar el alimento sacrificial ofrecido a Dios. Se conserva «pan» en el texto principal para no borrar el dato léxico literal, y se explicita el sentido cultual con la nota.
theological_decisions:
- issue: Restricción sacerdotal por defecto físico
  english_pob_reading: A regulation about approaching to offer priestly food offerings, without implying diminished personal worth or broader exclusion from covenant standing.
  chosen_spanish_reading: Una norma sobre la aptitud para acercarse a ofrecer en el santuario, sin insinuar menosprecio moral ni exclusión del valor personal o del pacto.
  alternative_spanish_readings:
  - Una exclusión general del sacerdote con defecto
  - Una condena de valor humano
  rationale: El verso regula una función sacerdotal específica. La redacción debe conservar esa limitación cultual y evitar extenderla a juicios morales o antropológicos que el texto no formula.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la fórmula legal de mandato, la referencia genealógica, el término técnico de defecto físico y la expresión cultual de «pan» con nota explicativa. No hubo revisiones posteriores que alteraran el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí el hebreo dice אֱלֹהָיו / «su Dios», por lo que no corresponde introducir el nombre divino.
  - Se conserva el tono jurídico-cultual sin suavizar la restricción ni ampliarla más allá del alcance del verso.
  - «Hombre» se usa para reflejar el singular masculino del hebreo y la legislación sacerdotal dirigida a la línea masculina de Aarón.
