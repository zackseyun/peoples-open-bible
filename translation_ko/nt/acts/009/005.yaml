  text: And he said[a], “Who are you, Lord?” And he said, “I am Jesus, whom you are persecuting.”
  footnotes:
  - marker: a
    text: Or “sir.” The Greek κύριε can be a respectful form of address; here it is rendered “Lord” in keeping with the project’s default for κύριος and the verse’s revelatory context.
