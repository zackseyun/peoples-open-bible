revisions:
- from: 'Entonces Ezequías respondió y dijo: «Ahora han llenado su mano para Yahvé. Acerquémonos y traigan sacrificios y ofrendas de gratitud[a] a la casa de Yahvé». Y la asamblea trajo sacrificios y ofrendas de gratitud, y todos los de corazón dispuesto trajeron holocaustos.'
  to: 'Entonces Ezequías respondió y dijo: «Ahora han llenado su mano para Yahvé[a]. Acérquense y traigan sacrificios y ofrendas de gratitud a la casa de Yahvé». Y la asamblea trajo sacrificios y ofrendas de gratitud, y todos los de corazón dispuesto trajeron holocaustos.'
  rationale: Se corrigió «Acerquémonos» a «Acérquense» para reflejar fielmente el imperativo hebreo de segunda persona plural (גֹּשׁוּ) y eliminar la discordancia con «traigan». También se colocó el marcador de nota directamente en la frase idiomática para cumplir la convención de anclaje de notas. No se requirió otro cambio de contenido.
