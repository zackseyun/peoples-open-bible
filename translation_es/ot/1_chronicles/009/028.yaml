- from: Algunos de ellos estaban a cargo de los utensilios[a] de servicio, porque los entraban y los sacaban por número.
  to: Algunos de ellos estaban a cargo de los utensilios[a] del servicio, porque los introducían contados y los sacaban contados.
  rationale: Se corrige una construcción no idiomática («los entraban») por «los introducían», que expresa bien el sentido causativo de יְבִיאוּם en español digno y claro. Se reemplaza «por número» por «contados» para comunicar naturalmente la idea de conteo exacto repetida en el hebreo. También se ajusta «de servicio» a «del servicio» por mejor fluidez en español, manteniendo el mismo sentido contextual.
