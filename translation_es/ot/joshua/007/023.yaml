translation:
  language: es
  text: Los tomaron de dentro de la tienda y los llevaron a Josué y a todos los hijos de Israel[a], y los dispusieron[b] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel»; también puede expresarse como «israelitas».'
    reason: lexical_alternative
  - marker: b
    text: O «los derramaron delante de Yahvé». El verbo hebreo puede significar literalmente «derramar», pero aquí probablemente se refiere a disponer o exhibir los objetos recuperados en presencia de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחוּם
  english_pob_choice: they took them
  chosen_spanish: los tomaron
  alternatives_spanish:
  - los llevaron
  - los sacaron
  lexicon: HALOT
  rationale: לקח en este contexto narrativo expresa una acción simple de tomar; 'tomaron' reproduce bien la fuerza básica sin añadir violencia innecesaria.
- source_word: מִתּוֹךְ הָאֹהֶל
  english_pob_choice: from inside the tent
  chosen_spanish: de dentro de la tienda
  alternatives_spanish:
  - del interior de la tienda
  - de la tienda
  lexicon: HALOT
  rationale: מִתּוֹךְ señala el interior o el medio de algo; 'de dentro de la tienda' conserva esa espacialidad de forma natural en español.
- source_word: וַיְבִאוּם
  english_pob_choice: brought them
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los trajeron
  - los presentaron
  lexicon: HALOT
  rationale: El hifil de בוא suele significar 'traer/llevar'. 'Los llevaron' comunica el movimiento sin sobrecargar el texto con matiz ceremonial.
- source_word: אֶל יְהוֹשֻׁעַ וְאֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to Joshua and to all the sons of Israel
  chosen_spanish: a Josué y a todos los hijos de Israel
  alternatives_spanish:
  - a Josué y a todo Israel
  - a Josué y a todos los israelitas
  lexicon: HALOT
  rationale: Se conserva la estructura repetida con 'a' y la expresión formal 'hijos de Israel', que refleja de manera transparente בני ישראל sin neutralizar el hebraísmo.
- source_word: וַיַּצִּקֻם
  english_pob_choice: they laid them out
  chosen_spanish: los pusieron
  alternatives_spanish:
  - los derramaron
  - los dispusieron
  lexicon: HALOT
  rationale: יצק puede significar 'derramar', pero aquí los objetos recuperados no son líquidos; en español 'los pusieron' transmite el acto de colocarlos ante Yahvé sin sonar forzado. 'Dispusieron' es posible pero más interpretativo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: ''Yahvé''. ''Delante de'' reproduce bien לִפְנֵי y mantiene la escena de exposición ritual ante Dios.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: El texto hebreo usa explícitamente el nombre divino. En español se preserva 'Yahvé' en lugar de una sustitución reverencial, para mantener la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - israelitas
  rationale: '''Hijos de Israel'' conserva la fórmula hebrea tradicional y su fuerza identitaria/covenantal; ''israelitas'' sería más idiomático pero menos transparente respecto del hebreo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'El borrador sigue el contexto narrativo inmediato de Josué 7:23 y conserva las decisiones auditadas del inglés POB: tomar/traer, la fórmula étnica ''hijos de Israel'' y la referencia directa al nombre divino. Se evita la lectura demasiado literal de ''derramar'' porque el objeto no es líquido, pero se documenta la alternativa semántica del verbo יצק.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo 'hijos de Israel' como eco formal de בני ישראל.
  - '''Los pusieron'' funciona como equivalente idiomático de ''they laid them out'' sin perder la imagen de colocación pública ante Dios.'
