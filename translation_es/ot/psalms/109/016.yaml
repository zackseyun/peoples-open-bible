  text: יַ֗עַן אֲשֶׁ֤ר לֹ֥א זָכַר֮ עֲשׂ֪וֹת חָ֥סֶד וַ/יִּרְדֹּ֡ף אִישׁ עָנִ֣י וְ֭/אֶבְיוֹן וְ/נִכְאֵ֨ה לֵבָ֬ב לְ/מוֹתֵֽת׀־׃
