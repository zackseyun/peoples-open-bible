translation:
  language: es
  text: Y aconteció que, cuando el rey oyó estas palabras[a], quedó asombrado y profundamente conmocionado; y cayó sobre su lecho y enfermó de tristeza, porque no le sucedió como había pensado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no le había resultado como había intentado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς ἤκουσεν
  english_pob_choice: it happened that when he heard
  chosen_spanish: Y aconteció que, cuando oyó
  alternatives_spanish:
  - cuando oyó
  - y sucedió que, cuando oyó
  lexicon: BDAG
  rationale: Se conserva la transición narrativa semítica con «Y aconteció que», que en español suena natural y mantiene el valor de ἐγένετο ὡς sin simplificarlo demasiado.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estas declaraciones
  lexicon: BDAG
  rationale: «Palabras» reproduce bien λόγους en este contexto de noticias o informe recibido por el rey.
- source_word: ἐθαμβήθη
  english_pob_choice: he was astonished
  chosen_spanish: quedó asombrado
  alternatives_spanish:
  - quedó atónito
  - quedó estupefacto
  lexicon: BDAG
  rationale: «Asombrado» mantiene la sorpresa/shock sin cargar innecesariamente el pasaje con un matiz más interpretativo como «horrorizado».
- source_word: ἐσαλεύθη σφόδρα
  english_pob_choice: greatly shaken
  chosen_spanish: muy sacudido
  alternatives_spanish:
  - profundamente perturbado
  - grandemente agitado
  lexicon: BDAG
  rationale: «Sacudido» conserva la imagen de conmoción interior de σαλεύω; «muy» refleja σφόδρα. Se evita un término demasiado psicológico que desdibuje la metáfora.
- source_word: ἔπεσεν ἐπὶ τὴν κοίτην
  english_pob_choice: he fell upon his bed
  chosen_spanish: cayó sobre su lecho
  alternatives_spanish:
  - se echó en su cama
  - se postró en su lecho
  lexicon: LSJ
  rationale: «Lecho» es más digno y suficientemente literal para κοίτη; «cayó sobre» preserva el gesto de colapso físico/emocional.
- source_word: ἐνέπεσεν εἰς ἀρρωστίαν
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - cayó enfermo
  - se puso enfermo
  lexicon: BDAG
  rationale: «Enfermó» es claro y natural en español; mantiene la entrada en un estado de enfermedad sin añadir elementos ajenos.
- source_word: ἀπὸ τῆς λύπης
  english_pob_choice: from grief
  chosen_spanish: de tristeza
  alternatives_spanish:
  - por el dolor
  - a causa de la aflicción
  lexicon: BDAG
  rationale: λύπη puede expresarse como tristeza, dolor o aflicción; «de tristeza» conserva la causalidad y suena natural en español. Se evita sobretraducir con un término excesivamente solemne.
- source_word: οὐκ ἐγένετο αὐτῷ καθὼς ἐνεθυμεῖτο
  english_pob_choice: it had not happened for him as he had planned
  chosen_spanish: porque no le sucedió como había pensado
  alternatives_spanish:
  - porque no le salió como había planeado
  - porque no le resultó como había querido
  lexicon: BDAG
  rationale: La estructura impersonal se mantiene con «no le sucedió». «Había pensado» refleja el verbo de intención/consideración sin forzar «planeado» cuando el griego permite un matiz más amplio.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de 1 Macabeos 6:8 con atención al valor narrativo de καὶ ἐγένετο ὡς, al matiz de conmoción de ἐσαλεύθη σφόδρα y a la causalidad de ἀπὸ τῆς λύπης. En comparación con el audit trail inglés, se mantuvo la estructura impersonal final, pero en español se prefirió «había pensado» como opción amplia y natural, dejando en nota la alternativa «había intentado / había planeado».
  spanish_consistency_notes:
  - Se usa «Y aconteció que» para el giro narrativo, coherente con un estilo bíblico moderno y no arcaizante.
  - Se evita «SEÑOR» o terminología no pertinente, ya que no hay vocabulario divino en este versículo.
  - «Lecho» se prefiere a «cama» por dignidad literaria y proximidad al registro bíblico sin caer en arcaísmo fuerte.
  - La nota de pie conserva la alternativa de intención/planificación porque el griego ἐνθυμέομαι admite más de un matiz en este contexto.
