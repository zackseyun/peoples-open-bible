translation:
  language: es
  text: 'Entonces él le dijo: «Las ciudades que mi padre tomó de tu padre, yo las restituiré, y tú podrás establecerte calles[a] en Damasco, como mi padre hizo en Samaria». Y yo, en el tratado[b], te dejaré ir». Entonces hizo un tratado con él y lo dejó ir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mercados» o «barrios». El hebreo literalmente significa «calles/espacios abiertos» y aquí puede referirse a distritos comerciales concedidos por tratado.
    reason: lexical_alternative
  - marker: b
    text: O «con este pacto te dejaré ir». El hebreo también puede traducirse «pacto», pero aquí se refiere a un acuerdo político entre reyes.
    reason: alternative_reading
lexical_decisions:
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los pueblos
  lexicon: HALOT
  rationale: עִיר se refiere a ciudades o centros poblados; «ciudades» conserva bien el sentido político-territorial del contexto.
- source_word: לָקַח ... אָשִׁיב
  english_pob_choice: took ... I will restore
  chosen_spanish: tomó ... yo las restituiré
  alternatives_spanish:
  - tomó ... yo las devolveré
  - capturó ... yo las devolveré
  lexicon: HALOT
  rationale: «Restituiré» expresa una devolución formal y diplomática de bienes o territorios previamente tomados, alineada con el contraste del verbo hebreo.
- source_word: וְחוּצוֹת
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - plazas
  - barrios
  - mercados
  lexicon: HALOT
  rationale: El hebreo puede aludir literalmente a calles o espacios abiertos; «calles» es la opción más directa y natural en español, sin perder la posibilidad de un valor urbano o comercial.
- source_word: תָּשִׂים לְךָ בְדַמֶּשֶׂק
  english_pob_choice: you may make streets for yourself in Damascus
  chosen_spanish: podrás hacerte calles en Damasco
  alternatives_spanish:
  - podrás establecerte calles en Damasco
  - podrás abrir calles para ti en Damasco
  lexicon: HALOT
  rationale: Se conserva el verbo de hacer/poner y el beneficiario reflexivo. «Hacerte calles» sigue de cerca el hebreo y resulta comprensible en español, aunque sugiere una concesión urbanística dentro del tratado.
- source_word: כַּאֲשֶׁר שָׂם אָבִי בְּשֹׁמְרוֹן
  english_pob_choice: as my father made in Samaria
  chosen_spanish: como mi padre hizo en Samaria
  alternatives_spanish:
  - como mi padre las hizo en Samaria
  - como mi padre estableció en Samaria
  lexicon: HALOT
  rationale: El hebreo repite el mismo verbo de «hacer/poner»; en español, «hizo» reproduce esa reiteración sin forzar un objeto explícito que el texto no nombra.
- source_word: בַּבְּרִית
  english_pob_choice: in the treaty
  chosen_spanish: en el tratado
  alternatives_spanish:
  - en el pacto
  - con el tratado
  - bajo el tratado
  lexicon: HALOT
  rationale: Aquí בְּרִית designa un acuerdo político entre reyes; «tratado» comunica bien ese valor en español. Se mantiene la alternativa de «pacto» por cercanía semántica.
- source_word: אֲשַׁלְּחֶךָּ
  english_pob_choice: I will let you go
  chosen_spanish: te dejaré ir
  alternatives_spanish:
  - te soltaré
  - te despediré
  - te enviaré fuera
  lexicon: HALOT
  rationale: En el contexto narrativo de despedida tras el acuerdo, «te dejaré ir» es idiomático y fiel al valor de liberar o despedir.
- source_word: וַיִּכְרָת לוֹ בְרִית
  english_pob_choice: he made a treaty with him
  chosen_spanish: hizo un tratado con él
  alternatives_spanish:
  - cerró un tratado con él
  - concertó un pacto con él
  - cortó un pacto con él
  lexicon: HALOT
  rationale: «Hizo un tratado» comunica la función diplomática del idiomático כרת ברית; se preserva la relación semántica con el acto formal de concertar un acuerdo.
- source_word: וַיְשַׁלְּחֵהוּ
  english_pob_choice: and let him go
  chosen_spanish: lo dejó ir
  alternatives_spanish:
  - lo despidió
  - lo envió fuera
  - lo soltó
  lexicon: HALOT
  rationale: La repetición del verbo narra el cumplimiento de la promesa anterior; «lo dejó ir» mantiene la continuidad y su tono narrativo.
theological_decisions:
- issue: Rendering of בְּרִית in a royal political agreement
  english_pob_reading: treaty
  chosen_spanish_reading: tratado
  alternative_spanish_readings:
  - pacto
  - covenio
  - alianza
  rationale: El contexto es un acuerdo entre reyes sobre territorios y libertad de tránsito, no una alianza teológica. «Tratado» evita cargar el término con asociaciones eclesiales o solemnes ajenas al pasaje, sin negar la base semítica de ברית.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail en dos puntos: se prefirió una expresión más directa equivalente a «make streets» y se mantuvo la preposición natural en español para «in the treaty». También se preservó la alternancia idiomática de los verbos repetidos («hizo/lo dejó ir») sin añadir explicaciones al texto principal.'
  spanish_consistency_notes:
  - Se usa «tratado» para בְּרִית en este contexto político, conforme al criterio del POB en inglés.
  - Se mantiene «Yahvé» por defecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - «Hacerte calles» conserva la rareza del hebreo sin volver el español oscuro.
  - Los verbos de restitución y despedida se han mantenido en un registro formal pero claro, apto para publicación.
