review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo y del POB inglés en la mayoría del versículo: distingue «montó» de «fue», conserva la dirección «a Jezreel», expresa correctamente la causalidad con «porque», y refleja bien «había bajado a ver a Joram». Sin embargo, no preserva fielmente שֹׁכֵב («estaba acostado / tendido / postrado / yacía»), porque lo reduce a «estaba allí», eliminando el matiz físico explícito del original.'
  spanish_quality_summary: 'El español es claro y natural, pero la cláusula «porque Joram estaba allí» empobrece el sentido y rompe la precisión narrativa. Una reparación pequeña basta: usar «estaba acostado allí» o equivalente. Además, la nota [b] está mal anclada: comenta «a ver a Joram», pero en el texto el marcador aparece junto a «Jezreel».'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Los nombres propios están bien en español. El problema principal es léxico: שֹׁכֵב debe conservarse con un verbo de postura/reposo, no solo presencia locativa.'
  issues:
  - severity: high
    issue: Pérdida del sentido de שֹׁכֵב
    rationale: El hebreo dice literalmente que Joram «estaba acostado / yacía» allí. «Estaba allí» elimina el matiz físico y el trasfondo de convalecencia que el POB inglés preserva con «was lying there». No es una simplificación aceptable porque cambia el contenido semántico.
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: 'La nota [b] explica «Literalmente: “a ver a Joram”», pero el marcador [b] aparece después de «Jezreel» en vez de junto a «a ver a Joram» o la frase correspondiente. Las notas deben anclarse exactamente al lugar pertinente del texto.'
  - severity: low
    issue: Nota [a] poco útil tal como está redactada
    rationale: La nota dice «O “montó”», pero el texto principal ya usa «montó». Para reflejar el audit trail inglés, la alternativa útil sería «O “cabalgó”» o similar; aun así, no es imprescindible mantener una nota aquí si la opción principal española ya comunica bien la distinción.
  revised_spanish_text: Así que Jehú montó y fue a Jezreel, porque Joram estaba acostado allí, y Ahazías, rey de Judá, había bajado a ver[a] a Joram.
  revised_footnotes:
  - marker: a
    text: Literalmente, «a ver a Joram»; es decir, para visitarlo.
    reason: lexical_alternative
  revision_rationale: Se corrige «estaba allí» a «estaba acostado allí» para preservar el valor de שֹׁכֵב y la precisión del POB inglés. También se elimina la nota mal planteada sobre «Jezreel» y se reancla la nota léxica al verbo «ver», donde realmente corresponde. No se requiere adjudicación adicional porque la corrección es directa y de baja complejidad.
