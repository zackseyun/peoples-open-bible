base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/002/007.yaml
  text: Do not tell my father what you did to me, but speak in this way, just as I explained to Benjamin.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:04Z'
    unchanged: false
    changes_summary: Removed the added object pronoun 'it' after 'explained' to more closely reflect the Greek, which simply says 'just as I explained to Benjamin.'
translation:
  language: es
  text: No digan a mi padre lo que me hicieron, sino hablen así, tal como expliqué a Benjamín.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ λέγετε
  english_pob_choice: Do not tell
  chosen_spanish: No digan
  alternatives_spanish:
  - No le cuenten
  - No le digan
  lexicon: 'LSJ: λέγω — to say, tell, recount; present imperative with μή = ongoing prohibition'
  rationale: Present imperative with μή prohibits the continuous or repeated act of reporting. 'Digan' (decir) naturally covers both telling and saying in neutral Latin American Spanish. The pronominal 'le' is deferred to the following phrase 'a mi padre' for clarity rather than added here as a clitic, keeping the sentence uncluttered.
- source_word: ἃ ἐποιήσατέ μοι
  english_pob_choice: what you did to me
  chosen_spanish: lo que me hicieron
  alternatives_spanish:
  - lo que me han hecho
  lexicon: 'LSJ: ποιέω — to do, make; aorist indicative active 2nd pl. = completed past action'
  rationale: The aorist ἐποιήσατέ marks a completed action, rendered naturally in Spanish as preterite 'hicieron.' The relative 'lo que' corresponds to the Greek ἅ (accusative relative pronoun, neuter plural). 'Me hicieron' places the indirect object clitic 'me' before the verb, standard Spanish word order.
- source_word: οὕτως λέξατε
  english_pob_choice: speak in this way
  chosen_spanish: hablen así
  alternatives_spanish:
  - digan así
  - hablen de esta manera
  lexicon: 'LSJ: λέγω (aorist λέξατε) — to speak, say; aorist imperative 2nd pl. = a specific, punctiliar commanded speech act; οὕτως = thus, in this way'
  rationale: The Greek uses the aorist imperative λέξατε, a punctiliar command for a specific speech act, in contrast to the present imperative λέγετε earlier in the verse. Spanish 'hablen' (hablar) preserves a natural register distinction from 'digan' (decir) used above and mirrors the shift from ongoing prohibition to a directed positive command. The adverb 'así' is the direct equivalent of οὕτως and pairs naturally with the following correlative 'tal como.'
- source_word: καθὼς ἐξηγησάμην
  english_pob_choice: just as I explained
  chosen_spanish: tal como expliqué
  alternatives_spanish:
  - según expliqué
  - como les expliqué
  lexicon: 'LSJ: ἐξηγέομαι — to lead out, to narrate in detail, to explain; aorist middle 1st sg.; καθώς = just as, in the same way that'
  rationale: ἐξηγησάμην (aorist middle of ἐξηγέομαι) carries a nuance of detailed narration or guided explanation beyond simple 'saying.' 'Expliqué' best captures this expository force. No explicit object is added after 'expliqué,' consistent with the Greek which has none and consistent with the POB English revision pass (2026-04-23) that deliberately removed the spurious object 'it.' The correlative pair 'así … tal como' mirrors the Greek οὕτως … καθώς.
- source_word: τῷ Βενιαμίν
  english_pob_choice: to Benjamin
  chosen_spanish: a Benjamín
  lexicon: Greek dative of indirect object; proper name Βενιαμίν
  rationale: '''A Benjamín'' is the standard Spanish dative construction for an indirect object proper name. The accent on the final syllable follows standard Spanish orthographic rules for the name Benjamín.'
translation_notes:
  revision_awareness: 'The English POB underwent one documented revision pass (2026-04-23, azure-gpt-5.4): the object pronoun ''it'' after ''explained'' was removed to match the Greek ἐξηγησάμην, which carries no explicit object. The Spanish ''tal como expliqué a Benjamín'' naturally omits any added object and therefore aligns with both the revised English and the Greek source. Charles''s 1908 edition footnote markers ³⁴ and ³⁵ appear in the Greek source text at πατρί μου and ἐξηγησάμην respectively, but were not carried into the English POB translation or footnotes; they are not reproduced in the Spanish draft as no textual-variant information from those apparatus notes was introduced into the POB record.'
  spanish_consistency_notes:
  - No divine name (יהוה/κύριος), Christological title, or spirit/flesh terminology is present in this verse; project-level defaults for those terms do not apply.
  - Proper name 'Benjamín' receives a written accent on the final syllable per Spanish orthographic convention, distinguishing it from the unaccented form occasionally found in older translations.
  - 'Register is dignified but modern: second-person plural imperative forms ''digan'' and ''hablen'' are standard neutral Latin American Spanish; archaic ''digáis''/''habléis'' forms are not used.'
