revisions:
- from: 'Yo, Yahvé, he hablado[a]. Ciertamente[b] haré esto a toda esta congregación mala[c], que se ha reunido contra mí: en este desierto se acabará[n] y allí morirán.'
  to: 'Yo, Yahvé, he hablado[a]. Ciertamente[b] haré esto a toda esta mala congregación[c], a los que se han reunido contra mí: en este desierto llegarán a su fin, y allí morirán.'
  rationale: La revisión corrige un placeholder no publicable, mejora la fidelidad al participio plural hebreo con «a los que se han reunido contra mí», y suaviza la sintaxis española manteniendo las decisiones léxicas y teológicas del POB auditado.
