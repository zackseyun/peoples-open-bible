translation:
  language: es
  text: La belleza de una mujer alegra el rostro[a], y supera todo deseo humano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ilumina el rostro» o «alegra el semblante».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «supera todo deseo de un hombre»; ἀνθρώπου también puede entenderse en algunos contextos de forma más genérica, por eso aquí se traduce «humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κάλλος
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - atractivo
  lexicon: LSJ
  rationale: El sustantivo designa la belleza o hermosura física; «belleza» es la equivalencia natural y clara en español, sin perder el sentido proverbial.
- source_word: γυναικός
  english_pob_choice: a woman's
  chosen_spanish: de una mujer
  alternatives_spanish:
  - de una esposa
  - de la mujer
  lexicon: LSJ
  rationale: El genitivo se refiere de manera directa a una mujer; «de una mujer» mantiene el alcance amplio de γυνή sin restringirlo innecesariamente a «esposa».
- source_word: ἱλαρύνει
  english_pob_choice: brightens
  chosen_spanish: alegra
  alternatives_spanish:
  - ilumina
  - hace alegre
  lexicon: LSJ
  rationale: Aunque puede sugerir 'brillar/iluminar', con πρόσωπον el verbo expresa hacer alegre o dar ánimo al semblante; «alegra el rostro» conserva bien esa fuerza sin sonar forzado en español.
- source_word: πρόσωπον
  english_pob_choice: the face
  chosen_spanish: el rostro
  alternatives_spanish:
  - el rostro
  - la cara
  - el semblante
  lexicon: LSJ
  rationale: «Rostro» mantiene la imagen visible y es idiomático en español bíblico contemporáneo. «Cara» sería más coloquial y «semblante» más interpretativo.
- source_word: ὑπὲρ πᾶσαν ἐπιθυμίαν
  english_pob_choice: surpasses every desire
  chosen_spanish: supera todo deseo
  alternatives_spanish:
  - excede todo deseo
  - va más allá de todo deseo
  lexicon: LSJ
  rationale: ὑπέρ con acusativo expresa excedencia o superioridad. «Supera» reproduce bien esa relación comparativa en español.
- source_word: ἀνθρώπου
  english_pob_choice: of a man / later revised to every human desire
  chosen_spanish: humano
  alternatives_spanish:
  - de un hombre
  - de la humanidad
  lexicon: LSJ
  rationale: El griego es genérico; la revisión inglesa confirmó que ἀνθρώπου funciona aquí como 'humano' más que como masculino específico. Por eso el español natural es «deseo humano».
- source_word: ὑπεράγει
  english_pob_choice: surpasses
  chosen_spanish: supera
  alternatives_spanish:
  - sobrepasa
  - excede
  lexicon: LSJ
  rationale: El verbo expresa sobrepasar o exceder. «Supera» es conciso, claro y combina bien con el paralelismo de la frase.
theological_decisions:
- issue: Lenguaje de género en un dicho sapiencial sobre la atracción
  english_pob_reading: Retain 'woman' and generic 'human' in the main text.
  chosen_spanish_reading: Conservar «mujer» y «humano» sin neutralizar artificialmente el dicho.
  alternative_spanish_readings:
  - La belleza de una persona alegra el rostro, y supera todo deseo humano.
  rationale: El griego presenta una observación sapiencial concreta sobre la belleza femenina y su efecto; neutralizar «mujer» borraría la forma retórica del proverbio. Al mismo tiempo, ἀνθρώπου no exige masculino específico, por lo que «humano» refleja mejor el valor genérico.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el segundo miembro de «de un hombre» a «todo deseo humano» para reflejar ἀνθρώπου como genérico. La versión española sigue esa lectura revisada y evita masculinizar indebidamente el término.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando el calco rígido.
  - «Rostro» se usa con un sentido concreto y visible, coherente con πρόσωπον.
  - «Humano» refleja el genérico griego ἀνθρώπου sin perder la estructura comparativa del dicho.
  - Las notas conservan alternativas léxicas útiles sin introducir una lectura doctrinal ajena al texto.
