  - severity: low
    issue: La combinación «está ligada al corazón» suena menos natural que alternativas más directas
    rationale: En español bíblico y general, «atada al corazón» o «ligada en el corazón» comunican mejor la imagen de algo firmemente prendido dentro del ser interior. «Atada» además conserva bien la alternativa inglesa «tied» presente en la nota.
  revised_spanish_text: La insensatez está atada en el corazón de un muchacho[a]; la vara de la disciplina la alejará de él.
