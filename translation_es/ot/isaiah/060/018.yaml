review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: cesa la violencia en la tierra, cesan שֹׁד וָשֶׁבֶר dentro de los límites, y los muros y puertas reciben nombres programáticos. También mantiene correctamente la secuencia con ''y llamarás''. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en ''tu tierra'' pero la nota explica la alternativa para ''devastación o destrucción'', no para ''tierra''.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'Ya no se oirá violencia en tu tierra' funciona bien. La segunda mitad también es legible, aunque conviene simplificar la puntuación en 'y a tus puertas Alabanza' sin coma intermedia. El problema principal es técnico-editorial de la nota, no de estilo sustancial.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. 'Salvación' y 'Alabanza' respetan la decisión teológica de tratarlos como nombres/títulos. 'Muros' y 'puertas' son aceptables en contexto.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en el lugar equivocado.
    rationale: La nota ofrece una alternativa léxica para שֹׁד וָשֶׁבֶר ('devastación o destrucción' / 'despojo y ruina'), pero el marcador [a] está adjunto a 'tu tierra'. Esto rompe la correspondencia exigida entre anclaje y contenido de la nota.
  - severity: low
    issue: Puntuación ligeramente pesada en la cláusula final.
    rationale: En español suena más natural 'y a tus puertas Alabanza' que 'y a tus puertas, Alabanza'. La coma no es necesaria y puede entorpecer la lectura del paralelismo nominal.
  revised_spanish_text: Ya no se oirá violencia en tu tierra, ni devastación o destrucción[a] dentro de tus fronteras; y llamarás a tus muros Salvación, y a tus puertas Alabanza.
  revised_footnotes:
  - marker: a
    text: O 'despojo y ruina' para 'devastación o destrucción'.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] para que ancle correctamente la alternativa léxica de שֹׁד וָשֶׁבֶר, y se elimina una coma innecesaria antes de 'Alabanza' para mejorar la fluidez sin alterar el sentido ni la estructura del original.
