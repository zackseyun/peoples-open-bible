revisions:
- from: 'Habla a los hijos de Israel[a], diciendo: No comerán ninguna grasa de toro, de oveja o de cabra.'
  to: 'Habla a los hijos de Israel[a], diciendo: No deben comer ninguna grasa de un buey, de una oveja o de una cabra.'
  rationale: Se ajusta «toro» a «buey» para evitar una especificación sexual no presente en el hebreo y para seguir mejor la decisión auditada «ox». Se cambia «No comerán» por «No deben comer» para expresar con mayor claridad en español la prohibición legal dirigida al pueblo. Se añaden artículos indefinidos en la enumeración por naturalidad española sin alterar el sentido.
