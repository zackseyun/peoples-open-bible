revisions:
- from: Si apartas tu pie del sábado[a], de hacer tu propio placer en mi día santo, y llamas al sábado delicia, al santo de Yahvé honorable, y lo honras[b] al no seguir tus propios caminos, ni buscar tu propio placer, ni hablar palabra[c].
  to: Si apartas tu pie del sábado, de procurar tu propio placer[c] en mi día santo, y llamas al sábado una delicia, la cosa santa de Yahvé honorable, y lo honras[a] al no seguir tus propios caminos, ni buscar tu propio placer, ni hablar palabra[b].
  rationale: Se revisa la frase central para evitar la falsa lectura personal de «el santo de Yahvé» y reflejar mejor el hebreo condensado con «la cosa santa de Yahvé honorable». Se mejora ligeramente la naturalidad de «hacer tu propio placer» a «procurar tu propio placer» sin perder el vínculo léxico con la repetición posterior. Se corrigen por completo los anclajes de notas para que cada marcador aparezca junto a la frase que la nota explica.
