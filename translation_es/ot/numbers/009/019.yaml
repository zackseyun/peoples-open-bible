translation:
  language: es
  text: Cuando la nube permanecía sobre el tabernáculo por muchos días, los hijos de Israel guardaban el encargo[a] de Yahvé y no se ponían en marcha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la obligación de Yahvé» o «la encomienda de Yahvé». El hebreo puede expresar la idea de un deber o encargo que Yahvé les había confiado para guardar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַאֲרִיךְ
  english_pob_choice: When ... remained
  chosen_spanish: Cuando ... permanecía
  alternatives_spanish:
  - y cuando ... se alargaba
  - cuando ... se prolongaba su estancia
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de אָרַךְ expresa duración prolongada. En español, «permanecía» comunica bien la continuidad sin sonar forzado ni añadir una idea ajena al contexto.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube visible
  lexicon: HALOT
  rationale: El referente es la nube guía del desierto; «la nube» es natural y fiel al contexto.
- source_word: עַל הַמִּשְׁכָּן
  english_pob_choice: over the tabernacle
  chosen_spanish: sobre el tabernáculo
  alternatives_spanish:
  - encima del tabernáculo
  - sobre el santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן se refiere al tabernáculo en este marco del desierto. «Sobre» conserva la relación espacial de עַל.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: HALOT
  rationale: La frase denota duración extendida. «Por muchos días» suena natural en español y mantiene el sentido temporal.
- source_word: וְשָׁמְרוּ
  english_pob_choice: kept
  chosen_spanish: guardaban
  alternatives_spanish:
  - observaban
  - cumplían
  lexicon: HALOT
  rationale: שׁמר con מִשְׁמֶרֶת expresa la idea de guardar/cumplir cuidadosamente una obligación. «Guardaban» mantiene el idiomático valor de «kept» sin perder precisión.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo, con su matiz familiar y pactal. «Hijos» es una equivalencia directa y clara en español bíblico contemporáneo.
- source_word: אֶת מִשְׁמֶרֶת יְהוָה
  english_pob_choice: the charge of Yahweh
  chosen_spanish: la carga de Yahvé
  alternatives_spanish:
  - la encarga de Yahvé
  - la obligación de Yahvé
  - el encargo de Yahvé
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת abarca cargo, obligación o encargo. En español, «carga» conserva la idea de responsabilidad asignada, pero queda un poco más pesada y menos idiomática que «encargo»; se mantiene para no suavizar en exceso la fuerza semántica. Yahvé se usa por la política del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología por defecto del proyecto en español, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: וְלֹא יִסָּעוּ
  english_pob_choice: and did not set out
  chosen_spanish: y no se ponían en marcha
  alternatives_spanish:
  - y no partían
  - y no se alejaban
  lexicon: HALOT
  rationale: En contexto de campamento y travesía, נסע significa salir o emprender marcha. «No se ponían en marcha» expresa con claridad el movimiento de partida sin añadir interpretación.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título genérico. La forma española del proyecto es «Yahvé», que preserva la identidad covenantal del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gender-accurate rendering of בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina plural del hebreo y su lenguaje familiar de pacto, sin neutralizarla a una forma colectiva más abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of מִשְׁמֶרֶת
  english_pob_reading: the charge
  chosen_spanish_reading: la carga
  alternative_spanish_readings:
  - el encargo
  - la obligación
  - la encomienda
  rationale: Aunque «cargo/encargo» podrían sonar más naturales, «carga» mantiene la idea de una responsabilidad impuesta o encomendada. La elección intenta no diluir la seriedad del mandato implícito en מִשְׁמֶרֶת.
  doctrine_reference: 'Lexical note: covenantal obligation/charge in wilderness narrative'
translation_notes:
  revision_awareness: La versión inglesa auditada está en alto acuerdo con revisiones marcadas como sin cambios; no se requieren ajustes textuales mayores. La principal decisión en español es cómo verter מִשְׁמֶרֶת sin perder su sentido de obligación/cargo, y cómo reflejar el nombre divino con la forma española estándar del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto.
  - Se conserva la forma masculina plural «los hijos de Israel» conforme al hebreo.
  - La expresión de movimiento final evita un calco duro y mantiene el valor narrativo de נסע.
