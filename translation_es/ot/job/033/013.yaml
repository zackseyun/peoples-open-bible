translation:
  language: es
  text: ¿Por qué contiendes contra él[a], que no responde acerca de todas sus palabras[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con él». La construcción hebrea puede significar «contender con» o «contender contra».'
    reason: lexical_alternative
  - marker: b
    text: «Sus palabras» también puede entenderse como «sus asuntos» o «sus actuaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, conservando el tono de reproche o desafío de Eliú sin añadir matiz explicativo no presente en el hebreo.
- source_word: אֵלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - con él
  - a él
  lexicon: HALOT
  rationale: La construcción hebrea con אֶל puede expresar disputa con o contra alguien; en este contexto la lectura adversarial está bien representada por «contra él». Se preserva la alternativa relacional en nota.
- source_word: רִיבוֹתָ
  english_pob_choice: you contend
  chosen_spanish: contiendes
  alternatives_spanish:
  - disputas
  - riñas
  lexicon: HALOT
  rationale: Rיב en este contexto forense es «contender/disputar». «Contiendes» mantiene la fuerza verbal sin sobrerretorcer el sentido.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Después de la pregunta retórica, «que» refleja mejor la relación sintáctica del hebreo en la revisión más reciente del POB y evita forzar una causalidad explícita.
- source_word: כָל
  english_pob_choice: for all
  chosen_spanish: por todas
  alternatives_spanish:
  - por todo
  - en todas
  lexicon: HALOT
  rationale: Con el sustantivo plural siguiente y la negación, el sentido es de alcance total. «Por todas» conserva esa amplitud de modo idiomático en español.
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus asuntos
  - sus hechos
  - sus asuntos y tratos
  lexicon: HALOT
  rationale: דבר puede ser palabra, asunto o trato. Aquí se conserva «palabras» como forma primaria y transparente, manteniendo la ambigüedad del hebreo sin decidirla de forma excesiva.
- source_word: לֹא יַעֲנֶה
  english_pob_choice: he does not answer
  chosen_spanish: no responde
  alternatives_spanish:
  - no contesta
  - no responderá
  lexicon: HALOT
  rationale: ענה en qal significa responder/contestar. «No responde» suena natural y mantiene el presente gnómico que emplea el inglés POB.
theological_decisions:
- issue: Referente de los pronombres de tercera persona
  english_pob_reading: Both pronouns refer to God, yielding 'Why do you contend against him... he does not answer...'.
  chosen_spanish_reading: 'Ambos pronombres se refieren a Dios: «contra él... no responde...», manteniendo la reprensión de Eliú.'
  alternative_spanish_readings:
  - contra Job...
  - contra tu caso...
  rationale: En el discurso inmediato, Eliú reprende a Job por disputar con Dios y por quejarse de que Dios no responde. El español conserva esa referencia sin suavizar la tensión teológica.
  doctrine_reference: Preservar la tensión del texto; no resolverla interpretativamente más allá del contexto inmediato.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB al preferir «que» sobre una causalidad más fuerte. También se mantuvo la ambigüedad de דבר en «sus palabras», con nota de alternativas semánticas.
  spanish_consistency_notes:
  - Se usa «Dios» para el referente divino, sin introducir «SEÑOR» como máscara.
  - 'Se conserva el verbo de disputa con fuerza forense: «contiendes».'
  - Se mantiene el orden sintáctico breve y directo, apropiado para un dicho de reproche.
  - Las notas al pie señalan alternativas léxicas sin sobreinterpretar el hebreo.
