revisions:
- from: Así que derramé mi ira[a] sobre ellos, por la sangre que habían derramado sobre la tierra, y porque la habían profanado con sus ídolos.
  to: Así que derramé mi ira sobre ellos, por la sangre que habían derramado en la tierra, y porque la habían profanado con sus ídolos[a].
  rationale: Se corrige el anclaje de la nota para que corresponda al término traducido “ídolos”, en línea con el expediente léxico del POB. También se cambia “sobre la tierra” por “en la tierra” para una expresión española más natural y para reflejar mejor el sentido territorial de הָאָרֶץ en Ezequiel. Se conserva “profanado” por ser una opción bíblica inteligible dentro del campo semántico de טמא.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal doble del hebreo, la repetición de שׁפךְ con “derramé / habían derramado”, y el sentido judicial de חֲמָתִי como “ira”. También mantiene correctamente el referente femenino de טִמְּאוּהָ hacia la tierra. Sin embargo, hay dos problemas de fidelidad al expediente POB: la nota al pie está anclada en “ira” cuando corresponde a “ídolos”, y “sobre la tierra” debilita la decisión documentada de הָאָרֶץ como “la tierra/el territorio” en sentido pactal; en español bíblico más natural aquí conviene “en la tierra”.'
  spanish_quality_summary: El español es claro y digno, pero el anclaje erróneo de la nota produce confusión inmediata para el lector. Además, “la habían profanado” es aceptable, aunque “la habían contaminado” o “la habían hecho impura” sería más cercano a טמא; no obstante, “profanado” sigue dentro del campo semántico bíblico y no exige cambio. El ajuste principal es mover la nota a “ídolos” y pulir “sobre la tierra” a “en la tierra” para mejor naturalidad y mejor correspondencia contextual.
  glossary_alignment: 'Cumple con los términos clave del proyecto: no aparece el nombre divino en este versículo; חֲמָה -> “ira” es adecuado; גִּלּוּלִים -> “ídolos” con nota explicativa sigue la pauta POB; טמא no queda aplanado. La única desalineación formal es que la nota léxica sobre גִּלּוּלִים debe marcar “ídolos”, no “ira”.'
  issues:
  - severity: high
    issue: La nota al pie [a] está colocada sobre “ira” en vez de sobre “ídolos”.
    rationale: La nota explica el término hebreo גִּלּוּלִים, por lo que debe anclarse exactamente en la expresión española que lo traduce. Tal como está, induce al lector a pensar que la nota comenta “ira”.
  - severity: medium
    issue: “Sobre la tierra” es menos natural y menos preciso que “en la tierra” para עַל הָאָרֶץ en este contexto.
    rationale: Aunque עַל puede traducirse literalmente “sobre”, en español con “sangre derramada” la construcción natural es “derramada en la tierra”. Además ayuda a reflejar mejor la idea territorial/covenantal documentada en el expediente, sin sugerir solo superficie física.
  revised_spanish_text: Así que derramé mi ira sobre ellos, por la sangre que habían derramado en la tierra, y porque la habían profanado con sus ídolos[a].
  revised_footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término fuertemente despectivo para los ídolos; algunas traducciones intentan reflejar más explícitamente ese matiz peyorativo.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al término traducido “ídolos”, en línea con el expediente léxico del POB. También se cambia “sobre la tierra” por “en la tierra” para una expresión española más natural y para reflejar mejor el sentido territorial de הָאָרֶץ en Ezequiel. Se conserva “profanado” por ser una opción bíblica inteligible dentro del campo semántico de טמא.
