id: PHP.1.21
reference: Philippians 1:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐμοὶ γὰρ τὸ ζῆν Χριστὸς καὶ τὸ ἀποθανεῖν κέρδος.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/021.yaml
  text: For to me, to live is Christ, and to die is gain.
translation:
  language: ko
  text: 내게는, 사는 것이 메시아[a]요 죽는 것이 유익입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 영어 POB는 이 농축된 신앙 고백 표현에서 이름처럼 굳어진 「Christ」를 채택했으나, 본 한국어 번역은 일관성을 위해 칭호 「메시아」를 본문에 두고 「그리스도」를 각주로 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_korean: 내게는
  alternatives_korean:
  - 나에게
  - 나로서는
  lexicon: BDAG
  rationale: 여격 대명사가 바울의 주관적 관점을 표현한다. 「내게는」이 강조적이고 자연스럽다.
- source_word: γὰρ
  english_pob_choice: For
  chosen_korean: (생략, 문맥 흐름으로 연결)
  alternatives_korean:
  - 곧
  - 참으로
  lexicon: BDAG
  rationale: γάρ의 연결적 기능은 한국어 단문 구조에서 생략 가능하며, 「내게는」의 강조로 충분히 이어진다.
- source_word: τὸ ζῆν
  english_pob_choice: to live
  chosen_korean: 사는 것
  alternatives_korean:
  - 산다는 것
  - 삶
  lexicon: BDAG
  rationale: 관사 부정사를 「사는 것」으로 명사화하여 「죽는 것」과 균형을 이룬다.
- source_word: Χριστὸς
  english_pob_choice: Christ
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 영어 POB는 이 단축된 신앙 고백에서 이름처럼 굳어진 「Christ」를 본문으로 택했으나, 본 한국어 번역의 일관성 원칙에 따라 칭호 「메시아」를 본문에 둔다. 헬라어 Χριστός의 칭호성은 본 농축된 표현에서도 여전히 살아 있다. 「그리스도」는 각주로 보존한다.
- source_word: τὸ ἀποθανεῖν
  english_pob_choice: to die
  chosen_korean: 죽는 것
  alternatives_korean:
  - 죽음
  - 죽는다는 것
  lexicon: BDAG
  rationale: 「사는 것」과 균형을 이루는 명사화된 부정사로 옮긴다.
- source_word: κέρδος
  english_pob_choice: gain
  chosen_korean: 유익
  alternatives_korean:
  - 이득
  - 이익
  lexicon: BDAG
  rationale: 「유익」이 본 문맥의 영적·종말론적 함의를 자연스럽게 담는다. 「이득·이익」은 상업적 어감이 강하다.
theological_decisions:
- issue: 빌립보서 1:21의 Χριστός를 칭호로 번역 — 영어 POB와의 정책 정렬
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 영어 POB는 이 농축된 신앙 고백에서 「Christ」를 이름처럼 굳어진 형태로 채택했으나, 본 한국어 번역은 칭호 일관성을 우선시한다. 한국 전통의 「그리스도」는 음역으로 굳어져 칭호성이 가려지므로, 본문에서 「메시아」로 옮기고 「그리스도」 가능성은 각주로 보존한다. 이는 KOREAN_PIPELINE.md의 「영어 POB가 결정한 사항도 한국어가 source-direct로 다르게 옮길 수 있다」는 원칙에 따른 것이다.
  doctrine_reference: 'KOREAN_PIPELINE.md: Glossary — Χριστός (titular) → 메시아'
