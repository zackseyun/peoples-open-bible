translation:
  language: es
  text: Por la palabra de Yahvé fueron hechos los cielos, y por el aliento[a] de su boca, toda su hueste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por el Espíritu de su boca toda su hueste». La palabra hebrea puede significar «aliento», «viento» o «espíritu».'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/דְבַר
  english_pob_choice: By the word of
  chosen_spanish: Por la palabra de
  alternatives_spanish:
  - Por la palabra de
  - Mediante la palabra de
  - Por medio de la palabra de
  lexicon: HALOT
  rationale: La preposición ב con דָּבָר tiene fuerza instrumental. En español, «por la palabra de» conserva bien el medio o causa instrumental sin sonar artificial. «Mediante» y «por medio de» son posibles, pero «por» mantiene mayor fluidez poética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma editorial del proyecto, «Yahvé», en lugar de sustituirlo por un título. Esto sigue la práctica del POB y mantiene visible el nombre personal de Dios.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja naturalmente con «los cielos», que preserva el valor plural y funciona bien en el marco de la creación.
- source_word: נַעֲשׂוּ
  english_pob_choice: were made
  chosen_spanish: fueron hechos
  alternatives_spanish:
  - fueron hechos
  - fueron hechos / fueron formados
  - llegaron a ser
  lexicon: HALOT
  rationale: «Fueron hechos» reproduce con fidelidad el verbo amplio עשה sin introducir de manera interpretativa «creados». Mantiene la pasiva y la simplicidad poética del hebreo.
- source_word: וּ/בְ/ר֥וּחַ
  english_pob_choice: and by the breath of
  chosen_spanish: y por el aliento de
  alternatives_spanish:
  - y por el aliento de
  - y por el espíritu de
  - y por el viento de
  lexicon: HALOT
  rationale: En el paralelismo inmediato con «la palabra de Yahvé», «aliento» expresa mejor el sentido poético de רוּחַ y evita forzar una lectura más técnica. Se conserva, sin embargo, la posibilidad de «espíritu» en nota porque el término hebreo admite ese valor.
- source_word: פִּי/ו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - de su boca
  lexicon: HALOT
  rationale: «Su boca» reproduce el antropomorfismo del hebreo de forma natural en español. La expresión mantiene el vínculo poético entre palabra y aliento.
- source_word: צְבָאָ/ם
  english_pob_choice: their host
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todo su ejército
  - toda su hueste
  - todo su conjunto
  lexicon: HALOT
  rationale: צָבָא puede designar un ejército o una hueste. En el contexto cósmico, «todo su ejército» transmite la imagen de los cuerpos celestes como un conjunto ordenado bajo Dios. «Hueste» sería posible, pero «ejército» es más transparente para el lector moderno.
theological_decisions:
- issue: 'רוּחַ: aliento o Espíritu'
  english_pob_reading: breath, with a footnote allowing Spirit
  chosen_spanish_reading: aliento, con nota que permite Espíritu
  alternative_spanish_readings:
  - espíritu
  - viento
  rationale: La frase paralela «la palabra de Yahvé» // «el aliento de su boca» favorece en primera instancia la imagen de aliento. No se elimina la resonancia teológica con el Espíritu de Dios, sino que se preserva en una nota para respetar la tensión semántica del hebreo.
  doctrine_reference: Preservar la tensión lexical sin resolverla prematuramente.
translation_notes:
  revision_awareness: El borrador sigue el pasaje base tal como quedó en el último pase de revisión, sin cambios sustantivos respecto al audit trail inglés; conserva la decisión principal «aliento» y la alternativa teológica «Espíritu» en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al criterio editorial del proyecto.
  - Se mantiene el paralelismo poético entre «palabra» y «aliento» sin convertirlo en una paráfrasis explicativa.
  - «Los cielos» y «todo su ejército» conservan el tono cósmico del verso.
  - La nota a pie de página usa un marcador único y coincide con el punto de anclaje en el texto.
