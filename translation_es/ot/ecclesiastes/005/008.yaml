  text: 'But the profit of the land in every way is this: a king served by the field[a][b].'
  footnotes:
  - marker: a
    text: Or, 'But a king for a cultivated field is an advantage to a land in every way.' The Hebrew of this verse is notably difficult, and the relation among 'profit/advantage,' 'land,' and 'king' is understood in several ways.
    reason: alternative_reading
  - marker: b
    text: '''Profit'' may also be rendered ''advantage'' or ''gain,'' echoing Ecclesiastes'' recurring theme of what enduring benefit there is.'
    reason: lexical_alternative
