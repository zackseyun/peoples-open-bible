translation:
  language: es
  text: El prudente ve el peligro[a] y se esconde; pero los simples pasan de largo y sufren las consecuencias[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mal», «el daño» o «la calamidad» para «el peligro». El término hebreo puede designar mal moral o calamidad; aquí se refiere a una circunstancia amenazante que el prudente reconoce.
    reason: alternative_reading
  - marker: b
    text: O «son castigados». El hebreo puede enfatizar la pena, pero en la literatura sapiencial también puede describir el sufrimiento de las consecuencias de la propia conducta.
    reason: alternative_reading
lexical_decisions:
- source_word: עָרוּם
  english_pob_choice: prudent man
  chosen_spanish: el prudente
  alternatives_spanish:
  - el hombre prudente
  - el sagaz
  - el astuto
  lexicon: HALOT
  rationale: En Proverbios, el término tiene sentido positivo de discernimiento y previsión. En español, «el prudente» comunica esa cualidad proverbial con naturalidad; se omite «hombre» para evitar una redundancia innecesaria en un proverbio genérico, manteniendo el valor masculino implícito del singular hebreo según el estilo del pasaje.
- source_word: רָאָה
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - ha visto
  - percibe
  lexicon: HALOT
  rationale: El perfecto hebreo en estilo sapiencial expresa una verdad general. «Ve» es el presente natural en español y conserva la imagen concreta de advertir lo que viene.
- source_word: רָעָה
  english_pob_choice: danger
  chosen_spanish: el peligro
  alternatives_spanish:
  - el mal
  - el daño
  - la calamidad
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar mal moral, daño o calamidad, aquí se trata de una situación amenazante que el prudente reconoce y evita. «Peligro» expresa bien esa idea en español sin forzar la lectura a mal moral.
- source_word: וַיִּסָּתֵר / ו/יסתר
  english_pob_choice: hides himself
  chosen_spanish: se esconde
  alternatives_spanish:
  - se oculta
  - se aparta para ponerse a salvo
  lexicon: HALOT
  rationale: 'El nifal tiene valor reflexivo: retirarse para protección. «Se esconde» es natural, breve y fiel al movimiento de resguardo sugerido por el proverbio.'
- source_word: פְתָיִם
  english_pob_choice: the simple
  chosen_spanish: los simples
  alternatives_spanish:
  - los ingenuos
  - los necios
  - los inexpertos
  lexicon: HALOT
  rationale: Se conserva el término sapiencial tradicional «los simples», que contrasta bien con «el prudente» y mantiene la categoría de experiencia/discernimiento del hebreo.
- source_word: עָבְרוּ
  english_pob_choice: pass on
  chosen_spanish: pasan de largo
  alternatives_spanish:
  - siguen adelante
  - pasan
  lexicon: HALOT
  rationale: La idea es continuar sin desviarse ni tomar resguardo. «Pasan de largo» comunica ese seguir adelante con fuerza idiomática y claridad.
- source_word: וְנֶעֱנָשׁוּ
  english_pob_choice: suffer for it
  chosen_spanish: sufren las consecuencias
  alternatives_spanish:
  - son castigados
  - pagan la pena
  - sufren por ello
  lexicon: HALOT
  rationale: El nifal puede enfatizar castigo o el resultado sufrido. «Sufren las consecuencias» preserva la amplitud del hebreo y evita cerrar la frase únicamente a una sanción judicial.
theological_decisions:
- issue: 'Alcance de רָעָה: mal moral versus calamidad/peligro'
  english_pob_reading: danger
  chosen_spanish_reading: peligro
  alternative_spanish_readings:
  - mal
  - daño
  - calamidad
  rationale: 'La lectura de Proverbios 22:3 es pragmática y sapiencial: el prudente percibe una amenaza y se aparta. «Peligro» reproduce mejor ese valor circunstancial y evita trasladar la frase a una afirmación moral abstracta que el contexto no exige.'
  doctrine_reference: Sabiduría proverbial; semántica contextual de רָעָה en literatura sapiencial.
- issue: 'Valor del verbo final נֶעֱנָשׁוּ: castigo formal o consecuencia sufrida'
  english_pob_reading: suffer for it
  chosen_spanish_reading: sufren las consecuencias
  alternative_spanish_readings:
  - son castigados
  - pagan la pena
  rationale: El proverbio formula una observación general sobre el desenlace de la imprudencia. «Sufren las consecuencias» mantiene abierta la relación entre castigo y resultado, igual que la nota inglesa, sin especificar indebidamente un marco jurídico.
  doctrine_reference: Sabiduría proverbial; principio de retribución y consecuencias.
translation_notes:
  revision_awareness: Se siguió de cerca el acuerdo alto del auditor inglés sin cambios sustanciales. La versión española conserva la tensión semántica de רָעָה y de נֶעֱנָשׁוּ mediante notas alternativas, en lugar de reducirlas a un solo sentido. También se ajustó la sintaxis para que suene natural en español sin perder el paralelismo proverbial.
  spanish_consistency_notes:
  - Se mantuvo «el prudente» para עָרוּם, en línea con el valor positivo sapiencial documentado.
  - Se preservó «los simples» como término técnico de sabiduría, por su contraste estable con «el prudente».
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes, ya que el versículo no contiene el nombre divino.
  - La traducción adopta un tono formal y publicable, pero con léxico idiomático español en «pasan de largo» y «sufren las consecuencias».
