translation:
  language: es
  text: ¿Acaso las alas del avestruz baten jubilosamente, o son remeras y plumaje de cigüeña?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «¿Acaso el ala del avestruz bate orgullosamente, pero es acaso remera y plumaje de cigüeña?». El hebreo es difícil y se ha entendido de varias maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּנַף
  english_pob_choice: wings
  chosen_spanish: ala
  alternatives_spanish:
  - alas
  lexicon: HALOT
  rationale: El hebreo usa una forma singular colectiva; en español, el singular 'ala' conserva mejor el paralelismo poético con la imagen de una sola ala del avestruz, mientras que el plural también sería posible por el sentido colectivo.
- source_word: רְנָנִים
  english_pob_choice: of the ostrich
  chosen_spanish: del avestruz
  alternatives_spanish:
  - del avestruz hembra
  - de los que gritan
  lexicon: HALOT
  rationale: Sigo la lectura zoológica adoptada en el POB inglés, que encaja con el contexto de Job 39 y con la referencia al avestruz en el pasaje.
- source_word: נֶעֱלָסָה
  english_pob_choice: flap joyfully
  chosen_spanish: bate jubilosamente
  alternatives_spanish:
  - se agita con júbilo
  - ondea orgullosamente
  - se regocija
  lexicon: HALOT
  rationale: El verbo expresa movimiento vivaz o exultante; 'bate jubilosamente' mantiene tanto la acción física del ala como la nota emocional, sin reducirla a un simple 'orgullosamente'.
- source_word: אִם
  english_pob_choice: are they
  chosen_spanish: ¿acaso... o...?
  alternatives_spanish:
  - ¿son...?
  - ¿o...?
  - ¿es que...?
  lexicon: HALOT
  rationale: Aquí אִם introduce una pregunta retórica/comparación. En español, la estructura '¿acaso... o...?' reproduce bien la fuerza interrogativa y la tensión del hebreo elíptico.
- source_word: אֶבְרָה
  english_pob_choice: pinions
  chosen_spanish: plumas de ala
  alternatives_spanish:
  - remeras
  - plumas remeras
  - alas
  lexicon: HALOT
  rationale: El término señala plumas del ala más específicas que 'alas'; 'plumas de ala' conserva la especificidad anatómica sin recurrir a un tecnicismo poco natural en español general.
- source_word: חֲסִידָה
  english_pob_choice: the stork
  chosen_spanish: la cigüeña
  alternatives_spanish:
  - la garza
  - la avetarda
  lexicon: HALOT
  rationale: El contexto exige el nombre de un ave; 'cigüeña' sigue la lectura zoológica establecida por el POB inglés para esta comparación.
- source_word: וְנֹצָה
  english_pob_choice: and plumage
  chosen_spanish: y su plumaje
  alternatives_spanish:
  - y plumaje
  - y sus plumas
  - y su manto de plumas
  lexicon: HALOT
  rationale: '''Plumaje'' es natural en español y conserva el registro poético del hebreo; el posesivo ''su'' retoma al ave comparada en la pregunta.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el POB inglés y su nota alternativa, pero ajusta el orden y la sintaxis al español natural. Mantiene la dificultad del hebreo mediante una pregunta retórica abierta y conserva la comparación zoológica sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió 'avestruz' y 'cigüeña' por la lectura zoológica ya establecida en el audit trail inglés.
  - La nota al pie conserva la ambigüedad del hebreo sin imponer una interpretación única.
