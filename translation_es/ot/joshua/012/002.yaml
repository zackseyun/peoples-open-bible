review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en la estructura general: Sihón, su residencia en Hesbón, su dominio territorial desde Aroer hasta Jaboc, y la referencia fronteriza a los hijos de Amón. Sin embargo, hay un problema de formulación en «y desde en medio del valle», que suena antinatural en español y no reproduce con claridad la elipsis territorial documentada en la POB inglesa. También conviene corregir la nota [a], que actualmente está anclada en «amorreos» pero explica «hijos de Amón», creando desalineación entre ancla y contenido.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta una torpeza sintáctica importante: «desde en medio» no es idiomático. «Que habitaba» y «gobernando» son aceptables, aunque una formulación más fluida mejora la lectura sin perder fidelidad. La puntuación y topónimos están bien en general.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Los amorreos», «Galaad», «Jaboc» y «hijos de Amón» son adecuados. La decisión de mantener «valle» para נחל concuerda con la justificación inglesa. Debe corregirse la ubicación/anclaje de la nota sobre «hijos de Amón» para que corresponda al lugar relevante en el texto.
  issues:
  - severity: high
    issue: La frase «y desde en medio del valle» es antinatural en español.
    rationale: Aunque la POB inglesa elide «from» por razones territoriales, en español «desde en medio» resulta torpe. Debe reformularse como «y desde la mitad del valle» o «y desde el medio del valle» para conservar el valor geográfico con buena legibilidad.
  - severity: high
    issue: La nota [a] está anclada en «amorreos», pero su contenido explica «hijos de Amón».
    rationale: Esto rompe la correspondencia exigida entre marcador y palabra/frase relevante. La nota debe moverse a «hijos de Amón» o, si no se desea nota, eliminarse.
  - severity: medium
    issue: La secuencia territorial puede leerse con más claridad si se añade «hasta» antes de «la mitad de Galaad».
    rationale: El hebreo enumera extensión de dominio; en español, repetir el límite ayuda a que la lista no suene fragmentaria. No es indispensable, pero mejora la lectura y refleja la lógica del pasaje.
  revised_spanish_text: Sihón, rey de los amorreos, que habitaba en Hesbón, gobernando desde Aroer, que está a la orilla del valle del Arnón, y desde la mitad del valle, hasta la mitad de Galaad, hasta el valle del Jaboc, el límite de los hijos de Amón[a].[b]
  revised_footnotes:
