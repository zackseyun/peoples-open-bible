  yaml_path: translation/deuterocanon/1_maccabees/010/043.yaml
  text: And as for any who flee to the sanctuary in Jerusalem and in all its borders[a], owing royal taxes or any other obligation, let them be released[b], along with everything that belongs to them in my kingdom.
  footnotes:
