translation:
  language: es
  text: Así habló Moisés a los hijos de Israel[a], y todos sus líderes le dieron una vara, una vara por cada líder según la casa de sus padres, doce varas; y la vara de Aarón estaba entre sus varas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los israelitas’. El hebreo dice literalmente ‘los hijos de Israel’, una designación pactual estándar del pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El verbo hebreo דִּבֵּר introduce un acto de hablar o dirigirse. En español, ‘habló’ conserva el tono narrativo formal y evita la rigidez de un calco como ‘dijo’ si se quiere mantener el matiz de discurso introductorio.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la designación literal del hebreo, como en el POB inglés, para no aplanar la forma covenantal/identitaria del texto. ‘Hijos de Israel’ es claro en español bíblico contemporáneo y refleja el plural masculino del original.
- source_word: נְשִׂיאֵיהֶם
  english_pob_choice: their leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - sus jefes
  - sus príncipes
  lexicon: HALOT
  rationale: נָשִׂיא en contextos tribales designa jefes reconocidos o líderes. ‘Líderes’ es natural en español moderno y evita la carga arcaica o cortesana de ‘príncipes’.
- source_word: מַטֶּה
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - vara/estaca
  lexicon: HALOT
  rationale: Aquí el objeto funciona como vara representativa, no como ‘vara’ en sentido disciplinario. En español, ‘vara’ comunica bien el objeto ritual y preserva la imagen del hebreo; ‘bastón’ sonaría demasiado a apoyo personal.
- source_word: מַטֶּה לְנָשִׂיא אֶחָד ... מַטֶּה לְנָשִׂיא אֶחָד
  english_pob_choice: a staff, one staff for each leader
  chosen_spanish: una vara, una vara por cada líder
  alternatives_spanish:
  - una vara para cada líder
  - una vara por líder
  lexicon: HALOT
  rationale: 'La repetición distributiva se conserva en español para reflejar la insistencia del hebreo: cada líder entrega una vara. ‘Por cada líder’ expresa bien la distribución sin perder el paralelismo.'
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: conforme a la casa de sus padres
  alternatives_spanish:
  - según sus casas paternas
  - de acuerdo con sus casas paternas
  lexicon: HALOT
  rationale: La expresión hebrea marca pertenencia por linaje paterno. ‘Casa de sus padres’ reproduce la estructura original con fluidez; ‘conforme a’ refleja el valor organizativo de la frase.
- source_word: שְׁנֵים עָשָׂר מַטּוֹת
  english_pob_choice: twelve staffs
  chosen_spanish: doce varas
  alternatives_spanish:
  - doce bastones
  - doce varas de autoridad
  lexicon: HALOT
  rationale: Se mantiene la equivalencia numérica directa. ‘Varas’ es consistente con el resto del versículo y evita introducir una interpretación no explicitada, como ‘de autoridad’.
- source_word: וּמַטֵּה אַהֲרֹן בְּתוֹךְ מַטּוֹתָם
  english_pob_choice: and Aaron’s staff was among their staffs
  chosen_spanish: y la vara de Aarón estaba entre sus varas
  alternatives_spanish:
  - y la vara de Aarón estaba en medio de sus varas
  - y la vara de Aarón estaba entre las varas
  lexicon: HALOT
  rationale: בְּתוֹךְ puede expresar ‘en medio de’ o ‘entre’. ‘Entre’ es idiomático en español y preserva la idea de inclusión de la vara de Aarón dentro del conjunto de las demás.
theological_decisions:
- issue: Designación corporativa de Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - la casa de Israel
  rationale: Se conserva la forma literal sin sustituirla por una equivalencia más interpretativa. No hay necesidad de resolver la expresión hacia un término más abstracto, porque el contexto narrativo identifica al pueblo mediante su designación covenantal.
  doctrine_reference: Identidad del pueblo del pacto en el Pentateuco
- issue: Representación tribal por casas paternas
  english_pob_reading: according to their fathers’ houses
  chosen_spanish_reading: conforme a la casa de sus padres
  alternative_spanish_readings:
  - según sus casas paternas
  - por sus clanes
  rationale: La frase refleja organización tribal y linaje, no una simple lista administrativa. ‘Casa de sus padres’ mantiene la estructura bíblica y evita reemplazarla por un término sociológico más moderno como ‘clanes’, que podría suavizar el trasfondo genealógico.
  doctrine_reference: Estructura tribal y herencia en Israel
- issue: La vara de Aarón entre las demás
  english_pob_reading: Aaron’s staff was among their staffs
  chosen_spanish_reading: la vara de Aarón estaba entre sus varas
  alternative_spanish_readings:
  - la vara de Aarón estaba en medio de sus varas
  - la vara de Aarón estaba con sus varas
  rationale: Se mantiene la posición de Aarón dentro del conjunto sin añadir explicaciones teológicas no presentes aquí. La formulación conserva la preparación narrativa para el signo divino del capítulo siguiente.
  doctrine_reference: Señal divina de elección sacerdotal
translation_notes:
  revision_awareness: El texto inglés final eliminó una coma tras ‘leader’ para mayor fluidez. El español sigue esa misma fluidez con una estructura coordinada natural y conserva el paralelismo distributivo del hebreo sin añadir comas innecesarias.
  spanish_consistency_notes:
  - Se mantiene ‘vara’ de manera uniforme para מַטֶּה en todo el versículo.
  - Se conserva ‘hijos de Israel’ como designación literal y se anota la alternativa ‘israelitas’ solo como nota léxica.
  - ‘Casa de sus padres’ refleja la expresión hebrea sin convertirla en una paráfrasis sociológica.
  - La puntuación española usa punto y coma para reproducir la cadencia enumerativa del original sin sobrecargar la sintaxis.
