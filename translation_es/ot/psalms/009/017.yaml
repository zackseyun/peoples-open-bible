translation:
  language: es
  text: Yahvé se ha dado a conocer[a]; ha ejecutado juicio. El malvado queda atrapado en la trampa por la obra de sus propias manos. Higgaion[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Yahvé es conocido; ha ejecutado juicio». El hebreo de נודע admite un sentido pasivo-estativo («es conocido») o un sentido resultativo/reflexivo («se ha dado a conocer»).'
    reason: alternative_reading
  - marker: b
    text: «Higgaion» probablemente es un término musical o litúrgico; alternativamente, puede significar «meditación» o una indicación musical como «música resonante».
    reason: lexical_alternative
lexical_decisions:
- source_word: נודע
  english_pob_choice: has made himself known
  chosen_spanish: se ha dado a conocer
  alternatives_spanish:
  - es conocido
  - se ha hecho conocido
  lexicon: HALOT
  rationale: El nifal de ידע puede ser pasivo o resultativo/reflexivo. «Se ha dado a conocer» conserva la idea de manifestación reconocible por su acción, sin resolver indebidamente la tensión entre «es conocido» y «se ha hecho conocer».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: usar el nombre divino «Yahvé» en vez de una sustitución titulada. «Yahvé» preserva el nombre personal revelado a Israel.'
- source_word: מִשְׁפָּט עָשָׂה
  english_pob_choice: has executed judgment
  chosen_spanish: ha ejecutado juicio
  alternatives_spanish:
  - ha hecho justicia
  - ha llevado a cabo juicio
  lexicon: HALOT
  rationale: La collocación expresa una acción judicial concreta. «Ha ejecutado juicio» conserva el matiz forense y retributivo mejor que una expresión más general como «ha hecho justicia».
- source_word: בְּ/פֹ֣עַל כַּ֭פָּי/ו
  english_pob_choice: by the work of his own hands
  chosen_spanish: por la obra de sus propias manos
  alternatives_spanish:
  - en la obra de sus manos
  - por el trabajo de sus manos
  lexicon: HALOT
  rationale: La preposición con פעל permite valor instrumental o circunstancial. «Por la obra de sus propias manos» hace explícita la posesión implícita y mantiene la referencia a las acciones del malvado como causa de su caída.
- source_word: נוֹקֵ֣שׁ
  english_pob_choice: is snared
  chosen_spanish: queda atrapado
  alternatives_spanish:
  - es enredado
  - es atrapado
  lexicon: HALOT
  rationale: El verbo comunica la imagen de quedar preso en una trampa. «Queda atrapado» conserva la metáfora y su fuerza resultativa en español natural.
- source_word: רָשָׁ֑ע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo/adjetivación sustantivada singular funciona como tipo representativo. «El malvado» es claro en español y mantiene el valor moral del término sin cargarlo con formulaciones eclesiásticas menos directas.
- source_word: הִגָּי֥וֹן
  english_pob_choice: Higgaion
  chosen_spanish: Higgaion
  alternatives_spanish:
  - meditación
  - indicación musical
  lexicon: HALOT
  rationale: Se conserva la transliteración porque no hay una glosa única segura. El término probablemente es litúrgico o musical, y la transliteración evita imponer un sentido incierto en el texto principal.
- source_word: סֶֽלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: HALOT
  rationale: Se mantiene sin traducir como marcador litúrgico/musical tradicionalmente oscuro. Así se respeta la incertidumbre lexicográfica y el ritmo del verso.
theological_decisions:
- issue: La relación entre el ser conocido de Yahvé y su acto de juicio
  english_pob_reading: The verse states that the LORD becomes known by executing judgment, without expanding this into a broader doctrinal claim beyond the text.
  chosen_spanish_reading: El verso dice que Yahvé se da a conocer al ejecutar juicio, sin convertirlo en una tesis doctrinal más amplia.
  alternative_spanish_readings:
  - Yahvé es conocido al ejecutar juicio
  - Yahvé se ha hecho conocer específicamente en este juicio
  rationale: El hebreo vincula el conocimiento de Yahvé con su acción judicial. La redacción española conserva ese vínculo y deja abierta la tensión entre pasivo y resultativo, sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual sin ampliarla
translation_notes:
  revision_awareness: La versión inglesa auditada ya había afinado el final quitando la puntuación después de Selah para respetar su carácter de marcador litúrgico independiente. En español se mantiene esa solución, y se conserva la ambigüedad de נודע mediante una nota alternativa sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del proyecto para יהוה.
  - Se prefiere «juicio» en un contexto forense, no «justicia» como equivalencia más amplia.
  - Se mantiene la transliteración de los términos oscuros «Higgaion» y «Selah».
  - «el malvado» conserva el singular sustantivado y la función representativa del hebreo.
  - La puntuación respeta la pausa litúrgica sin añadir un punto final tras «Selah».
