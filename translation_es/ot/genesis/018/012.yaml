    rationale: El hebreo apunta más a estar gastada o consumida que simplemente a haber envejecido. «Después de estar gastada» preserva mejor el contraste con la edad de Abraham.
  - severity: low
    issue: «mientras mi señor es viejo» suena poco natural y algo brusco
    rationale: Aunque es comprensible, «ya es anciano» expresa mejor el registro digno y la referencia a edad avanzada sin el matiz potencialmente rudo de «viejo».
