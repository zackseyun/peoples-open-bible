translation:
  language: es
  text: Y levanté a algunos de sus hijos para que fueran profetas, y a algunos de sus jóvenes para que fueran nazareos[a]. ¿No es así, oh hijos de Israel? declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nazareos» designa a quienes estaban apartados para Dios bajo un voto especial; alternativamente, «consagrados».
    reason: cultural_note
lexical_decisions:
- source_word: וָאָקִים
  english_pob_choice: And I raised up
  chosen_spanish: Y levanté
  alternatives_spanish:
  - Y hice levantar
  - Y suscití
  lexicon: HALOT
  rationale: El hifil de קום expresa hacer surgir o levantar. «Levanté» comunica de forma natural la acción divina de suscitar personas para una función.
- source_word: מִבְּנֵיכֶם
  english_pob_choice: some of your sons
  chosen_spanish: a algunos de tus hijos
  alternatives_spanish:
  - a algunos de tus hijos varones
  - a algunos de tus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de entre tus hijos varones», con valor partitivo. «A algunos de tus hijos» mantiene esa parte de la totalidad sin volver la frase pesada. El matiz masculino queda disponible por el contexto y por la forma «hijos».
- source_word: לִנְבִיאִים
  english_pob_choice: to be prophets
  chosen_spanish: para que fueran profetas
  alternatives_spanish:
  - como profetas
  - para profetas
  lexicon: HALOT
  rationale: La lamed expresa función o resultado. En español, «para que fueran profetas» conserva la idea de nombramiento para un rol.
- source_word: וּמִבַּחוּרֵיכֶם
  english_pob_choice: and some of your young men
  chosen_spanish: y a algunos de tus jóvenes
  alternatives_spanish:
  - y a algunos de tus muchachos
  - y a algunos de tus hombres jóvenes
  lexicon: HALOT
  rationale: בָּחוּר aquí se refiere a hombres jóvenes en la plenitud de su fuerza. «Jóvenes» es la forma más natural en español y conserva el paralelismo partitivo con «algunos de tus hijos».
- source_word: לִנְזִרִים
  english_pob_choice: to be Nazirites
  chosen_spanish: para que fueran nazareos
  alternatives_spanish:
  - como nazareos
  - para que fueran consagrados bajo voto de nazareo
  lexicon: HALOT
  rationale: Se mantiene el término técnico reconocido en español bíblico como «nazareo», porque describe un estado consagrado específico en Israel. Evita diluir el referente en una explicación general.
- source_word: הַאַף אֵין זֹאת
  english_pob_choice: Is this not so
  chosen_spanish: ¿No es así
  alternatives_spanish:
  - ¿No ha sido así
  - ¿No es esto cierto
  lexicon: HALOT
  rationale: La construcción introduce una pregunta retórica que espera asentimiento. «¿No es así?» es breve, natural y fiel al forcejo retórico del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: sons of Israel
  chosen_spanish: oh hijos de Israel
  alternatives_spanish:
  - hijos de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el vocativo masculino plural del hebreo y se añade «oh» para reflejar la llamada directa del original, siguiendo la revisión inglesa. «Hijos de Israel» mantiene transparencia formal sin neutralizar el género del texto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según el estándar español del proyecto como «Yahvé», y la fórmula profética נְאֻם se expresa con «declara» para un registro bíblico claro y digno.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el nombre del pacto. En este proyecto, el nombre se mantiene de forma audible y no se enmascara con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Naturaleza de נְזִרִים
  english_pob_reading: Nazirites
  chosen_spanish_reading: nazareos
  alternative_spanish_readings:
  - consagrados
  - personas bajo voto de nazareo
  rationale: El contexto alude a una institución específica de consagración en Israel. «Nazareos» conserva la referencia técnica y evita perder la tensión entre vocación especial y separación ritual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor vocativo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: O sons of Israel
  chosen_spanish_reading: oh hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - pueblo de Israel
  rationale: La frase funciona como llamada directa. «Oh» ayuda a reproducir el tono vocativo sin cambiar el sentido ni suavizar la marca masculina del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que añadió el vocativo «oh» antes de «sons of Israel». La redacción española refleja esa llamada directa con «oh hijos de Israel». También se respetó la decisión estable de mantener el nombre divino como forma audible y de conservar el término técnico para el grupo consagrado.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo sintáctico entre «a algunos de tus hijos» y «a algunos de tus jóvenes».
  - Se prefirió «nazareos» como equivalente técnico español coherente con el proyecto.
  - Se evitó traducir el nombre divino con una fórmula de sustitución como «SEÑOR».
  - La puntuación conserva la pregunta retórica antes de la cláusula de cita final.
