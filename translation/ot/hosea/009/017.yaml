id: HOS.9.17
reference: Hosea 9:17
source:
  edition: WLC
  text: יִמְאָסֵ֣/ם אֱלֹהַ֔/י כִּ֛י לֹ֥א שָׁמְע֖וּ ל֑/וֹ וְ/יִהְי֥וּ נֹדְדִ֖ים בַּ/גּוֹיִֽם׃ס
translation:
  text: My God will reject them because they have not listened to him[a], and they will be wanderers among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have not obeyed him.' The Hebrew expression literally speaks of not listening to him, with obedience implied in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְאָסֵם
  chosen: will reject them
  alternatives:
  - will cast them off
  - will despise them
  - will refuse them
  lexicon: HALOT
  rationale: The verb מאס commonly denotes rejection or refusal. 'Will reject them' is clear modern English and preserves the covenantal/judicial force without overinterpreting emotional contempt.
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - God of me
  lexicon: HALOT
  rationale: The noun with 1cs suffix is straightforwardly possessive. 'My God' preserves Hosea's prophetic first-person confession and should not be flattened to simply 'God.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for divine rejection. 'Because' is the most natural causal connector in contemporary English.
- source_word: לֹא שָׁמְעוּ לוֹ
  chosen: they have not listened to him
  alternatives:
  - they have not obeyed him
  - they did not hear him
  lexicon: HALOT
  rationale: שׁמע with ל often carries the sense of listening to or obeying someone. 'Listened to him' keeps the auditory metaphor of the Hebrew while allowing the implied disobedience to remain evident from context. 'Obeyed him' is possible but slightly more interpretive.
- source_word: וְיִהְיוּ
  chosen: and they will become
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: היה can mean 'be' or 'become.' In context, the clause describes the resulting condition after rejection, so 'will become' communicates the transition into a state of exile more naturally in English.
- source_word: נֹדְדִים
  chosen: wanderers
  alternatives:
  - fugitives
  - restless wanderers
  - homeless wanderers
  lexicon: HALOT
  rationale: The participle from נדד conveys wandering, homelessness, or restless movement. 'Wanderers' is concise and fits the exile context without importing a narrower nuance like 'fugitives.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations among whom Israel will be scattered. 'Among the nations' is idiomatic and avoids the potentially anachronistic NT-loaded term 'Gentiles.'
