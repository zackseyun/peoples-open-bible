translation:
  language: es
  text: Y encontrarás en los registros[a] lo que ha sido escrito acerca de estas cosas, y sabrás que aquella ciudad era rebelde, perturbando a reyes y ciudades, y que los judíos en ella eran rebeldes y habían organizado asedios[b] en ella desde antiguo; por esta causa esta ciudad fue asolada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «memorias»; el griego apunta a escritos consultables de carácter oficial.
    reason: lexical_alternative
  - marker: b
    text: O «sitios» o «bloqueos»; el término griego puede abarcar actividad de asedio o de bloqueo más ampliamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομνηματισμοῖς
  english_pob_choice: records
  chosen_spanish: registros
  alternatives_spanish:
  - archivos
  - memoriales
  - memorias
  lexicon: LSJ
  rationale: En este contexto administrativo, el término apunta a escritos oficiales consultables. «Registros» comunica bien el carácter documental sin sonar excesivamente técnico o anticuado en español.
- source_word: γεγραμμένα
  english_pob_choice: what has been written
  chosen_spanish: lo que ha sido escrito
  alternatives_spanish:
  - lo escrito
  - las cosas escritas
  - el escrito
  lexicon: LSJ
  rationale: El participio perfecto conserva la idea de algo ya dejado por escrito. «Lo que ha sido escrito» mantiene esa anterioridad y suena natural en español.
- source_word: ἀποστάτις
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - apóstata
  - sediciosa
  - revoltosa
  lexicon: LSJ
  rationale: Aquí el predicado describe oposición política a la autoridad imperial, no apostasía religiosa. «Rebelde» preserva ese valor político sin cargar el texto con un matiz doctrinal no exigido por el contexto.
- source_word: ὀχλοῦσα
  english_pob_choice: troubling
  chosen_spanish: perturbando
  alternatives_spanish:
  - molestando
  - causando disturbios
  - alterando
  lexicon: LSJ
  rationale: El participio expresa la acción de causar trastorno o disturbio. «Perturbando» mantiene el sentido continuo y el tono formal del pasaje.
- source_word: ἀποστᾶται
  english_pob_choice: rebels
  chosen_spanish: rebeldes
  alternatives_spanish:
  - insurgentes
  - sediciosos
  - apóstatas
  lexicon: LSJ
  rationale: Al igual que ἀποστάτις, el contexto es político-administrativo. «Rebeldes» reproduce con naturalidad la acusación colectiva.
- source_word: πολιορκίας
  english_pob_choice: blockades / sieges
  chosen_spanish: sitios
  alternatives_spanish:
  - asedios
  - bloqueos
  - sitios de guerra
  lexicon: LSJ
  rationale: La nota inglesa deja abierta la alternancia entre «sieges» y «blockades». En español, «sitios» es el término más amplio y sobrio, apto para conservar la ambigüedad del griego sin forzar una definición demasiado estrecha.
- source_word: συνεσταμένοι
  english_pob_choice: had established / had organized
  chosen_spanish: habían organizado
  alternatives_spanish:
  - habían establecido
  - habían dispuesto
  - estaban organizando
  lexicon: LSJ
  rationale: El participio perfecto sugiere algo preparado u organizado. «Habían organizado» refleja esa acción ya configurada, especialmente bien con «sitios».
- source_word: ἔτι ἐξ αἰῶνος
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde hacía mucho
  - desde tiempos antiguos
  - de antiguo
  lexicon: LSJ
  rationale: La expresión señala antigüedad y continuidad. «Desde antiguo» es conciso, elegante y suficientemente fiel al tono elevado del griego.
- source_word: ἠρημώθη
  english_pob_choice: was laid waste
  chosen_spanish: fue asolada
  alternatives_spanish:
  - fue devastada
  - quedó desolada
  - fue arrasada
  lexicon: LSJ
  rationale: El pasivo final describe la ruina de la ciudad. «Fue asolada» transmite bien la devastación con un registro bíblico claro en español contemporáneo.
theological_decisions:
- issue: Naturaleza de la acusación contra la ciudad y los judíos
  english_pob_reading: Political rebellion and hostile activity
  chosen_spanish_reading: Rebelión política y actividad hostil
  alternative_spanish_readings:
  - Apostasía religiosa
  - Rebelión religiosa
  rationale: Aunque ἀποστάτις y ἀποστᾶται pueden sugerir apostasía en otros contextos, aquí la carta persa presenta cargos de sedición contra la autoridad imperial. Por eso la traducción conserva el sentido político con «rebelde/rebeldes» y evita un giro religioso que no está sustentado por el contexto.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión léxica y teológica del original; la primacía del idioma fuente sobre la tradición de traducción.'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail en dos puntos: usa «sitios» para πολιορκίας συνεσταμένοι, manteniendo la ambigüedad entre asedio y bloqueo, y conserva «esta ciudad» al final para reflejar la cercanía de αὕτη. También evita trasladar la acusación a un marco religioso, en línea con la decisión inglesa revisada.'
  spanish_consistency_notes:
  - Se mantiene «rebelde/rebeldes» para ἀποστάτις y ἀποστᾶται, evitando «apóstata» por el peso religioso no requerido aquí.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el nombre divino.
  - «sitios» preserva la ambigüedad del griego mejor que un equivalente más específico en español.
  - La coordinación de tiempos con «habían organizado» y «fue asolada» refleja adecuadamente la secuencia narrativa del pasaje.
