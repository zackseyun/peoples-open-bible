review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: súplica de liberación, petición de ayuda personal de Ester, su soledad, y la afirmación final de la omnisciencia divina. Sin embargo, hay dos ajustes menores de fidelidad/estilo: «con tu mano» reproduce menos claramente el valor instrumental de ἐν χειρί σου que «por tu mano», y «yo, que estoy sola» suena algo forzado frente a una construcción más natural en español como «pues estoy sola».'
  spanish_quality_summary: El texto es comprensible y digno, pero «yo, que estoy sola» introduce una aposición rígida y poco natural en la fluidez de la oración. También «excepto a ti» es correcto, aunque «fuera de ti» o «sino a ti» encajan mejor en registro bíblico-orante. Una leve pulida mejora naturalidad sin perder cercanía al griego.
  glossary_alignment: No hay conflicto relevante con la terminología del proyecto. Κύριε como «Señor» es adecuado aquí porque el texto fuente griego dice κύριε y no el Tetragrámaton. El resto del léxico principal está alineado.
  issues:
  - severity: medium
    issue: «con tu mano» debilita el matiz instrumental de ἐν χειρί σου
    rationale: La frase griega funciona como modismo de agencia/poder. En español bíblico y natural, «por tu mano» preserva mejor ese valor que «con tu mano», que puede sonar más físico o literal.
  - severity: medium
    issue: «yo, que estoy sola» suena torpe en español
    rationale: Aunque intenta explicitar τῇ μόνῃ, la construcción resulta pesada y poco idiomática. Una forma como «pues estoy sola» o «yo, que estoy sola» sin coma intrusiva podría funcionar, pero «pues estoy sola» integra mejor la base de la súplica.
  - severity: low
    issue: La nota al pie de «líbranos» ofrece una alternativa mal flexionada
    rationale: En las alternativas aparece «rescatarnos», pero al tratarse de un imperativo dirigido a Dios la forma correcta es «rescátanos».
  revised_spanish_text: Pero líbranos[a] por tu mano, y ayúdame, pues estoy sola y no tengo a nadie fuera de ti, Señor. Tú tienes conocimiento de todas las cosas,
