lexical_decisions:
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcanán
  alternatives_spanish:
  - Elcana
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a la ortografía española con acento final para reflejar la forma aguda, manteniendo la identificación del nombre en la genealogía.
- source_word: בְּנוֹ / בנו
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: La construcción posesiva en una genealogía se expresa de manera natural en español como 'su hijo'. 'Hijo de él' conserva más literalmente la relación, pero suena menos idiomático.
- source_word: צוֹפַי
  english_pob_choice: Zophai
  chosen_spanish: Zofai
  alternatives_spanish:
  - Zuphai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se sigue la vocalización reflejada por la forma hebrea consonántica y la elección inglesa 'Zophai'; en español se ajusta la grafía a una transliteración más natural. Se preserva la alternativa de tradición vocal distinta como nota.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Conjunción copulativa simple en una lista genealógica. 'Y' es la forma normal; 'e' sería solo un ajuste fonético ante palabra iniciada por /i/ o /hi/, que no aplica aquí.
- source_word: נַחַת
  english_pob_choice: Nahath
  chosen_spanish: Nahat
  alternatives_spanish:
  - Nahat
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible del nombre, sin añadir vocalización no atestiguada por la fuente.
translation_notes:
  revision_awareness: El contexto de auditoría inglesa no presenta cambios aplicados en la revisión más reciente; se conserva la estructura genealógica simple y la alternativa de transliteración para צוֹפַי mediante nota.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico repetido con 'su hijo' para cada eslabón, en paralelo al inglés auditado.
  - Los nombres propios se transliteran de manera uniforme y sin traducir.
  - La nota textual se limita a la variante documentada para צוֹפַי; no se añaden conjeturas adicionales.
