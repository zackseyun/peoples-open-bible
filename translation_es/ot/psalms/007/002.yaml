translation:
  language: es
  text: Yahvé, mi Dios[a], en ti me he refugiado; sálvame de todos los que me persiguen, y líbrame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me refugio en ti». El perfecto hebreo puede verterse con presente en un contexto de oración.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto sin ocultarlo tras un título. En español, «Yahvé» es la forma tradicional y transparente que corresponde al «Yahweh» del POB en inglés; «el SEÑOR» no refleja el valor del Tetragrama en este proyecto.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de 1cs significa claramente «mi Dios». Se prefiere «mi Dios» para mantener el paralelismo directo con el vocativo del hebreo y con la forma auditada en inglés.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contigo
  - en ti solo
  lexicon: HALOT
  rationale: La preposición ב con sufijo 2ms se rinde de manera directa como «en ti». «Contigo» suaviza la imagen espacial pero cambia ligeramente el matiz; «solo» no está expresado en el hebreo.
- source_word: חָסִיתִי
  english_pob_choice: I have taken refuge
  chosen_spanish: me he refugiado
  alternatives_spanish:
  - he tomado refugio
  - tomo refugio
  lexicon: HALOT
  rationale: El perfecto qal expresa una acción realizada con relevancia presente en oración. «Me he refugiado» suena natural en español y preserva mejor la fuerza reflexiva del verbo que una paráfrasis más literal.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - salva me
  - hazme salvo
  lexicon: HALOT
  rationale: El imperativo hifil de ישׁע se expresa de forma directa como «sálvame», que es idiomático y fiel en lenguaje de súplica. Se evita una fórmula más explicativa que diluiría la urgencia del ruego.
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todos los
  - de cada uno de
  lexicon: HALOT
  rationale: La combinación preposicional indica separación respecto de un conjunto total. En español, «de todos los que» transmite con naturalidad el alcance colectivo sin añadir material ajeno al texto.
- source_word: רֹדְפַי
  english_pob_choice: who pursue me
  chosen_spanish: los que me persiguen
  alternatives_spanish:
  - mis perseguidores
  - los que me acosan
  lexicon: HALOT
  rationale: El participio con sufijo expresa acción continua. Se opta por una cláusula verbal («los que me persiguen») para mantener el dinamismo del hebreo y no convertirlo en un mero sustantivo.
- source_word: וְהַצִּילֵנִי
  english_pob_choice: and deliver me
  chosen_spanish: y líbrame
  alternatives_spanish:
  - y rescátame
  - y sálvame
  lexicon: HALOT
  rationale: El hifil de נצל puede significar librar, rescatar o arrancar de peligro. «Líbrame» preserva la distinción con «sálvame» en la primera petición y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la decisión doctrinal del POB de no ocultarlo tras «SEÑOR», se usa «Yahvé» como equivalente español estable y reconocible para el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso de auditoría es alto. La versión española conserva esa lectura estable y traslada al español la misma tensión aspectual del perfecto hebreo en una nota alternativa, sin añadir ni suavizar contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se usa «mi Dios» en minúsculas por ser posesivo, no como nombre propio.
  - «Sálvame» y «líbrame» conservan la distinción verbal del par hebreo הוֹשִׁיעֵנִי / הַצִּילֵנִי.
  - La nota[a] se ancla en «me he refugiado» para señalar la alternativa aspectual sin duplicar en el texto principal.
