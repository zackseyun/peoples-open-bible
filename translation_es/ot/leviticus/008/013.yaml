  yaml_path: translation/ot/leviticus/008/013.yaml
  text: Then Moses brought Aaron’s sons near[a], and clothed them with tunics, and girded them with sashes, and bound caps on them[c][b], just as Yahweh had commanded Moses.
  footnotes:
  - marker: a
    text: Or 'presented Aaron’s sons.' The Hebrew verb can mean 'bring near' or 'present' in a ritual setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'girded them with a sash'—that is, each son with his priestly sash.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew divine name is YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
