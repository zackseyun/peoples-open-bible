revisions:
- from: Obraron conforme a sus inmundicias[a], tal como sus padres.
  to: Obraron conforme a sus inmundicias[a], tal como lo hicieron sus padres.
  rationale: Se añade «lo hicieron» para completar de manera natural y fiel la comparación introducida por καθὼς, preservando el sentido de «just as their fathers did». Se mantiene «obraron», «conforme a» y «sus inmundicias[a]» porque reflejan adecuadamente el griego y la racionalidad léxica del POB.
  reviewer_model: gpt-5.4
