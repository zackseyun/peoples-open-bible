translation:
  language: es
  text: Ella rescató a un hombre justo, cuando los impíos perecían, mientras él huía del fuego que descendía[a] sobre las Cinco Ciudades[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fuego descendente»; el griego describe fuego que baja sobre las ciudades sin decir explícitamente «desde el cielo».
    reason: lexical_alternative
  - marker: b
    text: Es decir, la confederación de cinco ciudades asociada con Sodoma; el versículo alude a la huida de Lot.
    reason: cross_reference
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Esta Sabiduría
  - Sabiduría
  lexicon: LSJ
  rationale: El demostrativo femenino se refiere a Sabiduría personificada en el contexto inmediato. «Ella» mantiene esa personificación en español sin forzar una repetición innecesaria de «Sabiduría».
- source_word: δίκαιον
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - el justo
  - un justo
  - un hombre recto
  lexicon: LSJ
  rationale: δίκαιον designa al rescatado como persona justa en sentido moral y religioso. «Un hombre justo» conserva ese sentido y suena natural en español; el artículo indefinido refleja que el griego no exige identificación nominal aquí.
- source_word: ἐξαπολλυμένων
  english_pob_choice: were perishing
  chosen_spanish: perecían
  alternatives_spanish:
  - estaban pereciendo
  - eran destruidos
  - estaban siendo destruidos
  lexicon: LSJ
  rationale: El participio presente medio/pasivo expresa un proceso en curso. «Perecían» conserva la idea de destrucción progresiva sin añadir una agencia que el griego no explicita.
- source_word: ἀσεβῶν
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los irreverentes
  - los impíos e irreverentes
  lexicon: LSJ
  rationale: ἀσεβής apunta a impiedad, falta de reverencia ante Dios. «Los impíos» mantiene ese matiz religioso con un término bíblico claro y natural en español.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  - delivró
  lexicon: LSJ
  rationale: El verbo describe liberación concreta del peligro. «Rescató» comunica bien la acción narrativa de sacar a alguien de una situación de destrucción inmediata.
- source_word: φυγόντα
  english_pob_choice: as he fled
  chosen_spanish: mientras él huía
  alternatives_spanish:
  - cuando huía
  - huyendo
  - después de huir
  lexicon: LSJ
  rationale: El aoristo participial se relaciona con la huida del hombre justo durante el rescate. «Mientras él huía» conserva la simultaneidad/relación temporal sin volver demasiado literal la sintaxis griega.
- source_word: πῦρ καταβάσιον
  english_pob_choice: the fire descending
  chosen_spanish: el fuego que descendía
  alternatives_spanish:
  - el fuego descendente
  - el fuego que bajaba
  - el fuego enviado desde arriba
  lexicon: LSJ
  rationale: καταβάσιον describe fuego que baja o desciende. «Que descendía» sigue de cerca la imagen del griego y evita introducir explícitamente «del cielo», que el texto no dice.
- source_word: Πενταπόλεως
  english_pob_choice: the Five Cities
  chosen_spanish: la Pentápolis
  alternatives_spanish:
  - las Cinco Ciudades
  - la región de las cinco ciudades
  - la Pentápolis de Sodom
  lexicon: LSJ
  rationale: El genitivo alude a la confederación de cinco ciudades asociada con Sodoma. «Pentápolis» conserva el nombre histórico-geográfico tradicional y permite mantener el eco literario del texto; la alusión se puede explicar en nota.
theological_decisions:
- issue: Sujeto femenino de αὕτη como Sabiduría personificada
  english_pob_reading: The subject is personified Wisdom continuing from the prior context.
  chosen_spanish_reading: El sujeto es Sabiduría personificada, continuando el contexto anterior.
  alternative_spanish_readings:
  - Esta
  - Esta Sabiduría
  rationale: La personificación forma parte de la estructura literaria del libro. Traducirlo con «Ella» preserva esa continuidad sin convertirlo en una afirmación doctrinal ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
- issue: Identificación implícita del hombre justo y de la Pentápolis
  english_pob_reading: The verse alludes to Lot fleeing the destruction of Sodom and its associated cities, but the main text leaves the allusion implicit.
  chosen_spanish_reading: La traducción mantiene implícita la alusión a Lot y a Sodoma, sin nombrarlos en el cuerpo principal.
  alternative_spanish_readings:
  - Nombrar a Lot y Sodoma en la traducción
  - Explicitar la referencia histórica en el texto principal
  rationale: El griego no nombra a Lot ni a Sodoma; por eso el texto principal no debe agregar detalles ausentes. La alusión puede explicarse en nota para lectores que la reconozcan.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La versión anterior en inglés no requirió cambios sustanciales. Se mantuvo la lectura de Sabiduría personificada, la alusión implícita a Lot y la imagen de fuego que desciende; la actualización al español solo ajusta la sintaxis para naturalidad y fidelidad al griego.
  spanish_consistency_notes:
  - Se preservó la personificación femenina con «Ella», coherente con el tratamiento de αὕτη en la tradición auditada.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino ni κύριος.
  - Se conservó «impíos» para ἀσεβῶν por su peso religioso, en lugar de un término meramente moral como «malvados».
  - «Pentápolis» mantiene la referencia geográfica histórica y puede explicarse sin sobrecargar el texto principal.
