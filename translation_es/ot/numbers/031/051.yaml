  to: Así, Moisés y Eleazar el sacerdote tomaron el oro de parte de ellos[a], cada objeto trabajado.
  rationale: Se ajusta la frase final para hacerla más idiomática y más fiel al singular distributivo de כֹּל כְּלִי מַעֲשֶׂה según la auditoría inglesa («every crafted article»). También se mejora la naturalidad de מֵאִתָּם con «de parte de ellos». La nota se conserva como alternativa léxica, pero con formulación española más natural.
