    issue: '"derribará" para יַחְמֹס'
    rationale: Aunque intenta reflejar fuerza verbal, en español normalmente implica tumbar algo entero o hacerlo caer de pie, no desprender fruto de una vid. 'Sacudirá' o 'despojará' preserva mejor la imagen agrícola de pérdida prematura.
  - severity: medium
    issue: '"echará su flor como un olivo" es poco natural'
    rationale: El hebreo describe el desprendimiento de la flor/blossom en la comparación con el olivo. En español, 'dejará caer su flor' o 'arrojará su flor' comunica mejor la imagen; 'echará su flor' puede sonar ambiguo.
