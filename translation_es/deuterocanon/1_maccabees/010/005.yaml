translation:
  language: es
  text: Porque recordará todos los males que cometimos contra él, y contra sus hermanos, y contra su nación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μνησθήσεται
  english_pob_choice: he will remember
  chosen_spanish: recordará
  alternatives_spanish:
  - se acordará de
  - recordará en su mente
  lexicon: BDAG / uso común español
  rationale: El futuro de μιμνῄσκομαι se expresa con naturalidad en español con «recordará». Mantiene el valor futuro y la idea de traer a la memoria sin añadir matiz interpretativo.
- source_word: πάντων τῶν κακῶν
  english_pob_choice: all the evils
  chosen_spanish: todos los males
  alternatives_spanish:
  - todos los males hechos
  - todas las maldades
  - todos los daños
  lexicon: BDAG
  rationale: «Males» conserva la correspondencia más directa con κακῶν y puede abarcar tanto males morales como daños sufridos. Evita suavizar el término a «daños» y evita moralizarlo en exceso con «maldades».
- source_word: συνετελέσαμεν
  english_pob_choice: we committed
  chosen_spanish: cometimos
  alternatives_spanish:
  - realizamos
  - llevamos a cabo
  - causamos
  lexicon: BDAG
  rationale: En contexto hostil, el verbo puede referirse a acciones dañinas perpetradas contra alguien. «Cometimos» es el equivalente español más natural para actos culpables y conserva la fuerza de responsabilidad.
- source_word: πρὸς αὐτόν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: La preposición con acusativo en este contexto tiene fuerza adversativa. «Contra él» expresa mejor la relación hostil que una traducción neutral como «hacia él».
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de sangre
  - sus parientes cercanos
  lexicon: BDAG
  rationale: La traducción literal «hermanos» es clara y fiel. No hay base suficiente para ampliar a un sentido más general de parientes.
- source_word: τὸ ἔθνος αὐτοῦ
  english_pob_choice: his nation
  chosen_spanish: su nación
  alternatives_spanish:
  - su pueblo
  - su gente
  lexicon: BDAG
  rationale: En el marco político de 1 Macabeos, ἔθνος conserva mejor el sentido colectivo y nacional. «Nación» es la opción española más precisa y menos ambigua que «pueblo».
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «wrongs» a «evils» para ajustar más de cerca κακῶν; por eso el español adopta «males», que sigue esa correspondencia léxica sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de las tres preposiciones con «contra» para reflejar la repetición del griego.
  - No se introduce terminología eclesial posterior; el lenguaje se conserva histórico y político conforme a 1 Macabeos.
  - «Males» se eligió para no diluir la carga negativa de κακά ni convertirla en un simple daño material.
