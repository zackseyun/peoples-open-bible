translation:
  language: es
  text: Entonces Yahvé hizo llover azufre[a] y fuego sobre Sodoma y Gomorra de Yahvé desde los cielos[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גָּפְרִית. «Azufre» expresa con precisión el término original; traducciones tradicionales inglesas suelen decir «brimstone».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de Yahvé». Se conserva la repetición del nombre divino del texto fuente, en lugar de simplificarla.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «desde los cielos». Se conserva el plural del original, no el singular habitual «desde el cielo».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto. «Yahvé» preserva la referencia explícita a YHWH sin sustituirla por una convención de máscara como «SEÑOR».
- source_word: הִמְטִיר
  english_pob_choice: rained
  chosen_spanish: hizo llover
  alternatives_spanish:
  - llovió
  - derramó
  lexicon: HALOT
  rationale: El hifil expresa causar que caiga lluvia; «hizo llover» comunica bien la acción causada por Yahvé y conserva la imagen de juicio que desciende desde arriba.
- source_word: גָּפְרִית
  english_pob_choice: sulfur
  chosen_spanish: azufre
  alternatives_spanish:
  - brimstone
  lexicon: HALOT
  rationale: «Azufre» es el equivalente moderno preciso y transparente para גָּפְרִית. «Brimstone» sería arcaizante y menos claro para el lector actual.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  lexicon: HALOT
  rationale: Equivalente directo y natural del sustantivo hebreo. Conserva el par «azufre y fuego» sin añadir matices no presentes en el texto.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: «Sobre» expresa adecuadamente el objetivo del juicio y su caída desde arriba, con un español más fluido que un calco rígido.
- source_word: סְדֹם וְעֲמֹרָה
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  lexicon: HALOT
  rationale: Se usan las formas castellanas tradicionales de los topónimos bíblicos, plenamente inteligibles en español.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte del Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea marca procedencia/origen y repite el nombre divino. «De parte de Yahvé» conserva esa relación de procedencia sin suavizar la repetición ni resolverla interpretativamente.
- source_word: מִן הַשָּׁמָיִם
  english_pob_choice: out of the heavens
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - de los cielos
  lexicon: HALOT
  rationale: «Desde los cielos» preserva el plural hebreo הַשָּׁמָיִם y la noción de origen espacial descendente. Evita reducir el plural a un singular automático en español.
theological_decisions:
- issue: 'Repetición del nombre divino: «Yahvé ... de parte de Yahvé»'
  english_pob_reading: Retain the repetition in the main text without harmonizing or paraphrasing it away.
  chosen_spanish_reading: 'Se conserva la repetición explícita: «Yahvé ... de parte de Yahvé».'
  alternative_spanish_readings:
  - Entonces Yahvé hizo llover azufre y fuego sobre Sodoma y Gomorra desde los cielos
  - Entonces Yahvé hizo llover azufre y fuego sobre Sodoma y Gomorra desde el cielo
  rationale: El hebreo repite el nombre divino y la traducción debe mantener esa tensión textual en lugar de resolverla. La formulación española deja visible la procedencia indicada por el texto sin reinterpretarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la línea de revisión del POB en inglés que preserva la repetición del nombre divino y la referencia plural a «los cielos», evitando armonizaciones que borren el rasgo textual distintivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para YHWH.
  - Se prefirió «azufre» por precisión léxica y claridad moderna.
  - Se mantuvo un español natural («hizo llover») sin perder la estructura causativa del hebreo.
  - La repetición de la fuente divina se conserva explícitamente para reflejar el hebreo.
  - «Cielos» se emplea en plural por fidelidad al hebreo הַשָּׁמָיִם.
