  text: יָשׁ֣וּבוּ לֹ֣א עָ֗ל הָיוּ֙ כְּ/קֶ֣שֶׁת רְמִיָּ֔ה יִפְּל֥וּ בַ/חֶ֛רֶב שָׂרֵי/הֶ֖ם מִ/זַּ֣עַם לְשׁוֹנָ֑/ם ז֥וֹ לַעְגָּ֖/ם בְּ/אֶ֥רֶץ מִצְרָֽיִם׀׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/007/016.yaml
  text: They turn[a], but not upward; they are like a deceitful bow. Their princes will fall by the sword because of the insolence of their tongue[b]. This will be their mockery in the land of Egypt.
  footnotes:
  - marker: a
    text: Or, 'but not to the Most High.' This reading understands 'upward' as an elliptical reference to God, influenced by the wording of the previous verse.
    reason: alternative_reading
  - marker: b
    text: '''A deceitful bow'' may also mean ''a slack,'' ''treacherous,'' or ''faulty'' bow—that is, a bow that cannot be trusted to shoot true.'
    reason: lexical_alternative
  ai_draft:
