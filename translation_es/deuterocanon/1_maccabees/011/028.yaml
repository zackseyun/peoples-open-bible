translation:
  language: es
  text: Y Jonatán pidió al rey que declarara a Judea, las tres toparquías[a] y Samaria exentas de tributo, y le prometió trescientos talentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Toparquías» conserva un término administrativo técnico del griego; no significa simplemente «regiones» o «distritos» en sentido genérico.
    reason: cultural_note
lexical_decisions:
- source_word: ἠξίωσεν
  english_pob_choice: asked
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - rogó
  - requirió
  lexicon: LSJ
  rationale: En este contexto, el verbo expresa una petición formal dirigida al rey. «Pidió» comunica bien el acto de solicitar sin volverlo más fuerte de lo que exige el griego.
- source_word: ποιῆσαι
  english_pob_choice: to make
  chosen_spanish: que hiciera
  alternatives_spanish:
  - que hiciese
  - que convirtiera en
  - que declarara
  lexicon: LSJ
  rationale: 'El infinitivo presenta el contenido de la solicitud: que el rey otorgara a esos territorios un cierto estatus. «Que hiciera» es natural en español y conserva la relación causal del griego.'
- source_word: ἀφορολόγητον
  english_pob_choice: tax-free
  chosen_spanish: libre de tributo
  alternatives_spanish:
  - exento de impuestos
  - libre de impuestos
  lexicon: LSJ
  rationale: El adjetivo remite a exención fiscal o de tributo. «Libre de tributo» mantiene la fuerza histórica del término y evita una formulación demasiado moderna o anacrónica.
- source_word: τὰς τρεῖς τοπαρχίας
  english_pob_choice: the three toparchies
  chosen_spanish: las tres toparquías
  alternatives_spanish:
  - las tres divisiones administrativas
  - las tres distritos
  lexicon: LSJ
  rationale: Se conserva el término técnico «toparquías» para no perder el carácter administrativo específico del griego. Traducirlo como «distritos» lo volvería más general y menos auditable.
- source_word: τὴν Σαμαρῖτιν
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - la región de Samaria
  - el territorio de Samaria
  lexicon: LSJ
  rationale: El griego nombra la región; «Samaria» es la forma geográfica estándar en español y resulta clara en el contexto.
- source_word: ἐπηγγείλατο
  english_pob_choice: he promised
  chosen_spanish: le prometió
  alternatives_spanish:
  - le ofreció
  - le aseguró
  - se comprometió a darle
  lexicon: LSJ
  rationale: El verbo indica una promesa u ofrecimiento formal. «Le prometió» reproduce de manera directa y idiomática el valor del griego.
- source_word: τάλαντα τριακόσια
  english_pob_choice: three hundred talents
  chosen_spanish: trescientos talentos
  alternatives_spanish:
  - 300 talentos
  lexicon: LSJ
  rationale: Se conserva «talentos» como unidad antigua de peso/valor monetario, sin convertirla a equivalentes modernos especulativos.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan plenamente; no se registran revisiones textuales o de sentido que requieran nota adicional.
