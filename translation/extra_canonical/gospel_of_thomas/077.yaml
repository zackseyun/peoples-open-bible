translation:
  text: Jesus said, "I am the light that is over them all. I am the All. It is from
    me that the All came forth, and to me that the All reached. Split a piece of wood;
    I am there. Lift up the stone, and you will find me there."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:58:10Z'
  footnotes:
  - marker: reached
    text: 'The Coptic text features a deliberate wordplay here: the verb ''reached''
      (ⲡⲱϩ, pōh) and the imperative ''split'' (ⲡⲱϩ, pōh) in the following sentence
      are identical in form.'
    reason: register_note
  - marker: Split a piece of wood
    text: In the Greek fragment P.Oxy. 1, the commands to lift the stone and split
      the wood appear in reverse order and are appended to the end of Saying 30.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲧⲏⲣϥ
  chosen: the All
  rationale: Translates the substantive absolute (Greek τὸ πᾶν), referring to the
    totality of existence.
  lexicon: Crum 424a
  alternatives:
  - everything
  - the entirety
- source_word: ⲡⲱϩ
  chosen: reached
  rationale: First instance of ⲡⲱϩ, meaning 'to reach, arrive at'.
  lexicon: Crum 282a
  alternatives:
  - extended
  - attained
- source_word: ⲡⲱϩ
  chosen: Split
  rationale: Second instance of ⲡⲱϩ, meaning 'to break, split, cleave'. This creates
    a deliberate homonymic wordplay in the Coptic.
  lexicon: Crum 284b
  alternatives:
  - Cleave
  - Break
- source_word: ϣⲉ
  chosen: wood
  rationale: Standard term for wood or a piece of wood/log.
  lexicon: Crum 550b
  alternatives:
  - log
- source_word: ϥⲓ
  chosen: Lift up
  rationale: Combined with the directional adverb ⲉϩⲣⲁⲓ ('up').
  lexicon: Crum 620b
  alternatives:
  - Raise
  - Take up
theological_decisions:
- issue: Capitalization of 'the All'
  chosen_reading: the All
  rationale: Capitalized to reflect its use as a substantive absolute (ⲡⲧⲏⲣϥ), expressing
    a panentheistic Christology where the 'living Jesus' is identified with the totality
    of existence.
  alternatives_noted:
  - everything
  - the all
drafter_notes: This saying is one of the most famous in Thomas, presenting a panentheistic
  vision of Jesus as the light and the All. The Coptic text uses a Second Perfect
  construction (ⲛ̄ⲧⲁⲡⲧⲏⲣϥ...) to emphasize the source and destination ('from me' and
  'to me'). The translation preserves this cleft-like emphasis. The Coptic also introduces
  a brilliant wordplay not present in the Greek, using the homonym ⲡⲱϩ for both 'reached'
  and 'split'.
