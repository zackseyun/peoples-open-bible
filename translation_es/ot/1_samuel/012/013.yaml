revisions:
- from: Y ahora[a], he aquí el rey que ustedes han elegido, por quien han pedido; y he aquí que Yahvé ha puesto un rey sobre ustedes.
  to: Y ahora[a], he aquí el rey que ustedes han elegido, a quien han pedido; y he aquí que Yahvé ha puesto un rey sobre ustedes.
  rationale: Se cambia «por quien han pedido» por «a quien han pedido» para expresar de manera fiel y natural que el pueblo solicitó un rey. Se conserva el registro formal con «he aquí» y «Yahvé». La nota se ajusta a un español natural que preserve la alternativa literal de נתן como «dar».
  reviewer_model: gpt-5.4
