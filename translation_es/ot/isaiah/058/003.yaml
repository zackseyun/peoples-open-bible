translation:
  language: es
  text: ¿Por qué hemos ayunado[a], y tú no has visto? ¿Por qué nos hemos humillado, y tú no lo sabes? He aquí[b], en el día de su ayuno ustedes encuentran su propio placer[c], y oprimen a todos sus trabajadores[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos hemos afligido» o «nos hemos negado a nosotros mismos». Literalmente, «hemos afligido nuestra alma»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Mira» o «Miren». La partícula hebrea introduce una reprensión enfática.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «encuentran placer», «buscan su propio deseo» o quizá «persiguen su propio negocio». El hebreo puede aludir al placer, al deseo o a los intereses propios.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «a todos sus obreros» o «exigen todas sus labores/tareas». El hebreo puede referirse ya sea a los trabajadores o al trabajo que se les exige.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַּמְנוּ
  english_pob_choice: have we fasted
  chosen_spanish: hemos ayunado
  alternatives_spanish:
  - hemos hecho ayuno
  - hemos ayunado
  lexicon: HALOT
  rationale: צום se refiere de manera directa a ayunar; en español, "hemos ayunado" es la forma más natural y fiel al acto ritual sin añadir interpretación.
- source_word: עִנִּינוּ נַפְשֵׁנוּ
  english_pob_choice: have we humbled ourselves
  chosen_spanish: nos hemos humillado
  alternatives_spanish:
  - nos hemos afligido
  - nos hemos negado a nosotros mismos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es "afligir el alma/vida", pero en este contexto de ayuno la POB inglesa opta por el sentido de autoabajamiento ritual. "Nos hemos humillado" conserva esa fuerza en español sin perder la conexión con el ayuno.
- source_word: רָאִיתָ
  english_pob_choice: have not seen
  chosen_spanish: no has visto
  alternatives_spanish:
  - no has mirado
  - no has observado
  lexicon: HALOT
  rationale: ראה mantiene el sentido concreto de ver; en la queja del pueblo, "no has visto" reproduce bien la acusación de falta de atención divina.
- source_word: תֵדָע
  english_pob_choice: do not know it
  chosen_spanish: no lo sabes
  alternatives_spanish:
  - no lo conoces
  - no lo reconoces
  lexicon: HALOT
  rationale: ידע aquí expresa conocimiento relacional/atencional. "No lo sabes" sigue de cerca la revisión inglesa y mantiene la idea de que Dios no toma en cuenta la situación.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula introduce una reprensión enfática. "Mira" funciona como equivalente español claro y solemne, aunque la nota reconoce que la revisión inglesa prefirió "Behold" por registro formal.
- source_word: בְּיוֹם צֹמְכֶם
  english_pob_choice: on the day of your fast
  chosen_spanish: en el día de su ayuno
  alternatives_spanish:
  - en el día de vuestro ayuno
  - el día de su ayuno
  lexicon: HALOT
  rationale: La construcción temporal se conserva de forma directa. Se eligió "su" en lugar de "vuestro" para un registro bíblico sobrio y amplio en Hispanoamérica.
- source_word: תִּמְצְאוּ חֵפֶץ
  english_pob_choice: you find your own pleasure
  chosen_spanish: encuentran su propio placer
  alternatives_spanish:
  - encuentran su propio deseo
  - buscan su propia voluntad
  - hallan su propio placer
  lexicon: HALOT
  rationale: מצא + חפץ se entiende en contexto como dedicarse a lo que agrada a uno mismo. "Encuentran su propio placer" sigue la revisión inglesa "find your own pleasure" y conserva la carga de autointerés; el cambio de persona refleja el ajuste del español para mantener coherencia con el sujeto explícito de la línea anterior en un estilo de reprensión generalizada.
- source_word: עַצְּבֵיכֶם
  english_pob_choice: your laborers
  chosen_spanish: sus trabajadores
  alternatives_spanish:
  - sus obreros
  - sus jornaleros
  - su trabajo
  lexicon: HALOT
  rationale: Aunque el sustantivo puede sugerir "trabajos" o "labores", la POB inglesa lo entiende como personas sometidas al trabajo. "Trabajadores" conserva esa lectura social y evita diluir el sujeto humano de la denuncia.
- source_word: תִּנְגֹּשׂוּ
  english_pob_choice: oppress
  chosen_spanish: oprimen
  alternatives_spanish:
  - exigen con dureza
  - apremian
  - maltratan
  lexicon: HALOT
  rationale: נגשׂ puede significar presionar, exigir o oprimir. En este contexto de abuso económico y religioso, "oprimen" transmite la fuerza de la denuncia y coincide con la revisión inglesa más directa.
theological_decisions:
- issue: Naturaleza de la acusación social en la segunda mitad del versículo
  english_pob_reading: The verse condemns fasting accompanied by self-serving conduct and exploitation of workers/laborers.
  chosen_spanish_reading: El versículo condena un ayuno acompañado de autointerés y de opresión de los trabajadores.
  alternative_spanish_readings:
  - El versículo condena un ayuno acompañado de buscar lo propio y de exigir tareas o trabajos.
  - El versículo condena un ayuno acompañado de conducta egoísta sin referencia necesariamente a explotación laboral.
  rationale: La combinación de חפץ y נגשׂ en el contexto apunta a una crítica ética y social, no solo a una práctica privada de devoción. La traducción española mantiene esa tensión social sin ampliar indebidamente el alcance.
  doctrine_reference: Isaías 58:3; Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado del audit trail inglés: mantiene la oposición entre el ayuno reclamado por el pueblo y la respuesta divina que denuncia una práctica religiosa unida al autointerés y a la opresión. Se adoptó un español más natural que el calco, pero sin suavizar la acusación social ni borrar las alternativas léxicas documentadas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma POB por defecto cuando aparezca el nombre divino en el contexto, aunque este versículo no lo contiene.
  - Se mantuvo un registro bíblico moderno y digno, con equivalentes directos para el paralelismo hebreo.
  - Se preservó la distinción entre ayuno, humillación y opresión para no fusionar sentidos distintos del hebreo.
