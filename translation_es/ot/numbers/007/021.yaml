translation:
  language: es
  text: un novillo del ganado[a], un carnero, un cordero macho de un año[b], para un holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un novillo, hijo del ganado». El modismo hebreo se refiere a un bovino del hato.
    reason: lexical_alternative
  - marker: b
    text: O «un cordero macho en su primer año».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: novillo
  alternatives_spanish:
  - toro
  - buey
  lexicon: HALOT
  rationale: פַּר designa un bovino joven apto para sacrificio. En español, «novillo» comunica mejor ese valor que «toro» (más adulto o genérico) y evita «buey», que sugiere animal castrado.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la res
  - del rebaño
  lexicon: HALOT
  rationale: El hebreo es un modismo literal, «hijo de ganado», que en contexto sacrificial significa un bovino perteneciente al ganado. «Del ganado» mantiene la idea idiomática sin sonar forzado en español.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ovejo
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para un macho adulto de oveja en un listado sacrificial.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El término hebreo se refiere a un cordero; se explicita «macho» para reflejar la forma masculina marcada en la lista ritual, como hace la tradición auditada en inglés.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - del primer año
  lexicon: HALOT
  rationale: La expresión hebrea indica edad, y «de un año» es la forma natural y fiel en español para este requisito sacrificial.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para un holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término consagrado para עֹלָה y comunica la ofrenda totalmente consumida por fuego. Se conserva el valor cultual del término sin sustituirlo por una glosa más general.
theological_decisions:
- issue: Término cultual עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - para un holocausto
  - como holocausto
  rationale: No hay tensión doctrinal adicional, pero sí una decisión terminológica. Se preserva el nombre técnico de la ofrenda para mantener la conexión con el sistema sacrificial del texto hebreo.
  doctrine_reference: Levítico 1; sistema de ofrendas en la Torá
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el dictamen auditado en inglés, conservando la enumeración sacrificial y la especificación de edad; no se introdujeron revisiones textuales ni cambios de sentido respecto al acuerdo de alta concordancia.
  spanish_consistency_notes:
  - Se prefirió «holocausto» para עֹלָה por precisión cultual y consistencia bíblica.
  - Se explicitó «cordero macho» para reflejar el valor masculino del hebreo y mantener paralelismo con la lista de animales.
  - «Del ganado» traduce el modismo בֶּן בָּקָר de forma idiomática, sin perder la referencia al bovino de la oferta.
