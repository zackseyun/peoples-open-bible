translation:
  language: es
  text: Salum hijo de Jabés llegó a ser rey en el año treinta y nueve de Uzías, rey de Judá, y reinó un mes de días[a] en Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un mes de días», es decir, cerca de un mes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Sallum
  lexicon: WLC/HALOT
  rationale: Se conserva el nombre propio hebreo con una forma española breve y reconocible. 'Salum' evita una transliteración excesivamente técnica y mantiene la relación con el original.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: El valor de acceso al trono se expresa mejor en español como ingreso efectivo a la realeza; 'llegó a ser rey' comunica la transición que el inglés POB marcó con 'became king'.
- source_word: בִּשְׁנַת שְׁלֹשִׁים וָתֵשַׁע שָׁנָה
  english_pob_choice: in the thirty-ninth year
  chosen_spanish: en el año treinta y nueve
  alternatives_spanish:
  - en el año trigésimo noveno
  lexicon: HALOT
  rationale: Se mantiene la fórmula de sincronismo regnal en español natural. 'Treinta y nueve' es claro y fiel al hebreo; la forma ordinal es posible, pero menos directa.
- source_word: לְעֻזִיָּה מֶלֶךְ יְהוּדָה
  english_pob_choice: of Uzziah king of Judah
  chosen_spanish: de Uzías, rey de Judá
  alternatives_spanish:
  - bajo Uzías, rey de Judá
  - perteneciente al reinado de Uzías, rey de Judá
  lexicon: HALOT
  rationale: El ל de sincronismo se rinde de modo natural con 'de'. Se conserva la apposición 'rey de Judá' para reflejar el hebreo sin sobreinterpretar la relación.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: and he reigned
  chosen_spanish: y reinó
  alternatives_spanish:
  - y gobernó
  - y estuvo reinando
  lexicon: HALOT
  rationale: El wayyiqtol continúa la narración del reinado ya inaugurado. 'Reinó' es el equivalente español más directo y sobrio.
- source_word: יֶרַח יָמִים
  english_pob_choice: for a month of days
  chosen_spanish: un mes de días
  alternatives_spanish:
  - aproximadamente un mes
  - por un mes
  lexicon: HALOT
  rationale: Se preserva la textura idiomática del hebreo, como hace el inglés POB. La expresión es literalmente 'un mes de días' y sugiere un período muy breve, cerca de un mes.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la capital Samaria
  lexicon: HALOT
  rationale: La preposición locativa se traduce de manera simple y natural. 'Samaria' se mantiene como topónimo conocido sin expansión interpretativa.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés al colocar la locución locativa con 'en Samaria' al final de la cláusula de reinado, y conserva la expresión idiomática 'un mes de días' para reflejar la textura del hebreo sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usó 'rey de Judá' de manera consistente con la fórmula de sincronismo regnal.
  - Se evitó 'SEÑOR' o equivalente porque el versículo no contiene el nombre divino.
  - '''Un mes de días'' se mantiene como calco controlado por coherencia con el audit trail inglés y se explica en nota.'
  - El nombre propio 'Uzías' se conservó con la forma española estándar y el nombre 'Jabés' con acento prosódico español habitual.
