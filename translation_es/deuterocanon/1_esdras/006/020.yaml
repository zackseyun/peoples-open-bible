translation:
  language: es
  text: Ahora, pues, que se determine, oh rey; que se haga una búsqueda en los archivos reales de mi señor el rey en Babilonia,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Ahora entonces
  - Pues ahora
  lexicon: LSJ
  rationale: La pareja introduce transición e inferencia. «Ahora, pues» conserva ambos matices con naturalidad en español formal.
- source_word: κρίνεται
  english_pob_choice: let it be determined
  chosen_spanish: que se determine
  alternatives_spanish:
  - que se decida
  - que se haga juicio
  lexicon: LSJ
  rationale: La forma impersonal/pasiva expresa una decisión oficial o resolución administrativa. «Que se determine» evita un tono excesivamente judicial y encaja con el contexto de corte.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: LSJ
  rationale: Es un vocativo directo. «Oh rey» preserva el tono solemne y suplicante del ruego.
- source_word: ἐπισκεπτήτω
  english_pob_choice: let a search be made
  chosen_spanish: que se haga una búsqueda
  alternatives_spanish:
  - que examine
  - que se haga una inspección
  - que se haga una indagación
  lexicon: LSJ
  rationale: En este contexto, el verbo apunta a una revisión oficial de registros. «Que se haga una búsqueda» comunica la acción requerida en español sin perder el sentido administrativo.
- source_word: βασιλικοῖς βιβλιοφυλακίοις
  english_pob_choice: the royal archives
  chosen_spanish: los archivos reales
  alternatives_spanish:
  - las bibliotecas reales
  - los depósitos reales de libros
  - las oficinas de registro reales
  lexicon: LSJ
  rationale: El término designa lugares donde se guardan libros o documentos. «Archivos» refleja mejor su función en este marco persa-administrativo que «bibliotecas».
- source_word: τοῦ κυρίου βασιλέως
  english_pob_choice: of my lord the king
  chosen_spanish: del rey, mi señor
  alternatives_spanish:
  - del señor rey
  - de mi señor el rey
  lexicon: LSJ
  rationale: Aquí κύριος forma un honorífico cortesano, no una referencia divina. En español, «mi señor» conserva la deferencia y evita una lectura teológica indebida.
- source_word: τοῖς ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - allí en Babilonia
  - que están en Babilonia
  lexicon: LSJ
  rationale: La frase fija la localización de los archivos. «En Babilonia» es la forma más directa y natural; el deíctico inglés «there» no requiere reproducirse explícitamente.
theological_decisions:
- issue: Valor de κύριος en la fórmula cortesana τοῦ κυρίου βασιλέως
  english_pob_reading: my lord the king
  chosen_spanish_reading: mi señor el rey
  alternative_spanish_readings:
  - el señor rey
  - mi señor rey
  rationale: Se mantiene el sentido honorífico secular del griego. No se capitaliza ni se vierte como «Señor» porque no se trata de un título divino.
  doctrine_reference: 'DOCTRINE.md: contested terms for κύριος; render according to context and avoid false theological overtones'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al omitir un equivalente explícito de 'there'; en español bastó con 'en Babilonia'. La puntuación se ajustó a uso español formal con coma vocativa y punto y coma para separar las dos peticiones.
  spanish_consistency_notes:
  - Se usó «archivos» para βιβλιοφυλακίοις, coherente con la función administrativa del pasaje.
  - Se evitó «SEÑOR» para κύριος dentro del honorífico cortesano, manteniendo la distinción entre trato humano y título divino.
  - Se conservó una sintaxis impersonal respetuosa («que se determine... que se haga...») acorde con el tono de petición oficial.
