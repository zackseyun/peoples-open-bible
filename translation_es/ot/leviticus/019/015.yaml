review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido judicial del hebreo: prohibición de injusticia en el juicio, rechazo del favoritismo hacia el pobre y de la deferencia hacia el grande, y mandato de juzgar al prójimo con justicia/rectitud. Sin embargo, hay dos desajustes menores: el singular ''No harás'' rompe la correspondencia con el plural inicial hebreo תַעֲשׂוּ, y la nota [a] está anclada al lugar equivocado, pues la alternativa ''con justicia juzgarás a tu prójimo'' corresponde a בְּצֶדֶק... תִּשְׁפֹּט, no a ''en el juicio''.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Favorecerás al pobre' y 'cederás ante el grande' funcionan bien en contexto forense. Aun así, 'No harán' debe ajustarse a voseo/plural bíblico estándar como 'No cometerán' o 'No harán' según el resto del proyecto; además conviene reubicar la nota [a] al sintagma final para evitar confusión. 'Con justicia' es aceptable y natural como resolución española documentada para צֶדֶק.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave están bien alineadas: עָוֶל -> ''injusticia'', מִשְׁפָּט -> ''juicio'', דָל -> ''pobre'', גָדוֹל -> ''grande'', עֲמִיתֶךָ -> ''prójimo''. La opción ''con justicia'' para בְּצֶדֶק se aparta del inglés principal ''with righteousness'' pero está documentada en la justificación teológica y preservada por la nota alternativa. Los modismos sobre ''rostro'' están bien explicados en la nota cultural.'
  issues:
  - severity: medium
    issue: Cambio indebido de número verbal en la primera cláusula
    rationale: 'El hebreo comienza con תַעֲשׂוּ, segunda persona plural: ''No harán/cometerán''. El borrador usa ''No harás'' en singular, mientras el resto del versículo está en singular. Conviene reflejar el plural inicial para mayor fidelidad al texto fuente.'
  - severity: medium
    issue: La nota [a] está colocada en la frase equivocada
    rationale: 'La nota dice ''O: con justicia juzgarás a tu prójimo'', que es alternativa a la cláusula final basada en בְּצֶדֶק תִּשְׁפֹּט, no a ''en el juicio''. Debe anclarse junto a ''con rectitud/con justicia juzgarás...'' o reformularse.'
  - severity: low
    issue: Mejorar la equivalencia principal de בְּצֶדֶק
    rationale: Dado que el inglés POB preserva la tensión moral-judicial con 'with righteousness', en español 'con rectitud' puede reflejar mejor esa amplitud que 'con justicia', dejando 'con justicia' como alternativa en nota. No es error grave, pero sí una mejora de alineación conceptual.
  revised_spanish_text: No cometerán injusticia en el juicio. No favorecerás al pobre, ni cederás ante el grande[b]; con rectitud[a] juzgarás a tu prójimo.
