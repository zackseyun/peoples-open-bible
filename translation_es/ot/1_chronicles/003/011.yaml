lexical_decisions:
- source_word: יוֹרָם
  english_pob_choice: Joram
  chosen_spanish: Joram
  alternatives_spanish:
  - Jehoram
  lexicon: HALOT
  rationale: Es un nombre propio; en español bíblico estándar, «Joram» es la forma usual para יוֹרָם. Se conserva la convención onomástica sin forzar una forma litúrgica distinta.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: El sustantivo בן con sufijo posesivo indica de manera directa «hijo». Aunque en genealogías puede referir a un descendiente posterior, aquí la lista sucesoria breve permite mantener el sentido más inmediato en español.
- source_word: אֲחַזְיָהוּ
  english_pob_choice: Ahaziah
  chosen_spanish: Ocozías
  alternatives_spanish:
  - Ahazías
  lexicon: HALOT
  rationale: En español bíblico, la forma tradicional y más reconocible para este nombre es «Ocozías». Se evita una transliteración más mecánica para conservar inteligibilidad y uso eclesial amplio.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  lexicon: HALOT
  rationale: La forma española establecida del nombre es «Joás». Se mantiene la equivalencia nominal estándar, aunque existe la variante ampliada «Jehoás».
