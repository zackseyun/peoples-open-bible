translation:
  language: es
  text: Persia, Lud[a] y Fut estuvieron en tu ejército como tus hombres de guerra. Colgaron escudo y casco dentro de ti[b]; te dieron esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lidia» o «Ludim». Se mantiene «Lud» porque el hebreo presenta el etnónimo en forma breve y la POB inglesa lo preserva sin interpretarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «colgaron escudo y casco sobre ti», con la imagen de equipo militar exhibido en las murallas de Tiro o dentro de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַס
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - Paras
  lexicon: HALOT
  rationale: Es un nombre propio de nación; en español bíblico la forma histórica y reconocible es «Persia». Mantiene la referencia geográfica sin transliteración innecesaria.
- source_word: לוּד
  english_pob_choice: Lud
  chosen_spanish: Lud
  alternatives_spanish:
  - Lidia
  - Ludim
  lexicon: HALOT
  rationale: Se preserva el etnónimo hebreo de forma directa. «Lidia» sería más interpretativo y no está exigido por el hebreo aquí.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Fut
  alternatives_spanish:
  - Put
  - Phut
  lexicon: HALOT
  rationale: Se translitera el nombre según el valor fonético esperado en español bíblico, con «Fut» como forma natural para el hebreo פּוּט. Se evita «Put» por ambigüedad gráfica en español.
- source_word: בְחֵילֵךְ
  english_pob_choice: in your army
  chosen_spanish: en tu ejército
  alternatives_spanish:
  - en tu fuerza
  - entre tu riqueza
  lexicon: HALOT
  rationale: En este contexto militar, חֵיל denota fuerza/host militar; el paralelo con «hombres de tu guerra» confirma el sentido bélico. «Ejército» comunica bien esa fuerza armada en español.
- source_word: אַנְשֵׁי מִלְחַמְתֵּךְ
  english_pob_choice: your men of war
  chosen_spanish: hombres de tu guerra
  alternatives_spanish:
  - tus guerreros
  - los hombres de tu combate
  lexicon: HALOT
  rationale: Se conserva de cerca la estructura hebrea «hombres de tu guerra», manteniendo el registro marcial y la referencia literal al constructo.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: HALOT
  rationale: Es el equivalente normal en español para la pieza defensiva nombrada en el hebreo.
- source_word: כוֹבַע
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  lexicon: HALOT
  rationale: «Casco» es claro y contemporáneo en español; «yelmo» es más arcaico y menos directo para una edición de lectura amplia.
- source_word: תִּלּוּ בָךְ
  english_pob_choice: they hung in you
  chosen_spanish: colgaron ... dentro de ti
  alternatives_spanish:
  - colgaron ... en ti
  - los colgaron en ti
  - los exhibieron dentro de ti
  lexicon: HALOT
  rationale: El hebreo usa la imagen de colgar armas «en/dentro de ti»; en español, «dentro de ti» conserva la idea de que las armas estaban expuestas dentro de la ciudad, evitando una traducción demasiado literal y extraña.
- source_word: הֵמָּה נָתְנוּ הֲדָרֵךְ
  english_pob_choice: they gave you splendor
  chosen_spanish: ellos te dieron esplendor
  alternatives_spanish:
  - te dieron majestad
  - te contribuyeron esplendor
  lexicon: HALOT
  rationale: Se conserva el dativo en español («te dieron»), conforme a la corrección de la revisión inglesa. «Esplendor» refleja היטב הֲדָר como brillo/majestad/adorno en este contexto.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético y toma en cuenta la revisión inglesa que restableció el objeto indirecto en la última cláusula: «te dieron esplendor». También conserva la alternativa gráfica/imagen de las armas colgadas en un espacio urbano, sin neutralizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene el tono profético y descriptivo sin expandir el sentido más allá de las imágenes militares del hebreo.
  - «Fut» se emplea como transliteración española coherente del etnónimo פּוּט para evitar la forma inglesa «Put» con posible lectura inapropiada en español.
