translation:
  language: es
  text: Y Shaul murió[a], y Baal-hanán hijo de Akbor reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Las versiones tradicionales en español suelen escribir este nombre «Saúl». Este borrador usa una transliteración más directa del hebreo: «Shaul».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - falleció
  lexicon: HALOT
  rationale: El hebreo usa la forma narrativa estándar de מוּת/מות para indicar muerte en secuencia histórica. En español, «murió» transmite con naturalidad y sin eufemismo el valor básico del verbo, manteniendo la parataxis del hebreo.
- source_word: שָׁאוּל
  english_pob_choice: Shaul
  chosen_spanish: Shaúl
  alternatives_spanish:
  - Saúl
  lexicon: HALOT
  rationale: Se conserva una transliteración directa del hebreo, como en el proyecto en inglés, en lugar de la forma tradicional española «Saúl». El acento gráfico ayuda a la pronunciación en español y mantiene la base hebrea del nombre.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En la fórmula de sucesión real, מלך puede traducirse de manera breve por «reinó». En español conserva el valor de ejercicio del reinado y encaja con el estilo genealógico del pasaje.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su lugar
  - en vez de él
  - en su stead
  lexicon: HALOT
  rationale: La preposición תחת con sufijo expresa sustitución o sucesión. «En su lugar» es la opción más natural y transparente en español, equivalente funcional de la lectura auditada en inglés.
- source_word: בַּעַל חָנָן
  english_pob_choice: Baal-hanan
  chosen_spanish: Baal-hanán
  alternatives_spanish:
  - Baalhanán
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre compuesto, preservando el elemento léxico «Baal» y el segundo componente. El guion refleja la segmentación visible del compuesto en la tradición de transliteración del proyecto.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - descendiente de
  lexicon: HALOT
  rationale: En contexto genealógico, בן indica relación filial directa. «Hijo de» es la equivalencia natural en español y mantiene la estructura genealógica del texto.
- source_word: עַכְבּוֹר
  english_pob_choice: Akbor
  chosen_spanish: Akbor
  alternatives_spanish:
  - Achbor
  lexicon: HALOT
  rationale: Se conserva una transliteración directa del nombre hebreo, coherente con el criterio del proyecto de reflejar la forma fuente más directamente que la ortografía tradicional inglesa o española.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el hebreo masorético y con el trazado auditado en inglés. No se documentan revisiones textuales ni cambios de sentido, por lo que la redacción española sigue de cerca la secuencia narrativa breve del original.
  spanish_consistency_notes:
  - Se mantienen transliteraciones directas para los nombres propios, en línea con la filosofía POB de no sustituir automáticamente por formas tradicionales.
  - 'La sintaxis conserva la coordinación narrativa simple del hebreo: muerte del primer rey, sucesión y filiación del nuevo regente.'
  - Se evita el término «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
