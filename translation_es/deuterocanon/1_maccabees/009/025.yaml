  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Impíos» refleja bien ἀσεβεῖς; «gobernantes» es una buena elección contextual para κυρίους, con nota que conserva la alternativa más literal «señores». La principal desviación es onomástica: «Bacjides» no se ajusta al uso español recomendado por claridad y legibilidad.'
