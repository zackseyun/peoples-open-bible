review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo principal: בְּטוֹבָתְךָ = «en tu prosperidad», הוּא כָמוֹךָ = «es/será como tú», וּבְרָעָתְךָ = «pero en tu adversidad», יִתְנַדֶּה מִמֶּךָּ = «se separará de ti». También preserva correctamente en nota la variante griega sustancial. Sin embargo, en español conviene ajustar «él será como tú» a «él es como tú» para reflejar mejor la predicación hebrea sin introducir un futuro innecesario; el futuro ya queda bien en la segunda colon.'
  spanish_quality_summary: El texto es claro y digno, pero «él será como tú» suena algo menos natural y menos preciso que «él es como tú» en este paralelismo sapiencial. La nota es comprensible, aunque «servidores» atenúa la fuerza de οἰκέτας; dado el criterio del proyecto para δοῦλος, «esclavos» es preferible en la nota de variante. También «testimonio primario conservado» fluye mejor que «testimonio primario conservado de Sirácides» con la redacción actual.
  glossary_alignment: No hay términos teológicos mayores en juego. La variante griega contiene οἰκέτας, y conforme a la política del proyecto es preferible «esclavos» antes que «servidores» salvo razón contextual, que aquí no se documenta. El resto del vocabulario («prosperidad», «adversidad») alinea bien con la auditoría inglesa y con el contraste hebreo.
  issues:
  - severity: medium
    issue: «él será como tú» introduce un futuro no necesario en la primera cola
    rationale: El hebreo הוּא כָמוֹךָ es una afirmación comparativa simple. Aunque el griego tenga ἔσται, la traducción principal sigue el hebreo extante; en español, «él es como tú» refleja mejor el valor más llano del hebreo y suena más natural en un dicho sapiencial.
  - severity: low
    issue: La nota usa «servidores» para οἰκέτας
    rationale: Según la política terminológica del proyecto, cuando se refleja lenguaje de servidumbre dependiente y no hay razón contextual para suavizarlo, conviene «esclavos». En una nota de variante textual, mantener esa fuerza léxica ayuda a la transparencia.
  revised_spanish_text: En tu prosperidad, él es como tú[a], pero en tu adversidad se separará de ti.
  revised_footnotes:
  - marker: a
    text: 'El griego dice: «y hacia tus esclavos hablará con franqueza». El testimonio hebreo, en cambio, lee: «se separará de ti». El texto principal sigue el hebreo como testimonio primario conservado, y se mantiene la alternativa griega porque la divergencia es sustancial.'
    reason: alternative_reading
  revision_rationale: Se ajusta la primera cola a «él es como tú» para reflejar con mayor fidelidad y naturalidad el hebreo principal, y se fortalece la transparencia léxica de la variante griega con «esclavos».
