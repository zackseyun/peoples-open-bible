revisions:
- from: Bienaventurado el hombre que es hallado sin mancha[a], y que no se ha descarriado tras las riquezas[b].
  to: Bienaventurado[b] el hombre que es hallado intachable, y que no se ha descarriado tras las riquezas[a].
  rationale: Se corrigen los anclajes y motivos de las notas para que coincidan con el expediente inglés y con el lugar pertinente en el texto. Además, se ajusta תמים de «sin mancha» a «intachable» para expresar mejor la integridad moral sapiencial sin introducir matiz ritual. El resto del verso se mantiene porque es fiel al hebreo difícil y readable en español.
