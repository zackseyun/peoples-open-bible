  text: אִם עֹלָ֤ה קָרְבָּנ/וֹ֙ מִן הַ/בָּקָ֔ר זָכָ֥ר תָּמִ֖ים יַקְרִיבֶ֑/נּוּ אֶל פֶּ֝תַח אֹ֤הֶל מוֹעֵד֙ יַקְרִ֣יב אֹת֔/וֹ לִ/רְצֹנ֖/וֹ לִ/פְנֵ֥י יְהוָֽה־־־׃
