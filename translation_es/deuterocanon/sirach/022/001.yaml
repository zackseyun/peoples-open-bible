review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la comparación proverbial: ὀκνηρός como «el perezoso», λίθος como «piedra», y ἐκσυριεῖ como reacción pública de burla. Sin embargo, «todos» no refleja tan bien como «todos los que lo vean» ni «todo el mundo» el valor genérico de πᾶς en español, y «por su deshonra» suena menos natural que una construcción de objeto de burla. Además, las notas están invertidas respecto al audit trail inglés: la nota sobre la piedra debe anclarse al adjetivo de la piedra y la nota sobre «silbarán» al verbo de burla.'
  spanish_quality_summary: El texto es claro y digno, pero «y todos silbarán por su deshonra» resulta algo rígido y poco idiomático; en español natural la burla se expresa mejor con «le silbará al ver su deshonra» o «silbará ante su deshonra». «Inmunda» es posible, pero en este contexto sapiencial «sucia» o «manchada» suena más transparente; aun así, puede mantenerse con nota. También conviene corregir la asignación y redacción de las notas para que cada marcador corresponda al lugar adecuado en el texto.
  glossary_alignment: No hay términos de glosario mayor implicados. La decisión «el perezoso» respeta el masculino sustantivado griego. «Piedra» y «deshonra»/«vergüenza pública» son coherentes con el expediente léxico. El principal ajuste es de fidelidad estilística y anclaje correcto de notas, no de terminología doctrinal.
  issues:
  - severity: medium
    issue: Marcadores de notas desalineados con el contenido
    rationale: En el texto «piedra inmunda[a][b]», la nota a en el expediente inglés corresponde al participio raro de la piedra, mientras que la nota b corresponde al verbo «silbar/hisear». En español, la nota sobre el verbo no debe anclarse a «piedra inmunda» sino a «silbarán».
  - severity: medium
    issue: Construcción «silbarán por su deshonra» poco natural
    rationale: Aunque comunica la idea general, en español suena menos idiomática y menos precisa para ἐπὶ τῇ ἀτιμίᾳ αὐτοῦ, que describe burla pública ante su deshonra. Una formulación como «le silbará ante su deshonra» conserva mejor la escena.
  - severity: low
    issue: «todos» puede mejorarse para el valor genérico de πᾶς
    rationale: «Todos» es entendible, pero en un proverbio impersonal «todo el mundo» o una formulación singular genérica con «todo el que lo vea» suena más natural en español.
  revised_spanish_text: Al perezoso se le compara con una piedra inmunda[a], y todo el mundo le silbará[b] ante su deshonra.
