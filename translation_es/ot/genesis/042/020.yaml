translation:
  language: es
  text: Entonces tráiganme a su hermano menor[a], para que sus palabras sean verificadas y no morirán.” Y así lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «para que sus palabras sean confirmadas» o «creídas». El verbo hebreo puede expresar que algo quede establecido como verdadero o aceptado como fiable; aquí el contexto favorece la idea de verificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיכֶם הַקָּטֹן
  english_pob_choice: your youngest brother
  chosen_spanish: su hermano menor
  alternatives_spanish:
  - su hermano más joven
  - su hermano menor de edad
  lexicon: HALOT
  rationale: En español, «menor» comunica de forma natural la idea de orden de edad entre hermanos. «Joven» o «pequeño» sonarían menos precisos en este contexto narrativo; «más joven» es posible, pero «menor» es más idiomático.
- source_word: תָּבִיאוּ אֵלַי
  english_pob_choice: bring ... to me
  chosen_spanish: traigan ... a mí
  alternatives_spanish:
  - lleven ... a mí
  - tráiganlo a mí
  lexicon: HALOT
  rationale: El hiphil de בוא se expresa bien con «traigan». Mantener «a mí» preserva la dirección directa del hebreo אֵלַי sin añadir material explicativo.
- source_word: וְיֵאָמְנוּ
  english_pob_choice: so that ... may be verified
  chosen_spanish: para que ... sean verificadas
  alternatives_spanish:
  - para que ... sean confirmadas
  - para que ... sean creídas
  lexicon: HALOT
  rationale: El nifal de אמן aquí apunta a que las palabras queden establecidas como verdaderas en el examen de José. «Verificadas» conserva ese matiz más bien forense o comprobatorio mejor que «creídas».
- source_word: דִבְרֵיכֶם
  english_pob_choice: your words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dicen
  - sus dichos
  lexicon: HALOT
  rationale: «Palabras» reproduce de manera directa דִבְרֵי. En español, el posesivo plural se expresa naturalmente con «sus» cuando el referente ya está claro por el contexto.
- source_word: וְלֹא תָמֻתוּ
  english_pob_choice: and you will not die
  chosen_spanish: y no mueran
  alternatives_spanish:
  - y no morirán
  - para que no mueran
  lexicon: HALOT
  rationale: La cláusula hebrea funciona como consecuencia/promesa vinculada a la acción anterior. En español, «y no mueran» mantiene la coordinación breve del hebreo y el tono de advertencia-promesa de José.
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: And they did so
  chosen_spanish: Y así lo hicieron
  alternatives_spanish:
  - Y lo hicieron así
  - Y hicieron esto
  lexicon: HALOT
  rationale: Es una fórmula narrativa idiomática en español. «Así lo hicieron» conserva el sentido de cumplimiento sin sonar rígido.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el rastro de auditoría en inglés. Se mantuvo el valor comprobatorio de וְיֵאָמְנוּ, con una nota de alternativa para conservar la tensión lexical entre «verificar/confirmar/creer». No se introdujeron términos teológicos adicionales porque el verso no los requiere.
  spanish_consistency_notes:
  - Se mantuvo «menor» para אֲחִיכֶם הַקָּטֹן por coherencia con el sentido de orden de edad ya fijado en el inglés POB.
  - Se evitó «creer» en el cuerpo principal para no debilitar el matiz de comprobación del hebreo.
  - 'La puntuación sigue el flujo narrativo del hebreo: mandato, propósito y resultado final.'
