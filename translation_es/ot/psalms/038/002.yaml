translation:
  language: es
  text: Oh Yahvé[a], no me reprendas[b] en tu ira, ni me disciplines[c] en tu furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también se puede transliterar «Yahweh».'
    reason: alternative_reading
  - marker: b
    text: 'O: «me reproches».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «me castigues».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Yahvé!
  alternatives_spanish:
  - ¡Yahweh!
  - ¡Jehová!
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. En español, el uso estándar del proyecto es «Yahvé», que mantiene la referencia directa al nombre revelado y evita sustituirlo por un título.
- source_word: בְּקֶצְפְּךָ
  english_pob_choice: in your anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu enojo
  - en tu indignación
  lexicon: HALOT
  rationale: קֶצֶף expresa ira/indignación; «ira» comunica bien la fuerza afectiva y judicial del término en un contexto de súplica penitencial, sin debilitarlo.
- source_word: תוֹכִיחֵנִי
  english_pob_choice: rebuke me
  chosen_spanish: me reprendas
  alternatives_spanish:
  - me reproches
  - me corrijas
  - me reprendas / me reproches
  lexicon: HALOT
  rationale: La forma hifil de יכח puede significar reprender, rebatir o corregir. «Reprendas» es natural en español y conserva la tensión de una reprensión divina; la alternativa «reproches» queda cercana semánticamente.
- source_word: וּבַחֲמָתְךָ
  english_pob_choice: nor ... in your wrath
  chosen_spanish: ni me disciplines en tu furor
  alternatives_spanish:
  - y en tu furor
  - ni me corrijas en tu furor
  - ni me castigues en tu furor
  lexicon: HALOT
  rationale: חֵמָה denota furor/ira intensa. «Furor» mantiene la intensidad poética. Se eligió «ni» para continuar el paralelismo negativo del hebreo con אַל, como en el inglés auditado.
- source_word: תְיַסְּרֵנִי
  english_pob_choice: discipline me
  chosen_spanish: me disciplines
  alternatives_spanish:
  - me castigues
  - me corrijas
  - me amonestes
  lexicon: HALOT
  rationale: יסר en piʿel suele implicar disciplinar/castigar mediante corrección. «Disciplines» conserva el matiz correctivo sin forzar un sentido exclusivamente punitivo; en español, el verbo funciona bien con la referencia a la acción divina.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la decisión del POB de reflejar el nombre personal divino en vez de sustituirlo por un título. En español, «Yahvé» es la forma adoptada por el proyecto y conserva la identificación del Dios del pacto en este versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el pasaje permanece estable. La draft en español sigue la misma lectura y conserva el paralelismo negativo de la fuente hebrea con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - Se conservó el paralelismo de dos miembros negativos con «no ... ni ...» para reflejar la estructura hebrea.
  - «Ira» y «furor» distinguen el matiz de קֶצֶף y חֵמָה sin suavizar la intensidad del verso.
  - La decisión verbal evita sobreinterpretar «disciplina» como mero castigo; queda abierta la fuerza correctiva del hebreo.
