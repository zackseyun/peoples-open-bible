  to: 'Ahora bien, cuando estas cosas terminaron, los oficiales se acercaron a mí, diciendo: «El pueblo de Israel, y los sacerdotes y los levitas, no se han separado de los pueblos de las tierras, conforme a sus abominaciones[a]: los cananeos, los hititas, los ferezeos, los jebuseos, los amonitas, los moabitas, los egipcios y los amorreos».'
