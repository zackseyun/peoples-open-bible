translation:
  language: es
  text: Y no había rey en Edom; un gobernador[a] era rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «funcionario designado». El hebreo נִצָּב se refiere literalmente a uno puesto o establecido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֶ֥לֶךְ
  english_pob_choice: And ... king
  chosen_spanish: Y ... rey
  alternatives_spanish:
  - Ahora ... rey
  lexicon: HALOT
  rationale: La conjunción ו se vierte naturalmente con «Y» en una narración histórica breve. מֶלֶךְ se mantiene como «rey», que es el equivalente directo y transparente en español.
- source_word: אֵ֛ין
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no hay
  - no existía
  lexicon: HALOT
  rationale: אֵין expresa inexistencia; en este contexto histórico, el imperfecto perifrástico «no había» comunica con naturalidad que en Edom no existía un rey.
- source_word: בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: en Edom
  alternatives_spanish:
  - entre los edomitas
  lexicon: HALOT
  rationale: 'La preposición ב con el nombre propio se entiende de manera locativa directa: «en Edom».'
- source_word: נִצָּ֥ב
  english_pob_choice: deputy
  chosen_spanish: delegado
  alternatives_spanish:
  - gobernador
  - funcionario designado
  - puesto allí
  - prefecto
  lexicon: HALOT
  rationale: El participio de נצב denota a alguien puesto o establecido. En este marco político, «delegado» comunica bien la idea de una autoridad designada sin imponer una terminología más técnica de la que el hebreo exige.
- source_word: מֶֽלֶךְ
  english_pob_choice: was king
  chosen_spanish: era rey
  alternatives_spanish:
  - reinaba
  - ocupaba el puesto de rey
  lexicon: HALOT
  rationale: El segundo מֶלֶךְ funciona predicativamente junto con נִצָּב. «Era rey» conserva la concisión del hebreo y evita ampliar el sentido con una explicación interpretativa.
translation_notes:
  revision_awareness: El texto inglés fue revisado desde «a deputy served as king» a «a deputy was king» para ajustarse más literalmente a la concisión del hebreo. La versión española sigue esa misma línea, evitando añadir una idea de ejercicio prolongado del cargo que no está explícita en el original.
  spanish_consistency_notes:
  - Se mantiene «rey» para מֶלֶךְ de forma consistente y directa.
  - Se evita «SEÑOR» o cualquier sustitución reverencial, porque aquí no aparece el nombre divino.
  - «Delegado» intenta respetar el valor de נִצָּב como autoridad designada, sin convertirlo en un término eclesiástico o anacrónico.
