translation:
  language: es
  text: 'Y al séptimo día el niño murió. Y los siervos de David temieron decirle que el niño había muerto, pues dijeron: «He aquí, mientras el niño aún vivía, le hablamos, y no escuchó nuestra voz. ¿Cómo, pues, le diremos: “El niño ha muerto”? Podría hacer daño[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Podría hacer el mal», «Podría reaccionar mal», o posiblemente «Podría hacerse daño». La expresión hebrea es breve y deja sin precisar la acción exacta que temían.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: And on the seventh day
  chosen_spanish: Y sucedió en el séptimo día
  alternatives_spanish:
  - Y aconteció en el séptimo día
  - Y en el séptimo día
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce una secuencia de eventos; en español, «Y sucedió» mantiene el valor narrativo sin sonar mecánico. «En el séptimo día» conserva la referencia temporal exacta.
- source_word: וַיָּמָת הַיָּלֶד
  english_pob_choice: the child died
  chosen_spanish: el niño murió
  alternatives_spanish:
  - el niño falleció
  - el niño se murió
  lexicon: HALOT
  rationale: יֶלֶד aquí se refiere naturalmente a un niño/pequeño; «niño» es claro y acorde al contexto. «Murió» expresa el hecho sin añadir matices que el hebreo no requiere.
- source_word: וַיִּרְאוּ עַבְדֵי דָוִד
  english_pob_choice: David’s servants were afraid
  chosen_spanish: los siervos de David temieron
  alternatives_spanish:
  - los siervos de David tuvieron miedo
  - los servidores de David se asustaron
  lexicon: HALOT
  rationale: El verbo ירא puede expresar temor/aprehensión. «Temieron» conserva ese peso con un registro digno. «Siervos» sigue el valor léxico fuerte del hebreo עַבְדֵי y evita suavizarlo como «sirvientes».
- source_word: לְהַגִּיד לוֹ
  english_pob_choice: to tell him
  chosen_spanish: decírselo
  alternatives_spanish:
  - decirle
  - informarle
  lexicon: HALOT
  rationale: El infinitivo con sufijo se vuelve naturalmente pronominal en español. «Decírselo» incorpora el contenido ya mencionado y mantiene la relación directa con David.
- source_word: כִּי מֵת הַיֶּלֶד
  english_pob_choice: that the child was dead
  chosen_spanish: que el niño había muerto
  alternatives_spanish:
  - que el niño estaba muerto
  - que el niño murió
  lexicon: HALOT
  rationale: En el discurso indirecto, el pluscuamperfecto («había muerto») refleja bien la anterioridad respecto del acto de decirlo. «Había muerto» evita una simple repetición del evento y suena natural en español.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: pues dijeron
  alternatives_spanish:
  - porque dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: כִּי introduce la razón de su temor; «pues» mantiene el valor explicativo de forma concisa y literaria.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Miren ustedes
  lexicon: HALOT
  rationale: «He aquí» preserva el tono formal de la interjección hebrea y se ajusta al registro bíblico sin caer en una traducción arcaizante excesiva.
- source_word: בִּהְיוֹת הַיֶּלֶד חַי
  english_pob_choice: while the child was still alive
  chosen_spanish: mientras el niño aún vivía
  alternatives_spanish:
  - cuando el niño todavía vivía
  - mientras el niño seguía vivo
  lexicon: HALOT
  rationale: La construcción temporal expresa contemporaneidad; «mientras» es la opción más natural. «Aún vivía» mantiene el contraste implícito con la noticia de su muerte.
- source_word: דִּבַּרְנוּ אֵלָיו
  english_pob_choice: we spoke to him
  chosen_spanish: le hablamos
  alternatives_spanish:
  - hablamos con él
  - le dijimos
  lexicon: HALOT
  rationale: דבר אל significa «hablar a/con». «Le hablamos» es breve y fiel; evita forzar una precisión distinta como «le dijimos».
- source_word: וְלֹא שָׁמַע בְּקוֹלֵנוּ
  english_pob_choice: and he did not listen to our voice
  chosen_spanish: y no escuchó nuestra voz
  alternatives_spanish:
  - y no nos escuchó
  - y no atendió nuestra voz
  lexicon: HALOT
  rationale: El hebreo conserva la imagen idiomática de «escuchar la voz». «Nuestra voz» mantiene esa textura, y «no escuchó» comunica rechazo a la advertencia.
- source_word: וְאֵיךְ נֹאמַר אֵלָיו
  english_pob_choice: How then can we say to him
  chosen_spanish: ¿Cómo, pues, le diremos
  alternatives_spanish:
  - ¿Cómo le diremos entonces
  - ¿Y cómo podremos decirle
  lexicon: HALOT
  rationale: La pregunta retórica expresa consecuencia y aprensión. «¿Cómo, pues, le diremos?» conserva el orden y la lógica inferencial del hebreo.
- source_word: מֵת הַיֶּלֶד
  english_pob_choice: The child is dead
  chosen_spanish: El niño ha muerto
  alternatives_spanish:
  - El niño está muerto
  - El niño murió
  lexicon: HALOT
  rationale: En discurso directo, el español natural suele preferir el pretérito perfecto compuesto para un hecho recientemente concluido. «Ha muerto» comunica el estado resultante sin perder el evento.
- source_word: וְעָשָׂה רָעָה
  english_pob_choice: He may do harm
  chosen_spanish: Podría hacer daño
  alternatives_spanish:
  - Podría hacer mal
  - Podría reaccionar mal
  - Podría hacerse daño
  lexicon: HALOT
  rationale: 'El hebreo es breve y abierto: no especifica con exactitud la acción temida. «Podría hacer daño» conserva esa ambigüedad y evita concretar indebidamente si el daño sería moral, físico o auto-dirigido.'
theological_decisions:
- issue: Alcance de וְעָשָׂה רָעָה
  english_pob_reading: An open-ended harmful action by David, left unspecified
  chosen_spanish_reading: Una acción dañina o perjudicial, sin especificar el tipo exacto de daño
  alternative_spanish_readings:
  - Podría hacer daño a sí mismo
  - Podría hacer el mal
  - Podría reaccionar mal
  rationale: El hebreo no dice qué forma tomaría la acción ni quién sería el afectado. La traducción mantiene la indeterminación para no resolver prematuramente la tensión textual.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa en dos puntos clave: conserva el tono formal de la interjección inicial con «He aquí», y refleja la brevedad ambigua de וְעָשָׂה רָעָה con «Podría hacer daño», evitando especificaciones no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «niño» para יֶלֶד en todo el versículo para consistencia semántica.
  - Se usa «siervos» para עַבְדֵי para conservar la fuerza del término hebreo.
  - La voz narrativa alterna entre pretérito perfecto simple y compuesto según la naturalidad del español, sin alterar la secuencia de eventos.
  - La nota al pie marca la única ambigüedad lexical relevante del versículo y está anclada en la frase final.
