translation:
  text: 'Jesus said: Whoever has come to know the world has found a corpse[a]; and
    whoever has found the corpse[c][b], the world is not worthy of him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The first clause uses the indefinite article (“a corpse”), while the second
      uses the definite (“the corpse”), probably referring back to the same discovered
      corpse. Some English versions flatten both as “a corpse,” but the Coptic distinction
      is kept here.
    reason: dialect_note
  - marker: b
    text: “Come to know” renders the perfective nuance of ⲥⲟⲟⲩⲛ in the ⲡⲉⲧⲉⲣⲉ-relative;
      “know” would be a plainer alternative.
    reason: lexical_alternative
  - marker: c
    text: Compare Hebrews 11:38 (“of whom the world was not worthy”). This is not
      a Synoptic parallel and is cited only for thematic resonance.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus says
  - Jesus speaks
  lexicon: Crum; Lambdin (grammar)
  rationale: The formula ⲡⲉϫⲉ + subject is the standard narrative introduction for
    sayings; simple past English best matches the perfective force of the report.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: come to know
  alternatives:
  - know
  - recognize
  - understand
  lexicon: Crum; Layton (grammar)
  rationale: Resultative/perfective sense in the ⲡⲉⲧⲉⲣⲉ relative construction favors
    a completed state of knowing; “come to know” conveys that nuance without smoothing
    away Thomas’s abruptness.
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  chosen: the world
  alternatives:
  - the cosmos
  - the ordered world
  lexicon: Layton (lexicon); Crum
  rationale: Greek loanword kosmos regularly means ‘world’ in Thomas; “cosmos” would
    be more technical and potentially misleading here.
- source_word: ϩⲉ
  chosen: find
  alternatives:
  - discover
  - come upon
  lexicon: Crum
  rationale: Crum notes ϩⲉ as ‘find’; “discover” is possible but adds modern scientific
    connotations not present in the terse Coptic.
- source_word: ⲟⲩⲡⲧⲱⲙⲁ / ⲡⲧⲱⲙⲁ
  chosen: a corpse / the corpse
  alternatives:
  - a dead body / the dead body
  lexicon: Crum
  rationale: Ptōma means ‘corpse’; the first clause uses the indefinite article (ⲟⲩ-),
    while the second shifts to the definite (ⲡ-). Preserving this anaphoric move (“the
    corpse”) keeps Thomas’s stark diction and internal reference.
- source_word: ⲙⲡϣⲁ ⲛⲛⲧⲟϥ
  chosen: is not worthy of him
  alternatives:
  - does not deserve him
  - is unworthy of him
  lexicon: Crum; Lambdin (grammar)
  rationale: ⲡϣⲁ ‘be worthy’ with the prepositional phrase ⲛⲛⲧⲟϥ ‘of him’ forms a
    stable idiom; negation with ⲙⲡ- … ⲁⲛ gives ‘is not worthy of him.’
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - and also
  lexicon: Crum
  rationale: Simple connective; minimal English rendering fits Thomas’s terse style.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ …
  chosen: whoever has …
  alternatives:
  - the one who has …
  lexicon: Layton (grammar); Lambdin (grammar)
  rationale: Relative ⲡⲉⲧⲉⲣⲉ with the independent pronoun (ⲁⲛⲧⲟϥ) yields an indefinite
    relative clause; “whoever” captures the indefinite scope.
textual_note: 'No lacunae or restorations in Dilley’s text for this saying. Orthographically,
  the manuscript shows allographic variation (e.g., ⲥⲟⲩⲱⲛ vs normalized ⲥⲟⲟⲩⲛ) and
  the insertion of the independent pronoun (ⲁⲛⲧⲟϥ) within the ⲡⲉⲧⲉⲣⲉ-relative, a common
  Sahidic feature for emphasis or clarity in relative clauses (see Layton, Lambdin).
  Note the deliberate article shift: first clause has ⲉⲟⲩⲡⲧⲱⲙⲁ (indefinite), second
  clause ⲉⲡⲧⲱⲙⲁ (definite), likely anaphoric to the corpse just mentioned. Dialectally,
  otherwise standard Sahidic; no Lycopolitan features here materially affect meaning.'
