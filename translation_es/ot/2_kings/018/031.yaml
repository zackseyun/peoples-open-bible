revisions:
- from: 'No escuchen a Ezequías[a], porque así dice el rey de Asiria: Hagan paz conmigo y salgan a mí, y coma cada hombre de su propia vid y de su propia higuera, y beba cada hombre el agua de su propio estanque.'
  to: 'No escuchen a Ezequías[a], porque así dice el rey de Asiria: Hagan paz conmigo y salgan, y vengan a mí; y coma cada hombre de su propia vid y cada hombre de su propia higuera, y beba cada hombre el agua de su propia cisterna.'
  rationale: 'Se corrigen dos puntos principales: se reemplaza el calco poco natural «salgan a mí» por «salgan, y vengan a mí», que conserva el doble movimiento del contexto de asedio sin añadir «rendirse»; y se cambia «estanque» por «cisterna», que corresponde mejor a בּוֹר y sigue la decisión léxica auditada del POB. Se mantiene la nota literal sobre «hagan conmigo una bendición» y el distributivo «cada hombre».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:16Z'
