translation:
  language: es
  text: Ahora, cuando esta carta llegue a ustedes[a], puesto que con ustedes están los hijos de su amo[b], los carros y los caballos, y también una ciudad fortificada[c], y las armas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando este documento les llegue».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de su amo»; es decir, los hijos del rey a quien servían.'
    reason: cultural_note
  - marker: c
    text: 'O: «una ciudad fortaleza»; la frase alude a una ciudad defendible a disposición de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marcador discursivo que introduce la siguiente acción; «Ahora» es natural en español y conserva el tono de transición del hebreo.
- source_word: כְּבֹא הַסֵּפֶר הַזֶּה
  english_pob_choice: when this letter comes
  chosen_spanish: cuando esta carta llegue
  alternatives_spanish:
  - cuando llegue este documento
  - cuando esta carta les llegue
  lexicon: HALOT
  rationale: En este contexto de correspondencia real, סֵפֶר se entiende como escrito/carta. «Carta» comunica mejor que «libro» o «documento», y «llegue» expresa de forma idiomática el valor temporal de כְּבֹא.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes todos
  lexicon: HALOT
  rationale: El plural del hebreo se preserva con «a ustedes», registro neutral y claro para lectores de español amplio.
- source_word: בְּנֵי אֲדֹנֵיכֶם
  english_pob_choice: your master's sons
  chosen_spanish: los hijos de su amo
  alternatives_spanish:
  - los hijos de su señor
  - los hijos de su señorío
  lexicon: HALOT
  rationale: «Amo» reproduce el valor relacional y político de אֲדֹנֵיכֶם en este pasaje, sin desplazarlo hacia el uso divino de «Señor». «Hijos» es más directo que «descendientes» y sigue el sentido del hebreo.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - el carro de combate
  lexicon: HALOT
  rationale: El término hebreo designa el recurso militar de carros. En español bíblico moderno, «carros» es breve y comprensible; el contexto militar ya delimita su sentido.
- source_word: וְהַסּוּסִים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - la caballería
  - los corceles
  lexicon: HALOT
  rationale: Traducción literal y clara del complemento militar asociado a los carros. «Caballos» mantiene la concreción del hebreo.
- source_word: וְעִיר מִבְצָר
  english_pob_choice: a fortified city
  chosen_spanish: una ciudad fortificada
  alternatives_spanish:
  - una ciudad-fortaleza
  - una plaza fortificada
  - una ciudad fortaleza
  lexicon: HALOT
  rationale: La construcción nominal expresa una ciudad defendible; «ciudad fortificada» conserva tanto el sustantivo como el adjetivo sin introducir una paráfrasis mayor. Se mantiene el carácter indefinido del hebreo.
- source_word: וְהַנָּשֶׁק
  english_pob_choice: the weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - el armamento
  - las armas de guerra
  lexicon: HALOT
  rationale: נָשֶׁק refiere al armamento en general. «Armas» es la opción más natural y suficientemente amplia en español; «armamento» sería más técnico.
theological_decisions:
- issue: La frase «hijos de su amo» puede sonar degradante o confusa en español si se la lee sin contexto.
  english_pob_reading: Hebrew 'your master's sons'; that is, the sons of the king whom the recipients served.
  chosen_spanish_reading: los hijos de su amo, es decir, los hijos del rey a quien servían
  alternative_spanish_readings:
  - los hijos de su señor
  - los hijos del rey a quien servían
  rationale: Se conserva la referencia relacional fuerte de אֲדֹנֵיכֶם y, a la vez, se aclara en nota que el referente histórico es el rey al que servían. Esto evita suavizar el texto hacia un lenguaje más eclesiástico o menos concreto.
  doctrine_reference: Relación de vasallaje/servicio en la narrativa monárquica de 2 Reyes.
- issue: La expresión «ciudad fortificada» puede entenderse como una cualidad general o como un recurso militar disponible para ellos.
  english_pob_reading: Or 'a fortress city.' The phrase refers to a defensible city available to the recipients.
  chosen_spanish_reading: una ciudad fortificada, es decir, una ciudad defendible a su disposición
  alternative_spanish_readings:
  - una fortaleza ciudad
  - una ciudad-fortaleza
  rationale: La traducción principal mantiene la estructura hebrea; la nota recoge la idea funcional destacada por el POB inglés, sin convertirla en una glosa que borre el sustantivo «ciudad».
  doctrine_reference: Lectura contextual de recursos militares y defensivos en la narrativa histórica.
translation_notes:
  revision_awareness: El inglés POB revisado ajustó la coordinación para hacer más explícito que la ciudad fortificada también está «con ustedes». En español se reflejó esa acumulación con «y también una ciudad fortificada», preservando el paralelismo de recursos disponibles sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se evitó «Señor» para אֲדֹנֵיכֶם porque aquí el valor es el de amo/amo real, no el título divino.
  - Se mantuvo el plural de segunda persona con «ustedes» para reflejar אֲלֵיכֶם / אִתְּכֶם.
  - «Carros», «caballos» y «armas» conservan el inventario militar concreto del hebreo sin amplificación interpretativa.
