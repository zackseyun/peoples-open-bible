  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ⸂εἶδον, καὶ⸃ ἰδοὺ ἵππος χλωρός, καὶ ὁ καθήμενος ἐπάνω αὐτοῦ ὄνομα αὐτῷ ὁ Θάνατος, καὶ ὁ ᾅδης ἠκολούθει ⸂μετ’ αὐτοῦ⸃, καὶ ἐδόθη ⸀αὐτοῖς ἐξουσία ἐπὶ τὸ τέταρτον τῆς γῆς, ἀποκτεῖναι ἐν ῥομφαίᾳ καὶ ἐν λιμῷ καὶ ἐν θανάτῳ καὶ ὑπὸ τῶν θηρίων τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/008.yaml
  text: And I looked, and behold, a pale green horse, and the name of the one seated on it was Death, and Hades was following with him. And authority was given to them over a fourth of the earth, to kill with sword and with famine and with pestilence and by the wild beasts of the earth.
  footnotes:
  - marker: a
    text: 'Or: ''a pale horse.'' The Greek χλωρός literally denotes a greenish or pale-green color, often suggesting a sickly pallor.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''with death.'' Here ''pestilence'' reflects the idiomatic sense of θανάτῳ in an Old Testament judgment-list context, especially echoing Ezekiel 14.'
    reason: alternative_reading
translation:
  language: ko
  text: '또 내가 보니, 보라, 푸르스름한 말이 있었고, 그 위에 탄 자의 이름은 「사망」이었으며, 하데스가 그를 뒤따랐습니다. 그들에게 땅의 사분의 일에 대한 권세가 주어져, 검과 기근과 사망[a]과 땅의 짐승들로 죽이게 하였습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「전염병으로」. 헬라어 「사망으로」는 에스겔 14장 등 구약 심판 목록의 관용적 의미를 반영한다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵππος χλωρός
  english_pob_choice: pale green horse
  chosen_korean: 푸르스름한 말
  alternatives_korean:
  - 청황색 말
  lexicon: BDAG
  rationale: 'χλωρός는 풀빛/누런빛을 함께 가리키며, 시체의 창백한 빛을 함의한다. 「푸르스름한」으로 그 시각적 무게를 살린다.'
- source_word: θηρίων τῆς γῆς
  english_pob_choice: wild beasts of the earth
  chosen_korean: 땅의 짐승들
  alternatives_korean:
  - 땅의 들짐승들
  lexicon: BDAG
  rationale: '여기서 θηρίον은 일반적 「짐승」으로 13장의 상징적 「짐승」과 어휘적으로 동일하므로, 본 번역의 ζῷον(생물)/θηρίον(짐승) 어휘 구별 원칙을 그대로 유지한다.'
