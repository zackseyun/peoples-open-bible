    rationale: Como alternativa literal conviene una formulación española más clara, por ejemplo 'tú das vuelta a todo su lecho' o 'tú vuelves su lecho por completo', explicando que probablemente es un modismo de cuidado al enfermo.
  revised_spanish_text: Yahvé lo sostendrá en su lecho de enfermo[a]; en su enfermedad, tú restaurarás todo su lecho.
