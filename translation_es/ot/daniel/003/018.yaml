  to: Pero si no[a], sea sabido por ti, oh rey, que no serviremos a tus dioses, y no nos postraremos ante la imagen de oro que has levantado.
  rationale: Se hizo una reparación menor de naturalidad y tono formal en «sea sabido por ti», y un ajuste leve de coordinación en «y no nos postraremos». El resto del borrador preserva bien el sentido, la elipsis teológica y las decisiones léxicas del registro auditado.
