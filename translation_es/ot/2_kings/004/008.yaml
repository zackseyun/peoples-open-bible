translation:
  language: es
  text: Y sucedió que un día Eliseo pasó por Sunem, donde había una mujer distinguida[a], y ella lo instó a comer pan[b]. Y cada vez que pasaba por allí, se desviaba hacia allá para comer pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una mujer grande». La expresión probablemente alude a prominencia social o recursos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «comer pan», un modismo para tomar una comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: And one day
  chosen_spanish: Y sucedió un día
  alternatives_spanish:
  - Y fue un día
  - Y aconteció un día
  lexicon: HALOT
  rationale: La apertura narrativa hebrea es idiomática; en español, “Y sucedió un día” mantiene el valor temporal y el tono narrativo sin calco torpe.
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed through
  chosen_spanish: pasó a
  alternatives_spanish:
  - pasó por
  - atravesó
  lexicon: HALOT
  rationale: En este contexto de viaje hacia Sunem, “pasó a” conserva la idea de llegar/pasar por el lugar de forma natural en español, sin perder el movimiento narrativo. Evita una literalidad excesiva que sonaría extraña.
- source_word: שׁוּנֵם
  english_pob_choice: Shunem
  chosen_spanish: Sunem
  alternatives_spanish:
  - Sunem
  lexicon: Convención de transliteración castellana
  rationale: Se usa la forma castellana habitual “Sunem” para el topónimo, en lugar de una transliteración inglesa.
- source_word: אִשָּׁה גְדוֹלָה
  english_pob_choice: a prominent woman
  chosen_spanish: una mujer prominente
  alternatives_spanish:
  - una mujer grande
  - una mujer importante
  - una mujer rica
  lexicon: HALOT
  rationale: גדולה aquí probablemente expresa estatus, influencia o medios. “Prominente” conserva la idea de relieve social sin forzar “grande” en sentido físico ni restringirla a riqueza solamente.
- source_word: וַתַּחֲזֶק בּוֹ
  english_pob_choice: she urged him
  chosen_spanish: lo instó
  alternatives_spanish:
  - lo persuadió
  - lo apremió
  - lo obligó
  lexicon: HALOT
  rationale: El hebreo literalmente alude a “aferrarse/ser fuerte con” él, pero el sentido contextual es de insistencia hospitalaria. “Lo instó” comunica esa presión amable sin exagerar hacia coerción.
- source_word: לֶאֱכָל לָחֶם
  english_pob_choice: to eat bread
  chosen_spanish: a comer pan
  alternatives_spanish:
  - a comer
  - a tomar pan
  - a comer alimento
  lexicon: HALOT
  rationale: Se conserva “pan” porque el hebreo dice literalmente “pan”, aunque funciona como metonimia de una comida. Repetir “pan” mantiene la imagen concreta del original y la coherencia interna del versículo.
- source_word: מִדֵּי עָבְרוֹ
  english_pob_choice: whenever he passed by
  chosen_spanish: Y cada vez que pasaba
  alternatives_spanish:
  - Y siempre que pasaba
  - Y cuando pasaba
  - Cada vez que él pasaba
  lexicon: HALOT
  rationale: La construcción expresa repetición habitual. “Cada vez que pasaba” recoge bien ese sentido iterativo en español.
- source_word: יָסֻר שָׁמָּה
  english_pob_choice: he would turn in there
  chosen_spanish: se desviaba allí
  alternatives_spanish:
  - se apartaba allí
  - entraba allí
  - se detenía allí
  lexicon: HALOT
  rationale: סור indica apartarse o desviarse hacia un lado. “Se desviaba allí” conserva el movimiento de apartarse de la ruta para entrar en la casa, sin introducir una interpretación más específica que el hebreo no exige.
translation_notes:
  revision_awareness: Se siguió de cerca el último estado del audit trail inglés, que volvió de “food” a “bread” en ambos casos para reflejar con más precisión el hebreo לֶחֶם. La versión española conserva esa precisión repitiendo “pan” y mantiene el tono narrativo idiomático de la apertura.
  spanish_consistency_notes:
  - Se mantuvo “pan” en ambas ocurrencias de לֶחֶם para reflejar el mismo término hebreo y su valor metonímico de comida.
  - Se transliteró el topónimo como “Sunem”, siguiendo el uso castellano.
  - Se evitó “SEÑOR” o equivalentes irrelevantes porque no aparece ningún nombre divino en este versículo.
  - “Prominente” y “lo instó” buscan preservar el relieve social y la presión hospitalaria sin añadir matices no exigidos por el hebreo.
