base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/004.yaml
  text: If we say[a], ‘Let us enter the city,’ the famine is in the city, and we will die there. And if we sit here, we will die. So now, come, let us fall into the camp of Aram. If they let us live, we will live; and if they put us to death[b], we will die.”
  footnotes:
  - marker: a
    text: Or ‘let us surrender to the camp of Aram’ for ‘let us fall into the camp of Aram’; the Hebrew idiom נפל אל can carry the sense of going over or yielding to another force.
    reason: lexical_alternative
  - marker: b
    text: ‘Aram’ is the Hebrew name often rendered ‘Syria’ or ‘the Arameans.’
    reason: cultural_note
