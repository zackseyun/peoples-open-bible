- from: Entonces, si el impío merece ser golpeado, el juez hará que se acueste y lo harán golpear delante de él, según su maldad, por número[a].
  to: Entonces, si el impío merece ser golpeado, el juez hará que se acueste y hará que lo golpeen delante de él, según su maldad, por número[a].
  rationale: Se corrige una construcción española defectuosa para reflejar con claridad que el juez ordena/supervisa que el condenado sea golpeado, no que él golpee. También se pule levemente la nota para un español más natural, manteniendo el valor léxico documentado.
