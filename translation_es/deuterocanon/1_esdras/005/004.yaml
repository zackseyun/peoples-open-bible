    issue: La preposición «hacia» debilita el valor de εἰς τὰς φυλὰς.
    rationale: εἰς normalmente expresa movimiento a/into, no solo dirección general. En español, «a sus tribus» preserva mejor la incorporación o destino concreto.
  - severity: high
    issue: El marcador [b] está colocado en «tribus», pero la nota explica μεριδαρχίαν.
    rationale: Esto crea un desajuste entre texto y nota. El proyecto exige que cada nota esté anclada en la palabra o frase relevante del texto español.
