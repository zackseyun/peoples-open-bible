translation:
  language: es
  text: Y ahora, Yahvé mi Dios, tú has hecho rey a tu siervo en lugar de David, mi padre; y yo soy un niño pequeño[a]; no sé cómo salir ni entrar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un muchacho joven»; la expresión hebrea es una autodescripción humilde que subraya juventud e inexperiencia.'
    reason: lexical_alternative
  - marker: b
    text: «Salir y entrar» es un modismo hebreo para desempeñar las propias responsabilidades, especialmente en el liderazgo público.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en forma transliterada española usual del proyecto. Se evita la sustitución por un título genérico, en fidelidad al texto fuente y a la decisión auditada de renderizar el Tetragrama como nombre propio.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La construcción posesiva directa del hebreo se expresa de manera natural y reverente como 'mi Dios'. Al ir después de Yahvé, mantiene la aposición vocativa sin añadir elementos no presentes en el original.
- source_word: הִמְלַכְתָּ
  english_pob_choice: have made your servant king
  chosen_spanish: has hecho rey
  alternatives_spanish:
  - has hecho reinar
  - has constituido rey
  lexicon: HALOT
  rationale: El causativo de מלך indica hacer que alguien llegue a ser rey. 'Has hecho rey' preserva la causación y suena natural en español; 'has hecho reinar' sería menos idiomático aquí.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: Aunque la fórmula puede leerse como 'siervo', el proyecto inglés eligió 'slave' para conservar la fuerza léxica de עבד. En español, 'esclavo' mantiene esa fuerza. La frase se entiende aquí en lenguaje de sumisión y servicio al rey/divino, no como una precisión social moderna.
- source_word: תַּחַת דָּוִד אָבִי
  english_pob_choice: in place of David my father
  chosen_spanish: en lugar de David, mi padre
  alternatives_spanish:
  - en vez de David, mi padre
  - después de David, mi padre
  lexicon: HALOT
  rationale: תחת marca sucesión o sustitución. 'En lugar de' comunica claramente que Salomón ocupa el puesto de David, sin perder el matiz de reemplazo/sucesión del hebreo.
- source_word: נַעַר קָטֹן
  english_pob_choice: a little child
  chosen_spanish: un niño pequeño
  alternatives_spanish:
  - un muchacho joven
  - un joven
  lexicon: HALOT
  rationale: Se sigue la revisión auditada hacia una forma más formal y precisa que 'a little boy'. 'Un niño pequeño' preserva la auto-humillación y la inexperiencia sugeridas por la expresión hebrea, sin convertirla en una afirmación técnica de edad.
- source_word: לֹא אֵדַע
  english_pob_choice: I do not know how
  chosen_spanish: no sé
  alternatives_spanish:
  - no sé cómo
  - no tengo experiencia de
  lexicon: HALOT
  rationale: En español, el complemento idiomático se completa con el miembro siguiente ('salir ni entrar'); la frase breve 'no sé' permite que el idiomático hebreo quede transparente, como en el audit trail inglés, sin sobreexplicar.
- source_word: צֵאת וָבֹא
  english_pob_choice: to go out or come in
  chosen_spanish: salir ni entrar
  alternatives_spanish:
  - salir y entrar
  - ir y venir
  - cumplir mis deberes en público
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo en español con 'salir ni entrar', equivalente natural para un par verbal polarizado. La lectura funcional de desempeño público/real queda implícita y se explicita en nota.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto usa el Tetragrama directamente. Se mantiene el nombre propio del pacto como 'Yahvé' para no ocultar la referencia original. Esto sigue la política del proyecto y conserva la transparencia auditiva.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Autodescripción humilde de Salomón
  english_pob_reading: though I am a little child
  chosen_spanish_reading: y yo soy un niño pequeño
  alternative_spanish_readings:
  - y yo soy un muchacho joven
  - y yo soy muy joven
  rationale: Se preserva la auto-descripción humilde sin convertirla en una paráfrasis de edad exacta. La frase refleja inexperiencia y pequeñez retórica, como señala el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
- issue: Idiomático 'go out or come in'
  english_pob_reading: I do not know how to go out or come in
  chosen_spanish_reading: no sé salir ni entrar
  alternative_spanish_readings:
  - no sé cómo salir ni entrar
  - no sé cumplir mis funciones públicas
  rationale: Se conserva el modismo hebreo sin resolverlo por una interpretación explícita de liderazgo en el cuerpo principal. La nota puede orientar al lector sobre su sentido de desempeño público o gubernamental.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión auditada al preferir 'un niño pequeño' frente a opciones más coloquiales, manteniendo el valor de נַעַר קָטֹן y la estructura del texto fuente. También conserva la decisión del POB inglés de retener el modismo 'go out or come in' sin explicarlo en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino conforme al estándar del proyecto.
  - Se usa 'esclavo' para עבד, en coherencia con la elección léxica documentada de no suavizar a 'siervo' sin razón contextual fuerte.
  - La puntuación y el orden siguen un español reverente y publicado, con vocativo claro y sintaxis transparente.
  - La nota b queda anclada a 'niño pequeño' para reflejar la alternativa léxica preservada por el audit trail.
