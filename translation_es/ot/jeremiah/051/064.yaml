translation:
  language: es
  text: 'Y dirás: «Así Babilonia se hundirá y no se levantará por la calamidad que yo estoy trayendo sobre ella, y se cansarán[a]». Hasta aquí las palabras de Jeremías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “y se agotarán” / “y desfallecerán”. El verbo hebreo puede denotar cansancio o agotamiento; el plural probablemente se refiere a la gente de Babilonia más que a la ciudad misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And you shall say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Entonces dirás
  - Y debes decir
  lexicon: HALOT
  rationale: El perfecto con prefijo en secuencia instructiva funciona como mandato/futuro. En español, “dirás” conserva la fuerza formal sin sonar forzado.
- source_word: כָּכָה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De tal manera
  lexicon: HALOT
  rationale: Introduce la explicación profética del signo; “Así” es natural y solemne en español.
- source_word: תִּשְׁקַע
  english_pob_choice: will sink
  chosen_spanish: se hundirá
  alternatives_spanish:
  - se sumergirá
  - se abatirá
  lexicon: HALOT
  rationale: Mantiene la imagen física de hundimiento y encaja con el contexto del acto simbólico.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: El nombre geográfico y político se vierte como “Babilonia”, la forma normal y clara en español bíblico contemporáneo.
- source_word: וְלֹא תָקוּם
  english_pob_choice: and will not rise
  chosen_spanish: y no se levantará
  alternatives_spanish:
  - y no volverá a alzarse
  - y no se alzará
  lexicon: HALOT
  rationale: En contraste con “se hundirá”, “se levantará” preserva el paralelismo de movimiento. “No se levantará” comunica bien la imposibilidad de recuperación.
- source_word: מִפְּנֵי הָרָעָה
  english_pob_choice: because of the disaster
  chosen_spanish: por la calamidad
  alternatives_spanish:
  - a causa de la desgracia
  - por el desastre
  lexicon: HALOT
  rationale: El hebreo expresa causalidad. “Calamidad” refleja el sentido de juicio/ruina sin traducirlo como mal moral.
- source_word: אֲשֶׁר אָנֹכִי מֵבִיא עָלֶיהָ
  english_pob_choice: that I am bringing upon her
  chosen_spanish: que yo estoy trayendo sobre ella
  alternatives_spanish:
  - que voy a traer sobre ella
  - que yo traigo sobre ella
  lexicon: HALOT
  rationale: El participio de acción en curso o inminente se rinde de forma natural con el progresivo español. “Sobre ella” conserva la preposición de juicio dirigido contra Babilonia.
- source_word: וְיָעֵפוּ
  english_pob_choice: and they will grow weary
  chosen_spanish: y se cansarán
  alternatives_spanish:
  - y se agotarán
  - y desfallecerán
  lexicon: HALOT
  rationale: El verbo puede significar cansarse, agotarse o desfallecer. “Se cansarán” es una equivalencia sobria y abierta; el plural sugiere a la población de Babilonia, no a la ciudad misma.
- source_word: עַד הֵנָּה
  english_pob_choice: Up to this point
  chosen_spanish: Hasta aquí
  alternatives_spanish:
  - Hasta este punto
  - Así termina
  lexicon: HALOT
  rationale: Fórmula de cierre/colofón. “Hasta aquí” es la manera más natural y breve en español.
- source_word: דִּבְרֵי יִרְמְיָהוּ
  english_pob_choice: are the words of Jeremiah
  chosen_spanish: las palabras de Jeremías
  alternatives_spanish:
  - son las palabras de Jeremías
  - palabras de Jeremías
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal de cierre. En español puede omitirse el verbo sin perder claridad; se mantiene el valor de encabezado final.
theological_decisions:
- issue: Sentido de הָרָעָה en juicio divino
  english_pob_reading: Rendered as 'disaster' rather than 'evil'
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - mal
  - desgracia
  - desastre
  rationale: En este contexto no se debe sugerir que Dios produce mal moral. “Calamidad” comunica mejor la ruina judicial anunciada por Yahvé.
  doctrine_reference: 'Principio traductológico: preservar el sentido contextual sin importar una carga doctrinal no presente en el hebreo.'
translation_notes:
  revision_awareness: El contexto editorial y la revisión reciente muestran alto acuerdo y ningún cambio necesario; se conserva la estructura de cierre colofónica y la imagen de hundimiento/levantarse con una equivalencia española natural.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como término por defecto para el nombre divino en el proyecto, pero en este versículo no aparece el tetragrámaton.
  - “Babilonia” se usa como nombre propio geográfico estándar en español.
  - La nota al pie se ancla en “se cansarán” para preservar la alternativa lexical documentada por el audit trail inglés.
