    rationale: El hebreo no dice «torre»; la palabra עֲלִיָּה denota un aposento/cámara alta o un ascenso. «Torre» sobreinterpreta el referente arquitectónico y borra la incertidumbre preservada en la nota inglesa.
  - severity: medium
