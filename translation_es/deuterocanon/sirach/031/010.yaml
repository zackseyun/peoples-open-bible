  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). 'Paz' para שלום y 'gloria' para תפארה son apropiados. 'Ello' es aceptable, aunque 'a ello' con 'aferrarse' suena más natural que con 'apegarse'.
