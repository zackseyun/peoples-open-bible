translation:
  language: es
  text: Humíllate mucho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado en la muestra es difícil y no coincide claramente con el griego; por eso aquí se sigue la lectura griega. O: «Humilla mucho tu alma». «Alma» puede funcionar idiomáticamente por la persona misma.'
