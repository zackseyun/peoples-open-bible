translation:
  language: es
  text: Abimélec[a] gobernó sobre Israel durante tres años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abimélec conserva la forma española habitual del nombre; no implica una traducción del significado del nombre, sino su adaptación ortográfica para la lectura en español.
