translation:
  language: es
  text: Y Yahvé, el Dios de sus padres, les envió mensaje por medio de[a] sus mensajeros, madrugando y enviando[b], porque tuvo compasión de su pueblo y de su morada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por sus mensajeros».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «madrugando y enviando», un modismo que expresa insistencia y repetición: «enviando una y otra vez».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el templo, visto como el lugar de la morada de Dios entre su pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: DOCTRINE.md / WLC
  rationale: Se sigue el convenio del proyecto para el nombre divino. «Yahvé» mantiene la referencia directa a YHWH y evita la sustitución por un título genérico.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: «El Dios de sus padres» es la forma más cercana y natural en español para conservar el vínculo pactual e histórico con los antepasados.
- source_word: וַיִּשְׁלַח ... עֲלֵיהֶם
  english_pob_choice: sent word to them
  chosen_spanish: les envió mensaje
  alternatives_spanish:
  - les envió palabra
  - les envió un mensaje
  lexicon: HALOT
  rationale: El hebreo tiene un verbo de enviar con objeto implícito; en español conviene explicitarlo como «mensaje» para preservar la fuerza comunicativa sin añadir contenido ajeno.
- source_word: בְּיַד מַלְאָכָיו
  english_pob_choice: by the hand of his messengers
  chosen_spanish: por medio de sus mensajeros
  alternatives_spanish:
  - por la mano de sus mensajeros
  - por sus mensajeros
  lexicon: HALOT
  rationale: «Por medio de» expresa el instrumento/agencia del hebreo de manera natural en español. Se conserva «mensajeros» porque el contexto apunta a agentes humanos enviados con advertencias, no a ángeles celestiales.
- source_word: מַלְאָכָיו
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - ángeles
  lexicon: HALOT
  rationale: «Mensajeros» evita un traslado erróneo a seres celestiales. En este contexto histórico-crónico, el término se refiere a emisarios proféticos.
- source_word: הַשְׁכֵּם וְשָׁלֹוחַ
  english_pob_choice: rising early and sending
  chosen_spanish: madrugando y enviando
  alternatives_spanish:
  - una y otra vez enviando
  - con insistencia enviando
  - madrugando para enviar
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de diligencia temprana e insistente. «Madrugando y enviando» refleja la estructura del original sin perder la idea de reiteración que el POB inglés dejó para nota.
- source_word: כִּי חָמַל
  english_pob_choice: because he had compassion
  chosen_spanish: porque tuvo compasión
  alternatives_spanish:
  - porque se apiadó
  - porque le dio pena
  lexicon: HALOT
  rationale: '«Tener compasión» transmite bien el matiz de חמל: una piedad que mueve a no destruir de inmediato. Se evita reducirlo a mera lástima.'
- source_word: עַל עַמּוֹ
  english_pob_choice: on his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - sobre su pueblo
  - por su pueblo
  lexicon: HALOT
  rationale: En español, con «tener compasión» resulta más natural «de su pueblo»; el sentido relacional del hebreo queda preservado en la construcción idiomática.
- source_word: מְעוֹנוֹ
  english_pob_choice: his dwelling place
  chosen_spanish: de su morada
  alternatives_spanish:
  - de su habitación
  - de su morada de habitación
  - de su templo
  lexicon: HALOT
  rationale: «Morada» es una opción breve y reverente para el lugar de habitar divino. Mantiene la amplitud del hebreo sin adelantar la identificación interpretativa con «templo» en el texto principal.
theological_decisions:
- issue: Sentido de מַלְאָכָיו en un contexto de advertencia profética
  english_pob_reading: human prophetic messengers
  chosen_spanish_reading: mensajeros humanos proféticos
  alternative_spanish_readings:
  - ángeles
  - enviados celestiales
  rationale: El contexto de Crónicas trata de advertencias reiteradas dadas antes del juicio por medio de voceros enviados. «Mensajeros» en español preserva esa lectura y evita introducir una lectura angélica no exigida por el pasaje.
  doctrine_reference: Historia de la revelación profética en Crónicas; cf. uso contextual de מַלְאָךְ como enviado.
- issue: Relación entre el pueblo de Dios y su lugar de morada
  english_pob_reading: his dwelling place
  chosen_spanish_reading: su morada
  alternative_spanish_readings:
  - su templo
  - su habitación
  rationale: «Morada» conserva la conexión teológica entre la presencia divina y el lugar santo sin reducirlo de antemano a un simple edificio. La identificación con el templo puede explicitarse en nota, como hizo el POB inglés.
  doctrine_reference: Teología del templo en Crónicas; presencia de Yahvé entre su pueblo.
- issue: Valor del idiom hebreo de envío reiterado
  english_pob_reading: rising early and sending
  chosen_spanish_reading: madrugando y enviando
  alternative_spanish_readings:
  - una y otra vez enviando
  - enviando con premura
  rationale: La forma española mantiene la tensión entre literalidad e idiomatismo. No se borra la repetición implícita del hebreo; queda disponible para nota como intensificación de la paciencia divina.
  doctrine_reference: Paciencia y longanimidad divina antes del juicio.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; esta propuesta sigue el pasaje base y conserva las decisiones léxicas y teológicas del POB, con ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH, conforme al estándar del proyecto.
  - Se usa «mensajeros» y no «ángeles», porque el contexto es profético-histórico.
  - «Morada» preserva la amplitud del hebreo מְעוֹן y permite la nota explicativa sobre el templo.
  - La frase verbal «madrugando y enviando» conserva el giro idiomático sin volverlo una paráfrasis libre.
  - Se eligió una puntuación y sintaxis fluidas en español, pero sin perder la correspondencia con la estructura hebrea del versículo.
