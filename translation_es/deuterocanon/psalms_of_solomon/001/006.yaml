translation:
  language: es
  text: Y fueron insolentes en su prosperidad[a], y no soportaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en medio de sus bienes»; el griego ἐν τοῖς ἀγαθοῖς αὐτῶν puede referirse a bienes o ventajas materiales, además de prosperidad.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «no lo soportaron», «no resistieron» o «no perseveraron». El griego deja implícito el objeto del verbo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξύβρισαν
  english_pob_choice: were insolent
  chosen_spanish: se insolentaron
  alternatives_spanish:
  - actuaron con arrogancia
  - se comportaron insolentemente
  - cometieron insolencia
  lexicon: LSJ
  rationale: El verbo griego expresa conducta insolente, soberbia u ofensiva. «Se insolentaron» conserva esa fuerza moral y funciona de manera natural en español sin suavizar el matiz.
- source_word: ἐν τοῖς ἀγαθοῖς αὐτῶν
  english_pob_choice: in their prosperity
  chosen_spanish: en su prosperidad
  alternatives_spanish:
  - en medio de sus bienes
  - entre sus bienes
  - en medio de sus cosas buenas
  lexicon: LSJ
  rationale: La expresión plural puede referirse a bienes, ventajas o prosperidad. En este contexto, la lectura «prosperidad» sigue la decisión inglesa auditada y comunica bien el ámbito de bienestar material sin forzar una traducción demasiado literal.
- source_word: οὐκ ἤνεγκαν
  english_pob_choice: they did not endure
  chosen_spanish: no soportaron
  alternatives_spanish:
  - no lo soportaron
  - no resistieron
  - no perseveraron
  lexicon: LSJ
  rationale: El aoristo de φέρω aquí puede entenderse como «soportar» o «aguantar». Como el griego no expresa objeto explícito, «no soportaron» preserva la tersura y la ambigüedad del original mejor que una expansión interpretativa.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que prefirió «were insolent in their prosperity» y mantuvo el cierre breve «they did not endure». La redacción española sigue esa línea revisada, pero conserva la ambigüedad del segundo hemistiquio con una formulación breve y natural.
  spanish_consistency_notes:
  - Se mantiene «prosperidad» para ἀγαθά, conforme a la decisión auditada inglesa y al contexto de bienes materiales en el pasaje inmediato.
  - «Se insolentaron» preserva el tono moral negativo sin convertirlo en una paráfrasis más amplia que el griego.
  - La segunda cláusula se traduce de forma elíptica para respetar la falta de objeto explícito en el original.
