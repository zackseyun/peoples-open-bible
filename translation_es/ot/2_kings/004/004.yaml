review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo y la línea de la POB inglesa: «Luego entra», «cierra la puerta detrás de ti y detrás de tus hijos», «todos estos recipientes» y «aparta los llenos» comunican adecuadamente la secuencia y la acción. Sin embargo, «vierte sobre todos estos recipientes» no preserva bien el sentido contextual de וְיָצַקְתְּ עַל con recipientes; en español sugiere derramar encima de ellos, no llenarlos. La POB inglesa justificó correctamente «pour into», y el español debe reflejar ese sentido idiomático.'
  spanish_quality_summary: 'El español es claro y legible, pero hay dos problemas de calidad: 1) «vierte sobre» suena poco natural y potencialmente erróneo en este contexto; 2) la nota [a] es innecesaria y engañosa, porque בָּנַיִךְ significa específicamente «tus hijos», no un término amplio para descendencia masculina en este versículo. También conviene evitar el anglicismo sin traducir «vessels» en la nota [b].'
  glossary_alignment: No hay términos teológicos sensibles aquí. El léxico general está bien alineado con el proyecto. «Recipientes» es una buena opción para כֵּלִים, con «vasijas» como alternativa válida en nota. «Aparta los llenos» es aceptable para el sentido práctico de תַּסִּיעִי tras la revisión inglesa al plural colectivo.
  issues:
  - severity: high
    issue: «vierte sobre todos estos recipientes»
    rationale: Con recipientes, «sobre» en español normalmente indica verter encima o por encima, no dentro. El hebreo usa עַל, pero el sentido contextual y la decisión auditada de la POB inglesa es claramente «pour into». Debe decir «vierte en» para preservar el significado.
  - severity: medium
    issue: Nota [a] sobre «tus hijos»
    rationale: La nota afirma que el hebreo usa un término más amplio para descendencia masculina, pero el texto tiene בָּנַיִךְ, específicamente «tus hijos/sons». La nota introduce una inexactitud y debe eliminarse.
  - severity: low
    issue: Uso de «vessels» en nota [b]
    rationale: La nota debe estar plenamente en español. «Vasijas» basta como alternativa léxica tradicional.
  revised_spanish_text: Luego entra, y cierra la puerta detrás de ti y detrás de tus hijos; y vierte en todos estos recipientes[a]; y aparta los llenos.
  revised_footnotes:
  - marker: a
    text: O «vasijas». El término hebreo es amplio y puede abarcar distintos tipos de recipientes.
    reason: lexical_alternative
  revision_rationale: Se cambió «sobre» por «en» para reflejar el sentido contextual correcto de llenar recipientes. Se eliminó la nota errónea sobre «tus hijos» porque el hebreo es específico. Se simplificó y españolizó la nota léxica restante.
