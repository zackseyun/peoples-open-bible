translation:
  language: es
  text: Abraham tomó otra esposa[a], y su nombre era Keturah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abraham tomó una esposa de nuevo». El hebreo literalmente tiene una expresión aditiva: «Abraham añadió y tomó una esposa».'
