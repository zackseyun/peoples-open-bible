translation:
  language: es
  text: Y ahora, he aquí, Yahvé ha puesto un espíritu de mentira[a] en la boca de estos profetas tuyos, y Yahvé ha anunciado desastre[b] contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu de falsedad».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ha hablado mal contra ti»; aquí «mal» se refiere a desastre o calamidad, no a maldad moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora, pues
  lexicon: HALOT
  rationale: Conserva el valor discursivo y temporal de la partícula de enlace al abrir la conclusión de Micaías. «Y ahora» mantiene la conexión con lo anterior mejor que un simple «Ahora».
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he ahí
  lexicon: HALOT
  rationale: Marca deíctica de atención. «He aquí» es formal y fiel al énfasis del hebreo sin sonar excesivamente arcaico en este contexto solemne.
- source_word: נָתַן
  english_pob_choice: has put
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha dado
  - ha colocado
  lexicon: HALOT
  rationale: En combinación con «espíritu» y «en la boca de», «ha puesto» reproduce de manera natural la imagen hebrea de colocar o introducir algo en un lugar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Sigue el término estándar del proyecto para el nombre divino, manteniendo la transparencia frente al texto hebreo y evitando el encubrimiento litúrgico de «SEÑOR».
- source_word: ר֣וּחַ שֶׁ֔קֶר
  english_pob_choice: a lying spirit
  chosen_spanish: un espíritu de mentira
  alternatives_spanish:
  - un espíritu mentiroso
  - un espíritu de falsedad
  lexicon: HALOT
  rationale: El hebreo admite una lectura adjetival o de relación; en español «espíritu de mentira» conserva la cualidad engañosa sin forzar un modismo menos claro. Además deja visible la tensión lexical entre un espíritu caracterizado por la falsedad y la opción más libre «espíritu mentiroso».
- source_word: בְּ/פִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  - en el decir de
  lexicon: HALOT
  rationale: Mantiene la imagen corporal del hebreo y su valor idiomático. En español, «en la boca de» es directo y suficientemente transparente para la metáfora profética.
- source_word: נְבִיאֶ֣י/ךָ אֵ֑לֶּה
  english_pob_choice: these prophets of yours
  chosen_spanish: estos profetas tuyos
  alternatives_spanish:
  - estos profetas de ti
  - tus profetas estos
  lexicon: HALOT
  rationale: Conserva el demostrativo y el posesivo de segunda persona. «Profetas tuyos» es natural y retiene el tono confrontativo del hebreo.
- source_word: דִּבֶּ֥ר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - ha declarado
  lexicon: HALOT
  rationale: «Ha hablado» conserva la forma verbal general del hebreo y deja que el complemento determine el sentido judicial de la frase.
- source_word: עָלֶ֖י/ךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - acerca de ti
  lexicon: HALOT
  rationale: En este contexto de juicio, la preposición expresa hostilidad u ओरientación adversa; «contra ti» comunica mejor esa fuerza que una opción meramente locativa o temática.
- source_word: רָעָֽה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - ruina
  lexicon: HALOT
  rationale: El término hebreo puede designar calamidad o desgracia en oráculo judicial. «Desastre» expresa el daño anunciado sin atribuir a Yahvé mal moral, preservando la tensión teológica del pasaje.
theological_decisions:
- issue: Nombre divino YHWH en un dicho profético de juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva la transparencia del tetragrámaton según la política del proyecto. En un pasaje donde la identidad del hablante divino importa, ocultarla detrás de «SEÑOR» debilitaría el vínculo con el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre Dios y el 'espíritu de mentira'
  english_pob_reading: Yahweh has put a lying spirit in the mouth of these prophets of yours
  chosen_spanish_reading: Yahvé ha puesto un espíritu de mentira en la boca de estos profetas tuyos
  alternative_spanish_readings:
  - Yahvé ha puesto un espíritu mentiroso en la boca de estos profetas tuyos
  - Yahvé ha puesto un espíritu de falsedad en la boca de estos profetas tuyos
  rationale: La traducción mantiene la atribución divina tal como la presenta el hebreo y no suaviza la tensión teológica. El texto afirma soberanía divina en el juicio sin explicar o resolver el modo en que el engaño opera.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve theological tension rather than resolve it)'
- issue: Valor de רָעָה respecto de la acción divina
  english_pob_reading: spoken disaster against you
  chosen_spanish_reading: ha hablado desastre contra ti
  alternative_spanish_readings:
  - ha hablado mal contra ti
  - ha hablado calamidad contra ti
  - ha hablado maldad contra ti
  rationale: En este contexto profético, רָעָה apunta a calamidad/jucio, no a mal moral. «Desastre» evita imputar maldad ética a Dios y mantiene la lectura de sentencia adversa contra Acab.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado más reciente del audit trail: mantiene el registro formal de «he aquí», conserva la imagen hebrea de poner un espíritu en la boca de los profetas y refleja la revisión final que prefirió una fórmula más formal y transparente sin alterar el contenido semántico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «espíritu» y no se introduce una paráfrasis que diluya la imagen profética.
  - «Desastre» traduce רָעָה en su sentido judicial, preservando la tensión teológica documentada.
  - La construcción «estos profetas tuyos» retiene el demostrativo y el posesivo del hebreo.
  - Las notas usan letras únicas y están ancladas en el texto principal con [a] y [b].
