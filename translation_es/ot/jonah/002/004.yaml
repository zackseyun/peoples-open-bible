translation:
  language: es
  text: Tú me arrojaste[a] a lo profundo, al corazón de los mares, y la corriente me rodeó; todos tus rompientes y tus olas pasaron sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el río me rodeó», tomando נָהָר en su sentido más usual de «río»; en este contexto poético probablemente alude más bien a la corriente o a la embestida del agua del mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁלִיכֵנִי
  english_pob_choice: You cast me
  chosen_spanish: Tú me arrojaste
  alternatives_spanish:
  - Tú me lanzaste
  - Tú me echaste
  lexicon: HALOT
  rationale: El verbo hebreo transmite acción de arrojar/castar con fuerza. En español, «arrojar» conserva bien esa violencia poética; «lanzar» sería posible, pero menos natural en este contexto. Se mantiene el sujeto en segunda persona para reflejar la dirección explícita a Dios del hebreo y del POB inglés.
- source_word: מְצוּלָה
  english_pob_choice: into the deep
  chosen_spanish: a lo profundo
  alternatives_spanish:
  - en lo profundo
  - al abismo marino
  lexicon: HALOT
  rationale: La palabra apunta a la hondura abisal del mar. «A lo profundo» es una forma natural y sobria que evita forzar una concreción excesiva; conserva la imagen de inmersión sin reducirla a un simple lugar.
- source_word: בִּלְבַב יַמִּים
  english_pob_choice: into the heart of the seas
  chosen_spanish: al corazón de los mares
  alternatives_spanish:
  - en el corazón de los mares
  - al centro de los mares
  lexicon: HALOT
  rationale: «Corazón» reproduce el hebraísmo de לְבַב y conserva la metáfora vívida. Se mantiene el plural «mares» por fidelidad al hebreo y al POB inglés, que preserva la imagen plural en vez de normalizarla.
- source_word: וְנָהָר
  english_pob_choice: and the current
  chosen_spanish: y la corriente
  alternatives_spanish:
  - y el río
  - y la inundación
  - y el torrente
  lexicon: HALOT
  rationale: Aunque el sentido más frecuente de נָהָר es «río», en este marco marítimo la referencia probable es al flujo/corriente de agua. «Corriente» expresa bien esa fuerza acuática sin imponer «río» donde el contexto poético apunta al mar.
- source_word: יְסֹבְבֵנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodeó
  alternatives_spanish:
  - me cercó
  - me envolvió
  lexicon: HALOT
  rationale: El verbo סבב significa rodear/ceñir. «Me rodeó» es claro, natural y suficientemente fuerte; mantiene la idea de cerco acuático.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todos los
  - la totalidad de
  lexicon: HALOT
  rationale: Concuerda con los sustantivos femeninos plurales implícitos en español («rompientes» y «olas») y preserva la cuantificación total del hebreo.
- source_word: מִשְׁבָּרֶיךָ
  english_pob_choice: your breakers
  chosen_spanish: tus rompientes
  alternatives_spanish:
  - tus olas rompientes
  - tus rompederas
  lexicon: HALOT
  rationale: מִשְׁבָּר designa olas rompientes/surf. «Rompientes» conserva el valor técnico-poético y evita la pérdida de fuerza que tendría simplemente «olas».
- source_word: וְגַלֶּיךָ
  english_pob_choice: and your waves
  chosen_spanish: y tus olas
  alternatives_spanish:
  - y tus marejadas
  - y tus ondas
  lexicon: HALOT
  rationale: גַלִּים son «olas». Se mantiene el posesivo «tus» para reflejar la soberanía divina marcada por el sufijo hebreo y por la lectura teológica del POB inglés.
- source_word: עָלַי עָבָרוּ
  english_pob_choice: passed over me
  chosen_spanish: pasaron sobre mí
  alternatives_spanish:
  - me sobrepasaron
  - me arrollaron
  lexicon: HALOT
  rationale: La construcción expresa que las aguas se movieron sobre Jonah con fuerza abrumadora. «Pasaron sobre mí» es fiel e idiomático; «me arrollaron» intensificaría demasiado y cambiaría el matiz.
theological_decisions:
- issue: Agencia divina directa en la caída de Jonás
  english_pob_reading: Retain direct address to God throughout ('You cast me ... your breakers and your waves')
  chosen_spanish_reading: 'Mantener el tú directo a Dios: «Tú me arrojaste ... tus rompientes y tus olas»'
  alternative_spanish_readings:
  - 'Suavizar la agencia con un impersonal: «fui arrojado»'
  - Dejar la acción a agentes humanos implícitos
  rationale: 'El hebreo usa formas de segunda persona singular y sufijos posesivos de segunda persona. La traducción conserva esa tensión teológica: Jonás atribuye su descenso a la acción soberana de Dios, sin resolverla eliminando el papel narrativo de otros agentes.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto se alinea con la revisión más reciente sin cambios requeridos: el inglés POB mantiene alta concordancia con la fuente hebrea, y no hay variantes textuales añadidas en el expediente actual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca en el libro; aquí el sujeto se expresa en segunda persona sin necesidad de nombrarlo.
  - Se conserva un registro poético sobrio y publicable, evitando tanto el literalismo áspero como la paráfrasis libre.
  - «Rompientes» se usa como término técnico-poético coherente con el campo semántico de mar agitado y no se sustituye por «espumas» o «oleaje», que debilitarían la imagen.
  - La puntuación reproduce la cadencia paralela del hebreo con dos miembros principales separados por punto y coma, seguida de una cláusula acumulativa final.
