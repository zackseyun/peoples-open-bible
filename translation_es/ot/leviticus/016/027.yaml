review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del audit trail inglés: conserva ''ofrenda por el pecado'', ''hacer expiación'', ''en el santuario'', el cambio singular/plural (''lo sacará ... y quemarán'') y la lista final de partes quemadas. Sin embargo, omite el matiz direccional de ''brought in'' al no explicitar que la sangre fue llevada hacia adentro, y ''lo sacará'' introduce un singular pronominal poco natural para dos animales coordinados.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''lo sacará fuera del campamento'' suena discordante porque el referente es doble; ''los sacará'' o mejor una reformulación sin clítico evita esa fricción. También conviene ''fue llevada adentro'' o ''fue introducida'' para reflejar mejor הוּבָא. Las notas actuales b y c degradan la precisión léxica: ''cuerpo'' no es una alternativa adecuada para בשר aquí, y ''desecho'' no corresponde bien a פירש.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: no aparece el nombre divino, חטאת se vierte como ''ofrenda por el pecado'', כפר como ''hacer expiación'', y בשר como ''carne''. La mejoría necesaria es ajustar las notas léxicas para que reflejen alternativas reales del expediente inglés y del hebreo.'
  issues:
  - severity: medium
    issue: Pronombre singular 'lo sacará' con dos referentes coordinados
    rationale: 'El hebreo tiene objeto compuesto (''el toro ... y el macho cabrío ...'') y luego singular verbal; en español, el clítico singular ''lo'' suena incorrecto o confuso. Puede conservarse el singular verbal con una formulación natural: ''los sacará fuera del campamento''.'
  - severity: medium
    issue: '''fue llevada'' no refleja claramente el sentido de entrada de הוּבָא'
    rationale: El expediente inglés justificó 'was brought in'. En español conviene 'fue llevada adentro' o 'fue introducida' para preservar la dirección hacia el santuario.
  - severity: medium
    issue: Nota b propone 'cuerpo' para 'carne'
    rationale: בְּשָׂרָם en este contexto sacrificial significa 'carne/flesh', no 'cuerpo'. La alternativa desorienta y no está apoyada por el expediente inglés.
  - severity: medium
    issue: Nota c propone 'desecho' para 'estiércol'
    rationale: פִּרְשָׁם se refiere específicamente a excremento/dung, no a un desecho genérico. La nota debería limitarse a una alternativa como 'excrementos'.
  - severity: low
    issue: Falta nota sobre la alternativa idiomática del movimiento hacia fuera
    rationale: El expediente inglés preserva una nota sobre la expresión más literal/idiomática de 'outside the camp'. En español no es indispensable, pero sí conviene conservar la nota del cambio singular/plural, que actualmente se perdió del texto anotado.
