base_translation:
  language: en
  yaml_path: translation/deuterocanon/additions_to_esther/002/005.yaml
  text: Therefore[a], having recognized that this nation alone is continually set in opposition to every people, introducing an alien manner of life by altering the laws, and being ill-disposed toward our affairs, bringing about the worst evils, so that the kingdom does not attain stability[b],
  footnotes:
  - marker: a
    text: Or 'everyone.' The Greek says 'every man' with generic force.
    reason: lexical_alternative
  - marker: b
    text: The wording about their 'laws' and 'way of life' is rhetorically compressed and hostile; it portrays the nation as practicing customs alien to the empire.
