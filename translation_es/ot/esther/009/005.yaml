  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los judíos', 'destrucción' y la diferenciación léxica entre 'enemigos' y 'los que los aborrecían' están bien alineadas. No aplica terminología especial como Yahvé/Mesías.
