  text: וַ/יהוָ֞ה חָפֵ֤ץ דַּכְּא/וֹ֙ הֶֽחֱלִ֔י אִם תָּשִׂ֤ים אָשָׁם֙ נַפְשׁ֔/וֹ יִרְאֶ֥ה זֶ֖רַע יַאֲרִ֣יךְ יָמִ֑ים וְ/חֵ֥פֶץ יְהוָ֖ה בְּ/יָד֥/וֹ יִצְלָֽח־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/053/010.yaml
  text: Yet it pleased Yahweh to crush him[a]; he made him sick. If his life makes a guilt offering, he will see offspring, he will prolong his days[e][d][c][b], and the pleasure of Yahweh will prosper in his hand.
  footnotes:
  - marker: a
    text: Or 'And the LORD' or 'But the LORD'; the Hebrew conjunction can be rendered in several ways depending on discourse flow.
    reason: lexical_alternative
  - marker: b
    text: Or 'he afflicted him' or 'he caused grief.'
    reason: lexical_alternative
  - marker: c
    text: Or 'When his life is made a guilt offering,' or 'If you make his life a guilt offering.' The Hebrew of this clause is difficult, especially the subject of 'make.'
    reason: alternative_reading
  - marker: d
    text: '''Guilt offering'' refers to the sacrificial offering for guilt/reparation in the Torah.'
    reason: cultural_note
  - marker: e
    text: Or 'the will/purpose of the LORD will succeed by his hand.'
    reason: lexical_alternative
