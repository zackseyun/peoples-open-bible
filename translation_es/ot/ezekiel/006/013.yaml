translation:
  language: es
  text: 'Entonces sabrán que yo soy Yahvé, cuando sus muertos estén en medio de sus ídolos[a], alrededor de sus altares, en todo collado alto, en todas las cumbres de los montes, y debajo de todo árbol frondoso y debajo de todo terebinto frondoso: los lugares donde ofrecieron allí un aroma agradable a todos sus ídolos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término fuertemente despectivo para los ídolos; puede entenderse más literalmente como «ídolos de estiércol» o «ídolos inmundos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: La forma verbal en contexto profético expresa resultado futuro; «Entonces» conserva la fuerza consecutiva de וִ + perfecto sin sonar mecánico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino en español. «Yahvé» es la forma más establecida y legible en español bíblico, preservando el nombre propio del pacto.
- source_word: בִּהְיוֹת
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al estar
  - en el estar
  lexicon: HALOT
  rationale: El infinitivo con prefijo introduce la circunstancia temporal; «cuando» expresa de manera natural el marco en que se reconocerá a Yahvé.
- source_word: חַלְלֵיהֶם
  english_pob_choice: their slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - sus caídos
  - sus muertos violentamente
  lexicon: HALOT
  rationale: חַלְלֵי designa a los muertos en contexto de juicio, pero «muertos» evita una dureza innecesaria en español y sigue el sentido general del pasaje. Se conserva el matiz de muerte por juicio en la escena.
- source_word: בְּתוֹךְ גִּלּוּלֵיהֶם
  english_pob_choice: among their idols
  chosen_spanish: en medio de sus ídolos
  alternatives_spanish:
  - entre sus ídolos
  lexicon: HALOT
  rationale: «En medio de» reproduce con precisión la relación espacial de בְּתוֹךְ y mantiene la imagen de los cadáveres dentro del ámbito idolátrico.
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos despreciables
  - sus ídolos repugnantes
  lexicon: HALOT
  rationale: El término hebreo es despectivo, pero el sentido básico requerido por el texto es «ídolos». El matiz despreciativo se puede preservar en nota sin forzar una expresión antinatural en el cuerpo del texto.
- source_word: סְבִיבוֹת מִזְבְּחוֹתֵיהֶם
  english_pob_choice: all around their altars
  chosen_spanish: alrededor de sus altares
  alternatives_spanish:
  - todo alrededor de sus altares
  - rodeando sus altares
  lexicon: HALOT
  rationale: La frase indica circundamiento espacial; «alrededor de» es natural y fiel al hebreo.
- source_word: אֶל כָּל גִּבְעָה רָמָה
  english_pob_choice: on every high hill
  chosen_spanish: sobre todo collado alto
  alternatives_spanish:
  - en todo collado alto
  - sobre cada collado alto
  lexicon: HALOT
  rationale: El hebreo lista lugares de culto; «sobre» comunica bien la ubicación. «Collado alto» conserva el paralelismo con las alturas del verso, aunque también serían posibles «colina alta» o «monte alto».
- source_word: בְּכֹל רָאשֵׁי הֶהָרִים
  english_pob_choice: on all the mountaintops
  chosen_spanish: en todas las cumbres de los montes
  alternatives_spanish:
  - sobre todas las cumbres de los montes
  - en todos los montes, en sus cumbres
  lexicon: HALOT
  rationale: «Rashei heharim» es un modismo para las cumbres; «cumbres de los montes» lo expresa con claridad y conserva el plural distributivo.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: under every green tree
  chosen_spanish: y debajo de todo árbol frondoso
  alternatives_spanish:
  - y debajo de todo árbol verde
  - y bajo todo árbol frondoso
  lexicon: HALOT
  rationale: «Frondoso» comunica la idea de árbol vigoroso/lozano y suena más natural que un calco literal de «verde» en esta fórmula profética.
- source_word: וְתַחַת כָּל אֵלָה עֲבֻתָּה
  english_pob_choice: under every leafy terebinth
  chosen_spanish: y debajo de toda encina espesa
  alternatives_spanish:
  - y debajo de todo terebinto frondoso
  - y debajo de toda encina frondosa
  lexicon: HALOT
  rationale: 'אֵלָה probablemente designa el terebinto; en español «encina» es una aproximación tradicional y comprensible, y «espesa» intenta reflejar עֲבֻתָּה. Se reconoce una tensión lexical: la especie exacta no es segura, pero el rasgo de densidad sí lo es.'
- source_word: מְקוֹם אֲשֶׁר
  english_pob_choice: the places where
  chosen_spanish: el lugar donde
  alternatives_spanish:
  - los lugares donde
  - el sitio donde
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, en español la serie de ubicaciones puede resumirse naturalmente con singular colectivo. Aquí se opta por conservar la fluidez del final del versículo.
- source_word: נָתְנוּ שָׁם
  english_pob_choice: they offered there
  chosen_spanish: ofrecieron allí
  alternatives_spanish:
  - presentaron allí
  - dieron allí
  lexicon: HALOT
  rationale: נָתַן en contexto cultual significa ofrecer/presentar sacrificios u ofrendas; «ofrecieron» capta mejor el acto ritual que un mero «pusieron» o «dieron».
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: un olor agradable
  alternatives_spanish:
  - un aroma agradable
  - un olor placentero
  lexicon: HALOT
  rationale: Se conserva el giro sacrificial con una formulación natural en español. «Agradable» comunica bien el valor aceptable/placentero de la expresión hebrea.
- source_word: לְכֹל גִּלּוּלֵיהֶם
  english_pob_choice: to all their idols
  chosen_spanish: a todos sus ídolos
  alternatives_spanish:
  - para todos sus ídolos
  - ante todos sus ídolos
  lexicon: HALOT
  rationale: La preposición puede indicar destinatario o referencia cultual; «a» es la opción más directa en español y encaja con la idea de una ofrenda dirigida a los ídolos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: 'Se mantiene el nombre propio del Dios del pacto, en lugar de ocultarlo con un título. Esto sigue la política del proyecto y hace visible el énfasis del texto: conocerán que es Yahvé.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término peyorativo גִּלּוּלִים
  english_pob_reading: idols in the main text, with pejorative nuance preserved in a footnote
  chosen_spanish_reading: ídolos en el texto principal, con nota sobre el matiz despectivo
  alternative_spanish_readings:
  - ídolos inmundos
  - ídolos repugnantes
  rationale: El hebreo es deliberadamente despectivo, pero en español conviene mantener «ídolos» en el cuerpo del texto para no sacrificar legibilidad. La nota preserva la tensión semántica y evita suavizar indebidamente el insulto profético.
  doctrine_reference: DOCTRINE.md Translation philosophy §5, consistency of key terms or documented exception
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última revisión; no hubo cambios aplicados y el acuerdo de revisión fue alto. La presente redacción española sigue esa lectura sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino en todo el versículo.
  - Se mantiene «ídolos» en el texto principal para seguir la decisión inglesa, y el matiz despectivo queda en nota.
  - 'La imagen espacial se mantiene de forma paralela: en medio / alrededor / sobre / debajo.'
  - «Olor agradable» reproduce el lenguaje sacrificial sin arcaizar innecesariamente.
  - «Encina espesa» refleja la densidad del hebreo y usa una especie comprensible en español, reconociendo la incertidumbre botánica.
