translation:
  language: es
  text: Por eso mis entrañas gimen como un arpa[a] por Moab, y mi ser íntimo por Quir-heres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una lira»; el hebreo kinnor designa un instrumento de cuerdas.
    reason: lexical_alternative
  - marker: b
    text: Quir-heres es una ciudad moabita; tradicionalmente, «Quir-hareset».
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mi corazón
  - mi ser interior
  - mis entrañas
  lexicon: HALOT
  rationale: מֵעַי nombra literalmente las partes internas, y en este contexto de lamento expresa emoción profunda. En español, «entrañas» conserva la imagen corporal concreta mejor que «corazón», y suena natural en un registro bíblico moderno.
- source_word: לְמוֹאָב
  english_pob_choice: for Moab
  chosen_spanish: por Moab
  alternatives_spanish:
  - para Moab
  - contra Moab
  - por Moab
  lexicon: HALOT
  rationale: La preposición ל aquí marca el objeto hacia el cual se dirige la lamentación. «Por Moab» comunica mejor la aflicción simpatética que un simple «para».},{
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin cambios sustanciales; la revisión más reciente también lo dejó igual. La versión española sigue la misma decisión principal: conservar el símil musical y el nombre de lugar transliterado.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo entre מֵעַי y קִרְבִּי con dos expresiones corporales distintas en español: «mis entrañas» y «mi ser íntimo».'
  - Se usó «Quir-heres» siguiendo la transliteración preferida del POB inglés, con una nota de alternativa léxica para el instrumento de cuerdas.
  - La puntuación reproduce dos miembros poéticos coordinados por coma y «y», con tono solemne y bíblico.
