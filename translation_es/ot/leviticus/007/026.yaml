translation:
  language: es
  text: Y no comerán sangre alguna en todas sus moradas[a], ni de ave[b] ni de animal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en todos sus lugares de habitación» o «en todos sus asentamientos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para ave y para animal»; el sentido es sangre que pertenece a o proviene de aves y animales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And ... any
  chosen_spanish: sangre alguna
  alternatives_spanish:
  - toda sangre
  - ninguna sangre
  lexicon: HALOT
  rationale: En español, la combinación negativa con un indefinido expresa mejor la fuerza distributiva de כָּל bajo negación. «Sangre alguna» evita el calco de «toda sangre» y conserva el sentido de prohibición total sin sonar forzado.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: HALOT
  rationale: «Sangre» es el equivalente directo y adecuado para דָּם en este contexto legal y alimentario.
- source_word: לֹא תֹאכְלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No han de comer
  - No comerán ustedes
  lexicon: HALOT
  rationale: La forma prohibitiva en español se expresa de manera natural con futuro de mandato o con perífrasis negativa. «No comerán» conserva el tono legal prescriptivo del hebreo sin arcaísmo excesivo.
- source_word: בְּ/כֹל מוֹשְׁבֹתֵיכֶם
  english_pob_choice: in any of your dwellings
  chosen_spanish: en ninguna de sus moradas
  alternatives_spanish:
  - en todas sus moradas
  - en todos sus asentamientos
  - dondequiera que habiten
  lexicon: HALOT
  rationale: «מוֹשְׁבֹתֵיכֶם» se refiere a los lugares donde habitan o se establecen. «Moradas» comunica bien el ámbito residencial; con la negación, «en ninguna de sus moradas» refleja la distribución de בְּכֹל y el alcance universal de la prohibición.
- source_word: לָ/ע֖וֹף
  english_pob_choice: from bird
  chosen_spanish: ni de ave
  alternatives_spanish:
  - ni de pájaro
  - ni de ave alguna
  lexicon: HALOT
  rationale: El prefijo לַ aquí marca la categoría a la que pertenece la sangre. «De ave» reproduce de manera natural esa relación de procedencia o pertenencia en español.
- source_word: וְ/לַ/בְּהֵמָה
  english_pob_choice: or from animal
  chosen_spanish: ni de animal
  alternatives_spanish:
  - o de animal
  - ni de bestia
  - ni de ganado
  lexicon: HALOT
  rationale: En este par categorial, español expresa mejor la coordinación negativa con «ni». «Animal» es claro y amplio; evita restringir el sentido a ganado y evita arcaísmos como «bestia».
theological_decisions:
- issue: Alcance de la prohibición de la sangre
  english_pob_reading: The verse prohibits consuming any blood from either birds or animals in all places where Israel dwells.
  chosen_spanish_reading: La prohibición abarca cualquier sangre, sea de ave o de animal, y rige en todas sus moradas.
  alternative_spanish_readings:
  - La prohibición se limita solo a ciertas clases de sangre
  - 'La frase final podría dejarse más literal: «para ave y para animal»'
  rationale: La sintaxis hebrea apunta a una prohibición general de ingerir sangre dentro del ámbito de la vida cotidiana de Israel. La versión española mantiene esa amplitud sin añadir explicación teológica extra ni reducir el alcance.
  doctrine_reference: Levítico 7:26; cf. el tema bíblico de la sangre como algo prohibido para consumo humano en la Torá.
translation_notes:
  revision_awareness: 'Se siguió de cerca el sentido legal del hebreo y el audit trail inglés: la negación distributiva de כָּל, el ámbito residencial de מוֹשְׁבֹתֵיכֶם y la enumeración categorial «ave/animal». No se adoptó el calco inglés «whether from... or from...» porque en español la coordinación negativa «ni... ni...» expresa mejor el paralelismo sin perder precisión.'
  spanish_consistency_notes:
  - Se emplea «moradas» para מוֹשְׁבֹתֵיכֶם por ser suficientemente amplia y comprensible en registro bíblico moderno.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el tetragrámaton ni nombres divinos.
  - Se mantiene «ave» en singular genérico, coherente con una lectura categorial de לָעוֹף.
