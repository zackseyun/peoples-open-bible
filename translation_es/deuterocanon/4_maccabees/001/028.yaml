translation:
  language: es
  text: Por tanto, así como el placer y el dolor son dos brotes[a] del cuerpo y del alma, muchas pasiones son retoños de estos[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plantas» o «brotes» del cuerpo y del alma; el griego usa una imagen botánica a lo largo de la oración.
    reason: lexical_alternative
  - marker: b
    text: O «emociones» o «afecciones»; la palabra griega puede designar las pasiones o impulsos afectivos que la razón debe gobernar en esta obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ οὖν
  english_pob_choice: Therefore, just as
  chosen_spanish: Por tanto, así como
  alternatives_spanish:
  - De modo que, así como
  - Así pues, así como
  lexicon: LSJ
  rationale: καθάπερ introduce comparación directa y οὖν añade continuidad inferencial. «Por tanto» conserva la consecuencia lógica; «así como» mantiene la estructura comparativa natural en español.
- source_word: δυοῖν
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - un par de
  - dos cosas
  lexicon: LSJ
  rationale: El dual marca exactamente dos elementos. «Dos» es la forma más clara y fiel en español.
- source_word: τοῦ σώματος καὶ τῆς ψυχῆς
  english_pob_choice: of the body and the soul
  chosen_spanish: del cuerpo y del alma
  alternatives_spanish:
  - del cuerpo y del espíritu
  - del cuerpo y de la vida
  lexicon: LSJ
  rationale: El griego presenta el par antropológico cuerpo/alma. «Alma» preserva la correspondencia conceptual sin forzar una precisión doctrinal ajena al pasaje.
- source_word: φυτῶν
  english_pob_choice: growths
  chosen_spanish: brotes
  alternatives_spanish:
  - plantas
  - retoños
  - vástagos
  lexicon: LSJ
  rationale: Aunque literalmente significa «plantas», el contexto metafórico pide una imagen orgánica de surgimiento. «Brotes» conserva la metáfora botánica sin volverla extraña en español.
- source_word: ἡδονῆς τε καὶ πόνου
  english_pob_choice: pleasure and pain
  chosen_spanish: el placer y el dolor
  alternatives_spanish:
  - el deleite y el dolor
  - el placer y el sufrimiento
  lexicon: LSJ
  rationale: «Placer y dolor» reproduce el par básico de experiencias afectivas del argumento y corresponde al valor filosófico del griego.
- source_word: πολλαὶ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: LSJ
  rationale: Adjetivo cuantitativo simple; «muchas» es natural y suficiente.
- source_word: τούτων
  english_pob_choice: of these
  chosen_spanish: de éstos
  alternatives_spanish:
  - de estas
  - de ellos
  lexicon: LSJ
  rationale: Remite a «el placer y el dolor» como fuente. «De éstos» mantiene la dependencia y la referencia retrospectiva.
- source_word: τῶν παθῶν
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - emociones
  - afecciones
  - sufrimientos
  lexicon: LSJ
  rationale: 'En 4 Macabeos πάθη tiene sentido filosófico-ético: impulsos/pasiones que la razón debe gobernar. «Pasiones» preserva ese peso técnico.'
- source_word: εἰσι παραφυάδες
  english_pob_choice: are offshoots
  chosen_spanish: son retoños
  alternatives_spanish:
  - son brotes laterales
  - son derivados
  - son ramas
  lexicon: LSJ
  rationale: παραφυάδες continúa la metáfora vegetal y expresa crecimiento lateral desde un tronco principal. «Retoños» comunica dependencia orgánica y mantiene el campo botánico.
theological_decisions:
- issue: ψυχή en la antropología del pasaje
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - espíritu
  - vida
  rationale: El contexto filosófico contrasta cuerpo y ψυχή como dos ámbitos humanos. «Alma» preserva ese contraste sin reducirlo a una lectura de «vida» que debilitaría la estructura antropológica del argumento.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy; preserve theological tension rather than resolve it
- issue: πάθη como categoría ética-filosófica
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - emociones
  - afecciones
  rationale: El pasaje habla de impulsos anímicos derivados del placer y del dolor. «Pasiones» mantiene la categoría moral y filosófica que el autor desarrolla en 4 Macabeos, sin suavizarla a «emociones».
  doctrine_reference: DOCTRINE.md §Translation philosophy, keep documented lexical tension
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y el criterio auditado de la POB en inglés. Se mantuvo la metáfora botánica de φυτῶν/παραφυάδες, la relación inferencial de καθάπερ οὖν y el valor filosófico de πάθη. No se detectaron revisiones aplicadas en el registro inglés, por lo que el draft español refleja el estado vigente del texto base.
  spanish_consistency_notes:
  - Se usa «alma» para ψυχή conforme al paralelo antropológico cuerpo/alma del pasaje.
  - Se usa «pasiones» para πάθη para conservar el sentido ético-filosófico, no meramente emocional.
  - La metáfora vegetal se mantiene con «brotes» y «retoños» sin convertirla en explicación interpretativa.
  - Se conserva el enlace lógico inicial con «Por tanto, así como» como equivalente natural de la inferencia comparativa del griego.
