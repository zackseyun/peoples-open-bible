    rationale: La nota explica la diferencia entre «rey de los persas» y «rey de Persia», así que debe marcar el sintagma «rey de los persas», no «estas cosas».
  - severity: medium
    issue: «Quelquías» es una transliteración poco natural en español.
    rationale: Aunque busca reflejar el griego, en español bíblico una adaptación con J inicial («Jelquías») suena más natural y sigue distinguiéndose de la forma hebrea más conocida «Hilkías», que puede quedar en nota.
