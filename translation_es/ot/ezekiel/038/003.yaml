translation:
  language: es
  text: 'y dirás: «Así dice el Señor Yahvé: He aquí, yo estoy contra ti, Gog, príncipe de Rosh[a], Mesec y Tubal»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «príncipe jefe de Mesec y Tubal». La palabra hebrea rosh puede leerse como «jefe» o tomarse como nombre propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y dirás tú
  - y dirás entonces
  lexicon: HALOT
  rationale: La forma verbal masculina singular con conjunción expresa la continuación de la comisión profética. En español, «y dirás» conserva el mandato y suena natural en un registro bíblico digno.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un presente solemne en español para reflejar la fuerza discursiva del hebreo y mantener el registro oracular.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Soberano Yahvé
  lexicon: HALOT
  rationale: Se sigue el uso del POB para יהוה con «Yahvé» en el texto principal. «Adonay Yahvé» combina el título y el nombre divino; en español, «el Señor Yahvé» comunica ambos sin ocultar el nombre propio.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: La partícula deíctica introduciendo un anuncio solemne se expresa con «He aquí», que conserva el tono profético elevado mejor que una opción coloquial.
- source_word: אֵלֶיךָ
  english_pob_choice: I am against you
  chosen_spanish: yo estoy contra ti
  alternatives_spanish:
  - estoy contra ti
  - vengo contra ti
  lexicon: HALOT
  rationale: En este contexto de juicio hostil, la dirección de la frase es adversativa. «Estoy contra ti» evita ambigüedad y respeta la tensión del oráculo.
- source_word: גּוֹג
  english_pob_choice: Gog
  chosen_spanish: Gog
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa.
- source_word: נְשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - jefe
  lexicon: HALOT
  rationale: El sustantivo designa un gobernante o príncipe; «príncipe» es el equivalente más natural y mantiene el carácter titulado de la expresión.
- source_word: רֹאשׁ
  english_pob_choice: Rosh
  chosen_spanish: Rosh
  alternatives_spanish:
  - cabeza
  - jefe
  lexicon: HALOT
  rationale: 'Se preserva la tensión textual documentada por el POB: רֹאשׁ puede leerse como nombre propio o como nombre común. En el texto principal se conserva como «Rosh» para no resolver la ambigüedad sin necesidad.'
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Mesec
  - Meshec
  lexicon: HALOT
  rationale: Nombre propio etnogeográfico; en español bíblico es corriente «Mesec», forma breve y reconocible.
- source_word: וְתֻבָל
  english_pob_choice: and Tubal
  chosen_spanish: y Tubal
  lexicon: HALOT
  rationale: Nombre propio coordinado con la conjunción; se mantiene la forma transliterada usual en español bíblico.
theological_decisions:
- issue: Cómo renderizar אֲדֹנָי יְהוִה sin ocultar el nombre divino ni producir una repetición extraña en español.
  english_pob_reading: the Lord GOD; YHWH rendered as 'the LORD' in English convention, while preserving the compound divine title.
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El POB en español debe mostrar Yahvé en el texto principal. Dado que אֲדֹנָי acompaña a YHWH, «el Señor Yahvé» preserva tanto el título como el nombre propio sin mascarlo con una convención tipográfica distinta.
  doctrine_reference: Nombre divino y fidelidad textual (Éxodo 3:15; Éxodo 6:2–3)
- issue: Si רֹאשׁ debe entenderse como nombre propio o como sustantivo común ('jefe/cabeza').
  english_pob_reading: 'common noun: ''chief prince of Meshech and Tubal'' with note preserving ''prince of Rosh, Meshech, and Tubal.'''
  chosen_spanish_reading: 'nombre propio: «príncipe de Rosh, Mesec y Tubal»'
  alternative_spanish_readings:
  - «príncipe jefe de Mesec y Tubal»
  - «gran príncipe de Mesec y Tubal»
  rationale: La revisión del POB favorece reflejar de forma más directa la construcción hebrea y mantener la lectura de רֹאשׁ como posible nombre propio. Por eso el texto principal conserva «Rosh» y la nota retiene la alternativa de lectura común.
  doctrine_reference: Primacía del hebreo y preservación de la tensión interpretativa
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó la expresión desde 'chief prince of Meshech and Tubal' a 'prince of Rosh, Meshech, and Tubal' para reflejar de modo más directo la construcción hebrea y la posibilidad de רֹאשׁ como nombre propio. La redacción española sigue esa revisión principal, manteniendo en nota la alternativa tradicional de lectura común.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se mantiene «Mesec» como forma española bíblica habitual de מֶשֶׁךְ.
  - Se preserva la tensión de רֹאשׁ mediante nota, sin forzar la decisión interpretativa en el texto principal.
  - El registro busca ser bíblico y publicable, con puntuación de estilo castellano moderno.
