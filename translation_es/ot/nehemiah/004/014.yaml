translation:
  language: es
  text: En el lugar donde oigan el sonido de la trompeta[a], reúnanse allí a nosotros. Nuestro Dios peleará por nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido del cuerno de carnero». El hebreo shofar se refiere específicamente a un cuerno usado como trompeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְקוֹם
  english_pob_choice: At the place
  chosen_spanish: En el lugar
  alternatives_spanish:
  - En ese lugar
  - Donde
  lexicon: HALOT
  rationale: La construcción preposicional expresa ubicación concreta; en español, «en el lugar» conserva el sentido locativo sin sonar forzado.
- source_word: תִּשְׁמְעוּ
  english_pob_choice: you hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oyen
  lexicon: HALOT
  rationale: El verbo hebreo es el habitual de oír; el imperativo plural en español debe sonar natural en una instrucción. Aquí «oigan» mantiene el valor auditivo sin introducir una idea de obediencia que el verbo no exige por sí mismo.
- source_word: קוֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del shofar
  alternatives_spanish:
  - el sonido de la trompeta
  - el toque del shofar
  - el sonido del cuerno de carnero
  lexicon: HALOT
  rationale: «קול» exige conservar «sonido». Se mantiene «shofar» porque el término hebreo designa con precisión ese instrumento ritual; «trompeta» es comprensible, pero nivela una especificidad lexical que el audit trail del inglés quiso preservar en nota.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio direccional señala el lugar indicado; «allí» es la forma más neutra y clara para el mandato de reunirse.
- source_word: תִּקָּבְצוּ
  english_pob_choice: gather
  chosen_spanish: reúnanse
  alternatives_spanish:
  - júntense
  - congréguense
  - sean reunidos
  lexicon: HALOT
  rationale: El nifal tiene aquí fuerza intransitiva/pasiva de congregarse. «Reúnanse» comunica la acción colectiva con naturalidad en español y mantiene el carácter imperativo.
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: junto a nosotros
  alternatives_spanish:
  - a nosotros
  - con nosotros
  lexicon: HALOT
  rationale: El dativo con ל/אֵל expresa cercanía o dirección hacia un grupo ya presente. En este contexto, «junto a nosotros» refleja mejor la idea de reunirse con el grupo de liderazgo que un simple «a nosotros».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: Our God
  chosen_spanish: Nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - Nuestro Dios
  lexicon: HALOT
  rationale: Se conserva el posesivo, importante retóricamente y de alianza, sin reemplazarlo por una forma impersonal.
- source_word: יִלָּחֶם לָנוּ
  english_pob_choice: will fight for us
  chosen_spanish: peleará por nosotros
  alternatives_spanish:
  - combatirá por nosotros
  - hará guerra por nosotros
  - luchará por nosotros
  lexicon: HALOT
  rationale: El nifal de לחם en este contexto expresa participación real en batalla; «peleará por nosotros» conserva el sentido fuerte y la relación de beneficio marcada por ל.
theological_decisions:
- issue: Divine warfare language
  english_pob_reading: Our God will fight for us
  chosen_spanish_reading: Nuestro Dios peleará por nosotros
  alternative_spanish_readings:
  - Nuestro Dios luchará por nosotros
  - Dios nos ayudará a pelear
  - Nuestro Dios peleará con nosotros
  rationale: El hebreo atribuye a Dios la acción decisiva de combatir. «Peleará por nosotros» mantiene esa atribución sin diluirla en una cooperación meramente asistencial.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto inglés del POB no requirió cambios de revisión: la solución española sigue de cerca el mismo sentido auditado y conserva la especificidad de shofar con una nota léxica. No se documentaron revisiones posteriores que afectaran este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce una sustitución reverencial con mayúsculas ocultadoras.
  - Se conserva el plural inclusivo «nuestro(s)/nosotros» en coherencia con אֵלֵינוּ y אֱלֹהֵינוּ.
  - «Shofar» se deja transliterado en el cuerpo principal para preservar la precisión del instrumento hebreo, con aclaración en nota.
  - «Peleará» se elige por claridad y fuerza; «luchará» es posible, pero menos cercano al lenguaje bíblico de combate en este pasaje.
