translation:
  language: es
  text: El que trae destrucción repentina sobre el fuerte[a], de modo que la destrucción viene sobre la fortaleza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el que hace irrumpir la devastación sobre el poderoso». El verbo hebreo es raro y difícil, y algunos lo toman de manera diferente.'
    reason: lexical_alternative
  - marker: b
    text: «Fortaleza» también puede traducirse «baluarte» o «lugar fortificado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּבְלִיג
  english_pob_choice: He who brings sudden destruction / He who flashes destruction
  chosen_spanish: Él que hace venir una destrucción repentina
  alternatives_spanish:
  - El que trae una destrucción repentina
  - El que hace irrumpir la destrucción
  - El que fortalece
  lexicon: HALOT
  rationale: El participio hifil funciona de manera substantiva. Dado que el verbo hebreo es raro y difícil, la opción española mantiene la idea de provocar la llegada súbita del juicio sin forzar una glosa demasiado interpretativa. «Hace venir» conserva el movimiento verbal y «repentina» refleja el matiz de irrupción súbita que la POB inglesa decidió mantener.
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: una destrucción
  alternatives_spanish:
  - devastación
  - violencia
  - saqueo
  lexicon: HALOT
  rationale: En este contexto el sustantivo denota ruina violenta, no solo pillaje. «Destrucción» es la equivalencia más clara y natural en español y mantiene el paralelismo con la segunda cláusula.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: «Sobre» conserva la imagen hebrea del golpe que cae encima del objeto afectado y funciona bien en español poético y expositivo.
- source_word: עָז
  english_pob_choice: the strong
  chosen_spanish: el fuerte
  alternatives_spanish:
  - el poderoso
  - el fuerte, el poderoso
  - los fuertes
  lexicon: HALOT
  rationale: El adjetivo está usado sustantivamente. «El fuerte» reproduce esa fuerza léxica con concisión; evita suavizarlo a un término más general y mantiene el contraste con la fortaleza del verso.
- source_word: וְשֹׁד
  english_pob_choice: so that destruction
  chosen_spanish: de modo que la destrucción
  alternatives_spanish:
  - y destrucción
  - con destrucción
  lexicon: HALOT
  rationale: 'La conjunción introduce una continuación resultativa: la destrucción alcanza la fortaleza. «De modo que» explicita esa progresión sin alejarse del hebreo.'
- source_word: מִבְצָר
  english_pob_choice: the fortress
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fortaleza
  - la plaza fuerte
  - el fuerte
  lexicon: HALOT
  rationale: El término designa un lugar fortificado. «Fortaleza» es natural en español y conserva la imaginería militar; no se hace una distinción artificial entre «fortress» y «stronghold» en esta línea.
- source_word: יָבֹוא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - entra
  - cae
  lexicon: HALOT
  rationale: El verbo básico es venir. «Viene» preserva la simplicidad verbal del hebreo y la fluidez poética en español.
theological_decisions:
- issue: Sujeto implícito y referencia divina
  english_pob_reading: The participial expression is left open in English but contextually refers to God without capitalizing the pronoun.
  chosen_spanish_reading: La frase se mantiene impersonal en forma, pero el contexto de Amós 5:8–9 la vincula con la acción soberana de Yahvé.
  alternative_spanish_readings:
  - Él, refiriéndose explícitamente a Yahvé
  - El que, como poder impersonal, trae destrucción
  rationale: La construcción hebrea es participial y no nombra explícitamente a Yahvé en la cláusula. El contexto inmediato sostiene una referencia divina, pero la traducción no debe añadir más explicitación de la que el texto ofrece. En español, el pronombre inicial se conserva como parte de una estructura reverente y concisa.
  doctrine_reference: Amós 5:8–9; doxología del poder creador y judicial de Yahvé
- issue: Naturaleza de la acción destructiva
  english_pob_reading: sudden destruction upon the strong, so that destruction comes upon the fortress
  chosen_spanish_reading: destrucción repentina sobre el fuerte, de modo que la destrucción viene sobre la fortaleza
  alternative_spanish_readings:
  - devastación sobre el poderoso
  - ruina súbita sobre el fuerte
  rationale: La POB inglesa retiene el vínculo entre juicio repentino y ruina final. En español se conserva esa tensión sin reducirla a una sola idea de saqueo o derrota militar.
  doctrine_reference: Juicio divino en el libro de Amós
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto español. Se evitó añadir notas sin anclaje y se mantuvo la alternativa léxica documentada por la POB inglesa para el verbo raro y difícil.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término teológico estándar del proyecto, aunque en este versículo el sujeto queda implícito por el participio.
  - «Destrucción» se usó de forma consistente para שֹׁד en ambas mitades del verso.
  - «Fortaleza» traduce מִבְצָר con estilo natural y readable, sin recurrir a «fortín» o «baluarte» que desplazarían el campo semántico.
  - La estructura española conserva el paralelismo y la progresión resultativa del hebreo sin añadir interpretaciones doctrinales ajenas al texto.
