review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia hebrea: levantar/cargar/colocar, la inmovilidad del ídolo, y su incapacidad para responder o salvar. También preserva correctamente la nota sobre תַחְתָּיו como expresión probablemente referida al pedestal o lugar del ídolo. La única desalineación relevante es que «Aunque alguien le clame» en indicativo/subjuntivo suena menos directo que el hebreo con valor vívido y que el inglés «Even if someone cries out to it»; además, «allí queda en pie» es aceptable, pero «allí se queda de pie» o «allí queda» sería más natural. El problema principal, sin embargo, es estilístico-gramatical en español más que de significado.'
  spanish_quality_summary: El texto es claro y legible, pero requiere un pequeño ajuste de naturalidad y fluidez. «Aunque alguien le clame» suena algo forzado en español bíblico moderno; «Aun si alguien clama a él» o «Aunque alguien clame a él» evitaría la combinación menos idiomática de clamar + le. También conviene suavizar «allí queda en pie» a una formulación más natural. El resto del verso está bien logrado y mantiene tono digno y moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Salvar» para ישׁע es correcto; no aparecen Yahvé, Mesías, Cristo, esclavo, etc. La decisión de mantener «angustia» para צָרָה es válida en contexto.
  issues:
  - severity: medium
    issue: Construcción «Aunque alguien le clame» poco natural
    rationale: En español, «clamar» suele construirse de forma más natural como «clamar a él» o «clamarle» en contextos personales, pero aquí el referente es un ídolo. «Aun si alguien clama a él» conserva mejor la relación direccional de אֵלָיו y suena más idiomático.
  - severity: low
    issue: «allí queda en pie» puede mejorarse
    rationale: No es incorrecto, pero resulta algo tieso. «Allí se queda» o «allí queda»/«y queda allí de pie» suena más natural sin alterar el sentido de ויעמד.
  revised_spanish_text: Lo levantan sobre el hombro[a], lo cargan, y lo colocan en su lugar, y queda allí de pie; no se mueve de su sitio. Aun si alguien clama a él, no responde; no lo salva de su angustia.
  revised_footnotes:
  - marker: a
    text: 'Literalmente, en hebreo: «lo ponen debajo de él»; probablemente significa que lo colocan en su sitio o sobre su base o pedestal.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de español: «queda allí de pie» fluye mejor que «allí queda en pie», y «Aun si alguien clama a él» refleja de manera más natural y fiel la construcción hebrea de clamar hacia el ídolo. Se mantuvo intacto el sentido del original y la nota léxica sobre «debajo de él».'
