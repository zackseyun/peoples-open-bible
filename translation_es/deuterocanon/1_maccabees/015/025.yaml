translation:
  language: es
  text: Pero el rey Antíoco acampó por segunda vez[a] contra Dora, manteniendo continuamente la presión contra ella[b] y construyendo máquinas de asedio, y encerró a Trifón para que no pudiera entrar ni salir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de nuevo». La frase griega se entiende mejor aquí como repetición de la acción militar: «por segunda vez».'
    reason: alternative_reading
  - marker: b
    text: Más literalmente, «trayendo continuamente las manos contra ella», un modismo de asedio para presión o ataque sostenido.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ Δωρὰ
  english_pob_choice: encamped against Dora
  chosen_spanish: acampó de nuevo contra Dora
  alternatives_spanish:
  - acamparon contra Dora
  - se estableció frente a Dora
  - marchó contra Dora
  lexicon: LSJ
  rationale: En contexto militar, παρεμβάλλω puede significar acampar en actitud hostil frente a una plaza. «Acampó contra» conserva el matiz de sitio; añadí «de nuevo» por ἐν τῇ δευτέρᾳ, siguiendo la lectura contextual de repetición del ataque.
- source_word: ἐν τῇ δευτέρᾳ
  english_pob_choice: a second time
  chosen_spanish: de nuevo
  alternatives_spanish:
  - por segunda vez
  - una segunda vez
  - en la segunda
  lexicon: LSJ
  rationale: El contexto de asedio favorece un valor adverbial de repetición, no una referencia cronológica a un día. «De nuevo» es natural en español y mantiene la idea de una nueva acción militar.
- source_word: προσάγων διὰ παντὸς αὐτῇ τὰς χεῖρας
  english_pob_choice: continually bringing his forces against it
  chosen_spanish: llevándole continuamente sus tropas
  alternatives_spanish:
  - presionándola continuamente
  - aplicándole continuamente sus manos
  - llevando continuamente sus manos contra ella
  lexicon: LSJ
  rationale: La expresión literal «trayendo manos» es una idiomática de presión o ataque sostenido. Como en español «tropas» hace explícito el sentido bélico sin perder la idea de asedio continuo, se eligió una formulación dinámica pero controlada. El pronombre «le» mantiene la referencia a Dora como ciudad.
- source_word: μηχανὰς ποιούμενος
  english_pob_choice: constructing siege engines
  chosen_spanish: levantando máquinas de asedio
  alternatives_spanish:
  - haciendo máquinas
  - preparando máquinas de asedio
  - construyendo máquinas de guerra
  lexicon: LSJ
  rationale: μηχαναί en este contexto son aparatos militares de sitio. «Máquinas de asedio» es el equivalente español más claro y específico; «levantando» comunica la acción en curso mejor que un simple «construyendo».
- source_word: συνέκλεισεν
  english_pob_choice: he shut Tryphon in
  chosen_spanish: encerró a Trifón
  alternatives_spanish:
  - lo confinó
  - lo cercó
  - lo dejó encerrado
  lexicon: LSJ
  rationale: El verbo expresa clausura o encierro. «Encerró» es conciso y natural, y deja que la siguiente cláusula explique el alcance total del bloqueo.
- source_word: τοῦ εἰσπορεύεσθαι καὶ ἐκπορεύεσθαι
  english_pob_choice: so that he could neither go in nor go out
  chosen_spanish: para que no pudiera entrar ni salir
  alternatives_spanish:
  - para impedirle entrar y salir
  - a fin de que no entrara ni saliera
  - de manera que no pudiera entrar ni salir
  lexicon: LSJ
  rationale: La construcción de infinitivo con artículo expresa resultado o prevención efectiva. «Para que no pudiera entrar ni salir» comunica de forma idiomática el bloqueo total, sin introducir ideas ajenas.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran una lectura militar coherente y de alta concordancia. Mantengo el valor repetitivo de ἐν τῇ δευτέρᾳ, la idiomatización del ataque continuo de προσάγων διὰ παντός y el encierro total de συνέκλεισεν + infinitivos articular genitivo, sin añadir información externa.
  spanish_consistency_notes:
  - He usado «Dora» y «Trifón» como formas españolas estables de los nombres propios.
  - He preferido «máquinas de asedio» por claridad contextual, conservando una nota para el literal griego.
  - He mantenido un estilo bíblico moderno y sobrio, evitando calcos innecesarios como «trayendo las manos» en el texto principal.
