translation:
  language: es
  text: Pero yo aconsejo que todo Israel se reúna sin falta a ti, desde Dan hasta Beerseba, tan numeroso como la arena que está junto al mar, y que tú mismo[a] vayas a la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y tu rostro va en la batalla», un giro idiomático que significa que tú mismo lideras el ataque.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Porque
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: Aquí כִּי introduce el consejo de Husai en contraste con el plan anterior de Aitofel; en español, 'Pero' expresa mejor la oposición discursiva que 'Porque' o 'Pues'.
- source_word: יָעַצְתִּי
  english_pob_choice: I advise
  chosen_spanish: yo aconsejo
  alternatives_spanish:
  - yo aconsejo
  - yo doy consejo
  - yo he aconsejado
  lexicon: HALOT
  rationale: El verbo יעץ expresa dar consejo/asesorar. 'Yo aconsejo' conserva el acto de hablar y su valor directivo en un registro natural para español.
- source_word: הֵאָסֹף יֵאָסֵף
  english_pob_choice: be surely gathered
  chosen_spanish: se reúna sin falta
  alternatives_spanish:
  - sea reunido con toda seguridad
  - se congregue ciertamente
  - sea plenamente reunido
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. 'Se reúna sin falta' conserva la fuerza enfática sin sonar rígido en español.
- source_word: עָלֶיךָ
  english_pob_choice: to you
  chosen_spanish: junto a ti
  alternatives_spanish:
  - a ti
  - a tu alrededor
  - ante ti
  lexicon: HALOT
  rationale: Con אסף, על puede indicar reunir hacia o alrededor de un líder. 'Junto a ti' comunica la idea de concentración bajo su mando de manera clara en español.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - la totalidad de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión colectiva se conserva como fórmula nacional. 'Todo Israel' es natural y mantiene el alcance totalizante del hebreo.
- source_word: מִדָּן וְעַד בְּאֵר שֶׁבַע
  english_pob_choice: from Dan to Beersheba
  chosen_spanish: desde Dan hasta Beerseba
  alternatives_spanish:
  - de Dan hasta Beerseba
  - desde Dan y hasta Beerseba
  lexicon: HALOT
  rationale: Se mantiene el merismo geográfico tradicional y claro en español, equivalente al hebreo y reconocible como el extremo norte y sur de Israel.
- source_word: כַּחוֹל אֲשֶׁר עַל הַיָּם לָרֹב
  english_pob_choice: as numerous as the sand that is by the sea
  chosen_spanish: tan numeroso como la arena que está junto al mar
  alternatives_spanish:
  - como la arena que está junto al mar, en abundancia
  - tan abundante como la arena junto al mar
  lexicon: HALOT
  rationale: El hebreo usa una comparación de multitud. 'Tan numeroso como' hace explícita la comparación y conserva la imagen poética de la arena del mar.
- source_word: וּפָנֶיךָ
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tu rostro
  - tu presencia
  - tú personalmente
  lexicon: HALOT
  rationale: Aunque literalmente dice 'tu rostro', en este giro idiomático se refiere a la persona misma. 'Tú mismo' transmite la fuerza enfática y personal del hebreo.
- source_word: הֹלְכִים
  english_pob_choice: go
  chosen_spanish: entres
  alternatives_spanish:
  - vayas
  - marches
  - avances
  lexicon: HALOT
  rationale: La construcción idiomática con 'tu rostro' y el verbo plural funciona con referencia singular y apunta a la acción personal de liderar. En español, 'entres' integra naturalmente la idea de ir a la batalla.
- source_word: בַּקְרָב
  english_pob_choice: into battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - a la batalla
  - al combate
  - en el combate
  lexicon: HALOT
  rationale: '''קרב'' aquí denota enfrentamiento militar. ''En batalla'' mantiene el campo semántico bélico y se integra bien con la expresión anterior sin sobrecargar la frase.'
translation_notes:
  revision_awareness: Se siguió la lectura confirmada del inglés POB y el control cruzado posterior indicó alto acuerdo, sin revisiones aplicadas; la versión española conserva el sentido retórico, geográfico e idiomático del hebreo con equivalencia óptima.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere; en este versículo no aparece.
  - Se conserva 'Beerseba' como forma española estable del topónimo.
  - Se traduce la idiomática 'tu rostro' mediante una nota, no en el texto principal, para no perder la tensión lexical del hebreo.
  - '''Entres en batalla'' comunica el valor idiomático de liderazgo personal sin introducir un término eclesiástico o ajeno al contexto bélico.'
