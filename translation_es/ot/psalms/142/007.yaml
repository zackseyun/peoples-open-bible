translation:
  language: es
  text: Atiende[a] a mi clamor, porque estoy muy debilitado[b]; líbrame de mis perseguidores[c], porque son más fuertes que yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escucha mi clamor». El hebreo incluye la idea de una escucha atenta.
    reason: lexical_alternative
  - marker: b
    text: O «he sido rebajado muy bajo» o «estoy muy abatido». El hebreo expresa una reducción o debilidad severa.
    reason: lexical_alternative
  - marker: c
    text: O «de quienes me persiguen».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  english_pob_choice: Attend to
  chosen_spanish: Atiende
  alternatives_spanish:
  - Escucha
  - Presta atención a
  - Pon oído a
  lexicon: HALOT
  rationale: El hebreo pide una escucha atenta y deliberada. «Atiende» conserva el matiz de prestar atención sin sonar tan arcaico como «da oído» ni tan débil como una simple audición.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Introduce el objeto del acto de atención; en español, «a» es la preposición natural y fiel al valor relacional del hebreo.
- source_word: רִנָּתִי
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi súplica
  - mi canto
  lexicon: HALOT
  rationale: En contexto de lamento, רִנָּה no se reduce bien a «canto». «Clamor» comunica una voz intensa y urgente, adecuada para una petición de auxilio, sin perder la idea de un clamor audible.
- source_word: דַלּוֹתִי מְאֹד
  english_pob_choice: I am brought very low
  chosen_spanish: estoy muy abatido
  alternatives_spanish:
  - estoy muy débil
  - he sido rebajado mucho
  - estoy muy reducido
  lexicon: HALOT
  rationale: La expresión hebrea señala un estado de extrema postración o reducción. «Abatido» transmite la idea de estar humillado, deprimido o derribado, y junto con «muy» conserva el énfasis intensivo de מְאֹד.
- source_word: הַצִּילֵנִי
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  lexicon: HALOT
  rationale: נצל aquí se refiere a sacar al salmista de un peligro concreto causado por perseguidores humanos. «Líbrame» es natural en español bíblico y mantiene la concreción de la petición sin ampliar innecesariamente a un sentido más general de salvación.
- source_word: מֵרֹדְפַי
  english_pob_choice: from my pursuers
  chosen_spanish: de mis perseguidores
  alternatives_spanish:
  - de los que me persiguen
  - de mis opresores
  - de mis enemigos
  lexicon: HALOT
  rationale: El participio de רדף indica a quienes persiguen activamente. «Perseguidores» reproduce bien esa relación verbal y evita generalizar a «enemigos».
- source_word: אָמְצוּ מִמֶּנִּי
  english_pob_choice: they are stronger than I
  chosen_spanish: son más fuertes que yo
  alternatives_spanish:
  - son más poderosos que yo
  - prevalecen sobre mí
  - se han fortalecido más que yo
  lexicon: HALOT
  rationale: אָמַץ expresa fuerza, y el comparativo está dado por מִן. «Son más fuertes que yo» es claro, directo y conserva la comparación implícita del hebreo.
theological_decisions:
- issue: Rendering of the deliverance plea (הַצִּילֵנִי)
  english_pob_reading: deliver me
  chosen_spanish_reading: líbrame
  alternative_spanish_readings:
  - rescátame
  - sálvame
  rationale: En este versículo la petición está dirigida a una amenaza humana inmediata, no a una formulación doctrinal abstracta. «Líbrame» mantiene la fuerza concreta de la liberación solicitada y evita cargar el texto con un matiz soteriológico más amplio que el contexto no exige.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of רִנָּה in a lament context
  english_pob_reading: my cry
  chosen_spanish_reading: mi clamor
  alternative_spanish_readings:
  - mi súplica
  - mi grito
  rationale: Aunque רִנָּה puede asociarse con alegría en otros contextos, aquí funciona como expresión sonora de angustia. «Clamor» preserva esa tensión entre voz intensa y súplica doliente sin convertirlo en un término devocional más estrecho.
  doctrine_reference: Psalmic lament genre; lexicon note
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del paquete fuente y el audit trail inglés: mantiene la petición inicial, la razón de postración, la solicitud de liberación y la comparación final sin añadir matices doctrinales ajenos. No se detectaron revisiones posteriores que exigieran ajustes.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto no necesario aquí porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro de lamento sobrio y bíblico, con vocabulario claro y contemporáneo.
  - No se empleó «salvar» para הַצִּילֵנִי, siguiendo la distinción documentada entre liberación concreta y salvación teológica más amplia.
