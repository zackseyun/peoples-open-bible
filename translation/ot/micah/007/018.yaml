id: MIC.7.18
reference: Micah 7:18
source:
  edition: WLC
  text: מִי אֵ֣ל כָּמ֗וֹ/ךָ נֹשֵׂ֤א עָוֺן֙ וְ/עֹבֵ֣ר עַל פֶּ֔שַׁע לִ/שְׁאֵרִ֖ית נַחֲלָת֑/וֹ לֹא הֶחֱזִ֤יק לָ/עַד֙ אַפּ֔/וֹ כִּֽי חָפֵ֥ץ חֶ֖סֶד הֽוּא־־־־׃
translation:
  text: Who is a God like you[a], bearing iniquity and passing over transgression for the remnant of his inheritance? He does not retain his anger forever[b], because he delights in steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgiving iniquity and pardoning transgression.' The Hebrew more literally reads 'bearing iniquity and passing over transgression.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew חֶסֶד, a covenantal term that can also be rendered ''mercy'' or ''covenant love.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי אֵל כָּמוֹךָ
  chosen: Who is a God like you
  alternatives:
  - Who is God like you
  - Who is a god like you
  lexicon: HALOT
  rationale: The phrase is an exclamatory rhetorical question and likely echoes the prophet's name Micah ('Who is like YHWH?'). Rendering אֵל as 'a God' preserves the predicate sense in English while still expressing incomparability. Capitalized 'God' reflects reference to Israel's God in context.
- source_word: נֹשֵׂא עָוֹן
  lemma: נֹשֵׂא
  chosen: bearing iniquity
  alternatives:
  - forgiving iniquity
  - lifting away guilt
  lexicon: HALOT
  rationale: The participle נֹשֵׂא literally means 'bearing/carrying.' In this idiom it conveys the removal or forgiveness of guilt. 'Bearing iniquity' keeps the Hebrew imagery while remaining intelligible; smoother interpretive alternatives are possible but less formally transparent.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote both wrongdoing and its guilt/consequence. 'Iniquity' preserves the moral weight and traditional distinction from the following פֶּשַׁע, avoiding flattening both terms into 'sin'.
- source_word: וְעֹבֵר עַל פֶּשַׁע
  chosen: and passing over transgression
  alternatives:
  - and overlooking rebellion
  - and pardoning transgression
  lexicon: HALOT
  rationale: עָבַר עַל in this context means to pass over or overlook an offense. 'Passing over transgression' preserves the verbal image and keeps a distinction from the previous clause. 'Transgression' reflects פֶּשַׁע as willful breach/rebellion.
- source_word: פֶּשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - offense
  lexicon: HALOT
  rationale: פֶּשַׁע often carries the sense of rebellion or breach. 'Transgression' is a readable English equivalent that preserves its more defiant nuance relative to general 'sin.'
- source_word: לִשְׁאֵרִית נַחֲלָתוֹ
  chosen: for the remnant of his inheritance
  alternatives:
  - for the remnant of his heritage
  - for the remainder of his possession
  lexicon: HALOT
  rationale: The preposition ל marks the beneficiaries of divine pardon. 'Remnant' is an important prophetic term and should be retained. נַחֲלָה is rendered 'inheritance' to preserve covenantal possession language for God's people.
- source_word: לֹא הֶחֱזִיק לָעַד אַפּוֹ
  chosen: He does not hold on to his anger forever
  alternatives:
  - He does not retain his anger forever
  - He does not keep his wrath forever
  lexicon: HALOT
  rationale: הֶחֱזִיק means to hold fast, retain, or keep. 'Hold on to his anger' is natural modern English and conveys the idiom clearly. 'Anger' is preferred over 'wrath' for readability, though 'wrath' is possible.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his wrath
  lexicon: HALOT
  rationale: Though literally 'his nose,' the idiom means anger. 'Anger' is the clearest contemporary rendering and fits the translation philosophy's preference for readable modern English.
- source_word: כִּי חָפֵץ חֶסֶד הוּא
  chosen: because he delights in steadfast love
  alternatives:
  - for he delights in mercy
  - because he takes pleasure in covenant love
  lexicon: HALOT
  rationale: חָפֵץ expresses delight or pleasure. חֶסֶד is a theologically rich covenant term; 'steadfast love' is chosen as the best established English rendering that preserves covenant loyalty and mercy dimensions better than the narrower 'mercy.'
