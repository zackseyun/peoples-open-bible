revisions:
- from: Da de tu pan al hambriento[a], y de tus vestidos a los desnudos. Todo lo que te sobre, hazlo limosna[b], y no deje tu ojo de ser envidioso cuando hagas limosna.
  to: Da de tu pan al hambriento[a], y de tus vestidos al desnudo. Todo lo que te sobre, hazlo limosna, y que tu ojo no sea mezquino[b] cuando des limosna.
  rationale: Se corrige la cláusula final para reflejar fielmente la prohibición de μὴ φθονεσάτω y para conservar el modismo del «ojo» en un español natural. Se cambia «no deje tu ojo de ser envidioso» por «que tu ojo no sea mezquino», que expresa la idea de no dar con renuencia o resentimiento. También se suaviza «a los desnudos» a «al desnudo» y «cuando hagas limosna» a «cuando des limosna» para mayor legibilidad sin perder el sentido del original.
