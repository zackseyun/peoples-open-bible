    rationale: קְדֹשִׁים es simplemente ‘los santos’ / ‘los seres santos’ / ‘los santos seres’. La nota ya aclara que probablemente son seres celestiales. Mantener «seres santos» es defendible, pero conviene no sobrecargar la expresión principal.
