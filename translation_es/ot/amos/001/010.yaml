translation:
  language: es
  text: Así enviaré fuego sobre el muro de Tiro, y consumirá sus ciudadelas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus palacios». El término hebreo puede referirse tanto a edificios palaciegos como a fortalezas o ciudadelas fortificadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así enviaré
  alternatives_spanish:
  - Y enviaré
  - Entonces enviaré
  lexicon: HALOT
  rationale: La forma verbal expresa una acción futura en el discurso profético; «enviaré» refleja bien el valor de primera persona singular. «Así» mantiene la continuidad discursiva del hebreo וְ sin sonar tan mecánico como «y» en español.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - incendio
  - llama
  lexicon: HALOT
  rationale: «Fuego» es la correspondencia normal y directa para אֵשׁ. Aquí conserva el valor imaginal de juicio destructivo sin añadir una interpretación que el hebreo no explicita.
- source_word: בְּחוֹמַת
  english_pob_choice: upon the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - contra el muro
  - en el muro
  lexicon: HALOT
  rationale: El hebreo usa ב con «muro» en una fórmula de juicio. «Sobre el muro» comunica el impacto del fuego de modo natural en español y conserva la imagen sin forzar un equivalente demasiado idiomático.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tir
  - la ciudad de Tiro
  lexicon: HALOT
  rationale: El topónimo צור se vierte de forma estándar como «Tiro» en español bíblico y eclesial. Es el equivalente asentado y claro para lectores hispanos.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y se comerá
  lexicon: HALOT
  rationale: El verbo literalmente significa «comer», pero en este contexto describe la acción del fuego. «Consumirá» reproduce el sentido destructivo con español moderno y sobrio, como en la POB inglesa.
- source_word: אַרְמְנֹתֶיהָ
  english_pob_choice: her citadels
  chosen_spanish: sus ciudades fortificadas
  alternatives_spanish:
  - sus ciudadelas
  - sus palacios
  - sus fortalezas
  lexicon: HALOT
  rationale: אַרְמֹן puede referirse a palacio o fortaleza/castillo. Dado el contexto de juicio sobre una ciudad amurallada, «ciudades fortificadas» expresa el conjunto de estructuras defensivas y residenciales prominentes. Se evita imponer solo «palacios» o solo «fortalezas» porque el término admite esa amplitud semántica.
theological_decisions:
- issue: La naturaleza del fuego enviado por Yahvé en el juicio profético
  english_pob_reading: The translation preserves the prophetic judgment language and does not specify whether the fire is literal, military, or metaphorical beyond the text.
  chosen_spanish_reading: La traducción conserva el lenguaje profético del juicio sin resolver si el fuego es literal, militar o metafórico más allá del texto.
  alternative_spanish_readings:
  - fuego literal enviado por Dios
  - imagen de destrucción por invasión
  rationale: El hebreo afirma que Yahvé enviará fuego y que este consumirá las estructuras de Tiro. No se debe cerrar la tensión interpretativa del mecanismo del juicio; el español debe dejarla abierta como el original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con la auditoría inglesa; la última revisión indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se mantiene «Tiro» como topónimo tradicional en español, equivalente a צור.
  - Se conserva «fuego» y el verbo «consumirá» para reflejar el juicio destructivo sin explicitar su mecanismo.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no lo contiene explícitamente; el sujeto implícito de la acción se entiende por el contexto del oráculo.
  - «Sus ciudades fortificadas» amplía levemente «citadels» para abarcar el campo semántico de אַרְמְנֹתֶיהָ sin perder la referencia a estructuras defensivas y palaciegas.
