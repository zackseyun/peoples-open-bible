translation:
  language: es
  text: Y los hijos de Aarón le trajeron la sangre[a], y él mojó su dedo en la sangre y la puso sobre los cuernos del altar[b], y derramó la sangre en la base del altar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le presentaron la sangre»; el verbo hebreo puede significar «acercar» en un contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los cuernos del altar», es decir, sus salientes proyectados.
    reason: cultural_note
  - marker: c
    text: O «al fundamento del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִבוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - acercaron
  lexicon: HALOT / BDB
  rationale: En contexto ritual, קרב puede significar ‘traer cerca’ o ‘presentar’. ‘Trajeron’ conserva el movimiento hacia Aarón y suena natural en español, sin perder el matiz cultual.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aaron
  - los hijos de Aarón
  lexicon: HALOT
  rationale: ‘Hijos de Aarón’ es una forma natural y fiel al constructo hebreo; mantiene la identificación sacerdotal sin añadir explicación innecesaria.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Aarón
  lexicon: HALOT
  rationale: Se conserva el pronombre dativo implícito en español. El antecedente inmediato es Aarón, pero el hebreo no lo repite, así que no conviene sustituirlo en el texto principal.
- source_word: וַיִּטְבֹּל
  english_pob_choice: dipped
  chosen_spanish: mojó
  alternatives_spanish:
  - sumergió
  - metió
  lexicon: HALOT
  rationale: El gesto con el dedo en la sangre se expresa con claridad en español mediante ‘mojó’; evita la dureza de ‘sumergió’ y mantiene el acto ritual.
- source_word: אֶצְבָּעוֹ
  english_pob_choice: his finger
  chosen_spanish: su dedo
  alternatives_spanish:
  - el dedo de él
  lexicon: HALOT
  rationale: Se conserva el singular y la referencia posesiva directa. ‘Su dedo’ es la forma natural y precisa en español.
- source_word: וַיִּתֵּן עַל
  english_pob_choice: put it on
  chosen_spanish: la puso sobre
  alternatives_spanish:
  - la aplicó sobre
  - la colocó sobre
  lexicon: HALOT
  rationale: נתן con על describe aquí la aplicación ritual de la sangre. En español, ‘la puso sobre’ reproduce la acción de manera directa y comprensible.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: the horns of the altar
  chosen_spanish: los cuernos del altar
  alternatives_spanish:
  - las puntas del altar
  - las esquinas del altar
  lexicon: HALOT
  rationale: Se mantiene la expresión cultual literal. ‘Cuernos’ es el equivalente tradicional y técnico para las protuberancias del altar, y no conviene suavizarlo.
- source_word: יָצַק
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - echó
  lexicon: HALOT
  rationale: El verbo expresa vaciar un líquido de forma intencional. ‘Derramó’ preserva la acción de verter la sangre hasta la base del altar con fluidez natural.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: at the base of the altar
  chosen_spanish: a la base del altar
  alternatives_spanish:
  - sobre el fundamento del altar
  - junto al fundamento del altar
  lexicon: HALOT
  rationale: יְסוֹד es ‘base/fundamento’. ‘A la base’ conserva el sentido espacial y ritual sin introducir una paráfrasis más interpretativa.
theological_decisions:
- issue: Referente implícito en אֵלָיו
  english_pob_reading: The blood was brought to Aaron.
  chosen_spanish_reading: La sangre fue traída a Aarón implícitamente mediante ‘le’.
  alternative_spanish_readings:
  - La sangre fue presentada a Aarón.
  - La sangre fue traída al altar.
  rationale: El contexto narrativo inmediato centra el rito en Aarón, y el pronombre hebreo se refiere de manera natural a él. En español se mantiene la referencia pronominal sin explicitar más de lo que el texto dice.
  doctrine_reference: Decisión contextual gramatical, no doctrinal.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el control inglés; no se requieren revisiones sustanciales. Se mantuvo el sujeto implícito y la imaginería cultual literal, con solo ajustes naturales de español.
  spanish_consistency_notes:
  - Se usó ‘Aarón’ con tilde conforme al español.
  - Se prefirió ‘base’/‘fundamento’ de manera consistente con el valor de יְסוֹד.
  - ‘Cuernos del altar’ se conservó como término técnico cultual sin sustitución.
  - 'La secuencia verbal sigue el orden del hebreo: traer, mojar, poner, derramar.'
