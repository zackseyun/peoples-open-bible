revisions:
- from: Porque así como un cuervo está entre el cielo y la tierra[a], así también, cuando el fuego cae en una casa de dioses de madera o recubiertos de oro o recubiertos de plata, sus sacerdotes huirán y serán salvados[b], pero ellos mismos serán quemados como vigas en medio.
