translation:
  language: es
  text: Pero si un hombre no tiene redentor[a], y su mano alcanza lo suficiente[b] y encuentra la cantidad suficiente para su redención,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pariente-redentor». El hebreo גֹּאֵל suele referirse a un pariente cercano con el deber o derecho de redimir la propiedad familiar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su mano alcanza». Este modismo hebreo se refiere a que sus medios llegan a ser suficientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִ֕ישׁ
  english_pob_choice: But if a man
  chosen_spanish: Pero si un hombre
  alternatives_spanish:
  - Y si un hombre
  - Pero si alguien
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y aquí introduce un caso jurídico. «Pero si» conserva el giro adversativo-condicional del contexto anterior y mantiene el registro legal sin volverlo coloquial.
- source_word: כִּ֛י
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - que
  lexicon: HALOT
  rationale: En esta cláusula condicional, כִּי funciona como introducción de caso, por lo que «si» es el equivalente natural en español.
- source_word: לֹ֥א יִֽהְיֶה לּ֖וֹ גֹּאֵ֑ל
  english_pob_choice: has no redeemer
  chosen_spanish: no tiene redentor
  alternatives_spanish:
  - no tiene pariente-redentor
  - no tiene a nadie que lo redima
  lexicon: HALOT
  rationale: גֹּאֵל en este contexto levítico es el pariente con derecho/deber de rescatar la propiedad familiar. «Redentor» conserva el término breve y tradicional del campo semántico de rescate, sin perder la función jurídica. La alternativa más explícita queda implícita en la nota.
- source_word: וְהִשִּׂיגָה יָד֔וֹ
  english_pob_choice: his hand attains enough
  chosen_spanish: su mano alcanza lo suficiente
  alternatives_spanish:
  - su mano prospera
  - adquiere medios suficientes
  - sus recursos llegan a ser suficientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su mano alcanza». En español, «su mano alcanza lo suficiente» conserva la imagen idiomática y comunica que ahora dispone de medios suficientes.
- source_word: וּ/מָצָ֖א
  english_pob_choice: and he finds
  chosen_spanish: y encuentra
  alternatives_spanish:
  - y obtiene
  - y consigue
  lexicon: HALOT
  rationale: El verbo básico es «encontrar». En este contexto económico-jurídico, «encuentra» mantiene la correspondencia verbal y puede entenderse como lograr o conseguir los medios necesarios.
- source_word: כְּ/דֵ֥י גְאֻלָּתֽ/וֹ
  english_pob_choice: sufficient means for his redemption
  chosen_spanish: lo suficiente para su rescate
  alternatives_spanish:
  - la cantidad suficiente para su rescate
  - lo necesario para su redención
  lexicon: HALOT
  rationale: כְּדֵי expresa suficiencia. גְאֻלָּתוֹ en este contexto es el acto/importe de rescatar la propiedad o la persona según el derecho de redención familiar. «Rescate» comunica bien el valor jurídico-económico y evita sobrecargar con una paráfrasis teológica.
translation_notes:
  revision_awareness: La redacción sigue el sentido jurídico-económico del hebreo y la solución de equivalencia óptima del POB en inglés. Se mantiene la imagen idiomática de «su mano alcanza» y se evita traducir mecánicamente desde el inglés cuando el español puede sostener el mismo campo semántico con naturalidad.
  spanish_consistency_notes:
  - Se preserva «redentor» como término técnico, con nota alternativa para «pariente-redentor».
  - «Rescate» se usa para גְאֻלָּה en este contexto legal de redención de bienes, no como término doctrinal abstracto.
  - La frase final queda abierta, como en el hebreo y en el inglés POB, para reflejar la continuidad del versículo en la cláusula siguiente.
