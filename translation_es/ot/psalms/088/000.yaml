translation:
  language: es
  text: 'Un canto. Un salmo de los hijos de Coré. Para el director del coro: según Mahalath Leannoth[a]. Un Maskil[b] de Hemán el Ezrahita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «Mahalath Leannoth» es incierta. Puede referirse a una melodía o estilo musical; otras propuestas incluyen «según Mahalath, para cantar en respuesta» o «según Mahalath, acerca de la aflicción».
    reason: lexical_alternative
  - marker: b
    text: «Maskil» es un término técnico en encabezados de salmos, por lo general entendido como una composición instructiva o contemplativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Un canto
  alternatives_spanish:
  - Una canción
  lexicon: HALOT
  rationale: En un encabezado de salmo, שִׁיר funciona como etiqueta de género. «Canto» suena natural en español bíblico y conserva mejor el tono litúrgico que «canción».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un salmo musical
  - Un poema salmódico
  lexicon: HALOT
  rationale: «Salmo» es el equivalente establecido y claro para el género del encabezado, sin añadir información que el texto no explicita.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  - perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: La preposición ל puede señalar asociación, pertenencia o atribución; «de los hijos de Coré» preserva esa ambigüedad de manera idiomática.
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de canto
  alternatives_spanish:
  - Para el director de música
  - Para el líder del coro
  lexicon: HALOT
  rationale: El término de encabezado apunta a dirección musical. «Maestro de canto» comunica la función sin forzar una institución cora específica que el hebreo no detalla.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - sobre
  lexicon: HALOT
  rationale: En encabezados musicales, עַל introduce una indicación de melodía o estilo. «Según» mantiene la función de referencia sin afirmar con certeza si se trata de tono, melodía o forma de ejecución.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalath
  alternatives_spanish:
  - Melodía de Mahalath
  - Enfermedad
  lexicon: HALOT
  rationale: El término es incierto en el encabezado; la transliteración evita una falsa precisión y conserva la etiqueta técnica o de melodía.
- source_word: לְעַנּוֹת
  english_pob_choice: Leannoth
  chosen_spanish: Leannoth
  alternatives_spanish:
  - para responder
  - para cantar alternadamente
  - para la aflicción
  lexicon: HALOT
  rationale: La fuerza exacta del término es debatida. La transliteración preserva la incertidumbre textual y musical, como en el audit trail inglés.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un canto instructivo
  - Una composición contemplativa
  lexicon: HALOT
  rationale: Es un término técnico de encabezado con matiz incierto. Mantenerlo transliterado evita reducirlo indebidamente a una sola interpretación.
- source_word: לְהֵימָן
  english_pob_choice: of Heman
  chosen_spanish: de Hemán
  alternatives_spanish:
  - para Hemán
  - perteneciente a Hemán
  lexicon: HALOT
  rationale: La relación expresada por ל puede ser atribución o pertenencia; «de Hemán» es la forma más natural y conserva la ambigüedad.
- source_word: הָאֶזְרָחִי
  english_pob_choice: the Ezrahite
  chosen_spanish: el ezrahita
  alternatives_spanish:
  - el zerahita
  lexicon: HALOT
  rationale: Se conserva el gentilicio tradicional en transliteración adaptada al español. «Ezrahita» sigue de cerca la forma consonántica representada en el audit trail inglés.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrigió la colocación de las notas: la nota sobre «Mahalath Leannoth» se ancla en ese sintagma, y la nota sobre «Maskil» se ancla en «Maskil». No se adoptó ninguna expansión interpretativa adicional fuera de las incertidumbres ya documentadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se preservó la estructura breve y listada del encabezado hebreo.
  - Se evitó traducir técnicamente los términos inciertos del encabezado cuando el audit trail inglés optó por transliterarlos.
  - Se usó «Yahvé» según la norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «hijos de Coré» y «Hemán el ezrahita» como designaciones propias consistentes con el contexto de los salmos.
  - La puntuación reproduce la segmentación del encabezado y mantiene las dos notas donde corresponden.
