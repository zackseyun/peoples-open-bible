    rationale: Aunque intenta ser conciso, en español «dar interés» no expresa idiomáticamente ‘prestar/cobrar a interés’. El hebreo y la decisión inglesa apuntan a préstamo con interés explotador, por lo que «presta con interés» preserva mejor el sentido.
  - severity: medium
    issue: Una sola nota [a] cubre dos términos distintos
    rationale: La nota une נֶשֶׁךְ y תַרְבִּית bajo un solo anclaje en «provecho[a]». No es necesariamente inválido, pero el anclaje queda menos preciso porque la alternativa también afecta al segmento anterior. Dado que la nota aún explica ambos términos y no crea ambigüedad grave, no hace falta multiplicar notas para esta revisión menor.
  - severity: medium
    issue: «su sangre caerá sobre él» para דָּמָיו בּוֹ יִהְיֶה
    rationale: El hebreo expresa un modismo de imputación/responsabilidad (‘su sangre estará/sobre él’), no una acción de ‘caer’. «Estará sobre él» es más fiel al original y a la nota inglesa auditada.
