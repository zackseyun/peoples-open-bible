translation:
  language: es
  text: Estos cuatro nacieron del Rapha[a] en Gat, y cayeron por mano de David y por mano de sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de Rapha», «del gigante» o «de los refaítas». El hebreo probablemente alude a la descendencia de la línea de gigantes asociada con Gat. Se conserva «Rapha» en el texto principal para mantener la ambigüedad del hebreo: puede entenderse como nombre propio, como título o como referencia al linaje de los refaítas.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַרְבַּעַת אֵלֶּה
  english_pob_choice: these four
  chosen_spanish: Estos cuatro
  alternatives_spanish:
  - Estos cuatro hombres
  - Estos cuatro seres
  lexicon: HALOT
  rationale: La construcción demostrativa-numérica se expresa de manera directa con «Estos cuatro». No se añade «hombres» porque el hebreo no lo dice explícitamente; así se conserva la sobriedad del texto fuente.
- source_word: יֻלְּדוּ
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron nacidos
  - fueron engendrados
  lexicon: HALOT
  rationale: El pasivo de ילד aquí indica origen/descendencia. «Nacieron» comunica ese sentido en español natural y mantiene la referencia genealógica sin volver la frase artificial.
- source_word: לְהָרָפָה
  english_pob_choice: to the Rapha
  chosen_spanish: para el Rapha
  alternatives_spanish:
  - para Rapha
  - para el gigante
  - para los refaítas
  lexicon: HALOT
  rationale: Se conserva la forma propia del hebreo en el cuerpo principal para no resolver prematuramente la ambigüedad. «Para» refleja el sentido relacional/de pertenencia que la construcción puede tener aquí; el nombre/título queda transliterado como «Rapha».
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gath
  - en Get
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual «Gat» para el topónimo, manteniendo una transliteración clara y reconocible.
- source_word: וַיִּפְּלוּ
  english_pob_choice: they fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - murieron
  lexicon: HALOT
  rationale: «Cayeron» preserva la imagen verbal del hebreo נפל y, en contexto bélico, permite la implicación de muerte sin explicitarla más de lo que el texto dice.
- source_word: בְיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por la mano de
  - a manos de
  lexicon: HALOT
  rationale: La idiomática hebrea de agencia se conserva con «por mano de», una solución natural en español bíblico contemporáneo y suficientemente transparente.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus hombres
  lexicon: HALOT
  rationale: «Siervos» mantiene la relación de servicio del término עבד y encaja con el registro bíblico. «Servidores» es posible, pero «siervos» conserva mejor la fuerza del lexema.
theological_decisions:
- issue: Identidad de הָרָפָה
  english_pob_reading: A named or titular ancestor/clan figure, rendered conservatively as 'the Rapha'
  chosen_spanish_reading: Una figura/título heredado del linaje de los gigantes, sin decidir si es nombre propio, ancestro o designación de clan
  alternative_spanish_readings:
  - el gigante
  - los refaítas
  - Rapha
  rationale: El hebreo permite más de una lectura y el contexto de Gat y de los relatos previos de combate con gigantes favorece una referencia al linaje asociado con esa tradición. En español, conservar «Rapha» en el texto principal evita borrar esa tensión; la nota explica las alternativas legítimas.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó confirmado por el control cruzado de alta concordancia, así que la versión española mantiene la misma lectura conservadora del linaje de הָרָפָה y la imagen de muerte implícita en «cayeron».
  spanish_consistency_notes:
  - Se mantiene «Rapha» en la nota y en el texto para conservar la tensión interpretativa del hebreo.
  - Se prefirió «siervos» para עֲבָדָיו por consistencia con el valor léxico básico del término.
  - «Gat» sigue la forma española breve y estable del topónimo.
  - «Por mano de» conserva la idiomática de agencia sin volverla demasiado literal ni perder claridad.
