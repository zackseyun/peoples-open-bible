theological_decisions:
- issue: Rendering of ἀδελφοί in a congregational address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Following the project's gender-accurate-over-gender-neutral policy, the masculine plural is retained in the main text while the representative force may be clarified in a footnote. This avoids importing an expansion into the text while still acknowledging likely mixed-gender reference.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of metaphorical τρέχῃ for the progress of the gospel
  chosen_reading: may spread rapidly
  alternative_readings:
  - may run
  rationale: Optimal equivalence favors a clear English expression of the metaphor's sense rather than preserving the image woodenly where it may obscure meaning. The theological content is the unhindered advance of the Lord's message, not a literal motion metaphor.
  doctrine_reference: DOCTRINE.md §Translation philosophy; optimal equivalence
