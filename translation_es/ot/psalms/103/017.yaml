revisions:
- from: Pero la misericordia[a] de Yahvé es desde la eternidad y hasta la eternidad sobre los que le temen, y su justicia[b] para los hijos de sus hijos.
  to: Pero el amor fiel[a] de Yahvé es de eternidad a eternidad sobre los que le temen, y su rectitud[b] hasta los hijos de sus hijos.
