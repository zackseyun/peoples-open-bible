id: ACT.15.16
reference: Acts 15:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἀναστρέψω καὶ ἀνοικοδομήσω τὴν σκηνὴν Δαυὶδ τὴν πεπτωκυῖαν καὶ τὰ ⸀κατεσκαμμένα αὐτῆς ἀνοικοδομήσω καὶ ἀνορθώσω αὐτήν,
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/016.yaml
  text: After these things I will return[a], and I will rebuild the fallen tent of David; I will rebuild its ruins, and I will restore it[b],
  footnotes:
  - marker: a
    text: Or 'the tabernacle of David.' The Greek word can mean 'tent' or 'tabernacle.'
    reason: lexical_alternative
  - marker: b
    text: '''The tent of David'' is a prophetic metaphor for the restoration associated with David''s line or kingdom.'
    reason: cross_reference
translation:
  language: ko
  text: 「이 일 후에 내가 돌아와서 무너진 다윗의 장막을 다시 짓겠고, 그 허물어진 것을 다시 짓고, 그것을 일으켜 세우겠다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 아모스 9:11-12 LXX 인용에서 화자(κύριος)의 정체
  chosen_reading: 내가 돌아와서…내가 다시 짓겠다 (야훼의 1인칭 발화)
  alternative_readings:
  - 주께서…
  rationale: '15:17에서 화자는 자신을 「λέγει κύριος」로 명시한다. 이는 아모스 본문의 야훼이며, 15:17에서는 「주」가 아니라 「야훼」로 옮긴다(글로사리 정책: κύριος = YHWH의 LXX 인용). 16절은 그 동일한 발화의 도입이므로 1인칭이 야훼임을 인지하여 옮긴다.'
  doctrine_reference: 'Glossary: κύριος (= YHWH) → 야훼'
