translation:
  language: es
  text: Quita de mí el ruido de tus cantos, y no escucharé la melodía de tus arpas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arpas» sigue la equivalencia tradicional; el hebreo נבל nombra un antiguo instrumento de cuerda, y también puede traducirse «liras» o, de modo más general, «instrumentos de cuerda».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵר
  english_pob_choice: Take away
  chosen_spanish: Quita
  alternatives_spanish:
  - Aparta
  - Quita
  - Retira
  lexicon: HALOT
  rationale: El imperativo pide remover algo de la presencia del hablante. «Quita» es natural en español y conserva la fuerza directa del mandato.
- source_word: מֵעָלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de sobre mí
  - de mi presencia
  - lejos de mí
  lexicon: HALOT
  rationale: La idea literal es «de sobre mí», pero «de mí» comunica bien la rechazadora relación personal sin volver pesada la frase.
- source_word: הֲמוֹן
  english_pob_choice: the noise
  chosen_spanish: el ruido
  alternatives_spanish:
  - el estruendo
  - el bullicio
  - la multitud sonora
  lexicon: HALOT
  rationale: En este contexto de culto rechazado, el sustantivo tiene matiz desfavorable y describe un sonido ruidoso, no una simple «melodía» o «multitud».
- source_word: שִׁרֶיךָ
  english_pob_choice: your songs
  chosen_spanish: tus cantos
  alternatives_spanish:
  - tus canciones
  - tu canto
  lexicon: HALOT
  rationale: El plural constructo de «canción/canto» se vierte naturalmente como «cantos». Mantiene el paralelismo con el siguiente miembro.
- source_word: וְזִמְרַת
  english_pob_choice: the melody
  chosen_spanish: la melodía
  alternatives_spanish:
  - la música
  - el canto
  - el son
  lexicon: HALOT
  rationale: «Melodía» preserva el sentido musical del término y distingue este segundo miembro del primero, como hace la solución inglesa.
- source_word: נְבָלֶיךָ
  english_pob_choice: your harps
  chosen_spanish: tus arpas
  alternatives_spanish:
  - tus liras
  - tus instrumentos de cuerda
  lexicon: HALOT
  rationale: נבל designa un instrumento antiguo de cuerda; «arpa» es el equivalente tradicional y comprensible en español, aunque el instrumento exacto no puede fijarse con certeza.
- source_word: לֹא אֶשְׁמָע
  english_pob_choice: I will not listen
  chosen_spanish: no escucharé
  alternatives_spanish:
  - no oiré
  - no prestaré oído
  lexicon: HALOT
  rationale: El imperfecto negado expresa rechazo volitivo. «No escucharé» reproduce mejor la decisión de no atender que un simple «no oiré».
theological_decisions:
- issue: Rechazo divino del culto sin justicia
  english_pob_reading: The verse is rendered as a direct divine repudiation of hypocritical worship practices, without softening the negative force.
  chosen_spanish_reading: El verso expresa un rechazo divino directo del culto vacío, sin suavizar la negativa.
  alternative_spanish_readings:
  - El verso podría suavizarse como mera falta de atención a la música
  - Podría leerse como una observación neutral sobre el sonido del culto
  rationale: La forma del hebreo y el contexto inmediato de Amós 5 sostienen una negativa profética fuerte. La traducción española debe conservar esa dureza sin añadir interpretación más allá del texto.
  doctrine_reference: Amós 5:21-24; filosofía de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado permaneció sin cambios en la última revisión; la única tensión relevante es la identificación exacta de נבל, que sigue siendo incierta. La versión española conserva esa incertidumbre con una nota léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto, pero este versículo no lo contiene explícitamente.
  - Se conserva «cantos» y «melodía» para respetar el paralelismo y evitar reducir ambos miembros a sinónimos planos.
  - «Arpas» se usa como equivalente tradicional readable, con nota que preserva la alternativa «liras»/«instrumentos de cuerda».
