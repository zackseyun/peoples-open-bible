id: GEN.37.7
reference: Genesis 37:7
source:
  edition: WLC
  text: וְ֠/הִנֵּה אֲנַ֜חְנוּ מְאַלְּמִ֤ים אֲלֻמִּים֙ בְּ/ת֣וֹךְ הַ/שָּׂדֶ֔ה וְ/הִנֵּ֛ה קָ֥מָה אֲלֻמָּתִ֖/י וְ/גַם נִצָּ֑בָה וְ/הִנֵּ֤ה תְסֻבֶּ֨ינָה֙ אֲלֻמֹּ֣תֵי/כֶ֔ם וַ/תִּֽשְׁתַּחֲוֶ֖יןָ לַ/אֲלֻמָּתִֽ/י־׃
translation:
  text: And behold[a], we were binding sheaves in the midst of the field, and behold, my sheaf rose and also stood upright; and behold[c][b], your sheaves gathered around and bowed down to my sheaf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surrounded' for 'gathered around'; the Hebrew verb denotes turning or going around.
    reason: lexical_alternative
  - marker: b
    text: Or 'prostrated themselves' for 'bowed down.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And look, we were binding sheaves in the middle of the field, and look, my sheaf rose and also stood upright, and look, your sheaves gathered around and bowed down to my sheaf.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look ... and look ... and look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Repeated discourse marker in dream narration; rendered with the natural but vivid 'look' to preserve the immediacy and repetition without archaic 'behold.' Initial waw is carried by 'And.'
- source_word: מְאַלְּמִים אֲלֻמִּים
  chosen: binding sheaves
  alternatives:
  - tying bundles
  - gathering sheaves
  lexicon: HALOT
  rationale: The verb and cognate noun form an idiomatic pair referring to making grain into sheaves. 'Binding sheaves' preserves the agricultural image and the cognate force better than a looser rendering.
- source_word: בְּתוֹךְ הַשָּׂדֶה
  chosen: in the middle of the field
  alternatives:
  - in the field
  - within the field
  lexicon: HALOT
  rationale: בְּתוֹךְ is more specific than simple 'in'; 'in the middle of the field' preserves the spatial nuance while remaining natural English.
- source_word: קָמָה
  chosen: rose
  alternatives:
  - stood up
  - arose
  lexicon: HALOT
  rationale: Qal of קום here marks the sheaf's rising movement. 'Rose' captures the action succinctly and prepares for the following stative verb.
- source_word: וְגַם נִצָּבָה
  chosen: and also stood upright
  alternatives:
  - and indeed stood
  - and also took its stand
  lexicon: HALOT
  rationale: נצב adds the idea of being set or standing firm/upright after rising. 'Also stood upright' preserves the sequence and the emphatic addition of וְגַם.
- source_word: תְסֻבֶּינָה
  chosen: gathered around
  alternatives:
  - surrounded
  - went around
  lexicon: HALOT
  rationale: The verb denotes turning/going around. In this dream context, 'gathered around' communicates the encircling movement in idiomatic English without sounding overly mechanical.
- source_word: וַתִּשְׁתַּחֲוֶיןָ
  chosen: bowed down
  alternatives:
  - prostrated themselves
  - paid homage
  lexicon: HALOT
  rationale: The verb commonly denotes bowing oneself down. 'Bowed down' is the clearest modern English rendering and avoids importing stronger political overtones unless context requires them.
- source_word: אֲלֻמָּתִי / אֲלֻמֹּתֵיכֶם
  chosen: my sheaf / your sheaves
  alternatives:
  - my bundle / your bundles
  lexicon: HALOT
  rationale: Consistent rendering of אֲלֻמָּה as 'sheaf' fits the agricultural setting and keeps the symbolic correspondence clear.
