  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura legal, el movimiento hacia Yahvé, la ubicación cultual y el animal sacrificial. Sin embargo, falla en un punto léxico clave: traduce אָשָׁם como «ofrenda por el pecado», lo cual desplaza el sentido de culpa/reparación hacia otra categoría sacrificial distinta. El hebreo aquí habla de una ofrenda de culpa/reparación, no de la ofrenda por el pecado.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. «Y traerá… a la entrada de la tienda de reunión» fluye bien. La principal corrección necesaria es terminológica, no estilística. Conviene alinear el término sacrificial en ambas ocurrencias para evitar confusión técnica.
  glossary_alignment: '«Yahvé» está correctamente alineado con la política del proyecto. «Tienda de reunión» y «carnero» son adecuados. La desalineación importante es אָשָׁם: debe renderizarse como «ofrenda por la culpa» o «ofrenda de reparación», no «ofrenda por el pecado». La nota léxica puede conservar la alternativa «de reparación».'
  issues:
  - severity: high
    issue: אָשָׁם fue traducido como «ofrenda por el pecado» en ambas ocurrencias.
    rationale: Esto no preserva la distinción sacrificial del hebreo. אָשָׁם corresponde a culpa/reparación, mientras que «ofrenda por el pecado» sugiere otra categoría cultual y altera el sentido fuente y la rationale documentada del POB inglés.
  - severity: medium
    issue: La nota al pie actual incluye «ofrenda por el pecado» como lectura principal implícita en el texto.
    rationale: La nota inglesa preserva la ambigüedad entre culpa y reparación; el español debe reflejar esa tensión sin introducir la categoría «pecado», que no es la mejor equivalencia aquí.
  revised_spanish_text: 'Y traerá su ofrenda por la culpa[a] a Yahvé, a la entrada de la tienda de reunión: un carnero como ofrenda por la culpa.'
  revised_footnotes:
