translation:
  language: es
  text: Les dio las dos carretas[a] y las cuatro cabezas de ganado[b] a los hijos de Gersón, conforme a su servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los dos carros de carga».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los cuatro bueyes». El hebreo usa un término colectivo para bovinos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲגָלֹת
  english_pob_choice: carts
  chosen_spanish: carros
  alternatives_spanish:
  - carretas
  - carros de carga
  lexicon: HALOT
  rationale: 'עֲגָלָה puede referirse a un vehículo de transporte; en español, «carros» es natural y suficientemente amplio. «Carretas» también es posible, pero suena algo más rural o específico. Se evita calcar de forma rígida «carts» como «carros» sin justificarlo: aquí encaja por el contexto de transporte del tabernáculo.'
- source_word: הַבָּקָר
  english_pob_choice: cattle
  chosen_spanish: animales de tiro
  alternatives_spanish:
  - bueyes
  - ganado
  lexicon: HALOT
  rationale: בָּקָר es un colectivo bovino; el contexto de arrastre de los carros muestra su función como animales de tiro. «Animales de tiro» expresa esa función sin forzar sexo ni especie. «Bueyes» es plausible pero más interpretativo; «ganado» conserva el colectivo, pero pierde la relación funcional con los carros.
- source_word: לִבְנֵי גֵרְשׁוֹן
  english_pob_choice: to the sons of Gershon
  chosen_spanish: a los hijos de Gersón
  alternatives_spanish:
  - a los gersonitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a los hijos de Gersón». Se conserva la forma filial porque el texto la usa explícitamente; «gersonitas» sería una gentilicio más idiomático, pero menos pegado a la forma del original.
- source_word: כְּפִי עֲבֹדָתָם
  english_pob_choice: according to their service
  chosen_spanish: conforme a su servicio
  alternatives_spanish:
  - según su servicio
  - de acuerdo con su tarea
  lexicon: HALOT
  rationale: כְּפִי significa «según/conforme a»; עֲבֹדָה aquí es servicio asignado, especialmente cultual. «Conforme a su servicio» mantiene el paralelismo y el tono formal sin añadir explicaciones que el hebreo no explicita.
- source_word: נָתַן
  english_pob_choice: He gave
  chosen_spanish: Les dio
  alternatives_spanish:
  - dio
  - les asignó
  lexicon: HALOT
  rationale: 'נָתַן es «dar». Como el receptor aparece después, el español fluye mejor con dativo anticipado: «Les dio». «Les asignó» sería demasiado interpretativo para el verbo básico.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios sustantivos y el texto quedó en alta concordancia. Para el español, se mantuvo la sencillez del hebreo y la decisión léxica principal de no sobretraducir el colectivo bovino, aunque se explicitó su función como animales de tiro para que el lector entienda el contexto narrativo.
  spanish_consistency_notes:
  - Se conservó la estructura simple sujeto-verbo-objeto, acorde con el hebreo.
  - Se mantuvo «Gersón» como transliteración coherente con el nombre propio.
  - Se prefirió un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - Las notas a y b se anclan en palabras del texto para preservar las alternativas léxicas documentadas.
