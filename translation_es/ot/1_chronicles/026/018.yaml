    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְבָּר
  english_pob_choice: Parbar
  chosen_spanish: Parbar
  alternatives_spanish:
  - recinto
  - patio
  - anexo
  - suburbio
  lexicon: HALOT
  rationale: El hebreo es raro y su referencia arquitectónica exacta es incierta. Siguiendo la decisión revisada del POB inglés, se conserva la transliteración «Parbar» para no imponer una interpretación no segura. Se preservan en nota alternativas semánticas plausibles en español.
- source_word: מַעֲרָב
  english_pob_choice: west
  chosen_spanish: oeste
  alternatives_spanish:
  - occidente
  - lado oeste
  lexicon: HALOT
  rationale: El término indica la dirección o lado occidental. «Oeste» es la forma clara y natural en español contemporáneo.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: Número cardinal que indica la cantidad asignada.
- source_word: מְסִלָּה
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - calzada
  - ruta
  - carretera
  lexicon: HALOT
  rationale: El POB inglés revisado optó por «road» para neutralizar la posible técnica de «highway». En español, «camino» mantiene la neutralidad y la naturalidad sin sobreespecificar la clase de vía.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - '2'
  lexicon: HALOT
  rationale: Número cardinal que indica la segunda asignación.
