base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/029.yaml
  text: The way of Yahweh is a stronghold to the blameless[b][a], but destruction to those who do evil.
  footnotes:
  - marker: a
    text: Or 'The LORD's way' or 'the path of the LORD'; the Hebrew may refer both to the LORD's own way of acting and to the way he sets before people.
    reason: lexical_alternative
  - marker: b
    text: Or 'ruin' or 'terror' for 'destruction.'
    reason: lexical_alternative
