id: JDG.18.24
reference: Judges 18:24
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר אֶת אֱלֹהַ/י֩ אֲשֶׁר עָשִׂ֨יתִי לְקַחְתֶּ֧ם וְֽ/אֶת הַ/כֹּהֵ֛ן וַ/תֵּלְכ֖וּ וּ/מַה לִּ֣/י ע֑וֹד וּ/מַה זֶּ֛ה תֹּאמְר֥וּ אֵלַ֖/י מַה לָּֽ/ךְ־־־־־־׃
translation:
  text: He said[a], “You have taken my gods that I made, and the priest, and you have gone away. What do I have left now? So how can you say to me, ‘What is the matter with you?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my god(s)' or 'my divine images.' The Hebrew word can be singular or plural in some contexts, but here the broader context favors 'my gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: my gods
  alternatives:
  - my god(s)
  - my divine images
  lexicon: HALOT
  rationale: 'Although אֱלֹהִים can sometimes function as a singular or refer to God, here the 1cs suffix with the surrounding context of Micah''s household idols (including carved image and metal image in the chapter) favors a plural sense in idiomatic English: ''my gods.'' This also preserves the irony of man-made deities.'
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I made
  alternatives:
  - which I made
  - that I fashioned
  lexicon: HALOT
  rationale: A straightforward relative clause modifying 'my gods.' 'Made' is the plain sense of עשה and preserves the rhetorical force that these are objects Micah produced/commissioned.
- source_word: לְקַחְתֶּם
  chosen: you have taken
  alternatives:
  - you took
  - you have seized
  lexicon: HALOT
  rationale: The qatal 2mp in direct speech can be rendered as a present-result perfect in English. 'You have taken' fits the complaint and the continuing loss Micah feels.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite article retained. The reference is to Micah's own priest, now taken by the Danites.
- source_word: וַתֵּלְכוּ
  chosen: you have gone away
  alternatives:
  - you went away
  - and gone
  lexicon: HALOT
  rationale: 'Rendered with present-result force in English to match the ongoing situation: they have departed and are no longer with him.'
- source_word: וּמַה לִּי עוֹד
  chosen: What do I have left now?
  alternatives:
  - What is left to me anymore?
  - What remains for me still?
  lexicon: HALOT
  rationale: This idiom expresses deprivation, not merely possession. 'What do I have left now?' is natural modern English and captures the lament.
- source_word: וּמַה זֶּה תֹּאמְרוּ אֵלַי
  chosen: So how can you say to me
  alternatives:
  - And what is this that you say to me
  - Why then do you say to me
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and confrontational. This rendering captures the sense of indignation while remaining readable. 'So' reflects the inferential force from the previous complaint.
- source_word: מַה לָּךְ
  chosen: What is the matter with you?
  alternatives:
  - What is wrong with you?
  - What troubles you?
  lexicon: HALOT
  rationale: Common idiomatic expression meaning 'What is bothering you?' or 'What is wrong?' 'What is the matter with you?' is natural and preserves the directness without sounding overly colloquial.
