id: 2CO.4.2
reference: 2 Corinthians 4:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἀπειπάμεθα τὰ κρυπτὰ τῆς αἰσχύνης, μὴ περιπατοῦντες ἐν πανουργίᾳ μηδὲ δολοῦντες τὸν λόγον τοῦ θεοῦ, ἀλλὰ τῇ φανερώσει τῆς ἀληθείας ⸀συνιστάνοντες ἑαυτοὺς πρὸς πᾶσαν συνείδησιν ἀνθρώπων ἐνώπιον τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/002.yaml
  text: Instead, we have renounced the hidden things of shame, not walking in cunning nor falsifying the word of God, but by the open display of the truth commending ourselves to every human conscience before God.
  footnotes:
  - marker: a
    text: Or 'by the manifestation of the truth.' The Greek may emphasize openly making the truth known rather than proclamation alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'adulterating the word of God.' The verb can suggest corrupting something by deceitful tampering.
    reason: lexical_alternative
translation:
  language: ko
  text: 도리어 우리는 부끄러움의 은밀한 것들을 버리고, 간교함으로 행하지 않으며 하나님의 말씀을 왜곡하지 않습니다. 도리어 진리를 환히 드러냄으로 하나님 앞에서 모든 사람의 양심에 우리 자신을 추천합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπειπάμεθα
  english_pob_choice: have renounced
  chosen_korean: 버리다
  alternatives_korean:
  - 거절하다
  - 단호히 거부하다
  lexicon: BDAG
  rationale: 의도적 절연의 강한 표현.
- source_word: πανουργίᾳ
  english_pob_choice: cunning
  chosen_korean: 간교함
  alternatives_korean:
  - 교활함
  lexicon: BDAG
  rationale: πανουργία는 부정적 영리함. 「간교함」.
- source_word: δολοῦντες
  english_pob_choice: falsifying
  chosen_korean: 왜곡하다
  alternatives_korean:
  - 속이다
  - 변질시키다
  lexicon: BDAG
  rationale: δολόω는 「섞다·변조하다」. 2:17의 καπηλεύω와 의미적 인접.
- source_word: φανερώσει τῆς ἀληθείας
  english_pob_choice: open display of the truth
  chosen_korean: 진리를 환히 드러냄
  alternatives_korean: []
  lexicon: BDAG
  rationale: φανέρωσις는 「공개적 드러남」.
