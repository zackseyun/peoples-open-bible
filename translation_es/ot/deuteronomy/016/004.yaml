revisions:
- from: No se ha de ver levadura[a][b] en todo tu territorio durante siete días, y nada de la carne[b] que sacrifiques en la tarde del primer día permanecerá hasta la mañana.
  to: No se ha de ver levadura en todo tu territorio durante siete días,[a] y nada de la carne[b] que sacrifiques al anochecer del primer día[c] permanecerá hasta la mañana.
  rationale: 'Se corrige el texto para reflejar mejor el hebreo y el rastro de auditoría del POB: se elimina la nota defectuosa sobre «levadura», se mejora la expresión temporal con «al anochecer», y se restauran notas que preservan la ambigüedad interpretativa sobre «el primer día» sin identificar explícitamente el sacrificio como cordero pascual. También se corrigen los marcadores para que sean únicos y estén anclados correctamente. Dado que la nota interpretativa inglesa corresponde específicamente a «on the first day», se mantiene una nota en ese punto; y se conserva una nota léxica sobre «carne».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:07:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: prohibición de que haya levadura visible en todo el territorio por siete días y de dejar carne sacrificial hasta la mañana. Sin embargo, no preserva bien el aparato de notas del POB inglés: falta la nota interpretativa sobre «el primer día», y las notas actuales están mal ancladas y en parte duplican el texto principal sin reflejar las razones auditadas.'
  spanish_quality_summary: 'El español es generalmente natural y digno, pero hay dos problemas de calidad: «en la tarde del primer día» suena menos preciso que «en la noche/al anochecer del primer día» o «en la tarde, en el primer día» para בָּעֶרֶב; y «del primer día» introduce una relación posesiva/genitiva menos fiel que «en el primer día» o mejor «el primer día» dentro de la cláusula temporal. Además, la nota [a] sobre «levadura» es incorrecta, porque ofrece como alternativa la misma palabra.'
  glossary_alignment: No hay conflicto con la terminología global del proyecto. «Levadura» para שְׂאֹר y «carne» para בָּשָׂר son adecuados. La decisión de no especificar «cordero pascual» en el texto principal sigue correctamente la rationale teológica inglesa. Se debe, no obstante, conservar en nota la posible referencia específica al sacrificio de Pascua asociado con «el primer día».
  issues:
  - severity: high
    issue: Falta la nota interpretativa correspondiente a «on the first day».
    rationale: El POB inglés conserva una nota importante sobre la posible referencia específica al sacrificio de Pascua al inicio de la fiesta. El borrador español no la incluye, perdiendo una tensión interpretativa documentada.
  - severity: high
    issue: 'Las notas están mal distribuidas: [b] aparece tanto en «levadura» como en «carne» y no corresponde al contenido auditado.'
    rationale: Cada marcador debe ser único y debe anclarse exactamente donde corresponde. Aquí se reutiliza/mezcla la función de la nota interpretativa y la léxica, contrariando la disciplina requerida.
  - severity: medium
    issue: La nota [a] sobre «levadura» no aporta una alternativa real y resulta defectuosa.
    rationale: Dice «O «levadura»» cuando el texto principal ya usa «levadura». Si se conserva una nota, debe ofrecer una alternativa real como «fermento», o eliminarse.
  - severity: medium
    issue: «en la tarde del primer día» no refleja con suficiente fidelidad la estructura temporal hebrea.
    rationale: בָּעֶרֶב בַּיּוֹם הָרִאשׁוֹן se representa mejor como «en la tarde del primer día» solo si se entiende correctamente, pero el español aquí suena algo ambiguo y el lexical rationale dado para «del primer día» es menos fiel que el hebreo. «en la noche del primer día» o «al anochecer del primer día» mejora la naturalidad y la referencia temporal.
  revised_spanish_text: No se ha de ver levadura en todo tu territorio durante siete días,[a] y nada de la carne[b] que sacrifiques al anochecer del primer día[c] permanecerá hasta la mañana.
