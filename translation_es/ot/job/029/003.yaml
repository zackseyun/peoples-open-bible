translation:
  language: es
  text: cuando su lámpara brillaba sobre mi cabeza, y por su luz[a] caminaba por la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la luz de ella caminaba en la oscuridad». El sufijo hebreo en «su luz» puede referirse, más inmediatamente, a la lámpara, o en el contexto, a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּהִלּוֹ
  english_pob_choice: when his lamp shone
  chosen_spanish: cuando su lámpara brillaba
  alternatives_spanish:
  - cuando él hacía brillar
  - en su brillo
  lexicon: HALOT
  rationale: 'El prefijo ב más el infinitivo aquí funciona temporalmente; en español, «cuando» expresa bien el marco retrospectivo. Para conservar la imagen concreta del texto y su relación con נֵר, se explicita la lámpara como sujeto visual: «su lámpara brillaba».},{'
- source_word: נֵרוֹ
  english_pob_choice: his lamp
  chosen_spanish: su lámpara
  alternatives_spanish:
  - su luz
  - su candil
  lexicon: HALOT
  rationale: נֵר designa un objeto concreto, «lámpara», no solo la luz abstracta. «Lámpara» mantiene la imagen física y sugiere el resplandor que ilumina desde arriba.
- source_word: עֲלֵי רֹאשִׁי
  english_pob_choice: above my head
  chosen_spanish: sobre mi cabeza
  alternatives_spanish:
  - encima de mi cabeza
  - sobre mi cabeza
  lexicon: HALOT
  rationale: La relación espacial se conserva con una preposición natural en español. «Sobre mi cabeza» comunica la lámpara colocada en altura, sin forzar un calco.
- source_word: לְאוֹרוֹ
  english_pob_choice: by his light
  chosen_spanish: por su luz
  alternatives_spanish:
  - con su luz
  - en su luz
  lexicon: HALOT
  rationale: La ל instrumental/acompañante se expresa bien con «por». «Luz» reproduce אָוֹר con claridad, manteniendo la conexión con la lámpara y el resplandor.
- source_word: אֵלֶךְ
  english_pob_choice: I walked
  chosen_spanish: caminaba
  alternatives_spanish:
  - andaba
  - iba
  lexicon: HALOT
  rationale: El imperfecto en este recuerdo tiene valor de acción habitual o pasada. «Caminaba» es natural en español y conserva la idea de movimiento continuado.
- source_word: חֹשֶׁךְ
  english_pob_choice: through darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - por la oscuridad
  lexicon: HALOT
  rationale: En español, «andar/caminar en tinieblas» es una formulación bíblica clara y fiel. Aunque el inglés POB usa «through darkness», el hebreo permite el sentido de moverse en medio de la oscuridad; «en tinieblas» preserva la imagen sin sobrecargarla.
theological_decisions:
- issue: Referente del sufijo masculino singular en «su lámpara» / «su luz»
  english_pob_reading: The suffixes refer to God, as Job recalls God's favor and guidance.
  chosen_spanish_reading: Los sufijos se pueden entender como referidos a Dios, en el marco del recuerdo del favor y la guía divinos.
  alternative_spanish_readings:
  - Se pueden entender más inmediatamente como referidos a la lámpara misma en «su luz».
  rationale: En el contexto de Job 29, la memoria de Job se centra en la protección y guía de Dios. Mantener el posesivo «su» preserva la posible referencia personal a Dios, sin perder la cercanía con la imagen concreta de la lámpara.
  doctrine_reference: Job 29:2-4; providencia y guía divina
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con equivalencia óptima: se mantuvo la imagen concreta de la lámpara, se hizo explícito el marco temporal y se conservó la ambigüedad del sufijo mediante nota.'
  spanish_consistency_notes:
  - Se usa «lámpara» para נֵר y «luz» para אוֹר, distinguiendo objeto e iluminación.
  - Se evitó «SEÑOR» por el nombre divino implícito; el verso no lo explicita, solo lo presupone en el contexto.
  - «Tinieblas» conserva un registro bíblico natural y la oposición poética con la luz.
