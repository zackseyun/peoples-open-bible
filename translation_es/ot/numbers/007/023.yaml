translation:
  language: es
  text: 'y para el sacrificio de paz[a]: dos reses, cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Netanel hijo de Zuar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «sacrificio de comunión» o «sacrificio de bienestar» para el término hebreo שְׁלָמִים.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para el sacrificio
  - y como el sacrificio de
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen el elemento siguiente de la lista de ofrendas. «Para el sacrificio de» conserva la relación sintáctica sin sonar forzado en español.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: Se mantiene la categoría sacrificial conocida, pero en español «ofrendas de paz» reproduce mejor la forma tradicional del término sin perder su sentido cultual. Se conserva la nota de alternativas porque el hebreo admite otros matices.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos reses
  alternatives_spanish:
  - dos bovinos
  - dos cabezas de ganado
  lexicon: HALOT
  rationale: בָּקָר es un colectivo para ganado vacuno. «Reses» suena natural en español y mantiene el valor colectivo sin especificar indebidamente sexo o función.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos ovinos
  - cinco borregos machos
  lexicon: HALOT
  rationale: אֵילִם designa carneros, no ovejas en general. «Carneros» es preciso y claro.
- source_word: עַתּוּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabras macho
  - cinco chivos
  lexicon: HALOT
  rationale: עַתּוּדִים se refiere a machos cabríos. «Machos cabríos» conserva la fuerza léxica y evita la ambigüedad de «chivos», que puede ser más regional o menos precisa.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos en su primer año
  lexicon: HALOT
  rationale: כְּבָשִׂים + בְּנֵי שָׁנָה expresa corderos de un año. En español, «corderos de un año» comunica de forma natural la especificación de edad sin recargar la frase.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Este fue el ofrecimiento de
  - Esto fue la ofrenda de
  lexicon: HALOT
  rationale: La fórmula conclusiva identifica la contribución de la persona nombrada. «Ofrenda» mantiene el sustantivo cultual básico de קָרְבָּן en un registro claro y digno.
- source_word: נְתַנְאֵל בֶּן צוּעָר
  english_pob_choice: Nethanel son of Zuar
  chosen_spanish: Natanael hijo de Zuar
  alternatives_spanish:
  - Netanel hijo de Zuar
  - Natanel hijo de Zuar
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera legible en español. «Natanael» es la forma más reconocible y estable para el nombre נתנאל; «hijo de» conserva el patronímico.
theological_decisions:
- issue: Renderización de שְׁלָמִים
  english_pob_reading: peace offerings, with an alternative footnote for fellowship offerings or offerings of well-being
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se oculta la variedad semántica del término. «Ofrendas de paz» es idiomático y suficientemente cercano al valor cultual del hebreo, mientras que las alternativas se preservan como posibilidades legítimas.
  doctrine_reference: Levítico 3; Números 7
- issue: Categoría sacrificial de קָרְבָּן
  english_pob_reading: offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - ofrecimiento
  - don
  rationale: En este contexto ritual, «ofrenda» es el equivalente español más natural y preciso. Se evita «don» por ser más general y menos técnico.
  doctrine_reference: Números 7:23-24
translation_notes:
  revision_awareness: 'Se revisó la validación anterior: el marcador [a] ahora está anclado explícitamente en el texto español en «ofrendas de paz[a]». No se hicieron otros cambios sustantivos respecto del sentido fuente.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin sustituir el léxico sacrificial por equivalentes eclesiásticos no motivados por el hebreo.
  - «Reses» conserva el colectivo de בָּקָר sin forzar «toros» u «bueyes».
  - Los numerales y la secuencia de animales siguen exactamente el orden del hebreo.
  - El patronímico se tradujo con «hijo de» para reflejar la estructura nominal del original.
