lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Los hijos de
  - Y los hijos de
  lexicon: HALOT
  rationale: La fórmula genealógica con בְּנֵי se expresa de manera natural en español con «los hijos de». Conserva el valor de enlace de ו con «Y», sin volver la frase pesada.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Mica
  alternatives_spanish:
  - Micaías
  - Micah
  lexicon: HALOT
  rationale: Es nombre propio. En español bíblico, «Mica» mantiene la transliteración breve y evita confundirlo con otras formas derivadas; no hay base en el hebreo para expandirlo a una forma distinta.
- source_word: פִּיתוֹן
  english_pob_choice: Pithon
  chosen_spanish: Pithón
  alternatives_spanish:
  - Pithon
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta la acentuación al patrón español para lectura pública, sin alterar la forma del nombre.
- source_word: וָמֶלֶךְ
  english_pob_choice: Melech
  chosen_spanish: Melec
  alternatives_spanish:
  - Melech
  lexicon: HALOT
  rationale: Nombre propio con valor de nombre, no el sustantivo común «rey». En español, «Melec» evita confundirlo con el apelativo común y conserva la consonancia con el hebreo.
- source_word: וְתַחְרֵעַ
  english_pob_choice: and Tahrea
  chosen_spanish: Tahrea
  alternatives_spanish:
  - y Tahrea
  lexicon: HALOT
  rationale: Nombre propio transliterado. El prefijo conjuntivo ya queda cubierto por la coordinación española de la lista, por lo que no es necesario repetir «y» ante el último nombre.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden en una lista genealógica simple sin variantes textuales, notas doctrinales ni ambigüedades relevantes; la revisión más reciente lo dejó sin cambios.
  spanish_consistency_notes:
  - Se mantiene el orden de la lista del hebreo.
  - Se transliteran todos los nombres propios, evitando traducciones interpretativas.
  - No se añade puntuación explicativa más allá de los dos puntos propios de una lista genealógica.
  - Se conserva el tono sobrio y registral adecuado para Crónicas.
