translation:
  language: es
  text: Bendeciré a Yahvé[a] en todo tiempo; continuamente estará su alabanza en mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יְהוָה (YHWH); se conserva como nombre divino propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבָרֲכָה
  english_pob_choice: I will bless
  chosen_spanish: Bendeciré
  alternatives_spanish:
  - Yo bendeciré
  - Quiero bendecir
  lexicon: HALOT
  rationale: El verbo ברך en primera persona singular expresa aquí una resolución/promesa de alabanza. En español, el futuro simple comunica bien ese compromiso volitivo sin volverlo rígidamente literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como nombre propio en español con la forma de uso bíblico 'Yahvé', coherente con la pauta del proyecto de no sustituirlo por un título.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - en todo momento
  - siempre
  lexicon: HALOT
  rationale: La expresión hebrea comunica totalidad temporal. 'En todo tiempo' preserva esa amplitud con un giro natural y digno en español.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constante­mente
  lexicon: HALOT
  rationale: El adverbio intensifica la continuidad de la alabanza. 'Continuamente' mantiene el matiz de duración sostenida sin repetir de forma idéntica la idea de 'en todo tiempo'.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su loor
  - la alabanza de él
  lexicon: HALOT
  rationale: תהלה se entiende de manera directa como 'alabanza'. El sufijo pronominal puede referirse a la alabanza dirigida a Yahvé o a la alabanza que le pertenece como tema; 'su alabanza' conserva esa ambigüedad útil en español.
- source_word: בְּפִי
  english_pob_choice: in my mouth
  chosen_spanish: en mi boca
  alternatives_spanish:
  - en mis labios
  lexicon: HALOT
  rationale: La imagen corporal de la expresión verbal se conserva con 'en mi boca', una equivalencia cercana y perfectamente comprensible en español.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español bíblico contemporáneo, 'Yahvé' es la forma que mejor comunica el nombre propio divino sin reemplazarlo por un título; además, mantiene la intención del POB de preservar el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB ya había estabilizado la lectura como una afirmación de alabanza continua y sin cambios en la revisión más reciente. Esta versión española sigue esa decisión, conservando el paralelismo temporal de 'en todo tiempo' / 'continuamente' y la referencia explícita al nombre divino sin sustitución titulada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Su alabanza'' conserva la ambigüedad hebrea entre alabanza dirigida a Dios y alabanza que lo tiene por objeto.'
  - El futuro simple 'Bendeciré' refleja compromiso volitivo, no mera previsión cronológica.
