translation:
  language: es
  text: Cuando él llegó, he aquí que Elí estaba sentado en el asiento junto al camino[a], vigilando, porque su corazón temblaba[b] por el arca de Dios. Y el hombre vino para informar en la ciudad, y toda la ciudad gritó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «junto a la mano/lado del camino», un modismo que significa al borde del camino o al costado del camino.'
    reason: source_note
  - marker: b
    text: O «porque su corazón estaba angustiado por el arca de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: When he came
  chosen_spanish: Cuando él llegó
  alternatives_spanish:
  - Y llegó
  - Cuando vino
  lexicon: HALOT
  rationale: El valor narrativo temporal del waw-consecutivo se conserva mejor en español con una subordinada temporal. «Llegó» suena más natural que un simple «vino» y mantiene el avance de la escena.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce una escena vívida y de atención súbita. «He aquí» preserva ese efecto de presentación directa sin perder dignidad literaria.
- source_word: יֹשֵׁב עַל־הַכִּסֵּא
  english_pob_choice: was sitting on the seat
  chosen_spanish: estaba sentado en el asiento
  alternatives_spanish:
  - estaba sentado en su silla
  - se sentaba en el asiento
  lexicon: HALOT
  rationale: El participio describe la postura continua de Elí. «Asiento» es más neutral y cercano a כִּסֵּא que «silla», y evita domesticidad excesiva.
- source_word: יַד דֶּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al borde del camino
  - al lado del camino
  lexicon: HALOT
  rationale: El hebreo usa un modismo de localización lateral. «Junto al camino» comunica bien el sentido idiomático sin forzar una explicación dentro del verso.
- source_word: מְצַפֶּה
  english_pob_choice: watching
  chosen_spanish: vigilando
  alternatives_spanish:
  - mirando
  - esperando atento
  lexicon: HALOT
  rationale: Aquí la idea no es sólo mirar, sino estar atento y expectante. «Vigilando» conserva esa vigilancia tensa que el contexto exige.
- source_word: כִּי הָיָה לִבּוֹ חָרֵד
  english_pob_choice: because his heart trembled
  chosen_spanish: porque su corazón temblaba
  alternatives_spanish:
  - porque su corazón estaba angustiado
  - porque su corazón estaba temeroso
  lexicon: HALOT
  rationale: La expresión hebrea concreta se mantiene con «su corazón temblaba», que conserva la fuerza corporal y emocional de חָרֵד sin interpretarla de más.
- source_word: עַל אֲרוֹן הָאֱלֹהִים
  english_pob_choice: for the ark of God
  chosen_spanish: por el arca de Dios
  alternatives_spanish:
  - acerca del arca de Dios
  - a causa del arca de Dios
  lexicon: HALOT
  rationale: En español, con «temblaba», la preposición «por» expresa naturalmente el objeto de su preocupación. Mantiene la relación afectiva sin convertirla en una paráfrasis interpretativa.
- source_word: וְהָאִישׁ
  english_pob_choice: And the man
  chosen_spanish: Y el hombre
  alternatives_spanish:
  - Y aquel hombre
  - Entonces el hombre
  lexicon: HALOT
  rationale: Se conserva la referencia anafórica al mensajero ya introducido. «El hombre» mantiene la sobriedad del hebreo sin añadir determinaciones.
- source_word: לְהַגִּיד
  english_pob_choice: to report it
  chosen_spanish: para dar la noticia
  alternatives_spanish:
  - para informar
  - para contarlo
  lexicon: HALOT
  rationale: El infinitivo tiene el sentido de comunicar la noticia. «Dar la noticia» es natural en español y deja implícito, como en el hebreo, el contenido ya entendido por el contexto.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  lexicon: HALOT
  rationale: La preposición locativa se conserva de forma directa. El mensajero entra y comunica dentro de la ciudad, no simplemente hacia ella.
- source_word: וַתִּזְעַק כָּל הָעִיר
  english_pob_choice: the whole city cried out
  chosen_spanish: toda la ciudad gritó
  alternatives_spanish:
  - toda la ciudad clamó
  - la ciudad entera gritó
  lexicon: HALOT
  rationale: זעק expresa un grito de alarma o angustia. «Gritó» reproduce bien la reacción colectiva inmediata; «clamó» sería posible, pero menos directo aquí.
theological_decisions:
- issue: 'La emoción de Elí: temor/angustia concretados en el corazón'
  english_pob_reading: because his heart trembled for the ark of God
  chosen_spanish_reading: porque su corazón temblaba por el arca de Dios
  alternative_spanish_readings:
  - porque su corazón estaba angustiado por el arca de Dios
  - porque su corazón estaba temeroso por el arca de Dios
  rationale: El hebreo presenta una imagen concreta del corazón como sujeto del temblor. La traducción conserva esa materialidad emocional en vez de suavizarla a un estado abstracto de ansiedad.
  doctrine_reference: Antropología bíblica; lenguaje figurado del corazón como centro afectivo.
- issue: El objeto de preocupación de Elí
  english_pob_reading: for the ark of God
  chosen_spanish_reading: por el arca de Dios
  alternative_spanish_readings:
  - acerca del arca de Dios
  - a causa del arca de Dios
  rationale: El marcador עַל, unido a חָרֵד, señala el objeto sobre el cual recae la inquietud. «Por» mantiene esa relación de preocupación sin desplazar el sentido hacia mera información acerca del arca.
  doctrine_reference: Teología del arca como señal de la presencia y del honor de Dios en Israel.
translation_notes:
  revision_awareness: Se siguió la lectura y el valor discursivo del texto hebreo WLC, en alta concordancia con el audit trail inglés. No hubo revisiones aplicadas en el pasaje inglés; la versión española conserva el mismo sentido básico, incluyendo la escena vívida de la partícula introductoria, la vigilancia de Elí y el clamor colectivo de la ciudad.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usó «arca de Dios» sin sustituirlo por formulaciones litúrgicas más interpretativas.
  - «Temblaba» conserva la concreción hebrea de חָרֵד y evita convertirla en una abstracción.
  - La nota [a] se ancla en «cuando él llegó[a]» para reflejar el modismo de localización del hebreo.
