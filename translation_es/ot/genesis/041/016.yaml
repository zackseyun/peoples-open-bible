translation:
  language: es
  text: 'José respondió a Faraón, diciendo: «No está en mí[a]; Dios responderá por el bienestar de Faraón»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No soy yo». La expresión hebrea בִּלְעָדַי excluye a José como fuente de la respuesta o de la capacidad interpretativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en apertura de discurso narrativo se vierte naturalmente con un verbo de respuesta. 'Respondió' conserva el valor directivo y la relación con el discurso siguiente, sin sonar forzado en español.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre propio, plenamente reconocible y fiel al referente.
- source_word: אֶת פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - ante Faraón
  - a Faraón directamente
  lexicon: partícula acusativa + nombre propio
  rationale: El hebreo marca objeto directo; en español, 'respondió a Faraón' expresa la relación verbal de manera idiomática y transparente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: fórmula introductoria de discurso
  rationale: '''Diciendo'' preserva la función de introducción de habla y el encadenamiento narrativo sin añadir contenido no presente en el hebreo.'
- source_word: בִּלְעָדַי
  english_pob_choice: It is not in me
  chosen_spanish: No depende de mí
  alternatives_spanish:
  - No es mío
  - No está en mí
  - No soy yo
  lexicon: HALOT
  rationale: La expresión hebrea excluye a José como origen de la capacidad interpretativa. 'No depende de mí' comunica esa exclusión en español natural, manteniendo la tensión entre desautorización personal y atribución a Dios.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios verdadero; el singular 'Dios' es obligatorio en español por el verbo singular y por el contexto confesional de José.
- source_word: יַעֲנֶה
  english_pob_choice: will answer
  chosen_spanish: responderá
  alternatives_spanish:
  - dará respuesta
  - contestará
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'respondió' y el valor verbal de ענה. 'Responderá' es directo y natural, y evita introducir el giro 'dar respuesta' si no hace falta.
- source_word: שְׁלוֹם
  english_pob_choice: well-being
  chosen_spanish: bienestar
  alternatives_spanish:
  - paz
  - bienestar
  - bienestar y paz
  lexicon: HALOT
  rationale: שָׁלוֹם aquí no se limita a 'paz' interior; el contexto de sueño y gobierno apunta a bienestar, prosperidad o una salida favorable. 'Bienestar' recoge esa amplitud con claridad.
- source_word: שְׁלוֹם פַּרְעֹה
  english_pob_choice: for Pharaoh’s well-being
  chosen_spanish: acerca del bienestar de Faraón
  alternatives_spanish:
  - para el bienestar de Faraón
  - sobre el bienestar de Faraón
  - en cuanto al bienestar de Faraón
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y suena literalmente como 'responder la paz de Faraón'. En español, 'acerca del bienestar de Faraón' comunica que la respuesta divina concierne a su situación, sin forzar una equivalencia demasiado rígida.
theological_decisions:
- issue: Origen de la interpretación o respuesta revelada
  english_pob_reading: Joseph explicitly denies that the answer originates from himself and attributes it to God.
  chosen_spanish_reading: José excluye explícitamente que la capacidad o respuesta proceda de él y la atribuye a Dios.
  alternative_spanish_readings:
  - No depende de mí; Dios dará una respuesta favorable.
  - No soy yo; Dios responderá.
  rationale: El contraste teológico entre José y Dios debe permanecer visible. 'No depende de mí' conserva la negación de autoorigen, y 'Dios responderá' mantiene la atribución de la respuesta a la iniciativa divina sin suavizarla en exceso.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés POB en el punto clave de יַעֲנֶה como verbo directo ('will answer'), y conserva el contraste teológico entre José y Dios. También toma en cuenta la revisión que aclaró que el sentido no es meramente 'dar una respuesta', sino responder de forma pertinente al bienestar de Faraón. En español, se optó por 'acerca del bienestar de Faraón' para expresar la relación idiomática de שְׁלוֹם פַּרְעֹה sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'José' y 'Faraón' como formas bíblicas estándar en español.
  - '''Dios'' se usa con mayúscula por referencia al Dios verdadero.'
  - Se conservó el paralelismo verbal entre 'respondió' y 'responderá'.
  - '''Bienestar'' se eligió como término principal para שָׁלוֹם en este contexto, evitando reducirlo a ''paz'' solamente.'
