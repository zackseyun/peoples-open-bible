lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló diciendo
  lexicon: HALOT
  rationale: El verbo de habla en la fórmula narrativa introduce una nueva acción en secuencia. En español, «habló» es natural y mantiene la relación con el infinitivo siguiente «diciendo», sin volver redundante la construcción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea usa el Tetragrámaton. En español, el término base del proyecto es «Yahvé», que conserva el nombre divino en vez de sustituirlo por un título. Se evita «el SEÑOR» por fidelidad al nombre propio revelado.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, «a» expresa con claridad la relación indirecta sin añadir matices no presentes en el hebreo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español, plenamente reconocido y transparente para la lectura eclesial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula de introducción del discurso. «Diciendo» reproduce la función sintáctica de enlace con naturalidad en español.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton. La lectura española adoptada mantiene el nombre divino como nombre propio, conforme al criterio del proyecto, y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: fórmula narrativa simple, nombre divino preservado y estructura de habla mantenida sin sobretraducir.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» de manera consistente con la política española del proyecto.
  - «Moisés» y la fórmula «diciendo» siguen el registro bíblico natural del español sin introducir arcaísmos innecesarios.
  - La puntuación refleja la pausa del hebreo y la apertura de discurso que continúa en el versículo siguiente.
