id: 1TI.6.4
reference: 1 Timothy 6:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τετύφωται, μηδὲν ἐπιστάμενος, ἀλλὰ νοσῶν περὶ ζητήσεις καὶ λογομαχίας, ἐξ ὧν γίνεται φθόνος, ἔρις, βλασφημίαι, ὑπόνοιαι πονηραί,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/004.yaml
  text: he is puffed up[a], understanding nothing, but sick with a craving for controversies and word-battles, from which come envy, strife, slanders, and evil suspicions[c][b],
  footnotes:
  - marker: a
    text: Or 'has become conceited.' The Greek literally evokes being swollen or puffed up with pride.
    reason: lexical_alternative
  - marker: b
    text: Or 'word-quarrels' or 'disputes about words.'
    reason: lexical_alternative
  - marker: c
    text: Here 'slanders' reflects abusive speech against people; the Greek term can in other contexts mean 'blasphemies.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그는 교만에 사로잡혀[a] 아무것도 알지 못하고, 다만 논쟁과 말다툼[b]에 병적으로 집착하는 자입니다. 그것들로부터 시기, 다툼, 비방[c], 악한 의심,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「오만해져」. 헬라어는 직역상 교만으로 부풀어 오른 모습을 그린다(3:6 τυφόομαι와 동일 어근).
    reason: lexical_alternative
  - marker: b
    text: 또는 「말싸움」 「말다툼」.
    reason: lexical_alternative
  - marker: c
    text: 본 절의 「비방」은 사람을 향한 학대적 말을 가리킨다. 헬라어 βλασφημία는 다른 문맥에서는 「신성 모독」을 의미할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τετύφωται
  english_pob_choice: he is puffed up
  chosen_korean: 그는 교만에 사로잡혀
  alternatives_korean:
