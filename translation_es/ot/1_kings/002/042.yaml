  yaml_path: translation/ot/1_kings/002/042.yaml
  text: Then the king sent and called for Shimei and said to him[a], “Did I not make you swear by Yahweh and warn you, saying, ‘On the day you go out and go anywhere at all, know for certain that you shall surely die’? And you said to me, ‘The word is good[c][b]; I have heard.’”
