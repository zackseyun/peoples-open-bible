translation:
  language: es
  text: ¿Qué te pasa, Israel[a]? ¿Por qué estás en la tierra de tus enemigos? Has envejecido en tierra extranjera; te has contaminado con los muertos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué es esto, Israel?» o «¿Qué es, Israel?». La apertura τί ἐστιν puede funcionar idiomáticamente como una exclamación o pregunta de lamento.'
    reason: lexical_alternative
  - marker: b
    text: «Te has contaminado con los muertos» puede sugerir tanto impureza ritual por contacto con cadáveres como una condición figurada de estar tan cerca de la muerte como los muertos mismos; el griego permite ambas resonancias.
    reason: alternative_reading
lexical_decisions:
- source_word: τί ἐστιν
  english_pob_choice: What is it
  chosen_spanish: ¿Qué es, Israel?
  alternatives_spanish:
  - ¿Qué pasa, Israel?
  - ¿Qué te ocurre, Israel?
  lexicon: LSJ
  rationale: La pregunta inicial funciona como exclamación de lamentación; en español, «¿Qué es, Israel?» conserva la brevedad y la fuerza interrogativa sin añadir una explicación que el griego no da.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel, pueblo de Dios
  lexicon: Nombre propio
  rationale: Se mantiene el nombre propio sin expansión interpretativa.
- source_word: ἐν γῇ τῶν ἐχθρῶν
  english_pob_choice: in the land of your enemies
  chosen_spanish: en tierra de tus enemigos
  alternatives_spanish:
  - en la tierra de tus enemigos
  - en territorio enemigo
  lexicon: LSJ
  rationale: El griego no tiene posesivo explícito, pero el contexto directo de lamentación permite el matiz relacional natural en español, como en la revisión inglesa. «Tierra» evita una circunlocución innecesaria.
- source_word: ἐπαλαιώθης
  english_pob_choice: you have grown old
  chosen_spanish: Has envejecido
  alternatives_spanish:
  - Te has vuelto viejo
  - Has llegado a viejo
  lexicon: LSJ
  rationale: «Has envejecido» transmite el estado resultante y conserva la imagen de prolongación en el exilio sin volverla meramente figurativa.
- source_word: γῇ ἀλλοτρίᾳ
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra extranjera
  alternatives_spanish:
  - en una tierra ajena
  - en tierra de extraños
  lexicon: LSJ
  rationale: «Extranjera» reproduce bien el valor de ἀλλότριος como perteneciente a otro o no propio, con español claro y natural.
- source_word: συνεμιάνθης τοῖς νεκροῖς
  english_pob_choice: you have become defiled with the dead
  chosen_spanish: te has contaminado con los muertos
  alternatives_spanish:
  - te has hecho impuro por contacto con los muertos
  - te has manchado con los muertos
  lexicon: LSJ
  rationale: «Contaminado» comunica la idea de impureza/contagio y deja abierta la tensión entre contaminación ritual y estado figurado asociado con la muerte. «Con los muertos» conserva la ambigüedad del dativo de asociación.
theological_decisions:
- issue: Naturaleza de la contaminación en συνεμιάνθης τοῖς νεκροῖς
  english_pob_reading: retain broad 'become defiled with the dead' language without narrowing to exclusively ritual or metaphorical death
  chosen_spanish_reading: te has contaminado con los muertos
  alternative_spanish_readings:
  - te has hecho impuro por contacto con los muertos
  - te has manchado con los muertos
  rationale: El griego permite resonancias tanto de impureza ritual por contacto con cadáveres como de una condición figurada de cercanía a la muerte en el exilio. «Contaminado» mantiene esa amplitud sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión textual sin cerrarla en una sola explicación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete (τί ἐστιν Ἰσραήλ; τί ὅτι ἐν γῇ τῶν ἐχθρῶν εἶ; ἐπαλαιώθης ἐν γῇ ἀλλοτρίᾳ, συνεμιάνθης τοῖς νεκροῖς,) y el marco auditado inglés del POB, especialmente la lectura idiomática de la apertura y la decisión de mantener amplia la tensión de συνεμιάνθης τοῖς νεκροῖς. Se adoptó el matiz posesivo «tus enemigos» por coherencia con la revisión inglesa y la naturalidad del lamento en español.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente en este versículo; no aplica el default de Yahvé.
  - «Tierra extranjera» y «tierra de tus enemigos» mantienen un registro bíblico claro sin arcaísmo innecesario.
  - «Contaminado» se usa con intención de abarcar impureza ritual y estado de muerte, evitando cerrarlo a una sola lectura.
  - Los marcadores [a] y [b] aparecen exactamente en el texto donde corresponde.
