translation:
  language: es
  text: Esta fue la heredad de la tribu de los hijos de Judá, según sus clanes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es la heredad de la tribu de los hijos de Judá, según sus clanes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo femenino singular retoma la porción territorial ya descrita. En español, el pasado narrativo «fue» suena natural y conserva el valor resumitivo del hebreo, aunque «es» sigue siendo una alternativa posible si se enfatiza la permanencia de la heredad.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la heredad
  alternatives_spanish:
  - la herencia
  - la posesión
  - la heredad asignada
  lexicon: HALOT
  rationale: En contextos de reparto territorial, נַחֲלָה no es solo «herencia» en sentido patrimonial, sino posesión recibida por asignación. «Heredad» preserva mejor el matiz bíblico de tierra asignada por Yahvé y sigue siendo natural en español.
- source_word: מַטֵּה
  english_pob_choice: the tribe
  chosen_spanish: la tribu
  alternatives_spanish:
  - el bastón
  - la vara
  lexicon: HALOT
  rationale: Aquí מַטֶּה es el término técnico tribal. Las opciones literales («bastón», «vara») no corresponden al contexto censal y territorial.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: of the sons of Judah
  chosen_spanish: de los hijos de Judá
  alternatives_spanish:
  - de la gente de Judá
  - de Judá
  lexicon: HALOT
  rationale: «Hijos de Judá» reproduce de cerca la fórmula hebrea y mantiene el lenguaje genealógico-tribal. En español, «hijos» es más transparente aquí que «sones», y más fiel al tejido del texto que una simplificación como «de Judá».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  - de acuerdo con sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en reparto territorial designa grupos familiares amplios dentro de la tribu, mejor rendidos por «clanes» que por el más general «familias». El prefijo לְ es distributivo; «según» expresa bien esa distribución en español.
theological_decisions:
- issue: No hay una variante teológica, pero sí una tensión léxica entre posesión heredada y reparto asignado
  english_pob_reading: the inheritance of the tribe of the sons of Judah
  chosen_spanish_reading: la heredad de la tribu de los hijos de Judá
  alternative_spanish_readings:
  - la herencia de la tribu de los hijos de Judá
  - la posesión de la tribu de los hijos de Judá
  rationale: «Heredad» conserva simultáneamente la idea de herencia recibida y de posesión territorial asignada, sin diluir el trasfondo pactual del reparto de la tierra. Esto evita reducir el término a una simple propiedad privada.
  doctrine_reference: Josué 13–21; reparto de la tierra como don de Yahvé al pueblo del pacto
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con el hebreo y no muestra revisiones aplicadas. La versión española sigue esa misma lectura, conservando la función resumitiva del demostrativo, el valor territorial de נַחֲלָה y el lenguaje tribal de מַטֶּה y מִשְׁפָּחָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; en este versículo no aparece el nombre divino.
  - Se prefiere «hijos de Judá» para reflejar la fórmula hebrea, manteniendo la transparencia formal sin sonar forzado.
  - «Clanes» se usa consistentemente para מִשְׁפָּחָה en contextos de distribución tribal.
