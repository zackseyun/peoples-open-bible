translation:
  language: es
  text: El vengador de sangre[a], él mismo, dará muerte al asesino; cuando lo encuentre, él mismo le dará muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengador de la sangre». La expresión hebrea es un término legal fijo para el familiar encargado de vengar la sangre derramada ilícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל
  english_pob_choice: avenger
  chosen_spanish: vengador
  alternatives_spanish:
  - redentor
  - pariente-redentor
  lexicon: HALOT
  rationale: En este contexto jurídico, גֹּאֵל designa al familiar encargado de vengar un homicidio ilícito. «Vengador» conserva la función legal inmediata sin introducir el sentido redentor más amplio que no corresponde aquí.
- source_word: הַדָּם
  english_pob_choice: of blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - de la sangre
  - sangre
  lexicon: HALOT
  rationale: La expresión fija גֹּאֵל הַדָּם se reproduce de modo natural en español como «vengador de sangre», manteniendo el carácter técnico de la fórmula legal.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - él
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; «mismo» unido al sujeto («El vengador de sangre mismo») conserva ese énfasis de forma natural en español.
- source_word: יָמִית
  english_pob_choice: shall put ... to death
  chosen_spanish: dará muerte
  alternatives_spanish:
  - dará muerte a
  - matará
  - hará morir
  lexicon: HALOT
  rationale: El hifil de מות es causativo. «Dará muerte» refleja el registro jurídico de ejecución autorizada mejor que «matará», que suena menos técnico en este contexto.
- source_word: הָרֹצֵחַ
  english_pob_choice: the murderer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el asesino
  - el matador
  - el asesino culpable
  lexicon: HALOT
  rationale: Aunque רצח puede abarcar la matanza ilícita, en español «homicida» mantiene la referencia legal sin cargar más de lo necesario la valoración moral, y encaja con el marco de la ley de ciudades de refugio.
- source_word: בְּפִגְעוֹ בוֹ
  english_pob_choice: when he meets him
  chosen_spanish: cuando lo encuentre
  alternatives_spanish:
  - cuando lo encuentre de paso
  - cuando se cruce con él
  - al encontrarlo
  lexicon: HALOT
  rationale: La frase denota un encuentro o salida al paso. «Cuando lo encuentre» comunica con claridad el sentido temporal y evita una literalidad torpe.
- source_word: הוּא יְמִיתֶנּוּ
  english_pob_choice: he himself shall put him to death
  chosen_spanish: él mismo le dará muerte
  alternatives_spanish:
  - él mismo lo matará
  - él mismo lo hará morir
  lexicon: HALOT
  rationale: La repetición del sujeto enfatiza la acción personal del vengador. «Él mismo» conserva ese énfasis y mantiene el tono solemne del enunciado legal.
theological_decisions:
- issue: Función de גֹּאֵל הַדָּם
  english_pob_reading: Translate as 'the avenger of blood' as a human kinship-based legal agent within Israel's judicial framework.
  chosen_spanish_reading: Traducir como «el vengador de sangre» como agente legal humano, de parentesco, dentro del marco judicial de Israel.
  alternative_spanish_readings:
  - el redentor de sangre
  - el vengador de la sangre
  rationale: La escena trata de una institución legal de homicidio, no de redención teológica. «Vengador de sangre» preserva la función jurídica sin importar asociaciones doctrinales ajenas al contexto inmediato.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y quedó sin cambios; esta propuesta sigue esa lectura estable y conserva la decisión técnica de tratar גֹּאֵל הַדָּם como un término legal fijo, con énfasis personal en el pronombre independiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no porque aparezca en este versículo, sino para consistencia general del corpus.
  - Se evitó «siervo» o vocabulario de redención para גֹּאֵל, porque aquí el contexto es estrictamente forense y homicida.
  - «Homicida» se eligió por su claridad jurídica en español; no se suavizó a «asesino» para no añadir un matiz moral más fuerte que el necesario en la línea legal.
