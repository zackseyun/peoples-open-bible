    text: 'O: «no muestres favoritismo». La expresión hebrea literalmente dice «no levantes la cara».'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede entenderse como «para no pecar» o «de modo que peques». El hebreo es breve y deja la relación exacta algo abierta.
    reason: alternative_reading
  revision_rationale: Se revisa solo lo necesario. La principal corrección es cambiar «y no peques» por «y así peques» para reflejar mejor la forma comprimida del hebreo וחטא sin convertirla en una segunda prohibición plenamente explícita. Esto preserva mejor la ambigüedad sintáctica señalada en la auditoría inglesa. Además, se corrige la ortografía de la nota c y se pule la glosa literal del modismo hebreo en la nota b.
