translation:
  language: es
  text: Y Salomón subió allí al altar de bronce, delante de Yahvé, que estaba junto a la tienda de reunión, y ofreció sobre él mil holocaustos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up / offered on it
  chosen_spanish: subió / ofreció
  alternatives_spanish:
  - ascendió / sacrificó
  - fue hasta allá / presentó
  lexicon: HALOT
  rationale: עלה tiene aquí un valor de movimiento ascendente para la primera ocurrencia; en español, «subió» conserva bien la dirección. La segunda ocurrencia es lenguaje sacrificial idiomático, por lo que «ofreció» expresa naturalmente el acto cultual sin perder el vínculo con el altar.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio de lugar remite al contexto previo; «allí» es el equivalente natural y mantiene la referencia espacial sin sobreexplicarla.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar de cobre
  - el altar de bronce
  lexicon: HALOT
  rationale: La expresión cultual fija se vierte con naturalidad como «altar de bronce». «De cobre» es posible metalúrgicamente, pero «bronce» es la forma tradicional e idiomática en español para este contexto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición/presencia; «delante de» conserva bien el valor espacial y relacional. Se mantiene «Yahvé» según la norma del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con la forma de proyecto «Yahvé», que preserva el nombre propio divino sin la sustitución por un título.
- source_word: אֲשֶׁר לְאֹהֶל מוֹעֵד
  english_pob_choice: which was at the tent of meeting
  chosen_spanish: que estaba en la tienda de reunión
  alternatives_spanish:
  - que pertenecía a la tienda de reunión
  - que estaba ante la tienda de reunión
  lexicon: HALOT
  rationale: La cláusula relativa identifica el altar en relación con la tienda de reunión; el valor locativo/asociativo de ל favorece una traducción natural como «estaba en la tienda de reunión».
- source_word: עֹל֖וֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda que asciende completamente en humo; en español bíblico «holocaustos» comunica el sentido sacrificial tradicional y preciso. Se evita «burnt offerings» calcado y se conserva el término cultual consolidado.
- source_word: אָֽלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil uno
  - un millar
  lexicon: HALOT
  rationale: Número cardinal directo; «mil» es la forma más natural y fiel en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de renderizar el Nombre divino con una transliteración, no con una sustitución reverencial. «Yahvé» es la forma española estable en el texto principal y evita el ocultamiento del nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre las revisiones y sin cambios necesarios en el texto base; se conserva la decisión ya establecida para el Nombre divino y para el lenguaje sacrificial de עֹלָה.
  spanish_consistency_notes:
  - Se mantiene «tienda de reunión» para אֹהֶל מוֹעֵד, conforme al uso cultual estándar del proyecto.
  - Se usa «holocaustos» para עֹלוֹת por su valor técnico en español bíblico y para no diluir el matiz sacrificial.
  - Se conserva la estructura de la cláusula relativa para reflejar la relación espacial del altar con la tienda de reunión.
