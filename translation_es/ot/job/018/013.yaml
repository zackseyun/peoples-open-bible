translation:
  language: es
  text: Consume las partes de su piel; el primogénito de la muerte[a] consume sus partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el primogénito de la muerte», posiblemente una personificación poética del azote más letal o del principal agente de la muerte.
    reason: alternative_reading
lexical_decisions:
- source_word: יֹאכַל
  english_pob_choice: it devours
  chosen_spanish: consume
  alternatives_spanish:
  - devora
  - se come
  lexicon: HALOT
  rationale: El verbo hebreo אכל se usa aquí de manera metafórica para una acción destructiva. En español, «consume» conserva la idea de consumir/destruir y suena natural en un registro poético. «Devora» es posible, pero «consume» evita intensificar más allá del texto y mantiene mejor la imagen de desgaste progresivo.
- source_word: בַּדֵּי / בַּדָּיו
  english_pob_choice: the parts of / his parts
  chosen_spanish: las partes de / sus partes
  alternatives_spanish:
  - los miembros de / sus miembros
  - los fragmentos de / sus fragmentos
  - las extremidades de / sus extremidades
  lexicon: HALOT
  rationale: El sustantivo בדים en este contexto poético puede referirse a «partes» o miembros, y la revisión inglesa reciente prefirió «parts» por mayor precisión lexical. En español, «partes» mantiene la repetición y evita especificar anatómicamente más de lo que el hebreo obliga.
- source_word: עוֹרוֹ
  english_pob_choice: his skin
  chosen_spanish: su piel
  alternatives_spanish:
  - su piel curtida
  - su cuero
  lexicon: HALOT
  rationale: עור designa normalmente piel o cuero. «Su piel» es la opción más natural y transparente en español para una imagen corporal de enfermedad o destrucción.
- source_word: בְּכוֹר מָוֶת
  english_pob_choice: the firstborn of death
  chosen_spanish: el primogénito de la muerte
  alternatives_spanish:
  - el primer nacido de la muerte
  - el hijo primogénito de la muerte
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea y su ambigüedad poética. «Primogénito» reproduce de forma digna el valor de בְּכוֹר y permite leer la expresión como una personificación de la potencia mortífera sin reducirla a una explicación interpretativa.
theological_decisions:
- issue: Interpretación de בְּכוֹר מָוֶת
  english_pob_reading: Retain the poetic expression 'the firstborn of death' in the main text as a personified agent of destruction.
  chosen_spanish_reading: Mantener «el primogénito de la muerte» como expresión poética personificada.
  alternative_spanish_readings:
  - la muerte como agente principal
  - la enfermedad más mortal
  - el agente principal de la muerte
  rationale: El hebreo no obliga a identificar la frase con una enfermedad concreta ni a despojarla de su fuerza figurada. La traducción conserva la tensión poética y deja abierta la lectura de una personificación de la muerte o de su agente más terrible, como hace el texto fuente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que sustituyó «limbs» por «parts» para reflejar con mayor precisión el hebreo repetido בַּדֵּי/בַּדָּיו, evitando una especificación anatómica demasiado fuerte. La versión española sigue esa decisión con «partes», y mantiene la repetición de la imagen entre los dos cola.
  spanish_consistency_notes:
  - Se preserva el paralelismo léxico entre los dos cola con «partes» para reflejar la repetición hebrea.
  - «Consume» mantiene un registro poético sobrio y evita añadir un sujeto explícito donde el hebreo no lo da.
  - «Primogénito de la muerte» conserva la ambigüedad metáforica y no la resuelve con una paráfrasis doctrinal o médica.
