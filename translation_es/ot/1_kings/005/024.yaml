  glossary_alignment: No hay conflictos con la terminología del proyecto. Los nombres propios están bien, y «madera de ciprés[a]» con nota alternativa preserva adecuadamente la incertidumbre léxica de בְּרוֹשִׁים. No intervienen términos teológicos especiales del glosario principal.
