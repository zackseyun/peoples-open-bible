base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/005.yaml
  text: If you see the donkey of one who hates you lying down under its load[a], and would refrain from helping him[b], you must surely help with him.
  footnotes:
  - marker: a
    text: Or 'with it,' i.e., help the donkey with its load. The Hebrew pronoun can be understood with either the owner or the animal.
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb here commonly means 'leave' or 'forsake,' but in this context it carries the sense 'help, assist.'
    reason: lexical_alternative
