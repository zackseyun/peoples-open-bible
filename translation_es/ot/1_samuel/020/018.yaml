revisions:
- from: 'Jonathan le dijo: “Mañana es la luna nueva, y serás echado[a] en falta, porque tu asiento quedará vacío.”'
  to: 'Jonatán le dijo: «Mañana es la luna nueva, y te echarán de menos[a], porque tu asiento quedará vacío».'
  rationale: Se ajusta una expresión poco idiomática («serás echado en falta») a una formulación natural y ampliamente comprensible en español («te echarán de menos»), sin perder el sentido de que la ausencia de David será notada. También se castellaniza el nombre a «Jonatán» y se mejora la nota para evitar una alternativa española extraña.
