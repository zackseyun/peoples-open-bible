review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y la auditoría inglesa en casi todos los segmentos clave: conserva la imagen concreta de «levanté mi mano», mantiene «para sacarlos de la tierra de Egipto», refleja el antropomorfismo de תַּרְתִּי con «había buscado», y preserva la valoración elevada final. Sin embargo, hay dos desajustes importantes con la fidelidad idiomática y el texto auditado: «a ellos» suena poco natural en español en este contexto y debe ajustarse a «hacia ellos» o mejor reestructurarse; y «que fluye leche y miel» omite la preposición necesaria en español y no reproduce bien la fórmula establecida del hebreo.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta giros poco naturales para español bíblico legible: «levanté mi mano a ellos» suena calcado, y «que fluye leche y miel» es gramaticalmente deficiente. También «esplendor» es posible, pero «gloria» alinea mejor con la decisión POB documentada y con el tono profético. Una revisión menor mejora naturalidad, precisión e integración con la terminología auditada.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. Sí conviene alinear צְבִי con «gloria», porque esa fue la decisión principal del POB inglés, dejando «esplendor/hermosura» en nota. La fórmula זָבַת חָלָב וּדְבַשׁ debe quedar en un español idiomático como «que fluye con leche y miel» o, más naturalmente, «que mana leche y miel»; dado el rastro auditado, «que fluye con leche y miel» conserva mejor la estructura base.
  issues:
  - severity: medium
    issue: «levanté mi mano a ellos» es un calco poco natural
    rationale: Aunque refleja literalmente לָהֶם, en español ese complemento con «a ellos» después de «levantar mi mano» suena forzado. «Levanté mi mano hacia ellos» conserva la imagen y la dirección del gesto con mejor español.
  - severity: high
    issue: «que fluye leche y miel» es defectuoso en español
    rationale: La construcción necesita «con» o una reformulación idiomática. Sin ello, la frase suena gramaticalmente extraña y no preserva bien la fórmula bíblica de abundancia.
  - severity: medium
    issue: «esplendor» se aparta innecesariamente de la elección auditada «gloria»
    rationale: «Esplendor» es semánticamente posible, pero la auditoría inglesa escogió «glory» como decisión principal por su fuerza profética elevada. El español puede reproducirla con naturalidad como «gloria» y dejar otras opciones en nota.
  - severity: low
    issue: La nota a repite la misma expresión que ya está en el texto
    rationale: La nota debería ofrecer la alternativa literal/explicativa útil, no repetir sin cambio la redacción principal. Conviene aclarar «O ‘levanté mi mano hacia ellos’…» o priorizar la explicación «es decir, ‘les juré’».
  revised_spanish_text: En aquel día levanté mi mano hacia ellos[a], para sacarlos de la tierra de Egipto a una tierra que había buscado para ellos[b], que fluye con leche y miel; es la gloria[c] de todas las tierras.
  revised_footnotes:
