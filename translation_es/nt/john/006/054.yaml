review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: sujeto sustantivado («El que come»), lenguaje literal («mi carne… mi sangre»), presente de posesión («tiene vida eterna») y promesa futura de resurrección «en el último día». Sin embargo, la nota [b] no preserva adecuadamente la alternativa léxica auditada por el POB inglés: allí la nota documenta la variante tradicional de la expresión verbal equivalente a «raise him up», no una observación metatextual sobre la traducción inglesa. Además, en español «resucitaré» es aceptable por contexto, pero la nota debe ajustarse para reflejar la alternativa tradicional española relevante.'
  spanish_quality_summary: El texto principal es natural, claro y eclesialmente legible en español. «El que come mi carne y bebe mi sangre tiene vida eterna, y yo lo resucitaré en el último día» suena digno y moderno. La única reparación necesaria es la redacción de la nota [b], que actualmente introduce inglés innecesariamente y no sirve al lector hispanohablante.
  glossary_alignment: 'Buena alineación con las decisiones del proyecto: σάρξ -> «carne», αἷμα -> «sangre», ζωὴ αἰώνιος -> «vida eterna». No hay términos del glosario mayor en disputa aquí. La decisión ἀναστήσω -> «resucitaré» es defendible en español por claridad escatológica, aunque conviene preservar en nota la alternativa tradicional «lo levantaré».'
  issues:
  - severity: medium
    issue: La nota [b] está formulada como comentario sobre inglés en vez de ofrecer la alternativa española pertinente.
    rationale: 'El POB inglés preserva una alternativa léxica/tradicional para ἀναστήσω + αὐτόν («I will raise him up»). En una edición española, la nota debe servir al lector en español, p. ej. «Tradicionalmente: “lo levantaré”», no remitir a una frase inglesa.'
  revised_spanish_text: El que come mi carne y bebe mi sangre tiene vida eterna[a][b], y yo lo resucitaré en el último día.
  revised_footnotes:
  - marker: a
    text: O «se alimenta de»; o más vividamente «mastica». El verbo griego τρώγω es más concreto que el verbo general para «comer».
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «lo levantaré».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota [b] para que preserve la alternativa léxica/tradicional de manera útil y adecuada en español, sin referencia metalingüística al inglés.
