translation:
  language: es
  text: Y acercarás a sus hijos[a], y los vestirás con túnicas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presentarás a sus hijos» o «harás venir adelante a sus hijos»; el verbo hebreo suele tener un sentido formal o cultual de acercar a alguien para el servicio sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Y en cuanto a
  lexicon: HALOT
  rationale: La conjunción marca continuidad instruccional; en español, 'Y' comunica mejor la secuencia sin introducir un matiz ajeno. El marcador de objeto no se traduce directamente.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  - sus descendientes varones
  lexicon: HALOT
  rationale: El sustantivo se refiere a hijos varones; 'sus hijos varones' conserva la precisión semántica, aunque 'sus hijos' sería natural en español. En contexto sacerdotal, la referencia masculina es relevante.
- source_word: תַּקְרִיב
  english_pob_choice: you shall bring near
  chosen_spanish: harás que se acerquen
  alternatives_spanish:
  - los presentarás
  - los harás venir delante
  lexicon: HALOT
  rationale: El Hifil de קרב tiene un sentido cultual de acercar/presentar. 'Harás que se acerquen' conserva la idea de hacerlos entrar en proximidad ritual sin endurecerla con un tecnicismo poco natural en español.
- source_word: וְהִלְבַּשְׁתָּ
  english_pob_choice: and clothe
  chosen_spanish: y los vestirás
  alternatives_spanish:
  - y los revestirás
  - y les pondrás ropa
  lexicon: HALOT
  rationale: '''Vestir'' expresa bien el causativo de הלביש y es idiomático en español. ''Revestir'' podría sonar más litúrgico, pero es menos natural aquí.'
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: HALOT
  rationale: El pronombre de objeto directo masculino plural se expresa naturalmente como 'los' en español.
- source_word: כֻּתֳּנֹת
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - túnicas de lino
  - ropas
  lexicon: HALOT
  rationale: '''Túnicas'' es el equivalente más preciso y transparente para כֻּתֳּנֹת. No se añade ''de lino'' porque el texto hebreo no lo dice en este versículo.'
theological_decisions:
- issue: Matiz cultual de קרב
  english_pob_reading: bring near
  chosen_spanish_reading: harás que se acerquen
  alternative_spanish_readings:
  - los presentarás
  - los acercarás
  rationale: La acción no es mera llegada física, sino una aproximación ritual para el servicio sagrado. 'Harás que se acerquen' preserva ese matiz sin borrar la tensión entre traducción cultual y español natural.
  doctrine_reference: Éxodo 40:14; traducción con prioridad del sentido cultual del hebreo sobre la tradición eclesiástica
- issue: Término sacerdotal para las vestiduras
  english_pob_reading: tunics
  chosen_spanish_reading: túnicas
  alternative_spanish_readings:
  - vestiduras
  - ropas
  rationale: '''Túnicas'' mantiene la concreción del objeto y evita generalizar hacia ''vestiduras'', que en español puede sonar demasiado amplio o solemne para כֻּתֳּנֹת.'
  doctrine_reference: Éxodo 40:14; léxico del vestido sacerdotal
translation_notes:
  revision_awareness: El texto base en inglés ya optó por 'bring near' y 'tunics', sin revisiones posteriores. La versión española conserva ese núcleo semántico y adapta la sintaxis al español natural, manteniendo el matiz cultual de קרב y la precisión de כֻּתֳּנֹת.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o formulaciones litúrgicas no presentes porque no aparece el nombre divino en este versículo.
  - '''Hijos varones'' se reserva como nota alternativa para no sobrecargar el texto principal, aunque el contexto sacerdotal justifica la precisión.'
  - '''Túnicas'' se mantiene sin añadir ''de lino'', ya que el versículo no lo especifica.'
