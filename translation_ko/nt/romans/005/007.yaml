source:
  edition: SBLGNT
  text: μόλις γὰρ ὑπὲρ δικαίου τις ἀποθανεῖται· ὑπὲρ γὰρ τοῦ ἀγαθοῦ τάχα τις καὶ τολμᾷ ἀποθανεῖν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/007.yaml
  text: For hardly will anyone die for a righteous person[b][a]; though perhaps for a good person someone might even dare to die.
  footnotes:
  - marker: a
    text: Or 'a righteous man.' The Greek is grammatically masculine, but here it likely has generic force.
    reason: lexical_alternative
  - marker: b
    text: The contrast between 'righteous' and 'good' may be intentional rather than merely stylistic.
    reason: alternative_reading
translation:
  language: ko
  text: 의로운 사람을 위하여 죽을 사람도 거의 없습니다. 선한 사람을 위해서라면 혹 누군가 감히 죽을 수도 있겠지만 말입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μόλις
  english_pob_choice: hardly
  chosen_korean: 거의 없습니다
  lexicon: BDAG
  rationale: 드묾을 강조하는 자연스러운 한국어 표현.
- source_word: δικαίου
  english_pob_choice: righteous person
  chosen_korean: 의로운 사람
  lexicon: BDAG
  rationale: 바울의 「의/선」 대조 보존.
- source_word: τοῦ ἀγαθοῦ
  english_pob_choice: a good person
  chosen_korean: 선한 사람
  lexicon: BDAG
  rationale: 의로운 자와 구별된 「선한 자」 보존.
- source_word: τολμᾷ
  english_pob_choice: might even dare
  chosen_korean: 감히 죽을 수도
  lexicon: BDAG
  rationale: 가능성과 용기의 결합.
theological_decisions:
- issue: δίκαιος와 ἀγαθός 사이의 구분 보존
  chosen_reading: 각각 「의로운 사람」과 「선한 사람」으로 구분
  alternative_readings:
  - 두 어휘를 유의어로 처리
  rationale: 바울이 의도한 점층적 대조를 보존하는 것이 본문의 수사적 힘을 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
