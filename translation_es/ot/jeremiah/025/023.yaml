translation:
  language: es
  text: y Dedán[a], y Tema, y Buz, y todos los que se recortan el cabello de las sienes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «todos los cortadores de la esquina». La expresión probablemente alude a quienes se rasuran o recortan el cabello de los lados; algunos la entienden específicamente de la barba.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio de lugar o pueblo; se translitera al español manteniendo la forma reconocible. Se acentúa como palabra aguda en español para facilitar la lectura y pronunciarla de modo natural.
- source_word: תֵּימָא
  english_pob_choice: Tema
  chosen_spanish: Tema
  alternatives_spanish:
  - Teima
  lexicon: HALOT
  rationale: Nombre propio de un oasis o grupo tribal árabe; se conserva la transliteración breve y estándar, sin añadir interpretación geográfica que el hebreo no explicita.
- source_word: בּוּז
  english_pob_choice: Buz
  chosen_spanish: Buz
  lexicon: HALOT
  rationale: Nombre propio de pueblo o región; se mantiene la transliteración directa porque el texto enumera grupos/nombres, no cualidades.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada
  lexicon: HALOT
  rationale: Cuantificador inclusivo en una lista de pueblos o grupos. En español, 'todos' reproduce mejor la amplitud colectiva que 'cada'.
- source_word: קְצוּצֵי
  english_pob_choice: who clip
  chosen_spanish: que se cortan
  alternatives_spanish:
  - que recortan
  - cortadores de
  lexicon: HALOT
  rationale: El participio describe a personas caracterizadas por la acción de cortar. 'Que se cortan' conserva el valor participial y suena natural en español; evita una paráfrasis más interpretativa.
- source_word: פֵאָה
  english_pob_choice: the corners of their hair
  chosen_spanish: los bordes de su cabello
  alternatives_spanish:
  - las esquinas de su cabello
  - los lados de su cabello
  - el borde de su barba
  lexicon: HALOT
  rationale: '''Corner/edge'' requiere adaptación idiomática en español. ''Bordes de su cabello'' preserva la imagen concreta sin fijar demasiado el referente anatómico, que en el hebreo puede incluir el pelo de los lados de la cabeza y, según algunos entendidos, también la barba.'
translation_notes:
  revision_awareness: El texto hebreo es un sintagma nominal enumerativo sin verbo; la versión española mantiene la estructura de lista con coordinación simple. La decisión principal fue conservar los nombres propios transliterados y resolver la expresión idiomática final con una forma española clara, sin perder la tensión semántica documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca aquí, sino por coherencia con el proyecto; este versículo no lo contiene.
  - Se conserva la coordinación repetida 'y ... y ... y ...' para reflejar el hebreo.
  - '''Que se cortan'' mantiene el matiz de acción característica sin convertirlo en un sustantivo.'
