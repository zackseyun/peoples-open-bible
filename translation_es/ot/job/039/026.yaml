translation:
  language: es
  text: ¿Acaso es por tu entendimiento que el halcón[a] remonta el vuelo, desplegando sus alas hacia el sur?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gavilán»; el hebreo נֵץ puede referirse más generalmente a un ave rapaz de este tipo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבִּינָתְךָ
  english_pob_choice: Is it by your understanding
  chosen_spanish: ¿Es por tu entendimiento
  alternatives_spanish:
  - ¿Es por tu sabiduría
  - ¿Es por tu discernimiento
  lexicon: HALOT
  rationale: 'La construcción interrogativa con מִן y בִּינָה expresa medio o causa: si el ave actúa por el entendimiento de Job. "Entendimiento" conserva mejor el sentido de בִּינָה que "sabiduría", y "por" comunica el valor instrumental sin forzar una paráfrasis.'
- source_word: יַאֲבֶר
  english_pob_choice: soars
  chosen_spanish: se eleva
  alternatives_spanish:
  - remonta el vuelo
  - vuela en alto
  lexicon: HALOT
  rationale: El verbo en hifil describe el movimiento ascendente de un ave. "Se eleva" mantiene la imagen de ascenso con un español natural; "remonta el vuelo" también es viable, pero suena un poco más idiomático que literal.
- source_word: נֵץ
  english_pob_choice: the hawk
  chosen_spanish: el halcón[a]
  alternatives_spanish:
  - el azor
  - el ave de presa
  lexicon: HALOT
  rationale: נֵץ puede referirse de manera general a un ave rapaz de este tipo; en español, "halcón" comunica bien el referente amplio sin pretender identificar la especie con precisión. Se conserva una nota por la alternativa léxica porque el hebreo no fija con exactitud la especie.
- source_word: יִפְרֹשׂ
  english_pob_choice: spreading
  chosen_spanish: desplegando
  alternatives_spanish:
  - extendiendo
  - abriendo
  lexicon: HALOT
  rationale: פרשׂ expresa extender o desplegar. "Desplegando" funciona bien como participio de acción concomitante con "se eleva", manteniendo la secuencia visual del verso.
- source_word: כְּנָפוֹ
  english_pob_choice: its wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - su ala
  - sus plumas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular posesivo, el español normal de un ave en vuelo prefiere el plural colectivo "alas". "Sus" conserva el posesivo del original sin introducir género innecesario.
- source_word: לְתֵימָן
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - rumbo al sur
  lexicon: HALOT
  rationale: תֵימָן es una dirección geográfica. "Hacia el sur" reproduce adecuadamente el valor direccional del prefijo לְ y sugiere orientación/migración sin añadir detalles no explícitos.
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura óptima y no aplica revisiones sustanciales; esta versión española sigue de cerca esa decisión, preservando la pregunta retórica, el movimiento ascendente del ave y la alternativa léxica para נֵץ.
  spanish_consistency_notes:
  - Se mantiene "entendimiento" para בִּינָה, en línea con la distinción entre conocimiento práctico y sabiduría más general.
  - Se usa "halcón" como equivalente principal de נֵץ, con nota de alternativa para no cerrar indebidamente el rango léxico.
  - La dirección final se expresa como "hacia el sur" para conservar el valor direccional de לְתֵימָן.
  - No se introduce terminología teológica especial en este versículo, por lo que no hay tensiones doctrinales adicionales.
