  text: וַֽ֠/יַּעֲנוּ בְּ/הַלֵּ֨ל וּ/בְ/הוֹדֹ֤ת לַֽ/יהוָה֙ כִּ֣י ט֔וֹב כִּֽי לְ/עוֹלָ֥ם חַסְדּ֖/וֹ עַל יִשְׂרָאֵ֑ל וְ/כָל הָ/עָ֡ם הֵרִיעוּ֩ תְרוּעָ֨ה גְדוֹלָ֤ה בְ/הַלֵּל֙ לַֽ/יהוָ֔ה עַ֖ל הוּסַ֥ד בֵּית יְהוָֽה־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezra/003/011.yaml
  text: 'And they sang responsively with praise and thanksgiving to Yahweh: “For he is good[c][b][a], for his steadfast love toward Israel is forever.” And all the people shouted with a great shout in praise to Yahweh because the foundation of the house of Yahweh had been laid.'
  footnotes:
  - marker: a
    text: Or, 'they answered'—the Hebrew verb can mean 'responded,' likely in antiphonal or responsive praise.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for his steadfast love endures forever toward Israel.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'because the house of the LORD was founded'; in context this refers to the laying of the temple's foundation.
    reason: cultural_note
