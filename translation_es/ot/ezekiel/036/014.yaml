translation:
  language: es
  text: Por tanto, ya no devorarás personas[a], y ya no harás tropezar a tu nación, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una vocalización o tradición alternativa: «ya no privarás a tu nación».'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la relación inferencial con el contexto previo y suena natural en español bíblico contemporáneo.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - personas
  - humanidad
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo; 'gente' comunica bien el colectivo humano sin perder la fuerza idiomática de que la tierra ya no 'devora' a sus habitantes.
- source_word: תֹאכְלִי
  english_pob_choice: devour
  chosen_spanish: devorarás
  alternatives_spanish:
  - comerás
  - consumirás
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente 'comer', en este contexto personificado la imagen es de la tierra tragando a sus habitantes; 'devorar' preserva el valor metafórico.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no volverás a
  lexicon: HALOT
  rationale: Con לֹא expresa cese desde este punto en adelante; 'ya no' es la equivalencia más natural en español.
- source_word: וְגוֹיִךְ
  english_pob_choice: your nation
  chosen_spanish: tu nación
  alternatives_spanish:
  - tu pueblo
  - tu gente
  lexicon: HALOT
  rationale: La forma es singular con sufijo femenino; 'tu nación' refleja mejor la forma gramatical y mantiene el vínculo corporativo con la tierra.
- source_word: תַכְשִׁלִי
  english_pob_choice: cause your nation to stumble
  chosen_spanish: harás tropezar
  alternatives_spanish:
  - harás caer
  - serás causa de tropiezo para
  lexicon: HALOT
  rationale: La consonantal apunta a כשל, 'tropezar/caer'. 'Harás tropezar' conserva el sentido de causar caída sin introducir una paráfrasis interpretativa mayor.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: dice Yahvé, el Señor
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: נְאֻם se vierte de manera directa con 'dice/declara'. Se conserva Yahvé para יְהוִה conforme al estándar del proyecto; אֲדֹנָי se expresa como 'el Señor' para distinguir el título del nombre divino.
theological_decisions:
- issue: Tratamiento del Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: Se sigue el estándar del proyecto para יְהוִה → Yahvé. Como אֲדֹנָי antecede al Nombre, se vierte con 'el Señor' para reflejar el título sin ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Posible lectura alternativa de תכשלי
  english_pob_reading: you will no longer cause your nation to stumble
  chosen_spanish_reading: harás tropezar
  alternative_spanish_readings:
  - harás caer
  - privarás a tu nación
  rationale: La traducción principal sigue la vocalización/consonantes de כשל ('tropezar'). Se deja implícita la tensión con la lectura alternativa tradicional 'privarás/bereaves' al no eliminar la posibilidad textual, aunque el texto principal adopta la lectura de tropiezo.
  doctrine_reference: Texto masorético / tradición de vocalización alternativa
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de ''man'' a ''people'' para mayor naturalidad; aquí se reflejó esa misma decisión colectiva con ''gente''. También se mantuvo la tensión textual de תכשלי: la lectura principal sigue ''tropezar'', mientras que la alternativa tradicional se conserva en nota.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' como máscara del Tetragrámaton; 'el Señor' se reserva para אֲדֹנָי.
  - '''gente'' funciona aquí como colectivo humano, equivalente al ajuste inglés más reciente ''people''.'
  - Se mantuvo un registro bíblico moderno y digno, sin recurrir a arcaísmos innecesarios.
