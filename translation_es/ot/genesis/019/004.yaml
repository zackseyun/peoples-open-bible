review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: valor temporal de טֶרֶם, doble identificación appositiva (''los hombres de la ciudad, los hombres de Sodoma''), el cerco hostil de נָסַבּוּ עַל הַבַּיִת, y la distinción entre el masculino marcado inicial y el colectivo כָּל הָעָם. Sin embargo, ''desde cada extremo'' no transmite con naturalidad el modismo מִקָּצֶה (''desde todos los rincones / de todas partes / de cada barrio/cuadrante''), y ''desde el joven hasta el viejo'' suena menos idiomático y algo rígido frente al merismo más natural ''desde jóvenes hasta viejos'' o ''de jóvenes a viejos''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos tropiezos de naturalidad: 1) ''desde cada extremo'' resulta poco idiomático en este contexto urbano; sugiere extremos físicos discretos más que la idea distributiva de ''de todos los rincones''. 2) ''desde el joven hasta el viejo'' es comprensible, pero suena más forzado que una formulación plural/genérica. Además, la nota [a] usa ''encerraron la casa'', que no es la mejor alternativa española para el matiz léxico; ''cercaron la casa'' o ''rodearon por completo la casa'' sería más preciso.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Se preserva correctamente 'hombres' para אַנְשֵׁי y un colectivo no masculinizado para כָּל הָעָם. No aparece terminología especializada adicional.
  issues:
  - severity: medium
    issue: '''desde cada extremo'' es una traducción poco natural de מִקָּצֶה'
    rationale: Aunque 'extremo' refleja el sentido literal de 'end/extremity', en español bíblico legible no comunica bien el sentido idiomático 'from every quarter'. 'Desde todos los rincones' o 'de todas partes' representa mejor la cobertura total de la ciudad.
  - severity: low
    issue: '''desde el joven hasta el viejo'' suena rígido en español'
    rationale: El merismo hebreo se conserva, pero la formulación singular determinada suena menos natural. Una forma plural como 'desde jóvenes hasta viejos' preserva mejor el sentido de rango completo de edades en español.
  - severity: low
    issue: La nota [a] propone 'encerraron la casa', alternativa poco precisa
    rationale: Para נָסַבּוּ עַל הַבַּיִת, 'cercaron' o 'se agruparon alrededor de' son alternativas más fieles que 'encerraron', que puede sugerir meter algo dentro o clausurar más que rodear.
  revised_spanish_text: Antes de que se acostaran, los hombres de la ciudad, los hombres de Sodoma, rodearon la casa[a], desde jóvenes hasta viejos[b], todo el pueblo de todos los rincones[c].
  revised_footnotes:
  - marker: a
    text: 'O: ''cercaron la casa'' o ''se agruparon alrededor de la casa''. El verbo hebreo puede denotar rodear o reunirse en torno, con el contexto sugiriendo una multitud que la cercaba.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'desde joven hasta viejo'; es un merismo que indica personas de todo el rango de edades.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'desde el extremo'; idiomáticamente, 'de todos los rincones' o 'de todas partes' de la ciudad.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar con mayor naturalidad el modismo hebreo final y el merismo de edades, sin alterar el contenido ni la distinción fuente entre 'hombres' y 'todo el pueblo'. También se mejora la nota léxica sobre נָסַבּוּ con una alternativa española más precisa.
