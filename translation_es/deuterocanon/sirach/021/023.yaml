translation:
  language: es
  text: El necio se asoma dentro de una casa desde la puerta, pero el hombre honorable[a] se quedará afuera y hablará.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «y honor para un hombre [que] estará afuera y hablará», una expresión comprimida que aquí se entiende como «un hombre honorable». El paralelo griego tiene «un hombre formado/instruido estará afuera».
    reason: alternative_reading
  - marker: b
    text: El paralelo griego termina con «estará afuera» y no incluye «y hablará», que sí está presente en el testimonio hebreo seguido aquí.
    reason: textual_variant
lexical_decisions:
- source_word: אֱוִיל / ἄφρων
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el tonto
  - el insensato
  lexicon: HALOT; LSJ
  rationale: Se trata del término sapiencial para una persona moralmente necia o imprudente, no solo de alguien con poca inteligencia. «Necio» conserva el tono proverbial y ético del original y encaja bien en español bíblico moderno.
- source_word: מִפֶּתַח / ἀπὸ θύρας
  english_pob_choice: from the doorway
  chosen_spanish: desde la entrada
  alternatives_spanish:
  - desde la puerta
  - desde el umbral
  lexicon: HALOT; LSJ
  rationale: La imagen es de alguien que mira desde la zona de acceso sin entrar. «Desde la entrada» suena natural en español y mantiene la idea de posición liminar del hebreo y del griego.
- source_word: יַבִּיט אֶל בָּיִת / παρακύπτει εἰς οἰκίαν
  english_pob_choice: peers into a house
  chosen_spanish: se asoma a la casa
  alternatives_spanish:
  - mira dentro de la casa
  - espía la casa
  lexicon: HALOT; LSJ
  rationale: El verbo sugiere una mirada intrusiva o agachada hacia adentro. «Se asoma» captura bien ese gesto en español sin volverlo más fuerte de lo que exige el texto.
- source_word: וְכָבוֹד לְאִישׁ / ἀνὴρ δὲ πεπαιδευμένος
  english_pob_choice: an honorable man / a trained or educated man
  chosen_spanish: el hombre honorable
  alternatives_spanish:
  - el hombre bien educado
  - el hombre instruido
  - el hombre decoroso
  lexicon: HALOT; LSJ
  rationale: El hebreo es comprimido y el audit trail inglés ya decidió «honorable» como reflejo de כָבוֹד, mientras el griego aporta la idea de formación o disciplina. «Honorable» conserva la evaluación social y moral sin forzar una equivalencia exclusivamente académica.
- source_word: בַּחוּץ יַעֲמוֹד וִידַבֵּר / ἔξω στήσεται
  english_pob_choice: will stand outside and speak
  chosen_spanish: permanecerá afuera y hablará
  alternatives_spanish:
  - se quedará afuera y hablará
  - estará afuera y hablará
  lexicon: HALOT; LSJ
  rationale: 'El hebreo añade explícitamente el habla, mientras el griego solo asegura que permanecerá afuera. «Permanecerá» da fuerza durativa y respeta el decoro del contraste: el prudente no invade, sino que espera y habla desde fuera.'
theological_decisions:
- issue: Tensión textual entre el hebreo y el paralelo griego sobre la clausula final
  english_pob_reading: The Hebrew witness includes 'and speak'; the Greek parallel ends with 'will stand outside' and omits it.
  chosen_spanish_reading: Mantener «y hablará» en el texto principal, con nota que reconozca la omisión del griego.
  alternative_spanish_readings:
  - el hombre honorable permanecerá afuera
  - el hombre honorable estará afuera
  rationale: 'El testimonio hebreo es la base principal del POB aquí, pero el paralelo griego conserva una forma más breve. La solución española preserva ambos datos: texto principal siguiendo el hebreo y nota textual que documenta la diferencia.'
  doctrine_reference: Principios de crítica textual y fidelidad a testimonio base del POB
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del inglés POB al preferir «honorable» sobre una paráfrasis como «bien educado» o «bien nacido», pero mantiene la advertencia textual sobre la brevedad del griego y la explicitud del hebreo. También se ajustó «from the doorway» a una formulación más idiomática en español sin perder el matiz de umbral/entrada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «necio» para אֱוִיל, en coherencia con el registro sapiencial del POB.
  - «Honorable» se conserva para כָבוֹד siguiendo el audit trail inglés, evitando sustituirlo por un lenguaje eclesiástico ajeno al contexto.
  - La cláusula final se deja completa en el texto principal y se documenta la variante griega en nota para no borrar la tensión textual.
