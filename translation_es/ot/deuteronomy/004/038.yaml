    rationale: '''Como en este día'' es una reproducción demasiado cercana de la forma hebrea y no comunica bien en español el sentido de estado presente y evidente. ''Como sucede hoy'' o ''como es evidente hoy'' preserva mejor el valor idiomático documentado por la POB inglesa.'
  - severity: low
