translation:
  language: es
  text: Se les unieron y llegaron a ser un apoyo para ellos[a]. También formaron una fuerza y abatieron a los pecadores en su enojo, y a hombres sin ley en su ira[b]; y los demás huyeron a las naciones para salvarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron añadidos a ellos». El verbo griego puede expresarse de forma más formal como incorporación al grupo.
    reason: lexical_alternative
  - marker: b
    text: «A las naciones» probablemente significa a pueblos o territorios no judíos del entorno; compárese el sentido relacionado de «a los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσετέθησαν αὐτοῖς
  english_pob_choice: joined
  chosen_spanish: Se les unieron
  alternatives_spanish:
  - Fueron añadidos a ellos
  - Se agregaron a ellos
  - Se adhirieron a ellos
  lexicon: LSJ
  rationale: El pasivo de προστίθημι aquí expresa incorporación a un grupo. «Se les unieron» suena natural en español y conserva la idea de adhesión sin perder el matiz de pertenencia al grupo.
- source_word: εἰς στήριγμα
  english_pob_choice: a support
  chosen_spanish: un apoyo
  alternatives_spanish:
  - un sostén
  - un soporte
  - una ayuda
  lexicon: LSJ
  rationale: στήριγμα expresa apoyo o sostén. «Un apoyo» mantiene la concreción del predicado con un español claro y sobrio, sin militarizar más de lo que exige el griego.
- source_word: συνεστήσαντο δύναμιν
  english_pob_choice: formed a force
  chosen_spanish: formaron una fuerza
  alternatives_spanish:
  - organizaron una fuerza
  - establecieron un ejército
  - se agruparon en fuerza
  lexicon: LSJ
  rationale: La expresión indica organizar fuerza militar. «Formaron una fuerza» conserva la idea de organización y el contexto bélico con un giro idiomático natural.
- source_word: ἐπάταξαν
  english_pob_choice: struck down
  chosen_spanish: abatieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - derribaron de muerte
  lexicon: LSJ
  rationale: πατάσσω puede significar golpear y, en contexto de batalla, abatir con fuerza letal. «Abatieron» conserva el impacto violento sin añadir más de lo que el verbo por sí solo garantiza.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los pecadores
  - a los que pecaban
  lexicon: LSJ
  rationale: El término es moralmente cargado. «Pecadores» reproduce de forma directa la evaluación religiosa del texto y evita diluirla en categorías meramente políticas.
- source_word: ἐν ὀργῇ αὐτῶν
  english_pob_choice: in their anger
  chosen_spanish: en su enojo
  alternatives_spanish:
  - en su ira
  - con su enojo
  - con su ira
  lexicon: LSJ
  rationale: ὀργή se puede traducir como enojo o ira. Se eligió «enojo» para diferenciarlo de θυμός en la cláusula siguiente, donde se usa «ira» para conservar el paralelismo con intensidad creciente.
- source_word: ἄνδρας ἀνόμους
  english_pob_choice: lawless men
  chosen_spanish: a hombres sin ley
  alternatives_spanish:
  - a hombres malvados
  - a hombres impíos
  - a hombres ilegales
  lexicon: LSJ
  rationale: ἀνόμους significa literalmente «sin ley» o «ilegales»; aquí tiene fuerza moral y religiosa. «Hombres sin ley» conserva el valor lexical y el masculino explícito de ἄνδρας.
- source_word: ἐν θυμῷ αὐτῶν
  english_pob_choice: in their wrath
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su furia
  - en su furor
  - con su ira
  lexicon: LSJ
  rationale: θυμός denota ira ardiente, furia o pasión intensa. «Ira» en español funciona bien en contraste con «enojo» y mantiene la escalada retórica del griego.
- source_word: οἱ λοιποί
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los otros
  - los restantes
  lexicon: LSJ
  rationale: Es un grupo residual en contraste con los abatidos. «Los demás» es natural y conserva la distinción del conjunto remanente.
- source_word: εἰς τὰ ἔθνη
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - entre las naciones
  - a los gentiles
  - a los pueblos
  lexicon: LSJ
  rationale: En contexto macabeo, ἔθνη se refiere a pueblos no judíos o territorios circundantes. «A las naciones» es la opción más directa y evita importar un matiz técnico no explicitado por el griego.
- source_word: σωθῆναι
  english_pob_choice: to save themselves
  chosen_spanish: para salvarse
  alternatives_spanish:
  - para ponerse a salvo
  - para ser salvados
  - para huir y salvarse
  lexicon: LSJ
  rationale: El infinitivo pasivo con valor de propósito expresa búsqueda de rescate o preservación de la vida. «Para salvarse» refleja bien el sentido práctico del escape.
theological_decisions:
- issue: Lenguaje evaluativo moral en un contexto militar
  english_pob_reading: Retain 'sinners' and 'lawless men' as the text's own evaluative categories.
  chosen_spanish_reading: Conservar «pecadores» y «hombres sin ley» como categorías evaluativas del propio texto.
  alternative_spanish_readings:
  - malhechores y rebeldes
  - los impíos y los transgresores
  rationale: El griego presenta el conflicto en términos morales y religiosos, no solo políticos. La traducción debe preservar esa valoración explícita sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza del masculino explícito en ἄνδρας
  english_pob_reading: Render as 'men' rather than a gender-neutral term.
  chosen_spanish_reading: Traducir con «hombres» en lugar de un término neutro como «personas».
  alternative_spanish_readings:
  - personas
  - gente
  rationale: El sustantivo griego es masculino explícito. En este contexto, mantener «hombres» respeta la precisión del original y la política del proyecto sobre correspondencia de género.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre el griego de Swete, el rastro auditado en inglés y la revisión más reciente; no se documentaron cambios aplicados en la pasada más reciente, por lo que la redacción española sigue de cerca la solución aprobada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se conserva la distinción léxica entre «enojo» y «ira» para reflejar ὀργή y θυμός sin neutralizar el paralelismo.
  - «A las naciones» se deja sin domesticación a «gentiles» en el texto principal, pero se aclara el posible matiz en nota.
  - Se mantiene el masculino explícito «hombres» por fidelidad al griego ἄνδρας.
