lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  english_pob_choice: I, I am
  chosen_spanish: Yo, yo soy
  alternatives_spanish:
  - Yo mismo soy
  - Yo, incluso yo, soy
  lexicon: HALOT
  rationale: La repetición del pronombre independiente es enfática. En español, 'Yo, yo soy' conserva la repetición y la fuerza retórica sin añadir palabras que el hebreo no exige. 'Yo mismo soy' comunica énfasis, pero desplaza la forma hebrea hacia una explicitación menos literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como 'Yahvé', conforme a la terminología del proyecto y al valor del nombre personal del pacto, en lugar de sustituirlo por un título.
- source_word: וְאֵין
  english_pob_choice: and ... there is no
  chosen_spanish: y ... no hay
  alternatives_spanish:
  - y ... no existe
  - y ... no está
  lexicon: HALOT
  rationale: La partícula expresa inexistencia. 'No hay' es la forma natural en español y comunica con claridad la negación existencial del hebreo.
- source_word: מִבַּלְעָדַי
  english_pob_choice: besides me
  chosen_spanish: fuera de mí
  alternatives_spanish:
  - aparte de mí
  - además de mí
  lexicon: HALOT
  rationale: 'El sentido es exclusivista: ''aparte/fuera de mí''. ''Fuera de mí'' funciona bien en español para expresar que no existe salvación al margen de Yahvé. Se preserva la alternativa semántica en la formulación.'''
- source_word: מוֹשִׁיעַ
  english_pob_choice: savior
  chosen_spanish: salvador
  alternatives_spanish:
  - libertador
  - quien salva
  lexicon: HALOT
  rationale: El participio causativo de ישׁע designa a quien salva/libera. 'Salvador' es el sustantivo natural y fiel en español para una afirmación absoluta de exclusividad.
theological_decisions:
- issue: Exclusividad de la salvación en Yahvé
  english_pob_reading: and besides me there is no savior
  chosen_spanish_reading: y fuera de mí no hay salvador
  alternative_spanish_readings:
  - y aparte de mí no hay salvador
  - y fuera de mí no existe salvador
  rationale: La cláusula afirma de manera absoluta que solo Yahvé salva. 'Fuera de mí' conserva la exclusividad sin suavizarla, y mantiene el contraste teológico del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se preserva el nombre propio divino en una forma estándar y legible para el español, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota a la forma 'Yo[a]' en el texto español. No se realizaron otros cambios respecto del contenido fuente; la traducción mantiene la repetición enfática del pronombre, el nombre divino Yahvé y la exclusividad de salvación.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se evitó 'Señor' como sustituto del nombre divino.
  - '''Salvador'' conserva el sustantivo singular absoluto del hebreo.'
  - La nota [a] está anclada directamente en el texto para cumplir la validación.
