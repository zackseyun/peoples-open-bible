translation:
  language: es
  text: Entonces los guardianes de la puerta dieron aviso y lo comunicaron dentro de la casa del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘al interior de la casa del rey’; el hebreo dice literalmente ‘la casa del rey, hacia adentro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: llamaron
  alternatives_spanish:
  - llamaron a gritos
  - proclamaron
  - clamaron
  lexicon: HALOT
  rationale: El verbo קרא, en este contexto narrativo con guardas que anuncian una noticia, pide en español un verbo de aviso oral. 'Llamaron' mantiene la acción básica sin sobredramatizarla; el contexto ya hace claro que es una convocatoria o anuncio. 'Llamaron a gritos' sería más explícito, pero agrega intensidad no necesaria.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los guardas de la puerta
  alternatives_spanish:
  - los porteros
  - los vigilantes de la puerta
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: שֹׁעֲרִים son los que están asignados a la puerta. 'Guardas de la puerta' comunica la función y evita el posible matiz doméstico o eclesiástico de 'porteros'. Aunque 'gatekeepers' se podría verter literalmente como 'guardianes de la puerta', 'guardas de la puerta' suena más natural en castellano bíblico moderno.
- source_word: וַיַּגִּידוּ
  english_pob_choice: reported it
  chosen_spanish: lo informaron
  alternatives_spanish:
  - lo comunicaron
  - lo reportaron
  - lo dijeron
  lexicon: HALOT
  rationale: נגד significa hacer saber / comunicar / reportar. 'Lo informaron' conserva el valor de relatar una noticia recibida y suena natural en español. El objeto directo no está expreso en hebreo, pero se sobreentiende por el contexto; por eso se expresa con 'lo'.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  - el palacio
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es 'casa del rey'. Se preserva esa formulación porque el texto no obliga a especificar 'palacio' y la frase conserva mejor la imagen original. 'Casa del rey' en español es clara y reproduce la construcción nominal.
- source_word: פְּנִימָה
  english_pob_choice: inside
  chosen_spanish: dentro
  alternatives_spanish:
  - adentro
  - hacia adentro
  - en el interior
  lexicon: HALOT
  rationale: פְּנִימָה indica dirección o interioridad. Aquí modifica la idea de comunicar hacia el interior del recinto, así que 'dentro' comunica la dirección de modo breve y natural. En combinación con 'la casa del rey', el sentido es que el mensaje pasó al interior.
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el testimonio hebreo base y con el audit trail inglés: la decisión principal es mantener la secuencia narrativa simple, la referencia funcional a los guardas de la puerta y la imagen literal de la casa del rey con dirección interior. No se registran revisiones textuales ni cambios posteriores relevantes.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece ningún tetragrámaton en este versículo.
  - '''Casa del rey'' mantiene la metáfora hebrea sin sobreinterpretarla como ''palacio'' o ''casa real''.'
  - '''Dentro'' conserva la dirección interna indicada por פְּנִימָה sin añadir una localización más específica de la que el hebreo ofrece.'
