  text: וַ/יַּעֲנ֣וּ אֶֽת יִרְמְיָ֗הוּ כָּל הָ/אֲנָשִׁ֤ים הַ/יֹּֽדְעִים֙ כִּֽי מְקַטְּר֤וֹת נְשֵׁי/הֶם֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים וְ/כָל הַ/נָּשִׁ֥ים הָ/עֹמְד֖וֹת קָהָ֣ל גָּד֑וֹל וְ/כָל הָ/עָ֛ם הַ/יֹּשְׁבִ֥ים בְּ/אֶֽרֶץ מִצְרַ֖יִם בְּ/פַתְר֥וֹס לֵ/אמֹֽר־־־־־־׃
