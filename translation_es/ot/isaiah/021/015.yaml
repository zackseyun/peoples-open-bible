translation:
  language: es
  text: Porque huyeron de las espadas, de la espada desenvainada[a], y del arco tensado[b], y del peso de la guerra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la espada sacada». El hebreo puede describir una espada extendida o preparada para el uso.
    reason: lexical_alternative
  - marker: b
    text: O «del arco tendido» o «del arco armado». El hebreo describe un arco preparado para disparar.
    reason: lexical_alternative
  - marker: c
    text: O «de la severidad de la guerra». El hebreo dice literalmente «el peso de la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o explicación del contexto anterior. En español, «Porque» conserva bien el valor explicativo de כִּי sin sonar forzado.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de delante de
  - por causa de
  - desde
  lexicon: HALOT
  rationale: La repetición de מִפְּנֵי expresa alejamiento ante una amenaza. En español, «de» con verbos de huida suena natural y preserva el movimiento de separación.
- source_word: חֲרָבוֹת
  english_pob_choice: swords
  chosen_spanish: las espadas
  alternatives_spanish:
  - las armas
  - las hojas
  - las espadas
  lexicon: HALOT
  rationale: El plural hebreo nombra espadas en sentido general. «Espadas» reproduce el sustantivo concreto y mantiene el plural de amenaza armada.
- source_word: נָדָדוּ
  english_pob_choice: have fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - han huido
  - escaparon
  - se apartaron
  lexicon: HALOT
  rationale: En este contexto militar el verbo indica huida ante peligro. El pretérito simple español comunica con naturalidad una acción completa en la visión profética.
- source_word: חֶרֶב נְטוּשָׁה
  english_pob_choice: the drawn sword
  chosen_spanish: la espada desenvainada
  alternatives_spanish:
  - la espada envainada y desenvainada
  - la espada sacada
  - la espada extendida
  lexicon: HALOT
  rationale: נְטוּשָׁה describe una espada preparada para el uso; «desenvainada» es la forma española más clara e idiomática. Mantiene la tensión entre la imagen literal y el valor funcional.
- source_word: קֶשֶׁת דְּרוּכָה
  english_pob_choice: the bent bow
  chosen_spanish: el arco tendido
  alternatives_spanish:
  - el arco armado
  - el arco curvado
  - el arco tensado
  lexicon: HALOT
  rationale: דְּרוּכָה presenta el arco listo para disparar. «Tendido» conserva la imagen física de tensión y evita confusión con la espada «desenvainada».
- source_word: כֹּבֶד מִלְחָמָה
  english_pob_choice: the weight of battle
  chosen_spanish: el peso de la guerra
  alternatives_spanish:
  - la severidad de la guerra
  - la dureza de la guerra
  - el peso del combate
  lexicon: HALOT
  rationale: כֹּבֶד significa literalmente peso o gravedad; «peso de la guerra» preserva la metáfora y sigue de cerca el hebreo. «Guerra» refleja el campo semántico más amplio que «batalla» en este verso.
translation_notes:
  revision_awareness: 'Se siguió de cerca el sentido del texto hebreo y el auditor inglés: repetición de מִפְּנֵי como alejamiento ante amenaza, y conservación de las imágenes bélicas de espada, arco y el hebraísmo «peso de la guerra». No hubo revisiones aplicadas al juicio base de la traducción inglesa, que permanece en alto acuerdo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo la metáfora concreta de armas y conflicto, sin sustituirla por una paráfrasis abstracta.
  - «Guerra» se eligió aquí en vez de «batalla» para reflejar mejor כֹּבֶד מִלְחָמָה como fórmula de intensidad general.
  - El anclaje de notas al pie sigue el orden de las alternativas lexicales del verso.
