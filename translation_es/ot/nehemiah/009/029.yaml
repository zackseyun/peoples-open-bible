review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo y sigue de cerca las decisiones auditadas en inglés: advertencia/am onestación, retorno a la ley, presunción, negativa a escuchar, pecado contra los juicios, alusión a Levítico 18:5 y obstinación final. Sin embargo, la cláusula idiomática וַיִּתְּנוּ כָתֵף סוֹרֶרֶת está mal resuelta en español con «Les dieron hombro contumaz», porque introduce un objeto indirecto inexistente y produce una frase poco inteligible; además, el anclaje de la nota [a] sobre «ley» no corresponde al lugar más natural de la alternativa explicada.'
  spanish_quality_summary: 'El español es en general digno y legible, pero presenta dos tropiezos de naturalidad: «Les dieron hombro contumaz» suena defectuoso y poco claro; y conviene anclar [a] en «hacerlos volver» o en la frase verbal pertinente, no en «ley», ya que la alternativa nota el verbo causativo de retorno. El resto del registro («cerviz», «juicios», «el hombre») es aceptable dentro del estilo bíblico buscado.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. «Ley» para תּוֹרָה, «juicios» para מִשְׁפָּטִים, y «el hombre» para אָדָם genérico están alineados con el expediente. La principal corrección es idiomática, no terminológica: mantener la metáfora de «hombro» sin construirla de manera antinatural en español.'
  issues:
  - severity: high
    issue: «Les dieron hombro contumaz» no representa bien el hebreo ni el español natural.
    rationale: וַיִּתְּנוּ כָתֵף סוֹרֶרֶת significa literalmente 'dieron un hombro rebelde/obstinado', pero en español «darle hombro a alguien» activa otra lectura y el pronombre «les» no tiene base en el texto. Conviene una forma como «presentaron un hombro rebelde», que conserva la metáfora y es comprensible.
  - severity: medium
    issue: La nota [a] está anclada en «ley», aunque su contenido principal explica el verbo «hacerlos volver».
    rationale: 'La nota dice «O: para volverlos a tu ley» y explica el hebreo causativo de retorno; por eso el marcador debe ir sobre la frase verbal correspondiente, no sobre «ley», para que el lector entienda qué variante se está señalando.'
