translation:
  language: es
  text: En Guibeón vivieron el padre de Guibeón[a], y su esposa se llamaba Maaca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fundador de Guibeón» o «el jefe de Guibeón»; hebreo literalmente, «el padre de Guibeón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/גִבְע֥וֹן
  english_pob_choice: In Gibeon
  chosen_spanish: En Guibeón
  alternatives_spanish:
  - Y en Guibeón
  lexicon: HALOT
  rationale: El prefijo con conjunción y preposición expresa ubicación; en español, «En Guibeón» comunica de forma natural el sentido locativo sin forzar una coordinación innecesaria.
- source_word: יָשְׁב֖וּ
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - habitó
  - moró
  - se estableció
  lexicon: HALOT
  rationale: En este tipo de nota genealógica/topográfica, el verbo indica residencia. «Vivió» es la opción más natural en español moderno y conserva el sentido de habitar, más que un calco arcaizante.
- source_word: אֲבִ֣י גִבְע֑וֹן
  english_pob_choice: the father of Gibeon
  chosen_spanish: el padre de Guibeón
  alternatives_spanish:
  - el fundador de Guibeón
  - el jefe de Guibeón
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «padre de Guibeón». Mantener «padre» preserva la transparencia del texto, mientras que las alternativas contextuales quedan reflejadas en la nota.
- source_word: וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ
  english_pob_choice: and his wife’s name was
  chosen_spanish: y el nombre de su esposa fue
  alternatives_spanish:
  - y el nombre de su mujer fue
  - y su esposa se llamaba
  lexicon: HALOT
  rationale: El hebreo presenta una construcción nominal de identificación. En español, «el nombre de su esposa fue» reproduce bien la relación posesiva y la función predicativa sin sonar forzado.
- source_word: מַעֲכָֽה
  english_pob_choice: Maacah
  chosen_spanish: Maaca
  alternatives_spanish:
  - Maacá
  - Maacah
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; «Maaca» sigue la forma castellana breve y consistente con el uso bíblico en español, sin añadir acentuación no atestiguada en el dato fuente.
translation_notes:
  revision_awareness: El texto inglés no requirió cambios sustantivos según el control de revisión más reciente; la redacción española mantiene esa misma lectura, con ajuste idiomático normal para el español.
  spanish_consistency_notes:
  - Se usa «Guibeón» como transliteración estable del topónimo.
  - Se mantiene «padre de Guibeón» en el cuerpo principal para conservar la literalidad documentada.
  - No se introduce lenguaje teológico adicional porque el verso es una nota genealógica/topográfica.
