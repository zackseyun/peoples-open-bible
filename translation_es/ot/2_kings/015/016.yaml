    reason: alternative_reading
  - marker: b
    text: «Abrir» se refiere a abrir la ciudad a Menahem; es decir, negarse a rendirse o a admitirlo.
    reason: cultural_note
  - marker: c
    text: O «rasgó» o «abrió de un tajo». El verbo hebreo indica una apertura violenta por la fuerza.
    reason: lexical_alternative
  revision_rationale: Se revisa el verbo principal a 'atacó' para reflejar mejor un asalto militar contra una ciudad y su territorio. Se reemplaza la repetición poco natural de 'golpeó' con una formulación directa del acto final, 'les abrió el vientre', que representa con más precisión el valor violento de בקע y mejora la fluidez del español. Se conservan las notas esenciales del expediente inglés, reubicando los marcadores para que correspondan exactamente al texto revisado.
