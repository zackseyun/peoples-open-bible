translation:
  text: If you do not fast the world[a], you will not find the kingdom; and if you
    do not make the Sabbath a Sabbath[e][d][c][b], you will not see the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Fast to the world” renders Coptic ⲉ with its directional sense. Many translators
      smooth this to “fast from the world,” but both Coptic and the Greek witness
      preserve the odd prepositional choice; the strangeness is likely deliberate.
    reason: lexical_alternative
  - marker: b
    text: Greek POxy 1 reads “the kingdom of God,” whereas NH Coptic has simply “the
      kingdom.” This draft follows the Coptic base text.
    reason: textual_variant
  - marker: c
    text: “Make the Sabbath a Sabbath” is a literal predicate-accusative. It likely
      means to let the Sabbath truly be what it is (i.e., keep/observe it as such),
      but the rendering keeps Thomas’s compressed style.
    reason: cultural_note
  - marker: d
    text: One manuscript line shows the orthography ⲥⲁⲙⲃⲁⲧⲟⲛ (mb) before normalization
      to ⲥⲁⲃⲃⲁⲧⲟⲛ (bb), a common mb/bb alternation in Sahidic/Lycopolitan hands.
    reason: dialect_note
  - marker: e
    text: Or 'fast to the world'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲣϣⲁⲛ_ (protasis)
  chosen: if
  alternatives:
  - when
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic
  rationale: ⲉⲣϣⲁⲛ_ introduces a future-contingent or general conditional clause;
    “if” best fits the Thomasine apothegm structure here.
- source_word: ⲧⲙⲣⲛⲏⲥⲧⲉⲩⲉ
  chosen: fast
  alternatives:
  - abstain (from food)
  lexicon: Crum, Coptic Dictionary (s.v. rnhsteue < Gk νηστεύειν)
  rationale: Standard rendering of the Greek loan verb; keeps the ascetic nuance without
    interpretation.
- source_word: ⲉ (before ⲡⲕⲟⲥⲙⲟⲥ)
  chosen: to
  alternatives:
  - from
  lexicon: Lambdin, Introduction to Sahidic Coptic (prepositions); Layton, Coptic
    Grammar
  rationale: The text uses ⲉ plus object; both the Coptic and the Greek witness have
    the odd construction “fast to the world.” Preserving “to” maintains Thomas’s strangeness
    rather than normalizing to ‘from.’
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  chosen: the world
  alternatives:
  - the cosmos
  lexicon: Crum, Coptic Dictionary (s.v. ⲕⲟⲥⲙⲟⲥ)
  rationale: Common meaning in Thomas; “world” is the conventional English for this
    Greek loan.
- source_word: ⲁϩⲉ
  chosen: find
  alternatives:
  - discover
  lexicon: Crum, Coptic Dictionary (s.v. ⲁϩⲉ)
  rationale: Regular verb for finding/obtaining; “find” matches Thomas’s concise style.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingship
  lexicon: Crum, Coptic Dictionary (s.v. ⲙⲛⲧⲣⲱ ‘kingship, reign’); Layton, Coptic
    Grammar
  rationale: “Kingdom” is idiomatic and familiar in Thomas; avoids over-interpretation.
    Coptic lacks a genitive here.
- source_word: ⲧⲙⲉⲓⲣⲉ
  chosen: make
  alternatives:
  - render
  - do
  lexicon: Crum, Coptic Dictionary (s.v. ⲙⲉⲓⲣⲉ)
  rationale: Predicate-accusative construction “make X Y”; “make” preserves the literal
    force of the idiom.
- source_word: ⲡⲥⲁⲃⲃⲁⲧⲟⲛ … ⲛⲥⲁⲃⲃⲁⲧⲟⲛ
  chosen: the Sabbath … a Sabbath
  alternatives:
  - the sabbath day … a sabbath
  lexicon: Crum, Coptic Dictionary (s.v. ⲥⲁⲃⲃⲁⲧⲟⲛ)
  rationale: Keeps the repetition and literalness of the construction, which seems
    the point of the saying.
- source_word: ⲛⲁⲩ (with future ⲛⲁ-)
  chosen: see
  alternatives:
  - behold
  lexicon: Crum, Coptic Dictionary (s.v. ⲛⲁⲩ)
  rationale: Plain “see” suits Thomas’s diction and the future negation ⲛⲁⲩ … ⲁⲛ.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - the father
  lexicon: Crum, Coptic Dictionary (s.v. ⲓⲱⲧ)
  rationale: Definite article marks a title; capitalizing reflects the titular sense
    common in Thomas without adding content.
textual_note: 'Sahidic with Lycopolitan coloring. No lacunae or conjectural restorations
  are indicated by Dilley for this logion. Orthography shows assimilation in the manuscript’s
  phrase-joined line: one instance reads ⲥⲁⲙⲃⲁⲧⲟⲛ (mb) before normalization to ⲥⲁⲃⲃⲁⲧⲟⲛ,
  a common mb/bb fluctuation in this codex. The construction ⲧⲙⲉⲓⲣⲉ ⲛⲡⲥⲁⲃⲃⲁⲧⲟⲛ ⲛⲥⲁⲃⲃⲁⲧⲟⲛ
  is a predicate-accusative (“make the Sabbath [to be] a Sabbath”). The protasis marker
  ⲉⲣϣⲁⲛ_ introduces two coordinated conditions with future negatives (ⲛⲧⲱⲧⲛ ⲛⲁ- …
  ⲁⲛ). No explicit incipit (“Jesus said”) occurs in the excerpted lines, though such
  formulae often frame Thomasine logia elsewhere.'
