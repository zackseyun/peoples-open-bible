translation:
  language: es
  text: Y rescataron la ley de manos de las naciones y de manos de los reyes, y no dieron cuerno[a] al pecador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'no dieron fuerza al pecador' o 'no permitieron que el pecador ganara poder'. El 'cuerno' es una imagen bíblica de poder o exaltación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντελάβοντο
  english_pob_choice: rescued
  chosen_spanish: rescataron
  alternatives_spanish:
  - tomaron en defensa
  - ayudaron
  - defendieron
  lexicon: LSJ
  rationale: El medio de ἀντιλαμβάνομαι puede expresar tomar en apoyo, ayudar o rescatar. En este contexto, con la ley como objeto arrancado de manos hostiles, 'rescataron' comunica mejor la acción de liberación que una ayuda genérica.
- source_word: τοῦ νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: νόμος alude aquí a la ley judía/Torá en el contexto macabeo. En español, 'la ley' conserva la referencia histórica y religiosa sin añadir una mayúscula interpretativa no marcada en el griego.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de manos de
  alternatives_spanish:
  - del poder de
  - de la mano de
  lexicon: LSJ
  rationale: La expresión conserva la metáfora concreta de control o posesión. 'De manos de' suena natural en español y mantiene el valor imagético del giro griego.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los paganos
  lexicon: LSJ
  rationale: En este contexto judío se refiere a pueblos no judíos, pero 'las naciones' reproduce de cerca el término fuente sin introducir una etiqueta más interpretativa.
- source_word: τῶν βασιλέων
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los gobernantes
  lexicon: LSJ
  rationale: βασιλέων significa de manera directa 'reyes'; no hace falta ampliar a un término político más general.
- source_word: κέρας
  english_pob_choice: a horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - fuerza
  - poder
  - exaltación
  lexicon: LSJ
  rationale: κέρας es literalmente 'cuerno' y funciona bíblicamente como imagen de fuerza, poder o exaltación. La traducción principal preserva la imagen; el sentido funcional queda aclarado en la nota.
- source_word: τῷ ἁμαρτωλῷ
  english_pob_choice: the sinner
  chosen_spanish: al pecador
  alternatives_spanish:
  - al malvado
  - al hombre pecador
  lexicon: LSJ
  rationale: ἁμαρτωλῷ es singular y significa 'al pecador'. 'Pecador' es la equivalencia directa y suficientemente clara en español contemporáneo.
theological_decisions:
- issue: Imagen de 'cuerno' como símbolo de poder o exaltación
  english_pob_reading: Preserve the literal image 'did not give a horn to the sinner' in the main text
  chosen_spanish_reading: Mantener 'no dieron cuerno al pecador' en el texto principal
  alternative_spanish_readings:
  - no dieron fuerza al pecador
  - no permitieron que el pecador se exaltara
  - no le dieron poder al pecador
  rationale: El griego usa la metáfora bíblica estable del cuerno para poder o exaltación. Preservar la imagen mantiene la textura intertextual y evita resolver demasiado pronto la figura; el sentido funcional se recoge en la nota.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y lexical con claridad legible, documentando las excepciones'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que ajustó el final a una ordenación más natural ('did not give a horn to the sinner'). En español se refleja esa naturalidad con 'no dieron cuerno al pecador', manteniendo el valor literal del símbolo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva 'la ley' en minúscula para seguir el sustantivo común griego y el contexto histórico.
  - '''Cuerno'' se mantiene como imagen literal; la nota aclara el valor figurado sin reemplazarlo en el texto principal.'
  - '''Pecador'' reproduce el singular del griego τῷ ἁμαρτωλῷ.'
