translation:
  language: es
  text: Hay quien habla precipitadamente como estocadas de espada[a], pero la lengua de los sabios trae sanidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como las estocadas de una espada». El plural hebreo sugiere heridas o punzadas repetidas.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la lengua de los sabios [es] sanidad/remedio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Se encuentra quien
  lexicon: HALOT
  rationale: El hebreo introduce una clase de persona, no un individuo específico. En español, «Hay quien» reproduce de forma natural esa función existencial sin añadir más contenido del que el texto aporta.
- source_word: בּוֹטֶה
  english_pob_choice: speaks rashly
  chosen_spanish: habla
  alternatives_spanish:
  - habla precipitadamente
  - habla sin pensar
  - se expresa con ligereza
  lexicon: HALOT
  rationale: El participio describe habla descontrolada o imprudente. Aquí se mantiene «habla» en el cuerpo del proverbio y la comparación con «golpes de espada» conserva la fuerza negativa; «habla precipitadamente» sería una expansión interpretativa más explícita pero menos breve.
- source_word: כְּמַדְקְרֹת חָרֶב
  english_pob_choice: like the thrusts of a sword
  chosen_spanish: como golpes de espada
  alternatives_spanish:
  - como estocadas de espada
  - como puñaladas de espada
  - como las estocadas de una espada
  lexicon: HALOT
  rationale: La imagen hebrea es de acciones que hieren repetidamente. «Golpes de espada» comunica bien el daño y funciona con fluidez en español; «estocadas» sería más literal respecto de la idea de perforar, pero menos general y algo más técnica.
- source_word: וּלְשׁוֹן
  english_pob_choice: but the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua, en cambio
  - pero la lengua
  - la palabra
  lexicon: HALOT
  rationale: En español, «lengua» preserva la metáfora semítica de la facultad de hablar. Se evita «pero» porque ya aparece la contraposición natural entre la primera mitad y la segunda; «la lengua» permite una formulación directa y proverbial.
- source_word: חֲכָמִים
  english_pob_choice: of the wise
  chosen_spanish: de los sabios
  alternatives_spanish:
  - de los sabios
  - de los prudentes
  - de personas sabias
  lexicon: HALOT
  rationale: «Sabios» conserva el sustantivo plural del hebreo y mantiene el tono proverbial. «Prudentes» sería una posible aclaración, pero desplaza el término base y reduce la resonancia sapiencial.
- source_word: מַרְפֵּא
  english_pob_choice: brings healing
  chosen_spanish: trae sanidad
  alternatives_spanish:
  - trae sanidad
  - da sanidad
  - es sanidad
  - trae remedio
  lexicon: HALOT
  rationale: El sustantivo puede significar «sanidad» o «remedio». En español, «trae sanidad» expresa el efecto restaurador del habla sabia sin convertir el sustantivo en una afirmación demasiado abstracta. Se conserva el matiz de beneficio curativo.
theological_decisions:
- issue: Naturaleza proverbial de la comparación entre habla dañina y habla sanadora
  english_pob_reading: A rash speaker is likened to sword thrusts, while the tongue of the wise is healing/remedy.
  chosen_spanish_reading: La primera mitad conserva el juicio moral sobre el habla dañina; la segunda mantiene que la lengua de los sabios produce sanidad.
  alternative_spanish_readings:
  - Habla imprudente como heridas de espada, pero la lengua de los sabios es medicina.
  - Hay quien habla precipitadamente como estocadas de espada, pero la lengua de los sabios cura.
  rationale: No hay una doctrina específica aquí, pero sí una tensión proverbial entre daño verbal y restauración verbal. «Trae sanidad» mantiene el valor terapéutico sin colapsarlo en una afirmación meramente literal o médica.
  doctrine_reference: Sabiduría proverbial sobre el poder moral y relacional de las palabras; cf. Prov. 15:4
translation_notes:
  revision_awareness: El contexto inglés POB ya había resuelto la lectura de יֵשׁ como una afirmación existencial y de מַרְפֵּא como un valor de sanidad/remedio. No hubo revisiones aplicadas en la versión inglesa final; esta propuesta sigue ese juicio, pero ajusta la primera cola para que el español conserve brevedad proverbial sin perder la acusación de habla dañina.
  spanish_consistency_notes:
  - Se mantiene «sabios» para חֲכָמִים, acorde con el campo sapiencial de Proverbios.
  - Se usa «lengua» para וּלְשׁוֹן en vez de «palabra» para preservar la metáfora bíblica del órgano de habla.
  - «Sanidad» se prefiere a «remedio» para conservar el efecto restaurador en un registro bíblico y claro.
  - El texto evita introducir «pero» explícito en la primera mitad; la oposición queda marcada por la estructura del proverbio.
