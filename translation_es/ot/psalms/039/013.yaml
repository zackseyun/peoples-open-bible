translation:
  language: es
  text: Oye mi oración, Yahvé, y presta oído a mi clamor; no seas sordo[a] a mis lágrimas. Porque yo soy un peregrino contigo, un residente extranjero como todos mis padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no guardes silencio ante mis lágrimas». El verbo hebreo puede significar «estar en silencio», pero el contexto inmediato de oír y prestar oído favorece la lectura auditiva en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «como todos mis antepasados». Literalmente, «como todos mis padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  english_pob_choice: Hear
  chosen_spanish: Oye
  alternatives_spanish:
  - Escucha
  - Oye atentamente
  lexicon: HALOT
  rationale: El imperativo de שׁמע dirigido a Yahvé pide una recepción atenta de la oración. En español, 'Oye' conserva el tono directo y breve de la súplica poética sin volverla demasiado explicativa.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: El sustantivo designa una oración dirigida a Dios. 'Oración' es la equivalencia natural y digna en español; 'plegaria' también es posible, pero 'oración' sigue de cerca el valor básico del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la política del proyecto. 'Yahvé' es la forma principal en español y evita la sustitución por un título.
- source_word: וְשַׁוְעָתִי
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi súplica
  lexicon: HALOT
  rationale: שַׁוְעָה expresa un clamor o grito de auxilio. 'Clamor' conserva la intensidad emocional y la resonancia de petición urgente mejor que un término más suave.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear to
  chosen_spanish: presta oído a
  alternatives_spanish:
  - atiende a
  - inclina tu oído a
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'dar oído'. 'Presta oído a' mantiene la imagen auditiva y el paralelismo con 'Oye' sin sonar arcaico en exceso.
- source_word: אֶל דִּמְעָתִי
  english_pob_choice: to my tears
  chosen_spanish: a mis lágrimas
  alternatives_spanish:
  - a mi llanto
  - a mi llorar
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular colectivo, el español natural pide plural para la imagen de llanto continuo. 'Lágrimas' preserva el valor emotivo sin imponer una paráfrasis excesiva.
- source_word: אַֽל תֶּחֱרַשׁ
  english_pob_choice: do not be deaf
  chosen_spanish: no seas sordo
  alternatives_spanish:
  - no calles
  - no te quedes callado
  lexicon: HALOT
  rationale: El verbo puede significar 'callar' o 'estar en silencio', pero el contexto inmediato de oír y prestar oído favorece la imagen auditiva. 'No seas sordo' reproduce esa tensión retórica, como en el inglés POB.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base de la súplica. 'Porque' expresa con claridad la razón que sigue y funciona bien en español bíblico contemporáneo.
- source_word: גֵר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - peregrino
  - extranjero
  lexicon: HALOT
  rationale: גֵר nombra a quien vive fuera de su patria o sin pertenencia plena. 'Forastero' conserva la idea de no ser originario del lugar y es comprensible en español; se evita 'peregrino' por su posible asociación devocional moderna.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - en tu presencia
  lexicon: HALOT
  rationale: La preposición עם suele ser 'con'. 'Contigo' preserva la relación directa con Dios y suena natural en español; 'en tu presencia' sería interpretativo y más expansivo.
- source_word: תּוֹשָׁב
  english_pob_choice: resident alien
  chosen_spanish: residente extranjero
  alternatives_spanish:
  - residente forastero
  - habitante temporal
  lexicon: HALOT
  rationale: El término distingue a quien reside sin plena pertenencia jurídica/social. 'Residente extranjero' conserva esa distinción con un español claro, aunque 'extranjero residente' también sería posible.
- source_word: כְּכָל אֲבוֹתָי
  english_pob_choice: like all my fathers
  chosen_spanish: como todos mis padres
  alternatives_spanish:
  - como todos mis antepasados
  - como todos mis antecesores
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mis padres'. Se mantiene la forma concreta y masculina del texto; 'antepasados' es viable, pero suaviza la correspondencia verbal con el original.
theological_decisions:
- issue: Traducción del Tetragrámaton
  english_pob_reading: Yahweh rather than the traditional substitution 'the LORD'
  chosen_spanish_reading: Yahvé en el texto principal
  alternative_spanish_readings:
  - Señor
  - el SEÑOR
  rationale: El proyecto preserva el nombre divino donde el hebreo lo escribe. 'Yahvé' refleja la decisión teológica y textual de no enmascarar el nombre propio con un título.
  doctrine_reference: Project-level terminology default for יהוה / YHWH
- issue: Relación entre גֵר y תּוֹשָׁב
  english_pob_reading: sojourner / resident alien as distinct social-status terms
  chosen_spanish_reading: forastero / residente extranjero como dos expresiones distintas
  alternative_spanish_readings:
  - extranjero / forastero
  - peregrino / residente
  rationale: Se conserva la pareja de términos sin fusionarlos. Eso mantiene la tensión legal-social y la autocomprensión del salmista como alguien sin pertenencia plena, en línea con el audit trail en inglés.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Imagen de silencio o sordera en אַל תֶּחֱרַשׁ
  english_pob_reading: do not be deaf
  chosen_spanish_reading: no seas sordo
  alternative_spanish_readings:
  - no calles
  - no te quedes callado
  rationale: Aunque el verbo puede referir silencio, el contexto de 'oye' y 'presta oído' hace preferible una formulación auditiva. 'No seas sordo' preserva la figura retórica y la tensión del pasaje.
  doctrine_reference: Translation philosophy §5 (auditory context over isolated lexical possibility)
- issue: Renderización de כְּכָל אֲבוֹתָי
  english_pob_reading: like all my fathers
  chosen_spanish_reading: como todos mis padres
  alternative_spanish_readings:
  - como todos mis antepasados
  rationale: Se conserva la literalidad masculina del hebreo, siguiendo la preferencia por precisión de género cuando el original es explícito. 'Antepasados' sigue siendo una alternativa válida, pero menos atada a la forma del texto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el presente borrador sigue de cerca el consenso alto del audit trail inglés y mantiene las mismas decisiones léxicas básicas en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino, no como sustitución titulada.
  - 'Se conservan dos términos distintos para la condición social: ''forastero'' y ''residente extranjero''.'
  - La imagen de 'oír'/'prestar oído' se refleja con 'oye'/'presta oído' y se refuerza con 'no seas sordo'.
  - '''Mis lágrimas'' refleja el plural natural español para el singular colectivo hebreo sin perder la imagen.'
  - '''Como todos mis padres'' conserva la literalidad del final del verso y su matiz genealógico.'
