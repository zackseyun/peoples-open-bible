revisions:
- from: Y todo el que toque cualquier objeto[a] sobre el que ella se siente lavará sus vestidos y se bañará en agua, y será impuro hasta la tarde.
  to: Y todo el que toque cualquier objeto[a] sobre el cual ella se haya sentado lavará sus vestidos y se bañará en agua, y será impuro hasta la tarde.
  rationale: Se hace una reparación menor para mejorar la naturalidad y precisión de la cláusula relativa en español, sin cambiar el sentido legal del hebreo ni las decisiones léxicas principales del POB. Se conserva la nota léxica sobre כְּלִי y la categoría cultual de «impuro».
