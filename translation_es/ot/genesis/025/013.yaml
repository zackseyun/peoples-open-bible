translation:
  language: es
  text: 'Y estos son los nombres de los hijos de Ismael, por sus nombres, según sus generaciones[a]: el primogénito de Ismael fue Nebaiot, y Quedar, y Adbeel, y Mibsam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus líneas de descendencia». El término hebreo puede referirse a líneas genealógicas o a la descendencia en sentido formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Ahora estos son
  - Estos son
  lexicon: HALOT
  rationale: La fórmula introduce una lista genealógica; en español, «Y estos son» conserva el valor conjuntivo y la deixis sin forzar un calco excesivo.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - nombres
  lexicon: HALOT
  rationale: Se mantiene el sustantivo explícito para reflejar la estructura nominal del hebreo en un registro genealógico claro.
- source_word: בְּנֵי יִשְׁמָעֵאל
  english_pob_choice: the sons of Ishmael
  chosen_spanish: los hijos de Ismael
  alternatives_spanish:
  - los hijos de Ismael
  - los descendientes de Ismael
  lexicon: HALOT
  rationale: «Hijos» reproduce de modo natural la construcción genealógica; «descendientes» sería posible, pero diluye la relación filial directa del texto.
- source_word: בִּשְׁמֹתָם
  english_pob_choice: by their names
  chosen_spanish: según sus nombres
  alternatives_spanish:
  - por sus nombres
  - en sus nombres
  lexicon: HALOT
  rationale: El hebreo conserva una repetición formal que aquí se vierte de manera idiomática como «según», manteniendo la idea de enumeración ordenada sin sonar extraño en español.
- source_word: לְתוֹלְדֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - según sus líneas de descendencia
  - según sus genealogías
  - según sus familias
  lexicon: HALOT
  rationale: «Generaciones» preserva la amplitud genealógica de תּוֹלְדֹת sin reducirlo a «familias»; además mantiene la cercanía formal con la POB inglesa.
- source_word: בְּכֹר יִשְׁמָעֵאל
  english_pob_choice: the firstborn of Ishmael
  chosen_spanish: el primogénito de Ismael
  alternatives_spanish:
  - el primero nacido de Ismael
  - el hijo primogénito de Ismael
  lexicon: HALOT
  rationale: «Primogénito» es la forma natural y precisa en español para בְּכֹר, conservando el valor de prioridad de nacimiento.
- source_word: נְבָיֹת
  english_pob_choice: Nebaioth
  chosen_spanish: Nebaiot
  alternatives_spanish:
  - Nebaiot
  - Nebaiot
  lexicon: HALOT
  rationale: Se adopta la transliteración española habitual con terminación simplificada «-ot», más legible en español que la forma inglesa «Nebaioth».
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Quedar
  alternatives_spanish:
  - Kedar
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional «Quedar», común en biblias y referencias históricas en español, sin alterar el referente.
- source_word: אַדְבְּאֵל
  english_pob_choice: Adbeel
  chosen_spanish: Adbeel
  alternatives_spanish:
  - Adbeel
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: מִבְשָׂם
  english_pob_choice: Mibsam
  chosen_spanish: Mibsam
  alternatives_spanish:
  - Mibsam
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio.
theological_decisions:
- issue: Valor genealógico de תוֹלְדֹת
  english_pob_reading: according to their generations
  chosen_spanish_reading: según sus generaciones
  alternative_spanish_readings:
  - según sus líneas de descendencia
  - según sus genealogías
  rationale: No se interpreta como simple cronología ni como «familias» en sentido sociológico estrecho. La fórmula española mantiene la amplitud genealógica del hebreo y evita reducir el término.
  doctrine_reference: Génesis 2–5; uso genealógico de תּוֹלְדֹת en el Pentateuco
translation_notes:
  revision_awareness: El inglés revisado añadió «was» para clarificar que Nebaioth es el primogénito. En español, el verbo «fue» cumple esa misma función de claridad sintáctica sin añadir contenido ajeno al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma en este proyecto, pero este versículo no contiene el nombre divino.
  - 'Se conserva la cadencia genealógica con paralelismo formal: nombres / generaciones / primogénito.'
  - Se adopta una transliteración española estable para los nombres propios, priorizando legibilidad y tradición bíblica en español.
