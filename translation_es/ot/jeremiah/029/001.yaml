- from: Ahora bien, estas son las palabras de la carta que Jeremías el profeta envió desde Jerusalén a los ancianos restantes de los desterrados[a], y a los sacerdotes, y a los profetas, y a todo el pueblo que Nabucodonosor había llevado cautivo[b] desde Jerusalén a Babilonia[c].
  to: Ahora bien, estas son las palabras de la carta[a] que Jeremías el profeta envió desde Jerusalén a los ancianos restantes de los exiliados[b], a los sacerdotes, a los profetas y a todo el pueblo que Nabucodonosor[d] había deportado[c] desde Jerusalén a Babilonia.
