    text: Or 'jealousy'; the Hebrew is plural, likely functioning as a technical label for this legal procedure.
    reason: lexical_alternative
  - marker: b
    text: Or 'turns aside' or 'strays.' The Hebrew uses a metaphor for marital unfaithfulness.
    reason: lexical_alternative
  - marker: c
    text: Literally 'under her husband,' an idiom for being under the marital bond or authority of her husband.
    reason: cultural_note
