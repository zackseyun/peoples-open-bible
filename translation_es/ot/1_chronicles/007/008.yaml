translation:
  language: es
  text: 'Y los hijos de Becher: Zemira, Joás, Eliezer, Elioenai, Omri, Jeremot[a], Abías, Anatot y Alemet. Todos estos fueron los hijos de Becher.'
  philosophy: optimal-equivalence
