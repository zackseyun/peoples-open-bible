  text: τοὺς ἐν δυνάμει θεοῦ φρουρουμένους διὰ πίστεως εἰς σωτηρίαν ἑτοίμην ἀποκαλυφθῆναι ἐν καιρῷ ἐσχάτῳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/005.yaml
  text: 'who are being guarded by the power of God through faith for a salvation ready to be revealed in the last time.'
translation:
  language: ko
  text: '여러분은 마지막 때에 나타나도록 예비된 구원에 이르기까지[a] 하나님의 능력으로 믿음을 통해 보호받고 있는 자들입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「마지막 때에」. ἐν καιρῷ ἐσχάτῳ는 결정적·종말적 시점을 가리키며, 구체적 종말론 도식을 본문에 박지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουρουμένους
  english_pob_choice: are being guarded
  chosen_korean: 보호받고 있는
  alternatives_korean:
  - 지켜지고 있는
  - 호위받고 있는
  lexicon: BDAG
  rationale: 현재 수동분사의 「지속적으로 받는」 의미와 φρουρέω의 군사적·보호적 어감을 「보호받고 있는」으로 살린다.
- source_word: ἐν δυνάμει θεοῦ
  english_pob_choice: by the power of God
  chosen_korean: 하나님의 능력으로
  alternatives_korean:
  - 하나님의 능력 안에서
  lexicon: BDAG
  rationale: ἐν이 수동분사와 결합해 수단·도구를 가리키므로 「~으로」로 옮긴다.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_korean: 믿음을 통해
  alternatives_korean:
  - 믿음으로 말미암아
  lexicon: BDAG
  rationale: πίστις의 기본값 「믿음」을 유지한다.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for a salvation
  chosen_korean: 구원에 이르기까지
  alternatives_korean:
  - 구원을 위하여
  lexicon: BDAG
  rationale: 목표·도달의 εἰς를 「~에 이르기까지」로 자연스럽게 옮기되, 종말적 도래의 방향성을 보존한다.
- source_word: ἐν καιρῷ ἐσχάτῳ
  english_pob_choice: in the last time
  chosen_korean: 마지막 때에
  alternatives_korean:
  - 종말의 때에
  - 마지막 시점에
  lexicon: BDAG
  rationale: καιρός의 결정적·예정된 때의 어감을 살리며, 「마지막 때」가 한국 성서 전통에 자연스럽다.
