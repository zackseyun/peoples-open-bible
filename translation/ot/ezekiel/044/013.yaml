id: EZK.44.13
reference: Ezekiel 44:13
source:
  edition: WLC
  text: וְ/לֹֽא יִגְּשׁ֤וּ אֵלַ/י֙ לְ/כַהֵ֣ן לִ֔/י וְ/לָ/גֶ֨שֶׁת֙ עַל כָּל קָ֣דָשַׁ֔/י אֶל קָדְשֵׁ֖י הַ/קְּדָשִׁ֑ים וְ/נָֽשְׂאוּ֙ כְּלִמָּתָ֔/ם וְ/תוֹעֲבוֹתָ֖/ם אֲשֶׁ֥ר עָשֽׂוּ־־־־׃
translation:
  text: They shall not come near to me to serve as priests for me[a], nor to come near any of my holy things, the most holy things; but they shall bear their shame and the abominations that they have done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Holy of Holies.' The Hebrew phrase can refer either to the most holy things or to the innermost holy place; here the context favors the former.
    reason: alternative_reading
lexical_decisions:
- source_word: יִגְּשׁוּ אֵלַי
  chosen: come near to me
  alternatives:
  - approach me
  lexicon: HALOT
  rationale: נגשׁ in priestly/temple contexts commonly denotes approaching into sacred proximity. 'Come near to me' is natural English and preserves the cultic sense without over-paraphrasing.
- source_word: לְכַהֵן לִי
  chosen: to serve as priests for me
  alternatives:
  - to minister as priests to me
  - to act as priests for me
  lexicon: HALOT
  rationale: כהן in the Piel/denominative verbal form means to function or minister as a priest. 'Serve as priests for me' is clear modern English and retains the official priestly role.
- source_word: וְלָגֶשֶׁת
  chosen: nor to come near
  alternatives:
  - nor to approach
  lexicon: HALOT
  rationale: The infinitive repeats the same root נגשׁ for emphasis. Rendering it again as 'come near' preserves the repetition and legal force of the prohibition.
- source_word: עַל כָּל קָדָשַׁי
  chosen: any of my holy things
  alternatives:
  - any of my sacred things
  - anything holy belonging to me
  lexicon: HALOT
  rationale: קָדָשַׁי is a plural substantive, 'my holy things,' referring to consecrated items/offerings or sacred matters. 'Any of my holy things' fits the distributive force of כָּל in context.
- source_word: אֶל קָדְשֵׁי הַקְּדָשִׁים
  chosen: to the most holy things
  alternatives:
  - to the holy of holies
  - to the holiest things
  lexicon: HALOT
  rationale: The phrase can denote either the superlative category 'most holy things' or, in some contexts, the sanctuary area 'Holy of Holies.' Here, because it follows 'any of my holy things,' the object sense is more likely than a spatial reference, so 'the most holy things' best preserves the likely meaning.
- source_word: וְנָשְׂאוּ
  chosen: they shall bear
  alternatives:
  - they shall carry
  - they shall bear the consequences of
  lexicon: HALOT
  rationale: נשא with guilt/shame language often means to bear or carry the burden/consequence. 'Bear' is the standard concise rendering and leaves the precise nuance intact.
- source_word: כְּלִמָּתָם
  chosen: their shame
  alternatives:
  - their disgrace
  - their humiliation
  lexicon: HALOT
  rationale: כלמה denotes shame/disgrace. 'Shame' is the most direct and idiomatic rendering in a judgment context.
- source_word: וְתוֹעֲבוֹתָם
  chosen: their abominations
  alternatives:
  - their detestable acts
  - their abhorrent deeds
  lexicon: HALOT
  rationale: תועבות is a strong covenantal-moral term often rendered 'abominations.' Retaining that term preserves the severity of the accusation and its resonance in prophetic literature.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they have done
  alternatives:
  - which they committed
  - that they did
  lexicon: HALOT
  rationale: The relative clause identifies the shame and abominations as arising from their past actions. Present perfect English ('have done') naturally conveys completed acts with present consequence.
