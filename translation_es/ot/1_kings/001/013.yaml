  to: 'Ve, entra al rey David y dile: «Mi señor el rey, ¿no juraste a tu sierva[a], diciendo: “Salomón, tu hijo, reinará después de mí y se sentará en mi trono”? ¿Por qué entonces Adonías se ha hecho rey?»'
  rationale: Se corrige la cláusula final para reflejar mejor el sentido de acceso consumado a la realeza en מָלַךְ אֲדֹנִיָהוּ. También se suaviza levemente la preposición de movimiento hacia el rey. Se conserva la nota sobre «sierva/esclava» por el matiz femenino explícito del hebreo.
