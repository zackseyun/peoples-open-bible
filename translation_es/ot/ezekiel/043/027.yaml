revisions:
- from: Cuando los días se hayan cumplido[a], entonces, desde el octavo día en adelante, los sacerdotes harán sobre el altar sus holocaustos y sus ofrendas de paz, y yo los aceptaré, declara el Señor Yahvé.
  to: Cuando los días se hayan cumplido, entonces, desde el octavo día en adelante, los sacerdotes ofrecerán sobre el altar sus holocaustos y sus ofrendas de paz[a], y yo los aceptaré, declara el Señor Yahvé.
  rationale: Se corrige la ubicación de la nota para que corresponda a שַׁלְמֵיכֶם, y se cambia 'harán' por 'ofrecerán' para reflejar con más claridad el valor sacrificial de יַעֲשׂוּ en español natural y fiel. Se mantiene 'Señor Yahvé' conforme a la política del proyecto sobre el nombre divino.
  reviewer_model: gpt-5.4
