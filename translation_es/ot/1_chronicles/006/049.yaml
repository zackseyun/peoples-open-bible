translation:
  language: es
  text: Y los hijos de Israel dieron a los levitas las ciudades y sus pastizales[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «sus tierras comunes» o «sus terrenos circundantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - otorgaron
  lexicon: HALOT
  rationale: El qal wayyiqtol de נתן expresa la acción simple de dar. En español, «dieron» conserva la naturalidad narrativa y la misma fuerza básica que el inglés POB «gave».
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva de forma literal la expresión filial del hebreo. «Los israelitas» es idiomático, pero atenúa la forma marcada del original; «hijos de Israel» mantiene el paralelismo y la precisión formal.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: La forma dativa se expresa naturalmente con «a». «Levitas» es el equivalente directo y técnico del grupo tribal.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las villas
  lexicon: HALOT
  rationale: עָרִים puede referirse a ciudades o poblados; en este contexto legal de asignación levítica, «ciudades» preserva la terminología establecida por el pasaje y por el uso bíblico tradicional.
- source_word: מִגְרְשֵׁיהֶם
  english_pob_choice: their pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - sus terrenos circundantes
  lexicon: HALOT
  rationale: מִגְרָשׁ denota el terreno abierto asociado con la ciudad, a menudo como área de pasto o espacio adyacente. «Pastizales» comunica bien la función concreta del terreno sin perder la relación espacial con la ciudad.
theological_decisions:
- issue: Forma literal «hijos de Israel» frente a la adaptación idiomática «israelitas»
  english_pob_reading: The English POB preserves 'the sons of Israel' rather than smoothing to 'the Israelites.'
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: 'No hay conflicto doctrinal, pero sí una decisión de fidelidad formal: el español puede reproducir la construcción literal sin resultar ininteligible. Se mantiene así el marcado hebreo que el POB quiso conservar.'
  doctrine_reference: Precisión formal del texto; no doctrinal
- issue: מִגְרָשׁ y el alcance del terreno asignado a los levitas
  english_pob_reading: their pasturelands / 'their common lands' / 'their surrounding lands'
  chosen_spanish_reading: sus pastizales
  alternative_spanish_readings:
  - sus tierras comunes
  - sus terrenos circundantes
  rationale: El término hebreo admite varias posibilidades semánticas. «Pastizales» sigue la solución de la POB inglesa y hace explícita la función del terreno sin borrar la ambigüedad de base; las alternativas se preservan para transparentar el rango léxico.
  doctrine_reference: Términos de heredad levítica en la Ley y Crónicas
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y se verificó que la auditoría inglesa no requería revisiones; el español conserva la misma estructura y las mismas decisiones léxicas relevantes, sin añadir interpretación no sustentada.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino fuera del versículo porque no aparece en el hebreo.
  - «Levitas» se conserva como término tribal técnico.
  - «Ciudades» y «pastizales» reflejan la distribución territorial del contexto levítico sin expandir el sentido del pasaje.
