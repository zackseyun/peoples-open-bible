translation:
  language: es
  text: Pero todos ustedes[a], vuelvan ahora y vengan; no encontraré entre ustedes a un sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vuelvan ahora y vengan». El hebreo presenta un llamado enérgico; en contexto, Job desafía a sus amigos a replantear su argumento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: Marca un giro adversativo fuerte. «Pero» conserva el contraste con naturalidad en español y evita un tono demasiado literario o pesado.
- source_word: כֻּלָּם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos ellos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: Las formas verbales en 2mp muestran que Job se dirige directamente a sus interlocutores; «todos ustedes» lo expresa de forma directa y natural.
- source_word: תָּשֻׁבוּ
  english_pob_choice: come back
  chosen_spanish: vuelvan
  alternatives_spanish:
  - retornen
  - regresen
  - vuelvan otra vez
  lexicon: HALOT
  rationale: El hebreo tiene fuerza de exhortación/desafío en contexto. «Vuelvan» conserva el valor de regresar/reanudar el intento sin forzar una frase idiomática excesiva.
- source_word: וּבֹאוּ נָא
  english_pob_choice: and come
  chosen_spanish: y vengan
  alternatives_spanish:
  - y vengan ahora
  - y vengan, por favor
  - y vengan otra vez
  lexicon: HALOT
  rationale: El verbo repetido intensifica la súplica/convocatoria. «Y vengan» reproduce la duplicación verbal en español sin añadir matices ausentes en el hebreo.
- source_word: וְלֹא אֶמְצָא
  english_pob_choice: I will not find
  chosen_spanish: no encontraré
  alternatives_spanish:
  - no hallaré
  - no encontraría
  - no voy a encontrar
  lexicon: HALOT
  rationale: El imperfecto funciona con matiz prospectivo/resultativo tras la invitación. «No encontraré» mantiene ese sentido futuro sin sobrecargar la frase.
- source_word: בָכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - con ustedes
  lexicon: HALOT
  rationale: Aquí la preposición indica ubicación dentro del grupo de destinatarios. «Entre ustedes» es el equivalente español más idiomático y preciso.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: a un sabio
  alternatives_spanish:
  - a una persona sabia
  - a alguien sabio
  - a un hombre sabio
  lexicon: HALOT
  rationale: El sustantivo-adjetivo hebreo es masculino singular y funciona de modo sustantivo. «A un sabio» conserva la concisión y el valor lexical sin introducir una expansión innecesaria.
theological_decisions:
- issue: Tono de desafío retórico
  english_pob_reading: the Hebrew is a forceful summons, likely challenging Job's friends to try their arguments again
  chosen_spanish_reading: 'la línea se entiende como un desafío exhortativo: Job llama a sus interlocutores a volver y presentar de nuevo su caso'
  alternative_spanish_readings:
  - una simple invitación a regresar
  - una orden neutral de venir
  rationale: El contexto discursivo favorece una lectura polémica y retadora. La traducción española conserva ese empuje sin convertirlo en una paráfrasis interpretativa excesiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
- issue: Rendición de חָכָם en singular masculino
  english_pob_reading: a wise man
  chosen_spanish_reading: a un sabio
  alternative_spanish_readings:
  - a una persona sabia
  - a alguien sabio
  rationale: La forma hebrea es masculina singular y el destinatario inmediato son los amigos varones de Job. Se preserva la concordancia y el detalle gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al conservar el doble imperativo («vuelvan ... y vengan») sin introducir expresiones idiomáticas como «vamos» o «vengan ahora» que suavicen o desplacen la fuerza del hebreo. También evita convertir el singular sustantivado חָכָם en una paráfrasis más larga.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - «sabio» se dejó en masculino singular porque el hebreo es חָכָם y el discurso apunta a los amigos varones de Job.
  - Se mantuvo la secuencia de imperativos breves para reflejar el paralelismo y la energía retórica del hebreo.
