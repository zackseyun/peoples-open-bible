translation:
  language: es
  text: Pero el rey, agobiado en su espíritu, avanzaba, con intención[a] de infligir a los judíos las peores cosas que habían sucedido en tiempos de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con intención de traer sobre los judíos las peores cosas que habían sucedido en tiempos de su padre». El participio griego permite un matiz de expectativa o propósito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φρονήμασιν
  english_pob_choice: weighed down in spirit
  chosen_spanish: oprimido en su espíritu
  alternatives_spanish:
  - cargado en su espíritu
  - abatido en su espíritu
  - pesado en su ánimo
  lexicon: LSJ
  rationale: La forma dativa plural con βεβαρημένος expresa la esfera interior en que el rey está cargado. 'En su espíritu' conserva esa interioridad sin reducirla a mera psicología; 'oprimido' reproduce bien la idea de peso que sigue en el griego.
- source_word: βεβαρημένος
  english_pob_choice: weighed down
  chosen_spanish: oprimido
  alternatives_spanish:
  - cargado
  - agobiado
  - pesado
  lexicon: LSJ
  rationale: El participio perfecto indica un estado ya establecido de carga. 'Oprimido' comunica ese peso persistente en español y mantiene la metáfora sin volverla explicativa.
- source_word: ἦρχετο
  english_pob_choice: advanced
  chosen_spanish: avanzaba
  alternatives_spanish:
  - se acercaba
  - venía
  - marchaba
  lexicon: LSJ
  rationale: En contexto de movimiento militar, el imperfecto describe una acción en curso. 'Avanzaba' conserva el matiz de progresión y funciona de modo natural en español.
- source_word: τὰ χείριστα
  english_pob_choice: the worst things
  chosen_spanish: las peores cosas
  alternatives_spanish:
  - lo peor
  - las peores
  - las cosas más terribles
  lexicon: LSJ
  rationale: El neutro plural superlativo es sustantivado. 'Las peores cosas' explicita el objeto implícito sin precisar indebidamente su forma exacta.
- source_word: τῶν ἐπὶ τοῦ πατρὸς αὐτοῦ γεγονότων
  english_pob_choice: that had happened under his father
  chosen_spanish: que habían sucedido bajo su padre
  alternatives_spanish:
  - que habían ocurrido en tiempos de su padre
  - que habían sucedido durante el reinado de su padre
  lexicon: LSJ
  rationale: ἐπὶ con genitivo aquí señala tiempo o régimen. 'Bajo su padre' preserva la referencia al período paterno de gobierno, y 'habían sucedido' refleja bien γεγονότων.
- source_word: ἐνδεξόμενος
  english_pob_choice: intending to inflict
  chosen_spanish: con intención de infligir
  alternatives_spanish:
  - planeando causar
  - dispuesto a imponer
  - esperando traer
  lexicon: LSJ
  rationale: En este contexto hostil con el dativo τοῖς Ἰουδαίοις, el participio expresa propósito volitivo. 'Con intención de infligir' mantiene la fuerza adversativa y el tono de amenaza del griego.
translation_notes:
  revision_awareness: 'Se ajustó la redacción para evitar una nota sin anclaje: la nota [a] ahora aparece exactamente en ''avanzaba[a]''. La solución conserva la lectura principal y deja visible la alternativa del participio ἐνδεξόμενος.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' sin uso en este versículo porque no aparece el tetragrámaton.
  - Se prefirió 'judíos' en minúscula como designación étnico-histórica contextual, coherente con el griego y la edición inglesa.
  - 'La estructura española conserva la progresión del griego: estado interior del rey + movimiento en curso + propósito hostil.'
