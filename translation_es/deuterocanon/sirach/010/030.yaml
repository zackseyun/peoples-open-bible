translation:
  language: es
  text: Hay un hombre pobre[a] que es honrado por causa de su discernimiento, y hay uno que es honrado por causa de su riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Pero el que es honrado en la pobreza, ¿cuánto más en la riqueza? Y el que no tiene honor en la riqueza, ¿cuánto más en la pobreza?». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּל
  english_pob_choice: poor man
  chosen_spanish: pobre
  alternatives_spanish:
  - hombre pobre
  - persona pobre
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo singular para una persona empobrecida o débil. En español, «pobre» funciona naturalmente como sustantivo/adjetivo sin forzar el género ni añadir un sustantivo inexistente en la línea.
- source_word: נִכְבָּד
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - estimado
  - tenido en honor
  - glorificado
  lexicon: HALOT
  rationale: El sentido pasivo/nifal de כבד aquí apunta a ser tratado con honor o estima. «Honrado» conserva la relación social de prestigio sin sobreelevarlo a «glorificado».
- source_word: בִּגְלַל
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por razón de
  lexicon: HALOT
  rationale: La preposición marca causalidad o base. «Por causa de» es claro en español y mantiene el matiz explicativo de ambas cláusulas.
- source_word: שִׂכְלוֹ
  english_pob_choice: his insight
  chosen_spanish: su discernimiento
  alternatives_spanish:
  - su prudencia
  - su entendimiento
  - su sabiduría
  lexicon: HALOT
  rationale: שכל puede abarcar entendimiento, prudencia o buen juicio. «Discernimiento» capta bien la capacidad de juzgar con acierto y evita cargar el verso con el término más amplio «sabiduría».
- source_word: עָשְׁרוֹ
  english_pob_choice: his wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus riquezas
  - su prosperidad
  lexicon: HALOT
  rationale: El sustantivo señala posesión material. «Riqueza» es el equivalente más directo y mantiene el contraste social con la pobreza.
- source_word: יֵשׁ ... וְיֵשׁ
  english_pob_choice: There is ... and there is ...
  chosen_spanish: Hay ... y hay ...
  alternatives_spanish:
  - Existe ... y existe ...
  - Hay ... y hay uno ...
  lexicon: HALOT
  rationale: La construcción existencial hebrea introduce dos casos paralelos. «Hay ... y hay ...» conserva la forma aforística y la simetría del paralelismo.
theological_decisions:
- issue: Diferencia sustancial entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'La línea principal sigue el hebreo: un pobre honrado por su discernimiento y otro honrado por su riqueza; el paralelo griego ofrece una comparación retórica distinta sobre pobreza y riqueza.'
  chosen_spanish_reading: La traducción principal sigue el hebreo conservado, y la nota preserva el testimonio griego divergente.
  alternative_spanish_readings:
  - Un honrado en la pobreza —¿cuánto más en la riqueza?— y uno sin honor en la riqueza —¿cuánto más en la pobreza?—
  rationale: Sirácides presenta una diferencia textual marcada. Como el hebreo está disponible y la validación señala un desajuste mayor, la línea principal debe seguir ese testimonio, mientras la nota conserva honestamente la forma alternativa del griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como testimonio real y mantener la incertidumbre de forma transparente.'
translation_notes:
  revision_awareness: La versión española sigue la línea hebrea conservada, en consonancia con el control de fuente y con la evaluación de alta concordancia. Se preserva en nota la divergencia importante del paralelo griego, sin intentar armonizarla artificialmente.
  spanish_consistency_notes:
  - Se mantiene «honrado» para נִכְבָּד y «riqueza» para עָשְׁרוֹ, evitando introducir terminología eclesiástica ajena al texto.
  - «Discernimiento» se usa para שִׂכְלוֹ como equivalente idiomático de la capacidad de juicio; no se fuerza «sabiduría» porque ampliaría el alcance semántico.
  - El paralelismo repetitivo «Hay ... y hay ...» reproduce la estructura sentenciosa del hebreo sin volverlo demasiado literal o rígido.
