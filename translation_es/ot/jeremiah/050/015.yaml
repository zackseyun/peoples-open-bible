translation:
  language: es
  text: ¡Levanten un grito contra ella por todos lados! Ha entregado su mano[a]; han caído sus cimientos, sus muros han sido derribados. Porque esta es la venganza de Yahvé; tomen venganza de ella; hagan con ella como ella hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «se ha rendido». Literalmente: «ha entregado su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִיעוּ
  english_pob_choice: Raise a shout
  chosen_spanish: ¡Alzad un grito!
  alternatives_spanish:
  - Gritad
  - Levantad un clamor
  - Dad un grito de guerra
  lexicon: HALOT
  rationale: El imperativo en contexto de asedio expresa un grito hostil o de combate. «Alzad un grito» conserva la fuerza imperativa y el matiz bélico sin precisar más de lo que el hebreo exige.
- source_word: עָלֶיהָ סָבִיב
  english_pob_choice: against her all around
  chosen_spanish: contra ella en derredor
  alternatives_spanish:
  - contra ella por todas partes
  - a su alrededor
  lexicon: HALOT
  rationale: «Contra ella» refleja el valor hostil de עַל en este contexto, y «en derredor» conserva la idea de cerco del asedio.
- source_word: נָתְנָה יָדָהּ
  english_pob_choice: she has given her hand
  chosen_spanish: Ha entregado su mano
  alternatives_spanish:
  - Se ha rendido
  - Ha dado su mano
  - Ha extendido su mano
  lexicon: HALOT
  rationale: Se mantiene la expresión literal para respetar la imagen hebrea y la tensión idiomática documentada. «Ha entregado su mano» suena natural en español y deja abierta la lectura idiomática de rendición.
- source_word: אשויתיה
  english_pob_choice: her foundations
  chosen_spanish: sus fundamentos
  alternatives_spanish:
  - sus cimientos
  - sus bastiones
  - sus soportes
  lexicon: HALOT
  rationale: La evidencia revisada en el POB inglés terminó favoreciendo «foundations». En español, «fundamentos» / «cimientos» son las opciones más transparentes y acordes con la caída de las defensas de la ciudad.
- source_word: נֶהֶרְסוּ
  english_pob_choice: are torn down
  chosen_spanish: han sido derribados
  alternatives_spanish:
  - han sido demolidos
  - han caído
  - están arrasados
  lexicon: HALOT
  rationale: El nifal de הרס comunica ser derribado o demolido. «Han sido derribados» es claro, sobrio y apto para el paralelo con los muros.
- source_word: חוֹמוֹתֶיהָ
  english_pob_choice: her walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus paredes
  - sus murallas
  lexicon: HALOT
  rationale: En castellano bíblico actual, «muros» comunica bien la imagen fortificada sin forzar «murallas», que también sería posible pero algo más específico.
- source_word: נִקְמַת יְהוָה הִיא
  english_pob_choice: For it is the vengeance of Yahweh
  chosen_spanish: Porque es la venganza de Yahvé
  alternatives_spanish:
  - Pues es la venganza de Yahvé
  - Porque pertenece a Yahvé la venganza
  - Porque se trata de la venganza de Yahvé
  lexicon: HALOT
  rationale: Se conserva «Yahvé» conforme a la política terminológica del proyecto. «La venganza de Yahvé» mantiene el genitivo y la solemnidad del enunciado.
- source_word: הִנָּקְמוּ בָהּ
  english_pob_choice: take vengeance on her
  chosen_spanish: vengaos de ella
  alternatives_spanish:
  - tomad venganza de ella
  - haced justicia contra ella
  - ejecutad venganza sobre ella
  lexicon: HALOT
  rationale: El imperativo nifal plural funciona como mandato retributivo. «Vengaos de ella» es idiomático en español y conserva el valor imperativo del hebreo.
- source_word: כַּאֲשֶׁר עָשְׂתָה עֲשׂוּ לָהּ
  english_pob_choice: as she has done, do to her
  chosen_spanish: como ella hizo, hacedle a ella
  alternatives_spanish:
  - como ella ha hecho, hacedle
  - así como ella hizo, haced así con ella
  - según hizo, hacedle
  lexicon: HALOT
  rationale: La fórmula de retribución se mantiene breve y paralela al hebreo. «Hacedle a ella» conserva la reciprocidad, aunque en español resulte algo enfático; evita expandir indebidamente la sentencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino en vez de sustitución por un título.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige preservar el nombre propio revelado a Israel. «Yahvé» evita la máscara litúrgica y mantiene la transparencia textual.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Valor de נָתְנָה יָדָהּ
  english_pob_reading: Retain the literal 'she has given her hand' in the main text, with surrender as a lexical alternative.
  chosen_spanish_reading: 'Mantener la literalidad: «Ha entregado su mano»'
  alternative_spanish_readings:
  - Se ha rendido
  - Ha dado su mano
  rationale: Se conserva la imagen corporal y la ambigüedad idiomática documentada en el hebreo. Esto evita resolver demasiado pronto si la frase es mera rendición o una fórmula de sumisión más concreta.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Interpretación de אשויתיה
  english_pob_reading: Render as 'foundations' in the main text and preserve other plausible structural terms as alternatives.
  chosen_spanish_reading: «sus fundamentos»
  alternative_spanish_readings:
  - sus cimientos
  - sus bastiones
  - sus soportes
  rationale: La revisión del POB inglés concluyó que «foundations» es la opción más exacta. En español, «fundamentos» refleja bien esa decisión y encaja con la caída de la fortificación.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del POB inglés, que corrigió la elección anterior de un término fortificado más específico y prefirió «foundations». La redacción española sigue esa actualización y conserva la literalidad útil en «ha entregado su mano», en línea con el audit trail.
  spanish_consistency_notes:
  - He usado «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - 'He preferido lenguaje sobrio y bíblico moderno: «alzad», «vengaos», «muros», «fundamentos».'
  - La nota al pie se ancla en «Ha entregado su mano» para preservar la alternativa idiomática documentada en el inglés POB.
