translation:
  language: es
  text: 'Y un mensajero vino a Job y dijo: «Los bueyes estaban arando, y las asnas[a] pastaban junto a ellos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «asnas» o «asnas hembras»; el sustantivo es femenino plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְאָךְ
  english_pob_choice: and a messenger
  chosen_spanish: Y un mensajero
  alternatives_spanish:
  - y un ángel
  - y un enviado
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de quien trae el informe del desastre, no de un ser celestial. «Mensajero» conserva el valor amplio de מַלְאָךְ sin imponer una lectura angélica.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El verbo de movimiento encaja bien con «vino» en español bíblico-natural y preserva la acción narrativa de acercarse a Job.
- source_word: אֶל אִיּוֹב
  english_pob_choice: to Job
  chosen_spanish: a Job
  alternatives_spanish:
  - hacia Job
  - hasta Job
  lexicon: HALOT
  rationale: «A Job» reproduce la dirección implícita de אֶל de manera idiomática y clara en español.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo él
  - y le dijo
  lexicon: HALOT
  rationale: La narración avanza con el waw consecutivo; en español basta «y dijo» sin añadir el pronombre explícito.
- source_word: הַבָּקָר
  english_pob_choice: The oxen
  chosen_spanish: Los bueyes
  alternatives_spanish:
  - los toros
  - el ganado
  lexicon: HALOT
  rationale: Aunque בָּקָר puede ser más amplio, el contexto de labranza pide «bueyes» como término más preciso y natural en español.
- source_word: הָיוּ חֹרְשׁוֹת
  english_pob_choice: were plowing
  chosen_spanish: estaban arando
  alternatives_spanish:
  - estaban labrando
  - araban
  lexicon: HALOT
  rationale: La forma expresa acción en curso en el pasado; «estaban arando» conserva ese aspecto progresivo y el campo semántico agrícola.
- source_word: וְהָאֲתֹנוֹת
  english_pob_choice: and the donkeys
  chosen_spanish: y las asnas
  alternatives_spanish:
  - y las burras
  - y los asnos
  lexicon: HALOT
  rationale: אֲתֹנוֹת es femenino plural; «asnas» lo refleja con precisión. La nota conserva la alternativa específica de «asnas hembras»/«asnas» si se desea explicitar el sexo.
- source_word: רֹעֹות
  english_pob_choice: were grazing
  chosen_spanish: pastaban
  alternatives_spanish:
  - estaban paciendo
  - estaban comiendo hierba
  lexicon: HALOT
  rationale: «Pastaban» comunica de forma natural el acto de alimentarse al aire libre y mantiene el aspecto continuo del hebreo.
- source_word: עַל יְדֵיהֶם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - al lado de ellos
  - cerca de ellos
  lexicon: HALOT
  rationale: El hebreo usa una locución espacial idiomática; «junto a ellos» transmite proximidad sin forzar una traducción literal extraña.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el auditable inglés POB: mantiene el reportero como «mensajero», conserva el aspecto progresivo con perífrasis verbal, y resuelve la locución espacial con una expresión natural en español. No se introducen lecturas doctrinales ni se amplía el contenido del versículo.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros pasajes cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usó «asnas» para reflejar el femenino plural de אֲתֹנוֹת, concordando con el referente del hebreo.
  - El orden general sigue el flujo narrativo del original sin añadir sujetos o matices no presentes en la fuente.
