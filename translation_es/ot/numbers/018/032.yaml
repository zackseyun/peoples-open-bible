revisions:
- from: Y no llevarán culpa por ello cuando levanten su mejor parte de ello[a]. No profanarán las cosas santas de los hijos de Israel[b], y no morirán.
  to: Y no cargarán con culpa por ello cuando aparten de ella su mejor parte[a]. No profanarán las cosas santas de los hijos de Israel[b], y no morirán.
  rationale: Se corrigió la persona gramatical para reflejar la segunda persona plural directa del hebreo, manteniendo el tono exhortativo-legal del pasaje. Se ajustó 'levanten' a 'aparten' para expresar de manera más natural en español el acto de separar la porción elevada, sin perder el sentido cultual. Se mantuvieron 'su mejor parte', 'las cosas santas' e 'hijos de Israel' por fidelidad al razonamiento lexical ya documentado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: no incurrir en culpa al apartar la mejor porción, no profanar lo santo, y no morir. También conserva adecuadamente la nota sobre חֶלֶב y la expresión formal ''hijos de Israel''. Sin embargo, hay un problema importante de correspondencia gramatical y de tono legal en español: el hebreo y el inglés POB están en segunda persona plural directa (''ustedes''), pero el borrador mezcla un inicio con ''Y'' y formas futuras de tercera persona plural (''llevarán'', ''levanten'', ''profanarán'', ''morirán''), lo que suena menos fiel y menos natural en este contexto exhortativo.'
  spanish_quality_summary: La redacción es comprensible, pero 'Y no llevarán culpa...' como arranque aislado es algo rígido, y el uso de tercera persona plural reduce claridad. En español bíblico moderno neutral, la segunda persona plural con 'ustedes' implícito ('no cargarán con culpa... cuando aparten... no profanarán... no morirán') conserva mejor el valor exhortativo y la relación directa con los levitas. También 'de ello' puede mantenerse, pero 'de esa porción' o 'de ella' sería más natural; aun así, para no sobreinterpretar, basta una mejora moderada.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías, etc. 'Profanar' está bien para חלל. 'Hijos de Israel' concuerda con la decisión documentada. La nota sobre חלב está bien preservada.
  issues:
  - severity: medium
    issue: Cambio indebido de segunda persona plural a tercera persona plural
    rationale: El hebreo usa formas de segunda persona plural ('ustedes'), y el inglés POB también. En español, 'llevarán/levanten/profanarán/morirán' puede leerse como tercera persona plural narrativa, no como instrucción directa.
  - severity: low
    issue: Inicio con 'Y no' algo torpe en español
    rationale: Aunque el hebreo coordina con waw, en español puede mantenerse 'Y' si fluye, pero aquí combinado con la tercera persona plural hace la línea menos natural. Se puede conservar el enlace y mejorar la sintaxis con formas más directas.
  - severity: low
    issue: '''de ello'' es correcto pero poco idiomático'
    rationale: No es infiel, pero en español corriente suena abstracto. 'de ella' o 'de esa porción' sería más natural. Dado que el antecedente no es completamente transparente en aislamiento, conviene una formulación que siga siendo fiel sin exceso interpretativo.
  revised_spanish_text: Y no cargarán con culpa por ello cuando aparten de ella su mejor parte[a]. No profanarán las cosas santas de los hijos de Israel[b], y no morirán.
  revised_footnotes:
  - marker: a
    text: O ‘su grasa’ o ‘su parte más selecta’. El hebreo חֶלֶב literalmente significa ‘grasa’, pero en contextos de ofrenda suele referirse idiomáticamente a la porción más rica o mejor.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘los hijos de Israel’, una expresión formal y habitual para el pueblo de Israel.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la persona gramatical para reflejar la segunda persona plural directa del hebreo, manteniendo el tono exhortativo-legal del pasaje. Se ajustó 'levanten' a 'aparten' para expresar de manera más natural en español el acto de separar la porción elevada, sin perder el sentido cultual. Se mantuvieron 'su mejor parte', 'las cosas santas' e 'hijos de Israel' por fidelidad al razonamiento lexical ya documentado.
