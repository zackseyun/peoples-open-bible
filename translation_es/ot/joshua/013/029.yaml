translation:
  language: es
  text: 'Y Moisés dio a la media tribu de Manasés, y quedó para la media tribu de los hijos[a] de Manasés, según sus clanes:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Manasés», una expresión de parentesco que se refiere a los descendientes tribales de Manasés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - dio en reparto
  - asignó
  - otorgó
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, נתן expresa la entrega efectiva de una porción. «Dio» conserva la sencillez verbal del hebreo y evita añadir una idea administrativa que el texto no explicita.
- source_word: לַחֲצִי שֵׁבֶט
  english_pob_choice: to the half-tribe
  chosen_spanish: a la media tribu
  alternatives_spanish:
  - a la mitad de la tribu
  - a la media tribu
  lexicon: HALOT
  rationale: חֲצִי indica «mitad» y שֵׁבֶט aquí es «tribu». «Media tribu» es natural en español bíblico y mantiene la estructura compacta del hebreo.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  - Manasseh
  lexicon: N/A (nombre propio)
  rationale: Se usa la forma española establecida para el nombre propio, conservando la referencia tribal y bíblica reconocible en español.
- source_word: וַיְהִי
  english_pob_choice: it was for
  chosen_spanish: fue para
  alternatives_spanish:
  - era para
  - le correspondió
  lexicon: HALOT
  rationale: En fórmulas de distribución, היה no funciona solo como existencia sino como asignación o pertenencia. «Fue para» refleja esa relación sin sobreinterpretar el verbo.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En este contexto administrativo, מַטֵּה es otro término para «tribu». Se conserva la equivalencia contextual sin forzar el sentido literal de «vara».
- source_word: בְנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: de los hijos de Manasés
  alternatives_spanish:
  - de los descendientes de Manasés
  - del pueblo de Manasés
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Manasés». Se mantiene la imagen de parentesco porque el POB inglés la preserva; en contexto designa a los descendientes tribales.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת en listas tribales suele referirse a subdivisiones de la tribu. «Clanes» comunica bien esa unidad social; «según» reproduce el valor distributivo de לְ.
theological_decisions:
- issue: La relación de asignación expresada por וַיְהִי
  english_pob_reading: it was for
  chosen_spanish_reading: fue para
  alternative_spanish_readings:
  - le correspondió
  - era para
  rationale: No se debe convertir el verbo en una explicación más interpretativa de la posesión. «Fue para» mantiene la formulación de reparto, dejando clara la asignación territorial sin borrar la tensión formal del hebreo.
  doctrine_reference: Reparto de la tierra / herencia tribal en Josué
- issue: Binitario/kinship language of 'sons of Manasseh'
  english_pob_reading: the sons of Manasseh, a kinship expression referring to the tribal descendants of Manasseh
  chosen_spanish_reading: los hijos de Manasés, expresión de parentesco que se refiere a los descendientes tribales de Manasés
  alternative_spanish_readings:
  - los descendientes de Manasés
  - la gente de Manasés
  rationale: Se conserva el lenguaje de parentesco porque el hebreo es explícito y el audit trail inglés lo documenta como expresión kinship. En español no se debe reemplazar sin necesidad por una paráfrasis más abstracta.
  doctrine_reference: Identidad tribal y descendencia en la distribución de Canaán
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB que ajustó el sentido de וַיְהִי desde una formulación de pertenencia más explicada a una construcción más directa: «it was for». En español se reflejó con «fue para», manteniendo el tono formal y distributivo. También se preservó la alternancia léxica entre שֵׁבֶט y מַטֵּה como «tribu» en ambos casos, porque el valor contextual es el mismo en esta cláusula de asignación.'
  spanish_consistency_notes:
  - Se usa «Manasés» de forma consistente para el nombre propio.
  - Se usa «tribu» para ambos términos hebreos שֵׁבֶט y מַטֵּה por su valor contextual en reparto territorial.
  - Se conserva «hijos» en el cuerpo principal y se aclara en nota que es una expresión de parentesco.
  - La puntuación con coma y dos puntos sigue la estructura de cláusulas coordinadas del hebreo y del inglés auditado.
