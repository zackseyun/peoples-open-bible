translation:
  language: es
  text: Porque él mandará a sus ángeles acerca de ti[a], para guardarte[b] en todos tus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ti»; la construcción hebrea puede expresar beneficio además de referencia.
    reason: lexical_alternative
  - marker: b
    text: O «cuidarte» o «velar por ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. «Porque» preserva esa fuerza explicativa en español sin añadir matices causales excesivos.
- source_word: מַלְאָכָיו
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: HALOT
  rationale: En este contexto poético, el referente son seres celestiales protectores. «Ángeles» comunica de forma natural el valor contextual que la POB inglesa también adoptó.
- source_word: יְצַוֶּה
  english_pob_choice: will command
  chosen_spanish: mandará
  alternatives_spanish:
  - ordenará
  - dará la orden a
  lexicon: HALOT
  rationale: El pi‘el expresa impartir una orden o encargo. «Mandará» es directo, digno y suficientemente formal en español bíblico actual.
- source_word: לָּךְ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - por ti
  - para ti
  - sobre ti
  lexicon: HALOT
  rationale: La construcción con ל puede expresar referencia o beneficio. «Acerca de ti» conserva la amplitud semántica sin decidir de manera cerrada entre «para» y «sobre».
- source_word: לִשְׁמָרְךָ
  english_pob_choice: to guard you
  chosen_spanish: para guardarte
  alternatives_spanish:
  - para cuidarte
  - para protegerte
  - para mantenerte
  lexicon: HALOT
  rationale: שׁמר denota vigilar, custodiar y proteger. «Guardar» mantiene la imagen verbal bíblica y el matiz de custodia; el infinitivo con pronombre enclítico fluye bien en español.
- source_word: בְּכָל
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - en toda
  - a través de todos
  lexicon: HALOT
  rationale: «En todos» reproduce la extensión comprehensiva del hebreo y se une naturalmente con «tus caminos».
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tus rutas
  lexicon: HALOT
  rationale: «Caminos» preserva la metáfora hebrea y funciona bien en español para abarcar tanto trayectos literales como la conducta o curso de vida.
theological_decisions:
- issue: Referente implícito del sujeto verbal de 3ª masculina singular
  english_pob_reading: The subject is God, who commands his angels to protect the addressee.
  chosen_spanish_reading: El sujeto implícito es Dios, quien manda a sus ángeles proteger al destinatario.
  alternative_spanish_readings:
  - El sujeto implícito es Yahvé, quien manda a sus ángeles proteger al destinatario.
  rationale: El verso continúa la promesa de protección divina del salmo. Aunque el hebreo usa una forma verbal impersonal respecto al sujeto explícito, el contexto señala a Yahvé como quien da la orden.
  doctrine_reference: Salmo 91 en su marco de protección divina; continuidad contextual del sujeto implícito
- issue: Valor de לָּךְ / לִשְׁמָרְךָ
  english_pob_reading: '''concerning you'' / ''to guard you'''
  chosen_spanish_reading: «acerca de ti» y «para guardarte» mantienen la posibilidad de referencia y de beneficio sin borrar la ambigüedad funcional del hebreo.
  alternative_spanish_readings:
  - «para ti»
  - «en favor de ti»
  rationale: La preposición puede expresar tanto referencia como beneficio. La combinación elegida evita estrechar prematuramente el sentido y refleja la lectura auditada de la POB inglesa.
  doctrine_reference: Análisis léxico de preposición + pronombre en hebreo bíblico
translation_notes:
  revision_awareness: 'El pasaje coincide en lo esencial con la última pasada revisada: no hay cambios sustantivos de sentido respecto al contexto auditado. Se conserva la decisión contextual sobre מַלְאָכָיו como «ángeles» y se mantiene la amplitud semántica de לָּךְ con una solución española natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero en este versículo no aparece el nombre divino de forma explícita en el texto hebreo.
  - «Ángeles» se usa de manera coherente con el contexto del Salmo 91 y con la decisión inglesa auditada.
  - «Guardar» conserva el campo semántico de protección/custodia y evita sustituirlo por un equivalente menos preciso.
