translation:
  language: es
  text: Que los pecadores perezcan de delante de Yahvé una vez por todas[a], y que los devotos[b] de Yahvé hereden las promesas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente 'una vez'; el griego puede enfatizar ya sea una sola ocurrencia o la finalidad definitiva.
    reason: lexical_alternative
  - marker: b
    text: O 'los santos de Yahvé' o 'los fieles de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλοιντο
  english_pob_choice: may perish
  chosen_spanish: perezcan
  alternatives_spanish:
  - se pierdan
  - sean destruidos
  lexicon: BDAG
  rationale: El optativo expresa deseo o súplica; en español, el subjuntivo 'perezcan' conserva bien ese matiz volitivo. 'Perezcan' también evita concretar más de lo que el griego exige.
- source_word: οἱ ἁμαρτωλοὶ
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores impíos
  - los malvados
  lexicon: BDAG
  rationale: Con artículo, el griego refiere a un grupo identificable, no solo a una categoría moral abstracta. 'Los pecadores' mantiene esa referencia y resulta natural en español.
- source_word: ἀπὸ προσώπου Κυρίου
  english_pob_choice: from the presence of the Lord
  chosen_spanish: de la presencia de Yahvé
  alternatives_spanish:
  - de delante de Yahvé
  - de la faz de Yahvé
  lexicon: BDAG
  rationale: '''Presencia'' comunica la relación y el juicio implícitos en ''rostro/faz'' sin sonar arcaico en español. Se usa ''Yahvé'' por la convención del proyecto para Κυρίου cuando alude al nombre divino.'
- source_word: ἅπαξ
  english_pob_choice: once for all
  chosen_spanish: una vez por todas
  alternatives_spanish:
  - una vez
  - de una vez para siempre
  lexicon: BDAG
  rationale: La expresión española 'una vez por todas' conserva la fuerza de finalidad total que el inglés POB marcó con 'once for all'.
- source_word: ὅσιοι
  english_pob_choice: the devout
  chosen_spanish: los devotos
  alternatives_spanish:
  - los santos
  - los fieles
  lexicon: BDAG
  rationale: '''Devotos'' reproduce el valor de piedad y lealtad cultual sin importar la carga técnica que ''santos'' podría tener en español eclesial.'
- source_word: κληρονομήσαισαν
  english_pob_choice: may inherit
  chosen_spanish: hereden
  alternatives_spanish:
  - reciban como herencia
  - tomen en herencia
  lexicon: BDAG
  rationale: El optativo expresa deseo; el subjuntivo 'hereden' mantiene el tono de súplica y la imagen patrimonial/covenantal de 'heredar'.
- source_word: ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - las promesas divinas
  - las promesas de Dios
  lexicon: BDAG
  rationale: Aunque el griego es anartro, el contexto de herencia hace natural articularlo en español como conjunto reconocido de promesas. 'Las promesas' preserva la concisión del original.
translation_notes:
  revision_awareness: La versión española corrige el problema previo de marcadores de nota no anclados. Mantiene el paralelismo del griego con dos miembros coordinados, conserva el matiz optativo mediante subjuntivo, y evita suavizar la referencia específica de 'los pecadores' o la terminología del nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la norma del proyecto para Κυρίου.
  - Se conserva la estructura paralela 'Que... y que...' para reflejar el doble optativo.
  - No se añadieron notas al pie porque no había marcadores necesarios ni notas alternativas imprescindibles en esta línea.
