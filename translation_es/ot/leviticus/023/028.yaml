translation:
  language: es
  text: No harán ningún trabajo en este mismo día[a], porque es un Día de Expiación, para hacer expiación por ustedes delante de Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un día de expiaciones». El español suele expresar el nombre de la fiesta como «Día de Expiación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל מְלָאכָה
  english_pob_choice: no work
  chosen_spanish: ningún trabajo
  alternatives_spanish:
  - no trabajo
  - ninguna labor
  - ningún tipo de trabajo
  lexicon: HALOT
  rationale: מְלָאכָה designa trabajo u ocupación laboral, especialmente en prohibiciones festivas. En español, «ningún trabajo» conserva la fuerza legal de la prohibición y suena natural en registro bíblico moderno.
- source_word: תַעֲשׂוּ
  english_pob_choice: you shall do
  chosen_spanish: harán
  alternatives_spanish:
  - no harán
  - no deben hacer
  - no habrán de hacer
  lexicon: HALOT
  rationale: En una instrucción legal, el futuro con negación expresa bien el mandato normativo en español sin caer en una formulación excesivamente arcaica.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en este día mismo
  - en aquel mismo día
  - en el mismo día
  lexicon: HALOT
  rationale: La expresión intensifica la referencia temporal al día exacto. «En este mismo día» reproduce esa fuerza enfática de forma idiomática en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la prohibición. «Porque» comunica de manera directa la relación explicativa.
- source_word: יּוֹם כִּפֻּרִים
  english_pob_choice: a Day of Atonement
  chosen_spanish: un Día de Expiación
  alternatives_spanish:
  - el Día de Expiación
  - un día de expiaciones
  - el Día de las Expiaciones
  lexicon: HALOT
  rationale: El hebreo es literalmente «día de expiaciones», pero en español «Día de Expiación» es la forma breve y clara que mantiene el sentido cultual. Se conserva la mayúscula por tratarse de un nombre festivo.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para expiar
  - para reconciliar
  - para realizar expiación
  lexicon: HALOT
  rationale: El verbo piel de כפר en contexto sacerdotal expresa la acción cultual de expiar/obtener expiación. «Hacer expiación» conserva el término técnico sin sobrecargar el verso con una explicación doctrinal adicional.
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en favor de ustedes
  - por ustedes mismos
  lexicon: HALOT
  rationale: Con כפר, על marca a las personas en cuyo favor se realiza la expiación. «Por ustedes» es natural y transmite el sentido beneficiario.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: La preposición señala la presencia cultual delante de Yahvé. «Delante de» es claro, reverente y fiel al uso bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del texto hebreo. «Yahvé» es la forma establecida en este proyecto para el Tetragrámaton y evita la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, de ustedes
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: En español reverente y moderno, el posesivo de segunda persona plural puede expresarse como «su Dios» cuando el referente es plural y ya está claro por el contexto. Aquí se mantiene la relación de pacto con el sujeto plural implícito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El proyecto POB prefiere transliterarlo como nombre propio, no sustituirlo por «SEÑOR». «Yahvé» preserva esa decisión en español con registro bíblico reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: כִּפֻּרִים / לְכַפֵּר
  english_pob_reading: Day of Atonement / to make atonement
  chosen_spanish_reading: Día de Expiación / hacer expiación
  alternative_spanish_readings:
  - Día de las Expiaciones
  - expiar
  - hacer propiciación
  rationale: El contexto es legislación cultual levítica. «Expiación» mantiene el peso técnico y sacrificial del hebreo sin añadir una teoría doctrinal ajena al pasaje. Se evita suavizarlo con términos más genéricos como «perdón».
  doctrine_reference: 'Translation philosophy: preserve cultic/legal force without importing later doctrinal narrowing'
- issue: Plural hebreo כִּפֻּרִים
  english_pob_reading: Day of Atonement
  chosen_spanish_reading: Día de Expiación
  alternative_spanish_readings:
  - Día de las Expiaciones
  - un día de expiaciones
  rationale: El hebreo tiene una forma plural que puede sugerir «expiaciones». Sin embargo, en español la designación festiva asentada y más legible es singular. La posible pluralidad queda registrada en la nota, sin perder la identificación del festival.
  doctrine_reference: 'Translation philosophy: readable modern Spanish while preserving meaningful lexical tensions'
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés: prohibición de trabajar, intensificación temporal, identificación de la fiesta, finalidad expiatoria y mención explícita del nombre divino. No se registraron revisiones posteriores que alteren la decisión de fondo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el término técnico «expiación» para כפר/כִּפֻּרִים.
  - La nota al pie marca la tensión entre el plural hebreo y la designación festiva singular en español.
  - El posesivo plural se resuelve con «su Dios» por claridad y naturalidad en español reverente.
