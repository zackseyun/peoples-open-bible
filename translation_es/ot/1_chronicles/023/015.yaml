    rationale: El texto fuente tiene גֵּרְשֹׁם (Gershom), no גֵּרְשׁוֹן (Gershon/Gersón). Aunque «Gersón» aparece en tradición española para otro nombre similar, aquí altera la identificación precisa del personaje y contradice la justificación léxica inglesa.
  revised_spanish_text: 'Los hijos de Moisés: Gershom y Eliezer.'
