  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: וַאֲחֵיהֶם como ''sus hermanos'' con nota alternativa adecuada; לְכֹל מִשְׁפְּחוֹת יִשָׂשכָר como alcance por todas las familias; el total numérico es correcto; y הִתְיַחְשָׂם se refleja aceptablemente con lenguaje de registro genealógico. Sin embargo, גִּבּוֹרֵי חֲיָלִים queda algo debilitado en ''hombres valientes'', que pierde la fuerza formular y el matiz de capacidad/mérito militar presentes en la expresión hebrea y preservados por el inglés POB.'
  spanish_quality_summary: El español es claro y natural. La puntuación funciona bien y la frase fluye. Aun así, 'hombres valientes' suena más general que el hebreo; 'hombres de gran valor' o 'valientes guerreros' transmite mejor la expresión sin caer en calco tosco. Además, en una Biblia eclesial amplia, 'deudos' en la nota suena menos transparente que 'parientes' o 'familiares'.
  glossary_alignment: No hay términos del glosario mayor especialmente controvertidos aquí. 'Isacar' es correcto. La principal cuestión léxica es mantener la fuerza de גִּבּוֹרֵי חֲיָלִים; conviene una formulación española más robusta. Las notas están bien planteadas, aunque puede mejorarse la alternativa española de la nota a.
  issues:
  - severity: medium
    issue: La expresión 'hombres valientes' atenúa גִּבּוֹרֵי חֲיָלִים.
    rationale: El hebreo es una fórmula más fuerte que simple valentía; comunica hombres poderosos/probados para la guerra, algo mejor preservado por 'hombres de gran valor' o similar.
  - severity: low
    issue: La nota a usa 'deudos', término menos claro en español general.
    rationale: Aunque válido, 'deudos' es menos común y puede asociarse con contexto funerario; 'familiares' comunica mejor la extensión semántica de 'hermanos' en contexto genealógico.
  revised_spanish_text: Y sus hermanos[a], por todas las familias de Isacar, eran hombres de gran valor, ochenta y siete mil en total[b], inscritos por genealogía.
