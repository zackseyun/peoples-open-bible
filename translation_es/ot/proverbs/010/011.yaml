translation:
  language: es
  text: La boca del justo es un manantial de vida[a], pero la boca de los impíos encubre violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubre violencia». El verbo hebreo puede significar cubrir en sentido literal o figurado; aquí se adopta el sentido figurado de ocultar para mayor claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - manadero
  lexicon: HALOT
  rationale: מְקוֹר denota una fuente o surgencia de agua. En español, «manantial» conserva la imagen de un flujo vivificador y suena natural en el registro sapiencial; «fuente» también sería posible, pero puede sonar más abstracta o más genérica según el contexto.
- source_word: חַיִּים
  english_pob_choice: of life
  chosen_spanish: de vida
  alternatives_spanish:
  - de vidas
  - viviente
  lexicon: HALOT
  rationale: El plural hebreo funciona aquí como singular abstracto. «De vida» reproduce con naturalidad la construcción y preserva la idea de una fuente que da vida.
- source_word: פִּי צַדִּיק
  english_pob_choice: the mouth of the righteous
  chosen_spanish: la boca del justo
  alternatives_spanish:
  - la boca del recto
  - la boca del hombre justo
  - el habla del justo
  lexicon: HALOT
  rationale: פִּי צַדִּיק es literalmente «boca de [el] justo». «Justo» comunica bien la categoría moral y mantiene la imagen concreta de la boca, en vez de abstraerla a «habla».
- source_word: וּפִי רְשָׁעִים
  english_pob_choice: but the mouth of the wicked
  chosen_spanish: pero la boca de los impíos
  alternatives_spanish:
  - y la boca de los impíos
  - pero las bocas de los impíos
  lexicon: HALOT
  rationale: El hebreo coordina con ו, pero en paralelismo proverbial toma fuerza adversativa. «Pero» expresa mejor el contraste. «Impíos» conserva el matiz moral fuerte de רְשָׁעִים sin suavizarlo.
- source_word: יְכַסֶּה
  english_pob_choice: conceals
  chosen_spanish: encubre
  alternatives_spanish:
  - cubre
  - oculta
  lexicon: HALOT
  rationale: 'El verbo puede significar cubrir literalmente o en sentido figurado. Aquí el sentido figurado es claro: la boca de los impíos disimula o tapa la violencia. «Encubre» mantiene la metáfora y la idea de ocultar con un matiz moral apropiado en español.'
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia violenta
  - daño violento
  - opresión
  lexicon: HALOT
  rationale: חָמָס designa violencia, brutalidad o conducta violenta e injusta. «Violencia» es la equivalencia directa y más transparente para el lector.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada del inglés POB y del hebreo, manteniendo el paralelismo proverbial y la metáfora de la boca como manantial o velo de acción moral. No se requieren revisiones respecto del estado auditado más reciente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no aparece ningún tetragrámaton en este versículo.
  - Se conserva la imagen concreta de «boca» frente a una paráfrasis como «habla», para respetar el paralelismo hebreo.
  - «Impíos» se usa para רְשָׁעִים por coherencia con el contraste sapiencial y para no diluir el juicio moral.
  - La nota reproduce la alternativa semántica documentada para יְכַסֶּה sin introducir una nueva ambigüedad.
