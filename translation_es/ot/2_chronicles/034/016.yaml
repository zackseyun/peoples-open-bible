revisions:
- from: 'Entonces Safán trajo el libro al rey y también le trajo de nuevo palabra al rey[a], diciendo: «Todo lo que fue confiado a tus siervos, ellos lo están haciendo».'
  to: 'Entonces Safán trajo el libro al rey y también le informó al rey[a], diciendo: «Todo lo que fue confiado a tus siervos, ellos están haciendo».'
  rationale: Se reemplazó la expresión calcada «le trajo de nuevo palabra al rey» por «le informó al rey» para lograr español natural sin perder el sentido de reportar. Se conservó la literalidad relevante en la nota. Además, se eliminó el objeto directo explícito en la cláusula final para acercarse mejor al hebreo y al expediente inglés, manteniendo la progresividad con «están haciendo».
