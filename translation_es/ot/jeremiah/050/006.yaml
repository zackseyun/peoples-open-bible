review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la imagen pastoral y la mayor parte del sentido hebreo: ''ovejas perdidas'', ''sus pastores'', ''en los montes'', ''olvidaron su lugar de descanso''. Sin embargo, añade ''como'' en ''ha sido como ovejas perdidas'', cuando el hebreo predica directamente ''mi pueblo [ha sido] ovejas perdidas'', no una mera comparación. También ''los hicieron extraviarse'' es menos natural y algo más torpe que una formulación española directa como ''los extraviaron''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero hay dos problemas de calidad. Primero, 'ha sido como ovejas perdidas' debilita la afirmación. Segundo, la nota [a] contiene un error grave de legibilidad ('la קשה dificultad del hebreo'), mezclando español y hebreo de forma accidental. Además, 'de monte en collado' suena bíblico-tradicional y es aceptable, pero 'de monte a colina' resulta más transparente para lectura amplia; aun así, puede mantenerse si se prefiere el registro bíblico. Conviene también simplificar 'los hicieron extraviarse' a 'los extraviaron'.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: no aparecen conflictos con Yahvé/Mesías/etc.; ''ovejas'', ''pastores'', ''lugar de descanso'' y el tratamiento implícito de שובבים respetan la documentación inglesa. La solución para שובבים como ''apartándolos'' es defendible y coincide con la revisión auditada. La nota alternativa debe conservar la opción más formal sobre los montes, pero corregida en español natural.'
  issues:
  - severity: medium
    issue: Se añadió 'como' en 'Mi pueblo ha sido como ovejas perdidas'
    rationale: El hebreo presenta una predicación directa, no una comparación explícita. 'Mi pueblo ha sido ovejas perdidas' preserva mejor la fuerza de la acusación profética.
  - severity: medium
    issue: '''los hicieron extraviarse'' es poco natural en español'
    rationale: Aunque refleja el causativo, en español bíblico-natural 'los extraviaron' comunica la misma culpabilidad con mayor fluidez y sin pérdida semántica.
  - severity: high
    issue: 'La nota [a] contiene texto corrupto: ''la קשה dificultad del hebreo'''
    rationale: Es un fallo visible de edición que mezcla idiomas y perjudica seriamente la legibilidad y la calidad del aparato crítico.
  revised_spanish_text: Mi pueblo ha sido ovejas perdidas[a]; sus pastores los extraviaron, apartándolos en los montes. De monte en collado[b] anduvieron; olvidaron su lugar de descanso.
  revised_footnotes:
