translation:
  language: es
  text: Porque un enemigo ha perseguido mi alma[a]; ha aplastado por tierra mi vida; me ha hecho habitar en lugares oscuros[b], como los muertos de antaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha perseguido»; hebreo «mi alma» es una manera poética común de referirse a la persona misma. Se conserva «mi alma» para mantener la distinción con «mi vida» en la línea siguiente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como los muertos de antiguo». La expresión hebrea subraya a los muertos de hace mucho tiempo, no necesariamente una idea de muerte eterna.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la causa o razón del lamento en un español natural. «Porque» conserva el valor causal sin sonar forzado en el flujo poético.
- source_word: רָדַף
  english_pob_choice: has pursued
  chosen_spanish: ha perseguido
  alternatives_spanish:
  - persiguió
  - ha acosado
  - ha seguido persiguiendo
  lexicon: HALOT
  rationale: El verbo expresa persecución hostil. El perfecto compuesto mantiene la acción pasada con relevancia presente, como en el inglés auditado.
- source_word: אוֹיֵב
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - el enemigo
  - un adversario
  - un fiero enemigo
  lexicon: HALOT
  rationale: El hebreo no lleva artículo; «un enemigo» refleja mejor la forma indefinida, aunque el contexto pueda hacerlo genérico.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - a mí
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: «Alma» preserva el paralelismo poético y la expresión hebrea, sin borrar la tensión entre la persona completa y la parte interior. En castellano bíblico conserva dignidad y claridad.
- source_word: דִּכָּא
  english_pob_choice: has crushed
  chosen_spanish: ha aplastado
  alternatives_spanish:
  - ha quebrantado
  - ha triturado
  - ha derribado
  lexicon: HALOT
  rationale: El verbo transmite destrucción o aplastamiento violento. «Aplastado» comunica bien la imagen física y el peso del sufrimiento.
- source_word: לָאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - al suelo
  - contra el polvo
  lexicon: HALOT
  rationale: En español, «hasta el suelo» reproduce la idea de ser abatido completamente, con una imagen natural y clara, sin perder el descenso al nivel más bajo.
- source_word: חַיָּתִי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi existencia
  - mi aliento
  - mi ser
  lexicon: HALOT
  rationale: Aquí el término se refiere a la vida del salmista. «Mi vida» es la opción más transparente y distingue este término de נֶפֶשׁ en la línea anterior.
- source_word: הוֹשִׁיבַנִי
  english_pob_choice: he has made me dwell
  chosen_spanish: me ha hecho habitar
  alternatives_spanish:
  - me ha hecho morar
  - me ha sentado
  - me ha puesto a vivir
  lexicon: HALOT
  rationale: La forma causativa pide una construcción causativa en español. «Me ha hecho habitar» conserva el matiz de ser colocado forzosamente en una situación o lugar.
- source_word: בְּמַחֲשַׁכִּים
  english_pob_choice: in dark places
  chosen_spanish: en lugares oscuros
  alternatives_spanish:
  - en tinieblas
  - en las sombras
  - en oscuros lugares
  lexicon: HALOT
  rationale: El plural sugiere ámbitos o lugares de oscuridad, no solo abstracción. «Lugares oscuros» preserva el plural y suena natural en español.
- source_word: כְּמֵתֵי עוֹלָם
  english_pob_choice: like those long dead
  chosen_spanish: como los muertos de antaño
  alternatives_spanish:
  - como los muertos de antiguo
  - como los de antaño ya muertos
  - como los muertos de hace mucho
  lexicon: HALOT
  rationale: La frase alude a muertos de larga data, de tiempos pasados. «De antaño» expresa la distancia temporal sin introducir la noción de eternidad absoluta.
translation_notes:
  revision_awareness: 'Se siguió de cerca el despiece hebreo y el audit trail inglés: se mantuvo la distinción entre נֶפֶשׁ y חַיָּה, el causativo de הוֹשִׁיבַנִי y el valor temporal de עוֹלָם en la comparación final. No se introdujeron notas doctrinales porque el verso es principalmente poético y léxico.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefirió «alma» para נֶפֶשׁ y «vida» para חַיָּה, manteniendo una distinción consistente con el análisis hebreo.
  - «Lugares oscuros» conserva el plural de מַחֲשַׁכִּים, evitando reducirlo a una abstracción.
  - El tono general es solemne y bíblico, pero con sintaxis española natural y publicable.
