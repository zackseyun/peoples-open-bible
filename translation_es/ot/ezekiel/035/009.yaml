translation:
  language: es
  text: Te haré una desolación perpetua[a], y tus ciudades no serán habitadas; entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ruina perpetua» o «desolaciones perpetuas». El hebreo usa un sustantivo plural para la devastación, probablemente para intensificar el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְמֹת
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - desolaciones
  - ruina
  - desierto
  lexicon: HALOT
  rationale: El hebreo usa un plural que intensifica el estado de devastación. En español, el singular abstracto «desolación» comunica mejor el efecto global que un plural menos natural, manteniendo la fuerza del juicio.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: perpetua
  alternatives_spanish:
  - eterna
  - perdurable
  - para siempre
  lexicon: HALOT
  rationale: En este contexto judicial, el término expresa duración indefinida. «Perpetua» conserva ese valor y suena natural en español bíblico sin suavizar la gravedad del texto.
- source_word: אֶתֶּנְךָ
  english_pob_choice: I will make you
  chosen_spanish: te haré
  alternatives_spanish:
  - te pondré como
  - te daré como
  lexicon: HALOT
  rationale: Aunque el verbo base es «dar/poner», en esta construcción con predicado nominal significa establecer a alguien en un estado. «Te haré» transmite de forma clara y fiel esa función idiomática.
- source_word: וְעָרֶיךָ
  english_pob_choice: and your cities
  chosen_spanish: y tus ciudades
  alternatives_spanish:
  - y tus poblados
  - y tus villas
  lexicon: HALOT
  rationale: «Ciudades» es la equivalencia directa y suficientemente amplia para עִיר. No hace falta atenuarlo con un término menor.
- source_word: לֹא תישבנה
  english_pob_choice: will not be inhabited
  chosen_spanish: no serán habitadas
  alternatives_spanish:
  - no se habitarán
  - no estarán pobladas
  - no serán ocupadas
  lexicon: HALOT
  rationale: 'El sentido natural con sujeto inanimado es pasivo: las ciudades no tendrán habitantes. «Serán habitadas» preserva bien el valor léxico y la fluidez del español.'
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: entonces sabrás
  alternatives_spanish:
  - y sabrás
  - así sabrás
  - luego sabrás
  lexicon: HALOT
  rationale: El inglés POB refleja una consecuencia del juicio con «then». En español, «entonces» conserva ese matiz. Se usa la segunda persona singular porque el hebreo aquí se dirige al destinatario singular de la frase anterior, aunque la forma verbal del final sea plural en la transmisión masorética; la línea sigue el flujo del castigo dirigido a Edom como entidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma principal en español para preservar el nombre personal de Dios sin sustituirlo por un título.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea explícitamente el nombre propio divino. Se conserva en español como «Yahvé» para reflejar la decisión doctrinal del proyecto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB revisado mantiene una sola nota léxica sobre el plural hebreo de «desolación» y conserva «Yahweh» para el nombre divino. La propuesta española sigue esa lectura, trasladando la nota al español con una formulación natural y manteniendo la intensidad del plural hebreo sin sobretraducirlo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יְהוָה conforme al criterio del proyecto.
  - Se mantiene la cadencia profética breve y directa.
  - La nota al pie conserva la alternativa plural para reflejar la tensión léxica del hebreo.
  - La segunda persona final se ajusta al destinatario singular inmediato del oráculo, sin alterar el sentido global del juicio colectivo.
