review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro auditado en inglés: conserva la distinción material entre barro y madera, representa adecuadamente el término técnico הַזָּב, y mantiene la fuerza legal de los pasivos. Sin embargo, hay dos detalles mejorables: el relativo con subjuntivo ''que toque'' suena menos natural que el presente descriptivo ''que toque''/''toca'' en este marco legal, y sobre todo la nota [c] no refleja bien la alternativa inglesa ''shall be washed in water'', pues ''lavado con agua'' cambia la preposición relevante. También conviene suavizar ''descarga'' a ''flujo'' en el texto principal por mayor naturalidad bíblica en español, manteniendo la nota técnica.'
  spanish_quality_summary: El español es claro y digno, pero 'el que tiene la descarga' suena algo rígido y poco idiomático en registro bíblico; 'el que tiene flujo' o 'el que padece flujo' lee mejor sin perder tecnicidad contextual. 'Recipiente de barro' es aceptable, aunque 'vasija de barro' suena más bíblico; no obstante, no es necesario forzar el cambio. La corrección principal necesaria es la nota [c], y una mejora de naturalidad en la frase del sujeto técnico.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparecen Yahvé/Mesías/etc. La decisión sobre הַזָּב debe seguir siendo descriptiva y técnica; en español, 'flujo' alinea mejor con el uso eclesial y de leyes de pureza que 'descarga', sin añadir interpretación teológica.
  issues:
  - severity: medium
    issue: La nota [c] no preserva fielmente la alternativa inglesa/documentada.
    rationale: El inglés conserva la alternativa 'shall be washed in water'. El borrador la reduce a 'lavado con agua', que no refleja bien la preposición ni el matiz alternativo auditado. Debe decir 'lavado en agua' o equivalente fiel.
  - severity: medium
    issue: '''El que tiene la descarga'' es poco natural en español bíblico/eclesial.'
    rationale: Aunque semánticamente posible, 'descarga' suena más clínico/moderno. 'Flujo' comunica mejor el tecnicismo ritual en español y mantiene la neutralidad descriptiva del hebreo.
  - severity: low
    issue: La nota [a] mezcla alternativas válidas, pero la redacción puede pulirse.
    rationale: '''También:'' con comillas internas y comillas envolventes resulta tipográficamente torpe. Conviene una formulación directa y limpia.'
  revised_spanish_text: Y una vasija de barro[a] que toque el que tiene flujo[b] será quebrada, y toda vasija de madera será enjuagada[c] con agua.
