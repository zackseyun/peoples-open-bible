translation:
  language: es
  text: Le darás las primicias de tu grano[a], de tu vino nuevo y de tu aceite[b], y la primera lana[c] de tu rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la primera porción de tu grano, tu vino y tu aceite».'
    reason: lexical_alternative
  - marker: b
    text: «Vino nuevo» traduce un término hebreo que suele emplearse para vino recién producido.
    reason: cultural_note
  - marker: c
    text: 'O: «el primer esquileo de tu rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primera parte
  - la primera porción
  - lo primero
  lexicon: HALOT
  rationale: רֵאשִׁית expresa la primera porción o lo primero de una producción. En un contexto de ofrenda, 'primicias' comunica con naturalidad la idea cultual de la primera parte dedicada, sin perder el sentido de prioridad del hebreo.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - grano cereal
  - trigo
  lexicon: HALOT
  rationale: דָּגָן es un término amplio para el producto cereal. 'Grano' es natural en español moderno y conserva la amplitud semántica sin restringirlo a una especie concreta.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino joven
  - mosto
  - vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ se refiere al vino recién producido o al producto nuevo de la vendimia. 'Vino nuevo' mantiene esa distinción léxica y es comprensible en español eclesiástico contemporáneo.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite fresco
  lexicon: HALOT
  rationale: יִצְהָר designa aceite fresco, normalmente de oliva en el marco israelita. 'Aceite' respeta la forma breve del hebreo; 'aceite de oliva' sería más explícito pero añade precisión no expresada aquí.
- source_word: גֵּז
  english_pob_choice: the fleece
  chosen_spanish: la primera lana
  alternatives_spanish:
  - el primer esquileo
  - el vellón
  - la primera esquila
  lexicon: HALOT
  rationale: גֵּז puede referirse al vellón ya esquilado o al producto del esquileo. Dado que el pasaje habla del primer producto dado al sacerdote, 'la primera lana' comunica bien la concreción del don en español, sin depender de un término técnico poco transparente.
- source_word: צֹאן
  english_pob_choice: your flock
  chosen_spanish: tu rebaño
  alternatives_spanish:
  - tu ganado menor
  - tus ovejas
  - tu grey
  lexicon: HALOT
  rationale: צֹאן se usa colectivamente para ganado menor, especialmente ovejas y cabras. 'Rebaño' funciona como equivalente colectivo natural en español y preserva el carácter posesivo del hebreo.
- source_word: תִּתֶּן לוֹ
  english_pob_choice: You shall give him
  chosen_spanish: Darás a él
  alternatives_spanish:
  - Le darás
  - Deberás darle
  - Darás a él
  lexicon: HALOT
  rationale: La forma verbal hebrea es una instrucción legal. 'Darás a él' conserva el mandato con un tono bíblico sobrio; aunque 'le darás' es más idiomático, se prefirió evitar añadir un clítico que pudiera suavizar la correspondencia visible con el pronombre singular del texto.
theological_decisions:
- issue: Referencia de לוֹ ('a él')
  english_pob_reading: the gift is to be given to the priest/Levite in the immediate legal context
  chosen_spanish_reading: el don se entrega al destinatario sacerdotal del contexto inmediato, manteniendo el pronombre singular explícito
  alternative_spanish_readings:
  - al sacerdote
  - al levita
  - a él
  rationale: El hebreo usa un singular pronominal. En español, conservar 'a él' mantiene la forma gramatical sin especificar más de lo que el contexto legal inmediato exige. La identidad del receptor queda determinada por el pasaje circundante, no por esta sola cláusula.
  doctrine_reference: Contexto legal sacerdotal de Deuteronomio 18
- issue: Naturaleza de las ofrendas agrícolas y ganaderas
  english_pob_reading: firstfruits / first of the fleece
  chosen_spanish_reading: primicias y primera lana como primeros productos dedicados
  alternative_spanish_readings:
  - primeros frutos y primer esquileo
  - primicias y primer vellón
  rationale: La lista reúne los primeros productos de la cosecha y del ganado. 'Primicias' y 'primera lana' conservan la lógica de prioridad cultual sin introducir terminología eclesiástica ajena al hebreo.
  doctrine_reference: Ley de ofrendas y sostén sacerdotal en Deuteronomio 18
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del audit trail inglés y no requiere revisión adicional según el último pase. Se mantuvieron las correspondencias léxicas clave: רֵאשִׁית como ''primicias'', תִּירוֹשׁ como ''vino nuevo'', יִצְהָר como ''aceite'' y גֵּז צֹאנְךָ como ''la primera lana de tu rebaño''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque este versículo no contiene el tetragrámaton.
  - Se mantuvo un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se conservó el pronombre singular indirecto en forma explícita ('a él') para reflejar el hebreo, aunque su antecedente se define por el contexto inmediato.
