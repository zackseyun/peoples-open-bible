translation:
  language: es
  text: 'Y el temor y el espanto[a] que él infundía cayeron sobre los que habitaban la costa: los que estaban en Sidón y Tiro, los que habitaban en Assur y Ocina, y todos los que habitaban en Jamnia; y los que habitaban en Azoto y Ascalón[b] le tuvieron mucho miedo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La pareja griega puede traducirse también «temor y temblor»; aquí se vierte «temor y espanto» para conservar la intensidad sin sonar formulaica en español.
    reason: lexical_alternative
  - marker: b
    text: Azoto es el nombre griego de Ashdod, y Ascalón es el nombre griego de Ashkelon.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέπεσεν
  english_pob_choice: fell upon
  chosen_spanish: cayeron sobre
  alternatives_spanish:
  - vino sobre
  - se abatió sobre
  lexicon: BDAG
  rationale: El verbo ἐπιπίπτω conserva una imagen de irrupción súbita. En español, «cayeron sobre» mantiene la fuerza narrativa y la direccionalidad del original sin volverlo demasiado explicativo.
- source_word: φόβος καὶ τρόμος
  english_pob_choice: fear and dread
  chosen_spanish: miedo
  alternatives_spanish:
  - temor y espanto
  - miedo y pavor
  lexicon: BDAG
  rationale: La secuencia griega expresa alarma intensa. En esta frase, el español puede condensar la pareja en «miedo» sin perder el sentido global, pero se conserva la intensificación final con «muchísimo» para reflejar σφόδρα.
- source_word: αὐτοῦ
  english_pob_choice: of him
  chosen_spanish: de él
  alternatives_spanish:
  - causado por él
  - ante él
  lexicon: BDAG
  rationale: El genitivo indica a la persona que inspira el miedo. «De él» preserva la relación abierta del griego y evita interpretar más de lo que el texto dice.
- source_word: τοὺς κατοικοῦντας τὴν παραλίαν
  english_pob_choice: those living along the coast
  chosen_spanish: los que habitaban la costa
  alternatives_spanish:
  - los que vivían a lo largo de la costa
  - los que habitaban la región costera
  lexicon: LSJ
  rationale: παραλία designa la franja costera. «Habitaban la costa» suena natural en español y conserva el valor de κατοικοῦντας como residir en una región.
- source_word: τοὺς ὄντας ἐν Σιδῶνι καὶ Τύρῳ
  english_pob_choice: those in Sidon and Tyre
  chosen_spanish: los que estaban en Sidón y Tiro
  alternatives_spanish:
  - los que habitaban en Sidón y Tiro
  - los residentes en Sidón y Tiro
  lexicon: BDAG
  rationale: El participio es relacional y de identificación. «Los que estaban en Sidón y Tiro» es fiel y fluido, sin añadir matices que el griego no exige.
- source_word: Ἀσσούρ
  english_pob_choice: Assur
  chosen_spanish: Assur
  alternatives_spanish:
  - Asur
  - Asiria
  lexicon: LSJ
  rationale: Se mantiene la forma griega transliterada, porque el texto nombra un lugar propio y no pide interpretar la referencia como un territorio más amplio.
- source_word: Ὀκεινὰ
  english_pob_choice: Ocina
  chosen_spanish: Ocina
  alternatives_spanish:
  - Oceina
  - Okeina
  lexicon: LSJ
  rationale: Nombre propio de forma incierta; se conserva la transliteración empleada por el POB inglés para no forzar una identificación no documentada.
- source_word: Ἰεμνάν
  english_pob_choice: Jamnia
  chosen_spanish: Jamnia
  alternatives_spanish:
  - Jemna
  - Yamnia
  lexicon: LSJ
  rationale: Jamnia es la forma reconocible y estándar en español para este topónimo griego.
- source_word: Ἀζώτῳ
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Ashdod
  - Azoto (Ashdod)
  lexicon: LSJ
  rationale: Se traduce el nombre helenizado del texto griego como «Azoto», en lugar de sustituirlo por la forma hebrea. Esta opción mantiene la huella del testimonio griego y es idiomática en español bíblico.
- source_word: Ἀσκάλωνι
  english_pob_choice: Ascalon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Ashkelon
  - Ascalón (Ashkelon)
  lexicon: LSJ
  rationale: Se conserva la forma helenizada del topónimo, adaptada a la ortografía española («Ascalón»), en vez de reemplazarla por la forma hebrea.
- source_word: ἐφοβήθησαν αὐτὸν σφόδρα
  english_pob_choice: were very greatly afraid of him
  chosen_spanish: tuvieron muchísimo miedo de él
  alternatives_spanish:
  - temieron muchísimo a él
  - estuvieron muy atemorizados de él
  lexicon: BDAG
  rationale: La combinación verbal intensiva exige una expresión fuerte en español. «Tuvieron muchísimo miedo de él» comunica el sentido de ἐφοβήθησαν… σφόδρα sin sonar arcaica ni redundante.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparece exactamente en el texto español: [a] junto a «costa» y [b] junto a «Jamnia». No se añadieron notas sin anclaje textual.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia geográfica y el paralelismo del griego.
  - Se usó una traducción directa de los topónimos helenizados cuando el griego los presenta así.
  - Se evitó introducir equivalencias hebreas no presentes en el testimonio base.
  - El intensificador σφόδρα quedó reflejado con «muchísimo».
