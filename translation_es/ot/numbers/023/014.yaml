review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa y las decisiones del POB inglés: Balac lleva a Balaam, el lugar se trata como topónimo, se sube a la cumbre de Pisgá, se construyen siete altares, y se ofrece un toro y un carnero con sentido distributivo en cada altar. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada: repite «Zofim» en vez de ofrecer la opción descriptiva o la transliteración alternativa que aclare la ambigüedad del hebreo.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Así que lo llevó» funciona, aunque «Y lo llevó»/«Entonces lo llevó» sería más lineal; no exige cambio. «Campo de Zofim», «cumbre de Pisgá», «edificó siete altares» y «ofreció un toro y un carnero sobre cada altar» son legibles y fieles. El único problema real de calidad es la formulación de la nota, que no distingue bien entre nombre propio y descripción traducida.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. El tratamiento de topónimos es coherente: «Zofim» y «Pisgá» como nombres propios. La decisión distributiva «cada altar» está bien alineada con la justificación auditada.'
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada y no conserva fielmente la alternativa documentada.
    rationale: La nota dice «O “el campo de Zofim”», pero el texto principal ya tiene «Campo de Zofim». La alternativa real documentada en el expediente inglés es la lectura descriptiva traducida del hebreo, p. ej. «Campo de vigías/vigilantes», o bien la observación de que el hebreo puede entenderse como descripción o como nombre de lugar. Tal como está, la nota no aporta una alternativa útil y confunde la razón lexical.
  revised_spanish_text: Así que lo llevó al Campo de Zofim[a], a la cumbre de Pisgá, y edificó siete altares, y ofreció un toro y un carnero sobre cada altar.
  revised_footnotes:
  - marker: a
    text: O «campo de vigías». El hebreo puede entenderse como una descripción traducida («campo de vigilantes/atalayas») o como un nombre de lugar conservado.
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota al pie para reflejar de verdad la ambigüedad lexical de שְׂדֵה צֹפִים y la razón documentada en el expediente inglés. No se requiere adjudicación adicional.
