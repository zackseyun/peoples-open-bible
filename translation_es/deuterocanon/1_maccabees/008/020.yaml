translation:
  language: es
  text: Judas, que también es llamado Macabeo, y sus hermanos y la multitud de los judíos nos enviaron a ustedes, para establecer con ustedes una alianza y paz, y para ser inscritos[a] como sus aliados y amigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «registrados» o «anotados». El griego probablemente se refiere a una inscripción o registro diplomático formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: En contexto narrativo de literatura del Segundo Templo, el nombre propio se translitera como Judas; 'Judá' podría confundirse con el territorio o con la forma hebrea no marcada aquí.
- source_word: ὁ καὶ Μακκαβαῖος
  english_pob_choice: who is also called Maccabeus
  chosen_spanish: que también es llamado Macabeo
  alternatives_spanish:
  - también llamado Macabeo
  - el que también es llamado Macabeo
  lexicon: LSJ
  rationale: La construcción griega ὁ καὶ + nombre introduce un sobrenombre o epíteto alterno; 'que también es llamado' conserva esa función appositiva en español con claridad natural.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: LSJ
  rationale: El término es el familiar básico para hermanos; no hay razón textual para ampliar o espiritualizar el vínculo.
- source_word: τὸ πλῆθος τῶν Ἰουδαίων
  english_pob_choice: the multitude of the Jews
  chosen_spanish: la multitud de los judíos
  alternatives_spanish:
  - la asamblea de los judíos
  - el cuerpo de los judíos
  lexicon: LSJ
  rationale: πλῆθος denota una gran muchedumbre o conjunto; 'multitud' mantiene el valor colectivo sin introducir una noción institucional que el texto no explicita.
- source_word: ἀπέστειλαν ἡμᾶς πρὸς ὑμᾶς
  english_pob_choice: sent us to you
  chosen_spanish: nos enviaron a ustedes
  alternatives_spanish:
  - nos mandaron a ustedes
  - nos despacharon a ustedes
  lexicon: LSJ
  rationale: La frase expresa envío con destino a los interlocutores; 'enviaron' es idiomático y suficientemente formal para el registro diplomático del pasaje.
- source_word: στῆσαι
  english_pob_choice: to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - para poner en vigor
  - para hacer
  lexicon: LSJ
  rationale: En este contexto diplomático, el infinitivo apunta a instituir o dejar establecido un arreglo; 'establecer' conserva la fuerza formal sin sobrerinterpretar.
- source_word: συμμαχίαν
  english_pob_choice: an alliance
  chosen_spanish: una alianza
  alternatives_spanish:
  - un pacto de alianza
  - una alianza militar
  lexicon: LSJ
  rationale: συμμαχία es una alianza formal, a menudo política o militar; 'alianza' reproduce esa fuerza sin añadir detalles no explícitos.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz y amistad
  - paz formal
  lexicon: LSJ
  rationale: El sustantivo es simplemente 'paz'. Aunque el trasfondo es diplomático, el texto no dice explícitamente 'tratado', por lo que 'paz' es la opción más fiel.
- source_word: γραφῆναι ἡμᾶς
  english_pob_choice: to have us enrolled
  chosen_spanish: para que fuéramos inscritos
  alternatives_spanish:
  - para ser inscritos
  - para que nos registraran
  lexicon: LSJ
  rationale: El pasivo de γράφω aquí probablemente alude a una inscripción o registro oficial. 'Inscritos' refleja esa idea administrativa en español natural y mantiene la posibilidad de un acto formal de registro.
- source_word: συμμάχους καὶ φίλους ὑμῶν
  english_pob_choice: your allies and friends
  chosen_spanish: como sus aliados y amigos
  alternatives_spanish:
  - como aliados y amigos de ustedes
  - como sus aliados y amistades
  lexicon: LSJ
  rationale: La pareja diplomática 'aliados y amigos' se conserva; el genitivo se expresa naturalmente con 'sus' en español, que corresponde al valor relacional del griego sin forzar la sintaxis.
theological_decisions:
- issue: El valor diplomático de εἰρήνην y la fórmula de inscripción oficial
  english_pob_reading: peace ... to have us enrolled as your allies and friends
  chosen_spanish_reading: paz ... para que fuéramos inscritos como sus aliados y amigos
  alternative_spanish_readings:
  - paz ... para ser inscritos como sus aliados y amigos
  - paz ... para que nos registraran como sus aliados y amigos
  rationale: No hay doctrina en juego directa, pero sí una tensión entre traducción literal y sentido diplomático. Se mantiene 'paz' y 'inscritos' para no diluir la formalidad política del pasaje ni convertirlo en una mera amistad informal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: conserva el valor apposicional de ὁ καὶ Μακκαβαῖος, el plural inclusivo de ''nos'', y la cláusula final como registro formal (''para que fuéramos inscritos'') en lugar de una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se usa 'alianza' para συμμαχίαν y no 'pacto' o 'tratado', porque el griego nombra la relación más que su forma jurídica exacta.
  - Se prefiere 'judíos' en minúscula por tratarse del etnónimo colectivo en español, coherente con uso bíblico estándar.
  - '''Inscritos'' preserva la posible resonancia administrativa de γράφω sin introducir un tecnicismo ajeno al español bíblico.'
  - Se mantiene 'Judas' como nombre propio; 'Macabeo' funciona como sobrenombre y no como traducción interpretativa.
