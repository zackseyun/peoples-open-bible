  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: el pasar rápido de los días mediante dos símiles, barcos de papiro y un ave rapaz que se lanza sobre su objetivo. También sigue adecuadamente las decisiones del POB inglés en חָלְפוּ > «pasan», עִם > «como», אֵבֶה > «papiro», y אֹכֶל > «presa».'
