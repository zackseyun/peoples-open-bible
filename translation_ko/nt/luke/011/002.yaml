id: LUK.11.2
reference: 'Luke 11:2'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτοῖς· Ὅταν προσεύχησθε, λέγετε· ⸀Πάτερ, ἁγιασθήτω τὸ ὄνομά σου· ἐλθέτω ἡ βασιλεία ⸀σου·
base_translation:
  language: en
  yaml_path: translation/nt/luke/011/002.yaml
  text: 'And he said to them[a], “When you pray, say: ‘Father, hallowed be your name[b]. Your kingdom come.’”'
  footnotes:
  - marker: a
    text: 'Some English traditions read ''Our Father,'' influenced by the parallel in Matthew 6:9, but the Greek here reads simply ''Father.'''
    reason: alternative_reading
  - marker: b
    text: 'Or ''hallowed be your name.'''
    reason: lexical_alternative
translation:
  language: ko
  text: '예수께서 그들에게 이르셨습니다. 「너희는 기도할 때에 이렇게 말하라. 「아버지[a], 당신의 이름이 거룩히 여겨지게 하시며, 당신의 나라가 임하게 하소서.」」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '누가의 본문은 단순히 「아버지」(Πάτερ)이다. 마태복음 6:9의 「하늘에 계신 우리 아버지여」는 평행 본문이며, 한국 전통 번역이 마태 형식을 누가에 끌어들이는 경향이 있으나, 본 번역은 누가의 더 간결한 원형을 보존한다.'
    reason: textual_preservation
theological_decisions:
- issue: '11:2-4 누가의 주기도문 — 마태 본문과의 차이 보존'
  chosen_reading: 누가의 짧은 형태(「아버지」 단독 호칭, 「뜻이 이루어지이다」 없음, 「악에서 구하소서」 없음, 「빚진 모든 자」 표현)를 그대로 유지
  alternative_readings:
  - '마태 6:9-13의 긴 형태로 평행 보충'
  rationale: '누가는 (1) 호칭이 「아버지」 단독, (2) 「당신의 뜻이 하늘에서 이루어진 것같이 땅에서도 이루어지이다」가 없음, (3) 빵 청원에서 「오늘」 대신 「날마다(τὸ καθ'' ἡμέραν)」, (4) 죄 사함에서 「우리에게 빚진 모든 자(παντὶ ὀφείλοντι ἡμῖν)」를 명시, (5) 「악에서 구하소서」 결구가 없음. 한국 교회 예전이 마태 본문을 표준으로 채택해 왔으나, 본 번역은 누가의 원래 문학적 형태를 보존한다.'
  doctrine_reference: DOCTRINE.md §1 (Original-language primacy); §5 (Consistency)
