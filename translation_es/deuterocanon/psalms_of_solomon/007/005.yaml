review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en los elementos principales del griego: ἐν τῷ κατασκηνοῦν se entiende correctamente como construcción temporal («Cuando ... habite»), τὸ ὄνομά σου se conserva literalmente como «tu nombre», ἐν μέσῳ ἡμῶν se vierte bien como «en medio de nosotros», y ἐλεηθησόμεθα mantiene la idea de misericordia futura. La nota alternativa sobre «tabernacle» también refleja adecuadamente la imagen léxica documentada.'
  spanish_quality_summary: La principal falla es de idiomaticidad grave en «seremos mostrados misericordia», que no es español natural ni digno, aunque intenta calcar la pasiva inglesa. Debe repararse a una forma española fiel y clara, preferiblemente «se nos mostrará misericordia», que conserva la pasividad semántica y el futuro. El resto del verso es legible y apropiado para el registro bíblico.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece el nombre divino explícito; «tu nombre» preserva bien la teología bíblica del nombre. La elección «habite» concuerda con la decisión documentada de evitar un tecnicismo duro en el texto principal, manteniendo «tabernacle» solo en nota.
  issues:
  - severity: high
    issue: «Seremos mostrados misericordia» es una construcción no idiomática en español.
    rationale: Aunque busca reflejar la pasiva de ἐλεηθησόμεθα y del inglés auditado, en español esta formulación suena incorrecta. «Se nos mostrará misericordia» o «se nos tendrá misericordia» transmiten fielmente el sentido y el futuro pasivo/impersonal sin deformar la lengua meta.
  - severity: low
    issue: La nota con «tabernacle» conserva un préstamo verbal poco natural en español.
    rationale: Como nota de alternativa formal puede tolerarse, pero conviene ofrecer una forma española inteligible y cercana al valor léxico, como «ponga su morada» o «tabernaculice» no sería mejor. Dado el audit trail inglés, puede mantenerse si se quiere reflejar literalmente la alternativa, pero una formulación más natural en español sería preferible.
  revised_spanish_text: Cuando tu nombre habite en medio de nosotros[a], se nos mostrará misericordia.
  revised_footnotes:
  - marker: a
    text: 'O, de modo más formal: «Cuando tu nombre tabernacle entre nosotros».'
    reason: lexical_alternative
