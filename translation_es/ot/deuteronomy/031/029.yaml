translation:
  language: es
  text: Porque sé que después de mi muerte ciertamente se corromperán[a] y se apartarán del camino que les mandé, y les sobrevendrá el mal[b] en los últimos días[c], porque harán lo malo a los ojos de Yahvé, para provocarlo a ira por la obra de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "ciertamente se corromperán a sí mismos" o "ciertamente se volverán corruptos". El hebreo intensifica el verbo "corromper" y puede entenderse aquí de manera reflexiva o intransitiva.'
    reason: lexical_alternative
  - marker: b
    text: 'También: "la desgracia" o "la calamidad" en lugar de "el mal". El hebreo רָעָה puede denotar un mal adverso o un desastre que sobreviene.'
    reason: lexical_alternative
  - marker: c
    text: 'También: "en días venideros" o "en los días postreros". La expresión apunta al futuro y puede tener peso escatológico según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior y mantiene la relación discursiva causal de manera natural en español.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - sé con certeza
  lexicon: HALOT
  rationale: El presente simple expresa conocimiento firme y profético en español sin sobrecargar la frase.
- source_word: אַחֲרֵי מוֹתִי
  english_pob_choice: after my death
  chosen_spanish: después de mi muerte
  alternatives_spanish:
  - después de que yo muera
  lexicon: HALOT
  rationale: La construcción nominal se conserva de forma natural y fiel en español.
- source_word: הַשְׁחֵת תַּשְׁחִת֔וּן
  english_pob_choice: you will surely act corruptly
  chosen_spanish: ciertamente se corromperán
  alternatives_spanish:
  - ciertamente se corromperán a sí mismos
  - se corromperán sin duda
  - se volverán corruptos
  lexicon: HALOT
  rationale: El hebreo intensifica el verbo y puede leerse de forma reflexiva o intransitiva. En español, 'se corromperán' preserva esa tensión sin fijar indebidamente un objeto.
- source_word: וְסַרְתֶּם מִן־הַדֶּרֶךְ
  english_pob_choice: and turn aside from the way
  chosen_spanish: y se apartarán del camino
  alternatives_spanish:
  - y se desviarán del camino
  - y se saldrán del camino
  lexicon: HALOT
  rationale: '''Apartarse del camino'' es una equivalencia idiomática natural para la fórmula pactal de desviación.'
- source_word: אֲשֶׁר צִוִּיתִי אֶתְכֶם
  english_pob_choice: that I commanded you
  chosen_spanish: que les mandé
  alternatives_spanish:
  - que les ordené
  - que les di
  lexicon: HALOT
  rationale: '''Mandé'' reproduce el carácter directo y autoritativo del mandato mosaico con un verbo natural en español.'
- source_word: וְקָרָאת אֶתְכֶם הָרָעָה
  english_pob_choice: and evil will befall you
  chosen_spanish: y les sobrevendrá el mal
  alternatives_spanish:
  - y les alcanzará el mal
  - y les acontecerá el mal
  - y les vendrá el mal
  lexicon: HALOT
  rationale: קרא con רעה describe una desgracia que cae sobre alguien. 'Sobrevendrá el mal' conserva el valor adverso del sustantivo y la idea de irrupción sobre el pueblo.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los días venideros
  alternatives_spanish:
  - en los días postreros
  - al final de los días
  lexicon: HALOT
  rationale: La frase puede ser futura y también cargada de peso escatológico. 'Días venideros' mantiene esa apertura sin imponer una terminología más técnica de la necesaria.
- source_word: כִּי תַעֲשׂוּ אֶת־הָרַע
  english_pob_choice: because you will do what is evil
  chosen_spanish: porque harán lo malo
  alternatives_spanish:
  - porque harán el mal
  - porque harán lo que es malo
  lexicon: HALOT
  rationale: En español, 'hacer lo malo' expresa con claridad la evaluación moral del hebreo sin volverlo excesivamente abstracto.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de evaluación divina y la terminología del proyecto para el Nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, conservando el nombre divino en transliteración y no una sustitución por título.
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - irritándolo
  - haciéndolo enojar
  lexicon: HALOT
  rationale: El causativo del hebreo se expresa con naturalidad en español mediante 'provocarlo a ira', que conserva el sentido pactual de suscitar la reacción divina.
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  english_pob_choice: by the work of your hands
  chosen_spanish: por la obra de sus manos
  alternatives_spanish:
  - por lo que hagan sus manos
  - por la obra de sus manos
  lexicon: HALOT
  rationale: '''Obra de sus manos'' reproduce la imagen hebrea de manera idiomática y puede abarcar tanto hechos como manufacturas idolátricas o acciones humanas.'
theological_decisions:
- issue: Sustantivo רָעָה / רַע en el juicio sobre el futuro de Israel
  english_pob_reading: evil will befall you ... because you will do what is evil
  chosen_spanish_reading: les sobrevendrá el mal ... porque harán lo malo
  alternative_spanish_readings:
  - les sobrevendrá la calamidad
  - les sobrevendrá la desgracia
  - les sobrevendrá el mal y la ruina
  rationale: El hebreo permite tanto 'mal' moral como 'desgracia/calamidad' como consecuencia histórica. La traducción mantiene 'el mal' en el evento que sobreviene y 'lo malo' en la conducta, preservando la tensión entre consecuencia adversa y culpa moral.
  doctrine_reference: Notas léxicas sobre רָעָה / רַע en el pasaje
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide transliterar el Nombre divino. Se conserva 'Yahvé' como forma principal en español, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó el artículo innecesario antes de 'evil' para dejar 'evil will befall you' más natural. En español se reflejó esa misma naturalidad con 'les sobrevendrá el mal', sin artículo adicional indebido en la cláusula de acontecer.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se optó por 'camino' para הַדֶּרֶךְ en sentido ético/pactual, en continuidad con la tradición bíblica pero sin calcado rígido.
  - Se preservó la ambigüedad de הָרָעָה con una nota, porque en español 'mal' puede abarcar tanto desgracia como mal moral, igual que en el hebreo.
