base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/005/006.yaml
  text: And King Solomon and all the assembly of Israel who had assembled before him[a], before the ark[b], were sacrificing sheep and cattle that could not be counted or numbered because of their great number.
  footnotes:
  - marker: a
    text: Or, 'who were assembled with him' for 'who had gathered before him.' The Hebrew expression may be understood as the assembly gathered in Solomon's presence or gathered with him.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' renders Hebrew צֹאן, a broader term that can include small livestock such as sheep and goats.'
    reason: lexical_alternative
  ai_draft:
