translation:
  language: es
  text: Y pusieron los dos cordones de oro en los dos anillos en los extremos del pectoral[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las dos cadenas de oro». El hebreo עֲבֹתֹת puede referirse a cordones trenzados o a cadenas; aquí el objeto es de oro y está fijado al pectoral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: And they put
  chosen_spanish: Y pusieron
  alternatives_spanish:
  - Y colocaron
  - Y pusieron allí
  lexicon: HALOT
  rationale: נתן en esta construcción expresa poner/colocar algo sobre otra cosa. «Pusieron» es natural en español y mantiene el tono narrativo de acción concreta.
- source_word: שְׁתֵּי
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - las dos
  - ambos
  lexicon: HALOT
  rationale: El hebreo marca un número dual explícito. «Los dos» conserva esa precisión sin añadir énfasis interpretativo.
- source_word: הָעֲבֹתֹת
  english_pob_choice: cords
  chosen_spanish: cordones
  alternatives_spanish:
  - cadenas
  - cuerdas trenzadas
  lexicon: HALOT
  rationale: עבתת puede designar cordones trenzados o algo parecido a cadenas. «Cordones» conserva la idea de piezas alargadas y flexibles, sin imponer todavía «cadenas» como única opción; la ambigüedad se preserva en la nota.
- source_word: הַזָּהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro puro
  lexicon: HALOT
  rationale: El sustantivo indica el material. En español bíblico, «de oro» es la forma más clara y fiel para un complemento material.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La preposición indica colocación física sobre los anillos. «Sobre» expresa bien la relación espacial.
- source_word: הַטַּבָּעֹת
  english_pob_choice: rings
  chosen_spanish: los dos anillos
  alternatives_spanish:
  - los aros
  - los anillos de engaste
  lexicon: HALOT
  rationale: טבעת en este contexto de mobiliario sagrado son aros/anillos. «Anillos» es comprensible y acorde con el uso técnico de la pieza.
- source_word: קְצֹוֹת
  english_pob_choice: ends
  chosen_spanish: los extremos
  alternatives_spanish:
  - los bordes
  - las puntas
  lexicon: HALOT
  rationale: El término denota puntos terminales o extremidades. «Extremos» es la equivalencia más directa y clara en español.
- source_word: הַחֹשֶׁן
  english_pob_choice: breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral de juicio
  - el pectoral sacerdotal
  lexicon: HALOT
  rationale: חֹשֶׁן nombra la pieza sacerdotal del atuendo. «Pectoral» es una designación clara en español para esta prenda; evita una expansión tradicional no necesaria en este versículo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: mantiene el orden acción + número + material + ubicación + pieza, y adopta la misma decisión del POB inglés de preservar la ambigüedad léxica de עֲבֹתֹת en una nota alternativa. No se añadió puntuación que sugiera una pausa no presente en la revisión inglesa.'
  spanish_consistency_notes:
  - Se usa «Y» inicial narrativo para reflejar la secuencia hebrea sin sobrecargarla.
  - Se mantiene «de oro» y no «dorados» para conservar el valor material explícito.
  - «Pectoral» traduce la pieza sacerdotal con un término estable y ampliamente comprensible; la nota permite la alternativa «cadenas» sin fijarla en el texto principal.
  - La colocación de la nota [a] en «extremos del pectoral» reproduce la misma zona de ambigüedad léxica que el audit trail inglés preserva para עֲבֹתֹת.
