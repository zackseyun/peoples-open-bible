translation:
  language: es
  text: Y su esperanza en Yahvé no se debilitará; ¿y quién podrá hacerle frente? Él es fuerte en sus obras y poderoso en el temor de Dios,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσθενήσει
  english_pob_choice: will not grow weak
  chosen_spanish: no se debilitará
  alternatives_spanish:
  - no fallará
  - no se volverá débil
  lexicon: BDAG / LSJ
  rationale: El verbo expresa llegar a ser débil o flaquear. En español, 'no se debilitará' conserva la imagen de debilitamiento de la esperanza sin añadir un sentido ajeno.
- source_word: ἡ ἐλπὶς αὐτοῦ ἐπὶ Κύριον
  english_pob_choice: his hope in the Lord
  chosen_spanish: su esperanza en Yahvé
  alternatives_spanish:
  - su esperanza en el Señor
  - su esperanza puesta en Yahvé
  lexicon: BDAG / LSJ
  rationale: La construcción griega orienta la esperanza hacia el Señor como objeto de confianza. Se usa 'Yahvé' conforme al estándar del proyecto para Κύριος cuando refiere al nombre divino, manteniendo el matiz de dependencia dirigida a él.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: BDAG
  rationale: Aunque el inglés de POB usa 'the Lord', el griego κύριον aquí remite al nombre divino. En este proyecto, la forma principal en español es 'Yahvé', no el enmascaramiento tradicional 'SEÑOR'.
- source_word: τίς δύναται πρὸς αὐτόν;
  english_pob_choice: who can stand against him?
  chosen_spanish: ¿quién podrá hacerle frente?
  alternatives_spanish:
  - ¿quién podrá oponerse a él?
  - ¿quién podrá resistirle?
  lexicon: BDAG / LSJ
  rationale: La preposición πρὸς con este verbo tiene sentido adversarial. 'Hacerle frente' reproduce la idea de oposición eficaz con un español natural y fuerte, sin diluir la fuerza retórica.
- source_word: ἰσχυρὸς ἐν ἔργοις αὐτοῦ
  english_pob_choice: strong in his deeds
  chosen_spanish: Fuerte en sus obras
  alternatives_spanish:
  - Poderoso en sus obras
  - Fuerte en sus hechos
  lexicon: BDAG / LSJ
  rationale: Ἔργα puede traducirse como 'obras' o 'hechos'. 'Obras' mantiene la proximidad formal al griego y conserva el tono bíblico, sin forzar una paráfrasis.
- source_word: κραταιὸς ἐν φόβῳ θεοῦ
  english_pob_choice: mighty in the fear of God
  chosen_spanish: poderoso en el temor de Dios
  alternatives_spanish:
  - mighty in reverencia a Dios
  - fuerte en el temor de Dios
  lexicon: BDAG / LSJ
  rationale: κραταιός intensifica la idea de fortaleza. 'Temor de Dios' preserva el idioma bíblico y su densidad teológica; 'poderoso' transmite la intensidad sin convertirlo en mera cortesía religiosa.
- source_word: '[implied copula]'
  english_pob_choice: He is
  chosen_spanish: (copula implícita en la segunda mitad)
  alternatives_spanish:
  - Él es
  - es
  lexicon: 'null'
  rationale: El griego omite el verbo copulativo en la descripción final. En español, la frase nominal funciona con naturalidad en estilo poético, sin necesidad de añadir un 'es' que el verso no expresa explícitamente.
theological_decisions:
- issue: Tratamiento de κύριος como nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: En este contexto, el referente es el Dios de Israel. El proyecto exige 'Yahvé' como forma principal para el nombre divino, especialmente cuando κύριος refleja el uso reverencial del tetragrámaton en la tradición textual.
  doctrine_reference: Nombre divino / uso del tetragrámaton
- issue: φόβος θεοῦ como 'temor de Dios'
  english_pob_reading: the fear of God
  chosen_spanish_reading: el temor de Dios
  alternative_spanish_readings:
  - la reverencia a Dios
  - el respeto a Dios
  rationale: '''Temor de Dios'' conserva la ambivalencia bíblica entre reverencia, awe y obediencia. Suavizarlo solo a ''reverencia'' reduciría una tensión teológica que el griego y el audit trail mantienen.'
  doctrine_reference: Piedad / temor reverente
- issue: Final elíptico con copula no expresada
  english_pob_reading: He is
  chosen_spanish_reading: frase nominal sin verbo copulativo explícito
  alternative_spanish_readings:
  - Él es fuerte...
  - Él es poderoso...
  rationale: El griego presenta una descripción nominal. Dejarla sin copula explícita en la línea española respeta la sintaxis poética y evita introducir un sujeto verbalizado que el texto no marca en esa clausula.
  doctrine_reference: Sintaxis poética griega
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada muestran alta concordancia; no se requieren notas de variante textual ni revisiones sustantivas. Se mantuvo la estructura bipartita del verso y la gradación de fuerza en las dos descripciones finales.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para κύριος cuando refiere al nombre divino.
  - Se mantuvo 'temor de Dios' como expresión bíblica estable, sin sustituirla por una glosa más débil.
  - 'La cadencia poética se preserva con dos miembros finales paralelos: ''Fuerte en sus obras, y poderoso en el temor de Dios''.'
