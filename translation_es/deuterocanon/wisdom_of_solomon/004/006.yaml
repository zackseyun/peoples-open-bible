translation:
  language: es
  text: Porque los hijos nacidos de uniones ilícitas son testigos de la maldad de sus padres en su examen[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de lechos ilícitos», un eufemismo griego para uniones sexuales ilícitas.
    reason: lexical_alternative
  - marker: b
    text: 'O: «son testigos contra sus padres de la maldad».'
    reason: alternative_reading
  - marker: c
    text: La expresión «en su examen» también puede entenderse más ampliamente como «bajo escrutinio», y algunos pueden tomar el pronombre como referido a los padres y no a los hijos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνόμων
  english_pob_choice: lawless
  chosen_spanish: ilícitas
  alternatives_spanish:
  - sin ley
  - ilegales
  - impías
  lexicon: BDAG
  rationale: El griego expresa lo contrario de la ley/orden moral; en español, "ilícitas" comunica bien la idea de uniones sexualmente prohibidas o moralmente reprobables sin sonar forzado. "Sin ley" sería más literal pero menos natural en esta construcción.
- source_word: ὕπνων
  english_pob_choice: unions
  chosen_spanish: uniones
  alternatives_spanish:
  - lechos
  - camas
  - uniones matrimoniales
  lexicon: LSJ
  rationale: La expresión es un eufemismo griego por relaciones sexuales o lecho conyugal. "Uniones" conserva el sentido idiomático con dignidad. Se evita "lechos" en el texto principal por ser demasiado literal para el español moderno.
- source_word: τέκνα γεννώμενα
  english_pob_choice: children born
  chosen_spanish: los hijos nacidos
  alternatives_spanish:
  - la descendencia nacida
  - los niños engendrados
  lexicon: BDAG
  rationale: La frase participial se refiere naturalmente a la prole producida por esas uniones. "Hijos nacidos" es claro y mantiene el valor resultativo del participio.
- source_word: μάρτυρές εἰσιν
  english_pob_choice: are witnesses
  chosen_spanish: son testigos
  alternatives_spanish:
  - dan testimonio
  - sirven como evidencia
  lexicon: BDAG
  rationale: La construcción predicativa conserva el tono forense del griego. "Son testigos" es directo y refleja bien el lenguaje de acusación implícito.
- source_word: πονηρίας
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la perversidad
  - la impiedad
  - la iniquidad
  lexicon: BDAG
  rationale: El genitivo nombra la cualidad moral puesta en evidencia. "Maldad" es una equivalencia amplia y natural en español; "perversidad" sería más pesada, y "iniquidad" más marcada por registro religioso.
- source_word: κατὰ γονέων
  english_pob_choice: of their parents’
  chosen_spanish: de sus padres
  alternatives_spanish:
  - contra sus padres
  - acerca de sus padres
  lexicon: BDAG
  rationale: El griego puede tener sentido forense/adversativo, como testimonio dirigido contra los padres. En el texto principal, "de sus padres" fluye de manera natural en español; la alternativa más explícita se preserva en nota.
- source_word: ἐν ἐξετασμῷ αὐτῶν
  english_pob_choice: at their examination
  chosen_spanish: cuando son examinados
  alternatives_spanish:
  - en su examen
  - bajo escrutinio
  - al ser examinados
  lexicon: LSJ
  rationale: Aunque el inglés POB ajusta a "at their examination", en español "cuando son examinados" reproduce con naturalidad el sentido de una investigación o examen judicial. La ambigüedad del referente del pronombre se conserva en nota para no resolverla sin base suficiente.
theological_decisions:
- issue: Sentido del eufemismo ἀνόμων ὕπνων
  english_pob_reading: lawless unions
  chosen_spanish_reading: uniones ilícitas
  alternative_spanish_readings:
  - lechos ilícitos
  - relaciones ilícitas
  - uniones sin ley
  rationale: Se mantiene la denuncia moral y el carácter eufemístico del original sin caer en una expresión excesivamente cruda ni en un calco duro. El texto sigue acusando relaciones sexualmente indebidas.
  doctrine_reference: Preservar el valor moral y forense del pasaje sin suavizarlo indebidamente.
- issue: Referente de αὐτῶν en ἐν ἐξετασμῷ αὐτῶν
  english_pob_reading: the children are examined
  chosen_spanish_reading: cuando son examinados
  alternative_spanish_readings:
  - cuando sus padres son examinados
  - bajo su examen
  - al ser puestos bajo escrutinio
  rationale: La sintaxis permite más de una lectura; el español principal mantiene esa apertura sin fijar innecesariamente el referente. La nota explicita la posibilidad de entenderlo de manera más general o referida a los padres.
  doctrine_reference: Preservar la tensión interpretativa documentada por la POB inglesa.
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail inglés, que prefirió una referencia directa al momento del examen en lugar de una paráfrasis temporal más amplia. En español se conserva el sentido forense y la ambigüedad documentada, sin convertir el eufemismo en una explicación excesiva dentro del texto principal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra sustitución no pertinente porque el pasaje no contiene el nombre divino.
  - Se usa un registro bíblico moderno y digno, con «maldad» y «testigos» para mantener el tono judicial del griego.
  - Se mantiene «uniones ilícitas» como solución principal para el eufemismo ὕπνων, reservando la literalidad en nota.
  - La estructura con «son testigos de la maldad de sus padres» conserva la lectura principal del POB inglés y admite la alternativa adversativa en nota.
