translation:
  language: es
  text: Yo mismo bajaré contigo a Egipto[a], y yo mismo también ciertamente te haré subir; y José pondrá su mano sobre tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «José te cerrará los ojos», en referencia a que José estaría presente a la muerte de Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo en persona
  - yo mismo, por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; «yo mismo» conserva mejor esa fuerza que un simple «yo».
- source_word: אֵרֵד
  english_pob_choice: will go down
  chosen_spanish: bajaré
  alternatives_spanish:
  - descenderé
  - iré abajo
  lexicon: HALOT
  rationale: En español, «bajaré» transmite con naturalidad el movimiento hacia Egipto y mantiene el valor direccional del verbo hebreo.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - con ti
  lexicon: HALOT
  rationale: Preposición comitativa normal en español; conserva la relación directa con Jacob en segunda persona singular.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - para Egipto
  lexicon: HALOT
  rationale: El he direccional expresa movimiento hacia Egipto; en español, «a Egipto» es la forma más natural y fiel.
- source_word: אַעַלְךָ
  english_pob_choice: will bring you up
  chosen_spanish: te haré subir
  alternatives_spanish:
  - te subiré
  - te llevaré arriba
  - te haré volver
  lexicon: HALOT
  rationale: El Hifil de עלה es causativo; «te haré subir» preserva esa causatividad sin sonar forzado.
- source_word: גַם עָלֹה
  english_pob_choice: also surely
  chosen_spanish: ciertamente también
  alternatives_spanish:
  - también ciertamente
  - sí, ciertamente
  - seguramente también
  lexicon: HALOT
  rationale: La combinación intensifica la promesa. «Ciertamente también» deja oír la fuerza añadida de גַם y del infinitivo absoluto sin sobreexplicarlo.
- source_word: וְיוֹסֵף
  english_pob_choice: and Joseph
  chosen_spanish: y José
  alternatives_spanish:
  - y Yosef
  lexicon: HALOT
  rationale: Nombre propio en forma española común y reconocible.
- source_word: יָשִׁית יָד֖וֹ עַל עֵינֶיךָ
  english_pob_choice: will place his hand on your eyes
  chosen_spanish: pondrá su mano sobre tus ojos
  alternatives_spanish:
  - pondrá su mano sobre tus ojos al cerrar los ojos
  - te cerrará los ojos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. La expresión idiomática se mantiene abierta para no resolverla del todo en el texto principal.
theological_decisions:
- issue: Alcance de la promesa «te haré subir»
  english_pob_reading: The wording preserves the immediate promise to Jacob without specifying whether the reference is to Jacob personally, his body for burial, or his descendants in the exodus.
  chosen_spanish_reading: La redacción preserva la promesa inmediata a Jacob sin especificar si se refiere a él personalmente, a su cuerpo para sepultura, o a sus descendientes en el éxodo.
  alternative_spanish_readings:
  - Promesa de que Jacob mismo regresaría vivo de Egipto
  - Promesa de que su cuerpo sería llevado de vuelta para sepultura en Canaán
  - Promesa representativa que abarca el éxodo de sus descendientes
  rationale: El hebreo es conciso y admite más de un nivel de cumplimiento. Se evita resolver la tensión teológica; la traducción mantiene el alcance amplio de «te haré subir».
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
- issue: Sentido de «pondrá su mano sobre tus ojos»
  english_pob_reading: The Hebrew idiom literally speaks of placing the hand on the eyes, commonly understood of closing the eyes at death.
  chosen_spanish_reading: Se conserva la imagen literal y, a la vez, se deja abierta la lectura idiomática de cerrar los ojos al morir.
  alternative_spanish_readings:
  - y José te cerrará los ojos
  - y José cerrará tus ojos
  rationale: En español, «poner la mano sobre los ojos» mantiene mejor la concreción hebrea; la lectura idiomática se explica fuera del texto principal para no perder el matiz.
  doctrine_reference: Principio de mantener la imagen concreta cuando el hebreo usa un giro idiomático con posible lectura literal y figurada.
translation_notes:
  revision_awareness: La revisión auditada en inglés corrigió la preposición de «over your eyes» a «on your eyes» para ajustarse mejor al hebreo; el español sigue esa decisión con «sobre tus ojos», preservando la imagen concreta y la lectura idiomática.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero en este versículo el tetragrámaton no aparece.
  - Se mantiene el pronombre enfático con «yo mismo» para reproducir la insistencia del hebreo.
  - «Bajar» y «subir» conservan el par direccional del original.
  - Se evita «siervo» o terminología litúrgica no pertinente; el nombre propio se traduce como «José» en forma estándar española.
