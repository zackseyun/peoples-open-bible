translation:
  language: es
  text: Cuando recuerde el nombre de Yahvé, será salvo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será librado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ μνημονεύειν
  english_pob_choice: When he remembers
  chosen_spanish: Cuando él recuerde
  alternatives_spanish:
  - Al recordar
  - Mientras recuerde
  lexicon: BDAG
  rationale: La construcción ἐν τῷ + infinitivo funciona aquí como un marco temporal; en español, «cuando él recuerde» comunica con naturalidad ese valor sin perder la relación con el original.
- source_word: αὐτὸν
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - a él
  lexicon: gramática griega / BDAG
  rationale: 'Sigo el análisis del POB inglés: αὐτόν se entiende como sujeto lógico del infinitivo articular, no como objeto directo. Por eso el español usa «él» y no un objeto.'
- source_word: τὸ ὄνομα Κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre del Señor
  - el nombre de el Señor
  lexicon: BDAG
  rationale: El texto griego dice literalmente «el nombre del Señor», pero en este proyecto Yahvé es el equivalente directo de יהוה / YHWH. Dado el trasfondo bíblico de «el nombre de Yahvé», se conserva la carga teológica del sintagma sin masking en español.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: «Salvar» mantiene el valor básico del futuro pasivo de σῴζω y su resonancia soteriológica. «Salvado» es más natural en español bíblico que una paráfrasis como «librado», aunque esta última sigue siendo una alternativa viable en contextos de liberación.
theological_decisions:
- issue: El sentido de σωθήσεται puede abarcar salvación o liberación
  english_pob_reading: will be saved
  chosen_spanish_reading: será salvado
  alternative_spanish_readings:
  - será liberado
  - será rescatado
  rationale: El POB inglés opta por «will be saved» y anota «Or 'will be delivered.'». En español, «será salvado» preserva la ambigüedad productiva entre salvación y liberación sin perder el eco soteriológico del verbo griego.
  doctrine_reference: BDAG; uso bíblico de σῴζω
- issue: Referencia implícita al nombre divino
  english_pob_reading: the name of the Lord
  chosen_spanish_reading: el nombre de Yahvé
  alternative_spanish_readings:
  - el nombre del Señor
  rationale: Aunque el inglés POB traduce «Lord», el sistema español del proyecto prefiere Yahvé como representación de YHWH. Dado que Κυρίου aquí funciona como la formulación reverente del nombre divino, «Yahvé» evita la convención de máscara y conserva la referencia teológica.
  doctrine_reference: Convención terminológica del proyecto; trasfondo del Tetragrámaton
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren cambios de fondo. La única decisión destacable en español es la elección terminológica de Yahvé para Κυρίου y la nota alternativa para σωθήσεται.
  spanish_consistency_notes:
  - Se mantiene el orden natural del español, pero se conserva la estructura temporal del original.
  - «Yahvé» sigue la convención del proyecto para el nombre divino; no se usa «SEÑOR» como máscara.
  - «Ser salvado» se eligió por fidelidad léxica y por su registro bíblico claro en español.
  - La nota alternativa reproduce la tensión semántica entre salvación y liberación que el POB inglés ya documenta.
