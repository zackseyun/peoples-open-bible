translation:
  language: es
  text: Oh Yahvé[a], hazme saber mi fin y cuál es la medida de mis días; para que yo sepa cuán pasajero soy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘cuán frágil soy’ o ‘cuán transitorio soy’. La expresión hebrea es concisa y puede destacar la fragilidad humana o la brevedad de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדִיעֵנִי
  english_pob_choice: make me know
  chosen_spanish: hazme saber
  alternatives_spanish:
  - hazme conocer
  - muéstrame
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: ‘hacer saber’ o ‘hacer conocer’. ‘Hazme saber’ preserva esa fuerza causal y suena natural en español contemporáneo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms / Tetragrammaton
  rationale: Se mantiene el nombre divino personal del texto hebreo, siguiendo la convención del proyecto para יְהוָה, en vez de sustituirlo por un título.
- source_word: קִצִּי
  english_pob_choice: my end
  chosen_spanish: mi fin
  alternatives_spanish:
  - mi término
  - mi límite
  lexicon: HALOT
  rationale: קֵץ expresa ‘fin’ o ‘límite’. ‘Mi fin’ conserva la brevedad y el sentido existencial del lamento sin introducir una idea más interpretativa como ‘destino’.
- source_word: וּמִדַּת יָמַי
  english_pob_choice: what is the measure of my days
  chosen_spanish: cuál es la medida de mis días
  alternatives_spanish:
  - cuál es el número de mis días
  - cuál es la extensión de mis días
  lexicon: HALOT
  rationale: מִדָּה significa ‘medida’. Se conserva la metáfora de ‘medida’ en español, porque es más fiel al hebreo que simplificar a ‘número’.
- source_word: מַה הִיא
  english_pob_choice: what is
  chosen_spanish: cuál es
  alternatives_spanish:
  - qué es
  lexicon: HALOT
  rationale: La secuencia interrogativa pide la naturaleza o magnitud de la medida. En español, ‘cuál es’ resulta más idiomático que un literal ‘qué es’.
- source_word: אֵדְעָה
  english_pob_choice: let me know
  chosen_spanish: hazme saber
  alternatives_spanish:
  - para que sepa
  - que yo sepa
  lexicon: HALOT
  rationale: El cohortativo expresa el resultado deseado; en español, la repetición de ‘hazme saber’ mantiene la simetría y la súplica del versículo.
- source_word: מֶה חָדֵל אָֽנִי
  english_pob_choice: how fleeting I am
  chosen_spanish: cuán pasajero soy
  alternatives_spanish:
  - cuán frágil soy
  - cuán transitorio soy
  lexicon: HALOT
  rationale: חָדֵל es difícil y puede sugerir brevedad, transitoriedad o fragilidad. ‘Pasajero’ comunica bien la caducidad humana y evita restringir indebidamente el matiz al de ‘frágil’.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. Se conserva el nombre propio de Dios en español, siguiendo la política del proyecto y evitando la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Ambigüedad de חָדֵל en el lamento
  english_pob_reading: how fleeting I am / how frail I am / how transient I am
  chosen_spanish_reading: cuán pasajero soy
  alternative_spanish_readings:
  - cuán frágil soy
  - cuán transitorio soy
  rationale: La expresión hebrea puede enfatizar brevedad, fragilidad o transitoriedad humana. Se elige una forma que preserve la tensión sin cerrarla en exceso, manteniendo abierta la lectura de la fugacidad de la vida.
  doctrine_reference: Psalm 39:5 lexical tension
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se identificaron cambios necesarios respecto al audit trail en inglés; se conservan el nombre divino, la metáfora de la medida y la ambigüedad de חָדֵל.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - ‘Hazme saber’ mantiene el valor causativo del hifil.
  - ‘Medida de mis días’ conserva la imagen hebrea de מִדָּה.
  - ‘Cuán pasajero soy’ intenta reflejar la brevedad/transitoriedad sin borrar la tensión léxica.
  - La nota al pie recoge las alternativas semánticas principales documentadas en el texto fuente.
