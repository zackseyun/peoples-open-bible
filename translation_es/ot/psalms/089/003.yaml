translation:
  language: es
  text: 'Porque dije[a]: «El amor constante será edificado para siempre; en los cielos tú establecerás tu fidelidad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «El amor constante será establecido para siempre». El verbo hebreo puede traducirse como «edificado» o, más ampliamente, «establecido»; la traducción conserva la metáfora de la edificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: Introduce la explicación o afirmación del hablante; en español, «Porque» conserva bien la relación explicativa/causal sin forzar un giro más interpretativo.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  - declaro
  lexicon: HALOT
  rationale: 'El perfecto hebreo en discurso poético se expresa de manera natural con pretérito simple en español: «dije». «Declaro» añadiría un matiz no exigido por el texto.'
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por toda la eternidad
  lexicon: HALOT
  rationale: Adverbialmente, expresa duración continua. «Para siempre» es idiomático y claro en español bíblico contemporáneo.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: lealtad amorosa
  alternatives_spanish:
  - amor leal
  - amor constante
  - amor de pacto
  lexicon: HALOT
  rationale: «חֶסֶד» combina amor y fidelidad de pacto. «Lealtad amorosa» intenta mantener ambos componentes sin reducirlo solo a emoción («amor») ni solo a obligación jurídica («lealtad»).
- source_word: יִבָּנֶה
  english_pob_choice: will be built up
  chosen_spanish: será edificada
  alternatives_spanish:
  - será construida
  - será levantada
  - será establecida
  lexicon: HALOT
  rationale: El nifal de בנה conserva la metáfora arquitectónica. «Será edificada» mantiene esa imagen mejor que «será establecida», que la aplanaría.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos altos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja naturalmente con «los cielos», más cercano al registro poético bíblico que «el cielo» singular.
- source_word: תָּכִן
  english_pob_choice: you will establish
  chosen_spanish: tú establecerás
  alternatives_spanish:
  - tú afirmarás
  - tú harás firme
  - tú dispondrás
  lexicon: HALOT
  rationale: El hiphil de כון expresa hacer firme o establecer. «Establecerás» comunica con claridad la acción divina en paralelo con la primera cola.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fe constante
  - tu firmeza
  - tu lealtad
  lexicon: HALOT
  rationale: En este contexto poético-covenantal, «faithfulness» se vierte mejor como «fidelidad», que en español comunica fiabilidad y constancia relacional.
- source_word: בָהֶם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en ellos
  lexicon: HALOT
  rationale: Aunque el pronombre remite a «los cielos», el español requiere explicitar el antecedente para evitar ambigüedad. La decisión sigue la lectura del audit trail inglés.
theological_decisions:
- issue: Valor de חֶסֶד en un contexto de alianza y poesía
  english_pob_reading: steadfast love
  chosen_spanish_reading: lealtad amorosa
  alternative_spanish_readings:
  - amor constante
  - amor de pacto
  - misericordia
  rationale: El verso celebra la permanencia del compromiso divino. «Lealtad amorosa» preserva la tensión entre afecto y fidelidad covenantal, evitando restringir el término a compasión o a mero sentimiento.
  doctrine_reference: Translation philosophy §5; fidelidad de pacto en poesía hebrea
- issue: 'Relación sintáctica de la segunda cola: afirmación sobre los cielos o discurso directo a Dios'
  english_pob_reading: 'direct address: ''you will establish your faithfulness'''
  chosen_spanish_reading: 'direct address: «tú establecerás tu fidelidad»'
  alternative_spanish_readings:
  - «será establecida tu fidelidad en los cielos»
  - «tu fidelidad estará en los cielos»
  rationale: La forma verbal de 2ms y el sufijo de 2ms apoyan la lectura en segunda persona. Mantener el discurso directo conserva la orientación orante y el paralelismo con la primera cola.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción
translation_notes:
  revision_awareness: 'Se siguió el expediente inglés con acuerdo alto y sin cambios en la última revisión. La única tensión principal es lexical: conservar la metáfora de construcción para יִבָּנֶה y reflejar en español la riqueza de חֶסֶד sin reducirla.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente de Dios en segunda persona singular («tú»).
  - Se reflejó el plural poético de שָׁמַיִם como «los cielos».
  - Se evitó «SEÑOR» por directriz del proyecto; el texto no contiene el Tetragrámaton, pero la frase conserva estilo bíblico sin sustituciones tradicionales innecesarias.
  - La puntuación con comillas angulares mantiene el discurso poético directo y legible en español.
