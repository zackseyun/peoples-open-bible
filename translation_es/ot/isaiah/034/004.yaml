    issue: Nota b no refleja bien la razón documentada en la auditoría inglesa.
    rationale: La nota inglesa b explica la expresión «the host of heaven»; en el borrador, la nota b está anclada a «su hueste» y mezcla una glosa cultural con un referente distinto. La nota para «toda su hueste» debería explicar más bien el literal «su hueste», probablemente la hueste perteneciente a los cielos.
  - severity: medium
    issue: Faltan notas para alternativas preservadas por la POB inglesa.
    rationale: La auditoría inglesa conserva alternativas para «the heavens will be rolled up like a scroll» y para la imagen de marchitarse/caer en la segunda mitad. Si el español no las incorpora, pierde parte de la documentación lexical aprobada.
  - severity: low
    issue: Formato y redacción de notas mejorables.
    rationale: La nota b empieza con una comilla simple extraña y la formulación puede limpiarse para el estilo editorial del proyecto.
