translation:
  text: And Jerusalem was uninhabited like a wilderness[a]; there was no one entering or going out from her offspring, and the sanctuary was being trampled down, and sons of foreigners were in the citadel, a lodging place for the nations; and delight was taken away from Jacob[c][b], and flute and harp ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek γενημάτων literally means 'offspring' or 'things born'; in context it may mean 'those born in her,' that is, her inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Or 'Acra,' the fortified citadel in Jerusalem.
    reason: alternative_reading
  - marker: c
    text: '''Harp'' could also be rendered ''lyre.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀοίκητος
  chosen: uninhabited
  alternatives:
  - desolate
  - without inhabitants
  lexicon: LSJ
  rationale: The adjective denotes being without inhabitants. 'Uninhabited' preserves the concrete sense better than the broader 'desolate,' especially since ὡς ἔρημος already supplies the wilderness/desolation comparison.
- source_word: ὡς ἔρημος
  chosen: like a wilderness
  alternatives:
  - like a desert
  - like a wasteland
  lexicon: LSJ
  rationale: ἔρημος commonly denotes wilderness/deserted land. 'Like a wilderness' keeps the simile vivid and avoids overinterpreting it as purely urban ruin.
- source_word: ὁ εἰσπορευόμενος καὶ ἐκπορευόμενος
  chosen: no one was entering or going out
  alternatives:
  - there was no one coming in and going out
  - none entered or left
  lexicon: LSJ
  rationale: This participial pair is an idiomatic way to describe normal traffic or population movement. The chosen rendering is natural English while staying close to the Greek verbal imagery.
- source_word: ἐκ τῶν γενημάτων αὐτῆς
  chosen: from her offspring
  alternatives:
  - from her inhabitants
  - from those born in her
  - from her produce
  lexicon: LSJ
  rationale: The transmitted Greek reads γενημάτων, whose most straightforward sense is 'offspring/things born.' In this context it likely refers to those generated from the city, i.e., her native population. I retained the more literal 'offspring' to stay anchored to the witness, while recognizing that 'inhabitants' is an interpretive smoothing. 'Produce' is lexically possible in other contexts but fits this urban context less well.
- source_word: ἁγίασμα
  chosen: sanctuary
  alternatives:
  - holy place
  - temple precinct
  lexicon: LSJ
  rationale: The term refers to the sacred place. 'Sanctuary' is the most natural and sufficiently specific English equivalent in this context.
- source_word: καταπατούμενον
  chosen: was being trampled down
  alternatives:
  - was being profaned
  - was being trodden underfoot
  lexicon: LSJ
  rationale: The participle literally denotes trampling underfoot. 'Was being trampled down' preserves the physical and dishonoring force without reducing it to the interpretive 'profaned.'
- source_word: υἱοὶ ἀλλογενῶν
  chosen: sons of foreigners
  alternatives:
  - foreigners
  - sons of aliens
  - men of another race
  lexicon: LSJ
  rationale: 'The Greek is more specific than a simple ''foreigners'': it literally says ''sons of foreigners/other-nation people.'' The chosen rendering preserves that form, though idiomatic English might simplify it.'
- source_word: ἄκρα
  chosen: citadel
  alternatives:
  - fortress
  - Acra
  lexicon: LSJ
  rationale: In 1 Maccabees this refers to the fortified stronghold in Jerusalem. 'Citadel' communicates the sense in English; 'Acra' is a possible transliteration but less immediately clear in the main text.
- source_word: κατάλυμα
  chosen: a lodging place
  alternatives:
  - an encampment
  - a dwelling
  - a quarters
  lexicon: LSJ
  rationale: The noun denotes a place of lodging or quarters. 'A lodging place' is transparent and avoids over-specifying whether the sense is military or residential.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: for the nations
  alternatives:
  - for Gentiles
  - among the nations
  lexicon: LSJ
  rationale: The phrase is difficult in context. Given the syntax after κατάλυμα, it is best taken as indicating that the citadel had become lodging for the nations/Gentiles. 'For the nations' is a restrained rendering that stays close to the Greek. 'Gentiles' is contextually plausible but more interpretive in this deuterocanonical setting.
- source_word: ἐξῆρθη τέρψις
  chosen: delight was taken away
  alternatives:
  - joy was removed
  - gladness was lifted away
  lexicon: LSJ
  rationale: The passive-like sense of removal is clear. τέρψις is pleasure/delight rather than the more common χαρά. 'Delight was taken away' preserves that nuance.
- source_word: αὐλὸς
  chosen: flute
  alternatives:
  - pipe
  lexicon: LSJ
  rationale: The instrument is a pipe or flute. 'Flute' is the clearest modern equivalent.
- source_word: κινύρα
  chosen: harp
  alternatives:
  - lyre
  lexicon: LSJ
  rationale: The term denotes a stringed instrument; 'harp' is a conventional rendering, though 'lyre' is also possible. I chose 'harp' for readability while preserving the musical lament.
