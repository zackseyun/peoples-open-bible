translation:
  language: es
  text: 'Si dicen: «Ven con nosotros; acechemos para derramar sangre[a]; tendamos una emboscada al inocente sin causa[b]»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «para sangre». La expresión hebrea es tersa y alude a derramamiento de sangre o asesinato.
    reason: lexical_alternative
  - marker: b
    text: 'O: «ocultémonos para el inocente sin causa». El verbo hebreo puede significar más literalmente «ocultarnos», pero aquí, por el contexto y el paralelismo con «acechemos», lleva el sentido de ocultarse para emboscar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición o escenario hipotético; «si» conserva con naturalidad esa fuerza condicional en español.
- source_word: יֹאמְרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - digan
  - dicen a ustedes
  lexicon: HALOT
  rationale: El hebreo introduce la voz de los pecadores en forma directa. En español, «dicen» funciona bien después de «Si» y mantiene el carácter de discurso citado.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Anda
  - Venid
  lexicon: HALOT
  rationale: Imperativo idiomático de invitación; «ven» es breve, natural y conserva el tono exhortativo dirigido al oyente.
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: HALOT
  rationale: Expresa la participación en el grupo de modo claro y directo, sin añadir matices inexistentes en el texto.
- source_word: נֶאֶרְבָה
  english_pob_choice: let us lie in wait
  chosen_spanish: acechemos
  alternatives_spanish:
  - estemos al acecho
  - tendamos una emboscada
  lexicon: HALOT
  rationale: El verbo hebreo designa la acción de acechar para atacar; «acechemos» preserva la intención predatoria y el movimiento de espera activa.
- source_word: לְדָם
  english_pob_choice: for blood
  chosen_spanish: para derramar sangre
  alternatives_spanish:
  - por sangre
  - para sangre
  - para derramar sangre
  lexicon: HALOT
  rationale: La expresión hebrea es concisa y literalmente «para sangre». En español, «para derramar sangre» comunica con claridad el sentido de violencia mortal sin perder la referencia al derramamiento de sangre.
- source_word: נִצְפְּנָה
  english_pob_choice: let us ambush
  chosen_spanish: tenderemos una emboscada
  alternatives_spanish:
  - nos ocultaremos
  - nos escondemos
  lexicon: HALOT
  rationale: Aunque la raíz puede significar «ocultar», aquí el paralelismo con «acechar» favorece el sentido de ataque oculto. «Tenderemos una emboscada» explicita ese valor contextual.
- source_word: לְנָקִי
  english_pob_choice: the innocent
  chosen_spanish: al inocente
  alternatives_spanish:
  - al inocente
  - al blameless
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado; en español «al inocente» es natural y conserva la caracterización moral de la víctima.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin motivo
  - gratuitamente
  - sin razón
  lexicon: HALOT
  rationale: La idea es ausencia de justificación. «Sin causa» sigue de cerca el valor breve del hebreo y mantiene la acusación moral de la violencia injustificada.
theological_decisions:
- issue: Caracterización moral de la víctima en una instrucción sapiencial
  english_pob_reading: the innocent
  chosen_spanish_reading: el inocente
  alternative_spanish_readings:
  - el blameless
  - una persona inocente
  rationale: 'La versión conserva el peso ético del texto: el objetivo del ataque es una persona inocente, sin añadir afirmaciones doctrinales ajenas al pasaje.'
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto sin importar formulaciones doctrinales externas.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el consenso del audit trail inglés. Se conservó la estructura condicional, el imperativo de invitación, el lenguaje de acecho/emboscada y la tersa expresión «para sangre», ajustándolos a un español natural y publicable.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» solo cuando el texto lo requiera; este versículo no los contiene.
  - Se prefirió un español neutral y sobrio, sin caer en calcos rígidos.
  - 'Se mantuvo la fuerza predatoria de los dos verbos consecutivos con un matiz contextual diferenciado: «acechemos» y «tenderemos una emboscada».'
