translation:
  language: es
  text: La tierra se abrió[a] y se tragó a Datán[c], y cubrió la asamblea[b] de Abiram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «se partió»; el verbo hebreo permite una imagen más vívida a la luz del episodio de Números 16.
    reason: lexical_alternative
  - marker: b
    text: O «la congregación de Abiram» o «el grupo de Abiram».
    reason: lexical_alternative
  - marker: c
    text: Véase Números 16:31–33 para el trasfondo narrativo de este juicio.
    reason: cross_reference
lexical_decisions:
- source_word: תִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: se abrió
  alternatives_spanish:
  - se partió
  - se abrió de par en par
  lexicon: HALOT
  rationale: El hebreo es un imperfecto con valor narrativo pasado; en español, «se abrió» reproduce bien la acción preterital. «Se partió» puede captar la alternativa más vívida señalada en el audit trail, pero es más interpretativa.
- source_word: אֶ֭רֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: Aquí designa la tierra que se abre bajo los rebeldes, no una región territorial. «La tierra» es natural en español y conserva la fuerza del hecho.
- source_word: וַ/תִּבְלַ֣ע
  english_pob_choice: and swallowed
  chosen_spanish: y se tragó
  alternatives_spanish:
  - y devoró
  - y engulló
  lexicon: HALOT
  rationale: El verbo בלע se expresa con claridad en español con «se tragó», que conserva la imagen corporal y violenta del juicio. «Devoró» o «engulló» son posibles, pero menos directos aquí.
- source_word: דָּתָ֑ן
  english_pob_choice: Dathan
  chosen_spanish: Datán
  alternatives_spanish:
  - Datan
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio con transliteración española corriente; el acento ayuda a la pronunciación en español.
- source_word: וַ֝/תְּכַ֗ס
  english_pob_choice: and covered
  chosen_spanish: y cubrió
  alternatives_spanish:
  - y cubrió por encima
  - y tapó
  lexicon: HALOT
  rationale: כסה se traduce de forma directa con «cubrió». El audit trail inglés optó por una forma natural y sin redundancia; en español también basta «cubrió».
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: la
  alternatives_spanish:
  - sobre
  lexicon: HALOT
  rationale: Con «cubrió», la relación implícita funciona de forma natural en español; no es necesario repetir «sobre» para mantener la claridad.
- source_word: עֲדַ֥ת
  english_pob_choice: the company of
  chosen_spanish: la asamblea de
  alternatives_spanish:
  - la congregación de
  - el grupo de
  lexicon: HALOT
  rationale: עֵדָה puede ser «asamblea», «congregación» o «grupo». «Asamblea» conserva el sentido de una colectividad reunida sin imponer un matiz eclesiástico innecesario; «congregación» sería posible, pero más cargado en español religioso.
- source_word: אֲבִירָֽם
  english_pob_choice: Abiram
  chosen_spanish: Abiram
  alternatives_spanish:
  - Aviram
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en forma reconocible para el lector hispano y coherente con la tradición de transliteración.
theological_decisions:
- issue: Relación con el episodio narrado en Números 16
  english_pob_reading: The psalm poetically summarizes the judgment without importing all details of the narrative.
  chosen_spanish_reading: El salmo resume poéticamente el juicio sin añadir detalles que no están en el verso hebreo.
  alternative_spanish_readings:
  - Expandir la traducción para mencionar a toda la rebelión de Números 16.
  - Introducir una explicación narrativa adicional en el texto principal.
  rationale: La fidelidad óptima exige ceñirse al verso tal como está. El hebreo menciona a Datán y a la asamblea de Abiram; ampliar el contenido excedería la evidencia textual.
  doctrine_reference: Números 16:31–33; Salmo 106:17
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión menor para hacer más natural la construcción de «covered the company of Abiram»; en español se optó igualmente por una formulación sobria y publicable («cubrió la asamblea de Abiram») sin añadir «por encima».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto requiera el nombre divino; aquí no aparece.
  - Se mantiene un estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Asamblea» se eligió frente a «congregación» para evitar una sobrelectura eclesiástica.
