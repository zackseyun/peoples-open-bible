  to: 'y sus cuarenta bases de plata: dos bases bajo la una tabla[a], y dos bases bajo la una tabla.'
  rationale: Se corrige una formulación española poco natural («el uno marco») y se adopta «tabla» para קֶרֶשׁ, que en español es más claro y fiel al contexto. Se mantiene explícitamente la repetición literal de «la una ... la una» para reflejar el hebreo y la revisión inglesa auditada.
