    rationale: Aunque es literal, en español moderno suena extraño y puede distraer o sugerir una imagen física indebida. El English POB ya documentó que es un modismo con el sentido de «in our/their hearing»; en español conviene reflejar el sentido principal en el texto y dejar la literalidad en nota.
  - severity: low
