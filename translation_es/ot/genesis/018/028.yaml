revisions:
- from: 'Supongamos que faltan cinco de los cincuenta justos[a]—¿destruirás toda la ciudad por cinco? Y él dijo: «No la destruiré si encuentro allí cuarenta y cinco»[b].'
  to: 'Supongamos que faltan cinco de los cincuenta justos[a]—¿destruirás toda la ciudad por cinco?[b] Y él dijo: «No la destruiré si encuentro allí cuarenta y cinco»'
  rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural en español. Se corrigen las notas para alinearlas con el expediente inglés y con la evidencia fuente: [a] ahora ofrece una alternativa real para אוּלַי, y [b] preserva la alternativa léxica para הֲתַשְׁחִית / בַּחֲמִשָּׁה. También se mueve el anclaje de [b] a la pregunta correspondiente.'
