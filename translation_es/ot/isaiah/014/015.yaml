revisions:
- from: Pero tú serás derribado a Seol[a], a los profundos lugares del pozo.
  to: Pero tú serás precipitado al Seol[a], a las profundidades del pozo.
  rationale: Se revisa «serás derribado» a «serás precipitado» para expresar mejor el descenso impuesto y humillante de תּוּרָד en un español natural. Se cambia «a los profundos lugares del pozo» por «a las profundidades del pozo» para reflejar con precisión e idiomaticidad יַרְכְּתֵי בּוֹר. Se mantiene «Seol» con la nota alternativa, en línea con la decisión léxica y teológica documentada.
