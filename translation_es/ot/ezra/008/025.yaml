  to: Y les pesé la plata[a], el oro y los utensilios —la contribución para la casa de nuestro Dios que habían ofrecido el rey, sus consejeros, sus oficiales y todo Israel que estaba presente.
  rationale: Se elimina «y les entregué» porque añade una acción no expresada en el hebreo. «Les pesé» conserva el acto literal de pesar y el destinatario implícito en לָהֶם, en línea con «weighed out to them». También se ajusta la puntuación para marcar mejor la aposición explicativa de «la contribución».
