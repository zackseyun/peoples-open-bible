translation:
  language: es
  text: 'Mefiboset dijo al rey: «Que se lo lleve todo, ya que mi señor el rey ha llegado a salvo a su casa[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se vierte de forma natural con «dijo» en español, manteniendo el tono directo y sobrio del relato.
- source_word: מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefiboset
  alternatives_spanish:
  - Mefiboset
  - Mefibóset
  lexicon: Transliteración estándar basada en el hebreo
  rationale: Se translitera el nombre propio al español con forma estable y legible; se evita mantener la grafía inglesa.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey David
  - al monarca
  lexicon: HALOT
  rationale: El hebreo usa el título con artículo, no el nombre propio; «al rey» preserva esa neutralidad y economía.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: todo
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: En esta concesión, la fuerza de גַּם queda mejor expresada por la totalidad enfática de «todo» dentro de la cláusula «que se lo lleve todo»; así se conserva el alcance total del objeto sin forzar un adverbio redundante en español.
- source_word: אֶת הַכֹּל
  english_pob_choice: it all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - el conjunto
  lexicon: HALOT
  rationale: La referencia es la posesión discutida en el contexto; «todo» expresa con naturalidad la totalidad sin añadir elementos ajenos.
- source_word: יִקָּח
  english_pob_choice: Let him even take
  chosen_spanish: Que se lo lleve
  alternatives_spanish:
  - Que lo tome
  - Que lo reciba
  lexicon: HALOT
  rationale: El imperfecto con valor jussivo en discurso directo expresa concesión voluntaria; «Que se lo lleve» conserva el permiso enfático y resulta idiomático en español.
- source_word: אַחֲרֵי אֲשֶׁר
  english_pob_choice: since
  chosen_spanish: ya que
  alternatives_spanish:
  - puesto que
  - después de que
  lexicon: HALOT
  rationale: La locución introduce la razón/ocasión del gesto de Mefiboset. «Ya que» expresa bien el matiz causal-temporal sin sonar mecánico.
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - vino
  - ha venido
  lexicon: HALOT
  rationale: El perfectivo hebreo en este contexto tiene relevancia presente; «ha llegado» comunica la llegada consumada con naturalidad.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: Se conserva la fórmula cortesana de tratamiento con «mi señor el rey», que refleja el valor honorífico de אֲדֹנִי sin rebajarla ni sustituirla por un término menos preciso.
- source_word: בְּשָׁלוֹם
  english_pob_choice: safely
  chosen_spanish: a salvo
  alternatives_spanish:
  - en paz
  - en seguridad
  lexicon: HALOT
  rationale: El sentido es de regreso sin daño o peligro. «A salvo» comunica bien ese resultado; la opción más literal se reserva en nota.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: to his own house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su propia casa
  - a su hogar
  lexicon: HALOT
  rationale: El hebreo expresa dirección a la casa propia; en español, «a su casa» es natural y suficiente en este contexto de retorno real al hogar.
theological_decisions:
- issue: Si בְּשָׁלוֹם debe mantenerse como «en paz» o expresarse como seguridad concreta
  english_pob_reading: safely, with a footnote for the more literal 'in peace'
  chosen_spanish_reading: a salvo, con nota para 'en paz'
  alternative_spanish_readings:
  - en paz
  - pacíficamente
  rationale: El pasaje destaca la llegada sin peligro, no solo un estado interior de paz. «A salvo» conserva el resultado objetivo, mientras la nota preserva la alternativa más literal.
  doctrine_reference: Lexical/contextual; no doctrinal conflict
- issue: El valor de la deferencia cortesana en אֲדֹנִי הַמֶּלֶךְ
  english_pob_reading: my lord the king
  chosen_spanish_reading: mi señor el rey
  alternative_spanish_readings:
  - mi señor, el rey
  - mi soberano el rey
  rationale: La fórmula expresa sumisión respetuosa ante la autoridad real; «mi señor el rey» mantiene ese registro sin introducir una interpretación doctrinal.
  doctrine_reference: Honorífico cortesano / pragmática del discurso
- issue: La concesión total de la herencia o posesión discutida
  english_pob_reading: Let him even take it all
  chosen_spanish_reading: Que se lo lleve todo
  alternative_spanish_readings:
  - Que lo tome todo
  - Que se quede con todo
  rationale: La línea transmite renuncia total y resignación generosa; la formulación elegida preserva esa fuerza sin añadir matices que el hebreo no exige.
  doctrine_reference: Contexto narrativo de restitución de bienes
translation_notes:
  revision_awareness: 'El texto español sigue la lectura final del POB inglés revisado: אַחֲרֵי אֲשֶׁר se traduce con una causalidad directa («ya que»), y בְּשָׁלוֹם se mantiene con sentido de seguridad objetiva («a salvo»), dejando la alternativa más literal en nota. No se introducen nombres ni explicaciones ausentes del fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «rey» sin expandir a «David», en coherencia con el hebreo y la POB inglesa.
  - Se conserva el registro cortesano con «mi señor el rey», evitando una traducción excesivamente informal.
  - La puntuación tipográfica española se ajusta a comillas angulares y oración directa clara.
