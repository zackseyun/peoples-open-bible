translation:
  language: es
  text: Pero si te niegas a dejarlos ir[a], he aquí, yo golpearé todo tu territorio con ranas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si te niegas a dejarlos ir ... yo golpearé todo tu territorio con ranas». El participio hebreo puede entenderse como acción inminente o como futuro simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La combinación introductoria funciona aquí de manera contrastiva tras la demanda previa; «Pero si» conserva ese matiz adversativo sin perder la estructura condicional.
- source_word: מָאֵן
  english_pob_choice: refuse
  chosen_spanish: te niegas
  alternatives_spanish:
  - rechazas
  - te niegas obstinadamente
  - rehúsas
  lexicon: HALOT
  rationale: El verbo expresa una negativa voluntaria y persistente, no una simple imposibilidad; «te niegas» transmite bien esa obstinación en español natural.
- source_word: לְשַׁלֵּחַ
  english_pob_choice: to let them go
  chosen_spanish: a dejarlos ir
  alternatives_spanish:
  - a soltarlos
  - a liberarlos
  - a enviarlos
  lexicon: HALOT
  rationale: En el contexto del Éxodo, la expresión idiomática apunta a permitir que Israel salga de la restricción. «Dejarlos ir» es la forma más natural y fiel en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - fíjate
  lexicon: HALOT
  rationale: La partícula introduce una advertencia solemne e inmediata. «Mira» mantiene el tono enfático en un español contemporáneo y digno.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo, por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis al sujeto del juicio. En español, el pronombre explícito ya comunica esa focalización.
- source_word: נֹגֵף
  english_pob_choice: will strike
  chosen_spanish: golpearé
  alternatives_spanish:
  - heriré
  - castigaré
  - afligiré
  lexicon: HALOT
  rationale: El participio en este contexto anuncia un golpe de juicio. «Golpearé» conserva la imagen concreta del verbo hebreo sin añadir la idea de inmediatez que no exige el texto.
- source_word: כָּל גְּבוּלְךָ
  english_pob_choice: all your territory
  chosen_spanish: todo tu territorio
  alternatives_spanish:
  - toda tu tierra
  - todo tu país
  - todo tu dominio
  lexicon: HALOT
  rationale: גְּבוּל puede referirse al límite, la frontera o la extensión territorial. Aquí el sentido es la totalidad del ámbito sometido a Faraón; «todo tu territorio» lo expresa con claridad.
- source_word: בַּצְפַרְדְּעִים
  english_pob_choice: with frogs
  chosen_spanish: con ranas
  alternatives_spanish:
  - por medio de ranas
  - mediante ranas
  lexicon: HALOT
  rationale: La preposición marca el medio del juicio. «Con ranas» es la formulación española más natural y fiel al instrumento de la plaga.
translation_notes:
  revision_awareness: La traducción sigue el texto hebreo masorético de Éxodo 7:27 y corrige la solución previa en inglés que había oscilado entre valor inminente y futuro simple del participio נֹגֵף. En español se optó por un futuro simple natural («golpearé») y se conservó la advertencia solemne de הִנֵּה con «mira».
  spanish_consistency_notes:
  - Se mantuvo «territorio» para גְּבוּל por coherencia con el valor contextual de extensión territorial.
  - Se evitó «SEÑOR» u otra sustitución teológica, pues el versículo no contiene el Nombre divino.
  - Se prefirió «ranas» para צְפַרְדְּעִים, que es el término común y claro en español bíblico contemporáneo.
