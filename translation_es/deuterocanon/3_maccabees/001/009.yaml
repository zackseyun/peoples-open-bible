base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/001/009.yaml
  text: Then[a], after being conveyed to Jerusalem, and after sacrificing to the faithful God and offering thanks, and after doing something further for the place, indeed, when he came to the place and was struck with awe by its dignity and piety[c][b],
  footnotes:
  - marker: a
    text: Or 'the trustworthy God.' The Greek adjective can denote faithfulness or trustworthiness; 'faithful' is the more direct rendering here.
    reason: lexical_alternative
  - marker: b
    text: That is, the sacred site in Jerusalem, likely the temple precinct. The Greek says simply 'the place.'
    reason: cultural_note
  - marker: c
    text: The phrase 'doing something further for the place' is indefinite in Greek and does not specify the exact action.
    reason: lexical_alternative
