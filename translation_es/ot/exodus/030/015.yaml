translation:
  language: es
  text: El rico no dará más, ni el pobre dará menos, que el medio siclo, al dar la contribución a Yahvé para hacer expiación por la vida de ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por sus almas»; el hebreo nephesh puede significar alma, ser, persona o vida. En este contexto de censo y rescate, el sentido probable es la vida o persona de cada israelita contado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָשִׁיר
  english_pob_choice: the rich
  chosen_spanish: el rico
  alternatives_spanish:
  - el hombre rico
  - el adinerado
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona aquí como sustantivo colectivo o representativo. En español, 'el rico' conserva esa fuerza natural y breve sin añadir matices ajenos.
- source_word: יַרְבֶּה
  english_pob_choice: shall not give more
  chosen_spanish: no dará más
  alternatives_spanish:
  - no aumentará
  - no aportará más
  lexicon: HALOT
  rationale: En este contexto de una cuota fija, la idea es no exceder la cantidad prescrita. 'No dará más' expresa con naturalidad la restricción legal y mantiene el paralelismo con 'no dará menos'.
- source_word: הַדַּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el humilde
  lexicon: HALOT
  rationale: El contraste es socioeconómico dentro de un pago obligatorio; 'el pobre' comunica mejor esa oposición que opciones más generales o moralizantes.
- source_word: יַמְעִיט
  english_pob_choice: shall not give less
  chosen_spanish: no dará menos
  alternatives_spanish:
  - no disminuirá
  - no reducirá
  lexicon: HALOT
  rationale: Se trata de no aportar por debajo del monto fijado. La fórmula paralela 'no dará menos' preserva la simetría jurídica del hebreo.
- source_word: מִמַּחֲצִית הַשָּׁקֶל
  english_pob_choice: than the half-shekel
  chosen_spanish: que el medio siclo
  alternatives_spanish:
  - del medio siclo
  - menos que el medio siclo
  lexicon: HALOT
  rationale: Después de la doble negación comparativa, el español pide una comparación explícita con 'que'. 'Medio siclo' mantiene el término monetario tradicional y preciso.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: the contribution to Yahweh
  chosen_spanish: la contribución a Yahvé
  alternatives_spanish:
  - la ofrenda a Yahvé
  - la aportación a Yahvé
  lexicon: HALOT
  rationale: תְּרוּמָה aquí es una contribución apartada para uso sagrado en un contexto de censo/rescate. 'Contribución' evita cargar el texto con un matiz sacrificial más fuerte de lo que el contexto exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según el estándar del proyecto, en vez de sustituirlo por un título.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer propiciación
  - para hacer atonamiento
  lexicon: HALOT
  rationale: En español, 'hacer expiación' reproduce el lenguaje cultual con dignidad y evita restringir indebidamente el sentido teológico de כפר. 'Atonamiento' sería poco idiomático.
- source_word: עַל נַפְשֹׁתֵיכֶם
  english_pob_choice: for your lives
  chosen_spanish: por sus vidas
  alternatives_spanish:
  - por sus almas
  - por sus personas
  lexicon: HALOT
  rationale: נֶפֶשׁ en este contexto apunta a la vida/persona concreta rescatada en el censo. 'Vidas' es más concreto y menos doctrinalmente cargado que 'almas'. La forma de cortesía impersonal 'sus' evita una literalidad forzada de segunda persona plural en un enunciado legal general.
- source_word: לָתֵת
  english_pob_choice: when giving
  chosen_spanish: al dar
  alternatives_spanish:
  - cuando den
  - para dar
  lexicon: HALOT
  rationale: El infinitivo hebreo marca la circunstancia del pago. 'Al dar' resulta natural en español y mantiene la relación temporal/circunstancial del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: the LORD / Yahweh (audit trail notes both the project default and the actual translation choice)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar editorial del POB en español para el Tetragrámaton, preservando el nombre propio divino y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahweh'
- issue: Sentido de נֶפֶשׁ en contexto de rescate/censo
  english_pob_reading: for your lives
  chosen_spanish_reading: por sus vidas
  alternative_spanish_readings:
  - por sus almas
  - por sus personas
  - por ustedes
  rationale: En este pasaje, נֶפֶשׁ refiere a la vida/persona de los contados, no a una afirmación antropológica abstracta. 'Vidas' conserva la concreción y la función de rescate sin imponer el término 'alma'.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
- issue: Naturaleza de תְּרוּמָה en un pago fijo de censo
  english_pob_reading: contribution
  chosen_spanish_reading: contribución
  alternative_spanish_readings:
  - ofrenda
  - aportación
  rationale: La POB en inglés opta por 'contribution' para subrayar el carácter de cuota consagrada, no de sacrificio animal. En español, 'contribución' preserva esa precisión y evita un trasfondo litúrgico excesivo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #6'
translation_notes:
  revision_awareness: La versión inglesa auditada muestra acuerdo alto y ninguna revisión aplicada; esta redacción española sigue de cerca las decisiones léxicas documentadas, manteniendo el paralelo legal del hebreo y la terminología del proyecto para YHWH, תְּרוּמָה y נֶפֶשׁ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Contribución'' se usa para תְּרוּמָה por el contexto de censo/rescate, no ''ofrenda'' como término sacrificial más cargado.'
  - '''Hacer expiación'' preserva el registro cultual sin forzar una teoría específica de la expiación.'
  - '''Vidas'' traduce נַפְשֹׁתֵיכֶם en sentido concreto de personas/vidas contadas.'
