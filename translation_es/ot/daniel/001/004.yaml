  to: jóvenes en quienes no había ningún defecto[a], de buena apariencia, hábiles en toda sabiduría, conocedores de conocimiento, entendidos en aprendizaje, y que tenían capacidad para presentarse en el palacio del rey[b], y para enseñarles la literatura[c] y la lengua de los caldeos[d].
  rationale: Se ajusta «había fuerza para estar» a «tenían capacidad para» para reflejar mejor כֹּחַ como idoneidad funcional. Se cambia «estar en el palacio del rey» por «presentarse en el palacio del rey» para conservar mejor el valor de לַעֲמֹד sin sonar torpe en español. Se añade la nota faltante sobre «literatura» para reflejar la documentación inglesa de סֵפֶר y se corrigen/anclan ordenadamente los marcadores de notas.
