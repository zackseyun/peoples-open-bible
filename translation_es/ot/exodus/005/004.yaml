review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: Faraón responde en contraste, mantiene «el pueblo», preserva la fuerza causativa de תפריעו y refleja לְסִבְלֹתֵיכֶם como una vuelta a labores opresivas. Sin embargo, hay un problema de anclaje de notas: la nota [b] está colocada sobre «Aarón», pero su contenido explica «Vayan a sus trabajos forzados», que corresponde a la frase final, no a los nombres.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero el rey de Egipto…» y «¿Por qué…?» leen bien. «Hacen que el pueblo descuide su trabajo» es aceptable, aunque algo menos directo que «aparten» o «distraigan»; aun así, conserva la intención. «Vayan a sus cargas» suena algo literal, pero es defendible por la decisión del POB de conservar la metáfora de «burdens».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales están alineadas con el rastro de auditoría inglés. Se conserva «el pueblo» y no se sobreinterpreta סבלות como «trabajo forzado» en el texto principal, dejándolo como alternativa en nota.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «Aarón» pero comenta la frase final «Vayan a sus trabajos forzados».
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase relevante. Tal como está, la nota crea confusión y no corresponde al segmento explicado.
  - severity: low
    issue: «A sus cargas» es fiel pero algo rígido en español contemporáneo.
    rationale: No es incorrecto y preserva la metáfora hebrea, pero requiere que la nota alternativa quede bien anclada para ayudar a la legibilidad.
