translation:
  language: es
  text: Por tanto, el Hades[a] y las tinieblas y la destrucción serán su herencia, y no serán hallados en el día de misericordia para los justos[b]. Pero los piadosos[c] del Señor heredarán vida con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hades» designa aquí el ámbito o la morada de los muertos; no conviene leerlo automáticamente como «infierno».
    reason: cultural_note
  - marker: b
    text: La construcción griega puede entenderse también como «en el día de la misericordia de los justos» o «en el día en que los justos reciben misericordia».
    reason: alternative_reading
  - marker: c
    text: O «devotos» o «fieles»; el griego ὅσιοι resalta a los que pertenecen a Dios con una vida de devoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Introduce la conclusión de manera natural en español y conserva el valor inferencial/resultativo del griego sin añadir contenido nuevo.
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - herencia recibida
  - patrimonio
  lexicon: BDAG
  rationale: «Herencia» reproduce bien el campo semántico de heredar/recibir como porción y suena más natural en español que un calco más pesado.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el reino de los muertos
  - la morada de los muertos
  - el sepulcro
  lexicon: BDAG
  rationale: Se conserva la transliteración para no cargar el término con el sentido pleno de «infierno»; el contexto requiere la esfera de los muertos, no una equivalencia doctrinal más amplia.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - noche
  lexicon: BDAG
  rationale: «Tinieblas» mantiene el tono bíblico y encaja mejor en la tríada con Hades y destrucción.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» es la correspondencia más directa y transparente; «perdición» sonaría más eclesiástica y menos inmediata.
- source_word: οὐχ εὑρεθήσονται
  english_pob_choice: they will not be found
  chosen_spanish: no se les hallará
  alternatives_spanish:
  - no serán hallados
  - no aparecerán
  lexicon: BDAG
  rationale: La pasiva futura se vierte de forma natural en español con impersonal/pasiva refleja, conservando la idea de exclusión o ausencia en ese día.
- source_word: ἐν ἡμέρᾳ ἐλέους δικαίων
  english_pob_choice: in the day of mercy for the righteous
  chosen_spanish: en el día de misericordia para los justos
  alternatives_spanish:
  - en el día de la misericordia de los justos
  - en el día de misericordia de los justos
  - en el día en que se muestra misericordia a los justos
  lexicon: BDAG
  rationale: La frase griega admite más de una relación genitiva; se conserva la lectura principal del POB, entendiendo a los justos como los beneficiarios de misericordia, y se usa «misericordia» como sustantivo bíblico natural en español.
- source_word: ὅσιοι
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los piadosos
  - los devotos
  - los fieles
  lexicon: BDAG
  rationale: Aunque el audit trail inglés osciló entre opciones, en español «santos» comunica de forma breve y reverente el grupo consagrado; se mantiene la tensión con «ἅγιοι» en notas, porque ὅσιοι puede también apuntar a los piadosos/devotos.
- source_word: Κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Dios
  - pertenecientes al Señor
  lexicon: BDAG
  rationale: Se conserva la genitiva directa y la terminología POB para κύριος, sin introducir una paráfrasis posesiva más larga.
- source_word: κληρονομήσουσιν ζωὴν
  english_pob_choice: will inherit life
  chosen_spanish: heredarán vida
  alternatives_spanish:
  - recibirán vida como herencia
  - poseerán vida
  lexicon: BDAG
  rationale: «Heredarán vida» mantiene el paralelismo con la herencia negativa del hemistiquio anterior y respeta el verbo de herencia del griego.
- source_word: ἐν εὐφροσύνῃ
  english_pob_choice: in gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - en alegría
  - con gozo
  lexicon: BDAG
  rationale: «Con alegría» expresa con naturalidad el dativo/preposición de modo y preserva el tono gozoso sin sonar artificial en español.
theological_decisions:
- issue: Sentido de ᾅδης
  english_pob_reading: Hades refers to the realm of the dead; it is not necessarily identical to the later, fuller sense often conveyed by hell.
  chosen_spanish_reading: Se deja «Hades» sin sustituirlo por «infierno»; en nota se aclara que designa la esfera de los muertos.
  alternative_spanish_readings:
  - infierno
  - sepulcro
  - reino de los muertos
  rationale: La elección evita importar contenido doctrinal posterior que el griego no exige. Mantener el término transliterado preserva la precisión lexical y la tensión semántica documentada por el POB.
  doctrine_reference: Preservar precisión lexical sin sobrecargar el término con doctrinas posteriores
- issue: Ambigüedad de ἐλέους δικαίων
  english_pob_reading: in the day of mercy for the righteous
  chosen_spanish_reading: en el día de misericordia para los justos
  alternative_spanish_readings:
  - en el día de la misericordia de los justos
  - en el día en que los justos reciben misericordia
  - en el día de la misericordia de los justos
  rationale: La construcción genitiva es ambigua y puede leerse de más de una manera. Se mantiene la lectura que entiende a los justos como destinatarios de misericordia, sin cerrar definitivamente la alternativa gramatical.
  doctrine_reference: Preservar la ambigüedad gramatical donde el griego lo permite
- issue: Valor de ὅσιοι Κυρίου
  english_pob_reading: the holy ones of the Lord / the godly ones of the Lord
  chosen_spanish_reading: los santos del Señor
  alternative_spanish_readings:
  - los piadosos del Señor
  - los devotos del Señor
  - los fieles del Señor
  rationale: El término designa a los dedicados a Dios con matiz de piedad/devoción. «Santos» es una solución breve y reverente en español, pero se reconoce que el campo léxico admite alternativas; la nota permite no borrar esa tensión.
  doctrine_reference: Mantener la tensión léxica entre santidad y piedad sin resolverla de forma artificial
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación revisada en ὅσιοι entre «holy ones» y «faithful ones», con una adjudicación posterior que volvió a «holy ones» por cercanía léxica. La presente versión española opta por «los santos» como equivalente reverente y breve, pero conserva en la decisión léxica y en la nota que el campo semántico incluye piedad/devoción/fidelidad. También se respeta la lectura principal de la cláusula sobre el día de misericordia, sin eliminar su ambigüedad gramatical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí el texto usa Κύριος, por eso se traduce «Señor».
  - 'Se conserva el paralelismo de herencia negativa/positiva: «su herencia» frente a «heredarán vida».'
  - No se usa «infierno» para ᾅδης; se deja transliteración con nota para evitar confundir el término con desarrollos doctrinales posteriores.
  - «Tinieblas» se eligió sobre «oscuridad» por su resonancia bíblica y por el ritmo de la tríada.
  - «Con alegría» se prefiere a «en regocijo» por naturalidad moderna, sin perder el matiz gozoso.
