revisions:
- from: Den gracias a Yahvé por su amor constante y por sus obras maravillosas para los hijos de los hombres[a][b].
  to: Den gracias a Yahvé por su amor fiel y por sus obras maravillosas a los hijos del hombre[a][b].
  rationale: Se ajusta לִבְנֵי אָדָם a «a los hijos del hombre» para conservar el modismo hebreo de forma más natural en español y más cercana al singular genérico אָדָם. Se cambia «amor constante» por «amor fiel» para reflejar mejor el matiz de lealtad de חסד sin sonar rígido. Se mantienen las notas léxicas ya justificadas por la auditoría inglesa.
