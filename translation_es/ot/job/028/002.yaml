translation:
  language: es
  text: El hierro se saca del polvo, y el cobre[a] se funde a partir de la piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bronce». El término hebreo puede referirse a cobre o bronce; aquí se prefiere «cobre» porque el contexto es la minería y la extracción del mineral.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: El sentido normal del sustantivo en hebreo bíblico es el metal hierro; en español, «hierro» reproduce esa referencia directa y mantiene la imagen material del verso.
- source_word: מֵעָפָר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - de la tierra
  - del suelo
  lexicon: HALOT
  rationale: עָפָר puede significar polvo, tierra suelta o suelo. «Polvo» conserva la imagen concreta del hebreo y la formulación poética breve del original.
- source_word: יֻקָּח
  english_pob_choice: is taken
  chosen_spanish: se saca
  alternatives_spanish:
  - se toma
  - se extrae
  lexicon: HALOT
  rationale: La pasiva de לקח es literalmente «ser tomado». En español, «se saca» expresa con naturalidad la idea de obtención desde el suelo sin alejarse del valor básico de «tomar».
- source_word: וְאֶבֶן
  english_pob_choice: and ... from stone
  chosen_spanish: de la piedra
  alternatives_spanish:
  - de la roca
  - de la piedra mineral
  lexicon: HALOT
  rationale: אֶבֶן significa «piedra». En español, el complemento «de la piedra» hace fluida la segunda cola y conserva el sentido de material rocoso del que se obtiene el metal.
- source_word: יָצוּק
  english_pob_choice: is smelted
  chosen_spanish: se funde
  alternatives_spanish:
  - se derrite
  - se vacía
  - se funde y se refina
  lexicon: HALOT
  rationale: יצק puede significar verter, vaciar, fundir o fundir metal según el contexto. Aquí, con el lenguaje de minería y extracción, «se funde» comunica la obtención/trabajo del metal a partir de la piedra sin forzar un giro ajeno.
- source_word: נְחוּשָׁה
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - bronce
  lexicon: HALOT
  rationale: נְחוּשָׁה/נְחֹשֶׁת puede referirse a cobre o bronce. En este contexto de minería y mena, «cobre» es la opción más precisa; «bronce» se preserva como alternativa porque la tradición inglesa suele usarla.
translation_notes:
  revision_awareness: El texto hebreo y la audit trail en inglés muestran alta concordancia y no señalan revisiones sustantivas; por eso se mantiene una traducción directa y estable, con la única nota léxica sobre נְחוּשָׁה/cobre-bronce.
  spanish_consistency_notes:
  - Se mantiene la metáfora minera del hebreo con vocabulario breve y concreto.
  - Se evita «SEÑOR» u otras sustituciones irrelevantes, ya que el versículo no contiene el Tetragrámaton.
  - «Se saca» y «se funde» conservan el paralelismo verbal del original sin sobreinterpretación.
