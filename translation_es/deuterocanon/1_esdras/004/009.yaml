translation:
  language: es
  text: 'Y dijeron[a]: «Cuando el rey se levante, le darán el documento; y a quien el rey y los tres nobles de Persia juzguen que su palabra[b] es más sabia, a él se le dará la victoria, como está escrito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la carta» o «el escrito» para τὸ γράμμα.
    reason: lexical_alternative
  - marker: b
    text: O «su discurso es más sabio» o «su argumento es más sabio» para ὁ λόγος αὐτοῦ σοφώτερος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθῇ
  english_pob_choice: rises
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - despierte
  lexicon: BDAG
  rationale: El contexto apunta al rey incorporándose o estando listo para actuar; «se levante» conserva la imagen verbal sin añadir una precisión innecesaria sobre sueño o postura.
- source_word: τὸ γράμμα
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - la carta
  - el escrito
  lexicon: BDAG
  rationale: γράφμμα puede referirse a una pieza escrita destinada a revisión oficial. «Documento» es natural en español y no reduce el sentido a una carta personal.
- source_word: κρίνῃ
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - decidan
  - determinen
  lexicon: BDAG
  rationale: El verbo mantiene el matiz de evaluación formal por parte del rey y los nobles; «juzguen» preserva esa fuerza adjudicativa.
- source_word: μεγιστᾶνες
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  lexicon: LSJ
  rationale: El término designa dignatarios persas de alto rango; «nobles» comunica bien ese estatus en español contemporáneo.
- source_word: ὁ λόγος αὐτοῦ σοφώτερος
  english_pob_choice: his word is wiser
  chosen_spanish: su palabra es más sabia
  alternatives_spanish:
  - su discurso es más sabio
  - su argumento es más sabio
  - su caso es más sabio
  lexicon: BDAG
  rationale: Aunque λόγος puede abarcar discurso, argumento o asunto, «palabra» sigue más de cerca la elección inglesa revisada y funciona en español sin forzar el registro; «más sabia» conserva el comparativo.
- source_word: τὸ νῖκος
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - el triunfo
  - el premio
  lexicon: LSJ
  rationale: νῖκος significa victoria/conquista; aquí se trata del galardón adjudicado en la competencia, por lo que «la victoria» es directo y fiel.
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - como ha sido escrito
  lexicon: BDAG
  rationale: La fórmula pasiva perfecta se reproduce con la expresión española habitual y formal «como está escrito».
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se prefirió «documento» para τὸ γράμμα por naturalidad y se redujo «argument» a una opción más cercana a λόγος. La versión española sigue esa revisión, pero conserva la amplitud semántica con nota para ὁ λόγος αὐτοῦ σοφώτερος.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se usa «nobles» como término consistente para μεγιστᾶνες en un contexto persa.
  - Se preserva la distinción entre «palabra» y las alternativas de sentido más amplias mediante nota, sin sobreexplicar en el texto principal.
