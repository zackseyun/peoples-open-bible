translation:
  language: es
  text: 'Y el territorio de los hijos de Efraín por sus clanes fue así: el límite de su heredad[a] por el oriente era Atarot-adar, hasta Bet-horón superior.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el límite de su heredad por el oriente era Atarot-adar'. El hebreo permite expresar esta cláusula con una ligera variación en el orden y en la forma de la frase sin cambiar el sentido geográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: territory / border
  chosen_spanish: territorio / límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En la primera aparición, el contexto tribal permite 'territorio' para expresar la extensión asignada; en la segunda, con la heredad y seguido de topónimos, 'límite' refleja mejor la línea fronteriza. Mantengo la variación contextual documentada por el POB inglés.
- source_word: בְּנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - el pueblo de Efraín
  lexicon: HALOT
  rationale: '''Hijos'' conserva la forma filial del hebreo de manera transparente y natural en español bíblico, sin neutralizar la referencia tribal.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: '''Clanes'' comunica bien la subdivisión tribal implicada por משפחה en este contexto de repartición territorial. ''Por sus clanes'' mantiene la relación distributiva del hebreo.'
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión asignada
  lexicon: HALOT
  rationale: En Josué, נחלה suele referirse a la porción de tierra asignada. 'Heredad' preserva mejor esa carga covenantal y territorial en español bíblico que 'herencia', que puede sonar más abstracta.
- source_word: מִזְרָחָה
  english_pob_choice: on the east
  chosen_spanish: por el oriente
  alternatives_spanish:
  - al oriente
  - hacia el oriente
  lexicon: HALOT
  rationale: El adverbio direccional en descripciones de límites se expresa con naturalidad en español como 'por el oriente', manteniendo la orientación geográfica sin sobreinterpretar la sintaxis.
- source_word: עַטְרוֹת אַדָּר
  english_pob_choice: Ataroth-addar
  chosen_spanish: Atarot-adar
  alternatives_spanish:
  - Atarot Addar
  lexicon: HALOT
  rationale: Es un topónimo y debe transliterarse. 'Atarot-adar' respeta la forma compuesta y resulta más natural para lectores en español que conservar la grafía inglesa.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - a
  lexicon: HALOT
  rationale: En un enunciado de frontera, 'hasta' es la forma idiomática y precisa para marcar el alcance del límite.
- source_word: בֵּית חוֹרֹן עֶלְיוֹן
  english_pob_choice: Upper Beth-horon
  chosen_spanish: Bet-horón la de arriba
  alternatives_spanish:
  - Bet-horón superior
  - Bet-horón el de arriba
  lexicon: HALOT
  rationale: Conservo el nombre del lugar y vierto עֶלְיוֹן con una expresión transparente. 'La de arriba' evita introducir una terminología más técnica que podría sonar ajena, y mantiene la distinción frente a Bet-horón la de abajo.
theological_decisions:
- issue: Tribu, heredad y límites territoriales como lenguaje de asignación divina
  english_pob_reading: The verse describes the allotted territory of Ephraim in geographic terms without explicit theological comment.
  chosen_spanish_reading: La versión española mantiene el lenguaje de asignación territorial ('territorio', 'límite', 'heredad') sin añadir interpretación devocional.
  alternative_spanish_readings:
  - su posesión
  - su territorio asignado
  rationale: El hebreo presenta una delimitación geográfica. 'Heredad' conserva la idea de porción asignada dentro del marco de las promesas y repartos de Josué, sin convertir el texto en una paráfrasis teológica.
  doctrine_reference: Josué 13–21; reparto de la tierra por heredad
- issue: Forma masculina representativa en 'hijos'
  english_pob_reading: The sons of Ephraim
  chosen_spanish_reading: los hijos de Efraín
  alternative_spanish_readings:
  - las familias de Efraín
  - el pueblo de Efraín
  rationale: El masculino plural del hebreo se conserva porque funciona de manera representativa para la tribu. No hay base textual para sustituirlo por una formulación inclusiva que borre la estructura del original.
  doctrine_reference: Principios de equivalencia formal y fidelidad al número/género gramatical del hebreo
translation_notes:
  revision_awareness: Concordé la redacción con el pasaje hebreo y con el audit trail inglés de alta concordancia; no se requirieron revisiones textuales especiales ni notas de variante manuscrita.
  spanish_consistency_notes:
  - Se usa 'Efraín' con acento gráfico y el topónimo compuesto 'Bet-horón' con guion para facilitar la lectura.
  - Se mantuvo la distinción contextual entre 'territorio', 'límite' y 'heredad' para reflejar el cambio de matiz del hebreo גְּבוּל.
  - Se evitó 'SEÑOR' porque no aparece el Tetragrámaton ni una sustitución de κύριος; este versículo es puramente territorial.
  - La puntuación reproduce una cadencia natural en español bíblico moderno sin introducir explicaciones ajenas al texto.
