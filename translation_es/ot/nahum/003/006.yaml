translation:
  language: es
  text: Y arrojaré sobre ti[a] inmundicias, y te trataré con desprecio, y te convertiré en un espectáculo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abominaciones» o «cosas detestables» para «inmundicias». El término hebreo suele referirse a algo ritualmente o moralmente detestable; aquí probablemente conserva el sentido concreto de desecho repugnante usado para avergonzar públicamente a Nínive.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «te haré un objeto para ser mirado» o «te pondré como algo para ser mirado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁלַכְתִּי
  english_pob_choice: I will throw
  chosen_spanish: arrojaré
  alternatives_spanish:
  - tiraré
  - lanzaré
  - echaré
  lexicon: HALOT
  rationale: El hebreo indica una acción deliberada de lanzar o arrojar. «Arrojaré» conserva esa fuerza y suena más solemne que «tiraré», sin perder naturalidad en español.
- source_word: עָלַיִךְ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - encima de ti
  - contra ti
  lexicon: HALOT
  rationale: La preposición על expresa aquí la idea de colocar algo encima de la ciudad personificada. «Sobre ti» mantiene el valor espacial y el tono profético.
- source_word: שִׁקֻּצִים
  english_pob_choice: filth
  chosen_spanish: inmundicias
  alternatives_spanish:
  - abominaciones
  - cosas detestables
  - basura
  lexicon: HALOT
  rationale: Aunque el término puede designar algo abominable o detestable, en este contexto la imagen es de suciedad o desecho arrojado para humillar públicamente. «Inmundicias» conserva mejor la concreción y el efecto de vergüenza que «abominaciones», que suena más abstracto.
- source_word: וְנִבַּלְתִּיךְ
  english_pob_choice: treat you with contempt
  chosen_spanish: te trataré con desprecio
  alternatives_spanish:
  - te humillaré
  - te deshonraré
  - te afrentaré
  lexicon: HALOT
  rationale: El verbo en piel comunica deshonra, envilecimiento o trato vergonzoso. «Trataré con desprecio» preserva el acto activo de humillar y la idea de desprecio sin cargar el texto con una formulación más interpretativa.
- source_word: וְשַׂמְתִּיךְ
  english_pob_choice: make you
  chosen_spanish: te convertiré en
  alternatives_spanish:
  - te haré
  - te pondré como
  - te dejaré como
  lexicon: HALOT
  rationale: שׂים con un predicativo puede expresarse en español como «hacer» o «convertir en». «Te convertiré en» prepara naturalmente la frase final y transmite el cambio de estado.
- source_word: כְּרֹאִי
  english_pob_choice: a spectacle
  chosen_spanish: un espectáculo
  alternatives_spanish:
  - algo para ser mirado
  - un objeto de mira
  - una cosa para ver
  lexicon: HALOT
  rationale: La expresión hebrea alude literalmente a «algo para ser visto» o «para ser mirado». «Un espectáculo» comunica la exposición pública y la vergüenza en español contemporáneo, y el matiz más literal queda disponible en la nota.
theological_decisions:
- issue: Imaginería profética de humillación pública para Nínive personificada
  english_pob_reading: Retain the shame/judgment imagery without softening it, while expressing it in readable modern English.
  chosen_spanish_reading: Mantener la imagen de juicio y humillación pública sin suavizarla, en español claro y digno.
  alternative_spanish_readings:
  - Usar un lenguaje más arcaico y literal, como «arrojaré sobre ti cosas abominables» y «te haré vil»
  - Suavizar la imagen con expresiones menos intensas
  rationale: El versículo no exige armonización doctrinal; su fuerza está en la deshonra pública y el juicio divino. La versión española conserva esa tensión sin introducir connotaciones sexuales ni sacrificar inteligibilidad.
  doctrine_reference: Principio de equivalencia óptima; preservar el sentido llano del texto fuente sin paráfrasis excesiva
translation_notes:
  revision_awareness: Sin cambios respecto al último pase de revisión; la concordancia con el texto fuente y con la auditoría inglesa es alta, y no se registraron revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se conserva la distinción entre imagen concreta de suciedad y la alternativa más abstracta «abominaciones» en la nota.
  - «Espectáculo» se usa en sentido de exposición pública vergonzosa, no en sentido positivo de entretenimiento.
  - La segunda persona singular refleja la personificación de Nínive como mujer en el hebreo.
