    issue: La nota al pie alternativa en español no refleja con suficiente naturalidad la alternativa literal documentada.
    rationale: «Me tratan con enojo» suena poco idiomático en español y puede malinterpretarse como un trato airado hacia el hablante, en vez de preservar la ambigüedad difícil de la frase griega. Conviene ajustar la redacción de la nota sin cambiar su función.
  - severity: low
    issue: Redundancia instrumental en «por medio de terribles castigos ... mediante torturas».
    rationale: Aunque es fiel, la secuencia resulta algo pesada en español. Reexpresar una de las dos frases mantiene el sentido y mejora la lectura.
