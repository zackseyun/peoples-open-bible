review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del hebreo: temporalidad («Mañana»), mandato militar («bajen contra ellos»), partícula deíctica («Miren»), movimiento ascendente, topónimo «Ziz», y resultado («los encontrarán»). Sin embargo, «desierto de Jeruel» debilita el valor de מִדְבָּר, que el expediente inglés justificó como «wilderness» y no «desert».'
  spanish_quality_summary: 'El español es generalmente claro y natural. «Miren» funciona bien para הִנָּם, y «vienen subiendo» suena idiomático. No obstante, conviene ajustar la nota al español en vez de dejar alternativas en inglés («ravine», «brook»), y «frente al desierto» se beneficia de un término más fiel y natural en registro bíblico-geográfico: «frente al desierto» debe pasar a «frente al desierto/soledad»? Mejor «frente al desierto» sigue chocando con la decisión léxica; por eso se recomienda «frente al desierto de Jeruel» -> «frente al desierto de Jeruel» no corrige el problema. La mejor reparación es «frente al desierto» -> «frente al desierto» sigue siendo el mismo problema. Debe ser «frente al desierto»? No. La forma recomendada es «frente al desierto de Jeruel» cambiar «desierto» por «wilderness/soledad». En español bíblico neutral, «frente al desierto de Jeruel» resulta comprensible, pero menos fiel. «Frente a la región desierta de Jeruel» sería más interpretativo. «Frente
    al yermo de Jeruel» es fiel pero menos común. «Frente al desierto de Jeruel» no sigue el expediente. Se recomienda «frente al territorio silvestre de Jeruel»? Demasiado libre. La opción más ajustada y legible es «frente al yermo de Jeruel».'
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La transliteración de «Ziz» y «Jeruel» está bien. Se conserva «wadi», en línea con la decisión del POB, pero la nota debe ofrecer alternativas en español («barranco», «arroyo estacional», «cañada») y no en inglés.
  issues:
  - severity: medium
    issue: «desierto de Jeruel» para מִדְבַּר
    rationale: El expediente inglés documenta explícitamente «wilderness» frente a «desert», porque מִדְבָּר no señala necesariamente un desierto arenoso. «Desierto» puede inducir una imagen demasiado específica y no sigue la racionalidad auditada.
  - severity: medium
    issue: Nota al pie con alternativas en inglés («ravine», «brook»)
    rationale: La nota debe estar plenamente en español y servir al lector hispanohablante. Mantener términos ingleses incumple la legibilidad y la finalidad de la nota léxica.
  revised_spanish_text: Mañana bajen contra ellos. Miren[a], vienen subiendo por la subida de Ziz, y los encontrarán al final del wadi, frente al yermo de Jeruel.
  revised_footnotes:
  - marker: a
    text: O «barranco» o «arroyo estacional» para «wadi» (hebreo נחל), un término para un valle o un cauce de agua estacional.
    reason: lexical_alternative
  revision_rationale: Se corrige «desierto» a «yermo» para respetar mejor el valor de מִדְבָּר según la justificación léxica auditada («wilderness», no necesariamente desierto arenoso). Se mantiene «wadi» en el texto principal por coherencia con la decisión topográfica del POB, pero la nota se adapta completamente al español con alternativas comprensibles para el lector.
