translation:
  language: es
  text: Los anillos estarán[a] frente al marco, como alojamientos[b] para las varas, para llevar la mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como "junto al marco" o "correspondientes al marco". La preposición hebrea indica relación espacial sin definir con exactitud la geometría.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "como casas para las varas"; es decir, receptáculos o alojamientos para introducir las varas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֻמַּת
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - junto a
  - correspondiente a
  lexicon: HALOT
  rationale: La construcción indica relación espacial respecto del marco, sin precisar la geometría exacta. En español, "frente a" comunica bien esa relación sin forzar una precisión que el hebreo no exige.
- source_word: הַמִּסְגֶּרֶת
  english_pob_choice: the frame
  chosen_spanish: el marco
  alternatives_spanish:
  - el borde
  - el ribete
  - la estructura
  lexicon: HALOT
  rationale: En el contexto del mobiliario del tabernáculo, מִסְגֶּרֶת designa el elemento estructural que enmarca la mesa. "Marco" es natural en español y conserva la idea de estructura perimetral.
- source_word: הַטַּבָּעֹת
  english_pob_choice: the rings
  chosen_spanish: los anillos
  alternatives_spanish:
  - las argollas
  - los aros
  lexicon: HALOT
  rationale: El término estándar en español para los aros metálicos de transporte es "anillos"; "argollas" también sería posible, pero "anillos" mantiene mejor la correspondencia léxica general.
- source_word: לְבָתִּים
  english_pob_choice: as holders
  chosen_spanish: como soportes
  alternatives_spanish:
  - como receptáculos
  - como alojamientos
  - como casquillos
  lexicon: HALOT
  rationale: Literalmente la expresión sugiere "casas" o receptáculos para las varas. "Como soportes" comunica la función práctica en español sin perder la idea de pieza que recibe y sostiene las varas.
- source_word: לְבַדִּים
  english_pob_choice: for the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los bastones
  - las pértigas
  - los varales
  lexicon: HALOT
  rationale: En el lenguaje del tabernáculo, בַּדִּים son las varas para el transporte. "Varas" es la opción más natural y tradicional en español bíblico, y evita un tecnicismo innecesario.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: con que se llevará
  alternatives_spanish:
  - para llevar
  - para transportar
  - para cargar
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: las varas sirven para llevar la mesa. "Con que se llevará" reproduce bien la función instrumental en una frase fluida y fiel.'
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de la presencia
  - el altar de la mesa
  - la tabla
  lexicon: HALOT
  rationale: En este pasaje el objeto es la mesa sagrada. "Mesa" es el equivalente directo y claro; no se añade aquí la especificación tradicional porque no está en el hebreo de este versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo WLC y el audit trail inglés de la POB. Se mantiene la ambigüedad espacial de לְעֻמַּת mediante una nota, y se conserva la función instrumental de las varas sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se prefirió "mesa" para הַשֻּׁלְחָן en coherencia con el uso contextual de mobiliario sagrado.
  - '"Varas" preserva el registro bíblico común en español y corresponde al campo semántico de los elementos de transporte del tabernáculo.'
  - No se introdujo una glosa confesional adicional para la mesa, porque el versículo no la explicita y la POB busca transparencia textual.
