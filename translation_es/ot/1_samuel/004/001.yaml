revisions:
- from: Y la palabra de Samuel llegó a todo Israel[a]. Entonces Israel salió a enfrentar a los filisteos en batalla, y acamparon en Ebenezer[b], mientras los filisteos acamparon en Afec.
  to: Y la palabra de Samuel llegó a todo Israel[a]. Entonces Israel salió al encuentro de los filisteos para la batalla, y acamparon en Ebenezer[b], mientras los filisteos acamparon en Afec.
  rationale: Se reemplaza 'a enfrentar a los filisteos' por 'al encuentro de los filisteos' para reflejar mejor לִקְרַאת sin sobreinterpretarlo. También se usa 'para la batalla' para expresar con naturalidad לַמִּלְחָמָה y evitar la redundancia de 'enfrentar ... en batalla'.
  reviewer_model: gpt-5.4
