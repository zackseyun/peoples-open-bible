translation:
  language: es
  text: Y Alejandro reinó doce años, y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: BDAG
  rationale: El aoristo de βασιλεύω expresa el ejercicio de la realeza. «Reinó» es el equivalente natural en español histórico y conserva la concisión narrativa del griego.
- source_word: ἔτη δώδεκα
  english_pob_choice: twelve years
  chosen_spanish: doce años
  alternatives_spanish:
  - durante doce años
  lexicon: BDAG
  rationale: El acusativo indica duración. En español, tras «reinó», la frase breve «doce años» suena natural y mantiene la cercanía al griego, como en la elección inglesa.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω es directo y sin matiz eufemístico. «Murió» conserva esa sobriedad narrativa mejor que alternativas más suaves.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - entonces ... y
  - y entonces
  lexicon: BDAG
  rationale: La repetición de καί enlaza dos acciones históricas de manera simple. Mantener «y ... y» preserva el estilo paratáctico del griego sin añadir inferencias temporales.
- source_word: Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_spanish: Alejandro
  alternatives_spanish:
  - Alexandro
  lexicon: LSJ
  rationale: 'El nombre propio se adapta a la forma española establecida y reconocible en castellano bíblico e histórico: «Alejandro».'
