    reason: alternative_reading
  - marker: b
    text: 'O: «contra nosotros» o «sobre nosotros».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción base porque es fiel al hebreo y al POB inglés, pero se corrige la nota b para que refleje exactamente la alternativa léxica de עָלֵינוּ, y se aligera 'sumamente airado' a 'muy airado' para una lectura más natural sin perder el registro elevado.
