translation:
  language: es
  text: Él ordenó sus obras para siempre, y sus comienzos[a] para sus generaciones; no tuvieron hambre ni se cansaron, y no cesaron en sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus dominios». El griego ἀρχὰς puede significar «comienzos», pero en este contexto también puede entenderse como funciones o esferas asignadas dentro de la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκόσμησεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - dispuso
  - arregló
  - adornó
  lexicon: LSJ
  rationale: En este contexto sapiencial y cosmológico, el verbo describe poner en orden las obras creadas. «Ordenó» transmite organización y propósito sin introducir la idea decorativa de «adornó».
- source_word: εἰς αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para la edad
  lexicon: LSJ
  rationale: La frase expresa permanencia duradera. «Para siempre» es natural en español y conserva el sentido de continuidad indefinida.
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - las cosas que hizo
  lexicon: LSJ
  rationale: Aquí se refiere a las obras creadas por Dios. «Sus obras» mantiene cercanía al griego y funciona bien en español.
- source_word: τὰς ἀρχὰς αὐτῶν
  english_pob_choice: their beginnings
  chosen_spanish: sus comienzos
  alternatives_spanish:
  - sus principios
  - sus dominios
  - sus gobernantes
  lexicon: LSJ
  rationale: La revisión inglesa reciente favorece «beginnings» por precisión léxica. En español, «comienzos» preserva esa lectura literal y evita imponer «dominios», que sería demasiado interpretativo.
- source_word: εἰς γενεὰς αὐτῶν
  english_pob_choice: for their generations
  chosen_spanish: para sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a través de sus generaciones
  lexicon: LSJ
  rationale: La expresión señala duración a través de sucesivas generaciones. «Para sus generaciones» sigue de cerca la sintaxis del griego y es comprensible en español.
- source_word: οὔτε ἐπείνασαν
  english_pob_choice: they neither hungered
  chosen_spanish: no tuvieron hambre
  alternatives_spanish:
  - ni hambrientaron
  - ni padecieron hambre
  - ni tuvieron hambre
  lexicon: LSJ
  rationale: En español, el verbo simple «hambrear» no resulta natural en este contexto. «No tuvieron hambre» comunica claramente la negación del hambre, como requiere el paralelismo.
- source_word: οὔτε ἐκοπίασαν
  english_pob_choice: nor grew weary
  chosen_spanish: ni se cansaron
  alternatives_spanish:
  - ni se fatigaron
  - ni se agotaron
  lexicon: LSJ
  rationale: El verbo indica no quedar exhaustos en el cumplimiento de su función. «Ni se cansaron» es idiomático y conserva el contraste con el hambre.
- source_word: οὐκ ἐξέλιπον
  english_pob_choice: did not cease
  chosen_spanish: no cesaron
  alternatives_spanish:
  - no faltaron
  - no se detuvieron
  - no desfallecieron
  lexicon: LSJ
  rationale: El sentido es que no dejaron de llevar a cabo su actividad. «No cesaron» reproduce bien la fuerza verbal del original.
- source_word: ἀπὸ τῶν ἔργων αὐτῶν
  english_pob_choice: from their works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus tareas
  - de su actividad
  lexicon: LSJ
  rationale: 'La preposición con genitivo expresa separación: no dejaron sus obras ni cesaron en ellas. «De sus obras» es literal y transparente en español.'
theological_decisions:
- issue: Sentido de τὰς ἀρχὰς αὐτῶν
  english_pob_reading: The phrase speaks of God assigning enduring spheres or domains to his works within creation, but the revision note preferred 'beginnings' for lexical accuracy.
  chosen_spanish_reading: sus comienzos
  alternative_spanish_readings:
  - sus dominios
  - sus principios
  rationale: 'Para el español de esta nota, se mantiene la lectura más cercana al ajuste final del audit trail: ἀρχὰς como «comienzos». Aunque «dominios» podría sugerir esferas asignadas, esa interpretación es más explicativa que textual; «sus comienzos» conserva la ambigüedad léxica sin forzarla.'
  doctrine_reference: sabiduría de la creación; orden providencial
- issue: Negaciones coordinadas en la descripción de las obras
  english_pob_reading: they neither hungered nor grew weary, and they did not cease from their works.
  chosen_spanish_reading: no tuvieron hambre ni se cansaron, y no cesaron de sus obras.
  alternative_spanish_readings:
  - ni tuvieron hambre ni se fatigaron, y no dejaron de sus obras
  - no padecieron hambre ni se fatigaron, y no cesaron en sus obras
  rationale: 'La triple negación española conserva el paralelismo del griego sin alterar el contenido: ausencia de hambre, de cansancio y de interrupción en su actividad. Se evita una paráfrasis que suavice la fuerza de la secuencia.'
  doctrine_reference: constancia de las criaturas en el orden creado
translation_notes:
  revision_awareness: El audit trail inglés pasó de «their dominions» a «their beginnings» por revisión léxica; la redacción española sigue esa última decisión y evita introducir una interpretación más fuerte que el texto griego y la revisión final no exigen.
  spanish_consistency_notes:
  - Se usó «obras» para τὰ ἔργα αὐτοῦ de forma uniforme.
  - Se mantuvo «para siempre» para εἰς αἰῶνα, evitando variantes más abstractas.
  - «Sus comienzos» conserva la ambigüedad de ἀρχάς sin reemplazarla por terminología eclesiástica.
  - La coordinación negativa en español sigue el paralelismo del griego y suena natural en lectura pública.
