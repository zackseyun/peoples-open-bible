translation:
  language: es
  text: ¿Qué es el hombre[a], para que sea puro[b], o uno nacido de mujer, para que sea justo[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué es un ser humano...?» El hebreo singular «hombre» tiene sentido genérico y se refiere a la humanidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «limpio» para «puro». El hebreo puede denotar limpieza o pureza en sentido moral.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «recto», «en lo justo» o «justificado» para «justo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What is
  chosen_spanish: ¿Qué es
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: La pregunta retórica en español se naturaliza como «¿Qué es...?» y conserva la estructura interrogativa de la fuente sin añadir interpretación.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el mortal
  lexicon: HALOT
  rationale: «Hombre» mantiene el singular representativo y la fuerza genérica del hebreo אֱנוֹשׁ; en español puede abarcar a la humanidad en este contexto poético sin perder la resonancia de fragilidad humana.
- source_word: יִזְכֶּה
  english_pob_choice: should be pure
  chosen_spanish: sea puro
  alternatives_spanish:
  - sea limpio
  - sea inocente
  - sea puro moralmente
  lexicon: HALOT
  rationale: '«Puro» recoge mejor en español la amplitud semántica de זכה: pureza moral con posible trasfondo de limpieza/cleanness, sin estrecharlo a un sentido meramente físico.'
- source_word: וְכִי
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  - y que
  lexicon: HALOT
  rationale: El paralelismo retórico pide una segunda cláusula equivalente; «o» refleja mejor la coordinación alternativa del hebreo en español natural.
- source_word: יִצְדַּק
  english_pob_choice: should be righteous
  chosen_spanish: sea justo
  alternatives_spanish:
  - sea recto
  - sea declarado justo
  - sea en el derecho
  lexicon: HALOT
  rationale: '«Justo» conserva el campo semántico de צדק en un contexto sapiencial: rectitud/justicia moral. En español suena más natural que una formulación forense, que introduciría una precisión doctrinal no requerida por el verso.'
- source_word: יְלוּד אִשָּׁה
  english_pob_choice: one born of a woman
  chosen_spanish: el nacido de mujer
  alternatives_spanish:
  - uno nacido de mujer
  - el que nace de mujer
  - el hijo de mujer
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para la humanidad en su condición frágil y mortal. «El nacido de mujer» preserva la concisión y el carácter idiomático del original en español bíblico actual.
theological_decisions:
- issue: Alcance genérico de אֱנוֹשׁ y יְלוּד אִשָּׁה
  english_pob_reading: Representative singular 'man' and 'one born of a woman' referring to humanity generally
  chosen_spanish_reading: Singular representativo masculino («el hombre», «el nacido de mujer») con alcance genérico para la humanidad
  alternative_spanish_readings:
  - «el ser humano» / «quien nace de mujer»
  - «la humanidad»
  rationale: Se conserva la forma singular masculina del hebreo, que funciona genéricamente. Esto mantiene la referencia a la humanidad sin neutralizar la elección lexical de la fuente ni borrar la imagen poética del modismo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Matiz moral frente a matiz forense en יִצְדַּק
  english_pob_reading: 'Moral/state language: ''be righteous'''
  chosen_spanish_reading: 'Lenguaje moral/de estado: «sea justo»'
  alternative_spanish_readings:
  - «sea justificado»
  - «esté en lo justo»
  rationale: En este contexto sapiencial, Elifaz subraya la imposibilidad humana de alcanzar justicia/pureza ante Dios. «Sea justo» transmite la cualidad moral sin convertir el pasaje en una formulación técnica de justificación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Relación entre pureza y justicia en el paralelismo
  english_pob_reading: '''pure'' / ''righteous'' as parallel moral terms'
  chosen_spanish_reading: «puro» / «justo» como pareja paralela de cualidades morales
  alternative_spanish_readings:
  - «limpio» / «recto»
  - «inocente» / «justificado»
  rationale: El paralelismo hebreo une dos evaluaciones de la condición humana. En español, «puro» y «justo» preservan la distinción sin perder la cercanía semántica que tiene la línea original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión final auditada: no hubo cambios posteriores que afectaran el sentido de la línea hebrea ni la elección inglesa base. Se ha mantenido la equivalencia óptima, conservando el paralelismo retórico y las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa «hombre» con valor genérico, coherente con el tratamiento POB de אֱנוֹשׁ.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Puro» y «justo» conservan la amplitud semántica sin cargar el verso con tecnicismos doctrinales.
  - La estructura interrogativa y el paralelismo se mantienen de forma transparente en español.
