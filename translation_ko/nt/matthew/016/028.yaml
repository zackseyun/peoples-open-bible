  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ⸀ὅτι εἰσίν τινες ⸂τῶν ὧδε ἑστώτων⸃ οἵτινες οὐ μὴ γεύσωνται θανάτου ἕως ἂν ἴδωσιν τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐν τῇ βασιλείᾳ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/028.yaml
  text: 'Truly I tell you[c][b][a], there are some standing here who will certainly not taste death until they see the Son of Man coming in his kingdom.'
translation:
  language: ko
  text: '「진실로 너희에게 말한다. 여기에 서 있는 사람들 가운데 어떤 이들은 인자가 자기 나라로 오는 것을 보기 전에는 결코 죽음을 맛보지 않을 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「결코 죽음을 맛보지 않으리라」. 헬라어는 강조 부정 형식을 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 「인자가 자기 나라로 오는 것」은 변모, 부활/승귀, 예루살렘 심판, 또는 최후의 재림을 가리킬 수 있다. 본문 자체는 어느 사건인지 명시하지 않는다.
    reason: cultural_note
  - marker: c
    text: 또는 「자기 통치 안에」 / 「자기 왕적 다스림 안에」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I tell you
  chosen_korean: 진실로 너희에게 말한다
  lexicon: BDAG
  rationale: 마태 특유의 정형 도입. 한국어 정착어로 옮긴다.
- source_word: οὐ μὴ γεύσωνται θανάτου
  english_pob_choice: will certainly not taste death
  chosen_korean: 결코 죽음을 맛보지 않을 것이다
  lexicon: BDAG
  rationale: 강조 부정 + 부정과거 가정법. 「결코 ... 않을 것이다」로 그 강조를 살린다.
