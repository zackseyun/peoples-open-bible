lexical_decisions:
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  alternatives_spanish:
  - Elíab
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español con forma reconocible y transparente. Se puede acentuar como Elíab, pero la forma sin tilde mantiene la continuidad con la tradición de transliteración bíblica en español y evita introducir una vocal tónica no segura en el nombre.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - era su hijo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo en constructo con sufijo posesivo para expresar filiación. En español, 'su hijo' comunica la relación genealógica de manera natural y conserva el paralelo repetido de la cadena, sin añadir un verbo que el hebreo no tiene.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroham
  alternatives_spanish:
  - Yeroham
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración tradicional en español como forma auditivamente reconocible.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elcaná
  lexicon: HALOT
  rationale: Nombre propio hebreo. En español, 'Elcaná' refleja mejor la pronunciación natural y evita la terminación inglesa '-ah'. La tilde marca la acentuación final en la forma adaptada al español.
translation_notes:
  revision_awareness: El contexto inglés POB traduce la cadena genealógica con 'his son' de manera repetida para preservar la forma hebrea; el español sigue esa misma estructura con 'su hijo' y no introduce términos interpretativos adicionales. No hubo revisiones textuales en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene una sintaxis genealógica breve y paratáctica, acorde con una lista de descendencia.
  - Los nombres propios se transliteran de forma consistente y no se reemplazan por equivalentes eclesiásticos o castellanos no atestiguados en el texto base.
  - No se añadió puntuación explicativa ni verbo copulativo para no suavizar la concisión del hebreo.
