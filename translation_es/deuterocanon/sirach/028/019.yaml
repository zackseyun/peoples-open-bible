review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y preserva bien la cadena metafórica: resguardo/protección, pasar por el furor, yugo, cadenas. También acierta al mantener el referente femenino del contexto anterior. Sin embargo, ''arrastró su yugo'' no refleja bien οὐχ εἵλκυσεν τὸν ζυγὸν αὐτῆς en este contexto: en español sugiere más bien ser forzado a arrastrar algo, mientras el griego/POB apunta a ''tirar de'' o asumir el yugo. Además, la sintaxis mejora si se repite ''el que'' en la última cláusula para mantener el paralelismo del original.'
  spanish_quality_summary: 'El texto es legible y digno, con buen tono sapiencial. ''Bienaventurado'' funciona, aunque ''dichoso'' también sería posible. ''Fue resguardado de ella'' es aceptable, pero ''ha sido resguardado'' sonaría más natural si se quisiera acercar al inglés; no es necesario cambiarlo. Los puntos a reparar son principalmente idiomáticos y de precisión metafórica: ''arrastró su yugo'' resulta torpe y semánticamente desviado; ''tiró de su yugo'' es más fiel, aunque ''llevó su yugo'' también sería idiomático. Se prefiere conservar la nota sobre ''ella''.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente activados aquí. La conservación de la personificación femenina con ''ella'' está bien justificada y es compatible con la filosofía POB. ''Yugo'' y ''cadenas'' coinciden con las decisiones léxicas auditadas. El único desajuste importante es εἵλκυσεν: el inglés POB documentó ''drawn'', no ''dragged''; por eso ''arrastró'' debe corregirse.'
  issues:
  - severity: medium
    issue: '''arrastró su yugo'' no representa bien εἵλκυσεν'
    rationale: El verbo griego aquí fue auditado como 'drawn', no 'dragged'. En español, 'arrastrar un yugo' suena a cargarlo penosamente más que a 'tirar de' o tomar sobre sí ese yugo. Esto altera la imagen metafórica de asumir la esclavitud.
  - severity: low
    issue: Falta de paralelismo completo en la última cláusula
    rationale: El original encadena tres relativas con ὃς ... ὃς ... καὶ. En español, repetir 'el que' antes de 'no fue atado' mejora claridad y ritmo sapiencial sin añadir contenido.
  revised_spanish_text: Bienaventurado el que fue resguardado de ella[a], el que no pasó por su furor, el que no tiró de su yugo, y el que no fue atado en sus cadenas.
  revised_footnotes:
  - marker: a
    text: El griego usa pronombres femeninos en todo el versículo, en referencia a la lengua destructiva del contexto anterior; se conserva 'ella' para reflejar esa personificación.
    reason: lexical_alternative
  revision_rationale: Se corrige 'arrastró' por 'tiró de' para ajustarse mejor a εἵλκυσεν y a la decisión auditada en inglés ('drawn'). También se añade 'el que' en la última cláusula para mantener el paralelismo y la fluidez del español. Se conserva la personificación femenina con 'ella' y su nota, porque en español es natural y hace visible la referencia contextual del griego.
