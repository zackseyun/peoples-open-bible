translation:
  language: es
  text: Los sabios guardan el conocimiento[a][b], pero la boca del necio está cerca de la ruina[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Los sabios guardan el conocimiento, y la boca del necio acerca la ruina». La conjunción hebrea puede leerse como simple coordinación o con valor contrastivo; aquí se prefiere «pero» por el paralelismo del proverbio.'
    reason: alternative_reading
  - marker: b
    text: «Guardan» también puede expresarse como «atesoran» o «guardan en reserva», con el sentido de preservar prudentemente el conocimiento.
    reason: lexical_alternative
  - marker: c
    text: «Ruina» también puede traducirse «destrucción» o, según el sentido de מְחִתָּה, «terror»/«dismayo». El contexto favorece la idea de calamidad cercana.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכָמִים
  english_pob_choice: Wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - las personas sabias
  lexicon: HALOT
  rationale: El hebreo es plural sustantivado masculino, pero en español proverbial 'los sabios' comunica de manera natural el grupo caracterizado por la sabiduría sin forzar un masculino marcado como 'hombres'. Conserva el valor genérico y el tono sapiencial.
- source_word: יִצְפְּנוּ
  english_pob_choice: store up
  chosen_spanish: guardan
  alternatives_spanish:
  - atesoran
  - guardan en reserva
  - ocultan
  lexicon: HALOT
  rationale: En Proverbios, צפן expresa preservar/guardar con prudencia. 'Guardan' es más natural en español que una traducción mecánica como 'almacenan', y mantiene la idea de conservar conocimiento para uso sabio. 'Ocultan' sería demasiado fuerte y podría sugerir secreto indebido.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  - discernimiento
  lexicon: HALOT
  rationale: '''Conocimiento'' refleja bien דעת en este proverbio y conserva el contraste con la boca del necio. ''Sabiduría'' sería posible, pero el hebreo aquí nombra el contenido retenido por los sabios, no solo la cualidad general.'
- source_word: וּפִי
  english_pob_choice: but the mouth of
  chosen_spanish: pero la boca de
  alternatives_spanish:
  - y la boca de
  lexicon: HALOT
  rationale: Aunque ו puede ser simple 'y', el paralelismo exige contraste. En español, 'pero' comunica mejor la oposición entre la conducta de los sabios y la del necio, siguiendo la lectura contextual del POB inglés.
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: '''Nezio'' es un término sapiencial bíblico apropiado para אֱוִיל, más preciso y sobrio que ''tonto''. Mantiene la carga moral del término sin perder intelligibilidad.'
- source_word: מְחִתָּה
  english_pob_choice: ruin
  chosen_spanish: la ruina
  alternatives_spanish:
  - la destrucción
  - el desastre
  - el pavor
  lexicon: HALOT
  rationale: La POB inglesa eligió 'ruin' por el sentido contextual de calamidad inminente. 'La ruina' es la opción más directa en español y conserva la ambigüedad entre destrucción objetiva y desgracia cercana sin imponer una glosa emocional.
- source_word: קְרֹבָה
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - se acerca
  - es inminente
  lexicon: HALOT
  rationale: '''Está cerca'' refleja el predicado de proximidad de forma simple y fiel. Evita especificar más de lo que dice el hebreo, aunque la noción de inminencia queda implícita por el contexto.'
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; la versión española sigue esa lectura y no incorpora cambios editoriales adicionales.
  spanish_consistency_notes:
  - Se mantiene el estilo proverbial conciso y el paralelismo antitético.
  - No se introduce un término eclesiástico tradicional donde el hebreo y el POB inglés piden un equivalente léxico directo.
  - Se conserva la ambigüedad contextual de מְחִתָּה sin reducirla innecesariamente a una sola noción psicológica o física.
