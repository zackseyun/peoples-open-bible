translation:
  language: es
  text: 'Que se alegren y se regocijen en ti todos los que te buscan; los que aman tu salvación[a] digan siempre: «¡Sea engrandecido Yahvé![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que aman tu liberación». El hebreo תְּשׁוּעָה puede significar «salvación» o «liberación».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Yahvé sea engrandecido», una aclamación que expresa el deseo de que la grandeza de Yahvé sea reconocida abiertamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂישׂוּ
  english_pob_choice: Let ... rejoice
  chosen_spanish: Que se alegren
  alternatives_spanish:
  - Que exulten
  - Que se regocijen
  lexicon: HALOT
  rationale: El imperfecto puede tener fuerza desiderativa/jussiva en este contexto de oración. «Que se alegren» comunica bien ese matiz volitivo sin sonar forzado; además mantiene un tono natural en español bíblico contemporáneo.
- source_word: וְיִשְׂמְחוּ
  english_pob_choice: and be glad
  chosen_spanish: y se regocijen
  alternatives_spanish:
  - y se alegren
  - y estén contentos
  lexicon: HALOT
  rationale: Se preserva el paralelismo con un verbo cercano pero no idéntico. «Regocijarse» conserva la intensidad poética y distingue levemente de «alegrarse».
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - contigo
  lexicon: HALOT
  rationale: La preposición ב aquí expresa esfera o fundamento del gozo. «En ti» es la equivalencia natural en español y mantiene el foco teocéntrico del hebreo.
- source_word: כָּל מְבַקְשֶׁיךָ
  english_pob_choice: all who seek you
  chosen_spanish: todos los que te buscan
  alternatives_spanish:
  - todos tus buscadores
  - quienes te buscan
  lexicon: HALOT
  rationale: El participio sustantivado describe a personas caracterizadas por buscar a Dios. «Los que te buscan» es idiomático y fiel al valor relacional del hebreo.
- source_word: יֹאמְר֣וּ תָ֭מִיד
  english_pob_choice: say continually
  chosen_spanish: digan siempre
  alternatives_spanish:
  - digan continuamente
  - repitan sin cesar
  lexicon: HALOT
  rationale: El imperfecto con תָמִיד indica habla repetida o continua. «Digan siempre» transmite esa continuidad de forma clara y solemne en español.
- source_word: יִגְדַּ֣ל יְהוָ֑ה
  english_pob_choice: May Yahweh be magnified!
  chosen_spanish: ¡Sea engrandecido Yahvé!
  alternatives_spanish:
  - ¡Sea exaltado Yahvé!
  - ¡Grande sea Yahvé!
  lexicon: HALOT
  rationale: יִגְדַּל funciona aquí como jussivo/aclamación. «Sea engrandecido» sigue de cerca la imagen verbal de גדל y conserva la fuerza litúrgica. Se mantiene «Yahvé» como rendición del Tetragrámaton, conforme a la terminología del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El nombre divino se vierte con la forma española establecida en este proyecto, «Yahvé», para preservar el nombre propio y evitar la sustitución por un título.
- source_word: אֹהֲבֵי תְּשׁוּעָתֶךָ
  english_pob_choice: those who love your salvation
  chosen_spanish: los que aman tu salvación
  alternatives_spanish:
  - los que aman tu liberación
  - los que aman tu rescate
  lexicon: HALOT
  rationale: El participio sustantivado se traduce con una relativa natural en español. «Salvación» mantiene el rango semántico de תְּשׁוּעָה y su resonancia teológica; las alternativas reflejan la posible concreción de «liberación/rescate».
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: Se sigue la directriz del proyecto de conservar el nombre divino en transliteración. «Yahvé» evita la sustitución por un título y mantiene la referencia al nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תְּשׁוּעָה en un contexto de oración
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: En este salmo la palabra puede abarcar rescate concreto o salvación en sentido amplio. «Salvación» conserva esa amplitud sin estrechar el texto a una sola modalidad de ayuda.
  doctrine_reference: English POB lexical note on תְּשׁוּעָה
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del dossier en la lectura base: no se registran cambios aplicados; la presente redacción conserva la equivalencia óptima y la nota sobre la alternativa semántica de תְּשׁוּעָה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política terminológica del proyecto.
  - 'Se mantiene el paralelismo verbal con dos formas distintas: «se alegren» / «se regocijen», evitando homogeneizar ambos verbos.'
  - La cita queda en un registro litúrgico pero moderno, apto para lectura pública en español.
