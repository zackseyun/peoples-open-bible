- from: Así, todo hombre de Israel subió[a] de seguir a David para seguir a Seba hijo de Bicri; pero los hombres de Judá se mantuvieron firmes[b] a su rey, desde el Jordán hasta Jerusalén.
  to: Así, todos los hombres de Israel subieron[a] dejando de seguir a David para seguir a Seba hijo de Bicri; pero los hombres de Judá se aferraron[b] a su rey, desde el Jordán hasta Jerusalén.
  rationale: Se ajustó el sujeto a un plural colectivo natural en español ('todos los hombres de Israel') y se concordó el verbo. Se reformuló la transición de lealtad con 'dejando de seguir a David' para expresar claramente מֵאַחֲרֵי sin sobreinterpretar. Se cambió 'se mantuvieron firmes' por 'se aferraron' para reflejar mejor דבק y alinearse con el 'held fast' del POB inglés. También se corrigieron las notas para que expliquen el hebreo con términos más precisos y dignos.
