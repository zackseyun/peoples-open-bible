revisions:
- from: Pero cuando ella llegó[a] ante el rey, él mandó por carta que su malvado plan, que había tramado contra los judíos, volviera sobre su propia cabeza[b]; y colgaron a él y a sus hijos en el madero.
  to: Pero cuando ella llegó ante el rey[a], él mandó por carta que su malvado plan, que había tramado contra los judíos, volviera sobre su propia cabeza[b]; y lo colgaron a él y a sus hijos en el madero.
  rationale: Se corrigió una torpeza sintáctica en español (‘colgaron a él’) a una forma natural (‘lo colgaron a él’), y se rehízo la nota [a] para alinearla estrictamente con la alternativa lexical documentada por el POB inglés sin añadir interpretación contextual extra. Se mantuvo ‘madero’ con nota, porque preserva bien la referencia material de הָעֵץ y sigue siendo claro en español.
