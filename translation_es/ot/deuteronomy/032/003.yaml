translation:
  language: es
  text: Porque proclamaré el nombre de Yahvé[a]; atribuyan grandeza a nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se ha traducido «el SEÑOR». Otra forma usada en español es «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la base o motivo del enunciado; en español, «porque» expresa con naturalidad esa relación causal sin añadir interpretación.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - fama
  - renombre
  - carácter
  lexicon: HALOT
  rationale: «Nombre» conserva el sustantivo concreto del hebreo y puede abarcar la identidad revelada y la reputación de Yahvé sin reemplazarlo por una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, conforme al criterio del proyecto, en lugar de la sustitución tradicional por un título.
- source_word: אֶקְרָא
  english_pob_choice: I will proclaim
  chosen_spanish: invocaré
  alternatives_spanish:
  - proclamaré
  - llamaré
  - invocaré públicamente
  lexicon: HALOT
  rationale: En este contexto poético, el verbo puede abarcar la proclamación del nombre divino; «invocaré» conserva la fuerza ritual/declarativa del hebreo, aunque es algo más amplio que «proclamaré».
- source_word: הָבוּ
  english_pob_choice: ascribe
  chosen_spanish: atribuid
  alternatives_spanish:
  - dad
  - reconoced
  - asignad
  lexicon: HALOT
  rationale: El imperativo pide reconocer o atribuir lo que corresponde a Dios; «atribuid» preserva esa idea sin sugerir que el ser humano crea o concede la grandeza.
- source_word: גֹדֶל
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - majestad
  - excelencia
  - magnitud
  lexicon: HALOT
  rationale: «Grandeza» es el equivalente directo y funciona bien con «atribuid» en español culto y bíblico.
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: to our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - para nuestro Dios
  - a Dios nuestro
  lexicon: HALOT
  rationale: La preposición ל admite valor de dirección/objeto de la atribución; «a nuestro Dios» conserva esa relación y refleja el sufijo de primera persona plural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton; la forma española del proyecto para ese nombre propio es «Yahvé», manteniendo la distinción frente a títulos como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con el audit trail inglés: no se detectan revisiones aplicadas ni variantes textuales relevantes; se ha conservado el valor poético y exhortativo del imperativo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se prefirió «atribuid» para reflejar el imperativo plural del hebreo y la elección inglesa «ascribe».
  - «Nuestro Dios» preserva la primera persona plural del sufijo hebreo y su sentido comunitario/covenantal.
