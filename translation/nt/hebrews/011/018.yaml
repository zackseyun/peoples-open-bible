id: HEB.11.18
reference: Hebrews 11:18
source:
  edition: SBLGNT
  text: πρὸς ὃν ἐλαλήθη ὅτι Ἐν Ἰσαὰκ κληθήσεταί σοι σπέρμα,
translation:
  text: to whom it was said[a], “In Isaac your offspring will be called,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “In Isaac your seed will be called.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ὃν
  chosen: to whom
  alternatives:
  - about whom
  - with reference to whom
  lexicon: BDAG
  rationale: The idiom πρὸς + relative pronoun here introduces the person addressed or referred to in the preceding context. 'To whom' is the most natural English rendering and fits the passive verb 'it was said.'
- source_word: ἐλαλήθη
  chosen: it was said
  alternatives:
  - he was told
  - it was spoken
  lexicon: BDAG
  rationale: Aorist passive of λαλέω. English idiom prefers the impersonal passive 'it was said' rather than the more explicit but interpretive 'he was told.' This preserves the Greek's passive formulation.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what was said. In English, the quotation marks make the content clear, but the sense remains that of indirect-to-direct content introduction.
- source_word: Ἐν Ἰσαὰκ
  chosen: Through Isaac
  alternatives:
  - In Isaac
  - By Isaac
  lexicon: BDAG
  rationale: The preposition ἐν in this citation from Genesis 21:12 is idiomatically rendered 'through Isaac' in English, expressing lineal descent or means of reckoning rather than mere location. 'In Isaac' is more literal but less clear in contemporary English.
- source_word: κληθήσεταί
  chosen: will be named
  alternatives:
  - will be called
  - will be reckoned
  lexicon: BDAG
  rationale: Future passive of καλέω. In the context of offspring being designated or identified through Isaac, 'will be named' preserves the verbal link to calling/naming while remaining natural. 'Will be reckoned' captures the sense but moves further from the lexical form.
- source_word: σοι
  chosen: your
  alternatives:
  - for you
  - to you
  lexicon: BDAG
  rationale: 'The dative pronoun is possessive in sense in idiomatic English: ''your offspring.'' This is the clearest and most natural rendering.'
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: '''Offspring'' best conveys the collective singular sense in readable modern English. ''Seed'' is more formal/traditional but less transparent for many readers; ''descendants'' is possible but loses the singular collective nuance.'
