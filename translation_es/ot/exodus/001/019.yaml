translation:
  language: es
  text: 'Y las parteras dijeron a Faraón: «Porque las mujeres hebreas no son como las egipcias, pues son vigorosas[a]; antes de que la partera llegue a ellas, ya han dado a luz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vivaces» o «robustas»; el adjetivo hebreo puede enfatizar fuerza y rapidez en el parto. Algunos intérpretes lo entienden más literalmente como «semejantes a animales», pero eso es menos claro en el español contemporáneo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְןָ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - hablaron
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce discurso directo; en español, «dijeron» es la forma más natural y fiel en narrativa.
- source_word: הַמְיַלְּדֹת
  english_pob_choice: the midwives
  chosen_spanish: las parteras
  alternatives_spanish:
  - las comadronas
  - las mujeres que asistían en el parto
  lexicon: HALOT
  rationale: El sustantivo participial designa aquí a las mujeres que asistían en el parto; «parteras» es el equivalente español claro y corriente.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - a Parón
  - ante Faraón
  lexicon: HALOT
  rationale: אֶל marca el destinatario del habla; «Faraón» es la transliteración estable en español para el gobernante egipcio.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El primer כִּי introduce la explicación de las parteras; «Porque» mantiene esa fuerza causal de manera natural.
- source_word: לֹא כַנָּשִׁים הַמִּצְרִיֹּת הָעִבְרִיֹּת
  english_pob_choice: the Hebrew women are not like the Egyptian women
  chosen_spanish: las mujeres hebreas no son como las egipcias
  alternatives_spanish:
  - las mujeres hebreas no son como las mujeres egipcias
  - las hebreas no son como las egipcias
  lexicon: HALOT
  rationale: La comparación sin verbo se expresa de modo natural en español con «no son como»; se conserva el contraste entre «hebreas» y «egipcias» sin sobrecargar el texto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: El segundo כִּי refuerza la explicación de la comparación. En español, repetir «porque» es aceptable y mantiene la relación causal explícita.
- source_word: חָיוֹת
  english_pob_choice: vigorous
  chosen_spanish: vigorosas
  alternatives_spanish:
  - fuertes
  - robustas
  - ágiles
  lexicon: HALOT
  rationale: El adjetivo describe fuerza/rapidez en el parto. «Vigorosas» conserva la idea de capacidad y energía sin añadir la connotación más polémica de una lectura literal animalizante.
- source_word: הֵנָּה
  english_pob_choice: they
  chosen_spanish: son
  alternatives_spanish:
  - ellas son
  - ellas mismas son
  lexicon: HALOT
  rationale: El pronombre enfático puede quedar implícito en español sin pérdida sustancial; el predicado ya sostiene la afirmación.
- source_word: בְּטֶרֶם תָּבוֹא אֲלֵהֶן הַמְיַלֶּדֶת
  english_pob_choice: before the midwife comes to them
  chosen_spanish: antes de que la partera llegue a ellas
  alternatives_spanish:
  - antes de que la partera venga a ellas
  - antes de que llegue a ellas la partera
  lexicon: HALOT
  rationale: בטרם indica anterioridad; en español, «antes de que» + subjuntivo expresa esa prioridad temporal con naturalidad. El singular se mantiene como genérico.
- source_word: וְיָלָדוּ
  english_pob_choice: they have given birth
  chosen_spanish: ya han dado a luz
  alternatives_spanish:
  - han dado a luz
  - ya dieron a luz
  lexicon: HALOT
  rationale: El perfecto tras la cláusula de anterioridad expresa una acción completada antes de la llegada de la partera. «Dar a luz» es la expresión natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: conserva la comparación, la causalidad doble de כִּי y la anterioridad temporal de בְּטֶרֶם sin suavizar la fuerza léxica de חָיוֹת.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton por norma del proyecto, aunque este versículo no lo contiene.
  - Se prefirió «parteras» como término funcional en español, coherente con el contexto narrativo.
  - Se evitó una traducción animalizante de חָיוֹת porque el propio audit trail en inglés la marca como menos clara y potencialmente peyorativa.
