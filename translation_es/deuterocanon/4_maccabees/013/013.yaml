  - marker: b
    text: Literalmente, «nuestras almas». En este contexto también puede entenderse «nuestras vidas»; la traducción conserva la cercanía con ψυχάς sin excluir el sentido de vida entregada.
    reason: lexical_alternative
  - marker: c
    text: O «en la guardia de la ley». El griego conserva la imagen de vigilancia o guardia, no simplemente la idea de obedecer.
    reason: lexical_alternative
