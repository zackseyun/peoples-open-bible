id: ISA.15.9
reference: Isaiah 15:9
source:
  edition: WLC
  text: כִּ֣י מֵ֤י דִימוֹן֙ מָ֣לְאוּ דָ֔ם כִּֽי אָשִׁ֥ית עַל דִּימ֖וֹן נוֹסָפ֑וֹת לִ/פְלֵיטַ֤ת מוֹאָב֙ אַרְיֵ֔ה וְ/לִ/שְׁאֵרִ֖ית אֲדָמָֽה־־׃
translation:
  text: 'For the waters of Dimon are full of blood[a], for I will bring more upon Dimon: a lion upon the fugitives of Moab[c][b], and upon the remnant of the land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dimon may reflect a wordplay on 'blood' (dam). Some relate the place name to Dibon.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will set additional things upon Dimon.' The Hebrew leaves the added calamities implicit.
    reason: alternative_reading
  - marker: c
    text: The 'lion' may be a literal lion or a figurative image for further judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵי דִימוֹן
  chosen: the waters of Dimon
  alternatives:
  - the waters of Dibon
  lexicon: HALOT
  rationale: מֵי is the construct plural of 'water,' idiomatically 'waters of.' The place name in the consonantal text is Dimon, likely chosen for wordplay with דָּם ('blood'), though some connect it with Dibon. The MT form is retained in the main text as a transliterated name.
- source_word: מָלְאוּ דָם
  chosen: are full of blood
  alternatives:
  - are filled with blood
  lexicon: HALOT
  rationale: The verb מלא with a direct object can express being filled/full. English idiom favors 'are full of blood,' preserving the vivid image without over-literal awkwardness.
- source_word: אָשִׁית
  chosen: I will bring
  alternatives:
  - I will set
  - I will place
  lexicon: HALOT
  rationale: שׂים literally means 'set/place,' but with עַל and an abstract object it often means to impose or bring upon. 'Bring' is natural English and fits the judgment context.
- source_word: נוֹסָפוֹת
  chosen: still more
  alternatives:
  - additional things
  - more judgments
  lexicon: HALOT
  rationale: 'The feminine plural participial/adjectival form from יסף functions substantivally: ''additional things.'' Because the object is left implicit in Hebrew, ''still more'' best preserves the terseness without importing a specific noun like ''judgments'' into the text.'
- source_word: לִפְלֵיטַת מוֹאָב
  chosen: upon the fugitives of Moab
  alternatives:
  - for the escapees of Moab
  - for the remnant of Moab
  lexicon: HALOT
  rationale: פְלֵיטָה denotes those who escape or survive. In context of invasion and flight, 'fugitives' is the most vivid and contextually fitting rendering.
- source_word: אַרְיֵה
  chosen: a lion
  alternatives:
  - lion
  lexicon: HALOT
  rationale: The singular noun is rendered straightforwardly. The image may be literal or metaphorical for further devastation, but the translation should preserve the concrete term.
- source_word: וְלִשְׁאֵרִית אֲדָמָה
  chosen: and upon the remnant of the land
  alternatives:
  - and upon those left in the land
  - and upon the remnant of the ground
  lexicon: HALOT
  rationale: 'שְׁאֵרִית is ''remnant/remainder.'' אֲדָמָה can mean ground/land; here ''land'' better suits the territorial sense in an oracle against Moab. The preposition ל with אַרְיֵה is understood distributively with the prior clause: the lion comes upon both the fugitives and the remnant in the land.'
- source_word: כִּי ... כִּי
  chosen: For ... for
  alternatives:
  - Surely ... indeed
  - Because ... because
  lexicon: HALOT
  rationale: The repeated כִּי introduces explanation/emphasis. Rendering both as 'for' preserves the rhetorical linkage and prophetic cadence.
