review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia sacrificial del hebreo: holocaustos, animales engordados, carneros, bovinos y machos cabríos, y conserva «Selah». Sin embargo, hay dos desajustes principales. Primero, «Ofreceré a ti» es una calca innecesaria y poco natural para אַעֲלֶה לָךְ; en español digno y fiel debe ser «te ofreceré». Segundo, la nota [a] está mal anclada: el texto la coloca sobre «animales engordados», pero su contenido explica קְטֹרֶת / «humo de carneros». Además, «ganado» es posible para בָקָר, pero en este contexto poético-cúltico «reses» suena más idiomático y conserva mejor el valor colectivo sin la ambigüedad más amplia de «ganado».'
  spanish_quality_summary: La redacción es generalmente clara, pero «Ofreceré a ti» suena forzada y poco natural en español bíblico contemporáneo. El resto es legible, con buen registro culto. «Holocaustos» es aceptable aquí por uso sacrificial tradicional. «Con el humo de carneros» es defendible y hasta preferible a «incienso» para evitar confusión con incienso perfumado. «Reses con machos cabríos» mejora la fluidez respecto a «ganado».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Holocaustos» para עֹלוֹת y «Selah» transliterado están alineados. La precisión de עַתּוּדִים como «machos cabríos» está bien preservada. Se recomienda ajustar בָקָר a «reses» y mantener en nota la alternativa «toros», reflejando la decisión inglesa y el colectivo hebreo.
  issues:
  - severity: medium
    issue: Calco antinatural en «Ofreceré a ti»
    rationale: Aunque refleja el orden hebreo, en español estándar y digno la forma natural es «te ofreceré». La fidelidad al destinatario divino se mantiene sin rigidez sintáctica.
  - severity: high
    issue: La nota [a] está anclada al segmento equivocado
    rationale: La nota [a] habla de «aroma de carneros» frente a «humo», por lo que debe marcar «humo de carneros», no «animales engordados». Tal como está, induce a error sobre qué palabra comenta.
  - severity: low
    issue: «Ganado» es algo impreciso o amplio para בָקָר en este verso
    rationale: «Ganado» puede abarcar más que bovinos en uso común. «Reses» conserva mejor el colectivo bovino sacrificial; la alternativa «toros» puede quedar en nota.
  revised_spanish_text: Te ofreceré holocaustos de animales engordados, con el humo[a] de carneros; ofreceré reses[b] con machos cabríos. Selah[c]
  revised_footnotes:
