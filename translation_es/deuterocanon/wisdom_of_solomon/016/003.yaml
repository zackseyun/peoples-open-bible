translation:
  language: es
  text: para que aquellos hombres, aunque ansiaban comida, se apartaran, por la apariencia[a] de las criaturas que habían sido enviadas, aun de su apetito necesario, mientras que estos otros, después de pasar necesidad por poco tiempo, probaran un sabor extraño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la apariencia de las cosas enviadas contra ellos'; el griego pone el acento en el impacto visible de las criaturas enviadas como causa de repulsión.
    reason: lexical_alternative
  - marker: b
    text: '''Sabor extraño'' alude a alimento de clase o carácter inusual, probablemente anticipando la provisión extraordinaria dada a Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπιθυμοῦντες
  english_pob_choice: desiring
  chosen_spanish: deseando
  alternatives_spanish:
  - anhelando
  - codiciando
  lexicon: BDAG
  rationale: El participio expresa deseo intenso, pero en español 'deseando' comunica la fuerza del anhelo sin sobrecargarlo con matices más fuertes de 'codiciando'.
- source_word: τροφήν
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - nutrimento
  lexicon: BDAG
  rationale: '''Alimento'' es natural y digno en español; mantiene el sentido de sustento sin restringirse a una comida concreta.'
- source_word: δειχθεῖσαν
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - visión
  - lo mostrado
  lexicon: BDAG
  rationale: La fuerza del pasaje está en el impacto visual de las criaturas enviadas. 'Apariencia' conserva mejor ese valor que una paráfrasis más abstracta.
- source_word: τῶν ἐπαπεσταλμένων
  english_pob_choice: the creatures that had been sent
  chosen_spanish: las criaturas que habían sido enviadas
  alternatives_spanish:
  - las cosas enviadas contra ellos
  - los animales enviados
  lexicon: BDAG
  rationale: '''Criaturas'' sigue la lectura contextual del castigo mediante seres enviados, sin especificar una especie que el griego no nombra aquí.'
- source_word: ἀναγκαίαν ὄρεξιν
  english_pob_choice: necessary appetite
  chosen_spanish: apetito necesario
  alternatives_spanish:
  - apetito natural
  - deseo necesario
  lexicon: BDAG
  rationale: '''Apetito necesario'' reproduce con más literalidad la tensión del original: un apetito incluso impuesto por necesidad.'
- source_word: ἀποστρέφωνται
  english_pob_choice: might turn away
  chosen_spanish: se apartaran
  alternatives_spanish:
  - se retiraran
  - rechazaran
  lexicon: BDAG
  rationale: '''Se apartaran'' mantiene un español fluido y conserva la idea de apartarse de la comida en revulsión, sin introducir una intensificación no explicitada.'
- source_word: ἐπʼ ὀλίγον
  english_pob_choice: for a short time
  chosen_spanish: por un corto tiempo
  alternatives_spanish:
  - brevemente
  - por poco tiempo
  lexicon: BDAG
  rationale: La expresión temporal debe sonar natural y breve; 'por un corto tiempo' refleja bien la limitación temporal del contraste.
- source_word: ἐνδεεῖς γενόμενοι
  english_pob_choice: after becoming needy
  chosen_spanish: después de haberse visto necesitados
  alternatives_spanish:
  - después de haber quedado en necesidad
  - tras experimentar escasez
  lexicon: BDAG
  rationale: La construcción intenta mantener la idea de falta temporal sin exagerar hacia hambre o miseria extrema.
- source_word: ξένης ... γεύσεως
  english_pob_choice: a strange taste
  chosen_spanish: un sabor extraño
  alternatives_spanish:
  - un gusto extraño
  - un sabor forastero
  lexicon: BDAG
  rationale: '''Sabor extraño'' conserva la novedad/familiaridad inusual que el inglés auditado explica como alimento de clase desconocida, sin volverlo una metáfora ajena al contexto.'
- source_word: μετάσχωσι
  english_pob_choice: might partake
  chosen_spanish: participaran
  alternatives_spanish:
  - compartieran
  - tuvieran parte de
  lexicon: BDAG
  rationale: '''Participaran'' preserva el sentido de tomar parte en la provisión, con un registro bíblico claro y fiel.'
theological_decisions:
- issue: Contraste entre los castigados y el pueblo provisto
  english_pob_reading: The first group is the Egyptians afflicted by sent creatures; the second group is God's people who briefly lacked food and received extraordinary provision.
  chosen_spanish_reading: El primer grupo alude a los egipcios afligidos por criaturas enviadas; el segundo, al pueblo de Dios que por un breve tiempo careció de alimento y recibió una provisión extraordinaria.
  alternative_spanish_readings:
  - Un contraste más genérico entre impíos y justos sin identificar grupos históricos.
  - Una lectura menos explícita, dejando los pronombres sin aclarar.
  rationale: El contexto de Sabiduría 16 contrasta el castigo de Egipto con la provisión para Israel. La traducción puede hacer inteligible ese contraste sin agregar contenido ajeno al pasaje.
  doctrine_reference: Sabiduría 16; contexto narrativo del éxodo y la provisión de Dios
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del texto inglés auditado: se evitó añadir equivalentes de ''also'' antes de ''participaran'', porque el griego carece de καί en ese punto. Se mantuvo el contraste temporal y semántico general del pasaje, con un español natural y fiel al griego.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el contexto inmediato del proyecto; en este versículo no aparece.
  - Se mantuvo 'criaturas' para respetar la lectura contextual del juicio mediante seres enviados, sin especificar especie.
  - '''Apetito'' se conservó para reflejar la fuerza concreta de ὄρεξις sin sustituirla por una abstracción más débil.'
  - '''Sabor'' se prefirió a ''gusto'' por su mayor claridad semántica en el contexto de alimento.'
