revisions:
- from: Por favor[a], Señor, que tu oído esté atento a la oración de tu siervo y a la oración de tus siervos, que se deleitan en temer tu nombre, y por favor concede éxito a tu siervo hoy y dale compasión delante de este hombre[b][c]. Y yo era copero del rey.
  to: Te ruego, Señor, que tu oído esté atento[a] a la oración de tu siervo y a la oración de tus siervos, que se deleitan en temer tu nombre, y te ruego que concedas éxito a tu siervo hoy y que le hagas hallar compasión ante este hombre[b][c]. Ahora bien, yo era copero del rey.
  rationale: Se corrige el anclaje de la nota [a] para que coincida con la expresión explicada, se mejora el registro de la súplica inicial con «Te ruego», se hace más idiomática en español la petición de recibir compasión ante el rey, y se restituye mejor el matiz transicional de la cláusula final.
