translation:
  language: es
  text: Sin embargo, no contarás a la tribu de Leví, ni tomarás su número entre los hijos de Israel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: HALOT
  rationale: אַךְ introduce una excepción restrictiva a la instrucción anterior sobre el censo. En español, «Solo» comunica mejor ese valor exceptivo que un simple adversativo.
- source_word: מַטֵּה לֵוִי
  english_pob_choice: the tribe of Levi
  chosen_spanish: la tribu de Leví
  alternatives_spanish:
  - el bastón de Leví
  - la vara de Leví
  lexicon: HALOT
  rationale: En contexto censal y tribal, מַטֵּה significa «tribu». «La tribu de Leví» refleja ese valor contextual y evita una traducción literal engañosa.
- source_word: תִפְקֹד
  english_pob_choice: count
  chosen_spanish: contarás
  alternatives_spanish:
  - musterás
  - registrarás
  - harás el censo de
  lexicon: HALOT
  rationale: En este contexto militar-censal, פקד alude a contar o pasar revista. «Contarás» es claro y fiel sin volver la frase demasiado técnica.
- source_word: רֹאשָׁם
  english_pob_choice: their number
  chosen_spanish: su número
  alternatives_spanish:
  - su cabeza
  - su recuento
  - su cuenta
  lexicon: HALOT
  rationale: Aunque la expresión es literalmente «su cabeza», el sentido idiomático en el censo es el total o número. «Su número» conserva la fuerza idiomática en español.
- source_word: תִשָּׂא
  english_pob_choice: take
  chosen_spanish: tomarás
  alternatives_spanish:
  - levantarás
  - harás recuento de
  - tomarás cuenta de
  lexicon: HALOT
  rationale: Con רֹאשׁ, נשׂא forma una expresión idiomática de tomar el número o recuento. «Tomarás» mantiene el paralelo con la versión inglesa y el giro hebreo.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - dentro de
  lexicon: HALOT
  rationale: בְּתוֹךְ indica inclusión dentro del conjunto contado. «Entre» suena natural en español y preserva la idea de pertenencia al grupo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la formulación masculina del hebreo y la terminología POB usual. «Los hijos de Israel» es transparente y refleja el texto fuente con fidelidad.
theological_decisions:
- issue: Designación colectiva masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: El hebreo usa la forma masculina plural estándar para la comunidad pactal. Se conserva esa forma por transparencia hacia el original y coherencia con la política de exactitud gramatical.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La versión inglesa auditada usa «Only» para אַךְ, «the tribe of Levi» para מַטֵּה לֵוִי, y mantiene el giro idiomático de contar/tomar el número. No se registraron revisiones textuales posteriores; el pasaje fue confirmado sin cambios en la última pasada de revisión.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de las dos negaciones con futuro de mandato: «no contarás» / «ni tomarás su número».'
  - Se conservó la referencia masculina plural «los hijos de Israel» para reflejar el hebreo y la práctica terminológica del proyecto.
  - El registro es formal y bíblico, pero en español natural, sin calcar innecesariamente la sintaxis hebrea.
