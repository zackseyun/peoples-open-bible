  language: en
  yaml_path: translation/ot/numbers/024/009.yaml
  text: He crouched[a], he lay down like a lion, and like a lioness—who will rouse him? Those who bless you are blessed[b], and those who curse you are cursed.
  footnotes:
  - marker: a
    text: This blessing-and-curse formula echoes Genesis 12:3 and Genesis 27:29.
    reason: cross_reference
  - marker: b
    text: Or 'and like a great lion.' The Hebrew term may denote a strong or mature lion; 'lioness' preserves the lexical distinction from the previous word for 'lion.'
    reason: lexical_alternative
