review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: YHWH envía fuego contra/sobre la muralla de Gaza y ese fuego consume sus אַרְמְנוֹת. También preserva correctamente la nota léxica sobre la alternativa «palacios». Sin embargo, «ciudadelas» no es la opción más natural ni más precisa en español para אַרְמְנֹתֶיהָ en este contexto; en español suele denotar la fortaleza principal de una ciudad, y en plural suena poco idiomático aquí. «Fortalezas» preserva mejor el matiz fortificado que el POB inglés quiso mantener, con mejor legibilidad eclesial general. El resto de las decisiones principales se alinean razonablemente con la evidencia fuente y el rastro de auditoría inglés.'
  spanish_quality_summary: El español es claro y digno. «Así que enviaré fuego sobre el muro de Gaza» suena natural y formal. La principal debilidad estilística es «sus ciudadelas», que resulta algo forzado y menos transparente para lectores amplios. «Sus fortalezas» mejora la fluidez sin alejarse del sentido. La nota al pie actual sigue siendo útil y puede conservarse con ajuste mínimo de contexto.
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. No aparece Yahvé en este versículo. Las decisiones para «fuego», «Gaza» y el tono profético son adecuadas. La revisión propuesta mantiene la racionalidad léxica documentada para אַרְמוֹן, pero la expresa con una palabra española más natural que «ciudadelas».
  issues:
  - severity: medium
    issue: «Ciudadelas» como traducción de אַרְמְנֹתֶיהָ
    rationale: Aunque intenta reflejar «citadels», en español «ciudadela» suele referirse a una fortificación central específica; en plural aquí suena poco natural y puede estrechar o distorsionar el referente. «Fortalezas» conserva mejor el matiz defensivo/fortificado y se lee con mayor naturalidad.
  - severity: low
    issue: La nota al pie debe seguir anclada tras la referencia a Gaza
    rationale: El marcador [a] ya está bien ubicado para la alternativa léxica del sustantivo final según el patrón heredado del POB inglés; al revisar el sustantivo principal, conviene conservar la nota exactamente con su anclaje en el texto y con marcadores consistentes.
  revised_spanish_text: Así que enviaré fuego sobre el muro de Gaza[a], y consumirá sus fortalezas.
  revised_footnotes:
  - marker: a
    text: O «palacios». El término hebreo puede referirse a edificios palaciales, a menudo con sentido fortificado o de élite.
    reason: lexical_alternative
  revision_rationale: Se cambia únicamente «ciudadelas» por «fortalezas» para lograr una equivalencia más idiomática en español que siga preservando el matiz fortificado de אַרְמוֹן documentado en el POB inglés. Se mantiene la estructura de la oración, el tono profético y la nota de alternativa «palacios».
