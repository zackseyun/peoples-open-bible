translation:
  language: es
  text: Él cubre la faz de su trono[a][b], extendiendo su nube sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la faz de su trono», un modismo para la superficie visible o la parte frontal del trono.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «agarra la faz de su trono». El verbo hebreo puede significar más literalmente «asir» o «sujetar», pero en este contexto probablemente expresa la idea de cubrir u ocultar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַחֵז
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - agarra
  - sujeta firmemente
  - tapa
  lexicon: HALOT
  rationale: Aunque el verbo puede significar 'asir' o 'sujetar', en este contexto poético la imagen se entiende mejor como una acción de ocultar la parte visible del trono. 'Cubre' conserva la fuerza imagética y el sentido contextual que el audit trail inglés ya documenta.
- source_word: פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - la superficie de
  - el frente de
  lexicon: HALOT
  rationale: פָּנִים puede referirse literalmente al rostro o, por extensión, a la parte visible o frontal. 'Rostro' mantiene la imagen hebrea y es natural en español bíblico.
- source_word: כִסֵּה
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - el trono
  - su asiento
  lexicon: HALOT
  rationale: El sufijo posesivo del hebreo queda bien reflejado con 'su'. En el contexto, el posesivo apunta al sujeto divino implícito, como en el audit trail inglés.
- source_word: פַּרְשֵׁז
  english_pob_choice: spreading
  chosen_spanish: extendiendo
  alternatives_spanish:
  - esparciendo
  - desplegando
  lexicon: HALOT
  rationale: El verbo expresa la acción de extender o desplegar. 'Extendiendo' funciona de manera natural en español y conserva el paralelismo con la primera cola del versículo.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre eso
  lexicon: HALOT
  rationale: El sufijo retoma el 'trono' y en español debe concordar con un antecedente masculino. 'Sobre él' expresa la relación espacial sin añadir interpretación.
- source_word: עֲנָנוֹ
  english_pob_choice: his cloud
  chosen_spanish: su nube
  alternatives_spanish:
  - su nube de gloria
  - la nube de él
  lexicon: HALOT
  rationale: El singular con sufijo se traduce de forma directa como 'su nube'. Mantener 'nube' evita introducir especificaciones no presentes en el hebreo, aunque el contexto sugiera una nube divina.
theological_decisions:
- issue: Referencia posesiva al trono y a la nube
  english_pob_reading: The verse speaks of God concealing his own throne with his cloud.
  chosen_spanish_reading: El versículo habla de Dios cubriendo su propio trono con su nube.
  alternative_spanish_readings:
  - Cubre el trono con una nube.
  - Cubre su trono con la nube.
  rationale: El hebreo y el contexto poético de Job favorecen entender el sujeto implícito como Dios. En español conviene mantener el posesivo para reflejar ese vínculo sin forzarlo más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el acuerdo externo fue alto, con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la norma del proyecto, pero este versículo no lo nombra explícitamente.
  - Se preservó el paralelismo poético con dos miembros coordinados por coma.
  - Se usó 'rostro' para פְּנֵי para conservar la imagen hebrea, en vez de 'superficie', por mayor fidelidad literaria.
