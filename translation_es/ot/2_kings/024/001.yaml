  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘esclavo’ para עֶבֶד por fuerza léxica, en coherencia con la política española del proyecto y la lectura político-histórica del verso.
  - Se conserva una formulación bíblica sobria y publicable, evitando armonizaciones o expansiones interpretativas.
