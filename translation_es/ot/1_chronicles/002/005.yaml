lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְּנֵי puede expresar descendencia. En español, «hijos de» reproduce con naturalidad la relación genealógica concreta que aquí introduce dos nombres personales, sin perder el valor filial básico del hebreo.
- source_word: פֶרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peretz
  - Pharez
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma transliterada adaptada al español bíblico habitual. «Pérez» es la forma más reconocible y natural para lectores en español, equivalente funcional al «Perez» inglés de la POB.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con transliteración estándar al español. La acentuación gráfica ayuda a la lectura y refleja la pronunciación hispana natural de un nombre bíblico.
- source_word: וְחָמוּל
  english_pob_choice: and Hamul
  chosen_spanish: y Hamul
  alternatives_spanish:
  - y Chamul
  lexicon: HALOT
  rationale: La conjunción וְ se traduce de forma directa como «y». El nombre propio se conserva sin traducir, siguiendo el tratamiento de nombres bíblicos de la POB y la forma ya establecida en español.
