revisions:
- from: ¿Pero dónde están tus dioses, los que te hiciste para ti? Que se levanten[a], si pueden salvarte en el tiempo de tu calamidad. Porque tus dioses, Judá, son tantos como tus ciudades.
  to: Pero ¿dónde están tus dioses que hiciste para ti? Que se levanten, si pueden salvarte[a] en el tiempo de tu calamidad[b]. Porque tus dioses, Judá, son tantos como tus ciudades.
  rationale: Se corrige la puntuación inicial para un español más natural, se mejora levemente la fluidez de la cláusula relativa sin perder la reflexividad del hebreo, se reubica la nota [a] al segmento correcto ('si pueden salvarte') y se añade la aclaración léxica sobre 'calamidad' que el rastro inglés documenta para רָעָה.
