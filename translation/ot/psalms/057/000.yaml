id: PSA.57.0
reference: Psalms 57:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֣חַ אַל תַּ֭שְׁחֵת לְ/דָוִ֣ד מִכְתָּ֑ם בְּ/בָרְח֥/וֹ מִ/פְּנֵי שָׁ֝א֗וּל בַּ/מְּעָרָֽה־־׃
translation:
  text: 'For the choirmaster: “Do Not Destroy.” Of David[a]. A miktam, when he fled from Saul[b], in the cave.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly a tune-name or refrain: “Do not destroy.”'
    reason: alternative_reading
  - marker: b
    text: The meaning of “miktam” is uncertain; it is therefore transliterated rather than translated.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the director
  - For the music leader
  lexicon: HALOT
  rationale: The term in Psalm superscriptions conventionally refers to the musical leader or director. 'For the choirmaster' is clear, idiomatic, and preserves the superscriptional function without over-paraphrasing.
- source_word: אַל־תַּשְׁחֵת
  chosen: “Do Not Destroy”
  alternatives:
  - Do not destroy
  - Destroy not
  lexicon: HALOT
  rationale: In Psalm headings this expression is commonly understood as the title or tune-name associated with the psalm rather than an imperative within the poem itself. Quotation marks signal its likely status as a title. The more archaic 'Destroy not' is avoided for readability.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, or dedication. 'Of David' preserves the ambiguity better than 'By David' while matching standard English superscription style.
- source_word: מִכְתָּם
  chosen: A miktam
  alternatives:
  - A psalm
  - An inscription
  lexicon: HALOT
  rationale: The precise meaning of מִכְתָּם is uncertain, so transliteration is the most transparent and auditable choice. Rendering it as a generic genre term would claim more certainty than the Hebrew warrants.
- source_word: בְּבָרְחוֹ
  chosen: when he fled
  alternatives:
  - in his fleeing
  - as he fled
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב carries a temporal sense here. 'When he fled' is natural English and accurately conveys the circumstance indicated by the Hebrew.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - from before
  - away from the presence of
  lexicon: HALOT
  rationale: The idiom literally means 'from before the face/presence of,' but in this context simple 'from' best communicates the sense of fleeing from Saul without unnecessary literalism.
- source_word: שָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בַּמְּעָרָה
  chosen: in the cave
  alternatives:
  - into the cave
  lexicon: HALOT
  rationale: The preposition ב here most naturally indicates location in the superscription's historical note. 'In the cave' fits the likely allusion to David's flight narratives and avoids implying motion not explicit in the form.
