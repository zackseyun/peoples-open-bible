revisions:
- from: Entonces giró hacia el oriente[a], hacia el amanecer, hasta Bet-dagón, y llegó a Zabulón y al valle de Iphtah-el, hacia el norte, a Bet-emec y Neiel; luego salió hacia Cabul por la izquierda.
  to: Entonces giró hacia el oriente, hacia el amanecer, a Bet-dagón, y llegó a Zabulón y al valle de Iphtah-el, hacia el norte, a Bet-emec y Neiel; luego salió hacia Cabul por la izquierda[a].
  rationale: Se corrige el anclaje de la nota al pie para que comente la expresión hebrea correcta (‘por la izquierda’), y se suaviza ‘hasta Bet-dagón’ a ‘a Bet-dagón’ para reflejar mejor la secuencia de hitos fronterizos del hebreo. No se requieren cambios mayores de léxico ni de estilo.
