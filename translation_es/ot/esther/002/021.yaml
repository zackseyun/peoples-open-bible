base_translation:
  language: en
  yaml_path: translation/ot/esther/002/021.yaml
  text: In those days[a], while Mordecai was sitting at the king’s gate, Bigthan and Teresh, two of the king’s eunuchs from those who guarded the threshold[b], became angry and sought to lay hands on King Ahasuerus.
  footnotes:
  - marker: a
    text: Or 'the king’s court officials'; the Hebrew term can refer more broadly to royal officers, though 'eunuchs' is likely in this court setting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to send out a hand against'; that is, to attack or assassinate the king.
    reason: lexical_alternative
