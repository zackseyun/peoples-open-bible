review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: avance hostil contra Israel, símil de nube, marco escatológico, acción soberana de Dios al traer a Gog, propósito de conocimiento de las naciones y manifestación pública de la santidad divina. Sin embargo, la decisión principal en בְּהִקָּדְשִׁי בְךָ no sigue la racionalidad auditada del POB inglés, que evitó en texto principal una formulación susceptible de malentenderse como si Dios llegara a ser más santo. También conviene mejorar un par de giros para mayor naturalidad en español.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene varios giros algo calcados o menos naturales: «como nube» pide artículo; «subirás contra» suena rígido en español contemporáneo; y «me santifique en ti» es comprensible, pero menos claro y más expuesto a lectura equívoca que una formulación como «me mostraré santo por medio de ti». El conjunto necesita una reparación pequeña, no una reescritura mayor.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El verso no contiene Yahvé en el texto fuente de esta línea. La elección escatológica «postreros días» es defendible, aunque «los días finales» o «los últimos días» serían más modernos; no es necesario cambiarla. La cuestión principal es alinear la auto-santificación divina con la decisión teológica/lexical documentada por el POB: texto principal claro y nota con la alternativa más literal.'
  issues:
  - severity: high
    issue: La frase principal «cuando yo me santifique en ti» no refleja la decisión auditada del POB inglés para בְּהִקָּדְשִׁי בְךָ.
    rationale: El POB inglés puso en texto principal una formulación aclaratoria («when I show myself holy through you») y reservó la más literal para nota. En español, «me santifique en ti» puede sugerir impropiamente que Dios adquiere santidad, por lo que conviene trasladar la literalidad a nota y usar en el texto una formulación que exprese manifestación pública de santidad.
  - severity: medium
    issue: La nota al pie está anclada en «mi tierra[a]», pero su contenido explica una frase posterior.
    rationale: El marcador debe aparecer en la palabra o frase relevante. La nota lexical alternativa corresponde a la cláusula «me mostraré santo por medio de ti», no a «mi tierra».
  - severity: low
    issue: «como nube» suena incompleto en español; «como una nube» es más natural.
    rationale: El hebreo permite la comparación nominal sin artículo, pero en español la forma idiomática y más legible es con artículo indefinido.
  - severity: low
    issue: «Y tú subirás contra» es fiel pero algo forzado en español bíblico moderno.
    rationale: «Vendrás contra» o «subirás contra» son opciones posibles; «vendrás contra» suena más natural sin perder la idea de avance hostil. No obstante, esto es un ajuste de estilo menor.
  revised_spanish_text: Y tú vendrás contra mi pueblo Israel como una nube para cubrir la tierra. En los postreros días acontecerá que te traeré contra mi tierra, para que las naciones me conozcan, cuando me mostraré santo por medio de ti[a] delante de sus ojos, Gog.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando yo me santifique en ti delante de sus ojos».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula de auto-santificación divina para alinear el texto principal con la decisión lexical-teológica auditada del POB: expresar la manifestación de la santidad de Dios en juicio mediante Gog, y dejar la forma más literal en nota. También se reubica el marcador de nota al lugar pertinente y se suavizan dos giros para mayor naturalidad en español («vendrás contra», «como una nube»).'
