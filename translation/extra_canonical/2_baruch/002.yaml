theological_decisions:
- issue: Why Baruch and Jeremiah must depart
  chosen_reading: Their departure is commanded because their righteous deeds and prayers have been a preserving restraint for the city, not because judgment has been revoked.
  alternative_readings:
  - The line refers only to their personal safety.
  - The imagery is merely honorific praise with no protective force.
  rationale: Verse 2 grounds the command of verse 1 in their continuing protective significance for Jerusalem. Once they depart, the announced judgment proceeds.
- issue: Force of the metaphors in verse 2
  chosen_reading: The chapter presents righteous persons and their prayers as real means of divine restraint within history.
  alternative_readings:
  - The metaphors are purely rhetorical compliments.
  - The line speaks only of political leadership rather than prayerful intercession.
  rationale: The pairing of deeds and prayers with structural defenses fits the chapter’s judgment setting and preserves the moral-theological weight of intercession.
