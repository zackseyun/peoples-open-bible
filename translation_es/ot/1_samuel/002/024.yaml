translation:
  language: es
  text: ¡No, hijos míos! Porque no es buena la noticia[a] que yo oigo. Ustedes están haciendo que el pueblo de Yahvé transgreda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra comprensión del hebreo: «la noticia que yo oigo es el pueblo de Yahvé el que está difundiendo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  english_pob_choice: 'No'
  chosen_spanish: ¡No!
  alternatives_spanish:
  - 'No'
  - ¡Ay!
  - No, hijos míos
  lexicon: HALOT
  rationale: Aquí funciona como una interjección de reprensión, no como una prohibición formal. En español, «¡No!» transmite la reprobación directa de Eli con naturalidad y fuerza.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos
  lexicon: HALOT
  rationale: El vocativo se dirige específicamente a sus hijos varones. «Hijos míos» conserva cercanía, afecto y la relación paterna sin perder precisión.
- source_word: לֹא טוֹבָה
  english_pob_choice: is not good
  chosen_spanish: no es buena
  alternatives_spanish:
  - no es buena
  - es mala
  - no es favorable
  lexicon: HALOT
  rationale: La frase hebrea expresa valoración negativa. «No es buena» reproduce la idiomaticidad sin intensificar más allá de lo que el hebreo dice.
- source_word: הַשְּׁמֻעָה
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el informe
  - el reporte
  - el rumor
  lexicon: HALOT
  rationale: En este contexto, el término se refiere a lo que Eli ha oído acerca de la conducta de sus hijos. «Noticia» suena natural en español y no carga la palabra con el matiz de incerteza de «rumor»; la alternativa inglesa de «report» queda representada por la nota textual.
- source_word: אֲשֶׁר אָנֹכִי שֹׁמֵעַ
  english_pob_choice: that I hear
  chosen_spanish: que yo oigo
  alternatives_spanish:
  - que escucho
  - que estoy oyendo
  lexicon: HALOT
  rationale: El verbo hebreo en presente comunica la acción en curso. «Yo oigo» mantiene el registro sobrio y refleja bien el aspecto sin sonar forzado.
- source_word: מַעֲבִרִים
  english_pob_choice: you are making ... transgress
  chosen_spanish: están haciendo que ... transgreda
  alternatives_spanish:
  - están haciendo pecar a ...
  - están llevando a ... a transgredir
  - están haciendo pasar a ...
  lexicon: HALOT
  rationale: El Hifil de עבר es difícil y admite más de una lectura. La construcción «hacer que ... transgreda» conserva la idea causal y el valor de transgresión/culpa, sin cerrar innecesariamente la ambigüedad del hebreo.
- source_word: עַם יְהוָה
  english_pob_choice: the LORD’s people
  chosen_spanish: el pueblo de Yahvé
  alternatives_spanish:
  - el pueblo de Yahvé
  - el pueblo de Yahveh
  - el pueblo del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». «Pueblo» reproduce la construcción colectiva del hebreo y evita sustituir el nombre divino por un título.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración establecida por el proyecto para el Nombre divino. «Yahvé» preserva la referencia personal al Dios del pacto.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y la política del proyecto pide conservarlo como nombre propio. «Yahvé» es la forma elegida en español para mantener visible el Nombre revelado, no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מַעֲבִרִים עַם יְהוָה
  english_pob_reading: you are making Yahweh’s people transgress
  chosen_spanish_reading: ustedes están haciendo que el pueblo de Yahvé transgreda
  alternative_spanish_readings:
  - están haciendo pecar al pueblo de Yahvé
  - el pueblo de Yahvé está siendo arrastrado a transgredir
  - están haciendo pasar al pueblo de Yahvé
  rationale: La sintaxis hebrea admite una relación causal compleja y la auditoría inglesa también reconoce la dificultad. La versión española conserva la lectura de responsabilidad moral sobre los hijos, sin borrar la tensión textual.
  doctrine_reference: Nota de traducción sobre causatividad y transgresión covenantal en contextos de עבר Hifil
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés auditado: se prefirió una formulación más directa y natural para la clausula final, manteniendo el valor causal de מַעֲבִרִים y la puntuación en dos frases. También se respetó la alternativa exegética documentada para la última línea mediante nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se eligió «transgreda» para conservar el peso moral/covenantal del verbo en vez de suavizarlo a «pecar» sin necesidad.
  - «Noticia» se emplea como equivalente contextual de הַשְּׁמֻעָה, sin imponer necesariamente el matiz de «rumor».
  - La exclamación inicial mantiene el tono de reprensión de Eli dirigido a sus hijos.
