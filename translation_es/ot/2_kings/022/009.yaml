base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/009.yaml
  text: Then Shaphan the scribe came to the king and brought back word to the king[a], and said[c][b], “Your servants have emptied out the silver that was found in the house and have delivered it into the hand of the workmen who are appointed over the house of Yahweh.”
  footnotes:
  - marker: a
    text: Or 'have emptied out the silver'; the Hebrew verb can also be understood more literally as 'have poured out.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; literally 'the house.'
    reason: cultural_note
  - marker: c
    text: Or 'have entrusted it to' or 'have delivered it to'; literally 'have put it into the hand of.'
    reason: lexical_alternative
