translation:
  language: es
  text: Porque un hijo trata con desprecio a su padre[a]; una hija se levanta contra su madre; una nuera se levanta contra su suegra; los enemigos de un hombre son los hombres de su propia casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «deshonra a su padre». El verbo hebreo puede denotar tratar a alguien con vergüenza o desprecio.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los hombres de su casa». La frase puede referirse idiomáticamente a los miembros del hogar en sentido amplio, aunque el hebreo conserva la forma masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del desastre social descrito antes; en español, «Porque» mantiene la relación causal/explanatoria de forma natural y fiel al flujo del hebreo.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - el hijo
  - hijo
  lexicon: HALOT
  rationale: El hebreo es singular genérico y representativo; «un hijo» conserva ese valor sin particularizar demasiado.
- source_word: מְנַבֵּל
  english_pob_choice: treats ... with contempt
  chosen_spanish: trata con desprecio
  alternatives_spanish:
  - deshonra
  - menosprecia
  - trata vergonzosamente
  lexicon: HALOT
  rationale: El piel de נבל comunica trato deshonroso o despreciativo. «Trata con desprecio» expresa bien la agresión relacional en español y evita una paráfrasis excesiva.
- source_word: אָב
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre propio
  - a su padre
  lexicon: HALOT
  rationale: El posesivo queda natural en español por el contexto; la relación filial está implícita en el sujeto y no requiere recarga léxica.
- source_word: בַּת
  english_pob_choice: a daughter
  chosen_spanish: una hija
  alternatives_spanish:
  - la hija
  - hija
  lexicon: HALOT
  rationale: Como en el inglés auditado, el sustantivo es genérico y representativo; «una hija» preserva esa fuerza.
- source_word: קָמָה
  english_pob_choice: rises up against
  chosen_spanish: se levanta contra
  alternatives_spanish:
  - se alza contra
  - se rebela contra
  lexicon: HALOT
  rationale: En contexto hostil, קום comunica oposición activa. «Se levanta contra» mantiene la imagen y la fuerza relacional sin intensificar innecesariamente a «se rebela».
- source_word: בְאִמָּהּ
  english_pob_choice: her mother
  chosen_spanish: su madre
  alternatives_spanish:
  - contra su madre
  - a su madre
  lexicon: HALOT
  rationale: El valor adversativo ya queda expresado por «se levanta contra»; en español, «su madre» fluye con naturalidad y evita repetir la preposición de manera pesada.
- source_word: כַּלָּה
  english_pob_choice: a daughter-in-law
  chosen_spanish: una nuera
  alternatives_spanish:
  - una esposa joven
  - una novia
  lexicon: HALOT
  rationale: En este contexto doméstico, el sentido claro es «nuera», no «novia» ni «esposa joven».
- source_word: בַּחֲמֹתָהּ
  english_pob_choice: against her mother-in-law
  chosen_spanish: contra su suegra
  alternatives_spanish:
  - contra la madre de su esposo
  - contra su suegra
  lexicon: HALOT
  rationale: חמות designa a la suegra/madre política; «contra su suegra» reproduce el sentido adversativo con precisión idiomática.
- source_word: אֹיְבֵי
  english_pob_choice: enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los adversarios
  - los foes
  lexicon: HALOT
  rationale: Equivalente estándar y directo para el plural constructo, sin suavizar la hostilidad.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el masculino representativo explícito del hebreo, conforme al criterio del POB de no neutralizar donde el texto es masculino.
- source_word: אַנְשֵׁי בֵיתוֹ
  english_pob_choice: the men of his own house
  chosen_spanish: los hombres de su propia casa
  alternatives_spanish:
  - la gente de su casa
  - los miembros de su casa
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». Aunque puede abarcar el conjunto del hogar por idiomática, se conserva la forma masculina explícita del hebreo, tal como lo hace el audit trail en inglés, para no borrar la tensión del verso.
theological_decisions:
- issue: Lenguaje doméstico masculino y representativo
  english_pob_reading: Retain masculine terms 'a man' and 'the men of his own house' in the main text.
  chosen_spanish_reading: Mantener «un hombre» y «los hombres de su propia casa» en el texto principal.
  alternative_spanish_readings:
  - los enemigos de una persona son los miembros de su casa
  - los enemigos de alguien son los de su propia casa
  rationale: El hebreo usa formas masculinas explícitas (אִישׁ, אַנְשֵׁי). En español, neutralizarlas borraría una parte del perfil léxico del verso. «Los hombres de su propia casa» conserva la dureza y la sorpresa de la traición doméstica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor adversativo de las preposiciones con קום
  english_pob_reading: '''rises up against'' / adversative sense expressed in English.'
  chosen_spanish_reading: Expresar la oposición con «se levanta contra».
  alternative_spanish_readings:
  - se levanta sobre
  - se alza frente a
  rationale: La preposición ב con verbos de levantarse funciona aquí en sentido hostil. «Se levanta contra» comunica la hostilidad sin introducir una lectura más fuerte de rebelión política que el hebreo no exige.
  doctrine_reference: HALOT; gramática del hebreo bíblico en contexto relacional hostil
translation_notes:
  revision_awareness: 'El borrador sigue la versión inglesa auditada y no introduce cambios sustantivos respecto de la evaluación más reciente: se mantiene la lectura masculina explícita y la fuerza relacional de los verbos. La única adaptación principal es idiomática al español, conservando la alternancia de hostilidad doméstica y el cierre proverbial del versículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este verso no lo contiene.
  - Se conservó el lenguaje masculino explícito donde el hebreo lo exige, evitando neutralizaciones no justificadas.
  - «Se levanta contra» mantiene el sentido hostil de קום en este contexto.
  - «Nuera» y «suegra» son los equivalentes idiomáticos naturales en español para כַּלָּה y בַּחֲמֹתָהּ.
