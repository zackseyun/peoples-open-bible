translation:
  language: es
  text: 'Y Jeconías hijo de Jeelus, de los hijos de Israel, clamó y dijo a Esdras: «Hemos pecado contra el Señor, y mujeres extranjeras[b] de las naciones de la tierra han habitado entre nosotros; y ahora todavía hay esperanza[a] para todo Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final griega es difícil y parece divergir de o condensar el paralelo hebreo en Esdras 10:2. La traducción sigue el sentido más probable, 'todavía hay esperanza para Israel', en vez de una versión más literal pero oscura.
    reason: textual_variant
  - marker: b
    text: El paralelo hebreo expresa con más claridad que tomaron mujeres extranjeras en matrimonio; el griego, en cambio, dice que mujeres extranjeras 'habitaron' entre ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: φωνήσας
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio voces
  lexicon: LSJ
  rationale: El participio expresa que habló en voz alta, con urgencia pública. En español, 'gritó' conserva mejor esa fuerza que un simple 'dijo'.
- source_word: Ἰεχονίας Ἰεήλου
  english_pob_choice: Jechonias son of Jeelus
  chosen_spanish: Jeconías hijo de Jeelus
  alternatives_spanish:
  - Jeconías, de Jeelus
  - Jehonías hijo de Jehiel
  lexicon: LSJ
  rationale: Se transliteran los nombres propios según el uso del proyecto. 'Hijo de' hace explícita la relación filial sugerida por la construcción griega y reflejada también por el paralelo hebreo.
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de entre los hijos de Israel
  lexicon: LSJ
  rationale: Se mantiene la fórmula genealógica y de identidad pactal del griego; 'hijos de Israel' es más fiel que reducirlo a 'israelitas'.
- source_word: ἡμάρτομεν εἰς τὸν κύριον
  english_pob_choice: We have sinned against the Lord
  chosen_spanish: Hemos pecado contra el Señor
  alternatives_spanish:
  - Pecamos contra el Señor
  lexicon: LSJ
  rationale: La locución griega significa pecar contra alguien. 'Hemos pecado' conserva el tono confesional natural en discurso directo; 'contra el Señor' preserva la relación de ofensa.
- source_word: γυναῖκες ἀλλογενεῖς
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres de otro pueblo
  - mujeres ajenas
  lexicon: LSJ
  rationale: ἀλλογενής expresa pertenencia a otro pueblo/raza; 'mujeres extranjeras' es claro y fiel en español moderno sin sobrecargar el texto.
- source_word: ἐκ τῶν ἐθνῶν τῆς γῆς
  english_pob_choice: from the nations of the land
  chosen_spanish: de las naciones de la tierra
  alternatives_spanish:
  - de los pueblos de la tierra
  - de las naciones de la región
  lexicon: LSJ
  rationale: Se conserva la formulación griega con su tono colectivo y geográfico. 'Tierra' sigue de cerca τῆς γῆς y evita una paráfrasis excesiva.
- source_word: κατῴκησαν
  english_pob_choice: have dwelt among us
  chosen_spanish: han habitado entre nosotros
  alternatives_spanish:
  - han vivido entre nosotros
  - se han asentado entre nosotros
  lexicon: LSJ
  rationale: El verbo significa habitar o establecerse. 'Han habitado entre nosotros' traduce de manera transparente la imagen de residencia compartida que presenta el griego.
- source_word: ἐπάνω πᾶς Ἰσραήλ
  english_pob_choice: there is still hope for all Israel
  chosen_spanish: todavía hay esperanza para todo Israel
  alternatives_spanish:
  - y ahora queda esperanza para todo Israel
  - y ahora hay todavía esperanza para todo Israel
  lexicon: LSJ
  rationale: El final griego es difícil y parece comprimido o desviado respecto del paralelo hebreo. Se adopta el sentido más probable y claro para español, manteniendo la idea de esperanza para Israel sin ocultar la dificultad textual.
theological_decisions:
- issue: Renderización de κύριον
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: El griego usa κύριον, y la equivalencia estándar en español es 'el Señor'. Aunque el proyecto privilegia 'Yahvé' para el nombre divino en hebreo, aquí el testimonio inmediato es griego y la fórmula confesional directa favorece 'el Señor'.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / Señor; use YHWH-based Yahvé only when the Hebrew divine name is directly in view'
- issue: Cláusula final difícil y dependencia del paralelo hebreo
  english_pob_reading: there is still hope for all Israel
  chosen_spanish_reading: todavía hay esperanza para todo Israel
  alternative_spanish_readings:
  - una traducción más literal pero oscura del griego final
  - todavía queda algo para todo Israel
  rationale: La cláusula final es semánticamente problemática en el griego y el propio audit trail reconoce su desajuste con el paralelo hebreo. Se adopta el sentido del pasaje paralelo para preservar inteligibilidad, sin borrar la incertidumbre textual.
  doctrine_reference: 'PHILOSOPHY.md: priorizar la evidencia original con uso documentado de paralelos cuando el griego es difícil o parece corrupto'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete como ancla primaria y se incorporó el sentido del paralelo hebreo en la cláusula final, tal como indica el expediente. La redacción española evita calcar el inglés y preserva la tensión textual documentada entre ‘habitaron entre nosotros’ y ‘hay esperanza para todo Israel’.
  spanish_consistency_notes:
  - Se empleó 'el Señor' para κύριον conforme al testimonio griego inmediato, sin introducir 'Yahvé' donde no aparece el nombre hebreo.
  - Se mantuvo 'hijos de Israel' en la fórmula genealógica por fidelidad al griego y por coherencia con el registro bíblico.
  - La cláusula final se volvió inteligible en español sin ocultar que el griego es difícil y que el paralelo hebreo orienta el sentido.
