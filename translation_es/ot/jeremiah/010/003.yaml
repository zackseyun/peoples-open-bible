review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y la línea del POB en la mayoría de los elementos: mantiene la doble causal con כִּי, conserva «los pueblos», «vanidad», la imagen concreta de «un árbol» y la insistencia en la fabricación humana. También preserva correctamente la nota sobre la incertidumbre del instrumento. Sin embargo, «usos» para חֻקּוֹת suena menos natural y menos adecuado en contexto cultual que «costumbres», y «del bosque» con «es cortado» resulta menos idiomático que «del bosque se corta» o «es cortado del bosque». Además, la nota usa «adze», que no es español.'
  spanish_quality_summary: El texto es comprensible, pero necesita un ajuste menor para lograr español más natural y eclesialmente legible. «Los usos de los pueblos» suena algo forzado; «las costumbres de los pueblos» comunica mejor el valor contextual sin perder fidelidad. También conviene corregir la nota al español («azuela») y mejorar ligeramente la fluidez sintáctica del segundo miembro.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones principales están bien encaminadas, pero la elección de «usos» frente a «costumbres» no refleja tan bien la racionalidad léxica documentada para חֻקּוֹת en este contexto. «Artesano», «vanidad», «los pueblos» y «hacha» con nota alternativa son adecuados.
  issues:
  - severity: medium
    issue: «usos» para חֻקּוֹת
    rationale: Aunque posible, «usos» suena menos natural en español bíblico contemporáneo y expresa peor las prácticas/costumbres cultuales de los pueblos que «costumbres».
  - severity: low
    issue: 'Nota con término no español: «adze»'
    rationale: La nota debe estar en español. «Azuela» es la alternativa natural para referirse al posible instrumento.
  - severity: low
    issue: Fluidez sintáctica del segundo miembro
    rationale: «porque un árbol es cortado del bosque» es entendible, pero «porque del bosque se corta un árbol» o «porque un árbol se corta del bosque» suena más natural; además mantiene el foco en el origen material del ídolo.
  revised_spanish_text: Porque las costumbres de los pueblos son vanidad,[a] porque del bosque se corta un árbol, obra de las manos de un artesano con un hacha.
  revised_footnotes:
  - marker: a
    text: O «con una azuela»; el término hebreo se refiere a una herramienta para cortar o dar forma a la madera, y el instrumento exacto es incierto.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «usos» por «costumbres» para reflejar mejor el valor contextual de חֻקּוֹת en español natural y acorde con la justificación léxica del POB. Se corrige la nota al español con «azuela». También se ajusta el orden del segundo miembro para mayor naturalidad sin alterar el sentido ni la estructura causal del hebreo.
