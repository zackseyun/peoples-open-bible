id: COL.3.9
reference: Colossians 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ ψεύδεσθε εἰς ἀλλήλους· ἀπεκδυσάμενοι τὸν παλαιὸν ἄνθρωπον σὺν ταῖς πράξεσιν αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/009.yaml
  text: Do not lie to one another, since you have stripped off the old man with his practices,
translation:
  language: ko
  text: 서로 거짓말하지 마십시오. 여러분은 이미 옛 사람[a]과 그 행실들을 벗어 버렸고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「옛 자아」. 헬라어 「옛 사람」은 다음 절의 「새 사람」과 대조되는 바울의 아담적·인간학적 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ψεύδεσθε εἰς ἀλλήλους
  english_pob_choice: Do not lie to one another
  chosen_korean: 서로 거짓말하지 마십시오
  alternatives_korean:
  - 서로 속이지 마십시오
  - 피차에 거짓말을 말라
  lexicon: BDAG
  rationale: ψεύδομαι + εἰς ἀλλήλους의 관용을 「서로 거짓말하지 마십시오」로 옮긴다.
- source_word: ἀπεκδυσάμενοι
  english_pob_choice: since you have stripped off
  chosen_korean: 이미 ... 벗어 버렸고
  alternatives_korean:
  - 벗어 버린 채
  - 이미 벗어 버렸으므로
  lexicon: BDAG
  rationale: 부정과거 중간 분사. 「이미 ~ 벗어 버렸고」로 결과적 근거를 자연스럽게 살린다.
- source_word: τὸν παλαιὸν ἄνθρωπον
  english_pob_choice: the old man
  chosen_korean: 옛 사람
  alternatives_korean:
  - 옛 자아
  - 옛 인간
  lexicon: BDAG
  rationale: 다음 절의 「새 사람」과 대조되는 바울의 정립된 표현. 한국 교회의 정립된 「옛 사람」 사용.
- source_word: σὺν ταῖς πράξεσιν αὐτοῦ
  english_pob_choice: with his practices
  chosen_korean: 그 행실들을
  alternatives_korean:
  - 그것의 행위들과 함께
  - 그 행동들과 함께
  lexicon: BDAG
  rationale: 「옛 사람」 은유에서의 αὐτοῦ를 「그」로 옮긴다. πρᾶξις는 「행실」(습관적 행위).
