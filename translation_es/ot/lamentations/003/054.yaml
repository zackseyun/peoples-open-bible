  rationale: Se añade «se» a «cerraron» para producir un español natural y fiel al sentido de aguas que se cierran/engullen sobre el hablante. Se conserva «Estoy cortado» porque mantiene la metáfora hebrea y la decisión lexical del POB. También se ajusta la nota [a] para que reproduzca con más precisión la alternativa auditada en inglés.
