theological_decisions:
- issue: Judah's anti-wine exhortation after the Tamar narrative
  chosen_reading: Translate the warning as moral exhortation against drunkenness, not as an absolute ban on all wine.
  alternative_readings:
  - Total abstinence command
  - Merely prudential advice with no moral force
  rationale: The chapter explicitly allows wine within limits before condemning excess; the translation preserves both the warning and the qualified allowance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Relation of Judah's kingship to Levi's priesthood
  chosen_reading: Render the text as subordinating earthly kingship to priesthood while preserving the conditional clause about priesthood falling through sin.
  alternative_readings:
  - Absolute supremacy of priesthood in every sense
  - Later harmonized equality of offices
  rationale: The Greek rhetoric strongly elevates priesthood, yet includes a qualification. The translation keeps that tension rather than smoothing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Possible later expansion in the Enoch reference and Levi/Judah institutional theology
  chosen_reading: Translate the Greek witness straightforwardly and note the literary-theological texture without excision.
  alternative_readings:
  - Omit as interpolation
  - Harmonize with later canonical formulations
  rationale: Project policy requires honesty to the Greek witness and transparency around possible expansion rather than silent harmonization.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent
