translation:
  language: es
  text: 'Entonces sus siervos le dijeron: «Que busquen para mi señor el rey una joven virgen, y que esté delante del rey[a] y sea su cuidadora[b], y que se acueste en tu seno[c], para que mi señor el rey entre en calor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que atienda al rey»; la expresión hebrea literalmente dice «estar delante de», pero en contexto puede significar servir o atender a alguien.
    reason: lexical_alternative
  - marker: b
    text: O «asistente» o «nodriza»; el término hebreo es raro y designa a quien ministra o cuida a otra persona.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en tu seno».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: En contexto de corte real, עבד puede referirse a servidores del palacio. «Siervos» conserva la relación de servicio sin cargar innecesariamente con la fuerza social de «esclavos», que aquí no parece ser la intención principal del pasaje.
- source_word: יְבַקְשׁוּ
  english_pob_choice: Let them seek
  chosen_spanish: Que busquen
  alternatives_spanish:
  - Que se busque
  - Busquen
  lexicon: HALOT
  rationale: El imperfecto plural con valor volitivo se vierte bien con un subjuntivo exhortativo en español. «Que busquen» mantiene la iniciativa activa del hebreo.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  english_pob_choice: for my lord the king
  chosen_spanish: para mi señor el rey
  alternatives_spanish:
  - para el señor, mi rey
  - para mi señor, el rey
  lexicon: HALOT
  rationale: Se conserva la fórmula cortesana con posesivo de respeto implícito en «mi señor» y el aposicional «el rey». «Mi señor el rey» sería una opción más literal, pero «para mi señor el rey» suena más natural en español.
- source_word: נַעֲרָה בְתוּלָה
  english_pob_choice: a young virgin
  chosen_spanish: una joven virgen
  alternatives_spanish:
  - una joven virgen mujer
  - una muchacha virgen
  lexicon: HALOT
  rationale: «נערה» aporta la idea de juventud/frescura y «בתולה» especifica virginidad. «Joven virgen» conserva ambos rasgos de forma compacta y natural en español.
- source_word: וְעָמְדָה לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: let her stand before the king
  chosen_spanish: y que ella esté delante del rey
  alternatives_spanish:
  - y que ella se ponga delante del rey
  - y que atienda al rey
  lexicon: HALOT
  rationale: La locución hebrea puede denotar servicio o asistencia en la corte. Aquí se prefiere una formulación cercana al hebreo («esté delante del rey») para no reducir demasiado el matiz de presencia/servicio.
- source_word: סֹכֶנֶת
  english_pob_choice: caregiver
  chosen_spanish: cuidadora
  alternatives_spanish:
  - sirvienta
  - nodriza
  - asistente
  lexicon: HALOT
  rationale: El término es raro y alude a alguien que atiende o cuida. «Cuidadora» comunica bien la función práctica en este contexto sin introducir connotaciones sexuales ni técnicos anacrónicos.
- source_word: וְשָׁכְבָה בְחֵיקֶךָ
  english_pob_choice: let her lie in your bosom
  chosen_spanish: y que se acueste en tu seno
  alternatives_spanish:
  - y que repose en tu seno
  - y que se acueste en tu regazo
  lexicon: HALOT
  rationale: «חֵיק» literalmente es «seno/bosom». «Tu seno» preserva la imagen corporal concreta y el trasfondo de cercanía física para dar calor. «Regazo» sería una posible equivalencia cultural, pero pierde parte de la concreción semítica.
- source_word: וְחַם
  english_pob_choice: so that my lord the king may be warm
  chosen_spanish: para que mi señor el rey se caliente
  alternatives_spanish:
  - y se caliente mi señor el rey
  - para que el rey tenga calor
  lexicon: HALOT
  rationale: Se expresa el resultado deseado de forma directa. «Se caliente» mantiene el valor de hacerse cálido, sin suavizarlo a una expresión más abstracta.
theological_decisions:
- issue: La frase sobre la joven y el rey tiene posibles lecturas que podrían sexualizar o desexualizar indebidamente el texto.
  english_pob_reading: The English POB keeps the concrete image of lying in the king's bosom and notes the literal expression, while rendering the function as caregiver.
  chosen_spanish_reading: Se conserva la imagen concreta de «tu seno» y la función de «cuidadora», sin añadir explicaciones que el texto no da.
  alternative_spanish_readings:
  - «y que se acueste junto a ti»
  - «y que le haga compañía para darle calor»
  rationale: El hebreo usa un lenguaje físico explícito, pero la función inmediata es el cuidado/calor del rey anciano. La traducción debe preservar esa tensión sin resolverla artificialmente en una dirección no sustentada por el texto.
  doctrine_reference: Ninguno; decisión de sentido lexical y narrativo.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en inglés: se elimina cualquier equivalente de «woman» y se mantiene la cercanía al hebreo en «stand before the king», aquí reflejada como «esté delante del rey». También se preserva la solución del audit trail para el término raro סֹכֶנֶת mediante una nota léxica y la imagen literal de חֵיק.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino por consistencia con el estándar del proyecto cuando corresponda.
  - 'Se mantuvo un registro reverente pero no arcaizante: «mi señor el rey», «joven virgen», «cuidadora».'
  - No se introdujo «Cristo» ni terminología teológica ajena al pasaje.
  - La combinación de imagen corporal concreta y función de cuidado refleja la tensión documentada del inglés POB.
