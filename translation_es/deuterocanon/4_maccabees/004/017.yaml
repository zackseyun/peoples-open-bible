translation:
  language: es
  text: Y él le permitió servir como sumo sacerdote y dirigir a la nación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernar a la nación». El verbo griego también puede tener el sentido de conducir como jefe.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέτρεψεν
  english_pob_choice: permitted
  chosen_spanish: le permitió
  alternatives_spanish:
  - le autorizó
  - le concedió permiso
  lexicon: BDAG
  rationale: El verbo expresa otorgar permiso o autorización. «Le permitió» conserva esa idea sin convertirla en una fórmula de nombramiento más fuerte de lo que el griego dice.
- source_word: ἀρχιερασθαι
  english_pob_choice: to serve as high priest
  chosen_spanish: servir como sumo sacerdote
  alternatives_spanish:
  - ser sumo sacerdote
  - ocupar el sumo sacerdocio
  lexicon: LSJ
  rationale: El infinitivo indica ejercer la función del sumo sacerdocio. «Servir como sumo sacerdote» conserva el sentido funcional y evita reducirlo solo al estatus.
- source_word: τοῦ ἔθνους
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la comunidad nacional
  lexicon: BDAG
  rationale: En este contexto judío, ἔθνος tiene sentido de cuerpo nacional. «La nación» mantiene esa dimensión político-comunitaria.
- source_word: ἀφηγεῖσθαι
  english_pob_choice: to lead
  chosen_spanish: liderar
  alternatives_spanish:
  - gobernar
  - ser jefe de
  - guiar
  lexicon: LSJ
  rationale: El verbo puede significar conducir o dirigir como cabeza. «Liderar» es natural en español y no añade una carga de dominio mayor que la del griego.
theological_decisions:
- issue: Alcance de la autoridad concedida
  english_pob_reading: The verse states that permission was given both for the high priesthood and for leadership of the nation.
  chosen_spanish_reading: El versículo afirma que se le permitió tanto ejercer el sumo sacerdocio como liderar a la nación.
  alternative_spanish_readings:
  - '...como gobernar a la nación.'
  - '...como ser jefe de la nación.'
  rationale: Los dos infinitivos dependen del mismo verbo de permiso. La traducción conserva tanto la dimensión religiosa como la civil sin precisar más de lo que el griego permite.
  doctrine_reference: Conservar la tensión semántica sin resolverla de forma excesiva; equivalencia óptima.
translation_notes:
  revision_awareness: El texto griego presenta una coordinación simple de dos infinitivos bajo un solo verbo de permiso; se mantuvo esa estructura y no se intensificó el matiz político más allá de lo que la fuente muestra. La versión inglesa auditada ya opta por una alternativa semántica conservadora, y la presente traducción la sigue en español.
  spanish_consistency_notes:
  - Se usó «sumo sacerdote» para reflejar ἀρχιερασθαι con terminología bíblica clara y comprensible.
  - Se evitó «SEÑOR» u otra sustitución no pertinente, porque no aparece el nombre divino en este versículo.
  - «Liderar» se eligió como equivalente contemporáneo de ἀφηγεῖσθαι sin forzar una lectura de «reinar» o «gobernar».
