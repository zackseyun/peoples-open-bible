translation:
  language: es
  text: Sin embargo, nos has rechazado y nos has avergonzado[a], y no sales con nuestros ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no sales con nuestros ejércitos».'
