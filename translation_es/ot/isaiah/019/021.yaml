review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Yahvé se da a conocer a Egipto, Egipto conoce a Yahvé, ofrece culto sacrificial, hace votos y los cumple. Preserva correctamente Yahvé, la referencia colectiva de Egipto y el valor de cumplir los votos. Sin embargo, hay desajustes en las notas: la nota [b] está anclada a «ofrenda» pero comenta el verbo «servirán», y la nota [c] está anclada a «cumplirán» aunque explica «harán votos». Además, la nota [a] usa «por Egipto», menos natural que «a Egipto» como alternativa pasiva en español.'
  spanish_quality_summary: El español es claro, digno y bastante natural. La secuencia verbal funciona bien, aunque conviene ajustar la puntuación y, sobre todo, la colocación de los marcadores de nota para que correspondan al término comentado. «Harán votos» es idiomático, pero la nota debe ir ahí, no en «cumplirán».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» está correcto; זֶבַח/מִנְחָה → «sacrificio y ofrenda» es adecuado; וְשִׁלֵּמוּ → «los cumplirán» preserva el sentido idiomático. Para עָבְדוּ, «servirán» es aceptable dado el audit trail inglés revisado, siempre que la nota explicativa se ancle al verbo. No hay conflicto doctrinal que requiera adjudicación adicional.'
  issues:
  - severity: medium
    issue: Marcador [b] colocado en «ofrenda» en vez de en «servirán»
    rationale: La nota [b] explica el verbo hebreo עָבְדוּ ('servir' / 'adorar'), no el sustantivo «ofrenda». Debe anclarse al verbo o a la frase verbal pertinente.
  - severity: medium
    issue: Marcador [c] colocado en «cumplirán» en vez de en «harán votos»
    rationale: La nota [c] comenta el hebreo cognado וְנָדְרוּ נֵדֶר ('harán votos' / 'votarán un voto'), no el verbo «cumplirán». El anclaje actual induce a error exegético.
  - severity: low
    issue: Redacción mejorable de la alternativa en la nota [a]
    rationale: «Yahvé será conocido por Egipto» es posible, pero en español suena menos natural para expresar el destinatario de la revelación que «Yahvé será conocido por Egipto»/«llegará a ser conocido por Egipto». Dado que la nota explica una alternativa pasiva, conviene pulirla levemente para mayor claridad.
  revised_spanish_text: Yahvé se dará a conocer a Egipto[a], y Egipto conocerá a Yahvé en aquel día; y servirán[b] con sacrificio y ofrenda, y harán votos[c] a Yahvé y los cumplirán.
  revised_footnotes:
