revisions:
- from: Y el sacerdote ofrecerá uno como ofrenda por el pecado[a] y otro como holocausto, y hará expiación por él a causa de lo que pecó por razón del muerto[b], y consagrará su cabeza en aquel día.
  to: Y el sacerdote ofrecerá uno como ofrenda por el pecado[a] y otro como holocausto, y hará expiación por él por la falta que cometió por causa del muerto[b], y consagrará su cabeza en aquel día.
  rationale: Se ajustó únicamente la cláusula causal para lograr un español más natural y preciso, evitando la duplicación torpe de expresiones causales y reduciendo el riesgo de una lectura moralizante excesiva en un contexto de impureza ritual. Se conservaron la estructura del versículo, la terminología sacrificial y las notas existentes.
