translation:
  language: es
  text: El dinero[a] de la ofrenda por la culpa y el dinero de las ofrendas por el pecado no debía llevarse a la casa de Yahvé[b]; pertenecía a los sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'plata de la ofrenda por la culpa y plata de las ofrendas por el pecado'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'la casa de Yahvé'; es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - fondos
  lexicon: HALOT
  rationale: En este contexto de ofrendas y tesoro del templo, כֶּסֶף puede referirse literalmente a plata como metal o, por extensión, a una cantidad monetaria. En español, 'plata' conserva esa ambigüedad funcional sin perder el trasfondo material del término hebreo, y evita un tecnicismo demasiado abstracto.
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda de culpa
  - ofrenda de reparación
  lexicon: HALOT
  rationale: La expresión española mantiene la categoría sacrificial reconocible y explicita el valor de culpa/reparación del hebreo אָשָׁם. 'Ofrenda por la culpa' es clara y suficientemente literal para el contexto cultual.
- source_word: חַטָּאוֹת
  english_pob_choice: sin offerings
  chosen_spanish: ofrendas por el pecado
  alternatives_spanish:
  - ofrendas por los pecados
  - ofrendas purificatorias
  lexicon: HALOT
  rationale: Aquí el plural designa ofrendas sacrificiales, no pecados abstractos. 'Ofrendas por el pecado' conserva el paralelo con el inglés POB y comunica el sentido cultual sin introducir una paráfrasis técnica no requerida por el verso.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de renderizar יְהוָה como 'Yahvé'. 'Casa de Yahvé' reproduce de modo directo la expresión hebrea בֵּית יְהוָה y mantiene la referencia al santuario sin sustituirla por una glosa interpretativa.
- source_word: לַכֹּהֲנִים יִהְיוּ
  english_pob_choice: it belonged to the priests
  chosen_spanish: era para los sacerdotes
  alternatives_spanish:
  - pertenecía a los sacerdotes
  - les correspondía a los sacerdotes
  lexicon: HALOT
  rationale: El hebreo expresa asignación/posesión. En español, 'era para los sacerdotes' transmite la distribución legal del ingreso de manera natural y evita la rigidez de un posesivo que podría sonar menos idiomático en este tipo de norma administrativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología del proyecto, se mantiene el nombre propio divino como 'Yahvé' en lugar de ocultarlo tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido administrativo-sacrificial del hebreo y la decisión auditada en inglés de entender כֶּסֶף funcionalmente como dinero/fondos; en español se optó por 'plata' para conservar el valor material del término sin perder naturalidad. Se preserva además la distinción entre la ofrenda por la culpa y las ofrendas por el pecado, y se mantiene el nombre divino como Yahvé según la política del proyecto.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara del Tetragrámaton y se usa 'Yahvé' en todo el texto.
  - '''ofrenda por la culpa'' y ''ofrendas por el pecado'' mantienen la terminología sacrificial diferenciada.'
  - '''era para los sacerdotes'' expresa asignación legal sin sobretraducción.'
  - La nota sobre 'casa de Yahvé' aclara el valor de 'casa' como referencia al templo sin reemplazar la expresión hebrea.
