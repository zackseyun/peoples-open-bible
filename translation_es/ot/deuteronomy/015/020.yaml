revisions:
- from: Ustedes y su casa lo comerán delante de Yahvé su Dios, año tras año, en el lugar que Yahvé escogerá.
  to: Tú y tu casa lo comerán delante de Yahvé tu Dios, año tras año, en el lugar que Yahvé escogerá.[a]
  rationale: Se corrige la persona gramatical al singular para reflejar fielmente el hebreo y el audit trail inglés. Se mantiene "delante de Yahvé" como redacción principal por naturalidad en español, y se añade la alternativa "en presencia de" en nota para conservar la opción léxica documentada. "Tú y tu casa" reproduce mejor el hebreo que la formulación plural del borrador.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico de la línea hebrea: comer el animal delante de Yahvé, con periodicidad anual, en el lugar escogido por Yahvé. Sin embargo, altera de manera significativa el destinatario gramatical. El hebreo tiene segunda persona singular en todo el versículo ("tu Dios", "comerás", "tú y tu casa"), y el inglés auditado lo mantiene conceptualmente con una formulación singular + hogar. El español draft cambia a plural reverencial/comunitario ("Ustedes", "su"), lo que no está justificado por la evidencia fuente ni por la decisión inglesa auditada.'
  spanish_quality_summary: El español es comprensible, pero "Ustedes y su casa" suena internamente discordante porque mezcla un plural explícito con un singular colectivo "casa" y borra la fuerza del singular legal deuteronómico. Además, "tu casa" o mejor "tu hogar"/"tu casa" en singular con "tú" produce una lectura más natural y fiel. El resto del texto fluye bien; "delante de Yahvé" y "año tras año" son opciones idiomáticas aceptables.
  glossary_alignment: Se alinea correctamente con la política del proyecto en usar "Yahvé" para יְהוָה. La decisión para בֵּיתֶךָ debe ajustarse a la preferencia auditada de "household"; en español, "tu casa" es aceptable y sobria, aunque "tu hogar" sería más interpretativa. No hay conflicto terminológico mayor fuera del cambio indebido de persona gramatical.
  issues:
  - severity: high
    issue: Cambio de segunda persona singular a plural en el texto principal
    rationale: 'El hebreo usa sufijos y formas verbales de 2ms: אֱלֹהֶיךָ, תֹאכֲלֶנּוּ, אַתָּה וּבֵיתֶךָ. El borrador introduce "Ustedes" y "su", lo que modifica la forma de dirección del mandato legal y no sigue la evidencia fuente.'
  - severity: medium
    issue: '"Ustedes y su casa" no refleja bien אַתָּה וּבֵיתֶךָ'
    rationale: Además del problema de persona, la combinación suena poco natural y menos precisa que "tú y tu casa". La audit trail inglesa prefirió "household" por el sentido doméstico-social; "tu casa" conserva ese campo semántico de manera suficientemente fiel en este contexto.
  - severity: low
    issue: Falta la nota opcional para לִפְנֵי preservada en el inglés
    rationale: 'El inglés conserva la alternativa léxica "in the presence of" en nota. No es indispensable para la fidelidad mínima, pero conviene preservarla en español como alternativa significativa: "O ''en presencia de Yahvé tu Dios''."'
  revised_spanish_text: Tú y tu casa lo comerán delante de Yahvé tu Dios, año tras año, en el lugar que Yahvé escogerá.[a]
  revised_footnotes:
  - marker: a
    text: O "en presencia de Yahvé tu Dios".
    reason: lexical_alternative
  revision_rationale: Se corrige la persona gramatical al singular para reflejar fielmente el hebreo y el audit trail inglés. Se mantiene "delante de Yahvé" como redacción principal por naturalidad en español, y se añade la alternativa "en presencia de" en nota para conservar la opción léxica documentada. "Tú y tu casa" reproduce mejor el hebreo que la formulación plural del borrador.
