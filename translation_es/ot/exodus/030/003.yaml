  to: 'Lo revestirás de oro puro: su parte superior, sus paredes por todo alrededor y sus cuernos; y le harás una moldura de oro alrededor[a].'
  rationale: Se corrigió el anclaje de la nota para que comente el término correcto (זֵר), se arregló la gramática ('una moldura') y se mejoró el orden de palabras para un español más natural sin perder la estructura ni el sentido del hebreo. También se reforzó levemente el primer סָבִיב con 'por todo alrededor'.
