revisions:
- from: Pero ellos no conocen los pensamientos de Yahvé[a], ni entienden su plan[b], porque los ha reunido como gavillas en la era.
  to: Pero ellos no conocen los pensamientos de Yahvé, ni entienden su plan, porque los ha reunido como gavillas[a] a la era[b].
