translation:
  language: es
  text: 'Recuerden[a] la palabra que Moisés, el esclavo de Yahvé, les mandó, diciendo: «Yahvé, su Dios, les está dando descanso y les dará esta tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Recuerda». El hebreo está en singular, pero aquí se dirige a las tribus en conjunto; el plural español comunica mejor el destinatario colectivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: זָכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden
  - Recuerda
  lexicon: HALOT
  rationale: El verbo hebreo es un imperativo directo de llamado a la memoria. En español, el plural concuerda con la audiencia de las tribus y conserva la fuerza exhortativa sin sonar forzado.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra
  - el mandato
  - el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘cosa’. Aquí introduce el contenido de la instrucción previa de Moisés; ‘la palabra’ mantiene esa forma breve y sobria. ‘El mandato’ sería más interpretativo y desplazaría el énfasis del sustantivo hebreo.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - mandó
  - ordenó
  - encomendó
  lexicon: HALOT
  rationale: El verbo expresa instrucción con autoridad. ‘Mandó’ es natural en español bíblico moderno y conserva la fuerza directiva. ‘Ordenó’ sería correcto pero algo más técnico; ‘encomendó’ suaviza demasiado el valor de mandato.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el esclavo de Yahvé
  alternatives_spanish:
  - el esclavo de Yahvé
  - el siervo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene ‘esclavo’ porque el término hebreo עֶבֶד tiene esa fuerza léxica básica y el proyecto POB evita atenuarla sin razón contextual. Aunque en español ‘siervo’ suena más tradicional, aquí debilitaría el peso del título y la relación de pertenencia/servicio. Se conserva el valor honorífico del cargo en el contexto de Moisés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa ‘Yahvé’ según la convención del proyecto para el Tetragrámaton. Evita la sustitución litúrgica por un título y conserva el nombre propio del pacto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - así
  lexicon: HALOT
  rationale: Funciona como marcador de cita. ‘Diciendo’ es la equivalencia directa y transparente en español.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural posesivo queda mejor naturalizado como ‘su Dios’ en español para la audiencia plural, sin necesidad de duplicación pronominal. El contexto deja claro que se dirige a los destinatarios.
- source_word: מֵנִיחַ
  english_pob_choice: is giving you rest
  chosen_spanish: les está dando descanso
  alternatives_spanish:
  - les está dando descanso
  - les da descanso
  - les está haciendo descansar
  lexicon: HALOT
  rationale: 'El participio hifil comunica acción en curso: Yahvé está causando reposo/descanso. ‘Les está dando descanso’ mantiene el aspecto progresivo y el sentido de alivio y asentamiento. ‘Haciendo descansar’ sería más literal pero menos natural en español.'
- source_word: וְנָתַן
  english_pob_choice: will give
  chosen_spanish: les dará
  alternatives_spanish:
  - les dará
  - les ha dado
  - les da
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más reciente que toma el verbo como futuro en contexto. En español, ‘les dará’ expresa la promesa inmediata y la certeza del don futuro sin forzar un pretérito perfecto.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - esta tierra misma
  - este territorio
  lexicon: HALOT
  rationale: ‘Tierra’ es la equivalencia natural de אֶרֶץ en el contexto de heredad y promesa. ‘Territorio’ sería más administrativo y menos bíblico.
theological_decisions:
- issue: Título de Moisés como עֶבֶד יְהוָה
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el esclavo de Yahvé
  alternative_spanish_readings:
  - el siervo de Yahvé
  rationale: La decisión preserva la tensión lexical de עֶבֶד. Aunque en el español eclesial ‘siervo’ resulta más familiar, el proyecto POB favorece ‘esclavo’ cuando el lexema lo requiere. En este contexto, el título honra la comisión de Moisés sin suavizar el término base.
  doctrine_reference: 'DOCTRINE.md: lexical force and transparent rendering of עבד'
- issue: Valor temporal de וְנָתַן
  english_pob_reading: will give you this land
  chosen_spanish_reading: les dará esta tierra
  alternative_spanish_readings:
  - les ha dado esta tierra
  - les da esta tierra
  rationale: La revisión inglesa reciente decidió el futuro por el encadenamiento verbal y el contexto de promesa. El español adopta ese futuro para mantener la expectativa del don sin introducir una lectura completada que no está exigida por el hebreo inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre divino propio en lugar de una sustitución titulativa. Esto sigue la norma del proyecto y mantiene la transparencia respecto al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La base inglesa revisó una decisión previa sobre וְנָתַן: de ''has given'' a ''will give''. El español sigue esa revisión y evita una lectura de pasado cumplido. También se observó la alta concordancia del proceso de revisión, con solo un ajuste menor en el valor temporal del verbo.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar para יְהוָה.
  - Se usa ‘esclavo’ de manera consistente con la política POB para עֶבֶד.
  - ‘Esta tierra’ conserva la referencia concreta a la heredad ya en vista en el contexto narrativo.
  - La cita directa se cierra con comillas españolas y puntuación idiomática.
  - 'El pronombre objeto se integra de forma natural en español: ‘les está dando’ / ‘les dará’.'
