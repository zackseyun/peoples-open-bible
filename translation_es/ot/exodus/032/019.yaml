translation:
  language: es
  text: Y en cuanto se acercó al campamento y vio el becerro y las danzas[a], la ira de Moisés se encendió, y arrojó las tablas que llevaba en las manos y las quebró al pie del monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el baile». El sustantivo hebreo está en plural, más literalmente «danzas», pero en español también puede expresarse con un singular colectivo según el estilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יְהִ֗י כַּ/אֲשֶׁ֤ר
  english_pob_choice: And as soon as
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y aconteció que, cuando
  - Y al acercarse
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una secuencia inmediata. En español, «Y sucedió que, cuando» conserva el arranque narrativo sin caer en un calco rígido, y mantiene bien la relación temporal de כַּאֲשֶׁר.
- source_word: קָרַב֙ אֶל הַֽ/מַּחֲנֶ֔ה
  english_pob_choice: he came near the camp
  chosen_spanish: se acercó al campamento
  alternatives_spanish:
  - se aproximó al campamento
  - llegó cerca del campamento
  lexicon: HALOT
  rationale: קָרַב expresa acercarse. «Se acercó al campamento» es natural en español y preserva el sentido espacial sin añadir matices no presentes en el hebreo.
- source_word: וַ/יַּ֥רְא אֶת הָ/עֵ֖גֶל
  english_pob_choice: and saw the calf
  chosen_spanish: y vio el becerro
  alternatives_spanish:
  - y vio al becerro
  - y contempló el becerro
  lexicon: HALOT
  rationale: רָאָה es «ver». Se mantiene el objeto específico ya conocido por el contexto. «Becerro» comunica bien el ídolo del relato; el artículo definido queda implícito en el flujo español como en el contexto.
- source_word: וּ/מְחֹלֹ֑ת
  english_pob_choice: and the dancing
  chosen_spanish: y las danzas
  alternatives_spanish:
  - y la danza
  - y el baile
  lexicon: HALOT
  rationale: El plural hebreo puede traducirse formalmente como «danzas». Se elige el plural porque refleja mejor la forma del sustantivo y conserva la posibilidad de varias danzas o movimientos rituales; «la danza» sería más idiomático, pero atenúa el plural del original.
- source_word: וַ/יִּֽחַר אַ֣ף מֹשֶׁ֗ה
  english_pob_choice: Moses' anger burned
  chosen_spanish: la ira de Moisés se encendió
  alternatives_spanish:
  - Moisés se enfureció
  - la ira de Moisés ardió
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude al encenderse de la ira. «La ira de Moisés se encendió» conserva la imagen y el tono del hebreo mejor que una simple traducción psicológica como «se enfureció».
- source_word: וַ/יַּשְׁלֵ֤ךְ מ/יד/ו
  english_pob_choice: and he threw ... from his hands
  chosen_spanish: y arrojó las tablas de sus manos
  alternatives_spanish:
  - y las lanzó de sus manos
  - y las tiró de sus manos
  lexicon: HALOT
  rationale: שָׁלַךְ es arrojar/lanzar. Se conserva la imagen de «de sus manos» para reflejar el hebreo, aunque en español el plural puede sonar más natural por el contexto de las dos tablas.
- source_word: אֶת הַ/לֻּחֹ֔ת
  english_pob_choice: the tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las tablas de piedra
  - las losas
  lexicon: HALOT
  rationale: לוּחֹת puede rendirse por «tablas» en español bíblico y común. Aunque «tablas» puede sonar menos moderno que «tablillas», aquí es la forma más transparente y tradicional para las tablas del pacto.
- source_word: וַ/יְשַׁבֵּ֥ר אֹתָ֖/ם
  english_pob_choice: and shattered them
  chosen_spanish: y las quebró
  alternatives_spanish:
  - y las rompió
  - y las hizo pedazos
  lexicon: HALOT
  rationale: שָׁבַר significa romper/quebrar. «Quebró» es una opción digna y fiel, suficientemente fuerte sin volverse coloquial como «rompió» ni más interpretativa como «hizo pedazos».
- source_word: תַּ֥חַת הָ/הָֽר
  english_pob_choice: at the foot of the mountain
  chosen_spanish: al pie del monte
  alternatives_spanish:
  - debajo del monte
  - a los pies del monte
  lexicon: HALOT
  rationale: En contexto topográfico, תַּחַת se entiende naturalmente como la base o el pie de una montaña. «Al pie del monte» es la equivalencia española más clara y estándar.
theological_decisions:
- issue: Cómo renderizar la reacción emocional de Moisés sin suavizarla ni exagerarla
  english_pob_reading: Moses' anger burned
  chosen_spanish_reading: la ira de Moisés se encendió
  alternative_spanish_readings:
  - Moisés se enfureció
  - la ira de Moisés ardió
  rationale: La redacción conserva el hebraísmo de una ira que «arde» o «se enciende», que es más vívido que una simple nota de enojo. No se añade ninguna interpretación moral o psicológica ajena al texto; solo se preserva la intensidad narrativa.
  doctrine_reference: Ex 32:19; cf. el uso idiomático de חרה אף en el hebreo bíblico
- issue: Si traducir הַלֻּחֹת con un término más técnico o con el término bíblico común
  english_pob_reading: the tablets
  chosen_spanish_reading: las tablas
  alternative_spanish_readings:
  - las tablas de piedra
  - las tablillas
  rationale: «Tablas» mantiene la referencia bíblica a las tablas del pacto sin introducir una precisión material que este versículo no da por sí mismo. Añadir «de piedra» sería contextual pero excede la información inmediata del verso.
  doctrine_reference: Éx 24:12; 31:18; 32:15-16
- issue: Cómo reflejar el plural de מְחֹלֹת sin sobreinterpretarlo como solo una danza única
  english_pob_reading: the dancing
  chosen_spanish_reading: las danzas
  alternative_spanish_readings:
  - la danza
  - el baile
  rationale: El plural hebreo merece reflejarse en español si es posible. «Las danzas» deja abierta la posibilidad de varias expresiones de baile o de una escena plural de celebración idolátrica, sin añadir la noción más explicativa de «revelry».
  doctrine_reference: Ex 32:6, 19
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la traducción auditada en inglés. Se mantuvo la equivalencia óptima del EN POB: fórmula narrativa idiomática, preservación de la imagen hebrea de la ira que se enciende, plural de מְחֹלֹת reflejado como «danzas» con nota, y cierre topográfico natural en español. No se detectaron revisiones aplicadas en el historial inglés, y el cotejo interno señala alta concordancia con solo cuestiones menores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «Moisés» sin posesivo inglés, manteniendo la agencia explícita del sujeto verbal.
  - «Las tablas» se conserva como término bíblico estándar en español, coherente con el contexto del pacto.
  - Se eligió «al pie del monte» para naturalidad topográfica en español latinoamericano.
  - El plural «danzas» se conserva para respetar la morfología hebrea; la nota ofrece la alternativa idiomática en singular.
