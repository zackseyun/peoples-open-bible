translation:
  language: es
  text: Pero si la afección[a] vuelve y brota en la casa, después de que haya quitado las piedras, y después de que haya raspado la casa, y después de que haya sido revestida,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la enfermedad», «la infección» o «la aflicción» para נגע, término técnico en Levítico para una condición marcada que afecta personas, prendas o casas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: Introduce una nueva casuística legal con matiz adversativo, como en el audit trail inglés. «Pero si» conserva la transición y suena natural en español jurídico-bíblico.
- source_word: יָשׁוּב
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: שוב expresa reaparición o retorno de la condición. «Vuelve» es natural en español y mantiene la idea de reaparición de la afección.
- source_word: הַנֶּגַע
  english_pob_choice: the disease
  chosen_spanish: la afección
  alternatives_spanish:
  - la enfermedad
  - la infección
  - la plaga
  - la aflicción
  lexicon: HALOT
  rationale: En Levítico, נגע es un término técnico para una condición marcada que puede afectar personas, prendas o casas. «Afección» permite conservar esa amplitud sin cargar la traducción con una sola categoría médica.
- source_word: וּפָרַח
  english_pob_choice: breaks out
  chosen_spanish: se extiende
  alternatives_spanish:
  - brota
  - irrumpe
  - se manifiesta
  lexicon: HALOT
  rationale: El hebreo usa una imagen de brotar/florecer para una reaparición expansiva. «Se extiende» comunica bien la propagación en una casa en español, sin perder el carácter dinámico del verbo.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  - en esa casa
  lexicon: HALOT
  rationale: La preposición es locativa; «en la casa» es el equivalente natural y claro en español.
- source_word: אַחַר חִלֵּץ אֶת־הָאֲבָנִים
  english_pob_choice: after he has removed the stones
  chosen_spanish: después de que haya quitado las piedras
  alternatives_spanish:
  - después de remover las piedras
  - tras haber quitado las piedras
  lexicon: HALOT
  rationale: חלץ aquí se refiere a sacar o retirar las piedras afectadas. «Quitar» es idiomático en español y conserva el sentido procedimental.
- source_word: וְאַחֲרֵי הִקְצוֹת אֶת־הַבַּיִת
  english_pob_choice: and after he has scraped the house
  chosen_spanish: y después de que haya raspado la casa
  alternatives_spanish:
  - y después de haber raspado la casa
  - y después de que haya rascado la casa
  lexicon: HALOT
  rationale: קצה en este contexto describe raspar o escarbar la superficie de la casa. «Raspado» preserva la acción física concreta del procedimiento.
- source_word: וְאַחֲרֵי הִטּוֹחַ
  english_pob_choice: and after it has been plastered
  chosen_spanish: y después de que haya sido enlucida
  alternatives_spanish:
  - y después de que haya sido revocada
  - y después de que haya sido revocada con yeso
  lexicon: HALOT
  rationale: טוח alude al revestimiento final de la casa. «Enlucida» es un término español preciso y digno para ese acabado, sin recurrir a un calco demasiado técnico o regional.
theological_decisions:
- issue: Término técnico נגע aplicado a casas
  english_pob_reading: the disease / the infection / the affliction
  chosen_spanish_reading: la afección
  alternative_spanish_readings:
  - la enfermedad
  - la infección
  - la aflicción
  rationale: No se trata de una enfermedad biológica ordinaria sino de una condición ritual y visible dentro del marco levítico. «Afección» mantiene la neutralidad técnica y deja abierta la tensión lexical del término hebreo.
  doctrine_reference: Levítico 13–14; carácter ritual del נגע en casas, prendas y personas
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión (high_agreement, acuerdo total). La presente propuesta sigue de cerca ese valor auditado y adapta los términos técnicos al español sin perder la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se conserva el patrón casuístico «Pero si... y después de que...», coherente con el estilo legal del pasaje.
  - «Afección» se usa para נגע de manera consistente con el carácter técnico del contexto levítico.
  - «Enlucida» traduce el acabado final de la casa con un término comprensible y no excesivamente moderno.
  - 'Se mantiene una progresión verbal que refleja la secuencia ritual completa: volver, extenderse, quitar, raspar, enlucir.'
