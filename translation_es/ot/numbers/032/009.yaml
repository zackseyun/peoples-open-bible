translation:
  language: es
  text: Subieron hasta el Valle de Escol y vieron la tierra, y desanimaron[a] el corazón de los hijos de Israel[b] para que no entraran en la tierra que Yahvé[c] les había dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede expresarse como «desalentaron» o «hicieron perder el ánimo».
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Israel» traduce literalmente בְּנֵי יִשְׂרָאֵל; también puede entenderse como «israelitas».
    reason: lexical_alternative
  - marker: c
    text: YHWH se expresa aquí como «Yahvé», siguiendo la convención del proyecto para el nombre divino.
    reason: theological_note
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: They went up
  chosen_spanish: Subieron
  alternatives_spanish:
  - Fueron
  - Ascendieron
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o hacia un punto más alto; en español, «subieron» conserva la dirección del verbo hebreo con naturalidad narrativa.
- source_word: עַד נַחַל אֶשְׁכּוֹל
  english_pob_choice: as far as the Valley of Eshcol
  chosen_spanish: hasta el Valle de Escol
  alternatives_spanish:
  - hasta el torrente de Escol
  - hasta el wadi de Escol
  lexicon: HALOT
  rationale: נחל puede ser cauce, torrente o valle; la opción «Valle de Escol» sigue la decisión del POB inglés por claridad y fluidez, manteniendo el topónimo transliterado como Escol.
- source_word: וַיִּרְאוּ אֶת הָאָרֶץ
  english_pob_choice: and saw the land
  chosen_spanish: y vieron la tierra
  alternatives_spanish:
  - y contemplaron la tierra
  - y examinaron la tierra
  lexicon: HALOT
  rationale: ראה significa «ver»; aquí el contexto es narrativo y no exige un verbo más interpretativo. «La tierra» conserva el referente del texto hebreo.
- source_word: וַיָּנִיאוּ
  english_pob_choice: they discouraged
  chosen_spanish: desanimaron
  alternatives_spanish:
  - desalentaron
  - quebraron el ánimo de
  lexicon: HALOT
  rationale: El hifil de נוא/נאה comunica causar desánimo o hacer retroceder. «Desanimaron» es claro en español y mantiene la fuerza causativa sin introducir una paráfrasis más amplia.
- source_word: אֶת לֵב בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the heart of the sons of Israel
  chosen_spanish: el corazón de los hijos de Israel
  alternatives_spanish:
  - el corazón de los israelitas
  - el ánimo de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de לֵב como centro interior de decisión/coraje. «Hijos de Israel» corresponde con precisión a בְּנֵי יִשְׂרָאֵל; la lectura singular «corazón» se mantiene por fidelidad al hebreo.
- source_word: לְבִלְתִּי בֹא
  english_pob_choice: from going
  chosen_spanish: para no entrar
  alternatives_spanish:
  - impidiéndoles entrar
  - de modo que no entraran
  lexicon: HALOT
  rationale: לְבִלְתִּי + infinitivo expresa prevención o resultado negativo. En español, «para no entrar» comunica bien la finalidad/resultado de su desánimo, con una construcción idiomática y fiel.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: Con בוא + אֶל, el sentido es ingresar en el lugar. En español, «entrar en la tierra» es natural; aquí se integra en la frase «para no entrar en la tierra».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé», en lugar de ocultarlo con «SEÑOR». Esto preserva el nombre del pacto revelado en el texto hebreo.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de forma directa. La decisión española conserva el nombre propio del pacto en la forma adoptada por el proyecto, evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metáfora de 'el corazón'
  english_pob_reading: the heart of the sons of Israel
  chosen_spanish_reading: el corazón de los hijos de Israel
  alternative_spanish_readings:
  - el ánimo de los hijos de Israel
  - el valor de los hijos de Israel
  rationale: El hebreo preserva la metáfora de לֵב como sede interior de resolución y valentía. Se mantiene «corazón» para no borrar esa tensión semántica, aunque en español puede incluir afecto, decisión y ánimo.
  doctrine_reference: HALOT, לב
- issue: Conjunto verbal de impedimento
  english_pob_reading: they discouraged ... from going
  chosen_spanish_reading: desanimaron ... para no entrar
  alternative_spanish_readings:
  - desalentaron ... de entrar
  - les quitaron el ánimo para entrar
  rationale: 'La relación causal del hebreo es importante: no solo expresan tristeza, sino un efecto que impide la entrada. «Para no entrar» preserva el resultado negativo sin sobreespecificar el mecanismo.'
  doctrine_reference: HALOT, נוא/נאה
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de «but» a «and» para seguir la conjunción hebrea simple; el español refleja esa coordinación con «y» sin introducir contraste adversativo. También se mantuvo el verbo de percepción simple («vieron») y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - 'Se mantuvo la terminología del proyecto para YHWH: «Yahvé».'
  - Se preservó la metáfora corporal «corazón» para לֵב, en lugar de reemplazarla por una explicación interpretativa.
  - 'La estructura narrativa sigue el hebreo con coordinación simple: subida, visión y efecto de desánimo.'
  - «Hijos de Israel» conserva el valor formal del hebreo y queda glosado en nota por su equivalente natural «israelitas».
