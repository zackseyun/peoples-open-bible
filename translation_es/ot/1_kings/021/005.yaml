translation:
  language: es
  text: 'Entonces Jezabel, su esposa, vino a él y le dijo[a]: «¿Por qué está tan abatido tu espíritu, que no estás comiendo pan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «¿Qué es esto—tu espíritu está abatido—y no estás comiendo pan?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Y ... vino
  - Entonces ... vino
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción. «Entonces» conserva la secuencia; «fue a él» expresa de modo natural la dirección del movimiento hacia Ahab sin perder el sentido del hebreo.
- source_word: אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  alternatives_spanish:
  - Izebel
  lexicon: transliteración convencional
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: HALOT
  rationale: El sintagma posesivo identifica la relación de Jezabel con Acab. «Esposa» es claro y digno en español bíblico contemporáneo.
- source_word: וַתְּדַבֵּר אֵלָיו
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le habló y dijo
  lexicon: HALOT
  rationale: En español, para introducir discurso directo, «le dijo» es la equivalencia más natural y fiel. Mantiene el valor discursivo sin una literalidad pesada.
- source_word: מַה זֶּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué es esto?
  - ¿Qué pasa?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. En este contexto funciona como pregunta por la causa o razón del estado interior; «¿Por qué» comunica mejor la fuerza pragmática que un calco literal.
- source_word: רוּחֲךָ
  english_pob_choice: your spirit
  chosen_spanish: tu espíritu
  alternatives_spanish:
  - tu ánimo
  - tu disposición interior
  lexicon: HALOT
  rationale: «Espíritu» preserva la metáfora hebrea y evita reducirla de antemano a mero estado de ánimo. Es compatible con la lectura emocional del contexto.
- source_word: סָרָה
  english_pob_choice: so sullen
  chosen_spanish: así de decaído
  alternatives_spanish:
  - tan sombrío
  - tan hosco
  - tan abatido
  lexicon: HALOT
  rationale: El adjetivo describe un estado interior torcido, sombrío o abatido. «Decaído» comunica bien esa condición en español; «así de» refleja el matiz enfático del hebreo y la relación con el estado descrito.
- source_word: וְאֵינְךָ אֹכֵל לָחֶם
  english_pob_choice: that you are not eating bread
  chosen_spanish: que no estás comiendo pan
  alternatives_spanish:
  - y no estás comiendo pan
  - que no comes pan
  - que no estás comiendo
  lexicon: HALOT
  rationale: Se conserva el verbo y el sustantivo concretos del hebreo. «Comer pan» es un modismo para tomar alimento; «pan» mantiene el giro fuente sin oscuridad innecesaria en español.
theological_decisions:
- issue: Valor de רוּחַ como disposición interior sin borrar la imagen de 'espíritu'
  english_pob_reading: your spirit
  chosen_spanish_reading: tu espíritu
  alternative_spanish_readings:
  - tu ánimo
  - tu estado de ánimo
  rationale: El texto usa el lenguaje del espíritu como sede de la interioridad afectiva. Traducirlo como «espíritu» conserva la tensión semántica y la imaginería bíblica; la frase siguiente aclara que se trata de un estado visible de abatimiento.
  doctrine_reference: Antropología bíblica; semántica de רוּחַ en contexto narrativo.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste de revisión del POB en inglés: se evita duplicar una segunda pregunta con «y por qué», y se refleja la relación causal/consecutiva del hebreo mediante «que no estás comiendo pan». También se mantiene la lectura idiomática de מַה זֶּה como pregunta por la razón del estado descrito.'
  spanish_consistency_notes:
  - Se usó «Jezabel» como forma española estándar del nombre.
  - Se mantuvo «tu espíritu» para conservar la metáfora hebrea de רוּחַ.
  - Se tradujo el modismo «comer pan» de manera literal pero natural en español bíblico.
  - La puntuación del discurso directo sigue el uso editorial español con comillas angulares.
