review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el griego: «recordé la profecía de Amós», cita directa del oráculo, inversión de fiestas en duelo/lamento, y cierre narrativo «y lloré». No hay desviaciones mayores de sentido. Sin embargo, la cita profética en el español draft usa «tus... tus», que en español moderno es claramente singular y no preserva la segunda persona plural del griego ni la decisión documentada del POB.'
  spanish_quality_summary: 'El español es generalmente claro y digno. «Recordé», «profecía», «fiestas» y «lloré» funcionan bien. La principal mejora necesaria es la concordancia pronominal en plural dentro de la cita. Además, la nota al pie contiene un error de redacción: «ecoa» debe corregirse a una formulación natural como «hace eco de».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Amós», «profecía» y el registro de cita bíblica son adecuados. La única desalineación relevante es gramatical-teológica: debe mantenerse el plural del original en la cita de Amós, por lo que corresponde «sus fiestas... sus alegrías/regocijos» o «vuestras fiestas... vuestros regocijos», no «tus... tus».'
  issues:
  - severity: high
    issue: La cita usa «tus... tus» en lugar de una forma plural.
    rationale: El griego ὑμῶν es plural, y la propia decisión teológica auditada exige preservar la cita dirigida a «ustedes/vosotros» en plural. «Tus» introduce un cambio de referente y debilita la fuerza intertextual.
  - severity: medium
    issue: La nota al pie dice «ecoa», que no es una formulación natural estándar en español.
    rationale: Aunque se entiende la intención, la redacción no es idiomática. «Hace eco de Amós 8:10» o «evoca Amós 8:10» es más natural y legible.
  - severity: low
    issue: «Regocijos» es aceptable pero algo menos natural que «alegrías» en español contemporáneo.
    rationale: No es un error; mantiene un tono bíblico. Puede conservarse si se desea mayor elevación estilística. La revisión propuesta lo mantiene para no alterar innecesariamente el paralelismo.
  revised_spanish_text: 'Y recordé la profecía de Amós[a], como dijo: «Sus fiestas se convertirán en duelo, y todos sus regocijos en lamento». Y lloré.'
