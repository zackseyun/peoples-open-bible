translation:
  language: es
  text: De las aves, según sus clases[a], y del ganado, según sus clases, y de todo ser que se arrastra sobre la tierra, según su clase, dos de cada uno vendrán a ti para mantenerlos con vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según su género» o «según su tipo»; la expresión traduce מִין como categoría general, no como taxonomía biológica moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעוֹף
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves voladoras
  lexicon: HALOT
  rationale: עוֹף designa criaturas voladoras; en español, «aves» es el término natural y de registro bíblico digno, sin perder la referencia a los animales alados.
- source_word: לְמִינֵהוּ / לְמִינָהּ
  english_pob_choice: according to their kinds / according to its kind
  chosen_spanish: según sus especies / según su especie
  alternatives_spanish:
  - conforme a sus especies
  - según su clase
  lexicon: HALOT
  rationale: מִין expresa una categoría de tipo o clase. «Según» conserva bien la relación clasificatoria sin imponer taxonomía moderna; «especies» es comprensible y corresponde al uso tradicional español en este contexto.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: los animales domésticos
  alternatives_spanish:
  - el ganado
  - las bestias
  lexicon: HALOT
  rationale: Aquí בְּהֵמָה se contrasta con aves y reptiles, y puede abarcar animales terrestres de uso doméstico. «Animales domésticos» preserva esa categoría con más claridad que «ganado», que en español puede sonar demasiado estrecho.
- source_word: רֶמֶשׂ הָאֲדָמָה
  english_pob_choice: every creeping thing of the ground
  chosen_spanish: todo reptil de la tierra
  alternatives_spanish:
  - todo ser que se arrastra sobre la tierra
  - todo animal que se arrastra del suelo
  lexicon: HALOT
  rationale: רֶמֶשׂ apunta a criaturas pequeñas que se mueven o se arrastran. «Reptil» funciona en español bíblico amplio para ese campo semántico; «de la tierra» mantiene la correspondencia de הָאֲדָמָה sin volverlo una paráfrasis excesiva.
- source_word: שְׁנַיִם מִכֹּל
  english_pob_choice: two of each
  chosen_spanish: dos de cada uno
  alternatives_spanish:
  - dos de cada especie
  - dos de todo
  lexicon: HALOT
  rationale: La frase distributiva comunica que habrá dos ejemplares por cada categoría mencionada. «Dos de cada uno» es idiomático en español y mantiene la fuerza distributiva de מִכֹּל.
- source_word: יָבֹאוּ אֵלֶיךָ
  english_pob_choice: will come to you
  chosen_spanish: vendrán a ti
  alternatives_spanish:
  - llegarán a ti
  - vendrán hacia ti
  lexicon: HALOT
  rationale: בוא con אֶל indica movimiento hacia Noé. «Vendrán a ti» reproduce el sentido directo sin añadir explícitamente «al arca», que el hebreo de esta cláusula no dice.
- source_word: לְהַחֲיוֹת
  english_pob_choice: to keep them alive
  chosen_spanish: para mantenerlos con vida
  alternatives_spanish:
  - para preservarlos con vida
  - para conservarlos vivos
  lexicon: HALOT
  rationale: El Hiphil de חיה expresa dar o conservar vida. «Mantenerlos con vida» es natural en español y conserva el matiz de preservación de vida sin endurecer el estilo.
theological_decisions:
- issue: Término clasificatorio «según sus especies» frente a una lectura creacionista tradicional que puede sonar a taxonomía moderna rígida
  english_pob_reading: according to their kinds
  chosen_spanish_reading: según sus especies
  alternative_spanish_readings:
  - según sus clases
  - según sus tipos
  rationale: La POB inglesa evita taxonomía biológica moderna y conserva una categoría amplia de clase o tipo. En español, «especies» es la opción más transparente y bíblicamente inteligible, siempre entendida en sentido funcional y no técnico moderno.
  doctrine_reference: Génesis 1; conservació n de las categorías creadas sin anacronismo científico
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «two of every sort» a «two of each» para ajustarse más de cerca a מִכֹּל. Por eso el español usa «dos de cada uno», que conserva la misma precisión distributiva y evita una formulación más interpretativa.
  spanish_consistency_notes:
  - He traducido עוֹף como «aves» por ser el equivalente más natural y digno en español bíblico.
  - He mantenido el paralelismo de tres grupos animales con la repetición de «según sus especies / según su especie».
  - No he introducido «arca» en la cláusula de movimiento porque el hebreo dice solo «vendrán a ti».
  - He evitado «SEÑOR» o fórmulas de sustitución del nombre divino porque este versículo no contiene el tetragrámaton.
