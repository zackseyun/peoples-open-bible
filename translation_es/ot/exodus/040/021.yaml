base_translation:
  language: en
  yaml_path: translation/ot/exodus/040/021.yaml
  text: He brought the ark into the tabernacle[a], set up the veil of the screen, and screened the ark of the testimony[b], just as Yahweh had commanded Moses.
  footnotes:
  - marker: a
    text: Or 'the screening curtain' or 'the veil of the screen.' The Hebrew combines terms for a curtain and its function as a screen.
    reason: lexical_alternative
  - marker: b
    text: Or 'covered' or 'screened off the ark of the testimony.' The Hebrew verb emphasizes concealing/protecting by means of the curtain.
    reason: lexical_alternative
