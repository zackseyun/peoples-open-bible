  to: ¡Despiértate, despiértate, levántate, Jerusalén, tú que has bebido de la mano de Yahvé la copa de su ira; has bebido el cuenco[a], la copa del tambaleo[b]; la has vaciado hasta las heces!
  rationale: 'Se corrigen problemas editoriales y léxicos menores sin alterar el sentido: se eliminó la nota redundante sobre «despiértate», se reemplazó «vasija» por «cuenco» para reflejar mejor קֻבַּעַת, y se cambió «aturdimiento» por «tambaleo» para alinearse con el valor de reeling/staggering documentado en la auditoría inglesa. También se normalizó el uso de marcadores únicos.'
