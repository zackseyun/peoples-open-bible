  text: וְ/הַ֨/בָּמ֔וֹת לֹא סָ֖רוּ מִ/יִּשְׂרָאֵ֑ל רַ֧ק לְבַב אָסָ֛א הָיָ֥ה שָׁלֵ֖ם כָּל יָמָֽי/ו־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/015/017.yaml
  text: But the high places were not removed from Israel; nevertheless[a], Asa’s heart was fully devoted all his days.
  footnotes:
