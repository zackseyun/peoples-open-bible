revisions:
- from: 'Y Saúl dijo[a]: «Así haga Dios, y aun así añada, porque de cierto morirás, Jonatán».'
  to: 'Y Saúl dijo[a]: «Así haga Dios, y más aún, porque ciertamente morirás, Jonatán».'
  rationale: Se ajusta la fórmula de juramento a un español más natural y fiel al sentido idiomático («y más aún») sin introducir un objeto implícito ausente en hebreo. También se reemplaza «de cierto morirás» por «ciertamente morirás» para mantener el énfasis de מוֹת תָּמוּת en un español moderno y digno.
