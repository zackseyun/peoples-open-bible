  glossary_alignment: Cumple con la preferencia del proyecto al usar «Yahvé». «Cetro» preserva bien σκῆπτρον. La nota sobre «los que no existen» está alineada con la decisión teológica del POB de mantener la tensión literal. No hay conflictos relevantes con la terminología base del proyecto.
