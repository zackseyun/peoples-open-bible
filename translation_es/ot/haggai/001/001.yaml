base_translation:
  language: en
  yaml_path: translation/ot/haggai/001/001.yaml
  text: 'In the second year of King Darius[a], in the sixth month, on the first day of the month, the word of Yahweh came by the hand of Haggai the prophet to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua son of Jehozadak, the high priest, saying:'
  footnotes:
