translation:
  language: es
  text: Y acamparon entre Gaibai y la ciudad de los escitas[a], y él estuvo allí un mes entero[b], para reunir todo el contingente completo[c] de sus fuerzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escitópolis»; el griego literalmente dice «la ciudad de los escitas».
    reason: alternative_reading
  - marker: b
    text: 'Griego: «un mes de días», expresión idiomática para un mes.'
    reason: lexical_alternative
  - marker: c
    text: O «todo el equipo completo» o «el número completo» de sus fuerzas; el término griego puede denotar plena preparación militar o conjunto completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεστρατοπέδευσαν
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - establecieron campamento
  - hicieron campamento
  lexicon: LSJ
  rationale: El verbo griego es militar y significa establecer campamento. En español, «acamparon» comunica el hecho con naturalidad; el contexto bélico conserva la fuerza militar sin añadir calco innecesario.
- source_word: ἀνὰ μέσον
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - a mitad de
  lexicon: LSJ
  rationale: Con dos lugares nombrados, «entre» es la correspondencia más natural y fiel.
- source_word: Γαιβαὶ
  english_pob_choice: Gaibai
  chosen_spanish: Gaibai
  alternatives_spanish:
  - Gabai
  - Geba
  lexicon: LSJ
  rationale: Se conserva la transliteración del griego de Swete, evitando armonizar con topónimos no explicitados por esta forma textual.
- source_word: Σκυθῶν πόλεως
  english_pob_choice: the city of the Scythians
  chosen_spanish: la ciudad de los escitas
  alternatives_spanish:
  - Escitópolis
  - la ciudad de los escitas
  lexicon: LSJ
  rationale: El griego dice literalmente «ciudad de los escitas». En el texto principal se mantiene la transparencia del original; «escitas» reproduce el etnónimo sin imponer la forma tradicionalizada como lectura principal.
- source_word: μῆνα ἡμερῶν
  english_pob_choice: for a full month
  chosen_spanish: un mes entero
  alternatives_spanish:
  - un mes de días
  - un mes completo
  lexicon: LSJ
  rationale: La expresión griega es idiomática («un mes de días»). En español, «un mes entero» conserva la idea de duración completa con naturalidad, sin perder la nota de plenitud temporal.
- source_word: συλλέξαι
  english_pob_choice: to gather
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - concentrar
  lexicon: LSJ
  rationale: En contexto militar, «reunir» expresa bien la idea de concentrar efectivos o recursos para la campaña.
- source_word: πᾶσαν τὴν ἀπαρτίαν
  english_pob_choice: all the full complement
  chosen_spanish: toda la plenitud
  alternatives_spanish:
  - todo el completo número
  - todo el equipo completo
  - el completo conjunto
  lexicon: LSJ
  rationale: ἀπαρτίαν puede indicar plenitud, equipo o complemento total. Dado que el inglés POB preserva la tensión entre cantidad y preparación militar, «plenitud» permite mantener esa amplitud semántica sin estrecharla solo a material bélico.
- source_word: τῆς δυνάμεως αὐτοῦ
  english_pob_choice: of his forces
  chosen_spanish: de sus fuerzas
  alternatives_spanish:
  - de su ejército
  - de su poder
  lexicon: LSJ
  rationale: δύναμις aquí es fuerza militar. «Fuerzas» reproduce el plural colectivo y evita reducirlo a una sola unidad o a un sentido abstracto de poder.
theological_decisions:
- issue: Referente de «él» en contraste con el plural «acamparon»
  english_pob_reading: he was there
  chosen_spanish_reading: él estuvo allí
  alternative_spanish_readings:
  - estuvo allí
  - ellos estuvieron allí
  rationale: El griego pasa del plural al singular. Se conserva el cambio de referente, probablemente al comandante o figura principal, sin nivelarlo a un plural más cómodo.
  doctrine_reference: N/A (decisión sintáctico-narrativa)
- issue: Mantenimiento de la transparencia del topónimo griego frente al nombre tradicional
  english_pob_reading: the city of the Scythians, with footnote for Scythopolis
  chosen_spanish_reading: la ciudad de los escitas, con nota para Escitópolis
  alternative_spanish_readings:
  - Escitópolis
  - la ciudad de los escitas
  rationale: El texto principal sigue la forma literal del griego; la nota preserva la identificación tradicional como alternativa, sin ocultar la forma explícita del original.
  doctrine_reference: N/A (decisión textual y geográfica)
- issue: Valor de ἀπαρτίαν entre «equipo», «número completo» y «plenitud»
  english_pob_reading: full complement of his forces
  chosen_spanish_reading: toda la plenitud de sus fuerzas
  alternative_spanish_readings:
  - todo el equipo completo de sus fuerzas
  - el número completo de sus fuerzas
  - todo el complemento de sus fuerzas
  rationale: 'La palabra griega admite varias matizaciones: completitud numérica, equipamiento o preparación total. «Plenitud» mantiene abierta esa tensión, como hace el inglés POB con su nota lexical.'
  doctrine_reference: N/A (decisión léxica militar)
translation_notes:
  revision_awareness: La versión inglesa revisada suavizó «the city of Scythians» a «the city of the Scythians» y «a month of days» a «a full month». La redacción española adopta una solución idiomática equivalente para la duración («un mes entero»), pero conserva en nota la literalidad idiomática del griego; también mantiene la transparencia del topónimo con nota alternativa a Escitópolis.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene «escitas» como etnónimo bíblico normalizado en español.
  - «Fuerzas» conserva el sentido militar colectivo de δύναμις.
  - La puntuación sigue el español moderno con nota al final del sintagma correspondiente.
