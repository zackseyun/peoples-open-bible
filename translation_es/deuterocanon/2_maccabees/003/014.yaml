translation:
  language: es
  text: Después de fijar un día[a], entró para organizar el examen respecto de estos asuntos; y hubo no poca inquietud en toda la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no pequeña inquietud», una litotes que significa una considerable inquietud pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταξάμενος
  english_pob_choice: After setting
  chosen_spanish: Después de fijar
  alternatives_spanish:
  - Habiendo fijado
  - Después de establecer
  lexicon: LSJ
  rationale: El participio aoristo medio de τάσσω expresa la acción de fijar o تعیین/establecer un momento. En español, «Después de fijar» conserva la relación temporal sin sonar rígido.
- source_word: ἡμέραν
  english_pob_choice: a day
  chosen_spanish: un día
  alternatives_spanish:
  - el día
  - una fecha
  lexicon: LSJ
  rationale: El sustantivo sin artículo en griego funciona de manera indefinida; «un día» reproduce mejor el matiz de una fecha señalada que «el día».
- source_word: εἰσῄει
  english_pob_choice: he went in
  chosen_spanish: entró
  alternatives_spanish:
  - iba entrando
  - se introdujo
  lexicon: LSJ
  rationale: El imperfecto narrativo puede traducirse de forma natural como un pasado simple en español. «Entró» mantiene el movimiento hacia adentro sin sobrecargar la frase.
- source_word: τὴν περὶ τούτων ἐπίσκεψιν
  english_pob_choice: the examination concerning these matters
  chosen_spanish: el examen respecto de estos asuntos
  alternatives_spanish:
  - la investigación sobre estos asuntos
  - la revisión de estos asuntos
  lexicon: LSJ
  rationale: ἐπίσκεψις aquí designa una averiguación o examen oficial. «Examen» conserva esa idea de revisión/investigación formal, y «respecto de estos asuntos» mantiene περὶ τούτων sin generalizarlo demasiado.
- source_word: οἰκονομήσων
  english_pob_choice: to arrange
  chosen_spanish: organizar
  alternatives_spanish:
  - administrar
  - llevar a cabo
  lexicon: LSJ
  rationale: 'El participio futuro expresa propósito: iba para dar forma o conducir el examen. «Organizar» es una solución idiomática en español para un procedimiento oficial.'
- source_word: οὐ μικρὰ
  english_pob_choice: no small
  chosen_spanish: no poca
  alternatives_spanish:
  - considerable
  - gran
  lexicon: LSJ
  rationale: Se preserva la litote griega. «No poca» conserva la fuerza retórica de οὐ μικρὰ mejor que una simplificación como «gran» o «considerable».
- source_word: καθʼ ὅλην τὴν πόλιν
  english_pob_choice: throughout the whole city
  chosen_spanish: en toda la ciudad
  alternatives_spanish:
  - por toda la ciudad
  - a lo largo de toda la ciudad
  lexicon: LSJ
  rationale: La expresión distributiva se comunica naturalmente como «en toda la ciudad»; el añadido «toda» mantiene el énfasis de ὅλην.
- source_word: ἀγωνία
  english_pob_choice: anxiety
  chosen_spanish: ansiedad
  alternatives_spanish:
  - angustia
  - inquietud
  lexicon: LSJ
  rationale: En este contexto, ἀγωνία describe una preocupación pública intensa ante la inspección/examen inminente. «Ansiedad» comunica bien ese estado comunitario sin exagerarlo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que optó por «examination» en lugar de «inspection» para ἐπίσκεψις, y conserva la litotes de οὐ μικρὰ mediante «no poca ansiedad».
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé/Cristo» solo cuando el texto lo exija; este versículo no contiene términos teológicos de ese tipo.
  - Se prefirió «examen» para ἐπίσκεψις por coherencia con la revisión inglesa más reciente.
  - Se mantuvo una sintaxis española natural sin perder la relación temporal del participio inicial.
  - La litote griega se preserva con una formulación literal en la nota para no borrar el matiz retórico.
