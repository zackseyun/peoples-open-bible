translation:
  language: es
  text: Porque he aquí[a] que yo estoy creando cielos nuevos y una tierra nueva; y las cosas anteriores no serán recordadas, ni vendrán a la mente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira»; la expresión hebrea es una llamada de atención con tono enfático.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ni subirán sobre el corazón», un modismo que significa «ni vendrán a la mente».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del anuncio previo; «porque» conserva bien el valor causal/explanatorio en español sin perder naturalidad.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - obsérvese
  lexicon: HALOT
  rationale: La fórmula deíctica e interpelativa se expresa de manera más natural y reverente en español con «he aquí», que corresponde al tono formal de «behold».
- source_word: בוֹרֵא
  english_pob_choice: creating
  chosen_spanish: estoy creando
  alternatives_spanish:
  - creo
  - crearé
  lexicon: HALOT
  rationale: El participio presenta la acción como en curso o seguramente emprendida; «estoy creando» preserva ese aspecto en un español claro y no meramente futuro.
- source_word: שָׁמַיִם חֲדָשִׁים
  english_pob_choice: new heavens
  chosen_spanish: cielos nuevos
  alternatives_spanish:
  - nuevos cielos
  lexicon: HALOT
  rationale: «Cielos» mantiene el alcance cósmico de שָׁמַיִם y evita restringirlo a «cielos» en sentido meteorológico.
- source_word: וָאָרֶץ חֲדָשָׁה
  english_pob_choice: and a new earth
  chosen_spanish: y una tierra nueva
  alternatives_spanish:
  - y una nueva tierra
  lexicon: HALOT
  rationale: En paralelo con «cielos», «tierra» reproduce el contraste cósmico y conserva el sentido amplio de אֶרֶץ en este contexto.
- source_word: הָרִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas primeras
  alternatives_spanish:
  - las cosas anteriores
  - las cosas pasadas
  lexicon: HALOT
  rationale: La forma sustantivada del adjetivo puede expresarse como «las cosas primeras» para mantener la referencia al orden anterior de la realidad sin especificarlo de más. «Las cosas anteriores» sería también posible, pero menos resonante.
- source_word: תִזָּכַרְנָה
  english_pob_choice: will not be remembered
  chosen_spanish: no serán recordadas
  alternatives_spanish:
  - no se recordarán
  - no vendrán a la memoria
  lexicon: HALOT
  rationale: La pasiva/niphal se refleja con una pasiva castellana directa y sobria. «Serán recordadas» conserva la referencia a la memoria sin añadir interpretación.
- source_word: תַעֲלֶינָה עַל לֵב
  english_pob_choice: nor will they come to mind
  chosen_spanish: ni vendrán a la mente
  alternatives_spanish:
  - ni subirán al corazón
  - ni vendrán al corazón
  lexicon: HALOT
  rationale: La imagen hebrea de «subir sobre el corazón» se traslada con un equivalente idiomático español. «A la mente» comunica el sentido sin mecanizar la metáfora corporal.
theological_decisions:
- issue: Alcance cósmico de la renovación prometida
  english_pob_reading: The verse speaks of 'new heavens and a new earth' in full cosmic terms, without reducing it to merely political restoration.
  chosen_spanish_reading: El versículo habla de «cielos nuevos y una tierra nueva» en sentido cósmico pleno, sin reducirlo a una restauración meramente política.
  alternative_spanish_readings:
  - Una descripción principalmente metafórica del retorno o la restauración posexílica
  rationale: La expresión paralela «cielos y tierra» funciona como fórmula de creación y debe mantenerse amplia. La traducción evita estrechar el alcance escatológico o histórico del texto más allá de lo que el hebreo dice.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: Se ajustó la traducción para anclar explícitamente las notas [a] y [b] en el texto principal, corrigiendo la validación anterior. Se mantuvo la lectura formal y la equivalencia óptima del auditorio POB, con especial atención al participio hebreo, al idiomatismo de «subir al corazón» y al alcance cósmico de «cielos y tierra».
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se eligió «cielos» en lugar de «cielos/firmamentos» por el contexto de creación cósmica.
  - Se usó pasiva española en «serán recordadas» para reflejar el niphal hebreo sin sobrecargar la frase.
  - Se mantuvo una dicción digna y moderna, evitando arcaísmos innecesarios y sin perder el tono profético.
