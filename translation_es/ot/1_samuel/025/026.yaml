base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/026.yaml
  text: Now[a], my lord, as Yahweh lives and as your soul lives, since Yahweh has kept you from bloodguilt and from avenging yourself with your own hand[b], now let your enemies and those who seek evil against my lord be like Nabal.
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'from avenging yourself with your own hand.'
    reason: lexical_alternative
  - marker: b
    text: '''Be like Nabal'' likely refers to the man Nabal by name, though the name also echoes the Hebrew word for ''fool.'''
    reason: lexical_alternative
