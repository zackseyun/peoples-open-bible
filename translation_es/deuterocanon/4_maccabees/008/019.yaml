translation:
  language: es
  text: ¿No temeremos[a] los tormentos, hermanos, y tomaremos en cuenta las amenazas de los suplicios, y huiremos de esta gloria vacía y de esa arrogancia destructora?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta vanagloria y esa jactancia destructora».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ φοβησόμεθα
  english_pob_choice: Shall we not fear
  chosen_spanish: ¿No temeremos?
  alternatives_spanish:
  - ¿No hemos de temer?
  - ¿No deberemos temer?
  lexicon: BDAG
  rationale: El futuro del griego en esta pregunta retórica conserva mejor en español el tono deliberativo y exhortativo que una simple afirmación. «¿No temeremos?» suena natural y mantiene la fuerza de la interrogación.
- source_word: ἄνδρες ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos, hombres
  - hermanos y hombres
  - hermanos, varones
  lexicon: BDAG
  rationale: El vocativo es masculino y fraternal; «hermanos» comunica la apelación con naturalidad en español y preserva el matiz de vínculo familiar. Se evita una redundancia literal que sonaría extraña.
- source_word: τὰ βασανιστήρια
  english_pob_choice: the tortures
  chosen_spanish: los tormentos
  alternatives_spanish:
  - las torturas
  - los suplicios
  lexicon: BDAG
  rationale: El contexto habla de castigos aflictivos; «tormentos» conserva la dureza del término griego sin volver la frase demasiado técnica. También mantiene cierta distinción frente a «suplicios» en la frase siguiente.
- source_word: λογιούμεθα
  english_pob_choice: reckon
  chosen_spanish: consideraremos
  alternatives_spanish:
  - reckon with -> tendremos en cuenta
  - contaremos
  - estimaremos
  lexicon: BDAG
  rationale: El verbo expresa valorar o tomar en cuenta. «Consideraremos» es claro en español moderno y comunica bien la decisión mental implícita en el reto retórico.
- source_word: τὰς τῶν βασάνων ἀπειλάς
  english_pob_choice: the threats of the torments
  chosen_spanish: las amenazas de los suplicios
  alternatives_spanish:
  - las amenazas de los tormentos
  - las amenazas del suplicio
  lexicon: BDAG
  rationale: Se conserva la relación entre amenazas y castigos aflictivos, pero se usa «suplicios» para variar con el término anterior y evitar una repetición áspera. La estructura genitiva se expresa de forma natural en español.
- source_word: φεύξομεν
  english_pob_choice: flee
  chosen_spanish: huiremos
  alternatives_spanish:
  - evitaremos
  - haremos huir
  - escaparemos
  lexicon: BDAG
  rationale: En una pregunta retórica, «huiremos» transmite bien la idea de apartarse o rechazar con decisión. «Escaparemos» debilita el matiz de rechazo moral.
- source_word: τὴν κενοδοξίαν ταύτην
  english_pob_choice: this empty glory
  chosen_spanish: esta gloria vacía
  alternatives_spanish:
  - esta vanagloria
  - esta vana gloria
  - esta gloria vana
  lexicon: BDAG
  rationale: Se conserva la imagen de gloria vacía o sin contenido. «Gloria vacía» es transparente y evita imponer de entrada la forma más tradicional «vanagloria», que ya interpreta más fuertemente el término.
- source_word: ὀλεθροφόρον ἀλαζονίαν
  english_pob_choice: deadly arrogance
  chosen_spanish: arrogancia destructora
  alternatives_spanish:
  - arrogancia mortífera
  - jactancia destructora
  - presunción destructora
  lexicon: BDAG
  rationale: ὀλεθροφόρον significa que trae destrucción; «destructora» comunica bien ese valor. «Arrogancia» mantiene el sentido de ἀλαζονία sin suavizarlo a simple orgullo o jactancia.
theological_decisions:
- issue: Pregunta retórica con expectativa de rechazo al temor cobarde y a la vanagloria
  english_pob_reading: Render the whole clause as a rhetorical question expecting a negative answer to cowardice and a positive answer to rejecting vain pride
  chosen_spanish_reading: Mantener toda la secuencia como pregunta retórica, sin convertirla en exhortación declarativa
  alternative_spanish_readings:
  - No temeremos ... y huiremos ...
  - ¿No debemos temer ...?
  rationale: La sintaxis griega sostiene la fuerza dramática de la interrogación; conservarla evita suavizar el llamado moral y conserva la presión retórica del discurso.
  doctrine_reference: Translation philosophy §1, §6
- issue: Vocativo masculino ἄνδρες ἀδελφοί
  english_pob_reading: Use 'brothers' in the main text
  chosen_spanish_reading: Usar «hermanos» en el texto principal
  alternative_spanish_readings:
  - hermanos, varones
  - hermanos y hombres
  - sibilinos
  rationale: El griego es explícitamente masculino, pero el español «hermanos» ya funciona como vocativo fraternal y mantiene la naturalidad. Se evita neutralizar el género del vocativo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura inglesa final y conserva la pregunta retórica. Se ajustó «reckon with» a «consideraremos» para naturalidad española, y se eligieron equivalentes semánticos que distinguen los dos pares de términos aflictivos y de vanagloria/arrogancia sin sobreinterpretar. Se mantuvo la tensión léxica entre «gloria vacía» y «arrogancia destructora», con nota alternativa para la posible lectura más tradicional de κενοδοξία.
  spanish_consistency_notes:
  - Se usa «hermanos» para el vocativo masculino fraternal, en línea con la política del proyecto.
  - Se conserva la diferencia entre «tormentos»/«suplicios» y entre «gloria vacía»/«arrogancia destructora» para reflejar los dos paralelismos del griego.
  - Se evita «SEÑOR» u այլ terminología no pertinente; no hay léxico divino en este versículo.
