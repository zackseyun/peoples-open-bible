    rationale: 'El inglés POB tiene como texto principal «house of Baal» y como alternativa «temple of Baal». La nota española dice «O ‘la casa de Baal’, es decir, su templo», como si «templo» fuera el texto principal. Debe decir «O ‘el templo de Baal’». '
  - severity: low
    issue: 'La nota b usa una alternativa poco idiomática: «piedras de pie».'
    rationale: Aunque intenta reflejar ‘standing stones’, en español natural y eclesial es mejor «piedras erguidas» o «estelas». «Piedras de pie» suena demasiado literal y poco elegante.
