translation:
  language: es
  text: Así murió Saúl, y sus tres hijos, y su escudero, y todos sus hombres[a], juntos aquel día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos sus soldados». El hebreo dice literalmente «todos sus hombres», lo cual en este contexto de batalla probablemente se refiere a su fuerza de combate o séquito, no a toda persona asociada con Saúl.
    reason: lexical_alternative
  - marker: b
    text: Algunos testigos griegos dicen «toda su armadura» en lugar de «todos sus hombres». El texto hebreo respalda «todos sus hombres».
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּמָת / So ... died
  english_pob_choice: So ... died
  chosen_spanish: Así murió
  alternatives_spanish:
  - Y murió
  - Entonces murió
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «así» comunica bien la progresión resultativa en español sin sonar forzado. «Murió» conserva la sencillez del hebreo.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Transliteración bíblica usual
  rationale: La forma española establecida es «Saúl», y corresponde al nombre propio hebreo sin cambio de sentido.
- source_word: וּשְׁלֹשֶׁת בָּנָיו
  english_pob_choice: and his three sons
  chosen_spanish: y sus tres hijos
  alternatives_spanish:
  - y sus tres hijos varones
  - y los tres hijos de él
  lexicon: HALOT
  rationale: «בָּנִים» puede leerse literalmente como «hijos/varones»; en español bíblico natural, «hijos» es suficiente y no añade más de lo que el hebreo exige. El posesivo resume bien la construcción.
- source_word: וְנֹשֵׂא כֵלָיו
  english_pob_choice: and his armor-bearer
  chosen_spanish: y su escudero
  alternatives_spanish:
  - y el portador de sus armas
  - y su portador de armas
  lexicon: HALOT
  rationale: El participio significa literalmente «el que lleva sus armas/equipo». En español, «escudero» es el equivalente militar tradicional y claro; mantiene la relación funcional sin ampliar indebidamente el léxico.
- source_word: כָּל אֲנָשָׁיו
  english_pob_choice: and all his men
  chosen_spanish: todos sus hombres
  alternatives_spanish:
  - todos sus soldados
  - todos sus varones
  lexicon: HALOT
  rationale: La expresión hebrea es amplia y, por el contexto bélico, se refiere al grupo armado o séquito masculino de Saúl. «Hombres» conserva la ambigüedad útil del hebreo sin volverlo más técnico de lo necesario.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula temporal se vierte de manera natural con «en aquel día»; mantiene la referencia anafórica y el tono narrativo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio indica simultaneidad y cohesión en la muerte de los mencionados. «Juntos» es breve, natural y fiel al valor adverbial.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «indeed» para גַּם; en español no se introdujo ningún intensificador adicional, y la coordinación simple reproduce adecuadamente el valor del texto hebreo revisado y del audit trail final.
  spanish_consistency_notes:
  - Se mantiene «Saúl» con ortografía española estándar.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
  - «Escudero» funciona como equivalente contextual de «armor-bearer» sin perder el matiz militar.
  - La nota sobre «todos sus hombres» conserva la ambigüedad contextual documentada por el POB en inglés.
