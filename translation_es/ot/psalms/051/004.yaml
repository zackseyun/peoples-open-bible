translation:
  language: es
  text: Lávame[a] completamente de mi iniquidad[b], y límpiame[c] de mi pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abundantemente» o «una y otra vez»; el intensificador hebreo puede expresar una limpieza abundante o intensiva.
    reason: lexical_alternative
  - marker: b
    text: «Iniquidad» también puede traducirse «culpa» o «maldad»; עָוֹן puede abarcar tanto el acto como su culpa.
    reason: lexical_alternative
  - marker: c
    text: O «purifícame».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבֵּה
  english_pob_choice: thoroughly
  chosen_spanish: completamente
  alternatives_spanish:
  - abundantemente
  - mucho
  - una y otra vez
  lexicon: HALOT
  rationale: La forma intensiva/adverbial de רבה no pide una repetición explícita en español, sino una intensificación de grado. «Completamente» comunica bien la fuerza de una limpieza plena e intensiva sin sonar forzado.
- source_word: כַּבְּסֵנִי
  english_pob_choice: wash me
  chosen_spanish: lávame
  alternatives_spanish:
  - lávame bien
  - lava mis manchas
  - lava mi cuerpo
  lexicon: HALOT
  rationale: כבס se refiere al lavado como acto de limpieza. En español bíblico, «lávame» conserva la imagen de purificación por lavado y suena natural en un salmo penitencial.
- source_word: מֵעֲוֺנִי
  english_pob_choice: from my iniquity
  chosen_spanish: de mi iniquidad
  alternatives_spanish:
  - de mi culpa
  - de mi maldad
  - de mi wrongdoing
  lexicon: HALOT
  rationale: עוֹן puede abarcar iniquidad, culpa o la carga derivada de la culpa. Se mantiene «iniquidad» para respetar la distinción poética respecto de «pecado» en el paralelismo hebreo.
- source_word: וּמֵחַטָּאתִי
  english_pob_choice: and from my sin
  chosen_spanish: de mi pecado
  alternatives_spanish:
  - y de mi pecado
  - de mi falta
  - de mi transgresión
  lexicon: HALOT
  rationale: חַטָּאת en este contexto penitencial se expresa de forma más directa y natural como «pecado». En español, la coordinación implícita tras la coma permite omitir el «y» sin perder el paralelismo semántico.
- source_word: טַהֲרֵנִי
  english_pob_choice: cleanse me
  chosen_spanish: purifícame
  alternatives_spanish:
  - límpiame
  - hazme limpio
  - purifícame ritualmente
  lexicon: HALOT
  rationale: טהר puede implicar limpieza moral y también resonancias cultuales/rituales. «Purifícame» preserva mejor esa amplitud que «límpiame», y encaja con el registro del salmo.
theological_decisions:
- issue: Diferencia entre עָוֹן y חַטָּאת en el paralelismo
  english_pob_reading: Use distinct English terms, 'iniquity' and 'sin,' in the main text.
  chosen_spanish_reading: 'Mantener dos términos distintos: «iniquidad» y «pecado».'
  alternative_spanish_readings:
  - unificar ambos como «pecado»
  - traducir עָוֹן como «culpa»
  rationale: El hebreo presenta dos términos emparentados pero no idénticos. Conservar la distinción evita aplanar el paralelismo penitencial y mantiene visible la textura poética del original.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; el presente borrador sigue esa lectura de alta concordancia y mantiene la distinción léxica entre עָוֹן y חַטָּאת.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el Tetragrámaton.
  - Se preservó la distinción penitencial entre «iniquidad» e «pecado» conforme al audit trail inglés.
  - «Purifícame» se eligió por su amplitud moral/ritual y su naturalidad en español litúrgico contemporáneo.
  - La puntuación sigue el paralelismo poético del hebreo con dos miembros coordinados.
