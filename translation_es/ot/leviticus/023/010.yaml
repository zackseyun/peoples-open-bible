    text: Or, 'the Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the omer of the firstfruits of your harvest.' The Hebrew term can denote a sheaf here and is also used as a technical term 'omer.'
    reason: lexical_alternative
