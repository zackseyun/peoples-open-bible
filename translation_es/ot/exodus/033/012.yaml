  yaml_path: translation/ot/exodus/033/012.yaml
  text: Then Moses said to Yahweh[a], “See, you are saying to me, ‘Bring up this people,’ but you have not made known to me whom you will send with me. Yet you have said, ‘I know you by name[c][b], and you also have found favor in my sight.’”
