translation:
  language: es
  text: Recuerda el tiempo de hambruna en el tiempo de abundancia[a], y la pobreza y la necesidad en los días de riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «temporada de hambre ... temporada de abundancia». El griego contrasta tiempos señalados de escasez y plenitud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Acuérdate
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a una memoria deliberada. «Recuerda» conserva la fuerza directa y natural del mandato en español sin suavizarlo.
- source_word: καιρὸν λιμοῦ
  english_pob_choice: the time of famine
  chosen_spanish: el tiempo de hambre
  alternatives_spanish:
  - el tiempo de hambre severa
  - una temporada de hambre
  lexicon: LSJ
  rationale: Aunque λιμός puede ser «hambruna/famine», en español «hambre» comunica con claridad la condición de escasez y mantiene el contraste con «abundancia». «Hambruna» sería más específico, pero aquí «tiempo de hambre» sigue de cerca el paralelismo del griego y el tono sapiencial.
- source_word: ἐν καιρῷ πλησμονῆς
  english_pob_choice: in the time of plenty
  chosen_spanish: en el tiempo de abundancia
  alternatives_spanish:
  - en el tiempo de plenitud
  - en el tiempo de bonanza
  lexicon: LSJ
  rationale: πλησμονή expresa plenitud o abundancia. «Abundancia» es la opción más natural en español y preserva el contraste con «hambre».
- source_word: πτωχείαν
  english_pob_choice: poverty
  chosen_spanish: la pobreza
  alternatives_spanish:
  - la miseria
  - la indigencia
  lexicon: LSJ
  rationale: πτωχεία nombra la condición de ser pobre; «pobreza» es el equivalente más directo y transparente.
- source_word: ἔνδειαν
  english_pob_choice: need
  chosen_spanish: la necesidad
  alternatives_spanish:
  - la carencia
  - la falta
  lexicon: LSJ
  rationale: ἔνδεια añade la idea de carencia o deficiencia junto a πτωχεία. «Necesidad» conserva esa segunda palabra del par sin fundirla por completo con «pobreza».
- source_word: ἐν ἡμέραις πλούτου
  english_pob_choice: in the days of wealth
  chosen_spanish: en los días de riqueza
  alternatives_spanish:
  - en los días de prosperidad
  - en los días de abundancia
  lexicon: LSJ
  rationale: πλοῦτος significa riqueza/bienes. «Días de riqueza» mantiene la imagen concreta del griego y el paralelo con «tiempo de hambre», sin convertirlo en una generalización más abstracta.
theological_decisions:
- issue: Conservar el paralelismo concreto de contrarios económicos sin convertirlo en una máxima moral más general
  english_pob_reading: 'Retain the concrete paired contrasts: famine/plenty and poverty/need versus wealth'
  chosen_spanish_reading: 'Conservar los contrastes concretos: hambre/abundancia y pobreza/necesidad frente a riqueza'
  alternative_spanish_readings:
  - En los tiempos buenos, no olvides los malos
  - Recuerda que la vida puede cambiar
  rationale: El griego presenta pares específicos y balanceados de condición material. La traducción española mantiene esa concreción sapiencial y evita añadir una paráfrasis no exigida por el texto.
  doctrine_reference: Principio de primacía del idioma original; no ampliar el sentido más allá de la evidencia textual.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del control cruzado y no introduce cambios sustanciales respecto del análisis léxico: se conserva el paralelismo económico concreto y la equivalencia óptima entre hambre/abundancia, pobreza/necesidad y riqueza.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras terminologías no presentes en el versículo.
  - «Tiempo de hambre» y «tiempo de abundancia» preservan el contraste de καιρός sin sobreinterpretarlo como estación literal.
  - «Pobreza» y «necesidad» mantienen la pareja semántica del griego sin fusionarlas en un solo término.
