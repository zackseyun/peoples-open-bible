review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: continuidad enfática con «Y tú», mandato a Josué, sacerdotes que llevan el arca, cita introducida por «diciendo», llegada al borde de las aguas del Jordán y ubicación final en el Jordán. Sin embargo, «se detendrán» debilita el sentido principal de תַּעֲמֹדוּ («se pararán / estarán de pie / se mantendrán firmes»), y «darás la orden» es aceptable pero menos directo que «ordenarás» o «mandarás».'
  spanish_quality_summary: 'El español es generalmente claro, pero hay problemas formales: comillas y puntuación mal cerradas al final («”.”»), y la frase final suena menos fiel de lo deseable por «se detendrán». Una revisión menor mejora fidelidad y fluidez sin volver el texto rígido.'
  glossary_alignment: No hay conflicto con los términos principales del glosario del proyecto. «Arca del pacto» es defendible, aunque «arca de la alianza» también sería idiomático; no es necesario cambiarlo aquí. La nota alternativa debe seguir anclada al sintagma del arca si se conserva, y la alternativa léxica sobre «borde/orilla» puede mantenerse como en el inglés.
  issues:
  - severity: medium
    issue: «se detendrán» para תַּעֲמֹדוּ
    rationale: El hebreo manda que los sacerdotes «estén/se planten» en el Jordán, no solo que cesen de avanzar. «Se detendrán» pierde el matiz de tomar posición en el río.
  - severity: low
    issue: Puntuación y comillas finales incorrectas
    rationale: El texto termina con «”.”», lo cual es tipográficamente incorrecto en español y debe normalizarse.
  - severity: low
    issue: «darás la orden» es menos directo que el verbo simple
    rationale: Aunque es comprensible, תְּצַוֶּה se representa más directamente con «ordenarás» o «mandarás». «Ordenarás» conserva bien la fuerza del mandato y suena natural.
