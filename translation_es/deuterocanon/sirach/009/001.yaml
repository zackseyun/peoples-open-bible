    text: Literally, 'the wife in your bosom,' an idiom for one's intimate wife.
    reason: cultural_note
  - marker: c
    text: The Hebrew reads simply 'evil,' while the Greek parallel has 'evil instruction/discipline.' The translation makes that sense explicit as 'an evil lesson.'
