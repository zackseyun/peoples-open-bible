translation:
  language: es
  text: 'Así dice Yahvé de las huestes: Juzguen con justicia verdadera[a], y muestren amor fiel y compasión, cada uno a su hermano[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dicten juicios verdaderos». La frase hebrea une «juicio/justicia» con «verdad» para pedir decisiones judiciales marcadas por veracidad e integridad.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre a su hermano», una expresión masculina representativa para el trato mutuo dentro de la comunidad del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: YHWH / Tetragrámaton
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservándolo explícitamente en español como 'Yahvé' y no ocultándolo tras un título sustitutivo.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de forma clara y digna el plural de fuerzas celestiales/ordenadas del título divino, sin sonar forzado en español.'
- source_word: לֵאמֹר
  english_pob_choice: ':'
  chosen_spanish: diciendo
  alternatives_spanish:
  - ':'
  - —
  lexicon: HALOT
  rationale: El valor introductorio del infinitivo se expresa de manera natural con 'diciendo', manteniendo explícita la transición al contenido oracular.
- source_word: מִשְׁפַּט אֱמֶת
  english_pob_choice: true judgments
  chosen_spanish: juicios verdaderos
  alternatives_spanish:
  - juicio verdadero
  - juicios de verdad
  - juicio justo
  lexicon: HALOT
  rationale: Se conserva el plural de מִשְׁפַּט como 'juicios' y el modificador אֱמֶת como 'verdaderos', siguiendo la revisión inglesa que enfatiza la forma plural y la cualidad de integridad/veracidad.
- source_word: שְׁפֹטוּ
  english_pob_choice: Judge
  chosen_spanish: hagan juicios
  alternatives_spanish:
  - juzguen
  - administren justicia
  lexicon: HALOT
  rationale: El imperativo plural se vierte con fuerza exhortativa. 'Hagan juicios' refleja el enlace con el sustantivo plural 'juicios' mejor que una paráfrasis más general.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor fiel
  alternatives_spanish:
  - bondad constante
  - misericordia
  - lealtad amorosa
  lexicon: HALOT
  rationale: Para el peso pactal de חֶסֶד, 'amor fiel' preserva la combinación de afecto y lealtad duradera en un español bíblico claro, sin reducirlo a 'bondad'.
- source_word: רַחֲמִים
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - piedad
  lexicon: HALOT
  rationale: '''Compasión'' expresa bien la ternura y el impulso misericordioso del plural hebreo, y funciona naturalmente junto a ''amor fiel''.'
- source_word: עֲשׂוּ
  english_pob_choice: show
  chosen_spanish: practiquen
  alternatives_spanish:
  - hagan
  - muestren
  - ejerzan
  lexicon: HALOT
  rationale: Con חֶסֶד y רַחֲמִים, el español permite un verbo que marque conducta concreta. 'Practiquen' conserva el valor activo sin sonar tan idiomático como un calco de 'hacer'.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino singular distributivo, 'cada uno' conserva el sentido distributivo y evita una rigidez innecesaria en español, sin perder el matiz representativo.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su prójimo
  - su vecino
  - el uno al otro
  lexicon: HALOT
  rationale: Se mantiene el lenguaje de parentesco literal del hebreo en la frase 'su hermano', dejando que el texto conserve su imagen social y comunitaria.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto manda traducirlo como 'Yahvé'. Se evita el reemplazo devocional por 'SEÑOR' para mantener trazabilidad y transparencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: How to handle the distributive masculine expression אִישׁ ... אָחִיו
  english_pob_reading: each man to his brother
  chosen_spanish_reading: cada uno con su hermano
  alternative_spanish_readings:
  - cada hombre con su hermano
  - cada uno a su hermano
  - todos entre sí
  rationale: Se conserva el carácter representativo y comunitario sin forzar una redacción marcadamente masculina en la línea principal. La relación fraterna del hebreo se expresa con naturalidad en español con 'con su hermano'.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering מִשְׁפַּט אֱמֶת as a judicial exhortation
  english_pob_reading: true judgments
  chosen_spanish_reading: juicios verdaderos
  alternative_spanish_readings:
  - juicio verdadero
  - sentencias verdaderas
  - juicios de verdad
  rationale: La revisión inglesa privilegia el plural y la fuerza judicial. En español, 'juicios verdaderos' mantiene la conexión entre juicio y verdad, sin perder la exhortación ética del pasaje.
  doctrine_reference: English applied revision on ZEC.7.9
- issue: Rendering חֶסֶד וְרַחֲמִים
  english_pob_reading: steadfast love and compassion
  chosen_spanish_reading: amor fiel y compasión
  alternative_spanish_readings:
  - amor constante y compasión
  - lealtad amorosa y compasión
  - bondad y misericordia
  rationale: La combinación busca preservar el alcance pactal de חֶסֶד y la ternura activa de רַחֲמִים. 'Amor fiel' evita aplanar el término a simple amabilidad.
  doctrine_reference: 'HALOT: חֶסֶד / רַחֲמִים'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la base inglesa, que afinó מִשְׁפַּט אֱמֶת como 'true judgments' y añadió 'saying' para לֵאמֹר. La versión española refleja ambos ajustes con 'juicios verdaderos' y 'diciendo', manteniendo además el plural y la fuerza exhortativa del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para el Tetragrámaton.
  - '''De los ejércitos'' se eligió como equivalente natural de צְבָאוֹת en un registro bíblico comprensible.'
  - Se preservó el paralelismo entre justicia verdadera, amor fiel y compasión, evitando suavizar la densidad ética del hebreo.
  - La nota b aclara el hebreo masculino distributivo sin alterar la fluidez de la línea principal.
