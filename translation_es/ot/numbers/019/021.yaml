translation:
  language: es
  text: 'Y esto será para ellos un estatuto permanente: el que rocía el agua de impureza[a] lavará sus vestidos, y el que toque el agua de impureza quedará impuro hasta el atardecer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el agua para la limpieza de la impureza»; tradicionalmente, «el agua de separación». Hebreo: «las aguas de impureza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And this shall be
  chosen_spanish: Y esto será
  alternatives_spanish:
  - Y será
  - Y esto llegará a ser
  lexicon: HALOT
  rationale: El verbo femenino singular se refiere al estatuto implícito del contexto; en español, 'esto' hace explícita esa referencia sin añadir contenido ajeno. 'Será' conserva el valor normativo y futuro de la formulación legal.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - para ustedes
  lexicon: HALOT
  rationale: La preposición expresa aplicabilidad del mandato al pueblo destinatario. 'Para ellos' comunica bien esa vinculación normativa en español.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una norma perpetua
  alternatives_spanish:
  - un estatuto perpetuo
  - una ordenanza perpetua
  lexicon: HALOT
  rationale: חֻקָּה es una disposición fijada; en español 'norma' suena más natural y lectoramente claro que un calco jurídico, mientras 'perpetua' conserva el alcance duradero de עוֹלָם.
- source_word: וּמַזֵּה
  english_pob_choice: the one who sprinkles
  chosen_spanish: el que rocía
  alternatives_spanish:
  - el que aspersa
  - quien rocía
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. 'Rocía' comunica el acto ritual con naturalidad en español; 'aspersa' sería más técnico pero menos transparente.
- source_word: מֵי הַנִּדָּה
  english_pob_choice: the water for impurity
  chosen_spanish: el agua para impureza
  alternatives_spanish:
  - el agua de impureza
  - el agua para purificación de la impureza
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea sin sustituirla por una explicación más interpretiva. 'Para impureza' sigue de cerca el audit trail inglés y mantiene abierta la tensión lexical del hebreo niddah en este contexto ritual.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - deberá lavar sus vestidos
  - lavará su ropa
  lexicon: HALOT
  rationale: כִּבֵּס se refiere al lavado de ropa; 'vestidos' conserva el registro bíblico sin sonar tan coloquial como 'ropa'. El futuro simple expresa la obligación normativa del texto.
- source_word: וְהַנֹּגֵעַ
  english_pob_choice: and the one who touches
  chosen_spanish: y el que toca
  alternatives_spanish:
  - y quien toque
  - y el que entra en contacto con
  lexicon: HALOT
  rationale: El participio substantivado se traduce de modo directo y natural. 'Toca' mantiene la conexión física mínima del término sin ampliar indebidamente el sentido.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: En este contexto cultual, 'impuro' es la equivalencia más clara para טמא. 'Quedará' comunica el estado resultante; se evita 'inmundo' por su carga menos neutral en español contemporáneo.
- source_word: עַד הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta el atardecer
  alternatives_spanish:
  - hasta la tarde
  - hasta la noche
  lexicon: HALOT
  rationale: El hebreo marca el punto de término del estado ritual. 'Atardecer' es una opción natural y precisa en español; evita una literalidad pesada y mantiene el cierre temporal del precepto.
theological_decisions:
- issue: Terminología de impureza ritual
  english_pob_reading: Use 'unclean' and 'water for impurity' in straightforward cultic sense without importing later theological interpretation.
  chosen_spanish_reading: Usar 'impuro' y 'agua para impureza' en sentido cultual directo, sin convertir el texto en una explicación moral o doctrinal posterior.
  alternative_spanish_readings:
  - agua de purificación
  - agua de separación
  - inmundo
  rationale: El pasaje regula estado ritual, no culpa moral. 'Impuro' mantiene la categoría cultual; 'agua para impureza' conserva la ambigüedad hebrea y el rastro auditado del inglés sin suavizarla demasiado.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés al omitir artículo antes de un complemento temporal final; en español se resolvió naturalmente con «hasta el atardecer». Se mantuvo la equivalencia funcional del estatuto permanente y de la terminología ritual, sin introducir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se preservó la distinción cultual entre pureza e impureza con 'impuro', no con un lenguaje moralizante.
  - '''Yahvé'' no aparece en este versículo.'
  - Se eligió 'agua para impureza' para reflejar la frase hebrea y la decisión auditada en inglés, mientras la nota recoge la alternativa explicativa.
  - '''Vestidos'' mantiene el registro bíblico y cultual sin alterar el sentido del lavado requerido.'
