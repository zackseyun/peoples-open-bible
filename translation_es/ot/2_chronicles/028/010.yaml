translation:
  language: es
  text: Y ahora, ustedes dicen que someterán al pueblo[a] de Judá y de Jerusalén como esclavos y esclavas para ustedes[b]. ¿Acaso no tienen también ustedes culpa[c] ante Yahvé su Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'hijos de Judá y de Jerusalén'. El hebreo usa una expresión masculina plural para referirse corporativamente al pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'someter como esclavos y esclavas para ustedes mismos'.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo de la pregunta final es muy comprimido: literalmente, algo como ''¿no hay, en verdad, con ustedes culpas para Yahvé su Dios?''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Como marcador discursivo, conserva el enlace con lo anterior y la inmediatez del reproche; en español, 'Y ahora' suena natural y mantiene el valor conjuntivo de ו.
- source_word: בְּנֵי יְהוּדָה וִירוּשָׁלִַם
  english_pob_choice: the people of Judah and Jerusalem
  chosen_spanish: hijos de Judá y de Jerusalén
  alternatives_spanish:
  - el pueblo de Judá y de Jerusalén
  - hijos de Judá y Jerusalén
  lexicon: HALOT
  rationale: בְּנֵי es literalmente 'hijos de', pero aquí funciona corporativamente como apelación al conjunto de Judá y Jerusalén. Se conserva la forma hebrea 'hijos' por transparencia textual, con una nota para aclarar el sentido colectivo. Se evita 'pueblo' en el texto principal porque borra la imagen lexical del hebreo.
- source_word: אַתֶּם אֹמְרִים
  english_pob_choice: you are saying
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - ustedes dicen
  lexicon: HALOT
  rationale: El participio con pronombre expresa una acusación presente y en curso. 'Dicen' en español comunica la imputación sin sobrecargar el estilo; el sujeto explícito 'ustedes' mantiene la fuerza de contraste.
- source_word: לִכְבֹּשׁ
  english_pob_choice: you will subdue
  chosen_spanish: someterán
  alternatives_spanish:
  - subyugarán
  - dominarán
  - someterán por la fuerza
  lexicon: HALOT
  rationale: כָּבַשׁ significa 'subyugar/someter'. 'Someterán' transmite la coerción y el resultado del verbo sin añadir un objeto interpretativo que el hebreo ya desarrolla después.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  english_pob_choice: as male and female slaves
  chosen_spanish: a esclavos y esclavas
  alternatives_spanish:
  - como esclavos y esclavas
  - a siervos y siervas
  lexicon: HALOT
  rationale: El par masculino/femenino distingue personas reducidas a esclavitud; 'esclavos y esclavas' mantiene esa fuerza léxica mejor que 'siervos', que suaviza el sentido. Se omite 'male and female' como redundante en español cuando el par ya marca el género.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  lexicon: HALOT
  rationale: La dativa de ventaja/posesión señala que el beneficio recae sobre ellos. 'Para ustedes' es natural y mantiene la idea de apropiación; no se fuerza el reflexivo porque el español ya puede inferirse del contexto.
- source_word: הֲלֹא רַק אַתֶּם עִמָּכֶם אֲשָׁמוֹת
  english_pob_choice: But do not you yourselves also have guilt
  chosen_spanish: ¿Acaso no tienen también ustedes culpa?
  alternatives_spanish:
  - ¿No tienen ustedes también culpas?
  - ¿No hay también en ustedes culpas?
  lexicon: HALOT
  rationale: La pregunta hebrea es comprimida y el sustantivo plural אֲשָׁמוֹת expresa 'culpas' o 'ofensas culpables'. 'Culpa' en singular colectivo suena más natural en español y preserva el reproche; la partícula retórica se refleja con '¿Acaso no...?'. El 'también' corresponde a רַק/הֲלֹא en el contexto acusatorio.
- source_word: לַיהוָה אֱלֹהֵיכֶם
  english_pob_choice: before Yahweh your God
  chosen_spanish: ante Yahvé, su Dios
  alternatives_spanish:
  - delante de Yahvé, su Dios
  - ante Yahvé, el Dios de ustedes
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto para יְהוָה. 'Ante' comunica adecuadamente la idea de responsabilidad o culpa en su presencia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo tiene el Tetragrama y el proyecto pide traducirlo directamente en español como 'Yahvé', no con una sustitución devocional. Esto preserva el nombre de pacto y la trazabilidad hacia el original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura corporativa de בְּנֵי יְהוּדָה וִירוּשָׁלִַם
  english_pob_reading: the people of Judah and Jerusalem
  chosen_spanish_reading: hijos de Judá y de Jerusalén
  alternative_spanish_readings:
  - el pueblo de Judá y de Jerusalén
  - descendientes de Judá y de Jerusalén
  rationale: El hebreo usa una expresión masculina plural que se dirige al conjunto de la comunidad. Se mantiene la forma literal 'hijos' en el texto para no ocultar la imagen lexical, y se documenta que el sentido es corporativo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — transparent correspondence to source'
- issue: אֲשָׁמוֹת como plural de culpa/ofensas
  english_pob_reading: guilt
  chosen_spanish_reading: culpa
  alternative_spanish_readings:
  - culpas
  - culpabilidad
  - ofensas
  rationale: El plural hebreo sugiere culpas/ofensas concretas, pero en español una forma colectiva singular comunica mejor la acusación retórica y evita una construcción áspera. La nota preserva la tensión entre plural hebreo y singular natural español.
  doctrine_reference: 'HALOT; DOCTRINE.md: preserve lexical tension where source is compressed'
translation_notes:
  revision_awareness: La versión inglesa final añadió 'you will' para reflejar más explícitamente la construcción infinitiva; por eso el español usa un futuro verbal directo ('someterán') en vez de una perifrasis más débil. También se mantuvo la lectura acusatoria condensada de la pregunta final, sin suavizar la tensión léxica de אֲשָׁמוֹת.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se prefirió 'esclavos/esclavas' por la fuerza léxica de עֲבָדִים/שְׁפָחוֹת en un contexto de subyugación bélica.
  - Se conservó una solución transparente para בְּנֵי mediante 'hijos' con nota explicativa, en vez de reemplazarlo totalmente por 'pueblo'.
  - Se usó una pregunta retórica en español para reproducir el tono de reprensión del hebreo.
  - Los marcadores de nota aparecen únicamente donde el texto principal requiere aclaración léxica.
