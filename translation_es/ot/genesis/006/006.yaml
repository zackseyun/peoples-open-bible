translation:
  language: es
  text: Y Yahvé sintió pesar[a] por haber hecho al hombre[b] en la tierra, y se dolió en su corazón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se entristeció', 'le pesó' o 'se apenó'. El hebreo נחם en nifal expresa aquí dolor profundo por una acción previa, no arrepentimiento moral ni sorpresa cognitiva.
    reason: lexical_alternative
  - marker: b
    text: O 'la humanidad' o 'el género humano'. Hebreo אָדָם aquí tiene sentido colectivo y se refiere a la raza humana.
    reason: lexical_alternative
  - marker: c
    text: O 'a su corazón'. La preposición hebrea אֶל puede conservar una sensación de dirección interior, aunque en español 'en su corazón' suena más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּחֶם
  english_pob_choice: grieved over
  chosen_spanish: se entristeció
  alternatives_spanish:
  - se dolió
  - lamentó
  - se apenó
  lexicon: HALOT
  rationale: El hebreo נָחַם en nifal expresa aquí dolor o pesar profundo por una acción previa. En español, 'se entristeció' comunica ese pesar relacional sin sugerir arrepentimiento moral de una falta, ni la idea de sorpresa cognitiva. 'Lamentó' y 'se apenó' también son posibles, pero 'se entristeció' mantiene el peso afectivo de la acción divina con claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: DOCTRINE.md default for the divine name
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH, usando 'Yahvé' en el texto principal. 'Jehová' queda descartado por no ser la forma normativa del proyecto.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - la gente
  lexicon: HALOT
  rationale: אָדָם aquí tiene alcance colectivo y designa a la raza humana. 'El hombre' conserva esa fuerza representativa y la concisión del hebreo, mientras que 'la humanidad' explicita el sentido colectivo pero suaviza el vínculo con la formulación del texto.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: HALOT
  rationale: En Génesis, בָּאָרֶץ normalmente remite a la tierra como ámbito del mundo humano. 'En la tierra' es natural en español y respeta la referencia espacial del hebreo.
- source_word: וַיִּתְעַצֵּב
  english_pob_choice: was pained
  chosen_spanish: se dolió
  alternatives_spanish:
  - fue afligido
  - se entristeció
  - sintió dolor
  lexicon: HALOT
  rationale: El hitpael de עצב expresa un dolor interior, una herida afectiva. 'Se dolió' reproduce bien ese matiz corporal e interior a la vez, y evita repetir simplemente 'entristeció' en la segunda cola. 'Fue afligido' suena más pasivo y menos idiomático aquí.
- source_word: אֶל לִבּוֹ
  english_pob_choice: to his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - a su corazón
  - dentro de su corazón
  lexicon: HALOT
  rationale: Aunque אֶל es literalmente 'a/hacia', en esta expresión hebrea la idea es interioridad profunda. En español, 'en su corazón' comunica con naturalidad esa interioridad y preserva la imagen sin rigidez sintáctica.
theological_decisions:
- issue: Lenguaje antropopático acerca de Dios
  english_pob_reading: Retain the text's direct portrayal of the LORD as grieving over and inwardly pained by what humanity had become, without softening it into mere appearance-language and without the modern-English 'regretted' connotation that God lacked foresight or judges his own act a mistake.
  chosen_spanish_reading: Mantener la atribución directa de tristeza y dolor interior a Yahvé, sin convertirla en mero lenguaje aparente ni en 'se arrepintió' o 'lamentó haber cometido un error'.
  alternative_spanish_readings:
  - pareció entristecerse
  - se arrepintió
  - se retractó
  rationale: 'La traducción debe conservar la tensión teológica del pasaje: el texto atribuye a Yahvé tristeza y dolor real en términos humanos. ''Se entristeció'' y ''se dolió'' preservan esa fuerza sin insinuar falta de presciencia o error moral. ''Se arrepintió'' en español suele implicar arrepentimiento moral, por lo que sería engañoso aquí.'
  doctrine_reference: Principio de tensión textual preservada; afirmaciones de ortodoxia histórica sin aplanar el antropopatismo
- issue: Sentido colectivo de הָאָדָם
  english_pob_reading: Render as 'man' in the representative/generic sense.
  chosen_spanish_reading: Usar 'el hombre' en sentido genérico y representativo.
  alternative_spanish_readings:
  - la humanidad
  - el género humano
  rationale: El contexto abarca al conjunto de la raza humana. 'El hombre' es una forma natural en español bíblico y conserva el paralelismo y la concisión del hebreo, sin perder el alcance colectivo.
  doctrine_reference: Principio de correspondencia semántica para אָדָם; fuerza representativa del término
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el tramo final del audit trail en inglés: la revisión de ''regretted'' a ''grieved over'' y de ''to his heart'' a ''in his heart''. La versión española sigue esa clarificación teológica y estilística, evitando ''se arrepintió'' y usando una expresión idiomática de interioridad (''en su corazón'') sin perder la imagen hebrea.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para YHWH.
  - 'Se conserva la tensión antropopática con dos verbos distintos: ''se entristeció'' y ''se dolió''.'
  - '''El hombre'' se usa de forma genérica/representativa, no como referencia a un varón individual.'
  - 'La estructura general sigue de cerca el hebreo: sujeto divino, causa del pesar, objeto colectivo y dolor interior.'
