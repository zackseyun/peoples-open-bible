translation:
  language: es
  text: David era hijo de un efrateo de Belén de Judá, cuyo nombre era Isaí, y él tenía ocho hijos. En los días de Saúl, el hombre era anciano, entrado en años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea es inusual: literalmente, «viejo, venido entre hombres». Es una manera idiomática de indicar que era de edad muy avanzada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרָתִי
  english_pob_choice: Ephrathite
  chosen_spanish: efrateo
  alternatives_spanish:
  - de Efrata
  - efratita
  - habitante de Efrata
  lexicon: HALOT
  rationale: El término designa aquí un vínculo geográfico/étnico asociado con Belén de Judá, no a la tribu de Efraín. «Efrateo» conserva la forma derivada y evita una explicación excesiva en el texto principal.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem of Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén en Judá
  - procedente de Belén de Judá
  lexicon: HALOT
  rationale: Es una expresión geográfica directa. «De Belén de Judá» mantiene la relación genitiva y distingue esta Belén de otras localidades homónimas.
- source_word: וּשְׁמוֹ יִשַׁי
  english_pob_choice: whose name was Jesse
  chosen_spanish: cuyo nombre era Isaí
  alternatives_spanish:
  - y su nombre era Isaí
  - de nombre Isaí
  lexicon: HALOT
  rationale: El español fluye mejor con una relativa que conserva la función identificadora del hebreo sin perder precisión.
- source_word: וְלוֹ שְׁמֹנָה בָנִים
  english_pob_choice: and he had eight sons
  chosen_spanish: y tenía ocho hijos
  alternatives_spanish:
  - y le eran ocho hijos
  - y tenía ocho hijos varones
  lexicon: HALOT
  rationale: En español «hijos» comunica naturalmente la referencia masculina del contexto, y evita una fórmula posesiva pesada. El número y la relación familiar quedan intactos.
- source_word: בִּימֵי שָׁאוּל
  english_pob_choice: In the days of Saul
  chosen_spanish: En los días de Saúl
  alternatives_spanish:
  - Durante los días de Saúl
  - En tiempos de Saúl
  lexicon: HALOT
  rationale: Es el giro temporal estándar y claro en español bíblico moderno.
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: era viejo
  alternatives_spanish:
  - era anciano
  - estaba viejo
  lexicon: HALOT
  rationale: El verbo indica edad avanzada. «Era viejo» es directo y conserva la afirmación simple del hebreo.
- source_word: בָּא בַאֲנָשִׁים
  english_pob_choice: advanced in years
  chosen_spanish: había avanzado en años
  alternatives_spanish:
  - había entrado entre los hombres
  - estaba avanzado entre los hombres
  - estaba muy entrado en años
  lexicon: HALOT
  rationale: El hebreo usa una expresión inusual, literalmente «viejo, venido entre hombres». La POB inglesa optó por «advanced in years» tras revisar la imagen idiomática; el español mantiene esa solución natural y fiel al sentido. La nota preserva la rareza del hebreo.
- source_word: וְהָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - aquel hombre
  - ese hombre
  lexicon: HALOT
  rationale: Se conserva la repetición discursiva del hebreo referida a Isaí, sin suavizarla a «él».
theological_decisions:
- issue: Nombre divino en el trasfondo del texto
  english_pob_reading: No appears directly in this verse; the verse uses a temporal frame and genealogy only.
  chosen_spanish_reading: No se introduce ninguna referencia divina explícita en el texto principal.
  alternative_spanish_readings:
  - Añadir una nota sobre el trasfondo del nombre divino en el libro
  - No aplica
  rationale: El versículo no contiene el nombre divino ni una cita que lo requiera; por tanto, no se debe introducir terminología teológica ajena al contenido local.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'La versión inglesa pasó de «advanced among men» a «advanced in years» para reflejar el hebraísmo de forma natural. La redacción española sigue esa revisión: mantiene «había avanzado en años» en el texto principal y preserva en nota la imagen literal del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - «Mesías/Cristo» no interviene en este versículo.
  - «Isaí» sigue la forma española usual del nombre propio bíblico.
  - La estructura con «En los días de Saúl» y la repetición «el hombre» conservan el tono narrativo del hebreo sin rusticidad innecesaria.
