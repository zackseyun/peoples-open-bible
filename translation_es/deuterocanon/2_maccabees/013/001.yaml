translation:
  language: es
  text: En el año ciento cuarenta y nueve[a], llegó a conocimiento de los que estaban con Judas que Antíoco Eupátor había llegado con tropas contra Judea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sucedió entre los que estaban con Judas que Antíoco Eupátor había venido». El verbo griego puede introducir un acontecimiento o noticia que alcanza al grupo de Judas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτῳ δὲ ἐνάτῳ καὶ τεσσερακοστῷ καὶ ἑκατοστῷ ἔτει
  english_pob_choice: In the one hundred forty-ninth year
  chosen_spanish: En el año ciento cuarenta y nueve
  alternatives_spanish:
  - En el año ciento cuarenta y nueve
  - En el año ciento cuarenta y nueve
  lexicon: LSJ
  rationale: La construcción dativa temporal se vierte naturalmente como «En el año…». Mantengo la numeración ordinal/cardinal del año 149 sin añadir una formulación más interpretativa que el griego no exige.
- source_word: προσέπεσεν
  english_pob_choice: it happened
  chosen_spanish: aconteció
  alternatives_spanish:
  - sucedió
  - llegó a oídos de
  lexicon: LSJ
  rationale: El verbo introduce el encuadre narrativo de un hecho que ocurre o se presenta al grupo de Judas. «Aconteció» conserva el carácter eventivo sin obligar a leer explícitamente «noticia» en el texto principal.
- source_word: τοῖς περὶ τὸν Ἰούδαν
  english_pob_choice: to those around Judas
  chosen_spanish: a los que estaban con Judas
  alternatives_spanish:
  - a los de alrededor de Judas
  - a la gente de Judas
  lexicon: LSJ
  rationale: «Los que estaban con Judas» comunica en español el valor idiomático del grupo asociado a Judas sin sonar artificial ni especificar «hombres» donde el griego no lo dice.
- source_word: Ἀντίοχον τὸν Εὐπάτορα
  english_pob_choice: Antiochus Eupator
  chosen_spanish: Antíoco Eupátor
  alternatives_spanish:
  - Antíoco Eupátor
  - Antíoco, el Eupátor
  lexicon: LSJ
  rationale: Conservo la designación regnal estándar en español, con transliteración del nombre griego y acentuación natural en castellano.
- source_word: παραγεγόνα
  english_pob_choice: had arrived
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había arribado
  lexicon: LSJ
  rationale: El perfecto señala llegada ya cumplida con relevancia narrativa. «Había llegado» reproduce bien ese valor sin recargar el estilo.
- source_word: σὺν πλήθεσιν
  english_pob_choice: with forces
  chosen_spanish: con tropas
  alternatives_spanish:
  - con fuerzas
  - con multitud de tropas
  - con un gran ejército
  lexicon: LSJ
  rationale: «Tropas» expresa el contexto militar de πλήθεσιν de manera más natural en español que un calco como «multitudes», sin exagerar a «ejército» si el griego no lo nombra explícitamente.
- source_word: ἐπὶ τὴν Ἰουδαίαν
  english_pob_choice: against Judea
  chosen_spanish: contra Judea
  alternatives_spanish:
  - hacia Judea
  - sobre Judea
  lexicon: LSJ
  rationale: En contexto militar, ἐπί con acusativo indica movimiento hostil. «Contra Judea» preserva esa orientación adversarial de forma clara en español.
translation_notes:
  revision_awareness: Se siguió el sentido del texto griego directo y el audit trail inglés. No se adoptó una traducción mecánica desde el inglés; se ajustó la sintaxis a español natural manteniendo la ambigüedad narrativa de προσέπεσεν mediante una formulación eventiva no interpretativa. La nota alternativa conserva la lectura posible de recepción de noticia que el inglés POB documenta.
  spanish_consistency_notes:
  - Se usó «Antíoco» y no «Antioquio» para seguir la transliteración usual en español bíblico sin perder la forma griega del nombre.
  - Se prefirió «Judea» como topónimo histórico estándar en español.
  - Se evitó «SEÑOR» u otras terminologías teológicas no presentes en este versículo.
