base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/010.yaml
  text: For ten yoke-pairs of vineyard will yield one bath[b][a], and a homer of seed will yield an ephah.
  footnotes:
  - marker: a
    text: Or 'ten yokes of vineyard'; the Hebrew likely refers to the amount of land worked by ten yoke-pairs, not necessarily literal paired animals standing in the vineyard.
    reason: lexical_alternative
  - marker: b
    text: 'A bath was a liquid measure; an ephah was a dry measure. The point is severe agricultural scarcity: a large vineyard yields very little wine, and a large amount of seed yields only a small harvest.'
    reason: cultural_note
