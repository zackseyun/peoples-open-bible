translation:
  language: es
  text: el tercero a Harim[a], el cuarto a Seorim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Harim ... para Seorim»; el prefijo hebreo puede marcar asignación y aquí se traduce con «a» en esta lista de suertes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְחָרִם
  english_pob_choice: to Harim
  chosen_spanish: a Harim
  alternatives_spanish:
  - para Harim
  lexicon: HALOT
  rationale: El prefijo ל expresa asignación en una lista de suertes o turnos. En español, «a» comunica de manera natural la distribución asignada sin añadir matices ajenos; se conserva el nombre propio transliterado como Harim.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - la tercera
  lexicon: HALOT
  rationale: El adjetivo ordinal con artículo se refiere al tercer puesto en la secuencia. En español, «el tercero» mantiene el paralelismo breve y elíptico del hebreo.
- source_word: לִשְׂעֹרִים
  english_pob_choice: to Seorim
  chosen_spanish: a Seorim
  alternatives_spanish:
  - para Seorim
  lexicon: HALOT
  rationale: Como en la primera mitad del verso, el ל marca asignación. Se conserva la transliteración Seorim, que refleja la forma hebrea sin forzar una adaptación tradicional.
- source_word: הָרְבִעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - la cuarta
  lexicon: HALOT
  rationale: El ordinal paralelo a «el tercero» indica el cuarto lugar en la lista. «El cuarto» respeta la concisión del texto fuente y su estilo de enumeración.
translation_notes:
  revision_awareness: El contexto hebreo y el control cruzado inglés concuerdan en una lista breve de asignación por suertes, sin variantes textuales relevantes ni revisiones pendientes; se preserva la estructura elíptica del original.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios Harim y Seorim, en línea con el audio de decisiones inglés y la política de nombres.
  - Se traduce el prefijo ל de forma consistente con valor de asignación mediante «a», evitando una paráfrasis más interpretativa.
  - La elipsis ordinal se conserva para reflejar la sintaxis telegráfica del listado hebreo.
