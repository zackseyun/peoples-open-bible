lexical_decisions:
- source_word: עוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - Oved
  lexicon: HALOT
  rationale: Es un nombre propio; en español bíblico conviene transliterarlo con la forma ya asentada en castellano, manteniendo la identificación genealógica sin traducir el nombre.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el Hiphil de ילד expresa la relación de paternidad generativa. «Engendró» conserva ese sentido formal y genealógico en español, mejor que una paráfrasis más larga.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: La partícula de objeto directo no requiere equivalente independiente en español; su función queda absorbida por la sintaxis normal de la oración.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehu
  alternatives_spanish:
  - Jehú
  lexicon: HALOT
  rationale: Nombre propio. Mantengo la forma «Jehu» para alineación editorial con el POB en inglés y porque es una transliteración clara y reconocible en español bíblico moderno.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción simple coordina las dos cláusulas genealógicas; «y» es la correspondencia normal y natural en español.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaríah
  lexicon: HALOT
  rationale: Nombre propio; «Azarías» es la forma tradicional y ampliamente entendible en español bíblico, manteniendo la transliteración del hebreo sin reinterpretación.
