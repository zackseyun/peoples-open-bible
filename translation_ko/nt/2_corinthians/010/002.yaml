  yaml_path: translation/nt/2_corinthians/010/002.yaml
  text: But I beg that when I am present I may not have to be bold with the confidence by which I consider daring to confront some who regard us as walking according to the flesh[a].
translation:
  language: ko
  text: 나는 간청합니다. 내가 여러분과 함께 있을 때에는, 우리를 육신을 따라 행하는 자로 여기는 어떤 이들을 향해 담대히 맞서리라고 생각하는 그 확신으로 담대해질 필요가 없게 해 달라고 말입니다.
  philosophy: optimal-equivalence
