translation:
  language: es
  text: Y cuando los que llevaban el arca llegaron hasta el Jordán, y los pies de los sacerdotes que llevaban el arca se hundieron en el borde del agua[a] (ahora bien, el Jordán estaba lleno sobre todas sus orillas[b] todos los días de la siega),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al borde del agua». La expresión hebrea dice literalmente «en el borde/extremo del agua», indicando que los pies de los sacerdotes entraron en el agua por su margen.
    reason: lexical_alternative
  - marker: b
    text: Esto es, el Jordán estaba en crecida durante la temporada de la siega.
    reason: cultural_note
lexical_decisions:
- source_word: וּכְבֹוא
  english_pob_choice: And when ... came
  chosen_spanish: Y cuando ... llegaron
  alternatives_spanish:
  - y al llegar
  - y cuando ... vinieron
  lexicon: HALOT
  rationale: La construcción temporal introduce una circunstancia de llegada; «Y cuando» conserva la secuencia narrativa y suena natural en español.
- source_word: נֹשְׂאֵי הָאָרוֹן
  english_pob_choice: those carrying the ark
  chosen_spanish: los que llevaban el arca
  alternatives_spanish:
  - los portadores del arca
  - los que portaban el arca
  lexicon: HALOT
  rationale: El participio enfatiza a las personas en función de carga; «los que llevaban» es claro y fiel sin volverlo demasiado técnico.
- source_word: עַד הַיַּרְדֵּן
  english_pob_choice: as far as the Jordan
  chosen_spanish: hasta el Jordán
  alternatives_spanish:
  - hasta el río Jordán
  - al Jordán
  lexicon: HALOT
  rationale: עַד marca el punto alcanzado; «hasta el Jordán» reproduce el valor de llegada sin añadir explicación innecesaria.
- source_word: וְרַגְלֵי הַכֹּהֲנִים
  english_pob_choice: and the feet of the priests
  chosen_spanish: y los pies de los sacerdotes
  alternatives_spanish:
  - y los pies de los sacerdotes
  - y los pies sacerdotales
  lexicon: HALOT
  rationale: Se mantiene la estructura del hebreo con el sustantivo explícito «pies»; el posesivo implícito en español no requiere reordenamiento forzado.
- source_word: נֹשְׂאֵי הָאָרוֹן
  english_pob_choice: carrying the ark
  chosen_spanish: que llevaban el arca
  alternatives_spanish:
  - que portaban el arca
  - que traían el arca
  lexicon: HALOT
  rationale: La repetición del participio se conserva con una relativa; así se identifica que son los sacerdotes que cargan el arca, no un grupo distinto.
- source_word: נִטְבְּלוּ
  english_pob_choice: were dipped
  chosen_spanish: se mojaron
  alternatives_spanish:
  - fueron sumergidos
  - se metieron en el agua
  lexicon: HALOT
  rationale: En este contexto el verbo apunta al contacto de los pies con el agua al margen del río; «se mojaron» es más natural en español y no exagera hasta una inmersión total.
- source_word: בִּקְצֵה הַמָּיִם
  english_pob_choice: in the edge of the water
  chosen_spanish: en el borde del agua
  alternatives_spanish:
  - en el borde del agua
  - en la orilla del agua
  lexicon: HALOT
  rationale: La expresión literal apunta al margen del agua; «borde» conserva mejor la imagen que una paráfrasis más libre como «orilla».
- source_word: וְהַיַּרְדֵּן מָלֵא
  english_pob_choice: now the Jordan was full
  chosen_spanish: y el Jordán estaba lleno
  alternatives_spanish:
  - y el Jordán estaba desbordado
  - y el Jordán estaba crecido
  lexicon: HALOT
  rationale: מָלֵא indica plenitud; «estaba lleno» mantiene la observación de fondo sin convertirla en interpretación excesiva.
- source_word: עַל כָּל גְּדוֹתָיו
  english_pob_choice: over all its banks
  chosen_spanish: por todos sus márgenes
  alternatives_spanish:
  - sobre todos sus bordes
  - sobre todas sus riberas
  lexicon: HALOT
  rationale: La idea es de un río crecido que cubre o rebasa sus límites; «márgenes» comunica bien la imagen de la crecida en español.
- source_word: כֹּל יְמֵי קָצִיר
  english_pob_choice: all the days of harvest
  chosen_spanish: todos los días de la siega
  alternatives_spanish:
  - durante toda la siega
  - en todos los días de la cosecha
  lexicon: HALOT
  rationale: «Siega» preserva el tono agrícola y bíblico del término sin volverlo arcaizante; «cosecha» sería posible, pero menos próxima al campo semántico del texto.
theological_decisions:
- issue: Descripción del nivel del Jordán durante la estación de cosecha
  english_pob_reading: That is, the Jordan was at flood stage during harvest season.
  chosen_spanish_reading: (y el Jordán estaba lleno por todos sus márgenes, todos los días de la siega)
  alternative_spanish_readings:
  - (es decir, el Jordán estaba en crecida durante la temporada de la siega)
  - (o sea, el Jordán estaba desbordado en tiempo de siega)
  rationale: La aclaración se conserva como paréntesis informativo, pero sin imponer «desbordado» si el texto hebreo solo dice que estaba lleno por sus márgenes. La nota puede explicar la implicación de crecida.
  doctrine_reference: Observación histórica/narrativa; no doctrinal.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con la revisión inglesa más reciente; no se documentan cambios de sustancia en el audit trail, por lo que la draft española sigue de cerca la decisión óptima-equivalente ya aprobada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología predeterminada solo cuando el texto lo exige explícitamente; aquí no aparece.
  - Se mantiene «Jordán» con artículo implícito como en el uso bíblico corriente, sin añadir «río» salvo en notas opcionales.
  - «Arca» se conserva de forma consistente para הָאָרוֹן, conforme al registro bíblico estándar.
  - El paréntesis principal reproduce la observación explicativa del texto fuente sin convertirla en una glosa interpretativa más allá de lo atestiguado.
