translation:
  language: es
  text: y domina el afecto por su esposa[a], reprendiéndola a causa de su conducta contraria a la ley;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prevalece sobre el amor por su esposa». La frase griega se refiere al apego afectivo dentro del matrimonio, y el verbo puede significar «prevalecer sobre» o «tener dominio sobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικρατεῖ
  english_pob_choice: masters
  chosen_spanish: domina
  alternatives_spanish:
  - prevalece sobre
  - tiene dominio sobre
  - se impone sobre
  lexicon: LSJ
  rationale: El verbo griego expresa tener la superioridad o el dominio. «Domina» comunica esa idea de control moral y racional con naturalidad en español, sin perder la fuerza de la decisión ética del pasaje.
- source_word: τῆς πρὸς γαμετὴν φιλίας
  english_pob_choice: affection for his wife
  chosen_spanish: la afición a su esposa
  alternatives_spanish:
  - el afecto por su esposa
  - el amor por su esposa
  - el apego a su esposa
  lexicon: LSJ
  rationale: φιλία aquí señala una relación afectiva de apego, no un término técnico para eros. «Afición» intenta conservar esa tonalidad de afecto/adhesión, aunque suene menos solemne; se mantiene la claridad matrimonial con «su esposa».
- source_word: διὰ παρανομίαν
  english_pob_choice: because of lawlessness
  chosen_spanish: por causa de la iniquidad
  alternatives_spanish:
  - por causa de la transgresión
  - por causa de la impiedad legal
  - a causa de la desobediencia a la ley
  lexicon: LSJ
  rationale: παρανομία apunta a conducta contraria a la ley o al orden moral. «Iniquidad» preserva el peso moral del término en un registro bíblico comprensible; se evita suavizarlo a una simple incorrección.
- source_word: ἀπελέγχων
  english_pob_choice: reproving
  chosen_spanish: reprendiéndola
  alternatives_spanish:
  - reprendiéndola severamente
  - corrigiéndola
  - exponiendo su falta
  lexicon: LSJ
  rationale: El participio implica censurar o mostrar la culpa. «Reprendiéndola» comunica bien la acción de amonestar por una falta, sin forzar una exposición pública que el contexto no exige.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - a su esposa
  lexicon: Greek grammar
  rationale: El pronombre retoma a γαμετήν. En español, el complemento directo femenino «la» es natural y mantiene la referencia sin repetir innecesariamente «su esposa».
theological_decisions:
- issue: La soberanía de la razón sobre el afecto matrimonial
  english_pob_reading: The verse states that one can exercise mastery even over affection for a wife when moral law requires reproof.
  chosen_spanish_reading: El versículo afirma que puede ejercerse dominio incluso sobre el afecto conyugal cuando la norma moral exige reprensión.
  alternative_spanish_readings:
  - … incluso sobre el amor a la esposa …
  - … incluso sobre el apego a la esposa …
  rationale: 'Se conserva la tensión del texto: no se diluye el control fuerte del verbo ni se convierte el pasaje en mera moderación sentimental. La formulación mantiene el argumento ético del contexto sin introducir categorías doctrinales ajenas.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y el consenso alto del control de revisión en inglés. Se conserva la fuerza de ἐπικρατεῖ y la relación afectiva matrimonial de φιλία, evitando un giro más débil que rebaje el argumento moral del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece ninguna de esas formas en el texto.
  - «Iniquidad» se usa aquí como equivalente bíblico y moral de παρανομία, sin desplazar el sentido legal de fondo.
  - El pronombre objeto directo se resuelve con «la» por claridad y fluidez en español.
