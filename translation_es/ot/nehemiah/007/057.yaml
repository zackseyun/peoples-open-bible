translation:
  language: es
  text: 'Los hijos[a] de los siervos de Salomón: los hijos de Sotai, los hijos de Sopheret, los hijos de Perida[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de los siervos de Salomón». En las listas genealógicas, «hijos de» puede indicar una línea familiar más amplia, no solo hijos inmediatos.
    reason: lexical_alternative
  - marker: b
    text: También puede escribirse «Peridá». Las transliteraciones de este nombre varían ligeramente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En listas genealógicas o de repatriados, בְּנֵי puede abarcar una línea familiar más amplia. «Los hijos de» conserva la forma formal de la lista hebrea y suena natural en español bíblico; además permite la amplitud genealógica sin forzar una traducción más interpretativa.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  lexicon: HALOT
  rationale: La expresión «los siervos de Salomón» funciona aquí como designación hereditaria o administrativa dentro de una lista postexílica. «Siervos» preserva el valor relacional del término sin imponer de entrada la fuerza de «esclavos», que en español podría sonar demasiado restrictiva para esta lista.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: convención onomástica española
  rationale: Nombre propio hebreo adaptado a la forma establecida en español bíblico.
- source_word: סוֹטַי
  english_pob_choice: Sotai
  chosen_spanish: Sotai
  alternatives_spanish:
  - Sotay
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado. Se mantiene la vocalización que respalda la forma «Sotai», dejando constancia de la posible variación menor de transliteración.
- source_word: סוֹפֶרֶת
  english_pob_choice: Sophereth
  chosen_spanish: Sopheret
  alternatives_spanish:
  - Soferet
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado, no traducido. En español, «Sopheret» conserva mejor la forma reconocible del nombre y evita sugerir que se trata del sustantivo común relacionado con escribir.
- source_word: פְרִידָא
  english_pob_choice: Perida
  chosen_spanish: Perida
  alternatives_spanish:
  - Peridá
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado. Se prefiere una forma breve y clara en español; la tilde final es una posibilidad ortográfica, pero no es necesaria para la identificación del nombre.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo masorético y con la auditoría inglesa; no se requieren ajustes de contenido ni de orden. Se ha mantenido la estructura nominal de lista y la ambigüedad genealógica de בְּנֵי mediante la nota correspondiente.
  spanish_consistency_notes:
  - Se emplea «hijos de» para reflejar la fórmula genealógica recurrente.
  - Se usa «siervos» para עַבְדֵי por su valor de designación de grupo en esta lista, sin cerrar la posibilidad semántica de «esclavos».
  - Los nombres propios se transliteran de forma consistente y sin latinización excesiva.
  - La puntuación con dos puntos reproduce la estructura enumerativa del hebreo y de la POB inglesa.
