revisions:
- from: Por su palabra[a] contuvo los cielos, y[b] trajo fuego tres veces.
  to: Por su palabra[a] contuvo los cielos, e hizo descender fuego tres veces[b].
  rationale: La revisión corrige el verbo principal para reflejar mejor el valor causativo del hebreo en el contexto de Elías («hizo descender fuego») y ajusta la nota léxica para que preserve el literal documentado por el POB («tres fuegos»). También se mueve el anclaje de la nota b a la frase pertinente.
  reviewer_model: gpt-5.4
