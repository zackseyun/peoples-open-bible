  text: ὁ ⸂τοῦ θεοῦ γὰρ⸃ υἱὸς ⸂Ἰησοῦς Χριστὸς⸃ ὁ ἐν ὑμῖν δι’ ἡμῶν κηρυχθείς, δι’ ἐμοῦ καὶ Σιλουανοῦ καὶ Τιμοθέου, οὐκ ἐγένετο Ναὶ καὶ Οὒ, ἀλλὰ Ναὶ ἐν αὐτῷ γέγονεν·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/019.yaml
  text: For the Son of God, Jesus Messiah, who was proclaimed among you through us—through me and Silvanus and Timothy—did not become Yes and No; rather, in him it has become Yes.
  footnotes:
  - marker: a
    text: Or 'Jesus Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was preached among you by us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was not “Yes” and “No” ... but in him it has been “Yes.”'
    reason: alternative_reading
  - marker: d
    text: Or 'rather, in him it has become Yes.'.
    reason: previous_rendering
translation:
  language: ko
  text: 우리, 곧 나와 실루아노와 디모데를 통하여 여러분 가운데 전파된 하나님의 아들 예수 메시아는 「예」 하면서 「아니요」가 되신 적이 없고, 도리어 그분 안에서 「예」가 되셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σιλουανοῦ
  english_pob_choice: Silvanus
  chosen_korean: 실루아노
  alternatives_korean:
  - 실라
  lexicon: BDAG
  rationale: 신약의 동일 인물의 헬라식 정식 이름. 사도행전의 「실라」와 동일인. 본문은 「실루아노」 정형 표기를 따른다.
- source_word: Τιμοθέου
  english_pob_choice: Timothy
  chosen_korean: 디모데
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 성경 정립 표기.
- source_word: κηρυχθείς
  english_pob_choice: proclaimed
  chosen_korean: 전파되다
  alternatives_korean:
  - 선포되다
  lexicon: BDAG
  rationale: κηρύσσω는 공적 선포. 「전파되다」가 한국어 정립 어휘.
