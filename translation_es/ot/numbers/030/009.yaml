revisions:
- from: Pero si[a], el día que su marido lo oye, la prohíbe y anula su voto que está sobre ella, o la expresión apresurada de sus labios por la cual se obligó a sí misma, Yahvé la perdonará.
  to: Pero si[a], el día que su marido se entera, se opone a ella y anula su voto que está sobre ella, o la expresión apresurada de sus labios, por la cual se obligó a sí misma, Yahvé la perdonará.
  rationale: Se ajusta «el día que su marido se entera» para reflejar con más naturalidad el valor temporal de בְּיוֹם שְׁמֹעַ como momento de conocimiento. Se reemplaza «la prohíbe» por «se opone a ella», que comunica mejor el sentido jurídico de desautorizar la obligación sin la ambigüedad del objeto directo en español. También se pule la alternativa de nota a «vinculante», más idiomática que «obligante».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido legal del hebreo: condición contrastiva, conocimiento del marido, prohibición/anulación del voto, autoobligación y perdón final de Yahvé. También preserva correctamente «Yahvé». Sin embargo, hay dos ajustes de fidelidad/idiomaticidad: «la prohíbe» suena en español a prohibir a la mujer misma más que a desautorizar su voto, y «el día que su marido lo oye» es menos natural que «el día que su marido se entera».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero dos giros resultan algo toscos o ambiguos en español. «La prohíbe» es poco idiomático en este contexto jurídico; «se opone a ella» o «se lo prohíbe» comunican mejor la acción. «La expresión obligante» en la nota es poco natural; «la expresión vinculante» suena mejor. El resto del verso lee bien y mantiene el tono bíblico moderno.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» correctamente; נדר → «voto» correctamente; סלח → «perdonará» correctamente. La elección de «expresión apresurada de sus labios» es aceptable y está respaldada por la auditoría inglesa, con nota de alternativa. No hay conflicto doctrinal que requiera adjudicación adicional.'
  issues:
  - severity: medium
    issue: «la prohíbe» es ambiguo e idiomáticamente débil
    rationale: El hebreo יָנִיא אֹתָהּ en contexto de votos expresa desautorizar o impedir la vigencia del voto. En español, «la prohíbe» normalmente toma a la mujer como objeto directo de la prohibición, no su acto o voto, y puede confundir el sentido legal.
  - severity: low
    issue: «el día que su marido lo oye» suena menos natural que una formulación de conocimiento
    rationale: La auditoría inglesa explicó que בְּיוֹם שְׁמֹעַ es el momento cuando el marido llega a saberlo. «Se entera» o «oye hablar de ello» transmite mejor ese matiz en español natural.
  - severity: low
    issue: La nota «expresión obligante» suena poco natural
    rationale: Aunque intenta reflejar la alternativa inglesa «binding utterance», en español bíblico-jurídico «vinculante» expresa mejor la fuerza obligatoria sin sonar calcado.
  revised_spanish_text: Pero si[a], el día que su marido se entera, se opone a ella y anula su voto que está sobre ella, o la expresión apresurada de sus labios, por la cual se obligó a sí misma, Yahvé la perdonará.
  revised_footnotes:
  - marker: a
    text: 'O: «la expresión de sus labios» o «la expresión vinculante de sus labios».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «el día que su marido se entera» para reflejar con más naturalidad el valor temporal de בְּיוֹם שְׁמֹעַ como momento de conocimiento. Se reemplaza «la prohíbe» por «se opone a ella», que comunica mejor el sentido jurídico de desautorizar la obligación sin la ambigüedad del objeto directo en español. También se pule la alternativa de nota a «vinculante», más idiomática que «obligante».
