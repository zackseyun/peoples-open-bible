translation:
  language: es
  text: Y el ángel de Yahvé[a] no volvió a aparecer a Manoa y a su esposa. Entonces Manoa supo que él era el ángel de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». La palabra hebrea puede significar tanto «mensajero» como «ángel»; en este contexto se refiere a una figura sobrenatural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא יָ֤סַף עוֹד
  english_pob_choice: did not appear again
  chosen_spanish: no se volvió a aparecer
  alternatives_spanish:
  - no apareció de nuevo
  - no siguió apareciendo
  lexicon: HALOT
  rationale: El hebreo expresa cese de una acción repetida o ulterior. En español, «no se volvió a aparecer» comunica con naturalidad esa idea de repetición detenida sin perder el matiz del original.
- source_word: מַלְאַ֣ךְ יְהוָ֔ה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «mensajero» o «ángel», pero en este contexto narrativo la figura es sobrenatural. Se mantiene «ángel» por ser la opción más fiel al contexto, y «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: לְ/הֵרָאֹ֖ה
  english_pob_choice: appear
  chosen_spanish: aparecer
  alternatives_spanish:
  - ser visto
  - mostrarse
  lexicon: HALOT
  rationale: 'El infinitivo nifal de ראה tiene sentido pasivo/reflexivo: «aparecer» es el equivalente español más idiomático y claro en este contexto.'
- source_word: אֶל מָנ֣וֹחַ וְ/אֶל אִשְׁתּ֑/וֹ
  english_pob_choice: to Manoah and to his wife
  chosen_spanish: a Manoa y a su esposa
  alternatives_spanish:
  - a Manoa y a su mujer
  - hacia Manoa y hacia su esposa
  lexicon: HALOT
  rationale: Se conserva la estructura básica de destino/relación del hebreo con una preposición simple y natural en español. «Su esposa» mantiene la referencia pronominal del texto.
- source_word: אָ֚ז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la secuencia narrativa y la consecuencia de reconocimiento; «Entonces» es breve y natural.
- source_word: יָדַ֣ע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - se dio cuenta
  lexicon: HALOT
  rationale: Aquí el verbo expresa reconocimiento o comprensión de identidad. «Supo» comunica ese descubrimiento de forma clara y sobria en español.
- source_word: כִּֽי מַלְאַ֥ךְ יְהוָ֖ה הֽוּא
  english_pob_choice: that he was the angel of Yahweh
  chosen_spanish: que él era el ángel de Yahvé
  alternatives_spanish:
  - que era el ángel de Yahvé
  - que se trataba del ángel de Yahvé
  lexicon: HALOT
  rationale: Se conserva la referencia personal del pronombre hebreo הוּא y la identidad reconocida por Manoa. «Él era» mantiene la claridad sin resolver la tensión narrativa del pasaje.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto español sigue la convención de traducirlo como «Yahvé» para preservar el nombre de pacto en vez de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Se mantiene la lectura tradicional del personaje como ser sobrenatural, sin neutralizarla en «mensajero». El español conserva así la tensión narrativa y teológica que el audit trail documenta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; este borrador sigue el consenso del audit trail inglés y conserva sus decisiones léxicas y teológicas principales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «ángel» para מַלְאַךְ por el contexto sobrenatural.
  - Se prefiere una sintaxis española natural sin perder la secuencia hebrea del relato.
  - «Supo» expresa el reconocimiento final con sobriedad y sin añadir interpretación extra.
