translation:
  language: es
  text: Entonces el tabernáculo fue desmontado[a], y los hijos de Gersón y los hijos de Merari partieron[b], llevando el tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue bajado». El hebreo expresa que el tabernáculo pasó de estar erigido a no estarlo; «fue desmontado» recoge bien esa idea en español.
    reason: lexical_alternative
  - marker: b
    text: Es decir, se pusieron en marcha llevando el tabernáculo ya desmontado. El hebreo repite «el tabernáculo» y no dice explícitamente «sus partes».
    reason: cultural_note
lexical_decisions:
- source_word: וְהוּרַד
  english_pob_choice: was taken down
  chosen_spanish: fue desmontado
  alternatives_spanish:
  - fue bajado
  - fue desarmado
  lexicon: HALOT
  rationale: El hophal de ירד expresa que el tabernáculo pasó de su estado erigido a uno no erigido. En español, «fue desmontado» comunica bien esa acción en el contexto del campamento sin añadir demasiado mecanismo; «fue bajado» suena menos natural aquí y «fue desarmado» es posible, pero puede sonar más técnico de lo que exige el hebreo.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda de reunión
  lexicon: HALOT
  rationale: En este contexto cultual de Éxodo-Números, מִשְׁכָּן designa el santuario portátil de Israel. «Tabernáculo» es el equivalente establecido y preciso en español, más fiel al uso bíblico que una paráfrasis como «morada».
- source_word: וְנָסְעוּ
  english_pob_choice: set out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en contextos de marcha indica levantar el campamento y avanzar. «Salieron» funciona bien en español bíblico y conserva la idea de movimiento en el marco narrativo; «partieron» también es válido, pero «salieron» enlaza con naturalidad la secuencia del versículo.
- source_word: בְנֵי גֵרְשׁוֹן
  english_pob_choice: the sons of Gershon
  chosen_spanish: los hijos de Gersón
  alternatives_spanish:
  - los gersonitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Gersón». Se conserva esa forma para mantener la estructura del texto y la designación de clan. «Gersonitas» es una equivalencia contextual legítima, pero no refleja tan de cerca la formulación fuente.
- source_word: וּבְנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los meraritas
  lexicon: HALOT
  rationale: Se mantiene el paralelo literal con «los hijos de Gersón». «Meraritas» sería una forma de clan posible, pero el hebreo emplea expresamente la construcción filial, y conviene preservarla aquí.
- source_word: נֹשְׂאֵי
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - portando
  - cargando
  lexicon: HALOT
  rationale: El participio describe su función mientras avanzan. «Llevando» es natural y claro en español; «portando» es más solemne, pero menos idiomático, y «cargando» puede sugerir peso de manera algo más concreta de lo que exige el contexto.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - sus partes del tabernáculo
  - la tienda
  lexicon: HALOT
  rationale: El hebreo repite el mismo sustantivo sin decir explícitamente «sus partes». Por eso el español principal repite «el tabernáculo» en vez de explicar en el texto principal que llevaban sus piezas; esa precisión se deja implícita, como en la fuente.
theological_decisions:
- issue: La repetición de «el tabernáculo» en la segunda cláusula puede parecer redundante en español
  english_pob_reading: the Hebrew repeats 'the tabernacle' rather than explicitly saying 'its parts.'
  chosen_spanish_reading: se conserva la repetición de «el tabernáculo» sin suplir «sus partes» en el texto principal
  alternative_spanish_readings:
  - llevando sus partes
  - llevando el tabernáculo, es decir, sus partes
  rationale: La fuente hebrea repite el sustantivo y no explicita el contenido del transporte. Para no añadir información interpretativa al cuerpo del versículo, el español mantiene la repetición y deja cualquier aclaración para nota.
  doctrine_reference: Principio de suficiencia del texto fuente; fidelidad semántica al hebreo
translation_notes:
  revision_awareness: Se revisó el pasaje con el contexto auditado en inglés y el cotejo indica alto acuerdo; no se documentaron cambios posteriores. La formulación española sigue de cerca el hebreo y conserva la repetición del sustantivo en la segunda cláusula.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» como término cultual estándar en todo el versículo.
  - Se conserva la construcción «los hijos de...» para reflejar la fórmula hebrea de clan.
  - Se evita introducir «sus partes» en el cuerpo del texto para no sobreinterpretar la repetición hebrea.
  - El verbo principal se ajusta al español bíblico moderno sin perder la idea de desarme o descenso del santuario.
