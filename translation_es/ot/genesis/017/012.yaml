translation:
  language: es
  text: Y todo varón entre ustedes que tenga ocho días[a] será circuncidado[b] a lo largo de sus generaciones, tanto el nacido en la casa como el comprado con plata[c] de cualquier hijo de extranjero[d] que no sea de su descendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “hijo de ocho días”.
    reason: lexical_alternative
  - marker: b
    text: O “deberá ser circuncidado”.
    reason: lexical_alternative
  - marker: c
    text: O “comprado con dinero”.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, “de todo hijo de extranjero que no es de tu simiente”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן שְׁמֹנַת יָמִים
  english_pob_choice: who is eight days old
  chosen_spanish: que tenga ocho días de nacido
  alternatives_spanish:
  - de ocho días de nacido
  - cuando tenga ocho días
  lexicon: HALOT
  rationale: La expresión hebrea es literal “hijo de ocho días”; en español, “que tenga ocho días de nacido” conserva el valor temporal sin sonar forzado. “De ocho días de nacido” también sería posible, pero la forma elegida fluye mejor en registro bíblico contemporáneo.
- source_word: יִמּוֹל
  english_pob_choice: shall be circumcised
  chosen_spanish: será circuncidado
  alternatives_spanish:
  - deberá ser circuncidado
  - se circuncidará
  lexicon: HALOT
  rationale: El verbo nifal aquí funciona como mandato pasivo. “Será circuncidado” mantiene el tono legal y formal del hebreo sin convertirlo en una paráfrasis normativa más fuerte de lo necesario.
- source_word: לָכֶם כָּל זָכָר
  english_pob_choice: every male among you
  chosen_spanish: todo varón entre ustedes
  alternatives_spanish:
  - cada varón de ustedes
  - todo macho entre ustedes
  lexicon: HALOT
  rationale: “Todo varón” comunica bien כָּל זָכָר en español. “Entre ustedes” representa de manera idiomática לָכֶם, indicando la comunidad del pacto a la que se dirige el mandato.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: a lo largo de sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La frase expresa continuidad generacional. “A lo largo de sus generaciones” conserva esa amplitud temporal en español natural y solemne.
- source_word: יְלִיד בָּיִת
  english_pob_choice: born in the house
  chosen_spanish: el nacido en la casa
  alternatives_spanish:
  - nacido en la casa
  - nacido en su casa
  lexicon: HALOT
  rationale: La traducción sigue de cerca la imagen hebrea y mantiene la relación doméstica o de casa/hogar sin añadir interpretaciones.
- source_word: וּמִקְנַת כֶּסֶף
  english_pob_choice: bought with silver
  chosen_spanish: el comprado con plata
  alternatives_spanish:
  - comprado con dinero
  - adquirido por plata
  lexicon: HALOT
  rationale: Se conserva el lenguaje concreto de כֶּסֶף como “plata”, que es el valor léxico más directo en el contexto antiguo. “Comprado con dinero” suaviza la imagen; “comprado con plata” mantiene la fuerza económica del hebreo.
- source_word: מִכֹּל בֶּן נֵכָר
  english_pob_choice: from any son of a foreigner
  chosen_spanish: de entre cualquier hijo de extranjero
  alternatives_spanish:
  - de cualquier hijo de extranjero
  - de entre cualquier extranjero
  lexicon: HALOT
  rationale: El hebreo dice literalmente “hijo de extranjero”; la elección preserva esa formulación y la relación de procedencia. “De entre” ayuda a que el español suene natural dentro de la lista inclusiva del versículo.
- source_word: אֲשֶׁר לֹא מִזַּרְעֲךָ הוּא
  english_pob_choice: who is not from your offspring
  chosen_spanish: que no sea de tu descendencia
  alternatives_spanish:
  - que no es de tu descendencia
  - que no procede de tu linaje
  lexicon: HALOT
  rationale: “Descendencia” transmite de modo claro זֶרַע sin introducir una traducción demasiado técnica. “Sea” mantiene la subordinación relativa natural en español y el valor identificador de la cláusula.
theological_decisions:
- issue: Alcance del mandato de circuncisión dentro del hogar pactal de Abraham
  english_pob_reading: The verse includes not only biological descendants but also males born in the household or purchased from foreigners.
  chosen_spanish_reading: El mandato abarca no solo a los descendientes biológicos, sino también al nacido en la casa y al comprado, aun si procede de un hijo de extranjero.
  alternative_spanish_readings:
  - Restringir el mandato principalmente a los descendientes físicos de Abraham
  - Entenderlo solo como una norma interna para la familia biológica
  rationale: El hebreo extiende explícitamente el mandato más allá de la semilla biológica de Abraham. La redacción española conserva ese alcance sin añadir conclusiones doctrinales posteriores que el texto no explicita.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto fuente y no importar conclusiones teológicas ajenas al pasaje.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se reordenó el inicio para reflejar mejor el hebreo, se precisó la edad con una relativa natural en inglés, y se volvió más literal בן נכר como “son of a foreigner”. La versión española sigue ese mismo ajuste: mantiene el orden hebreo relativo, expresa la edad con naturalidad y preserva la literalidad de “hijo de extranjero” sin perder legibilidad.'
  spanish_consistency_notes:
  - Se usa “Yahvé” cuando el tetragrámaton está en el texto; aquí no aparece.
  - Se mantiene “plata” para כֶּסֶף porque el pasaje habla de compra en un contexto antiguo y el español lo admite con claridad.
  - “Descendencia” se eligió como equivalente natural de זֶרַע, evitando el calco rígido “semilla” en el texto principal.
  - El tono legal se conserva con “será circuncidado” y “a lo largo de sus generaciones”.
