translation:
  language: es
  text: Abre tu boca por el mudo, por los derechos de todos los que están pereciendo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la causa de todos los desamparados», «de todos los que van pasando», o «de todos los hijos de la transitoriedad». La frase hebrea es difícil, especialmente el sustantivo raro חֲלוֹף.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח
  english_pob_choice: Open
  chosen_spanish: Abre
  alternatives_spanish:
  - Abre tu boca
  - Habla
  - Da voz
  lexicon: HALOT
  rationale: El imperativo hebreo pide una acción concreta. En español, «Abre» conserva la imagen de la boca y la fuerza exhortativa sin volverse mecánico.
- source_word: פִּיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca
  - tu boca para hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal del hebreo, evitando abstraerla en «voz» o «palabra».
- source_word: לְאִלֵּם
  english_pob_choice: for the mute
  chosen_spanish: por el mudo
  alternatives_spanish:
  - por el silencioso
  - por el que no puede hablar
  - por el speechless
  lexicon: HALOT
  rationale: אִלֵּם designa a quien no habla o es mudo. «Mudo» es la correspondencia más directa y natural en español.
- source_word: אֶל־דִּין
  english_pob_choice: for the rights
  chosen_spanish: por el derecho
  alternatives_spanish:
  - por la justicia
  - por la causa
  - por el caso legal
  lexicon: HALOT
  rationale: El sustantivo דִּין tiene fuerza forense/judicial. «Derecho» conserva la idea de reclamar o defender una causa en sentido legal, y funciona bien en español junto con el verbo de intercesión implícita.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: Se vierte con un universal natural en español, manteniendo el alcance colectivo del hebreo.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los que
  alternatives_spanish:
  - los hijos de
  - los hijos de transcurso
  - los hombres de
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y no requiere calco literal en español. Se absorbe en la frase relativa para evitar una expresión pesada o artificial.
- source_word: חֲלוֹף
  english_pob_choice: the passing away
  chosen_spanish: que pasan
  alternatives_spanish:
  - de transitoriedad
  - que perecen
  - del pasar
  lexicon: HALOT
  rationale: El sustantivo raro חֲלוֹף es difícil y apunta a la idea de pasar/transitoriedad. «Que pasan» mantiene visible esa raíz semántica sin forzar una precisión léxica no asegurada.
theological_decisions:
- issue: 'Alcance de la defensa: legal vs. general'
  english_pob_reading: for the rights of all who are passing away
  chosen_spanish_reading: por el derecho de todos los que pasan
  alternative_spanish_readings:
  - por la justicia de todos los que pasan
  - por la causa de todos los que pasan
  - por los derechos de todos los que pasan
  rationale: La lectura inglesa reciente enfatiza la defensa de derechos; el hebreo דִּין permite un matiz jurídico. En español, el singular «el derecho» suena más natural en esta construcción y conserva la idea de abogar por una causa vulnerable.
  doctrine_reference: Sabiduría bíblica sobre justicia y defensa del débil; cf. Prov. 31:8–9
- issue: Identidad de los destinatarios vulnerables
  english_pob_reading: the mute ... all who are passing away
  chosen_spanish_reading: el mudo ... todos los que pasan
  alternative_spanish_readings:
  - el mudo ... todos los que perecen
  - el mudo ... todos los transitorios
  - el mudo ... los necesitados
  rationale: No se debe ocultar la rareza de חֲלוֹף. «Los que pasan» conserva la imagen de transitoriedad y vulnerabilidad, sin convertir la frase en una paráfrasis más amplia de lo que el texto sostiene.
  doctrine_reference: Principio de interpretar la sabiduría hebrea con atención a su léxico difícil y a su fuerza poética
translation_notes:
  revision_awareness: La versión inglesa pasó de «for the cause of all the passing away» a «for the rights of all who are passing away» para precisar el matiz forense de אֶל־דִּין. La presente redacción española sigue esa revisión, optando por «por el derecho» como equivalente natural y juridicialmente sensible. También conserva la dificultad de חֲלוֹף mediante una expresión verbal («que pasan») en vez de resolverla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «mudo» para לְאִלֵּם por fidelidad léxica y claridad pública, con nota de alternativa.
  - Se evita «siervo» y otras relecturas; el verso es exhortación sapiencial a la defensa legal de vulnerables.
  - La construcción «por el derecho de todos los que pasan» conserva el tono de intercesión/abogacía sin sobre-explicar el trasfondo forense.
