review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y la revisión inglesa: agotamiento de la plata, disminución de los ingresos de la tierra, causa en la disensión y la calamidad, y daño ligado a quitar normas antiguas. Sin embargo, las notas al pie están intercambiadas respecto de los anclajes y no preservan correctamente las alternativas documentadas en la auditoría inglesa. Además, «tesoros» suena menos preciso que «tesorerías» o «arcas del tesoro» para θησαυρῶν en este contexto administrativo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere un ajuste menor para precisión administrativa y coherencia de notas. «La plata se había agotado de los tesoros» es entendible, aunque «en las tesorerías» suena más natural y contextual. «Los ordenamientos» es aceptable, pero «las ordenanzas» o «las normas establecidas» resultan más idiomáticos; aquí conviene mantener «ordenanzas» por cercanía a 'ordinances' sin rigidez excesiva.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales están alineadas con la POB inglesa, salvo que las notas deben reflejar las alternativas de κατεσκεύασεν ἐπὶ τὴν γῆν y τὰ νόμιμα, no una reinterpretación causal del primer miembro.
  issues:
  - severity: high
    issue: Las notas al pie están mal asignadas a los marcadores.
    rationale: El marcador [a] está anclado en «tesoros», pero la nota habla de una posible relación causal amplia entre la disensión/calamidad y el agotamiento; eso no corresponde a la nota inglesa ni al lugar del anclaje. El marcador [b] está anclado en «tierra», pero la nota inglesa b corresponde a τὰ νόμιμα, no a «había traído sobre la tierra».
  - severity: medium
    issue: «de los tesoros» es menos natural y menos preciso para τῶν θησαυρῶν en contexto fiscal.
    rationale: El griego plural se refiere a tesorerías o depósitos del tesoro. En español administrativo-bíblico, «tesorerías» comunica mejor el sentido que «tesoros», que puede sugerir objetos valiosos más que fondos públicos.
  - severity: medium
    issue: «los ordenamientos» es comprensible pero algo rígido y menos idiomático.
    rationale: Para τὰ νόμιμα, la auditoría inglesa favorece 'ordinances' con alternativas 'established laws' y 'ancestral customs'. «Ordenanzas» encaja mejor en español bíblico general y permite una nota con «leyes establecidas» o «costumbres ancestrales».
