    issue: '''supervisor'' para ἐπόπτης'
    rationale: Aunque puede reflejar vigilancia, en español actual suena burocrático o laboral, no elevado ni adecuado para la defensa divina del templo. 'Guardián' comunica mejor que Dios vela por el lugar sin colapsar totalmente con βοηθός.
  - severity: medium
    issue: '''ayudador'' para βοηθός'
    rationale: Es comprensible, pero resulta poco idiomático y tosco. 'Auxiliador' es más natural, digno y cercano al sentido de uno que presta ayuda.
  - severity: low
