base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/030.yaml
  text: And you[a], devastated one, what will you do? Though you dress in scarlet, though you adorn yourself with ornaments of gold, though you enlarge your eyes with paint, you beautify yourself in vain. Your lovers despise you[b]; they seek your life.
  footnotes:
  - marker: a
    text: Or 'plundered one' or 'destroyed one.' The Hebrew addresses a feminine singular figure, likely Jerusalem/Zion personified.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'though you tear your eyes with pukh.' 'Pukh' refers to dark eye cosmetic, often rendered 'kohl' or 'antimony.'
    reason: cultural_note
