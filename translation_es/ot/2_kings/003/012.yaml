translation:
  language: es
  text: 'Jehosafat dijo[a]: «La palabra de Yahvé está con él». Entonces el rey de Israel, Jehosafat y el rey de Edom bajaron a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él tiene una palabra de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: HALOT
  rationale: El wayyiqtol de אמר se traduce naturalmente con un pasado simple narrativo. «Dijo» reproduce la introducción de discurso directo sin añadir matices que el hebreo no exige.
- source_word: יֵשׁ אֹתוֹ
  english_pob_choice: is with him
  chosen_spanish: está con él
  alternatives_spanish:
  - lo tiene
  - él tiene
  - hay en él
  lexicon: HALOT
  rationale: La construcción existencial con אֹתוֹ comunica presencia/posesión de la palabra divina en relación con una persona. En español, «está con él» conserva esa idea relacional sin forzar la frase a una posesión más explícita de lo que el hebreo asegura.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «palabra» por ser la fórmula profética estable, y «Yahvé» por la directriz del proyecto para el Tetragrámaton. «Mensaje» sería posible, pero debilita el eco bíblico de דְּבַר יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, conservando la distinción frente a títulos como «Señor».
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron
  - se dirigieron
  lexicon: HALOT
  rationale: El verbo ירד tiene sentido literal de descenso. «Descendieron» conserva mejor esa dirección que un simple «fueron», aunque «bajaron» también sería posible en español corriente.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: hasta él
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: HALOT
  rationale: Como el movimiento ya quedó expresado en «descendieron», «hasta él» comunica la llegada al destinatario con fluidez en español y evita redundancia.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: Se conserva el título formal de manera directa y transparente.
- source_word: וִיהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Jehosafat
  alternatives_spanish:
  - Josafat
  lexicon: HALOT
  rationale: Se emplea la forma española tradicional y reconocible del nombre propio, ajustada a la ortografía del español bíblico moderno.
- source_word: וּמֶלֶךְ אֱדוֹם
  english_pob_choice: and the king of Edom
  chosen_spanish: y el rey de Edom
  alternatives_spanish:
  - y el monarca de Edom
  lexicon: HALOT
  rationale: Se preserva la coordinación hebrea con un título equivalente y claro en español.
theological_decisions:
- issue: La frase profética דְּבַר יְהוָה aplicada a Elisha/Eliseo
  english_pob_reading: The word of Yahweh is with him, indicating genuine revelation from Yahweh is available through him.
  chosen_spanish_reading: La palabra de Yahvé está con él, indicando que la revelación verdadera de Yahvé se halla disponible por medio de él.
  alternative_spanish_readings:
  - Él tiene una palabra de Yahvé
  - La palabra de Yahvé le pertenece
  rationale: El hebreo permite tanto una lectura de posesión como de presencia. La redacción española mantiene esa tensión sin cerrarla del todo, y deja claro que se trata de revelación profética auténtica procedente de Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto hebreo y el audit trail inglés; no se detectaron revisiones posteriores que alteren la elección lexical o teológica. Se conservó la tensión entre presencia y posesión implícita en יֵשׁ אֹתוֹ דְבַר יְהוָה mediante una nota alternativa breve.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme a las directrices del proyecto.
  - Se mantuvo «Jehosafat» como forma española tradicional del nombre propio.
  - «Descendieron hasta él» preserva el movimiento del verbo hebreo y la dirección del contacto final.
  - La nota textual alternativa se ancla en la frase completa para reflejar la ambigüedad legítima del hebreo sin duplicar sentidos en el cuerpo principal.
