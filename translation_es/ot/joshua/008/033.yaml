review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: la asamblea completa de Israel, sus autoridades, la ubicación a ambos lados del arca, la inclusión del forastero residente y del nativo, la división frente a Gerizim y Ebal, y la referencia al mandato previo de Moisés. Sin embargo, hay dos desajustes menores pero significativos con el rastro auditado: (1) el inglés POB decidió mantener el participio con valor más directo (''carrying''), y en español su equivalente más fiel y fluido aquí es ''llevando'' en vez de la relativa ''que llevaban''; (2) el inglés POB conservó una nota sobre בָּרִאשֹׁנָה (''at the first''), pero el borrador español no la trasladó, a pesar de que ''al principio'' también deja una ambigüedad que conviene documentar.'
  spanish_quality_summary: 'El español es claro, digno y generalmente natural. ''Todo Israel'', ''frente a'', ''siervo de Yahvé'' y la disposición espacial funcionan bien. ''Forastero residente'' es defendible y conserva la categoría social. La frase completa lee bien en español eclesial moderno. La mejora principal es estilística-funcional: ''llevando el arca...'' suena más directo y sigue mejor el participio hebreo. También conviene conservar la nota explicativa sobre ''al principio''.'
  glossary_alignment: 'El borrador cumple bien con la terminología del proyecto: יְהוָה como ''Yahvé'', עֶבֶד en el honorífico de Moisés como ''siervo'', y la inclusión de גֵּר/אֶזְרָח sin aplanarla. No hay conflicto doctrinal serio. ''Arca del pacto'' es aceptable en español para אֲרוֹן בְּרִית, aunque ''arca del pacto'' y ''arca del pacto de Yahvé'' deben mantenerse coherentes dentro del verso; el borrador ya lo hace.'
  issues:
  - severity: medium
    issue: El participio נֹשְׂאֵי se verte como relativa finita ('que llevaban') en vez de una forma participial más directa.
    rationale: No es una infidelidad grave, pero el rastro inglés revisado favorece una construcción más inmediata ('carrying'). En español, 'llevando' preserva mejor la identificación descriptiva de los sacerdotes y fluye naturalmente.
  - severity: medium
    issue: Falta la nota sobre בָּרִאשֹׁנָה ('al principio').
    rationale: El inglés POB preserva la ambigüedad con nota, y el español también debería hacerlo. 'Al principio' puede significar 'como primer acto' o remitir al mandato previo de Moisés; sin nota, se pierde parte de la justificación lexical documentada.
  revised_spanish_text: Y todo Israel[a], con sus ancianos, oficiales y jueces, estaba de este lado y de aquel lado del arca, frente a los sacerdotes levitas llevando el arca del pacto de Yahvé, tanto el forastero residente[b] como el nativo por igual. La mitad de ellos estaba delante del monte Gerizim y la otra mitad delante del monte Ebal, tal como Moisés, siervo de Yahvé, había mandado al principio[c], para bendecir al pueblo de Israel.
  revised_footnotes:
