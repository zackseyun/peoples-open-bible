translation:
  language: es
  text: Cuando los cinco gobernantes[a] de los filisteos lo vieron, regresaron a Ecrón ese mismo día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El título filisteo también suele traducirse «señores».
    reason: lexical_alternative
  - marker: b
    text: 'O: «en aquel día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲמִשָּׁה
  english_pob_choice: the five
  chosen_spanish: los cinco
  alternatives_spanish:
  - cinco
  lexicon: HALOT
  rationale: El numeral cardinal funciona como modificador definido por el contexto narrativo; en español, 'los cinco' suena natural y conserva la referencia a los cinco gobernantes ya conocidos en la escena.
- source_word: סַרְנֵי
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - señores
  - príncipes
  - jefes
  lexicon: HALOT
  rationale: El título filisteo designa autoridad política. 'Gobernantes' comunica bien esa función en español actual, sin perder la fuerza oficial del término ni forzar un registro arcaico como 'señores'.
- source_word: פְלִשְׁתִּים
  english_pob_choice: of the Philistines
  chosen_spanish: de los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Se conserva el genitivo de pertenencia del hebreo con una construcción normal en español.
- source_word: רָאוּ
  english_pob_choice: saw it
  chosen_spanish: vieron aquello
  alternatives_spanish:
  - vieron eso
  - vieron
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'vieron'; en español conviene explicitar el referente implícito con un demostrativo neutro. 'Aquello' evita añadir un objeto demasiado específico que no está expresado en el versículo.
- source_word: וַ/יָּשֻׁבוּ
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: Verbo de movimiento narrativo. 'Regresaron' es claro, natural y fiel al avance secuencial del relato.
- source_word: עֶקְרוֹן
  english_pob_choice: to Ekron
  chosen_spanish: a Ecrón
  alternatives_spanish:
  - a Ekron
  lexicon: HALOT
  rationale: Se adopta la forma tradicional española 'Ecrón' para el topónimo, ampliamente reconocible en contexto bíblico y más natural en español que la transliteración inglesa.
- source_word: בַּ/יּוֹם הַ/הוּא
  english_pob_choice: that same day
  chosen_spanish: ese mismo día
  alternatives_spanish:
  - aquel mismo día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión intensifica la inmediatez temporal. 'Ese mismo día' reproduce bien la fuerza narrativa y es idiomática en español.
translation_notes:
  revision_awareness: El control cruzado del paquete fuente y del audit trail en inglés muestra alta concordancia; no hay revisiones aplicadas en la versión inglesa más reciente. La redacción española sigue esa lectura sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - Se evita 'SEÑOR' o equivalentes porque este versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - '''Filisteos'' y ''Ecrón'' siguen la forma española estándar en contexto bíblico.'
