id: ISA.23.13
reference: Isaiah 23:13
source:
  edition: WLC
  text: הֵ֣ן אֶ֣רֶץ כַּשְׂדִּ֗ים זֶ֤ה הָ/עָם֙ לֹ֣א הָיָ֔ה אַשּׁ֖וּר יְסָדָ֣/הּ לְ/צִיִּ֑ים הֵקִ֣ימוּ בחיני/ו עֹרְרוּ֙ אַרְמְנוֹתֶ֔י/הָ שָׂמָ֖/הּ לְ/מַפֵּלָֽה׀׃
translation:
  text: Look at the land of the Chaldeans—this is the people that was not[a]; Assyria appointed it for desert creatures. They set up their siege towers, they stripped her palaces bare[d][c][b], they made her a ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this people did not exist,' or 'this people was of no account.' The Hebrew clause is terse and difficult.
    reason: alternative_reading
  - marker: b
    text: Or, 'Asshur founded her for desert dwellers.' The phrase may refer either to wild desert creatures or to inhabitants of the desert.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term behind 'siege towers' is uncertain; some render it 'watchtowers' or 'fortresses.'
    reason: textual_variant
  - marker: d
    text: Or, 'laid bare her palaces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look at
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing attention. 'Look at' is readable modern English while preserving the force of drawing attention.
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: the land of the Chaldeans
  alternatives:
  - the land of Chaldea
  - the country of the Chaldeans
  lexicon: HALOT
  rationale: Construct phrase literally denotes the land belonging to/associated with the Chaldeans. 'Land of the Chaldeans' stays close to the Hebrew and preserves the ethnogeographic sense.
- source_word: זֶה הָעָם לֹא הָיָה
  chosen: this is the people that was not
  alternatives:
  - this is the people that did not exist
  - this people was of no account
  - this people was not
  lexicon: HALOT
  rationale: The clause is notoriously difficult. A relatively formal rendering preserves the abruptness and ambiguity of the Hebrew rather than over-resolving it. Singular 'people' with singular verb reflects the collective noun.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: Standard English name for the nation/power is preferable in context; this is a geopolitical reference, not a personal name in narrative.
- source_word: יְסָדָהּ
  chosen: founded it
  alternatives:
  - established her
  - appointed it
  lexicon: HALOT
  rationale: From יסד, 'to found/establish.' The 3fs suffix refers back to the land/city entity. 'Founded it' is idiomatic in English for a city/land.
- source_word: לְצִיִּים
  chosen: for desert creatures
  alternatives:
  - for desert dwellers
  - for wild beasts of the desert
  - for nomads
  lexicon: HALOT
  rationale: The noun commonly denotes desert animals/creatures, though some take it as desert-dwellers. 'Desert creatures' best fits the desolation imagery and avoids forcing a human referent.
- source_word: הֵקִימוּ בחיניו
  chosen: They set up their siege towers
  alternatives:
  - They raised its watchtowers
  - They erected his towers
  - They set up their forts
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is difficult; the consonantal form is commonly understood in context as siege structures/towers. Given the military-destruction sequence, 'siege towers' best fits the sense.
- source_word: עֹרְרוּ אַרְמְנוֹתֶיהָ
  chosen: they stripped her palaces bare
  alternatives:
  - they laid bare her palaces
  - they demolished her palaces
  - they roused her palaces
  lexicon: HALOT
  rationale: The verb in this context is best taken in the sense of laying bare/stripping down rather than its more basic 'stir up.' This yields a coherent parallel with siege and ruin.
- source_word: שָׂמָהּ לְמַפֵּלָה
  chosen: they made her a ruin
  alternatives:
  - he made it a ruin
  - they made her into a collapse
  - he set her for destruction
  lexicon: HALOT
  rationale: The phrase denotes turning something into a ruin/fallen heap. Plural subject is carried through from the preceding verbs for coherence, though the Hebrew form itself can be read with singular subject; English favors the smoother continuation.
