base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/004/004.yaml
  text: Now Jonathan son of Saul had a son crippled in his feet. He was five years old when the news about Saul and Jonathan came from Jezreel[a], and his nurse picked him up and fled. And as she hurried to flee, he fell and became lame. His name was Mephibosheth.
  footnotes:
