translation:
  language: es
  text: 'Entonces Isaías hijo de Amoz envió a Ezequías[a], diciendo: «Así dice Yahvé[b], el Dios de Israel: Porque me has dirigido tu oración acerca de Senaquerib, rey de Asiria,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «En cuanto a lo que me has pedido en oración acerca de Senaquerib, rey de Asiria—». La cláusula hebrea es elíptica y continúa en la declaración siguiente.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: el nombre divino YHWH, representado tradicionalmente en muchas versiones como «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió un mensaje
  lexicon: HALOT
  rationale: El verbo hebreo expresa simplemente el envío; en español, «envió» conserva esa sencillez y permite entender el objeto implícito sin añadir más de lo que el texto dice.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  english_pob_choice: Isaiah son of Amoz
  chosen_spanish: Isaías hijo de Amoz
  alternatives_spanish:
  - Isaías, hijo de Amoz
  - Isaías el hijo de Amoz
  lexicon: HALOT
  rationale: El patronímico se conserva de forma natural en español con «hijo de Amoz», manteniendo la identificación del profeta sin sobrecargar la frase.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria del discurso se vierte de manera directa con «diciendo», que reproduce la función del hebreo sin añadir contenido narrativo extra.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa en presente, como en el inglés auditado, porque conserva mejor la fuerza oracular y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención editorial de la POB para el nombre divino y se adapta al uso español como «Yahvé», transliteración reconocible y coherente con el rechazo de la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelit
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma transparente y reverente con «el Dios de Israel», preservando el vínculo de pacto y la designación teológica del texto.
- source_word: אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - puesto que
  - el cual
  lexicon: HALOT
  rationale: Aunque el hebreo es elíptico, aquí la relación causal que introduce la respuesta divina se entiende mejor en español con «Porque», siguiendo la lectura contextual documentada por la POB inglesa y la versión paralela de 2 Reyes 19:20.
- source_word: הִתְפַּלַּלְתָּ אֵלַי
  english_pob_choice: you have prayed to me
  chosen_spanish: has orado a mí
  alternatives_spanish:
  - has orado a mí
  - has orado delante de mí
  - has orado conmigo
  lexicon: HALOT
  rationale: Se conserva el sentido de plegaria dirigida a Dios con el verbo «orar». La preposición hebrea exige en español una construcción más natural, por lo que se usa «a mí» para reflejar el destino de la oración sin perder claridad.
- source_word: אֶל סַנְחֵרִיב
  english_pob_choice: concerning Sennacherib
  chosen_spanish: acerca de Senaquerib
  alternatives_spanish:
  - sobre Senaquerib
  - respecto de Senaquerib
  - contra Senaquerib
  lexicon: HALOT
  rationale: La preposición puede marcar el asunto de la oración; «acerca de» reproduce bien ese valor discursivo sin intensificar indebidamente el matiz a «contra».
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa se vierte con la forma usual en español bíblico, manteniendo la referencia histórica y el orden natural de los complementos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto en lugar de sustituirlo por un título. «Yahvé» es la forma española estable y auditable que corresponde a la decisión doctrinal de la POB de no ocultar el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cláusula elíptica tras «el Dios de Israel»
  english_pob_reading: Because you have prayed to me concerning Sennacherib king of Assyria,
  chosen_spanish_reading: Porque has orado a mí acerca de Senaquerib, rey de Asiria,»
  alternative_spanish_readings:
  - Lo que has orado a mí acerca de Senaquerib, rey de Asiria—
  - En cuanto a lo que has orado a mí acerca de Senaquerib, rey de Asiria,
  rationale: El hebreo queda abreviado y continúa en el versículo siguiente; en español, la causal «Porque» da una oración completa y legible sin perder la dependencia sintáctica del contexto inmediato.
  doctrine_reference: 'Parallel account: 2 Kings 19:20; Hebrew elliptical clause continuing into the next verse'
translation_notes:
  revision_awareness: La revisión más reciente del testimonio inglés no introdujo cambios; el presente borrador sigue la lectura estable y de alta concordancia, manteniendo la clausula elíptica y el nombre divino conforme al criterio editorial ya auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con la terminología principal del proyecto.
  - Se conserva el nombre propio «Senaquerib» con la ortografía española estándar.
  - La puntuación refleja que la frase queda abierta y continúa en el versículo siguiente, como en el inglés auditado.
  - Se usa «orar» y no «interceder» porque el contexto es una oración dirigida a Dios, no una intercesión técnica.
