translation:
  language: es
  text: Gran fatiga ha sido asignada[a], y una carga pesada[b] está sobre los hijos de Adán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ha sido asignada» refleja el sentido del hebreo חלק אל como una porción o suerte adjudicada. El griego paralelo dice literalmente «ha sido creada para todo ser humano», pero la versión española sigue la formulación más sobria del hebreo y deja abierta la fuente de esa asignación.
    reason: lexical_alternative
  - marker: b
    text: El griego paralelo dice literalmente «un yugo pesado» (ζυγὸς βαρύς). El hebreo aquí es más breve; por eso se traduce en el texto principal como «carga pesada», preservando el sentido sin imponer la metáfora exacta del paralelo griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: עסק גדול
  english_pob_choice: Great toil
  chosen_spanish: Gran fatiga
  alternatives_spanish:
  - gran trabajo
  - gran afán
  - gran cansancio
  lexicon: HALOT
  rationale: La expresión hebrea apunta a una ocupación o labor gravosa. «Fatiga» comunica bien en español el desgaste y la carga de la labor, sin sonar mecánica ni demasiado moderna. Mantiene el peso semántico de «toil» y se adapta al paralelo griego ἀσχολία μεγάλη.
- source_word: חלק אל
  english_pob_choice: is allotted
  chosen_spanish: ha sido asignada
  alternatives_spanish:
  - es asignada
  - ha sido repartida
  - ha sido dispuesta
  lexicon: HALOT
  rationale: El hebreo es comprimido y admite la idea de una porción o asignación. «Ha sido asignada» conserva la noción de lote/porción conferida sin introducir explícitamente un sujeto divino que el hebreo aquí no formula de manera desarrollada. En español suena natural y refleja el carácter general de la sentencia.
- source_word: ועל כבד
  english_pob_choice: and a heavy burden
  chosen_spanish: y un yugo pesado
  alternatives_spanish:
  - y una carga pesada
  - y un peso pesado
  - y una dura carga
  lexicon: HALOT; Greek parallel ζυγὸς βαρύς
  rationale: El paralelo griego aclara la imagen con «yugo pesado». En español, «yugo pesado» preserva la metáfora concreta mejor que una abstracción como «carga», y respeta la fuerza imagística del texto. Se mantiene la tensión entre el hebreo abreviado y el griego más explícito.
- source_word: על בני אדם
  english_pob_choice: upon the children of man
  chosen_spanish: sobre los hijos de Adán
  alternatives_spanish:
  - sobre los hijos del hombre
  - sobre la humanidad
  - sobre los seres humanos
  lexicon: HALOT; Greek υἱοὺς Ἀδάμ
  rationale: Se conserva el eco adámico del hebreo y del griego. «Hijos de Adán» es más fiel al color del original que una neutralización abstracta como «humanidad», y mantiene la fórmula antropológica tradicional de la fuente.
theological_decisions:
- issue: Relación entre el hebreo breve y el paralelo griego más amplio
  english_pob_reading: The Hebrew witness here is shorter; the Greek parallel expands the verse, but the revision removed the birth-to-burial expansion from the main line.
  chosen_spanish_reading: Traducir solo la afirmación central del hebreo, dejando fuera la expansión griega sobre nacimiento y sepultura porque el último estado del texto auditado la retiró de la línea principal.
  alternative_spanish_readings:
  - Incluir la expansión griega sobre salir del vientre materno y volver a la madre de todos
  - Traducir únicamente el hebreo sin referencia al griego
  rationale: El paquete de revisión indica que la frase ampliada no permanece en la línea principal final. Por fidelidad al estado textual auditado, la traducción española sigue el núcleo hebreo conservado. Esto evita sobrecargar el verso con material que el flujo revisionado ya descartó de la redacción final.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives, with Greek parallel used alongside it'
- issue: Expresión antropológica «hijos de Adán»
  english_pob_reading: children of man
  chosen_spanish_reading: hijos de Adán
  alternative_spanish_readings:
  - hijos del hombre
  - humanidad
  - seres humanos
  rationale: La forma conserva el rasgo representativo y adámico del hebreo y del griego, en lugar de convertirlo en un abstracto impersonal. En español, «hijos de Adán» sigue siendo comprensible y mantiene la resonancia bíblica del nombre propio.
  doctrine_reference: DOCTRINE.md §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'La redacción final del audit trail revisado elimina la expansión sobre el nacimiento y la sepultura que estaba presente en un estado anterior basado en el paralelo griego. Por eso la línea española se limita al núcleo afirmativo del hebreo: la fatiga asignada y el yugo pesado sobre los hijos de Adán.'
  spanish_consistency_notes:
  - Se usa «Adán» para mantener la resonancia antropológica del original, no como sustitución doctrinal por «humanidad».
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton ni una cita directa del nombre divino; el hebreo presenta una construcción nominal de asignación.
  - «Fatiga» se eligió por su naturalidad en español y por conservar el matiz de labor gravosa sin volver la frase demasiado arcaica.
