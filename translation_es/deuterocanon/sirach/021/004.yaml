review_pass:
  verdict: revise
  source_alignment_summary: 'La imagen y la estructura proverbial están bien captadas en general: ὡς → «como», ῥομφαία δίστομος → «espada de dos filos», y οὐκ ἔστιν ἴασις → «no hay curación» son fieles. Sin embargo, el punto clave πᾶσα ἀνομία no queda bien preservado con «toda injusticia». El griego y el rastro inglés enfatizan «lawlessness», es decir, transgresión de la ley/orden, no principalmente injusticia en el sentido de trato injusto. Además, «para su herida» suena menos natural en español que una formulación más idiomática.'
  spanish_quality_summary: El borrador es legible y digno, pero «toda injusticia» desplaza el sentido semántico central y la nota intenta compensar una elección principal menos fiel. «Para su herida» es comprensible, aunque en español bíblico natural suena mejor «para la herida que causa» o «su herida no tiene curación». El resto del verso fluye bien.
  glossary_alignment: No hay conflicto con los términos globales principales del proyecto, pero sí con la decisión auditada para ἀνομία. Dado que el inglés POB documenta expresamente «lawlessness», el español debería reflejar ese eje con «ilegalidad» no suena bíblico, «anomia» es opaco, y «iniquidad» o una expansión como «desprecio de la ley»/«violación de la ley» son mejores opciones. Para mantener legibilidad y fuerza proverbial, «iniquidad» funciona mejor aquí que «injusticia».
  issues:
  - severity: high
    issue: «Toda injusticia» no refleja adecuadamente πᾶσα ἀνομία
    rationale: ἀνομία denota falta de ley, transgresión, iniquidad o rebeldía contra el orden/ley. «Injusticia» en español suele centrarse en inequidad o trato injusto, cambiando el campo semántico principal y debilitando la decisión léxica documentada por el POB.
  - severity: medium
    issue: La nota al pie intenta justificar una traducción principal menos fiel
    rationale: La nota reconoce el sentido de violación legal/moral, pero ese sentido debería estar en el texto principal, no solo en la explicación marginal.
  - severity: low
    issue: «Para su herida» es algo poco idiomático
    rationale: Aunque posible, no suena tan natural en español como «para la herida que causa» o «su herida no tiene curación», ambas más claras y fluidas.
  revised_spanish_text: Toda iniquidad es como una espada de dos filos; para la herida que causa no hay curación.
  revision_rationale: Se reemplaza «injusticia» por «iniquidad» para conservar mejor el valor de ἀνομία como transgresión de la ley/orden moral, en línea con la decisión auditada «lawlessness». Aunque «iniquidad» tiene un registro algo más tradicional, sigue siendo inteligible y más preciso que «injusticia» en este proverbio. También se ajusta «para su herida» a «para la herida que causa» para lograr español más natural sin perder el sentido de τῇ πληγῇ αὐτῆς.
