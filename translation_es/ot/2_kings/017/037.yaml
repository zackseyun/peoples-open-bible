translation:
  language: es
  text: Y los estatutos y los juicios y la ley y el mandamiento que él escribió para ustedes[a], tendrán cuidado de poner por obra[b] todos los días, y no temerán[c] a otros dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los decretos, los juicios, la instrucción y el mandamiento». El hebreo usa un grupo de términos de ley del pacto con matices legales parcialmente superpuestos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estarán atentos a hacer». El hebreo combina guardar/observar con hacer, de modo que una sola expresión en español no agota del todo la fuerza del original.'
    reason: lexical_alternative
  - marker: c
    text: «Temer» aquí tiene el sentido de lealtad reverente o temor de culto hacia deidades.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  lexicon: HALOT
  rationale: חֻקִּים designa disposiciones o prescripciones establecidas. «Estatutos» conserva el registro jurídico y mantiene la distinción frente a los demás términos de la lista.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las normas
  - las ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones o determinaciones jurídicas. «Juicios» preserva ese campo semántico y evita fundirlo con «estatutos» o con un genérico «leyes».
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  lexicon: HALOT
  rationale: En esta serie legal-covenantal, תּוֹרָה funciona con fuerza normativa. «La ley» es la forma más clara y reconocible en español para este contexto, sin perder el peso de obligación pactal.
- source_word: הַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  lexicon: HALOT
  rationale: El singular hebreo exige un singular en español. «Mandamiento» conserva el tono solemne y jurídico del listado y refleja mejor la forma tradicional de un precepto individual.
- source_word: אֲשֶׁר כָּתַב לָכֶם
  english_pob_choice: that he wrote for you
  chosen_spanish: que él escribió para ustedes
  alternatives_spanish:
  - que escribió para ustedes
  - que el escribió para ustedes
  lexicon: HALOT
  rationale: Se mantiene el sujeto tácito del verbo hebreo con «él», sin explicitar «Yahvé» en el texto principal. «Para ustedes» expresa el dativo plural sin introducir un posesivo no presente.
- source_word: תִּשְׁמְרוּן לַעֲשׂוֹת
  english_pob_choice: you shall be careful to do
  chosen_spanish: cuidarán de hacer
  alternatives_spanish:
  - tendrán cuidado de hacer
  - guardarán para hacer
  lexicon: HALOT
  rationale: La combinación hebrea une observar/guardar con hacer. «Cuidarán de hacer» intenta reproducir esa doble idea de atención obediente y práctica efectiva sin caer en una calca excesiva.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - a lo largo de todos sus días
  lexicon: HALOT
  rationale: La expresión conserva la duración continua. Se añadió «sus» para que el español fluya con naturalidad, aunque el hebreo dice literalmente «todos los días».
- source_word: תִירְאוּ
  english_pob_choice: fear
  chosen_spanish: temerán
  alternatives_spanish:
  - reverenciarán
  - adorarán
  lexicon: HALOT
  rationale: יָרֵא conserva aquí el sentido de temor reverente y lealtad religiosa ante deidades. «Temerán» mantiene la fuerza del verbo y la advertencia contra la devoción a otros dioses.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extranjeros
  lexicon: HALOT
  rationale: La expresión hebrea es la fórmula estándar para deidades distintas de Yahvé. «Otros dioses» es la versión más directa y transparente en español.
theological_decisions:
- issue: Conservar la serie legal-covenantal sin colapsarla
  english_pob_reading: 'Preserve four separate terms: statutes, judgments, law, commandment'
  chosen_spanish_reading: 'Conservar cuatro términos distintos: estatutos, juicios, ley y mandamiento'
  alternative_spanish_readings:
  - reducir la serie a «leyes y mandatos»
  - agruparla como una sola fórmula legal
  rationale: El hebreo acumula términos con matices jurídicos relacionados pero no idénticos. Mantener la serie completa respeta el énfasis pactal y evita borrar una tensión lexical real.
  doctrine_reference: Translation philosophy §5 (Consistencia de términos clave, o excepción documentada)
- issue: Referencia del sujeto en «que él escribió para ustedes»
  english_pob_reading: Retain the generic pronoun 'he' rather than substituting 'the LORD' in the main text
  chosen_spanish_reading: Mantener «él» en el texto principal, sin añadir «Yahvé»
  alternative_spanish_readings:
  - que Yahvé escribió para ustedes
  - que el Señor escribió para ustedes
  rationale: Aunque el contexto identifica al sujeto con Yahvé, el hebreo usa una forma verbal con sujeto implícito. Conservar «él» evita introducir un nombre no expresado en el versículo y mantiene la cercanía al original.
  doctrine_reference: Translation philosophy §1 (Primacía del original sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail al preferir una forma natural y precisa para la obligación: «cuidarán de hacer» frente a una calca como «guardarán para hacer», y conserva la duración de la cláusula con «todos sus días». También se mantiene el pronombre explícito del sujeto implícito y la prohibición final con «otros dioses».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el antecedente, pero no se añadió al texto principal para respetar el sujeto verbal hebreo.
  - Se eligió «ley» para תּוֹרָה en este contexto jurídico, no «instrucción», por la acumulación de términos legales en la misma cláusula.
  - «Temerán» conserva la ambigüedad reverencial/ cultual de יָרֵא sin suavizarla a «respetarán».
  - El texto usa «ustedes» y «sus» para un español natural y congruente con el plural verbal hebreo.
