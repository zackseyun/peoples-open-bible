translation:
  language: es
  text: 'Porque dijo[a]: «Ciertamente, ellos son mi pueblo, hijos que no actuarán falsamente»; así llegó a ser su Salvador.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos que no mentirán» / «hijos que no resultarán falsos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: For he said
  chosen_spanish: Porque dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El hebreo introduce una explicación narrativa; en español, «Porque dijo» conserva la conexión causal/explanatoria que la POB inglesa expresa con «For», sin perder la transición del discurso.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De veras
  - Solo
  - Verdaderamente
  lexicon: HALOT
  rationale: אַךְ aquí marca afirmación enfática, no restricción. «Ciertamente» transmite bien esa fuerza evaluativa en español sin volverla demasiado coloquial.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: La expresión pactal se rinde de forma directa con «mi pueblo», manteniendo el valor colectivo y relacional del hebreo.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: ellos son
  alternatives_spanish:
  - son ellos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «ellos son» reproduce ese relieve de manera natural dentro de la cita.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: HALOT
  rationale: Aunque el sustantivo es masculino plural, en este contexto filial y pactal el español «hijos» comunica la relación con Dios con más precisión y sin imponer un sentido exclusivamente masculino biológico; además preserva el eco del parentesco que el hebreo tiene aquí.
- source_word: לֹא יְשַׁקֵּרוּ
  english_pob_choice: will not deal falsely
  chosen_spanish: no actuarán falsamente
  alternatives_spanish:
  - no mentirán
  - no se mostrarán falsos
  - no engañarán
  lexicon: HALOT
  rationale: El piel de שׁקר puede abarcar conducta falsa o engañosa, no solo la emisión de palabras falsas. «Actuarán falsamente» conserva esa amplitud ética mejor que limitarlo a «mentirán».
- source_word: וַיְהִי לָהֶם
  english_pob_choice: so he became their
  chosen_spanish: y se hizo para ellos
  alternatives_spanish:
  - y fue para ellos
  - y llegó a ser para ellos
  lexicon: HALOT
  rationale: La cláusula expresa el resultado de la relación descrita; «se hizo para ellos» mantiene el movimiento del hebreo y funciona bien en español antes del complemento final.
- source_word: לְמוֹשִׁיעַ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - quien los salva
  lexicon: HALOT
  rationale: El participio nominal de ישׁע designa al que salva. «Salvador» es el equivalente natural y teológicamente denso en español, manteniendo la fuerza titular del hebreo.
theological_decisions:
- issue: Título divino en לְמוֹשִׁיעַ
  english_pob_reading: Savior
  chosen_spanish_reading: Salvador
  alternative_spanish_readings:
  - libertador
  rationale: El versículo presenta a Dios actuando como el que salva a su pueblo. «Salvador» conserva esa fuerza sin añadir formulaciones doctrinales ajenas al pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Valor semántico de בָּנִים en relación con el pueblo de Dios
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - niños
  - hijos e hijas
  rationale: En este contexto, el plural masculino funciona representativamente. «Hijos» preserva la imagen filial del hebreo y su lectura pactal, sin forzar una neutralización que el texto no requiere.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión española sigue de cerca la decisión inglesa revisada como estable y de alta concordancia, sin cambios de sentido; se conserva la apertura causal, la afirmación enfática de אַךְ, la amplitud ética de שׁקר y el título soteriológico final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el texto usa un pronombre implícito y no requiere ajuste.
  - «Salvador» se usa como término titular y no como glosa explicativa.
  - El marcador de nota al pie [a] se ancla en «falsamente» para ofrecer una alternativa léxica pertinente sin alterar el flujo del versículo.
