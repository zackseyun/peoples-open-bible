review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: insuficiencia de los recursos del Líbano para combustible sacrificial y de sus animales para una ofrenda quemada. Conserva correctamente la metonimia de ''Líbano'' y la singularidad colectiva de עוֹלָה. Sin embargo, ''para quemar'' queda demasiado elíptico en español y suena como si faltara el objeto; el sentido contextual es ''para alimentar/encender el fuego'' o ''como leña para el fuego''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero ''El Líbano no basta para quemar'' resulta poco natural y ambiguo en español bíblico moderno. La nota [b] también necesita una leve corrección de estilo: no debe llevar comilla inicial sobrante antes de ''O:''. ''Holocausto'' es aceptable y preciso aquí como término sacrificial tradicional.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'El Líbano' es adecuado para וּלְבָנוֹן. 'Sus animales' representa bien וְחַיָּתוֹ. 'Holocausto' es una buena opción para עוֹלָה en este contexto técnico sacrificial. No aparecen términos sensibles del glosario principal que requieran ajuste.
  issues:
  - severity: medium
    issue: La frase 'no basta para quemar' es poco idiomática y deja implícito un objeto esencial.
    rationale: בָּעֵר alude al combustible para el fuego sacrificial; en español, 'quemar' sin complemento suena incompleto. Una formulación como 'no basta para alimentar el fuego' expresa mejor el sentido sin expandir indebidamente el texto.
  - severity: low
    issue: La nota [b] tiene puntuación/comillas defectuosas.
    rationale: 'Empieza con una comilla simple innecesaria: ''O: «sus bestias»...''. Debe normalizarse para legibilidad y pulcritud editorial.'
  revised_spanish_text: El Líbano no basta para alimentar el fuego[a], ni sus animales para un holocausto[b].
