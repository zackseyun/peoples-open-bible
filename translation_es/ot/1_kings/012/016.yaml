translation:
  language: es
  text: 'Cuando todo Israel vio que el rey no les había escuchado, el pueblo respondió al rey, diciendo: «¿Qué parte tenemos en David? No tenemos herencia en el hijo de Isaí. ¡A tus tiendas, oh Israel![a] Ahora, atiende a tu casa, David.[b]» Y Israel se fue a sus tiendas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «¡A tus casas, Israel!». El hebreo dice literalmente «a tus tiendas», un modismo para dispersarse y retirar la lealtad.'
    reason: lexical_alternative
  - marker: b
    text: '«Casa» también puede entenderse aquí como «dinastía»: «Ahora atiende a tu propia dinastía, David».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: HALOT
  rationale: ראה conserva el sentido básico de ver; en este contexto incluye reconocer la negativa del rey. «Vio» mantiene el giro hebreo sin volverlo artificial en español.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  lexicon: HALOT
  rationale: La expresión colectiva se refiere al cuerpo nacional. «Todo Israel» preserva el sujeto colectivo bíblico y su tono narrativo.
- source_word: לֹא שָׁמַע ... אֲלֵיהֶם
  english_pob_choice: had not listened to them
  chosen_spanish: no les había escuchado
  alternatives_spanish:
  - no les había hecho caso
  - no les había oído
  lexicon: HALOT
  rationale: שׁמע con אֶל significa aquí oír con atención / hacer caso. «Había escuchado» en pasado pluscuamperfecto refleja la negativa previa a su petición.
- source_word: וַיָּשִׁבוּ הָעָם אֶת־הַמֶּלֶךְ דָּבָר
  english_pob_choice: the people answered the king
  chosen_spanish: el pueblo respondió al rey
  alternatives_spanish:
  - el pueblo devolvió palabra al rey
  - el pueblo contestó al rey
  lexicon: HALOT
  rationale: Es un hebraísmo para dar respuesta. «Respondió» es natural en español y conserva la fuerza del intercambio verbal.
- source_word: מַה לָּנוּ חֵלֶק בְּדָוִד
  english_pob_choice: What share do we have in David?
  chosen_spanish: ¿Qué parte tenemos en David?
  alternatives_spanish:
  - ¿Qué porción tenemos en David?
  - ¿Qué tenemos nosotros que ver con David?
  lexicon: HALOT
  rationale: חלק es «parte, porción, participación». «Parte» conserva mejor la idea de reparto/participación política que una formulación totalmente idiomática.
- source_word: וְלֹא נַחֲלָה בְּבֶן־יִשַׁי
  english_pob_choice: We have no inheritance in the son of Jesse
  chosen_spanish: No tenemos herencia en el hijo de Isaí
  alternatives_spanish:
  - No tenemos heredad en el hijo de Isaí
  - No tenemos patrimonio en el hijo de Isaí
  lexicon: HALOT
  rationale: נחלה puede ser herencia, posesión o heredad. «Herencia» mantiene la resonancia de reparto/posesión hereditaria, y «hijo de Isaí» preserva el modo despectivo de nombrar a David.
- source_word: לְאֹהָלֶיךָ יִשְׂרָאֵל
  english_pob_choice: To your tents, O Israel!
  chosen_spanish: ¡A tus tiendas, oh Israel!
  alternatives_spanish:
  - ¡A tus tiendas, Israel!
  - ¡Vete a tus tiendas, Israel!
  lexicon: HALOT
  rationale: אֹהֶל es literalmente «tienda». Se conserva el idioma histórico de dispersión y retirada de lealtad; «oh» refleja el vocativo del hebreo y del ajuste inglés revisado.
- source_word: עַתָּה רְאֵה בֵיתְךָ דָּוִד
  english_pob_choice: Now see to your own house, David
  chosen_spanish: ¡Ahora atiende a tu casa, David!
  alternatives_spanish:
  - ¡Ahora mira por tu casa, David!
  - ¡Ahora cuida de tu casa, David!
  lexicon: HALOT
  rationale: ראה aquí significa atender, ocuparse de, mirar por. «Atiende» expresa mejor la idea de tomar a cargo la propia casa, sin ocultar el desafío dirigido a David.
- source_word: בֵיתְךָ
  english_pob_choice: your own house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu dinastía
  - tu casa real
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa, linaje o dinastía. En el texto principal se conserva «casa» para no resolver de antemano la ambigüedad; el posible sentido dinástico queda abierto.
- source_word: וַיֵּלֶךְ יִשְׂרָאֵל לְאֹהָלָיו
  english_pob_choice: So Israel went to their tents
  chosen_spanish: Y Israel se fue a sus tiendas
  alternatives_spanish:
  - Y Israel volvió a sus tiendas
  - Y Israel partió hacia sus tiendas
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «sus tiendas», que en español conserva el valor idiomático de retirada y separación política.
theological_decisions:
- issue: Repudio político a la casa de David
  english_pob_reading: Render the repudiation in straightforward political terms without importing later theological judgment against the Davidic covenant.
  chosen_spanish_reading: Presentar el rechazo en términos políticos claros, sin convertirlo en una condena teológica que el verso no formula.
  alternative_spanish_readings:
  - Acentuarlo como rechazo anticovenantal o anti-mesiánico
  - Reducirlo a una disputa doméstica sin alcance nacional
  rationale: El versículo narra una rebelión histórica contra Roboam y la monarquía davídica. La traducción conserva la fuerza del rechazo sin sobreinterpretar su alcance doctrinal.
  doctrine_reference: Preservar la tensión teológica sin resolverla; fidelidad al sentido narrativo-histórico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que añadió el vocativo «O Israel» para reflejar mejor el tono directo de la invocación. En español se reflejó ese vocativo con «oh Israel» y se mantuvieron las demás decisiones léxicas centrales del texto auditado.
  spanish_consistency_notes:
  - Se usó «Israel» como sujeto colectivo singular con verbo singular cuando corresponde al español narrativo.
  - Se conservó «tiendas» por su valor idiomático y se explicó la alternativa interpretativa en nota.
  - Se mantuvo «casa» para בֵיתְךָ para preservar la ambigüedad entre casa y dinastía.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se eligió un registro bíblico moderno y digno, sin arcaísmos innecesarios.
