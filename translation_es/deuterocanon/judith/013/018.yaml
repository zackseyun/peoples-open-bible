translation:
  language: es
  text: 'Y Ozías le dijo: «Bendita eres, hija, por el Dios Altísimo[a], más que todas las mujeres de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendita eres ante el Dios Altísimo, más que todas las mujeres de la tierra». El dativo griego después de «bendita» puede entenderse de varias maneras cercanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀζίας
  english_pob_choice: Uzziah
  chosen_spanish: Ozías
  alternatives_spanish:
  - Uzías
  lexicon: LSJ
  rationale: Se conserva la forma griega del nombre propio en español, que aquí es la base del testimonio textual. «Ozías» sigue de cerca la vocalización del griego y evita imponer una forma más habitual si no está respaldada por este pasaje.
- source_word: Εὐλογητὴ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendita eres
  alternatives_spanish:
  - Bendita seas
  - Eres bendita
  - Bendecida eres
  lexicon: LSJ
  rationale: El adjetivo predicativo en vocativo directo se vierte de manera natural en español con una bendición declarativa. «Bendita eres» conserva el tono benedictivo sin sonar forzado.
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - oh hija
  - hija mía
  lexicon: LSJ
  rationale: No aparece posesivo en el griego. «Hija» mantiene el vocativo afectuoso y respetuoso sin añadir información.
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  english_pob_choice: by the Most High God
  chosen_spanish: por el Dios Altísimo
  alternatives_spanish:
  - ante el Dios Altísimo
  - del Dios Altísimo
  - por Dios Altísimo
  lexicon: LSJ
  rationale: 'El dativo con lenguaje de bendición admite relación instrumental o de referencia. «Por el Dios Altísimo» preserva la lectura principal del POB inglés: la bienaventuranza se enuncia en relación con Dios, no como si Ozías estuviera bendiciendo a Dios. «Altísimo» reproduce bien τῷ ὑψίστῳ en español bíblico claro.'
- source_word: παρὰ πάσας τὰς γυναῖκας
  english_pob_choice: above all the women
  chosen_spanish: sobre todas las mujeres
  alternatives_spanish:
  - más que todas las mujeres
  - por encima de todas las mujeres
  - entre todas las mujeres
  lexicon: LSJ
  rationale: παρά con acusativo tiene valor comparativo de superioridad. «Sobre todas las mujeres» es idiomático en español y conserva el matiz de excedencia.
- source_word: τὰς ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: que hay sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - en el mundo
  lexicon: LSJ
  rationale: La frase griega amplía el comparativo a todas las mujeres que existen en la tierra. «Que hay sobre la tierra» expresa esa extensión universal con español natural; «sobre la tierra» solo sería también posible, pero aquí la relativa ayuda a fijar el alcance.
theological_decisions:
- issue: Sentido del dativo con fórmula de bendición en τῷ θεῷ τῷ ὑψίστῳ
  english_pob_reading: Judith is declared blessed by/in relation to the Most High God, not as one blessing God.
  chosen_spanish_reading: Judith es declarada bendita en relación con el Dios Altísimo, no como si Ozías estuviera bendiciendo a Dios.
  alternative_spanish_readings:
  - Bendita eres ante el Dios Altísimo
  - Bendita eres para el Dios Altísimo
  - Bendita eres de parte del Dios Altísimo
  rationale: La sintaxis y el contexto favorecen una declaración sobre Judith. El español elegido evita invertir el sujeto de la bendición y preserva la fuerza encomiástica del enunciado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés revisado ajustó la forma de «Most High God» y mantuvo la lectura principal de la bendición. La versión española sigue esa decisión, pero conserva la ambigüedad del dativo mediante una preposición que permite entender relación con Dios sin convertir la frase en una bendición dirigida a Dios.
  spanish_consistency_notes:
  - Se mantiene «Dios Altísimo» como equivalente de τῷ θεῷ τῷ ὑψίστῳ, en coherencia con el estándar POB para θεός y el epíteto ὑψιστός.
  - Se usa «bendita» en forma femenina concordante con la vocativa dirigida a Judith.
  - «Ozías» se conserva como transliteración cercana al griego, acorde con el dato de fuente inmediata.
