translation:
  language: es
  text: Contiende por la rectitud[a] hasta la muerte[b], y Yahvé peleará por ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «justicia». El hebreo צֶדֶק puede significar «rectitud» o «justicia».'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego en Swete tiene aquí una oración distinta: «No seas áspero con tu lengua, ni perezoso y negligente en tus obras». Se sigue en el texto principal el testimonio hebreo de la Geniza de El Cairo.'
    reason: textual_variant
lexical_decisions:
- source_word: עַד הַמָּוֶת
  english_pob_choice: until death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el fin
  lexicon: HALOT
  rationale: La expresión hebrea marca perseverancia extrema en la acción. «Hasta la muerte» reproduce de forma natural y fiel el alcance límite sin añadir una idea de martirio que el contexto no exige.
- source_word: הִנָּצֵה
  english_pob_choice: contend
  chosen_spanish: contiende
  alternatives_spanish:
  - lucha
  - defiéndete
  - esfuérzate
  lexicon: HALOT
  rationale: El imperativo reflexivo de la raíz sugiere entrar en disputa o lucha. «Contiende» conserva el tono exhortativo y formal del inglés POB, y funciona bien junto al paralelo de la segunda cláusula.
- source_word: עַל הַצֶּדֶק
  english_pob_choice: for righteousness
  chosen_spanish: por la justicia
  alternatives_spanish:
  - por la rectitud
  - por la justicia y rectitud
  - por lo que es justo
  lexicon: HALOT
  rationale: El hebreo צֶדֶק admite «justicia» y «rectitud». En español, «por la justicia» suena natural y mantiene el campo moral/legal de la palabra. Se prefiere aquí esta opción porque el verso exhorta a defender lo justo, no solo una piedad interior.
- source_word: וַיהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Según la terminología del proyecto, el Tetragrámaton se vierte como «Yahvé». Se preserva así el nombre divino en el texto principal, en vez de ocultarlo con una convención tipográfica.
- source_word: נִלְחָם לָךְ
  english_pob_choice: will fight for you
  chosen_spanish: peleará por ti
  alternatives_spanish:
  - luchará por ti
  - combatirá por ti
  - hará guerra por ti
  lexicon: HALOT
  rationale: El hebreo expresa acción bélica en favor del sujeto. «Peleará por ti» es claro, natural y conserva la relación de apoyo personal del verbo sin intensificarlo artificialmente.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: The LORD will fight for you.
  chosen_spanish_reading: Yahvé peleará por ti.
  alternative_spanish_readings:
  - El Señor peleará por ti.
  - Yahvé luchará por ti.
  rationale: El hebreo trae יהוה directamente. En esta serie se mantiene el nombre divino como «Yahvé», en continuidad con el criterio del proyecto. No se usa una máscara litúrgica porque el dato textual es explícito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de צֶדֶק
  english_pob_reading: righteousness / justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: El inglés POB preservó la tensión semántica con una nota. En español, «justicia» comunica mejor el campo semántico principal y mantiene abierta la posibilidad de «rectitud» en sentido moral. Se conserva la alternativa en nota.
  doctrine_reference: DOCTRINE.md Contested terms principle on preserving alternatives where meaningful
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que prefirió «Contend for righteousness» sobre «Fight for righteousness» para reflejar con mayor precisión el imperativo hebreo. La traducción española adopta «Contiende», manteniendo ese ajuste y el registro formal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - «Contiende» refleja mejor la exhortación del hebreo que un simple «lucha», y armoniza con la segunda cláusula bélica.
  - La nota del término צֶדֶק se mantiene en una sola nota al pie porque el español también presenta una elección real entre «justicia» y «rectitud».
