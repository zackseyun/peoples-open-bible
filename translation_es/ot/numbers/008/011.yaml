source:
  edition: WLC
  text: וְ/הֵנִיף֩ אַהֲרֹ֨ן אֶת הַ/לְוִיִּ֤ם תְּנוּפָה֙ לִ/פְנֵ֣י יְהוָ֔ה מֵ/אֵ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָי֕וּ לַ/עֲבֹ֖ד אֶת עֲבֹדַ֥ת יְהוָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/011.yaml
  text: Aaron shall present the Levites as a wave offering before Yahweh from the sons of Israel[b][a], and they shall be to serve the service of Yahweh.
  footnotes:
  - marker: a
    text: Or 'Aaron shall wave the Levites as a wave offering before the LORD.' The Hebrew verb is the same root as 'wave offering' and refers to a ritual presentation.
    reason: lexical_alternative
  - marker: b
    text: '''From the sons of Israel'' may also mean ''on behalf of the sons of Israel,'' indicating that the Levites are presented as representatives of the Israelites in the LORD''s service.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
