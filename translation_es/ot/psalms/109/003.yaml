    rationale: La auditoría inglesa pone la alternativa en וַיִּלָּחֲמוּנִי ('they wage war against me'), pero el borrador la aplica a 'me rodean'. Esto altera el rastro documental y deja sin reflejar la alternativa importante del verbo de combate.
  - severity: medium
    issue: '''Pelean contra mí'' es menos natural y más coloquial que una opción mejor en español bíblico.'
    rationale: Aunque no es incorrecto, 'luchan contra mí' mantiene mejor el tono poético-digno y sigue reflejando la fuerza adversativa de לחם sin sobreinterpretar como guerra formal.
  revised_spanish_text: Palabras de odio me rodean, y luchan[a] contra mí sin causa.
