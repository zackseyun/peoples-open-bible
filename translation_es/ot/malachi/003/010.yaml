  text: הָבִ֨יאוּ אֶת כָּל הַֽ/מַּעֲשֵׂ֜ר אֶל בֵּ֣ית הָ/אוֹצָ֗ר וִ/יהִ֥י טֶ֨רֶף֙ בְּ/בֵיתִ֔/י וּ/בְחָנ֤וּ/נִי נָא֙ בָּ/זֹ֔את אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת אִם לֹ֧א אֶפְתַּ֣ח לָ/כֶ֗ם אֵ֚ת אֲרֻבּ֣וֹת הַ/שָּׁמַ֔יִם וַ/הֲרִיקֹתִ֥י לָ/כֶ֛ם בְּרָכָ֖ה עַד בְּלִי דָֽי־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/malachi/003/010.yaml
  text: Bring the full tithe into the storehouse[a], so that there may be food in my house. And test me now in this, says Yahweh of hosts[c][b], whether I will not open for you the windows of heaven and pour out for you blessing until there is no more need.
  footnotes:
  - marker: a
    text: Or 'all the tithe' or 'the whole tithe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the floodgates of heaven.' The Hebrew literally says 'the windows of heaven.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom means an abundance beyond sufficiency; traditionally, 'until there is no more room' or 'beyond measure.'
    reason: lexical_alternative
