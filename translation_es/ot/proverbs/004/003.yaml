translation:
  language: es
  text: Porque yo era un hijo para mi padre, tierno y el único[a] delante de mi madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«El único» traduce el hebreo יָחִיד, que también puede significar «hijo único», «único» o, en algunos contextos, «amado». Otra posibilidad de traducción: «Porque yo era el hijo de mi padre, tierno y el único delante de mi madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de lo que sigue; en español, «Porque» comunica bien ese valor explicativo sin forzar un orden demasiado inglés.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un hijo para mi padre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijo». En español, «un hijo» conserva el parentesco y permite unirlo naturalmente con la relación posesiva expresada después.
- source_word: לְאָבִי
  english_pob_choice: to my father
  chosen_spanish: para mi padre
  alternatives_spanish:
  - de mi padre
  - respecto de mi padre
  lexicon: HALOT
  rationale: La construcción hebrea expresa relación filial; «para mi padre» mantiene esa relación de pertenencia/relación sin sonar tan forzado como un calco literal.
- source_word: רַךְ
  english_pob_choice: tender
  chosen_spanish: tierno
  alternatives_spanish:
  - suave
  - delicado
  - joven
  lexicon: HALOT
  rationale: «Tierno» reproduce la idea de fragilidad o delicadeza juvenil mejor que «suave» y sin reducirlo a edad solamente.
- source_word: וְיָחִיד
  english_pob_choice: an only child / the only one
  chosen_spanish: único
  alternatives_spanish:
  - hijo único
  - el único
  - único hijo
  lexicon: HALOT
  rationale: El hebreo יָחִיד puede significar «único», «solitario» o «amado» según contexto. Aquí, el contexto de «delante de mi madre» favorece la idea de ser el único, y «único» preserva la ambigüedad lexical sin sobreespecificar.
- source_word: לִפְנֵי אִמִּי
  english_pob_choice: before my mother
  chosen_spanish: delante de mi madre
  alternatives_spanish:
  - ante mi madre
  - en presencia de mi madre
  - para mi madre
  lexicon: HALOT
  rationale: «Delante de» comunica el valor espacial-relacional de לִפְנֵי y es idiomático en español, manteniendo la escena de relación familiar.
theological_decisions:
- issue: Sentido de יָחִיד (único / hijo único / amado)
  english_pob_reading: '''The only one'' translates Hebrew יָחִיד, which can also mean ''only son,'' ''unique one,'' or in some contexts ''beloved one.'''
  chosen_spanish_reading: «único»
  alternative_spanish_readings:
  - «hijo único»
  - «el único»
  - «amado»
  rationale: No hay razón suficiente en este versículo para fijar una lectura más estrecha que la del hebreo. «Único» conserva la amplitud semántica y deja abierta la tensión documentada por el POB inglés.
  doctrine_reference: Lexical semantics of יָחִיד; no doctrinal issue
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «the only one» a «an only child» por naturalidad. La presente redacción española sigue esa misma intención de naturalidad sin perder la amplitud de יָחִיד, optando por «único» para evitar sobreinterpretar si se trata de «hijo único», «único» o incluso «amado» en otros contextos.
  spanish_consistency_notes:
  - Se mantiene «hijo» para בֵן, en coherencia con el énfasis filial del proverbio.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto; el versículo no contiene el nombre divino.
  - «Delante de mi madre» conserva la relación hebrea de לִפְנֵי sin añadir una explicación interpretativa innecesaria.
