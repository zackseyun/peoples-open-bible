base_translation:
  language: en
  yaml_path: translation/ot/judges/001/017.yaml
  text: Then Judah went with Simeon his brother[a], and they struck down the Canaanites living in Zephath and devoted it to destruction[c][b]; so they called the name of the city Hormah.
  footnotes:
  - marker: a
    text: Hormah sounds like the Hebrew word for something devoted to destruction (ḥerem), explaining the city's name.
    reason: lexical_alternative
  - marker: b
    text: Or 'utterly destroyed it' / 'put it under the ban.' The Hebrew verb refers to devoting something irrevocably, often by destruction.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'he called'; the singular likely refers to Judah as a collective or representative subject. Some translations smooth this to 'they called.'
    reason: alternative_reading
