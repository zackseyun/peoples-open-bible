    text: 'También: «has colocado tu nombre sobre nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no cesará por siempre».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura literal del griego y la política del proyecto con «Yahvé», pero se corrige «por siempre» a «para siempre» para lograr un español más natural y más claro sin resolver de más la ambigüedad del verbo final.
