  to: 'Y he dicho[a]: «Yo los haré subir[b] de la aflicción de Egipto[c] a la tierra de los cananeos, los hititas, los amorreos, los perizitas, los heveos y los jebuseos, a una tierra que fluye[d] con leche y miel».'
  rationale: 'Se revisa el texto principal para alinear אַעֲלֶה con la decisión fuente y auditada: «los haré subir» preserva la imagen del éxodo como ascenso, mientras que «los sacaré» queda como alternativa en nota. También se corrige la naturalidad española de la fórmula idiomática final con «que fluye con leche y miel». Las demás decisiones se mantienen porque reflejan bien el hebreo y el rastro de auditoría.'
