review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del hebreo: los lejanos vendrán, construirán en el templo de Yahvé, el pueblo sabrá que Yahvé de los Ejércitos envió al hablante, y hay una cláusula condicional final. También preserva adecuadamente la apertura interpretativa de וּרְחוֹקִים y el sentido pactal de שמע + קול como obediencia a la voz de Yahvé. Sin embargo, las notas están mal distribuidas respecto al rastro de auditoría inglés: la nota [a] en el inglés pertenece a «Yahweh of Armies / LORD of hosts», no a «those who are far off», mientras que la nota explicativa sobre «los que están lejos» corresponde al segundo punto. Además, el español puede mejorar ligeramente la naturalidad de la cláusula final intensiva.'
  spanish_quality_summary: El texto es claro, legible y digno en español neutro. «Yahvé», «templo» y «Yahvé de los Ejércitos» son buenas opciones del proyecto. No obstante, «si obedecen atentamente la voz de Yahvé su Dios» suena un poco menos idiomático que «si de veras obedecen la voz...» o «si obedecen diligentemente...». También conviene alinear las notas al lugar correcto y evitar que una nota léxica sobre el título divino quede anclada a «a ustedes».
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> «Yahvé»; צְבָאוֹת -> «de los Ejércitos»; הֵיכָל -> «templo»; שמע en contexto pactal -> «obedecer». No hay conflicto teológico mayor. La única corrección necesaria es la colocación y contenido de las notas para que coincidan con la evidencia auditada y no creen un anclaje engañoso.'
  issues:
  - severity: medium
    issue: Las notas [a] y [b] están invertidas respecto al rastro de auditoría inglés y a sus anclajes naturales.
    rationale: En el inglés, [a] señala la alternativa léxica de «Yahweh of Armies / LORD of hosts», mientras que [b] explica la amplitud de «those who are far off». En el borrador español, [a] está en «los que están lejos» y [b] en «a ustedes», lo que desordena la justificación documentada y ancla una nota léxica a un lugar incorrecto.
  - severity: low
    issue: La expresión «obedecen atentamente la voz» es comprensible pero algo menos natural en español bíblico moderno.
    rationale: La intensificación de אִם שָׁמוֹעַ תִּשְׁמְעוּן se puede expresar mejor con «obedecen diligentemente» o «de veras obedecen», manteniendo el matiz de obediencia sin sonar forzado.
  revised_spanish_text: Y vendrán los que están lejos[b], y construirán en el templo de Yahvé, y sabrán que Yahvé de los Ejércitos[a] me ha enviado a ustedes. Y esto sucederá si obedecen diligentemente la voz de Yahvé su Dios.
  revised_footnotes:
