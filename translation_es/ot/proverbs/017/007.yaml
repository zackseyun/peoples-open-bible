review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura proverbial y el sentido general de propiedad/inconveniencia, pero desajusta varios detalles del hebreo y del rastro POB en inglés. שְׂפַת יֶתֶר se documentó como ''excellent/lofty speech'', no principalmente como ''hablar con exceso''; y שְׂפַת שָׁקֶר se expresa mejor con la imagen concreta ''labios mentirosos'' o equivalente, no ''hablar mentira''. Además, las notas al pie están ancladas a palabras equivocadas: [a] aparece sobre ''necio'' pero explica שְׂפַת יֶתֶר, y [b] aparece sobre la frase de habla pero explica נָבָל.'
  spanish_quality_summary: El español es comprensible, pero 'hablar mentira' suena poco natural en registro bíblico cuidado, y el uso de signos de admiración en '¡cuánto menos' no ayuda aquí. 'Habla elevada' / 'palabras elevadas' y 'labios mentirosos' leen mejor y preservan mejor la imagen sapiencial. También conviene corregir el orden y contenido de notas para evitar confusión.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Sí hay un problema de consistencia léxica con el análisis POB: נָבָל debe seguir como ''necio''; נָדִיב puede mantenerse como ''noble'' con nota ''príncipe''/''generoso''; שְׂפַת יֶתֶר debe reflejar habla elevada/excelente más que mera verbosidad; שְׂפַת שָׁקֶר debe conservar el campo de ''mentira/falsedad'' con la imagen de labios.'
  issues:
  - severity: high
    issue: Las notas [a] y [b] están intercambiadas respecto de sus anclajes en el texto.
    rationale: La nota [a] explica שְׂפַת יֶתֶר pero está colocada sobre 'necio'; la nota [b] explica נָבָל pero está colocada sobre la frase de habla. Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: '''hablar con exceso'' no refleja bien la decisión POB principal para שְׂפַת יֶתֶר.'
    rationale: El expediente inglés eligió 'Excellent speech' con alternativa 'lofty speech'. El español debería preservar más claramente la idea de habla elevada/refinada, dejando 'excesiva' como alternativa, no como texto principal.
  - severity: medium
    issue: '''hablar mentira'' es poco idiomático y pierde la imagen concreta de שְׂפַת שָׁקֶר.'
    rationale: El hebreo usa 'labio(s) de mentira/falsedad'. En proverbios, 'labios mentirosos' es natural y fiel; 'hablar mentira' suena forzado y más parafrástico.
  - severity: low
    issue: Los signos de admiración en '¡cuánto menos' no son necesarios.
    rationale: La locución comparativa a fortiori se expresa mejor sin exclamación en este contexto sapiencial.
  - severity: low
    issue: El texto actual oscurece la simetría poética entre los dos miembros.
    rationale: Usar 'habla/palabras' en el primer miembro y 'labios mentirosos' en el segundo mantiene mejor la concisión y el paralelismo del proverbio.
  revised_spanish_text: No convienen al necio palabras elevadas[a]; cuánto menos al noble[c] labios mentirosos.
  revised_footnotes:
  - marker: a
    text: 'O: «habla excelente» o «habla grandiosa». La expresión hebrea puede enfatizar habla elevada, excesiva o grandiosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «insensato». El hebreo נָבָל en Proverbios suele designar a una persona moralmente y espiritualmente insensata, no solo poco inteligente.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «príncipe» o «generoso». El hebreo נָדִיב puede referirse tanto a rango noble como a carácter noble.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el español para alinearlo mejor con el hebreo y con las decisiones léxicas auditadas: ''palabras elevadas'' refleja mejor שְׂפַת יֶתֶר que ''hablar con exceso''; ''labios mentirosos'' conserva la imagen concreta de שְׂפַת שָׁקֶר y suena natural en español bíblico moderno; y se elimina la exclamación innecesaria en ''cuánto menos''. También se reordenan las notas para que sus marcadores correspondan al lugar correcto. La nota sobre נָבָל se conserva como alternativa léxica disponible, pero solo debe mantenerse si se ancla en el texto final; de lo contrario, debería omitirse en la aplicación editorial final.'
