revisions:
- from: Entonces partirá la tienda de reunión[a], con el campamento de los levitas en medio de los campamentos. Tal como acampan, así partirán[b], cada uno en su lugar, según sus estandartes.
  to: Entonces partirá la tienda de reunión, con el campamento de los levitas en medio de los campamentos. Tal como acampan, así partirán, cada uno en su lugar[a], según sus estandartes[b].
