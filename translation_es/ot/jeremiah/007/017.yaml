translation:
  language: es
  text: ¿No ves lo que ellos están haciendo en las ciudades de Judá y en las plazas[a] de Jerusalén?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse “calles” o “lugares abiertos” de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֵינְךָ
  english_pob_choice: Do you not
  chosen_spanish: ¿No ves…?
  alternatives_spanish:
  - ¿Acaso no ves…?
  - ¿No estás viendo…?
  lexicon: HALOT
  rationale: La forma hebrea expresa una pregunta retórica negativa dirigida en segunda persona masculina singular. En español, la pregunta directa con “¿No ves…?” transmite de manera natural la misma fuerza exhortativa sin añadir énfasis no requerido.
- source_word: רֹאֶה
  english_pob_choice: see
  chosen_spanish: ves
  alternatives_spanish:
  - miras
  - observas
  lexicon: HALOT
  rationale: El verbo de percepción se vierte con el presente simple “ves”, que conserva la referencia a la percepción directa y su uso natural en una pregunta retórica.
- source_word: מָה
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué es lo que
  - qué
  lexicon: HALOT
  rationale: En español, “lo que” funciona mejor aquí que un “qué” desnudo, porque introduce el contenido observado de forma fluida y sin sonar forzado.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - esas personas
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente hebreo añade énfasis. “Ellos” mantiene esa referencia personal sin sobrerrepresentarla; el énfasis queda incluido en la estructura retórica.
- source_word: עֹשִׂים
  english_pob_choice: are doing
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - andan haciendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso; el progresivo español “están haciendo” refleja bien esa continuidad y mantiene el sentido actual de la conducta observada.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - por las ciudades de Judá
  - dentro de las ciudades de Judá
  lexicon: HALOT
  rationale: Se conserva la relación de constructo y la referencia geográfica literal con “ciudades de Judá”, que es clara y fiel al hebreo.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִָם
  english_pob_choice: and in the streets of Jerusalem
  chosen_spanish: y en las plazas de Jerusalén
  alternatives_spanish:
  - y en las calles de Jerusalén
  - y en los espacios abiertos de Jerusalén
  lexicon: HALOT
  rationale: חֻצוֹת puede significar calles, plazas o lugares abiertos. Dado el paralelo urbano y la nota inglesa que preserva la alternativa, “plazas” comunica bien el espacio público sin reducir indebidamente la amplitud semántica.
translation_notes:
  revision_awareness: El texto base en inglés de la POB se mantuvo sin cambios en la revisión más reciente; el presente borrador sigue esa lectura alta en acuerdo y conserva la única ambigüedad léxica destacada para חֻצוֹת en forma de nota española.
  spanish_consistency_notes:
  - Se usó “Yahvé” como norma del proyecto solo cuando aparece el tetragrámaton en el original; en este versículo no aparece.
  - Se evitó “SEÑOR” como sustituto porque el hebreo de este versículo no contiene el nombre divino ni una cita directa del mismo.
  - “Plazas” se eligió como equivalente principal de חֻצוֹת, pero la nota conserva las alternativas documentadas por la POB en inglés.
  - El tono retórico se mantuvo con una pregunta directa, conforme al hebreo y al inglés auditado.
