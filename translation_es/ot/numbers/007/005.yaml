translation:
  language: es
  text: Tómalos de ellos[a], y que sean para realizar el servicio de la tienda de reunión; y los darás a los levitas[b], cada uno conforme a su servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y que sean para servir el servicio de la tienda de reunión». La redacción principal vierte el hebreo de manera natural, porque los objetos en vista son inanimados y están destinados al uso en el servicio del santuario.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada uno conforme a su servicio», es decir, la entrega se hace según la tarea asignada a cada levita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Tómalos
  alternatives_spanish:
  - Toma
  - Recíbelos
  lexicon: HALOT
  rationale: El imperativo de לקח pide una orden directa. En español, «Tómalos» mantiene la fuerza imperativa y encaja con el objeto plural del versículo.
- source_word: מֵאִתָּם
  english_pob_choice: from them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de ellos
  - de entre los que los ofrecieron
  lexicon: HALOT
  rationale: La preposición con sufijo expresa procedencia. «De entre ellos» aclara mejor en español que se toman desde el grupo que los presentó, sin añadir una explicación ajena al hebreo.
- source_word: וְהָיוּ לַעֲבֹד
  english_pob_choice: let them be for doing the service
  chosen_spanish: que sean para el servicio
  alternatives_spanish:
  - y que sirvan
  - que estén destinados al servicio
  lexicon: HALOT
  rationale: El hebreo expresa finalidad/uso. Como en el contexto el referente es inanimado, el español fluido pide una formulación pasiva o funcional. «Para el servicio» conserva el valor cultual sin hacerlos sujetos agentes.
- source_word: עֲבֹדַת
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - labor
  - ministerio
  lexicon: HALOT
  rationale: «Servicio» reproduce bien la función cultual y oficial del término en este contexto de santuario, y es natural en español bíblico contemporáneo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: tabernáculo de reunión
  alternatives_spanish:
  - tienda de reunión
  - tienda del encuentro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tienda de reunión», en español bíblico la forma tradicional y ampliamente inteligible es «tabernáculo de reunión». Mantiene el referente del santuario portátil del desierto sin perder claridad.
- source_word: וְנָתַתָּה אֹתָם אֶל הַלְוִיִּם
  english_pob_choice: and you shall give them to the Levites
  chosen_spanish: y los darás a los levitas
  alternatives_spanish:
  - y los asignarás a los levitas
  - y los entregarás a los levitas
  lexicon: HALOT
  rationale: נתן se traduce de manera básica como «dar». «Los darás a los levitas» sigue de cerca el hebreo y conserva la idea de transferencia para su uso en el servicio.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque literalmente significa «hombre», aquí funciona distributivamente. «Cada uno» comunica ese valor sin cargar el texto con una redundancia innecesaria.
- source_word: כְּפִי עֲבֹדָתוֹ
  english_pob_choice: according to his service
  chosen_spanish: conforme a su servicio
  alternatives_spanish:
  - según su servicio
  - de acuerdo con su tarea
  lexicon: HALOT
  rationale: La expresión idiomática indica distribución proporcional según la tarea asignada. «Conforme a su servicio» refleja el hebreo y mantiene la relación funcional con cada levita.
theological_decisions:
- issue: 'Función de los objetos entregados: uso cultual más que agencia propia'
  english_pob_reading: The Hebrew idiom is rendered naturally in English because the objects in view are inanimate and are meant to be used in the sanctuary service.
  chosen_spanish_reading: Los objetos quedan destinados al servicio; no «sirven» por sí mismos.
  alternative_spanish_readings:
  - y que sirvan
  - para que sirvan
  rationale: El contexto requiere que el español preserve la idea de destino/uso, no agencia personal. Por eso se evita personificar los objetos y se conserva la finalidad cultual del verbo.
  doctrine_reference: Números 7:5; cf. la función levítica del santuario en el Pentateuco
- issue: Distribución según la asignación de cada levita
  english_pob_reading: Hebrew 'each according to his service,' referring to distribution in keeping with each Levite's assigned duty.
  chosen_spanish_reading: Cada uno recibe según su servicio asignado.
  alternative_spanish_readings:
  - cada uno conforme a su servicio
  - cada uno según su tarea
  rationale: La frase final organiza la entrega por responsabilidad ministerial. El español elegido conserva la distribución individual sin añadir categorías ajenas al texto.
  doctrine_reference: Números 7:5; Números 4:1-49
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó «be used for» a «be for doing the service of» para acercarse más al hebreo sin añadir interpretación. El español sigue esa misma línea, privilegiando una construcción final/funcional y evitando expandir el sentido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar para el nombre divino cuando aparezca en el contexto inmediato; aquí el versículo no lo contiene explícitamente.
  - Se tradujo אֹהֶל מוֹעֵד con «tabernáculo de reunión» por inteligibilidad y uso bíblico asentado en español, aunque el hebreo literal sería «tienda de reunión».
  - Se evitó traducir distributivamente con «cada hombre» porque en este contexto אִישׁ funciona como marcador de reparto, no como contraste de género.
