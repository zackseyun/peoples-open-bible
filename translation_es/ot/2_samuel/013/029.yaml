base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/029.yaml
  text: So Absalom’s young men did to Amnon as Absalom had commanded[a]. Then all the king’s sons arose[b], and each mounted his mule and fled.
  footnotes:
  - marker: a
    text: 'Literally, ''did to Amnon as Absalom had commanded.'' The previous verse states the command explicitly: to strike Amnon down when his heart was merry with wine.'
    reason: cross_reference
  - marker: b
    text: Or 'Absalom’s servants' / 'Absalom’s attendants.' The Hebrew term can refer to young men in service.
    reason: lexical_alternative
