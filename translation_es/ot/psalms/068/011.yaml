translation:
  language: es
  text: Tus criaturas se establecieron en ella; en tu bondad[a], Dios, preparaste provisión para el pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo חַיָּתְךָ es difícil aquí; también puede entenderse como «tus seres vivientes», «tu compañía» o «tu congregación».
    reason: alternative_reading
lexical_decisions:
- source_word: חַיָּתְךָ
  english_pob_choice: your creatures
  chosen_spanish: tus criaturas
  alternatives_spanish:
  - tu compañía
  - tu congregación
  - tu gente
  lexicon: HALOT
  rationale: El hebreo es difícil y el inglés POB optó por una referencia colectiva y animada no estrictamente zoológica. En español, «criaturas» conserva la amplitud de חַיָּה como ser viviente y mantiene la imagen colectiva sin imponer de antemano una lectura eclesial específica.
- source_word: יָשְׁבוּ בָהּ
  english_pob_choice: settled in it
  chosen_spanish: se establecieron en ella
  alternatives_spanish:
  - habitaron en ella
  - se asentaron en ella
  lexicon: HALOT
  rationale: יָשַׁב puede significar habitar, residir o establecerse. «Se establecieron» reproduce bien la idea de asentamiento estable y suena natural en español, conservando el matiz concreto de residencia en un lugar preparado.
- source_word: תָּכִין
  english_pob_choice: you provided
  chosen_spanish: proveíste
  alternatives_spanish:
  - preparaste
  - estableciste
  - diste provisión
  lexicon: HALOT
  rationale: El hiphil de כון puede expresar preparar, disponer o establecer. En este contexto, el inglés POB entendió la acción como provisión para los pobres; «proveíste» comunica esa fuerza idiomática en español sin perder la base de preparación/disposición.
- source_word: בְּטוֹבָתְךָ
  english_pob_choice: in your goodness
  chosen_spanish: en tu bondad
  alternatives_spanish:
  - por tu bondad
  - con tu bondad
  - en tu benignidad
  lexicon: HALOT
  rationale: טוֹבָה denota bondad, beneficencia o benevolencia. «En tu bondad» sigue de cerca la preposición y expresa que la provisión fluye del carácter benévolo de Dios.
- source_word: לֶעָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el necesitado
  - los pobres
  lexicon: HALOT
  rationale: עָנִי puede referirse al pobre, afligido o humilde. En singular, «el pobre» refleja bien el destinatario genérico de la provisión y mantiene la sobriedad del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El sustantivo aparece en vocativo al final del hemistiquio. «Oh Dios» preserva la dirección orante y la fuerza poética de la apelación.
theological_decisions:
- issue: Sentido de חַיָּתְךָ en un contexto poético difícil
  english_pob_reading: A collective reference to God's people/host expressed as 'your creatures'
  chosen_spanish_reading: Referencia colectiva ambigua expresada como «tus criaturas»
  alternative_spanish_readings:
  - tus seres vivientes
  - tu compañía
  - tu congregación
  rationale: La sintaxis y el léxico admiten varias posibilidades. Siguiendo la transparencia del POB, se evita resolver la ambigüedad con una lectura demasiado precisa. «Criaturas» conserva la amplitud del hebreo y permite tanto una referencia amplia a seres vivientes como una lectura colectiva metafórica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó 'flock' por 'creatures' para reflejar con más precisión la amplitud del hebreo. La redacción española sigue esa decisión y evita una restricción pastoril excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en vocativo por el hebreo אֱלֹהִים al final del verso.
  - Se prefirió «bondad» sobre alternativas más interpretativas como «benignidad» o «bounty» para conservar la raíz semántica de טובה.
  - No se introdujo «Mesías», «Yahvé» ni terminología eclesial no presente en el texto.
  - La ambigüedad de חַיָּתְךָ queda visible mediante nota, sin forzar una lectura zoológica o institucional.
