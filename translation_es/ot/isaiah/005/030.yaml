base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/030.yaml
  text: And he will roar over it on that day like the roaring of the sea[a]; and if one looks to the land, behold, darkness and distress[d][c][b], and the light is darkened in its clouds.
  footnotes:
  - marker: a
    text: Or 'against him' / 'over him' for 'over it'; the Hebrew suffix is masculine singular and could refer to a personified people, land, or enemy target depending on how the preceding context is construed.
    reason: alternative_reading
  - marker: b
    text: Or 'and one looks to the earth'; Hebrew אֶרֶץ can mean 'land' or 'earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'darkness and anguish'; the Hebrew term צַר conveys distress, trouble, or constriction.
    reason: lexical_alternative
  - marker: d
    text: Or 'in its clouds' / 'in its thick clouds'; the final phrase is difficult and may refer to the dark cloud-masses by which the light is obscured.
    reason: alternative_reading
