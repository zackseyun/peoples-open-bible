translation:
  language: es
  text: Así que Salomón hizo lo malo ante los ojos de Yahvé[a], y no siguió plenamente a Yahvé, como había hecho David, su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no fue plenamente tras Yahvé» o «no estuvo totalmente dedicado a Yahvé». El hebreo expresa una lealtad u obediencia incompletas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - hizo lo que
  lexicon: HALOT
  rationale: El verbo עשה aquí introduce la conducta de Salomón. En español, «hizo» conserva la naturalidad del giro bíblico sin perder el valor de acción/conducta del original.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  - lo perverso
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona sustantivamente. «Lo malo» mantiene el valor moral del hebreo y evita sonar demasiado abstracto o interpretativo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva con una equivalencia transparente en español. «Ante los ojos de Yahvé» mantiene la metáfora evaluativa y la referencia personal al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre propio del pacto en lugar de sustituirlo por un título.'
- source_word: מִלֵּא אַחֲרֵי
  english_pob_choice: fully follow
  chosen_spanish: siguió plenamente
  alternatives_spanish:
  - fue plenamente tras
  - siguió de todo corazón
  - estuvo totalmente dedicado a
  lexicon: HALOT
  rationale: La locución expresa seguimiento/lealtad completos. «Siguió plenamente» transmite la idea de adhesión completa sin resolverla en una sola noción devocional ni volverla demasiado literal.
- source_word: וְלֹא מִלֵּא אַחֲרֵי יְהוָה
  english_pob_choice: and he did not fully follow Yahweh
  chosen_spanish: y no siguió plenamente a Yahvé
  alternatives_spanish:
  - y no fue plenamente tras Yahvé
  - y no estuvo totalmente dedicado a Yahvé
  lexicon: HALOT
  rationale: La frase hebrea señala lealtad incompleta. «No siguió plenamente a Yahvé» preserva esa tensión sin convertirla en una acusación más fuerte que la del versículo mismo.
- source_word: כְּדָוִד אָבִיו
  english_pob_choice: as David his father had done
  chosen_spanish: como había hecho David, su padre
  alternatives_spanish:
  - como David, su padre
  - como había hecho David, el padre de él
  lexicon: HALOT
  rationale: El hebreo compara a Salomón con David como modelo. «Como había hecho David, su padre» reproduce la relación comparativa y la referencia al patrón previo de David de manera natural en español.
theological_decisions:
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. Se mantiene la política del proyecto de traducirlo como «Yahvé», conservando el nombre del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Grado de infidelidad en מִלֵּא אַחֲרֵי יְהוָה
  english_pob_reading: did not fully follow Yahweh
  chosen_spanish_reading: no siguió plenamente a Yahvé
  alternative_spanish_readings:
  - no fue plenamente tras Yahvé
  - no estuvo totalmente dedicado a Yahvé
  rationale: El hebreo expresa seguimiento incompleto, no necesariamente la formulación máxima de apostasía. La traducción conserva esa tensión y no la resuelve con una lectura doctrinal más fuerte de la que el texto da aquí.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto coincide con la última revisión disponible, marcada como sin cambios y con acuerdo alto en la verificación cruzada; no se requirieron ajustes posteriores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - «Siguió plenamente» conserva la fuerza relacional del hebreo sin convertirla en una paráfrasis devocional excesiva.
  - La nota al pie preserva las alternativas léxicas relevantes donde el hebreo permite matices de seguimiento/lealtad.
