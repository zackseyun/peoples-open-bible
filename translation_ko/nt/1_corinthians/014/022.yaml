  lexicon: BDAG
  rationale: 신약의 σημεῖον 기본 등가. 14:21의 이사야 인용 문맥상 「심판의 표적」으로 읽힐 여지를 보존한다.
theological_decisions:
- issue: 방언이 「표적」으로 기능하는 의미의 폭
  chosen_reading: 믿지 않는 자들을 위한 표적
  alternative_readings:
  - 믿지 않는 자들을 향한 심판의 표적
  rationale: 본문은 σημεῖον의 종류를 명시하지 않으나 직전 21절의 이사야 인용은 심판 정황이다. 본문이 결정하지 않은 부분을 본문이 결정하게 두되, 각주로 심판 함의를 노출한다.
