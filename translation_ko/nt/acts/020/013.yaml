  yaml_path: translation/nt/acts/020/013.yaml
  text: But we[a], having gone ahead to the ship, set sail for Assos, intending to take Paul on board from there, for so he had arranged[b], since he himself intended to go by land.
  footnotes:
  - marker: a
    text: Or 'because he himself intended to travel on foot.' The Greek verb πεζεύειν specifically contrasts land travel with the group's voyage by ship.
    reason: lexical_alternative
  - marker: b
    text: Or 'for so it had been arranged.' The Greek form διατεταγμένος ἦν is formally passive, but in context likely refers to Paul's own prior arrangement or instruction.
    reason: alternative_reading
