    issue: La forma 'Naphis' para נָפִישׁ no representa adecuadamente el nombre propio.
    rationale: El hebreo termina en שׁ, y la forma propuesta pierde esa correspondencia. En español bíblico es preferible una transliteración que conserve mejor la forma del nombre; 'Nafís' o 'Nafish' serían más fieles. Para lectura e inteligibilidad general, 'Nafís' funciona bien.
  - severity: low
    issue: La nota al pie del etnónimo introduce una alternativa ('hagríes') no alineada con la auditoría inglesa.
    rationale: La auditoría preserva específicamente la alternativa inglesa 'Hagarites'. En español, la alternativa más directamente correspondiente y comprensible es 'hagaritas', no 'hagríes'.
