translation:
  language: es
  text: Y pondré fuego en Egipto[a]; Sin se retorcerá de angustia, y No[b] será abierta por una brecha, y Nof[c] tendrá adversarios de día[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sin es la ciudad egipcia comúnmente identificada con Pelusio.
    reason: cross_reference
  - marker: b
    text: No se identifica comúnmente con Tebas.
    reason: cross_reference
  - marker: c
    text: Nof se identifica comúnmente con Menfis.
    reason: cross_reference
  - marker: d
    text: 'O: «Nof tendrá adversarios en pleno día». La cláusula hebrea es breve y puede enfatizar un ataque abierto y continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will set
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y colocaré
  - Y haré caer
  lexicon: HALOT
  rationale: נָתַתִּי con אֵשׁ y un lugar expresa causar o poner fuego sobre un lugar; en español, 'poner fuego' comunica de forma natural la acción causativa sin perder el sentido de juicio.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - incendio
  lexicon: HALOT
  rationale: La correspondencia básica es directa. 'Fuego' conserva la amplitud poética y judicial del hebreo mejor que 'incendio', que suena más técnico.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - contra Egipto
  lexicon: HALOT
  rationale: El sentido más inmediato de ב es 'en'. Aunque el contexto implica juicio contra Egipto, el texto mismo dice 'en Egipto', y así se mantiene la formulación fuente.
- source_word: חוּל תחיל
  english_pob_choice: will writhe in anguish
  chosen_spanish: estará retorciéndose en angustia
  alternatives_spanish:
  - temblará
  - estará de parto
  - se retorcerá
  lexicon: HALOT
  rationale: חול admite la idea de retorcerse, temblar o estar en dolores de parto. Para una ciudad bajo juicio, 'retorciéndose en angustia' conserva la viveza corporal y el tono de sufrimiento intenso.
- source_word: סִין
  english_pob_choice: Sin
  chosen_spanish: Sin
  alternatives_spanish:
  - Pelusio
  lexicon: HALOT
  rationale: Se translitera el nombre propio. La identificación histórica con Pelusio se reserva para nota, no para el texto principal.
- source_word: וְנֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Tebas
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transliterada del topónimo. 'Tebas' es una identificación histórica, no la forma del texto base.
- source_word: תִּהְיֶה לְהִבָּקֵעַ
  english_pob_choice: will be breached
  chosen_spanish: será abierta
  alternatives_spanish:
  - será breached
  - será quebrada
  - será rasgada
  lexicon: HALOT
  rationale: El infinitivo nifal de בקע expresa ser abierto/partido/abierto por la fuerza. En español, 'será abierta' mantiene la imagen concreta y funciona bien en un registro bíblico sobrio; la nota recoge la posibilidad de 'brechada' o 'abierta por la fuerza' si se desea enfatizar el asalto.
- source_word: וְנֹף
  english_pob_choice: Noph
  chosen_spanish: Nof
  alternatives_spanish:
  - Menfis
  lexicon: HALOT
  rationale: Se translitera el topónimo según la práctica del proyecto. La identificación con Menfis va mejor en nota explicativa que en el cuerpo del versículo.
- source_word: צָרֵי יוֹמָם
  english_pob_choice: adversaries by day
  chosen_spanish: adversarios de día
  alternatives_spanish:
  - enemigos de día
  - adversarios en pleno día
  - adversarios durante el día
  lexicon: HALOT
  rationale: צָרֵי se entiende naturalmente como 'adversarios/enemigos'; 'de día' vierte יוֹמָם de modo directo y conserva la idea de ataque abierto, diurno, tal como observa la POB inglesa.
theological_decisions:
- issue: Topónimos egipcios transliterados en vez de equivalentes históricos
  english_pob_reading: Sin, No, and Noph are kept as Hebrew place-names, with identifications in footnotes.
  chosen_spanish_reading: Sin, No y Nof se transliteran en el texto principal, con identificaciones históricas en notas.
  alternative_spanish_readings:
  - Pelusio, Tebas y Menfis en el texto principal
  rationale: La política del proyecto favorece la transliteración de nombres propios para no sustituir la forma fuente. Las identificaciones históricas ayudan al lector sin borrar la huella textual hebrea.
  doctrine_reference: Principio de transparencia textual; toponimia bíblica
- issue: Imagen de juicio por fuego en Egipto
  english_pob_reading: And I will set fire in Egypt
  chosen_spanish_reading: Y pondré fuego en Egipto
  alternative_spanish_readings:
  - Y encenderé fuego en Egipto
  - Y enviaré fuego sobre Egipto
  rationale: La frase debe conservar el acto divino de juicio sin suavizarlo. 'Pondré fuego' es natural en español y mantiene la fuerza causativa del hebreo.
  doctrine_reference: Juicio divino en los profetas
- issue: Cláusula breve y ambigua sobre Noph
  english_pob_reading: Noph will have adversaries by day; the clause is terse and may emphasize open, continual attack.
  chosen_spanish_reading: Nof tendrá adversarios de día
  alternative_spanish_readings:
  - Nof tendrá adversarios en pleno día
  - Nof será asediada de día
  rationale: La tersura hebrea debe percibirse también en español. 'De día' conserva la literalidad de יוֹמָם y sugiere ataque abierto/continuo sin cerrar demasiado la ambigüedad.
  doctrine_reference: Crítica textual y semántica poética
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'breached' sobre 'broken open' y 'adversaries' sobre 'enemies'. En español se reflejó esa elevación de registro con 'será abierta' y 'adversarios', manteniendo además la tersura del final con 'de día'.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca; en este versículo no figura.
  - Se transliteran los topónimos hebreos en el cuerpo del texto y se explican en notas, conforme al patrón POB.
  - Se evita 'SEÑOR' o equivalentes de ocultamiento nominal, pues no corresponde a este versículo.
  - El verbo 'poner fuego' conserva el valor causativo del hebreo sin volverlo interpretativo de más.
  - La cláusula final conserva la ambigüedad relativa de יוֹמָם, sin forzar una paráfrasis temporal excesiva.
