    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the gold altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro fino
  lexicon: HALOT
  rationale: מִזְבַּח es «altar» y הַזָּהָב funciona como un genitivo/adjetivo de materia. En español, «altar de oro» conserva con naturalidad la construcción y evita volverla más interpretativa de lo necesario. «Dorado» suaviza la referencia a la materia, y «de oro fino» añade una precisión no explícita en el hebreo.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para la unción
  - el aceite de consagración
  lexicon: HALOT
  rationale: La frase designa aceite destinado al rito de ungir. «Aceite de la unción» refleja bien el constructo y mantiene el sentido ritual; «aceite para la unción» explicita la función, pero es un poco más interpretativo.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the fragrant incense
  chosen_spanish: el incienso aromático
  alternatives_spanish:
  - el incienso de especias
  - el incienso fragante
  lexicon: HALOT
  rationale: קְטֹרֶת es «incienso» y הַסַּמִּים alude a sustancias aromáticas/especias. «Aromático» comunica el valor olfativo de forma idiomática en español y evita la dureza de «de especias», aunque esa alternativa queda como lectura posible.
- source_word: מָסַךְ
  english_pob_choice: the screen
  chosen_spanish: la cortina
  alternatives_spanish:
  - la pantalla
  - el toldo
  - el biombo
  lexicon: HALOT
  rationale: En contexto del tabernáculo, מָסַךְ nombra la pieza colgante de la entrada. Aunque el inglés POB usa «screen» para distinguirla del velo interno, en español «cortina» comunica mejor la función de un paño de entrada y resulta más natural y reverente; se mantiene la distinción contextual respecto a un «velo».
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: for the entrance of the tent
  chosen_spanish: para la entrada de la tienda
  alternatives_spanish:
  - para la entrada de la carpa
  - para el acceso de la tienda
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» o «apertura», y הָאֹהֶל aquí remite a la tienda del tabernáculo. «Tienda» es la forma más directa y bíblicamente reconocible en español; «carpa» es posible pero menos tradicional en este registro.
- source_word: וְאֵת ... וְאֵת ... וְאֵת ... וְאֵת
  english_pob_choice: comma-separated list with final 'and'
  chosen_spanish: lista coordinada con comas y una «y» final
  alternatives_spanish:
  - repetir la conjunción antes de cada elemento
  - usar solo comas
  lexicon: hebrew syntactic marker
  rationale: El hebreo presenta una enumeración de objetos. En español, una lista con comas y la conjunción final reproduce la relación sin forzar la sintaxis y conserva el carácter de inventario.
translation_notes:
  revision_awareness: El texto coincide con el contexto fuente y con el audit trail inglés de alta concordancia; no se identifican revisiones aplicadas en la versión inglesa reciente que requieran ajuste adicional en español.
  spanish_consistency_notes:
  - Se mantuvo «tienda» para הָאֹהֶל de acuerdo con el registro tabernáculo.
  - Se evitó «SEÑOR» u այլ sustitución teológica porque no aparece el Tetragrámaton en este versículo.
  - Se preservó la distinción funcional entre el objeto de la entrada y otros textiles del santuario mediante «cortina».
