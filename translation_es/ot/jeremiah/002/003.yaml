    text: O 'las primicias de su producción'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''todos los que lo comían/devoraban''; la imagen es la de naciones que consumen o saquean a Israel.'
    reason: cultural_note
  - marker: c
    text: O 'incurrieron en culpa' o 'fueron tenidos por culpables'.
    reason: lexical_alternative
  revision_rationale: Se reubican los marcadores para que correspondan a las palabras pertinentes, se corrige la nota léxica de יֶאְשָׁמוּ, y se reemplaza 'el mal les vendrá' por 'la calamidad vino sobre ellos' para reflejar mejor el sentido judicial de רָעָה y la secuencia verbal del hebreo.
