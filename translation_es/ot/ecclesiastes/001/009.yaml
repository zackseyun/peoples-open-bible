translation:
  language: es
  text: Lo que ha sido, eso será[a]; y lo que se ha hecho, eso se hará; y no hay nada nuevo bajo el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Lo que fue, eso será, y lo que fue hecho, eso será hecho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה שֶּׁהָיָה
  english_pob_choice: What has been
  chosen_spanish: Lo que ha sido
  alternatives_spanish:
  - Lo que fue
  - Todo lo que ha sido
  lexicon: HALOT
  rationale: La construcción relativa con היה expresa 'lo que ha sido' o 'lo que fue'. 'Lo que ha sido' conserva la amplitud proverbial y suena natural en español, manteniendo el contraste con lo que vendrá.
- source_word: הוּא שֶׁיִּהְיֶה
  english_pob_choice: is what will be
  chosen_spanish: eso será
  alternatives_spanish:
  - eso es lo que será
  - será lo que será
  lexicon: HALOT
  rationale: El pronombre más la relativa forman una ecuación sentenciosa. 'Eso será' reproduce la brevedad y el paralelismo del hebreo sin forzar una estructura más pesada en español.
- source_word: וּמַה שֶׁנַּעֲשָׂה
  english_pob_choice: and what has been done
  chosen_spanish: y lo que ha sido hecho
  alternatives_spanish:
  - y lo que fue hecho
  - y lo que se ha hecho
  lexicon: HALOT
  rationale: El nifal de עשה lleva aquí matiz pasivo/resultativo. 'Ha sido hecho' preserva esa pasividad mejor que una forma activa o impersonal menos precisa.
- source_word: הוּא שֶׁיֵּעָשֶׂה
  english_pob_choice: is what will be done
  chosen_spanish: eso será hecho
  alternatives_spanish:
  - eso será hecho otra vez
  - eso se hará
  lexicon: HALOT
  rationale: Se mantiene el patrón pasivo del segundo miembro. 'Será hecho' refleja con claridad el valor de futuro pasivo del hebreo y conserva el eco del paralelismo anterior.
- source_word: וְאֵין כָּל חָדָשׁ
  english_pob_choice: and there is nothing new
  chosen_spanish: y no hay nada nuevo
  alternatives_spanish:
  - y no existe nada nuevo
  - y nada es nuevo
  lexicon: HALOT
  rationale: '''אין + כל + adjetivo'' funciona como una negación existencial idiomática. ''No hay nada nuevo'' es la forma más natural y fiel en español.'
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  lexicon: HALOT
  rationale: En Eclesiastés es un modismo clave para el ámbito de la vida humana observable. 'Bajo el sol' conserva el valor idiomático y la resonancia tradicional del libro en español.
theological_decisions:
- issue: Alcance de la afirmación sobre la novedad
  english_pob_reading: A general observation about recurring patterns in earthly life, without importing an absolute metaphysical denial of all novelty.
  chosen_spanish_reading: Una observación general sobre los patrones recurrentes de la vida humana 'bajo el sol', sin convertirla en una negación metafísica absoluta de toda novedad.
  alternative_spanish_readings:
  - Una negación absoluta de que pueda existir cualquier novedad
  - Una afirmación de que todo es estrictamente idéntico en todos los sentidos
  rationale: El modismo delimita el alcance de la sentencia al ámbito de la experiencia humana visible. La traducción mantiene la fuerza universal del proverbio sin resolver la tensión interpretativa del texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el tramo revisado más reciente: no se registraron cambios posteriores y el cotejo final quedó en alta concordancia.'
  spanish_consistency_notes:
  - Se conserva 'bajo el sol' para el modismo de Eclesiastés, en línea con la equivalencia auditada en inglés.
  - Se mantiene el pasivo en 'ha sido hecho' / 'será hecho' para reflejar el nifal de עשה sin volverlo activo.
  - '''Lo que ha sido'' reproduce el valor proverbial de la relativa hebrea sin endurecerla a una formulación más filosófica de lo necesario.'
