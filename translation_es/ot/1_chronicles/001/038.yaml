translation:
  language: es
  text: 'Y los hijos de Seír: Lotán[a], Sobal, Zibeón, Aná, Disón, Ezer y Disán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de» puede denotar hijos directos o, más ampliamente en contextos genealógicos, descendientes o miembros del clan. Aquí se conserva la formulación genealógica formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: בְּנֵי en contexto genealógico introduce una lista de descendencia; en español, «hijos de» conserva mejor la forma genealógica que una paráfrasis. La conjunción ו se rinde como «Y» para mantener la continuidad enumerativa.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seír
  alternatives_spanish:
  - Seir
  lexicon: HALOT
  rationale: Nombre propio transliterado; se usa acentuación española para facilitar la pronunciación sin alterar el nombre.
- source_word: לוֹטָן
  english_pob_choice: Lotan
  chosen_spanish: Lotán
  alternatives_spanish:
  - Lotan
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma transliterada y se acentúa según el patrón ortográfico español para nombres bíblicos.
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Shobal
  alternatives_spanish:
  - Sobal
  lexicon: HALOT
  rationale: Nombre propio; se mantiene una transliteración reconocible y cercana al hebreo, sin necesidad de adaptar más allá de la lectura española.
- source_word: צִבְעוֹן
  english_pob_choice: Zibeon
  chosen_spanish: Zibeón
  alternatives_spanish:
  - Zibeon
  - Zib'eón
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la transliteración tradicional «Zibeón», que resulta legible en español y distingue bien el nombre dentro de la lista.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Anah
  alternatives_spanish:
  - Ana
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma conocida por transliteración, evitando una adaptación que podría confundirse con el nombre común «Ana».
- source_word: דִישֹׁן
  english_pob_choice: Dishon
  chosen_spanish: Dishón
  alternatives_spanish:
  - Dishon
  lexicon: HALOT
  rationale: Nombre propio; se translitera con acento español para claridad fonética y para mantener la distinción respecto del nombre siguiente, morfológicamente distinto en hebreo.
- source_word: אֵצֶר
  english_pob_choice: Ezer
  chosen_spanish: Ezer
  alternatives_spanish:
  - Etser
  lexicon: HALOT
  rationale: Nombre propio; se conserva una transliteración simple y reconocible. La grafía «Ezer» sigue la convención inglesa del audit trail y funciona bien en español.
- source_word: דִישָׁן
  english_pob_choice: Dishan
  chosen_spanish: Dishán
  alternatives_spanish:
  - Dishan
  lexicon: HALOT
  rationale: Nombre propio; se translitera de modo consistente con «Dishón», manteniendo la diferencia entre ambos nombres hebreos.
theological_decisions:
- issue: Alcance genealógico de «hijos de»
  english_pob_reading: Hebrew 'sons of' can denote direct sons or, more broadly in genealogical contexts, descendants/clan members. Here the formal genealogical wording is retained.
  chosen_spanish_reading: «hijos de» se mantiene como fórmula genealógica formal, sin precisar si son hijos directos o descendientes/clanes.
  alternative_spanish_readings:
  - descendientes de
  - clan de
  rationale: El hebreo permite un alcance más amplio que la filiación biológica inmediata. En español, conservar «hijos de» retiene la ambigüedad documentada sin imponer una lectura más interpretativa.
  doctrine_reference: Genealogías bíblicas y uso flexible de בְּנֵי en contextos de linaje.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español, en el primer nombre de la lista, y se mantuvo la lectura genealógica formal del hebreo con transliteraciones consistentes.
  spanish_consistency_notes:
  - Se preserva la estructura nominal breve y enumerativa del hebreo.
  - Se usan acentos españoles solo donde ayudan a la lectura de nombres propios sin alterar la transliteración.
  - Se mantiene la distinción entre Dishón y Dishán para reflejar la diferencia hebrea.
  - «Y los hijos de» reproduce la continuidad de la cadena genealógica sin añadir glosas al cuerpo del versículo.
