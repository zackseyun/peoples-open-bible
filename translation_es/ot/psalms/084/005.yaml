translation:
  language: es
  text: Bienaventurados los que habitan en tu casa[a]; todavía te alabarán[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuán bienaventurados son los que habitan en tu casa.»'
    reason: lexical_alternative
  - marker: b
    text: Probablemente «tu casa» se refiere al santuario o templo de Dios.
    reason: cultural_note
  - marker: c
    text: «Selah» es un término hebreo litúrgico o musical de sentido incierto, que tradicionalmente se deja sin traducir.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Cuán bienaventurados
  lexicon: HALOT
  rationale: El hebreo introduce una bienaventuranza. «Bienaventurados» conserva el tono solemne y bíblico sin reducirlo al estado emocional de «felices».
- source_word: יוֹשְׁבֵי
  english_pob_choice: those who dwell
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los que moran
  - los moradores
  lexicon: HALOT
  rationale: El participio expresa residencia continua. «Habitan» comunica bien esa permanencia en español actual y mantiene el matiz de morar de forma estable.
- source_word: בֵיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu templo
  - tu morada
  lexicon: HALOT
  rationale: Se sigue el valor literal de «casa» para preservar la imagen del hebreo. En el contexto salmódico, el referente puede ser el santuario de Dios, pero el texto hebreo no lo especifica aquí.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - siempre
  lexicon: HALOT
  rationale: «Todavía» transmite la idea de continuidad o persistencia de forma natural en español y acompaña bien el valor aspectual del verso.
- source_word: יְהַלְל֥וּ/ךָ
  english_pob_choice: they will ... praise you
  chosen_spanish: te alabarán
  alternatives_spanish:
  - te seguirán alabando
  - te alaban
  lexicon: HALOT
  rationale: El imperfecto puede leerse con fuerza futura o habitual. «Te alabarán» conserva la apertura temporal del hebreo; el objeto pronominal se naturaliza en español con el complemento directo marcado por «te».
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque el término es litúrgico/musical y su sentido exacto es incierto; no conviene sustituirlo por una glosa interpretativa.
theological_decisions:
- issue: Referente de «tu casa»
  english_pob_reading: God's house likely refers to God's sanctuary or temple, while the main text keeps the literal wording.
  chosen_spanish_reading: «tu casa» se conserva literalmente en el texto principal, sin cerrar el referente a «templo».
  alternative_spanish_readings:
  - tu templo
  - tu santuario
  rationale: La ambigüedad es parte del texto hebreo y permite la imagen poética de pertenencia y servicio en la morada de Dios. La traducción literal evita restringir el alcance del verso más de lo que permite el original.
  doctrine_reference: Salmo 84:5; uso poético del santuario en los Salmos
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hilo del auditorio inglés sin depender mecánicamente de él: conserva la bienaventuranza, el matiz continuo de la residencia, el futuro/habitual de la alabanza y la transliteración de Selah. No se introdujeron cambios de sentido ni ampliaciones explicativas fuera de lo que el hebreo y el expediente inglés sustentan.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma general en el proyecto, pero aquí el hebreo usa el posesivo de segunda persona y no aparece el nombre divino explícito.
  - Se evita «SEÑOR» para no ocultar el referente del posesivo en el hebreo.
  - «Habitan» y no «sientan» o «se quedan» para reflejar residencia estable.
  - «Selah» permanece sin traducir por consistencia con el tratamiento POB de términos litúrgicos inciertos.
