  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Espíritu» se conserva adecuadamente. La principal cuestión léxica es la preposición de לְאָדָם: el inglés POB documentó alternativas («a», «con») y conviene preservarlas en una nota española.'
