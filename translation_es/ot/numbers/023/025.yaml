lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se refleja de manera natural en español con «Y ... dijo», conservando el flujo secuencial sin añadir un matiz temporal no explicitado por el hebreo.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: Transliteración estándar del nombre propio
  rationale: En español bíblico es usual la forma «Balac»; se mantiene como nombre propio transparente y legible para la audiencia hispana.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección se vierte con el equivalente idiomático español «a».
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva la forma ampliamente reconocible «Balaam», adecuada para el nombre del personaje.
- source_word: גַּם קֹב לֹא תִקֳּבֶנּוּ
  english_pob_choice: Neither curse him at all
  chosen_spanish: No lo maldigas en absoluto
  alternatives_spanish:
  - De ningún modo lo maldigas
  - Ni lo maldigas en absoluto
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto más verbo finito para intensificar la prohibición. En español, «en absoluto» transmite bien esa fuerza enfática sin endurecer el estilo ni volverlo antinatural.
- source_word: בָּרֵךְ לֹא תְבָרֲכֶנּוּ
  english_pob_choice: nor bless him at all
  chosen_spanish: ni lo bendigas en absoluto
  alternatives_spanish:
  - y no lo bendigas en absoluto
  - ni lo bendigas
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera cláusula y el valor prohibitivo enfático. «Ni» reproduce de forma natural el enlace negativo coordinado del contexto.
theological_decisions:
- issue: Fuerza enfática del infinitivo absoluto + verbo finito
  english_pob_reading: Strong emphasis rendered with repeated "at all" in both clauses.
  chosen_spanish_reading: «En absoluto» en ambas cláusulas para reflejar la prohibición intensificada.
  alternative_spanish_readings:
  - «De ningún modo»
  - «No ... en absoluto»
  rationale: El hebreo no solo prohíbe, sino que intensifica la prohibición. El español necesita una marca equivalente que preserve esa tensión retórica sin sobrerregularizarla.
  doctrine_reference: Énfasis retórico hebreo; no implica doctrina adicional
- issue: Dirección del mandato de Balac a Balaam
  english_pob_reading: Direct speech with imperative/prohibitive force.
  chosen_spanish_reading: 'Imperativo negativo directo: «No lo maldigas ... ni lo bendigas ...».'
  alternative_spanish_readings:
  - «No has de maldecirlo ...»
  - «No maldigas ...»
  rationale: El contexto exige un mandato directo y urgente. El imperativo negativo en español comunica mejor la fuerza de la escena que una perífrasis menos inmediata.
  doctrine_reference: Narrativa histórica; no aplica una decisión doctrinal
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el audit trail en inglés, manteniendo la estructura prohibitiva enfática. Se evita añadir conectores como «entonces» que no están en el מקור/source, y se conserva el paralelismo de ambas cláusulas con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Balac» como forma española tradicional y «Balaam» como nombre ampliamente reconocido; ambas son compatibles con la transparencia del texto.
  - «En absoluto» conserva el valor enfático del infinitivo absoluto + verbo finito sin introducir una paráfrasis extensa.
  - Se mantiene el pronombre objeto átono «lo» para el referente masculino singular, en paralelo en ambas cláusulas.
