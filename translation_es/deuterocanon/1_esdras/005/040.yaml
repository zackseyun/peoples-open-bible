translation:
  language: es
  text: Y Nehemías y Atharías les dijeron que no participaran en las cosas sagradas hasta que se levantara un sacerdote vestido con el Urim y el Tumim[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, el griego «la Manifestación y la Verdad» se entiende como referencia a los objetos sacerdotales conocidos en el paralelo hebreo como el Urim y el Tumim.
    reason: alternative_reading
  - marker: b
    text: Es decir, no debían participar de las provisiones sagradas sacerdotales hasta que un sacerdote calificado pudiera dar una decisión definitiva.
    reason: cultural_note
lexical_decisions:
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: told them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les comunicó
  lexicon: BDAG
  rationale: En español, «les dijo» comunica de manera natural la acción de dirigirse a ellos con una instrucción, sin añadir matiz ajeno al griego.
- source_word: Ναιμίας
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Naimías
  lexicon: Nombre propio tradicional
  rationale: Se usa la forma española establecida para el nombre, concordante con el contexto paralelo de Nehemías y con la convención bíblica en español.
- source_word: Ἀθαρίας
  english_pob_choice: Atharias
  chosen_spanish: Atharías
  alternatives_spanish:
  - Atarías
  - Azarías
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma cercana al griego, adaptada a la ortografía española con acento. Se evita armonizar directamente con Azarías porque eso desplazaría el testimonio griego.
- source_word: μὴ μετέχειν
  english_pob_choice: not to partake
  chosen_spanish: que no participaran
  alternatives_spanish:
  - que no comieran
  - que no tuvieran parte
  lexicon: BDAG
  rationale: «Participaran» reproduce bien la idea de tomar parte en una provisión sagrada sin especificar indebidamente el acto concreto de comer, aunque el contexto lo sugiera.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de las cosas sagradas
  - de los bienes santos
  lexicon: BDAG
  rationale: Se mantiene el plural y la amplitud cultual del griego. «Las cosas santas» es claro en español y no fuerza una especificación que el texto griego no explicita.
- source_word: ἕως ἀναστῇ
  english_pob_choice: until ... should arise
  chosen_spanish: hasta que se levantara
  alternatives_spanish:
  - hasta que surgiera
  - hasta que apareciera
  lexicon: BDAG
  rationale: «Se levantara» conserva el valor de surgimiento/aparición futura del aoristo subjuntivo en un español natural y sobrio.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - un sacerdote
  - un presbítero
  lexicon: BDAG
  rationale: «Sacerdote» es el equivalente directo y adecuado para ἱερεύς en este contexto levítico/cúltico.
- source_word: ἐνδεδυμένος
  english_pob_choice: clothed with
  chosen_spanish: vestido con
  alternatives_spanish:
  - clotado con
  - cubierto con
  lexicon: BDAG
  rationale: «Vestido con» es la opción más natural en español y preserva la imagen de estar revestido de algo distintivo.
- source_word: τὴν δήλωσιν
  english_pob_choice: the Urim
  chosen_spanish: el Urim
  alternatives_spanish:
  - la Manifestación
  - la revelación
  lexicon: LSJ
  rationale: Aunque el griego literal sugiere «manifestación» o «declaración», el propio audit trail inglés optó finalmente por la identificación técnica tradicional. En español, «el Urim» funciona como término cultual conocido y evita oscurecer el referente sacerdotal.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the Thummim
  chosen_spanish: el Tumim
  alternatives_spanish:
  - la Verdad
  - la perfección
  lexicon: BDAG
  rationale: Se sigue la identificación tradicional paralela con el segundo objeto sacerdotal. «Tumim» conserva el nombre técnico sin reemplazarlo por una traducción interpretativa menos precisa.
theological_decisions:
- issue: Cómo representar la pareja sacerdotal δήλωσις καὶ ἀλήθεια
  english_pob_reading: The Urim and the Thummim
  chosen_spanish_reading: el Urim y el Tumim
  alternative_spanish_readings:
  - la Manifestación y la Verdad
  - la revelación y la verdad
  rationale: Para esta unidad, la identificación tradicional de los objetos sacerdotales es la opción más auditable y más reconocible en español, dado que el propio contexto paralelo hebreo apunta a esa pareja. Se conserva la referencia técnica en vez de sustituirla por una glosa abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 5; uso contextual del paralelo hebreo en 1 Esdras.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail inglés, que prefirió la identificación tradicional de los términos sacerdotales como «Urim y Tumim» en lugar de una traducción semántica. Por eso la redacción principal en español sigue esa decisión y traslada la nota explicativa al aparato de notas.
  spanish_consistency_notes:
  - Se mantuvo «Nehemías» para armonizar con el nombre bíblico usual en español, y «Atharías» como transliteración cercana al griego.
  - Se conservó el plural de «las cosas santas» para reflejar τῶν ἁγίων sin reducirlo a una sola provisión específica.
  - La fórmula «se levantara» comunica adecuadamente el matiz futuro-contingente de ἕως ἀναστῇ.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
