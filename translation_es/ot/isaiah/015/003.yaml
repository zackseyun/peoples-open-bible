translation:
  language: es
  text: En sus calles se vistieron de saco; en sus azoteas y en sus plazas todos gimieron, descendiendo en llanto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendiendo en lágrimas». El hebreo dice literalmente «bajando en llanto», una imagen que puede sugerir tanto descenso físico como abatimiento por el dolor.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחוּצֹתָיו
  english_pob_choice: in its streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus plazas exteriores
  - en sus lugares abiertos
  lexicon: HALOT
  rationale: חוּץ designa el espacio exterior o abierto de una ciudad; en este contexto urbano, «calles» comunica de forma natural el escenario público del lamento sin perder el sentido de espacio expuesto.
- source_word: חָגְרוּ שָׂק
  english_pob_choice: they put on sackcloth
  chosen_spanish: se vistieron de saco
  alternatives_spanish:
  - se ciñeron de saco
  - llevaron saco
  lexicon: HALOT
  rationale: חגר literalmente es «ceñir/ajustar», pero con שַׂק funciona como idiomático de ponerse ropa de duelo. «Se vistieron de saco» mantiene la acción sin sonar arcaico.
- source_word: גַּגּוֹתֶיהָ
  english_pob_choice: on its rooftops
  chosen_spanish: en sus azoteas
  alternatives_spanish:
  - sobre sus tejados
  - en sus techos
  lexicon: HALOT
  rationale: גַּגּוֹת son techos planos o azoteas; «azoteas» conserva la imagen pública y elevada del duelo mejor que un equivalente más general.
- source_word: וּבִרְחֹבֹתֶיהָ
  english_pob_choice: and in its squares
  chosen_spanish: y en sus plazas
  alternatives_spanish:
  - y en sus espacios abiertos
  - y en sus explanadas
  lexicon: HALOT
  rationale: רְחוֹבוֹת refiere a espacios públicos amplios dentro de la ciudad. «Plazas» ayuda a distinguirlo de חוּצוֹת, que ya se tradujo como calles.
- source_word: כֻּלֹּה
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todo el pueblo
  - cada uno
  lexicon: HALOT
  rationale: Aunque la forma es singular, el contexto distribuye la acción entre los habitantes de la ciudad. «Todos» preserva esa fuerza colectiva de modo natural en español.
- source_word: יְיֵלִיל
  english_pob_choice: wails
  chosen_spanish: se lamentan
  alternatives_spanish:
  - gimen
  - aúllan
  lexicon: HALOT
  rationale: ילל expresa un llanto fuerte y quejumbroso. «Se lamentan» mantiene el tono de duelo público sin connotaciones demasiado animales o demasiado coloquiales.
- source_word: יֹרֵד בַּבֶּכִי
  english_pob_choice: going down in weeping
  chosen_spanish: descendiendo en llanto
  alternatives_spanish:
  - bajando en llanto
  - descendiendo con llanto
  lexicon: HALOT
  rationale: El participio יֹרֵד conserva la imagen de descenso, y בֶּכִי es «llanto». «Descendiendo en llanto» sigue de cerca la metáfora hebrea sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: La imagen final puede aludir tanto a un descenso físico como a quedar abrumados por el dolor.
  english_pob_reading: going down in weeping, with a footnote preserving the ambiguity between physical descent and being overcome with grief.
  chosen_spanish_reading: descendiendo en llanto, manteniendo la imagen abierta.
  alternative_spanish_readings:
  - bajando entre lágrimas
  - hundiéndose en llanto
  rationale: El hebreo permite una imagen concreta de movimiento hacia abajo y, a la vez, una metáfora de abatimiento. La traducción conserva esa tensión sin resolverla de manera excesiva.
  doctrine_reference: No doctrinal issue; literary/semantic ambiguity in the Hebrew
- issue: El pasaje presenta duelo público generalizado en la ciudad, sin especificar líderes o grupos particulares.
  english_pob_reading: everyone wails
  chosen_spanish_reading: todos se lamentan
  alternative_spanish_readings:
  - la gente entera se lamenta
  - todos lloran
  rationale: La forma hebrea es distributiva y colectiva. «Todos se lamentan» preserva la universalidad del lamento sin añadir sujetos o matices no presentes en el texto.
  doctrine_reference: No doctrinal issue; communal lament imagery
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de Isaías 15:3 y conserva la distinción entre חוּצוֹת («calles») y רְחוֹבוֹת («plazas/espacios públicos amplios»). También mantiene la imagen final de descenso en llanto que la traducción inglesa ya había preservado con nota, sin resolver la ambigüedad.
  spanish_consistency_notes:
  - Se prefirió «saco» y no «cilicio» para corresponder al objeto concreto del hebreo שַׂק.
  - 'Se mantuvo la progresión espacial: calles → azoteas → plazas, para reflejar la ampliación del lamento en toda la ciudad.'
  - «Se lamentan» conserva el campo semántico de duelo intenso de יְיֵלִיל sin sobreinterpretar como un sonido animal.
