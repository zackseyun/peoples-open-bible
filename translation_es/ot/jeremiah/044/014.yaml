translation:
  language: es
  text: Así no habrá fugitivo ni sobreviviente para el remanente de Judá, de los que han venido a habitar allí en la tierra de Egipto y a volver a la tierra de Judá, a la cual están elevando su alma[a] para volver y habitar allí; porque no volverán, excepto algunos fugitivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «elevar su alma»; es decir, anhelar o poner su deseo en volver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּלִיט
  english_pob_choice: fugitive
  chosen_spanish: fugitivo
  alternatives_spanish:
  - escapado
  - el que escapa
  lexicon: HALOT
  rationale: En este contexto de juicio, el término designa a quien ha escapado; «fugitivo» conserva la fuerza léxica y combina bien con «sobreviviente». Además mantiene la coherencia con el plural final פְּלֵטִים, que también apunta a personas que logran escapar.
- source_word: שָׂרִיד
  english_pob_choice: survivor
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - restante
  - el que queda con vida
  lexicon: HALOT
  rationale: «Sobreviviente» es natural en español y preserva la distinción respecto de פָּלִיט. Evita una paráfrasis más larga que debilitaría el paralelismo del hebreo.
- source_word: שְׁאֵרִית יְהוּדָה
  english_pob_choice: the remnant of Judah
  chosen_spanish: el remanente de Judá
  alternatives_spanish:
  - el resto de Judá
  lexicon: HALOT
  rationale: «Remanente» es el equivalente bíblico más estable para שְׁאֵרִית y conserva el valor descriptivo del grupo. Aquí no se carga con una lectura teológica positiva que el contexto de juicio no respalda.
- source_word: הַבָּאִים לָגוּר שָׁם
  english_pob_choice: who have come to sojourn there
  chosen_spanish: de los que han venido a habitar allí
  alternatives_spanish:
  - de los que han venido a sojornar allí
  - de los que han venido a residir allí como forasteros
  lexicon: HALOT
  rationale: La forma participial indica gente que ya ha venido; por eso «han venido». Para לָגוּר, «habitar» comunica la residencia sin introducir un arcaísmo pesado; el matiz de estancia como forasteros queda implícito por el contexto y por la referencia a Egipto.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión plena «tierra de Egipto» porque אֶרֶץ está explícito en el hebreo y refuerza el tono formal del oráculo.
- source_word: וְלָשׁוּב אֶרֶץ יְהוּדָה
  english_pob_choice: and to return to the land of Judah
  chosen_spanish: y a volver a la tierra de Judá
  alternatives_spanish:
  - y a regresar a la tierra de Judá
  lexicon: HALOT
  rationale: «Volver» sigue de cerca el verbo hebreo y encaja bien con la construcción de propósito. «Tierra de Judá» conserva la formulación territorial explícita del texto.
- source_word: אֲשֶׁר הֵמָּה מְנַשְּׂאִים אֶת נַפְשָׁם
  english_pob_choice: to which they are lifting up their soul
  chosen_spanish: a la cual están elevando su alma
  alternatives_spanish:
  - a la cual están alzando su alma
  - a la cual anhelan volver
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de «levantar/elevar el alma» para no borrar la metáfora hebrea. «Elevar» resulta claro y digno en español, y preserva la tensión entre imagen literal y sentido de deseo.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - deseo
  lexicon: HALOT
  rationale: En este modismo, «alma» comunica de forma natural la interioridad/aspiración expresada por נֶפֶשׁ. La alternativa interpretativa «deseo» se deja implícita por el contexto, sin suprimir la metáfora.
- source_word: לָשׁוּב לָשֶׁבֶת שָׁם
  english_pob_choice: to return and dwell there
  chosen_spanish: para volver y habitar allí
  alternatives_spanish:
  - para regresar y vivir allí
  - para volver y establecerse allí
  lexicon: HALOT
  rationale: «Habitar» mantiene un registro digno y se ajusta al paralelismo de los infinitivos hebreos. «Para» expresa bien el propósito de la aspiración mencionada.
- source_word: כִּי לֹא יָשׁוּבוּ
  english_pob_choice: for they will not return
  chosen_spanish: porque no volverán
  alternatives_spanish:
  - pues no regresarán
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la afirmación anterior; «porque» es natural en español y conserva la relación causal sin cambiar el sentido.
- source_word: כִּי אִם פְּלֵטִים
  english_pob_choice: except for fugitives
  chosen_spanish: sino fugitivos
  alternatives_spanish:
  - excepto fugitivos
  - salvo fugitivos
  lexicon: HALOT
  rationale: El hebreo marca una excepción. En español, «sino fugitivos» reproduce la oposición y mantiene la concisión del cierre; la conexión con פָּלִיט refuerza la coherencia léxica.
theological_decisions:
- issue: Si «remanente de Judá» debe sonar como un remanente teológico fiel o solo como un grupo sobreviviente
  english_pob_reading: Rendered as 'the remnant of Judah' in a descriptive-historical sense without implying a faithful remnant theology.
  chosen_spanish_reading: «el remanente de Judá» en sentido descriptivo-histórico, sin cargarlo con una teología de fidelidad no afirmada aquí.
  alternative_spanish_readings:
  - «el remanente fiel de Judá»
  - «el resto escogido de Judá»
  rationale: El contexto es un anuncio de juicio sobre los judíos que han ido a Egipto. La frase nombra al grupo que queda, no lo elogia ni lo identifica como remanente fiel. La traducción preserva el término bíblico sin importar una lectura doctrinal ajena al pasaje.
  doctrine_reference: 'Principio POB: no importar afirmaciones doctrinales que el texto no haga explícitas.'
- issue: Si el modismo «levantar el alma» debe explicitarse como «anhelar» o conservarse más literalmente
  english_pob_reading: Preserved as 'lifting up their soul' in the main text with a footnote explaining the idiom as longing or setting desire.
  chosen_spanish_reading: Conservar la metáfora «elevar su alma» y explicar su sentido en nota.
  alternative_spanish_readings:
  - «anhelan volver»
  - «desean volver»
  - «ponen su deseo en volver»
  rationale: La imagen hebrea es expresiva y auditable; en español puede entenderse sin perder inteligibilidad. La nota permite al lector ver que se trata de un modismo de deseo, sin reemplazar la expresión original por una paráfrasis.
  doctrine_reference: 'Principio POB: preservar metáforas fuente cuando son comprensibles y notables.'
translation_notes:
  revision_awareness: Seguí la revisión más reciente del expediente inglés, que corrigió la referencia temporal de 'are coming' a 'have come' para reflejar mejor el participio hebreo. También mantuve la decisión auditada de conservar el modismo de «levantar/elevar el alma» en el texto principal, con explicación en nota. El cierre se tradujo con una excepción breve y natural en español, sin perder la relación entre פָּלִיט y פְּלֵטִים.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - «Remanente» se usa de manera consistente con el valor descriptivo del grupo, no como etiqueta teológica añadida.
  - «Fugitivo» aparece al inicio y al final para conservar la relación léxica del hebreo con פָּלִיט / פְּלֵטִים.
  - Se evitó el calco excesivo en «lugar de morar» o fórmulas arcaicas, pero se conservó el tono profético formal.
  - La nota a identifica claramente el modismo sin sustituirlo en el cuerpo del texto.
