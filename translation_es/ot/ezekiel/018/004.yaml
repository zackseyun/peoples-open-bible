translation:
  language: es
  text: He aquí[a], todas las vidas me pertenecen. La vida del padre es como la vida del hijo; ambas me pertenecen. La vida que peca, esa morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las almas son mías ... el alma que peca, esa morirá». El hebreo נֶפֶשׁ puede significar «alma», «vida», «ser» o «persona», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La interjección hebrea introduce una declaración enfática. «¡Mira!» reproduce el llamado de atención de manera natural y solemne en español contemporáneo.
- source_word: כָּל הַנְּפָשׁוֹת
  english_pob_choice: all lives
  chosen_spanish: Todas las vidas
  alternatives_spanish:
  - Todas las almas
  - Todas las personas
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar ‘vida’, ‘alma’, ‘ser’ o ‘persona’ según el contexto. Aquí el versículo habla de la pertenencia de todas las vidas a Yahvé; «vidas» preserva esa concreción sin imponer una antropología técnica de «alma».
- source_word: לִי הֵנָּה
  english_pob_choice: belongs to me
  chosen_spanish: me pertenecen
  alternatives_spanish:
  - son mías
  - son para mí
  lexicon: HALOT
  rationale: El hebreo expresa posesión directa. «Me pertenecen» comunica esa relación de propiedad de forma natural en español y mantiene la fuerza de la afirmación divina.
- source_word: כְּנֶפֶשׁ הָאָב וּכְנֶפֶשׁ הַבֵּן
  english_pob_choice: The life of the father is like the life of the son
  chosen_spanish: La vida del padre es como la vida del hijo
  alternatives_spanish:
  - Como la vida del padre, así también la vida del hijo
  - Como el alma del padre, así también el alma del hijo
  lexicon: HALOT
  rationale: La construcción comparativa establece igualdad de condición ante Dios. «La vida del padre... la vida del hijo» conserva el paralelismo hebreo y la repetición de נֶפֶשׁ sin forzar «alma» en español.
- source_word: הַנֶּפֶשׁ
  english_pob_choice: The life
  chosen_spanish: La vida
  alternatives_spanish:
  - El alma
  - La persona
  lexicon: HALOT
  rationale: El texto final vuelve a נֶפֶשׁ para el sujeto moral responsable. En español, «la vida» mantiene la continuidad léxica con las cláusulas anteriores y evita introducir una lectura filosófica ajena al contexto.
- source_word: הַחֹטֵאת
  english_pob_choice: who sins
  chosen_spanish: que peca
  alternatives_spanish:
  - que comete pecado
  - pecadora
  lexicon: HALOT
  rationale: El participio describe al que realiza la acción de pecar. «Que peca» conserva el valor verbal mejor que un sustantivo como «pecador».
- source_word: תָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - deberá morir
  lexicon: HALOT
  rationale: El imperfecto expresa el resultado/jucio anunciado. «Morirá» es claro, moderno y fiel sin añadir matices modales ajenos.
theological_decisions:
- issue: Cómo rendir נֶפֶשׁ en un versículo usado en debates sobre el alma
  english_pob_reading: Render נֶפֶשׁ contextually as 'life' in the possession clauses and 'person' in the accountability clause
  chosen_spanish_reading: Rendir נֶפֶשׁ de manera contextual como «vida» en las cláusulas de posesión y mantener «vida» en la cláusula final para conservar la repetición retórica del hebreo
  alternative_spanish_readings:
  - Usar «alma» en todo el versículo
  - Usar «persona» en la cláusula final
  rationale: El énfasis del pasaje es la pertenencia universal de las vidas a Yahvé y la responsabilidad individual ante el pecado. En español, «alma» podría sugerir de inmediato una antropología más estrecha o dualista; «vida» comunica el alcance concreto del hebreo y preserva la estructura repetida del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación de posesión divina expresada por לִי הֵנָּה
  english_pob_reading: belongs to me
  chosen_spanish_reading: me pertenecen
  alternative_spanish_readings:
  - son mías
  - son para mí
  rationale: La formulación afirma propiedad y soberanía divina sobre todas las vidas. «Me pertenecen» conserva ese peso teológico sin suavizarlo a mera pertenencia relacional.
  doctrine_reference: Ezequiel 18:4; soberanía divina sobre la vida humana
translation_notes:
  revision_awareness: Seguí el pasaje base y la revisión inglesa más reciente que reforzó la correspondencia con el plural de נְפָשׁוֹת y la repetición de נֶפֶשׁ. Por eso mantuve «Todas las vidas» y conservé «La vida que peca» en lugar de cambiar a «la persona» o «el alma», para no perder la estructura retórica del hebreo.
  spanish_consistency_notes:
  - Usé «Yahvé» conforme al criterio del proyecto para el nombre divino.
  - Mantuve «vida» para נֶפֶשׁ de forma consistente en todo el versículo, porque el contexto habla de vidas humanas bajo la soberanía de Dios.
  - Evité «alma» como equivalente uniforme para no introducir una carga doctrinal no explicitada por el hebreo.
  - Conservé el paralelismo del original con dos cláusulas de pertenencia y una cláusula final de juicio.
