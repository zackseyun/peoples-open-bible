translation:
  language: es
  text: Y Jonatán hizo jurar otra vez a David por el amor que le tenía[a], porque lo amó como a su propia alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jonatán continuó haciendo jurar a David» o «Jonatán puso otra vez a David bajo juramento».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque lo amó con el amor de su propia alma»; un modismo que expresa profunda devoción personal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  english_pob_choice: made ... again
  chosen_spanish: hizo ... otra vez
  alternatives_spanish:
  - continuó
  - añadió
  lexicon: HALOT
  rationale: El valor idiomático de יסף con infinitivo expresa repetición o renovación de la acción. En español, 'hizo ... otra vez' comunica con naturalidad que Jonatán renovó el juramento, sin perder la idea de reiteración.
- source_word: לְהַשְׁבִּיעַ
  english_pob_choice: made David swear
  chosen_spanish: hizo jurar a David
  alternatives_spanish:
  - causó que David jurara
  - puso a David bajo juramento
  lexicon: HALOT
  rationale: La forma causativa de שבע pide una construcción que exprese que Jonatán provoca el juramento. 'Hizo jurar a David' conserva esa fuerza causativa y suena natural en español bíblico contemporáneo.
- source_word: בְּאַהֲבָתוֹ אֹתוֹ
  english_pob_choice: by his love for him
  chosen_spanish: por su amor hacia él
  alternatives_spanish:
  - a causa de su amor por él
  - en su amor hacia él
  lexicon: HALOT
  rationale: La preposición ב aquí señala base o motivo. 'Por su amor hacia él' mantiene el carácter motivacional de la frase y evita forzar una lectura demasiado instrumental.
- source_word: אַהֲבַת נַפְשׁוֹ
  english_pob_choice: as his own soul
  chosen_spanish: como a su propia alma
  alternatives_spanish:
  - como a su propia vida
  - con el amor de su propia alma
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o ser. En este idiomático hebreo, 'como a su propia alma' preserva la imagen semítica y la intensidad del amor sin suavizarla a 'amistad'.
- source_word: אֲהֵבוֹ
  english_pob_choice: he loved him
  chosen_spanish: lo amaba
  alternatives_spanish:
  - lo había amado
  - lo amó
  lexicon: HALOT
  rationale: El qatal aquí funciona como base explicativa en la narración. El imperfecto narrativo español 'lo amaba' expresa bien el estado relacional continuo que sustenta el juramento renovado.
theological_decisions:
- issue: Intensidad y naturaleza del amor de Jonatán por David
  english_pob_reading: Rendered as covenantal personal love without importing romantic or sexual implications not explicit in the text.
  chosen_spanish_reading: Se conserva como amor personal intenso y de lealtad, sin añadir explícitamente una lectura romántica o sexual.
  alternative_spanish_readings:
  - amistad
  - afecto fraternal
  - amor romántico
  rationale: El hebreo repite אהב y debe mantenerse como 'amor' para no diluir su fuerza. Al mismo tiempo, el texto no exige introducir conjeturas sobre su carácter; la traducción conserva la tensión documental.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; No importar afirmaciones doctrinales que el texto no hace.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que simplificó la última cláusula para reflejar más directamente el hebreo. En español se reproduce esa economía con 'como a su propia alma', manteniendo el paralelismo idiomático y el registro formal.
  spanish_consistency_notes:
  - Se usa 'Jonatán' con acento gráfico según la forma española habitual.
  - Se evita 'SEÑOR' o terminología cultual ajena al versículo; no hay Tetragrámaton en este texto.
  - '''alma'' se conserva para נֶפֶשׁ por fidelidad al modismo, aunque en algunos contextos podría ser ''vida'' o ''ser''.'
  - Se mantiene 'amor' en vez de 'amistad' para no debilitar la reiteración léxica de אהב.
