  to: Así que Amasá fue a convocar a Judá[a], pero se demoró más allá del tiempo señalado que le había fijado.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre la decisión léxica relevante («convocar»), se mejora la naturalidad narrativa con «Así que», y se sustituye «se tardó» por «se demoró» para un español más claro y ampliamente idiomático, sin cambiar el sentido del hebreo ni del rastro inglés.
