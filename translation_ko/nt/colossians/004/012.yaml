id: COL.4.12
reference: Colossians 4:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς Ἐπαφρᾶς ὁ ἐξ ὑμῶν, δοῦλος ⸀Χριστοῦ, πάντοτε ἀγωνιζόμενος ὑπὲρ ὑμῶν ἐν ταῖς προσευχαῖς, ἵνα ⸀σταθῆτε τέλειοι καὶ ⸀πεπληροφορημένοι ἐν παντὶ θελήματι τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/012.yaml
  text: Epaphras, who is one of you, greets you—a slave of Messiah, always striving for you in his prayers, so that you may stand mature and fully assured in all the will of God.
translation:
  language: ko
  text: 여러분 가운데 한 사람이며 메시아의 노예[a]인 에바브라가 여러분에게 문안합니다. 그는 여러분이 하나님의 모든 뜻 안에서 성숙하고 충분히 확신한[b] 자로 굳게 서기를 바라며, 항상 자기 기도들 가운데 여러분을 위하여 분투하고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοῦλος. 메시아께 매여 헌신함을 가리키며, DOCTRINE.md에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「충분히 확신하여 견고히 선」. 헬라어 πληροφορέω는 충만한 확신·정착의 의미를 함께 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐξ ὑμῶν
  english_pob_choice: who is one of you
  chosen_korean: 여러분 가운데 한 사람
  alternatives_korean:
  - 여러분 중의 사람
  lexicon: BDAG
  rationale: 4:9와 어휘적 일관성.
- source_word: δοῦλος Χριστοῦ
  english_pob_choice: a slave of Messiah
  chosen_korean: 메시아의 노예
  alternatives_korean:
  - 메시아의 종
  - 그리스도의 노예
  lexicon: BDAG
  rationale: 자기 동일시적 「δοῦλος 칭호」 문맥에서 매임의 무게를 살려 「노예」로 옮긴다(DOCTRINE.md). Χριστός는 칭호 「메시아」.
- source_word: ἀγωνιζόμενος ὑπὲρ ὑμῶν ἐν ταῖς προσευχαῖς
  english_pob_choice: striving for you in his prayers
  chosen_korean: 자기 기도들 가운데 여러분을 위하여 분투하고
  alternatives_korean:
  - 그의 기도 가운데서 여러분을 위해 힘써 다투며
  lexicon: BDAG
  rationale: ἀγωνίζομαι의 「분투·다툼」 어감을 살린다(1:29와 일관).
- source_word: ἵνα σταθῆτε τέλειοι καὶ πεπληροφορημένοι
  english_pob_choice: so that you may stand mature and fully assured
  chosen_korean: 성숙하고 충분히 확신한 자로 굳게 서기를
  alternatives_korean:
  - 온전하고 충분히 확신된 자로 서기를
  lexicon: BDAG
  rationale: τέλειος를 「성숙」(1:28과 일관), πληροφορέω를 「충분히 확신함」으로 옮긴다.
- source_word: ἐν παντὶ θελήματι τοῦ θεοῦ
  english_pob_choice: in all the will of God
  chosen_korean: 하나님의 모든 뜻 안에서
  alternatives_korean:
  - 하나님의 모든 의지 안에서
  lexicon: BDAG
  rationale: 「하나님의 뜻」은 한국 교회의 정립된 표현.
theological_decisions:
- issue: δοῦλος → 「노예」(자기 정체 진술)
  chosen_reading: 노예
  alternative_readings:
  - 종
  rationale: 본 절은 에바브라의 메시아께 대한 전적 헌신을 「δοῦλος Χριστοῦ」 칭호로 진술한다. DOCTRINE.md의 매임 어감 보존 원칙을 따라 「노예」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for δοῦλος'
