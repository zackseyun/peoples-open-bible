translation:
  text: But a man is always fearful[a]; whom you know keeps the commandment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew here reads very differently, approximately: ''But a man is always afraid, whom you know as one who keeps the commandment.'' The Hebrew witness at this verse appears textually disturbed; the main translation follows the coherent Greek parallel.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀρχή / אך
  chosen: the beginning
  alternatives:
  - the first step
  - the outset
  lexicon: BDAG / HALOT
  rationale: The Hebrew in Zone 1 is textually problematic ('אך איש מפחד תמיד...') and marked major mismatch against the Greek parallel. The Greek parallel provides a coherent reading beginning with ἀρχή, which naturally means 'beginning' or 'first principle.' 'The beginning' best fits the proverb-like structure.
- source_word: παντὸς ἔργου
  chosen: of every work
  alternatives:
  - of every task
  - of every undertaking
  lexicon: BDAG
  rationale: ἔργον commonly means 'work' or 'deed.' Here, paired with πράξεως, 'work' preserves the distinction while remaining natural English.
- source_word: λόγος
  chosen: a word
  alternatives:
  - speech
  - discussion
  - plan
  lexicon: BDAG
  rationale: λόγος has a broad semantic range. In this wisdom context, it likely refers to spoken deliberation or verbal formulation preceding action. 'A word' is formally closer and preserves the aphoristic terseness; more interpretive options like 'plan' are possible but go beyond the immediate wording.
- source_word: πρὸ πάσης πράξεως
  chosen: before every deed
  alternatives:
  - before every action
  - before any undertaking
  lexicon: BDAG
  rationale: πρὸ marks temporal priority. πράξις is 'action' or 'deed.' 'Deed' gives a concise parallel to 'work' without collapsing the two terms into the same English gloss.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - deliberation
  - plan
  - purpose
  lexicon: BDAG
  rationale: βουλή in wisdom literature often denotes counsel, deliberation, or considered plan. 'Counsel' preserves both the internal-deliberative and advisory nuance and suits the proverb's emphasis on forethought.
