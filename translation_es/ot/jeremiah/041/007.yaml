translation:
  language: es
  text: Y cuando llegaron en medio de la ciudad, Ismael hijo de Netanías los degolló y los echó en medio del aljibe[a], él y los hombres que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pozo». El hebreo bor puede significar «pozo» o «cisterna/aljibe»; aquí el contexto inmediato favorece un depósito de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּבוֹאָם
  english_pob_choice: And when they came
  chosen_spanish: Y cuando llegaron
  alternatives_spanish:
  - Y aconteció que, cuando llegaron
  - Y sucedió que, cuando llegaron
  lexicon: HALOT
  rationale: La construcción hebrea introduce una secuencia temporal; en español, «Y cuando llegaron» conserva la relación de tiempo de forma natural y sin una fórmula más pesada que no añade contenido al texto.
- source_word: אֶל תּוֹךְ הָעִיר
  english_pob_choice: into the midst of the city
  chosen_spanish: al medio de la ciudad
  alternatives_spanish:
  - en medio de la ciudad
  - al interior de la ciudad
  lexicon: HALOT
  rationale: תּוֹךְ expresa la idea de interior/medio. «Al medio de la ciudad» mantiene el valor espacial fuerte de «into the midst» y resulta claro en español bíblico moderno.
- source_word: וַיִּשְׁחָטֵם
  english_pob_choice: slaughtered them
  chosen_spanish: los degolló
  alternatives_spanish:
  - los mató
  - los masacró
  lexicon: HALOT
  rationale: שׁחט denota matar por degüello o sacrificio; «degolló» conserva la violencia concreta y el matiz léxico mejor que un simple «mató». Evita también una palabra más interpretativa como «masacró».
- source_word: אֶל תּוֹךְ הַבּוֹר
  english_pob_choice: into the midst of the cistern
  chosen_spanish: al medio del aljibe
  alternatives_spanish:
  - al medio del pozo
  - al medio de la cisterna
  lexicon: HALOT
  rationale: En Jeremías 41, בּוֹר apunta al depósito/cavidad asociado al contexto inmediato. «Aljibe» comunica bien esa realidad concreta en español y conserva la imagen física de un receptáculo profundo; se mantiene «al medio de» para reflejar el repetido תּוֹךְ.
- source_word: הוּא וְהָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  english_pob_choice: he and the men who were with him
  chosen_spanish: él y los hombres que estaban con él
  alternatives_spanish:
  - él y los hombres que estaban con él mismo
  - él y los hombres que le acompañaban
  lexicon: HALOT
  rationale: La frase final identifica a Ismael junto con sus acompañantes. «Que estaban con él» es directo y fiel; «le acompañaban» sería posible, pero suaviza algo el enlace identificador del hebreo.
theological_decisions:
- issue: Valor de בּוֹר en el contexto narrativo
  english_pob_reading: cistern rather than pit, because the immediate context fits a water reservoir
  chosen_spanish_reading: aljibe más que pozo genérico
  alternative_spanish_readings:
  - pozo
  - cisterna
  rationale: El contexto de Jeremías 41 favorece un hueco/cavidad usado como depósito, no un pozo cualquiera. «Aljibe» conserva la especificidad concreta y evita la ambigüedad de «pozo» en español; «cisterna» sería igualmente defensible, pero «aljibe» es más idiomático y claro para la imagen física del pasaje.
  doctrine_reference: No aplica; decisión léxica contextual, no doctrinal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que añadió «the midst of» antes de «the cistern» para reflejar consistentemente el hebreo repetido תּוֹךְ. Por eso la traducción española conserva «al medio de» tanto para la ciudad como para el aljibe.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de תּוֹךְ con «al medio de» en ambos miembros de la frase.
  - Se eligió un registro bíblico claro y contemporáneo sin caer en calco rígido.
  - «Degolló» preserva la fuerza verbal de שׁחט sin introducir una interpretación adicional.
