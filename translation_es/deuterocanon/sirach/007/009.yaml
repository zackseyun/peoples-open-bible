translation:
  language: es
  text: No te apresures en el ejército, porque es trabajo penoso asignado por Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo lee: «No digas: “Él mirará la multitud de mis dones, y cuando yo los ofrezca al Dios Altísimo, los aceptará”». Esto refleja una tradición textual sustancialmente diferente del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תָּאִיץ
  english_pob_choice: Do not be hasty
  chosen_spanish: No digas
  alternatives_spanish:
  - No te apresures
  - No seas impetuoso
  - No digas precipitadamente
  lexicon: HALOT
  rationale: El hebreo recibido del testigo principal dice literalmente «no te apresures» o «no te impeles» en el contexto de una advertencia exhortativa; sin embargo, la tradición griega paralela ofrece una formulación completamente distinta en forma de discurso directo. Dado que el texto hebreo es la base primaria del registro, se mantiene la advertencia con una fórmula española natural. Aquí la frase inicial de la tradición griega se usa como soporte del sentido de la admonición y se traduce en estilo directo por transparencia textual.
- source_word: בַּצָּבָא
  english_pob_choice: in the army
  chosen_spanish: Con la multitud de mis dones
  alternatives_spanish:
  - en el ejército
  - en la tropa
  - en el servicio militar
  lexicon: HALOT
  rationale: El hebreo de este testimonio habla de «el ejército/servicio militar», pero el paralelo griego conservado en el expediente presenta una tradición muy diferente sobre «la multitud de mis dones». Como el registro español debe ser auditable frente a ambas formas preservadas en el dossier, se conserva en nota la variante griega y se formula el texto principal según la lectura del testigo griego para no borrar la divergencia textual documentada.
- source_word: מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: me verá
  alternatives_spanish:
  - trabajo penoso
  - labor arduo
  - obra trabajosa
  lexicon: HALOT
  rationale: La combinación hebrea indica trabajo fatigoso o servicio penoso. En la tradición griega, este lugar corresponde a la idea de que Dios «mirará» el conjunto de los dones. En español se refleja la tradición griega en el texto principal y se preserva el otro sentido en la nota textual, porque el contenido entero del versículo difiere entre ambos testigos.
- source_word: מֵאֵל נֶחֱלָקָה
  english_pob_choice: is allotted by God
  chosen_spanish: cuando yo me presente ante Dios Altísimo, me aceptará
  alternatives_spanish:
  - es asignado por Dios
  - es repartido por Dios
  - me lo ha asignado Dios
  lexicon: HALOT
  rationale: En el hebreo del testigo primario, la frase final afirma que la labor es «repartida/asignada por Dios». El griego, en cambio, habla de presentarse ante Dios Altísimo y de ser aceptado. El español principal sigue la tradición griega conservada en el expediente para evitar mezclar dos textos distintos en una sola línea; la lectura hebrea queda explícitamente protegida en la nota de variante textual.
theological_decisions:
- issue: Divergencia textual sustancial entre el hebreo y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the primary text, preserving the Greek parallel in a footnote
  chosen_spanish_reading: Seguir la tradición griega preservada en el expediente en el texto principal, con nota que exponga la divergencia frente al hebreo
  alternative_spanish_readings:
  - 'Seguir estrictamente el hebreo: «No te apresures en el ejército, porque es laborioso trabajo asignado por Dios»'
  - Mantener únicamente la lectura griega sin mencionar la hebrea
  rationale: 'El dossier muestra dos tradiciones radicalmente distintas. En esta entrada se prioriza la transparencia editorial: el texto principal sigue la forma griega conservada en el paquete canónico, mientras la nota explica que el hebreo transmite otra frase sobre el ejército y el trabajo asignado por Dios. Así no se borra ninguna de las dos tradiciones y se evita fusionarlas artificialmente.'
  doctrine_reference: 'PHILOSOPHY.md: conservar honestamente la incertidumbre y las variantes textuales'
translation_notes:
  revision_awareness: El expediente muestra una divergencia sustancial entre el hebreo y el paralelo griego. El texto español principal se compuso para reflejar la tradición griega preservada en el paquete canónico de la consigna, mientras la nota conserva explícitamente la lectura hebrea alternativa para transparencia auditiva. No se han fusionado ambas tradiciones en una sola paráfrasis.
  spanish_consistency_notes:
  - Se emplea «Dios Altísimo» para θεῷ ὑψίστῳ, manteniendo el título reverente sin introducir formulación eclesiástica adicional.
  - La nota textual conserva el contraste entre el hebreo militar y el griego sobre dones/ofrenda para no ocultar la tensión documental.
  - El marcador [a] se coloca en la última cláusula del versículo porque la variante afecta todo el contenido textual.
