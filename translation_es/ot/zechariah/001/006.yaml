translation:
  language: es
  text: 'Pero, ¿no alcanzaron a sus padres mis palabras y mis estatutos, que yo mandé a mis siervos, los profetas[c]? Entonces se volvieron[a] y dijeron: «Tal como Yahvé de los Ejércitos[b] había planeado hacer con nosotros, conforme a nuestros caminos y conforme a nuestras obras, así ha tratado con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces se arrepintieron y dijeron». El verbo hebreo puede significar «se volvieron/regresaron» o, en contexto, «se arrepintieron».
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: «Yahvé de los Ejércitos» también se ha expresado como «el SEÑOR de los Ejércitos» o «el Señor de los ejércitos/huestes».'
    reason: lexical_alternative
  - marker: c
    text: O «que yo mandé por medio de mis siervos, los profetas». El hebreo también puede entenderse en ese sentido instrumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - No obstante
  lexicon: HALOT
  rationale: Introduce contraste con la idea previa de que los padres y los profetas no viven para siempre; «Pero» es natural en español y conserva la fuerza adversativa.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis mensajes
  lexicon: HALOT
  rationale: דבר en este contexto se refiere a lo dicho por Dios; «palabras» mantiene la referencia directa y transparente.
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֹק/חֻקָּה señala una prescripción establecida; «estatutos» conserva esa idea jurídica y es suficientemente claro en español bíblico moderno.
- source_word: צִוִּיתִי אֶת־עֲבָדַי הַנְּבִיאִים
  english_pob_choice: which I commanded my servants the prophets
  chosen_spanish: que yo mandé a mis siervos los profetas
  alternatives_spanish:
  - que yo mandé por medio de mis siervos los profetas
  - que yo encargué a mis siervos los profetas
  lexicon: HALOT
  rationale: El hebreo presenta a los profetas como los destinatarios comisionados; «mandé a mis siervos los profetas» sigue de cerca la sintaxis sin introducir más de lo que el texto dice.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis esclavos
  lexicon: HALOT
  rationale: En un contexto de comisión profética, «siervos» comunica bien la relación de servicio autorizado; «esclavos» sería demasiado fuerte y menos idiomático aquí.
- source_word: הִשִּׂיגוּ
  english_pob_choice: overtake
  chosen_spanish: alcanzaron
  alternatives_spanish:
  - dieron alcance a
  - alcanzaron y alcanzaron
  lexicon: HALOT
  rationale: El verbo expresa que las palabras/estatutos alcanzaron a los padres, es decir, que el juicio los alcanzó; «alcanzaron» conserva la imagen.
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: Then they turned back
  chosen_spanish: Entonces se volvieron
  alternatives_spanish:
  - Entonces regresaron
  - Entonces se arrepintieron
  lexicon: HALOT
  rationale: שוב puede significar volver o arrepentirse. «Se volvieron» mantiene la ambigüedad del hebreo y preserva la tensión teológica sin resolverla por adelantado.
- source_word: זָמַם
  english_pob_choice: planned
  chosen_spanish: había planeado
  alternatives_spanish:
  - había propuesto
  - había intentado
  lexicon: HALOT
  rationale: זמם denota intención deliberada; «había planeado» es claro y mantiene el matiz de propósito.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos
  - el SEÑOR de los Ejércitos
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה → «Yahvé». צְבָאוֹת se rinde por «de los Ejércitos», manteniendo la fuerza militar/cósmica del título.
- source_word: לַעֲשׂוֹת לָנוּ
  english_pob_choice: to do to us
  chosen_spanish: hacer con nosotros
  alternatives_spanish:
  - hacer a nosotros
  - obrar con nosotros
  lexicon: HALOT
  rationale: En español, la cita suena más natural con «hacer con nosotros», que conserva el sentido de trato o ejecución del juicio; el verbo siguiente aclara el resultado.
- source_word: כִּדְרָכֵינוּ
  english_pob_choice: according to our ways
  chosen_spanish: conforme a nuestros caminos
  alternatives_spanish:
  - según nuestros caminos
  - de acuerdo con nuestros caminos
  lexicon: HALOT
  rationale: דֶּרֶךְ en contexto moral se refiere al modo de vivir; «caminos» preserva el idiomático bíblico y el paralelismo.
- source_word: וּכְמַעֲלָלֵינוּ
  english_pob_choice: and according to our deeds
  chosen_spanish: y conforme a nuestras obras
  alternatives_spanish:
  - y conforme a nuestras acciones
  - y según nuestros hechos
  lexicon: HALOT
  rationale: מַעֲלָלִים son acciones con peso moral; «obras» es una contraparte natural de «caminos» y refleja el paralelismo del hebreo.
- source_word: עָשָׂה אִתָּנוּ
  english_pob_choice: he has dealt with us
  chosen_spanish: ha hecho con nosotros
  alternatives_spanish:
  - se ha portado con nosotros
  - ha tratado con nosotros
  lexicon: HALOT
  rationale: La clausula hebrea literalmente dice «ha hecho con nosotros»; se conserva esa cercanía léxica. «Ha hecho con nosotros» mantiene la relación con la cita previa y evita suavizar demasiado el juicio.
theological_decisions:
- issue: Si וַיָּשׁוּבוּ debe explicitar arrepentimiento
  english_pob_reading: Then they turned back
  chosen_spanish_reading: Entonces se volvieron
  alternative_spanish_readings:
  - Entonces se arrepintieron
  - Entonces regresaron
  rationale: El hebreo puede implicar arrepentimiento, pero el contexto solo afirma que reconocieron la justicia del juicio. Se preserva la tensión con una traducción más literal y ambigua.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide usar «Yahvé» en el texto principal para el Tetragrámaton. Se mantiene el nombre propio en lugar de una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si el título צְבָאוֹת debe tradicionalizarse o transparentarse
  english_pob_reading: the LORD of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos
  - de los Ejércitos celestiales
  rationale: «Ejércitos» mantiene la imagen de poder y evita la tradicionalización opaca de «de los ejércitos» como mero título eclesial; además, sigue el criterio de transparencia del proyecto.
  doctrine_reference: 'Translation philosophy §2: Retain source transparency where possible.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el expediente auditado en inglés. Se preserva la ambigüedad de וַיָּשׁוּבוּ, se mantiene el paralelismo entre caminos/obras y se evita resolver la relación entre palabras y estatutos más allá de lo que el texto exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con el criterio del proyecto.
  - «Siervos» se reserva para עֲבָדַי en contexto profético; no se sustituye por «esclavos».
  - «Estatutos» y «obras» mantienen un registro bíblico claro sin arcaizar excesivamente.
  - La puntuación de la cita reproduce el discurso directo y el paralelismo hebreo con claridad para lectura pública.
