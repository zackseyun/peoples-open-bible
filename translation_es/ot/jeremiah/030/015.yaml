translation:
  language: es
  text: ¿Por qué clamas por tu herida[a]? Tu dolor es incurable[b]. Porque tu iniquidad es grande, porque tus pecados son muchos, he hecho estas cosas a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tu lesión”, “tu fractura” o “tu quebranto”. El hebreo שֶׁבֶר puede abarcar ruptura, fractura o herida.
    reason: lexical_alternative
  - marker: b
    text: O “desesperado”, “grave” o “sin remedio”. El adjetivo hebreo puede significar enfermo de gravedad o más allá de curación; “incurable” expresa bien ese sentido probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: En este contexto interrogativo-retórico, “¿por qué?” reproduce mejor el valor discursivo de la pregunta que un simple “¿qué?”.
- source_word: תִּזְעַק
  english_pob_choice: do you cry out
  chosen_spanish: clamas
  alternatives_spanish:
  - gritas
  - clamas en voz alta
  lexicon: HALOT
  rationale: זעק expresa clamor intenso en aflicción. “Clamas” conserva el registro profético y la intensidad del grito de angustia, sin perder naturalidad en español.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - a causa de
  lexicon: HALOT
  rationale: En español, “llorar por” o “clamar por” expresa de manera natural el objeto de lamento. Aquí evita una calca de “sobre” y mantiene el sentido lamentoso.
- source_word: שִׁבְרֵךְ
  english_pob_choice: your injury
  chosen_spanish: tu herida
  alternatives_spanish:
  - tu lesión
  - tu quebranto
  - tu fractura
  lexicon: HALOT
  rationale: El hebreo puede referirse a ruptura, fractura o herida. “Herida” es un equivalente amplio y natural que conserva la imagen física del daño sin estrechar demasiado el término.
- source_word: אָנושׁ
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - desesperado
  - grave
  - sin remedio
  lexicon: HALOT
  rationale: El adjetivo describe algo enfermo o más allá de remedio. “Incurable” reproduce con precisión el juicio de imposibilidad de curación que el contexto sugiere.
- source_word: מַכְאֹבֵךְ
  english_pob_choice: your pain
  chosen_spanish: tu dolor
  alternatives_spanish:
  - tu sufrimiento
  - tu pena
  lexicon: HALOT
  rationale: מכאוב denota dolor o sufrimiento. “Dolor” es la equivalencia directa y funciona bien con “incurable” en español.
- source_word: עַל רֹב עֲוֺנֵךְ
  english_pob_choice: Because your iniquity is great
  chosen_spanish: Porque tu iniquidad es grande
  alternatives_spanish:
  - Porque es grande la abundancia de tu culpa
  - Por la magnitud de tu iniquidad
  lexicon: HALOT
  rationale: La preposición introduce la razón del juicio. “Iniquidad” mantiene el peso moral del término עוון, y “es grande” refleja רֹב como abundancia o magnitud.
- source_word: עָצְמוּ חַטֹּאתַיִךְ
  english_pob_choice: your sins are many
  chosen_spanish: porque tus pecados son muchos
  alternatives_spanish:
  - porque tus pecados han crecido mucho
  - porque tus pecados son poderosos
  lexicon: HALOT
  rationale: עָצְמוּ expresa fuerza o multiplicación; en este paralelismo causal, “son muchos” comunica mejor la abundancia de pecados en español bíblico contemporáneo.
- source_word: עָשִׂיתִי אֵלֶּה לָךְ
  english_pob_choice: I have done these things to you
  chosen_spanish: he hecho estas cosas contra ti
  alternatives_spanish:
  - he hecho estas cosas para ti
  - he hecho estas cosas a ti
  lexicon: HALOT
  rationale: La primera persona singular debe mantenerse para preservar la agencia divina. “Contra ti” capta el sentido judicial/adversativo de la frase en este contexto de juicio, mientras que “estas cosas” refleja el plural hebreo אֵלֶּה.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: The speaker, implicitly the LORD, says directly, 'I have done these things to you.'
  chosen_spanish_reading: He hecho estas cosas contra ti.
  alternative_spanish_readings:
  - He hecho estas cosas a ti.
  - Estas cosas te han sucedido.
  rationale: El hebreo usa primera persona singular; no se debe impersonalizar el juicio. “Contra ti” explicita el valor adversativo del contexto sin borrar la afirmación directa de acción divina.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con el juicio del audit trail inglés. Se conserva el paralelismo causal (“Porque... porque...”) y la primera persona divina. La principal adaptación al español es el uso natural de “clamas por” en lugar de una calca de la preposición hebrea.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el nombre divino aparece explícitamente; aquí el verso no lo incluye.
  - “Iniquidad” se mantiene para עוון, en línea con el valor moral-jurídico del término.
  - “Pecados” traduce חטאות en plural y se conserva la fuerza cuantitativa de עָצְמוּ con “son muchos”.
  - La decisión de “contra ti” busca reflejar la carga judicial del acto divino sin cambiar el sujeto gramatical.
