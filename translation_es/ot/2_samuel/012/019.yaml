translation:
  language: es
  text: 'Cuando David vio que sus siervos susurraban, David comprendió que el niño estaba muerto. Entonces David dijo a sus siervos: «¿Está muerto el niño?». Y ellos dijeron: «Muerto»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la respuesta dice solo «muerto»; el español puede dejar la réplica así para conservar la brevedad del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - notó
  - percibió
  lexicon: HALOT
  rationale: ראן expresa percepción visual que lleva a darse cuenta de algo; «vio» es la correspondencia directa y natural en español narrativo.
- source_word: מִתְלַחֲשִׁים
  english_pob_choice: were whispering
  chosen_spanish: se estaban susurrando entre sí
  alternatives_spanish:
  - estaban murmurando
  - estaban hablando en voz baja entre sí
  lexicon: HALOT
  rationale: El hitpael comunica habla discreta y en voz baja. En español, «susurrando entre sí» conserva la idea de comunicación reservada; el reflexivo ayuda a expresar la reciprocidad implícita.
- source_word: וַיָּבֶן
  english_pob_choice: understood
  chosen_spanish: comprendió
  alternatives_spanish:
  - discernió
  - se dio cuenta
  lexicon: HALOT
  rationale: בין indica discernimiento a partir de señales observadas. «Comprendió» mantiene el matiz mental y suena natural y sobrio en español.
- source_word: מֵת
  english_pob_choice: was dead / is dead / He is dead
  chosen_spanish: había muerto / ha muerto
  alternatives_spanish:
  - estaba muerto
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un estado de muerte. En la oración narrativa, «había muerto» refleja bien la comprensión de David; en la respuesta directa, «ha muerto» preserva la brevedad del hebreo sin añadir el verbo «ser/estar» como obligación estilística.
- source_word: הַיָּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el pequeño
  lexicon: HALOT
  rationale: יֶלֶד puede ser «niño» o «niño pequeño/infante». Dado el contexto inmediato del hijo de David, «el niño» es claro y más natural que «el hijo» en esta repetición narrativa.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus servidores de la casa
  lexicon: HALOT
  rationale: En esta escena de corte, עֶבֶד designa a los miembros del séquito real. «Siervos» conserva el campo semántico de dependencia/servicio sin imponer la carga social de «esclavos» en un contexto no enfocado en la esclavitud.
- source_word: הֲמֵת הַיֶּלֶד
  english_pob_choice: Is the child dead?
  chosen_spanish: ¿Ha muerto el niño?
  alternatives_spanish:
  - ¿Está muerto el niño?
  - ¿Murió el niño?
  lexicon: HALOT
  rationale: La pregunta hebrea consulta el estado de muerte. En español, «¿Ha muerto el niño?» es una pregunta natural y fiel; «¿Está muerto?» enfatizaría el estado presente, pero el giro elegido evita ambigüedad temporal.
- source_word: וַיֹּאמֶר ... וַיֹּאמְרוּ
  english_pob_choice: said ... said
  chosen_spanish: dijo ... dijeron
  alternatives_spanish:
  - preguntó ... respondieron
  - les habló ... le dijeron
  lexicon: HALOT
  rationale: אָמַר es el verbo básico «decir». Mantener «dijo ... dijeron» sigue de cerca el hebreo y deja que el contexto marque la función interrogativa y de respuesta.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. No hubo revisiones aplicadas en el pase más reciente; el consenso de revisión fue de alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «siervos» para עֲבָדָיו, en coherencia con la decisión contextual del inglés POB y con el perfil de corte real del pasaje.
  - Se usó «niño» para הַיָּלֶד por claridad narrativa y fidelidad al referente inmediato; no se cambió a «hijo» para no introducir un vínculo explicativo ausente en el verso mismo.
  - Se preservó la distinción entre la narración («había muerto») y la réplica breve («ha muerto») para reflejar el estado expresado por el hebreo y la naturalidad del español.
