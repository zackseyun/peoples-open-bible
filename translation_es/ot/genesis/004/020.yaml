    rationale: 'La redacción actual "''O: «..." contiene una comilla sobrante y se puede normalizar para mejor legibilidad editorial en español.'
  revised_spanish_text: Ada dio a luz a Jabal[a]; él fue el padre de los que habitan en tiendas y tienen ganado.
