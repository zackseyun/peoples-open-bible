  - marker: b
    text: El singular de la cláusula de elogio se entiende más naturalmente de Hananías, aunque algunos toman el elogio como apoyo más general al nombramiento.
    reason: alternative_reading
  revision_rationale: Se reemplaza 'un hombre de verdad' por 'un hombre fiel' para reflejar mejor el sentido contextual de אֱמֶת en una evaluación de idoneidad para el cargo, en concordancia con la decisión lexical auditada por la POB inglesa. Se conservan las alternativas en nota. También se normaliza levemente la redacción de la nota a.
