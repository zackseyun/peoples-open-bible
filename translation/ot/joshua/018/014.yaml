id: JOS.18.14
reference: Joshua 18:14
source:
  edition: WLC
  text: וְ/תָאַ֣ר הַ/גְּבוּל֩ וְ/נָסַ֨ב לִ/פְאַת יָ֜ם נֶ֗גְבָּ/ה מִן הָ/הָר֙ אֲשֶׁ֨ר עַל פְּנֵ֥י בֵית חֹרוֹן֮ נֶגְבָּ/ה֒ ו/היה תֹֽצְאֹתָ֗י/ו אֶל קִרְיַת בַּ֨עַל֙ הִ֚יא קִרְיַ֣ת יְעָרִ֔ים עִ֖יר בְּנֵ֣י יְהוּדָ֑ה זֹ֖את פְּאַת יָֽם־־־־־־־׃
translation:
  text: Then the border curved and turned on the west side southward from the mountain that faces Beth-horon on the south[a], and its end was at Kiriath-baal (that is, Kiriath-jearim), a city of the sons of Judah. This was the western side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Judah,' a tribal designation meaning the people/descendants of Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר
  chosen: extended
  alternatives:
  - was marked out
  - was drawn
  lexicon: HALOT
  rationale: In boundary descriptions, the verb refers to the border's course being traced or extending onward. 'Extended' gives natural English while preserving the geographic sense better than a more technical 'was marked out.'
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: Standard term for territorial boundary. 'Border' is slightly more idiomatic in this running description.
- source_word: וְנָסַב
  chosen: turned
  alternatives:
  - went around
  - curved
  lexicon: HALOT
  rationale: The verb denotes changing direction or circling. 'Turned' fits the concise topographical style.
- source_word: לִפְאַת יָם
  chosen: on the west side
  alternatives:
  - to the western side
  - toward the west
  lexicon: HALOT
  rationale: פאה is 'side/edge,' and ים in boundary formulas commonly denotes 'west' because of the Mediterranean. 'On the west side' captures the idiom clearly.
- source_word: נֶגְבָּה
  chosen: southward
  alternatives:
  - to the south
  - south
  lexicon: HALOT
  rationale: Directional adverb indicating movement/orientation toward the south. 'Southward' reflects the adverbial force.
- source_word: מִן הָהָר
  chosen: from the mountain
  alternatives:
  - from the hill country
  - from the hill
  lexicon: HALOT
  rationale: The singular with article points to a specific mountain/hill in the boundary line. 'Mountain' is the more direct rendering, though English readers may envision a large peak.
- source_word: אֲשֶׁר עַל־פְּנֵי בֵית חֹרוֹן
  chosen: that faces Beth-horon
  alternatives:
  - that is opposite Beth-horon
  - that is before Beth-horon
  lexicon: HALOT
  rationale: The idiom על־פני in geographic description often means 'opposite/facing.' 'Faces' is natural modern English.
- source_word: נֶגְבָּה
  chosen: on the south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: Here the second occurrence modifies Beth-horon's relation/orientation in the description. 'On the south' avoids awkward repetition while preserving the southern reference.
- source_word: וְהָיָה תֹצְאֹתָיו
  chosen: and its end was
  alternatives:
  - and its extremities were
  - and its outgoings were
  - and it ended
  lexicon: HALOT
  rationale: The idiom refers to the border's terminal point(s). Because the following phrase gives a single destination, singular English 'its end was' is the clearest idiomatic rendering.
- source_word: אֶל קִרְיַת בַּעַל
  chosen: at Kiriath-baal
  alternatives:
  - to Kiriath-baal
  lexicon: HALOT
  rationale: With a boundary endpoint, English often uses 'at' for the terminal location. The place-name is transliterated per policy.
- source_word: הִיא קִרְיַת יְעָרִים
  chosen: (that is, Kiriath-jearim)
  alternatives:
  - which is Kiriath-jearim
  lexicon: HALOT
  rationale: The pronoun identifies an alternate name for the same city. Parenthetical apposition reads naturally in English.
- source_word: עִיר בְּנֵי יְהוּדָה
  chosen: a city of the sons of Judah
  alternatives:
  - a city of the people of Judah
  - a city belonging to Judah
  lexicon: HALOT
  rationale: בני is literally 'sons of.' Per gender-accurate policy, the literal familial term is retained where it denotes the tribal group. This is a territorial designation, not a claim about only male inhabitants.
- source_word: זֹאת פְּאַת יָם
  chosen: This was the western side
  alternatives:
  - This was the west side
  - This was the western border
  lexicon: HALOT
  rationale: A summarizing formula closing the side of the tribal boundary. 'Western side' is clear and matches the earlier directional idiom.
