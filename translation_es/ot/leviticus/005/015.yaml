translation:
  language: es
  text: 'Si una persona actúa infielmente y peca inadvertidamente respecto de las cosas sagradas de Yahvé, traerá su sacrificio por la culpa[a] a Yahvé: un carnero sin defecto del rebaño, conforme a tu valoración, en siclos de plata, según el siclo del santuario[b], como sacrificio por la culpa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «su ofrenda por la culpa» o «su ofrenda de reparación». El hebreo אָשָׁם puede designar tanto la culpa/obligación como el sacrificio que la repara.
    reason: lexical_alternative
  - marker: b
    text: El «siclo del santuario» era el peso estándar usado para las valuaciones sagradas.
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - alguien
  - un ser humano
  lexicon: HALOT
  rationale: En contexto legal, נֶפֶשׁ designa a un individuo; «una persona» conserva el singular representativo y suena natural en español actual.
- source_word: תִמְעֹל מַעַל
  english_pob_choice: acts unfaithfully
  chosen_spanish: actúa infielmente
  alternatives_spanish:
  - comete una traición
  - obra con infidelidad
  lexicon: HALOT
  rationale: La combinación verbal intensifica la idea de violación de una obligación sagrada; «actúa infielmente» mantiene esa fuerza sin volver el español demasiado arcaico.
- source_word: וְחָטְאָה בִשְׁגָגָה
  english_pob_choice: and sins unintentionally
  chosen_spanish: y peca inadvertidamente
  alternatives_spanish:
  - y peca sin querer
  - y peca por error
  lexicon: HALOT
  rationale: בִשְׁגָגָה expresa falta de intención o inadvertencia, no rebelión deliberada; «inadvertidamente» refleja bien ese matiz.
- source_word: מִקָּדְשֵׁי יְהוָה
  english_pob_choice: in regard to the holy things of Yahweh
  chosen_spanish: respecto de las cosas sagradas de Yahvé
  alternatives_spanish:
  - en cuanto a las cosas santas de Yahvé
  - acerca de las cosas sagradas de Yahvé
  lexicon: HALOT
  rationale: La preposición מִן marca la esfera del agravio; «respecto de» comunica esa relación sin fijar de más una dirección concreta. «Cosas sagradas» conserva el sentido cultual de objetos consagrados.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֲשָׁמוֹ
  english_pob_choice: his guilt offering
  chosen_spanish: su sacrificio por la culpa
  alternatives_spanish:
  - su ofrenda por la culpa
  - su ofrenda de reparación
  lexicon: HALOT
  rationale: אָשָׁם puede referirse tanto a la culpa como a la ofrenda asociada; «sacrificio por la culpa» comunica el valor sacrificial y mantiene la tensión reparadora sin recurrir a una fórmula eclesiástica fija.
- source_word: אַיִל תָּמִים
  english_pob_choice: an unblemished ram
  chosen_spanish: un carnero sin defecto
  alternatives_spanish:
  - un carnero sin mancha
  - un carnero perfecto
  lexicon: HALOT
  rationale: תָּמִים en contexto sacrificial significa libre de defecto. «Sin defecto» es claro y fiel; «carnero» expresa bien אַיִל.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de las ovejas y las cabras
  - de entre el rebaño
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor; como אַיִל ya precisa que es un carnero, «del rebaño» es suficiente e idiomático.
- source_word: בְּעֶרְכְּךָ
  english_pob_choice: according to your valuation
  chosen_spanish: conforme a tu valoración
  alternatives_spanish:
  - según tu valoración
  - a tu tasación
  lexicon: HALOT
  rationale: La fórmula legal remite a una tasación establecida por autoridad sacerdotal; «conforme a tu valoración» conserva el tono normativo y el segundo singular.
- source_word: כֶּסֶף שְׁקָלִים
  english_pob_choice: in silver shekels
  chosen_spanish: en siclos de plata
  alternatives_spanish:
  - en plata, en siclos
  - en siclos de plata
  lexicon: HALOT
  rationale: La expresión monetaria se vierte de modo directo y comprensible. «Siclo» es el equivalente español habitual para שֶׁקֶל en este contexto.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: por el siclo del santuario
  alternatives_spanish:
  - según el siclo del santuario
  - por el siclo sagrado
  lexicon: HALOT
  rationale: Se mantiene la especificación del peso estándar cultual. «Siclo del santuario» es fiel y claro en español; la nota explica su función como peso normalizado.
- source_word: לְאָשָׁם
  english_pob_choice: for a guilt offering
  chosen_spanish: como sacrificio por la culpa
  alternatives_spanish:
  - como ofrenda por la culpa
  - como sacrificio de reparación
  lexicon: HALOT
  rationale: Se reproduce el mismo campo semántico de אָשָׁם en ambas ocurrencias, manteniendo la conexión entre culpa y ofrenda sacrificial sin imponer una sola etiqueta tradicional.
theological_decisions:
- issue: Cómo renderizar אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: sacrificio por la culpa
  alternative_spanish_readings:
  - ofrenda por la culpa
  - ofrenda de reparación
  rationale: El contexto combina ofensa a las cosas sagradas, valoración en plata y un acto sacrificial reparador. «Sacrificio por la culpa» conserva la relación entre culpa y rito expiatorio sin borrar la dimensión de restitución. Se deja abierta la alternativa tradicional en la nota.
  doctrine_reference: Translation philosophy §1, §5, §6
- issue: Sujeto legal singular
  english_pob_reading: he shall bring
  chosen_spanish_reading: traerá
  alternative_spanish_readings:
  - deberá traer
  - traerán
  rationale: El hebreo pasa de נֶפֶשׁ genérico a un verbo masculino singular legal. En español se conserva el singular representativo para no diluir la forma jurídica del texto.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en transliteración, conforme al criterio del proyecto, para no sustituirlo por un título ni ocultar la forma hebrea.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB, pero se ajustó la formulación para que el español conserve tanto la fuerza legal como la tensión léxica de אָשָׁם. También se mantuvo el nombre divino como Yahvé y se evitó una traducción que diluya la referencia cultual de מִקָּדְשֵׁי.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene un registro legal-cultual claro y no arcaizante.
  - Se conserva la repetición conceptual de אָשָׁם mediante el mismo campo semántico en ambas ocurrencias.
  - «Siclo» se usa para el peso monetario estándar, en armonía con el término bíblico y el contexto de valoración.
