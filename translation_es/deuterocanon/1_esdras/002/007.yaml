review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del rastro POB: ''se levantaron'', la lista de grupos, ''cuyo espíritu el Señor había movido'', ''subir'', y ''edificar la casa del Señor que está en Jerusalén'' reflejan adecuadamente la fuente. También conserva correctamente en nota la variante del paralelo hebreo (''Dios'' frente a ''el Señor'').'
  spanish_quality_summary: La frase es en general clara y digna, pero 'los cabezas de las casas patriarcales' suena poco natural en español eclesial amplio. Una formulación como 'los jefes de las casas paternas' o 'los jefes de las casas ancestrales' comunica mejor la estructura social sin calco duro. Además, conviene mantener el nexo verbal del inglés/greco ('se levantaron para subir...') sin perder naturalidad.
  glossary_alignment: Buena alineación general con la terminología del proyecto. Se retiene 'el Señor' por κύριος en la fuente griega, con nota sobre el paralelo hebreo. No hay conflicto con Mesías/Cristo ni Yahvé, ya que aquí la fuente primaria no tiene יהוה sino κύριος. El único ajuste necesario es estilístico-lexical en 'cabezas'.
  issues:
  - severity: medium
    issue: '''los cabezas de las casas patriarcales'' es una construcción poco natural en español'
    rationale: Aunque intenta reflejar literalmente la idea de liderazgo familiar, 'cabezas' como sustantivo personal suena forzado aquí. 'Jefes de las casas paternas' preserva mejor el sentido de ראשי האבות / ἀρχίφυλοι τῶν πατριῶν con buena legibilidad.
  - severity: low
    issue: '''casas patriarcales'' puede sonar conceptual o sociológico más que genealógico'
    rationale: El inglés auditado justificó 'ancestral houses'. En español bíblico, 'casas paternas' es más reconocible y preciso para unidades familiares extensas.
  revised_spanish_text: Entonces se levantaron los jefes de las casas paternas[a] de las tribus de Judá y de Benjamín, y los sacerdotes y los levitas, y todos aquellos cuyo espíritu el Señor había movido, para subir a edificar la casa del Señor que está en Jerusalén.
  revised_footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 1:5 dice: "todos aquellos cuyo espíritu Dios había movido". Aquí 1 Esdras dice: "el Señor".'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'los cabezas de las casas patriarcales' por 'los jefes de las casas paternas' para lograr un español más natural y eclesialmente legible, sin perder la estructura de parentesco del original. Se conserva el resto del versículo porque refleja bien la fuente griega y el razonamiento documentado en el audit trail. La nota se mantiene, con redacción ligeramente pulida.
