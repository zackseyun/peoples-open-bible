translation:
  language: es
  text: Canten a Yahvé[a]; alaben a Yahvé, porque ha librado la vida[b] del pobre de la mano[c] de los malhechores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente vertido «el SEÑOR». Aquí se conserva el Nombre divino como «Yahvé».
    reason: alternative_reading
  - marker: b
    text: Hebreo «el alma del pobre»; aquí «vida» comunica el sentido de la vida o del ser de la persona en peligro.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «de la mano de los malhechores»; también puede entenderse como «del poder de los malhechores».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanzas
  - Canten un cántico
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר exige una orden directa. En español, «Canten» conserva la brevedad y el tono poético. Evito añadir «alabanzas» porque el segundo imperativo ya expresa explícitamente la alabanza.
- source_word: לַֽיהוָ֔ה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa el Nombre divino directamente. Según la política del proyecto en español, se traduce como «Yahvé» y no se enmascara con «SEÑOR». Se mantiene la referencia explícita al Nombre propio.
- source_word: הַֽלְל֖וּ
  english_pob_choice: praise
  chosen_spanish: alaben
  alternatives_spanish:
  - alaben con júbilo
  - den alabanza
  lexicon: HALOT
  rationale: El piel imperativo plural de הלל en contexto de adoración se expresa naturalmente como «alaben». Es conciso, reverente y corresponde al valor de alabanza del verbo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de los imperativos; «porque» reproduce bien la relación causal en español.
- source_word: הִצִּ֛יל
  english_pob_choice: has delivered
  chosen_spanish: ha librado
  alternatives_spanish:
  - ha rescatado
  - ha salvado
  lexicon: HALOT
  rationale: El hifil perfecto de נצל expresa liberación efectiva. «Ha librado» preserva el sentido de rescate y suena natural en registro bíblico sin volverse arcaico.
- source_word: נֶ֥פֶשׁ
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - la persona
  lexicon: HALOT
  rationale: En este contexto de rescate de peligro humano, נֶפֶשׁ apunta a la vida o al ser vivo, no a una noción técnica de «alma». «La vida» evita una sobrelectura doctrinal y refleja el uso hebreo.
- source_word: אֶבְי֖וֹן
  english_pob_choice: the poor
  chosen_spanish: del pobre
  alternatives_spanish:
  - del necesitado
  - del afligido
  lexicon: HALOT
  rationale: «Pobre» es la equivalencia más directa y idiomática; mantiene la carga social y de vulnerabilidad del sustantivo hebreo.
- source_word: מִ/יַּ֥ד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la dominación de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva con «de la mano de», que mantiene la imagen concreta de poder y control sin perder claridad en español.
- source_word: מְרֵעִֽים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los malvados
  - los que hacen el mal
  lexicon: HALOT
  rationale: El participio sustantivado designa a personas que obran mal. «Malhechores» conserva la fuerza moral del término y funciona bien en español bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El hebreo usa el Tetragrama, y la política del proyecto exige nombrarlo como «Yahvé». Esto preserva la identidad del Nombre del pacto y evita la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en contexto de liberación
  english_pob_reading: the life
  chosen_spanish_reading: la vida
  alternative_spanish_readings:
  - el alma
  - la persona
  rationale: El contexto es rescate de una situación de amenaza; por eso נֶפֶשׁ se entiende mejor como la vida o el ser de la persona. Traducir «alma» introduciría una carga antropológica no exigida por el hebreo aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre la traducción inglesa auditada y el hebreo masorético; no se requirieron revisiones sustanciales. Se mantuvo la equivalencia óptima del audit trail inglés, pero adaptada a la terminología teológica del español del proyecto: Yahvé, vida, mano de.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo verbal hebreo con dos imperativos en español: «Canten» // «alaben».'
  - Se mantiene el Nombre divino como «Yahvé» conforme a la política del proyecto.
  - «La vida del pobre» reproduce de forma natural נֶפֶשׁ אֶבְיוֹן sin imponer «alma».
  - «De la mano de» conserva la metáfora hebrea y la nota aclara la lectura idiomática de poder o control.
