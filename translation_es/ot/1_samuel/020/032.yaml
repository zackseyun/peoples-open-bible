    rationale: Las instrucciones exigen marcadores únicos por nota y que cada objeto de nota corresponda exactamente a su ancla en el texto. Aquí [a] aparece tras 'dijo' y tras 'puesto', pero solo hay una nota léxica pertinente a 'ser puesto a muerte'.
  - severity: medium
