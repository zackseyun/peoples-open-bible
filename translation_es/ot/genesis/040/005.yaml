revisions:
- from: 'Y soñaron ambos un sueño[a], cada hombre su propio sueño, en una sola noche, cada uno según la interpretación de su sueño: el copero y el panadero[b], que pertenecían al rey de Egipto[c], encerrados en la casa de la cárcel[d].'
  to: 'Y ambos soñaron un sueño[a], cada hombre su propio sueño, en una misma noche, cada uno según la interpretación de su sueño: el copero y el panadero, que pertenecían al rey de Egipto[c], que estaban presos en la casa de la cárcel[d].'
  rationale: 'La revisión mantiene las decisiones fuente-clave del POB, pero mejora dos puntos: (1) integra mejor אֲסוּרִים con una cláusula relativa natural en español («que estaban presos»), y (2) suaviza «en una sola noche» a «en una misma noche», que comunica mejor el valor temporal sin añadir énfasis innecesario. También se elimina la nota b porque la variante «principal» no corresponde a una ambigüedad real del versículo y no es necesaria para el texto revisado.'
