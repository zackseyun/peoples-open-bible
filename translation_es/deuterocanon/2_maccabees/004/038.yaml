    text: 'El griego μιαφόνον tiene una fuerza mayor que «homicida»: alguien manchado por sangre, culpable de derramamiento de sangre.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para ajustar mejor el texto español al griego y al rastro de auditoría POB: «manto púrpura» explicita que πορφύραν funciona aquí como prenda de rango, no como abstracción; «despachó» evita sobreespecificar el modo de matar que «atravesó» imponía; «enseguida» adopta la grafía estándar actual; y «al darle el Señor...» mantiene explícita la retribución divina con una construcción más natural en español.'
