  glossary_alignment: No hay términos del glosario mayor en juego salvo el manejo idiomático. «La joven», «agrade», «reinará» y «en lugar de Vasti» están alineados con las decisiones documentadas. «Vasti» es forma española aceptable. No hay conflicto teológico ni terminológico del proyecto.
