translation:
  language: es
  text: Y Simón envió, y tomó los huesos de Jonatán, su hermano[a], y lo sepultó en Modeín, la ciudad de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la ciudad de sus antepasados». El griego dice literalmente: «la ciudad de sus padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El griego expresa simplemente la acción de enviar, sin explicitar el objeto. «Envió» conserva esa brevedad natural en español y evita añadir detalles que el texto no da.
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - recuperó
  lexicon: BDAG
  rationale: Aquí el verbo básico es «tomar». En contexto se trata de tomar posesión de los restos de Jonatán, pero «tomó» sigue de cerca el griego sin introducir una interpretación más específica.
- source_word: τὰ ὀστᾶ
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los restos
  lexicon: BDAG
  rationale: El griego dice literalmente «los huesos». Mantener esa concreción conserva la fuerza descriptiva del texto y sigue la decisión de la POB inglesa.
- source_word: Ἰωναθὰν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración estándar
  rationale: Se usa la forma habitual en español bíblico para este nombre propio.
- source_word: τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su propio hermano
  lexicon: BDAG
  rationale: La construcción posesiva es directa. «Su hermano» conserva el parentesco sin recargar el énfasis, como en el audit trail inglés.
- source_word: ἔθαψεν
  english_pob_choice: buried
  chosen_spanish: sepultó
  alternatives_spanish:
  - enterró
  - lo enterró
  lexicon: BDAG
  rationale: «Sepultó» es natural en español bíblico y reproduce con dignidad el acto de entierro. «Enterró» sería posible, pero «sepultó» suele sonar más solemne en este registro.
- source_word: ἐν Μωδεεὶμ
  english_pob_choice: in Modein
  chosen_spanish: en Modeín
  alternatives_spanish:
  - en Modein
  - en Modín
  lexicon: transliteración tradicional
  rationale: Se mantiene el topónimo con una transliteración española fluida. «Modeín» respeta la forma griega y resulta legible para el público en español.
- source_word: πόλει τῶν πατέρων αὐτοῦ
  english_pob_choice: the city of his fathers
  chosen_spanish: la ciudad de sus padres
  alternatives_spanish:
  - la ciudad de sus antepasados
  - la ciudad de sus padres ancestrales
  lexicon: BDAG
  rationale: La frase griega es literalmente «la ciudad de sus padres». En español, «padres» comunica bien la referencia ancestral y evita una expansión interpretativa; se preserva la alternativa «antepasados» como nota textual.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto al texto base inglés; se conserva la concreción de «huesos» y la literalidad de «la ciudad de sus padres», con nota para la alternativa ancestral.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal simple del griego: envió / tomó / sepultó.'
  - Se conservó la antropología familiar de «sus padres» como traducción directa de πόλει τῶν πατέρων αὐτοῦ.
  - La transliteración «Modeín» se eligió por claridad y uso bíblico en español.
  - No se añadió información implícita como «mandó a buscar» o «recuperó los restos», porque el griego no la explicita.
