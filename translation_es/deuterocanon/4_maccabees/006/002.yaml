lexical_decisions:
- source_word: καὶ πρῶτον μὲν
  english_pob_choice: And first
  chosen_spanish: Y primero
  alternatives_spanish:
  - Y en primer lugar
  - Y ante todo
  lexicon: LSJ
  rationale: El griego abre una secuencia de abusos con valor conectivo y ordinal. «Y primero» conserva la conjunción καὶ y el sentido de inicio sin sonar demasiado rígido.
- source_word: περιέδυσαν
  english_pob_choice: they stripped
  chosen_spanish: despojaron
  alternatives_spanish:
  - desvistieron
  - arrancaron la ropa a
  lexicon: LSJ
  rationale: El verbo expresa quitar la vestidura a alguien en un acto humillante. En español, «despojaron» comunica esa agresión con naturalidad y evita una formulación demasiado mecánica.
- source_word: τὸν γεραιὸν
  english_pob_choice: the old man
  chosen_spanish: al anciano
  alternatives_spanish:
  - al viejo
  - al hombre de edad
  lexicon: LSJ
  rationale: γεραιός significa anciano o de edad avanzada. «Anciano» es claro, digno y fiel al referente, mejor que un «viejo» que en español podría sonar más despectivo de lo necesario.
- source_word: ἐκκεκοσμημένον
  english_pob_choice: adorned
  chosen_spanish: adornado
  alternatives_spanish:
  - ataviado
  - ornamentado
  lexicon: LSJ
  rationale: El participio indica estar adornado o embellecido. «Adornado» reproduce bien el valor descriptivo y se integra naturalmente con la frase siguiente.
- source_word: τὴν περὶ τὴν εὐσέβειαν εὐσχημοσύνην
  english_pob_choice: the dignity of godliness
  chosen_spanish: la dignidad de la piedad
  alternatives_spanish:
  - la noble compostura de la piedad
  - la gracia decorosa asociada con la piedad
  lexicon: LSJ
  rationale: εὐσχημοσύνη apunta a compostura, gracia o noble porte; con περὶ τὴν εὐσέβειαν se liga a la devoción a Dios. «Dignidad de la piedad» conserva la condensación del griego y el matiz ético-religioso sin sobreexplicar.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - godliness
  lexicon: LSJ
  rationale: En 4 Macabeos εὐσέβεια es una virtud central de fidelidad reverente a Dios y a la ley. «Piedad» mantiene el campo semántico tradicional en español; aquí es preferible a «devoción a Dios» por su concisión y por reflejar el sustantivo abstracto del original.
theological_decisions:
- issue: Cómo verter εὐσέβεια en un texto de virtud y fidelidad a Dios
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - godliness
  - devoción a Dios
  - reverencia
  rationale: La POB inglesa opta por «godliness» como término accesible para εὐσέβεια. En español, «piedad» conserva mejor la categoría virtuosa y el registro literario del libro, sin perder el componente de reverencia activa ante Dios.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica con términos clave, manteniendo la fuerza teológica del texto fuente.'
translation_notes:
  revision_awareness: El texto inglés revisado simplificó una construcción más explícita sobre la «dignidad de la piedad». La versión española sigue esa línea de economía, pero conserva el enlace entre el despojo físico y la honra exterior que representaba su piedad. También se atendió al valor humillante de περιέδυσαν con un verbo natural en español, sin perder la violencia del acto.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero en español moderno.
  - «Piedad» se usa aquí como equivalente principal de εὐσέβεια, coherente con la densidad ética del contexto.
  - La nota al pie preserva la alternativa lexical documentada por el audit trail inglés y aclara el matiz de εὐσχημοσύνη.
