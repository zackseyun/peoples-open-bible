translation:
  language: es
  text: 'Él dijo[a]: «El que tuvo misericordia de él». Entonces Jesús le dijo: «Ve, y tú haz lo mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el que hizo la misericordia con él», un giro idiomático que significa «el que tuvo misericordia de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιήσας
  english_pob_choice: the one who showed
  chosen_spanish: el que mostró
  alternatives_spanish:
  - el que hizo
  - el que obró
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente y nombra a la persona por su acción. En español, «el que mostró» conserva esa identificación y evita la dureza de un calco como «el que hizo».
- source_word: τὸ ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia
  - compasión
  - bondad
  lexicon: BDAG
  rationale: «Misericordia» comunica mejor el peso moral y relacional de ἔλεος que opciones más suaves o emocionales. En español bíblico es una equivalencia natural y clara.
- source_word: ποιήσας τὸ ἔλεος
  english_pob_choice: showed mercy
  chosen_spanish: mostró misericordia
  alternatives_spanish:
  - hizo misericordia
  - actuó con misericordia
  lexicon: BDAG
  rationale: El griego expresa literalmente una construcción idiomática cercana a «hacer misericordia». En español, «mostró misericordia» conserva el sentido sin sonar mecánico.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: La preposición griega es literalmente «con», y el giro conserva la idea de misericordia ejercida en relación con la persona. Aquí se mantiene la cercanía de la imagen griega, como permite el español natural.
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: El imperativo es una orden simple de ir. «Ve» es breve, natural y fiel al valor verbal.
- source_word: καὶ σὺ
  english_pob_choice: and you
  chosen_spanish: tú también
  alternatives_spanish:
  - y tú
  - y tú también
  lexicon: BDAG
  rationale: El pronombre está explícito para énfasis. En español, «tú también» transmite esa aplicación personal sin forzar una repetición innecesaria del sujeto.
- source_word: ποίει
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - haz
  - actúa
  lexicon: BDAG
  rationale: El imperativo presente llama a una acción reproducida o característica dentro del contexto. «Haz» mantiene la fuerza directa del mandato y se integra mejor con «lo mismo».
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: lo mismo
  alternatives_spanish:
  - de igual manera
  - así
  lexicon: BDAG
  rationale: El adverbio compara la conducta con el ejemplo previo. En este contexto, «lo mismo» suena natural en español y preserva la exhortación a imitar la acción, mientras que otras opciones pueden sonar más abstractas.
theological_decisions:
- issue: Identificación del prójimo por la acción misericordiosa y no por una etiqueta étnica o social
  english_pob_reading: The translation preserves the lawyer's circumlocution, 'The one who showed mercy to him,' rather than supplying 'the Samaritan.'
  chosen_spanish_reading: 'La versión conserva la circunlocución: «El que mostró misericordia con él», sin añadir «el samaritano».'
  alternative_spanish_readings:
  - El samaritano
  - Aquel samaritano
  rationale: El texto griego responde con una descripción de la acción, no con una etiqueta étnica. Mantener esa forma preserva la fuerza retórica y evita introducir una glosa interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que eliminó el sujeto explícito innecesario en la cláusula final para hacer la frase más natural. En español, se reflejó esa naturalidad con «haz tú también lo mismo», donde el sujeto se mantiene solo para énfasis y no como repetición pesada.
  spanish_consistency_notes:
  - Se usó «Jesús» como forma estable para Ἰησοῦς.
  - Se tradujo ἔλεος como «misericordia», en coherencia con el valor moral del término.
  - Se evitó suplir «el samaritano» para preservar la circunlocución del texto griego.
  - El imperativo final conserva el sentido de imitación continua sin añadir explicaciones no presentes en el original.
