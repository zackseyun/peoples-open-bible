translation:
  language: es
  text: Sin falta[a] lo abastecerás de tu rebaño, de tu era y de tu lagar; de aquello con que Yahvé tu Dios te ha bendecido, le darás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin falta» procura reflejar el infinitivo absoluto hebreo, que intensifica el mandato sin añadir una cantidad explícita que el texto no dice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֲנֵיק תַּעֲנִיק
  english_pob_choice: you shall surely furnish him
  chosen_spanish: Sin falta lo abastecerás
  alternatives_spanish:
  - Ciertamente lo proveerás
  - Sin falta lo suministrarás
  - Lo abastecerás con abundancia
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto + verbo finito expresa énfasis obligativo; en español, 'sin falta' comunica bien la fuerza enfática sin añadir una interpretación de cantidad que el texto no explicita. 'Abastecerás' mantiene la idea de proveer para su salida/liberación sin volverse mecánica.
- source_word: לּוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: HALOT
  rationale: El verbo castellano 'abastecer' admite objeto directo. 'Lo' conserva la referencia personal masculina sin forzar la sintaxis con una dativa redundante.
- source_word: מִצֹּאנְךָ
  english_pob_choice: from your flock
  chosen_spanish: de tu rebaño
  alternatives_spanish:
  - de tu ganado menor
  - de tus ovejas y cabras
  lexicon: HALOT
  rationale: צאן designa colectivamente ovejas y cabras; 'rebaño' es el equivalente colectivo natural en español y preserva el campo pastoril del texto.
- source_word: וּמִגָּרְנְךָ
  english_pob_choice: from your threshing floor
  chosen_spanish: de tu era
  alternatives_spanish:
  - de tu piso de trillar
  - de tu grano
  lexicon: HALOT
  rationale: גֹּרֶן es literalmente la era o lugar de trilla. 'Era' conserva la imagen concreta mejor que una abstracción como 'grano', que ya sería metonímica.
- source_word: וּמִיִּקְבֶךָ
  english_pob_choice: from your winepress
  chosen_spanish: de tu lagar
  alternatives_spanish:
  - de tu prensa de vino
  - de tu tina
  lexicon: HALOT
  rationale: יֶקֶב corresponde al lagar o prensa/vat para vino. 'Lagar' es breve, exacto y mantiene el paralelismo agrícola con 'rebaño' y 'era'.
- source_word: אֲשֶׁר בֵּרַכְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: from what Yahweh your God has blessed you with
  chosen_spanish: de lo que Yahvé tu Dios te haya bendecido
  alternatives_spanish:
  - de aquello con que Yahvé tu Dios te ha bendecido
  - según lo que Yahvé tu Dios te haya bendecido
  lexicon: HALOT
  rationale: El relativo hebreo liga la provisión con la bendición previa de Dios. En español, 'de lo que ... te haya bendecido' conserva la dependencia de la fuente divina y la relación de medida/procedencia sin recargar la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en vez de la sustitución tradicional ''SEÑOR''.'
- source_word: תִּתֶּן לֽ/וֹ
  english_pob_choice: you shall give to him
  chosen_spanish: le darás a él
  alternatives_spanish:
  - le darás
  - darás a él
  lexicon: HALOT
  rationale: Se conserva la repetición final del mandato con un español claro y solemne. El complemento reforzado 'a él' refleja el לֹו final sin perder naturalidad.
theological_decisions:
- issue: Rendering of the divine name יהוה in a verse about covenant provision
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre del pacto, no un título. En español, 'Yahvé' preserva la identidad del Nombre revelado y mantiene la coherencia con la política del POB; se evita 'SEÑOR' por ser una sustitución interpretativa no apoyada por el source packet.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que eliminó 'generously' para no expandir el hebreo. Por ello, el español evita adverbios como 'generosamente' o 'abundantemente' y conserva únicamente la fuerza enfática de la forma verbal. También se respetó la preferencia revisada por 'furnish' sin agregar una expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה, en línea con la terminología del proyecto.
  - '''Era'' y ''lagar'' conservan la imaginería agrícola concreta del hebreo.'
  - '''rebaño'' refleja צאן como colectivo, sin desglosar innecesariamente ovejas y cabras.'
  - La nota al pie se ancla en 'Sin falta' porque ahí se concentra la decisión sobre el infinitivo absoluto.
