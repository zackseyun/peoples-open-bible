translation:
  language: es
  text: 'Entonces se reunieron muchas personas, y cegaron todos los manantiales y el arroyo[a] que corría por la tierra, diciendo: «¿Por qué habrían de venir los reyes de Asiria[b] y encontrar abundante agua?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arroyo/wadi que corría por la tierra».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los reyes de Asiria». El plural probablemente alude al poder real o a la dinastía asiria; algunas traducciones lo suavizan a «el rey de Asiria» por el contexto histórico inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - fueron reunidos
  lexicon: HALOT
  rationale: El verbo describe una reunión colectiva; en español, «se reunieron» es natural, formal y conserva la acción comunitaria sin volver el pasivo más pesado de lo necesario.
- source_word: עַם רָב
  english_pob_choice: many people
  chosen_spanish: muchas personas
  alternatives_spanish:
  - un gran pueblo
  - mucha gente
  lexicon: HALOT
  rationale: La expresión apunta a una multitud numerosa. «Muchas personas» evita un giro demasiado étnico o técnico de «pueblo» y mantiene claridad en el contexto estratégico.
- source_word: וַיִּסְתְּמוּ
  english_pob_choice: stopped up
  chosen_spanish: cegaron
  alternatives_spanish:
  - bloquearon
  - taparon
  lexicon: HALOT
  rationale: 'Para conducciones de agua, «cegar» es un término español adecuado y preciso: implica obstruir o inutilizar el paso del agua. Evita la imagen demasiado coloquial de «tapar».'
- source_word: כָּל הַמַּעְיָנוֹת
  english_pob_choice: all the springs
  chosen_spanish: todos los manantiales
  alternatives_spanish:
  - todas las fuentes
  - todos los nacimientos de agua
  lexicon: HALOT
  rationale: מַעְיָן es un manantial o surgencia. «Manantiales» es transparente en español y conserva el valor de fuente natural de agua.
- source_word: הַנַּחַל הַשּׁוֹטֵף
  english_pob_choice: the stream that flowed
  chosen_spanish: el arroyo que corría
  alternatives_spanish:
  - el torrente que corría
  - el cauce que fluía
  lexicon: HALOT
  rationale: נַחַל puede ser arroyo, torrente o wadi; aquí el participio subraya movimiento de agua. «Arroyo que corría» ofrece una lectura natural y mantiene la idea de corriente activa. Se preserva la alternativa de traducción sin introducir el término regional «wadi» en el texto principal.
- source_word: בְּתוֹךְ הָאָרֶץ
  english_pob_choice: through the land
  chosen_spanish: por la tierra
  alternatives_spanish:
  - en medio de la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: La frase señala el curso del agua a lo largo del territorio. «Por la tierra» reproduce ese recorrido de manera sobria y fiel.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Marca la introducción del razonamiento de la multitud. «Diciendo» conserva el marcador discursivo hebreo sin sobreexplicar.
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habrían de
  alternatives_spanish:
  - ¿Por qué deberían
  - ¿Por qué iban a
  lexicon: HALOT
  rationale: La forma interrogativa expresa intención o conveniencia. «¿Por qué habrían de…?» mantiene el matiz deliberativo que presenta la pregunta retórica.
- source_word: יָבֹאוּ מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria come
  chosen_spanish: los reyes de Asiria vengan
  alternatives_spanish:
  - el rey de Asiria venga
  - los reyes asirios vengan
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo, que el POB inglés también retiene por fidelidad al texto, aunque el contexto histórico pueda hacer pensar en un solo rey. «Vengan» mantiene la dependencia de la pregunta retórica.
- source_word: וּמָצְאוּ מַיִם רַבִּים
  english_pob_choice: and find abundant water
  chosen_spanish: y encuentren abundante agua
  alternatives_spanish:
  - y hallen mucha agua
  - y encuentren mucha agua
  lexicon: HALOT
  rationale: רַבִּים con מים indica abundancia. «Abundante agua» reproduce bien el valor de suministro amplio en un contexto militar, y «encuentren» continúa la construcción subordinada de la pregunta.
theological_decisions:
- issue: Plural “kings of Assyria” vs. expected singular in historical reference
  english_pob_reading: The Hebrew plural is retained; it likely refers to the Assyrian royal power or dynasty, though some versions smooth it to singular for immediate context.
  chosen_spanish_reading: Se conserva «los reyes de Asiria» en el texto principal.
  alternative_spanish_readings:
  - el rey de Asiria
  - el poder real asirio
  rationale: No hay base textual suficiente para normalizar el plural a singular en el texto principal. Mantener el plural deja visible la tensión del hebreo y sigue la decisión auditada del POB en inglés.
  doctrine_reference: Fidelidad textual y manejo de tensiones del texto base; no implica una doctrina específica.
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «was flowing» por «flowed» para mayor naturalidad formal. En español se refleja con «corría», que conserva el valor aspectual de corriente continua sin necesidad de una perífrasis pesada. No se incorporaron otros cambios de sentido.
  spanish_consistency_notes:
  - Se usa «Asiria» para אַשּׁוּר y se conserva el plural «los reyes» por fidelidad al hebreo y al expediente auditado.
  - «Manantiales» y «arroyo» mantienen un registro claro y publicable, evitando calcos como «fuentes» cuando el contexto hidráulico exige mayor precisión.
  - Se eligió «cegaron» para el verbo de obstrucción del agua por su adecuación semántica en español.
  - La puntuación y el estilo mantienen un tono bíblico moderno, sin arcaísmos innecesarios.
