  text: plata y bronce, y también hierro, plomo y barro; pero la plata es más abundante que el oro, y el bronce que la plata, y el hierro que
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: argentum
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata fina
  - argento
  lexicon: argentum
  rationale: En el contexto de una lista de materiales, el sentido natural es el metal plata; en español bíblico moderno, «plata» es claro y directo. «Argento» sería demasiado técnico o arcaizante.
- source_word: æramentum
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - metal de bronce
  lexicon: æramentum
  rationale: El latín refiere un metal de aleación usado junto con otros metales en la serie; «bronce» conserva mejor el paralelo con el inglés POB y la cadena ascendente de materiales. «Cobre» estrecharía innecesariamente el referente.
- source_word: et ferrum quoque
  english_pob_choice: and also iron
  chosen_spanish: y también hierro
  alternatives_spanish:
  - e hierro también
  - e hierro asimismo
  lexicon: ferrum
  rationale: «También» reproduce el valor aditivo de quoque de manera natural en español, manteniendo el orden de la enumeración sin forzar una construcción calca.
- source_word: plumbum
  english_pob_choice: lead
  chosen_spanish: plomo
  alternatives_spanish:
  - estaño
  - plumbum
  lexicon: plumbum
  rationale: El término latino designa el metal plomo; en español la equivalencia directa y comprensible es «plomo».
- source_word: fictile
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - barro cocido
  lexicon: fictile
  rationale: Aunque «arcilla» es posible, «barro» conserva mejor el registro material y el contraste con los metales en español corriente. «Barro» también funciona como término bíblico entendible para una vasija o material terroso.
- source_word: Multiplicatur autem
  english_pob_choice: but ... is more abundant
  chosen_spanish: pero ... es más abundante
  alternatives_spanish:
  - mas ... se multiplica
  - pero ... se multiplica
  lexicon: multiplicatur
  rationale: El verbo latino admite la idea de aumentar o multiplicarse; el inglés POB eligió «is more abundant», y en español «es más abundante» preserva ese valor comparativo sin perder el matiz de incremento.
theological_decisions:
- issue: Cadena comparativa incompleta por la ruptura del manuscrito/texto base
  english_pob_reading: the verse ends mid-sentence at 'and iron than'
  chosen_spanish_reading: el versículo termina en «y el hierro que»
  alternative_spanish_readings:
  - y el hierro es más que
  - y el hierro es más abundante que
  rationale: La evidencia latina y la revisión auditada muestran que el pasaje queda cortado en este punto; por fidelidad textual no se completa la frase en español.
  doctrine_reference: Fidelidad textual y respeto al testimonio manuscrito; no se suplanta un texto incompleto con una reconstrucción no atestiguada.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió un desajuste previo en la segmentación: el inicio de la lista de materiales pertenece a este versículo, y el texto latino termina truncado en «et ferrum super». La versión española refleja ese mismo corte sin completar la comparación final.'
  spanish_consistency_notes:
  - Se mantiene «plata» para argentum y «bronce» para æramentum, siguiendo el patrón de materiales del texto fuente.
  - Se usa «barro» para fictile por claridad moderna y para conservar el contraste con los metales.
  - No se introduce «Cristo», «SEÑOR» ni terminología no presente en el pasaje.
  - La nota alternativa conserva la cadena comparativa completa atestiguada por la tradición de traducción inglesa, pero el cuerpo principal respeta el truncamiento del texto latino.
