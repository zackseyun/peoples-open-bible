  glossary_alignment: No hay conflictos con la terminología del proyecto. «el hombre», «oriente», «cuerda de medir», «codos» y «agua hasta los tobillos» están alineados con las decisiones léxicas documentadas. No intervienen términos sensibles como Yahvé, Mesías o esclavo.
