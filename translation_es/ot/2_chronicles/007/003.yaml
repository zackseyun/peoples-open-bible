review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la escena y mantiene bien los elementos principales del hebreo: todos los hijos/pueblo de Israel, la bajada del fuego, la gloria de Yahvé sobre la casa, la postración, la adoración y la acción de gracias. También preserva apropiadamente «Yahvé» y «la casa» con nota explicativa. Sin embargo, hay dos puntos que requieren ajuste: «se postró» no concuerda con el sujeto plural y debe ser «se postraron»; además, la fórmula final «porque para siempre es su amor fiel» suena poco natural y debilita la fuerza litúrgica de כִּי לְעוֹלָם חַסְדּוֹ, que en español se expresa mejor con un verbo como «permanece» o «dura».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero presenta un error gramatical serio de concordancia («todo el pueblo… se postró…, y adoraron» mezcla singular y plural con el mismo referente colectivo introducido además por «todo el pueblo»). También «rostro en tierra» sin artículo resulta algo áspero; «con el rostro en tierra» o «con el rostro en tierra» suena más natural. La cláusula final necesita una formulación más idiomática para lectura pública.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה se vierte como «Yahvé»; כָּבוֹד como «gloria»; בַּיִת como «casa» con nota al templo. Para חֶסֶד, «amor fiel» es defendible, pero en esta fórmula litúrgica conviene una expresión española más estable y natural como «su amor fiel permanece para siempre», preservando tanto fidelidad como duración.'
  issues:
  - severity: high
    issue: Error de concordancia verbal con el sujeto colectivo/plural
    rationale: El borrador dice «Y todo el pueblo de Israel… se postró… y adoraron y dieron gracias». El hebreo tiene sujeto plural («todos los hijos de Israel») y una serie de verbos plurales. En español, si se mantiene «todo el pueblo», lo natural sería singular consistente; pero dado el anclaje del hebreo y la nota, conviene usar «todos los hijos de Israel» y verbos plurales.
  - severity: medium
    issue: Frase final litúrgica poco natural en español
    rationale: «Porque para siempre es su amor fiel» reproduce de manera demasiado literal la estructura hebrea y suena forzado. Una formulación como «porque su amor fiel permanece para siempre» conserva el sentido de חַסְדּוֹ y la duración expresada por לְעוֹלָם con mejor español.
  - severity: low
    issue: Expresión de postración mejorable
    rationale: «Se postraron rostro en tierra» es comprensible, pero «se postraron con el rostro en tierra» suena más natural y conserva la imagen hebrea de manera más clara.
