translation:
  language: es
  text: Entonces Daniel dijo al mayordomo que el jefe de los eunucos[a] había asignado a Daniel, Ananías, Misael y Azarías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el jefe de los oficiales de la corte»; el término hebreo traducido aquí «eunucos» puede en algunos contextos referirse más ampliamente a funcionarios de la corte real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva pide una transición fluida en español. «Entonces» conserva el avance secuencial sin sonar mecánico.
- source_word: הַמֶּלְצַר
  english_pob_choice: the steward
  chosen_spanish: el mayordomo
  alternatives_spanish:
  - el administrador
  - el encargado
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de traducir el cargo por función, «mayordomo» comunica bien la idea de un oficial responsable de la administración y del cuidado de los jóvenes. Evita la mera transliteración.
- source_word: אֲשֶׁר מִנָּה
  english_pob_choice: whom ... had appointed
  chosen_spanish: que ... había puesto
  alternatives_spanish:
  - que ... había nombrado
  - que ... había asignado
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula relativa que identifica al funcionario por una acción previa de designación. «Había puesto» refleja la relación de autoridad sin sobrecargar el texto; «nombrado» es posible, pero «puesto» mantiene naturalidad y la idea de colocación en un cargo.
- source_word: שַׂר הַסָּרִיסִים
  english_pob_choice: the chief of the eunuchs
  chosen_spanish: el jefe de los eunucos
  alternatives_spanish:
  - el principal de los eunucos
  - el jefe de los oficiales de la corte
  lexicon: HALOT
  rationale: La POB inglesa eligió la forma más directa de la expresión hebrea. En español, «jefe de los eunucos» conserva esa lectura y mantiene la tensión lexical del término, que en algunos contextos puede ampliarse a oficiales de corte.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encargado de
  - a cargo de
  lexicon: HALOT
  rationale: En contextos de nombramiento, עַל expresa responsabilidad supervisora. «Sobre» reproduce la relación de autoridad de manera breve y formal.
- source_word: דָּנִיֵּאל חֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  english_pob_choice: Daniel, Hananiah, Mishael, and Azariah
  chosen_spanish: Daniel, Ananías, Misael y Azarías
  alternatives_spanish:
  - Daniel, Hananías, Misael y Azarías
  lexicon: Personal names per project conventions
  rationale: Se conservan los nombres hebreos usados por el texto fuente. «Ananías» y «Azarías» siguen las formas castellanas habituales y fieles al hebreo.
theological_decisions:
- issue: Sentido del cargo הַמֶּלְצַר en relación con autoridad cortesana
  english_pob_reading: the steward; the Hebrew term translated 'eunuchs' can in some contexts refer more broadly to royal court officials.
  chosen_spanish_reading: el mayordomo; el hebreo traducido «eunucos» puede en algunos contextos referirse de manera más amplia a oficiales de la corte.
  alternative_spanish_readings:
  - el administrador; ... oficiales de la corte
  - el encargado; ... oficiales de la corte
  rationale: La traducción principal mantiene el valor inmediato del texto, pero la nota preserva la amplitud semántica documentada por la POB inglesa. Esto evita borrar la tensión entre la lectura literal y el posible sentido funcional del término.
  doctrine_reference: Ninguna; decisión léxica/cultural sobre terminología de cargo
translation_notes:
  revision_awareness: Se siguió el acuerdo de alta concordancia del registro inglés y no se incorporaron revisiones textuales adicionales; la decisión española prioriza la misma lectura directa con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa con «Entonces».
  - Se conservaron los nombres hebreos del texto fuente, con formas castellanas estándar para Ananías y Azarías.
  - La nota al pie preserva la alternativa semántica para סָרִיסִים sin sustituir el sentido principal del verso.
