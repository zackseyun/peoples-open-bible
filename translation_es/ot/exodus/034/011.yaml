translation:
  language: es
  text: Guarda lo que te estoy mandando hoy[a]. He aquí, estoy expulsando [b]de delante de ti a los amorreos, a los cananeos, a los hititas, a los ferezeos, a los heveos y a los jebuseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Observa lo que te estoy mandando hoy» o «Ten cuidado con lo que te estoy mandando hoy».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de delante de ti»; la expresión indica remoción de tu presencia o de tu vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָר לְךָ
  english_pob_choice: Keep what I am commanding you today
  chosen_spanish: Guarda lo que te estoy mandando hoy
  alternatives_spanish:
  - Observa lo que te estoy mandando hoy
  - Cuida lo que te estoy mandando hoy
  - Guárdalo para ti
  lexicon: HALOT
  rationale: שמר en imperativo puede significar guardar, observar o atender. En español, «guarda» conserva el valor de obediencia activa y de retener fielmente el mandato. Se evita «para ti» porque en este contexto suena demasiado específico y no agrega una carga semántica segura del hebreo.
- source_word: אֵת אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: what I am commanding you today
  chosen_spanish: lo que te estoy mandando hoy
  alternatives_spanish:
  - lo que hoy te mando
  - aquello que te mando hoy
  - lo que hoy te estoy mandando
  lexicon: HALOT
  rationale: La cláusula relativa exige un objeto directo claro de obediencia. «Lo que te estoy mandando hoy» reproduce bien el sentido progresivo del participio y evita una formulación excesivamente literal o rígida en español.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Atiende
  lexicon: HALOT
  rationale: הִנְנִי introduce una acción divina enfática. «Mira» preserva la fuerza deíctica y es más natural en español moderno que «He aquí», manteniendo un registro digno sin sonar arcaico.
- source_word: גֹרֵשׁ
  english_pob_choice: am driving out
  chosen_spanish: estoy expulsando
  alternatives_spanish:
  - estoy echando
  - voy expulsando
  - expulso
  lexicon: HALOT
  rationale: גרש significa «expulsar/arrojar fuera». «Estoy expulsando» conserva el valor dinámico e inminente del participio con הִנְנִי, y evita suavizar el verbo a un simple futuro.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  - de frente a ti
  lexicon: HALOT
  rationale: La expresión idiomática hebrea alude a remoción desde la presencia de alguien. «De delante de ti» es idiomático en español bíblico contemporáneo y conserva mejor la imagen espacial que «de tu presencia».
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - a los amoritas
  lexicon: HALOT
  rationale: El etnónimo colectivo hebreo se vierte naturalmente al plural español «amorreos».
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: a los cananeos
  alternatives_spanish:
  - a los canaanitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo tradicional y transparente en español, en plural natural.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: a los hititas
  alternatives_spanish:
  - a los heteos
  lexicon: HALOT
  rationale: «Hititas» es la forma estándar y clara en español bíblico para el grupo designado por el hebreo.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: a los ferezeos
  alternatives_spanish:
  - a los perizitas
  lexicon: HALOT
  rationale: Se prefiere «ferezeos», una forma tradicional y reconocible en la recepción bíblica en español, para mantener la transparencia del etnónimo.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: a los heveos
  alternatives_spanish:
  - a los hivitas
  lexicon: HALOT
  rationale: Se usa la forma española habitual «heveos» para el etnónimo, más natural que una transliteración más cercana al inglés.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: a los jebuseos
  alternatives_spanish:
  - a los jebusitas
  lexicon: HALOT
  rationale: «Jebuseos» es la forma usual en español bíblico y refleja fielmente el etnónimo hebreo.
theological_decisions:
- issue: Matiz imperativo de שׁמר en contexto de pacto
  english_pob_reading: Render as a command to keep/heed the commanded stipulations rather than as a warning formula alone.
  chosen_spanish_reading: Se traduce como una orden de guardar y atender lo mandado, no solo como una advertencia general.
  alternative_spanish_readings:
  - Estate atento a lo que te mando hoy
  - Ten cuidado de lo que te mando hoy
  rationale: El versículo une mandato y acción divina. «Guarda» comunica obediencia pactal activa sin introducir una frase explicativa que no está en el hebreo de este versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor discursivo de הִנְנִי
  english_pob_reading: Use an attention-directing particle with formal force.
  chosen_spanish_reading: «Mira» mantiene la apelación enfática a la atención del oyente.
  alternative_spanish_readings:
  - He aquí
  - Observa
  rationale: La función del hebreo es deíctica y enfática; el español debe reflejar esa función sin perder naturalidad ni solemnidad.
  doctrine_reference: HALOT; discourse force of הִנְנִי
- issue: מִפָּנֶיךָ como idiomática de remoción
  english_pob_reading: The phrase means removal from your presence or in front of you.
  chosen_spanish_reading: «De delante de ti» conserva la imagen de remoción espacial ligada a la presencia.
  alternative_spanish_readings:
  - de tu presencia
  - de ante ti
  rationale: Se preserva el sentido idiomático sin diluir la imagen concreta del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción anterior en inglés fue ajustada para evitar 'for yourself' y para preferir una forma más formal de la partícula enfática. En esta versión española se sigue esa misma revisión al omitir un equivalente artificial de לְךָ y al usar «Mira» como recurso deíctico formal pero natural. También se mantiene la lista de etnónimos en formas españolas transparentes y publicables.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se conserva el tono imperativo directo sin suavizar שׁמר a una mera advertencia.
  - Los nombres de los pueblos se dan en plural español natural, no como transliteraciones técnicas.
  - Las notas a pie están ancladas explícitamente en el texto con [a] y [b].
