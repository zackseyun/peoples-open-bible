translation:
  language: es
  text: Digan del justo que le irá bien[a], porque comerán el fruto de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Digan del justo que es bueno, porque él/ellos comerá/comerán el fruto de sus obras». El hebreo pasa de un singular representativo («justo») a formas plurales en la cláusula final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Decid
  - Digan
  - Hablad
  lexicon: HALOT
  rationale: El imperativo plural hebreo pide una orden de decir o anunciar. En español, el imperativo plural puede sonar más directo, pero aquí el enunciado proverbial funciona bien con una forma breve e impersonal dirigida al lector/oyente. 'Di' conserva la tersura del mandato y evita sobrecargar el verso.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo hombre
  - los justos
  - el recto
  lexicon: HALOT
  rationale: El adjetivo sustantivado צַדִּיק puede traducirse como una clase o como un justo representativo. 'El justo' mantiene el valor sustantivo en español y preserva el matiz moral-legal de la raíz sin recurrir a una perífrasis innecesaria.
- source_word: טוֹב
  english_pob_choice: it will be well
  chosen_spanish: le irá bien
  alternatives_spanish:
  - será bueno
  - le irá bien a él
  - estará bien
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'bueno', en este contexto el sentido es de prosperidad o buen resultado para el justo. 'Le irá bien' comunica la fuerza idiomática sin perder la valoración positiva del original.
- source_word: פְרִי
  english_pob_choice: the fruit
  chosen_spanish: el fruto
  alternatives_spanish:
  - el fruto
  - el producto
  - el resultado
  lexicon: HALOT
  rationale: '''Fruto'' conserva la metáfora agrícola y retributiva del hebreo. En español, ''fruto de sus obras'' es natural y mantiene la imagen de consecuencia cosechada.'
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - sus prácticas
  lexicon: HALOT
  rationale: מַעַלְלִים designa actos o maneras de obrar. 'Obras' es una equivalencia idiomática válida en español bíblico y mantiene la conexión ética con 'fruto' sin hacer la frase demasiado abstracta.
- source_word: יֹאכֵלוּ
  english_pob_choice: they will eat
  chosen_spanish: comerá
  alternatives_spanish:
  - comerán
  - lo comerán
  - gozarán de
  lexicon: HALOT
  rationale: El hebreo plural conserva la metáfora de comer el fruto. Como el verso comienza con un singular representativo ('el justo'), en español se puede seguir esa clase singular en la primera mitad y luego mantener el verbo en singular concordando con 'el justo'. Esto da una lectura fluida y pública, aunque la nota explique el cambio de número del hebreo.
theological_decisions:
- issue: 'Cambio de número: singular representativo al plural/colección en el hebreo'
  english_pob_reading: The English POB renders a representative class term ('the righteous') and keeps plural pronouns/verb in the final clause, noting the Hebrew shift from singular to plural.
  chosen_spanish_reading: 'Presentar ''el justo'' como sujeto representativo y mantener la imagen de retribución en singular: ''le irá bien... comerá el fruto de sus obras''.'
  alternative_spanish_readings:
  - '''Di de los justos que les irá bien, porque comerán el fruto de sus obras.'''
  - '''Di del justo que le irá bien, porque ellos comerán el fruto de sus obras.'''
  rationale: El hebreo inicia con un adjetivo sustantivado singular de valor representativo y termina con formas plurales. En español, la versión más natural y pública es usar el singular representativo en todo el verso, dejando constancia de la tensión textual en la nota. Así se evita una construcción híbrida pesada y se mantiene la fuerza proverbial.
  doctrine_reference: Translation philosophy §4 (claridad y precisión textual) y §5 (consistencia con excepciones documentadas).
translation_notes:
  revision_awareness: 'El texto base coincide en alto grado con el paquete fuente y el auditor inglés: no se requiere revisión textual adicional. La única tensión relevante es la oscilación de número en el hebreo; se documenta mediante nota para no ocultar la alternancia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el texto lo exija; este versículo no contiene el tetragrámaton ni referencia divina explícita.
  - '''Justo'' conserva el valor sustantivado de צַדִּיק y es más natural en español que ''los justos'' dentro de este enunciado singular representativo.'
  - Se mantiene la metáfora de 'fruto' y 'obras' sin convertirla en paráfrasis moralizante.
  - La nota explica la variante de número para que el lector vea la tensión del hebreo sin sacrificar la fluidez del español.
