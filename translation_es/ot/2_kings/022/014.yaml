translation:
  language: es
  text: Entonces Hilcías el sacerdote, Ahicam, Acbor, Safán y Asaías fueron a Hulda la profetisa, esposa de Salum, hijo de Ticva, hijo de Harhas, encargado[b] de los vestidos. Ella vivía en Jerusalén, en el Segundo Barrio[a], y le hablaron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el segundo distrito»; el hebreo probablemente se refiere a un sector concreto de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «guardián de los vestidos».
    reason: lexical_alternative
  - marker: c
    text: O «hablaron con ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el sacerdote»; no se añade «sumo» porque la fuente no lo explicita en este versículo. «Sacerdote» es la equivalencia natural y fiel en español.
- source_word: חֻלְדָּה הַנְּבִיאָה
  english_pob_choice: Huldah the prophetess
  chosen_spanish: Hulda la profetisa
  alternatives_spanish:
  - Hulda la profeta
  lexicon: HALOT
  rationale: La forma hebrea es femenina, así que «profetisa» conserva el valor gramatical y semántico del original sin neutralizar el género.
- source_word: אֵשֶׁת שַׁלֻּם
  english_pob_choice: the wife of Shallum
  chosen_spanish: esposa de Salum
  alternatives_spanish:
  - mujer de Salum
  lexicon: HALOT
  rationale: La construcción posesiva identifica relación conyugal; «esposa» es claro y digno en español, y evita ambigüedad.
- source_word: בֶּן תִּקְוָה בֶּן חַרְחַס
  english_pob_choice: son of Tikvah, son of Harhas
  chosen_spanish: hijo de Ticva, hijo de Harhas
  alternatives_spanish:
  - descendiente de Ticva, descendiente de Harhas
  lexicon: HALOT
  rationale: Se preserva la cadena genealógica de forma formal y transparente, como en el hebreo y en el audit trail inglés.
- source_word: שֹׁמֵר הַבְּגָדִים
  english_pob_choice: keeper of the wardrobe
  chosen_spanish: encargado de los vestidos
  alternatives_spanish:
  - guardián de los vestidos
  - custodio de los vestidos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «guardián/guardador de los vestidos». En español, «encargado» comunica mejor una función oficial sin perder la referencia a las prendas; «vestidos» mantiene la cercanía al término original, aunque «vestuario» sería más idiomático pero menos literal.
- source_word: וְהִיא יֹשֶׁבֶת
  english_pob_choice: She lived
  chosen_spanish: Ella vivía
  alternatives_spanish:
  - y ella vivía
  - moraba
  lexicon: HALOT
  rationale: «Yosheveth» en contexto locativo expresa residencia. «Vivía» reproduce el sentido de habitar sin caer en un calco rígido.
- source_word: בַּמִּשְׁנֶה
  english_pob_choice: in the Second Quarter
  chosen_spanish: en el Segundo Barrio
  alternatives_spanish:
  - en el segundo distrito
  - en el Segundo Sector
  lexicon: HALOT
  rationale: El término designa una zona concreta de Jerusalén. «Barrio» resulta natural para lectores actuales y conserva la idea de un distrito urbano; se mantiene la mayúscula porque funciona como nombre de lugar. La alternativa «distrito» se reserva en nota por su posible fuerza administrativa.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ
  english_pob_choice: and they spoke to her
  chosen_spanish: y le hablaron
  alternatives_spanish:
  - y hablaron con ella
  lexicon: HALOT
  rationale: La frase hebrea indica que se dirigieron a ella. «Le hablaron» es breve, natural y fiel; no intensifica más allá de la consulta implícita.
theological_decisions:
- issue: Título de Hulda como profetisa femenina
  english_pob_reading: prophetess
  chosen_spanish_reading: profetisa
  alternative_spanish_readings:
  - profeta
  rationale: El hebreo marca explícitamente femenino. Mantener «profetisa» evita borrar una distinción que el texto resalta y coincide con la sensibilidad del POB a la precisión de género.
  doctrine_reference: Translation philosophy §4
- issue: Jerusalén en el «Segundo Barrio»
  english_pob_reading: Second Quarter
  chosen_spanish_reading: Segundo Barrio
  alternative_spanish_readings:
  - segundo distrito
  - nuevo barrio
  rationale: El sentido parece referirse a una subdivisión urbana concreta. No se interpreta teológicamente; se conserva la ambigüedad histórica mediante una designación legible en español.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del audit trail inglés: se prefirió «le hablaron» en lugar de «hablaron con ella» para ajustarse más de cerca al hebreo. También se mantuvo la elección de no elevar «el sacerdote» a «sumo sacerdote» y de conservar «profetisa» como forma femenina explícita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; este versículo no lo contiene.
  - 'Se mantiene la transliteración de nombres propios conforme al uso bíblico en español: Hilcías, Ahicam, Acbor, Safán, Asaías, Hulda, Salum, Ticva y Harhas.'
  - «Segundo Barrio» conserva mayúscula como topónimo o designación urbana definida.
  - No se introduce paráfrasis narrativa adicional; la oración conserva la secuencia y el contenido informativo del hebreo.
