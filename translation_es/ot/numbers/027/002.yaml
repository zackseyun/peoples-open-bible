revisions:
- from: 'Y ellas se presentaron delante de Moisés, delante de Eleazar el sacerdote, delante de los líderes y de toda la congregación, a la entrada de la tienda de reunión, diciendo:'
  to: 'Y ellas se pusieron de pie delante de Moisés, delante de Eleazar el sacerdote, delante de los líderes[a] y de toda la congregación[b], a la entrada de la tienda de reunión, diciendo:'
  rationale: Se corrige el verbo principal para reflejar mejor עמד y la decisión auditada 'stood', evitando la sobretraducción 'se presentaron'. Se añaden las notas léxicas que el POB preservó para 'líderes' y 'congregación', con anclajes corregidos en español. El resto del texto ya era fiel y natural.
