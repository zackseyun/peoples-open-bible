revisions:
- from: si yo comía mi bocado[a] solo, y el huérfano no comía de él—
  to: si comí mi bocado yo solo, y el huérfano[a] no comió de este—
  rationale: Se cambia al pretérito simple para reflejar mejor la serie condicional hebrea y el audit trail inglés; se elimina el pronombre explícito innecesario «yo» antes del verbo; se corrige la referencia pronominal final con «de este» para evitar la discordancia de «de él»; y se añade una nota que preserve el matiz lexical de יָתוֹם que el inglés documentó.
