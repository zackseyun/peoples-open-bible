revisions:
- from: Entonces los hijos de Israel bajaron de su ciudad y se le acercaron[a]; y, después de desatarlo, lo llevaron a Betilúa y lo pusieron delante de los gobernantes de su ciudad[c][b].
  to: Entonces los hijos de Israel bajaron de su ciudad y se presentaron ante él[a]; y, después de desatarlo, lo llevaron a Betilúa y lo llevaron ante los gobernantes de su ciudad[b].
  rationale: Se ajusta ἐπέστησαν αὐτῷ a una expresión española más decidida y contextual ('se presentaron ante él') sin imponer una confrontación demasiado fuerte. También se reemplaza 'lo pusieron delante de' por 'lo llevaron ante', que es más natural en español y refleja mejor la decisión documentada de comparecencia ante las autoridades, no nombramiento. Se simplifican las notas para evitar solapamiento.
