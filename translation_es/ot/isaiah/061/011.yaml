translation:
  language: es
  text: Porque así como la tierra produce su crecimiento, y como un jardín hace brotar lo que en él fue sembrado, así el Señor Yahvé hará brotar rectitud[a] y alabanza ante todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» para צְדָקָה; el término hebreo puede abarcar la rectitud pública o la vindicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la comparación explicativa que fundamenta la promesa anterior; 'Porque' es natural en español y conserva el valor causal/explanatorio.
- source_word: כָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  lexicon: HALOT
  rationale: En este símil el alcance es general y no territorial; 'la tierra' reproduce bien el cuadro creacional y agrícola.
- source_word: תּוֹצִיא
  english_pob_choice: brings forth
  chosen_spanish: hace salir
  alternatives_spanish:
  - produce
  - saca
  lexicon: HALOT
  rationale: El Hifil expresa causalidad. 'Hace salir' conserva el movimiento de emergencia de la vegetación sin sonar forzado en español.
- source_word: צִמְחָהּ
  english_pob_choice: its growth
  chosen_spanish: su brote
  alternatives_spanish:
  - su crecimiento
  - su vegetación
  - su renuevo
  lexicon: HALOT
  rationale: El sustantivo apunta a lo que brota o crece. 'Su brote' mantiene la imagen agrícola concreta y sigue siendo amplio.
- source_word: וּכְגַנָּה
  english_pob_choice: and as a garden
  chosen_spanish: y como un jardín
  alternatives_spanish:
  - y como jardín
  - y cual jardín
  lexicon: HALOT
  rationale: Conserva la estructura paralela del símil con una formulación natural en español.
- source_word: זֵרוּעֶיהָ
  english_pob_choice: what is sown in it
  chosen_spanish: lo que en él fue sembrado
  alternatives_spanish:
  - sus sembrados
  - sus semillas
  lexicon: HALOT
  rationale: La forma pasiva/plural se refiere a lo sembrado, no sólo a la semilla como materia. La perífrasis comunica bien ese valor.
- source_word: תַצְמִיחַ
  english_pob_choice: causes ... to spring up
  chosen_spanish: hace brotar
  alternatives_spanish:
  - hace crecer
  - hace germinar
  lexicon: HALOT
  rationale: Mantiene el matiz causativo del Hifil y la imagen agrícola con un verbo natural en español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de la misma manera
  lexicon: HALOT
  rationale: Marcador estándar de correspondencia en el símil.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como 'Yahvé' según el estándar del proyecto, evitando el ocultamiento convencional con 'SEÑOR'. 'Señor' traduce אֲדֹנָי y distingue el compuesto reverencial.
- source_word: יַצְמִיחַ
  english_pob_choice: will cause ... to spring up
  chosen_spanish: hará brotar
  alternatives_spanish:
  - hará crecer
  - hará germinar
  lexicon: HALOT
  rationale: Conserva la fuerza causativa y la resonancia con el verbo anterior para mantener cohesión retórica.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: HALOT
  rationale: En este contexto profético-restaurador, el término puede incluir justicia pública y vindicación; el español 'justicia' comunica mejor ese campo semántico amplio. Se evita imponer una lectura moralizante estrecha.
- source_word: וּתְהִלָּה
  english_pob_choice: and praise
  chosen_spanish: y alabanza
  alternatives_spanish:
  - y loor
  - y gloria
  lexicon: HALOT
  rationale: '''Alabanza'' es el equivalente más natural y ordinario para el sustantivo en este contexto de respuesta a la obra divina.'
- source_word: נֶגֶד כָּל הַגּוֹיִם
  english_pob_choice: before all the nations
  chosen_spanish: delante de todas las naciones
  alternatives_spanish:
  - a la vista de todas las naciones
  - ante todas las naciones
  lexicon: HALOT
  rationale: '''Delante de'' reproduce la visibilidad pública de נֶגֶד y mantiene el alcance universal de הַגּוֹיִם.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La pauta del proyecto exige 'Yahvé' para יהוה. En el título compuesto, 'Señor' traduce אֲדֹנָי y 'Yahvé' preserva el nombre del pacto sin el enmascaramiento tradicional.
  doctrine_reference: 'DOCTRINE.md: YHWH -> Yahvé; preserve the divine name in the main text'
- issue: Sentido de צְדָקָה en una promesa de restauración
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: El término puede abarcar justicia pública, vindicación y orden conforme al pacto. En español, 'justicia' comunica mejor esa amplitud sin perder la tensión teológica del pasaje.
  doctrine_reference: 'Contested terms: preserve public/legal force where present'
- issue: Imagen de crecimiento aplicada a la acción divina
  english_pob_reading: will cause ... to spring up
  chosen_spanish_reading: hará brotar
  alternative_spanish_readings:
  - hará crecer
  - hará germinar
  rationale: El paralelismo agrícola del versículo sugiere una acción eficaz de Dios que produce visiblemente frutos de justicia y alabanza; 'hará brotar' conserva esa imagen sin amplificarla más allá del hebreo.
  doctrine_reference: Source-driven imagery preservation; avoid flattening causative Hebrew
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvo la equivalencia óptima del símil agrícola, la causalidad de los verbos en Hifil, y la alternativa léxica documentada para צְדָקָה. No se observan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'Señor' para אֲדֹנָי dentro del título compuesto.
  - '''Justicia'' reemplaza al inglés ''righteousness'' como opción más natural en español, con nota alternativa preservada.'
  - Se mantiene el paralelismo agrícola con verbos de brotar/salir que reflejan la imagen hebrea.
