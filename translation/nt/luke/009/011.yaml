id: LUK.9.11
reference: Luke 9:11
source:
  edition: SBLGNT
  text: οἱ δὲ ὄχλοι γνόντες ἠκολούθησαν αὐτῷ. καὶ ⸀ἀποδεξάμενος αὐτοὺς ἐλάλει αὐτοῖς περὶ τῆς βασιλείας τοῦ θεοῦ, καὶ τοὺς χρείαν ἔχοντας θεραπείας ἰᾶτο.
translation:
  text: But the crowds[a], learning of it, followed him. And welcoming them, he was speaking to them about the kingdom of God and healing those who had need of healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who needed healing.' The Greek phrase is literally 'those having need of θεραπεία,' and θεραπεία can mean 'healing' or 'treatment/care.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ὄχλοι
  chosen: But the crowds
  alternatives:
  - Now the crowds
  - And the crowds
  lexicon: BDAG
  rationale: δέ is rendered with mild contrast/transition as 'But' in context, marking a shift from Jesus' attempted withdrawal to the crowds' response. ὄχλοι is plural and best rendered 'crowds' rather than singular collective 'crowd' to reflect the Greek form.
- source_word: γνόντες
  chosen: when they learned of it
  alternatives:
  - having learned
  - finding out
  - becoming aware
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω here is temporal-circumstantial. 'When they learned of it' gives natural English while preserving the sense that the crowds came to know Jesus' location or movement.
- source_word: ἠκολούθησαν αὐτῷ
  chosen: followed him
  alternatives:
  - went after him
  lexicon: BDAG
  rationale: Standard rendering of ἀκολουθέω with dative object. 'Followed him' is idiomatic and preserves both physical following and the narrative resonance of discipleship language without overstating it.
- source_word: ἀποδεξάμενος αὐτούς
  chosen: welcoming them
  alternatives:
  - receiving them
  - accepting them
  lexicon: BDAG
  rationale: ἀποδέχομαι can mean receive favorably/welcome. 'Welcoming them' best captures the hospitable nuance in context, stronger and warmer than merely 'receiving them.'
- source_word: ἐλάλει αὐτοῖς
  chosen: he was speaking to them
  alternatives:
  - he spoke to them
  - he kept speaking to them
  lexicon: BDAG
  rationale: Imperfect ἐλάλει suggests ongoing or durative action. 'He was speaking to them' preserves that aspect more clearly than simple past.
- source_word: περὶ τῆς βασιλείας τοῦ θεοῦ
  chosen: about the kingdom of God
  alternatives:
  - concerning the kingdom of God
  lexicon: BDAG
  rationale: Standard and transparent rendering. 'Kingdom of God' is a key biblical phrase and should be preserved consistently.
- source_word: τοὺς χρείαν ἔχοντας θεραπείας
  chosen: those who had need of treatment
  alternatives:
  - those needing healing
  - those who needed healing
  lexicon: BDAG
  rationale: The phrase is literally 'those having need of θεραπεία.' Because θεραπεία can denote care/treatment/healing, 'need of treatment' preserves the nominal construction and avoids redundancy with the following healing verb, though the sense clearly includes healing.
- source_word: ἰᾶτο
  chosen: healing
  alternatives:
  - he healed
  - he was healing
  lexicon: BDAG
  rationale: Imperfect middle of ἰάομαι denotes ongoing healing activity. Coordinating participial English ('and healing') fits the flow after 'he was speaking' and reflects the durative sense.
