translation:
  language: es
  text: No te desanimes en la oración, y no descuides dar limosna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צדקה también puede significar “justicia” o “rectitud”, pero aquí el paralelo griego muestra que el sentido es “dar limosna”.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתְקַצֵּר
  english_pob_choice: Do not be fainthearted
  chosen_spanish: No te desanimes
  alternatives_spanish:
  - No te acobardes
  - No pierdas ánimo
  - No te desalientes
  lexicon: HALOT
  rationale: El hebreo expresa la idea de encogerse de ánimo o perder corazón; el paralelo griego μὴ ὀλιγοψυχήσῃς confirma el sentido de no desfallecer interiormente. En español, “desanimarse” comunica bien esa pérdida de ánimo sin forzar un calco.
- source_word: בַּתְּפִלָּה
  english_pob_choice: in prayer
  chosen_spanish: en la oración
  alternatives_spanish:
  - en oración
  - en tu oración
  lexicon: HALOT
  rationale: El sustantivo es “oración / plegaria”. Siguiendo el hebreo y el griego, que no requieren un posesivo explícito en español, “en la oración” mantiene naturalidad y cercanía al texto.
- source_word: וּבִצְדָקָה
  english_pob_choice: and ... to give alms
  chosen_spanish: dar limosna
  alternatives_spanish:
  - hacer limosna
  - practicar justicia
  - dar caridad
  lexicon: HALOT
  rationale: Aunque צדקה puede significar “justicia/rectitud”, aquí el contexto y el griego ἐλεημοσύνην ποιῆσαι apuntan a la limosna. Por eso se traduce con el sentido de dar limosna, no con “justicia”.
- source_word: אַל תִּתְעַבָּר
  english_pob_choice: do not neglect
  chosen_spanish: no descuides
  alternatives_spanish:
  - no pases por alto
  - no omitas
  - no desprecies
  lexicon: HALOT
  rationale: El verbo puede implicar pasar por alto u omitir; el griego μὴ παρίδῃς refuerza “no descuides / no pases por alto”. “Descuides” es un equivalente natural y fiel en español.
theological_decisions:
- issue: Sentido de צדקה en este dicho sapiencial
  english_pob_reading: give alms, supported by the Greek parallel
  chosen_spanish_reading: dar limosna
  alternative_spanish_readings:
  - justicia
  - rectitud
  - caridad
  rationale: No se conserva aquí la ambigüedad de צדקה como “justicia” porque el paralelo griego interpreta explícitamente la acción como limosna/almsgiving. La elección mantiene la tensión textual, pero da prioridad al sentido contextual del pasaje.
  doctrine_reference: Sabiduría práctica / limosna en la ética bíblica
- issue: Intensidad de μὴ ὀλιγοψυχήσῃς / אַל תִּתְקַצֵּר
  english_pob_reading: Do not be fainthearted
  chosen_spanish_reading: No te desanimes
  alternative_spanish_readings:
  - No te desmayes
  - No te acobardes
  - No te falte ánimo
  rationale: 'El núcleo no es físico sino anímico/espiritual: no perder el ánimo al orar. “Desanimes” conserva esa fuerza exhortativa sin introducir una imagen ajena al texto.'
  doctrine_reference: Perseverancia en la oración
translation_notes:
  revision_awareness: Se corrigió la ancladura de la nota al incluir [a] junto a “desanimes” en el texto español, para que cada nota tenga marcador visible. La redacción sigue de cerca el hebreo y confirma con el griego la lectura de limosna.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando corresponde; este versículo no lo requiere.
  - Se evitó “SEÑOR” y se mantuvo un registro sobrio, apto para lectura litúrgica y estudio.
  - “Limosna” reproduce mejor la interpretación contextual de צדקה que una traducción genérica como “justicia”.
  - La ausencia de posesivo en “en la oración” sigue el hebreo y evita añadir información no expresada explícitamente.
