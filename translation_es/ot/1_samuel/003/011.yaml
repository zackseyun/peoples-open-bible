  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל שְׁמוּאֵ֔ל הִנֵּ֧ה אָנֹכִ֛י עֹשֶׂ֥ה דָבָ֖ר בְּ/יִשְׂרָאֵ֑ל אֲשֶׁר֙ כָּל שֹׁ֣מְע֔/וֹ תְּצִלֶּ֖ינָה שְׁתֵּ֥י אָזְנָֽי/ו־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/003/011.yaml
  text: Then Yahweh said to Samuel[a], "Behold, I am about to do a thing in Israel at which both ears of everyone who hears of it will tingle."
  footnotes:
