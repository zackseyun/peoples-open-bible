base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/021.yaml
  text: However[a], if he survives for a day or two, he shall not be avenged[b], for he is his money.
  footnotes:
  - marker: a
    text: Or, 'he shall not be punished.' The Hebrew more specifically speaks of vengeance or legal retribution being exacted.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for he is his money,' expressing the slave's economic value to the master.
    reason: cultural_note
