base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/048/028.yaml
  text: And along the border of Gad[a], at the south side southward, the border shall be from Tamar to the waters of Meribath-kadesh, to the Wadi[b], to the Great Sea.
  footnotes:
  - marker: a
    text: Meribath-kadesh may also be rendered 'Meribah-kadesh,' the more familiar form of the place name in English translations.
    reason: lexical_alternative
  - marker: b
    text: Or 'the brook of Egypt.' The Hebrew term can denote a wadi or streambed; 'wadi' is used here to avoid suggesting a perennial brook.
    reason: lexical_alternative
