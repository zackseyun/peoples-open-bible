review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: reparto de la tierra como herencia, separación de una porción consagrada para Yahvé, dimensiones 25.000 x 10.000, y declaración de santidad en todo su perímetro. Sin embargo, no preserva plenamente el rastro auditado del POB inglés en dos puntos: omite la alternativa léxica de ''asignar por sorteo'' para וּבְהַפִּילְכֶם y se aparta innecesariamente de la aclaración principal sobre la unidad implícita (''codos''), que el inglés sí suministra en el texto.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor precisión y naturalidad editorial. 'Distribuyan' funciona, aunque 'repartan' suena más natural en contexto territorial. 'En todo su contorno' es legible, pero 'dentro de todo su límite alrededor' resulta algo rígido; 'dentro de todo su límite circundante' preserva mejor la fuerza de בְּכָל גְּבוּלָהּ סָבִיב. También conviene incluir 'codos' en el texto principal para alinearse con la claridad del POB.
  glossary_alignment: Se cumple bien la política de יהוה -> 'Yahvé'. 'Porción' para תְּרוּמָה en este contexto territorial es defendible y consistente con la revisión inglesa a 'contribution/portion set apart'. 'Santa' para קֹדֶשׁ mantiene el sentido consagrado. No hay conflictos graves de glosario, pero falta trasladar la nota de alternativa léxica del inglés.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre la posible idea de reparto por sorteo
    rationale: El POB inglés conserva la alternativa 'Or allot the land by lot as an inheritance'. Dado que el hebreo וּבְהַפִּילְכֶם puede llevar ese matiz en contexto de reparto territorial, la revisión española debe preservarlo en nota.
  - severity: medium
    issue: Se omitió 'codos' del texto principal pese a que el POB inglés los suministra para claridad
    rationale: Aunque la unidad está implícita en el hebreo, la traducción auditada en inglés la añade por claridad. En español, dejarla solo en nota debilita la correspondencia con el texto auditado y puede crear ambigüedad para lectores no familiarizados con el contexto.
  - severity: low
    issue: La frase final puede ajustarse para reflejar más plenamente el perímetro delimitado
    rationale: '''En todo su contorno'' es comprensible, pero no representa tan explícitamente la idea de ''dentro de todo su límite circundante''.'
  revised_spanish_text: 'Y cuando repartan la tierra como herencia[a], apartarán una contribución para Yahvé, una porción santa de la tierra: veinticinco mil codos de longitud y diez mil de anchura[b]. Será santa dentro de todo su límite circundante.'
  revised_footnotes:
