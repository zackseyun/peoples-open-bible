translation:
  language: es
  text: Y la sabiduría de Salomón superó la sabiduría de toda la gente del oriente[a] y toda la sabiduría de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos del oriente», una designación regional idiomática. También puede traducirse «los orientales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶב
  english_pob_choice: surpassed
  chosen_spanish: superó
  alternatives_spanish:
  - creció más que
  - sobrepasó
  - resultó mayor que
  lexicon: HALOT
  rationale: La raíz רבה con comparación expresa superioridad, no solo aumento cuantitativo. En español, «superó» comunica de forma natural esa relación comparativa sin perder la fuerza del hebreo.
- source_word: חָכְמַת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - saberes
  - inteligencia
  - conocimiento
  lexicon: HALOT
  rationale: En este contexto, חָכְמָה se refiere a excelencia intelectual y práctica; «sabiduría» es la equivalencia estable y más fiel en español bíblico contemporáneo.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: standard name rendering
  rationale: Nombre propio bíblico estándar en español.
- source_word: מֵחָכְמַת
  english_pob_choice: the wisdom of
  chosen_spanish: la sabiduría de
  alternatives_spanish:
  - más que la sabiduría de
  - por encima de la sabiduría de
  lexicon: HALOT
  rationale: El prefijo מן introduce el comparativo. En español, la comparación ya queda expresada por el verbo «superó», por lo que no hace falta repetirla dentro del sintagma.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos / toda
  alternatives_spanish:
  - cada
  - el conjunto de
  lexicon: HALOT
  rationale: Se conserva el valor de totalidad de ambas ocurrencias, ajustando género y número según el sustantivo que acompaña.
- source_word: בְּנֵי קֶדֶם
  english_pob_choice: the people of the east
  chosen_spanish: los hijos del oriente
  alternatives_spanish:
  - la gente del oriente
  - los orientales
  - los pueblos del oriente
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos del oriente». Aunque la nota inglesa reconoce el carácter idiomático de la expresión, aquí se mantiene la imagen hebrea para no borrar su color regional; «del oriente» hace la frase inteligible en español.
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: standard place name rendering
  rationale: Nombre geográfico estándar en español.
translation_notes:
  revision_awareness: La versión inglesa revisó ‘sons of the east’ a ‘people of the east’ por claridad natural. La redacción española mantiene la imagen hebrea literal en el texto principal, pero la nota ofrece la alternativa idiomática para conservar la tensión entre fidelidad formal y claridad.
  spanish_consistency_notes:
  - Se usa «sabiduría» de manera uniforme para חָכְמָה.
  - Se preserva «Egipto» como nombre propio estándar.
  - Se evita ‘SEÑOR’ porque el versículo no contiene el tetragrámaton ni κύριος.
  - Se mantiene una construcción española natural con el comparativo ya expresado por «superó».
