revisions:
- from: Un tercio de ti morirá[a] por pestilencia y será consumido por el hambre en medio de ti, y un tercio caerá a espada alrededor de ti, y un tercio yo esparciré a todo viento[b], y desenvainaré una espada detrás de ellos.
