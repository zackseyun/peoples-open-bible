translation:
  language: es
  text: Pues en los días de David y de Asaf, de antiguo[a], había jefes de los cantores[b], y cantos de alabanza y de acción de gracias a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde antiguo» o «de tiempos antiguos» para מִקֶּדֶם.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «jefes de los cantores»; también puede entenderse «líderes de los cantores» o «principales de los cantores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce la base explicativa de la afirmación anterior; en español, «Porque» conserva con naturalidad ese valor causal-explicativo sin forzar el registro.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el tiempo de
  - en tiempos de
  lexicon: HALOT
  rationale: Es el equivalente idiomático más cercano y mantiene la fórmula temporal hebrea con claridad y dignidad.
- source_word: דָוִיד וְאָסָף
  english_pob_choice: David and Asaph
  chosen_spanish: David y de Asaf
  alternatives_spanish:
  - David y Asaf
  lexicon: HALOT
  rationale: Se conservan los nombres propios; se añade la repetición de la preposición para reflejar con naturalidad el paralelo temporal en español y evitar ambigüedad sintáctica.
- source_word: מִקֶּדֶם
  english_pob_choice: of old
  chosen_spanish: de antiguo
  alternatives_spanish:
  - de antiguo
  - desde antiguo
  - de tiempo antiguo
  lexicon: HALOT
  rationale: La frase expresa antigüedad o anterioridad remota. «De antiguo» es formal y breve, y corresponde bien al valor idiomático que la POB inglesa fijó como «of old».
- source_word: רֹאשׁ
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  - jefes
  lexicon: HALOT
  rationale: Aunque «cabezas» refleja más de cerca el hebreo, en español resulta poco natural; «jefes» conserva la idea de autoridad o dirección sobre el grupo de cantores.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: «Cantores» reproduce el campo semántico de cantar y es más litúrgico que «cantantes»; se evita «músicos» por ser más amplio que el hebreo.
- source_word: וְשִׁיר תְּהִלָּה
  english_pob_choice: songs of praise
  chosen_spanish: cantos de alabanza
  alternatives_spanish:
  - cantos de alabanza
  - canciones de alabanza
  - canto de alabanza
  lexicon: HALOT
  rationale: El hebreo coordina una expresión poética cultual; «cantos de alabanza» comunica bien el sentido colectivo y mantiene el tono de adoración.
- source_word: וְהֹד֖וֹת
  english_pob_choice: thanksgiving
  chosen_spanish: de acción de gracias
  alternatives_spanish:
  - de acción de gracias
  - de agradecimiento
  - de gratitud
  lexicon: HALOT
  rationale: La forma puede expresar acciones de dar gracias; «acción de gracias» es la equivalencia litúrgica más estable y precisa en español.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: HALOT
  rationale: La preposición marca dirección u objeto del homenaje; «a Dios» es la forma natural en español para esta coordinación cultual.
translation_notes:
  revision_awareness: Se siguió el pasaje revisado de la POB inglesa, conservando «of old» como valor idiomático de מִקֶּדֶם y manteniendo la estructura sintáctica del verso con un tono formal y readable en español.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como término por defecto cuando corresponda; este versículo no lo contiene.
  - Se usó «acción de gracias» para הוֹדוֹת por su uso litúrgico natural en español.
  - Se eligió «cantores» para הַמְשֹׁרְרִים por precisión semántica y registro eclesial amplio.
  - 'Los nombres propios se transliteran de forma estándar: David y Asaf.'
