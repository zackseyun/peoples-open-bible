review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura proverbial y acierta en «un rey», «con justicia», «establece» y «la derriba». Sin embargo, el punto léxico clave תְּרוּמוֹת no queda fiel al juicio documentado del POB inglés: aunque la palabra puede significar ofrendas/contribuciones, en este contexto la auditoría concluye que probablemente se refiere a pagos corruptos, por eso el inglés traduce «bribes» en el texto principal y deja la alternativa en nota. El español actual invierte esa decisión y debilita el contraste ético del proverbio.'
  spanish_quality_summary: '«Con justicia un rey establece una tierra» es legible y digno. Pero «un hombre de ofrendas» suena poco natural en español y sugiere piedad o culto, lo cual desvía el sentido contextual. Además, las notas están mal ancladas: [a] aparece sobre «tierra» pero explica «un hombre»; [b] aparece dos veces para notas distintas, lo cual incumple el formato requerido.'
  glossary_alignment: No hay conflicto con términos doctrinales mayores del glosario del proyecto. La principal cuestión terminológica es mantener la decisión lexical del POB para תְּרוּמוֹת como «sobornos» en el texto principal, con nota que preserve «contribuciones/ofrendas/regalos» como alternativas.
  issues:
  - severity: high
    issue: Traducción principal de תְּרוּמוֹת como «ofrendas»
    rationale: La auditoría inglesa documenta que, en este contexto, el sentido más probable es pagos corruptos; «ofrendas» en español desplaza el sentido hacia lo cultual y no preserva la decisión principal del POB.
  - severity: high
    issue: Marcadores de nota mal usados
    rationale: El marcador [b] se reutiliza para dos notas distintas y [a] está anclado a «tierra» aunque la nota trata de «un hombre». Esto incumple las instrucciones de formato y crea confusión.
  - severity: medium
    issue: Naturalidad de «un hombre de ofrendas»
    rationale: La construcción no es idiomática y puede sonar opaca o positiva; «un hombre de sobornos» comunica mejor el carácter corrupto que exige el paralelismo con «derriba».
  revised_spanish_text: Con justicia un rey establece una tierra, pero un hombre[a] de sobornos[b] la derriba.
  revised_footnotes:
  - marker: a
    text: Hebreo «un hombre», usado aquí en sentido representativo o genérico.
    reason: cultural_note
