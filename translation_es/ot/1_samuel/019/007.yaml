translation:
  language: es
  text: Entonces Jonatán llamó a David y le comunicó todas estas cosas. Después Jonatán llevó a David ante Saúl[a], y estuvo en su presencia como antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «como ayer, tres días atrás», un modismo hebreo que significa «como antes» o «como anteriormente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - citó
  - convocó
  lexicon: HALOT
  rationale: Con לְ + persona, קרא puede significar llamar o convocar. «Llamó» es natural en español y conserva la apertura entre un llamado simple y una citación formal sin añadir matices no presentes en el hebreo.
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le comunicó
  alternatives_spanish:
  - le dijo
  - le informó
  - le contó
  lexicon: HALOT
  rationale: נגד en hifil expresa hacer saber o comunicar. «Le comunicó» refleja bien ese valor de informar con claridad y evita reducir el verbo solo a conversación casual.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas palabras
  - todos estos asuntos
  lexicon: HALOT
  rationale: דברים puede ser «palabras», «asuntos» o «cosas». Aquí Jonatán transmite el contenido completo de lo ocurrido; «todas estas cosas» conserva la amplitud del hebreo y suena natural en español.
- source_word: וַיָּבֵא ... אֶל
  english_pob_choice: brought ... to
  chosen_spanish: llevó ... ante
  alternatives_spanish:
  - trajo ... a
  - condujo ... ante
  lexicon: HALOT
  rationale: El hifil de בוא indica hacer venir o llevar. «Llevó ... ante Saúl» comunica el movimiento de presentar a David ante el rey y preserva mejor la escena de corte que un simple «a» en español.
- source_word: וַיְהִי לְפָנָיו
  english_pob_choice: he was in his presence
  chosen_spanish: estuvo en su presencia
  alternatives_spanish:
  - estuvo delante de él
  - sirvió en su presencia
  lexicon: HALOT
  rationale: La expresión idiomática לְפָנָיו puede denotar estar delante de alguien o en su presencia, y en ciertos contextos también servicio cortesano. Aquí el sentido inmediato es restauración a la presencia de Saúl; «estuvo en su presencia» es claro y mantiene la ambigüedad controlada del hebreo.
- source_word: כְּאֶתְמוֹל שִׁלְשׁוֹם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y antes de ayer
  - como antaño
  lexicon: HALOT
  rationale: 'El hebreo es un modismo literal: «como ayer, tres días atrás», con sentido de «como antes» o «como anteriormente». «Como antes» comunica el valor idiomático con naturalidad y respeta la lectura adoptada por la POB inglesa.'
theological_decisions:
- issue: Restauración de David a la presencia de Saúl
  english_pob_reading: he was in his presence as before
  chosen_spanish_reading: estuvo en su presencia como antes
  alternative_spanish_readings:
  - sirvió en su presencia como antes
  - estuvo delante de él como antes
  rationale: El hebreo permite una lectura de presencia cortesana, y el contexto inmediato favorece la restitución de David ante Saúl tras la mediación de Jonatán. No se añade explícitamente «servir» porque el versículo no lo dice de forma directa, aunque la frase lo puede implicar en otros contextos.
  doctrine_reference: 1 Samuel 16:21-23; 18:1-5
- issue: Valor idiomático de כאתמול שלשום
  english_pob_reading: as before
  chosen_spanish_reading: como antes
  alternative_spanish_readings:
  - como de costumbre
  - como en tiempos pasados
  rationale: La locución hebrea tiene fuerza temporal idiomática, no cronológica literal. La traducción elegida evita sobreexplicar y mantiene la equivalencia de sentido que la POB inglesa ya documentó en nota.
  doctrine_reference: HALOT; uso idiomático hebreo
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control de concordancia general reportó alta coincidencia con observaciones menores. Esta versión sigue de cerca la lectura inglesa auditada y el hebreo, sin expandir el sentido más allá del texto.
  spanish_consistency_notes:
  - Se mantiene «David», «Jonatán» y «Saúl» como formas propias estables.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se conserva «presencia» para לְפָנָיו, evitando sustituirlo por fórmulas más litúrgicas que podrían estrechar el sentido.
