id: MRK.13.32
reference: Mark 13:32
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Περὶ δὲ τῆς ἡμέρας ἐκείνης ἢ ⸀τῆς ὥρας οὐδεὶς οἶδεν, οὐδὲ οἱ ἄγγελοι ⸀ἐν οὐρανῷ οὐδὲ ὁ υἱός, εἰ μὴ ὁ πατήρ.
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/032.yaml
  text: But concerning that day or hour[a], no one knows—not even the angels in heaven, nor the Son, but only the Father.
  footnotes:
  - marker: a
    text: Some interpreters understand 'nor the Son' with reference to the Son's incarnate mission or human nature; the translation preserves the wording of the Greek text without adding that explanation to the main text.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 그날과 그 시는 아무도 모릅니다 ─ 하늘의 천사들도 모르고, 아들도 모릅니다 ─ 오직 아버지만 아십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이 구절은 아들의 종속적-들림(subordinationist-sounding)으로 들리지만, 본문 자체의 문법과 어조를 그대로 보존합니다. 후대의 삼위일체 신학으로 평탄화하지 않습니다.
    reason: alternative_reading
theological_decisions:
- issue: 13:32의 아들의 무지(οὐδὲ ὁ υἱός) 본문 보존
  chosen_reading: 「아들도 모릅니다」를 본문 그대로 보존
  alternative_readings:
  - 「아들의 인성에 한정하여 모르신다」고 풀어쓰기
  - 「아들도」 절을 약화하기
  rationale: 본문은 아들이 그날과 그 시를 모른다고 분명히 진술한다. 일부 사본은 「아들도」 절을 누락하지만, NA28/SBLGNT는 이를 본문으로 유지한다. 후대의 신학적 부담을 본문 안으로 끌어들여 평탄화하지 않고, 마가의 단호한 종말 발언을 그대로 보존한다. 신학적 긴장은 각주에서 다룬다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; render the source''s strongest plain meaning'
