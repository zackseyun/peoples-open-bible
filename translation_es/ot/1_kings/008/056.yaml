translation:
  language: es
  text: Bendito sea Yahvé[a], que ha dado descanso a su pueblo Israel, conforme a todo lo que dijo. No ha fallado ni una sola palabra de todas sus buenas palabras que dijo por medio de Moisés, su siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ni una sola promesa ha fallado de todas sus buenas promesas», ya que aquí «palabra» tiene el sentido de promesa dicha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Alabado sea
  lexicon: HALOT
  rationale: La forma hebrea funciona como una fórmula benedictoria/exclamativa; en español, 'Bendito sea' conserva mejor ese matiz litúrgico y declarativo que un simple 'bendito es'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' preserva el nombre propio divino sin sustituirlo por un título.'
- source_word: נָתַן מְנוּחָה
  english_pob_choice: has given rest
  chosen_spanish: ha dado descanso
  alternatives_spanish:
  - ha dado reposo
  - ha dado tranquilidad
  - ha dado un lugar de descanso
  lexicon: HALOT
  rationale: La expresión denota estabilidad y cese de la inquietud nacional, no solo paz interior; 'descanso' comunica bien ese estado resultante en español bíblico contemporáneo.
- source_word: לְעַמּוֹ יִשְׂרָאֵל
  english_pob_choice: to his people Israel
  chosen_spanish: a su pueblo Israel
  alternatives_spanish:
  - a Israel, su pueblo
  - a su pueblo, Israel
  lexicon: HALOT
  rationale: La construcción posesiva y la apposición se conservan de manera natural en español sin forzar una puntuación excesiva.
- source_word: כְּכֹל אֲשֶׁר דִּבֵּר
  english_pob_choice: according to all that he spoke
  chosen_spanish: conforme a todo lo que había dicho
  alternatives_spanish:
  - según todo lo que había hablado
  - tal como había dicho
  lexicon: HALOT
  rationale: '''Conforme a'' refleja el valor de correspondencia del hebreo; el pretérito pluscuamperfecto ayuda a expresar que la palabra dicha precede y fundamenta el cumplimiento.'
- source_word: לֹא נָפַל דָּבָר אֶחָד
  english_pob_choice: Not one word has failed
  chosen_spanish: No ha caído ni una sola palabra
  alternatives_spanish:
  - No ha fallado ni una sola palabra
  - No se ha derrumbado ni una sola palabra
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de 'caer' sin convertirla en una mera paráfrasis; en español, 'no ha caído' conserva la metáfora de fracaso o falta de cumplimiento.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - cosa
  - asunto
  lexicon: HALOT
  rationale: En este contexto la referencia es a lo dicho por Yahvé; 'palabra' preserva la relación verbal y la intensidad de la afirmación de cumplimiento.
- source_word: מִכֹּל דְּבָרָיו הַטּוֹב
  english_pob_choice: of all his good words
  chosen_spanish: de todas sus buenas palabras
  alternatives_spanish:
  - de todas sus buenas promesas
  - de todas sus buenas expresiones
  lexicon: HALOT
  rationale: El hebreo conserva el léxico de 'palabras'; 'buenas palabras' mantiene esa forma sin ocultar la posible carga promesal que el contexto exige.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La fórmula hebrea de agencia se vuelve más natural en español con 'por medio de', que comunica mediación sin sonar forzado.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: HALOT
  rationale: Se opta por 'esclavo' siguiendo la fuerza léxica de עֶבֶד y la preferencia del proyecto por no suavizarlo automáticamente a 'siervo'; en esta fórmula honorífica, el término conserva la dependencia y pertenencia a Yahvé.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa יְהוָה; se mantiene el nombre propio divino en español según la convención del proyecto, sin sustituirlo por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de דָּבָר / דְּבָרָיו en una afirmación de cumplimiento
  english_pob_reading: word / good words
  chosen_spanish_reading: palabra / buenas palabras
  alternative_spanish_readings:
  - promesa / promesas
  rationale: Aunque el contexto es de cumplimiento de promesas, el hebreo repite 'palabra'; se conserva ese léxico en el texto principal para no borrar la tensión entre la formulación verbal y su sentido promesal, que queda implícito en el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
- issue: Fórmula de agencia בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - mediante Moisés
  rationale: La mediación profética es real en el original; 'por medio de' comunica esa mediación con naturalidad en español sin perder la función instrumental de la expresión.
  doctrine_reference: 'DOCTRINE.md: translation principles on idiomatic agency formulas'
- issue: עַבְדּוֹ aplicado a Moisés
  english_pob_reading: his servant
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su siervo
  rationale: Moisés es presentado como pertenencia y agente subordinado de Yahvé. 'Esclavo' mantiene la fuerza semántica de עֶבֶד y evita sustituir el término por una opción más eclesiástica pero menos precisa.
  doctrine_reference: 'DOCTRINE.md: lexical fidelity; contested terms — δοῦλος / עבד → esclavo'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión menor en la cláusula final, pasando de 'his good word' a 'his good words' para reflejar mejor el plural/colectivo hebreo. La versión española ya refleja esa lectura plural con 'todas sus buenas palabras', manteniendo además la alternancia semántica entre 'palabra' y 'promesa' en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se conserva 'palabra' en la línea principal para respetar el hebreo דָּבָר y no reducirlo sin necesidad a 'promesa'.
  - '''Esclavo'' se usa para עַבְדּוֹ siguiendo la política léxica del proyecto y la fuerza del término en referencia a Moisés.'
  - La fórmula 'por medio de Moisés' se elige por naturalidad española, sin eliminar la mediación expresada por בְּיַד.
  - '''Descanso'' reproduce el valor de מְנוּחָה en un registro bíblico claro y actual.'
