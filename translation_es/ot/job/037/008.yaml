translation:
  language: es
  text: Entonces el animal salvaje entra en su guarida[a], y permanece en sus madrigueras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la bestia entra en su escondite, y habita en sus moradas».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: Then ... enters
  chosen_spanish: Entonces ... entra
  alternatives_spanish:
  - Y ... entra
  - Luego ... entra
  lexicon: HALOT
  rationale: El wayyiqtol avanza la secuencia poética; en español, «Entonces» conserva ese enlace narrativo y el presente «entra» mantiene el efecto vívido del original y del POB inglés.
- source_word: חַיָּה
  english_pob_choice: the wild animal
  chosen_spanish: el animal salvaje
  alternatives_spanish:
  - la bestia
  - el animal
  - la fiera
  lexicon: HALOT
  rationale: חַיָּה puede ser un animal en general, pero aquí el contexto de búsqueda de refugio en tormenta favorece un animal no domesticado. «Animal salvaje» evita la dureza de «bestia» y conserva el matiz de untamed creature.
- source_word: בְמוֹ אָרֶב
  english_pob_choice: its lair
  chosen_spanish: su escondite
  alternatives_spanish:
  - su guarida
  - su madriguera
  - su cueva
  lexicon: HALOT
  rationale: El sustantivo אָרֶב apunta a un lugar de acecho o ocultamiento. «Escondite» comunica bien el lugar donde el animal se resguarda sin introducir un matiz demasiado específico que el hebreo no exige; la alternativa «guarida» queda cercana a la idea de la POB de lair.
- source_word: וּבִמְעוֹנֹתֶיהָ
  english_pob_choice: and ... in its dens
  chosen_spanish: en sus madrigueras
  alternatives_spanish:
  - en sus cuevas
  - en sus moradas
  - en sus refugios
  lexicon: HALOT
  rationale: מְעוֹנוֹת es plural y conviene preservarlo. «Madrigueras» es un plural natural para el hábitat de animales y mantiene la idea de lugares de refugio; también conserva mejor la imagen concreta que «moradas».
- source_word: תִשְׁכֹּן
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - habita
  - se queda
  - mora
  lexicon: HALOT
  rationale: שכן tiene el sentido de habitar o permanecer. «Permanece» expresa la continuidad del quedarse resguardado después de entrar, como en el POB inglés, sin sonar demasiado arcaico.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene estable en la última pasada; no hay revisiones aplicadas y el veredicto fue de concordancia moderada con objeciones menores. La versión española refleja esa estabilidad y conserva la alternancia léxica principal del POB para el campo semántico de animal/refugio.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantuvo un registro sobrio y bíblico sin arcaísmos innecesarios.
  - La nota al pie preserva una alternativa léxica real sin duplicar el sentido principal en el cuerpo del texto.
