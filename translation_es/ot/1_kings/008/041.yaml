translation:
  language: es
  text: Y también al extranjero[a], que no es de tu pueblo Israel, pero viene de una tierra lejana por causa de tu nombre—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el forastero» o «el foráneo». El hebreo נָכְרִי designa a un no israelita, no simplemente a un viajero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - También
  - Y aun
  lexicon: HALOT
  rationale: Conserva el valor aditivo y enfático del hebreo en una coordinación natural para el español bíblico actual.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: al
  alternatives_spanish:
  - con respecto al
  - acerca del
  lexicon: HALOT
  rationale: En este contexto de oración, la preposición introduce al destinatario/caso de la petición; en español, «al» seguido de dativo indirecto mantiene la referencia sin añadir una glosa excesiva.
- source_word: הַנָּכְרִי
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el foráneo
  - el extraño
  lexicon: HALOT
  rationale: נָכְרִי designa a un no israelita. «Extranjero» es claro y digno en español, y preserva la distinción étnico-covenantal sin volverla meramente social. Se evita «extraño» por su posible ambigüedad semántica.
- source_word: אֲשֶׁר לֹא מֵעַמְּךָ יִשְׂרָאֵל הוּא
  english_pob_choice: who is not from your people Israel
  chosen_spanish: que no es de tu pueblo Israel
  alternatives_spanish:
  - que no pertenece a tu pueblo Israel
  - que no es de entre tu pueblo Israel
  lexicon: HALOT
  rationale: «No es de tu pueblo Israel» reproduce de manera natural la exclusión de pertenencia indicada por el hebreo y mantiene el vínculo nominativo con Israel como pueblo de Yahvé.
- source_word: וּבָא
  english_pob_choice: but comes
  chosen_spanish: sino que viene
  alternatives_spanish:
  - y viene
  - pero viene
  lexicon: HALOT
  rationale: El hebreo presenta contraste entre no pertenecer a Israel y venir desde lejos. «Sino que viene» expresa ese contraste en español con mayor naturalidad que una coordinación simple.
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra distante
  alternatives_spanish:
  - de una tierra lejana
  - de un país lejano
  lexicon: HALOT
  rationale: «Tierra distante»/«tierra lejana» conserva el paralelismo y la amplitud geográfica del hebreo sin restringirlo a la noción moderna de país.
- source_word: לְמַעַן שְׁמֶךָ
  english_pob_choice: for the sake of your name
  chosen_spanish: por causa de tu nombre
  alternatives_spanish:
  - por amor de tu nombre
  - a causa de tu nombre
  lexicon: HALOT
  rationale: La expresión hebrea apunta al motivo o propósito ligado al nombre revelado de Dios. «Por causa de tu nombre» mantiene ese valor causal/teleológico sin diluir la fuerza teológica de «nombre».
theological_decisions:
- issue: Distinción de pacto entre Israel y el no israelita que se acerca a Yahvé
  english_pob_reading: the foreigner, who is not from your people Israel
  chosen_spanish_reading: el extranjero, que no es de tu pueblo Israel
  alternative_spanish_readings:
  - el forastero, que no es de tu pueblo Israel
  - el no israelita, que no es de tu pueblo Israel
  rationale: 'La versión conserva la marcación del hebreo: este individuo no pertenece a Israel, pero aun así puede venir orientado al nombre de Yahvé. No se suaviza la diferencia de pertenencia, porque es parte del peso teológico del versículo.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y la decisión auditada en inglés de mantener la categoría étnico-covenantal de נָכְרִי. Se preserva el contraste entre no pertenecer a Israel y venir desde una tierra distante, así como la motivación teológica ligada al nombre de Yahvé. No se detectan cambios editoriales previos que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar POB para el nombre divino cuando aparezca explícito; aquí el versículo conserva «tu nombre» sin necesidad de introducirlo.
  - Se mantiene «extranjero» como término principal por claridad y fidelidad contextual, dejando la alternativa en nota.
  - «Por causa de tu nombre» preserva la fuerza idiomática del hebreo sin convertirla en explicación interpretativa más amplia.
