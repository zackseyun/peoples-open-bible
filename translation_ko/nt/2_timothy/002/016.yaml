  text: But avoid profane empty talk, for they will advance further into ungodliness,
translation:
  language: ko
  text: 그러나 속되고 헛된 말을 피하십시오. 그것은 점점 더 경건치 못한 데로 나아가게 만들기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰς βεβήλους κενοφωνίας
  english_pob_choice: profane empty talk
  chosen_korean: 속되고 헛된 말
  alternatives_korean:
  - 망령된 헛된 말
  - 세속적이고 공허한 잡담
  lexicon: BDAG
  rationale: βέβηλος는 「거룩하지 않은·속된」, κενοφωνία는 「공허한 말」. 두 형용사를 자연스러운 한국어 짝(「속되고 헛된」)으로 옮긴다.
- source_word: περιΐστασο
  english_pob_choice: avoid
  chosen_korean: 피하십시오
  alternatives_korean:
  - 멀리하십시오
  - 비켜 가십시오
  lexicon: BDAG
  rationale: περιΐστημι(중간태)는 「둘러서서 비켜감·피함」. 「피하십시오」가 자연스럽다.
- source_word: προκόψουσιν ἀσεβείας
  english_pob_choice: will advance further into ungodliness
  chosen_korean: 점점 더 경건치 못한 데로 나아가게 만들기
  alternatives_korean:
  - 더욱 불경건으로 진전시키기
  - 점점 더 불경한 데로 나아가게 하기
  lexicon: BDAG
  rationale: προκόπτω는 「전진·진전」. ἀσέβεια는 「경건의 결여·불경」. 한국어 「경건치 못한」이 한국 성서 전통에서 익숙하다.
