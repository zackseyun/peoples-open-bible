id: 1CO.14.2
reference: 1 Corinthians 14:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ γὰρ λαλῶν γλώσσῃ οὐκ ἀνθρώποις λαλεῖ ⸀ἀλλὰ θεῷ, οὐδεὶς γὰρ ἀκούει, πνεύματι δὲ λαλεῖ μυστήρια·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/002.yaml
  text: For the one speaking in a tongue does not speak to people but to God, for no one understands; rather, he speaks mysteries in the Spirit.
  footnotes:
  - marker: a
    text: Or 'for no one hears.' The Greek verb can mean either 'hear' or, by implication in context, 'understand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he speaks mysteries in spirit.' The Greek phrase may refer to the Holy Spirit or to the speaker's spirit.
    reason: alternative_reading
translation:
  language: ko
  text: 방언으로 말하는 사람은 사람에게 말하는 것이 아니라 하나님께 말하는 것입니다. 아무도 알아듣지 못하기 때문이며, 그는 영으로 비밀들을 말합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_korean: 방언
  alternatives_korean:
  - 언어
  lexicon: BDAG
  rationale: 글로사리 기본값. 14장 전체에서 「방언」으로 통일하여 바울 논지의 용어 일관성을 유지한다.
- source_word: ἀκούει
  english_pob_choice: understands
  chosen_korean: 알아듣다
  alternatives_korean:
  - 듣다
  lexicon: BDAG
  rationale: 문맥상 ἀκούω는 「청각적으로 듣는다」가 아니라 「의미를 알아듣는다」를 가리킨다.
- source_word: πνεύματι
  english_pob_choice: in the Spirit
  chosen_korean: 영으로
  alternatives_korean:
  - 성령으로
  - 영 안에서
  lexicon: BDAG
  rationale: 헬라어가 성령인지 화자의 영인지 명시하지 않으므로 글로사리에 따라 기본 「영」으로 두고 결정을 본문이 강요하지 않게 한다.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_korean: 비밀
  alternatives_korean:
  - 비밀스러운 것
  lexicon: BDAG
  rationale: μυστήριον의 기본 한국어 등가.
