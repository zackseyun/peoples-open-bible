translation:
  language: es
  text: En el primer mes, el día catorce del mes, al atardecer[a], es la Pascua[b] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “entre las tardes”, un modismo hebreo para el período de crepúsculo alrededor de la puesta del sol.
    reason: lexical_alternative
  - marker: b
    text: O “el sacrificio de Pascua” / “la ofrenda pascual”.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: In the first month
  chosen_spanish: En el primer mes
  alternatives_spanish:
  - En el primer mes lunar
  - En el primer mes del año religioso
  lexicon: HALOT
  rationale: חֹדֶשׁ en contexto calendárico significa “mes”; el ordinal הָרִאשׁוֹן marca el primero del ciclo cultual. “Mes” comunica con naturalidad el dato calendárico sin añadir interpretación innecesaria.
- source_word: בְּאַרְבָּעָה עָשָׂר לַחֹדֶשׁ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - el catorce del mes
  - el día catorce del mes lunar
  lexicon: HALOT
  rationale: La formulación hebrea es una fecha normal dentro del mes. En español, añadir “día” hace la referencia fluida y precisa, como en el audit trail inglés.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: at twilight
  chosen_spanish: al atardecer
  alternatives_spanish:
  - al anochecer
  - al crepúsculo
  - entre las dos tardes
  lexicon: HALOT
  rationale: La expresión idiomática literalmente significa “entre las tardes/evenings” y se refiere al período de transición alrededor de la puesta del sol. “Al atardecer” es claro y natural en español; se preserva la opción más literal en la nota.
- source_word: פֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el sacrificio pascual
  - la ofrenda de Pascua
  lexicon: HALOT
  rationale: En este contexto de calendario festivo, el término puede referirse a la celebración o al acto sacrificial. “La Pascua” conserva ese alcance amplio sin resolver prematuramente la tensión; la alternativa sacrificial queda documentada.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino “Yahvé” según el criterio del proyecto, evitando el reemplazo por una máscara tradicional. La preposición ל admite pertenencia/dedicación; “para” suena natural en español y conserva el sentido de consagración.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la terminología del proyecto, se traduce por el nombre propio “Yahvé” para preservar la referencia al nombre de pacto, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פֶּסַח en contexto cultual
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - el sacrificio pascual
  - la Pascua (como sacrificio/rito)
  rationale: El contexto es un calendario de fiestas señaladas, por lo que la referencia principal es la celebración. Aun así, el hebreo puede incluir la dimensión sacrificial; no se elimina esa tensión, sino que se deja abierta mediante la nota alternativa.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Interpretación de בֵּין הָעַרְבַּיִם
  english_pob_reading: between the evenings / at twilight
  chosen_spanish_reading: al atardecer
  alternative_spanish_readings:
  - entre las dos tardes
  - al anochecer
  rationale: La expresión es idiomática y ha sido discutida en relación con el momento exacto de la Pascua. “Al atardecer” comunica el intervalo alrededor de la puesta del sol sin imponer una precisión interpretativa excesiva.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del control auditado en inglés; la redacción española conserva la misma estructura sintáctica y las mismas tensiones léxicas, con adaptación idiomática mínima al español.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יהוה, conforme al estándar del proyecto.
  - “Pascua” conserva la ambigüedad festival/sacrificio que el audit trail inglés deja abierta.
  - “Al atardecer” refleja la franja temporal idiomática de בֵּין הָעַרְבַּיִם sin forzar una precisión no explícita en el hebreo.
  - El registro es bíblico y sobrio, pero con español natural de lectura pública.
