translation:
  language: es
  text: Mataron a toda persona que había en ella con el filo de la espada[a], consagrándolas a la destrucción; no quedó nada que respirara[b][c], y él quemó Hazor con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "a filo de espada". El hebreo usa un modismo literal, "por boca de espada".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "no quedó ningún aliento"; es un modismo que significa que no quedó ningún sobreviviente.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo pasa del plural "mataron" al singular "él quemó"; probablemente el sujeto singular en la última cláusula es Josué.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: They struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - golpearon
  - mataron
  lexicon: HALOT
  rationale: El verbo hebreo en contexto bélico denota derrotar/derribar en combate. "Derribaron" conserva la fuerza militar sin reducirlo a un simple golpe, y evita una paráfrasis demasiado explicativa.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: todo ser viviente que había en ella
  alternatives_spanish:
  - toda persona que había en ella
  - cada alma que había en ella
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí apunta a los habitantes vivos de la ciudad, no al alma inmaterial. "Ser viviente" mantiene el valor de vida/personalidad sin forzar un calco de "alma" que en español sonaría doctrinalmente cargado.
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - con la espada
  - a filo de espada
  lexicon: HALOT
  rationale: Es un modismo hebreo. "Con el filo de la espada" comunica el mismo sentido idiomático en un español natural y mantiene la imagen violenta del original.
- source_word: הַחֲרֵם
  english_pob_choice: devoting them to destruction
  chosen_spanish: consagrándolos a la destrucción
  alternatives_spanish:
  - entregándolos a la destrucción
  - poniéndolos bajo anatema
  lexicon: HALOT
  rationale: La forma intensiva de חרם expresa la idea de consagrar algo a la destrucción en el marco de la guerra santa. "Consagrándolos a la destrucción" conserva tanto la dimensión cultual/judicial como la consecuencia destructiva, sin sustituirla por una frase más doctrinalizada.
- source_word: לֹא נוֹתַר כָּל נְשָׁמָה
  english_pob_choice: not a single breathing thing was left
  chosen_spanish: no quedó ninguna cosa que respirara
  alternatives_spanish:
  - no quedó ningún aliento
  - no sobrevivió nadie
  lexicon: HALOT
  rationale: נְשָׁמָה se relaciona con aliento/respiración. La opción elegida reproduce el idiomismo hebreo de manera clara en español y evita limitarlo solo a personas, manteniendo la amplitud de "todo lo que respirara".
- source_word: חָצ֖וֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: standard transliteration
  rationale: Es un nombre propio geográfico; se conserva la transliteración habitual "Hazor" para coherencia con la tradición de transliterar nombres en el proyecto.
- source_word: שָׂרַף בָּאֵשׁ
  english_pob_choice: he burned Hazor with fire
  chosen_spanish: prendió fuego a Hazor
  alternatives_spanish:
  - quemó a Hazor
  - incendió Hazor
  lexicon: HALOT
  rationale: El hebreo usa el verbo "quemar" unido a "con fuego". En español, "prendió fuego a Hazor" comunica de forma natural esa combinación y evita una construcción menos idiomática, sin perder la explicitud del acto.
theological_decisions:
- issue: Rendering of חרם in a conquest context
  english_pob_reading: devoting them to destruction
  chosen_spanish_reading: consagrándolos a la destrucción
  alternative_spanish_readings:
  - entregándolos a la destrucción
  - poniéndolos bajo anatema
  rationale: Se preserva el peso judicial y cultual de חרם, no solo la idea general de aniquilar. "Consagrándolos a la destrucción" mantiene la tensión teológica del texto y sigue siendo comprensible para lectores actuales.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Shift from plural to singular subject in the final clause
  english_pob_reading: They struck down ... and he burned Hazor with fire
  chosen_spanish_reading: Ellos derribaron ... y prendió fuego a Hazor
  alternative_spanish_readings:
  - Ellos derribaron ... y ellos prendieron fuego a Hazor
  rationale: Se conserva el cambio del plural al singular que presenta el hebreo. En español, dejar el verbo final en singular mantiene la transparencia textual y sugiere la referencia singular probable, sin suavizar el cambio gramatical.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, preservando el modismo de "filo de la espada", el valor de חרם y el cambio de sujeto del plural al singular en la cláusula final. No se aplicaron revisiones posteriores en el expediente; el último pase indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se usó "Yahvé" como convención del proyecto cuando apareciera el nombre divino; en este versículo no aparece.
  - Se evitó "alma" en el cuerpo principal para נֶפֶשׁ, reservando la aclaración para la nota.
  - Se mantuvo un español bíblico claro y contemporáneo, sin depender de formulaciones tradicionales que oculten el matiz del hebreo.
