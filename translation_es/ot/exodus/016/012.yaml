translation:
  language: es
  text: 'He oído las murmuraciones de los hijos de Israel. Háblales así: «Entre las tardes[a] comerán carne, y por la mañana se saciarán de pan, y sabrán que yo soy Yahvé, el Dios de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las tardes», un idiomatismo que alude al período del crepúsculo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya atendida con relevancia presente; en español, «He oído» comunica bien esa inmediatez sin forzar un calco temporal.
- source_word: תְּלוּנֹּת
  english_pob_choice: grumblings
  chosen_spanish: las murmuraciones
  alternatives_spanish:
  - las quejas
  - los murmullos
  lexicon: HALOT
  rationale: El sustantivo sugiere protesta repetida y descontenta en el contexto del desierto. «Murmuraciones» conserva ese matiz mejor que «quejas», y es natural en español bíblico actual.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina explícita del hebreo («hijos») en vez de suavizarla con «israelitas», siguiendo la transparencia lexical y la preferencia por la precisión formal.
- source_word: דַּבֵּר אֲלֵהֶם לֵאמֹר
  english_pob_choice: Speak to them, saying
  chosen_spanish: Háblales y diles
  alternatives_spanish:
  - Háblales, diciendo
  - Diles
  lexicon: HALOT
  rationale: En español, la cadena de habla hebrea se expresa con mayor naturalidad como un doble mandato. «Háblales y diles» preserva la función introductoria sin sonar mecánico.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: Between the evenings
  chosen_spanish: Entre las tardes
  alternatives_spanish:
  - Entre los dos atardeceres
  - Al caer la tarde
  lexicon: HALOT
  rationale: Se mantiene la literalidad del idiomatismo hebreo con una construcción transparente en español. No se reemplaza por una paráfrasis interpretativa; la ambigüedad cronológica queda disponible para nota.
- source_word: תֹּאכְל֣וּ בָשָׂ֔ר
  english_pob_choice: you shall eat meat
  chosen_spanish: comerán carne
  alternatives_spanish:
  - comerán carne
  - comerán comida de carne
  lexicon: HALOT
  rationale: En el campo semántico alimentario, בָשָׂר se traduce naturalmente «carne». Se evita «flesh», menos idiomático en español y más anatómico que lo que aquí requiere el contexto.
- source_word: וּבַבֹּקֶר
  english_pob_choice: and in the morning
  chosen_spanish: y por la mañana
  alternatives_spanish:
  - y en la mañana
  - y por la mañana temprano
  lexicon: HALOT
  rationale: «Por la mañana» reproduce con claridad el valor temporal del hebreo y suena más natural que un calco rígido.
- source_word: תִּשְׂבְּעוּ לָחֶם
  english_pob_choice: you shall be filled with bread
  chosen_spanish: se saciarán de pan
  alternatives_spanish:
  - quedarán satisfechos con pan
  - tendrán pan hasta saciarse
  lexicon: HALOT
  rationale: El verbo expresa saciedad, no solo presencia de alimento. «Se saciarán de pan» conserva la abundancia prometida y mantiene el foco en el resultado completo.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you shall know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - y reconocerán
  lexicon: HALOT
  rationale: El valor consecutivo del hebreo se expresa de forma fluida como futuro español. «Sabrán» comunica el reconocimiento resultante sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención proyectual para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El posesivo se adapta al registro bíblico español; «su Dios» evita un regionalismo y mantiene la referencia al Dios de Israel en un castellano amplio.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto, no un sustituto titulado. La forma española de proyecto es «Yahvé», coherente con la política de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בֵּין הָעַרְבַּיִם
  english_pob_reading: Between the evenings
  chosen_spanish_reading: Entre las tardes
  alternative_spanish_readings:
  - Al atardecer
  - Entre los dos atardeceres
  rationale: Se preserva la tensión idiomática del hebreo, evitando cerrar prematuramente el sentido. La redacción principal es literal pero inteligible, y la nota puede explicar el rango temporal.
  doctrine_reference: Lexical transparency principle / idiomatic preservation
- issue: Género explícito en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva el masculino plural explícito del hebreo. No se neutraliza a «israelitas» porque eso borra una señal formal del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde una primera solución más interpretativa («At twilight») hacia una forma más literal («Between the evenings»). La redacción española sigue esa revisión, evitando una paráfrasis temporal cerrada y preservando el idiomatismo hebreo con una equivalencia transparente. También se mantuvo la decisión auditada de traducir el Nombre divino como Yahvé/Yahweh según la política del proyecto, y de conservar la forma masculina explícita «hijos de Israel».
  spanish_consistency_notes:
  - Se mantiene el mismo criterio para יְהוָה como «Yahvé» en todo el versículo.
  - La puntuación reproduce el discurso directo con comillas tipográficas y una apertura clara tras «diles».
  - «Murmuraciones» y «se saciarán de pan» conservan el tono de descontento y provisión abundante sin añadir elementos ajenos al hebreo.
