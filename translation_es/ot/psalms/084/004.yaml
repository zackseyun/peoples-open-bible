revisions:
- from: Hasta el gorrión ha hallado una casa[a], y la golondrina un nido para sí[b], donde ponga sus polluelos—junto a tus altares, Yahvé de los ejércitos, mi Rey y mi Dios.
  to: Hasta el gorrión ha encontrado un hogar, y la golondrina un nido para sí, donde ponga[a] sus polluelos—junto a tus altares[b], Yahvé de los ejércitos, mi Rey y mi Dios.
  rationale: 'Se corrigen los anclajes de notas para que coincidan con las alternativas documentadas en la POB inglesa y con la evidencia hebrea: la nota de aspecto verbal pasa a «donde ponga», y la nota locativa se ancla a «tus altares». Además, «ha encontrado un hogar» mejora la naturalidad y refleja mejor el sentido de מָצְאָה בַיִת sin apartarse del original.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:16:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la comparación enfática con las aves pequeñas, el hallazgo de morada/nido, la referencia a los altares y la invocación directa a Yahvé. También mantiene correctamente «Yahvé» y «de los ejércitos». Sin embargo, no preserva fielmente el aparato de notas de la POB inglesa: la nota [a] se ancla a «casa», cuando en el inglés y en la evidencia fuente la alternativa corresponde a la cláusula verbal «donde ponga / ha puesto sus polluelos»; además falta una nota para la alternativa locativa en «junto a tus altares».'
  spanish_quality_summary: El español es legible y digno, pero «ha hallado una casa» suena menos natural que «ha encontrado un hogar» o «ha hallado un hogar» para מָצְאָה בַיִת. «Para sí» es aceptable, y «junto a tus altares» es buena solución. La revisión principal es de fidelidad editorial y anclaje de notas más que de fluidez.
  glossary_alignment: 'Alineación generalmente buena con el glosario del proyecto: יְהוָה → «Yahvé» correcto; צְבָאוֹת → «de los ejércitos» correcto; títulos divinos bien conservados. No hay conflicto doctrinal serio. La única desalineación relevante está en la gestión de notas léxicas, no en la terminología principal.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «casa», pero la alternativa documentada corresponde a «donde ponga / ha puesto sus polluelos».
    rationale: El rastro de auditoría inglés preserva una alternativa para אֲשֶׁר שָׁתָה, no para מָצְאָה בַיִת. Tal como está, la nota española atribuye la variación al segmento equivocado y confunde la evidencia fuente.
  - severity: medium
    issue: Falta una nota anclada para la alternativa locativa de «junto a tus altares».
    rationale: La POB inglesa conserva una nota específica para «at your altars» con alternativas «near/beside your altars». En español debe preservarse esa información con marcador propio en el sintagma correspondiente.
  - severity: low
    issue: «Ha hallado una casa» es menos idiomático que «ha encontrado un hogar»/«ha hallado un hogar».
    rationale: Aunque «casa» es lexicalmente cercano, el hebreo aquí comunica lugar de morada. «Hogar» suena más natural en español y refleja mejor el sentido idiomático de la expresión, en línea con la POB inglesa «has found a home».
  revised_spanish_text: Hasta el gorrión ha encontrado un hogar, y la golondrina un nido para sí, donde ponga[a] sus polluelos—junto a tus altares[b], Yahvé de los ejércitos, mi Rey y mi Dios.
  revised_footnotes:
