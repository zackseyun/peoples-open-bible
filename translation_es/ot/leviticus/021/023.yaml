  rationale: Se corrigieron los anclajes de notas para que correspondan exactamente a las palabras pertinentes; se eliminaron notas innecesarias sobre «Sin embargo» y «entrará» porque el inglés auditado no las conserva como notas y en español no añaden claridad suficiente; se ajustó la cláusula final a «quien los santifica» para reflejar mejor el participio hebreo y mejorar la naturalidad; y se adoptó «o» para mantener la coordinación más fluida ya respaldada en la revisión inglesa del POB.
