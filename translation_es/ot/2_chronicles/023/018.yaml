  text: וַ/יָּשֶׂם֩ יְהוֹיָדָ֨ע פְּקֻדֹּ֜ת בֵּ֣ית יְהוָ֗ה בְּ/יַ֨ד הַ/כֹּהֲנִ֣ים הַ/לְוִיִּם֮ אֲשֶׁ֣ר חָלַ֣ק דָּוִיד֮ עַל בֵּ֣ית יְהוָה֒ לְֽ/הַעֲל֞וֹת עֹל֣וֹת יְהוָ֗ה כַּ/כָּת֛וּב בְּ/תוֹרַ֥ת מֹשֶׁ֖ה בְּ/שִׂמְחָ֣ה וּ/בְ/שִׁ֑יר עַ֖ל יְדֵ֥י דָוִֽיד־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/018.yaml
  text: And Jehoiada appointed the oversight of the house of Yahweh into the hand of the priests[a], the Levites, whom David had assigned over the house of Yahweh, to offer up burnt offerings to Yahweh, as it is written in the Law of Moses, with rejoicing and with song[c][b], according to the direction of David.
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of,'' an idiom meaning ''into the charge of'' or ''under the authority of.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the Levitical priests' or 'the priests and the Levites.' The Hebrew expression can be understood in more than one way.
    reason: alternative_reading
  - marker: c
    text: Or 'by the hand of David,' that is, according to David's arrangement or prescription.
    reason: lexical_alternative
