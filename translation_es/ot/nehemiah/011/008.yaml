translation:
  language: es
  text: 'Y después de él estaban Gabbai y Sallai: novecientos veintiocho[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probablemente en este contexto, «junto a él», si la expresión se toma en sentido espacial y no secuencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  english_pob_choice: And after him
  chosen_spanish: Y después de él
  alternatives_spanish:
  - Y luego de él
  - Y tras él
  - Y junto a él
  lexicon: HALOT
  rationale: La frase hebrea indica relación posicional o secuencial. En este contexto de lista, la lectura más probable es de sucesión; por eso se traduce con «después de él». Se evita «junto a él» en el texto principal porque esa alternativa espacial es menos probable, aunque sigue siendo posible en nota.
- source_word: גַּבַּי
  english_pob_choice: Gabbai
  chosen_spanish: Gabbai
  alternatives_spanish:
  - Gabay
  lexicon: Nombre propio
  rationale: Nombre propio transliterado; no hay base para traducirlo.
- source_word: סַלָּי
  english_pob_choice: Sallai
  chosen_spanish: Sallai
  alternatives_spanish:
  - Salai
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según el uso del POB en inglés y la práctica de mantener los nombres sin traducir.
- source_word: תְּשַׁע מֵאוֹת עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: nine hundred twenty-eight
  chosen_spanish: novecientos veintiocho
  alternatives_spanish:
  - '928'
  - novecientos y veintiocho
  lexicon: HALOT
  rationale: 'La secuencia numérica hebrea es directa: 900 + 20 + 8. En español, la forma más natural y fiel en un registro bíblico moderno es escribir el número con palabras. No se añade «y» porque en español estándar no corresponde dentro de 21–99 en este caso.'
translation_notes:
  revision_awareness: El texto inglés auditado fue corregido de una coma a «and» entre los dos nombres; la traducción española refleja correctamente ambos nombres coordinados con «y» y mantiene el orden secuencial de la frase hebrea.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios sin adaptar a formas tradicionales.
  - Se usa «novecientos veintiocho» en vez de cifra para conservar el estilo bíblico legible.
  - La puntuación con dos puntos reproduce la pausa natural del listado y separa la cifra final.
