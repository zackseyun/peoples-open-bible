translation:
  language: es
  text: Yahvé enviará sobre ti la maldición, la confusión y la reprensión en toda obra[a] que emprendas, hasta que seas destruido y hasta que perezcas rápidamente, por la maldad de tus obras con las cuales me has abandonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en todo el poner de tu mano», es decir, en todo lo que emprendas o hagas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: YHWH / Tetragrámaton
  rationale: Se conserva el nombre propio divino del texto hebreo, siguiendo el criterio POB de no sustituirlo por un título. En español, «Yahvé» es la forma natural y reconocible para lectores eclesiales.
- source_word: יְשַׁלַּח
  english_pob_choice: will send
  chosen_spanish: enviará
  alternatives_spanish:
  - mandará
  - soltará
  lexicon: HALOT
  rationale: El verbo expresa acción directa de Yahvé sobre el destinatario de las sanciones del pacto. «Enviará» comunica agencia divina clara y suena natural en español.
- source_word: בְּךָ
  english_pob_choice: on you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - en ti
  lexicon: HALOT
  rationale: Con un verbo de envío, la preposición marca que el castigo recae sobre la persona. «Sobre ti» conserva ese matiz sin forzar la sintaxis.
- source_word: הַמְּאֵרָה
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición
  - el maleficio
  lexicon: HALOT
  rationale: El sustantivo remite a la sanción pactual concreta. «Maldición» es el equivalente más natural y fiel en español.
- source_word: הַמְּהוּמָה
  english_pob_choice: the confusion
  chosen_spanish: la confusión
  alternatives_spanish:
  - el pánico
  - el tumulto
  - la perturbación
  lexicon: HALOT
  rationale: El término puede abarcar tumulto, pánico o confusión. «Confusión» preserva bien el sentido de desorden que afecta todas las tareas.
- source_word: הַמִּגְעֶרֶת
  english_pob_choice: the rebuke
  chosen_spanish: la reprensión
  alternatives_spanish:
  - el reproche
  - la reprensión
  - la censura
  lexicon: HALOT
  rationale: Aunque «reprensión» no es tan frecuente como «reprender», transmite con dignidad la idea de una censura/amenaza judicial. Se evita una formulación demasiado abstracta.
- source_word: בְּכָל מִשְׁלַח יָדְךָ
  english_pob_choice: in every undertaking of your hand
  chosen_spanish: en todo aquello a lo que pongas la mano
  alternatives_spanish:
  - en toda obra de tu mano
  - en todo lo que emprendas
  - en cada puesta de tu mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y habla de todo lo que uno se propone hacer. Se conserva la imagen de «poner la mano» para no perder el giro textual, pero se aclara con una construcción española natural.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: that you do
  chosen_spanish: y hagas
  alternatives_spanish:
  - que haces
  - que hagas
  lexicon: HALOT
  rationale: La cláusula relativa completa el campo semántico de la expresión anterior. Se coordina con fluidez en español sin añadir contenido ajeno.
- source_word: עַד הִשָּׁמֶדְךָ
  english_pob_choice: until you are destroyed
  chosen_spanish: hasta que seas destruido
  alternatives_spanish:
  - hasta tu destrucción
  - hasta que quedes destruido
  lexicon: HALOT
  rationale: Se mantiene el valor verbal del infinitivo constructo con sufijo. «Sea destruido» preserva la fuerza de juicio sin convertirlo en un sustantivo.
- source_word: וְעַד אֲבָדְךָ מַהֵר
  english_pob_choice: and until you perish quickly
  chosen_spanish: y hasta que perezcas pronto
  alternatives_spanish:
  - y hasta que perezcas rápidamente
  - y hasta que te pierdas pronto
  - y hasta tu pronta ruina
  lexicon: HALOT
  rationale: אבד expresa perderse/perir; «perezcas» mantiene la distinción frente a «ser destruido». «Pronto» comunica el adverbio sin sonar arcaico.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: En español, la causalidad queda bien con «por». Es breve y mantiene la relación entre juicio y causa moral.
- source_word: רֹעַ מַעֲלָלֶיךָ
  english_pob_choice: the evil of your deeds
  chosen_spanish: la maldad de tus obras
  alternatives_spanish:
  - la maldad de tus hechos
  - el mal de tus obras
  - la perversidad de tus acciones
  lexicon: HALOT
  rationale: Se opta por «maldad» para dar cuenta del valor moral del sustantivo, y «obras» conserva la referencia a actos concretos. La combinación es clara y bíblica en español.
- source_word: אֲשֶׁר עֲזַבְתָּנִי
  english_pob_choice: by which you have forsaken me
  chosen_spanish: con las cuales me has abandonado
  alternatives_spanish:
  - por las cuales me has abandonado
  - con que me has abandonado
  - porque me has abandonado
  lexicon: HALOT
  rationale: La relativa vuelve sobre las obras/deeds como medio o esfera en la que se produjo el abandono de Yahvé. «Con las cuales» conserva la referencia pronominal al plural y evita forzar una causalidad distinta.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea POB preserva el nombre del pacto en lugar de ocultarlo tras un título. En español, «Yahvé» es la transliteración más estable y comprensible para ese propósito.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto agente del juicio pactual
  english_pob_reading: Yahweh will send...
  chosen_spanish_reading: Yahvé enviará...
  alternative_spanish_readings:
  - la maldición vendrá sobre ti
  - sobre ti caerá la maldición
  rationale: El hebreo presenta a Yahvé como sujeto explícito del verbo. Se mantiene su agencia directa, sin convertir la acción en un proceso impersonal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
- issue: Colocación del abandono de Dios respecto de las obras
  english_pob_reading: because of the evil of your deeds by which you have forsaken me
  chosen_spanish_reading: por la maldad de tus obras con las cuales me has abandonado
  alternative_spanish_readings:
  - por la maldad de tus obras, con lo cual me has abandonado
  - porque has hecho el mal y me has abandonado
  - por la maldad de tus acciones, por las cuales me has abandonado
  rationale: Se conserva la relación sintáctica en la que las obras son el marco o instrumento del abandono, siguiendo el audit trail inglés. No se reexpresa como una explicación independiente para no suavizar la estructura hebrea.
  doctrine_reference: HALOT / syntax of relative clause
translation_notes:
  revision_awareness: Se revisó el auditor inglés y no se detectaron cambios aplicados en la última pasada; el veredicto de alta concordancia indica que la solución española puede seguir de cerca la decisión léxica establecida sin ajustes textuales especiales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, en coherencia con el proyecto.
  - Se usa «maldición» para הַמְּאֵרָה y no se sustituye por un eufemismo.
  - 'Se conserva la tripleta de juicio con tres sustantivos coordinados: maldición, confusión y reprensión.'
  - Se mantiene la imagen hebrea de la mano mediante una construcción española natural y una nota explicativa.
  - «Obras» traduce מַעֲלָלֶיךָ de modo coherente con el plural y con el énfasis moral del pasaje.
