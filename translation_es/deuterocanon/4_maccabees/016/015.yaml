translation:
  language: es
  text: Porque, aun cuando fuiste arrestada con tus hijos, te mantuviste de pie observando a Eleazar mientras era torturado, y[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este versículo termina con καὶ, «y», y queda sintácticamente incompleto, continuando directamente en el siguiente versículo.
    reason: textual_variant
lexical_decisions:
- source_word: συνελήμφθης
  english_pob_choice: you were arrested
  chosen_spanish: fuiste arrestada
  alternatives_spanish:
  - fuiste apresada
  - fuiste tomada
  lexicon: BDAG
  rationale: El pasivo de συλλαμβάνω aquí expresa ser detenida/aprehendida por autoridad; «arrestada» comunica bien el matiz judicial del contexto martirial. Se usa la forma femenina por el discurso dirigido a la madre.
- source_word: μετὰ τῶν παίδων
  english_pob_choice: with your children
  chosen_spanish: con tus hijos
  alternatives_spanish:
  - con tus niños
  - junto con tus hijos
  lexicon: BDAG
  rationale: Aunque παῖδες puede ser «niños/hijos/siervos», el contexto inmediato se refiere a su descendencia. «Hijos» mantiene esa referencia familiar y es más natural en español que una traducción demasiado general.
- source_word: εἱστήκεις
  english_pob_choice: you stood
  chosen_spanish: te mantuviste de pie
  alternatives_spanish:
  - estuviste de pie
  - permaneciste de pie
  lexicon: BDAG
  rationale: La forma expresa una postura sostenida; «te mantuviste de pie» conserva la idea de permanencia y suena idiomático en español.
- source_word: ὁρῶσα
  english_pob_choice: watching
  chosen_spanish: mirando
  alternatives_spanish:
  - observando
  - viendo
  lexicon: BDAG
  rationale: El participio indica observación sostenida. «Mirando» es una solución natural y clara; «observando» sería posible, pero algo más marcado y menos directo.
- source_word: βασανιζόμενον
  english_pob_choice: being tortured
  chosen_spanish: mientras era torturado
  alternatives_spanish:
  - siendo torturado
  - mientras lo torturaban
  lexicon: BDAG
  rationale: En este contexto de martirio, βασανίζω alude a tormento físico. «Mientras era torturado» transmite con claridad la acción pasiva y evita volverlo más interpretativo de lo necesario.
- source_word: Ἐλεάζαρον
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eléazar
  lexicon: LSJ
  rationale: Se translitera el nombre propio según la política del proyecto; «Eleazar» es la forma estándar y reconocible en español bíblico.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y—
  - y
  lexicon: BDAG
  rationale: El griego termina con una conjunción abierta que enlaza con el verso siguiente. En español, dejar «y» al final preserva mejor la sintaxis inacabada sin añadir puntuación interpretativa.
translation_notes:
  revision_awareness: Se corrigió la falta anterior haciendo que el marcador de nota [a] aparezca explícitamente en el texto español. También se evitó añadir un guion o una puntuación que no está respaldada por la revisión más reciente del testimonio griego.
  spanish_consistency_notes:
  - Se mantuvo el discurso en femenino singular, coherente con la madre a la que se dirige el texto.
  - Se preservó el final abierto del versículo con una conjunción final, en consonancia con el griego transmitido.
  - El registro es sobrio y publicable, evitando calcos innecesarios pero sin suavizar la fuerza martirial del pasaje.
