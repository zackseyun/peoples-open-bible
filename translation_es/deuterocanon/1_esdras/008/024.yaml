translation:
  language: es
  text: Y todos los que transgredan tanto la ley de tu Dios como la ley del rey serán castigados estrictamente[a], ya sea con muerte o con castigo[b], con una multa de plata o con confiscación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego aquí difiere de manera material del paralelo MT suministrado, que corresponde a otro contexto; por eso esta traducción sigue el griego como testigo principal. O «castigados con diligencia»; el adverbio puede enfatizar una aplicación esmerada de la pena más que el mero cuidado procedimental.
    reason: textual_variant
  - marker: b
    text: O «pena»; τιμωρίᾳ puede abarcar una sanción amplia, pero en esta lista legal «castigo» conserva mejor la generalidad del término.
    reason: lexical_alternative
  - marker: c
    text: O «despojo» o «incautación»; el término griego puede implicar remoción o confiscación de bienes, y en este contexto legal se entiende mejor como pérdida judicial de propiedad.
    reason: alternative_reading
lexical_decisions:
- source_word: παραβαίνωσι
  english_pob_choice: transgress
  chosen_spanish: transgredan
  alternatives_spanish:
  - violen
  - rompan
  lexicon: BDAG
  rationale: En un marco jurídico, el verbo expresa sobrepasar o infringir una norma. «Transgredan» conserva el registro legal y la fuerza de culpabilidad mejor que «rompan».
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: BDAG
  rationale: Aquí νόμος es normativa vinculante de tipo administrativo-legal; «ley» es la equivalencia natural y clara en español.
- source_word: τοῦ βασιλικοῦ
  english_pob_choice: the king’s law
  chosen_spanish: la ley del rey
  alternatives_spanish:
  - la ley real
  - lo del rey
  lexicon: LSJ
  rationale: El griego elíptico queda bien representado con «la ley del rey», manteniendo el paralelismo con «la ley de tu Dios» y evitando una formulación demasiado abstracta.
- source_word: ἐπιμελῶς
  english_pob_choice: diligently
  chosen_spanish: diligentemente
  alternatives_spanish:
  - con cuidado
  - estrictamente
  lexicon: LSJ
  rationale: El adverbio modifica la ejecución del castigo, no el estado emocional; «diligentemente» conserva la idea de aplicación atenta y efectiva sin forzar «estrictamente».
- source_word: κολασθήσονται
  english_pob_choice: shall be ... punished
  chosen_spanish: serán castigados
  alternatives_spanish:
  - serán punidos
  - serán penalizados
  lexicon: BDAG
  rationale: Es un futuro pasivo de sanción judicial. «Serán castigados» es el equivalente más natural y transparente en español contemporáneo.
- source_word: θανάτῳ
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - pena de muerte
  - muerte capital
  lexicon: BDAG
  rationale: En una lista de sanciones, el dativo indica el medio o forma del castigo. «Muerte» mantiene la concisión del griego; «pena de muerte» explicita, pero añade algo que el texto no dice de manera directa.
- source_word: τιμωρίᾳ
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - punición
  lexicon: LSJ
  rationale: El término puede ser amplio; como la lista ya incluye muerte, multa y confiscación, «castigo» preserva la generalidad sin precisar un tipo de sanción que el griego no especifica.
- source_word: ἀργυρίῳ ζημίᾳ
  english_pob_choice: by a fine of silver
  chosen_spanish: con multa de plata
  alternatives_spanish:
  - con multa monetaria
  - con sanción económica
  lexicon: LSJ
  rationale: La expresión es literalmente pecuniaria. «Multa de plata» conserva la concreción del griego y su tono jurídico antiguo, pero sigue siendo comprensible en español.
- source_word: ἀπαγωγῇ
  english_pob_choice: confiscation
  chosen_spanish: confiscación
  alternatives_spanish:
  - bano?
  - despojo de bienes
  - remoción
  lexicon: LSJ
  rationale: En este contexto legal, el término se entiende mejor como incautación o pérdida judicial de bienes. «Confiscación» comunica con claridad esa sanción.
theological_decisions:
- issue: Relación entre la ley de Dios y la ley del rey
  english_pob_reading: both the law of your God and the king’s law
  chosen_spanish_reading: tanto la ley de tu Dios como la ley del rey
  alternative_spanish_readings:
  - la ley de tu Dios o la ley del rey
  rationale: El griego presenta dos obligaciones coordinadas con καὶ ... καὶ, no una alternativa. La traducción mantiene la doble lealtad legal sin suavizarla.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #5'
- issue: Manejo del problema textual con el paralelo hebreo/MT
  english_pob_reading: Translate from the Greek as primary, while allowing the Semitic parallel to inform legal terminology only indirectly
  chosen_spanish_reading: Traducir desde el griego como testigo primario, sin armonizar el versículo con el paralelo semítico
  alternative_spanish_readings:
  - conformar el versículo al paralelo de Esdras en el hebreo
  rationale: El paquete fuente marca una divergencia material. Por fidelidad audit-able, la redacción española sigue el griego y no intenta resolver la discrepancia por armonización.
  doctrine_reference: PHILOSOPHY.md 'Original-language primacy' y la nota de major_mismatch
translation_notes:
  revision_awareness: 'He integrado la revisión auditada del inglés: se prefirió una equivalencia más natural para ἐπιμελῶς («diligentemente») y una correspondencia más cercana para τιμωρίᾳ. En español, eso se reflejó en «diligentemente» y «castigo», manteniendo el registro jurídico sin sobreespecificar la sanción.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «ley» para νόμος en sentido jurídico.
  - «Yahvé» no aparece aquí porque el texto dice «tu Dios» y no el nombre divino.
  - Se conserva un paralelismo claro entre la ley divina y la ley real.
  - La lista de sanciones se presenta en el mismo orden del griego, sin reorganizarla.
