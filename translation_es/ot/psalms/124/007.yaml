translation:
  language: es
  text: Nuestra alma ha escapado como un ave del lazo de los que ponen lazos[a]; el lazo está roto, y nosotros hemos escapado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nuestra vida ha escapado como un ave». נֶפֶשׁ a menudo significa «alma», pero aquí probablemente se refiere a la vida o a la persona entera.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestra vida
  - nosotros mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida, persona o ser. Aquí el inglés POB optó por «our soul» para reflejar con mayor fidelidad la forma lexical de נַפֶשׁ y mantener el registro poético. En español, «alma» conserva esa correspondencia formal mejor que «vida», aunque puede sonar más antropológico; se preserva así la tensión semántica sin anularla.
- source_word: כְּצִפּוֹר
  english_pob_choice: like a bird
  chosen_spanish: como un ave
  alternatives_spanish:
  - como un pájaro
  - como un ave pequeña
  lexicon: HALOT
  rationale: צִפּוֹר es un término general para un ave pequeña, no específicamente «gorrión» aquí. «Ave» es natural y amplio en español, y mantiene la imagen sin estrecharla indebidamente.
- source_word: נִמְלְטָה
  english_pob_choice: has escaped
  chosen_spanish: ha escapado
  alternatives_spanish:
  - fue librada
  - se ha librado
  lexicon: HALOT
  rationale: El nifal de מלט expresa escapar o ser librado. «Ha escapado» conserva el sentido de evasión/liberación y el valor perfectivo del verbo, con buen español poético.
- source_word: מִפַּח
  english_pob_choice: from the snare
  chosen_spanish: del lazo
  alternatives_spanish:
  - de la trampa
  - de la red
  lexicon: HALOT
  rationale: פַּח designa un lazo o trampa, especialmente de caza. «Lazo» reproduce bien el valor concreto del término y la imagen aviar del verso.
- source_word: יוֹקְשִׁים
  english_pob_choice: of the fowlers
  chosen_spanish: de los cazadores
  alternatives_spanish:
  - de los tramperos
  - de los que ponen lazos
  lexicon: HALOT
  rationale: El participio de יקשׁ alude a quienes ponen lazos. En español, «cazadores» comunica de manera natural la figura de quienes tienden trampas, aunque no reproduce el tecnicismo de «fowlers»; se evita «tramperos» por ser menos idiomático en registro bíblico.
- source_word: הַפַּח
  english_pob_choice: the snare
  chosen_spanish: el lazo
  alternatives_spanish:
  - la trampa
  lexicon: HALOT
  rationale: La repetición del término mantiene el paralelismo del hebreo. Se conserva «lazo» para no variar innecesariamente la imagen y para emparejarlo con el primer miembro del verso.
- source_word: נִשְׁבָּר
  english_pob_choice: is broken
  chosen_spanish: está roto
  alternatives_spanish:
  - ha sido roto
  - se ha quebrado
  lexicon: HALOT
  rationale: 'El pasivo expresa el estado resultante: la trampa ya no funciona. «Está roto» suena natural en español y comunica el resultado presente de la acción.'
- source_word: וַאֲנַחְנוּ
  english_pob_choice: and we
  chosen_spanish: y nosotros
  alternatives_spanish:
  - y nosotros mismos
  - y nosotros,
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis. «Nosotros» lo conserva sin forzar la sintaxis española.
- source_word: נִמְלָטְנוּ
  english_pob_choice: have escaped
  chosen_spanish: hemos escapado
  alternatives_spanish:
  - hemos sido librados
  - nos hemos librado
  lexicon: HALOT
  rationale: Se repite el verbo de escape para cerrar el verso con la misma idea que el primer hemistiquio. «Hemos escapado» es directo y reproduce bien la conclusión triunfal.
theological_decisions:
- issue: Relación entre נֶפֶשׁ y la antropología bíblica
  english_pob_reading: Our soul... likely refers to life or the whole person.
  chosen_spanish_reading: Nuestra alma... mantiene la forma lexical, aunque el contexto puede abarcar la vida o la persona entera.
  alternative_spanish_readings:
  - Nuestra vida...
  - Nosotros mismos...
  rationale: El inglés auditado mostró una tensión entre el sentido lexical más formal («soul») y el sentido contextual de vida preservada. En español se conserva «alma» en el texto principal por fidelidad lexical, y se deja constancia de que el referente contextual puede ser la vida o la persona completa.
  doctrine_reference: Anthropology; Hebrew נפשׁ
- issue: Imagen de liberación frente a trampa
  english_pob_reading: the snare is broken
  chosen_spanish_reading: el lazo está roto
  alternative_spanish_readings:
  - la trampa está rota
  - el lazo ha sido roto
  rationale: 'No hay un problema doctrinal, pero sí una decisión teológica-poética: el verso enfatiza que el instrumento de muerte quedó inutilizado por la intervención divina implícita en el salmo. «Está roto» preserva el resultado consumado sin introducir un agente explícito que el hebreo no menciona en este verso.'
  doctrine_reference: Providencia divina; liberación en los Salmos
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «life» a «soul» para reflejar más directamente נַפְשֵׁנוּ y mantener el registro formal. En español se siguió esa decisión al usar «alma» en el texto principal, pero se señaló en nota la posibilidad contextual de «vida» o «persona entera».
  spanish_consistency_notes:
  - Se mantuvo la repetición de la raíz de escape con dos verbos distintos en español («ha escapado / hemos escapado») para reflejar la estructura poética del hebreo.
  - Se prefirió «lazo» en todo el verso para conservar coherencia imagética y evitar mezclar sin necesidad «lazo/trampa».
  - Se evitó «SEÑOR» u otras sustituciones porque no aparece el Tetragrámaton en este versículo.
  - Se conservó un registro bíblico sobrio y público, sin arcaísmos innecesarios.
