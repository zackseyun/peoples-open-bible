translation:
  language: es
  text: Ciertamente, mi mano fundó la tierra, y mi diestra extendió[a] los cielos; cuando yo los llamo, se ponen de pie juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abarcó los cielos» o «extendió los cielos» en el sentido de «los desplegó» o «los tendió».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De hecho
  - Sí,
  - Aun
  lexicon: HALOT
  rationale: אַף aquí funciona como partícula enfática. «Ciertamente» comunica la solemnidad y el énfasis sin añadir contenido ajeno al hebreo.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano derecha
  - mi poder
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica directa de la mano divina, en paralelo con la «diestra» del segundo hemistiquio.
- source_word: יָסְדָה
  english_pob_choice: founded
  chosen_spanish: fundó
  alternatives_spanish:
  - puso los cimientos de
  - estableció
  lexicon: HALOT
  rationale: El verbo יסד expresa la idea de poner cimientos. «Fundó» es breve, natural y mantiene la imagen de creación con fundamento.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: HALOT
  rationale: En este contexto cósmico, «la tierra» transmite bien el ámbito de la creación sin restringirlo a una región.
- source_word: וִימִינִי
  english_pob_choice: and my right hand
  chosen_spanish: mi diestra
  alternatives_spanish:
  - mi mano derecha
  - mi mano
  lexicon: HALOT
  rationale: «Diestra» conserva el paralelismo poético y el matiz de poder y agencia que suele asociarse a la mano derecha.
- source_word: טִפְּחָה
  english_pob_choice: spread out
  chosen_spanish: extendió
  alternatives_spanish:
  - desplegó
  - tendió
  lexicon: HALOT
  rationale: El verbo en este contexto habla de extender los cielos. «Extendió» es claro en español y guarda la imagen de expansión cósmica.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos de arriba
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con «los cielos», forma natural y reverente en español para el ámbito cósmico.
- source_word: קֹרֵא אֲנִי אֲלֵיהֶם
  english_pob_choice: when I call to them
  chosen_spanish: cuando yo los llamo
  alternatives_spanish:
  - al llamarlos
  - cuando los llamo
  lexicon: HALOT
  rationale: El participio con pronombre expresa una acción viva y actual. En español, «cuando yo los llamo» hace fluida la relación con la respuesta inmediata del siguiente verbo.
- source_word: יַעַמְד֥וּ
  english_pob_choice: they stand
  chosen_spanish: ellos se presentan
  alternatives_spanish:
  - ellos se ponen de pie
  - ellos permanecen
  lexicon: HALOT
  rationale: «עמד» significa «estar de pie / presentarse / mantenerse». Aquí la idea es que responden a la convocatoria divina; «se presentan» comunica esa respuesta sin perder la noción de estar en posición ante él.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - al mismo tiempo
  lexicon: HALOT
  rationale: «Juntos» preserva el sentido adverbial básico de unidad y simultaneidad entre la tierra y los cielos al responder al llamado de Dios.
theological_decisions:
- issue: Imagen corporal aplicada a Dios en la creación
  english_pob_reading: Preserve the concrete imagery of God's 'hand' and 'right hand' without paraphrasing into abstract power-language.
  chosen_spanish_reading: Conservar la imagen concreta de la mano y la diestra de Dios, sin convertirla en una paráfrasis de poder abstracto.
  alternative_spanish_readings:
  - Mi poder fundó la tierra, y mi fuerza extendió los cielos
  - Con mi poder fundé la tierra y con mi fuerza extendí los cielos
  rationale: El hebreo usa lenguaje corporal deliberado. La traducción española mantiene esa tensión antropomórfica para no suavizar la forma en que el texto presenta la acción creadora de Yahvé.
  doctrine_reference: Principio de primacía del texto original; preservación de la imaginería teológica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; por eso se mantiene una solución sobria que sigue de cerca el hebreo y el audit trail inglés, especialmente en la partícula enfática, la imaginería corporal divina y el verbo de extender los cielos.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero en este versículo el Tetragrámaton no aparece explícitamente.
  - Se mantiene el paralelismo poético con «mi mano / mi diestra».
  - «Los cielos» conserva el plural hebreo sin forzar singularidad.
  - «Juntos» refleja la respuesta unificada de tierra y cielos al llamado divino.
