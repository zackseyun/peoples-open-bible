theological_decisions:
- issue: Rendering of σάρξ in a morally charged Pauline context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The doctrine file specifies 'flesh (literal) / sinful nature (metaphorical)' as context-dependent. Here the term clearly has ethical force, but rendering it 'sinful nature' would interpret the anthropology more narrowly than the Greek itself requires. 'Flesh' preserves Paul's wording and leaves the theological tension intact.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy #3'
- issue: Force of τέκνα φύσει ὀργῆς
  chosen_reading: we were by nature children of wrath
  alternative_readings:
  - we were naturally children of wrath
  - we were by birth objects of wrath
  rationale: The phrase is theologically significant in debates over original sin and human condition. The translation preserves the Greek idiom and does not paraphrase it into a more systematized doctrinal formula. This best fits the instruction to preserve theological tension rather than resolve it.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
