base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/021.yaml
  text: Now David had said[a], “Surely I have guarded all that belongs to this man in the wilderness in vain, so that nothing of all that belonged to him was missing; and he has repaid me evil for good.”
  footnotes:
  - marker: a
    text: Or “in vain.” The Hebrew expression conveys that David’s protection of Nabal’s property had proved futile or empty.
    reason: lexical_alternative
