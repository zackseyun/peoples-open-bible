  rationale: 'Se ajusta la expresión del modismo hebreo para que el español sea más natural y fiel a la rationale auditada del POB: se conserva la idea de consumo total sin la aspereza de «devorado». También se cambia «Porque» por «Pues» para una conexión explicativa más fluida.'
