translation:
  language: es
  text: La palabra que vino a Jeremías de parte de Yahvé[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR» en muchas Biblias.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta es la palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto' o 'mensaje'; en fórmulas proféticas, 'la palabra' reproduce bien la apertura técnica sin añadir paráfrasis. En español, 'la palabra' conserva naturalidad y solemnidad.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula que modifica 'palabra'. 'Que' es la equivalencia más natural y directa en español.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'fue/estuvo', en la fórmula profética el sentido es que la palabra fue recibida por Jeremías; 'vino' reproduce ese giro idiomático en español sin perder el valor de origen y llegada.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - para
  lexicon: HALOT
  rationale: La preposición marca al profeta como receptor; 'a' es la correspondencia natural de dirección en español.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: Conventional proper-name transliteration
  rationale: Nombre propio adaptado a la forma usual en español bíblico.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: La preposición compuesta señala origen/procedencia. 'De parte de' hace explícita la procedencia personal del mensaje y evita una lectura demasiado mecánica que sonaría como mera localización espacial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, no el sustituto 'Señor'. 'Yahvé' es la forma establecida en el proyecto para YHWH y conserva la referencia al nombre del pacto.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - para decir,
  lexicon: HALOT
  rationale: El infinitivo introductorio de habla directa se vierte con 'diciendo', preservando la función discursiva que enlaza con el contenido del versículo siguiente.
theological_decisions:
- issue: Representación del Tetragrámaton (יְהוָה)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino. La traducción española mantiene el nombre propio 'Yahvé' para no ocultar el Tetragrámaton tras un título; esto concuerda con la política POB de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se conserva la fórmula profética estándar, el nombre divino explícito y el enlace discursivo con el versículo siguiente. No se documentan revisiones que requieran ajustar la solución española.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''La palabra'' mantiene el tono profético formular y evita ampliar ''דָּבָר'' a ''mensaje'' sin necesidad.'
  - '''Vino a Jeremías'' expresa en español la recepción del oráculo con naturalidad y fidelidad al hebreo.'
