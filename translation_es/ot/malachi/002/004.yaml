translation:
  language: es
  text: Entonces sabrán que les he enviado esta orden, para que mi pacto con Leví[a] llegue a ser, dice Yahvé de los Ejércitos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «para ser mi pacto con Leví». El hebreo es condensado; la frase puede entenderse en relación con el pacto de Dios con Leví, sin especificar aquí si la idea es continuidad, mantenimiento o mera referencia al pacto.'
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: «el SEÑOR de los ejércitos». Aquí se usa «Yahvé» según la norma del proyecto de no ocultar el nombre divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y conocerán entonces
  - Y sabrán entonces
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético expresa consecuencia futura; «Entonces» conserva el valor consecutivo y «sabrán» es natural en español para ידע.
- source_word: שִׁלַּחְתִּי
  english_pob_choice: I have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  - he mandado
  lexicon: HALOT
  rationale: El perfecto puede leerse con resultado presente; «he enviado» mantiene ese matiz sin forzar un pasado simple.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición marca dirección hacia los destinatarios. «A ustedes» es la forma más directa y clara en español; se evita «contra ustedes» porque no es el valor básico aquí.
- source_word: הַמִּצְוָה הַזֹּאת
  english_pob_choice: this command
  chosen_spanish: esta orden
  alternatives_spanish:
  - este mandamiento
  - este decreto
  lexicon: HALOT
  rationale: מִצְוָה denota una orden o mandato. «Orden» comunica bien el tono inmediato y evita una carga litúrgica innecesaria.
- source_word: לִהְיוֹת
  english_pob_choice: that my covenant with Levi may be
  chosen_spanish: para que ... sea
  alternatives_spanish:
  - para ser
  - a fin de que ... sea
  lexicon: HALOT
  rationale: El infinitivo constructo es elíptico en hebreo. El inglés POB decidió no sobreinterpretar con «continue»; en español, «para que ... sea» conserva la literalidad básica y la misma tensión interpretativa.
- source_word: בְּרִיתִי אֶת־לֵוִי
  english_pob_choice: my covenant with Levi
  chosen_spanish: mi pacto con Leví
  alternatives_spanish:
  - mi pacto con Levi
  - mi alianza con Leví
  lexicon: HALOT
  rationale: Se conserva «Leví» como nombre propio bíblico en español. «Pacto» es el término preferido por el POB para בְּרִית; «alianza» sería posible, pero «pacto» suele preservar mejor la fuerza contractual/covenantal.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para יהוה como «Yahvé». צְבָאוֹת se traduce como «los Ejércitos» para conservar el sentido militar/plural sin recurrir al tradicionalismo de «señor de los ejércitos».
theological_decisions:
- issue: Sentido de la cláusula final ligada al pacto con Leví
  english_pob_reading: The warning/command is sent in relation to the covenant with Levi; the English revision preferred the more literal 'that my covenant with Levi may be' and avoided adding 'continue'.
  chosen_spanish_reading: «para que mi pacto con Leví sea» mantiene la literalidad y deja abierta la fuerza exacta de לִהְיוֹת, sin resolverla de más.
  alternative_spanish_readings:
  - para que mi pacto con Leví continúe
  - para que mi pacto con Leví se mantenga
  - para establecer mi pacto con Leví
  rationale: El hebreo es compacto y admite más de una inferencia. En vez de decidir por la continuación o la instauración, la versión española conserva la ambigüedad textual documentada por el POB.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla más allá del texto
- issue: Título divino final
  english_pob_reading: says Yahweh of Armies
  chosen_spanish_reading: dice Yahvé de los Ejércitos
  alternative_spanish_readings:
  - dice Yahvé de los ejércitos
  - declara Yahvé de los Ejércitos
  rationale: Se mantiene el nombre divino Yahvé según la convención del proyecto y se traduce צְבָאוֹת de forma transparente. «Dice» reproduce la fórmula profética simple del hebreo.
  doctrine_reference: No sustituir el nombre divino por una máscara litúrgica
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una paráfrasis interpretativa ('so that ... may continue') a una forma más literal ('that ... may be'). La redacción española sigue esa revisión al evitar añadir 'continúe' o un equivalente interpretativo, y conserva la compresión del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según el estándar del proyecto para יהוה.
  - Se tradujo מִצְוָה como 'orden' en lugar de 'mandamiento' para un registro claro y profético.
  - Se mantuvo 'pacto' para בְּרִית, coherente con el vocabulario bíblico del proyecto.
  - Se evitó 'SEÑOR' como máscara para el nombre divino.
  - La cláusula final permanece deliberadamente abierta para reflejar la ambigüedad documentada en el audit trail.
