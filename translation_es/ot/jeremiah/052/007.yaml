translation:
  language: es
  text: Entonces se abrió una brecha en la ciudad[a], y todos los hombres de guerra huyeron y salieron de la ciudad de noche por la puerta entre los dos muros, que estaba junto al jardín del rey, mientras los caldeos[c] estaban alrededor de la ciudad por todos lados; y se fueron por el camino del Arabá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la puerta entre los muros».
    reason: lexical_alternative
  - marker: b
    text: «Arabá» se refiere a la región del valle del Rift del Jordán; algunas traducciones dicen «la llanura».
    reason: cultural_note
  - marker: c
    text: «Caldeos» es el etnónimo hebreo, a menudo usado para las fuerzas babilónicas.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּבָּקַע
  english_pob_choice: was breached
  chosen_spanish: fue abierta
  alternatives_spanish:
  - fue brechada
  - fue quebrada
  - fue abierta de brecha
  lexicon: HALOT
  rationale: El hebreo expresa que la ciudad quedó abierta/rasgada por el asalto. En español, «fue abierta» mantiene la imagen de una apertura violenta sin forzar un calco poco natural; «de brecha» sería más explícito, pero el texto hebreo no añade un sustantivo equivalente.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Término directo y estándar para עִיר.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los soldados
  - los combatientes
  lexicon: HALOT
  rationale: Se conserva la expresión del hebreo con fuerza militar y referencia masculina explícita; «soldados» suaviza la forma fuente, y «combatientes» moderniza más de lo que el texto exige.
- source_word: יִבְרְחוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - iban huyendo
  lexicon: HALOT
  rationale: En la secuencia narrativa funciona como pasado histórico; «huyeron» es natural y mantiene el matiz de retirada apresurada.
- source_word: וַיֵּצְאוּ מֵהָעִיר לַיְלָה
  english_pob_choice: went out of the city by night
  chosen_spanish: salieron de la ciudad de noche
  alternatives_spanish:
  - salieron de la ciudad por la noche
  - se salieron de la ciudad de noche
  lexicon: HALOT
  rationale: «De noche» es una forma natural en español y conserva el valor temporal de לַיְלָה. «Por la noche» también sería posible, pero «de noche» mantiene mejor el tono narrativo conciso.
- source_word: דֶּרֶךְ שַׁעַר
  english_pob_choice: by way of the gate
  chosen_spanish: por el camino de la puerta
  alternatives_spanish:
  - por la puerta
  - por el paso de la puerta
  lexicon: HALOT
  rationale: דֶּרֶךְ introduce ruta o vía. «Por el camino de la puerta» preserva esa relación direccional; «por la puerta» perdería la idea de trayecto, y «paso» introduce una interpretación no explícita.
- source_word: בֵּין הַחֹמֹתַיִם
  english_pob_choice: between the two walls
  chosen_spanish: entre los dos muros
  alternatives_spanish:
  - entre las dos murallas
  - entre los muros
  lexicon: HALOT
  rationale: El dual hebreo indica dos muros; «muros» suena más neutral que «murallas» y puede abarcar la estructura defensiva sin añadir fortificación militar específica.
- source_word: אֲשֶׁר עַל גַּן הַמֶּלֶךְ
  english_pob_choice: which was by the king’s garden
  chosen_spanish: que estaba junto al jardín del rey
  alternatives_spanish:
  - que estaba al lado del jardín del rey
  - que estaba cerca del jardín del rey
  lexicon: HALOT
  rationale: עַל aquí tiene sentido locativo de proximidad. «Junto a» expresa esa cercanía con naturalidad en español, sin sugerir contacto físico directo.
- source_word: וְכַשְׂדִּים עַל הָעִיר סָבִיב
  english_pob_choice: while the Chaldeans were all around the city
  chosen_spanish: mientras los caldeos rodeaban la ciudad por todos lados
  alternatives_spanish:
  - y los caldeos rodeaban la ciudad por todos lados
  - con los caldeos alrededor de la ciudad
  lexicon: HALOT
  rationale: Se conserva «caldeos» como etnónimo histórico, siguiendo la decisión inglesa de no sustituirlo por una glosa interpretativa. «Rodeaban... por todos lados» expresa bien סָבִיב; el matiz circunstancial de la cláusula se mantiene con «mientras».
- source_word: וַיֵּלְכ֖וּ דֶּ֥רֶךְ הָעֲרָבָֽה
  english_pob_choice: they went by way of the Arabah
  chosen_spanish: se fueron por el camino del Arabá
  alternatives_spanish:
  - fueron por el camino del Arabá
  - tomaron el camino del Arabá
  - se fueron hacia el Arabá
  lexicon: HALOT
  rationale: «Arabá» conserva el nombre geográfico específico de הָעֲרָבָה sin reducirlo a «la llanura». «Camino» respeta דֶּרֶךְ como ruta y «se fueron» encaja con el movimiento de fuga.
theological_decisions:
- issue: Nombre histórico-étnico «Chaldeans»
  english_pob_reading: Retains 'Chaldeans' as the Hebrew ethnic term often used for the Babylonian forces.
  chosen_spanish_reading: Se mantiene «caldeos» como término histórico-étnico, no como simple equivalencia dinámica a «babilonios».
  alternative_spanish_readings:
  - babilonios
  - soldados babilonios
  rationale: El texto hebreo usa el etnónimo tradicional; conservarlo preserva la textura histórica y la posible distinción literaria del libro. «Babilonios» explicita la identificación política, pero borra la elección léxica del hebreo.
  doctrine_reference: Textual-historical fidelity; no doctrinal issue.
- issue: Topónimo/región «Arabah»
  english_pob_reading: Transliterates 'Arabah' and notes it is the Jordan rift valley region; some translations render it 'the plain.'
  chosen_spanish_reading: Se translitera «Arabá» y se conserva como nombre geográfico específico.
  alternative_spanish_readings:
  - la llanura
  - el valle del Jordán
  rationale: La glosa «la llanura» sería interpretativa y más amplia de lo que el hebreo exige. Mantener el topónimo ayuda a la trazabilidad con el original y respeta la decisión auditada de la edición inglesa.
  doctrine_reference: Geographical/textual precision; no doctrinal issue.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el cotejo externo reportó alta concordancia; por eso se mantiene la estructura narrativa y las decisiones léxicas principales sin ajustes de fondo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el texto base lo requiere explícitamente; este versículo no contiene el Tetragrámaton.
  - Se conserva la distinción entre «caldeos» como etnónimo y una glosa interpretativa como «babilonios».
  - Se mantiene «Arabá» como topónimo transliterado, con nota cultural para evitar la pérdida del referente geográfico.
  - Se emplea «hombres de guerra» para reproducir la expresión hebrea, evitando normalizarla a «soldados» sin necesidad.
