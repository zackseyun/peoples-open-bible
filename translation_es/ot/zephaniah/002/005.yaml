review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: interjección de juicio, habitantes de la costa, etnónimo, fórmula profética con Yahvé, identificación de Canaán/Filistea y anuncio de destrucción hasta la despoblación. Sin embargo, hay un desajuste importante de referencia pronominal en «yo los destruiré»: el hebreo וְהַאֲבַדְתִּיךְ lleva sufijo 2ª femenina singular, refiriéndose a la tierra/entidad («Canaán, tierra de los filisteos»), no directamente al plural «ustedes».'
  spanish_quality_summary: 'El español es claro, digno y legible. «¡Ay de los habitantes de la costa del mar…!» funciona bien. La frase final debe ajustarse a singular para concordar con la entidad femenina singular del hebreo: «te destruiré» o mejor, para máxima claridad con el referente territorial inmediato, «destruiré tu tierra». Dado que el objeto directo hebreo apunta a la tierra/personificación femenina, «te destruiré» preserva mejor la forma.'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé», פְּלִשְׁתִּים → «filisteos», Canaán preservado. El único problema relevante es gramatical/semántico, no terminológico. La nota sobre el etnónimo puede mantenerse, aunque la justificación de «cereteos» como forma tradicional es discutible; aun así no exige adjudicación mayor.'
  issues:
  - severity: high
    issue: Pronombre objeto incorrecto en «y yo los destruiré».
    rationale: 'El hebreo וְהַאֲבַדְתִּיךְ es 1cs + sufijo 2fs: «y te destruiré». El referente inmediato es «Canaán, tierra de los filisteos», una entidad singular femenina personificada. «Los destruiré» cambia el blanco del juicio de la tierra/personificación al plural de los habitantes.'
  - severity: low
    issue: La nota del etnónimo presenta una alternativa gráfica menos alineada con la revisión inglesa auditada.
    rationale: El English POB pasó de Kerethites a Cherethites. En español, «quereteos» puede defenderse como forma más cercana a la tradición/transliteración que «cereteos», pero esto es secundario y no impide una revisión menor del versículo.
  revised_spanish_text: ¡Ay de los habitantes de la costa del mar, nación de los cereteos[a]! La palabra de Yahvé está contra ustedes, Canaán, tierra de los filisteos; y te destruiré hasta que no quede habitante alguno.
  revised_footnotes:
  - marker: a
    text: «Cereteos» refleja el etnónimo hebreo כְּרֵתִים; también puede verse la grafía tradicional «quereteos».
    reason: lexical_alternative
  revision_rationale: Se corrige «los destruiré» a «te destruiré» para reflejar fielmente el sufijo hebreo de segunda persona femenina singular, cuyo referente es la tierra/personificación «Canaán, tierra de los filisteos». El resto del borrador es sustancialmente fiel y natural.
