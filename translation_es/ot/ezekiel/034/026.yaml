translation:
  language: es
  text: Y haré de ellos y de los alrededores de mi collado[a] una bendición; haré descender la lluvia en su tiempo; serán lluvias de bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ellos y los alrededores de mi collado». La frase probablemente alude al área en torno al monte santo de Dios, a menudo entendida como Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: los convertiré en
  alternatives_spanish:
  - los daré
  - los pondré como
  lexicon: HALOT
  rationale: נתן puede expresar dar, poner o constituir. Aquí, con el predicado «bendición», el valor resultativo es central; en español, «convertir en» comunica con naturalidad que Yahvé los constituirá como bendición, no solo que les entregará algo.
- source_word: אוֹתָם וּסְבִיבוֹת גִּבְעָתִי
  english_pob_choice: them and the places around my hill
  chosen_spanish: los ... alrededor de mi collado
  alternatives_spanish:
  - ellos y los alrededores de mi collado
  - ellos y las zonas alrededor de mi collado
  lexicon: HALOT
  rationale: סביבות refiere a lo que rodea o las zonas circundantes. «Alrededor de mi collado» conserva la imagen espacial con un español natural. «Collado» reproduce el matiz literal de גִּבְעָה sin imponer en el texto principal una identificación explícita con Sion.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  lexicon: HALOT
  rationale: 'El sustantivo singular anartro funciona predicativamente: constituirlos como bendición. El artículo indefinido en español mantiene esa fuerza predicativa y la singularidad del término.'
- source_word: וְהוֹרַדְתִּי
  english_pob_choice: I will send down
  chosen_spanish: haré descender
  alternatives_spanish:
  - enviaré
  - traeré
  lexicon: HALOT
  rationale: 'El hifil de ירד es causativo: «hacer descender». «Haré descender» es fiel al verbo hebreo y evita perder la agencia divina en una formulación demasiado libre.'
- source_word: הַגֶּשֶׁם בְּעִתּוֹ
  english_pob_choice: the rain in its season
  chosen_spanish: la lluvia en su tiempo
  alternatives_spanish:
  - la lluvia en su estación
  - la lluvia a su debido tiempo
  lexicon: HALOT
  rationale: עֵת con sufijo apunta al tiempo oportuno o señalado. «En su tiempo» conserva esa idea de oportunidad/estacionalidad y suena natural en español bíblico contemporáneo.
- source_word: גִּשְׁמֵי בְרָכָה
  english_pob_choice: showers of blessing
  chosen_spanish: lluvias de bendición
  alternatives_spanish:
  - chaparrones de bendición
  - aguaceros de bendición
  lexicon: HALOT
  rationale: El plural constructo intensifica la imagen de lluvias abundantes. «Lluvias de bendición» conserva la relación léxica con בְּרָכָה y el plural hebreo sin añadir colorido idiomático innecesario.
- source_word: יִהְיֽוּ
  english_pob_choice: they will be
  chosen_spanish: serán
  alternatives_spanish:
  - habrá
  - llegarán a ser
  lexicon: HALOT
  rationale: 'El verbo plural concuerda con «lluvias». En español, «serán» mantiene la predicación directa: no solo habrá lluvias, sino que esas lluvias tendrán el carácter de bendición.'
theological_decisions:
- issue: Sentido de «mi collado»
  english_pob_reading: Retain 'my hill' without specifying Zion or a messianic referent in the main text.
  chosen_spanish_reading: Mantener «mi collado» sin identificarlo explícitamente como Sion en el texto principal.
  alternative_spanish_readings:
  - mi collado = Sion
  - mi collado = el monte santo de Yahvé
  rationale: El hebreo dice simplemente «mi collado». Aunque el contexto puede evocar Sion o el monte santo restaurado, el versículo no lo explicita. Por fidelidad auditada, conviene conservar la expresión literal y dejar la identificación como posibilidad interpretativa, no como afirmación del texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios sustantivos respecto al consenso alto del control cruzado. Se conserva la estructura resultativa de נתן, el causativo de הורדתי y la ambigüedad controlada de «mi collado».'
  spanish_consistency_notes:
  - Se mantiene Yahvé en coherencia con el estándar del proyecto, aunque en este versículo el nombre divino no aparece de forma explícita en el hebreo.
  - «Bendición» se conserva como sustantivo singular predicativo, en línea con el inglés auditado y el hebreo anartro.
  - Se evita «SEÑOR» como sustituto del nombre divino, y no se añade una identificación de Sion en el texto principal.
  - «Lluvias de bendición» preserva el plural hebreo גִּשְׁמֵי sin convertirlo en una paráfrasis más amplia.
