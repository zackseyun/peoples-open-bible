translation:
  language: es
  text: Los perseguirás con ira y los destruirás de bajo los cielos de Yahvé[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que los persigas con ira y los destruyas», reflejando la fuerza de petición o ruego de los imperfectos hebreos.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «de bajo los cielos de Yahvé», expresión poética de remoción total del mundo bajo los cielos de Dios.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּרְדֹּף
  english_pob_choice: You will pursue
  chosen_spanish: Tú los perseguirás
  alternatives_spanish:
  - Tú los perseguirás
  - Tú los perseguirías
  - Que los persigas
  lexicon: HALOT
  rationale: El verbo qal imperfecto 2ms de רדף conserva mejor en español la idea concreta de perseguir. Se mantiene el valor de apelación en oración con futuro exhortativo/performativo, sin volverlo narrativo pasado.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - con furor
  - en furor
  lexicon: HALOT
  rationale: אַף es 'ira/enojo' en sentido idiomático; la preposición ב admite matiz de acompañamiento o manera. 'Con ira' suena natural en español y conserva el sentido idiomático sin intensificar innecesariamente.
- source_word: וְתַשְׁמִידֵם
  english_pob_choice: and destroy them
  chosen_spanish: y los destruirás
  alternatives_spanish:
  - y los destruirás
  - y los aniquilarás
  - y los exterminarás
  lexicon: HALOT
  rationale: El hiphil de שׁמד significa destruir, arruinar, exterminar. 'Destruir' preserva la fuerza del verbo con menos carga moderna que 'exterminar', y evita un matiz más específico que el hebreo no exige aquí.
- source_word: מִתַּחַת
  english_pob_choice: from under
  chosen_spanish: de debajo de
  alternatives_spanish:
  - desde debajo de
  - de bajo de
  - de debajo
  lexicon: HALOT
  rationale: La preposición expresa localización/remoción 'de debajo de'. En español, 'de debajo de' reproduce de modo claro la imagen espacial y la idea de remoción total.
- source_word: שְׁמֵי
  english_pob_choice: the heavens of
  chosen_spanish: los cielos de
  alternatives_spanish:
  - los cielos de
  - los cielos bajo
  - el cielo de
  lexicon: HALOT
  rationale: El constructo plural שְׁמֵי se vierte mejor como 'los cielos de' para mantener el registro poético y la imagen de totalidad. 'Cielos' en plural respeta el hebreo y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto fuente contiene el Tetragrámaton; según la convención del proyecto en español, se traduce como 'Yahvé', preservando el nombre divino en lugar de ocultarlo con un sustituto titular.
theological_decisions:
- issue: Force of the imperfect verbs in a prayer/lament context
  english_pob_reading: future-like petition ('You will pursue ... and destroy ...') with alternative volitive sense in footnote
  chosen_spanish_reading: futuro exhortativo/petición directa ('Tú los perseguirás ... y los destruirás ...')
  alternative_spanish_readings:
  - Que los persigas ... y los destruyas ...
  - Los perseguirás ... y los destruirás ...
  rationale: En el contexto de lamentación-oración, los imperfectos pueden funcionar como súplica dirigida a Dios. El español puede reflejar esa fuerza con un futuro de valor exhortativo sin perder la solemnidad del texto; la alternativa volitiva queda documentada en nota.
  doctrine_reference: POB translation philosophy and Hebrew imperfect in prayer contexts
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El hebreo tiene el nombre propio divino, no un título genérico. En español POB se mantiene el nombre divino 'Yahvé' para conservar transparencia y evitar la sustitución litúrgica por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: 'Alineado con el expediente inglés de la POB: conserva la lectura de imperfectos como petición/futuro en contexto de oración, mantiene la imagen poética de remoción espacial completa y sustituye el ocultamiento del nombre divino por la forma transparente ''Yahvé''.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' en el texto principal, conforme al estándar del proyecto para יְהוָה.
  - Se usó 'cielos' en plural para conservar la poesía hebrea y la correspondencia con שְׁמֵי.
  - '''Destruir'' se eligió como equivalente fuerte pero idiomático para שׁמד, evitando sobrerrepresentar con ''exterminar''.'
  - La puntuación y el orden mantienen una cadencia poética natural en español sin añadir contenido interpretativo.
