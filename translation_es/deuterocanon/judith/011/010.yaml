base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/011/010.yaml
  text: Therefore[a], master lord, do not disregard his word, but lay it up in your heart, because it is true; for our people are not avenged, nor does the sword prevail against them[c][b], unless they sin against their God.
  footnotes:
  - marker: a
    text: Or 'sovereign lord.' The Greek address uses two titles, δέσποτα and κύριε, both of which are represented in the translation.
    reason: lexical_alternative
  - marker: b
    text: Or 'our people.' Greek γένος can denote a people-group or nation.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'if they do not sin against their God'; the sense in context is that no punishment or military success comes against them unless such sin occurs.
    reason: lexical_alternative
