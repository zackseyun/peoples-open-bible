theological_decisions:
- issue: Rendering of covenantal inclusion language for foreigners
  chosen_reading: Retain the concrete phrase 'sons of the foreigner' while presenting their full inclusion through covenantal verbs ('join themselves,' 'minister,' 'love,' 'be his servants').
  alternative_readings:
  - Use the more generalized 'foreigners' for smoother English
  rationale: The verse emphasizes that non-native people may attach themselves to the LORD and his covenant. The translation preserves that inclusion without flattening the Hebrew idiom or importing later theological conclusions beyond the text.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Rendering of עֲבָדִים
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The project prefers 'slave' where bonded status is theologically salient, but here the emphasis is worshipful service and covenant belonging rather than legal bondage. 'Servants' better fits the immediate context while remaining faithful to the Hebrew.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος by analogy of bonded-nature principle
