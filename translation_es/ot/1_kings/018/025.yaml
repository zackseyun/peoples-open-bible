base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/025.yaml
  text: Then Elijah said to the prophets of Baal[a], “Choose one bull for yourselves and prepare it first, because you are many; then call on the name of your god[b], but put no fire under it.”
  footnotes:
