- from: ¡Bendecid al Señor, mares y ríos; cantadle alabanzas y exaltadlo en gran manera por los siglos!
  to: ¡Bendigan al Señor, mares y ríos; cántenle alabanzas y exáltenlo en gran manera para siempre!
