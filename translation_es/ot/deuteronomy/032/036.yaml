  to: Porque Yahvé[a] hará justicia a su pueblo y se compadecerá de sus siervos[b], cuando vea que su fuerza se ha agotado[c] y que no queda ninguno, ni esclavo ni libre[d].
  rationale: Se corrige 'juzgará' a 'hará justicia a' para reflejar la decisión central de vindicación documentada en el POB y evitar una lectura punitiva en español. Se reemplaza 'su mano ha desaparecido' por 'su fuerza se ha agotado' para expresar el sentido idiomático del hebreo con naturalidad, dejando el literal en nota. Se ajusta 'ni preso ni libre' a 'ni esclavo ni libre' para alinearse mejor con el merismo auditado ('bond/slave or free') y evitar una restricción semántica innecesaria.
