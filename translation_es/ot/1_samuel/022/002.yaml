  - severity: medium
    issue: «había con él» es menos fiel y menos natural que «estaban con él»
    rationale: וַיִּהְיוּ עִמּוֹ expresa que ellos estaban con David. «Había con él» desplaza el sujeto y suena menos natural en español bíblico actual.
  - severity: low
    issue: «jefe sobre ellos» es más débil que «comandante sobre ellos» en este contexto
    rationale: שַׂר puede ser amplio, pero en este episodio de seguidores armados «comandante» refleja mejor el contexto y coincide con la decisión inglesa documentada.
