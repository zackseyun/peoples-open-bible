translation:
  text: He said[1], "A good man had a vineyard. He gave it to some farmers so that
    they would work it and he would receive its fruit from them. He sent his slave
    so that the farmers would give him the fruit of the vineyard. They seized his
    slave and beat him; they almost killed him. The slave went and told his master.
    His master said, 'Perhaps he did not know them.' He sent another slave[2]. The
    farmers beat the other one. Then the master sent his son. He said, 'Perhaps they
    will respect my son.' Those farmers, since they knew that he was the heir of the
    vineyard, seized him and killed him. Whoever has ears[3], let him hear."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:58:29Z'
  footnotes:
  - marker: '1'
    text: The manuscript reads ⲛⲭⲣ̣ⲏ̣[ⲥⲧⲟ]ⲥ̣, restored as the Greek loanword χρηστός
      (chrestos, 'good'). Some scholars suggest it may be an iotacism for χρήστης
      (chrestes, 'creditor' or 'usurer'), which would fit the context of an absentee
      landlord.
    reason: textual_variant
  - marker: '2'
    text: Literally 'it was another little and they kill him' (ⲛⲉⲕⲉⲕⲟⲩⲉⲓ ⲡⲉ ⲛⲥⲉⲙⲟⲟⲩⲧϥ),
      a Coptic idiom for 'almost'.
    reason: lexical_alternative
  - marker: '3'
    text: 'The Coptic literally reads ''he did not know them'' (ⲙⲡⲉϥⲥⲟⲩⲱⲛⲟⲩ). Many
      translators emend this to ''they did not know him'' (ⲙⲡⲟⲩⲥⲟⲩⲱⲛϥ) to match the
      expected logic of the parable, but the manuscript reading offers a coherent
      alternative: the master assumes the servant went to the wrong farmers.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲭⲣⲏⲥⲧⲟⲥ
  chosen: good
  rationale: Greek loanword χρηστός (chrestos), meaning 'good' or 'kind'.
  lexicon: BDAG
  alternatives:
  - creditor
  - usurer
  entry: χρηστός
- source_word: ⲟⲩⲟⲉⲓⲉ
  chosen: farmers
  rationale: Standard term for agricultural workers, husbandmen, or tenant farmers.
  lexicon: Crum
  alternatives:
  - husbandmen
  - tenants
  entry: 493a
- source_word: ⲕⲉⲕⲟⲩⲉⲓ
  chosen: almost
  rationale: The phrase ⲛⲉⲕⲉⲕⲟⲩⲉⲓ ⲡⲉ ⲛⲥⲉ- literally means 'it was another little and
    they...', which is the standard Coptic idiom for 'almost'.
  lexicon: Crum
  alternatives:
  - a little more
  entry: 130a
- source_word: ⲥⲟⲩⲱⲛ
  chosen: know
  rationale: Translating ⲙⲡⲉϥⲥⲟⲩⲱⲛⲟⲩ literally as 'he did not know them', preserving
    the manuscript's reading rather than emending it.
  lexicon: Crum
  alternatives:
  - recognize
  entry: 369b
- source_word: ϣⲓⲡⲉ
  chosen: respect
  rationale: The compound ϣⲓⲡⲉ ϩⲏⲧ- means 'to feel shame before, reverence, or respect'.
  lexicon: Crum
  alternatives:
  - feel shame before
  - reverence
  entry: 581b
- source_word: ϭⲱⲡⲉ
  chosen: seized
  rationale: Standard verb for taking, seizing, or catching.
  lexicon: Crum
  alternatives:
  - took
  - caught
  entry: 826a
theological_decisions:
- issue: Harmonization with Synoptic parallels
  chosen_reading: Strict adherence to the Coptic text of Thomas.
  rationale: Thomas's version of the parable lacks the allegorical markers found in
    the Synoptics (e.g., building a tower, digging a winepress). The translation avoids
    importing these details or smoothing over Thomas's unique narrative logic.
  alternatives_noted: []
drafter_notes: Saying 65 is Thomas's version of the Parable of the Wicked Tenants.
  It is notably simpler than the Synoptic parallels (Mark 12:1-12, Matt 21:33-46,
  Luke 20:9-19), lacking the Isaiah 5 vineyard-building details (fence, winepress,
  tower) and the concluding scripture quotation about the cornerstone. The translation
  preserves Thomas's streamlined narrative and the grammatical quirk where the master
  assumes the servant 'did not know them' (rather than the farmers not knowing the
  servant).
