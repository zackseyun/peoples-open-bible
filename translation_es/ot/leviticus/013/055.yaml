translation:
  language: es
  text: Entonces el sacerdote la examinará después de que la mancha haya sido lavada; y si la mancha no ha cambiado de apariencia[a] y la mancha no se ha extendido, es impura. La quemarás en el fuego; es una mancha corrosiva[b], ya sea en su lado desgastado[c] o en su lado pelado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no ha cambiado de color». El hebreo literalmente dice «no ha cambiado su ojo», un modismo que se refiere a la apariencia visible.
    reason: lexical_alternative
  - marker: b
    text: O «una infección corrosiva» o, en forma tradicional, «un fret». El término hebreo señala un deterioro destructivo del material.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final es difícil. Literalmente: «en su calvicie o en su frente/cara desnuda». En este contexto probablemente se refiere a dos superficies o lados del material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה הַכֹּהֵן
  english_pob_choice: Then the priest shall examine it
  chosen_spanish: Entonces el sacerdote la examinará
  alternatives_spanish:
  - Y el sacerdote la verá
  - Entonces el sacerdote la inspeccionará
  lexicon: HALOT
  rationale: En contexto legal-diagnóstico, ראה indica una evaluación formal, no solo percepción visual. «Examinará» transmite mejor la función sacerdotal. «La» retoma el objeto afectado implícito por el hebreo y el contexto.
- source_word: אַחֲרֵי הֻכַּבֵּס
  english_pob_choice: after the diseased area has been washed
  chosen_spanish: después de que la plaga haya sido lavada
  alternatives_spanish:
  - después de haber sido lavada
  - después de que la mancha haya sido lavada
  lexicon: HALOT
  rationale: El pasivo de כבס pide un sujeto paciente en español. «Plaga» conserva el término técnico del hebreo bíblico; «haya sido lavada» refleja bien el aspecto perfecto anterior a la inspección.
- source_word: הַנֶּגַע
  english_pob_choice: the diseased area
  chosen_spanish: la plaga
  alternatives_spanish:
  - la mancha
  - el área afectada
  - la infección
  lexicon: HALOT
  rationale: Aunque el inglés POB aclara con «diseased area», el hebreo usa נגע, término técnico amplio para la afección. En español, «plaga» mantiene el vocabulario bíblico de Levítico sin importar una diagnosis moderna.
- source_word: לֹא הָפַךְ ... אֶת עֵינוֹ
  english_pob_choice: has not changed its appearance
  chosen_spanish: no ha cambiado de apariencia
  alternatives_spanish:
  - no ha cambiado de color
  - no ha alterado su apariencia
  - no ha cambiado su aspecto
  lexicon: HALOT
  rationale: La expresión literal «su ojo» es idiomática y alude a la apariencia visible. «Apariencia» conserva el sentido sin forzar literalidad extraña; «color» sería más estrecho de lo que permite el hebreo.
- source_word: לֹא פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no ha avanzado
  - no se ha propagado
  lexicon: HALOT
  rationale: פשה en este campo semántico describe extensión de la afección. «No se ha extendido» es natural y preciso en español.
- source_word: טָמֵא הוּא
  english_pob_choice: it is unclean
  chosen_spanish: es inmunda
  alternatives_spanish:
  - es impura
  - está inmunda
  lexicon: HALOT
  rationale: En legislación ritual, «inmunda» conserva el valor técnico tradicional y la fuerza de estado ritual. Se elige el femenino por concordancia con «la plaga».
- source_word: בָּאֵשׁ תִּשְׂרְפֶנּוּ
  english_pob_choice: You shall burn it in the fire
  chosen_spanish: La quemarás en el fuego
  alternatives_spanish:
  - La quemarás con fuego
  - Debe ser quemada en el fuego
  lexicon: HALOT
  rationale: El 2ms legal se traduce con mandato directo en español. «En el fuego» sigue la preposición hebrea y mantiene el tono prescriptivo.
- source_word: פְּחֶתֶת
  english_pob_choice: a corrosive spot
  chosen_spanish: una mancha corrosiva
  alternatives_spanish:
  - una mancha de corrosión
  - una corrosión destructiva
  - un fret
  lexicon: HALOT
  rationale: El sustantivo denota deterioro corrosivo o destructivo en tela/cuero. «Mancha corrosiva» comunica daño material sin precisar más de lo que el texto permite.
- source_word: בְּקָרַחְתּוֹ
  english_pob_choice: on its worn side
  chosen_spanish: en su lado desgastado
  alternatives_spanish:
  - en su lado pelado
  - en su lado calvo
  - en su superficie gastada
  lexicon: HALOT
  rationale: El término deriva de la idea de calvicie/bareza, pero en este contexto de material se refiere a una superficie gastada o desnuda. «Desgastado» preserva esa metáfora material con claridad.
- source_word: בְגַבַּחְתּוֹ
  english_pob_choice: on its bare side
  chosen_spanish: en su lado desnudo
  alternatives_spanish:
  - en su lado desprovisto
  - en su lado liso
  - en su otra cara
  lexicon: HALOT
  rationale: Sigo la revisión inglesa final que prefirió «bare side» sobre «new side». «Desnudo» reproduce la oposición con קָרַחַת y mantiene la imagen de una superficie sin cobertura.
theological_decisions:
- issue: Término ritual de pureza/impureza
  english_pob_reading: it is unclean
  chosen_spanish_reading: es inmunda
  alternative_spanish_readings:
  - es impura
  - está inmunda
  rationale: Levítico usa lenguaje técnico de pureza ritual; «inmunda» conserva la categoría bíblica sin diluirla en una noción meramente higiénica. La concordancia femenina sigue al referente implícito «la plaga».
  doctrine_reference: Levítico 11–15; pureza ritual en la Torá
- issue: Naturaleza del objeto afectado
  english_pob_reading: the diseased area
  chosen_spanish_reading: la plaga
  alternative_spanish_readings:
  - la mancha
  - el área afectada
  rationale: El hebreo נגע abarca la afección misma y no solo una localización médica. «Plaga» mantiene el término tradicional del marco levítico y evita reducirlo a un concepto clínico moderno.
  doctrine_reference: Levítico 13; terminología de נגע en la ley de lepra/afecciones
- issue: Imagen final de superficies del material
  english_pob_reading: whether on its worn side or on its bare side
  chosen_spanish_reading: en su lado desgastado o en su lado desnudo
  alternative_spanish_readings:
  - en su lado gastado o en su lado pelado
  - en su superficie gastada o en su superficie desnuda
  rationale: La POB inglesa finalizó en «bare side», reflejando la oposición interna de los términos hebreos y descartando «new side». En español, «desgastado/desnudo» conserva la dualidad sin añadir una interpretación no sustentada.
  doctrine_reference: Levítico 13:48–59; inspección de manchas corrosivas en tejidos o cuero
translation_notes:
  revision_awareness: La redacción sigue la versión inglesa más reciente del POB, que cambió «new side» por «bare side». También conserva la opción semántica prudente para נגע y la imagen idiomática de עין como «apariencia», sin imponer una interpretación médica moderna.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología base del proyecto, pero este versículo no contiene el tetragrama.
  - «Plaga» se usa como término técnico levítico, no como referencia a una epidemia general.
  - «Inmunda» conserva la categoría ritual y evita suavizar el juicio legal.
  - Se ha preservado la ambigüedad de los términos finales con notas, porque el hebreo admite una imagen material difícil de fijar con certeza.
