translation:
  language: es
  text: Líbrame y rescátame de la mano de los extranjeros[a], cuya boca habla falsedad[b] y cuya diestra[c] es una diestra de engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “hijos de extranjeros”, un modismo que significa “extranjeros”.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como “vacío” o “vanidad” para שָׁוְא.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite “mano derecha”: “cuya mano derecha es una mano derecha de engaño”. La mano derecha suele simbolizar poder, compromiso o acción.'
    reason: cultural_note
lexical_decisions:
- source_word: פְּצֵנִי
  english_pob_choice: Rescue me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sácame
  lexicon: HALOT
  rationale: El verbo pide una liberación urgente; en español, "librar" expresa bien la idea de sacar a alguien de una situación opresiva, mientras mantiene el tono de súplica. "Rescátame" también sería válido, pero aquí se reserva para el segundo verbo o se usa como alternativa cercana.
- source_word: וְהַצִּילֵנִי
  english_pob_choice: and deliver me
  chosen_spanish: y rescátame
  alternatives_spanish:
  - y sálvame
  - y líbrame
  lexicon: HALOT
  rationale: El Hifil de נצל conserva la fuerza de ser arrancado o puesto a salvo. "Rescátame" mantiene la distinción con el primer verbo y suena natural en español sin perder el matiz de liberación activa.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de "mano" como ámbito de poder o control, que es transparente en español bíblico y moderno.
- source_word: בְּנֵי נֵכָר
  english_pob_choice: foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los hijos de extranjeros
  - los forasteros
  lexicon: HALOT
  rationale: El hebreo dice literalmente "hijos de extranjería/extrañeza", un modismo para personas extranjeras. "Extranjeros" comunica el sentido sin forzar una construcción literal poco natural en español.
- source_word: אֲשֶׁר פִּיהֶם דִּבֶּר שָׁוְא
  english_pob_choice: whose mouth speaks falsehood
  chosen_spanish: cuya boca habla falsedad
  alternatives_spanish:
  - cuya boca habla vanidad
  - cuya boca habla vacío
  - cuyos labios dicen mentira
  lexicon: HALOT
  rationale: שָׁוְא puede significar vacío, vanidad o falsedad; aquí, por el paralelismo con "engaño", "falsedad" recoge bien el sentido moral de decir lo que no es verdad. Se mantiene el singular "boca" porque el hebreo usa un sustantivo singular colectivo.
- source_word: וִימִינָם
  english_pob_choice: and whose right hand
  chosen_spanish: y cuya diestra
  alternatives_spanish:
  - y su diestra
  - y cuya mano derecha
  lexicon: HALOT
  rationale: '"Diestra" conserva el valor idiomático y el paralelismo con la repetición de "mano derecha" en la línea siguiente.'
- source_word: יְמִין שָׁקֶר
  english_pob_choice: is a right hand of deceit
  chosen_spanish: es una diestra de engaño
  alternatives_spanish:
  - es una mano derecha de engaño
  - es una diestra falsa
  lexicon: HALOT
  rationale: Se preserva la repetición enfática de "mano derecha/diestra" y el contraste moral entre verdad y engaño. "Engaño" traduce bien שָׁקֶר en este contexto de falsedad activa y traición.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés de la POB, pero ajusta las elecciones léxicas al español natural: conserva la imagen de la “mano”, el modismo de “hijos de extranjeros” y la repetición enfática de “mano derecha/diestra”, sin suavizar la tensión entre “falsedad”, “vacío” y “engaño”.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene “extranjeros” para בני נכר por ser el equivalente idiomático natural en español.
  - Se preserva la repetición de “diestra” para reflejar la intensificación hebrea de ימין שקר.
  - Las notas a y c se anclan en el texto porque ambas expresan alternativas o información cultural relevantes.
