translation:
  language: es
  text: 'Volvieron a Josué y le dijeron: «No suba todo el pueblo[a]. Que suban unos dos mil hombres, o unos tres mil hombres, y ataquen a Hai. No fatigues a todo el pueblo allí[b], porque son pocos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «el pueblo» puede referirse aquí específicamente a la fuerza de combate; compárese «tropas» o «ejército» como posible traducción contextual.
    reason: lexical_alternative
  - marker: b
    text: 'O: «No fatigues allí a todo el pueblo». El verbo hebreo puede llevar el sentido de causar cansancio o carga por un esfuerzo innecesario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: They returned
  chosen_spanish: Ellos volvieron
  alternatives_spanish:
  - Ellos regresaron
  - Volvieron
  lexicon: HALOT
  rationale: El verbo שוב se expresa naturalmente en español con «volver»; conserva el movimiento de retorno después del reconocimiento, sin añadir matices no presentes.
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: and said to him
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y le dijeron a él
  - y le hablaron
  lexicon: HALOT
  rationale: «Le dijeron» reproduce de forma transparente el objeto indirecto y la relación discursiva del hebreo sin sonar forzado.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el ejército
  lexicon: HALOT
  rationale: Se mantiene «pueblo» como equivalente de הָעָם, conforme al texto hebreo y al criterio del POB de no estrechar innecesariamente el referente a «ejército» en la línea principal.
- source_word: כְּאַלְפַּיִם אִישׁ
  english_pob_choice: about two thousand men
  chosen_spanish: unos dos mil hombres
  alternatives_spanish:
  - aproximadamente dos mil hombres
  - cerca de dos mil hombres
  lexicon: HALOT
  rationale: El prefijo כ indica aproximación; «unos» es el modo natural en español para marcar esa estimación sin volverlo mecánico.
- source_word: אוֹ כִּשְׁלֹשֶׁת אֲלָפִים אִישׁ
  english_pob_choice: or about three thousand men
  chosen_spanish: o unos tres mil hombres
  alternatives_spanish:
  - o aproximadamente tres mil hombres
  - o cerca de tres mil hombres
  lexicon: HALOT
  rationale: Se conserva la estimación paralela y el valor disyuntivo de אוֹ con una formulación idiomática en español.
- source_word: יַעֲלוּ
  english_pob_choice: go up
  chosen_spanish: suban
  alternatives_spanish:
  - asciendan
  - marchen
  lexicon: HALOT
  rationale: עלה en este contexto militar/topográfico se expresa bien con «subir»; en imperativo/jusivo plural español, «suban» mantiene la imagen de ascenso hacia Hai.
- source_word: וְיַכּוּ אֶת הָעָי
  english_pob_choice: and strike Ai
  chosen_spanish: y ataquen a Hai
  alternatives_spanish:
  - y golpeen a Hai
  - y hieran a Hai
  lexicon: HALOT
  rationale: נכה puede ser «golpear/derribar/atacar»; aquí «ataquen» comunica el golpe militar de manera natural en español, sin forzar una literalidad extraña como «golpeen».
- source_word: אַל תְּיַגַּע שָׁמָּה אֶת כָּל הָעָם
  english_pob_choice: Do not weary all the people there
  chosen_spanish: No fatigues allí a todo el pueblo
  alternatives_spanish:
  - No canses allí a todo el pueblo
  - No desgastes allí a todo el pueblo
  lexicon: HALOT
  rationale: El piel de יגע puede significar cansar, fatigar o agotar con esfuerzo; «fatigues» conserva la fuerza del verbo y el tono de advertencia. Se mantiene «allí» para שָׁמָּה.
- source_word: כִּי מְעַט הֵמָּה
  english_pob_choice: for they are few
  chosen_spanish: porque son pocos
  alternatives_spanish:
  - pues son pocos
  - porque son muy pocos
  lexicon: HALOT
  rationale: La frase es breve y directa; «son pocos» reproduce la escasez numérica sin añadir intensificación no expresada.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: HALOT
  rationale: Se conserva el término amplio «pueblo» para reflejar el hebreo y la elección del POB, que sólo aclara el posible matiz militar en nota, no en el texto principal.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - soldados
  - varones
  lexicon: HALOT
  rationale: «Hombres» es el equivalente natural de אִישׁ en este recuento de combatientes y conserva el matiz masculino sin introducir una paráfrasis interpretativa.
theological_decisions:
- issue: Alcance de הָעָם en un contexto militar
  english_pob_reading: Hebrew 'the people' may refer specifically to the fighting force here; compare 'troops' or 'army' as a contextual rendering.
  chosen_spanish_reading: «el pueblo» se mantiene en el texto principal, con la comprensión contextual de que aquí son combatientes.
  alternative_spanish_readings:
  - «el ejército»
  - «las tropas»
  rationale: 'La decisión sigue el auditoría inglesa: el hebreo dice literalmente «el pueblo», aunque el contexto lo restringe a la fuerza de combate. En español, «pueblo» preserva el dato textual; cualquier especificación militar queda implícita o para nota.'
  doctrine_reference: No aplica; decisión léxico-contextual.
- issue: Valor de יגע en Piel
  english_pob_reading: The Hebrew verb can carry the sense of causing weariness or burden through unnecessary effort.
  chosen_spanish_reading: «fatigues» comunica el cansancio o agotamiento causado por esfuerzo innecesario.
  alternative_spanish_readings:
  - «canses»
  - «agotes»
  - «molestes»
  rationale: La advertencia no es meramente ‘molestar’, sino evitar una fatiga innecesaria del pueblo. «Fatigues» conserva esa tensión semántica y el registro más formal que la revisión inglesa favoreció con «weary».
  doctrine_reference: No aplica; decisión léxico-contextual.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «wear out» por «weary» para un registro más formal y un ajuste más cercano al hebreo. La versión española sigue esa preferencia con «fatigues» y mantiene sin cambios sustanciales el sentido de la redacción auditada.
  spanish_consistency_notes:
  - Se conservó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto; aquí no hay mención del nombre divino.
  - Se mantuvo la distinción entre «pueblo» y una posible lectura militar («tropas/ejército») en nota, para no borrar la tensión textual del hebreo.
  - «Hai» se usa como forma española estable del topónimo Ai, sin adaptar a una transliteración inglesa.
  - Se prefirió un imperativo plural castellano natural («suban», «ataquen») para reflejar el valor jussivo del hebreo sin perder legibilidad.
