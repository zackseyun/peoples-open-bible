translation:
  language: es
  text: 'Y Daniel dijo[a]: «Me postraré ante el Señor mi Dios, porque él es el Dios viviente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adoraré al Señor mi Dios». El verbo griego puede denotar tanto postrarse como adorar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκυνήσω
  english_pob_choice: I will bow down
  chosen_spanish: Me postraré
  alternatives_spanish:
  - Adoraré
  - Me inclinaré
  lexicon: BDAG
  rationale: El verbo griego puede expresar tanto postración corporal como adoración. «Me postraré» conserva el gesto concreto de reverencia que está en el verbo, sin borrar su fuerza devocional en el contexto.
- source_word: Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: 'Se mantiene la equivalencia tradicional de κύριος con «Señor», en forma articular natural en español: «el Señor». Esto refleja el destinatario de la confesión y conserva el tono reverente del griego.'
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - a mi Dios
  - el Dios mío
  lexicon: BDAG
  rationale: En español, el dativo dependiente del verbo de postración se expresa de forma natural con «mi Dios» dentro de la frase verbal («me postraré ante el Señor mi Dios»), sin añadir una preposición innecesaria.
- source_word: θεὸς ζῶν
  english_pob_choice: the living God
  chosen_spanish: el Dios viviente
  alternatives_spanish:
  - el Dios vivo
  - Dios viviente
  lexicon: BDAG
  rationale: «El Dios viviente» es una expresión bíblica estable y fiel al griego, con el matiz de Dios como verdaderamente vivo en contraste con los ídolos.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la postración; «porque» comunica claramente la causalidad en español moderno.
theological_decisions:
- issue: Relación entre adoración y postración en προσκυνέω
  english_pob_reading: I will bow down
  chosen_spanish_reading: Me postraré
  alternative_spanish_readings:
  - Lo adoraré
  - Me inclinaré
  rationale: 'Se conserva la tensión lexical: el acto físico de postrarse está explícito, pero el contexto muestra que no es mera postura sino reverencia dirigida al Dios verdadero. No se reemplaza por «adoraré» para no sobreespecificar el sentido.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
- issue: Titulación de la divinidad en una confesión dirigida al Dios de Israel
  english_pob_reading: the Lord my God
  chosen_spanish_reading: el Señor mi Dios
  alternative_spanish_readings:
  - el Señor, mi Dios
  rationale: Se mantiene la combinación de título y posesivo sin domesticarla a una fórmula eclesial distinta. «Señor» traduce κύριος y «mi Dios» conserva la relación confesional del hablante.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se siguió el trazado auditado del inglés POB: προσκυνήσω se tomó como un acto de reverencia/postración con posible matiz de adoración, κύριος se mantuvo como «Señor», θεὸς ζῶν como «el Dios viviente», y ὅτι como causal.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Señor» en esta fórmula confesional, en coherencia con el uso documental de κύριος en el contexto griego.
  - Se prefirió «me postraré» sobre «adoraré» para mantener visible el gesto corporal sin perder la dimensión religiosa.
  - La puntuación con dos puntos después de «dijo» y comillas angulares sigue el estilo tipográfico español, manteniendo la claridad de cita directa.
