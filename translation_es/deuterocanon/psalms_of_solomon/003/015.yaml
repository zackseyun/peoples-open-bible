lexical_decisions:
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Esto
  - Ésta
  lexicon: demostrativo griego de proximidad/identificación
  rationale: El demostrativo presenta la afirmación con fuerza identificadora. «Esta» conserva la referencia inmediata y suena natural en español.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - herencia
  - lote
  lexicon: BDAG
  rationale: «Porción» comunica bien la idea de una parte asignada o adjudicada; en español es claro y no añade una interpretación más específica que el griego no exija.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - los malvados
  lexicon: BDAG
  rationale: El genitivo plural designa a personas caracterizadas por el pecado. «Pecadores» es directo, fiel y mantiene el valor moral del término sin suavizarlo.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para la era venidera
  lexicon: BDAG
  rationale: La locución expresa permanencia duradera. «Para siempre» es la equivalencia más natural en español y conserva la fuerza idiomática del griego.
translation_notes:
  revision_awareness: El texto griego es breve y coincide estrechamente con la traducción inglesa auditada; no se detectan variantes textuales ni tensiones léxicas que requieran nota adicional. La redacción española sigue la misma lectura y no introduce glosa interpretativa.
  spanish_consistency_notes:
  - Se mantiene «pecadores» en lugar de un término más suavizado para conservar la fuerza moral del original.
  - Se evita «porción» como metáfora doctrinal específica; aquí funciona como equivalente semántico directo de μερὶς.
  - «Para siempre» reproduce la permanencia de εἰς τὸν αἰῶνα sin cambiarlo por una formulación más teológica o litúrgica.
