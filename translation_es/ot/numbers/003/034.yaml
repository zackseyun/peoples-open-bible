translation:
  language: es
  text: Y los contados de entre ellos[a], según el número de todo varón de un mes en adelante, fueron seis mil doscientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los registrados entre ellos» / «los enumerados entre ellos». El hebreo se refiere al total censado que pertenecía a este grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those counted among them
  chosen_spanish: los contados entre ellos
  alternatives_spanish:
  - los registrados entre ellos
  - los enumerados entre ellos
  - los contados de entre ellos
  lexicon: HALOT
  rationale: El hebreo expresa el total de los miembros contados dentro del grupo. «Contados entre ellos» conserva el valor resultativo/pasivo de פקד sin reducirlo a una abstracción como «su número», y sigue de cerca la decisión auditada en inglés de «among them».
- source_word: בְּמִסְפַּר
  english_pob_choice: by the number of
  chosen_spanish: por el número de
  alternatives_spanish:
  - según el número de
  - conforme al número de
  - en número de
  lexicon: HALOT
  rationale: La fórmula de enumeración se expresa naturalmente en español con «por el número de», manteniendo la base censal del enunciado.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todos los varones
  - todo macho
  lexicon: HALOT
  rationale: «Varón» comunica con dignidad y precisión el referente masculino individual del censo; «todo» refleja el valor distributivo de כָּל.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: de un mes de edad y arriba
  alternatives_spanish:
  - desde un mes de edad y arriba
  - desde que tenía un mes de edad y más
  - de un mes cumplido en adelante
  lexicon: HALOT
  rationale: Se preserva el umbral de edad y la continuación ascendente. «Y arriba» sigue siendo una fórmula bíblica comprensible en español y evita añadir matices no presentes en el hebreo.
- source_word: שֵׁשֶׁת אֲלָפִים וּמָאתָיִם
  english_pob_choice: six thousand two hundred
  chosen_spanish: seis mil doscientos
  alternatives_spanish:
  - '6.200'
  - seis mil doscientos hombres
  lexicon: HALOT
  rationale: El total cardinal se traduce de forma directa y natural. Se evita añadir «hombres» porque ya está expresado en «todo varón».
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'from them' a 'among them' para hacer más natural y exacto el sentido del grupo censado; la redacción española adopta «entre ellos» para reflejar ese ajuste y la relación interna del censo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando corresponda, pero este versículo no la contiene.
  - No se introduce terminología eclesiástica ajena al hebreo; «varón» y «contados» preservan el registro censal.
  - La nota [a] queda anclada explícitamente en el texto para cumplir la trazabilidad del alternativo lexical.
