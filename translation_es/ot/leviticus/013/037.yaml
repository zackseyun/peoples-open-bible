revisions:
- from: Pero si, a su juicio, la tiña[a] se ha mantenido sin cambio, y en ella ha brotado cabello negro, la tiña ha sanado; él es limpio, y el sacerdote lo declarará limpio.
  to: Pero si, a su vista, la erupción escamosa ha permanecido igual, y en ella ha brotado cabello negro, la erupción escamosa está sanada; él es limpio, y el sacerdote lo declarará limpio.[a]
  rationale: Se ajusta «בְּעֵינָיו» a «a su vista» para conservar la perspectiva de inspección; se reemplaza «tiña» por «erupción escamosa» para seguir la justificación léxica del POB y evitar un diagnóstico moderno demasiado estrecho; se alisa «עָמַד» con «ha permanecido igual»; y se añade la nota alternativa al verbo final, porque el expediente inglés preserva explícitamente la alternativa «declare him clean/cleanse him», relevante también en español.
