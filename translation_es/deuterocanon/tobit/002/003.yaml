translation:
  language: es
  text: 'Y llegó y dijo: «Padre, uno de los nuestros[a] ha sido estrangulado y arrojado en la plaza del mercado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de nuestros parientes»; el griego dice «uno de nuestro γένος», que puede referirse a familia, grupo de parentesco o al propio pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo previo al verbo principal se integra naturalmente en español narrativo con «llegó y dijo», que conserva la secuencia de acciones sin volverla rígidamente participial.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi padre
  - Padre mío
  lexicon: BDAG
  rationale: Es un vocativo directo; «Padre» reproduce la dirección inmediata del habla sin añadir un posesivo ausente en el griego.
- source_word: εἷς ἐκ τοῦ γένους ἡμῶν
  english_pob_choice: one of our own people
  chosen_spanish: uno de los nuestros
  alternatives_spanish:
  - uno de nuestra familia
  - uno de nuestros parientes
  - uno de nuestro linaje
  lexicon: BDAG
  rationale: γένος puede abarcar familia, grupo de parentesco o pueblo. En este contexto funerario, «uno de los nuestros» comunica pertenencia comunitaria y étnico-religiosa de modo natural en español, sin restringirlo a familia inmediata.
- source_word: ἐστραγγαλωμένος
  english_pob_choice: has been strangled
  chosen_spanish: ha sido estrangulado
  alternatives_spanish:
  - ha sido ahorcado
  - ha sido sofocado
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica muerte por estrangulación; «estrangulado» es el equivalente más directo y evita sobreespecificar un método de suspensión que el griego no exige.
- source_word: ἔρριπται
  english_pob_choice: thrown down
  chosen_spanish: arrojado
  alternatives_spanish:
  - echado
  - tirado
  - arrojado al suelo
  lexicon: BDAG
  rationale: El perfecto pasivo de ῥίπτω expresa que el cuerpo fue lanzado y quedó allí; «arrojado» mantiene la violencia del desecho y funciona bien con la mención del lugar público.
- source_word: ἐν τῇ ἀγορᾷ
  english_pob_choice: in the marketplace
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en el mercado
  - en la plaza del mercado
  - en la plaza pública
  lexicon: BDAG
  rationale: ἀγορά puede ser mercado o plaza pública. «Plaza» preserva el sentido de espacio público abierto y suena natural en español; el contexto ya comunica el carácter de lugar accesible a todos.
theological_decisions:
- issue: Alcance de γένος ἡμῶν
  english_pob_reading: 'ethnic/communal kinship: ''one of our own people'''
  chosen_spanish_reading: «uno de los nuestros» como pertenencia comunitaria/étnica
  alternative_spanish_readings:
  - «uno de nuestra familia»
  - «uno de nuestra raza/estirpe»
  rationale: La escena trata de reconocer a un muerto del propio grupo para darle sepultura, no necesariamente a un pariente inmediato. La formulación elegida conserva la amplitud semántica de γένος sin endurecerla indebidamente.
  doctrine_reference: 'POB DOCTRINE: primacía del texto original y consistencia terminológica con decisiones documentadas'
translation_notes:
  revision_awareness: El pasaje fue revisado en el seguimiento más reciente y no requirió cambios; la versión española mantiene esa lectura estable, con una equivalencia optimal que sigue de cerca el griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - 'Se conserva el vocabulario forense/narrativo concreto: «estrangulado», «arrojado», «plaza».'
  - «Uno de los nuestros» evita tanto el calco duro como la reducción a parentesco inmediato, en línea con la nota inglesa sobre γένος.
