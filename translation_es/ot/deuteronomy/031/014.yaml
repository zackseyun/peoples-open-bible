translation:
  language: es
  text: 'Yahvé le dijo a Moisés: «Mira, se acercan tus días para morir. Llama a Josué, y preséntense en la tienda de reunión, para que yo le[a] mande». Moisés y Josué fueron y se presentaron en la tienda de reunión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le dé un encargo formal»; o «lo comisione». El verbo hebreo puede denotar mandar, encargar o comisionar; aquí se refiere al nombramiento formal de Josué por parte de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, no como título. En español bíblico actual, «Yahvé» reproduce la decisión auditada del POB en inglés y evita la sustitución por una forma titular.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Mira pues
  lexicon: HALOT
  rationale: La partícula introduce un llamado de atención en el discurso divino. «Mira» mantiene ese valor exhortativo en un español natural y menos arcaico que «He aquí».
- source_word: קָרְבוּ יָמֶיךָ לָמוּת
  english_pob_choice: your days are drawing near for you to die
  chosen_spanish: se acercan tus días para morir
  alternatives_spanish:
  - tus días de muerte se acercan
  - tu tiempo de morir está cerca
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de los días que se acercan y el infinitivo final «para morir», sin convertirlo en una paráfrasis más libre. El orden se adapta a la sintaxis natural del español.
- source_word: קְרָא אֶת יְהוֹשֻׁעַ
  english_pob_choice: Call Joshua
  chosen_spanish: Llama a Josué
  alternatives_spanish:
  - Convoca a Josué
  - Haz venir a Josué
  lexicon: HALOT
  rationale: El imperativo simple refleja el hebreo sin añadir matices innecesarios. «Llama» es directo y suficientemente amplio para el contexto narrativo.
- source_word: וְהִתְיַצְּבוּ
  english_pob_choice: present yourselves
  chosen_spanish: preséntense
  alternatives_spanish:
  - preséntense ustedes
  - pónganse de pie
  - párense
  lexicon: HALOT
  rationale: El hitpael expresa comparecer o ponerse formalmente delante de alguien. En español, «preséntense» transmite mejor la acción ceremonial que un calco como «estén de pie».
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» sigue la designación cultual del lugar sin recurrir a una terminología más tradicional que no siempre es la más transparente. Se mantiene el sustantivo 'tienda' para reflejar el hebreo אֹהֶל.
- source_word: וַאֲצַוֶּנּוּ
  english_pob_choice: that I may command him
  chosen_spanish: para que yo le dé mi encargo
  alternatives_spanish:
  - para que yo le mande
  - para que yo lo comisione
  - para que yo le dé instrucciones
  lexicon: HALOT
  rationale: El verbo צוה aquí conserva la fuerza de una orden divina, pero el contexto de la investidura de Josué admite un matiz de encargo formal. «Le dé mi encargo» busca mantener la autoridad del acto sin importar un tecnicismo eclesial no necesario en español.
- source_word: וַיֵּלֶךְ מֹשֶׁה וִיהוֹשֻׁעַ
  english_pob_choice: So Moses and Joshua went
  chosen_spanish: Moisés y Josué fueron
  alternatives_spanish:
  - Entonces Moisés y Josué fueron
  - Moisés y Josué se fueron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte con un pasado simple natural. «Fueron» conserva la simplicidad del hebreo y el progreso de la narración.
- source_word: וַיִּתְיַצְּבוּ
  english_pob_choice: presented themselves
  chosen_spanish: se presentaron
  alternatives_spanish:
  - se pusieron de pie
  - comparecieron
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia básica para el mismo verbo, asegurando consistencia interna. «Se presentaron» expresa bien la acción de comparecer ante Yahvé en un contexto ritual.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; por eso la traducción conserva el nombre propio divino en lugar de sustituirlo por un título. La forma española «Yahvé» corresponde a la política doctrinal del POB y mantiene la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de וַאֲצַוֶּנּוּ en la instalación de Josué
  english_pob_reading: that I may command him
  chosen_spanish_reading: para que yo le dé mi encargo
  alternative_spanish_readings:
  - para que yo le mande
  - para que yo lo comisione
  - para que yo le dé instrucciones
  rationale: El verbo admite ‘mandar/encargar/comisionar’. En este contexto de relevo de liderazgo, la frase española intenta preservar la fuerza de la orden divina y, a la vez, el carácter formal de la investidura de Josué sin introducir terminología eclesiástica ajena al pasaje.
  doctrine_reference: Translation philosophy §§1, 5; lexical note on צוה
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del POB en inglés, que prefirió una forma más directa para צוה y mantuvo un registro solemne con «Behold». En español se reflejan esas decisiones con «Mira» y con una fórmula que conserva el carácter de encargo/mandato formal sin alejarse del hebreo ni del audit trail revisado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, de acuerdo con la terminología base del proyecto.
  - «Tienda de reunión» se usa de manera uniforme para אֹהֶל מוֹעֵד.
  - «Se presentaron / preséntense» conserva consistencia léxica para וְהִתְיַצְּבוּ y וַיִּתְיַצְּבוּ.
  - «Josué» se mantiene como forma española habitual del nombre propio bíblico.
  - La puntuación y las comillas siguen el estándar tipográfico español, con una nota al pie anclada solo en el punto léxico donde existe alternativa significativa.
