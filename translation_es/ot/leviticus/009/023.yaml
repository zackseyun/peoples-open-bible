translation:
  language: es
  text: Moisés y Aarón entraron en la tienda de reunión, salieron y bendijeron al pueblo, y la gloria de Yahvé apareció a todo el pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la Tienda de Reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Sigo el sentido técnico cultual de la expresión, pero en español "tienda de reunión" suena más natural que un calco rígido. "Tienda" conserva el referente del tabernáculo, y "reunión" mantiene el valor funcional del lugar.
- source_word: וַיָּבֹא ... וַיֵּצְאוּ
  english_pob_choice: went into ... came out
  chosen_spanish: entraron ... salieron
  alternatives_spanish:
  - fueron ... salieron
  - ingresaron ... salieron
  lexicon: HALOT
  rationale: El hebreo muestra una secuencia narrativa simple. En español, el plural verbal refleja con naturalidad que Moisés y Aarón son ambos el sujeto coordinado, como lo asumió el audit trail inglés.
- source_word: וַיְבָרֲכוּ
  english_pob_choice: they blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - pronunciaron una bendición sobre
  - dieron bendición a
  lexicon: HALOT
  rationale: '"Bendijeron" reproduce de manera directa el verbo hebreo sin especificar la forma ritual de la bendición. Mantiene la misma apertura semántica que la opción inglesa auditada.'
- source_word: הָעָם / כָּל הָעָם
  english_pob_choice: the people / all the people
  chosen_spanish: el pueblo / a todo el pueblo
  alternatives_spanish:
  - el pueblo / ante todo el pueblo
  - la comunidad / a toda la comunidad
  lexicon: HALOT
  rationale: '"Pueblo" es el equivalente más natural y amplio en este contexto de la comunidad del pacto. La preposición "a" conserva el destino de la manifestación sin forzar una paráfrasis.'
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé Dios
  - la gloria del Yahvé
  lexicon: HALOT
  rationale: Por norma del proyecto, el Tetragrámaton se vierte "Yahvé". "Gloria" preserva el peso de כָבוֹד como manifestación visible y no solo como honor abstracto.
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se hizo visible
  lexicon: HALOT
  rationale: El nifal comunica una manifestación visible. "Se apareció" suena más natural en español para una teofanía y conserva el carácter reflexivo/pasivo del hebreo mejor que un simple "apareció".
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - ante todo el pueblo
  - a la vista de todo el pueblo
  lexicon: HALOT
  rationale: La preposición hebrea אֶל se traduce aquí con "a" para mantener la dirección de la manifestación sin añadir explicaciones interpretativas. "Todo el pueblo" conserva la totalización del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh in the audit trail / standard LORD in the legacy English text
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto español adopta "Yahvé" como forma principal. Esto preserva el nombre del pacto sin la convención de sustitución por "SEÑOR".
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Secuencia narrativa simple entre las acciones
  english_pob_reading: simple Hebrew sequence without added causal or temporal expansion
  chosen_spanish_reading: Moisés y Aarón entraron... salieron y bendijeron... y la gloria de Yahvé se apareció...
  alternative_spanish_readings:
  - Entonces la gloria de Yahvé se apareció...
  - y cuando salieron bendijeron...
  rationale: La cadena de wayyiqtol se refleja en español con coordinación directa, evitando introducir "entonces" o "cuando" que no están en el hebreo y que el audit trail inglés revisó para mantener la secuencia simple.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish, not archaic or overly interpretive'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés al conservar la secuencia narrativa simple sin añadir conectores temporales explicativos; además, ajusta el nombre divino al estándar español del proyecto ('Yahvé') y mantiene un registro culto pero natural para público eclesial amplio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' por consistencia con el estándar del proyecto en español.
  - '''Tienda de reunión'' conserva el valor técnico de אֹהֶל מוֹעֵד sin recurrir a una capitalización rígida innecesaria.'
  - '''Pueblo'' se usa de forma uniforme para הָעָם y כָּל הָעָם, preservando la progresión del hebreo.'
  - No se añadieron notas al pie porque el texto español no introduce una ambigüedad nueva que requiera alternativa documentada.
