translation:
  language: es
  text: 'Estos son los nombres de los nacidos[a] que tuvo en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos que le nacieron en Jerusalén». El participio hebreo significa literalmente «los nacidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La expresión introductoria presenta una lista; en español, 'Estos son' conserva el valor presentacional con naturalidad. Se omite 'Y' porque no añade fuerza semántica necesaria en esta apertura de lista.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - nombres
  lexicon: HALOT
  rationale: El sustantivo plural en construcción se traduce de manera directa como 'los nombres', manteniendo la lista nominal que sigue.
- source_word: הַיִּלֹּדִים
  english_pob_choice: those born
  chosen_spanish: de los que le nacieron
  alternatives_spanish:
  - de los nacidos
  - de los hijos nacidos
  - de los que fueron nacidos
  lexicon: HALOT
  rationale: El participio pasivo de ילד literalmente expresa 'los nacidos'. En español, 'le nacieron' comunica con naturalidad la relación de descendencia sin añadir 'hijos' de forma explícita, preservando la ambigüedad relativa del hebreo entre una formulación literal y una idiomática de genealogía.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo posesivo hebreo se refleja naturalmente en español con el pronombre átono 'le' en 'le nacieron', que expresa pertenencia/relación de paternidad sin sobrecargar la frase.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo locativo directo; la traducción estándar es transparente y fiel.
- source_word: שַׁמּוּעַ
  english_pob_choice: Shammua
  chosen_spanish: Samúa
  alternatives_spanish:
  - Samúa
  lexicon: HALOT
  rationale: Se adopta una transliteración española habitual y pronunciable para el nombre propio. La forma acentuada ayuda a la lectura en español sin alterar el referente onomástico.
- source_word: שׁוֹבָב
  english_pob_choice: Shobab
  chosen_spanish: Sobab
  alternatives_spanish:
  - Shobab
  lexicon: HALOT
  rationale: Nombre propio transliterado a una forma más natural para el sistema ortográfico español, manteniendo la identificación bíblica.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: HALOT
  rationale: Nombre propio bíblico adaptado a la ortografía española con tilde para marcar la sílaba tónica.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomoh
  lexicon: HALOT
  rationale: Se conserva la forma bíblica establecida en español ('Salomón'), que es la representación tradicional y plenamente reconocible del nombre hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y toma como referencia el audit trail inglés para mantener la fuerza presentacional de la lista y la alternativa léxica sobre הַיִּלֹּדִים. No se observan revisiones textuales relevantes en el expediente inglés; la solución española ajusta la idiomaticidad sin desplazar el sentido genealógico.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando corresponda a YHWH; este versículo no contiene el Tetragrámaton.
  - Los nombres propios se adaptan a formas españolas reconocibles y pronunciables, conservando la identificación bíblica.
  - La nota al pie preserva la tensión entre una traducción literal ('los nacidos') y una formulación genealógica más natural en español.
