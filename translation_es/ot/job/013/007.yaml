translation:
  language: es
  text: ¿Hablaréis injusticia[a] en favor de Yahvé, y engaño en favor de él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «a Yahvé» en la primera cláusula, y de modo semejante «a él» en la segunda. La preposición hebrea admite más de una relación; el contexto favorece la idea de hablar en defensa de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלְאֵל
  english_pob_choice: for God
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Dios
  - en favor de Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición ל aquí puede expresar dirección, referencia o beneficio/representación. En el contexto de reproche de Job, la idea es que hablan defendiendo a Dios; por eso “para Yahvé” conserva la relación de representación sin volverla más explícita de lo que exige el hebreo. Se mantiene “Yahvé” conforme al criterio del proyecto para el nombre divino.
- source_word: תְּדַבְּרוּ
  english_pob_choice: will you speak
  chosen_spanish: Hablaréis
  alternatives_spanish:
  - ¿hablaréis?
  - ¿vais a hablar?
  - ¿hablarán?
  lexicon: HALOT
  rationale: El imperfecto en una pregunta retórica de reprensión puede expresarse en español con futuro para conservar el tono de desafío. Se omite el verbo auxiliar para evitar una formulación más pesada que el hebreo y mantener la fuerza directa de la acusación.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - maldad
  - injusticia
  lexicon: HALOT
  rationale: “Injusticia” preserva mejor el peso ético y judicial del sustantivo que opciones más genéricas como “mal”. También mantiene la correspondencia semántica con la segunda cola, donde aparece “engaño”.
- source_word: וְלוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - en favor de él
  - a él
  - por él
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera cola y la tersura del hebreo. “Para él” reproduce bien la función de ל como expresión de beneficio o representación, sin añadir una interpretación demasiado explicativa.
- source_word: רְמִיָּה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - mentira
  lexicon: HALOT
  rationale: “Engaño” es una forma natural y fiel para el sustantivo abstracto y mantiene el paralelo con “injusticia”. “Mentira” sería más concreta y “fraude” demasiado técnica para este contexto.
theological_decisions:
- issue: 'Sentido de ל en ambas cláusulas: defensa de Dios o simple dirección a Dios'
  english_pob_reading: Job rebukes them for speaking unjustly in God's defense
  chosen_spanish_reading: Job los reprende por hablar injustamente en defensa de Yahvé
  alternative_spanish_readings:
  - Job los reprende por hablar injustamente a Yahvé
  - Job los reprende por hablar injusticia para Yahvé
  rationale: El contexto inmediato favorece la idea de hablar como defensores parciales de Dios, no sólo dirigirse a él. En español, “para Yahvé” conserva la ambigüedad útil del hebreo y permite la lectura de representación/beneficio que el audit trail considera preferible.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del control cruzado inglés, manteniendo la repetición elíptica del hebreo en la segunda cola (“engaño” sin repetir “hablar”) y preservando la tensión interpretativa de ל con una nota breve en lugar de resolverla de forma unilateral.
  spanish_consistency_notes:
  - Se usa “Yahvé” según el estándar del proyecto para יהוה.
  - Se evita repetir “hablar” en la segunda cola para reflejar la elipsis del hebreo y la revisión más reciente del audit trail.
  - Se conserva la paralelismo nominal “injusticia / engaño” como correspondencia de עַוְלָה / רְמִיָּה.
