  text: וְ/לֹֽא יִהְיֶ֨ה ע֜וֹד לְ/בֵ֣ית יִשְׂרָאֵ֗ל סִלּ֤וֹן מַמְאִיר֙ וְ/ק֣וֹץ מַכְאִ֔ב מִ/כֹּל֙ סְבִ֣יבֹתָ֔/ם הַ/שָּׁאטִ֖ים אוֹתָ֑/ם וְ/יָ֣דְע֔וּ כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/028/024.yaml
  text: And there will no longer be for the house of Israel a brier causing bitterness or a thorn causing pain from among all those around them who despise them[a]. Then they will know that I am the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'a prickle that embitters'; the Hebrew image is of a sharp, injurious plant used metaphorically for hostile neighbors.
    reason: lexical_alternative
