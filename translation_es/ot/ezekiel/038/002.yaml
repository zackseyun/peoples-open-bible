translation:
  language: es
  text: Hijo de hombre[a], pon tu rostro hacia Gog, de la tierra de Magog, príncipe de Rosh, Mesec y Tubal, y profetiza contra él.
  philosophy: optimal-equivalence
  footnotes: &id001
  - marker: a
    text: O, “el príncipe principal de Mesec y Tubal”. El hebreo רֹאשׁ puede leerse aquí como nombre propio (“Rosh”) o como sustantivo común (“principal”, “jefe”).
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Se conserva el apelativo fijo dirigido a Ezequiel y la forma masculina singular del hebreo. 'Hijo de hombre' es transparente y tradicional en español bíblico, sin borrar el valor literal del hebreo.
- source_word: שִׂים פָּנֶיךָ אֶל
  english_pob_choice: set your face toward
  chosen_spanish: pon tu rostro hacia
  alternatives_spanish:
  - dirige tu rostro hacia
  - vuelve tu rostro hacia
  lexicon: HALOT
  rationale: La imagen hebrea de orientar el rostro se mantiene en español con un verbo natural. 'Poner el rostro hacia' conserva la direccionalidad y el tono deliberado del giro idiomático.
- source_word: גּוֹג
  english_pob_choice: Gog
  chosen_spanish: Gog
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אֶרֶץ הַמָּגוֹג
  english_pob_choice: of the land of Magog
  chosen_spanish: de la tierra de Magog
  alternatives_spanish:
  - de la tierra de Magog
  - de Magog
  lexicon: HALOT
  rationale: El hebreo expresa pertenencia o procedencia geográfica. 'Tierra de Magog' es natural en español y conserva la relación genitiva sin añadir interpretación.
- source_word: נְשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - jefe
  - líder
  lexicon: HALOT
  rationale: El término designa un gobernante o caudillo. 'Príncipe' reproduce bien el valor de título político en un contexto profético.
- source_word: רֹאשׁ
  english_pob_choice: chief
  chosen_spanish: Rosh
  alternatives_spanish:
  - cabeza
  - jefe
  lexicon: HALOT
  rationale: Se preserva la lectura controvertida como nombre propio en la línea principal, en consonancia con la revisión inglesa más reciente que quiso reflejar más directamente la wording hebrea y mantener la lectura disputada. En español se deja también abierta la tensión interpretativa en la nota.
- source_word: מֶשֶׁךְ וְתֻבָל
  english_pob_choice: Meshech and Tubal
  chosen_spanish: Mesec y Tubal
  alternatives_spanish:
  - Meshec y Tubal
  - Meséj y Tubal
  lexicon: HALOT
  rationale: Nombres propios de pueblos o regiones; se transliteran con forma habitual en español bíblico. 'Mesec' evita una grafía demasiado etimológica o ajena al uso eclesial hispano.
- source_word: וְהִנָּבֵא עָלָיו
  english_pob_choice: and prophesy against him
  chosen_spanish: y profetiza contra él
  alternatives_spanish:
  - y profetiza acerca de él
  - y profetiza sobre él
  lexicon: HALOT
  rationale: En un oráculo de juicio, על comunica oposición; 'contra él' es la equivalencia idiomática más clara en español y preserva el sentido hostil del mandato.
theological_decisions:
- issue: 'Tratamiento de רֹאשׁ: nombre propio ''Rosh'' o título común ''jefe/cabeza'''
  english_pob_reading: The updated English POB text preserves the contested proper-name reading in the main line, while the earlier audit history documented the common-noun alternative 'chief prince'.
  chosen_spanish_reading: Se conserva 'Rosh' en el texto principal y se nota la alternativa de lectura.
  alternative_spanish_readings:
  - '''príncipe principal de Mesec y Tubal'''
  - '''príncipe jefe de Mesec y Tubal'''
  rationale: 'La evidencia del paquete muestra una tensión textual real: el hebreo admite una lectura común (''cabeza/jefe'') o un nombre propio. Como la revisión inglesa reciente optó por reflejar más directamente la posibilidad de nombre propio, el español principal sigue esa decisión y la nota preserva la alternativa sin resolverla artificialmente.'
  doctrine_reference: Translation philosophy §3 (preservar tensiones interpretativas); §1 (primacía del hebreo sobre la tradición de traducción)
- issue: Tono del mandato profético
  english_pob_reading: and prophesy against him
  chosen_spanish_reading: y profetiza contra él
  alternative_spanish_readings:
  - y profetiza acerca de él
  - y profetiza sobre él
  rationale: En el contexto del capítulo, el mandato introduce un anuncio de juicio. 'Contra él' comunica de forma natural la hostilidad implícita en על sin neutralizar el tono profético.
  doctrine_reference: Uso contextual de preposiciones en oráculos de juicio
- issue: Identidad de 'hijo de hombre' como vocativo a Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: Se mantiene el vocativo tradicional y literal para no diluir el patrón recurrente de Ezequiel. La expresión no se normaliza a un equivalente abstracto porque el texto la usa como fórmula de dirección.
  doctrine_reference: Consistencia literaria del libro de Ezequiel
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente que dejó de resolver רֹאשׁ como 'chief prince' y prefirió conservar la lectura disputada como nombre propio en la línea principal. A la vez, la nota mantiene visible la alternativa tradicional de lectura común para no borrar la tensión documentada por el audit trail.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - '''Mesec'' se mantiene como transliteración española habitual de Meshech.'
  - Se eligió 'profetiza contra él' por coherencia con el valor adversativo de על en un contexto de juicio.
