translation:
  language: es
  text: Persia, Cus[a] y Put[b] están con ellos, todos ellos con escudo y casco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cus» traduce aquí el nombre propio antiguo כּוּשׁ; algunas versiones tradicionales usan «Etiopía», pero eso introduce una identificación histórica interpretativa.
    reason: lexical_alternative
  - marker: b
    text: «Put» se asocia tradicionalmente con «Libia» en algunas traducciones e identificaciones históricas.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַס
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - Paras
  lexicon: HALOT
  rationale: Es un nombre propio de pueblo/región; mantener «Persia» conserva la identificación histórica y coincide con la decisión inglesa de transliterar el nombre.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se trata de un etnónimo/topónimo antiguo. «Cus» es una transliteración española natural y evita la interpretación histórica de «Etiopía», que el audit trail inglés marca como más tradicional pero menos directa al hebreo.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Libia
  lexicon: HALOT
  rationale: Nombre etnogeográfico propio. Se conserva «Put» por fidelidad al hebreo; «Libia» sería una identificación interpretativa no exigida por el texto.
- source_word: אִתָּם
  english_pob_choice: are with them
  chosen_spanish: están con ellos
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: El hebreo expresa una cláusula nominal con preposición y sufijo pronominal; en español, «están con ellos» comunica con naturalidad la relación de compañía/alianza sin perder el sentido básico de «with them».
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos juntos
  lexicon: HALOT
  rationale: Se conserva el valor enfático y resumidor del hebreo. «Todos ellos» es fluido en español y refleja la totalidad de los aliados enumerados.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: HALOT
  rationale: «Escudo» es el equivalente moderno normal y claro; «broquel» sería más arcaico o más técnico de lo necesario.
- source_word: וְ/כוֹבָע
  english_pob_choice: helmet
  chosen_spanish: yelmo
  alternatives_spanish:
  - casco
  lexicon: HALOT
  rationale: El término apunta a equipo defensivo para la cabeza. «Yelmo» preserva mejor el registro bíblico y la imagen militar antigua que «casco», aunque ambos serían posibles.
translation_notes:
  revision_awareness: El contexto auditado indica alta concordancia y ausencia de revisiones aplicadas; por eso se mantiene una solución directa y estable, con ajustes mínimos para naturalidad del español sin perder la transparencia léxica.
  spanish_consistency_notes:
  - Se mantuvieron transliteraciones para los nombres propios antiguos donde el audit trail inglés prefirió transliterar frente a equivalencias tradicionales interpretativas.
  - Se evitó «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Yelmo» se eligió por registro bíblico y militar antiguo; «casco» queda como alternativa moderna menos marcada.
