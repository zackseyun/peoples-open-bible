    text: O «la tropa que vino entre los árabes al campamento». La frase hebrea puede entenderse de otro modo según se tome la preposición con «árabes».
    reason: lexical_alternative
  revision_rationale: Se ajustan los nombres propios a formas más consistentes con el audit trail POB, se explicita «hijos» para preservar el referente contextual de כָל הָרִאשֹׁנִים en español claro, y se suaviza «en lugar de él» a «en su lugar» por mejor naturalidad. Se mantiene la nota sobre la ambigüedad de בָעַרְבִים y la opción léxicamente contenida «banda».
