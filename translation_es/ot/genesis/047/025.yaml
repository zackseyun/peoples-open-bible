  text: וַ/יֹּאמְר֖וּ הֶחֱיִתָ֑/נוּ נִמְצָא חֵן֙ בְּ/עֵינֵ֣י אֲדֹנִ֔/י וְ/הָיִ֥ינוּ עֲבָדִ֖ים לְ/פַרְעֹֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/025.yaml
  text: And they said[a], “You have kept us alive. May we find favor in the eyes of my lord, and we will be slaves to Pharaoh.”
