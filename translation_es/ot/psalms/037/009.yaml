translation:
  language: es
  text: Porque los malhechores serán eliminados, pero los que esperan en Yahvé —ellos heredarán la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país». El hebreo אֶרֶץ puede significar «tierra», «país» o «tierra» en sentido más amplio. Aquí «la tierra» encaja mejor con el trasfondo pactual y de herencia del salmo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la base o razón del dicho anterior; «Porque» conserva bien ese valor explicativo en español sin sonar forzado.
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: malhechores
  alternatives_spanish:
  - malvados
  - los que hacen el mal
  lexicon: HALOT
  rationale: El participio nombra a personas caracterizadas por obrar mal. «Malhechores» es natural en español y mantiene el matiz moral activo del término.
- source_word: יִכָּרֵתוּן
  english_pob_choice: will be cut off
  chosen_spanish: serán talados
  alternatives_spanish:
  - serán cortados
  - serán eliminados
  - serán destruidos
  lexicon: HALOT
  rationale: «Cortados» es el valor literal, pero en español «talados» comunica con más naturalidad la imagen de ser arrancados o eliminados. Aun así, conserva la fuerza judicial y de remoción del verbo hebreo כרת.
- source_word: וְקֹוֵי
  english_pob_choice: but those who wait for
  chosen_spanish: pero los que esperan en
  alternatives_spanish:
  - y los que esperan en
  - pero los que confían en
  - y los que ponen su esperanza en
  lexicon: HALOT
  rationale: El participio de קוה incluye espera confiada y expectante. «Los que esperan en» preserva esa tensión entre espera y confianza, y el «pero» refleja con claridad el contraste con la primera cláusula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma castellana establecida en el proyecto. Esto evita la sustitución por un título y refleja el Tetragrámaton con transparencia.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «ellos» después del guion reproduce de manera natural ese énfasis sin recargar la frase.
- source_word: יִירְשׁוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: «Heredarán» conserva el matiz de promesa y asignación propia de ירשׁ, mejor que una simple posesión neutral.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - la región
  - el país
  lexicon: HALOT
  rationale: Aunque אָרֶץ puede significar «tierra» o «tierra/país» en sentido de heredad, aquí el paralelismo y el contexto del salmo permiten una redacción española amplia y bíblica. «La tierra» mantiene tanto la imagen como la posibilidad de un alcance más amplio que «el país».
theological_decisions:
- issue: Alcance de אָרֶץ en la promesa
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra/país
  - la tierra prometida
  - el país
  rationale: El texto hebreo admite tanto «tierra» como «tierra/país». El POB inglés prefirió «the land» por el trasfondo pactal; en español, «la tierra» conserva esa lectura y resulta idiomática, sin cerrar el posible eco más amplio de «tierra» como herencia. Se evita «el país» porque estrecha demasiado el campo semántico.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; términos controvertidos: יְהוָה YHWH'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no se requerían cambios y que la concordancia con la auditoría inglesa es alta; por eso esta propuesta conserva la estructura y las decisiones de fondo, ajustándolas a una formulación española natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - Se usa una negación/contraste claro entre las dos mitades del versículo mediante «pero».
  - «Heredarán» y «la tierra» conservan el lenguaje de herencia pactal del salmo.
  - La nota sobre אֶרֶץ preserva la alternativa «tierra/país» sin resolverla de forma absoluta.
