  to: Entonces se volvieron y llegaron a En-mispat (es decir[a], Cadés), e hirieron todo el país de los amalecitas[b], y también a los amorreos que habitaban en Hazazón-tamar[c].
  rationale: Se ajusta el español para que conserve mejor el sentido geográfico de שְׂדֵה en contexto y suene natural en español bíblico moderno. «País» refleja mejor la región de los amalecitas que «campo» en la cláusula con «hirieron». También se elimina «ellos» por naturalidad. Se conservan los topónimos, la glosa identificativa y las notas existentes.
