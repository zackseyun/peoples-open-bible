translation:
  language: es
  text: Al traer sobre ti mismo[a] un gran vengador, innovador de torturas y enemigo de los que verdaderamente reverencian a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un gran espíritu vengador»; el griego ἀλάστωρ puede designar a un vengador personal o a una fuerza de retribución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγαν
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mighty
  lexicon: LSJ
  rationale: En español, «gran» es la forma natural antepuesta para intensificar un sustantivo y reproduce bien la fuerza enfática de μέγαν sin sonar pesada.
- source_word: σοι
  english_pob_choice: against yourself / upon yourself
  chosen_spanish: sobre ti mismo
  alternatives_spanish:
  - contra ti mismo
  - para ti mismo
  lexicon: LSJ
  rationale: El dativo aquí tiene valor de desventaja o resultado para el propio sujeto. «Sobre ti mismo» mantiene la idea de algo que cae o recae sobre el tirano, en línea con la revisión inglesa hacia «upon yourself».
- source_word: προσβαλλὼν
  english_pob_choice: bringing upon
  chosen_spanish: al traer
  alternatives_spanish:
  - trayendo sobre
  - arrojando sobre
  - haciendo recaer
  lexicon: LSJ
  rationale: El participio expresa la acción de poner o hacer venir algo contra uno. «Al traer» conserva el valor participial y encaja con el resultado hostil del contexto.
- source_word: ἀλάστορα
  english_pob_choice: avenger
  chosen_spanish: vengador
  alternatives_spanish:
  - espíritu vengador
  - retribuidor
  - destructor
  lexicon: LSJ
  rationale: «Vengador» es la equivalencia más directa y clara en español. La nota preserva la posibilidad de una lectura más personal o más casi espiritual del término griego.
- source_word: καινοτόμε
  english_pob_choice: innovator
  chosen_spanish: innovador
  alternatives_spanish:
  - inventor
  - ideador
  - creador de
  lexicon: LSJ
  rationale: El vocativo acusa a la persona de introducir novedades en materia de castigos. «Innovador» conserva el matiz de algo novedoso y provocado deliberadamente.
- source_word: βασάνων
  english_pob_choice: of tortures
  chosen_spanish: de torturas
  alternatives_spanish:
  - de tormentos
  - de suplicios
  - de pruebas
  lexicon: LSJ
  rationale: En este contexto martirial, βασάνων apunta a torturas reales o instrumentos de tortura; «torturas» es la opción más precisa y transparente para el lector español.
- source_word: πολέμιε
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - falso amigo
  - hostil
  lexicon: LSJ
  rationale: El vocativo es una denuncia directa. «Enemigo» reproduce la agresividad personal del original de manera natural en español.
- source_word: τῶν ἀληθῶς εὐσεβούντων
  english_pob_choice: of those who are truly reverent
  chosen_spanish: de los que en verdad son reverentes
  alternatives_spanish:
  - de los que verdaderamente son piadosos
  - de los que realmente reverencian a Dios
  - de los que practican la piedad de verdad
  lexicon: LSJ
  rationale: «εὐσεβέω» expresa reverencia/piedad hacia Dios. «Reverentes» evita fórmulas eclesiásticas demasiado técnicas y conserva el énfasis de ἀληθῶς con «en verdad».
theological_decisions:
- issue: ἀλάστωρ como avenger / avenging spirit
  english_pob_reading: a great avenger, with a footnote allowing 'a great avenging spirit'
  chosen_spanish_reading: un gran vengador, con nota que permite entenderlo también como una figura de venganza o retribución
  alternative_spanish_readings:
  - un gran espíritu vengador
  - un gran retribuidor
  - una fuerza de retribución
  rationale: El griego puede referirse a un vengador personal o a una figura/fuerza de retribución. Mantener «vengador» en el texto principal preserva la lectura directa, mientras la nota recoge la alternativa sin borrar la tensión léxica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: εὐσεβούντων y el sentido de piedad
  english_pob_reading: those who are truly reverent
  chosen_spanish_reading: los que en verdad son reverentes
  alternative_spanish_readings:
  - los que son verdaderamente piadosos
  - los que realmente practican la piedad
  rationale: El término implica reverencia orientada a Dios. «Reverentes» comunica bien la postura religiosa sin reemplazarla por un tecnicismo confesional posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: La redacción inglesa fue revisada de «against yourself» a «upon yourself» para reflejar con más naturalidad προσβαλλὼν σοι; la frase española adopta esa misma dirección semántica con «al traer sobre ti mismo». También se conservó la estructura vocativa acusatoria y la alternativa léxica para ἀλάστορα mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; en este versículo no aparece el nombre divino.
  - «Vengador» se mantiene como término principal, sin sustituirlo por lenguaje más eclesiástico o interpretativo.
  - «Reverentes» traduce εὐσεβούντων de forma sobria y comprensible, evitando «piadosos» como única opción para no borrar el matiz de reverencia activa.
