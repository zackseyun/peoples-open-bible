translation:
  language: es
  text: Yahvé visitó a Sara, como había dicho[a], y Yahvé hizo con Sara como había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘atendió a Sara’. El verbo hebreo puede expresar que Dios vuelve su atención hacia alguien para actuar en su favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre del pacto en la forma española de uso del proyecto. ‘Yahvé’ preserva la decisión auditada del POB de no ocultar el Tetragrámaton bajo una convención de título.
- source_word: פָּקַד
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - atendió a
  - tomó nota de
  - intervino a favor de
  lexicon: HALOT
  rationale: En este contexto de cumplimiento de promesa, ‘visitó’ conserva la fuerza lexical tradicional de פקד y corresponde al sentido de acción divina eficaz sobre Sara. Se evita ‘visitar’ en sentido meramente espacial, pero se mantiene la posibilidad semántica de la atención activa de Dios.
- source_word: אֶת שָׂרָה
  english_pob_choice: Sarah
  chosen_spanish: a Sara
  alternatives_spanish:
  - Sara
  - para Sara
  lexicon: HALOT
  rationale: 'El marcador de objeto directo no se traduce, pero en español conviene explicitar el objeto con ‘a’ por naturalidad sintáctica. Se usa el nombre propio en forma española habitual: ‘Sara’.'
- source_word: כַּאֲשֶׁר אָמָר
  english_pob_choice: as he had said
  chosen_spanish: como había dicho
  alternatives_spanish:
  - tal como había dicho
  - como había dicho anteriormente
  lexicon: HALOT
  rationale: Se mantiene el valor retrospectivo del verbo perfecto en español con pluscuamperfecto. ‘Dicho’ traduce naturalmente אָמַר sin sobrecargar el matiz de promesa, que queda implícito por el contexto.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - obró
  - trató
  lexicon: HALOT
  rationale: ‘Hizo’ preserva la generalidad del verbo hebreo y mantiene el paralelismo con la segunda cola. Evita especificar más de lo que el texto afirma en esta línea.
- source_word: לְשָׂרָה
  english_pob_choice: for Sarah
  chosen_spanish: por Sara
  alternatives_spanish:
  - para Sara
  - a favor de Sara
  lexicon: HALOT
  rationale: El ל beneficiario se expresa de manera natural en español con ‘por’ cuando el énfasis es el beneficio o la acción realizada en favor de alguien. ‘Para Sara’ también sería posible, pero ‘por Sara’ conserva mejor el matiz de intervención en su favor.
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: as he had spoken
  chosen_spanish: como había hablado
  alternatives_spanish:
  - como había prometido
  - como había dicho
  lexicon: HALOT
  rationale: 'Se conserva la distinción estilística del hebreo entre אָמַר y דִּבֵּר: ambos pueden traducirse, pero ‘hablado’ mantiene el paralelismo sin igualar mecánicamente las dos cláusulas.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la pauta del proyecto, se conserva el nombre propio divino en español como ‘Yahvé’, evitando la sustitución litúrgica por ‘SEÑOR’ y manteniendo transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פָּקַד en contexto de promesa cumplida
  english_pob_reading: visited
  chosen_spanish_reading: visitó
  alternative_spanish_readings:
  - atendió a
  - intervino a favor de
  rationale: La lectura auditada del POB reconoce la tensión lexical entre ‘visitar’ y una atención eficaz de Dios. En español, ‘visitó’ conserva esa tensión y refleja el uso bíblico sin reducirlo a una mera visita social.
  doctrine_reference: HALOT, פָּקַד; contexto de pacto y cumplimiento en Gn 21:1
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió ‘visited’ frente a ‘attended to’ para פָּקַד. En español se optó por ‘visitó’ para conservar esa misma decisión lexical y la ambigüedad útil del verbo en contexto, mientras se mantiene el paralelismo con ‘como había hablado’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con la norma del proyecto para יְהוָה.
  - Se emplea ‘Sara’ con la forma española establecida, no ‘Sarah’.
  - Se mantiene la distinción entre ‘dijo’/‘habló’ del hebreo con ‘había dicho’ / ‘había hablado’.
  - La nota a pie conserva la alternativa lexical documentada sin diluir el sentido principal del texto.
