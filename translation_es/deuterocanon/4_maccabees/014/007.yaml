revisions:
- from: ¡Oh santísima semana de hermanos en armonía[a], porque, así como en la creación del mundo los días están ligados a la piedad[b],
  to: ¡Oh santísimo grupo de siete[a] hermanos en armonía, porque, así como en la creación del mundo los días tienen que ver con la piedad[b],
  rationale: Se corrige el error principal de sentido reemplazando «semana» por «grupo de siete», que refleja el valor colectivo de ἑβδομάς en contexto. También se corrige la nota errónea que decía «seis» y se mejora la naturalidad de περὶ τὴν εὐσέβειαν con «tienen que ver con la piedad», manteniendo la comparación abierta del griego.
