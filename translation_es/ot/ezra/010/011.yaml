translation:
  language: es
  text: Ahora, pues, den alabanza[a] a Yahvé, el Dios de sus padres, y hagan su voluntad. Sepárense de los pueblos de la tierra y de las mujeres extranjeras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hagan confesión'. El giro hebreo 'dar gracias/alabanza' también puede llevar el sentido de confesión según el contexto.
    reason: alternative_reading
  - marker: b
    text: O 'las esposas extranjeras'. El contexto más amplio trata de matrimonios, aunque el hebreo aquí dice 'las mujeres extranjeras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנ֥וּ תוֹדָ֛ה
  english_pob_choice: give praise
  chosen_spanish: den alabanza
  alternatives_spanish:
  - den gracias
  - hagan confesión
  lexicon: HALOT
  rationale: El hebreo idiomático נתן תודה puede significar dar gracias, alabanza o confesión. El contexto inmediato en Esdras 10:11 pide una respuesta ante Dios que incluye reconocimiento y obediencia; por eso 'den alabanza' conserva la amplitud del giro y evita fijarlo solo en gratitud.
- source_word: לַ/יהוָ֥ה
  english_pob_choice: Yahweh / the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: WLC / convenio terminológico POB
  rationale: El texto hebreo nombra explícitamente a יהוה. Según la terminología del proyecto, se traduce como 'Yahvé' en el texto principal, sin sustituirlo por una máscara litúrgica.
- source_word: אֱלֹהֵֽי אֲבֹתֵי/כֶ֖ם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: '''Padres'' reproduce con fidelidad el lenguaje pactual y genealógico del hebreo. En español es natural y mantiene la relación histórica del pueblo con Dios.'
- source_word: רְצוֹנ֑/וֹ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - lo que le agrada
  - su deseo
  lexicon: HALOT
  rationale: רצון aquí expresa la voluntad divina que debe ser obedecida. 'Su voluntad' es la forma más directa y clara en español, preservando el valor moral del mandato.
- source_word: וְ/הִבָּֽדְלוּ֙
  english_pob_choice: Separate yourselves
  chosen_spanish: Sepárense
  alternatives_spanish:
  - Aléjense
  - Pónganse aparte
  lexicon: HALOT
  rationale: 'El nifal imperativo tiene fuerza reflexiva: la comunidad debe apartarse activamente. ''Sepárense'' comunica esa acción sin volverla innecesariamente explicativa.'
- source_word: מֵ/עַמֵּ֣י הָ/אָ֔רֶץ
  english_pob_choice: from the peoples of the land
  chosen_spanish: de los pueblos de la tierra
  alternatives_spanish:
  - de la gente de la tierra
  - de los pueblos del país
  lexicon: HALOT
  rationale: El plural עמי indica varios pueblos, no un singular colectivo. 'La tierra' mantiene la expresión hebrea sin resolverla de antemano como una referencia técnica o geográfica más específica.
- source_word: הַ/נָּשִׁ֖ים הַ/נָּכְרִיּֽוֹת
  english_pob_choice: the foreign women
  chosen_spanish: las mujeres extranjeras
  alternatives_spanish:
  - las esposas extranjeras
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las mujeres extranjeras', no 'esposas'. Como el contexto amplio trata de matrimonios, se conserva la precisión del texto base en el cuerpo principal y se deja abierta la lectura contextual.
theological_decisions:
- issue: Si תּוֹדָה debe leerse principalmente como alabanza, gratitud o confesión
  english_pob_reading: give praise; note that the Hebrew idiom can also mean make confession
  chosen_spanish_reading: den alabanza
  alternative_spanish_readings:
  - den gracias
  - hagan confesión
  rationale: La construcción hebrea admite varias matizaciones. En este versículo, la respuesta pedida a la comunidad incluye reconocimiento ante Dios y disposición a obedecer; por eso 'alabanza' funciona bien como lectura principal, sin eliminar que el giro pueda implicar confesión.
  doctrine_reference: Translation philosophy §3 (preservar la tensión interpretativa cuando el hebreo la permite)
- issue: Si 'las mujeres extranjeras' debe ajustarse a 'esposas extranjeras'
  english_pob_reading: foreign women; footnote notes the broader context concerns marriages
  chosen_spanish_reading: las mujeres extranjeras
  alternative_spanish_readings:
  - las esposas extranjeras
  rationale: El verso hebreo usa el sustantivo general 'mujeres'. Aunque el contexto de Esdras 10 trata de matrimonios, el texto aquí no añade 'esposas'. Mantener 'mujeres extranjeras' respeta la forma exacta del versículo y conserva la observación contextual en la nota de traducción.
  doctrine_reference: Principio POB de fidelidad textual con notas contextuales
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió 'give praise' sobre 'give thanks' para reflejar mejor el matiz idiomático de תודה en este contexto. La versión española adopta 'den alabanza' como equivalente principal, manteniendo abierta la posibilidad de confesión mediante nota.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' conforme al estándar terminológico del proyecto.
  - Se usó 'mujeres extranjeras' en el texto principal para respetar el hebreo, no 'esposas extranjeras'.
  - El tono es imperativo y comunitario, acorde con la exhortación de Esdras 10:11.
