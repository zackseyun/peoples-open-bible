translation:
  language: ko
  text: 그러므로 한 범죄를 통해 모든 사람에게 정죄가 이른 것 같이, 그렇게 한 의로운 행위를 통해 모든 사람에게 생명을 가져오는 의롭다 하심이 이르렀습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δι’ ἑνὸς παραπτώματος
  english_pob_choice: through one trespass
  chosen_korean: 한 범죄를 통해
  lexicon: BDAG
  rationale: 아담의 단일 행위. 5:12-21 정형구 유지.
- source_word: εἰς πάντας ἀνθρώπους
  english_pob_choice: to all people
  chosen_korean: 모든 사람에게
  lexicon: BDAG
