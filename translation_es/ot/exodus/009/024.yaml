translation:
  language: es
  text: Hubo granizo[a] y fuego que fulguraba dentro del granizo, muy severo, como nunca lo había habido en toda la tierra de Egipto desde que llegó a ser nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y fuego fulguraba en medio del granizo»; el hebreo usa el término literal «fuego», probablemente describiendo destellos semejantes a relámpagos dentro de la tormenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: El fenómeno meteorológico es el del granizo; ‘granizo’ es el equivalente natural y claro en español bíblico contemporáneo.
- source_word: וְאֵשׁ
  english_pob_choice: and fire
  chosen_spanish: y fuego
  alternatives_spanish:
  - y relámpagos
  - y fuego ardiente
  lexicon: HALOT
  rationale: Se mantiene ‘fuego’ porque el hebreo dice literalmente ‘fuego’; no se sustituye por ‘relámpagos’ en el texto principal para no borrar la imagen verbal.
- source_word: מִתְלַקַּחַת
  english_pob_choice: flashing
  chosen_spanish: que se encendía
  alternatives_spanish:
  - que fulguraba
  - que centelleaba
  - que iba y venía
  lexicon: HALOT
  rationale: El participio hitpael en este contexto describe un movimiento/actividad del fuego dentro del granizo. ‘Que se encendía’ conserva la idea de fuego activo sin forzar un término técnico que no está en el hebreo.
- source_word: בְּתוֹךְ הַבָּרָד
  english_pob_choice: within the hail
  chosen_spanish: dentro del granizo
  alternatives_spanish:
  - en medio del granizo
  - en el centro del granizo
  lexicon: HALOT
  rationale: ‘Dentro de’ reproduce bien בְּתוֹךְ y mantiene la imagen sorprendente de fuego en el interior del granizo.
- source_word: כָּבֵד מְאֹד
  english_pob_choice: very severe
  chosen_spanish: muy pesado
  alternatives_spanish:
  - muy severo
  - muy intenso
  - muy grave
  lexicon: HALOT
  rationale: Se conserva el valor básico de ‘pesado’ de כָּבֵד, que aquí funciona para la intensidad de la tormenta. ‘Muy pesado’ es fiel al léxico aunque menos idiomático que ‘muy severo’.
- source_word: אֲשֶׁר לֹא הָיָה כָמֹהוּ
  english_pob_choice: such as had never been
  chosen_spanish: tal como nunca lo había habido
  alternatives_spanish:
  - algo semejante que nunca había habido
  - como no lo había habido
  lexicon: HALOT
  rationale: La frase compara con un precedente inexistente; ‘tal como nunca lo había habido’ conserva la negación absoluta y el carácter superlativo sin perder fluidez.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: in all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: ‘Tierra de Egipto’ es la forma bíblica natural en español y preserva el alcance territorial de la expresión.
- source_word: מֵאָז הָיְתָה לְגוֹי
  english_pob_choice: since it became a nation
  chosen_spanish: desde que llegó a ser nación
  alternatives_spanish:
  - desde que se hizo nación
  - desde que fue nación
  - desde que llegó a ser un pueblo
  lexicon: HALOT
  rationale: Se mantiene la referencia histórica al momento en que Egipto pasó a existir como nación. ‘Llegó a ser nación’ reproduce bien la idea de transición del hebreo.
theological_decisions:
- issue: Valor del término literal ‘fuego’ en medio de la tormenta
  english_pob_reading: The Hebrew uses the literal term 'fire,' likely describing lightning-like flashes within the storm.
  chosen_spanish_reading: Se conserva ‘fuego’ en el texto principal, con nota que explica la posible apariencia de relámpagos.
  alternative_spanish_readings:
  - relámpagos
  - descargas de fuego
  rationale: El hebreo dice אֵשׁ (‘fuego’). Para no neutralizar la imagen original, el texto principal mantiene el término literal; la nota aclara que probablemente describe destellos semejantes a relámpagos.
  doctrine_reference: Éxodo 9:24; fidelidad léxica al texto hebreo
- issue: Comparativo de intensidad de la plaga
  english_pob_reading: very severe—such as had never been in all the land of Egypt since it became a nation.
  chosen_spanish_reading: muy pesado; tal como nunca lo había habido en toda la tierra de Egipto desde que llegó a ser nación.
  alternative_spanish_readings:
  - muy severo
  - extremadamente grave
  rationale: ‘Pesado’ conserva la raíz hebrea כבד y permite mantener el enlace con la descripción material de la tormenta. La frase resultante suena bíblica y no oculta el matiz de intensidad extrema.
  doctrine_reference: Éxodo 9:24; semántica de כבד
- issue: Historia nacional de Egipto
  english_pob_reading: since it became a nation
  chosen_spanish_reading: desde que llegó a ser nación
  alternative_spanish_readings:
  - desde que se convirtió en nación
  - desde que vino a ser nación
  rationale: La referencia es al inicio de Egipto como entidad nacional. ‘Llegó a ser nación’ comunica esa transición histórica de forma clara y sin añadir interpretación.
  doctrine_reference: Éxodo 9:24; marco histórico del texto
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la auditoría inglesa: se conservó el valor literal de ‘fuego’ y se tradujo el participio con una expresión española natural que no borra la imagen. No hubo revisiones aplicadas en el contexto inglés, y la versión española sigue esa lectura estable.'
  spanish_consistency_notes:
  - Se mantiene ‘tierra de Egipto’ para la fórmula territorial bíblica.
  - Se evita ‘SEÑOR’ u otra sustitución no pertinente, ya que el versículo no contiene el nombre divino.
  - ‘Nación’ se usa en singular para reflejar לְגוֹי sin desplazar el sentido histórico de constitución nacional.
  - La puntuación con punto y coma ayuda a reproducir la pausa enfática del hebreo y del inglés auditado.
