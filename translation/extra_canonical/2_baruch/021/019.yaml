revisions:
- timestamp: '2026-04-28T06:42:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/021/019.job-75816.json
