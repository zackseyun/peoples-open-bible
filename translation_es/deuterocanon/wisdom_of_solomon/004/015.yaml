revisions:
- from: Porque gracia y misericordia están sobre sus escogidos[a], y visitación sobre sus santos.
  to: Porque la gracia y la misericordia reposan sobre sus escogidos[a], y la visitación sobre sus consagrados.
  rationale: Se mantiene la estructura y el léxico central del original y del POB inglés, pero se mejora la naturalidad española con «reposan sobre». Se conserva «visitación» con su nota por ser una decisión lexical documentada. Se cambia «santos» por «consagrados» para reflejar mejor ὁσίοις sin las resonancias eclesiásticas que la auditoría inglesa procuró evitar. La nota sigue anclada en «escogidos[a]» porque así venía en el registro suministrado y no se introduce una nueva nota no documentada.
