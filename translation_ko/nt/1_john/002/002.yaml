id: 1JN.2.2
reference: 1 John 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτὸς ἱλασμός ἐστιν περὶ τῶν ἁμαρτιῶν ἡμῶν, οὐ περὶ τῶν ἡμετέρων δὲ μόνον ἀλλὰ καὶ περὶ ὅλου τοῦ κόσμου.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/002.yaml
  text: And he himself is the atoning sacrifice for our sins[a], and not for ours only but also for the whole world.
  footnotes:
  - marker: a
    text: Or 'propitiation'; also understood by some as 'expiation.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 그분 자신이 우리 죄들에 대한 화목제물[a]이시니, 우리의 죄들뿐만 아니라 온 세상의 죄들에 대한 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἱλασμός는 진노를 가라앉히고 관계를 회복시키는 희생을 가리킨다(또한 4:10). 같은 ἱλαστ- 어근의 ἱλαστήριον(로마서 3:25)은 「속죄소」로 옮겨졌으나, 본 절은 인격이 아닌 행위·희생의 측면이 부각되므로 「화목제물」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱλασμός
  english_pob_choice: atoning sacrifice
  chosen_korean: 화목제물
  alternatives_korean:
  - 속죄제물
  - 화해의 제물
  lexicon: BDAG
  rationale: ἱλασμός는 진노를 가라앉히는(propitiatory) 측면과 관계를 회복시키는(expiatory) 측면을 모두 담는다. 한국 교회 전통의 「화목제물」은 두 측면을 균형 있게 담아내며, 1 요한 2:2와 4:10 모두에 일관되게 적용된다. 로마서 3:25의 ἱλαστήριον은 속죄소(장소·인격)를 가리키므로 다르게 옮긴다.
- source_word: ὅλου τοῦ κόσμου
  english_pob_choice: the whole world
  chosen_korean: 온 세상
  alternatives_korean:
  - 전 세계
  - 세상 전체
  lexicon: BDAG
  rationale: 「온 세상」이 한국어 관용에서 자연스럽고, 그리스도의 희생의 우주적 충분성을 그대로 드러낸다.
theological_decisions:
- issue: ἱλασμός를 「화목제물」로 옮기는 결정
  chosen_reading: 화목제물
  alternative_readings:
  - 속죄제물
  - 유화제물
  rationale: ἱλασμός는 진노 진정(propitiation)과 죄 처리(expiation) 두 측면을 모두 담는 핵심어. 한국 교회 전통의 「화목제물」은 그리스도의 희생을 통해 하나님과 인간의 관계가 회복된다는 양면을 모두 담아내며, 같은 어근의 ἱλαστήριον(롬 3:25 「속죄소」)과는 다른 측면(인격이 아닌 희생 행위)을 강조하므로 의도적으로 구별한다.
  doctrine_reference: DOCTRINE.md §5 — preserve atonement language
