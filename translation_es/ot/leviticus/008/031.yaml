translation:
  language: es
  text: 'Y Moisés dijo a Aarón y a sus hijos: «Hiervan la carne[a] a la entrada de la tienda de reunión, y allí la comerán, y el pan que está en la cesta de la ordenación[b], tal como mandé, diciendo: “Aarón y sus hijos lo comerán”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Carne» traduce aquí el hebreo בָשָׂר en sentido sacrificial; en español suena más natural y preciso que una opción más literal como «flesh» en inglés.
    reason: lexical_alternative
  - marker: b
    text: O «la cesta de la consagración». El hebreo מִלֻּאִים se refiere a las ofrendas o al rito asociado con la instalación sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  english_pob_choice: And Moses said
  chosen_spanish: Y Moisés dijo
  alternatives_spanish:
  - Entonces Moisés dijo
  - Y dijo Moisés
  lexicon: WLC / contexto narrativo
  rationale: Se conserva la secuencia narrativa simple del hebreo con verbo principal en pasado. «Y» reproduce la coordinación inicial sin sobrecargar el estilo.
- source_word: בַּשְּׁלוּ
  english_pob_choice: Boil
  chosen_spanish: Hiervan
  alternatives_spanish:
  - Cocinen
  - Cuezan
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo pide una cocción específica; «hiervan» es la forma más directa y natural en español para ese sentido ritual.
- source_word: הַבָּשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne sacrificada
  - el animal
  lexicon: HALOT
  rationale: «בשר» en este contexto designa la parte comestible del sacrificio. En español, «carne» comunica mejor el registro ritual sin sonar forzado; «flesh» en inglés se reflejó como «flesh» por cercanía léxica, pero en español «carne» es el equivalente idiomático fiel.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: «פּתח» se traduce naturalmente como «entrada»; «tienda de reunión» conserva el término cultual sin sustituirlo por una expresión interpretativa.
- source_word: וְשָׁם תֹּאכְלוּ אֹתוֹ
  english_pob_choice: and there eat it
  chosen_spanish: y allí la comerán
  alternatives_spanish:
  - y allí lo comerán
  - y allí comerán de ello
  lexicon: HALOT
  rationale: Se mantiene el énfasis locativo con «allí». El pronombre femenino «la» concuerda con «la carne», integrando el referente implícito del hebreo.
- source_word: וְאֶת הַלֶּחֶם
  english_pob_choice: and the bread
  chosen_spanish: junto con el pan
  alternatives_spanish:
  - y el pan
  - y también el pan
  lexicon: HALOT
  rationale: Aunque el hebreo coordina directamente, en español «junto con» fluye con naturalidad para expresar que también se comerá el pan del rito, sin añadir contenido nuevo.
- source_word: בְּסַל הַמִּלֻּאִים
  english_pob_choice: in the basket of ordination
  chosen_spanish: que está en la cesta de la investidura[b]
  alternatives_spanish:
  - que está en la cesta de la ordenación
  - que está en la cesta de la consagración
  lexicon: HALOT
  rationale: «מִלֻּאִים» en el contexto sacerdotal alude a la instalación/investidura ritual de Aarón y sus hijos. «Investidura» comunica el rito de instalación sin importar terminología eclesiástica posterior. «Cesta» es natural en español y mantiene el objeto físico.
- source_word: כַּאֲשֶׁר צִוֵּיתִי לֵאמֹר
  english_pob_choice: just as I commanded, saying
  chosen_spanish: tal como mandé, diciendo
  alternatives_spanish:
  - tal como ordené, diciendo
  - como mandé, diciendo
  lexicon: HALOT
  rationale: Se conserva la fórmula de mandato con valor formal. «Mandé» es natural y suficiente; «diciendo» mantiene la introducción de la cita reportada.
- source_word: אַהֲרֹן וּבָנָיו יֹאכְלוּהוּ
  english_pob_choice: Aaron and his sons shall eat it
  chosen_spanish: “Aarón y sus hijos la comerán”
  alternatives_spanish:
  - “Aarón y sus hijos deberán comerla”
  - “Aarón y sus hijos la comerán”
  lexicon: HALOT
  rationale: Se mantiene la cita directa del mandato final. El futuro simple en español expresa adecuadamente la obligación/instrucción del original sin añadir modalización excesiva.
theological_decisions:
- issue: Valor de מִלֻּאִים en el rito sacerdotal
  english_pob_reading: ordination / ordination offerings
  chosen_spanish_reading: investidura
  alternative_spanish_readings:
  - ordenación
  - consagración
  rationale: El término describe la instalación ritual de Aarón y sus hijos en el sacerdocio. «Investidura» transmite bien la idea de ser revestidos/instalados en un cargo, sin trasladar el texto a categorías litúrgicas posteriores. Se conserva la tensión entre «ordenación» y «consagración» como posibles equivalentes, pero «investidura» resulta más precisa y menos confesional en español.
  doctrine_reference: 'Éxodo/Levítico: rito de instalación sacerdotal; traducción cultual sin anacronismo eclesial'
- issue: Referencia cultual de la comida en el lugar santo
  english_pob_reading: eat it at the entrance of the tent of meeting
  chosen_spanish_reading: la comerán a la entrada de la tienda de reunión
  alternative_spanish_readings:
  - la comerán en la entrada de la tienda de reunión
  - la comerán junto a la entrada de la tienda de reunión
  rationale: El texto subraya la obediencia al lugar prescrito. La formulación elegida preserva la localización cultual sin suavizarla ni convertirla en una simple indicación logística.
  doctrine_reference: Levítico 8:31; santidad del lugar y obediencia ritual
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en la dirección de una correspondencia léxica más cercana y una sintaxis directa. En español, se ajusta la decisión de 'flesh' a 'carne' porque es el equivalente idiomático más fiel para el contexto sacrificial; también se mantiene una frase breve y reportada para reproducir la estructura del mandato citado. Se refleja el término técnico de מִלֻּאִים con una opción cultual clara y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «tienda de reunión» para אֹהֶל מוֹעֵד de forma consistente con el registro cultual.
  - Se conserva el referente femenino implícito de «carne» con pronombre femenino en español.
  - Se evita «siervo» u այլ terminología eclesiástica; «investidura» funciona como equivalente ritual neutral.
