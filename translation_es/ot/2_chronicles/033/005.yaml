translation:
  language: es
  text: Construyó altares para todo el ejército celestial en los dos atrios de la casa de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para toda la hueste de los cielos». La expresión hebrea se refiere al conjunto celestial venerado en la religión astral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Entonces edificó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada. «Edificó» comunica con naturalidad la acción de levantar altares y mantiene el valor narrativo sin forzar una traducción demasiado mecánica del waw.
- source_word: מִזְבְּחוֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altars de sacrificio
  - altares de culto
  lexicon: HALOT
  rationale: «Altares» es el equivalente directo y normal en español para מִזְבְּחוֹת. No se añade especificación porque el contexto ya muestra el uso idolátrico/astral.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: for all the host of heaven
  chosen_spanish: para todo el ejército de los cielos
  alternatives_spanish:
  - para todo el ejército celestial
  - para toda la hueste de los cielos
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica de un conjunto celestial venerado en culto astral. «Ejército» refleja bien צָבָא en este idiom. «De los cielos» mantiene el genitivo plural del hebreo y evita suavizar el matiz religioso.
- source_word: בִּשְׁתֵּי חַצְרוֹת
  english_pob_choice: in the two courts
  chosen_spanish: en los dos atrios
  alternatives_spanish:
  - en las dos cortes
  - en ambos atrios
  lexicon: HALOT
  rationale: En contexto del templo, חַצְרוֹת se expresa naturalmente como «atrios». «Los dos» conserva la referencia dual precisa; «ambos» sería posible, pero menos transparente respecto al número explícito del hebreo.
- source_word: בֵּית יְהוָה
  english_pob_choice: house of Yahweh
  chosen_spanish: casa de Yahvé
  alternatives_spanish:
  - casa de Yahweh
  - templo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé». «Casa» reproduce בית con fidelidad y evita sustituir por «templo», que interpreta correctamente el referente pero no es la forma literal del hebreo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la pauta del proyecto, se vierte como «Yahvé» para preservar el nombre de pacto y no ocultarlo tras una convención editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: צְבָא הַשָּׁמַיִם como entidad cultual/astral
  english_pob_reading: host of heaven
  chosen_spanish_reading: ejército de los cielos
  alternative_spanish_readings:
  - hueste de los cielos
  - ejército celestial
  rationale: La frase puede referirse al conjunto celestial venerado en religión astral. «Ejército de los cielos» conserva la fuerza idiomática y el posible sentido cultual sin neutralizarlo.
  doctrine_reference: Lexical note in English POB footnote a
translation_notes:
  revision_awareness: Coincide con el texto inglés POB auditado en sentido y estructura, pero adapta a un español natural y reverente. Se preserva la ambigüedad controlada de צְבָא הַשָּׁמַיִם mediante una nota alternativa, y se aplica la terminología del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - «Atrios» conserva el registro arquitectónico del templo en español bíblico sin recurrir a un calco rígido.
  - La nota [a] vincula explícitamente la alternativa léxica preservada en el POB inglés.
