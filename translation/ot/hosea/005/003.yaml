id: HOS.5.3
reference: Hosea 5:3
source:
  edition: WLC
  text: אֲנִי֙ יָדַ֣עְתִּי אֶפְרַ֔יִם וְ/יִשְׂרָאֵ֖ל לֹֽא נִכְחַ֣ד מִמֶּ֑/נִּי כִּ֤י עַתָּה֙ הִזְנֵ֣יתָ אֶפְרַ֔יִם נִטְמָ֖א יִשְׂרָאֵֽל־׃
translation:
  text: I know Ephraim[a], and Israel is not hidden from me; for now, Ephraim, you have played the prostitute[b]; Israel is defiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have played the prostitute.' The Hebrew uses prostitution imagery for covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Israel has become unclean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: Though morphologically perfect, in context it expresses God's settled, present knowledge of Ephraim rather than merely past cognition. Present English best conveys the force in a prophetic declaration.
- source_word: נִכְחַד מִמֶּנִּי
  chosen: is not hidden from me
  alternatives:
  - is not concealed from me
  - cannot be hidden from me
  lexicon: HALOT
  rationale: The Niphal of כחד here conveys being concealed or hidden. 'Is not hidden from me' is natural English and preserves the passive sense without overinterpreting modality.
- source_word: כִּי עַתָּה
  chosen: for now
  alternatives:
  - for indeed now
  - because now
  lexicon: HALOT
  rationale: כִּי introduces the explanation for the preceding statement, and עַתָּה marks the present state. 'For now' keeps the explanatory connection and temporal emphasis.
- source_word: הִזְנֵיתָ
  chosen: you have prostituted yourself
  alternatives:
  - you have played the prostitute
  - you have committed whoredom
  - you have been unfaithful
  lexicon: HALOT
  rationale: The Hiphil of זנה in Hosea carries the covenantal-adulterous metaphor of prostitution/whoredom. 'Prostituted yourself' preserves the sexual and covenantal force more clearly than the softened 'been unfaithful,' while remaining readable modern English.
- source_word: נִטְמָא
  chosen: is defiled
  alternatives:
  - has become unclean
  - is unclean
  lexicon: HALOT
  rationale: The Niphal of טמא denotes becoming defiled/unclean. 'Is defiled' communicates resultant impurity in idiomatic English and fits Hosea's moral-cultic register.
- source_word: אֶפְרַיִם / יִשְׂרָאֵל
  chosen: Ephraim / Israel
  lexicon: HALOT
  rationale: Both are retained as transliterated proper names. In Hosea they function closely, with Ephraim often representing the northern kingdom; preserving both names maintains the poetic parallelism and prophetic nuance.
