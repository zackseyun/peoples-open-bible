translation:
  language: es
  text: para que llegara a ser un reino bajo, sin exaltarse, sino guardando su alianza[a] para mantenerse firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tratado» para «alianza»; el término hebreo puede denotar un acuerdo político vinculante en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  english_pob_choice: so that it might become
  chosen_spanish: para que llegara a ser
  alternatives_spanish:
  - para que fuera
  - para convertirse en
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad; en español, «para que llegara a ser» comunica bien el propósito y el cambio de estado sin sonar demasiado mecánico. «Llegara a ser» preserva la idea de entrar en una nueva condición.
- source_word: מַמְלָכָה
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - reino-estado
  lexicon: HALOT
  rationale: «Reino» es el equivalente natural en español para מַמְלָכָה y mantiene el referente político del pasaje.
- source_word: שְׁפָלָה
  english_pob_choice: lowly
  chosen_spanish: bajo
  alternatives_spanish:
  - humilde
  - abatido
  - de condición baja
  lexicon: HALOT
  rationale: En español, «bajo» comunica la condición disminuida o rebajada del reino sin sugerir innecesariamente virtud moral. «Humilde» podría desplazar el matiz político hacia uno ético.
- source_word: לְבִלְתִּי הִתְנַשֵּׂא
  english_pob_choice: not lifting itself up
  chosen_spanish: sin elevarse a sí mismo
  alternatives_spanish:
  - sin exaltarse
  - sin levantarse en alto
  - sin ensalzarse
  lexicon: HALOT
  rationale: El hitpael señala autoexaltación. «Sin elevarse a sí mismo» conserva esa reflexividad y el sentido de no encumbrarse; es una formulación natural en español.
- source_word: לִשְׁמֹר
  english_pob_choice: keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - observando
  - cumpliendo
  - manteniendo
  lexicon: HALOT
  rationale: Aquí שׁמר rige «pacto» en el sentido de observar sus obligaciones. «Guardando» es fiel al verbo hebreo y funciona bien con el participio de finalidad.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  - su tratado
  lexicon: HALOT
  rationale: En este contexto político-vassálico, «pacto» evita cargar la expresión con resonancias exclusivamente teológicas que en español a veces tiene «pacto» menos que «covenant». Además, el audit trail inglés preservó la alternativa «treaty», lo que apoya una opción española que refleje el acuerdo vinculante entre potencias.
- source_word: לְעָמְדָהּ
  english_pob_choice: so as to stand
  chosen_spanish: para mantenerse
  alternatives_spanish:
  - para que permaneciera firme
  - para subsistir
  - para estar en pie
  lexicon: HALOT
  rationale: עָמַד conserva la imagen de estar en pie o mantenerse establecido. «Para mantenerse» transmite la idea de perdurar/estar firme de manera clara y breve en español.
theological_decisions:
- issue: ברית como término político-jurídico en vez de un sentido estrictamente teológico
  english_pob_reading: covenant; footnote preserves 'treaty' as contextual alternative
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - tratado
  rationale: El hebreo ברית puede designar tanto pacto como tratado. En este versículo la referencia inmediata es un acuerdo político de vasallaje; por eso «pacto» ofrece una solución suficientemente amplia y natural. Se mantiene la tensión semántica al no absolutizar un sentido exclusivamente religioso.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el texto fuente y con el audit trail inglés; no se documentan revisiones sustantivas. La solución española sigue de cerca las decisiones léxicas inglesas, ajustando el orden y la idiomaticidad al español sin perder la finalidad, la negación reflexiva y la imagen de permanencia.
  spanish_consistency_notes:
  - Se mantiene «reino» para מַמְלָכָה, en línea con el uso bíblico estándar.
  - Se preserva la reflexividad de הִתְנַשֵּׂא con una construcción española explícita («sin elevarse a sí mismo»).
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente.
  - Se usa «pacto» como equivalente principal de בְּרִית en este contexto político, dejando la alternativa «tratado» en nota.
