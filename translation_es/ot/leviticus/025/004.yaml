translation:
  language: es
  text: Pero en el séptimo año habrá para la tierra un sábado de completo reposo[a], un sábado para Yahvé. No sembrarás tu campo, y no podarás tu viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un sábado de solemne reposo’. La expresión hebrea intensifica la idea de cese total.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִת
  english_pob_choice: But in the seventh year
  chosen_spanish: Pero en el séptimo año
  alternatives_spanish:
  - Y en el séptimo año
  - En el séptimo año
  lexicon: HALOT
  rationale: El hebreo introduce contraste con el permiso implícito del v. 3; por eso ‘Pero’ comunica mejor el giro discursivo que un simple ‘Y’. 'En el séptimo año' conserva la referencia temporal sin añadir elementos no presentes.
- source_word: שַׁבַּת שַׁבָּתוֹן
  english_pob_choice: a sabbath of complete rest
  chosen_spanish: un sábado de completo reposo
  alternatives_spanish:
  - un sábado de solemne reposo
  - un sábado de reposo completo
  lexicon: HALOT
  rationale: La expresión intensifica la idea de cese total. ‘De completo reposo’ preserva esa intensificación en español natural. ‘Sábado’ mantiene el vínculo lexical con שׁבת, sin forzar el sentido a un nombre litúrgico fijo.
- source_word: יִהְיֶה לָאָרֶץ
  english_pob_choice: there shall be ... for the land
  chosen_spanish: habrá ... para la tierra
  alternatives_spanish:
  - será ... para la tierra
  - la tierra tendrá
  lexicon: HALOT
  rationale: ‘Habrá’ transmite bien la construcción existencial del hebreo y permite mantener ‘para la tierra’ como beneficiaria/ámbito del reposo. ‘Tierra’ conserva la referencia agrícola y territorial del texto.
- source_word: שַׁבָּת לַיהוָה
  english_pob_choice: a sabbath to Yahweh
  chosen_spanish: un sábado para Yahvé
  alternatives_spanish:
  - un sábado de Yahvé
  - un sábado a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ‘Yahvé’. La preposición ‘para’ expresa adecuadamente la dedicación del reposo a Dios, sin perder la fuerza cultual del hebreo.'
- source_word: שָׂדְךָ לֹא תִזְרָע
  english_pob_choice: You shall not sow your field
  chosen_spanish: No sembrarás tu campo
  alternatives_spanish:
  - No sembrarás el campo
  - No siembres tu campo
  lexicon: HALOT
  rationale: ‘Sembrar’ es el equivalente directo de זרע. El futuro prohibitivo en español bíblico/legal suele expresarse bien con futuro simple; ‘tu campo’ mantiene la segunda persona singular y el objeto poseído.
- source_word: וְכַרְמְךָ לֹא תִזְמֹר
  english_pob_choice: and you shall not prune your vineyard
  chosen_spanish: y no podarás tu viña
  alternatives_spanish:
  - y no podarás tu viñedo
  - y no la podarás
  lexicon: HALOT
  rationale: En contexto vitícola, תזמר significa podar. ‘Viña’ es una opción natural y bíblicamente comprensible para כֶּרֶם; ‘podarás’ evita una traducción más vaga como ‘cortar’ o ‘recortar’.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: a sabbath to Yahweh
  chosen_spanish_reading: un sábado para Yahvé
  alternative_spanish_readings:
  - un sábado para el SEÑOR
  - un sábado para Dios
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ‘Yahvé’. Esto preserva el nombre pactual del texto hebreo y evita la sustitución reverencial tradicional por una máscara tipográfica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requiere corrección sustantiva; la lectura revisada mantiene la equivalencia óptima con el hebreo y la decisión doctrinal sobre יהוה, trasladada al español del proyecto como Yahvé. No se detectan revisiones aplicadas que alteren el sentido del versículo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según la terminología española del proyecto, coherente con el nombre divino en el texto fuente.
  - ‘Sábado’ se usa como sustantivo lexical para שַׁבָּת, pero el contexto agrícola del año sabático evita una lectura exclusiva del día semanal.
  - ‘Reposo’ traduce el valor intensivo de שַׁבָּתוֹן sin introducir una paráfrasis doctrinal.
  - ‘Campo’ y ‘viña’ respetan el paralelismo agrícola del hebreo.
