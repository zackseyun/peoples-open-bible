translation:
  language: es
  text: Porque las olas[a] de muerte me envolvieron; los torrentes de perversidad[b] me aterraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rompientes». El hebreo también puede referirse a aguas que rompen con violencia.
    reason: lexical_alternative
  - marker: b
    text: O «los torrentes de Belial», si בְלִיַּעַל se entiende como nombre propio en lugar de un sustantivo común.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del contexto inmediato; «Porque» conserva bien la fuerza causal y es natural en español bíblico contemporáneo.
- source_word: אֲפָפֻנִי
  english_pob_choice: surrounded me
  chosen_spanish: me envolvieron
  alternatives_spanish:
  - me rodearon
  - me cercaron
  - me envolvieron
  lexicon: HALOT
  rationale: El verbo expresa quedar rodeado o cercado por completo. «Me envolvieron» comunica la idea de ser cercado por aguas amenazantes sin sonar rígido.
- source_word: מִשְׁבְּרֵי
  english_pob_choice: waves
  chosen_spanish: olas
  alternatives_spanish:
  - rompientes
  - olas
  - oleajes
  lexicon: HALOT
  rationale: El hebreo puede referirse a rompientes/olas. Dado el ajuste del POB inglés hacia «waves» por naturalidad, «olas» mantiene la imagen acuática violenta en español; «rompientes» sería más técnico pero menos fluido.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo; la imagen es la de aguas asociadas con la muerte.
- source_word: נַחֲלֵי
  english_pob_choice: torrents
  chosen_spanish: los torrentes
  alternatives_spanish:
  - los torrentes
  - los arroyos
  - las corrientes
  lexicon: HALOT
  rationale: En el paralelismo poético, el sentido de aguas que corren con fuerza es dominante. «Torrentes» conserva la fuerza amenazante mejor que «arroyos».
- source_word: בְלִיַּעַל
  english_pob_choice: worthlessness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad
  - indignidad
  - Belial
  - destrucción
  lexicon: HALOT
  rationale: El POB inglés opta por el sentido común de «worthlessness» frente al nombre propio. En español, «maldad» transmite la fuerza negativa y moral del término con mayor naturalidad que una abstracción como «inutilidad», sin convertirlo en nombre propio.
- source_word: יְבַעֲתֻנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterraron
  alternatives_spanish:
  - me aterraron
  - me atemorizaron
  - me espantaron
  lexicon: HALOT
  rationale: El verbo expresa un sobresalto o terror intenso. «Me aterraron» preserva esa intensidad y encaja con la imaginería de peligro inminente.
theological_decisions:
- issue: 'Cómo rendir בְלִיַּעַל: nombre propio o sustantivo común'
  english_pob_reading: Rendered as the common noun 'worthlessness' in the main text
  chosen_spanish_reading: 'Traducido como sustantivo común en sentido moral: «maldad»'
  alternative_spanish_readings:
  - Belial
  - destrucción
  - inutilidad
  - maldad
  rationale: En este verso la expresión funciona poéticamente junto a imágenes de aguas destructoras. Seguir el valor común evita importar un desarrollo demonológico posterior que no es necesario aquí. Se preserva así la tensión semántica sin convertir el término en nombre propio.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: El borrador inglés más reciente cambió «breakers» por «waves» para una lectura más natural; el español sigue esa decisión con «olas». También mantiene la opción no nominal para בְלִיַּעל, aunque adapta «worthlessness» con «maldad» para lograr un equivalente natural y auditable en español.
  spanish_consistency_notes:
  - 'Conservo el paralelismo acuático: «olas» / «torrentes».'
  - Evito «SEÑOR» u otras sustituciones no presentes en el texto.
  - Uso «maldad» para בְלִיַּעל como sustantivo común, no como nombre propio.
  - El marcador [a] está anclado en «olas» para la alternativa lexical del hebreo.
