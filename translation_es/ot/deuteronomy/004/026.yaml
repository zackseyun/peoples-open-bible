translation:
  language: es
  text: 'Hoy pongo[a] al cielo y a la tierra por testigos contra ustedes: ciertamente perecerán pronto de la tierra adonde ustedes cruzan el Jordán para tomarla en posesión. No prolongarán sus días sobre ella[b], porque ciertamente serán destruidos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomo al cielo y a la tierra por testigos contra ustedes hoy».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre ella no vivirán mucho tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִידֹתִי בָכֶם
  english_pob_choice: I call ... to witness against you
  chosen_spanish: llamo por testigos contra ustedes
  alternatives_spanish:
  - doy testimonio contra ustedes
  - tomo ... como testigos contra ustedes
  lexicon: HALOT
  rationale: 'El Hifil de עוּד tiene aquí sentido jurídico: convocar testigos o invocar testimonio. En español, «llamo por testigos contra ustedes» conserva esa fuerza legal y la dirección adversativa de בָכֶם sin volver el texto forzado.'
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma natural y breve en español contemporáneo, y preserva el énfasis temporal del hebreo.
- source_word: אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra como testigos
  lexicon: HALOT
  rationale: Aunque el hebreo usa plurales morfológicos, la fórmula pactal en español se expresa de manera natural como «el cielo y la tierra». Mantiene el paralelismo y la imagen de testigos sin introducir una glosa innecesaria en el texto principal.
- source_word: אָבֹד תֹּאבֵדוּן
  english_pob_choice: you will surely perish
  chosen_spanish: ciertamente perecerán
  alternatives_spanish:
  - perecerán seguramente
  - ciertamente desaparecerán
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente perecerán» conserva esa fuerza en español claro y sobrio.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  lexicon: HALOT
  rationale: «Pronto» comunica bien la proximidad temporal del juicio y suena más natural que un adverbio demasiado rígido.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - fuera de la tierra
  lexicon: HALOT
  rationale: En español, «de la tierra» reproduce con naturalidad la idea de expulsión o remoción desde el territorio. «Tierra» funciona aquí como equivalente contextual de la tierra prometida.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים אֶת הַיַּרְדֵּן שָׁמָּה לְרִשְׁתָּהּ
  english_pob_choice: that you are crossing the Jordan to possess
  chosen_spanish: adonde ustedes cruzan el Jordán para tomarla en posesión
  alternatives_spanish:
  - que ustedes cruzan el Jordán para poseerla
  - adonde ustedes están cruzando el Jordán para poseerla
  lexicon: HALOT
  rationale: Se conserva el movimiento geográfico y la finalidad de la travesía. «Tomarla en posesión» refleja ירשׁ en contexto de herencia/posesión territorial con un español claro y fiel.
- source_word: לֹא תַאֲרִיכֻן יָמִים עָלֶיהָ
  english_pob_choice: You will not prolong your days on it
  chosen_spanish: No prolongarán sus días sobre ella
  alternatives_spanish:
  - No vivirán mucho sobre ella
  - No alargarán sus días sobre ella
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «prolongar días», que es más literal y expresiva que una simplificación como «vivirán poco tiempo». «Sobre ella» refleja עָלֶיהָ de forma directa.
- source_word: הִשָּׁמֵד תִּשָּׁמֵדוּן
  english_pob_choice: you will surely be destroyed
  chosen_spanish: ciertamente serán destruidos
  alternatives_spanish:
  - serán destruidos por completo
  - serán totalmente destruidos
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito vuelve a marcar la certeza e intensidad del juicio. «Serán destruidos» es fiel y sobrio; el adverbio «ciertamente» preserva la énfasis.
theological_decisions:
- issue: Fórmula de testigos del pacto con cielo y tierra
  english_pob_reading: Rendered as a legal summons of creation as witnesses against Israel
  chosen_spanish_reading: Se traduce como una convocatoria jurídica de la creación como testigos contra Israel
  alternative_spanish_readings:
  - Se traduce más libremente como una advertencia solemne por medio del cielo y la tierra
  - Se entiende simplemente como una fórmula enfática
  rationale: El hebreo pertenece al lenguaje de litigio pactal. La traducción española mantiene esa fuerza forense sin neutralizarla ni convertirla en mera exhortación general.
  doctrine_reference: Deuteronomio 4:26; filosofía de traducción POB §1, §5
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la fórmula idiomática de «as witnesses» a «to witness» para sonar más natural sin cambiar el sentido. La presente redacción española sigue esa misma prioridad: mantener la fuerza jurídica del hebreo con una expresión natural en español. También conserva la imagen de «prolongar los días» y el paralelismo intensivo del doble verbo de destrucción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma regular en POB cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Cielo y tierra» se mantiene como fórmula fija del testimonio del pacto.
  - «Tomar en posesión» traduce la idea territorial de ירשׁ sin sustituirla por una paráfrasis doctrinal.
  - Se evita «SEÑOR» como máscara editorial y se conserva la referencia directa al lenguaje bíblico.
  - El registro es solemne pero contemporáneo, apto para lectura pública.
