  to: Atribuyan[a] fuerza a Dios; su majestad está sobre Israel, y su fuerza está en los cielos altos[b].
  rationale: Se conserva la traducción principal del imperativo idiomático con 'Atribuyan'. Se corrige la nota b para que no repita el texto principal y se ajusta בַּשְּׁחָקִים a 'en los cielos altos', que suena natural en español, refleja mejor la imaginería poética del hebreo y deja espacio para alternativas reales en la nota.
