translation:
  language: es
  text: 'Porque Yahvé había dicho de ellos: «Sin duda morirán[a] en el desierto», y no quedó de ellos un solo hombre[b], excepto Caleb hijo de Jefone y Josué hijo de Nun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «morir, morirán», una forma enfática que significa «sin duda morirán».'
    reason: lexical_alternative
  - marker: b
    text: O «no quedó nadie de ellos»; hebreo literalmente, «no quedó de ellos un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un título sustitutivo. En español bíblico moderno, «Yahvé» comunica el Tetragrama con claridad y mantiene la coherencia del proyecto POB.
- source_word: אָמַר
  english_pob_choice: had said
  chosen_spanish: había dicho
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la declaración divina antecede al resultado que se explica en el verso.
- source_word: לָהֶם
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a ellos
  - con respecto a ellos
  lexicon: HALOT
  rationale: La preposición hebrea introduce el grupo sobre el cual recae el dicho. «De ellos» suena natural en español y conserva la referencia al mismo grupo.
- source_word: מוֹת יָמֻתוּ
  english_pob_choice: They shall surely die
  chosen_spanish: Sin duda morirán
  alternatives_spanish:
  - Morirán ciertamente
  - Morirán sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo; en español, «Sin duda» transmite bien la certeza/enfasis sin sonar forzado. Se evita perder la fuerza enfática del hebreo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la estepa
  lexicon: HALOT
  rationale: «Desierto» es el equivalente más natural en español para el contexto del éxodo y el desierto de Israel; mantiene la referencia geográfica y narrativa.
- source_word: וְלֹא נוֹתַר מֵהֶם אִישׁ
  english_pob_choice: and not a man was left of them
  chosen_spanish: y no quedó de ellos un solo hombre
  alternatives_spanish:
  - y no quedó nadie de ellos
  - y no permaneció de ellos un hombre
  lexicon: HALOT
  rationale: Se conserva la fuerza distributiva del hebreo y la imagen de totalidad. «Un solo hombre» hace explícita la negación absoluta sin alejarse del original.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - un hombre
  - nadie
  lexicon: HALOT
  rationale: Aunque el sentido total es genérico, el hebreo usa אִישׁ. «Un solo hombre» preserva el sustantivo y la idea de que no quedó ni un individuo.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - menos
  lexicon: HALOT
  rationale: La locución introduce la excepción única al enunciado negativo; «excepto» es la forma más clara y estándar en español.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  english_pob_choice: Caleb son of Jephunneh
  chosen_spanish: Caleb hijo de Jefone
  alternatives_spanish:
  - Caleb, hijo de Jefone
  - Caleb ben Jefone
  lexicon: HALOT
  rationale: Se translitera el nombre propio con forma española habitual («Jefone»), y se traduce la relación patronímica con «hijo de».
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: and Joshua son of Nun
  chosen_spanish: y Josué hijo de Nun
  alternatives_spanish:
  - y Yehoshúa hijo de Nun
  - y Josué, hijo de Nun
  lexicon: HALOT
  rationale: Se usa la forma española establecida «Josué», adecuada para lectura eclesial; «hijo de Nun» traduce con naturalidad la construcción hebrea.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama de forma directa. Se evita la sustitución por un título y se mantiene el nombre del pacto en la forma española habitual del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Intensificación verbal de מוֹת יָמֻתוּ
  english_pob_reading: They shall surely die
  chosen_spanish_reading: Sin duda morirán
  alternative_spanish_readings:
  - Morirán ciertamente
  - Morirán sin falta
  rationale: El hebreo usa infinitivo absoluto + verbo finito para énfasis. La traducción española debe conservar esa certeza enfática sin imponer una estructura extraña al lector.
  doctrine_reference: Uso enfático del infinitivo absoluto en hebreo bíblico
translation_notes:
  revision_awareness: El audit trail inglés mantiene una pequeña revisión de estilo en la frase equivalente a «no quedó de ellos», pasando de una formulación más literal a otra más idiomática. La versión española adopta desde el inicio la opción más natural en español sin perder el valor literal del hebreo. También se refleja la decisión doctrinal de usar el nombre divino «Yahvé» en lugar de una sustitución como «SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «desierto» para בַּמִּדְבָּר por claridad y consistencia narrativa en el Pentateuco.
  - Se conserva la genealogía con «hijo de» y nombres propios en formas españolas reconocibles.
  - La negación total se expresa con una construcción natural en español, sin debilitar el hebreo distributivo.
