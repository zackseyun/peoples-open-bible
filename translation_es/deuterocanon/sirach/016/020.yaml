translation:
  language: es
  text: Incluso a mí no me prestará atención[a], y ¿quién considerará mis caminos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Contextualmente, el sujeto implícito es Yahvé, aunque el hebreo no lo expresa: literalmente, «no pondrá corazón en mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: גַּם aquí intensifica o añade enfáticamente la queja. «Aun» conserva esa fuerza mejor que un simple «también» y evita una sobreexplicación.
- source_word: עָלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: HALOT
  rationale: Con el giro idiomático de prestar atención, el complemento natural en español es «a mí». Mantiene la relación directa del hebreo sin volverlo torpe.
- source_word: לֹא יָשִׂים לֵב
  english_pob_choice: will not pay attention
  chosen_spanish: no me prestará atención
  alternatives_spanish:
  - no pondrá su corazón en mí
  - no tomará en cuenta a mí
  - no fijará su corazón en mí
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «no pondrá corazón». En español, «prestar atención» comunica bien el sentido de atención/consideración sin perder la tensión idiomática. Se evita «poner el corazón» como calco poco natural.
- source_word: וּבִדְרָכַי
  english_pob_choice: and my ways
  chosen_spanish: y mis caminos
  alternatives_spanish:
  - y en mis caminos
  - y acerca de mis caminos
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora bíblica de conducta o proceder, paralela al hebreo y al griego ὁδοὺς.
- source_word: מִי יִתְבּוֹנָן
  english_pob_choice: who will consider
  chosen_spanish: ¿quién considerará?
  alternatives_spanish:
  - ¿quién reflexionará?
  - ¿quién se fijará en?
  - ¿quién entenderá?
  lexicon: HALOT
  rationale: יִתְבּוֹנָן expresa contemplación atenta, reflexión o comprensión. «Considerará» es amplio y solemne, y preserva el paralelo retórico con el griego ἐνθυμηθήσεται.
theological_decisions:
- issue: Sujeto implícito del acto de no prestar atención
  english_pob_reading: The verse keeps the singular subject implicit in Hebrew while the context points to the Lord.
  chosen_spanish_reading: El versículo deja implícito el sujeto de «no me prestará atención», aunque el contexto apunta al Señor.
  alternative_spanish_readings:
  - Dios no me prestará atención
  - nadie me prestará atención
  rationale: 'Se conserva la tensión documental: el hebreo no nombra el sujeto, pero el contexto lo orienta hacia Yahvé. No se explicita en el texto principal para no resolver lo que la fuente deja implícito; la nota aclara la referencia contextual.'
  doctrine_reference: Preservar la tensión teológica antes que resolverla explícitamente.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al reflejar גַּם con un intensificador directo equivalente a «Even» y al mantener el resto de la cláusula breve, natural y fiel al paralelismo hebreo-griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» como designación contextual del sujeto implícito según la política del proyecto, sin introducirlo en el cuerpo principal.
  - «Caminos» conserva el sentido bíblico de conducta/proceder, no un sentido meramente espacial.
  - No se traduce mecánicamente desde el inglés; el español está ajustado al hebreo con apoyo del paralelo griego.
  - La puntuación con coma y punto y coma respeta el paralelismo de dos miembros de la pregunta retórica.
