base_translation:
  language: en
  yaml_path: translation/ot/amos/004/011.yaml
  text: I overthrew some among you as God overthrew Sodom and Gomorrah[a], and you became like a brand snatched from the burning; yet you did not return to me[c][b], declares Yahweh.
  footnotes:
