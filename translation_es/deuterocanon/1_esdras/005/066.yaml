base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/066.yaml
  text: For we also[a], like you, hear your Lord, and we have been sacrificing to him since the days of Asbakaphath king of the Assyrians[c][b], who brought us here.
  footnotes:
  - marker: a
    text: Asbakaphath is the Greek form here; the Hebrew parallel in Ezra 4:2 identifies this king as Esarhaddon.
    reason: alternative_reading
  - marker: b
    text: Or 'we will offer sacrifice to him.' The Greek verb refers specifically to sacrificial worship.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'brought us here' may imply forced relocation or resettlement under Assyrian rule.
    reason: cultural_note
