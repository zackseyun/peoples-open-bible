translation:
  language: es
  text: 'Entonces dije al rey[a]: «Si le parece bien al rey, y si tu siervo ha hallado favor delante de ti, que me envíes a Judá, a la ciudad de las sepulturas de mis padres[b], para que la reconstruya[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si le agrada al rey». El hebreo usa un modismo cortesano de aprobación real.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «a la ciudad de las sepulturas de mis padres».'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo dice simplemente «construir»; «reconstruya» hace explícito el contexto de una ciudad en ruinas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Luego dije
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces dije» conserva la secuencia con español natural y sobrio.
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: If it pleases the king
  chosen_spanish: Si le parece bien al rey
  alternatives_spanish:
  - Si agrada al rey
  - Si es bueno para el rey
  lexicon: HALOT
  rationale: Es un modismo cortesano de aprobación real. «Le parece bien» mantiene el sentido de deferencia sin sonar forzado.
- source_word: וְאִם יִיטַב עַבְדְּךָ לְפָנֶיךָ
  english_pob_choice: and if your servant has found favor before you
  chosen_spanish: y si tu siervo ha hallado favor delante de ti
  alternatives_spanish:
  - y si tu siervo es favorable ante ti
  - y si tu siervo te agrada
  lexicon: HALOT
  rationale: La expresión idiomática con ייטב + לפני comunica aceptación/favor. «Ha hallado favor delante de ti» reproduce la fórmula cortesana en español bíblico claro.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto de audiencia real, el término funciona como autodesignación humilde. «Siervo» conserva el registro reverente; «esclavo» sería demasiado fuerte para la fórmula cortesana española.
- source_word: תִּשְׁלָחֵנִי
  english_pob_choice: that you would send me
  chosen_spanish: que me envíes
  alternatives_spanish:
  - que me mandes
  - que me despaches
  lexicon: HALOT
  rationale: El hebreo expresa petición indirecta; «que me envíes» preserva esa forma de súplica mejor que un imperativo en español.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: El nombre geográfico se traduce convencionalmente como «Judá» en español bíblico, manteniendo la referencia territorial del hebreo.
- source_word: אֶל עִיר קִבְרוֹת אֲבֹתַי
  english_pob_choice: to the city of my fathers' graves
  chosen_spanish: a la ciudad de las tumbas de mis padres
  alternatives_spanish:
  - a la ciudad de los sepulcros de mis padres
  - a la ciudad donde están sepultados mis padres
  lexicon: HALOT
  rationale: La cadena constructa es literalmente «ciudad de las tumbas de mis padres». «Tumbas» es un equivalente directo y transparente; «padres» refleja el hebreo ancestros/padres.
- source_word: וְאֶבְנֶנָּה
  english_pob_choice: so that I may rebuild it
  chosen_spanish: para que la reconstruya
  alternatives_spanish:
  - para que la edifique
  - y la reconstruiré
  lexicon: HALOT
  rationale: El verbo base es «edificar/construir», pero el contexto requiere explicitar la reconstrucción de una ciudad en ruinas. «Reconstruya» mantiene la fuerza contextual sin salir del sentido del hebreo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: se mantuvo la petición indirecta («que me envíes») y el valor cortesano del modismo real, evitando un imperativo directo. También se preservó la explicitación contextual de «reconstruir» para el verbo base «construir».'
  spanish_consistency_notes:
  - Se usa «Judá» para el topónimo יְהוּדָה, conforme al uso bíblico estándar en español.
  - Se mantiene la fórmula reverente «tu siervo» para עַבְדְּךָ, por su función cortesana.
  - «Delante de ti» conserva el valor relacional de לְפָנֶיךָ.
  - Los corchetes de notas siguen el orden a, b, c y cada marca aparece en el texto base correspondiente.
