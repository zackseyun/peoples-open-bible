translation:
  language: es
  text: Este pueblo son descendientes de los caldeos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ λαὸς οὗτός
  english_pob_choice: These people
  chosen_spanish: Este pueblo
  alternatives_spanish:
  - Estas personas
  - Esta nación
  lexicon: BDAG
  rationale: El griego usa λαός como colectivo con demostrativo; en español, «este pueblo» conserva la referencia colectiva y la fuerza demostrativa de οὗτός de forma natural y digna. «Estas personas» suena más individualizante, y «esta nación» añade un matiz político que el contexto no exige.
- source_word: εἰσιν
  english_pob_choice: are
  chosen_spanish: es
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: Aunque el verbo griego es plural, el colectivo español «pueblo» suele concordar en singular en una frase nominal identificadora; así se mantiene naturalidad sin perder el sentido colectivo del original. «Son» también sería posible, pero «este pueblo es...» resulta más idiomático en español para una declaración definidora.
- source_word: ἀπόγονοι
  english_pob_choice: descendants
  chosen_spanish: descendiente
  alternatives_spanish:
  - descendientes
  - posteridad
  - linaje
  lexicon: BDAG
  rationale: El término griego designa a quienes proceden de antepasados; «descendiente» comunica esa relación genealógica de manera clara. Se eligió el singular colectivo en concordancia con «pueblo», aunque «descendientes» también sería una opción literal.
- source_word: Χαλδαίων
  english_pob_choice: the Chaldeans
  chosen_spanish: de los caldeos
  alternatives_spanish:
  - de los caldeos
  lexicon: BDAG
  rationale: El etnónimo se vierte de forma tradicional y clara como «caldeos», que corresponde al grupo étnico mencionado en el griego. Se mantiene el artículo genitivo español «de los» para expresar la relación de procedencia.
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa coinciden plenamente en el contenido básico: identificación genealógica del pueblo. No hay variantes textuales relevantes ni tensiones léxicas que requieran nota.'
  spanish_consistency_notes:
  - Se preserva el valor étnico/genealógico de Χαλδαίων como «caldeos».
  - Se optó por una concordancia española natural con «pueblo» en singular, aunque el griego usa plural verbal.
  - No se introducen términos confesionales ajenos al original.
