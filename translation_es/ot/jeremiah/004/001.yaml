translation:
  language: es
  text: Si vuelves[a], Israel, declara Yahvé, vuélvete a mí; y si quitas tus cosas detestables[b] de delante de mí, y no andes errante[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Si vuelves, Israel... volverás a mí», preservando de forma más formal la repetición del verbo hebreo.'
    reason: alternative_reading
  - marker: b
    text: «Cosas detestables» se refiere especialmente a objetos idolátricos abominables; alternativamente, «tus abominaciones» o, de forma más interpretativa, «tus ídolos».
    reason: lexical_alternative
  - marker: c
    text: 'O bien: «y no vaciles» o «y no te extravíes»; el verbo hebreo puede sugerir deambular, inestabilidad o vacilación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición explícita; «Si» conserva mejor esa fuerza condicional y el tono de llamado profético.
- source_word: תָּשׁוּב
  english_pob_choice: you return
  chosen_spanish: vuelves
  alternatives_spanish:
  - regresas
  - te vuelves
  - te arrepientes
  lexicon: HALOT
  rationale: שוב expresa volver/retornar. «Vuelves» mantiene la idea de retorno y suena natural en español; «te arrepientes» interpretaría más allá del verbo hebreo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: La posición vocativa del hebreo justifica una apelación directa. «Oh Israel» refleja ese tono profético sin añadir contenido.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de modo solemne y directo. Se conserva el nombre divino «Yahvé» según el criterio textual del proyecto, no el ocultamiento litúrgico.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición indica dirección relacional. «A mí» es el equivalente más natural y preciso en español.
- source_word: תָּשׁוּב
  english_pob_choice: you should return
  chosen_spanish: volverás
  alternatives_spanish:
  - deberías volver
  - has de volver
  - debes volver
  lexicon: HALOT
  rationale: La repetición de שוב en el hebreo crea énfasis retórico. «Volverás» conserva esa reiteración y permite reflejar el impulso exhortativo sin sonar forzado en español.
- source_word: תָּסִיר
  english_pob_choice: you remove
  chosen_spanish: apartaras
  alternatives_spanish:
  - quitas
  - remueves
  - eliminas
  lexicon: HALOT
  rationale: El hiphil de סור/סיר implica quitar o apartar. Se usa «apartar» para expresar la acción de remover objetos cultuales, con un matiz idiomático claro.
- source_word: שִׁקּוּצֶיךָ
  english_pob_choice: your detestable things
  chosen_spanish: tus cosas detestables
  alternatives_spanish:
  - tus abominaciones
  - tus ídolos
  lexicon: HALOT
  rationale: El término denota objetos o prácticas cultualmente abominables, especialmente idolátricos. «Cosas detestables» conserva la carga lexical sin estrechar prematuramente el sentido a «ídolos».
- source_word: מִפָּנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de ante mí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial y relacional. «De delante de mí» preserva la imagen de presencia divina ante la cual se colocan esos objetos.
- source_word: וְלֹא תָנוּד
  english_pob_choice: and do not wander about
  chosen_spanish: y no andarás errante
  alternatives_spanish:
  - y no vacilarás
  - y no te extraviarás
  - y no estarás inestable
  lexicon: HALOT
  rationale: נוד puede sugerir deambular, vacilar o tambalearse. «Andar errante» comunica la inestabilidad y el extravío implícitos en el contexto de arrepentimiento, sin reducirlo a una sola imagen demasiado técnica.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El criterio del proyecto pide conservar el nombre divino como «Yahvé», manteniendo la visibilidad del nombre pactual en la traducción española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the repeated שוב clauses
  english_pob_reading: 'conditional-exhortational: ''If you return ... to me you should return'''
  chosen_spanish_reading: 'condicional-exhortativa: ''Si vuelves ... a mí volverás'''
  alternative_spanish_readings:
  - '''Si vuelves ... entonces vuelve a mí'''
  - '''Si vuelves ... a mí regresarás'''
  rationale: El hebreo repite שוב para subrayar la apelación profética. La versión española conserva la repetición mediante formas de volver/volverás, sin borrar el énfasis ni convertirlo en una simple paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense over translation tradition; document significant variance'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; se mantuvo la estructura de llamada profética, la repetición de שוב y la decisión léxica sobre שִׁקּוּצֶיךָ y תָנֽוּד con ajustes mínimos de naturalidad española.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de acuerdo con la terminología base del proyecto.
  - Se mantuvo el paralelismo verbal de volver/volverás para reflejar la repetición hebrea.
  - «Cosas detestables» evita una reducción interpretativa prematura a «ídolos», pero admite esa alternativa en nota.
  - «De delante de mí» reproduce la relación espacial/personal del hebreo.
  - «Andar errante» recoge la posible idea de vagar, vacilar o desviarse sin forzar una sola lectura.
