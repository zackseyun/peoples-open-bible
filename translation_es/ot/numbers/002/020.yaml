translation:
  language: es
  text: Y junto a él estaba la tribu de Manasés[a], y el líder de los hijos de Manasés era Gamaliel, hijo de Pedasur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘al lado de él estaba la tribu de Manasés’. La expresión preposicional hebrea indica colocación adyacente en la formación del campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָיו
  english_pob_choice: And next to him was
  chosen_spanish: Y junto a él estaba
  alternatives_spanish:
  - Y al lado de él estaba
  - Y al costado de él estaba
  lexicon: HALOT
  rationale: En el contexto de la disposición del campamento, עַל con sufijo pronominal expresa ubicación adyacente, no autoridad. ‘Junto a él’ comunica esa cercanía espacial con naturalidad en español y evita una traducción engañosamente literal como ‘sobre él’.
- source_word: מַטֶּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  - clan
  lexicon: HALOT
  rationale: En contextos de censo y organización campamental, מַטֶּה designa una unidad tribal. ‘Tribu’ es la equivalencia precisa y normal en español.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: convención onomástica bíblica
  rationale: Nombre propio bíblico adaptado a la forma usual en español bíblico, no traducido.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el jefe
  alternatives_spanish:
  - y el líder
  - y el príncipe
  - y el caudillo
  lexicon: HALOT
  rationale: נָשִׂיא aquí denota al cabeza designado de la tribu. ‘Jefe’ conserva el valor oficial y suena natural en español sin cargar un matiz monárquico que ‘príncipe’ podría sugerir.
- source_word: לִבְנֵי מְנַשֶּׁה
  english_pob_choice: of the sons of Manasseh
  chosen_spanish: de los hijos de Manasés
  alternatives_spanish:
  - de los descendientes de Manasés
  - para los hijos de Manasés
  lexicon: HALOT
  rationale: Se conserva ‘hijos’ porque el hebreo usa explícitamente בנים. En español, en una fórmula genealógica y representativa, ‘hijos de Manasés’ es claro y fiel; ‘descendientes’ suavizaría la forma del original.
- source_word: גַּמְלִיאֵל
  english_pob_choice: Gamaliel
  chosen_spanish: Gamaliel
  alternatives_spanish:
  - Gamaliel
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado de manera estándar.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se expresa de forma natural como ‘hijo de’ en español bíblico.
- source_word: פְּדָהצֽוּר
  english_pob_choice: Pedahzur
  chosen_spanish: Pedasur
  alternatives_spanish:
  - Pedahzur
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado según la forma española establecida para este personaje.
translation_notes:
  revision_awareness: El texto inglés auditable no requirió cambios de revisión; se conservó la lectura espacial de וְעָלָיו y la estructura nominal del versículo sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene ‘Manasés’ para el nombre tribal en todo el registro.
  - Se conserva la fórmula ‘hijo de’ para el patronímico.
  - Se usa ‘tribu’ para מַטֶּה en coherencia con otros pasajes de Números.
  - La nota al pie refleja la alternativa espacial documentada por el POB inglés.
