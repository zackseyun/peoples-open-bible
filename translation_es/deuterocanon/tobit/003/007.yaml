translation:
  language: es
  text: Ese mismo día también le sucedió a Sara[a], hija de Ragüel, en Ecbátana de Media, que fue reprochada por las esclavas de su padre,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue insultada» o «fue injuriada»; el verbo griego expresa reproche público o abuso verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῇ αὐτῇ ἡμέρᾳ
  english_pob_choice: On that same day
  chosen_spanish: En aquel mismo día
  alternatives_spanish:
  - En ese mismo día
  - En el mismo día
  lexicon: LSJ
  rationale: Conserva la fuerza demostrativa de αὐτῇ y el enlace narrativo, con un español natural y solemne.
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  lexicon: LSJ
  rationale: ‘Sucedió’ mantiene el sentido impersonal narrativo sin sonar arcaico en español.
- source_word: τῇ θυγατρὶ Ῥαγουὴλ Σάρρᾳ
  english_pob_choice: to Sarah, the daughter of Raguel
  chosen_spanish: a Sara, hija de Ragüel
  alternatives_spanish:
  - a Sara, la hija de Ragüel
  - a la hija de Ragüel, Sara
  lexicon: LSJ
  rationale: Reordena para el español manteniendo el nombre y la filiación. Se usa ‘Sara’ como forma española del nombre.
- source_word: ἐν Ἐκβατάνοις τῆς Μηδείας
  english_pob_choice: in Ecbatana of Media
  chosen_spanish: en Ecbátana de Media
  alternatives_spanish:
  - en Ecbátana, en Media
  - en Ecbátana de los medos
  lexicon: LSJ
  rationale: Preserva el topónimo y la designación regional de forma directa y legible.
- source_word: ὀνειδισθῆναι
  english_pob_choice: was reproached
  chosen_spanish: fue reprochada
  alternatives_spanish:
  - fue insultada
  - fue escarnecida
  - fue vituperada
  lexicon: LSJ
  rationale: ‘Reprochada’ refleja bien la idea de reprobación/verbal abuse sin reducirla solo a burla. Mantiene la tensión léxica que el inglés POB anotó con alternativas.
- source_word: ὑπὸ παιδισκῶν πατρὸς αὐτῆς
  english_pob_choice: by her father's maidservants
  chosen_spanish: por las esclavas de su padre
  alternatives_spanish:
  - por las siervas de su padre
  - por las criadas de su padre
  - por las muchachas esclavas de su padre
  lexicon: LSJ
  rationale: ‘παιδίσκη’ tiene fuerza de servidumbre/esclavitud femenina; ‘esclavas’ conserva mejor esa carga que ‘siervas’ o ‘criadas’. Se mantiene explícita la relación posesiva con el padre.
translation_notes:
  revision_awareness: El texto griego y el aparato auditado coinciden en alta confianza con la traducción inglesa revisada; en español se siguió la misma organización sintáctica general, reflejando también el valor aditivo de καὶ con ‘también’. Se preservó la referencia a Sara y a las esclavas de su padre sin suavizar la tensión semántica de ὀνειδισθῆναι.
  spanish_consistency_notes:
  - Se mantuvo ‘Sara’ y ‘Ragüel’ en grafía española estándar, con ‘Ecbátana’ para el topónimo.
  - Se eligió ‘esclavas’ para reflejar el valor léxico de παιδίσκη, en coherencia con la preferencia POB por conservar fuerza social del término.
  - La nota al pie refleja la misma tensión semántica que el audit trail inglés marcó para ὀνειδισθῆναι.
