  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: poner el incienso sobre el fuego delante de Yahvé, producir la nube del incienso, cubrir el propiciatorio y así evitar la muerte. También respeta la decisión del proyecto de usar «Yahvé». Sin embargo, la cláusula final «y así no morirá» debilita ligeramente la relación final/protectora de וְלֹא יָמוּת, que en contexto legal-ritual se expresa mejor como propósito/prevención explícita.'
  spanish_quality_summary: El texto es claro y bastante natural. «Propiciatorio» es una buena elección bíblica en español. No obstante, la nota [b] es inadecuada para español porque ofrece «mercy seat» en inglés como alternativa, en vez de una alternativa española pertinente. Además, «para que no muera» suena más directo y fiel que «y así no morirá».
  glossary_alignment: 'Buena alineación general: יְהוָה -> «Yahvé» conforme al proyecto; הַקְּטֹרֶת -> «incienso»; הַכַּפֹּרֶת -> «propiciatorio», que en español es una equivalencia tradicional y comprensible. Se mantiene «Testimonio», aceptable en contexto tabernacular. La única corrección necesaria es adaptar la nota léxica a español y afinar la cláusula final.'
  issues:
  - severity: medium
    issue: La nota léxica [b] da una alternativa en inglés («mercy seat») en lugar de una alternativa española.
    rationale: Las notas del texto español deben servir al lector hispanohablante. Si se conserva una alternativa, debe presentarse en español, por ejemplo «asiento de misericordia», o bien explicarse solo el sentido técnico del término.
  - severity: low
    issue: «y así no morirá» es algo menos preciso que «para que no muera».
    rationale: El hebreo final expresa la finalidad o consecuencia protectora del rito; «para que no muera» comunica mejor esa relación en español contemporáneo y sigue más de cerca el valor contextual documentado en el POB.
  revised_spanish_text: Y pondrá el incienso sobre el fuego delante de Yahvé[a], de modo que la nube del incienso cubra el propiciatorio[b] que está sobre el Testimonio, para que no muera.
  revised_footnotes:
