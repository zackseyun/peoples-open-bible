translation:
  language: es
  text: Y los sacerdotes y los levitas se purificaron[a], y purificaron al pueblo, las puertas y el muro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se limpiaron ... limpiaron al pueblo, las puertas y el muro». El hebreo emplea la misma raíz para ambas acciones, primero en forma reflexiva y luego en forma transitiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽטַּהֲר֔וּ
  english_pob_choice: purified themselves
  chosen_spanish: se purificaron
  alternatives_spanish:
  - se limpiaron
  - se hicieron limpios
  lexicon: HALOT
  rationale: El verbo en forma reflexiva expresa que los sacerdotes y los levitas realizaron una purificación ritual sobre sí mismos antes de purificar a otros. En español, «se purificaron» conserva mejor ese sentido cultual que un calco más general como «se limpiaron».
- source_word: הַכֹּהֲנִ֖ים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente natural y directo en español para כֹּהֲנִים en contexto cultual. «Presbíteros» introduciría una terminología eclesiástica ajena al hebreo del pasaje.
- source_word: וְהַלְוִיִּ֑ם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levíticos
  lexicon: HALOT
  rationale: «Levitas» es la forma tradicional y precisa en español para el grupo tribal/ministerial designado por לְוִיִּם. Mantiene el referente bíblico sin explicarlo en exceso.
- source_word: וַֽיְטַהֲרוּ֙
  english_pob_choice: they purified
  chosen_spanish: purificaron
  alternatives_spanish:
  - limpiaron
  - hicieron puros
  lexicon: HALOT
  rationale: La forma transitiva conserva la acción ritual ejercida sobre el pueblo y los elementos del recinto. «Purificaron» reproduce mejor el paralelismo con el verbo reflexivo anterior que «limpiaron».
- source_word: הָעָ֔ם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la asamblea
  lexicon: HALOT
  rationale: «Pueblo» es la traducción más directa y sobria para עָם. El objeto directo animado requiere la preposición «a» en español.
- source_word: הַשְּׁעָרִ֖ים
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas de la ciudad
  - los portones
  lexicon: HALOT
  rationale: En este contexto de muralla urbana, «puertas» es una traducción idiomática y suficientemente precisa de שְּׁעָרִים. «Portones» suena más pesado y menos natural.
- source_word: הַחוֹמָֽה
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - la pared
  lexicon: HALOT
  rationale: «Muro» conserva la referencia concreta a la fortificación reconstruida y evita que «pared» suene doméstico. «Muralla» también sería viable, pero «muro» sigue más de cerca la forma breve del hebreo.
theological_decisions:
- issue: Naturaleza de la purificación
  english_pob_reading: ritual purification
  chosen_spanish_reading: purificación ritual
  alternative_spanish_readings:
  - limpieza ceremonial
  - purificación ceremonial general
  rationale: En este contexto de dedicación del templo y sus instalaciones, טהר se refiere a una purificación cultual, no a una limpieza física ni a una purificación moral. La versión española mantiene «purificaron» sin añadir explicaciones que el texto no exige, pero el registro de decisión aclara el valor ritual.
  doctrine_reference: Levítico 11–15; Números 8:5–22; Esdras 6:20
translation_notes:
  revision_awareness: El texto inglés auditado no fue modificado en la revisión más reciente; el consenso de revisión indicó alta concordancia y no requirió cambios. La propuesta española sigue esa línea estable, preservando la distinción verbal reflexiva/transitiva observada en el hebreo.
  spanish_consistency_notes:
  - Se mantiene el uso de «Yahvé» para el nombre divino según la guía del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se preserva la terminología cultual con «purificar» en vez de sustituirla por un verbo más general como «limpiar» en el cuerpo principal.
  - «Muro» traduce la fortificación de Jerusalén de manera sobria; «muralla» queda como alternativa posible si se privilegia mayor explicitación.
