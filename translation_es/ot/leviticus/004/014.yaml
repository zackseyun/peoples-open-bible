review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del hebreo: el pecado llega a conocerse, la asamblea ofrece el animal, y lo lleva ante la tienda de reunión. También preserva bien la distinción contextual de חַטָּאת como ''pecado'' y luego como término sacrificial, con nota adecuada. Sin embargo, ''un hijo del ganado'' suena demasiado calcado y poco natural en español, y ''llevará'' para וְהֵבִיאוּ puede sugerir alejar en vez de traer/presentar al lugar sagrado.'
  spanish_quality_summary: 'El español es claro en casi todo el versículo, pero tiene dos puntos mejorables de legibilidad y naturalidad cultual: ''un hijo del ganado'' no es idiomático en español bíblico legible, y ''lo llevará delante de'' es menos natural que ''lo traerá ante''. ''Cuando ... llegue a ser conocido'' es aceptable, aunque algo pesado; puede simplificarse a ''cuando ... se llegue a conocer'' o mantenerse. La revisión propuesta conserva dignidad y cercanía al hebreo sin sonar rígida.'
  glossary_alignment: 'Alineación general buena: ''asamblea'' para קהל y ''tienda de reunión'' para אֹהֶל מוֹעֵד encajan bien con el proyecto. La nota sobre חַטָּאת está bien planteada. No hay conflicto con terminología mayor del glosario. La principal excepción es que la literalidad de בן־בקר debe moderarse para un español natural: ''un toro del ganado'' conserva el referente mejor que ''un hijo del ganado''.'
  issues:
  - severity: medium
    issue: '''un hijo del ganado'' es un calco poco natural de פַּר בֶּן בָּקָר'
    rationale: Aunque intenta reflejar cada elemento del hebreo y sigue la revisión inglesa más literal, en español esta expresión no es idiomática y distrae del sentido. 'Un toro del ganado' o 'un toro, de la vacada' preserva suficientemente la relación con el rebaño sin crear extrañeza innecesaria.
  - severity: low
    issue: '''lo llevará delante de la tienda de reunión'' suena menos preciso que ''lo traerá ante la tienda de reunión'''
    rationale: וְהֵבִיאוּ אֹתוֹ indica traer al lugar sagrado. En español cultual, 'traer' comunica mejor el movimiento hacia el santuario; 'delante de' es comprensible, pero 'ante' suena más natural con esta construcción.
  revised_spanish_text: y cuando el pecado que cometieron llegue a ser conocido[a], la asamblea ofrecerá un toro del ganado como sacrificio por el pecado, y lo traerá ante la tienda de reunión.
  revised_footnotes:
  - marker: a
    text: 'El hebreo חַטָּאת (ḥaṭṭa''t) aparece dos veces en este versículo: primero con el sentido de ''pecado'' y luego con el de ''sacrificio por el pecado''.'
    reason: lexical_alternative
  revision_rationale: Se ajustó una literalidad excesiva ('un hijo del ganado') a un español natural y fiel ('un toro del ganado'), y se mejoró el verbo/dirección cultual con 'lo traerá ante' para reflejar mejor וְהֵבִיאוּ אֹתוֹ לִפְנֵי. Se mantuvo la nota léxica sobre el doble sentido de חַטָּאת.
