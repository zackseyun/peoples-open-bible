translation:
  language: es
  text: Estas eran sus funciones asignadas para su servicio, para entrar en la casa de Yahvé conforme a su ordenanza[a], bajo la mano de Aarón su padre, tal como Yahvé, el Dios de Israel, le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “según su orden prescrito”. El hebreo puede denotar una ordenanza, una regla o un procedimiento establecido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדָּתָם
  english_pob_choice: their appointed duties
  chosen_spanish: sus funciones asignadas
  alternatives_spanish:
  - su orden
  - sus deberes asignados
  - su asignación
  lexicon: HALOT
  rationale: El sustantivo expresa una asignación o cargo ordenado; en este contexto sacerdotal, 'funciones asignadas' comunica tanto la designación formal como la tarea concreta sin reducirlo a un cargo fijo ni volverlo demasiado abstracto.
- source_word: לַעֲבֹדָתָם
  english_pob_choice: for their service
  chosen_spanish: para su servicio
  alternatives_spanish:
  - para su ministerio
  - para su labor
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual apunta al servicio sagrado. 'Servicio' preserva el sentido litúrgico con español natural y evita imponer terminología eclesiástica posterior.
- source_word: לָבוֹא
  english_pob_choice: to enter
  chosen_spanish: para entrar
  alternatives_spanish:
  - para venir a
  - para ingresar
  lexicon: HALOT
  rationale: El infinitivo de בוא aquí indica acceso al recinto sagrado. 'Entrar' es la forma española más natural y precisa, y en este verso no pierde el valor direccional del hebreo.
- source_word: לְבֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro bíblico 'casa de Yahvé' como equivalente directo de בית יהוה, en lugar de sustituirlo por 'templo', que es funcionalmente correcto pero menos pegado al hebreo.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their ordinance
  chosen_spanish: conforme a su orden
  alternatives_spanish:
  - según su ordenanza
  - según su prescripción
  - conforme a su reglamento
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a ordenanza, prescripción o procedimiento establecido. 'Conforme a su orden' mantiene la idea normativa y suena más natural en español; el matiz jurídico-prescriptivo queda implícito.
- source_word: בְּיַד אַהֲרֹן
  english_pob_choice: under the hand of Aaron
  chosen_spanish: bajo la mano de Aarón
  alternatives_spanish:
  - bajo la autoridad de Aarón
  - por la mano de Aarón
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea 'bajo la mano de' porque el texto auditado la mantiene como idiomática de administración/autoridad. En español es comprensible y conserva la tensión entre literalidad e idea de gobierno.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  lexicon: HALOT
  rationale: Aarón es el padre patriarcal/ancestral de la línea sacerdotal. 'Su padre' reproduce la forma hebrea y mantiene el vínculo genealógico sin necesidad de explicitar 'antepasado'.
- source_word: כַּאֲשֶׁר צִוָּהוּ
  english_pob_choice: as ... had commanded him
  chosen_spanish: tal como ... le había mandado
  alternatives_spanish:
  - como ... le había ordenado
  - tal como ... le había ordenado
  lexicon: HALOT
  rationale: La cláusula expresa conformidad con un mandato previo de Yahvé a Aarón. 'Mandado' conserva la fuerza imperativa del hebreo y armoniza con el registro bíblico sin caer en formulación arcaizante.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: Yahweh, the God of Israel
  chosen_spanish: Yahvé, el Dios de Israel
  alternatives_spanish:
  - Yahvé, Dios de Israel
  lexicon: HALOT
  rationale: Se usa el nombre divino 'Yahvé' según el criterio del proyecto, y la aposición 'el Dios de Israel' preserva la identidad covenantal del título hebreo. La coma ayuda a reflejar la secuencia nominal del original.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrámaton de forma directa. Siguiendo la norma del proyecto, se vierte como 'Yahvé' para preservar el nombre de pacto revelado, en lugar de ocultarlo bajo una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of בְּיַד אַהֲרֹן in priestly administration
  english_pob_reading: under the hand of Aaron
  chosen_spanish_reading: bajo la mano de Aarón
  alternative_spanish_readings:
  - bajo la autoridad de Aarón
  - por la mano de Aarón
  rationale: Se conserva el modismo hebreo porque comunica administración y autoridad sin perder el color del original. La frase puede leerse como gobierno delegado de Aarón sobre el orden sacerdotal.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con el ajuste auditado del inglés revisado, prefiriendo 'entrar' para לָבוֹא y manteniendo el matiz administrativo de 'bajo la mano de Aarón'. Se adoptó 'Yahvé' conforme al criterio doctrinal del proyecto, no la sustitución 'SEÑOR'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - '''Casa de Yahvé'' conserva el giro bíblico paralelo al inglés auditado.'
  - '''Bajo la mano de'' se conserva por coherencia con la decisión lexical y para no perder el modismo administrativo del hebreo.'
  - '''Funciones asignadas'' evita tanto ''oficio'' como ''ministerio'', que introducirían matices no exigidos por el verso.'
