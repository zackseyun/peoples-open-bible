translation:
  language: es
  text: 'Entonces salió al manantial[a] del agua, echó allí sal y dijo: «Así dice Yahvé: He sanado esta agua. Ya no saldrán de ella muerte ni aborto espontáneo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la fuente del agua» o «al origen del agua».
    reason: lexical_alternative
  - marker: b
    text: O «ni esterilidad» o «ni causa de aborto espontáneo»; el hebreo se refiere a pérdida de descendencia o infecundidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצָא
  english_pob_choice: source
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - origen
  - salida
  lexicon: HALOT
  rationale: En este contexto, el término designa el punto donde el agua brota. «Manantial» comunica bien la idea de una fuente de agua potable sin sonar técnico ni ambiguo para el lector español.
- source_word: הַמַּיִם
  english_pob_choice: the water
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El hebreo usa plural, y en español «las aguas» conserva mejor la forma del original que el singular genérico. Aquí además suena natural para un cuerpo o suministro de agua.
- source_word: מֶלַח
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal común
  lexicon: HALOT
  rationale: Equivalente directo y transparente. No hay motivo contextual para ampliar el término.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así ha dicho Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Así dice el Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de modo natural en español con un pretérito perfecto que mantiene el valor proclamativo. «Yahvé» sigue el estándar del proyecto para יְהוָה.
- source_word: רִפִּאתִי
  english_pob_choice: I have healed
  chosen_spanish: He sanado
  alternatives_spanish:
  - He curado
  - He restaurado
  lexicon: HALOT
  rationale: «Sanar» conserva la imagen de una intervención divina que hace saludable algo afectado. En español es más idiomático que un calco como «he curado» aplicado al agua, y mantiene la metáfora sin diluirla.
- source_word: לַמַּיִם הָאֵלֶּה
  english_pob_choice: this water
  chosen_spanish: estas aguas
  alternatives_spanish:
  - esta agua
  lexicon: HALOT
  rationale: Se mantiene la proximidad demostrativa del hebreo. El plural español concuerda con el sustantivo plural hebreo y preserva el matiz del texto.
- source_word: לֹא יִהְיֶה מִשָּׁם עוֹד
  english_pob_choice: No longer will there come from it
  chosen_spanish: De aquí en adelante no habrá en ellas
  alternatives_spanish:
  - Ya no habrá en ellas
  - No volverá a haber en ellas
  lexicon: HALOT
  rationale: La construcción española expresa con naturalidad la idea de cese futuro. Se evita forzar un giro demasiado literal, pero se conserva que el mal deja de proceder de esas aguas.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Equivalente directo. El texto habla de muerte sin especificar el mecanismo, así que no conviene restringirlo más.
- source_word: מְשַׁכָּלֶת
  english_pob_choice: miscarriage
  chosen_spanish: esterilidad
  alternatives_spanish:
  - aborto espontáneo
  - miscarriage
  - pérdida de hijos
  lexicon: HALOT
  rationale: El término hebreo apunta a pérdida de descendencia o a una condición que impide producirla. En español, «esterilidad» comunica bien el efecto global del agua dañina y evita introducir una sola lectura demasiado estrecha. La alternativa concreta de «aborto espontáneo» se deja implícita en nota porque el hebreo puede abarcar más que ese único evento.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrammatón directamente, y la política del proyecto pide transliterarlo como nombre propio divino. «Yahvé» preserva esa decisión y evita la sustitución titular de «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la auditoría inglesa, manteniendo la fórmula profética, el nombre divino como Yahvé y el sentido amplio de מְשַׁכָּלֶת. No se detectaron revisiones posteriores que obliguen a cambios respecto del pase más reciente, cuyo estado fue sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se prefiere «muerte» sin especificar el mecanismo, en consonancia con el hebreo.
  - «Aguas» conserva el plural hebreo y evita homogeneizarlo innecesariamente a singular en un contexto poético/narrativo.
  - La nota sobre מְשַׁכָּלֶת preserva la tensión lexical entre pérdida de hijos, aborto espontáneo y esterilidad, en lugar de fijar una sola opción demasiado restrictiva.
