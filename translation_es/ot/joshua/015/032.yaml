translation:
  language: es
  text: 'y Lebaot[a], Silhim, Aín y Rimón: veintinueve ciudades en total, con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus aldeas»; también puede entenderse «sus poblados» o «sus asentamientos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבָאוֹת
  english_pob_choice: and Lebaoth
  chosen_spanish: y Lebaot
  alternatives_spanish:
  - y Lebaot
  lexicon: HALOT
  rationale: Nombre propio de lugar en una lista de ciudades; se translitera como topónimo. Conservo la conjunción inicial para reflejar la serie enumerativa del hebreo, igual que en la base inglesa.
- source_word: וְשִׁלְחִים
  english_pob_choice: Shilhim
  chosen_spanish: Silhim
  alternatives_spanish:
  - Shilhim
  lexicon: HALOT
  rationale: Topónimo propio. En español es natural adaptar la grafía inicial al sistema fonológico hispano, pero sin traducir el nombre.
- source_word: וְעַיִן
  english_pob_choice: Ain
  chosen_spanish: Aín
  alternatives_spanish:
  - Ain
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar, no del sustantivo común 'fuente' o 'ojo'. Se conserva como topónimo con acento para la pronunciación española.
- source_word: וְרִמּוֹן
  english_pob_choice: Rimmon
  chosen_spanish: Rimón
  alternatives_spanish:
  - Rimmon
  lexicon: HALOT
  rationale: Nombre propio de lugar en este contexto. Mantengo la forma toponímica y adapto la acentuación al español; no se toma aquí como el sustantivo 'granada'.
- source_word: כָּל עָרִים
  english_pob_choice: cities in all
  chosen_spanish: en total, veintinueve ciudades
  alternatives_spanish:
  - todas las ciudades
  - ciudades en total
  lexicon: HALOT
  rationale: La construcción hebrea resume el total de asentamientos enumerados. En español, 'en total' expresa con claridad la función sumativa de כָּל + número sin sonar forzado.
- source_word: עֶשְׂרִים וָתֵשַׁע
  english_pob_choice: twenty-nine
  chosen_spanish: veintinueve
  alternatives_spanish:
  - veinte y nueve
  lexicon: HALOT
  rationale: Número cardinal estándar en español. La forma compacta es la más natural y fiel al valor numérico del hebreo.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - con sus poblados
  - con sus asentamientos
  - con sus caseríos
  lexicon: HALOT
  rationale: חַצְרֵי en listas territoriales designa poblaciones dependientes o asociadas a la ciudad principal. 'Aldeas' comunica bien esa relación sin imponer una lectura demasiado técnica; respeta la nota inglesa de posibles equivalentes como 'settlements' o 'hamlets'.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden plenamente en el conteo y en la identificación de los topónimos; no se detectan revisiones textuales ni cambios de sentido en la tradición consultada.
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo del original: topónimos + total + dependencias.'
  - Se usa 'veintinueve' sin artículo para una lectura fluida en español bíblico moderno.
  - La nota al pie se ancla en 'aldeas' porque ahí aparece la principal alternativa léxica documentada.
