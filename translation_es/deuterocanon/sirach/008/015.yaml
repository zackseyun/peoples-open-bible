    rationale: La nota [a] ya explica la dificultad textual y el apoyo del griego. Añadir otra nota para justificar la elección española no aporta información esencial al lector final y recarga el versículo.
  revised_spanish_text: No te apartes ante un burlador,[a] para que no se ponga como uno que está al acecho delante de ti.
