revisions:
- from: Cuando muere[a] un hombre malvado, perece su esperanza, y la expectativa de riqueza[b] se desvanece.
  to: Cuando muere un hombre malvado, perece su esperanza, y la expectativa de riqueza[a] queda en nada.
  rationale: Se elimina la nota [a] porque estaba mal anclada y no era necesaria para la cláusula temporal. Se mantiene «riqueza» siguiendo la revisión auditada del POB inglés, pero se preserva la alternativa significativa en una sola nota correctamente anclada. Se cambia «se desvanece» por «queda en nada» para reflejar mejor אָבָדָה y la decisión inglesa documentada «comes to nothing», con mejor fuerza proverbial. No requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:25:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: cláusula temporal con בְּמוֹת, sujeto singular representativo אָדָם רָשָׁע, pérdida de la esperanza y segunda cola paralela con אָבְדָה. Sin embargo, el anclaje de la nota [a] sobre בְּמוֹת es inadecuado porque no presenta una alternativa real al texto español elegido; además, la segunda cola puede expresarse con una formulación más fiel a אבד que «se desvanece».'
  spanish_quality_summary: 'El español es claro y natural, con buen tono sapiencial. «Malvado» y «esperanza» funcionan bien. No obstante, «la expectativa de riqueza se desvanece» suena algo menos proverbial y menos contundente que una forma como «queda en nada», que además refleja mejor «comes to nothing» del rastro auditado. La nota [a] también suena confusa: «O, “muere”» no corresponde al contraste real.'
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas principales son aceptables: «un hombre» por אָדָם, «malvado» por רָשָׁע, «esperanza» por תִּקְוָה. La decisión auditada del POB inglés de entender אוֹנִים como «wealth» puede mantenerse como «riqueza», preservando en nota la alternativa «los fuertes» y la dificultad del hebreo.'
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada y no justifica un verdadero texto alternativo.
    rationale: El texto principal dice «Cuando muere», pero la nota dice «O, “muere”» y luego explica «al morir». Eso no presenta una alternativa coherente ni añade claridad. Si se conserva nota, debería indicar «O, “al morir”»; pero en este caso la nota no es necesaria.
  - severity: medium
    issue: «Se desvanece» suaviza la fuerza de אָבָדָה y se aleja del rastro auditado «comes to nothing».
    rationale: Aunque idiomática, la expresión puede sugerir un desvanecimiento gradual o emocional. El hebreo repite el campo semántico de אבד; una formulación como «queda en nada» o «perece» preserva mejor la ruina total de la expectativa.
  revised_spanish_text: Cuando muere un hombre malvado, perece su esperanza, y la expectativa de riqueza[a] queda en nada.
  revised_footnotes:
  - marker: a
    text: O, «la expectativa de los fuertes». El hebreo אוֹנִים es difícil y puede referirse a riqueza, fuerza o a los fuertes.
    reason: alternative_reading
  revision_rationale: Se elimina la nota [a] porque estaba mal anclada y no era necesaria para la cláusula temporal. Se mantiene «riqueza» siguiendo la revisión auditada del POB inglés, pero se preserva la alternativa significativa en una sola nota correctamente anclada. Se cambia «se desvanece» por «queda en nada» para reflejar mejor אָבָדָה y la decisión inglesa documentada «comes to nothing», con mejor fuerza proverbial. No requiere adjudicación adicional.
