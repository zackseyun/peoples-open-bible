    rationale: La alternativa inglesa documentada es 'Hazargaddah' como una sola palabra; en español la alternativa equivalente natural es 'Hazargada' o mantener una sola palabra coherente, no una forma camel-case ajena a la ortografía española.
  - severity: low
    issue: La forma principal 'Hazar-Gadda' puede mejorarse a 'Hazar-gada'.
    rationale: En español, dentro de un topónimo compuesto transliterado, la segunda parte no necesita mayúscula interna. Además, simplificar la geminación final acerca la forma a una adaptación española más natural sin perder referencia. Es un ajuste estilístico menor, no una cuestión doctrinal.
