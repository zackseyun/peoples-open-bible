translation:
  language: es
  text: Así, el Dios de Israel movió el espíritu de Pul, rey de Asiria[a], incluso el espíritu de Tilgat-pilneser, rey de Asiria[b], y deportó a los rubenitas, a los gaditas y a la media tribu de Manasés, y los llevó a Halah, Habor, Hara y el río Gozán, hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu de Pul, rey de Asiria, y el espíritu de Tilgat-pilneser, rey de Asiria», tomando los dos nombres como gobernantes separados y no como dos nombres del mismo rey.'
    reason: alternative_reading
  - marker: b
    text: «Tilgat-pilneser» refleja aquí la forma hebrea; la forma más conocida en español es «Tiglat-pileser».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַר
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - avivó
  - movió
  lexicon: HALOT
  rationale: El verbo transmite el acto divino de poner en movimiento una disposición interna. 'Despertó' comunica bien la activación sin cargar el texto con una connotación negativa que 'incitó' podría sugerir en español.
- source_word: ר֣וּחַ ... ר֨וּחַ
  english_pob_choice: the spirit of ... the spirit of
  chosen_spanish: el espíritu de ... y el espíritu de
  alternatives_spanish:
  - la disposición de ... y la disposición de
  - la mente de ... y la mente de
  lexicon: HALOT
  rationale: '''Espíritu'' preserva el paralelismo hebreo y la fuerza teológica de que Dios mueve el impulso interno del gobernante. ''Disposición'' o ''mente'' explican el sentido, pero atenúan la textura bíblica del término.'
- source_word: פּוּל
  english_pob_choice: Pul
  chosen_spanish: Pul
  lexicon: Transliteración del nombre propio
  rationale: Se conserva el nombre propio según la forma del texto.
- source_word: תִּלְּגַת פִּלְנֶסֶר
  english_pob_choice: Tilgath-pilneser
  chosen_spanish: Tilgat-pilneser
  alternatives_spanish:
  - Tiglat-pileser
  - Tilgath-pilneser
  lexicon: Transliteración del nombre propio
  rationale: La forma hebrea de Crónicas se refleja mejor con una transliteración cercana al consonantismo hebreo. 'Tilgat-pilneser' es más natural en español que la grafía inglesa, y evita sustituirla por la forma más familiar cuando el texto fuente exhibe esta variante.
- source_word: וַיַּגְלֵם
  english_pob_choice: he took ... into exile
  chosen_spanish: deportó
  alternatives_spanish:
  - los llevó al exilio
  - los exilió
  lexicon: HALOT
  rationale: El causativo de גלה expresa sacar a un pueblo de su tierra y trasladarlo en condición de exiliado. 'Deportó' es conciso y preciso; 'los llevó al exilio' es una alternativa más explicativa, pero menos directa.
- source_word: לָראוּבֵנִי וְלַגָּדִי
  english_pob_choice: the Reubenites, the Gadites
  chosen_spanish: a los rubenitas, a los gaditas
  alternatives_spanish:
  - a los de Rubén, a los de Gad
  lexicon: HALOT
  rationale: Las formas gentilicias se expresan naturalmente como nombres de grupo tribal en español.
- source_word: וְלַחֲצִי שֵׁבֶט מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: a la media tribu de Manasés
  alternatives_spanish:
  - a la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' es la forma tradicional y clara en español para este medio-límite territorial de Manasés; conserva el valor histórico-administrativo del hebreo.'
- source_word: וַיְבִיאֵם
  english_pob_choice: and brought them
  chosen_spanish: y los llevó
  alternatives_spanish:
  - y los condujo
  - y los trajo
  lexicon: HALOT
  rationale: '''Llevó'' fluye bien en español junto con ''deportó'' y mantiene la secuencia narrativa del traslado forzoso.'
- source_word: לַחְלַח וְחָבוֹר וְהָרָא וּנְהַר גּוֹזָן
  english_pob_choice: to Halah, Habor, Hara, and the river Gozan
  chosen_spanish: a Halah, Habor, Hara y el río Gozán
  alternatives_spanish:
  - a Halah, Habor, Hara y el río de Gozán
  lexicon: HALOT
  rationale: Los topónimos se transliteran. 'Río Gozán' es la opción más natural en español y conserva la referencia geográfica sin añadir formulación innecesaria.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: '''Hasta hoy'' es una equivalencia natural y sobria del modismo hebreo, plenamente comprensible en español actual.'
theological_decisions:
- issue: Relación entre Pul y Tilgat-pilneser
  english_pob_reading: the spirit of Pul king of Assyria, even the spirit of Tilgath-pilneser king of Assyria
  chosen_spanish_reading: el espíritu de Pul, rey de Asiria[a], y el espíritu de Tilgat-pilneser, rey de Asiria
  alternative_spanish_readings:
  - el espíritu de Pul, rey de Asiria, es decir, el espíritu de Tilgat-pilneser, rey de Asiria
  - el espíritu de Pul, rey de Asiria, incluso el espíritu de Tilgat-pilneser, rey de Asiria
  rationale: El hebreo repite 'espíritu de' con ambos nombres, lo que permite leerlos como dos gobernantes o como dos designaciones del mismo rey. Se mantiene la repetición y se evita resolver la relación en el cuerpo del texto; la nota explica la alternativa.
  doctrine_reference: 'Principio POB: preservar la tensión histórica y sintáctica cuando el original no la resuelve explícitamente.'
translation_notes:
  revision_awareness: Se ajustó la redacción para anclar correctamente la nota [a] en el texto español y para evitar una paráfrasis que resolviera indebidamente la relación entre Pul y Tilgat-pilneser.
  spanish_consistency_notes:
  - Se usó 'Dios de Israel' en lugar de una máscara reverencial, conforme al texto hebreo.
  - '''Espíritu'' conserva la repetición del מקור hebreo y la posibilidad de leer dos referentes o un referente duplicado.'
  - Se prefirió 'deportó'/'los llevó' para reflejar el traslado forzoso sin suavizar el exilio.
  - Los nombres propios y topónimos se transliteran de manera consistente con la forma hebrea de Crónicas.
