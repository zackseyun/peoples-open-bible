translation:
  language: es
  text: Y el sacerdote que purifica[a] presentará[b] al hombre que está siendo purificado, junto con esas cosas, delante de Yahvé, a la entrada de la Tienda de Reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Purifica» traduce el participio hebreo desde la función ritual del sacerdote; no implica que el sacerdote produzca purificación moral por sí mismo.
    reason: lexical_alternative
  - marker: b
    text: '«Presentará» expresa el sentido ritual de וְהֶעֱמִיד: poner formalmente a alguien o algo delante de Yahvé para la acción ceremonial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱמִיד
  english_pob_choice: shall present
  chosen_spanish: hará que comparezca
  alternatives_spanish:
  - presentará
  - hará poner de pie
  - hará estar de pie
  lexicon: HALOT
  rationale: El Hifil de עמד expresa causar que alguien esté/permanezca de pie ante una autoridad o en un marco ritual. En español, 'hará que comparezca' conserva la idea formal de presentarlo ante Yahvé sin sonar tan mecánico como 'hará poner de pie'.
- source_word: הַכֹּהֵן הַמְטַהֵר
  english_pob_choice: the priest who cleanses
  chosen_spanish: el sacerdote que purifica
  alternatives_spanish:
  - el sacerdote que limpia
  - el sacerdote que realiza la purificación
  - el sacerdote purificador
  lexicon: HALOT
  rationale: El participio caracteriza al sacerdote por su función ritual. 'Purifica' mantiene la relación lexical con טהר y evita reducir el sentido a una mera declaración verbal; también conserva la cercanía al texto hebreo sin introducir una perífrasis innecesaria.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  lexicon: HALOT
  rationale: El hebreo usa explícitamente un masculino singular. Se conserva 'hombre' por fidelidad lexical y por la política de exactitud de género del proyecto.
- source_word: הַמִּטַּהֵר
  english_pob_choice: who is being cleansed
  chosen_spanish: que está siendo purificado
  alternatives_spanish:
  - que está siendo limpiado
  - que está en proceso de purificación
  lexicon: HALOT
  rationale: El Hitpael/passive-reflexive indica a quien está en proceso de purificación ritual. 'Purificado' mantiene el campo semántico de טהר mejor que 'limpiado' en este contexto ceremonial.
- source_word: וְאֹתָם
  english_pob_choice: along with those things
  chosen_spanish: junto con aquellas cosas
  alternatives_spanish:
  - y con ellas
  - junto con ellas
  lexicon: HALOT
  rationale: El pronombre remite a los objetos mencionados en el versículo anterior, no a personas adicionales. 'Aquellas cosas' explicita el referente para evitar ambigüedad en español sin ampliar el sentido.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como 'Yahvé'. 'Delante de' refleja la expresión cultual de comparecer ante Dios, con un tono natural y fiel.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la Tienda de Reunión
  alternatives_spanish:
  - en la entrada de la Tienda de Reunión
  - a la puerta de la Tienda de Reunión
  lexicon: HALOT
  rationale: '''Tienda de Reunión'' preserva el nombre tradicional del santuario portátil y ''entrada'' reproduce פֶּתַח de manera natural. Se evita ''puerta'' porque sería menos preciso para una tienda.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide no ocultarlo bajo una convención de sustitución. 'Yahvé' sigue el estándar del POB español para conservar el nombre del pacto con legibilidad reverente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor ritual de טהר en este contexto
  english_pob_reading: the priest who cleanses / who is being cleansed
  chosen_spanish_reading: el sacerdote que purifica / que está siendo purificado
  alternative_spanish_readings:
  - el sacerdote que limpia / que está siendo limpiado
  - el sacerdote que realiza la purificación / que está en purificación
  rationale: La escena es ceremonial, no moral. 'Purificar/purificado' conserva el registro ritual del hebreo y evita trasladar el pasaje a un lenguaje de limpieza meramente física o ética.
  doctrine_reference: Levítico 14 en su contexto de purificación ritual
- issue: Función de 'comparacer' ante Yahvé
  english_pob_reading: shall present ... before Yahweh
  chosen_spanish_reading: hará que comparezca ... delante de Yahvé
  alternative_spanish_readings:
  - presentará ... ante Yahvé
  - hará estar ... delante de Yahvé
  rationale: La fórmula expresa una presentación formal en presencia divina. 'Comparezca' mantiene la solemnidad cultual y evita una literalidad torpe en español.
  doctrine_reference: Lenguaje cultual de audiencia ante Dios
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que simplificó 'who performs the cleansing' a 'who cleanses' para mayor correspondencia léxica. La versión española sigue esa dirección con 'el sacerdote que purifica', manteniendo a la vez la claridad ritual y el nombre divino 'Yahvé' conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la terminología del proyecto en español.
  - '''Tienda de Reunión'' conserva el nombre técnico del אֹהֶל מוֹעֵד.'
  - Se evita 'SEÑOR' como sustitución del nombre divino.
  - '''Purificar/purificado'' preserva el campo semántico ritual de טהר sin moralizarlo.'
  - Se usa 'hombre' por fidelidad al masculino singular del hebreo.
