translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: «Ciertamente, en el fuego de mi celo he hablado contra el remanente de las naciones y contra todo Edom, que dieron mi tierra para sí como heredad, con alegría de todo corazón y con desprecio del alma, a fin de hacer de su pastizal[a] una presa»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su terreno abierto». El hebreo de la cláusula final es difícil y también puede entenderse en la línea de «hacer de su terreno abierto un botín» o «un despojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: 'En español conviene preservar ambos elementos del hebreo: אֲדֹנָי como «el Señor» y el nombre divino יְהוִה como «Yahvé», según la convención del proyecto. Se evita el reemplazo tradicional por «SEÑOR» para no ocultar el nombre divino.'
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - Seguro que
  lexicon: HALOT
  rationale: En este contexto profético, la expresión funciona como una afirmación enfática, no como condición literal. «Ciertamente» preserva ese valor asseverativo en español natural.
- source_word: בְּאֵשׁ קִנְאָתִי
  english_pob_choice: in the fire of my jealousy
  chosen_spanish: en el fuego de mi celos
  alternatives_spanish:
  - en el fuego de mi celo
  - con el fuego de mis celos
  lexicon: HALOT
  rationale: Se conserva la metáfora de «fuego». Para קִנְאָה se elige «celos» porque mantiene el matiz relacional y judicial del texto, aunque en español suene menos usual; se evita suavizarlo indebidamente con solo «celo». La construcción puede sonar marcada, pero refleja la tensión léxica del hebreo.
- source_word: דִבַּרְתִּי עַל
  english_pob_choice: I have spoken against
  chosen_spanish: he hablado contra
  alternatives_spanish:
  - hablé contra
  - he declarado contra
  lexicon: HALOT
  rationale: El perfecto profético se traslada con un presente perfecto español para conservar relevancia actual. עַל, en este contexto hostil, se vierte naturalmente como «contra».
- source_word: שְׁאֵרִית הַגּוֹיִם
  english_pob_choice: the remnant of the nations
  chosen_spanish: el remanente de las naciones
  alternatives_spanish:
  - el resto de las naciones
  - las naciones restantes
  lexicon: HALOT
  rationale: «Remanente» conserva la fuerza de שְׁאֵרִית sin imponer por defecto el sentido técnico-teológico de «remanente» piadoso; aquí se trata de los pueblos sobrevivientes/restantes.
- source_word: אֱדוֹם כֻּלָּהּ
  english_pob_choice: all Edom
  chosen_spanish: todo Edom
  alternatives_spanish:
  - Edom en su totalidad
  - Edom entero
  lexicon: HALOT
  rationale: Se mantiene la referencia colectiva amplia y natural. «Todo Edom» reproduce bien el valor de כֻּלָּהּ sin añadir explicación.
- source_word: נָתְנוּ אֶת אַרְצִי לָהֶם לְמוֹרָשָׁה
  english_pob_choice: gave my land to themselves as a possession
  chosen_spanish: dieron mi tierra para sí como heredad
  alternatives_spanish:
  - hicieron suya mi tierra como posesión
  - dieron mi tierra para sí como posesión
  lexicon: HALOT
  rationale: Se conserva el matiz reflexivo de לָהֶם con «para sí». «Heredad» permite mantener מוֹרָשָׁה con un término bíblico claro en español, sin forzar «posesión» cuando el contexto apunta a apropiación ilegítima.
- source_word: בְּשִׂמְחַת כָּל לֵבָב
  english_pob_choice: with wholehearted joy
  chosen_spanish: con alegría de todo corazón
  alternatives_spanish:
  - con gozo de todo corazón
  - con plena alegría de corazón
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de forma natural en español, conservando la totalidad interior señalada por כָּל לֵבָב.
- source_word: בִּשְׁאָט נֶפֶשׁ
  english_pob_choice: with contempt of soul
  chosen_spanish: con desprecio del alma
  alternatives_spanish:
  - con desprecio de alma
  - con desdén íntimo
  lexicon: HALOT
  rationale: Se mantiene la combinación semítica de desprecio + נפש mediante «alma». Aunque «alma» no siempre coincide exactamente con el uso moderno, aquí preserva el énfasis interior del hebreo.
- source_word: מִגְרָשָׁהּ
  english_pob_choice: its pastureland
  chosen_spanish: su territorio abierto
  alternatives_spanish:
  - su campo abierto
  - su pastizal
  - su zona de pastoreo
  lexicon: HALOT
  rationale: מִגְרָשׁ puede denotar terreno abierto, áreas periféricas o pastizales; en este contexto se opta por «territorio abierto» para preservar amplitud semántica sin concretar demasiado hacia «pastureland». Se añade un ancla para señalar que la clausula final es difícil y admite otras lecturas.
- source_word: לָבַז
  english_pob_choice: plunder
  chosen_spanish: presa
  alternatives_spanish:
  - botín
  - despojo
  lexicon: HALOT
  rationale: Se traduce de forma concisa para mantener la cualidad nominal de לָבַז en la cláusula final. «Presa» conserva la idea de algo expuesto al saqueo, aunque la construcción completa sigue siendo difícil en español como en hebreo.
theological_decisions:
- issue: Forma de renderizar el nombre divino יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La pauta del proyecto pide «Yahvé» en el texto principal para no ocultar el nombre divino. Se conserva además «Señor» por אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אִם לֹא en discurso profético
  english_pob_reading: Surely
  chosen_spanish_reading: Ciertamente
  alternative_spanish_readings:
  - En verdad
  - Sin duda
  rationale: No se trata de una condición real, sino de una fórmula enfática de juramento/proclamación. «Ciertamente» expresa mejor ese valor asseverativo en español contemporáneo.
  doctrine_reference: HALOT on אִם לֹא; prophetic oath-like usage
- issue: Tensión interpretativa del cierre de la versículo
  english_pob_reading: to make its pastureland plunder
  chosen_spanish_reading: a fin de hacer de su territorio abierto presa
  alternative_spanish_readings:
  - a fin de hacer de sus pastizales botín
  - para convertir su terreno abierto en despojo
  rationale: La cláusula final es notoriamente difícil. Se preserva la idea de hacer del terreno expuesto al pasto o abierto un objeto de saqueo, sin resolver artificialmente la ambigüedad. La nota marca la posibilidad de otra lectura semántica cercana a «pastureland».
  doctrine_reference: Textual/lexical difficulty in לְמַעַן מִגְרָשָׁהּ לָבַז
translation_notes:
  revision_awareness: Se siguió la revisión reciente del POB inglés que corrigió la cláusula final para reflejar mejor לְמַעַן מִגְרָשָׁהּ לָבַז. La redacción española conserva esa cautela interpretativa y, además, mantiene la fuerza asseverativa de אִם לֹא y la referencia explícita al nombre divino Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה, conforme a la política del proyecto.
  - Se conserva «remanente» para שְׁאֵרִית, sin cargarlo de sentido técnico salvífico.
  - Se mantiene la ambigüedad del tramo final con una nota, porque el hebreo es difícil y admite más de una solución.
  - Se prefirió «heredad» para מוֹרָשָׁה por su resonancia bíblica y por el matiz de apropiación indebida en contexto.
