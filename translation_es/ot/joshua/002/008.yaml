translation:
  language: es
  text: Antes de que se acostaran[a], ella subió a la azotea, a donde ellos estaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Antes de que se fueran a dormir, ella subió a la azotea, a donde ellos estaban». El verbo hebreo significa literalmente «acostarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - antes
  - antes que
  - no había
  lexicon: HALOT
  rationale: Funciona como adverbio temporal que introduce una acción anterior a la siguiente; «antes de que» es natural en español y preserva el valor temporal de prioridad sin añadir información.
- source_word: יִשְׁכָּבוּן
  english_pob_choice: they lay down
  chosen_spanish: se acostaran
  alternatives_spanish:
  - se echaran
  - se fueran a dormir
  - se durmieran
  lexicon: HALOT
  rationale: El hebreo dice literalmente «acostarse/recostarse». En español, «se acostaran» conserva esa fuerza física mejor que «se durmieran», aunque en contexto implique el inicio del sueño.
- source_word: עָלְתָה
  english_pob_choice: she went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hasta
  - fue hacia arriba
  lexicon: HALOT
  rationale: Verbo de movimiento ascendente. «Subió» es la forma más natural y fiel para el acceso al techo de la casa.
- source_word: עֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: hasta ellos
  alternatives_spanish:
  - a ellos
  - sobre ellos
  - para ellos
  lexicon: HALOT
  rationale: Aunque la preposición tiene literalmente el sentido de «sobre/encima de», con un verbo de movimiento y complemento personal expresa dirección hacia las personas; «hasta ellos» evita un español forzado o ambiguo.
- source_word: עַל הַגָּג
  english_pob_choice: on the roof
  chosen_spanish: en el terrado
  alternatives_spanish:
  - sobre el techo
  - en la azotea
  - sobre el terrado
  lexicon: HALOT
  rationale: «גג» es el techo plano transitable de una casa antigua; «terrado» comunica mejor ese referente cultural que «techo» en español general, sin perder el sentido locativo.
- source_word: וְהֵמָּה ... וְהִיא
  english_pob_choice: they ... she
  chosen_spanish: ellos ... ella
  alternatives_spanish:
  - mientras ellos ... ella
  - cuando ellos ... ella
  lexicon: HALOT
  rationale: El hebreo contrasta explícitamente a los participantes. El español mantiene ese contraste con la estructura de la oración, sin necesidad de repetir artificiosamente los pronombres si la fluidez ya lo expresa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo sin cambios la opción óptima-equivalente y la nota léxica sobre טֶרֶם/יִשְׁכָּבוּן. El español sigue esa decisión auditada, preservando el matiz físico de «acostarse» y la dirección narrativa de la subida al terrado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «terrado» para reflejar mejor el espacio arquitectónico de una casa antigua que «techo» o «azotea», aunque se ofrece «terrado» como alternativa en la nota.
  - No hay tensiones teológicas en este verso; la principal decisión es léxica y narrativa.
