translation:
  language: es
  text: Mejor es poco con el temor de Yahvé que gran tesoro con turbación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y confusión en él'. El término hebreo puede denotar turbación, disturbio o confusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Bueno es
  - Es mejor
  lexicon: HALOT
  rationale: 'En un proverbio comparativo, טוֹב expresa preferencia: ''mejor''. En español, ''Mejor es'' conserva el paralelismo y la estructura sentenciosa sin añadir sentido.'
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: poco
  alternatives_spanish:
  - un poco
  - una pequeña cantidad
  lexicon: HALOT
  rationale: El término indica una cantidad pequeña o modesta. 'Poco' funciona de manera natural en español proverbial y mantiene el contraste con 'gran tesoro'.
- source_word: בְּיִרְאַת יְהוָה
  english_pob_choice: with the fear of Yahweh
  chosen_spanish: con el temor de Yahvé
  alternatives_spanish:
  - en el temor de Yahvé
  - con reverencia hacia Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión sapiencial 'temor de Yahvé' por su peso canónico y teológico. La preposición ב se vierte como 'con' para expresar acompañamiento, no mera localización. 'Temor' mantiene la ambivalencia reverencial del hebreo sin reducirlo a simple 'reverencia'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del POB de transliterar el nombre divino como 'Yahvé', preservando el nombre personal del pacto en vez de sustituirlo por un título.
- source_word: מֵאוֹצָר רָב
  english_pob_choice: than great treasure
  chosen_spanish: que gran tesoro
  alternatives_spanish:
  - que un tesoro grande
  - que tesoro abundante
  lexicon: HALOT
  rationale: אוֹצָר es 'tesoro' o riqueza almacenada; רָב intensifica la idea de abundancia. 'Gran tesoro' reproduce bien la contraposición con 'poco'.
- source_word: וּמְהוּמָה בּוֹ
  english_pob_choice: with turmoil
  chosen_spanish: con turbación
  alternatives_spanish:
  - con tumulto
  - con confusión
  - con desasosiego
  lexicon: HALOT
  rationale: מְהוּמָה puede significar turbación, disturbio, confusión o tumulto. 'Turbación' comunica bien el desorden y la inquietud asociados al tesoro abundante, y en español suena natural y digno en un proverbio.
theological_decisions:
- issue: Expresión sapiencial 'fear of Yahweh'
  english_pob_reading: Rendered as 'the fear of Yahweh' without paraphrasing it into 'reverence' in the main text
  chosen_spanish_reading: '''el temor de Yahvé'' en el texto principal'
  alternative_spanish_readings:
  - '''la reverencia a Yahvé'''
  - '''el temor reverente de Yahvé'''
  rationale: La frase es una fórmula central de la sabiduría bíblica. Mantener 'temor' preserva la densidad teológica y literaria del hebreo, dejando abierta la dimensión de reverencia, obediencia y piedad sin estrecharla a una sola explicación.
  doctrine_reference: 'Translation philosophy §§1, 5, 6; término de pacto: יְהוָה → Yahvé'
translation_notes:
  revision_awareness: 'La redacción corrige el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto principal y la nota anclada corresponde al matiz léxico de מְהוּמָה. Además, la frase final se ajusta al patrón hebreo sin añadir un equivalente explícito de ''with it'' que no está en el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la norma del proyecto.
  - Se conserva 'temor de Yahvé' como expresión sapiencial estable, no reemplazada por una paráfrasis interpretativa.
  - '''Turbación'' se eligió por claridad y porque mantiene el rango semántico de מְהוּמָה; la nota deja abierta la alternativa ''confusión''.'
  - El paralelismo comparativo queda reflejado con 'Mejor es... que...' en un español natural y fiel al hebreo.
