  text: וַ/יְהִ֡י בְּ/עֵת֩ יָבִ֨יא אֶת הָֽ/אָר֜וֹן אֶל פְּקֻדַּ֣ת הַ/מֶּלֶךְ֮ בְּ/יַ֣ד הַ/לְוִיִּם֒ וְ/כִ/רְאוֹתָ֞/ם כִּי רַ֣ב הַ/כֶּ֗סֶף וּ/בָ֨א סוֹפֵ֤ר הַ/מֶּ֨לֶךְ֙ וּ/פְקִיד֙ כֹּהֵ֣ן הָ/רֹ֔אשׁ וִ/יעָ֨רוּ֙ אֶת הָ֣/אָר֔וֹן וְ/יִשָּׂאֻ֖/הוּ וִֽ/ישִׁיבֻ֣/הוּ אֶל מְקֹמ֑/וֹ כֹּ֤ה עָשׂוּ֙ לְ/י֣וֹם בְּ/י֔וֹם וַ/יַּֽאַסְפוּ כֶ֖סֶף לָ/רֹֽב־־־־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/011.yaml
  text: And whenever the chest was brought by the Levites to the king’s oversight[a], and when they saw that the money was abundant, the king’s scribe and the chief priest’s officer would come and empty the chest, then carry it and return it to its place. Thus they did day by day[b], and they gathered money in abundance.
  footnotes:
  - marker: a
    text: Or 'the ark' if taken more literally from the Hebrew term; here it refers to the collection chest, not the ark of the covenant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'silver'; in this administrative context the term refers to collected money.
    reason: lexical_alternative
