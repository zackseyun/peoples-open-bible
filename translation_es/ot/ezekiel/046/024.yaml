review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: avance narrativo (וַיֹּאמֶר אֵלַי), identificación de los espacios (אֵלֶּה), sentido arquitectónico de בֵּית הַמְבַשְּׁלִים como áreas de cocina, referencia cultual de מְשָׁרְתֵי הַבַּיִת, y valor sacrificial de זֶבַח הָעָם. Sin embargo, no preserva del todo la decisión léxica auditada sobre בשׁל como «hervir/boil», y también omite la nota alternativa para מְשָׁרְתֵי הַבַּיִת que el rastro inglés sí conserva.'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces me dijo» y «Estas son las cocinas» funcionan bien. No obstante, «cocinarán» debilita la consistencia léxica del doble uso de בשׁל y pierde el matiz específico de cocción por hervor que la auditoría inglesa quiso mantener. «Hervirán» suena algo más marcado en español, pero es aceptable y más fiel en este contexto sacrificial.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Ministros del templo» encaja con el matiz cultual. «Sacrificio del pueblo» preserva bien זֶבַח. La principal desalineación está en בשׁל: el borrador usa «cocinarán» donde la decisión auditada favorece «hervirán».'
  issues:
  - severity: medium
    issue: El verbo principal יְבַשְּׁלוּ se tradujo como «cocinarán» en vez de «hervirán».
    rationale: La auditoría inglesa documenta explícitamente la preferencia por «boil/shall boil» para mantener la consistencia con מְבַשְּׁלִים / יְבַשְּׁלוּ y reflejar mejor el lenguaje sacrificial de preparación por cocción. «Cocinarán» es comprensible, pero más general.
  - severity: low
    issue: Falta la nota alternativa para «ministros del templo».
    rationale: El POB inglés conserva una nota para מְשָׁרְתֵי הַבַּיִת («servants/attendants of the temple»). La revisión española debería preservar esa alternativa significativa en nota.
  revised_spanish_text: 'Entonces me dijo[a]: «Estas son las cocinas[b], donde los ministros[c] del templo hervirán el sacrificio del pueblo».'
