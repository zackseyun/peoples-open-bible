translation:
  language: es
  text: Además[a][b], yo mismo les di estatutos que no eran buenos y ordenanzas por las cuales no podían vivir.
  philosophy: optimal-equivalence
  footnotes: &id001
  - marker: a
    text: 'O, interpretativamente: “yo mismo los entregué a estatutos que no eran buenos”, conservando la idea de un acto judicial y no de leyes moralmente defectuosas.'
    reason: alternative_reading
  - marker: b
    text: La expresión “por las cuales no podían vivir” evoca el modismo pactal según el cual obedecer los estatutos de Dios conduce a la vida (compárese Levítico 18:5); aquí el sentido se invierte deliberadamente.
    reason: cross_reference
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y además
  - Asimismo
  - Más aún
  lexicon: HALOT
  rationale: Captura el valor aditivo y enfático sin sonar forzado en español.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - aun yo
  lexicon: HALOT
  rationale: La expresión independiente refuerza el sujeto; “yo mismo” preserva ese énfasis de manera natural.
- source_word: נָתַתִּי
  english_pob_choice: gave
  chosen_spanish: di
  alternatives_spanish:
  - entregué
  - concedí
  - di en manos
  lexicon: HALOT
  rationale: El verbo básico es “dar”; el matiz judicial o permisivo se mantiene para la nota teológica, no se impone en el verbo principal.
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - prescripciones
  lexicon: HALOT
  rationale: “Estatutos” conserva el registro legal y covenantal del término y es un equivalente bíblico asentado en español.
- source_word: לֹא טוֹבִים
  english_pob_choice: that were not good
  chosen_spanish: que no eran buenos
  alternatives_spanish:
  - no buenos
  - malos
  lexicon: HALOT
  rationale: La cláusula relativa reproduce con claridad la negación predicativa sin suavizar la tensión del hebreo.
- source_word: וּמִשְׁפָּטִים
  english_pob_choice: ordinances
  chosen_spanish: ordenanzas
  alternatives_spanish:
  - juicios
  - reglas
  lexicon: HALOT
  rationale: “Ordenanzas” mantiene el registro jurídico y distingue bien este término de חֻקִּים.
- source_word: לֹא יִחְיוּ בָּהֶם
  english_pob_choice: by which they could not live
  chosen_spanish: por las cuales no podían vivir
  alternatives_spanish:
  - con las cuales no podrían vivir
  - por medio de las cuales no vivían
  lexicon: HALOT
  rationale: “Por las cuales” conserva el sentido instrumental de ב, y “no podían vivir” refleja la imposibilidad expresada en la revisión inglesa.
theological_decisions:
- issue: Si el texto debe suavizar la afirmación de que Dios “dio” estatutos no buenos
  english_pob_reading: Retain the direct wording “I myself gave them statutes that were not good”.
  chosen_spanish_reading: Mantener “yo mismo les di estatutos que no eran buenos”.
  alternative_spanish_readings:
  - yo mismo los entregué a estatutos que no eran buenos
  - yo permití que tuvieran estatutos que no eran buenos
  rationale: El hebreo usa נָתַתִּי con sujeto divino; la traducción principal conserva ese dato léxico sin resolver la tensión teológica. La nota permite la lectura judicial/permisiva sin sustituirla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo reflejar la frase “they could not live” sin borrar el eco pactal de “vivir por” los estatutos
  english_pob_reading: by which they could not live
  chosen_spanish_reading: por las cuales no podían vivir
  alternative_spanish_readings:
  - en las cuales no podían vivir
  - por medio de las cuales no tenían vida
  rationale: “Por las cuales” comunica el valor instrumental y conserva el eco de la fórmula de vida pactal, pero invertida; “no podían” sigue la corrección revisada del inglés.
  doctrine_reference: Levítico 18:5 como trasfondo idiomático; la inversión se mantiene en el verso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió “would not live” por “could not live” para reflejar mejor la idea de imposibilidad en el hebreo. También se conservó la tensión teológica documentada entre el verbo directo “dar” y la posible lectura judicial/permisiva indicada en la nota.
  spanish_consistency_notes:
  - Se usó “estatutos” y “ordenanzas” para mantener la distinción legal del par חֻקִּים / מִשְׁפָּטִים.
  - Se evitó “SEÑOR” o una solución de ocultamiento del nombre divino, aunque aquí el versículo no contiene el Tetragrámaton.
  - Se mantuvo un español bíblico claro, sin arcaísmos innecesarios ni paráfrasis que atenúen la afirmación del texto.
