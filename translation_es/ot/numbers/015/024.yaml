translation:
  language: es
  text: Entonces, si se hizo inadvertidamente y pasó desapercibido[a] para la congregación, toda la congregación ofrecerá un novillo del ganado para holocausto, como aroma agradable a Yahvé, con su ofrenda de cereal y su libación, conforme al estatuto, y un macho cabrío para ofrenda por el pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Pasó desapercibido” refleja el hebreo idiomático “de los ojos de la congregación”, es decir, que el caso no fue advertido por la comunidad.
    reason: source_note
  - marker: b
    text: O “para ofrenda de purificación”. El hebreo חַטָּאת puede referirse tanto a la ofrenda asociada al pecado como a su efecto ritual de purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֵינֵי הָעֵדָה
  english_pob_choice: escaped the notice of the congregation
  chosen_spanish: pasó desapercibido para la congregación
  alternatives_spanish:
  - quedó oculto a la congregación
  - se escapó de la atención de la congregación
  lexicon: HALOT
  rationale: El hebreo es una expresión idiomática literal de “de los ojos de la congregación”, con sentido de algo no advertido. “Pasó desapercibido” conserva ese valor idiomático en español natural sin perder el matiz de omisión o inadvertencia colectiva.
- source_word: נֶעֶשְׂתָה לִשְׁגָגָה
  english_pob_choice: it was done unintentionally
  chosen_spanish: se hizo inadvertidamente
  alternatives_spanish:
  - se hizo por error
  - se hizo sin darse cuenta
  lexicon: HALOT
  rationale: שְׁגָגָה en contexto legal-sacrificial denota una acción no intencional, no simplemente un fallo casual. “Inadvertidamente” comunica bien la falta de intención y deja visible la distinción cultual frente al pecado premeditado.
- source_word: כָל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - la congregación entera
  lexicon: HALOT
  rationale: עֵדָה se refiere a la comunidad reunida del pacto. “Congregación” mantiene la terminología bíblica establecida y “toda” preserva el alcance total de כָל.
- source_word: פַּר בֶּן בָּקָר אֶחָד
  english_pob_choice: one bull from the herd
  chosen_spanish: un novillo del ganado
  alternatives_spanish:
  - un toro del ganado
  - un becerro del ganado
  lexicon: HALOT
  rationale: La expresión designa un bovino macho para sacrificio. “Novillo” evita una calca pesada y en español transmite bien un animal joven del ganado apto para ofrenda. Se evita “becerro” por menor precisión para un animal de sacrificio adulto-joven, y “toro” por sugerir mayor madurez y fuerza.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: Se conserva el término sacrificial tradicional “holocausto” para עֹלָה, que en español bíblico comunica con precisión la ofrenda completamente consumida por el fuego.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: for a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor grato
  - como aroma placentero
  lexicon: HALOT
  rationale: La expresión es un modismo sacrificial de aceptación, no una mera descripción olfativa. “Aroma agradable” mantiene la imagen y la función cultual sin sonar demasiado arcaico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: “Yahvé” en el texto principal, no una sustitución por título. La preposición “a” refleja adecuadamente la dirección cultual de la ofrenda.'
- source_word: וּמִנְחָתוֹ
  english_pob_choice: with its grain offering
  chosen_spanish: con su ofrenda de cereal
  alternatives_spanish:
  - y su ofrenda de cereal
  - con su ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial es la ofrenda acompañante de grano/cereal. “Ofrenda de cereal” es claro en español y conserva el valor ritual; “vegetal” resulta menos transparente para lectores amplios.
- source_word: וְנִסְכּוֹ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - con su libación
  lexicon: HALOT
  rationale: נֶסֶךְ es la ofrenda líquida derramada. “Libación” es el equivalente culto y conciso en español bíblico; en combinación con el contexto sacrificial queda suficientemente claro.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según la norma
  - conforme al mandato
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí designa la disposición ritual prescrita. “Estatuto” mantiene el registro jurídico-cultual y evita diluir el sentido en una mera recomendación.
- source_word: וּשְׂעִיר עִזִּים אֶחָד
  english_pob_choice: and one male goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un macho de cabras
  - y un cabrío
  lexicon: HALOT
  rationale: שְׂעִיר עִזִּים especifica un macho de cabra. “Macho cabrío” es natural en español bíblico y conserva la especificidad masculina del hebreo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación[b]
  alternatives_spanish:
  - para ofrenda por el pecado
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: En este contexto priestly, חַטָּאת puede señalar tanto la ofrenda asociada al pecado como su efecto ritual de purificación/expiación. Se opta por “expiación” en el texto por su amplitud sacrificial y se preserva la alternativa tradicional en nota.
theological_decisions:
- issue: Renderización de חַטָּאת en contexto sacrificial sacerdotal
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: 'El término hebreo en pasajes sacerdotales tiene una carga ritual compleja: se relaciona con el pecado, pero también con la purificación del santuario y de la comunidad. “Expiación” mantiene esa amplitud cultual en español, mientras la nota preserva las alternativas más literales y reconocibles.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo el criterio del proyecto, se traduce por el nombre propio divino “Yahvé”, preservando la referencia al nombre pactal de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión auditada sin cambios sustanciales requeridos; se ha mantenido la lectura de alto acuerdo, adaptando al español la decisión revisada sobre el Tetragrámaton y preservando la tensión lexical de חַטָּאת con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma principal del nombre divino, de acuerdo con la convención del proyecto.
  - Se usa “congregación” para עֵדָה por consistencia con el registro bíblico de Números.
  - Se conserva el léxico sacrificial tradicional (“holocausto”, “libación”, “macho cabrío”) para evitar pérdida de precisión cultual.
  - “Ofrenda de cereal” sigue el valor de מִנְחָה sin introducir términos menos transparentes para lectores contemporáneos.
  - La nota de חַטָּאת preserva la alternativa cultual relevante sin borrar la lectura principal del texto.
