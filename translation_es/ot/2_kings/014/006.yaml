  - severity: low
    issue: «que Yahvé mandó» queda elíptico
    rationale: El hebreo formula «que Yahvé mandó, diciendo». En español es más natural completar la idea con «que Yahvé mandó así» antes de «diciendo».
  - severity: low
    issue: «por causa de» es pesado en la cita legal
    rationale: La preposición עַל en esta fórmula se puede verter simplemente «por», que en español legal y bíblico suena más natural sin pérdida de sentido.
  - severity: low
