translation:
  language: es
  text: Y el ángel de Yahvé lo agarró por la coronilla[a], y, llevándolo por el cabello de su cabeza, lo puso en Babilonia, sobre el foso, en el ruido impetuoso[b] del
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego disponible dice κορυφῆς αὐτοῦ ('de la coronilla / parte superior de su cabeza'), no una corona ornamental; por eso se traduce 'coronilla'.
    reason: lexical_alternative
  - marker: b
    text: El texto griego proporcionado se interrumpe después de τοῦ; la frase queda incompleta en esta fuente. ῥοίζος denota un sonido impetuoso o zumbante, por eso no se traduce simplemente como un ruido cualquiera.
    reason: textual_variant
lexical_decisions:
- source_word: ἄγγελος Κυρίου
  english_pob_choice: angel of the Lord
  chosen_spanish: ángel de Yahvé
  alternatives_spanish:
  - ángel del Señor
  - mensajero de Yahvé
  lexicon: BDAG
  rationale: Aunque el inglés auditado dice 'Lord', el proyecto español usa 'Yahvé' para Κυρίου cuando el contexto alude al nombre divino. 'Ángel de Yahvé' mantiene la referencia teológica sin el ocultamiento convencional en mayúsculas.
- source_word: ἐπελάβετο
  english_pob_choice: seized
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - agarró
  - tomó de
  lexicon: BDAG
  rationale: La forma media expresa una acción fuerte y repentina. 'Se apoderó de' conserva ese matiz de intervención enérgica mejor que un 'tomó' más débil.
- source_word: κορυφή
  english_pob_choice: crown
  chosen_spanish: coronilla
  alternatives_spanish:
  - cima
  - parte superior
  lexicon: LSJ
  rationale: En referencia a la cabeza, el sentido es la parte más alta. 'Coronilla' comunica bien la zona corporal sin introducir una imagen de corona ornamental.
- source_word: βαστάσας
  english_pob_choice: carrying
  chosen_spanish: llevándolo
  alternatives_spanish:
  - cargando a él
  - transportándolo
  lexicon: BDAG
  rationale: El participio describe la acción concomitante de trasladarlo. 'Llevándolo' fluye de modo natural en español y conserva el movimiento narrativo.
- source_word: κόμη
  english_pob_choice: hair
  chosen_spanish: cabello
  alternatives_spanish:
  - pelo
  - melena
  lexicon: LSJ
  rationale: '''Cabello'' es el término más neutral y digno para el cabello de la cabeza. Evita tanto una rusticidad innecesaria como un color estilístico no requerido por el griego.'
- source_word: ἔθηκεν
  english_pob_choice: set
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo dejó
  lexicon: BDAG
  rationale: El verbo indica emplazamiento en un lugar concreto. 'Lo puso' es directo y transparente en español narrativo.
- source_word: ἐπάνω τοῦ λάκκου
  english_pob_choice: above the pit
  chosen_spanish: encima del pozo
  alternatives_spanish:
  - sobre el pozo
  - por encima del pozo
  lexicon: BDAG
  rationale: '''Encima de'' reproduce la relación espacial sin añadir precisión topográfica no explícita en el griego.'
- source_word: ῥοίζος
  english_pob_choice: rushing sound
  chosen_spanish: ruido
  alternatives_spanish:
  - estruendo
  - zumbido
  - ruido de
  - ruido del
  lexicon: LSJ
  rationale: El texto griego proporcionado se corta en medio de la expresión. 'Ruido' preserva la referencia auditiva sin reconstruir lo que falta; el complemento queda abierto igual que en la fuente.
theological_decisions:
- issue: Tratamiento de Κυρίου en ἄγγελος Κυρίου
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Yahvé
  rationale: En este proyecto, el griego Κυρίου en contexto de referencia divina se vierte como 'Yahvé'. Eso mantiene la distinción auditada frente al uso eclesial genérico de 'Señor' y evita el ocultamiento del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יהוה / YHWH → Yahvé'
- issue: Manejo del final incompleto del versículo
  english_pob_reading: Translate the extant Greek only and preserve the broken phrase
  chosen_spanish_reading: Traducir solo el griego conservado y dejar la frase final abierta
  alternative_spanish_readings:
  - reconstruir el final con otra edición
  - suplir el objeto faltante implícitamente
  rationale: La transparencia editorial exige reflejar que el testimonio griego citado termina de forma incompleta. La traducción española mantiene la interrupción sin completar lo no atestiguado.
  doctrine_reference: 'PHILOSOPHY.md: transparency and source primacy'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente añadió ''sound'' para representar con más naturalidad ῥοίζῳ (''rushing sound/noise'') y mantuvo el final incompleto del extracto. La versión española refleja esa misma decisión: conserva la incompletud textual y expresa el valor auditivo de ῥοίζος con ''ruido''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para Κυρίου según el estándar español del proyecto.
  - '''Coronilla'' evita sobretraducir κορυφή como una corona literal.'
  - '''Cabello'' y ''lo puso'' siguen un registro claro y bíblico sin arcaísmo excesivo.'
  - La frase final queda truncada a propósito para no inventar el cierre ausente en la fuente.
