translation:
  language: es
  text: Te alabaré, Dios de mi salvación; te daré gracias, Dios de mi padre. Proclamaré[a] tu nombre, la fortaleza de mi vida[c], porque has redimido mi alma[b] de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Proclamaré tu nombre como la fortaleza de mi vida». La frase hebrea puede leerse en aposición («tu nombre, la fortaleza de mi vida») o con un vínculo verbal algo más explícito.'
    reason: lexical_alternative
  - marker: b
    text: «Mi alma» también puede traducirse «mi vida» o «mi ser»; el hebreo néfesh puede tener cualquiera de esos sentidos según el contexto.
    reason: lexical_alternative
  - marker: c
    text: 'El paralelo griego comienza: «Te daré gracias, Señor Rey, y te alabaré, Dios mi salvador», lo que refleja una formulación inicial algo distinta de la del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: אֲהַלְלֶךָּ
  english_pob_choice: I will praise you
  chosen_spanish: Te alabaré
  alternatives_spanish:
  - Te ensalzaré
  - Te glorificaré
  lexicon: HALOT
  rationale: הלל en piel expresa alabanza; en español, «alabar» reproduce con naturalidad el acto de elogiar a Dios sin perder el valor culto del verbo.
- source_word: אֱלֹהֵי יִשְׁעִי
  english_pob_choice: God of my salvation
  chosen_spanish: Dios de mi salvación
  alternatives_spanish:
  - Dios de mi liberación
  - Dios mi salvador
  lexicon: HALOT
  rationale: La construcción hebrea de genitivo se conserva mejor con «de mi salvación», manteniendo el eco bíblico y la relación posesiva sin convertirla en paráfrasis.
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te agradeceré
  - te alabaré
  lexicon: HALOT
  rationale: ידָה en hifil suele expresar dar gracias o confesar alabanza; aquí conviene distinguirlo de הלל, por eso se traduce con «dar gracias».
- source_word: אֱלֹהֵי אָבִי
  english_pob_choice: God of my father
  chosen_spanish: Dios de mi padre
  alternatives_spanish:
  - Dios de mis padres
  - Dios de mis antepasados
  lexicon: HALOT
  rationale: El hebreo es singular y explícito; se mantiene «mi padre» para no nivelar el dato textual a un plural más general.
- source_word: אֲסַפְּרָה
  english_pob_choice: I will declare
  chosen_spanish: Proclamaré
  alternatives_spanish:
  - contaré
  - relataré
  - declararé
  lexicon: HALOT
  rationale: ספר aquí tiene sentido público y celebrativo; «proclamar» comunica mejor la dimensión de anuncio solemne que «contar».
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu fama
  lexicon: HALOT
  rationale: Se conserva la expresión literal, que en hebreo porta la carga de carácter revelado y presencia conocida de Dios.
- source_word: מָעוֹז חַיַּי
  english_pob_choice: the stronghold of my life
  chosen_spanish: la fortaleza de mi vida
  alternatives_spanish:
  - el refugio de mi vida
  - mi fuerte refugio
  lexicon: HALOT
  rationale: מָעוֹז designa un lugar/imagen de fuerza y protección. «Fortaleza» transmite mejor la metáfora concreta en español contemporáneo que una abstracción como «ayuda».
- source_word: פָדִיתָ
  english_pob_choice: you have redeemed
  chosen_spanish: has redimido
  alternatives_spanish:
  - has rescatado
  - has librado
  - has rescatado pagando rescate
  lexicon: HALOT
  rationale: «Redimir» preserva el peso teológico de פדה sin imponer una formulación doctrinal adicional; además encaja con el lenguaje de liberación agradecida del verso.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: «Alma» mantiene la correspondencia tradicional y poética de נֶפֶשׁ, sin perder el sentido de vida personal en el contexto de rescate de la muerte.
theological_decisions:
- issue: Cómo reflejar el par de verbos hebreos de alabanza y agradecimiento
  english_pob_reading: I will praise you; I will give thanks to you
  chosen_spanish_reading: Te alabaré; te daré gracias
  alternative_spanish_readings:
  - Te glorificaré; te daré gracias
  - Te alabaré; te agradeceré
  rationale: La distinción verbal del hebreo se conserva en español para no colapsar dos actos litúrgicos distintos en una sola idea general de alabanza.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo entender פָדִיתָ en una oración de acción de gracias
  english_pob_reading: you have redeemed
  chosen_spanish_reading: has redimido
  alternative_spanish_readings:
  - has librado
  - has rescatado
  rationale: «Redimir» retiene el espesor de rescate con resonancia pactal sin forzar una lectura posterior; sigue siendo adecuado en un contexto de gratitud por salvación de la muerte.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si la expresión 'your name, the stronghold of my life' debe volverse más explícita
  english_pob_reading: your name, the stronghold of my life
  chosen_spanish_reading: tu nombre, la fortaleza de mi vida
  alternative_spanish_readings:
  - tu nombre es la fortaleza de mi vida
  - tu nombre, mi fortaleza en la vida
  rationale: Se mantiene la posible aposición del hebreo para no perder la imagen poética de que el nombre de Dios mismo funciona como fortaleza protectora.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios posteriores que obliguen a ajustar la versión española.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al criterio base del proyecto.
  - Se usa «redimir» para פדה por su carga soteriológica y de rescate, sin sustituirla por un simple «librar».
  - Se conserva la diferencia entre «alabar» y «dar gracias» para reflejar los dos verbos hebreos paralelos.
  - «Mi padre» reproduce el singular hebreo y evita una generalización no necesaria.
