translation:
  language: es
  text: ¡Cuánto mejor es adquirir sabiduría que el oro[a], y adquirir entendimiento es preferible a la plata[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'oro fino' o 'oro refinado' para חָרוּץ, destacando un oro especialmente precioso o refinado.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, el hebreo puede expresarse como 'y adquirir entendimiento ha de ser escogido antes que la plata'. La redacción principal lo formula de manera más natural como una declaración de preferencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְנֹה / קְנוֹת
  english_pob_choice: to acquire / and to acquire
  chosen_spanish: adquirir / y adquirir
  alternatives_spanish:
  - obtener / y obtener
  - comprar / y comprar
  - alcanzar / y alcanzar
  lexicon: HALOT
  rationale: El hebreo usa formas nominalizadas/infinitivas de קנה para expresar la idea de procurar o conseguir algo valioso. 'Adquirir' conserva el matiz de búsqueda intencional y funciona bien en español poético sin reducirlo a una compra comercial.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  - sapiencia
  lexicon: HALOT
  rationale: En Proverbios, חכמה remite a sabiduría práctica y moral. 'Sabiduría' es la equivalencia directa y más natural en español.
- source_word: מַה טּוֹב
  english_pob_choice: how much better
  chosen_spanish: ¡Cuánto mejor es!
  alternatives_spanish:
  - ¡Qué mejor es!
  - ¡Cuán mejor es!
  lexicon: HALOT
  rationale: La expresión hebrea es una comparación exclamativa. '¡Cuánto mejor es!' transmite la fuerza comparativa con naturalidad en español.
- source_word: חָרוּץ
  english_pob_choice: gold / fine gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro refinado
  - oro puro
  lexicon: HALOT
  rationale: El contexto inmediato contrasta con plata, por lo que 'oro' es claro y suficiente en el texto principal. El posible matiz de metal precioso refinado queda como alternativa léxica sin imponerse sin necesidad.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: discernimiento
  alternatives_spanish:
  - entendimiento
  - insight
  - comprensión
  lexicon: HALOT
  rationale: בינה en Proverbios puede ser 'entendimiento' o 'discernimiento'. Aquí 'discernimiento' conserva el valor de capacidad para distinguir con criterio y suena natural junto a 'sabiduría' en español.
- source_word: נִבְחָר
  english_pob_choice: is to be chosen / preferable
  chosen_spanish: es preferible
  alternatives_spanish:
  - es de elegir
  - debe ser escogido
  - es más deseable
  lexicon: HALOT
  rationale: El participio pasivo comunica una cualidad de preferencia. 'Es preferible' capta bien la fuerza comparativa sin volver torpe la frase en español.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - dinero
  lexicon: HALOT
  rationale: El paralelo con 'oro' favorece el metal literal. 'Plata' mantiene el contraste poético de los dos metales preciosos.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, conservando la comparación exclamativa inicial y la preferencia pasiva de la segunda cola, pero en un orden natural para el español.
  spanish_consistency_notes:
  - Se mantiene un registro proverbial, breve y equilibrado.
  - Se evita 'comprar' para no estrechar indebidamente קנה a una transacción comercial.
  - '''Sabiduría'' y ''discernimiento'' distinguen bien los dos términos hebreos paralelos.'
  - Se conserva el contraste metales preciosos con 'oro' y 'plata' sin introducir explicaciones en el texto principal.
