review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura del hebreo: anuncio de juicio con חֶרֶב, fuerza adversativa de עַל/וְאֶל como «contra», mantenimiento de «caldeos», fórmula profética con el nombre divino «Yahvé», y las tres clases alcanzadas por el juicio. Las notas léxicas para «caldeos/babilonios» y «oficiales/príncipes» preservan bien las alternativas del rastro inglés.'
  spanish_quality_summary: La redacción es mayormente fiel y clara, pero «Una espada contra...» suena algo brusco e incompleto en español. Dado que el análisis inglés justificó explicitar la cópula implícita («is against»), conviene hacer lo mismo en español con «está contra» para una cláusula más natural y plenamente idiomática. También «habitantes» resulta más natural y neutral que «moradores» en español contemporáneo ampliamente legible.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה → «Yahvé»; כַּשְׂדִּים → «caldeos» con nota alternativa; שָׂרֶיהָ → «oficiales» con nota alternativa; חֲכָמֶיהָ → «sabios». No hay conflicto doctrinal ni terminológico sustancial.'
  issues:
  - severity: medium
    issue: Falta explicitación idiomática de la cópula en «Una espada contra los caldeos»
    rationale: El hebreo es una cláusula nominal, pero el propio rastro POB en inglés optó por «A sword is against...» para volverla idiomática. En español, «Una espada contra...» queda más telegráfico y menos natural que «Una espada está contra...» o formulación equivalente.
  - severity: low
    issue: «Moradores de Babilonia» es menos natural que «habitantes de Babilonia»
    rationale: «Moradores» no es incorrecto, pero suena más literario/arcaizante. «Habitantes» conserva exactamente el sentido de יֹשְׁבֵי y mejora la legibilidad en español neutral moderno.
  - severity: low
    issue: 'Alternativa léxica mal formada en decisiones internas: «contra de»'
    rationale: Aunque no aparece en el texto principal, «contra de» no es una alternativa española correcta; debería omitirse o reemplazarse por una forma válida.
  revised_spanish_text: Una espada está contra los caldeos[a], declara Yahvé, y contra los habitantes de Babilonia, y contra sus oficiales[b], y contra sus sabios.
  revised_footnotes:
  - marker: a
    text: O «los babilonios» para «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: O «sus príncipes» para «sus oficiales».
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores de idiomaticidad y legibilidad sin cambiar el sentido: se explicita la cópula implícita del hebreo, en línea con la decisión documentada en inglés, y se reemplaza «moradores» por «habitantes» como opción más natural en español neutral contemporáneo. Se conservan Yahvé y las notas léxicas existentes.'
