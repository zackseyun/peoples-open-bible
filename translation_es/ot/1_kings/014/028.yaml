translation:
  language: es
  text: Y cada vez que el rey entraba en la casa de Yahvé, los guardias[a] las[b] llevaban y luego las devolvían a la sala de los guardias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los corredores»; en este contexto real, el término se refiere a los guardias o escoltas del rey.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los escudos de bronce que Roboam hizo en lugar de los escudos de oro que se llevó Sisac (véase 1 Reyes 14:27).
    reason: cross_reference
lexical_decisions:
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Conservo la expresión hebrea básica בֵּית + nombre divino como ‘casa de Yahvé’, que es transparente y fiel al giro del texto. ‘Templo’ aclara la referencia, pero desplaza el eco literal del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigo la decisión del POB en inglés de transliterar el nombre divino. ‘Yahvé’ mantiene el nombre personal del pacto sin sustituirlo por un título.
- source_word: מִדֵּי בֹא
  english_pob_choice: whenever ... entered
  chosen_spanish: cada vez que ... entraba
  alternatives_spanish:
  - cuando ... entraba
  - así que cada vez que ... entraba
  lexicon: HALOT
  rationale: La construcción expresa repetición habitual. ‘Cada vez que’ comunica con naturalidad en español la fuerza iterativa de מִדֵּי + infinitivo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: ‘El rey’ es la equivalencia directa y contextual; el referente queda claro por el marco narrativo.
- source_word: יִשָּׂאוּם
  english_pob_choice: would carry them
  chosen_spanish: las llevaban
  alternatives_spanish:
  - las cargaban
  - las transportaban
  lexicon: HALOT
  rationale: El imperfecto con valor habitual en español se expresa de modo natural con pretérito imperfecto. ‘Llevaban’ conserva la acción repetida sin añadir matices innecesarios.
- source_word: הָרָצִים
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los corredores
  - los correos
  lexicon: HALOT
  rationale: Aunque literalmente son ‘los corredores’, en este contexto real el término designa a los guardias o escoltas del rey. ‘Guardias’ refleja la función contextual documentada por el POB.
- source_word: וֶהֱשִׁיבוּם
  english_pob_choice: and then return them
  chosen_spanish: y luego las devolvían
  alternatives_spanish:
  - y las llevaban de vuelta
  - y las regresaban
  lexicon: HALOT
  rationale: El hifil de שוב aquí indica hacer volver. ‘Devolvían’ expresa bien el regreso ceremonial de los escudos al lugar designado.
- source_word: אֶל תָּא הָרָצִים
  english_pob_choice: to the guards’ chamber
  chosen_spanish: a la sala de los guardias
  alternatives_spanish:
  - al cuarto de los guardias
  - al guardamán
  lexicon: HALOT
  rationale: תָּא es un cuarto o cámara; en español ‘sala’ suena natural en un edificio real y conserva la idea de recinto. ‘De los guardias’ mantiene la relación posesiva sin forzar una expresión idiomática extraña.
theological_decisions:
- issue: Referencia del nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La elección preserva el nombre propio divino en lugar de ocultarlo tras un título. Esto sigue la política del proyecto y evita perder la transparencia del hebreo.
  doctrine_reference: Tetragrammaton / nombre divino revelado; cf. Éxodo 3:15 y práctica editorial POB
- issue: Sentido contextual de הָרָצִים
  english_pob_reading: the guards / bodyguards
  chosen_spanish_reading: los guardias
  alternative_spanish_readings:
  - los corredores
  - los corredores del rey
  rationale: No se trata de ‘corredores’ en sentido literal en esta escena, sino de una función cortesana. ‘Guardias’ comunica la lectura contextual sin borrar la base léxica que el audit trail documenta.
  doctrine_reference: Contextual lexical decision; no doctrinal claim
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje presenta alto acuerdo entre el control cruzado y la solución inglesa auditada, así que la redacción española sigue de cerca la decisión ya establecida.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - Se usa ‘guardias’ para הָרָצִים por su función contextual, con nota explicativa para no perder la referencia literal.
  - El objeto femenino plural ‘las’ se refiere a los escudos mencionados en el versículo anterior, coherente con la nota cruzada.
  - ‘Sala de los guardias’ conserva la idea de cámara/recinto sin introducir un término demasiado técnico.
