id: ROM.14.11
reference: Romans 14:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: γέγραπται γάρ· Ζῶ ἐγώ, λέγει κύριος, ὅτι ἐμοὶ κάμψει πᾶν γόνυ, καὶ ⸂πᾶσα γλῶσσα ἐξομολογήσεται⸃ τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/011.yaml
  text: 'For it is written: "As I live, says the Lord, every knee will bow to me, and every tongue will confess to God."'
translation:
  language: ko
  text: '기록되었기 때문입니다. 「내가 살아 있는 한, 주가 말한다. 모든 무릎이 내게 꿇을 것이며, 모든 혀가 하나님께 자백할 것이다[a].」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「인정할 것이다」 「찬양할 것이다」. 헬라어 ἐξομολογέω는 문맥에 따라 자백·인정·찬양의 뉘앙스를 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_korean: 기록되었다
  lexicon: BDAG
  rationale: 성경 인용 정형.
- source_word: Ζῶ ἐγώ
  english_pob_choice: As I live
  chosen_korean: 내가 살아 있는 한
  alternatives_korean:
  - 내가 살았다
  - 나의 생명을 두고
  lexicon: BDAG
  rationale: 맹세 정형. 「내가 살아 있는 한」이 한국어로 자연스럽게 맹세의 무게를 살린다.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_korean: 주
  alternatives_korean:
  - 야훼
  lexicon: BDAG
  rationale: '인용 본문(이사야 45:23 등)은 신적 발화이나 헬라어가 κύριος일 뿐 테트라그람마톤이 아니므로 「주」로 옮긴다. 정책: κύριος(=YHWH 인용)에는 「야훼」도 가능하나 신약 인용 표면 형태를 따라 「주」를 유지.'
- source_word: κάμψει πᾶν γόνυ
  english_pob_choice: every knee will bow
  chosen_korean: 모든 무릎이 꿇다
  lexicon: BDAG
  rationale: 표준 한국어 정형.
- source_word: πᾶσα γλῶσσα ἐξομολογήσεται
  english_pob_choice: every tongue will confess
  chosen_korean: 모든 혀가 자백하다
  alternatives_korean:
  - 모든 혀가 인정하다
  - 모든 혀가 찬양하다
  lexicon: BDAG
  rationale: 「자백」이 공적 인정의 엄숙한 의미를 살린다. 찬양 뉘앙스는 각주.
theological_decisions:
- issue: 「주」와 「하나님」의 인용 내 관계
  chosen_reading: 본문 그대로 「주가 말한다 ... 모든 혀가 하나님께 자백한다」 둘을 구분하여 보존
  alternative_readings:
  - 「내게 자백한다」로 평행 매끄럽게 다듬음
  - 예수=YHWH의 명시적 신학 결론을 번역에 주입
  rationale: 바울은 인용을 문맥에 적용하면서도 인용의 형식을 보존한다. 번역도 형식의 긴장을 그대로 둔다. 역사적 정통이 그리스도론적 함의를 허용하지만 번역에는 도입하지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장을 해소하지 말고 보존하라; κύριος→주'
