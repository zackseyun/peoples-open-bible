  - severity: high
    issue: «semana» para ἑβδομάς distorsiona el referente
    rationale: En 4 Macabeos 14:7 el vocativo se dirige a los siete hermanos como conjunto. «Semana» en español se entiende primariamente como período de siete días y desvía el sentido del original.
  - severity: high
    issue: La nota a dice «seis»
    rationale: 'Es un error factual evidente: ἑβδομάς se relaciona con siete, no con seis.'
  - severity: medium
    issue: La nota a no preserva bien la alternativa documentada
    rationale: La alternativa pertinente es «grupo de siete» o «siete», no una lectura numérica mal formulada. La nota debe explicar el valor colectivo del término sin introducir confusión.
  - severity: low
    issue: «están ligados a la piedad» puede sonar algo forzado
    rationale: Aunque no es incorrecto, una formulación como «tienen que ver con la piedad» comunica más naturalmente el valor relacional de περὶ τὴν εὐσέβειαν en español formal legible.
  revised_spanish_text: ¡Oh santísimo grupo de siete[a] hermanos en armonía, porque, así como en la creación del mundo los días tienen que ver con la piedad[b],
