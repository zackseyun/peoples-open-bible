  text: La preferí a cetros y tronos, y consideré la riqueza como nada en comparación con ella;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προέκρινα
  english_pob_choice: I preferred
  chosen_spanish: la preferí
  alternatives_spanish:
  - la escogí antes que
  - la estimé por encima de
  - la valoré más que
  lexicon: BDAG
  rationale: El verbo expresa preferencia comparativa. «La preferí» conserva esa fuerza de elección y resulta natural en español sin diluir el contraste.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la / ella
  alternatives_spanish:
  - lo / ello
  lexicon: BDAG
  rationale: El pronombre remite a la sabiduría personificada en femenino. Mantener el femenino en español preserva la personificación literaria del contexto.
- source_word: σκήπτρων
  english_pob_choice: scepters
  chosen_spanish: cetros
  alternatives_spanish:
  - bastones reales
  lexicon: LSJ
  rationale: «Cetros» reproduce el símbolo concreto de autoridad real y mantiene el paralelismo con «tronos».
- source_word: θρόνων
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos de gobierno
  - reinos
  lexicon: LSJ
  rationale: «Tronos» conserva la imagen literal y el matiz de soberanía, en paralelo con «cetros».
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - las riquezas
  - la abundancia
  lexicon: BDAG
  rationale: «Riqueza» expresa el valor material en contraste con los símbolos de poder; el singular abstracto funciona bien en español.
- source_word: οὐδὲν ἡγησάμην
  english_pob_choice: I considered as nothing
  chosen_spanish: consideré... como nada
  alternatives_spanish:
  - estimé... como nada
  - tuve por nada
  lexicon: BDAG
  rationale: La expresión idiomática comunica juicio evaluativo. «Consideré... como nada» preserva la idea de valorar algo como sin importancia frente al objeto comparado.
- source_word: ἐν συγκρίσει αὐτῆς
  english_pob_choice: in comparison with her
  chosen_spanish: en comparación con ella
  alternatives_spanish:
  - comparada con ella
  - frente a ella
  lexicon: LSJ
  rationale: La frase comparativa explícita se mantiene de manera transparente; «ella» conserva la referencia a la sabiduría personificada.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Retain feminine personal language ('her') for wisdom.
  chosen_spanish_reading: Conservar el femenino personal («ella») para la sabiduría.
  alternative_spanish_readings:
  - usar «ello» para volverla impersonal
  rationale: El texto griego presenta a la sabiduría con formas femeninas y en lenguaje personal. Mantenerlo en español respeta la figura literaria sin resolverla artificialmente.
