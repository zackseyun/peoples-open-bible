translation:
  language: es
  text: 'Le dijo: «Tu hermano ha llegado, y tu padre mató el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sano». El participio griego ὑγιαίνοντα puede significar «estando sano» o, según el contexto, más ampliamente «sano y salvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥκει
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - está aquí
  lexicon: BDAG
  rationale: ἥκω expresa la llegada con efecto presente. En español, «ha llegado» conserva bien esa fuerza perfectiva sin sonar forzado; «está aquí» comunica presencia, pero pierde el matiz de arribo.
- source_word: ἔθυσεν
  english_pob_choice: slaughtered
  chosen_spanish: ha sacrificado
  alternatives_spanish:
  - ha degollado
  - ha matado
  lexicon: BDAG
  rationale: θύω puede significar sacrificar o sacrificar mediante matanza. En este contexto festivo, «ha sacrificado» mantiene la acción ritual/de preparación asociada al banquete; «degollado» sería más crudo y «matado» demasiado general.
- source_word: μόσχον τὸν σιτευτόν
  english_pob_choice: the fattened calf
  chosen_spanish: el ternero engordado
  alternatives_spanish:
  - el becerro engordado
  - el ternero cebado
  lexicon: BDAG
  rationale: La expresión griega designa un animal cebado para una ocasión especial. «Ternero engordado» comunica el sentido natural en español; «becerro» también es posible, pero «ternero» resulta más claro para lectores amplios. «Cebado» es exacto, pero menos transparente para algunos lectores.
- source_word: ὑγιαίνοντα
  english_pob_choice: safe and sound
  chosen_spanish: sano y salvo
  alternatives_spanish:
  - sano
  - en buen estado
  lexicon: BDAG
  rationale: El participio puede significar «estar sano/estar bien», y en contexto también «estar a salvo». «Sano y salvo» reproduce en español esa amplitud idiomática, como la nota inglesa reconocía entre «healthy» y «safe and sound».
- source_word: ἀπέλαβεν
  english_pob_choice: received him back
  chosen_spanish: lo ha recibido de vuelta
  alternatives_spanish:
  - lo ha recibido otra vez
  - lo ha recuperado
  lexicon: BDAG
  rationale: ἀπολαμβάνω aquí tiene el matiz de recibir de vuelta a alguien que había estado ausente. «Lo ha recibido de vuelta» conserva la restitución personal sin volverlo impersonal como «lo ha recuperado».
- source_word: ὁ δὲ εἶπεν αὐτῷ ὅτι
  english_pob_choice: He said to him,
  chosen_spanish: 'Él le dijo:'
  alternatives_spanish:
  - 'Y le dijo:'
  - 'Pero le dijo:'
  lexicon: BDAG
  rationale: La partícula δέ es suave y no exige «pero» en español. Conservar el discurso directo con dos puntos es natural; el pronombre explícito «Él» refleja el sujeto griego sin necesidad de sobrecargar el castellano.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de SBLGNT y mantiene el mismo valor semántico que la traducción inglesa auditada: llegada presente, matiz de sacrificio/preparación del animal, recuperación del hijo y la ambigüedad legítima de ὑγιαίνοντα. No se detectaron revisiones aplicadas en el pasaje inglés reciente, por lo que no se introducen cambios doctrinales ni textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «ha llegado» como equivalente natural de ἥκει, evitando «está aquí» por pérdida del matiz de arribo.
  - «Sano y salvo» preserva la alternativa léxica documentada por la nota inglesa sin imponer una sola glosa estrecha.
  - «Ha sacrificado» deja abierta la lectura de preparación festiva sin convertirla en un simple «mató».
