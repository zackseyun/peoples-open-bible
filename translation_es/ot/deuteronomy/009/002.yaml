review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura base del hebreo: «pueblo grande y alto», la expresión literal «los hijos de Anak», la referencia a un grupo ya conocido, y la pregunta retórica final. Sin embargo, la cláusula «de quienes tú sabes» no refleja bien אֲשֶׁר אַתָּה יָדַעְתָּ, que aquí significa «a quienes conoces» o «que conoces», no meramente «de quienes sabes». Además, «¿Quién se mantendrá en pie delante de…?» desplaza innecesariamente el matiz modal/rético de מִי יִתְיַצֵּב לִפְנֵי, mejor expresado como «¿Quién puede/podrá mantenerse en pie delante de…?» o «¿Quién puede hacer frente a…?».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos giros poco naturales o menos precisos: «de quienes tú sabes» suena forzado en español actual y menos directo que «a quienes conoces»; «se mantendrá en pie» sin auxiliar modal suena más predictivo que retórico. El resto del versículo fluye bien y la nota es adecuada.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Anak» se conserva correctamente, y la nota alternativa «anakitas» está bien planteada. La decisión de mantener «los hijos de Anak» coincide con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: «de quienes tú sabes» no expresa con precisión «whom you know» / אֲשֶׁר אַתָּה יָדַעְתָּ
    rationale: En español, «saber de alguien» no equivale bien a «conocer a alguien». Aquí el hebreo identifica a un pueblo que Israel ya conoce; «a quienes conoces» es más fiel y natural.
  - severity: medium
    issue: «¿Quién se mantendrá en pie delante de…?» debilita el valor modal/rético
    rationale: La pregunta no predice simplemente que alguien permanecerá en pie, sino que plantea la imposibilidad de resistirles. Añadir «podrá» conserva mejor la fuerza del hebreo y del rastro inglés.
  - severity: low
    issue: El pronombre explícito «tú» es innecesario
    rationale: No es incorrecto, pero en español bíblico natural no hace falta aquí y la frase mejora sin él.
