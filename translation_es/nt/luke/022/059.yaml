translation:
  language: es
  text: 'Y como una hora después, otro hombre[a] insistía, diciendo: «De verdad, este hombre también estaba con él, porque él también es galileo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra persona» para ἄλλος τις; la expresión griega es indefinida, aunque el contexto sugiere un hablante masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαστάσης ὡσεὶ ὥρας μιᾶς
  english_pob_choice: after about one hour had passed
  chosen_spanish: después de que había pasado como una hora
  alternatives_spanish:
  - cuando había transcurrido como una hora
  - después de un intervalo de como una hora
  lexicon: BDAG
  rationale: La construcción genitiva absoluta marca el transcurso del tiempo. «Había pasado» conserva el valor temporal de manera natural en español, y «como una hora» refleja ὡσεὶ ὥρας μιᾶς sin volverlo demasiado técnico.
- source_word: ἄλλος τις
  english_pob_choice: another man
  chosen_spanish: otro hombre
  alternatives_spanish:
  - otra persona
  - alguien más
  lexicon: BDAG
  rationale: La expresión es indefinida; el contexto narrativo sugiere un hablante masculino. «Otro hombre» mantiene esa inferencia contextual sin fijarla de forma más fuerte que el griego.
- source_word: διϊσχυρίζετο
  english_pob_choice: insisted
  chosen_spanish: insistía
  alternatives_spanish:
  - afirmaba con firmeza
  - seguía insistiendo
  - mantenía con fuerza
  lexicon: BDAG
  rationale: El imperfecto indica una acción en curso o reiterada. «Insistía» reproduce bien esa continuidad y la fuerza de la afirmación en un español natural.
- source_word: Ἐπ’ ἀληθείας
  english_pob_choice: Truly
  chosen_spanish: ¡En verdad!
  alternatives_spanish:
  - Ciertamente
  - De veras
  - En verdad
  lexicon: BDAG
  rationale: La locución introduce una afirmación enfática. «¡En verdad!» conserva el matiz intensivo y funciona con naturalidad en el discurso directo español.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - éste
  - este
  - él
  lexicon: BDAG
  rationale: El demostrativo tiene fuerza de señalamiento y tono acusatorio. «Este hombre» mantiene mejor esa deixis que un simple pronombre.
- source_word: μετ’ αὐτοῦ ἦν
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - andaba con él
  - era su compañero
  lexicon: BDAG
  rationale: La frase expresa asociación o compañía. «Estaba con él» es directo y no añade matices interpretativos que el griego no exige.
- source_word: καὶ γὰρ
  english_pob_choice: for he too
  chosen_spanish: porque también
  alternatives_spanish:
  - pues también
  - ya que también
  - porque él también
  lexicon: BDAG
  rationale: Γάρ introduce la razón de la acusación, y καί suma la idea de inclusión. «Porque también» preserva la conexión causal y la adición, con una sintaxis fluida en español.
- source_word: Γαλιλαῖός ἐστιν
  english_pob_choice: is a Galilean
  chosen_spanish: es galileo
  alternatives_spanish:
  - es un galileo
  - es de Galilea
  - pertenece a Galilea
  lexicon: BDAG
  rationale: El predicado identifica el origen regional. «Galileo» es idiomático en español; «es galileo» conserva la misma función identificadora sin necesidad de desarrollar la procedencia.
translation_notes:
  revision_awareness: Se siguió de cerca el auditable inglés POB y el griego SBLGNT. No se introdujeron cambios textuales respecto del sentido central; la única decisión destacable es mantener la indefinición de ἄλλος τις con una nota alternativa en español, como hace el aparato inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «Mesías/Cristo» fuera del verso, sin implicaciones terminológicas adicionales.
  - Se conservó un registro narrativo sobrio, acorde con el tono del relato lucano.
  - La puntuación en discurso directo sigue convenciones españolas y conserva la fuerza exclamativa de Ἐπ’ ἀληθείας.
