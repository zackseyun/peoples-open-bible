translation:
  language: es
  text: David recuperó[a] todo lo que Amalek había tomado, y David rescató a sus dos esposas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberó» o «salvó» en ambos miembros; el hebreo usa la misma raíz en las dos cláusulas, pero el español idiomático favorece «recuperó» para lo que fue tomado y «rescató» para las esposas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּל / הִצִּיל (נצל)
  english_pob_choice: recovered / rescued
  chosen_spanish: recuperó / rescató
  alternatives_spanish:
  - liberó / libró
  - salvó / salvó
  lexicon: HALOT
  rationale: 'El hebreo usa la misma raíz en ambas cláusulas, pero el contexto cambia: en la primera se trata de recuperar lo que Amalek había tomado, y en la segunda de rescatar a las esposas. En español, "recuperó" transmite bien la restitución del botín/personas tomadas, mientras que "rescató" expresa con naturalidad la liberación de las esposas.'
- source_word: כָּל אֲשֶׁר לָקְחוּ עֲמָלֵק
  english_pob_choice: all that Amalek had taken
  chosen_spanish: todo lo que Amalek había tomado
  alternatives_spanish:
  - todo lo que había tomado Amalek
  - todo cuanto Amalek tomó
  lexicon: HALOT
  rationale: '"כָּל אֲשֶׁר" se vierte con naturalidad por "todo lo que". El pluscuamperfecto español "había tomado" refleja bien la anterioridad narrativa del verbo hebreo en este contexto. Se conserva "Amalek" como nombre colectivo, siguiendo de cerca la forma hebrea singular.'
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalek
  alternatives_spanish:
  - los amalecitas
  lexicon: HALOT
  rationale: La forma hebrea es el nombre propio singular, aunque funcione colectivamente. Mantener "Amalek" preserva la huella del texto fuente; "los amalecitas" es una clarificación posible, pero no es la forma más cercana al hebreo aquí.
- source_word: שְׁתֵּי נָשָׁיו
  english_pob_choice: his two wives
  chosen_spanish: sus dos esposas
  alternatives_spanish:
  - las dos esposas de él
  - ambas esposas
  lexicon: HALOT
  rationale: La construcción hebrea expresa literalmente "las dos de sus esposas". "Sus dos esposas" es claro, natural y conserva el número. "Esposas" comunica la relación matrimonial con mayor precisión y dignidad en español contemporáneo que "mujeres".
- source_word: דָּוִד ... דָּוִד
  english_pob_choice: David ... David
  chosen_spanish: David ... David
  alternatives_spanish:
  - David ... él
  lexicon: HALOT
  rationale: La repetición del nombre en hebreo conserva énfasis y claridad. En español también se mantiene la repetición para no perder ese efecto retórico ni suavizar innecesariamente la forma del original.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto fuente y con el criterio auditado del inglés POB: se conserva la repetición de David, se refleja la misma raíz hebrea con variación contextual en español, y no se introducen cambios textuales ni interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantuvo "Amalek" como nombre colectivo singular, en línea con el hebreo y con el audit trail inglés.
  - Se evitó "SEÑOR" porque este versículo no contiene el nombre divino.
  - '"Recuperó" en la primera cláusula y "rescató" en la segunda preservan la tensión lexical documentada del hebreo נצל sin borrar la unidad de la raíz.'
  - '"Sus dos esposas" mantiene el numeral y la relación posesiva de forma natural en español.'
