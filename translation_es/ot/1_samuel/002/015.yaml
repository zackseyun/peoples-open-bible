  yaml_path: translation/ot/1_samuel/002/015.yaml
  text: Even before they burned the fat[a], the priest’s servant would come and say to the man who was sacrificing, “Give meat for the priest to roast, for he will not take boiled meat from you, but only raw.”
  footnotes:
