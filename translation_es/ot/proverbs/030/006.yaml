    issue: «para que no» para פֶּן
    rationale: פֶּן introduce una consecuencia temida/evitada («lest»), no un propósito. En español bíblico natural, «no sea que» o «no sea que él te reprenda» conserva mejor la advertencia.
  - severity: low
    issue: Nota al pie incompleta frente al audit trail inglés
    rationale: El inglés conserva dos alternativas principales para וְנִכְזָבְתָּ («and you be found a liar» / «and you be shown false»). La nota española actual solo refleja una y con puntuación poco natural.
  - severity: low
