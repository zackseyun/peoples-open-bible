theological_decisions:
- issue: Anthropomorphic description of the divine figure in context
  chosen_reading: Retain the literal wording 'his feet will stand' without softening it.
  alternative_readings:
  - his presence will rest
  - he will appear on the Mount of Olives
  rationale: The Hebrew text uses concrete bodily language. In the immediate context the antecedent is YHWH, and the translation should preserve the text's imagery rather than resolve its theological implications by paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
