translation:
  language: es
  text: 'Los sacerdotes[a], los hijos de Finés, los hijos de Aarón: Jeshua[b], hijo de Josedec, hijo de Seraías, y Joacim, hijo de Zorobabel, hijo de Salatiel, de la casa de David, de la familia de Pérez,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego «hijos de» puede indicar descendientes en listas genealógicas, no solo hijos inmediatos.
    reason: lexical_alternative
  - marker: b
    text: La forma griega Ἰησοῦς también podría representarse como «Josué» o, en otros contextos, «Jesús»; aquí «Jeshua» identifica mejor a la figura sacerdotal postexílica pretendida.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἱερεῖς
  english_pob_choice: The priests
  chosen_spanish: Los sacerdotes
  alternatives_spanish:
  - El sacerdocio
  - Los hombres sacerdotales
  lexicon: BDAG
  rationale: La forma plural con artículo introduce una lista genealógica de figuras sacerdotales; «sacerdotes» es claro y natural en español, y conserva el valor nominativo del encabezado.
- source_word: υἱοὶ Φινεὲς υἱοὶ Ἀαρών
  english_pob_choice: the sons of Phinehas, the sons of Aaron
  chosen_spanish: los hijos de Finés, los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Finés, los descendientes de Aarón
  - los hijos de Finees, los hijos de Aarón
  lexicon: BDAG
  rationale: En listas genealógicas, υἱοί puede equivaler a descendientes. Se conserva «hijos de» para reflejar la estructura del griego y la fórmula genealógica del texto fuente.
- source_word: Ἰησοῦς
  english_pob_choice: Jeshua
  chosen_spanish: Jesús
  alternatives_spanish:
  - Josué
  - Jeshúa
  lexicon: BDAG
  rationale: El griego presenta la forma Ἰησοῦς; en español, la forma regular es «Jesús». Como aquí se trata de una figura postexílica en una lista genealógica, se mantiene la transliteración usual del nombre en el texto base, sin sustituirla por una forma interpretativa. La tensión con el uso cristológico del mismo nombre se preserva por fidelidad al griego.
- source_word: ὁ τοῦ Ἰωσεδὲκ τοῦ Σαραιοῦ
  english_pob_choice: son of Jozadak son of Seraiah
  chosen_spanish: hijo de Josedec, hijo de Seraías
  alternatives_spanish:
  - descendiente de Josedec, descendiente de Seraías
  - hijo de Josadac, hijo de Seraías
  lexicon: BDAG
  rationale: La cadena de genitivos funciona genealógicamente. «Hijo de» reproduce la relación de descendencia y es idiomático en español. Se usa la forma tradicional «Josedec» para el nombre griego Ἰωσεδὲκ, y «Seraías» para Σαραιοῦ.
- source_word: Ἰωακεὶμ
  english_pob_choice: Joakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Joakim
  - Joaquín
  lexicon: BDAG
  rationale: La forma griega apunta a un nombre bíblico que en español suele aparecer como «Joacim»; esta forma es clara y cercana al sonido del original, sin confundirlo con el rey Jehoiaquim.
- source_word: ὁ τοῦ Ζοροβαβὲλ τοῦ Σαλαθιὴλ
  english_pob_choice: son of Zerubbabel son of Shealtiel
  chosen_spanish: hijo de Zorobabel, hijo de Salatiel
  alternatives_spanish:
  - descendiente de Zorobabel, descendiente de Salatiel
  - hijo de Zorobabel, de Salatiel
  lexicon: BDAG
  rationale: Se mantiene la secuencia genealógica con «hijo de». Las formas españolas «Zorobabel» y «Salatiel» son reconocibles y fieles a la tradición bíblica en español.
- source_word: ἐκ τοῦ οἴκου τοῦ Δαυείδ
  english_pob_choice: from the house of David
  chosen_spanish: de la casa de David
  alternatives_spanish:
  - de la familia de David
  - del linaje de David
  lexicon: BDAG
  rationale: οἶκος en este contexto expresa casa/dinastía; «casa de David» es la fórmula española más natural y precisa para esa pertenencia dinástica.
- source_word: ἐκ τῆς γενεᾶς Φάρες
  english_pob_choice: from the family line of Perez
  chosen_spanish: de la familia de Pérez
  alternatives_spanish:
  - del linaje de Pérez
  - de la descendencia de Pérez
  lexicon: BDAG
  rationale: γενεά aquí señala linaje o descendencia. «Familia» transmite bien la pertenencia genealógica y es idiomática; se usa «Pérez» como forma española estable del nombre bíblico.
theological_decisions:
- issue: Alcance genealógico de «hijos de»
  english_pob_reading: Preserve explicit lineage language with repeated 'son of' and dynastic phrase 'house of David.'
  chosen_spanish_reading: Conservar «hijos de» y «hijo de» como marcadores de descendencia en una lista genealógica.
  alternative_spanish_readings:
  - usar «descendientes de» en toda la línea
  - reducir la cadena genealógica para hacerla más fluida
  rationale: El pasaje no argumenta doctrinalmente; su fuerza está en la trazabilidad de la descendencia sacerdotal y davídica. Mantener la forma genealógica ayuda a no diluir esa tensión textual.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran un consenso alto y sin revisiones aplicadas. La única tensión relevante es la forma del nombre Ἰησοῦς: el inglés POB optó por «Jeshua» para evitar asociación cristológica; en español se conserva «Jesús» porque es la forma estándar del nombre y el contexto genealógico ya delimita la referencia.'
  spanish_consistency_notes:
  - Se mantiene el orden genealógico del griego sin insertar explicaciones en el cuerpo del versículo.
  - «Casa de David» se conserva como fórmula dinástica estable.
  - Se evita «SEÑOR» o sustituciones litúrgicas, porque aquí no aparece el nombre divino.
  - La puntuación con dos puntos separa la cabecera sacerdotal de la lista nominal, en armonía con el griego.
