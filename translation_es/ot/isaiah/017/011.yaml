    rationale: '''Tú la haces crecer exuberantemente'' es gramatical, pero ''exuberantemente'' suena forzado y el pronombre sujeto ''tú'' es innecesario. ''La haces crecer exuberante'' o ''la haces crecer con exuberancia'' es más natural y conserva la imagen de crecimiento lujuriante.'
  - severity: low
