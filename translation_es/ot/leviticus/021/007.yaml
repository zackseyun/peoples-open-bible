review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene la prohibición de tomar por esposa a una mujer prostituta, a una mujer en condición de profanación, y a una mujer divorciada de su marido; también conserva correctamente el cambio de número entre el plural del mandato y el singular de la motivación final. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en la auditoría inglesa, porque ofrece como alternativa exactamente la misma palabra usada en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero «mujer prostituta» suena algo trabado; «una prostituta» sería más natural. Aun así, el problema principal es la nota mal formulada. La cláusula final «porque él es santo para su Dios» es aceptable y conserva la decisión teológica del singular individual.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Dios» y «santo». «Prostituta» corresponde bien a זֹנָה y «profanada» es defendible para חֲלָלָה en este contexto sacerdotal. No hay conflicto con términos clave del glosario. La nota debe ajustarse para reflejar la alternativa «contaminada» o mejor «degradada/contaminada», ya que la alternativa inglesa documentada es 'profaned' frente a la elección principal previa, pero en el estado auditado final el texto principal ya usa 'profaned'; en español no debe ponerse como alternativa la misma forma elegida.
  issues:
  - severity: medium
    issue: La nota al pie repite la misma palabra del texto principal
    rationale: En el texto aparece «prostituta[a]», pero la nota dice «O «profanada»», que no corresponde al término marcado y además repite la forma ya usada en el versículo para חֲלָלָה. Esto rompe la trazabilidad léxica y no preserva correctamente la alternativa documentada.
  - severity: low
    issue: La ubicación del marcador de nota es poco precisa
    rationale: El marcador [a] está anclado a «prostituta», pero la nota trata sobre חֲלָלָה («profanada»). Debe moverse al término pertinente para evitar ambigüedad.
  - severity: low
    issue: «mujer prostituta» es menos natural que «una prostituta»
    rationale: Aunque es comprensible y fiel, en español bíblico moderno suena más natural «No tomarán una prostituta[a] ni una mujer profanada…». Esto mejora la fluidez sin perder literalidad.
  revised_spanish_text: No tomarán una prostituta ni una mujer profanada[a], ni una mujer divorciada de su marido; porque él es santo para su Dios.
