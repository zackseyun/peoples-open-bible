translation:
  language: es
  text: Atribuid a Yahvé[a], familias de los pueblos, atribuid a Yahvé gloria y fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clanes de los pueblos» o «familias de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuid
  alternatives_spanish:
  - Reconoced
  - Atribuid
  - Dad
  lexicon: HALOT
  rationale: El imperativo plural en un contexto litúrgico expresa atribuir o reconocer como debido lo que pertenece a Yahvé. «Atribuid» conserva esa fuerza sin volverlo una transferencia literal de algo físico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma «Yahvé», conforme al criterio del proyecto para יְהוָה, y el valor de ל como destinatario del mandato se expresa naturalmente con «a».
- source_word: מִשְׁפְּחוֹת עַמִּים
  english_pob_choice: families of the peoples
  chosen_spanish: familias de los pueblos
  alternatives_spanish:
  - clanes de los pueblos
  - familias de las naciones
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת denota grupos de parentesco o clanes; en español, «familias» es claro y natural. עַמִּים es plural y conserva el alcance universal con «pueblos» sin reducirlo a una sola categoría.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT
  rationale: En un contexto doxológico, כבוד se refiere a la gloria u honor debido a Dios. «Gloria» es la equivalencia más estable y transparente en español.
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y poder
  alternatives_spanish:
  - y fuerza
  - y poderío
  lexicon: HALOT
  rationale: עֹז puede significar fuerza o poder. Se eligió «poder» por su naturalidad en una fórmula de alabanza junto a «gloria», manteniendo el valor atributivo del término sin perder la intensidad del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En la política del proyecto, se preserva el nombre pactal como «Yahvé» en el texto principal, en vez de ocultarlo tras un título reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada cambió un punto y coma por una coma para unir con más fluidez la repetición del imperativo. En español se conserva esa fluidez con una sola secuencia continua de mandato, sin introducir una pausa más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantuvo la repetición del imperativo («atribuid ... atribuid») para reflejar la estructura enfática del hebreo.
  - Se evitó «SEÑOR» como máscara del nombre divino porque el texto base contiene יְהוָה y el proyecto pide «Yahvé».
  - «Pueblos» conserva mejor el plural de עַמִּים que una singularización genérica.
  - La frase es apta para lectura pública, con tono solemne pero actual.
