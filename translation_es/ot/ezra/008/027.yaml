translation:
  language: es
  text: y veinte cuencos de oro, por valor de mil dáricos[a], y dos vasos de bronce fino y brillante[b], preciosos como el oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «veinte cuencos de oro por valor de mil dáricos». El hebreo puede leerse como una tasación total de los cuencos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dos vasos de buen bronce bruñido». La expresión rara que describe el bronce probablemente apunta a una manufactura especialmente fina y resplandeciente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְפֹרֵי
  english_pob_choice: bowls
  chosen_spanish: tazones
  alternatives_spanish:
  - cuencos
  - vasijas
  lexicon: HALOT
  rationale: El término hebreo designa recipientes tipo bowl; en español, «tazones» comunica bien la forma y mantiene el tono de inventario sin sonar técnico o eclesiástico.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Es el metal precioso literal del texto; «oro» es la correspondencia directa y natural en español.
- source_word: לַאֲדַרְכֹנִים אָלֶף
  english_pob_choice: worth a thousand darics
  chosen_spanish: por valor de mil dáricos
  alternatives_spanish:
  - de mil dáricos
  - por mil dáricos
  lexicon: HALOT
  rationale: La partícula ל aquí expresa valoración. «Por valor de» preserva la lectura de tasación sin perder el término histórico «dáricos».
- source_word: וּכְלֵי
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - utensilios
  lexicon: HALOT
  rationale: En un inventario de tesoro/templo, «vasos» es un equivalente natural y suficientemente amplio para כלי.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el contexto de objetos fabricados, «bronce» es la opción más probable y legible en español.
- source_word: מֻצְהָב טוֹבָה
  english_pob_choice: fine gleaming bronze
  chosen_spanish: fino, brillante
  alternatives_spanish:
  - bien bruñido
  - pulido y fino
  - de fino brillo
  lexicon: HALOT
  rationale: La expresión es rara y describe una calidad acabada y lustrosa del bronce. «Brillante» conserva la idea de resplandor sin afirmar innecesariamente una técnica específica; «fino» reproduce la valoración de calidad.
- source_word: חֲמוּדֹת
  english_pob_choice: precious
  chosen_spanish: preciados
  alternatives_spanish:
  - valiosos
  - deseables
  lexicon: HALOT
  rationale: El adjetivo expresa alto valor/deseabilidad; «preciados» conserva ese matiz y encaja con la comparación final.
- source_word: כַּזָּהָב
  english_pob_choice: as gold
  chosen_spanish: como el oro
  alternatives_spanish:
  - como oro
  - cual oro
  lexicon: HALOT
  rationale: La comparación explícita se vierte de manera natural en español con «como el oro».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura revisada del POB inglés: mantiene la valoración con «por valor de mil dáricos» y refleja el rasgo de brillo del bronce con una forma española natural («brillante»), sin forzar una imagen de baño de oro. También conserva la comparación final sin añadir elementos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «dáricos» como término histórico específico, en paralelo con el inglés POB.
  - Se usa puntuación española con coma antes de la aposición explicativa y antes del último miembro coordinado.
  - «Como el oro» conserva la comparación explícita del hebreo כַזָּהָב sin intensificarla indebidamente.
