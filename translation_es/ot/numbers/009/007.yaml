base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/007.yaml
  text: And those men said to him[a], “We are unclean by a human corpse[c][b]. Why should we be kept from presenting the offering of Yahweh at its appointed time among the sons of Israel?”
  footnotes:
  - marker: a
    text: Hebrew literally, “unclean for the soul of a man,” an idiom meaning unclean through contact with a human corpse.
    reason: lexical_alternative
  - marker: b
    text: Or “Why should we be excluded from bringing the offering of the LORD...?”
    reason: alternative_reading
  - marker: c
    text: “Sons of Israel” is the Hebrew expression; many English versions render it “Israelites.”
    reason: lexical_alternative
