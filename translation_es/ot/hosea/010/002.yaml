revisions:
- from: Dividido está su corazón[a]; ahora serán hallados culpables. Él mismo derribará sus altares[b]; devastará sus piedras sagradas[c].
  to: Su corazón está dividido[a]; ahora cargarán con su culpa[b]. Él mismo derribará sus altares; devastará sus estelas sagradas[c].
  rationale: 'Se ajusta el texto principal para seguir más de cerca las decisiones léxicas auditadas: «cargarán con su culpa» refleja mejor יֶאְשָׁמוּ que la formulación forense en el texto principal, dejando esa opción en nota; se reemplaza «piedras sagradas» por «estelas sagradas» para mayor precisión cultual; se corrige la distribución de notas para que coincida con el rastro POB; y se naturaliza el orden inicial en español.'
