translation:
  language: es
  text: Y llamaron el nombre de la ciudad Dan[a], según el nombre de Dan, su padre, que nació de Israel; sin embargo, el nombre de la ciudad antes era Laís.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su antepasado’; el hebreo ‘su padre’ puede designar a un antepasado, no solo a un padre inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - le pusieron nombre
  - nombraron
  lexicon: HALOT
  rationale: El hebreo usa el verbo ‘llamar’ con el complemento ‘nombre’; en español, ‘llamaron’ mantiene ese giro y suena natural sin perder la acción de nombrar.
- source_word: שֵׁם הָעִיר
  english_pob_choice: the name of the city
  chosen_spanish: el nombre de la ciudad
  alternatives_spanish:
  - la ciudad
  - la ciudad con el nombre
  lexicon: HALOT
  rationale: Se conserva explícitamente ‘el nombre de’ para reflejar la formulación hebrea, no solo el resultado resumido de ‘nombraron la ciudad’.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dan
  lexicon: transliteración propia
  rationale: Nombre propio conservado sin adaptación.
- source_word: בְּשֵׁם דָּן
  english_pob_choice: after the name of Dan
  chosen_spanish: conforme al nombre de Dan
  alternatives_spanish:
  - según el nombre de Dan
  - en nombre de Dan
  lexicon: HALOT
  rationale: La preposición בְּ con שֵׁם aquí expresa correspondencia con un nombre dado; en español, ‘conforme al nombre de’ comunica bien la relación de denominación sin sonar forzado.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su ancestro
  lexicon: HALOT
  rationale: Se mantiene el valor léxico directo ‘padre’, que en genealogías bíblicas puede incluir antepasado fundacional. El posesivo singular en español refleja el referente colectivo.
- source_word: אֲשֶׁר יוּלַּד לְיִשְׂרָאֵל
  english_pob_choice: who was born to Israel
  chosen_spanish: que nació para Israel
  alternatives_spanish:
  - que nació de Israel
  - que fue nacido para Israel
  - que nació en Israel
  lexicon: HALOT
  rationale: Se conserva ‘Israel’ como en el hebreo. ‘Nació para’ reproduce de forma bastante literal la construcción pasiva con לְ y evita introducir ‘Jacob’ sin base explícita en este versículo.
- source_word: וְאוּלָם
  english_pob_choice: however
  chosen_spanish: sin embargo
  alternatives_spanish:
  - pero
  - no obstante
  lexicon: HALOT
  rationale: Marcador adversativo claro y natural en español para la transición entre el nuevo nombre y el nombre previo.
- source_word: לַיִשׁ
  english_pob_choice: Laish
  chosen_spanish: Laís
  alternatives_spanish:
  - Laish
  lexicon: transliteración propia
  rationale: Se adapta a la ortografía castellana habitual para el topónimo, manteniendo la referencia identificable al nombre hebreo.
- source_word: לָרִאשֹׁנָה
  english_pob_choice: formerly
  chosen_spanish: anteriormente
  alternatives_spanish:
  - antes
  - originalmente
  - primeramente
  lexicon: HALOT
  rationale: Adverbio idiomático en español para indicar el nombre previo de la ciudad antes del cambio.
theological_decisions:
- issue: אֲבִיהֶם puede significar padre inmediato o antepasado
  english_pob_reading: their father
  chosen_spanish_reading: su padre
  alternative_spanish_readings:
  - su antepasado
  - su ancestro
  rationale: 'No hay conflicto doctrinal, pero sí una tensión léxica hereditaria: el hebreo puede usar ‘padre’ para un antepasado. El texto principal conserva la formulación directa y una nota permite el sentido ampliado.'
  doctrine_reference: Principio de consistencia terminológica y nota léxica documentada
- issue: יוּלַּד לְיִשְׂרָאֵל y la relación de Dan con Israel/Jacob
  english_pob_reading: who was born to Israel
  chosen_spanish_reading: que nació para Israel
  alternative_spanish_readings:
  - que nació de Israel
  - que fue nacido para Israel
  rationale: Se mantiene ‘Israel’ porque el texto hebreo lo dice así. No se reemplaza por ‘Jacob’, ya que eso sería una clarificación interpretativa no explicitada aquí.
  doctrine_reference: Fidelidad al dato textual y a la identidad nominativa del patriarca
- issue: בְּשֵׁם דָּן como fórmula de nombramiento
  english_pob_reading: after the name of Dan
  chosen_spanish_reading: conforme al nombre de Dan
  alternative_spanish_readings:
  - según el nombre de Dan
  - en nombre de Dan
  rationale: La formulación española busca reflejar el hecho de que la ciudad recibe el nombre en referencia a Dan, sin suavizar la relación nominal ni cargarla con una paráfrasis excesiva.
  doctrine_reference: Consistencia con el valor onomástico del hebreo
translation_notes:
  revision_awareness: 'Se revisó el pasaje con el audit trail inglés y el texto hebreo. No se detectaron cambios necesarios respecto a la lectura base: se mantuvo la estructura nominal del versículo, la referencia explícita a Israel y la contraposición final entre Dan y Laís. La principal decisión abierta es léxica: ‘su padre’ frente a ‘su antepasado’, conservada en nota.'
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - ‘Israel’ se mantiene como nombre del patriarca/entidad según el hebreo; no se sustituyó por ‘Jacob’.
  - ‘Laís’ se adaptó ortográficamente al español, manteniendo identificable el topónimo bíblico.
  - La puntuación reproduce una sola oración compuesta con el contraste adversativo final, acorde al hebreo.
