translation:
  language: es
  text: Y sucederá que, después de haberlos arrancado[a], volveré y tendré compasión de ellos[b], y los haré volver, cada hombre[c] a su heredad y cada hombre[c] a su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrancarlos de raíz». El verbo hebreo lleva la imagen de sacar algo con sus raíces, un motivo frecuente de juicio en Jeremías.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mostrarles misericordia» o «tener misericordia de ellos». El hebreo expresa compasión/misericordia, con énfasis en la conmoción interna de quien se apiada.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa dos veces la forma singular masculina distributiva («cada hombre ... y cada hombre»), refiriéndose a cada individuo dentro del grupo restaurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y será
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un hecho futuro de manera narrativa. «Sucederá» conserva ese valor discursivo con español natural y digno, equivalente al inglés auditable sin volverse arcaizante.
- source_word: נָתְשִׁי
  english_pob_choice: I have uprooted
  chosen_spanish: haberlos arrancado de raíz
  alternatives_spanish:
  - haberlos arrancado
  - haberlos desarraigado
  lexicon: HALOT
  rationale: El verbo expresa la imagen de arrancar de raíz, metáfora de juicio muy propia de Jeremías. «Arrancado de raíz» mantiene la fuerza imagética mejor que una paráfrasis más general.
- source_word: אָשׁוּב
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - retornaré
  - volveré de nuevo
  lexicon: HALOT
  rationale: En este contexto el verbo marca que Yahvé vuelve a actuar hacia los pueblos. «Volveré» es claro y mantiene la relación verbal con el movimiento/restauración del siguiente miembro.
- source_word: וְרִחַמְתִּים
  english_pob_choice: and have compassion on them
  chosen_spanish: tendré compasión de ellos
  alternatives_spanish:
  - mostraré misericordia a ellos
  - me compadeceré de ellos
  lexicon: HALOT
  rationale: רחם comunica compasión nacida de piedad. «Tendré compasión» preserva el matiz afectivo mejor que una formulación más fría o demasiado eclesiástica.
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: and I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los restauraré
  - los traeré de vuelta
  lexicon: HALOT
  rationale: 'El hiphil de שוב es causativo: Dios hace que regresen. «Los haré volver» conserva esa causatividad y suena más natural en español que una calca rígida.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El singular masculino hebreo es distributivo. «Cada hombre» preserva la forma y el valor distributivo del original, tal como lo documenta la nota inglesa.
- source_word: לְנַחֲלָתוֹ
  english_pob_choice: to his inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su posesión heredada
  lexicon: HALOT
  rationale: נחלה en este contexto alude a la porción heredada de tierra. «Heredad» mantiene la resonancia patrimonial/covenantal y evita reducirlo a «propiedad».
- source_word: לְאַרְצוֹ
  english_pob_choice: to his land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su país
  - a su territorio
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa la tierra asignada o habitada. «Tierra» es la opción más directa y bíblica en español, sin convertirla en un término político moderno.
theological_decisions:
- issue: Restauración concreta después del juicio
  english_pob_reading: The verse promises that after uprooting in judgment, God will again show compassion and return the displaced peoples to their own inherited lands.
  chosen_spanish_reading: El versículo promete que, después del juicio expresado como arrancarlos de raíz, Yahvé volverá a compadecerse de ellos y los hará regresar a su propia heredad y tierra.
  alternative_spanish_readings:
  - Una restauración meramente espiritual sin referencia territorial
  - Un retorno geográfico sin matiz de compasión divina
  rationale: La forma hebrea une juicio, compasión y retorno a heredad/tierra. La redacción española conserva esa secuencia concreta sin espiritualizarla ni diluir el componente afectivo del texto.
  doctrine_reference: Principio de fidelidad al sentido llano del texto; no ampliar ni reducir el alcance territorial y relacional que el versículo explícitamente presenta.
translation_notes:
  revision_awareness: 'Se siguió el pasaje base sin cambios de revisión posteriores: el control más reciente indica que no hubo modificaciones necesarias y hubo alta concordancia entre evaluaciones.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé como equivalente de la referencia divina implícita en el hebreo.
  - Se tradujo el juego de movimiento y retorno con formas causativas naturales en español («volveré», «los haré volver»).
  - Se conservó la imagen agrícola/judicial de «arrancar de raíz» para no perder la metáfora profética.
  - Se optó por «heredad» para preservar el sentido de posesión heredada y la resonancia bíblica de נחלה.
