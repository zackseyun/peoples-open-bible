translation:
  language: es
  text: y han puesto sus dioses en el fuego[a], porque no eran dioses, sino obra de manos humanas, madera y piedra; así los destruyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ídolos». El hebreo dice «sus dioses» y luego explica inmediatamente que no eran verdaderamente dioses, sino objetos fabricados por manos humanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתֹן
  english_pob_choice: and have put
  chosen_spanish: y han puesto
  alternatives_spanish:
  - y han dado
  - y han echado
  - y han arrojado
  lexicon: HALOT
  rationale: El hebreo admite el sentido básico de «poner/dar», y el contexto con «en el fuego» permite una formulación natural en español sin forzar «arrojar». Mantiene el valor aspectual de acción completada en la oración de Ezequías.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses/ídolos
  - sus ídolos
  lexicon: HALOT
  rationale: Se conserva el término directo del hebreo, que primero cita la designación de las naciones y luego la niega teológicamente en la cláusula siguiente. «Ídolos» queda como alternativa interpretativa, no como sustitución del texto base.
- source_word: בָּאֵשׁ
  english_pob_choice: into the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - dentro del fuego
  - al fuego
  lexicon: HALOT
  rationale: En español, con el verbo «poner», «en el fuego» expresa con naturalidad el traslado a la esfera del fuego. Evita una redundancia dura y sigue el sentido idiomático reconocido en el POB inglés.
- source_word: כִּי לֹא אֱלֹהִים הֵמָּה
  english_pob_choice: for they were not gods
  chosen_spanish: porque no eran dioses
  alternatives_spanish:
  - pues no eran dioses
  - porque no son dioses
  - pues no son dioses
  lexicon: HALOT
  rationale: Se mantiene la negación de la divinidad real de esos objetos. El imperfecto/copretérito en español encaja bien con el relato citado en la oración de Ezequías, sin perder la fuerza general de la afirmación.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: 'En español, «sino» reproduce mejor la contraposición exclusiva: no eran dioses, sino obra humana. Es más preciso que «pero» para la estructura de corrección del hebreo.'
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  english_pob_choice: the work of human hands
  chosen_spanish: obra de manos humanas
  alternatives_spanish:
  - la obra de manos humanas
  - obra hecha por manos humanas
  - el trabajo de manos humanas
  lexicon: HALOT
  rationale: «Obra de manos humanas» conserva la fórmula semántica del hebreo y el contraste entre lo divino y lo fabricado por humanos. «Humanas» traduce אָדָם de modo genérico, como en el POB inglés.
- source_word: עֵץ וָאֶבֶן
  english_pob_choice: wood and stone
  chosen_spanish: madera y piedra
  alternatives_spanish:
  - de madera y piedra
  - leño y piedra
  lexicon: HALOT
  rationale: Como especificación material de los objetos fabricados, «madera y piedra» es natural en español y fiel al apuesto final del hebreo. No añade preposición porque funciona como enumeración nominal.
- source_word: וַיְאַבְּדוּם
  english_pob_choice: so they destroyed them
  chosen_spanish: así los destruyeron
  alternatives_spanish:
  - y los destruyeron
  - por eso los destruyeron
  - y así los hicieron perecer
  lexicon: HALOT
  rationale: El causativo de אבד puede expresarse como «destruyeron»; «así» refleja el resultado lógico ya señalado en la nota inglesa. «Los» mantiene el objeto plural referido a los dioses/ídolos.
theological_decisions:
- issue: Designación polemética de los dioses de las naciones
  english_pob_reading: their gods ... for they were not gods
  chosen_spanish_reading: sus dioses ... porque no eran dioses
  alternative_spanish_readings:
  - sus ídolos ... porque no eran dioses
  - sus dioses ... porque no eran verdaderos dioses
  rationale: El hebreo nombra primero los objetos con la designación que usan las naciones y luego niega su verdadera deidad. Conservar «sus dioses» mantiene esa tensión textual; «sus ídolos» explicaría el sentido, pero suaviza la fuerza polemizante del original.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «put» frente a «thrown» por mayor correspondencia léxica con נתן. En español se optó por «han puesto» para preservar esa cercanía sin perder naturalidad; también se mantuvo la secuencia explicativa completa y la observación polemizante sobre la falsa divinidad.
  spanish_consistency_notes:
  - Se usa «dioses» para אֱלֹהִים en su sentido plural cuando el texto habla de las deidades de las naciones.
  - Se evitó «SEÑOR» o sustitutos reverenciales porque el versículo no contiene el nombre divino.
  - «Madera y piedra» se conserva como materiales del objeto fabricado, no como metáfora independiente.
  - «Así» en la cláusula final expresa la consecuencia implícita del argumento, coherente con el inglés POB.
