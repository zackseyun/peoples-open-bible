translation:
  language: es
  text: 'Porque la vida de toda carne es su sangre[a]; en su vida está. Por eso dije a los hijos de Israel[b]: «No comerán la sangre de ninguna carne[c], porque la vida de toda carne es su sangre». Cualquiera que la coma será cortado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «su sangre está en su vida», o, de manera más interpretativa, «su sangre es su vida».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; es decir, los israelitas.'
    reason: lexical_alternative
  - marker: c
    text: «Carne» traduce el hebreo בָּשָׂר y conserva la repetición de la expresión bíblica.
    reason: source_note
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - vida animada
  lexicon: HALOT
  rationale: En este contexto sacrificial y alimentario, נֶפֶשׁ se refiere a la vida animadora del ser viviente, no a un alma inmortal. «Vida» reproduce la lógica de la prohibición y evita introducir una antropología ajena al pasaje.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - criatura
  - ser viviente
  lexicon: HALOT
  rationale: «Carne» es el equivalente español más directo para mantener la repetición hebrea de «toda carne» y conservar el tono formal de la fórmula legal.
- source_word: דָּם / דָּמוֹ
  english_pob_choice: blood / its blood
  chosen_spanish: sangre / su sangre
  alternatives_spanish:
  - sangre de él
  - su sangre vital
  lexicon: HALOT
  rationale: El término central debe mantenerse literalmente. «Su sangre» sigue el valor del sufijo posesivo y permite una lectura clara en español.
- source_word: בְנַפְשׁוֹ
  english_pob_choice: in its life
  chosen_spanish: en su vida
  alternatives_spanish:
  - con su vida
  - como su vida
  - por su vida
  lexicon: HALOT
  rationale: La preposición ב con נֶפֶשׁ es compacta; «en su vida» conserva la estructura hebrea y la relación estrecha entre sangre y vida. Otras opciones son más interpretativas.
- source_word: וָאֹמַר
  english_pob_choice: So I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Por eso dije
  lexicon: HALOT
  rationale: El waw consecutivo introduce la continuación del razonamiento con una simple conexión narrativa y normativa; «Y dije» es fiel y natural en español.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - al pueblo de Israel
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión literal del hebreo para respetar la forma tradicional del sintagma y su valor identitario. En nota se puede aclarar la referencia a los israelitas si se desea.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: You shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No deben comer
  lexicon: HALOT
  rationale: La prohibición legal se expresa con un futuro de mandato en español, digno y claro. El sujeto implícito se entiende por el contexto plural.
- source_word: הִוא
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - permanece
  lexicon: HALOT
  rationale: En la segunda cláusula, «en su vida está» mantiene la concisión hebrea y la repetición enfática del original sin sobreexplicar la relación ontológica.
- source_word: אֹכְלָיו
  english_pob_choice: who eats it
  chosen_spanish: cualquiera que la coma
  alternatives_spanish:
  - quien la coma
  - el que la coma
  lexicon: HALOT
  rationale: El participio con sufijo tiene sentido distributivo; «cualquiera que la coma» suena natural en español y conserva el alcance general de la sanción.
- source_word: יִכָּרֵת
  english_pob_choice: shall be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será apartado
  - será excluido
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual de juicio sin especificar si la sanción es muerte, exclusión o juicio divino. «Será cortado» mantiene la fuerza idiomática del hebreo y la tensión interpretativa.
theological_decisions:
- issue: Relación entre sangre y vida
  english_pob_reading: '''Its blood is its life'' / ''in its life it is'' preserves the life-blood connection without flattening the Hebrew repetition.'
  chosen_spanish_reading: «en su vida está» mantiene la repetición y la estrecha unión entre sangre y vida sin resolverla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - «su sangre es su vida»
  - «su sangre está en su vida»
  rationale: El hebreo no sólo afirma una equivalencia; también conserva una formulación breve y enfática. La traducción debe dejar visible esa tensión, no suavizarla.
  doctrine_reference: Preservar la tensión léxica y teológica del texto; primacía del hebreo sobre una armonización doctrinal.
- issue: Alcance de la sanción 'cut off'
  english_pob_reading: '''shall be cut off'' is left uninterpreted, without specifying execution, excommunication, or divine removal.'
  chosen_spanish_reading: «será cortado» conserva la fórmula sin decidir el mecanismo de la sanción.
  alternative_spanish_readings:
  - «será eliminado»
  - «será excluido»
  - «será apartado»
  rationale: El hebreo admite varias modalidades de juicio del pacto; una versión española no debe cerrar indebidamente esa ambigüedad.
  doctrine_reference: Preservar la tensión teológica y legal del original; no resolver donde el texto no lo hace.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: se preserva explícitamente la segunda cláusula breve («en su vida está») en lugar de suavizarla, y se mantiene sin expansión interpretativa la sanción final «será cortado». También se conserva la fórmula legal y la repetición de «toda carne» para respetar el patrón del hebreo.'
  spanish_consistency_notes:
  - Se usó «carne» para בָּשָׂר de forma consistente con la terminología POB y la repetición del versículo.
  - Se mantuvo «vida» para נֶפֶשׁ, evitando «alma» para no importar una lectura metafísica posterior.
  - La fórmula de prohibición se vertió en estilo legal comprensible en español, sin convertirla en consejo general.
  - «Hijos de Israel» se dejó literal en el texto principal para reflejar el hebreo; la nota aclara la referencia a los israelitas.
  - La cláusula «en su vida está» refleja la repetición del hebreo y evita una armonización que borre la tensión del original.
