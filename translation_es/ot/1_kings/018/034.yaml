review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia narrativa del hebreo: mandato de llenar cuatro recipientes con agua, derramarla sobre la ofrenda quemada y la leña, y repetir la acción una segunda y tercera vez. También preserva bien la progresión ordinal explícita de שְׁנוּ / שַׁלֵּשׁוּ. La única desalineación relevante con el rastro POB es la nota al pie: el texto principal ya usa «cántaros», pero la nota dice «O “cuatro cántaros”», lo cual no ofrece una alternativa real y contradice la función de la nota inglesa, que preserva «pitchers» como alternativa a «jars».'
  spanish_quality_summary: El español es claro, natural y digno. «Llenen», «derrámenla», «sobre la leña» y las repeticiones con «por segunda/tercera vez» son plenamente legibles. «Entonces él dijo» es aceptable aunque algo más pesado que «Entonces dijo», pero no constituye error. La puntuación y el registro son adecuados. La reparación necesaria es mínima y se limita a la nota léxica.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. «Holocausto» para עֹלָה es una opción bíblica estable y fiel en este contexto. «Cántaros» encaja bien para כַדִּים, siempre que la nota preserve una alternativa real como «jarros» o «vasijas».
  issues:
  - severity: medium
    issue: La nota al pie repite el mismo término del texto principal en vez de dar una alternativa léxica real.
    rationale: El inglés auditado tiene texto principal «four jars» con nota «Or “four pitchers”». En español, si el texto principal usa «cuatro cántaros», la nota no puede decir «O “cuatro cántaros”»; debe ofrecer una alternativa distinta y plausible, p. ej. «cuatro jarros», o eliminarse.
  revised_spanish_text: 'Entonces él dijo[a]: «Llenen cuatro cántaros de agua y derrámenla sobre el holocausto y sobre la leña». Entonces él dijo: «Háganlo por segunda vez», y lo hicieron por segunda vez. Entonces él dijo: «Háganlo por tercera vez», y lo hicieron por tercera vez.'
  revised_footnotes:
  - marker: a
    text: O «cuatro jarros»; el término hebreo designa un recipiente para transportar líquidos.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se corrige únicamente la nota al pie para que preserve una alternativa léxica auténtica, en línea con la evidencia hebrea y el rastro POB en inglés.
