base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/018/015.yaml
  text: For my people have forgotten me[a]; they burn incense to emptiness. They have stumbled in their ways, in the ancient paths, to walk on side roads[d][c][b], on a road not built up.
  footnotes:
  - marker: a
    text: Or 'to vanity,' 'to what is false,' or 'to idols.' The Hebrew says 'to emptiness/falsehood,' a term often used for worthless worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'they caused them to stumble in their ways, the ancient paths.' The Hebrew allows an active rendering, but the agent is not explicit in a way that is clear in English.
    reason: alternative_reading
  - marker: c
    text: '''Ancient paths'' echoes Jeremiah''s recurring imagery of the long-established way God had set before his people; compare Jeremiah 6:16.'
    reason: cross_reference
  - marker: d
    text: Or 'bypaths' or 'tracks' for 'side roads.'
    reason: lexical_alternative
