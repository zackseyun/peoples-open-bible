translation:
  language: es
  text: Que tu amor leal esté sobre nosotros, Yahvé, como esperamos en ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como te aguardamos con esperanza» / «como esperamos expectantes en ti». El verbo hebreo puede expresar tanto esperar como aguardar con expectativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: Let ... be
  chosen_spanish: esté
  alternatives_spanish:
  - sea
  - permanezca
  lexicon: HALOT
  rationale: El jussivo de היה expresa petición o deseo. En español, «que ... esté» comunica de manera natural la súplica poética sin perder el valor optativo.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu misericordia
  - tu amor firme
  - tu fidelidad amorosa
  lexicon: HALOT
  rationale: חסד combina lealtad de pacto, bondad y amor constante. «Amor leal» conserva esa tensión mejor que «misericordia» sola y evita volverlo demasiado abstracto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la pauta del proyecto. «Yahvé» preserva el Tetragrámaton como nombre propio y evita la sustitución por un título.
- source_word: עָלֵינוּ
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - encima de nosotros
  - en nosotros
  lexicon: HALOT
  rationale: La preposición על admite «sobre». En este contexto poético, conserva la imagen de favor o presencia que reposa sobre el pueblo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: según
  alternatives_spanish:
  - como
  - así como
  - tal como
  lexicon: HALOT
  rationale: El hebreo introduce correspondencia entre la petición y la esperanza previa. «Según» comunica relación proporcional sin sonar forzado en español; «como» también sería posible, pero aquí «según» destaca mejor la medida o conformidad.
- source_word: יִחַלְנוּ
  english_pob_choice: we hope
  chosen_spanish: hemos esperado
  alternatives_spanish:
  - esperamos
  - confiamos
  - hemos puesto nuestra esperanza
  lexicon: HALOT
  rationale: יחל incluye esperar con expectativa y también esperar/hopar. «Hemos esperado» preserva el matiz temporal y la idea de espera confiada; la alternativa «esperamos» podría sonar presente, pero el perfecto español rinde bien la experiencia ya vivida y aún vigente.
- source_word: לָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - para ti
  - hacia ti
  lexicon: HALOT
  rationale: Con verbos de esperar/aguardar, el español natural es «en ti», que expresa el objeto de la esperanza sin añadir un giro extraño.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal de Dios revelado a Israel, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma normalizada en español para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de כַּאֲשֶׁר con יִחַלְנוּ לָךְ
  english_pob_reading: as we hope in you
  chosen_spanish_reading: según hemos esperado en ti
  alternative_spanish_readings:
  - como esperamos en ti
  - tal como esperamos en ti
  - así como hemos esperado en ti
  rationale: La relación del hebreo no es solo temporal; también es de correspondencia o medida entre la petición y la esperanza del pueblo. «Según» conserva esa correspondencia sin borrar la dimensión de espera confiada.
  doctrine_reference: 'DOCTRINE.md: Translation method — preserve source correspondences where they carry interpretive weight'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «even as» a «as» para mayor naturalidad, manteniendo la correspondencia. La versión española sigue esa decisión con una construcción igualmente natural, pero conserva el valor relacional de כַּאֲשֶׁר mediante «según».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «amor leal» mantiene la carga de חסד sin reducirlo a «misericordia».
  - La preposición «en ti» se usa por idiomaticidad con esperar/esperanza.
