translation:
  language: es
  text: 'Entonces Moisés se puso de pie a la puerta del campamento y dijo: «¿Quién está por Yahvé? Que venga a mí[a]». Y todos los hijos de Leví[b] se reunieron junto a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «¿Quién para Yahvé? A mí». La traducción hace explícita la invitación implícita: «Que venga a mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los levitas». Literalmente: «todos los hijos de Leví».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - se mantuvo de pie
  - se colocó
  lexicon: HALOT
  rationale: El hebreo narra que Moisés «se puso» o asumió una postura de pie; en español, «se puso» comunica con naturalidad el inicio de esa postura y conserva el valor narrativo sin añadir énfasis interpretativo.
- source_word: בְּשַׁעַר הַמַּחֲנֶה
  english_pob_choice: at the gate of the camp
  chosen_spanish: a la puerta del campamento
  alternatives_spanish:
  - en la puerta del campamento
  - a la entrada del campamento
  lexicon: HALOT
  rationale: שַׁעַר puede ser «puerta» o «portón»; «puerta» funciona bien en español para la imagen concreta del acceso del campamento. «A la» refleja correctamente el valor locativo de בְּ y suena más natural que «en la».
- source_word: מִי לַיהוָה
  english_pob_choice: Whoever is for Yahweh
  chosen_spanish: ¿Quién está por Yahvé?
  alternatives_spanish:
  - ¿Quién es de Yahvé?
  - ¿Quién está con Yahvé?
  lexicon: HALOT
  rationale: La pregunta hebrea es elíptica y funciona como convocatoria de lealtad, no solo como consulta de identidad. «Está por» conserva la idea de adhesión o toma de partido, y permite mantener el tono de llamado del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título y preservando la referencia al nombre personal revelado.
- source_word: אֵלַי
  english_pob_choice: come to me
  chosen_spanish: Que venga a mí
  alternatives_spanish:
  - Venga a mí
  - Acérquese a mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a mí», pero en español el llamado queda incompleto sin un verbo de movimiento. «Que venga a mí» expresa la invitación implícita con la mínima expansión necesaria.
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: אָסף en nifal indica reunirse o ser reunidos. «Se reunieron» comunica el sentido de forma natural en español y evita matices más eclesiales o coloquiales que no están en el hebreo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: HALOT
  rationale: Aunque el hebreo marca dirección hacia Moisés, en español el resultado natural del grupo que se agrupa es «con él». Esta elección conserva el movimiento relacional implícito y suena idiomática.
- source_word: כָּל בְּנֵי לֵוִי
  english_pob_choice: all the sons of Levi
  chosen_spanish: todos los hijos de Leví
  alternatives_spanish:
  - todos los levitas
  - todos los descendientes de Leví
  lexicon: HALOT
  rationale: Se preserva la forma literal «hijos de Leví» para reflejar el hebreo y su designación tribal masculina. «Levitas» sería más fluido, pero borra la expresión filial explícita que el texto usa.
theological_decisions:
- issue: Nombre divino YHWH/יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del POB en inglés opta por transliterar el nombre divino. En español se sigue la misma decisión con la forma establecida «Yahvé», preservando el nombre propio en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Designación tribal בְּנֵי לֵוִי
  english_pob_reading: all the sons of Levi
  chosen_spanish_reading: todos los hijos de Leví
  alternative_spanish_readings:
  - todos los levitas
  rationale: El hebreo usa un constructo masculino explícito. Se conserva en español para no aplanar el dato de género y filiación tribal, siguiendo la política de precisión del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y no requiere cambios a partir de la revisión más reciente: la elección de «Yahvé», el valor elíptico de «¿Quién está por Yahvé?», y la conservación de «hijos de Leví» permanecen alineados con el paquete fuente y la verificación de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - «Hijos de Leví» conserva la literalidad tribal y masculina del hebreo.
  - La expansión «Que venga a mí» está marcada con nota para distinguirla del hebreo elíptico.
  - «Se reunieron con él» adapta el hebreo direccional a un español natural sin cambiar el sentido.
