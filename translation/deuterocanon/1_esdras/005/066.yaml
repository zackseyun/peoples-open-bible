theological_decisions:
- issue: Whether the speakers claim worship of the same deity as the Judean returnees
  chosen_reading: 'Render the claim straightforwardly: ''we also, like you, listen to your Lord, and we will sacrifice to him,'' without endorsing or denying its sincerity.'
  alternative_readings:
  - Interpret ἀκούομεν as 'obey' to strengthen the claim of covenant loyalty
  - Expand κύριος to 'the Lord your God' to align with the Hebrew parallel
  rationale: The verse presents the speakers' self-description. The translation should preserve that claim without importing theological validation or polemical skepticism. The Greek says 'your Lord,' not explicitly 'your God,' so the narrower wording is retained.
  doctrine_reference: DOCTRINE.md §§1, 3, 5; contested term κύριος → Lord
