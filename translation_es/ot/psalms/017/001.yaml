- from: Oración de David. Escucha[a], Yahvé, una causa justa; atiende a mi clamor; presta oído a mi oración, de labios sin engaño.
  to: Oración de David. Escucha, Yahvé, una causa justa[a]; atiende a mi clamor; presta oído a mi oración que sale de labios sin engaño.
  rationale: Se quita la coma problemática y se reformula el cierre para que «de labios sin engaño» modifique claramente a «mi oración», en fidelidad al hebreo y con mejor español. También se sustituye la nota sobre «Escucha» por una nota anclada en «causa justa», para preservar la alternativa léxica significativa documentada en el audit trail inglés para צֶדֶק.
