  - severity: medium
    issue: La nota al pie no refleja bien la alternativa principal documentada
    rationale: La nota actual dice solo 'O bienes', pero el texto principal ya usa 'riqueza'. Conviene que el texto principal use 'bienes' y que la nota preserve alternativas como 'propiedad' o 'suministros', en línea con la evidencia inglesa.
  - severity: medium
    issue: '''Valientes hombres de valor'' es español poco natural y redundante'
    rationale: Aunque intenta conservar la doble expresión hebrea, en español repite casi la misma idea dos veces. 'Hombres de guerra, hombres valientes' mantiene el paralelismo sin torpeza estilística.
  revised_spanish_text: Y tenía muchos bienes[a] en las ciudades de Judá, y hombres de guerra, hombres valientes, en Jerusalén.
