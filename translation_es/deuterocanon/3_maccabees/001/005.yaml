translation:
  language: es
  text: Y así sucedió que los adversarios fueron destruidos en el combate cuerpo a cuerpo, y muchos también fueron capturados como prisioneros de guerra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «capturados por la lanza», una expresión militar para decir que fueron tomados como prisioneros de guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  lexicon: BDAG
  rationale: La fórmula narrativa impersonal se expresa de manera natural en español con «sucedió», que conserva el valor de ocurrencia/resultante sin volver la frase artificial.
- source_word: ἀντιπάλους
  english_pob_choice: the opponents
  chosen_spanish: los adversarios
  alternatives_spanish:
  - los opositores
  - los enemigos
  lexicon: LSJ
  rationale: «Adversarios» comunica bien a los que están enfrente en conflicto y evita estrechar indebidamente el alcance a un colectivo más técnico o absoluto como «enemigos».
- source_word: ἐν χειρονομίαις
  english_pob_choice: in hand-to-hand combat
  chosen_spanish: en el combate cuerpo a cuerpo
  alternatives_spanish:
  - en el combate de cerca
  - en la lucha cuerpo a cuerpo
  lexicon: LSJ
  rationale: El giro griego remite a combate de manos, es decir, pelea cercana; «combate cuerpo a cuerpo» transmite ese valor militar de forma clara y digna en español.
- source_word: διαφθαρῆναι
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - fueron arruinados
  - perecieron
  - fueron muertos
  lexicon: LSJ
  rationale: El verbo en contexto bélico indica quedar llevados a destrucción. «Fueron destruidos» conserva la amplitud del resultado sin especificar más de lo que el griego exige.
- source_word: δοριαλώτους
  english_pob_choice: prisoners of war
  chosen_spanish: prisioneros de guerra
  alternatives_spanish:
  - cautivos de guerra
  - capturados por la lanza
  lexicon: LSJ
  rationale: La palabra griega tiene un matiz militar literal ligado a la lanza, pero la equivalencia idiomática y lecturable en español es «prisioneros de guerra», manteniendo el sentido técnico del término.
- source_word: συλλημφθῆναι
  english_pob_choice: were captured
  chosen_spanish: fueron capturados
  alternatives_spanish:
  - fueron apresados
  - fueron tomados
  lexicon: BDAG
  rationale: En paralelo con el resultado bélico, «fueron capturados» es el pasivo natural en español y encaja con «prisioneros de guerra».
translation_notes:
  revision_awareness: La versión española sigue el sentido del griego de Swete 1909 y toma como control el audit trail inglés, que entiende ἐν χειρονομίαις como combate cuerpo a cuerpo y δοριαλώτους como un tecnicismo militar equivalente a prisioneros de guerra. Se evita una transliteración rígida de «manos» o de «capturados por la lanza» en el texto principal por razones de claridad, dejando esa tensión en la nota.
  spanish_consistency_notes:
  - Se mantiene el pasado narrativo impersonal con una construcción natural en español.
  - «Adversarios» conserva el alcance relacional de ἀντιπάλους sin intensificar innecesariamente el término.
  - «Combate cuerpo a cuerpo» reproduce el valor de ἐν χειρονομίαις conforme al audit trail inglés.
  - «Prisioneros de guerra» expresa el tecnicismo militar de δοριαλώτους; la nota preserva el matiz literal de la lanza.
