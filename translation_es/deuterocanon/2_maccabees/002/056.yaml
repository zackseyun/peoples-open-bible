translation:
  language: es
  text: Porque así como, en el caso de una casa nueva, el arquitecto debe preocuparse por toda la estructura, pero el que emprende decorarla[a] y pintarla debe considerar lo adecuado para el adorno, así también, pienso, sucede con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acondicionarla'; el verbo griego también puede denotar equipar o preparar una casa, no solo ornamentarla.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Porque, así como
  - Del mismo modo que
  lexicon: LSJ
  rationale: Introduzco la comparación de manera natural en español sin perder la estructura simétrica del griego. Mantengo el matiz correlativo de la similitud.
- source_word: ἀρχιτέκτονι
  english_pob_choice: architect
  chosen_spanish: arquitecto
  alternatives_spanish:
  - maestro de obras
  - constructor
  lexicon: LSJ
  rationale: El término griego apunta al diseñador o constructor principal; 'arquitecto' conserva mejor esa función técnica que un equivalente más general.
- source_word: τῆς ὅλης καταβολῆς
  english_pob_choice: the whole structure
  chosen_spanish: toda la estructura
  alternatives_spanish:
  - todo el fundamento
  - toda la cimentación
  lexicon: LSJ
  rationale: Aunque καταβολή puede referir a la colocación del fundamento, aquí el contexto arquitectónico amplio y la revisión inglesa favorecen una expresión que abarque el conjunto del edificio. 'Toda la estructura' evita estrechar indebidamente el sentido a solo cimientos.
- source_word: φροντιστέον
  english_pob_choice: must take thought for
  chosen_spanish: debe preocuparse por
  alternatives_spanish:
  - debe considerar
  - debe ocuparse de
  lexicon: LSJ
  rationale: La forma verbal impersonal expresa obligación y atención cuidadosa. En español, 'debe preocuparse por' comunica responsabilidad diligente sin sonar mecánico.
- source_word: ἐγκαινίζειν
  english_pob_choice: to decorate
  chosen_spanish: decorarla
  alternatives_spanish:
  - amueblarla
  - acondicionarla
  - festejarla/dedicarla
  lexicon: LSJ
  rationale: En este contexto unido a 'pintarla' y a 'adorno', la acción no es ceremonial sino de acondicionar ornamentalmente la casa. 'Decorarla' refleja esa función en español.
- source_word: ζωγραφεῖν
  english_pob_choice: to paint
  chosen_spanish: pintarla
  alternatives_spanish:
  - darle color
  - decorarla con pinturas
  lexicon: LSJ
  rationale: El verbo se refiere literalmente a pintar con color. 'Pintarla' mantiene la imagen concreta y la coordinación con 'decorarla'.
- source_word: τὰ ἐπιτήδεια
  english_pob_choice: the things suitable
  chosen_spanish: las cosas convenientes
  alternatives_spanish:
  - lo adecuado
  - los materiales apropiados
  lexicon: LSJ
  rationale: La expresión griega es amplia y apunta a lo apropiado o útil para el fin. 'Las cosas convenientes' conserva esa apertura sin restringirlo solo a materiales.
- source_word: πρὸς διακόσμησιν
  english_pob_choice: for adornment
  chosen_spanish: para el adorno
  alternatives_spanish:
  - para la decoración
  - para el embellecimiento
  lexicon: LSJ
  rationale: διακόσμησις implica ordenamiento ornamental. 'Adorno' preserva el sentido nominal y la elevación del paralelo arquitectónico.
- source_word: ἐξεταστέον
  english_pob_choice: must consider
  chosen_spanish: debe examinar
  alternatives_spanish:
  - debe considerar
  - debe revisar
  lexicon: LSJ
  rationale: La forma verbal expresa necesidad de revisar o ponderar cuidadosamente. 'Examinar' mantiene la idea de evaluación atenta que la revisión inglesa también buscó conservar.
- source_word: οὕτως δοκῶ καὶ ἐπὶ ἡμῶν
  english_pob_choice: so also, I think, it is with us
  chosen_spanish: así también, pienso, sucede con nosotros
  alternatives_spanish:
  - así también, creo, es con nosotros
  - de igual modo, me parece, se aplica a nosotros
  lexicon: LSJ
  rationale: Conservo el valor parentético de δοκῶ como juicio personal moderado y la aplicación inclusiva ἐπὶ ἡμῶν como 'con nosotros'.
translation_notes:
  revision_awareness: La revisión inglesa corrigió 'whole foundation' a 'whole structure' por mayor precisión de τῆς ὅλης καταβολῆς, y cambió 'examine' a 'consider' por naturalidad. En español opté por 'toda la estructura' para seguir esa precisión contextual, mientras que 'debe examinar' conserva la idea de ponderación cuidadosa sin volverse rígido; no se consideró necesario añadir nota porque la metáfora arquitectónica queda clara en el texto.
  spanish_consistency_notes:
  - Mantuve un registro sobrio y público, adecuado para un texto bíblico de lectura eclesial.
  - Usé 'arquitecto' en lugar de un término más antiguo para conservar el valor técnico del griego.
  - No empleé 'SEÑOR' ni terminología litúrgica no presente en el pasaje.
  - Conservé la metáfora completa de construcción y ornamentación sin interpretarla alegóricamente.
