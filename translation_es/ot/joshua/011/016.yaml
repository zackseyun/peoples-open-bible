translation:
  language: es
  text: 'Así Josué tomó toda esta tierra: la región montañosa, todo el Negev, toda la tierra de Gosén[c], la tierra baja[a], el Arabá[b], la región montañosa de Israel y su tierra baja.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la Sefela’ para ‘la tierra baja’ (también después en el versículo). El término hebreo se refiere a la zona baja de colinas entre la sierra central y la llanura costera.
    reason: lexical_alternative
  - marker: b
    text: ‘Arabá’ es un término geográfico regional; algunas versiones lo interpretan más libremente como ‘el valle del Jordán’ o ‘la llanura desértica’.
    reason: lexical_alternative
  - marker: c
    text: ‘La tierra de Gosén’ aquí se refiere a una región en Canaán, no necesariamente al Gosén de Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - se apoderó de
  lexicon: HALOT
  rationale: לקח significa literalmente ‘tomar’. En este resumen de conquista, ‘tomó’ es natural y directo en español, y no sobredetermina el matiz militar de ‘se apoderó de’.},{
- source_word: כָּל הָאָרֶץ הַזֹּאת
  english_pob_choice: all this land
  chosen_spanish: toda esta tierra
  alternatives_spanish:
  - todo este territorio
  - toda esta región
  lexicon: HALOT
  rationale: אֶרֶץ puede significar ‘tierra’, ‘territorio’ o ‘país’. ‘Tierra’ conserva bien la amplitud del término y la fuerza demostrativa de ‘esta’.
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la serranía
  - las montañas
  lexicon: HALOT
  rationale: En Josué, הָהָר suele referirse a una zona de altiplanicie o región montañosa, no solo a montes aislados. ‘Región montañosa’ transmite ese valor regional con claridad en español.
- source_word: הַנֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: el Negev
  alternatives_spanish:
  - el sur
  - la tierra del sur
  lexicon: HALOT
  rationale: Aquí funciona como nombre geográfico reconocido. Se conserva ‘Negev’ en la forma habitual en español para mantener el valor de región propia.
- source_word: אֶרֶץ הַגֹּשֶׁן
  english_pob_choice: the land of Goshen
  chosen_spanish: la tierra de Gosén
  alternatives_spanish:
  - el territorio de Gosén
  lexicon: HALOT
  rationale: La construcción se traduce de manera directa. ‘Gosén’ respeta la forma habitual en español, y ‘tierra de Gosén’ preserva el enlace constructo sin introducir identificación interpretativa en el texto principal.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefela
  alternatives_spanish:
  - la llanura baja
  - el llano
  lexicon: HALOT
  rationale: Aunque el sentido básico es ‘tierras bajas’, el término también designa una región geográfica específica. Se conserva ‘Sefela’ para mantener la referencia territorial estable, especialmente porque la tradición de la POB documentó la alternativa lexical entre ‘lowland’ y el nombre regional.
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: el Arabá
  alternatives_spanish:
  - el valle del Jordán
  - la llanura desértica
  lexicon: HALOT
  rationale: עֲרָבָה es un término geográfico regional. ‘Arabá’ preserva el nombre propio con la adaptación ortográfica usual en español, evitando restringirlo indebidamente a una sola interpretación geográfica.
- source_word: הַר יִשְׂרָאֵל
  english_pob_choice: the hill country of Israel
  chosen_spanish: la región montañosa de Israel
  alternatives_spanish:
  - las montañas de Israel
  lexicon: HALOT
  rationale: Se mantiene el mismo sentido regional que en הָהָר, ahora especificado por ‘de Israel’. ‘Región montañosa’ suena natural en español y conserva el contraste topográfico del hebreo.
- source_word: וּשְׁפֵלָתוֹ
  english_pob_choice: and its lowland
  chosen_spanish: y su Sefela
  alternatives_spanish:
  - y su región baja
  - y su llanura baja
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular remite con más naturalidad a ‘la región montañosa de Israel’. Como en el caso anterior, se conserva el nombre regional ‘Sefela’ para reflejar tanto el vínculo pronominal como la correspondencia topográfica.
theological_decisions:
- issue: Tratamiento de nombres geográficos regionales frente a traducción explicativa
  english_pob_reading: The English POB keeps 'the Negev' and 'the Arabah' as regional terms, while offering notes for interpretive alternatives and a cultural note on Goshen.
  chosen_spanish_reading: Se conservan los nombres geográficos como ‘el Negev’, ‘el Arabá’ y ‘la Sefela’, con nota para ‘Gosén’.
  alternative_spanish_readings:
  - el sur / la tierra del sur
  - el valle del Jordán / la llanura desértica
  - la llanura baja / las tierras bajas
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de lectura histórica y geográfica: mantener términos regionales evita borrar la precisión del listado territorial. Donde el español podría oscurecer el referente, se preserva el nombre propio o se aclara en nota.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el pasaje WLC y el audit trail inglés de la POB sin cambios sustantivos respecto de la última revisión, que fue marcada como de alta concordancia y sin necesidad de correcciones. Se mantuvo la tensión lexical entre traducción descriptiva y nombre regional en הָהָר/הַשְּׁפֵלָה, y entre equivalencia geográfica y transliteración en הַנֶּגֶב/הָעֲרָבָה.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aplica.
  - ‘Sefela’ se mantiene consistente para שְׁפֵלָה, con nota explicativa.
  - ‘Arabá’ se usa consistentemente para הָעֲרָבָה.
  - ‘Gosén’ sigue la forma española habitual del topónimo.
  - La puntuación y la segmentación siguen el estilo bíblico en español, con dos puntos para introducir la lista territorial.
