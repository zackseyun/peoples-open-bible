translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado de WLC y el control auditado en inglés. No hubo revisiones aplicadas en el último pase, y el acuerdo de revisión fue alto, por lo que la redacción española se mantiene alineada con la solución inglesa sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el colectivo amplio «ganado» y el más específico «rebaño», reflejando el contraste מִקְנֶה / צֹאן.
  - Se prefirió una secuencia verbal natural en español («y luego vayan») para reproducir la progresión imperativa del hebreo.
  - No se usó «SEÑOR» ni otras convenciones de masking porque el versículo no contiene el nombre divino.
