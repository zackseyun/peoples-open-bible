translation:
  language: es
  text: Entonces fue e hizo conforme a la palabra de Yahvé, y fue y permaneció junto al arroyo[a] Querit, que está frente al Jordán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi Querit» o «el torrente Querit»; el hebreo puede referirse a un wadi, barranco o cauce estacional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que está antes/frente al Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Entonces él fue
  alternatives_spanish:
  - Y fue
  - Así que fue
  - Luego fue
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; en español, «Entonces» comunica bien la secuencia narrativa sin forzar un calco. «Fue» es natural y fiel al movimiento narrativo.
- source_word: וַיַּעַשׂ כִּדְבַר יְהוָה
  english_pob_choice: did according to the word of Yahweh
  chosen_spanish: hizo conforme a la palabra de Yahvé
  alternatives_spanish:
  - hizo según la palabra de Yahvé
  - hizo como había dicho Yahvé
  - obedeció la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a la palabra» conserva la relación formal de obediencia a una instrucción verbal. Se mantiene «Yahvé» por la política del proyecto para יְהוָה.
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  - se estableció
  lexicon: HALOT
  rationale: Aquí ישב indica residir o permanecer en un lugar; «permaneció» es claro, natural y no sugiere más permanencia de la que el contexto inmediato warrants.
- source_word: בְּנַחַל
  english_pob_choice: by the Wadi
  chosen_spanish: junto al arroyo
  alternatives_spanish:
  - junto al wadi
  - en el torrente
  - junto al torrente
  lexicon: HALOT
  rationale: נחל puede designar un cauce estacional, valle o torrente. En español, «arroyo» comunica de modo comprensible la idea de curso de agua, aunque el término no agota todas las posibilidades semánticas; por eso se documenta la alternativa en nota.
- source_word: כְּרִית
  english_pob_choice: Cherith
  chosen_spanish: Querit
  alternatives_spanish:
  - Cherit
  - Querit
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se usa «Querit» para adaptar la ortografía al sistema gráfico español y mantener la pronunciación aproximada.
- source_word: אֲשֶׁר עַל פְּנֵי הַיַּרְדֵּן
  english_pob_choice: which is before the Jordan
  chosen_spanish: que está frente al Jordán
  alternatives_spanish:
  - que está delante del Jordán
  - que está opuesto al Jordán
  - que está antes del Jordán
  lexicon: HALOT
  rationale: 'La locución עַל־פְּנֵי tiene fuerza espacial flexible: «frente a» conserva la imagen relacional sin interpretar de más la dirección geográfica. «Jordán» funciona como nombre propio del río en español.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la norma del proyecto: el Tetragrámaton se traduce como «Yahvé» para preservar el nombre propio del pacto, no como un sustituto titulado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido espacial de עַל פְּנֵי הַיַּרְדֵּן
  english_pob_reading: before the Jordan
  chosen_spanish_reading: frente al Jordán
  alternative_spanish_readings:
  - antes del Jordán
  - opuesto al Jordán
  - al otro lado del Jordán
  rationale: La revisión inglesa reciente prefirió mayor cercanía lexical a la expresión hebrea evitando una dirección interpretativa explícita. En español, «frente al» conserva esa misma prudencia y la imagen espacial del texto.
  doctrine_reference: No doctrinal; decisión geográfica/lexical apoyada por la revisión textual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió la interpretación direccional de «east of the Jordan» a una formulación más literal («before the Jordan»). En español se evitó una dirección geográfica explícita y se optó por «frente al Jordán», manteniendo la relación espacial sin sobre-interpretarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió una transliteración española de lugar propia, «Querit», en lugar de una forma inglesa.
  - «Arroyo» se usa como equivalente funcional comprensible de נחל, con nota para preservar la amplitud semántica.
  - La puntuación y el orden mantienen un español natural sin perder la secuencia narrativa del hebreo.
