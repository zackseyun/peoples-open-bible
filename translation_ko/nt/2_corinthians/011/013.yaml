id: 2CO.11.13
reference: '2 Corinthians 11:13'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ γὰρ τοιοῦτοι ψευδαπόστολοι, ἐργάται δόλιοι, μετασχηματιζόμενοι εἰς ἀποστόλους Χριστοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/013.yaml
  text: For such men are false apostles[a], deceitful workers, disguising themselves as apostles of Messiah.
translation:
  language: ko
  text: 그런 자들은 거짓 사도들이며, 속이는 일꾼들이며, 자신을 메시아의 사도로 가장하는 자들입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ψευδαπόστολοι
  english_pob_choice: false apostles
  chosen_korean: 거짓 사도들
  lexicon: BDAG
  rationale: 강한 폴레믹 어휘. 약화하지 않고 「거짓 사도들」 그대로 옮긴다.
- source_word: δόλιοι
  english_pob_choice: deceitful
  chosen_korean: 속이는
  lexicon: BDAG
  rationale: 형용사. 「속이는」이 분명하다.
  alternatives_korean:
  - 기만하는
- source_word: μετασχηματιζόμενοι
  english_pob_choice: disguising themselves
  chosen_korean: 가장하는
  lexicon: BDAG
  rationale: '중간태 분사 「자신의 모습을 바꾸다」. 11:14-15의 핵심 어휘 동족.'
  alternatives_korean:
  - 변장하는
  - 위장하는
- source_word: ἀποστόλους Χριστοῦ
  english_pob_choice: apostles of Messiah
  chosen_korean: 메시아의 사도
  lexicon: BDAG
  rationale: 칭호 보존.
  alternatives_korean:
  - 그리스도의 사도
theological_decisions:
- issue: '11:13-15의 폴레믹 강도를 약화하지 말 것'
  chosen_reading: 거짓 사도들 / 속이는 일꾼들 / 사탄·빛의 천사 어휘를 그대로 보존
  alternative_readings:
  - 완곡한 어휘로 부드럽게
  rationale: 바울은 이 단락에서 적대자들을 가장 강한 어휘로 비판한다. 한국 전통 번역이 부드럽게 옮기는 경향이 있으나, 본문의 폴레믹 무게를 그대로 보존해야 저자의 의도가 전달된다.
  doctrine_reference: 'DOCTRINE.md §1, §5: preserve theological force; do not domesticate'
