    rationale: 'El inglés POB conserva dos observaciones distintas: una sobre la fórmula narrativa hebrea y otra sobre que el hebreo dice simplemente «oyó» y que «of it» se sobreentiende por el contexto. El español fusiona parcialmente esto pero omite la nota específica, perdiendo una decisión documentada del POB.'
  - severity: low
