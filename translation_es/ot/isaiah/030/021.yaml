translation:
  language: es
  text: 'Tus oídos oirán una palabra detrás de ti[a], diciendo: “Este es el camino; anda por él”, cuando vayas a la derecha y cuando vayas a la izquierda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “cuando gires a la derecha y cuando gires a la izquierda”. Los verbos hebreos de esta última cláusula son difíciles; el sentido es que la guía vendrá siempre que estés por ir hacia uno u otro lado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְנֶיךָ
  english_pob_choice: your ears
  chosen_spanish: tus oídos
  alternatives_spanish:
  - tu oído
  lexicon: HALOT
  rationale: El hebreo usa un plural con sufijo de 2ms; en español, el plural concreto “oídos” conserva la imagen corporal y concuerda naturalmente con el verbo plural posterior.
- source_word: תִּשְׁמַעְנָה
  english_pob_choice: shall hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - escucharán
  lexicon: HALOT
  rationale: El verbo expresa percepción auditiva y en español “oirán” reproduce con precisión la acción de oír, manteniendo el futuro profético sin sobrecargar el sentido.
- source_word: דָבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - algo
  lexicon: HALOT
  rationale: “Palabra” es la correspondencia más directa y breve; conserva la concisión del hebreo sin introducir mayor especificación interpretativa.
- source_word: מֵאַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - desde detrás de ti
  - a tu espalda
  lexicon: HALOT
  rationale: “Detrás de ti” es idiomático y mantiene la imagen espacial de una voz de guía que llega desde atrás.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: que dirá
  alternatives_spanish:
  - diciendo
  - y dirá
  lexicon: HALOT
  rationale: En español, “que dirá” integra de forma natural la introducción del discurso directo y evita una construcción demasiado literal.
- source_word: זֶה הַדֶּרֶךְ
  english_pob_choice: This is the way
  chosen_spanish: Este es el camino
  alternatives_spanish:
  - Este es el sendero
  - Este es la vía
  lexicon: HALOT
  rationale: “Camino” es la traducción más natural y bíblicamente resonante de דֶּרֶךְ, sin precisar indebidamente si se trata de ruta literal o de conducta.
- source_word: לְכוּ ב֔וֹ
  english_pob_choice: walk in it
  chosen_spanish: anden por él
  alternatives_spanish:
  - vayan por él
  - caminen en él
  lexicon: HALOT
  rationale: El imperativo plural requiere una forma plural en español; “anden por él” conserva la metáfora del caminar/ir por el camino y suena natural y reverente.
- source_word: תַאֲמִינוּ
  english_pob_choice: when you turn to the right
  chosen_spanish: cuando te desvíes a la derecha
  alternatives_spanish:
  - cuando giren a la derecha
  - cuando te inclines a la derecha
  lexicon: HALOT
  rationale: El hebreo es un crux; siguiendo la lectura auditada del POB, se traduce con una idea direccional. “Desvíes” captura el matiz de inclinarse o apartarse hacia un lado sin forzar una explicación técnica.
- source_word: תַשְׂמְאִילוּ
  english_pob_choice: and when you turn to the left
  chosen_spanish: y cuando te desvíes a la izquierda
  alternatives_spanish:
  - o cuando giren a la izquierda
  - y cuando te inclines a la izquierda
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el hemistiquio anterior y la misma solución direccional, preservando la ambigüedad del hebreo dentro de un español claro.
theological_decisions:
- issue: Identidad y mecanismo de la voz que guía
  english_pob_reading: A divinely given guiding word without specifying mechanism
  chosen_spanish_reading: Una palabra de guía dada por Dios, sin precisar el medio exacto
  alternative_spanish_readings:
  - la voz de un maestro
  - el impulso interior de la conciencia
  - la instrucción profética
  rationale: La cláusula promete guía, pero no define explícitamente el mediador ni el mecanismo. El español conserva la imagen de una voz/palabra que orienta sin resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión textual sin añadir una explicación doctrinal no explicitada por el versículo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustanciales y que el texto mantiene un alto nivel de acuerdo con el control cruzado; por eso se conserva la solución direccional auditada para los verbos difíciles del final del versículo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma de este proyecto solo cuando el hebreo explicita el nombre divino; en este versículo no aparece.
  - Se usa “camino” para דֶּרֶךְ por coherencia con el registro bíblico y para evitar una especificación innecesaria.
  - Se conserva el plural de “oídos” y la concordancia plural del verbo inicial.
  - La nota al pie marca la alternativa interpretativa del par final de verbos, siguiendo el aviso del POB en inglés.
