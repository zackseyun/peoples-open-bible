translation:
  language: es
  text: 'Y Dios le dijo: «Tu nombre es Jacob. Tu nombre ya no será llamado Jacob, sino Israel será tu nombre». Y lo llamó Israel[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y le puso por nombre Israel». El hebreo, más literalmente, dice: «Y llamó su nombre Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios(es)
  lexicon: HALOT
  rationale: En este contexto, aunque el sustantivo es morfológicamente plural, lleva verbo singular y designa claramente al único Dios; por eso en español corresponde «Dios».
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - el nombre que tienes
  lexicon: HALOT
  rationale: La repetición enfática del hebreo se conserva con la formulación directa y natural «tu nombre».
- source_word: לֹא יִקָּרֵא ... עוֹד
  english_pob_choice: will no longer be called
  chosen_spanish: No se llamará más
  alternatives_spanish:
  - No será llamado más
  - No volverá a llamarse
  lexicon: HALOT
  rationale: El nifal de קרא en sentido de nombrar pide una pasiva natural en español. «No se llamará más» expresa bien la cesación indicada por לֹא ... עוֹד sin sonar forzado.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: En español, la correlación negativa «no ... sino ...» refleja con precisión la sustitución/contraste del hebreo en una construcción más idiomática que «pero».
- source_word: יִשְׂרָאֵל יִהְיֶה שְׁמֶךָ
  english_pob_choice: Israel shall be your name
  chosen_spanish: Israel será tu nombre
  alternatives_spanish:
  - tu nombre será Israel
  lexicon: HALOT
  rationale: Se conserva el énfasis en el nuevo nombre con una sintaxis natural en español. La palabra «será» mantiene el valor formal de la declaración.
- source_word: וַיִּקְרָא אֶת שְׁמוֹ יִשְׂרָאֵל
  english_pob_choice: And he called his name Israel
  chosen_spanish: Y llamó su nombre Israel
  alternatives_spanish:
  - Y lo nombró Israel
  - Y lo llamó Israel
  lexicon: HALOT
  rationale: La fórmula hebrea literalmente dice «llamó su nombre Israel». En español, esa estructura es inteligible y más transparente para auditar la fuente que el más libre «lo nombró Israel».
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio estándar en transliteración tradicional.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio estándar en transliteración tradicional.
theological_decisions:
- issue: Cómo reflejar la declaración de cambio de nombre sin borrar la tensión narrativa posterior en la que Jacob sigue siendo llamado Jacob
  english_pob_reading: Your name shall no longer be called Jacob, but Israel shall be your name.
  chosen_spanish_reading: No se llamará más tu nombre Jacob, sino Israel será tu nombre.
  alternative_spanish_readings:
  - No volverá a llamarse tu nombre Jacob, sino Israel será tu nombre.
  - Tu nombre no será llamado más Jacob, sino Israel será tu nombre.
  rationale: La frase española conserva el acto solemne de renombramiento sin añadir una explicación armonizadora. No absolutiza el abandono del nombre antiguo; simplemente reproduce la declaración tal como aparece en el hebreo y en la POB inglesa.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla.'
- issue: Si la última cláusula debe suavizarse como una paráfrasis de nombramiento o mantenerse como fórmula literal
  english_pob_reading: And he called his name Israel.
  chosen_spanish_reading: Y llamó su nombre Israel.
  alternative_spanish_readings:
  - Y le puso por nombre Israel.
  - Y lo llamó Israel.
  rationale: Se mantiene la fórmula nominal más literal que el hebreo, porque el texto enfatiza el acto de nombrar con אֶת־שְׁמוֹ. Esto evita perder una señal auditiva importante del original.
  doctrine_reference: Transparencia lexical y audit trail del nombre propio.
translation_notes:
  revision_awareness: He seguido la revisión más reciente de la POB en inglés, conservando el registro formal («será») y la coordinación simple con «Y». También he respetado la nota de alternativa para la fórmula final de nombramiento, trasladándola al español sin introducir una lectura doctrinal adicional.
  spanish_consistency_notes:
  - He usado «Dios» para אֱלֹהִים por tratarse del referente singular en este contexto.
  - He empleado «sino» para כִּי אִם porque en español expresa mejor la sustitución negativa.
  - He mantenido «Israel» y «Jacob» como nombres propios sin adaptar su forma.
  - No he usado «SEÑOR» ni otras mayúsculas de sustitución porque aquí no aparece יהוה en el hebreo base.
  - La nota al pie queda anclada en la cláusula final para reflejar la alternativa de traducción del acto de nombrar.
