translation:
  language: es
  text: 'Yo, Yahvé, he hablado[a]. Ciertamente[b] haré esto a toda esta mala congregación[c], a los que se han reunido contra mí: en este desierto llegarán a su fin, y allí morirán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«he hablado» conserva el perfecto hebreo con fuerza actual: una palabra ya pronunciada y vigente en su efecto.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo idiomático es literalmente «si no», pero aquí funciona como afirmación enfática de certeza.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «asamblea» o «comunidad»; «congregación» conserva mejor el sentido corporativo del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio del POB en inglés. «Yahvé» es la forma establecida en español para este nombre y evita la sustitución por un título.
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - he dicho
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una խոսa divina ya pronunciada con fuerza vigente en el contexto; «he hablado» mantiene la solemnidad y el valor de acción completada con presente relevancia.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Seguro
  lexicon: HALOT
  rationale: En este contexto juramentario, la locución no es condicional literal sino una afirmación enfática. «Ciertamente» transmite la certeza solemne sin sonar forzado en español.
- source_word: זֹאת אֶעֱשֶׂה
  english_pob_choice: I will do this
  chosen_spanish: haré esto
  alternatives_spanish:
  - esto haré
  - haré esta cosa
  lexicon: HALOT
  rationale: Se conserva la deixis de «esto» y el futuro directo del verbo, sin añadir explicaciones que no están en el hebreo.
- source_word: הָעֵדָה
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: «Congregación» refleja el sentido corporativo de עֵדָה y coincide con la decisión auditada del POB. Mantiene el tono judicial y comunitario del pasaje.
- source_word: הָרָעָה
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - maligna
  - perversa
  lexicon: HALOT
  rationale: Aquí el hebreo evalúa moralmente al grupo. En español, «mala» conserva la calificación directa sin endurecer innecesariamente el tono; el contexto deja claro el juicio divino.
- source_word: הַנּוֹעָדִים עָלַי
  english_pob_choice: who have gathered together against me
  chosen_spanish: que se ha reunido contra mí
  alternatives_spanish:
  - que se han reunido contra mí
  - que se han congregado contra mí
  - que se han juntado contra mí
  lexicon: HALOT
  rationale: El participio nifal indica reunión concertada en oposición a Yahvé. En español, «se ha reunido contra mí» conserva la idea de reunión hostil; se usa singular colectivo porque el referente es «congregación».
- source_word: בַּמִּדְבָּר הַזֶּה
  english_pob_choice: in this wilderness
  chosen_spanish: en este desierto
  alternatives_spanish:
  - en este yermo
  - en este desierto de aquí
  lexicon: HALOT
  rationale: Aunque el POB inglés usa «wilderness», en español «desierto» comunica bien el ámbito del éxodo y es idiomático. Se mantiene el demostrativo «este» para reflejar el hebreo.
- source_word: יִתַּמּוּ
  english_pob_choice: will come to an end
  chosen_spanish: se acabará[n]
  alternatives_spanish:
  - llegarán a su fin
  - serán consumidos
  - se terminarán
  lexicon: HALOT
  rationale: El verbo expresa acabar/terminar. Se eligió una forma verbal natural en español para indicar consumación bajo juicio sin convertirla prematuramente en la muerte explícita del siguiente cola.
- source_word: וְשָׁם יָמֻתוּ
  english_pob_choice: and there they will die
  chosen_spanish: y allí morirán
  alternatives_spanish:
  - y allí morirán ellos
  - y allí fallecerán
  lexicon: HALOT
  rationale: Se conserva la localización enfática «allí» y el verbo directo «morirán». La repetición del sujeto es innecesaria en español y se omite por fluidez.
theological_decisions:
- issue: Valor de אִם לֹא en una declaración divina
  english_pob_reading: An emphatic assertion ('Surely I will do this')
  chosen_spanish_reading: Una afirmación solemne y enfática («Ciertamente…»).
  alternative_spanish_readings:
  - 'Una forma más literal pero menos natural: «si no, haré esto».'
  rationale: El hebreo funciona como fórmula juramentaria de certeza, no como condicional abierto. Traducirlo con «Ciertamente» preserva la fuerza de la declaración divina sin introducir ambigüedad innecesaria.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar el juicio corporativo sobre עֵדָה
  english_pob_reading: '''congregation'''
  chosen_spanish_reading: «congregación»
  alternative_spanish_readings:
  - «asamblea»
  - «comunidad»
  rationale: El texto juzga al pueblo como cuerpo colectivo. «Congregación» conserva la dimensión formal y corporativa sin proyectar categorías eclesiales posteriores.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: la solución inglesa ya fue considerada estable y no requirió cambios; la versión española sigue el mismo conjunto de decisiones léxicas y teológicas, adaptándolas a un español natural y fiel.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, en consonancia con el estándar del proyecto.
  - Se evitó «SEÑOR» como sustituto del Tetragrámaton.
  - «Congregación» preserva el valor colectivo de עֵדָה y la carga judicial del contexto.
  - El par «se acabará... y allí morirán» conserva la progresión hebrea entre consumación y muerte.
  - La puntuación con dos puntos refleja la transición del juramento a la sentencia.
  - Se usó singular colectivo en «se ha reunido» por concordancia natural con «congregación».
