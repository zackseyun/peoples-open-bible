translation:
  language: es
  text: 'Y cuando llegaron a las naciones adonde fueron, profanaron mi santo nombre, porque la gente decía de ellos[a]: «Estos son el pueblo de Yahvé, y sin embargo tuvieron que salir de su tierra».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cuando se les decía»; en el contexto, el sentido es que esto se decía acerca de ellos entre las naciones.
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero salieron de su tierra». El hebreo implica la vergüenza del exilio sin decir explícitamente quién los hizo salir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: when they came
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - cuando vinieron
  - y llegaron
  lexicon: HALOT
  rationale: El hebreo tiene forma singular, pero el contexto inmediato usa sujetos plurales colectivos. «Llegaron» mantiene el sentido distributivo y suena natural en español, sin perder la referencia al grupo de Israel.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel se trata de naciones extranjeras. «Naciones» conserva el valor histórico y evita la carga confesional posterior de «gentiles».
- source_word: וַיְחַלְּלוּ
  english_pob_choice: they profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - desecraron
  - contaminaron
  - trataron como común
  lexicon: HALOT
  rationale: «Profanar» preserva la fuerza cultual y teológica de חלל respecto del nombre santo de Dios.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  - mi nombre sagrado
  lexicon: HALOT
  rationale: En español, «santo nombre» comunica de forma natural la expresión hebrea sin perder la referencia a la reputación y revelación de Dios.
- source_word: בֶּאֱמֹר לָהֶם
  english_pob_choice: in that people said of them
  chosen_spanish: al decir de ellos
  alternatives_spanish:
  - cuando se dijo de ellos
  - porque se dijo de ellos
  - al decirles
  lexicon: HALOT
  rationale: La construcción hebrea introduce la circunstancia por la que se profana el nombre. «Al decir de ellos» mantiene la relación de discurso acerca de Israel y evita resolver demasiado la agencia.
- source_word: עַם יְהוָה אֵלֶּה
  english_pob_choice: These are the people of Yahweh
  chosen_spanish: Estos son el pueblo de Yahvé
  alternatives_spanish:
  - Estos son los pueblos de Yahvé
  - Este es el pueblo de Yahvé
  lexicon: HALOT
  rationale: La frase conserva el demostrativo plural «Estos» y el sustantivo colectivo «pueblo». Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el default español del proyecto para el Tetragrámaton: «Yahvé».'
- source_word: וּמֵאַרְצוֹ יָצָאוּ
  english_pob_choice: and yet they had to go out of his land
  chosen_spanish: y tuvieron que salir de su tierra
  alternatives_spanish:
  - y salieron de su tierra
  - pero salieron de su tierra
  - y fueron expulsados de su tierra
  lexicon: HALOT
  rationale: «Tuvieron que salir» expresa la vergüenza implícita del exilio sin afirmar de forma explícita un agente expulsor, coherente con la observación del auditorio inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre del pacto según el estándar del proyecto en español, en lugar de sustituirlo por una máscara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: ¿Quién profana el nombre de Dios?
  english_pob_reading: Israel profaned God's name indirectly by their condition among the nations, as expressed through what was said about them
  chosen_spanish_reading: Israel profana el nombre santo de Dios por la situación en que queda entre las naciones y por lo que se dice de ellos
  alternative_spanish_readings:
  - las naciones profanan el nombre de Dios al decir esto
  - el texto deja comprimida la agencia entre Israel y el խոս?
  rationale: 'La cláusula mantiene la tensión: el sujeto verbal es Israel/colectivo, pero el mecanismo inmediato es la voz de las naciones acerca de ellos. No se resuelve de manera reductiva una sola agencia.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail, que prefirió una clausula más directa para la construcción infinitiva hebrea; en español se resolvió con «al decir de ellos» para mantener naturalidad y relación causal sin perder la ambigüedad de agencia. También se siguió el criterio del proyecto para YHWH como «Yahvé» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de «SEÑOR» para ser consistente con el término divino del proyecto.
  - «Profanaron» conserva el valor cultual de חלל y armoniza con el léxico usado en otras secciones proféticas.
  - «Tuvieron que salir» preserva la insinuación de exilio sin introducir un pasivo no explicitado por el hebreo.
  - Las comillas y la puntuación siguen un estilo bíblico publicación-listo para español.
