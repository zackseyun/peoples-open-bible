revisions:
- from: Anduvo en todos los caminos de Asa, su padre[a]; no se apartó de ellos, haciendo lo que era recto a los ojos de Yahvé[b].
  to: Anduvo en todos los caminos de Asa su padre[a]; no se apartó de ellos, haciendo lo que era recto a los ojos de Yahvé[b].
  rationale: Se mantiene la traducción principal casi intacta porque es fiel y legible, pero se mejora la naturalidad de la fórmula filial (‘Asa su padre’) y se corrige la nota [a] para que refleje más de cerca las alternativas léxicas documentadas en el English POB, sin introducir una paráfrasis interpretativa nueva.
