translation:
  language: es
  text: No seguirás a la mayoría para hacer el mal, ni testificarás en un litigio[a] para desviarte siguiendo a la mayoría, para pervertir la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni responderás en un litigio para apartarte tras la mayoría, para torcer el juicio».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: תִהְיֶה אַחֲרֵי רַבִּים
  english_pob_choice: follow the many
  chosen_spanish: seguirás a la mayoría
  alternatives_spanish:
  - irás tras la mayoría
  - seguirás tras los muchos
  lexicon: HALOT
  rationale: La construcción hebrea con היה + אחרי expresa ir tras, seguir o ponerse del lado de. En español, «seguirás a la mayoría» transmite bien la idea de adherirse al grupo numeroso, manteniendo el valor exhortativo sin sonar forzado.
- source_word: לְרָעֹת
  english_pob_choice: to do evil
  chosen_spanish: para hacer el mal
  alternatives_spanish:
  - para hacer lo malo
  - para hacer el mal
  lexicon: HALOT
  rationale: El infinitivo con ל indica finalidad, y רָעֹת aquí tiene fuerza moral. «Para hacer el mal» conserva esa fuerza ética de forma natural en español.
- source_word: תַעֲנֶה
  english_pob_choice: testify
  chosen_spanish: responderás
  alternatives_spanish:
  - testificarás
  - darás testimonio
  lexicon: HALOT
  rationale: En este contexto judicial, ענה puede referirse a responder en calidad de compareciente o testigo. El texto hebreo admite esta tensión, por eso se mantiene «responderás» en el cuerpo principal y se deja la lectura forense explícita en la nota.
- source_word: עַל רִיב
  english_pob_choice: in a dispute
  chosen_spanish: en un litigio
  alternatives_spanish:
  - en una disputa
  - en un caso
  lexicon: HALOT
  rationale: רִיב tiene un claro trasfondo legal. «Litigio» hace visible ese matiz jurídico mejor que un término más genérico, sin salir del rango semántico del hebreo.
- source_word: לִנְטֹת
  english_pob_choice: so as to turn aside
  chosen_spanish: para apartarte
  alternatives_spanish:
  - para desviarte
  - para inclinarte
  lexicon: HALOT
  rationale: נטה literalmente es inclinar, apartar o desviar. «Para apartarte» comunica bien la idea de desviación intencional en el marco legal y moral del versículo.
- source_word: אַחֲרֵי רַבִּים
  english_pob_choice: after the many
  chosen_spanish: tras la mayoría
  alternatives_spanish:
  - tras los muchos
  - siguiendo a la mayoría
  lexicon: HALOT
  rationale: Repetir la idea de אחרי רבים como «tras la mayoría» preserva el énfasis del hebreo y su posible referencia a la presión del número mayor, sin suavizarla.
- source_word: לְהַטֹּת
  english_pob_choice: to pervert justice
  chosen_spanish: para pervertir la justicia
  alternatives_spanish:
  - para torcer el juicio
  - para desviar la justicia
  lexicon: HALOT
  rationale: El hiphil de נטה en contexto judicial apunta a torcer o pervertir el juicio/justicia. «Pervertir la justicia» sigue de cerca la decisión del POB en inglés y expresa con claridad el objeto implícito.
theological_decisions:
- issue: Objeto jurídico implícito en la cláusula final
  english_pob_reading: Explicitly render the implied legal object as 'justice' in 'to pervert justice.'
  chosen_spanish_reading: Expresar explícitamente el objeto jurídico implícito como «la justicia».
  alternative_spanish_readings:
  - para torcer el juicio
  - para desviar la justicia
  rationale: El hebreo final es breve, pero el contexto inmediato habla de testimonio y litigio; por tanto, el objeto implícito es el orden judicial justo. No se añade doctrina ajena, sino una aclaración contextual necesaria para el español.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza normativa de la prohibición
  english_pob_reading: You shall not...
  chosen_spanish_reading: No seguirás... / ni responderás...
  alternative_spanish_readings:
  - No debes seguir...
  - No seguirás...
  rationale: En castellano bíblico contemporáneo, el futuro prohibitivo conserva bien la fuerza normativa del hebreo jussivo/impf. negado. Mantiene solemnidad y claridad sin recurrir a formas menos idiomáticas.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura auditada del POB en inglés y conserva la tensión lexical de תַעֲנֶה: puede leerse como «responder» en un contexto judicial, o como «testificar». La nota recoge esa alternativa sin resolverla de forma simplista. No hubo revisiones previas aplicadas en el paquete fuente, y el estado de revisión indica concordancia alta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda al Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «justicia» como objeto explícito del verbo final, coherente con el audit trail inglés.
  - Se usa «la mayoría» para רַבִּים, respetando el matiz de presión numérica más que una referencia técnica a una institución.
