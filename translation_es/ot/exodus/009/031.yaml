translation:
  language: es
  text: Y el lino y la cebada fueron abatidos, porque la cebada estaba en espiga[a] y el lino en brote[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba madurando» para «estaba en espiga».
    reason: lexical_alternative
  - marker: b
    text: O «en flor» para «en brote».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפִּשְׁתָּה
  english_pob_choice: the flax
  chosen_spanish: la linaza
  alternatives_spanish:
  - el lino
  - la planta del lino
  lexicon: HALOT
  rationale: פִּשְׁתָּה designa el lino como cultivo; en español, "linaza" comunica con naturalidad la planta/cultivo afectado por la plaga y mantiene el valor agrícola directo. "Lino" puede sonar más al material textil, aunque es posible; se explica la alternativa en nota cuando ayuda a la lectura.
- source_word: הַשְּׂעֹרָה
  english_pob_choice: the barley
  chosen_spanish: la cebada
  alternatives_spanish:
  - el grano de cebada
  lexicon: HALOT
  rationale: שְׂעֹרָה se refiere de manera directa a la cebada; "la cebada" es la equivalencia natural y precisa en español.
- source_word: נֻכָּתָה
  english_pob_choice: were struck down
  chosen_spanish: fueron destruidas
  alternatives_spanish:
  - fueron golpeadas
  - fueron abatidas
  - fueron arruinadas
  lexicon: HALOT
  rationale: El pasivo de נכה expresa daño devastador causado por el granizo. En español, "fueron destruidas" comunica el efecto del golpe con claridad y fuerza, sin reducirlo a un mero golpe físico.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón del daño; "porque" es la forma más clara y directa en español moderno.
- source_word: אָבִיב
  english_pob_choice: in the ear
  chosen_spanish: en espiga
  alternatives_spanish:
  - en la espiga
  - en grano
  - madurando
  lexicon: HALOT
  rationale: אָבִיב alude al cereal cuando ya ha formado espiga/espiga emergente y está en etapa temprana de maduración. "En espiga" conserva la imagen concreta y evita interpretar demasiado; la nota mantiene la alternativa agrícola de "madurando".
- source_word: גִּבְעֹל
  english_pob_choice: in bud
  chosen_spanish: en flor
  alternatives_spanish:
  - en brote
  - en capullo
  - en botones
  lexicon: HALOT
  rationale: Para el lino, גִּבְעֹל señala una etapa avanzada de desarrollo, probablemente brotando o floreciendo. "En flor" es una solución natural en español y preserva la idea de una etapa ya desarrollada, compatible con la ambigüedad del hebreo y la nota inglesa "in bud" / "in blossom".
theological_decisions:
- issue: Efecto devastador de la plaga sobre los cultivos
  english_pob_reading: were struck down
  chosen_spanish_reading: fueron destruidas
  alternative_spanish_readings:
  - fueron abatidas
  - fueron golpeadas
  - fueron arruinadas
  rationale: La lectura inglesa transmite destrucción agrícola causada por el granizo. En español, "destruidas" conserva la gravedad del juicio sin añadir contenido doctrinal ajeno al versículo.
  doctrine_reference: Éxodo 9:31-32; juicio divino sobre Egipto
- issue: Ambigüedad agrícola de la etapa del cereal
  english_pob_reading: the barley was in the ear
  chosen_spanish_reading: la cebada estaba en espiga
  alternative_spanish_readings:
  - la cebada estaba madurando
  - la cebada estaba en la espiga
  rationale: El hebreo describe una fase del crecimiento del grano. "En espiga" mantiene el carácter concreto del original y deja abierta la posibilidad de maduración, sin sobreinterpretar.
  doctrine_reference: HALOT sobre אָבִיב; Éxodo 9:31
- issue: Ambigüedad agrícola de la etapa del lino
  english_pob_reading: the flax was in bud / in blossom
  chosen_spanish_reading: la linaza en flor
  alternative_spanish_readings:
  - la linaza en brote
  - la linaza en capullo
  rationale: La tradición inglesa conservó la tensión entre "bud" y "blossom". "En flor" es suficientemente amplia para abarcar una etapa avanzada del lino y mantiene la ambigüedad sin resolverla de forma excesiva.
  doctrine_reference: HALOT sobre גִּבְעֹל; Éxodo 9:31
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando marcadores de nota exactamente anclados en el texto español. También se evitó crear notas sin anclaje y se mantuvo la tensión agrícola del hebreo con equivalencias españolas publicables.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera explícitamente; aquí no aparece ningún tetragrámaton.
  - '"Linaza" se eligió por naturalidad agrícola en español; se preserva la alternativa "lino" en nota.'
  - Se mantuvo el paralelismo del hebreo con dos miembros coordinados y una cláusula causal.
  - Se evitó una traducción mecánica del inglés; la etapa del lino se expresó con una opción española idiomática pero controlada por la ambigüedad del hebreo.
