lexical_decisions:
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - conocer
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad en la serie programática del prólogo; en español, «para conocer» conserva ese valor teleológico de modo natural y evita una traducción excesivamente literal.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente estándar y más fiel en Proverbios para חָכְמָה, manteniendo su sentido moral y práctico sin reducirlo a mera inteligencia.
- source_word: מוּסָר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: La POB en inglés eligió «instruction» para preservar el alcance pedagógico amplio de מוּסָר, dejando visible la posibilidad de un matiz correctivo; «instrucción» comunica bien ese campo en español y evita una limitación prematura a «disciplina».
- source_word: לְהָבִין
  english_pob_choice: to understand
  chosen_spanish: para comprender
  alternatives_spanish:
  - para discernir
  lexicon: HALOT
  rationale: La segunda forma infinitiva también expresa finalidad. «Comprender» es el equivalente español más natural y mantiene el paralelismo con «conocer» sin perder el sentido de captar intelectualmente.
- source_word: אִמְרֵי
  english_pob_choice: words of
  chosen_spanish: palabras de
  alternatives_spanish:
  - dichos de
  - sentencias de
  lexicon: HALOT
  rationale: El constructo plural apunta a expresiones pronunciadas. «Palabras de» es la solución más directa y readable en español, conservando la relación constructa sin introducir una interpretación más estrecha que la del hebreo.
- source_word: בִינָה
  english_pob_choice: insight
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: Para evitar una repetición artificial con «comprender», «entendimiento» funciona bien como equivalente del campo semántico de בִינָה. «Insight» sería menos natural en español bíblico; «discernimiento» es viable, pero aquí «entendimiento» refleja mejor la amplitud del término.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa POB están en acuerdo alto y sin revisiones aplicadas; por ello la versión española sigue de cerca la estructura de finalidad del hebreo y conserva las alternativas léxicas documentadas en las notas.
  spanish_consistency_notes:
  - Mantengo un estilo sobrio y bíblico, con español moderno y claro.
  - Conservo la paralelidad de los dos infinitivos de finalidad («para conocer… para comprender…»).
  - Uso términos de campo semántico de sabiduría («sabiduría», «instrucción», «entendimiento») sin sustituirlos por formulaciones doctrinales ajenas al texto.
