translation:
  language: es
  text: 'y con él, Lisias, el guardián y supervisor de los asuntos[a], cada uno con una fuerza griega: once miríadas de infantes[b], cinco mil trescientos jinetes, veintidós elefantes y trescientos carros con guadañas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega τὸν ἐπίτροπον καὶ ἐπὶ τῶν πραγμάτων también puede traducirse «el regente y el encargado de los asuntos». Los títulos de Lisias indican tutela delegada y autoridad administrativa.
    reason: alternative_reading
  - marker: b
    text: El griego dice literalmente «once miríadas de infantes»; es decir, 110.000 soldados de a pie. Se conserva «miríadas» para transparentar la forma numérica del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: LSJ
  rationale: Expresa acompañamiento de manera natural y formal en español, sin añadir matices que no están en el griego.
- source_word: Λυσίαν
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: Transliteración estándar
  rationale: Se adapta el nombre propio a la forma española usual y legible, manteniendo la identificación transparente con el griego.
- source_word: τὸν ἐπίτροπον
  english_pob_choice: the guardian
  chosen_spanish: el guardián
  alternatives_spanish:
  - el regente
  - el administrador
  - el supervisor
  lexicon: LSJ
  rationale: ἐπίτροπος puede denotar a quien tiene tutela o custodia delegada; 'guardián' conserva ese sentido sin fijar más de lo que permite el texto.
- source_word: καὶ ἐπὶ τῶν πραγμάτων
  english_pob_choice: and overseer of affairs
  chosen_spanish: y encargado de los asuntos
  alternatives_spanish:
  - y supervisor de los asuntos
  - y sobre los asuntos
  lexicon: LSJ
  rationale: La expresión idiomática indica autoridad administrativa sobre asuntos públicos; 'encargado de los asuntos' comunica la función de forma clara y sobria, manteniendo la ambigüedad entre tutela y administración.
- source_word: ἕκαστον ἔχοντα δύναμιν Ἑλληνικὴν
  english_pob_choice: each having a Greek force
  chosen_spanish: cada uno con una fuerza griega
  alternatives_spanish:
  - cada uno con una fuerza helénica
  - cada uno con un ejército griego
  lexicon: LSJ
  rationale: Se conserva la referencia a una 'fuerza griega' para reflejar el adjetivo Ἑλληνικήν sin explicarlo como nacionalidad estricta; en español es suficientemente natural y transparente.
- source_word: πεζῶν μυριάδας ἕνδεκα
  english_pob_choice: eleven myriads of infantry
  chosen_spanish: once miríadas de infantes
  alternatives_spanish:
  - ciento diez mil infantes
  - once decenas de millares de infantes
  lexicon: LSJ
  rationale: '''Miríadas'' conserva la forma numérica del griego (diez mil por unidad), como hace el POB en inglés, y mantiene la transparencia del dato.'
- source_word: ἱππέων πεντακισχιλίους τριακοσίους
  english_pob_choice: five thousand three hundred cavalry
  chosen_spanish: cinco mil trescientos jinetes
  alternatives_spanish:
  - cinco mil trescientos de caballería
  lexicon: LSJ
  rationale: '''Jinetes'' traduce de forma directa ἱππέων y es natural en español para tropas montadas; ''caballería'' sería más colectivo, pero menos literal.'
- source_word: ἐλέφαντας εἴκοσι δύο
  english_pob_choice: twenty-two elephants
  chosen_spanish: veintidós elefantes
  lexicon: LSJ
  rationale: Traducción directa del número y el sustantivo, sin necesidad de glosa adicional.
- source_word: ἅρματα δὲ δρεπανηφόρα τριακόσια
  english_pob_choice: three hundred scythed chariots
  chosen_spanish: trescientos carros guadañeros
  alternatives_spanish:
  - trescientos carros con guadañas
  - trescientos carros falcados
  lexicon: LSJ
  rationale: '''Carros guadañeros'' reproduce el sentido de ''scythed chariots'' de forma comprensible en español; ''falcados'' es más técnico pero menos transparente para lectores amplios.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió 'overseer of affairs' frente a 'administrator of affairs' para ἐπὶ τῶν πραγμάτων. En español se optó por una solución equivalente y natural ('encargado de los asuntos') sin perder la función administrativa ni la posible resonancia de tutela/regencia del título ἐπίτροπος.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no pertinente aquí, pues el versículo no contiene el nombre divino.
  - Se preservó la numeración griega transparente con 'miríadas', en continuidad con la decisión auditada del POB inglés.
  - Se usó 'elefantes' y 'carros guadañeros' por su correspondencia directa con el léxico militar del pasaje.
  - Se eligió 'Lisias' como forma española estable del nombre propio, manteniendo identificación clara con el griego.
