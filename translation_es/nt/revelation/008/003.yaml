translation:
  language: es
  text: Y otro ángel vino y se puso junto al altar[a], teniendo un incensario[b] de oro, y se le dio mucho incienso para que lo ofreciera con las oraciones de todos los santos sobre el altar de oro, que está delante del trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tomó su puesto ante el altar'. El griego aquí expresa que el ángel estaba en el altar o junto a él, no necesariamente encima de él.
    reason: lexical_alternative
  - marker: b
    text: O 'quemador de incienso'. λιβανωτός designa un recipiente para el incienso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel más
  - un ángel diferente
  lexicon: BDAG
  rationale: ἄλλος indica un ángel נוסף en la secuencia, no un ser de clase distinta. En español, 'otro ángel' es la forma natural y fiel.
- source_word: ἐστάθη ἐπὶ τοῦ θυσιαστηρίου
  english_pob_choice: stood at the altar
  chosen_spanish: se puso junto al altar
  alternatives_spanish:
  - estuvo de pie en el altar
  - se paró en el altar
  lexicon: BDAG
  rationale: ἐστάθη puede tener matiz ingresivo de 'se puso' o 'tomó su puesto'. Con ἐπί + genitivo, 'junto al altar' evita la imagen demasiado literal de estar sobre él y mantiene la escena cultual.
- source_word: λιβανωτὸν χρυσοῦν
  english_pob_choice: a golden censer
  chosen_spanish: un incensario de oro
  alternatives_spanish:
  - un quemador de incienso de oro
  - una cazuela de incienso de oro
  lexicon: BDAG
  rationale: λιβανωτός designa un recipiente para el incienso. 'Incensario' es el equivalente más natural y tradicional en español bíblico sin perder el valor instrumental del objeto.
- source_word: ἐδόθη αὐτῷ θυμιάματα πολλὰ
  english_pob_choice: much incense was given to him
  chosen_spanish: se le dio mucho incienso
  alternatives_spanish:
  - se le dieron muchas ofrendas de incienso
  - se le dio una gran cantidad de incienso
  lexicon: BDAG
  rationale: θυμιάματα puede referirse al incienso como sustancia u ofrenda. En español, 'mucho incienso' conserva el sentido natural de masa y mantiene la pasiva.
- source_word: ἵνα δώσει
  english_pob_choice: so that he might offer it
  chosen_spanish: para que lo ofreciera
  alternatives_spanish:
  - para que lo diera
  - para que lo presentara
  lexicon: BDAG
  rationale: En contexto cultual, δίδωμι significa aquí 'ofrecer/presentar'. 'Lo ofreciera' refleja mejor el acto ritual que un simple 'dar'.
- source_word: ταῖς προσευχαῖς τῶν ἁγίων πάντων
  english_pob_choice: with the prayers of all the saints
  chosen_spanish: con las oraciones de todos los santos
  alternatives_spanish:
  - a las oraciones de todos los santos
  - junto con las oraciones de todos los santos
  lexicon: BDAG
  rationale: La frase dativa es sintácticamente concentrada. 'Con' preserva la relación acompañante/adicional del incienso respecto de las oraciones, sin resolver en exceso la estructura.
- source_word: ἅγιοι
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - personas santas
  - santos de Dios
  lexicon: BDAG
  rationale: '''Santos'' es el equivalente bíblico ya establecido para ἅγιοι y conserva la identidad del pueblo consagrado a Dios.'
- source_word: ἐπὶ τὸ θυσιαστήριον τὸ χρυσοῦν
  english_pob_choice: on the golden altar
  chosen_spanish: sobre el altar de oro
  alternatives_spanish:
  - en el altar de oro
  - junto al altar de oro
  lexicon: BDAG
  rationale: Con ἐπί + acusativo, la dirección hacia/onto el altar se expresa mejor con 'sobre'. 'De oro' reproduce el adjetivo sin forzar el orden español.
- source_word: τὸ ἐνώπιον τοῦ θρόνου
  english_pob_choice: before the throne
  chosen_spanish: que está delante del trono
  alternatives_spanish:
  - ante el trono
  - en presencia del trono
  lexicon: BDAG
  rationale: '''Delante de'' / ''ante'' son renderings naturales de ἐνώπιον. Añadir ''que está'' hace explícita en español la relación del altar con el trono, tal como la frase griega lo describe.'
theological_decisions:
- issue: Relación del incienso con las oraciones de los santos
  english_pob_reading: The incense is offered together with/accompanying the prayers of all the saints.
  chosen_spanish_reading: El incienso se ofrece junto con las oraciones de todos los santos.
  alternative_spanish_readings:
  - El incienso se añade a las oraciones de todos los santos.
  - El incienso acompaña las oraciones de todos los santos.
  rationale: La sintaxis es comprimida y admite más de una manera de expresarla. 'Con' en la traducción mantiene la imagen apocalíptico-templaria sin resolver la relación de manera más doctrinal de lo que el texto permite.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y concuerda con el criterio auditado de la POB en inglés. Se conserva la tensión de la frase dative sobre las oraciones sin simplificarla más allá de lo que el contexto justifica, y se mantiene el lenguaje cultual con equivalentes españoles naturales.
  spanish_consistency_notes:
  - Se usa 'altar de oro' de forma consistente para τὸ θυσιαστήριον τὸ χρυσοῦν.
  - Se mantiene 'santos' para ἁγίων, conforme al uso bíblico establecido.
  - '''Incensario'' se emplea en sentido cultual, no como objeto doméstico.'
  - La preposición 'con' en la cláusula final preserva la relación acompañante del incienso y las oraciones sin hacerla más explícita que el griego.
