translation:
  language: es
  text: Tú has dado un estandarte a los que te temen, para que sea levantado[a] a causa de la verdad[b]. Selah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que sea mostrado», «para reunirse», o quizá «para huir». El verbo hebreo es difícil y debatido.
    reason: lexical_alternative
  - marker: b
    text: Hebreo qoshet probablemente significa «verdad» o «veracidad»; algunas versiones antiguas e intérpretes entienden la línea de otro modo, con lecturas como «a causa del arco».
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתָּה
  english_pob_choice: You have given
  chosen_spanish: Tú has dado
  alternatives_spanish:
  - Has dado
  - Tú diste
  lexicon: HALOT
  rationale: El perfectivo hebreo de 2ms se puede verter de manera natural con pretérito perfecto en español para conservar la acción cumplida con vigencia presente en el salmo dirigido a Dios.
- source_word: לִּירֵאֶיךָ
  english_pob_choice: to those who fear you
  chosen_spanish: a los que te temen
  alternatives_spanish:
  - para los que te temen
  - a tus temerosos
  lexicon: HALOT
  rationale: La frase preserva el sentido relacional de reverencia pactual. En español, 'los que te temen' es claro y fiel; 'temen' evita una formulación rígida como 'temerosos'.
- source_word: נֵּס
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - señal
  - pendón
  lexicon: HALOT
  rationale: '''Estandarte'' comunica bien la imagen elevada y militar/de convocatoria de נֵס en español bíblico contemporáneo, sin perder el matiz de señal visible y levantada.'
- source_word: לְהִתְנוֹסֵס
  english_pob_choice: to be raised up
  chosen_spanish: para que sea levantado
  alternatives_spanish:
  - para ser mostrado
  - para alzarse
  - para que se despliegue
  lexicon: HALOT
  rationale: El infinitivo es difícil y debatido. En este contexto, con נֵס, la lectura más directa es la de algo levantado en alto. 'Sea levantado' conserva la pasiva/reflexiva sin forzar una interpretación más específica.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - debido a
  - por causa de
  - de delante de
  lexicon: HALOT
  rationale: En este verso el valor causal es el más natural y coincide con la auditoría inglesa. 'A causa de' suena idiomático en español y mantiene la relación explicativa.
- source_word: קֹשֶׁט
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  - la fidelidad
  - el arco
  lexicon: HALOT
  rationale: La opción principal sigue la lectura mayoritaria de קֹשֶׁט como 'verdad'/'verdad́eramente'. En español, 'la verdad' transmite el sentido sin introducir una paráfrasis doctrinal.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva por transliteración como marcador litúrgico/musical de significado preciso incierto.
translation_notes:
  revision_awareness: No se requirieron cambios respecto del último repaso; la redacción mantiene la lectura mayoritaria del hebreo y conserva la ambigüedad del verbo y de qoshet mediante notas.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para יהוה porque este versículo no contiene el nombre divino explícito; la forma de segunda persona en español mantiene el destinatario.
  - '''Estandarte'' se eligió por su naturalidad bíblica en español y su cercanía al campo semántico de נֵס.'
  - La construcción 'sea levantado' refleja la pasiva/reflexiva de לְהִתְנוֹסֵס sin cerrar el debate interpretativo.
