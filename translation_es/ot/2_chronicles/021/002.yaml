translation:
  language: es
  text: 'Y él tenía hermanos, los hijos de Josafat: Azarías, Jehiel, Zacarías, Azariahu[b], Micael y Sefatías. Todos estos eran los hijos de Josafat, rey de Israel[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «rey de Israel». Josafat es más comúnmente identificado históricamente como rey de Judá; Crónicas usa aquí «Israel», probablemente en un sentido de pacto más amplio.'
    reason: alternative_reading
  - marker: b
    text: 'El cuarto nombre se escribe de modo diferente en hebreo del primer Azarías; por eso se mantiene aquí una forma diferenciada: «Azariahu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֽ/וֹ
  english_pob_choice: And he had
  chosen_spanish: Y tenía
  alternatives_spanish:
  - Y le pertenecían
  - Y tenía él
  lexicon: HALOT
  rationale: La construcción hebrea de posesión se expresa con naturalidad en español como "tenía". Mantiene la relación narrativa sin volverla forzada.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  lexicon: HALOT
  rationale: En este contexto genealógico se refiere a hermanos varones; "hermanos" conserva el sentido directo y el registro natural en español.
- source_word: בְּנֵי יְהוֹשָׁפָט
  english_pob_choice: the sons of Jehoshaphat
  chosen_spanish: los hijos de Josafat
  alternatives_spanish:
  - los hijos de Jehoshaphat
  - los hijos de Josafat
  lexicon: HALOT
  rationale: '"Hijos de" reproduce la construcción genealógica hebrea. "Josafat" es la forma española habitual del nombre.'
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: HALOT
  rationale: Nombre propio con forma bíblica española establecida.
- source_word: וִֽיחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  lexicon: HALOT
  rationale: Se conserva la forma bíblica española convencional del nombre.
- source_word: וּזְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: HALOT
  rationale: Nombre propio con forma bíblica española habitual.
- source_word: וַעֲזַרְיָהוּ
  english_pob_choice: Azariahu
  chosen_spanish: Azaríasu
  alternatives_spanish:
  - Azarías
  - Azariahu
  lexicon: HALOT
  rationale: La ortografía hebrea distingue este nombre del anterior. En español se preserva la distinción con una transliteración ligeramente diferenciada, evitando igualarlos.
- source_word: וּמִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Micael
  alternatives_spanish:
  - Miguel
  lexicon: HALOT
  rationale: Aquí se prefiere la transliteración del nombre hebreo en lugar de la forma tradicional "Miguel", para reflejar el texto fuente de manera más directa y mantener la serie nominal sin asimilación litúrgica.
- source_word: וּשְׁפַטְיָהוּ
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Sefatías
  - Shefatías
  lexicon: HALOT
  rationale: Forma bíblica española convencional del nombre propio, con adaptación fonética coherente.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Todos estos
  lexicon: HALOT
  rationale: La frase resumptiva del listado se vierte de forma directa y natural en español.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: Se mantiene el dato explícito del hebreo. Aunque históricamente Josafat es rey de Judá, no se armoniza el texto contra la fuente; se conserva "Israel".
theological_decisions:
- issue: Título de Josafat como מֶלֶךְ יִשְׂרָאֵל
  english_pob_reading: king of Israel
  chosen_spanish_reading: rey de Israel
  alternative_spanish_readings:
  - rey de Judá
  rationale: La versión española sigue la lectura del hebreo, evitando corregirla por concordancia histórica. Esto preserva la posible amplitud teológica de "Israel" en Crónicas.
  doctrine_reference: Primacía del texto original sobre la armonización interpretativa
- issue: Distinción entre dos formas de Azarías
  english_pob_reading: Azariah / Azariahu
  chosen_spanish_reading: Azarías / Azaríasu
  alternative_spanish_readings:
  - Azarías / Azariahu
  - Azarías / Azarías
  rationale: La diferencia gráfica del hebreo se conserva para no borrar una distinción textual documentada entre dos nombres muy parecidos.
  doctrine_reference: Fidelidad a las diferencias léxicas del texto fuente
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis hebreo y el expediente auditado en inglés. No se detectaron revisiones aplicadas en el paquete fuente; se conserva la distinción de nombres y el título final según el texto hebreo, sin armonizar históricamente el pasaje.
  spanish_consistency_notes:
  - Se usa "Josafat" como forma española estable del nombre.
  - Se evita "Cristo" u otras sustituciones litúrgicas no pertinentes.
  - Se mantiene "Israel" en el cierre por fidelidad al hebreo.
  - La transliteración "Micael" sigue la serie nominal del pasaje y evita confundirla con la forma litúrgica más extendida.
