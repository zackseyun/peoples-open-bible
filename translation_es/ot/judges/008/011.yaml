translation:
  language: es
  text: Entonces Gedeón subió por el camino de los que habitan en tiendas[a], al este de Nobah y Jogbehah, y golpeó el campamento mientras el campamento estaba desprevenido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «los nómadas». El hebreo dice literalmente «los que habitan en tiendas» y enfatiza esa imagen concreta.
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras el campamento estaba seguro». El hebreo בֶטַח puede denotar seguridad o confianza; en este contexto militar, probablemente implica que estaban confiados y por eso desprevenidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente o de subida. «Subió» conserva el valor narrativo básico sin añadir una idea militar que no está explícita en el verbo.
- source_word: דֶּרֶךְ
  english_pob_choice: by the route of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la ruta de
  - por el camino que sigue
  lexicon: HALOT
  rationale: דֶּרֶךְ significa camino/ruta. «Por el camino de» es natural en español y mantiene la relación con la frase participial siguiente.
- source_word: הַשְּׁכוּנֵי בָאֳהָלִים
  english_pob_choice: those who dwell in tents
  chosen_spanish: los que habitan en tiendas
  alternatives_spanish:
  - los que moran en tiendas
  - los habitantes de tiendas
  - los nómadas
  lexicon: HALOT
  rationale: La expresión hebrea describe literalmente a quienes viven en tiendas. «Habitan en tiendas» conserva esa concreción sin convertirla en una generalización interpretativa como «nómadas».
- source_word: מִקֶּדֶם
  english_pob_choice: east of
  chosen_spanish: al oriente de
  alternatives_spanish:
  - al este de
  - desde el oriente de
  lexicon: HALOT
  rationale: En contexto geográfico, la expresión marca ubicación relativa al este. «Al oriente de» es idiomática y acorde con un registro bíblico sobrio en español.
- source_word: לְנֹבַח וְיָגְבֳּהָה
  english_pob_choice: Nobah and Jogbehah
  chosen_spanish: Nobá y Jogbáha
  alternatives_spanish:
  - Nobah y Jogbehah
  lexicon: HALOT
  rationale: Se transliteran los topónimos. Se eligieron formas hispanizadas ligeras para facilitar lectura, sin ocultar que son nombres propios geográficos.
- source_word: וַיַּךְ אֶת־הַמַּחֲנֶה
  english_pob_choice: struck the camp
  chosen_spanish: hirió al campamento
  alternatives_spanish:
  - golpeó al campamento
  - atacó al campamento
  - hirió al ejército
  lexicon: HALOT
  rationale: נכה es un verbo amplio para golpear/herir/sacar golpe. «Hirió» mantiene la fuerza directa del hebreo y funciona bien en español bíblico; «campamento» conserva el referente colectivo del sustantivo.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la hueste
  lexicon: HALOT
  rationale: מַחֲנֶה puede significar campamento o campamento militar. «Campamento» es claro y respeta la repetición del hebreo.
- source_word: בֶטַח
  english_pob_choice: unsuspecting
  chosen_spanish: estaba seguro
  alternatives_spanish:
  - estaba confiado
  - estaba tranquilo
  - estaba sin sospecha
  lexicon: HALOT
  rationale: בֶטַח denota seguridad/confianza. La opción principal reproduce la lectura de la POB inglesa con una frase natural en español; el contexto militar sugiere que esa seguridad implicaba estar desguarnecido.
theological_decisions:
- issue: Sentido de בֶטַח en contexto militar
  english_pob_reading: while the camp was unsuspecting
  chosen_spanish_reading: y el campamento estaba seguro
  alternative_spanish_readings:
  - y el campamento estaba confiado
  - y el campamento estaba sin sospecha
  - y el campamento estaba desprevenido
  rationale: La base hebrea permite seguridad/confianza más que una simple falta de sospecha. Se mantiene «estaba seguro» para no borrar la ambigüedad semántica, mientras la nota explica que en este contexto equivale a estar sin vigilancia adecuada.
  doctrine_reference: Lexical/theological note on semantic range; no doctrinal locus classicus
- issue: Topónimos y localización geográfica
  english_pob_reading: east of Nobah and Jogbehah
  chosen_spanish_reading: al oriente de Nobá y de Jogbáha
  alternative_spanish_readings:
  - al este de Nobah y Jogbehah
  rationale: No hay carga doctrinal; la decisión busca claridad geográfica sin anglicismos ni sustituciones interpretativas.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Alineado con el paquete fuente y la POB inglesa: se conserva la estructura narrativa, la referencia geográfica y la ambigüedad de בֶטַח. No se introdujeron revisiones posteriores ni cambios editoriales adicionales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantuvo «campamento» para מַחֲנֶה, en consonancia con el valor colectivo del hebreo.
  - La transliteración de los topónimos se adaptó levemente para lectura en español, sin alterar la identificación geográfica.
  - «Hirió» preserva la fuerza verbal de נכה sin exceder la evidencia al especificar el tipo de daño.
