lexical_decisions:
- source_word: וָ/אָב֖וֹא
  english_pob_choice: So I came
  chosen_spanish: Así llegué
  alternatives_spanish:
  - Y llegué
  - Entonces llegué
  lexicon: HALOT
  rationale: El waw-consecutivo con בוא marca el siguiente paso narrativo. En español, 'Así llegué' comunica con naturalidad la secuencia sin añadir una subordinación innecesaria.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: Con verbos de movimiento, la preposición expresa destino. 'A' es la equivalencia natural en español para el movimiento hacia Jerusalén.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente establecido en español, de lectura clara y reconocible.
- source_word: וָ/אֱהִי
  english_pob_choice: and was
  chosen_spanish: y estuve
  alternatives_spanish:
  - y estuve permaneciendo
  - y permanecí
  lexicon: HALOT
  rationale: El verbo היה con שָׁם y una expresión temporal indica permanencia/estancia. 'Estuve' conserva ese valor locativo y temporal sin sonar forzado.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo que se refiere a Jerusalén; 'allí' es la forma más natural y formal en español bíblico contemporáneo.
- source_word: יָמִים שְׁלֹשָׁה
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  lexicon: HALOT
  rationale: La construcción hebrea expresa duración. En español, 'tres días' tras 'estuve allí' comunica esa duración de manera idiomática y fiel.
