translation:
  language: es
  text: Y ella le dio a luz Zimrán, Joqsán, Medán, Madián, Isbac y Súah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: And she bore
  chosen_spanish: le dio a luz
  alternatives_spanish:
  - dio a luz
  - engendró
  lexicon: HALOT
  rationale: El hebreo qal wayyiqtol 3fs de ילד expresa el hecho narrativo de dar a luz. En español, 'dar a luz' conserva el sentido materno de forma natural; 'engendró' desplaza la acción a un registro menos adecuado para la madre y puede sonar más técnico o masculino en genealogías.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El complemento dativo pronominal indica la relación con el padre. En español, 'le dio a luz' reproduce esa referencia sin recargar el verso con un objeto explícito que suene poco natural.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce de forma separada]'
  alternatives_spanish:
  - a
  - '-'
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente autónomo en esta estructura española y se absorbe en la sintaxis normal de la oración.
- source_word: זִמְרָן
  english_pob_choice: Zimran
  chosen_spanish: Zimrán
  alternatives_spanish:
  - Zimran
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para acomodar la prosodia española y mantener la forma reconocible del nombre.
- source_word: יָקְשָׁן
  english_pob_choice: Jokshan
  chosen_spanish: Jocsán
  alternatives_spanish:
  - Joksán
  - Yocsán
  lexicon: HALOT
  rationale: Se conserva la transliteración convencional del nombre propio en español bíblico, adaptando la ortografía a la fonología española con acento gráfico.
- source_word: מְדָן
  english_pob_choice: Medan
  chosen_spanish: Medán
  alternatives_spanish:
  - Medan
  lexicon: HALOT
  rationale: Nombre propio transliterado; el acento marca la sílaba tónica en español sin alterar la identificación del nombre.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  - Madiam
  lexicon: HALOT
  rationale: Se mantiene el nombre propio conocido, adaptado a la ortografía española. 'Madián' es una forma clara y estable en español para el topónimo/personaje bíblico.
- source_word: יִשְׁבָּק
  english_pob_choice: Ishbak
  chosen_spanish: Isbac
  alternatives_spanish:
  - Ishbak
  - Yisbac
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con ajuste ortográfico mínimo para lectura natural; se conserva la identidad del nombre sin introducir una forma no atestiguada por la tradición española.
- source_word: שׁוּחַ
  english_pob_choice: Shuah
  chosen_spanish: Súa
  alternatives_spanish:
  - Suah
  - Shúa
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de manera breve y legible, respetando la secuencia consonántica y la vocalización aproximada del nombre.
translation_notes:
  revision_awareness: El pasaje en la fuente hebrea y en el audit trail inglés presenta alta concordancia y no requiere notas textuales ni revisiones de sentido; la única adaptación necesaria es la naturalización ortográfica de nombres propios al español.
  spanish_consistency_notes:
  - Se prefirió un registro genealógico breve y directo, equivalente al inglés POB, sin añadir 'hijos' porque el hebreo no lo explicita.
  - Los nombres propios se adaptaron a una ortografía española legible y consistente, manteniendo transliteración reconocible en lugar de traducir o reemplazar por formas eclesiásticas tradicionales.
