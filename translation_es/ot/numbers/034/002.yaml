base_translation:
  language: en
  yaml_path: translation/ot/numbers/034/002.yaml
  text: 'Command the sons of Israel and say to them[a], ‘When you enter the land of Canaan[b], this is the land that will fall to you as an inheritance: the land of Canaan according to its borders.’'
  footnotes:
  - marker: a
    text: Or, “that will be allotted to you as an inheritance.” The Hebrew literally says “that will fall to you,” an idiom for assigned territorial allotment.
    reason: lexical_alternative
  - marker: b
    text: “Sons of Israel” is the literal Hebrew expression; “Israelites” is a smoother English equivalent.
    reason: lexical_alternative
