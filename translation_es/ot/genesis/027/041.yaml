revisions:
- from: 'Y Esaú aborreció a Jacob[a], por la bendición con que su padre lo había bendecido, y Esaú dijo en su corazón[b]: «Se acercan los días del luto por mi padre[c]; entonces mataré a Jacob, mi hermano»[d].'
