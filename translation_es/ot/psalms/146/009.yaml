translation:
  language: es
  text: Yahvé cuida de los extranjeros[a]; sostiene al huérfano y a la viuda, pero tuerce el camino de los impíos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «extraños», «forasteros» o «residentes extranjeros»; el hebreo se refiere a personas no nativas que viven entre el pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «hace torcido el camino de los impíos» o «lleva el camino de los impíos a la ruina».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera al español como «Yahvé» para conservar el nombre propio divino, siguiendo la práctica POB de no sustituirlo por un título.
- source_word: שֹׁמֵר
  english_pob_choice: watches over
  chosen_spanish: cuida de
  alternatives_spanish:
  - vigila a
  - guarda a
  - vela por
  lexicon: HALOT
  rationale: El participio expresa cuidado continuo y protector. «Cuida de» comunica esa protección en español natural, sin perder el matiz de vigilancia activa.
- source_word: גֵּרִים
  english_pob_choice: sojourners
  chosen_spanish: los forasteros
  alternatives_spanish:
  - los extranjeros
  - los residentes forasteros
  - los huéspedes
  lexicon: HALOT
  rationale: «Forasteros» conserva la idea de personas no nativas que viven entre el pueblo y evita el tecnicismo administrativo de otras opciones. En nota se mantiene la amplitud semántica.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless
  - los huérfanos
  lexicon: HALOT
  rationale: En español, «huérfano» es la manera natural y clara de expresar la figura colectiva singular hebrea, sin forzar una perífrasis poco idiomática.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - las viudas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo paralelo a «el huérfano», manteniendo el ritmo poético y la simetría del hebreo.
- source_word: יְעוֹדֵד
  english_pob_choice: upholds
  chosen_spanish: sostiene
  alternatives_spanish:
  - apoya
  - fortalece
  - levanta
  lexicon: HALOT
  rationale: El verbo transmite apoyo y fortalecimiento de quienes están en debilidad. «Sostiene» es breve, natural y retiene la idea de apoyo continuo.
- source_word: דֶרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - curso
  - vida
  lexicon: HALOT
  rationale: En poesía hebrea, דֶרֶךְ suele referirse al curso o conducta de vida. «Camino» es la equivalencia más natural y fiel en español.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: «Impíos» preserva la categoría moral y bíblica del colectivo sustantivado. Es una opción bíblica y comprensible en español sin rebajar la fuerza ética del término.
- source_word: יְעַוֵּת
  english_pob_choice: twists
  chosen_spanish: tuerce
  alternatives_spanish:
  - hace torcido
  - pervierte
  - desvía
  lexicon: HALOT
  rationale: El piel de עות expresa torcer, desviar o deformar. «Tuerce» conserva la metáfora física y el contraste con los justos, evitando resolver el juicio en una paráfrasis explicativa.
theological_decisions:
- issue: Cómo traducir la acción divina final sin suavizar el juicio
  english_pob_reading: but he twists the way of the wicked
  chosen_spanish_reading: pero tuerce el camino de los impíos
  alternative_spanish_readings:
  - pero hace torcido el camino de los impíos
  - pero arruina el camino de los impíos
  - pero subvierte el camino de los impíos
  rationale: Se mantiene la metáfora de torcer/b endecir el camino, porque el hebreo usa un verbo de distorsión y el POB inglés preserva esa imagen. No se convierte en «ruina» para no borrar la tensión semántica y teológica del texto.
  doctrine_reference: Preservar la tensión teológica en el juicio divino; no resolver la metáfora.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la auditoría inglesa y no presenta cambios textuales relevantes; se mantiene la imagen poética y la distinción entre cuidado de vulnerables y juicio sobre los impíos.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio POB para el Tetragrámaton.
  - Se mantiene «impíos» para רְשָׁעִים como término moral bíblico consistente.
  - La frase «cuida de» respeta el valor de protección continua de שׁמר sin volverlo demasiado técnico.
  - La estructura paralela singular («el huérfano y la viuda») conserva el ritmo y la colectividad del hebreo.
