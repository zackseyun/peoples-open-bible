translation:
  language: es
  text: Mandó que, para el día siguiente, a todos los elefantes —quinientos en número— se les dieran abundantes dosis de olíbano y mucho vino puro, y que, una vez vueltos feroces por la abundante provisión de bebida, fueran llevados para salir al encuentro de la destrucción de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para salir al encuentro de la perdición / la muerte de los judíos». El griego dice literalmente «para un encuentro con el μόρος de los judíos», una expresión idiomática que señala su destrucción prevista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκέλευσεν
  english_pob_choice: He ordered
  chosen_spanish: Mandó
  alternatives_spanish:
  - Ordenó
  - Dio la orden de
  lexicon: LSJ
  rationale: El aoristo de κελεύω expresa una orden autoritativa. «Mandó» conserva esa fuerza con español natural y sobrio.
- source_word: ὑπὸ τὴν ἐρχομένην ἡμέραν
  english_pob_choice: by the coming day
  chosen_spanish: para el día siguiente
  alternatives_spanish:
  - antes del día siguiente
  - para el día venidero
  lexicon: LSJ
  rationale: La expresión marca el plazo para cumplir la orden; en español «para el día siguiente» comunica con claridad el sentido temporal prospectivo.
- source_word: δαψιλέσι
  english_pob_choice: generous
  chosen_spanish: generosas cantidades de
  alternatives_spanish:
  - abundantes cantidades de
  - copiosas cantidades de
  lexicon: LSJ
  rationale: El adjetivo indica abundancia o liberalidad. En español, modificar «cantidades» evita una construcción extraña con «generosas» aplicado directamente a una sustancia.
- source_word: δράκεσι
  english_pob_choice: draughts
  chosen_spanish: cantidades de
  alternatives_spanish:
  - tragos de
  - dosis de
  - porciones de
  lexicon: LSJ
  rationale: Aquí el dativo plural indica la medida administrada en el beber. Como el objeto incluye incienso, «cantidades de» permite conservar la idea de dosis/provisión sin forzar una imagen idiomática imposible en español.
- source_word: λιβανωτοῦ
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  - francoincienso
  lexicon: LSJ
  rationale: El término puede referirse específicamente al olíbano/frankincense, pero en español «incienso» es la forma inteligible y natural; se mantiene la referencia aromática sin inventar un tecnicismo poco usado.
- source_word: οἴνῳ πλείονι ἀκράτῳ
  english_pob_choice: with much unmixed wine
  chosen_spanish: mucho vino puro
  alternatives_spanish:
  - mucho vino sin mezclar
  - mucho vino no aguado
  lexicon: LSJ
  rationale: ἀκράτῳ significa sin mezclar o sin diluir. «Vino puro» conserva la oposición al vino aguado y funciona de modo fluido en español.
- source_word: ἅπαντας τοὺς ἐλέφαντας
  english_pob_choice: all the elephants
  chosen_spanish: a todos los elefantes
  alternatives_spanish:
  - a todos los paquidermos
  lexicon: LSJ
  rationale: La frase es totalizadora y directa. En español, el dativo de destinatario/objeto indirecto se expresa naturalmente con «a todos los elefantes».
- source_word: ὄντας τὸν ἀριθμὸν πεντακοσίους
  english_pob_choice: five hundred in number
  chosen_spanish: quinientos en número
  alternatives_spanish:
  - que eran quinientos
  - siendo quinientos
  lexicon: LSJ
  rationale: La frase participial especifica el total. «Quinientos en número» conserva el tono formal y explicativo del original.
- source_word: ἀγριωθέντας
  english_pob_choice: made savage
  chosen_spanish: enloquecidos
  alternatives_spanish:
  - hechos feroces
  - volvieron salvajes
  - frenéticos
  lexicon: LSJ
  rationale: El participio pasivo indica que fueron excitados hasta un estado feroz o salvaje. «Enloquecidos» comunica esa pérdida de control de manera idiomática; no se atenúa a una simple irritación.
- source_word: τῇ τοῦ πόματος ἀφθόνῳ χορηγίᾳ
  english_pob_choice: by the abundant supply of drink
  chosen_spanish: por la abundante provisión de bebida
  alternatives_spanish:
  - por la abundante provisión de vino
  - por el abundante suministro de bebida
  lexicon: LSJ
  rationale: χορηγία es provisión o suministro generoso; πόμα es bebida. «Provisión de bebida» mantiene la amplitud del griego sin restringir innecesariamente a vino, aunque el contexto lo incluye.
- source_word: εἰσαγαγεῖν
  english_pob_choice: be brought in
  chosen_spanish: fueran llevados
  alternatives_spanish:
  - fueran introducidos
  - fueran conducidos
  lexicon: LSJ
  rationale: El infinitivo de propósito describe que los animales serían conducidos a la escena. «Fueran llevados» es natural en español y preserva la dirección del movimiento.
- source_word: πρὸς συνάντησιν τοῦ μόρου τῶν Ἰουδαίων
  english_pob_choice: to meet the destruction of the Jews
  chosen_spanish: para encontrar la destrucción de los judíos
  alternatives_spanish:
  - para salir al encuentro de la destrucción de los judíos
  - para afrontar la muerte de los judíos
  lexicon: LSJ
  rationale: La expresión griega es idiomática y apunta al encuentro con el destino mortal de los judíos. «Para encontrar la destrucción de los judíos» mantiene el giro de encuentro y no suaviza el carácter intencional del pasaje.
theological_decisions:
- issue: Tratamiento de μόρος en un contexto de violencia intencional
  english_pob_reading: to meet the destruction of the Jews
  chosen_spanish_reading: para encontrar la destrucción de los judíos
  alternative_spanish_readings:
  - para afrontar la muerte de los judíos
  - para salir al encuentro de la perdición de los judíos
  rationale: No se trata de un término doctrinal, pero sí de una formulación cargada de intención letal. Se conserva la dureza del original y la idea de encuentro con el destino destructivo, en lugar de suavizarla a una simple referencia a muerte.
  doctrine_reference: Conservar la tensión semántica; el contexto define el sentido como destrucción prevista.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió reflejar más de cerca la frase griega πρὸς συνάντησιν τοῦ μόρου τῶν Ἰουδαίων. También evita una metáfora demasiado literal con «draughts» y mantiene el valor de abundancia con una formulación española más natural.
  spanish_consistency_notes:
  - Se mantiene «judíos» para τῶν Ἰουδαίων, coherente con el referente étnico/religioso del pasaje.
  - Se traduce ἀκράτῳ como «vino puro» para conservar la oposición a vino mezclado/diluido.
  - «Incienso» se usa como equivalente funcional de λιβανωτός sin introducir un tecnicismo innecesario.
  - El giro final conserva la estructura de encuentro/encuentro con destrucción, porque el griego no usa simplemente el verbo «matar» sino una frase idiomática de destino violento.
