translation:
  language: es
  text: E hizo lo malo a los ojos de Yahvé[a], conforme a todo lo que habían hecho sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus padres»; es decir, sus antepasados o predecesores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: E hizo
  alternatives_spanish:
  - Y hizo
  - Él hizo
  lexicon: HALOT
  rationale: El waw consecutivo en narrativa avanza la acción; en español, «e hizo» mantiene la continuidad narrativa y evita una repetición innecesaria de pronombre sujeto que el hebreo no expresa.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión hebrea עשה הרע es un modismo establecido para «hacer lo malo». «Lo malo» conserva el valor idiomático sin volverlo artificial en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - a la vista de
  - en la vista de
  lexicon: HALOT
  rationale: El hebreo usa una metáfora evaluativa. «A los ojos de» reproduce bien el giro y mantiene la imagen sin forzar el español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se rinde en español como «Yahvé», conforme al criterio del proyecto para preservar el nombre propio y no sustituirlo por un título.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - como todo lo que
  lexicon: HALOT
  rationale: La combinación expresa conformidad/comparación con un patrón completo. «Conforme a todo lo que» comunica la medida total sin perder la fuerza comprehensiva de כֹּל.
- source_word: עָשׂוּ
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - hicieron
  - habían obrado
  lexicon: HALOT
  rationale: El pluscuamperfecto español aclara la anterioridad de las acciones de sus padres respecto al rey en el contexto narrativo, como hace la solución inglesa.
- source_word: אֲבֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus antecesores
  - sus padres/fundadores
  lexicon: HALOT
  rationale: En este contexto real, el hebreo literalmente dice «sus padres», pero se refiere a sus predecesores o antepasados; «sus padres» preserva la forma fuente y sigue siendo idiomático en español. La nota explica la amplitud semántica.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en forma española usual del proyecto. Se evita la sustitución por un título y se mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modismo evaluativo «hacer lo malo»
  english_pob_reading: what was evil in the eyes of Yahweh
  chosen_spanish_reading: hizo lo malo a los ojos de Yahvé
  alternative_spanish_readings:
  - hizo el mal a los ojos de Yahvé
  - hizo lo que era malo a los ojos de Yahvé
  rationale: La frase refleja un juicio moral-covenantal, no solo una valoración subjetiva. El español mantiene el modismo hebreo sin suavizar su carga moral.
  doctrine_reference: 'DOCTRINE.md: Evaluative idioms and covenant accountability'
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide con la lectura auditada del inglés POB. No se detectan cambios textuales o revisiones adicionales en el pasaje.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» según la terminología del proyecto.
  - Se conserva el modismo evaluativo hebreo «a los ojos de» para reflejar la estructura original.
  - «Sus padres» se deja en el texto por fidelidad formal, con nota explicativa para evitar ambigüedad en español.
