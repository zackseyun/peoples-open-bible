translation:
  language: es
  text: Pero si la verdad de Dios ha abundado por[a] mi mentira[b] para su gloria[c], ¿por qué todavía soy juzgado como pecador?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de».
    reason: alternative_reading
  - marker: b
    text: O «mi falsedad».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «a su gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια τοῦ θεοῦ
  english_pob_choice: God’s truth
  chosen_spanish: la verdad de Dios
  alternatives_spanish:
  - la veracidad de Dios
  - la verdad divina
  lexicon: BDAG
  rationale: Se conserva la correspondencia más directa con ἀλήθεια τοῦ θεοῦ. Aunque el audit trail inglés consideró 'truthfulness' para resaltar el contraste moral, la revisión posterior volvió a 'truth'; en español, 'la verdad de Dios' mantiene esa relación léxica y el contraste con la mentira humana sin forzar una paráfrasis.
- source_word: ἐν τῷ ἐμῷ ψεύσματι
  english_pob_choice: through my lie
  chosen_spanish: por mi mentira
  alternatives_spanish:
  - en mi mentira
  - mediante mi mentira
  - por mi falseedad
  lexicon: BDAG
  rationale: El griego usa ἐν con sentido instrumental o causal en este contexto. 'Por mi mentira' es natural en español y conserva la idea de medio, como el inglés final 'through my lie'.
- source_word: ψεύσματι
  english_pob_choice: lie
  chosen_spanish: mentira
  alternatives_spanish:
  - falseedad
  - engaño
  lexicon: BDAG
  rationale: '''Mentira'' comunica de manera directa y idiomática la falsedad deliberada. ''Falseedad'' suena más abstracto; ''engaño'' desplaza el foco hacia el acto de engañar.'
- source_word: ἐπερίσσευσεν
  english_pob_choice: has abounded
  chosen_spanish: ha abundado
  alternatives_spanish:
  - ha sobreabundado
  - ha rebosado
  - ha aumentado
  lexicon: BDAG
  rationale: '''Ha abundado'' conserva el valor de abundancia/incremento y corresponde bien al registro de Romanos. Evita una intensificación innecesaria como ''sobreabundado''.'
- source_word: εἰς τὴν δόξαν αὐτοῦ
  english_pob_choice: for his glory
  chosen_spanish: para su gloria
  alternatives_spanish:
  - hacia su gloria
  - a su gloria
  lexicon: BDAG
  rationale: Aunque el griego puede expresar destino o resultado, 'para su gloria' es la forma más clara y fiel en español, y refleja el sentido teleológico del pasaje.
- source_word: τί ἔτι
  english_pob_choice: why ... still
  chosen_spanish: ¿por qué todavía...
  alternatives_spanish:
  - ¿por qué aún...
  - ¿por qué sigue...
  lexicon: BDAG
  rationale: '''Todavía'' conserva la fuerza de continuidad de ἔτι dentro de una pregunta retórica natural en español.'
- source_word: κἀγώ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo también
  - incluso yo
  lexicon: BDAG
  rationale: La partícula aditiva queda implícita en el contexto retórico; en español no hace falta sobrecargar la frase con un 'también' explícito.
- source_word: κρίνομαι
  english_pob_choice: am ... being judged
  chosen_spanish: soy juzgado
  alternatives_spanish:
  - estoy siendo juzgado
  - soy condenado
  lexicon: BDAG
  rationale: El pasivo presente admite un valor de acción en curso; en español, 'soy juzgado' es breve y suficiente, dejando abierta la amplitud semántica del verbo sin estrecharlo a 'condenado'.
- source_word: ὡς ἁμαρτωλός
  english_pob_choice: as a sinner
  chosen_spanish: como pecador
  alternatives_spanish:
  - como uno que peca
  - como culpable
  lexicon: BDAG
  rationale: '''Pecador'' es la equivalencia normal y fiel para ἁμαρτωλός en este contexto predicativo.'
theological_decisions:
- issue: Cómo reflejar ἀλήθεια τοῦ θεοῦ sin borrar el contraste entre verdad divina y mentira humana
  english_pob_reading: God’s truth / God’s truthfulness
  chosen_spanish_reading: la verdad de Dios
  alternative_spanish_readings:
  - la veracidad de Dios
  - la verdad divina
  rationale: 'Se mantiene la tensión retórica del pasaje: la verdad de Dios resalta en contraste con mi mentira. ''La verdad de Dios'' preserva el vínculo léxico con el griego y evita resolver interpretativamente la expresión hacia una abstracción más explicativa de lo que el texto exige.'
  doctrine_reference: Preservar la tensión retórica y teológica de Romanos 3:4–7; primacía del texto original sobre la tradición de paráfrasis
- issue: 'Alcance de κρίνομαι: juicio en curso o condenación final'
  english_pob_reading: am ... being judged
  chosen_spanish_reading: soy juzgado
  alternative_spanish_readings:
  - estoy siendo juzgado
  - soy condenado
  rationale: El presente pasivo griego puede referirse a juicio en proceso. 'Soy juzgado' conserva la ambigüedad útil del original y evita una lectura más fuerte de condenación final que el texto no explicita.
  doctrine_reference: No adelantar el alcance judicial más allá del verbo griego; respetar la ambigüedad del juicio
translation_notes:
  revision_awareness: La revisión inglesa final volvió de 'truthfulness' a 'truth' para ceñirse más a ἀλήθεια; esta versión española sigue esa decisión y evita introducir una paráfrasis interpretativa. También conserva la lectura instrumental de ἐν y el tono retórico de la pregunta sin resolver la tensión teológica del pasaje.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ y 'gloria' para δόξα, manteniendo terminología bíblica estándar y precisa.
  - Se traduce ἁμαρτωλός como 'pecador' y κρίνομαι con un pasivo simple ('soy juzgado') para conservar la apertura del original.
  - Se opta por 'para su gloria' en el texto principal, con nota literal 'hacia su gloria' para reflejar εἰς sin recargar el español.
  - La puntuación reproduce la estructura retórica de una pregunta seguida de inciso causal/condicional.
