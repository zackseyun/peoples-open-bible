translation:
  language: es
  text: Toda la tierra invoca la verdad[a], y el cielo la bendice; y todas las obras se sacuden y tiemblan[b], y con ella no hay nada injusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: ''invoca la verdad'' o ''llama a la verdad''; el verbo puede entenderse como una aclamación o una invocación dirigida a la Verdad personificada.'
    reason: lexical_alternative
  - marker: b
    text: El griego transmitido dice 'con él/ello' en la cláusula final (μετʼ αὐτοῦ), aunque las referencias anteriores a la Verdad son femeninas; la traducción sigue el sentido de la personificación.
    reason: textual_variant
lexical_decisions:
- source_word: πᾶσα ἡ γῆ
  english_pob_choice: All the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitable
  - todo el mundo
  lexicon: LSJ
  rationale: γῆ puede significar 'tierra' o 'país', pero aquí el paralelo con 'el cielo' da alcance cósmico. 'Toda la tierra' conserva esa amplitud en español y suena natural en registro bíblico.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad personificada
  - la verdad misma
  lexicon: LSJ
  rationale: ἀλήθεια se presenta personificada en el contexto; 'la verdad' mantiene el sustantivo abstracto sin forzar una paráfrasis, y permite que la personificación siga siendo visible en el verso.
- source_word: καλεῖ
  english_pob_choice: calls on
  chosen_spanish: invoca
  alternatives_spanish:
  - llama a
  - aclama
  - apela a
  lexicon: LSJ
  rationale: El griego admite una relación directa con el objeto; en español, 'invoca' expresa mejor la idea de dirigir una llamada a la Verdad personificada sin perder el tono elevado.
- source_word: ὁ οὐρανὸς
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: LSJ
  rationale: Aunque el inglés POB usa 'heaven', en español 'el cielo' es la forma más natural y digna para este paralelismo poético. 'Los cielos' sería posible, pero aquí el singular reproduce mejor el griego.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: LSJ
  rationale: El pronombre remite a 'la verdad' personificada. En español, el clítico 'la' mantiene la referencia sin recargar el verso con una reformulación innecesaria.
- source_word: εὐλογεῖ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  - proclama bien de
  lexicon: LSJ
  rationale: '''Bendice'' es el equivalente bíblico más directo y conserva el valor de elogio solemne. ''Alaba'' sería menos preciso en este contexto.'
- source_word: πάντα τὰ ἔργα
  english_pob_choice: all works
  chosen_spanish: todas las obras
  alternatives_spanish:
  - todas las cosas hechas
  - todas las obras creadas
  lexicon: LSJ
  rationale: ἔργα puede abarcar obras, hechos o cosas hechas. 'Todas las obras' sigue de cerca el griego y funciona bien en español, manteniendo el valor amplio sin explicitar más de lo que el texto dice.
- source_word: σείεται καὶ τρέμει
  english_pob_choice: shake and tremble
  chosen_spanish: tiemblan y se estremecen
  alternatives_spanish:
  - se sacuden y tiemblan
  - tiemblan y vacilan
  lexicon: LSJ
  rationale: Los dos verbos intensifican la reacción. 'Tiembla' y 'se estremece' son naturales en español y preservan la doble imagen de sacudida y temblor.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - con ella misma
  - junto a ella
  lexicon: LSJ
  rationale: Aunque el texto griego transmitido presenta una forma que no concuerda limpiamente con el antecedente femenino, el sentido del pasaje sigue apuntando a la Verdad personificada. 'Con ella' mantiene ese sentido en español.
- source_word: ἄδικον οὐδέν
  english_pob_choice: nothing unjust
  chosen_spanish: nada injusto
  alternatives_spanish:
  - ninguna cosa injusta
  - nada inicuo
  lexicon: LSJ
  rationale: ἄδικον designa lo injusto o lo no recto. 'Nada injusto' es breve, fiel y claro en español contemporáneo.
theological_decisions:
- issue: Personificación de la verdad
  english_pob_reading: Retain personified feminine reference to truth ('her')
  chosen_spanish_reading: Mantener la personificación femenina de la Verdad en el flujo del verso
  alternative_spanish_readings:
  - Tratarla como un abstracto impersonal ('la verdad' como concepto)
  - Reformular para evitar cualquier personificación
  rationale: El verso atribuye a la Verdad una recepción casi personal por parte del cosmos. En español, conservar 'la verdad' y los pronombres concordantes preserva esa tensión literaria y teológica sin explicarla en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Forma del segmento final con el pronombre transmitido
  english_pob_reading: Translate the final pronoun according to the sense as referring to personified truth
  chosen_spanish_reading: Traducir el sentido, vinculando la cláusula final con la Verdad personificada
  alternative_spanish_readings:
  - Traducir de forma rígida como 'con él/ello no hay nada injusto'
  - Suavizar la referencia sin nota
  rationale: El griego transmitido presenta una irregularidad pronominal en la cláusula final. La lectura española sigue el sentido global del verso y deja visible, en nota, que el referente no es formalmente uniforme.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una forma más natural para 'calls on' y al omitir artículos innecesarios donde el griego es más directo. En español se optó por 'invoca' para expresar la llamada dirigida a la Verdad personificada y por 'todas las obras' sin artículo adicional, manteniendo el paralelismo del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Verdad' de manera lexical dentro del verso, pero sin capitalizarla en el texto principal para no introducir una decisión interpretativa no explicitada por el griego.
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - La concordancia pronominal en la última cláusula se resuelve por sentido, con nota que preserva la irregularidad del griego.
