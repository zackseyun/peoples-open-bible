  glossary_alignment: Se respeta la convención del proyecto con «Yahvé». «Los hijos de Israel» preserva la decisión de género del POB. «Tienda de reunión» concuerda con la preferencia de transparencia. No hay conflicto terminológico mayor; el problema principal es la ubicación incorrecta de la nota léxica.
