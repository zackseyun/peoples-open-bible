translation:
  language: es
  text: 'Y de los levitas: Semaías, hijo de Hasub[a], hijo de Azricán, hijo de Hasabías, hijo de Buni.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En listas genealógicas, el hebreo בן («hijo de») puede indicar también un descendiente más lejano, no necesariamente una relación padre-hijo inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y entre
  lexicon: HALOT
  rationale: La forma hebrea une este verso con la lista anterior; en español, «Y de» conserva la conexión y la procedencia sin forzar una repetición innecesaria.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levítas
  - los hijos de Leví
  lexicon: HALOT
  rationale: El término designa al grupo tribal/servicio levítico. «Levitas» es el equivalente natural y fiel en español bíblico contemporáneo.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaía
  - Shemaías
  lexicon: convención onomástica bíblica
  rationale: Se adopta la forma castellana habitual del nombre propio, manteniendo una transliteración reconocible y publicable.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas, בן puede señalar ascendencia más remota, pero la estructura formal del texto se conserva mejor con «hijo de»; la posible amplitud semántica queda indicada en la nota.
- source_word: חַשּׁוּב
  english_pob_choice: Hasshub
  chosen_spanish: Hasub
  alternatives_spanish:
  - Jasub
  - Hasub
  lexicon: convención onomástica bíblica
  rationale: En español, la transliteración puede simplificarse y adaptar la grafía al uso bíblico hispano. Se evita duplicar consonantes no necesarias para la lectura natural.
- source_word: עַזְרִיקָם
  english_pob_choice: Azrikam
  chosen_spanish: Azricam
  alternatives_spanish:
  - Azrikán
  - Azericam
  lexicon: convención onomástica bíblica
  rationale: Se sigue de cerca la forma hebrea y el patrón hispano habitual para nombres propios, conservando la identificación del personaje.
- source_word: חֲשַׁבְיָה
  english_pob_choice: Hashabiah
  chosen_spanish: Hasabías
  alternatives_spanish:
  - Jasabías
  - Hasabía
  lexicon: convención onomástica bíblica
  rationale: Se emplea la forma española tradicional y comprensible del nombre, manteniendo la relación con la raíz hebrea sin anglicismos.
- source_word: בּוּנִּי
  english_pob_choice: Bunni
  chosen_spanish: Buni
  alternatives_spanish:
  - Buní
  - Bunni
  lexicon: convención onomástica bíblica
  rationale: La forma española breve y natural conserva el nombre propio sin importar la duplicación consonántica propia de la transliteración inglesa.
theological_decisions:
- issue: Alcance de בן en la cadena genealógica
  english_pob_reading: Hebrew בן ('son of') in genealogical lists can sometimes denote a more distant descendant, not necessarily an immediate father-son relationship.
  chosen_spanish_reading: Se traduce «hijo de» en la línea principal, pero se deja constancia de que en listas genealógicas puede significar un descendiente más lejano, no solo un hijo inmediato.
  alternative_spanish_readings:
  - descendiente de
  - nieto de
  rationale: El español requiere una forma fluida y formal en la línea principal. La nota preserva la tensión lexical documentada por la POB inglesa y evita restringir indebidamente la relación genealógica.
  doctrine_reference: Uso genealógico de בן en el Antiguo Testamento; cf. listas genealógicas paralelas
- issue: Identidad tribal de los levitas
  english_pob_reading: the Levites
  chosen_spanish_reading: los levitas
  alternative_spanish_readings:
  - los hijos de Leví
  rationale: No se introduce una lectura eclesiástica posterior; se mantiene la referencia al grupo levítico del texto hebreo como unidad tribal/funcional.
  doctrine_reference: Organización tribal y cultual levítica en el Antiguo Testamento
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alta concordancia y no registran revisiones aplicadas; por ello, la redacción española sigue de cerca la estructura hebrea y la decisión léxica auditada en inglés, sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Los nombres propios se han hispanizado de manera estable y legible, evitando mezcla con transliteración inglesa dentro del texto principal.
  - La nota [a] preserva la alternativa semántica documentada para בן sin sobrecargar la línea principal.
