  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Sacerdote', 'holocausto', 'cuernos', 'base' y el uso del futuro normativo concuerdan con las decisiones documentadas. No aparecen términos sensibles del glosario general que requieran ajuste.
