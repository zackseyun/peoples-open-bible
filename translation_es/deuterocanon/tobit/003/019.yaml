revisions:
- from: Y en todo tiempo bendice al Señor Dios[a], y pídele que tus caminos sean enderezados y que todos tus senderos y planes prosperen. Porque ninguna nación tiene consejo[b], pero el Señor mismo da todos los bienes y humilla a quien quiere, como quiere. Y ahora, niño, recuerda mis mandamientos, y no permitas que sean borrados de tu corazón.
  to: Y en todo tiempo bendice a Yahvé Dios[a], y pídele que tus caminos se enderecen y que todos tus senderos y planes prosperen. Porque ninguna nación tiene consejo[b], pero Yahvé mismo da todos los bienes y humilla a quien quiere, como quiere. Y ahora, hijo, recuerda mis mandamientos, y no permitas que sean borrados de tu corazón.
  rationale: Se revisa principalmente para cumplir la terminología obligatoria del proyecto, reemplazando «Señor» por «Yahvé» donde κύριος se refiere a Dios. También se mejora la naturalidad española con «hijo» por «niño» y «se enderecen» por «sean enderezados», mientras la nota conserva la alternativa más literal/resultativa del griego. Las notas se mantienen y se ajustan mínimamente al texto revisado.
