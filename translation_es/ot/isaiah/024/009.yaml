translation:
  language: es
  text: No beben vino con una canción[a]; la bebida fuerte es amarga para los que la beben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No beberán vino mientras cantan». El imperfecto hebreo también puede entenderse con sentido futuro, y בַּשִּׁיר puede traducirse «en canción» o «mientras cantan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשִּׁיר
  english_pob_choice: with a song
  chosen_spanish: con canto
  alternatives_spanish:
  - en canto
  - mientras cantan
  lexicon: HALOT
  rationale: La preposición con expresa naturalmente acompañamiento o modo en español y conserva el contraste poético con la antigua alegría festiva. «Con canto» evita una lectura demasiado explicativa y mantiene la imagen breve del hebreo.
- source_word: לֹא יִשְׁתּוּ
  english_pob_choice: they do not drink
  chosen_spanish: No beben
  alternatives_spanish:
  - No beberán
  - no están bebiendo
  lexicon: HALOT
  rationale: El imperfecto hebreo puede leerse en sentido presente o futuro. En español, el presente general transmite bien la escena profética vivida, sin fijar de más la temporalidad.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: «Vino» es el equivalente directo y estándar en español para יַיִן.
- source_word: יֵמַר
  english_pob_choice: is bitter
  chosen_spanish: es amarga
  alternatives_spanish:
  - se vuelve amarga
  - tiene sabor amargo
  lexicon: HALOT
  rationale: El hebreo expresa un estado de amargura. En español, «es amarga» comunica de manera concisa y natural que la bebida ha perdido su carácter agradable.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: la bebida fuerte
  alternatives_spanish:
  - bebida embriagante
  - licor fuerte
  lexicon: HALOT
  rationale: «Bebida fuerte» preserva la distinción léxica frente a «vino» y refleja el sentido de una bebida alcohólica/intoxicante no idéntica al vino. Se evita «cerveza» porque estrecha indebidamente el término hebreo.
- source_word: לְשֹׁתָיו
  english_pob_choice: to those who drink it
  chosen_spanish: para los que la beben
  alternatives_spanish:
  - para sus bebedores
  - para quienes la beben
  lexicon: HALOT
  rationale: La forma hebrea señala a los bebedores de esa bebida. En español, «para los que la beben» es claro, idiomático y conserva el objeto implícito mediante el pronombre femenino que retoma «bebida fuerte».
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el contexto de audit trail en inglés: se mantiene la ambigüedad temporal del imperfecto hebreo mediante un presente descriptivo en español, y se conserva la relación semántica entre el canto festivo y la bebida. No se detectan revisiones aplicadas en la fuente inglesa que obliguen a modificar la línea principal.'
  spanish_consistency_notes:
  - Se prefirió «con canto» por fluidez y fidelidad al valor de acompañamiento de בַּשִּׁיר.
  - «La bebida fuerte» conserva el contraste con «vino» y evita una paráfrasis culturalmente restringida.
  - El pronombre femenino en «la beben» retoma correctamente «la bebida fuerte».
  - La nota [a] preserva la alternativa temporal y modal del hebreo sin duplicar el sentido principal.
