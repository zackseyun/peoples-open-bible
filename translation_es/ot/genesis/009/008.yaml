translation:
  language: es
  text: Entonces Dios dijo a Noé y a sus hijos, que estaban con él, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» conserva ese avance temporal de manera natural en español y evita un calco pesado de «y dijo» al inicio de una escena narrativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios verdadero que habla a Noé. «Dios» es la equivalencia directa y transparente en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la forma natural para introducir el complemento indirecto con verbos de habla.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y reconocible.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - también a
  lexicon: HALOT
  rationale: La secuencia coordina un segundo destinatario. «Y a» conserva la estructura hebrea sin forzarla en español.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo especifica descendencia masculina. «Hijos varones» mantiene esa precisión; «hijos» sería más natural, pero puede perder el matiz de género del original.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La frase identifica a los hijos como presentes con Noé. «Con él» es breve y fiel al valor relacional de la expresión.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce la cita siguiente. «Diciendo» conserva el marcador discursivo explícito del hebreo y sigue el patrón del texto fuente.
theological_decisions:
- issue: Traducción del nombre divino אֱלֹהִים en un habla directa narrativa
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: No hay aquí sustitución por un título disfrazado; el hebreo usa אֱלֹהִים, no el tetragrámaton. Por eso «Dios» refleja de manera más directa el texto fuente y evita introducir una convención no requerida por este versículo.
  doctrine_reference: Transparencia del texto fuente y distinción entre אֱלֹהִים y יהוה
- issue: Referencia de género en בָּנָיו
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos varones
  alternative_spanish_readings:
  - sus hijos
  rationale: 'El contexto no es genérico sino masculino: se trata de los hijos de Noé. En español, añadir «varones» preserva la fuerza semántica del hebreo sin cambiar el sentido.'
  doctrine_reference: Precisión léxica y fidelidad al referente masculino del original
translation_notes:
  revision_awareness: El texto inglés auditado usa una solución de equivalencia óptima sin notas; esta versión española sigue el mismo grado de literalidad funcional, manteniendo el orden narrativo, el destinatario múltiple y el marcador de habla, con una precisión añadida en el sustantivo masculino para reflejar בָּנָיו.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלֹהִים cuando no aparece el nombre divino YHWH.
  - Se usa «Noé» como forma española estándar del nombre propio.
  - Se conserva «diciendo» como marcador de discurso explícito, coherente con el audit trail inglés.
  - Se evita «SEÑOR» porque no hay כאן un sustituto del tetragrámaton en el hebreo de este versículo.
