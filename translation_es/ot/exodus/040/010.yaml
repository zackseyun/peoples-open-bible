translation:
  language: es
  text: Y ungirás el altar del holocausto y todos sus utensilios[a], y consagrarás el altar, y el altar será santísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «santo de santos», una expresión superlativa que significa «santísimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - untarás con aceite
  - aplicarás aceite sobre
  lexicon: HALOT
  rationale: En contexto ritual, משׁח implica ungir con aceite para dedicar algo a un uso sagrado. «Ungir» es el equivalente natural y preciso en español, sin perder el sentido cultual.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio quemado
  - el altar para el holocausto
  lexicon: HALOT
  rationale: La frase señala el altar ligado al holocausto. «Holocausto» conserva el referente sacrificial del término hebreo en español bíblico y es idiomático en este contexto.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  - todos sus objetos
  lexicon: HALOT
  rationale: כֵּלִים abarca los instrumentos o piezas de servicio del altar. «Utensilios» comunica bien el conjunto de implementos rituales sin estrechar demasiado el campo semántico.
- source_word: וְקִדַּשְׁתָּ
  english_pob_choice: you shall consecrate
  chosen_spanish: consagrarás
  alternatives_spanish:
  - santificarás
  - harás santo
  lexicon: HALOT
  rationale: En este marco ritual, קדשׁ expresa poner aparte para Dios. «Consagrar» es la opción española más natural para esa dedicación formal y sacra.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - santo en extremo
  - sumamente santo
  - santo de santos
  lexicon: HALOT
  rationale: La construcción hebrea es un superlativo de santidad. «Santísimo» preserva esa intensificación en español con una forma breve y reverente. No se traduce como un nombre espacial («Santo de los santos») porque aquí describe el grado de santidad del altar.
theological_decisions:
- issue: Cómo rendir קֹדֶשׁ קָדָשִׁים sin confundirlo con el recinto del santuario
  english_pob_reading: most holy
  chosen_spanish_reading: santísimo
  alternative_spanish_readings:
  - santo de santos
  - sumamente santo
  rationale: El hebreo usa una superlación para describir la santidad del altar, no necesariamente una referencia espacial. «Santísimo» mantiene el valor intensivo y evita importar una asociación arquitectónica que el contexto inmediato no exige.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés POB mantiene la distinción entre el altar y sus utensilios, y nota la tensión en קֹדֶשׁ קָדָשִׁים con la alternativa «holy of holies». La presente versión conserva esa tensión en español mediante «santísimo», dejando explícito en nota que la expresión hebrea es superlativa y no un nombre espacial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se mantiene un registro culto y bíblico, pero con sintaxis española natural.
  - «Consagrar» se emplea como término ritual estable para קדשׁ en este contexto.
  - «Santísimo» evita traducir mecánicamente el giro hebreo como si fuera un topónimo litúrgico.
