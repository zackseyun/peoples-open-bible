id: T12P.GAD.04
reference: Testament of Gad 4
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 'IV. Φυλάξασθε οὖν, τέκνα μου¹, ἀπὸ τοῦ μίσους, ὅτι Γκαὶ² εἰς³ αὐτὸν τὸν Κύριον ἀνομίαν⁴ ποιεῖ. 2. Οὐ γὰρ θέλει ἀκούειν Γλόγων⁵ ἐντολῶν⁶ αὐτοῦ περὶ ἀγάπης *τοῦ πλησίον⁷* *Γκαὶ¹ εἰς Θεὸν ἁμαρτάνει⁸. 3. ΓἘὰν γὰρ πέσῃ ὁ ἀδελφός⁹, *σπουδάζει εὐθὺς¹⁰ ἀναγγεῖλαι τοῖς¹¹ πᾶσιν, καὶ σπεύδει *περὶ αὐτοῦ ἵνα κριθεὶς¹² καὶ κολασθεὶς ἀποθάνῃ. 4. Ἐὰν δὲ *δοῦλός τις ᾖ¹³, συμβαλεῖ¹⁴ αὐτὸν πρὸς τὸν κύριον αὐτοῦ, καὶ ἐν πάσῃ θλίψει¹⁵ *ἐπιχαίρει αὐτῷ¹⁶, εἴπως¹⁷ θανατωθῇ¹⁸. 5. *Τῷ γὰρ φθόνῳ συνεργεῖ τὸ μῖσος¹⁹, καὶ²⁰ κατὰ τῶν εὐπραγούντων· *ἐν προκοπῇ²¹ ἀκούων καὶ²² ὁρῶν πάντοτε ἀσθενεῖ. 6. Ὥσπερ²³ ἡ ἀγάπη Γκαὶ¹ τοὺς νεκροὺς *θέλει ζωοποιῆσαι²⁴ καὶ τοὺς ἐν²⁵ ἀποφάσει θανάτου θέλει²⁶ ἀνακαλέσασθαι, οὕτως καὶ²⁷ τὸ μῖσος τοὺς ζῶντας θέλει ἀποκτεῖναι, καὶ *τοὺς ἐν ὀλίγῳ ἁμαρτήσαντας²⁸ οὐ θέλει ζῆν. 7. Τὸ γὰρ πνεῦμα τοῦ μίσους *διὰ τῆς²⁹ ὀλιγοψυχίας συνεργεῖ τῷ Σατανᾷ ἐν πᾶσιν εἰς θάνατον τῶν ἀνθρώπων, τὸ δὲ πνεῦμα τῆς ἀγάπης *ἐν μακροθυμίᾳ³⁰ συνεργεῖ *τῷ νόμῳ³¹ τοῦ Θεοῦ εἰς σωτηρίαν τῶν³² ἀνθρώπων.'
