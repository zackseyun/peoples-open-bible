review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca el POB inglés: nubes llenas de lluvia, derramamiento sobre la tierra, árbol que cae al sur o al norte, y permanencia en el lugar donde cae. Sin embargo, la nota al pie está mal formulada: dice «O, más literalmente, “la derraman”», cuando la alternativa literal documentada en el POB inglés corresponde al verbo final שָׁם יְהוּא, no a «la derraman».'
  spanish_quality_summary: El español es claro, natural y digno. «Están llenas», «la derraman», «sobre la tierra», «al sur o al norte» y «allí quedará» son buenas opciones idiomáticas. La única reparación necesaria es la nota al pie, para que explique correctamente la relación entre el hebreo «ser/estar» y la opción española contextual.
  glossary_alignment: No hay términos del glosario de proyecto en juego aquí. Las decisiones léxicas principales concuerdan con la auditoría inglesa. «Allí quedará» es una adaptación española legítima del simple «ser/estar» hebreo en contexto de árbol caído, análoga a «there it will lie» en inglés.
  issues:
  - severity: high
    issue: La nota al pie a está anclada correctamente en «lluvia[a]», pero su contenido describe erróneamente «la derraman» como la alternativa más literal.
    rationale: La nota del POB inglés aclara que la literalidad afecta al verbo final «there it will be», no a la primera cláusula. En español, la nota debe explicar que el hebreo dice más literalmente «allí estará» o «allí será», mientras que «quedará» expresa el sentido natural para un árbol caído.
  - severity: low
    issue: La ubicación del marcador en «lluvia[a]» es heredada del inglés y puede parecer distante del verbo final al que realmente comenta.
    rationale: No invalida el texto, pero la nota debe redactarse con suficiente claridad para evitar confusión. Dado que la práctica del registro ya usa ese marcador, basta con corregir el contenido de la nota.
  revised_spanish_text: Si las nubes están llenas de lluvia[a], la derraman sobre la tierra; y si un árbol cae al sur o al norte, en el lugar donde cae el árbol, allí quedará.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «allí estará» o «allí será». El verbo hebreo final es simplemente «ser/estar», pero «quedará» expresa de forma natural en español el estado de un árbol caído.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el POB inglés. Solo se corrige la nota al pie para que describa correctamente la alternativa literal documentada para el verbo final hebreo, en vez de atribuirla erróneamente a «la derraman».
