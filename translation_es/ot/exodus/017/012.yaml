  yaml_path: translation/ot/exodus/017/012.yaml
  text: But Moses’ hands were heavy[a], so they took a stone and put it under him, and he sat on it. And Aaron and Hur supported his hands, one on this side and one on that side, so his hands remained steady until the sun set.
  footnotes:
