review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del hebreo: la integridad de los rectos guía, y la cualidad moral opuesta lleva a la ruina a los traicioneros. Sin embargo, se aparta de una decisión léxica importante del POB inglés al reemplazar la imagen de סֶלֶף (''crookedness'', torcimiento) por ''perversidad'' en el texto principal. Esa alternativa sí está documentada, pero en el audit trail inglés queda como nota, no como elección principal. También ''traidores'' estrecha algo más que ''treacherous''/''bōgĕdîm'', que en Proverbios es más amplio: personas desleales o pérfidas, no necesariamente traidores en sentido específico.'
  spanish_quality_summary: El español es claro, natural y digno. 'La integridad de los rectos los guía' suena bien. La principal mejora de legibilidad-fidelidad es restaurar la imagen metafórica con 'torcedura' o una formulación equivalente más idiomática; 'lo torcido de los desleales' sería posible, pero menos directa. 'La torcedura de los desleales' mantiene mejor el contraste con 'rectos' y sigue siendo comprensible. 'Desleales' lee más naturalmente que 'traidores' en un proverbio general.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones relevantes son léxicas de sabiduría: תֻּמַּת = ''integridad'' está bien; יְשָׁרִים = ''rectos'' está bien; תַּנְחֵם = ''los guía'' está bien. El principal ajuste necesario es סֶלֶף, donde conviene preservar en el texto principal la imagen de torcimiento/crookedness según la documentación inglesa, dejando ''perversidad'' como alternativa en nota. Para בּוֹגְדִים, ''desleales'' alinea mejor con ''the treacherous'' que ''traidores''.'
  issues:
  - severity: medium
    issue: '''Perversidad'' en el texto principal para סֶלֶף'
    rationale: El POB inglés escogió 'crookedness' como lectura principal precisamente para conservar la imagen de torcimiento moral en contraste con 'upright'. 'Perversidad' está documentada como alternativa, pero no como la mejor opción principal.
  - severity: medium
    issue: '''Traidores'' para בּוֹגְדִים es demasiado específico'
    rationale: El participio describe a quienes actúan con deslealtad o perfidia de manera general. 'Traidores' puede sugerir un tipo más estrecho de traición; 'desleales' preserva mejor el alcance sapiencial.
  - severity: low
    issue: Anclaje de nota [a] en 'rectos' es poco preciso
    rationale: La nota [a] comenta סֶלֶף, no 'rectos'. El marcador debe colocarse junto a la palabra o frase relevante para evitar ambigüedad editorial.
