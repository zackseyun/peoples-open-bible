translation:
  language: es
  text: Así Jonathan hizo un pacto con la casa de David, y Yahvé lo requirió[a] de mano de los enemigos de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y Yahvé lo requirió a mano de los enemigos de David»; el hebreo deja el objeto sin expresar, probablemente en referencia a la responsabilidad del pacto o a la retribución.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - cortó un pacto
  - estableció un pacto
  - hizo una alianza
  lexicon: HALOT
  rationale: כרת con un pacto es el idiomático 'hacer/cortar un pacto'. En español, 'hizo un pacto' comunica de manera natural el acto solemne de concertar el pacto sin perder el trasfondo semítico del verbo de corte. 'Hizo una alianza' sería posible, pero suaviza el matiz jurídico del texto.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonathan
  alternatives_spanish:
  - Jonatán
  lexicon: transliteración tradicional del nombre
  rationale: Se conserva la forma ampliamente reconocible del nombre propio, con adaptación ortográfica usual al español bíblico cuando corresponde. Aquí se mantiene 'Jonathan' como forma de lectura clara y consistente con el registro de la obra.
- source_word: עִם בֵּית דָּוִד
  english_pob_choice: with the house of David
  chosen_spanish: con la casa de David
  alternatives_spanish:
  - con la casa de David
  - con la familia de David
  - con el linaje de David
  lexicon: HALOT
  rationale: בֵּית דָּוִד es una expresión dinástica; 'casa de David' preserva mejor la amplitud institucional y dinástica que 'familia'. En español, 'con la casa de David' es natural y mantiene la posible referencia al linaje.
- source_word: וּבִקֵּשׁ
  english_pob_choice: required it
  chosen_spanish: lo requirió
  alternatives_spanish:
  - lo pidió
  - lo demandó
  - lo buscó
  lexicon: HALOT
  rationale: El hebreo tiene objeto elíptico y el POB inglés decide conservar esa ambigüedad con 'it'. En español, 'lo requirió' mantiene la fuerza de exigencia/ejecución del verbo sin resolver excesivamente el objeto implícito. 'Lo buscó' sería demasiado débil y 'lo demandó' demasiado interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: nombre divino tetragramático
  rationale: El proyecto pide 'Yahvé' para יְהוָה en el texto principal. Se mantiene el nombre propio divino, evitando la sustitución por título. 'Jehová' no se usa por no corresponder al estándar de este proyecto.
- source_word: מִיַּד
  english_pob_choice: at the hand of / from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de la mano de
  - por medio de
  - a manos de
  lexicon: HALOT
  rationale: La locución hebrea conserva la imagen de agencia. 'De mano de' es una solución bíblica y comprensible en español, más concisa que 'de la mano de' y menos interpretativa que 'por medio de'.
- source_word: אֹיְבֵי דָוִד
  english_pob_choice: David’s enemies
  chosen_spanish: los enemigos de David
  alternatives_spanish:
  - los enemigos de David
  - enemigos de David
  lexicon: HALOT
  rationale: Se traduce el constructo de forma natural en español. La forma definida 'los enemigos de David' comunica claramente el referente y evita ambigüedad sintáctica.
theological_decisions:
- issue: Cláusula elíptica sobre lo que Yahvé 'requiere'
  english_pob_reading: The LORD required it at the hand of David’s enemies.
  chosen_spanish_reading: Yahvé lo requirió de mano de los enemigos de David.
  alternative_spanish_readings:
  - Yahvé requirió esto de mano de los enemigos de David.
  - Yahvé pidió cuentas de mano de los enemigos de David.
  - Yahvé lo hizo requerir a manos de los enemigos de David.
  rationale: 'El hebreo no explicita el objeto de וּבִקֵּשׁ, y el POB inglés preserva esa elipsis con ''it''. En español, ''lo requirió'' conserva la misma ambigüedad controlada: hay algo exigido o reclamado por Yahvé en relación con los enemigos de David, sin fijar dogmáticamente si se trata de responsabilidad pactal, represalia o retribución. Se evita resolver el sentido con un verbo más interpretativo como ''vengó'', para respetar la tensión documental del texto.'
  doctrine_reference: Preservar la ambigüedad legítima del texto hebreo y no cerrar el sentido con una paráfrasis doctrinalmente cargada.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB inglés, que prefirió 'required it at the hand of' frente a 'sought it from the hand of' por mayor precisión idiomática. En español, eso se refleja con 'lo requirió de mano de', manteniendo la misma precisión y la elipsis del objeto implícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva 'casa de David' como expresión dinástica.
  - Se mantiene la ambigüedad del objeto implícito con 'lo', sin explicitarlo en el texto principal.
  - La puntuación y el orden de cláusulas siguen un registro bíblico moderno y legible.
