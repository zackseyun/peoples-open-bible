id: 2CH.13.7
reference: 2 Chronicles 13:7
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ עָלָ֗י/ו אֲנָשִׁ֤ים רֵקִים֙ בְּנֵ֣י בְלִיַּ֔עַל וַ/יִּֽתְאַמְּצ֖וּ עַל רְחַבְעָ֣ם בֶּן שְׁלֹמֹ֑ה וּ/רְחַבְעָ֗ם הָ֤יָה נַ֨עַר֙ וְ/רַךְ לֵבָ֔ב וְ/לֹ֥א הִתְחַזַּ֖ק לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: And worthless men[a], sons of Belial, gathered around him and proved stronger than Rehoboam son of Solomon, when Rehoboam was young and fainthearted and had not strengthened himself against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scoundrels' or 'worthless men' for 'sons of Belial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ עָלָיו
  chosen: gathered around him
  alternatives:
  - assembled against him
  - banded together around him
  lexicon: HALOT
  rationale: The verb קבץ with עַל can denote gathering against or around someone. In this context of political rebellion, 'gathered around him' preserves the image of men rallying to Jeroboam while allowing the hostile implication to emerge from context.
- source_word: אֲנָשִׁים רֵקִים
  chosen: worthless men
  alternatives:
  - empty men
  - vain men
  - idle men
  lexicon: HALOT
  rationale: רֵקִים literally means 'empty,' but idiomatically describes men of no worth or substance. 'Worthless men' is natural modern English and preserves the moral judgment.
- source_word: בְּנֵי בְלִיַּעַל
  chosen: sons of Belial
  alternatives:
  - scoundrels
  - wicked men
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'sons of Belial.' Because Belial can function either as a personified name or as an abstract term for worthlessness/wickedness, the literal rendering is retained in the main text for auditability, with a lexical alternative preserved in a footnote.
- source_word: וַיִּתְאַמְּצוּ עַל
  chosen: proved stronger than
  alternatives:
  - strengthened themselves against
  - prevailed over
  lexicon: HALOT
  rationale: The hitpael of אמץ here conveys showing oneself strong in opposition. 'Proved stronger than' communicates the comparative force clearly in contemporary English without overparaphrasing.
- source_word: נַעַר
  chosen: young
  alternatives:
  - a youth
  - inexperienced
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or young man. Since Rehoboam was not literally a child, 'young' best captures the relative immaturity implied in the rhetoric.
- source_word: רַךְ לֵבָב
  chosen: fainthearted
  alternatives:
  - tenderhearted
  - weak of heart
  - soft-hearted
  lexicon: HALOT
  rationale: Literally 'soft/tender of heart,' but in this political-military setting it denotes lack of resolve rather than compassion. 'Fainthearted' best fits the context.
- source_word: לֹא הִתְחַזַּק לִפְנֵיהֶם
  chosen: could not stand against them
  alternatives:
  - did not show himself strong before them
  - did not prevail against them
  lexicon: HALOT
  rationale: The idiom means he did not make himself strong in their presence, i.e., he could not resist them effectively. 'Could not stand against them' is idiomatic English that preserves the sense.
