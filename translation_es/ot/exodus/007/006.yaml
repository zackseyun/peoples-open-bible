translation:
  language: es
  text: Así Moisés y Aarón hicieron tal como Yahvé les había mandado[a]; así hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - lo hicieron
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio ('hacer'). En este contexto de obediencia a un mandato, 'hicieron' suena natural en español y conserva el paralelo con la repetición final del versículo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española asentada del nombre propio.
- source_word: וְאַהֲרֹן
  english_pob_choice: and Aaron
  chosen_spanish: y Aarón
  alternatives_spanish:
  - y Aaron
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española asentada del nombre propio.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - como
  - tal como
  lexicon: HALOT
  rationale: La construcción expresa conformidad precisa entre el mandato y la acción; 'exactamente como' transmite mejor esa correspondencia que un simple 'como'.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: צוה denota dar una orden o mandato. 'Había mandado' es idiomático y conserva el sentido de una instrucción vinculante previa a la obediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se preserva el nombre divino personal en español como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: HALOT
  rationale: El sufijo pronominal refiere a Moisés y Aarón. En español, el dativo 'les' funciona naturalmente con 'mandar' ('mandó a alguien hacer algo') y evita una duplicación pesada.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - entonces
  lexicon: HALOT
  rationale: Refuerza la correspondencia con lo mandado. 'Así' preserva la brevedad y el eco del hebreo.
- source_word: עָשׂוּ
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - lo hicieron
  - actuaron
  lexicon: HALOT
  rationale: La repetición del verbo final remata la obediencia. 'Hicieron' mantiene el eco verbal del inicio sin sobrecargar la frase.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrammaton directamente. El POB inglés lo rinde como 'Yahweh'; en español, la forma proyectada para este nombre es 'Yahvé', preservando el nombre personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail en inglés quedó sin cambios en la última pasada (latest_revision_pass: unchanged=true), y el control cruzado reporta alta concordancia; por tanto, esta versión española sigue de cerca la lectura estable del POB inglés sin introducir revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantuvo la repetición del verbo al inicio y al final para reflejar el paralelismo hebreo.
  - Se eligió 'Yahvé' por consistencia con el criterio del proyecto para יְהוָה.
  - Se usó 'les' con 'mandó' para una construcción natural en español, sin alterar el referente plural del objeto.
  - No se añadió puntuación explicativa fuera de lo requerido por la nota textual.
