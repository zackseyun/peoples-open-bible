translation:
  language: es
  text: Oh Yahvé, Dios de Abraham, de Isaac y de Israel[a], nuestros padres, guarda esto para siempre en las intenciones de los pensamientos del corazón de tu pueblo[b][d], y dirige su corazón hacia ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Israel»; muchos lectores esperarían «Jacob» en esta fórmula patriarcal, pero el texto aquí dice «Israel».
    reason: lexical_alternative
  - marker: b
    text: 'O: «como la inclinación de los pensamientos del corazón de tu pueblo».'
    reason: alternative_reading
  - marker: c
    text: 'O: «y establece su corazón hacia ti».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en las intenciones de los pensamientos del corazón de tu pueblo».'
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un título enmascarado. En español bíblico de este proyecto, la forma establecida es «Yahvé», que corresponde al mismo referente del hebreo יְהוָה.
- source_word: אֱלֹהֵי
  english_pob_choice: God of
  chosen_spanish: Dios de
  alternatives_spanish:
  - el Dios de
  - Dios, de
  lexicon: HALOT
  rationale: 'El constructo hebreo exige una relación posesiva/covenantal natural en español: «Dios de». Mantiene claridad y fidelidad al giro del original.'
- source_word: אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל אֲבֹתֵינוּ
  english_pob_choice: Abraham, Isaac, and Israel, our fathers
  chosen_spanish: Abraham, de Isaac y de Israel, nuestros padres
  alternatives_spanish:
  - Abraham, Isaac y Jacob, nuestros padres
  - Abraham, Isaac y de Israel, nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo dice «Israel», no «Jacob», y el POB inglés preserva esa tensión textual. En español se mantiene «Israel» sin armonizarlo, y se conserva el lenguaje de parentesco masculino plural «nuestros padres» por correspondencia con el original y la política de precisión de género.
- source_word: שֳׁמְרָה
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - preserva
  - conserva
  - protege
  lexicon: HALOT
  rationale: Es una súplica imperativa a Dios. «Guarda» funciona de manera natural en español bíblico y puede abarcar preservar/retener, sin perder la fuerza peticional.
- source_word: זֹּאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - estas cosas
  lexicon: HALOT
  rationale: El demostrativo singular engloba de forma colectiva la disposición y la ofrenda mencionadas previamente. «Esto» respeta mejor el singular hebreo que una pluralización explicativa.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Expresa continuidad duradera de forma idiomática y clara en español contemporáneo, con el mismo valor temporal amplio del hebreo.
- source_word: לְיֵצֶר
  english_pob_choice: in the intentions
  chosen_spanish: como la inclinación
  alternatives_spanish:
  - como la intención
  - como el impulso
  - según la inclinación
  lexicon: HALOT
  rationale: יֵצֶר puede denotar inclinación/disposición, y en este contexto modifica pensamientos del corazón. «Como la inclinación» conserva esa ambivalencia entre disposición interior e intención, sin sobreinterpretar el sintagma.
- source_word: מַחְשְׁב֖וֹת
  english_pob_choice: the thoughts
  chosen_spanish: de los pensamientos
  alternatives_spanish:
  - de los planes
  - de los propósitos
  lexicon: HALOT
  rationale: Se mantiene «pensamientos» para reflejar el vínculo léxico con el hebreo y con la antropología bíblica del interior humano.
- source_word: לְבַב עַמֶּךָ
  english_pob_choice: of the heart of your people
  chosen_spanish: del corazón de tu pueblo
  alternatives_spanish:
  - de la mente de tu pueblo
  - del interior de tu pueblo
  lexicon: HALOT
  rationale: לְבַב se vierte por «corazón» para preservar el lenguaje bíblico del centro interior de la persona. «Tu pueblo» conserva el singular colectivo del hebreo.
- source_word: וְהָכֵן
  english_pob_choice: and direct
  chosen_spanish: y dirige
  alternatives_spanish:
  - y establece
  - y prepara
  - y afirma
  lexicon: HALOT
  rationale: La forma causativa admite las ideas de establecer/preparar/orientar. En combinación con el complemento direccional, «dirige» expresa de modo claro la orientación del corazón hacia Dios.
- source_word: לְבָבָם אֵלֶיךָ
  english_pob_choice: their heart toward you
  chosen_spanish: su corazón hacia ti
  alternatives_spanish:
  - sus corazones hacia ti
  - su corazón a ti
  lexicon: HALOT
  rationale: El singular colectivo «su corazón» reproduce el hebreo y evita la pluralización innecesaria. «Hacia ti» conserva la dirección relacional del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto en lugar de sustituirlo por un título. La decisión sigue la norma del proyecto para יְהוָה y hace visible el dato del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia patrimonial a los patriarcas
  english_pob_reading: Abraham, Isaac, and Israel, our fathers
  chosen_spanish_reading: Abraham, de Isaac y de Israel, nuestros padres
  alternative_spanish_readings:
  - Abraham, Isaac y Jacob, nuestros padres
  - Abraham, Isaac y Israel, nuestros antepasados
  rationale: Se conserva «Israel» porque es la lectura del hebreo, aunque el formulario más conocido en otras tradiciones diga «Jacob». También se mantiene el masculino plural «nuestros padres» por fidelidad al referente patriarcal y a la decisión de no neutralizar automáticamente el género.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: שׁמר / petición de preservación divina
  english_pob_reading: keep this forever
  chosen_spanish_reading: guarda esto para siempre
  alternative_spanish_readings:
  - preserva esto para siempre
  - conserva esto para siempre
  rationale: La oración pide que Dios mantenga y salvaguarde una disposición interior. «Guarda» es suficientemente amplio para preservar sin reducir el verbo a mera vigilancia.
  doctrine_reference: HALOT / uso contextual de שׁמר
translation_notes:
  revision_awareness: 'El inglés auditable pasó por ajustes menores de estilo: la formulación base «in the intentions of the thoughts» fue considerada frente a «as the inclination of the thoughts», pero la revisión final retuvo el énfasis en el sintagma interno. La versión española refleja esa tensión con «como la inclinación» en el texto principal y una nota alternativa que conserva la otra posibilidad semántica. También se mantiene la lectura textual «Israel» en lugar de armonizar con «Jacob».'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantuvo «Dios de Abraham, de Isaac y de Israel» sin armonizar a «Jacob».
  - Se conservó el singular colectivo «su corazón» para לְבָבָם.
  - «Corazón» se retuvo como centro interior bíblico, no como mera emoción.
  - Las notas usan marcadores únicos y cada marcador presente en el texto aparece una sola vez.
