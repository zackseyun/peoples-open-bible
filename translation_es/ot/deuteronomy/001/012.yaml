translation:
  language: es
  text: ¿Cómo podré yo solo soportar sus dificultades, su carga y sus pleitos[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus contiendas» o «sus casos legales» para «sus pleitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How can
  chosen_spanish: ¿Cómo podré...?
  alternatives_spanish:
  - ¿Cómo puedo... ?
  - ¿Cómo he de...?
  lexicon: HALOT
  rationale: La forma interrogativa exclamativa expresa dificultad o imposibilidad retórica. En español, «¿Cómo podré yo solo...?» transmite mejor esa fuerza que un simple «¿Cómo...?» y mantiene el matiz de incapacidad práctica.
- source_word: אֶשָּׂא
  english_pob_choice: bear
  chosen_spanish: soportar
  alternatives_spanish:
  - cargar con
  - llevar
  - sostener
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar cargar o asumir una responsabilidad. En este contexto abstracto, «soportar» comunica bien la idea de asumir el peso de asuntos difíciles sin sonar materialmente literal de forma extraña en español.
- source_word: לְבַדִּי
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - solamente yo
  - por mi cuenta
  - yo mismo
  lexicon: HALOT
  rationale: «Yo solo» preserva el énfasis de exclusividad personal y suena natural en español. La colocación pospuesta del adjetivo mantiene el énfasis retórico del original.
- source_word: טָרְחֲכֶם
  english_pob_choice: your trouble
  chosen_spanish: su afán
  alternatives_spanish:
  - su molestia
  - su fatiga
  - su carga de trabajo
  lexicon: HALOT
  rationale: טֹרַח denota molestia, fatiga o carga penosa. «Afán» recoge el desgaste o trabajo gravoso con un registro digno y breve, y permite distinguirlo de los otros dos sustantivos.
- source_word: מַשַּׂאֲכֶם
  english_pob_choice: your burden
  chosen_spanish: su carga
  alternatives_spanish:
  - su peso
  - su fardo
  lexicon: HALOT
  rationale: מַשָּׂא significa carga o peso. «Carga» es el equivalente español más directo y conserva el paralelismo con el verbo «soportar».
- source_word: רִיבְכֶם
  english_pob_choice: your disputes
  chosen_spanish: sus pleitos
  alternatives_spanish:
  - sus disputas
  - sus litigios
  - sus contiendas
  lexicon: HALOT
  rationale: רִיב puede abarcar disputa, contienda o caso judicial. «Pleitos» mantiene la dimensión judicial y contenciosa que el contexto de Moisés juzgando al pueblo sugiere, sin perder inteligibilidad general.
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene tres sustantivos diferenciados: trouble, burden y disputes, con una nota léxica para רִיב que abre la posibilidad de ‘strife’ o ‘legal cases’. La versión española preserva esa triple distinción con afán, carga y pleitos, evitando fusionar los dos últimos términos y manteniendo el carácter retórico de la pregunta.'
  spanish_consistency_notes:
  - Se preservó el paralelismo semántico de tres elementos sin alargar innecesariamente la frase.
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes porque no hay nombres divinos en el versículo.
  - «Pleitos» se eligió por su valor judicial y conflictivo, coherente con la nota inglesa sobre posibles sentidos legales.
