translation:
  language: es
  text: 'y Shaaraim[a], y Adithaim, y Gederah, y Gederothaim: catorce ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes señalan que los cuatro nombres de lugar enumerados en este versículo no suman de manera obvia las «catorce ciudades»; la historia textual de la sección más amplia puede explicar la discrepancia, pero el hebreo aquí se traduce tal como está.
    reason: textual_variant
lexical_decisions:
- source_word: שַׁעֲרַיִם
  english_pob_choice: Shaaraim
  chosen_spanish: Shaaraim
  alternatives_spanish:
  - Sharaim
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera para conservar la forma transparente del hebreo, como en el texto inglés POB.
- source_word: עֲדִיתַיִם
  english_pob_choice: Adithaim
  chosen_spanish: Aditaim
  alternatives_spanish:
  - Adithaim
  lexicon: HALOT
  rationale: Nombre propio toponímico. Se adapta a una transliteración castellana fluida, manteniendo la terminación -aim que refleja la forma hebrea pluralizada del nombre.
- source_word: הַגְּדֵרָה
  english_pob_choice: Gederah
  chosen_spanish: Gederá
  alternatives_spanish:
  - la Gederá
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español conviene tratarlo como nombre propio sin artículo, siguiendo el criterio del POB en inglés. Se mantiene la vocal tónica final con acento gráfico para lectura natural.
- source_word: גְדֵרֹתָיִם
  english_pob_choice: Gederothaim
  chosen_spanish: Gederotaim
  alternatives_spanish:
  - Gederotáim
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. Se conserva la forma pluralizada del topónimo con una adaptación ortográfica sobria al español.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - aldeas
  lexicon: HALOT
  rationale: En listas territoriales, עָרִים designa asentamientos principales; 'ciudades' reproduce mejor la fuerza administrativa que 'pueblos' o 'aldeas'.
- source_word: אַרְבַּע עֶשְׂרֵה
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - '14'
  lexicon: HALOT
  rationale: Número cardinal traducido idiomáticamente al español.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus pueblos
  - sus asentamientos
  lexicon: HALOT
  rationale: En listas de repartición territorial, חָצֵר puede referir asentamientos dependientes o no fortificados; 'aldeas' comunica bien esa relación subordinada sin imponer una precisión mayor que la del hebreo.
theological_decisions:
- issue: Discrepancia numérica entre los cuatro nombres mencionados y las 'catorce ciudades'
  english_pob_reading: Some interpreters note that the four place names listed in this verse do not obviously total the stated 'fourteen cities'; the larger section's textual history may account for the discrepancy, but the Hebrew text here is translated as given.
  chosen_spanish_reading: Algunos intérpretes señalan que los cuatro nombres de lugar enumerados en este versículo no suman de manera obvia las 'catorce ciudades'; la historia textual de la sección mayor puede explicar la discrepancia, pero el hebreo aquí se traduce tal como está.
  alternative_spanish_readings:
  - armonizar el número mediante enmienda
  - omitir la nota y normalizar el conteo
  rationale: Se conserva la tensión textual documentada por el POB en inglés sin resolverla artificialmente. La traducción principal sigue el hebreo recibido y la nota deja abierta la posibilidad de una explicación textual.
  doctrine_reference: Crítica textual y fidelidad al texto recibido
translation_notes:
  revision_awareness: Se siguió el pasaje inglés POB estable más reciente, sin cambios editoriales en la tradición auditada; la versión española mantiene el mismo contenido y la misma nota textual, con adaptación natural al español.
  spanish_consistency_notes:
  - Se preservó la transliteración de los topónimos como nombres propios, evitando traducirlos.
  - Se tradujo חַצְרֵיהֶן como 'sus aldeas' para reflejar asentamientos dependientes dentro de un listado territorial.
  - Se mantuvo la nota sobre la discrepancia numérica porque forma parte del audit trail y no debe borrarse sin fundamento textual.
