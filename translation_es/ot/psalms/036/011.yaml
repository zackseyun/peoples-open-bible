translation:
  language: es
  text: Prolonga tu amor constante[a] a los que te conocen, y tu rectitud[b] a los rectos de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Extiende tu amor constante»; literalmente, «saca/extiende tu amor constante».
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֹׁךְ
  english_pob_choice: Continue
  chosen_spanish: Prolonga
  alternatives_spanish:
  - Extiende
  - Continúa
  - Alarga
  lexicon: HALOT
  rationale: 'El hebreo es un imperativo de משׁך, con sentido básico de “tirar/dibujar/estirar”. En este contexto poético, el pedido no es mecánico sino temporal y relacional: que el favor de Yahvé siga vigente. “Prolonga” comunica bien la idea de hacer durar esa acción, con naturalidad en español bíblico actual.'
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu amor leal
  - tu bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד reúne fidelidad leal, benevolencia y compromiso pactual. En español, “misericordia” es una opción tradicional y comprensible, aunque no agota el matiz de lealtad del término; se conserva aquí como equivalente reverente y eclesialmente legible. Se evita imponer una paráfrasis más extensa que diluya el paralelismo.
- source_word: לְיֹדְעֶיךָ
  english_pob_choice: to those who know you
  chosen_spanish: a los que te conocen
  alternatives_spanish:
  - para los que te conocen
  - a quienes te conocen
  lexicon: HALOT
  rationale: 'El participio plural con ל indica destinatarios del favor divino: quienes están en relación de conocimiento con Dios. “A los que te conocen” es idiomático, mantiene la dirección del don y conserva el sentido relacional del conocimiento bíblico.'
- source_word: וְצִדְקָתְךָ
  english_pob_choice: and your righteousness
  chosen_spanish: y tu justicia
  alternatives_spanish:
  - y tu rectitud
  - y tu justicia rectora
  lexicon: HALOT
  rationale: צְדָקָה puede traducirse como “justicia” o “rectitud”. Aquí el paralelismo con חֶסֶד favorece una cualidad activa de Dios hacia su pueblo; “justicia” mantiene esa amplitud en español y coincide con la alternativa documentada en el audit trail inglés.
- source_word: לְיִשְׁרֵי לֵב
  english_pob_choice: to the upright in heart
  chosen_spanish: a los rectos de corazón
  alternatives_spanish:
  - a los de corazón recto
  - a los íntegros de corazón
  - a los rectos en el corazón
  lexicon: HALOT
  rationale: יִשְׁרֵי לֵב es un modismo de integridad interior. “Rectos de corazón” reproduce bien la estructura hebrea y es claro en español. Se evita “en corazón” por sonar menos natural, y “rectos” conserva la imagen moral de rectitud/recta disposición.
theological_decisions:
- issue: Paralelismo entre חֶסֶד y צְדָקָה
  english_pob_reading: Translate חֶסֶד as 'steadfast love' and צְדָקָה as 'righteousness' in coordinated parallel without importing later doctrinal categories.
  chosen_spanish_reading: Mantener el paralelismo como petición de benevolencia fiel y justicia/rectitud divina, sin convertirlo en una fórmula doctrinal más específica.
  alternative_spanish_readings:
  - Traducir חֶסֶד como 'amor constante' y צְדָקָה como 'rectitud'
  - Traducir צְדָקָה como 'justicia' y חֶסֶד como 'bondad fiel'
  rationale: El versículo expresa un deseo poético sobre el obrar continuo de Dios hacia dos grupos caracterizados. La elección de “misericordia” y “justicia” conserva la coordinación y la amplitud semántica sin forzar un sentido forense o sacramental que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado en el audit trail: sin cambios necesarios, con acuerdo alto entre revisores. La redacción española preserva el paralelismo del hebreo y la alternativa lexical documentada en el texto inglés.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma preferida del proyecto cuando aparece el nombre divino; aquí no aparece en el versículo.
  - Se conservó el tono poético y la correspondencia entre dos miembros paralelos con la misma preposición final en español.
  - Se evitó 'SEÑOR' como sustituto del nombre divino porque no corresponde a este versículo y el proyecto prefiere transliteración cuando aplica.
  - Se eligió 'justicia' para צְדָקָה en armonía con la opción alternativa atestiguada en el audit trail inglés, sin perder la posibilidad de entender 'rectitud'.
