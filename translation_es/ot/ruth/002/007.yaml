translation:
  language: es
  text: 'Ella dijo: «Por favor, déjame espigar y recoger entre las gavillas, detrás de los segadores». Y vino y se ha quedado desde la mañana hasta ahora; ha estado en la casa[a] solo un poco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ha descansado en el refugio solo un poco». El hebreo de la cláusula final es difícil; «casa» puede referirse a un cobertizo o refugio de trabajo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲלַקֳטָה
  english_pob_choice: let me glean
  chosen_spanish: déjame espigar
  alternatives_spanish:
  - permíteme espigar
  - déjame recoger
  lexicon: HALOT
  rationale: El cohortativo expresa petición/deseo; «espigar» es el término agrícola preciso y natural en español para este contexto, más exacto que un genérico «recoger».
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - amablemente
  lexicon: HALOT
  rationale: La partícula de cortesía se expresa de manera natural y respetuosa con «por favor».
- source_word: וְאָסַפְתִּי
  english_pob_choice: and gather
  chosen_spanish: y recoger
  alternatives_spanish:
  - y juntar
  - y recolectar
  lexicon: HALOT
  rationale: Se distingue de לקט/«espigar» mediante un verbo coordinado que comunica la acción de reunir lo espigado sin duplicar innecesariamente el primer verbo.
- source_word: בָעֳמָרִים
  english_pob_choice: among the sheaves
  chosen_spanish: entre las gavillas
  alternatives_spanish:
  - entre los manojos
  - entre las gavillas
  lexicon: HALOT
  rationale: «Gavillas» es el equivalente agrícola habitual para עֳמָרִים. Se conserva la imagen de trabajar entre los haces ya atados.
- source_word: אַחֲרֵי הַקּוֹצְרִים
  english_pob_choice: after the reapers
  chosen_spanish: detrás de los segadores
  alternatives_spanish:
  - tras los segadores
  - después de los segadores
  lexicon: HALOT
  rationale: 'El sentido espacial es primario en español: «detrás de» comunica mejor la posición de la espigadora siguiendo a los segadores.'
- source_word: וַתָּבֹא וַתַּעֲמֹד
  english_pob_choice: So she came and has remained
  chosen_spanish: Y vino y se ha quedado
  alternatives_spanish:
  - Entonces vino y estuvo
  - Y vino y permaneció
  lexicon: HALOT
  rationale: El hebreo literalmente dice «vino y se puso de pie», pero el contexto resume su permanencia continua; «se ha quedado» reproduce mejor ese valor durativo en español.
- source_word: מֵאָז הַבֹּקֶר וְעַד עַתָּה
  english_pob_choice: from morning until now
  chosen_spanish: desde la mañana hasta ahora
  alternatives_spanish:
  - desde temprano hasta ahora
  - desde la mañana hasta el momento
  lexicon: HALOT
  rationale: Expresa la duración ininterrumpida de manera clara y natural, sin añadir precisión temporal no indicada por el texto.
- source_word: זֶה שִׁבְתָּהּ הַבַּיִת מְעָט
  english_pob_choice: she has sat in the house only a little
  chosen_spanish: solo ha estado sentada en la casa muy poco
  alternatives_spanish:
  - solo ha descansado en el refugio muy poco
  - solo ha permanecido en la casa poco tiempo
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de «sentarse» y la dificultad del sintagma final. «Casa» se mantiene como traducción principal, sin decidir en el texto si se trata de una casa literal o un refugio del campo; el adverbio «muy poco» refleja la mínima duración.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió una formulación más natural en la cláusula final (“she has sat in the house only a little”) en lugar de un giro concesivo (“except that”). La versión española sigue esa revisión y conserva la ambigüedad del final con una nota alternativa, sin imponer una interpretación no asegurada por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la distinción entre «espigar» y «recoger» para reflejar dos verbos hebreos diferentes.
  - «Gavillas» conserva la imagen agrícola y evita una generalización excesiva.
  - La cláusula final se traduce de forma prudente para no resolver la ambigüedad del hebreo más allá de lo que el texto permite.
