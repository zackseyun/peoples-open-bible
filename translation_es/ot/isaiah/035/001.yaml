translation:
  language: es
  text: El desierto y la tierra seca se alegrarán; la llanura desértica se gozará y florecerá como el azafrán silvestre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lirio», «asfódelo» u otra flor bulbosa; la identificación exacta de חֲבַצָּלֶת es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֻׂשׂוּם
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se gozarán
  - exultarán
  lexicon: HALOT
  rationale: El hebreo expresa alegría exuberante; en español, "se alegrarán" conserva el valor de gozo futuro de manera natural para sujetos inanimados personificados en poesía.
- source_word: מִדְבָּר
  english_pob_choice: wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el páramo
  - la tierra despoblada
  lexicon: HALOT
  rationale: '"Desierto" comunica bien la idea de tierra inculta o yermo, y en español poético resulta claro y digno. Aunque "wilderness" puede abarcar más que un desierto arenoso, aquí la imagen de esterilidad se mantiene.'
- source_word: צִיָּה
  english_pob_choice: dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra árida
  - el lugar seco
  lexicon: HALOT
  rationale: El paralelismo pide una expresión distinta de מִדְבָּר pero afín; "tierra seca" conserva la aridez explícita sin redundar excesivamente con "desierto".
- source_word: תָגֵל
  english_pob_choice: will be glad
  chosen_spanish: se gozará
  alternatives_spanish:
  - se alegrará
  - exultará
  lexicon: HALOT
  rationale: El verbo גיל suele implicar júbilo; "se gozará" refleja ese tono celebrativo en un registro bíblico natural en español.
- source_word: עֲרָבָה
  english_pob_choice: desert plain
  chosen_spanish: el páramo
  alternatives_spanish:
  - la llanura desértica
  - la estepa
  - el Arabá
  lexicon: HALOT
  rationale: En este contexto poético, el término designa una zona árida y abierta. "Páramo" transmite la extensión yerma sin convertirlo en un nombre propio geográfico.
- source_word: תִפְרַח
  english_pob_choice: blossom
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - desabrochará
  lexicon: HALOT
  rationale: '"Florecerá" reproduce la imagen vegetal de manera directa y idiomática en español.'
- source_word: חֲבַצָּלֶת
  english_pob_choice: crocus
  chosen_spanish: el croco
  alternatives_spanish:
  - el azafrán
  - la flor bulbo
  - el lirio
  lexicon: HALOT
  rationale: Se conserva una flor bulbosa específica como en el texto inglés, pero se usa "croco" por ser una forma española posible y más cercana al término botánico tradicional. La identificación sigue siendo incierta, por lo que se documentan alternativas.
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado revisado del texto inglés POB, sin cambios aplicados en la revisión más reciente; se han conservado el paralelismo poético y la nota de incertidumbre lexical sobre חֲבַצָּלֶת.
  spanish_consistency_notes:
  - Se mantuvo el futuro profético en toda la línea.
  - Se preservó la personificación poética de lugares inanimados como sujetos que se alegran.
  - Se evitó usar «SEÑOR» u otra terminología no presente en el verso.
  - La nota de flor bulbosa se ancla en «croco» para reflejar la incertidumbre del hebreo.
