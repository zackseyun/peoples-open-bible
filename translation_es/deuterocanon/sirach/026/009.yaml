translation:
  language: es
  text: Una esposa borracha es una gran ira[a][b], y no cubrirá su deshonra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una mujer borracha». El griego γυνή puede significar «mujer» o «esposa»; el contexto doméstico favorece «esposa».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego es muy breve y, literalmente, se lee: «gran ira, una esposa borracha». La traducción procura conservar esa fuerza appositiva en vez de convertirla en una paráfrasis más suave.'
    reason: lexical_alternative
  - marker: c
    text: «Deshonra» también puede entenderse como «vergüenza» o «indecencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργὴ μεγάλη
  english_pob_choice: great anger
  chosen_spanish: gran ira
  alternatives_spanish:
  - gran enojo
  - gran indignación
  - causa de gran ira
  lexicon: LSJ
  rationale: 'El griego es nominal y elíptico: literalmente, «gran ira [es] una esposa borracha». «Gran ira» conserva la fuerza sustantiva y la brevedad del original sin añadir una relación explicativa que el texto no expresa explícitamente.'
- source_word: γυνὴ
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: LSJ
  rationale: En el contexto doméstico sapiencial de Sirácides, γυνή puede ser «mujer» o «esposa». «Esposa» refleja mejor el marco de instrucción familiar y mantiene la interpretación contextual adoptada en la POB inglesa.
- source_word: μέθυσος
  english_pob_choice: drunken
  chosen_spanish: borracha
  alternatives_spanish:
  - dada al vino
  - ebria
  - embriagada
  lexicon: LSJ
  rationale: El adjetivo describe un estado o rasgo de embriaguez. «Borracha» es natural en español y conserva el valor adjetival, sin convertirlo en un sustantivo como «borracha/o» en sentido de vicioso.
- source_word: ἀσχημοσύνην
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - disgusto
  - indecencia
  lexicon: LSJ
  rationale: El término puede abarcar vergüenza, deshonra o indecencia. «Deshonra» comunica bien la idea de vergüenza visible o condición afrentosa, y corresponde de manera directa al sentido amplio preservado por la revisión inglesa.
- source_word: οὐ συγκαλύψει
  english_pob_choice: will not cover
  chosen_spanish: no cubrirá
  alternatives_spanish:
  - no ocultará
  - no esconderá
  lexicon: LSJ
  rationale: El verbo compuesto significa literalmente «cubrir/ocultar por completo». «No cubrirá» conserva la metáfora del griego y el paralelismo con la versión inglesa, sin suavizarla en exceso.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «shame» por «disgrace» para ἀσχημοσύνην. Por eso el español evita «vergüenza» como principal y adopta «deshonra», manteniendo la amplitud semántica y la naturalidad estilística.
  spanish_consistency_notes:
  - Se mantuvo el orden abrupto del original y de la POB inglesa, porque el griego es nominal y apposicional.
  - Se prefirió «esposa» sobre «mujer» por el contexto sapiencial doméstico; se dejó la alternativa en nota por la ambigüedad léxica real.
  - «Deshonra» se usó como equivalente principal de ἀσχημοσύνην para reflejar el matiz de afrenta visible sin perder la posibilidad de «vergüenza» o «indecencia».
