translation:
  language: es
  text: No me deseches[a] en el tiempo de la vejez; cuando se agote mi fuerza[b], no me desampares[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me eches fuera». El verbo hebreo también puede dar la idea de arrojar o rechazar.
    reason: lexical_alternative
  - marker: b
    text: O «cuando mi fuerza se haya agotado».
    reason: lexical_alternative
  - marker: c
    text: O «no me abandones».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּשְׁלִיכֵנִי
  english_pob_choice: cast me off
  chosen_spanish: deseches
  alternatives_spanish:
  - arrojes
  - me eches fuera
  - me rechaces
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar echar, arrojar o desechar. En español, «desechar» conserva bien la idea de ser apartado o descartado, con un tono digno y poético adecuado para la súplica del salmo. «Arrojes» sería más literal pero menos idiomático; «me rechaces» enfatiza la relación personal más que la imagen de ser arrojado.
- source_word: לְעֵת זִקְנָה
  english_pob_choice: in the time of old age
  chosen_spanish: en el tiempo de la vejez
  alternatives_spanish:
  - en la vejez
  - cuando llegue la vejez
  - en la edad avanzada
  lexicon: HALOT
  rationale: עֵת indica un tiempo o temporada, y זִקְנָה significa vejez. «En el tiempo de la vejez» reproduce con claridad la estructura temporal del hebreo, y «vejez» comunica el sentido natural en español. «En la vejez» es posible, pero reduce un poco el matiz temporal de עֵת.
- source_word: כִּכְלוֹת
  english_pob_choice: when ... fails
  chosen_spanish: cuando se agote
  alternatives_spanish:
  - cuando termine
  - cuando se acabe
  - cuando llegue a su fin
  lexicon: HALOT
  rationale: El infinitivo constructo con כִּ introduce una circunstancia temporal. «Cuando se agote» expresa bien la idea de llegar al límite o acabarse, y funciona con naturalidad en español. Mantiene la noción de desgaste progresivo sin sobrecargar la frase.
- source_word: כֹּחִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi fortaleza
  - mi vigor
  - mi poder
  lexicon: HALOT
  rationale: כֹּחַ puede ser fuerza, vigor o poder. En el contexto de la vejez, «mi fuerza» es la opción más natural y clara en español, y conserva la referencia al agotamiento físico o vital.
- source_word: תַּעַזְבֵנִי
  english_pob_choice: do not forsake me
  chosen_spanish: no me abandones
  alternatives_spanish:
  - no me dejes
  - no me desampares
  - no me forsakes
  lexicon: HALOT
  rationale: עָזַב puede significar dejar, abandonar o forsake. En español, «abandones» comunica con claridad la petición negativa y mantiene el tono de lamento. «Desampares» es tradicional, pero menos transparente para un lector moderno; «dejes» es más general y pierde algo de fuerza.
- source_word: אַֽל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas que
  - Que no
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa una prohibición o ruego negativo. En español, «No» es la forma más directa y natural para una súplica dirigida a Dios.
theological_decisions:
- issue: La petición en relación con la vejez y el abandono divino
  english_pob_reading: A direct petition that God not reject or abandon the psalmist in the weakness of old age
  chosen_spanish_reading: Una súplica directa para que Dios no deseche ni abandone al salmista en la debilidad de la vejez
  alternative_spanish_readings:
  - Una queja general por el sufrimiento sin énfasis específico en la edad
  - Una petición más amplia sobre la fidelidad de Dios sin referencia concreta a la vejez
  rationale: El hebreo vincula explícitamente la petición con el tiempo de la vejez y con el agotamiento de la fuerza. La traducción conserva ese marco concreto sin ampliar el sentido a afirmaciones doctrinales que el versículo no desarrolla.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto fuente sin importar conclusiones doctrinales ajenas al versículo.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el informe auditado en inglés: mantiene el paralelismo entre el rechazo inicial y el ruego final, y conserva la referencia explícita a la vejez y al agotamiento de la fuerza. No se aplicaron revisiones posteriores en el pasaje base.'
  spanish_consistency_notes:
  - Se prefirió «vejez» para זִקְנָה por ser claro y bíblicamente natural en español.
  - Se usó «abandones» en el segundo hemistiquio para reflejar el valor de עזב sin repetir el mismo matiz de «desechar».
  - La construcción «cuando se agote mi fuerza» preserva la temporalidad de כִּ con un español fluido.
  - No se usó «SEÑOR» ni otro sustituto para el nombre divino porque el versículo no contiene el Tetragrámaton.
