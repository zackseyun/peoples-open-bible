  - severity: medium
    issue: «gergeseos» es una forma menos adecuada para Γεργεσαίους
    rationale: La auditoría inglesa eligió «Girgashites». En español, «girgaseos» refleja mejor ese etnónimo tradicional y evita una forma menos reconocible.
