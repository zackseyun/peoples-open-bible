translation:
  language: es
  text: 'Él dijo[a]: «Ustedes han quitado mis dioses, que yo hice, y al sacerdote, y se han ido. ¿Qué me queda ahora? ¿Y por qué me dicen: “¿Qué te pasa?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi dios» o «mis imágenes divinas»; el hebreo puede ser singular o plural en algunos contextos, pero aquí el contexto más amplio favorece «mis dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: my gods
  chosen_spanish: los dioses que yo hice
  alternatives_spanish:
  - mi dios
  - mis dioses
  - mis imágenes divinas
  lexicon: HALOT
  rationale: El hebreo puede ser singular o plural en ciertos contextos, pero aquí el contexto narrativo de los objetos de culto de Micaía favorece un referente plural. En español, «los dioses que yo hice» conserva el valor léxico de אֱלֹהִים sin reducirlo a «ídolos» en el texto principal, y mantiene la ironía del poseedor humano que habla de deidades hechas por él.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I made
  chosen_spanish: que yo hice
  alternatives_spanish:
  - que hice
  - que yo fabriqué
  - que yo formé
  lexicon: HALOT
  rationale: «Hice» reproduce el sentido básico de עשה y preserva la fuerza retórica de que son objetos producidos por él. Se evita una paráfrasis más interpretativa como «fabricados» porque el hebreo no exige ese matiz.
- source_word: לְקַחְתֶּם
  english_pob_choice: you have taken away
  chosen_spanish: han tomado
  alternatives_spanish:
  - han quitado
  - han arrebatado
  - tomaron
  lexicon: HALOT
  rationale: El perfecto en discurso directo expresa una pérdida ya efectiva. «Han tomado» sigue de cerca el sentido del hebreo y resulta natural en español; el complemento posterior y el contexto ya comunican la idea de despojo, por lo que no es necesario intensificar con «arrebatado».
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote ese
  - al sacerdote suyo
  - al sacerdote
  lexicon: HALOT
  rationale: Se conserva el artículo definido y la referencia concreta al sacerdote de la casa de Micaía. En español, el artículo en el objeto directo se expresa naturalmente con la preposición «a».
- source_word: וַתֵּלְכ֖וּ
  english_pob_choice: have gone away
  chosen_spanish: se han ido
  alternatives_spanish:
  - se fueron
  - se han marchado
  - han partido
  lexicon: HALOT
  rationale: El hebreo presenta una acción ya consumada con efecto presente. «Se han ido» es idiomático y refleja el estado resultante con la mínima distancia semántica.
- source_word: וּמַה לִּי עוֹד
  english_pob_choice: What do I have left now?
  chosen_spanish: ¿Qué me queda ahora?
  alternatives_spanish:
  - ¿Qué me queda todavía?
  - ¿Qué tengo ya?
  - ¿Qué me queda aún?
  lexicon: HALOT
  rationale: La expresión idiomática comunica despojo y vacío, no sólo posesión. «¿Qué me queda ahora?» transmite de forma natural la pérdida total percibida por el hablante.
- source_word: וּמַה זֶּה תֹּאמְר֥וּ אֵלַי
  english_pob_choice: So why do you say to me
  chosen_spanish: ¿Y por qué me dicen
  alternatives_spanish:
  - ¿Y qué es eso que me dicen
  - ¿Por qué entonces me dicen
  - ¿Y por qué me dirían
  lexicon: HALOT
  rationale: El hebreo enlaza la queja con una reprensión dirigida a los interlocutores. «¿Y por qué me dicen?» mantiene el tono de reproche y refleja la fuerza inferencial del contexto sin volverlo innecesariamente artificial.
- source_word: מַה לָּךְ
  english_pob_choice: What is the matter with you?
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué te ocurre?
  - ¿Qué te sucede?
  - ¿Qué tienes?
  lexicon: HALOT
  rationale: Es una pregunta idiomática sobre el estado o la perturbación del interlocutor. «¿Qué te pasa?» es la equivalencia natural más breve en español y conserva la inmediatez del reproche.
theological_decisions:
- issue: Referencia a אֱלֹהַי en un contexto de culto doméstico con imágenes/objetos hechos por mano humana
  english_pob_reading: my gods
  chosen_spanish_reading: los dioses que yo hice
  alternative_spanish_readings:
  - mis dioses
  - mi dios
  - mis ídolos
  rationale: Se conserva la ambigüedad lexical de אֱלֹהִים sin resolverla en el texto principal hacia «ídolos», porque el relato mismo ya deja ver la ironía y el contraste entre lo divino y lo fabricado. La traducción mantiene la tensión documental del hebreo y la lectura contextual del POB.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del POB: «taken away» se reflejó con una forma más directa y natural en español («han tomado»), se mantuvo el perfecto con valor de pérdida presente («se han ido»), y la pregunta final se volvió una reprensión idiomática breve («¿Qué te pasa?») para conservar la naturalidad y la cercanía al hebreo. También se corrigió la anclación de la nota al incluir [a] junto a la cláusula inicial.'
  spanish_consistency_notes:
  - Se usó «dioses» en plural para mantener la lectura contextual preferida por el POB, sin borrar la ambigüedad lexical del hebreo.
  - Se evitó «SEÑOR» y cualquier sustitución litúrgica no presente en el versículo.
  - «Sacerdote» se mantuvo literalmente, ya que el contexto narra la pérdida del ministro cultual de Micaía.
  - La puntuación de preguntas e incisos sigue el español moderno y conserva el tono confrontativo del original.
