translation:
  text: 'His disciples said to him[That which], "On what day will the rest of the
    dead take place, and on what day will the new world come?"

    He said to them, "That which you are expecting has come[you yourselves][expecting],
    but you yourselves do not know it."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:43:58Z'
  footnotes:
  - marker: That which
    text: The Coptic uses the feminine demonstrative pronoun ⲧⲏ (tē), which grammatically
      refers back to the feminine noun 'rest' (ⲁⲛⲁⲡⲁⲩⲥⲓⲥ, anapausis).
    reason: lexical_alternative
  - marker: expecting
    text: The Coptic idiom ϭⲱϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ- literally means 'to look out before' or
      'to look forward to'.
    reason: lexical_alternative
  - marker: you yourselves
    text: The Coptic uses the independent pronoun ⲛ̄ⲧⲱⲧⲛ̄ before the conjugated verb
      for emphasis.
    reason: register_note
lexical_decisions:
- source_word: ⲁϣ ⲛ̄ϩⲟⲟⲩ
  chosen: On what day
  rationale: The interrogative ⲁϣ ('what/which') modifying ϩⲟⲟⲩ ('day') directly asks
    for a specific time.
  lexicon: Crum 20a
  alternatives:
  - When
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  rationale: A Greek loanword (ἀνάπαυσις) central to Thomasine theology, denoting
    the ultimate spiritual state of tranquility or salvation.
  lexicon: BDAG 73; Crum 12a
  alternatives:
  - repose
- source_word: ϣⲱⲡⲉ
  chosen: take place
  rationale: In the context of an event ('the rest'), ϣⲱⲡⲉ means 'to happen' or 'to
    take place'.
  lexicon: Crum 585b
  alternatives:
  - occur
  - come to be
- source_word: ⲃ︦ⲃⲣ̄ⲣⲉ
  chosen: new
  rationale: Standard Coptic adjective for 'new', modifying the Greek loanword ⲕⲟⲥⲙⲟⲥ
    ('world').
  lexicon: Crum 42b
  alternatives: []
- source_word: ϭⲱϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ-
  chosen: expecting
  rationale: The compound verb ϭⲱϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ- literally means 'to look out before',
    idiomatically meaning 'to expect' or 'to look forward to'.
  lexicon: Crum 834a
  alternatives:
  - looking forward to
  - awaiting
- source_word: ⲧⲏ
  chosen: That which
  rationale: The feminine singular demonstrative pronoun ⲧⲏ points back specifically
    to the feminine noun ⲁⲛⲁⲡⲁⲩⲥⲓⲥ ('rest').
  lexicon: Crum 385b
  alternatives:
  - What
theological_decisions:
- issue: Realized eschatology vs. future expectation
  chosen_reading: That which you are expecting has come, but you yourselves do not
    know it.
  rationale: The Coptic perfect tense (ⲁⲥⲉⲓ, 'it has come') explicitly places the
    expected eschatological event in the present/past reality. The translation strictly
    follows this grammar, preserving Thomas's distinctive theological stance that
    the 'kingdom' or 'rest' is an already-present reality requiring inward recognition,
    rather than a future apocalyptic event.
  alternatives_noted: []
drafter_notes: This saying is a classic expression of Thomasine 'realized eschatology'.
  The disciples ask about future apocalyptic events (the rest of the dead, the new
  world), and Jesus subverts their expectation by declaring that the eschaton is already
  present, though unrecognized. The translation preserves the emphatic 'you yourselves'
  (ⲛ̄ⲧⲱⲧⲛ̄) and the precise demonstrative 'That which' (ⲧⲏ), which links Jesus's answer
  directly to the 'rest' they asked about.
