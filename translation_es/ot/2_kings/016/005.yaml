translation:
  language: es
  text: Entonces Rezín, rey de Aram, y Pecaj, hijo de Remalías, rey de Israel, subieron a Jerusalén para hacer la guerra, y sitiaron a Ajaz; pero no pudieron luchar contra él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘pero no pudieron luchar contra Jerusalén’; el hebreo no repite el objeto después de ‘luchar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese tiempo
  lexicon: HALOT
  rationale: Marca temporal narrativa que encadena la acción precedente con la siguiente; 'Entonces' es natural en español y conserva el avance secuencial del relato.
- source_word: יַעֲלֶה
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - subió
  - ascendieron
  - marcharon hacia arriba
  lexicon: HALOT
  rationale: עלה conserva en contexto militar la idea de ascender o ir hacia una ciudad en altura; en español, el plural del sujeto compuesto pide 'subieron'. La forma mantiene la dirección hacia Jerusalén sin volverla demasiado interpretativa.
- source_word: רְצִין מֶלֶךְ אֲרָם
  english_pob_choice: Rezin king of Aram
  chosen_spanish: Rezín, rey de Aram
  alternatives_spanish:
  - Rezín, rey de Siria
  - Rezín rey de Aram
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el título. Se prefiere 'Aram' para reflejar con mayor precisión el etnónimo hebreo, siguiendo la decisión de la POB en inglés.
- source_word: וּפֶקַח בֶּן רְמַלְיָהוּ מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: and Pekah son of Remaliah, king of Israel
  chosen_spanish: y Pecaj hijo de Remalías, rey de Israel
  alternatives_spanish:
  - y Pecaj, hijo de Remalías, rey de Israel
  - y Pecaj hijo de Remalías, rey de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura aposicional del hebreo. 'Hijo de' refleja el patronímico, y la transliteración 'Pecaj'/'Remalías' sigue el criterio de nombres propios bíblicos en español del proyecto.
- source_word: יְרוּשָׁלַםִ לַמִּלְחָמָה
  english_pob_choice: to Jerusalem for war
  chosen_spanish: a Jerusalén para guerra
  alternatives_spanish:
  - a Jerusalén para hacer guerra
  - contra Jerusalén para guerra
  - a Jerusalén para la guerra
  lexicon: HALOT
  rationale: El hebreo expresa destino y propósito con la preposición לַ-; 'para guerra' es una equivalencia sobria que evita añadir una glosa más fuerte de la necesaria. Se mantiene 'a Jerusalén' por el movimiento hacia la ciudad.
- source_word: וַיָּצֻרוּ
  english_pob_choice: they besieged
  chosen_spanish: la sitiaron
  alternatives_spanish:
  - les pusieron sitio
  - la cercaron
  - asediaron
  lexicon: HALOT
  rationale: El verbo en contexto militar significa 'sitiar/poner sitio'. En español, 'la sitiaron' es claro y conserva el foco en Jerusalén como ciudad asediada.
- source_word: עַל אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: contra Ajaz
  alternatives_spanish:
  - sobre Ajaz
  - a Ajaz
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa עַל, el sentido idiomático en español exige explicitar la relación del ataque: el sitio se dirige contra Ajaz. ''Ajaz'' sigue la transliteración habitual en español y evita confundir el referente con la ciudad mencionada antes.'
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - pero no fueron capaces
  - pero no lograron
  lexicon: HALOT
  rationale: Expresa incapacidad con naturalidad y brevedad, manteniendo la oposición marcada por וְלֹא.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight against him
  chosen_spanish: luchar contra él
  alternatives_spanish:
  - pelear contra él
  - hacer guerra contra él
  - combatir contra él
  lexicon: HALOT
  rationale: El infinitivo de לחם significa combatir o luchar. Se evita 'hacer guerra' por sonar más pesado en español y porque el contexto inmediato ya contiene 'para guerra'.
theological_decisions:
- issue: Objeto implícito de 'luchar' en el final del versículo
  english_pob_reading: they were not able to fight against him
  chosen_spanish_reading: no pudieron luchar contra él
  alternative_spanish_readings:
  - no pudieron luchar contra eso
  - no pudieron luchar contra Jerusalén
  rationale: La revisión inglesa resolvió el objeto implícito a favor de Ahaz, por concordancia con el antecedente inmediato y el contexto. En español se sigue esa lectura para no introducir una referencia ambigua o artificial.
  doctrine_reference: N/A (decisión contextual y gramatical)
- issue: Relación entre Jerusalén y Ajaz en la cláusula de asedio
  english_pob_reading: they besieged Ahaz
  chosen_spanish_reading: la sitiaron contra Ajaz
  alternative_spanish_readings:
  - sitiaron a Ajaz
  - sitiaron Jerusalén
  rationale: El hebreo y la tradición textual permiten tensionar el referente del asedio entre la ciudad y el rey. En español, 'la' retoma naturalmente a Jerusalén y 'contra Ajaz' preserva la resolución contextual adoptada por la POB en inglés, sin borrar la ambigüedad original de forma innecesaria.
  doctrine_reference: N/A (decisión textual/contextual)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el objeto final de 'it' a 'him' para concordar con Ajaz, manteniendo el resto del versículo sin cambios. Este borrador español sigue esa revisión y conserva la ambigüedad de fondo del hebreo en la cláusula de asedio mediante una redacción que puede leerse en referencia a Jerusalén y a Ajaz según el contexto inmediato.
  spanish_consistency_notes:
  - Se usó 'Aram' en lugar de 'Siria' para reflejar el término hebreo con mayor precisión, coherente con la POB inglesa.
  - 'Se transliteraron los nombres propios con formas corrientes en español bíblico: Rezín, Pecaj, Remalías, Ajaz.'
  - '''La sitiaron'' mantiene el sentido militar fuerte de וַיָּצֻרוּ sin suavizarlo a ''cercaron''.'
  - El pie de nota marca la alternativa textual/semántica sobre el objeto omitido de 'luchar'.
