translation:
  language: es
  text: Porque Israel es como una novilla terca[a]; ahora Yahvé los apacentará como un cordero en un lugar espacioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una oveja en un espacio abierto» o «en un lugar espacioso». La imagen hebrea puede sugerir tanto pastura abierta como exposición vulnerable bajo juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la acusación anterior. «Porque» conserva la fuerza explicativa de manera natural en español.
- source_word: כְּפָרָה
  english_pob_choice: as a ... heifer
  chosen_spanish: como una novilla
  alternatives_spanish:
  - como una vaca
  - como una ternera
  lexicon: HALOT
  rationale: פָרָה designa una vaca/animal bovino hembra; «novilla» mantiene la imagen animal concreta y es más idiomática que una traducción más genérica.
- source_word: סֹרֵרָה / סָרַר
  english_pob_choice: stubborn / is
  chosen_spanish: rebelde / rebelde
  alternatives_spanish:
  - obstinada / obstinada
  - terca / terca
  - desobediente / desobediente
  lexicon: HALOT
  rationale: El participio y el verbo repiten la misma raíz para intensificar la idea. En español, «rebelde» reproduce mejor esa repetición y conserva el matiz de resistencia frente a la autoridad, sin debilitarlo a un simple rasgo de carácter.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: standard proper name
  rationale: Nombre propio estándar.
- source_word: יִרְעֵם
  english_pob_choice: will pasture them
  chosen_spanish: los apacentará
  alternatives_spanish:
  - los pastoreará
  - los alimentará
  - los hará pastar
  lexicon: HALOT
  rationale: רעה puede ser «apacentar/pastorear/alimentar». «Apacentará» conserva el campo semántico pastoril y la imagen de ganado, con un tono más natural y digno en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: project default
  rationale: Se mantiene el nombre divino del Tetragrámaton según el criterio del proyecto, en vez de sustituirlo por un título.
- source_word: כְּכֶבֶשׂ
  english_pob_choice: like a lamb
  chosen_spanish: como un cordero
  alternatives_spanish:
  - como una oveja
  - como un carnero joven
  lexicon: HALOT
  rationale: כֶּבֶשׂ puede denotar un cordero/oveja joven. «Cordero» es la opción más natural y concordante con la imagen de vulnerabilidad.
- source_word: בַּמֶּרְחָב
  english_pob_choice: in a broad place
  chosen_spanish: en un lugar espacioso
  alternatives_spanish:
  - en un lugar abierto
  - en un espacio amplio
  - en una llanura amplia
  lexicon: HALOT
  rationale: «Lugar espacioso» preserva el sentido literal de מֶרְחָב y deja abierta la tensión interpretativa entre amplitud de pasto y exposición vulnerable, como en el audit trail inglés.
theological_decisions:
- issue: Tensión interpretativa del cierre
  english_pob_reading: The clause is rendered in a way that preserves ambiguity between apparent provision and ironic/judicial exposure.
  chosen_spanish_reading: La cláusula final queda abierta entre provisión aparente y exposición/jucio implícito.
  alternative_spanish_readings:
  - Yahvé los cuidará con ternura como a un cordero en un espacio abierto
  - Yahvé los entregará a una exposición vulnerable como a un cordero en un lugar espacioso
  rationale: El hebreo permite leer la imagen final como pastoreo benévolo o como ironía judicial. La versión española conserva esa ambigüedad sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión exegética sin forzar una resolución doctrinal no explicitada por el texto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservó la repetición de la raíz סרר con «rebelde», se mantuvo el nombre divino Yahvé, y se dejó abierta la ambigüedad final entre pastoreo y exposición. No hubo revisiones aplicadas en el paquete de origen.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «apacentará» para mantener la imaginería pastoril sin suavizar el contexto judicial.
  - «Lugar espacioso» traduce de forma transparente מֶרְחָב y sostiene la ambigüedad interpretativa.
  - La repetición de «rebelde» reproduce el énfasis del hebreo mejor que alternar con un sinónimo distinto.
