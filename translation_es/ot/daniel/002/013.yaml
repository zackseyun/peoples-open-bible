revisions:
- from: Así salió el decreto[a], y los sabios[b] estaban siendo muertos; y buscaron a Daniel y a sus compañeros para matarlos.
  to: Así salió el decreto[a], y los sabios[b] estaban siendo ejecutados; y buscaron a Daniel y a sus compañeros para matarlos.
  rationale: Se revisa únicamente la expresión verbal de la acción en curso sobre los sabios para lograr un español natural y fiel al contexto. 'Ejecutados' comunica mejor en español la muerte impuesta por decreto, mientras mantiene el aspecto progresivo indicado por el arameo. Se conserva 'salió el decreto' por su valor literal y la nota ya explica la alternativa idiomática.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:33:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del arameo: el decreto fue promulgado, los sabios estaban en proceso de ser ejecutados, y se buscó a Daniel y a sus compañeros para matarlos. También preserva correctamente la finalidad del infinitivo final y la referencia plural a Daniel y sus compañeros.'
  spanish_quality_summary: La frase es mayormente fiel, pero 'estaban siendo muertos' suena antinatural en español y debilita la legibilidad. En este contexto, 'estaban siendo ejecutados' mantiene mejor la pasividad y el carácter procesual de מִתְקַטְּלִין, además de ajustarse al marco de una orden real de muerte. El resto del verso es claro y natural.
  glossary_alignment: No hay términos del glosario teológico principal implicados aquí. 'Decreto', 'sabios' y 'compañeros' están bien alineados con el uso narrativo y con las decisiones léxicas documentadas. La única excepción recomendada es preferir 'ejecutados' en vez de 'muertos' para una equivalencia más idiomática en español sin pérdida de sentido.
  issues:
  - severity: medium
    issue: La expresión 'estaban siendo muertos' es poco idiomática en español.
    rationale: Aunque intenta calcar la pasividad progresiva del arameo, en español resulta torpe y poco natural. 'Estaban siendo ejecutados' conserva la idea de proceso en curso y encaja con el contexto judicial/cortesano del pasaje.
  - severity: low
    issue: La nota [b] ofrece 'estaban siendo asesinados' como alternativa, pero la opción principal elegida es menos natural que esa misma alternativa.
    rationale: La nota evidencia que había una formulación española más fluida disponible. Conviene armonizar el texto principal con una opción idiomática y dejar la alternativa más literal o cercana al inglés auditado en nota.
