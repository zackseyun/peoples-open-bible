translation:
  language: es
  text: y sus ofrendas de cereal y sus libaciones, para los toros[a], para los carneros y para los corderos, conforme a su número, conforme a la ordenanza[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los toros jóvenes». El hebreo dice simplemente «toros»; el contexto sacrificial puede permitir la traducción más específica «toros jóvenes», pero no la exige.
    reason: lexical_alternative
  - marker: b
    text: O «conforme al procedimiento prescrito». El hebreo alude a la regla ritual establecida para estas ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offerings
  chosen_spanish: sus ofrendas vegetales
  alternatives_spanish:
  - sus ofrendas de cereal
  - sus ofrendas de grano
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa la ofrenda vegetal que acompaña a los sacrificios. 'Ofrendas vegetales' comunica el sentido cultual de forma natural en español y evita una calca demasiado agrícola como 'grano'.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas líquidas
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ refiere a una ofrenda derramada. 'Libaciones' preserva con precisión el acto ritual y es un término culto claro en español bíblico.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los toros jóvenes
  - para los bueyes
  lexicon: HALOT
  rationale: El hebreo usa פָּרִים, animales sacrificiales de tipo toro. 'Toros' es fiel y natural; 'jóvenes' no está explícito en el hebreo.
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los rams
  lexicon: HALOT
  rationale: אַיִל corresponde a 'carnero'. En español, 'carneros' es el equivalente directo y más idiomático que un préstamo innecesario.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los corderos machos
  lexicon: HALOT
  rationale: כֶּבֶשׂ se refiere a un cordero; el hebreo no obliga aquí a explicitar 'macho'. 'Corderos' mantiene la simplicidad del listado sacrificial.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: conforme a su número
  alternatives_spanish:
  - según su número
  - de acuerdo con su número
  lexicon: HALOT
  rationale: '''Conforme a su número'' conserva la correspondencia exacta del hebreo y su tono administrativo-ritual.'
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - conforme al mandato
  - según la norma prescrita
  - conforme al procedimiento prescrito
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta a una regla ritual establecida. 'Estatuto' mantiene el matiz jurídico-cultual mejor que 'costumbre' y evita una paráfrasis demasiado amplia.
theological_decisions:
- issue: Sentido de כַּמִּשְׁפָּט en contexto cultual
  english_pob_reading: according to the ordinance; the Hebrew term refers to the established ritual rule for these offerings.
  chosen_spanish_reading: conforme al estatuto
  alternative_spanish_readings:
  - conforme al procedimiento prescrito
  - según la norma ritual
  rationale: La frase no describe una preferencia opcional sino una regulación establecida para el culto. 'Estatuto' conserva la fuerza normativa y litúrgica sin desplazar el sentido a una mera costumbre.
  doctrine_reference: Torá/ley ritual; cf. el uso normativo de מִשְׁפָּט en disposiciones cúlticas
- issue: Correspondencia de las ofrendas con los animales enumerados
  english_pob_reading: their grain offerings and their drink offerings ... for the bulls, for the rams, and for the lambs
  chosen_spanish_reading: sus ofrendas vegetales y sus libaciones, para los toros, para los carneros y para los corderos
  alternative_spanish_readings:
  - sus ofrendas de cereal y sus libaciones
  - sus ofrendas y sus derramamientos de vino
  rationale: El hebreo mantiene el paralelismo entre las ofrendas acompañantes y los animales sacrificados. La redacción española lo conserva sin añadir ni omitir elementos.
  doctrine_reference: Liturgia sacrificial de Números 28–29
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'grain offering' a plural 'grain offerings' para reflejar el hebreo plural y armonizarlo con 'drink offerings'. La versión española mantiene también el plural implícito con 'ofrendas vegetales' y conserva el paralelismo completo del listado ritual.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton ni un sustituto divino.
  - Se usa 'libaciones' para mantener el término ritual técnico y no diluirlo en una expresión genérica.
  - '''Estatuto'' se eligió para כַּמִּשְׁפָּט porque en este contexto la fuerza es normativa, no meramente descriptiva.'
