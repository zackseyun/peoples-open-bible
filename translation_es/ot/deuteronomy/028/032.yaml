revisions:
- from: Tus hijos y tus hijas serán dados[a] a otro pueblo, y tus ojos lo verán y desfallecerán por ellos todo el día, pero tu mano no tendrá poder.
  to: Tus hijos y tus hijas serán entregados[a] a otro pueblo, mientras tus ojos miran y desfallecen por ellos todo el día, pero tu mano no tendrá poder.
  rationale: Se ajusta el texto para reflejar mejor la referencia plural a los hijos ('por ellos') y la idea de presenciar impotentemente su pérdida ('mientras tus ojos miran'). Se cambia 'serán dados' por 'serán entregados' por mayor naturalidad en español dentro de un contexto de juicio, sin alterar el sentido. Se pule la nota al pie para español más idiomático y claro. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:45:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: conserva ''hijos e hijas'', el futuro pasivo, ''otro pueblo'', el desfallecimiento continuo y el modismo final de impotencia sin introducir una referencia teológica a Dios. Sin embargo, ''y tus ojos lo verán'' cambia el objeto plural implícito (''ellos'', es decir, los hijos) por un singular neutro (''lo''), y pierde el matiz de ''mirar/ser testigo'' con anhelo por ellos. También conviene suavizar ''serán dados'' a una formulación más natural en español sin perder literalidad.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: ''lo verán'' suena algo mecánico y menos fiel al plural de referencia, y ''serán dados'' resulta más rígido de lo necesario en español bíblico actual. ''Tus ojos mirarán y desfallecerán por ellos'' o similar refleja mejor la escena de presenciar impotentemente la pérdida. La nota al pie es útil, aunque necesita puntuación más natural en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. El tratamiento de לְאֵל como modismo de poder, no como referencia divina, está correctamente alineado con la decisión teológica del POB.
  issues:
  - severity: medium
    issue: Referencia singular en 'y tus ojos lo verán'
    rationale: El hebreo termina con אֲלֵיהֶם ('por ellos/hacia ellos'), refiriéndose a los hijos e hijas. El singular neutro 'lo' desplaza la referencia desde las personas tomadas hacia un evento genérico y debilita la conexión afectiva del verso.
  - severity: low
    issue: '''Serán dados'' es algo rígido en español'
    rationale: Aunque es léxicamente defendible, en español natural y fiel suena mejor 'serán entregados' o, si se prefiere mantener 'dados', el resto de la cláusula debería compensar la rigidez. Dado el contexto hostil, 'entregados' comunica mejor sin apartarse indebidamente del sentido.
  - severity: low
    issue: Redacción mejorable de la nota al pie
    rationale: La nota actual empieza con una comilla innecesaria y puede expresarse con puntuación más limpia y español más natural, manteniendo la explicación del modismo.
  revised_spanish_text: Tus hijos y tus hijas serán entregados[a] a otro pueblo, mientras tus ojos miran y desfallecen por ellos todo el día, pero tu mano no tendrá poder.
  revised_footnotes:
  - marker: a
    text: 'O: «y no estará en tu poder». El modismo hebreo literalmente habla de que no hay poder en tu mano.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar mejor la referencia plural a los hijos ('por ellos') y la idea de presenciar impotentemente su pérdida ('mientras tus ojos miran'). Se cambia 'serán dados' por 'serán entregados' por mayor naturalidad en español dentro de un contexto de juicio, sin alterar el sentido. Se pule la nota al pie para español más idiomático y claro. No se requiere adjudicación adicional.
