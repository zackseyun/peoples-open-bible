  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: Jacob dispone tres grupos en orden, con las siervas y sus hijos primero, Lea y sus hijos detrás de ellas, y Raquel y José al final. También refleja correctamente el valor espacial de אַחֲרֹנִים en la posición intermedia y final. Sin embargo, «sus hijos» para יַלְדֵיהֶן / וִילָדֶיהָ estrecha indebidamente el sentido inclusivo de «children», ya que el hebreo no especifica varones solamente.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en precisión semántica. «Y puso» es aceptable, aunque «colocó» sería también posible; no hace falta cambiarlo. «Siervas» funciona en registro bíblico legible. El principal ajuste necesario es usar «hijos e hijas» para evitar una lectura masculina exclusiva en español contemporáneo e intereclesial.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La decisión «siervas» concuerda razonablemente con el rastro léxico del POB y la nota alternativa está bien orientada. No intervienen Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: «sus hijos» reduce el alcance inclusivo de יַלְדֵיהֶן / וִילָדֶיהָ
    rationale: El sustantivo hebreo significa «children» en sentido amplio. En español actual, «hijos» puede entenderse como genérico, pero también puede oírse como masculino específico. Dado que el contexto incluye hijas en la familia de Jacob, «hijos e hijas» preserva mejor el sentido sin añadir interpretación indebida.
  - severity: low
    issue: La nota al pie sobre «criadas» suena algo poco idiomática en «mujeres de casa»
    rationale: No es un error de fidelidad, pero «mujeres de la casa» o «sirvientas domésticas» sería más natural. Conviene pulir la redacción de la nota para español más claro.
  revised_spanish_text: Y puso a las siervas[a] y a sus hijos e hijas primero, y a Lea y a sus hijos e hijas detrás de ellas, y a Raquel y a José al final.
