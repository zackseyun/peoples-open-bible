translation:
  language: es
  text: Entonces Yahvé estuvo atento a la calamidad[a][b] y la trajo sobre nosotros, porque Yahvé nuestro Dios es justo en todas las obras que ha hecho, y no hemos escuchado[c] su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el desastre». El hebreo también puede significar «el mal», pero aquí se refiere a la calamidad del juicio traída sobre el pueblo.
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «estuvo atento a» también puede entenderse como «se mantuvo vigilante respecto de» o, de forma más interpretativa, «se apresuró con respecto a».
    reason: lexical_alternative
  - marker: c
    text: «Escuchado su voz» tiene aquí el sentido de oír con obediencia, es decir, hacer caso a lo que él dijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁקֹד
  english_pob_choice: kept watch over
  chosen_spanish: estuvo atento a
  alternatives_spanish:
  - veló sobre
  - mantuvo vigilancia sobre
  - fue vigilante respecto de
  lexicon: HALOT
  rationale: El verbo שקד tiene el campo de vigilancia, atención y vigilia. En este contexto, con עַל הָרָעָה, la idea es que Yahvé permaneció atento al desastre anunciado hasta hacerlo venir. «Estuvo atento a» conserva la idea de vigilancia sin introducir una interpretación demasiado fuerte como «apresuró».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: convención POB / forma del nombre divino
  rationale: El Tetragrámaton se traduce de forma explícita como el nombre divino propio. «Yahvé» sigue la convención del proyecto y evita la sustitución por un título.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: el desastre
  alternatives_spanish:
  - la calamidad
  - el mal
  lexicon: HALOT
  rationale: En un contexto de juicio, רָעָה puede referirse a calamidad o desastre, no a maldad moral. «Desastre» comunica el juicio punitivo sin atribuir mal moral a Dios.
- source_word: וַיְבִיאֶהָ עָלֵינוּ
  english_pob_choice: brought it upon us
  chosen_spanish: lo trajo sobre nosotros
  alternatives_spanish:
  - lo hizo venir sobre nosotros
  - lo trajo contra nosotros
  lexicon: HALOT
  rationale: La forma causativa con el sufijo femenino retoma «el desastre». «Sobre nosotros» refleja naturalmente el hebraísmo de עַלֵינוּ en lenguaje de juicio.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: HALOT
  rationale: «Justo» es natural en español y mantiene el valor moral-covenantal de צַדִּיק. Aquí funciona bien junto a «nuestro Dios» y preserva el argumento del versículo.
- source_word: עַל כָּל מַעֲשָׂיו אֲשֶׁר עָשָׂה
  english_pob_choice: in all the works that he has done
  chosen_spanish: en todas las obras que ha hecho
  alternatives_spanish:
  - con respecto a todas las obras que ha hecho
  - en todos sus actos que ha realizado
  lexicon: HALOT
  rationale: El עַל aquí se entiende con valor de relación o respecto. «En todas las obras que ha hecho» reproduce de modo natural la idea de que la justicia de Dios se ve en todo lo que ha hecho.
- source_word: וְלֹא שָׁמַעְנוּ בְּקֹלֹו
  english_pob_choice: yet we have not listened to his voice
  chosen_spanish: y no hemos escuchado su voz
  alternatives_spanish:
  - y no hemos obedecido su voz
  - y no hemos atendido a su voz
  lexicon: HALOT
  rationale: שׁמע בקול puede significar oír con obediencia. La formulación «escuchado su voz» mantiene la expresión hebrea y, en español, deja abierta la fuerza de obediencia sin sobreinterpretarla en el texto principal.
theological_decisions:
- issue: Cómo expresar la acción divina sobre la רָעָה sin implicar mal moral en Dios
  english_pob_reading: the disaster
  chosen_spanish_reading: el desastre
  alternative_spanish_readings:
  - la calamidad
  - el mal
  rationale: 'En español, «desastre» comunica con claridad el juicio de Dios sobre el pueblo y evita sugerir que Dios hizo el mal moral. Conserva la tensión teológica del texto: Yahvé trae juicio, y a la vez es justo.'
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión teológica sin imponer una explicación ajena al texto.'
- issue: Valor de שׁמע en el final del versículo
  english_pob_reading: listened to his voice
  chosen_spanish_reading: hemos escuchado su voz
  alternative_spanish_readings:
  - hemos obedecido su voz
  - hemos atendido a su voz
  rationale: El hebreo sugiere más que percepción auditiva; incluye obediencia. Sin embargo, el texto español principal conserva la imagen de «escuchar» y deja que el lector perciba la resonancia semítica, sin perder la claridad.
  doctrine_reference: Equivalencia óptima con respeto a la expresión idiomática hebrea y a la inteligibilidad en español.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evita introducir un valor adversativo añadido al hebreo en la última cláusula, por lo que se usa «y» en vez de «pero» o «sin embargo». También se mantiene la lectura de רָעָה como «desastre» y la mención explícita del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, conforme a la convención del proyecto.
  - Se eligió «justo» para צַדִּיק, coherente con el léxico jurídico-moral del versículo.
  - No se añadieron notas al pie porque las alternativas léxicas quedan explicadas en los campos de decisiones y no se requiere ambigüedad adicional en el texto publicado.
  - El cierre «y no hemos escuchado su voz» preserva el paralelo con el hebreo sin endurecerlo como traducción interpretativa exclusiva de obediencia.
