review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: restauración/sanidad, curación de heridas, fórmula profética con Yahvé, y el reproche contra Sión como rechazada y desatendida. Sin embargo, dos elecciones principales necesitan ajuste: «haré subir sanidad» suena demasiado calcado e innecesariamente literal para el español principal, y «no hay quien la busque» preserva la metáfora pero no sigue la revisión auditada del POB inglés, que explicitó el sentido contextual «no one cares for her».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «haré subir sanidad para ti» resulta poco natural y algo opaco. También sobran dos notas menores: la nota c sobre Sión no está respaldada por el rastro inglés y añade explicación innecesaria, y la nota d puede simplificarse si el texto principal ya expresa el sentido contextual. Una redacción más natural y fiel sería «restauraré la salud» y «nadie se preocupa por ella».'
  glossary_alignment: Se alinea correctamente con el proyecto en «Yahvé», «Sión» y el resto de terminología básica. «Desterrada» es aceptable para נִדָּחָה, aunque «rechazada» o «marginada» también serían posibles; no requiere cambio obligatorio. El principal desajuste es preferir un calco («haré subir sanidad») frente a un español natural cuando el mismo expediente inglés ya documenta «restore health» como opción final.
  issues:
  - severity: medium
    issue: «haré subir sanidad[a] para ti» en el texto principal
    rationale: Aunque reproduce el modismo hebreo, en español suena forzado y poco idiomático. El proyecto permite evitar calcos de madera cuando dañan la naturalidad. «Restauraré la salud[a]» comunica fielmente אַעֲלֶה אֲרֻכָה y deja el literalismo en nota.
  - severity: medium
    issue: «no hay quien la busque[d]» no sigue la decisión final auditada del POB inglés
    rationale: El inglés revisado escogió «no one cares for her» por naturalidad contextual. En español, «nadie se preocupa por ella» o «nadie se interesa por ella» transmite mejor el sentido de דֹּרֵשׁ אֵין לָהּ en este contexto que «buscarla».
  - severity: low
    issue: Nota c sobre «Sión» es innecesaria
    rationale: No preserva una alternativa textual ni resuelve una ambigüedad creada por el español. Añade comentario interpretativo superfluo.
  - severity: low
    issue: Puntuación de la cita puede mejorar
    rationale: 'Con la estructura hebrea y el estilo español, funciona mejor introducir la aposición con dos puntos y coma interna: «Sión; nadie se preocupa por ella».'
