revisions:
- from: Entonces el pueblo de la tierra seguía debilitando las manos del pueblo de Judá y atemorizándolos[a][b] para que no edificaran.
  to: Entonces el pueblo de la tierra debilitaba las manos del pueblo de Judá y los atemorizaba[a][b] para impedirles construir.
  rationale: 'La revisión conserva el modismo hebreo y mejora dos puntos: (1) hace más natural el español narrativo al simplificar «seguía debilitando» a «debilitaba»; y (2) expresa con más precisión la función de לִבְנוֹת en contexto hostil con «para impedirles construir», mientras la nota alternativa preserva la posibilidad más literal ligada al temor de construir.'
