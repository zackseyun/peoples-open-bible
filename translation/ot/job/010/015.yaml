theological_decisions:
- issue: Interpretation of וּרְאֵה עָנְיִי
  chosen_reading: Continuation of Job's self-description ('looking on my affliction') rather than a direct address to God ('and see my affliction').
  alternative_readings:
  - 'direct plea to God: ''and see my affliction'''
  - exclamatory 'behold my affliction'
  rationale: The Hebrew form permits more than one construal. The immediate syntax after 'filled with disgrace' favors reading it as part of Job's ongoing state rather than abruptly shifting to a prayer imperative. This preserves the lament's flow without importing a clearer vocative than the text supplies.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
