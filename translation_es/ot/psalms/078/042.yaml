translation:
  language: es
  text: No recordaron su mano[a], el día en que los redimió del enemigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su poder' o 'lo que su mano había hecho'. El hebreo dice literalmente 'su mano'.
    reason: lexical_alternative
  - marker: b
    text: O 'del adversario' o 'del opresor'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרוּ
  english_pob_choice: did not remember
  chosen_spanish: no recordaron
  alternatives_spanish:
  - no se acordaron
  - olvidaron
  lexicon: HALOT
  rationale: זכר en qal significa recordar, traer a la memoria. En español, 'no recordaron' conserva la idea de memoria ausente sin volverla demasiado interpretativa; 'olvidaron' intensifica hacia una omisión más completa que el hebreo no exige.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su poder
  - lo que había hecho con su mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su mano'. 'Su mano' preserva la imagen concreta y permite que el lector perciba el valor metafórico de poder o acción sin resolverlo en una abstracción. En nota puede indicarse esa alternativa semántica.
- source_word: יוֹם אֲשֶׁר
  english_pob_choice: the day when
  chosen_spanish: el día cuando
  alternatives_spanish:
  - cuando
  - el día en que
  lexicon: HALOT
  rationale: '''El día cuando'' comunica con naturalidad la relación temporal del hebreo y mantiene el sustantivo ''día'' que el original destaca.'
- source_word: פָּדָם
  english_pob_choice: he redeemed them
  chosen_spanish: los redimió
  alternatives_spanish:
  - los rescató
  - los libró
  lexicon: HALOT
  rationale: פדה expresa rescatar/redimir. 'Los redimió' conserva el peso léxico y teológico del verbo en un contexto de liberación histórica, sin reemplazarlo por un término más general como 'libró'.
- source_word: מִנִּי צָר
  english_pob_choice: from the foe
  chosen_spanish: del enemigo
  alternatives_spanish:
  - del adversario
  - del opresor
  lexicon: HALOT
  rationale: צָר puede ser enemigo, adversario u opresor. 'Del enemigo' es el equivalente más directo y natural en español; 'del adversario' mantiene un matiz más formal pero menos común.
theological_decisions:
- issue: Imagen de la 'mano' de Yahvé
  english_pob_reading: Retain the metaphor in the main text as 'his hand.'
  chosen_spanish_reading: Conservar la metáfora como 'su mano' en el texto principal.
  alternative_spanish_readings:
  - su poder
  - sus obras poderosas
  rationale: El hebreo mantiene la imagen concreta de la mano como signo de poder y acción. Traducirla literalmente evita borrar esa tensión metafórica y sigue la decisión auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de פדה en contexto histórico-salvífico
  english_pob_reading: Translate as 'redeemed.'
  chosen_spanish_reading: Traducir con 'redimió'.
  alternative_spanish_readings:
  - rescató
  - libró
  rationale: '''Redimió'' preserva el alcance semántico de פדה y su resonancia de rescate/liberación. Aunque ''rescató'' es posible, ''redimió'' mantiene mejor la densidad del término en la tradición bíblica sin apagar el sentido histórico inmediato.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el paquete de fuente. La redacción española sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la metáfora de la mano y el verbo de redención.
  spanish_consistency_notes:
  - Se usa 'redimió' para פדה, en coherencia con el valor redentor documentado.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - '''Su mano'' se mantiene literal para preservar la imagen hebrea y permitir la nota alternativa.'
