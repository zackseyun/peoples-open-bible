translation:
  language: es
  text: 'Jesús dijo: Ama a tu hermano como tu alma[a][e]; guárdalo[b] como la pupila de tu ojo[c][d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Alma’ traduce ψυχή (ⲯⲩⲭⲏ), que también puede significar ‘vida’ o ‘sí mismo’.
    reason: lexical_alternative
  - marker: b
    text: El manuscrito tiene ⲙ̄ⲙⲟϥ (‘a él’/‘lo’), mientras que la forma normalizada tiene ⲛⲛⲧⲟϥ (‘para él’). En cualquier caso, el sentido es ‘guárdalo’ o ‘protégelo’.
    reason: textual_variant
  - marker: c
    text: ‘Pupila de tu ojo’ es literal; el modismo español ‘la niña de tus ojos’ no es requerido por el lexema copto ⲡⲉⲗⲟⲩ.
    reason: lexical_alternative
  - marker: d
    text: 'Cf. el motivo bíblico hebreo: Dt 32:10; Sal 17:8; Prov 7:2 (LXX).'
    reason: cross_reference
  - marker: e
    text: El comparativo aparece como ⲛ̄ⲑⲉ en el manuscrito y como ⲛⲡϩⲉ en la forma normalizada; ambos significan ‘como’ o ‘igual que’ en este uso sahídico/licopolitano.
    reason: dialect_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Él dijo
  lexicon: Crum; fórmula narrativa copta ⲡⲉϫⲉ + sujeto
  rationale: La fórmula de introducción se vierte de manera directa y natural en español con el nombre propio explícito, como en el texto fuente.
- source_word: ⲙⲉ
  english_pob_choice: love
  chosen_spanish: Ama
  alternatives_spanish:
  - Quiere
  - Ten afecto por
  - Desea
  lexicon: Crum s.v. ⲙⲉ
  rationale: En este dicho ético, el verbo expresa amor interpersonal; ‘ama’ preserva la fuerza moral y relacional del mandato.
- source_word: ⲥⲟⲛ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - fellow
  lexicon: Crum s.v. ⲥⲟⲛ
  rationale: ‘Hermano’ es el equivalente básico y conserva el lenguaje fraternal característico del dicho.
- source_word: ⲯⲩⲭⲏ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - ser
  lexicon: Greek loanword ψυχή; Crum (loanwords)
  rationale: Aunque la nota inglesa preserva la posibilidad de ‘soul/life/self’, en español ‘alma’ comunica bien ψυχή y mantiene el paralelismo sin sonar forzado. Se conserva la ambigüedad semántica en nota.
- source_word: ⲉⲓⲣⲉ ⲧⲏⲣⲉ(ⲓ)
  english_pob_choice: guard
  chosen_spanish: guárdalo
  alternatives_spanish:
  - protégelo
  - cuídalo
  - vigílalo
  lexicon: Crum s.v. ⲧⲏⲣⲉ ‘keep, guard’ (with periphrastic ⲉⲓⲣⲉ)
  rationale: ‘Guárdalo’ conserva la concisión del mandato y engloba vigilar, preservar y proteger, como en la lectura auditada.
- source_word: ⲡⲉⲗⲟⲩ
  english_pob_choice: pupil
  chosen_spanish: pupila
  alternatives_spanish:
  - niña del ojo
  - pupila del ojo
  lexicon: Crum s.v. ⲗⲟⲩ ‘pupil (of the eye)’
  rationale: En español, ‘pupila’ es el término anatómico natural y equivalente a la referencia literal del coptico, sin recurrir a un modismo ajeno al lexema.
- source_word: ⲃⲁⲗ
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - ojos
  lexicon: Crum s.v. ⲃⲁⲗ
  rationale: ‘Ojo’ reproduce el término anatómico básico y ajusta bien la frase fija ‘la pupila de tu ojo’.
- source_word: ⲛ̄ⲑⲉ / ⲛⲡϩⲉ
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: Crum s.v. ⲑⲉ; Layton (comparative particle)
  rationale: ‘Como’ es la equivalencia española más natural para el comparativo copto y mantiene el paralelismo poético.
translation_notes:
  revision_awareness: Se tomó como base el audit trail inglés y la lectura copta directa. No se requieren revisiones sustanciales; se conservó la sintaxis breve y el paralelismo del dicho, ajustando al español la metáfora de ψυχή con una solución natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo ‘Jesús’ para el sujeto narrativo.
  - Se prefirió ‘alma’ para ψυχή en el texto principal, pero la nota conserva la alternativa semántica ‘vida/yo’.
  - Se tradujo el mandato final con ‘guárdalo’ para reflejar la fuerza de ‘guard/protect’ sin endurecerlo innecesariamente.
  - Se optó por ‘pupila’ como equivalente literal del término copto, evitando el modismo ‘niña de tus ojos’ en el texto principal.
