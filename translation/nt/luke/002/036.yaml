theological_decisions:
- issue: Rendering of Anna's role as προφῆτις
  chosen_reading: Anna is identified as a prophetess in the ordinary biblical sense of a woman who speaks under divine inspiration.
  alternative_readings:
  - Treating the term as merely honorific or as a vague religious devotee
  rationale: The text plainly uses the standard noun for a prophet in feminine form. No doctrinal pressure warrants weakening the term; the translation should preserve Luke's explicit identification.
  doctrine_reference: Affirmations; Translation philosophy §1, §4
- issue: Interpretation of Anna's age description
  chosen_reading: The main text preserves the idiom 'advanced in many days' rather than resolving the chronology here.
  alternative_readings:
  - Rendering simply 'very old'
  - Importing the age calculation from the next verse into this verse
  rationale: Luke's wording in this verse is idiomatic and descriptive. Since the following verse continues the age discussion, this verse should not be made more specific than the Greek itself.
  doctrine_reference: Translation philosophy §3
