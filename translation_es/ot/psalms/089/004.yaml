lexical_decisions:
- source_word: כָּרַ֣תִּֽי
  english_pob_choice: I have made
  chosen_spanish: he hecho
  alternatives_spanish:
  - he cortado
  - he hecho un pacto
  lexicon: HALOT
  rationale: La expresión hebrea כּרת ברית es el giro idiomático normal para 'hacer/concertar un pacto'. En español, 'he hecho un pacto' comunica de forma natural el acto pactal sin perder el valor idiomático. Se evita 'he cortado' en el cuerpo del texto porque suena literal y poco natural para el lector hispano, aunque se conserva como alternativa explicada en nota.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - un pacto solemne
  - una alianza
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa 'covenant', en español 'pacto' es el término más claro y bíblicamente estable para este contexto. 'Alianza' puede ser válido, pero es más amplio y a veces menos preciso; 'pacto' conserva mejor el peso jurídico-relacional del hebreo בְּרִית.
- source_word: לִבְחִירִי
  english_pob_choice: with my chosen one
  chosen_spanish: con mi escogido
  alternatives_spanish:
  - con mi elegido
  - con el que he escogido
  lexicon: HALOT
  rationale: La relación del lamed con בְּרִית se entiende idiomáticamente como 'con'. Para בחירי, 'mi escogido' conserva la designación personal y el lenguaje de elección divina sin introducir una formulación más interpretativa. 'Escogido' mantiene mejor la fuerza verbal de elección que 'elegido' en este registro.
- source_word: נִשְׁבַּ֗עְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - he prometido bajo juramento
  - juré
  lexicon: HALOT
  rationale: El nifal de שׁבע significa jurar/tomar juramento. 'He jurado' corresponde directamente al acto solemne del texto y preserva la fuerza performativa del perfecto hebreo, sin suavizarlo a 'he prometido'.
- source_word: לְדָוִ֥ד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - sobre David
  lexicon: HALOT
  rationale: El lamed tras נשבע señala al destinatario del juramento. En español, 'a David' es la forma más directa y natural para ese uso preposicional.
- source_word: עַבְדִּֽי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi servidor
  - mi esclavo
  lexicon: HALOT
  rationale: Aquí עבד funciona como título relacional y honorífico para David en el marco del pacto davídico. 'Siervo' es el equivalente más natural y reverente en español bíblico; 'esclavo' sería demasiado fuerte para este contexto y alteraría el tono del verso.
theological_decisions:
- issue: Identidad de 'mi escogido'
  english_pob_reading: Retain the immediate referent as David within the psalm's Davidic covenant context, without importing a direct messianic identification into the translation.
  chosen_spanish_reading: Mantener a David como referente inmediato de 'mi escogido', sin convertir la frase en una identificación mesiánica explícita dentro del texto traducido.
  alternative_spanish_readings:
  - Leer 'mi escogido' de modo mesiánico o tipológico más allá de David
  - Sustituir la referencia por una formulación más interpretativa
  rationale: El versículo nombra a David de forma paralela, de modo que la traducción debe preservar ese referente inmediato. Cualquier lectura mesiánica más amplia pertenece a la interpretación, no a una expansión del texto español.
  doctrine_reference: Primacía del sentido histórico-literal y preservación de la tensión teológica davídica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet hebreo y coincide con la lectura auditada en inglés: se mantiene el perfecto solemne, el paralelismo con David y la distinción entre el acto pactal y el juramento. No hubo revisiones aplicadas en el último pase, y la versión española conserva esa estabilidad textual.'
  spanish_consistency_notes:
  - Se usa 'pacto' de manera consistente para בְּרִית en este versículo.
  - Se traduce עבד como 'siervo' por tratarse de un título relacional en contexto davídico.
  - Se mantiene 'escogido' para preservar el lenguaje de elección divina sin cargarlo de interpretación adicional.
  - La nota a explica la alternativa lexical literal sin desplazar la redacción principal.
