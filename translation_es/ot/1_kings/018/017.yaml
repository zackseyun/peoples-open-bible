translation:
  language: es
  text: 'Y cuando Acab vio a Elías[a], Acab le dijo: «¿Eres tú el que acarrea desgracia sobre Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que trae problemas sobre Israel» o «el que trae desastre sobre Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora ...
  - Y aconteció ...
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo introduce el evento; en español natural se expresa con una simple conjunción narrativa sin forzar un giro arcaico.
- source_word: כִּרְאוֹת
  english_pob_choice: when ... saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - apenas vio
  - al ver
  lexicon: HALOT
  rationale: El infinitivo constructo con כ indica circunstancia temporal; «cuando vio» conserva el valor temporal de manera clara y natural.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: La marca de objeto directo no tiene equivalente independiente en español y se refleja en el orden normal de la oración.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: tradicional de nombres bíblicos en español
  rationale: El nombre propio se adapta a la forma bíblica española habitual, que es transparente y ampliamente reconocible para lectores hispanohablantes.
- source_word: וַיֹּאמֶר ... אֵלָיו
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - habló con él
  lexicon: HALOT
  rationale: El verbo de habla más el complemento dativo se expresa de forma natural con el clítico «le», preservando la relación indirecta sin calco pesado.
- source_word: הַאַתָּה זֶה
  english_pob_choice: Is that you
  chosen_spanish: ¿Eres tú ...?
  alternatives_spanish:
  - ¿Eres tú ese ...?
  - ¿Eres tú el ...?
  lexicon: HALOT
  rationale: La construcción hebrea es una pregunta enfática y confrontativa; en español se vierte de manera idiomática como una pregunta directa en segunda persona.
- source_word: עֹכֵר
  english_pob_choice: troubler
  chosen_spanish: el que perturba
  alternatives_spanish:
  - el que causa trouble
  - el que trae calamidad
  lexicon: HALOT
  rationale: El participio עכר puede denotar causar perturbación, aflicción o desastre. «El que perturba» conserva la acusación compacta y evita decidir en exceso entre «trouble» y «disaster» sin perder la fuerza del reproche.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: nombre propio
  rationale: Nombre nacional propio estándar en español.
theological_decisions:
- issue: Fuerza de la acusación de Ahab
  english_pob_reading: 'A direct accusation: ''troubler of Israel'''
  chosen_spanish_reading: 'Una acusación directa: «el que perturba a Israel»'
  alternative_spanish_readings:
  - «el que trae desastre sobre Israel»
  - «el que causa trouble a Israel»
  rationale: El verso presenta a Ahab culpando a Elías por la crisis de Israel. La traducción mantiene la acusación sin corregirla ni suavizarla, y deja abierta la gama semántica del participio hebreo.
  doctrine_reference: Conservar la tensión teológica y narrativa sin resolver la acusación del personaje.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece anclado en el texto principal junto a «Elías». La redacción mantiene el sentido temporal, el tono acusatorio y la ambigüedad lexical documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usa «Elías» como forma bíblica española estándar para el nombre propio.
  - Se conserva el clítico dativo «le» para reflejar «a él» de forma idiomática.
  - La nota [a] está vinculada al término acusatorio para reflejar la alternativa lexical del participio עֹכֵר.
