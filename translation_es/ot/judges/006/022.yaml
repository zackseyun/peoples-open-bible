revisions:
- from: 'Entonces Gedeón comprendió[a] que era el ángel de Yahvé, y Gedeón dijo: «¡Ah, Señor Dios! Porque he visto al ángel de Yahvé cara a cara».'
  to: 'Entonces Gedeón vio que era el ángel[a] de Yahvé, y Gedeón dijo: «¡Ah, Señor Dios! Porque he visto al ángel de Yahvé cara a cara».'
  rationale: Se restaura «vio» para reflejar fielmente וַיַּרְא y la decisión auditada del POB, y se mueve la nota léxica al término «ángel», que es donde realmente existe la alternativa «mensajero». El resto de la redacción puede mantenerse.
