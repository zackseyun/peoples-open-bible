  to: 'Y los hijos de Eliab: Nemuel[a], Datán y Abiram. Estos son aquellos Datán y Abiram, los llamados de la congregación, que se enfrentaron a Moisés y a Aarón en la compañía de Coré, cuando se enfrentaron a Yahvé.'
  rationale: Se corrigió la frase identificadora para que refleje la función resumptiva de הוּא con español gramatical y natural, preservando el énfasis demostrativo documentado en el audit trail. También se normalizó 'Datán' con tilde y se suavizó el inicio a 'Y los hijos de Eliab' para mejor legibilidad. Se conservan 'los llamados de la congregación', 'en la compañía de Coré' y 'Yahvé' por fidelidad al hebreo y al glosario del proyecto.
