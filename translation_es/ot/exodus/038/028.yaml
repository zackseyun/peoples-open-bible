translation:
  language: es
  text: Y con mil setecientos setenta y cinco hizo ganchos para las columnas, recubrió sus cabezas y les hizo bandas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y las unió con bandas»; el verbo hebreo aquí se refiere a proveer las columnas con bandas o filetes de unión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת הָאֶלֶף וּשְׁבַע הַמֵּאוֹת וַחֲמִשָּׁה וְשִׁבְעִים
  english_pob_choice: with the one thousand seven hundred and seventy-five
  chosen_spanish: con el mil setecientos setenta y cinco
  alternatives_spanish:
  - del mil setecientos setenta y cinco
  - y con el mil setecientos setenta y cinco
  lexicon: HALOT
  rationale: En el contexto contable de la construcción, la secuencia introduce la cantidad empleada. En español, «con» reproduce bien la relación instrumental/acompañante que el POB inglés resolvió con «with», sin forzar una perífrasis más explicativa.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: En un inventario de fabricación del tabernáculo, «hizo» es la forma natural y fiel para עשה, sin añadir matices que el hebreo no exige.
- source_word: וָוִים
  english_pob_choice: hooks
  chosen_spanish: ganchos
  alternatives_spanish:
  - ganchos
  - grapas
  - anillas
  lexicon: HALOT
  rationale: Para el contexto de los pilares del tabernáculo, el sentido arquitectónico es un elemento de sujeción metálico. «Ganchos» comunica ese valor de manera clara en español; «anzuelos» sería inadecuado y «grapas» puede sonar demasiado moderno/técnico.
- source_word: לָעַמּוּדִים
  english_pob_choice: for the pillars
  chosen_spanish: para las columnas
  alternatives_spanish:
  - para los pilares
  - para los postes
  lexicon: HALOT
  rationale: «Columnas» es un equivalente español sobrio y legible para el elemento estructural. «Pilares» también sería posible, pero «columnas» suena ligeramente más natural en este pasaje de construcción; se mantiene el referente arquitectónico sin perder precisión.
- source_word: וְצִפָּה רָאשֵׁיהֶם
  english_pob_choice: overlaid their tops
  chosen_spanish: cubrió sus partes superiores
  alternatives_spanish:
  - cubrió sus cabezas
  - sobrecubrió sus capiteles
  lexicon: HALOT
  rationale: צפה aquí refiere a recubrir con metal. «Cubrió sus partes superiores» expresa el sentido sin introducir un tecnicismo arquitectónico como «capiteles», que podría sugerir más de lo que el hebreo exige.
- source_word: וְחִשַּׁק אֹתָם
  english_pob_choice: and made bands for them
  chosen_spanish: y les hizo bandas
  alternatives_spanish:
  - y los unió con bandas
  - y los ciñó con bandas
  - y les puso abrazaderas
  lexicon: HALOT
  rationale: Siguiendo el POB, el verbo se entiende como proveer los pilares con bandas o aros de unión. «Les hizo bandas» conserva la literalidad funcional; «los unió con bandas» explicita la función pero se aleja más de la forma del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés del POB y no requiere revisión sustancial respecto de la lectura establecida; se conservan la secuencia contable, el paralelismo de acciones y la ambigüedad funcional de חִשַּׁק mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reproducir la coordinación narrativa del hebreo y del POB inglés.
  - Se evita «SEÑOR» u otro sustituto teológico porque este versículo no contiene el Nombre divino.
  - «Columnas» traduce consistentemente עַמּוּדִים con lenguaje natural para una escena de carpintería/metalurgia del tabernáculo.
  - La nota a pie de página preserva la alternativa semántica de «bandas»/«unió con bandas» que el inglés ya documenta.
