translation:
  language: es
  text: 'Y estas, de entre las aves, las tendrán por detestables[a]; no se comerán; son detestables: el águila, el buitre[b][c] y el buitre negro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres hebreos de estas aves no siempre pueden identificarse con certeza. «El águila» puede referirse más ampliamente a un ave rapaz grande o incluso a un buitre.
    reason: lexical_alternative
  - marker: b
    text: O «quebrantahuesos»; también «lammergeier» para el «buitre barbudo».
    reason: lexical_alternative
  - marker: c
    text: La identificación de esta ave es incierta. Traducciones antiguas suelen leer «águila pescadora»; algunos proponen una clase de águila o de buitre.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׁקְּצוּ
  english_pob_choice: you shall regard as detestable
  chosen_spanish: las tendrán por repugnantes
  alternatives_spanish:
  - las considerarán detestables
  - las juzgarán repugnantes
  - las tendrán por detestables
  lexicon: HALOT
  rationale: El piel de שׁקץ expresa tratar algo como aborrecible o ritualmente rechazable. 'Tener por repugnantes' conserva la valoración sin reducirla a mera emoción, y funciona bien con el plural impersonal del español.
- source_word: מִן הָעוֹף
  english_pob_choice: from among the birds
  chosen_spanish: de entre las aves
  alternatives_spanish:
  - entre las aves
  - de entre los pájaros
  - de las aves
  lexicon: HALOT
  rationale: '''Aves'' es más natural y digno en español bíblico que ''pájaros''. ''De entre'' conserva el valor partitivo de מִן.'
- source_word: לֹא יֵאָכְלוּ
  english_pob_choice: they shall not be eaten
  chosen_spanish: no se comerán
  alternatives_spanish:
  - no deberán comerse
  - no han de comerse
  - no serán comidas
  lexicon: HALOT
  rationale: La pasiva hebrea normativa se vierte de forma natural con una pasiva refleja en español. 'Se comerán' suena claro y legal en este contexto dietético.
- source_word: שֶׁקֶץ הֵם
  english_pob_choice: they are detestable
  chosen_spanish: son repugnantes
  alternatives_spanish:
  - son detestables
  - son cosa repugnante
  - son una abominación
  lexicon: HALOT
  rationale: '''Repugnantes'' comunica la carga de rechazo ritual de שֶׁקֶץ sin depender del lenguaje más tradicional pero más abstracto de ''abominación''. La repetición mantiene el énfasis del hebreo.'
- source_word: הַנֶּשֶׁר
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - el águila real
  - el buitre
  - el ave rapaz
  lexicon: HALOT
  rationale: Se conserva la traducción lexical tradicional 'águila', como hace la edición inglesa, y se deja la incertidumbre zoológica para la nota.
- source_word: הַפֶּרֶס
  english_pob_choice: the vulture
  chosen_spanish: el buitre
  alternatives_spanish:
  - el quebrantahuesos
  - el buitre leonado
  - el lammergier
  lexicon: HALOT
  rationale: La revisión inglesa prefirió un término más general para evitar una identificación demasiado precisa; en español, 'buitre' reproduce esa cautela sin sobreespecificar.
- source_word: הָעָזְנִיָּה
  english_pob_choice: the black vulture
  chosen_spanish: el buitre negro
  alternatives_spanish:
  - el águila pescadora
  - el halcón marino
  - el buitre
  lexicon: HALOT
  rationale: Se sigue la opción inglesa revisada y la lectura moderna más probable, manteniendo en nota la incertidumbre identificatoria.
theological_decisions:
- issue: Caracterización ritual de los animales
  english_pob_reading: regard as detestable / they are detestable
  chosen_spanish_reading: tener por repugnantes / son repugnantes
  alternative_spanish_readings:
  - considerar detestables / son detestables
  - tener por impuros / son impuros
  rationale: El hebreo habla de rechazo cultual y alimentario. 'Repugnantes' comunica el efecto práctico y valorativo sin sustituirlo por el término técnico 'impuros', que el texto no usa aquí.
  doctrine_reference: Levítico 11; pureza ritual y alimentos permitidos/prohibidos
- issue: Identificación incierta de las aves
  english_pob_reading: older English versions often have 'osprey'; some suggest a kind of eagle or vulture
  chosen_spanish_reading: mantener los nombres comunes y anotar la incertidumbre
  alternative_spanish_readings:
  - especificar quebrantahuesos/lammergier
  - usar solo categorías genéricas como ave rapaz
  rationale: El POB inglés conserva la incertidumbre zoológica. En español se mantiene el nombre de uso común, sin convertir la nota en una certeza taxonómica no garantizada por el hebreo.
  doctrine_reference: Principio de prudencia textual y lexical
translation_notes:
  revision_awareness: La edición inglesa revisada simplificó la segunda ave de 'bearded vulture' a 'vulture' para evitar una identificación demasiado específica. La versión española sigue esa decisión con 'buitre', y mantiene la incertidumbre zoológica en nota.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo del verso: mandato inicial, prohibición pasiva y lista nominal final.'
  - Se usa 'aves' como equivalente natural de עוֹף en este contexto alimentario.
  - Se evita 'SEÑOR' o sustituciones litúrgicas porque el verso no contiene el nombre divino.
  - La terminología de rechazo ritual se mantiene con 'repugnantes' para no diluir שֶׁקֶץ en un simple juicio emocional.
