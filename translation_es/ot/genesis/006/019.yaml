translation:
  language: es
  text: Y de toda criatura viviente, de toda carne[a], traerás dos de cada una al arca, para mantenerlos vivos contigo[b]; serán macho y hembra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ser viviente' para 'criatura viviente'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'toda carne', un modismo para criaturas vivas de carne.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִכָּל
  english_pob_choice: And from every
  chosen_spanish: Y de todo
  alternatives_spanish:
  - Y de cada
  - Y de todo ser de
  lexicon: HALOT
  rationale: La construcción hebrea une la coordinación con la idea distributiva. En español, 'Y de todo' conserva el alcance de distribución sin forzar una preposición demasiado literal.
- source_word: הַחַי
  english_pob_choice: living thing
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - lo viviente
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado abarca lo que está vivo. 'Ser viviente' mantiene la amplitud y suena natural en español bíblico moderno.
- source_word: מִכָּל בָּשָׂר
  english_pob_choice: of all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - de toda carne humana
  - de toda criatura
  lexicon: HALOT
  rationale: '''Carne'' preserva el giro hebreo idiomático y su amplitud de criaturas animadas. Se evita estrecharlo a ''animal'' o expandirlo innecesariamente.'
- source_word: שְׁנַיִם מִכֹּל
  english_pob_choice: two of each
  chosen_spanish: dos de cada especie
  alternatives_spanish:
  - dos de cada uno
  - dos de todo
  lexicon: HALOT
  rationale: La frase indica una pareja tomada de cada categoría en vista. 'De cada especie' comunica bien el valor distributivo en español, aunque 'especie' es interpretativo en un grado controlado.
- source_word: תָּבִיא
  english_pob_choice: you shall bring
  chosen_spanish: traerás
  alternatives_spanish:
  - llevarás
  - harás entrar
  lexicon: HALOT
  rationale: El verbo en contexto de mandato se vierte con futuro de mandato en español. 'Traerás' conserva la instrucción directa y funciona con el movimiento hacia el arca.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: into the ark
  chosen_spanish: al arca
  alternatives_spanish:
  - dentro del arca
  - hacia el arca
  lexicon: HALOT
  rationale: Con 'traer' en español, 'al arca' expresa naturalmente el destino del movimiento. 'Arca' es el equivalente establecido para תֵּבָה en este contexto.
- source_word: לְהַחֲיֹת
  english_pob_choice: to keep them alive
  chosen_spanish: para mantenerlos vivos
  alternatives_spanish:
  - para conservarles la vida
  - para preservarles la vida
  lexicon: HALOT
  rationale: El infinitivo causativo expresa hacer que sigan viviendo. 'Mantenerlos vivos' es claro y recoge la finalidad sin sobretraducción.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto a ti
  lexicon: HALOT
  rationale: El sufijo de 2ª persona singular femenina no cambia el sentido de acompañamiento. 'Contigo' es la forma natural y directa en español.
- source_word: זָכָר וּנְקֵבָה
  english_pob_choice: male and female
  chosen_spanish: macho y hembra
  alternatives_spanish:
  - varón y hembra
  - macho y hembra serán
  lexicon: HALOT
  rationale: El par hebreo designa sexo biológico. 'Macho y hembra' preserva la concreción zoológica del término en este versículo.
- source_word: יִהְיוּ
  english_pob_choice: they shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  - habrán de ser
  lexicon: HALOT
  rationale: El verbo final expresa la condición requerida de los pares. 'Serán' mantiene el tono de instrucción declarativa y el orden natural del español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés sin depender mecánicamente de él. Se conserva la amplitud de הַחַי y el idiomatismo de בָּשָׂר, y se opta por una sintaxis española natural con futuro de mandato. No se requieren revisiones textuales según el control más reciente.
  spanish_consistency_notes:
  - Se usa 'arca' para תֵּבָה conforme al uso bíblico establecido.
  - Se mantiene 'carne' para בָּשָׂר, sin reemplazarlo por 'criatura' en el texto principal.
  - '''Macho y hembra'' conserva el paralelismo binario del hebreo.'
  - El sufijo femenino de 2ª persona en אִתָּךְ no afecta la forma española estándar de 'contigo'.
