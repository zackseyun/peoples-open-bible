translation:
  language: es
  text: La explicación del necio es como una carga en el camino[a]; pero la gracia se hallará en los labios del prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «favor se hallará en los labios del prudente». El griego χάρις puede significar gracia, favor o agrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήγησις
  english_pob_choice: explanation
  chosen_spanish: explicación
  alternatives_spanish:
  - interpretación
  - relato
  - discurso
  lexicon: LSJ
  rationale: ἐξήγησις denota una exposición o explicación. «Explicación» comunica bien la idea proverbial sin introducir tecnicismo ni alejarse del contraste del verso.
- source_word: μωροῦ
  english_pob_choice: of a fool
  chosen_spanish: del necio
  alternatives_spanish:
  - del tonto
  - del insensato
  - del hombre necio
  lexicon: LSJ
  rationale: En la literatura sapiencial, μωρός designa al necio moral e intelectualmente. «Necio» conserva ese matiz bíblico mejor que un insulto coloquial.
- source_word: ὡς ἐν ὁδῷ φορτίον
  english_pob_choice: like a burden on the road
  chosen_spanish: como una carga en el camino
  alternatives_spanish:
  - como una carga en la ruta
  - como un peso en el camino
  - como una carga sobre el camino
  lexicon: LSJ
  rationale: φορτίον es una carga; ἐν ὁδῷ presenta la imagen concreta de algo que estorba el avance. «Carga en el camino» mantiene la metáfora con naturalidad en español.
- source_word: χείλους
  english_pob_choice: lips
  chosen_spanish: labios
  alternatives_spanish:
  - boca
  - lengua
  - habla
  lexicon: LSJ
  rationale: «Labios» reproduce la imagen semítica y proverbial de la palabra que sale de los labios, además de corresponder al griego literal.
- source_word: συνετοῦ
  english_pob_choice: the prudent
  chosen_spanish: del prudente
  alternatives_spanish:
  - del entendido
  - del sensato
  - del discernidor
  lexicon: LSJ
  rationale: συνετός se refiere a quien tiene entendimiento y buen juicio. «Prudente» funciona bien en castellano proverbial y contrasta claramente con «necio».
- source_word: εὑρεθήσεται χάρις
  english_pob_choice: grace will be found
  chosen_spanish: la gracia se hallará
  alternatives_spanish:
  - se hallará favor
  - se encontrará gracia
  - se hallará benevolencia
  lexicon: LSJ
  rationale: χάρις puede significar gracia, favor o agrado. Se conserva «gracia» porque el POB inglés la retuvo como opción principal y porque su ambigüedad es productiva aquí; «se hallará» refleja bien εὑρεθήσεται.
theological_decisions:
- issue: Sentido de χάρις en un proverbio sapiencial
  english_pob_reading: grace will be found on the lips of the prudent, with a note that χάρις can also mean favor or graciousness
  chosen_spanish_reading: la gracia se hallará en los labios del prudente
  alternative_spanish_readings:
  - el favor se hallará en los labios del prudente
  - la amabilidad se hallará en los labios del prudente
  - la benevolencia se hallará en los labios del prudente
  rationale: El griego permite varias lecturas semánticas. En español, «gracia» conserva la amplitud de χάρις y deja abierta la tensión entre don, favor y cualidad agradable, tal como la nota inglesa.
  doctrine_reference: Lexical/theological ambiguity of χάρις in wisdom literature
translation_notes:
  revision_awareness: La revisión inglesa cambió «load» por «burden» para φορτίον; en español se eligió «carga» para mantener el valor concreto del término sin sobrerreformular. Se conservó además la ambigüedad de χάρις con una nota alternativa, siguiendo el expediente auditado.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no pertinente, ya que el verso no contiene el nombre divino.
  - «Necio» y «prudente» preservan el contraste sapiencial tradicional sin recurrir a formulaciones más interpretativas.
  - Se mantuvo «labios» para respetar la imaginería literal del griego y la cadencia proverbial.
  - «Se hallará» refleja el futuro pasivo del griego y sugiere resultado, no mera posibilidad.
