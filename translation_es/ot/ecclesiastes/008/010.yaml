base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/008/010.yaml
  text: And so I saw the wicked buried[a]; they had come and gone from the holy place, and they were forgotten in the city where they had done so[c][b]. This too is vanity.
  footnotes:
  - marker: a
    text: Or, following some ancient versions and a different understanding of the Hebrew, 'and they were praised in the city where they had done so.'
    reason: textual_variant
  - marker: b
    text: '''The holy place'' may refer to the temple precincts or another sacred place.'
    reason: cultural_note
  - marker: c
    text: Hebrew hebel, often rendered 'vanity'; also 'vapor,' suggesting something fleeting or elusive.
    reason: lexical_alternative
