lexical_decisions:
- source_word: non paucos, sed pene omnes qui creati sunt
  english_pob_choice: Not a few, but nearly all who have been created.
  chosen_spanish: No pocos, sino casi todos los que han sido creados.
  alternatives_spanish:
  - No unos pocos, sino casi todos los que han sido creados.
  - No pocos, sino prácticamente todos los que han sido creados.
  lexicon: non paucos / pene omnes / creati sunt
  rationale: La negación contrastiva se conserva con «No pocos, sino…». «pene» expresa cercanía o casi totalidad, por eso «casi todos» mantiene el matiz sin exagerarlo. «qui creati sunt» se rinde literalmente como «los que han sido creados».
- source_word: respondit ad me et dixit
  english_pob_choice: And he answered me and said, “Hear
  chosen_spanish: 'Y él me respondió y dijo: «Escucha'
  alternatives_spanish:
  - 'Y me respondió y dijo: «Escucha'
  - 'Y él respondió y me dijo: «Escucha'
  lexicon: respondit ad me et dixit
  rationale: Se conserva la secuencia narrativa y el sujeto explícito «él» para reflejar el latín y la cadencia del diálogo. «escucha» traduce el inicio del discurso directo abierto en el fragmento.
