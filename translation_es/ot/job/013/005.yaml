revisions:
- from: ¡Quién diera[a] que guardaran silencio, y eso sería para ustedes sabiduría!
  to: ¡Ojalá callaran[a], y eso sería sabiduría para ustedes!
  rationale: Se reemplaza «¡Quién diera…!» por «¡Ojalá…!» para expresar de manera más natural el optativo hebreo מִי יִתֵּן en español actual. Se usa «callaran» como formulación breve y clara del deseo de silencio, preservando el sentido de הַחֲרֵשׁ תַּחֲרִישׁוּן, mientras la nota conserva la alternativa más explícita «guardaran silencio». También se suaviza el orden a «sería sabiduría para ustedes» para mejorar fluidez sin perder la relación evaluativa de לָכֶם לְחָכְמָה.
