translation:
  language: es
  text: Aplaudan[a], todos los pueblos[b]; aclamen a Dios con voz de gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "choquen las palmas". El hebreo תִּקְעוּ כָף es un modismo de golpear o aplaudir la palma.
    reason: lexical_alternative
  - marker: b
    text: O "todas las naciones". El hebreo עַמִּים puede referirse a pueblos en sentido étnico o colectivo o, más ampliamente, a naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעַמִּים
  english_pob_choice: all peoples
  chosen_spanish: pueblos todos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos
  lexicon: HALOT
  rationale: כָּל con הָעַמִּים expresa la totalidad de los grupos humanos convocados. En español, "pueblos todos" conserva el plural étnico/colectivo y mantiene el alcance universal sin cargar la frase con un matiz político fuerte como "naciones".
- source_word: תִּקְעוּ כָף
  english_pob_choice: Clap your hands
  chosen_spanish: Aplaudan con las manos
  alternatives_spanish:
  - choquen las palmas
  - den palmadas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe el gesto de golpear o aplaudir las palmas. "Aplaudan con las manos" comunica la acción celebratoria de forma natural en español y conserva el imperativo plural.
- source_word: הָרִיעוּ
  english_pob_choice: shout
  chosen_spanish: aclamen
  alternatives_spanish:
  - griten
  - prorrumpan en gritos de júbilo
  lexicon: HALOT
  rationale: El imperativo de רוע puede significar dar un grito jubiloso o de acclamación. "Aclamen" preserva el matiz de exultación dirigida y suena más digno que un simple "griten" en este contexto litúrgico-poético.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: HALOT
  rationale: La preposición ל marca la dirección de la aclamación. "A Dios" es la equivalencia más directa y natural en español.
- source_word: בְּקוֹל רִנָּה
  english_pob_choice: with a voice of joy
  chosen_spanish: con voz de gozo
  alternatives_spanish:
  - con voz de alegría
  - con el sonido del regocijo
  - con voz jubilosa
  lexicon: HALOT
  rationale: קוֹל es "voz" o "sonido", y רִנָּה expresa gozo jubiloso, clamor de alegría o regocijo. "Con voz de gozo" conserva la metáfora auditiva y el matiz celebratorio sin añadir la imagen específica de canto, que el hebreo no exige de manera explícita en esta revisión.
theological_decisions:
- issue: Alcance universal de la convocatoria
  english_pob_reading: The verse summons all peoples universally to praise God.
  chosen_spanish_reading: El versículo convoca a todos los pueblos a alabar a Dios.
  alternative_spanish_readings:
  - El versículo convoca a todas las naciones a alabar a Dios.
  - La exhortación se limita a los pueblos vecinos de Israel.
  rationale: El hebreo dice explícitamente "todos los pueblos", y el paralelismo con el contexto real-teológico del salmo sostiene una convocatoria universal. Se mantiene ese alcance sin restringirlo a un grupo geográfico o étnico particular.
  doctrine_reference: Salmo 47; soberanía universal de Dios sobre las naciones
- issue: 'Tono de la alabanza: júbilo y aclamación'
  english_pob_reading: shout to God with a voice of joy.
  chosen_spanish_reading: aclamen a Dios con voz de gozo.
  alternative_spanish_readings:
  - griten a Dios con voz de gozo.
  - aclamen a Dios con voz jubilosa.
  rationale: El hebreo combina un grito de celebración con un קול de רִנָּה, es decir, un clamor gozoso. "Aclamen" conserva la fuerza de una expresión pública de honor y alegría, sin debilitarla a una mera interioridad emocional.
  doctrine_reference: Alabanza pública y gozosa a Yahvé/Dios
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que prefirió "with a voice of joy" por mayor ajuste léxico al hebreo y mayor naturalidad formal. Por eso se evitó una expansión como "voz de gozo jubiloso" o "voz de canto gozoso", y se mantuvo una formulación breve y fiel: "con voz de gozo".'
  spanish_consistency_notes:
  - Se usa "Dios" para אֱלֹהִים, conforme al estándar del proyecto.
  - Se evita "SEÑOR" porque el texto hebreo usa אֱלֹהִים, no el Tetragrámaton.
  - Se prefiere "pueblos" sobre "naciones" para conservar el matiz colectivo-ético del hebreo.
  - Se usa un verbo de aclamación pública para הָרִיעוּ, manteniendo el carácter celebratorio del paralelismo poético.
