review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y del POB inglés: contraste inicial, ‘una tribu’, propósito, metáfora de ‘lámpara’, continuidad temporal, ‘delante de mí’, y la fórmula teológica ‘poner allí mi nombre’. Sin embargo, ‘David, mi esclavo’ no es una buena elección aquí para עַבְדִּי en este contexto de título honorífico pactual (‘David my servant’); aunque el proyecto favorece ‘esclavo’ para δοῦλος y a veces para términos afines, aquí resulta teológicamente y estilísticamente inadecuado en español y no representa bien la función del hebreo en Reyes.'
  spanish_quality_summary: El español es generalmente claro y digno. La sintaxis es natural y legible. El problema principal es la expresión ‘David, mi esclavo’, que suena impropia y poco eclesial en un contexto donde ‘mi siervo’ es la formulación española estable y fiel. También conviene mantener la nota al pie tal como está anclada en ‘tribu[a]’, porque el contenido de la nota trata ‘lámpara/luz’ y actualmente no corresponde al lugar señalado.
  glossary_alignment: 'Hay buena alineación con ‘tribu’, ‘lámpara’, ‘delante de mí’ y ‘poner allí mi nombre’. La excepción necesaria es עַבְדִּי: en este versículo debe traducirse ‘mi siervo’, no ‘mi esclavo’, por contexto bíblico, naturalidad española y función honorífica del título davídico. Además, la nota léxica sobre נִיר debe anclarse en ‘lámpara’, no en ‘tribu’.'
  issues:
  - severity: high
    issue: ‘David, mi esclavo’ para עַבְדִּי
    rationale: En 1 Reyes 11:36 עַבְדִּי funciona como título divino-honorífico para David (‘David mi siervo’), no como énfasis en esclavitud literal. ‘Mi esclavo’ en español suena chocante, poco idiomático y distorsiona el registro pactual y real del pasaje.
  - severity: medium
    issue: La nota [a] está anclada en ‘tribu’ pero explica ‘lámpara/luz’
    rationale: El marcador debe aparecer sobre la palabra o frase pertinente. Tal como está, induce a pensar que la alternativa se refiere a ‘tribu’, cuando en realidad explica נִיר = ‘lámpara’ / ‘luz’.
  revised_spanish_text: Pero a su hijo le daré una tribu, para que David, mi siervo, tenga siempre una lámpara[a] delante de mí en Jerusalén, la ciudad que he escogido para mí para poner allí mi nombre.
  revised_footnotes:
  - marker: a
    text: O «luz». El hebreo נִיר aquí funciona como metáfora de la continuidad de la línea davídica o de una presencia real perdurable; «lámpara» conserva la imagen de forma más concreta.
    reason: lexical_alternative
