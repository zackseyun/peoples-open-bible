translation:
  language: es
  text: Y asentó en ella a hombres judíos, y la fortificó para la seguridad del país y de la ciudad, y levantó los muros de Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατῴκισεν
  english_pob_choice: settled
  chosen_spanish: estableció
  alternatives_spanish:
  - asentó
  - puso a habitar
  - instaló
  lexicon: LSJ
  rationale: El verbo griego expresa poner a personas como residentes en un lugar. En español, 'estableció' comunica bien esa acción causativa sin sonar forzado, y conserva el tono administrativo-militar del contexto.
- source_word: ἄνδρας Ἰουδαίους
  english_pob_choice: Jewish men
  chosen_spanish: hombres judíos
  alternatives_spanish:
  - judíos
  - hombres de Judea
  - varones judíos
  lexicon: LSJ
  rationale: Se conserva explícitamente 'hombres' para reflejar ἄνδρας, tal como exige el dato gramatical masculino. 'Judíos' expresa el valor étnico-religioso de Ἰουδαίους; 'hombres judíos' mantiene ambos elementos de manera natural en español.
- source_word: ὠχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: la fortificó
  alternatives_spanish:
  - la hizo fuerte
  - la reforzó defensivamente
  - la aseguró
  lexicon: LSJ
  rationale: '''Fortificó'' es el equivalente español directo y usual en contexto bélico. La forma verbal mantiene la acción de defensa urbana sin añadir matices que el griego no exige.'
- source_word: πρὸς ἀσφάλειαν
  english_pob_choice: for the security
  chosen_spanish: para la seguridad
  alternatives_spanish:
  - para el resguardo
  - como protección
  - para la salvaguardia
  lexicon: LSJ
  rationale: La frase griega indica finalidad. 'Para la seguridad' reproduce con claridad ese sentido y resulta natural en español contemporáneo sin perder la formalidad del pasaje.
- source_word: τῆς χώρας
  english_pob_choice: of the country
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  - del territorio
  lexicon: LSJ
  rationale: 'Aunque la edición inglesa optó por ''country'', en español ''tierra'' es una traducción más flexible y fiel al rango semántico de χώρα en este contexto histórico: territorio/país/land. Además, armoniza con el paralelismo con ''la ciudad''.'
- source_word: τῆς πόλεως
  english_pob_choice: the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la urbe
  - de la población
  lexicon: LSJ
  rationale: '''Ciudad'' es la correspondencia directa y transparente de πόλις en este contexto. Mantiene el contraste con ''la tierra'' y evita introducciones interpretativas.'
- source_word: ὕψωσεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - elevó
  - levantó en alto
  lexicon: LSJ
  rationale: '''Levantó'' es idiomático en español para muros y preserva la idea de hacerlos más altos o elevarlos, sin precisar si se trata de reconstrucción o simple aumento de altura.'
- source_word: τὰ τείχη Ἰερουσαλήμ
  english_pob_choice: the walls of Jerusalem
  chosen_spanish: los muros de Jerusalén
  alternatives_spanish:
  - las murallas de Jerusalén
  - los muros de Jerusalén
  lexicon: LSJ
  rationale: '''Muros'' refleja bien τείχη y es completamente comprensible en español. ''Murallas'' sería también posible, pero ''muros'' mantiene la literalidad sin perder naturalidad.'
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa de referencia coinciden de forma alta; no hay notas textuales ni revisiones aplicadas. La redacción española sigue de cerca la estructura del original, cuidando la claridad y el paralelismo sintáctico.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - Se mantiene la distinción entre 'hombres' y 'judíos' para no perder el valor explícito de ἄνδρας Ἰουδαίους.
  - Se conserva el paralelismo entre 'la tierra' y 'la ciudad' para reflejar la finalidad defensiva del griego.
