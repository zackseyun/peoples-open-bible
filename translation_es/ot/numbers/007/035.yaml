translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz: dos reses[a], cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Elizur hijo de Sedeur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de comunión» u «ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para una ofrenda de
  - y como sacrificio de
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen otro elemento de la lista sacrificial. «Para el sacrificio de» sigue de cerca la función enumerativa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: «שְׁלָמִים» es el término técnico sacrificial. «Ofrendas de paz» conserva la terminología cultual tradicional y es transparente en español; las alternativas reflejan matices válidos, pero el texto hebreo apunta a una categoría sacrificial estable.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bueyes
  lexicon: HALOT
  rationale: «בָּקָר» es un colectivo para ganado bovino. «Cabezas de ganado» mantiene el valor colectivo sin especificar más de lo que dice el hebreo. «Bueyes» sería demasiado específico.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco borregos machos
  lexicon: HALOT
  rationale: «אֵילִם» designa carneros; «carneros» es el equivalente natural y preciso en español.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco cabras machos
  lexicon: HALOT
  rationale: El hebreo especifica machos de cabra. «Machos cabríos» preserva la precisión léxica del término sacrificial y funciona bien en español bíblico.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos en su primer año
  lexicon: HALOT
  rationale: La revisión inglesa eliminó «male» porque el hebreo aquí solo dice «corderos de un año». «Corderos de un año» reproduce el dato de edad sin añadir sexo. «Corderos» es más natural en español que una calca como «en su primer año».
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Ésta fue la ofrenda de
  - Este fue el sacrificio de
  lexicon: HALOT
  rationale: La fórmula narrativa se expresa con pasado en español, como en el POB inglés. «Ofrenda» conserva el sentido general de קָרְבָּן como algo presentado a Dios; «sacrificio» sería posible, pero menos amplio.
- source_word: אֱלִיצוּר בֶּן שְׁדֵיאוּר
  english_pob_choice: Elizur son of Shedeur
  chosen_spanish: Elizur hijo de Sedeur
  alternatives_spanish:
  - Elizur hijo de Shedeur
  lexicon: N/A (nombres propios)
  rationale: Los nombres propios se transliteran de manera consistente. «Sedeur» refleja la adaptación habitual al español para שְׁדֵיאוּר, mientras «hijo de» conserva la relación patronímica.
theological_decisions:
- issue: Término sacrificial שְׁלָמִים
  english_pob_reading: peace offerings, with footnoted alternatives fellowship offerings / offerings of well-being
  chosen_spanish_reading: ofrendas de paz, con alternativa posible de ofrendas de comunión o de bienestar
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El término técnico admite matiz relacional y de integridad/completud. «Ofrendas de paz» mantiene la tradición terminológica y la legibilidad; las alternativas conservan la tensión semántica sin borrar el campo de sentido.
  doctrine_reference: Levítico 3; Números 7:17-83
- issue: Valor colectivo de בָּקָר
  english_pob_reading: two cattle
  chosen_spanish_reading: dos cabezas de ganado
  alternative_spanish_readings:
  - dos reses
  - dos bueyes
  rationale: El hebreo nombra ganado bovino en forma colectiva, no necesariamente bueyes de labor. «Cabezas de ganado» preserva esa amplitud y evita una especificación no garantizada por el texto.
  doctrine_reference: HALOT; contexto de inventario sacrificial en Números 7
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que retiró «male» antes de «lambs» porque el hebreo solo dice «lambs a year old». El español refleja esa decisión al traducir simplemente «corderos de un año». También se mantuvo la elección revisada de «peace offerings» como término técnico, aquí rendido como «ofrendas de paz».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el tetragrámaton en esta serie, aunque este versículo no lo contiene.
  - «Ofrenda» se usa para קָרְבָּן, reservando «sacrificio» para la expresión técnica introductoria del verso.
  - 'Los nombres propios se adaptan con transliteración española estable: Elizur, Sedeur.'
