translation:
  language: es
  text: Y puso la cortina en la entrada del tabernáculo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cortina para la entrada del tabernáculo» o «el colgante de la entrada del tabernáculo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: And he put
  chosen_spanish: Y puso
  alternatives_spanish:
  - Y colocó
  - Y colocó allí
  lexicon: HALOT
  rationale: וַיָּשֶׂם es un verbo general de poner/colocar. «Puso» conserva la acción simple del hebreo sin añadir la idea de instalación que en español podría sonar interpretativa.
- source_word: מָסַךְ
  english_pob_choice: screen
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  - pantalla
  - lienzo
  lexicon: HALOT
  rationale: En contexto tabernacular, מָסַךְ designa un colgante o cubierta de la entrada. En español, «velo» comunica bien la función de cobertura/colgadura, aunque mantiene una posible tensión con otros términos del santuario; se conserva esa diferenciación mediante la nota alternativa.
- source_word: הַפֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la puerta
  - el acceso
  - la abertura
  lexicon: HALOT
  rationale: פֶּתַח se refiere a la abertura o entrada. «La entrada» es natural y fiel al sentido funcional del término en español contemporáneo.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: to the tabernacle
  chosen_spanish: del tabernáculo
  alternatives_spanish:
  - para el tabernáculo
  - del santuario móvil
  lexicon: HALOT
  rationale: El hebreo vincula el colgante con la entrada del מִשְׁכָּן. En español, la relación se expresa con naturalidad como «del tabernáculo», equivalente de pertenencia/relación espacial en este contexto.
translation_notes:
  revision_awareness: 'Se siguió el ajuste de la revisión inglesa más reciente: el verbo se mantuvo simple («puso») y la relación espacial se expresó de forma natural («de la entrada del tabernáculo»), sin introducir una paráfrasis de instalación.'
  spanish_consistency_notes:
  - Se preservó el término tradicional «tabernáculo» para מִשְׁכָּן, coherente con el uso bíblico en español.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
  - «Velo» se usa aquí como alternativa interpretativa de «screen/curtain», manteniendo la posibilidad de leerlo como colgadura de entrada.
