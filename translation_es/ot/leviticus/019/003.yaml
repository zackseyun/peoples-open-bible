  to: Cada hombre[a] temerá a su madre y a su padre[b], y ustedes guardarán mis sábados. Yo soy Yahvé, su Dios.
  rationale: 'La revisión corrige la discordancia del borrador y refleja mejor la estructura hebrea y el audit trail inglés: singular distributivo al inicio, luego mandato a la comunidad en plural; preserva el orden madre-padre, mantiene ''Yahvé'' y ''mis sábados'', y recoloca las notas para que correspondan a las decisiones léxicas documentadas sin añadir alternativas innecesarias.'
