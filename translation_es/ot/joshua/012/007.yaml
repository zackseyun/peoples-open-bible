  to: Y estos son los reyes de la tierra que Josué y los hijos de Israel derrotaron al otro lado del Jordán, hacia el occidente[a], desde Baal-gad en el valle del Líbano hasta el monte Halac, que sube hacia Seír[b]; y Josué la entregó a las tribus de Israel como herencia, según sus divisiones.
  rationale: Se corrigió el anclaje de la nota geográfica para que coincida con la frase pertinente; se eliminaron notas innecesarias o mal dirigidas; se ajustó 'la dio' a 'la entregó' para un español más natural sin pérdida de sentido; y se simplificó 'monte de Hálac' a 'monte Halac' como topónimo más idiomático. El resto del versículo conserva fielmente el sentido y las decisiones léxicas del POB.
