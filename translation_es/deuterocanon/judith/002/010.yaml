translation:
  language: es
  text: Pero tú[a], después de salir, te apoderarás de antemano de todo su territorio para mí, y ellos se entregarán a ti; y los guardarás para mí hasta el día de su castigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el día de su reprensión» o «hasta el día de su corrección». El griego ἐλεγμός puede denotar reprensión, censura o corrección punitiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: after going out
  chosen_spanish: después de salir
  alternatives_spanish:
  - habiendo salido
  - al salir
  lexicon: LSJ
  rationale: El participio aoristo tiene valor temporal previo al verbo principal. «Después de salir» expresa con naturalidad la secuencia anterior sin volverla demasiado literal.
- source_word: προκαταλήμψῃ
  english_pob_choice: shall seize ... in advance
  chosen_spanish: tomarás por anticipado
  alternatives_spanish:
  - tomarás antes
  - ocuparás por adelantado
  - tomarás posesión por adelantado
  lexicon: LSJ
  rationale: El compuesto sugiere tomar posesión antes o de antemano. «Tomarás por anticipado» conserva el matiz de anticipación y evita una paráfrasis demasiado libre.
- source_word: πᾶν ὅριον αὐτῶν
  english_pob_choice: all their territory
  chosen_spanish: todo su territorio
  alternatives_spanish:
  - cada uno de sus límites
  - toda su región
  - todo su lindero
  lexicon: LSJ
  rationale: En este contexto militar, ὅριον no se limita a una línea fronteriza, sino al espacio bajo dominio. «Territorio» comunica mejor esa realidad que «límite» en singular o plural.
- source_word: ἐκδώσουσίν σοι ἑαυτούς
  english_pob_choice: they will surrender themselves to you
  chosen_spanish: se entregarán a ti
  alternatives_spanish:
  - se rendirán a ti
  - se entregarán por completo a ti
  - se pondrán en tus manos
  lexicon: LSJ
  rationale: El reflexivo expresa una entrega voluntaria. «Se entregarán a ti» mantiene la idea de rendición sin añadir más contenido del que el griego exige.
- source_word: διατηρήσεις
  english_pob_choice: you shall keep
  chosen_spanish: los guardarás
  alternatives_spanish:
  - los conservarás
  - los mantendrás
  - los retendrás
  lexicon: LSJ
  rationale: El verbo significa guardar, preservar o retener. Aquí el contexto es mantener a los sometidos para un fin posterior; «los guardarás» es breve y suficientemente amplio.
- source_word: εἰς ἡμέραν ἐλεγμοῦ αὐτῶν
  english_pob_choice: until the day of their punishment
  chosen_spanish: hasta el día de su castigo
  alternatives_spanish:
  - hasta el día de su reprensión
  - hasta el día de su reprensión y corrección
  - hasta el día de su corrección disciplinaria
  lexicon: LSJ
  rationale: ἐλεγμός puede denotar reprensión, censura o corrección punitiva. En este contexto bélico-jurídico, «castigo» transmite con mayor claridad la fuerza punitiva; aun así, se conserva la tensión semántica con alternativas como «reprensión».
theological_decisions:
- issue: Valor de ἐλεγμός en contexto militar y judicial
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - reprensión
  - corrección
  - censura
  rationale: La escena habla del sometimiento de pueblos vencidos, no de un juicio escatológico. «Castigo» refleja el resultado punitivo que el POB inglés también privilegia, sin borrar que el término griego puede incluir la idea de reprensión.
  doctrine_reference: Preservar la tensión léxica documentada; no resolverla por una sola acepción teológica estrecha.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el testimonio griego de Swete y la auditoría inglesa. No se registran revisiones aplicadas; se conserva la decisión inglesa de entender ἐλεγμός con sentido punitivo, pero en español se mantiene la alternativa semántica en nota para no borrar la amplitud del término.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se evita «Cristo/Mesías» porque no corresponde al versículo.
  - Se conserva el tono militar-jurídico del original con verbos de conquista, rendición y custodia.
  - «Castigo» se usa como solución principal, con nota para la gama semántica de ἐλεγμός.
  - La puntuación sigue el español moderno y la segmentación reproduce las tres cláusulas del griego.
