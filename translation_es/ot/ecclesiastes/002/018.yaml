translation:
  language: es
  text: Y aborrecí todo mi trabajo en que me afané bajo el sol[a], porque debo dejarlo al hombre que vendrá después de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «debajo del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂנֵאתִי
  english_pob_choice: And I hated
  chosen_spanish: Y aborrecí
  alternatives_spanish:
  - Y odié
  - Entonces aborrecí
  lexicon: HALOT
  rationale: שׂנא expresa rechazo/aversión fuerte. «Aborrecí» comunica el peso afectivo de la reacción y es una solución natural en español; la conjunción inicial se vierte con «Y» para conservar el flujo discursivo sin añadir una inferencia causal.
- source_word: כָּל עֲמָלִי
  english_pob_choice: all my labor
  chosen_spanish: todo mi trabajo
  alternatives_spanish:
  - todo mi labor
  - todo mi afán
  lexicon: HALOT
  rationale: עָמָל puede referirse a trabajo penoso, afán o labor. En español, «trabajo» es claro y amplio; «afán» podría sonar más interpretativo y «labor» es válido pero menos natural para lectura pública. Se mantiene la totalidad con «todo mi».
- source_word: שֶׁאֲנִי עָמֵל
  english_pob_choice: in which I toiled
  chosen_spanish: en que me afané
  alternatives_spanish:
  - en que trabajé
  - en el que me afané
  lexicon: HALOT
  rationale: El participio עָמֵל intensifica la idea de esfuerzo sostenido. «Me afané» conserva la carga de esfuerzo penoso y la relación relativa natural en español. «En que» refleja la cláusula relativa sin rigidez.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - bajo el sol de este mundo
  lexicon: HALOT
  rationale: El hebraísmo característico de Eclesiastés se conserva con «debajo del sol», que mantiene la imaginería literal y su valor temático de la vida terrena. «Bajo el sol» sería igualmente posible, pero «debajo del sol» reproduce con más cercanía la forma tradicional y la imagen espacial.
- source_word: שֶׁאַנִּיחֶנּוּ
  english_pob_choice: because I must leave it
  chosen_spanish: porque debo dejarlo
  alternatives_spanish:
  - porque he de dejarlo
  - porque tengo que dejarlo
  - porque lo dejaré
  lexicon: HALOT
  rationale: El hiphil de נוח aquí transmite la acción de dejar/poner en manos de otro. «Debo dejarlo» expresa la inevitabilidad del contexto sin forzar un matiz modal más fuerte que el hebreo. Se evita una paráfrasis excesiva y se mantiene la relación causal introducida por la cláusula.
- source_word: לָאָדָם
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a un hombre
  - a la persona
  lexicon: HALOT
  rationale: אָדָם es singular masculino y apunta al sucesor individual. «Al hombre» conserva el género y la referencia específica, evitando neutralizar el término sin necesidad contextual.
- source_word: שֶׁיִּהְיֶה אַחֲרָי
  english_pob_choice: who will come after me
  chosen_spanish: que vendrá después de mí
  alternatives_spanish:
  - que estará después de mí
  - que me sucederá
  lexicon: HALOT
  rationale: Literalmente, «que estará después de mí» es posible, pero en español «vendrá después de mí» comunica con naturalidad la idea del sucesor temporal. Se preserva el sentido personal y sucesorio sin introducir un término técnico que el texto no exige.
theological_decisions:
- issue: Mantenimiento del marco sapiencial de frustración y herencia
  english_pob_reading: The speaker hates his labor because he must leave it to the successor after him.
  chosen_spanish_reading: El hablante aborrece su trabajo porque inevitablemente lo dejará al sucesor que viene después de él.
  alternative_spanish_readings:
  - El hablante detesta su obra porque la dejará a otro
  - El hablante odia todo su esfuerzo porque terminará en manos de un sucesor
  rationale: 'La lectura conserva la tensión del texto: el problema no es solo el trabajo en sí, sino su transferencia inevitable a otro. «Debo dejarlo» mantiene la fuerza existencial sin convertirla en una interpretación doctrinal ajena al verso.'
  doctrine_reference: Ecclesiastés 2:18; principios de fidelidad semántica y preservación de la tensión sapiencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la frase a «in which I toiled» por naturalidad. En español se reflejó esa naturalidad con «en que me afané», manteniendo la cláusula relativa y la intensidad del verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una alusión directa que requiera nota.
  - Se prefirió «aborrecí» para שׂנא por su fuerza afectiva; en este contexto no se suaviza a «odié» porque «aborrecer» conserva mejor el peso sapiencial del desengaño.
  - «Debajo del sol» conserva el modismo de Eclesiastés y su referencia a la esfera terrenal de la experiencia humana.
  - «Al hombre» respeta el masculino singular de אָדָם y la referencia al sucesor individual, sin imponer una neutralización no motivada.
