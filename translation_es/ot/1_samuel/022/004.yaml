revisions:
- from: Él los llevó[a] ante el rey de Moab, y ellos se quedaron con él todos los días que David estuvo en la fortaleza.
  to: Él los llevó[a] ante el rey de Moab, y se quedaron con él todos los días que David estuvo en la fortaleza.
  rationale: Se hace una reparación mínima de estilo eliminando el pronombre explícito «ellos», que en español resulta innecesario y menos fluido. También se simplifica la nota para que preserve con mayor precisión la alternativa léxica documentada en el rastro inglés sin redundancia. El resto del texto es fiel al hebreo y legible en español.
