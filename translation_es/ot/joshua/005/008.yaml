  rationale: Se simplifica la fórmula narrativa para un español más natural, se eleva ligeramente el registro con «permanecieron», y se corrige el matiz principal con «se recuperaron», que refleja mejor חֲיוֹתָם en este contexto. Se añade la nota léxica para preservar las alternativas significativas documentadas en el audit trail inglés.
