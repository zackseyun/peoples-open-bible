    text: «Maskil» es un término técnico en los títulos de los salmos; su sentido exacto es incierto, con propuestas como «composición contemplativa» o «composición instructiva».
    reason: lexical_alternative
  - marker: c
    text: O «para los hijos de Coré». El encabezado puede indicar autoría, asociación o destinatarios/intérpretes.
    reason: alternative_reading
  revision_rationale: Se corrige la nota [c] para que refleje la alternativa real documentada por la evidencia y el POB inglés, sin cambiar un texto principal que ya es fiel, natural y bien formulado.
