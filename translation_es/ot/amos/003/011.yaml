- from: 'Por tanto[a], así dice el Señor Yahvé: un adversario rodeará la tierra, y él derribará de ti tu fuerza[b], y tus fortalezas serán saqueadas.'
  to: 'Por tanto, así dice el Señor Yahvé: Un adversario[a] rodeará la tierra, te quitará tu fuerza, y tus fortalezas[b] serán saqueadas.'
  rationale: 'Se corrigen las notas para alinearlas exactamente con las alternativas léxicas documentadas por el POB inglés: [a] ahora corresponde a צַר (‘adversario/enemigo’) y [b] a אַרְמְנוֹתָיִךְ (‘fortalezas/palacios’). También se mejora la naturalidad del español reemplazando «él derribará de ti tu fuerza» por «te quitará tu fuerza», que preserva la idea de remoción de poder expresada por וְהוֹרִיד מִמֵּךְ עֻזֵּךְ sin sonar calcado.'
