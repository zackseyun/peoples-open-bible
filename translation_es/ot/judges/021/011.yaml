revisions:
- from: 'Y esto es lo que harán: todo varón[a], y toda mujer que haya conocido la cama de varón[b], la dedicarán a la destrucción.'
  to: 'Y esto es lo que harán: todo varón, y toda mujer[a] que haya conocido el lecho de un varón, los dedicarán a la destrucción[b].'
  rationale: Se corrigió la concordancia del objeto plural ('los dedicarán'), se movió la nota léxica al sintagma que realmente explica, y se mejoró 'cama' a 'lecho' para conservar el eufemismo hebreo con español más natural y digno. Se mantuvo 'varón' y la expresión técnica 'dedicar a la destrucción' por fidelidad léxica y teológica al hebreo חרם.
