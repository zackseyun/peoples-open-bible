translation:
  language: es
  text: Pero mi amor leal[a] no lo apartaré de él, ni faltaré a mi fidelidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mi amor constante" o "mi amor de pacto".
    reason: lexical_alternative
  - marker: b
    text: O "no me mostraré falso respecto a mi fidelidad".
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor leal
  alternatives_spanish:
  - mi misericordia
  - mi bondad constante
  - mi amor fiel
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal, comprometido y de pacto. En español, "amor leal" comunica mejor esa fidelidad relacional que una simple emoción o la sola idea de misericordia.
- source_word: אָפִיר
  english_pob_choice: I will not remove
  chosen_spanish: no lo apartaré
  alternatives_spanish:
  - no lo quitaré
  - no lo removeré
  - no haré cesar
  lexicon: HALOT
  rationale: El verbo hiphil sugiere retirar o apartar algo de alguien. "Apartaré" mantiene la idea de separación desde la persona referida y suena natural en español bíblico actual.
- source_word: מֵעִמּוֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - lejos de él
  lexicon: HALOT
  rationale: La preposición indica separación respecto de la persona. "De él" es breve y fiel al sentido de alejamiento.
- source_word: אֲשַׁקֵּר
  english_pob_choice: will I be false to
  chosen_spanish: actuaré falsamente con
  alternatives_spanish:
  - mentiré respecto a
  - fallaré en
  - traicionaré
  lexicon: HALOT
  rationale: El piel de שׁקר comunica actuar con falsedad o engaño. En español, "actuar falsamente con" conserva el valor de conducta infiel, no sólo de mentira verbal.
- source_word: בֶּאֱמוּנָתִי
  english_pob_choice: my faithfulness
  chosen_spanish: mi fidelidad
  alternatives_spanish:
  - mi verdad
  - mi fidelidad de pacto
  - mi firmeza
  lexicon: HALOT
  rationale: אֱמוּנָה aquí es confiabilidad, constancia y fidelidad. "Fidelidad" es la forma más clara y natural en español para preservar ese campo semántico.
- source_word: וְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: El contexto contrasta con la disciplina previa del salmo. "Pero" expresa mejor ese giro adversativo que un simple "y".
theological_decisions:
- issue: Pacto davídico y fidelidad divina frente a disciplina
  english_pob_reading: Use 'steadfast love' and 'faithfulness' to preserve covenantal reliability without importing later systematic categories.
  chosen_spanish_reading: Usar "amor leal" y "fidelidad" para conservar la confiabilidad de pacto sin imponer categorías teológicas posteriores.
  alternative_spanish_readings:
  - '"misericordia" y "verdad" en un estilo más tradicional'
  - '"amor inagotable" y "veracidad"'
  rationale: 'El versículo afirma que el castigo previo no cancela la lealtad del pacto. La traducción debe mantener esa tensión: juicio real, pero compromiso irrevocable. "Amor leal" y "fidelidad" lo expresan con claridad en español.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la segunda cláusula de un sentido más literal de 'deal falsely' a una formulación más natural ('be false to'). La redacción española sigue esa decisión con una expresión igualmente natural y fiel al valor de conducta infiel.
  spanish_consistency_notes:
  - Se conservó el paralelismo negativo de ambas cláusulas.
  - '"Fidelidad" se usa para אֱמוּנָה de forma consistente con el campo semántico de confiabilidad.'
  - No se sustituyó el valor de חֶסֶד por un término meramente emocional; se mantuvo su dimensión de lealtad de pacto.
