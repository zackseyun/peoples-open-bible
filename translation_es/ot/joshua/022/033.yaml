translation:
  language: es
  text: Y el asunto pareció bien a los ojos de los hijos de Israel[a], y los hijos de Israel bendijeron a Dios[b]. Y no hablaron de subir contra ellos en guerra[c] para destruir la tierra donde habitaban los hijos de Rubén y los hijos de Gad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «alabaron a Dios». El verbo hebreo dice literalmente «bendijeron».
    reason: lexical_alternative
  - marker: c
    text: Lit. «no dijeron subir contra ellos para la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  english_pob_choice: was good
  chosen_spanish: fue bueno
  alternatives_spanish:
  - fue agradable
  - pareció bien
  lexicon: HALOT
  rationale: El hebreo expresa evaluación favorable del asunto; «fue bueno» conserva la idiomaticidad sin sobreparafrasear.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - la palabra
  - el reporte
  lexicon: HALOT
  rationale: דָּבָר aquí se refiere a la explicación o resolución tratada; «asunto» es natural en español y mantiene el sentido contextual sin reducirlo a «palabra».
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - ante los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: Se conserva la imagen evaluativa hebrea en una forma plenamente comprensible en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la forma literal y gender-accurate del hebreo, como base auditable del texto.
- source_word: וַיְבָרֲכוּ אֱלֹהִים
  english_pob_choice: blessed God
  chosen_spanish: bendijeron a Dios
  alternatives_spanish:
  - alabaron a Dios
  - dijeron bien de Dios
  lexicon: HALOT
  rationale: ברך con objeto divino puede significar alabar o bendecir; «bendijeron a Dios» sigue de cerca la forma verbal del hebreo y preserva la tensión lexical documentada en el POB inglés.
- source_word: וְלֹא אָמְרוּ
  english_pob_choice: they did not speak of
  chosen_spanish: no dijeron que
  alternatives_spanish:
  - no hablaron de
  - no propusieron
  - no dijeron
  lexicon: HALOT
  rationale: En este contexto, la negación introduce la ausencia de una propuesta militar; la construcción española permite conservar el valor de «decir» sin volverlo demasiado interpretativo.
- source_word: לַעֲלוֹת עֲלֵיהֶם
  english_pob_choice: going up against them
  chosen_spanish: subir contra ellos
  alternatives_spanish:
  - ir contra ellos
  - atacarles
  lexicon: HALOT
  rationale: Se conserva la metáfora de ascenso de עלה על y su sentido militar de avanzar contra un enemigo.
- source_word: לַצָּבָא
  english_pob_choice: in war
  chosen_spanish: en guerra
  alternatives_spanish:
  - para la guerra
  - para batalla
  - como ejército
  lexicon: HALOT
  rationale: צָבָא aquí es ámbito bélico; «en guerra» suena natural en español y refleja el contexto militar.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para devastar
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito de la acción militar; «destruir» es directo y suficientemente fuerte.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la región
  - la tierra
  lexicon: HALOT
  rationale: אֶרֶץ se refiere al espacio territorial habitado; «la tierra» conserva la amplitud semántica y encaja con el registro bíblico en español.
- source_word: יֹשְׁבִים בָּהּ
  english_pob_choice: were living
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - moraban
  - estaban viviendo
  lexicon: HALOT
  rationale: El participio indica residencia continua; «habitaban» mantiene el sentido de asentamiento estable con un tono bíblico claro.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la evaluación favorable del asunto, el hebraísmo de «bendecir a Dios» y la expresión militar de «subir contra ellos en guerra», sin añadir interpretación doctrinal ni suavizar la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se preserva «hijos de Israel» para alineación formal con el hebreo y con el criterio POB de exactitud gramatical.
  - Se mantiene «bendijeron a Dios» en el texto principal, dejando la alternativa interpretativa «alabaron» en nota.
  - «Subir contra ellos en guerra» conserva el movimiento idiomático de עלה על y el matiz bélico de צָבָא.
  - «Tierra» se usa de manera consistente con el sentido territorial de אֶרֶץ en Josué.
