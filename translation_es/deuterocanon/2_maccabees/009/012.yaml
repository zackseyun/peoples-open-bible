translation:
  language: es
  text: 'Sus dolores se intensificaban[a] momento tras momento, y no podía ni soportar su propio hedor, dijo esto: «Es justo[b] someterse a Dios, y siendo mortal[c], no pensar con soberbia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de momento en momento» o «continuamente».
    reason: lexical_alternative
  - marker: b
    text: O «Es correcto» o «Es apropiado» someterse a Dios.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «siendo mortal»; la idea es un principio general sobre la condición humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ στιγμὴν
  english_pob_choice: from moment to moment
  chosen_spanish: de momento en momento
  alternatives_spanish:
  - momento tras momento
  - continuamente
  lexicon: LSJ
  rationale: La expresión marca una progresión temporal repetida. «De momento en momento» conserva el avance sucesivo sin sonar forzado en español.
- source_word: ἐπιτεινόμενος
  english_pob_choice: intensified
  chosen_spanish: se intensificaban
  alternatives_spanish:
  - aumentaban
  - se agravaban
  - iban empeorando
  lexicon: LSJ
  rationale: En contexto con ταῖς ἀλγηδόσιν, el participio indica que los dolores se volvían más severos. «Se intensificaban» transmite ese empeoramiento continuo de manera natural.
- source_word: ταῖς ἀλγηδόσιν
  english_pob_choice: his pains
  chosen_spanish: sus dolores
  alternatives_spanish:
  - sus sufrimientos
  - sus agonías
  - sus tormentos
  lexicon: LSJ
  rationale: ἀλγηδών denota dolor o sufrimiento. «Dolores» es una forma clara y sobria en español para este contexto de aflicción corporal.
- source_word: τῆς ὀσμῆς αὐτοῦ
  english_pob_choice: his own stench
  chosen_spanish: su propio hedor
  alternatives_spanish:
  - su propio olor
  - su propia pestilencia
  - su propia fetidez
  lexicon: LSJ
  rationale: ὀσμή puede ser olor/hedor; aquí el contexto narrativo es claramente negativo. «Hedor» preserva esa fuerza despectiva mejor que un simple «olor».
- source_word: ταῦτʼ ἔφη
  english_pob_choice: he said this
  chosen_spanish: dijo esto
  alternatives_spanish:
  - declaró esto
  - dijo estas cosas
  lexicon: LSJ
  rationale: La introducción de discurso es simple y directa. «Dijo esto» es natural en español y mantiene el sentido singular de la cita siguiente.
- source_word: Δίκαιον
  english_pob_choice: It is right
  chosen_spanish: Es justo
  alternatives_spanish:
  - Es correcto
  - Es conveniente
  - Es apropiado
  lexicon: LSJ
  rationale: El adjetivo funciona de forma impersonal. «Es justo» preserva la idea de rectitud y conveniencia moral que el inglés POB recoge con «It is right».
- source_word: ὑποτάσσεσθαι τῷ θεῷ
  english_pob_choice: to submit to God
  chosen_spanish: someterse a Dios
  alternatives_spanish:
  - ponerse bajo Dios
  - subordinarse a Dios
  - rendir-se a Dios
  lexicon: LSJ
  rationale: El infinitivo medio expresa colocarse bajo la autoridad de Dios. «Someterse a Dios» es idiomático y conserva el peso teológico de la sumisión humilde.
- source_word: μὴ θνητὸν ὄντα
  english_pob_choice: for one who is mortal not to
  chosen_spanish: siendo mortal
  alternatives_spanish:
  - por ser mortal
  - ya que es mortal
  - como mortal
  lexicon: LSJ
  rationale: La frase participial da la razón o condición ligada a la mortalidad humana. «Siendo mortal» mantiene el carácter general del enunciado sin limitarlo a una persona masculina concreta.
- source_word: ὑπερήφανα φρονεῖν
  english_pob_choice: to think proudly
  chosen_spanish: pensar con soberbia
  alternatives_spanish:
  - pensar orgullosamente
  - tener pensamientos soberbios
  - pensar con altivez
  lexicon: LSJ
  rationale: La expresión apunta al modo de pensar orgulloso. «Pensar con soberbia» conserva el valor cognitivo de φρονεῖν y comunica bien la actitud arrogante.
theological_decisions:
- issue: Carácter general de la frase μὴ θνητὸν ὄντα
  english_pob_reading: for one who is mortal not to think proudly
  chosen_spanish_reading: siendo mortal, no pensar con soberbia
  alternative_spanish_readings:
  - y, siendo mortal, no pensar con soberbia
  - que un mortal no piense con soberbia
  rationale: El griego usa una expresión participial general sobre la condición mortal humana. El español mantiene ese valor universal sin volverla innecesariamente masculina ni estrecharla a un caso individual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza moral de Δίκαιον
  english_pob_reading: It is right
  chosen_spanish_reading: Es justo
  alternative_spanish_readings:
  - Es correcto
  - Es fitting
  rationale: La frase impersonal combina rectitud moral y conveniencia. «Es justo» refleja mejor esa mezcla que opciones más débiles o puramente pragmáticas.
  doctrine_reference: LSJ / uso impersonal del adjetivo en contexto
- issue: Tono peyorativo de ὀσμή en este contexto
  english_pob_reading: his own stench
  chosen_spanish_reading: su propio hedor
  alternative_spanish_readings:
  - su propio olor
  - su propia fetidez
  rationale: En un contexto de enfermedad y decadencia, el sustantivo debe conservar la carga negativa. «Hedor» evita suavizar indebidamente el efecto del griego.
  doctrine_reference: LSJ / contexto narrativo
translation_notes:
  revision_awareness: La base inglesa no fue modificada en revisiones recientes; el último pase indicó que no se necesitaban cambios y la revisión cruzada mostró acuerdo alto. La redacción española sigue de cerca el audit trail, manteniendo las mismas decisiones léxicas y la misma tensión sobre la generalidad de la condición mortal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ, conforme al estándar del proyecto.
  - Se usa «mortal» en sentido genérico, sin introducir masculino específico.
  - «Hedor» preserva la carga negativa del contexto, coherente con la decisión inglesa de «stench».
  - La cita se presenta con puntuación española y comillas angulares para legibilidad litúrgica/publicable.
