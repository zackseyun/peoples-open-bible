revisions:
- from: Entonces tomó a los capitanes de cientos[a], a los nobles, a los gobernantes[b] del pueblo y a todo el pueblo de la tierra[c]; y bajaron al rey de la casa de Yahvé, y entraron por la puerta superior de la casa del rey, y sentaron al rey sobre el trono del reino.
  to: Entonces tomó a los comandantes de centenas, a los nobles[a], a los gobernantes del pueblo y a todo el pueblo de la tierra[b], e hizo bajar al rey de la casa de Yahvé. Entraron por la puerta superior de la casa del rey[c] y sentaron al rey sobre el trono del reino.
  rationale: Se corrige el verbo a singular para reflejar el hebreo, se reubica la nota lexical al término «nobles», se mejora la naturalidad de «capitanes de cientos» a «comandantes de centenas», y se preserva mejor el rastro de auditoría con la alternativa de «casa del rey» como «palacio real».
