  text: וַ/יִּקַּח֩ יוֹחָנָ֨ן בֶּן קָרֵ֜חַ וְ/כָל שָׂרֵ֧י הַ/חֲיָלִ֣ים אֲשֶׁר אִתּ֗/וֹ אֵ֣ת כָּל שְׁאֵרִ֤ית הָ/עָם֙ אֲשֶׁ֣ר הֵ֠שִׁיב מֵ/אֵ֨ת יִשְׁמָעֵ֤אל בֶּן נְתַנְיָה֙ מִן הַ/מִּצְפָּ֔ה אַחַ֣ר הִכָּ֔ה אֶת גְּדַלְיָ֖ה בֶּן אֲחִיקָ֑ם גְּבָרִ֞ים אַנְשֵׁ֣י הַ/מִּלְחָמָ֗ה וְ/נָשִׁ֤ים וְ/טַף֙ וְ/סָ֣רִסִ֔ים אֲשֶׁ֥ר הֵשִׁ֖יב מִ/גִּבְעֽוֹן־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/041/016.yaml
  text: 'Then Yohanan son of Kareah[a], and all the commanders of the forces who were with him, took all the remnant of the people whom he had recovered from Ishmael son of Nethaniah, from Mizpah, after he had struck down Gedaliah son of Ahikam: the soldiers, the men of war, and the women, and the little children, and the court officials[b], whom he had brought back from Gibeon.'
  footnotes:
  - marker: a
    text: Or 'had brought back' for 'had recovered' (Hebrew הֵשִׁיב), emphasizing restoration rather than rescue.
    reason: lexical_alternative
  - marker: b
    text: Or 'eunuchs' for 'court officials'; the Hebrew סָרִיסִים can refer either to literal eunuchs or to royal officials.
    reason: lexical_alternative
