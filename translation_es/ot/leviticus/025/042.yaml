    timestamp: '2026-04-23T11:11:57Z'
    unchanged: false
    changes_summary: 'Changed ''slaves'' to ''servants'' for better lexical and register fit in reference to Israel as the LORD''s servants, and revised the final clause to ''as slaves are sold'' for more natural English while preserving the sense of the Hebrew. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque ellos son mis esclavos[a], a quienes saqué de la tierra de Egipto; no serán vendidos como se venden los esclavos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis siervos». El hebreo עֲבָדַי puede traducirse de ambas maneras, pero «esclavos» se usa aquí porque el versículo enfatiza la pertenencia y prohíbe tratarlos como propiedad esclava ordinaria.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no serán vendidos con la venta de un esclavo», es decir, no de la manera propia de una transacción esclavista ordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la norma anterior. En español, 'Porque' conserva el valor explicativo/causal sin sonar forzado.
- source_word: עֲבָדַי
  english_pob_choice: my slaves
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis siervos
  lexicon: HALOT
  rationale: El sustantivo עֶבֶד/עֲבָדַי marca estatus de pertenencia y sujeción legal. 'Esclavos' preserva esa fuerza mejor que 'siervos', que en español suaviza el vínculo y puede ocultar la carga jurídica del pasaje.
- source_word: הֵם
  english_pob_choice: they are
  chosen_spanish: ellos son
  alternatives_spanish:
  - son
  lexicon: HALOT
  rationale: El hebreo usa pronombre explícito con cópula implícita para énfasis. En español se mantiene con 'ellos son' para reflejar el relieve del sujeto.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Se refiere a personas; 'a quienes' es la forma precisa y natural en español culto.
- source_word: הוֹצֵאתִי
  english_pob_choice: I brought out
  chosen_spanish: saqué
  alternatives_spanish:
  - hice salir
  - saqué fuera
  lexicon: HALOT
  rationale: El verbo del éxodo admite un español breve y natural. 'Saqué' conserva la acción divina de liberación sin diluirla.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' reproduce con fidelidad la fórmula hebrea y mantiene el registro bíblico sin arcaizar en exceso.'
- source_word: לֹא יִמָּכְרוּ
  english_pob_choice: they shall not be sold
  chosen_spanish: no serán vendidos
  alternatives_spanish:
  - no deben ser vendidos
  - no se venderán
  lexicon: HALOT
  rationale: El pasivo legal hebreo se expresa bien con futuro de prohibición en español bíblico actual. 'No serán vendidos' mantiene tono normativo y claridad.
- source_word: מִמְכֶּרֶת עָבֶד
  english_pob_choice: as a slave is sold
  chosen_spanish: como se vende a un esclavo
  alternatives_spanish:
  - como se vende a un esclavo
  - con venta de esclavo
  - en una venta de esclavo
  lexicon: HALOT
  rationale: La expresión describe el modo típico de una transacción esclavista ordinaria. 'Como se vende a un esclavo' comunica el sentido sin volverse demasiado técnico, y conserva la comparación legal del hebreo.
theological_decisions:
- issue: Cómo traducir עֲבָדַי en relación con la pertenencia a Yahvé y la prohibición de trato como propiedad ordinaria
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  rationale: El fundamento de la prohibición es que Israel pertenece a Yahvé por la redención de Egipto; por eso el texto resalta un estatus de sujeción real y legal. 'Esclavos' mantiene esa tensión y evita suavizar el texto con 'siervos'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; criterio de términos de servidumbre/bondad legal
- issue: Valor del verbo pasivo legal en la cláusula final
  english_pob_reading: they shall not be sold as slaves are sold
  chosen_spanish_reading: no serán vendidos como se vende a un esclavo
  alternative_spanish_readings:
  - no deben ser vendidos como se vende a un esclavo
  - no serán vendidos como esclavos
  rationale: 'La prohibición no es meramente moral sino jurídico-legal: no deben entrar en el mercado ordinario de esclavos. El español elegido conserva la forma comparativa del hebreo y la diferencia respecto de una venta común.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2; preservación de fuerza legal del texto
- issue: Traducción de la referencia al éxodo como acto fundacional de pertenencia
  english_pob_reading: whom I brought out from the land of Egypt
  chosen_spanish_reading: a quienes saqué de la tierra de Egipto
  alternative_spanish_readings:
  - a quienes saqué de Egipto
  - a quienes hice salir de la tierra de Egipto
  rationale: El éxodo es la base del derecho de Yahvé sobre Israel. 'Saqué' conserva el valor de liberación divina y la relación con la memoria del éxodo sin añadir interpretación.
  doctrine_reference: Éxodo 20:2; Levítico 25:42
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación entre 'servants' y 'slaves', con restitución final de 'slaves' por coherencia doctrinal y lexical. La versión española sigue la lectura final y conserva la tensión de estatus legal sin suavizarla. También recoge la glosa de la cláusula final como comparación con la venta ordinaria de esclavos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la norma del proyecto cuando corresponda; aquí el versículo no lo explicita, pero la referencia teológica se preserva en la explicación.
  - Se mantiene 'esclavos' de forma consistente con la decisión final del audit trail inglés y con el peso jurídico del hebreo עֶבֶד.
  - La sintaxis busca ser bíblica pero natural en español actual, evitando calcos innecesarios como 'venta de esclavo' cuando una comparación verbal resulta más clara.
