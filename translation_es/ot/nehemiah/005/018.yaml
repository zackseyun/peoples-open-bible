base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/005/018.yaml
  text: Now what was prepared for each day was one ox and six choice sheep[a]; also birds were prepared for me, and every ten days an abundance of all kinds of wine. Yet even with this, I did not demand the governor’s food allowance[b], because the service was heavy on this people.
  footnotes:
  - marker: a
    text: Or 'the governor’s bread' or 'the governor’s provisions.' The Hebrew literally says 'the bread of the governor,' likely referring to the official food allotment or allowance attached to the office.
    reason: lexical_alternative
  - marker: b
    text: Or 'the labor was burdensome' or 'the work was severe.' The Hebrew phrase emphasizes the weight of the people's burden.
    reason: lexical_alternative
