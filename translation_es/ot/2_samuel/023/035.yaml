lexical_decisions:
- source_word: חצרו
  english_pob_choice: Hezro
  chosen_spanish: Hezro
  alternatives_spanish:
  - Hazro
  lexicon: HALOT
  rationale: Es un nombre propio en la lista de los guerreros de David; por eso se translitera, no se traduce. Mantengo la forma inglesa de POB «Hezro», con la alternativa posible «Hazro» reconocida en la nota.
- source_word: הַכַּרְמְלִי
  english_pob_choice: the Carmelite
  chosen_spanish: el carmelita
  alternatives_spanish:
  - el hombre de Carmel
  - el carmelita
  lexicon: HALOT
  rationale: 'Es un gentilicio: un hombre procedente de Carmel. En español, «carmelita» conserva la concisión del listado y evita la sobreexplicación, sin aludir a la orden religiosa posterior.'
- source_word: פַּעֲרַי
  english_pob_choice: Paarai
  chosen_spanish: Paarai
  alternatives_spanish:
  - Paari
  lexicon: HALOT
  rationale: Nombre propio; lo translitero. «Paarai» refleja mejor la vocalización marcada por el texto hebreo que la variante más breve «Paari».
- source_word: הָאַרְבִּי
  english_pob_choice: the Arbite
  chosen_spanish: el arbita
  alternatives_spanish:
  - el hombre de Arab
  - el arbita/arabita
  lexicon: HALOT
  rationale: Se trata de un gentilicio con artículo. «Arbita» mantiene la forma breve y el paralelismo del hebreo; en una nota se conserva la posible lectura geográfica «hombre de Arab».
theological_decisions:
- issue: Tratamiento de gentilicios antiguos sin carga doctrinal
  english_pob_reading: the Carmelite; the Arbite
  chosen_spanish_reading: el carmelita; el arbita
  alternative_spanish_readings:
  - el hombre de Carmel; el hombre de Arab
  rationale: 'No hay una decisión doctrinal propiamente dicha, pero sí una elección de registro: conservar gentilicios breves en una lista militar respeta la forma del hebreo y la economía del texto. Cuando la forma española puede sonar ambigua, la nota ofrece la alternativa geográfica.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo consonante-vocalizado del WLC y coincide con el audit trail inglés: mantiene nombres propios transliterados y gentilicios breves, sin introducir material ausente del original. No se detectaron revisiones recientes que requirieran ajuste.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo nominal del hebreo con dos miembros de la lista separados por coma y punto y coma final.
  - Se usa minúscula en los gentilicios porque funcionan como descripciones étnico-geográficas, no como nombres propios.
  - La nota cultural evita que «carmelita» se lea anacrónicamente como la orden religiosa posterior.
