    issue: «No puede rescatar» queda poco natural sin complemento directo expreso.
    rationale: Aunque el hebreo puede dejar el objeto implícito, en español «rescatar» suele pedir complemento; «salvar» o «librar» funcionan mejor de manera absoluta en este contexto poético.
  - severity: low
    issue: «Para la liberación» es fiel, pero menos idiomático que «para la salvación» en esta sentencia proverbial.
    rationale: El campo semántico de תְּשׁוּעָה incluye salvación, liberación y victoria. En español bíblico general, «salvación» suena más natural aquí sin imponer una lectura doctrinal indebida, especialmente con nota alternativa preservando «victoria».
  revised_spanish_text: Un caballo es una falsa esperanza[a] para la salvación[b], y por su gran fuerza no puede salvar.
