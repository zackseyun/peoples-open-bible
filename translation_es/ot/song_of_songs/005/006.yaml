base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/005/006.yaml
  text: I opened to my beloved[a], but my beloved had turned away and gone. My soul went out when he spoke; I sought him, but I did not find him. I called him[b], but he did not answer me.
  footnotes:
  - marker: a
    text: Or, 'had slipped away and passed on.' The Hebrew uses two verbs to emphasize his departure.
    reason: lexical_alternative
  - marker: b
    text: Or, 'My soul failed at his speaking' / 'I was beside myself when he spoke.' The Hebrew idiom is vivid and difficult to reproduce fully in English.
    reason: lexical_alternative
