translation:
  language: es
  text: 'y dirás: «Así dice el Señor Yahvé: He aquí, estoy contra ti, Sidón, y seré glorificado[a] en medio de ti. Y sabrán que yo soy Yahvé, cuando ejecute juicios en ella y me mostraré santo[b] en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibiré gloria» o «seré honrado». El verbo hebreo puede enfatizar que Dios recibe honor o que muestra su gloria por medio del juicio.
    reason: lexical_alternative
  - marker: b
    text: O «seré santificado en ella» o «manifestaré mi santidad en ella». La expresión indica que la santidad de Yahvé queda públicamente vindicada mediante sus actos de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El título compuesto combina un apelativo de soberanía con el nombre divino. En español, «Señor Yahvé» conserva esa distinción sin sustituir el nombre por una máscara tipográfica, y evita la repetición poco natural de «Señor SEÑOR»."
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El proyecto pide usar «Yahvé» para el Tetragrámaton en el texto principal. Mantiene el nombre propio divino que el hebreo revela y evita la sustitución devocional por un título.
- source_word: הִנְנִי עָלַיִךְ
  english_pob_choice: Behold, I am against you
  chosen_spanish: He aquí, estoy contra ti
  alternatives_spanish:
  - Mira, estoy contra ti
  - He aquí que estoy contra ti
  lexicon: HALOT
  rationale: «He aquí» conserva la solemnidad profética de הִנְנִי, y «estoy contra ti» refleja con naturalidad el sentido hostil de עַל.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidón
  lexicon: HALOT
  rationale: Transliteración estándar en español para el nombre propio de la ciudad.
- source_word: וְנִכְבַּדְתִּי
  english_pob_choice: I will be glorified
  chosen_spanish: seré glorificado
  alternatives_spanish:
  - recibiré gloria
  - seré honrado
  lexicon: HALOT
  rationale: El nifal de כבד aquí expresa que Yahvé manifiesta o recibe gloria mediante el juicio. «Seré glorificado» conserva bien esa fuerza teológica en español y encaja con el registro bíblico.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu interior
  - en medio de vos
  lexicon: HALOT
  rationale: La frase locativa aplicada a una ciudad se expresa de forma natural como «en medio de ti», conservando la imagen espacial del hebreo.
- source_word: וְיָדְעוּ
  english_pob_choice: they will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: Verbo de conocimiento típico en Ezequiel; «sabrán» es claro y directo en español contemporáneo.
- source_word: בַּעֲשׂוֹתִי בָהּ שְׁפָטִים
  english_pob_choice: when I execute judgments in her
  chosen_spanish: cuando haga en ella juicios
  alternatives_spanish:
  - cuando ejecute juicios contra ella
  - cuando realice juicios en ella
  lexicon: HALOT
  rationale: El infinitivo con prefijo temporal se vierte naturalmente como «cuando». «Juicios» conserva el sustantivo plural del hebreo; «en ella» mantiene la preposición y la personificación de Sidón como ciudad.
- source_word: וְנִקְדַּשְׁתִּי בָהּ
  english_pob_choice: show myself holy in her
  chosen_spanish: sea santificado en ella
  alternatives_spanish:
  - muestre mi santidad en ella
  - me manifieste santo en ella
  lexicon: HALOT
  rationale: El nifal de קדש en este contexto expresa la vindicación pública de la santidad divina por medio del juicio. «Sea santificado» conserva la tensión lexical del hebreo que la POB inglesa también preserva con una nota alternativa.
theological_decisions:
- issue: La auto-glorificación y la santificación divina mediante juicio
  english_pob_reading: I will be glorified ... and show myself holy
  chosen_spanish_reading: seré glorificado ... y sea santificado
  alternative_spanish_readings:
  - recibiré gloria ... y me mostraré santo
  - seré honrado ... y manifestaré mi santidad
  rationale: El verso presenta el juicio contra Sidón como ocasión de vindicar públicamente la gloria y la santidad de Yahvé. La versión elegida preserva ambas fórmulas sin suavizarlas ni convertirlas en simple reconocimiento humano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó la formulación para mantener el nombre divino «Yahvé» según la directriz del proyecto, conservar la fuerza del binomio gloria/santidad del hebreo, y hacer natural en español la estructura profética sin depender de una calca del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conservó el tratamiento de Sidón como ciudad femenina singular («ti/ella») siguiendo el hebreo.
  - Se tradujo el lenguaje judicial con «juicios» para reflejar שְׁפָטִים sin reexplicarlo demasiado.
  - Se preservó la tensión teológica entre gloria y santidad en ambas cláusulas finales.
