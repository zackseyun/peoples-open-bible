translation:
  language: es
  text: '«Que vengan esos tiempos, en los cuales comenzarás a renovar la creación, ¿o acaso somos atormentados desde ahora?» Y me respondió y dijo: «Te mostraré esto también; pero tú, no te mezcles con ellos».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ueniant tempora illa
  english_pob_choice: let those times come
  chosen_spanish: Vengan esos tiempos
  alternatives_spanish:
  - Que vengan esos tiempos
  - Lleguen esos tiempos
  lexicon: veniant
  rationale: El subjuntivo exhortativo/jusivo en latín pide un valor de deseo o अनुमति, no una simple afirmación temporal. «Vengan» conserva ese matiz con español natural y solemne.
- source_word: incipies creaturam renouare
  english_pob_choice: in which you will begin to renew the creation
  chosen_spanish: en los cuales comenzarás a renovar la creación
  alternatives_spanish:
  - en los cuales empezarás a renovar la creación
  - cuando comenzarás a renovar la creación
  lexicon: incipies / creaturam renouare
  rationale: «Comenzarás a renovar» refleja el inicio del proceso sin intensificarlo más allá del latín. «La creación» mantiene el sustantivo colectivo de creaturam, como en la lectura inglesa auditada.
- source_word: aut amodo cruciamur
  english_pob_choice: or are we tormented from now on?
  chosen_spanish: ¿o acaso somos atormentados desde ahora?
  alternatives_spanish:
  - ¿o somos atormentados desde ahora?
  - ¿o estamos ya atormentados?
  lexicon: amodo / cruciamur
  rationale: «Desde ahora» reproduce amodo con claridad temporal. «Somos atormentados» conserva la pasiva sin desplazarla a un giro más libre como «estamos atormentados».
- source_word: Et respondit ad me et dixit
  english_pob_choice: And he answered me and said
  chosen_spanish: Y me respondió y dijo
  alternatives_spanish:
  - Y me respondió, diciendo
  - Y respondió y dijo
  lexicon: respondit / dixit
  rationale: Se conserva la doble fórmula narrativa del latín, que aporta solemnidad y continuidad discursiva.
- source_word: ostendam tibi et hoc
  english_pob_choice: I will show you this also
  chosen_spanish: Te mostraré esto también
  alternatives_spanish:
  - También te mostraré esto
  - Yo te mostraré también esto
  lexicon: ostendam tibi et hoc
  rationale: «Esto también» reproduce la adición enfática de et hoc. El orden español busca claridad sin perder el valor de ampliación.
- source_word: tu autem noli commisceri cum eis
  english_pob_choice: but as for you, do not mingle with them
  chosen_spanish: pero tú, no te mezcles con ellos
  alternatives_spanish:
  - pero tú, no te juntes con ellos
  - pero en cuanto a ti, no te mezcles con ellos
  lexicon: tu autem / commisceri
  rationale: «Pero tú» refleja el tu autem enfático. «No te mezcles con ellos» conserva el sentido de commisceri como asociación o complicidad, con español idiomático y no excesivamente literal.
theological_decisions:
- issue: Alcance de «creatura»
  english_pob_reading: creation
  chosen_spanish_reading: la creación
  alternative_spanish_readings:
  - la criatura
  - lo creado
  rationale: En este contexto apocalíptico, la palabra apunta al orden creado en conjunto, no a un ser individual. «La creación» es la opción más transparente en español.
  doctrine_reference: creación / escatología
- issue: Valor de «cruciamur»
  english_pob_reading: are we tormented
  chosen_spanish_reading: somos atormentados
  alternative_spanish_readings:
  - estamos atormentados
  - somos afligidos
  rationale: Se preserva la pasiva de sufrimiento sin suavizar el verbo. La forma española mantiene la seriedad del juicio/tormento implícito en el contexto.
  doctrine_reference: sufrimiento escatológico / juicio
- issue: Sentido de la exhortación final
  english_pob_reading: do not mingle with them
  chosen_spanish_reading: no te mezcles con ellos
  alternative_spanish_readings:
  - no te asocies con ellos
  - no tengas parte con ellos
  rationale: La advertencia es de separación respecto de un grupo implicado por el contexto textual. «No te mezcles» conserva esa cautela sin añadir contenido doctrinal no explicitado por el versículo.
  doctrine_reference: separación moral / admonición profética
translation_notes:
  revision_awareness: 'La revisión reciente corrigió el desajuste de límites del verso en la versión inglesa: el inicio debe cubrir ''ueniant tempora illa...'' y la clausura debe terminar en ''tu autem noli commisceri cum eis''. Esta redacción española sigue ese tramo exacto del latín, incluye el énfasis de ''tu autem'' y evita incorporar material del verso siguiente.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' y 'Yahvé' según el estándar del proyecto, aunque este versículo no los contiene.
  - Se usa 'crearación' no 'lo creado' para conservar la correspondencia con la lectura inglesa auditada y la forma nominal del latín.
  - Se prefiere 'mezcles' sobre alternativas más eclesiásticas ('converses', 'trates') para preservar el valor de commisceri sin sobreinterpretación.
