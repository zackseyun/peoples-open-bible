translation:
  language: es
  text: Porque la calamidad de parte de Dios era un terror para mí[a], y por causa de su majestad[b] no podía resistir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque la calamidad de Dios era un terror para mí». El hebreo puede traducirse de manera más formal como «de Dios», aunque el sentido probable es una calamidad que viene de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «por causa de su exaltación». El sustantivo puede enfatizar exaltación o majestad, y el verbo final también puede entenderse como «ser capaz» o «soportar/resistirlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la conducta anterior de Job; en español, «Porque» conserva con naturalidad el valor explicativo de la cláusula.
- source_word: פַחַד
  english_pob_choice: a terror
  chosen_spanish: un terror
  alternatives_spanish:
  - un temor
  - un pavor
  lexicon: HALOT
  rationale: El sustantivo expresa intensidad de miedo o pavor. «Un terror» conserva la fuerza nominal y el peso emotivo del hebreo, como en el inglés POB.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - sobre mí
  lexicon: HALOT
  rationale: Con «era un terror» en español, la relación más natural es «para mí», que comunica adecuadamente el impacto personal sin forzar la sintaxis.
- source_word: אֵיד
  english_pob_choice: calamity
  chosen_spanish: el desastre
  alternatives_spanish:
  - la calamidad
  - la ruina
  lexicon: HALOT
  rationale: El término denota desastre destructor o calamidad. «Desastre» es claro y digno en español; mantiene el sentido de juicio o ruina inminente.
- source_word: אֵל
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de El
  - del Poderoso
  lexicon: HALOT
  rationale: Se sigue la lectura contextual de calamidad proveniente de Dios, no solo «de gran magnitud». En español, «de Dios» es claro y evita oscurecer la relación causal.
- source_word: וּמִשְּׂאֵתוֹ
  english_pob_choice: because of his majesty
  chosen_spanish: por causa de su majestad
  alternatives_spanish:
  - por causa de su exaltación
  - ante su elevación
  lexicon: HALOT
  rationale: שְׂאֵת puede denotar elevación, exaltación o majestad. «Majestad» expresa bien la dignidad exaltada de Dios y preserva la tensión reverente del original.
- source_word: לֹא אוּכָל
  english_pob_choice: I could not endure
  chosen_spanish: no podía sostenerme
  alternatives_spanish:
  - no podía soportarlo
  - no podía resistir
  lexicon: HALOT
  rationale: יָכֹל expresa capacidad. Aquí la idea es incapacidad de mantenerse firme ante la grandeza divina; «no podía sostenerme» comunica esa insuficiencia sin reducirla solo a resistencia física.
theological_decisions:
- issue: Lectura de אֵיד אֵל
  english_pob_reading: calamity from God
  chosen_spanish_reading: el desastre de Dios
  alternative_spanish_readings:
  - el desastre que viene de Dios
  - la calamidad de Dios
  rationale: Se conserva la tensión del genitivo hebreo, que puede sonar formalmente «de Dios», aunque el sentido más probable es calamidad procedente de Él. La redacción española mantiene esa ambigüedad controlada y el peso teológico del juicio divino.
  doctrine_reference: Preservar la tensión lexical y teológica; no suavizar el juicio divino implícito en el texto
- issue: Sentido de la incapacidad final
  english_pob_reading: I could not endure / withstand
  chosen_spanish_reading: no podía sostenerme
  alternative_spanish_readings:
  - no podía resistir
  - no podía soportarlo
  rationale: El hebreo puede apuntar a incapacidad para permanecer firme ante la majestad divina, no solo a aguantar dolor. «No podía sostenerme» conserva esa idea de quedar sin firmeza ante Dios.
  doctrine_reference: Mantener la fuerza del verbo יכל en contexto de reverencia y temor
- issue: Relación entre temor y majestad divina
  english_pob_reading: Fear of divine calamity and majesty restrained him
  chosen_spanish_reading: Temor ante el desastre divino y la majestad de Dios lo detenía
  alternative_spanish_readings:
  - El miedo al castigo de Dios lo frenaba
  - La reverencia por Dios lo contenía
  rationale: 'La versión española refleja ambos polos que el inglés POB preserva: terror ante la calamidad divina y reverencia ante la majestad. Así no se reduce el pasaje a miedo egoísta ni se pierde su tono de sobrecogimiento reverente.'
  doctrine_reference: Preservar la tensión entre temor judicial y reverencia
translation_notes:
  revision_awareness: Se revisó la lectura previa del original hebreo y del inglés auditado; no se detectaron cambios sustantivos en la revisión más reciente, y se mantuvo la interpretación principal de calamidad procedente de Dios junto con la idea de majestad/exaltación divina.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל en sentido no nominal, conforme al criterio del proyecto y la lectura contextual.
  - Se mantiene «majestad» para שְׂאֵת, reservando «exaltación» como alternativa en nota.
  - «No podía sostenerme» busca reflejar la incapacidad del verbo hebreo sin perder la solemnidad del pasaje.
  - La puntuación y el orden responden a un español natural, pero conservan el paralelismo de las dos cláusulas del versículo.
