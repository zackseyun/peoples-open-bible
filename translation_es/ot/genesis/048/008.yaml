translation:
  language: es
  text: 'Cuando Israel vio a los hijos de José[a], dijo[b]: «¿Quiénes son estos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de José».'
    reason: lexical_alternative
  - marker: b
    text: El texto dice «Israel», el nombre de pacto de Jacob.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la escena y el habla siguiente; «Cuando ... vio» comunica bien la relación temporal en español sin perder la secuencia del relato.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El texto hebreo dice «Israel», no «Jacob». Se conserva el nombre de pacto del patriarca, como en la decisión inglesa.
- source_word: אֶת בְּנֵי יוֹסֵף
  english_pob_choice: Joseph's sons
  chosen_spanish: a los hijos de José
  alternatives_spanish:
  - a los hijos de José
  - a los hijos de José
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es «los hijos de José»; en español, la relación posesiva se expresa de forma más natural como «los hijos de José». El marcador de objeto directo no se traduce de manera independiente.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: Es la fórmula narrativa estándar para introducir discurso directo; en español, «dijo» basta para reflejarla con naturalidad.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quiénes?
  alternatives_spanish:
  - ¿Quiénes son?
  - ¿Quiénes son estos?
  lexicon: HALOT
  rationale: La pregunta hebrea sobre identidad se expresa en español con el interrogativo plural «¿Quiénes?», y el contexto completa la referencia. Se mantiene el valor de pregunta por identidad sin añadir más de lo que exige el hebreo.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos
  lexicon: HALOT
  rationale: El demostrativo plural concuerda con los varones presentes. En la pregunta española queda integrado como «estos».
theological_decisions:
- issue: Uso del nombre de pacto «Israel» en vez de «Jacob»
  english_pob_reading: The text says 'Israel,' the covenant name of Jacob.
  chosen_spanish_reading: Se conserva «Israel» en el texto principal, con nota explicativa sobre el nombre de pacto.
  alternative_spanish_readings:
  - Jacob
  - Israel (sin nota)
  rationale: 'La elección sigue el texto hebreo y la nota auditada de la POB inglesa: no se sustituye el nombre original por una forma interpretativa. La explicación preserva la identificación del patriarca sin borrar la carga teológica del nombre.'
  doctrine_reference: Génesis 35:10; uso narrativo del nombre de pacto
- issue: Referencia a los hijos de José como traducción del constructo hebreo
  english_pob_reading: Joseph's sons
  chosen_spanish_reading: los hijos de José
  alternative_spanish_readings:
  - los hijos de José
  - los hijos de José
  rationale: 'No hay tensión doctrinal, pero sí una decisión de fidelidad textual: el hebreo describe literalmente a los descendientes de José, y el español debe mantener esa relación sin sobreexplicarla.'
  doctrine_reference: Gramática hebrea del constructo
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo consonante/vocalizado provisto y el audit trail inglés: sin revisiones aplicadas, con acuerdo alto entre pasadas. La redacción española mantiene la secuencia narrativa, la referencia a Israel y la pregunta directa sin añadir información interpretativa.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino.
  - Se prefirió «hijos de José» por fidelidad al constructo hebreo y naturalidad en español.
  - La pregunta se mantuvo breve y directa, acorde con el hebreo.
  - Se usó comillas angulares para el discurso directo según convención tipográfica española.
