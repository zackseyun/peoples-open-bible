translation:
  language: es
  text: 'Y el temor[a] se apoderó de todos, y glorificaban a Dios, diciendo: «Un gran profeta ha surgido entre nosotros[b], y Dios ha visitado a su pueblo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos fueron sobrecogidos por temor», con la imagen de una reacción repentina e invasiva.
    reason: lexical_alternative
  - marker: b
    text: O «ha sido levantado entre nosotros», destacando la posible agencia divina en el pasivo de ἠγέρθη.
    reason: lexical_alternative
  - marker: c
    text: «Ha visitado» es lenguaje bíblico para la venida de Dios a su pueblo con atención y cuidado salvador.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλαβεν δὲ φόβος πάντας
  english_pob_choice: fear seized them all
  chosen_spanish: sobre todos cayó temor
  alternatives_spanish:
  - el temor se apoderó de todos
  - temor los invadió a todos
  - todos fueron sobrecogidos por temor
  lexicon: BDAG
  rationale: 'La construcción griega presenta φόβος como sujeto: «temor» actúa sobre «todos». En español, «cayó temor sobre todos» conserva la irrupción repentina y la fuerza afectiva sin volverla mecánica. Mantiene la tensión entre temor reverente y sobresalto, sin resolverla en «awe».'
- source_word: ἐδόξαζον τὸν θεόν
  english_pob_choice: they were glorifying God
  chosen_spanish: glorificaban a Dios
  alternatives_spanish:
  - glorificaban a Dios continuamente
  - alababan a Dios
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida. «Glorificaban» conserva ese aspecto mejor que un pretérito simple. Se mantiene «glorificar» para reflejar δοξάζω y no diluirlo en un término más genérico.
- source_word: Προφήτης μέγας
  english_pob_choice: A great prophet
  chosen_spanish: Un gran profeta
  alternatives_spanish:
  - Un poderoso profeta
  - Un profeta grande
  lexicon: BDAG
  rationale: La frase es una afirmación predicativa directa. «Gran profeta» es la forma natural en español y conserva el valor evaluativo de μέγας sin añadir matices no presentes en el texto.
- source_word: ἠγέρθη
  english_pob_choice: has arisen
  chosen_spanish: ha surgido
  alternatives_spanish:
  - ha sido levantado
  - ha sido suscitado
  - ha resucitado
  lexicon: BDAG
  rationale: En español, «ha surgido» comunica de modo natural la aparición de un profeta entre la gente. Se conserva la posibilidad de agencia divina en el fondo del pasivo, pero sin forzarla en el texto principal. «Ha sido levantado» o «ha sido suscitado» son más transparentes formalmente, pero menos idiomáticas.
- source_word: ἐν ἡμῖν
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestro medio
  lexicon: BDAG
  rationale: «Entre nosotros» es un equivalente natural de la relación comunitaria expresada por ἐν ἡμῖν. Evita un calco rígido y conserva la idea de presencia en el grupo.
- source_word: Ἐπεσκέψατο
  english_pob_choice: has visited
  chosen_spanish: ha visitado
  alternatives_spanish:
  - ha acudido a ayudar a
  - ha mirado con atención a
  - ha intervenido a favor de
  lexicon: BDAG
  rationale: Se preserva el lenguaje bíblico de «visitar» que, en Lucas, puede implicar atención y acción salvífica. «Ha visitado» evita explicitar en exceso la naturaleza de la visita y mantiene la resonancia teológica del término.
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo propio
  - al pueblo que le pertenece
  lexicon: BDAG
  rationale: «A su pueblo» reproduce de forma natural el objeto directo con sentido de pertenencia. Conserva el trasfondo de alianza sin sobreexplicarlo.
theological_decisions:
- issue: φόβος after a miracle
  english_pob_reading: fear
  chosen_spanish_reading: temor
  alternative_spanish_readings:
  - awe
  - asombro reverente
  rationale: Se conserva el término más fuerte y más cercano al griego φόβος. El contexto milagroso permite oír reverencia, pero el texto no la explicita; por eso no se resuelve la tensión en la traducción principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sense of ἠγέρθη in reference to a prophet
  english_pob_reading: has arisen
  chosen_spanish_reading: ha surgido
  alternative_spanish_readings:
  - ha sido levantado
  - ha sido suscitado
  rationale: La forma pasiva puede sugerir que Dios ha suscitado al profeta, pero también funciona como afirmación idiomática de aparición. La traducción principal mantiene la naturalidad del español y deja abierta la agencia divina implícita.
  doctrine_reference: Translation philosophy §1 and §3
- issue: Sense of Ἐπεσκέψατο in divine action
  english_pob_reading: has visited his people
  chosen_spanish_reading: ha visitado a su pueblo
  alternative_spanish_readings:
  - ha acudido a ayudar a su pueblo
  - ha intervenido a favor de su pueblo
  rationale: Se conserva el lenguaje bíblico de la visita divina sin convertirlo en una paráfrasis explicativa. El término mantiene la densidad salvífica propia de Lucas y de la tradición bíblica.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: El audit trail inglés mantiene φόβος como ‘fear’ en vez de ‘awe’, conserva la ambigüedad de ἠγέρθη entre ‘has arisen’ y ‘has been raised up’, y prefiere el lenguaje bíblico de ‘has visited’. La versión española sigue esas mismas decisiones de fondo, pero adapta la sintaxis para que el resultado sea natural y publicable en español, evitando un calco excesivamente literal. También se ajustó la cohesión del dicho final para reflejar las dos cláusulas coordinadas del griego en una sola cita fluida.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «a su pueblo» para τὸν λαὸν αὐτοῦ, con tono bíblico natural.
  - «Temor» se conserva como término principal para φόβος, evitando sustituirlo por asombro o reverencia.
  - «Ha visitado» preserva el matiz bíblico-teológico documentado en el inglés POB.
  - La puntuación con comillas españolas mantiene una sola cita continua, coherente con el griego y con la revisión inglesa.
