translation:
  language: es
  text: Bendigan al Señor[a], la lluvia y el rocío; cántenle alabanzas y exáltenlo en gran manera por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda lluvia y todo rocío». La frase griega πᾶς ὄμβρος καὶ δρόσος puede entenderse de manera distributiva («toda lluvia y todo rocío») o colectiva («la lluvia y el rocío»).
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: ¡Bendigan!
  alternatives_spanish:
  - ¡Alaben!
  - ¡Bendecid!
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a dirigirse bien del Señor. «Bendigan» conserva la fuerza litúrgica de «Bless» y el paralelismo del estribillo, más que el más general «alaben».
- source_word: πᾶς ὄμβρος καὶ δρόσος
  english_pob_choice: all rain and dew
  chosen_spanish: toda lluvia y rocío
  alternatives_spanish:
  - toda lluvia y todo rocío
  - cada lluvia y rocío
  lexicon: LSJ
  rationale: πᾶς con sustantivos singulares colectivos aquí funciona de modo colectivo o distributivo. En español, «toda lluvia y rocío» suena natural y conserva la amplitud colectiva del griego sin forzar un distributivo artificial.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: BDAG
  rationale: Se traduce κύριος como «Señor» según el valor directo del griego y el uso litúrgico de la fórmula, sin activar una convención tipográfica de nombre divino que el griego aquí no exige por sí mismo.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - canten himnos
  - alábenlo cantando
  lexicon: BDAG
  rationale: El verbo implica alabanza con matiz musical. «Cántenle alabanzas» comunica ese matiz de forma natural en español y evita el verbo «himnificar», poco idiomático.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo grandemente
  alternatives_spanish:
  - exáltenlo en gran manera
  - magnifíquenlo
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de exaltar. «Ensálcenlo grandemente» mantiene el tono elevado y repetitivo del himno sin perder la intensificación del griego.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión idiomática apunta a duración indefinida y continua. «Por los siglos» es formal y bíblico en español; conserva el registro litúrgico sin añadir una intensificación no presente explícitamente en este versículo.
theological_decisions:
- issue: κύριος como título divino en un himno litúrgico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto español usa «Yahvé» para יהוה cuando el hebreo subyacente lo exige, aquí el texto fuente inmediato es griego κύριον. Por eso se conserva «Señor», que reproduce fielmente el título griego y la formulación del himno.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: El inglés POB pasó de «every rain and dew» a «all rain and dew» para reflejar mejor el sentido colectivo de πᾶς. La versión española sigue esa revisión con «toda lluvia y rocío», que suena natural y mantiene la amplitud colectiva/distributiva del griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas porque el texto griego lee κύριον y no requiere el sustituto tipográfico del nombre divino.
  - Se prefirió una sintaxis imperativa plural plenamente natural en español («Bendigan... cántenle... ensálcenlo») para conservar el tono exhortativo del original.
  - «Por los siglos» mantiene el registro bíblico sin añadir una glosa explicativa dentro del texto principal.
