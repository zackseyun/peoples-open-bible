  yaml_path: translation/nt/john/016/030.yaml
  text: Now we know that you know all things and have no need that anyone should question you[a]. By this we believe that you came from God.
  footnotes:
  - marker: a
    text: Or 'for anyone to ask you.' The Greek verb can mean 'ask' or 'question'; 'question' is chosen here because the context concerns Jesus' knowledge and the disciples' unspoken thoughts.
    reason: lexical_alternative
translation:
  language: ko
  text: 이제 우리는 당신께서 모든 것을 아시고, 누가 당신께 물을 필요도 없으심을 압니다. 이로 인하여 우리는 당신께서 하나님께로부터 나오셨음을 믿습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「누가 당신께 묻기를」. 헬라어 동사는 「묻다·질문하다」이며, 본문에서는 예수의 지식 자체가 주제이므로 「질문하다」가 자연스럽다.
    reason: lexical_alternative
