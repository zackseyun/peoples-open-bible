translation:
  language: es
  text: Y [a]clamaron a Dios, y de su clamor surgió, como si de un pequeño manantial saliera, un gran río, agua abundante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gritaron»; el verbo griego puede expresar un clamor fuerte y urgente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron el clamor
  lexicon: BDAG / LSJ
  rationale: βοάω expresa un grito fuerte o una súplica urgente. En español, «clamaron» conserva ese valor de invocación intensa dirigida a Dios, con un registro digno y bíblico sin sonar mecánico.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  lexicon: BDAG
  rationale: Con verbos de llamado, πρός marca al destinatario. «A Dios» es la forma natural en español y mantiene la dirección orante del clamor.
- source_word: βοῆς
  english_pob_choice: cry
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - voz
  lexicon: BDAG
  rationale: El genitivo ἀπὸ τῆς βοῆς αὐτῶν pide un sustantivo que refleje tanto la acción como su intensidad. «Clamor» recoge bien el vínculo con «clamaron» y evita rebajar el tono a un simple «grito».
- source_word: ἐγένετο
  english_pob_choice: there came
  chosen_spanish: vino
  alternatives_spanish:
  - surgió
  - apareció
  lexicon: BDAG
  rationale: Aquí ἐγένετο introduce la aparición de algo. «Vino» en español conserva el movimiento de surgimiento y permite una frase fluida con la imagen del río.
- source_word: ὡσανεὶ
  english_pob_choice: as it were
  chosen_spanish: como
  alternatives_spanish:
  - como si
  - cual si
  lexicon: LSJ
  rationale: ὡσανεί señala comparación aproximada. «Como» conserva la imagen figurada sin forzar una literalidad indebida; la comparación queda explícita por el contexto.
- source_word: μικρᾶς πηγῆς
  english_pob_choice: a little spring
  chosen_spanish: un manantial pequeño
  alternatives_spanish:
  - una fuente pequeña
  - un pequeño manantial
  lexicon: LSJ
  rationale: πηγή puede ser «manantial» o «fuente». «Manantial pequeño» suena natural y mantiene la idea de un origen de agua, además de reflejar bien la oposición con el río grande.
- source_word: ποταμὸς μέγας
  english_pob_choice: a great river
  chosen_spanish: un gran río
  alternatives_spanish:
  - un río grande
  - un río poderoso
  lexicon: LSJ
  rationale: La frase enfatiza el contraste de escala. «Un gran río» preserva la sencillez y la fuerza de μέγας sin añadir matices no presentes en el griego.
- source_word: ὕδωρ πολύ
  english_pob_choice: abundant water
  chosen_spanish: mucha agua
  alternatives_spanish:
  - agua abundante
  - gran cantidad de agua
  lexicon: LSJ
  rationale: La apposición final intensifica la imagen de plenitud. «Mucha agua» es la correspondencia más directa y natural en español; «agua abundante» sería posible, pero algo más abstracta.
theological_decisions:
- issue: Naturaleza figurada de la segunda cláusula
  english_pob_reading: Retain the simile-like wording 'as it were' and do not collapse the image into a literal historical description.
  chosen_spanish_reading: Mantener la comparación implícita con «como» y no convertir la imagen en una afirmación lisa y llana de literalidad.
  alternative_spanish_readings:
  - «como si»
  - suprimir la comparación y traducir directamente
  rationale: El griego ὡσανεί marca aproximación/comparación. Conservar esa cautela evita sobrerinterpretar la escena y preserva la tensión imaginativa del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El borrador sigue el orden revisado del audit trail: primero el clamor a Dios, luego el surgimiento de la imagen del gran río desde el manantial pequeño, preservando la comparación de ὡσανεί y la apposición final ὕδωρ πολύ como intensificación de la abundancia.'
  spanish_consistency_notes:
  - Se usa «Dios» según la norma del proyecto para θεός.
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος.
  - Se mantiene un registro bíblico moderno con vocabulario comprensible y no arcaizante.
  - «Manantial» se eligió por claridad en español, sin perder la idea de πηγή como fuente de agua.
