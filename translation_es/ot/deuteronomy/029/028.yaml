revisions:
- from: Las cosas ocultas[a] pertenecen a Yahvé nuestro Dios, pero las cosas reveladas nos pertenecen a nosotros y a nuestros hijos[b] para siempre, para que cumplamos todas las palabras de esta ley.
  to: Las cosas ocultas[a] pertenecen a Yahvé nuestro Dios, pero las cosas reveladas nos pertenecen y a nuestros hijos para siempre, para que cumplamos todas las palabras de esta ley[b].
  rationale: Se corrige la ubicación de la nota [b] para que acompañe a «esta ley», como en el rastro inglés y según su contenido. También se elimina el pronombre enfático redundante «a nosotros» para mejorar la naturalidad del español sin alterar el sentido. No se requieren cambios doctrinales ni léxicos mayores.
