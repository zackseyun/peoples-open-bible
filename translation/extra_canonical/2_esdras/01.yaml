source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Liber Ezrae prophetae secundus, filii Sarei, filii Azarei, filii Helchiae, filii Salame, filii Sadoch, filii Acitob,

    2 Filii Achiae, filii Finees, filii Heli, filii Ameriae, filii Aziei, filii Marimoth, filii Arna, filii Oziae, filii Borith, filii Abissei, filii Finees, filii Eleazar,

    3 Filii Aaron ex tribu Leui, qui fuit captiuus in regione Medorum, in regno Artaxersis regis Persarum.

    4 Et factum est uerbum domini ad me dicens:

    5 Vade et nuntia populo meo facinora ipsorum et filiis eorum iniquitates, quas in me admiserunt, ut nuntient filiis filiorum suorum.

    6 Quia peccata parentum illorum in illis creuerunt: obliti enim me sacrificauerunt diis alienis.

    7 Nonne ego eos eduxi de terra Aegypti, de domo seruitutis? ipsi autem irritauerunt me et consilia mea spreuerunt.

    8 Tu autem excute comam capitis tui et proice omnia mala super illos, quoniam non obaudierunt legi meae; populus autem indisciplinatus.

    9 Vsquequo eos sustinebo, quibus tanta beneficia contuli?

    10 Reges multos propter eos subuerti, Pharaonem cum pueris suis et omnem exercitum eius percussi.

    11 Omnes gentes a facie eorum perdidi et in oriente prouinciarum duarum populum, Tyri et Sidonis, dissipaui et omnes aduersarios eorum interfeci.

    12 interfeci. Tu uero loquere ad eos dicens: haec dicit dominus:

    13 Nempe ego uos mare traieci et plateas uobis in inuia munitas

    14 exhibui; ducem uobis dedi Moysen et Aaron sacerdotem; Lucem uobis per columnam ignis praestiti et magna mirabilia feci in

    15 uobis. uos autem mei obliti estis, dicit dominus. Haec dicit dominus omnipotens: coturnix uobis in signo fuit, castra uobis

    16 ad tutelam dedi, et illic murmurastis, Et non triumphastis in nomine meo de perditione inimicorum uestrorum, sed adhuc

    17 nunc usque murmuratis. Vbi sunt beneficia quae praestiti uobis? nonne in deserto cum esuriretis et sitiretis proclamastis

    18 ad me dicentes: Vtquid nos in desertum istud adduxisti interficere nos? melius nobis fuerat seruire Aegyptiis quam mori in

    19 deserto hoc. Ego dolui gemitos uestros et dedi mannam uobis

    20 in escam, panem angelorum manducastis. Nonne cum sitiretis petram excidi, et fluxerunt aquae in satietate? propter aestus

    21 folia arborum uos texi. Diuisi uobis terras pingues, Chananeos et Ferezeos et Philistinos a facie uestra proieci. quid faciam

    22 uobis adhuc? dicit dominus. Haec dicit dominus omnipotens: in deserto cum essetis in flumine amaro sitientes et blasphemantes nomen meum,

    23 Non ignem uobis pro blasphemiis dedi, sed mittens lignum in aqua dulce feci flumen.

    24 Quid tibi faciam, Iacob ? noluisti me obaudire, Iuda. transferam me ad alias gentes et dabo eis nomen meum, ut custodiant legitima mea.

    25 Quoniam me dereliquistis, et ego uos derelinquam: petentibus uobis a me misericordiam, non miserebor uestri.

    26 Quando inuocabitis me, ego non exaudiam uos: maculastis enim manus uestras sanguine, et pedes uestri inpigri sunt ad committenda homicidia.

    27 Non quasi me dereliquistis, sed uos ipsos, dicit dominus.

    28 Haec dicit dominus omnipotens : nonne ego uos rogaui ut pater filios et ut mater filias et nutrix paruulos suos,

    29 Vt essetis mihi in populum, et ego uobis in deum, et uos mihi in filios, et ego uobis in patrem ? Ita uos

    30 collegi ut gallina pullos suos sub alas suas. modo autem quid faciam uobis ? proiciam uos a facie mea. Oblationes mihi cum

    31 obtulleritis, auertam faciem meam a uobis ; dies enim festos uestros et neomenias et circumcisiones carnis repudiavi. Ego

    32 misi pueros meos prophetas ad uos, quos acceptos interfecistis et laniastis corpora illorum : quorum sanguinem exquiram, dicit dominus. Haec dicit dominus omnipotens : domus uestra de-

    33 serta est, proiciam uos sicut uentus stipulam. Et filii pro-

    34 creationem non facient, quoniam mandatum meum uobiscum neglexerunt et quod malum est coram me fecerunt. Tradam

    35 domus uestras populo uenienti, qui me non audientes credunt ; quibus signa non ostendi, facient quae praecepi. Prophetas

    36 non uiderunt et memorabuntur antiquitatu[m] eorum. Testor

    37 populi uenientis gratiam, cuius paruuli exultant cum laetitia, me non uidentes oculis carnalibus, sed spiritu credent quae dixi. Et nunc, pater, aspice cum gloria et uide populum uenientem

    38 ab oriente, Quibus dabo ducattum Abraham, Isaac et Iacob et

    39 Osee et Amos et Micheae et Iohelis et Abdiae et Ionae Et

    40 Naum et Abacuc, Sophoniae, Aggei, Zachariae et Malachiae, qui et angelus domini uocatus est.'
  language: Latin
  chapter: 1
  verse_count: 40
  witness_situation: Latin is the only extant witness for this chapter (Christian addition, Latin only). No Syriac/Ethiopic/Arabic/Armenian/Georgian apparatus applies.
  note: Verse-numbered cleaned Latin loaded from sources/2esdras/latin/transcribed/. Chapter 7 includes 7:36-105 restored from Bensly 1875.
translation:
  text: '1 The second book of Ezra the prophet[a], son of Seraiah, son of Azariah, son of Hilkiah, son of Shallum, son of Zadok, son of Ahitub,

    2 son of Ahijah, son of Phinehas, son of Eli, son of Amariah, son of Aziah, son of Meraioth, son of Arna, son of Uzzi, son of Borith, son of Abishai, son of Phinehas, son of Eleazar,

    3 son of Aaron, of the tribe of Levi, who was taken captive in the region of the Medes, in the reign of Artaxerxes king of the Persians.

    4 And the word of the Lord came to me, saying,

    5 “Go and declare to my people their evil deeds, and to their children the iniquities that they have committed against me, so that they may tell their children''s children.

    6 For the sins of their fathers have increased in them; for they forgot me and sacrificed to foreign gods.

    7 Was it not I who brought them out of the land of Egypt, out of the house of slavery? But they provoked me and despised my counsels.

    8 But you, shake out the hair of your head and cast all evils upon them, because they have not obeyed my law; they are a rebellious people.

    9 How long shall I endure them, to whom I have given such great benefits?

    10 For their sake I overthrew many kings; I struck Pharaoh with his servants and all his army[b].

    11 I destroyed all the nations before them, and in the east I scattered the people of the two provinces, Tyre and Sidon, and killed all their enemies.

    12 Therefore speak to them and say,

    13 ‘Thus says the Lord: I brought you through the sea, and in the trackless places I made firm roads for you.

    14 I gave you Moses as a leader and Aaron as a priest. I gave you light by a pillar of fire, and I did great wonders among you.

    15 But you have forgotten me, says the Lord. Thus says the Lord Almighty: Quail were a sign for you; I gave you camps for protection,

    16 and there you grumbled. You did not triumph in my name over the destruction of your enemies, but even to this day you still grumble.

    17 Where are the benefits that I gave you? Did you not cry out to me in the wilderness when you were hungry and thirsty,

    18 saying, “Why have you brought us into this wilderness, to kill us? It would have been better for us to serve the Egyptians than to die in this wilderness.”

    19 Then I had pity on your groanings and gave you manna for food; you ate the bread of angels.

    20 And when you were thirsty, did I not split the rock, and waters flowed in abundance? Because of the heat I covered you with the leaves of trees.

    21 I divided fertile lands for you; I drove out the Canaanites and Perizzites and Philistines from before you. What more shall I do for you? says the Lord.

    22 Thus says the Lord Almighty: When you were thirsty in the wilderness at the bitter stream, and blasphemed my name,

    23 I did not give you fire for your blasphemies, but cast wood into the water and made the stream sweet.

    24 What shall I do with you, Jacob? You would not obey me, Judah. I will turn to other nations, and I will give them my name, that they may keep my statutes.

    25 Because you have forsaken me, I also will forsake you. When you ask me for mercy, I will not have mercy on you.

    26 When you call upon me, I will not hear you, for you have defiled your hands with blood, and your feet are swift to commit murder.

    27 It is not as though you had forsaken me, but yourselves, says the Lord.

    28 Thus says the Lord Almighty: Have I not asked you, as a father asks his sons, and as a mother her daughters, and a nurse her little children,

    29 that you should be my people, and I should be your God, and that you should be my children, and I should be your father?

    30 I gathered you as a hen gathers her chicks under her wings. But now what shall I do with you? I will cast you out from before my face.

    31 When you bring offerings to me, I will turn my face from you; for I have rejected your feast days and new moons and circumcisions of the flesh.

    32 I sent my servants the prophets to you, and you seized them and killed them and tore their bodies apart; their blood I will require, says the Lord.

    33 Thus says the Lord Almighty: Your house is desolate. I will cast you out like stubble before the wind.

    34 And your sons will not beget offspring, because they neglected my commandment with you and did what is evil before me.

    35 I will give your houses to a people that is coming, who, though they have not heard me, will believe; to whom I have shown no signs, yet they will do what I have commanded.

    36 They have not seen prophets, yet they will remember their former times.

    37 I call to witness the favor of the people that is coming, whose little ones rejoice with gladness; though they have not seen me with bodily eyes, in spirit they will believe what I have said.

    38 And now, Father, look with glory and see the people coming from the east,

    39 to whom I will give as leaders Abraham, Isaac, and Jacob, Hosea and Amos and Micah and Joel and Obadiah and Jonah,

    40 and Nahum and Habakkuk, Zephaniah, Haggai, Zechariah, and Malachi[c][d], who is also called the messenger of the Lord.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Latin says, 'I divided fertile lands for you,' a compressed expression that may refer to apportioning the land among Israel's tribes.
    reason: lexical_alternative
    anchor_ref: '1:21'
  - marker: b
    text: This chapter belongs to the later Christian layer often called 5 Ezra. Its rejection of 'feast days ... new moons and circumcisions of the flesh' reflects that layer's polemical voice and should not be conflated with the theology of the Jewish apocalypse in chapters 3-14.
    reason: compositional_layer
    anchor_ref: '1:31'
  - marker: d
    text: 'The Latin text here is uncertain: ''they will remember their former times'' could also be understood as remembering ''the men/things of old.'''
    reason: textual_variant
    anchor_ref: '1:36'
  - marker: c
    text: '''Malachi'' is here explained by its lexical sense, ''messenger of the Lord.'' The phrase need not identify the prophet with the distinct figure often called ''the angel of the Lord.'''
    reason: lexical_alternative
    anchor_ref: '1:40'
lexical_decisions:
- source_word: facinora
  chosen: evil deeds
  alternatives:
  - crimes
  - outrages
  - wicked acts
  lexicon: Lewis & Short
  rationale: Carries a strong moral charge stronger than a neutral 'deeds'; 'evil deeds' preserves prophetic accusation without becoming overly technical or juridical.
- source_word: iniquitates
  chosen: iniquities
  alternatives:
  - lawless acts
  - wickednesses
  - sins
  lexicon: Lewis & Short
  rationale: Traditional but still intelligible; keeps the formal prophetic register and distinguishes the term from peccata in v. 6.
- source_word: domo seruitutis
  chosen: house of slavery
  alternatives:
  - house of bondage
  - slave house
  lexicon: Lewis & Short
  rationale: Echoes biblical exodus diction while preserving the bonded sense of servitus more clearly than 'servitude'.
- source_word: excute comam capitis tui
  chosen: shake out the hair of your head
  alternatives:
  - tear out the hair of your head
  - shake your head bare
  lexicon: Lewis & Short
  rationale: The Latin points to a symbolic gesture involving the hair; 'shake out' stays close to excutere without overcommitting to self-mutilation.
- source_word: indisciplinatus
  chosen: rebellious
  alternatives:
  - undisciplined
  - unruly
  lexicon: Lewis & Short
  rationale: In prophetic context the issue is not mere lack of training but refusal of covenant order; 'rebellious' conveys that force better in English.
- source_word: plateas ... in inuia munitas
  chosen: in the trackless places I made firm roads for you
  alternatives:
  - I gave you streets secured in pathless places
  - I prepared highways for you in the wilderness
  lexicon: Lewis & Short
  rationale: The Latin is awkward and likely compressed; this rendering preserves the image of protected passage through impassable terrain without paraphrasing beyond the sense.
- source_word: coturnix ... in signo
  chosen: Quail were a sign for you
  alternatives:
  - I gave you quail as a sign
  - quail served you as a token
  lexicon: Lewis & Short
  rationale: Keeps the nominative construction and the exodus allusion while remaining readable.
- source_word: dolui gemitos uestros
  chosen: I had pity on your groanings
  alternatives:
  - I grieved over your groanings
  - I felt sorrow for your groans
  lexicon: Lewis & Short
  rationale: dolere here is compassionate response, not merely internal sadness; 'had pity' fits the divine action that follows.
- source_word: panem angelorum
  chosen: the bread of angels
  alternatives:
  - angelic bread
  - bread from angels
  lexicon: Lewis & Short
  rationale: A familiar biblical phrase that preserves the elevated register and intertextual resonance.
- source_word: fluxerunt aquae in satietate
  chosen: waters flowed in abundance
  alternatives:
  - waters flowed to satisfaction
  - waters poured out fully
  lexicon: Lewis & Short
  rationale: Captures the sense of plentiful supply implied by in satietate in idiomatic English.
- source_word: transferam me ad alias gentes
  chosen: I will turn to other nations
  alternatives:
  - I will transfer myself to other nations
  - I will go over to other peoples
  lexicon: Lewis & Short
  rationale: The phrase is rhetorically forceful and anticipates the Gentile-turn motif of 5 Ezra; 'turn to' is natural English while preserving the movement of divine favor.
- source_word: maculastis manus uestras sanguine
  chosen: you have defiled your hands with blood
  alternatives:
  - stained your hands with blood
  - polluted your hands with blood
  lexicon: Lewis & Short
  rationale: '''Defiled'' preserves cultic and moral contamination, fitting the chapter''s rejection of offerings and festivals.'
- source_word: inpigri sunt ad committenda homicidia
  chosen: are swift to commit murder
  alternatives:
  - are eager to commit murders
  - are not sluggish in committing homicide
  lexicon: Lewis & Short
  rationale: The idiom means energetic readiness; 'swift' gives a biblical cadence and clear sense.
- source_word: non quasi me dereliquistis, sed uos ipsos
  chosen: It is not as though you had forsaken me, but yourselves
  alternatives:
  - You did not forsake me so much as yourselves
  - It is not me you have forsaken, but yourselves
  lexicon: Lewis & Short
  rationale: 'Preserves the rhetorical paradox: their apostasy is self-destruction.'
- source_word: nutrix paruulos suos
  chosen: a nurse her little children
  alternatives:
  - a nursing mother her infants
  - a wet nurse her little ones
  lexicon: Lewis & Short
  rationale: nutrix is more specifically a nurse than simply 'mother'; the image broadens the parental metaphors already present.
- source_word: circumcisiones carnis
  chosen: circumcisions of the flesh
  alternatives:
  - fleshly circumcisions
  - your circumcision in the flesh
  lexicon: Lewis & Short
  rationale: The plural is striking in Latin and likely polemical; preserving it keeps the Christian-addition rhetoric visible rather than smoothing it into standard biblical phrasing.
- source_word: laniastis corpora illorum
  chosen: tore their bodies apart
  alternatives:
  - mangled their bodies
  - rent their bodies
  lexicon: Lewis & Short
  rationale: Retains the violence of laniare and avoids euphemism.
- source_word: stipulam
  chosen: stubble
  alternatives:
  - chaff
  - straw
  lexicon: Lewis & Short
  rationale: Stubble best matches the image of light agricultural refuse driven by wind.
- source_word: qui me non audientes credunt
  chosen: who, though they have not heard me, will believe
  alternatives:
  - who without hearing me believe
  - who do not hear me yet believe
  lexicon: Lewis & Short
  rationale: The participial construction is compressed; this rendering preserves the contrast between lack of direct hearing and responsive faith.
- source_word: memorabuntur antiquitatu[m] eorum
  chosen: they will remember their former times
  alternatives:
  - they will remember their antiquities
  - they will call to mind the men of old
  lexicon: Lewis & Short
  rationale: The Latin is textually uncertain, but the sense points to remembrance of what came before; 'former times' is broad enough to reflect the crux.
- source_word: oculis carnalibus
  chosen: with bodily eyes
  alternatives:
  - with fleshly eyes
  - with carnal eyes
  lexicon: Lewis & Short
  rationale: Avoids misleading moral overtones of 'carnal' in modern English while preserving the contrast with spiritual belief.
- source_word: ducattum
  chosen: as leaders
  alternatives:
  - for leadership
  - as guides
  lexicon: Lewis & Short
  rationale: The noun denotes leadership or guidance; 'as leaders' fits the syntax of persons being given to the coming people.
- source_word: angelus domini
  chosen: the messenger of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: Lewis & Short
  rationale: Because the line explains the meaning of Malachi's name/title, 'messenger' better reflects the lexical sense and avoids importing a specific angelophany reading.
theological_decisions:
- issue: 5 Ezra's supersessionist turn in vv. 24-25, 35-38
  chosen_reading: Render the oracle plainly as God turning to 'other nations' / 'a people that is coming' without softening the transfer of favor.
  alternative_readings:
  - Soften to a generic warning of judgment without Gentile replacement emphasis
  - Interpret 'other nations' as dispersed Israel only
  rationale: The Latin of this compositional layer is explicit and should remain visible for audit, especially because 5 Ezra is distinct in voice and theology from the Jewish apocalypse in chapters 3-14.
  doctrine_reference: Preserve theological tension rather than resolve it; do not blend 5 Ezra and 4 Ezra voices.
- issue: v. 29 covenant formula wording
  chosen_reading: Translate 'ut sitis mihi in populum, et ego uobis in deum' as 'that you should be my people, and I should be your God.'
  alternative_readings:
  - that you might be sons to me and I a father to you only
  - that you should be my children and I your father
  rationale: The Latin text in this verse moves through several familial and covenantal images; preserving the people/God formula before the children/father formula keeps the layered rhetoric intact.
- issue: v. 31 rejection of Jewish observances
  chosen_reading: Retain the sharp phrase 'I have rejected your feast days and new moons and circumcisions of the flesh.'
  alternative_readings:
  - I reject your festivals, new moons, and circumcision
  - I reject your ritual observances
  rationale: This is a hallmark of the Christian-addition rhetoric of 5 Ezra. The translation should not mute its polemical edge, though readers should be able to see it as compositional-layer specific rather than the voice of chapters 3-14.
  doctrine_reference: Do not blend 5 Ezra and 4 Ezra voices.
- issue: v. 40 Malachi title
  chosen_reading: Translate 'qui et angelus domini uocatus est' as 'who is also called the messenger of the Lord.'
  alternative_readings:
  - who is also called the angel of the Lord
  rationale: The phrase most naturally glosses the name Malachi ('my messenger') rather than identifying the prophet with the Angel of the Lord as a distinct figure.
reader_facing:
  chapter: 1
  compositional_layer: 5 Ezra
  is_first_chapter_of_book: true
  book_headnote: '**2 Esdras (Appendix)**. Also called 4 Ezra or the Ezra Apocalypse. Not canonical in modern Catholic, Orthodox, or Protestant Bibles. Canonical in the Ethiopian Orthodox tradition. Preserved in the appendix of the Latin Vulgate. Included in the Apocrypha of the 1611 King James Bible. The book is a composite: chs 3-14 are a Jewish apocalypse from c. 100 AD (Semitic original lost, surviving via Latin/Syriac/Ethiopic/Arabic/Armenian/Georgian), while chs 1-2 and 15-16 are later Christian additions preserved only in Latin. This translation is based on Bensly''s 1895 critical Latin edition (Cambridge Texts and Studies III.2), with the Bensly 1875 recovered fragment restoring 7:36-105.'
  section_header: Christian addition preserved only in Latin, c. 2nd-3rd century AD. Distinct in origin from the Jewish apocalypse of chs 3-14. Recasts Ezra as a prophet rejected by Israel with God turning to the Gentiles. No daughter-language witnesses -- Latin is the only witness.
  special_footnotes: []
