revisions:
- from: En el tabernáculo de reunión[a], fuera del velo[b] que está sobre el testimonio[c], Aarón y sus hijos lo dispondrán delante de Yahvé desde la tarde hasta la mañana. Será estatuto perpetuo por todas sus generaciones, de parte de los hijos de Israel.
  to: En el tabernáculo de reunión[a], fuera del velo[b] que está delante del testimonio[c], Aarón y sus hijos lo dispondrán delante de Yahvé desde la tarde hasta la mañana. Será estatuto perpetuo por todas sus generaciones, de los israelitas.
  rationale: Se corrige la frase espacial para seguir la resolución documentada de la POB y evitar una lectura topográfica equivocada en español. También se sustituye 'de parte de los hijos de Israel' por 'de los israelitas' para reflejar mejor la procedencia marcada por מֵאֵת y mejorar la naturalidad. Se conservan 'tabernáculo de reunión', 'velo', 'Yahvé' y 'estatuto perpetuo' porque son fieles y legibles en el registro objetivo del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura general del versículo, mantiene Yahvé para יְהוָה y refleja bien la fórmula cultual y legal en la mayor parte del texto. Sin embargo, no preserva fielmente una decisión clave del expediente POB: אֲשֶׁר עַל הָעֵדֻת fue resuelto en inglés como ''that is before the testimony'', no ''sobre el testimonio''. Además, ''de parte de los hijos de Israel'' para מֵאֵת בְּנֵי יִשְׂרָאֵל suena menos exacto aquí que una formulación de procedencia como ''de los israelitas'' o ''procedente de los hijos de Israel''.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico. 'Tabernáculo de reunión' es aceptable aunque más interpretativo/técnico que la alternativa más literal 'tienda de reunión'. Los principales problemas de legibilidad/fidelidad son 'que está sobre el testimonio', que en español induce una imagen espacial incorrecta, y 'de parte de los hijos de Israel', que suena más a representación que a origen/fuente.
  glossary_alignment: Buena alineación con la terminología del proyecto en 'Yahvé', 'velo', 'estatuto perpetuo' y el registro cultual. No hay conflicto doctrinal serio. Sí conviene alinear la frase espacial con la decisión auditada de la POB ('delante del testimonio') y expresar מֵאֵת con una preposición de origen más natural en español ('de los israelitas').
  issues:
  - severity: high
    issue: La frase 'que está sobre el testimonio' no sigue la decisión POB auditada ni el sentido espacial contextual.
    rationale: Aunque עַל puede significar 'sobre', el expediente inglés decidió 'before the testimony' por el contexto del tabernáculo. En español, 'sobre el testimonio' suena físicamente erróneo para la posición del velo.
  - severity: medium
    issue: '''De parte de los hijos de Israel'' no expresa tan bien la procedencia/origen de מֵאֵת.'
    rationale: La cláusula final apunta a fuente/origen de la obligación o provisión. 'De parte de' sugiere representación. 'De los israelitas' o 'procedente de los hijos de Israel' es más fiel y natural.
  - severity: low
    issue: '''Tabernáculo de reunión'' es más interpretativo que ''tienda de reunión''.'
    rationale: No es incorrecto, pero אֹהֶל es literalmente 'tienda'. Puede mantenerse por uso eclesial si se desea; no requiere adjudicación.
  revised_spanish_text: En el tabernáculo de reunión[a], fuera del velo[b] que está delante del testimonio[c], Aarón y sus hijos lo dispondrán delante de Yahvé desde la tarde hasta la mañana. Será estatuto perpetuo por todas sus generaciones, de los israelitas.
  revised_footnotes:
  - marker: a
    text: 'O: «tienda de reunión». La expresión hebrea designa el lugar cultual de encuentro y no una reunión cualquiera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cortina». פָּרֹכֶת es el divisor interior del santuario; «velo» conserva el sentido cultual tradicional.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo lit. «sobre el testimonio». En este contexto, «el testimonio» probablemente alude a las tablas del pacto guardadas en el arca; por eso la frase describe la posición del velo delante del arca.
    reason: cultural_note
  revision_rationale: Se corrige la frase espacial para seguir la resolución documentada de la POB y evitar una lectura topográfica equivocada en español. También se sustituye 'de parte de los hijos de Israel' por 'de los israelitas' para reflejar mejor la procedencia marcada por מֵאֵת y mejorar la naturalidad. Se conservan 'tabernáculo de reunión', 'velo', 'Yahvé' y 'estatuto perpetuo' porque son fieles y legibles en el registro objetivo del proyecto.
