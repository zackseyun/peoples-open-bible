revisions:
- from: Y las naciones sabrán que la casa de Israel fue llevada al exilio[a] por su iniquidad, porque actuaron con infidelidad contra mí; por eso oculté mi rostro de ellos y los entregué en mano de sus adversarios[b], y todos cayeron a espada.
  to: Y las naciones sabrán que la casa de Israel fue al exilio[a] por su iniquidad, porque actuaron con infidelidad contra mí; por eso escondí mi rostro de ellos y los entregué en manos de sus adversarios[b], y todos cayeron a espada.
  rationale: Se ajusta גָּלוּ a una formulación menos pasiva y más cercana a la decisión auditada (‘fue al exilio’), se mejora la naturalidad de la expresión idiomática divina con ‘escondí mi rostro de ellos’, y se normaliza el hebraísmo en español con ‘en manos de sus adversarios’ mientras la nota conserva el singular literal.
  reviewer_model: gpt-5.4
