translation:
  text: Even God will not delay[a], and like a warrior he will go out and not hold back, until he crushes the loins of the cruel, and repays vengeance to the nations; until he dispossesses the scepter of arrogance, and the staff of the wicked he will cut down completely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek witness supplied for this verse reads instead: ''lifting up the soul and enlightening the eyes, giving healing, life, and blessing.'' This reflects a substantially different textual tradition from the extant Hebrew.'
    reason: textual_variant
lexical_decisions:
- source_word: לא יתמהמה
  chosen: will not delay
  alternatives:
  - will not tarry
  - will not linger
  lexicon: HALOT
  rationale: The hitpael/imperfect of מהמה conveys delaying or lingering. 'Will not delay' is clear modern English and preserves the sense of divine action not being postponed.
- source_word: כגבור יצא
  chosen: like a warrior he will go out
  alternatives:
  - like a mighty man he will come forth
  - like a hero he will go forth
  lexicon: HALOT
  rationale: גבור commonly denotes a warrior or mighty man in martial contexts. Because the surrounding imagery is judgment and crushing, 'warrior' best captures the military force of the simile.
- source_word: לא יתאפק
  chosen: not hold back
  alternatives:
  - not restrain himself
  - not hold himself in
  lexicon: HALOT
  rationale: The verb conveys self-restraint or holding oneself back. 'Not hold back' is idiomatic and fits the momentum of the verse.
- source_word: ימחץ
  chosen: crushes
  alternatives:
  - smashes
  - strikes down
  lexicon: HALOT
  rationale: מחץ is a strong verb for crushing or smashing. 'Crushes' preserves the physical violence of the judgment image without over-paraphrase.
- source_word: מתני אכזרי
  lemma: מתנים
  chosen: the loins of the cruel
  alternatives:
  - the hips of the ruthless
  - the strength of the cruel one
  lexicon: HALOT
  rationale: מתנים literally means loins/hips and can imply strength. I retained the concrete image 'loins' because the Hebrew is vivid and martial; 'the cruel' renders the singular adjective generically.
- source_word: לגוים ישיב נקם
  chosen: repays vengeance to the nations
  alternatives:
  - returns vengeance on the nations
  - brings vengeance back upon the nations
  lexicon: HALOT
  rationale: ישיב נקם is literally 'return/repay vengeance.' 'Repays vengeance to the nations' keeps the retributive sense, though English is slightly idiomatic. The preposition ל is represented by 'to,' while the context makes the nations the objects of judgment.
- source_word: יוריש
  chosen: dispossesses
  alternatives:
  - drives out
  - takes away
  lexicon: HALOT
  rationale: ירש in the hiphil often means cause to lose possession, dispossess. Here it suits the image of removing illegitimate rule.
- source_word: שבט זדון
  chosen: the scepter of arrogance
  alternatives:
  - the rod of insolence
  - the staff of pride
  lexicon: HALOT
  rationale: שבט can mean rod, staff, or scepter. In parallel with מטה and in a context of oppressive rule, 'scepter' best conveys ruling power; זדון is arrogance/insolence rather than mere abstract pride.
- source_word: מטה רשע
  chosen: the staff of the wicked
  alternatives:
  - the rod of wickedness
  - the scepter of evil
  lexicon: HALOT
  rationale: מטה overlaps semantically with שבט. I chose 'staff' to preserve the parallel while avoiding exact repetition in English. רשע is rendered substantivally as 'the wicked' in line with Hebrew usage.
- source_word: גדוע יגדע
  chosen: he will cut down completely
  alternatives:
  - he will surely cut off
  - he will utterly hew down
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Cut down completely' expresses the emphatic force in natural English.
- source_word: גם אל
  chosen: Even God
  alternatives:
  - God also
  - Indeed God
  lexicon: HALOT
  rationale: גם adds emphasis. 'Even God' preserves the emphatic turn, though the exact discourse nuance is somewhat context-dependent.
