revisions:
- from: Porque ciertamente no levantarán un rey para una tierra[a], ni ciertamente darán lluvia a los hombres[b],
  to: Porque ciertamente no levantarán un rey para un país[a], ni de ningún modo darán lluvia a los hombres[b],
  rationale: Se ajusta χώρας a 'país' por mayor naturalidad contextual con 'rey', manteniendo en nota las alternativas 'tierra' y 'región'. Se fortalece la segunda cláusula con 'de ningún modo' para representar claramente la negación enfática οὐ μή sin producir una construcción española torpe. Se conserva 'a los hombres' con nota, ya que el borrador documenta correctamente la correspondencia formal con ἀνθρώποις.
