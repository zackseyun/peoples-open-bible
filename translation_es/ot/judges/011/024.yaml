review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura retórica del hebreo, mantiene «Yahvé» para יְהוָה y refleja correctamente el contraste entre Quemós y el Dios de Israel. Sin embargo, «ha desposeído de delante de nosotros» aplica el verbo de manera poco natural en español porque en esta construcción el objeto es territorio o pueblo expulsado, no normalmente «todo lo que». Conviene reformular para expresar mejor el sentido causativo-conquistador de הוֹרִישׁ sin perder la relación con la posesión resultante.
  spanish_quality_summary: La frase inicial es comprensible, aunque «te hace poseer» suena algo literal; aun así es aceptable. El principal problema de legibilidad está en «Y todo lo que Yahvé nuestro Dios ha desposeído de delante de nosotros», que suena forzado y ambiguo en español. Una reformulación con «ha quitado de delante de nosotros» y nota léxica preserva el sentido y mejora la naturalidad. También falta la segunda nota de alternativa que el rastro inglés conserva sobre la primera cláusula.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «Dios» y el tratamiento no editorializado de «Quemós tu dios». El uso de «poseer» para ירשׁ es defendible. No hay conflicto doctrinal relevante. Se recomienda añadir una nota separada para la primera ocurrencia causativa de ירשׁ y ajustar la segunda cláusula para no forzar «desposeer» en español.
  issues:
  - severity: medium
    issue: La expresión «ha desposeído de delante de nosotros» es poco idiomática y semánticamente tensa en español.
    rationale: El hebreo הוֹרִישׁ מִפָּנֵינוּ expresa quitar/desalojar de delante de Israel a ocupantes previos. En español, «desposeer» suele requerir un objeto poseedor explícito y aquí con «todo lo que» suena extraño. «Ha quitado de delante de nosotros» o «ha expulsado de delante de nosotros» comunica mejor la acción.
  - severity: medium
    issue: Falta una nota léxica para la primera cláusula correspondiente a la nota inglesa b.
    rationale: El expediente inglés preserva una alternativa significativa para «what Chemosh your god causes you to possess». La revisión española debe conservar esa información, especialmente porque la forma «te hace poseer» puede resultar opaca sin aclaración.
  - severity: low
    issue: La única nota actual está anclada solo al final y no distingue entre las dos decisiones léxicas diferentes sobre ירשׁ.
    rationale: Dado que el verso usa el mismo verbo con matices distintos en las dos cláusulas, es mejor separar las notas para evitar confusión y reflejar mejor la auditoría inglesa.
  revised_spanish_text: ¿No poseerás lo que Quemós tu dios te hace poseer[a]? Y todo lo que Yahvé nuestro Dios ha quitado de delante de nosotros[b], eso poseeremos[c].
  revised_footnotes:
