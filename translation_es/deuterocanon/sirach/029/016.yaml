translation:
  language: es
  text: Un pecador arruinará los bienes de un fiador.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echará a perder las cosas buenas de un fiador». El griego ἀγαθὰ puede referirse ampliamente a bienes, beneficios o posesiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὰ
  english_pob_choice: the good things
  chosen_spanish: los bienes
  alternatives_spanish:
  - las cosas buenas
  - los beneficios
  - las posesiones
  lexicon: LSJ
  rationale: En este contexto jurídico-económico, ἀγαθὰ puede abarcar bienes, posesiones o ventajas concretas. «Los bienes» conserva esa amplitud en español y evita reducir prematuramente el sentido a una abstracción moral.
- source_word: ἐγγύου
  english_pob_choice: of a guarantor
  chosen_spanish: de un fiador
  alternatives_spanish:
  - de un garante
  - de uno que da fianza
  - de un responsable por otro
  lexicon: LSJ
  rationale: ἐγγύος designa a quien responde por otro en garantía. «Fiador» es el equivalente natural y claro en español jurídico, manteniendo la relación de garantía sin perder la fuerza concreta del término.
- source_word: ἀνατρέψει
  english_pob_choice: will overturn
  chosen_spanish: trastornará
  alternatives_spanish:
  - derruirá
  - destruirá
  - arruinará
  lexicon: LSJ
  rationale: El verbo griego tiene la idea básica de voltear, derribar o trastornar. «Trastornará» conserva el movimiento de inversión o vuelco y permite implicar el daño resultante sin adelantar una traducción más interpretativa como «arruinará».
- source_word: ἁμαρτωλός
  english_pob_choice: a sinner
  chosen_spanish: El pecador
  alternatives_spanish:
  - Un pecador
  - El que peca
  lexicon: LSJ
  rationale: El singular anartro puede funcionar genéricamente. En español, con valor proverbial, «El pecador» suena natural y conserva la caracterización moral directa del griego, sin añadir especificidad de género innecesaria en esta formulación sentenciosa.
theological_decisions:
- issue: Carácter proverbial y moral del sujeto
  english_pob_reading: a sinner
  chosen_spanish_reading: El pecador
  alternative_spanish_readings:
  - Un pecador
  - El que peca
  rationale: La frase comunica una advertencia ética general, no una tesis doctrinal. «El pecador» mantiene el tono proverbial del griego y la lectura moral directa del original, sin suavizar la acusación ni introducir una paráfrasis explicativa.
  doctrine_reference: 'DOCTRINE.md: preservar el carácter del sujeto según la forma y el uso del original, sin importar categorías ajenas al texto.'
translation_notes:
  revision_awareness: El texto griego breve y proverbial fue revisado a partir del audit trail inglés. Se conservó la amplitud semántica de ἀγαθὰ con «bienes» y se eligió «fiador» para reflejar con claridad el marco legal de ἐγγύου. No se detectaron cambios textuales adicionales en la última revisión.
  spanish_consistency_notes:
  - 'Se mantuvo un registro terminológico jurídico coherente: ἐγγύος → «fiador».'
  - Se evitó «SEÑOR» u այլ vocabulario no pertinente, ya que el versículo no contiene referencias al nombre divino.
  - «Trastornará» preserva la fuerza concreta de ἀνατρέψει sin cerrar el rango semántico a una sola consecuencia.
