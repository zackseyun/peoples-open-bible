  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Siervo» para עַבְדִּי está bien justificado contextualmente. No aparecen términos sensibles como Yahvé/Mesías. «Holocausto» y «rectamente» están alineados con el registro esperado.
