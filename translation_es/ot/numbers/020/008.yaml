translation:
  language: es
  text: Toma el bastón[a] y reúne a la congregación[b], tú y Aarón tu hermano; y hablarán a la roca ante sus ojos[c], y ella dará su agua. Entonces sacarás para ellos agua de la roca y darás de beber a la congregación y a sus animales[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vara'.
    reason: lexical_alternative
  - marker: b
    text: O 'asamblea' para 'congregación'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'ante sus ojos'.
    reason: source_note
  - marker: d
    text: O 'su ganado' o 'sus bestias'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּטֶּה
  english_pob_choice: the staff
  chosen_spanish: el bastón
  alternatives_spanish:
  - la vara
  - el cayado
  lexicon: HALOT
  rationale: מַטֶּה puede referirse a un bastón, vara o cayado. ‘Bastón’ es claro en español moderno y mantiene el objeto de mando/autoridad sin sonar demasiado litúrgico. La alternativa ‘vara’ es posible, pero en español puede sonar más bíblica o más ambigua según el contexto.
- source_word: וְהַקְהֵל אֶת הָעֵדָה
  english_pob_choice: assemble the congregation
  chosen_spanish: reúne a la congregación
  alternatives_spanish:
  - convoca a la congregación
  - junta a la congregación
  lexicon: HALOT
  rationale: הַקְהֵל es causativo de reunir/convocar. ‘Reúne’ expresa bien la orden en español y conserva el sentido de congregar al pueblo para una acción pública.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa al pueblo reunido como cuerpo. ‘Congregación’ preserva ese matiz formal y comunitario que el POB inglés también privilegia.
- source_word: וְדִבַּרְתֶּם אֶל הַסֶּלַע
  english_pob_choice: and speak to the rock
  chosen_spanish: y hablen al peñasco
  alternatives_spanish:
  - y hablen a la roca
  - y díganle al peñasco
  lexicon: HALOT
  rationale: דִבֶּר אֶל expresa ‘hablar a’. ‘Peñasco’ mantiene el referente geológico con buena naturalidad en español; ‘roca’ también sería viable, pero ‘peñasco’ conserva un tono narrativo algo más concreto.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante sus ojos
  - a la vista de ellos
  lexicon: HALOT
  rationale: La expresión es literalmente ‘en sus ojos’, es decir, públicamente y a la vista del pueblo. En español, ‘delante de ellos’ comunica bien la visibilidad pública sin calco forzado. Se preserva la idea documentada por el inglés POB, aunque se evita una construcción demasiado literal en el cuerpo del texto.
- source_word: וְנָתַן מֵימָיו
  english_pob_choice: and it will give its water
  chosen_spanish: y él dará su agua
  alternatives_spanish:
  - y dará su agua
  - y entregará su agua
  lexicon: HALOT
  rationale: El sujeto es el peñasco, singular, y el sufijo posesivo se conserva en ‘su agua’. ‘Dará’ reproduce bien la personificación del hebreo. En español, el pronombre explícito ‘él’ ayuda a evitar ambigüedad con ‘peñasco’.
- source_word: וְהוֹצֵאתָ לָהֶם מַיִם מִן הַסֶּלַע
  english_pob_choice: Then you shall bring out water for them from the rock
  chosen_spanish: Entonces sacarás para ellos agua del peñasco
  alternatives_spanish:
  - y sacarás para ellos agua del peñasco
  - entonces harás salir para ellos agua del peñasco
  lexicon: HALOT
  rationale: הוֹצֵאתָ es causativo de ‘sacar/hacer salir’. ‘Sacarás’ es natural y conserva la acción de hacer salir agua del peñasco. ‘Entonces’ refleja la secuencia narrativa del mandato.
- source_word: וְהִשְׁקִיתָ
  english_pob_choice: and give drink to
  chosen_spanish: darás de beber a
  alternatives_spanish:
  - y darás de beber
  - y harás beber
  lexicon: HALOT
  rationale: שׁקה en causativo significa hacer beber / dar de beber. ‘Darás de beber a’ es idiomático en español y conserva el sentido causativo sin sobreexplicarlo.
- source_word: בְּעִירָם
  english_pob_choice: their livestock
  chosen_spanish: sus animales
  alternatives_spanish:
  - su ganado
  - sus bestias
  lexicon: HALOT
  rationale: בְּעִירָם se refiere a animales domésticos o de carga. ‘Sus animales’ es amplio y claro en español, y evita restringir innecesariamente a ‘ganado’.
theological_decisions:
- issue: Visibilidad pública del signo
  english_pob_reading: The command is rendered to emphasize that Moses and Aaron are to speak to the rock in the sight of the people.
  chosen_spanish_reading: Se conserva el carácter público con ‘delante de ellos’, que subraya que la acción ocurre a la vista de la congregación.
  alternative_spanish_readings:
  - ante sus ojos
  - a la vista de ellos
  rationale: El hebreo לְעֵינֵיהֶם destaca la publicidad del acto. Mantener esa visibilidad es importante para la lógica narrativa del episodio y para la tensión que seguirá en el relato.
  doctrine_reference: Número 20:8-12; cf. la unidad narrativa inmediata del episodio de Meribá.
translation_notes:
  revision_awareness: The English POB audit trail shows no later applied revisions and a high-agreement review with only minor issues. I preserved the core lexical decisions (staff/congregation/before their eyes/ livestock), while adapting them naturally into Spanish and keeping the public-witness nuance explicit.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ para el Tetragrámaton only when present in source text; aquí no aparece.
  - Mantuve ‘congregación’ como término comunitario formal, coherente con el POB inglés.
  - Elegí ‘bastón’ rather than ‘vara’ in the main text for natural Spanish, but documented the alternative because the Hebrew permits it.
  - Conservé el sufijo posesivo en ‘su agua’ para reflejar מֵימָיו.
  - ‘Peñasco’ was chosen instead of a more generic ‘roca’ to preserve a concrete, scene-specific nuance without changing the sense.
