translation:
  language: es
  text: Miren[a], yo estoy convocando a muchos pescadores, declara Yahvé, y los pescarán; y después de eso enviaré a muchos cazadores[b], y los cazarán desde todo monte y desde toda colina, y desde las hendiduras de las rocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí». La expresión hebrea introduce una proclamación solemne y llama la atención del oyente.'
    reason: lexical_alternative
  - marker: b
    text: La imagen de pescadores y cazadores presenta a personas buscadas y apresadas desde todo escondite; el versículo mismo no identifica explícitamente a los agentes más allá de que son enviados por Yahvé.
    reason: cultural_note
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look, I
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí, yo
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: La fórmula introductoria expresa una ঘোষণা solemne y deíctica. «¡Mira!» conserva la fuerza de llamada a atención en español moderno sin recurrir a un calco arcaizante.
- source_word: שֹׁלֵחַ
  english_pob_choice: am sending
  chosen_spanish: estoy enviando
  alternatives_spanish:
  - envío
  - estoy por enviar
  lexicon: HALOT
  rationale: El participio con הִנְנִי sugiere acción inminente o en curso; el presente progresivo en español transmite bien esa vividez.
- source_word: לְדוגים רַבִּים
  english_pob_choice: for many fishermen
  chosen_spanish: muchos pescadores
  alternatives_spanish:
  - muchos pescadores de peces
  - muchos pescadores
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo ocupacional con sentido concreto. «Pescadores» es natural y preserva la imagen; no se introduce una paráfrasis sobre su función.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH según el criterio del proyecto. «Dice Yahvé» reproduce la fórmula profética con claridad y sobriedad en español.
- source_word: וְדִיגוּם
  english_pob_choice: and they will catch them
  chosen_spanish: y los pescarán
  alternatives_spanish:
  - y los atraparán como con red
  - y los capturarán
  lexicon: HALOT
  rationale: El verbo derivado de דוג mantiene el campo semántico de pesca. «Los pescarán» conserva el paralelismo imagístico sin perder transparencia idiomática.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: and after that
  chosen_spanish: y después de eso
  alternatives_spanish:
  - y después
  - y luego
  lexicon: HALOT
  rationale: Marca la secuencia entre dos envíos. La expresión española es directa y conserva el encadenamiento narrativo.
- source_word: אֶשְׁלַח
  english_pob_choice: I will send for
  chosen_spanish: enviaré
  alternatives_spanish:
  - mandaré
  - enviaré para
  lexicon: HALOT
  rationale: El verbo conserva la acción divina de envío. En español, el objeto de destino queda suficientemente claro por el contexto y no exige añadir «para».
- source_word: לְרַבִּים צַיָּדִים
  english_pob_choice: for many hunters
  chosen_spanish: muchos cazadores
  alternatives_spanish:
  - muchos cazadores
  - muchos perseguidores
  lexicon: HALOT
  rationale: צַיָּדִים designa cazadores; «cazadores» conserva el contraste imagético con «pescadores» y evita una generalización abstracta.
- source_word: וְצָדוּם
  english_pob_choice: and they will hunt them
  chosen_spanish: y los cazarán
  alternatives_spanish:
  - y los perseguirán
  - y los capturarán
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de caza. «Cazar» mantiene el paralelismo con «pescarán» y la fuerza concreta del hebreo.
- source_word: מֵעַל כָּל הַר וּמֵעַל כָּל גִּבְעָה
  english_pob_choice: from every mountain and from every hill
  chosen_spanish: desde todo monte y desde toda colina
  alternatives_spanish:
  - desde cada monte y cada colina
  - de sobre todo monte y de sobre toda colina
  lexicon: HALOT
  rationale: La repetición del origen espacial comunica búsqueda exhaustiva. «Desde» es idiomático en español y preserva la idea de rastreo desde lugares elevados.
- source_word: וּמִנְּקִיקֵי הַסְּלָעִים
  english_pob_choice: and from the clefts of the rocks
  chosen_spanish: y desde las hendiduras de las rocas
  alternatives_spanish:
  - y desde las grietas de las rocas
  - y desde los recovecos de las peñas
  lexicon: HALOT
  rationale: נְקִיקִים refiere hendiduras o grietas. «Hendiduras» es preciso y legible; «rocas» conserva el referente concreto del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto, se preserva el nombre del pacto como «Yahvé» en vez de ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metaphorical force of fishermen and hunters
  english_pob_reading: Retain the concrete imagery without specifying the target's identity beyond 'them.'
  chosen_spanish_reading: Conservar la imagen concreta de pescadores y cazadores sin explicitar quiénes son los agentes ni resolver la identidad de los alcanzados.
  alternative_spanish_readings:
  - Interpretar explícitamente a los agentes como invasores
  - Interpretar explícitamente el pasaje como reunión de exiliados
  rationale: El verso por sí mismo mantiene la tensión entre juicio, búsqueda y captura. La traducción debe preservar la metáfora sin decidir el trasfondo interpretativo más allá de lo que el contexto inmediato obliga.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y concuerda con el audit trail inglés: conserva la fórmula profética, la secuencia de dos envíos, y la imagen metafórica de pesca y caza sin resolver su aplicación interpretativa. No se detectaron revisiones aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se mantiene la metáfora concreta con verbos españoles naturales: «pescarán» y «cazarán».'
  - La sintaxis repite «desde» para reflejar la acumulación espacial del hebreo.
  - No se añadió lenguaje explicativo que identifique a los pescadores o cazadores más allá del texto base.
