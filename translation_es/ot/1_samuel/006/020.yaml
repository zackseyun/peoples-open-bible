revisions:
- from: 'Entonces los hombres de Bet-semes dijeron[a]: «¿Quién podrá estar en pie delante de Yahvé, este Dios santo? ¿Y a quién subirá desde nosotros?»'
  to: 'Entonces los hombres de Bet-semes dijeron[a]: «¿Quién podrá estar en pie delante de Yahvé, este Dios santo? ¿Y a quién subirá de entre nosotros?»'
  rationale: 'Se conserva el sentido y la ambigüedad del hebreo, pero se reemplaza «desde nosotros» por «de entre nosotros» para lograr un español natural y claro. También se corrige la nota para que realmente ofrezca la alternativa interpretativa documentada: que el sujeto implícito sea el arca.'
