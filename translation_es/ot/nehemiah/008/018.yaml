translation:
  language: es
  text: Y leyó del libro de la ley de Dios[a] día tras día, desde el primer día hasta el último día. Y celebraron la fiesta[b] durante siete días, y al octavo día hubo una asamblea solemne[c], según la ordenanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del rollo de la ley de Dios». El término hebreo puede referirse, de manera general, a un documento escrito, incluso a un rollo.
    reason: lexical_alternative
  - marker: b
    text: O «guardaron la fiesta».
    reason: lexical_alternative
  - marker: c
    text: O «según lo prescrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he read
  chosen_spanish: leyó
  alternatives_spanish:
  - proclamó
  - se leyó
  lexicon: HALOT
  rationale: En este contexto, קרא con בְּסֵפֶר indica leer en voz alta desde un texto escrito. En español, «leyó» conserva mejor el acto de lectura pública que «proclamó», y respeta el sujeto singular implícito del relato.
- source_word: בְּסֵפֶר תּוֹרַת הָאֱלֹהִים
  english_pob_choice: from the Book of the Law of God
  chosen_spanish: del libro de la ley de Dios
  alternatives_spanish:
  - del rollo de la ley de Dios
  - en el libro de la ley de Dios
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a un libro o a un documento escrito; «libro» es la opción natural y fiel sin forzar «rollo». La construcción «de la ley de Dios» conserva la cadena genitiva sin añadir interpretación.
- source_word: יוֹם בְּיוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - día por día
  lexicon: HALOT
  rationale: La expresión hebrea es iterativa; «día tras día» mantiene ese valor repetitivo y el ritmo del original, más claramente que una formulación más plana.
- source_word: מִן הַיּוֹם הָרִאשׁוֹן עַד הַיּוֹם הָאַחֲרוֹן
  english_pob_choice: from the first day to the last day
  chosen_spanish: desde el primer día hasta el último día
  alternatives_spanish:
  - del primer día al último día
  - desde el primer día al postrer día
  lexicon: HALOT
  rationale: La secuencia temporal se traduce de forma directa y natural en español, preservando el inclusio del hebreo.
- source_word: וַיַּעֲשׂוּ חָג
  english_pob_choice: they kept the feast
  chosen_spanish: celebraron la fiesta
  alternatives_spanish:
  - guardaron la fiesta
  - observaron la fiesta
  lexicon: HALOT
  rationale: עָשָׂה + חָג puede significar celebrar o guardar una fiesta. En español, «celebraron la fiesta» comunica bien el sentido festivo sin perder la referencia cultual.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - siete días
  - por siete días
  lexicon: HALOT
  rationale: El hebreo expresa duración; «durante siete días» lo vuelve idiomático en español y conserva el valor temporal.
- source_word: עֲצֶרֶת
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea
  - una reunión solemne
  lexicon: HALOT
  rationale: עֲצֶרֶת designa una reunión sagrada de clausura. «Asamblea solemne» preserva el carácter cultual y la solemnidad mejor que «asamblea» a secas.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al decreto
  alternatives_spanish:
  - según la ordenanza
  - conforme a la norma
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene fuerza normativa/prescriptiva. «Conforme al decreto» comunica esa obligatoriedad establecida; «ordenanza» también sería posible, pero «decreto» suena más natural en español contemporáneo y sigue el sentido legal.
theological_decisions:
- issue: Distinción entre el lector singular y la comunidad plural
  english_pob_reading: Retain 'he read' and 'they kept' as in the Hebrew forms
  chosen_spanish_reading: Mantener «leyó» en singular y «celebraron» en plural
  alternative_spanish_readings:
  - homogeneizar con «leían»
  - usar un impersonal como «se leyó»
  rationale: El hebreo distingue entre el acto de lectura y la celebración comunitaria. La traducción conserva esa diferencia para no aplanar la estructura narrativa del texto.
  doctrine_reference: Principios de fidelidad formal y transparencia textual del POB
- issue: Sentido cultual de עֲצֶרֶת
  english_pob_reading: Render as 'solemn assembly'
  chosen_spanish_reading: «asamblea solemne»
  alternative_spanish_readings:
  - asamblea
  - asamblea de clausura
  rationale: El término apunta a una reunión sagrada prescrita al final de la fiesta. «Asamblea solemne» conserva el peso religioso sin introducir una formulación más interpretativa de lo necesario.
  doctrine_reference: Principios de precisión léxica y preservación del valor cultual
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y no requiere revisiones sustantivas respecto del sentido base: mantiene la lectura pública singular, la iteración diaria, la celebración de la fiesta y la clausura ritual conforme al mandato.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero en este versículo el hebreo contiene הָאֱלֹהִים, por lo que corresponde «Dios».
  - Se eligió «leyó» frente a «proclamó» para reflejar el acto de lectura pública desde el texto escrito.
  - «Asamblea solemne» se usa como equivalente estable de עֲצֶרֶת.
  - «Conforme al decreto» preserva la fuerza normativa de כַּמִּשְׁפָּט sin arcaísmo excesivo.
