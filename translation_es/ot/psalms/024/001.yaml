translation:
  language: es
  text: Salmo de David. La tierra y su plenitud[a] son de Yahvé[b], el mundo y los que habitan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y todo lo que la llena».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La tierra es de Yahvé, y su plenitud».'
    reason: previous_rendering
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: El ל del encabezado puede indicar autoría, asociación o dedicación. «De David» conserva esa ambigüedad mejor que restringirlo a una sola relación.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - canto
  - melodía
  - himno
  lexicon: HALOT
  rationale: מִזְמוֹר es el término habitual de encabezado para un salmo; «Salmo» es el equivalente natural y reconocido en español bíblico.
- source_word: לַיהוָה
  english_pob_choice: the LORD’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - pertenece a Yahvé
  - es de Yahvé
  - de el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de renderizar el nombre divino como «Yahvé». La frase hebrea es posesiva y verbless; «de Yahvé» conserva la concisión y la fuerza de pertenencia.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitable
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra» o «país», el paralelismo con תֵּבֵל favorece una referencia de alcance universal; en español, «la tierra» mantiene bien ese valor.
- source_word: וּמְלוֹאָהּ
  english_pob_choice: and its fullness
  chosen_spanish: y su plenitud
  alternatives_spanish:
  - y todo lo que la llena
  - y cuanto hay en ella
  lexicon: HALOT
  rationale: מְלוֹא expresa la idea de plenitud o contenido completo. «Su plenitud» conserva la densidad del hebreo y la relación posesiva con «la tierra».
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: HALOT
  rationale: תֵּבֵל suele denotar el mundo ordenado o habitado. «El mundo» es el equivalente más natural; el matiz habitado queda reforzado por la cláusula siguiente.
- source_word: וְיֹשְׁבֵי בָהּ
  english_pob_choice: and those who dwell in it
  chosen_spanish: y los que habitan en él
  alternatives_spanish:
  - y sus habitantes
  - y los que viven en él
  lexicon: HALOT
  rationale: La construcción participial significa literalmente «los que habitan en ella/él». «Los que habitan en él» conserva el sentido verbal y resulta natural en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la práctica doctrinal del proyecto, se vierte como «Yahvé» para preservar el nombre de pacto revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El inglés POB pasó de una estructura posesiva en el primer hemistiquio a una formulación con sujeto compuesto: «The earth and its fullness are the LORD’s». La versión española sigue esa estructura compuesta con una sola cópula implícita en «son de Yahvé», sin dividir artificialmente la línea. También se preserva la nota alternativa para וּמְלוֹאָהּ, donde el hebreo admite una versión más dinámica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en coherencia con el proyecto.
  - «Salmo» se conserva para el encabezado מִזְמוֹר por ser el equivalente estable y natural.
  - «La tierra / el mundo» reproduce el paralelismo universal del verso sin introducir un matiz localizador de «país».
  - «Su plenitud» mantiene la tensión entre contenido total y «todo lo que la llena», sin borrar la ambigüedad lexical del hebreo.
