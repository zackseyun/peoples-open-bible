    issue: «cuando venía» para בְּבֹאוֹ
    rationale: La construcción hebrea temporal con ב + infinitivo constructo apunta a «cuando vino / al regresar / cuando llegó», no al imperfectivo progresivo «venía», que sugiere acción en curso y puede desplazar el momento temporal.
  - severity: low
