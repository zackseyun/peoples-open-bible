revisions:
- from: Y el nombre de la mujer midianita que fue herida de muerte era Cozbi, hija de Zur[a], quien era cabeza de las tribus[b] de una casa paterna en Madián.
  to: Y el nombre de la mujer midianita que fue abatida era Cozbi, hija de Zur[a], quien era cabeza de los clanes[b] de una casa paterna[c] en Madián.
  rationale: Se ajustó הַמֻּכָּה a 'abatida' para conservar mejor la fuerza del participio sin sobreinterpretar. Se cambió 'tribus' por 'clanes' para seguir la decisión léxica documentada para אֻמּוֹת en contexto de parentesco, manteniendo 'pueblos' como alternativa en nota. Se añadió la nota para 'casa paterna' porque reproduce un tecnicismo social hebreo que conviene aclarar también en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: identifica a la mujer midianita, la nombra como Cozbi hija de Zur, y correctamente hace que ''quien era...'' se refiera a Zur. Sin embargo, dos decisiones debilitan la fidelidad léxica documentada: הַמֻּכָּה se tradujo como ''herida de muerte'', que en español suena más interpretativo que el inglés auditado ''struck down'' y que el participio pasivo hebreo; y אֻמּוֹת se llevó a ''tribus'', aunque el expediente inglés razonó ''clanes'' como mejor ajuste en este contexto de parentesco.'
  spanish_quality_summary: El español es claro y natural, pero 'cabeza de las tribus de una casa paterna' suena menos idiomático y menos preciso que 'jefe de los clanes de una casa paterna' o 'cabeza de los clanes...'. También conviene añadir la nota cultural para 'casa paterna', ya presente en el rastro inglés, porque en español puede no entenderse como tecnicismo de parentesco.
  glossary_alignment: 'No hay conflictos con la terminología mayor del proyecto. Los nombres propios y ''Madián'' están bien. La principal desalineación está en אֻמּוֹת: debe reflejarse preferentemente como ''clanes'', con ''pueblos'' como alternativa en nota; ''tribus'' introduce un matiz no respaldado por la decisión inglesa. ''Casa paterna'' es aceptable si se acompaña de nota explicativa.'
  issues:
  - severity: medium
    issue: הַמֻּכָּה traducido como 'herida de muerte'
    rationale: El hebreo participial significa literalmente 'golpeada/abatida/derribada'. En contexto murió, pero 'herida de muerte' añade un matiz resultativo más específico que la formulación auditada y puede sugerir proceso más que resultado consumado.
  - severity: high
    issue: אֻמּוֹת traducido como 'tribus'
    rationale: El rastro inglés justifica 'clans' por el contexto de parentesco con בֵּית אָב. 'Tribus' desplaza el sentido hacia una organización étnico-tribal más amplia y se aleja de la rationale documentada.
  - severity: medium
    issue: Falta la nota cultural para 'casa paterna'
    rationale: El inglés preservó una nota para explicar el tecnicismo de parentesco 'father’s house'. En español, 'casa paterna' puede entenderse solo como vivienda del padre si no se explica.
  revised_spanish_text: Y el nombre de la mujer midianita que fue abatida era Cozbi, hija de Zur[a], quien era cabeza de los clanes[b] de una casa paterna[c] en Madián.
  revised_footnotes:
  - marker: a
    text: 'O: «hija de Tzur».'
    reason: alternative_transliteration
  - marker: b
    text: 'O: «los pueblos». El hebreo puede referirse a pueblos o, en este contexto de parentesco, a grupos de clan.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «casa paterna», un término de parentesco para una familia extensa o casa ancestral.
    reason: cultural_note
  revision_rationale: Se ajustó הַמֻּכָּה a 'abatida' para conservar mejor la fuerza del participio sin sobreinterpretar. Se cambió 'tribus' por 'clanes' para seguir la decisión léxica documentada para אֻמּוֹת en contexto de parentesco, manteniendo 'pueblos' como alternativa en nota. Se añadió la nota para 'casa paterna' porque reproduce un tecnicismo social hebreo que conviene aclarar también en español.
