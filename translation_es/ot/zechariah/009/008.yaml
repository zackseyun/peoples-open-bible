base_translation:
  language: en
  yaml_path: translation/ot/zechariah/009/008.yaml
  text: And I will encamp at my house as a guard[a], so that none may pass to and fro, and no oppressor will pass over them again[c][b]; for now I have seen with my own eyes.
  footnotes:
