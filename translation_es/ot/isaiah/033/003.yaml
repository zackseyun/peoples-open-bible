translation:
  language: es
  text: Al sonido del tumulto[a], los pueblos huyeron; cuando te levantas[b], las naciones fueron dispersadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al ruido del tumulto, los pueblos huyeron.»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por tu exaltación»; el hebreo puede enfatizar tanto el levantarte de Dios para actuar como su majestad exaltada.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al oír
  alternatives_spanish:
  - Por el sonido de
  - Al sonido de
  lexicon: HALOT
  rationale: La preposición hebrea con קוֹל expresa aquí el detonante del movimiento. En español, «Al oír» comunica de forma natural la ocasión/cause without sounding artificial, y conserva la fuerza auditiva del texto.
- source_word: הָמוֹן
  english_pob_choice: the tumult
  chosen_spanish: el tumulto
  alternatives_spanish:
  - el ruido
  - el estruendo
  - la muchedumbre
  lexicon: HALOT
  rationale: En este contexto de pánico y reacción de pueblos y naciones, «tumulto» conserva la idea de conmoción sonora y evita reducirlo solo a «ruido» o reinterpretarlo como «muchedumbre».
- source_word: נָדְדוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - se alejaron
  - se dispersaron
  - fueron puestos en fuga
  lexicon: HALOT
  rationale: El verbo describe retirada/huida en un marco de juicio o amenaza. «Huyeron» transmite ese sentido con naturalidad y mantiene el matiz de escape.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: «Pueblos» preserva la distinción frente a גּוֹיִם («naciones») que aparece después. Aunque hay solapamiento semántico, la diferencia en español ayuda a mantener el contraste del hebreo.
- source_word: מֵרֹמְמֻתֶךָ
  english_pob_choice: at your rising up
  chosen_spanish: al verte levantarte
  alternatives_spanish:
  - por tu exaltación
  - al levantarte en alto
  - por tu majestad exaltada
  lexicon: HALOT
  rationale: La forma nominal puede apuntar a «exaltación» o a «levantarse/elevarse» en acción. «Al verte levantarte» preserva la tensión entre majestad y acto de intervenir, y mantiene la posibilidad de que el texto describa a Dios alzándose para actuar.
- source_word: נָפְצוּ
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersadas
  alternatives_spanish:
  - se dispersaron
  - fueron esparcidas
  - quedaron desbandadas
  lexicon: HALOT
  rationale: El verbo puede abarcar dispersión e incluso desmoronamiento. Con «naciones» como sujeto, «fueron dispersadas» conserva el pasivo y el efecto de desbandada sin añadir interpretación excesiva.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En Isaías, גּוֹיִם suele referirse a naciones. «Naciones» es el equivalente más directo y no introduce una oposición teológica posterior que el contexto inmediato no requiere.
theological_decisions:
- issue: Referente de la segunda persona en «al verte levantarte»
  english_pob_reading: Addressed to God, describing his arising/exaltation in judgment
  chosen_spanish_reading: Dirigido a Dios, describiendo su levantarse para actuar en juicio
  alternative_spanish_readings:
  - Dirigido a Sion/Jerusalén personificada
  - Referido a la exaltación de Dios sin matiz de acción
  rationale: El contexto de Isaías 33 apunta a la intervención divina contra las naciones hostiles. La versión española conserva la ambigüedad del hebreo entre exaltación y acción, pero elige una redacción que suena natural y permite leer el referente como Dios sin cerrarlo artificialmente.
  doctrine_reference: Preservar la tensión textual sin resolverla de antemano
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del audit trail inglés y no introduce revisiones adicionales; conserva la distinción entre עַמִּים y גּוֹיִם y mantiene la ambigüedad de מֵרֹמְמֻתֶךָ en una forma española natural.
  spanish_consistency_notes:
  - Se evitó traducir YHWH porque este versículo no lo contiene explícitamente.
  - Se mantuvo «pueblos» frente a «naciones» para עַמִּים y «naciones» para גּוֹיִם, preservando el contraste léxico.
  - Se prefirió «fueron dispersadas» para conservar la voz pasiva y el matiz de desbandada sin exagerar la imagen.
