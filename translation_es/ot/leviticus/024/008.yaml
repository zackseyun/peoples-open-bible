- from: Cada día de reposo lo[a] dispondrá[b] delante de Yahvé continuamente, por parte de los hijos de Israel, como pacto perpetuo[c].
  to: Cada día de reposo lo[a] dispondrá[b] delante de Yahvé continuamente, de los hijos de Israel, como pacto perpetuo[c].
