base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/024/023.yaml
  text: Your turbans will be on your heads and your sandals on your feet[a]; you will not mourn and you will not weep[c][b], but you will waste away in your iniquities and groan to one another.
  footnotes:
  - marker: a
    text: Or 'your headdresses' or 'your finery'; the Hebrew term refers to an ornamental head covering, likely a turban in this mourning context.
    reason: lexical_alternative
