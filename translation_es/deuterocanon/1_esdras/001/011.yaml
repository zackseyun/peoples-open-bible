translation:
  language: es
  text: Y asaron la Pascua con fuego, como era debido, y cocieron los sacrificios en los recipientes de bronce y en las calderas, con aroma agradable[a], y los llevaron a todo el pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión alude literalmente al olor o fragancia; en contexto sacrificial, puede evocar el aroma agradable de una ofrenda.
    reason: lexical_alternative
  - marker: b
    text: 'O más literalmente: «a todos los que eran del pueblo», posiblemente refiriéndose al pueblo no sacerdotal en contraste con los sacerdotes y levitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤπτησαν
  english_pob_choice: roasted
  chosen_spanish: asaron
  alternatives_spanish:
  - roastaron
  - asaron al fuego
  lexicon: LSJ
  rationale: El verbo griego indica asar/rostizar sobre fuego. «Asaron» comunica de forma natural en español la cocción por fuego y conserva el contraste ritual con «cocieron» más adelante.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  - el sacrificio de Pascua
  lexicon: LSJ
  rationale: En español bíblico «la Pascua» es la forma clara y fiel para τὸ πάσχα, dejando abierto el matiz de fiesta/sacrificio según el contexto.
- source_word: ἐν πυρί
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  - al fuego
  - sobre fuego
  lexicon: LSJ
  rationale: La preposición expresa el medio de la preparación. «Con fuego» es idiomático en español y mantiene la relación instrumental del griego sin forzar una perífrasis más dura.
- source_word: ὡς καθήκει
  english_pob_choice: as was proper
  chosen_spanish: como era debido
  alternatives_spanish:
  - como era propio
  - como convenía
  - como era requerido
  lexicon: LSJ
  rationale: La expresión señala lo apropiado o prescrito. «Como era debido» conserva el valor normativo sin precisar si la norma es legal, ritual o consuetudinaria.
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas
  - las víctimas
  lexicon: LSJ
  rationale: El término es amplio y cultual. «Sacrificios» reproduce directamente el campo semántico y evita estrecharlo indebidamente.
- source_word: ἥψησαν
  english_pob_choice: boiled
  chosen_spanish: cocieron
  alternatives_spanish:
  - hirvieron
  - los cocieron
  - los hervieron
  lexicon: LSJ
  rationale: El verbo puede referirse a cocer en líquido; en español «cocieron» es natural y permite conservar la distinción con «asaron» sin introducir una rigidez innecesaria. «Hervieron» sugeriría de modo más fuerte la ebullición que el griego no exige explícitamente.
- source_word: ἐν τοῖς χαλκίοις καὶ λέβησιν
  english_pob_choice: in the bronze pots and kettles
  chosen_spanish: en los recipientes de bronce y en las calderas
  alternatives_spanish:
  - en las vasijas de bronce y calderos
  - en los ollos de bronce y calderas
  lexicon: LSJ
  rationale: χαλκίοις y λέβησιν designan utensilios de cocina/servicio. «Recipientes de bronce» y «calderas» conservan el material y la diferencia entre los dos términos con español claro y sobrio.
- source_word: μετʼ εὐωδίας
  english_pob_choice: with a pleasing aroma
  chosen_spanish: con aroma agradable
  alternatives_spanish:
  - con buen olor
  - con fragancia agradable
  - como aroma de grato olor
  lexicon: LSJ
  rationale: La frase remite literalmente al olor/fragrancia y, en contexto sacrificial, al aroma agradable de la ofrenda. «Aroma agradable» preserva ese matiz sin sonar forzado.
- source_word: ἀπήνεγκαν
  english_pob_choice: brought
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los trajeron
  - los llevaron a
  - los distribuyeron
  lexicon: LSJ
  rationale: El verbo puede significar llevar o traer según el punto de vista. Aquí, con el destinatario indicado después, «los llevaron» comunica el traslado de las porciones preparadas hacia el pueblo.
- source_word: πᾶσι τοῖς ἐκ τοῦ λαοῦ
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a todos los del pueblo
  - a todos los que eran del pueblo
  - a todo el laicado
  lexicon: LSJ
  rationale: La expresión puede insinuar a los no sacerdotales en contraste con sacerdotes y levitas. «A todo el pueblo» es la traducción principal más natural; el matiz distributivo se deja implícito como en el griego.
theological_decisions:
- issue: Distinción ritual entre la Pascua y los sacrificios
  english_pob_reading: The Passover was 'roasted,' while other sacrifices were 'boiled.'
  chosen_spanish_reading: La Pascua fue «asada» y los demás sacrificios fueron «cocidos».
  alternative_spanish_readings:
  - La Pascua fue «cocida» y los sacrificios fueron «cocidos».
  - La Pascua fue «rostizada» y los sacrificios fueron «hervidos».
  rationale: El griego usa dos verbos diferentes y probablemente refleja preparaciones rituales distintas. Mantener la diferencia en español evita aplanar el detalle cultual del pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de πᾶσι τοῖς ἐκ τοῦ λαοῦ
  english_pob_reading: Render as 'to all the people' in the main text, with a note that it may mean the non-priestly people.
  chosen_spanish_reading: «a todo el pueblo» en el texto principal, con nota sobre el posible contraste social.
  alternative_spanish_readings:
  - a todos los laicos
  - a todos los del pueblo
  - a todos los no sacerdotes
  rationale: La frase griega puede distinguir a los receptores del grupo oficiante. El texto principal debe ser claro y fluido, pero la nota preserva la posibilidad de que se trate del pueblo común frente a sacerdotes y levitas.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto griego base coincide de manera alta con el audit trail inglés. Se conservaron las dos acciones culinario-rituales distintas («asaron» / «cocieron»), el matiz normativo de ὡς καθήκει, y la ambigüedad social de πᾶσι τοῖς ἐκ τοῦ λαοῦ mediante una nota. No hubo revisiones textuales aplicadas en el registro inglés, y la versión española sigue esa estabilidad.
  spanish_consistency_notes:
  - Se usó «Pascua» como término estable para τὸ πάσχα, coherente con el uso bíblico del español.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
  - Se mantuvo «sacrificios» en plural para reflejar τὰς θυσίας y el paralelismo con el verbo distinto.
  - «Recipientes de bronce» y «calderas» conservan el material y la doble referencia instrumental del griego.
  - La puntuación y el ritmo buscan una lectura litúrgica clara sin añadir contenido ausente del original.
