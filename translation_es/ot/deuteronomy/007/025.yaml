translation:
  language: es
  text: Las imágenes talladas de sus dioses las quemarás en el fuego. No codiciarás la plata ni el oro que está sobre ellas[a], ni lo tomarás para ti, no sea que quedes atrapado por ello[b], porque es una abominación para Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la plata y el oro que está sobre ellas". El hebreo usa la conjunción "y"; en español, dentro de una prohibición, "ni... ni..." expresa naturalmente que no se debe codiciar ninguno de los dos metales.
    reason: lexical_alternative
  - marker: b
    text: O "no sea que quedes atrapado por ello"; el verbo hebreo lleva la imagen de ser cogido en una trampa o lazo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּסִילֵי
  english_pob_choice: carved images
  chosen_spanish: imágenes talladas
  alternatives_spanish:
  - ídolos
  - imágenes esculpidas
  lexicon: HALOT
  rationale: פֶּסֶל se refiere a una imagen trabajada por talla o esculpido. "Imágenes talladas" conserva esa concreción sin caer en un calco arcaizante.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - los dioses de ellos
  lexicon: HALOT
  rationale: El constructo plural con sufijo de 3ª plural se expresa de manera natural en español como "sus dioses".
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  english_pob_choice: shall burn ... with fire
  chosen_spanish: las quemarás en el fuego
  alternatives_spanish:
  - las quemarás con fuego
  - las quemarás en la hoguera
  lexicon: HALOT
  rationale: El hebreo usa el verbo de quemar junto con una frase instrumental. En español, "en el fuego" preserva bien la imagen y suena natural.
- source_word: לֹא תַחְמֹד
  english_pob_choice: shall not covet
  chosen_spanish: No codiciarás
  alternatives_spanish:
  - No desearás
  - No pondrás tu deseo en
  lexicon: HALOT
  rationale: '"Codiciar" mantiene la fuerza ética y bíblica del mandato negativo, y corresponde bien al valor prohibitivo del verbo.'
- source_word: כֶּסֶף וְזָהָב עֲלֵיהֶם
  english_pob_choice: the silver or gold that is on them
  chosen_spanish: la plata ni el oro que está sobre ellas
  alternatives_spanish:
  - la plata y el oro que está sobre ellas
  - la plata o el oro que está sobre ellas
  lexicon: HALOT
  rationale: El hebreo tiene una coordinación simple con וְ; en una prohibición, el español puede expresar el alcance distributivo con "ni... ni..." sin perder el sentido de evitar cualquiera de los metales.
- source_word: וְלָקַחְתָּ לָךְ
  english_pob_choice: and take it for yourself
  chosen_spanish: ni lo tomarás para ti
  alternatives_spanish:
  - y lo tomarás para ti
  - ni lo tomarás para uso propio
  lexicon: HALOT
  rationale: La secuencia mantiene el encadenamiento prohibitivo y el beneficio reflexivo de לָךְ. "Para ti" preserva la fuerza del pronombre.
- source_word: פֶּן תִּוָּקֵשׁ בּוֹ
  english_pob_choice: lest you be ensnared by it
  chosen_spanish: para que no quedes atrapado por ello
  alternatives_spanish:
  - no sea que quedes atrapado por ello
  - para que no seas ensnarecido por ello
  lexicon: HALOT
  rationale: El nifal de יקשׁ conserva la imagen de caer en una trampa. "Quedes atrapado" transmite el peligro sin sonar forzado en español.
- source_word: כִּי תוֹעֲבַת יְהוָה אֱלֹהֶיךָ הוּא
  english_pob_choice: for it is an abomination to Yahweh your God
  chosen_spanish: porque es una abominación para Yahvé tu Dios
  alternatives_spanish:
  - porque es algo abominable para Yahvé tu Dios
  - porque es detestable para Yahvé tu Dios
  lexicon: HALOT
  rationale: '"Abominación" conserva el peso fuerte de תוֹעֵבָה en registro bíblico y jurídico-cultual. Se mantiene "Yahvé" según la pauta terminológica del proyecto.'
theological_decisions:
- issue: Referente del pronombre final הוּא
  english_pob_reading: The pronoun refers to the forbidden object/spoil associated with the idol, rendered as 'it is an abomination.'
  chosen_spanish_reading: 'El pronombre se mantiene con un antecedente amplio: puede abarcar el conjunto idolátrico y el botín prohibido ligado a él.'
  alternative_spanish_readings:
  - El pronombre se refiere solo a la imagen tallada.
  - El pronombre se refiere específicamente a la plata y el oro.
  rationale: El hebreo deja una ambigüedad deliberada sobre si lo abominable es la imagen, el botín o el conjunto. La traducción española conserva esa tensión con "ello" y no la resuelve de forma excesiva.
  doctrine_reference: Preservar la ambigüedad textual donde el hebreo la mantiene.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el hilo auditado en inglés: el mandato prohíbe quemar, codiciar y tomar el metal de los ídolos; también conserva la ambigüedad del pronombre final y la fuerza de תוֹעֵבָה.'
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino conforme a la terminología del proyecto.
  - Se mantiene un registro bíblico claro pero natural, sin calcos innecesarios.
  - Se conserva la distinción entre imágenes talladas, dioses y botín metálico sin fusionarlos artificialmente.
