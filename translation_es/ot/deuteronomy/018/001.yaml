base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/001.yaml
  text: The Levitical priests—all the tribe of Levi—shall have no portion or inheritance with Israel[a]; they shall eat the food offerings of Yahweh, that is[b], his inheritance.
  footnotes:
  - marker: a
    text: Or, more literally, “the offerings by fire of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: “His inheritance” may refer collectively to Levi/the Levite; compare the parallel statement in Deuteronomy 18:2, where the LORD is said to be their inheritance.
    reason: cross_reference
