theological_decisions:
- issue: Rendering of ἐπίστευσαν in a non-theological narrative context
  chosen_reading: they trusted him
  alternative_readings:
  - they believed him
  rationale: Although πιστεύω often bears theological weight, here it refers to accepting deceptive assurances. The translation avoids importing doctrinal overtones while preserving the narrative irony.
  doctrine_reference: 'DOCTRINE.md: preserve source sense over translation tradition; πίστις default concerns theological contexts, but context-dependent rendering is permitted and should be documented.'
