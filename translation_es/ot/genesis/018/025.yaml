  text: חָלִ֨לָ/ה לְּ/ךָ֜ מֵ/עֲשֹׂ֣ת כַּ/דָּבָ֣ר הַ/זֶּ֗ה לְ/הָמִ֤ית צַדִּיק֙ עִם רָשָׁ֔ע וְ/הָיָ֥ה כַ/צַּדִּ֖יק כָּ/רָשָׁ֑ע חָלִ֣לָ/ה לָּ֔/ךְ הֲ/שֹׁפֵט֙ כָּל הָ/אָ֔רֶץ לֹ֥א יַעֲשֶׂ֖ה מִשְׁפָּֽט׀־־׃
