    reason: alternative_reading
  revision_rationale: Se hace una reparación menor para alinear mejor יִקְדָּשׁ con el sentido resultativo documentado por el POB inglés. «Quedará santo» suena natural en español y conserva la tensión ritual del hebreo. La nota alternativa se ajusta en paralelo para mantener consistencia con el texto principal.
