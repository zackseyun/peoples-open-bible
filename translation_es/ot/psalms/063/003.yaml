translation:
  language: es
  text: Así te he contemplado en el santuario[a], para ver tu poder y tu gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así, en el lugar santo, te he visto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Entonces
  - De este modo
  lexicon: HALOT
  rationale: כֵּן funciona aquí como adverbio de enlace. «Así» comunica la conexión con el recuerdo previo de adoración de manera natural en español, sin forzar una inferencia más específica que el hebreo no explicita.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en la santidad
  - en el lugar santo
  lexicon: HALOT
  rationale: En este contexto cultual, קֹדֶשׁ con la preposición expresa el ámbito sagrado del culto. «Santuario» mantiene ese marco y suena más natural que una traducción abstracta de «santidad».
- source_word: חֲזִיתִיךָ
  english_pob_choice: I have looked upon you
  chosen_spanish: te he contemplado
  alternatives_spanish:
  - te he visto
  - te he mirado
  - te he observado
  lexicon: HALOT
  rationale: חזה implica ver con atención o contemplación, no solo una percepción momentánea. «He contemplado» preserva mejor ese matiz reverente y experiencial que un simple «vi».
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para contemplar
  - con el fin de ver
  lexicon: HALOT
  rationale: 'El infinitivo indica finalidad. «Para ver» es fiel y claro en español, y mantiene la relación de propósito con lo que sigue: poder y gloria.'
- source_word: עֻזְּךָ
  english_pob_choice: your power
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu poderío
  lexicon: HALOT
  rationale: עֹז abarca fuerza, poder y poderío. «Poder» encaja bien junto a «gloria» y conserva la fuerza divina del término sin exceso interpretativo.
- source_word: וּכְבוֹדֶךָ
  english_pob_choice: and your glory
  chosen_spanish: y tu gloria
  alternatives_spanish:
  - y tu honor
  - y tu esplendor
  lexicon: HALOT
  rationale: כָּבוֹד, aplicado a Dios, se expresa de manera estable como «gloria». Esa equivalencia conserva el peso teológico del término y su resonancia bíblica.
theological_decisions:
- issue: Alcance del ver al Dios en el santuario
  english_pob_reading: The verse recalls the psalmist's prior experience of beholding God in the sanctuary, not a literal sight of the divine essence.
  chosen_spanish_reading: El versículo recuerda una experiencia previa de contemplar a Dios en el santuario, sin afirmar una visión literal de su esencia.
  alternative_spanish_readings:
  - Una visión mística o directa de Dios
  - Una simple observación del lugar santo
  rationale: El hebreo usa verbos ordinarios de visión dentro de un marco de culto. «Te he contemplado en el santuario» conserva la referencia directa a Dios y, a la vez, permite la tensión teológica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin imponer una explicación dogmática ajena al texto
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene el enlace adverbial de כֵּן, el marco cultual de בַּקֹּדֶשׁ, y el valor contemplativo de חזה. No se registran revisiones posteriores que alteren la traducción base.'
  spanish_consistency_notes:
  - Se usa «santuario» para el espacio sagrado, en continuidad con el sentido cultual del hebreo.
  - Se conserva «gloria» para כָּבוֹד y «poder» para עֹז, evitando sustituirlos por términos más débiles o más interpretativos.
  - La nota al pie recoge la alternativa explícita del audit trail inglés y la adapta a una formulación natural en español.
