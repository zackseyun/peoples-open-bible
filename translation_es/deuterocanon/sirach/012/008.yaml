translation:
  language: es
  text: Un amigo no se conoce en la prosperidad[a], ni un enemigo queda oculto en la adversidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Un amante/amigo no es conocido en la buena fortuna, y un odiador/enemigo no queda oculto en la desgracia». El paralelo griego difiere en la primera cola, leyendo aproximadamente: «Un amigo no será vengado/retribuido en bienes». Sin embargo, el hebreo conservado es aquí el testimonio principal y produce un proverbio equilibrado que contrasta prosperidad con adversidad.'
    reason: textual_variant
lexical_decisions:
- source_word: אוֹהֵב / ὁ φίλος
  english_pob_choice: a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - uno que ama
  - un amante
  lexicon: HALOT; Greek φίλος
  rationale: En el dicho sapiencial, el participio describe a una persona caracterizada por la amistad. «Un amigo» preserva el sentido relacional natural en español y corresponde al paralelo griego φίλος.
- source_word: לֹא יִוָּדַע / οὐκ ἐκδικηθήσεται
  english_pob_choice: is not known
  chosen_spanish: no es conocido
  alternatives_spanish:
  - no es reconocido
  - no se da a conocer
  lexicon: HALOT; Greek parallel noted in audit trail
  rationale: Sigo el testimonio hebreo principal, que expresa que la prosperidad no revela quién es el verdadero amigo. «No es conocido» mantiene el valor gnómico y la construcción pasiva/impersonal del original.
- source_word: בַּטּוֹבָה / ἐν ἀγαθοῖς
  english_pob_choice: in prosperity
  chosen_spanish: en la prosperidad
  alternatives_spanish:
  - en la buena fortuna
  - en los buenos tiempos
  lexicon: HALOT
  rationale: Aunque literalmente significa «en lo bueno», el contexto sapiencial pide el sentido de circunstancias favorables. «Prosperidad» es claro y conserva el contraste con la adversidad.
- source_word: וְלֹא יְכֻסֶּה / καὶ οὐ κρυβήσεται
  english_pob_choice: is not hidden
  chosen_spanish: no está oculto
  alternatives_spanish:
  - no está escondido
  - no se oculta
  lexicon: HALOT
  rationale: El pasivo de כסה comunica quedar cubierto/oculto. En español, «no está oculto» reproduce bien la idea de que la adversidad saca a la luz al enemigo.
- source_word: בְרָעָה / ἐν κακοῖς
  english_pob_choice: in adversity
  chosen_spanish: en la adversidad
  alternatives_spanish:
  - en la aflicción
  - en tiempos malos
  lexicon: HALOT
  rationale: Aquí רעה no es mal moral sino desgracia o situación desfavorable. «Adversidad» conserva el registro sapiencial y la antítesis con «prosperidad».
- source_word: שׂוֹנֵא / ὁ ἐχθρός
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - un hater
  - uno que odia
  lexicon: HALOT; Greek ἐχθρός
  rationale: El participio designa a una persona hostil. «Un enemigo» es la equivalencia natural y está confirmada por el paralelo griego.
theological_decisions:
- issue: Manejo de la variante textual entre hebreo y griego en la primera cola
  english_pob_reading: The Hebrew is primary; the Greek parallel differs in the first clause, but the verse is translated from the Hebrew sense.
  chosen_spanish_reading: 'Se traduce la lectura hebrea: «Un amigo no es conocido en la prosperidad».'
  alternative_spanish_readings:
  - «Un amigo no será vengado/retribuido en bienes»
  - «Un amigo no es castigado en bienes»
  rationale: El hebreo atestiguado por Kahana es claro y coherente con el paralelismo antitético del verso. La lectura griega de ἐκδικηθήσεται es divergente, pero no debe desplazar el testimonio hebreo base aquí.
  doctrine_reference: Textual criticism; priority of the Hebrew witness in this record
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «recognized» por «known» para acercarse al hebreo. La presente redacción sigue ese ajuste con «no es conocido», manteniendo el paralelismo con «no está oculto» y respetando el testimonio hebreo principal frente a la divergencia griega en la primera cola.
  spanish_consistency_notes:
  - Se mantiene «amigo» para אוֹהֵב / φίλος en el sentido sapiencial relacional, no romántico.
  - Se traduce רעה como «adversidad» para evitar el sentido moral de «maldad».
  - Se conserva el paralelismo binario prosperidad/adversidad como en el hebreo y el estilo del proverbio.
  - Se evita «Cristo», «SEÑOR» u otros términos no pertinentes al versículo.
