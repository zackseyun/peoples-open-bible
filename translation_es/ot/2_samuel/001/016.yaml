    issue: La fórmula «Tu sangre recaiga sobre tu propia cabeza» cambia una declaración judicial por un matiz optativo/jusivo.
    rationale: דמיך על ראשך funciona aquí como fórmula de imputación de responsabilidad por la propia muerte. El POB inglés eligió la forma declarativa principal («is on your own head») y relegó la formulación más formal a nota. En español, «recaiga» suena a deseo o pronunciamiento volitivo más que a constatación judicial.
