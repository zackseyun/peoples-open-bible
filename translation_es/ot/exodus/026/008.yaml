base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/008.yaml
  text: The length of each curtain shall be thirty cubits[a], and the width of each curtain four cubits[b]; all eleven curtains shall have one measure.
  footnotes:
  - marker: a
    text: Or, more literally, 'the curtain, the one' ... 'the curtain, the one'; Hebrew uses this form distributively, meaning each individual curtain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the same measure.' The Hebrew phrase is literally 'one measure,' emphasizing that all eleven curtains were made to identical dimensions.
    reason: lexical_alternative
