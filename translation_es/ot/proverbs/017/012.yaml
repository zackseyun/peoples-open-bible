translation:
  language: es
  text: Mejor encontrarse con una osa[a] privada de sus crías que con un necio en su necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una osa despojada de sus crías».
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּג֬וֹשׁ
  english_pob_choice: to meet
  chosen_spanish: se encuentre con
  alternatives_spanish:
  - encuentre
  - tope con
  - se tope con
  lexicon: HALOT
  rationale: El infinitivo constructo tiene valor proverbial de encuentro/choque. «Se encuentre con» conserva la idea de una cita o encuentro peligroso sin sonar mecánico en español.
- source_word: דֹּב
  english_pob_choice: bear
  chosen_spanish: osa
  alternatives_spanish:
  - oso
  lexicon: HALOT
  rationale: El contexto de «privada de sus crías» sugiere una hembra, como en el inglés auditado «her cubs». «Osa» comunica mejor la imagen de una madre enfurecida.
- source_word: שַׁכּ֣וּל
  english_pob_choice: robbed of her cubs
  chosen_spanish: privada de sus crías
  alternatives_spanish:
  - despojada de sus crías
  - sin sus crías
  - enlutada de sus crías
  lexicon: HALOT
  rationale: El adjetivo expresa estar privada de descendencia/pequeños; en español «privada de sus crías» conserva el sentido y evita una traducción demasiado interpretativa como «enlutada».
- source_word: בְּאִישׁ
  english_pob_choice: than a man
  chosen_spanish: que con un necio
  alternatives_spanish:
  - que con un hombre
  - que con un hombre necio
  lexicon: HALOT
  rationale: El hebreo contrapone el encuentro con un hombre a la alternativa del necio. En español la comparación se vuelve natural con «Mejor que... que con...», y el sustantivo genérico queda implícito en la estructura proverbial, como en la revisión inglesa.
- source_word: כְּסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - insensato
  - estúpido
  lexicon: HALOT
  rationale: En literatura sapiencial, el término es ético y no meramente intelectual. «Necio» es un equivalente tradicional y claro en español para ese matiz.
- source_word: בְּאִוַּלְתּוֹ
  english_pob_choice: in his folly
  chosen_spanish: en su necedad
  alternatives_spanish:
  - en su locura
  - en su insensatez
  - en su necedad obstinada
  lexicon: HALOT
  rationale: La expresión señala al necio actuando dentro de su propia necedad. «En su necedad» mantiene el paralelismo con el inglés auditado y su fuerza proverbial.
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió más explícita la construcción hebrea («let ... meet a man, rather than ...») sin cambiar el sentido. La propuesta española refleja esa comparación mediante «Mejor que... que con...», manteniendo la fuerza proverbial y la cercanía al orden semítico.
  spanish_consistency_notes:
  - Se mantuvo «necio/necedad» para preservar la familia léxica de כְּסִיל / אִוַּלְתּוֹ.
  - Se eligió «osa» en lugar de «oso» por coherencia con el referente femenino implícito en la nota inglesa y la imagen materna del proverbio.
  - La puntuación comparativa busca sonar natural en español sin suavizar la dureza del contraste.
