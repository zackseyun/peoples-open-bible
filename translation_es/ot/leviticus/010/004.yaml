    rationale: Aunque intenta reflejar la direccionalidad de אֶל, en español bíblico natural debe decirse «fuera del campamento»; el sentido de movimiento ya lo aporta «lleven». Mantener «a fuera» perjudica la legibilidad sin ganar fidelidad real.
  - severity: low
