    issue: La nota [a] sobre «como él» no corresponde bien al ancla ni a una alternativa preservada por el POB inglés.
    rationale: El POB inglés solo conserva una nota léxica en «foreign women». La explicación del contraste contextual no requiere nota, y anclarla en «como él» puede confundir al lector sobre qué elemento varía.
