    issue: Modo verbal incorrecto tras 'para que'
    rationale: 'El texto dice ''para que maman'', pero tras ''para que'' debe usarse subjuntivo: ''mamen''. Lo mismo aplica a la coordinación verbal en la oración.'
  - severity: medium
    issue: Plural 'sus pechos' frente al singular hebreo
    rationale: מִשֹּׁד es singular ('del pecho'). El plural puede sonar idiomático en ciertos contextos, pero aquí se aparta innecesariamente del texto fuente y del inglés auditado ('her breast').
  - severity: medium
    issue: '''chupen profundamente'' suena tosco en español publicable'
    rationale: Aunque intenta preservar la fuerza de תָּמֹצּוּ, en español eclesial general resulta menos natural. 'Beban profundamente' refleja la decisión principal auditada y la nota puede conservar 'saquen'/'chupen' como alternativas literales.
