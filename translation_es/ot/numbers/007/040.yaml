lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho de cabrío
  alternatives_spanish:
  - cabrío macho
  - chivo macho
  - macho cabrío
  lexicon: HALOT
  rationale: La expresión hebrea designa un macho de entre las cabras; en español, «macho de cabrío» conserva la referencia sacrificial y el rasgo de sexo masculino sin recurrir a un calco poco natural. Evita también confundirlo con una especie distinta o con un sentido meramente genérico de «cabra».
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - una sola
  lexicon: HALOT
  rationale: El numeral se vierte de forma directa como parte de la serie enumerativa de ofrendas en Números 7. Aquí no hace falta explicitar artículo indefinido, porque el español puede omitirlo sin perder el valor cuantitativo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para una ofrenda por el pecado
  - para sacrificio por el pecado
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת nombra la ofrenda expiatoria, no el pecado abstracto. «Ofrenda por el pecado» es la forma más clara y fiel en español; se prefiere «para» por el valor funcional del ל prefijado en la fórmula de inventario.
theological_decisions:
- issue: Valor sacrificial de חַטָּאת
  english_pob_reading: for a sin offering
  chosen_spanish_reading: para ofrenda por el pecado
  alternative_spanish_readings:
  - como ofrenda por el pecado
  - para una ofrenda por el pecado
  rationale: La lectura del POB distingue la categoría ritual de la noción abstracta de pecado. En español, «ofrenda por el pecado» comunica esa categoría sin desplazar el centro semántico hacia una mera culpa moral.
  doctrine_reference: Levítico 4; Levítico 7:37-38; Números 7
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo breve y coincide con la lectura inglesa auditada; no se requieren notas textuales ni alternativas en este versículo porque la única variación documentada en el POB es léxica y puede resolverse en la línea principal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece aquí el Tetragrámaton ni una cita del nombre divino.
  - Se evita «Cristo/Mesías» porque el versículo es puramente cultual y no contiene ese término.
  - Se mantiene un registro sobrio y formular, adecuado para una lista de ofrendas en Números 7.
