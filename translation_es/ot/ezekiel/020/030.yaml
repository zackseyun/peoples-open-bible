translation:
  language: es
  text: 'Por tanto, di a la casa de Israel: Así dice el Señor Yahvé: ¿Se están contaminando[a] en el camino de sus padres, y prostituyéndose tras sus cosas abominables[b]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Se están volviendo impuros en el camino de sus padres?». El verbo hebreo también puede entenderse con sentido más activo/reflexivo: «¿se están contaminando?» o «¿se hacen impuros?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus abominaciones»; en contexto, también puede referirse a «sus ídolos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Conserva el valor inferencial/conclusivo del hebreo y su tono profético sin sonar demasiado coloquial.
- source_word: אֱמֹר אֶל בֵּית יִשְׂרָאֵל
  english_pob_choice: say to the house of Israel
  chosen_spanish: di a la casa de Israel
  alternatives_spanish:
  - habla a la casa de Israel
  lexicon: HALOT
  rationale: Mantiene la fórmula de comisión profética. 'Casa de Israel' preserva el designio corporativo y pactual.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord Yahweh
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Yahweh
  - Así dice el Señor Dios
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto de traducir יְהוָה como 'Yahvé'. 'Señor' representa אֲדֹנָי y evita repetir el nombre divino dos veces. Se mantiene la fórmula profética solemne.
- source_word: הַבְּדֶרֶךְ אֲבוֹתֵיכֶם
  english_pob_choice: in the way of your fathers
  chosen_spanish: en el camino de sus padres
  alternatives_spanish:
  - en la senda de sus padres
  - según el camino de sus padres
  lexicon: HALOT
  rationale: '''Camino'' traduce bien דֶרֶךְ y conserva la imagen de conducta heredada. ''Sus padres'' refleja el sufijo de segunda persona plural.'
- source_word: אַתֶּם נִטְמְאִים
  english_pob_choice: Are you defiling yourselves
  chosen_spanish: ¿Se están volviendo impuros[a]?
  alternatives_spanish:
  - ¿Se están contaminando?
  - ¿Se hacen impuros?
  lexicon: HALOT
  rationale: 'Se conserva la alternativa registrada en el aparato inglés: el participio puede expresar tanto ''defiling yourselves'' como ''becoming unclean''. ''Volviéndose impuros'' mantiene la fuerza del estado resultante sin perder la ambigüedad lexical. Se ancla con nota por la alternativa textual/lexical.'
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables[b]
  alternatives_spanish:
  - sus abominaciones
  - sus ídolos
  lexicon: HALOT
  rationale: '''Cosas detestables'' preserva el sentido amplio sin reducirlo de antemano a ''ídolos''; en contexto puede incluir ídolos. Se marca la alternativa porque el inglés POB la preserva en nota.'
- source_word: זֹנִים
  english_pob_choice: whoring
  chosen_spanish: prostituyéndose
  alternatives_spanish:
  - fornicando
  - yéndose de prostitutas
  lexicon: HALOT
  rationale: Se conserva la metáfora profética sexual de זנה. 'Prostituyéndose' comunica con claridad el acto figurado de infidelidad idolátrica en español contemporáneo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: La política del proyecto exige renderizar יְהוָה como 'Yahvé'. Al aparecer junto a אֲדֹנָי, 'Señor Yahvé' preserva ambas voces divinas sin ocultar el nombre del pacto. 'Dios' no expresa el valor del término hebreo en este caso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Should נִטְמְאִים be rendered as present defilement or becoming unclean
  english_pob_reading: Are you defiling yourselves
  chosen_spanish_reading: ¿Se están volviendo impuros?
  alternative_spanish_readings:
  - ¿Se están contaminando?
  - ¿Se hacen impuros?
  rationale: El hebreo participial permite tanto el proceso como el estado resultante. La elección española conserva la posibilidad de leerlo como estado adquirido sin cerrar la alternativa que el POB inglés documenta.
  doctrine_reference: HALOT; English POB lexical note
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que sustituyó 'GOD' por 'Yahweh' en inglés; en español se aplicó la política del proyecto 'Yahvé' para יְהוָה, manteniendo la distinción con אֲדֹנָי mediante 'Señor Yahvé'. Se conservó la fuerza metafórica de זנה y la amplitud semántica de שִׁקּוּצִים con nota alternativa.
  spanish_consistency_notes:
  - '''Yahvé'' se usa para el nombre divino יְהוָה, conforme al estándar del proyecto.'
  - '''Señor'' traduce אֲדֹנָי en la fórmula profética.'
  - '''casa de Israel'' se mantiene como designación corporativa pactual.'
  - Se conservó la metáfora sexual de infidelidad idolátrica en 'prostituyéndose'.
  - Se evitó estrechar 'cosas detestables' a 'ídolos' en el texto principal, dejando la alternativa en nota.
