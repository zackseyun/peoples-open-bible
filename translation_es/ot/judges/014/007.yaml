translation:
  language: es
  text: Entonces bajó y habló a la mujer, y ella fue grata[a] a los ojos de Sansón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «agradó a Sansón» o «le pareció bien a Sansón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: Then he went down
  chosen_spanish: Entonces bajó
  alternatives_spanish:
  - Y bajó
  - Bajó
  lexicon: HALOT
  rationale: El hebreo narra un movimiento descendente; «bajó» conserva ese sentido concreto. «Entonces» refleja de manera natural la secuencia narrativa del waw consecutivo en español, sin recargar la frase con un calco repetitivo de «y».
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - hizo hablar con
  - conversó
  lexicon: HALOT
  rationale: דבר con ל introduce al interlocutor; en español, «habló a la mujer» comunica la dirección del discurso de forma fiel y fluida. «Conversó» sería más coloquial y sugiere un intercambio más simétrico que el hebreo no exige.
- source_word: לָאִשָּׁה
  english_pob_choice: to the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a la joven
  - a la esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar «mujer» o «esposa» según el contexto. Aquí no conviene cargar el término con «esposa», porque todavía no hay matrimonio; «la mujer» mantiene la neutralidad contextual.
- source_word: וַתִּישַׁר
  english_pob_choice: she was pleasing
  chosen_spanish: fue agradable
  alternatives_spanish:
  - le agradó
  - fue grata
  - le pareció bien
  lexicon: HALOT
  rationale: El verbo ישר aquí expresa que la mujer resultó aprobada o agradable a la evaluación de Sansón. «Fue agradable» conserva el matiz estativo mejor que una paráfrasis más interpretativa como «le agradó», aunque en español requiere la precisión idiomática del complemento siguiente.
- source_word: בְּעֵינֵי שִׁמְשׁוֹן
  english_pob_choice: in Samson’s eyes
  chosen_spanish: a los ojos de Sansón
  alternatives_spanish:
  - para Sansón
  - en la opinión de Sansón
  - según Sansón
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se conserva para mantener la imagen evaluativa y su posible eco literario con el motivo de Jueces sobre lo que parece correcto a los propios ojos. En español, «a los ojos de Sansón» es natural y transparente.
theological_decisions:
- issue: Posible resonancia temática con el motivo de Jueces sobre lo que es recto a los propios ojos
  english_pob_reading: Retain the Hebrew idiom 'in Samson’s eyes' in the main text
  chosen_spanish_reading: Conservar «a los ojos de Sansón» en el texto principal
  alternative_spanish_readings:
  - «para Sansón»
  - «le pareció bien a Sansón»
  rationale: No se trata de una diferencia doctrinal, pero sí de una tensión literaria importante. Mantener la imagen del hebreo preserva el posible enlace con el tema recurrente de Jueces sin resolverlo demasiado pronto en una paráfrasis.
  doctrine_reference: Preservar la tensión literaria y teológica del texto
- issue: Valor semántico de וַתִּישַׁר en relación con aprobación, agrado o rectitud
  english_pob_reading: she was pleasing
  chosen_spanish_reading: fue agradable
  alternative_spanish_readings:
  - le agradó
  - fue recta
  - le pareció apropiada
  rationale: El hebreo admite una zona semántica que puede sugerir agradabilidad, adecuación o rectitud. «Fue agradable» deja abierta esa tensión sin imponerse demasiado en una sola dirección.
  doctrine_reference: Mantener la amplitud semántica del verbo hebreo
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés y la fuente hebrea directa, manteniendo la secuencia narrativa, el verbo direccional, el objeto humano neutral y la imagen idiomática de evaluación sin suavizar la posible resonancia temática del libro.
  spanish_consistency_notes:
  - Se usa «Sansón» como forma estable del nombre propio.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - La nota léxica conserva la alternativa idiomática porque el hebreo permite más de una lectura natural en español.
