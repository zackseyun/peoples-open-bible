translation:
  language: es
  text: Yahvé[a] está lejos de los impíos, pero oye la oración de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; se conserva el nombre divino en lugar de sustituirlo por un título.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָחוֹק
  english_pob_choice: far from
  chosen_spanish: está lejos de
  alternatives_spanish:
  - está distante de
  - está apartado de
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa distancia relacional, no solo geográfica. «Está lejos de» es natural en español y conserva el contraste sapiencial del proverbio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrama. En español del proyecto, la forma de uso principal es «Yahvé», que mantiene el nombre propio divino en lugar de sustituirlo por un título.
- source_word: מֵרְשָׁעִים
  english_pob_choice: from the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los malhechores
  lexicon: HALOT
  rationale: רְשָׁעִים designa personas caracterizadas por impiedad o maldad moral. «Impíos» es un término bíblico y claro en español, y conserva el valor de clase moral del sustantivo.
- source_word: וּתְפִלַּת
  english_pob_choice: but he hears the prayer
  chosen_spanish: pero oye la oración
  alternatives_spanish:
  - y oye la oración
  - pero escucha la oración
  lexicon: HALOT
  rationale: La conjunción waw establece contraste en sentido; en español «pero» comunica mejor la oposición proverbial. «Oye» reproduce con sobriedad el sentido de שׁמע sin convertirlo en «responde».
- source_word: צַדִּיקִים
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los piadosos
  lexicon: HALOT
  rationale: צַדִּיקִים se refiere a los que son justos o rectos. «Justos» es la designación estándar y más natural en literatura sapiencial española.
- source_word: יִשְׁמָע
  english_pob_choice: he hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - atiende
  lexicon: HALOT
  rationale: שׁמע significa «oír/escuchar». En el contexto de la oración, «oye» preserva la fuerza léxica sin sobreinterpretar el verbo como respuesta automática.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El verso contiene el Tetragrama de forma explícita. La política del proyecto evita el reemplazo por un título y conserva el nombre divino; en español, «Yahvé» es la forma adoptada para mantener esa distinción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la distancia divina respecto de los impíos
  english_pob_reading: The verse states relational distance and refusal of favorable regard, not absolute absence or ignorance.
  chosen_spanish_reading: El verso expresa distancia relacional y falta de favor, no ausencia espacial absoluta ni incapacidad de conocer.
  alternative_spanish_readings:
  - Dios está espacialmente ausente de los impíos
  - Dios no puede oír a los impíos en ningún sentido
  rationale: «Está lejos de» conserva la imagen hebrea sin convertirla en una tesis metafísica más fuerte de lo que el proverbio afirma. El segundo hemistiquio aclara el contraste con la oración de los justos.
  doctrine_reference: 'DOCTRINE.md: Wisdom poetry — relational distance language'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el auditor inglés: conserva el contraste proverbial, el nombre divino como nombre propio, y el valor semántico de שׁמע como «oír» sin ampliarlo a «responder». No se requirieron revisiones previas adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יְהוָה, en coherencia con el proyecto.
  - Se usó «impíos» y «justos» por ser términos sapienciales naturales y consistentes en español bíblico.
  - La construcción «está lejos de… pero oye…» preserva el paralelismo antitético del hebreo.
  - No se añadió una nota sobre alternativas de traducción para שׁמע porque «oye» comunica adecuadamente el valor lexical aquí.
