revisions:
- from: Él tensó su arco como un enemigo; su mano derecha se alzó como un[a] foe[b], y mató a todos los que eran agradables a la vista en la tienda de la hija de Sion; derramó su furor como fuego.
  to: Él tensó su arco como un enemigo; su mano derecha estaba lista como un adversario, y mató a todos los que eran agradables a la vista[a] en la tienda de la hija de Sion; derramó su furor como fuego.
  rationale: La revisión corrige un error grave de idioma y fidelidad («foe»), mejora la representación de נִצָּב יְמִינוֹ con una frase española natural que mantiene la postura de combate, y conserva la segunda comparación hostil con «adversario». También simplifica las notas para reflejar la principal alternativa léxica preservada por el POB inglés, evitando notas innecesarias o mal ancladas.
