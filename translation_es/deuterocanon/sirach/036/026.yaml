translation:
  language: es
  text: El que adquiere una esposa comienza una adquisición, una ayudante correspondiente a él y un pilar de reposo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κτώμενος
  english_pob_choice: He who acquires
  chosen_spanish: El que adquiere
  alternatives_spanish:
  - Quien adquiere
  - El que obtiene
  lexicon: LSJ / BDAG (cognate with κτῆσις)
  rationale: Conservo el valor proverbial del participio con un sujeto masculino singular sin volverlo plural ni impersonal de más. «Adquiere» mantiene mejor que «obtiene» la relación léxica con κτήσεως y el juego de palabras del original.
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: BDAG
  rationale: En este contexto de formación de hogar y en aposición con la ayuda correspondiente, el sentido es marital; «esposa» es más preciso que el más amplio «mujer».
- source_word: ἐνάρχεται
  english_pob_choice: begins
  chosen_spanish: comienza
  alternatives_spanish:
  - empieza
  - da inicio a
  lexicon: LSJ
  rationale: «Comienza» expresa con naturalidad el inicio de la acción y conserva el sentido de inauguración del verbo sin añadir matices innecesarios.
- source_word: κτήσεως
  english_pob_choice: an acquisition
  chosen_spanish: una adquisición
  alternatives_spanish:
  - una posesión
  - propiedad
  lexicon: LSJ
  rationale: «Adquisición» preserva el juego cognado con «adquiere» y mantiene visible la repetición léxica del texto griego, que sería menos clara con «posesión» o «propiedad».
- source_word: βοηθὸν
  english_pob_choice: a helper
  chosen_spanish: una ayuda
  alternatives_spanish:
  - una ayudante
  - un auxilio
  lexicon: BDAG
  rationale: En español, «una ayuda» transmite el sustantivo funcional con concisión y evita un tecnicismo innecesario; mantiene el sentido de ayuda-complemento presente en el original.
- source_word: κατʼ αὐτόν
  english_pob_choice: corresponding to him
  chosen_spanish: correspondiente a él
  alternatives_spanish:
  - según él
  - adecuada a él
  - coincidente con él
  lexicon: LSJ
  rationale: La frase griega indica correspondencia o adecuación. «Correspondiente a él» es formal y transparente, y conserva la tensión de relación sin resolverla hacia una sola imagen interpretativa.
- source_word: στύλον
  english_pob_choice: a pillar
  chosen_spanish: una columna
  alternatives_spanish:
  - un pilar
  - un soporte
  lexicon: LSJ
  rationale: «Columna» mantiene la metáfora arquitectónica de forma clara y digna en español; «pilar» también sería posible, pero «columna» suena más natural junto a «reposo».
- source_word: ἀναπαύσεως
  english_pob_choice: of rest
  chosen_spanish: de reposo
  alternatives_spanish:
  - de descanso
  - de alivio
  lexicon: BDAG
  rationale: «Reposo» conserva el matiz de quietud, estabilidad y descanso duradero. Es más sobrio y literario que «descanso», y encaja bien con la imagen de una «columna».
theological_decisions:
- issue: Sujeto proverbial masculino singular
  english_pob_reading: He who acquires a wife
  chosen_spanish_reading: El que adquiere una esposa
  alternative_spanish_readings:
  - Quien adquiere una esposa
  - La persona que adquiere una esposa
  rationale: Sigo el valor masculino singular del griego y del audit trail inglés, sin neutralizarlo. En español, «el que» conserva el tono proverbial y la exactitud gramatical documentada.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Relación semántica de κατʼ αὐτόν
  english_pob_reading: corresponding to him
  chosen_spanish_reading: correspondiente a él
  alternative_spanish_readings:
  - adecuada a él
  - según él
  rationale: Evito traducir la frase como mera «compatibilidad» o como una referencia anacrónica a Génesis. «Correspondiente a él» refleja la idea relacional sin borrar la ambigüedad productiva del griego.
  doctrine_reference: Principio POB de no aplanar tensiones léxicas o teológicas
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés, que prefirió una sintaxis continua con coma y una formulación más formal para κατʼ αὐτόν. En español mantengo esa continuidad sintáctica y conservo el paralelismo cognado entre «adquiere» y «adquisición».
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiere; aquí no aparece ningún nombre divino.
  - Mantengo «esposa» por el contexto matrimonial explícito, no «mujer».
  - Elegí «reposo» en lugar de «descanso» para sostener la imagen proverbial y el registro sobrio.
  - No añadí notas al pie porque el español puede integrar aquí el juego léxico principal sin necesidad de alternativas textuales en el cuerpo.
