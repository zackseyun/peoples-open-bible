revisions:
- from: Así que Abram fue, tal como Yahvé le había hablado, y Lot fue con él. Abram tenía setenta y cinco años cuando salió de Harán.
  to: Abram se fue, tal como Yahvé le había hablado, y Lot fue con él. Abram tenía setenta y cinco años cuando salió de Harán.
  rationale: Se elimina «Así que» para no añadir un matiz consecutivo no exigido por el hebreo, y se sustituye «Abram fue» por «Abram se fue» para lograr una narración más natural en español sin perder el sentido básico de וַיֵּלֶךְ. No se requieren notas.
  reviewer_model: gpt-5.4
