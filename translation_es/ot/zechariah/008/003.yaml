translation:
  language: es
  text: 'Así dice Yahvé: He vuelto a Sion y habitaré en medio de Jerusalén, y Jerusalén será llamada la Ciudad de Verdad[a], y el monte de Yahvé de los Ejércitos[b], el Monte Santo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de fidelidad». El hebreo אֱמֶת puede denotar verdad, fiabilidad o fidelidad.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «el monte de Yahvé de las Huestes». El hebreo צְבָאוֹת se traduce aquí «Ejércitos» para hacer más transparente su sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de manera directa y natural en español. Conserva el tono solemne del mensajero sin introducir paráfrasis.
- source_word: שַׁבְתִּי
  english_pob_choice: I have returned
  chosen_spanish: He vuelto
  alternatives_spanish:
  - He regresado
  - Vuelvo
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción cumplida con relevancia presente en el discurso profético. 'He vuelto' mantiene esa fuerza y suena más natural que un calco más pesado.
- source_word: אֶל צִיּוֹן
  english_pob_choice: to Zion
  chosen_spanish: a Sion
  alternatives_spanish:
  - a Zion
  - a Sión
  lexicon: HALOT
  rationale: Se conserva el nombre bíblico en forma española usual 'Sion'. La preposición direccional 'a' refleja אֶל.
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: and will dwell
  chosen_spanish: habitaré
  alternatives_spanish:
  - moraré
  - y me estableceré
  lexicon: HALOT
  rationale: '''Habitar'' transmite el valor de שכן sin forzar una versión técnica como ''tabernacular''. En español funciona bien para la presencia divina establecida en medio de su pueblo.'
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  english_pob_choice: in the midst of Jerusalem
  chosen_spanish: en medio de Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  - en el centro de Jerusalén
  lexicon: HALOT
  rationale: '''En medio de'' preserva la idea de presencia central e inmanente que va más allá de un simple ''en''.'
- source_word: עִיר הָאֱמֶת
  english_pob_choice: the City of Truth
  chosen_spanish: Ciudad de Verdad
  alternatives_spanish:
  - Ciudad de fidelidad
  - Ciudad de verdad
  lexicon: HALOT
  rationale: Se mantiene la posibilidad lexical de אֱמֶת como 'verdad', evitando suavizarlo prematuramente por 'fidelidad'. En español, la mayúscula en el título ayuda a notar que es un nombre dado a Jerusalén.
- source_word: הַר יְהוָה צְבָאוֹת
  english_pob_choice: the mountain of Yahweh of Armies
  chosen_spanish: el monte de Yahvé de los Ejércitos
  alternatives_spanish:
  - el monte de Yahvé de los Ejércitos Celestiales
  - el monte de Yahvé de los Hosts
  lexicon: HALOT
  rationale: Se conserva la terminología del nombre divino con el equivalente transparente 'Ejércitos', siguiendo la decisión auditada de la POB inglesa. 'Monte' corresponde de forma natural a הַר.
- source_word: הַר הַקֹּדֶשׁ
  english_pob_choice: the Holy Mountain
  chosen_spanish: Monte Santo
  alternatives_spanish:
  - monte santo
  - el santo monte
  lexicon: HALOT
  rationale: La aposición final se vierte como un título breve y bíblico. 'Monte Santo' es idiomático y fiel a la densidad hebrea.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La línea editorial del proyecto pide reflejar el nombre del pacto como 'Yahvé' y no ocultarlo bajo un sustituto litúrgico. Se mantiene coherencia con el texto fuente y con el criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor temporal de los verbos de restauración
  english_pob_reading: I have returned ... and will dwell
  chosen_spanish_reading: He vuelto ... y habitaré
  alternative_spanish_readings:
  - Vuelvo ... y habito
  - He vuelto ... y he habitado
  rationale: La primera cláusula expresa retorno ya realizado; la segunda proyecta el resultado prometido de la presencia divina. En español conviene conservar esa tensión profética sin homogeneizar ambos verbos.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: אֱמֶת como cualidad de Jerusalén
  english_pob_reading: Truth / faithfulness
  chosen_spanish_reading: Verdad
  alternative_spanish_readings:
  - fidelidad
  - lealtad
  rationale: '''Verdad'' es la opción más directa del campo semántico y la que mejor conserva el nombre-título de la ciudad. Las alternativas siguen siendo posibles, pero desplazan el matiz lexical principal.'
  doctrine_reference: HALOT אֱמֶת
translation_notes:
  revision_awareness: Se tuvo en cuenta el archivo auditado en inglés con acuerdo alto y sin revisiones aplicadas; la redacción española sigue sus decisiones principales, pero adapta el registro para que sea natural y bíblico en español, manteniendo la tensión temporal y el valor del nombre divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Sion'' se conserva como topónimo bíblico españolizado, y ''Jerusalén'' como forma estándar.'
  - '''Ejércitos'' traduce צְבָאוֹת de manera transparente en vez de sustituirlo por ''Huestes''.'
  - La capitalización de 'Ciudad de Verdad' y 'Monte Santo' busca reflejar el carácter titular de las expresiones hebreas.
