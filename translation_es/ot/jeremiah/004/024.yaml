review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: observación profética, marcador deíctico («y he aquí»), distinción entre הָרִים y גְּבָעוֹת, y la idea de conmoción sísmica. Sin embargo, «Miré a los montes» suena menos natural en español para una escena observada; «Miré los montes» o «Vi los montes» encaja mejor. Además, «todas las colinas» sobretraduce וְכָל הַגְּבָעוֹת, que se expresa más naturalmente como «todas las colinas» o «todas las lomas», pero aquí el problema principal es de pie de nota: la nota [a] afirma que «montes» conserva mejor la distinción que «montañas», cuando el inglés POB eligió explícitamente «mountains». Conviene alinear la opción principal con «montañas» y mantener «montes» como alternativa si se desea notar el matiz.'
  spanish_quality_summary: El texto es claro y digno, pero necesita un pequeño ajuste para mayor naturalidad y mejor alineación con el POB inglés. «Miré a los montes» resulta algo forzado con objeto inanimado. «Montañas» es más transparente para lectura amplia y corresponde mejor a la decisión inglesa documentada; «colinas» está bien. «Fueron sacudidas» comunica adecuadamente el resultado pasivo del verbo final.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La revisión propuesta mejora la coherencia con la decisión léxica auditada: הָרִים -> «montañas» y הַגְּבָעוֹת -> «colinas», conservando la distinción topográfica. «Y he aquí» y «temblaban» siguen siendo apropiados.'
  issues:
  - severity: medium
    issue: «Miré a los montes» es poco natural en español en este contexto.
    rationale: Con un objeto paisajístico, el español normalmente dice «miré los montes/montañas» o «vi las montañas». La preposición «a» no aporta fidelidad al hebreo y hace la frase más torpe.
  - severity: medium
    issue: «los montes» se aparta innecesariamente de la decisión inglesa «the mountains».
    rationale: Aunque «montes» es posible, el POB inglés documentó «mountains» precisamente para distinguirlo de «hills». En español, «montañas» mantiene esa distinción con igual claridad y es más universal.
  - severity: low
    issue: La nota [a] justifica «montes» como mejor que «montañas», pero esa justificación no coincide con la auditoría inglesa.
    rationale: La nota debería preservar la alternativa, no invertir la preferencia principal establecida en el expediente.
  revised_spanish_text: Miré las montañas[a], y he aquí, temblaban, y todas las colinas[b] fueron sacudidas.
