translation:
  language: es
  text: 'Entonces Moisés fue y volvió a Jetró[a], su suegro, y le dijo: «Por favor, déjame ir y volver a mis hermanos[b] que están en Egipto, para ver si todavía viven». Y Jetró dijo a Moisés: «Ve en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene la forma del nombre יֶתֶר en la primera mención y יִתְרוֹ en la segunda; en español se unifica por claridad, porque se trata claramente de la misma persona.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «mis parientes» para אַחַי, pero el hebreo dice literalmente «mis hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: Then Moses went
  chosen_spanish: Entonces Moisés fue
  alternatives_spanish:
  - Y Moisés fue
  - Así que Moisés fue
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración. «Entonces» marca progresión narrativa natural en español; «fue» conserva el movimiento sin volverlo más interpretativo de lo necesario.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: HALOT
  rationale: שׁוּב expresa retorno. «Volvió» es breve y natural, y mantiene el vínculo léxico con la idea de volver que aparece en el pedido de Moisés.
- source_word: יֶתֶר / יִתְרוֹ
  english_pob_choice: Jethro
  chosen_spanish: Jetró
  alternatives_spanish:
  - Jetro
  lexicon: HALOT
  rationale: El hebreo presenta dos formas del mismo nombre en el versículo. En español se unifica por claridad, pero se conserva la variación en nota. «Jetró» sigue la forma castellana tradicional del nombre con adaptación gráfica uniforme.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su padrino
  - su pariente por alianza
  lexicon: HALOT
  rationale: El contexto especifica la relación de Moisés con el padre de su esposa. «Suegro» es el equivalente preciso y natural en español.
- source_word: אֵלֲכָה נָּא
  english_pob_choice: Please let me go
  chosen_spanish: Por favor, déjame ir
  alternatives_spanish:
  - Por favor, permíteme ir
  - Déjame ir, por favor
  lexicon: HALOT
  rationale: La forma cohortativa con נָא expresa petición cortés. «Por favor, déjame ir» conserva el tono deferente de Moisés hacia su suegro sin volverlo demasiado formal o arcaico.
- source_word: וְאָשׁוּבָה
  english_pob_choice: and return
  chosen_spanish: y volver
  alternatives_spanish:
  - y regresar
  - y vuelva
  lexicon: HALOT
  rationale: La cohorte continúa el pedido de ir y regresar. «Volver» preserva el paralelismo con שׁוּב y es idiomático en español.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis familiares
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mis hermanos». Aunque puede tener sentido ampliado de parentesco, el texto base conserva la forma fraternal, y el español puede reflejarla sin pérdida.
- source_word: וְאֶרְאֶה
  english_pob_choice: so that I may see
  chosen_spanish: para ver
  alternatives_spanish:
  - para que vea
  - y ver
  lexicon: HALOT
  rationale: La cláusula expresa finalidad. «Para ver» comunica la intención de Moisés de modo conciso y natural en español.
- source_word: הַעוֹדָם חַיִּים
  english_pob_choice: whether they are still alive
  chosen_spanish: si todavía viven
  alternatives_spanish:
  - si aún están vivos
  - si siguen con vida
  lexicon: HALOT
  rationale: La pregunta implícita del hebreo se expresa con «si». «Todavía viven» refleja el valor de עוֹד («todavía/aún») y el plural del predicado en una construcción española fluida.
- source_word: לֵךְ לְשָׁלוֹם
  english_pob_choice: Go in peace
  chosen_spanish: Ve en paz
  alternatives_spanish:
  - Vete en paz
  - Anda en paz
  lexicon: HALOT
  rationale: El hebreo usa un saludo/despedida de paz. «Ve en paz» es directo, fiel y natural; evita un matiz más litúrgico que el contexto no exige.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés. No se requirieron cambios de revisión previos; se mantuvo la tensión textual del nombre con una nota y se preservó la literalidad de אַחַי sin perder fluidez española.
  spanish_consistency_notes:
  - Se usó «Moisés» y «Jetró» de forma uniforme en todo el versículo.
  - Se mantuvo el paralelismo de retorno con «volver» para שׁוּב.
  - «En paz» conserva el valor idiomático de despedida benévola del hebreo.
  - Se evitó sustituir «hermanos» por un término más general en el texto principal para no borrar la forma léxica del hebreo.
