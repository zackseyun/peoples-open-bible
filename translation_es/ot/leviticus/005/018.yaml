translation:
  language: es
  text: Traerá al sacerdote un carnero sin defecto, del rebaño[a], conforme a tu valoración, para una ofrenda por la culpa; y el sacerdote hará expiación por él, por el error que cometió inadvertidamente, aunque no lo sabía[b]; y le será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para una ofrenda de reparación». אָשָׁם designa una categoría sacrificial específica.
    reason: lexical_alternative
  - marker: b
    text: O «por su pecado inadvertido». El hebreo destaca un error cometido por inadvertencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: He shall bring
  chosen_spanish: Traerá
  alternatives_spanish:
  - y traerá
  - deberá traer
  lexicon: HALOT
  rationale: En un mandato legal, el verbo hebreo con valor prescriptivo se expresa con futuro de obligación en español. «Traerá» conserva la fuerza normativa sin añadir una perífrasis innecesaria.
- source_word: אַיִל
  english_pob_choice: a ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho de oveja
  - un macho
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para el animal sacrificial adulto macho.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin mancha ni defecto
  - impecable
  lexicon: HALOT
  rationale: En contexto sacrificial, el término indica un animal sin defecto físico. «Sin defecto» transmite bien la idea cultual en español actual, con menos carga idiomática que «sin mancha».
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de las ovejas y las cabras
  - de la pequeña ganadería
  lexicon: HALOT
  rationale: Aunque צֹאן puede abarcar ovejas y cabras, en combinación con אַיִל la referencia funciona de manera colectiva. «Rebaño» es breve, natural y conserva el sentido general.
- source_word: בְּעֶרְכְּךָ
  english_pob_choice: according to your valuation
  chosen_spanish: conforme a tu valoración
  alternatives_spanish:
  - según tu valoración
  - según tu tasación
  - al valor que fijes
  lexicon: HALOT
  rationale: La frase remite a una valoración normativa dentro del procedimiento legal-sacrificial. «Conforme a tu valoración» conserva la relación formal y no identifica innecesariamente al agente de la tasación.
- source_word: לְאָשָׁם
  english_pob_choice: for a guilt offering
  chosen_spanish: como ofrenda por la culpa
  alternatives_spanish:
  - como ofrenda por la culpa/culpabilidad
  - como ofrenda de reparación
  - como ofrenda de culpa
  lexicon: HALOT
  rationale: Se mantiene la tensión léxica del hebreo אָשָׁם, que nombra una categoría sacrificial específica y también sugiere culpa/culpabilidad. «Ofrenda por la culpa» preserva esa conexión sin imponer de entrada la sola etiqueta técnica «ofrenda por el pecado».
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: the priest shall make atonement for him
  chosen_spanish: el sacerdote hará expiación por él
  alternatives_spanish:
  - el sacerdote hará expiación a favor de él
  - el sacerdote hará expiación en favor suyo
  - el sacerdote hará expiación por su causa
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal expresa el acto expiatorio/atonante. «Hará expiación» es fiel y digno; «por él» conserva la preposición de beneficio o referencia personal de עָלָיו.
- source_word: עַל שִׁגְגָתוֹ
  english_pob_choice: concerning the error
  chosen_spanish: por el error
  alternatives_spanish:
  - por su error
  - a causa del error
  - respecto de su error
  lexicon: HALOT
  rationale: שׁגגה apunta a una falta cometida por inadvertencia o error. «Por el error» preserva la relación causal/explicativa sin introducir aún la categoría más fuerte de «pecado».
- source_word: אֲשֶׁר שָׁגָג
  english_pob_choice: that he committed unintentionally
  chosen_spanish: que cometió inadvertidamente
  alternatives_spanish:
  - que cometió sin darse cuenta
  - que erró sin intención
  - que hizo por inadvertencia
  lexicon: HALOT
  rationale: El verbo cognado refuerza que se trató de un yerro no intencional. «Inadvertidamente» comunica bien el matiz legal de inadvertencia.
- source_word: וְהוּא לֹא יָדַע
  english_pob_choice: though he did not know it
  chosen_spanish: aunque él no lo sabía
  alternatives_spanish:
  - y él no lo sabía
  - sin que él lo supiera
  - aunque no lo supo
  lexicon: HALOT
  rationale: La cláusula explica la inadvertencia del acto. «Aunque él no lo sabía» mantiene la relación concesiva y suena natural en español.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y obtendrá perdón
  - y le será concedido perdón
  lexicon: HALOT
  rationale: El pasivo niphal de סלח expresa el resultado de la expiación. «Le será perdonado» conserva el sentido pasivo y el tono formal adecuado.
theological_decisions:
- issue: Naturaleza de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por la culpabilidad
  - ofrenda de culpa
  rationale: El hebreo nombra una categoría sacrificial concreta. La traducción elegida conserva la conexión con la culpa sin desdibujar que se trata de un término técnico del sistema levítico.
  doctrine_reference: Consistencia terminológica del sistema sacrificial; evitar reducir el término a una sola idea moral abstracta.
- issue: Sentido de כפר
  english_pob_reading: make atonement
  chosen_spanish_reading: hará expiación
  alternative_spanish_readings:
  - hará propiciación
  - hará expiación/purificación
  - hará reparación expiatoria
  rationale: «Expiación» mantiene el peso cultual y teológico de כפר en el contexto sacerdotal, sin sustituirlo por una explicación interpretativa excesiva.
  doctrine_reference: Fidelidad al lenguaje sacerdotal levítico y a la relación entre expiación y perdón en el versículo.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. No se modificó el sentido base de la ofrenda, la expiación ni la inadvertencia; solo se ajustó la formulación española para mayor naturalidad y precisión, manteniendo la tensión léxica de אָשָׁם y שִׁגְגָה.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparezca explícitamente; este versículo no lo contiene.
  - Se prefirió «ofrenda por la culpa» para conservar la ambigüedad técnica de אָשָׁם sin ocultar la conexión con culpa/culpabilidad.
  - «Expiación» se mantuvo para כפר, conforme al registro sacerdotal de Levítico.
  - «Inadvertidamente» y «aunque él no lo sabía» preservan la doble indicación de error no intencional y falta de conocimiento.
  - No se empleó «Señor» como sustituto del nombre divino porque no aparece en el versículo.
