revisions:
- from: Pero ustedes son los que abandonan a Yahvé[a], los que olvidan mi monte santo, los que preparan una mesa para Gad[c][b] y los que llenan una libación para Meni.
  to: Pero ustedes son los que abandonan a Yahvé, los que olvidan mi monte santo, los que preparan una mesa para Gad[a] y los que llenan vino mezclado[c] para Meni[b].
