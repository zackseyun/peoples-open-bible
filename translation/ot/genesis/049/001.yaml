theological_decisions:
- issue: Whether בְּאַחֲרִית הַיָּמִים should be rendered with an explicitly eschatological phrase
  chosen_reading: in the days to come
  alternative_readings:
  - in the latter days
  rationale: The Hebrew phrase can function as a general future-oriented expression or, in some contexts, carry stronger eschatological force. In Genesis 49:1 the immediate context concerns the future of Jacob's sons and tribes; therefore a broader future-oriented rendering is preferred in the main text, while the more traditional and potentially more eschatological 'in the latter days' is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
