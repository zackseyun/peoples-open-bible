    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea también puede traducirse 'guerreros poderosos' o 'hombres valientes'.
    reason: lexical_alternative
  - marker: d
    text: O 'por sus generaciones' o 'en sus genealogías'.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de notas para que cada marcador sea único y corresponda exactamente a su frase fuente. Se ajustó 'hombres poderosos' a 'hombres valerosos' para preservar mejor גִּבּוֹרֵי חַיִל. Se restituyó el posesivo en 'sus casas paternas' y se explicitó 'pertenecientes a Tola' para reflejar con más claridad la relación clánica que el inglés auditado ya había fijado como 'belonging to Tola'. También se añadió una nota separada para 'según sus generaciones', ya que el inglés POB preserva alternativas para לְתֹלְדוֹתָם.
