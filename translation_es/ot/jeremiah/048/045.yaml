    issue: Falta en el texto principal la idea de מִכֹּחַ
    rationale: El hebreo incluye explícitamente 'sin fuerzas' / 'por falta de fuerza'. El borrador la relegó a nota [a] y dejó el texto principal incompleto. La traducción debe expresar esa noción en el cuerpo del versículo.
  - severity: medium
    issue: '''Se detuvieron'' reduce el matiz de עָמְדוּ'
    rationale: Aunque puede funcionar contextualmente, עָמְדוּ describe más directamente que los fugitivos 'se quedan/paran/están' allí, detenidos o inmóviles. Puede mejorarse con una formulación que incluya la falta de fuerzas.
  - severity: medium
    issue: La nota c contiene un anglicismo
    rationale: Dice 'El hebreo «corner»', lo cual no es aceptable en una nota española. Debe decir 'esquina' o referirse directamente a la palabra hebrea.
