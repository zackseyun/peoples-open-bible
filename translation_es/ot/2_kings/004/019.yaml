translation:
  language: es
  text: 'Y él dijo a su padre: «¡Mi cabeza, mi cabeza!». Luego dijo al joven[a]: «Llévalo a su madre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al siervo» para «al joven»; el hebreo נַעַר puede denotar un joven, un ayudante o un siervo según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said / Then he said
  chosen_spanish: Y él dijo / Luego dijo
  alternatives_spanish:
  - Y él habló
  - Entonces dijo
  lexicon: HALOT
  rationale: אמר es el verbo básico de decir. En español, «dijo» conserva la sobriedad narrativa del hebreo; «luego» mantiene la secuencia de la segunda forma verbal sin añadir intensidad no explícita en el texto.
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - para su padre
  - a su papá
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de manera directa y digna con «padre». «A su padre» refleja bien el valor de אֶל con destino/dirección.
- source_word: רֹאשִׁי רֹאשִׁי
  english_pob_choice: My head, my head!
  chosen_spanish: ¡Mi cabeza, mi cabeza!
  alternatives_spanish:
  - ¡Me duele la cabeza, me duele la cabeza!
  - ¡Mi cabeza! ¡Mi cabeza!
  lexicon: HALOT
  rationale: La repetición nominal expresa angustia aguda. Se mantiene la literalidad para no introducir la interpretación «me duele», que el hebreo no dice explícitamente.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  lexicon: HALOT
  rationale: נַעַר puede denotar joven, muchacho o servidor según el contexto. Aquí el español «joven» conserva la ambigüedad de edad/condición sin decidir prematuramente por «siervo» en el cuerpo principal.
- source_word: שָׂאֵהוּ
  english_pob_choice: Carry him
  chosen_spanish: Llévalo
  alternatives_spanish:
  - Cárgalo
  - Alzalo
  lexicon: HALOT
  rationale: El imperativo de נשׂא con sufijo pide que lo tome y lo traslade físicamente. En español, «llévalo» comunica ese traslado de forma natural y apta para el registro narrativo; «cárgalo» también es posible, pero suena un poco más marcado en el uso actual.
- source_word: אֶל אִמּוֹ
  english_pob_choice: to his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - para su madre
  - hasta su madre
  lexicon: HALOT
  rationale: «Madre» corresponde al registro paralelo con «padre» y evita coloquialismos que bajarían el tono narrativo. La preposición «a» reproduce adecuadamente la dirección del movimiento.
theological_decisions:
- issue: Ambigüedad de נַעַר (edad vs. estatus de servicio)
  english_pob_reading: Or “to the servant” for “to the young man”; the Hebrew נַעַר can denote a youth, attendant, or servant depending on context.
  chosen_spanish_reading: «el joven» en el texto principal, con nota sobre la posible lectura «siervo»
  alternative_spanish_readings:
  - el siervo
  - el muchacho
  rationale: La ambigüedad es real y debe quedar visible. El contexto permite entender a un acompañante joven, pero no obliga a fijar «siervo» en la línea principal. La nota preserva la alternativa léxica documentada por la POB inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la concordancia con el control cruzado es alta, por lo que se mantiene una solución española sobria y literal donde el hebreo es breve y enfático.
  spanish_consistency_notes:
  - Se mantiene «padre/madre» en paralelo, con registro narrativo uniforme.
  - Se conserva la repetición «mi cabeza, mi cabeza» sin expandirla interpretativamente.
  - Se usa «joven» como término principal para נַעַר, en línea con la ambigüedad documentada por la POB inglesa y sin borrar la alternativa de «siervo».
