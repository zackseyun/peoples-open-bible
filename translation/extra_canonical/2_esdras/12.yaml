translation:
  text: '1 And it happened[a], while the lion was speaking these words to the eagle,

    2 that I looked, and behold, the head that had remained was no longer visible. And the two wings that had gone over to it rose up to reign, and their reign was brief and full of turmoil. And I looked, and behold, they too disappeared, and the whole body of the eagle was burned up, and the earth was greatly terrified.

    3 Then I awoke from the great excess of my mind and from great fear, and I said to my spirit, “See, you have brought this upon me,

    4 because you search out the ways of the Most High. Behold, I am still worn out in my soul,

    5 and in my spirit I am very weak, and there is not even a little strength in me because of the great fear that I felt this night.

    6 Now therefore I will pray to the Most High, that he may strengthen me to the end.”

    7 And I said, “Lord, Master, if I have found favor before your eyes, and if I have been justified before you more than many, and if my petition has truly gone up before your face, strengthen me

    8 and show your servant the interpretation and the distinction of this dreadful vision, that you may fully comfort my soul. For you have counted me worthy

    9 to show me the end of the times and the last things of the times.”

    10 And he said to me, “This is the interpretation of this vision that you saw: the eagle that you saw coming up from the sea—this is

    11 the fourth kingdom that was seen in a vision by Daniel your brother. But it was not interpreted to him as I now interpret it to you,

    12 or as I have interpreted it. Behold, days are coming when a kingdom will arise upon the earth,

    13 and it will be more terrifying than all the kingdoms that were before it.

    14 “And twelve kings will reign in it, one after another.

    15 But the second who begins to reign will hold power for a longer time than the twelve.

    16 This is the interpretation of the twelve wings that you saw.

    17 “And because you heard a voice speaking, not coming out from its heads[b], but from the midst of its body,

    18 this is the interpretation: after the time of that kingdom, no small contentions will arise, and it will be in danger of falling; yet it will not then fall,

    19 but will again be restored to its former beginning.

    20 “And because you saw eight little wings clinging to its wings, this is the interpretation: eight kings will arise in it,

    21 whose times will be light and whose years swift. Two of them will perish when the middle time draws near, but four will be kept for the time when its end begins to draw near,

    22 and two will be kept until the end.

    23 “And because you saw three heads at rest, this is the interpretation: in its last days the Most High will raise up three kingdoms and renew many things in them, and they will rule

    24 the earth and those who dwell in it, with much oppression, more than all who were before them. Therefore they are called the heads

    25 of the eagle. For these are the ones who will sum up its impieties

    26 and complete its last acts.

    27 “And because you saw that the larger head disappeared, this means that one of them will die on his bed, but still with torments.

    28 But the two that remained, the sword will devour them. For the sword of the one will devour him who is with him,

    29 yet this one too will fall by the sword in the last days.

    30 “And because you saw two little wings passing over to the head on the right side, this is the interpretation: these are the ones whom the Most High has preserved for its end. This was a brief kingdom and full of turmoil,

    31 as you saw.

    32 “And the lion that you saw rousing itself from the forest, roaring and speaking to the eagle and reproving it for its injustices and all its words, as you heard—

    33 this is the Anointed One, whom the Most High has kept for the end, against them and against their impieties. He will rebuke them for their injustices and will set their contempt before them.

    34 And when he has reproved them, then he will destroy them. But he will deliver the remnant of my people with mercy, those who have been preserved within my borders, and he will make them rejoice until the end comes, the day of judgment, of which I spoke to you from the beginning.”

    35 This is the dream that you saw, and this is its interpretation.

    36 “But you alone have been found worthy to know this secret of the Most High.

    37 Therefore write all these things that you have seen in a book, and put them in a hidden place.

    38 And you shall teach them to the wise among your people, whose hearts you know are able to comprehend and keep these secrets.

    39 But you, remain here still for seven more days, so that whatever it may please the Most High to show you may be shown to you.” And he departed from me.

    40 And it happened, when all the people heard that seven days had passed and I had not returned to the city, that all of them gathered together, from the least to the greatest, and came to

    41 me. And they said to me, “What have we sinned against you, and what wrong have we done to you, that you have utterly forsaken us and

    42 sat in this place? For you alone are left to us of all the prophets, like a cluster from the vintage, and like a lamp in a dark place,

    43 and like a harbor for a ship saved from the storm.

    44 Or are not the evils that have happened to us enough? If then you forsake us, how much better it would have been for us if we too had been burned in the burning

    45 of Zion. For we are no better than those who died there.” And they wept with a loud voice.

    46 And I answered them and said, “Take courage, Israel, and do not grieve, house of Jacob.

    47 For your remembrance is before the Most High, and the Mighty One has not forgotten you in the struggle.

    48 For I have not forsaken you, nor have I withdrawn from you, but I came to this place to pray for the desolation of Zion and to seek mercy for the humiliation of your sanctuary.

    49 And now go, each of you, to his own house, and I will come to you after these days.”

    50 So the people went away into the city, as I told them.

    51 But I sat in the field seven days, as he commanded me, and I ate only the flowers of the field[c]; from the herbs my food was made in those days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Latin 'unctus' is literally 'anointed.' In this vision the figure functions as the end-time deliverer who rebukes the eagle-kingdom and rescues the remnant, so the messianic force should be heard even where the main text keeps the literal title.
    reason: messianic_passage
    anchor_ref: '12:32'
  - marker: b
    text: The clause rendered 'will set their contempt before them' is textually difficult in Latin. The sense appears to be that their scornful deeds will be exposed publicly before them rather than hidden.
    reason: textual_variant
    anchor_ref: '12:33'
  - marker: c
    text: The title 'the Mighty One' renders Latin 'fortis' as a divine epithet, not merely an adjective.
    reason: lexical_alternative
    anchor_ref: '12:47'
lexical_decisions:
- source_word: leo
  chosen: lion
  alternatives:
  - roaring beast
  lexicon: Lewis & Short
  rationale: The apocalyptic symbol is straightforwardly leonine; 'lion' preserves the Danielic and royal-messianic resonance without embellishment.
- source_word: aquila
  chosen: eagle
  alternatives:
  - vulture
  lexicon: Lewis & Short
  rationale: The traditional and most natural rendering is 'eagle.' In this vision it names the imperial beast-symbol and should remain stable across the chapter.
- source_word: exile
  chosen: brief
  alternatives:
  - slender
  - meager
  - short-lived
  lexicon: Lewis & Short
  rationale: In 'regnum eorum exile,' the sense is not geographic exile but something thin, slight, or insubstantial. 'Brief' best captures the kingdom's short and diminished character in idiomatic English.
- source_word: tumulti plenum / turbationis plenum
  chosen: full of turmoil
  alternatives:
  - full of disturbance
  - full of confusion
  lexicon: Lewis & Short
  rationale: The phrase describes unstable, agitated rule. 'Full of turmoil' preserves the political unrest and apocalyptic cadence.
- source_word: excessu mentis
  chosen: the great excess of my mind
  alternatives:
  - my mental agitation
  - my overwhelming bewilderment
  lexicon: Lewis & Short
  rationale: The Latin is vivid and somewhat awkward; the translation keeps that intensity rather than smoothing it into clinical language.
- source_word: spiritui meo
  chosen: my spirit
  alternatives:
  - my inner self
  - my soul
  lexicon: Lewis & Short
  rationale: The text distinguishes anima and spiritus in this context; preserving 'spirit' keeps the internal dialogue and layered anthropology visible.
- source_word: dominator domine
  chosen: Lord, Master
  alternatives:
  - Sovereign Lord
  - Master Lord
  lexicon: Lewis & Short
  rationale: The doubled address is emphatic. 'Lord, Master' preserves the stacked titles without collapsing them into a single conventional phrase.
- source_word: iustificatus sum
  chosen: I have been justified
  alternatives:
  - I have been found righteous
  - I have been vindicated
  lexicon: Lewis & Short
  rationale: The Latin uses justification language. 'Justified' keeps the forensic/theological register rather than flattening it to generic approval.
- source_word: distinctio
  chosen: distinction
  alternatives:
  - full explanation
  - detailed account
  lexicon: Lewis & Short
  rationale: Ezra asks not only for interpretation but for the differentiation or parsing of the vision's parts. 'Distinction' preserves that analytical nuance.
- source_word: timoratio
  chosen: more terrifying
  alternatives:
  - a terror to
  - fearsome above
  lexicon: Lewis & Short
  rationale: 'The comparative force is central: the coming kingdom exceeds prior empires in dreadfulness. ''More terrifying'' communicates the sense clearly.'
- source_word: subalares
  chosen: little wings
  alternatives:
  - winglets
  - secondary wings
  lexicon: Lewis & Short
  rationale: The diminutive idea matters in the vision's symbolism. 'Little wings' is plain English and avoids overly technical wording.
- source_word: tempora leuia
  chosen: times will be light
  alternatives:
  - their reigns will be slight
  - their times will be insignificant
  lexicon: Lewis & Short
  rationale: The Latin likely means slight or insubstantial duration. 'Light' keeps the metaphor while allowing the following 'years swift' to interpret it.
- source_word: anni citati
  chosen: years swift
  alternatives:
  - hurried years
  - years cut short
  lexicon: Lewis & Short
  rationale: The compressed phrase suits apocalyptic cadence. 'Years swift' is slightly formal but preserves the terse force of the Latin.
- source_word: renouabit in ea multa
  chosen: renew many things in them
  alternatives:
  - bring many changes in them
  - restore much within them
  lexicon: Lewis & Short
  rationale: The verb can suggest renewal or reordering. 'Renew many things' stays close to the Latin while leaving the exact political sense open.
- source_word: cum labore multo
  chosen: with much oppression
  alternatives:
  - with great hardship
  - with much toil imposed
  lexicon: Lewis & Short
  rationale: In context of imperial domination over the earth's inhabitants, the phrase points to burdensome rule, not merely effort. 'Oppression' makes the object of the labor clearer.
- source_word: recapitulabunt impietates eius
  chosen: will sum up its impieties
  alternatives:
  - will gather up its wickednesses
  - will bring its impieties to a head
  lexicon: Lewis & Short
  rationale: The phrase suggests bringing the empire's wickedness to its culmination. 'Sum up' preserves the aggregating sense without overinterpreting.
- source_word: unctus
  chosen: the Anointed One
  alternatives:
  - the Messiah
  - the anointed
  lexicon: Lewis & Short
  rationale: The Latin means 'anointed.' 'The Anointed One' preserves the title's literal force while allowing readers to hear its messianic significance; the theological decision notes the messianic identification.
- source_word: infulciet coram ipsis spretiones eorum
  chosen: will set their contempt before them
  alternatives:
  - will expose their scorn before them
  - will press their insults upon them
  lexicon: Lewis & Short
  rationale: The clause is textually difficult, but the sense is public exposure of their contemptuous conduct. 'Set ... before them' keeps the confrontational imagery.
- source_word: residuum populum meum
  chosen: the remnant of my people
  alternatives:
  - the rest of my people
  lexicon: Lewis & Short
  rationale: '''Remnant'' is theologically and prophetically loaded language and fits the restoration context better than the flatter ''rest.'''
- source_word: super fines meos
  chosen: within my borders
  alternatives:
  - upon my borders
  - in my territory
  lexicon: Lewis & Short
  rationale: The phrase likely refers to those preserved within the divinely bounded land/domain. 'Within my borders' is natural and spatially concrete.
- source_word: corda posse capere et seruare secreta
  chosen: hearts ... able to comprehend and keep these secrets
  alternatives:
  - minds able to grasp and guard these mysteries
  lexicon: Lewis & Short
  rationale: The text emphasizes the heart as the organ of reception and retention. Keeping 'hearts' aligns with biblical anthropology.
- source_word: Confide Israel
  chosen: Take courage, Israel
  alternatives:
  - Trust, Israel
  - Be confident, Israel
  lexicon: Lewis & Short
  rationale: The imperative is pastoral and strengthening. 'Take courage' fits Ezra's consoling response better than the more abstract 'trust.'
- source_word: fortis
  chosen: the Mighty One
  alternatives:
  - the Strong One
  lexicon: Lewis & Short
  rationale: Used as a divine title, 'the Mighty One' preserves the nominal force and avoids flattening it into an adjective.
- source_word: humilitate sanctificationis uestrae
  chosen: the humiliation of your sanctuary
  alternatives:
  - the low estate of your holiness
  - the humiliation of your consecrated place
  lexicon: Lewis & Short
  rationale: The phrase is difficult, but in context of Zion's desolation it points to the sanctuary's abasement. This rendering makes the referent intelligible while staying close to the Latin.
theological_decisions:
- issue: Identity of the lion/unctus figure in vv. 31-34
  chosen_reading: Rendered as 'the Anointed One' and treated as a messianic deliverer preserved by the Most High for the end.
  alternative_readings:
  - the Messiah
  - a generic anointed agent
  rationale: The Latin 'unctus' is literally 'anointed,' but in this apocalyptic context the figure who rebukes the empire and delivers the remnant is more than a generic ruler. Main text keeps the literal title while preserving the messianic force required by the vision.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve Hebraic messianic context.'
- issue: Danielic reference in vv. 10-12
  chosen_reading: Kept 'Daniel your brother' as a fraternal prophetic designation, not a biological claim.
  alternative_readings:
  - Daniel your kinsman
  - Daniel the fellow prophet
  rationale: The Latin 'fratri tuo' naturally reads as covenantal/prophetic brotherhood. Retaining 'brother' preserves the scriptural register and intertextual link to Daniel 7.
- issue: Severity of the empire in vv. 23-25
  chosen_reading: Translated the rule of the three heads as oppressive domination rather than neutral labor.
  alternative_readings:
  - with much toil
  - with great hardship
  rationale: The context is imperial tyranny over the earth's inhabitants. This chapter's theology of oppressive kingdoms culminating in judgment is clearer if the burden falls on the ruled, not the rulers' effort.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it away.'
- issue: Divine titles in vv. 4, 6, 23, 33, 47
  chosen_reading: Rendered 'Altissimus' consistently as 'the Most High' and 'fortis' as 'the Mighty One.'
  alternative_readings:
  - God
  - the Strong One
  rationale: Project policy requires preserving the specific divine title 'the Most High.' The paired title in v. 47 is likewise kept as a title rather than generalized.
