base_translation:
  language: en
  yaml_path: translation/ot/judges/020/038.yaml
  text: Now the appointed sign between the men of Israel and the ambush was that they should make a great cloud of smoke rise from the city[a][b][c].
  footnotes:
  - marker: a
    text: Or 'the appointed arrangement' or 'the agreed sign.' The Hebrew מוֹעֵד often means an appointed time, but here it refers to a prearranged signal in battle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to/for the men of Israel with the ambush'; the sense is an arrangement between the two parties.
    reason: lexical_alternative
  - marker: c
    text: Or 'a mass/column of smoke.' The Hebrew expression refers to a conspicuous rising smoke signal from the city.
    reason: lexical_alternative
