review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: Moisés hizo un arca de madera de acacia, preparó dos tablas de piedra como las primeras, subió al monte y llevaba las dos tablas en su mano. «Arca», «madera de acacia», «tablas de piedra», «como las primeras» y «subí al monte» están bien alineados con el texto fuente y con la auditoría inglesa. El principal problema está en la nota léxica de וָאֶפְסֹל: la alternativa española usa «heché», que es incorrecto; debe ser «labré» o «corté»/«tallé».'
  spanish_quality_summary: El español principal es claro, natural y digno. «Así hice» funciona, aunque «Entonces hice» también sería posible; no requiere cambio. «Tallé» es una opción aceptable para פסל en español, aunque la nota debe corregirse. La puntuación es legible; el punto y coma no es necesario, pero no constituye un error. La mayor deficiencia de calidad es ortográfica y léxica en la nota al pie.
  glossary_alignment: 'La terminología concuerda con las pautas del proyecto: «arca» para אֲרוֹן, «madera de acacia» para עֲצֵי שִׁטִּים, y no hay conflicto con términos teológicos mayores del glosario. No se detectan problemas con Yahvé, Mesías, Espíritu, etc., ya que no aparecen aquí.'
  issues:
  - severity: medium
    issue: La nota al pie usa «heché dos tablas de piedra»
    rationale: «Heché» es ortográfica y léxicamente incorrecto en este contexto. La alternativa documentada en inglés es ‘hewed two tablets of stone’; en español debe expresarse como «labré dos tablas de piedra» o similar.
  - severity: low
    issue: Las comillas de la nota al pie están formateadas de manera poco natural
    rationale: La nota actual incluye comillas dentro de otras comillas con puntuación extraña. Conviene normalizarla para legibilidad y estilo editorial.
  revised_spanish_text: Así hice un arca de madera de acacia, y tallé dos tablas de piedra, como las primeras[a]; y subí al monte con las dos tablas en mi mano.
  revised_footnotes:
  - marker: a
    text: 'O: «labré dos tablas de piedra, como las primeras»'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Solo se corrige la nota al pie para reflejar adecuadamente la alternativa léxica de וָאֶפְסֹל y eliminar la forma incorrecta «heché».
