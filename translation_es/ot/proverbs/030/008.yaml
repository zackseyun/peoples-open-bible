translation:
  language: es
  text: Aparta de mí la falsedad y las palabras mentirosas[a]; no me des pobreza ni riquezas; susténtame con el pan que me corresponde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habla engañosa» para «palabras mentirosas».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «el pan de mi porción»; también: «mi porción de pan» o «mi pan cotidiano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - vanidad
  - mentira
  - falsedad moral
  lexicon: HALOT
  rationale: En este contexto de oración, el término no expresa solo 'vacío' sino aquello que es moralmente falso o engañoso. 'Falsedad' conserva la fuerza ética del hebreo y funciona bien en paralelo con 'palabras mentirosas'.
- source_word: דְבַר כָּזָב
  english_pob_choice: lying words
  chosen_spanish: palabras mentirosas
  alternatives_spanish:
  - palabra mentirosa
  - habla engañosa
  - palabras de engaño
  lexicon: HALOT
  rationale: La construcción hebrea expresa palabras caracterizadas por la mentira. El plural español 'palabras mentirosas' suena natural y mantiene la categoría amplia de discurso falso que la traducción inglesa quiso preservar.
- source_word: הַרְחֵק מִמֶּנִּי
  english_pob_choice: Keep ... far from me
  chosen_spanish: Mantén lejos de mí
  alternatives_spanish:
  - Aleja de mí
  - Aparta de mí
  - Haz que esté lejos de mí
  lexicon: HALOT
  rationale: 'El hiphil tiene sentido causativo: alejar o mantener distante. ''Mantén lejos de mí'' es idiomático en español en forma de súplica y conserva la idea de distancia protectora.'
- source_word: רֵאשׁ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - escasez
  - miseria
  - necesidad
  lexicon: HALOT
  rationale: El término designa empobrecimiento o pobreza material. 'Pobreza' es claro, natural y mantiene el contraste equilibrado con 'riquezas'.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  - abundancia
  lexicon: HALOT
  rationale: '''Riquezas'' reproduce el contraste económico directo con ''pobreza'' y refleja bien el paralelismo del hebreo.'
- source_word: אַל תִּתֶּן לִי
  english_pob_choice: give me neither
  chosen_spanish: no me des
  alternatives_spanish:
  - no me concedas
  - no me otorgues
  lexicon: HALOT
  rationale: La negación gobierna el par 'pobreza ni riquezas'. En español, 'no me des pobreza ni riquezas' es la forma más natural y fiel, sin necesidad de repetir la negación de modo forzado.
- source_word: הַטְרִיפֵנִי
  english_pob_choice: feed me
  chosen_spanish: susténtame
  alternatives_spanish:
  - aliméntame
  - provéeme
  - dame de comer
  lexicon: HALOT
  rationale: El causativo de טרף aquí indica proporcionar alimento o sustento. 'Susténtame' cubre tanto la provisión de comida como la idea de mantenimiento continuo; 'aliméntame' es posible, pero 'susténtame' preserva mejor el tono de petición de provisión medida.
- source_word: לֶחֶם חֻקִּי
  english_pob_choice: the bread allotted to me
  chosen_spanish: el pan asignado para mí
  alternatives_spanish:
  - mi porción de pan
  - el pan de mi porción
  - el pan que me corresponde
  lexicon: HALOT
  rationale: La expresión literalmente remite al 'pan de mi porción/allotment'. 'Pan asignado para mí' mantiene la imagen de una porción determinada por Dios sin imponer la fórmula litúrgica de 'pan de cada día' que no está explícita en el hebreo.
theological_decisions:
- issue: Sentido de la provisión en לֶחֶם חֻקִּי
  english_pob_reading: a request for one's allotted or fitting portion of food, avoiding both deprivation and excess
  chosen_spanish_reading: 'una petición de provisión medida: el pan que corresponde, sin pobreza ni abundancia desordenada'
  alternative_spanish_readings:
  - mi pan cotidiano
  - el pan de cada día
  rationale: El versículo pide un punto medio sabio entre carencia y exceso. 'Asignado para mí' conserva la idea de porción adecuada y evita introducir de forma innecesaria una asociación litúrgica posterior.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Relación entre 'falsedad' y 'palabras mentirosas'
  english_pob_reading: a pairing that rejects both falsehood and deceptive speech
  chosen_spanish_reading: un paralelismo que rechaza tanto la falsedad como el discurso mentiroso
  alternative_spanish_readings:
  - engaño
  - habla falsa
  rationale: El hebreo intensifica la negación del engaño con dos miembros paralelos. Mantener ambos términos en español preserva esa tensión retórica y moral sin fusionarlos en una sola idea.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en el cierre con punto final y conserva la estructura tripartita del hebreo: rechazo de la falsedad, petición de equilibrio material y solicitud de sustento medido.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'pan' como metáfora de provisión, sin sustituirlo por una explicación interpretativa más amplia.
  - Se conservan dos miembros paralelos para 'שָׁוְא' y 'דְבַר כָּזָב', porque la POB inglesa también mantiene ambas piezas de sentido.
