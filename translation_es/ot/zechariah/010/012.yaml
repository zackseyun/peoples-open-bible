translation:
  language: es
  text: Yo los fortaleceré en Yahvé[a], y en su nombre[b] caminarán, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo los haré poderosos en Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: «En su nombre» también puede implicar «bajo su autoridad» o «bajo su carácter revelado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגִבַּרְתִּים
  english_pob_choice: I will strengthen them
  chosen_spanish: Yo los fortaleceré
  alternatives_spanish:
  - Yo los haré fuertes
  - Yo los haré poderosos
  lexicon: HALOT
  rationale: El verbo intensivo/causativo de גבר expresa que Yahvé causa fortaleza en ellos. «Fortaleceré» comunica bien esa fuerza causativa en español moderno y evita un giro más pesado como «haré poderosos».
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - por Yahvé
  - mediante Yahvé
  lexicon: HALOT
  rationale: 'La preposición ב aquí expresa ámbito o base: el fortalecimiento ocurre en Yahvé, es decir, en dependencia de él. Se conserva el nombre divino como «Yahvé» según la norma del proyecto.'
- source_word: וּבִשְׁמוֹ
  english_pob_choice: and in his name
  chosen_spanish: y en su nombre
  alternatives_spanish:
  - y por su nombre
  - y bajo su autoridad
  lexicon: HALOT
  rationale: «En su nombre» preserva el idioma hebreo y mantiene abiertas las connotaciones de autoridad, representación y carácter revelado sin resolverlas de más.
- source_word: יִתְהַלָּכוּ
  english_pob_choice: they will walk
  chosen_spanish: caminarán
  alternatives_spanish:
  - andarán
  - vivirán
  - se conducirán
  lexicon: HALOT
  rationale: El hitpael de הלך puede referirse a caminar o a conducirse. «Caminarán» conserva la metáfora bíblica sin reducirla a una simple exhortación ética.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se rinde de forma natural y solemne como «declara Yahvé», manteniendo el peso de una proclamación divina.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre divino en español como «Yahvé» para reflejar el fundamento original y la política del proyecto de no ocultarlo con una convención de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de «caminar en su nombre»
  english_pob_reading: retain the metaphor 'walk' rather than explicating it as 'live' or 'conduct themselves'
  chosen_spanish_reading: mantener la metáfora «caminar»
  alternative_spanish_readings:
  - vivir en su nombre
  - conducirse en su nombre
  rationale: «Caminar» conserva la imagen hebrea y deja abierta la gama semántica de conducta, pertenencia y vida bajo la autoridad revelada de Dios, sin estrecharla prematuramente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el pasaje mantiene alta concordancia con el control de calidad, así que no se introducen ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva el paralelismo «en Yahvé / en su nombre» sin explicitarlo más allá de lo que el hebreo requiere.
  - «Caminarán» mantiene el valor metafórico y evita reducir el verbo a «vivir» o «portarse».
