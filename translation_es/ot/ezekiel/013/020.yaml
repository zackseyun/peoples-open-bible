translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: He aquí, estoy contra sus bandas mágicas[a], con las que cazan allí las vidas[b] como aves[c], y las arrancaré de sus brazos, y soltaré las vidas que ustedes cazan como aves[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus cojines' o 'sus amuletos'; el término hebreo es raro y su referente exacto es incierto, probablemente algún objeto ritual usado por las profetisas.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'almas' o 'vidas'; aquí el sentido es personas como seres vivos.
    reason: lexical_alternative
  - marker: c
    text: Literalmente 'para volar' o 'las que vuelan'; el hebreo probablemente usa imaginería de caza de aves para las personas que están siendo atrapadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor Yahvé' preserva la distinción entre título y nombre, evita la sustitución por una convención de ocultamiento, y sigue el criterio del proyecto de usar 'Yahvé' para el nombre divino.
- source_word: הִנְנִי אֶל
  english_pob_choice: Behold, I am against
  chosen_spanish: He aquí, estoy contra
  alternatives_spanish:
  - Mira, estoy contra
  - He aquí, yo estoy contra
  lexicon: HALOT
  rationale: La expresión idiomática divina comunica oposición activa. 'He aquí, estoy contra' conserva el valor deíctico y el tono formal sin volverla innecesariamente pesada en español.
- source_word: כִּסְּתוֹתֵיכֶנָה
  english_pob_choice: your magic bands
  chosen_spanish: vuestras bandas mágicas
  alternatives_spanish:
  - vuestras almohadillas
  - vuestros amuletos
  - vuestras bandas rituales
  lexicon: HALOT
  rationale: El término hebreo es raro y su referente exacto es incierto. 'Bandas mágicas' sigue la opción auditada en inglés para captar la función ritual/ocultista probable sin fingir certeza sobre la forma material.
- source_word: מְצֹדְדוֹת
  english_pob_choice: you hunt
  chosen_spanish: cazáis
  alternatives_spanish:
  - acecháis
  - enredáis
  - atrapáis
  lexicon: HALOT
  rationale: '''Cazar'' reproduce bien la imagen venatoria del verbo y su encadenamiento con ''como aves''. ''Cazar'' es más natural en español que un calco como ''hunting'' y mantiene la fuerza predatoria.'
- source_word: הַנְּפָשׁוֹת / נְפָשִׁים
  english_pob_choice: the lives ... the ones
  chosen_spanish: las vidas ... las vidas
  alternatives_spanish:
  - las almas ... las almas
  - las personas ... las personas
  - las vidas ... las personas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa vidas/personas vivas amenazadas, no un alma inmortal en sentido posterior. 'Vidas' conserva la concreción del contexto y evita imponer una antropología ajena al pasaje.
- source_word: לְפֹרְחוֹת / לְפֹרְחֹת
  english_pob_choice: like birds
  chosen_spanish: como aves
  alternatives_spanish:
  - como pájaros
  - para volar
  - al volar
  lexicon: HALOT
  rationale: La imagen aviar es central y el hebreo es sintético. 'Como aves' comunica la comparación de manera bíblica y sobria, manteniendo el enlace con la caza.
- source_word: וְקָרַעְתִּי אֹתָם מֵעַל זְרוֹעֹתֵיכֶם
  english_pob_choice: and I will tear them from your arms
  chosen_spanish: y las arrancaré de sobre vuestros brazos
  alternatives_spanish:
  - y las desgarraré de vuestros brazos
  - y las arrancaré de vuestros brazos
  lexicon: HALOT
  rationale: '''Arrancar de sobre vuestros brazos'' refleja el movimiento de quitar algo adherido o puesto encima, y conserva el golpe de juicio del verbo. Elegimos ''de sobre'' porque el hebreo usa מֵעַל (''de sobre, desde encima'').'
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: and I will let ... go free
  chosen_spanish: y soltaré
  alternatives_spanish:
  - y dejaré ir
  - y liberaré
  - y las dejaré libres
  lexicon: HALOT
  rationale: En este contexto el verbo expresa liberación del cautiverio/engaño. 'Soltaré' es breve, natural y mantiene la idea de liberar sin añadir formulaciones interpretativas excesivas.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí mismo
  - en ese lugar
  - ahí
  lexicon: HALOT
  rationale: '''Allí'' reproduce el adverbio de lugar con naturalidad en español y conserva la referencia espacial algo comprimida del hebreo.'
theological_decisions:
- issue: Cómo traducir נֶפֶשׁ en un contexto de personas cazadas
  english_pob_reading: lives
  chosen_spanish_reading: vidas
  alternative_spanish_readings:
  - almas
  - personas
  rationale: El pasaje denuncia a mujeres que capturan vidas humanas mediante engaño o práctica ritual. 'Vidas' conserva el sentido concreto de seres vivos atrapados y evita importar una doctrina sobre el alma que el texto no desarrolla aquí.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión léxica sin resolverla doctrinalmente.'
- issue: Terminología del nombre divino en español
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - el Señor
  rationale: El texto hebreo distingue el título de soberanía del nombre divino. 'Yahvé' preserva esa distinción sin la convención de máscara tipográfica 'SEÑOR', coherente con el criterio del proyecto.
  doctrine_reference: Convención de nombre divino del proyecto POB en español.
translation_notes:
  revision_awareness: Se siguió el expediente inglés auditado sin cambios de contenido sustancial; se conservó la incertidumbre lexical de כִּסְּתוֹתֵיכֶנָה mediante una opción española equivalente y se mantuvo la imaginería de caza y liberación. No hubo revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוִה conforme al estándar español del proyecto.
  - Se mantuvo 'vidas' para נֶפֶשׁ para no trasladar una lectura antropológica posterior.
  - Se conservó la metáfora de caza con 'cazáis' y 'como aves' para hacer transparente la imagen hebrea.
  - La nota léxica se ancló en 'bandas mágicas' para reflejar la incertidumbre del objeto mencionado.
