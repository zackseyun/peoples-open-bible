revisions:
- from: Su tierra se llena de plata y oro[a], y no hay fin de sus tesoros; su tierra se llena de caballos[b], y no hay fin de sus carros.
  to: Su tierra está llena de plata y oro[a], y no hay fin de sus tesoros[b]; su tierra está llena de caballos, y no hay fin de sus carros de guerra.
  rationale: Se ajusta el aspecto verbal a «está llena» para reflejar mejor el estado resultante/descriptivo del hebreo en contexto profético. Se reubica la nota b al término «tesoros», que es donde corresponde según la evidencia y la auditoría inglesa. Se cambia «carros» por «carros de guerra» para evitar ambigüedad en español moderno y preservar con claridad el sentido de מַרְכְּבוֹת en este contexto.
