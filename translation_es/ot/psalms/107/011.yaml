translation:
  language: es
  text: Porque se rebelaron contra las palabras de Dios y despreciaron el consejo del Altísimo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desafiaron las palabras de Dios y desdeñaron el consejo del Altísimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior. En español, 'Porque' conserva claramente el valor explicativo y suena natural al inicio de una cláusula poética.
- source_word: הִמְרוּ
  english_pob_choice: rebelled against
  chosen_spanish: se rebelaron contra
  alternatives_spanish:
  - desafiaron
  - fueron rebeldes contra
  lexicon: HALOT
  rationale: La raíz מרה expresa rebelión o desafío frente a una autoridad; 'se rebelaron contra' mantiene esa fuerza relacional y verbal sin volverlo más débil que el original.
- source_word: אִמְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las declaraciones de
  lexicon: HALOT
  rationale: El constructo plural de אמרה admite 'palabras', 'dichos' o 'declaraciones'. 'Las palabras de' es natural en español y suficientemente amplio para el discurso divino.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Fuerte
  - el Dios Poderoso
  lexicon: HALOT
  rationale: אֵל es aquí un designador divino estándar. 'Dios' es la equivalencia más clara en español y preserva el sentido sin añadir matices no necesarios.
- source_word: וַעֲצַת
  english_pob_choice: and the counsel of
  chosen_spanish: y el consejo de
  alternatives_spanish:
  - y el plan de
  - y el propósito de
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo, plan o propósito. 'Consejo' conserva bien la idea de deliberación sabia y encaja con el paralelismo poético.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Altísimo Dios
  lexicon: HALOT
  rationale: עֶלְיוֹן es el título divino tradicional 'the Most High'. 'El Altísimo' es la forma española establecida y mantiene su fuerza titular.
- source_word: נָאָצוּ
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - desdeñaron
  - trataron con desprecio
  - rechazaron con desprecio
  lexicon: HALOT
  rationale: נאץ expresa desprecio o trato desdeñoso. 'Despreciaron' reproduce bien la carga negativa y resulta idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Paralelismo de títulos divinos en la línea poética
  english_pob_reading: God ... the Most High
  chosen_spanish_reading: Dios ... el Altísimo
  alternative_spanish_readings:
  - el Dios Fuerte ... el Exaltado
  - el Dios Poderoso ... el Altísimo
  rationale: El hebreo usa dos designaciones divinas en paralelismo. Mantener 'Dios' y 'el Altísimo' conserva la distinción semántica y la elevación poética sin introducir una carga doctrinal ajena al verso.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó estable; no se registran cambios posteriores. La propuesta española sigue ese mismo sentido sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el hebreo usa אֵל y no el tetragrámaton.
  - '''Altísimo'' mantiene el título divino tradicional y no sustituye la fuerza semántica del hebreo.'
  - '''Despreciaron'' preserva el tono fuerte de נאץ sin suavizarlo a una simple desaprobación.'
