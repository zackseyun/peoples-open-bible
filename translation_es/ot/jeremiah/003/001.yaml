base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/001.yaml
  text: It is said[a], ‘If a man sends away his wife, and she goes from him and becomes another man’s, will he return to her again? Would not that land be utterly polluted? But you have prostituted yourself with many lovers[b], and would you return to me?’ declares Yahweh.
  footnotes:
  - marker: a
    text: Or, 'and yet return to me,' taking the final clause as an imperative invitation rather than a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'becomes another man's,' that is, becomes another man's wife.
    reason: lexical_alternative
