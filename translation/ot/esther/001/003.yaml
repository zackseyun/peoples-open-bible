id: EST.1.3
reference: Esther 1:3
source:
  edition: WLC
  text: בִּ/שְׁנַ֤ת שָׁלוֹשׁ֙ לְ/מָלְכ֔/וֹ עָשָׂ֣ה מִשְׁתֶּ֔ה לְ/כָל שָׂרָ֖י/ו וַ/עֲבָדָ֑י/ו חֵ֣יל פָּרַ֣ס וּ/מָדַ֗י הַֽ/פַּרְתְּמִ֛ים וְ/שָׂרֵ֥י הַ/מְּדִינ֖וֹת לְ/פָנָֽי/ו־׀׃
translation:
  text: In the third year of his reign[a], he gave a banquet for all his officials and servants—the army of Persia and Media, the nobles[c][b], and the officials of the provinces before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a feast'; the Hebrew term can denote a banquet characterized by drinking and celebration.
    reason: lexical_alternative
  - marker: b
    text: Or 'the army of Persia and Media.'
    reason: lexical_alternative
  - marker: c
    text: That is, in his presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת שָׁלוֹשׁ
  chosen: In the third year
  alternatives:
  - In year three
  lexicon: HALOT
  rationale: The construct phrase with ordinal sense is idiomatically rendered as a temporal expression in English. 'In the third year' is natural and preserves the chronological marker.
- source_word: לְמָלְכוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - when he became king
  lexicon: HALOT
  rationale: The infinitive/nominal form from מלך with 3ms suffix refers to the period of reigning, not merely accession. 'Of his reign' is the standard and precise temporal complement.
- source_word: עָשָׂה
  chosen: he gave
  alternatives:
  - he made
  - he held
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with מִשְׁתֶּה the idiomatic English expression is 'gave a banquet' or 'held a banquet.' 'Gave' is natural while staying close to the event described.
- source_word: מִשְׁתֶּה
  chosen: a banquet
  alternatives:
  - a feast
  - a drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה often denotes a feast centered on drinking and celebration. 'Banquet' fits modern English and the royal court setting. 'Feast' is possible but slightly broader; 'drinking feast' is more explicit than needed in the main text.
- source_word: לְכָל שָׂרָיו וַעֲבָדָיו
  chosen: for all his officials and servants
  alternatives:
  - for all his princes and servants
  - for all his officials and attendants
  lexicon: HALOT
  rationale: שָׂרִים are ruling officials or princes; 'officials' communicates administrative rank in accessible English. עֲבָדִים here likely refers to royal functionaries/court servants rather than slaves in a chattel sense, so 'servants' best fits context.
- source_word: חֵיל פָּרַס וּמָדַי
  chosen: the military force of Persia and Media
  alternatives:
  - the army of Persia and Media
  - the power of Persia and Media
  lexicon: HALOT
  rationale: חֵיל can denote military force, army, or strength. In this courtly-political list, 'military force' captures the collective martial establishment represented at the banquet. 'Army' is possible but may sound too narrowly like enlisted troops only.
- source_word: הַפַּרְתְּמִים
  chosen: the nobles
  alternatives:
  - the courtiers
  - the aristocrats
  lexicon: HALOT
  rationale: This Persian loanword refers to high-ranking nobles. 'Nobles' is the clearest concise rendering in English.
- source_word: וְשָׂרֵי הַמְּדִינוֹת
  chosen: and the officials of the provinces
  alternatives:
  - and the princes of the provinces
  - and the governors of the provinces
  lexicon: HALOT
  rationale: Again שָׂרֵי denotes officials/rulers. 'Officials of the provinces' is broad enough to include provincial leaders without over-specifying a formal title like 'governors.'
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: The phrase literally means 'before him' and indicates attendance in the king's presence. Retaining 'before him' preserves the formal courtly sense and Hebrew imagery.
