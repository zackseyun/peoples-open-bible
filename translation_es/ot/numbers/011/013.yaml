review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: la pregunta de Moisés sobre de dónde obtener carne, la finalidad de darla a todo el pueblo, y la queja introducida por כי. También conserva la cita directa y el valor de בשר como alimento cárnico. Sin embargo, «lloran hacia mí» no representa bien el giro idiomático יִבְכּוּ עָלַי en español natural ni sigue adecuadamente la revisión inglesa final «they are weeping to me».'
  spanish_quality_summary: El texto es claro y mayormente natural, con registro digno. La principal dificultad es «lloran hacia mí», que suena poco idiomático en español bíblico y general. Una forma como «me lloran» sería demasiado extraña; «lloran ante mí» cambiaría el matiz; «lloran delante de mí» es posible pero menos cercana a la revisión auditada. «Me vienen llorando» añade dinamismo no explícito. La mejor solución breve y natural es «me lloran[a]», respaldada por nota explicativa, o alternativamente «lloran ante mí[a]». Para legibilidad y cercanía formal al original/revisión, prefiero «me lloran[a]», aunque requiere nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «carne» para בָּשָׂר es correcto en este contexto. No aparecen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: La frase «lloran[a] hacia mí» es poco natural en español y no transmite bien el valor idiomático de עָלַי.
    rationale: «Hacia mí» indica dirección espacial, pero con «llorar» resulta forzado. El hebreo expresa llanto dirigido/presionando a Moisés. La revisión inglesa final eligió «to me», no «toward me». En español se necesita un giro más idiomático con nota aclaratoria.
  - severity: low
    issue: La nota al pie es útil, pero el texto base debería anclar un giro español más funcional antes de depender de la explicación.
    rationale: La nota preserva bien las alternativas, pero no compensa del todo una redacción principal poco natural.
  revised_spanish_text: '¿De dónde voy a sacar carne para dar a todo este pueblo? Porque me lloran[a], diciendo: «Danos carne, para que comamos».'
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente «lloran sobre mí»; también puede entenderse «lloran delante de mí» o «me presionan con su llanto».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «lloran hacia mí» por «me lloran[a]» porque el borrador original suena poco idiomático y no refleja bien el llanto dirigido a Moisés. La nota conserva el literal hebreo y las alternativas semánticas ya documentadas. El resto del versículo puede mantenerse, pues es fiel al origen y claro en español.
