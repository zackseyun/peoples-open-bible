    ዕለት፡ ከመ፡ እሙንቱ፡ ይድኅኑ። ወበእማንቱ፡ መዋዕል፡ ይነብር፡ ኅሩይ፡ ዲበ፡ መንበሩ፡ ወኵሎ፡ ኅሊናተ፡ ጥበብ፡ እምኅሊና፡ አፉሁ፡ ያወፅእ፡ እስመ፡ እግዚአ፡ መናፍስት፡ ወሀቦ፡ ወሰብሖ።
