    text: Or, 'your conduct with me in the camp is pleasing in my sight.' The Hebrew literally says, 'your going out and your coming in with me in the camp is good in my sight.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the lords' (סְרָנִים), the title used for the Philistine rulers.
    reason: cultural_note
  - marker: c
    text: Or, 'you are not acceptable' in the eyes of the Philistine rulers.
    reason: alternative_reading
