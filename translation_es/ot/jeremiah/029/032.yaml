base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/029/032.yaml
  text: 'Therefore thus says Yahweh: Behold[a], I am about to punish Shemaiah the Nehelamite and his offspring. He will not have a man dwelling among this people, nor will he see the good that I am doing for my people, declares Yahweh[b], because he has spoken rebellion against Yahweh.'
  footnotes:
  - marker: a
    text: Or possibly 'Shemaiah the dreamer'; the epithet הַנֶּחֱלָמִי may be connected with dreaming, but its exact force here is uncertain, so the main text preserves it as a proper designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'apostasy' or 'revolt' against the LORD.
    reason: lexical_alternative
