translation:
  language: es
  text: 'Y él dijo: «¿Por qué vas a él hoy? No es luna nueva ni sábado». Y ella respondió: «Paz»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Está bien» o «Todo está bien». Hebreo: «Paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Con qué motivo
  lexicon: HALOT
  rationale: La pregunta hebrea pide causa o motivo; «¿Por qué» es la equivalencia natural y directa en español.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él, a Elíseo
  - hacia él
  lexicon: HALOT
  rationale: El hebreo usa un pronombre; «a él» conserva esa forma sin explicitar el referente en el texto principal.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal idiomático; «hoy» es la forma natural y fiel en español.
- source_word: לֹא חֹדֶשׁ וְלֹא שַׁבָּת
  english_pob_choice: It is neither new moon nor Sabbath
  chosen_spanish: No es novilunio ni sábado
  alternatives_spanish:
  - No es luna nueva ni sábado
  - No es fiesta de novilunio ni sábado
  lexicon: HALOT
  rationale: Se conserva el marco calendárico-cultual. «Novilunio» refleja mejor el observancia del חדש en este contexto que «mes»; se mantiene «sábado» como término bíblico conocido para שַׁבָּת.
- source_word: חֹדֶשׁ
  english_pob_choice: new moon
  chosen_spanish: novilunio
  alternatives_spanish:
  - luna nueva
  - novilunio ritual
  lexicon: HALOT
  rationale: En este contexto ritual, el término apunta a la observancia del novilunio, no solo al mes. «Novilunio» preserva la referencia calendárica y cultual con precisión.
- source_word: שַׁבָּת
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbat
  - día de reposo
  lexicon: HALOT
  rationale: «Sábado» comunica el día sagrado israelita de manera clara y reconocible en español; «día de reposo» explicita la función pero pierde el término tradicional bíblico.
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Está bien
  - Todo está bien
  - Bien
  lexicon: HALOT
  rationale: El sustantivo hebreo significa literalmente «paz», y aquí funciona como respuesta breve de tranquilidad. Se mantiene la transparencia léxica en el texto principal.
theological_decisions:
- issue: Alcance idiomático de שָׁלוֹם en la respuesta de ella
  english_pob_reading: 'Peace, with note: Or “It is well” or “All is well.” Hebrew “Peace.”'
  chosen_spanish_reading: 'Paz, con nota de posibilidad idiomática: «Está bien» o «Todo está bien»'
  alternative_spanish_readings:
  - Está bien
  - Todo está bien
  - Bien
  rationale: El hebreo literal es «paz», pero en un saludo/respuesta breve puede equivaler idiomáticamente a una afirmación de bienestar. La nota preserva esa tensión sin borrar la forma original.
  doctrine_reference: Ninguna
- issue: Valor cultual de חֹדֶשׁ y שַׁבָּת como ocasiones de visita
  english_pob_reading: It is neither new moon nor Sabbath
  chosen_spanish_reading: No es novilunio ni sábado
  alternative_spanish_readings:
  - No es luna nueva ni sábado
  - No es fiesta de novilunio ni sábado
  rationale: La pregunta presupone que la visita al profeta no corresponde a una ocasión sagrada ordinaria. «Novilunio» mantiene el matiz cultual del calendario israelita sin sobreexplicarlo.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se verificó la lectura auditada en inglés. No se requieren cambios respecto del último pase revisado; la solución mantiene la transparencia léxica de שָׁלוֹם y la referencia cultual de חֹדֶשׁ/שַׁבָּת.
  spanish_consistency_notes:
  - Se usó «Y él dijo» para reflejar la continuidad narrativa del hebreo וַיֹּאמֶר.
  - Se prefirió «a él» sobre especificar «a Eliseo» en el texto principal para conservar el pronombre hebreo.
  - «sábado» se mantuvo por inteligibilidad bíblica; «novilunio» evita reducir חֹדֶשׁ a «mes».
  - La nota sobre שָׁלוֹם se ancla en ambas ocurrencias para conservar la ambigüedad idiomática del término en la breve respuesta.
