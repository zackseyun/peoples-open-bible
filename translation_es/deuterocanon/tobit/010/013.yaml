translation:
  language: es
  text: Después de esto, Tobías siguió su camino, bendiciendo a Dios porque había hecho prosperar su viaje[a], y seguía bendiciendo a Ragüel y a Edna, su esposa. Y siguió adelante hasta que se acercaron a Nínive[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «porque prosperó su camino», un giro idiomático que significa que Dios dio éxito a su viaje.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego presenta una construcción algo irregular: el verbo está en plural («se acercaron») junto con un pronombre singular («a él»). La traducción sigue el sentido narrativo probable: el grupo de viajeros se acercó a Nínive.'
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de aquellas cosas
  - Más tarde
  lexicon: LSJ
  rationale: Expresa la transición temporal de forma natural en español y conserva la relación narrativa sin volverla rígidamente literal.
- source_word: ἐπορεύετο
  english_pob_choice: went on his way / went on
  chosen_spanish: siguió su camino / siguió adelante
  alternatives_spanish:
  - iba
  - viajaba
  - anduvo
  lexicon: LSJ
  rationale: El imperfecto comunica movimiento continuo; en español, 'seguir su camino' y 'seguir adelante' preservan ese carácter progresivo con buena fluidez.
- source_word: εὐλογῶν τὸν θεόν
  english_pob_choice: blessing God
  chosen_spanish: bendiciendo a Dios
  alternatives_spanish:
  - alabando a Dios
  - diciendo bendición sobre Dios
  lexicon: LSJ
  rationale: '''Bendiciendo'' mantiene la familia léxica de εὐλογέω y evita sustituirla por un término más general como ''alabando''.'
- source_word: ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ
  english_pob_choice: because he had made his journey successful
  chosen_spanish: porque había prosperado su viaje
  alternatives_spanish:
  - porque había dado éxito a su viaje
  - porque había hecho próspero su camino
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de prosperar el camino o viaje, que atribuye el éxito del trayecto a Dios sin explicitar más de lo que dice el griego.
- source_word: κατευλόγει
  english_pob_choice: he kept blessing
  chosen_spanish: seguía bendiciendo
  alternatives_spanish:
  - continuaba bendiciendo
  - bendecía repetidamente
  lexicon: LSJ
  rationale: El imperfecto pide una acción continua o reiterada; 'seguía bendiciendo' lo expresa de manera natural en español.
- source_word: Ῥαγουὴλ καὶ Ἔδναν τὴν γυναῖκα αὐτοῦ
  english_pob_choice: Raguel and Edna his wife
  chosen_spanish: a Ragüel y a Edna, su esposa
  alternatives_spanish:
  - a Ragüel y a Edna, la esposa de él
  - a Ragüel y a Edna, su mujer
  lexicon: LSJ
  rationale: La apposición puede entenderse como 'Edna, su esposa'; en español la coma aclara la relación sin perder el orden cercano al griego.
- source_word: μέχρις οὗ ἤγγισαν αὐτὸν εἰς Νινευή
  english_pob_choice: until they came near to Nineveh
  chosen_spanish: hasta que se acercaron a Nínive
  alternatives_spanish:
  - hasta que llegaron cerca de Nínive
  - hasta que él se acercó a Nínive
  lexicon: LSJ
  rationale: Se sigue la lectura narrativa que entiende el plural como referencia al grupo que viajaba, manteniendo la solución del POB inglés ante la irregularidad sintáctica.
theological_decisions:
- issue: Atribución de éxito al viaje
  english_pob_reading: God is the one who granted success to Tobiah's journey
  chosen_spanish_reading: Dios fue quien prosperó el viaje de Tobías
  alternative_spanish_readings:
  - Dios prosperó el camino mismo
  - Dios dio éxito al emprendimiento del viaje
  rationale: La cláusula mantiene la atribución providencial a Dios sin añadir interpretación doctrinal extra; 'prosperó su viaje' conserva el valor idiomático del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source''s theological claim without expansion.'
translation_notes:
  revision_awareness: No se requirieron cambios respecto al último pase de revisión; la redacción mantiene la lectura narrativa y la solución al desajuste sintáctico del griego transmitido.
  spanish_consistency_notes:
  - Se conserva 'Tobías' para el nombre propio, en línea con la tradición española y el audit trail inglés 'Tobiah'.
  - Se usa 'bendecir' para εὐλογέω y no 'alabar', para mantener la continuidad léxica con el texto griego.
  - Se emplea 'Nínive' con tilde según norma del español.
  - La solución de 'se acercaron' sigue la decisión inglesa de entender el plural del verbo como referente al grupo de viajeros.
