translation:
  language: es
  text: Pero pongámonos al acecho contra el justo[a], porque nos resulta molesto y se opone a nuestras obras, y nos reprocha pecados contra la ley, y nos acusa de pecados contra nuestra formación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el justo». El singular griego puede designar a una persona justa representativa.
    reason: lexical_alternative
  - marker: b
    text: O «pecados contra nuestra crianza/educación» o «contra nuestra disciplina». El griego παιδεία puede significar crianza, formación o disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεδρεύσωμεν
  english_pob_choice: let us lie in wait
  chosen_spanish: acechemos
  alternatives_spanish:
  - pongámonos al acecho
  - embosquemos
  - tendamos una trampa
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide una primera persona plural inclusiva. «Acechemos» conserva la idea de vigilancia hostil y de emboscada sin añadir un nivel de concreción que el griego no exige. Es más natural en español bíblico que un calco como «yazcamos en espera».
- source_word: τὸν δίκαιον
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el justo hombre
  - el justo varón
  lexicon: LSJ
  rationale: El artículo singular funciona de modo representativo. En español, «el justo» mantiene la fuerza sustantivada del griego y evita una formulación pesada. El masculino singular conserva la forma griega sin forzar un giro explicativo innecesario.
- source_word: δύσχρηστος
  english_pob_choice: troublesome
  chosen_spanish: molesto
  alternatives_spanish:
  - incómodo
  - fastidioso
  - difícil de tratar
  lexicon: LSJ
  rationale: El valor aquí no es «inútil», sino «difícil/irritante de tratar». «Molesto» transmite bien la irritación moral que el impío experimenta ante el justo y suena natural en español, aunque «difícil de tratar» también es viable si se quisiera más explicitud.
- source_word: ἐναντιοῦται
  english_pob_choice: opposes
  chosen_spanish: se opone a
  alternatives_spanish:
  - se enfrenta a
  - está contra
  - resiste
  lexicon: LSJ
  rationale: La forma media en contexto expresa resistencia activa. «Se opone a» reproduce con claridad la oposición frontal a las obras de los impíos y es idiomático en español.
- source_word: τοῖς ἔργοις ἡμῶν
  english_pob_choice: our deeds
  chosen_spanish: nuestras obras
  alternatives_spanish:
  - nuestras acciones
  - lo que hacemos
  - nuestros hechos
  lexicon: LSJ
  rationale: «Obras» conserva el matiz moral de ἔργα en este contexto acusatorio mejor que una expresión neutral como «acciones». Además coincide con el campo semántico del pasaje sin introducir una paráfrasis.
- source_word: ὀνειδίζει
  english_pob_choice: reproaches
  chosen_spanish: reprocha
  alternatives_spanish:
  - reprende
  - nos echa en cara
  - nos afrenta
  lexicon: LSJ
  rationale: «Reprocha» refleja censura verbal sin añadir la burla de «afrenta» ni el tono más exhortativo de «reprende». Sigue de cerca la decisión inglesa y mantiene el tono acusatorio.
- source_word: ἁμαρτήματα νόμου
  english_pob_choice: sins against the law
  chosen_spanish: pecados contra la ley
  alternatives_spanish:
  - transgresiones de la ley
  - faltas contra la ley
  - pecados de la ley
  lexicon: LSJ
  rationale: 'La relación del genitivo se entiende de modo objetivo: pecados cometidos contra la ley. «Pecados contra la ley» conserva la fuerza jurídica y moral del original sin sobrecargar el verso.'
- source_word: ἐπιφημίζει
  english_pob_choice: charges us with
  chosen_spanish: nos acusa de
  alternatives_spanish:
  - nos imputa
  - nos echa en cara
  - formula contra nosotros
  lexicon: LSJ
  rationale: El verbo tiene tono forense de atribución/acusación. «Nos acusa de» es la equivalencia española más directa y transparente para el juicio que los impíos perciben.
- source_word: ἁμαρτήματα παιδείας ἡμῶν
  english_pob_choice: sins against our upbringing
  chosen_spanish: pecados contra nuestra crianza
  alternatives_spanish:
  - pecados contra nuestra educación
  - pecados contra nuestra formación
  - faltas contra nuestra disciplina
  lexicon: LSJ
  rationale: El griego παιδεία puede significar crianza, formación, disciplina o instrucción. Aquí el contexto moral sugiere la formación recibida, y «crianza» comunica esa idea de modo amplio y natural en español, sin reducirla al ámbito escolar. Se mantiene la tensión semántica entre educación moral y disciplina.
theological_decisions:
- issue: El singular representativo de τὸν δίκαιον
  english_pob_reading: the righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el hombre justo
  - el justo como figura representativa
  rationale: El texto presenta al justo como tipo o representante del justo perseguido por los impíos. «El justo» conserva el singular griego y permite la lectura representativa sin añadir una explicación intrusiva en el cuerpo del verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: El sentido de παιδεία como formación moral más que mera escolaridad
  english_pob_reading: our upbringing
  chosen_spanish_reading: nuestra crianza
  alternative_spanish_readings:
  - nuestra formación
  - nuestra educación
  - nuestra disciplina
  rationale: El contexto es una acusación ética, no una referencia a instrucción académica. «Crianza» mantiene el alcance de formación recibida en el hogar y la comunidad, y deja abierta la carga de disciplina moral que el pasaje sugiere.
  doctrine_reference: DOCTRINE.md §Lexical fidelity and contextual range
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés. Se adoptó «acechemos» para ἐνεδρεύσωμεν, «el justo» para τὸν δίκαιον, «molesto» para δύσχρηστος, «se opone a» para ἐναντιοῦται, «reprocha» para ὀνειδίζει, y «nos acusa de» para ἐπιφημίζει. Para παιδείας se prefirió «crianza», alineado con la revisión inglesa más reciente que favorece «upbringing» frente a «training», sin perder la amplitud formativa del término.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se mantuvo un registro formal y bíblico, evitando un español arcaizante innecesario.
  - «Obras» se usó para ἔργα por su color moral en este contexto.
  - No se introdujo «Cristo» ni otros términos cristológicos ajenos al versículo.
