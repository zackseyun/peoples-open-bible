review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue correctamente decisiones clave del POB: אַךְ como advertencia enfática (''Solo''), יָדֹעַ תֵּדְעוּ como certeza intensificada, מְמִתִים en sentido causativo/judicial, דָם נָקִי como ''sangre inocente'', y יְהוָה como ''Yahvé''. Sin embargo, la última cláusula no preserva bien la idiomaticidad documentada de בְּאָזְנֵיכֶם: el inglés auditado eligió ''in your hearing'', mientras que ''a sus oídos'' suena más literal y menos natural en español.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos puntos mejorables: ''estarán poniendo sangre inocente'' es menos idiomático que ''estarán echando/atrayendo sobre ustedes la culpa de sangre inocente'', aunque todavía comprensible; y ''a sus oídos'' resulta forzado en español bíblico contemporáneo. Conviene reparar esa frase final para mayor naturalidad y fidelidad al rationale del audit trail.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: ''Yahvé'' correcto para יְהוָה; no hay conflictos con Mesías/Cristo ni otros términos doctrinales. ''Sangre inocente'' y ''me dan muerte'' encajan bien con las decisiones léxicas documentadas. La principal desalineación es idiomática, no glosarial, en ''a sus oídos'' frente a la intención de ''en su oído/para que oigan''.'
  issues:
  - severity: medium
    issue: La expresión 'a sus oídos' no reproduce naturalmente el modismo hebreo בְּאָזְנֵיכֶם.
    rationale: El audit trail inglés explicó que la frase significa 'in your hearing'. En español, 'a sus oídos' suena calco y puede sugerir dirección física más que audiencia. 'Delante de ustedes' sería más libre; 'para que ustedes oigan' o 'en presencia de ustedes' serían opciones, pero 'a oídos de ustedes' tampoco mejora. La mejor solución cercana es 'para que ustedes oigan' o 'en sus oídos' solo en nota.
  - severity: low
    issue: La nota b usa 'en su audiencia', expresión poco natural en español.
    rationale: Aunque intenta explicar el modismo, 'audiencia' en español suele referirse al público o a una sesión formal, no a la capacidad de oír. Debe decir 'para que ustedes oigan' o 'en presencia de ustedes'.
  revised_spanish_text: Solo sepan con certeza que, si me dan muerte[a], estarán poniendo sangre inocente sobre ustedes, sobre esta ciudad y sobre sus habitantes; porque en verdad Yahvé me ha enviado a ustedes para hablar todas estas palabras para que ustedes oigan[b].
  revised_footnotes:
