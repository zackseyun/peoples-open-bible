translation:
  language: es
  text: Porque ellos no duermen si no hacen el mal, y se les quita el sueño si no hacen tropezar[a] a alguien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no tropiezan ellos mismos». El hebreo es breve y puede entenderse ya sea como causar que otro tropiece o como tropezar ellos mismos; el contexto favorece la idea de causar daño a otro.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del proverbio anterior; «Porque» conserva esa relación y suena natural en español bíblico contemporáneo.
- source_word: יִשְׁנוּ
  english_pob_choice: they do not sleep
  chosen_spanish: no duermen
  alternatives_spanish:
  - no se duermen
  - no pueden dormir
  lexicon: HALOT
  rationale: El imperfecto negado expresa una acción habitual o característica; «no duermen» conserva la forma verbal simple y evita añadir la idea más interpretativa de incapacidad.
- source_word: יָרֵעוּ
  english_pob_choice: they do evil
  chosen_spanish: hacen el mal
  alternatives_spanish:
  - hacen daño
  - obran mal
  - practican el mal
  lexicon: HALOT
  rationale: La forma hiphil puede abarcar hacer el mal o causar daño; «hacen el mal» mantiene la amplitud moral del hebreo sin especificar un objeto que el texto no explicita.
- source_word: וְנִגְזְלָה
  english_pob_choice: is taken away
  chosen_spanish: se les quita
  alternatives_spanish:
  - es robado
  - es arrebatado
  - les es quitado
  lexicon: HALOT
  rationale: El nifal expresa pasividad; en español, «se les quita» comunica de manera natural que algo les es quitado, en este caso el sueño.
- source_word: שְׁנָתָם
  english_pob_choice: their sleep
  chosen_spanish: el sueño
  alternatives_spanish:
  - su sueño
  - su dormir
  - su descanso
  lexicon: HALOT
  rationale: El sustantivo se refiere al sueño mismo. En español, «el sueño» resulta claro y fluido; el pronombre dativo en la frase anterior ya indica a quién se les quita.
- source_word: יכשולו
  english_pob_choice: they make someone stumble
  chosen_spanish: hacen tropezar a alguien
  alternatives_spanish:
  - causan que alguien tropiece
  - hacen caer a alguien
  - ellos mismos tropiezan
  lexicon: HALOT
  rationale: 'La lectura preferida en contexto es causativa: provocar la caída de otro. «Hacen tropezar a alguien» preserva la metáfora de tropiezo y el carácter relacional del daño.'
theological_decisions:
- issue: Alcance de la maldad en יָרֵעוּ
  english_pob_reading: General evil-doing rather than a narrowly specified harm against a victim
  chosen_spanish_reading: Hacen el mal, sin precisar aún un objeto concreto
  alternative_spanish_readings:
  - hacen daño a otros
  - cometen maldades
  rationale: El hebreo no expresa explícitamente el objeto; la versión española debe conservar esa amplitud moral antes de que la segunda cláusula concrete el daño mediante la imagen de hacer tropezar.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de יכשולו
  english_pob_reading: 'Causative in context: causing another person to stumble/fall'
  chosen_spanish_reading: 'Causativo: hacen tropezar a alguien'
  alternative_spanish_readings:
  - ellos mismos tropiezan
  - hacen caer a alguien
  rationale: La paralelización con «hacer el mal» y la lógica sapiencial favorecen que la acción recaiga sobre otra persona. Se mantiene la alternativa intransitiva como posibilidad reconocida por la brevedad del hebreo, pero no como lectura principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: «do evil» en vez de «have done evil» y «cause someone to stumble» en lugar de «make someone stumble». La versión española sigue esa preferencia por una formulación más directa y formal, sin introducir un pasado perfecto innecesario.'
  spanish_consistency_notes:
  - Se mantuvo «el mal» para יָרֵעוּ, en lugar de intensificar a «maldad» o «daño» sin necesidad contextual.
  - Se optó por «se les quita el sueño» para reflejar bien el pasivo hebreo y evitar un giro más pesado como «les es quitado el sueño».
  - La nota al pie preserva la tensión textual entre una lectura causativa y una intransitiva, como en el audit trail inglés.
