translation:
  language: es
  text: Los ungirás como ungiste a su padre, para que me sirvan como sacerdotes. Y su unción será para ellos un sacerdocio eterno[a] por todas sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sacerdocio perpetuo». El hebreo puede expresar una continuidad duradera en contexto pactual, especialmente a través de las generaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: You shall anoint
  chosen_spanish: Los ungirás
  alternatives_spanish:
  - Y los ungirás
  - Ungirás a ellos
  lexicon: HALOT / 4886
  rationale: El verbo qal en secuencia instructiva expresa mandato futuro. En español, «ungirás» conserva la fuerza directiva con naturalidad. Se antepone el objeto «los» para fluidez y claridad referencial.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: La comparación es directa entre la unción de los hijos y la de su padre. «Como» es suficiente en español; el matiz de exactitud queda reforzado por el contexto.
- source_word: מָשַׁחְתָּ
  english_pob_choice: you anointed
  chosen_spanish: ungiste
  alternatives_spanish:
  - habías ungido
  - ungiste tú
  lexicon: HALOT
  rationale: El referente es la unción previa de Aarón. El pretérito simple reproduce adecuadamente la referencia pasada sin añadir aspecto que el contexto no exige.
- source_word: אֶת אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ellos
  - Aarón, su padre
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo para Aarón; en español «su padre» comunica la relación familiar de manera directa y natural.
- source_word: וְכִהֲנוּ לִי
  english_pob_choice: so that they may serve as priests to me
  chosen_spanish: y ellos ministrarán para mí como sacerdotes
  alternatives_spanish:
  - y servirán como sacerdotes para mí
  - y harán de sacerdotes para mí
  lexicon: HALOT
  rationale: כִּהֵן expresa ejercer el oficio sacerdotal. «Ministrarán» mantiene el sentido cultual sin reducirlo a una mera función administrativa; «como sacerdotes» explicita la idea verbal. «Para mí» conserva la dirección del servicio hacia Yahvé.
- source_word: וְהָיְתָה לִהְיוֹת לָהֶם
  english_pob_choice: And their anointing shall be for them
  chosen_spanish: Y su unción será para ellos
  alternatives_spanish:
  - Y esto será para ellos
  - Y quedará para ellos
  lexicon: HALOT
  rationale: La construcción hebrea introduce el resultado o estado derivado de la unción. En español, «será para ellos» conserva el valor resultativo de modo idiomático.
- source_word: מָשְׁחָתָם
  english_pob_choice: their anointing
  chosen_spanish: su unción
  alternatives_spanish:
  - su unción por consagración
  - su ungimiento
  lexicon: HALOT
  rationale: El sustantivo puede referir a la unción misma o a la consagración mediante ella. «Su unción» mantiene la ambigüedad útil del hebreo y coincide con el valor lexical principal.
- source_word: לִכְהֻנַּת עוֹלָם
  english_pob_choice: an everlasting priesthood
  chosen_spanish: un sacerdocio eterno
  alternatives_spanish:
  - un sacerdocio perpetuo
  - un sacerdocio permanente
  lexicon: HALOT
  rationale: כהֻנָּה se traduce por «sacerdocio». עוֹלָם en contexto pactual expresa duración continua y estable; «eterno» sigue bien la fuerza del inglés POB y la tradición bíblica, sin eliminar la posibilidad de continuidad generacional que el contexto mismo añade.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La expresión denota continuidad a través de los descendientes. «Por todas sus generaciones» es una formulación clara y fiel para español contemporáneo.
theological_decisions:
- issue: Alcance de עוֹלָם en el sacerdocio aarónico
  english_pob_reading: an everlasting priesthood
  chosen_spanish_reading: un sacerdocio eterno
  alternative_spanish_readings:
  - un sacerdocio perpetuo
  - un sacerdocio permanente
  rationale: El hebreo puede señalar continuidad duradera en marco pactual, no una afirmación filosófica abstracta sobre infinitud. Se mantiene «eterno» porque reproduce con fuerza el valor semántico central y deja intacta la lectura de continuidad covenantal; el complemento «por todas sus generaciones» ayuda a evitar absolutizaciones indebidas.
  doctrine_reference: Translation philosophy §1, §5
- issue: Naturaleza del verbo sacerdotal כִּהֵן
  english_pob_reading: serve as priests to me
  chosen_spanish_reading: ministrarán para mí como sacerdotes
  alternative_spanish_readings:
  - servirán como sacerdotes para mí
  - ejercerán el sacerdocio para mí
  rationale: El verbo no solo describe estatus, sino ejercicio del oficio sacerdotal. «Ministrarán» preserva el matiz funcional y cultual sin confundirlo con ministerio eclesiástico moderno; «como sacerdotes» aclara el oficio en español.
  doctrine_reference: Lexical-theological note on cultic priesthood
- issue: Relación entre la unción y la consagración
  english_pob_reading: their anointing
  chosen_spanish_reading: su unción
  alternative_spanish_readings:
  - su consagración por unción
  - su ungimiento
  rationale: El sustantivo hebreo mantiene la referencia al acto de ungir, con posible valor de consagración resultante. «Su unción» conserva esa tensión sin resolverla en exceso hacia una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el audit trail inglés: no se requieren revisiones adicionales; se conserva la comparación explícita, el verbo sacerdotal cultual y la tensión semántica de עוֹלָם.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparece el nombre divino; aquí el versículo no lo contiene explícitamente.
  - «Ungir» se mantiene para מָשַׁח, y «unción» para מָשְׁחָה/מָשְׁחָתָם, conservando la relación léxica.
  - «Sacerdocio» traduce כְהֻנָּה y no se sustituye por lenguaje eclesiástico posterior.
  - La nota a pie de página preserva la alternativa lexical documentada en el inglés POB sin ampliar indebidamente el sentido.
