translation:
  language: es
  text: Pero yo lo estableceré en mi casa[a] y en mi reino para siempre[b][c], y su trono será firme para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi casa» puede referirse a la casa de Dios en un sentido amplio del pacto; algunos lo entienden más específicamente como el templo o como la casa real de Dios.
    reason: alternative_reading
  - marker: b
    text: «Lo» puede referirse inmediatamente al descendiente real de David, especialmente Salomón, y a la vez contribuir a la promesa davídica más amplia, entendida después en sentido mesiánico.
    reason: alternative_reading
  - marker: c
    text: O «Y lo pondré en mi casa y sobre mi reino para siempre». La preposición hebrea puede traducirse de manera más literal, pero el texto principal conserva el paralelismo y el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמַדְתִּיהוּ
  english_pob_choice: But I will establish him
  chosen_spanish: Pero yo lo estableceré
  alternatives_spanish:
  - Y lo estableceré
  - Y lo haré permanecer
  lexicon: HALOT
  rationale: El Hifil de עמד expresa hacer que alguien quede firme o establecido. «Lo estableceré» conserva esa fuerza en español y encaja con el contexto real/dinástico. Se mantiene «pero» para reflejar el giro positivo frente a la advertencia anterior, como en la lectura inglesa.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - sobre mi casa
  - en mi templo
  - en mi casa de gobierno
  lexicon: HALOT
  rationale: בית puede abarcar casa, casa dinástica, templo o ámbito/casa real. «En mi casa» sigue de cerca la preposición ב y preserva la amplitud semántica sin decidir prematuramente por templo o dinastía.
- source_word: וּבְמַלְכוּתִי
  english_pob_choice: and in my kingdom
  chosen_spanish: y en mi reino
  alternatives_spanish:
  - y sobre mi reino
  - y en mi realeza
  lexicon: HALOT
  rationale: מלכות se traduce naturalmente por «reino». Mantener «en» reproduce la estructura paralela del hebreo con «en mi casa» y evita sobreinterpretar la preposición como autoridad exclusiva.
- source_word: עַד הָעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión idiomática comunica permanencia duradera. «Para siempre» es natural en español bíblico contemporáneo y conserva el valor de perpetuidad del hebreo.
- source_word: וְכִסְאוֹ
  english_pob_choice: and his throne
  chosen_spanish: y su trono
  alternatives_spanish:
  - y su asiento real
  - y su trono real
  lexicon: HALOT
  rationale: כִּסֵּא significa literalmente «trono». Se conserva el término por su valor real y dinástico, sin diluirlo en una paráfrasis.
- source_word: יִהְיֶה נָכוֹן
  english_pob_choice: will be established
  chosen_spanish: será firme
  alternatives_spanish:
  - será establecido
  - estará firme
  - permanecerá firme
  lexicon: HALOT
  rationale: נָכוֹן expresa firmeza, estabilidad o estar bien establecido. Aquí se eligió «será firme» para evitar la repetición exacta de «estableceré» y para reflejar el matiz de solidez del trono. «Establecido» sigue siendo una alternativa válida, pero «firme» suena más natural en español para un trono.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: Se conserva la misma solución que en la primera cláusula para mantener consistencia estilística y semántica.
theological_decisions:
- issue: Referente de «lo / him» en el contexto davídico
  english_pob_reading: Retain the pronoun "him" without specifying Solomon or the Messiah in the main text.
  chosen_spanish_reading: Conservar el pronombre implícito en «lo» sin especificar a Salomón ni al Mesías en el texto principal.
  alternative_spanish_readings:
  - a Salomón
  - al linaje davídico
  - al Mesías
  rationale: El hebreo usa un pronombre masculino singular y no identifica explícitamente al referente dentro del versículo. La traducción debe preservar esa tensión entre cumplimiento inmediato dinástico y proyección mesiánica, en vez de resolverla interpretativamente en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Alcance de «mi casa»
  english_pob_reading: Translate literally as 'my house' without narrowing it to temple or dynasty in the main text.
  chosen_spanish_reading: Traducir literalmente como «mi casa»/«en mi casa» sin restringirlo a templo o dinastía en el texto principal.
  alternative_spanish_readings:
  - mi templo
  - mi casa dinástica
  - mi familia real
  rationale: En el contexto, «casa» puede sugerir templo, casa real, linaje o ámbito del pacto. La traducción literal preserva esa riqueza semántica y evita imponer una sola lectura.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Revisado frente al audit trail en inglés y al hebreo WLC. No se detectaron cambios obligatorios en la línea propuesta; la redacción española sigue de cerca la decisión óptima-equivalente del original, manteniendo el paralelismo y la amplitud semántica.
  spanish_consistency_notes:
  - Se preservó «para siempre» de forma consistente en ambas apariciones de עַד + עוֹלָם.
  - Se mantuvo el paralelismo «en mi casa / en mi reino» para reflejar la sintaxis hebrea.
  - Se evitó introducir notas o marcadores porque el texto español no necesitó desambiguación adicional visible en el versículo.
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino en la superficie del versículo, por lo que no se introduce.
