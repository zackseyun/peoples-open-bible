    text: O ‘fuente de plata’ para ‘plato de plata’ (קַעֲרַת כֶּסֶף).
    reason: lexical_alternative
  - marker: b
    text: O ‘tazón’ para ‘cuenco’ (מִזְרָק).
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘según el siclo del santuario’, indicando la medida sagrada estándar de peso.'
    reason: cultural_note
  revision_rationale: 'Se ajusta el texto para reflejar con más precisión el hebreo y el expediente POB: ‘mezclada con aceite’ evita una sobreinterpretación; ‘ofrenda de grano’ conserva la especificidad de מִנְחָה; se mejora la naturalidad de la frase de peso; y las notas léxicas ahora preservan alternativas reales y claras en español, en línea con el audit trail inglés.'
