translation:
  language: es
  text: Y si no hace estas tres cosas para ella[a], entonces saldrá libre, sin pagar dinero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no provee estas tres cosas para ella». El hebreo dice literalmente «no hace estas tres para ella», con referencia a la comida, el vestido y los derechos maritales mencionados en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La conjunción mantiene la continuidad condicional con el caso anterior. «Y si» conserva el enlace del hebreo ו y suena natural en español jurídico.
- source_word: שְׁלָשׁ אֵלֶּה
  english_pob_choice: these three things
  chosen_spanish: estas tres cosas
  alternatives_spanish:
  - estas tres
  - las tres cosas
  lexicon: HALOT
  rationale: El demostrativo remite a las tres obligaciones nombradas en el versículo previo. «Cosas» explicita sin añadir contenido sustancial.
- source_word: לֹא יַעֲשֶׂה לָהּ
  english_pob_choice: he does not do ... for her
  chosen_spanish: no hace estas tres cosas para ella
  alternatives_spanish:
  - no las provee para ella
  - no cumple estas tres para ella
  lexicon: HALOT
  rationale: 'עָשָׂה es amplio: «hacer» aquí significa cumplir las tres obligaciones para la mujer. La formulación española conserva esa amplitud y el carácter legal del texto.'
- source_word: וְיָצְאָה
  english_pob_choice: then she shall go out
  chosen_spanish: entonces saldrá
  alternatives_spanish:
  - entonces saldrá fuera
  - entonces se irá
  lexicon: HALOT
  rationale: En lenguaje de esclavitud/liberación, יצא expresa salir de una condición de sujeción. «Saldrá» preserva el idiomático legal y deja que el siguiente miembro precise el sentido de libertad.
- source_word: חִנָּם
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - gratuitamente
  - sin costo
  lexicon: HALOT
  rationale: En este contexto jurídico, חִנָּם indica salida sin rescate ni precio. «Libre» comunica la manumisión de forma breve y natural en español.
- source_word: אֵין כָּסֶף
  english_pob_choice: without payment of money
  chosen_spanish: sin pago de dinero
  alternatives_spanish:
  - sin dinero
  - sin pagar dinero
  - sin rescate
  lexicon: HALOT
  rationale: La frase subraya que no se debe entregar כסף por su salida. «Sin pago de dinero» conserva la fuerza económica y legal del hebreo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español, junto al término al que remite la nota.
  spanish_consistency_notes:
  - Se mantuvo el registro jurídico y sobrio del hebreo.
  - Se preservó la referencia retrospectiva a las tres obligaciones del versículo anterior.
  - No se introdujo terminología eclesiástica ajena al caso legal.
  - La salida «sin pago de dinero» refleja el remate económico del hebreo con claridad moderna.
