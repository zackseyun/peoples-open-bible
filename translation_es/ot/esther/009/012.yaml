  text: Then the king said to Esther the queen[a], “In Susa the citadel the Jews have killed and destroyed five hundred men, along with the ten sons of Haman. What then have they done in the rest of the king’s provinces? Now what is your petition? It will be granted to you. And what is your further request? It will be done.”
  footnotes:
