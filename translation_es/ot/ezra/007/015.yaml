translation:
  language: es
  text: y para llevar la plata y el oro que el rey y sus consejeros han ofrecido voluntariamente al Dios de Israel[a], cuya morada está en Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habita en Jerusalén». El arameo dice más literalmente «cuya morada está en Jerusalén».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְהֵיבָלָה
  english_pob_choice: and to bring
  chosen_spanish: y para llevar
  alternatives_spanish:
  - y para traer
  - y para transportar
  - y para conducir
  lexicon: HALOT
  rationale: El infinitivo arameo con valor de propósito expresa la acción de trasladar los bienes. 'Llevar' es natural en español y conserva la idea de mover algo hacia un destino sin imponer un matiz demasiado técnico.
- source_word: כְּסַף וּדְהַב
  english_pob_choice: the silver and gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - plata y oro
  lexicon: HALOT
  rationale: En español, el artículo definido ayuda a sonar más fluido y refleja que se trata de un conjunto concreto de metales ya determinados por el contexto.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo arameo en estado enfático con valor definido.
- source_word: וְיָעֲטוֹהִי
  english_pob_choice: and his counselors
  chosen_spanish: y sus consejeros
  alternatives_spanish:
  - y sus asesores
  - y sus consultores
  lexicon: HALOT
  rationale: '''Consejeros'' conserva el contexto cortesano y corresponde bien al grupo de funcionarios reales implicado en la ofrenda.'
- source_word: הִתְנַדַּבוּ
  english_pob_choice: have freely offered
  chosen_spanish: han ofrecido voluntariamente
  alternatives_spanish:
  - han hecho una ofrenda voluntaria
  - se han ofrecido libremente
  lexicon: HALOT
  rationale: La forma verbal destaca la voluntariedad del acto. 'Han ofrecido voluntariamente' comunica bien ese rasgo en español sin perder el valor de acción ya realizada.
- source_word: לֶאֱלָהּ יִשְׂרָאֵל
  english_pob_choice: to the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  lexicon: HALOT
  rationale: '''Dios'' es la equivalencia establecida para אֱלָהּ/אֱלֹהִים en el proyecto; la preposición contraída ''al'' refleja correctamente el régimen del verbo de ofrenda.'
- source_word: דִּי בִירוּשְׁלֶם מִשְׁכְּנֵהּ
  english_pob_choice: whose dwelling is in Jerusalem
  chosen_spanish: cuya morada está en Jerusalén
  alternatives_spanish:
  - cuya morada es en Jerusalén
  - que habita en Jerusalén
  - cuya tienda está en Jerusalén
  lexicon: HALOT
  rationale: Se preserva el sustantivo 'morada' para reflejar el hebreo/arameo de 'dwelling place' y evitar reducirlo a una simple acción verbal. 'Está en Jerusalén' mantiene la relación locativa sin sugerir confinamiento divino.
theological_decisions:
- issue: Relación de Dios con Jerusalén en מִשְׁכְּנֵהּ
  english_pob_reading: whose dwelling is in Jerusalem
  chosen_spanish_reading: cuya morada está en Jerusalén
  alternative_spanish_readings:
  - que habita en Jerusalén
  - cuya tienda está en Jerusalén
  rationale: 'La construcción nominal ''morada'' conserva el centro cultual y pactal del texto, y evita imponer una formulación puramente verbal. También preserva la tensión teológica: Dios es presentado con una morada en Jerusalén, sin reducirlo a estar limitado por ella.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La versión inglesa auditada ya no mostró cambios en la última revisión; el español sigue esa lectura estable, manteniendo la decisión lexicográfica sobre מִשְׁכְּנֵהּ y su nota alternativa. No se detectan revisiones posteriores que obliguen a ajustar el sentido.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para לֶאֱלָהּ בהתאם al estándar del proyecto.
  - Se conserva 'morada' para reflejar el sustantivo arameo מִשְׁכְּנֵהּ y la nota teológica sobre la presencia divina en Jerusalén.
  - '''Consejeros'' reproduce el matiz cortesano del grupo real.'
  - La puntuación y el encadenamiento de la oración siguen el tono bíblico en español sin volverla arcaizante.
