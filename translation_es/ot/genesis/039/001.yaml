base_translation:
  language: en
  yaml_path: translation/ot/genesis/039/001.yaml
  text: Now Joseph had been brought down to Egypt[a], and Potiphar, an officer of Pharaoh, the captain of the guard, an Egyptian[b], bought him from the Ishmaelites who had brought him down there.
  footnotes:
