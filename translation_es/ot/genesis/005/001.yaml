translation:
  language: es
  text: Este es el libro de las generaciones de Adán. En el día[a] en que Dios creó al hombre[b], lo hizo a semejanza de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando Dios creó al hombre». El giro hebreo «en el día» puede funcionar temporalmente con el sentido de «cuando».'
    reason: lexical_alternative
  - marker: b
    text: La primera aparición de «Adán» es nombre propio; la segunda puede traducirse también «humanidad» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula nominal de encabezamiento; en español, la construcción natural y formal es «Este es». Mantiene el tono declarativo sin añadir interpretación.
- source_word: סֵפֶר
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - registro
  - relato
  - rollo
  lexicon: HALOT
  rationale: «Libro» conserva el valor concreto de documento escrito y reproduce bien el estilo de encabezamiento genealógico. «Registro» o «relato» serían posibles, pero menos directos en este contexto.
- source_word: תּוֹלְדֹת
  english_pob_choice: generations
  chosen_spanish: generaciones
  alternatives_spanish:
  - descendencia
  - historia familiar
  - registro genealógico
  lexicon: HALOT
  rationale: «Generaciones» preserva el término estructural de Génesis para תּוֹלְדֹת y mantiene la conexión con otros encabezamientos del libro. Aunque puede implicar descendencia o historia familiar, aquí la forma tradicional sigue siendo la más transparente y fiel.
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  - humanidad
  lexicon: HALOT
  rationale: En la primera ocurrencia funciona como nombre propio dentro del encabezamiento genealógico, por eso se traduce «Adán». Es la lectura más natural para el español y coincide con la decisión auditada en inglés.
- source_word: בְּיוֹם
  english_pob_choice: In the day
  chosen_spanish: En el día
  alternatives_spanish:
  - Cuando
  - El día en que
  lexicon: HALOT
  rationale: «En el día» conserva la estructura idiomática del hebreo y su resonancia formal. En español, la adición de «en que» ayuda a evitar aspereza sin borrar el matiz temporal.
- source_word: בְּרֹא
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - al crear
  - cuando creó
  lexicon: HALOT
  rationale: El infinitivo constructo hebreo expresa circunstancia temporal; en español, «creó» dentro de la cláusula «en el día en que» comunica con naturalidad esa relación sin perder el sentido de evento creador.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En este contexto el verbo es singular y la referencia es al Creador; «Dios» es la equivalencia estándar y clara en español.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - humano
  - la humanidad
  lexicon: HALOT
  rationale: La segunda ocurrencia es común, no nombre propio, y en el paralelo de creación conserva el singular representativo masculino del hebreo. «El hombre» es la forma más fiel y comprensible en español, sin neutralizar indebidamente el término.
- source_word: בִּדְמוּת
  english_pob_choice: in the likeness of
  chosen_spanish: a semejanza de
  alternatives_spanish:
  - en la semejanza de
  - según la semejanza de
  - en la imagen de
  lexicon: HALOT
  rationale: דְּמוּת significa semejanza, parecido o forma. «A semejanza de» es natural en español y preserva la diferencia con «imagen», que no es el término hebreo aquí.
- source_word: עָשָׂה אֹתֹו
  english_pob_choice: he made him
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo formó
  - hizo al hombre
  lexicon: HALOT
  rationale: «Lo hizo» reproduce con sobriedad el verbo עשה y el objeto pronominal singular. En español, la referencia queda clara por el contexto; además, evita sobretraducir con «formó», que no es el verbo del texto.
theological_decisions:
- issue: Doble valor de אָדָם en un mismo versículo
  english_pob_reading: Proper name 'Adam' in the heading; common noun 'man' in the creation clause
  chosen_spanish_reading: Nombre propio «Adán» en el encabezamiento; común «el hombre» en la cláusula de creación
  alternative_spanish_readings:
  - «humanidad» en la cláusula de creación
  - «Adán» en ambas ocurrencias
  rationale: La primera aparición encabeza una genealogía y debe leerse como nombre propio. La segunda retoma el lenguaje de la creación y representa al ser humano en singular masculino. Mantener ambas lecturas en español conserva la tensión documental del hebreo y evita borrar el contraste entre nombre propio y sustantivo común.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve lexical distinctions when context demands.'
- issue: Relación con el lenguaje de la creación de Génesis 1
  english_pob_reading: Retain 'likeness' rather than harmonizing to 'image'
  chosen_spanish_reading: Conservar «semejanza» en lugar de armonizar a «imagen»
  alternative_spanish_readings:
  - «imagen de Dios»
  rationale: El hebreo usa דְּמוּת, no צֶלֶם. Traducir «semejanza» respeta el texto base y deja visible la relación, pero también la diferencia, con Génesis 1:26. Así se evita importar una palabra teológicamente familiar que el verso no emplea.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión auditada más reciente no requirió cambios; el presente borrador sigue de cerca la decisión inglesa aprobada y solo la adapta a una formulación española natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustituirlo por «Señor», porque el texto hebreo no usa el Tetragrámaton aquí.
  - Se conserva «semejanza» para דְּמוּת y no «imagen», para no borrar la distinción léxica con צֶלֶם en pasajes cercanos.
  - Se emplea «Adán» como nombre propio en la primera ocurrencia y «el hombre» como sustantivo común en la segunda, siguiendo la lectura auditada.
  - El estilo es formal y publicable, evitando arcaísmos innecesarios, pero sin perder la solemnidad del encabezamiento genealógico.
