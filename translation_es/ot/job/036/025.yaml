lexical_decisions:
- source_word: כָּל אָדָם
  english_pob_choice: All mankind
  chosen_spanish: Todo ser humano
  alternatives_spanish:
  - Toda la humanidad
  - Todos los hombres
  lexicon: HALOT
  rationale: כָּל + אָדָם expresa una referencia colectiva a la humanidad. «Todo ser humano» conserva el alcance inclusivo sin sonar rígido ni sexista en español, y mantiene el valor genérico que el inglés POB señaló con «All mankind».
- source_word: חָזוּ
  english_pob_choice: has looked on
  chosen_spanish: lo ha visto
  alternatives_spanish:
  - lo ha contemplado
  - lo ha mirado
  lexicon: HALOT
  rationale: El verbo חזה puede implicar ver con atención u observación. En español, «lo ha visto» es natural y suficientemente amplio para abarcar esa observación, sin introducir un matiz excesivamente interpretativo. «Lo ha contemplado» sería más marcado y menos directo.
- source_word: בּוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: HALOT
  rationale: 'El sufijo masculino singular admite una referencia personal, pero el contexto favorece un antecedente impersonal: la obra o acción de Dios. Por eso se usa «lo», que permite mantener la ambigüedad útil que el POB inglés documenta entre un referente personal e impersonal.'
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un mortal
  - la humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ subraya la condición mortal del ser humano. «El hombre» preserva el paralelismo poético con la primera cola y sigue siendo un genérico en español. «Un mortal» captaría mejor la fragilidad, pero cambiaría más el tono paralelo del verso.
- source_word: יַבִּיט
  english_pob_choice: gazes
  chosen_spanish: mira
  alternatives_spanish:
  - contempla
  - fija la vista
  lexicon: HALOT
  rationale: El הִפְעִיל de נבט expresa mirar con atención. «Mira» es la opción más natural y no exagera el matiz; la noción de observación sostenida queda parcialmente conservada por el contexto poético. «Contempla» sería más solemne pero más interpretativa.
- source_word: מֵרָחוֹק
  english_pob_choice: from afar
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde muy lejos
  lexicon: HALOT
  rationale: La expresión indica distancia. «Desde lejos» es natural en español y mantiene la concisión poética de «from afar» sin añadir intensidad no requerida.
theological_decisions:
- issue: Ambigüedad del pronombre masculino singular en בּוֹ
  english_pob_reading: The Hebrew pronoun is masculine singular and could be taken personally, but the context favors reference to God's work or deed.
  chosen_spanish_reading: El pronombre se conserva con una forma impersonal («lo») que deja abierta la posibilidad de una referencia personal, aunque el contexto favorece la obra o acción de Dios.
  alternative_spanish_readings:
  - Todo ser humano lo ha visto; el hombre mira desde lejos.
  - Todo ser humano lo ha visto a él; el hombre mira desde lejos.
  - 'Todo ser humano lo ha visto: el hombre lo mira desde lejos.'
  rationale: La traducción no debe borrar la tensión documentada. El español puede reflejarla sin forzar un antecedente explícito; «lo» mantiene abierta la lectura que el audit trail considera más probable y evita decidir prematuramente entre «ello» y «él».
  doctrine_reference: Job 36:25; audit trail on pronominal ambiguity
translation_notes:
  revision_awareness: El texto base inglés está en estado de alta concordancia y sin revisiones aplicadas; la versión española sigue de cerca sus decisiones léxicas documentadas, conservando la ambigüedad del pronombre masculino singular y el paralelismo poético.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el hebreo aquí no usa el tetragrámaton directamente en este versículo.
  - Se mantuvo un registro sobrio y poético, con léxico genérico inclusivo para אָדָם.
  - «Lo» preserva la tensión interpretativa del hebreo sin cerrar la referencia a una persona o a una obra.
  - La puntuación con punto y coma reproduce la bipartición poética del verso.
