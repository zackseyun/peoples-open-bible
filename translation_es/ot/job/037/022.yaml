translation:
  language: es
  text: Desde el norte viene[a] esplendor dorado; sobre Dios está majestad imponente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro»; el hebreo probablemente usa «oro» en sentido figurado para un brillo o resplandor dorado.
    reason: lexical_alternative
  - marker: b
    text: O «sobre Dios está esplendor temible» o «sobre Dios está majestad temible».
    reason: alternative_reading
lexical_decisions:
- source_word: מִצָּפוֹן
  english_pob_choice: From the north
  chosen_spanish: Desde el norte
  alternatives_spanish:
  - Del norte
  - Desde Zafón
  lexicon: HALOT
  rationale: El hebreo con מִן + צָפוֹן expresa procedencia/dirección; en español, "Desde el norte" conserva de forma natural esa idea. Se evita "Zafón" porque el contexto inmediato es meteorológico y teofánico, no claramente mitológico.
- source_word: זָהָב
  english_pob_choice: golden splendor
  chosen_spanish: esplendor dorado
  alternatives_spanish:
  - oro
  - brillo dorado
  - resplandor dorado
  lexicon: HALOT
  rationale: Literalmente es "oro", pero en el contexto poético resulta más fiel al sentido figurado de brillo o resplandor asociado al oro. "Esplendor dorado" mantiene la imagen sin reducirla a un metal material.
- source_word: יֶאֱתֶה
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  - sale
  lexicon: HALOT
  rationale: El verbo denota venir o acercarse; "viene" es la equivalencia más directa y natural en español, sin añadir la idea de brillo que no está explícita en el verbo.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  - el Dios
  lexicon: HALOT
  rationale: אֱלוֹהַּ es el sustantivo singular para Dios, frecuente en Job. "Dios" reproduce de modo directo y comprensible el referente divino sin sobreespecificarlo.
- source_word: נוֹרָא
  english_pob_choice: awesome
  chosen_spanish: imponente
  alternatives_spanish:
  - temible
  - asombroso
  - terrible
  lexicon: HALOT
  rationale: La forma expresa algo que inspira temor reverente. "Imponente" comunica dignidad y sobrecogimiento en español contemporáneo, evitando el posible valor negativo de "terrible".
- source_word: הוֹד
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - esplendor
  - gloria
  - honor
  lexicon: HALOT
  rationale: הוֹד designa majestad o esplendor especialmente en registros divinos. "Majestad" conserva bien el tono elevado y se ajusta al paralelismo con el primer cola.
theological_decisions:
- issue: 'Valor de la primera imagen: fenómeno natural o referencia más cargada'
  english_pob_reading: A poetic description of golden radiance coming from the north
  chosen_spanish_reading: Una descripción poética de un resplandor dorado que viene del norte
  alternative_spanish_readings:
  - Una alusión a buen tiempo que llega del norte
  - Una referencia mitológica al monte Zafón
  rationale: La escena inmediata es teofánica y meteorológica. La traducción conserva la imagen concreta y poética sin introducir una afirmación mitológica más fuerte que la que exige el hebreo.
  doctrine_reference: Principios de la POB sobre transparencia textual y cautela interpretativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió "upon God" frente a "around God" para reflejar más directamente עַל. En español se optó por "sobre Dios" para mantener esa relación preposicional sin sonar forzado.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלוֹהַּ, en coherencia con el criterio general del proyecto.
  - Se evitó "SEÑOR" como sustituto del nombre divino porque aquí el hebreo no usa YHWH.
  - '"Majestad" se eligió para הוֹד por su fuerza elevada y su cercanía al paralelismo poético.'
  - No se usó "Cristo" ni terminología cristológica, pues el versículo no la contiene.
  - '"Imponente" se usa para נוֹרָא como término reverente y no moralizante.'
