    text: 'Hebreo: «En mis oídos», un modismo que indica que Isaías oyó esto directamente.'
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las Huestes».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota sobre el modismo hebreo, añade la alternativa tradicional para el título divino en línea con la auditoría inglesa, y elimina una nota secundaria menos útil que podía estrechar indebidamente el sentido de 'buenas'. Se conserva el texto principal casi intacto por fidelidad al expediente auditado y porque las mejoras necesarias son pequeñas y localizadas.
