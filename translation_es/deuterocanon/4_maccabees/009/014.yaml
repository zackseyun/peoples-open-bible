  text: 'Y, siendo quebrado miembro tras miembro, seguía reprochándolos, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατὰ πᾶν μέλος
  english_pob_choice: limb by limb
  chosen_spanish: miembro por miembro
  alternatives_spanish:
  - miembro a miembro
  - miembro tras miembro
  - en cada miembro
  lexicon: LSJ
  rationale: La frase griega es distributiva y describe el quebrantamiento extendiéndose por todo el cuerpo. En español, «miembro por miembro» conserva esa distribución sin sonar tan forzado como una calca más literal.
- source_word: κλώμενος
  english_pob_choice: being broken
  chosen_spanish: siendo quebrantado
  alternatives_spanish:
  - siendo roto
  - siendo quebrado
  - siendo destrozado
  lexicon: LSJ
  rationale: El participio indica violencia física bajo tortura. «Quebrantado» comunica el sufrimiento corporal de modo natural y solemne, y evita intensificar más allá de lo que el griego exige.
- source_word: κατηγόρει
  english_pob_choice: he kept denouncing them
  chosen_spanish: seguía denunciándolos
  alternatives_spanish:
  - seguía acusándolos
  - continuaba reprochándolos
  - los increpaba
  lexicon: LSJ
  rationale: El imperfecto expresa acción շարունակada. «Denunciarlos» reproduce bien el valor hostil y público de κατηγόρει en este contexto de reproche bajo tormento, en línea con la revisión inglesa.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - al decir
  lexicon: LSJ
  rationale: La forma participial introduce el discurso siguiente. «Diciendo» mantiene la continuidad sintáctica del griego y deja la cita abierta para el verso siguiente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «accusing» por «denouncing» para reflejar mejor κατηγόρει en un contexto de reproche bajo tortura. La redacción española sigue esa decisión y conserva la progresión del participio griego con un estilo natural.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin introducir títulos eclesiásticos ajenos al griego.
  - «Miembro» se usa para reproducir la distribución corporal de κατὰ πᾶν μέλος; no se reemplaza por un término más interpretativo.
  - No se añadió puntuación o conectores que suavicen la violencia del pasaje; la estructura permanece paratáctica como en el griego.
