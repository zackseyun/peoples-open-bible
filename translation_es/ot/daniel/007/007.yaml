    text: O «en las visiones nocturnas».
    reason: lexical_alternative
  - marker: b
    text: O «lo restante».
    reason: lexical_alternative
  revision_rationale: Se corrigió el marcador deíctico para reflejar וַאֲרוּ con «y he aquí» en vez de «y vi»; se mejoró la naturalidad contextual de קָדָמַיּהּ con «que la precedieron»; y se alisó la sintaxis de la cláusula sobre el remanente pisoteado. Los demás elementos del borrador conservan adecuadamente el sentido de la fuente y las decisiones del POB.
