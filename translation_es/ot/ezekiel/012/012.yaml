translation:
  language: es
  text: Y el príncipe que está entre ellos llevará su equipaje[b] sobre el hombro en la oscuridad y saldrá[a]. Abrirán un boquete en el muro para sacarlo por él. Cubrirá su rostro para que no vea la tierra con sus ojos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al crepúsculo». El término hebreo puede denotar oscuridad o penumbra, con el matiz más amplio de ocultamiento.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «alzará sobre el hombro». «Su equipaje» se suple por el contexto inmediato de la acción simbólica del destierro en los versículos circundantes.
    reason: cross_reference
  - marker: c
    text: 'O: «porque no verá la tierra con sus ojos». La conjunción hebrea puede entenderse como causal además de final/resultativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: נָשִׂיא designa un jefe o príncipe. «Príncipe» preserva el título político sin convertirlo en «rey», que el hebreo no usa aquí.
- source_word: בְּתוֹכָם
  english_pob_choice: who is among them
  chosen_spanish: que está entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su seno
  lexicon: HALOT
  rationale: La expresión señala presencia en medio del grupo; «entre ellos» es natural en español y conserva esa relación.
- source_word: אֶל כָּתֵף יִשָּׂא
  english_pob_choice: will lift his baggage onto his shoulder
  chosen_spanish: llevará su equipaje sobre el hombro
  alternatives_spanish:
  - cargará sobre el hombro
  - alzará sobre el hombro
  lexicon: HALOT
  rationale: El hebreo dice literalmente que lo cargará sobre el hombro. En el contexto del signo profético de la deportación, «equipaje» hace explícito el objeto implícito sin exceder lo que el pasaje cercano ya aporta.
- source_word: בָּעֲלָטָה
  english_pob_choice: in the dark
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en el crepúsculo
  - a escondidas
  lexicon: HALOT
  rationale: El sustantivo puede denotar tinieblas o penumbra con matiz de ocultamiento. «En la oscuridad» comunica bien la furtividad del escape.
- source_word: וְיֵצֵא
  english_pob_choice: and go out
  chosen_spanish: y saldrá
  alternatives_spanish:
  - y partirá
  - y se irá
  lexicon: HALOT
  rationale: יצא se rinde de forma directa con «saldrá», manteniendo el movimiento físico descrito.
- source_word: בַּקִּיר יַחְתְּרוּ
  english_pob_choice: They will dig through the wall
  chosen_spanish: Harán una abertura en la muralla
  alternatives_spanish:
  - Romperán la muralla
  - Cavarían a través de la muralla
  lexicon: HALOT
  rationale: חתר puede significar excavar o abrir paso rompiendo. «Harán una abertura» conserva la imagen concreta sin sonar extrañamente mecánico en español; «muralla» puede ser más natural que «muro» en este contexto fortificado.
- source_word: לְהוֹצִיא בּוֹ
  english_pob_choice: to bring him out through it
  chosen_spanish: para sacarlo por ella
  alternatives_spanish:
  - para hacerlo salir por ella
  - para sacarlo a través de ella
  lexicon: HALOT
  rationale: El causativo de יצא implica «sacar». El pronombre בּוֹ funciona aquí como referencia al paso abierto en la muralla, por eso «por ella» mantiene el valor locativo/instrumental.
- source_word: פָּנָיו יְכַסֶּה
  english_pob_choice: He will cover his face
  chosen_spanish: Cubrirá su rostro
  alternatives_spanish:
  - Velará su rostro
  - Cubrirá su cara
  lexicon: HALOT
  rationale: «Rostro» es más digno y natural en registro bíblico que «cara». El sentido físico de cubrirse se mantiene claramente.
- source_word: יַעַן אֲשֶׁר לֹא יִרְאֶה
  english_pob_choice: so that he may not see
  chosen_spanish: para que no vea
  alternatives_spanish:
  - a fin de que no vea
  - porque no verá
  lexicon: HALOT
  rationale: El vínculo puede leerse como propósito o resultado; «para que no vea» conserva esa ambigüedad funcional sin forzar una causalidad exclusiva.
- source_word: לַעַיִן
  english_pob_choice: with his eyes
  chosen_spanish: con sus ojos
  alternatives_spanish:
  - con la vista
  - visiblemente
  lexicon: HALOT
  rationale: La expresión es concreta y corporal. «Con sus ojos» refleja bien el hebreo y evita una abstracción innecesaria.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aquí אֶרֶץ puede referirse al territorio/país que abandona. «La tierra» es una opción bíblica comprensible en español y compatible con el contexto.
theological_decisions:
- issue: Objeto implícito de «llevará sobre el hombro»
  english_pob_reading: Supplied 'his baggage' in the main text
  chosen_spanish_reading: «su equipaje» se integra en el texto
  alternative_spanish_readings:
  - «llevará sobre el hombro» sin objeto explícito
  rationale: El verbo hebreo carece de objeto explícito, pero el contexto inmediato del signo de la deportación presupone el equipaje. Añadir «su equipaje» sigue de cerca ese contexto y hace la frase idiomática en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de יַעַן אֲשֶׁר en la cláusula final
  english_pob_reading: 'Rendered as purpose/result: ''so that he may not see'''
  chosen_spanish_reading: «para que no vea»
  alternative_spanish_readings:
  - «porque no verá»
  - «de modo que no vea»
  rationale: Después de «Cubrirá su rostro», la lectura natural es de finalidad o resultado. «Para que no vea» conserva la ambigüedad del hebreo sin imponer solo una lectura causal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Base revision reviewed against the latest audit trail; no applied revisions were needed, and the Spanish draft follows the high-agreement English POB reading while resolving Spanish idiom where necessary.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general cuando no aparece el tetragrámaton en este versículo.
  - Se mantuvo «príncipe» para נָשִׂיא, conforme al valor político del término.
  - Se prefirió «rostro» en vez de «cara» por registro bíblico y dignidad estilística.
  - Se eligió «en la oscuridad» para בָּעֲלָטָה, conservando el matiz de ocultamiento reconocido por la auditoría inglesa.
  - Se tradujo el pronombre preposicional final con una referencia natural a la abertura en la muralla, sin perder el sentido instrumental/locativo del hebreo.
