translation:
  language: es
  text: Sabe[a], pues, que Yahvé tu Dios, él es Dios, el Dios fiel, que guarda el pacto y el amor constante[b] para los que lo aman y para los que guardan sus mandamientos, hasta mil generaciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “y sabe”; o: “así que sabe”. El hebreo con וְ puede leerse como continuación simple o como inferencia del contexto previo.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo חֶסֶד; suele abarcar amor leal, lealtad pactual, bondad misericordiosa o fidelidad. Aquí se ha vertido como “amor constante” para preservar tanto el matiz afectivo como la constancia del compromiso.
    reason: lexical_alternative
  - marker: c
    text: 'O: “por mil generaciones”. La expresión señala una duración inmensa de fidelidad pactual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: Know, therefore
  chosen_spanish: Sabe, pues
  alternatives_spanish:
  - Y sabe
  - Y conoce
  lexicon: HALOT
  rationale: El imperfecto/yusivo hebreo con valor exhortativo se vierte mejor en español con un imperativo natural. El conector וְ aquí tiene fuerza inferencial o consecutiva; 'pues' conserva esa relación discursiva sin volverlo meramente aditivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, manteniendo el valor pactual del tetragrámaton y evitando el sustituto 'SEÑOR'.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: Poseedor de 2ms en contexto directo; 'tu Dios' es la correspondencia más clara y natural.
- source_word: הוּא הָאֱלֹהִים
  english_pob_choice: he is God
  chosen_spanish: él es Dios
  alternatives_spanish:
  - él es el Dios
  lexicon: HALOT
  rationale: El pronombre enfático se conserva con 'él'. En español, 'él es Dios' suena más natural que 'él es el Dios' y mantiene la afirmación exclusiva del texto.
- source_word: הָאֵל
  english_pob_choice: the ... God
  chosen_spanish: el Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios único
  lexicon: HALOT
  rationale: El apposicional 'the Mighty One/God' se integra en español repitiendo 'Dios', lo que reproduce el énfasis sin introducir una perífrasis más interpretativa.
- source_word: הַנֶּאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  lexicon: HALOT
  rationale: Adjetivo de fiabilidad y firmeza pactual; 'fiel' preserva tanto el sentido léxico como la resonancia teológica.
- source_word: שֹׁמֵר
  english_pob_choice: keeping
  chosen_spanish: que guarda
  alternatives_spanish:
  - que mantiene
  - que preserva
  lexicon: HALOT
  rationale: El participio describe acción continua. 'Que guarda' es idiomático con 'pacto' en español y conserva la idea de custodia activa.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  lexicon: HALOT
  rationale: '''Pacto'' preserva el registro bíblico y jurídico del término, y es claro en español contemporáneo.'
- source_word: וְהַחֶסֶד
  english_pob_choice: and the steadfast love
  chosen_spanish: y la fidelidad
  alternatives_spanish:
  - y el amor constante
  - y la misericordia
  lexicon: HALOT
  rationale: חֶסֶד en contexto pactual puede abarcar lealtad amorosa, misericordia y compromiso firme. 'Fidelidad' en español permite expresar esa constancia relacional sin perder la tensión semántica; se mantiene la ambigüedad teológica documentada. La alternativa 'amor constante' también es posible, pero 'fidelidad' encaja mejor con el verbo 'guarda' y con el paralelismo del versículo.
- source_word: לְאֹהֲבָיו
  english_pob_choice: for those who love him
  chosen_spanish: para los que lo aman
  alternatives_spanish:
  - para los que le aman
  - a los que lo aman
  lexicon: HALOT
  rationale: El לְ de beneficio/dirección se vierte naturalmente con 'para'. 'Los que lo aman' mantiene la relación verbal directa y evita arcaísmos.
- source_word: וּלְשֹׁמְרֵי מִצְוֹתָו
  english_pob_choice: and to those who keep his commandments
  chosen_spanish: y para los que guardan sus mandamientos
  alternatives_spanish:
  - y para los que observan sus mandatos
  - y para los que cumplen sus mandamientos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior y el valor de 'guardar' aplicado a los mandamientos. 'Mandamientos' refleja bien מִצְוֹת en registro bíblico.
- source_word: לְאֶלֶף דּוֹר
  english_pob_choice: to a thousand generations
  chosen_spanish: hasta mil generaciones
  alternatives_spanish:
  - por mil generaciones
  - a mil generaciones
  lexicon: HALOT
  rationale: La expresión hebrea marca una duración vasta y continua. 'Hasta mil generaciones' comunica alcance temporal extensivo en español y evita ambigüedad de destinatario; mantiene el valor idiomático sin endurecer la preposición.
theological_decisions:
- issue: Relación entre fidelidad divina y los que aman/guardan los mandamientos
  english_pob_reading: God is described as faithfully keeping covenant and steadfast love toward those who love him and keep his commandments.
  chosen_spanish_reading: Dios es descrito como fiel en guardar el pacto y la fidelidad para quienes lo aman y guardan sus mandamientos.
  alternative_spanish_readings:
  - Dios muestra misericordia a los que lo aman
  - Dios guarda pacto y amor constante con los que lo aman
  rationale: El hebreo une pacto, חֶסֶד y la cláusula relativa sobre amor/obediencia. La traducción conserva esa relación sin suavizar la condición ni resolverla en un sistema teológico posterior. 'Fidelidad' para חֶסֶד mantiene la tensión semántica entre amor leal, constancia y compromiso.
  doctrine_reference: Principios de traducción POB; fidelidad pactual y obediencia en el contexto del pacto
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, especialmente la decisión de reflejar el valor inferencial de וְ en el verbo inicial y la revisión que distingue claramente el uso del לְ en los beneficiarios frente a la duración final. También se consideró la nota sobre חֶסֶד y la preservación de la tensión pactual, evitando una paráfrasis que la resolviera.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se usa 'pacto' y 'mandamientos' de manera consistente con el registro bíblico-jurídico.
  - '''Fidelidad'' para חֶסֶד es una decisión contextual; no pretende anular los matices de amor leal y misericordia, por eso se documenta en nota.'
  - La puntuación y el orden de las cláusulas buscan claridad natural en español sin perder el paralelismo hebreo.
