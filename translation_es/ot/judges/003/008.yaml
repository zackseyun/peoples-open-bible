base_translation:
  language: en
  yaml_path: translation/ot/judges/003/008.yaml
  text: So the anger of Yahweh burned against Israel[a], and he sold them into the hand of Cushan-rishathaim king of Aram-naharaim[b]. And the sons of Israel served Cushan-rishathaim eight years.
  footnotes:
