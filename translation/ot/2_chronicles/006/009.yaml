- issue: Lineage idiom
  chosen_reading: from your own body
  alternative_readings:
  - from your loins
  rationale: The Hebrew idiom denotes direct biological descent. The chosen rendering preserves the meaning in readable modern English without importing additional theological claims.
  doctrine_reference: Translation philosophy §6
