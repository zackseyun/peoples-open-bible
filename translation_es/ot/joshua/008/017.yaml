translation:
  language: es
  text: Y no quedó ningún hombre en Hai ni en Betel que no saliera tras Israel[b], y dejaron la ciudad abierta[a] y persiguieron a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con un matiz más dinámico, 'dejaron la ciudad desguarnecida'. El hebreo dice literalmente 'la ciudad abierta'.
    reason: lexical_alternative
  - marker: b
    text: '''Hombre'' traduce aquí אִישׁ, forma masculina singular usada de manera genérica para cualquier persona que hubiera quedado atrás.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַר אִישׁ
  english_pob_choice: not a man was left
  chosen_spanish: no quedó ningún hombre
  alternatives_spanish:
  - no quedó nadie
  - no quedó un solo hombre
  lexicon: HALOT
  rationale: Mantiene el valor negativo total del hebreo y conserva el singular genérico de אִישׁ. En español, 'ningún hombre' comunica el alcance inclusivo sin sonar forzado.
- source_word: בָּעַי וּבֵית אֵל
  english_pob_choice: in Ai or Bethel
  chosen_spanish: en Hai ni en Betel
  alternatives_spanish:
  - en Hai o en Betel
  - en Hai y en Betel
  lexicon: HALOT
  rationale: En una construcción negativa, 'ni... ni...' reproduce mejor el sentido de exclusión total en ambos lugares. Se conserva la transliteración de los topónimos.
- source_word: אֲשֶׁר לֹא יָצְאוּ אַחֲרֵי יִשְׂרָאֵל
  english_pob_choice: who did not go out after Israel
  chosen_spanish: que no saliera tras Israel
  alternatives_spanish:
  - que no habían salido tras Israel
  - que no salieron tras Israel
  - que no salió tras Israel
  lexicon: HALOT
  rationale: '''Salir tras'' conserva el movimiento militar del hebreo y sugiere persecución sin añadir interpretación. El singular genérico en español se mantiene de forma natural con ''ningún hombre... que no saliera''.'
- source_word: וַיַּעַזְבוּ אֶת הָעִיר פְּתוּחָה
  english_pob_choice: they left the city open
  chosen_spanish: dejaron la ciudad abierta
  alternatives_spanish:
  - dejaron la ciudad sin protección
  - dejaron la ciudad desguarnecida
  lexicon: HALOT
  rationale: '''Abierta'' conserva la imagen concreta del hebreo פְּתוּחָה, tal como la traducción inglesa decidió preservar el sustrato literal antes de la posible implicación táctica.'
- source_word: וַיִּרְדְּפוּ אַחֲרֵי יִשְׂרָאֵל
  english_pob_choice: and pursued Israel
  chosen_spanish: y persiguieron a Israel
  alternatives_spanish:
  - y fueron tras Israel
  - y siguieron a Israel
  lexicon: HALOT
  rationale: '''Perseguir'' reproduce el valor militar de רדף en español actual de manera clara y fiel. Se evita un giro más interpretativo como ''ir tras''.'
translation_notes:
  revision_awareness: La versión coincide con la decisión inglesa de mantener la imagen literal de 'city open' y el valor genérico de אִישׁ, pero ajusta el español para que la negación total suene natural con 'ni... ni...' y 'ningún hombre'. No se detectaron revisiones previas que exigieran una divergencia.
  spanish_consistency_notes:
  - Se usa 'Hai' y 'Betel' de forma consistente con transliteración bíblica en español.
  - Se mantiene 'Israel' sin artículo por coherencia con el uso bíblico y con el texto fuente.
  - '''Abierta'' conserva la metáfora espacial del hebreo sin reemplazarla por ''desguarnecida'' en el texto principal.'
