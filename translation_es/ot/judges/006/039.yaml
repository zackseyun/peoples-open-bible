translation:
  language: es
  text: 'Entonces Gedeón dijo a Dios[a]: «No se encienda tu ira contra mí, y déjame hablar solo esta vez. Por favor, permíteme probar[b] solo esta vez con el vellón: que haya sequedad sobre el vellón solamente, y sobre todo el suelo[c] haya rocío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te enojes conmigo». El hebreo dice literalmente: «No se encienda tu ira contra mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «permíteme intentar».'
    reason: lexical_alternative
  - marker: c
    text: «Suelo» también puede entenderse como «terreno» o «tierra»; aquí se refiere al área alrededor del vellón en contraste con el vellón mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - ante Dios
  lexicon: HALOT
  rationale: En español, la fórmula natural para el destinatario del discurso es «a Dios». El artículo hebreo no exige reproducirse literalmente; el sentido narrativo es el de una dirección de palabra al Dios verdadero.
- source_word: אַל יִחַר אַפְּךָ בִּי
  english_pob_choice: Do not let your anger burn against me
  chosen_spanish: No se encienda tu ira contra mí
  alternatives_spanish:
  - No te enfades conmigo
  - No arda tu enojo contra mí
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de la ira que arde. «No se encienda tu ira contra mí» conserva esa fuerza figurada sin sonar antinatural en español; «enojo» sería posible, pero «ira» mantiene mejor la intensidad del original.
- source_word: וַאֲדַבְּרָה
  english_pob_choice: and let me speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y déjame hablar
  - y permita que hable
  lexicon: HALOT
  rationale: La forma cohortativa expresa una petición/voluntad en contexto. En español, «y hablaré» funciona como giro de cortesía y sigue el impulso del hebreo sin cargarlo innecesariamente con una perífrasis más larga.
- source_word: אַךְ הַפָּעַם
  english_pob_choice: just this once
  chosen_spanish: solo esta vez
  alternatives_spanish:
  - solo por esta vez
  - únicamente esta vez
  lexicon: HALOT
  rationale: La expresión limita estrictamente la petición. «Solo esta vez» es idiomático y conserva la restricción enfática.
- source_word: אֲנַסֶּה נָּא
  english_pob_choice: Please let me test
  chosen_spanish: permíteme probar
  alternatives_spanish:
  - permíteme poner a prueba
  - permíteme testear
  lexicon: HALOT
  rationale: נָסָה aquí denota poner a prueba / probar. En español, «probar» comunica la acción de buscar una señal mediante el vellón; «poner a prueba» sería más explícito, pero algo más pesado.
- source_word: רַק הַפַּעַם
  english_pob_choice: just this once
  chosen_spanish: solo esta vez
  alternatives_spanish:
  - solo por esta vez
  - esta vez nada más
  lexicon: HALOT
  rationale: La repetición intensifica el límite de la petición. Mantener «solo esta vez» en ambos lugares refleja la insistencia retórica del hebreo.
- source_word: בַּגִּזָּה
  english_pob_choice: with the fleece
  chosen_spanish: con el vellón
  alternatives_spanish:
  - en el vellón
  - sobre el vellón
  lexicon: HALOT
  rationale: El objeto del signo es el vellón; «con» transmite que Gideón pide una prueba asociada a ese elemento. En español, «vellón» es el término más preciso y tradicional para la piel de lana usada aquí.
- source_word: יְהִי נָא חֹרֶב
  english_pob_choice: let there be dryness
  chosen_spanish: que haya sequedad
  alternatives_spanish:
  - que esté seco
  - que haya sequedad allí
  lexicon: HALOT
  rationale: חֹרֶב expresa sequedad, no simplemente «estar seco» como estado adjetival. «Que haya sequedad» preserva la construcción existencial y la imagen del hebreo.
- source_word: אֶל הַגִּזָּה לְבַדָּהּ
  english_pob_choice: on the fleece alone
  chosen_spanish: sobre el vellón solamente
  alternatives_spanish:
  - en el vellón solamente
  - encima del vellón solo
  lexicon: HALOT
  rationale: Aunque la preposición puede variar, aquí la idea es la localización de la sequedad. «Sobre el vellón solamente» comunica con claridad la distribución deseada del signo.
- source_word: וְעַל כָּל הָאָרֶץ יִהְיֶה טָּל
  english_pob_choice: and on all the ground let there be dew
  chosen_spanish: y sobre toda la tierra haya rocío
  alternatives_spanish:
  - y sobre todo el suelo haya rocío
  - y sobre toda la tierra esté el rocío
  lexicon: HALOT
  rationale: En contraste con el vellón, הָאָרֶץ se refiere a la superficie circundante. «Tierra» funciona bien en español y, como en el inglés auditado, mantiene la oposición local entre el vellón y el resto del espacio.
theological_decisions:
- issue: Cómo presentar la petición de Gideón sin resolver su tensión teológica
  english_pob_reading: The verse is translated as a cautious plea for one more confirming sign, without importing approval or disapproval beyond the text.
  chosen_spanish_reading: La versión presenta a Gedeón como alguien que ruega una confirmación adicional, sin convertir el pasaje en una aprobación ni en una condena explícitas.
  alternative_spanish_readings:
  - Una traducción que subrayara más la irreverencia de Gedeón
  - Una traducción que suavizara el texto hasta convertirlo en mera humildad
  rationale: 'El hebreo muestra una petición restringida y una solicitud de señal. La traducción conserva esa tensión: Gedeón pide con insistencia, pero el texto mismo no fuerza una evaluación teológica adicional.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado recientemente y quedó sin cambios; la versión española sigue la misma lectura de alta concordancia, manteniendo las decisiones clave sobre el idiomatismo de la ira, la repetición de «solo esta vez», y la oposición local entre el vellón y la tierra/rocío.
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים en contexto narrativo de invocación, sin artículo visible en español.
  - Se mantiene «vellón» para גִּזָּה, de acuerdo con el uso bíblico estándar y la precisión léxica.
  - Se evita «SEÑOR» porque el hebreo aquí dice «Dios», no el tetragrámaton.
  - «Rocío» conserva el sentido físico de טָּל, sin ampliarlo a metáfora.
  - La estructura de petición y límite temporal se preserva con «solo esta vez» en ambos miembros del paralelismo.
