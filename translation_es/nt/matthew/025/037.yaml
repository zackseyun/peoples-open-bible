translation:
  language: es
  text: 'Entonces los justos le responderán, diciendo: «Señor, ¿cuándo te vimos hambriento y te alimentamos, o sediento y te dimos de beber?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal de secuencia discursiva; «Entonces» es natural y mantiene la progresión narrativa.
- source_word: ἀποκριθήσονται
  english_pob_choice: will answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - harán respuesta
  lexicon: BDAG
  rationale: Verbo de respuesta en futuro; «responderán» comunica bien el valor de ἀποκρίνομαι sin ser forzado en español.
- source_word: οἱ δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos [los rectos]
  lexicon: BDAG
  rationale: El adjetivo sustantivado puede expresarse como «los justos»; conserva el valor de personas caracterizadas por justicia, sin expandir innecesariamente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Vocativo de κύριος dirigido a Jesús; en español «Señor» es la forma reverente y habitual que conserva el peso cristológico del título.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: ¿cuándo?
  alternatives_spanish:
  - ¿en qué momento?
  lexicon: BDAG
  rationale: Interrogativo temporal directo; «¿cuándo?» es la equivalencia natural.
- source_word: εἴδομεν
  english_pob_choice: did we see
  chosen_spanish: vimos
  alternatives_spanish:
  - hemos visto
  lexicon: BDAG
  rationale: Aoristo en pregunta; en español basta el pretérito simple «vimos» para reproducir el valor puntual sin auxiliar adicional.
- source_word: πεινῶντα
  english_pob_choice: hungry
  chosen_spanish: hambriento
  alternatives_spanish:
  - con hambre
  lexicon: BDAG
  rationale: Participio presente usado como adjetivo predicativo; «hambriento» es natural y fiel al sentido de necesidad de alimento.
- source_word: ἐθρέψαμεν
  english_pob_choice: feed you
  chosen_spanish: te alimentamos
  alternatives_spanish:
  - te dimos de comer
  - te dimos alimento
  lexicon: BDAG
  rationale: Aoristo de τρέφω; «alimentamos» conserva el acto concreto de proveer comida y suena más natural que un calco rígido.
- source_word: διψῶντα
  english_pob_choice: thirsty
  chosen_spanish: sediento
  alternatives_spanish:
  - con sed
  lexicon: BDAG
  rationale: Participio presente paralelo a πεινῶντα; «sediento» mantiene el paralelismo adjetival y la fuerza descriptiva.
- source_word: ἐποτίσαμεν
  english_pob_choice: give you drink
  chosen_spanish: te dimos de beber
  alternatives_spanish:
  - te dimos bebida
  - te brindamos agua
  lexicon: BDAG
  rationale: Aoristo de ποτίζω, «dar de beber» es la correspondencia idiomática más cercana en español, sin añadir «agua» que no aparece en el griego.
theological_decisions:
- issue: Renderización del título κύριος en la boca de los justos al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene la lectura reverente y cristológica del vocativo en el contexto narrativo de Mateo; «Señor» preserva la equivalencia doctrinal de κύριος sin suavizarla a un mero trato de cortesía.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor del sustantivo adjetival οἱ δίκαιοι
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - los rectos
  rationale: No se introduce una explicación doctrinal añadida; se conserva la designación de quienes actúan conforme a la justicia reconocida en la escena.
  doctrine_reference: BDAG δίκαιος; contexto narrativo de Mateo 25
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que prefirió una formulación más cercana a «give you drink» frente a expansiones como «give you something to drink»; por eso se eligió la locución española idiomática «te dimos de beber», que es breve, formal y suficientemente cercana al griego.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre «hambriento» y «sediento».
  - Se evitó añadir «agua», porque ποτίζω solo expresa dar de beber, no especifica el líquido.
  - El vocativo «Señor» se mantuvo coherente con el tratamiento cristológico habitual de κύριος en el proyecto.
  - La puntuación española usa comillas angulares y signo de interrogación de apertura conforme a norma.
  - El marcador [a] aparece exactamente en el texto principal donde se ancla la nota alternativa.
