revisions:
- from: 'Y he aquí[a], yo enviaré al joven, diciendo: «Ve, busca las flechas». Si de hecho digo al joven: «He aquí, las flechas están de tu lado; tómalas y ven», entonces hay paz para ti y no hay peligro[b], por Yahvé vive.'
  to: 'Y he aquí, yo enviaré al joven, diciendo: «Ve, busca las flechas». Si claramente le digo al joven: «He aquí, las flechas están de tu lado[a]; tómalas y ven», entonces hay paz para ti y no hay peligro, vive Yahvé[b].'
  rationale: Se corrigió la fórmula de juramento a «vive Yahvé» para reflejar con fidelidad y naturalidad el hebreo חַי יְהוָה. Se ajustó «Si de hecho digo» a «Si claramente le digo» para expresar mejor el énfasis del infinitivo absoluto en español. También se movió la nota léxica al sintagma espacial pertinente («de tu lado») y se dejó la nota de juramento en la fórmula final.
