translation:
  language: es
  text: Llevarás mucha semilla[a] al campo, pero recogerás poco, porque la langosta lo consumirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sembrarás mucha semilla en el campo, pero cosecharás poco». El hebreo dice más literalmente: «Llevarás mucha semilla al campo» y «recogerás poco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע רַב
  english_pob_choice: much seed
  chosen_spanish: mucho grano
  alternatives_spanish:
  - mucha semilla
  - abundante semilla
  - gran cantidad de semilla
  lexicon: HALOT
  rationale: זֶרַע es literalmente "semilla", pero en español "grano" comunica de manera más natural el producto agrícola que se transporta al campo y evita una repetición áspera de "semilla" en un contexto de cosecha. Mantiene la cantidad intensiva de רַב sin perder la imagen concreta.
- source_word: תּוֹצִיא
  english_pob_choice: will carry out
  chosen_spanish: llevarás ... al campo
  alternatives_spanish:
  - sacarás ... al campo
  - traerás ... al campo
  - llevarás ... afuera
  lexicon: HALOT
  rationale: El hebreo expresa "sacar/traer afuera" el grano hacia el campo para sembrarlo. "Llevarás ... al campo" conserva el movimiento físico sin volver demasiado mecánica la expresión en español, y sigue de cerca el valor direccional del verbo.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo de cultivo
  - la parcela
  - el terreno
  lexicon: HALOT
  rationale: '"Campo" es el equivalente natural en español para שָׂדֶה y mantiene el referente agrícola sencillo del texto.'
- source_word: וּמְעַט תֶּאֱסֹף
  english_pob_choice: but you will gather in little
  chosen_spanish: pero recogerás poco
  alternatives_spanish:
  - pero cosecharás poco
  - pero reunirás poco
  - pero juntarás poco
  lexicon: HALOT
  rationale: אָסַף significa reunir, recoger, juntar. En este contexto agrícola, "recogerás" comunica bien la acción y preserva el contraste con "mucho grano" sin introducir una paráfrasis más interpretativa que el hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la escasez de la cosecha; "porque" es el conector causal más claro y natural en español.
- source_word: יַחְסְלֶנּוּ
  english_pob_choice: will consume it
  chosen_spanish: lo consumirá
  alternatives_spanish:
  - lo devorará
  - lo acabará
  - lo destruirá
  lexicon: HALOT
  rationale: חסל denota consumir hasta terminar o destruir por completo. "Consumirá" conserva esa fuerza sin volverse excesivamente coloquial. El pronombre "lo" remite al rendimiento esperado del grano.
- source_word: הָאַרְבֶּה
  english_pob_choice: the locust
  chosen_spanish: la langosta
  alternatives_spanish:
  - el saltamontes
  - la plaga de langostas
  - la langosta migratoria
  lexicon: HALOT
  rationale: אַרְבֶּה es el término estándar para langosta. En español bíblico y moderno, "langosta" comunica con claridad el insecto devastador; el singular con artículo puede funcionar colectivamente, como en el hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el auditorio inglés revisado: mantuve el movimiento direccional natural (''al campo'') en vez de forzar ''en el campo'', y preservé la oposición cuantitativa entre ''mucho'' y ''poco'' con el verbo agrícola de recogida más natural en español. También conservé la causalidad explícita del hebreo y la imagen de la langosta como agente de consumo total.'
  spanish_consistency_notes:
  - Se usó "Yahvé" no aplica en este versículo porque no aparece el Tetragrámaton.
  - Se evitó "SEÑOR" y "Cristo" por no corresponder al texto.
  - '"Grano" se eligió como equivalente idiomático de זֶרַע en este contexto agrícola, sin perder la referencia a semilla/siembra.'
  - 'La nota al pie conserva la alternativa interpretativa que el audit trail inglés documenta: sembrar/cosechar en lugar de llevar/recoger.'
