translation:
  language: es
  text: Ahora, reúne al resto de la tropa, acampa frente a la ciudad y captúrala, no sea que yo capture la ciudad y lleve mi nombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «y mi nombre sea llamado sobre ella». Es decir, el honor por tomar la ciudad se me atribuiría a mí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca discursiva de urgencia y transición. «Ahora» es natural en español actual y conserva el impulso inmediato del hebreo.
- source_word: אֱסֹף אֶת יֶתֶר הָעָם
  english_pob_choice: gather the rest of the troops
  chosen_spanish: reúne al resto de la tropa
  alternatives_spanish:
  - reúne al resto del pueblo
  - mustera al resto de la tropa
  lexicon: HALOT
  rationale: En este contexto militar, הָעָם no se refiere simplemente a «el pueblo», sino a los combatientes restantes. «Tropa» conserva ese sentido militar sin volverse técnico en exceso.
- source_word: וַחֲנֵה עַל הָעִיר
  english_pob_choice: camp against the city
  chosen_spanish: acampa frente a la ciudad
  alternatives_spanish:
  - acampa contra la ciudad
  - establece campamento frente a la ciudad
  lexicon: HALOT
  rationale: חנה significa acampar o establecerse en campamento. «Frente a» transmite la posición hostil/sitiante de modo natural en español; «contra» puede sonar más literal pero menos fluido.
- source_word: וְלָכְדָהּ
  english_pob_choice: and capture it
  chosen_spanish: y captúrala
  alternatives_spanish:
  - y tómala
  - y apodérate de ella
  lexicon: HALOT
  rationale: לכד es un verbo de captura militar. «Captúrala» mantiene el valor bélico y la referencia pronominal directa al objeto femenino singular.
- source_word: פֶּן אֶלְכֹּד אֲנִי אֶת הָעִיר
  english_pob_choice: lest I capture the city
  chosen_spanish: no sea que yo la capture
  alternatives_spanish:
  - para que no la capture yo
  - no vaya yo a capturar la ciudad
  lexicon: HALOT
  rationale: פֶּן introduce una prevención negativa. «No sea que» reproduce bien esa advertencia en español. Se mantiene el pronombre femenino para referirse a la ciudad.
- source_word: וְנִקְרָא שְׁמִי עָלֶיהָ
  english_pob_choice: and it be called by my name
  chosen_spanish: y sea llamada por mi nombre
  alternatives_spanish:
  - y se le ponga mi nombre
  - y mi nombre sea invocado sobre ella
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente, «mi nombre sea llamado sobre ella». En español, «ser llamada por mi nombre» comunica la atribución de honor o posesión sin forzar una traducción calcada. Se conserva la referencia a la ciudad mediante el pronombre femenino.'
theological_decisions:
- issue: Idiom of naming over the city and attribution of honor/conquest
  english_pob_reading: the city be called by my name
  chosen_spanish_reading: sea llamada por mi nombre
  alternative_spanish_readings:
  - mi nombre sea puesto sobre ella
  - sea nombrada con mi nombre
  rationale: La frase no describe un simple acto de bautizar, sino una atribución de crédito por la conquista. «Sea llamada por mi nombre» preserva la metáfora sin explicar más de lo que el texto dice; el sentido de honor atribuido queda implícito, como en el audit trail inglés.
  doctrine_reference: 2 Samuel 12:28; idiom of ownership/honor in conquest narratives
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente en el final de la cláusula: el énfasis no recae en que «mi nombre sea llamado sobre ella» de forma literal, sino en la idea idiomática de que la ciudad sea llamada por el nombre del conquistador. La versión española intenta conservar esa naturalidad sin perder la imagen hebrea.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB cuando corresponda; este versículo no lo contiene.
  - Se eligió «capturar/captúrala» para לכד por coherencia con el léxico bélico ya documentado.
  - Se prefirió «tropa» para הָעָם en el contexto de asedio, evitando la lectura genérica de «pueblo».
  - El pronombre femenino en los dos últimos miembros sigue la referencia a «la ciudad».
