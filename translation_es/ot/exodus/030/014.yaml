    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la expresión censal principal para mejorar la naturalidad y claridad en español sin perder la imagen verbal de עבר ni el matiz procedimental del hebreo. Se conserva «Yahvé», «contribución» y el registro legal del versículo. La nota al pie sigue documentando la alternativa más literal.
