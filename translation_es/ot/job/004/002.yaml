revisions:
- from: Si uno intenta una palabra contigo[a], ¿te cansarás? Pero ¿quién podrá contener las palabras?
  to: Si uno intenta hablarte[a], ¿te cansarás? Pero ¿quién podrá contener las palabras?
  rationale: Se reemplaza «intenta una palabra contigo» por «intenta hablarte» para evitar un calco poco idiomático, manteniendo el sentido de dirigirse verbalmente a Job. La nota conserva la alternativa documentada de דָבָר como «asunto» y de הֲנִסָּה como «se atreve a». No se requieren cambios doctrinales ni de fondo.
