    text: 'Hebreo: «sobre la boca de Yahvé», un modismo que significa «por mandato de Yahvé».'
    reason: lexical_alternative
  revision_rationale: La revisión conserva el contenido del borrador pero fortalece la fidelidad al modismo עַל־פִּי con «por mandato de Yahvé», que en español transmite mejor la idea de dirección autoritativa. También usa presente gnómico para expresar la norma general del movimiento y del campamento de Israel en este contexto, manteniendo el paralelismo y la claridad. Se preservan «Yahvé», «los hijos de Israel» y «tabernáculo» conforme al proyecto.
