translation:
  language: es
  text: 'Entonces él y los hombres que estaban con él comieron y bebieron, y pasaron la noche allí. Al levantarse por la mañana, él dijo: «Despídanme para ir a mi amo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mi señor». El hebreo אֲדֹנִי puede significar «mi señor» o «mi amo»; aquí se refiere a Abraham, el superior humano del siervo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - cenaron
  - tomaron una comida
  lexicon: HALOT
  rationale: El verbo básico de comer en narrativa se expresa de forma natural y directa con «comieron»; mantiene la secuencia simple del hebreo sin añadir contenido no presente.
- source_word: וַיִּשְׁתּוּ
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - tomaron de beber
  - tomaron bebida
  lexicon: HALOT
  rationale: Corresponde al verbo פשוט de beber y conserva el paralelismo breve con «comieron».
- source_word: הוּא וְהָאֲנָשִׁים אֲשֶׁר עִמּוֹ
  english_pob_choice: he and the men who were with him
  chosen_spanish: él y los hombres que estaban con él
  alternatives_spanish:
  - él y los hombres con él
  lexicon: HALOT
  rationale: La frase explicita el grupo acompañante; «que estaban con él» reproduce bien la relación inclusiva del hebreo y suena natural en español.
- source_word: וַיָּלִינוּ
  english_pob_choice: spent the night
  chosen_spanish: pasaron la noche
  alternatives_spanish:
  - se quedaron a pasar la noche
  - pernoctaron
  lexicon: HALOT
  rationale: «Pasaron la noche» comunica el valor de permanecer hasta el día siguiente sin arcaísmo y sin perder el matiz narrativo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - al amanecer
  - en la mañana
  lexicon: HALOT
  rationale: La expresión temporal se rinde de manera idiomática con «por la mañana», manteniendo la referencia clara al inicio del día.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El hebreo conserva el sujeto explícito; en español puede repetirse para mantener el ritmo narrativo y la referencia clara del hablante.
- source_word: שַׁלְּחֻנִי
  english_pob_choice: send me away
  chosen_spanish: Despídanme
  alternatives_spanish:
  - Envíenme
  - Déjenme ir
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de primera persona singular pide una forma plural en español; «Despídanme» capta la idea de dejar partir o despedir para el viaje.
- source_word: לַאדֹנִי
  english_pob_choice: to my master
  chosen_spanish: a mi amo
  alternatives_spanish:
  - a mi señor
  - a mi patrón
  lexicon: HALOT
  rationale: En este contexto אָדוֹן se refiere al superior humano del siervo, Abraham. «A mi amo» conserva la relación amo-siervo sin introducir el título divino «Señor».
theological_decisions:
- issue: Valor de אָדוֹן aplicado a Abraham
  english_pob_reading: my master
  chosen_spanish_reading: mi amo
  alternative_spanish_readings:
  - mi señor
  rationale: El referente es Abraham como superior humano del siervo, no una designación divina. «Mi amo» evita la ambigüedad teológica de «Señor» y refleja con precisión la relación jerárquica del pasaje.
  doctrine_reference: Translation philosophy §2; sensibilidad de términos de título/relación en la tabla de términos en disputa
translation_notes:
  revision_awareness: La redacción incorpora el ajuste del estado editorial inglés que añadió «allí» para reflejar con más plenitud el verbo de hospedarse/pernoctar, manteniéndolo como «allí» en español. Se preserva también la decisión inglesa de tratar אָדוֹן como referencia al superior humano de Abraham, evitando una lectura litúrgica de «Señor».
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en pretérito simple y se conserva el orden de eventos del hebreo.
  - Se usa «amo» de manera consistente para אָדוֹן cuando el referente es humano y la relación de servicio es explícita.
  - La nota al pie sólo marca la variante de «bebieron» porque el español base ya comunica con claridad el resto del verso.
