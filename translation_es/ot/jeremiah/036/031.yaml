  language: en
  yaml_path: translation/ot/jeremiah/036/031.yaml
  text: And I will punish him and his offspring and his servants for their iniquity[a], and I will bring on them, on the inhabitants of Jerusalem, and on the men of Judah all the disaster that I spoke against them, but they did not listen.
  footnotes:
