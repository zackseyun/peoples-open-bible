  - severity: high
    issue: '"mujeres extranjeras" en lugar de un término marital explícito'
    rationale: El POB documenta que el giro idiomático se refiere a tomar mujeres como esposas. En este contexto, 'esposas extranjeras' preserva mejor el sentido fuente que el genérico 'mujeres extranjeras'.
  - severity: medium
