review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura general del hebreo, mantiene «Yahvé» para יְהוָה y preserva bien el juego repetido con מַשָּׂא mediante «carga». También conserva la nota alternativa sobre «oráculo». Sin embargo, el segmento וָאֶשְׁלַח אֲלֵיכֶם לֵאמֹר está mejor entendido aquí con fuerza concesiva en contexto («aunque les envié a decirles» / «aunque les envié este mensaje»), como documenta el audit trail inglés; el borrador con «y les envié para decirles» debilita ese contraste. Además, «si dicen» no concuerda bien con el 2mp directo del resto; «si ustedes dicen» o «si dicen ustedes» sería más coherente, pero la forma más natural es «si ustedes dicen».
  spanish_quality_summary: El español es claro y bastante natural, con buen tono profético. No obstante, hay una ligera tensión de persona verbal entre «si dicen» y luego «han dicho... les envié... no digan». También «para decirles» suena más final que citativo; «a decirles» o «diciendo» funciona mejor. Una pequeña revisión mejora la coherencia y la fidelidad sin perder legibilidad.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; מַשָּׂא → «carga» correctamente con nota de alternativa «oráculo». No hay conflictos doctrinales adicionales.'
  issues:
  - severity: medium
    issue: Se pierde la fuerza concesiva contextual de וָאֶשְׁלַח אֲלֵיכֶם לֵאמֹר
    rationale: 'El audit trail inglés documenta acertadamente que, en contexto, el waw se entiende mejor como concesivo: pese a que Yahvé ya les había enviado advertencia, ellos siguieron usando la fórmula. «Y les envié para decirles» comunica secuencia/finalidad, pero no ese contraste.'
  - severity: low
    issue: Inconsistencia leve de persona en «si dicen» frente al resto del discurso directo
    rationale: El hebreo usa 2mp. En español bíblico claro, «si ustedes dicen» mantiene la referencia directa y combina mejor con «han dicho» y «no digan».
  - severity: low
    issue: «Para decirles» suena más teleológico que citativo
    rationale: לֵאמֹר introduce el contenido del mensaje. «A decirles» o «diciendo» representa mejor la función introductoria de cita en español.
