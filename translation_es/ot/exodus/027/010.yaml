review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: «sus veinte pilares», «sus veinte ... de bronce», «los ganchos de los pilares» y «serán de plata». También conserva adecuadamente la incertidumbre léxica sobre חֲשֻׁקֵיהֶם mediante nota. Sin embargo, hay un problema léxico en la nota alternativa de אַדְנֵיהֶם: «zócalos» no corresponde bien al valor técnico de apoyos/sockets para pilares en este contexto. Además, conviene corregir la alternativa imposible «sockets» en español y el error ortográfico «filletes».'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial moderno. «basas» es una elección válida y precisa en contexto arquitectónico; «ganchos» y «bandas» también leen bien. La sintaxis fluye correctamente. Los ajustes necesarios son menores y afectan sobre todo a las notas y a una alternativa léxica mal hispanizada.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales están alineadas con la POB inglesa y con el hebreo. Se preserva bien la distinción material «bronce / plata». La única desalineación real está en las alternativas de nota y glosario: «zócalos» y «sockets» no son las mejores opciones en español para אֶדֶן aquí.'
  issues:
  - severity: medium
    issue: La nota [a] usa «zócalos» como alternativa para אַדְנֵיהֶם.
    rationale: En contexto del tabernáculo, אֶדֶן se refiere a basas/bases o encajes estructurales de los pilares, no a un «zócalo» en el sentido usual español. Esto puede inducir una imagen arquitectónica equivocada.
  - severity: medium
    issue: En las decisiones léxicas aparece la alternativa española «sockets de bronce».
    rationale: Es un anglicismo impropio en una traducción bíblica española. Debe sustituirse por una alternativa española natural como «bases» o «encajes» según el nivel técnico deseado.
  - severity: low
    issue: La alternativa «filletes» está mal escrita.
    rationale: La forma correcta es «filetes». Aunque solo aparece como alternativa, conviene corregirla para mantener calidad editorial.
  revised_spanish_text: con sus veinte pilares y sus veinte basas de bronce[a], y los ganchos de los pilares y sus bandas[b] serán de plata.
  revised_footnotes:
  - marker: a
    text: O «bases» en lugar de «basas» para los soportes de los pilares.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo vertido «bandas» es incierto; versiones tradicionales suelen tener «filetes».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y natural. Solo se corrigen las notas para eliminar una alternativa engañosa («zócalos») y un error ortográfico («filletes»), alineando mejor el español con la evidencia léxica y el nivel de claridad del proyecto.
