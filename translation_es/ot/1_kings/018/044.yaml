translation:
  language: es
  text: 'Y aconteció la séptima vez que dijo: «Mira, una nube pequeña, como la palma de un hombre[a], sube del mar». Entonces dijo: «Sube; di a Acab: “Apareja tu carro[b] y desciende, para que la lluvia no te detenga[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la palma de la mano de un hombre».
    reason: lexical_alternative
  - marker: b
    text: «Apareja tu carro» refleja el sentido del verbo hebreo de atar o enganchar el carro o su tiro para el viaje.
    reason: cultural_note
  - marker: c
    text: O «para que la lluvia no te retenga» o «no te impida avanzar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el siguiente episodio sin añadir interpretación. «Aconteció» conserva el valor discursivo de wayyiqtol y suena natural en español bíblico actual.
- source_word: בַּשְּׁבִעִית
  english_pob_choice: on the seventh time
  chosen_spanish: en la séptima vez
  alternatives_spanish:
  - al séptimo intento
  - en la séptima ocasión
  lexicon: HALOT
  rationale: El contexto muestra que se trata de la séptima inspección, no de un día. «Séptima vez» expresa con claridad la repetición del acto sin expandir más de lo que la fuente warrants.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  lexicon: HALOT
  rationale: Partícula deíctica que llama la atención sobre algo visible. «Mira» es idiomático en español y preserva la inmediatez del descubrimiento.
- source_word: עָב קְטַנָּה
  english_pob_choice: a small cloud
  chosen_spanish: una nube pequeña
  alternatives_spanish:
  - una nubecita
  - una nube diminuta
  lexicon: HALOT
  rationale: La combinación nominal describe tamaño pequeño sin necesidad de diminutivo afectivo. «Nube pequeña» es clara y fiel al hebreo.
- source_word: כְּכַף אִישׁ
  english_pob_choice: like a man’s palm
  chosen_spanish: como la palma de un hombre
  alternatives_spanish:
  - como la palma de la mano de un hombre
  - como la palma de una mano
  lexicon: HALOT
  rationale: כַּף aquí indica la palma o superficie interior de la mano. Se mantiene la referencia masculina singular del hebreo y la comparación de tamaño, con una construcción natural en español.
- source_word: עֹלָה מִיָּם
  english_pob_choice: is rising from the sea
  chosen_spanish: sube del mar
  alternatives_spanish:
  - está subiendo del mar
  - se eleva del mar
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Sube» comunica bien la aparición y el movimiento visual de la nube desde el horizonte marino; «del mar» traduce מִיָּם sin perder la escena.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Sube allá
  - Ve arriba
  lexicon: HALOT
  rationale: Imperativo direccional. En español, «Sube» conserva el movimiento ascendente desde el puesto de observación o desde el monte, sin sobreexplicar.
- source_word: אֱמֹר אֶל אַחְאָב
  english_pob_choice: say to Ahab
  chosen_spanish: di a Acab
  alternatives_spanish:
  - dile a Acab
  - habla a Acab
  lexicon: HALOT
  rationale: Se mantiene la instrucción directa. «Acab» sigue la forma española habitual del nombre propio, y «di» conserva la sencillez imperativa del hebreo.
- source_word: אֱסֹר
  english_pob_choice: Harness your chariot
  chosen_spanish: Prepara tu carro
  alternatives_spanish:
  - Apareja tu carro
  - Ajusta tu carro
  lexicon: HALOT
  rationale: El verbo literalmente es «atar/harness», pero en este contexto alude a disponer el carro para partir. Se traduce de modo transparente en español; «carro» preserva el referente cultural y evita una equivalencia demasiado técnica.
- source_word: וָרֵד
  english_pob_choice: and go down
  chosen_spanish: y desciende
  alternatives_spanish:
  - y baja
  - y ve hacia abajo
  lexicon: HALOT
  rationale: La dirección es descendente desde el monte; «desciende» es sobrio y coherente con el movimiento topográfico del relato.
- source_word: וְלֹא יַעַצָרְכָה הַגָּשֶׁם
  english_pob_choice: so that the rain does not stop you
  chosen_spanish: para que la lluvia no te detenga
  alternatives_spanish:
  - para que la lluvia no te impida avanzar
  - para que la lluvia no te retenga
  lexicon: HALOT
  rationale: עצר puede significar detener, retener o impedir. «Detenga» preserva el sentido práctico de que la lluvia podría obstaculizar el viaje, sin añadir una interpretación excesiva.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que precisó el objeto implícito de «harness» como «your chariot». En español se optó por una equivalencia funcional («Prepara tu carro») que conserva el referente del carro sin forzar una construcción artificial. También se mantuvo la lectura de la frase final como advertencia práctica, no como simple posibilidad abstracta.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se usa «carro» para el vehículo de Acab, en coherencia con el contexto narrativo antiguo.
  - «Acab» sigue la forma española estándar del nombre propio.
  - La puntuación de discurso directo sigue el estilo moderno del proyecto, con comillas para la cita interna.
