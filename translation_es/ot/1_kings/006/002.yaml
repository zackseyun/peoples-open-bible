translation:
  language: es
  text: Y la casa que el rey Salomón edificó para Yahvé tenía sesenta codos de largo, veinte codos de ancho[a], y treinta codos de alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «su ancho era de veinte codos»; el hebreo no repite «codos» en esta frase, aunque la unidad se sobreentiende por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבַּיִת
  english_pob_choice: Now the house
  chosen_spanish: Ahora, la casa
  alternatives_spanish:
  - Y la casa
  - Entonces la casa
  lexicon: HALOT
  rationale: El hebreo inicia con un enlace narrativo que puede sonar en español como transición temporal. «Ahora» mantiene la fluidez del relato sin ocultar el valor conjuntivo del hebreo; «la casa» preserva el sustantivo básico בַּיִת, importante en el lenguaje teológico del templo como «casa» para Yahvé.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: HALOT
  rationale: Es la relativa estándar en español para introducir la proposición explicativa sin añadir matiz innecesario.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El perfecto qal indica una acción completada. «Edificó» es adecuado para una obra solemne y conserva el registro elevado del pasaje.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - rey Salomón
  - Salomón, el rey
  lexicon: HALOT
  rationale: Se mantiene la apposición título + nombre en orden natural del español, sin perder el énfasis real del hebreo.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahweh
  - dedicada a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: יהוה se vierte «Yahvé». La preposición ל expresa finalidad/dedicación; «para Yahvé» conserva esa relación sin forzar una perífrasis más interpretativa.'
- source_word: שִׁשִּׁים אַמָּה אָרְכּוֹ
  english_pob_choice: sixty cubits long
  chosen_spanish: sesenta codos de largo[a]
  alternatives_spanish:
  - su largo era de sesenta codos
  - sesenta codos de longitud
  lexicon: HALOT
  rationale: «Codo» reproduce la unidad antigua de medida. Se expresa la longitud de manera natural en español y se conserva la nota sobre la posible lectura conjuntiva inicial («Y…» / «Ahora…»).
- source_word: וְעֶשְׂרִים רָחְבּוֹ
  english_pob_choice: twenty cubits wide
  chosen_spanish: veinte codos de ancho[b]
  alternatives_spanish:
  - su ancho era de veinte codos
  - veinte de ancho
  lexicon: HALOT
  rationale: Aunque el hebreo no repite explícitamente «codos» aquí, el contexto de medidas lo da por entendido; por claridad en español se repite la unidad. Se conserva el valor dimensional de רָחְבּוֹ como «ancho».
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתוֹ
  english_pob_choice: thirty cubits high
  chosen_spanish: y treinta codos de alto
  alternatives_spanish:
  - y su altura era de treinta codos
  - y treinta codos de altura
  lexicon: HALOT
  rationale: קוֹמָה se refiere a la altura; «de alto» es una forma natural y fiel en español. Se incluye la conjunción para reflejar el encadenamiento hebreo de las medidas.
theological_decisions:
- issue: Nombre divino יהוה en una fórmula de dedicación del templo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto pide «Yahvé» como forma principal en español. En este contexto de dedicación, «para Yahvé» mantiene el nombre propio y la relación teleológica del templo con el Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término arquitectónico-teológico בַּיִת
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - el edificio
  rationale: Se conserva «casa» porque el hebreo lo usa deliberadamente; aunque el referente es el templo, la elección preserva la resonancia bíblica de una «casa» para Yahvé. «Templo» interpreta correctamente, pero borra parte de la textura del hebreo.
  doctrine_reference: Uso contextual de בַּיִת en relatos del templo
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión posterior que añadió explícitamente «cubits» en la medida del ancho para uniformidad. En español se optó por repetir la unidad en las tres dimensiones desde el inicio, evitando la ambigüedad de la elipsis hebrea y alineándose con la intención revisada del registro inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva «codos» en las tres medidas para claridad y coherencia métrica.
  - Se mantiene «casa» en vez de «templo» para no perder la imagen hebrea original.
  - El registro es formal y bíblico, pero con sintaxis española natural.
