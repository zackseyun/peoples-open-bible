translation:
  language: es
  text: Y Samuel juzgó a Israel[a] todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernó a Israel» o «dirigió a Israel como juez»; el verbo hebreo incluye matiz judicial y de gobierno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - dirigió
  lexicon: HALOT
  rationale: El verbo שׁפט en qal puede abarcar función judicial y de gobierno en el contexto de los jueces. «Juzgó» conserva la referencia canónica a Samuel como juez y deja visible la amplitud semántica sin sustituirla por una paráfrasis más amplia.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar al español.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - Israel
  lexicon: función sintáctica del objeto directo
  rationale: 'En español conviene explicitar la preposición con el objeto animado/colectivo para una frase natural: «juzgó a Israel». Mantiene el referente directo del hebreo sin cargar la estructura con el marcador objeto no traducido.'
- source_word: כֹּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se vierte de manera casi literal para conservar su duración total. «Todos los días de» es natural en español y preserva el ritmo del original.
- source_word: חַיָּיו
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su vida entera
  - su lifetime
  lexicon: HALOT
  rationale: El hebreo expresa la totalidad de la vida de Samuel; «su vida» es la forma más natural en español y mantiene la duración completa sin añadir matices no requeridos.
theological_decisions:
- issue: Valor semántico de שׁפט aplicado a Samuel
  english_pob_reading: judged; footnote notes possible governed/led Israel as judge
  chosen_spanish_reading: juzgó; nota sobre posible matiz de gobierno o dirección
  alternative_spanish_readings:
  - gobernó a Israel
  - dirigió a Israel como juez
  rationale: 'No se debe borrar la tensión lexical: el verbo incluye función judicial y también de gobierno. La opción principal «juzgó» conserva el título/rol de juez; la nota recoge las alternativas legítimas sin forzar una sola equivalencia.'
  doctrine_reference: Función de Samuel como juez en el periodo premonárquico; cf. el libro de los Jueces y la transición narrada en 1 Samuel.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con el audit trail inglés: no hay revisiones aplicadas y el consenso de revisión fue de alta concordancia. Se mantiene el matiz semántico de שׁפט mediante una nota alternativa en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «juzgó» para שׁפט, evitando sustituirlo por «gobernó» en el texto principal.
  - La puntuación y el registro buscan ser bíblicos y naturales para lectura pública en español.
