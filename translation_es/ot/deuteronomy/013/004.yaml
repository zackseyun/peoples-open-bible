translation:
  language: es
  text: No escucharán las palabras de aquel profeta ni de aquel soñador de sueños, porque Yahvé su Dios los está poniendo a prueba[a], para saber si aman a Yahvé su Dios con todo su corazón y con toda su alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los está probando». El verbo hebreo expresa la idea de poner a prueba o examinar con un fin evaluativo.'
    reason: lexical_alternative
  - marker: b
    text: «Alma» aquí también puede significar «vida», «ser» o «persona». En esta fórmula de pacto, «alma» preserva la redacción tradicional y su importancia intertextual.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמַע אֶל
  english_pob_choice: shall not listen to
  chosen_spanish: No escucharás
  alternatives_spanish:
  - No oirás
  - No prestarás atención a
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa escuchar/atender obedientemente. 'Escucharás' conserva el valor de oír con atención y el tono directo de prohibición covenantal sin volverlo demasiado interpretativo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - los dichos de
  lexicon: HALOT
  rationale: דָּבָר en plural constructo introduce las declaraciones del supuesto profeta. 'Palabras' es la correspondencia natural y transparente en español.
- source_word: הַנָּבִיא הַהוּא
  english_pob_choice: that prophet
  chosen_spanish: ese profeta
  alternatives_spanish:
  - aquel profeta
  - el profeta
  lexicon: HALOT
  rationale: El artículo con el demostrativo intensifica la referencia a un profeta ya identificado. 'Ese' reproduce bien la distancia y la desautorización implícitas.
- source_word: חוֹלֵם הַחֲלוֹם
  english_pob_choice: dreamer of dreams
  chosen_spanish: soñador de sueños
  alternatives_spanish:
  - el que sueña sueños
  - soñador
  lexicon: HALOT
  rationale: La expresión es idiomática. 'Soñador de sueños' preserva la forma hebrea y su fuerza enfática mejor que reducirla a 'soñador'.
- source_word: מְנַסֶּה
  english_pob_choice: is testing
  chosen_spanish: te está probando
  alternatives_spanish:
  - te está poniendo a prueba
  - te está examinando
  lexicon: HALOT
  rationale: נסה en piel expresa probar/poner a prueba. 'Te está probando' es fiel, claro y mantiene el sentido evaluativo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Según la terminología del proyecto, el Tetragrámaton se vierte como 'Yahvé' en el texto principal, preservando el nombre divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: La forma con sufijo de 2ª persona plural se traduce aquí con el singular de cortesía/lectura bíblica generalizado en español de servicio religioso, manteniendo la posesión divina sin sonar artificialmente arcaico.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para llegar a saber
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa finalidad. 'Para saber' es natural y conserva el sentido de conocimiento comprobado sin sobreexplicar.
- source_word: הֲיִשְׁכֶם אֹהֲבִים
  english_pob_choice: whether you love
  chosen_spanish: si amas
  alternatives_spanish:
  - si estás amando
  - si ustedes aman
  lexicon: HALOT
  rationale: El participio puede expresar acción continua o estado. En español, 'amas' mantiene la naturalidad y el valor general/presente del hebreo, sin forzar una perífrasis poco idiomática.
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo el corazón
  - con todo vuestro corazón
  lexicon: HALOT
  rationale: לֵבָב se mantiene como 'corazón', la forma estable de la fórmula de pacto. 'Con todo tu corazón' suena claro y solemne en español.
- source_word: וּבְכָל נַפְשְׁכֶם
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda tu alma
  alternatives_spanish:
  - y con toda tu vida
  - y con todo tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. Aquí se preserva 'alma' para mantener la fórmula tradicional e intertextualmente reconocible.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה de forma directa. El proyecto pide transliterar el nombre divino como 'Yahvé', evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión antropomórfica en 'para saber si amas'
  english_pob_reading: Retain the anthropomorphic wording without softening
  chosen_spanish_reading: para saber si amas
  alternative_spanish_readings:
  - para mostrar si amas
  - para revelar si amas
  rationale: El hebreo dice literalmente 'para saber'. Se conserva la tensión teológica sin convertirla en una paráfrasis que resuelva el antropomorfismo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés revisó 'are loving' a 'love' por naturalidad. En español, el presente 'amas' logra esa misma naturalidad sin perder el sentido aspectual general del participio hebreo. También se mantuvo la decisión de traducir el nombre divino como Yahvé y de conservar la finalidad 'para saber' sin suavizarla.
  spanish_consistency_notes:
  - Se conservó la fórmula de pacto 'con todo tu corazón y con toda tu alma' para mantener continuidad intertextual en Deuteronomio.
  - Se evitó 'SEÑOR' para el nombre divino conforme al estándar del proyecto.
  - '''Ese profeta'' y ''soñador de sueños'' reflejan la doble referencia despectiva del hebreo con naturalidad en español.'
