translation:
  language: es
  text: Y rasgaron sus vestiduras[a], e hicieron gran lamentación, y pusieron ceniza sobre sus cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Estos actos—rasgar las vestiduras, hacer lamentación y poner ceniza sobre la cabeza—son signos convencionales de dolor y duelo en la literatura bíblica.
    reason: cultural_note
lexical_decisions:
- source_word: διέρρηξαν
  english_pob_choice: tore
  chosen_spanish: rasgaron
  alternatives_spanish:
  - rompieron
  - desgarraron
  lexicon: LSJ
  rationale: El verbo griego expresa la acción de rasgar o romper una prenda. «Rasgaron» reproduce con naturalidad en español el gesto ritual de duelo y conserva mejor la fuerza del acto que una paráfrasis más general.
- source_word: τὰ ἱμάτια
  english_pob_choice: garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: LSJ
  rationale: ἱμάτια designa vestiduras o prendas de vestir. «Vestidos» es una forma natural y solemne en español bíblico para este contexto; mantiene el valor de prenda exterior sin volver el texto demasiado coloquial.
- source_word: ἐκόψαντο κοπετὸν μέγαν
  english_pob_choice: made great lamentation
  chosen_spanish: hicieron gran lamentación
  alternatives_spanish:
  - se lamentaron mucho
  - hicieron gran duelo
  - lloraron mucho
  lexicon: LSJ
  rationale: La construcción idiomática griega enfatiza el lamento ritual o público. «Hicieron gran lamentación» preserva ese registro formal y evita añadir una imagen corporal que el griego no explicita.
- source_word: σποδὸν
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo
  lexicon: LSJ
  rationale: El sustantivo singular griego puede expresarse naturalmente en español con «ceniza»; también es posible «cenizas». Aquí «ceniza» conserva el valor material del símbolo de duelo y funciona bien en la expresión con la cabeza.
- source_word: ἐπέθεντο
  english_pob_choice: put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - echaron
  - pusieron sobre
  lexicon: LSJ
  rationale: «Pusieron» es la correspondencia directa y idiomática para el gesto de colocar ceniza sobre la cabeza.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτῶν
  english_pob_choice: on their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  - en sus cabezas
  lexicon: LSJ
  rationale: La preposición griega indica colocación sobre la cabeza. «Sobre sus cabezas» mantiene el sentido distributivo natural en español.
theological_decisions:
- issue: Gestos convencionales de duelo
  english_pob_reading: These actions—tearing garments, lamenting, and putting ashes on the head—are conventional signs of grief and mourning in biblical literature.
  chosen_spanish_reading: Estos actos—rasgar los vestidos, lamentarse y poner ceniza sobre la cabeza—son signos convencionales de dolor y duelo en la literatura bíblica.
  alternative_spanish_readings:
  - Estos actos son señales tradicionales de duelo en la Biblia.
  - Estos gestos expresan luto ritual.
  rationale: No hay una tensión doctrinal especial, pero sí un trasfondo cultural importante. Mantener la lectura como signo convencional evita sobredimensionar la escena y conserva la función literaria del gesto.
  doctrine_reference: 1 Maccabees 4:39; uso bíblico de signos de duelo
