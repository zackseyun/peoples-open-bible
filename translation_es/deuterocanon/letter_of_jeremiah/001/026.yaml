  yaml_path: translation/deuterocanon/letter_of_jeremiah/001/026.yaml
  text: Therefore[a], if one of them falls to the ground, they cannot raise themselves up; and if someone sets it upright, it will not move by itself; and if it is tilted, it will certainly not be made straight. Rather[b], gifts are set before them as before the dead.
  footnotes:
  - marker: a
    text: Or, more literally, 'lest it fall to the ground, to rise through themselves'; the sense is that if an idol falls, it cannot get itself up.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts'' may also be rendered ''offerings'' in this cultic context.'
    reason: lexical_alternative
