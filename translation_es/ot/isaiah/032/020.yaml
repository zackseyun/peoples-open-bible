revisions:
- from: Bienaventurados[a] los que siembran junto a todas las aguas, los que dejan suelto el pie del buey y del asno.
  to: Bienaventurados ustedes, los que siembran junto a todas las aguas, los que dejan libres los pies del buey y del asno.[a]
  rationale: Se ajusta la primera cláusula para reflejar explícitamente la segunda persona plural del hebreo ('ustedes') y se reescribe la imagen idiomática final para un español más natural ('dejan libres los pies') sin omitir el elemento 'pie/pies' que la auditoría inglesa decidió conservar. La nota al pie mantiene la alternativa más literal y explica el sentido idiomático.
