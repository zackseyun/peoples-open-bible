translation:
  language: es
  text: Entonces colócala vacía sobre sus brasas, para que se caliente y su bronce resplandezca, y su impureza dentro de ella se derrita, y su corrosión[a] se consuma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su herrumbre» o «su escoria». El término hebreo puede referirse a corrosión sobre metal y, por extensión en este contexto, al residuo repugnante que representa la contaminación moral de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמִידֶהָ
  english_pob_choice: Then set it
  chosen_spanish: Entonces colócalo
  alternatives_spanish:
  - Y colócalo
  - Entonces ponlo
  lexicon: HALOT
  rationale: El imperativo causativo con sufijo femenino singular se refiere a la vasija. «Entonces» conserva el valor secuencial de la waw, y «colócalo» suena natural en español sin perder la orden directa.
- source_word: עַל גֶּחָלֶיהָ
  english_pob_choice: on its coals
  chosen_spanish: sobre sus brasas
  alternatives_spanish:
  - sobre sus carbones
  - sobre sus tizones
  lexicon: HALOT
  rationale: גֶּחָלִים designa brasas o carbones encendidos. «Brasas» es la opción más clara y natural en español, y mantiene la imagen de calor intenso.
- source_word: רֵקָה
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - desocupado
  - vacía
  lexicon: HALOT
  rationale: El adjetivo describe la vasija sin contenido. «Vacío» transmite de forma directa el estado requerido por el contexto.
- source_word: לְמַעַן תֵּחַם
  english_pob_choice: so that it may become hot
  chosen_spanish: para que se caliente
  alternatives_spanish:
  - a fin de que se caliente
  - para que llegue a estar caliente
  lexicon: HALOT
  rationale: La finalidad se expresa bien con «para que». «Se caliente» conserva el proceso de incremento de temperatura sin volverlo mecánico.
- source_word: וְחָרָה נְחֻשְׁתָּהּ
  english_pob_choice: and its bronze may glow
  chosen_spanish: y su bronce arda
  alternatives_spanish:
  - y su bronce resplandezca
  - y su bronce se ponga al rojo
  lexicon: HALOT
  rationale: חָרָה aquí describe el calentamiento intenso del metal. «Arda» preserva la fuerza imagética y evita reducirlo a un simple cambio térmico; «bronce» sigue la convención contextual del metal de la vasija.
- source_word: וְנִתְּכָה
  english_pob_choice: may be melted
  chosen_spanish: se derrita
  alternatives_spanish:
  - se funda
  - sea fundido
  lexicon: HALOT
  rationale: El verbo admite la idea de fundir o derretir en un contexto metalúrgico. «Se derrita» comunica bien la imagen de refinamiento por fuego y funciona de manera fluida en español.
- source_word: בְתוֹכָהּ טֻמְאָתָהּ
  english_pob_choice: its uncleanness within it
  chosen_spanish: su impureza dentro de él
  alternatives_spanish:
  - su impureza en su interior
  - su inmundicia dentro de él
  lexicon: HALOT
  rationale: «Impureza» conserva la fuerza ritual-moral de טֻמְאָה. Se mantiene «dentro de él» para reflejar el interior de la vasija, aunque el referente de la vasija sea femenino en hebreo.
- source_word: תִּתֻּם
  english_pob_choice: consumed
  chosen_spanish: se consuma
  alternatives_spanish:
  - se termine
  - quede consumida
  lexicon: HALOT
  rationale: La raíz expresa consumación o agotamiento completo. «Se consuma» preserva el cierre total del proceso y conecta bien con la imagen del residuo en el fuego.
- source_word: חֶלְאָתָהּ
  english_pob_choice: its corrosion
  chosen_spanish: su corrosión
  alternatives_spanish:
  - su óxido
  - su herrumbre
  - su escoria
  lexicon: HALOT
  rationale: El término puede referirse a corrosión, óxido o, figuradamente, escoria/impureza. «Corrosión» mantiene mejor el campo metálico del símbolo y, al mismo tiempo, sugiere la corrupción representada por la vasija.
theological_decisions:
- issue: Conservar la tensión entre imagen metalúrgica literal y juicio moral simbólico
  english_pob_reading: Use concrete metallurgical language ('bronze,' 'melted,' 'corrosion') while retaining morally charged 'uncleanness'
  chosen_spanish_reading: Usar lenguaje metalúrgico concreto («bronce», «se derrita», «corrosión») y conservar «impureza»
  alternative_spanish_readings:
  - Usar solamente lenguaje moral como «culpa» o «pecado»
  - Usar solamente lenguaje doméstico como «residuo» o «escoria»
  rationale: 'El versículo es una parábola actuada: la vasija se calienta para que lo deficiente sea removido. Si se vuelve demasiado abstracto, se pierde el símbolo; si se vuelve demasiado literalista, se diluye su sentido profético. La solución española debe mantener ambos niveles.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la lectura inglesa auditada; no hay revisiones aplicadas en el expediente, y la redacción española conserva la misma estructura imagética y semántica general.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Se usa «impureza» para טֻמְאָה, en línea con el valor ritual-moral del término.
  - Se conserva «bronce» como equivalente contextual de נְחֹשֶׁת, siguiendo la decisión auditada en inglés.
  - La frase «su corrosión» reproduce el campo semántico de חֶלְאָה sin desplazarlo hacia una abstracción moral excesiva.
