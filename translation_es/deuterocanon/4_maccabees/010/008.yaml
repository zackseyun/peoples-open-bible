translation:
  language: es
  text: alrededor del cual[a], mientras era descoyuntado de las vértebras, vio cómo su propia carne era desgarrada por todas partes y gotas de sangre caían por sus entrañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'en torno al cual' o 'alrededor de quien'; la expresión griega περὶ ὃν es difícil y puede introducir la escena en relación con el instrumento de tortura o con la persona misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ ὃν
  english_pob_choice: around which
  chosen_spanish: alrededor del cual
  alternatives_spanish:
  - en torno al cual
  - alrededor de quien
  lexicon: LSJ
  rationale: Mantiene la relación espacial/circunstancial del relativo griego sin forzar una paráfrasis. En español, 'alrededor del cual' conserva la referencia al elemento alrededor del que ocurre la escena, aunque resulte algo más solemne que una simple conjunción temporal.
- source_word: ἐκ σφονδύλων
  english_pob_choice: from his vertebrae
  chosen_spanish: desde las vértebras
  alternatives_spanish:
  - de las vértebras
  - de las articulaciones
  lexicon: LSJ
  rationale: El griego admite el valor anatómico de σφόνδυλος, y el contexto de descoyuntamiento favorece una referencia corporal concreta. 'Desde las vértebras' sigue de cerca la revisión inglesa más reciente y evita decidir prematuramente por la imagen de la rueda si el texto apunta primariamente a la desarticulación del cuerpo.
- source_word: ἐκμελιζόμενος
  english_pob_choice: being dislocated
  chosen_spanish: era dislocado
  alternatives_spanish:
  - era descoyuntado
  - era arrancado de sus junturas
  lexicon: LSJ
  rationale: '''Dislocado'' comunica la violencia en las articulaciones sin exagerar hasta ''dismembered''. En español, ''era dislocado'' preserva el carácter pasivo y físico del participio griego.'
- source_word: ἔωρα
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - veía
  - observó
  lexicon: LSJ
  rationale: El imperfecto narrativo se traduce naturalmente como pasado simple en español. 'Vio' conserva el testimonio visual directo del texto.
- source_word: τὰς ἑαυτοῦ σάρκας
  english_pob_choice: his own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - sus propias carnes
  - su propia carne
  lexicon: LSJ
  rationale: σάρξ aquí es literal y debe mantenerse como 'carne' para preservar la concreción visceral. 'Su propia carne' es la forma más natural en español y evita diluir el impacto corporal.
- source_word: περιλακιζομένας
  english_pob_choice: being torn all around
  chosen_spanish: era desgarrada por todas partes
  alternatives_spanish:
  - era rasgada por todas partes
  - era lacerada por todos lados
  lexicon: LSJ
  rationale: El prefijo περι- exige una idea de acción alrededor de todo el cuerpo. 'Por todas partes' reproduce bien ese alcance total y 'desgarrada' transmite una violencia suficientemente fuerte para el contexto martirial.
- source_word: κατὰ σπλάγχνον
  english_pob_choice: down his inward parts
  chosen_spanish: por sus entrañas
  alternatives_spanish:
  - por sus partes internas
  - por sus vísceras
  lexicon: LSJ
  rationale: σπλάγχνον designa las entrañas o vísceras. 'Entrañas' es la opción española más vívida y bíblicamente reconocible, y mantiene la imaginería corporal sin tecnicismo excesivo.
- source_word: σταγόνας αἵματος ἀπορρεούσας
  english_pob_choice: drops of blood flowing down
  chosen_spanish: gotas de sangre corrían
  alternatives_spanish:
  - gotas de sangre se derramaban
  - gotas de sangre fluían
  lexicon: LSJ
  rationale: La imagen es de sangre visible que desciende desde el cuerpo herido. 'Corrían' es idiomático en español para líquidos que bajan o se deslizan, y preserva el movimiento del participio griego.
theological_decisions:
- issue: Imágenes de tortura corporal y martirio
  english_pob_reading: The English draft preserves the brutal physicality of the scene without softening the violence.
  chosen_spanish_reading: La traducción española mantiene la crudeza corporal del pasaje sin atenuarla.
  alternative_spanish_readings:
  - atenuar el lenguaje para hacerlo más devocional
  - describir la escena de forma menos vívida
  rationale: El texto es narrativamente brutal y el español debe reflejar esa crudeza. Suavizarlo borraría parte del testimonio martirial que el griego presenta con claridad.
  doctrine_reference: Martirio y perseverancia bajo sufrimiento; fidelidad al testimonio textual sin eufemismo.
- issue: Relación de ἐκ σφονδύλων con vértebras/junturas o instrumento de tortura
  english_pob_reading: The English audit notes that the phrase may point more directly to bodily joints than to the torture wheel itself.
  chosen_spanish_reading: Se conserva 'desde las vértebras' en vez de fijar la imagen de la rueda como única posibilidad.
  alternative_spanish_readings:
  - en la rueda
  - de la rueda
  rationale: La evidencia lexicográfica no obliga a una sola imagen. Mantener 'vértebras' deja abierta la tensión documentada entre el sentido anatómico y el posible trasfondo de un aparato de tortura.
  doctrine_reference: Principio de prudencia exegética y retención de ambigüedad léxica cuando el texto lo exige.
translation_notes:
  revision_awareness: 'El inglés audit trail fue revisado varias veces: primero con una lectura más libre de la escena, luego corrigiendo el sujeto de ἔωρα a ''he saw'', y finalmente volviendo más literal περὶ ὃν y ἐκ σφονδύλων. La versión española sigue la revisión más reciente, pero conserva la ambigüedad documentada entre una referencia al aparato de tortura y una referencia anatómica a las vértebras.'
  spanish_consistency_notes:
  - Se usa 'carne' para σάρξ, no 'cuerpo', porque el griego es literal y concreto.
  - '''Entrañas'' se emplea para σπλάγχνον por su fuerza corporal y su registro bíblico natural en español.'
  - No se introduce 'Cristo', 'Señor' ni otros términos no presentes en el verso.
  - La puntuación mantiene una sola cláusula amplia para reflejar el flujo descriptivo del original griego.
