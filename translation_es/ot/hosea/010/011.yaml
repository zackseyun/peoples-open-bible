base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/011.yaml
  text: Ephraim was a trained heifer that loved to thresh[a], and I spared her fair neck. I will harness Ephraim; Judah will plow[c][b]; Jacob will harrow for him.
  footnotes:
  - marker: a
    text: Or, 'but I passed over her lovely neck.' The Hebrew of this clause is difficult; the main text reflects the sense that Ephraim had previously been spared the heavier burden.
    reason: alternative_reading
  - marker: b
    text: Or, 'I will harness Ephraim.' Literally, 'I will cause Ephraim to ride,' likely an idiom for putting the animal under harness or yoke.
    reason: lexical_alternative
  - marker: c
    text: '''Harrow'' refers to breaking up and smoothing the soil after plowing; alternatively, ''break up the clods.'''
    reason: cultural_note
