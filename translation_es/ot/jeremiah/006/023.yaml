translation:
  language: es
  text: Empuñan arco y jabalina; son crueles y no tienen compasión. Su estruendo brama como el mar, y cabalgan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dispuestos como un solo hombre para la batalla». El singular hebreo כְאִישׁ puede entenderse como una comparación guerrera («como un hombre») o como énfasis en una formación unida («como un solo hombre»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  english_pob_choice: bow
  chosen_spanish: arco
  alternatives_spanish:
  - arcos
  lexicon: HALOT
  rationale: En un contexto militar, קֶשֶׁת nombra el arma de tiro. En español, 'arco' es el equivalente natural y transparente; el plural no es necesario por el valor colectivo del sustantivo en la escena.
- source_word: כִידוֹן
  english_pob_choice: javelin
  chosen_spanish: jabalina
  alternatives_spanish:
  - lanza
  - venablo
  lexicon: HALOT
  rationale: כִידוֹן designa un arma arrojadiza o de asta ligera. 'Jabalina' conserva la distinción armamentística sin volverlo un término demasiado genérico como 'lanza'.
- source_word: יַחֲזִיקוּ
  english_pob_choice: seize
  chosen_spanish: empuñan
  alternatives_spanish:
  - agarran
  - toman
  - sujetan
  lexicon: HALOT
  rationale: El verbo expresa tomar/aferrar armas para usarlas. 'Empuñan' comunica bien la acción militar en español y evita una literalidad torpe.
- source_word: אַכְזָרִי הוּא
  english_pob_choice: they are cruel
  chosen_spanish: son crueles
  alternatives_spanish:
  - es cruel
  - son despiadados
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con הוּא, el referente colectivo son los invasores descritos por los verbos plurales. En español, el plural es la forma natural y mantiene la referencia colectiva.
- source_word: וְלֹא יְרַחֵמוּ
  english_pob_choice: and show no mercy
  chosen_spanish: y no tienen compasión
  alternatives_spanish:
  - y no muestran misericordia
  - y no se apiadan
  lexicon: HALOT
  rationale: רחם en piel expresa compasión/misericordia. 'No tienen compasión' reproduce con claridad el sentido en un oráculo de guerra; 'misericordia' también sería posible, pero 'compasión' es más idiomático aquí.
- source_word: קוֹלָם
  english_pob_choice: their sound
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su ruido
  lexicon: HALOT
  rationale: קוֹל puede ser voz, sonido o ruido. En paralelo con el mar que brama, 'voz' mantiene la personificación sonora del ejército, aunque 'sonido' sería más neutro.
- source_word: כַּיָּם יֶהֱמֶה
  english_pob_choice: roars like the sea
  chosen_spanish: brama como el mar
  alternatives_spanish:
  - ruge como el mar
  - retumba como el mar
  lexicon: HALOT
  rationale: המה describe un estruendo tumultuoso. 'Brama' transmite bien el ruido potente y continuo del mar, con una carga poética adecuada.
- source_word: וְעַל סוּסִים יִרְכָּבוּ
  english_pob_choice: and they ride on horses
  chosen_spanish: y montan sobre caballos
  alternatives_spanish:
  - y cabalgan sobre caballos
  - y van a caballo
  lexicon: HALOT
  rationale: El hebreo presenta montar caballos de guerra. 'Montan sobre caballos' conserva la imagen y resulta natural en español.
- source_word: עָרוּךְ
  english_pob_choice: arrayed
  chosen_spanish: dispuestos
  alternatives_spanish:
  - dispuestos en orden
  - alineados
  - preparados
  lexicon: HALOT
  rationale: En lenguaje militar, ערוך expresa estar ordenado/dispue sto para combate. 'Dispuestos' mantiene la idea de formación sin introducir una imagen demasiado técnica.
- source_word: כְאִישׁ
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como uno solo
  - como un guerrero
  lexicon: HALOT
  rationale: Se conserva la comparación singular del hebreo. 'Como un hombre' deja abierta la tensión documentada entre comparación a un hombre y la posible idea de unidad ('como un solo hombre').
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: '''Batalla'' es la forma más natural en español moderno para este contexto bélico puntual; mantiene el carácter militar sin endurecer el estilo.'
- source_word: עָלַיִךְ בַּת צִיּוֹן
  english_pob_choice: against you, daughter Zion
  chosen_spanish: contra ti, hija de Sion
  alternatives_spanish:
  - contra ti, hija de Sion
  - contra ti, hija de Sion
  lexicon: HALOT
  rationale: La dirección hostil 'contra ti' conserva עָלַיִךְ. 'Hija de Sion' traduce la personificación poética de la ciudad en forma transparente y reverente; se prefiere 'Sion' como forma habitual en español bíblico.
theological_decisions:
- issue: Personificación de Sion como 'hija'
  english_pob_reading: daughter Zion
  chosen_spanish_reading: hija de Sion
  alternative_spanish_readings:
  - hija Sion
  - hija de la Sion
  rationale: El texto no introduce una categoría doctrinal, sino una figura poética para Jerusalén/Sion. 'Hija de Sion' mantiene la personificación y evita suavizarla con una paráfrasis explicativa.
  doctrine_reference: Poética profética; consistencia terminológica con nombres propios bíblicos
- issue: Singular hebreo אַכְזָרִי הוּא frente a referencia colectiva
  english_pob_reading: they are cruel
  chosen_spanish_reading: son crueles
  alternative_spanish_readings:
  - es cruel
  - son despiadados
  rationale: La morfología singular se conserva implícitamente en la observación exegética, pero el referente sintáctico del verso es el grupo armado. En español, el plural evita una discordancia que oscurecería el sentido.
  doctrine_reference: Gramática del discurso profético; claridad semántica sin borrar la tensión morfológica
- issue: Ambigüedad de כְאִישׁ
  english_pob_reading: like a man / like one man
  chosen_spanish_reading: como un hombre
  alternative_spanish_readings:
  - como uno solo
  - como un solo hombre
  rationale: Se mantiene la lectura principal literal en el texto. La posibilidad colectiva queda preservada en la nota, porque el hebreo admite tanto comparación individual como unidad de formación.
  doctrine_reference: Nota exegética/poética; respeto a la ambigüedad del original
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo las principales decisiones léxicas: armas distintas, tono bélico intenso, קול como voz/sonido colectivo, y la ambigüedad de כְאִישׁ. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'Sion' como forma bíblica usual en español, no 'Zion'.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni un caso de κύριος equivalente.
  - '''Hija de Sion'' conserva la personificación poética sin explicarla en el texto principal.'
  - La nota[a] reproduce la alternativa documentada del inglés POB para כְאִישׁ.
