review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual del hebreo: salida al altar, expiación por él, toma de sangre del toro y del macho cabrío, y colocación en los cuernos del altar. También respeta correctamente «Yahvé» para יְהוָה y conserva en nota la alternativa de purificación para כפר. Sin embargo, la cláusula final «sobre los cuernos del altar alrededor» suena poco natural en español y no expresa con suficiente claridad el valor adverbial de סָבִיב = ‘por todos lados / todo alrededor’.'
  spanish_quality_summary: 'El español es claro y digno en general. «Entonces saldrá… hará expiación por él» es aceptable y fiel. «Macho cabrío» es una precisión legítima para שָׂעִיר. La principal mejora necesaria es estilística-semántica en la última frase: conviene decir «en todo alrededor» o «por todo alrededor» del altar para evitar una construcción forzada. También resulta un poco más natural en español ritual «tomará parte de la sangre…» que el mero «tomará de la sangre…», aunque esto no es un error grave.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; כפר conservado como «hará expiación» con nota alternativa de purificación; animales sacrificiales rendidos de forma comprensible. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: La expresión «la pondrá sobre los cuernos del altar alrededor» es torpe y poco idiomática.
    rationale: סָבִיב modifica la acción/localización con sentido de ‘all around’. En español, dejar «alrededor» al final sin complemento produce una frase extraña. Una forma más fiel y natural es «en todo alrededor» o «por todo alrededor».
  - severity: low
    issue: «Tomará de la sangre…» es entendible, pero el valor partitivo puede expresarse con mayor claridad.
    rationale: El hebreo repetido מִן con דָּם es partitivo. «Tomará parte de la sangre del toro y parte de la sangre del macho cabrío» suena más natural y explícito en español, aunque la redacción actual no desfigura el sentido.
  revised_spanish_text: Entonces saldrá al altar que está delante de Yahvé y hará expiación por él[a]; tomará parte de la sangre del toro y parte de la sangre del macho cabrío, y la pondrá sobre los cuernos del altar por todo alrededor.
  revised_footnotes:
  - marker: a
    text: O «lo purifique»; el verbo hebreo puede llevar, en contextos rituales sacerdotales, un matiz de purificación.
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad global del borrador, pero se corrige la frase final para un español más natural y una representación más clara de סָבִיב. También se explicita levemente el sentido partitivo de מִן con «parte de la sangre», en línea con la decisión inglesa auditada.
