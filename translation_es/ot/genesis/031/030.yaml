translation:
  language: es
  text: Y ahora[a], de veras te has ido, porque anhelabas profundamente la casa de tu padre. ¿Por qué robaste mis dioses?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis dioses domésticos». El hebreo aquí dice simplemente «mis dioses», pero en el contexto se refiere a los ídolos domésticos de Labán.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva del ו conectivo junto con el adverbio temporal. En español, «Y ahora» mantiene el enlace con la acusación anterior sin sonar artificial.
- source_word: הָלֹךְ הָלַכְתָּ
  english_pob_choice: you have indeed gone away
  chosen_spanish: has ido de verdad
  alternatives_spanish:
  - has ciertamente ido
  - te has ido de verdad
  - has ido realmente
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más verbo finito expresa énfasis. «Has ido de verdad» comunica el hecho consumado y el relieve enfático en un español natural, sin añadir matices que no están en el hebreo.
- source_word: נִכְסֹף נִכְסַפְתָּה
  english_pob_choice: you longed greatly
  chosen_spanish: anhelaste con gran intensidad
  alternatives_spanish:
  - anhelaste mucho
  - sentiste un gran anhelo
  - deseaste con intensidad
  lexicon: HALOT
  rationale: El verbo denota fuerte anhelo; la repetición intensificadora se refleja con una frase adverbial que conserva el peso emocional. Se evita «homesick» por ser demasiado idiomático y menos transparente al hebreo.
- source_word: לְבֵית אָבִיךָ
  english_pob_choice: for your father's house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - la casa paterna
  - el hogar de tu padre
  - la casa de tu padre
  lexicon: HALOT
  rationale: «Casa de tu padre» reproduce el sintagma literal y su carga familiar/ancestral. En español se omite la preposición de finalidad porque el contexto ya la exige por el verbo «anhelar».
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Con qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español para introducir la acusación de Laban.
- source_word: גָנַבְתָּ
  english_pob_choice: did you steal
  chosen_spanish: robaste
  alternatives_spanish:
  - has robado
  - hurtaste
  lexicon: HALOT
  rationale: «Robar» es el verbo español más natural para la acción de tomar en secreto lo que pertenece a otro. Mantiene el tono acusatorio y la fuerza del hebreo sin sobrecargar el estilo.
- source_word: אֶת אֱלֹהָי
  english_pob_choice: my gods
  chosen_spanish: mis dioses
  alternatives_spanish:
  - mis dioses domésticos
  - mis ídolos domésticos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mis dioses»; se preserva esa forma en el texto principal. No se importa «domésticos» al cuerpo del versículo porque el sustantivo específico no aparece aquí, aunque el contexto narrativo aclara el referente.
theological_decisions:
- issue: Referencia de אֱלֹהָי en boca de Laban
  english_pob_reading: my gods
  chosen_spanish_reading: mis dioses
  alternative_spanish_readings:
  - mis dioses domésticos
  - mis ídolos domésticos
  rationale: La forma hebrea es plural con sufijo de primera persona y, por sí sola, significa «mis dioses». El contexto inmediato muestra que se trata de los ídolos domésticos de Laban, pero esa precisión se deja para nota y no se inserta en el texto principal para respetar la evidencia léxica.
  doctrine_reference: Principio de primacía del texto fuente y conservación de la aclaración contextual en nota, no en el cuerpo del versículo.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con la misma estructura de intensificación verbal y conserva la ambigüedad léxica de אֱלֹהָי en el cuerpo del texto, tal como muestra el auditorial inglés. No se requieren revisiones respecto del pase más reciente, que quedó sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה en otros contextos, pero este versículo no contiene el nombre divino.
  - Se mantiene «dioses» en plural, sin singularizar ni sustituir por «ídolos» en el texto principal.
  - La intensificación del hebreo se refleja con «de verdad» y «con gran intensidad» en lugar de una simple repetición literal.
  - Se evita una traducción demasiado eclesiástica; el tono es narrativo y acusatorio, acorde con el habla de Labán.
