  text: וְ/גַ֨ם אֲנִ֔י לֹא תָח֥וֹס עֵינִ֖/י וְ/לֹ֣א אֶחְמֹ֑ל דַּרְכָּ֖/ם בְּ/רֹאשָׁ֥/ם נָתָֽתִּי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/009/010.yaml
  text: And as for me[a], my eye will not spare, nor will I show pity[b]; I have brought their way upon their heads.
  footnotes:
  - marker: a
    text: Or 'their conduct.' Hebrew 'their way' is an idiom for one's manner of life or behavior.
    reason: lexical_alternative
  - marker: b
    text: '''Upon their heads'' is a Hebrew expression for recompense returning on the guilty.'
    reason: cultural_note
