translation:
  language: es
  text: Bendigan al Señor[a], escarcha y frío; canten himnos y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Alaben al Señor, escarcha y frío.’ El imperativo griego εὐλογεῖτε puede traducirse como ‘bendigan’ o, de manera más general, ‘alaben’; se mantiene ‘bendigan’ para conservar el refrán del canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendecid/pregonad bien de
  lexicon: BDAG
  rationale: Conserva el imperativo litúrgico de la estrofa y reproduce el valor de ‘bless’ como fórmula de alabanza, sin reducirlo solo a ‘alabar’.
- source_word: ῥῖγος
  english_pob_choice: frost
  chosen_spanish: escarcha
  alternatives_spanish:
  - frost
  - hielo
  - frío
  lexicon: LSJ
  rationale: El griego distingue este término de ψῦχος; ‘escarcha’ ayuda a mantener esa diferenciación en español, como ‘frost’ lo hace en inglés.
- source_word: ψῦχος
  english_pob_choice: cold
  chosen_spanish: frío
  alternatives_spanish:
  - frialdad
  - frío intenso
  - helor
  lexicon: LSJ
  rationale: Es el equivalente natural y claro de la segunda noción de frío; junto con ‘escarcha’ evita colapsar los dos términos griegos en una sola idea.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: BDAG
  rationale: Se conserva la traducción reverencial de κύριος como ‘Señor’, siguiendo la práctica del POB para este contexto doxológico.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: cantad himnos
  alternatives_spanish:
  - cantad alabanzas
  - entonad himnos
  lexicon: BDAG
  rationale: ‘Cantad himnos’ reproduce el matiz musical explícito del verbo mejor que un simple ‘alabad’.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo altamente
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en extremo
  lexicon: BDAG
  rationale: Mantiene el intensificador del compuesto griego y conserva la relación directa con el objeto ‘lo’/‘él’.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre átono es lo más natural en español después del verbo transitivo ‘exaltad’.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: ‘Por siempre’ expresa de forma natural la perpetuidad doxológica del giro idiomático griego.
theological_decisions:
- issue: κύριος en un himno de alabanza dentro de la tradición griega deuterocanónica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: Aquí el POB inglés usa la forma reverencial tradicional ‘the Lord’; en español ‘el Señor’ comunica esa misma función litúrgica sin perder la referencia al título divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Si conviene conservar la duplicación poética de dos términos de frío
  english_pob_reading: frost and cold
  chosen_spanish_reading: escarcha y frío
  alternative_spanish_readings:
  - frío y frío
  - helada y frío
  rationale: El griego pone dos sustantivos distintos, y la traducción debe preservar esa tensión poética en vez de unificarlos.
  doctrine_reference: Lexical distinction in the source text
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios sustanciales; la principal decisión en español fue conservar la distinción poética entre los dos términos de frío y mantener la fórmula litúrgica de bendición.
  spanish_consistency_notes:
  - Se usa ‘Señor’ para κύριος, conforme al equivalente reverencial del proyecto en este contexto.
  - Se conserva un paralelismo breve y doxológico, con verbo inicial en plural imperativo y cierre temporal ‘por siempre’.
  - ‘Escarcha y frío’ preserva mejor la duplicación semántica que una sola palabra genérica.
