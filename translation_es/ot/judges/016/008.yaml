review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo: los dirigentes filisteos proveen a Dalila siete יְתָרִים y ella ata a Sansón con ellos. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro POB: (1) וַיַּעֲלוּ לָהּ se refleja mejor como ''trajeron/le llevaron'' que como ''subieron a ella'', que en español resulta poco natural y oscurece el acto de entrega; (2) לַחִים significa ''frescos/húmedos'', no ''nuevos''. Además, el pie de nota [a] quedó anclado a ''arco'' cuando en realidad comenta el cargo de סַרְנֵי.'
  spanish_quality_summary: El texto es legible, pero 'subieron a ella' suena forzado en español y 'cuerdas nuevas de arco' pierde el matiz de material no seco. 'Ató' funciona, aunque 'lo ató con ellas' puede elevarse ligeramente a 'lo ató con ellas' sin problema; el registro ya es aceptable. Hace falta reubicar la nota al término que realmente explica.
  glossary_alignment: No hay términos teológicos mayores en juego. La decisión 'jefes filisteos' es defendible para סַרְנֵי פְלִשְׁתִּים, aunque 'gobernantes' o 'dirigentes' también servirían. La principal corrección léxica es לַחִים -> 'frescas' o 'húmedas', no 'nuevas'. También conviene mantener יְתָרִים como 'cuerdas de arco' para seguir la decisión POB 'bowstrings'.
  issues:
  - severity: high
    issue: '''subieron a ella'' es una reproducción demasiado literal de וַיַּעֲלוּ לָהּ y suena antinatural en español.'
    rationale: Aunque עלה contiene la idea de 'subir', en este contexto narrativo el sentido es que los jefes le llevaron/proveyeron los materiales a Dalila. 'Subieron a ella' no es español natural y dificulta la comprensión.
  - severity: high
    issue: '''nuevas'' no representa bien לַחִים.'
    rationale: El hebreo describe cuerdas frescas/húmedas, reforzado por 'que no habían sido secadas'. 'Nuevas' cambia el matiz semántico de humedad/no secado por novedad.
  - severity: medium
    issue: La nota [a] está anclada a 'arco' pero explica 'jefes'.
    rationale: Los marcadores deben aparecer en el término relevante. Tal como está, el lector asociará la nota con 'arco' en vez de con el cargo filisteo.
  revised_spanish_text: Así que los jefes[a] filisteos le trajeron siete cuerdas frescas de arco que no habían sido secadas, y ella lo ató con ellas.
  revised_footnotes:
  - marker: a
    text: «Jefes» traduce el cargo de los dirigentes filisteos; el hebreo también puede entenderse como «príncipes» o «señores», pero «jefes» evita un matiz demasiado aristocrático y comunica mejor la función oficial.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a un español natural que preserve el sentido de provisión/entrega; se corrige לַחִים a 'frescas' para reflejar el contraste con 'no habían sido secadas'; y se reubica la nota al término que realmente comenta. Se mantiene 'jefes filisteos' y 'cuerdas de arco' como opciones fieles y legibles.
