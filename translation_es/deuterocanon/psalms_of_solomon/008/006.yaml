review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἐφοβήθη ἡ καρδία μου = «mi corazón tuvo miedo»/«temió» y ἐταράχθη τὰ ὀστᾶ μου = «mis huesos fueron sacudidos». También conserva la comparación ὡς λίνον con «como lino». Sin embargo, una nota introduce el anglicismo «flax», impropio en español, y la nota sobre λίνον es internamente confusa porque dice «como flax» pero luego «con más literalidad “como lino”», cuando el texto principal ya usa «lino».'
  spanish_quality_summary: 'El español principal es natural y digno. «Mi corazón tuvo miedo; mis huesos fueron sacudidos como lino» es legible y fiel. La principal deficiencia está en las notas: «flax» no pertenece al español meta, y conviene explicar mejor la ambigüedad de λίνον en español entre la fibra/planta y el lino como material. También es preferible armonizar la nota de ἐταράχθη con la revisión inglesa, dejando «agitados» o «turbados» como alternativas a «sacudidos».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección de «corazón», «huesos» y «lino» está alineada con el razonamiento léxico documentado. La excepción necesaria es evitar el préstamo inglés «flax» en notas españolas; debe explicarse como «fibra de lino» o equivalente.
  issues:
  - severity: medium
    issue: La nota [c] usa el anglicismo «flax».
    rationale: El proyecto exige español natural y legible. «Flax» no es español y rompe la calidad del aparato crítico.
  - severity: medium
    issue: La nota [c] explica de manera confusa la literalidad de λίνον.
    rationale: Dice «como flax» y luego «el griego dice con más literalidad “como lino”», aunque el texto principal ya dice «como lino». La nota debe aclarar que el término puede referirse a la planta/fibra de lino o al material.
  - severity: low
    issue: La nota [b] podría expresarse con mejor español.
    rationale: «Turbados/agitados» con barra es aceptable, pero una formulación más cuidada mejora la legibilidad del aparato sin cambiar el sentido.
  revised_spanish_text: Mi corazón tuvo miedo[a]; mis huesos fueron sacudidos como lino[b][c].
  revised_footnotes:
  - marker: a
    text: 'O: «mi corazón temió».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis huesos fueron agitados» o «fueron turbados».'
    reason: lexical_alternative
  - marker: c
    text: 'El griego puede referirse al lino como fibra o material. La imagen es difícil; aquí se conserva la comparación más literal: «como lino».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrigen únicamente las notas para eliminar el anglicismo «flax» y aclarar mejor el valor de λίνον en español.
