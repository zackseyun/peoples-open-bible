base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/006/010.yaml
  text: 'So the men did so: they took two milk cows and harnessed them to the cart[b][a], and shut up their calves in the house.'
  footnotes:
  - marker: a
    text: Or 'two nursing cows.' The Hebrew describes cows that were giving milk and had calves.
    reason: lexical_alternative
  - marker: b
    text: Or 'confined their calves in the house.' The Hebrew literally says 'their sons' for the cows' young, that is, their calves.
    reason: lexical_alternative
