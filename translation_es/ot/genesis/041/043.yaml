translation:
  language: es
  text: 'Lo hizo montar en el segundo carro que tenía, y pregonaron delante de él: «¡Abrek![a]», y lo puso sobre toda la tierra de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Abrek» reproduce un término difícil de significado incierto, posiblemente una aclamación egipcia o hebrea. Muchos lo entienden como algo semejante a «¡Doblen la rodilla!».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְכֵּב
  english_pob_choice: He had him ride
  chosen_spanish: Lo hizo montar
  alternatives_spanish:
  - Lo hizo subir al carro
  - Lo hizo ir montado
  lexicon: HALOT
  rationale: El hifil expresa causación; en español, «lo hizo montar» comunica bien la acción causativa sin sonar mecánico.
- source_word: בְּמִרְכֶּבֶת הַמִּשְׁנֶה אֲשֶׁר־לוֹ
  english_pob_choice: in the second chariot that he had
  chosen_spanish: en el segundo carro que tenía
  alternatives_spanish:
  - en su segundo carro
  - en el carro de segundo rango que tenía
  lexicon: HALOT
  rationale: מִשְׁנֶה señala segundo rango o segundo lugar; «segundo carro que tenía» conserva la relación posesiva y el matiz de rango.
- source_word: וַיִּקְרְאוּ לְפָנָיו
  english_pob_choice: and they cried out before him
  chosen_spanish: y pregonaron delante de él
  alternatives_spanish:
  - y clamaron delante de él
  - y proclamaron delante de él
  lexicon: HALOT
  rationale: Aquí קרא es un anuncio público en el contexto de una procesión; «pregonaron» refleja bien el acto solemne y público.
- source_word: אַבְרֵךְ
  english_pob_choice: Abrek
  chosen_spanish: Abrec
  alternatives_spanish:
  - Abrek
  - ¡Doblen la rodilla!
  lexicon: HALOT
  rationale: El término es oscuro y probablemente un aclamación técnica; se conserva como transliteración, ajustada a una forma española legible, y se deja la posible interpretación en nota.
- source_word: וְנָתוֹן אֹתוֹ
  english_pob_choice: And he set him
  chosen_spanish: Y lo puso
  alternatives_spanish:
  - Y lo estableció
  - Y lo nombró
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto más verbo finito funciona de manera consecutiva; «lo puso» es breve y natural en español, manteniendo la idea de asignación de autoridad.
- source_word: עַל כָּל אֶרֶץ מִצְרָיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - sobre todo el país de Egipto
  - sobre toda la tierra egipcia
  lexicon: HALOT
  rationale: «Tierra» conserva el valor territorial de אֶרֶץ y «sobre» mantiene la noción de autoridad sobre el territorio.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término oscuro que explica la nota. Se mantuvo la revisión del conector consecutivo («Y») para reflejar mejor la conjunción hebrea y el registro formal.
  spanish_consistency_notes:
  - Se prefirió «tierra de Egipto» para conservar el matiz territorial de אֶרֶץ.
  - Se evitó «SEÑOR» u այլ masking porque el versículo no contiene el nombre divino.
  - Se mantuvo una transliteración para אַבְרֵךְ debido a su incertidumbre léxica.
