translation:
  language: es
  text: 'Él llama a los cielos en lo alto y a la tierra[a], para juzgar a su pueblo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él convoca a los cielos en lo alto y a la tierra». El verbo puede tener el sentido de convocar, especialmente en un contexto judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְרָא
  english_pob_choice: He calls
  chosen_spanish: Él llama
  alternatives_spanish:
  - Él convoca
  - Él convoca a
  lexicon: HALOT
  rationale: El qal imperfecto 3ms de קרא puede significar 'llamar' o 'convocar'. En español, 'llama' conserva la fuerza verbal y la vividez del acto sin imponer demasiado la idea jurídica de 'citar'. En este contexto teofánico y judicial, 'convoca' también es posible, pero 'llama' mantiene mejor la sencillez y el paralelismo poético.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente con 'a' en español. 'Hacia' sería más interpretativo y menos directo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'the heavens', en español 'los cielos' es la forma más natural y mantiene el plural poético del hebreo. 'El cielo' reduciría innecesariamente el alcance cósmico.
- source_word: מֵעָל
  english_pob_choice: above
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - arriba
  - de arriba
  lexicon: HALOT
  rationale: El valor adverbial de מֵעָל se entiende bien como 'desde lo alto'. Esta solución conserva la idea de elevación sin forzar una construcción demasiado literal como 'desde arriba', que suena menos fluida en este verso.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y también a
  lexicon: HALOT
  rationale: La conjunción y la preposición se reflejan de forma directa con 'y a', manteniendo el paralelismo entre los dos destinatarios cósmicos.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En paralelo con 'los cielos', el hebreo apunta a la tierra como contraparte cósmica. 'La tierra' conserva ese contraste mejor que 'el mundo', que introduce una abstracción distinta.
- source_word: לָדִין
  english_pob_choice: that he may judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para que juzgue
  - a fin de juzgar
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito. En español, 'para juzgar' comunica de modo natural ese valor final sin añadir un sujeto explícito que el hebreo no formula aquí. Aunque 'para que juzgue' también es posible, 'para juzgar' es más compacto y poético.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo
  - a su gente
  lexicon: HALOT
  rationale: עם en contexto de pacto se traduce mejor como 'pueblo'. El posesivo 'su' conserva la relación de pertenencia/covenio. Se evita 'gente', que debilita la fuerza colectiva y relacional del término.
theological_decisions:
- issue: Sujeto implícito no explicitado en el verso
  english_pob_reading: The subject remains an unspecified masculine singular pronoun ('He'), referring contextually to God from the surrounding passage.
  chosen_spanish_reading: Se mantiene el sujeto implícito por el pronombre 'Él', referido contextualmente a Dios por el pasaje circundante.
  alternative_spanish_readings:
  - Dios llama a los cielos...
  - Él, es decir, Dios, llama a los cielos...
  rationale: El hebreo no nombra explícitamente al sujeto en este versículo. En español conviene mantener la referencia pronominal sin sobreexplicar dentro del texto principal. 'Él' preserva la continuidad discursiva; una explicitación con 'Dios' sería interpretativa y añadida.
  doctrine_reference: Primacía del texto original; no importar al versículo lo que el hebreo no dice explícitamente.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo. No hay revisiones aplicadas en la fuente inglesa reciente; la versión española sigue esa lectura estable, conservando el tono judicial-poético y la ambigüedad útil de קרא entre 'llamar' y 'convocar'.
  spanish_consistency_notes:
  - Se mantiene el paralelismo cósmico 'los cielos' / 'la tierra' para reflejar el hebreo plural y su alcance universal.
  - Se evita 'SEÑOR' y se no introduce el nombre divino porque este versículo no lo contiene explícitamente.
  - Se conserva el sujeto tácito/pronominal sin sustituirlo por 'Dios' en el texto principal.
  - La nota al pie marca la alternativa 'convoca' como matiz lexical, coherente con el audit trail inglés.
