translation:
  language: es
  text: Entonces la fortaleza[a] de Faraón será su vergüenza, y el refugio bajo la sombra de Egipto[b], su humillación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Entonces el refugio de Faraón será su vergüenza». El hebreo מָעוֹז también admite «refugio» o «fortaleza».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la sombra de Egipto», una metáfora de buscar protección en Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Then ... will become
  chosen_spanish: Entonces ... será
  alternatives_spanish:
  - y ... será
  - y llegará a ser
  lexicon: WLC / HALOT
  rationale: El waw consecutivo en este contexto profético introduce resultado. En español, «Entonces» conserva la progresión discursiva y «será» expresa el resultado sin forzar una perífrasis más pesada.
- source_word: לָכֶם
  english_pob_choice: your
  chosen_spanish: para ustedes
  alternatives_spanish:
  - de ustedes
  - a ustedes
  lexicon: WLC / HALOT
  rationale: La preposición con sufijo marca beneficio o perjuicio para los oyentes. En español, «para ustedes» comunica esa relación de manera natural y permite que el sustantivo siguiente mantenga su sentido de deshonra dirigida al pueblo.
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - refugio
  - baluarte
  - castillo
  lexicon: WLC / HALOT
  rationale: El término hebreo apunta a un lugar o medio de protección y fuerza. «Fortaleza» conserva la imagen concreta de defensa y se ajusta bien al paralelismo con «refugio» en la segunda cola.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: WLC / HALOT
  rationale: Se mantiene el título/nombre propio tradicional en español bíblico, con mayúscula, como equivalente natural de la transliteración inglesa.
- source_word: לְבֹשֶׁת
  english_pob_choice: your shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - para vergüenza
  - deshonra
  - vergüenza de ustedes
  lexicon: WLC / HALOT
  rationale: בֹּשֶׁת designa vergüenza o deshonra. Aquí se traduce con el sustantivo simple «vergüenza» para no duplicar de forma pesada el valor de לָכֶם, ya expresado por «para ustedes».
- source_word: וְהֶחָסוּת
  english_pob_choice: and refuge
  chosen_spanish: el refugio
  alternatives_spanish:
  - y el refugio
  - y el amparo
  lexicon: WLC / HALOT
  rationale: El hebreo presenta un sustantivo abstracto de refugio/protección. En español, «el refugio» es claro y conserva el contraste con la falsa seguridad denunciada por el profeta.
- source_word: בְּצֵל
  english_pob_choice: in ... shadow
  chosen_spanish: bajo la sombra
  alternatives_spanish:
  - en la sombra
  - a la sombra
  lexicon: WLC / HALOT
  rationale: La expresión hebrea es una metáfora de protección. «Bajo la sombra» comunica mejor la idea de amparo buscado que un literal «en la sombra».
- source_word: מִצְרַיִם
  english_pob_choice: Egypt’s
  chosen_spanish: de Egipto
  alternatives_spanish:
  - egipcia
  lexicon: WLC / HALOT
  rationale: Se conserva la relación genitiva de forma directa y natural en español.
- source_word: לִכְלִמָּה
  english_pob_choice: your humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - para humillación
  - deshonra
  - vergüenza
  lexicon: WLC / HALOT
  rationale: כְּלִמָּה expresa humillación, afrenta o deshonra. Se elige «humillación» para mantener la distinción semántica respecto de בֹּשֶׁת y reflejar el efecto final del paralelo hebreo.
theological_decisions:
- issue: Preservar la diferencia entre los dos sustantivos de vergüenza en el paralelismo
  english_pob_reading: Use 'shame' for בֹּשֶׁת and 'humiliation' for כְּלִמָּה
  chosen_spanish_reading: «vergüenza» para בֹּשֶׁת y «humillación» para כְּלִמָּה
  alternative_spanish_readings:
  - «deshonra» y «vergüenza»
  - usar «vergüenza» en ambos miembros
  rationale: El hebreo emplea dos términos relacionados pero no idénticos. Mantener una distinción en español reproduce mejor el paralelismo retórico y evita aplanar la intensidad del reproche.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que no introdujo cambios; la propuesta mantiene el acuerdo alto con el texto fuente y conserva la distinción léxica del hebreo en el paralelismo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «Faraón» como título propio, sin sustituirlo por una forma más interpretativa.
  - Se preserva la metáfora de sombra/protección sin suavizarla en una explicación del cuerpo del texto.
  - Se evita duplicar en exceso los términos de vergüenza; la primera cola usa «vergüenza» y la segunda «humillación» para reflejar el hebreo.
