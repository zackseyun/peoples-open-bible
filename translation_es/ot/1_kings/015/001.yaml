translation:
  language: es
  text: En el año decimoctavo del rey Jeroboam hijo de Nebat, Abijam[a] llegó a ser rey sobre Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Abijam»; el mismo rey es llamado «Abías» en otros pasajes.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  english_pob_choice: In the ... year
  chosen_spanish: En el año ...
  alternatives_spanish:
  - Y en el año ...
  - En el ... año ...
  lexicon: HALOT
  rationale: La fórmula cronológica hebrea se expresa de manera natural en español con 'En el año', preservando el sentido de datación regnal sin forzar el prefijo conjuntivo.
- source_word: שְׁמֹנֶה עֶשְׂרֵה
  english_pob_choice: eighteenth
  chosen_spanish: dieciocho
  alternatives_spanish:
  - decimoctavo
  - dieciochoavo
  lexicon: HALOT
  rationale: En español, dentro de una fórmula de fecha regnal, el cardinal es el giro más natural y fiel; el ordinal sería posible, pero menos idiomático aquí.
- source_word: לַ/מֶּלֶךְ יָרָבְעָם
  english_pob_choice: of King Jeroboam
  chosen_spanish: del rey Jeroboam
  alternatives_spanish:
  - del rey Jeroboam
  - en el reinado del rey Jeroboam
  lexicon: HALOT
  rationale: La relación genitiva del hebreo se refleja de forma directa con 'del rey Jeroboam'. 'En el reinado de' explicita la función cronológica, pero añade más interpretación que el hebreo inmediato.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nebat
  alternatives_spanish:
  - Jeroboam, hijo de Nebat
  - Jeroboam, el hijo de Nebat
  lexicon: HALOT
  rationale: Se conserva el patronímico de modo transparente con 'hijo de Nebat', sin introducir expansión innecesaria.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - comenzó a reinar
  - reinó
  lexicon: HALOT
  rationale: El verbo מלך en una fórmula de entronización marca acceso al trono. 'Llegó a ser rey' comunica bien ese momento de ascenso, manteniendo el matiz de inicio de reinado.
- source_word: אֲבִיָּם
  english_pob_choice: Abijam
  chosen_spanish: Abijam
  alternatives_spanish:
  - Abías
  lexicon: HALOT
  rationale: Se conserva la forma masorética del versículo, 'Abijam', como hace el texto base en inglés, porque el nombre en este pasaje es específico de la fuente.
- source_word: עַל יְהוּדָה
  english_pob_choice: over Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - sobre el reino de Judá
  - en Judá
  lexicon: HALOT
  rationale: '''Sobre Judá'' reproduce directamente el valor de עַל con מלך en un contexto de gobierno territorial.'
translation_notes:
  revision_awareness: El repaso más reciente indica que no hubo cambios necesarios y que la concordancia con la fuente y la traducción inglesa auditada es alta.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantiene 'Judá' con mayúscula como nombre propio territorial.
  - Se usa 'rey' y no 'reinar' en exceso para reflejar la fórmula de ascenso al trono sin añadir duración implícita.
