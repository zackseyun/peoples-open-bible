  yaml_path: translation/ot/ezekiel/007/026.yaml
  text: Disaster upon disaster will come[a], and rumor upon rumor will arise. They will seek a vision from a prophet, but instruction will perish from the priest[b], and counsel from the elders.
  footnotes:
