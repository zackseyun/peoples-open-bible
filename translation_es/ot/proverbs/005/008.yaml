translation:
  language: es
  text: Mantén tu camino lejos de ella[a], y no te acerques a la entrada de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mantente lejos de ella, y no te acerques al umbral de su casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְחֵק
  english_pob_choice: Keep ... far
  chosen_spanish: Mantén ... lejos
  alternatives_spanish:
  - Aléjate
  - Mantén ... apartado
  lexicon: HALOT
  rationale: El imperativo causativo pide mantener distancia; en español, «mantén... lejos» conserva la idea de sostener separación y suena natural con «tu camino» como objeto.
- source_word: מֵעָלֶיהָ
  english_pob_choice: from her
  chosen_spanish: de ella
  alternatives_spanish:
  - lejos de ella
  - apartado de ella
  lexicon: HALOT
  rationale: La preposición expresa separación respecto de su esfera. En español, «de ella» es breve y, junto con «lejos», mantiene el valor de distancia sin duplicar innecesariamente la idea.
- source_word: דַרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu curso
  lexicon: HALOT
  rationale: «Camino» preserva la metáfora hebrea de conducta o proceder, y es más idiomático que una traducción más abstracta en este contexto sapiencial.
- source_word: וְאַל תִּקְרַב
  english_pob_choice: and do not go near
  chosen_spanish: y no te acerques
  alternatives_spanish:
  - y no te aproximes
  - y no vayas cerca
  lexicon: HALOT
  rationale: La forma negativa expresa prohibición. «No te acerques» reproduce con naturalidad el movimiento hacia algo y es la opción más directa en español.
- source_word: אֶל פֶּתַח
  english_pob_choice: the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - al umbral de
  - a la puerta de
  lexicon: HALOT
  rationale: «Entrada» mantiene el sentido amplio de פֶּתַח como acceso o punto de ingreso, sin restringirlo únicamente a una puerta física.
- source_word: בֵּיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  lexicon: HALOT
  rationale: «Casa» conserva la referencia concreta y espacial del proverbio; «hogar» sería más interpretativo y menos preciso para este aviso de proximidad física.
translation_notes:
  revision_awareness: No se requirieron cambios recientes; el texto fuente y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas.
  spanish_consistency_notes:
  - Se preservó la metáfora de «camino» como conducta, en paralelo con el inglés POB «your way».
  - Se evitó «SEÑOR» o terminología teológica ajena, porque el versículo no contiene el nombre divino ni un término cristológico.
  - «Entrada» traduce פֶּתַח con amplitud suficiente para incluir umbral o acceso, coherente con la nota alternativa del POB en inglés.
