translation:
  language: es
  text: Y aun aparte de estas cosas[a], podían haber caído por un solo aliento, perseguidos por la justicia[b] y aventados por el aliento de tu poder; pero tú lo has dispuesto todo con medida, número y peso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un solo espíritu» o «por un solo viento»; πνεῦμα puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
  - marker: b
    text: O «perseguidos por el castigo» o «impulsados por el juicio»; δίκη puede denotar justicia, juicio o pena.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς δὲ τούτων
  english_pob_choice: even apart from these things
  chosen_spanish: aun aparte de estas cosas
  alternatives_spanish:
  - además de estas cosas
  - sin estas cosas
  lexicon: LSJ
  rationale: χωρίς con genitivo expresa separación o independencia; «aun aparte de estas cosas» conserva el contraste con lo ya mencionado y suena natural en español.
- source_word: ἐνὶ πνεύματι
  english_pob_choice: by one breath
  chosen_spanish: con un solo aliento
  alternatives_spanish:
  - con un solo espíritu
  - con un solo viento
  lexicon: LSJ
  rationale: πνεῦμα admite «aliento», «viento» o «espíritu». Aquí, el contexto de caída y acción destructiva favorece una imagen física; «aliento» mantiene la fuerza concreta sin imponer «Espíritu».
- source_word: πεσεῖν
  english_pob_choice: could have fallen
  chosen_spanish: podían haber caído
  alternatives_spanish:
  - habrían caído
  - podían caer
  lexicon: LSJ
  rationale: El infinitivo aoristo de πίπτω expresa la posibilidad de caer en sentido de destrucción o ruina. En español, «podían haber caído» comunica esa potencialidad sin sobreexplicarla.
- source_word: ὑπὸ τῆς δίκης διωχθέντες
  english_pob_choice: pursued by justice
  chosen_spanish: perseguidos por la justicia
  alternatives_spanish:
  - acosados por el juicio
  - impulsados por el castigo
  lexicon: LSJ
  rationale: δίκη puede significar justicia, juicio o castigo. «Justicia» conserva la personificación moral del término y sigue de cerca la lectura inglesa, sin reducirlo solamente a la pena.
- source_word: λικμηθέντες
  english_pob_choice: winnowed
  chosen_spanish: aventados
  alternatives_spanish:
  - aventaídos
  - zarandeados como paja
  lexicon: LSJ
  rationale: λικμάω describe separar o dispersar como con el aventado del grano. «Aventados» conserva la imagen agrícola y es comprensible en español bíblico contemporáneo.
- source_word: ὑπὸ πνεύματος δυνάμεώς σου
  english_pob_choice: by the breath of your power
  chosen_spanish: por el aliento de tu poder
  alternatives_spanish:
  - por el viento de tu poder
  - por tu poderoso espíritu
  lexicon: LSJ
  rationale: Se mantiene el mismo campo semántico de πνεῦμα como «aliento» y se deja δυνάμεως σου como «de tu poder». «Aliento» evita forzar una lectura pneumatológica más personal que el texto no exige.
- source_word: ἀλλὰ πάντα
  english_pob_choice: but you have arranged all things
  chosen_spanish: pero tú lo has dispuesto todo
  alternatives_spanish:
  - pero has ordenado todas las cosas
  - pero has establecido todo
  lexicon: LSJ
  rationale: διέταξας significa ordenar, disponer, distribuir o asignar. «Lo has dispuesto todo» es fluido en español y mantiene el sentido de orden intencional.
- source_word: μέτρῳ καὶ ἀριθμῷ καὶ σταθμῷ
  english_pob_choice: by measure and number and weight
  chosen_spanish: con medida, número y peso
  alternatives_spanish:
  - según medida, número y peso
  - con medida, cuenta y peso
  lexicon: LSJ
  rationale: La tríada se conserva literal y solemne. «Peso» refleja bien σταθμῷ; se prefiere «con» para una construcción natural en español.
theological_decisions:
- issue: Cómo renderizar πνεῦμα en un pasaje donde puede significar aliento, viento o espíritu
  english_pob_reading: Rendered both occurrences as 'breath' in the main text
  chosen_spanish_reading: Ambas ocurrencias se traducen como «aliento» en el texto principal
  alternative_spanish_readings:
  - espíritu
  - viento
  rationale: El pasaje habla de caída, persecución y aventado, lo que favorece una fuerza concreta y dinámica. «Aliento» preserva la tensión entre lo físico y lo divino sin cerrar el sentido a «Espíritu» donde el griego no lo exige.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión léxica y teológica; primacía del original sobre la tradición de traducción.'
- issue: Cómo traducir δίκη en la frase ὑπὸ τῆς δίκης διωχθέντες
  english_pob_reading: pursued by justice
  chosen_spanish_reading: perseguidos por la justicia
  alternative_spanish_readings:
  - perseguidos por el juicio
  - perseguidos por el castigo
  rationale: «Justicia» mantiene la personificación moral del término y evita limitarlo solo al resultado punitivo. El contexto sí implica sanción, pero la palabra griega abarca más que «castigo».
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; conservar decisiones léxicas y tensiones significativas.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «one breath» frente a una formulación más libre. En español se reflejó esa precisión con «un solo aliento» y se mantuvo la imagen de acción devastadora mediante «aventados» y la tríada final ordenada.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - «Mesías/Cristo» no interviene en este versículo.
  - «Espíritu» no se usa en el texto principal para πνεῦμα porque el contexto favorece el valor concreto de «aliento».
  - La sintaxis busca ser publicable y fiel, sin depender de fórmulas eclesiásticas tradicionales cuando no son necesarias.
