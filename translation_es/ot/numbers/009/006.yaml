  rationale: Se ajusta «celebrar» a «guardar» para preservar mejor el sentido de observancia ritual documentado en el source audit trail. También se cambia «en aquel día» por «ese día» para un español más natural y ampliamente legible, sin alterar el sentido. Se mantiene la nota porque conserva una alternativa literal significativa del hebreo.
