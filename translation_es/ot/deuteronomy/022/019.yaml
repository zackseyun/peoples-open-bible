translation:
  language: es
  text: Entonces lo multarán con cien siclos de plata y los darán al padre de la joven, porque ha traído mala fama sobre una virgen de Israel. Y ella será su esposa; no podrá enviarla lejos[a] todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «divorciarla»; el hebreo dice literalmente «enviarla lejos», una expresión común para la separación matrimonial en contextos legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנְשׁוּ
  english_pob_choice: they shall fine
  chosen_spanish: lo multarán
  alternatives_spanish:
  - lo castigarán
  - le impondrán una multa
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo expresa una sanción monetaria. «Multarán» comunica mejor la fuerza legal que un castigo general, y mantiene la idea de una pena pecuniaria.
- source_word: מֵאָה כֶסֶף
  english_pob_choice: one hundred shekels of silver
  chosen_spanish: cien siclos de plata
  alternatives_spanish:
  - cien piezas de plata
  - cien de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cien plata», una abreviatura económica que en contexto legal se entiende como un peso monetario. «Siclos» explicita la unidad de medida sin apartarse del sentido. «Plata» conserva el material/valor monetario.
- source_word: לַאֲבִי הַנַּעֲרָה
  english_pob_choice: to the father of the young woman
  chosen_spanish: al padre de la joven
  alternatives_spanish:
  - al padre de la muchacha
  - al padre de la doncella
  lexicon: HALOT
  rationale: נַעֲרָה designa a una joven en edad casadera. «Joven» es natural en español moderno y evita el tono arcaico de «doncella», manteniendo la referencia a una mujer joven.
- source_word: כִּי הוֹצִיא שֵׁם רָע
  english_pob_choice: because he has brought a bad name
  chosen_spanish: porque ha puesto un mal nombre
  alternatives_spanish:
  - porque ha sacado un mal nombre
  - porque ha difamado
  - porque ha calumniado
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de «poner/sacar un mal nombre», que refleja la expresión idiomática de dañar la reputación. «Difamado» o «calumniado» son interpretaciones posibles, pero hacen más explícito de lo que el hebreo exige.
- source_word: עַל בְּתוּלַת יִשְׂרָאֵל
  english_pob_choice: upon a virgin of Israel
  chosen_spanish: sobre una virgen de Israel
  alternatives_spanish:
  - contra una virgen de Israel
  - sobre la virgen de Israel
  lexicon: HALOT
  rationale: «Virgen» corresponde al término legal de la acusación. «De Israel» conserva el marco comunitario y pactual. «Sobre» sigue de cerca la construcción idiomática del hebreo y del inglés POB.
- source_word: וְלֽוֹ תִהְיֶה לְאִשָּׁה
  english_pob_choice: And she shall be his wife
  chosen_spanish: Y ella será su esposa
  alternatives_spanish:
  - Y ella será mujer suya
  - Y ella llegará a ser su esposa
  lexicon: HALOT
  rationale: La cláusula expresa un estado legal resultante. «Esposa» es claro y digno en español contemporáneo, y reproduce el vínculo marital sin añadir matices que el hebreo no requiere.
- source_word: לֹא יוּכַל
  english_pob_choice: he may not
  chosen_spanish: no podrá
  alternatives_spanish:
  - no le será permitido
  - no puede
  lexicon: HALOT
  rationale: En contexto legal, la forma expresa prohibición o incapacidad jurídica. «No podrá» comunica esa restricción con naturalidad y sin perder el valor normativo.
- source_word: לְשַׁלְּחָהּ
  english_pob_choice: send her away
  chosen_spanish: despedirla
  alternatives_spanish:
  - enviarla lejos
  - repudiarla
  - divorciarse de ella
  lexicon: HALOT
  rationale: El hebreo literalmente dice «enviarla/lejos», y en el ámbito matrimonial funciona como fórmula de disolución conyugal. «Despedirla» conserva el verbo de separación sin imponer de inmediato el tecnicismo «divorciar», aunque esa sea una posible interpretación legal.
- source_word: כָּל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: en todos sus días
  alternatives_spanish:
  - todos sus días
  - para toda su vida
  lexicon: HALOT
  rationale: Es un hebraísmo temporal que indica duración de por vida. «En todos sus días» es literal y sobrio en español; mantiene la cadencia del original.
theological_decisions:
- issue: Despedir / divorciar en la ley matrimonial
  english_pob_reading: send her away
  chosen_spanish_reading: despedirla
  alternative_spanish_readings:
  - divorciarla
  - repudiarla
  rationale: El texto hebreo usa una fórmula de envío lejos que en ley matrimonial puede equivaler a divorcio. La traducción principal conserva la imagen verbal sin cerrar prematuramente la interpretación. Si se quisiera explicitar el efecto jurídico, «divorciarla» sería una alternativa válida, pero menos pegada al modo de hablar del hebreo.
  doctrine_reference: Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo y el audit trail inglés sin cambios sustantivos respecto del sentido: multa monetaria, pago al padre, difamación de una virgen de Israel, vínculo matrimonial obligatorio y prohibición de separación permanente. La única tensión lexical relevante es לְשַׁלְּחָהּ, que se conserva de forma idiomática en español con nota alternativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exige; aquí no aparece el nombre divino.
  - Se mantuvo «virgen» para בְּתוּלָה por tratarse de una formulación legal específica, no de una valoración devocional.
  - «Siclos de plata» explicita la moneda/unidad implicada por el hebreo económico sin alejarse del sentido jurídico.
  - «Despedirla» preserva la ambigüedad legal de la fórmula hebrea y evita introducir una interpretación más fuerte en el texto principal.
