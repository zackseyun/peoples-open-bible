revisions:
- from: El hijo de la mujer israelita blasfemó[a] el Nombre y maldijo, y lo llevaron a Moisés. Ahora el nombre de su madre era Selomit, hija de Dibri, de la tribu de Dan.
  to: El hijo de la mujer israelita pronunció distintamente[a] el Nombre y maldijo, y lo llevaron a Moisés. Su madre se llamaba Selomit hija de Dibri, de la tribu de Dan.
  rationale: Se ajusta נקב a «pronunció distintamente» para preservar mejor la secuencia de dos verbos del hebreo y armonizar el texto principal con la explicación léxica y teológica auditada. Además, se mejora la naturalidad del español con «Su madre se llamaba» y se alisa la puntuación del sintagma nominal final. No se requiere adjudicación adicional porque la reparación es local y está suficientemente sustentada por la evidencia ya documentada.
