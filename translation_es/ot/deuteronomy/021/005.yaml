translation:
  language: es
  text: Y los sacerdotes, los hijos de Leví, se presentarán, porque Yahvé tu Dios los ha escogido para ministrarle y para bendecir en el nombre de Yahvé; y por su palabra se resolverá todo pleito y toda lesión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda herida», «todo daño» o «toda aflicción». El término hebreo es más amplio que «agresión», pero en este contexto jurídico probablemente se refiere a casos de daño corporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְּשׁוּ
  english_pob_choice: shall come forward
  chosen_spanish: se presentarán
  alternatives_spanish:
  - se acercarán
  - comparecerán
  lexicon: HALOT
  rationale: El nifal de נגשׁ expresa aquí un acercamiento formal para una función oficial. «Se presentarán» comunica bien la comparecencia ritual/jurídica en español sin perder la idea de acercarse para actuar.
- source_word: הַכֹּהֲנִים בְּנֵי לֵוִי
  english_pob_choice: the priests, the sons of Levi
  chosen_spanish: los sacerdotes, los hijos de Leví
  alternatives_spanish:
  - los sacerdotes levitas
  - los sacerdotes, los levitas
  lexicon: HALOT
  rationale: Se conserva la aposición visible del hebreo. «Sacerdotes» traduce הַכֹּהֲנִים, y «los hijos de Leví» mantiene la estructura explicativa del texto fuente mejor que una simplificación como «levitas».
- source_word: כִּי בָם בָּחַר
  english_pob_choice: for ... has chosen them
  chosen_spanish: porque ... los ha escogido
  alternatives_spanish:
  - pues ... los escogió
  - porque ... los eligió
  lexicon: HALOT
  rationale: «Porque» expresa la razón de su autoridad, y el perfecto español «ha escogido» preserva el efecto permanente de la elección divina, acorde con el valor contextual del perfecto hebreo.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el SEÑOR tu Dios
  - Yahvé, tu Dios
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en lugar de un sustituto reverencial. «Tu Dios» conserva la fórmula de pacto del hebreo.'
- source_word: לְשָׁרְתוֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  - para ejercer su ministerio ante él
  lexicon: HALOT
  rationale: En contexto sacerdotal, שׁרת tiene una carga cultual. «Ministrarle» mantiene ese registro formal y sagrado mejor que el genérico «servirle».
- source_word: וּלְבָרֵךְ בְּשֵׁם יְהוָה
  english_pob_choice: and to bless in the name of Yahweh
  chosen_spanish: y para bendecir en el nombre de Yahvé
  alternatives_spanish:
  - y para bendecir con el nombre de Yahvé
  - y para pronunciar bendición en el nombre de Yahvé
  lexicon: HALOT
  rationale: La expresión refleja la bendición sacerdotal bajo autoridad divina. «En el nombre de Yahvé» sigue de cerca la preposición hebrea y su sentido de representación autorizada.
- source_word: וְעַל פִּיהֶם
  english_pob_choice: and by their word
  chosen_spanish: y por su palabra
  alternatives_spanish:
  - y según su decisión
  - y por su pronunciamiento
  lexicon: HALOT
  rationale: El idiomático «por su palabra» conserva la imagen de «sobre su boca» como pronunciamiento autoritativo, y suena natural en español jurídico.
- source_word: כָּל רִיב
  english_pob_choice: every dispute
  chosen_spanish: todo pleito
  alternatives_spanish:
  - toda disputa
  - todo caso
  - toda controversia
  lexicon: HALOT
  rationale: רִיב suele ser una disputa de carácter legal. «Pleito» mantiene bien el tono jurídico del pasaje y es comprensible en español contemporáneo.
- source_word: וְכָל נָגַע
  english_pob_choice: every injury
  chosen_spanish: toda lesión
  alternatives_spanish:
  - todo daño
  - toda herida
  - toda aflicción
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa que prefirió «injury» frente a una lectura más estrecha, «lesión» conserva el campo de daño físico sin forzar una interpretación excesiva.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El paquete del proyecto indica usar «Yahvé» para יְהוָה. Se conserva así el nombre pactal en el texto principal, en continuidad con la política del POB español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Autoridad sacerdotal para decidir pleitos y lesiones
  english_pob_reading: by their word every dispute and every injury shall be settled
  chosen_spanish_reading: y por su palabra se resolverá todo pleito y toda lesión
  alternative_spanish_readings:
  - y por su palabra se decidirá todo pleito y toda lesión
  - y conforme a su palabra se resolverá todo pleito y toda lesión
  rationale: El hebreo atribuye a los sacerdotes una función decisoria oficial. «Se resolverá» mantiene la fuerza judicial sin añadir más especificación de la que el texto exige.
  doctrine_reference: Deuteronomy 21:5 legal-priestly adjudication context
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés más reciente, que revisó la última cláusula de «assault» a «injury» para evitar una restricción indebida. En español se reflejó esa actualización con «lesión», manteniendo la amplitud semántica del hebreo נגע y el marco jurídico del pasaje. También se preservó la decisión doctrinal actual del proyecto de traducir יְהוָה como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conservó la aposición «los sacerdotes, los hijos de Leví» para reflejar la estructura hebrea.
  - «Ministrarle» se usó con sentido cultual, coherente con la terminología sacerdotal del POB.
  - «Pleito» y «lesión» sostienen el registro jurídico del versículo sin añadir interpretación extrabíblica.
