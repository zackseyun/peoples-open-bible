translation:
  language: es
  text: Pero acerca de estas cosas, en detalle[a], he dado instrucciones tanto a estos hombres como a los que vienen de mi parte[b] para hablar con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En detalle» traduce el modismo κατὰ μέρος; también puede entenderse «por partes» o «específicamente».
    reason: lexical_alternative
  - marker: b
    text: «Los que vienen de mi parte» refleja τοὺς παρʼ ἐμοῦ, literalmente «los de parte de mí» o «los de junto a mí»; el sentido puede ser el de representantes o mensajeros vinculados al autor, sin que el griego añada aquí el verbo «enviar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  lexicon: BDAG
  rationale: En este contexto epistolar, la preposición introduce el tema del que se trata, no una idea de representación. «Acerca de» comunica bien ese valor temático en español sin forzar un matiz ajeno.
- source_word: κατὰ μέρος
  english_pob_choice: in detail
  chosen_spanish: en detalle
  alternatives_spanish:
  - por partes
  - parte por parte
  - específicamente
  lexicon: BDAG
  rationale: La expresión idiomática griega sugiere tratamiento item por item o con precisión. «En detalle» es la solución española más natural y conserva el valor de minuciosidad.
- source_word: ἐντέταλμαι
  english_pob_choice: I have instructed
  chosen_spanish: he dado instrucciones
  alternatives_spanish:
  - he mandado
  - he ordenado
  - he encargado
  lexicon: BDAG
  rationale: El perfecto de ἐντέλλομαι expresa una instrucción ya dada con relevancia presente. «He dado instrucciones» mantiene el tono formal y evita una dureza excesiva de «ordenado».
- source_word: τούτους
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos enviados
  lexicon: BDAG
  rationale: El demostrativo apunta a varones concretos en el contexto. «Estos hombres» es natural y corresponde al referente masculino implícito.
- source_word: τοὺς παρʼ ἐμοῦ
  english_pob_choice: those from me
  chosen_spanish: los que son de parte mía
  alternatives_spanish:
  - los de parte mía
  - los que vienen de mí
  - mis representantes
  lexicon: BDAG
  rationale: La frase griega es literalmente «los de/desde mí», y el audit trail inglés evitó añadir «enviados». En español, «los que son de parte mía» conserva la relación de procedencia o representación sin introducir un envío explícito.
- source_word: διαλεχθῆναι
  english_pob_choice: to speak with you
  chosen_spanish: para hablar con ustedes
  alternatives_spanish:
  - para conversar con ustedes
  - para discutir con ustedes
  - para dirigirse a ustedes
  lexicon: BDAG
  rationale: El infinitivo aoristo de διαλέγομαι implica hablar o discutir con alguien. «Para hablar con ustedes» es amplio, natural y suficientemente abierto para incluir conversación o negociación.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «those from me» frente a «those sent by me» para no añadir «sent» que no está explícito en el griego. La redacción española sigue esa misma cautela y evita introducir un envío no dicho, manteniendo además el valor idiomático de κατὰ μέρος con una nota alternativa.
  spanish_consistency_notes:
  - Se conserva un registro formal y sobrio, apto para lectura eclesial.
  - Se evita «SEÑOR» u otras sustituciones innecesarias, ya que no aparecen en el versículo.
  - «He dado instrucciones» respeta el tono de dirección formal sin intensificar a mandato coercitivo.
  - La frase «los que son de parte mía» mantiene la ambigüedad útil entre procedencia y representación, como en el griego y en el audit trail inglés.
