translation:
  language: es
  text: 'que Jeremías el profeta habló a todo el pueblo de Judá y a todos los habitantes de Jerusalén[b][a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que Jeremías el profeta habló ...»'
    reason: lexical_alternative
  - marker: b
    text: La preposición hebrea con «todo el pueblo de Judá» también puede entenderse como «acerca de» o, en algunos contextos, «contra»; aquí se traduce «a» porque la cláusula presenta el discurso dirigido a Judá y Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - el que
  lexicon: HALOT
  rationale: Introduce una oración relativa en español que retoma implícitamente 'la palabra' del versículo anterior. 'Que' es la forma más natural y fiel en este contexto; 'el cual' sería más pesado y menos idiomático.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de hablar, y en español 'habló' conserva ese valor sin producir la redundancia 'dijo... diciendo' si se mantiene לֵאמֹר. 'Dijo' también sería posible, pero 'habló' refleja mejor el matiz del original en una fórmula introductoria.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: Uso nominal estándar
  rationale: Nombre propio profético en su forma habitual en español bíblico.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: Se conserva el título appositivo con artículo definido, como en el hebreo y en la versión inglesa auditada.
- source_word: עַל כָּל עַם יְהוּדָה
  english_pob_choice: to all the people of Judah
  chosen_spanish: a todo el pueblo de Judá
  alternatives_spanish:
  - contra todo el pueblo de Judá
  - acerca de todo el pueblo de Judá
  lexicon: HALOT
  rationale: Con דִּבֶּר, עַל puede marcar a quién va dirigida la palabra. En este contexto, paralelo con וְאֶל, el sentido es de destinatario; por eso 'a' comunica mejor que 'contra' o 'acerca de'. 'Pueblo' preserva el valor colectivo de עַם.
- source_word: וְאֶל כָּל יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: and to all the inhabitants of Jerusalem
  chosen_spanish: y a todos los habitantes de Jerusalén
  alternatives_spanish:
  - y a todos los que habitan en Jerusalén
  - y a todos los residentes de Jerusalén
  lexicon: HALOT
  rationale: יֹשְׁבֵי significa literalmente 'los que habitan'. 'Habitantes' es formal, claro y acorde con el registro profético.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'de la siguiente manera:'
  lexicon: HALOT
  rationale: Se conserva el conector de discurso directo. 'Diciendo' es la correspondencia directa y mantiene la estructura hebrea sin sobreparáfrasis.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el audit trail inglés: se mantiene la cláusula relativa, se conserva la estructura de destinatarios y no se introduce ninguna revisión adicional.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se mantiene 'Judá' y 'Jerusalén' como topónimos/entidades bíblicas estables, sin modernizarlos.
  - '''Pueblo'' traduce el colectivo hebreo עַם de manera consistente con el registro profético del POB.'
