revisions:
- from: Entonces el cojo[a] saltará como un ciervo, y la lengua del mudo cantará de alegría; porque aguas han brotado en el desierto[b], y corrientes en la Arabá[c].
  to: Entonces el cojo[a] saltará como un ciervo, y la lengua del mudo cantará de alegría; porque aguas han brotado en el desierto, y corrientes en la llanura desértica[b].
  rationale: 'Se corrige la prioridad de lectura para עֲרָבָה conforme a la POB inglesa: el sentido común ''llanura desértica'' va en el texto principal y la lectura geográfica ''Arabá'' queda en nota. También se eliminan notas redundantes/confusas y se preserva mejor la distinción entre מִדְבָּר y עֲרָבָה. El resto del versículo puede mantenerse.'
  reviewer_model: gpt-5.4
