lexical_decisions:
- source_word: propter hoc
  english_pob_choice: Therefore
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por eso
  - Por lo cual
  lexicon: propter hoc
  rationale: La expresión latina introduce consecuencia. «Por esto» reproduce bien la relación lógica de causa/resultado en español sin sonar excesivamente formal ni romper el registro bíblico.
- source_word: uidisti
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - viste tú
  - has visto
  lexicon: uidi
  rationale: El verbo en perfecto simple transmite la observación pasada del interlocutor en la visión profética. «Viste» es natural en español y conserva el trato directo.
- source_word: multitudinem collectam
  english_pob_choice: the multitude gathered
  chosen_spanish: a la multitud reunida
  alternatives_spanish:
  - la multitud congregada
  - la muchedumbre reunida
  lexicon: multitudo + collectus
  rationale: «Multitud» es el equivalente más directo y amplio; «reunida» conserva el participio pasivo sin añadir matices eclesiásticos como «congregada» que podrían sonar más interpretativos.
- source_word: cum pace
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: cum + pax
  rationale: La locución latina indica estado o circunstancia acompañante. «En paz» es la forma idiomática y fiel en español.
theological_decisions:
- issue: La frase final está truncada en el testimonio latino disponible y el contexto inmediato del inglés POB completa el sentido con la cláusula de observación profética.
  english_pob_reading: Therefore you saw the multitude gathered in peace.
  chosen_spanish_reading: Por esto viste a la multitud reunida en paz.
  alternative_spanish_readings:
  - Por esto viste la multitud reunida en paz.
  - Por esto viste a la muchedumbre reunida pacíficamente.
  rationale: Se sigue el sentido auditado del POB inglés para producir una línea completa y publicable, sin introducir contenido doctrinal nuevo. «Reunida en paz» mantiene el estado descrito sin expandirlo.
  doctrine_reference: Lectura contextual de la visión profética; no hay afirmación doctrinal controvertida en este segmento.
translation_notes:
  revision_awareness: El pase más reciente indica que no hubo cambios necesarios y que hay alto acuerdo entre las revisiones y el texto fuente; por eso la redacción sigue de cerca el sentido del latino disponible y el audit trail inglés sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se usa «multitud» de forma consistente para multitudo.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este fragmento.
  - «En paz» conserva la locución estable para cum pace.
  - La nota al pie marca la única ampliación necesaria por la truncación del testimonio latino.
