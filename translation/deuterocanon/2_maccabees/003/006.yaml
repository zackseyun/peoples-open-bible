theological_decisions:
- issue: Nature of the temple funds described
  chosen_reading: The verse distinguishes the monies from the sacrificial account rather than denying their sacred association altogether.
  alternative_readings:
  - The monies were entirely secular private deposits with no cultic relation
  - The monies included funds that could legitimately be seized because they were outside sacrificial use
  rationale: The Greek says the funds did not pertain to 'the account of the sacrifices,' which most directly marks them as distinct from sacrificial administration. The translation avoids importing a stronger claim about desacralization or legal legitimacy than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
