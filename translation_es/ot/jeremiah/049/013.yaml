base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/013.yaml
  text: For I have sworn by myself[a], declares Yahweh, that Bozrah will become a horror, a reproach, a waste, and a curse[c][b], and all her cities will become everlasting ruins.
  footnotes:
  - marker: a
    text: Or 'an astonishment' for 'a horror.' The Hebrew term denotes something so devastated that it causes appalled astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'an object of cursing' for 'a curse.' The Hebrew may emphasize that Bozrah becomes a byword invoked in curses.
    reason: lexical_alternative
  - marker: c
    text: Or 'perpetual ruins' for 'everlasting ruins.'
    reason: lexical_alternative
