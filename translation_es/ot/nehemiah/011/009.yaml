translation:
  language: es
  text: Y Joel hijo de Zicrí era supervisor de ellos[a], y Judá hijo de Hasenuá era segundo[b] sobre la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'encargado de ellos'.
    reason: lexical_alternative
  - marker: b
    text: O 'delegado sobre la ciudad' o 'segundo en mando sobre la ciudad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּקִיד
  english_pob_choice: overseer
  chosen_spanish: estaba al frente de ellos
  alternatives_spanish:
  - era supervisor de ellos
  - era sobreveedor de ellos
  - estaba encargado de ellos
  lexicon: HALOT
  rationale: פָּקִיד denota a una persona puesta a cargo o con funciones de supervisión administrativa. En español, 'estaba al frente de ellos' comunica dirección/encargo con naturalidad y evita un tecnicismo poco idiomático, sin forzar una categoría institucional más precisa que el hebreo no explicita.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: de ellos
  alternatives_spanish:
  - sobre ellos
  - encima de ellos
  - a cargo de ellos
  lexicon: HALOT
  rationale: La relación preposicional hebrea marca autoridad o supervisión. En español, 'al frente de ellos' ya incorpora esa relación, y 'de ellos' mantiene el complemento pronominal sin repetir una construcción pesada. Se evita una literalidad rígida que sonaría extraña en español.
- source_word: מִשְׁנֶה
  english_pob_choice: second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo en mando
  - el deputy
  - el vice
  - el sustituto
  lexicon: HALOT
  rationale: מִשְׁנֶה expresa el puesto de segundo rango o de reemplazo subordinado. 'El segundo' conserva la brevedad del hebreo y deja abierta la precisión administrativa, como en el inglés POB. En contexto, 'sobre la ciudad' aclara su función cívica.
- source_word: עַל הָעִיר
  english_pob_choice: over the city
  chosen_spanish: sobre la ciudad
  alternatives_spanish:
  - para la ciudad
  - encargado de la ciudad
  - con autoridad sobre la ciudad
  lexicon: HALOT
  rationale: עַל aquí indica jurisdicción o responsabilidad. 'Sobre la ciudad' reproduce bien esa relación y mantiene paralelismo con la primera cláusula. Otras opciones eran interpretativas y más explicativas que el hebreo.
- source_word: הַסְּנוּאָה
  english_pob_choice: Hassenuah
  chosen_spanish: Hasenuá
  alternatives_spanish:
  - Hassenuah
  - Senuá
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. 'Hasenuá' refleja el nombre hebreo de forma consistente y en ortografía española transparente. Se evita duplicar la consonante inicial en una transliteración que, en español, suele leerse de modo más natural con una sola h no pronunciada.
- source_word: וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: grammatical conjunction
  rationale: La conjunción simplemente enlaza esta entrada con la lista anterior; 'Y' es la equivalencia directa y natural en español.
translation_notes:
  revision_awareness: 'El texto hebreo y el contexto auditado en inglés muestran alta concordancia y no requieren una revisión textual. La decisión principal en español es estilística y léxica: expresar פָּקִיד y מִשְׁנֶה con fórmulas naturales sin perder la jerarquía administrativa implícita.'
  spanish_consistency_notes:
  - Se mantuvo el orden de las dos cláusulas para conservar el paralelismo del hebreo.
  - Los nombres propios se transliteraron de forma coherente con el español.
  - No se introdujo terminología eclesiástica ajena al contexto administrativo de la lista.
