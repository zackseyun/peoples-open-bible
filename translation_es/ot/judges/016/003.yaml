  text: And Samson lay until midnight[a]. Then he arose at midnight and seized the doors of the city gate and the two doorposts, and pulled them up with the bar[b]; he put them on his shoulders and carried them up to the top of the hill that is opposite Hebron.
  footnotes:
  - marker: a
    text: Or 'tore them out with the bar.' The Hebrew verb can denote pulling out or uprooting from place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the hill that faces Hebron.' The Hebrew idiom literally says 'upon the face of Hebron.'
    reason: lexical_alternative
