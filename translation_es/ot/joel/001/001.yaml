    text: 'Hebreo: יְהוָה (YHWH), el Nombre divino; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  revision_rationale: Se corrige únicamente el nombre propio final de «Petoel» a «Petuel» para ajustarlo mejor al hebreo פְּתוּאֵל, a la legibilidad española y a la forma bíblica más reconocible. Se actualiza la nota alternativa para mantener coincidencia exacta con el texto revisado. Todo lo demás puede conservarse.
