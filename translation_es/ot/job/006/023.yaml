lexical_decisions:
- source_word: וּמַלְּטוּנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sálvame
  - Delivráme
  lexicon: HALOT
  rationale: El imperativo hifil con sufijo de 1.ª persona expresa una petición de hacer escapar o librar. «Líbrame» comunica con naturalidad esa acción de liberación y mantiene la fuerza imperativa sin sonar arcaico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta; en español conviene conservar «de la mano de» para retener esa imagen de dominio o control ejercido por alguien.
- source_word: צָר
  english_pob_choice: the adversary
  chosen_spanish: el adversario
  alternatives_spanish:
  - el enemigo
  - el opresor
  - el rival
  lexicon: HALOT
  rationale: El sustantivo singular designa a alguien hostil. «Adversario» conserva la singularidad y la amplitud semántica de hostilidad sin precisar indebidamente el tipo de conflicto.
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: los despiadados
  alternatives_spanish:
  - los violentos
  - los tiranos
  - los crueles
  lexicon: HALOT
  rationale: El plural apunta a personas violentas, opresivas o sin compasión. «Despiadados» preserva bien el matiz moral y la pluralidad, y en español suena más natural que una opción demasiado política o demasiado técnica.
- source_word: תִּפְדּוּנִי
  english_pob_choice: Redeem me
  chosen_spanish: Redímeme
  alternatives_spanish:
  - Ráscame
  - Libérame
  - Rescátame
  lexicon: HALOT
  rationale: 'פדה conserva un matiz distinto de מלט: no solo escapar, sino ser liberado mediante rescate o costo. «Redímeme» preserva esa distinción léxica del texto hebreo y la misma tensión semántica que la POB inglesa mantuvo con «Redeem me».'
theological_decisions:
- issue: Distinguir בין מלט y פדה sin convertir automáticamente 'redimir' en lenguaje soteriológico
  english_pob_reading: '''Deliver me'' ... ''Redeem me'' ... not necessarily theological redemption'
  chosen_spanish_reading: «Líbrame» ... «Redímeme» como pares léxicamente distintos, sin imponer de antemano un sentido doctrinal
  alternative_spanish_readings:
  - «Sálvame» ... «Líbrame»
  - «Rescátame» ... «Libérame»
  - «Redímeme» ... «Rescátame»
  rationale: El verso presenta dos verbos diferentes y conviene respetar su contraste. «Redímeme» puede tener resonancias teológicas en español, pero aquí se conserva ante todo su valor de rescate/liberación frente a una amenaza concreta, sin cargar el texto con una lectura doctrinal ajena al contexto inmediato.
  doctrine_reference: Principio POB de consistencia terminológica con excepciones documentadas; Job 6:23
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente indica que no hubo cambios sustantivos tras el control final. El borrador español sigue el mismo trazado semántico: dos peticiones paralelas, con conservación del contraste entre מלט y פדה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «de la mano de» por fidelidad idiomática al hebreo.
  - «Despiadados» se prefiere aquí a «ruthless» literalizado como «crueles» porque reproduce mejor el tono de dureza moral sin perder naturalidad.
  - La puntuación con comillas angulares y signos de interrogación de cierre sigue el uso editorial en español.
