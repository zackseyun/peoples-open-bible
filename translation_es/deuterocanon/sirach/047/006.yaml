translation:
  language: es
  text: Por eso, las hijas le respondieron[a] y lo aclamaron entre miríadas. Cuando se puso el turbante, peleó[b], y por todas partes sometió al enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «lo glorificó entre miríadas y lo alabó con las bendiciones del Señor, cuando se le llevaba una diadema de gloria». Esto conserva una imagen más explícitamente real que el hebreo «turbante».'
    reason: alternative_reading
  - marker: b
    text: «Las hijas le respondieron» probablemente alude a mujeres que contestan en canto o celebración después de la victoria.
    reason: cultural_note
lexical_decisions:
- source_word: על כן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Conserva la relación consecuencial del hebreo de manera natural en español, sin endurecer el registro.
- source_word: ענו לו
  english_pob_choice: answered him
  chosen_spanish: le respondieron
  alternatives_spanish:
  - le cantaron
  - le contestaron
  lexicon: HALOT
  rationale: El hebreo significa responder; en este contexto puede implicar respuesta celebratoria. «Le respondieron» mantiene la amplitud del verbo sin interpretar de más.
- source_word: בנות
  english_pob_choice: the daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - las mujeres
  - las doncellas
  lexicon: HALOT
  rationale: Es la correspondencia más cercana al hebreo. Aunque el contexto sugiere mujeres celebrando, «hijas» preserva el giro idiomático original.
- source_word: ויכנוהו
  english_pob_choice: acclaimed him
  chosen_spanish: lo aclamaron
  alternatives_spanish:
  - lo alabaron
  - lo honraron
  - lo glorificaron
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el paralelo griego apunta a gloria/alabanza pública. «Aclamaron» expresa honor colectivo en un marco de victoria sin fijar un matiz más estrecho de lo que el hebreo garantiza.
- source_word: ברבבה
  english_pob_choice: among the myriads
  chosen_spanish: entre miríadas
  alternatives_spanish:
  - entre diez millares
  - entre multitudes
  lexicon: HALOT
  rationale: Conserva el idiomático רבבה y su valor de multitud numerosa, a la vez que sigue siendo comprensible en español culto.
- source_word: בעטותו
  english_pob_choice: When he put on
  chosen_spanish: Cuando se puso
  alternatives_spanish:
  - Al ponerse
  - Cuando se envolvió con
  lexicon: HALOT
  rationale: Da cuenta del acto de colocarse la prenda o tocado, manteniendo el valor temporal del hebreo.
- source_word: צניף
  english_pob_choice: the turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - la diadema
  - el tocado
  lexicon: HALOT
  rationale: «Turbante» reproduce el sentido del hebreo para el tocado enrollado. Se preserva así el texto hebreo, aunque el griego sugiera una imagen más real de corona o diadema.
- source_word: נלחם
  english_pob_choice: he fought
  chosen_spanish: peleó
  alternatives_spanish:
  - luchó
  - combatió
  lexicon: HALOT
  rationale: Verbo directo y natural que expresa combate sin sobrecargar el verso.
- source_word: ומסביב
  english_pob_choice: all around
  chosen_spanish: por todas partes
  alternatives_spanish:
  - en derredor
  - a su alrededor
  lexicon: HALOT
  rationale: Traduce bien el alcance envolvente del hebreo en español actual.
- source_word: הכניע
  english_pob_choice: subdued
  chosen_spanish: sometió
  alternatives_spanish:
  - abatió
  - derrotó
  - humilló
  lexicon: HALOT
  rationale: «Sometió» conserva la idea de hacer bajar al enemigo y de imponer dominio, sin perder la fuerza militar del verbo.
- source_word: צר
  english_pob_choice: the foe
  chosen_spanish: al enemigo
  alternatives_spanish:
  - al adversario
  - al adversario hostil
  lexicon: HALOT
  rationale: En español, el singular colectivo se entiende mejor como un enemigo concreto o representativo; «enemigo» es más transparente que «foe».
theological_decisions:
- issue: Relación entre el hebreo צניף y el paralelo griego con la imagen real de διάδημα δόξης
  english_pob_reading: Main text follows the Hebrew witness with 'turban,' while preserving the Greek royalizing alternative in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo con «turbante», y la nota conserva la lectura griega de una «diadema de gloria».
  alternative_spanish_readings:
  - diadema
  - diadema de gloria
  rationale: 'Como Sirácida tiene testimonio hebreo conservado, la redacción principal debe respetarlo. Pero el griego no se oculta: aporta una tensión interpretativa importante, probablemente más real en clave real/entronización. La nota deja auditable esa alternativa sin desplazar el hebreo.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Sin revisiones aplicadas; se mantiene el acuerdo alto del control cruzado y la decisión principal de seguir el hebreo con la alternativa griega preservada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca explícitamente el nombre divino; aquí el hebreo dice «el Señor» en la nota por reflejo del griego κύριος, así que se mantiene esa formulación citacional dentro de la nota.
  - Se preserva la tensión hebreo/griego entre «turbante» y «diadema de gloria» en vez de nivelarla.
  - «Miríadas» mantiene el registro bíblico y la correspondencia con רבבה/μυριάσιν sin convertirlo en una simple hipérbole moderna.
