lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Ahora estos
  - Estos
  lexicon: HALOT
  rationale: La conjunción más el demostrativo introducen un nuevo elemento en la genealogía. En español, «Y estos» conserva la continuidad de la lista sin forzar una literalidad pesada.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - muchachos de
  lexicon: HALOT
  rationale: En español, «hijos de» comunica con naturalidad la relación genealógica inmediata y evita la ambigüedad de «sones» o «descendientes» sin base explícita en el hebreo.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: נַחַת
  english_pob_choice: Nahath
  chosen_spanish: Nahat
  alternatives_spanish:
  - Náhat
  - Nahat
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta la grafía al español con acento prosódico no marcado en el nombre para una lectura fluida.
- source_word: וָ/זֶרַח
  english_pob_choice: and Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zerah
  - Sérah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la vocal inicial y se usa acentuación española para la pronunciación; la conjunción ya está expresada por la lista en español y no necesita repetirse aquí.
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Samá
  alternatives_spanish:
  - Shamma
  - Samá
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación ortográfica al español para facilitar lectura pública. Se conserva el valor onomástico sin añadir interpretación.
- source_word: וּ/מִזָּה
  english_pob_choice: and Mizzah
  chosen_spanish: Mizzá
  alternatives_spanish:
  - Mizza
  - Mizzá
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación ortográfica al español. Se omite la conjunción por la enumeración española ya introducida por dos puntos y comas.
- source_word: אֵלֶּה הָיוּ
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos eran
  - Estos fueron
  lexicon: HALOT
  rationale: La fórmula genealógica en pasado queda naturalmente expresada con «Estos fueron», que mantiene el valor histórico y listado del hebreo.
- source_word: בְּנֵי בָשְׂמַת
  english_pob_choice: the sons of Basemath
  chosen_spanish: los hijos de Basemat
  alternatives_spanish:
  - los descendientes de Basemat
  - los hijos de Basemat
  lexicon: HALOT
  rationale: Se conserva «hijos» porque el hebreo repite בְּנֵי sin especificar un equivalente más estrecho. La relación genealógica se entiende por el contexto inmediato de la narración.
- source_word: אֵשֶׁת עֵשָׂו
  english_pob_choice: Esau’s wife
  chosen_spanish: la esposa de Esaú
  alternatives_spanish:
  - la mujer de Esaú
  - la esposa de Esaú
  lexicon: HALOT
  rationale: «Esposa» expresa de manera clara y digna la relación marital en español contemporáneo, conservando el sentido del constructo hebreo.
theological_decisions:
- issue: Relación genealógica de «los hijos de Basemat»
  english_pob_reading: These were the sons of Basemath, Esau’s wife.
  chosen_spanish_reading: Estos fueron los hijos de Basemat, la esposa de Esaú.
  alternative_spanish_readings:
  - Estos fueron los descendientes de Basemat, la esposa de Esaú.
  - Estos fueron los hijos de Basemat, la esposa de Esaú.
  rationale: El hebreo repite בְּנֵי y el audit trail inglés final se mantuvo en «sons». En español, «hijos» reproduce esa repetición sin introducir una especificación genealógica que el texto no da explícitamente. Evito «nietos» o «descendientes» porque añadirían una precisión no expresada en el hebreo de este versículo.
  doctrine_reference: Precisión textual y genealogía bíblica; evitar sobreinterpretación del alcance de בְּנֵי.
translation_notes:
  revision_awareness: El audit trail inglés registra una revisión previa que propuso «grandsons» para resolver una aparente tensión genealógica, pero la revisión posterior volvió a «sons» para ceñirse al hebreo. La versión española sigue esa decisión más reciente y no introduce «nietos», porque el texto fuente no lo especifica aquí.
  spanish_consistency_notes:
  - Se conserva el nombre divino no porque aparezca aquí, sino por coherencia general del proyecto; este versículo no lo contiene.
  - Se mantiene un registro genealógico sobrio y directo, sin fórmulas explicativas añadidas.
  - La traducción de nombres propios busca legibilidad pública en español sin ocultar la forma bíblica original.
