translation:
  language: es
  text: Cántico de las subidas. Bienaventurado[a] todo el que teme a Yahvé, que anda en sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichoso». אַשְׁרֵי puede denotar un estado de florecimiento o bienaventuranza.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Un cántico de ascensos
  alternatives_spanish:
  - Un cántico de subidas
  - Un cántico de peregrinación
  lexicon: HALOT
  rationale: La fórmula funciona como encabezado del salmo. «Ascensos» conserva el sustantivo concreto de מַעֲלוֹת sin interpretar de más el trasfondo histórico. «Cántico» es natural y digno en español para un título litúrgico o poético.
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  - Qué bienaventurado
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa un estado de bienaventuranza o florecimiento. «Bienaventurado» preserva ese registro sapiencial y devocional mejor que «feliz», que suena más psicológico en español.
- source_word: כָּל
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - todos los que
  - cada uno que
  lexicon: HALOT
  rationale: Aunque literalmente significa «todo», aquí rige un participio singular representativo. «Todo el que» comunica la fuerza distributiva de modo idiomático en español.
- source_word: יְרֵא יְהוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: el que teme a Yahvé
  alternatives_spanish:
  - el que reverencia a Yahvé
  - el que vive en reverente temor de Yahvé
  lexicon: HALOT
  rationale: El verbo ירא denota temor reverente ante Dios. «Teme a Yahvé» conserva la fuerza bíblica y la continuidad terminológica, sin suavizarla a mera «reverencia».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología del proyecto, preservando el nombre propio divino y evitando la sustitución titular «el SEÑOR».
- source_word: הַהֹלֵךְ
  english_pob_choice: who walks
  chosen_spanish: el que anda
  alternatives_spanish:
  - el que camina
  - el que vive
  lexicon: HALOT
  rationale: El participio mantiene la metáfora ética del modo de vida. «Anda» es natural en español bíblico y conserva mejor la imagen de conducta que «vive», que sería más interpretativo.
- source_word: בִּדְרָכָיו
  english_pob_choice: in his ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - por sus sendas
  - en sus sendas
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural alude a conductas o caminos morales. «Caminos» preserva la metáfora y suena más fluido en español que «sendas», sin perder el sentido relacional del pronombre.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino, no un título sustitutivo. Esto sigue el criterio POB de transparencia frente al Tetragrámaton y evita ocultar la referencia personal del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Alcance de אַשְׁרֵי
  english_pob_reading: Blessed is
  chosen_spanish_reading: Bienaventurado
  alternative_spanish_readings:
  - Dichoso
  - Feliz
  rationale: La palabra introduce una declaración sapiencial de prosperidad/felicidad bajo la bendición de Dios. «Bienaventurado» conserva mejor el tono teológico que «feliz», sin borrar la dimensión de florecimiento que reconoce el audit trail inglés.
  doctrine_reference: HALOT lexical note on אַשְׁרֵי; POB lexical decision
- issue: Sujeto distributivo de כָּל יְרֵא
  english_pob_reading: everyone who fears Yahweh
  chosen_spanish_reading: todo el que teme a Yahvé
  alternative_spanish_readings:
  - todos los que temen a Yahvé
  - cada uno que teme a Yahvé
  rationale: El hebreo usa un singular representativo con valor distributivo. «Todo el que» conserva la inclusividad sin masculinizar innecesariamente ni pluralizar de forma que borre la estructura singular del participio.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden de forma alta; no hay revisiones aplicadas en el pasaje. La versión española sigue esa línea estable, manteniendo el encabezado poético, la bienaventuranza sapiencial y el nombre divino explícito.
  spanish_consistency_notes:
  - Se preserva «Yahvé» para יהוה conforme al estándar del proyecto.
  - «Cántico de ascensos» mantiene la estructura del título sin reinterpretarlo como comentario histórico.
  - «Todo el que» refleja el distributivo singular del hebreo y evita un plural innecesario.
  - «Anda en sus caminos» conserva la metáfora ética de caminar.
