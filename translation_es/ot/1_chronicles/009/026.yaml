  text: כִּ֣י בֶ/אֱמוּנָ֞ה הֵ֗מָּה אַרְבַּ֨עַת֙ גִּבֹּרֵ֣י הַ/שֹּׁעֲרִ֔ים הֵ֖ם הַ/לְוִיִּ֑ם וְ/הָיוּ֙ עַל הַ/לְּשָׁכ֔וֹת וְ/עַ֥ל הָ/אֹצְר֖וֹת בֵּ֥ית הָ/אֱלֹהִֽים־׃
base_translation:
