translation:
  language: es
  text: Pero tú, Yahvé de los ejércitos, que juzgas con justicia, que pruebas los riñones y el corazón[a], déjame ver tu venganza sobre ellos[b], porque a ti he expuesto mi caso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los riñones y el corazón», una figura para los pensamientos, motivos y afectos más profundos.'
    reason: cultural_note
  - marker: b
    text: O «tu vindicación» o «tu acto de vengar».
    reason: lexical_alternative
  - marker: c
    text: O «mi disputa» o «mi causa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה / יהוה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma POB ya establecida en español, en vez de ocultarlo con una sustitución litúrgica. El vocativo se refleja naturalmente con «Pero tú».},{
theological_decisions:
- issue: Traducción del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto en español favorece «Yahvé» para mantener la referencia pactual al nombre divino y la transparencia al hebreo, evitando el reemplazo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen hebrea de «los riñones y el corazón»
  english_pob_reading: retain the concrete Hebrew imagery in the main text
  chosen_spanish_reading: retener la imagen concreta con nota explicativa
  alternative_spanish_readings:
  - traducir como «la mente y el corazón»
  - traducir como «el ser interior y el corazón»
  rationale: «Riñones» conserva la literalidad del hebreo y permite ver la antropología bíblica del texto; la nota explica su sentido idiomático de pensamientos y motivos profundos, sin resolver la tensión semántica en el cuerpo del verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Sentido de נִקְמָתְךָ
  english_pob_reading: your vengeance
  chosen_spanish_reading: tu venganza
  alternative_spanish_readings:
  - tu vindicación
  - tu retribución
  rationale: El sustantivo נקם admite un campo de avenganza/retribución. «Venganza» es el equivalente más directo; la nota preserva las alternativas «vindicación» y «avenging» que el audit trail mantiene.
  doctrine_reference: HALOT / audit trail lexical alternative
- issue: Sentido de רִיבִי
  english_pob_reading: my case
  chosen_spanish_reading: mi caso
  alternative_spanish_readings:
  - mi disputa
  - mi causa
  - mi pleito
  rationale: «Mi caso» comunica bien el matiz jurídico de רִיב en español actual sin sonar arcaico; se conservan alternativas de disputa/causa para reflejar el rango semántico.
  doctrine_reference: HALOT / audit trail lexical alternative
translation_notes:
  revision_awareness: Revisado a la luz del paquete fuente hebreo y del audit trail en inglés; se mantuvo la imagen corporal concreta, se evitó suavizar «venganza» hacia un término más abstracto y se conservó el registro de oración profética.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar español del proyecto.
  - Se mantuvo el paralelismo verbal «que juzgas... que pruebas...» para reflejar los participios hebreos.
  - «Riñones» se preservó por transparencia al hebreo; la nota aclara su valor idiomático.
  - La puntuación reproduce la estructura de súplica con vocativo y cláusula causal final.
