translation:
  language: es
  text: Apártense de mí[a], todos los que hacen maldad, porque Yahvé ha oído el sonido[b] de mi llanto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Aléjense de mí' o 'Retírense de mí'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la voz'' o ''el sonido'' de mi llanto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  english_pob_choice: Depart
  chosen_spanish: Apártense de mí
  alternatives_spanish:
  - Aléjense de mí
  - Retírense de mí
  lexicon: HALOT
  rationale: El imperativo plural comunica alejamiento y separación. En español, 'apártense de mí' conserva la fuerza directiva de la forma verbal mejor que una versión más explicativa.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - lejos de mí
  lexicon: HALOT
  rationale: La referencia personal es central en el verso; 'de mí' es la forma más directa y fiel al sufijo de primera persona.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: En español, el vocativo plural suena más natural con un sujeto explícito. 'Todos ustedes' conserva el valor inclusivo del hebreo sin volverlo impersonal.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: hacedores de maldad
  alternatives_spanish:
  - obreros de maldad
  - hacedores de iniquidad
  - malhechores
  lexicon: HALOT
  rationale: Se preserva la imagen de 'los que hacen' algo, que el inglés POB también quiso retener. 'Maldad' expresa אָוֶן de forma clara y natural en español; 'iniquidad' es posible pero más marcado y menos inmediato para este registro.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' introduce de manera natural la razón del mandato en español contemporáneo y mantiene la relación causal del hebreo.'
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - ha escuchado
  - ha escuchado atentamente
  lexicon: HALOT
  rationale: El perfecto expresa una acción ya cumplida con relevancia presente, como en el inglés POB. 'Ha oído' es más sobrio y poético que 'ha escuchado'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El proyecto requiere 'Yahvé' como forma española principal del nombre divino, preservando el Tetragrámaton sin sustituirlo por un título. Se mantiene la decisión doctrinal del POB en una adaptación hispanohablante.
- source_word: קוֹל
  english_pob_choice: the sound
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - el clamor
  lexicon: HALOT
  rationale: Aquí 'voz' conserva la amplitud semántica de קוֹל y funciona bien con el sustantivo siguiente. 'Sonido' también es posible, pero 'voz' mantiene la expresión bíblica más transparente en español.
- source_word: בִּכְיִי
  english_pob_choice: my weeping
  chosen_spanish: de mi llanto
  alternatives_spanish:
  - de mi llanto
  - de mi llorar
  - de mis lágrimas
  lexicon: HALOT
  rationale: '''Llanto'' representa bien el acto de llorar y su carga afectiva. La construcción ''la voz de mi llanto'' preserva la imagen hebrea sin reducirla a lágrimas visibles ni a una paráfrasis.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política del proyecto en español usa 'Yahvé' como forma principal del nombre revelado. Esto evita la sustitución por 'Señor' y mantiene la referencia al nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Relación entre קוֹל y בִּכְיִי
  english_pob_reading: the sound of my weeping
  chosen_spanish_reading: la voz de mi llanto
  alternative_spanish_readings:
  - el sonido de mi llanto
  - el clamor de mi llanto
  - la voz de mi llorar
  rationale: Se conserva la ambigüedad hebrea entre 'voz' y 'sonido' sin forzar una interpretación más específica. 'Llanto' mantiene el sustantivo de afecto/acción mejor que 'lágrimas', que cambiaría la imagen a algo visual.
  doctrine_reference: HALOT, קוֹל; בִּכְי
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el texto base y la auditoría inglesa: no se requieren cambios textuales mayores. La única decisión sensible es la forma española del nombre divino, ajustada a la norma del proyecto (''Yahvé'') mientras se conserva la misma lectura teológica del POB. También se optó por ''la voz de mi llanto'' para reflejar con más transparencia la imagen hebrea de קוֹל + בִּכְיִי, aunque ''el sonido de mi llanto'' sigue siendo una alternativa válida.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Tetragrámaton, en coherencia con el proyecto en español.
  - '''Apártense de mí'' conserva el imperativo plural y la separación personal explícita del hebreo.'
  - '''Hacedores de maldad'' mantiene la imagen verbal de פועלי און y evita una simplificación excesiva.'
  - La construcción 'la voz de mi llanto' preserva la metáfora auditiva del original, aunque la nota ofrece la alternativa 'el sonido de mi llanto'.
