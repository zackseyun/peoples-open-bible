translation:
  language: es
  text: Serás llenada de embriaguez y de tristeza, con una copa de horror[a] y desolación, la copa de tu hermana Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una copa de asombro y desolación». El sustantivo traducido «horror» también puede indicar el asombro atónito que produce el juicio catastrófico.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁכָּרוֹן
  english_pob_choice: drunkenness
  chosen_spanish: embriaguez
  alternatives_spanish:
  - borrachera
  - ebriedad
  lexicon: HALOT
  rationale: El sustantivo hebreo denota un estado de intoxicación. En español, «embriaguez» es natural, digno y conserva la imagen de juicio como algo que se bebe o se padece.
- source_word: יָגוֹן
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  lexicon: HALOT
  rationale: El término expresa pena, aflicción o tristeza. «Tristeza» es una equivalencia directa y clara, y funciona bien en el paralelismo con «embriaguez».
- source_word: תִּמָּלֵאִי
  english_pob_choice: you will be filled
  chosen_spanish: serás llenada
  alternatives_spanish:
  - serás llena
  - serás colmada
  lexicon: HALOT
  rationale: La forma nifal imperfecta segunda femenina singular expresa pasividad futura dirigida a una ciudad/personificación femenina. «Serás llenada» preserva bien la pasiva y el carácter de juicio recibido.
- source_word: כּוֹס
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  - vaso
  lexicon: HALOT
  rationale: El hebreo usa la imagen profética concreta de una copa destinada para juicio. «Copa» mantiene la metáfora bíblica y es idiomática en español.
- source_word: שַׁמָּה
  english_pob_choice: horror
  chosen_spanish: horror
  alternatives_spanish:
  - espanto
  - asombro
  lexicon: HALOT
  rationale: En este contexto de juicio, el sustantivo puede expresar horror o asombro atónito ante la catástrofe. «Horror» conserva la fuerza afectiva y la gravedad del cuadro.
- source_word: שְׁמָמָה
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: HALOT
  rationale: Es un término profético frecuente para devastación o desolación. «Desolación» es el equivalente más estable y preciso en español.
- source_word: אֲחוֹתֵךְ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana mayor
  - tu pariente
  lexicon: HALOT
  rationale: La forma femenina singular conserva la alegoría extendida de Jerusalén y Samaria como hermanas. Debe mantenerse literalmente sin suavizar la metáfora.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Es un nombre propio geográfico. «Samaria» es la forma castellana habitual y clara.
theological_decisions:
- issue: La imagen profética de la copa como juicio
  english_pob_reading: Retain 'cup' literally in the main text
  chosen_spanish_reading: Conservar «copa» literalmente en el texto principal
  alternative_spanish_readings:
  - porción de juicio
  - copa del juicio
  rationale: El hebreo usa una imagen concreta y cargada de resonancias proféticas. Mantener «copa» preserva la tensión teológica y las conexiones intertextuales sin explicitar en exceso el sentido.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la metáfora profética'
translation_notes:
  revision_awareness: La auditoría inglesa revisó la pareja «drunkenness and sorrow» para ajustar יָגוֹן desde «grief» a una forma más directa y formal. En español se reflejó esa decisión con «tristeza»; además, se mantuvo la imagen literal de la copa y la ambigüedad lexical de שַׁמָּה mediante nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones tradicionales porque el verso no contiene el nombre divino.
  - Se conservó la personificación femenina con segunda persona singular para respetar el hebreo.
  - «Samaria» se mantuvo como topónimo propio sin adaptación explicativa.
  - La nota al pie recoge la alternativa lexical documentada para שַׁמָּה, sin añadir interpretaciones ajenas al texto.
