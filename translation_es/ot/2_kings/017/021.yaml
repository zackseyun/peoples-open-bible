revisions:
- from: Porque Israel se había desgarrado de la casa de David[a], e hicieron rey a Jeroboam hijo de Nabat; y Jeroboam apartó a Israel de seguir a Yahvé, y los hizo cometer un gran pecado.
  to: Porque Israel se arrancó de la casa de David[a], e hicieron rey a Jeroboam hijo de Nabat; y Jeroboam apartó a Israel de seguir a Yahvé, y los hizo cometer un gran pecado.
  rationale: Se ajusta el inicio para reflejar mejor el aspecto verbal hebreo y mejorar la naturalidad del español, mientras se conserva en nota la imagen léxica de desgarro/ruptura documentada en la auditoría inglesa. El resto del versículo puede mantenerse como fiel y claro.
