translation:
  language: es
  text: 'Y dijo a los levitas, los santos servidores de Israel: «Santifíquense[a] para Yahvé en el lugar del arca santa de Yahvé, en la casa que edificó Salomón, hijo de David, el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente «santifíquenlos para el Señor/Yahvé», pero el referente de «los» es incierto. Aquí se entiende como un mandato dirigido a los levitas mismos. El paralelo hebreo, en cambio, ofrece una lectura más explícita: «Pongan el arca santa en la casa…».'
    reason: alternative_reading
lexical_decisions:
- source_word: Λευείταις
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - levitas
  - leuitas
  lexicon: LSJ
  rationale: «Levitas» es el equivalente español establecido para el grupo tribal/sacerdotal y mantiene la referencia cultural clara sin introducir una transliteración innecesaria.
- source_word: ἱεροδούλοις
  english_pob_choice: holy servants
  chosen_spanish: siervos sagrados
  alternatives_spanish:
  - servidores del templo
  - siervos santos
  - servidores sagrados
  lexicon: LSJ
  rationale: El compuesto apunta a personas dedicadas al servicio sagrado. «Siervos sagrados» conserva ese valor cultual y evita una especialización institucional excesiva.
- source_word: ἁγιάσατε
  english_pob_choice: Sanctify
  chosen_spanish: Santificaos
  alternatives_spanish:
  - Consagraos
  - Santificad
  lexicon: LSJ
  rationale: El verbo es cultual y formal. En español, el imperativo reflexivo «Santificaos» refleja bien la lectura revisada del contexto, donde el mandato recae sobre los levitas mismos.
- source_word: αὐτούς
  english_pob_choice: yourselves
  chosen_spanish: os
  alternatives_spanish:
  - vosotros
  - ustedes
  lexicon: Greek NT/LXX lexicon
  rationale: Sigo la revisión del POB inglés que entiende αὐτούς como referido a los levitas en el contexto. El reflexivo español preserva esa lectura y evita el «ellos» literal que sonaría ajeno al sentido adoptado.
- source_word: τῷ κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  - a Yahvé
  lexicon: LSJ
  rationale: En el texto hebreo paralelo aparece el nombre divino; para el POB español se usa «Yahvé» según la norma del proyecto, manteniendo la dedicación cultual expresada por el dativo.
- source_word: ἐν τῇ θέσει
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en la ubicación
  - en el sitio
  lexicon: LSJ
  rationale: «Lugar» es la correspondencia natural en español y conserva el sentido locativo sin interpretarlo más de lo que exige el griego.
- source_word: τῆς ἁγίας κιβωτοῦ
  english_pob_choice: of the holy ark
  chosen_spanish: de la santa arca
  alternatives_spanish:
  - de la arca santa
  - del arca santa
  lexicon: LSJ
  rationale: «Arca» es el sustantivo cultual correspondiente a κιβωτός en este contexto. «Santa» mantiene la relación con ἁγίας y el registro bíblico.
- source_word: οἴκῳ
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - templo
  lexicon: LSJ
  rationale: Aunque el referente es el templo, el griego dice literalmente «casa». «Casa» preserva la forma del original y evita una interpretación excesivamente explicativa.
- source_word: ᾧ ᾠκοδόμησεν Σαλωμὼν ὁ τοῦ Δαυεὶδ ὁ βασιλεύς
  english_pob_choice: that Solomon son of David the king built
  chosen_spanish: que edificó Salomón, hijo de David, el rey
  alternatives_spanish:
  - que construyó Salomón, hijo de David, el rey
  - que edificó el rey Salomón, hijo de David
  lexicon: LSJ
  rationale: «Edificó» conserva el registro formal y cultual de «built»; «hijo de David» reproduce la filiación explícita del griego y coincide con el paralelo hebreo.
theological_decisions:
- issue: Renderización de κύριος en un contexto donde el paralelo hebreo apunta al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el texto base es griego, el paralelo hebreo identifica el referente como YHWH. El proyecto español usa «Yahvé» para el nombre divino, evitando el enmascaramiento devocional y manteniendo la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md contested terms: יהוה / YHWH -> Yahvé'
- issue: Tensión textual entre el griego transmitido y el paralelo hebreo sobre el mandato a los levitas
  english_pob_reading: Sanctify yourselves to the Lord...
  chosen_spanish_reading: Santificaos para Yahvé...
  alternative_spanish_readings:
  - Poned el arca santa en la casa...
  - Consagraos al Señor...
  rationale: Sigo la revisión del POB inglés que, tras considerar el griego y su paralela hebrea, mantiene la lectura imperativa dirigida a los levitas. En español se conserva esa decisión, sin forzar la harmonización al paralelo hebreo.
  doctrine_reference: DOCTRINE.md translation philosophy 1 and 3
translation_notes:
  revision_awareness: Se incorporó la corrección de la revisión inglesa que entiende αὐτούς como referido a los levitas, y por eso el mandato aparece en forma reflexiva («Santificaos») en lugar de un «ellos» o «las». También se mantuvo la prioridad del griego como texto base, con el paralelo hebreo solo como apoyo para la nota de lectura alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió «levitas» y no una transliteración, por claridad bíblica en español.
  - Se conservó el registro cultual con «santa arca» y «edificó», evitando modernizaciones que debiliten el tono ritual.
  - La nota al pie está anclada correctamente en el verbo reflexivo mediante [a].
