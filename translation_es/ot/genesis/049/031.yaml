translation:
  language: es
  text: Allí enterraron a Abraham y a Sara su esposa; allí enterraron a Isaac y a Rebeca su esposa; y allí yo enterré a Lea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio retoma el lugar de sepultura ya mencionado. «Allí» conserva la referencia locativa con naturalidad en español y mantiene el paralelismo del verso.
- source_word: קָבְרוּ
  english_pob_choice: they buried
  chosen_spanish: enterraron
  alternatives_spanish:
  - sepultaron
  - dieron sepultura
  lexicon: HALOT
  rationale: El qal perfecto 3cp se entiende activamente con sujeto implícito. «Enterraron» es claro y natural en español; «sepultaron» también es posible, pero «enterraron» resulta más directo en este contexto narrativo.
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[marcador de objeto directo, no traducido]'
  lexicon: Hebrew grammar
  rationale: En español no corresponde un equivalente léxico separado; se integra por el orden y las marcas sintácticas de la oración.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se vierte naturalmente como «su esposa». Se conserva la repetición estructural del hebreo para Sara y Rebeca.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - así como
  lexicon: Hebrew grammar
  rationale: La conjunción coordina las cláusulas y mantiene la enumeración sencilla del hebreo.
- source_word: קָבַרְתִּי
  english_pob_choice: I buried
  chosen_spanish: enterré yo
  alternatives_spanish:
  - yo enterré
  - sepulté yo
  lexicon: HALOT
  rationale: El perfecto 1cs refiere la acción pasada de Jacob respecto de Lea. Se mantiene la primera persona y el valor activo; la posposición de «yo» da énfasis sin alterar el sentido.
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Lía
  lexicon: HALOT
  rationale: El nombre propio se translitera según uso bíblico en español. «Lea» es la forma más reconocible y transparente en este registro.
translation_notes:
  revision_awareness: El contexto auditado confirma alta concordancia entre el hebreo y la traducción inglesa POB; no se requieren ajustes textuales ni notas de variante. Se conserva la repetición de קבר en los tres miembros para reflejar la estructura del original.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y narrativo propio del pasaje.
  - Se conserva el paralelismo de la triple referencia locativa con «allí».
  - Se usa «esposa» de manera consistente para אִשְׁתּוֹ, conforme al sentido contextual del hebreo.
