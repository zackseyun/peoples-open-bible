base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/006.yaml
  text: When the Philistines heard the sound of the shouting[a], they said[b], “What is this great sound of shouting in the camp of the Hebrews?” And they knew that the ark of Yahweh had come into the camp.
  footnotes:
  - marker: a
    text: Or 'the ark of Yahweh.' The main text follows the project's standard rendering of the divine name יְהוָה as 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: '''Shouting'' could also be rendered ''shout'' or, in a military context, ''war cry.'''
    reason: lexical_alternative
