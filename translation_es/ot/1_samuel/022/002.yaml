translation:
  language: es
  text: Y se reunieron con él todos los que estaban en angustia[a], todos los que estaban en deuda, y todos los amargos de alma[b]; y él llegó a ser comandante sobre ellos. Estaban con él unos cuatrocientos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «en estrechez / en presión». «Angustia» comunica bien la idea de aflicción y necesidad.
    reason: lexical_alternative
  - marker: b
    text: Hebreo, «amargo de alma», un modismo que expresa amargura o profunda aflicción interior.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El hitpael con waw consecutivo expresa que el grupo se congrega en torno a David. «Se reunieron» comunica bien el movimiento colectivo y suena natural en español sin perder el matiz reflexivo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - junto a él
  lexicon: HALOT
  rationale: La preposición אל con sufijo indica dirección hacia David. «A él» es la correspondencia más directa y sobria.
- source_word: כָּל אִישׁ
  english_pob_choice: everyone
  chosen_spanish: todos los que
  alternatives_spanish:
  - cada hombre
  - todo hombre
  lexicon: HALOT
  rationale: La construcción distributiva no debe sonar rígidamente singular en español. «Todos los que» preserva el valor colectivo sin forzar una fórmula arcaica.
- source_word: מָצוֹק
  english_pob_choice: in distress
  chosen_spanish: estaban en angustia
  alternatives_spanish:
  - estaban en apuro
  - estaban en aflicción
  lexicon: HALOT
  rationale: El término denota presión, estrechez o aflicción. «Angustia» capta bien la carga de necesidad y sufrimiento, y funciona de manera clara en español bíblico actual.
- source_word: אֲשֶׁר ל֤וֹ נֹשֶׁא
  english_pob_choice: who was in debt
  chosen_spanish: que tenían acreedor
  alternatives_spanish:
  - que estaban en deuda
  - a quienes se les reclamaba una deuda
  lexicon: HALOT
  rationale: Con el audit trail, la lectura de fondo es económica y social. «Tenían acreedor» conserva la expresión hebrea más literalmente que «estaban en deuda», manteniendo la tensión lexical señalada en la nota inglesa.
- source_word: מַר נֶפֶשׁ
  english_pob_choice: bitter in soul
  chosen_spanish: tenían amargura de alma
  alternatives_spanish:
  - eran amargados de alma
  - tenían el alma amarga
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y antropológica. «Amargura de alma» conserva el paralelismo y el sentido interior sin reducirlo a una simple actitud psicológica.
- source_word: וַיְהִי עֲלֵיהֶם לְשָׂר
  english_pob_choice: he became commander over them
  chosen_spanish: llegó a ser jefe sobre ellos
  alternatives_spanish:
  - se hizo comandante sobre ellos
  - fue comandante sobre ellos
  lexicon: HALOT
  rationale: שַׂר puede abarcar jefe, oficial o comandante. «Jefe» es amplio y natural en español; evita una militarización excesiva, aunque el contexto admite rango de mando.
- source_word: וַיִּהְיוּ עִמּוֹ
  english_pob_choice: were with him
  chosen_spanish: había con él
  alternatives_spanish:
  - estaban con él
  - permanecieron con él
  lexicon: HALOT
  rationale: La cláusula final expresa compañía/presencia del grupo. «Había con él» reproduce el giro narrativo hebreo de manera idiomática en español y enlaza con el número siguiente.
- source_word: כְּאַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: About four hundred men
  chosen_spanish: como cuatrocientos hombres
  alternatives_spanish:
  - unos cuatrocientos hombres
  - aproximadamente cuatrocientos hombres
  lexicon: HALOT
  rationale: El prefijo כ marca aproximación. «Como cuatrocientos hombres» es breve, fiel y natural; «hombres» conserva el conteo de varones adultos del séquito de David.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y su revisión posterior en el punto de אֲשֶׁר ל֤וֹ נֹשֶׁא, donde la POB cambió de una formulación más literal («who had a creditor») a una más natural y precisa («who was in debt»). En español se optó por mantener la fuerza literal de la expresión hebrea («tenían acreedor») porque el contexto permite la ambigüedad económica y la nota puede aclararla, sin perder la tensión lexical documentada. También se mantuvo la idiomaticidad en מַר נֶפֶשׁ mediante una nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto; aquí no hay mención del nombre divino.
  - Se eligió «jefe» para שַׂר porque el contexto describe un grupo irregular de seguidores, aunque «comandante» seguiría siendo viable si se privilegia el matiz militar.
  - Se evitó traducir mecánicamente como «every man»; la estructura distributiva se naturalizó con «todos los que».
