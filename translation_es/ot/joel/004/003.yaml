translation:
  language: es
  text: Y echaron suertes por mi pueblo[a]; dieron a un muchacho por una prostituta, y vendieron a una muchacha por vino, y lo bebieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echaron suertes sobre mi pueblo». La expresión hebrea es idiomática y alude al reparto de personas como botín mediante sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  english_pob_choice: for
  chosen_spanish: sobre
  alternatives_spanish:
  - por
  - contra
  - acerca de
  lexicon: HALOT
  rationale: En la locución de echar suertes, la preposición introduce el objeto sobre el cual se reparten las personas como botín. «Sobre» comunica bien el blanco de la acción en español sin perder el matiz del reparto por sorteo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: «Pueblo» conserva el sentido colectivo y de pertenencia pactal mejor que una expresión más vaga. En español bíblico suena natural y mantiene la relación posesiva.
- source_word: יַדּוּ גוֹרָל
  english_pob_choice: they cast lots
  chosen_spanish: echaron suertes
  alternatives_spanish:
  - tiraron la suerte
  - sortearon
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «echar suertes» es la forma estable y transparente en español para ese acto. Evita un calco y preserva el valor técnico del sorteo.
- source_word: וַיִּתְּנוּ
  english_pob_choice: they gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - ofrecieron
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «dar», y el audit trail decidió volver a esa forma más directa. En español, «dieron» conserva la dureza del acto sin introducir la idea de trueque explícito que no está en el verbo mismo.
- source_word: הַיֶּלֶד
  english_pob_choice: a boy
  chosen_spanish: un muchacho
  alternatives_spanish:
  - un niño
  - un joven
  lexicon: HALOT
  rationale: «Muchacho» reproduce el paralelo con «muchacha» en la siguiente línea y mantiene la referencia a un varón joven. «Niño» podría sonar demasiado pequeño; «joven» es menos preciso para la imagen del pasaje.
- source_word: בַּזּוֹנָה
  english_pob_choice: for a prostitute
  chosen_spanish: por una prostituta
  alternatives_spanish:
  - a una prostituta
  - en favor de una prostituta
  lexicon: HALOT
  rationale: La preposición en el contexto marca intercambio o precio. «Por una prostituta» mantiene el tono transaccional y se ajusta al español natural sin suavizar la crudeza del texto.
- source_word: וְהַיַּלְדָּה
  english_pob_choice: and sold a girl
  chosen_spanish: y vendieron a una muchacha
  alternatives_spanish:
  - y vendieron a una niña
  - y a una muchacha
  lexicon: HALOT
  rationale: «Muchacha» conserva el paralelismo con «muchacho» y refleja el término para una joven femenina. El artículo hebreo no exige una referencia a una joven específica conocida; el español puede sonar genérico sin perder fuerza.
- source_word: מָכְרוּ
  english_pob_choice: sold
  chosen_spanish: vendieron
  alternatives_spanish:
  - barataron
  - traficaron con
  lexicon: HALOT
  rationale: El verbo significa simplemente «vender». «Vendieron» mantiene la violencia del acto de forma directa y evita agregar matices interpretativos no requeridos por el hebreo.
- source_word: בַיַּיִן
  english_pob_choice: for wine
  chosen_spanish: por vino
  alternatives_spanish:
  - a cambio de vino
  - en cambio de vino
  lexicon: HALOT
  rationale: La preposición introduce el precio recibido. «Por vino» es la equivalencia más breve y natural en español, y conserva la transacción humillante del texto.
- source_word: וַיִּשְׁתּוּ
  english_pob_choice: and drank it
  chosen_spanish: y lo bebieron
  alternatives_spanish:
  - y bebieron
  - y se lo bebieron
  lexicon: HALOT
  rationale: 'El objeto es implícito: el vino mencionado antes. «Lo bebieron» hace explícito el referente sin añadir contenido y mantiene el cierre seco del versículo.'
theological_decisions:
- issue: Tratamiento del intercambio de personas como botín y su crudeza moral
  english_pob_reading: The verse describes exploitative exchange without softening it; the English POB keeps the sequence of abuse explicit.
  chosen_spanish_reading: 'La traducción conserva la secuencia brutal: sorteo de personas, entrega de un muchacho, venta de una muchacha y consumo del vino.'
  alternative_spanish_readings:
  - La suavización de la escena con verbos menos directos
  - Una paráfrasis que explicite demasiado la explotación
  rationale: El hebreo presenta una denuncia profética con imágenes duras. El español debe mantener esa aspereza para no borrar la carga moral del texto ni oscurecer la denuncia.
  doctrine_reference: Ética profética; dignidad humana
- issue: Relación entre «mi pueblo» y el lenguaje de pertenencia pactal
  english_pob_reading: My people preserves covenantal and possessive force.
  chosen_spanish_reading: «Mi pueblo» se conserva como fórmula de pertenencia y vínculo del hablante con Israel.
  alternative_spanish_readings:
  - «Mi nación»
  - «Mi gente»
  rationale: «Mi pueblo» es la opción más fiel al valor colectivo y relacional del hebreo. En contexto profético, evita reducir el término a una mera categoría étnica o sociológica.
  doctrine_reference: Pacto; identidad del pueblo de Dios
translation_notes:
  revision_awareness: El audit trail inglés revisó la línea de «traded a boy» a «gave a boy» para ajustarse más directamente al verbo hebreo; por eso el español usa «dieron» y no un verbo de trueque más interpretativo. También se retuvo el cierre explícito del acto final con el pronombre objeto («lo bebieron») siguiendo la lógica del texto final revisado.
  spanish_consistency_notes:
  - Se mantuvo «mi pueblo» para עַמִּי, en coherencia con el valor pactal ya documentado.
  - Se usó «echaron suertes» como equivalente idiomático estable de יַדּוּ גוֹרָל.
  - Se preservó la pareja «muchacho/muchacha» para reflejar el paralelismo hebreo.
  - Se evitó «Cristo», «SEÑOR» o formulaciones eclesiales no presentes en el verso.
  - La puntuación reproduce dos miembros principales separados por punto y coma, con encadenamiento final por comas para conservar el ritmo del hebreo.
