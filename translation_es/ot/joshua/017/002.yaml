base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/002.yaml
  text: 'And it was for the remaining sons of Manasseh according to their clans: for the sons of Abiezer[a], and for the sons of Helek, and for the sons of Asriel, and for the sons of Shechem, and for the sons of Hepher, and for the sons of Shemida. These were the male sons of Manasseh son of Joseph[c][b], according to their clans.'
  footnotes:
  - marker: a
    text: Or 'the rest of the descendants of Manasseh.' The Hebrew literally says 'the remaining sons of Manasseh.'
    reason: lexical_alternative
  - marker: b
    text: '''Clans'' renders Hebrew mishpechot, a kinship subdivision within a tribe; ''families'' is a possible alternative.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'the male sons' emphasizes that these are the male lines of Manasseh, in contrast to the daughters of Zelophehad mentioned in the surrounding passage.
    reason: cross_reference
