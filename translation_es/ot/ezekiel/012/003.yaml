base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/012/003.yaml
  text: And you[a], son of man, prepare for yourself baggage for exile, and go into exile by day before their eyes. You shall go into exile from your place to another place before their eyes. Perhaps they will see[b], for they are a rebellious house.
  footnotes:
  - marker: a
    text: Or 'equipment for exile' or 'articles of exile.' The Hebrew refers to the belongings an exile would carry.
    reason: lexical_alternative
  - marker: b
    text: Or 'Perhaps they will understand'; the Hebrew verb is literally 'see,' but can extend to perception.
    reason: lexical_alternative
