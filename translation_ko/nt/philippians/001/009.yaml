id: PHP.1.9
reference: Philippians 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τοῦτο προσεύχομαι ἵνα ἡ ἀγάπη ὑμῶν ἔτι μᾶλλον καὶ μᾶλλον περισσεύῃ ἐν ἐπιγνώσει καὶ πάσῃ αἰσθήσει,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/009.yaml
  text: 'And this I pray: that your love may abound still more and more in knowledge and all discernment,'
translation:
  language: ko
  text: '내가 기도하는 것은 이것이니, 곧 여러분의 사랑이 지식과 모든 분별[a] 안에서 더욱더욱 풍성해지기를 구합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 통찰」 또는 「모든 도덕적 분별」. 헬라어 αἴσθησις는 단순한 감각이 아니라 도덕적·실천적 분별을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τοῦτο
  english_pob_choice: And this
  chosen_korean: 내가 기도하는 것은 이것이니
  alternatives_korean:
  - 그리고 이것
  - 그리고 내가 이것을
  lexicon: BDAG
  rationale: 강조적 지시사 τοῦτο를 한국어로 자연스럽게 살리기 위해 「~하는 것은 이것이니」 구문으로 옮긴다. 영어 POB의 「And this I pray」 어순을 한국어 강조 구조로 반영한다.
- source_word: προσεύχομαι
  english_pob_choice: I pray
  chosen_korean: 기도하는
  alternatives_korean:
  - 간구하는
  lexicon: BDAG
  rationale: 일반적 「기도」를 의미하는 προσεύχομαι에는 「기도하다」가 가장 적합하다. δέησις(간구)와 구별된다.
- source_word: ἵνα
  english_pob_choice: that
  chosen_korean: ~기를 구합니다
  alternatives_korean:
  - ~하도록
  lexicon: BDAG
  rationale: 기도의 내용을 도입하는 ἵνα를 한국어 정중한 청원형 「~기를」로 옮기고, 합쇼체 종결을 위해 「구합니다」를 더한다.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_korean: 사랑
  lexicon: BDAG
  rationale: ἀγάπη의 기본 등가어 「사랑」을 따른다.
- source_word: ἔτι μᾶλλον καὶ μᾶλλον
  english_pob_choice: still more and more
  chosen_korean: 더욱더욱
  alternatives_korean:
  - 더욱 그리고 더욱
  - 점점 더
  lexicon: BDAG
  rationale: ἔτι와 반복되는 μᾶλλον의 점층적 증가를 한국어 「더욱더욱」이 간결하게 담는다.
- source_word: περισσεύῃ
  english_pob_choice: may abound
  chosen_korean: 풍성해지기를
  alternatives_korean:
  - 넘치기를
  - 자라기를
  lexicon: BDAG
  rationale: περισσεύω는 풍성한 넘침을 의미한다. 「풍성해지다」가 그 풍요의 상을 자연스럽게 담는다.
- source_word: ἐν ἐπιγνώσει
  english_pob_choice: in knowledge
  chosen_korean: 지식 ~ 안에서
  alternatives_korean:
  - 지식으로
  - 깊은 지식 안에서
  lexicon: BDAG
  rationale: ἐπίγνωσις는 깊은 인식을 함의하지만, 「지식」으로 충분히 통한다. 영어 POB의 단순한 「knowledge」 결정을 따른다.
- source_word: πάσῃ αἰσθήσει
  english_pob_choice: all discernment
  chosen_korean: 모든 분별
  alternatives_korean:
  - 모든 통찰
  - 모든 도덕적 감각
  lexicon: BDAG
  rationale: αἴσθησις는 도덕적·실천적 분별을 가리킨다. 「분별」이 그 윤리적 함의를 가장 자연스럽게 담는다.
