translation:
  language: es
  text: No te enfrentes con un juez[a], porque él juzgará según su propia voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece un dicho distinto: «Delante de un extraño no hagas nada en secreto, porque no sabes lo que producirá». La lectura hebrea de Cairo Geniza se sigue en el texto principal porque aquí sí se conserva el hebreo, pero la divergencia es sustancial y conviene señalarla.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל / Do not
  english_pob_choice: Do not
  chosen_spanish: No te enfrentes
  alternatives_spanish:
  - No contiendas
  - No litigues
  - No entres en disputa
  lexicon: HALOT
  rationale: La prohibición sapiencial se expresa de forma natural en español con una construcción verbal directa. «Enfrentarse» transmite mejor la idea adversarial que «contender» en español contemporáneo, sin perder el tono de advertencia.
- source_word: תּשָּׁפֵט
  english_pob_choice: contend
  chosen_spanish: te enfrentes
  alternatives_spanish:
  - contiendas
  - litigues
  - disputes
  lexicon: HALOT
  rationale: Aunque el hebreo admite un matiz judicial, la POB inglesa optó por el sentido de conflicto legal. En español, «te enfrentes» conserva el carácter de advertencia contra oponerse a una autoridad judicial, sin sonar artificial.
- source_word: עִם שׁוֹפֵט
  english_pob_choice: with a judge
  chosen_spanish: con un juez
  alternatives_spanish:
  - contra un juez
  - ante un juez
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente «con», pero en español el contraste adversarial queda más claro con «enfrentarse con un juez». Se mantiene «juez» porque el contexto del POB inglés sigue el sentido de una autoridad judicial.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: «Porque» expresa de manera natural la razón de la prohibición en español moderno y fiel al valor causal del hebreo.
- source_word: כִּרְצוֹנוֹ
  english_pob_choice: according to his own will
  chosen_spanish: según su propia voluntad
  alternatives_spanish:
  - como él quiere
  - conforme a su voluntad
  lexicon: HALOT
  rationale: «Voluntad» comunica el matiz de decisión personal o preferencia del juez. «Según su propia voluntad» mantiene el énfasis del original y del POB inglés en la independencia de su criterio.
- source_word: יִשְׁפֹּט
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - decidirá
  - dictará sentencia
  lexicon: HALOT
  rationale: Se conserva el verbo «juzgar» para mantener visible la raíz משפט y el marco jurídico del dicho. «Juzgará» resulta natural en español y corresponde al paralelo inglés.
translation_notes:
  revision_awareness: El pasaje fue revisado en el control inglés y quedó sin cambios; aun así, el expediente señala una divergencia importante entre el hebreo conservado y el paralelo griego. La versión española sigue la lectura hebrea principal del POB y registra la variante griega en nota.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y proverbial.
  - «Juez» se usa con el sentido jurídico del contexto, no como título eclesiástico.
  - La nota de variante textual se ancla en el primer término relevante del versículo para preservar la audibilidad del desvío griego.
