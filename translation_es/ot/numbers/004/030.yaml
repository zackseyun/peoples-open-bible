review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB en el rango de edad, el mandato de contarlos, el sentido distributivo de כָּל הַבָּא y la distinción entre לַצָּבָא (''servicio'') y עֲבֹדַת (''obra/trabajo''). Sin embargo, las notas al pie están desancladas o mal ancladas: la nota inglesa sobre ''everyone who comes for duty'' corresponde a ''todo aquel que entra al servicio'', no a ''en adelante''; y la nota cultural sobre ''servicio'' debe anclarse en ''servicio'', no en ''hasta los cincuenta años''.'
  spanish_quality_summary: El español es claro y digno. 'Desde los treinta años de edad y en adelante' suena algo redundante; 'de treinta años para arriba' sería más coloquial, pero la formulación actual es aceptable. 'Realizar la obra' es comprensible, aunque ligeramente más elevado de lo necesario; aun así preserva bien la distinción léxica. La principal corrección necesaria es de legibilidad editorial y coherencia de notas, no de traducción base.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'La tienda de reunión' concuerda con el POB auditado para אֹהֶל מוֹעֵד. 'Servicio' para לַצָּבָא y 'obra' para עֲבֹדַת respetan la rationale documentada. No aparecen términos sensibles del glosario mayor (Yahvé, Mesías, etc.).
  issues:
  - severity: high
    issue: Las notas a y b están ancladas en lugares equivocados.
    rationale: La nota a ('todo aquel que viene para el deber') comenta כָּל הַבָּא / לַצָּבָא, no el sintagma de edad 'y en adelante'. La nota b explica 'servicio', pero está colocada tras 'cincuenta años de edad'.
  - severity: medium
    issue: El conjunto de notas españolas añade alternativas léxicas no preservadas por el rastro inglés.
    rationale: El inglés solo documenta una alternativa para כָּל הַבָּא y una nota cultural para לַצָּבָא. Las notas sobre 'los registrarás', 'al deber' y 'la labor' no son necesarias y cargan el verso sin apoyo explícito en el audit trail.
  - severity: low
    issue: La correspondencia de marcadores no refleja bien la lógica del pasaje.
    rationale: Para mantener trazabilidad, las notas deben seguir el punto exacto del texto al que explican; esto mejora fidelidad editorial y evita ambigüedad para el lector.
  revised_spanish_text: 'Desde los treinta años de edad y en adelante, hasta los cincuenta años de edad, los contarás: todo aquel que entra[a] al servicio[b] para realizar la obra de la tienda de reunión.'
  revised_footnotes:
  - marker: a
    text: 'O: «todo aquel que viene para el deber».'
    reason: alternative_reading
  - marker: b
    text: «Servicio» traduce un término que también puede denotar una compañía o un cuerpo organizado; aquí se refiere al deber asignado de los levitas.
    reason: cultural_note
  revision_rationale: 'La traducción principal es sustancialmente fiel, pero requiere una reparación editorial: reubicar las notas a los términos que realmente comentan y eliminar notas secundarias no respaldadas por el rastro inglés. También se reemplaza la raya por dos puntos para una puntuación española más natural en este contexto enumerativo, sin alterar el sentido.'
