translation:
  language: es
  text: Esta, pues, es la instrucción[a] de la ley, por la cual aprendemos las realidades divinas[b] con reverencia y las realidades humanas con provecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la disciplina de la ley» o «la instrucción de la ley». El griego παιδεία incluye también el sentido de educación formativa y disciplina moral.
    reason: lexical_alternative
  - marker: b
    text: O «realidades divinas ... realidades humanas». El contraste griego entre τὰ θεῖα y τὰ ἀνθρώπινα abarca categorías amplias.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη δὴ τοίνυν
  english_pob_choice: This, then,
  chosen_spanish: Esta, pues,
  alternatives_spanish:
  - Esta, por tanto,
  - Esta, entonces,
  lexicon: LSJ
  rationale: La secuencia griega introduce una conclusión enfática y enlaza el discurso. «Pues» conserva ese giro inferencial sin forzar una literalidad torpe en español.
- source_word: ἡ τοῦ νόμου παιδεία
  english_pob_choice: the instruction of the law
  chosen_spanish: la instrucción de la ley
  alternatives_spanish:
  - la disciplina de la ley
  - la formación de la ley
  - la educación de la ley
  lexicon: LSJ
  rationale: παιδεία abarca instrucción formativa, disciplina y educación. «Instrucción» sigue de cerca la revisión inglesa final y comunica bien el sentido formativo del pasaje sin perder la referencia a la ley.
- source_word: διʼ ἧς
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - mediante la cual
  - a través de la cual
  lexicon: LSJ
  rationale: La construcción expresa medio o instrumento. «Por la cual» es natural en español y mantiene la relación instrumental con la frase anterior.
- source_word: τὰ θεῖα
  english_pob_choice: divine matters
  chosen_spanish: las realidades divinas
  alternatives_spanish:
  - las cosas divinas
  - los asuntos divinos
  lexicon: LSJ
  rationale: El neutro plural griego es amplio y no se limita a «cosas» en sentido material. «Realidades divinas» preserva la amplitud conceptual y suena más digno en español que una traducción demasiado literal.
- source_word: σεμνῶς
  english_pob_choice: reverently
  chosen_spanish: con reverencia
  alternatives_spanish:
  - con dignidad
  - solemnemente
  lexicon: LSJ
  rationale: El adverbio comunica gravedad, respeto y dignidad. «Con reverencia» conserva el matiz religioso y encaja bien con «realidades divinas».
- source_word: τὰ ἀνθρώπινα
  english_pob_choice: human matters
  chosen_spanish: las realidades humanas
  alternatives_spanish:
  - los asuntos humanos
  - las cosas humanas
  lexicon: LSJ
  rationale: Mantiene el paralelismo con τὰ θεῖα y evita estrechar el contraste. «Realidades humanas» reproduce el alcance general del griego.
- source_word: συμφερόντως
  english_pob_choice: profitably
  chosen_spanish: con provecho
  alternatives_spanish:
  - beneficiosamente
  - útilmente
  - provechosamente
  lexicon: LSJ
  rationale: El adverbio apunta a lo útil, ventajoso o que trae beneficio. «Con provecho» expresa esa idea con claridad y en un registro bíblico sobrio.
- source_word: μανθάνομεν
  english_pob_choice: we learn
  chosen_spanish: aprendemos
  alternatives_spanish:
  - nos instruimos
  - llegamos a conocer
  lexicon: LSJ
  rationale: El verbo es directo y gnómico. «Aprendemos» es la opción más natural y fiel al presente general del enunciado.
theological_decisions:
- issue: Referencia de νόμος
  english_pob_reading: law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  rationale: El griego dice τοῦ νόμου sin marcar capitalización especial. En 4 Macabeos alude a la ley judía/Torá, pero «la ley» conserva la forma del texto y evita una mayúscula interpretativa no explicitada por el original.
  doctrine_reference: Primacía del texto original; respeto a la referencia judía sin sobreatribución tipográfica.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al preferir «instrucción» para παιδεία, omitir un equivalente innecesario de «both» y usar un término sobrio para συμφερόντως. Se ha conservado la tensión léxica de παιδεία mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «la ley» en minúscula para reflejar el griego sin imponer una convención doctrinal.
  - «Realidades» se usa de forma consistente para ambos neutros plurales, preservando el paralelismo del original.
  - El registro es formal y eclesialmente legible, sin recurrir a calcos rígidos.
