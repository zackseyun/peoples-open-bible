theological_decisions:
- issue: Nature of the love term φιλῶ in relation to divine correction
  chosen_reading: Rendered as 'love' without weakening it to mere affection
  alternative_readings:
  - have affection for
  rationale: The verse grounds rebuke and discipline in genuine divine love. Translating with the full term 'love' preserves the theological force of loving correction without importing a technical distinction between φιλέω and ἀγαπάω that the context does not require.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Meaning of παιδεύω
  chosen_reading: Rendered as 'discipline' rather than punitive-only language
  alternative_readings:
  - chasten
  - punish
  - train
  rationale: The term includes corrective formation, not only punishment. 'Discipline' preserves the text's portrayal of the Lord's action as both corrective and formative, avoiding doctrinal overstatement toward either harsh retribution or mere instruction.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text does not make.
