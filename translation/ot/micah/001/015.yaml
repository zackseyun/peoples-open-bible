theological_decisions:
- issue: Referent of 'the glory of Israel'
  chosen_reading: Rendered literally without specifying whether it refers to nobles, wealth, or the nation's splendor/personified leadership.
  alternative_readings:
  - the nobility of Israel
  - the wealth of Israel
  rationale: The Hebrew permits multiple closely related senses. To preserve theological and literary tension, the main text keeps the broader phrase 'the glory of Israel,' while alternatives are preserved in a footnote rather than narrowing the referent beyond what the text requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
