translation:
  language: es
  text: Entonces haré con la casa que es llamada por mi nombre[a], en la que ustedes confían, y con el lugar que les di a ustedes y a sus padres[b], tal como hice con Silo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sobre la cual es llamado mi nombre». Este modismo hebreo indica que la casa pertenece a Yahvé o está identificada con él.'
    reason: lexical_alternative
  - marker: b
    text: Silo fue el antiguo sitio del santuario cuya destrucción sirvió como advertencia; véanse 1 Samuel 4 y Jeremías 7:12.
    reason: cross_reference
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: So I will do
  chosen_spanish: Entonces haré
  alternatives_spanish:
  - Y haré
  - Haré
  lexicon: HALOT
  rationale: El hebreo enlaza esta acción con la advertencia anterior; «Entonces» expresa bien la fuerza inferencial de la conjunción sin perder la inmediatez del juicio anunciado. El verbo queda en forma directa, como en el original.
- source_word: לַבַּיִת
  english_pob_choice: to the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - al templo
  lexicon: HALOT
  rationale: «Casa» conserva el término hebreo. En Jeremías se refiere al templo, pero la equivalencia más literal mantiene la distinción entre la «casa» y el «lugar» de la cláusula siguiente.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: that is called by my name
  chosen_spanish: que lleva mi nombre
  alternatives_spanish:
  - sobre la cual se invoca mi nombre
  - sobre la que es llamado mi nombre
  lexicon: HALOT
  rationale: El español naturaliza el idiomismo hebreo de pertenencia/identificación con Dios mediante «lleva mi nombre». Así se conserva el sentido de que la casa pertenece a Yahvé o está identificada con él, sin endurecer la frase con un calco incómodo.
- source_word: אֲשֶׁר אַתֶּם בֹּטְחִים בּוֹ
  english_pob_choice: in which you trust
  chosen_spanish: en la que ustedes confían
  alternatives_spanish:
  - en la cual confían
  - en la que confían
  lexicon: HALOT
  rationale: El participio expresa una confianza continua. «Confían» comunica esa actitud sostenida de manera natural en español y mantiene la relación con la «casa» como antecedente.
- source_word: וְלַמָּקוֹם
  english_pob_choice: and to the place
  chosen_spanish: y al lugar
  alternatives_spanish:
  - y al sitio
  - y al lugar este
  lexicon: HALOT
  rationale: «Lugar» preserva la distinción léxica frente a «casa». No se añade demostrativo, porque no está presente en el hebreo de este versículo.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבוֹתֵיכֶם
  english_pob_choice: that I gave to you and to your fathers
  chosen_spanish: que di a ustedes y a sus padres
  alternatives_spanish:
  - que di a ustedes y a sus antepasados
  - que les di a ustedes y a sus padres
  lexicon: HALOT
  rationale: Se conserva «padres» porque el hebreo dice literalmente «fathers» y el proyecto prioriza correspondencia fuente-texto. La repetición de la preposición se refleja con un español claro y sobrio.
- source_word: כַּאֲשֶׁר עָשִׂיתִי לְשִׁלֹה
  english_pob_choice: just as I did to Shiloh
  chosen_spanish: tal como hice con Silo
  alternatives_spanish:
  - como hice con Silo
  - del mismo modo que hice con Silo
  lexicon: HALOT
  rationale: «Tal como» reproduce bien la comparación explícita del hebreo. Se translitera el topónimo como «Silo», forma usual en español para el lugar histórico.
theological_decisions:
- issue: Mantener la idiomática de pertenencia del nombre divino sin diluirla en interpretación posterior
  english_pob_reading: that is called by my name
  chosen_spanish_reading: que lleva mi nombre
  alternative_spanish_readings:
  - sobre la cual se invoca mi nombre
  - que es llamada por mi nombre
  rationale: El hebreo expresa una relación de posesión/identificación del santuario con Yahvé. «Lleva mi nombre» comunica esa relación con naturalidad en español, preservando la fuerza teológica sin convertirla en una paráfrasis más doctrinal que el texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Distinguir entre la casa y el lugar para no borrar el alcance del juicio profético
  english_pob_reading: house ... place
  chosen_spanish_reading: casa ... lugar
  alternative_spanish_readings:
  - templo ... lugar
  - casa ... sitio
  rationale: El hebreo distingue deliberadamente entre el edificio sagrado y el emplazamiento más amplio. Mantener esa distinción en español ayuda a conservar el alcance de la advertencia y su eco histórico con Silo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Conservar la referencia histórica a Silo como precedente de juicio
  english_pob_reading: just as I did to Shiloh
  chosen_spanish_reading: tal como hice con Silo
  alternative_spanish_readings:
  - como hice con Silo
  - tal como hice a Silo
  rationale: La comparación final apela a un caso histórico de juicio previo sobre un santuario anterior. Mantener el nombre propio y la comparación directa deja intacta la advertencia profética.
  doctrine_reference: 1 Samuel 4; Jeremías 7:12
translation_notes:
  revision_awareness: Coincide con el último pase de revisión del texto fuente en que no se registraron cambios y el estado de concordancia fue alto; por eso la redacción española sigue de cerca la solución auditada del inglés POB sin introducir ajustes no motivados por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el corpus, pero en este versículo el Tetragrámaton no aparece explícitamente; la referencia divina queda implícita en el modismo «mi nombre».
  - Se mantiene la distinción «casa»/«lugar» para reflejar el hebreo.
  - «Silo» se escribe con una sola ele, conforme al uso normal en español.
  - No se traduce «fathers» por «ancestros», para conservar la correspondencia con el hebreo y la política del proyecto.
