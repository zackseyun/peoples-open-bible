translation:
  language: es
  text: Dejan salir a sus pequeños como un rebaño[a][b], y sus hijos danzan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rebaño» traduce el colectivo צֹאן; también puede entenderse como «ovejas».
    reason: lexical_alternative
  - marker: b
    text: «Pequeños» conserva el matiz de niños muy jóvenes sin limitarlo estrictamente a «infantes».
    reason: lexical_alternative
  - marker: c
    text: «Danzan» refleja el movimiento gozoso del verbo hebreo; también puede expresarse como «saltan» o «brincan».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלְּחוּ
  english_pob_choice: they send out
  chosen_spanish: envían
  alternatives_spanish:
  - dejan salir
  - mandan fuera
  - sueltan
  lexicon: HALOT
  rationale: El piel de שלח aquí expresa la acción de hacer salir o dejar ir. «Envían» conserva la iniciativa verbal y suena natural en español, sin cargar el sentido con una idea más dura que el contexto no exige.
- source_word: כַצֹּאן
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como ovejas
  - como un hato
  lexicon: HALOT
  rationale: צֹאן designa ganado menor en conjunto, especialmente ovejas y cabras. «Rebaño» preserva el valor colectivo mejor que «ovejas» individualiza, y funciona bien en español sin perder la imagen comparativa del hebreo.
- source_word: עֲוִילֵיהֶם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños pequeños
  - sus infantes
  - sus criaturas
  lexicon: HALOT
  rationale: עויל se refiere a niños muy pequeños. «Pequeños» mantiene el matiz diminutivo y evita restringir demasiado a recién nacidos, coherente con el paralelo del siguiente colon.
- source_word: וְיַלְדֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su prole
  - sus descendientes
  lexicon: HALOT
  rationale: El sustantivo ילד en este plural nominal puede abarcar hijos/niños. «Hijos» es una equivalencia directa y idiomática en español; el contexto familiar y paralelo hace innecesario ampliar a un término más abstracto.
- source_word: יְרַקֵּדוּן
  english_pob_choice: dance
  chosen_spanish: danzan
  alternatives_spanish:
  - saltan
  - brincan
  - bailan
  lexicon: HALOT
  rationale: רקד denota movimiento vivo, como bailar o saltar con alegría. «Danzan» conserva el vigor poético y evita la posible coloquialidad de «bailan» en un registro bíblico solemne; además refleja bien la imagen de libertad y prosperidad.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de Job 21:11 y coincide con la línea interpretativa del inglés POB: imagen colectiva de hijos pequeños y niños que se mueven con libertad y gozo. No hay revisiones aplicadas en el contexto inglés; por eso se mantiene la estructura poética en dos miembros con equivalencia semántica transparente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este pasaje.
  - Se prefirió vocabulario bíblico claro y actual, evitando calcos innecesarios.
  - La combinación «pequeños» / «hijos» conserva la distinción entre los dos miembros hebreos sin borrar la leve tensión de edad entre עֲוִילֵיהֶם y יַלְדֵיהֶם.
