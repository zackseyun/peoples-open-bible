  yaml_path: translation/ot/1_samuel/017/055.yaml
  text: When Saul saw David going out to meet the Philistine[a], he said to Abner, the commander of the army, “Whose son is this young man, Abner?” And Abner said, “As your soul lives, O king, I do not know.”
