id: 2MA.15.17
reference: 2 Maccabees 15:17
source:
  edition: lxx-swete-1909
  text: Παρακληθέντες δὲ τοῖς Ἰούδου λόγοις πάνυ καλοῖς καὶ δυναμένοις ἐπ' ἀρετὴν παρορμῆσαι καὶ ψυχὰς νέων ἐπανδρῶσαι, διέγνωσαν μὴ στρατεύεσθαι, γενναίως δὲ ἐφέρεσθαι, καὶ μετὰ πάσης εὐανδρείας ἐμπλακέντες κρῖναι τὰ πράγματα, διὰ τὸ καὶ τὴν πόλιν καὶ τὰ ἅγια καὶ τὸ ἱερὸν κινδυνεύειν.
