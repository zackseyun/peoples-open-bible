  to: Entonces el sacerdote la examinará después de que la mancha haya sido lavada; y si la mancha no ha cambiado de apariencia[a] y la mancha no se ha extendido, es impura. La quemarás en el fuego; es una mancha corrosiva[b], ya sea en su lado desgastado[c] o en su lado pelado[c].
  rationale: Se reemplazó «plaga» por «mancha» para reflejar mejor נגע en este contexto de deterioro en material lavable; se corrigió la nota [a] para preservar la alternativa léxica documentada sobre apariencia/color; se ajustó «es inmunda» a «es impura» para un español más natural; y se afinó «lado desnudo» a «lado pelado» para una imagen material más idiomática sin apartarse del hebreo ni del audit trail.
