translation:
  language: es
  text: La hija de Egipto es avergonzada; es entregada en la mano de[a] un pueblo del norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la mano de», un modismo que significa «en poder de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישָׁה
  english_pob_choice: is put to shame
  chosen_spanish: es puesta en vergüenza
  alternatives_spanish:
  - ha sido puesta en vergüenza
  - es avergonzada
  - es deshonrada
  lexicon: HALOT
  rationale: El hifil de בוש expresa causar vergüenza o quedar avergonzada. «Es puesta en vergüenza» mantiene el valor pasivo/resultativo y el tono judicial del oráculo. «Avergonzada» puede funcionar, pero «puesta en vergüenza» conserva mejor la idea de afrenta pública.
- source_word: בַּת מִצְרַיִם
  english_pob_choice: the daughter of Egypt
  chosen_spanish: la hija de Egipto
  alternatives_spanish:
  - hija de Egipto
  - Egipto
  - la joven de Egipto
  lexicon: HALOT
  rationale: Se conserva la personificación profética. «La hija de Egipto» reproduce el giro metafórico y evita borrar la imagen femenina aplicada a la nación.
- source_word: נִתְּנָה
  english_pob_choice: she is given
  chosen_spanish: es entregada
  alternatives_spanish:
  - ha sido entregada
  - es dada
  - es puesta en manos
  lexicon: HALOT
  rationale: 'El nifal de נתן aquí es pasivo: la nación es entregada al poder ajeno. «Entregada» es más natural en español que un simple «dada» y mantiene la idea de rendición forzada.'
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - al poder de
  - en poder de
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo en una forma española idiomática. «En manos de» comunica la transferencia de dominio sin sonar artificial; equivale al valor idiomático de «into the hand of».
- source_word: עַם צָפוֹן
  english_pob_choice: a people from the north
  chosen_spanish: un pueblo del norte
  alternatives_spanish:
  - un pueblo norteño
  - el pueblo del norte
  - un ejército del norte
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pueblo de norte». «Un pueblo del norte» mantiene la indefinición y no identifica de forma interpretativa al invasor, siguiendo la prudencia del texto fuente.
theological_decisions:
- issue: Identificación histórica del pueblo del norte
  english_pob_reading: Leave the phrase generic as 'a people from the north'
  chosen_spanish_reading: 'Dejar la frase genérica: «un pueblo del norte»'
  alternative_spanish_readings:
  - identificarlo como Babilonia
  - traducirlo como «el ejército del norte»
  rationale: El hebreo no nombra a Babilonia; por eso la traducción debe conservar la formulación profética abierta. Esto preserva la tensión interpretativa documentada en el original y evita resolverla en el texto principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y respeta la decisión de no identificar explícitamente al pueblo del norte. No se introdujeron cambios textuales respecto del testigo hebreo base.
  spanish_consistency_notes:
  - Se mantuvo «Egipto» como complemento del sustantivo personificado «hija» para conservar la metáfora.
  - «En manos de» fue elegido como equivalente idiomático natural de בְּיַד, sin perder la imagen corporal hebrea.
  - Se evitó «Mesías/Cristo» u այլ terminología no pertinente; el registro es profético y narrativo, no litúrgico.
