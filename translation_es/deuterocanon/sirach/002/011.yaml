review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el griego paralelo: mantiene Yahvé por יְהֹוָה, conserva la pareja atributiva, traduce וְסוֹלֵחַ como acción característica (''perdona''), retiene la fuerza de לַעֲוֹנוֹת con ''iniquidades'' y expresa bien בְּעֵת צָרָה. La única corrección necesaria es formal: el marcador de nota [a] debe aparecer exactamente en el texto, y conviene ajustar la nota para que el par tradicional corresponda mejor al original.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''Compasivo y clemente'' funciona, aunque ''clemente'' se aleja un poco del matiz más habitual de חַנּוּן/ἐλεήμων; aun así sigue siendo aceptable en contexto. ''En tiempo de angustia'' suena natural. El principal problema de calidad es de formato/proyecto: falta el anclaje [a] en el texto.'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: ''Yahvé'' está correcto; no hay conflictos con Mesías/Cristo ni otras entradas. La nota alternativa debe armonizar mejor la pareja tradicional con el original; ''misericordioso y clemente'' mezcla una alternativa tradicional fuerte para el primer término con una opción menos tradicional para el segundo, mientras que ''misericordioso y gracious'' en español se expresa mejor como ''misericordioso y benévolo'' o, si se busca fórmula bíblica tradicional, ''misericordioso y clemente'' sigue siendo defendible pero menos precisa para explicar la alternativa al inglés.'
  issues:
  - severity: medium
    issue: Falta el marcador de nota [a] en el texto español.
    rationale: Las instrucciones exigen que toda nota tenga su marcador exacto en `spanish_text`. El borrador incluye la nota, pero no su anclaje.
  - severity: low
    issue: La nota léxica alternativa puede formularse con mayor precisión.
    rationale: Si la nota pretende reflejar la alternativa inglesa 'merciful and gracious', 'misericordioso y clemente' no reproduce de forma ideal el segundo adjetivo. Conviene explicar la alternativa tradicional sin crear un falso emparejamiento demasiado rígido.
  revised_spanish_text: Porque Yahvé es compasivo y clemente[a]; perdona las iniquidades y salva en tiempo de angustia.
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, 'misericordioso y benévolo'. El hebreo רָחוּם וְחַנּוּן y el griego οἰκτίρμων καὶ ἐλεήμων forman una fórmula bíblica conocida para describir el carácter de Dios.
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal porque es fiel, natural y compatible con las decisiones documentadas, pero se corrige el incumplimiento formal del marcador de nota y se afina la nota alternativa para reflejar mejor la explicación léxica sin ambigüedad innecesaria.
