review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo: imperativos de confianza y obediencia a Yahvé, promesa de exaltación, herencia de la tierra, y contemplación del juicio de los malvados. Sin embargo, en dos puntos se aleja del rastro auditado: (1) לָרֶשֶׁת אָרֶץ fue documentado en inglés como ''inherit the land'' con nota sobre ''earth''; el español principal ''la tierra'' desplaza innecesariamente el énfasis pactal principal. (2) בְּהִכָּרֵת רְשָׁעִים fue documentado como ''when the wicked are cut off''; ''sean exterminados'' debilita la imagen idiomática de כרת y sobreinterpreta el resultado.'
  spanish_quality_summary: El español es claro y digno, pero puede ajustarse para sonar más fiel y natural a la vez. 'Espera en Yahvé' funciona bien. 'Guarda su camino' también. 'Él te exaltará para heredar la tierra' es comprensible, aunque 'la tierra' conviene cambiarse a 'la tierra/país' solo en nota y dejar 'la tierra' fuera del texto principal si se busca amplitud; no obstante, aquí el proyecto inglés ya prefirió 'land', por lo que 'la tierra' principal no refleja bien esa decisión. 'Sean exterminados' suena más fuerte y menos idiomático que 'sean eliminados' o mejor 'sean arrancados/cortados', y pierde el matiz judicial-covenantal señalado.
  glossary_alignment: Alineación buena en Yahvé. No hay conflicto con la glosa del proyecto en Mesías/Cristo u otros términos. La principal desalineación terminológica está en no reflejar la preferencia auditada por 'land' en אָרֶץ y en sustituir la fuerza idiomática de כרת por 'exterminados'.
  issues:
  - severity: medium
    issue: אָרֶץ se vierte como 'tierra' en el texto principal, pese a que el POB inglés decidió 'land' como lectura principal.
    rationale: 'En este salmo, la herencia de la ''tierra/país'' tiene matiz pactal repetido. En español, ''la tierra'' puede conservar amplitud, pero aquí el rastro auditado ya fijó como principal el equivalente de ''land''. Conviene reflejarlo con ''la tierra'' solo en nota alternativa y usar ''la tierra'' no resuelve la preferencia; mejor ''la tierra'' no, sino ''la tierra''... En español la opción más clara para ''land'' es ''la tierra'' o ''el país'', pero ''el país'' suena demasiado estrecho. La mejor reparación es explicitar en nota la alternativa ''la tierra'' y mantener en el texto una formulación que favorezca herencia territorial sin sonar rígida: ''la tierra'' sigue siendo posible, pero la nota actual no representa bien la decisión inglesa. Dado el uso normal bíblico en español, puede mantenerse ''la tierra'' con nota corregida hacia ''O «la tierra»/«la tierra entera»'' no es ideal; mejor revisar la nota para decir que también puede significar ''la tierra'' en sentido más amplio. '
  - severity: high
    issue: '''Sean exterminados'' para בְּהִכָּרֵת רְשָׁעִים sobretraduce y pierde la imagen de ''ser cortados''.'
    rationale: El inglés auditado preserva deliberadamente 'cut off' por su fuerza idiomática judicial/covenantal. 'Exterminados' añade una connotación moderna de aniquilación masiva y borra la metáfora léxica central. Debe reemplazarse por 'cuando los malvados sean eliminados' o preferiblemente 'cuando los malvados sean cortados' con nota aclaratoria.
  - severity: low
    issue: Las notas no siguen bien el contenido del audit trail inglés.
    rationale: La nota [a] en inglés pertenece a 'land/earth', no a 'keep his way'. La nota sobre קוה ('Wait for/Hope in') también falta del texto español revisado si se desea preservar la alternativa léxica documentada. Además, la referencia cruzada a Mateo 5:5 se omitió sin necesidad.
  revised_spanish_text: Espera en Yahvé[a] y guarda su camino, y él te exaltará para heredar la tierra[b]; cuando los malvados sean cortados[c], lo verás.
  revised_footnotes:
