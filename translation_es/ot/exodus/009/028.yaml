translation:
  language: es
  text: Oren a Yahvé[a], porque ya ha habido bastante trueno de Dios y granizo. Entonces los dejaré ir, y no seguirán quedándose más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «voces de Dios y granizo». Aquí «voces» se refiere al trueno en la tormenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעְתִּירוּ
  english_pob_choice: Pray
  chosen_spanish: Rueguen
  alternatives_spanish:
  - Oren
  - Suplicen
  - Intercedan
  lexicon: HALOT
  rationale: El imperativo hifil plural de עתר expresa pedir con insistencia o interceder. «Rueguen» conserva la fuerza exhortativa y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título.'
- source_word: וְרַב מִהְיֹת
  english_pob_choice: for there has been enough
  chosen_spanish: porque ha habido bastante
  alternatives_spanish:
  - porque ya es suficiente
  - porque basta
  lexicon: HALOT
  rationale: La idiomática hebrea comunica suficiencia/exceso. «Ha habido bastante» reproduce bien la idea de que el azote ya es demasiado y debe cesar.
- source_word: קֹלֹת אֱלֹהִים
  english_pob_choice: God's thunder
  chosen_spanish: los truenos de Dios
  alternatives_spanish:
  - las voces de Dios
  - los truenos divinos
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «voces», el contexto de granizo y tormenta indica «trueno». «Los truenos de Dios» mantiene la referencia genitiva y evita una literalidad opaca.
- source_word: וּבָרָד
  english_pob_choice: and hail
  chosen_spanish: y del granizo
  alternatives_spanish:
  - y granizo
  - y del granizo caído
  lexicon: HALOT
  rationale: El sustantivo es directo; el artículo y la contracción «del» ayudan a la fluidez en español dentro de la construcción coordinada.
- source_word: וַאֲשַׁלְּחָה אֶתְכֶם
  english_pob_choice: Then I will let you go
  chosen_spanish: Entonces los dejaré ir
  alternatives_spanish:
  - Entonces los soltaré
  - Entonces los liberar é
  lexicon: HALOT
  rationale: En Éxodo, שׁלח con objeto humano suele significar despedir o dejar ir. «Los dejaré ir» conserva el valor narrativo de liberar al pueblo sin introducir un término demasiado técnico.
- source_word: וְלֹא תֹסִפוּן לַעֲמֹד
  english_pob_choice: and you will stay no longer
  chosen_spanish: y ya no tendrán que quedarse
  alternatives_spanish:
  - y no seguirán quedándose
  - y ya no permanecerán
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «no seguir añadir a permanecer». En español, «ya no tendrán que quedarse» transmite la idea de cese del retraso/estancia con naturalidad.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio revelado a Israel siguiendo el marco del proyecto; no se enmascara con un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de קֹלֹת אֱלֹהִים
  english_pob_reading: God's thunder
  chosen_spanish_reading: los truenos de Dios
  alternative_spanish_readings:
  - las voces de Dios
  - los truenos divinos
  rationale: El entorno inmediato es la plaga de tormenta con granizo; por eso el sentido meteorológico de «trueno» es el más probable, sin perder la atribución a Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; este borrador conserva la decisión de traducir קֹלֹת אֱלֹהִים de manera contextual como trueno, y mantiene Yahvé para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se traduce la idiomática hebrea de suficiencia con una formulación natural en español, sin perder la idea de «ya basta».
  - «Los truenos de Dios» conserva el genitivo del original y el contexto de la tormenta.
  - La puntuación separa la petición inicial, la razón, y la promesa final para reflejar la estructura hebrea y la fluidez del español.
