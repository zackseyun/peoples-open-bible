translation:
  language: es
  text: Y envió de vuelta todos los vasos[a] que Ciro había apartado de Babilonia; y todo lo que Ciro había dicho que se hiciera, él mismo también ordenó que se hiciera y se enviara a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «objetos». El contexto de restitución de objetos del templo favorece «vasos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent back
  chosen_spanish: envió de vuelta
  alternatives_spanish:
  - despachó
  - envió
  lexicon: LSJ
  rationale: El verbo compuesto puede significar enviar o despachar, pero el contexto de restitución de utensilios del templo exige en español una dirección de retorno. «Envió de vuelta» preserva ese matiz sin añadir más de lo que el griego exige.
- source_word: τὰ σκεύη
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los vasos sagrados
  - los objetos
  lexicon: LSJ
  rationale: En este contexto bíblico se trata de objetos del templo, pero «vessels» en español puede sonar demasiado estrecho o técnico. «Utensilios» conserva la referencia material y funciona con naturalidad en español; «vasos» sería posible, pero menos amplio y puede sonar más marcado litúrgicamente.
- source_word: ἃ ἐχώρισεν
  english_pob_choice: that ... had set apart
  chosen_spanish: que Ciro había apartado
  alternatives_spanish:
  - que Ciro había separado
  - que Ciro había designado aparte
  lexicon: LSJ
  rationale: χωρίζω literalmente es «separar», pero aquí la acción de Ciro es de apartar para restitución. «Apartado» comunica la designación previa sin perder la idea de separación.
- source_word: ἀπὸ Βαβυλῶνος
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  - fuera de Babilonia
  lexicon: LSJ
  rationale: La preposición indica procedencia; «de Babilonia» es la forma natural en español y conserva la relación espacial.
- source_word: πάντα ὅσα εἶπεν Κῦρος ποιῆσαι
  english_pob_choice: everything that Cyrus had said to do
  chosen_spanish: todo lo que Ciro había dicho que se hiciera
  alternatives_spanish:
  - todo lo que Ciro había dicho que se hiciese
  - todo lo que Ciro había dicho que se hiciera realizar
  lexicon: LSJ
  rationale: El griego es elíptico y expresa una orden/indicación de acción. La pasiva impersonal en español («que se hiciera») mantiene esa fuerza sin forzar una paráfrasis más explícita de la que permite el texto.
- source_word: καὶ αὐτὸς
  english_pob_choice: he himself also
  chosen_spanish: él mismo también
  alternatives_spanish:
  - y él también
  - y él mismo
  lexicon: LSJ
  rationale: El pronombre es enfático. «Él mismo también» preserva el énfasis y el valor aditivo de καί en un español idiomático.
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: LSJ
  rationale: Es un verbo administrativo de mandato. «Ordenó» es la equivalencia más directa y clara en español moderno.
- source_word: ποιῆσαι καὶ ἐξαποστεῖλαι
  english_pob_choice: to be done and sent
  chosen_spanish: que se hiciera y se enviara
  alternatives_spanish:
  - que se hiciera y se mandara
  - que se ejecutara y se enviara
  lexicon: LSJ
  rationale: Después de «ordenó», el español natural requiere subordinadas de mandato en pasiva impersonal. «Se hiciera y se enviara» refleja la pasividad del original, evitando atribuir a Ciro la ejecución material de la acción.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: LSJ
  rationale: Dirección estándar en español para εἰς con destino geográfico.
theological_decisions:
- issue: Restitución de los utensilios del templo y alcance del mandato de Ciro
  english_pob_reading: 'The verse describes restoration: Cyrus''s temple vessels are sent back, and the actions he had authorized are carried out and sent to Jerusalem.'
  chosen_spanish_reading: 'El versículo describe una restitución: los utensilios del templo son enviados de vuelta, y lo que Ciro había autorizado se hace y se manda a Jerusalén.'
  alternative_spanish_readings:
  - El versículo describe el regreso de los vasos del templo y la ejecución de lo mandado por Ciro.
  - El versículo describe la remisión de los objetos sagrados y la realización de lo que Ciro había ordenado.
  rationale: No hay un problema doctrinal directo, pero sí una tensión lexical entre simple envío y devolución restaurativa. La versión española conserva la lectura de restitución implícita en el contexto, sin exagerarla con lenguaje interpretativo adicional.
  doctrine_reference: Restauración del culto del templo; contexto histórico-literario de la reconstrucción en Esdras.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para eliminar un segundo «to be» antes de «sent» y quedó como una cláusula final coordinada natural: «ordered to be done and sent to Jerusalem». La traducción española sigue ese estado más reciente y conserva la coordinación final con dos pasivas impersonales: «se hiciera y se enviara».'
  spanish_consistency_notes:
  - Se mantiene «Ciro» como forma estable del nombre propio, coherente con el audit trail inglés y el uso bíblico estándar en español.
  - Se evita «SEÑOR» u otra sustitución teológica, porque el versículo no contiene el nombre divino.
  - «Jerusalén» se conserva como destino geográfico literal; no se amplía a una nota interpretativa sobre el templo porque el texto ya aporta el contexto suficiente.
  - «Envió de vuelta» refleja mejor la dirección restaurativa que un simple «envió», siguiendo la decisión inglesa auditada de «sent back» en este contexto.
