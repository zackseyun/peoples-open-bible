translation:
  language: es
  text: Los soberbios han escondido una trampa para mí[a], y con cuerdas han tendido una red junto al sendero[b]; han puesto lazos para mí. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrogantes».
    reason: lexical_alternative
  - marker: b
    text: O «al lado del camino» o «junto a la vereda».
    reason: lexical_alternative
  - marker: c
    text: «Selah» probablemente es una indicación litúrgica o musical; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: טָמְנוּ
  english_pob_choice: have hidden
  chosen_spanish: han escondido
  alternatives_spanish:
  - han ocultado
  - han enterrado
  lexicon: HALOT
  rationale: טמן expresa ocultar o esconder algo con intención de emboscada. «Han escondido» conserva la imagen de una trampa preparada en secreto y suena natural en español.
- source_word: גֵאִים
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: HALOT
  rationale: El hebreo describe personas altivas o insolentes. En español, «soberbios» mantiene el matiz moral fuerte y funciona bien en poesía bíblica; «orgullosos» puede sonar más general y menos intensamente ético.
- source_word: פַּח
  english_pob_choice: a trap
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: HALOT
  rationale: פַּח designa un dispositivo para atrapar. «Trampa» distingue este término de la «red» posterior y preserva la diferencia léxica del verso.
- source_word: וַחֲבָלִים
  english_pob_choice: with cords
  chosen_spanish: con cuerdas
  alternatives_spanish:
  - con cordeles
  - con sogas
  lexicon: HALOT
  rationale: חבלים son cuerdas o sogas. «Con cuerdas» es claro, neutral y refleja el uso instrumental del sintagma.
- source_word: פָּרְשׂוּ רֶשֶׁת
  english_pob_choice: they have spread a net
  chosen_spanish: han tendido una red
  alternatives_spanish:
  - han extendido una red
  - han puesto una red
  lexicon: HALOT
  rationale: La combinación verbal + sustantivo expresa extender una red para capturar. «Tender una red» es idiomático en español y conserva la acción de preparar una emboscada.
- source_word: לְיַד מַעְגָּל
  english_pob_choice: beside the path
  chosen_spanish: junto al sendero
  alternatives_spanish:
  - al lado del camino
  - junto al camino
  lexicon: HALOT
  rationale: ליד significa «junto a, al lado de». מַעְגָּל puede referirse a un camino, senda o ruta. «Sendero» mantiene la imagen de una vía transitada sin volver el verso demasiado prosaico.
- source_word: מֹקְשִׁים
  english_pob_choice: snares
  chosen_spanish: trampas
  alternatives_spanish:
  - lazos
  - snares
  lexicon: HALOT
  rationale: מֹקְשִׁים denota obstáculos o trampas para hacer caer. «Trampas» evita repetir «red» y comunica adecuadamente el plural de mecanismos de captura.
- source_word: שָׁתוּ
  english_pob_choice: they have set
  chosen_spanish: han puesto
  alternatives_spanish:
  - han colocado
  - han dispuesto
  lexicon: HALOT
  rationale: שׁית/שׂים significa poner o colocar. «Han puesto» es directo y natural; en contexto con trampas y redes, transmite bien la preparación deliberada.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Sela
  lexicon: HALOT
  rationale: Se conserva la transliteración porque el sentido exacto es incierto y probablemente funciona como marca litúrgica o musical. No se intenta traducir con conjetura.
translation_notes:
  revision_awareness: Se respetó la revisión más reciente del POB en cuanto a no añadir puntuación final después de «Selah». También se mantuvo la distinción léxica entre trampa/red/snares y la nota sobre la ambigüedad de לְיַד מַעְגָּל.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo un registro poético pero claro, evitando arcaísmos innecesarios.
  - Se distinguió «trampa», «red» y «trampas» para reflejar la diversidad léxica del hebreo.
  - «Soberbios» se eligió como equivalente fuerte y bíblico de גֵאִים, con nota alternativa para «arrogantes».
