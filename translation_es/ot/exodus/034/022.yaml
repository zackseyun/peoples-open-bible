translation:
  language: es
  text: Celebrarás la Fiesta de las Semanas, las primicias de la cosecha del trigo, y la Fiesta de la Recolección al giro del año[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'al final del año'. La frase hebrea se refiere literalmente al giro o ciclo del año.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג
  english_pob_choice: Feast
  chosen_spanish: Fiesta
  alternatives_spanish:
  - festividad
  - fiesta festiva
  lexicon: HALOT
  rationale: En este contexto cultual, חַג nombra una celebración ritual establecida. 'Fiesta' es natural en español y conserva el valor festivo sin volverlo excesivamente litúrgico o arcaico.
- source_word: שָׁבֻעֹת
  english_pob_choice: Weeks
  chosen_spanish: Semanas
  alternatives_spanish:
  - de las Semanas
  - de semanas
  lexicon: HALOT
  rationale: El nombre propio de la fiesta es literalmente 'Semanas'. Se conserva la denominación transparente, en lugar de sustituirla por el término tradicional posterior 'Pentecostés'.
- source_word: תַּעֲשֶׂה לְךָ
  english_pob_choice: you shall observe for yourself
  chosen_spanish: Celebrarás para ti
  alternatives_spanish:
  - observarás para ti
  - guardarás para ti
  - harás para ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'harás para ti', pero en este contexto la expresión idiomática se refiere a la celebración/observancia de una fiesta. 'Celebrarás' comunica la obligación cultual sin perder el carácter de acto realizado por el destinatario; 'para ti' refleja לְךָ.
- source_word: בִּכּוּרֵי
  english_pob_choice: the firstfruits of
  chosen_spanish: las primicias de
  alternatives_spanish:
  - los primeros frutos de
  - las primeras ofrendas de
  lexicon: HALOT
  rationale: '''Primicias'' es el equivalente cultual natural en español y mantiene el sentido de la primera porción del producto ofrecida a Dios.'
- source_word: קְצִיר חִטִּים
  english_pob_choice: the wheat harvest
  chosen_spanish: la cosecha del trigo
  alternatives_spanish:
  - la siega del trigo
  - la recolección del trigo
  lexicon: HALOT
  rationale: La construcción nombra la recolección del trigo. 'Cosecha del trigo' es claro, idiomático y suficientemente preciso para el contexto agrícola-ritual.
- source_word: הָאָסִיף
  english_pob_choice: Ingathering
  chosen_spanish: la Recolección
  alternatives_spanish:
  - la reunión de la cosecha
  - la junta de los frutos
  - la cosecha
  lexicon: HALOT
  rationale: Para el nombre de la fiesta, 'Recolección' conserva la idea de juntar lo producido. Evita reducirla simplemente a 'cosecha', que podría sonar demasiado genérico y perder la función nominal del festival.
- source_word: תְּקוּפַת הַשָּׁנָה
  english_pob_choice: at the turn of the year
  chosen_spanish: al turno del año
  alternatives_spanish:
  - al giro del año
  - al cambio del año
  - al fin del año
  lexicon: HALOT
  rationale: '''תְּקוּפָה'' apunta al giro/ciclo de la השנה. ''Al turno del año'' preserva la imagen del ciclo anual sin fijarla indebidamente como ''fin del año'', que puede ser más restrictivo de lo que exige el hebreo.'
theological_decisions:
- issue: Nombre de la fiesta de שָׁבֻעֹת
  english_pob_reading: Weeks rather than Pentecost
  chosen_spanish_reading: Semanas, no Pentecostés
  alternative_spanish_readings:
  - Pentecostés
  - Fiesta de Pentecostés
  rationale: La edición inglesa preserva el nombre hebreo transparente. En español se sigue la misma línea, manteniendo la referencia al término original en vez de sustituirlo por el nombre eclesial posterior.
  doctrine_reference: Ex 34:22; cf. Lev 23:15-16; Dt 16:9-10
- issue: Sentido de תְּקוּפַת הַשָּׁנָה
  english_pob_reading: at the turn of the year
  chosen_spanish_reading: al turno del año
  alternative_spanish_readings:
  - al final del año
  - al cambio de año
  rationale: Se preserva la tensión lexical entre 'turno/giro' y 'fin'. El hebreo remite al ciclo o giro del año, no necesariamente al último día del calendario; por eso se evita cerrar el sentido demasiado pronto.
  doctrine_reference: Ex 34:22; cf. Ex 23:16; 2 Cr 24:23
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y la decisión auditada en inglés para preservar el nombre transparente de la fiesta, la idiomaticidad cultual de תַּעֲשֶׂה לְךָ y la ambigüedad controlada de תְּקוּפַת הַשָּׁנָה. No se detectaron revisiones aplicadas en el registro inglés más reciente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - '''Fiesta'' se usa como término cultual estable, coherente con la tradición POB en contextos de חג.'
  - '''Primicias'' conserva la carga sacrificial/cultual del sustantivo hebreo.'
  - La nota al pie marca la alternativa lexical principal sin introducir una paráfrasis interpretativa.
