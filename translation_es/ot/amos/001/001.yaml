  yaml_path: translation/ot/amos/001/001.yaml
  text: The words of Amos[a], who was among the shepherds from Tekoa, which he saw concerning Israel in the days of Uzziah king of Judah and in the days of Jeroboam son of Joash, king of Israel[b], two years before the earthquake.
  footnotes:
