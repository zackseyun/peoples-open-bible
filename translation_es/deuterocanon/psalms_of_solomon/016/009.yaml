  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «Dirige», «las obras de mis manos», «en tu presencia», «mis pasos», «guarda». La única corrección recomendada es ajustar μνήμῃ σου a una forma española más fiel al matiz documentado.'
