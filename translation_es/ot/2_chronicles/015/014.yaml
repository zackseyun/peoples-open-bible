translation:
  language: es
  text: Y juraron a Yahvé con voz fuerte, con gritos, con trompetas y con cuernos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «shofares» o «cuernos de carnero»; el texto los distingue de las «trompetas» mencionadas antes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבְעוּ
  english_pob_choice: they swore
  chosen_spanish: juraron
  alternatives_spanish:
  - hicieron juramento
  - se comprometieron mediante juramento
  lexicon: HALOT
  rationale: El verbo hebreo expresa tomar un juramento. En español, «juraron» comunica de forma natural y directa el acto solemne, conservando el sentido formal del pacto sin añadir explicación innecesaria.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto para יהוה, se usa «Yahvé» como nombre divino propio. La preposición exige aquí la idea de dirección del juramento hacia él, por eso «a Yahvé» es la forma más natural en español.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - con voz fuerte
  - en alta voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para una proclamación sonora. «Con gran voz» mantiene la fuerza literal y el tono solemne; además, evita reducir el matiz colectivo y ceremonial a un simple adverbio de volumen.
- source_word: וּבִתְרוּעָה
  english_pob_choice: with shouting
  chosen_spanish: con gritos
  alternatives_spanish:
  - con un clamor
  - con una aclamación
  - con un grito
  lexicon: HALOT
  rationale: תְּרוּעָה puede ser clamor, grito de júbilo o acclamación. Aquí, junto a instrumentos y juramento, «gritos» reproduce el componente auditivo colectivo sin especificar indebidamente si era guerra o celebración.
- source_word: וּבַחֲצֹצְרֹת
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - con clarines
  - con trompetas de metal
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת designa las trompetas rectas usadas en contextos rituales y de asamblea. «Trompetas» es el equivalente claro y estándar en español, suficiente para conservar el contraste con el término siguiente.
- source_word: וּבְשׁוֹפָרֹות
  english_pob_choice: and horns
  chosen_spanish: y con cuernos
  alternatives_spanish:
  - y con cuernos de carnero
  - y con shofares
  lexicon: HALOT
  rationale: שׁוֹפָרוֹת nombra instrumentos de cuerno distintos de las trompetas anteriores. «Cuernos» preserva la diferencia léxica sin transliterar; «cuernos de carnero» sería más específico, pero el hebreo no obliga aquí a esa precisión.
theological_decisions:
- issue: Forma de renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la política terminológica del proyecto, se mantiene el nombre divino en forma transliterada «Yahvé» para no ocultar el referente del juramento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; la decisión española sigue la misma lectura auditada, preservando la distinción entre חֲצֹצְרֹת y שׁוֹפָרוֹת y la función del juramento comunitario.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en coherencia con el estándar del proyecto para יהוה.
  - Se preservó la distinción entre «trompetas» y «cuernos» para no fusionar dos instrumentos diferentes en el texto fuente.
  - «Con gran voz» y «con gritos» reproducen el énfasis acústico del hebreo sin ampliar el contenido semántico.
  - El registro es bíblico-formal, pero en español contemporáneo y publicable.
