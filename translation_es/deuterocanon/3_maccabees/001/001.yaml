  text: Ο ΔΕ Φιλοπάτωρ παρὰ τῶν ἀνακομισθέντων μαθὼν τὴν γινομένην τῶν ἐπ᾽ αὐτοῦ κρατουμένων τόπων ἀφαίρεσιν ὑπὸ Ἀντιόχου, παραγγείλας ταῖς πάσαις δυνάμεσιν πεζικαῖς καὶ ἱππικαῖς, καὶ τὴν ἀδελφὴν Ἀρσινόην συνπαραλαβών, ἐξώρμησεν μέχρι τῶν κατὰ Ῥαφίαν τόπων, ὅπου παρεμβεβλήκεισαν οἱ περὶ Ἀντίοχον.
