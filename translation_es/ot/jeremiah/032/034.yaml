translation:
  language: es
  text: Pusieron sus objetos detestables[b] en la casa[a] que es llamada por mi nombre, para contaminarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo». El hebreo dice literalmente «en la casa», refiriéndose aquí a la casa llamada por el nombre de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «sus abominaciones». El término hebreo suele referirse a objetos o prácticas detestables, especialmente en contextos idolátricos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: They put
  chosen_spanish: Pusieron
  alternatives_spanish:
  - Colocaron
  - Pusieron allí
  lexicon: WLC/HALOT
  rationale: El verbo narrativo expresa una acción pasada concreta; «pusieron» comunica con naturalidad el acto de introducir o depositar esos objetos sin perder la fuerza del hebreo.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus abominaciones
  - sus objetos detestables
  - sus ídolos detestables
  lexicon: HALOT
  rationale: El término denota objetos o prácticas abominables, a menudo en contexto idólatra. «Cosas detestables» mantiene la amplitud semántica sin forzar «ídolos» en el texto principal.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en la casa». En Jeremías se refiere al templo, pero se conserva el sustantivo literal en el texto principal para mantener la visibilidad del original.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: that is called by my name
  chosen_spanish: que lleva mi nombre
  alternatives_spanish:
  - sobre la cual es invocado mi nombre
  - que es llamada por mi nombre
  - que lleva mi nombre sobre sí
  lexicon: HALOT
  rationale: La expresión idiomática comunica pertenencia/consagración. «Lleva mi nombre» es una forma natural en español que conserva la idea de identificación y posesión divina sin alejarse del hebreo.
- source_word: לְטַמְּאֹו
  english_pob_choice: to defile it
  chosen_spanish: para profanarla
  alternatives_spanish:
  - para contaminarla ritualmente
  - para hacerla impura
  - para mancharla
  lexicon: HALOT
  rationale: «טמא» aquí implica contaminación ritual y moral del santuario. «Profanarla» en español transmite bien la gravedad de violar lo santo y mantiene el valor cultual del verbo.
theological_decisions:
- issue: 'Referencia de בַּבַּיִת: mantener «casa» o explicitar «templo»'
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: Se conserva la literalidad del hebreo en la línea principal. El contexto deja claro que se trata del templo, y la nota permite esa precisión sin sobreinterpretar el texto base.
  doctrine_reference: Primacía del texto fuente y equivalencia óptima; claridad contextual sin sustituir el lexema original.
- issue: Valor de שִׁקּוּץ en contexto de culto e idolatría
  english_pob_reading: detestable things
  chosen_spanish_reading: cosas detestables
  alternative_spanish_readings:
  - abominaciones
  - ídolos detestables
  rationale: El hebreo puede abarcar objetos o prácticas abominables, especialmente idolátricas. Se evita restringirlo a «ídolos» en el texto principal para no cerrar indebidamente el alcance del término.
  doctrine_reference: Respeto por la amplitud léxica y por la tensión entre contaminación ritual e idolatría.
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantuvo sin cambios; se conserva su lectura base y su decisión de no sustituir «house» por «temple» en el texto principal. La nota de «detestable things» también se mantiene como alternativa léxica relevante.
  spanish_consistency_notes:
  - Se mantiene «mi nombre» como fórmula de pertenencia/culto para reflejar el hebreo נִקְרָא שְׁמִי עָלָיו.
  - Se eligió «profanarla» en lugar de «contaminarla» para comunicar en español la violación de lo santo con naturalidad y gravedad, sin perder el sentido de טמא.
  - Los marcadores [a][b] siguen el orden solicitado y corresponden a notas distintas.
  - No se introdujo «SEÑOR»; el referente divino aparece implícito en «mi nombre», coherente con la política de Yahvé cuando el nombre divino no está explícito en este versículo.
