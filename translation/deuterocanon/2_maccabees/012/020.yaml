id: 2MA.12.20
reference: 2 Maccabees 12:20
source:
  edition: lxx-swete-1909
  text: ὁ δὲ Μακκαβαῖος, διατάξας τὴν περὶ αὐτὸν στρατιὰν σπειρηδόν, κατέστησεν αὐτοὺς ἐπὶ τῶν σπειρῶν· καὶ ἐπὶ τὸν Τιμόθεον ὥρμησαν ἔχοντα περὶ αὐτὸν μυριάδας δώδεκα πεζῶν, ἱππεῖς δὲ δισχιλίους καὶ πρὸς τοῖς ἑπτακισχιλίοις.
  language: Greek
  pages:
  - 719
  confidence: high
  validation: agree
translation:
  text: But Maccabeus[a], after arranging the troops around him in companies, stationed them over against the companies; and they charged against Timothy, who had around him twelve myriads of foot soldiers, two thousand horsemen[b], and besides these seven thousand more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'twelve myriads of foot soldiers,' that is, 120,000 infantry.
    reason: lexical_alternative
  - marker: b
    text: 'The final phrase is compressed in Greek: ''and besides the seven thousand.'' The translation understands it as an additional seven thousand troops beyond the infantry and horsemen already mentioned.'
    reason: alternative_reading
lexical_decisions:
- source_word: διατάξας
  chosen: after arranging
  alternatives:
  - having drawn up
  - after ordering
  lexicon: LSJ
  rationale: Aorist participle indicating prior military organization before the main action. 'After arranging' is natural English and preserves the preparatory sense.
- source_word: τὴν περὶ αὐτὸν στρατιὰν
  chosen: the troops around him
  alternatives:
  - the army with him
  - his force
  lexicon: LSJ
  rationale: Literally the force around him, i.e., the troops accompanying Maccabeus. 'Troops around him' keeps the spatial wording without becoming awkward.
- source_word: σπειρηδόν
  lemma: σπεῖρα
  chosen: in companies
  alternatives:
  - by cohorts
  - in separate units
  lexicon: LSJ
  rationale: Adverb derived from σπεῖρα, indicating arrangement by military units. 'In companies' is readable modern English and preserves the tactical grouping without overcommitting to a specifically Roman technical term like 'cohorts'.
- source_word: κατέστησεν αὐτοὺς ἐπὶ τῶν σπειρῶν
  chosen: stationed them over against the companies
  alternatives:
  - set them against the units
  - posted them by the companies
  lexicon: LSJ
  rationale: The phrase is somewhat compressed, but in context it describes deployment of his men in relation to the enemy formations. 'Over against' captures adversarial positioning better than a merely locative 'by'.
- source_word: ὥρμησαν
  chosen: they charged
  alternatives:
  - they rushed
  - they attacked
  lexicon: LSJ
  rationale: Military context favors a forceful movement into battle. 'Charged' conveys the sudden offensive action succinctly.
- source_word: μυριάδας δώδεκα πεζῶν
  chosen: twelve myriads of foot soldiers
  alternatives:
  - one hundred twenty thousand infantry
  - twelve ten-thousands of infantry
  lexicon: LSJ
  rationale: Retaining 'myriads' preserves the Greek numerical expression transparently. 'Foot soldiers' clarifies πεζῶν. Because μυριάς can be rendered either literally or converted numerically, the numerical equivalent is preserved in a footnote.
- source_word: ἱππεῖς δὲ δισχιλίους
  chosen: two thousand horsemen
  alternatives:
  - two thousand cavalry
  lexicon: LSJ
  rationale: Straightforward military term; 'horsemen' is vivid and accessible while accurately reflecting mounted troops.
- source_word: καὶ πρὸς τοῖς ἑπτακισχιλίοις
  chosen: and besides these seven thousand more
  alternatives:
  - and in addition seven thousand
  - and along with the seven thousand
  lexicon: LSJ
  rationale: πρὸς with the dative here adds an additional number beyond those already listed. The exact referent is compressed in Greek, but the sense is additive. 'Besides these seven thousand more' communicates that an additional seven thousand were present.
