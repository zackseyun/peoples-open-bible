revisions:
- from: 'Mira[a], la mano de Yahvé vendrá sobre tu ganado que está en el campo: sobre los caballos, los asnos, los camellos, los rebaños y las manadas, con una plaga muy severa.'
  to: Mira, la mano de Yahvé vendrá sobre tu ganado que está en el campo—sobre los caballos, los asnos, los camellos, las vacas y las ovejas—con una plaga[a] muy severa.
  rationale: Se reubica la nota al pie para que ancle correctamente en 'plaga', que es el término explicado por la nota. Se ajusta la lista final de animales para reflejar con mayor fidelidad בָּקָר וּבַצֹּאן y mejorar la naturalidad en español. Se usa raya para seguir más de cerca la estructura enfática del original y del audit trail inglés. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
