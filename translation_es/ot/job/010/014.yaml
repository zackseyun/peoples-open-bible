    rationale: El hebreo usa perfecto en una prótasis condicional, y el POB lo auditó como un presente vívido/gnómico («If I sin»). En español, «si peco» preserva mejor esa fuerza abierta sin mover el sentido hacia una condición más hipotética o remota.
