  revision_awareness: 'El audit trail inglés fue revisado y quedó sin cambios sustantivos (latest_revision_pass: unchanged=true; cross_check: high_agreement). La versión española sigue esa lectura estable, conservando las decisiones claves: marcador discursivo inicial, pobreza económica, énfasis de la bendición, nombre divino y terminología de herencia/posesión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «En heredad» y «para poseerla» se coordinan para reflejar נַחֲלָה / לְרִשְׁתָּהּ sin perder el matiz territorial-covenantal.
  - Se mantiene «pobre» por su amplitud semántica y claridad pastoral en español.
  - La nota al pie cubre la ambigüedad legítima de אֶפֶס sin alterar el texto principal.
