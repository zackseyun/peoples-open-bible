translation:
  language: es
  text: 'Entonces Moisés y Aarón fueron devueltos al faraón, y él les dijo: «Vayan, sirvan a Yahvé[a] su Dios. ¿Quiénes son los que van?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Quién y quiénes son los que van?»; un giro idiomático que pide identificar con precisión quiénes son los que irán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוּשַׁב
  english_pob_choice: were brought back
  chosen_spanish: trajeron de vuelta
  alternatives_spanish:
  - fueron traídos de vuelta
  - fueron regresados
  lexicon: HALOT
  rationale: El hofal de שוב expresa que Moisés y Aarón fueron hechos volver. En español, 'trajeron de vuelta' conserva la pasividad de hecho y suena natural; 'fueron traídos de vuelta' también es posible, pero algo más pesado.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: ante el faraón
  alternatives_spanish:
  - al faraón
  - a Faraón
  lexicon: HALOT
  rationale: El movimiento resulta no solo hacia, sino de nuevo a la presencia de Faraón para comparecer delante de él. 'Ante el faraón' comunica bien ese matiz sin forzar la sintaxis española.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Vayan allá
  lexicon: HALOT
  rationale: El imperativo plural de הלך se vierte de forma directa y natural como 'Vayan'.
- source_word: עִבְדוּ
  english_pob_choice: serve
  chosen_spanish: sirvan
  alternatives_spanish:
  - sirvan a
  - adore[n]
  - rindan servicio a
  lexicon: HALOT
  rationale: Aquí עבד se refiere a prestar servicio a Dios, con posible trasfondo de adoración, pero sin reducirlo solo a culto litúrgico. 'Sirvan' preserva ese alcance mejor que 'adoren'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé', conforme a la terminología española del proyecto y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - el Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo de 2.ª persona plural se expresa naturalmente en español como 'su Dios' en el contexto de discurso directo dirigido al grupo.
- source_word: מִי וָמִי
  english_pob_choice: Who are the ones going?
  chosen_spanish: ¿Quiénes son los que van?
  alternatives_spanish:
  - ¿Quién y quién son los que van?
  - ¿Quiénes irán?
  lexicon: HALOT
  rationale: La expresión idiomática 'מי ומי' pide identificación precisa de las personas que irán. En español, '¿Quiénes son los que van?' conserva la pregunta por la identidad sin introducir un literalismo extraño como 'quién y quién'.
- source_word: הַהֹלְכִים
  english_pob_choice: are the ones going
  chosen_spanish: los que van
  alternatives_spanish:
  - los que están yendo
  - los que irán
  lexicon: HALOT
  rationale: El participio con artículo funciona de modo sustantivo. 'Los que van' reproduce ese valor de 'las personas que van' de manera clara y idiomática.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se conserva el nombre propio como 'Yahvé', manteniendo la decisión teológica y traductológica de no ocultarlo con una sustitución como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עבד aplicado a Dios
  english_pob_reading: serve
  chosen_spanish_reading: sirvan
  alternative_spanish_readings:
  - adoren
  - presten servicio a
  rationale: En este contexto no se debe estrechar el verbo a una sola dimensión litúrgica. 'Sirvan' deja abierta la gama de servicio/culto implícita en el hebreo y evita perder el matiz lexical.
  doctrine_reference: HALOT; English POB lexical decision for עבד
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que eliminó 'exactly' por no estar representado en el texto fuente. Por eso la pregunta se mantiene simple y precisa, sin intensificación añadida. También se conservó la lectura del nombre divino como Yahvé/Yahweh, y el valor de 'serve' para עבד sin reducirlo a 'adorar'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la norma del proyecto.
  - '''Faraón'' se escribe en minúscula como título común dentro de la narración.'
  - 'La pregunta final conserva el valor sustantivo del participio hebreo: no pregunta solo si irán, sino cuáles personas irán.'
