translation:
  language: es
  text: Porque pasa el viento sobre él[a], y ya no está[b], y su lugar ya no lo conoce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Viento» sigue el sentido más probable en el contexto poético. También podría entenderse como «aliento» o «espíritu», pero la imagen de la hierba y la flor favorece «viento».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y no es». La traducción expresa de forma natural en español la idea de que desaparece.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo personifica al «lugar» como si pudiera conocer o reconocer lo que desapareció.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la explicación causal o justificativa del símil anterior con una conjunción natural en español. «Porque» refleja bien el valor explicativo de כִּי sin forzar un giro demasiado literal.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aliento
  - espíritu
  lexicon: HALOT
  rationale: 'En el contexto poético de hierba y flor, la referencia es meteorológica: el viento que pasa y hace desaparecer la flor. «Viento» conserva esa imagen mejor que «aliento» o «espíritu».'
- source_word: עָבְרָה
  english_pob_choice: passes over
  chosen_spanish: pasa sobre
  alternatives_spanish:
  - ha pasado sobre
  - cruza sobre
  - sopla sobre
  lexicon: HALOT
  rationale: El verbo עבר expresa el pasar de algo sobre otro. «Pasa sobre» conserva el movimiento simple y la imagen poética del texto fuente.
- source_word: בּוֹ
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - sobre ella
  lexicon: HALOT
  rationale: El sufijo pronominal remite al referente poético de la hierba/flor, que en español puede naturalizarse como masculino por concordancia con el antecedente implícito o mantenerse como neutro no marcado en estilo bíblico. «Sobre él» sigue la economía del hebreo y evita una paráfrasis explicativa.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and it is gone
  chosen_spanish: y deja de ser
  alternatives_spanish:
  - y ya no está
  - y no es más
  - y desaparece
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «y no es». En español, «deja de ser» preserva la fuerza existencial sin volverse torpe ni demasiado interpretativa; mantiene la tensión entre inexistencia y desaparición.
- source_word: וְלֹא יַכִּירֶנּוּ עוֹד
  english_pob_choice: and its place knows it no more
  chosen_spanish: y su lugar no lo reconoce más
  alternatives_spanish:
  - y su lugar ya no lo conoce
  - y su lugar no lo sabe más
  lexicon: HALOT
  rationale: יַכִּיר expresa reconocer/identificar. «No lo reconoce más» conserva la personificación del lugar y la idea de ya no identificar lo que estuvo allí.
- source_word: מְקוֹמוֹ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - el lugar donde estaba
  - ese lugar
  lexicon: HALOT
  rationale: «Su lugar» reproduce con brevedad el posesivo del hebreo y mantiene la personificación poética del escenario que ‘reconoce’ o deja de reconocer.
translation_notes:
  revision_awareness: El inglés auditado mantiene una equivalencia óptima y no requiere cambios; la versión española conserva la misma estructura poética, la personificación del lugar y la ambigüedad léxica de רוּחַ dentro del contexto botánico.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de máscara porque no aparece el Tetragrámaton en este versículo.
  - Se conservó la personificación de «su lugar» para no perder el efecto retórico del hebreo.
  - «Deja de ser» mantiene la tensión del hebreo «no es» sin añadir una interpretación doctrinal ajena al texto.
