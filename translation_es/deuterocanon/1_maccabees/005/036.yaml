translation:
  language: es
  text: Desde allí partió y se apoderó de Hasphoth[a], Maked, Bosor y el resto de las ciudades de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego προκατελάβετο puede significar también «capturó» u «ocupó», además de «se apoderó de».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖθεν
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Desde ese lugar
  - De allí
  lexicon: LSJ
  rationale: Adverbio de lugar que marca salida desde el punto anterior. "Desde allí" es natural en español y conserva el movimiento de partida sin añadir matiz innecesario.
- source_word: ἀπῆρεν
  english_pob_choice: he departed
  chosen_spanish: partió
  alternatives_spanish:
  - se fue
  - salió
  lexicon: LSJ
  rationale: El aoristo expresa que salió o se alejó del lugar previo. "Partió" mantiene el sentido de salida y funciona bien en registro narrativo.
- source_word: προκατελάβετο
  english_pob_choice: seized
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - tomó
  - capturó
  - ocupó
  lexicon: LSJ
  rationale: El verbo compuesto puede implicar tomar posesión o capturar en contexto militar. "Se apoderó de" transmite con fuerza esa acción sin reducirla a un simple "tomó".
- source_word: τὴν Χασφώθ, Μακέδ, Βοσόρ
  english_pob_choice: Hasphoth, Maked, Bosor
  chosen_spanish: Hasfot, Maked, Bosor
  alternatives_spanish:
  - Jasfot
  - Hasfót
  lexicon: transliteración de nombres propios
  rationale: Son topónimos que se transliteran. "Hasfot" sigue de cerca la forma griega Χασφώθ y resulta legible en español; se conserva Maked y Bosor como nombres propios sin traducir.
- source_word: τὰς λοιπὰς πόλεις
  english_pob_choice: the rest of the cities
  chosen_spanish: el resto de las ciudades
  alternatives_spanish:
  - las demás ciudades
  - las otras ciudades
  lexicon: LSJ
  rationale: '"λοιπὰς" indica las demás o restantes. "El resto de las ciudades" reproduce bien la idea de ciudades adicionales además de las nombradas.'
- source_word: τῆς Γαλααδίτιδος
  english_pob_choice: of Gilead
  chosen_spanish: de Galaad
  alternatives_spanish:
  - de la región de Galaad
  - de la tierra de Galaad
  lexicon: LSJ
  rationale: El genitivo identifica la región. "Galaad" es la forma española habitual del topónimo y conserva la referencia geográfica sin ampliar el texto.
translation_notes:
  revision_awareness: El texto inglés POB revisó "took" a "seized" para reflejar con mayor precisión el verbo griego en un contexto militar. La versión española sigue esa revisión con "se apoderó de", manteniendo un registro natural y la fuerza del verbo. No se detectan otras tensiones textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios como topónimos.
  - '"Galaad" se usa como forma española del lugar, coherente con el valor geográfico del genitivo griego.'
  - La nota a pie de página queda anclada al verbo principal para conservar la alternativa léxica documentada.
