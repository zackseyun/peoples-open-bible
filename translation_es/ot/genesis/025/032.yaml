translation:
  language: es
  text: 'Esaú dijo[a]: «Mira, estoy a punto de morir; entonces, ¿de qué me sirve este derecho de primogenitura?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voy a morir; entonces, ¿para qué necesito este derecho de primogenitura?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se vierte naturalmente con el pretérito simple en español. Se omite la conjunción para mantener la fluidez narrativa, como en la versión inglesa auditada.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma castellana habitual del nombre propio en español bíblico, sin alterar la identidad referencial del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce una afirmación enfática. «Mira» conserva la fuerza de atención en español moderno mejor que «He aquí», que suena más arcaico.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: estoy
  alternatives_spanish:
  - yo estoy
  - estoy yo
  lexicon: HALOT
  rationale: אָנֹכִי aporta énfasis, pero en español el sujeto suele quedar implícito. El énfasis se conserva en el tono global de la exclamación sin forzar una redundancia.
- source_word: הוֹלֵךְ לָמוּת
  english_pob_choice: am about to die
  chosen_spanish: estoy a punto de morir
  alternatives_spanish:
  - voy a morir
  - estoy yendo a morir
  lexicon: HALOT
  rationale: La construcción הלך + infinitivo expresa inminencia o encaminamiento hacia un desenlace. «Estoy a punto de morir» transmite bien esa cercanía sin volverla más literal de lo que el hebreo exige.
- source_word: וְלָמָּה
  english_pob_choice: so what use
  chosen_spanish: entonces, ¿de qué me sirve
  alternatives_spanish:
  - ¿y para qué me sirve?
  - así que, ¿qué utilidad tiene?
  lexicon: HALOT
  rationale: La partícula introduce la conclusión retórica de Esaú. En español, «¿de qué me sirve?» reproduce el valor pragmático de utilidad/disvalor mejor que una simple pregunta con «por qué».
- source_word: זֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esto
  - esa
  lexicon: HALOT
  rationale: El demostrativo apunta a la primogenitura como objeto del intercambio inmediato. «Este» concuerda naturalmente con «derecho» en la frase española.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El dativo de ventaja/desventaja se expresa de forma idiomática con «me» dentro de la construcción «de qué me sirve».
- source_word: בְּכֹרָה
  english_pob_choice: birthright
  chosen_spanish: derecho de primogenitura
  alternatives_spanish:
  - primogenitura
  - derecho de primogénito
  lexicon: HALOT
  rationale: «Primogenitura» es exacto, pero «derecho de primogenitura» explicita el valor jurídico-social implicado y evita perder el matiz de posesión/beneficio que tiene el contexto.
theological_decisions:
- issue: Fuerza de la afirmación de Esaú sobre morir
  english_pob_reading: Rendered as a rhetorical claim of imminent death without specifying whether Esau was literally at the point of death or speaking hyperbolically.
  chosen_spanish_reading: Se mantiene como una afirmación de inminencia, sin decidir si es literal o hiperbólica.
  alternative_spanish_readings:
  - estoy literalmente al borde de la muerte
  - estoy exagerando por el hambre
  rationale: El hebreo solo dice que Esaú está ‘yendo a morir’. La traducción no debe resolver la tensión narrativa o moral; por eso conserva una formulación abierta que refleja la proximidad percibida de la muerte sin interpretarla.
  doctrine_reference: Preservar la tensión textual y no cerrar la interpretación más allá del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada en inglés y mantiene la misma decisión interpretativa: una afirmación retórica de inminencia sin precisar si Esaú habla literalmente o con exageración. Se ajustó la sintaxis al español natural y se explicitaron las decisiones léxicas principales del hebreo.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Derecho de primogenitura» mantiene la carga jurídica/social del hebreo mejor que una paráfrasis vaga.
  - La nota al pie ofrece una alternativa cercana al inglés auditado sin duplicar el sentido principal en el texto base.
