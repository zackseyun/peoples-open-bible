translation:
  language: es
  text: Y el nombre de la hija de Aser era Serah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la hija de Aser»; otra posibilidad, más literal al orden hebreo, sería: «Y el nombre de la hija de Aser era Serah».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Ahora el nombre
  - El nombre
  lexicon: HALOT
  rationale: La construcción nominal simple se conserva con una coordinación directa. «Y el nombre» refleja con naturalidad el hebreo sin añadir una intención discursiva más fuerte de la que el texto exige.
- source_word: בַּת
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - descendiente femenina
  - mujer
  lexicon: HALOT
  rationale: En este contexto genealógico, «hija» es la equivalencia más directa y natural en español. No hace falta ampliar a «descendiente femenina», porque el texto presenta una relación familiar concreta.
- source_word: אָשֵׁר
  english_pob_choice: Asher’s
  chosen_spanish: de Asher
  alternatives_spanish:
  - de Aser
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo como «Asher», siguiendo la transliteración empleada en el contexto inglés y manteniendo la forma reconocible del nombre tribal/personal. El genitivo español se expresa naturalmente con «de».
- source_word: שָׂרַח
  english_pob_choice: Serah
  chosen_spanish: Serah
  alternatives_spanish:
  - Sérah
  - Seraḥ
  - Sara
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. «Serah» mantiene la forma usada por la POB en inglés y evita confundirlo con «Sara/Sarah», que sería otro nombre.
translation_notes:
  revision_awareness: El pasaje fue revisado en el control más reciente y quedó sin cambios, con alta concordancia entre el texto fuente y la traducción inglesa de referencia. Por eso el borrador español sigue de cerca la estructura breve del hebreo y conserva los nombres propios sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Asher» de manera consistente con la transliteración inglesa de referencia; si el proyecto español general prefiere «Aser», habría que unificarlo en todo el corpus con una decisión editorial explícita.
  - Se mantiene el orden simple del hebreo, pero la nota ofrece la variante más literal que también respeta la información del texto.
  - No hay términos teológicos de alta tensión en este versículo; la principal decisión es nominal y genealógica.
