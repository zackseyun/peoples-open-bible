id: PHP.2.5
reference: Philippians 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦτο ⸀φρονεῖτε ἐν ὑμῖν ὃ καὶ ἐν Χριστῷ Ἰησοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/005.yaml
  text: 'Have this mindset among yourselves, which was also in Messiah Jesus,'
translation:
  language: ko
  text: 여러분 가운데 이러한 마음가짐을 품으십시오[a]. 그것은 곧 메시아[b] 예수 안에 있었던 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 메시아 예수 안에서 또한 가지는 그 마음가짐을 여러분 가운데 품으십시오」. 본문은 모범적 해석(메시아의 마음가짐을 본받음)과 연합적 해석(메시아 안에서 함께 가지는 마음가짐) 사이에 압축적이다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_korean: 이러한
  alternatives_korean:
  - 이
  - 이와 같은
  lexicon: BDAG
  rationale: 지시 대명사가 이어지는 찬가의 마음가짐을 가리키므로, 한국어 관형어 「이러한」이 자연스럽게 그 지시를 받는다.
- source_word: φρονεῖτε
  english_pob_choice: have this mindset
  chosen_korean: 마음가짐을 품으십시오
  alternatives_korean:
  - 이렇게 생각하십시오
  - 이러한 자세를 가지십시오
  lexicon: BDAG
  rationale: φρονέω는 단순한 사고가 아닌 지향·태도를 가리킨다. 「마음가짐을 품다」가 그 권면적 무게를 자연스럽게 담는다.
- source_word: ἐν ὑμῖν
  english_pob_choice: among yourselves
  chosen_korean: 여러분 가운데
  alternatives_korean:
  - 여러분 안에
  - 여러분 사이에
  lexicon: BDAG
  rationale: 복수 대명사와 공동체적 문맥을 고려해 「여러분 가운데」로 옮겨 공동체적 차원을 살린다.
- source_word: ὃ
  english_pob_choice: which
  chosen_korean: 그것은 곧 ~ 것입니다
  alternatives_korean:
  - ~것이니
  lexicon: BDAG
  rationale: 한국어로 관계대명사를 자연스럽게 옮기기 위해 새 문장을 시작해 「그것은 곧 ~것입니다」로 풀어 쓴다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에
  alternatives_korean:
  - 그리스도 예수 안에
  - 메시아 예수께서 가지셨던
  lexicon: BDAG
  rationale: 칭호 Χριστός를 「메시아」로 옮기는 본 번역의 원칙을 유지하며, 처격 ἐν도 「안에」로 직역해 본문의 양가적 해석 가능성을 보존한다.
theological_decisions:
- issue: ὃ καὶ ἐν Χριστῷ Ἰησοῦ가 「메시아께서 가지셨던 마음」(모범)인지, 「여러분이 메시아 안에서 가지는 마음」(연합)인지
  chosen_reading: 모범적 해석으로 「메시아 예수 안에 있었던 것」으로 옮김
  alternative_readings:
  - 「여러분이 메시아 예수 안에서 또한 가지는 그 마음가짐」(연합적 해석)
  rationale: 직후 문단이 메시아의 자기 비움을 신자들의 모범으로 제시하므로 모범적 해석을 본문에 둔다. 다만 헬라어 구문이 압축적이어서 연합적 해석도 가능하므로 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
