translation:
  language: es
  text: Y los que estaban alrededor de ellos les ayudaron en todo, con plata y oro, con caballos[a], con ganado y con muy numerosas ofrendas voluntarias[b], de todos aquellos cuyo entendimiento había sido despertado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo (Esdras 1:6) se acerca más a 'bienes/propiedades' que a 'caballos'. Aquí se sigue la formulación griega de 1 Esdras.
    reason: alternative_reading
  - marker: b
    text: El griego εὐχαῖς puede reflejar una divergencia textual o interpretativa respecto del paralelo hebreo, que habla de 'dones escogidos' o 'cosas preciosas'.
    reason: textual_variant
  - marker: c
    text: 'O: ''cuyo espíritu había sido despertado'', siguiendo más de cerca el modismo del paralelo hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ περικύκλῳ αὐτῶν
  english_pob_choice: those around them
  chosen_spanish: los que estaban alrededor de ellos
  alternatives_spanish:
  - los de alrededor
  - sus vecinos
  lexicon: LSJ
  rationale: La frase griega designa a quienes estaban en torno a ellos. En español, 'los que estaban alrededor de ellos' conserva la referencia espacial sin introducir una interpretación más específica que el griego.
- source_word: ἐβοήθησαν
  english_pob_choice: helped
  chosen_spanish: les ayudaron
  alternatives_spanish:
  - les asistieron
  - les apoyaron
  lexicon: BDAG
  rationale: '''Ayudaron'' expresa el sentido básico del verbo y encaja bien con los medios materiales que siguen. Es claro, natural y fiel al matiz general de apoyo.'
- source_word: ἐν πᾶσιν
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - con todo
  lexicon: LSJ
  rationale: La expresión idiomática comunica asistencia integral. 'En todo' es más natural en español que una traducción rígida como 'en todas las cosas'.
- source_word: ἐν ἀργυρίῳ καὶ χρυσίῳ
  english_pob_choice: with silver and gold
  chosen_spanish: con plata y oro
  alternatives_spanish:
  - en plata y oro
  lexicon: LSJ
  rationale: El valor instrumental es claro en el contexto; 'con plata y oro' suena natural en español y conserva el medio de ayuda material.
- source_word: ἵπποις
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - corceles
  lexicon: LSJ
  rationale: El griego dice de manera explícita 'caballos'. Se mantiene ese término sin armonizarlo con el paralelo hebreo, porque el texto base es el griego.
- source_word: κτήνεσιν
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales de cría
  - bestias de carga
  lexicon: LSJ
  rationale: El término es amplio y puede abarcar animales domésticos o de propiedad. 'Ganado' funciona como equivalente general y comprensible en español.
- source_word: εὐχαῖς
  english_pob_choice: freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - súplicas
  - votos
  lexicon: LSJ
  rationale: Aunque el paralelo hebreo sugiere bienes escogidos, la lectura griega usa εὐχαῖς, que aquí se entiende como contribuciones ofrecidas libremente. 'Ofrendas voluntarias' preserva la idea de dádiva ofrecida de buen grado sin forzar una traducción litúrgica más estrecha.
- source_word: ὡς πλείσταις
  english_pob_choice: very many
  chosen_spanish: muy numerosas
  alternatives_spanish:
  - en grandísima cantidad
  - muy abundantes
  lexicon: LSJ
  rationale: La expresión intensifica la cantidad de las ofrendas. 'Muy numerosas' comunica bien la abundancia sin sonar demasiado enfática o artificial.
- source_word: πολλῶν ὧν ὁ νοῦς ἠγέρθη
  english_pob_choice: from all whose mind had been stirred
  chosen_spanish: de entre muchos cuyo pensamiento había sido despertado
  alternatives_spanish:
  - de entre muchos cuyo espíritu había sido despertado
  - de muchos que se sintieron movidos
  lexicon: LSJ
  rationale: Νοῦς apunta literalmente al 'pensamiento' o 'mente'. 'Había sido despertado' reproduce el pasivo de ἠγέρθη y conserva la imagen de una disposición interior provocada o activada.
theological_decisions:
- issue: Divergencia entre el griego de 1 Esdras y el paralelo hebreo en el tipo de ayuda enumerada
  english_pob_reading: Follow the Greek primary witness, including 'horses' and 'prayers/freewill offerings,' while preserving the Hebrew-parallel sense in footnotes.
  chosen_spanish_reading: Seguir el testimonio principal griego, incluyendo 'caballos' y 'ofrendas voluntarias', sin armonizar el texto a la versión hebrea paralela.
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo y traducir de forma más general como 'bienes ... dádivas'
  - reescribir la lista según el sentido del hebreo
  rationale: La política del proyecto para 1 Esdras da prioridad al texto griego, usando el paralelo hebreo como control y contexto, no como sustituto. Por eso se conserva la forma griega aun cuando difiera del hebreo en detalles concretos.
  doctrine_reference: 'PHILOSOPHY.md: prioridad del griego para deuterocanónicos; paralelos hebreos como referencia secundaria'
- issue: Sentido de εὐχαῖς en un contexto de contribuciones
  english_pob_reading: freewill offerings
  chosen_spanish_reading: ofrendas voluntarias
  alternative_spanish_readings:
  - oraciones
  - votos
  - bendiciones
  rationale: El sustantivo griego puede ser interpretado de varias maneras, pero en este pasaje la lectura adoptada en el audit trail inglés es 'freewill offerings'. En español se conserva esa decisión con una formulación transparente y no excesivamente técnica.
  doctrine_reference: 'PHILOSOPHY.md: mantener la decisión lexical documentada cuando el griego y el paralelo divergen'
- issue: Interpretación de ὁ νοῦς ἠγέρθη
  english_pob_reading: whose mind had been stirred
  chosen_spanish_reading: cuyo pensamiento había sido despertado
  alternative_spanish_readings:
  - cuyo espíritu había sido despertado
  - que habían sido movidos interiormente
  rationale: Νοῦς se traduce de manera directa como 'pensamiento' o 'mente'. 'Despertado' conserva la pasiva y la imagen de una motivación interior sin borrar la relación con la formulación griega.
  doctrine_reference: 'PHILOSOPHY.md: respeto por la fuerza semántica del griego frente al paralelismo hebreo'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que sustituyó una lectura anterior por 'freewill offerings' y ajustó la última cláusula a una forma más natural y completa. La versión española refleja esa revisión y conserva la divergencia significativa entre el griego y el paralelo hebreo en notas.
  spanish_consistency_notes:
  - Se usó 'plata y oro' como equivalente instrumental natural de ἐν ἀργυρίῳ καὶ χρυσίῳ.
  - Se mantuvo 'caballos' y no se armonizó con el paralelo hebreo, en coherencia con la prioridad del griego.
  - Se prefirió 'ofrendas voluntarias' para εὐχαῖς siguiendo la decisión inglesa auditada.
  - Se tradujo νοῦς por 'pensamiento' para conservar la referencia a la esfera mental.
  - Los marcadores de nota [a], [b], [c] aparecen anclados exactamente en los segmentos correspondientes del texto español.
