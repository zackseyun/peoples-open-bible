review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: es honorable evitar la contienda, mientras el necio irrumpe en ella. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece sobre «contienda», pero la nota explica el verbo hebreo raro יִתְגַּלָּע («se lanza/estalla/se involucra»), no רִיב. Conviene mover el marcador al verbo final. Además, «se lanza en la pelea» es comprensible, pero «estalla en contienda» preserva mejor el contraste con «apartarse de la contienda» y se acerca más a ''bursts out in quarrel''.'
  spanish_quality_summary: El español es claro y digno. «Honra para el hombre es…» suena algo invertido; «Es una honra para el hombre…» sería más natural, pero no es imprescindible. El problema principal es de precisión editorial del anclaje de la nota. También mejora la cohesión proverbial mantener «contienda» en ambas mitades en vez de cambiar a «pelea».
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «honra», «hombre», «apartarse», «contienda» y «necio» son adecuadas. Para יִתְגַּלָּע, una formulación como «estalla en contienda» refleja mejor la elección inglesa documentada y la incertidumbre léxica preservada en la nota.
  issues:
  - severity: high
    issue: El marcador de la nota [a] está colocado en «contienda» en lugar del verbo final.
    rationale: La nota explica el verbo hebreo raro יִתְגַּלָּע, no el sustantivo רִיב. Tal como está, el lector recibe una señal engañosa sobre qué término es incierto.
  - severity: medium
    issue: «Se lanza en la pelea» cambia el campo léxico respecto de «contienda» y suena algo más coloquial/concreto.
    rationale: El hebreo contrasta evitar la contienda con irrumpir en ella. Repetir «contienda» mantiene mejor el paralelismo sapiencial y se acerca más al audit trail inglés.
  revised_spanish_text: Honra para el hombre es apartarse de la contienda, pero todo necio estalla en contienda[a].
  revised_footnotes:
  - marker: a
    text: El verbo hebreo es raro e incierto; también podría entenderse como «se involucra en la contienda» o, de manera más literal, «se muestra» con agresividad.
    reason: lexical_alternative
  revision_rationale: Se movió la nota al verbo correspondiente y se ajustó la frase final a «estalla en contienda» para reflejar mejor el verbo raro documentado y conservar el paralelismo con «apartarse de la contienda».
