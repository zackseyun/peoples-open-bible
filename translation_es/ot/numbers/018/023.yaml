  text: וְ/עָבַ֨ד הַ/לֵּוִ֜י ה֗וּא אֶת עֲבֹדַת֙ אֹ֣הֶל מוֹעֵ֔ד וְ/הֵ֖ם יִשְׂא֣וּ עֲוֺנָ֑/ם חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם וּ/בְ/תוֹךְ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לֹ֥א יִנְחֲל֖וּ נַחֲלָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/023.yaml
  text: But the Levite himself shall do the service of the tent of meeting[a], and they shall bear their iniquity. It is a permanent statute throughout your generations[c][b], and among the sons of Israel they shall not inherit an inheritance.
  footnotes:
  - marker: a
    text: Or 'bear their guilt.' The Hebrew idiom can denote bearing guilt, iniquity, or the liability/consequences attached to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'they shall not inherit an inheritance,' a Hebrew repetition that emphasizes the denial of tribal land allotment.
    reason: lexical_alternative
