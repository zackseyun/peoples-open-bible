translation:
  language: es
  text: 'Entonces Yahvé dijo a Isaías: «Sal ahora al encuentro de Acaz, tú y Sear-jasub[a] tu hijo, al extremo del canal del estanque superior, en el camino hacia el campo del lavandero[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Sear-jasub significa: «Un remanente volverá».'
    reason: lexical_alternative
  - marker: b
    text: O «el campo del batanero».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: Lexema divino Tetragrámaton (YHWH)
  rationale: El hebreo usa el Nombre divino יְהוָה, no un título. En español se mantiene la transliteración reverente «Yahvé», siguiendo el criterio POB de preservar el nombre personal de Dios y no sustituirlo por «SEÑOR».
- source_word: צֵא נָא
  english_pob_choice: Go out now
  chosen_spanish: Sal ahora
  alternatives_spanish:
  - Sal, por favor
  - Sal ahora mismo
  lexicon: HALOT
  rationale: El imperativo expresa acción inmediata; נָא añade un matiz de apremio/cortesía que en español se comunica de modo natural con «ahora». «Sal» conserva la dirección del verbo sin forzar un calco.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarte con
  - a recibir a
  lexicon: HALOT
  rationale: 'La construcción indica propósito y dirección: Isaías debe salir para encontrarse con Acaz. «Al encuentro de» reproduce esa fuerza relacional y locativa de manera idiomática en español.'
- source_word: אַתָּה וּשְׁאָר יָשׁוּב בְּנֶךָ
  english_pob_choice: you and Shear-jashub your son
  chosen_spanish: tú y Sear-jasub tu hijo
  alternatives_spanish:
  - tú y tu hijo Sear-jasub
  - tú, y Sear-jasub, tu hijo
  lexicon: HALOT
  rationale: Se conserva el nombre propio del hijo de Isaías en forma transliterada. El orden se ajusta al español natural, manteniendo la aposición explícita «tu hijo» porque el hebreo identifica al personaje por nombre y filiación.
- source_word: שְׁאָר יָשׁוּב
  english_pob_choice: Shear-jashub
  chosen_spanish: Sear-jasub
  alternatives_spanish:
  - Un remanente volverá
  - Resto-volverá
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. El sentido del nombre se preserva indirectamente en nota, porque en Isaías los nombres simbólicos tienen carga temática y no conviene ocultarla en el texto principal.
- source_word: קְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al extremo de
  alternatives_spanish:
  - al final de
  - en el extremo de
  lexicon: HALOT
  rationale: En este contexto topográfico, קצה marca un punto espacial. «Al extremo de» conserva la idea de límite/terminación física mejor que una paráfrasis más amplia.
- source_word: תְּעָלַת
  english_pob_choice: conduit
  chosen_spanish: canal
  alternatives_spanish:
  - conducto
  - acequia
  lexicon: HALOT
  rationale: El término designa una conducción de agua artificial. «Canal» es claro y natural en español; evita el tecnicismo inglés «conduit» y mantiene el ambiente de obras hidráulicas urbanas.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  english_pob_choice: the upper pool
  chosen_spanish: el estanque superior
  alternatives_spanish:
  - el depósito superior
  - la alberca superior
  lexicon: HALOT
  rationale: בְּרֵכָה aquí es un depósito/pool de agua. «Estanque» comunica bien la imagen y «superior» preserva el adjetivo topográfico sin reinterpretarlo.
- source_word: מְסִלַּת
  english_pob_choice: on the road to
  chosen_spanish: junto al camino de
  alternatives_spanish:
  - sobre el camino de
  - en la vía hacia
  lexicon: HALOT
  rationale: La frase sitúa un lugar adyacente a una vía elevada. «Junto al camino de» suena natural en español y evita sobrecargar la construcción con un «a la» que sonaría rígido.
- source_word: שְׂדֵה כוֹבֵס
  english_pob_choice: the launderer’s field
  chosen_spanish: el campo del lavandero
  alternatives_spanish:
  - el campo del batanero
  - el campo del fuller
  lexicon: HALOT
  rationale: כובס es el que lava/limpia prendas. «Lavandero» conserva el sentido ocupacional con mayor transparencia para el lector español; se evita «batanero» por ser más oscuro y «fuller» por no ser español.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio divino «Yahvé» para ser coherente con la política POB y no enmascarar el Nombre con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El auditoría inglesa está en acuerdo alto y no registra revisiones aplicadas; por eso se mantiene la estructura sintáctica y la decisión léxica principal, ajustándolas solo a la naturalidad del español sin cambiar el contenido ni suavizar tensiones léxicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base para יְהוָה, conforme al estándar del proyecto.
  - Se translitera el nombre propio «Sear-jasub» y se explica su sentido en nota, preservando la función teológica del nombre en Isaías.
  - Se usan términos topográficos concretos («canal», «estanque», «camino», «campo») para reflejar el entorno hidráulico del pasaje sin introducir explicaciones no presentes en el hebreo.
