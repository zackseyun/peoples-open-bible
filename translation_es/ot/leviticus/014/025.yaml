revisions:
- from: Entonces degollará el carnero de la ofrenda por la culpa[a], y el sacerdote tomará de la sangre de la ofrenda por la culpa y la pondrá sobre el lóbulo de la oreja derecha del que se está limpiando, y sobre el pulgar de su mano derecha[b], y sobre el dedo gordo de su pie derecho.
  to: Entonces degollará el cordero de la ofrenda por la culpa[b], y el sacerdote tomará de la sangre de la ofrenda por la culpa y la pondrá sobre el lóbulo[a] de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho.
  rationale: Se revisa «carnero» a «cordero» para mantener mejor la alineación con la decisión auditada sobre כֶּבֶשׂ. Se cambia «el que se está limpiando» por «el que está siendo purificado» para reflejar el sentido procesual/pasivo de הַמִּטַּהֵר sin sugerir autoacción. Se corrige el anclaje de la nota b para que aparezca en la expresión «ofrenda por la culpa», que es el término comentado, y se ajusta su contenido para evitar confundir אָשָׁם con la ofrenda por el pecado.
