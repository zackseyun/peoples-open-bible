translation:
  language: es
  text: 'Y cuando el parto se le hacía difícil, la partera le dijo: «No temas, porque este también es un hijo para ti».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when it happened / And when
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y cuando
  - Y sucedió que
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el marco temporal de la escena. «Y aconteció que» conserva ese giro de transición sin volverlo artificial en español y mantiene un registro digno y bíblico.
- source_word: בְהַקְשֹׁתָהּ
  english_pob_choice: her labor was hard
  chosen_spanish: al dificultársele el parto
  alternatives_spanish:
  - cuando su parto fue קשה/duro
  - cuando tuvo un parto difícil
  - cuando le fue קשה el parto
  lexicon: HALOT
  rationale: El valor central es la dificultad/severidad del alumbramiento. «Al dificultársele el parto» expresa esa carga de modo natural en español y mantiene el foco en la experiencia del parto, no en una abstracción.
- source_word: בְלִדְתָּהּ
  english_pob_choice: her labor
  chosen_spanish: el parto
  alternatives_spanish:
  - su alumbramiento
  - su dar a luz
  - su nacimiento
  lexicon: HALOT
  rationale: El infinitivo con ב marca la esfera temporal del dar a luz. «El parto» es el equivalente más claro y sobrio en español para este contexto.
- source_word: הַמְיַלֶּדֶת
  english_pob_choice: the midwife
  chosen_spanish: la partera
  alternatives_spanish:
  - la comadrona
  - la mujer que asistía al parto
  lexicon: HALOT
  rationale: «Partera» es el término estándar y preciso en español para la mujer que asiste el nacimiento. Evita un rodeo explicativo innecesario.
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: La prohibición con ירא se expresa de forma directa y natural con «No temas». Es formal, breve y fiel al tono de consuelo del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación. «Porque» comunica con claridad la relación explicativa.
- source_word: גַם זֶה
  english_pob_choice: this also
  chosen_spanish: también este
  alternatives_spanish:
  - este también
  - este asimismo
  lexicon: HALOT
  rationale: La secuencia enfatiza al niño presente con un matiz aditivo. «También este» conserva ese orden y evita añadir «otro», que iría más allá del hebreo y de la revisión inglesa final.
- source_word: לָךְ בֵּן
  english_pob_choice: is a son for you
  chosen_spanish: es un hijo para ti
  alternatives_spanish:
  - te ha nacido un hijo
  - tú tienes un hijo
  lexicon: HALOT
  rationale: La frase hebrea literalmente dice «para ti, un hijo». «Es un hijo para ti» retiene la relación de beneficio/destino y suena más natural que un calco rígido.
translation_notes:
  revision_awareness: La redacción española sigue la lectura revisada del POB inglés que mantiene גַם זֶה como «this also» y evita la expansión interpretativa «another». Por eso la traducción conserva el valor aditivo sin introducir 'otro'.
  spanish_consistency_notes:
  - Se mantiene «partera» para הַמְיַלֶּדֶת en este pasaje.
  - Se usa «No temas» como fórmula reverencial y directa para אַל תִּירְאִי.
  - Se preserva «hijo» en el sentido natural del texto; no se sustituye por un término más interpretativo.
