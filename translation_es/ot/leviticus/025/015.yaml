    issue: «de tu hermano» para עֲמִיתֶךָ
    rationale: El hebreo en contexto legal significa compañero/fellow dentro de la comunidad, no hermano literal. La elección española introduce una especificación semántica no presente en el original ni en la decisión auditada en inglés.
  - severity: medium
