    issue: «sacrificaron» para וַיִּשְׁחֲטוּ sobreinterpreta el verbo
    rationale: El hebreo denota el acto concreto de matar/degollar el animal. El English POB documentó expresamente «they slaughtered» para evitar cargar el verbo con una categoría sacrificial no explicitada por el lexema mismo, aunque el contexto sea cultual. En español, «degollaron» preserva mejor esa precisión.
