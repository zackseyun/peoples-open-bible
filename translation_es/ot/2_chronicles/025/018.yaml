translation:
  language: es
  text: 'Entonces Joás, rey de Israel, envió un mensaje a Amasías, rey de Judá, diciendo: “El arbusto espinoso[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: ‘Da tu hija a mi hijo por esposa.’ Entonces pasó una bestia del campo que estaba en el Líbano, y pisoteó al arbusto espinoso.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cardo’ o ‘zarza’; el hebreo nombra una planta espinosa, pero la especie exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוֹחַ
  english_pob_choice: the thornbush
  chosen_spanish: el espino
  alternatives_spanish:
  - el arbusto espinoso
  - la zarza
  - el cardo
  lexicon: HALOT
  rationale: חוֹחַ designa una planta espinosa; en español, 'espino' comunica bien la imagen de un arbusto pequeño y punzante frente al cedro. Se evita 'cardo' por posible especificidad botánica y 'zarza' por asociación menos precisa.
- source_word: הָאֶרֶז
  english_pob_choice: the cedar
  chosen_spanish: el cedro
  alternatives_spanish:
  - el cedro
  lexicon: HALOT
  rationale: אֶרֶז es simplemente 'cedro'. Mantiene el contraste de altura, nobleza y fuerza del relato.
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - en el Líbano
  lexicon: HALOT
  rationale: La preposición y el topónimo se traducen de forma directa y natural al español, conservando el escenario del símil.
- source_word: שָׁלַח ... לֵאמֹר
  english_pob_choice: sent ... saying
  chosen_spanish: envió ... diciendo
  alternatives_spanish:
  - mandó ... diciendo
  - envió mensaje ... diciendo
  lexicon: HALOT
  rationale: '''Envió ... diciendo'' conserva la estructura narrativa hebrea sin añadir explicaciones. ''Mandó'' sería posible, pero ''envió'' sigue de cerca el valor de שלח en este marco diplomático.'
- source_word: תְּנָה אֶת־בִּתְּךָ לִבְנִי לְאִשָּׁה
  english_pob_choice: Give your daughter to my son as a wife
  chosen_spanish: Da tu hija a mi hijo por esposa
  alternatives_spanish:
  - Da tu hija a mi hijo como esposa
  - Entrega tu hija a mi hijo por esposa
  lexicon: HALOT
  rationale: La fórmula expresa una propuesta matrimonial o alianza. 'Por esposa' reproduce la función de לְאִשָּׁה con español natural y breve; evita una paráfrasis más explicativa.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: a wild beast of the field
  chosen_spanish: una bestia del campo
  alternatives_spanish:
  - un animal salvaje del campo
  - una bestia salvaje del campo
  lexicon: HALOT
  rationale: '''Bestia del campo'' conserva el tono elevado y la imaginería del hebreo. Se añade ''salvaje'' implícitamente en el contraste del contexto, pero no es necesario decirlo explícitamente.'
- source_word: וַתַּעֲבֹר
  english_pob_choice: passed by
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó por allí
  - pasó de largo
  lexicon: HALOT
  rationale: En español, el movimiento incidental queda claro con 'pasó'; no hace falta forzar 'pasó por allí' si el contexto ya describe el lugar.
- source_word: וַתִּרְמֹס
  english_pob_choice: trampled
  chosen_spanish: pisoteó
  alternatives_spanish:
  - trilló
  - aplastó con los pies
  - trató de
  lexicon: HALOT
  rationale: רמס implica aplastar o hollar con los pies. 'Pisoteó' es el equivalente más natural y vívido en español, con la misma fuerza de la imagen.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que cambió el conector narrativo de 'But' a 'Then'; por eso el español usa 'Entonces' para reflejar la conjunción simple וַ- sin cargar el contraste. También se preservó la estructura retórica del símil y el paralelismo de 'en el Líbano' en ambos miembros.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió 'Judá' e 'Israel' como nombres geopolíticos estándar y 'Joás'/'Amasías' con acentuación española habitual.
  - El registro busca ser bíblico y publicable sin depender de formulaciones tradicionales que oculten el sentido vegetal concreto de חוֹחַ.
