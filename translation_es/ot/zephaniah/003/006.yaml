translation:
  language: es
  text: He destruido naciones; sus torres de esquina[a] están devastadas. He dejado desiertas sus calles, sin que pase nadie. Sus ciudades están arruinadas, sin un hombre[c][b], sin habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''sus esquinas'', posiblemente en referencia a fortificaciones o torres de esquina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''sus plazas'' o ''sus lugares abiertos''.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''sin un hombre''; un modismo aquí para expresar despoblación total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכְרַתִּי
  english_pob_choice: I have cut off
  chosen_spanish: He exterminado
  alternatives_spanish:
  - He cortado de raíz
  - He eliminado
  lexicon: HALOT
  rationale: El verbo hebreo puede significar cortar, arrancar o destruir. En español, 'exterminado' comunica con fuerza la acción judicial de eliminar por completo, pero mantiene mejor la naturalidad que un calco literal. Se evita 'he cortado' por sonar menos idiomático en este contexto de juicio total.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es la equivalencia más directa y adecuada para entidades políticas bajo juicio. Se conserva el plural concreto del hebreo sin introducir una interpretación adicional.'
- source_word: נָשַׁמּוּ
  english_pob_choice: are laid waste
  chosen_spanish: están devastadas
  alternatives_spanish:
  - están desoladas
  - están arruinadas
  lexicon: HALOT
  rationale: '''Devastadas'' reproduce bien el resultado de ruina y abandono del hebreo. Se elige una forma en español que suene natural y paralela al resto del versículo.'
- source_word: פִּנּוֹתָם
  english_pob_choice: their corner towers
  chosen_spanish: sus torres de esquina
  alternatives_spanish:
  - sus esquinas
  - sus torres de los ángulos
  - sus fortificaciones de esquina
  lexicon: HALOT
  rationale: La frase hebrea literalmente significa 'sus esquinas', pero en contexto de destrucción urbana puede aludir a estructuras de esquina o torres defensivas. 'Torres de esquina' conserva la ambigüedad documentada y evita imponer una precisión que el texto no exige.
- source_word: הֶחֱרַבְתִּי
  english_pob_choice: I have made desolate
  chosen_spanish: He dejado desiertas
  alternatives_spanish:
  - He hecho desiertas
  - He arruinado
  lexicon: HALOT
  rationale: El verbo se usa con calles y plazas, por lo que la imagen dominante es dejar vacíos los espacios urbanos. 'He dejado desiertas' mantiene la idea de despoblamiento y resulta idiomático en español.
- source_word: חוּצוֹתָם
  english_pob_choice: their streets
  chosen_spanish: sus calles
  alternatives_spanish:
  - sus plazas
  - sus lugares públicos
  lexicon: HALOT
  rationale: '''Calles'' es la equivalencia más clara y general para חוּצוֹת en este contexto urbano. Aunque ''plazas'' o ''lugares públicos'' son posibles, ''calles'' preserva la fluidez del texto.'
- source_word: מִבְּלִי עוֹבֵר
  english_pob_choice: with no one passing through
  chosen_spanish: sin que pase nadie
  alternatives_spanish:
  - sin que nadie pase
  - sin transeúnte alguno
  lexicon: HALOT
  rationale: La expresión hebrea indica ausencia total de tránsito. 'Sin que pase nadie' es natural en español y conserva la idea de circulación interrumpida.
- source_word: נִצְדּוּ
  english_pob_choice: are devastated
  chosen_spanish: están arruinadas
  alternatives_spanish:
  - están devastadas
  - están desoladas
  lexicon: HALOT
  rationale: El verbo es raro y su sentido exacto es discutido; en contexto apunta a ruina/destrucción de las ciudades. 'Están arruinadas' evita una precisión fingida y conserva el paralelismo con el verso.
- source_word: עָרֵיהֶם
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblaciones
  - sus urbes
  lexicon: HALOT
  rationale: '''Ciudades'' es la traducción directa y más natural de עיר en este marco de juicio. Mantiene el contraste con calles y plazas.'
- source_word: מִבְּלִי אִישׁ
  english_pob_choice: without a man
  chosen_spanish: sin un hombre
  alternatives_spanish:
  - sin nadie
  - sin una persona
  lexicon: HALOT
  rationale: Se conserva el matiz masculino singular del hebreo, conforme a la política de precisión de género cuando el texto lo usa. En español, 'sin un hombre' suena un poco más marcado, pero refleja mejor la forma original.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: with no inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite
  - sin morador
  lexicon: HALOT
  rationale: '''Sin habitante'' reproduce de forma concisa el cierre intensivo de despoblación. La frase mantiene el valor nominal del hebreo y evita añadir verbo donde no lo hay.'
theological_decisions:
- issue: Fórmula de despoblación con אִישׁ
  english_pob_reading: without a man
  chosen_spanish_reading: sin un hombre
  alternative_spanish_readings:
  - sin nadie
  - sin una persona
  rationale: Se conserva el sustantivo masculino singular del hebreo, en lugar de neutralizarlo. En contexto, la expresión es idiomática y se completa con 'sin habitante', que aclara que se trata de despoblación total.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa POB más reciente se mantuvo sin cambios sustantivos tras revisión; el texto español sigue esa misma lectura de alta concordancia, conservando las ambigüedades documentadas en פִּנּוֹתָם, חוּצוֹתָם y מִבְּלִי אִישׁ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología estándar del proyecto cuando corresponda, pero este versículo no contiene el nombre divino explícito.
  - Se evita 'SEÑOR' como sustituto teológico porque el hebreo aquí no lo usa.
  - '''Naciones'', ''ciudades'' y ''calles'' siguen la redacción del POB inglés y la semántica del hebreo sin sobreespecificar.'
  - 'Se conserva la tensión lexical en פִּנּוֹתָם: puede aludir tanto a esquinas como a estructuras de esquina; la nota lo documenta.'
