translation:
  language: es
  text: Para el director musical. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por David' o 'para David'; el encabezado hebreo puede indicar autoría, asociación o dedicación.
