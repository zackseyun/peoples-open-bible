translation:
  language: es
  text: Quien busca lo que agrada a Dios acepta la instrucción, y quien lo busca desde temprano recibirá respuesta por medio de su oración.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradición griega: «No ofrezcas sobornos, porque no los aceptará». El testimonio hebreo conservado aquí difiere de manera sustancial del griego.'
    reason: textual_variant
lexical_decisions:
- source_word: דורש
  english_pob_choice: one who seeks
  chosen_spanish: quien busca
  alternatives_spanish:
  - el que busca
  - el buscador
  lexicon: HALOT
  rationale: El participio expresa una acción continua o habitual. «Quien busca» conserva ese valor de manera natural en español y evita una nominalización más pesada.
- source_word: חפצי אל
  english_pob_choice: what pleases God
  chosen_spanish: lo que agrada a Dios
  alternatives_spanish:
  - lo que desea Dios
  - los deseos de Dios
  - lo que es del agrado de Dios
  lexicon: HALOT
  rationale: La construcción es compacta. «Lo que agrada a Dios» comunica la idea de buscar la voluntad o el beneplácito divino sin añadir un matiz más fuerte de deseo interno que podría sonar menos idiomático en español.
- source_word: יקח לקח
  english_pob_choice: will accept instruction
  chosen_spanish: acepta la instrucción
  alternatives_spanish:
  - recibe instrucción
  - acepta enseñanza
  - toma enseñanza
  lexicon: HALOT
  rationale: El hebreo alude a recibir o aceptar enseñanza/corrección. «Acepta la instrucción» mantiene el sentido sapiencial y suena natural en español. Se usa presente gnómico, frecuente en proverbios y sentencias.
- source_word: משחרהו
  english_pob_choice: the one who seeks him early
  chosen_spanish: quien lo busca desde temprano
  alternatives_spanish:
  - quien madruga para buscarlo
  - quien lo busca diligentemente
  - quien lo busca de mañana
  lexicon: HALOT
  rationale: La raíz שׁחר puede implicar buscar temprano y también con diligencia. «Desde temprano» conserva el componente temporal sin imponer «diligentemente» en el texto principal.
- source_word: ישיג מענה
  english_pob_choice: will receive an answer
  chosen_spanish: recibirá respuesta
  alternatives_spanish:
  - obtendrá respuesta
  - alcanzará respuesta
  lexicon: HALOT
  rationale: «Recibirá respuesta» es una manera fluida de expresar el resultado del verbo hebreo, sin perder la idea de obtener algo esperado.
- source_word: ויענהו בתפלתו
  english_pob_choice: through his prayer
  chosen_spanish: por medio de su oración
  alternatives_spanish:
  - en su oración
  - mediante su oración
  - a través de su oración
  lexicon: HALOT
  rationale: La frase explica el medio o el ámbito de la respuesta. «Por medio de su oración» comunica bien la relación causal/instrumental y evita ambigüedad.
- source_word: μὴ δωροκόπει
  english_pob_choice: not adopted in main text
  chosen_spanish: no aceptado en el texto principal; preservado en nota textual
  alternatives_spanish:
  - no ofrezcas soborno
  - no intentes sobornar
  lexicon: BDAG
  rationale: La tradición griega lee una advertencia sobre sobornos, pero el hebreo conservado ofrece otra sentencia. Como Sirácides se traduce aquí primariamente desde el hebreo cuando está disponible, la lectura griega se documenta en nota y no reemplaza el texto base.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y la tradición griega
  english_pob_reading: Translate the surviving Hebrew text as primary, while preserving the Greek as an alternative textual tradition in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como base y señalar en nota la lectura griega alternativa sobre soborno.
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «No ofrezcas soborno, porque no lo aceptará».'
  - Combinar ambas tradiciones en una sola redacción.
  rationale: La política del proyecto para Sirácides prioriza el hebreo donde existe. Aquí la diferencia entre testigos es sustancial y afecta el sentido; por eso la nota textual preserva la lectura griega sin diluir la forma hebrea transmitida.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el griego de Swete como control y nota textual'
translation_notes:
  revision_awareness: No se requieren cambios con respecto al último pase registrado; se mantiene la decisión de base hebrea con nota de variante griega textual.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «instrucción» para לקח dentro de un contexto sapiencial, evitando un calco como «toma enseñanza».
  - Se preserva la tensión textual hebreo/griego en nota, sin armonizar artificialmente los testigos.
  - La forma verbal en presente gnómico («acepta») y futuro («recibirá») refleja el carácter proverbial del verso.
