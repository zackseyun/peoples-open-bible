translation:
  language: es
  text: Y cualquier cosa sobre la cual caiga parte de su carcasa[a] quedará impura. Sea horno o fogón[b], deberá ser destruido; son impuros, y serán impuros para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus carcasas» o «su cadáver». El hebreo se refiere a la carcasa del animal impuro en un contexto de pureza ritual.'
    reason: lexical_alternative
  - marker: b
    text: «Fogón» traduce una instalación de cocina; el término hebreo puede designar una estufa, un soporte para cocinar o una estructura parecida a un hogar.
    reason: cultural_note
lexical_decisions:
- source_word: נִּבְלָתָם
  english_pob_choice: their carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - sus cadáveres
  - el cadáver de ellos
  lexicon: HALOT
  rationale: En Levítico, נְבֵלָה designa el cadáver de un animal en contexto de impureza. En español, «cadáver» comunica bien el referente, y el posesivo plural «su» conserva el sentido colectivo del sufijo hebreo sin forzar un plural innecesario.
- source_word: יִפֹּל
  english_pob_choice: falls
  chosen_spanish: caiga
  alternatives_spanish:
  - cae
  - llegue a caer
  lexicon: HALOT
  rationale: El imperfecto hebreo en estilo legal expresa caso general; en español, el subjuntivo «caiga» funciona naturalmente dentro de la cláusula relativa y mantiene el valor normativo.
- source_word: יִטְמָא
  english_pob_choice: shall become unclean
  chosen_spanish: será impura
  alternatives_spanish:
  - quedará impura
  - se hará impura
  - será ritualmente impura
  lexicon: HALOT
  rationale: Se conserva el término bíblico «impura» para טמא, como en el audit trail inglés con «unclean». Aunque «ritualmente impura» aclara el ámbito, se mantiene la forma breve y estable para no sobrecargar el texto.
- source_word: תַּנּוּר
  english_pob_choice: oven
  chosen_spanish: horno
  alternatives_spanish:
  - horno de cocción
  - horno para pan
  lexicon: HALOT
  rationale: «Horno» es el equivalente general y natural en español para el aparato de cocción que el hebreo designa.
- source_word: כִירַיִם
  english_pob_choice: hearth
  chosen_spanish: fogón
  alternatives_spanish:
  - fogón de cocina
  - estufa
  - hornillo
  lexicon: HALOT
  rationale: El término hebreo alude a una instalación de cocina; «fogón» mantiene el campo doméstico y evita especificar indebidamente una tecnología antigua concreta.
- source_word: יֻתָּץ
  english_pob_choice: it must be broken down
  chosen_spanish: será demolido
  alternatives_spanish:
  - deberá ser quebrado
  - deberá ser destruido
  - será derribado
  lexicon: HALOT
  rationale: La forma pasiva expresa la destrucción requerida del aparato contaminado. «Será demolido» comunica la obligación de eliminarlo con naturalidad en español; en este contexto puede aplicarse tanto a una estructura como a un artefacto fijo.
- source_word: טְמֵאִים הֵם
  english_pob_choice: they are unclean
  chosen_spanish: impuros son
  alternatives_spanish:
  - son impuros
  - ritualmente impuros son
  lexicon: HALOT
  rationale: Se preserva la predicación breve del hebreo. El orden invertido «impuros son» refleja el énfasis enfático del original sin resultar ininteligible en español.
- source_word: וּטְמֵאִים יִהְי֥וּ לָכֶם
  english_pob_choice: they shall be unclean for you
  chosen_spanish: serán impuros para ustedes
  alternatives_spanish:
  - les serán impuros
  - quedarán impuros para ustedes
  - serán considerados impuros por ustedes
  lexicon: HALOT
  rationale: «Para ustedes» conserva la orientación relacional del hebreo לָכֶם. «Serán impuros» sigue el valor legal de estado resultante sin introducir explicaciones ajenas al texto.
theological_decisions:
- issue: Impureza ritual versus inmundicia moral
  english_pob_reading: Render טמא/טמאים as 'unclean' rather than expanding to 'ceremonially defiled' in the main text.
  chosen_spanish_reading: Traducir טמא/טמאים como «impura/impuro(s)» en el texto principal, sin expandirlo a «ritualmente impura» salvo en nota si hiciera falta.
  alternative_spanish_readings:
  - ritualmente impura
  - ceremonialmente impura
  rationale: El pasaje trata de impureza ritual ligada a la ley de pureza, no de culpa moral. Mantener «impura» conserva la terminología bíblica establecida y permite notas si se requiere precisar el ámbito.
  doctrine_reference: Consistencia terminológica de pureza ritual en la traducción bíblica
- issue: Relación poseída del cadáver con varios objetos
  english_pob_reading: '''their carcass'' with a collective singular sense under a plural suffix.'
  chosen_spanish_reading: «su cadáver» con valor colectivo implícito, no «sus cadáveres» en el texto principal.
  alternative_spanish_readings:
  - sus cadáveres
  - el cadáver de ellos
  rationale: El hebreo usa un sustantivo singular con sufijo plural para referirse colectivamente al cadáver del animal impuro. En español, el singular posesivo comunica esa colectividad sin desviar la lectura hacia múltiples cadáveres separados.
  doctrine_reference: Fidelidad al número gramatical con valor colectivo en hebreo
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantuvieron el valor jurídico-general del imperfecto, la terminología de impureza ritual y la distinción entre horno y instalación de cocción; se adaptó «hearth» a «fogón» por naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «impuro/impura(s)» como término técnico estable para טמא en contextos de pureza ritual.
  - Se conserva el tono legal normativo con futuro de mandato en español.
  - El posesivo «su» en singular refleja el valor colectivo del hebreo נבלתם sin introducir ambigüedad semántica.
