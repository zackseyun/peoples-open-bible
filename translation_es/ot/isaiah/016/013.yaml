    issue: 'Expresión temporal poco natural: «en tiempo pasado»'
    rationale: Aunque intenta reproducir literalmente «in time past», en español suena rígido y no idiomático. «Antiguamente» o «en otro tiempo» conservan el valor de מֵאָז con mejor legibilidad.
  - severity: low
    issue: Nota al pie mejorable en su alternativa léxica
    rationale: La nota actual ofrece «respecto de Moab en otro tiempo», que es aceptable, pero conviene armonizarla con una formulación más natural y cercana al abanico semántico documentado.
