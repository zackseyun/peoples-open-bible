revisions:
- from: No niegues un regalo[a] a tu pobre, y no desprecies la petición del pobre, ni le des ocasión de maldecirte.
  to: No retengas una dádiva[a] al pobre que depende de ti, y no desprecies la petición del pobre, ni le des ocasión para que te maldiga.
  rationale: Se ajusta «regalo» a «dádiva» para reflejar mejor מַתָּן en contexto de ayuda al necesitado, y se reemplaza «a tu pobre» por «al pobre que depende de ti» para expresar de forma natural en español la responsabilidad implícita en מִמִּסְכֵּנֶךָ. También se armoniza la nota con la formulación final del texto.
  reviewer_model: gpt-5.4
