review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia participial del griego y conserva el sentido principal: levantarse del ayuno, con las ropas rasgadas, adoptar postura de oración y comenzar a hablar. Sin embargo, hay dos desajustes relevantes con la auditoría inglesa y con el griego: (1) las notas al pie están invertidas respecto de los asuntos documentados; la anomalía textual de ἔλεγον debe anotarse en «diciendo», no en «ayuno»; y la alternativa léxica documentada corresponde a «vestidura santa/sagrada». (2) «hacia el Señor» es posible, pero en español de oración «al Señor» suena más natural sin perder el valor direccional en este contexto verbal.'
  spanish_quality_summary: El español es claro y digno, pero «diciendo.» con punto final queda menos natural que «diciendo:» al introducir una oración directa en el versículo siguiente. «Dobló sus rodillas» es comprensible, aunque «dobló las rodillas» sería más idiomático; no es un error grave. La redacción general es buena.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Señor» para κύριος aquí es aceptable porque el griego tiene κύριον, no el Tetragrámaton explícito. «Santa vestidura» preserva ἱερὰν ἐσθῆτα, aunque «vestidura sagrada» también sería una buena alternativa documentable. No debe añadirse «sacerdotal».
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a los puntos auditados en inglés.
    rationale: La nota textual sobre el plural ἔλεγον debe ir anclada en «diciendo», mientras que la nota de alternativa léxica debe ir en «santa vestidura». La nota actual en «ayuno» introduce un comentario distinto del auditado y omite la anomalía textual principal.
  - severity: medium
    issue: Puntuación de introducción al discurso directo.
    rationale: Al final de una cláusula introductoria como «diciendo», el español bíblico y general pide dos puntos, no punto. Esto mejora la legibilidad y refleja mejor que sigue una oración de Esdras.
  - severity: low
    issue: «hacia el Señor» es menos idiomático que «al Señor» en este contexto.
    rationale: Con verbos de oración y gesto dirigidos a Dios, «al Señor» suena más natural en español sin perder fidelidad al griego πρὸς τὸν κύριον.
  revised_spanish_text: 'Y levantándose del ayuno, con sus vestidos y la santa vestidura[a] rasgados, dobló sus rodillas y extendió sus manos al Señor, diciendo[b]:'
  revised_footnotes:
  - marker: a
    text: O «la vestidura sagrada». El griego no dice explícitamente «sacerdotal», aunque el contexto pueda sugerir una indumentaria sagrada.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene una forma plural, literalmente «decían» o, según la explicación textual, posiblemente «decía». El contexto indica con fuerza que Esdras está introduciendo su oración, por eso aquí se vierte simplemente como «diciendo».
    reason: textual_variant
  revision_rationale: Se corrigen las notas al pie para alinearlas con la auditoría inglesa y con los puntos realmente significativos del griego; se cambia «hacia el Señor» por «al Señor» por naturalidad idiomática; y se sustituye el punto por dos puntos tras «diciendo» para introducir correctamente el discurso siguiente. No se requiere una reescritura mayor.
