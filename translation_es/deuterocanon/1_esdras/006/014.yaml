    reason: lexical_alternative
  - marker: b
    text: O «el Dios del cielo». El griego de Swete lee «el celestial», mientras la tradición relacionada de Esdras suele ampliar la expresión a «Dios del cielo».
    reason: alternative_reading
  revision_rationale: Se corrige la inserción no justificada de «Yahvé» para ajustarse al griego κύριος y al audit trail inglés, que preserva «Lord of Israel». Se mantiene «el celestial» con su nota alternativa, así como el resto de la estructura y terminología del borrador, que son sustancialmente fieles y naturales.
