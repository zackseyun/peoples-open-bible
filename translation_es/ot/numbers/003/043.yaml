    rationale: La nota [a] explica el hebreo במספר שמות ('por el número de nombres'), no 'primogénitos varones'. Debe anclarse donde aparece esa expresión para cumplir la disciplina de notas y evitar confusión.
  - severity: medium
    issue: '''Según su registro'' no es la mejor representación de לִפְקֻדֵיהֶם.'
    rationale: Aunque 'registro' puede relacionarse con inscripción censal, la revisión inglesa ya afinó el sentido a 'according to their count'. En español, 'según su conteo' conserva mejor la idea de cómputo oficial del grupo sin desplazar el foco al documento.
  revised_spanish_text: Y todos los primogénitos varones, por el número de nombres[a], desde un mes de edad en adelante, según su conteo[b], eran veintidós mil, trescientos setenta y tres.
