lexical_decisions:
- source_word: ἐξέλεξεν
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: El aoristo expresa una acción puntual de selección; «escogió» es natural en español y mantiene el sentido directo de elegir o seleccionar.
- source_word: Βακχίδης
  english_pob_choice: Bacchides
  chosen_spanish: Bacjides
  alternatives_spanish:
  - Báquides
  - Bacquides
  lexicon: transliteración del griego
  rationale: Se conserva el nombre propio mediante transliteración. «Bacjides» refleja la forma griega sin traducir el nombre.
- source_word: τοὺς ἀσεβεῖς ἄνδρας
  english_pob_choice: wicked men
  chosen_spanish: hombres impíos
  alternatives_spanish:
  - hombres malvados
  - hombres irreverentes
  - hombres sin piedad
  lexicon: LSJ
  rationale: ἀσεβεῖς remite a personas sin piedad o impías; «impíos» preserva bien ese matiz religioso-moral. Se mantiene «hombres» porque ἄνδρας es masculino explícito.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: los puso como
  alternatives_spanish:
  - los nombró
  - los estableció como
  - los instituyó como
  lexicon: LSJ
  rationale: El verbo indica establecer o poner a alguien en una posición de autoridad. «Los puso como» comunica la acción de asignarlos a un cargo sin sobrecargar el texto.
- source_word: κυρίους
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - señores
  - amos
  - maestros
  lexicon: LSJ
  rationale: Aunque el sentido literal es «señores» o «amos», en este contexto administrativo/político el valor funcional es el de autoridad sobre una región; «gobernantes» evita connotaciones extrañas en español.
- source_word: τῆς χώρας
  english_pob_choice: over the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la región
  - del país
  - de la tierra/territorio
  lexicon: LSJ
  rationale: χώρα puede significar tierra, región o territorio. «Tierra» mantiene la amplitud territorial del griego y suena natural en español bíblico.
theological_decisions:
