id: 1PE.1.16
reference: 1 Peter 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διότι γέγραπται ὅτι Ἅγιοι ἔσεσθε, ὅτι ἐγὼ ἅγιος.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/016.yaml
  text: 'because it is written, "You shall be holy, because I am holy."'
translation:
  language: ko
  text: '기록되었기를, 「너희는 거룩할지니, 이는 내가 거룩하기 때문이라」[a] 함과 같습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 레위기 11:44-45; 19:2; 20:7 인용. 1인칭은 야훼의 자기 선언이다.
    reason: ot_citation
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_korean: 기록되었기를
  alternatives_korean:
  - 기록되어 있기를
  - 성경에 이르기를
  lexicon: BDAG
  rationale: 신약의 구약 인용 정형(γέγραπται)을 한국 성서 전통의 「기록되었기를」로 옮긴다.
- source_word: Ἅγιοι ἔσεσθε
  english_pob_choice: You shall be holy
  chosen_korean: 너희는 거룩할지니
  alternatives_korean:
  - 너희는 거룩하라
  - 너희는 거룩한 자가 되라
  lexicon: BDAG
  rationale: 미래 형식의 명령적 의미(LXX 레 11:44 인용)를 「~할지니」로 살리며, 인용 안에서는 평어 명령을 사용한다.
theological_decisions:
- issue: 인용 안의 1인칭이 야훼임을 명시
  chosen_reading: 「내가 거룩하기 때문이라」 (각주로 OT 인용 출처 표기)
  alternative_readings:
  - 인용 표시 없이 본문 흐름에 흡수
  rationale: 베드로전서 1:16은 레위기의 야훼 자기선언을 직접 인용한다. 본문에서 1인칭은 야훼 자신이며, 각주로 출처를 밝힌다.
  doctrine_reference: 'DOCTRINE.md: 신적 칭호의 투명성; OT 인용 명시'
