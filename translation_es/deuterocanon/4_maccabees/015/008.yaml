translation:
  language: es
  text: Por su temor a Dios[a], pasó por alto la seguridad temporal de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la liberación temporal de sus hijos». El griego σωτηρία puede significar «liberación» o «preservación»; aquí se refiere al rescate físico y de corto plazo, no a la salvación eterna.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸν πρὸς τὸν θεὸν φόβον
  english_pob_choice: Because of her fear toward God
  chosen_spanish: Por su temor a Dios
  alternatives_spanish:
  - A causa de su reverente temor hacia Dios
  - Por reverencia a Dios
  lexicon: BDAG
  rationale: La construcción causal de διὰ con acusativo se refleja naturalmente con «por» y el sintagma «su temor a Dios» conserva el valor fuerte de φόβος sin rebajarlo a mera admiración. «Temor a Dios» es una formulación española transparente y fiel; «reverente temor» explicita la cualidad reverencial, pero suena más interpretativa.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: toward God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: BDAG
  rationale: πρός con acusativo expresa orientación hacia Dios. En español, «a Dios» es la forma más natural y compacta para conservar esa dirección relacional sin introducir un matiz devocional más amplio que el del griego.
- source_word: ὑπερεῖδεν
  english_pob_choice: disregarded
  chosen_spanish: despreció
  alternatives_spanish:
  - pasó por alto
  - desatendió
  - consideró de menor importancia
  lexicon: LSJ
  rationale: El verbo indica no prestar atención o tener algo en poco. En este contexto no significa que la madre no advirtiera la seguridad de sus hijos, sino que la subordinó a una lealtad superior. «Despreció» conserva la fuerza valorativa del acto mejor que una expresión más débil como «pasó por alto».
- source_word: τὴν ... σωτηρίαν
  english_pob_choice: the temporary safety
  chosen_spanish: la salvación temporal
  alternatives_spanish:
  - la liberación temporal
  - la preservación temporal
  - la seguridad temporal
  lexicon: BDAG
  rationale: σωτηρία puede significar salvación, liberación o preservación. Aunque el contexto es físico y breve, «salvación temporal» conserva el término tradicional de POB y, con «temporal», evita que se lea como salvación eterna. «Seguridad» sería claro, pero atenúa demasiado el alcance del sustantivo griego.
- source_word: πρόσκαιρον
  english_pob_choice: temporary
  chosen_spanish: temporal
  alternatives_spanish:
  - por un tiempo
  - transitoria
  - pasajera
  lexicon: BDAG
  rationale: El adjetivo contrapone lo momentáneo a una fidelidad más alta. «Temporal» es natural en español y mantiene de forma directa la limitación de duración.
- source_word: τῶν τέκνων
  english_pob_choice: of her children
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de los hijos
  - de sus pequeños
  lexicon: BDAG
  rationale: τέκνα significa «hijos»; el posesivo «sus» es necesario en español para reflejar el sujeto femenino del contexto. «Sus hijos» resulta más idiomático que repetir el artículo indefinido o usar una perífrasis.
theological_decisions:
- issue: φόβος referido a Dios
  english_pob_reading: reverent fear toward God
  chosen_spanish_reading: temor reverente a Dios
  alternative_spanish_readings:
  - reverencia a Dios
  - awe ante Dios
  rationale: La frase mantiene la tensión bíblica de un temor real orientado a Dios, no una simple admiración. «Temor» preserva el peso teológico del término y «a Dios» aclara su objeto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
- issue: Sentido de σωτηρία en este contexto
  english_pob_reading: temporal physical safety, not eternal salvation
  chosen_spanish_reading: salvación temporal, es decir, rescate físico de corto plazo
  alternative_spanish_readings:
  - liberación temporal
  - preservación temporal
  - seguridad temporal
  rationale: El adjetivo πρόσκαιρον restringe el alcance a una спасación/rescate breve y terreno. «Salvación temporal» conserva la densidad del sustantivo y, con «temporal», evita una lectura soteriológica eterna; el contexto de sufrimiento físico confirma esta limitación.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido confirmado por el griego de Swete y el audit trail inglés: causa por temor a Dios, orientación hacia Dios, rechazo/menosprecio de la preservación inmediata de los hijos. Se adoptó «salvación temporal» como opción española fiel a σωτηρία, aunque la alternativa «liberación temporal» se mantiene en nota para respetar la ambigüedad léxica documentada.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva el paralelismo causal de διὰ... φόβον con «por su temor» para no diluir la relación lógica.
  - «Temor a Dios» se mantiene sin suavizarlo a «reverencia» en el texto principal para preservar la tensión teológica.
  - «Salvación temporal» y la nota aclaran el matiz físico y no eterno de σωτηρία en este contexto.
  - La nota con marcador [a] corresponde a la única alternativa léxica significativa preservada del audit trail inglés.
