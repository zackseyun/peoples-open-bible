review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la imagen central de abundancia agrícola extrema: el que ara alcanza al que siega, el que pisa las uvas alcanza al sembrador, los montes destilan producto, y las colinas se derriten. Mantiene correctamente ‘Yahvé’ para יהוה y refleja adecuadamente נְאֻם con ‘declara’. Sin embargo, las notas no siguen fielmente el estado auditado del inglés: la nota [b] dice ‘O “el que siembra la semilla”’ aunque esa ya es la lectura del texto principal, y omite la alternativa literal documentada; además, la nota [c] combina indebidamente dos notas inglesas distintas (‘new wine’ y la explicación cultural de abundancia) en una sola nota. También conviene ajustar ‘Mira’ a una formulación más natural como llamado profético sin tono demasiado coloquial.'
  spanish_quality_summary: El español es claro, moderno y digno. ‘Vienen días —declara Yahvé—’ y la secuencia agrícola suenan naturales. ‘Mira’ es comprensible, pero en registro profético ‘He aquí’ o ‘Miren’ encajan mejor; dado el objetivo de español moderno y legible, ‘Miren’ funciona mejor que ‘Mira’. ‘Mosto’ es defendible, pero ‘vino dulce’ comunica mejor la decisión inglesa principal ‘sweet wine’ y evita la ambigüedad de ‘mosto’ en muchos lectores. La puntuación y sintaxis son buenas.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> ‘Yahvé’ correctamente. No hay conflictos con otros términos doctrinales clave. La principal desalineación está en la documentación de notas y en que ‘mosto’ se aparta de la elección auditada principal ‘sweet wine’ sin necesidad; es mejor usar ‘vino dulce’ y conservar ‘vino nuevo’ como alternativa en nota.'
  issues:
  - severity: medium
    issue: La nota [b] no corresponde al texto principal ni a la decisión auditada.
    rationale: El texto ya dice ‘el que siembra la semilla’, por lo que una nota ‘O “el que siembra la semilla”’ es errónea. La alternativa documentada era la lectura más literal ‘el que saca/arrastra la semilla’ o similar, con explicación de que probablemente es un modismo para sembrar.
  - severity: medium
    issue: La nota [c] fusiona dos notas distintas en una sola.
    rationale: El inglés conserva una alternativa léxica para עָסִיס (‘new wine’) y una nota cultural separada sobre la superposición de estaciones. En español deben mantenerse como notas distintas con marcadores únicos y anclados en el lugar pertinente.
  - severity: low
    issue: ‘Mira’ suena algo coloquial para הִנֵּה en este contexto profético.
    rationale: Aunque funcional, ‘Miren’ encaja mejor como llamado de atención profético y suena menos abrupto en español bíblico contemporáneo de registro digno.
  - severity: low
    issue: ‘Mosto’ es posible, pero no refleja de forma óptima la elección principal inglesa ‘sweet wine’.
    rationale: ‘Mosto’ puede sugerir simplemente jugo o mosto sin fermentar, mientras que ‘vino dulce’ comunica mejor el matiz de עָסִיס y deja ‘vino nuevo’ como alternativa en nota.
  revised_spanish_text: Miren, vienen días —declara Yahvé— en que el que ara alcanzará al que siega, y el que pisa las uvas al que siembra la semilla[a]; los montes destilarán vino dulce[b][c], y todas las colinas se derretirán.
  revised_footnotes:
