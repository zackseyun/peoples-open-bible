translation:
  language: es
  text: En el octavo día[a], el líder de los hijos de Manasés fue Gamaliel, hijo de Pedasur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Manasés», una designación tribal; es decir, los descendientes o la tribu de Manasés.'
    reason: cultural_note
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: On the eighth day
  chosen_spanish: Al octavo día
  alternatives_spanish:
  - En el octavo día
  - Al día ocho
  lexicon: HALOT
  rationale: La expresión hebrea es temporal y el español natural preferido es una frase adverbial con 'al'. 'Octavo' conserva la forma ordinal y no añade contexto no explícito en el versículo.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En este contexto tribal y de ofrenda, נָשִׂיא designa al representante reconocido del grupo. 'Líder' comunica bien la función sin cargar con connotaciones monárquicas de 'príncipe'.
- source_word: לִבְנֵי מְנַשֶּׁה
  english_pob_choice: of the sons of Manasseh
  chosen_spanish: de los hijos de Manasés
  alternatives_spanish:
  - para los hijos de Manasés
  - del pueblo de Manasés
  - de la tribu de Manasés
  lexicon: HALOT
  rationale: Se conserva el idioma genealógico/tribal de בני con 'hijos', como en el inglés auditado, porque el hebreo identifica al grupo representado por el líder. 'De' reproduce de modo natural la relación de pertenencia.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma habitual en español bíblico para el nombre tribal/personal.
- source_word: גַּמְלִיאֵל
  english_pob_choice: Gamaliel
  chosen_spanish: Gamaliel
  lexicon: Nombre propio bíblico estándar
  rationale: Se translitera el nombre propio según la convención española habitual.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La construcción patronímica normal en español es 'hijo de', que corresponde directamente al hebreo בן.
- source_word: פְּדָה צוּר
  english_pob_choice: Pedahzur
  chosen_spanish: Pedasur
  alternatives_spanish:
  - Peda-sur
  lexicon: Nombre propio bíblico estándar
  rationale: El hebreo separa los componentes, pero el nombre se integra en español como una sola forma de nombre propio. 'Pedasur' respeta la pronunciación y la tradición española bíblica.
theological_decisions:
- issue: Designación tribal con 'hijos de Manasés'
  english_pob_reading: '''sons of Manasseh'' is a tribal designation; that is, the descendants or tribe of Manasseh.'
  chosen_spanish_reading: '''hijos de Manasés'' se entiende como designación tribal; es decir, los descendientes o la tribu de Manasés.'
  alternative_spanish_readings:
  - la tribu de Manasés
  - los descendientes de Manasés
  rationale: Se mantiene la expresión más cercana al hebreo y al audit trail inglés, preservando la identidad tribal sin reducirla de inmediato a una paráfrasis explicativa en el texto principal.
  doctrine_reference: Uso bíblico de בני como designación genealógica/tribal; cf. Nm 1:10 y pasajes paralelos de representación tribal.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con la revisión más reciente: no se detectan cambios necesarios respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva 'hijos de' por fidelidad al giro tribal hebreo, en consonancia con la decisión inglesa auditada.
  - Los nombres propios se transliteran en forma española estándar, sin añadir guiones innecesarios.
  - La puntuación y la mayúscula inicial siguen la norma editorial del español bíblico moderno.
