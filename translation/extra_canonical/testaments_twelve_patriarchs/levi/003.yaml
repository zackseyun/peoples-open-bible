id: T12P.LEV.03
reference: Testament of Levi 3
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: III. ῎Ακουσον οὖν¹ περὶ τῶν δειχθέντων σοι οὐρανῶν· ὁ κατώτερος *διὰ τοῦτό σοί ἐστι στυγνός, ἐπειδὴ² ὁρᾷ πάσας³ τὰς ἀδικίας τῶν ἀνθρώπων. 2. Καὶ ἔχει πῦρ χιόνα καὶ⁴ κρύσταλλον ἡτοιμασμένον⁵ εἰς ἡμέραν κρίσεως ἐν τῇ δικαιοκρισίᾳ τοῦ Θεοῦ· ἐν αὐτῷ γάρ εἰσι πάντα τὰ πνεύματα τῶν ἐπαγωγῶν εἰς ἐκδίκησιν τῶν ἀνθρώπων. 3. Ἐν δὲ τῷ δευτέρῳ εἰσὶν αἱ δυνάμεις τῶν παρεμβολῶν οἱ ταχθέντες εἰς ἡμέραν κρίσεως ποιῆσαι ἐκδίκησιν τοῖς πνεύμασι τῆς πλάνης καὶ τοῦ Βελίαρ· καὶ ἐπ᾿ αὐτούς εἰσιν οἱ ἅγιοι. 4. Ἐν τῷ ἀνωτέρῳ δὲ πάντων καταλύματι²¹ ἡ²² μεγάλη δόξα ὑπεράνω²³ πάσης ἁγιότητος. 5. Ἐν τῷ μετ᾿ †αὐτῶν⁴² εἰσιν ἀρχάγγελοι οἱ λειτουργοῦντες καὶ ἐξιλασκόμενοι πρὸς Κύριον ἐπὶ πάσαις ταῖς ἀγνοίαις τῶν δικαίων, 6. Προσφέροντες τῷ Κυρίῳ ὀσμὴν εὐωδίας⁴³ λογικὴν⁴⁴ καὶ ἀναίμακτον θυσίαν. 7. Ἐν δὲ τῷ ὑποκάτω εἰσὶν⁴⁵ ἄγγελοι οἱ φέροντες τὰς ἀποκρίσεις τοῖς ἀγγέλοις τοῦ προσώπου κυρίου. 8. Ἐν δὲ τῷ⁴⁶ μετ᾿ †αὐτῶν⁴⁷ εἰσιν θρόνοι καὶ *ἐξουσίαι⁴⁸, ἐν ᾧ †ἀεὶ ὕμνοι τῷ θεῷ προσφέρονται⁴⁹. 9. Ὅταν οὖν ἐπιβλέψει⁵⁷ Κύριος ἐφ᾿ ἡμᾶς⁵⁸ καὶ⁵⁹ πάντες τρέμομεν⁶⁸ καὶ ὁ οὐρανὸς⁶⁹ καὶ ἡ γῆ καὶ †ἡ ἄβυσσος⁶⁹ ἀπὸ προσώπου τῆς μεγαλωσύνης αὐτοῦ σαλεύονται. 10. Οἱ δὲ υἱοὶ τῶν ἀνθρώπων ἐν⁷⁹ τούτοις⁸⁰ ἀναισθητοῦντες⁸¹ ἁμαρτάνουσι *καὶ παροργίζουσι τὸν ὕψιστον⁸².
  language: Greek
  source_pages:
  - 99
  - 100
  - 101
  - 102
translation:
  text: 'Listen[a], then, concerning the heavens that were shown to you. The lowest is dark for this reason: because it sees all the unrighteous deeds of men. And it has fire, snow, and ice prepared for the day determined by God, as a righteous judgment of God upon men. In it are all the spirits of the punishments for vengeance on the lawless. Above this is the holy place, and in it are the hosts of the armies appointed for the day of judgment[b], to carry out vengeance on the spirits of deceit and of Beliar. Above them are the holy ones. In the highest of all dwells the Great Glory, far above all holiness. In the heaven next to it are the archangels, who minister and make propitiation to the Lord for all the sins committed in ignorance by the righteous, offering to the Lord a sweet-smelling fragrance, a reasonable and bloodless offering. And in the heaven below this are the angels who bear answers to the angels of the presence of the Lord. But in the heaven next below are thrones and dominions, in which hymns are continually offered to God. Therefore, when the Lord looks upon us through the degree of his holiness, the heavens are shaken. And the earth also is moved from its foundations, and, trembling, it is shaken to its depths. But the sons of men, having no understanding of these things[c], go astray and provoke him to anger.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make atonement to the Lord.' The Greek verb can be rendered either way in cultic contexts.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form of the name, often rendered ''Belial'' in other traditions.'
    reason: lexical_alternative
  - marker: c
    text: '''A reasonable and bloodless offering'' translates a phrase that may also be understood as ''a rational'' or, more interpretively, ''a spiritual and bloodless offering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: στυγνός
  chosen: dark
  alternatives:
  - gloomy
  - grim
  - hateful
  lexicon: LSJ
  rationale: In context of the lowest heaven seeing human injustices and containing punitive elements, 'dark' best conveys somber appearance without overinterpreting emotional hostility.
- source_word: ἀδικίας
  chosen: unrighteous deeds
  alternatives:
  - injustices
  - wrongdoings
  lexicon: BDAG
  rationale: Keeps moral-religious force stronger than merely civic 'injustices' while still reflecting concrete acts.
- source_word: ἡτοιμασμένον
  chosen: prepared
  alternatives:
  - made ready
  lexicon: BDAG
  rationale: Standard rendering that preserves eschatological readiness.
- source_word: ἐκδίκησις / ἐκδικήσεως
  chosen: vengeance
  alternatives:
  - punishment
  - avenging justice
  lexicon: BDAG
  rationale: The chapter's judicial-apocalyptic setting warrants the stronger term 'vengeance,' while still tied to divine justice.
- source_word: ἄνομοι
  chosen: lawless
  alternatives:
  - wicked
  - transgressors
  lexicon: BDAG
  rationale: Preserves the relation to law/order rather than using a more generic moral label.
- source_word: ἅγιον
  chosen: holy place
  alternatives:
  - sanctuary
  lexicon: LSJ
  rationale: '''Holy place'' is transparent and fits the layered heavenly geography without importing temple-specific assumptions too strongly.'
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Proper name tradition
  rationale: The Greek witness commonly has Beliar; transliteration preserves the source form rather than harmonizing to the more familiar 'Belial'.
- source_word: Μεγάλη Δόξα
  chosen: the Great Glory
  alternatives:
  - the great Glory
  - Majestic Glory
  lexicon: LSJ
  rationale: Retains the reverential titular force and likely circumlocution for the divine presence.
- source_word: λειτουργοῦσιν
  chosen: minister
  alternatives:
  - serve liturgically
  - perform sacred service
  lexicon: BDAG
  rationale: '''Minister'' preserves cultic service language in readable English.'
- source_word: ἐξιλάσκονται
  chosen: make propitiation
  alternatives:
  - make atonement
  - appease
  lexicon: BDAG
  rationale: The verb denotes cultic expiation/propitiation. 'Make propitiation' preserves sacrificial-theological force; a footnote notes 'make atonement' as an alternative.
- source_word: ἀγνοημάτων
  chosen: sins committed in ignorance
  alternatives:
  - errors
  - unintentional sins
  lexicon: BDAG
  rationale: Expands the noun slightly for clarity and to reflect sacrificial terminology familiar from priestly contexts.
- source_word: ὀσμὴ εὐωδίας
  chosen: a sweet-smelling fragrance
  alternatives:
  - a pleasing aroma
  lexicon: LXX sacrificial idiom
  rationale: Preserves the elevated sacrificial idiom without becoming archaic.
- source_word: λογικὴν καὶ ἀναίμακτον προσφοράν
  chosen: a reasonable and bloodless offering
  alternatives:
  - a rational and bloodless offering
  - a spiritual and bloodless offering
  lexicon: LSJ/BDAG
  rationale: '''Reasonable'' stays closer to the Greek λογική than the more interpretive ''spiritual''; ''bloodless'' is retained literally because it is theologically significant in this heavenly cultic scene.'
- source_word: ἄγγελοι τῆς παρουσίας
  chosen: the angels of the presence of the Lord
  alternatives:
  - the angels of his presence
  lexicon: LXX/Second Temple usage
  rationale: This rendering preserves the technical heavenly-court expression and clarifies whose presence is meant.
- source_word: θρόνοι καὶ κυριότητες
  chosen: thrones and dominions
  alternatives:
  - thrones and lordships
  lexicon: BDAG
  rationale: Traditional rendering fits angelic/cosmic ranks and remains intelligible.
- source_word: ὕμνοι
  chosen: hymns
  alternatives:
  - songs of praise
  lexicon: LSJ
  rationale: Keeps the formal liturgical tone.
- source_word: παροργίζουσιν
  chosen: provoke him to anger
  alternatives:
  - embitter him
  - anger him
  lexicon: BDAG
  rationale: Expresses active human rebellion against God with clear force.
