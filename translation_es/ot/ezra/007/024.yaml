translation:
  language: es
  text: Y damos a conocer a ustedes que no está permitido imponer tributo[a], impuesto o peaje a ninguno de los sacerdotes, levitas, cantores, porteros, servidores del templo[b] ni servidores de esta casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los tres términos fiscales probablemente distinguen distintas clases de carga imperial: ‘tributo, impuesto o peaje’ también puede entenderse como ‘tributo, arancel o derecho de tránsito’.'
    reason: lexical_alternative
  - marker: b
    text: O ‘nethineos’, transliteración tradicional de נְתִינַיָּא.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהוֹדְעִין
  english_pob_choice: we make known
  chosen_spanish: damos a conocer
  alternatives_spanish:
  - informamos
  - hacemos saber
  lexicon: HALOT
  rationale: La forma aramea funciona como fórmula oficial de notificación; 'damos a conocer' conserva el tono administrativo y suena natural en español formal.
- source_word: כָל
  english_pob_choice: any of
  chosen_spanish: ninguno de
  alternatives_spanish:
  - cualquiera de
  - todos los
  lexicon: HALOT
  rationale: 'En una prohibición legal con lista de funcionarios, el sentido es distributivo negativo: no se puede imponer el tributo a ninguno de los miembros de esas clases.'
- source_word: כָּהֲנַיָּא
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes del templo
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente claro y estándar en español para el grupo sacerdotal.'
- source_word: לֵוָיֵא
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - levitas
  lexicon: HALOT
  rationale: Término tradicional y transparente en español bíblico.
- source_word: זַמָּרַיָּא
  english_pob_choice: singers
  chosen_spanish: cantores
  alternatives_spanish:
  - cantantes
  - músicos
  lexicon: HALOT
  rationale: '''Cantores'' preserva el uso bíblico-ecclesial y el sentido de quienes ejecutan canto litúrgico; evita la reducción moderna de ''cantantes''.'
- source_word: תָרָעַיָּא
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de las puertas
  - guardianes
  lexicon: HALOT
  rationale: '''Porteros'' es el equivalente tradicional en listas del templo y comunica bien la función de custodiar las puertas.'
- source_word: נְתִינַיָּא
  english_pob_choice: temple servants
  chosen_spanish: servidores del templo
  alternatives_spanish:
  - nethineos
  - sirvientes del templo
  lexicon: HALOT
  rationale: Se opta por una traducción funcional, como en la decisión inglesa, para evitar el transliterado opaco y mantener la clase social/templo de forma comprensible.
- source_word: פָלְחֵי בֵּית אֱלָהָא דְנָה
  english_pob_choice: servants of this house of God
  chosen_spanish: servidores de esta casa de Dios
  alternatives_spanish:
  - servidores de la casa de Dios
  - los que sirven en esta casa de Dios
  lexicon: HALOT
  rationale: '''Servidores'' refleja el participio de servicio/culto sin añadir ''otros''; se mantiene la referencia precisa a ''esta casa de Dios''.'
- source_word: מִנְדָּה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - contribución
  - tributación
  lexicon: HALOT
  rationale: En el contexto persa-administrativo, 'tributo' es la forma más directa y distinta dentro de la tríada fiscal.
- source_word: בְלוֹ
  english_pob_choice: tax
  chosen_spanish: impuesto
  alternatives_spanish:
  - carga
  - gravamen
  lexicon: HALOT
  rationale: '''Impuesto'' comunica la segunda categoría fiscal sin confundirla con las otras dos.'
- source_word: וַהֲלָךְ
  english_pob_choice: toll
  chosen_spanish: peaje
  alternatives_spanish:
  - derecho de tránsito
  - peaje de paso
  lexicon: HALOT
  rationale: '''Peaje'' es la equivalencia breve y natural para un cobro de tránsito o paso, conservando la tercera pieza del tríptico fiscal.'
- source_word: לָא שַׁלִּיט
  english_pob_choice: it is not permitted
  chosen_spanish: no está permitido
  alternatives_spanish:
  - no es lícito
  - no hay autoridad para
  lexicon: HALOT
  rationale: La expresión señala falta de autorización legal; 'no está permitido' expresa bien la prohibición jurídica en español contemporáneo.
- source_word: לְמִרְמֵא עֲלֵיהֹם
  english_pob_choice: to impose ... on
  chosen_spanish: imponer ... sobre
  alternatives_spanish:
  - poner ... sobre
  - cargar ... sobre
  lexicon: HALOT
  rationale: El giro arameo literalmente es 'echar/poner sobre'; 'imponer ... sobre' reproduce el valor administrativo-jurídico y la fuerza de la carga fiscal.
theological_decisions:
- issue: La lista incluye distintas categorías de personal del templo con una exención fiscal legal.
  english_pob_reading: The verse states that tribute, tax, or toll may not be imposed on priests, Levites, singers, gatekeepers, temple servants, or servants of this house of God.
  chosen_spanish_reading: El verso afirma que no se puede imponer tributo, impuesto o peaje sobre sacerdotes, levitas, cantores, porteros, servidores del templo y servidores de esta casa de Dios.
  alternative_spanish_readings:
  - '... sobre sacerdotes, levitas, cantores, porteros, nethineos y servidores de esta casa de Dios'
  - '... sobre sacerdotes, levitas, cantores, porteros, servidores del templo, o servidores de esta casa de Dios'
  rationale: Se mantiene la diferenciación entre נְתִינַיָּא y פָלְחֵי בֵּית אֱלָהָא דְנָה, tal como en la revisión inglesa que quitó 'other'. En español no se añade una marca interpretativa extra; se conservan dos grupos funcionales distintos de servicio al templo.
  doctrine_reference: Ezra 7:24; exención fiscal de servidores del templo en contexto persa-administrativo
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar 'other' antes de 'servants'; la redacción española sigue esa revisión y no añade un equivalente interpretativo adicional. También se preserva la tríada fiscal diferenciada según el informe léxico.
  spanish_consistency_notes:
  - Se usó 'Y damos a conocer' para mantener el tono oficial del arameo.
  - Se prefirió 'servidores' frente a 'siervos' para evitar una carga devocional posterior que no está explícita en el término administrativo aquí.
  - Se evitó 'SEÑOR' para אֱלָהָא; la fuente dice 'Dios'.
  - La tríada fiscal quedó diferenciada con tres términos españoles distintos para conservar la distinción del texto fuente.
