translation:
  language: es
  text: Si un hombre encuentra a una joven, virgen, que no está desposada[a], y la agarra[b] y se acuesta con ella, y son descubiertos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que no está prometida en matrimonio'.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo puede significar 'asir', 'agarrar' o 'apoderarse de'. Algunos entienden que la cláusula aquí implica violación; otros sostienen que el matiz legal debe inferirse del contexto más amplio y no solo de este verbo.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una cláusula casuística de ley; en español jurídico-bíblico, 'Si' comunica mejor la estructura condicional que 'Cuando' sin perder naturalidad.
- source_word: יִמְצָא
  english_pob_choice: finds
  chosen_spanish: encuentra
  alternatives_spanish:
  - halla
  - se encuentra con
  lexicon: HALOT
  rationale: '''Encontrar'' es la correspondencia más directa y clara para el verbo hebreo, manteniendo el valor narrativo y legal del enunciado.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  lexicon: HALOT
  rationale: El sustantivo es masculino y singular; 'hombre' es natural en español y conserva la especificidad de género del hebreo.
- source_word: נער בְתוּלָה
  english_pob_choice: a young woman, a virgin
  chosen_spanish: una joven, virgen
  alternatives_spanish:
  - una muchacha, virgen
  - una doncella
  lexicon: HALOT
  rationale: El hebreo combina juventud y virginidad. 'Joven, virgen' preserva ambos rasgos sin caer en un arcaísmo como 'doncella' ni en una edad demasiado infantil como 'muchacha' en algunos contextos.
- source_word: אֲשֶׁר לֹא אֹרָשָׂה
  english_pob_choice: who is not engaged
  chosen_spanish: no desposada
  alternatives_spanish:
  - no prometida en matrimonio
  - no comprometida
  lexicon: HALOT
  rationale: '''Óraśah'' se refiere a una mujer que no ha entrado en el compromiso legal de desposorio. ''Desposada'' es un término bíblico en español que conserva mejor el matiz legal que ''comprometida''.'
- source_word: וּתְפָשָׂהּ
  english_pob_choice: and seizes her
  chosen_spanish: y la toma por la fuerza
  alternatives_spanish:
  - y la agarra
  - y la apresa
  lexicon: HALOT
  rationale: El verbo puede significar tomar, agarrar o asir, pero en este contexto el acto es coercitivo. 'La toma por la fuerza' mantiene la fuerza física sin resolver en exceso la cuestión interpretativa, y evita suavizar el verbo.
- source_word: וְשָׁכַב עִמָּהּ
  english_pob_choice: and lies with her
  chosen_spanish: y se acuesta con ella
  alternatives_spanish:
  - y yace con ella
  - y tiene relaciones con ella
  lexicon: HALOT
  rationale: Es un hebraísmo sexual estándar. 'Acostarse con ella' es una forma idiomática clara en español que conserva el registro bíblico sin hacerlo demasiado explícito.
- source_word: וְנִמְצָאוּ
  english_pob_choice: and they are discovered
  chosen_spanish: y son descubiertos
  alternatives_spanish:
  - y se descubre lo ocurrido
  - y quedan descubiertos
  lexicon: HALOT
  rationale: El pasivo plural indica que el hecho llega a conocerse. 'Son descubiertos' reproduce bien la pasiva y la apertura del verbo a la constatación pública del acto.
theological_decisions:
- issue: Si la traducción debe nombrar el acto como 'violación' en el texto principal
  english_pob_reading: Retain the lexical wording 'seizes her and lies with her' rather than collapsing the clause into a single interpretive label.
  chosen_spanish_reading: Mantener 'la toma por la fuerza y se acuesta con ella' en vez de reducirlo a una sola etiqueta interpretativa.
  alternative_spanish_readings:
  - la viola
  - la toma
  rationale: El hebreo y el audit trail inglés preservan la tensión interpretativa entre la violencia física del verbo y la conclusión legal derivada del contexto. 'La toma por la fuerza' comunica coerción, pero evita fijar en el texto principal una interpretación legal única que el hebreo por sí solo no formula explícitamente.
  doctrine_reference: Principio de primacía del texto fuente y de preservación de tensiones interpretativas documentadas.
translation_notes:
  revision_awareness: 'El presente borrador sigue el consenso de revisión indicado en el paquete fuente: no se reportan cambios aplicados y el pasaje mantiene la formulación léxica y la tensión interpretativa documentadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino.
  - Se preserva la diferencia entre 'desposada' (matiz legal) y otras opciones más modernas como 'comprometida' por fidelidad al contexto de matrimonio previo.
  - La decisión de traducir תפשׂ como 'tomar por la fuerza' mantiene la ambigüedad interpretativa señalada en el POB inglés y evita suavizar el acto.
  - '''Son descubiertos'' conserva la pasiva plural del hebreo y deja abierto si el descubrimiento es público o judicial.'
