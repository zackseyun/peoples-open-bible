translation:
  language: es
  text: Pero si de veras vas[a], actúa con firmeza en la batalla; Dios te hará tropezar delante del enemigo[b], porque hay poder en Dios para ayudar y para hacer tropezar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sé fuerte para la batalla» o «muéstrate fuerte en la batalla».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite el mismo verbo: Dios tiene poder tanto «para ayudar» como «para hacer tropezar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Mas si
  - Y si
  lexicon: HALOT
  rationale: La combinación introduce un contraste condicional. «Pero si» conserva el giro adversativo sin sonar arcaico.
- source_word: בֹּא אַתָּה
  english_pob_choice: you do go
  chosen_spanish: vas
  alternatives_spanish:
  - vas de veras
  - si llegas a ir
  lexicon: HALOT
  rationale: En español, el énfasis del hebreo se expresa de forma natural con el futuro cercano/indicativo enfático «vas», manteniendo la condición sin forzar una perífrasis pesada.
- source_word: עֲשֵׂה חֲזַק
  english_pob_choice: act resolutely
  chosen_spanish: actúa con firmeza
  alternatives_spanish:
  - sé fuerte
  - muéstrate fuerte
  - obra con valentía
  lexicon: HALOT
  rationale: El hebreo combina un mandato verbal con la idea de fortaleza. «Actúa con firmeza» comunica la exhortación militar con naturalidad y conserva el sentido de decisión/fortaleza sin reducirlo a un simple «sé fuerte».
- source_word: לַמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - para la batalla
  - para la guerra
  lexicon: HALOT
  rationale: La preposición y el contexto apuntan a la esfera de la acción bélica. «En la batalla» fluye bien en español y refleja la escena inmediata.
- source_word: יַכְשִׁילְךָ
  english_pob_choice: will make you stumble
  chosen_spanish: te hará tropezar
  alternatives_spanish:
  - te hará caer
  - te hará fracasar
  lexicon: HALOT
  rationale: «Tropezar» preserva la imagen del verbo כשל y mantiene la metáfora de caída/falla. Además enlaza bien con la repetición verbal posterior.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto, el español natural y fiel es «Dios», sin requerir el artículo explícito.
- source_word: לִפְנֵי אוֹיֵב
  english_pob_choice: before the enemy
  chosen_spanish: delante del enemigo
  alternatives_spanish:
  - ante el enemigo
  - en presencia del enemigo
  lexicon: HALOT
  rationale: La frase expresa quedar abatido frente al adversario. «Delante del enemigo» reproduce la relación espacial de manera clara y bíblicamente sobria.
- source_word: יֶשׁ כֹּחַ בֵּאלֹהִים
  english_pob_choice: there is power in God
  chosen_spanish: hay poder en Dios
  alternatives_spanish:
  - Dios tiene poder
  - el poder está en Dios
  lexicon: HALOT
  rationale: La construcción hebrea afirma la existencia de poder en Dios. «Hay poder en Dios» conserva esa estructura y evita explicar de más.
- source_word: לַעְזֹר
  english_pob_choice: to help
  chosen_spanish: para ayudar
  alternatives_spanish:
  - para socorrer
  - para dar ayuda
  lexicon: HALOT
  rationale: El infinitivo final expresa finalidad. «Para ayudar» es directo y mantiene el paralelismo con la segunda infinitiva.
- source_word: וּלְהַכְשִׁיל
  english_pob_choice: and to make stumble
  chosen_spanish: y para hacer tropezar
  alternatives_spanish:
  - y para hacer caer
  - y para hacer fracasar
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo campo léxico del verbo anterior mediante «hacer tropezar», manteniendo la tensión textual de ayuda/derribo.
theological_decisions:
- issue: Agencia divina en la derrota militar
  english_pob_reading: The verse directly states that God can make the king stumble and that there is power in God both to help and to make stumble.
  chosen_spanish_reading: El verso dice directamente que Dios puede hacer tropezar al rey, y que en Dios hay poder tanto para ayudar como para hacer tropezar.
  alternative_spanish_readings:
  - Dios podría permitir tu caída
  - Dios podría dejarte caer
  rationale: Se conserva la agencia divina expresa del hebreo y del POB en inglés, sin suavizarla a mera permisividad. Esto preserva la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La formulación sigue el patrón revisado del POB en inglés: mantiene el contraste condicional, la exhortación militar, la metáfora de tropiezo y la repetición verbal en la última cláusula, con un español natural y apto para lectura pública.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, según la norma del proyecto y la idiomaticidad del español.
  - Se conserva «tropezar» para reflejar el mismo verbo conceptual en ambas ocurrencias y no perder la repetición retórica.
  - Se evita «SEÑOR» porque el texto hebreo nombra a Dios de forma genérica aquí, no mediante el tetragrámaton.
  - La elección «actúa con firmeza» busca equilibrar fidelidad semántica y naturalidad, sin introducir una exhortación ajena al contexto militar.
