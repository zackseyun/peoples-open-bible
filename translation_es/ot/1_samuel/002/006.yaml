translation:
  language: es
  text: Yahvé da muerte y da vida; hace bajar al Seol[a] y hace subir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tumba' o 'el reino de los muertos'. El término hebreo 'Seol' designa la morada de los muertos y no debe reducirse automáticamente a 'infierno'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Tetragrámaton
  rationale: Se preserva el nombre divino personal en forma transliterada, conforme al criterio del proyecto, en lugar de sustituirlo por un título. "Yahvé" es la forma establecida en español para reflejar יְהוָה.
- source_word: מֵמִית
  english_pob_choice: puts to death
  chosen_spanish: da muerte
  alternatives_spanish:
  - mata
  - hace morir
  lexicon: HALOT
  rationale: El causativo del verbo מות debe conservar la agencia divina. "Da muerte" comunica bien la acción causativa en español y evita una dureza innecesaria frente a "mata", sin perder fuerza semántica.
- source_word: וּמְחַיֶּה
  english_pob_choice: and makes alive
  chosen_spanish: y da vida
  alternatives_spanish:
  - y vivifica
  - y hace vivir
  lexicon: HALOT
  rationale: La forma causativa de חיה admite un español igualmente causativo. "Da vida" es natural, mantiene el paralelismo con "da muerte" y no fuerza una precisión teológica mayor que la del hebreo.
- source_word: מוֹרִיד
  english_pob_choice: he brings down
  chosen_spanish: hace bajar
  alternatives_spanish:
  - derriba
  - baja
  lexicon: HALOT
  rationale: Se conserva el valor causativo de ירד. "Hace bajar" es claro y paralelo a "hace subir" en la cola siguiente.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene el término técnico hebreo en forma castellana "Seol" para no reducirlo a "tumba" ni equipararlo automáticamente con "infierno". Esto preserva la amplitud semántica documentada por el POB inglés.
- source_word: וַיָּעַל
  english_pob_choice: and raises up
  chosen_spanish: y hace subir
  alternatives_spanish:
  - y levanta
  - y sube
  lexicon: HALOT
  rationale: El paralelo con "hace bajar" favorece un español causativo. "Hace subir" reproduce la agencia divina y evita especificar más de lo que el hebreo dice.
theological_decisions:
- issue: Si traducir con lenguaje explícito de resurrección
  english_pob_reading: 'Use broader language: ''makes alive'' and ''raises up'' without specifying bodily resurrection.'
  chosen_spanish_reading: 'Usar lenguaje amplio: ''da vida'' y ''hace subir'', sin precisar resurrección corporal.'
  alternative_spanish_readings:
  - '''resucita'''
  - '''levanta de entre los muertos'''
  rationale: El verso afirma el poder soberano de Yahvé sobre la muerte y el Seol, pero no obliga a una formulación técnica sobre la resurrección corporal. Mantener la amplitud preserva la tensión teológica del hebreo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El contexto auditado en inglés quedó en acuerdo alto y sin revisiones aplicadas; la presente redacción sigue ese criterio, manteniendo la amplitud semántica de 'Sheol' y la estructura causativa del paralelismo hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se usa 'Seol' como término técnico, con nota explicativa para evitar una reducción semántica indebida.
  - Las dos mitades del versículo conservan el paralelismo causativo con 'da/hace'.
