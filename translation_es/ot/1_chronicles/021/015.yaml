translation:
  language: es
  text: 'Y Dios envió un ángel a Jerusalén para destruirla, pero cuando estaba destruyéndola, Yahvé vio y desistió de la calamidad[a], y dijo al ángel destructor: «Basta[b]; ahora retira tu mano[c]». Y el ángel de Yahvé estaba junto a la era de Ornán el jebuseo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del desastre»; el hebreo רָעָה aquí se refiere a un juicio destructor, no al mal moral.
    reason: lexical_alternative
  - marker: b
    text: O, «Es suficiente»; la expresión hebrea es una exclamación de cese, no una descripción.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «detén tu mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  lexicon: HALOT
  rationale: El contexto verbal es singular y se refiere al Dios de Israel; en español, «Dios» es la equivalencia natural y transparente.
- source_word: מַלְאָךְ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: HALOT
  rationale: En este contexto de juicio y destrucción enviada por Dios, «ángel» refleja mejor al ser celestial que «mensajero».
- source_word: לִירוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  lexicon: HALOT
  rationale: La preposición indica dirección hacia la ciudad; el propósito hostil queda expresado por el infinitivo siguiente.
- source_word: לְהַשְׁחִיתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para arruinarla
  - para llevarla a destrucción
  lexicon: HALOT
  rationale: El hiphil de שׁחת aquí expresa acción destructiva contra la ciudad. «Destruirla» es directo y fiel en español.
- source_word: וּכְהַשְׁחִית
  english_pob_choice: but as he was destroying it
  chosen_spanish: pero cuando estaba destruyéndola
  alternatives_spanish:
  - y cuando comenzó a destruirla
  - y mientras la destruía
  lexicon: HALOT
  rationale: La construcción marca una acción en curso interrumpida; en español conviene conservar ese matiz progresivo. Añadir «pero» ayuda a marcar el giro narrativo.
- source_word: רָאָה יְהוָה
  english_pob_choice: the LORD saw
  chosen_spanish: Yahvé vio
  alternatives_spanish:
  - Yahvé miró
  lexicon: HALOT
  rationale: Se traduce literalmente ראה por «vio». Se mantiene «Yahvé» para el Tetragrámaton según la política del proyecto.
- source_word: וַיִּנָּחֶם עַל הָרָעָה
  english_pob_choice: relented concerning the calamity
  chosen_spanish: se arrepintió a causa de la calamidad
  alternatives_spanish:
  - se apiadó de la calamidad
  - cambió de parecer acerca de la calamidad
  lexicon: HALOT
  rationale: נחם expresa una respuesta divina dentro del relato; «se arrepintió» conserva el peso antropopático sin resolverlo. «A causa de la calamidad» traduce la relación preposicional con claridad.
- source_word: הָרָעָה
  english_pob_choice: the calamity
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el desastre
  - el mal
  lexicon: HALOT
  rationale: En este contexto de juicio, רָעָה no debe leerse como mal moral sino como desastre/calamidad. «Calamidad» preserva ese valor.
- source_word: הַמַּשְׁחִית
  english_pob_choice: the destroying angel
  chosen_spanish: el ángel destructor
  alternatives_spanish:
  - el ángel que destruía
  - el ángel de la destrucción
  lexicon: HALOT
  rationale: El participio funciona atributivamente con מַלְאָךְ. «Ángel destructor» reproduce bien la fuerza activa y resulta natural en español.
- source_word: רַב
  english_pob_choice: Enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - Demasiado
  lexicon: HALOT
  rationale: Aquí רַב funciona como exclamación de suficiente. «Basta» suena directo y idiomático en español.
- source_word: הֶרֶף יָדֶךָ
  english_pob_choice: withdraw your hand
  chosen_spanish: retira tu mano
  alternatives_spanish:
  - detén tu mano
  - deja descansar tu mano
  lexicon: HALOT
  rationale: El modismo pide cesar la acción realizada por la mano. «Retira tu mano» comunica bien el cese de la acción en español moderno.
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: And the angel of Yahweh
  chosen_spanish: Y el ángel de Yahvé
  alternatives_spanish:
  - Y el ángel del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la construcción literal y el nombre divino «Yahvé», conforme a la política del proyecto y al hebreo directo.
- source_word: עֹמֵד עִם
  english_pob_choice: was standing by
  chosen_spanish: estaba junto a
  alternatives_spanish:
  - estaba cerca de
  - estaba con
  lexicon: HALOT
  rationale: עִם aquí tiene sentido espacial de proximidad. «Estaba junto a» es idiomático y preciso.
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trillar
  - lugar de trilla
  lexicon: HALOT
  rationale: El sitio agrícola se traduce con el equivalente estándar «era» en español bíblico contemporáneo.
- source_word: אָרְנָן הַיְבוּסִי
  english_pob_choice: Ornan the Jebusite
  chosen_spanish: Ornán el jebuseo
  alternatives_spanish:
  - Ornan el jebuseo
  lexicon: HALOT
  rationale: Se translitera el nombre propio según el uso español más claro y se vierte el gentilicio con el sufijo natural «-eo».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la política del proyecto, se preserva el nombre del pacto como «Yahvé» en el texto principal, no como máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje antropopático en וַיִּנָּחֶם עַל הָרָעָה
  english_pob_reading: relented concerning the calamity
  chosen_spanish_reading: se arrepintió a causa de la calamidad
  alternative_spanish_readings:
  - se arrepintió de la calamidad
  - se apiadó a causa de la calamidad
  - cambió de parecer acerca de la calamidad
  rationale: Se conserva la tensión del hebreo, que presenta una respuesta divina dentro del relato sin resolverla filosóficamente. «Se arrepintió» mantiene esa fuerza, aunque en español puede sonar más fuerte que «relent»; la nota y el contexto controlan la lectura.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Identidad del מלאך יהוה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el ángel del SEÑOR
  - el mismo Yahvé manifestado angelicalmente
  - un mensajero angelical creado
  rationale: La traducción sigue la forma textual sin decidir la identidad ontológica del personaje, preservando la ambigüedad presente en el versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El borrador sigue de cerca el contexto auditado en inglés, pero ajusta la formulación para el español y para la política del proyecto que preserva «Yahvé». No se detectaron revisiones posteriores que alteren el sentido base; se mantiene la misma lectura textual y teológica del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «ángel» para מַלְאָךְ y «ángel destructor» para הַמַּשְׁחִית.
  - «Calamidad» evita moralizar רָעָה como mal ético.
  - La frase idiomática «retira tu mano» preserva el cese de acción solicitado al ángel.
  - «Ornán el jebuseo» mantiene el nombre propio y el gentilicio de forma clara para lectores hispanos.
