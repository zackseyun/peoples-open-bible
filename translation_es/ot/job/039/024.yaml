translation:
  language: es
  text: Con ímpetu y furor devora el suelo[a], y no puede estarse quieto ante el sonido de la trompeta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «traga el suelo», una imagen vívida de la rapidez y el ímpetu del caballo al lanzarse hacia adelante.
    reason: lexical_alternative
  - marker: b
    text: O «no se contiene ante el sonido de la trompeta», reflejando un sentido idiomático del verbo que a menudo se traduce más literalmente como «creer».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַעַשׁ
  english_pob_choice: With fierceness
  chosen_spanish: Con ímpetu
  alternatives_spanish:
  - Con tumulto
  - Con violencia
  - Con agitación
  lexicon: HALOT
  rationale: רַעַשׁ puede expresar conmoción, tumulto o sacudida violenta. En el contexto del caballo de guerra, el valor adverbial apunta a la energía impetuosa de su carrera; «Con ímpetu» comunica esa fuerza dinámica de manera natural en español sin perder intensidad.
- source_word: וְרֹגֶז
  english_pob_choice: and rage
  chosen_spanish: y furor
  alternatives_spanish:
  - y agitación
  - y rabia
  - y furia
  lexicon: HALOT
  rationale: רֹגֶז intensifica la imagen con sentido de agitación o furor. «Furor» conserva la fuerza emocional del paralelo y funciona bien con «ímpetu» en español.
- source_word: יְגַמֶּא
  english_pob_choice: he devours
  chosen_spanish: devora
  alternatives_spanish:
  - traga
  - se traga
  - engulle
  lexicon: HALOT
  rationale: El verbo literalmente significa «tragar/engullir». La imagen idiomática de Job 39:24 es que el caballo recorre la tierra con tal rapidez que parece devorarla. «Devora» mantiene el vigor metafórico que el inglés POB preservó con «devours».
- source_word: אָרֶץ
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  - la tierra del camino
  lexicon: HALOT
  rationale: En este contexto poético y ecuestre, אֶרֶץ se refiere al terreno que el caballo pisa y cruza. «La tierra» conserva la amplitud de la imagen hebrea y el paralelismo poético, mientras sigue siendo natural en español.
- source_word: וְלֹא יַאֲמִין
  english_pob_choice: he cannot stand still
  chosen_spanish: no puede estarse quieto
  alternatives_spanish:
  - no puede permanecer firme
  - no se detiene
  - no puede contenerse
  lexicon: HALOT
  rationale: El Hiphil de אמן puede tener aquí el sentido idiomático de no sostenerse, no mantenerse firme o no dejarse retener. En el contexto del caballo que responde al sonido de la trompeta, «no puede estarse quieto» expresa bien esa imposibilidad de quedarse inmóvil sin convertir el verbo en una traducción mecánica de «creer».
- source_word: כִּי קוֹל שׁוֹפָר
  english_pob_choice: at the sound of the trumpet
  chosen_spanish: ante el sonido de la trompeta
  alternatives_spanish:
  - al sonido de la trompeta
  - cuando suena la trompeta
  - ante el toque de trompeta
  lexicon: HALOT
  rationale: כִּי introduce la circunstancia del toque. שׁוֹפָר es el cuerno/trompeta de señal, especialmente militar. «Ante el sonido de la trompeta» mantiene el foco en la señal sonora y se ajusta bien al movimiento del verso.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español junto a la expresión anotada. También se mantuvo la equivalencia fuente-texto sin añadir marcadores sin anclaje.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» cuando corresponda en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Tierra» preserva la imagen poética de אֶרֶץ sin reducirla a un mero «suelo».
  - «No puede estarse quieto» refleja el valor idiomático de יַאֲמִין en este contexto de caballo de guerra.
