translation:
  language: es
  text: 'Entonces Tobit llamó a Tobías, su hijo, y le dijo: «Mira, hijo[a], hay que darle salario al hombre que fue contigo, y además hay que añadirle algo más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «niño/hijo» (τέκνον), un vocativo afectuoso general; el paralelo semítico dice «mi hijo». El texto principal usa «hijo» por naturalidad en español, mientras la nota conserva el matiz léxico del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: El verbo narrativo se expresa de forma natural y formal con «llamó». «Convocó» o «mandó llamar» sonarían más marcados de lo que exige el contexto.
- source_word: Ὅρα
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Fíjate
  lexicon: BDAG
  rationale: Como imperativo de atención, «Mira» conserva la inmediatez de la exhortación y suena idiomático en español contemporáneo.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo mío
  - muchacho
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «niño/child», en este contexto Tobit habla a su propio hijo, y la frase española mantiene la filiación explícita. La nota preserva la tensión con el vocativo griego afectivo.
- source_word: μισθὸν
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - retribución
  - sueldo
  lexicon: BDAG
  rationale: «Salario» conserva mejor la idea de compensación debida por un servicio prestado durante el viaje. «Pago» sería más general; «retribución» suena más abstracto.
- source_word: τῷ ἀνθρώπῳ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al compañero
  lexicon: BDAG
  rationale: Se mantiene el masculino singular del griego para el acompañante. «Al hombre» refleja con claridad el referente sin suavizar el género del original.
- source_word: τῷ συνελθόντι σοι
  english_pob_choice: who went with you
  chosen_spanish: que fue contigo
  alternatives_spanish:
  - que te acompañó
  - que vino contigo
  lexicon: BDAG
  rationale: «Que fue contigo» sigue de cerca el valor del participio, sin perder naturalidad en español. «Te acompañó» es viable, pero interpreta más libremente la relación.
- source_word: προσθεῖναι αὐτῷ δεῖ
  english_pob_choice: more must be added for him
  chosen_spanish: hay que añadirle algo
  alternatives_spanish:
  - hay que añadir más para él
  - se le debe añadir algo más
  lexicon: BDAG
  rationale: La construcción impersonal con δεῖ se vierte con «hay que». «Añadirle algo» conserva la idea de incremento sobre el salario básico sin introducir una cantidad no especificada.
theological_decisions:
- issue: Vocativo griego τέκνον frente al paralelo semítico «mi hijo»
  english_pob_reading: The main text follows the Greek vocative while preserving the familial nuance in context.
  chosen_spanish_reading: Se refleja la relación familiar en la traducción principal («hijo»), con nota que reconoce que el griego usa un vocativo afectivo más general.
  alternative_spanish_readings:
  - «muchacho»
  - «niño»
  - «hijo mío»
  rationale: En español, «hijo» comunica la filiación real y evita una frialdad que «niño» podría introducir en boca del padre. La nota deja visible que el griego no usa el mismo término que el paralelo semítico.
  doctrine_reference: No doctrinal issue; lexical nuance and textual comparison only.
- issue: 'Necesidad impersonal: προσθεῖναι αὐτῷ δεῖ'
  english_pob_reading: more must be added for him
  chosen_spanish_reading: «hay que añadirle algo»
  alternative_spanish_readings:
  - «debe añadírsele más»
  - «hay que añadir más para él»
  rationale: El español impersonal «hay que» reproduce bien la obligación sin forzar un sujeto explícito. Se evita precisar una cantidad porque el griego no la da.
  doctrine_reference: No doctrinal issue; syntactic force of necessity.
translation_notes:
  revision_awareness: Se revisó el último pase y no hubo cambios requeridos; la traducción sigue de cerca el griego de Swete 1909, con atención al paralelo semítico solo como apoyo para el matiz filial del vocativo.
  spanish_consistency_notes:
  - Se mantiene «Tobit» / «Tobías» como en el expediente auditado.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni κύριος como sustituto divino.
  - «Salario» se usa aquí por la fuerza compensatoria de μισθός; no se interpreta como recompensa moral.
