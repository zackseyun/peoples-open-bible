translation:
  language: es
  text: 'Entonces los fariseos le dijeron: «Tú das testimonio acerca de ti mismo; tu testimonio no es verdadero».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca la continuidad lógica/narrativa con la intervención anterior. «Así que» es natural en español y conserva el valor inferencial sin exagerarlo.
- source_word: εἶπον ... οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees said
  chosen_spanish: los fariseos le dijeron
  alternatives_spanish:
  - los fariseos dijeron
  - los fariseos le dijeron a él
  lexicon: BDAG
  rationale: El verbo de decir en aoristo se vierte de modo narrativo normal. Se mantiene el pronombre objeto explícito como en el griego.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre griego se conserva como pronombre en español; nombrar a Jesús introduciría una explicitación innecesaria.
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: BDAG
  rationale: El pronombre inicial es enfático en griego. En español se conserva al frente de la cláusula para reflejar esa prominencia sin añadir una intensificación extra.
- source_word: περὶ σεαυτοῦ
  english_pob_choice: about yourself
  chosen_spanish: acerca de ti mismo
  alternatives_spanish:
  - sobre ti mismo
  - de ti mismo
  lexicon: BDAG
  rationale: Expresa el objeto del testimonio de manera natural y clara en español, manteniendo la referencia reflexiva explícita.
- source_word: μαρτυρεῖς
  english_pob_choice: testify
  chosen_spanish: testificas
  alternatives_spanish:
  - das testimonio
  - atestiguas
  lexicon: BDAG
  rationale: «Testificas» conserva el matiz jurídico de μαρτυρέω y suena más directo en el presente indicativo, sin perder la fuerza declarativa del dicho.
- source_word: ἡ μαρτυρία σου
  english_pob_choice: your testimony
  chosen_spanish: tu testimonio
  alternatives_spanish:
  - tu testimonio como testigo
  - tu testificación
  lexicon: BDAG
  rationale: Se mantiene la equivalencia léxica con μαρτυρεῖς y el sustantivo jurídico de atestación.
- source_word: οὐκ ἔστιν ἀληθής
  english_pob_choice: is not true
  chosen_spanish: no es verdadero
  alternatives_spanish:
  - no es verdadero ni válido
  - no es verdadero
  lexicon: BDAG
  rationale: «Verdadero» reproduce de forma directa ἀληθής y deja abierta la posible implicación de validez legal sin resolverla prematuramente. «Verdadero» es un adjetivo natural en español para un testimonio.
theological_decisions:
- issue: La objeción farisea sobre el testimonio propio
  english_pob_reading: '''your testimony is not true,'' preserving the wording of truthfulness without narrowing it to legal inadmissibility alone.'
  chosen_spanish_reading: «tu testimonio no es verdadero», preservando la formulación de verdad sin reducirla solo a inadmisibilidad legal.
  alternative_spanish_readings:
  - «tu testimonio no es válido»
  - «tu testimonio no es admisible»
  rationale: El adjetivo griego ἀληθής puede abarcar veracidad y, en el contexto, resonancias de validez. Traducirlo por «verdadero» mantiene la tensión sin cerrar el sentido solo en términos jurídicos.
  doctrine_reference: Preservar la tensión textual en vez de resolverla interpretativamente.
translation_notes:
  revision_awareness: La revisión reciente del inglés POB prefirió el presente simple directo («testify») frente a una perífrasis progresiva. En español se siguió esa dirección con «testificas», evitando una forma más perifrástica o explicativa.
  spanish_consistency_notes:
  - Se mantiene una terminología jurídica coherente con μαρτυρέω / μαρτυρία mediante «testificas» y «testimonio».
  - Se conserva el pronombre objeto indirecto explícito («le») para reflejar αὐτῷ sin sustituirlo por un nombre propio.
  - «No es verdadero» deja abierta la posible carga de validez/legalidad, en paralelo al audit trail en inglés.
