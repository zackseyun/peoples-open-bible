    text: 'Hebreo: «han bendecido a Dios»; aquí «bendecido» es un eufemismo reverencial para «maldecido».'
    reason: lexical_alternative
  revision_rationale: Se corrige el cuerpo del texto para reflejar el sentido contextual de ברך como eufemismo reverencial por «maldecir», en conformidad con el audit trail inglés y para evitar un sentido opuesto en español. Se reubica la nota al lugar correcto y se ajusta «en sus corazones» por mayor naturalidad y claridad.
