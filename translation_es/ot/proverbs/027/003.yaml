  - severity: medium
    issue: Construcción sintáctica pesada y repetitiva
    rationale: La secuencia '..., y la carga de la arena, y la ira de un necio...' acumula elementos sin buen balance. El proverbio español gana claridad con dos miembros paralelos y contraste explícito con 'pero'.
  - severity: low
    issue: La nota al pie ya no encaja bien con la mejor solución española
    rationale: La nota actual defiende una alternativa muy literal, pero no ayuda a explicar la mejor decisión en español, que es verbalizar el primer miembro manteniendo el campo semántico de la pesadez.
