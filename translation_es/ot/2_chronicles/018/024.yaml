translation:
  language: es
  text: 'Micaías dijo[a]: «Mira, verás aquel día, cuando entres en un aposento interior para esconderte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuarto dentro de cuarto» o «cámara dentro de cámara», posiblemente con la idea de retirarse a un aposento interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio con una forma española natural y reconocible. «Micaías» conserva el referente del hebreo y evita una adaptación demasiado anglicada.
- source_word: הִנְּךָ
  english_pob_choice: Behold / Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: El deíctico introduce una advertencia enfática. «Mira» comunica la fuerza exhortativa en español moderno sin recurrir a un arcaísmo innecesario, y mantiene la atención sobre la certeza de la declaración.
- source_word: רֹאֶה
  english_pob_choice: you will see
  chosen_spanish: tú verás
  alternatives_spanish:
  - verás
  - vas a ver
  lexicon: HALOT
  rationale: Aunque formalmente es participio, en este contexto profético funciona con valor predictivo. «Tú verás» preserva ese sentido futuro de manera natural en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Se mantiene la fórmula temporal bíblica con una equivalencia idiomática clara en español. «En aquel día» conserva la referencia temporal concreta y solemne.
- source_word: תָּבֹא
  english_pob_choice: when you go
  chosen_spanish: entres
  alternatives_spanish:
  - vayas
  - entres allí
  lexicon: HALOT
  rationale: El verbo introduce la circunstancia del cumplimiento. «Entres» expresa mejor el movimiento hacia el interior que un simple «vayas» y se ajusta al paralelo con las estancias interiores.
- source_word: חֶדֶר בְּחֶדֶר
  english_pob_choice: go into an inner room
  chosen_spanish: de cuarto en cuarto
  alternatives_spanish:
  - de cámara en cámara
  - de cuarto a cuarto
  - en un aposento interior
  lexicon: HALOT
  rationale: El hebreo literalmente sugiere una progresión de recinto a recinto. Dado que el audit trail en inglés primero tradujo «from room to room» y luego optó por «inner room», el español conserva la tensión con una formulación que puede leerse como desplazamiento dentro de varios cuartos. «De cuarto en cuarto» mantiene la imagen repetitiva y la posible carrera de ocultamiento sin imponer una sola interpretación.
- source_word: לְהֵחָבֵא
  english_pob_choice: to hide yourself
  chosen_spanish: para esconderte
  alternatives_spanish:
  - para ocultarte
  - para esconderte a ti mismo
  lexicon: HALOT
  rationale: El infinitivo nifal tiene sentido reflexivo de ocultarse. «Esconderte» es natural en español y conserva la implicación personal del sujeto.
translation_notes:
  revision_awareness: La versión inglesa pasó de «Look» y «from room to room» a «Behold» y «into an inner room» en una revisión posterior. Esta propuesta española busca mantener la precisión del hebreo y, al mismo tiempo, dejar visible la tensión interpretativa del giro חֶדֶר בְּחֶדֶר mediante una expresión que no cierre demasiado pronto la imagen.
  spanish_consistency_notes:
  - Se usa «Micaías» para el nombre propio y «Yahvé» no aparece en este versículo.
  - Se conserva un registro bíblico sobrio pero en español moderno, evitando arcaísmos como «he aquí» salvo en nota.
  - La frase «de cuarto en cuarto» fue elegida para no borrar la ambigüedad espacial del hebreo, aunque la nota aclara la alternativa de aposento interior.
  - Se mantiene el pronombre explícito «tú» para reflejar el sujeto enfático del hebreo y la fuerza predictiva del enunciado.
