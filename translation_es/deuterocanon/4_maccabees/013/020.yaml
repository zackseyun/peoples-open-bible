translation:
  language: es
  text: en la que hermanos, habiendo vivido el mismo tiempo, y habiendo sido formados al mismo tiempo, y habiendo crecido de la misma sangre, y por la misma[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de este versículo, tal como se conserva aquí, termina a mitad de frase ('y por la misma ...'); por eso la traducción también queda incompleta en vez de suplir palabras no presentes en el testimonio citado.
    reason: textual_variant
lexical_decisions:
- source_word: ἐν ᾗ
  english_pob_choice: in which
  chosen_spanish: en la cual
  alternatives_spanish:
  - en donde
  - en que
  lexicon: LSJ
  rationale: El relativo femenino singular dativo se conserva con un relativo español femenino que mantiene la relación de pertenencia/ubicación sin añadir contenido que no está en el fragmento.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - sibilinos
  lexicon: LSJ
  rationale: El griego es masculino plural y la referencia natural es a hermanos varones; 'hermanos' conserva esa fuerza con naturalidad en español.
- source_word: τὸν ἴσον ... χρόνον
  english_pob_choice: the same span of time
  chosen_spanish: un mismo tiempo
  alternatives_spanish:
  - el mismo lapso de tiempo
  - un tiempo igual
  lexicon: LSJ
  rationale: La frase expresa igualdad de duración; 'un mismo tiempo' es una forma natural en español y preserva la idea de duración compartida.
- source_word: κατοικήσαντες
  english_pob_choice: having lived
  chosen_spanish: habiendo habitado
  alternatives_spanish:
  - habiendo vivido
  - habiendo residido
  lexicon: LSJ
  rationale: El participio remite a habitar/vivir; 'habitado' mantiene el matiz de residencia vital y la cadencia participial del griego.
- source_word: ἐν τῷ αὐτῷ χρόνῳ
  english_pob_choice: at the same time
  chosen_spanish: al mismo tiempo
  alternatives_spanish:
  - en el mismo tiempo
  - en el mismo momento
  lexicon: LSJ
  rationale: La simultaneidad es el sentido principal y 'al mismo tiempo' es la equivalencia más natural en español.
- source_word: πλασθέντες
  english_pob_choice: having been formed
  chosen_spanish: habiendo sido formados
  alternatives_spanish:
  - habiendo sido modelados
  - habiendo sido plasmados
  lexicon: LSJ
  rationale: El pasivo expresa ser formados/creados; 'formados' conserva el sentido sin forzar un vocabulario más técnico.
- source_word: ἀπὸ τοῦ αὐτοῦ αἵματος
  english_pob_choice: from the same blood
  chosen_spanish: de la misma sangre
  alternatives_spanish:
  - del mismo linaje
  - de la misma sangre común
  lexicon: LSJ
  rationale: La imagen concreta de origen biológico y parentesco se expresa de modo directo con 'de la misma sangre'.
- source_word: αὐξηθέντες
  english_pob_choice: having grown
  chosen_spanish: habiendo crecido
  alternatives_spanish:
  - habiendo aumentado
  - habiendo sido criados
  lexicon: LSJ
  rationale: El participio denota crecimiento/desarrollo; 'habiendo crecido' es la forma más natural y precisa en este contexto familiar.
theological_decisions:
- issue: Fragmento textual que termina en medio de una frase
  english_pob_reading: The English POB leaves the verse incomplete rather than supplying words not present in the source witness quoted.
  chosen_spanish_reading: La traducción española también queda incompleta y no añade palabras para cerrar la frase.
  alternative_spanish_readings:
