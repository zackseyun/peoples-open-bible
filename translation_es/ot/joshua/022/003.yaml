translation:
  language: es
  text: No han abandonado a sus hermanos[a] todos estos muchos días, hasta hoy; y han guardado el encargo del mandamiento de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus compatriotas israelitas»; el hebreo dice literalmente «sus hermanos», un término de parentesco masculino plural que puede referirse en sentido amplio a los miembros de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזַבְתֶּם
  english_pob_choice: have not forsaken
  chosen_spanish: no han abandonado
  alternatives_spanish:
  - no han dejado
  - no han forsado
  lexicon: HALOT
  rationale: עזב expresa dejar, abandonar o forsake. En español, «abandonado» comunica la fuerza relacional y de lealtad del reproche/elogio, con un registro natural y fiel al valor del perfecto en contexto.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus compatriotas
  - sus semejantes
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino de parentesco. En español, «hermanos» conserva el término de parentesco y el tono comunitario/covenantal. Se mantiene el carácter masculino del original en la forma principal, dejando la ampliación referencial en la nota.
- source_word: זֶה יָמִים רַבִּים
  english_pob_choice: these many days
  chosen_spanish: estos muchos días
  alternatives_spanish:
  - por muchos días
  - durante mucho tiempo
  - hace muchos días
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a una duración prolongada. «Estos muchos días» conserva bastante de la forma del original sin volverse áspero en español; «por muchos días» sería más fluido, pero pierde algo del sabor idiomático.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: up to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta este mismo día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La frase temporal marca continuidad hasta el presente. «Hasta hoy» es una equivalencia natural y clara en español; mantiene el sentido sin forzar una calca.
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: and you have kept
  chosen_spanish: y han guardado
  alternatives_spanish:
  - y han observado
  - y han custodiado
  - y han preservado
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. Aquí introduce fidelidad a una obligación; «han guardado» es breve, idiomático y conserva la idea de cumplimiento fiel.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la custodia
  alternatives_spanish:
  - el encargo
  - la responsabilidad
  - la obligación
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denota algo puesto a cargo de alguien, una responsabilidad vigilada. «Custodia» conserva la idea de algo que se guarda con cuidado; aunque «cargo» o «encargo» también son posibles, «custodia» ayuda a reflejar el matiz de vigilancia inherente al sustantivo.
- source_word: מִצְוַת
  english_pob_choice: of the commandment
  chosen_spanish: del mandamiento
  alternatives_spanish:
  - del mandato
  - de la orden
  - del precepto
  lexicon: HALOT
  rationale: El constructo apunta al mandamiento como fuente de la obligación. «Mandamiento» mantiene el valor normativo y bíblico del término sin introducir un matiz más jurídico que el hebreo no exige en esta frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en español como «Yahvé», conforme al criterio del proyecto. No se sustituye por una reverencia genérica, para preservar la transparencia del Tetragrámaton.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: La forma posesiva plural de segunda persona se expresa naturalmente en español con «su Dios» cuando el sujeto ya ha sido indicado; el referente sigue siendo el Dios del pacto de Israel.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo usa directamente el Tetragrámaton. La traducción española conserva el nombre propio divino como «Yahvé», en lugar de sustituirlo por un título, para mantener la transparencia textual y la continuidad con la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de אֲחֵיכֶם como término de parentesco masculino plural
  english_pob_reading: your brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - sus compatriotas
  - sus fellow israelitas
  rationale: El hebreo es masculino plural y puede abarcar al pueblo de Israel. La forma principal en español conserva «hermanos» por fidelidad morfológica y retórica; la ampliación referencial se reserva para la nota, sin neutralizar el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios y el control cruzado informó alta concordancia (1.0). La redacción española mantiene las decisiones clave del audit trail en un estilo natural y publicable.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - Se mantuvo el matiz de parentesco comunitario de «hermanos» con nota explicativa, sin neutralizar el texto principal.
  - «Estos muchos días» reproduce el giro idiomático hebreo con suficiente naturalidad en español.
  - «Han guardado» y «la custodia del mandamiento» reflejan la obligación vigilada de מִשְׁמֶרֶת מִצְוַת sin añadir interpretación.
  - Se usó puntuación española y un registro bíblico moderno, digno y claro.
