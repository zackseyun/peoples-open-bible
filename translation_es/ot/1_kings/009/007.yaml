translation:
  language: es
  text: entonces yo cortaré a Israel de la faz de la tierra que les he dado, y la casa[a] que he consagrado para mi nombre[b] la arrojaré de delante de mí[c], e Israel llegará a ser un proverbio y una burla[d] entre todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo». El hebreo dice literalmente «la casa».
    reason: lexical_alternative
  - marker: b
    text: La expresión «para mi nombre» conserva el modismo bíblico de una casa apartada para llevar y honrar el nombre de Dios.
    reason: theological_note
  - marker: c
    text: O «de mi presencia». El hebreo dice literalmente «de delante de mi rostro».
    reason: lexical_alternative
  - marker: d
    text: O «un proverbio y un escarnio» o «un proverbio y un dicho de burla».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: extirparé
  alternatives_spanish:
  - cortaré de raíz
  - eliminaré
  - quitaré
  lexicon: HALOT
  rationale: כרת en hifil expresa la acción de apartar o eliminar con fuerza en contexto de juicio. 'Extirparé' comunica esa severidad en español moderno sin convertirla en una afirmación más absoluta de exterminio total que la que el hebreo exige.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the land
  chosen_spanish: de sobre la superficie de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - de la faz de la tierra
  - de la superficie del suelo
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'de sobre la faz de la tierra/terreno'. 'De sobre la superficie de la tierra' conserva el giro espacial y su fuerza visual en español, aunque 'tierra' amplía ligeramente adָמה hacia un sentido más natural en este contexto.
- source_word: הָאֲדָמָה אֲשֶׁר נָתַתִּי לָהֶם
  english_pob_choice: the land that I have given them
  chosen_spanish: la tierra que les he dado
  alternatives_spanish:
  - la tierra que les di
  - el suelo que les he dado
  lexicon: HALOT
  rationale: Aunque אֲדָמָה puede significar 'suelo' o 'tierra', aquí el contexto de pacto y posesión favorece 'tierra'. El perfecto 'les he dado' refleja bien la acción divina ya concedida y mantiene la relación de don.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: Se conserva 'casa' porque el hebreo dice literalmente eso y el libro de Reyes desarrolla la teología de la casa dedicada al nombre de Yahvé. 'Templo' aclararía el referente, pero perdería parte de esa resonancia lexical.
- source_word: הִקְדַּשְׁתִּי
  english_pob_choice: I have consecrated
  chosen_spanish: he consagrado
  alternatives_spanish:
  - he santificado
  - he hecho santo
  - he dedicado
  lexicon: HALOT
  rationale: קדשׁ en hifil implica apartar para uso santo. 'He consagrado' funciona con naturalidad en español y conserva la idea de dedicación sagrada mejor que un mero 'he dedicado'.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en honor de mi nombre
  - para llevar mi nombre
  - por causa de mi nombre
  lexicon: HALOT
  rationale: Se mantiene la expresión idiomática 'para mi nombre', porque el hebreo subraya que la casa fue apartada para pertenecer y honrar el nombre divino. Traducirlo de forma explicativa debilitaría ese rasgo idiomático.
- source_word: אֲשַׁלַּח מֵעַל פָּנָי
  english_pob_choice: I will cast out from before my face
  chosen_spanish: la arrojaré de delante de mi rostro
  alternatives_spanish:
  - la enviaré lejos de mi presencia
  - la apartaré de delante de mí
  - la echaré de mi presencia
  lexicon: HALOT
  rationale: שׁלח aquí lleva el sentido de expulsar o desalojar, no sólo 'enviar'. 'La arrojaré' reproduce esa fuerza. 'De delante de mi rostro' conserva el antropomorfismo del hebreo, aunque en español suene más solemne que 'de mi presencia'.
- source_word: מֵעַל פָּנָי
  english_pob_choice: from before my face
  chosen_spanish: de delante de mi rostro
  alternatives_spanish:
  - de mi presencia
  - de delante de mí
  - de ante mi rostro
  lexicon: HALOT
  rationale: La frase literal mantiene la imagen de rechazo ante el rostro de Dios. 'Rostro' conserva la metáfora bíblica y evita sustituirla de inmediato por una explicación abstracta como 'presencia'.
- source_word: וְהָיָה יִשְׂרָאֵל
  english_pob_choice: and Israel will become
  chosen_spanish: Israel vendrá a ser
  alternatives_spanish:
  - Israel será
  - Israel llegará a ser
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante. 'Vendrá a ser' suena natural en español bíblico contemporáneo y comunica bien la transformación en un objeto de memoria y escarnio.
- source_word: לְמָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - un dicho
  - un refrán
  - una moraleja
  lexicon: HALOT
  rationale: מָשָׁל puede ser proverbio o dicho sentencioso. 'Proverbio' conserva el valor lexical y prepara el segundo término, que aporta la idea de burla.
- source_word: וְלִשְׁנִינָה
  english_pob_choice: and a taunt
  chosen_spanish: una burla
  alternatives_spanish:
  - un escarnio
  - una mofa
  - un objeto de burla
  lexicon: HALOT
  rationale: El término denota desprecio verbal y ridiculización. 'Burla' es breve y claro en español, y evita duplicar demasiado a 'proverbio' mientras conserva la dimensión de menosprecio público.
- source_word: בְּכָל הָעַמִּים
  english_pob_choice: among all peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todas las naciones
  - ante todos los pueblos
  lexicon: HALOT
  rationale: '''Pueblos'' refleja bien עַמִּים sin imponer la categoría moderna de estados-nación. ''Entre'' expresa adecuadamente el ámbito social en que Israel será objeto de proverbio y burla.'
theological_decisions:
- issue: Intensidad del juicio sobre Israel
  english_pob_reading: I will cut off Israel from the face of the land
  chosen_spanish_reading: extirparé a Israel de sobre la superficie de la tierra
  alternative_spanish_readings:
  - eliminaré a Israel de la tierra
  - cortaré a Israel de la tierra
  - arrancaré a Israel de la tierra
  rationale: La cláusula anuncia juicio de pacto y expulsión severa. 'Extirparé' comunica una acción radical sin añadir explícitamente una doctrina de exterminio total; conserva el peso del hebreo y sugiere remoción judicial.
  doctrine_reference: Teología del pacto y del juicio en Reyes; cf. 1 Reyes 9:6-9
- issue: El sentido de 'for my name' aplicado a la casa
  english_pob_reading: the house that I have consecrated for my name
  chosen_spanish_reading: la casa que he consagrado para mi nombre
  alternative_spanish_readings:
  - la casa que he consagrado en mi nombre
  - la casa dedicada a mi nombre
  rationale: Se preserva el valor teológico del 'nombre' como aquello a lo que la casa está dedicada y en lo que se honra a Dios. No se reduce a una fórmula devocional genérica.
  doctrine_reference: La teología del nombre divino en 1 Reyes 8–9
- issue: Relación entre 'proverbio' y 'burla'
  english_pob_reading: a proverb and a taunt
  chosen_spanish_reading: un proverbio y una burla
  alternative_spanish_readings:
  - un proverbio y un escarnio
  - un dicho y una burla
  - un refrán y una mofa
  rationale: 'Se conserva la distinción de dos términos hebreos: uno más proverbial/sentencioso y otro de ridiculización. ''Burla'' mantiene la tensión sin nivelarla a un solo concepto.'
  doctrine_reference: Poética y fórmulas de vergüenza pública en el AT
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el audit trail inglés: se mantuvieron las imágenes de juicio (''cut off''), de expulsión desde la presencia/rostro divino, y la distinción entre ''proverbio'' y el término de burla. La principal adaptación fue elegir ''extirparé'' y ''la arrojaré'' para sostener fuerza idiomática en español sin sobreinterpretar el alcance del juicio.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando aparece el nombre divino; en este versículo no aparece el Tetragrámaton explícito, pero se preserva la teología del 'nombre'.
  - Se mantuvo 'casa' en vez de 'templo' para respetar la primacía lexical del hebreo.
  - '''Pueblos'' se eligió para עַמִּים por consistencia con el registro bíblico y para evitar la carga moderna de ''naciones'' cuando el énfasis es étnico-cultural.'
  - Se conservaron imágenes corporales ('rostro') donde el hebreo las usa, en vez de neutralizarlas a 'presencia' en el texto principal.
