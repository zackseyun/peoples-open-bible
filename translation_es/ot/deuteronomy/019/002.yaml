review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien los elementos principales del hebreo: ''tres ciudades'', ''dentro de tu tierra'', ''Yahvé tu Dios'' y la nota sobre ''poseer/heredar''. Sin embargo, no refleja fielmente el verbo תבדיל (''separar/apartar/designar'') porque lo sustituye por ''Harás'', lo cual cambia el sentido legal del mandato. También conviene expresar mejor la relación de ''for yourself'' sin oscurecer el verbo principal.'
  spanish_quality_summary: El español es generalmente claro, pero 'Harás para ti tres ciudades' suena poco natural y semánticamente impreciso, porque en español implica fabricar o construir ciudades en vez de apartarlas/designarlas. Una formulación como 'Apartarás para ti tres ciudades' o 'Designarás...' es más fiel y legible. El resto del verso lee con naturalidad aceptable.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto en ''Yahvé'', ''Dios'' y ''poseer''. El problema principal es léxico-funcional: תבדיל no puede reducirse a ''harás''. La nota léxica sobre לְרִשְׁתָּהּ está bien preservada.'
  issues:
  - severity: high
    issue: '''Harás para ti'' traduce incorrectamente תַּבְדִּיל'
    rationale: El hiphil de בדל significa 'separar, apartar, designar'. 'Harás' cambia el sentido de designación legal por uno de producción o construcción, y no preserva la decisión auditada 'set apart'.
  - severity: medium
    issue: La decisión léxica documentada para תַּבְדִּיל contradice el texto español elegido
    rationale: La propia rationale reconoce 'separar o apartar', pero el texto final usa 'harás', creando inconsistencia entre evidencia fuente y borrador.
  - severity: low
    issue: '''Para ti'' puede mantenerse, pero debe acompañar a un verbo de apartar/designar'
    rationale: El matiz benefactivo de לָךְ está bien captado por 'para ti'; el problema no es esa frase sino su combinación con un verbo inadecuado.
  revised_spanish_text: Apartarás para ti tres ciudades dentro de tu tierra que Yahvé tu Dios te da para poseer[a].
  revised_footnotes:
  - marker: a
    text: O 'para heredarla'. El verbo hebreo puede significar 'poseer' o 'heredar' en contextos de concesión de tierras.
    reason: lexical_alternative
