translation:
  language: es
  text: 'Y los hijos de Israel les dijeron[a]: «¡Ojalá hubiéramos muerto por mano de Yahvé en la tierra de Egipto, cuando nos sentábamos junto a las ollas de carne[b], cuando comíamos pan hasta saciarnos! Porque ustedes nos han sacado a este desierto para matar de hambre a toda esta asamblea».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; una versión más idiomática podría decir «los israelitas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «junto a la olla de carne»; la imagen concreta puede entenderse también como «junto a las ollas de carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la expresión genealógica/covenantal del hebreo. En español, «hijos de Israel» suena más natural y fiel que una neutralización interpretativa; «israelitas» es posible, pero pierde la forma transparente del מקור.
- source_word: מִי יִתֵּן
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá
  alternatives_spanish:
  - ¿Quién diera...?
  - Si tan solo
  lexicon: HALOT
  rationale: Es un giro desiderativo, no una pregunta literal. «¡Ojalá» comunica bien el deseo lamentoso en español sin endurecerlo en forma interrogativa.
- source_word: מוּתֵנוּ
  english_pob_choice: we had died
  chosen_spanish: hubiéramos muerto
  alternatives_spanish:
  - hubiésemos muerto
  - muriéramos
  lexicon: HALOT
  rationale: La construcción desiderativa se expresa mejor como un pluscuamperfecto de subjuntivo en español para un deseo contrafactual pasado.
- source_word: בְיַד יְהוָה
  english_pob_choice: by the hand of Yahweh
  chosen_spanish: por mano de Yahvé
  alternatives_spanish:
  - a manos de Yahvé
  - por la mano de Yahvé
  lexicon: HALOT
  rationale: Mantengo el nombre divino «Yahvé» según la norma del proyecto, y traduzco la idiomática בְיַד con «por mano de» para conservar la imagen hebrea sin sonar torpe en español.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» refleja de modo más literal el hebreo y conserva el marco territorial del relato.
- source_word: בְּשִׁבְתֵּנוּ עַל סִיר הַבָּשָׂר
  english_pob_choice: when we sat by the pots of meat
  chosen_spanish: cuando nos sentábamos junto a las ollas de carne
  alternatives_spanish:
  - cuando nos sentábamos junto a las marmitas de carne
  - cuando nos sentábamos junto a los recipientes de carne
  lexicon: HALOT
  rationale: «Ollas de carne» transmite de forma clara la imagen concreta del hebreo. Evito «flesh pots» por ser demasiado arcaico en español y «marmitas» por sonar menos común.
- source_word: בְּאָכְלֵנוּ לֶחֶם לָשֹׂבַע
  english_pob_choice: when we ate bread to the full
  chosen_spanish: cuando comíamos pan hasta saciarnos
  alternatives_spanish:
  - cuando comíamos pan a saciedad
  - cuando teníamos pan en abundancia
  lexicon: HALOT
  rationale: «Hasta saciarnos» conserva la idea de plenitud/satisfacción de לָשֹׂבַע con un español natural y transparente.
- source_word: הוֹצֵאתֶם
  english_pob_choice: you have brought us out
  chosen_spanish: nos han sacado
  alternatives_spanish:
  - nos sacaron
  - nos habéis sacado
  lexicon: HALOT
  rationale: En el reproche directo, el perfecto puede sonar natural en español como acción ya cumplida con resultado presente. «Nos han sacado» comunica bien la acusación.
- source_word: הַמִּדְבָּר הַזֶּה
  english_pob_choice: this wilderness
  chosen_spanish: este desierto
  alternatives_spanish:
  - este desierto
  - este yermo
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «desierto» es una opción clara y natural; aunque «wilderness» suele verterse «desierto» en este contexto, no pierdo el sentido geográfico de zona inhóspita.
- source_word: לְהָמִית
  english_pob_choice: to kill
  chosen_spanish: para matar
  alternatives_spanish:
  - para hacer morir
  - para dar muerte a
  lexicon: HALOT
  rationale: La finalidad es directa y el verbo «matar» resulta natural en español. Mantiene la crudeza de la acusación sin añadir matices no presentes.
- source_word: כָּל הַקָּהָל הַזֶּה
  english_pob_choice: this whole assembly
  chosen_spanish: a toda esta asamblea
  alternatives_spanish:
  - a toda esta congregación
  - a toda esta comunidad
  lexicon: HALOT
  rationale: «Asamblea» preserva el carácter colectivo de קָהָל sin imponer una terminología eclesial posterior. El adjetivo «esta» refleja el demostrativo hebreo.
- source_word: בָּרָעָב
  english_pob_choice: with hunger
  chosen_spanish: de hambre
  alternatives_spanish:
  - por hambre
  - con hambre
  lexicon: HALOT
  rationale: En español, la locución natural para este caso es «de hambre», que expresa bien el medio o resultado de muerte por privación.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Sigo el criterio del proyecto de traducir directamente el Tetragrámaton con el nombre propio divino en español. «Yahvé» es la forma adoptada para la publicación en español, en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Exprresión desiderativa מִי יִתֵּן
  english_pob_reading: If only
  chosen_spanish_reading: ¡Ojalá
  alternative_spanish_readings:
  - ¿Quién diera...?
  - Si tan solo
  rationale: La fuerza teológica/literaria aquí es lamento y deseo contrafactual, no simple interrogación. «¡Ojalá» preserva esa tensión sin suavizarla.
  doctrine_reference: HALOT / uso idiomático del hebreo desiderativo
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el expediente auditado en inglés. Mantiene la fuerza desiderativa de מִי יִתֵּן, el nombre divino como Yahvé, la imagen concreta de סִיר הַבָּשָׂר y la acusación final de muerte por hambre sin atenuarla.
  spanish_consistency_notes:
  - Usé «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Conservé «asamblea» para קָהָל, evitando sustituirlo por un término eclesial posterior.
  - Preferí «hijos de Israel» por su transparencia con el hebreo y su inteligibilidad en español.
  - Mantuve el contraste entre la abundancia recordada y la privación del desierto con una sintaxis natural en español.
