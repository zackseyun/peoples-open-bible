translation:
  language: es
  text: No cedas ante él[a], ni lo escuches; tu ojo no tendrá piedad de él[b], ni lo eximirás, ni lo encubrirás[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consientas con él». El verbo hebreo puede denotar estar dispuesto, consentir o ceder ante alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu ojo no tendrá piedad de él», un hebraísmo que expresa compasión o trato indulgente.
    reason: cultural_note
  - marker: c
    text: O «lo cubras»; es decir, esconderlo o ocultar su culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאבֶה לּוֹ
  english_pob_choice: yield to him
  chosen_spanish: No te inclines a él
  alternatives_spanish:
  - No consientas en él
  - No accedas a él
  - No te doblegues ante él
  lexicon: HALOT
  rationale: אָבָה en este contexto expresa voluntad, consentimiento o disposición a ceder. «No te inclines a él» comunica la idea de ceder o prestarse a su solicitud sin sonar demasiado técnico, y mantiene la negativa de consentimiento implícita en el verbo hebreo.
- source_word: תִשְׁמַע אֵלָיו
  english_pob_choice: listen to him
  chosen_spanish: ni le escuches
  alternatives_spanish:
  - ni le oigas
  - ni le prestes oído
  - ni le obedezcas
  lexicon: HALOT
  rationale: שׁמע con אֶל puede significar escuchar o prestar atención a. Aquí, por el paralelismo con la primera cláusula, «escuchar» conserva la idea de atender a su solicitud, sin convertirlo todavía en obediencia plena.
- source_word: תָחוֹס עֵינְךָ עָלָיו
  english_pob_choice: your eye shall not pity him
  chosen_spanish: tu ojo no tendrá piedad de él
  alternatives_spanish:
  - tu ojo no lo compadecerá
  - tu ojo no se apiadará de él
  - tu ojo no lo mirará con compasión
  lexicon: HALOT
  rationale: חוס es un giro idiomático sobre el ojo que expresa compasión o piedad. «Tu ojo no tendrá piedad de él» conserva la imagen hebrea y su fuerza legal, sin reducirla a una negación abstracta de misericordia.
- source_word: תַחְמֹל
  english_pob_choice: spare
  chosen_spanish: no lo perdonarás
  alternatives_spanish:
  - no lo perdonarás ni lo excusarás
  - no te apiadarás
  - no lo dejarás pasar
  lexicon: HALOT
  rationale: חמל aquí es paralelo pero distinto de חוס; puede significar perdonar en el sentido de no tratar con indulgencia, o ahorrar/eximir. «No lo perdonarás» funciona bien en español como prohibición de indulgencia, aunque no desplaza del todo la posibilidad de «apiadarte» o «ahorrarle» el castigo.
- source_word: תְכַסֶּה עָלָיו
  english_pob_choice: conceal him
  chosen_spanish: ni lo encubrirás
  alternatives_spanish:
  - ni lo ocultarás
  - ni lo cubrirás
  - ni lo protegerás
  lexicon: HALOT
  rationale: כסה en piel puede significar cubrir o encubrir, aquí con sentido de ocultar la culpa o esconder al culpable. «Encubrir» conserva el matiz jurídico de esconder o tapar un delito, más que simplemente ocultar físicamente a la persona.
theological_decisions:
- issue: Retención del tono judicial severo en un mandato contra el instigador a la apostasía
  english_pob_reading: Preserve the direct prohibitions without softening them into generalized disapproval.
  chosen_spanish_reading: Mantener la serie de prohibiciones directas sin suavizarlas en una mera desaprobación emocional.
  alternative_spanish_readings:
  - Parafrasear como una exhortación sólo a no simpatizar con él
  - Suavizarlo a una instrucción general de no protegerlo
  - Reducir la frase a una sola prohibición amplia
  rationale: 'El contexto legal exige reproducir la acumulación de negaciones y su progresión: no ceder, no escuchar, no compadecer, no perdonar/ahorrar, no encubrir. La traducción preserva esa dureza normativa y no la atenúa por motivos pastorales o estilísticos.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el análisis auditado en inglés. Se conservó la progresión de negaciones y la imagen idiomática del «ojo» para piedad. La única tensión principal está en תַחְמֹל, donde el inglés POB eligió «spare»; en español se optó por «perdonar» para dar una prohibición natural y jurídica, manteniendo en nota la alternativa semántica de indulgencia. No se introdujeron cambios textuales respecto del control de revisión más reciente, que reporta alta concordancia y sin modificaciones.
  spanish_consistency_notes:
  - Se usa «encubrir» para mantener el matiz jurídico de תְכַסֶּה עָלָיו, no «cubrir» en sentido meramente físico.
  - «Tu ojo no tendrá piedad» conserva el hebraísmo y evita normalizarlo a una simple falta de compasión sin imagen.
  - Se eligió «No te inclines a él» para reflejar consentimiento/ceder, sin sobrecargarlo con obediencia plena, que queda mejor para la segunda cláusula.
