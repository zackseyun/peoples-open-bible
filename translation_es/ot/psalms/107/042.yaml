translation:
  language: es
  text: Los rectos ven y se alegran[a], y toda injusticia cierra su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda injusticia cierra su boca». El hebreo usa un sustantivo femenino singular («injusticia» o «maldad») con sufijo femenino, personificando el mal como silenciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - verán
  - vean
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de ראה puede funcionar en sentido gnómico o proverbial. En español, «ven» expresa con naturalidad la observación general del proverbio sin forzar un futuro explícito.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los íntegros
  - los justos
  lexicon: HALOT
  rationale: El adjetivo sustantivado describe personas moralmente rectas. «Rectos» conserva la idea ética básica y evita cargar el término con un matiz covenantal más específico que el hebreo no usa aquí.
- source_word: וְיִשְׂמָחוּ
  english_pob_choice: and rejoice
  chosen_spanish: y se alegran
  alternatives_spanish:
  - y se regocijan
  - y se gozan
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de שמח admite un valor proverbial. «Se alegran» es natural en español y comunica la respuesta de gozo sin excesiva elevación estilística.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia moral
  - maldad
  - iniquidad
  lexicon: HALOT
  rationale: El sustantivo puede significar injusticia, torcedura o maldad. «Injusticia» recoge bien el sentido abstracto y colectivo, y permite mantener la personificación del mal silenciado.
- source_word: קָפְצָה פִּיהָ
  english_pob_choice: shuts its mouth
  chosen_spanish: cierra su boca
  alternatives_spanish:
  - ha cerrado su boca
  - calla
  lexicon: HALOT
  rationale: קפץ con boca expresa cerrar o apretar. «Cierra su boca» preserva la imagen corporal y el efecto proverbial. El posesivo «su» mantiene en español la personificación del sustantivo femenino abstracto.
theological_decisions:
- issue: Personificación de la injusticia
  english_pob_reading: Render the abstract noun concretely as personified 'injustice' that 'shuts its mouth.'
  chosen_spanish_reading: Mantener «injusticia» como sujeto personificado que «cierra su boca».
  alternative_spanish_readings:
  - «la injusticia cierra la boca»
  - «la maldad queda callada»
  - «los impíos callan»
  rationale: El hebreo presenta un sustantivo abstracto femenino con sufijo femenino, no un sujeto personal explícito. La traducción conserva esa personificación poética sin reemplazarla por «los impíos», que cambiaría el sujeto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado usa una formulación gnómica en presente y conserva la personificación de עַוְלָה como 'injustice' que 'shuts its mouth'. No hubo revisiones aplicadas en la última pasada; la presente propuesta sigue esa lectura con equivalencia óptima en español.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra convención de ocultamiento porque este verso no contiene el nombre divino.
  - «Rectos» reproduce mejor יְשָׁרִים que «justos», ya que el hebreo no usa צדיק.
  - 'Se conserva el paralelismo: ver → alegrarse; injusticia → cerrar la boca.'
  - El posesivo singular en «su boca» refleja de forma natural el sufijo femenino hebreo, manteniendo la personificación.
