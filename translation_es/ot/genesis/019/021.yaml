    rationale: Aunque comunica el resultado general, el audit trail inglés documenta deliberadamente ‘overthrow’ para preservar el matiz de inversión/catástrofe. En español, «arrasaré» o «derrumbaré» reflejan mejor esa fuerza sin sonar extraños.
  revised_spanish_text: 'Y le dijo: «Mira, te he concedido este favor[a] también en este asunto; no arrasaré la ciudad de la cual has hablado».'
