translation:
  language: es
  text: Hijo de hombre[a], propón un enigma y habla una parábola[b] a la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Mortal' o 'Ser humano'. Se mantiene aquí el modismo hebreo 'Hijo de hombre' como fórmula recurrente de Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: O 'proverbio'. El hebreo mashal puede significar proverbio, parábola o dicho figurado; aquí el desarrollo figurado amplio favorece 'parábola'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conserva el idiomático vocativo de Ezequiel y su recurrencia literaria. En español, 'Hijo de hombre' es la forma más directa y reconocible para reproducir la expresión sin neutralizarla a un equivalente explicativo.
- source_word: חוּד
  english_pob_choice: pose
  chosen_spanish: propón
  alternatives_spanish:
  - plantea
  - presenta
  - enuncia
  lexicon: HALOT
  rationale: El imperativo pide poner delante o proponer algo de forma intencional. 'Propón' funciona bien con 'enigma' en español moderno y evita un calco como 'pose', poco natural en este contexto.
- source_word: חִידָה
  english_pob_choice: riddle
  chosen_spanish: enigma
  alternatives_spanish:
  - acertijo
  - adivinanza
  - puzzle
  lexicon: HALOT
  rationale: El sustantivo designa una expresión enigmática o de sentido oculto. 'Enigma' conserva mejor la seriedad profética y el alcance figurado que 'acertijo', que suena más lúdico.
- source_word: וּמְשֹׁל
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - pronuncia
  - diles
  - expón
  lexicon: HALOT
  rationale: En español, el verbo natural que encabeza 'una parábola' es 'habla'. Mantiene la fuerza del mandato verbal sin forzar una construcción extraña como 'pronuncia una parábola'.
- source_word: מָשָׁל
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - proverbio
  - sentencia figurada
  - alegoría
  lexicon: HALOT
  rationale: Aquí el discurso que sigue es una comparación figurada extendida; 'parábola' es la equivalencia más clara y fiel para el lector hispanohablante. 'Proverbio' sería demasiado estrecho y 'alegoría' introduce interpretación.
- source_word: אֶל בֵּית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - a Israel
  lexicon: HALOT
  rationale: '''A'' reproduce la preposición direccional del hebreo y ''casa de Israel'' preserva la expresión pactual y colectiva del original, mejor que reducirla simplemente a ''Israel''.'
theological_decisions:
- issue: Mantenimiento del vocativo profético בֶּן אָדָם en Ezequiel
  english_pob_reading: Son of man as Ezekiel's recurring form of address, not a christological title here
  chosen_spanish_reading: Hijo de hombre como fórmula vocativa recurrente de Ezequiel, no como título cristológico
  alternative_spanish_readings:
  - Mortal
  - Ser humano
  rationale: La decisión conserva el tono y la textura literaria del libro. Aunque 'Mortal' aclara el sentido, borra el carácter formular y repetido de la expresión. En este versículo no se debe leer como título mesiánico, sino como apelativo profético.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto del audit trail inglés y no requiere revisiones sustanciales respecto de la lectura base; se conservaron las dos tensiones léxicas principales: el vocativo fijo ''Hijo de hombre'' y la amplitud semántica de ''mashal''.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' en lugar de 'Israel' para conservar el matiz colectivo y pactal.
  - '''Enigma'' y ''parábola'' evitan simplificar el paralelismo hebreo a una sola idea.'
  - El estilo es formal y bíblico, pero con español moderno y fluido.
