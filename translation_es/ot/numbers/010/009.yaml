translation:
  language: es
  text: Y cuando vayan a la guerra en su tierra contra el enemigo que los oprime[a], harán sonar una alarma con las trompetas, y serán recordados delante de Yahvé su Dios[b][c], y serán librados de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si van a la guerra en su tierra». La conjunción hebrea puede introducir tanto una cláusula situacional como condicional.'
    reason: alternative_reading
  - marker: b
    text: 'O: «serán traídos a la memoria delante de Yahvé su Dios», o de forma más interpretativa, «Yahvé su Dios los recordará».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: el nombre divino representado aquí es YHWH, que en este proyecto se traduce «Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Cuando
  lexicon: HALOT
  rationale: En este contexto legal/instructivo, la conjunción puede introducir una situación futura. «Y cuando» conserva el flujo discursivo y la contingencia sin volverla más condicional de lo que exige el hebreo.
- source_word: תָבֹאוּ מִלְחָמָה
  english_pob_choice: you go to war
  chosen_spanish: vayan a la guerra
  alternatives_spanish:
  - entren en guerra
  - salgan a la guerra
  lexicon: HALOT
  rationale: El hebreo expresa el ingreso en una situación de guerra. «Vayan a la guerra» es natural en español y conserva la idea idiomática de entrar en combate.
- source_word: בְּאַרְצְכֶם
  english_pob_choice: in your land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: «Tierra» mantiene mejor la resonancia territorial y pactal de אֶרֶץ que «país», que suena demasiado moderno-político. Se usa «su» para concordar con el plural de segunda persona.
- source_word: עַל הַצַּר הַצֹּרֵר אֶתְכֶם
  english_pob_choice: against the enemy who oppresses you
  chosen_spanish: contra el enemigo que los oprime
  alternatives_spanish:
  - contra el adversario que los oprime
  - contra el enemigo que los hostiga
  lexicon: HALOT
  rationale: Se mantiene «enemigo» como la opción más directa para צַר, y «oprime» para el participio intensivo צֹרֵר, que añade fuerza de hostilidad sostenida. Así se preserva la carga semántica sin oscurecer el sentido.
- source_word: וַהֲרֵעֹתֶם
  english_pob_choice: you shall sound an alarm
  chosen_spanish: tocarán la alarma
  alternatives_spanish:
  - harán sonar la alarma
  - sonarán la alarma
  lexicon: HALOT
  rationale: El verbo en contexto de trompetas designa una señal de alarma, no solo ruido. «Tocarán la alarma» expresa la acción instrumental de manera idiomática en español.
- source_word: בַּחֲצֹצְרֹת
  english_pob_choice: with the trumpets
  chosen_spanish: con las trompetas
  alternatives_spanish:
  - con los trompetas
  lexicon: HALOT
  rationale: «Trompetas» es el equivalente natural de חֲצֹצְרֹת en este pasaje cultual/militar. El instrumento es claramente identificable en español sin requerir glosa.
- source_word: וֲנִזְכַּרְתֶּם לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: you shall be remembered before Yahweh your God
  chosen_spanish: serán recordados delante de Yahvé su Dios[b][c]
  alternatives_spanish:
  - serán traídos a la memoria delante de Yahvé su Dios
  - Yahvé su Dios se acordará de ustedes
  lexicon: HALOT
  rationale: Se conserva la pasiva/reflexiva del Niphal de זכר con «serán recordados», evitando resolver el sujeto divino en la frase principal. «Delante de» / «delante de Yahvé» refleja bien לִפְנֵי como presencia cultual-covenantal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de rendir el Tetragrámaton como «Yahvé», preservando el nombre propio divino y evitando la sustitución por un título.
- source_word: וְנוֹשַׁעְתֶּם
  english_pob_choice: you shall be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán librados
  - serán rescatados
  lexicon: HALOT
  rationale: El Niphal de ישׁע expresa salvación/libración. «Serán salvados» mantiene la correspondencia léxica y la amplitud teológica del término.
- source_word: מֵאֹיְבֵיכֶם
  english_pob_choice: from your enemies
  chosen_spanish: de sus enemigos
  alternatives_spanish:
  - de sus adversarios
  lexicon: HALOT
  rationale: «Enemigos» reproduce el término estándar אֹיֵב de manera directa y clara. Se mantiene el plural posesivo de segunda persona con «sus».
theological_decisions:
- issue: Punto de vista de la promesa y la voz pasiva de «serán recordados»
  english_pob_reading: you shall be remembered before Yahweh your God
  chosen_spanish_reading: serán recordados delante de Yahvé su Dios
  alternative_spanish_readings:
  - Yahvé su Dios los recordará
  - serán traídos a la memoria delante de Yahvé su Dios
  rationale: 'La forma pasiva conserva la tensión del hebreo: el texto no explicita en la cláusula principal a Dios como sujeto, aunque el contexto lo implique. Esto evita resolver la relación entre el acto ritual y la respuesta divina más allá de lo que el verbo dice.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Rendición del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para el nombre divino revelado en el texto hebreo. Esto mantiene la distinción entre el nombre propio de Dios y un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor semántico de וְכִי
  english_pob_reading: And when
  chosen_spanish_reading: Y cuando
  alternative_spanish_readings:
  - Y si
  - Cuando
  rationale: La lectura situacional es la mejor en este marco de instrucción. «Y cuando» conserva apertura condicional sin cargar el verso con un condicional más fuerte que el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2: Prefer source-disciplined optimal equivalence'
translation_notes:
  revision_awareness: Se revisó la tradición auditada en inglés, manteniendo la decisión de leer la conjunción como situacional («And when») y preservando la pasiva de «be remembered» para no resolver el sujeto teológico. También se siguió la revisión más reciente que prefirió «enemy» sobre una opción más matizada, por lo que en español se usó «enemigo» como equivalente directo y natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, de acuerdo con la terminología del proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - 'Se conservaron las imágenes militares y rituales: guerra, alarma, trompetas, recordados, salvados.'
  - Se usó «serán» para sostener la modalidad futura/resultado, coherente con la promesa del verso.
  - Se procuró un español litúrgico claro pero no arcaizante.
