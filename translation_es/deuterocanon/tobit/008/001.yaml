translation:
  language: es
  text: Y cuando terminaron de cenar, llevaron a Tobiah[b][a] a ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «lo llevaron a ella». La tradición semítica paralela amplía la escena con detalles sobre la preparación del cuarto y la entrada de la pareja juntos antes de cerrar la puerta.'
    reason: alternative_reading
  - marker: b
    text: Las versiones tradicionales en español suelen usar «Tobías» aquí; el nombre griego se translitera como «Tobiah».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Entonces cuando
  - Ahora cuando
  lexicon: LSJ
  rationale: Mantiene la conexión narrativa de δέ y la fuerza temporal de ὅτε en un giro natural del español.
- source_word: συνετέλεσαν
  english_pob_choice: had finished
  chosen_spanish: terminaron
  alternatives_spanish:
  - habían terminado
  - concluyeron
  lexicon: LSJ
  rationale: Expresa la idea de completar o acabar la acción del comer; en español, el pretérito simple fluye mejor en esta secuencia narrativa.
- source_word: δειπνοῦντες
  english_pob_choice: dining
  chosen_spanish: de cenar
  alternatives_spanish:
  - comiendo la cena
  - de tomar la comida principal
  lexicon: LSJ
  rationale: δειπνοῦντες se refiere a tomar la comida principal; en español, 'cenar' comunica de forma natural ese acto sin sobrecargar el estilo.
- source_word: εἰσήγαγον
  english_pob_choice: they brought in
  chosen_spanish: llevaron
  alternatives_spanish:
  - introdujeron
  - metieron
  lexicon: LSJ
  rationale: El verbo significa traer o conducir a alguien hasta un lugar o presencia. 'Llevaron' conserva la sencillez del griego y funciona bien con el contexto matrimonial.
- source_word: Τωβείαν
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobiah
  - Tobías
  lexicon: Transliteración
  rationale: Se translitera el nombre con la forma tradicional en español bíblico, que es clara para el lector y corresponde al nombre propio del personaje; la tradición semítica paralela respalda la forma afín al hebreo/aramaico.
- source_word: πρὸς αὐτήν
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - hacia ella
  - junto a ella
  - con ella
  lexicon: LSJ
  rationale: πρὸς con acusativo indica dirección o aproximación; en este contexto, 'a ella' reproduce la relación espacial/personal sin añadir interpretación más allá del texto.
theological_decisions:
- issue: Forma del nombre personal Τωβείαν
  english_pob_reading: Tobiah
  chosen_spanish_reading: Tobías
  alternative_spanish_readings:
  - Tobiah
  rationale: La política del proyecto favorece transliterar nombres, pero en español bíblico 'Tobías' es la forma asentada y plenamente inteligible. No altera el sentido del versículo ni introduce una lectura doctrinal distinta.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal, con apoyo del testimonio semítico paralelo para la nota de variante. Se incorporó la decisión auditada del POB inglés sobre el nombre propio, adaptándola al uso bíblico natural del español.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, apto para publicación.
  - No se introdujo información ausente del griego en el texto principal; la expansión del testimonio semítico queda reservada a la nota.
  - El nombre propio se adaptó a una forma española reconocible sin cambiar la identificación del personaje.
