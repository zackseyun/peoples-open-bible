translation:
  language: es
  text: Así entraron los hijos[a] y tomaron posesión de la tierra, y tú sometiste delante de ellos a los habitantes de la tierra, a los cananeos, y los entregaste en su mano[b], tanto a sus reyes como a los pueblos de la tierra, para hacer con ellos según su voluntad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «los niños» o, más interpretativamente, «los israelitas». El hebreo dice literalmente «los hijos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «los entregaste en su poder». El hebreo dice literalmente «los diste en su mano».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para tratarlos como quisieran» o «para hacer con ellos lo que quisieran».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּנִים
  english_pob_choice: the sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los descendientes
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hijos/los hijos varones». En español, «los hijos» conserva la imagen filial y genealógica sin sonar tan forzado como «los hijos varones». Mantiene mejor la conexión con el lenguaje de pacto que una etiqueta más interpretativa como «los israelitas».
- source_word: וַיִּירְשׁוּ
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - heredaron
  - poseyeron
  lexicon: HALOT
  rationale: En contextos de tierra, ירשׁ puede expresar tomar posesión/recibir en herencia. «Tomaron posesión de» es natural en español y conserva la idea concreta de ocupar la tierra, no solo de recibirla pasivamente.
- source_word: וַתַּכְנַע
  english_pob_choice: you subdued
  chosen_spanish: Tú sometiste
  alternatives_spanish:
  - Tú humillaste
  - Tú trajiste bajo sujeción
  lexicon: HALOT
  rationale: El verbo aquí expresa la acción de Dios de poner bajo control a los habitantes de la tierra. «Sometiste» conserva el sentido de dominación político-militar mejor que «humillaste», que podría sonar más interior o moral.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los moradores de la tierra
  - los que habitaban la tierra
  lexicon: HALOT
  rationale: La construcción participial se rinde de forma clara y natural con «habitantes». Evita una literalidad áspera y mantiene el sentido de quienes vivían en la tierra.
- source_word: הַכְּנַעֲנִים
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el pueblo de Canaán
  lexicon: HALOT
  rationale: Se conserva la designación étnica directa. «Cananeos» es la forma natural en español y refleja fielmente el referente del hebreo.
- source_word: וַתִּתְּנֵם בְּיָדָם
  english_pob_choice: gave them into their hand
  chosen_spanish: los entregaste en su mano
  alternatives_spanish:
  - los entregaste en su poder
  - los pusiste en sus manos
  lexicon: HALOT
  rationale: La imagen idiomática de «dar/entregar en la mano» se preserva porque es transparente y muy cercana al hebreo. «En su mano» retiene la metáfora de poder/control sin suavizarla en exceso.
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - los reyes de ellos
  - los reyes de los cananeos
  lexicon: HALOT
  rationale: El sufijo se entiende naturalmente como referido a los habitantes/cananeos. «Sus reyes» es conciso y fiel en español.
- source_word: עַמְמֵי הָאָרֶץ
  english_pob_choice: the peoples of the land
  chosen_spanish: los pueblos de la tierra
  alternatives_spanish:
  - las naciones de la tierra
  - los pueblos del país
  lexicon: HALOT
  rationale: עמים es plural; por eso se conserva «pueblos» y no se reduce a un singular colectivo. «De la tierra» mantiene el vínculo con el territorio del texto.
- source_word: לַעֲשׂוֹת בָּהֶם כִּרְצוֹנָם
  english_pob_choice: to do with them according to their will
  chosen_spanish: para hacer con ellos según su voluntad
  alternatives_spanish:
  - para tratarlos como quisieran
  - para hacer con ellos lo que quisieran
  lexicon: HALOT
  rationale: «Según su voluntad» reproduce de cerca כִּרְצוֹנָם y conserva el matiz de acción conforme al deseo/placer de los vencedores. Evita una paráfrasis más explicativa que podría borrar la forma hebrea.
theological_decisions:
- issue: Referente de «los hijos»
  english_pob_reading: The phrase refers to the descendants of Israel who entered and occupied Canaan.
  chosen_spanish_reading: «Los hijos» se entiende como los descendientes de Israel que entraron y ocuparon Canaán.
  alternative_spanish_readings:
  - «Los israelitas»
  - «Los hijos de Israel»
  rationale: El hebreo usa lenguaje filial/covenantal, no solo una etiqueta étnica. Mantener «los hijos» preserva esa continuidad con los padres mencionados en el contexto de la oración, sin borrar la relación de linaje.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Fuerza del lenguaje de conquista
  english_pob_reading: Retain the strong language of subduing and giving peoples into Israel's hand.
  chosen_spanish_reading: Se conserva el lenguaje fuerte de someter y entregar a los pueblos en la mano del pueblo vencedor.
  alternative_spanish_readings:
  - «les permitiste vencerlos»
  - «les diste dominio sobre ellos»
  rationale: El verso atribuye explícitamente la victoria a la acción de Dios. Conviene mantener la fuerza militar y política del hebreo, sin atenuarla con formulaciones más suaves o abstractas.
  doctrine_reference: Translation philosophy §5 (lexical transparency and theological accountability)
translation_notes:
  revision_awareness: Se revisó el precedente inglés del POB y su aparato de notas. No se requirieron cambios de revisión pendientes; se mantuvieron la literalidad controlada, la imaginería idiomática de «mano» y la fuerza del lenguaje de conquista, ajustando únicamente la formulación española para naturalidad y transparencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito, por lo que la referencia se expresa con el pronombre «Tú».
  - Se conserva «mano» en la expresión idiomática para mantener la metáfora hebrea de poder/control.
  - «Pueblos» se mantiene en plural para reflejar עַמְמֵי y evitar reducirlo indebidamente a un colectivo singular.
