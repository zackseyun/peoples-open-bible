translation:
  language: es
  text: Por tanto, la soberbia es su collar[a]; la violencia los cubre como una vestidura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, la soberbia los adorna como un collar; la violencia los envuelve como una vestidura»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - De modo que
  lexicon: HALOT
  rationale: Marca consecuencia lógica del contexto previo. ‘Por tanto’ conserva el valor inferencial de ‘Therefore’ con un tono natural en español bíblico actual.
- source_word: עֲנָקַתְמוֹ
  english_pob_choice: is their necklace
  chosen_spanish: es su collar
  alternatives_spanish:
  - les cuelga como collar
  - los adorna como collar
  - es un collar para ellos
  lexicon: HALOT
  rationale: La imagen de un adorno para el cuello se expresa de manera más natural en español como ‘collar’. Mantiene el predicado metafórico sin oscurecer que la soberbia se presenta como algo que portan.
- source_word: גַאֲוָה
  english_pob_choice: pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la arrogancia
  - la altivez
  lexicon: HALOT
  rationale: En este contexto el sustantivo tiene carga moral negativa. ‘Soberbia’ comunica mejor esa valoración que el más amplio ‘orgullo’.
- source_word: יַעֲטָף
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - envuelve
  - los viste
  - los rodea
  lexicon: HALOT
  rationale: El verbo expresa envolver o cubrir. ‘Cubre’ conserva la metáfora de vestidura de forma clara y sobria en español.
- source_word: שִׁית
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una ropa
  - como un manto
  - como una vestidura
  lexicon: HALOT
  rationale: El complemento nominal presenta la imagen de una prenda. ‘Vestido’ resulta idiomático y mantiene la metáfora corporal del texto hebreo.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - el agravio
  - la injusticia violenta
  - el abuso
  lexicon: HALOT
  rationale: ‘Violencia’ es la correspondencia más directa y conserva la fuerza ética del término hebreo, que aquí describe una conducta destructiva y opresiva.
- source_word: לָמוֹ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural retoma a los impíos. En español, ‘los’ funciona naturalmente con ‘cubre’ y mantiene la referencia personal del original.
translation_notes:
  revision_awareness: El testigo hebreo y la traducción inglesa concuerdan sustancialmente; se preservó la metáfora de adorno y vestidura, optando por ‘soberbia’ y ‘como un vestido’ para reflejar mejor el tono moral y la imagen poética.
  spanish_consistency_notes:
  - Se mantiene ‘violencia’ para חָמָס, en paralelo con el registro ético del salmo.
  - Se evitó ‘SEÑOR’ porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - La nota alternativa conserva la ambigüedad del hebreo entre ser un collar o adornarse como collar.
