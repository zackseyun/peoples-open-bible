translation:
  language: es
  text: 'Entonces Dalila dijo a Sansón[a]: «Mira, te has burlado de mí y me has dicho mentiras. Ahora, por favor, dime con qué podrías ser atado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me has hecho quedar como tonta»; el verbo hebreo puede expresar burla o trato engañoso mediante engaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC/HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica secuencia de manera natural en español sin perder el valor discursivo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  lexicon: HALOT
  rationale: Es un llamado de atención inmediato previo a la acusación. «Mira» conserva la fuerza deíctica y suena natural en español contemporáneo.
- source_word: הֵתַלְתָּ בִּי
  english_pob_choice: you have mocked me
  chosen_spanish: te has burlado de mí
  alternatives_spanish:
  - te has mofado de mí
  - me has hecho un tonto
  lexicon: HALOT
  rationale: El verbo puede implicar burla o trato engañoso. «Burlarte de mí» mantiene el matiz de menosprecio y engaño sin cargarlo demasiado hacia una sola lectura.
- source_word: וַתְּדַבֵּר אֵלַי כְּזָבִים
  english_pob_choice: and spoken lies to me
  chosen_spanish: me has hablado mentiras
  alternatives_spanish:
  - me has dicho mentiras
  - has hablado mentiras contra mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente que le habló mentiras. «Me has hablado mentiras» conserva la estructura verbal y el plural de כזָבִים, aunque en español sea una formulación algo marcada.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Así que ahora
  lexicon: HALOT
  rationale: Marca el paso de la acusación a la petición; «Ahora» es directo y fiel.
- source_word: הַגִּידָה נָּא לִי
  english_pob_choice: please tell me
  chosen_spanish: por favor, dime
  alternatives_spanish:
  - te ruego, dime
  - dime, por favor
  lexicon: HALOT
  rationale: El imperativo con נָא expresa ruego, no orden. «Por favor» preserva ese tono en español de manera natural.
- source_word: בַּמֶּה תֵּאָסֵר
  english_pob_choice: what you may be bound with
  chosen_spanish: con qué podrías ser atado
  alternatives_spanish:
  - con qué serás atado
  - por qué medio podrías ser atado
  lexicon: HALOT
  rationale: La construcción interrogativa es instrumental («con qué»). El nifal de אסר pide una forma pasiva en español; «podrías ser atado» refleja la posibilidad contextual del enunciado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene el valor narrativo y el matiz de burla/engaño documentado en el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió «Sansón» como forma española estable del nombre propio.
  - Se mantuvo «mentiras» en plural para reflejar כְּזָבִים.
  - Se usó el tratamiento de segunda persona singular coherente con el texto hebreo.
  - No se introdujo «Cristo» ni terminología doctrinal ajena al pasaje.
