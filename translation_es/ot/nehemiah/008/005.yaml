review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Esdras abre el libro ante el pueblo, la cláusula causal expresa su elevación física sobre ellos, y la reacción del pueblo ocurre al abrirlo. También preserva la nota léxica sobre סֵפֶר como alternativa ''rollo''.'
  spanish_quality_summary: El español es claro y natural, pero hay dos ajustes preferibles. Primero, 'todo el pueblo se puso de pie' discorda en número con el sujeto colectivo repetido y suena menos directo que 'todo el pueblo se puso en pie' o 'todos se pusieron de pie'; además, el hebreo simplemente dice 'estuvieron/se pusieron de pie'. Segundo, en registro bíblico digno, 'se puso en pie' encaja mejor que 'se puso de pie' para este sujeto colectivo. El resto del texto es fluido y fiel.
  glossary_alignment: No hay términos del glosario mayor en conflicto. 'Esdras', 'libro', 'pueblo' y la nota sobre 'rollo' están alineados con la evidencia y el rastro auditado. La decisión 'por encima de todo el pueblo' conserva correctamente el sentido físico de מֵעַל.
  issues:
  - severity: medium
    issue: La frase final 'todo el pueblo se puso de pie' es mejorable en naturalidad y concordancia estilística con el sujeto colectivo.
    rationale: Aunque comprensible, con 'todo el pueblo' el giro 'se puso de pie' suena menos idiomático en este registro que 'se puso en pie'. Además, el hebreo עָמְדוּ se traduce más directamente con 'se puso en pie' o 'estuvo de pie' para el colectivo.
  - severity: low
    issue: La puntuación alrededor de 'y, cuando lo abrió' puede simplificarse.
    rationale: La coma tras 'y' no es necesaria en español y una puntuación más limpia mejora la lectura sin cambiar el sentido.
  revised_spanish_text: Esdras abrió el libro[a] a la vista de todo el pueblo, porque estaba por encima de todo el pueblo; y cuando lo abrió, todo el pueblo se puso en pie.
  revised_footnotes:
  - marker: a
    text: O 'el rollo'. El hebreo סֵפֶר puede referirse a un documento escrito en forma de rollo.
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción base por su fidelidad al hebreo y al rastro auditado, pero se ajusta la cláusula final a un español más natural y digno para un sujeto colectivo ('se puso en pie') y se simplifica la puntuación. No se requieren cambios doctrinales ni léxicos mayores.
