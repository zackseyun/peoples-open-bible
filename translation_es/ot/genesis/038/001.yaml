review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: marco temporal, descenso de Judá, separación de sus hermanos, desvío hacia un adulamita y mención del nombre Hirá. Sin embargo, «hasta un adulamita» no representa bien עַד en este contexto con persona; en español suena impropio y puede sugerir límite espacial más que movimiento hacia una persona. Además, la nota [a] está anclada en «un» pero su contenido corresponde a la fórmula inicial וַיְהִי בָּעֵת הַהִוא, por lo que el anclaje es incorrecto.'
  spanish_quality_summary: El texto es mayormente claro y legible, pero «se apartó hasta un adulamita» resulta poco natural. Una formulación como «se desvió hacia un adulamita» o «se apartó hacia un adulamita» comunica mejor la idea narrativa. También conviene mover la nota al inicio temporal, donde realmente aplica la alternativa formal.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Judá» y «Hirá» son aceptables. La decisión «de entre sus hermanos» es defendible como matiz de separación. La principal corrección es idiomática y de anclaje de nota, no de glosario del proyecto.
  issues:
  - severity: medium
    issue: «hasta un adulamita» es una traducción poco idiomática de עַד con persona en este contexto.
    rationale: Aunque עַד puede significar movimiento hacia alguien, en español «hasta» ante persona aquí suena forzado y menos fiel al sentido narrativo de dirigirse/desviarse hacia esa persona. «Hacia» o simplemente «a» funciona mejor.
  - severity: medium
    issue: La nota [a] está colocada en «un» pero explica la frase inicial «En ese tiempo».
    rationale: El marcador debe aparecer exactamente en la palabra o frase relevante. Tal como está, induce a pensar que la variante afecta «un adulamita», cuando en realidad corresponde a וַיְהִי בָּעֵת הַהִוא.
  - severity: low
    issue: «se apartó» puede entenderse como mera separación, no necesariamente como desviarse en dirección a alguien.
    rationale: El hebreo וַיֵּט aquí expresa desviarse o volverse hacia. «Se desvió» representa con más precisión el movimiento direccional antes de «hacia un adulamita».
  revised_spanish_text: En ese tiempo[a], Judá bajó de entre sus hermanos y se desvió hacia un adulamita, cuyo nombre era Hirá.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Y sucedió en ese tiempo».'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión no idiomática «hasta un adulamita» por «hacia un adulamita», se ajusta «se apartó» a «se desvió» para reflejar mejor וַיֵּט, y se reubica la nota [a] al segmento temporal al que realmente corresponde. No se requiere adjudicación adicional porque el sentido del hebreo y la mejora en español son claros.
