translation:
  language: es
  text: 'El rey respondió a Daniel y dijo: «En verdad, tu Dios es Dios de dioses y Señor de reyes, y revelador de misterios[a], porque tú pudiste revelar este misterio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revelador de secretos». El término arameo puede denotar asuntos ocultos en general, pero «misterios» conserva mejor el vocabulario recurrente de Daniel sobre la revelación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered ... and said
  chosen_spanish: respondió ... y dijo
  alternatives_spanish:
  - respondió
  - contestó ... y dijo
  lexicon: HALOT
  rationale: La fórmula narrativa aramea se conserva con dos verbos en español sin volverla pesada. «Respondió ... y dijo» transmite el doble movimiento del original mejor que simplificar a un solo verbo.
- source_word: מִן קְשֹׁט
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - Ciertamente
  - De veras
  lexicon: HALOT
  rationale: La expresión idiomática intensifica la afirmación. «En verdad» es natural, solemne y mantiene el énfasis sin sonar mecánico.
- source_word: אֱלָהֲכוֹן
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu dios
  lexicon: HALOT
  rationale: El referente es el Dios de Daniel; en español conviene singularizar el poseedor como segunda persona directa. Se usa mayúscula por el contexto confesional del hablante en la cláusula siguiente.
- source_word: אֱלָהּ אֱלָהִין
  english_pob_choice: God of gods
  chosen_spanish: Dios de dioses
  alternatives_spanish:
  - dios de dioses
  - Dios sobre todos los dioses
  lexicon: HALOT
  rationale: Se conserva la construcción superlativa del arameo. «Dios de dioses» mantiene la fuerza de supremacía sin explicar más de lo que el texto dice.
- source_word: וּמָרֵא מַלְכִין
  english_pob_choice: and Lord of kings
  chosen_spanish: y Señor de reyes
  alternatives_spanish:
  - y señor de reyes
  - y dueño de reyes
  lexicon: HALOT
  rationale: «Señor» reproduce la dignidad titulárica del arameo y encaja en el registro bíblico español. «De reyes» preserva la relación de dominio sin añadir interpretación.
- source_word: וְגָלֵה רָזִין
  english_pob_choice: and a revealer of mysteries
  chosen_spanish: y revelador de misterios
  alternatives_spanish:
  - y el que revela misterios
  - y revelador de secretos
  lexicon: HALOT
  rationale: El participio se vierte como título predicativo. «Misterios» sigue el vocabulario característico de Daniel y conserva el valor técnico de רָזִין mejor que «secretos».
- source_word: רָזִין
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  lexicon: HALOT
  rationale: En Daniel, el término alude a realidades ocultas reveladas por Dios. «Misterios» preserva esa resonancia intertextual y temática.
- source_word: דִּי יְכֵלְתָּ
  english_pob_choice: because you were able
  chosen_spanish: porque tú pudiste
  alternatives_spanish:
  - porque pudiste
  - ya que pudiste
  - pues pudiste
  lexicon: HALOT
  rationale: La causalidad del arameo se expresa con «porque». El pretérito «pudiste» refleja la capacidad concreta mostrada por Daniel.
- source_word: לְמִגְלֵא רָזָה דְנָה
  english_pob_choice: to reveal this mystery
  chosen_spanish: revelar este misterio
  alternatives_spanish:
  - descubrir este misterio
  - revelar este secreto
  lexicon: HALOT
  rationale: Se mantiene la coherencia léxica con גלה mediante «revelar». «Este misterio» señala el caso concreto de la visión e interpretación sin ampliar el sentido.
theological_decisions:
- issue: Alcance de la confesión del rey sobre el Dios de Daniel
  english_pob_reading: An exalted acknowledgment of Daniel's God as supreme—'your God is God of gods and Lord of kings'—without adding language implying exclusive worship or settled conversion.
  chosen_spanish_reading: 'Una confesión exaltada de la supremacía del Dios de Daniel: «tu Dios es Dios de dioses y Señor de reyes», sin afirmar conversión plena ni adoración exclusiva.'
  alternative_spanish_readings:
  - 'Una formulación más fuerte: «tu Dios es el único Dios»'
  - Una formulación más débil que reduzca el peso de los superlativos
  rationale: El arameo expresa reconocimiento genuino de supremacía con títulos superlativos, pero no dice explícitamente que Nabucodonosor haya abandonado a los demás dioses. El español conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión corrige la anotación de nota al pie asegurando que el marcador [a] aparezca en el texto español exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula en el discurso confesional del rey y «Señor» para מָרֵא, conforme al registro bíblico de títulos.
  - Se conserva «misterio(s)» para רָז / רָזִין por consistencia con Daniel y para no diluir el matiz técnico de revelación divina.
  - No se introduce una lectura de conversión completa de Nabucodonosor; el texto sigue siendo una confesión de supremacía, no una explicación doctrinal adicional.
