base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/004/049.yaml
  text: And he wrote to all the Jews who were going up from the kingdom to Judea concerning freedom[a], that no official or satrap or toparch or steward should come to their doors[c][b],
  footnotes:
  - marker: a
    text: Or 'every authority' or 'every powerful man'; the Greek phrase πάντα δυνατὸν is difficult and may refer generally to anyone holding power.
    reason: lexical_alternative
  - marker: b
    text: '''Toparch'' refers to a local district ruler; alternatively, ''local governor.'''
    reason: cultural_note
  - marker: c
    text: The clause 'should not come against their doors' likely means they were not to intrude on them or press claims against them at their homes.
    reason: lexical_alternative
