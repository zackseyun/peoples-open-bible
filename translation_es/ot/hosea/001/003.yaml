translation:
  language: es
  text: Entonces fue y tomó a Gomer, hija de Diblaim[a], y ella concibió y le dio un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se casó con Gomer» / «tomó a Gomer como esposa». El hebreo dice literalmente «tomó», y el sentido matrimonial lo aporta el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Así que fue
  alternatives_spanish:
  - Entonces fue
  - Y fue
  lexicon: HALOT
  rationale: El wayyiqtol avanza la secuencia narrativa. «Así que fue» conserva el valor consecutivo y suena natural en español sin perder la progresión del hebreo.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - tomó como esposa
  lexicon: HALOT
  rationale: לקח significa literalmente «tomar». Aunque el contexto matrimonial es claro por el versículo anterior, «tomó» preserva la forma verbal del hebreo y evita ampliar más de lo que esta cláusula dice explícitamente.
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  alternatives_spanish:
  - Gómer
  lexicon: transliteration
  rationale: Se mantiene el nombre propio transliterado de manera sobria y reconocible. La forma «Gomer» es clara en español bíblico y evita añadir una vocalización no requerida por el texto.
- source_word: בַּת דִּבְלָיִם
  english_pob_choice: daughter of Diblaim
  chosen_spanish: hija de Diblaim
  alternatives_spanish:
  - la hija de Diblaim
  lexicon: HALOT
  rationale: בת con nombre propio funciona como expresión patronímica. «Hija de Diblaim» reproduce directamente la relación filial del hebreo sin convertirla en explicación interpretativa.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: HALOT
  rationale: הרה denota concebir/embarazarse. «Concibió» es la formulación bíblica más directa y encaja con la fórmula narrativa de nacimiento.
- source_word: וַתֵּלֶד
  english_pob_choice: and bore
  chosen_spanish: y le dio a luz
  alternatives_spanish:
  - y dio a luz
  lexicon: HALOT
  rationale: ילד aquí expresa el acto de dar a luz. «Le dio a luz» conserva el sentido relacional del hebreo con לוֹ, y en español comunica con claridad el nacimiento del hijo.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal ל + sufijo se expresa naturalmente en español con el clítico indirecto «le», que transmite la relación personal del nacimiento sin pesadez.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: בן designa un hijo varón. «Un hijo» es natural y reverente en español; el contexto ya especifica que se trata de un varón sin necesidad de forzar una paráfrasis.
theological_decisions:
- issue: Si hacer explícito el sentido matrimonial de וַיִּקַּח
  english_pob_reading: Retain the more literal 'took' rather than expanding to 'married' or 'took as wife.'
  chosen_spanish_reading: Conservar «tomó» en vez de expandir a «se casó con» o «tomó como esposa».
  alternative_spanish_readings:
  - se casó con
  - tomó como esposa
  rationale: El verbo puede tener fuerza matrimonial en contexto, pero el texto de este versículo no añade explícitamente «como esposa». Dado que el versículo anterior ya dio la orden de tomar mujer, la versión española debe mantener la literalidad del verbo y no introducir una explicitación que el hebreo aquí no formula.
  doctrine_reference: Primacía del texto original; evitar paráfrasis más allá de lo que el versículo autoriza.
translation_notes:
  revision_awareness: El control de revisión inglés quedó sin cambios respecto al estado más reciente; la presente redacción española sigue ese mismo valor estable, preservando la literalidad del verbo central y la lectura narrativa de la secuencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - Se conserva un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - El dativo hebreo לוֹ se resuelve con «le», por ser la equivalencia más natural en español.
  - La nota [a] se ancla únicamente en el verbo «tomó», donde existe la alternativa interpretativa documentada.
