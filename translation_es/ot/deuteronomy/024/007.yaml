review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca el rastro auditado en inglés: mantiene la estructura legal condicional, expresa claramente el secuestro de una persona israelita, conserva «hermanos» con aclaración nacional, traduce con fuerza la reducción a esclavitud, y cierra con la fórmula deuteronómica de extirpar el mal. La principal mejora necesaria es estilística y de fidelidad al registro jurídico: en español suena más natural y preciso «Si se halla» que «Si se encuentra a», y conviene fortalecer la fórmula final con «purgarás» para conservar mejor la fuerza judicial de ובערת.'
  spanish_quality_summary: El texto es generalmente claro y legible en español eclesial moderno. Sin embargo, «Si se encuentra a un hombre secuestrando» resulta algo pesado y menos idiomático en registro legal; «Si se halla a un hombre que secuestra» fluye mejor. Además, «Así quitarás el mal» es comprensible, pero «purgarás el mal» representa mejor la fórmula fija de Deuteronomio y su tono jurídico-covenantal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Esclaviza» es una buena elección y preserva la dureza del acto. «Hermanos» y «hijos de Israel» siguen el razonamiento teológico documentado. No aparecen términos con políticas especiales como Yahvé/Mesías que requieran ajuste.
  issues:
  - severity: medium
    issue: 'Construcción inicial poco natural: «Si se encuentra a un hombre secuestrando...»'
    rationale: Aunque comprensible, esta estructura suena torpe en español jurídico y narrativo. El hebreo legal ימצא איש se vierte más naturalmente como «Si se halla a un hombre que secuestra...» o similar.
  - severity: medium
    issue: La fórmula final «quitarás el mal» debilita la recurrencia deuteronómica
    rationale: ובערת הרע מקרבך es una fórmula judicial estable. «Purgarás el mal de en medio de ti» conserva mejor la fuerza idiomática y el eco intertextual que «quitarás el mal».
  revised_spanish_text: Si se halla a un hombre que secuestra[a] a uno de sus hermanos[b] de entre los hijos de Israel, y lo esclaviza[c] y lo vende, entonces morirá ese secuestrador. Así purgarás el mal de en medio de ti.
  revised_footnotes:
  - marker: a
    text: O «raptando a una persona»; literalmente, «robando un alma/persona».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a miembros del pueblo de Israel, no sólo a hermanos biológicos.
    reason: cultural_note
  - marker: c
    text: O «lo hace esclavo».
    reason: lexical_alternative
  revision_rationale: Se ajustó la apertura para que el español suene natural y legalmente claro sin perder el valor pasivo-condicional del hebreo. También se reforzó la fórmula final con «purgarás», que representa mejor la expresión deuteronómica recurrente y su fuerza judicial. El resto del versículo y las notas se conservan porque reflejan fielmente el sentido fuente y el audit trail inglés.
