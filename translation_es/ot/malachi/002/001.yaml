translation:
  language: es
  text: Y ahora, este mandamiento es para ustedes[a], sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ustedes, sacerdotes». La preposición hebrea puede verterse más literalmente como «a», pero «para ustedes» comunica mejor en español que el mandamiento va dirigido específicamente a ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: HALOT
  rationale: Conserva tanto el valor conjuntivo de וְ como el giro discursivo de עַתָּה al introducir una transición directa desde la reprensión anterior.
- source_word: אֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: HALOT
  rationale: La preposición admite sentido direccional 'a'/'hacia', pero en español 'para ustedes' comunica mejor que el mandamiento está destinado específicamente a los sacerdotes.
- source_word: הַמִּצְוָה
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - orden
  lexicon: HALOT
  rationale: En contexto profético-jurídico, מִצְוָה expresa una orden vinculante. 'Mandamiento' mantiene ese peso normativo sin volverlo demasiado técnico.
- source_word: הַזֹּאת
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  - este mismo
  lexicon: HALOT
  rationale: El demostrativo concuerda con 'mandamiento' en español y reproduce la deixis simple del hebreo.
- source_word: הַכֹּהֲנִים
  english_pob_choice: O priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - oh sacerdotes
  - sacerdotes, ustedes
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo. En español, el vocativo puede quedar implícito por la coma y el contexto; 'sacerdotes' mantiene la forma natural y solemne sin forzar 'oh'.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: mantiene la transición discursiva, el carácter directivo del mandamiento y el vocativo implícito para los sacerdotes, sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se preservó Yahvé solo cuando aparece el Tetragrámaton; aquí no aplica.
  - Se evitó el calco «a ustedes» en el cuerpo principal porque en español suena menos idiomático que «para ustedes» en esta construcción.
  - «Mandamiento» se escogió por su fuerza normativa y por cercanía al valor de מִצְוָה en un contexto de reproche profético.
