    ⲛⲧⲁⲣⲓⲕⲉ ⲁⲩⲱ ⲙⲡⲣⲥⲁϩⲟⲩ ⲙⲡⲁϣⲟⲩϣⲟⲩ`, which translates to ''and do not despise my fault,
    and do not curse my boasting.'' The draft hallucinated ''assembly of violence''
    by misreading `ⲥⲁϩⲟⲩ` (curse) as `ⲥⲱⲟⲩϩ` (assembly) and `ϣⲟⲩϣⲟⲩ` (boasting) as
    violence. The proposed rewrite is accurate, but I have modified it slightly to
    reflect the repeated `ⲁⲩⲱ ⲙⲡⲣ-` (''and do not'') str'
