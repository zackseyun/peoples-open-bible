revisions:
- from: Y puso sobre él la túnica[a], y lo ciñó con el cinturón, y lo vistió con el manto, y puso sobre él el efod, y lo ciñó con el tejido[b] del efod, y lo ajustó a él con él.
  to: Y le puso la túnica, y lo ciñó con la faja, y lo vistió con el manto, y le puso el efod, y lo ciñó con la banda[a] del efod, y se lo sujetó con ella[b].
  rationale: Se corrigió la colocación de las notas para que correspondan al término correcto. Se reemplazó «tejido» por «banda» para reflejar mejor la función de חֵשֶׁב en las vestiduras sacerdotales. Se rehízo la cláusula final como «y se lo sujetó con ella» para conservar el sentido de asegurar el efod mediante su banda, en español natural y fiel al audit trail. También se ajustó «puso sobre él» a «le puso», que es más idiomático en español, y «cinturón» a «faja» por mayor precisión cultual.
