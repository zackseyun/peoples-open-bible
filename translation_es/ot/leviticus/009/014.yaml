translation:
  language: es
  text: Lavó las entrañas[a] y las patas inferiores, y las quemó sobre el altar, encima del holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “las vísceras”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְחַץ
  english_pob_choice: he washed
  chosen_spanish: lavó
  alternatives_spanish:
  - lavó con agua
  - enjuagó
  lexicon: HALOT
  rationale: רחץ en contexto sacrificial se refiere a lavar con agua. "Lavó" es natural, claro y fiel al acto ritual descrito.
- source_word: הַקֶּרֶב
  english_pob_choice: the entrails
  chosen_spanish: los intestinos
  alternatives_spanish:
  - las entrañas
  - las vísceras
  lexicon: HALOT
  rationale: En este contexto cultual, קֶרֶב apunta a las partes internas del animal. "Intestinos" comunica de forma concreta la referencia anatómica; "entrañas" y "vísceras" también son posibles, pero pueden sonar más amplias o más literarias.
- source_word: הַכְּרָעָיִם
  english_pob_choice: the lower legs
  chosen_spanish: las patas
  alternatives_spanish:
  - las piernas
  - los muslos inferiores
  - las patas inferiores
  lexicon: HALOT
  rationale: כְּרָעַיִם designa las patas/piernas del animal, con énfasis en la parte inferior. "Patas" es breve y comprensible en español para un animal sacrificial; se conserva la referencia anatómica sin forzar una expresión demasiado técnica.
- source_word: וַיַּקְטֵר
  english_pob_choice: he burned
  chosen_spanish: los quemó
  alternatives_spanish:
  - los ofreció en humo
  - los hizo subir en humo
  lexicon: HALOT
  rationale: En el lenguaje sacerdotal, קטר describe la acción ritual de hacer arder la ofrenda sobre el altar. La revisión inglesa optó por "burned" para mayor naturalidad; en español, "los quemó" mantiene esa decisión sin perder el sentido cultual en este contexto.
- source_word: עַל
  english_pob_choice: on top of
  chosen_spanish: encima de
  alternatives_spanish:
  - sobre
  - sobre la parte superior de
  lexicon: HALOT
  rationale: Aquí עַל indica colocación sobre algo ya puesto en el altar. "Encima de" expresa mejor esa superposición que un simple "sobre".
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio completamente consumido por fuego. "Holocausto" es el término tradicional y preciso en español bíblico para esta ofrenda; se conserva por claridad terminológica.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ significa de manera directa "altar". El sufijo direccional no requiere un marcado especial en español aquí.
theological_decisions:
- issue: Relación entre la parte quemada y el holocausto ya colocado sobre el altar
  english_pob_reading: on top of the burnt offering
  chosen_spanish_reading: encima del holocausto
  alternative_spanish_readings:
  - sobre el holocausto
  - sobre la ofrenda quemada
  rationale: El hebreo indica que las partes internas y las patas se colocan sobre la ofrenda ya presente en el altar. "Encima de" conserva la relación espacial y ritual sin suavizarla.
  doctrine_reference: Levítico 9:14; cf. instrucciones sacrificiales de Levítico 1
- issue: Valor ritual de וַיַּקְטֵר
  english_pob_reading: he burned them
  chosen_spanish_reading: los quemó
  alternative_spanish_readings:
  - los ofreció en humo
  - los hizo arder
  rationale: Aunque קטר puede implicar "hacer subir en humo", la revisión inglesa del audit trail eligió "burned" para una forma más natural. El español sigue esa elección, preservando el matiz sacrificial por el contexto del altar y del holocausto.
  doctrine_reference: Levítico 9:14; uso sacerdotal de קטר
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde una formulación más literal (“turned them into smoke”) a “burned them” por naturalidad formal. La presente redacción española sigue esa revisión, evitando una paráfrasis excesiva y conservando la secuencia ritual: lavar, quemar, colocar sobre el altar encima del holocausto.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando el Tetragrámaton aparezca; en este versículo no aparece.
  - Se usa "holocausto" para עֹלָה por consistencia con la terminología sacrificial estable.
  - Se evita "siervo"/"esclavo" porque no aplican a este verso.
  - '"Los intestinos" refleja el конкретo anatómico de הַקֶּרֶב en contexto sacrificial; si el lector prefiere un registro más tradicional, la nota ofrece alternativas.'
