base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/001/001.yaml
  text: And it happened[a], after Alexander the Macedonian, the son of Philip, who had come out from the land of Kittim, struck down Darius king of the Persians and Medes, that he reigned in his place[b], having first reigned over Greece.
  footnotes:
  - marker: a
    text: Kittim is a traditional biblical place-name. It can refer more specifically to Cyprus or, more broadly, western lands depending on context.
    reason: cultural_note
  - marker: b
    text: Or 'defeated Darius.' The Greek verb literally means 'struck down.'
    reason: lexical_alternative
