  text: IV. *¹Ἦν δὲ ὁ πατήρ μου ἐρωτῶν¹ ⌈περὶ ἐμοῦ⌉² *ὅτι ἑώρακέ με σκυθρωπόν³, καὶ⁴ ἔλεγον αὐτῷ⁵ *ὅτι τὰ ἤπατά μου ὀγκοῦμαι⁶. 2. Ἐπένθουν γὰρ *παρὰ πάντας⁷ ὅτι ἐγὼ ἤμην⁸ αἴτιος *τῆς πράσεως⁹ Ἰωσήφ. 3. *Καὶ ὅτε¹⁰ κατέβημεν εἰς Αἴγυπτον, καὶ¹¹ ἔδησέ¹² με¹³ ὡς κατάσκοπον¹⁴, ἔγνων ὅτι δικαίως πάσχω¹⁵ καὶ οὐκ ἐλυπούμην¹⁶. 4. Ἰωσὴφ δὲ¹⁷ ἦν *ἀγαθὸς ἀνήρ¹⁸, καὶ¹⁹ ἔχων²⁰ πνεῦμα θεοῦ *ἐν αὐτῷ²¹, εὔσπλαγχνος καὶ ἐλεήμων ὑπάρχων²² οὐκ²³ ἐμνησικάκησέν με²⁴, ἀλλὰ²⁵ ἠγάπησέ με *σὺν τοῖς ἀδελφοῖς μου²⁶. 5. Φυλάξασθε οὖν ὑμεῖς²⁷, τέκνα²⁸ μου, ἀπὸ²⁹ παντὸς ζήλου καὶ φθόνου³⁰ καὶ πορεύεσθε ἐν *ἁπλότητι καρδίας³¹, ἵνα δῷ³⁴ Γκαὶ ὑμῖν⁷³⁵ ὁ Θεὸς χάριν καὶ δόξαν καὶ εὐλογίαν *ἐπὶ τὰς κεφαλὰς ὑμῶν³⁶, καθὼς³⁷ ἴδετε³⁸ *ἐν Ἰωσήφ³⁹. 6. Πάσας⁴⁰ τὰς ἡμέρας⁴¹ οὐκ⁴² ὠνείδισεν ἡμᾶς⁴³ *περὶ τοῦ πράγματος τούτου⁴⁴, ἀλλ᾿⁴⁵ ἠγάπησεν ἡμᾶς ὡς τὴν *ψυχὴν αὐτοῦ⁴⁶ καὶ ὑπὲρ τοὺς υἱοὺς αὐτοῦ⁴⁷ ἐδόξασεν⁴⁸ ἡμᾶς, καὶ⁴⁹ *πλοῦτον καὶ κτήνη καὶ καρπὸν⁵⁰ *ἐχαρίσατο ἡμῖν⁵¹. 7. *Καὶ ὑμεῖς⁵², τέκνα μου⁵³, ἀγαπήσατε⁵⁴ ἕκαστος τὸν ἀδελφὸν⁵⁵ αὐτοῦ⁵⁶ ἐν ἀγαθῇ καρδίᾳ, καὶ *ἀποστήσεται ἀφ᾽ ὑμῶν τὸ πνεῦμα τοῦ φθόνου⁵⁷. 8. Ὅτι⁵⁸ ἀγριοῖ τοῦτο⁵⁹ τὴν ψυχήν⁶⁰, καὶ φθείρει *τὸ σῶμα⁶¹, *ὀργὴν καὶ πόλεμον παρέχει τῷ διαβουλίῳ⁶², καὶ εἰς⁶³ αἵματα⁶⁴ παροξύνει, καὶ εἰς ἔκστασιν ἄγει⁶⁵ *τὴν διάνοιαν⁶⁶, καὶ κλόνον⁶⁹ παρέχει τῇ ψυχῇ⁷⁰ καὶ τρόμον τῷ σώματι. 9. *Ὅτι καὶ⁷¹ ἐν ὕπνῳ *τις ζῆλος⁷² κακίας αὐτὸν⁷³ φαντάζουσα⁷⁴ κατεσθίει⁷⁵ καὶ⁷⁶ πνεύμασι πονηροῖς⁷⁷ διαταράσσει⁷⁸ τὴν ψυχὴν αὐτοῦ, καὶ ἐκθροεῖσθαι τὸ σῶμα ποιεῖ, καὶ ἐν ταραχῇ διυπνίζει⁷⁹ τὸν νοῦν, καὶ ὡς⁸⁰ πνεῦμα πονηρὸν *καὶ ἰοβόλον⁸¹, *οὕτως φαίνεται⁸² τοῖς ἀνθρώποις⁸³.
