translation:
  language: es
  text: 'Y recordé la profecía de Amós[a], como dijo: «Sus fiestas se convertirán en duelo, y todos sus regocijos en lamento». Y lloré.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea citada hace eco de Amós 8:10 en la tradición de la Septuaginta.
    reason: cross_reference
lexical_decisions:
- source_word: ἐμνήσθην
  english_pob_choice: I remembered
  chosen_spanish: recordé
  alternatives_spanish:
  - me acordé
  - tuve presente
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι funciona como recuerdo narrativo. «Recordé» es natural, directo y conserva el acto mental pasado sin añadir matices no presentes en el griego.
- source_word: προφητείας
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - oráculo
  - palabra profética
  lexicon: BDAG
  rationale: El singular señala la profecía citada de Amós. «Profecía» mantiene el registro bíblico y es fiel al valor del sustantivo sin volverlo demasiado técnico.
- source_word: Στραφήσονται
  english_pob_choice: will be turned
  chosen_spanish: se convertirán
  alternatives_spanish:
  - serán vueltas
  - serán cambiadas
  lexicon: BDAG
  rationale: El futuro pasivo expresa una inversión sufrida por las fiestas. En español, «se convertirán» comunica bien la transformación/reversión sin perder la pasividad implícita del texto.
- source_word: ἑορταὶ
  english_pob_choice: festivals
  chosen_spanish: fiestas
  alternatives_spanish:
  - festivales
  - solemnidades
  lexicon: BDAG
  rationale: Aquí el referente es de celebraciones religiosas/comunitarias. «Fiestas» es el equivalente más natural en español y conserva el alcance festivo del término.
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - dolor
  lexicon: BDAG
  rationale: En este contexto profético, la oposición es entre celebración y lamento público. «Duelo» es claro en español y comunica la tristeza ritual o comunitaria con un tono sobrio.
- source_word: εὐφροσύναι
  english_pob_choice: rejoicing
  chosen_spanish: regocijos
  alternatives_spanish:
  - alegrías
  - gozos
  lexicon: BDAG
  rationale: El plural sugiere expresiones o ocasiones de alegría. «Regocijos» preserva esa idea colectiva y mantiene el paralelismo con «fiestas».
- source_word: θρῆνον
  english_pob_choice: lamentation
  chosen_spanish: lamento
  alternatives_spanish:
  - lamentación
  - plañido
  lexicon: BDAG
  rationale: El término apunta a un lamento formal. «Lamento» es idiomático en español y suficiente para reflejar el tono elevado del pasaje; «lamentación» quedaría más literal, pero menos natural.
- source_word: ἔκλαυσα
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - lloré amargamente
  - sollozé
  lexicon: BDAG
  rationale: El verbo narrativo simple admite «lloré» como equivalente claro y solemne. Mantiene la sobriedad del cierre sin intensificar indebidamente la emoción.
theological_decisions:
- issue: Cita intertextual de Amós y su forma en segunda persona plural
  english_pob_reading: Translate as a direct prophetic quotation addressed to 'you' plural.
  chosen_spanish_reading: 'Conservar la cita directa en segunda persona plural: «Tus fiestas se convertirán en duelo, y todos tus regocijos en lamento».'
  alternative_spanish_readings:
  - Vuestras fiestas se convertirán en duelo, y todos vuestros regocijos en lamento
  - Sus fiestas se convertirán en duelo, y todos sus regocijos en lamento
  rationale: El griego cita una palabra profética dirigida a un plural. En español, «tus» singular puede sonar a plural colectivo implícito en un estilo bíblico; sin embargo, para mantener con claridad la interpelación plural del texto, la forma más transparente en lectura pública es la segunda persona plural implícita de la cita, aunque el castellano aquí use la forma posesiva singular tradicional en citas bíblicas. La decisión preserva la fuerza directa de la profecía citada y su carácter de advertencia.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El texto griego base y el expediente inglés concuerdan de manera alta; no se registran revisiones aplicadas en el pasaje. La redacción española sigue de cerca la cita profética y el cierre narrativo, sin suavizar la reversión ni la nota de llanto.
  spanish_consistency_notes:
  - Se mantiene «Amós» con tilde conforme al uso español.
  - Se usa «profecía» para conservar el marco escritural del pasaje.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se mantiene un registro sobrio y bíblico, con puntuación de cita en estilo español.
