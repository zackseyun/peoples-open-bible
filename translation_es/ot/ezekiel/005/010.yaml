review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: consecuencia (''Por eso''), canibalismo recíproco entre generaciones, juicio divino y dispersión total del remanente. También conserva adecuadamente ''remanente'' y la imagen idiomática de ''viento''. Sin embargo, hay dos desajustes menores con el expediente inglés: las notas están invertidas respecto de los anclajes y la nota sobre ''a todo viento'' debería ir en esa frase, no sobre ''remanente''.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse. 'Padres' pierde la especificidad masculina de אָבוֹת; 'sus padres' suena natural, pero en la primera cláusula conviene 'los hijos' para reflejar mejor 'sons' sin sobreinterpretar. 'En medio de ti' funciona bien. 'A todo viento' es inteligible en registro bíblico, aunque requiere la nota idiomática correspondiente.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Juicios' para שְׁפָטִים y 'remanente' para שְׁאֵרִית están bien justificados. No aparecen términos sensibles del glosario principal como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a los mismos puntos semánticos que en el expediente inglés.
    rationale: En el POB inglés, la nota de alternativa léxica pertenece a 'all your remnant' y la nota cultural/idiomática pertenece a 'to every wind'. En el borrador español, [a] está anclada en 'en medio de ti' y [b] en 'remanente', dejando sin nota el modismo 'a todo viento'.
  - severity: low
    issue: '''Padres'' en la primera cláusula suaviza la especificidad de ''fathers''.'
    rationale: El hebreo אָבוֹת nombra específicamente a los padres varones. En español, 'padres' puede entenderse como progenitores en general. 'Padres' sigue siendo posible, pero 'los padres' ayuda un poco; aun así, la mayor mejora de fidelidad está en 'los hijos' para el paralelismo con בָנִים.
  - severity: low
    issue: La nota actual sobre 'en medio de ti' es innecesaria frente a la evidencia auditada.
    rationale: La expresión ya es natural y fiel; el expediente inglés no preserva aquí nota alguna. Mantenerla desplaza una nota más importante sobre el modismo 'a todo viento'.
  revised_spanish_text: Por eso, los padres comerán a los hijos en medio de ti, y los hijos comerán a sus padres; y yo ejecutaré juicios sobre ti y esparciré a todo tu remanente[a] a todo viento[b].
  revised_footnotes:
  - marker: a
    text: 'O: ''todo lo que te quede'' o ''todos tus sobrevivientes''. ''Remanente'' preserva el término hebreo שְׁאֵרִית en un contexto de juicio.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'a todo viento', un modismo que significa dispersión total en todas direcciones.
    reason: cultural_note
  revision_rationale: 'La revisión corrige el anclaje de las notas para que sigan el expediente inglés y la lógica del texto: ''remanente'' recibe la nota de alternativa léxica y ''a todo viento'' la nota idiomática. Además, se ajusta levemente la redacción a ''los padres / los hijos'' para reforzar el paralelismo y la especificidad familiar del hebreo, manteniendo un español natural y eclesialmente legible.'
