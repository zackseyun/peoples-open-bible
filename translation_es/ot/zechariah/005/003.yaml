base_translation:
  language: en
  yaml_path: translation/ot/zechariah/005/003.yaml
  text: Then he said to me[a], “This is the curse that goes out over the face of the whole land, for everyone who steals will be cleared away according to what is on this side of it[c][b], and everyone who swears falsely will be cleared away according to what is on that side of it.”
  footnotes:
  - marker: a
    text: Or “over the face of the whole earth.” Hebrew אֶרֶץ can mean either “land” or “earth.”
    reason: alternative_reading
  - marker: b
    text: Literally, “from this according to it … from that according to it,” likely referring to what is written on each side of the flying scroll.
    reason: lexical_alternative
  - marker: c
    text: Or “will be cleared away” / “will be cut off.” The Hebrew verb carries judicial force here in the context of the curse.
    reason: lexical_alternative
