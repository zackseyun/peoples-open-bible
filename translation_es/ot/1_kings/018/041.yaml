translation:
  language: es
  text: 'Y Elías dijo a Acab: «Sube, come y bebe, porque se oye el sonido de la abundancia de lluvia[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «porque hay el sonido del estruendo de la lluvia». La expresión hebrea קול המון הגשם es compacta y vívida; el texto principal la vierte de forma idiomática sin convertirla en «tormenta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» comunica ese enlace narrativo sin añadir matiz temporal ajeno al hebreo.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: convención bíblica española
  rationale: En español bíblico estándar, el nombre se traduce como «Elías»; conserva reconocimiento lector y corresponde al antropónimo habitual en la tradición castellana.
- source_word: לְאַחְאָב
  english_pob_choice: to Ahab
  chosen_spanish: a Acab
  alternatives_spanish:
  - para Acab
  lexicon: convención bíblica española
  rationale: La ל introduce el destinatario del habla; «a Acab» es la forma natural y precisa en español. «Acab» es la forma bíblica española habitual del nombre.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Subid
  - Ve arriba
  lexicon: HALOT
  rationale: עלה conserva el sentido espacial de ascender; «Sube» mantiene la dirección sin sobreexplicar. «Ve arriba» sería menos idiomático y más pesado.
- source_word: אֱכֹל וּשְׁתֵה
  english_pob_choice: eat and drink
  chosen_spanish: come y bebe
  alternatives_spanish:
  - come y toma
  - come y bebe un poco
  lexicon: HALOT
  rationale: Los imperativos son directos y simples; «come y bebe» sigue de cerca el hebreo y es natural en español. No se añade intensificación que el texto no expresa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden profética; «porque» es claro y directo en español contemporáneo.
- source_word: קוֹל
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el ruido
  lexicon: HALOT
  rationale: קוֹל puede ser sonido/voz/ruido; aquí se percibe auditivamente el anuncio de la lluvia, por lo que «el sonido» mantiene la neutralidad semántica.
- source_word: הֲמוֹן
  english_pob_choice: abundance
  chosen_spanish: la abundancia
  alternatives_spanish:
  - el estruendo
  - el murmullo
  - la multitud
  lexicon: HALOT
  rationale: El contexto y la revisión inglesa favorecen «abundance» sobre una paráfrasis atmosférica. En español, «abundancia» conserva el valor de كثرة/multitud sin forzar una imagen no explícita.
- source_word: הַגָּשֶׁם
  english_pob_choice: rain
  chosen_spanish: de lluvia
  alternatives_spanish:
  - de la lluvia
  - de la tormenta
  lexicon: HALOT
  rationale: גשם significa «lluvia»; se evita añadir «tormenta» porque el texto hebreo habla de la abundancia/masa de lluvia, no de un tipo meteorológico más específico.
theological_decisions:
- issue: Cómo reflejar קול המון הגשם sin sobredeterminar la imagen
  english_pob_reading: the sound of the abundance of rain
  chosen_spanish_reading: el sonido de la abundancia de lluvia
  alternative_spanish_readings:
  - el sonido del estruendo de la lluvia
  - la voz de la abundancia de lluvia
  rationale: 'La revisión inglesa corrigió una paráfrasis más fuerte para acercarse a la compacta expresión hebrea. En español se conserva esa cautela: no se introduce «tormenta» ni «estruendo» como sentido principal, pero se mantiene la tensión de una expresión auditiva densa y algo inusual.'
  doctrine_reference: Principio de fidelidad lexical y no amplificación interpretativa
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó una paráfrasis («great rainstorm») por una forma más cercana al hebreo («abundance of rain»). Esta versión española sigue esa decisión revisada, evitando intensificar el cuadro meteorológico y manteniendo el carácter compacto de קול המון הגשם.
  spanish_consistency_notes:
  - Se conserva el nombre bíblico español «Elías» y «Acab» por consistencia con la tradición en español.
  - Se mantiene «lluvia» en lugar de «tormenta» para seguir la revisión auditada y no sobreinterpretar גשם.
  - La sintaxis reproduce el orden narrativo simple del hebreo con una cadencia natural para lectura pública.
