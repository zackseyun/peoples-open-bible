  yaml_path: translation/nt/galatians/006/008.yaml
  text: For the one who sows to his own flesh will reap corruption from the flesh[c][b][a], but the one who sows to the Spirit will reap eternal life from the Spirit.
  footnotes:
  - marker: a
    text: 'Or ''to his own sinful nature.'' The Greek word sarx can mean ''flesh'' literally or, in Paul''s ethical contrasts, the fallen human orientation opposed to the Spirit.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''destruction'' or ''decay.'' The Greek word can denote corruption, ruin, or decay.'
    reason: lexical_alternative
  - marker: c
    text: 'That is, the Holy Spirit; some render ''spirit'' in lowercase, but in Galatians this contrast commonly refers to the Spirit of God.'
    reason: alternative_reading
