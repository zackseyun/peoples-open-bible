  to: 'Seba y Dedán y los mercaderes de Tarsis[a], con todos sus leoncillos, te dirán: «¿Has venido a tomar despojo? ¿Has reunido tu compañía para apoderarte de plata y oro, para tomar ganado y bienes, para tomar gran despojo?»'
