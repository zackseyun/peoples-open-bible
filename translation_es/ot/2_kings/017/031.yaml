translation:
  language: es
  text: Los avvitas[a] hicieron Nibhaz y Tartac, y los sefarvitas quemaron a sus hijos varones en el fuego para Adramélec y Anamélec[b], los dioses de Sefarváim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los avvim».
    reason: lexical_alternative
  - marker: b
    text: Es decir, ofrecían a sus hijos varones como sacrificios al quemarlos para estos dioses.
    reason: cultural_note
lexical_decisions:
- source_word: הָעַוִּים
  english_pob_choice: The Avvites
  chosen_spanish: los avvitas
  alternatives_spanish:
  - los avvim
  lexicon: HALOT
  rationale: Es un nombre gentilicio/plural de pueblo, por lo que se translitera en lugar de traducirse. Mantengo una forma breve y reconocible en español, equivalente al transliterado inglés del POB.
- source_word: עָשׂוּ
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - fabricaron
  - hicieron para sí
  lexicon: HALOT
  rationale: El verbo hebreo es amplio y aquí introduce objetos de culto nombrados. 'Hicieron' conserva la neutralidad del hebreo sin añadir explícitamente 'ídolos' en el texto principal.
- source_word: נִבְחַז
  english_pob_choice: Nibhaz
  chosen_spanish: Nibhaz
  lexicon: HALOT
  rationale: Nombre propio de deidad; se translitera.
- source_word: וְאֶת תַּרְתָּק
  english_pob_choice: and Tartak
  chosen_spanish: y Tartac
  alternatives_spanish:
  - y Tartak
  lexicon: HALOT
  rationale: Segundo nombre propio coordinado con Nibhaz. Adapto la transliteración al uso ortográfico español manteniendo la misma entidad nominal.
- source_word: הַסְפַרְוִים
  english_pob_choice: the Sepharvites
  chosen_spanish: los sefarvitas
  alternatives_spanish:
  - los habitantes de Sefarváim
  lexicon: HALOT
  rationale: Es un gentilicio plural; 'sefarvitas' conserva la referencia étnica y el paralelismo con la línea inglesa del POB.
- source_word: שֹׂרְפִים
  english_pob_choice: burned
  chosen_spanish: quemaban
  alternatives_spanish:
  - quemaron
  - estaban quemando
  lexicon: HALOT
  rationale: El participio hebreo expresa acción característica o habitual; en español, el imperfecto comunica mejor ese trasfondo que un perfecto simple.
- source_word: אֶת בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos/varones
  lexicon: HALOT
  rationale: Aunque בְּנֵי es literalmente 'hijos varones/sons', en español 'hijos' puede abarcar el sentido filial sin forzar una expresión menos natural; la nota doctrinal preserva que el hebreo es masculino específico.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - por el fuego
  lexicon: HALOT
  rationale: La construcción sacrificial se expresa de manera natural en español como 'en el fuego', fiel al valor idiomático del hebreo.
- source_word: לְאַדְרַמֶּלֶךְ וַעֲנַמֶּלֶךְ
  english_pob_choice: to Adrammelek and Anammelek
  chosen_spanish: para Adramélec y Anamélec
  alternatives_spanish:
  - a Adramélec y Anamélec
  - para Adrammelec y Anammelek
  lexicon: HALOT
  rationale: ל indica dirección/dedicación hacia las deidades receptoras del rito; 'para' comunica mejor la ofrenda sacrificial en español. Ajusto acentos para lectura española sin cambiar los nombres.
- source_word: אלה ספרים
  english_pob_choice: the gods of Sepharvaim
  chosen_spanish: los dioses de Sefarváim
  alternatives_spanish:
  - los dioses de los sefarvitas
  lexicon: HALOT
  rationale: El sintagma constructo identifica a esas deidades como asociadas con Sefarváim; 'de Sefarváim' es más directo y sigue de cerca la relación nominal del hebreo.
theological_decisions:
- issue: Si explicitar en el texto principal que Nibhaz y Tartac eran ídolos/imágenes
  english_pob_reading: Retain the more literal 'made Nibhaz and Tartak' without adding 'idols' in the main text.
  chosen_spanish_reading: Mantener 'hicieron Nibhaz y Tartac' sin añadir 'ídolos' en el texto principal.
  alternative_spanish_readings:
  - hicieron ídolos de Nibhaz y Tartac
  - fabricaron imágenes de Nibhaz y Tartac
  rationale: El hebreo dice simplemente 'hicieron' con nombres propios. En contexto se entiende el acto cultual, pero añadir 'ídolos' interpretaría más allá de la forma explícita; conviene preservar esa tensión y dejar que el contexto la complete.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
- issue: Si reflejar en español la acción repetida/descrita del participio שֹׂרְפִים
  english_pob_reading: burned / were burning
  chosen_spanish_reading: quemaban
  alternative_spanish_readings:
  - quemaron
  - estaban quemando
  rationale: El participio puede expresar una práctica característica. El imperfecto español conserva mejor ese valor durativo/habitual que un pretérito puntual.
  doctrine_reference: Lexical and aspectual fidelity to the source; preserve verbal aspect where Spanish can do so naturally.
- issue: Si traducir בְּנֵיהֶם con valor específicamente masculino o generalizarlo
  english_pob_reading: their sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus hijos (varones)
  rationale: El hebreo es masculino específico. En español, 'hijos' es la forma más natural y comprensible; la nota lexical preserva la precisión del hebreo sin sobrecargar el texto principal.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral, with idiomatic Spanish where the target language does not easily mirror the source form.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB en inglés que prefirió el pretérito simple 'burned' frente a 'were burning' por fluidez narrativa; sin embargo, para español se optó por el imperfecto 'quemaban' porque el participio hebreo שֹׂרְפִים comunica acción continua o habitual, y el imperfecto la refleja con mayor fidelidad aspectual. También se conservó el enfoque literal del POB al no introducir 'ídolos' en el texto principal para Nibhaz y Tartac.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se transliteran los nombres propios de deidades y pueblos con adaptación ortográfica española cuando ayuda a la lectura.
  - Se mantiene 'dioses' en plural, conforme al hebreo constructo אלה ספרים y al contexto de cultos paganos.
  - La nota cultural aclara el sacrificio infantil sin desplazar el sentido literal del texto principal.
