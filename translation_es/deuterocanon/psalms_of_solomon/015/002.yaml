lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: El griego introduce la razón o fundamento de la afirmación precedente. En español, «Porque» expresa con naturalidad ese valor causal/explanatorio sin forzar una paráfrasis.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - espera
  - confianza
  lexicon: BDAG
  rationale: El sustantivo denota de manera directa «esperanza». «Esperanza» conserva el paralelismo con el término siguiente y es la opción más transparente.
- source_word: καταφυγὴ
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - shelter
  - amparo
  - lugar de refugio
  lexicon: BDAG
  rationale: «Refugio» es el equivalente más inmediato y natural en español para una fuente o lugar de protección. Mantiene el paralelismo semántico con «esperanza».
- source_word: τῶν πτωχῶν
  english_pob_choice: of the poor
  chosen_spanish: de los pobres
  alternatives_spanish:
  - de los necesitados
  lexicon: BDAG
  rationale: «Pobres» conserva mejor el sentido socioeconómico del genitivo que una opción más amplia como «necesitados».
- source_word: σύ
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  lexicon: BDAG
  rationale: El pronombre explícito con predicado nominal requiere una cópula en español. «Tú eres» reproduce la estructura sin añadir contenido interpretativo.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Aquí funciona como vocativo directo. En español, «oh Dios» conserva el tono de invocación más fielmente que dejar solo «Dios».
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada muestran alta concordancia y no requieren revisiones textuales ni notas críticas; la versión española sigue de cerca esa lectura directa.
  spanish_consistency_notes:
  - Se mantiene «Dios» como vocativo, en correspondencia con la función de ὁ θεός en el contexto.
  - Se usa «pobres» en sentido literal social/económico, coherente con la elección inglesa auditada.
  - No se introduce terminología eclesiástica ajena al griego; el tono es bíblico y sobrio.
