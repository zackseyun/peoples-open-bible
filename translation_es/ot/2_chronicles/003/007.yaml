    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may also be rendered 'doorposts' or 'sills'; 'thresholds' is chosen as the most likely architectural sense here.
    reason: lexical_alternative
  - marker: d
    text: Or 'engraved' instead of 'carved.'
    reason: lexical_alternative
