translation:
  language: es
  text: Vístete, Jerusalén, de las vestiduras de tu gloria; prepara tu túnica sagrada[a], porque Dios ha hablado cosas buenas a Israel por siempre jamás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «túnica de tu santidad» o «túnica de tu santuario».
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «por siempre y todavía»; la expresión comunica duración perpetua con fuerza añadida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδυσαι
  english_pob_choice: Put on
  chosen_spanish: Vístete
  alternatives_spanish:
  - Ponte
  - Cúbrete
  lexicon: BDAG
  rationale: El imperativo medio pide a Jerusalén que se revista a sí misma. «Vístete» conserva la fuerza reflexiva e imperativa en español natural y digno.
- source_word: ἱμάτια
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: BDAG
  rationale: El término es general para ropa; «vestiduras» mantiene el registro poético y solemne sin restringir indebidamente el sentido.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» preserva la resonancia bíblica fuerte de δόξα y corresponde bien al lenguaje de exaltación dirigido a Jerusalén.
- source_word: ἑτοίμασον
  english_pob_choice: make ready
  chosen_spanish: prepara
  alternatives_spanish:
  - dispón
  - alista
  lexicon: BDAG
  rationale: El verbo significa preparar o dejar listo. «Prepara» es claro y directo en español, y mantiene el mandato.
- source_word: στολήν
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - vestido
  - ropa
  lexicon: BDAG
  rationale: στολή puede designar una prenda larga y distinguida. «Manto» comunica bien la solemnidad de la imagen, aunque no fija innecesariamente una prenda técnica.
- source_word: τοῦ ἁγιάσματός σου
  english_pob_choice: your sacred robe
  chosen_spanish: santo
  alternatives_spanish:
  - de tu santidad
  - de tu santuario
  lexicon: BDAG
  rationale: ἁγίασμα puede referirse a algo consagrado, a santidad o a santuario. En español, «manto santo» expresa la cualidad consagrada de la prenda sin forzar una lectura exclusivamente cultual; la alternativa de «santuario» queda como posibilidad textual semántica.
- source_word: ἐλάλησεν ἀγαθὰ
  english_pob_choice: has spoken good things
  chosen_spanish: ha hablado cosas buenas
  alternatives_spanish:
  - ha prometido cosas buenas
  - ha dicho bendiciones
  lexicon: BDAG
  rationale: El griego dice literalmente que Dios «habló cosas buenas». «Ha hablado cosas buenas» conserva la literalidad básica y evita introducir «prometido» sin base explícita.
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  english_pob_choice: forever and ever / forevermore
  chosen_spanish: para siempre y aún más
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: La expresión combina duración perpetua con un plus de continuidad («y aún»). «Para siempre y aún más» intenta reflejar ambos elementos, sin perder el matiz aditivo del griego.
theological_decisions:
- issue: Sentido de τοῦ ἁγιάσματός σου en la imagen de investidura de Jerusalén
  english_pob_reading: A consecrated or sacred robe belonging to Jerusalem
  chosen_spanish_reading: Un manto santo, propio de la condición consagrada de Jerusalén
  alternative_spanish_readings:
  - un manto de santidad
  - un manto de tu santuario
  rationale: En este contexto poético, la imagen principal es que Jerusalén sea adornada conforme a su estado santificado. «Manto santo» preserva esa idea sin imponer de entrada una lectura de recinto sagrado, aunque esa posibilidad queda implícita como alternativa.
  doctrine_reference: Santificación / consagración de Jerusalén en lenguaje poético
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el final a una expresión idiomática de duración perpetua; aquí se conserva esa intención con una formulación española que intenta reflejar tanto εἰς τὸν αἰῶνα como el añadido καὶ ἔτι. También se respetó el registro elevado del verso y la ambigüedad semántica de ἁγίασμα sin borrar la tensión entre santidad y santuario.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se traduce el imperativo medio con una forma reflexiva natural («Vístete»).
  - Se conserva el paralelismo poético de dos imperativos y una cláusula causal.
  - No se usa «Mesías» ni terminología cristológica, pues el versículo no la contiene.
  - La expresión final se redacta de forma que no suene excesivamente moderna ni demasiado arcaica en español litúrgico.
