review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura geográfica y la lista de ciudades: la ubicación al otro lado del Jordán, cerca/de referencia a Jericó, al este del Jordán, desde la tribu de Rubén; luego Bezer en el desierto y Jahzah/Jahaz con sus tierras circundantes. Sin embargo, hay dos desajustes con el expediente inglés y con la política del proyecto: (1) el inglés documenta una nota sobre la variante del topónimo Jahzah/Jahaz, pero el español usa la nota para justificar «junto a Jericó», añadiendo una explicación no preservada en el audit trail; (2) «Jahzá» introduce una adaptación acentual innecesaria y menos estable frente al hebreo יַהְצָה y la decisión inglesa «Jahzah».'
  spanish_quality_summary: El texto es legible y digno. «Al oriente del Jordán» funciona bien. «Junto a Jericó» es aceptable, aunque «en Jericó» o simplemente «Jericó» también serían posibles; no requiere nota. «Con sus pastizales» es natural. «En el desierto» es comprensible, aunque se aparta de la preferencia documentada «wilderness»; no es un error grave, pero «en el desierto» sigue siendo aceptable en español bíblico moderno.
  glossary_alignment: 'No hay términos teológicos principales implicados. La transliteración de nombres propios debería alinearse mejor con el expediente: «Bezer» está bien; «Jahzah» es preferible a «Jahzá», con una nota léxica para la variante «Jahaz» si se conserva una nota, como hace el inglés POB.'
  issues:
  - severity: medium
    issue: La nota al pie no corresponde al audit trail inglés.
    rationale: El inglés preserva una alternativa léxica para יַהְצָה ('Jahaz'), mientras que el borrador crea una nota nueva sobre «junto a Jericó». Eso desplaza la razón documentada y añade metacomentario innecesario.
  - severity: medium
    issue: «Jahzá» no refleja bien la decisión léxica documentada.
    rationale: La forma hebrea y la traducción inglesa favorecen «Jahzah». La adaptación con tilde en español no es necesaria y puede obscurecer la relación con la forma base y con la variante tradicional «Jahaz».
  - severity: low
    issue: La nota sobre Jericó no es necesaria para la claridad en español.
    rationale: La locatividad ya queda suficientemente expresada en el texto principal; la nota introduce una discusión técnica que no ayuda al lector general.
  revised_spanish_text: 'Y al otro lado del Jordán, junto a Jericó, al oriente del Jordán, de la tribu de Rubén: Bezer, en el desierto, con sus pastizales, y Jahzah[a], con sus pastizales.'
  revised_footnotes:
