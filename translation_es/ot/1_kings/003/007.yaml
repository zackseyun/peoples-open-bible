base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/007.yaml
  text: And now[a], O Yahweh my God, you have made your servant king in place of David my father, though I am a little child[b]; I do not know how to go out or come in.
  footnotes:
  - marker: a
    text: Or 'a young man'; the Hebrew expression is a humble self-description emphasizing youth and inexperience.
    reason: lexical_alternative
  - marker: b
    text: '''Go out or come in'' is a Hebrew idiom for carrying out one''s duties, especially in public leadership.'
    reason: cultural_note
