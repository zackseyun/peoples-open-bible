translation:
  language: es
  text: Todos los hermanos[a] de un pobre lo odian; ¡cuánto más se alejan de él sus amigos! Persigue palabras[b], pero no están ahí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» es masculino en hebreo; aquí se refiere a los miembros de la familia en el marco social del proverbio.
    reason: cultural_note
  - marker: b
    text: 'O: «Persigue palabras que no son nada», o «Persigue promesas, pero no están ahí». La cláusula final es textualmente y sintácticamente difícil en hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָשׁ
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - el pobre
  - una persona pobre
  lexicon: HALOT
  rationale: El hebreo singular masculino designa a una persona empobrecida; en español, «un pobre» conserva la fuerza nominal y la concisión proverbial sin añadir una especificación innecesaria como «hombre».
- source_word: אֲחֵי
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - familiares
  - consanguíneos
  lexicon: HALOT
  rationale: La construcción expresa de manera directa parentesco fraternal. «Hermanos» mantiene el paralelismo con «amigos» y sigue de cerca el hebreo.
- source_word: שְׂנֵאֻהוּ
  english_pob_choice: hate him
  chosen_spanish: lo odian
  alternatives_spanish:
  - lo aborrecen
  - lo desprecian
  - sienten odio por él
  lexicon: HALOT
  rationale: El verbo básico es fuerte; «odiar» reproduce mejor esa intensidad que opciones más suaves como «despreciar».
- source_word: אַף כִּי
  english_pob_choice: how much more
  chosen_spanish: cuánto más
  alternatives_spanish:
  - con mayor razón
  - mucho más
  - más aún
  lexicon: HALOT
  rationale: La expresión introduce un argumento a fortiori. «Cuánto más» conserva esa lógica de manera natural en español.
- source_word: מְרֵעֵהוּ
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - sus allegados
  - sus conocidos
  lexicon: HALOT
  rationale: El término puede denotar compañeros cercanos o amigos. «Amigos» es la opción más idiomática y sigue el contraste social del proverbio.
- source_word: רָחֲקוּ מִמֶּנּוּ
  english_pob_choice: keep far from him
  chosen_spanish: se alejan de él
  alternatives_spanish:
  - se apartan de él
  - se mantienen lejos de él
  - se distancian de él
  lexicon: HALOT
  rationale: El verbo expresa distancia real. «Se alejan de él» preserva el valor relacional y suena natural en español contemporáneo.
- source_word: מְרַדֵּף
  english_pob_choice: He pursues
  chosen_spanish: Persigue
  alternatives_spanish:
  - anda persiguiendo
  - va tras
  - corre tras
  lexicon: HALOT
  rationale: El participio es sintácticamente difícil, pero el sentido más probable mantiene al sujeto pobre como quien va tras algo. Se traduce verbalmente para dar fluidez sin perder la tensión del hebreo.
- source_word: אֲמָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - promesas
  - dichos
  - aseguranzas
  lexicon: HALOT
  rationale: El término significa literalmente «palabras» o «dichos». Se conserva el sentido más básico en el texto principal, dejando la posible referencia a promesas para la nota.
- source_word: לֹא הֵמָּה
  english_pob_choice: they are not there
  chosen_spanish: pero no están allí
  alternatives_spanish:
  - pero no existen
  - pero no hay nada
  - pero son nada
  lexicon: HALOT
  rationale: La clausula final es breve y difícil. «No están allí» comunica la ausencia o irrealidad de lo perseguido sin forzar una interpretación demasiado concreta.
theological_decisions:
- issue: 'Sentido del cierre difícil: palabras vacías, promesas ausentes, o simple ausencia'
  english_pob_reading: 'He pursues words, but they are not there. Footnote allows: ''He pursues words that are nothing,'' or ''He pursues promises, but they are not there.'' The final clause is textually and syntactically difficult in Hebrew.'
  chosen_spanish_reading: Persigue palabras, pero no están allí.
  alternative_spanish_readings:
  - Persigue palabras que no son nada.
  - Persigue promesas, pero no están allí.
  rationale: La frase española principal mantiene la misma reserva interpretativa que el texto inglés auditado. La nota preserva las alternativas reconocidas sin decidir de manera innecesaria entre ellas.
  doctrine_reference: Proverbios sapienciales; cautela hermenéutica ante un texto hebreo difícil
- issue: Relación social entre 'hermanos' y 'amigos'
  english_pob_reading: Hebrew 'brothers' is grammatically masculine; here it refers to family members in the proverb's social setting.
  chosen_spanish_reading: hermanos / amigos
  alternative_spanish_readings:
  - parientes / amigos
  - familiares / amigos
  rationale: 'No hay una carga doctrinal, pero sí una decisión de lectura social: el proverbio contrasta el rechazo en el círculo familiar con el distanciamiento en el círculo de amistad. «Hermanos» y «amigos» conservan ese contraste.'
  doctrine_reference: Sabiduría proverbial y contexto social del Antiguo Testamento
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios, con acuerdo alto y sin ajustes necesarios; se mantuvo la reserva interpretativa del cierre difícil del versículo y el contraste social hermano/amigo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo», «Señor» y otras fórmulas no presentes en el hebreo.
  - Se mantuvo el contraste literal y proverbial entre parentesco y amistad.
  - La puntuación y la mayúscula inicial de la exclamación siguen el registro bíblico en español moderno.
