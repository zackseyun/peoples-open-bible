  yaml_path: translation/ot/2_chronicles/013/002.yaml
  text: He reigned three years in Jerusalem[a], and his mother’s name was Micaiah daughter of Uriel from Gibeah. And there was war between Abijah and Jeroboam.
  footnotes:
