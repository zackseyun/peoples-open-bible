translation:
  language: es
  text: ¡Alcen sus cabezas[a], oh puertas, y sean alzadas, oh puertas antiguas[b], para que entre el Rey de la gloria!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus techos». El hebreo dice literalmente «sus cabezas», y la expresión preserva la personificación de las puertas.
    reason: lexical_alternative
  - marker: b
    text: O «eternas». La expresión hebrea puede denotar puertas de gran antigüedad o de duración perdurable.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂא֤וּ
  english_pob_choice: Lift up
  chosen_spanish: Alcen
  alternatives_spanish:
  - Levanten
  - Alcen hacia arriba
  lexicon: HALOT
  rationale: El imperativo plural pide una acción vigorosa y poética; «alcen» conserva el movimiento ascendente sin sonar rígido en español.
- source_word: שְׁעָרִ֨ים
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - portales
  lexicon: HALOT
  rationale: En español, «puertas» comunica con naturalidad la imagen poética de acceso. Aunque «gates» puede sugerir más específicamente puertas de ciudad, «puertas» mantiene la imagen sin sobrecargar el texto.
- source_word: רָֽאשֵׁי/כֶ֗ם
  english_pob_choice: your heads
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus extremos
  - sus remates
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal aplicada a las puertas. «Cabezas» es literal y reproduce el antropomorfismo poético del hebreo.
- source_word: וּ֭/שְׂאוּ
  english_pob_choice: be lifted up
  chosen_spanish: Alcense
  alternatives_spanish:
  - Sean levantadas
  - Levántense
  lexicon: HALOT
  rationale: El hebreo repite el imperativo con valor paralelo. «Alcense» refleja mejor en español la voz pasiva/medio-idiomática que la revisión inglesa quiso preservar, sin perder el paralelismo.
- source_word: פִּתְחֵ֣י עוֹלָ֑ם
  english_pob_choice: ancient doors
  chosen_spanish: puertas antiguas
  alternatives_spanish:
  - puertas eternas
  - puertas de antiguo
  lexicon: HALOT
  rationale: עוֹלָם aquí puede indicar antigüedad o duración prolongada. «Antiguas» comunica de forma natural la idea de puertas venerables o de larga data, manteniendo abierta la alternativa de «eternas» en la nota.
- source_word: מֶ֣לֶךְ הַ/כָּבֽוֹד
  english_pob_choice: the King of glory
  chosen_spanish: el Rey de la gloria
  alternatives_spanish:
  - el Rey glorioso
  lexicon: HALOT
  rationale: «Rey de la gloria» conserva el título constructo y su dignidad litúrgica. Se evita suavizarlo a «glorioso» para no perder la forma nominal del hebreo.
theological_decisions:
- issue: Preservar la personificación de las puertas con «cabezas»
  english_pob_reading: 'Retain the metaphor in the main text: ''Lift up your heads, O gates'''
  chosen_spanish_reading: 'Mantener la metáfora: «Alcen sus cabezas, oh puertas»'
  alternative_spanish_readings:
  - Abran de par en par, oh puertas
  - Levanten sus dinteles, oh puertas
  rationale: El hebreo personifica las puertas y habla de sus «cabezas». Traducirlo literalmente protege la imaginería litúrgico-poética y evita una paráfrasis arquitectónica que borraría un rasgo textual importante.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Renderización de עוֹלָם en פִּתְחֵי עוֹלָם
  english_pob_reading: Use 'ancient doors' in the main text
  chosen_spanish_reading: Usar «puertas antiguas» en el texto principal
  alternative_spanish_readings:
  - puertas eternas
  - puertas de antiguo
  rationale: En este contexto, el valor de עוֹלָם apunta a antigüedad o duración prolongada. «Antiguas» es idiomático en español y evita sugerir una eternidad metafísica de las puertas; la alternativa tradicional queda registrada en la nota.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al reflejar el valor medio/pasivo de la segunda exhortación con «Alcense», en lugar de un simple imperativo activo; además, conserva el paralelismo entre las dos llamadas y la lectura idiomática de עוֹלָם como antigüedad. Se incorporaron notas para las dos principales alternativas léxicas documentadas en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Rey de la gloria» por coherencia con el título constructo hebreo y con el uso POB documentado.
  - Se conserva el tono poético y litúrgico mediante el tratamiento con «oh» y el orden paralelo de las dos exhortaciones.
  - Se evita «SEÑOR» o «Cristo» porque el hebreo aquí no usa el Tetragrámaton ni el título mesiánico.
