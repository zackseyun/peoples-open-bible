translation:
  language: es
  text: los que condenan a un hombre por una palabra[a], y tienden una trampa al que reprende en la puerta[b], y desvían al justo con vacuidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que hacen culpable a un hombre por una palabra» o «los que hacen pecar a una persona por una palabra». El hebreo puede tener un matiz judicial o causativo; el contexto legal favorece aquí el sentido judicial.'
    reason: lexical_alternative
  - marker: b
    text: «La puerta» se refiere a la puerta de la ciudad, lugar de juicio público y de procesos legales.
    reason: cultural_note
  - marker: c
    text: 'O: «por nada» o «con lo vacío»; también: «niegan justicia al justo con lo vacío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲטִיאֵי
  english_pob_choice: make ... an offender
  chosen_spanish: hacen tropezar / hacen culpable
  alternatives_spanish:
  - hacen pecar
  - declaran culpable
  - hacen ofensor
  lexicon: HALOT
  rationale: El hebreo en este contexto judicial admite una lectura de causar pecado o de tratar a alguien como culpable. En español, «hacer tropezar» no es literal del audit trail, pero no se usa en el texto final; la base elegida es la idea de volver culpable/culpado por una palabra. Como el español requiere fluidez, se mantiene el valor jurídico implícito con una formulación sobria y compatible con el contexto de juicio en la puerta.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la gente
  - ser humano
  lexicon: HALOT
  rationale: Se conserva el singular genérico masculino del hebreo, siguiendo la decisión inglesa de mantener la individualización. «Un hombre» es natural en español y preserva la fuerza del singular sin neutralizar el término.
- source_word: בְּדָבָר
  english_pob_choice: by a word
  chosen_spanish: con una palabra
  alternatives_spanish:
  - por una palabra
  - a causa de una palabra
  - por un dicho
  lexicon: HALOT
  rationale: דָבָר puede ser «palabra» o «asunto/caso». La opción española más directa y natural aquí es «con una palabra», que deja abierta la ambigüedad entre declaración verbal y carga judicial, como en el audit trail inglés.
- source_word: לַמּוֹכִיחַ
  english_pob_choice: the one who reproves
  chosen_spanish: al que reprende
  alternatives_spanish:
  - al reprensor
  - al que corrige
  - al que contiende en juicio
  lexicon: HALOT
  rationale: El participio admite matiz moral y judicial. «Reprende» es suficientemente amplio para conservar ambos planos sin forzar el sentido exclusivamente forense o exclusivamente ético.
- source_word: בַּשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en la puerta de la ciudad como lugar de juicio
  - en el portal
  lexicon: HALOT
  rationale: Aunque el «gate» bíblico es la puerta/entrada de la ciudad y su lugar de juicio, en español «la puerta» es la forma más transparente. La nota explica el trasfondo jurídico sin sobrecargar el texto principal.
- source_word: יְקֹשׁוּן
  english_pob_choice: lay a snare
  chosen_spanish: tienden una trampa
  alternatives_spanish:
  - tienden un lazo
  - ponen una trampa
  - acechan
  lexicon: HALOT
  rationale: La metáfora de la caza/emboscada se naturaliza bien en español con «tienden una trampa». Mantiene el sentido de acecho malicioso del hebreo.
- source_word: וַיַּטּוּ
  english_pob_choice: turn aside
  chosen_spanish: desvían
  alternatives_spanish:
  - apartan
  - inclinan
  - tuercen
  lexicon: HALOT
  rationale: «Desvían» conserva la imagen de apartar de recto camino o de recta justicia y suena natural en español contemporáneo. También permite sostener el valor legal y moral del hebreo.
- source_word: בַּתֹּהוּ
  english_pob_choice: with emptiness
  chosen_spanish: con vacuidad
  alternatives_spanish:
  - con nada
  - por lo vacío
  - sin fundamento
  - con inutilidad
  lexicon: HALOT
  rationale: תֹהוּ denota vacío, vaciedad, inanidad o falta de sustancia. «Vacuidad» es una solución digna y cercana al campo semántico del hebreo, sin convertirlo de antemano en «falsedad» ni en «caos».
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al inocente
  - al recto
  - al justificado
  lexicon: HALOT
  rationale: En contexto judicial, צַדִּיק puede ser «justo» o «inocente/vindicado». «El justo» es el equivalente bíblico natural en español y conserva tanto la dimensión ética como la legal.
theological_decisions:
- issue: Alcance jurídico de «hacer offender / poner en falta» frente a la mera idea moral de pecar
  english_pob_reading: The Hebrew can carry either a judicial or causative nuance, though the legal setting favors the judicial sense here.
  chosen_spanish_reading: El texto español mantiene la ambigüedad útil entre culpabilizar y hacer tropezar, pero en el flujo de la frase queda claro el trasfondo judicial.
  alternative_spanish_readings:
  - los que hacen pecar a un hombre con una palabra
  - los que condenan a un hombre por una palabra
  - los que vuelven culpable a un hombre por una palabra
  rationale: No se debe borrar la tensión documentada entre causativo y judicial. La redacción final conserva una formulación que no reduce el hebreo a mera moralidad privada ni lo estrecha a tecnicismo forense exclusivo.
  doctrine_reference: Principio de fidelidad semántica y no-sobrerreducción en traducción bíblica; justicia pública en las puertas de la ciudad en la literatura profética.
- issue: Sentido de «la puerta» como lugar de juicio público
  english_pob_reading: '''In the gate'' refers to the city gate as the place of public judgment and legal proceedings.'
  chosen_spanish_reading: «En la puerta» se deja como expresión principal, con la nota que explicita que se trata de la puerta de la ciudad y su función judicial.
  alternative_spanish_readings:
  - en la puerta de la ciudad
  - en el lugar de juicio
  - en el tribunal de la puerta
  rationale: El español necesita una forma breve y natural; la nota preserva la referencia cultural y jurídica del hebreo sin sobrecargar el versículo.
  doctrine_reference: Trasfondo histórico-cultural de la justicia en la ciudad en el Antiguo Testamento.
- issue: Valor de תוהו en «con vacuidad»
  english_pob_reading: Or 'turn aside the righteous for nothing' or 'deny justice to the righteous by what is empty.'
  chosen_spanish_reading: «Con vacuidad» conserva la idea de vacío/vanidad/falta de sustancia, dejando abierta la posibilidad de una injusticia sin fundamento.
  alternative_spanish_readings:
  - por nada
  - con nada
  - con falsedad
  - sin fundamento
  rationale: La palabra hebrea no obliga a escoger de inmediato entre «nada», «falsedad» o «caos». «Vacuidad» refleja mejor la amplitud semántica y la desvalorización de la causa presentada contra el justo.
  doctrine_reference: Semántica léxica de תוהו en contextos proféticos y judiciales.
translation_notes:
  revision_awareness: Coincide con el pass más reciente sin cambios sustantivos; se respeta la alta concordancia del audit trail inglés y la lectura judicial predominante del verso, manteniendo abiertas las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se conservó «justo» para צדיק en clave jurídica y ética, coherente con el uso bíblico estándar.
  - Se prefirió «vacuidad» para תוהו para no cerrar prematuramente el campo semántico a «falsedad» o «nada».
  - Se usó «en la puerta» con nota explicativa para respetar el idioma natural del español y el trasfondo de la ciudad-tribunal.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes no presentes en el verso.
  - Los corchetes de notas se colocan solo donde el texto principal tiene una ambigüedad real documentada por el audit trail.
