translation:
  language: es
  text: Y al amanecer, venían, ocultándose[a] unos de otros con prisa, para ver quién se le presentaría primero y le hablaría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «se robaban unos a otros». La expresión es idiomática y probablemente significa que entraban furtivamente por separado, cada uno tratando de llegar a Susana antes que el otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐγίνετο ὄρθρος
  english_pob_choice: when dawn came
  chosen_spanish: cuando amanecía
  alternatives_spanish:
  - cuando llegaba el alba
  - al amanecer
  - cuando rayaba el día
  lexicon: LSJ
  rationale: ὄρθρος señala el alba o temprano en la mañana; el imperfecto ἐγίνετο da un marco temporal en curso. «Cuando amanecía» mantiene esa ambientación narrativa natural en español sin forzar un puntualismo excesivo.
- source_word: ἐρχόμενοι
  english_pob_choice: they would come
  chosen_spanish: venían
  alternatives_spanish:
  - iban y venían
  - llegaban
  - acudían
  lexicon: BDAG
  rationale: El participio con el imperfecto expresa conducta repetida u habitual. «Venían» reproduce bien ese valor iterativo en español.
- source_word: ἔκλεπτον ἀλλήλους
  english_pob_choice: hiding from one another
  chosen_spanish: ocultándose unos de otros
  alternatives_spanish:
  - escondiéndose unos de otros
  - sustrayéndose unos a otros
  - ocultándose el uno del otro
  lexicon: LSJ
  rationale: 'El griego es idiomático: no describe robo literal, sino maniobra furtiva entre ellos. «Ocultándose unos de otros» preserva la idea de ocultamiento mutuo sin introducir una interpretación más fuerte que la del texto.'
- source_word: σπεύδοντες
  english_pob_choice: in haste
  chosen_spanish: con prisa
  alternatives_spanish:
  - apurados
  - a toda prisa
  - con premura
  lexicon: BDAG
  rationale: σπεύδω puede implicar prisa o diligencia. Aquí el contexto competitivo favorece la rapidez; «con prisa» es claro y natural.
- source_word: τίς φανήσεται αὐτῇ πρότερος
  english_pob_choice: which of them would appear to her first
  chosen_spanish: quién se le presentaría primero
  alternatives_spanish:
  - quién aparecería primero ante ella
  - quién se mostraría primero ante ella
  - quién llegaría primero a ella
  lexicon: LSJ
  rationale: 'φανήσεται es futuro medio/pasivo con sentido intransitivo: aparecer, mostrarse. En español, «se le presentaría primero» comunica la idea de presentarse ante Susana con prioridad de acceso, sin perder el matiz de aparición.'
- source_word: λαλήσει πρὸς αὐτήν
  english_pob_choice: speak to her
  chosen_spanish: le hablaría
  alternatives_spanish:
  - le diría algo
  - hablaría con ella
  - se dirigiría a ella
  lexicon: BDAG
  rationale: λαλέω con πρός expresa hablar a alguien. «Le hablaría» es directo, fiel y fluido en español; evita añadir una relación más recíproca de la que sugiere el griego.
translation_notes:
  revision_awareness: 'Seguí el ajuste reciente del audit trail: ἔκλεπτον ἀλλήλους se toma mejor como ocultamiento/furtividad mutua, no como robo literal; y λαλήσει πρὸς αὐτήν se rinde de forma directa como «le hablaría».'
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo en imperfecto para reflejar acción habitual.
  - No se introdujo terminología eclesiástica ajena al relato.
  - El español evita calco rígido y conserva la ambigüedad idiomática de ἔκλεπτον ἀλλήλους.
