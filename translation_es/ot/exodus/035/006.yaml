translation:
  language: es
  text: y azul, y púrpura, y hilo escarlata, y lino fino, y pelo de cabras[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «cabras»; en este contexto se refiere al pelo de cabra como material para el tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul/púrpura
  lexicon: HALOT
  rationale: El término designa material teñido de azul o azul violáceo en el contexto del tabernáculo. Como la lista enumera materiales contribuidos y el español puede entender la sustancia textil por el contexto, «azul» mantiene la concisión del original sin perder el sentido.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tela púrpura
  lexicon: HALOT
  rationale: El término refiere material teñido de púrpura. «Púrpura» es el equivalente más directo y digno en español para este color/material de lujo en el inventario del tabernáculo.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - material escarlata
  lexicon: HALOT
  rationale: La expresión hebrea alude a material teñido con tinte escarlata/carmesí. En español, «carmesí» conserva el valor cromático y evita introducir de forma innecesaria la palabra «hilo» cuando el verso funciona como lista de materiales.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: En contextos del tabernáculo, el término se refiere a lino fino. «Lino fino» preserva la calidad del tejido y es natural en español bíblico contemporáneo.
- source_word: עִזִּים
  english_pob_choice: goats’ hair
  chosen_spanish: pelo de cabras
  alternatives_spanish:
  - pelaje de cabras
  - lana de cabra
  lexicon: HALOT
  rationale: Aunque literalmente significa «cabras», en esta lista de materiales el referente es el pelo usado para tejer cubiertas. «Pelo de cabras» mantiene la literalidad necesaria y hace explícito el valor material que el contexto exige.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática española
  rationale: Se conserva la polisíndeton del hebreo con repetición de «y» en la lista. No se usa «e» porque aquí no sigue sonido /i/.
translation_notes:
  revision_awareness: Coincide con el texto hebreo y con el audit trail inglés en la comprensión de los materiales textiles; se ajustó «goats’ hair» a un español más literal y transparente, manteniendo la referencia material implícita en el contexto.
  spanish_consistency_notes:
  - Se mantuvo la secuencia polisindética con «y» para reflejar el ritmo enumerativo del hebreo.
  - Se prefirió «lino fino» sobre «lino» para conservar la distinción de calidad documentada en el contexto del tabernáculo.
  - «Pelo de cabras» evita la posible ambigüedad de entender animales vivos, sin añadir una interpretación ajena al pasaje.
