translation:
  language: es
  text: 'Quedemot con sus pastizales[a], y Mefaat con sus pastizales: cuatro ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tierra común' o 'terreno circundante de pastoreo' para el terreno ligado a cada ciudad (hebreo מִגְרָשׁ).
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵמוֹת
  english_pob_choice: Kedemoth
  chosen_spanish: Kedemot
  alternatives_spanish:
  - Qedemot
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera, no se traduce. En español, 'Kedemot' mantiene la forma breve y legible, alineada con la convención del nombre en inglés, sin agregar una vocal final innecesaria.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su tierra común
  - sus terrenos comunes
  - sus pastos
  lexicon: HALOT
  rationale: 'מִגְרָשׁ señala el terreno abierto asociado a la ciudad, con uso como área de pastoreo o terreno común. ''Pastizales'' comunica bien esa zona abierta y de pastoreo en español moderno. Se conserva el posesivo plural ''sus'' porque el sentido es distributivo: cada ciudad tiene su propio terreno anexo.'
- source_word: מֵיפָעַת
  english_pob_choice: Mephaath
  chosen_spanish: Mefaat
  alternatives_spanish:
  - Mefaat
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera. 'Mefaat' sigue una adaptación española natural y consistente con la pronunciación probable, sin forzar la grafía inglesa.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro poblados
  - cuatro villas
  lexicon: HALOT
  rationale: עָרִים es el plural de 'ciudad' en listas de repartición territorial. 'Ciudades' conserva el valor estándar del término en este contexto y mantiene la conclusión numérica del verso.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: with ... and ... with ...
  chosen_spanish: con ... y ... con ...
  alternatives_spanish:
  - y ... y ... y ...
  - a ... y ... a ...
  lexicon: Hebrew grammar
  rationale: El hebreo marca la lista con repetición del objeto directo. En español, 'con' expresa de manera natural la relación entre cada ciudad y su terreno anexo, sin reproducir mecánicamente cada partícula objeto.
theological_decisions:
- issue: Naturaleza del término מִגְרָשׁ en un contexto de ciudades levíticas
  english_pob_reading: its pasturelands; Or 'common land' or 'surrounding pastureland' for the land attached to each city (Hebrew מִגְרָשׁ).
  chosen_spanish_reading: sus pastizales
  alternative_spanish_readings:
  - su tierra común
  - sus terrenos comunes
  - su terreno circundante de pastoreo
  rationale: El término designa el área abierta alrededor de la ciudad reservada junto con ella. En este verso, 'pastizales' conserva el valor funcional de terreno de pastoreo y sugiere la relación urbana-rural sin introducir una explicación demasiado larga en el cuerpo del texto. La nota preserva la alternativa semántica.
  doctrine_reference: Levítico 25:34; Números 35:2-5
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alta concordancia y no muestran revisiones aplicadas; la redacción española sigue esa estabilidad, manteniendo la estructura breve del hebreo y la nota léxica sobre מִגְרָשׁ.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios sin hispanizarlos más allá de la adaptación ortográfica mínima.
  - '''Pastizales'' se usa de forma consistente para מִגְרָשׁ en este versículo; si aparece el mismo término en pasajes de ciudades levíticas, conviene revisar caso por caso si ''tierra común'' comunica mejor el contexto.'
  - La conclusión 'cuatro ciudades' traduce de forma directa el resumen numérico del hebreo.
