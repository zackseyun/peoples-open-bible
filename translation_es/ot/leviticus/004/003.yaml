    issue: ‘un hijo del ganado’ es un calco poco natural de פַּר בֶּן בָּקָר
    rationale: Aunque el inglés auditado optó por ‘a bull, a son of the herd’ para reflejar más plenamente el hebreo, en español ‘hijo del ganado’ no es una formulación publicable ni claramente inteligible. ‘Un toro del ganado’ preserva el referente bovino de manera fiel y natural.
  - severity: low
    issue: ‘entonces’ añade peso innecesario a la sintaxis legal
    rationale: No altera el sentido, pero la cláusula condicional fluye mejor en español bíblico actual sin ese conector explícito.
