base_translation:
  language: en
  yaml_path: translation/ot/ezra/001/001.yaml
  text: 'Now in the first year of Cyrus king of Persia[a], so that the word of Yahweh from the mouth of Jeremiah might be fulfilled, Yahweh stirred up the spirit of Cyrus king of Persia, and he sent a proclamation throughout all his kingdom, and also in writing[c][b], saying:'
  footnotes:
  - marker: a
    text: Literally, 'from the mouth of Jeremiah.' This Hebrew idiom means that Jeremiah was the human spokesman through whom the LORD's word came.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'to complete the word of the LORD.' The main text uses 'fulfilled' because the context is the realization of prophecy.
    reason: lexical_alternative
  - marker: c
    text: Or, 'he made a proclamation' / 'he caused a proclamation to pass.' The Hebrew idiom refers to publicly circulating an official announcement.
    reason: lexical_alternative
