translation:
  language: es
  text: 'Y él dijo[a]: «Mira[b] ahora, he envejecido[c]; no sé el día de mi muerte[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y él habló».'
    reason: alternative_reading
  - marker: b
    text: 'O: «He aquí» o «He aquí ahora».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «soy viejo».'
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «el día de mi muerte»; es decir, el día en que moriré.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso directo de modo simple y secuencial. En español, «Y él dijo» conserva el flujo narrativo sin añadir interpretación temporal excesiva.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira ahora
  lexicon: HALOT
  rationale: El deíctico llama la atención del oyente. «Mira» comunica esa función en español moderno con naturalidad; «He aquí» sería más formal/arcaizante y «Mira ahora» duplicaría la fuerza de נָא.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - te ruego
  - por favor
  lexicon: HALOT
  rationale: Aquí נָא no expresa una petición independiente, sino una partícula de atenuación o inmediatez. «Ahora» conserva la proximidad discursiva sin volver la frase una súplica.
- source_word: זָקַנְתִּי
  english_pob_choice: I have grown old
  chosen_spanish: he envejecido
  alternatives_spanish:
  - soy viejo
  - he llegado a viejo
  lexicon: HALOT
  rationale: El perfecto expresa un estado alcanzado. «He envejecido» mantiene mejor el matiz de proceso-resultante que «soy viejo», sin sobrecargar el español.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no he sabido
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa perfecto, el español natural aquí es presente de estado: «no sé». Esto reproduce el sentido idiomático de ignorancia actual.'
- source_word: יוֹם מוֹתִי
  english_pob_choice: the day of my death
  chosen_spanish: el día de mi muerte
  alternatives_spanish:
  - el día que moriré
  - mi día de muerte
  lexicon: HALOT
  rationale: La construcción nominal literal se conserva en español como «el día de mi muerte», sin convertirla en paráfrasis verbal innecesaria.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió una fórmula más formal para הִנֵּה נָא («Behold now»). En español, esa formalidad se equilibró con «Mira ahora», pero se optó por «Mira» en el texto principal por naturalidad; la nota conserva la alternativa más formal («He aquí»).
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» y la terminología POB estándar cuando no aplica aquí.
  - La nota sobre יוֹם מוֹתִי preserva la observación literal del inglés POB sin ocultar la expresión nominal hebrea.
  - No se introdujo vocabulario tradicional ajeno al hebreo base; el tono es digno pero contemporáneo.
