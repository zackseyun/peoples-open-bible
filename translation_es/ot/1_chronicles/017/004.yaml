translation:
  language: es
  text: 'Ve y di a David, mi siervo: «Así dice Yahvé: Tú no edificarás para mí la casa[a][b] para habitar en ella»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú no edificarás para mí la casa para habitar en ella»; también puede leerse más literalmente: «No tú edificarás para mí la casa para habitar en ella».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la casa destinada a ser la morada de Yahvé; el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve y
  lexicon: HALOT
  rationale: El imperativo de הלך en una comisión divina se expresa de manera directa y natural con «Ve».
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dirás
  - y habla
  lexicon: HALOT
  rationale: La secuencia con לֵךְ funciona como mandato encadenado; «y di» conserva la introducción simple del discurso.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional antes de David se expresa de forma idiomática en español con «a».
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre propio.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aunque el término puede abarcar esclavo/siervo, aquí el contexto de investidura pactal y comisión real favorece «siervo»; «esclavo» sería demasiado fuerte para este uso.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con el valor formal de presente declarativo; YHWH se vierte como «Yahvé» según la norma del proyecto.
- source_word: לֹא אַתָּה תִּבְנֶה
  english_pob_choice: You shall not build
  chosen_spanish: Tú no edificarás
  alternatives_spanish:
  - No edificarás tú
  - Tú no construirás
  lexicon: HALOT
  rationale: El hebreo combina negación y pronombre enfático. «Tú no edificarás» mantiene la fuerza directa y el énfasis personal; «edificar» preserva el registro elevado sin perder claridad.
- source_word: לִּי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: El dativo de beneficio/purpose en el contexto del templo se expresa naturalmente como «para mí».
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa, es decir, el templo
  lexicon: HALOT
  rationale: Se conserva el sustantivo «casa» para reflejar el hebreo בית; «templo» explicita demasiado y borra la resonancia lexical del original.
- source_word: לָשָׁבֶת
  english_pob_choice: to dwell in
  chosen_spanish: donde habitar
  alternatives_spanish:
  - para habitar
  - para que yo habite
  lexicon: HALOT
  rationale: El infinitivo de ישב expresa la finalidad de la casa. «Donde habitar» comunica el sentido de morada con fluidez en español, sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama, y el proyecto prescribe «Yahvé» como forma principal en español. Se evita la sustitución litúrgica por «SEÑOR» para no ocultar el nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de הַבַּיִת en contexto cultual
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa del templo
  rationale: Aunque el referente es el santuario que David quería construir, el hebreo dice literalmente «la casa». Mantener «casa» preserva la tensión lexical y la imagen original; la especificación cultual queda implícita por el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
- issue: Fuerza de לֹא אַתָּה תִּבְנֶה
  english_pob_reading: You shall not build
  chosen_spanish_reading: Tú no edificarás
  alternative_spanish_readings:
  - No edificarás tú
  - No eres tú quien edificará
  rationale: La revisión inglesa corrigió una paráfrasis más libre hacia una forma más cercana al hebreo. En español, «Tú no edificarás» conserva la prohibición directa y el énfasis del pronombre sin convertirlo en una interpretación perifrástica.
  doctrine_reference: 'Revision awareness: closer lexical alignment with Hebrew'
translation_notes:
  revision_awareness: La revisión inglesa más reciente abandonó una paráfrasis más interpretativa («You are not the one to build») en favor de una forma más cercana al hebreo («You shall not build»). La redacción española sigue esa línea de mayor alineación léxica, manteniendo a la vez la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» conforme al criterio del proyecto.
  - Se conserva «casa» para הַבַּיִת y no «templo» en el texto principal.
  - «Edificarás» se eligió por registro bíblico y por su compatibilidad con el sustantivo «casa».
  - El pronombre explícito «Tú» reproduce el énfasis del hebreo אַתָּה.
