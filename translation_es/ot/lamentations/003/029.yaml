translation:
  language: es
  text: Ponga[a] su boca en el polvo; quizás hay esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Ponga su boca en el polvo». La expresión describe una profunda humillación, abatimiento o sumisión silenciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֵּן
  english_pob_choice: Let him put
  chosen_spanish: Ponga
  alternatives_spanish:
  - Que ponga
  - Ponga él
  - Déjelo poner
  lexicon: HALOT
  rationale: El verbo נתן aquí funciona con fuerza exhortativa/jusiva en el contexto de 3:27–30. En español, un imperativo de tercera persona con valor exhortativo no es natural; "Ponga" comunica la instrucción sin añadir contenido ajeno ni volverla demasiado explicativa.
- source_word: בֶּעָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo de la tierra
  - en la tierra
  - en el polvo
  lexicon: HALOT
  rationale: עָפָר puede ser "polvo", "tierra seca" o "polvo de tierra". "Polvo" conserva el registro bíblico y la imagen de humillación. Se evita "dirt"/"tierra" por sonar menos idiomático en español y perder el contraste simbólico.
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - sus labios
  lexicon: HALOT
  rationale: El hebreo dice literalmente "su boca"; se mantiene el sustantivo concreto en vez de paraphrasear a "callarse" o "humillarse", para preservar la imagen corporal y su posible tensión interpretativa.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizás
  alternatives_spanish:
  - tal vez
  - quizá
  - quizás
  lexicon: HALOT
  rationale: אוּלַי expresa posibilidad no asegurada. "Quizás" es natural en español y mantiene la cautela del hebreo sin intensificar ni debilitar la expectativa.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - hay
  - existe
  lexicon: HALOT
  rationale: יֵשׁ es existencial. En español, "hay" es la equivalencia más directa y fluida en esta construcción.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza
  - expectativa
  lexicon: HALOT
  rationale: תִּקְוָה normalmente significa "esperanza" o "expectativa". "Esperanza" es la opción más natural en español y conserva el sentido de posible restauración en el lamento.
theological_decisions:
- issue: Imagen corporal de humillación / sumisión
  english_pob_reading: Retain the concrete image 'put his mouth in the dust' rather than interpretively paraphrasing it.
  chosen_spanish_reading: Mantener la imagen concreta "ponga su boca en el polvo" en lugar de explicarla como "humíllese" o "guarde silencio".
  alternative_spanish_readings:
  - humíllese
  - guarde silencio en abatimiento
  - incline su rostro en el polvo
  rationale: El hebreo presenta una imagen física que sugiere humillación, sometimiento o silencio penitencial, pero no lo explicita. La traducción debe conservar esa tensión interpretativa y dejar que el lector perciba el valor idiomático sin resolverlo de más.
  doctrine_reference: Principio de primacía del texto original; preservar imágenes y tensiones no resueltas.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; por eso se mantiene una formulación sobria, fiel y consistente con el análisis lexical y la nota alternativa del texto inglés.
  spanish_consistency_notes:
  - Se conserva el pronombre implícito de tercera persona mediante el imperativo exhortativo "Ponga", que en español cumple la función de "Let him put" sin requerir una expansión artificial.
  - '"Polvo" se usa de manera consistente con el valor bíblico de עָפָר y con el registro reverente de la serie.'
  - '"Quizás hay esperanza" mantiene la cautela de אוּלַי + יֵשׁ sin convertirla en certeza.'
  - La nota al pie se ancla en "polvo" para preservar la alternativa de traducción y la dimensión idiomática documentada en el audit trail.
