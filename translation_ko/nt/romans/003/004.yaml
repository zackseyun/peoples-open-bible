id: ROM.3.4
reference: Romans 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ γένοιτο· γινέσθω δὲ ὁ θεὸς ἀληθής, πᾶς δὲ ἄνθρωπος ψεύστης, ⸀καθὼς γέγραπται· Ὅπως ἂν δικαιωθῇς ἐν τοῖς λόγοις σου καὶ ⸀νικήσεις ἐν τῷ κρίνεσθαί σε.
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/004.yaml
  text: 'May it never be! Rather[a], let God be true, and every person a liar[b], as it is written: “So that you may be justified in your words and prevail when you are judged.”'
  footnotes:
  - marker: a
    text: Or, “be shown to be in the right” or “be vindicated.”
    reason: lexical_alternative
  - marker: b
    text: Or, “when you judge”; this reflects the Hebrew wording of Psalm 51:4 more directly, while Romans' Greek wording is naturally read as “when you are judged.”
    reason: alternative_reading
translation:
  language: ko
  text: 결코 그럴 수 없다! 도리어 하나님은 참되시고 모든 사람은 거짓되다 하자. 기록된 바와 같이, 「주께서 말씀하실 때 의롭다 하심을 얻으시고, 심판받으실 때 이기시리이다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be
  chosen_korean: 결코 그럴 수 없다
  alternatives_korean:
  - 그럴 수 없습니다
  - 천만의 말씀입니다
  lexicon: BDAG
  rationale: 바울의 격렬한 부정 정식. 한국 전통 「그럴 수 없느니라」의 강도를 보존하되, 본 단락의 평어 호격 흐름에 맞추어 「결코 그럴 수 없다」로 옮긴다.
- source_word: ἀληθής ... ψεύστης
  english_pob_choice: true ... liar
  chosen_korean: 참되시고 ... 거짓되다
  alternatives_korean:
  - 진실하시고 ... 거짓말쟁이
  lexicon: BDAG
  rationale: 대조의 무게를 「참/거짓」으로 보존한다.
