    rationale: 'La POB inglesa usa la nota para registrar la literalidad hebrea mientras el texto principal expresa el sentido contextual. En español conviene la misma distribución: cuerpo del texto con parentesco cercano; nota con «literalmente, cerca de mí».'
  - severity: low
    issue: «algún regalo» es correcto pero algo coloquial frente al registro del pasaje.
    rationale: No exige adjudicación difícil, pero «algún don» o «algo» armoniza mejor con el tono y con la dificultad del hebreo. Se puede mejorar de forma menor en la revisión.
