review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa del griego y conserva los elementos clave: «bendecid», vocativo a los cielos, «cantad/cantadle alabanzas», «exaltadlo» y «para siempre». Sin embargo, «Bendecid» y «exaltadlo grandemente» suenan demasiado peninsulares o poco naturales para el español neutral solicitado, y «oh cielos» funciona mejor con coma vocativa. Además, «cantadle alabanzas» añade un pronombre dativo no expreso en español necesario, pero puede simplificarse con mejor fluidez.'
  spanish_quality_summary: La redacción es comprensible y bastante fiel, pero no alcanza del todo el estilo neutral latinoamericano / ampliamente eclesial. «Bendecid» y «exaltadlo grandemente» resultan menos naturales; «Bendigan al Señor, oh cielos; canten alabanzas y exáltenlo en gran manera para siempre» mejora legibilidad, aunque aún puede afinarse. La mejor reparación mínima es modernizar los imperativos al plural de ustedes y suavizar la intensificación.
  glossary_alignment: «Señor» para κύριος está correctamente alineado con la evidencia griega y con la decisión teológica documentada; no corresponde «Yahvé» aquí porque la fuente inmediata es κύριον, no יהוה. No hay otros choques con el glosario del proyecto.
  issues:
  - severity: medium
    issue: Uso de «Bendecid»
    rationale: Aunque fiel al imperativo plural, suena marcadamente peninsular y menos natural para un español neutral latinoamericano, contrario al objetivo de estilo del proyecto.
  - severity: medium
    issue: «exaltadlo grandemente» suena forzado
    rationale: Preserva la intensificación de ὑπερυψοῦτε, pero la combinación verbal-adverbial es poco idiomática en español actual y reduce la dignidad natural del verso.
  - severity: low
    issue: Puntuación del vocativo «oh cielos»
    rationale: 'En español es más natural marcar el vocativo con coma: «oh, cielos» o integrarlo de otra manera. En registro bíblico también puede resolverse como «cielos» sin interjección, pero aquí conviene mantener la invocación.'
  revised_spanish_text: Bendigan al Señor, oh, cielos; cántenle alabanzas y exáltenlo en gran manera para siempre.
  revision_rationale: Se actualizan los imperativos a formas naturales para español neutral («Bendigan», «cántenle», «exáltenlo») y se reemplaza «grandemente» por «en gran manera», que conserva mejor la intensificación hímnica con mayor naturalidad. Se ajusta también la puntuación del vocativo.
