translation:
  language: es
  text: Y a todos los que lo rodean —sus ayudantes[a] y todas sus tropas— los dispersaré a todos los vientos[b], y sacaré una espada tras ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su ayuda'; el hebreo usa una expresión colectiva que puede referirse a quienes lo asisten.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'a todo viento'; es decir, en todas direcciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבִיבֹתָיו
  english_pob_choice: who are around him
  chosen_spanish: los que lo rodean
  alternatives_spanish:
  - los que están alrededor de él
  - los que lo rodean a él
  lexicon: HALOT
  rationale: El hebreo designa a quienes están en torno al sujeto con sufijo de 3ms. En español, una relativa simple conserva la relación espacial/personal sin forzar una perífrasis más pesada.
- source_word: עֶזְרָה
  english_pob_choice: his helpers
  chosen_spanish: sus ayudantes
  alternatives_spanish:
  - su ayuda
  - sus auxiliares
  lexicon: HALOT
  rationale: El texto hebreo apunta a personas que ayudan, no a una abstracción como 'ayuda'. 'Ayudantes' transmite el sentido colectivo y sigue de cerca la revisión inglesa que corrigió la lectura abstracta.
- source_word: אֲגַפָּיו
  english_pob_choice: his troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus divisiones
  - sus bandos
  lexicon: HALOT
  rationale: Aunque el término puede tener sentido literal de 'alas/extremos', en este contexto político-militar se refiere a fuerzas acompañantes. 'Tropas' refleja mejor el valor idiomático contextual.
- source_word: אֱזָרֶה
  english_pob_choice: I will scatter
  chosen_spanish: los dispersaré
  alternatives_spanish:
  - los esparciré
  - los desparramaré
  lexicon: HALOT
  rationale: El verbo en piel expresa dispersión; aplicado a personas, 'dispersar' es la opción natural y precisa en español bíblico contemporáneo.
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: a todos los vientos
  alternatives_spanish:
  - en todas direcciones
  - hacia cada viento
  lexicon: HALOT
  rationale: Conservo la imagen hebrea en una forma idiomática española. 'A todos los vientos' mantiene el valor figurado de dispersión universal sin sonar artificial.
- source_word: חֶרֶב אָרִיק אַחֲרֵיהֶם
  english_pob_choice: I will draw out a sword after them
  chosen_spanish: sacaré la espada detrás de ellos
  alternatives_spanish:
  - desenvainaré la espada tras ellos
  - sacaré una espada tras ellos
  lexicon: HALOT
  rationale: La construcción verbal con 'espada' comunica la acción de desenvainar o sacar. 'Detrás de ellos' preserva el matiz de persecución de אַחֲרֵיהֶם, aunque en español la preposición suena más natural que una calca estricta.
translation_notes:
  revision_awareness: 'La redacción sigue el paquete hebreo WLC y la audición inglesa: mantiene la distinción entre los que lo rodean, sus ayudantes y sus tropas; conserva la imagen de dispersión ''a todos los vientos''; y refleja el matiz de persecución en ''después/detrás de ellos'' sin introducir una lectura doctrinal adicional.'
  spanish_consistency_notes:
  - Se prefirió 'ayudantes' y no 'ayuda' para evitar una abstracción que el contexto no exige.
  - Se conservó la imagen de 'vientos' por ser una metáfora hebrea transparente y ya explicitada en la nota.
  - '''Espada'' se mantuvo sin añadir ''desenvainar'' en el texto principal para no exceder el hebreo, aunque la nota lexical reconoce la idiomaticidad de la acción.'
  - El registro es bíblico moderno y sobrio, evitando fórmulas eclesiásticas tradicionales no requeridas por el source packet.
