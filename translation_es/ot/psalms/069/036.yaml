    text: Or 'inherit her' or 'take possession of her.' The Hebrew verb can carry the sense of inheriting or taking possession, especially of land.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'possess her,' with a feminine singular pronoun, likely referring to Zion or the land personified.
    reason: alternative_reading
