translation:
  language: es
  text: 'Entonces comenzó a decirles: «Hoy esta Escritura se ha cumplido al oírla ustedes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en sus oídos».
