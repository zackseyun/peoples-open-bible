translation:
  language: es
  text: He aquí[a], estas cosas están escritas en el libro de los días de su sumo sacerdocio, desde que llegó a ser sumo sacerdote después de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «en los anales de su sumo sacerdocio». El griego dice más literalmente: «en el libro de los días de su sumo sacerdocio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: LSJ
  rationale: Conserva la función de llamada de atención del griego con un imperativo plural natural en español bíblico contemporáneo. "He aquí" sería más tradicional, pero suena más marcado y menos directo aquí.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - esto
  lexicon: LSJ
  rationale: El plural neutro se refiere al conjunto de los asuntos narrados; "estas cosas" mantiene el alcance amplio sin volverlo demasiado abstracto.
- source_word: γέγραπται
  english_pob_choice: are written
  chosen_spanish: están escritas
  alternatives_spanish:
  - han sido escritas
  - quedan escritas
  lexicon: LSJ
  rationale: El perfecto pasivo expresa un registro ya establecido con vigencia presente. "Están escritas" comunica bien la permanencia documental en español.
- source_word: ἐπὶ βιβλίῳ
  english_pob_choice: in the book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en un libro
  - sobre el libro
  - en el rollo
  lexicon: LSJ
  rationale: En contexto documental, la preposición apunta al lugar del registro; "en el libro" es la solución española más natural y fiel.
- source_word: ἡμερῶν
  english_pob_choice: of the days
  chosen_spanish: de los días
  alternatives_spanish:
  - de las crónicas
  - de los anales
  - de los registros
  lexicon: LSJ
  rationale: Se mantiene la forma literal del genitivo plural, como en la traducción inglesa, porque el sintagma parece reflejar un título archivístico y no conviene interpretarlo demasiado.
- source_word: ἀρχιερωσύνης
  english_pob_choice: high priesthood
  chosen_spanish: sumo sacerdocio
  alternatives_spanish:
  - oficio de sumo sacerdote
  - pontificado
  lexicon: LSJ
  rationale: '"Sumo sacerdocio" es el equivalente bíblico usual y conserva el valor del sustantivo de oficio/tenencia. "Pontificado" introduce un matiz eclesiástico ajeno al contexto.'
- source_word: ἀφʼ οὗ
  english_pob_choice: from the time when
  chosen_spanish: desde que
  alternatives_spanish:
  - desde el momento en que
  - a partir de cuando
  lexicon: LSJ
  rationale: La expresión marca el inicio temporal de ese registro. "Desde que" reproduce de modo idiomático esa referencia inicial en español.
- source_word: ἐγενήθη
  english_pob_choice: he became
  chosen_spanish: se hizo
  alternatives_spanish:
  - llegó a ser
  - fue hecho
  lexicon: LSJ
  rationale: Para la entrada en el cargo, "se hizo" transmite el cambio de estado sin añadir un agente explícito que el griego no menciona.
- source_word: μετὰ τὸν πατέρα αὐτοῦ
  english_pob_choice: after his father
  chosen_spanish: después de su padre
  alternatives_spanish:
  - en sucesión a su padre
  - tras su padre
  lexicon: LSJ
  rationale: La frase indica sucesión temporal y de cargo. "Después de su padre" es fiel y claro en español, sin sobreexplicar la relación sucesoria.
theological_decisions:
- issue: Designación del cargo sacerdotal
  english_pob_reading: high priesthood
  chosen_spanish_reading: sumo sacerdocio
  alternative_spanish_readings:
  - pontificado
  - alto sacerdocio
  rationale: No hay una cuestión doctrinal controvertida aquí, pero sí una preferencia terminológica. "Sumo sacerdocio" evita resonancias católicas de "pontificado" y corresponde mejor al lenguaje bíblico judío del texto.
  doctrine_reference: Terminología bíblica del sacerdocio levítico
- issue: Inicio de la cronología oficial
  english_pob_reading: from the time when he became high priest after his father
  chosen_spanish_reading: desde que se hizo sumo sacerdote después de su padre
  alternative_spanish_readings:
  - desde el momento en que fue hecho sumo sacerdote tras su padre
  - desde que asumió el sumo sacerdocio después de su padre
  rationale: El griego presenta un simple inicio de período cronológico, no una tesis teológica. La traducción elegida mantiene la neutralidad histórica y evita añadir matices de investidura ritual no explícitos.
  doctrine_reference: Historiografía de 1 Macabeos
translation_notes:
  revision_awareness: Coincide con la lectura inglesa auditada y con la comprobación de alta concordancia; no se requieren revisiones textuales ni cambios de sentido. Se mantiene la literalidad documental de «libro de los días» con una nota interpretativa opcional equivalente a la del inglés.
  spanish_consistency_notes:
  - Se usa «Miren» como equivalente directo de ἰδοὺ, manteniendo tono de aviso sin forzar solemnidad excesiva.
  - «Sumo sacerdocio» se emplea de forma consistente para ἀρχιερωσύνη y evita términos eclesiásticos ajenos al marco del texto.
  - La estructura temporal «desde que» conserva la idea de inicio de registro presente en ἀφʼ οὗ.
  - No se introduce «Cristo», «Señor» ni otro término de tradición posterior, pues el versículo no los contiene.
