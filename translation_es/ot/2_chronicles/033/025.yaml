translation:
  language: es
  text: Pero el pueblo de la tierra dio muerte a todos los que habían conspirado contra el rey Amón[a][b], y el pueblo de la tierra hicieron rey a Josías su hijo en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los conspiradores».'
    reason: lexical_alternative
  - marker: b
    text: «El pueblo de la tierra» es una expresión hebrea que puede designar a la población del país, quizá con matices socio-políticos.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - mató
  - derribó
  - hirió de muerte
  lexicon: HALOT
  rationale: El hifil/wayyiqtol de נכה puede expresar golpear con resultado letal en narración. «Hirió» conserva el golpe violento sin añadir una explicitud interpretativa que el hebreo no obliga a poner en el verbo mismo; el contexto deja claro que el acto fue contra los conspiradores y con desenlace severo.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - el pueblo del país
  - la gente de la tierra
  - los habitantes del país
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea reconocible y su posible matiz socio-político. «El pueblo de la tierra» mantiene la transparencia del hebreo mejor que una normalización como «la gente del país».
- source_word: כָּל הַקֹּשְׁרִים
  english_pob_choice: all those who had conspired
  chosen_spanish: todos los que habían conspirado
  alternatives_spanish:
  - todos los conspiradores
  - todos los que tramaban
  - todos los que se habían unido en conjura
  lexicon: HALOT
  rationale: El participio de קשר designa a quienes participaron en una conspiración. «Habían conspirado» conserva el valor verbal del participio y su carácter colectivo, sin perder naturalidad en español.
- source_word: עַל הַמֶּלֶךְ אָמוֹן
  english_pob_choice: against King Amon
  chosen_spanish: contra el rey Amón
  alternatives_spanish:
  - contra el rey Amon
  - contra Amón, el rey
  - contra el rey Amon
  lexicon: HALOT
  rationale: Con קשר + על, el sentido es hostilidad/conspiración contra alguien. «Contra el rey Amón» es la opción más clara y fiel; se mantiene el nombre con acento según uso español.
- source_word: וַיַּמְלִיכוּ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey a Josías
  alternatives_spanish:
  - lo hicieron rey
  - lo proclamaron rey
  - lo pusieron por rey
  lexicon: HALOT
  rationale: El hifil de מלך significa hacer rey o hacer reinar. «Hizo rey a Josías» conserva la causalidad del verbo sin introducir una ceremonia de coronación no mencionada en el texto.
- source_word: יֹאשִׁיָּהוּ בְנוֹ
  english_pob_choice: Josiah his son
  chosen_spanish: Josías su hijo
  alternatives_spanish:
  - Josías, su hijo
  - Josías, el hijo de él
  - Josías, hijo suyo
  lexicon: HALOT
  rationale: La construcción aposicional identifica a Josías como hijo de Amón. En español puede expresarse con posesivo sin sobrecargar la puntuación, manteniendo la relación filial explícita.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en vez de él
  - como sucesor suyo
  lexicon: HALOT
  rationale: La expresión marca sucesión o reemplazo. «En su lugar» es idiomática en español y comunica con claridad el cambio dinástico.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: Se conserva la transición contrastiva reconocida por el audit trail en inglés. «Pero» refleja bien el contraste con el contexto inmediato del asesinato de Amón.
theological_decisions:
- issue: El alcance socio-político de «el pueblo de la tierra»
  english_pob_reading: The people of the land is a Hebrew expression that can denote the populace of the country, possibly with socio-political overtones.
  chosen_spanish_reading: «El pueblo de la tierra» se deja transparente, con posible matiz socio-político abierto.
  alternative_spanish_readings:
  - «el pueblo del país»
  - «la población de la tierra»
  - «los notables del país»
  rationale: El hebreo admite una expresión técnica con posible carga social y política. Traducirla de modo interpretativo cerraría un matiz que el texto no explicita; por eso se mantiene la forma literal con una nota aclaratoria.
  doctrine_reference: N/A
- issue: La fuerza narrativa de la acción violenta
  english_pob_reading: struck down often implies lethal force in narrative contexts.
  chosen_spanish_reading: «hirió» mantiene la violencia sin convertir el verbo en una glosa interpretativa total.
  alternative_spanish_readings:
  - «mató»
  - «dio muerte a»
  - «hirió de muerte»
  rationale: El hebreo permite una gama que va de golpear a matar, y el contexto histórico sugiere un desenlace letal. El español «hirió» preserva la tensión sin resolverla demasiado rápido; la letalidad queda apoyada por el contexto narrativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés de la POB sin cambios de revisión aplicados; el resultado mantiene la misma estructura narrativa y las mismas decisiones léxicas clave, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo «pueblo de la tierra» como calco transparente por tratarse de una expresión técnica.
  - Se conservó la secuencia contrastiva inicial con «Pero» siguiendo el audit trail inglés.
  - Se usó «Amón» y «Josías» con acentuación española habitual.
  - Se evitó «coroó/coronó» o «proclamó» para no introducir ceremonialidad no explicitada en el hebreo.
  - 'La relación filial y sucesoria quedó explícita en la frase final: «Josías su hijo en su lugar».'
