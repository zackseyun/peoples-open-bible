    issue: «para paz» es una construcción poco idiomática en español
    rationale: Aunque refleja de cerca לְשָׁלוֹם, en español suena forzada. «En son de paz» comunica de manera natural la idea de venir con intención pacífica, que es precisamente la rationale documentada.
  - severity: medium
    issue: «para batalla» suena menos natural que alternativas españolas más fluidas
    rationale: El hebreo לְמִלְחָמָה expresa propósito bélico. «A la batalla» o «para combatir» lo expresan mejor en español. «A la batalla» mantiene además la brevedad y el paralelismo funcional del texto.
  - severity: low
    issue: La nota con «para guerra» conserva un giro algo rígido
    rationale: La alternativa inglesa incluye «for war»; en español, «para la guerra» suena más natural si se desea mantener esa variante nominal.
  revised_spanish_text: 'Y dijo[a]: «Si han salido en son de paz, captúrenlos vivos; y si han salido a la batalla, captúrenlos vivos».'
