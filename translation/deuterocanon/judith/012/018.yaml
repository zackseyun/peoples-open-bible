  text: καὶ εἶπεν Ἰουδείθ Πίομαι δή, κύριε, ὅτι ἐμεγαλύνθη τὸ ζῆν μου ἐν ἐμοὶ σήμερον παρὰ πάσας τὰς ἡμέρας τῆς γενέσεώς μου.
