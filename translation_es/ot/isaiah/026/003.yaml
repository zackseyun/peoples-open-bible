translation:
  language: es
  text: Tú guardarás en paz perfecta[a] la mente[b] que está fija en ti[c], porque confía en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «paz, paz»; la repetición intensifica la idea de paz plena o completa.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «la inclinación» o «la disposición interior» para יֵצֶר.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «Tú lo guardarás en completa paz, cuyo pensamiento en ti persevera». El hebreo dice más directamente «la mente» como sujeto.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵצֶר
  english_pob_choice: the mind
  chosen_spanish: la mente
  alternatives_spanish:
  - la inclinación
  - la disposición interior
  - el pensamiento
  lexicon: HALOT
  rationale: En este contexto, יֵצֶר nombra la disposición interior o el marco mental de la persona. «La mente» es natural en español y conserva la referencia al estado interior sin forzar una abstracción técnica.
- source_word: סָמ֔וּךְ
  english_pob_choice: that is stayed on you
  chosen_spanish: que se mantiene firme en ti
  alternatives_spanish:
  - apoyada en ti
  - sostenida en ti
  - afirmada en ti
  lexicon: HALOT
  rationale: El participio comunica estar apoyado, sostenido o fijado con firmeza. «Se mantiene firme en ti» conserva la idea de estabilidad y dependencia relacional expresada por el contexto y por בְּךָ.
- source_word: תִּצֹּ֖ר
  english_pob_choice: You keep
  chosen_spanish: Tú guardarás
  alternatives_spanish:
  - Tú preservarás
  - Tú custodiarás
  - Tú protegerás
  lexicon: HALOT
  rationale: נצר puede significar guardar, preservar o vigilar. «Guardarás» es natural en español bíblico contemporáneo y mantiene la idea de acción protectora de Dios.
- source_word: שָׁלוֹם שָׁלוֹם
  english_pob_choice: perfect peace
  chosen_spanish: paz perfecta
  alternatives_spanish:
  - paz, paz
  - paz completa
  - paz plena
  lexicon: HALOT
  rationale: La repetición intensifica la noción de plenitud. «Paz perfecta» comunica bien esa intensificación en español, y la alternativa más literal puede conservarse en nota.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la promesa anterior. «Porque» expresa con claridad la relación causal en español moderno.
- source_word: בְךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - en tu persona
  lexicon: HALOT
  rationale: La preposición marca el objeto de confianza. «En ti» es la manera natural de expresar esta dependencia en español y preserva el sentido relacional.
- source_word: בָּטוּחַ
  english_pob_choice: it trusts
  chosen_spanish: confía
  alternatives_spanish:
  - está confiada
  - descansa
  - se siente segura
  lexicon: HALOT
  rationale: La forma expresa seguridad/confianza; en español, «confía» comunica con claridad la confianza implícita en el participio sin introducir un sujeto masculino ausente en el hebreo.
theological_decisions:
- issue: Sujeto de la cláusula y lectura antropológica
  english_pob_reading: the verse speaks of the person's inner disposition ('the mind') rather than explicitly 'him whose mind'
  chosen_spanish_reading: el versículo habla directamente de la disposición interior, «la mente», no de un sujeto masculino explícito
  alternative_spanish_readings:
  - Tú lo guardarás en paz perfecta, cuyo pensamiento se mantiene firme en ti
  - Tú guardarás en paz perfecta al que tiene la mente firme en ti
  rationale: El hebreo presenta יֵצֶר como sujeto. Mantener «la mente» evita introducir un pronombre masculino que no está explícito en el texto fuente, pero conserva el sentido personal y devocional del versículo.
  doctrine_reference: Principio de primacía del texto original; nota POB sobre el sujeto explícito
- issue: Intensificación de שָׁלוֹם שָׁלוֹם
  english_pob_reading: perfect peace
  chosen_spanish_reading: paz perfecta
  alternative_spanish_readings:
  - paz, paz
  - paz completa
  - paz plena
  rationale: La repetición hebrea intensifica la plenitud de la paz. «Paz perfecta» transmite esa plenitud de forma idiomática en español, mientras que la lectura más literal queda disponible como alternativa.
  doctrine_reference: Poética hebrea; principio de equivalencia óptima
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y la base hebrea. Se mantuvo la decisión de traducir el sujeto como una realidad interior («la mente») y de reflejar la repetición intensiva de שָׁלוֹם con una expresión idiomática en español, conservando las alternativas literales en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando el texto no requiere ocultar el nombre divino.
  - Se mantiene un registro semántico claro entre «mente», «disposición interior» e «inclinación» para evitar aplanar יֵצֶר.
  - «Guardarás» conserva el matiz protector de נצר sin cambiarlo por un simple «vigilarás».
  - La puntuación y el orden de las cláusulas buscan ser publicables y transparentes al hebreo.
  - Las notas usan marcadores únicos y anclados solo donde hay ambigüedad o alternativa significativa.
