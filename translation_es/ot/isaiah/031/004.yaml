translation:
  language: es
  text: 'Porque así me dijo Yahvé: Como el león[a] o el leoncillo gruñe sobre su presa, y aunque una multitud de pastores es convocada contra él, no se espanta por su voz ni se intimida por su alboroto[b], así Yahvé de los ejércitos descenderá para hacer guerra sobre el monte Sión y sobre su colina.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el león y el leoncillo'; la pareja hebrea puede leerse como un doblete poético, no necesariamente como dos animales separados.
    reason: lexical_alternative
  - marker: b
    text: O 'ni responde a su alboroto'; el verbo hebreo puede entenderse más literalmente como 'responder', aunque en este contexto parece indicar que no queda intimidado por el ruido.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino, preservando el Tetragrámaton con una forma española auditable y ampliamente legible.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - con respecto a mí
  lexicon: HALOT
  rationale: En la fórmula profética, la preposición con sufijo indica dirección de la palabra hacia el profeta; 'a mí' es natural y fiel.
- source_word: יֶהְגֶּה
  english_pob_choice: growls
  chosen_spanish: ruge
  alternatives_spanish:
  - gruñe
  - emite un rugido bajo
  lexicon: HALOT
  rationale: El verbo describe el sonido grave e intencional del león sobre su presa. En español, 'ruge' comunica bien el registro animal y poético, aunque no intenta fijar una intensidad mayor de la que exige el contexto.
- source_word: הָאַרְיֵה וְהַכְּפִיר
  english_pob_choice: the lion or the young lion
  chosen_spanish: el león o el leoncillo
  alternatives_spanish:
  - el león y el leoncillo
  - el león, o el cachorro de león
  lexicon: HALOT
  rationale: Se conserva el paralelismo de adulto/joven y la posibilidad poética de leer la pareja como binomio o doblete. 'Leoncillo' evita una expresión excesivamente zoológica en español.
- source_word: טַרְפּוֹ
  english_pob_choice: its prey
  chosen_spanish: su presa
  alternatives_spanish:
  - su botín
  - lo que ha cazado
  lexicon: HALOT
  rationale: '''Presa'' corresponde con precisión al animal de caza y mantiene la imagen depredadora.'
- source_word: מְלֹא רֹעִים
  english_pob_choice: a multitude of shepherds
  chosen_spanish: una multitud de pastores
  alternatives_spanish:
  - un gran número de pastores
  - una muchedumbre de pastores
  lexicon: HALOT
  rationale: מְלֹא expresa plenitud o número completo; el contexto pide un grupo numeroso reunido contra el león. 'Multitud' conserva la fuerza colectiva que la revisión inglesa priorizó.
- source_word: יִקָּרֵא עָלָיו
  english_pob_choice: is called out against it
  chosen_spanish: se reúne contra él
  alternatives_spanish:
  - es convocada contra él
  - se llama contra él
  lexicon: HALOT
  rationale: El Niphal de קרא puede implicar ser llamado/convocado. En español, 'se reúne contra él' transmite el sentido colectivo y adversativo con fluidez; además, evita una construcción demasiado literal que suene extraña.
- source_word: לֹא יֵחָת
  english_pob_choice: it is not dismayed
  chosen_spanish: no se espanta
  alternatives_spanish:
  - no se aterra
  - no se desanima
  lexicon: HALOT
  rationale: חתת en Niphal expresa miedo o abatimiento. 'No se espanta' es idiomático en español y conserva la imagen del león que no cede ante la amenaza.
- source_word: לֹא יַעֲנֶה
  english_pob_choice: is intimidated by their noise
  chosen_spanish: ni se intimida por su alboroto
  alternatives_spanish:
  - ni responde a su tumulto
  - ni se amedrenta por su ruido
  lexicon: HALOT
  rationale: 'El verbo puede entenderse como ''responder'' o como quedar doblegado/intimidado. Se conserva la tensión semántica con una lectura de efecto: el león no se deja vencer por el estrépito.'
- source_word: הֲמוֹנָם
  english_pob_choice: their noise
  chosen_spanish: su alboroto
  alternatives_spanish:
  - su tumulto
  - su ruido
  lexicon: HALOT
  rationale: '''Alboroto'' comunica la idea de estruendo colectivo sin perder naturalidad en español contemporáneo.'
- source_word: יֵרֵד
  english_pob_choice: will come down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - vendrá abajo
  lexicon: HALOT
  rationale: Se mantiene la imagen de movimiento desde arriba hacia abajo con un verbo formal y claro.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: '''De los ejércitos'' conserva la fuerza marcial del título sin recurrir a una formulación litúrgica opaca.'
- source_word: לִצְבֹּא
  english_pob_choice: to wage war
  chosen_spanish: para hacer guerra
  alternatives_spanish:
  - para combatir
  - para ir a la guerra
  lexicon: HALOT
  rationale: El verbo צבא aquí es militar. 'Hacer guerra' mantiene el valor bélico explícito y resulta natural en español bíblico moderno.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sión
  alternatives_spanish:
  - el monte de Sión
  - el monte Zion
  lexicon: HALOT
  rationale: '''Monte Sión'' es el equivalente más claro y estable en español para el topónimo bíblico.'
- source_word: גִּבְעָתָהּ
  english_pob_choice: its hill
  chosen_spanish: su collado
  alternatives_spanish:
  - su colina
  - su monte
  lexicon: HALOT
  rationale: El sufijo femenino remite a Sión. 'Collado' conserva el relieve menor del hebreo y suena bíblicamente natural en español; 'su' mantiene la referencia posesiva.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Nombre divino. Se conserva su presencia en la traducción española sin ocultarlo bajo un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Interpretation of לֹא יַעֲנֶה in the lion simile
  english_pob_reading: not intimidated by their noise
  chosen_spanish_reading: ni se intimida por su alboroto
  alternative_spanish_readings:
  - ni responde a su ruido
  - ni se amedrenta por su tumulto
  rationale: La paralela 'no se espanta' favorece un sentido de no quedar vencido o intimidado por el estrépito, sin forzar una respuesta verbal donde el contexto no la pide.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se incorporó la revisión inglesa más reciente al preferir ''una multitud de pastores'' y una concesiva con ''aunque''. En español se mantuvo esa concesión y se eligieron equivalentes más naturales y fieles: ''no se espanta... ni se intimida...'' para conservar el paralelismo y la fuerza poética. También se evitó traducir mecánicamente ''hosts'' como ''huestes'' sin necesidad contextual, y se preservó la ambigüedad controlada de la pareja ''león/leoncillo''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se usa 'Monte Sión' y 'su collado' para preservar el paralelismo topográfico.
  - '''Pastores'' traduce רֹעִים en su sentido literal, sin añadir interpretación alegórica.'
  - La estructura 'Como..., y aunque..., así...' refleja la comparación concesiva del hebreo y la revisión inglesa.
  - '''No se espanta'' / ''ni se intimida'' conserva el efecto doble del hebreo: falta de miedo y falta de sometimiento al estrépito.'
