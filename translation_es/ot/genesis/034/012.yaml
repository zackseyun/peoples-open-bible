revisions:
- from: Exigid de mí un precio de novia[a] y un presente muy grande, y yo daré lo que me digáis; solo dadme la joven por esposa.
  to: Exíjanme un precio de novia[a] y un presente muy altos, y les daré lo que me digan; solo denme a la joven por esposa.
  rationale: Se ajusta el verso al español neutral latinoamericano sustituyendo las formas de vosotros por formas de ustedes. También se reubica el intensificador para que «muy altos» modifique conjuntamente la exigencia de pago y presente, reflejando mejor el alcance de מְאֹד en contexto. Se mantiene «precio de novia» como elección principal, con nota que preserva la alternativa tradicional pero potencialmente engañosa «dote».
