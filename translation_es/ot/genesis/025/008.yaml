  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé/Mesías ni otros términos controlados. La elección 'su pueblo' para עַמָּיו y 'saciado' para שָׂבֵעַ es defendible y coherente con el audit trail.
