review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo y mantiene varias decisiones clave del POB: «Yahvé», la imagen concreta del pie, «delicia», el pronombre principal referido al sábado, y la literalidad de «ni hablar palabra». Sin embargo, hay problemas importantes de fidelidad formal y de anclaje de notas: «al santo de Yahvé honorable» suena como si «santo» fuera una persona, no una referencia condensada al día/cosa santa de Yahvé; además, las notas a, b, c están desancladas o mal colocadas respecto de su contenido.'
  spanish_quality_summary: La legibilidad es mixta. «Si apartas tu pie del sábado» es aceptable, pero «hacer tu propio placer» y especialmente «al santo de Yahvé honorable» suenan poco naturales o ambiguos en español eclesial general. Conviene ajustar a una formulación más clara pero todavía cercana al hebreo, como «la cosa santa de Yahvé, honorable». También deben corregirse los marcadores de notas para que coincidan con el término pertinente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. La principal desviación no es glosarial sino semántico-estilística: «santo» como sustantivo personaliza indebidamente לִקְדוֹשׁ יְהוָה. Las notas deben preservar la alternativa «y honrarlo / y honrarlo a él» en el lugar de «lo honras», y las alternativas léxicas de «tu propio placer» y «ni hablar palabra» en sus frases correspondientes.'
  issues:
  - severity: high
    issue: La frase «al santo de Yahvé honorable» es semánticamente ambigua y poco fiel en español.
    rationale: En español, «el santo de Yahvé» normalmente se oye como una persona santa, no como la referencia condensada hebrea al sábado como lo santo de Yahvé. Esto distorsiona el referente y afecta la comprensión del versículo.
  - severity: high
    issue: Los marcadores de notas están mal asignados.
    rationale: La nota a habla del pronombre de «y lo honras», pero está anclada a «sábado». La nota b explica «ni hablar palabra», pero está anclada a «lo honras». La nota c trata «tu propio placer», pero está anclada al final. Esto incumple la disciplina de notas del proyecto.
  - severity: medium
    issue: «de hacer tu propio placer» suena poco natural en español.
    rationale: Aunque es formalmente cercano al hebreo/inglés, en español general resulta duro. «de procurar tu propio placer» o «de hacer lo que te agrada» sería más idiomático; sin embargo, para conservar la continuidad léxica con la segunda mención de חפץ, puede mantenerse «tu propio placer» con un verbo más natural.
  - severity: low
    issue: «y llamas al sábado delicia» es aceptable pero algo áspero.
    rationale: «Llamas al sábado una delicia» fluye mejor en español sin perder la estructura ‘llamar X Y’.
