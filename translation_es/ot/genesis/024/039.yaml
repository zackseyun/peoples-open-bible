translation:
  language: es
  text: 'Y dije a mi amo[a]: «Tal vez la mujer no me siga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no vaya tras de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  lexicon: HALOT
  rationale: El wayyiqtol de אמר avanza la narración en pasado. «Y dije» conserva la secuencia simple sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: אֶל אֲדֹנִי
  english_pob_choice: to my master
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  - a mi señor mío
  lexicon: HALOT
  rationale: אָדוֹן con sufijo de 1ª persona singular aquí se refiere al superior humano del siervo, Abraham, no a Dios. «Mi señor» expresa la relación de subordinación con naturalidad en español y evita la ambigüedad de «Señor» con mayúscula.
- source_word: אֻלַי
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Puede ser
  lexicon: HALOT
  rationale: La partícula expresa posibilidad o incertidumbre. «Tal vez» es natural, sobrio y fiel al tono cauteloso del hablante.
- source_word: לֹא תֵלֵךְ
  english_pob_choice: will not follow
  chosen_spanish: no me siga
  alternatives_spanish:
  - no vaya tras de mí
  - no venga conmigo
  lexicon: HALOT
  rationale: Aunque הלך significa «ir/caminar», con אַחֲרַי el sentido idiomático es «seguir». En español, «no me siga» comunica mejor la relación espacial y narrativa del original.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la muchacha
  lexicon: HALOT
  rationale: El sustantivo hebreo es simplemente «la mujer». Aunque el contexto apunta a una futura esposa, el texto todavía no la nombra así; por eso conviene mantener la designación más literal.
- source_word: אַחֲרַי
  english_pob_choice: follow me
  chosen_spanish: me siga
  alternatives_spanish:
  - vaya tras de mí
  - después de mí
  lexicon: HALOT
  rationale: La preposición con sufijo significa literalmente «después de mí / tras de mí», pero con הלך la equivalencia idiomática natural en español es «seguirme». La colocación pronominal conserva el vínculo semántico con el hebreo.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del audit trail inglés y mantiene la sencillez narrativa del hebreo, preservando la ambigüedad relativa entre «ir tras» y «seguir» mediante una nota breve.
  spanish_consistency_notes:
  - Se usa «mi señor» para un superior humano, evitando confundirlo con el título divino.
  - Se mantiene «la mujer» por fidelidad al sustantivo hebreo, sin anticipar «esposa».
  - La nota a recoge la alternativa más literal del hebreo para אַחֲרַי, mientras que el texto principal usa el equivalente idiomático español.
