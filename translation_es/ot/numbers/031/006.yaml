    reason: lexical_alternative
  - marker: b
    text: O «las trompetas para la señal» o «las trompetas de alarma».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a los mismos elementos léxicos documentados en el POB inglés. También se ajustó «vasos santos» a «utensilios santos» para mejor naturalidad en español, y «trompetas de la señal» a «trompetas para la señal de guerra» para preservar con mayor claridad el matiz militar de תְּרוּעָה en este contexto. Se mantuvo la repetición de «a ellos» y el singular «en su mano» por fidelidad al hebreo.
