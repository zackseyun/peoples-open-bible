translation:
  language: es
  text: para que tus hijos, a quienes amaste, aprendan, oh Señor, que no es el producto de los cultivos lo que alimenta al hombre[c][a], sino tu palabra la que preserva a los que confían en ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Producto de los cultivos» traduce el sentido agrícola de la expresión griega; no se refiere a «generaciones» en sentido genealógico.
    reason: lexical_alternative
  - marker: b
    text: 'O: «creen en ti» o «tienen fe en ti».'
    reason: alternative_reading
  - marker: c
    text: «El hombre» conserva el singular representativo del griego, con valor general para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα μάθωσιν
  english_pob_choice: so that ... might learn
  chosen_spanish: para que ... aprendan
  alternatives_spanish:
  - a fin de que ... aprendan
  - para que ... lleguen a saber
  lexicon: LSJ
  rationale: ἵνα con subjuntivo expresa finalidad. En español, «para que» comunica bien ese valor purposivo sin forzar una construcción artificiosa.
- source_word: οἱ υἱοί σου
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: LSJ
  rationale: El griego dice literalmente «tus hijos/varones», pero el contexto permite un castellano natural. «Tus hijos» conserva la relación filial sin sobrerregularizar el género en español.
- source_word: οὓς ἠγάπησας
  english_pob_choice: whom you loved
  chosen_spanish: a quienes amaste
  alternatives_spanish:
  - a quienes has amado
  - a quienes amaste mucho
  lexicon: LSJ
  rationale: El aoristo se rinde de forma directa con pasado simple. La preposición «a» es necesaria en español con relativo personal.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Yahvé
  lexicon: LSJ
  rationale: Como el POB español usa «Yahvé» para יהוה, se mantiene aquí en vocativo. Aunque el griego dice Κύριε, en este contexto litúrgico-teológico la invocación corresponde al Nombre divino subyacente, no a un mero título genérico.
- source_word: οὐχ αἱ γενέσεις τῶν καρπῶν
  english_pob_choice: it is not the produce of crops
  chosen_spanish: no es el producto de los cultivos
  alternatives_spanish:
  - no son los productos de los frutos
  - no es el rendimiento de los cultivos
  - no es la cosecha de los frutos
  lexicon: LSJ
  rationale: γενέσεις aquí expresa producción, surgimiento o rendimiento, no «generaciones» en sentido genealógico. «Producto de los cultivos» capta el sentido agrícola y evita un calco poco natural. Se conserva el contraste con la palabra divina como fuente de preservación.
- source_word: τρέφουσιν ἄνθρωπον
  english_pob_choice: nourishes man
  chosen_spanish: alimenta al hombre
  alternatives_spanish:
  - sostiene al hombre
  - nutre al hombre
  - alimenta a la humanidad
  lexicon: LSJ
  rationale: τρέφω significa alimentar/nutrir/sostener. «Alimenta» es natural en español y mantiene la imagen de sustento. «Al hombre» conserva el singular representativo del griego ἄνθρωπον.
- source_word: ἀλλὰ τὸ ῥῆμά σου
  english_pob_choice: but your word
  chosen_spanish: sino tu palabra
  alternatives_spanish:
  - sino tu palabra dicha
  - sino tu dicho
  lexicon: LSJ
  rationale: ῥῆμα es «palabra» o «dicho». «Tu palabra» es la opción más clara y bíblicamente reconocible, sin perder el valor de palabra eficaz/emitida.
- source_word: τοὺς σοὶ πιστεύοντας
  english_pob_choice: those who trust in you
  chosen_spanish: a los que confían en ti
  alternatives_spanish:
  - a los que creen en ti
  - a quienes tienen fe en ti
  lexicon: LSJ
  rationale: Con dativo personal, πιστεύω puede expresar confianza/reliance. «Confían en ti» reproduce bien esa relación de dependencia personal que el contexto sugiere.
- source_word: διατηρεῖ
  english_pob_choice: preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - conserva
  - mantiene
  lexicon: LSJ
  rationale: διατηρέω implica preservar/guardar con seguridad. «Preserva» refleja mejor la idea de sostener y mantener a salvo en contraste con el alimento ordinario.
theological_decisions:
- issue: Renderización del nombre divino en el vocativo
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  - oh Dios
  rationale: Aunque el griego tiene Κύριε, el verso remite al Nombre divino de la tradición bíblica; en el sistema POB español se traduce el Tetragrámaton como «Yahvé». Mantener «Yahvé» aquí evita ocultar esa referencia y conserva la coherencia terminológica del proyecto.
  doctrine_reference: DOCTRINE.md §Nombres divinos
- issue: Valor representativo de ἄνθρωπον
  english_pob_reading: man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - a la persona humana
  rationale: El griego usa el singular con valor general. «Al hombre» conserva esa fuerza representativa sin ampliar indebidamente el alcance ni despersonalizar el enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: πιστεύοντας como confianza personal
  english_pob_reading: those who trust in you
  chosen_spanish_reading: a los que confían en ti
  alternative_spanish_readings:
  - a los que creen en ti
  - a los que tienen fe en ti
  rationale: En este contexto la idea no es meramente asentimiento mental, sino dependencia confiada en la palabra divina que preserva. «Confían en ti» expresa mejor esa relación, aunque «creen en ti» sigue siendo una lectura posible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5; Contested terms table for πίστις
translation_notes:
  revision_awareness: El audit trail inglés muestra un ajuste reciente de «sons» a «children» por naturalidad; por eso se adoptó «tus hijos» en español, que mantiene la naturalidad sin perder la referencia filial. También se siguió la decisión revisada de entender γενέσεις τῶν καρπῶν como producción/rendimiento agrícola, no como ‘generaciones’.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar POB español para el Nombre divino.
  - Se evitó «Señor» para no ocultar la referencia al Nombre cuando el griego vocativo apunta al Dios de Israel.
  - «Confían en ti» conserva la fuerza relacional de πιστεύω con dativo.
  - La puntuación conserva el contraste enfático entre sustento ordinario y palabra divina preservadora.
