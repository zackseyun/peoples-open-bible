source:
  edition: SBLGNT
  text: ἡμεῖς μωροὶ διὰ Χριστόν, ὑμεῖς δὲ φρόνιμοι ἐν Χριστῷ· ἡμεῖς ἀσθενεῖς, ὑμεῖς δὲ ἰσχυροί· ὑμεῖς ἔνδοξοι, ἡμεῖς δὲ ἄτιμοι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/010.yaml
  text: We are fools for Messiah[a], but you are wise in Messiah; we are weak, but you are strong; you are honored[c][b], but we are dishonored.
  footnotes:
  - marker: a
    text: 'Or ''for Christ'' / ''because of the Messiah.'' The Greek phrase διὰ Χριστόν can express reason or purpose.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in Christ.'' The Greek has the common Pauline expression ἐν Χριστῷ.'
    reason: lexical_alternative
  - marker: c
    text: '''Honored'' and ''dishonored'' here likely refer to public status and shame in the eyes of others, not merely inward feelings.'
    reason: cultural_note
translation:
  language: ko
  text: 우리는 메시아 때문에 어리석은 자들이고, 여러분은 메시아 안에서 분별 있는 자들입니다. 우리는 약하고 여러분은 강합니다. 여러분은 영예롭고 우리는 모욕을 받습니다.
  philosophy: optimal-equivalence
