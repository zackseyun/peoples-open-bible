revisions:
- from: Y no levantarás para ti una piedra erigida[a], la cual Yahvé tu Dios aborrece.
  to: Y no levantarás para ti un pilar[a], que Yahvé tu Dios aborrece.
  rationale: Se reemplaza «piedra erigida» por «pilar» para alinearse mejor con מַצֵּבָה y con la decisión principal del POB en inglés, evitando una expresión española redundante y menos natural. Se simplifica «la cual» a «que» por fluidez. Se conserva la nota léxica para mantener las alternativas interpretativas documentadas.
