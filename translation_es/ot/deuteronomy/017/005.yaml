revisions:
- from: Entonces sacarás a ese hombre o a esa mujer que hayan hecho esta cosa mala[a], a tus puertas; al hombre o a la mujer, y los apedrearás con piedras[b], y morirán.
  to: Entonces sacarás a las puertas de tu ciudad[a] a ese hombre o a esa mujer que hicieron esta cosa mala[b], a ese hombre o a esa mujer, y los apedrearás con piedras, y morirán.
  rationale: La revisión corrige un uso verbal menos fiel («hayan hecho»), mejora la naturalidad y claridad de «a tus puertas» mediante «a las puertas de tu ciudad» sin perder el referente original, y ajusta la nota léxica a un español más idiomático. Se conserva la estructura legal solemne, la formulación de género explícito, y la mención concreta de apedrear con piedras.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:30:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: mantiene la formulación de género explícito, el lugar judicial en las puertas, y la pena de apedreamiento con la mención explícita de piedras. Sin embargo, hay dos desajustes principales: (1) «que hayan hecho» introduce un subjuntivo perfecto menos directo que el simple relativo factual del hebreo עָשׂוּ; «que hicieron» o «que cometieron» refleja mejor el valor narrativo/legal. (2) La puntuación de «a tus puertas» interrumpe de forma poco natural el flujo; además, en español bíblico y jurídico suena más claro «a las puertas de tu ciudad» que el literal «a tus puertas», especialmente porque la nota ya explica el trasfondo cultural. También la nota b con «materia mala» es poco idiomática; «asunto malo» o mejor «este asunto malo» sería más natural, aunque el texto principal puede conservar «cosa».'
  spanish_quality_summary: 'El español es generalmente comprensible, pero «esta cosa mala» suena algo tosco y «a tus puertas» resulta poco natural en español moderno sin complemento explícito. La sintaxis mejora si se recoloca el complemento locativo y se simplifica la relativa: «Entonces sacarás a las puertas de tu ciudad a ese hombre o a esa mujer que hicieron esta mala cosa[a]...». No obstante, para respetar más de cerca el POB inglés, conviene mantener «cosa» y la nota alternativa legal. «Apedrearás con piedras» es correcto y fiel.'
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener el par «hombre/mujer» está bien alineada con la política de precisión de género. La literalidad de «puertas» debe conservarse, pero en español es preferible explicitar «de tu ciudad» en el texto para evitar una lectura doméstica no pretendida, sin perder el sentido del original ni de la nota cultural.
  issues:
  - severity: medium
    issue: «que hayan hecho» no refleja óptimamente el relativo factual hebreo
    rationale: אֲשֶׁר עָשׂוּ es una cláusula relativa simple en contexto legal. El subjuntivo perfecto español añade una matización modal innecesaria; «que hicieron» es más directo y fiel.
  - severity: medium
    issue: «a tus puertas» es demasiado literal y poco natural en español
    rationale: Aunque el hebreo dice literalmente «a tus puertas», en español puede sugerir las puertas de una casa. «a las puertas de tu ciudad» conserva la referencia concreta y evita ambigüedad, coherente con la nota cultural del POB.
  - severity: low
    issue: La puntuación del complemento locativo entorpece la lectura
    rationale: La coma antes de «a tus puertas» y la repetición posterior hacen la frase pesada. Reordenar el complemento mejora la fluidez sin perder contenido.
  - severity: low
    issue: La nota b usa «materia mala», expresión poco idiomática
    rationale: Aunque «materia» puede ser posible en registro legal, en español bíblico general suena forzado. «asunto» comunica mejor la alternativa léxica de דָּבָר en contexto jurídico.
  revised_spanish_text: Entonces sacarás a las puertas de tu ciudad[a] a ese hombre o a esa mujer que hicieron esta cosa mala[b], a ese hombre o a esa mujer, y los apedrearás con piedras, y morirán.
  revised_footnotes:
  - marker: a
    text: «Las puertas de tu ciudad» alude a las puertas de la ciudad, el lugar acostumbrado de juicio y de procedimientos legales en el antiguo Israel.
    reason: cultural_note
  - marker: b
    text: O «este asunto malo». El hebreo דָּבָר puede significar «cosa» o «asunto» en un contexto legal.
    reason: lexical_alternative
