    text: 'O: «Una destrucción decretada, desbordante de justicia».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto para reflejar mejor el rastro auditado del POB: 1) se hace explícita la exclusividad de שְׁאָר con «solo», como en el inglés; 2) se usa «de ellos» para una lectura partitiva natural en español, manteniendo en nota la singularidad hebrea de בּוֹ; 3) se corrige צְדָקָה a «rectitud» en el texto principal para preservar la decisión documentada de «righteousness», dejando «justicia» como alternativa en nota; 4) se simplifica la cláusula final a una formulación más idiomática y cercana al hebreo.'
