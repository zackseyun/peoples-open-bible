translation:
  language: es
  text: Entonces los hijos de Israel bajaron de su ciudad y se presentaron ante él[a]; y, después de desatarlo, lo llevaron a Betilúa y lo llevaron ante los gobernantes de su ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”. El griego dice literalmente “los hijos de Israel”, una designación bíblica tradicional. El verbo también puede entenderse como “se le acercaron” o “fueron hacia él”.
    reason: lexical_alternative
  - marker: b
    text: Es decir, lo llevaron a presencia de las autoridades de la ciudad; el griego no significa que lo nombraran gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβάντες
  english_pob_choice: came down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - vinieron bajando
  lexicon: LSJ
  rationale: En español, “bajaron” comunica de manera natural el movimiento geográfico descendente sin volver rígida la construcción participial griega.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Se conserva la designación bíblica tradicional cercana al griego. “Hijos” refleja mejor el masculinum colectivo del original que “israelitas”, aunque esta última sería posible.
- source_word: ἐπέστησαν αὐτῷ
  english_pob_choice: confronted him
  chosen_spanish: se le acercaron
  alternatives_spanish:
  - lo confrontaron
  - se presentaron ante él
  - se le pusieron encima
  lexicon: BDAG
  rationale: La expresión griega admite varios matices de aproximación o irrupción. En español, “se le acercaron” mantiene la idea básica de venir sobre él o acercarse a él sin cargar innecesariamente el verbo con un matiz interpretativo demasiado fuerte.
- source_word: λύσαντες αὐτόν
  english_pob_choice: after untying him
  chosen_spanish: desatarlo
  alternatives_spanish:
  - después de desatarlo
  - habiéndolo desatado
  lexicon: BDAG
  rationale: La acción es física y concreta; “desatarlo” reproduce bien el sentido de λύω aquí, referido a soltar sus ataduras.
- source_word: ἀπήγαγον
  english_pob_choice: they brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron consigo
  - lo trajeron
  lexicon: BDAG
  rationale: “Lo llevaron” es natural en español y conserva el movimiento hacia el destino especificado inmediatamente después.
- source_word: εἰς τὴν Βετυλουά
  english_pob_choice: to Bethyloua
  chosen_spanish: a Betilúa
  alternatives_spanish:
  - a Bethilúa
  - a Betulúa
  lexicon: LSJ
  rationale: Se translitera el topónimo al español de forma legible. “Betilúa” conserva la referencia geográfica sin introducir una traducción interpretativa.
- source_word: κατέστησαν αὐτὸν ἐπὶ τοὺς ἄρχοντας
  english_pob_choice: brought him before the rulers
  chosen_spanish: lo pusieron delante de los gobernantes
  alternatives_spanish:
  - lo llevaron ante los gobernantes
  - lo presentaron ante los gobernantes
  - lo pusieron sobre los gobernantes
  lexicon: BDAG
  rationale: El griego no implica que lo nombraran gobernante; indica que lo colocaron ante las autoridades. “Lo pusieron delante de los gobernantes” preserva el valor espacial/judicial del verbo sin sugerir investidura.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los magistrados
  - las autoridades
  lexicon: BDAG
  rationale: “Gobernantes” expresa con amplitud a quienes tienen autoridad en la ciudad. Se evita restringir el término a una estructura cívica más precisa de la que el griego garantiza.
theological_decisions:
- issue: 'Sentido de κατέστησαν αὐτὸν ἐπὶ τοὺς ἄρχοντας: ¿nombramiento o comparecencia ante autoridades?'
  english_pob_reading: The verb does not mean they appointed him as a ruler; they brought him before the city authorities.
  chosen_spanish_reading: No significa que lo nombraran gobernante; lo colocaron delante de las autoridades de la ciudad.
  alternative_spanish_readings:
  - lo pusieron sobre los gobernantes
  - lo establecieron sobre los gobernantes
  - lo hicieron gobernante
  rationale: El contexto narra la liberación de Achior y su traslado ante los responsables de la ciudad. El verbo griego admite el sentido de presentar/colocar delante, no de investidura; por eso se evita una lectura de nombramiento que el pasaje no sostiene.
  doctrine_reference: Historia narrativa; precisión semántica del griego sin implicación doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió “brought him before” para κατέστησαν αὐτὸν ἐπὶ, y la nota que aclara que ἐπέστησαν puede traducirse como aproximación/confrontación según el contexto. La versión española evita el error de investidura y mantiene una lectura narrativamente natural.
  spanish_consistency_notes:
  - Se mantiene “Betilúa” como transliteración estable del topónimo.
  - Se usa “los hijos de Israel” para conservar la fórmula bíblica del original.
  - Se evita traducir ἄρχοντες como un cargo técnico más específico que “gobernantes”.
  - No se introduce terminología eclesiástica ajena al relato.
