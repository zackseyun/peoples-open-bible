    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desistiendo en cuanto al desastre»; es decir, reteniendo el juicio amenazado.'
    reason: lexical_alternative
  revision_rationale: Se corrige la mezcla de registros verbales para ajustarla al español neutral («Rasguen»), se hace más idiomático el posesivo plural («sus corazones»), se mejora la naturalidad de חסד con «amor fiel», y se reemplaza «se arrepiente respecto al desastre» por «desiste del desastre» para reflejar mejor נחם en contexto de juicio, en línea con la justificación teológica y léxica del POB inglés. También se reubica la nota explicativa al lugar documentado por la auditoría inglesa.
