translation:
  language: es
  text: Entonces tomarás el aceite de la unción, lo derramarás sobre su cabeza y lo ungirás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Tomarás
  lexicon: HALOT
  rationale: La forma consecutiva en una instrucción ritual expresa secuencia. «Entonces» conserva la relación de pasos sin sonar forzado en español, y «tomarás» mantiene el mandato directo.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para ungir
  - el aceite ungüentario
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «aceite de la unción». En español, «aceite de la unción» transmite el valor técnico del rito, mientras que «aceite de la unción» es claro y natural. «Aceite para ungir» explicita la función, pero pierde un poco de la forma nominal del hebreo.
- source_word: וְיָצַקְתָּ
  english_pob_choice: and pour
  chosen_spanish: lo derramarás
  alternatives_spanish:
  - y lo verterás
  - y lo echarás
  lexicon: HALOT
  rationale: El verbo יצק es «verter/derramar» en contexto de líquido. «Derramarás» conserva el acto físico de vaciar el aceite y funciona mejor que un calco menos natural.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: «Sobre su cabeza» refleja de manera directa la relación espacial del hebreo y encaja con el acto ritual de verter aceite.
- source_word: וּמָשַׁחְתָּ אֹתוֹ
  english_pob_choice: and anoint him
  chosen_spanish: y lo ungirás
  alternatives_spanish:
  - y lo consagrarás con unción
  - y lo ungirás con ese aceite
  lexicon: HALOT
  rationale: מָשַׁח significa «ungir». Mantener «ungirás» preserva el término ritual-teológico del texto y evita sustituirlo por una paráfrasis interpretativa.
theological_decisions:
- issue: 'Doble acción ritual: derramar y ungir'
  english_pob_reading: 'Render both actions distinctly: ''pour it on his head and anoint him.'''
  chosen_spanish_reading: 'Distinguir ambas acciones: «lo derramarás sobre su cabeza y lo ungirás».'
  alternative_spanish_readings:
  - «lo ungirás derramándolo sobre su cabeza»
  - «derramarás el aceite sobre su cabeza para ungirlo»
  rationale: El hebreo presenta dos verbos coordinados. Conviene conservar ambos para no reducir el rito a una sola explicación, manteniendo visible tanto la acción material como la consagratoria.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del pasaje base; por eso la redacción española sigue de cerca la sintaxis y el valor ritual del hebreo sin introducir notas de variante textual.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico y sobrio propio de la serie.
  - Se conserva «ungir» como término técnico coherente con otros pasajes del Éxodo.
  - «Aceite de la unción» respeta el sentido especializado de שֶׁמֶן הַמִּשְׁחָה sin recurrir a una fórmula eclesiástica más tradicional pero menos transparente.
