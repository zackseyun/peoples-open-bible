translation:
  language: es
  text: Y como de ningún modo podía quebrantar[a] la buena disposición de la nación por medio de decretos, sino que veía quedar sin efecto[b] todas sus amenazas y castigos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Quebrantar» intenta conservar el matiz de καταλῦσαι: no se trata solo de «destruir», sino de deshacer o romper la adhesión o favor de la nación.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego repite el grupo de καταλύω: no pudo «quebrantar» la buena disposición de la nación, y sus propias amenazas y castigos estaban quedando «sin efecto» o siendo «deshechos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: y como
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: LSJ
  rationale: En este contexto introducce la circunstancia causal de la cláusula principal; «y como» mantiene la conexión narrativa y la relación causal sin sonar forzado en español.
- source_word: κατὰ μηδένα τρόπον
  english_pob_choice: in no way
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - en ninguna manera
  - de ninguna forma
  lexicon: LSJ
  rationale: Expresa la negación enfática total del griego con un giro natural en español, manteniendo la fuerza absoluta de la construcción.
- source_word: ἴσχυεν
  english_pob_choice: was able
  chosen_spanish: podía
  alternatives_spanish:
  - tenía fuerza para
  - lograba
  lexicon: LSJ
  rationale: Aquí el verbo con infinitivo expresa capacidad; «podía» comunica esa capacidad de manera clara y sobria.
- source_word: καταλῦσαι
  english_pob_choice: to break
  chosen_spanish: quebrantAR
  alternatives_spanish:
  - destruir
  - derrocar
  - anular
  lexicon: LSJ
  rationale: El objeto es «la buena disposición de la nación», por lo que conviene un verbo que sugiera deshacer o romper esa lealtad/adhesión. «Quebrantar» conserva mejor ese valor que «destruir».
- source_word: διὰ τῶν δογμάτων
  english_pob_choice: by means of decrees
  chosen_spanish: por medio de decretos
  alternatives_spanish:
  - por medio de edictos
  - mediante ordenanzas
  lexicon: LSJ
  rationale: «Δόγματα» designa disposiciones oficiales; «decretos» es preciso, formal y fiel al registro político del pasaje.
- source_word: τὴν τοῦ ἔθνους εὔνοιαν
  english_pob_choice: the goodwill of the nation
  chosen_spanish: la buena disposición de la nación
  alternatives_spanish:
  - la lealtad de la nación
  - la favorable disposición del pueblo
  lexicon: LSJ
  rationale: «Εὔνοια» incluye benevolencia, favor y disposición leal. «Buena disposición» preserva esa amplitud semántica; «nación» refleja ἔθνος en su sentido colectivo-político.
- source_word: πάσας τὰς ἑαυτοῦ ἀπειλὰς καὶ τιμωρίας
  english_pob_choice: all his threats and punishments
  chosen_spanish: todas sus amenazas y castigos
  alternatives_spanish:
  - todas sus amenazas y penas
  - todas sus intimidaciones y castigos
  lexicon: LSJ
  rationale: Es una pareja coercitiva directa; «amenazas y castigos» reproduce con naturalidad el paralelismo del griego.
- source_word: ἑώρα καταλυομένας
  english_pob_choice: saw ... being nullified
  chosen_spanish: veía desvanecerse
  alternatives_spanish:
  - veía ser anuladas
  - veía frustrarse
  - veía quedar sin efecto
  lexicon: LSJ
  rationale: El participio pasivo repite el grupo léxico de καταλύω aplicado ahora a amenazas y castigos. «Desvanecerse» expresa su pérdida de eficacia y evita una literalidad áspera, conservando la idea de que quedaban deshechos.
translation_notes:
  revision_awareness: High-agreement source packet; no applied revisions in the English audit trail. Spanish draft follows the Greek closely and preserves the repeated καταλύω word-group with two different but related Spanish renderings to reflect the source's rhetorical contrast.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» default only where relevant; no aparece en este versículo.
  - «Nación» se usa para ἔθνος en sentido colectivo-político, coherente con el contexto macabeo.
  - Se conserva un registro formal y bíblico sin recurrir a formulaciones eclesiásticas tradicionales no exigidas por el griego.
