  text: Be stunned and be astonished[a]; blind yourselves and be blind. They are drunk, but not with wine; they stagger[b], but not from strong drink.
  footnotes:
  - marker: a
    text: Or 'Linger and be amazed.' The first pair of imperatives can carry the sense of hesitating in bewilderment as well as being stunned.
    reason: lexical_alternative
  - marker: b
    text: Or 'Be blinded and blind yourselves.' The Hebrew verbs in this pair are rare and difficult; they convey stupefaction or blindness.
    reason: alternative_reading
