review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: propósito (''para que''), aumento de los días, referencia a la tierra prometida, nombre divino ''Yahvé'', juramento a los padres, y la imagen final comparativa. Sin embargo, no preserva con suficiente precisión la decisión léxica documentada para בְנֵיכֶם, porque el inglés auditado eligió explícitamente ''your sons'' y la nota española invierte la relación entre texto principal y alternativa.'
  spanish_quality_summary: 'El español es claro y legible, pero hay dos detalles mejorables: ''tus hijos'' debilita la precisión de género del hebreo en el texto principal, y la nota [a] está formulada al revés respecto del original y además suena confusa (''El hebreo dice literalmente tus hijos''). El resto del verso fluye bien en español eclesial moderno. ''Sobre la tierra'' es aceptable aunque algo repetitivo; no requiere cambio obligatorio.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé' para יהוה. No hay conflicto con otros términos doctrinales principales. El ajuste necesario es mantener la precisión de 'sons' -> 'hijos varones' en el texto principal o, menos idealmente, explicar con exactitud la alternativa; dado el expediente inglés y la política de género preciso, conviene 'hijos varones' en texto y 'hijos' como alternativa en nota.
  issues:
  - severity: medium
    issue: בְנֵיכֶם se vertió como 'tus hijos' en vez de una forma que preserve explícitamente 'sons'.
    rationale: El expediente inglés y la decisión teológica/lexical piden una traducción de género precisa en el texto principal. En español, 'hijos' puede ser mixto o genérico; 'hijos varones' preserva mejor el valor masculino específico del hebreo.
  - severity: medium
    issue: La nota [a] invierte la relación entre lectura principal y alternativa.
    rationale: El POB inglés tiene texto principal 'your sons' y nota alternativa 'your children'. La nota española actual ofrece como alternativa 'hijos varones' mientras el texto principal dice 'hijos', lo cual contradice la lógica auditada y crea confusión sobre qué expresa literalmente el hebreo.
  revised_spanish_text: para que se multipliquen tus días y los días de tus hijos varones[a] sobre la tierra que Yahvé juró a tus padres darles, como los días de los cielos sobre la tierra[b].
  revised_footnotes:
  - marker: a
    text: 'O: ''y los días de tus hijos''. El hebreo dice ''tus hijos varones''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''mientras los cielos estén sobre la tierra''.'
    reason: lexical_alternative
  revision_rationale: Se corrige el texto principal para reflejar la decisión auditada de traducir בְנֵיכֶם con precisión masculina ('sons'), usando 'hijos varones' en español. La nota [a] se invierte para que la alternativa más amplia quede en la nota, no en el texto principal. Se conserva el resto del verso porque representa fielmente el hebreo y mantiene bien la terminología del proyecto, incluido 'Yahvé'.
