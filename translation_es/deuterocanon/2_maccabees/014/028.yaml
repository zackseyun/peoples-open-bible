translation:
  language: es
  text: Pero cuando estos cayeron[a] ante Nikanor, él quedó desconcertado y lo tomó muy mal, porque tendría que dejar de lado los términos acordados[b], aunque aquel hombre no había hecho ningún mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayeron a los pies de Nikanor», expresión de súplica.
    reason: lexical_alternative
  - marker: b
    text: O «los arreglos ya hechos» o «el acuerdo».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσπεσόντων
  english_pob_choice: fell before
  chosen_spanish: cayeron ante
  alternatives_spanish:
  - cayeron a los pies de
  - se postraron ante
  - se echaron a los pies de
  lexicon: LSJ
  rationale: El griego puede expresar una caída/postración en actitud de súplica. «Cayeron ante» conserva la imagen corporal y la dirección relacional sin obligar a decidir si fue postración literal o acercamiento suplicante.
- source_word: Νικάνορι
  english_pob_choice: Nikanor
  chosen_spanish: Nikanor
  alternatives_spanish:
  - Nicanor
  lexicon: transliteración directa del griego
  rationale: Se mantiene la forma griega transliterada, siguiendo la práctica del proyecto de no pasar por la forma tradicionalizada cuando no hay razón contextual para ello.
- source_word: συνεκέχυτο
  english_pob_choice: was thrown into confusion
  chosen_spanish: se quedó confundido
  alternatives_spanish:
  - se turbó
  - quedó consternado
  - se agitó
  lexicon: LSJ
  rationale: El verbo indica agitación/confusión interna. «Se quedó confundido» comunica el estado resultante de manera natural en español, aunque es algo más sobrio que «fue arrojado a la confusión».
- source_word: δυσφόρως ἔφερεν
  english_pob_choice: took it badly
  chosen_spanish: lo tomó muy mal
  alternatives_spanish:
  - lo recibió con disgusto
  - lo soportó con resentimiento
  - le cayó muy mal
  lexicon: LSJ
  rationale: La expresión idiomática griega transmite disgusto y carga afectiva negativa. «Lo tomó muy mal» es idiomático y conserva la fuerza afectiva sin amplificar indebidamente el sentido.
- source_word: τὰ διεσταλμένα
  english_pob_choice: the agreed terms
  chosen_spanish: los términos acordados
  alternatives_spanish:
  - los arreglos ya hechos
  - el acuerdo
  - las disposiciones establecidas
  lexicon: LSJ
  rationale: El participio sustantivado remite a asuntos ya fijados o concertados. «Términos acordados» conserva el matiz diplomático y contractual mejor que una sola palabra como «acuerdo».
- source_word: ἀθετήσει
  english_pob_choice: set aside
  chosen_spanish: desatender
  alternatives_spanish:
  - anular
  - invalidar
  - romper
  lexicon: LSJ
  rationale: En este contexto la idea es dejar de respetar lo ya establecido. «Desatender» refleja la deslealtad práctica sin convertir el verbo en un tecnicismo jurídico más fuerte de lo que exige el griego.
- source_word: μηδὲν τἀνδρὸς ἠδικηκότος
  english_pob_choice: though the man had done no wrong
  chosen_spanish: aunque aquel hombre no había hecho ningún mal
  alternatives_spanish:
  - aunque el hombre no había cometido ninguna injusticia
  - pues el hombre no había hecho nada malo
  - aunque no había ofendido a nadie
  lexicon: LSJ
  rationale: La cláusula expresa que el hombre no había cometido injusticia. «No había hecho ningún mal» mantiene la valoración moral sin hacerla sonar excesivamente abstracta; «aquel hombre» ayuda a ubicar la referencia anafórica en español.
theological_decisions:
- issue: Cómo renderizar el juicio moral de ἀδικέω sin sobreextenderlo
  english_pob_reading: The clause is rendered as an assertion that the man had done no wrong, without expanding it into a broader claim of innocence beyond the verse.
  chosen_spanish_reading: Aunque aquel hombre no había hecho ningún mal.
  alternative_spanish_readings:
  - aunque el hombre no había cometido ninguna injusticia
  - aunque no había ofendido a nadie
  rationale: 'La frase mantiene el alcance limitado del texto: una afirmación moral/legal sobre la acción concreta del hombre, sin convertirla en una exoneración general o doctrinal más amplia.'
  doctrine_reference: Preservar la tensión textual; primacía del original frente a la tradición de traducción.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios. El punto de revisión señalado por el control cruzado se abordó preservando la fuerza del griego en los verbos de reacción emocional y evitando una paraphrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «Nikanor» como transliteración directa, en coherencia con el criterio del proyecto.
  - «Términos acordados» conserva la idea de arreglos previos sin imponer una lectura demasiado técnica.
  - Se evita «SEÑOR» u otra sustitución convencional porque no hay aquí el nombre divino ni una cita directa que lo requiera.
  - El tono busca ser bíblico y moderno a la vez, sin arcaísmos innecesarios.
