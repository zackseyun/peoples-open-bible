    text: Or, 'his heart grew bold/was encouraged in the ways of the LORD.' The Hebrew idiom can denote an elevated or emboldened heart; here the context is positive, not arrogant.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Asherim' or 'the sacred poles.' The Hebrew term refers to cultic objects associated with Asherah worship.
    reason: lexical_alternative
