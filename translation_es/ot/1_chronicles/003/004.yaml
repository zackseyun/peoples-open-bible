  text: Seis le nacieron en Hebrón, y allí reinó siete años y seis meses; y en Jerusalén reinó treinta y tres años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שִׁשָּׁה
  english_pob_choice: Six
  chosen_spanish: Seis
  alternatives_spanish:
  - Estos seis
  lexicon: HALOT
  rationale: El hebreo introduce un resumen numérico de los hijos mencionados; en español, como en la traducción inglesa auditada, basta el cardinal simple sin añadir demostrativos no expresos.
- source_word: נֽוֹלַד ל֣/וֹ
  english_pob_choice: were born to him
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron para él
  - él engendró
  lexicon: HALOT
  rationale: El pasivo hebreo con ל + sufijo expresa bien en español una construcción natural como 'le nacieron', que conserva el valor pasivo sin volverlo activo e interpretativo.
- source_word: בְ/חֶבְר֔וֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebron
  lexicon: HALOT
  rationale: Preposición locativa directa con el nombre propio; se conserva el nombre bíblico usual en español con acento gráfico.
- source_word: וַ/יִּ֨מְלָךְ שָׁ֔ם
  english_pob_choice: and he reigned there
  chosen_spanish: y allí reinó
  alternatives_spanish:
  - y reinó allí
  - y fue rey allí
  lexicon: HALOT
  rationale: מלך en este contexto expresa ejercicio real del gobierno; 'reinó' reproduce mejor la fuerza verbal que una perífrasis como 'fue rey'.
- source_word: שֶׁ֥בַע שָׁנִ֖ים וְ/שִׁשָּׁ֣ה חֳדָשִׁ֑ים
  english_pob_choice: seven years and six months
  chosen_spanish: siete años y seis meses
  alternatives_spanish:
  - siete años y seis lunas
  lexicon: HALOT
  rationale: Duración temporal estándar; 'meses' comunica de forma natural y fiel el hebreo sin necesidad de calco.
- source_word: וּ/שְׁלֹשִׁ֤ים וְ/שָׁלוֹשׁ֙ שָׁנָ֔ה
  english_pob_choice: thirty-three years
  chosen_spanish: treinta y tres años
  alternatives_spanish:
  - treinta y tres años
  - treinta y tres año
  lexicon: HALOT
  rationale: El número compuesto se expresa de manera natural en español moderno; se mantiene la unidad temporal en plural como corresponde al uso idiomático.
- source_word: מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם
  english_pob_choice: in Jerusalem he reigned
  chosen_spanish: en Jerusalén reinó
  alternatives_spanish:
  - reinó en Jerusalén
  - fue rey en Jerusalén
  lexicon: HALOT
  rationale: Se preserva la referencia locativa y el verbo 'reinar' para mantener la misma relación semántica del hebreo, con orden español fluido.
