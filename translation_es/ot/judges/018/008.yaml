translation:
  language: es
  text: 'Entonces llegaron a sus hermanos en Zora y Eshtaol[a], y sus hermanos les dijeron[b]: «¿Qué pasa con ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus parientes»; el hebreo «sus hermanos» puede referirse a miembros del clan o de la tribu, no solo a hermanos de sangre.
    reason: lexical_alternative
  - marker: b
    text: La pregunta hebrea es muy breve y elíptica; literalmente, algo como «¿Qué, ustedes?», una forma idiomática que probablemente pide que expliquen su situación o den su informe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Luego llegaron
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; «Entonces llegaron» conserva la secuencia y suena natural en español sin añadir matices no presentes en el hebreo.
- source_word: אֶל אֲחֵיהֶם
  english_pob_choice: to their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus paisanos
  lexicon: HALOT
  rationale: «Hermanos» mantiene el término hebreo אָח y en este contexto tribal puede abarcar parientes del clan; se preserva así la ambigüedad útil del original.
- source_word: צָרְעָה וְאֶשְׁתָּאֹל
  english_pob_choice: Zorah and Eshtaol
  chosen_spanish: Zora y Eshtaol
  alternatives_spanish:
  - Zorah y Eshtaol
  lexicon: N/A (topónimos)
  rationale: Son nombres propios de lugares y se transliteran; se usa la forma castellana «Zora» para el primer topónimo por estar ampliamente asentada en español bíblico, mientras que Eshtaol se conserva de manera reconocible.
- source_word: וַיֹּאמְרוּ לָהֶם אֲחֵיהֶם
  english_pob_choice: and their brothers said to them
  chosen_spanish: y sus hermanos les dijeron
  alternatives_spanish:
  - y sus parientes les dijeron
  - y los hermanos les dijeron
  lexicon: HALOT
  rationale: Se mantiene el sujeto explícito «sus hermanos» para reflejar la estructura hebrea y evitar una traducción demasiado reducida o impersonal.
- source_word: מָה אַתֶּם
  english_pob_choice: What is with you?
  chosen_spanish: ¿Qué tienen ustedes?
  alternatives_spanish:
  - ¿Qué les pasa?
  - ¿Qué traen ustedes?
  lexicon: HALOT
  rationale: La pregunta hebrea es breve e idiomática. «¿Qué tienen ustedes?» intenta reproducir esa concisión sin especificar de más; otras opciones aclaran el sentido pero añaden una interpretación más marcada.
theological_decisions:
- issue: 'Sentido de אֲחֵיהֶם: hermanos literales o parientes del clan'
  english_pob_reading: '''brothers'' may refer to fellow clan or tribal relatives, not only literal siblings.'
  chosen_spanish_reading: «hermanos» con posible valor de parientes de clan
  alternative_spanish_readings:
  - «parientes»
  - «paisanos»
  rationale: En el relato tribal de Jueces, el término puede abarcar miembros del mismo grupo familiar o clánico. Se conserva «hermanos» en el texto para no borrar esa conexión léxica, y se explica la amplitud semántica en nota.
  doctrine_reference: N/A (decisión léxica-contextual)
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la pregunta final de «What about you?» a «What is with you?» para acercarse más al hebreo מָה אַתֶּם. La versión española sigue ese mismo ajuste, buscando una pregunta breve, formal y natural sin expandir innecesariamente el sentido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «hermanos» para reflejar el hebreo אָח y se explicó su posible alcance clánico.
  - Los topónimos se trataron como nombres propios transliterados/normalizados, sin traducirlos.
  - La pregunta final se formuló de modo conciso para conservar la brevedad e idiomaticidad del hebreo.
