base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/029.yaml
  text: 'Thus says the king: Do not let Hezekiah deceive you[b][a], for he will not be able to deliver you from his hand.'
  footnotes:
  - marker: a
    text: Or 'mislead you.' The Hebrew verb can mean to lead astray or deceive.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from his hand,' an idiom for being under someone's power. The parallel in Isaiah 36:14 reads 'from my hand.'
    reason: textual_variant
