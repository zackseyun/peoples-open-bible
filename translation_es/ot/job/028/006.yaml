translation:
  language: es
  text: El zafiro[a] está en sus piedras, y tiene polvo de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'lapislázuli' para 'zafiro'; la piedra preciosa exacta que denota el hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם
  english_pob_choice: the place of
  chosen_spanish: el lugar de
  alternatives_spanish:
  - un lugar de
  - la fuente de
  lexicon: HALOT
  rationale: מקום denota un sitio o lugar concreto. En este contexto poético de minería, 'el lugar de' conserva la imagen de procedencia/ubicación sin forzar una paráfrasis más interpretativa.
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT
  rationale: El término hebreo apunta a una piedra preciosa cuya identificación antigua es incierta. 'Zafiro' es el equivalente español más accesible y tradicional; se preserva la incertidumbre con una nota alternativa.
- source_word: אֲבָנֶיהָ
  english_pob_choice: its stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - sus rocas
  - las piedras de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular remite al referente personificado del contexto. En español, 'sus piedras' comunica posesión/relación de manera natural sin introducir un antecedente artificial de género.
- source_word: וְעַפְרֹת
  english_pob_choice: and ... dust
  chosen_spanish: y polvo
  alternatives_spanish:
  - y tierra
  - y polvo de menas
  lexicon: HALOT
  rationale: עפרות alude a material terroso o polvoso asociado con el oro. 'Polvo' mantiene la imagen concreta y poética, evitando la lectura más interpretativa de 'mena' u 'mineral'.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: El sustantivo designa el metal precioso de forma directa. 'Oro' es la equivalencia española estándar y fiel al campo léxico del texto.
- source_word: לוֹ
  english_pob_choice: it has
  chosen_spanish: tiene
  alternatives_spanish:
  - le pertenece
  - hay en ella
  lexicon: HALOT
  rationale: La construcción hebrea preposicional es idiomática en poesía. En español, 'tiene' expresa de forma natural la idea de contenido/posesión implícita en el verso, sin añadir una cópula ajena al ritmo del original.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo WLC y el análisis léxico/audit trail en inglés POB. No se aplicaron revisiones textuales adicionales; la única tensión léxica relevante es la identificación de סַפִּיר, que se conserva con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'oro' y no 'oro fino' en el texto principal, porque el hebreo solo dice זָהָב.
  - '''Sus piedras'' conserva el referente personificado sin introducir ''ella'' explícitamente en español.'
  - '''Polvo de oro'' refleja la imagen del hebreo sin convertirla en explicación mineralógica.'
