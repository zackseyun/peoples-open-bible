translation:
  language: es
  text: porque Abraham obedeció[a] mi voz y guardó mis preceptos, mis mandamientos, mis estatutos y mis leyes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escuchó mi voz». El hebreo «escuchar la voz de» a menudo lleva la idea de obedecer al oír.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis instrucciones». El hebreo tôrôt puede significar «ley», «instrucción» o «enseñanza» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵקֶב
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - debido a que
  - en razón de que
  lexicon: HALOT
  rationale: Introduce una relación causal natural y directa en español, fiel al valor de razón/cause del hebreo en este contexto.
- source_word: שָׁמַע ... בְּקֹלִי
  english_pob_choice: obeyed my voice
  chosen_spanish: obedeció mi voz
  alternatives_spanish:
  - escuchó mi voz
  - oyó mi voz
  - escuchó y obedeció mi voz
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de la 'voz' y, según el contexto y la revisión del POB en inglés, expresa la obediencia implícita de שׁמע בקול.
- source_word: וַיִּשְׁמֹר
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - guardaba
  - observó
  - cumplió
  lexicon: HALOT
  rationale: '''Guardar'' conserva bien el sentido de custodiar/observar un mandato o encargo y permite distinguir este verbo del resto de la lista.'
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: my charge
  chosen_spanish: mi encargo
  alternatives_spanish:
  - mi cargo
  - mi comisión
  - mi obligación
  lexicon: HALOT
  rationale: '''Encargo'' transmite la idea de algo confiado para ser atendido y distingue este término de los mandamientos y estatutos que siguen.'
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: Es la correspondencia más transparente y estable en español para מִצְוֹת en un marco pactal/legal.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' preserva la diferenciación tradicional y semántica respecto de ''mandamientos'' y ''leyes'' sin perder claridad.'
- source_word: וְתוֹרֹתָי
  english_pob_choice: my laws
  chosen_spanish: mis leyes
  alternatives_spanish:
  - mis instrucciones
  - mis enseñanzas
  lexicon: HALOT
  rationale: '''Leyes'' comunica bien el sentido jurídico-covenantal que el POB privilegia aquí, aunque ''instrucciones'' sigue siendo una alternativa lexicamente válida.'
theological_decisions:
- issue: Conservar la acumulación de términos legales/covenantales anteriores al Sinaí
  english_pob_reading: Retain the distinct legal terms ('charge, commandments, statutes, laws') without harmonizing or explaining them away.
  chosen_spanish_reading: Conservar la cadena diferenciada ('encargo, mandamientos, estatutos, leyes') sin fusionarla ni suavizarla.
  alternative_spanish_readings:
  - Reducir la lista a una fórmula más fluida como 'mis requisitos y mis leyes'
  - Sustituir 'leyes' por 'instrucciones' para atenuar el peso legal
  rationale: 'La lista reproduce el énfasis retórico del hebreo y mantiene la tensión histórica-teológica del texto: obediencia patriarcal a categorías pactales amplias sin reconfigurarlas según un sistema posterior.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de שָׁמַע con בְּקֹלִי
  english_pob_reading: '''obeyed my voice'' preserves the sense of obedient hearing.'
  chosen_spanish_reading: '''obedeció mi voz'' conserva el matiz de escuchar con respuesta obediente.'
  alternative_spanish_readings:
  - '''escuchó mi voz'''
  - '''oyó mi voz'''
  rationale: En español, 'obedeció mi voz' expresa mejor la fuerza idiomática del hebreo que un simple 'escuchó', y evita perder el componente de sumisión activa que el contexto requiere.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés y refleja la revisión posterior que prefirió 'obeyed my voice' sobre 'listened to my voice'. En español se optó por 'obedeció mi voz' para preservar tanto la obediencia como la imagen auditiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca explícitamente en este versículo, sino como convención del proyecto cuando el tetragrámaton esté presente; aquí el texto usa primera persona divina.
  - '''Mandamientos'', ''estatutos'' y ''leyes'' se usan de forma consistente como tríada legal distinguible.'
  - '''Encargo'' evita colapsar מִשְׁמֶרֶת en ''mandamiento'' y conserva la diferenciación léxica del original.'
