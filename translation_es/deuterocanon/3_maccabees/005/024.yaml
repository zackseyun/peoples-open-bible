translation:
  language: es
  text: Y las multitudes por toda la ciudad se estaban reuniendo para el espectáculo[a] más lamentable, esperando con ansia la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para presenciar la escena más lamentable». El griego θεωρία puede referirse tanto al acto de ver como al espectáculo visto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... πλήθη
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la gente
  lexicon: LSJ
  rationale: πλήθη es plural y designa grandes grupos de personas. «Multitudes» conserva esa pluralidad y el registro elevado sin sonar forzado en español.
- source_word: κατὰ τὴν πόλιν
  english_pob_choice: throughout the city
  chosen_spanish: de toda la ciudad
  alternatives_spanish:
  - por toda la ciudad
  - en toda la ciudad
  lexicon: LSJ
  rationale: La expresión comunica distribución general dentro de la ciudad. «De toda la ciudad» reproduce bien la idea de procedencia/ámbito colectivo sin añadir movimiento que el griego no exige.
- source_word: συνῄθροιστο
  english_pob_choice: were gathering
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se estaban reuniendo
  - se congregaban
  lexicon: LSJ
  rationale: El imperfecto medio indica reunión en curso o con aspecto progresivo. «Se habían reunido» mantiene la idea de agrupamiento ya en proceso/establecido en el contexto, con fluidez natural en español.
- source_word: πρὸς τὴν οἰκτρότατην θεωρίαν
  english_pob_choice: for the most pitiful spectacle
  chosen_spanish: para el espectáculo más lamentable
  alternatives_spanish:
  - para la vista más lamentable
  - para presenciar el espectáculo más miserable
  lexicon: LSJ
  rationale: θεωρία puede significar tanto el acto de mirar como el espectáculo visto. «Espectáculo» preserva el carácter público de la escena; «lamentable» transmite el superlativo de οἰκτρότατην sin exagerar el tono más allá del griego.
- source_word: προσδοκῶντα
  english_pob_choice: awaiting
  chosen_spanish: esperando
  alternatives_spanish:
  - aguardando
  - expectando
  lexicon: LSJ
  rationale: El participio expresa expectativa orientada a un momento futuro. «Esperando» es el equivalente español más natural y mantiene la tensión temporal del pasaje.
- source_word: τὴν πρωίαν
  english_pob_choice: the morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  - el alba
  lexicon: LSJ
  rationale: πρωίαν se refiere al tiempo de la mañana. «La mañana» es la traducción más directa y no añade la precisión de «alba/amanecer» que el griego no exige.
- source_word: μετὰ σπουδῆς
  english_pob_choice: eagerly
  chosen_spanish: con ansia
  alternatives_spanish:
  - con prisa
  - con diligencia
  lexicon: LSJ
  rationale: σπουδή puede denotar prisa, celo o empeño. Aquí el contexto es de expectación intensa; «con ansia» reproduce bien la urgencia emocional y evita un matiz meramente mecánico de rapidez.
theological_decisions:
- issue: Valor de θεωρία como visión o espectáculo público
  english_pob_reading: The Greek θεωρία can refer either to the act of viewing or to the spectacle viewed.
  chosen_spanish_reading: «espectáculo» con nota sobre la alternativa de «presenciar la vista»
  alternative_spanish_readings:
  - «vista»
  - «presencia»
  - «acto de ver»
  rationale: No se debe apagar la tensión semántica de θεωρία. En español, «espectáculo» comunica mejor el carácter público y lamentable de la escena; la nota conserva la alternativa de la acción de mirar.
  doctrine_reference: Lexical ambiguity in Hellenistic Greek; no doctrinal issue
translation_notes:
  revision_awareness: La base inglesa fue revisada y quedó sin cambios; no hay revisiones aplicadas en el expediente. La versión española sigue el texto griego de Swete con atención al matiz aspectual de συνῄθροιστο y a la ambigüedad de θεωρία.
  spanish_consistency_notes:
  - Se mantuvo «multitudes» para πλήθη en plural.
  - Se prefirió un registro formal y bíblico sin recurrir a «SEÑOR» u այլ terminología de sustitución.
  - «Con ansia» traduce la intensidad de μετὰ σπουδῆς sin sobreespecificar la rapidez física.
  - La nota de pie de página marca explícitamente la alternativa semántica de θεωρία para preservar el expediente auditado.
