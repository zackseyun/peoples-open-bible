translation:
  language: es
  text: Y Jonatán se encontró con el rey en Jope con gran honor, y se saludaron mutuamente, y pasaron allí la noche.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήντησεν
  english_pob_choice: met
  chosen_spanish: se encontró con
  alternatives_spanish:
  - se reunió con
  - se encontró
  lexicon: LSJ
  rationale: El verbo describe el encuentro entre Jonatán y el rey; en español, «se encontró con» conserva el hecho del encuentro sin añadir matices no presentes en el griego.
- source_word: εἰς Ἰόππην
  english_pob_choice: at Joppa
  chosen_spanish: en Jope
  alternatives_spanish:
  - a Jope
  - en Jaffa
  lexicon: LSJ
  rationale: Aunque εἰς puede sugerir movimiento hacia un lugar, en este contexto de encuentro la referencia espacial natural en español es «en Jope», porque señala el lugar donde ocurre la reunión.
- source_word: μετὰ δόξης
  english_pob_choice: with honor
  chosen_spanish: con honor
  alternatives_spanish:
  - con gloria
  - con esplendor
  lexicon: LSJ
  rationale: δώξα aquí expresa un trato ceremonioso o honorable, no necesariamente «gloria» en sentido teológico; «con honor» preserva esa fuerza diplomática.
- source_word: ἠσπάσαντο ἀλλήλους
  english_pob_choice: they greeted one another
  chosen_spanish: se saludaron mutuamente
  alternatives_spanish:
  - se dieron la bienvenida mutuamente
  - se saludaron unos a otros
  lexicon: BDAG
  rationale: ἀσπάζομαι suele significar saludar; «se saludaron mutuamente» es natural en español y evita precisar abrazo o bienvenida formal que el texto no exige.
- source_word: ἐκοιμήθησαν
  english_pob_choice: they spent the night
  chosen_spanish: pasaron allí la noche
  alternatives_spanish:
  - se quedaron esa noche
  - durmieron allí
  lexicon: LSJ
  rationale: En narrativa de viaje, el verbo indica pernoctar. «Pasaron allí la noche» comunica el sentido idiomático sin reducirlo meramente a «durmieron».
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran alta concordancia y sin revisiones aplicadas; por eso la versión española sigue de cerca la lectura consensuada sin introducir notas textuales ni alternativas doctrinales.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Jope» para seguir la tradición geográfica en español bíblico, aunque el referente moderno suele identificarse con Jaffa.
  - Se evitó «gloria» en el sintagma de δόξα para no sobrecargarlo con un matiz teológico que no aparece en este contexto narrativo.
  - «Pasaron allí la noche» refleja el valor narrativo de pernoctar mejor que un simple «durmieron».
