base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/007.yaml
  text: For any man from the house of Israel[a], or from the foreigner who sojourns in Israel, who separates himself from following me and brings up his idols into his heart, and sets the stumbling block of his iniquity before his face, and then comes to the prophet to inquire of me through him, I, Yahweh[d][c][b], will answer him myself.
  footnotes:
  - marker: a
    text: Or, 'each man' or 'anyone.' The Hebrew repeats 'man' for distributive emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Foreigner who sojourns'' refers to a non-Israelite residing among Israel; traditionally, ''resident alien.'''
    reason: cultural_note
  - marker: c
    text: Hebrew literally, 'separates himself from after me,' that is, turns away from following the LORD.
    reason: lexical_alternative
  - marker: d
    text: Or, 'I, the LORD, will answer him by myself' / 'in my own person.' The Hebrew is compact and emphatic.
    reason: lexical_alternative
