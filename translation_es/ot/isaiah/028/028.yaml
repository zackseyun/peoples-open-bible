translation:
  language: es
  text: El grano para pan[a] es triturado, pero no se lo trilla para siempre; aunque la rueda de su carro y sus caballos[b] retumban sobre él, no lo tritura fino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan». El hebreo לֶחֶם («pan») se usa aquí metonímicamente para el grano destinado a convertirse en pan.
    reason: lexical_alternative
  - marker: b
    text: O «sus jinetes». El término hebreo puede denotar jinetes en algunos contextos, pero «caballos» encaja mejor con la imagen agrícola aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: Bread grain
  chosen_spanish: Pan para grano
  alternatives_spanish:
  - pan
  - grano para pan
  lexicon: HALOT
  rationale: En este contexto agrícola, לֶחֶם se usa metonímicamente para el grano destinado a convertirse en pan. «Pan para grano» conserva la relación con pan sin perder la referencia al material agrícola; evita reducirlo a «pan» a secas, que sonaría menos natural en la imagen.
- source_word: יוּדָק
  english_pob_choice: is crushed
  chosen_spanish: es triturado
  alternatives_spanish:
  - es aplastado
  - es molido
  lexicon: HALOT
  rationale: El verbo expresa ser quebrado o reducido finamente. «Triturado» comunica bien la acción de desmenuzar/granar y mantiene el paralelo con la idea final de no ser reducido a polvo.
- source_word: לֹא לָנֶצַח
  english_pob_choice: not forever
  chosen_spanish: no para siempre
  alternatives_spanish:
  - no continuamente
  - no eternamente
  lexicon: HALOT
  rationale: 'La expresión indica límite temporal: el trillar no continúa sin fin. «No para siempre» es una equivalencia natural y fiel en español contemporáneo.'
- source_word: אָדוֹשׁ יְדוּשֶׁנּוּ
  english_pob_choice: does one keep threshing it
  chosen_spanish: se le sigue trillando
  alternatives_spanish:
  - uno sigue trillándolo
  - se lo trilla continuamente
  lexicon: HALOT
  rationale: La construcción intensiva se vierte con una perífrasis que expresa continuidad. El impersonal «se le sigue trillando» conserva el sentido general sin forzar un sujeto específico.
- source_word: וְהָמַם
  english_pob_choice: though ... rumble over it
  chosen_spanish: aunque ... pasan retumbando sobre él
  alternatives_spanish:
  - y ... pasan haciendo ruido sobre él
  - aunque ... resuenan sobre él
  lexicon: HALOT
  rationale: El verbo puede implicar ruido y conmoción. «Pasan retumbando» transmite el aspecto sonoro y el movimiento del equipo de trillar, en línea con la imagen agrícola.
- source_word: גִּלְגַּל עֶגְלָתוֹ
  english_pob_choice: the wheel of his cart
  chosen_spanish: la rueda de su carro
  alternatives_spanish:
  - el rodillo de su carro
  - la rueda de su carreta
  lexicon: HALOT
  rationale: La relación constructa se expresa de forma directa y natural en español. «Carro» preserva la imagen general del vehículo agrícola sin sobreespecificar.
- source_word: וּפָרָשָׁיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus jinetes
  - sus caballeros
  lexicon: HALOT
  rationale: Aunque el término puede referirse a jinetes en otros contextos, aquí encaja mejor con los animales dentro de la escena agrícola. La elección sigue el razonamiento auditado de la POB inglesa.
- source_word: לֹא יְדֻקֶּנּוּ
  english_pob_choice: he does not crush it fine
  chosen_spanish: no lo tritura hasta hacerlo polvo
  alternatives_spanish:
  - no lo pulveriza
  - no lo tritura finamente
  lexicon: HALOT
  rationale: 'La repetición de la raíz indica que el grano no es reducido en exceso. «Hasta hacerlo polvo» expresa con claridad el límite: se trilla, pero no hasta pulverizarlo.'
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo (WLC) y el criterio léxico de la POB inglesa. La revisión inglesa más reciente no introdujo cambios sustantivos; el veredicto de alta concordancia permite una traducción española alineada con la lectura auditada, ajustando solo la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantuvo la terminología agrícola concreta para respetar la imagen del texto.
  - Se evitó la transliteración de términos donde el español cuenta con equivalentes claros y fieles.
  - Se preservó la ambigüedad de פָרָשָׁיו mediante una nota, aunque el texto principal opta por «sus caballos» por coherencia contextual.
