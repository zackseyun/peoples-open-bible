translation:
  language: es
  text: Pero hay espíritu en el hombre[a], y el aliento del Todopoderoso les da entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero es el espíritu en el hombre, el aliento del Todopoderoso, el que les da entendimiento». El hebreo pasa del singular genérico «hombre» al plural «les»; algunas versiones suavizan esa oscilación en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Ciertamente
  - En verdad
  lexicon: HALOT
  rationale: La partícula introduce contraste o corrección en el discurso de Eliú. «Pero» conserva esa función adversativa de modo natural en español, sin perder el matiz enfático.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  lexicon: HALOT
  rationale: Aquí רוּחַ apunta al principio inmaterial en el ser humano. «Espíritu» mantiene la fuerza antropológica y la distinción con נִשְׁמָה, que se vierte como «aliento».
- source_word: בֶאֱנוֹשׁ
  english_pob_choice: in man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - en un hombre
  - en la humanidad
  - en un ser humano
  lexicon: HALOT
  rationale: אָנוֹשׁ nombra al ser humano mortal en forma genérica. «En el hombre» conserva el singular representativo y es idiomático en español bíblico actual.
- source_word: וְנִשְׁמַת
  english_pob_choice: and the breath of
  chosen_spanish: y el aliento de
  alternatives_spanish:
  - y el espíritu de
  - y la respiración de
  lexicon: HALOT
  rationale: נִשְׁמָה se refiere más naturalmente al «aliento» que al «espíritu» en este paralelismo. Así se preserva la diferencia poética entre רוּחַ y נִשְׁמָה.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Es un título divino; en español, «el Todopoderoso» comunica bien el valor del hebreo sin transliterarlo.
- source_word: תְּבִינֵם
  english_pob_choice: gives them understanding
  chosen_spanish: les da entendimiento
  alternatives_spanish:
  - les hace comprender
  - les concede entendimiento
  - le da entendimiento
  lexicon: HALOT
  rationale: El verbo hiphil de בין expresa dar entendimiento o hacer comprender. Se mantiene el plural de la forma hebrea («les»), que refleja el cambio de número del versículo sin armonizarlo.
theological_decisions:
- issue: Cambio de número entre el singular genérico y el plural verbal
  english_pob_reading: 'The verse speaks generally of humanity: there is a spirit in man, and God''s breath gives people understanding.'
  chosen_spanish_reading: 'El versículo habla de manera general de la humanidad: hay espíritu en el hombre, y el aliento del Todopoderoso les da entendimiento.'
  alternative_spanish_readings:
  - 'El versículo habla de un individuo: hay un espíritu en un hombre, y el aliento del Todopoderoso le da entendimiento.'
  rationale: El hebreo pasa de אֱנוֹשׁ singular genérico a un sufijo plural en תְּבִינֵם. La traducción conserva esa tensión con «hombre» y «les», en vez de nivelarla a un singular más uniforme.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it); §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés que enfatiza la construcción enfática «it is ... that»; en español se refleja con una estructura copulativa natural: «es ... el que». También preserva la oscilación de número señalada en el audit trail, sin armonizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece.
  - Se distingue «espíritu» de «aliento» para respetar el paralelismo hebreo.
  - Se mantiene el pronombre plural «les» para reflejar el sufijo hebreo plural, aun con antecedente singular genérico.
