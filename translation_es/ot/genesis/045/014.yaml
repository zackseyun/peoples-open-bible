translation:
  language: es
  text: Entonces se echó al cuello[a] de Benjamín, su hermano, y lloró; y Benjamín lloró abrazado a su cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cayó sobre los cuellos de Benjamín, su hermano ... y Benjamín lloró sobre su cuello». La forma plural expresa idiomáticamente un abrazo alrededor del cuello.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: Then he fell
  chosen_spanish: Entonces se echó
  alternatives_spanish:
  - Entonces cayó
  - Entonces se lanzó
  lexicon: HALOT
  rationale: El verbo hebreo נפל, en esta escena de abrazo, expresa una caída o echarse sobre alguien. «Se echó» comunica el movimiento concreto sin sonar rígido en español; «cayó» sería menos natural en un gesto afectivo, y «se lanzó» agrega intensidad no indicada.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: al
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: La preposición עַל en este contexto de abrazo se expresa naturalmente en español con contracción «al» ante «cuello». «Sobre» también es posible, pero «al cuello» fluye mejor en español y conserva la imagen corporal.
- source_word: צַוְּארֵי / צַוָּארָיו
  english_pob_choice: the neck / his neck
  chosen_spanish: cuello / su cuello
  alternatives_spanish:
  - cuellos
  - al cuello
  lexicon: HALOT
  rationale: Aunque el hebreo tiene una forma plural/dual-like, el sentido idiomático es el área del cuello en un abrazo. En español, el singular «cuello» es la equivalencia más natural; mantener un plural literal («cuellos») sonaría forzado y oscurecería el modismo.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Binyamín
  lexicon: Transliteración bíblica estándar
  rationale: Se usa la forma hispana habitual del nombre propio bíblico.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: HALOT
  rationale: El posesivo hebreo se vierte de forma directa y natural como «su hermano». Mantiene el énfasis familiar explícito del texto.
- source_word: וַיֵּבְךְּ / בָּכָה
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se puso a llorar
  - sollozó
  lexicon: HALOT
  rationale: בכה puede traducirse «llorar» o «llorar/llanto»; en español, «lloró» es claro, digno y suficientemente literal. «Sollozó» sería más específico de un tipo de llanto que el hebreo no exige.
- source_word: וּבִנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - Benjamín también
  lexicon: HALOT
  rationale: La simple coordinación hebrea se conserva con «y», sin añadir énfasis que el texto no señala.
- source_word: עַל צַוָּארָיו
  english_pob_choice: on his neck
  chosen_spanish: sobre su cuello
  alternatives_spanish:
  - al cuello de él
  - en su cuello
  lexicon: HALOT
  rationale: «Sobre su cuello» reproduce la relación espacial del hebreo con naturalidad en español y mantiene el eco del abrazo mutuo.
theological_decisions:
- issue: Uso de una expresión corporal idiomática sin perder el sentido de afecto familiar
  english_pob_reading: The Hebrew literally says he fell on the necks/neck of Benjamin his brother ... and Benjamin wept on his neck, with the plural form functioning idiomatically for an embrace.
  chosen_spanish_reading: Se conserva la imagen física del abrazo sin traducirla a una explicación interpretativa; el lector recibe el gesto de reconciliación y afecto tal como aparece en el hebreo.
  alternative_spanish_readings:
  - Entonces lo abrazó
  - Entonces se abrazaron
  rationale: El pasaje narra una reconciliación intensa mediante gestos corporales concretos. Traducirlo como «abrazó» o «se abrazaron» explicaría el sentido, pero borraría la imagen singular del cuello y la repetición del paralelismo hebreo.
  doctrine_reference: Narrativa patriarcal; reconciliación familiar en Génesis 45
translation_notes:
  revision_awareness: El audit trail inglés mantiene la elección de «fell on the neck ... wept» y la nota sobre el plural idiomático «necks». La versión española sigue esa misma decisión, preservando la imagen corporal y evitando una paráfrasis explicativa. No se registran revisiones sustantivas en el paso más reciente.
  spanish_consistency_notes:
  - Se mantiene Benjamín con acento, conforme al uso bíblico en español.
  - 'Se conserva el paralelismo entre ambos miembros de la frase: «al cuello ... lloró; ... sobre su cuello».'
  - No se introduce «Cristo», «Señor» ni vocabulario teológico ajeno al texto narrativo.
