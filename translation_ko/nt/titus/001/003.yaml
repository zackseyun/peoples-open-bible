id: TIT.1.3
reference: Titus 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐφανέρωσεν δὲ καιροῖς ἰδίοις, τὸν λόγον αὐτοῦ ἐν κηρύγματι ὃ ἐπιστεύθην ἐγὼ κατ’ ἐπιταγὴν τοῦ σωτῆρος ἡμῶν θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/003.yaml
  text: but in his own times he revealed his word through the proclamation with which I was entrusted[a], according to the command of God our Savior[c][b],
  footnotes:
  - marker: a
    text: Or 'at the proper times.' The Greek literally says 'in his own times,' likely referring to God's appointed times.
    reason: lexical_alternative
  - marker: b
    text: Or 'through preaching.' The term can refer either to the act of proclamation or to the proclaimed message.
    reason: lexical_alternative
  - marker: c
    text: "The relative clause may also be understood with 'his word': 'his word ... which I was entrusted with.'"
    reason: alternative_reading
translation:
  language: ko
  text: 그리고 정하신 때에[a] 자기의 말씀을, 우리 구주 하나님의 명령을 따라 내가 맡겨진 선포[b][c]를 통하여 드러내셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「합당한 때에」. 헬라어는 문자적으로 「자기의(고유한) 때들에」이며, 하나님께서 정하신 시점을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「설교를 통하여」. 헬라어 κήρυγμα는 선포 행위 자체나 선포된 메시지 모두를 가리킬 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 관계절은 「말씀」을 수식하는 것으로도 읽을 수 있다 — 「내가 맡겨진 그분의 말씀」.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφανέρωσεν
  english_pob_choice: revealed
  chosen_korean: 드러내셨습니다
  alternatives_korean:
  - 나타내셨습니다
  - 밝히 보이셨습니다
  lexicon: BDAG
  rationale: 감추어진 것을 가시화한다는 φανερόω의 의미를 살린다. 합쇼체 종결.
- source_word: καιροῖς ἰδίοις
  english_pob_choice: in his own times
  chosen_korean: 정하신 때에
  alternatives_korean:
  - 자기의 때에
  - 합당한 때에
  - 그분의 정하신 시기에
  lexicon: BDAG
  rationale: ἴδιος + καιρός는 「하나님의 고유한·정해진 시기」를 가리킨다. 한국어로 직역 「자기의 때에」가 자연스럽지 않으므로 의미를 살려 「정하신 때에」로 옮긴다. 각주로 직역과 「합당한 때」를 둔다.
- source_word: λόγον
  english_pob_choice: word
  chosen_korean: 말씀
  alternatives_korean:
  - 말
  lexicon: BDAG
  rationale: 신적 계시의 말씀을 가리키는 정립된 경어형.
- source_word: κηρύγματι
  english_pob_choice: proclamation
  chosen_korean: 선포
  alternatives_korean:
  - 설교
  - 전파
  lexicon: BDAG
  rationale: κήρυγμα의 행위·내용 양의성을 가장 잘 보존하는 한국어 어휘. 「설교」는 후대 교회 직제 어감이 강하다.
- source_word: ἐπιστεύθην
  english_pob_choice: I was entrusted
  chosen_korean: 내가 맡겨진
  alternatives_korean:
  - 내게 맡겨진
  - 내가 위탁받은
  lexicon: BDAG
  rationale: 수동태 부정과거. πιστεύω + 인격 여격은 「~에게 맡기다」의 의미. 바울이 그 선포의 직무를 맡은 자임을 드러낸다.
- source_word: κατ’ ἐπιταγὴν
  english_pob_choice: according to the command
  chosen_korean: 명령을 따라
  alternatives_korean:
  - 분부를 따라
  - 명을 따라
  lexicon: BDAG
  rationale: 사도직의 위임 근거를 가리키는 표준 표현.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: of God our Savior
  chosen_korean: 우리 구주 하나님의
  alternatives_korean:
  - 우리의 구주이신 하나님의
  lexicon: BDAG
  rationale: 「우리 구주 하나님」은 목회서신의 정형 표현. 글로서리 기본값(σωτήρ→구주, Θεός→하나님)을 적용.
