translation:
  language: es
  text: Una esposa mala es lepra[a] para su marido; que la expulse de su casa[c][b], y será sanado de su lepra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרַעַת, tradicionalmente «lepra», designa en el uso bíblico una afección cutánea más amplia que la lepra moderna.
    reason: cultural_note
  - marker: b
    text: 'O: «que se divorcie de ella». El hebreo dice más literalmente «que la expulse de su casa», lo cual puede implicar separación sin especificar la forma legal.'
    reason: alternative_reading
  - marker: c
    text: 'El paralelo griego dice algo muy distinto: «No des salida al agua, ni autoridad a una esposa malvada». Aquí se sigue el testimonio hebreo conservado como fuente principal de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: אִשָּׁה רָעָה
  english_pob_choice: a bad wife
  chosen_spanish: una esposa mala
  alternatives_spanish:
  - una esposa mala
  - una esposa perversa
  - una esposa malvada
  - una mujer mala
  lexicon: HALOT
  rationale: El hebreo describe a la esposa con un adjetivo moral amplio. En español, "esposa" precisa el vínculo con לְבַעֲלָהּ / "su marido", y "mala" conserva la fuerza general de רָעָה sin cargar el verso más de lo que permite el original.
- source_word: צָרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - una enfermedad de la piel
  - aflicción
  - lepra
  lexicon: HALOT
  rationale: Se mantiene la equivalencia tradicional y reconocible de צָרַעַת como "lepra", siguiendo el valor cultural y metafórico del término bíblico, aunque la categoría antigua no coincida exactamente con la lepra moderna.
- source_word: לְבַעֲלָהּ
  english_pob_choice: to her husband
  chosen_spanish: para su marido
  alternatives_spanish:
  - para su esposo
  - a su marido
  - para su dueño
  lexicon: HALOT
  rationale: En este contexto conyugal, בעל significa "marido". "Para su marido" reproduce de manera natural la relación comparativa del hebreo, donde la mujer es presentada como una plaga para él.
- source_word: יְגַרְשֶׁנָּה
  english_pob_choice: let him drive her out
  chosen_spanish: que la expulse
  alternatives_spanish:
  - que la eche
  - que la saque
  - que la destierre
  lexicon: HALOT
  rationale: גרש expresa expulsar / echar fuera. En español, "que la expulse" conserva la fuerza del verbo sin introducir todavía una categoría jurídica que el hebreo no menciona explícitamente.
- source_word: מִבֵּיתוֹ
  english_pob_choice: of his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su hogar
  - de su vivienda
  - fuera de su casa
  lexicon: HALOT
  rationale: La casa es el ámbito doméstico concreto del texto. "De su casa" sigue de cerca el hebreo y mantiene la imagen de expulsión del espacio propio del marido.
- source_word: וְיִתְרַפֵּא
  english_pob_choice: and he will be healed
  chosen_spanish: y será sanado
  alternatives_spanish:
  - y quedará sanado
  - y será curado
  - y se curará
  lexicon: HALOT
  rationale: El verbo רפא se traduce de forma natural como "sanar" / "ser sanado". La pasiva refleja el resultado esperado tras la expulsión y preserva el paralelismo con "lepra".
- source_word: מִצָּרַעְתּוֹ
  english_pob_choice: of his leprosy
  chosen_spanish: de su lepra
  alternatives_spanish:
  - de esa lepra
  - de su aflicción
  - de su enfermedad
  lexicon: HALOT
  rationale: Repetir "lepra" mantiene la simetría retórica del verso y evita diluir la comparación del primer hemistiquio.
theological_decisions:
- issue: Si traducir el remedio como divorcio legal o como expulsión concreta de la casa
  english_pob_reading: 'Concrete expulsion: ''let him drive her out of his house'''
  chosen_spanish_reading: 'Expulsión concreta: ''que la expulse de su casa'''
  alternative_spanish_readings:
  - que se divorcie de ella
  - que la repudie
  rationale: El hebreo usa גרש con la precisión espacial de 'de su casa', por lo que el texto habla con mayor claridad de expulsar que de establecer una fórmula legal de divorcio. Se conserva así la tensión documental entre la imagen doméstica y las posibles implicaciones jurídicas sin resolverlas en la traducción.
  doctrine_reference: Primacía del testimonio original y preservación de la tensión textual sin sobreinterpretación legal.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Sirácides 25:25 y alinea su lectura con el audit trail inglés: metáfora matrimonial fuerte, lepra como imagen de impureza/aflicción, y expulsión concreta del hogar sin fijar explícitamente el término legal de divorcio. La versión griega paralela difiere sustancialmente y se mantiene como testigo secundario, no como base principal de la redacción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el tetragrámaton.
  - Se mantiene «lepra» por consistencia con la tradición bíblica y con el valor metafórico del hebreo.
  - «Marido» se elige por el contexto conyugal, evitando «dueño» o «amo» que desviarían el sentido.
  - La pasiva «será sanado» conserva el resultado esperado sin añadir sujeto explícito.
  - No se introduce «divorcio» en el cuerpo principal, para no resolver una tensión que el hebreo no formula de manera directa.
