  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: βασίλισσα νότου ἐγερθήσεται ἐν τῇ κρίσει μετὰ τῆς γενεᾶς ταύτης καὶ κατακρινεῖ αὐτήν· ὅτι ἦλθεν ἐκ τῶν περάτων τῆς γῆς ἀκοῦσαι τὴν σοφίαν Σολομῶνος, καὶ ἰδοὺ πλεῖον Σολομῶνος ὧδε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/042.yaml
  text: 'The queen of the South will rise up in the judgment with this generation and will condemn it[a], because she came from the ends of the earth to hear the wisdom of Solomon, and behold[b], something greater than Solomon is here.'
  footnotes:
  - marker: a
    text: Or 'one greater than Solomon is here.' The Greek uses a neuter form ('something greater'), which may emphasize the surpassing greatness present in Jesus and his ministry.
    reason: alternative_reading
  - marker: b
    text: The 'queen of the South' alludes to the queen of Sheba (1 Kings 10:1–13; 2 Chronicles 9:1–12), though the Greek text does not name Sheba explicitly.
    reason: cross_reference
translation:
  language: ko
  text: '남방 여왕이 심판 때에 이 세대와 함께 일어나 이 세대를 정죄할 것이다. 그 여왕은 솔로몬의 지혜를 들으려고 땅 끝에서 왔기 때문이다. 그런데 보라, 솔로몬보다 더 큰 분이 여기 있다.'
  philosophy: optimal-equivalence
