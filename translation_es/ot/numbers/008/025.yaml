translation:
  language: es
  text: Y desde los cincuenta años de edad se retirará del servicio del trabajo[a] y no servirá más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se volverá» o «retornará del servicio del trabajo»; el verbo hebreo dice literalmente «volver/retroceder», aquí con el sentido de retirarse de la función activa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: And from fifty years old
  chosen_spanish: Y desde los cincuenta años de edad
  alternatives_spanish:
  - Y a partir de los cincuenta años
  - Y desde la edad de cincuenta años
  lexicon: HALOT
  rationale: La expresión hebrea marca el umbral de edad. «Desde los cincuenta años de edad» conserva ese valor idiomático con español natural y claro.
- source_word: יָשׁוּב
  english_pob_choice: he shall withdraw
  chosen_spanish: se retirará
  alternatives_spanish:
  - volverá
  - retrocederá
  lexicon: HALOT
  rationale: El verbo básico significa «volver/retroceder», pero aquí, con la construcción de apartarse de una función, el sentido es dejar la actividad o retirarse del cargo. «Se retirará» comunica la función sin perder la base léxica.
- source_word: מִצְּבָא
  english_pob_choice: from the service
  chosen_spanish: del servicio
  alternatives_spanish:
  - de la labor
  - del turno
  - del deber
  lexicon: HALOT
  rationale: צָבָא puede referirse a servicio, deber o hueste; en este contexto levítico no es militar. «Servicio» mantiene el marco cultual/administrativo que la POB inglesa también preserva.
- source_word: הָעֲבֹדָה
  english_pob_choice: of the work
  chosen_spanish: de la labor
  alternatives_spanish:
  - del trabajo
  - del servicio
  - de la obra
  lexicon: HALOT
  rationale: עֲבֹדָה nombra trabajo o labor. «Labor» distingue este término de צָבָא y evita fusionar ambos componentes en un solo concepto español.
- source_word: וְלֹא יַעֲבֹד עוֹד
  english_pob_choice: and shall serve no more
  chosen_spanish: y no servirá más
  alternatives_spanish:
  - y no trabajará más
  - y no ejercerá más
  - y no prestará servicio más
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «serve no more» para mantener la terminología de servicio. «No servirá más» preserva ese mismo campo semántico y resulta idiomático en español bíblico moderno.
translation_notes:
  revision_awareness: La POB inglesa revisó la clausula final de «work no more» a «serve no more» para alinear mejor la terminología de servicio; la versión española sigue esa decisión y mantiene la distinción entre צָבָא («servicio») y עֲבֹדָה («labor»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Servicio» y «labor» se distinguen para reflejar la pareja hebrea צָבָא / עֲבֹדָה.
  - El pie de nota se ancla en «se retirará» porque ahí está la alternativa léxica principal de יָשׁוּב.
