review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro POB en la secuencia de acciones: David hiere a Moab, los mide con una cuerda/línea, los hace acostarse en tierra, asigna dos porciones a la muerte y una porción completa a la vida, y Moab queda sometido trayendo tributo. Sin embargo, varias formulaciones españolas no preservan con suficiente naturalidad ni precisión la imagen de porciones medidas: «dos cuerdas» y «una cuerda completa» sugieren objetos separados más que longitudes/porciones medidas; «para hacer morir / para hacer vivir» suena forzado y menos idiomático que el valor causativo esperado. También «vino a ser para David esclavos» es gramaticalmente áspero y exagera ligeramente el matiz político que el propio expediente inglés encuadra mejor como servidumbre vasallática.'
  spanish_quality_summary: 'La legibilidad es aceptable, pero hay calcos poco naturales: «haciéndolos acostarse en tierra», «para hacer morir», «para hacer vivir», y especialmente «vino a ser para David esclavos». En español bíblico claro y moderno, conviene usar formulaciones más naturales y dignas sin suavizar el sentido: «haciéndolos tenderse en tierra», «para matar / para dejar con vida», y «Moab llegó a ser siervo de David» o equivalente. Además, el número colectivo «Moab» pide singular en español cuando se personifica como entidad política.'
  glossary_alignment: 'No hay términos del glosario principal especialmente conflictivos aquí. La decisión clave es עֲבָדִים: aunque el proyecto suele preferir «esclavo» para δοῦλος cuando el inglés eligió «slave», aquí el expediente inglés documenta expresamente «servants» por contexto político de vasallaje; por eso en español corresponde «siervo»/«siervos» o una construcción de sujeción, no «esclavos». «Tributo» está bien para מִנְחָה en este contexto.'
  issues:
  - severity: medium
    issue: «dos cuerdas» / «una cuerda completa» no expresa bien porciones medidas
    rationale: שְׁנֵי חֲבָלִים y מְלֹא הַחֶבֶל se refieren a longitudes o porciones medidas por la cuerda, no naturalmente a dos cuerdas físicas distintas. En español conviene «dos medidas de cuerda» y «una medida completa de cuerda» o similar.
  - severity: medium
    issue: «para hacer morir / para hacer vivir» es poco idiomático
    rationale: Aunque intenta reflejar los infinitivos causativos, en español suena torpe. «Para matar» y «para dejar con vida» preservan la función y la antítesis sin perder dureza.
  - severity: high
    issue: «Así Moab vino a ser para David esclavos» es gramatical y semánticamente deficiente
    rationale: «Moab» como entidad política pide singular («siervo» o «sometido»), y «esclavos» sobretraduce el matiz que el expediente inglés define como vasallaje político, no esclavitud chattel. La construcción «vino a ser para David» también es poco natural.
  - severity: low
    issue: «haciéndolos acostarse en tierra» puede mejorarse en naturalidad
    rationale: Es comprensible, pero «haciéndolos tenderse en tierra» o «hacerlos acostarse en el suelo» suena más natural y mantiene la crudeza procedimental.
  revised_spanish_text: Él hirió a Moab y los midió con una cuerda[a], haciéndolos tenderse en tierra. Midió dos medidas de cuerda para matar y una medida completa de cuerda para dejar con vida. Así Moab llegó a ser siervo[b] de David, trayendo tributo.
  revised_footnotes:
  - marker: a
    text: O «con un cordel» o «con una cuerda de medir».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo describe a David midiendo a los moabitas mientras yacían en el suelo: dos porciones medidas fueron asignadas «para muerte» y una porción completa «para vida», lo que implica que algunos fueron ejecutados y otros perdonados.'
    reason: cultural_note
  revision_rationale: Se ajustó el español para reflejar mejor las porciones medidas del hebreo, evitar calcos poco idiomáticos, y seguir la decisión documentada del POB de tratar עֲבָדִים aquí como servidumbre/vasallaje político más que esclavitud. Los cambios preservan la dureza del pasaje y mejoran la claridad en español.
