translation:
  language: es
  text: Porque todos los pueblos caminarán[a], cada uno[b] en el nombre de su dios, pero nosotros caminaremos en el nombre de Yahvé nuestro Dios para siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones». El hebreo עַמִּים puede referirse a pueblos o naciones; se eligió «pueblos» para preservar el plural étnico.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre». Se usa «cada uno» porque אִישׁ funciona distributivamente con «todos los pueblos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón o fundamento de la afirmación anterior. «Porque» mantiene mejor la relación discursiva que un simple «pues» y suena natural en español bíblico contemporáneo.
- source_word: כָּל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede significar «pueblos» o «naciones». «Todos los pueblos» conserva el matiz plural de grupos étnicos y evita diluirlo en un singular genérico.
- source_word: יֵלְכוּ
  english_pob_choice: walk
  chosen_spanish: caminarán
  alternatives_spanish:
  - andaràn
  - irán
  lexicon: HALOT
  rationale: El verbo הלך con בְּשֵׁם en contextos de lealtad religiosa expresa conducta o pertenencia, no solo movimiento físico. «Caminarán» conserva la imagen hebrea en español natural.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - uno por uno
  lexicon: HALOT
  rationale: Aunque literalmente es «hombre», aquí funciona distributivamente con el sujeto colectivo. «Cada uno» transmite esa fuerza sin masculinizar innecesariamente el sentido.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - bajo el nombre de
  lexicon: HALOT
  rationale: La expresión denota pertenencia, invocación o autoridad. «En el nombre de» conserva el paralelismo del verso y es la forma española más transparente.
- source_word: אֱלֹהָיו
  english_pob_choice: his god
  chosen_spanish: su dios
  alternatives_spanish:
  - su dios
  - su deidad
  lexicon: HALOT
  rationale: El sufijo singular masculino concuerda con el distributivo אִישׁ. «Su dios» mantiene la singularidad y la referencia a la divinidad propia de cada pueblo.
- source_word: וַאֲנַחְנוּ
  english_pob_choice: but we
  chosen_spanish: pero nosotros
  alternatives_spanish:
  - y nosotros
  - en cambio nosotros
  lexicon: HALOT
  rationale: Aunque la conjunción básica es «y», el contraste con las naciones requiere en español una oposición explícita. «Pero nosotros» reproduce bien el giro adversativo.
- source_word: נֵלֵךְ
  english_pob_choice: will walk
  chosen_spanish: caminaremos
  alternatives_spanish:
  - andaremos
  - iremos
  lexicon: HALOT
  rationale: El imperfecto expresa resolución o compromiso futuro. «Caminaremos» mantiene la correspondencia con יֵלְכוּ y la idea de conducta continua.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto establece «Yahvé» para el Tetragrámaton en el texto principal español, en lugar de una sustitución como «el SEÑOR».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: La construcción de sufijo expresa relación de pacto. «Nuestro Dios» es el equivalente directo, claro y reverente en español.
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - para siempre y para siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión geminada intensifica duración perpetua. «Por siempre y para siempre» comunica esa solemnidad en español sin perder el énfasis acumulativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en español como «Yahvé», conforme a la terminología del proyecto, preservando la identidad pactal del nombre frente a una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor distributivo de אִישׁ dentro del paralelismo colectivo
  english_pob_reading: each
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: La forma hebrea es masculina, pero aquí no identifica sexo sino distribución dentro de «todos los pueblos». «Cada uno» evita un giro innecesariamente masculino y conserva el sentido distributivo documentado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, sin cambios de sentido respecto a la revisión más reciente; se preservó el contraste entre las naciones y el pueblo del pacto, así como la duración enfática de la clausula final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en el texto principal.
  - Se conserva el paralelismo verbal con dos formas de caminar/caminarán para reflejar el hebreo.
  - «Pueblos» se usa en plural étnico, no como singular colectivo.
  - «Cada uno» evita una lectura sexista del distributivo hebreo sin alterar la gramática del original.
