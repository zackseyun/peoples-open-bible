review_pass:
  verdict: revise
  source_alignment_summary: El hebreo pregunta por el valor/utilidad de los ídolos de las naciones, los cuales no comen ni huelen. El borrador español introduce indebidamente «lo que se ofrece», idea tomada del griego κάρπωσις pero ausente del hebreo y no seguida por el English POB en el texto principal. La nota sobre el añadido griego sí preserva correctamente la expansión textual como lectura alternativa.
  spanish_quality_summary: El español es fluido, pero la construcción «¿Qué valor tiene lo que se ofrece a los ídolos...?» cambia el referente desde los ídolos mismos a las ofrendas hechas a ellos. Además, «tener valor a» no es natural en este contexto; conviene una formulación más directa como «¿Qué valor hay en los ídolos de las naciones...?».
  glossary_alignment: «Ídolos», «naciones» y «Señor» en la nota están alineados con las decisiones documentadas. No hay conflictos con la terminología base del proyecto. La corrección necesaria es semántica, no glosarial.
  issues:
  - severity: high
    issue: Se añadió «lo que se ofrece» en el texto principal.
    rationale: El hebreo מה יעריכו לאלילי הגוים pregunta por el valor de los ídolos de las naciones; no menciona ofrendas. Aunque el griego tiene κάρπωσις, el English POB decidió seguir el hebreo en el texto principal y dejar el plus griego en nota.
  - severity: medium
    issue: La preposición y sintaxis españolas no reflejan bien la decisión auditada.
    rationale: La justificación inglesa favorece «in the idols of the nations». En español, «¿Qué valor tiene ... a los ídolos» suena forzado; «¿Qué valor hay en los ídolos de las naciones?» expresa mejor la valoración retórica sin añadir contenido.
  revised_spanish_text: ¿Qué valor hay en los ídolos de las naciones[a], que ni comen ni huelen?
