translation:
  language: es
  text: 'Y José tomó a los dos: a Efraín en su mano derecha, al lado izquierdo de Israel[a], y a Manasés en su mano izquierda, al lado derecho de Israel, y los acercó a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «desde la izquierda de Israel» y «desde la derecha de Israel», describiendo la colocación de los muchachos respecto de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recibió
  lexicon: HALOT
  rationale: לקח en este contexto narrativo expresa la acción simple de tomar; «tomó» es natural en español y no añade la especificidad de «agarró». «Recibió» no encaja con el movimiento de colocación de los hijos.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: a los dos
  alternatives_spanish:
  - a ambos
  - a los dos juntos
  lexicon: HALOT
  rationale: El hebreo mantiene explícito el dual. «A los dos» conserva esa referencia sin sonar forzado en español.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: Nombre propio
  rationale: Se transcribe el nombre bíblico en forma corriente en español, conservando la referencia personal.
- source_word: בִּימִינוֹ
  english_pob_choice: in his right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - con su mano derecha
  - a su derecha
  lexicon: HALOT
  rationale: La construcción preposicional en este contexto señala la mano como la posición/medio con que sostenía a Efraín. «En su mano derecha» mantiene el paralelismo y la precisión espacial.
- source_word: מִשְּׂמֹאל יִשְׂרָאֵל
  english_pob_choice: from Israel’s left
  chosen_spanish: desde la izquierda de Israel
  alternatives_spanish:
  - desde el lado izquierdo de Israel
  - a la izquierda de Israel
  lexicon: HALOT
  rationale: Se preserva el matiz direccional de la preposición y la perspectiva de colocación respecto de Israel. «Izquierda de Israel» refleja el orden del hebreo sin forzar una formulación más interpretativa.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manase
  lexicon: Nombre propio
  rationale: Se usa la forma española estable del nombre bíblico.
- source_word: בִשְׂמֹאלוֹ
  english_pob_choice: in his left hand
  chosen_spanish: en su mano izquierda
  alternatives_spanish:
  - con su mano izquierda
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «en su mano derecha» y la imagen física de la escena.
- source_word: מִימִין יִשְׂרָאֵל
  english_pob_choice: from Israel’s right
  chosen_spanish: desde la derecha de Israel
  alternatives_spanish:
  - desde el lado derecho de Israel
  - a la derecha de Israel
  lexicon: HALOT
  rationale: Como en la primera mitad, se conserva la perspectiva espacial marcada por la preposición y el sustantivo de dirección.
- source_word: וַיַּגֵּשׁ אֵלָיו
  english_pob_choice: brought them near to him
  chosen_spanish: y los acercó a él
  alternatives_spanish:
  - y los presentó a él
  - y los llevó hacia él
  lexicon: HALOT
  rationale: נגשׁ significa acercar o hacer venir cerca. «Los acercó a él» reproduce el movimiento sin añadir el matiz más formal de «presentó».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: Nombre propio
  rationale: Se conserva el nombre del texto hebreo, ya que aquí el narrador dice explícitamente «Israel» y no conviene armonizarlo a «Jacob».
theological_decisions:
- issue: Nombre del patriarca en el relato de bendición
  english_pob_reading: Israel
  chosen_spanish_reading: Israel
  alternative_spanish_readings:
  - Jacob
  rationale: La forma del hebreo subraya el nombre del pacto en el contexto de la bendición. Mantener «Israel» evita suavizar ese rasgo narrativo y teológico.
  doctrine_reference: Philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la relación espacial de «at Israel’s left/right» a «from Israel’s left/right» para reflejar con mayor precisión la preposición hebrea מִן en un contexto de colocación. La redacción española conserva esa perspectiva direccional con «desde la izquierda/derecha de Israel».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió la forma española bíblica «Efraín» y «Manasés» para nombres propios, sin alterar la estructura del relato.
  - Se evitó «SEÑOR» o «Jacob» para no borrar el detalle textual de «Israel» en la escena.
