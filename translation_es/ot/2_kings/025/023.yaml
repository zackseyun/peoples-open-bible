revisions:
- from: 'Cuando oyeron todos los jefes de las tropas[a], ellos y sus hombres, que el rey de Babilonia había puesto a Gedalías, vinieron a Gedalías en Mizpa: Ismael hijo de Netanías, y Johanán hijo de Careaj, y Seraías hijo de Tanhumet, el netofatita, y Jazanías hijo del maacatita, ellos y sus hombres.'
  to: 'Cuando todos los jefes de las tropas[a], ellos y sus hombres, oyeron que el rey de Babilonia había nombrado a Gedalías, fueron a Gedalías en Mizpa: Ismael hijo de Netanías, y Johanán hijo de Careaj, y Seraías hijo de Tanhumet, el netofatita, y Jaazanías hijo del maacatita,[b] ellos y sus hombres.'
  rationale: Se corrige el verbo principal para expresar con naturalidad el sentido de nombramiento de הִפְקִיד, se ajusta el nombre propio a 'Jaazanías', y se aclara el gentilicio final. Dado que 'hijo del maacatita' puede resultar ambiguo en español, se conserva la forma más cercana al borrador con una nota aclaratoria sobre el gentilicio hebreo.
