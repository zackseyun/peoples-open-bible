revisions:
- from: 'Hijo de hombre[a], dile a ella[b]: «Tú eres una tierra no purificada y no regada en el día de la indignación[c]».'
  to: '«Hijo de hombre, dile a ella: “Tú eres una tierra no purificada y sin lluvia[a] en el día de la indignación[b]”»'
  rationale: Se corrige el anclaje de notas para que correspondan al hebreo pertinente, se elimina una nota redundante, se mejora «no regada» a «sin lluvia» para reflejar mejor la imagen de lluvia del original y del audit trail, y se normaliza la capitalización de «hijo de hombre» en español. Se conserva «purificada» e «indignación» por fidelidad y registro.
