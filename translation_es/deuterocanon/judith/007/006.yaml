translation:
  language: es
  text: Y el segundo día, Holofernes sacó toda su caballería[a] delante de los hijos de Israel, que estaban en Betulia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El griego dice literalmente 'los hijos de Israel', una designación étnica tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ... ἡμέρᾳ τῇ δευτέρᾳ
  english_pob_choice: on the second day
  chosen_spanish: al segundo día
  alternatives_spanish:
  - en el segundo día
  - el segundo día
  lexicon: LSJ
  rationale: La expresión temporal con artículo se vierte de forma natural en español como 'al segundo día', manteniendo la secuencia del griego sin sonar rígida.
- source_word: ἐξήγαγεν
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo fuera
  - hizo salir
  - sacó al campo
  lexicon: LSJ
  rationale: '''Sacó'' comunica el movimiento de hacer salir o presentar tropas sin añadir la imagen específica de ''marchar'', que el verbo no exige.'
- source_word: πᾶσαν τὴν ἵππον
  english_pob_choice: all his cavalry
  chosen_spanish: toda su caballería
  alternatives_spanish:
  - todos sus jinetes
  - todo su caballo
  lexicon: LSJ
  rationale: En contexto militar, ἵππον designa la fuerza de caballería de modo colectivo. 'Caballería' conserva ese valor colectivo de manera natural en español.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: LSJ
  rationale: El posesivo español normaliza la referencia a Holofernes y reproduce el sentido relacional del griego.
- source_word: κατὰ πρόσωπον
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - en frente de
  - ante
  - frente a
  lexicon: LSJ
  rationale: '''Delante de'' expresa con claridad la posición frente al enemigo y funciona bien en español moderno sin sobreinterpretar el matiz espacial.'
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: LSJ
  rationale: Se conserva la fórmula genealógico-étnica del griego. La alternativa 'israelitas' existe, pero borra la transparencia del original que el POB inglés también preservó.
- source_word: οἳ ἦσαν ἐν Βετυλουά
  english_pob_choice: who were in Bethulia
  chosen_spanish: que estaban en Betulia
  alternatives_spanish:
  - que estaban en Bethulia
  - que se hallaban en Betulia
  lexicon: LSJ
  rationale: '''Estaban en Betulia'' es la versión más directa y clara de ἐν con nombre de lugar; la transliteración se adapta a la forma española usual ''Betulia''.'
translation_notes:
  revision_awareness: Coincide con el sentido del griego de Swete y con la traducción inglesa auditada; no se requieren revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reproducir la continuidad narrativa de la conjunción griega.
  - Se conserva la designación 'los hijos de Israel' en el texto principal por transparencia al original, con nota alternativa para lectorado natural.
  - '''Betulia'' sigue la forma hispana usual del topónimo, evitando una transliteración no necesaria.'
