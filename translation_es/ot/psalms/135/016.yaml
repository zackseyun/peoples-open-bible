translation:
  language: es
  text: Tienen bocas[a], pero no hablan; tienen ojos, pero no ven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «una boca es para ellos ... ojos son para ellos», una construcción posesiva que en español se expresa naturalmente con «tienen». Aunque «boca» está en singular en hebreo, aquí funciona de manera distributiva respecto del plural y por eso se traduce naturalmente «bocas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּה
  english_pob_choice: mouths
  chosen_spanish: boca
  alternatives_spanish:
  - bocas
  - una boca
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con sentido distributivo respecto del plural «a ellos». En español, el singular colectivo «boca» mantiene bien la construcción sin forzar un plural innecesario; el plural «bocas» sería posible, pero menos natural aquí si se quiere conservar la brevedad del paralelismo.
- source_word: לָהֶם
  english_pob_choice: they have
  chosen_spanish: tienen
  alternatives_spanish:
  - hay para ellos
  - a ellos les pertenece
  lexicon: HALOT
  rationale: La preposición ל con sufijo pronominal expresa posesión en esta construcción. En español, «tienen» comunica de forma natural ese valor posesivo sin depender de una calca como «a ellos».},{
theological_decisions:
- issue: Descripción antropomórfica de los ídolos
  english_pob_reading: Render the verse as a mockery of idols' sensory organs without adding interpretive language about their powerlessness.
  chosen_spanish_reading: Conservar la imagen concreta de boca y ojos que no cumplen su función, sin ampliar el texto con explicación doctrinal.
  alternative_spanish_readings:
  - Tienen bocas, pero no pueden hablar; tienen ojos, pero no pueden ver.
  rationale: El hebreo usa negaciones simples y una imagen irónica. La traducción principal mantiene esa forma sin intensificarla con un modal explícito de incapacidad; así se preserva la tensión retórica del original.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what the source text says without paraphrastic expansion.'
translation_notes:
