translation:
  language: es
  text: Y si el hogar es demasiado pequeño para un cordero[a], entonces él y su vecino más cercano a su casa tomarán uno, según el número de personas; cada hombre, según lo que pueda comer[b], harán el cálculo para el cordero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede referirse de modo más amplio a una cabeza de ganado menor, de oveja o de cabra; aquí se usa 'cordero' por naturalidad en el contexto de la Pascua.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''cada persona, según lo que pueda comer, harán el cálculo para el cordero''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְעַט הַבַּיִת מִהְיֹת מִשֶּׂה
  english_pob_choice: the household is too small for a lamb
  chosen_spanish: la casa es demasiado pequeña para un cordero
  alternatives_spanish:
  - la casa es insuficiente para un cordero
  - el hogar es demasiado pequeño para un cordero
  lexicon: HALOT
  rationale: הַבַּיִת designa literalmente 'la casa', pero aquí se refiere al grupo doméstico que participa en la Pascua. יִמְעַט con מִהְיֹת expresa insuficiencia numérica; 'demasiado pequeña' comunica esa insuficiencia de modo natural en español sin perder el vínculo con la casa/hogar.
- source_word: שֶּׂה
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - animal menor del rebaño
  - oveja o cabra
  lexicon: HALOT
  rationale: שֶׂה puede abarcar ganado menor, de oveja o de cabra. En el contexto pascual, 'cordero' es una elección natural en español y mantiene la legibilidad; la amplitud léxica queda implícita en la nota de alternativa.
- source_word: וְלָקַח הוּא וּשְׁכֵנֹו הַקָּרֹב אֶל בֵּיתוֹ
  english_pob_choice: then he and his nearest neighbor shall take one
  chosen_spanish: él y su vecino más cercano tomarán uno
  alternatives_spanish:
  - él y el vecino que está cerca de su casa tomarán uno
  - él y su vecino próximo a su casa tomarán uno
  lexicon: HALOT
  rationale: הַקָּרֹב אֶל בֵּיתוֹ se expresa con naturalidad como 'su vecino más cercano'. El objeto 'uno' se mantiene para reflejar que el contexto ya determina la víctima sacrificial sin añadir información ajena al hebreo.
- source_word: בְּמִכְסַת נְפָשֹׁת
  english_pob_choice: according to the number of persons
  chosen_spanish: según el número de personas
  alternatives_spanish:
  - por el conteo de personas
  - según la cantidad de almas
  lexicon: HALOT
  rationale: מִכְסָה apunta a un número contado; נְפָשֹׁת aquí significa personas, no 'almas' en un sentido disembodied. 'Personas' evita sobrecargas teológicas ajenas al contexto y conserva el sentido administrativo del cálculo.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino distributivo. 'Cada hombre' conserva esa forma y su fuerza representativa; en español bíblico contemporáneo sigue siendo claro y no fuerza una neutralización que el hebreo no exige.
- source_word: לְפִי אָכְלוֹ
  english_pob_choice: according to what he can eat
  chosen_spanish: según lo que pueda comer
  alternatives_spanish:
  - según su capacidad de comer
  - en proporción a lo que come
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se refiere a la cantidad que cada uno puede consumir. 'Según lo que pueda comer' reproduce bien la idea de capacidad de consumo y resulta natural en español.
- source_word: תָּכֹסּוּ עַל הַשֶּׂה
  english_pob_choice: you shall count for the lamb
  chosen_spanish: ustedes lo calcularán para el cordero
  alternatives_spanish:
  - ustedes lo contarán para el cordero
  - ustedes lo distribuirán para el cordero
  lexicon: HALOT
  rationale: El verbo aquí tiene sentido de computar/reconocer la medida correspondiente al cordero. 'Calcularán' conserva la idea de ajuste por conteo; el objeto implícito se expresa con 'lo' para hacer el español explícito sin apartarse del hebreo.
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del texto inglés, que afinó la frase equivalente a 'according to what he can eat' por una formulación más natural y precisa. Se mantuvo la estructura condicional, la referencia al vecino cercano, la distribución por número de personas y la medida final para el animal sacrificial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene 'cordero' como equivalente contextual de שֶׂה, con nota que preserva la amplitud léxica.
  - '''Personas'' se usa para נְפָשֹׁת para evitar una lectura espiritualizante no presente en el pasaje.'
  - Se conserva el valor distributivo de אִישׁ con 'cada hombre', en línea con la forma singular del hebreo.
