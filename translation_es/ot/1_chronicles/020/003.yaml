    reason: alternative_reading
  - marker: b
    text: Los términos hebreos para estos instrumentos son en parte inciertos; la expresión traducida aquí como «herramientas de hierro» y «hachas» puede referirse más generalmente a implementos cortantes de hierro.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para reflejar fielmente לְכֹל como 'a todas' y para usar el etnónimo español natural 'los amonitas', en línea con la auditoría inglesa. También se afina la ubicación y redacción de la nota léxica sobre los instrumentos inciertos.
