translation:
  language: es
  text: Y aconteció al día siguiente que Moisés se sentó para juzgar al pueblo[a], y el pueblo estuvo de pie delante de Moisés desde la mañana hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuvo alrededor de Moisés». La preposición hebrea puede entenderse más literalmente, pero en contexto la escena es que el pueblo aguardaba ante él para recibir juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el nuevo episodio; «aconteció» conserva ese giro con registro bíblico claro en español, sin caer en un calco torpe ni en una expresión demasiado moderna.
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el siguiente día
  - en el día siguiente
  lexicon: HALOT
  rationale: La expresión temporal denota el día posterior inmediato. «Al día siguiente» es natural en español y conserva con precisión la referencia temporal.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - estaba sentado
  lexicon: HALOT
  rationale: En el contexto judicial, el verbo mantiene la imagen concreta de sentarse para ejercer función de juez. «Se sentó» es fiel y idiomático.
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para decidir los casos de
  - para gobernar
  lexicon: HALOT
  rationale: Aquí שפט se refiere a la decisión judicial entre el pueblo. «Juzgar» comunica mejor esa función que una paráfrasis más amplia.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto, עָם designa a la comunidad de Israel como cuerpo colectivo. «El pueblo» es la forma más natural y precisa en español.
- source_word: וַיַּעֲמֹד הָעָם
  english_pob_choice: and the people stood
  chosen_spanish: y el pueblo estuvo delante
  alternatives_spanish:
  - y el pueblo se quedó de pie
  - y el pueblo permaneció de pie
  lexicon: HALOT
  rationale: El verbo עמד indica estar de pie, pero en español conviene integrar el valor relacional de עַל מֹשֶׁה con la escena procesal. «Estuvo delante» evita una imagen ambigua y refleja la espera ante Moisés.
- source_word: עַל מֹשֶׁה
  english_pob_choice: before Moses
  chosen_spanish: delante de Moisés
  alternatives_spanish:
  - frente a Moisés
  - alrededor de Moisés
  lexicon: HALOT
  rationale: Aunque על puede leerse literalmente como «sobre» o «encima de», con עמד aquí funciona de manera idiomática para expresar presencia ante una autoridad. «Delante de» preserva el sentido contextual sin perder la imagen de comparecencia.
- source_word: מִן הַבֹּקֶר עַד הָעָרֶב
  english_pob_choice: from morning until evening
  chosen_spanish: desde la mañana hasta la tarde
  alternatives_spanish:
  - desde la mañana hasta el anochecer
  - desde el amanecer hasta la tarde
  lexicon: HALOT
  rationale: La expresión abarca toda la jornada. «Desde la mañana hasta la tarde» es una equivalencia natural y comprensible en español, fiel al alcance temporal del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y la solución auditada del inglés POB, manteniendo la secuencia narrativa, la función judicial de שפט y la ambigüedad contextual de עַל מֹשֶׁה en una nota. No se registran revisiones previas en el pasaje fuente, y el resumen de control indica alto acuerdo sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparece el Tetragrámaton; aquí no aplica.
  - Se mantiene «pueblo» para עָם según el uso consistente del proyecto en contextos colectivos israelitas.
  - «Juzgar» conserva el sentido jurídico de שפט sin ampliarlo indebidamente a «gobernar».
  - La nota sobre «delante de Moisés» preserva la tensión lexical entre la lectura más literal de עַל y el sentido contextual de comparecer ante un juez.
