translation:
  language: es
  text: Israel[a], espere en Yahvé, porque con Yahvé está el amor leal, y con él hay abundante redención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ponga su esperanza en Yahvé». El verbo hebreo incluye la idea de esperar con esperanza confiada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֵל
  english_pob_choice: wait
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - pon tu esperanza
  lexicon: HALOT
  rationale: El verbo puede expresar tanto espera paciente como esperanza confiada. En imperativo español, «espera» conserva la idea de demora confiada y funciona de manera natural; la alternativa «pon tu esperanza» explicita el matiz de esperanza que el hebreo también permite.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo del pacto; se mantiene sin cambios.
- source_word: אֶל יְהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Con יחל, la preposición אֶל admite un sentido idiomático de dirección de la espera/esperanza. En español, «espera en Yahvé» comunica bien esa orientación; se conserva la relación personal con el nombre divino, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se traslada el Tetragrámaton como «Yahvé», conforme a la convención del proyecto, para preservar el nombre propio del Dios del pacto.
- source_word: הַחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - misericordia
  - fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד es un término de gran densidad pactual. «Amor leal» intenta retener tanto el componente afectivo como la constancia fiel, sin reducirlo a «misericordia» ni volverlo demasiado técnico.
- source_word: וְהַרְבֵּה
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - mucho
  - pleno
  - copioso
  lexicon: HALOT
  rationale: El término intensifica la cantidad. «Abundante» es natural en español y mantiene el énfasis poético.
- source_word: עִמּוֹ
  english_pob_choice: with him is
  chosen_spanish: con él hay
  alternatives_spanish:
  - con él está
  - de él procede
  lexicon: HALOT
  rationale: Se conserva la estructura preposicional hebrea sin forzarla. «Hay» permite un español fluido y mantiene la afirmación de disponibilidad/presencia.
- source_word: פְדֽוּת
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - rescate
  - liberación
  lexicon: HALOT
  rationale: «Redención» reproduce el peso teológico y lexical del sustantivo, especialmente en paralelo con el amor leal de Yahvé.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino, no una sustitución por título, para conservar la transparencia del texto hebreo y la coherencia doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Valor semántico de יחל en exhortación
  english_pob_reading: wait for the LORD
  chosen_spanish_reading: espera en Yahvé
  alternative_spanish_readings:
  - pon tu esperanza en Yahvé
  - aguarda a Yahvé
  rationale: El verbo combina espera paciente con esperanza confiada. «Espera en Yahvé» retiene esa tensión sin resolverla por completo hacia una sola de las dos opciones.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Sentido pactual de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - fidelidad amorosa
  rationale: Se evita reducir חֶסֶד a una sola noción devocional. «Amor leal» preserva el vínculo entre amor, fidelidad y constancia pactual.
  doctrine_reference: 'DOCTRINE.md: preserve covenantal lexical force'
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo (WLC) y el audit trail inglés sin cambios de revisión recientes; la versión inglesa aprobada quedó estable, y la redacción española refleja sus decisiones léxicas principales con ajustes idiomáticos naturales al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «amor leal» se elige como equivalente de חֶסֶד para mantener la densidad pactual sin caer en fórmulas eclesiásticas heredadas.
  - La estructura paralela «con Yahvé ... con él ...» conserva la repetición hebrea de עִם.
  - La nota al pie marca la alternativa semántica de יחל sin desplazar la lectura principal de espera confiada.
