translation:
  language: es
  text: para tomar botín y para saquear despojos, para volver tu mano contra ruinas ahora habitadas y contra un pueblo reunido de entre las naciones, que ha adquirido ganado y posesiones, que habita en el centro de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el ombligo de la tierra», un modismo para el centro o medio de la tierra o del mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹל שָׁלָל
  english_pob_choice: to seize spoil
  chosen_spanish: saquear botín
  alternatives_spanish:
  - tomar botín
  - apoderarse de botín
  lexicon: HALOT
  rationale: El infinitivo con objeto cognado expresa una acción intensificada de despojo. «Saquear botín» conserva esa fuerza verbal y suena natural en español sin diluir el paralelismo.
- source_word: וְלָבֹז בַּז
  english_pob_choice: to plunder plunder
  chosen_spanish: despojar despojo
  alternatives_spanish:
  - saquear saqueo
  - tomar despojo
  lexicon: HALOT
  rationale: La segunda pareja infinitivo-sustantivo repite la intensificación y conviene mantenerla visible. «Despojar despojo» refleja el paralelismo léxico del hebreo y evita homogeneizarlo con la frase anterior.
- source_word: לְהָשִׁיב יָדְךָ
  english_pob_choice: to turn your hand
  chosen_spanish: volver tu mano
  alternatives_spanish:
  - girar tu mano
  - extender tu mano
  lexicon: HALOT
  rationale: La expresión idiomática sugiere dirigir la acción o el poder contra un objetivo. «Volver tu mano» conserva la metáfora del hebreo y la relación con שׁוּב, mientras sigue siendo comprensible en español.
- source_word: חֳרָבוֹת נוֹשָׁבוֹת
  english_pob_choice: ruins now inhabited
  chosen_spanish: ruinas ahora habitadas
  alternatives_spanish:
  - lugares desolados ahora habitados
  - sitios devastados y resettados
  lexicon: HALOT
  rationale: La tensión semántica del hebreo —ruinas que han pasado a estar habitadas— se mantiene sin explicitar de más. «Ruinas ahora habitadas» conserva tanto la devastación previa como la ocupación presente.
- source_word: עַם מְאֻסָּף מִגּוֹיִם
  english_pob_choice: a people gathered from the nations
  chosen_spanish: un pueblo reunido de entre las naciones
  alternatives_spanish:
  - un pueblo juntado de entre las naciones
  - un pueblo congregado de entre las naciones
  lexicon: HALOT
  rationale: «Reunido» comunica bien el sentido de جمع/gathered y encaja con el registro bíblico. «De entre las naciones» preserva la procedencia de la diáspora sin suavizarla.
- source_word: עֹשֶׂה מִקְנֶה וְקִנְיָן
  english_pob_choice: who have acquired livestock and possessions
  chosen_spanish: que ha adquirido ganado y posesiones
  alternatives_spanish:
  - que ha adquirido animales y bienes
  - que posee ganado y propiedades
  lexicon: HALOT
  rationale: El contexto es de acumulación de riqueza. «Ha adquirido» refleja el valor de עֹשֶׂה como obtención/acumulación, «ganado» cubre מִקְנֶה y «posesiones» corresponde a קִנְיָן con suficiente amplitud.
- source_word: מִקְנֶה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganado doméstico
  - reses
  lexicon: HALOT
  rationale: En español bíblico y moderno, «ganado» comunica el valor económico de animales de cría de manera natural. Es más amplio que «reses» y más cercano al sentido de propiedad animal.
- source_word: קִנְיָן
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - propiedades
  - bienes
  lexicon: HALOT
  rationale: El término alude a propiedad adquirida. «Posesiones» conserva la amplitud y la idea de algo adquirido, manteniendo el equilibrio con «ganado».
- source_word: יֹשְׁבֵי עַל טַבּוּר הָאָרֶץ
  english_pob_choice: who dwell at the center of the earth
  chosen_spanish: que habita en el centro de la tierra
  alternatives_spanish:
  - que habita en el ombligo de la tierra
  - que habita en el centro del país
  lexicon: HALOT
  rationale: La metáfora de טַבּוּר como «centro/ombligo» puede malentenderse si se vierte literalmente. «Centro de la tierra» comunica la idea de ubicación central y prominencia sin perder el trasfondo figurado.
theological_decisions:
- issue: Metáfora geográfica de טַבּוּר הָאָרֶץ
  english_pob_reading: the phrase is rendered idiomatically as 'the center of the earth' rather than woodenly as 'the navel of the earth'
  chosen_spanish_reading: «el centro de la tierra» en lugar de una traducción literal de «ombligo/ombligo de la tierra»
  alternative_spanish_readings:
  - el ombligo de la tierra
  - el navel de la tierra
  rationale: No hay una controversia doctrinal aquí, pero una traducción excesivamente literal en español podría oscurecer la metáfora. La opción idiomática conserva la fuerza de centralidad y evita una imagen corporal confusa.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés: mantiene el paralelismo intensificado de los pares infinitivo-sustantivo, y traduce קִנְיָן con un término de propiedad/posesión más cercano que alternativas demasiado generales. También conserva la nota idiomática para טַבּוּר הָאָרֶץ en forma natural para el español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» según el estándar POB cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se evita «SEÑOR» como sustituto del nombre divino, en coherencia con la política del proyecto.
  - «Ganado» se usa para מִקְנֶה como término económico amplio, y «posesiones» para קִנְיָן, manteniendo el doblete de riqueza acumulada.
  - La secuencia verbal «saquear / despojar» preserva la repetición cognada del hebreo en vez de fundir ambas acciones en un solo verbo.
