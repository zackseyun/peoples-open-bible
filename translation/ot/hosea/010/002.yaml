id: HOS.10.2
reference: Hosea 10:2
source:
  edition: WLC
  text: חָלַ֥ק לִבָּ֖/ם עַתָּ֣ה יֶאְשָׁ֑מוּ ה֚וּא יַעֲרֹ֣ף מִזְבְּחוֹתָ֔/ם יְשֹׁדֵ֖ד מַצֵּבוֹתָֽ/ם׃
translation:
  text: Their heart is divided[a]; now they will bear guilt. He himself will tear down their altars[c][b]; he will devastate their sacred pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their heart is smooth/deceitful.' The Hebrew verb can carry the idea of smoothness or slipperiness, yielding the sense of insincerity; here it is rendered 'divided' because the context emphasizes split loyalty.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be held guilty' or 'they will suffer for their guilt.'
    reason: lexical_alternative
  - marker: c
    text: '''Sacred pillars'' refers to cultic standing stones used in worship.'
    reason: cultural_note
lexical_decisions:
- source_word: חָלַק
  chosen: is divided
  alternatives:
  - is smooth
  - is deceitful
  - is apportioned
  lexicon: HALOT
  rationale: 'The verb literally has the sense of being smooth/divided/apportioned depending on context. With ''heart'' as subject, the sense is metaphorical: their inner loyalty is split rather than whole. ''Is divided'' best fits the prophetic accusation of double-heartedness and the immediate context of mixed worship.'
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their mind
  - their inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including will and thought. Retaining 'heart' preserves the biblical idiom and the moral-religious focus of the verse.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - therefore now
  - at this time
  lexicon: HALOT
  rationale: A straightforward temporal-adversative marker. 'Now' captures the transition from accusation to announced judgment.
- source_word: יֶאְשָׁמוּ
  chosen: they will bear their guilt
  alternatives:
  - they will be held guilty
  - they will be punished
  - they will become guilty
  lexicon: HALOT
  rationale: The verb אשׁם can denote incurring guilt, being found guilty, or suffering the consequences of guilt. In this judgment context, 'will bear their guilt' preserves both culpability and liability to punishment without over-paraphrasing.
- source_word: הוּא
  chosen: He himself
  alternatives:
  - He
  - he
  lexicon: HALOT
  rationale: The explicit pronoun is emphatic. Given the context, the subject is best understood as God acting in judgment. 'He himself' preserves the emphasis.
- source_word: יַעֲרֹף
  chosen: will tear down
  alternatives:
  - will break the neck of
  - will cut off
  - will behead
  lexicon: HALOT
  rationale: The verb's core sense is to break or strike the neck, hence to cut down decisively. Applied to altars, an idiomatic rendering is needed. 'Will tear down' communicates forceful destruction in natural English.
- source_word: מִזְבְּחוֹתָם
  chosen: their altars
  lexicon: HALOT
  rationale: Standard rendering for places of sacrifice. In context these are illegitimate cultic altars.
- source_word: יְשֹׁדֵד
  chosen: he will devastate
  alternatives:
  - he will plunder
  - he will destroy
  - he will lay waste
  lexicon: HALOT
  rationale: The participial/mixed verbal form conveys destructive action. 'Devastate' fits the parallel with tearing down altars and avoids the narrower economic sense of 'plunder'.
- source_word: מַצֵּבוֹתָם
  chosen: their sacred pillars
  alternatives:
  - their pillars
  - their standing stones
  - their memorial stones
  lexicon: HALOT
  rationale: These are cultic standing stones associated here with illicit worship. 'Sacred pillars' makes the religious function explicit for modern readers while remaining close to the Hebrew.
