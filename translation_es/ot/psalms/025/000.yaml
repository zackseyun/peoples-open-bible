translation:
  language: es
  text: De David. A ti, Yahvé[a], elevo mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi vida' o 'mi ser'; el hebreo 'mi alma' (nephesh) puede denotar a la persona entera, no solo el aspecto inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/דָוִ֡ד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Para David.
  - Salmo de David.
  lexicon: N/A
  rationale: La superscripción hebrea לְדָוִד se refleja de forma directa con 'De David', que es natural en español y conserva la relación tradicional de atribución sin añadir un término no explicitado por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: N/A
  rationale: El proyecto establece 'Yahvé' para יהוה en el texto principal. Mantiene la referencia al nombre divino sin la convención de máscara litúrgica 'SEÑOR'.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi persona
  lexicon: N/A
  rationale: '''Alma'' comunica de manera natural en español el sentido amplio de nephesh como la persona entera o la vida, y preserva la tensión documentada entre un sentido psicológico y uno holístico. La nota cubre las alternativas semánticas que el inglés POB ya indicó.'
- source_word: אֶשָּׂא
  english_pob_choice: I lift up
  chosen_spanish: elevo
  alternatives_spanish:
  - levanto
  - alzo
  lexicon: N/A
  rationale: '''Elevo'' reproduce el verbo de subir/levantar con dignidad estilística y sin mecanicismo. En español encaja bien con la imagen de dirigir la propia vida/persona hacia Dios.'
theological_decisions:
- issue: Sentido de nephesh (נֶפֶשׁ) como 'soul' frente a 'life/self/person'
  english_pob_reading: Hebrew 'my soul' (nephesh) can denote the whole person, not only the immaterial aspect.
  chosen_spanish_reading: '''Mi alma'' en el texto, con nota que explicita que puede significar también ''mi vida'' o ''mi ser''.'
  alternative_spanish_readings:
  - mi vida
  - mi ser
  - mi persona
  rationale: No se debe apagar la amplitud semántica de nephesh. El español 'alma' es la forma más reconocible y reverente, pero la nota preserva la tensión lexical y evita imponer una lectura exclusivamente inmaterial.
  doctrine_reference: Semántica bíblica de נֶפֶשׁ; antropología bíblica holística.
translation_notes:
  revision_awareness: 'La revisión inglesa añadió el texto traducido después de la superscripción: ''To you, Yahweh, I lift up my soul.'' Esta versión española sigue esa estructura ampliada y conserva el nombre divino como ''Yahvé'', de acuerdo con la política terminológica del proyecto.'
  spanish_consistency_notes:
  - Se mantiene la superscripción 'De David.' separada del enunciado principal, como en la revisión inglesa.
  - Se usa 'Yahvé' en lugar de 'SEÑOR' para reflejar el nombre divino en el texto base.
  - La colocación de la nota sobre 'alma' conserva la ambigüedad semántica documentada por el POB en inglés.
  - El tono es sobrio y litúrgicamente usable sin recurrir a fórmulas arcaizantes innecesarias.
