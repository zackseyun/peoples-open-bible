base_translation:
  language: en
  yaml_path: translation/ot/joshua/007/007.yaml
  text: And Joshua said[a], “Ah, Lord GOD, why have you brought this people across the Jordan at all—to give us into the hand of the Amorites, to destroy us? If only we had been content to dwell beyond the Jordan!”
  footnotes:
  - marker: a
    text: Hebrew 'Lord YHWH'; rendered 'Lord GOD' in English to reflect the divine name without the awkward repetition 'Lord LORD.'
    reason: alternative_reading
