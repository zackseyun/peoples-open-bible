translation:
  language: es
  text: Y su libación será de un cuarto de hin por cada cordero[a]. En el lugar santo derramarás una libación de bebida fuerte[b] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «para el cordero uno»; el hebreo tiene fuerza distributiva.'
    reason: lexical_alternative
  - marker: b
    text: «Bebida fuerte» se refiere a una bebida alcohólica distinta del vino; no se especifica su clase exacta.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִסְכּוֹ
  english_pob_choice: And its drink offering shall be
  chosen_spanish: Y su libación será
  alternatives_spanish:
  - Y su ofrenda líquida será
  - Y su ofrenda de libación será
  lexicon: HALOT
  rationale: נֶסֶךְ designa una ofrenda líquida acompañante. En español, «libación» conserva el campo cultual sin calcar demasiado, y «su» mantiene el sufijo posesivo del hebreo referido a la ofrenda previa.
- source_word: רְבִיעִת הַהִין
  english_pob_choice: a quarter of a hin
  chosen_spanish: de un cuarto de hin
  alternatives_spanish:
  - de la cuarta parte de un hin
  - de un cuarto del hin
  lexicon: HALOT
  rationale: La medida antigua se conserva sin convertirla. «Un cuarto de hin» reproduce con claridad el valor distributivo y métrico del hebreo.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: por cada cordero
  alternatives_spanish:
  - para el cordero único
  - para un cordero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para el cordero uno/único», con fuerza distributiva. «Por cada cordero» comunica esa función natural en español sin perder el sentido de individualidad.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: In the holy place
  chosen_spanish: En el lugar santo
  alternatives_spanish:
  - En el santuario
  - En lo santo
  lexicon: HALOT
  rationale: En contexto sacrificial, el sustantivo con artículo indica el ámbito sagrado, no una cualidad abstracta. «Lugar santo» es transparente y fiel, sin imponer demasiado la forma de un recinto específico.
- source_word: הַסֵּךְ
  english_pob_choice: you shall pour out
  chosen_spanish: derramarás
  alternatives_spanish:
  - verterás
  - vaciarás
  lexicon: HALOT
  rationale: La forma verbal cultual de נסך aquí exige la acción de verter/derramar la ofrenda líquida. «Derramarás» es natural en español y mantiene el gesto ritual.
- source_word: נֶסֶךְ
  english_pob_choice: a drink offering
  chosen_spanish: una libación
  alternatives_spanish:
  - una ofrenda líquida
  - un sacrificio de bebida
  lexicon: HALOT
  rationale: La repetición del sustantivo enfatiza el acto ritual. «Libación» preserva la terminología cultual estándar en español y corresponde al valor del hebreo.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida embriagante
  alternatives_spanish:
  - bebida fuerte
  - licor
  lexicon: HALOT
  rationale: שֵׁכָר alude a una bebida alcohólica/intoxicante distinta del vino. «Bebida embriagante» conserva el rasgo semántico central sin precisar indebidamente el tipo exacto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: «Yahvé». En español, «para Yahvé» expresa correctamente la dirección de la ofrenda y evita la sustitución por un título genérico.'
theological_decisions:
- issue: Nombre divino יהוה en contexto sacrificial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo tiene explícitamente el Tetragrámaton. La política del proyecto pide transliterarlo como «Yahvé», manteniendo la transparencia y la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: שֵׁכָר como bebida alcohólica no especificada
  english_pob_reading: strong drink
  chosen_spanish_reading: bebida embriagante
  alternative_spanish_readings:
  - bebida fuerte
  - licor
  rationale: El hebreo no identifica la clase exacta de bebida, solo su carácter intoxicante. La redacción española preserva esa indeterminación y el matiz de embriaguez.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: 'El audio-trail inglés muestra una revisión sin cambios y alta concordancia entre pasadas, así que la propuesta española sigue de cerca las decisiones léxicas estabilizadas: libación, cuarto de hin, uso distributivo de «por cada», localización cultual con «lugar santo» y referencia directa a Yahvé. La única adaptación mayor es expresar ''strong drink'' con un equivalente español natural que conserve la indeterminación del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del Nombre divino conforme al estándar del proyecto.
  - Se conserva «libación» para נֶסֶךְ en lugar de «vino» o un término más específico, porque el hebreo no lo especifica.
  - «Por cada cordero» transmite la fuerza distributiva del sintagma hebreo sin forzar una literalidad extraña en español.
  - «Lugar santo» se usa en sentido espacial/cúltico, no como adverbio.
  - No se convierte la medida antigua de hin a unidades modernas.
