translation:
  language: es
  text: Y en el segundo año, después de su llegada a la casa de Dios en Jerusalén, en el segundo mes, comenzaron Zorobabel hijo de Salatiel, y Jesúa hijo de Josadac, y el resto de sus hermanos, los sacerdotes y los levitas, y todos los que habían venido del cautiverio[a] a Jerusalén, y designaron a los levitas, desde los veinte años en adelante, para supervisar la obra de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del exilio».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבוֹאָם
  english_pob_choice: after their coming
  chosen_spanish: después de su llegada
  alternatives_spanish:
  - después de su venida
  - cuando llegaron
  lexicon: HALOT
  rationale: El infinitivo con ל y sufijo pronominal expresa un marco temporal. «Después de su llegada» conserva la relación temporal sin sonar rígido en español.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se mantiene la metáfora cultual del hebreo y la decisión del POB inglés de no sustituirla por «templo» en el texto principal.
- source_word: הֵחֵלּוּ
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: HALOT
  rationale: Verbo estándar para iniciar una acción. El sujeto plural permite una traducción natural y precisa.
- source_word: וַיַּעֲמִידוּ
  english_pob_choice: appointed
  chosen_spanish: pusieron
  alternatives_spanish:
  - nombraron
  - designaron
  - establecieron
  lexicon: HALOT
  rationale: El hifil de עמד aquí indica colocar en una función. «Pusieron» conserva la imagen de instalación/asignación, y el complemento «para supervisar» aclara la función administrativa.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - a partir de los veinte años
  - desde los veinte años y más
  lexicon: HALOT
  rationale: Fórmula de umbral etario muy estable; esta solución es idiomática y cercana al hebreo.
- source_word: לְנַצֵּחַ
  english_pob_choice: to oversee
  chosen_spanish: para supervisar
  alternatives_spanish:
  - para dirigir
  - para vigilar
  lexicon: HALOT
  rationale: En este contexto no es liderazgo musical sino responsabilidad de control/administración del trabajo. «Supervisar» refleja bien ese valor.
- source_word: מְלֶאכֶת בֵּית יְהוָה
  english_pob_choice: the work of the house of Yahweh
  chosen_spanish: la obra de la casa de Yahvé
  alternatives_spanish:
  - el trabajo de la casa de Yahvé
  - la labor de la casa de Yahvé
  lexicon: HALOT
  rationale: מְלָאכָה indica trabajo/obra. «Obra» funciona bien en castellano e incluye la actividad de construcción y organización del santuario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la guía doctrinal del proyecto para el Tetragrámaton en español.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: El hebreo usa plural masculino literal. «Hermanos» conserva la relación fraterna y tribal sin neutralizarla.
- source_word: מֵהַשְּׁבִי
  english_pob_choice: from the captivity
  chosen_spanish: del cautiverio
  alternatives_spanish:
  - del exilio
  - de la cautividad
  lexicon: HALOT
  rationale: El sustantivo señala el estado de deportación/cautiverio; se mantiene una equivalencia formal. La alternativa «exilio» es válida, pero menos concreta para este contexto.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: La línea doctrinal del proyecto pide preservar el nombre propio del pacto, no ocultarlo tras un título. «Yahvé» es la forma elegida para el texto español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre la casa de Dios/Yahvé y el lenguaje cultual
  english_pob_reading: house of God / house of Yahweh
  chosen_spanish_reading: casa de Dios / casa de Yahvé
  alternative_spanish_readings:
  - templo de Dios / templo de Yahvé
  rationale: Se conserva el lenguaje del hebreo, que habla de «casa» más que de «templo» en esta frase. Eso evita interpretar de más y sigue la auditoría inglesa.
  doctrine_reference: Syntactic/cultic register in Ezra 3:8
- issue: Función de los levitas
  english_pob_reading: to oversee the work
  chosen_spanish_reading: para supervisar la obra
  alternative_spanish_readings:
  - para dirigir la obra
  - para administrar la obra
  rationale: La lectura inglesa entiende una función de supervisión administrativa, no litúrgica ni musical. En español, «supervisar» comunica ese matiz con claridad.
  doctrine_reference: Lexical decision on לְנַצֵּחַ in administrative context
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que ajustó el orden de «del cautiverio a Jerusalén»; por eso la frase española se ordena como «del cautiverio a Jerusalén» y no al revés. También se mantuvo la decisión revisada de «house of Yahweh» sin cambiar el registro cultual del pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se preservó «casa de Dios» / «casa de Yahvé» como metáfora cultual, evitando «templo» en el texto principal.
  - «Sus hermanos» traduce literalmente אֲחֵיהֶם y mantiene el plural masculino del hebreo.
  - «Del cautiverio» conserva la opción formal del POB; la nota ofrece «exilio» como alternativa.
  - La puntuación en español separa la larga secuencia nominal con punto y coma para legibilidad sin alterar la estructura del hebreo.
