translation:
  language: es
  text: Y Dios llamó a la tierra seca «Tierra»[a], y a la reunión de las aguas llamó «Mares». Y Dios vio que era bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierra» / «la tierra», sin mayúscula; el hebreo אֶרֶץ puede funcionar como sustantivo común o, en este contexto de nombramiento, como el nombre asignado a la tierra seca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא / קָרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - denominó
  lexicon: HALOT
  rationale: En este contexto narrativo el verbo expresa el acto de asignar un nombre. «Llamó» es el equivalente natural en español bíblico y conserva la repetición estructural del versículo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En Génesis 1, el sustantivo toma verbo singular y se refiere al Creador único; «Dios» es el equivalente directo y claro en español.
- source_word: לַיַּבָּשָׁה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra firme
  - el terreno seco
  lexicon: HALOT
  rationale: El término distingue la porción seca frente a las aguas reunidas. «La tierra seca» comunica bien ese contraste en español sin perder el valor descriptivo del hebreo.
- source_word: אֶרֶץ
  english_pob_choice: Earth
  chosen_spanish: «Tierra»
  alternatives_spanish:
  - «tierra»
  - «la tierra»
  lexicon: HALOT
  rationale: Aquí אֶרֶץ funciona en una fórmula de nombramiento. La mayúscula en «Tierra» señala el valor de nombre propio en la frase, siguiendo la decisión auditada del texto inglés.
- source_word: מִקְוֵה
  english_pob_choice: the gathering
  chosen_spanish: el conjunto
  alternatives_spanish:
  - la reunión
  - la colecta
  lexicon: HALOT
  rationale: El sustantivo indica una acumulación o reunión de aguas. «El conjunto» es natural en español y conserva la idea de aguas reunidas sin añadir matices ajenos.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El hebreo usa la forma plural; «las aguas» preserva mejor la forma del original y el estilo elevado del relato de la creación.
- source_word: יַמִּים
  english_pob_choice: Seas
  chosen_spanish: mares
  alternatives_spanish:
  - mares grandes
  - océanos
  lexicon: HALOT
  rationale: El plural designa las masas de agua reunidas. «Mares» reproduce bien el sentido y mantiene la fuerza nominal del acto de nombrar.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - consideró
  - observó
  lexicon: HALOT
  rationale: «Vio» es la correspondencia directa y mantiene la fórmula evaluativa recurrente de Génesis 1.
- source_word: כִּי טוֹב
  english_pob_choice: that it was good
  chosen_spanish: que era bueno
  alternatives_spanish:
  - que estaba bien
  - que era hermoso
  lexicon: HALOT
  rationale: «Bueno» conserva la amplitud semántica de טוֹב en la fórmula de evaluación divina, sin restringirla a bondad moral o estética.
theological_decisions:
- issue: Cómo reflejar el nombramiento de אֶרֶץ en español
  english_pob_reading: Render as the proper name 'Earth'
  chosen_spanish_reading: Usar «Tierra» con mayúscula en la frase de nombramiento
  alternative_spanish_readings:
  - usar «tierra» en minúscula
  - usar «la tierra»
  rationale: La mayúscula ayuda a marcar que aquí no solo se describe el suelo seco, sino que se le asigna un nombre en la escena narrativa. No introduce una tesis moderna; refleja la función literaria del versículo.
  doctrine_reference: Génesis 1:10; función de nombramiento en el relato de la creación
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto hebreo y armoniza con la decisión auditada del POB inglés de distinguir el acto de nombramiento de אֶרֶץ. No se detectaron revisiones pendientes en el paquete de contexto, y se conservó la evaluación final «que era bueno» sin intensificarla ni suavizarla.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים y «las aguas» para הַמַּיִם, en concordancia con el estilo del relato de creación.
  - Se evitó traducir mecánicamente desde el inglés cuando una forma más natural en español podía expresar mejor la misma decisión lexical, especialmente en «la tierra seca» y «el conjunto de las aguas».
  - La puntuación y las comillas señalan el valor onomástico de «Tierra» sin añadir glosas al cuerpo principal del versículo.
