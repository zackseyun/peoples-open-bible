translation:
  language: es
  text: Y la ira del rey se convirtió en duelo y lágrimas[a] por lo que antes había sido maquinado delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en piedad y lágrimas». La expresión griega después de «se convirtió» es textual y léxicamente algo áspera en esta forma, pero el sentido es claramente un cambio desde la ira hacia una compasión dolida.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεστράφη
  english_pob_choice: was turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - fue cambiada
  - se transformó
  lexicon: LSJ
  rationale: El pasivo de μεταστρέφω expresa un giro o reversión. «Se volvió» conserva la imagen del cambio de estado sin añadir una causa no dicha por el griego.
- source_word: ἡ ὀργή
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  lexicon: LSJ
  rationale: «Ira» es un equivalente natural y solemne para ὀργή en un contexto narrativo; mantiene la fuerza de la reacción del rey.
- source_word: εἰς οἶκτον καὶ δάκρυα
  english_pob_choice: to mourning and tears
  chosen_spanish: en compasión y lágrimas
  alternatives_spanish:
  - en duelo y lágrimas
  - en piedad y lágrimas
  - en lamentación y lágrimas
  lexicon: LSJ
  rationale: οἶκτον es léxicamente difícil y el contexto apunta a un vuelco emocional desde la ira hacia una disposición compasiva y dolida. «Compasión y lágrimas» preserva esa doble dirección sin imponer sólo un matiz de duelo; se deja abierta la tensión entre compasión y tristeza que el inglés también documenta.
- source_word: ὑπὲρ
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - sobre
  lexicon: LSJ
  rationale: En español, «por» expresa bien el motivo u ocasión de ese cambio emocional y suena natural en un registro bíblico sin perder la relación causal.
- source_word: τῶν ἔμπροσθεν αὐτῷ
  english_pob_choice: what had previously been contrived before him
  chosen_spanish: lo que antes había sido ... delante de él
  alternatives_spanish:
  - lo que previamente había sido tramado en su presencia
  - las cosas que antes habían sido maquinadas ante él
  lexicon: LSJ
  rationale: La frase es compacta y situacional; conviene conservar la referencia temporal y local sin sobredetallar. «Delante de él» mantiene la idea de presencia ante el rey.
- source_word: μεμηχανευμένων
  english_pob_choice: had previously been contrived
  chosen_spanish: había sido maquinado
  alternatives_spanish:
  - había sido tramado
  - había sido preparado
  lexicon: LSJ
  rationale: μηχανάομαι puede significar idear, tramar o maquinAR. «Maquinado» reproduce mejor el matiz de algo urdido o planeado, sin volverlo necesariamente más conspirativo de lo que el verso exige.
translation_notes:
  revision_awareness: El borrador sigue el último tramo revisado del inglés POB, pero ajusta el campo semántico de οἶκτος a una solución española que preserve tanto la compasión como el dolor, evitando reducirlo sólo a «duelo» o sólo a «piedad». También mantiene la idea del objeto previo «delante de él», como en el audit trail inglés, sin expandirla más de lo necesario.
  spanish_consistency_notes:
  - Se usó «Yahvé» como default no aplicable aquí, pues el versículo no contiene el nombre divino.
  - Se prefirió «ira» sobre «cólera» por naturalidad narrativa y coherencia léxica.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - La nota al pie preserva la alternativa de lectura que el inglés documenta para οἶκτος.
