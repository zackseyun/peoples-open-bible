translation:
  language: es
  text: para que se ofrezcan libaciones[a] al Dios Altísimo, por el rey y sus hijos, y para que oren por ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Libaciones» es el equivalente preciso del griego σπονδαί; también puede traducirse como «ofrendas de bebida».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «acerca de ellos/por ellos»; se mantiene una traducción directa sin ampliar a «por su bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Expresa con naturalidad en español el valor final/purposivo del griego ὅπως sin añadir matices ajenos.
- source_word: προσφέρωνται
  english_pob_choice: may be offered
  chosen_spanish: se ofrezcan
  alternatives_spanish:
  - se presenten
  - se lleven como ofrenda
  lexicon: LSJ
  rationale: El verbo pasivo/subjuntivo pide una forma pasiva refleja en español; 'se ofrezcan' conserva el sentido cultual de ofrenda.
- source_word: σπονδαὶ
  english_pob_choice: libations
  chosen_spanish: libaciones
  alternatives_spanish:
  - ofrendas líquidas
  - ofrendas de bebida
  lexicon: LSJ
  rationale: '''Libaciones'' corresponde con precisión al término griego y preserva la especificidad ritual; la nota ofrece la alternativa lexical del inglés.'
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  english_pob_choice: to God Most High
  chosen_spanish: a Dios Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - a Dios, el Altísimo
  lexicon: LSJ
  rationale: 'Mantiene explícitos ambos elementos: θεῷ = Dios y ὑψίστῳ = Altísimo. En español, ''Dios Altísimo'' suena natural y fiel al título.'
- source_word: ὑπὲρ τοῦ βασιλέως καὶ τῶν παίδων
  english_pob_choice: for the king and his sons
  chosen_spanish: por el rey y sus hijos
  alternatives_spanish:
  - a favor del rey y de sus hijos
  - en favor del rey y de sus hijos
  lexicon: LSJ
  rationale: ὑπέρ aquí tiene valor de beneficio/intercesión. 'Hijos' es el equivalente más directo de παίδων y evita restringir innecesariamente a una lectura exclusivamente dinástica si el contexto no la exige en español.
- source_word: προσεύχωνται
  english_pob_choice: they may pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - hagan oración
  lexicon: LSJ
  rationale: '''Oren'' es una forma breve y digna en español para el subjuntivo de propósito; conserva el acto de oración sin sobreexplicar.'
- source_word: περὶ τῆς αὐτῶν
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - acerca de ellos
  - por su bienestar
  lexicon: LSJ
  rationale: El griego es elíptico; 'por ellos' refleja directamente el referente sin expandirlo interpretativamente, siguiendo la revisión auditada del inglés.
theological_decisions:
- issue: Título divino ὁ θεὸς ὁ ὑψιστός
  english_pob_reading: God Most High
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - Dios, el Altísimo
  rationale: Se preserva el título de Dios en un contexto de intercesión real y cultual. No se lo diluye en una fórmula genérica ni se reemplaza por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Valor de ὑπὲρ + genitivo en contexto de oración
  english_pob_reading: for the king and his sons
  chosen_spanish_reading: por el rey y sus hijos
  alternative_spanish_readings:
  - a favor del rey y sus hijos
  - en beneficio del rey y sus hijos
  rationale: En este contexto, ὑπέρ expresa beneficio/intercesión. 'Por' conserva el doble matiz de favor y oración, sin imponer una interpretación más estrecha.
  doctrine_reference: Lexical-contextual usage of ὑπέρ in intercessory/cultic settings
translation_notes:
  revision_awareness: Se siguió la lectura final del inglés auditado, que corrigió una expansión interpretativa de 'for their welfare' a un más directo 'for them'. También se conservó la precisión cultual de 'libations' y el título divino 'God Most High' sin suavizar el término.
  spanish_consistency_notes:
  - Se usó 'Dios Altísimo' para mantener el título divino sin ocultar el nombre genérico θεός.
  - '''Por el rey y sus hijos'' conserva la relación benefactiva e intercesora de ὑπέρ en un español natural.'
  - '''Se ofrezcan'' evita una paráfrasis excesiva y preserva la voz pasiva cultual del griego.'
  - No se empleó 'SEÑOR' para θεός/ὕψιστος, conforme al mandato de traducir títulos de modo transparente.
