translation:
  language: es
  text: Entonces lo comprendí[a], y he aquí que Dios no lo había enviado, sino que había hablado la profecía contra mí[b], porque Tobías y Sanbalat lo habían contratado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me di cuenta». El hebreo puede expresar discernimiento o comprensión de la situación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acerca de mí». La preposición hebrea puede entenderse de forma más neutral como «acerca de», aunque el contexto favorece «contra mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַכִּירָה
  english_pob_choice: Then I recognized
  chosen_spanish: Entonces lo reconocí
  alternatives_spanish:
  - Entonces lo entendí
  - Entonces lo percibí
  lexicon: HALOT
  rationale: La forma expresa que Nehemías llegó a discernir la realidad de la situación. 'Lo reconocí' conserva ese valor de percepción/identificación sin forzar una paráfrasis más explicativa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: '''He aquí'' mantiene el giro discursivo de atención súbita y sigue siendo natural en español bíblico cuidado.'
- source_word: לֹא אֱלֹהִים שְׁלָחוֹ
  english_pob_choice: God had not sent him
  chosen_spanish: Dios no lo había enviado
  alternatives_spanish:
  - no fue Dios quien lo envió
  - Dios no lo envió
  lexicon: HALOT
  rationale: La negación de envío divino se expresa de forma directa. El pluscuamperfecto conserva el momento retrospectivo del descubrimiento de Nehemías.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - porque
  lexicon: HALOT
  rationale: Aquí la partícula introduce una corrección contrastiva. 'Sino que' expresa mejor el cambio de afirmación que un simple 'pero' y mantiene la relación con la cláusula anterior.
- source_word: הַנְּבוּאָה דִּבֶּר עָלַי
  english_pob_choice: he had spoken the prophecy against me
  chosen_spanish: él había hablado la profecía contra mí
  alternatives_spanish:
  - él había pronunciado la profecía contra mí
  - él había profetizado contra mí
  lexicon: HALOT
  rationale: Se conserva la construcción nominal/verbal del hebreo ('hablado la profecía') sin pasar a una formulación más interpretativa. 'Contra mí' sigue la lectura contextual adversativa apoyada por el audit trail inglés.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - acerca de mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque el preposición puede ser neutral, el contexto de intimidación y falsedad favorece el valor adversativo. 'Contra mí' preserva esa tensión documentada sin eliminar la alternativa neutral.
- source_word: וְטוֹבִיָּה וְסַנְבַלַּט
  english_pob_choice: Tobiah and Sanballat
  chosen_spanish: Tobías y Sanbalat
  alternatives_spanish:
  - Tobías y Sanbalat
  lexicon: Transliteración estándar de nombres propios
  rationale: Se transliteran los nombres propios al español bíblico común, con la forma 'Tobías' para Tobiah, que es la adaptación más reconocible y natural en español.
- source_word: שְׂכָרוֹ
  english_pob_choice: had hired him
  chosen_spanish: lo habían contratado
  alternatives_spanish:
  - lo habían alquilado
  - le habían pagado
  lexicon: HALOT
  rationale: El verbo hebreo indica contratar con remuneración. 'Lo habían contratado' comunica bien el acto de pago para servicio, sin añadir explícitamente la idea interpretativa de soborno.
theological_decisions:
- issue: Naturaleza de la profecía de Semaías en este versículo
  english_pob_reading: He was not sent by God, and his prophetic message was a false, hostile utterance prompted by payment from Tobiah and Sanballat.
  chosen_spanish_reading: No fue enviado por Dios, y su profecía fue una palabra falsa y hostil motivada por el pago de Tobías y Sanbalat.
  alternative_spanish_readings:
  - Simplemente habló una profecía acerca de Nehemías sin la fuerza hostil de 'contra mí'.
  rationale: El texto niega el envío divino y vincula la profecía con la contratación por parte de los adversarios de Nehemías. La traducción conserva esa valoración narrativa sin ampliar el juicio doctrinal más allá de lo que el versículo afirma.
  doctrine_reference: Nehemías 6:12; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, conservando la corrección contrastiva con 'sino que' como equivalente natural de la relación adversativa del hebreo y manteniendo el valor contextual de עָלַי como 'contra mí'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, sin sustituirlo por una convención de máscara en esta cláusula negativa de envío.
  - Se usa 'Tobías' como forma española usual del nombre propio, mientras 'Sanbalat' se conserva sin cambio por ser ya estable en español bíblico.
  - '''Profecía'' se conserva como sustantivo, reflejando la construcción hebrea nominal; no se simplifica a un verbo sin necesidad.'
  - La puntuación reproduce el contraste narrativo del original con comas y una cláusula introducida por 'sino que'.
