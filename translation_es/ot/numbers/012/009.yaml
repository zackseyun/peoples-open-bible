translation:
  language: es
  text: Entonces la ira de Yahvé se encendió contra ellos[a], y se alejó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la nariz de Yahvé se encendió contra ellos», un modismo que significa «la ira de Yahvé se encendió contra ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  english_pob_choice: burned
  chosen_spanish: se encendió
  alternatives_spanish:
  - ardió
  - se inflamó
  lexicon: HALOT
  rationale: El hebreo usa un verbo de calor/fuego aplicado a la ira. En español, «se encendió» conserva la imagen idiomática del calor sin sonar artificial, y mantiene mejor la fuerza metafórica que un simple «se enojó».
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  lexicon: HALOT
  rationale: Aunque literalmente significa «nariz», en esta construcción idiomática con חרה denota la ira divina. «Ira» es el equivalente más natural y fiel al uso idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito del hebreo y la convención terminológica del proyecto en español. «Yahvé» es la forma establecida en el texto principal, en lugar de sustituirlo por «SEÑOR».
- source_word: בָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  lexicon: HALOT
  rationale: El complemento marca el objeto de la ira divina; en español, «contra ellos» expresa con claridad la dirección adversativa del hebreo en este contexto idiomático.
- source_word: וַיֵּלַךְ
  english_pob_choice: he departed
  chosen_spanish: se alejó
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El verbo describe la retirada de Yahvé después de hablar en juicio. «Se alejó» comunica esa retirada de manera reverente y natural en español, sin añadir información ajena al hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La lectura inglesa del POB preserva el nombre propio del pacto. En español se sigue la misma decisión teológica y textual con la forma establecida «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El testimonio inglés indica alta concordancia, sin revisiones aplicadas y con el texto final estable; la presente redacción española conserva esa misma lectura sin introducir cambios textuales innecesarios.
  spanish_consistency_notes:
  - 'Se mantiene la convención del proyecto para el Tetragrama: «Yahvé» en el texto principal.'
  - La imagen de calor/encendido se conserva mediante «se encendió», alineada con el hebreo y con la decisión inglesa de mantener el metáforo de fuego.
  - «Se alejó» reproduce la idea de retirada/divergencia del verbo הלך en este contexto de juicio sin sobreespecificar.
