translation:
  language: es
  text: Se ensoberbecieron[a] y cometieron abominación delante de mí, por eso las quité cuando lo vi[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se volvieron orgullosas» o «se hicieron arrogantes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cuando/como vi»; el objeto («lo») está implícito en la cláusula anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְבְּהֶינָה
  english_pob_choice: they became haughty
  chosen_spanish: se ensoberbecieron
  alternatives_spanish:
  - se volvieron altivas
  - crecieron en soberbia
  - se llenaron de orgullo
  lexicon: HALOT
  rationale: גבהּ aquí expresa elevación en sentido moral, de orgullo o arrogancia. «Se ensoberbecieron» conserva ese matiz de altura/altivez en un español natural y solemne, sin suavizar la acusación.
- source_word: וַתַּעֲשֶׂינָה
  english_pob_choice: committed
  chosen_spanish: cometieron
  alternatives_spanish:
  - hicieron
  - practicaron
  - realizaron
  lexicon: HALOT
  rationale: Con תועבה, el español idiomático pide «cometer» más que «hacer». Mantiene la fuerza moral del hebreo sin agregar contenido ajeno.
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa detestable
  - acto detestable
  - algo abominable
  lexicon: HALOT
  rationale: «Abominación» es el equivalente estable en español para תועבה y preserva su peso religioso y ético. Se evita diluirlo en una formulación más explicativa que el hebreo no exige.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: «Delante de mí» conserva la idea de acción realizada bajo la mirada divina y mantiene un registro claro y bíblico en español.
- source_word: וָאָסִיר אֶתְהֶן
  english_pob_choice: so I removed them
  chosen_spanish: por eso las aparté
  alternatives_spanish:
  - y las quité
  - y las removí
  - así que las eliminé
  lexicon: HALOT
  rationale: סור en causativo expresa quitar/apartar. «Aparté» comunica bien la remoción judicial en español, y «por eso» refleja la relación consecuencial del hebreo sin sobretraducir el nexo.
- source_word: כַּאֲשֶׁר רָאִיתִי
  english_pob_choice: when I saw it
  chosen_spanish: cuando lo vi
  alternatives_spanish:
  - así como lo vi
  - según lo vi
  - al verlo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «como/cuando vi», con objeto implícito. «Lo» suple ese objeto tácito de manera natural en español, siguiendo el audit trail inglés sin perder la referencia al pecado mencionado antes.
theological_decisions:
- issue: Judicial action of God
  english_pob_reading: so I removed them
  chosen_spanish_reading: por eso las aparté
  alternative_spanish_readings:
  - y las aparté
  - así que las quité
  - por lo tanto las removí
  rationale: La frase mantiene el acto de juicio divino como consecuencia directa de la culpa descrita. «Aparté» evita suavizar la acción y sigue la fuerza del causativo hebreo sin introducir categorías doctrinales externas.
  doctrine_reference: Lectura judicial del texto; no se añade elaboración doctrinal ajena al versículo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo: mantiene la secuencia de orgullo → abominación → juicio, conserva el objeto implícito de ראיתי con un pronombre natural en español, y evita suavizar תועבה o el verbo causativo de וסר.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el hebreo lo explicita; en este versículo no aparece el tetragrámaton.
  - «Abominación» se conserva por consistencia terminológica con el valor ético-religioso de תועבה.
  - Se eligió «ensoberbecieron» como equivalente idiomático de la altivez/presunción descrita por גבהּ.
  - El orden y la puntuación reflejan la estructura causal del versículo sin añadir conectores interpretativos innecesarios.
