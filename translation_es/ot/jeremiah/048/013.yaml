base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/013.yaml
  text: And Moab will be put to shame because of Chemosh[a], just as the house of Israel was put to shame because of Bethel[b], their confidence.
  footnotes:
  - marker: a
    text: Or 'will be ashamed of Chemosh.' The Hebrew can be rendered more literally with 'ashamed of/from Chemosh,' but the sense is that Moab's reliance on Chemosh will end in disgrace.
    reason: lexical_alternative
  - marker: b
    text: Bethel was the northern Israelite sanctuary associated with calf worship; the phrase could be translated more literally, 'from Bethel, their confidence.'
    reason: cultural_note
