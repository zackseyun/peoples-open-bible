revisions:
- from: El temor de Yahvé es aborrecimiento del mal[a]; la soberbia y la arrogancia, el camino del mal y la boca de perversidades, yo aborrezco.
  to: El temor de Yahvé es aborrecimiento del mal; la soberbia y la arrogancia, el camino del mal y la boca de perversidades[a] aborrezco.
  rationale: Se corrige el anclaje de la nota al pie para que recaiga sobre 'la boca de perversidades', que es la expresión explicada por la nota. También se mejora la naturalidad del español moviendo el verbo final a una posición más idiomática sin perder la primera persona ni la fuerza enfática del hebreo sapiencial. No se requiere adjudicación adicional.
