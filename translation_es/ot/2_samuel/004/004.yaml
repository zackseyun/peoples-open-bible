translation:
  language: es
  text: Y Jonatán, hijo de Saúl, tenía un hijo lisiado[a] de los pies. Tenía cinco años cuando llegó la noticia acerca de Saúl y de Jonatán de Jezreel, y su nodriza lo levantó y huyó. Y mientras ella se apresuraba a huir, él cayó y quedó cojo. Su nombre era Mefiboset.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo literalmente se refiere a alguien «afectado/herido en los pies». También puede entenderse como «cojo de ambos pies», aunque «ambos» no aparece como palabra separada en el texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְכֵה רַגְלָיִם
  english_pob_choice: crippled in his feet
  chosen_spanish: lisiado de los pies
  alternatives_spanish:
  - cojo de los pies
  - lisiado en los pies
  - lisiado de ambos pies
  lexicon: HALOT
  rationale: El hebreo describe a alguien herido/afectado en los pies; en español, «lisiado de los pies» conserva la fuerza física del hebreo sin introducir una formulación más idiomática pero menos cercana. «De ambos pies» es posible por la forma dual implícita, pero no está expresado de manera separada en el texto.
- source_word: בֶּן חָמֵשׁ שָׁנִים
  english_pob_choice: five years old
  chosen_spanish: cinco años
  alternatives_spanish:
  - de cinco años
  - de edad de cinco años
  lexicon: HALOT
  rationale: En español, la edad se expresa naturalmente con «tenía cinco años», que mantiene el sentido idiomático y exacto del hebreo.
- source_word: בְּבֹא שְׁמֻעַת
  english_pob_choice: when the news ... came
  chosen_spanish: cuando llegó la noticia
  alternatives_spanish:
  - cuando vino el informe
  - al llegar la noticia
  - cuando llegó el reporte
  lexicon: HALOT
  rationale: La construcción temporal hebrea se vierte de manera natural como una llegada de noticia o reporte. «Noticia» es más clara en español y no fuerza un tecnicismo innecesario.
- source_word: שְׁמֻעַת שָׁאוּל וִיהוֹנָתָן
  english_pob_choice: the news about Saul and Jonathan
  chosen_spanish: la noticia acerca de Saúl y de Jonatán
  alternatives_spanish:
  - la noticia de Saúl y de Jonatán
  - el informe sobre Saúl y Jonatán
  lexicon: HALOT
  rationale: La cadena constructa señala la noticia referente a Saúl y Jonatán; «acerca de» preserva esa referencia sin sobreespecificar el contenido en el verso mismo.
- source_word: מִיִּזְרְעֶאל
  english_pob_choice: from Jezreel
  chosen_spanish: desde Jezreel
  alternatives_spanish:
  - de Jezreel
  - desde Yizreel
  lexicon: HALOT
  rationale: «Desde Jezreel» reproduce bien el movimiento de procedencia del mensajero y suena natural en español narrativo.
- source_word: אֹמַנְתּוֹ
  english_pob_choice: his nurse
  chosen_spanish: su nodriza
  alternatives_spanish:
  - su niñera
  - su cuidadora
  - su ama de cría
  lexicon: HALOT
  rationale: El término designa a la mujer que criaba y cuidaba al niño. «Nodriza» es un equivalente preciso y suficientemente digno en español bíblico.
- source_word: וַתִּשָּׂאֵהוּ
  english_pob_choice: picked him up
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo levantó
  - lo cargó
  - lo alzó
  lexicon: HALOT
  rationale: El verbo expresa levantar o cargar al niño para huir; «lo tomó» funciona de forma natural en español y evita una repetición pesada con el siguiente verbo de huida.
- source_word: וַתָּנֹס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: «Huyó» es la equivalencia directa y natural de נוס en contexto narrativo de fuga.
- source_word: בְּחָפְזָהּ
  english_pob_choice: as she hurried
  chosen_spanish: mientras ella se apresuraba
  alternatives_spanish:
  - en su prisa
  - a toda prisa
  lexicon: HALOT
  rationale: La frase marca la circunstancia de prisa; «mientras ella se apresuraba» conserva el matiz procesual del hebreo y su valor temporal-circunstancial.
- source_word: לָנוּס
  english_pob_choice: to flee
  chosen_spanish: a huir
  alternatives_spanish:
  - para escapar
  - para huir
  lexicon: HALOT
  rationale: Se mantiene el infinitivo de propósito con el mismo verbo básico de huida para reflejar la repetición enfática del hebreo.
- source_word: וַיִּפֹּל
  english_pob_choice: he fell
  chosen_spanish: él cayó
  alternatives_spanish:
  - cayó
  - se cayó
  lexicon: HALOT
  rationale: El hebreo narra una caída simple; en español, «cayó» basta, y el pronombre explícito aclara el sujeto sin alterar el sentido.
- source_word: וַיִּפָּסֵחַ
  english_pob_choice: became lame
  chosen_spanish: quedó cojo
  alternatives_spanish:
  - se volvió cojo
  - se hizo cojo
  - quedó lisiado
  lexicon: HALOT
  rationale: El verbo tiene sentido resultativo/inceptivo tras la caída. «Quedó cojo» comunica bien que el estado resultante comenzó por ese evento, sin exagerar el alcance del término.
- source_word: מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefiboset
  alternatives_spanish:
  - Mefibosheth
  lexicon: transliteration standard
  rationale: Se translitera el nombre propio según la convención española habitual, manteniendo la identificación clara del personaje.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado textual más reciente del POB en inglés, que volvió a «crippled in his feet» y mantuvo la conjunción narrativa simple «And as she hurried to flee». En español se optó por un equivalente más natural y no estigmatizante en esta línea: «lisiado de los pies», conservando la nota alternativa para la posible lectura de «cojo de ambos pies». La estructura temporal del relato se mantuvo con una frase de llegada de noticia y con la secuencia narrativa simple de caída y resultado.'
  spanish_consistency_notes:
  - Se conserva «Y» al inicio para reflejar el enlace narrativo del hebreo.
  - «Yahvé» no aparece en este versículo; no aplica ninguna decisión sobre el nombre divino.
  - Se mantiene el nombre propio «Mefiboset» con transliteración española consistente.
  - Se usa «nodriza» como término bíblico claro para אֹמַנְתּוֹ, en lugar de una modernización que diluya la relación de crianza.
  - La repetición de la idea de huida se preserva con «huyó» y «a huir» para reflejar el paralelismo verbal del hebreo.
