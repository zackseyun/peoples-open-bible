translation:
  language: es
  text: Cuando los días se hayan cumplido, entonces, desde el octavo día en adelante, los sacerdotes ofrecerán sobre el altar sus holocaustos y sus ofrendas de paz[a], y yo los aceptaré, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus ofrendas de comunión’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיכַלּוּ
  english_pob_choice: are completed
  chosen_spanish: se hayan cumplido
  alternatives_spanish:
  - se hayan terminado
  - hayan llegado a su fin
  lexicon: HALOT
  rationale: El hebreo expresa que los días quedan llevados a su término; en español, la forma pasiva-reflexiva “se hayan cumplido” conserva la idea de completarse sin sonar mecánica.
- source_word: הַיָּמִים
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - estos días
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido, porque alude al período ritual previamente establecido.
- source_word: בַיּוֹם הַשְּׁמִינִי וָהָלְאָה
  english_pob_choice: from the eighth day onward
  chosen_spanish: desde el octavo día en adelante
  alternatives_spanish:
  - el octavo día y después
  - desde el octavo día y luego
  lexicon: HALOT
  rationale: La frase marca inicio y continuación. “Desde... en adelante” expresa bien el comienzo del régimen regular después de la consagración.
- source_word: יַעֲשׂוּ
  english_pob_choice: shall offer
  chosen_spanish: harán
  alternatives_spanish:
  - ofrecerán
  - presentarán
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente “hacer”, y en contexto sacrificial puede conservarse en español como “harán sobre el altar”, tal como la secuencia cultual lo pide, sin perder la referencia a la acción ritual.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el equivalente directo del oficio cultual del texto.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: “Sobre” refleja de forma natural el movimiento sacrificial sobre el altar y suena más idiomático que un calco rígido.
- source_word: עוֹלֹתֵיכֶם
  english_pob_choice: your burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: “Holocausto” es el término tradicional y preciso para עוֹלָה en español bíblico; aquí se conserva la referencia al sacrificio totalmente consumido por el fuego.
- source_word: שַׁלְמֵיכֶם
  english_pob_choice: your peace offerings
  chosen_spanish: sus ofrendas de paz
  alternatives_spanish:
  - sus sacrificios de paz
  - sus ofrendas de comunión
  lexicon: HALOT
  rationale: Se mantiene “ofrendas de paz” como equivalente bíblico reconocible; “de comunión” podría sonar más explicativo, pero el texto no obliga a esa ampliación.
- source_word: וְרָצִאתִי אֶתְכֶם
  english_pob_choice: I will accept you
  chosen_spanish: yo los aceptaré
  alternatives_spanish:
  - yo me agradaré de ustedes
  - yo los favoreceré
  lexicon: HALOT
  rationale: El objeto directo son las personas, no solo sus ofrendas. “Aceptar” conserva la fuerza relacional y cultual del hebreo, en línea con la lectura auditada.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - afirma el Señor Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la decisión del proyecto para יְהוָה: “Yahvé”. Al combinarse con אֲדֹנָי, el título se vierte de modo natural como “el Señor Yahvé” para evitar el recurso de máscara tipográfica y conservar el nombre divino.'
theological_decisions:
- issue: Traducción del Tetragrámaton en la fórmula profética final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Aunque el POB inglés usa una convención heredada, el marco del proyecto pide renderizar יְהוָה como “Yahvé”. En la fórmula con אֲדֹנָי, “el Señor Yahvé” mantiene el nombre divino y evita borrar la referencia explícita del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable (sin revisiones aplicadas) y con acuerdo alto entre controles, así que la versión española sigue de cerca las decisiones léxicas ya validadas, ajustando solo la convención del nombre divino al estándar del proyecto en español.
  spanish_consistency_notes:
  - 'Se mantiene la terminología cultual coherente: holocausto / ofrendas de paz / aceptar.'
  - “Yahvé” se usa consistentemente para el nombre divino en la fórmula final.
  - La sintaxis conserva el orden ritual del hebreo sin sonar artificial en español.
  - La nota a pie preserva la alternativa semántica documentada para שַׁלְמִים.
