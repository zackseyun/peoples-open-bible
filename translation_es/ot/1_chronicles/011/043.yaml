lexical_decisions:
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanan
  alternatives_spanish:
  - Janán
  lexicon: HALOT
  rationale: Nombre propio; se translitera de forma directa al español como Hanan, manteniendo la forma breve del hebreo y la práctica del proyecto de no traducir nombres.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: Marcador genealógico/patronímico. En español, 'hijo de' comunica con naturalidad la relación de ascendencia sin perder el valor formal del hebreo.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maacah
  - Maakah
  lexicon: HALOT
  rationale: Nombre propio transliterado en español con acento gráfico para la pronunciación natural. Se conserva la identidad del nombre sin traducirlo.
- source_word: וְיוֹשָׁפָט
  english_pob_choice: and Joshaphat
  chosen_spanish: y Josafat
  alternatives_spanish:
  - y Joshafat
  - y Jehosafat
  lexicon: HALOT
  rationale: El hebreo aquí presenta la forma breve Yošaphat; en español 'Josafat' refleja esa forma breve con naturalidad. Se evita 'Jehosafat' porque introduciría la forma más larga no indicada por este testimonio textual.
- source_word: הַמִּתְנִי
  english_pob_choice: the Mithnite
  chosen_spanish: el mithnita
  alternatives_spanish:
  - el mithnite
  - el hombre de Mithni
  lexicon: HALOT
  rationale: Gentilicio con artículo. 'Mithnita' conserva la función identificadora de pertenencia o procedencia y resulta más natural en español que un calco directo del inglés.
theological_decisions:
- issue: Transliteración breve del nombre יוֹשָׁפָט frente a la forma más conocida 'Jehosafat/Jehoshaphat'
  english_pob_reading: Joshaphat, reflecting the shorter Hebrew form in this verse
  chosen_spanish_reading: Josafat, reflejando la forma breve hebrea de este versículo
  alternative_spanish_readings:
  - Jehosafat
  - Jehoshafat
  rationale: 'No hay diferencia doctrinal, pero sí una decisión textual/lexical importante: la forma del hebreo aquí es más breve que la variante familiar de otros pasajes. El español mantiene esa señal del texto fuente.'
  doctrine_reference: Onomástica bíblica / criterio textual
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la única decisión destacada es reflejar en español la forma breve de יוֹשָׁפָט y preservar el gentilicio ''mithnita'' con un equivalente natural.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración de nombres propios sin traducirlos.
  - Se usó 'hijo de' para el patronímico hebreo, en lugar de dejar 'ben'.
  - Se conservó el artículo implícito en el gentilicio con 'el mithnita'.
  - La nota aclara la forma breve del nombre Josafat para evitar confusión con Jehosafat.
