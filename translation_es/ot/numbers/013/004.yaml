  glossary_alignment: 'Sin términos teológicos sensibles en este versículo. «Rubén» e «hijo de» encajan bien. El punto de desalineación es el tratamiento del antropónimo שַׁמּוּעַ: el proyecto privilegia transliteración de nombres, y «Sammúa» preserva mejor la forma fuente que «Samúa». «Zaccur» puede mantenerse, pues sigue el audit trail inglés y no genera problema de legibilidad.'
