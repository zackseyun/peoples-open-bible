translation:
  language: es
  text: Ciertamente pondrás sobre ti un rey que Yahvé tu Dios escoja. De entre tus hermanos[a] pondrás sobre ti un rey; no podrás poner sobre ti a un extranjero[b], uno que no es tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de entre tus hermanos»; el lenguaje de parentesco señala a un miembro del propio pueblo, no solo a un pariente biológico.'
    reason: lexical_alternative
  - marker: b
    text: O «forastero»; el hebreo dice literalmente «un hombre extranjero», es decir, uno que no pertenece al círculo de tus hermanos.
    reason: alternative_reading
lexical_decisions:
- source_word: שׂוֹם תָּשִׂים
  english_pob_choice: You shall surely set
  chosen_spanish: Ciertamente pondrás
  alternatives_spanish:
  - Pondrás sin falta
  - Ciertamente establecerás
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica el mandato. «Ciertamente pondrás» conserva el énfasis sin sonar rígido en español.
- source_word: עָלֶיךָ
  english_pob_choice: over yourself
  chosen_spanish: sobre ti
  alternatives_spanish:
  - sobre ti mismo
  - sobre vosotros
  lexicon: HALOT
  rationale: El hebreo repite la idea de autoridad colocada «sobre ti». En español, «sobre ti» mantiene la referencia reflexiva y el sentido corporativo del destinatario singular.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  lexicon: HALOT
  rationale: «Rey» es la equivalencia directa y natural en español para מֶלֶךְ.
- source_word: אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ בּוֹ
  english_pob_choice: whom Yahweh your God chooses
  chosen_spanish: que Yahvé tu Dios escoja
  alternatives_spanish:
  - a quien Yahvé tu Dios escogerá
  - que Yahvé tu Dios elija
  lexicon: HALOT
  rationale: El relativo identifica al rey como elegido por Yahvé. «Escoja» conserva el valor general/normativo del mandato legal y evita forzar un futuro donde el hebreo funciona como cláusula relativa de selección.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la práctica del proyecto, en lugar de sustituirlo por un título.
- source_word: מִקֶּרֶב אַחֶיךָ
  english_pob_choice: From among your brothers
  chosen_spanish: De entre tus hermanos
  alternatives_spanish:
  - Del medio de tus hermanos
  - De entre tus parientes
  lexicon: HALOT
  rationale: «De entre» reproduce bien מִן־קֶרֶב y «tus hermanos» conserva el lenguaje de parentesco/covenio del texto hebreo.
- source_word: לֹא תוּכַל לָתֵת
  english_pob_choice: you may not put
  chosen_spanish: no podrás poner
  alternatives_spanish:
  - no podrás establecer
  - no te será permitido poner
  lexicon: HALOT
  rationale: La forma hebrea expresa incapacidad/prohibición legal. «No podrás poner» comunica esa fuerza normativa en un español claro y bíblico.
- source_word: אִישׁ נָכְרִי
  english_pob_choice: a foreigner
  chosen_spanish: a un extranjero
  alternatives_spanish:
  - a un forastero
  - a un hombre extranjero
  lexicon: HALOT
  rationale: El POB inglés revisó la frase hacia una forma más natural que «foreign man». En español, «extranjero» comunica con naturalidad la alteridad respecto del pueblo, sin perder el contraste legal.
- source_word: אֲשֶׁר לֹא אָחִיךָ הוּא
  english_pob_choice: one who is not your brother
  chosen_spanish: que no sea tu hermano
  alternatives_spanish:
  - que no es tu hermano
  - uno que no es tu hermano
  lexicon: HALOT
  rationale: La cláusula explica «extranjero» mediante el lenguaje de parentesco del pacto. «Que no sea tu hermano» mantiene esa explicación relacional y sugiere la cualificación excluyente del cargo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton como nombre propio y no sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de parentesco masculino אַחֶיךָ / אָחִיךָ
  english_pob_reading: brothers / your brother
  chosen_spanish_reading: tus hermanos / tu hermano
  alternative_spanish_readings:
  - tus compatriotas / tu compatriota
  - tus parientes / tu pariente
  rationale: Se conserva el lenguaje masculino del hebreo con su fuerza de pacto y pertenencia al pueblo. La referencia es corporativa, pero el texto no la neutraliza.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza legal de la prohibición לֹא תוּכַל לָתֵת
  english_pob_reading: you may not put
  chosen_spanish_reading: no podrás poner
  alternative_spanish_readings:
  - no debes poner
  - no te será permitido poner
  rationale: La construcción hebrea no describe mera incapacidad física, sino una prohibición jurídica. En español, «no podrás» conserva bien esa fuerza normativa sin sobreexplicar.
  doctrine_reference: Principios de equivalencia funcional en lenguaje legal
- issue: אִישׁ נָכְרִי como categoría de exclusión
  english_pob_reading: a foreigner
  chosen_spanish_reading: un extranjero
  alternative_spanish_readings:
  - un forastero
  - un hombre extranjero
  rationale: El hebreo combina sustantivo + adjetivo para marcar a alguien de fuera de la comunidad pactal. «Extranjero» es la forma más natural y fiel en español contemporáneo.
  doctrine_reference: Uso léxico contextual en español bíblico
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una forma más natural para אִישׁ נָכְרִי («a foreigner») sin debilitar el contraste con «your brother». En español se refleja esa misma resolución con «extranjero». También se mantiene la intensificación del mandato inicial y el paralelismo de «tus hermanos / tu hermano».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, en coherencia con el estándar del proyecto.
  - Se preserva el lenguaje de parentesco masculino porque es parte del argumento legal del versículo.
  - El orden del versículo sigue de cerca la sintaxis hebrea para conservar la repetición enfática.
  - «Ciertamente pondrás» y «no podrás poner» buscan un registro bíblico claro, no arcaizante.
