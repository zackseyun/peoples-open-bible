    issue: «Solo,» como apertura restrictiva suena poco natural en español bíblico contemporáneo.
    rationale: Aunque רַק significa «solo/solamente», en español la forma inicial con coma es dura y algo calcada. «Solamente» o «Pero no» transmiten mejor la restricción sin perder fuerza legal.
  - severity: medium
    issue: «sobre la tierra» no es la opción más precisa para עַל הָאָרֶץ en este contexto.
    rationale: La instrucción describe el lugar físico donde se derrama la sangre. El audit trail inglés justificó «on the ground». En español, «en el suelo» comunica mejor ese sentido concreto que «sobre la tierra», que puede sonar más amplia o abstracta.
  revised_spanish_text: Solamente, no comerán la sangre; la derramarán en el suelo como agua.
