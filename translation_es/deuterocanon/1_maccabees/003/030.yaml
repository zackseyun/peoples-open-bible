lexical_decisions:
- source_word: εὐλαβήθη
  english_pob_choice: became afraid
  chosen_spanish: se inquietó
  alternatives_spanish:
  - temió
  - comenzó a temer
  lexicon: LSJ
  rationale: El verbo expresa aquí aprensión o temor ante una posible falta de recursos. «Se inquietó» conserva el matiz de preocupación surgente sin hacer demasiado intensa la reacción ni volverla reverencial.
- source_word: μὴ οὐκ ἔχῃ
  english_pob_choice: that he might not have enough
  chosen_spanish: no fuera que no tuviera suficiente
  alternatives_spanish:
  - que no tuviera
  - no fuera a tener
  lexicon: LSJ
  rationale: La construcción comunica el miedo a carecer. En español conviene explicitar la suficiencia con «suficiente» para dejar claro que el contexto es financiero.
- source_word: ὡς ἅπαξ καὶ δὶς
  english_pob_choice: as once and twice before
  chosen_spanish: como una y dos veces antes
  alternatives_spanish:
  - como antes una y dos veces
  - como en ocasiones anteriores
  lexicon: LSJ
  rationale: La expresión griega es idiomática y señala repetición previa, no necesariamente un conteo literal exacto. «Una y dos veces antes» preserva el giro y sugiere reiteración pasada.
- source_word: δαπάνας
  english_pob_choice: expenses
  chosen_spanish: los gastos
  alternatives_spanish:
  - los costos
  - los desembolsos
  lexicon: LSJ
  rationale: Es el término financiero más natural en español y corresponde al sentido fiscal del pasaje.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: los dones
  alternatives_spanish:
  - los regalos
  - las dádivas
  lexicon: LSJ
  rationale: «Dones» puede abarcar distribuciones o beneficios concedidos; evita reducir el término a un regalo informal y mantiene un tono digno.
- source_word: ἐδίδου
  english_pob_choice: he had formerly given
  chosen_spanish: antes daba
  alternatives_spanish:
  - solía dar antes
  - había dado antes
  lexicon: LSJ
  rationale: El imperfecto indica una acción habitual o repetida en el pasado. «Antes daba» conserva esa continuidad sin sobrecargar la frase.
- source_word: ἔμπροσθεν
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - en tiempos pasados
  lexicon: LSJ
  rationale: Aquí el sentido temporal es primario. «Antes» es breve y natural en español, y encaja con la repetición implícita.
- source_word: δαψιλῇ χειρί
  english_pob_choice: with a generous hand
  chosen_spanish: con mano generosa
  alternatives_spanish:
  - con mano liberal
  - con mano pródiga
  lexicon: LSJ
  rationale: La frase es idiomática para dar con liberalidad. «Con mano generosa» conserva la metáfora y resulta idiomático en español.
