translation:
  text: 'Give heed to me in gentleness.[a]

    I am the one who remains upon the face of the earth,[b]

    and I am the one who is cast off the face of the earth.[c]

    I am the preparation of every person.[d][e][f][g]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ‘in meekness.’ The noun ⲙⲏϣⲉ commonly denotes meekness/gentleness.'
    reason: lexical_alternative
  - marker: b
    text: The noun ⲧⲁϣϭⲏⲗ is taken as a substantivized quality, ‘steadfast/abiding
      (one).’ Alternatives include ‘the abiding one’ or abstract ‘steadfastness.’
    reason: lexical_alternative
  - marker: c
    text: ⲛⲟⲩϫⲉ primarily ‘loosen, unbind’; hence ‘loosen it off.’ ‘Dissolve’ or ‘destroy’
      are interpretive alternatives depending on context.
    reason: lexical_alternative
  - marker: d
    text: ⲥⲟⲃⲧⲉ can carry shades from ‘fear’ to ‘terror/dread.’ ‘Fear’ here leaves
      the valence open.
    reason: lexical_alternative
  - marker: e
    text: Or 'the steadfast one dwelling'.
    reason: previous_rendering
  - marker: f
    text: Or 'who loosens it off'.
    reason: previous_rendering
  - marker: g
    text: Or 'the fear'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲛϫⲓ ⲥⲃⲱ ⲉⲣⲟⲉⲓ
  chosen: Give heed to me
  alternatives:
  - Take instruction toward me
  - Receive instruction from me
  lexicon: Crum; Layton (collocation of ϫⲓ “take” + ⲥⲃⲱ “instruction/teaching”)
  rationale: ϫⲓ is 2pl imperative “take!”; ⲥⲃⲱ as “instruction/teaching.” The idiomatic
    sense of the refrain in Thunder is an exhortation to pay attention. “Give heed”
    captures the imperative force without over-specifying a didactic register.
- source_word: ϩⲛ ⲟⲩⲙⲏϣⲉ
  chosen: in gentleness
  alternatives:
  - in meekness
  lexicon: Crum s.v. ⲙⲏϣⲉ
  rationale: ⲙⲏϣⲉ commonly means meekness/gentleness. Chose the broader, more accessible
    ‘gentleness’ while noting ‘meekness’ as a viable alternative.
- source_word: ⲧⲁϣϭⲏⲗ
  chosen: the steadfast one
  alternatives:
  - the abiding one
  - the stable one
  lexicon: Crum (root ϣϭⲗ ‘be firm/strong’; pattern suggesting substantivized quality)
  rationale: Context contrasts firmness with loosening. Rendered with a concrete ‘one’
    to preserve personified voice and paradox, rather than abstract ‘steadfastness’.
- source_word: ⲉⲕⲟⲗ
  chosen: dwelling
  alternatives:
  - remaining
  - sitting
  lexicon: Crum; likely related to Greek oik- semantic domain via Coptic usage
  rationale: Within the phrase ‘upon the face of the earth,’ a durative locative fits
    best; ‘dwelling’ retains concreteness and cadence.
- source_word: ϩⲓϫⲙ ⲡϩⲟ ⲙⲡⲕⲁϩ
  chosen: upon the face of the earth
  alternatives:
  - on the surface of the earth
  lexicon: Crum s.v. ⲡϩⲟ ‘face/surface’; ⲕⲁϩ ‘earth/ground’
  rationale: Set phrase in Coptic; ‘face of the earth’ preserves idiom and poetic
    weight.
- source_word: ⲉⲧⲛⲟⲩϫⲉ ⲙⲙⲟⲥ ⲉⲃⲟⲗ
  chosen: who loosens it off
  alternatives:
  - who dissolves it
  - who unbinds it
  - who destroys it
  lexicon: Crum s.v. ⲛⲟⲩϫⲉ ‘loosen, untie’
  rationale: Primary sense is to loosen/unbind. ‘Loosen…off’ keeps the concrete action
    and pairs antithetically with ‘steadfast.’ ‘Dissolve’ is a more metaphorical alternative.
- source_word: ⲧⲥⲟⲃⲧⲉ
  chosen: the fear
  alternatives:
  - the terror
  - the dread
  lexicon: Crum s.v. ⲥⲟⲃⲧⲉ
  rationale: ⲥⲟⲃⲧⲉ regularly denotes fear/terror. ‘Fear’ is the broadest, leaving
    the valence (reverential or terrifying) open in context.
- source_word: ⲙⲡⲣⲱⲙⲉ ⲛⲓⲙ
  chosen: of every person
  alternatives:
  - of every man
  - of all humankind
  lexicon: Crum s.v. ⲣⲱⲙⲉ ‘human being’; ⲛⲓⲙ ‘every/each’
  rationale: Inclusive modern English while retaining distributive force (‘every’).
parallelism_check: 'The core antithesis is kept explicit: “I am the steadfast one…
  and I am the one who loosens it…” preserves the paradoxical pair without smoothing.
  The refrain-like imperative opens the block, followed by two ‘I am’ statements that
  keep the voice and symmetry of the original pattern.'
voice_check: First-person declarations with repeated “I am” are retained twice, and
  the direct-address imperative keeps the commanding, oracular voice. The diction
  remains terse and oracular to match the poem’s cadence.
alignment_risk_note: Overall alignment confidence is medium. The refrain ⲧⲛϫⲓ ⲥⲃⲱ
  ⲉⲣⲟⲉⲓ ϩⲛ ⲟⲩⲙⲏϣⲉ is a recognized Thunder formula, but its placement in this segment
  depends on the heuristic line mapping. The reading of ⲧⲁϣϭⲏⲗ as ‘steadfast (one)’
  and ⲉⲧⲛⲟⲩϫⲉ as ‘loosen’ are reasonably secure, though nuance (‘abide/remain’ vs
  ‘be firm’) is open. The final clause ⲧⲥⲟⲃⲧⲉ ⲙⲡⲣⲱⲙⲉ ⲛⲓⲙ is taken as ‘the fear of
  every person,’ but ⲥⲟⲃⲧⲉ could shade to ‘terror/dread’ depending on context. The
  phrase ‘upon/off the face of the earth’ appears twice and is retained even if slightly
  clunky in English to reflect the repeated ϩⲓϫⲙ ⲡϩⲟ ⲙⲡⲕⲁϩ in the OCR.
