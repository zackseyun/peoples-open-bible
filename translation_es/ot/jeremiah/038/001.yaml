translation:
  language: es
  text: 'Entonces Sefatías hijo de Matán, Gedalías hijo de Pasjur, Jucal[a] hijo de Selemías, y Pasjur hijo de Malquías oyeron las palabras que Jeremías estaba hablando a todo el pueblo, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יוּכַל se traduce aquí como «Jucal»; la misma persona aparece en otro lugar con la forma más plena «Jehucal» (Jer 37:3).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - oyeron acerca de
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción puntual en la historia. En español, "oyeron" reproduce de forma natural y directa el hecho de percibir las palabras de Jeremías, sin añadir matices no presentes en el hebreo.
- source_word: שְׁפַטְיָה ... גְדַלְיָהוּ ... יוּכַל ... פַשְׁחוּר
  english_pob_choice: Shephatiah ... Gedaliah ... Jucal ... Pashhur
  chosen_spanish: Shefatías ... Gedalías ... Jucal ... Pasjur
  alternatives_spanish:
  - Sefatías ... Gedalías ... Jehucal ... Pasjur
  lexicon: Nombres propios hebreos
  rationale: Se transliteran los nombres propios. Para יוּכַל se conserva "Jucal" siguiendo la decisión auditada del POB inglés en este versículo, y se mantiene la posibilidad documentada de la forma más plena "Jehucal" en el aparato crítico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Es el equivalente genealógico normal en español y expresa con claridad la relación paterna inmediata que señala el hebreo.
- source_word: אֶת־הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - el mensaje
  lexicon: HALOT
  rationale: דָּבָר aquí se refiere al contenido hablado por Jeremías. "Las palabras" conserva la referencia verbal de manera directa y se ajusta al contexto narrativo.
- source_word: אֲשֶׁר יִרְמְיָהוּ מְדַבֵּר
  english_pob_choice: that Jeremiah was speaking
  chosen_spanish: que Jeremías estaba hablando
  alternatives_spanish:
  - que Jeremías hablaba
  - que Jeremías decía
  lexicon: HALOT
  rationale: El participio marca una acción en curso. "Estaba hablando" preserva ese valor imperfectivo y suena natural en español contemporáneo.
- source_word: אֶל־כָּל־הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a toda la población
  lexicon: HALOT
  rationale: '"Pueblo" traduce adecuadamente עָם en este contexto comunitario y narrativo; "todo" conserva la totalidad del grupo al que Jeremías se dirigía.'
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: La partícula introductoria de cita se vierte con la fórmula española habitual "diciendo" para enlazar con lo que sigue sin agregar contenido.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión más reciente y no requiere cambios sustanciales; se mantiene la decisión auditada del inglés POB sobre el nombre יוּכַל y la estructura narrativa del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se mantiene «Jucal» en coherencia con el expediente POB y se documenta la variante «Jehucal» en nota.
  - «Pueblo» conserva el valor colectivo de עָם sin convertirlo en una abstracción nacional más fuerte de lo que exige el contexto.
  - La puntuación española introduce dos puntos tras «diciendo» para preparar la cita siguiente, respetando la función del לֵאמֹר hebreo.
