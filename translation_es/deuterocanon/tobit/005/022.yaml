translation:
  language: es
  text: Porque un ángel bueno[a] irá con él, y su viaje[b] tendrá buen éxito, y volverá con buena salud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «bueno» conserva la sencillez del griego ἀγαθὸς; también podría entenderse como «benéfico».
    reason: lexical_alternative
  - marker: b
    text: «viaje» expresa aquí el curso del desplazamiento, no solo un «camino» en sentido abstracto.
    reason: lexical_alternative
  - marker: c
    text: «con buena salud» traduce el énfasis del participio en el estado de salud; evita ampliar el sentido a la fórmula más amplia «sano y salvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto narrativo de Tobit, el referente es un ser celestial protector; por eso «ángel» conserva el sentido ordinario y la lectura del texto, mientras que «mensajero» sería demasiado genérico.
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benéfico
  lexicon: BDAG
  rationale: El adjetivo califica de manera simple al ángel. «Bueno» sigue de cerca la fuerza directa del griego sin añadir matices que el pasaje no explicita.
- source_word: συνπορεύσεται
  english_pob_choice: will go with
  chosen_spanish: irá con
  alternatives_spanish:
  - acompañará
  - irá junto con
  lexicon: BDAG
  rationale: El verbo compuesto expresa ir en compañía de alguien. «Irá con» es natural en español y conserva el sentido de acompañamiento y movimiento.
- source_word: εὐοδωθήσεται
  english_pob_choice: will be successful
  chosen_spanish: tendrá buen éxito
  alternatives_spanish:
  - prosperará
  - le irá bien
  lexicon: BDAG
  rationale: La forma pasiva presenta el viaje como favorecido o hecho exitoso. «Tendrá buen éxito» comunica ese resultado favorable con tono claro y digno en español.
- source_word: ἡ ὁδὸς αὐτοῦ
  english_pob_choice: his journey
  chosen_spanish: su viaje
  alternatives_spanish:
  - su camino
  - su ruta
  lexicon: BDAG
  rationale: Aunque literalmente puede decir «su camino», el contexto de desplazamiento hace que «su viaje» exprese mejor la idea del trayecto concreto.
- source_word: ὑποστρέψει
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - volverá de nuevo
  lexicon: BDAG
  rationale: El verbo significa volver o regresar. «Volverá» es directo, natural y suficientemente formal para el registro bíblico.
- source_word: ὑγιαίνων
  english_pob_choice: in good health
  chosen_spanish: sano
  alternatives_spanish:
  - sano y salvo
  - con buena salud
  lexicon: BDAG
  rationale: El participio destaca el estado de salud. «Sano» reproduce con concisión esa idea; en español, el contexto ya sugiere el regreso sin daño.
theological_decisions:
- issue: Naturaleza de ἄγγελος en este contexto
  english_pob_reading: heavenly angel
  chosen_spanish_reading: ángel celestial/protector
  alternative_spanish_readings:
  - mensajero
  - ángel en sentido genérico
  rationale: En Tobit, el contexto narrativo apunta a una protección divina mediante un ser angélico, no a un simple mensajero humano. «Ángel» preserva esa lectura sin añadir afirmaciones doctrinales extra.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y claridad moderna'
- issue: Relación entre bienestar y salud en ὑγιαίνων
  english_pob_reading: in good health
  chosen_spanish_reading: volverá sano
  alternative_spanish_readings:
  - volverá con buena salud
  - volverá sano y salvo
  rationale: El griego enfatiza el estado de salud; por eso se mantiene «sano» en lugar de ampliar innecesariamente a la seguridad física, aunque esta pueda estar implícita en el contexto.
  doctrine_reference: 'DOCTRINE.md: evitar expandir el sentido más allá de lo que el texto dice'
translation_notes:
  revision_awareness: El contexto inglés auditado no presenta notas ni revisiones aplicadas; la redacción española sigue la lectura aprobada y mantiene las mismas decisiones léxicas básicas, con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «ángel» y no «mensajero», en coherencia con la lectura narrativa de Tobit.
  - Se evita «SEÑOR» o perífrasis reverenciales porque el versículo no contiene el nombre divino.
  - La sintaxis conserva la secuencia causal/explicativa del griego con «Porque… y… y…».
  - «Su viaje» y «volverá sano» mantienen el campo semántico de movimiento y salud sin sobreexplicar.
