translation:
  language: es
  text: Y apenas podemos conjeturar las cosas de la tierra, y las cosas que están a mano[a] las hallamos con trabajo; pero ¿quién ha rastreado lo que está en los cielos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que tenemos en las manos». La expresión griega puede referirse a lo que está cerca o fácilmente accesible.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόλις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - escasamente
  lexicon: LSJ
  rationale: «Apenas» comunica la idea de casi imposibilidad de manera natural en español y conserva el tono reflexivo del versículo.
- source_word: εἰκάζομεν
  english_pob_choice: guess
  chosen_spanish: conjeturar
  alternatives_spanish:
  - inferir
  - formar una idea de
  - conjeturar
  lexicon: LSJ
  rationale: El verbo expresa una estimación o conjetura, no conocimiento seguro. «Conjeturar» mantiene la humildad epistemológica del texto sin volverlo coloquial.
- source_word: τὰ ἐπὶ γῆς
  english_pob_choice: the things on earth
  chosen_spanish: las cosas de la tierra
  alternatives_spanish:
  - las cosas en la tierra
  - las cosas terrenales
  lexicon: LSJ
  rationale: Se conserva el contraste concreto con las realidades celestiales. «De la tierra» es claro en español y evita abstraer demasiado el plural neutro.
- source_word: τὰ ἐν χερσὶν
  english_pob_choice: the things at hand
  chosen_spanish: las cosas que están a mano
  alternatives_spanish:
  - las cosas al alcance
  - las cosas cercanas
  - lo que está al alcance
  lexicon: LSJ
  rationale: La expresión griega puede significar lo que está próximo o fácilmente accesible. «A mano» conserva esa imagen idiomática y el matiz de cercanía que el audit trail en inglés decidió reflejar con «at hand».
- source_word: εὑρίσκομεν
  english_pob_choice: we find
  chosen_spanish: las hallamos
  alternatives_spanish:
  - las encontramos
  - las descubrimos
  lexicon: LSJ
  rationale: «Hallamos» es un equivalente digno y clásico para εὑρίσκομεν, y mantiene el paralelismo sin tecnicismo añadido.
- source_word: μετὰ πόνου
  english_pob_choice: with labor
  chosen_spanish: con trabajo
  alternatives_spanish:
  - con fatiga
  - con esfuerzo
  - con labor
  lexicon: LSJ
  rationale: «Con trabajo» comunica el sentido de esfuerzo y fatiga de πόνου en un español natural; evita repetir innecesariamente la idea de dificultad ya presente en «apenas».
- source_word: τὰ δὲ ἐν οὐρανοῖς
  english_pob_choice: the things in the heavens
  chosen_spanish: las cosas en los cielos
  alternatives_spanish:
  - las cosas en el cielo
  - las cosas celestiales
  lexicon: LSJ
  rationale: Se mantiene el plural de οὐρανοῖς con «cielos» para respetar la forma griega y el contraste cosmológico con «tierra».
- source_word: τίς ἐξιχνίασεν
  english_pob_choice: who has traced out
  chosen_spanish: ¿quién ha trazado?
  alternatives_spanish:
  - ¿quién ha rastreado?
  - ¿quién ha investigado a fondo?
  - ¿quién ha descubierto?
  lexicon: LSJ
  rationale: «Trazado» reproduce bien la metáfora de seguir algo hasta su fin y conserva la fuerza retórica de la pregunta. Se evita una formulación más explicativa que debilitaría el paralelo con el resto del verso.
theological_decisions:
- issue: Limitación humana frente a realidades terrestres y celestiales
  english_pob_reading: The verse contrasts human difficulty in grasping even earthly matters with the impossibility of searching out heavenly matters.
  chosen_spanish_reading: 'El versículo presenta un contraste retórico: el ser humano apenas puede conjeturar lo terreno y con trabajo alcanza aun lo cercano, mientras que las realidades celestiales permanecen fuera de su alcance.'
  alternative_spanish_readings:
  - Una versión más interpretativa podría explicitar 'los misterios de Dios' o 'su consejo'.
  rationale: El griego no nombra aquí el consejo divino ni desarrolla aún el tema teológico; por eso la traducción conserva la tensión epistemológica sin resolverla anticipadamente.
  doctrine_reference: Conservar la tensión teológica y epistemológica sin añadir contenido no expresado en el verso.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 y el audit trail inglés: se conserva la progresión retórica de dificultad → hallazgo con esfuerzo → incapacidad para lo celestial. Se adoptó «a mano» como equivalente idiomático de ἐν χερσίν, en línea con la revisión inglesa que prefirió ''at hand'' frente a ''in our hands''.'
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar οὐρανοῖς.
  - Se evita «SEÑOR» o terminología teológica ajena, porque el versículo no contiene el nombre divino ni κύριος.
  - «Conjeturar» y «trazado» preservan la modestia cognitiva y la metáfora de búsqueda del original.
