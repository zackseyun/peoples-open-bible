translation:
  language: es
  text: Ahora, pues, sepan con certeza que morirán a espada, de hambre y de peste[a] en el lugar adonde desearon ir para residir allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y de plaga». El término hebreo puede denotar enfermedad epidémica en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Ahora, por tanto
  lexicon: HALOT
  rationale: La partícula abre una transición consecuente; en español, «Ahora» comunica el cambio de situación con naturalidad. «Por tanto» añade inferencia explícita, pero aquí no es necesario para mantener fluidez sin perder la conexión con el contexto.
- source_word: יָדֹעַ תֵּדְעוּ
  english_pob_choice: know for certain
  chosen_spanish: sepan con certeza
  alternatives_spanish:
  - sepan seguramente
  - conozcan con certeza
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la advertencia. «Sepan con certeza» preserva la fuerza enfática en un español idiomático y solemne.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben saber; «que» es la subordinación más natural en español.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: En español bíblico, «a espada» reproduce bien la fórmula de muerte violenta por guerra/juicio y mantiene la concisión del hebreo.
- source_word: בָּרָעָב
  english_pob_choice: by famine
  chosen_spanish: de hambre
  alternatives_spanish:
  - por hambre
  - por la hambruna
  lexicon: HALOT
  rationale: «רעב» en este trío de juicio se refiere al hambre generalizada. «De hambre» suena natural y mantiene el paralelismo con las otras causas de muerte.
- source_word: וּבַדֶּבֶר
  english_pob_choice: and by pestilence
  chosen_spanish: y de peste
  alternatives_spanish:
  - y de plaga
  - y de pestilencia
  lexicon: HALOT
  rationale: El término hebreo puede designar enfermedad epidémica o peste. «Peste» conserva el registro profético y la ambigüedad útil sin estrecharlo innecesariamente.
- source_word: תָּמ֑וּתוּ
  english_pob_choice: you will die
  chosen_spanish: morirán
  alternatives_spanish:
  - ustedes morirán
  - habrán de morir
  lexicon: HALOT
  rationale: El futuro simple expresa la certeza de la sentencia. El sujeto implícito se entiende por el contexto, y la forma breve evita redundancia.
- source_word: בַּמָּקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en ese lugar
  lexicon: HALOT
  rationale: «Lugar» es un equivalente directo y claro del valor locativo del hebreo.
- source_word: אֲשֶׁר חֲפַצְתֶּם
  english_pob_choice: where you desired
  chosen_spanish: al que quisieron ir
  alternatives_spanish:
  - al que deseaban ir
  - donde quisieron
  lexicon: HALOT
  rationale: 'חפץ expresa deseo o intención. En este contexto, el español transmite mejor la meta deseada con una cláusula relativa de movimiento: «al que quisieron ir».'
- source_word: לָבוֹא
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - venir
  - entrar
  lexicon: HALOT
  rationale: Desde la perspectiva del hablante, el movimiento hacia ese lugar se expresa naturalmente con «ir».
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: para residir
  alternatives_spanish:
  - para habitar temporalmente
  - para quedarse
  lexicon: HALOT
  rationale: En español contemporáneo, «sojourn» no tiene equivalente natural de uso común. «Residir» comunica la intención de establecerse allí sin sobrecargar el texto con un tecnicismo extranjero. Se conserva la noción de asentamiento, aunque sin marcar de forma explícita la temporalidad del verbo hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» retoma el referente locativo final con estilo natural y formal.
theological_decisions:
- issue: 'Fórmula de juicio: espada, hambre y peste / plaga'
  english_pob_reading: by the sword, by famine, and by pestilence
  chosen_spanish_reading: a espada, de hambre y de peste
  alternative_spanish_readings:
  - por la espada, por hambre y por plaga
  - a espada, de hambre y de peste/plaga
  rationale: Se preserva la tríada profética clásica de juicio sin suavizarla. «Peste» mantiene el registro bíblico y deja abierta la amplitud semántica del hebreo, que puede abarcar enfermedad epidémica.
  doctrine_reference: Jer 14:12; 21:7; 24:10; 27:8,13; 29:17-18
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y quedó sin cambios; este borrador español sigue ese estado estable y no introduce reinterpretaciones adicionales. Se priorizó la equivalencia funcional donde el español lo requiere, especialmente en el verbo de juicio, la intensificación verbal y la cláusula de propósito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - 'Se traduce el trío de juicio con un registro profético consistente: «espada / hambre / peste».'
  - «Residir» se usa aquí para reflejar la idea de εγκατάσταση/sojourn sin forzar un arcaísmo; en notas se reconoce la pérdida de la temporalidad explícita.
  - La puntuación refleja el valor exhortativo e introductorio de «Ahora».
