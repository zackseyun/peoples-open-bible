theological_decisions:
- issue: Referent of the relative clause ('which does not wait...')
  chosen_reading: The clause refers to the dew/showers image, emphasizing divine action not dependent on human agency.
  alternative_readings:
  - The clause refers more broadly to the remnant of Jacob as acting independently of human support.
  rationale: Syntactically the nearest antecedent is the dew/showers imagery, and the agricultural metaphor naturally supports the idea of something that comes from God rather than from human initiative. This also fits the immediate simile structure without importing a stronger claim about the remnant's political independence than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
