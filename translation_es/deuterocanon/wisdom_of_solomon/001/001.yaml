review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: imperativos sucesivos, destinatario explícito, y búsqueda de Dios con integridad interior. Sin embargo, hay dos desajustes relevantes respecto del rastro POB y del griego: (1) el inglés POB fijó el texto principal como ''righteousness'', no ''justice''; en español conviene conservar esa amplitud con «rectitud» o similar y dejar «justicia» como alternativa contextual; (2) la nota [c] está anclada a «corazón», pero en realidad comenta «sencillez de corazón», creando un desajuste entre ancla y nota. Además, «piensen en el Señor» es idiomático, pero el griego περί + genitivo se acerca más a «piensen acerca del Señor» o «piensen en el Señor»; esto no exige cambio, aunque merece notarse.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Amen», «ustedes que juzgan la tierra» y «búsquenlo» funcionan bien. No obstante, «sencillez de corazón» puede sonar algo débil o ambiguo en español actual frente al matiz de ἁπλότης como sinceridad / corazón indiviso. «Con sinceridad de corazón» o «con un corazón indiviso» comunica mejor el sentido. También conviene que la nota sobre δικαιοσύνη preserve mejor la amplitud ética-teológica del término.
  glossary_alignment: Hay una desviación parcial del criterio POB para δικαιοσύνη. Aunque el contexto judicial favorece «justicia», el expediente inglés eligió 'righteousness' en texto principal y preservó 'justice' como alternativa. En español, «rectitud» encaja mejor con esa decisión base y mantiene la alternativa «justicia» en nota. κύριος → «Señor» está bien alineado. No hay otros conflictos terminológicos mayores.
  issues:
  - severity: medium
    issue: δικαιοσύνη se tradujo en el texto principal como «justicia» en vez de una opción más amplia equivalente a 'righteousness'.
    rationale: El expediente inglés y la decisión teológica del proyecto prefieren 'righteousness' en el texto principal, dejando 'justice' como alternativa contextual. En español, «rectitud» preserva mejor ese rango semántico sin borrar la resonancia judicial.
  - severity: low
    issue: La nota [c] está anclada solo en «corazón», aunque comenta toda la expresión «sencillez de corazón».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante para evitar ambigüedad editorial.
  - severity: medium
    issue: «Sencillez de corazón» puede subcomunicar el matiz de ἁπλότης como sinceridad o corazón indiviso.
    rationale: En español contemporáneo, «sencillez» puede sugerir falta de sofisticación más que integridad no dividida. «Sinceridad de corazón» comunica mejor el valor contextual y coincide con la alternativa preservada por el POB.
  revised_spanish_text: Amen la rectitud[a], ustedes que juzgan la tierra[b]; piensen en el Señor con bondad, y búsquenlo con sinceridad de corazón[c].
