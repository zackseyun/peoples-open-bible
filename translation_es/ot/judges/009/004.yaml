    rationale: El hebreo 'vacíos' aquí apunta a hombres sin sustancia/valor, de baja calaña, no meramente incapaces o ineptos. 'Inútiles' en español moderno suele sugerir torpeza o falta de utilidad, y pierde el peso moral-social del original y del inglés 'worthless'.
  - severity: low
    issue: Pronombre explícito 'ellos'
    rationale: En 'y ellos lo siguieron', el sujeto explícito no es necesario en español y suena algo pesado. 'Y lo siguieron' es más natural sin pérdida de sentido.
