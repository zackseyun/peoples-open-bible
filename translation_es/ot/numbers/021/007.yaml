    reason: lexical_alternative
  revision_rationale: Se conserva la traducción general del borrador, pero se corrige una construcción poco natural en español («quite de nosotros») por «quite de encima de nosotros», que expresa mejor el valor de מֵעָלֵינוּ. También se corrige la nota al pie para que aporte una alternativa real y se ancla correctamente en «la serpiente», que es el término afectado por la observación sobre el singular colectivo.
