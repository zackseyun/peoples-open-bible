translation:
  language: es
  text: Han oído que yo gimo; no hay quien me consuele. Todos mis enemigos han oído mi calamidad[a]; se regocijan porque tú lo has hecho. Tú has traído el día que proclamaste[b]; que lleguen a ser como yo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi desgracia» o «mi aflicción». El término hebreo puede denotar desastre o aflicción.
    reason: lexical_alternative
  - marker: b
    text: O «que anunciaste». El verbo puede significar «proclamar» o «anunciar» en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «y serán como yo». La forma hebrea puede leerse como deseo/petición («que lleguen a ser como yo») o como futuro declarativo.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: They have heard
  chosen_spanish: Han oído
  alternatives_spanish:
  - Oyeron
  lexicon: HALOT
  rationale: El perfecto hebreo en este lamento expresa una acción ya conocida con efecto presente; en español, el perfecto compuesto («han oído») conserva mejor esa vigencia que el pretérito simple.
- source_word: נֶאֱנָחָה אָ֗נִי
  english_pob_choice: I groan
  chosen_spanish: yo gimo
  alternatives_spanish:
  - yo suspиро
  - yo estoy gimiendo
  lexicon: HALOT
  rationale: El verbo comunica lamento doloroso; «gimo» mantiene la fuerza del sufrimiento sin suavizarlo. Se evita «suspirar», que sería más débil en este contexto.
- source_word: אֵין מְנַחֵם לִי
  english_pob_choice: there is no one to comfort me
  chosen_spanish: no hay quien me consuele
  alternatives_spanish:
  - no tengo consolador
  - no hay consolador para mí
  lexicon: HALOT
  rationale: La construcción existencial expresa ausencia total de consolador. «No hay quien me consuele» suena natural en español y conserva el valor de carencia absoluta.
- source_word: כָּל אֹיְבַי
  english_pob_choice: All my enemies
  chosen_spanish: Todos mis enemigos
  alternatives_spanish:
  - Todos los que me odian
  - Todos mis adversarios
  lexicon: HALOT
  rationale: La frase hebrea es directa y cuantificadora; «todos mis enemigos» reproduce el alcance total sin añadir matices no presentes.
- source_word: רָעָתִי
  english_pob_choice: my trouble
  chosen_spanish: mi calamidad
  alternatives_spanish:
  - mi desgracia
  - mi aflicción
  - mi mal
  lexicon: HALOT
  rationale: El campo semántico admite desastre, aflicción o mal. En el tono de lamento, «calamidad» conserva el peso del término y evita reducirlo a simple «problema».
- source_word: שָׂשׂוּ
  english_pob_choice: they rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - saltan de alegría
  lexicon: HALOT
  rationale: '«Se alegran» expresa la reacción de los enemigos ante la desgracia, sin perder la dimensión moral que la POB inglesa quiso preservar con «rejoice». '
- source_word: כִּי אַתָּה עָשִׂיתָ
  english_pob_choice: that you have done it
  chosen_spanish: porque tú lo has hecho
  alternatives_spanish:
  - porque tú lo hiciste
  - pues tú lo has hecho
  lexicon: HALOT
  rationale: Se mantiene la atribución directa a Dios. «Lo» deja implícito el objeto, como en hebreo, y «has hecho» comunica una acción ya cumplida con relevancia presente.
- source_word: הֵבֵאתָ יוֹם קָרָאתָ
  english_pob_choice: You have brought the day you proclaimed
  chosen_spanish: Tú has traído el día que proclamaste
  alternatives_spanish:
  - Tú has traído el día que anunciaste
  - Tú has hecho venir el día que llamaste
  lexicon: HALOT
  rationale: «Traído el día» conserva la imagen de hacer llegar el día señalado; «proclamaste» sigue el valor de קרא en el contexto profético de anunciar un día fijado.
- source_word: וְיִהְיוּ כָמוֹנִי
  english_pob_choice: let them become like me
  chosen_spanish: que se vuelvan como yo
  alternatives_spanish:
  - y serán como yo
  - que lleguen a ser como yo
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfectiva, el contexto de lamento favorece un sentido de petición/imprecación. «Que se vuelvan como yo» conserva esa fuerza desiderativa sin endurecerla artificialmente.
theological_decisions:
- issue: Atribución de la calamidad a Dios
  english_pob_reading: 'The text explicitly attributes the disaster to God: ''you have done it'' and ''you have brought the day you proclaimed.'''
  chosen_spanish_reading: 'El texto atribuye explícitamente la calamidad a Dios: «tú lo has hecho» y «tú has traído el día que proclamaste».'
  alternative_spanish_readings:
  - Una traducción que suavice la referencia divina
  - Una formulación impersonal que no señale a Dios directamente
  rationale: 'Se preserva la tensión teológica del hebreo: la ruina no se presenta como azar, sino como acto atribuido a Dios en segunda persona. No se atenúa esta afirmación para mantener la fidelidad al texto.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo y el trazado auditado de la POB inglesa, preservando el lamento, la atribución directa a Dios y la ambigüedad final de la forma verbal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo el hablante se dirige a Dios sin el Tetragrámaton en forma directa.
  - Se mantiene «calamidad» en la nota y «gimo» en el texto para reflejar el rango semántico del lamento sin borrar la tensión lexical.
  - La cláusula final se vierte como petición («que se vuelvan») por el peso pragmático del contexto de lamentación.
