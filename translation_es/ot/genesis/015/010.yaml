revisions:
- from: Así que los llevó a él, los partió por la mitad[a], y puso cada mitad frente a la otra[b]; pero no partió las aves por la mitad.
  to: Entonces llevó todos estos a él, los partió por la mitad[a], y puso cada mitad frente a la otra[b]; pero no partió las aves por la mitad.
  rationale: La revisión restaura 'todos estos' para reflejar explícitamente כָּל אֵלֶּה, cambia 'Así que' por 'Entonces' para una secuencia narrativa más fiel, y ajusta la nota [b] para evitar el matiz de emparejamiento que el expediente inglés descartó. El resto del borrador ya era fiel, natural y teológicamente sobrio.
