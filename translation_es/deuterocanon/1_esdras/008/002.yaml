translation:
  language: es
  text: hijo de Saduluc[a], hijo de Ajeitob, hijo de Amarteo, hijo de Ozeías, hijo de Bocca, hijo de Abeisai, hijo de Finees, hijo de Eleazar[b], hijo de Aarón, el primer sacerdote[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego aquí ofrece una genealogía más extensa que el breve paralelo hebreo, que dice: ''hijo de Salum, hijo de Sadoc, hijo de Ahitub''.'
    reason: alternative_reading
  - marker: b
    text: 'Varios de estos nombres reflejan formas griegas de nombres hebreos más conocidos: Ajeitob = Ahitub, Ozeías = Uzzi, Bocca = Bukki, Abeisai = Abisúa, Finees = Fineés/Phinehas.'
    reason: lexical_alternative
  - marker: c
    text: O posiblemente 'el sacerdote principal'; el griego dice simplemente 'sacerdote'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - de
  lexicon: LSJ
  rationale: En una cadena genealógica, el genitivo repetido expresa descendencia. En español, 'hijo de' comunica con naturalidad esa relación y mantiene la estructura del linaje.
- source_word: Σαδδουλούκου
  english_pob_choice: Saddoulouk
  chosen_spanish: Saduluc
  alternatives_spanish:
  - Sadduluc
  - Sadolec
  - Salum
  lexicon: LSJ
  rationale: Se conserva la forma griega mediante transliteración al español. La forma hebrea paralela es distinta, pero el texto base aquí es el griego de 1 Esdras.
- source_word: Ἀχειτὼβ
  english_pob_choice: Acheitob
  chosen_spanish: Ajeitob
  alternatives_spanish:
  - Aquitob
  - Ahitub
  lexicon: LSJ
  rationale: Transliteración de la forma griega. Se evita armonizar con la forma hebrea más conocida en el texto principal.
- source_word: Ἀμαρθείου
  english_pob_choice: Amartheios
  chosen_spanish: Amarteo
  alternatives_spanish:
  - Amarteo
  - Amarías
  lexicon: LSJ
  rationale: El griego añade este antepasado en la cadena; por fidelidad al testimonio base, se translitera en vez de reducirlo a una forma hebrea aproximada.
- source_word: Ὀζείου
  english_pob_choice: Ozeias
  chosen_spanish: Ozeías
  alternatives_spanish:
  - Uzí
  - Uzías
  lexicon: LSJ
  rationale: Se mantiene la forma griega transliterada. La equivalencia hebrea tradicional se deja como alternativa, pero no sustituye al texto base.
- source_word: Βοκκὰ
  english_pob_choice: Bokka
  chosen_spanish: Bocca
  alternatives_spanish:
  - Bukí
  - Bukki
  lexicon: LSJ
  rationale: Transliteración del nombre griego. Se conserva la forma de la LXX en lugar de rearmonizarla con el paralelo hebreo.
- source_word: Ἀβεισαὶ
  english_pob_choice: Abeisai
  chosen_spanish: Abeisai
  alternatives_spanish:
  - Abisúa
  - Abishua
  lexicon: LSJ
  rationale: La forma griega se puede representar de manera bastante directa en español. Se preserva el nombre propio sin normalizarlo al equivalente hebreo.
- source_word: Φεινεὲς
  english_pob_choice: Phinees
  chosen_spanish: Finees
  alternatives_spanish:
  - Finees
  - Finees
  lexicon: LSJ
  rationale: Se usa la transliteración habitual al español de la forma griega. La equivalencia hebrea Phinehas/Finees se conserva como alternativa por claridad.
- source_word: Ἐλεαζὰρ
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleazar
  lexicon: LSJ
  rationale: La forma griega corresponde de manera estándar al nombre conocido en español, por lo que se mantiene la transliteración usual.
- source_word: Ἀαρὼν
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: LSJ
  rationale: Nombre propio bíblico asentado en español; se conserva la forma habitual con tilde.
- source_word: τοῦ πρώτου ἱερέως
  english_pob_choice: the chief priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el primer sacerdote
  - el sacerdote principal
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'el primer sacerdote', en este contexto la función histórica de Aarón se expresa con naturalidad en español como 'sumo sacerdote'. Se sigue la revisión inglesa que buscó mayor precisión contextual, sin perder la referencia a la dignidad sacerdotal inicial.
theological_decisions:
- issue: Cómo traducir la culminación de la genealogía de Aarón sin importar un título ausente en el griego
  english_pob_reading: '''the chief priest'' / previously ''the first high priest'' as a contextual gloss over ἱερεύς'
  chosen_spanish_reading: '''el sumo sacerdote'' como equivalencia contextual de la referencia a Aarón'
  alternative_spanish_readings:
  - '''el primer sacerdote'''
  - '''el sacerdote principal'''
  rationale: El griego emplea ἱερεύς con πρώτου, no ἀρχιερεύς. En español, 'sumo sacerdote' expresa la función suprema atribuida a Aarón en la tradición bíblica y resulta más natural que una calca como 'primer sacerdote'. A la vez, se mantiene la nota lexical para no ocultar la tensión entre forma y sentido.
  doctrine_reference: 'Translation philosophy #1 original-language primacy over translation tradition'
- issue: Si armonizar la genealogía con el paralelo hebreo más breve o conservar la secuencia griega ampliada
  english_pob_reading: Preserve the fuller Greek genealogy in the main text
  chosen_spanish_reading: Conservar la genealogía griega más amplia en el texto principal
  alternative_spanish_readings:
  - Armonizar con 'hijo de Salum, hijo de Sadoc, hijo de Ahitub'
  rationale: 1 Esdras sigue el testimonio griego como base principal; por eso no se colapsa la cadena en el paralelo hebreo más breve. La traducción conserva los nombres adicionales que aparecen en la LXX y documenta el contraste con el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy #1 original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del expediente en inglés, que ajustó la frase final desde 'the first priest' a 'the chief priest' por mayor naturalidad contextual. En español, se optó por 'el sumo sacerdote' para expresar esa función de manera idiomática y teológicamente reconocible, sin ocultar que la forma griega literal no usa ἀρχιερεύς.
  spanish_consistency_notes:
  - Se mantuvo transliteración de nombres propios griegos en toda la cadena genealógica.
  - Se evitó armonizar el linaje con el paralelo hebreo en el texto principal; la armonización queda solo en nota.
  - Se preservó la tensión entre la literalidad de πρώτου ἱερέως y la equivalencia contextual en español mediante nota lexical.
  - Se usó puntuación española y mayúsculas/tildes habituales para nombres bíblicos en español.
