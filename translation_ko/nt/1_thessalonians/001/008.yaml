id: 1TH.1.8
reference: 1 Thessalonians 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀφ’ ὑμῶν γὰρ ἐξήχηται ὁ λόγος τοῦ κυρίου οὐ μόνον ἐν τῇ Μακεδονίᾳ ⸀καὶ Ἀχαΐᾳ, ⸀ἀλλ’ ἐν παντὶ τόπῳ ἡ πίστις ὑμῶν ἡ πρὸς τὸν θεὸν ἐξελήλυθεν, ὥστε μὴ χρείαν ⸂ἔχειν ἡμᾶς⸃ λαλεῖν τι·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/008.yaml
  text: For from you the word of the Lord has sounded forth[a], not only in Macedonia and Achaia, but in every place your faith toward God has gone out, so that we have no need to say anything.
  footnotes:
  - marker: a
    text: Or 'your faith in God.' The Greek more literally reads 'your faith toward God.'
    reason: lexical_alternative
translation:
  language: ko
  text: 주의 말씀이 여러분에게서 마게도냐와 아가야에만이 아니라 모든 곳에 울려 퍼졌고, 하나님을 향한 여러분의 믿음[a]도 곳곳에 전해졌으므로 우리가 무엇을 말할 필요가 없습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님께 대한 믿음」. 헬라어 πρός는 더 문자적으로 「~을 향한」을 뜻한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφ’ ὑμῶν ... ἐξήχηται
  english_pob_choice: from you ... has sounded forth
  chosen_korean: 여러분에게서 ... 울려 퍼졌고
  alternatives_korean:
  - 여러분에게서 ... 메아리쳐 나갔고
  - 여러분으로부터 ... 울려 나갔고
  lexicon: BDAG
  rationale: ἐξηχέω는 소리가 울려 나가는 강한 청각적 이미지를 담는다. 「울려 퍼지다」가 그 비유와 완료의 현재 결과를 자연스럽게 담는다.
- source_word: ὁ λόγος τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_korean: 주의 말씀
  alternatives_korean:
  - 주님의 말씀
  - 주께 속한 말씀
  lexicon: BDAG
  rationale: 바울적 정형 표현. 「주의 말씀」이 간결하고 정형적이다.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_korean: 모든 곳에 ... 곳곳에
  alternatives_korean:
  - 모든 장소에
  - 어디서나
  lexicon: BDAG
  rationale: παντί의 분배적 의미와 τόπῳ의 구체적 장소 어감을 「모든 곳/곳곳」으로 살린다. 「어디서나」는 더 매끄럽지만 구체성을 약화시킨다.
- source_word: ἡ πίστις ὑμῶν ἡ πρὸς τὸν θεόν
  english_pob_choice: your faith toward God
  chosen_korean: 하나님을 향한 여러분의 믿음
  alternatives_korean:
  - 하나님께 대한 여러분의 믿음
  - 하나님을 향한 여러분의 신뢰
  lexicon: BDAG
  rationale: 전치사 πρός의 방향성을 「~을 향한」으로 보존한다. πίστις는 기본값 「믿음」을 채택한다.
- source_word: ἐξελήλυθεν
  english_pob_choice: has gone out
  chosen_korean: 전해졌으므로
  alternatives_korean:
  - 나아갔으므로
  - 퍼져 나갔으므로
  lexicon: BDAG
  rationale: ἐξέρχομαι 완료. 한국어 합쇼체 흐름에서 「전해졌다」가 자연스럽다. 앞 절 「울려 퍼졌다」와 짝을 이루며 의미 중복을 피한다.
- source_word: ὥστε μὴ χρείαν ἔχειν ἡμᾶς λαλεῖν τι
  english_pob_choice: so that we have no need to say anything
  chosen_korean: 우리가 무엇을 말할 필요가 없습니다
  alternatives_korean:
  - 우리가 더 말할 필요가 없을 정도로
  - 우리가 아무 말도 할 필요가 없습니다
  lexicon: BDAG
  rationale: ὥστε 결과절. 한국어 종결 동사 「~없습니다」로 자연스럽게 풀어내며, 합쇼체 흐름을 마감한다.
theological_decisions:
- issue: πίστις를 「믿음」으로 옮기는 결정
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  - 신뢰
  rationale: 본문은 데살로니가 신자들의 하나님을 향한 응답을 가리키므로 기본값 「믿음」이 가장 적합하다. 모호함이 본문에 깊지 않으므로 각주에 대안을 두지 않는다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith'
