theological_decisions:
- issue: Meaning of 'my name' in persecution context
  chosen_reading: Retain the Semitic/biblical expression 'my name' rather than interpretively expanding it to 'because of me' or 'because you bear my name.'
  alternative_readings:
  - because of me
  - because you belong to me
  rationale: The phrase τοῦ ὀνόματός μου carries theological weight in biblical usage, referring to Jesus' person and authority as confessed by his followers. Preserving 'my name' maintains that resonance without importing a narrower interpretation.
  doctrine_reference: Translation philosophy §1, §3, §6
