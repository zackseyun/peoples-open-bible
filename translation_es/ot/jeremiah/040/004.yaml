  to: 'Y ahora, he aquí: hoy te he liberado[a] de las cadenas que estaban en tus manos. Si te parece bueno venir conmigo a Babilonia, ven, y cuidaré de ti[b]. Pero si te parece malo venir conmigo a Babilonia, abstente. Mira, toda la tierra está delante de ti[c]; ve a donde te parezca bueno y recto ir.'
