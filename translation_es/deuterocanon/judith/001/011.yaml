base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/001/011.yaml
  text: And all who inhabited the whole land treated the word of Nebuchodonosor king of the Assyrians with contempt[a], and they did not join him in the war, because they did not fear him, but he was before them like an ordinary man[c][b], and they sent his messengers back empty in dishonor from before him.
  footnotes:
  - marker: a
    text: Or 'despised the message/command of Nebuchodonosor.' The Greek τὸ ῥῆμα can mean 'word,' 'message,' or 'command,' and ἐφαύλισαν conveys treating it as of little account.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he was before them like a man equal.' The sense is that they regarded him as merely a man on their own level, not as one to be feared.
    reason: lexical_alternative
  - marker: c
    text: Or 'they turned back his envoys empty-handed, with disgrace, from his presence.'
    reason: lexical_alternative
