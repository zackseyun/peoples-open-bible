translation:
  language: es
  text: Entonces surgirán siete años de hambre[a] después de ellos, y se olvidará toda la abundancia[b] en la tierra de Egipto, y el hambre consumirá[c] la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hambruna». El hebreo רָעָב puede referirse al hambre como situación de carestía o, en un registro más técnico, a una hambruna.
    reason: lexical_alternative
  - marker: b
    text: O «toda la plenitud». El término hebreo denota plenitud o abundancia, especialmente en contraste con el hambre.
    reason: lexical_alternative
  - marker: c
    text: O «destruirá». El verbo puede llevar el sentido de arruinar o consumir por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָמוּ
  english_pob_choice: Then ... will arise
  chosen_spanish: Entonces surgirán
  alternatives_spanish:
  - y surgirán
  - entonces aparecerán
  - entonces se levantarán
  lexicon: HALOT
  rationale: El futuro predictivo y la secuencia narrativa se expresan naturalmente con «Entonces» + futuro. «Surgirán» conserva la imagen de algo que aparece o se levanta después de la etapa previa, sin forzar un calco con «arise».
- source_word: שֶׁבַע שְׁנֵי רָעָב
  english_pob_choice: seven years of famine
  chosen_spanish: siete años de hambre
  alternatives_spanish:
  - siete años de famine
  - siete años de escasez
  - siete años de hambre extrema
  lexicon: HALOT
  rationale: La construcción de estado en español se expresa de forma natural como «siete años de hambre». «Hambre» aquí comunica la situación de hambruna/famine sin añadir especificaciones que el hebreo no exige.
- source_word: אַחֲרֵיהֶן
  english_pob_choice: after them
  chosen_spanish: después de ellos
  alternatives_spanish:
  - después de estas
  - tras ellos
  - después de esas
  lexicon: HALOT
  rationale: El sufijo pronominal femenino plural remite a los siete años anteriores de abundancia. «Después de ellos» preserva esa referencia anafórica de manera directa y idiomática en español.
- source_word: וְנִשְׁכַּח
  english_pob_choice: will be forgotten
  chosen_spanish: se olvidará
  alternatives_spanish:
  - será olvidada
  - quedará olvidada
  - no se recordará
  lexicon: HALOT
  rationale: El nifal de שׁכח puede expresarse como pasiva o media; en español, «se olvidará» reproduce bien la idea de que la abundancia quedará borrada de la memoria por la crisis.
- source_word: כָּל הַשָּׂבָע
  english_pob_choice: all the abundance
  chosen_spanish: toda la abundancia
  alternatives_spanish:
  - todo el abundamiento
  - toda la plenitud
  - todo el bienestar
  lexicon: HALOT
  rationale: שָׂבָע denota plenitud/abundancia/saciedad. En este contexto económico, «abundancia» es la opción más amplia y fiel; «plenty» en inglés se mantiene aquí como «abundancia» sin estrechar el sentido a alimentos almacenados.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en el país de Egipto
  - en Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» refleja con fidelidad la formulación hebrea y mantiene la resonancia bíblica de אֶרֶץ como territorio/land. «Tierra» también preserva la correspondencia con el objeto posterior del versículo.
- source_word: וְכִלָּה
  english_pob_choice: will consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - destruirá
  - acabará con
  - devorará
  lexicon: HALOT
  rationale: כלה aquí expresa una consumación devastadora causada por la hambruna. «Consumirá» conserva la metáfora de agotamiento total que el inglés POB también preserva con «consume».
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre extrema
  - la escasez
  lexicon: HALOT
  rationale: Aunque el inglés usa «famine», en español «hambre» funciona de manera natural en esta cláusula verbal. Mantiene la fuerza del fenómeno sin introducir una terminología más técnica que el hebreo no requiere explícitamente.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  - la tierra entera
  lexicon: HALOT
  rationale: אָרֶץ se traduce aquí como «la tierra» para conservar la amplitud semántica del hebreo y la repetición interna con «en la tierra de Egipto». No se restringe a «país» porque el texto apunta al territorio en sentido global.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el sentido auditado del inglés POB; no se registran revisiones posteriores que obliguen a cambiar la elección léxica principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la correspondencia entre «tierra de Egipto» y «la tierra» para reflejar la repetición del hebreo אֶרֶץ sin artificialidad.
  - Se prefiere «hambre» en el texto principal por naturalidad, con nota para «hambruna» como alternativa lexical válida.
