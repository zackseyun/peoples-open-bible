  text: Entonces Jeremías el profeta le habló todas estas palabras a Sedequías, rey de Judá, en Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español natural, «Entonces» refleja bien ese avance. «Habló» conserva el valor de comunicación formal del verbo, en línea con la decisión inglesa de preferir 'spoke' sobre 'said'.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmiyahu
  lexicon: Transliteración estándar del nombre propio
  rationale: Se usa la forma bíblica y ampliamente reconocible en español, equivalente a la transliteración inglesa adoptada por POB.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El título es explícito en hebreo y debe conservarse porque identifica el rol de Jeremías y la autoridad de su խոսanuncio.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección para el destinatario del habla se expresa naturalmente en español con «a».
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedequías
  lexicon: Transliteración estándar del nombre propio
  rationale: Se adopta la forma usual en español bíblico, correspondiente al nombre propio transliterado en inglés.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La cadena constructa se traduce de modo directo y natural. Se mantiene el título real sin añadir artículo, como en el patrón del texto fuente y la versión inglesa auditada.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos asuntos
  lexicon: HALOT
  rationale: En este contexto דְּבָרִים se refiere al discurso profético pronunciado; «palabras» preserva el carácter verbal del mensaje mejor que «cosas» o «asuntos».
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: La frase locativa se traduce de forma directa y conserva la ubicación final del enunciado para un flujo natural en español.
translation_notes:
  revision_awareness: 'La revisión más reciente del original inglés no introdujo cambios: se mantuvo la lectura y la formulación auditadas. La versión española sigue esa estabilidad textual sin añadir variantes no atestiguadas.'
  spanish_consistency_notes:
  - 'Se mantuvo la terminología estándar del proyecto: Jeremías, Sedequías, Judá y Jerusalén.'
  - No fue necesario introducir nota de pie, porque el hebreo y la auditoría inglesa no presentan variantes textuales ni tensiones léxicas relevantes en este versículo.
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
