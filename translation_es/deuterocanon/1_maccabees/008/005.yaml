translation:
  language: es
  text: Y a Felipe, a Perseo, rey de los citienses[a], y a los que se habían levantado contra ellos, los aplastaron en guerra y prevalecieron sobre ellos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'de los citienses'; en contexto histórico puede aludir al ámbito macedonio, pero aquí se conserva el etnónimo del texto.
    reason: alternative_reading
  - marker: b
    text: La secuencia griega transmitida repite varias veces καὶ ('y'); se trata de una irregularidad textual que no modifica sustancialmente el sentido.
    reason: textual_variant
lexical_decisions:
- source_word: Φίλιππον
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: LSJ
  rationale: Se conserva el nombre propio en su forma española usual, que es más natural y reconocible para el lector que una transliteración más cercana al griego.
- source_word: Περσέα
  english_pob_choice: Perseus
  chosen_spanish: Perseo
  alternatives_spanish:
  - Perséo
  lexicon: LSJ
  rationale: Se usa la forma española estándar del nombre propio, manteniendo la identificación personal sin introducir una transliteración innecesaria.
- source_word: Κιτιέων
  english_pob_choice: of the Kittians
  chosen_spanish: de los citienses
  alternatives_spanish:
  - de Citio
  - de los kitieos
  - de los macedonios
  lexicon: LSJ
  rationale: El griego preserva un etnónimo en plural. En español, 'citienses' conserva esa forma étnica mejor que una interpretación histórica no explícita en el texto; 'de los macedonios' quedaría como lectura interpretativa, no como traducción directa.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: LSJ
  rationale: Título real directo y natural en español, fiel al valor semántico del término.
- source_word: τοὺς ἐπηρμένους ἐπʼ αὐτοὺς
  english_pob_choice: those who rose up against them
  chosen_spanish: los que se habían levantado contra ellos
  alternatives_spanish:
  - los que se alzaron contra ellos
  - los que se habían sublevado contra ellos
  lexicon: LSJ
  rationale: La imagen del participio se expresa de forma idiomática en español con 'levantarse contra', que conserva el matiz de oposición hostil sin forzar un tecnicismo.
- source_word: συνέτριψαν
  english_pob_choice: they crushed
  chosen_spanish: los quebrantaron
  alternatives_spanish:
  - los سحقaron
  - los aplastaron
  - los quebraron
  lexicon: LSJ
  rationale: '''Quebrantar'' comunica con fuerza la derrota violenta propia del contexto bélico y conserva mejor que un simple ''vencieron'' la intensidad del verbo griego.'
- source_word: πολέμῳ
  english_pob_choice: in war
  chosen_spanish: en guerra
  alternatives_spanish:
  - por la guerra
  - en batalla
  lexicon: LSJ
  rationale: La dativa de medio/instrumento se vierte con una expresión natural en español que mantiene el marco militar general del pasaje.
- source_word: κατεκράτησαν αὐτῶν
  english_pob_choice: prevailed over them
  chosen_spanish: prevalecieron sobre ellos
  alternatives_spanish:
  - dominaron sobre ellos
  - se impusieron sobre ellos
  lexicon: LSJ
  rationale: '''Prevalecer sobre'' reproduce el sentido de obtener superioridad o control sin añadir una idea de dominio político más fuerte que la del griego.'
theological_decisions:
- issue: El etnónimo Κιτιέων puede entenderse literalmente o como referencia histórica a un ámbito macedonio.
  english_pob_reading: The Greek text preserves 'of the Kittians,' while noting that the expression may refer historically to the Macedonian realm.
  chosen_spanish_reading: Se traduce literalmente 'de los citienses' y se mantiene en nota la posibilidad histórica macedónica.
  alternative_spanish_readings:
  - de los macedonios
  - de Citio
  rationale: La base textual griega presenta un etnónimo explícito; la traducción no debe sustituirlo por una identificación histórica no formulada en el verso. La nota conserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Principio POB de primacía del original y transparencia textual
- issue: La repetición de καὶ en el texto griego parece una irregularidad textual, pero no cambia el sentido.
  english_pob_reading: The Greek text as transmitted here contains repeated καὶ ('and and and'); this appears to be a textual irregularity, but it does not materially change the sense.
  chosen_spanish_reading: No se marca en el texto español, porque la irregularidad no altera el sentido y la fluidez castellana requeriría omitirla.
  alternative_spanish_readings:
  - Y y y
  rationale: La repetición literal sería antinatural en español y no aportaría valor semántico; se conserva la transparencia al no ocultar la existencia de la variante en el aparato crítico implícito.
  doctrine_reference: Transparencia textual y prioridad del sentido documentado
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto auditado en la POB inglesa: nombres propios transliterados de forma estándar, etnónimo conservado frente a interpretación histórica, y reconocimiento de la repetición irregular de καὶ sin repercusión semántica. No se requieren revisiones respecto del tramo inglés validado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, evitando arcaísmos innecesarios.
  - '''Citienses'' se usa como solución de transparencia etnónica, no como intento de reinterpretar el referente.'
  - '''Prevalecieron sobre ellos'' conserva el matiz de superioridad lograda sin sobrerinterpretar el grado de dominio.'
