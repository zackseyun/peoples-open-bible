translation:
  language: es
  text: Joab hijo de Seruyá comenzó a contar, pero no terminó; y a causa de esto vino ira sobre Israel. Y el número no fue registrado[a] en el registro de los anales[b] del rey David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no fue incluido'. El hebreo dice literalmente 'no subió', un modismo para quedar asentado en un registro oficial.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'los anales' se refiere a los registros reales u oficiales asociados con el rey David.
    reason: cultural_note
lexical_decisions:
- source_word: הֵחֵל לִמְנוֹת
  english_pob_choice: began to count
  chosen_spanish: comenzó a contar
  alternatives_spanish:
  - empezó a contar
  - comenzó a numerar
  lexicon: HALOT
  rationale: En español, 'comenzó a contar' conserva de manera natural el verbo básico del hebreo y mantiene la conexión con el acto de hacer el recuento sin introducir 'censo' donde el hebreo no lo explicita.
- source_word: וְלֹא כִלָּה
  english_pob_choice: but he did not finish
  chosen_spanish: pero no terminó
  alternatives_spanish:
  - pero no lo concluyó
  - y no lo completó
  lexicon: HALOT
  rationale: כִלָּה expresa completar o acabar. 'No terminó' es la forma más directa y idiomática en español, y el sujeto implícito queda claro por el contexto inmediato.
- source_word: וַיְהִי בָזֹאת קֶצֶף עַל יִשְׂרָאֵל
  english_pob_choice: and because of this wrath came upon Israel
  chosen_spanish: y a causa de esto vino ira sobre Israel
  alternatives_spanish:
  - y por esto vino ira sobre Israel
  - y hubo ira contra Israel
  lexicon: HALOT
  rationale: La construcción hebrea permite expresar la relación causal sin nombrar explícitamente al agente de la ira. 'Vino ira sobre Israel' preserva esa ambigüedad teológica y la fuerza del juicio, mientras 'a causa de esto' refleja בָזֹאת de modo sobrio.
- source_word: הַמִּסְפָּר
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - el total
  - el recuento
  lexicon: HALOT
  rationale: El sustantivo remite al resultado del conteo. 'El número' mantiene la referencia directa y permite enlazar con el verbo 'contar' sin forzar una terminología técnica moderna.
- source_word: וְלֹא עָלָה
  english_pob_choice: was not entered
  chosen_spanish: no fue incluido
  alternatives_spanish:
  - no fue registrado
  - no subió
  lexicon: HALOT
  rationale: Aunque literalmente 'no subió' reproduce la idiomática hebrea, en español administrativo-literario 'no fue incluido' comunica mejor la idea de que el dato no pasó al registro oficial, tal como exige el contexto de los anales.
- source_word: בְּמִסְפַּר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the account of the chronicles
  chosen_spanish: en el registro de los anales
  alternatives_spanish:
  - en los anales
  - en el libro de las crónicas
  lexicon: HALOT
  rationale: דִּבְרֵי הַיָּמִים corresponde al género de 'anales/crónicas'. 'Registro de los anales' conserva el matiz archivístico y el vínculo con el acto previo de contar, sin depender de una fórmula eclesiástica fija.
- source_word: לַמֶּלֶךְ דָּוִיד
  english_pob_choice: of King David
  chosen_spanish: del rey David
  alternatives_spanish:
  - de David, el rey
  - para el rey David
  lexicon: HALOT
  rationale: La relación posesiva o de pertenencia se expresa con naturalidad en español con 'del rey David'. Se mantiene el título real de forma clara y no se añade una inferencia sobre destinatario personal.
theological_decisions:
- issue: Agente de la ira en la frase final
  english_pob_reading: 'Leave the agent implicit: ''wrath came upon Israel'''
  chosen_spanish_reading: 'Dejar el agente implícito: ''vino ira sobre Israel'''
  alternative_spanish_readings:
  - vino la ira de Yahvé sobre Israel
  - Dios se enojó con Israel
  rationale: El hebreo no nombra explícitamente al sujeto de קֶצֶף. Aunque el contexto narrativo apunta a juicio divino, la traducción debe preservar esa tensión y no resolverla con un sujeto añadido que el verso no enuncia.
  doctrine_reference: Preservar la tensión textual; no explicitar más allá del hebreo y del POB audit trail.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'So' por 'And' para reflejar con mayor literalidad la conjunción hebrea y mantener el registro formal; la redacción española sigue esa decisión con 'Y' al inicio de la segunda oración.
  spanish_consistency_notes:
  - Se usa 'Y' en lugar de 'Así que' para reflejar el enlace simple del hebreo.
  - Se mantiene 'Yahvé' como forma estándar POB para el nombre divino cuando el texto lo explicite; en este verso no aparece el nombre y por eso no se introduce.
  - '''Ana les'' se traduce como ''anales'', no como ''crónicas'' en el cuerpo principal, para conservar un tono archivístico coherente con ''registro''.'
