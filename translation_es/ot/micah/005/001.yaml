  text: וְ/אַתָּ֞ה בֵּֽית לֶ֣חֶם אֶפְרָ֗תָה צָעִיר֙ לִֽ/הְיוֹת֙ בְּ/אַלְפֵ֣י יְהוּדָ֔ה מִמְּ/ךָ֙ לִ֣/י יֵצֵ֔א לִֽ/הְי֥וֹת מוֹשֵׁ֖ל בְּ/יִשְׂרָאֵ֑ל וּ/מוֹצָאֹתָ֥י/ו מִ/קֶּ֖דֶם מִ/ימֵ֥י עוֹלָֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/005/001.yaml
  text: But you[a], Bethlehem Ephrathah, too small to be among the clans of Judah, from you one will come out for me to be ruler in Israel, whose origins are from of old[b], from the days of eternity.
  footnotes:
  - marker: a
    text: Or, 'too small to be among the clans of Judah'; literally, 'little among the thousands of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'whose origins are from ancient times, from days of old.' The Hebrew can also be understood more strongly as pointing to existence 'from everlasting.'
    reason: alternative_reading
