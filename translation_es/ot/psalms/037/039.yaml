review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: תְּשׁוּעַת como «salvación», צַדִּיקִים como «los justos», מֵיְהוָה con procedencia desde Yahvé, y la cláusula nominal final correctamente explicitada en español. Sin embargo, el anclaje de notas no corresponde bien al contenido: la nota sobre YHWH debe anclarse a «Yahvé», y la nota léxica sobre «refugio/fortaleza» debe anclarse a «fortaleza», no a la primera cláusula. Además, la nota c en inglés ofrece dos alternativas a «stronghold»; en español no debe repetir «fortaleza» como alternativa de «fortaleza».'
  spanish_quality_summary: El español es claro, natural y digno. «La salvación de los justos viene de Yahvé; él es su fortaleza en tiempo de angustia» suena bien en español bíblico actual. Aun así, conviene mejorar la colocación de las notas para evitar confusión y ajustar la nota léxica final para que aporte alternativas reales y no redundantes. «Viene de Yahvé» es aceptable, aunque «es de Yahvé» sería más ceñido; no es necesario cambiarlo para fidelidad básica.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé», θεο-/אֱלֹהִים no aplicable, y el tono general respeta la filosofía de equivalencia óptima. «Los justos» y «salvación» concuerdan con las decisiones auditadas. «Fortaleza» es una opción válida para מָעוּז, aunque la nota debe preservar mejor las alternativas «refugio» y «baluarte/fortín».'
  issues:
  - severity: medium
    issue: Ubicación incorrecta de la nota sobre YHWH
    rationale: La nota b explica el nombre divino hebreo y debe anclarse en «Yahvé», no en «justos», para que el lector identifique correctamente qué término comenta.
  - severity: medium
    issue: Anclaje incorrecto de la nota sobre מָעוּז
    rationale: La nota c trata la alternativa léxica de «fortaleza»/«stronghold», por lo que debe colocarse en «fortaleza», no al final difuso de la oración.
  - severity: low
    issue: Nota léxica redundante en c
    rationale: La nota actual dice «Or “refugio” o “fortaleza”», pero «fortaleza» ya es la lectura principal; la nota debe ofrecer alternativas distintas, como «refugio» o «baluarte».
  - severity: low
    issue: Forma inglesa «Or» en notas españolas
    rationale: Para legibilidad y naturalidad editorial en español, conviene usar «O» en lugar de «Or».
  revised_spanish_text: La salvación[a] de los justos viene de Yahvé[b]; él es su fortaleza[c] en tiempo de angustia.
