translation:
  language: es
  text: Pero si adviertes a un hombre impío, y él no se vuelve de su impiedad ni de su mal camino[a], morirá en su iniquidad; pero tú habrás librado tu vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no se aparta de su impiedad ni de su mal camino'.
    reason: lexical_alternative
  - marker: b
    text: O 'te habrás salvado a ti mismo' o 'habrás librado tu alma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִזְהַרְתָּ
  english_pob_choice: warn
  chosen_spanish: amonestas
  alternatives_spanish:
  - adviertes
  - amonestas con advertencia
  lexicon: HALOT
  rationale: El hifil de זהר aquí expresa la acción de advertir con seriedad. 'Amonestar' es natural en español bíblico y conserva el matiz de advertencia responsable dentro del contexto del centinela.
- source_word: רָשָׁע
  english_pob_choice: wicked man
  chosen_spanish: hombre impío
  alternatives_spanish:
  - persona impía
  - hombre malvado
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado designa a una persona caracterizada por la impiedad o maldad. 'Hombre impío' mantiene el singular masculino del hebreo y su peso moral sin endurecerlo innecesariamente.
- source_word: שָׁב
  english_pob_choice: turn
  chosen_spanish: se vuelve
  alternatives_spanish:
  - se aparta
  - se convierte
  - se arrepiente
  lexicon: HALOT
  rationale: שׁוּב significa básicamente 'volver/turnarse'. 'Se vuelve' conserva la imagen direccional del hebreo; 'se arrepiente' sería más interpretativo y desplazaría el énfasis metafórico.
- source_word: מֵרִשְׁעוֹ
  english_pob_choice: from his wickedness
  chosen_spanish: de su impiedad
  alternatives_spanish:
  - de su maldad
  - de su perversidad
  - de su pecado
  lexicon: HALOT
  rationale: רֶשַׁע puede rendirse como impiedad, maldad o perversidad. 'Impiedad' comunica el carácter moral-religioso del término y armoniza con 'hombre impío'.
- source_word: וּמִדַּרְכּוֹ הָרְשָׁעָה
  english_pob_choice: or from his wicked way
  chosen_spanish: ni de su mal camino
  alternatives_spanish:
  - ni de su camino malo
  - ni de su sendero impío
  - ni de su conducta perversa
  lexicon: HALOT
  rationale: דֶּרֶךְ funciona metafóricamente como conducta o rumbo de vida. 'Camino' preserva la metáfora bíblica, y 'mal' traduce el adjetivo de forma idiomática y clara en español.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - a causa de su iniquidad
  - debido a su culpa
  lexicon: HALOT
  rationale: La preposición ב puede tener fuerza locativa o causal en este contexto de muerte bajo culpa. 'Por su iniquidad' es una solución española transparente que mantiene la responsabilidad moral sin cerrar indebidamente la relación causal.
- source_word: הִצַּלְתָּ אֶת־נַפְשְׁךָ
  english_pob_choice: you will have delivered your life
  chosen_spanish: habrás librado tu vida
  alternatives_spanish:
  - habrás salvado tu vida
  - habrás rescatado tu vida
  - te habrás librado a ti mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida/persona de Ezekiel, no a 'alma' en sentido estrecho. 'Librar' refleja היטיב el campo de rescate/deliverance y evita una lectura demasiado religiosa o técnica de 'soul'.
theological_decisions:
- issue: Si la frase final debe sonar como 'salvación del alma' o como preservación de la responsabilidad personal/vida
  english_pob_reading: Render as 'your life' rather than 'your soul.'
  chosen_spanish_reading: '''tu vida'''
  alternative_spanish_readings:
  - '''tu alma'''
  - '''a ti mismo'''
  rationale: En este pasaje, נֶפֶשׁ señala la vida o la persona puesta a salvo de la responsabilidad por la sangre del impío. 'Tu vida' comunica la idea con claridad moderna y evita importar una categoría doctrinal no exigida por el hebreo.
  doctrine_reference: Preservar el alcance del hebreo sin psicologizar el término.
- issue: Si 'morirá en su iniquidad' debe especificarse como condenación eterna o muerte temporal/judicial
  english_pob_reading: Render the Hebrew in its own terms as death 'in his iniquity' without specifying eternal destiny.
  chosen_spanish_reading: '''morirá por su iniquidad'''
  alternative_spanish_readings:
  - '''morirá en su iniquidad'''
  - '''morirá a causa de su iniquidad'''
  rationale: El hebreo afirma la muerte del impío en relación con su culpa, pero no desarrolla aquí la extensión escatológica de esa muerte. 'Por su iniquidad' deja intacta la seriedad moral y la tensión doctrinal sin resolverla de más.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra una revisión importante: se cambió la conjunción antes de ''wicked way'' de ''and'' a ''or'' para reflejar mejor el hebreo. La versión española sigue ese ajuste con ''ni de su ... ni de su ...'' y mantiene la estructura condicional y de consecuencia del original.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo hebreo entre advertencia, falta de retorno, muerte por culpa y liberación de la responsabilidad del profeta.
  - '''Impío/impiedad'' se usó de forma consistente para רָשָׁע / רִשְׁעוֹ, evitando alternar con ''malvado'' salvo en alternativas de nota.'
  - '''Camino'' conserva la metáfora de conducta del hebreo y mantiene coherencia con el lenguaje bíblico del resto del libro.'
  - '''Vida'' para נֶפֶשׁ evita una traducción demasiado técnica de ''alma'' y encaja con el marco de responsabilidad del centinela.'
