lexical_decisions:
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten valor
  alternatives_spanish:
  - Anímate
  - Ten ánimo
  - Cobrar valor
  lexicon: BDAG
  rationale: El imperativo exhorta a asumir ánimo y firmeza; 'Ten valor' conserva bien la fuerza exhortativa y suena natural en español moderno. 'Anímate' puede sonar más coloquial, y 'Ten ánimo' es posible pero algo menos enérgico.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jersualén
  lexicon: nombre propio / transliteración estándar
  rationale: Se conserva el nombre propio con la forma usual en español, siguiendo la práctica del proyecto para topónimos bíblicos.
- source_word: παρακαλέσει
  english_pob_choice: will comfort
  chosen_spanish: te consolará
  alternatives_spanish:
  - te animará
  - te alentará
  - te confortará
  lexicon: BDAG
  rationale: En este contexto de restauración para Jerusalén, 'consolar' expresa mejor el sentido de alivio y restauración que 'animar' o 'alentar'. 'Confortar' es posible, pero menos natural en español actual.
- source_word: ὁ ὀνομάσας σε
  english_pob_choice: the one who named you
  chosen_spanish: el que te puso nombre
  alternatives_spanish:
  - el que te nombró
  - quien te llamó por nombre
  - tu nombrador
  lexicon: BDAG
  rationale: La construcción participial sustantivada se rinde de forma idiomática como 'el que te puso nombre', preservando la agencia personal sin añadir explícitamente 'Dios' en el texto principal. 'Te nombró' es más literal, pero en español puede sonar menos natural en este contexto.
theological_decisions:
- issue: Identificación implícita del que nombró a Jerusalén
  english_pob_reading: The phrase 'the one who named you' refers contextually to God, though the Greek does not state the divine name or title explicitly here.
  chosen_spanish_reading: Mantener la referencia descriptiva sin nombrar explícitamente a Dios en el texto principal.
  alternative_spanish_readings:
  - el Dios que te puso nombre te consolará
  - el Señor que te puso nombre te consolará
  rationale: El griego presenta una descripción personal ('el que te puso nombre') sin título divino explícito. La traducción conserva esa tensión literaria y permite que el contexto identifique al referente sin sobreespecificarlo en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto inglés auditado está en alta concordancia con el griego de Swete; no hubo revisiones aplicadas en la pasada más reciente. La versión española sigue esa lectura estable y mantiene la tensión semántica de παρακαλέω y de la frase participial sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' como nombre propio estándar.
  - Se evita 'SEÑOR' como sustituto del nombre divino, ya que aquí el griego no lo expresa de forma explícita.
  - '''Consolar'' se usa por su adecuación contextual a una promesa de restauración y alivio.'
  - La nota de la letra b preserva la identificación contextual con Dios sin introducirla en el cuerpo del versículo.
