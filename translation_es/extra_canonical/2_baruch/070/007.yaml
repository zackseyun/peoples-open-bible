review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido fijado por el audit trail: conserva ''revelará'' para glā y mantiene la secuencia ''vendrán ... harán guerra''. También refleja adecuadamente ''que preparó de antemano'' y ''los gobernantes que queden en ese tiempo''. Sin embargo, ''serán deshechos por los suyos'' suena poco natural y algo ambiguo en español; además, las notas a y b explican decisiones válidas pero no son necesarias como notas del texto base, y la nota b sobre ''combatirán'' exagera una diferencia estilística no exigida por la evidencia fuente.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'deshechos' en este contexto resulta torpe. 'Arruinados' comunica mejor la idea de ser deshechos/echados a perder. La cadena 'vendrán y harán guerra' es fiel, pero en español suena más natural 'vendrán a hacer guerra' sin pérdida de la secuencia básica; aun así, la presencia explícita de 'venir' debe mantenerse. Conviene simplificar eliminando notas innecesarias para no sobrecargar el texto.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'el Altísimo', 'revelará', 'Dios' no aparece, y no hay términos sensibles como Yahvé/Mesías/espíritu/esclavo. La decisión apocalíptica de 'revelará' está bien alineada con el rationale documentado.
  issues:
  - severity: medium
    issue: '''serán deshechos por los suyos'' es poco idiomático y ambiguo'
    rationale: Aunque intenta seguir 'will be undone by their own', en español bíblico-legible 'deshechos' no comunica con claridad la ruina o perdición causada por los suyos.
  - severity: low
    issue: Las notas [a] y [b] no son necesarias en la forma española final
    rationale: La evidencia fuente ya queda bien representada en el texto principal; las notas actuales defienden elecciones estilísticas más que alternativas significativas que deban preservarse al lector.
  - severity: low
    issue: '''harán guerra'' es aceptable pero algo rígido'
    rationale: No es incorrecto, pero una formulación como 'vendrán a hacer guerra' mejora la fluidez sin borrar el verbo explícito 'venir' del siriaco.
  revised_spanish_text: y algunos serán arruinados por los suyos. Entonces el Altísimo revelará a los pueblos que preparó de antemano, y vendrán a hacer guerra contra los gobernantes que queden en ese tiempo.
  revision_rationale: 'Se ajusta ''deshechos'' a ''arruinados'' por claridad y naturalidad en español, y se alisa la secuencia final a ''vendrán a hacer guerra'', que sigue preservando los dos elementos exigidos por la fuente y el audit trail: venir + hacer guerra. Se eliminan notas no imprescindibles porque no preservan una alternativa textual necesaria ni resuelven una ambigüedad nueva en español.'
