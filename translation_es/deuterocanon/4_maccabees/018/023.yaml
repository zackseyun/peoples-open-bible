translation:
  language: es
  text: Pero los hijos de Abraham[a], junto con su madre portadora de la victoria[b], son reunidos al lugar de sus padres, habiendo recibido de Dios almas puras e inmortales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Abraham»; παῖδες puede señalar pertenencia familiar o descendencia, pero el contexto de los hermanos mártires favorece «hijos».
    reason: lexical_alternative
  - marker: b
    text: «Portadora de la victoria» conserva la imagen atlética de ἀθλοφόρος; alternativamente, «madre vencedora» o «madre premiada».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀβραμιαῖοι ... παῖδες
  english_pob_choice: the children of Abraham
  chosen_spanish: los hijos de Abraham
  alternatives_spanish:
  - los niños de Abraham
  - los descendientes de Abraham
  lexicon: LSJ
  rationale: Ἀβραμιαῖοι es un adjetivo de pertenencia, y con παῖδες designa aquí a los hermanos mártires como descendencia de Abraham. En español, «hijos» conserva la relación filial y funciona mejor que «niños», que suena inadecuado por el contexto.
- source_word: σὺν τῇ ἀθλοφόρῳ μητρὶ
  english_pob_choice: together with their victory-bearing mother
  chosen_spanish: junto con su madre portadora de la victoria
  alternatives_spanish:
  - junto con su madre vencedora
  - junto con su madre premiada
  lexicon: LSJ
  rationale: ἀθλοφόρος conserva la imaginería atlética de premio o victoria en competición. «Portadora de la victoria» mantiene esa imagen sin reducirla a una simple alabanza general como «vencedora».
- source_word: εἰς πατέρων χῶρον
  english_pob_choice: to the place of their fathers
  chosen_spanish: al lugar de sus padres
  alternatives_spanish:
  - a la región de sus padres
  - al ámbito de sus padres
  lexicon: LSJ
  rationale: χῶρος significa lugar o espacio; aquí apunta al destino de los antepasados. «Lugar de sus padres» es la forma más natural en español y conserva la referencia ancestral sin especificar más de lo que el griego dice.
- source_word: συναγελιᾶζονται
  english_pob_choice: are gathered
  chosen_spanish: son reunidos
  alternatives_spanish:
  - se reúnen
  - son juntados
  lexicon: LSJ
  rationale: El verbo expresa la idea de ser puestos en compañía o reunidos. «Son reunidos» refleja bien esa pasividad y sugiere la comunión con los padres sin añadir interpretación.
- source_word: ψυχὰς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  lexicon: LSJ
  rationale: En este contexto post mortem, ψυχή se refiere mejor a «almas» que a «vidas», porque el texto habla de lo recibido de Dios más allá de la muerte.
- source_word: ἁγνὰς καὶ ἀθανάτους
  english_pob_choice: pure and immortal
  chosen_spanish: puras e inmortales
  alternatives_spanish:
  - santas e inmortales
  - puras e incorruptibles
  lexicon: LSJ
  rationale: ἁγνός significa principalmente puro/limpio/casto; ἀθάνατος, inmortal. «Puras e inmortales» reproduce el par de cualidades con fidelidad y claridad en español.
- source_word: ἀπειληφότες
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - habiendo obtenido
  - habiendo aceptado
  lexicon: LSJ
  rationale: El participio de ἀπολαμβάνω indica recibir u obtener. «Habiendo recibido» es el giro natural en español y mantiene el valor de don procedente de Dios.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de la mano de Dios
  lexicon: LSJ
  rationale: παρά con genitivo marca origen. «De Dios» es suficiente y evita añadir una imagen que el griego no exige.
theological_decisions:
- issue: Destino de los mártires expresado en εἰς πατέρων χῶρον
  english_pob_reading: Rendered without specifying heaven, paradise, or Abraham's bosom.
  chosen_spanish_reading: Traducido como «al lugar de sus padres» sin precisar cielo, paraíso o algún nombre doctrinal posterior.
  alternative_spanish_readings:
  - a la región de sus padres
  - a la compañía de sus padres
  rationale: El griego habla de destino ancestral o de compañía con los padres, pero no nombra un lugar desarrollado del más allá. La traducción conserva esa reserva y no resuelve la tensión interpretativa.
  doctrine_reference: Preservar la tensión textual sin introducir terminología doctrinal posterior.
- issue: Sentido antropológico de ψυχὰς ἁγνὰς καὶ ἀθανάτους
  english_pob_reading: Translated as 'pure and immortal souls.'
  chosen_spanish_reading: Traducido como «almas puras e inmortales».
  alternative_spanish_readings:
  - vidas puras e inmortales
  rationale: En el contexto del martirio y la recompensa de Dios, «almas» preserva mejor el sentido escatológico del texto que reducirlo a mera continuidad biográfica.
  doctrine_reference: Mantener el sentido antropológico y escatológico del pasaje.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «sons of Abraham» a «children of Abraham» para reflejar el valor inclusivo de παῖδες; en español, el contexto de los hermanos permite «hijos» sin perder la referencia filial. También se conservó la cautela del inglés al no especificar un lugar doctrinalmente cerrado para εἰς πατέρων χῶρον.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, siguiendo la convención POB.
  - Se eligió «almas» para ψυχαί en coherencia con el contexto de recompensa post mortem.
  - Se evitó «SEÑOR» porque el texto griego no contiene κύριος ni una cita directa del nombre divino.
  - «Portadora de la victoria» preserva la imagen atlética sin sustituirla por una formulación eclesiástica más tradicional.
