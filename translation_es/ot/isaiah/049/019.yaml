translation:
  language: es
  text: Porque tus ruinas, tus lugares desolados y tu tierra devastada—ciertamente ahora serás demasiado estrecha[a] para los habitantes, y los que te devoran[b] estarán lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serás demasiado angosta por causa de los habitantes». La expresión hebrea es compacta y puede traducirse de forma más formal.
    reason: lexical_alternative
  - marker: b
    text: O «los que te han tragado». El hebreo conserva la imagen vívida de tragar o devorar, en lugar de usar un término más general para destruir.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרְבֹתַיִךְ
  english_pob_choice: your ruins
  chosen_spanish: tus ruinas
  alternatives_spanish:
  - tus lugares arruinados
  - tus lugares desolados
  lexicon: HALOT
  rationale: חָרְבֹתַיִךְ designa lugares arruinados o en ruinas. «Ruinas» es la forma natural y fiel en español, y conserva la imagen concreta del texto.
- source_word: שֹׁמְמֹתַיִךְ
  english_pob_choice: your desolate places
  chosen_spanish: tus lugares desolados
  alternatives_spanish:
  - tus desolaciones
  - tus lugares desiertos
  lexicon: HALOT
  rationale: El participio/plural de שמם expresa desolación. «Lugares desolados» conserva el valor adjetival y el paralelismo con «ruinas».
- source_word: אֶרֶץ הֲרִסֻתֵיךְ
  english_pob_choice: your devastated land
  chosen_spanish: tu tierra devastada
  alternatives_spanish:
  - la tierra de tu destrucción
  - tu tierra arrasada
  lexicon: HALOT
  rationale: La frase califica la tierra por su estado de destrucción. «Tierra devastada» comunica bien el resultado sin sonar forzado en español.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El primer כִּי introduce fundamento o razón. «Porque» es la opción más natural y transparente en español.
- source_word: כִּי עַתָּה
  english_pob_choice: surely now
  chosen_spanish: ciertamente ahora
  alternatives_spanish:
  - sin duda ahora
  - ahora mismo
  lexicon: HALOT
  rationale: El segundo כִּי es enfático, no meramente causal. «Ciertamente ahora» preserva ese matiz de intensificación y de giro profético.
- source_word: תֵּצְרִי
  english_pob_choice: you will be too cramped
  chosen_spanish: serás demasiado estrecha
  alternatives_spanish:
  - serás demasiado angosta
  - estarás demasiado apretada
  lexicon: HALOT
  rationale: El verbo expresa estrechez o constricción espacial. En español, «demasiado estrecha» reproduce la idea con naturalidad y evita una paráfrasis excesiva.
- source_word: מִיּוֹשֵׁב
  english_pob_choice: for inhabitants
  chosen_spanish: para los habitantes
  alternatives_spanish:
  - a causa de los habitantes
  - por los habitantes
  lexicon: HALOT
  rationale: La construcción con מן indica relación con la ocupación/población del lugar. «Para los habitantes» mantiene la brevedad y el sentido espacial del hebreo.
- source_word: וְרָחֲקוּ
  english_pob_choice: will be far away
  chosen_spanish: estarán lejos
  alternatives_spanish:
  - se habrán alejado
  - quedarán lejos
  lexicon: HALOT
  rationale: El perfecto profético comunica resultado futuro. «Estarán lejos» transmite ese sentido en español sin forzar un pasado que suene menos profético.
- source_word: מְבַלְּעָיִךְ
  english_pob_choice: those who swallowed you up
  chosen_spanish: los que te devoraban
  alternatives_spanish:
  - los que te tragaban
  - los que te habían devorado
  lexicon: HALOT
  rationale: El verbo בלע conserva la imagen de devorar/tragar. «Te devoraban» mantiene la fuerza figurada y la referencia a los opresores, con un español fluido.
theological_decisions:
- issue: Referencia temporal del verbo final en un oráculo de restauración
  english_pob_reading: Render the perfect verb as future-oriented ('will be far away')
  chosen_spanish_reading: 'Renderirlo con presente/futuro de resultado: «estarán lejos»'
  alternative_spanish_readings:
  - habrán quedado lejos
  - quedaron lejos
  rationale: En el anuncio profético, el verbo perfecto describe el resultado seguro de la restauración. «Estarán lejos» comunica ese futuro profético de manera natural y mantiene el contraste con la futura abundancia de habitantes.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa POB no necesitó revisión textual en este versículo; la solución española sigue su lectura auditada, pero ajusta la sintaxis a un español natural y conserva las imágenes clave de ruina, desolación, estrechez y devoración.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según corresponda; este versículo no los contiene.
  - Se preserva la metáfora de «devorar» para מְבַלְּעָיִךְ, en continuidad con la decisión auditada del POB inglés.
  - Se evita suavizar la estrechez a una mera idea abstracta; «demasiado estrecha» conserva el valor espacial del hebreo.
  - «Ciertamente ahora» refleja el segundo כִּי enfático, en lugar de convertirlo en simple causalidad.
