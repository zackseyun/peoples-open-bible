translation:
  language: es
  text: Entonces descendieron los amalecitas y los cananeos que habitaban en aquella región montañosa, y los derrotaron y los abatieron hasta Horma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Horma es un nombre de lugar; el nombre hebreo está relacionado con una palabra que significa «destrucción» o «consagración a la destrucción».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - vinieron abajo
  - descendió
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia abajo en un contexto militar desde la zona montañosa. «Descendieron» conserva la dirección del hebreo y funciona bien en español bíblico sin perder naturalidad.
- source_word: הָעֲמָלֵקִי
  english_pob_choice: the Amalekites
  chosen_spanish: los amalecitas
  alternatives_spanish:
  - el amalecita
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular morfológico, aquí funciona como etnónimo colectivo. En español, el plural es la forma natural y sigue el sentido grupal del contexto.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: and the Canaanites
  chosen_spanish: y los cananeos
  alternatives_spanish:
  - y el cananeo
  lexicon: HALOT
  rationale: También aquí el singular hebreo es colectivo. El plural español refleja mejor a un grupo militar y armoniza con la acción plural posterior.
- source_word: הַיֹּשֵׁב בָּהָר הַהוּא
  english_pob_choice: who lived in that hill country
  chosen_spanish: que habitaban en aquel monte
  alternatives_spanish:
  - que vivían en aquella región montañosa
  - que moraban en aquel monte
  lexicon: HALOT
  rationale: יׁשב indica habitar o residir. Se eligió «habitaban» por claridad. Para הָר, «monte» conserva el término más directo, aunque en español también puede sugerir región montañosa; el contexto ya es geográfico y militar.
- source_word: וַיַּכּוּם
  english_pob_choice: struck them
  chosen_spanish: los atacaron
  alternatives_spanish:
  - los golpearon
  - los hirieron
  - los derrotaron
  lexicon: HALOT
  rationale: נכה puede abarcar golpear, herir o derrotar. «Los atacaron» recoge el inicio de la acción bélica sin cerrar demasiado su intensidad, dejando que el segundo verbo la fortalezca.
- source_word: וַיַּכְּתוּם
  english_pob_choice: beat them down
  chosen_spanish: los derribaron
  alternatives_spanish:
  - los abatieron
  - los aplastaron
  - los derrotaron
  lexicon: HALOT
  rationale: כתת tiene fuerza de quebrantar, machacar o abatir. «Los derribaron» transmite el golpe devastador y funciona con el paralelismo de la frase anterior.
- source_word: עַד הַחָרְמָה
  english_pob_choice: as far as Hormah
  chosen_spanish: hasta Horma[a]
  alternatives_spanish:
  - hasta Hormá
  lexicon: HALOT
  rationale: La preposición עַד expresa límite o alcance. Se mantiene el topónimo transliterado como «Horma», y se conserva la nota sobre su posible relación semántica con destrucción/devoción a destrucción.
- source_word: הַחָרְמָה
  english_pob_choice: Hormah
  chosen_spanish: Horma
  alternatives_spanish:
  - Hormá
  lexicon: HALOT
  rationale: Se translitera el nombre propio en vez de traducirlo, porque el texto lo presenta como lugar. La forma breve «Horma» es reconocible y cercana a la tradición española.
theological_decisions:
- issue: Topónimo con trasfondo semántico de destrucción/devoción
  english_pob_reading: Hormah is a place name; the Hebrew name is related to a word for 'destruction' or 'devotion to destruction.'
  chosen_spanish_reading: Horma[a] es un nombre de lugar relacionado con «destrucción» o «consagración a la destrucción».
  alternative_spanish_readings:
  - Horma es solo un topónimo sin nota semántica
  - Destrucción
  rationale: 'No se traduce el nombre en el texto principal para no borrar su función toponímica. La nota conserva la tensión léxica observada en el auditorio inglés: el lugar es un nombre propio, pero su raíz hebrea tiene carga semántica.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión inglesa más reciente, que no introdujo cambios sustantivos. Se preserva la estructura narrativa y la progresión verbal: descenso, ataque y derrota hasta el límite geográfico final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se usaron plurales españoles para etnónimos hebreos singulares con sentido colectivo, siguiendo el valor contextual del hebreo y el audit trail inglés.
  - Se prefirió lenguaje bélico concreto y sobrio, evitando expandir el grado de derrota más allá de lo que expresan los dos verbos hebreos.
