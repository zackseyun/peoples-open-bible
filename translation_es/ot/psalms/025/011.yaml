review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: apelación basada en el nombre de Yahvé, petición de perdón, y razón causal porque la iniquidad es grande. Sin embargo, las notas están desalineadas con el rastro auditado en inglés: la nota anclada en «tu nombre» debería explicar el sentido cultural/teológico de «nombre», mientras que la nota sobre «mi iniquidad» debe preservar las alternativas «culpa» o «pecado».'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial amplio. «Por amor de tu nombre, Yahvé» suena bien y «perdona mi iniquidad» preserva el peso del original. El único ajuste necesario es la organización y contenido de las notas para que correspondan al anclaje textual y al expediente del POB.
  glossary_alignment: 'Cumple con la terminología del proyecto: יהוה → «Yahvé» en el texto principal, y עָוֹן → «iniquidad» con alternativas pertinentes. No hay conflicto con otros términos doctrinales o léxicos del glosario.'
  issues:
  - severity: medium
    issue: Las notas al pie están invertidas respecto del expediente inglés.
    rationale: En el POB inglés, la nota en «your name» explica que «nombre» alude al carácter y honor pactal de Dios, mientras que la nota en «my iniquity» da alternativas léxicas («guilt/sin»). El borrador español pone una nota alternativa en «tu nombre» y la nota semántica de עָוֹן en «mi iniquidad», pero no preserva explícitamente las alternativas auditadas de manera paralela.
  - severity: low
    issue: La razón de la nota b no refleja con precisión la categoría del expediente auditado.
    rationale: La nota sobre «mi iniquidad» funciona mejor como nota de alternativa léxica, no solo como comentario general del hebreo.
  revised_spanish_text: Por amor de tu nombre[a], Yahvé, perdona mi iniquidad[b], porque es grande.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Por amor de tu nombre, Yahvé»; es una apelación al carácter y al honor pactal de Dios, no solo a su nombre pronunciado.'
    reason: cultural_note
