    rationale: El marcador [a] aparece después de «Jericó», pero la nota ofrece como alternativa toda la cláusula sobre Hai/Betel. Esto confunde al lector y no cumple la disciplina de anclar la nota exactamente en la palabra o frase pertinente.
  - severity: low
    issue: La nota al pie no refleja con precisión la alternativa léxica documentada.
    rationale: La nota repite prácticamente el mismo texto principal. La alternativa del audit trail inglés distingue «beside» / «next to»; en español conviene expresar una variante real, por ejemplo «al lado de Betel».
