translation:
  language: es
  text: Tú extendiste tu mano derecha; la tierra[a] los tragó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra firme» o «el suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָטִיתָ
  english_pob_choice: You stretched out
  chosen_spanish: Tú extendiste
  alternatives_spanish:
  - Tú estiraste
  - Tú alargaste
  - Tú extendiste la mano
  lexicon: HALOT
  rationale: El verbo נטה expresa un movimiento concreto de extender o inclinar. En español, «extendiste» comunica bien la acción y conserva la imagen corporal sin volverla abstracta.
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu brazo derecho
  lexicon: HALOT
  rationale: Se conserva la imagen corporal directa del hebreo. «Mano derecha» es clara y natural en español; «diestra» sería más literaria, pero menos transparente para una lectura pública moderna.
- source_word: תִּבְלָעֵמוֹ
  english_pob_choice: swallowed them
  chosen_spanish: los tragó
  alternatives_spanish:
  - los engulló
  - los devoró
  - los consumió
  lexicon: HALOT
  rationale: בלע significa tragar/engullir. «Tragó» mantiene la metáfora vívida y es plenamente idiomático en español; «engulló» es posible, pero más marcado. El objeto plural «los» refleja el sufijo pronominal del hebreo.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el suelo
  - el país
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «the earth», en español «la tierra» puede abarcar tanto «earth» como «land» y suena natural en poesía bíblica. En este contexto mantiene la imagen de la creación que traga a los enemigos.
theological_decisions:
- issue: Imagen antropomórfica de la acción divina
  english_pob_reading: Retain the concrete expression 'your right hand' without reducing it to an abstract statement of power.
  chosen_spanish_reading: Conservar «tu mano derecha» como imagen concreta, sin convertirla en «tu poder».
  alternative_spanish_readings:
  - tu poder
  - tu mano poderosa
  - tu fuerza
  rationale: El hebreo usa una imagen corporal poética. En español, mantener la concreción preserva el vigor literario y evita interpretar la metáfora en el texto principal.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo breve y con el audit trail inglés: se mantiene la imagen de la mano derecha y el verbo vívido de tragar/engullir; no se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «mano derecha» en vez de «diestra» para mayor claridad pública, aunque ambas son posibles.
  - Se eligió «la tierra» por naturalidad poética en español, aun cuando el inglés POB prefirió «the earth»; el sentido sigue siendo compatible con el hebreo.
  - La nota al pie conserva la alternativa lexical de «tierra/suelo» sin multiplicar opciones innecesarias.
