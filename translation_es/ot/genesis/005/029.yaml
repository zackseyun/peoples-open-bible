translation:
  language: es
  text: 'Y llamó su nombre Noé[a], diciendo: «Este nos consolará de nuestro trabajo y del penoso trabajo de nuestras manos, de la tierra que Yahvé maldijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos dará alivio»; el giro también juega con el nombre Noé, que suena como «reposo» o «alivio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: And he called
  chosen_spanish: Y llamó
  alternatives_spanish:
  - Y nombró
  - Y puso por nombre
  lexicon: HALOT
  rationale: El verbo קרא con objeto de nombre se expresa naturalmente en español con «llamó», que conserva la fórmula narrativa del nombramiento sin añadir un matiz interpretativo excesivo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: HALOT
  rationale: «Su nombre» reproduce de forma fluida y fiel la construcción posesiva hebrea, manteniendo la fórmula de nombramiento.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: uso bíblico tradicional
  rationale: El nombre propio se adapta al uso bíblico habitual en español, «Noé», que es claro y reconocible para la audiencia meta.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» refleja la introducción directa del discurso y conserva el encadenamiento narrativo del hebreo.
- source_word: זֶה
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Este hombre
  - Éste
  lexicon: HALOT
  rationale: En español, «Este» comunica la fuerza demostrativa del hebreo sin sonar forzado; el contexto del niño presentado al nombrar permite omitir «uno».
- source_word: יְנַחֲמֵנוּ
  english_pob_choice: will comfort us
  chosen_spanish: nos consolará
  alternatives_spanish:
  - nos dará consuelo
  - nos aliviará
  - nos dará descanso
  lexicon: HALOT
  rationale: «Consolar» sigue de cerca נחם y preserva el enlace semántico con la explicación del nombre; «nos consolará» mantiene el tiempo futuro y la relación verbal documentada por el POB inglés.
- source_word: מִמַּעֲשֵׂנוּ
  english_pob_choice: from our work
  chosen_spanish: de nuestra obra
  alternatives_spanish:
  - de nuestro trabajo
  - de nuestro quehacer
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «work», en español «obra» conserva bien la referencia a la labor humana y permite la repetición natural con el paralelismo de «trabajo» en la línea siguiente.
- source_word: וּמֵעִצְּבוֹן
  english_pob_choice: and from the painful toil
  chosen_spanish: y del doloroso trabajo
  alternatives_spanish:
  - y del penoso trabajo
  - y de la fatiga dolorosa
  - y del dolor
  lexicon: HALOT
  rationale: עִצָּבוֹן señala una labor penosa asociada al juicio; «doloroso trabajo» mantiene el componente de sufrimiento sin oscurecer la idea de labor, que el contexto agrícola exige.
- source_word: יָדֵינוּ
  english_pob_choice: of our hands
  chosen_spanish: de nuestras manos
  alternatives_spanish:
  - por nuestras manos
  - con nuestras manos
  lexicon: HALOT
  rationale: La expresión idiomática se conserva literalmente en español para mantener la imagen de trabajo manual.
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: a causa de la tierra
  alternatives_spanish:
  - de la tierra
  - desde el suelo
  - por la tierra
  lexicon: HALOT
  rationale: Aquí el valor causal es importante por el contexto de la maldición. «A causa de la tierra» expresa bien la relación sin perder la referencia a אֲדָמָה como tierra/suelo agrícola. Aunque el inglés POB mantiene «from the ground», el español puede explicitar la causa de manera natural.
- source_word: אֲשֶׁר אֵרְרָהּ
  english_pob_choice: that ... has cursed
  chosen_spanish: que Yahvé maldijo
  alternatives_spanish:
  - que ha maldecido Yahvé
  - que Yahvé había maldecido
  lexicon: HALOT
  rationale: El participio/forma verbal hebrea se traduce con pasado simple para fluidez narrativa. Se conserva a Yahvé como sujeto explícito, siguiendo la decisión POB de no sustituir el nombre divino por una máscara.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: transliteración del Tetragrámaton
  rationale: Se mantiene la transliteración «Yahvé» como forma base española para el nombre divino, en coherencia con la política del proyecto.
theological_decisions:
- issue: Juego de palabras entre Noé y el verbo ינחמנו
  english_pob_reading: The English POB preserves the lexical sense 'will comfort us' and notes the name-play with Noah sounding like 'rest' or 'relief.'
  chosen_spanish_reading: «nos consolará» conserva el sentido principal de נחם y permite preservar el enlace auditivo y semántico con el nombre Noé en una nota.
  alternative_spanish_readings:
  - nos aliviará
  - nos dará descanso
  - nos traerá alivio
  rationale: El hebreo presenta una explicación popular del nombre a partir de la idea de consuelo/descanso. En español, «consolar» es el equivalente léxico más directo de נחם y es suficientemente natural en un dicho de esperanza familiar; las otras opciones se reservan como matices posibles en nota.
  doctrine_reference: Translation philosophy §3, §5
- issue: Relación entre מִן הָאֲדָמָה y el juicio de Génesis 3
  english_pob_reading: The English POB keeps 'from the ground that Yahweh has cursed,' highlighting the curse on the ground.
  chosen_spanish_reading: «a causa de la tierra que Yahvé maldijo» explicita la relación causal con la maldición sobre la tierra.
  alternative_spanish_readings:
  - de la tierra que Yahvé maldijo
  - desde la tierra que Yahvé maldijo
  - por la tierra que Yahvé maldijo
  rationale: 'En español, la preposición causal comunica mejor el sentido del lamento: el consuelo esperado surge frente a la carga impuesta por la tierra maldita. No se pierde la referencia a la tierra, pero se hace más transparente la lógica del versículo.'
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El texto inglés base pasó por una revisión que prefirió «will comfort us» sobre «will bring us relief» para reflejar más directamente el verbo y el juego de palabras con el nombre. La versión española sigue esa revisión al usar «nos consolará», manteniendo la tensión entre el valor léxico de נחם y la alusión al nombre Noé, y conserva la referencia explícita a Yahvé conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se usa «Noé» como forma bíblica estándar en español.
  - Se mantiene «consolar» para נחם, con la alternativa «alivio/reposo» preservada en nota.
  - Se conserva la imagen de las manos como símbolo del trabajo humano.
  - «Tierra» se emplea para אֲדָמָה; la nota explica la matización causal del contexto.
