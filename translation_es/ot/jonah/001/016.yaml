translation:
  language: es
  text: Entonces los hombres temieron a Yahvé con gran temor[a], y ofrecieron un sacrificio a Yahvé e hicieron votos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tuvieron gran miedo de Yahvé», o «reverenciaron mucho a Yahvé». El hebreo dice literalmente: «los hombres temieron un gran temor de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽירְא֧וּ
  english_pob_choice: feared
  chosen_spanish: temieron
  alternatives_spanish:
  - tuvieron miedo
  - reverenciaron
  lexicon: HALOT
  rationale: El verbo ירא en qal expresa temor, y el contexto permite una mezcla de miedo y reverencia. «Temieron» conserva esa tensión sin reducirla solo a pánico ni solo a reverencia.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los marineros
  - la gente
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hombres». Aunque el contexto identifica a los marineros, se mantiene el sustantivo ordinario para no sustituir la forma del texto por una glosa contextual.
- source_word: יִרְאָה גְדוֹלָה
  english_pob_choice: with great fear
  chosen_spanish: con gran temor
  alternatives_spanish:
  - con gran temor reverente
  - en gran reverencia
  lexicon: HALOT
  rationale: 'La construcción hebrea intensifica el verbo con un cognado: literalmente «temieron un gran temor». «Con gran temor» preserva el énfasis sin volverlo una paráfrasis más libre.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», siguiendo la norma del proyecto para יְהוָה y evitando la sustitución titulística.
- source_word: וַיִּזְבְּחוּ זֶבַח
  english_pob_choice: offered a sacrifice
  chosen_spanish: ofrecieron un sacrificio
  alternatives_spanish:
  - sacrificaron un sacrificio
  - hicieron un sacrificio
  lexicon: HALOT
  rationale: La combinación verbal-nominal es idiomática para una ofrenda sacrificial. «Ofrecieron un sacrificio» comunica el sentido cultual con español natural.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: La preposición ל señala destinatario o dirección de la ofrenda; «a Yahvé» es la correspondencia directa y natural en español.
- source_word: וַיִּדְּרוּ נְדָרִים
  english_pob_choice: made vows
  chosen_spanish: hicieron votos
  alternatives_spanish:
  - prometieron votos
  - formularon votos solemnes
  lexicon: HALOT
  rationale: El giro es idiomático en hebreo. «Hicieron votos» conserva la formalidad del compromiso sin caer en una repetición extraña como «votaron votos».
theological_decisions:
- issue: Tensión entre temor y reverencia hacia Yahvé
  english_pob_reading: feared Yahweh with great fear
  chosen_spanish_reading: temieron a Yahvé con gran temor
  alternative_spanish_readings:
  - reverenciaron a Yahvé grandemente
  - tuvieron mucho miedo de Yahvé
  rationale: El hebreo no obliga a escoger solo entre pánico y piedad; expresa una respuesta compleja de asombro, temor y reconocimiento. La traducción mantiene esa tensión teológica en vez de resolverla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios según la directriz del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje ya mostraba alto grado de acuerdo y no requería cambios sustantivos; se ha conservado la estructura del hebreo y la tensión entre temor y reverencia, con la única adaptación terminológica necesaria para español: Yahvé para el Tetragrámaton.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Temieron» y «gran temor» preservan el paralelismo léxico del hebreo.
  - «Ofrecieron un sacrificio» e «hicieron votos» conservan el tono cultual e idiomático del versículo.
  - El orden de los miembros sigue de cerca el hebreo sin sonar forzado en español.
