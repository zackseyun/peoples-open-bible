translation:
  language: es
  text: 'David dijo: «¿Todavía queda alguien de la casa de Saúl, para mostrarle bondad[a] por amor de Jonatán?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘amor leal’ o ‘fidelidad de pacto’; el hebreo suele denotar una bondad fiel y de pacto, no mera simpatía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo
  - preguntó
  lexicon: HALOT
  rationale: אָמַר es el verbo narrativo normal para ‘decir’. Aunque la cláusula siguiente es interrogativa, en español natural la introducción de la cita se expresa mejor con ‘dijo’ que con ‘preguntó’, que desplazaría el foco narrativo.
- source_word: הֲכִי יֶשׁ עוֹד
  english_pob_choice: Is there still anyone left
  chosen_spanish: ¿Todavía queda alguien?
  alternatives_spanish:
  - ¿Aún queda alguien?
  - ¿Existe todavía alguien?
  lexicon: HALOT
  rationale: La combinación interrogativa busca confirmar existencia remanente. ‘Todavía queda alguien’ transmite de forma idiomática la idea de ‘¿hay todavía…?’ sin añadir o restar contenido.
- source_word: אֲשֶׁר נוֹתַר
  english_pob_choice: left
  chosen_spanish: queda
  alternatives_spanish:
  - ha quedado
  - permanece
  lexicon: HALOT
  rationale: נוֹתַר describe a quien ha quedado como sobreviviente o remanente. ‘Queda’ es breve y natural en español; mantiene la noción de remanente sin forzar un calco.
- source_word: לְבֵית שָׁאוּל
  english_pob_choice: of the house of Saul
  chosen_spanish: de la casa de Saúl
  alternatives_spanish:
  - de la familia de Saúl
  - del linaje de Saúl
  lexicon: HALOT
  rationale: בַּיִת aquí tiene sentido dinástico/familiar. ‘Casa de Saúl’ conserva la referencia al linaje o casa real mejor que una traducción espacial.
- source_word: וְאֶעֱשֶׂה עִמּוֹ חֶסֶד
  english_pob_choice: that I may show kindness to him
  chosen_spanish: para que yo le muestre bondad
  alternatives_spanish:
  - para hacerle bondad
  - para tratarlo con bondad
  lexicon: HALOT
  rationale: עָשָׂה חֶסֶד es un modismo de hacer/mostrar bondad. ‘Le muestre bondad’ reproduce el valor verbal del hebreo de forma natural; ‘bondad’ conserva el sentido básico sin introducir una paráfrasis más amplia.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amor leal
  - lealtad misericordiosa
  - misericordia leal
  lexicon: HALOT
  rationale: En este contexto real y de pacto, חֶסֶד incluye una bondad comprometida y fiel. ‘Bondad’ funciona como término principal claro en español; el matiz de fidelidad pactal se preserva en la nota, evitando borrar la tensión semántica.
- source_word: בַּעֲבוּר יְהוֹנָתָן
  english_pob_choice: for Jonathan’s sake
  chosen_spanish: por amor de Jonatán
  alternatives_spanish:
  - por causa de Jonatán
  - a favor de Jonatán
  lexicon: HALOT
  rationale: בַּעֲבוּר expresa motivo o causa. ‘Por amor de Jonatán’ es una formulación idiomática en español bíblico y comunica bien la referencia personal del motivo, sin convertirla en una explicación abstracta.
theological_decisions:
- issue: Matiz de חֶסֶד en la acción de David hacia la casa de Saúl
  english_pob_reading: Render חֶסֶד as 'kindness' in the main text, with footnote for covenantal nuance
  chosen_spanish_reading: ‘bondad’ en el texto principal, con nota sobre ‘amor leal’/‘fidelidad de pacto’
  alternative_spanish_readings:
  - amor leal
  - fidelidad de pacto
  - misericordia leal
  rationale: El pasaje trata de una acción benevolente de David motivada por su vínculo con Jonatán. ‘Bondad’ es claro y natural en español; la nota preserva el trasfondo de fidelidad pactal que el hebreo puede implicar sin imponerlo de forma excesiva al texto principal.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el criterio óptimo-equivalente del POB inglés. Se conserva la pregunta de existencia remanente, el sentido dinástico de ‘casa’, el modismo verbal de hacer/mostrar bondad y la nota semántica de חֶסֶד. No hay revisiones previas aplicadas en el registro inglés, y el acuerdo de revisión es alto.
  spanish_consistency_notes:
  - Se mantiene ‘Saúl’ y ‘Jonatán’ con ortografía española estándar.
  - Se usa ‘casa’ para בית en sentido dinástico.
  - ‘bondad’ en el texto principal evita borrar la tensión semántica de חֶסֶד, preservada en la nota.
  - La puntuación reproduce una cita directa fluida y publicable en español latinoamericano.
