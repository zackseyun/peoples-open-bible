translation:
  language: es
  text: Con sus piniones[a] te cubrirá, y debajo de sus alas hallarás refugio; su fidelidad[b] es escudo y baluarte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: Con sus plumas te cubrirá.'
    reason: lexical_alternative
  - marker: b
    text: 'O: Su verdad es escudo y adarga.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאֶבְרָתוֹ
  english_pob_choice: with his pinions
  chosen_spanish: con sus plumas
  alternatives_spanish:
  - con sus piniones
  - con su plumaje
  lexicon: HALOT
  rationale: אֶבְרָה designa la pluma del ala o el ala emplumada; en español, "plumas" comunica de forma natural la imagen aviar. "Piniones" sería más técnico pero menos idiomático para la lectura pública; "plumaje" amplía demasiado la referencia.
- source_word: יָסֶךְ
  english_pob_choice: he will cover
  chosen_spanish: te cubrirá
  alternatives_spanish:
  - te protegerá
  - te resguardará
  lexicon: HALOT
  rationale: El hiphil de סכך expresa cubrir con intención protectora. "Cubrirá" conserva la imagen física del verso y mantiene el paralelismo con las alas.
- source_word: לָךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Aunque la forma hebrea es femenina singular, el destinatario funciona de manera genérica en el salmo. En español, el clítico "te" es la forma más fluida y natural en poesía.
- source_word: כְּנָפָיו
  english_pob_choice: his wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas de ave
  - sus alas
  lexicon: HALOT
  rationale: En el contexto de la metáfora aviar, כָּנָף puede rendirse como "ala". "Alas" suena más natural en español que "alas" con artículo implícito; además, la imagen se empareja bien con "plumas".
- source_word: תֶּחְסֶה
  english_pob_choice: you will find refuge
  chosen_spanish: hallarás refugio
  alternatives_spanish:
  - te acogerás
  - te refugiarás
  lexicon: HALOT
  rationale: חסה significa buscar o tomar refugio. "Hallarás refugio" preserva el resultado de seguridad que destaca el inglés POB y es idiomático en español bíblico contemporáneo.
- source_word: צִנָּה
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  - gran escudo
  lexicon: HALOT
  rationale: צִנָּה es un escudo, a menudo de gran tamaño. "Escudo" basta en el texto principal; el matiz de tamaño no requiere explicitación aquí.
- source_word: וְסֹחֵרָה
  english_pob_choice: and a bulwark
  chosen_spanish: y adarga
  alternatives_spanish:
  - y broquel
  - y baluarte
  lexicon: HALOT
  rationale: El término es difícil y tradicionalmente se vierte como defensa portátil o arma defensiva. En español, "adarga" mantiene el campo semántico de protección militar y ofrece una correspondencia histórica cercana al "buckler" inglés; "baluarte" desplazaría la imagen hacia arquitectura defensiva.
- source_word: אֲמִתּוֹ
  english_pob_choice: his faithfulness
  chosen_spanish: su fidelidad
  alternatives_spanish:
  - su verdad
  - su veracidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, fidelidad o confiabilidad. En este contexto, "fidelidad" expresa mejor el carácter protector y constante de Dios sin perder la tensión lexical con "verdad".
theological_decisions:
- issue: Cómo rendir אֲמִתּוֹ sin borrar la tensión entre 'truth' y 'faithfulness'
  english_pob_reading: his faithfulness
  chosen_spanish_reading: su fidelidad
  alternative_spanish_readings:
  - su verdad
  - su veracidad
  rationale: En el contexto de protección divina, la idea principal no es una abstracción doctrinal sobre la verdad, sino la confiabilidad activa de Yahvé. "Fidelidad" expresa esa constancia pactal y preserva el sentido protector del verso. Se mantiene la alternativa de "verdad" como posibilidad legítima de lectura.
  doctrine_reference: Translation philosophy §3; §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado final del audit trail inglés, que permanece sin revisiones aplicadas y con alto acuerdo entre revisores. Se han conservado las dos tensiones léxicas principales del verso: אֶבְרָה/כָּנָף en la metáfora aviar y אֱמֶת en la expresión de la cualidad divina, sin neutralizarlas mediante paráfrasis.'
  spanish_consistency_notes:
  - Se usa "Yahvé" en otros pasajes del proyecto cuando corresponde; este verso no lo menciona explícitamente, por lo que no se introduce aquí.
  - '"Refugio" conserva el valor de חסה como protección resultante; no se sustituye por una paráfrasis más interpretativa.'
  - '"Adarga" se elige por su valor de escudo pequeño/portátil, coherente con la nota inglesa sobre buckler, y no por un equivalente eclesiástico tradicional.'
