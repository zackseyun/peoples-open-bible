translation:
  language: es
  text: Clama y lamenta, hijo de hombre, porque ha venido sobre mi pueblo; está sobre todos los príncipes de Israel. Son entregados[a] a la espada junto con mi pueblo; por tanto, golpea tu muslo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Terrores a causa de la espada han venido sobre mi pueblo». El hebreo de esta cláusula es difícil, y se debate el sentido exacto de מְגוּרֵי.'
    reason: alternative_reading
lexical_decisions:
- source_word: זְעַק
  english_pob_choice: Cry out
  chosen_spanish: Clama
  alternatives_spanish:
  - Grita
  - Clama con fuerza
  lexicon: HALOT
  rationale: El imperativo expresa un clamor de angustia; «clama» comunica bien esa intensidad en español sin sonar tan coloquial como «grita».
- source_word: וְהֵילֵל
  english_pob_choice: and wail
  chosen_spanish: y lamenta
  alternatives_spanish:
  - y gime
  - y aúlla
  lexicon: HALOT
  rationale: El verbo apunta al llanto/lamentación profética. «Lamenta» mantiene el registro digno y la fuerza fúnebre mejor que una forma mecánica o demasiado áspera.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: En Ezequiel es un vocativo fijo. Se conserva la forma tradicional y el paralelismo con el hebreo, sin neutralizarlo.
- source_word: כִּי הִיא הָיְתָה בְעַמִּי
  english_pob_choice: for it has come upon my people
  chosen_spanish: porque ha venido sobre mi pueblo
  alternatives_spanish:
  - porque está sobre mi pueblo
  - porque ha caído sobre mi pueblo
  lexicon: HALOT
  rationale: El hebreo sugiere la llegada de un desastre/juicio con pronombre femenino implícito. «Ha venido sobre» preserva esa llegada sin especificar más de lo que el contexto obliga.
- source_word: הִיא בְּכָל נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: it is upon all the princes of Israel
  chosen_spanish: está sobre todos los príncipes de Israel
  alternatives_spanish:
  - está contra todos los príncipes de Israel
  - está sobre todos los gobernantes de Israel
  lexicon: HALOT
  rationale: Se conserva el mismo sujeto implícito e impersonal («está»). «Príncipes» reproduce el valor de נְשִׂיאִים en este contexto de autoridades de alto rango.
- source_word: מְגוּרֵי אֶל חֶרֶב הָיוּ
  english_pob_choice: given over to the sword
  chosen_spanish: son entregados a la espada
  alternatives_spanish:
  - son dados a la espada
  - quedan expuestos a la espada
  - son entregados al terror de la espada
  lexicon: HALOT
  rationale: La frase es difícil y el POB inglés opta por una lectura de sometimiento al desastre bélico. En español, «son entregados a la espada» mantiene la fuerza pasiva/resultado y evita una paráfrasis excesiva.
- source_word: אֶת עַמִּי
  english_pob_choice: along with my people
  chosen_spanish: junto con mi pueblo
  alternatives_spanish:
  - con mi pueblo
  - al lado de mi pueblo
  lexicon: HALOT
  rationale: אֶת se entiende asociativamente; «junto con» expresa mejor la relación entre el destino de los príncipes y el del pueblo.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - por eso
  lexicon: HALOT
  rationale: Marca consecuencia formal y encaja bien con el tono profético del versículo.
- source_word: סְפֹק אֶל יָרֵךְ
  english_pob_choice: strike your thigh
  chosen_spanish: golpea tu muslo
  alternatives_spanish:
  - da un golpe en tu muslo
  - batea tu muslo
  lexicon: HALOT
  rationale: El gesto es un signo corporal de dolor y consternación. «Golpea tu muslo» conserva el acto físico y resulta natural en español.
theological_decisions:
- issue: Pronombre femenino implícito repetido (הִיא) aplicado al juicio/espada
  english_pob_reading: The pronoun refers to the impending judgment/sword already prominent in context, rendered as impersonal 'it.'
  chosen_spanish_reading: Se mantiene de modo impersonal con «ha venido» y «está», sin explicitar un antecedente único en el texto principal.
  alternative_spanish_readings:
  - Se refiere específicamente a la espada
  - Se refiere de manera general a la calamidad
  rationale: El hebreo deja una tensión real sobre el antecedente del pronombre femenino. El español puede conservarla evitando una identificación cerrada en el texto principal; la nota recoge la dificultad sin resolverla de forma artificial.
  doctrine_reference: Translation philosophy §3 (preservar tensiones interpretativas reales)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «given over to the sword» frente a «handed over to the sword» por ser más directa y formal. En español se refleja con «son entregados a la espada», manteniendo el registro y la decisión interpretativa. También se conserva la ambigüedad del hebreo en la primera cláusula mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto; aquí no ocurre.
  - Se conserva «príncipes» para נְשִׂיאֵי, coherente con el uso profético de Ezequiel.
  - «Espada» traduce חֶרֶב con el artículo determinado singular según el valor colectivo/contextual.
  - El gesto final se traduce literalmente para mantener su carácter de signo profético y no convertirlo en una paráfrasis emocional.
