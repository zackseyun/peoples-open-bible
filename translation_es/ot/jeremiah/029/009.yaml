revisions:
- from: Porque profetizan falsamente a ustedes en mi nombre; no los he enviado, declara Yahvé.
  to: Porque les profetizan falsamente en mi nombre; no los envié, declara Yahvé.
  rationale: Se ajusta el dativo a la forma más natural en español («les») y se reemplaza «no los he enviado» por «no los envié» para reflejar con mayor fidelidad y naturalidad la negación divina de autorización en el hebreo. No hacen falta notas adicionales.
  reviewer_model: gpt-5.4
