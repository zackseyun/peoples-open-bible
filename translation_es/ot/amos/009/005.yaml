revisions:
- from: Y Yahvé Dios de los ejércitos[a] es el que toca la tierra, y se derrite; y hacen duelo todos los que habitan en ella; y toda ella sube como el Nilo, y se hunde como el Nilo de Egipto.
  to: Y el Señor Yahvé de los ejércitos[a] es el que toca la tierra, y se derrite; y hacen duelo todos los que habitan en ella; y toda ella sube como el Nilo, y se hunde como el Nilo de Egipto.
  rationale: Se corrige el título divino para reflejar fielmente el hebreo אֲדֹנָי יְהוִה según la política del proyecto de usar «Yahvé» para YHWH, pero sin perder el valor de אֲדֹנָי. El resto del versículo puede mantenerse, pues transmite adecuadamente el sentido fuente y es suficientemente natural en español.
