translation:
  language: es
  text: No se acercará a ningún cadáver[a]; no se hará impuro ni siquiera en el caso de su padre o de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerpo muerto». El hebreo dice literalmente «persona/alma de un muerto», un modismo legal para un cadáver.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל / לֹא יָבֹא
  english_pob_choice: shall not go near
  chosen_spanish: no se acercará
  alternatives_spanish:
  - no irá
  - no se acercará a
  lexicon: HALOT
  rationale: En este contexto de pureza sacerdotal, el hebreo expresa prohibición de acercamiento al cadáver. En español, «acercarse» comunica de forma natural la idea de entrar en contacto o proximidad ritual sin perder la fuerza legal de la prohibición.
- source_word: כָּל נַפְשֹׁת מֵת
  english_pob_choice: any dead body
  chosen_spanish: ningún cadáver
  alternatives_spanish:
  - ningún muerto
  - ningún cuerpo muerto
  - ningún muerto o cadáver
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «todas las personas/almas de un muerto», un giro idiomático para un cuerpo sin vida. «Cadáver» evita una traducción demasiado literal y mantiene la referencia a la impureza por contacto con un muerto.
- source_word: לְאָבִיו וּלְאִמּוֹ
  english_pob_choice: for his father or for his mother
  chosen_spanish: ni siquiera por su padre o por su madre
  alternatives_spanish:
  - por su padre o por su madre
  - a causa de su padre o de su madre
  lexicon: HALOT
  rationale: El ל de relación expresa aquí el caso o motivo en el cual ni siquiera se permite la excepción. En español, «ni siquiera por» refleja bien la fuerza enfática del contexto y la inclusión de los padres como el caso más cercano que aun así queda prohibido.
- source_word: לֹא יִטַּמָּא
  english_pob_choice: he shall not make himself unclean
  chosen_spanish: no se contaminará
  alternatives_spanish:
  - no se volverá impuro
  - no se hará impuro
  - no se volverá inmundo
  lexicon: HALOT
  rationale: El hitpael de טמא es reflexivo y pertenece al campo ritual de impureza. «Contaminarse» funciona en español bíblico moderno para este ámbito y conserva la categoría ritual sin moralizarla excesivamente; «impuro» sería posible, pero menos idiomático en esta construcción.
theological_decisions:
- issue: Lenguaje de impureza ritual frente a impureza moral
  english_pob_reading: Retain 'unclean' language rather than moralized paraphrase.
  chosen_spanish_reading: Mantener «contaminarse» como lenguaje de impureza ritual, no como acusación moral.
  alternative_spanish_readings:
  - quedar impuro
  - hacerse inmundo
  - defile themselves
  rationale: El pasaje trata de la pureza sacerdotal respecto de un cadáver, no de una culpa moral. «Contaminarse» y «cadáver» preservan la categoría bíblica de impureza ritual en un español claro y publicable.
  doctrine_reference: Levítico 21:11; principio POB de distinguir pureza ritual de pecado moral
translation_notes:
  revision_awareness: 'Se sigue de cerca el audit trail inglés: se conserva el valor idiomático de נַפְשֹׁת מֵת como referencia a un cadáver, la prohibición legal de acercarse, y el lenguaje ritual de impureza sin moralizarlo.'
  spanish_consistency_notes:
  - Se emplea «cadáver» para el referente muerto en lenguaje legal-purifical, coherente con la decisión inglesa «dead body».
  - Se usa «contaminarse» para טמא en un sentido ritual; no se introduce «ceremonial» en el texto principal porque el contexto ya lo delimita.
  - «Ni siquiera» comunica la fuerza enfática de la enumeración de padre y madre en la prohibición.
