translation:
  language: es
  text: Y el espíritu de Egipto será vaciado en su interior, y yo devoraré su consejo; y buscarán a los ídolos, a los murmuradores[a], a los médiums y a los espiritistas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los masculladores» o «los encantadores» para este raro término hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבְקָה
  english_pob_choice: will be emptied out
  chosen_spanish: será vaciado
  alternatives_spanish:
  - será vaciado por completo
  - será agotado
  - será drenado
  lexicon: HALOT
  rationale: La forma verbal expresa vaciamiento o drenaje interior. «Será vaciado» conserva la imagen de despojo interno sin volverla demasiado interpretativa.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  - coraje
  lexicon: HALOT
  rationale: En este contexto de colapso interno y pérdida de consejo, «espíritu» mantiene el alcance metafórico del hebreo y funciona naturalmente en español.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: within it
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en medio de él
  - en su interior
  lexicon: HALOT
  rationale: El sufijo remite a Egipto como entidad colectiva. «Dentro de él» es natural en español y refleja la desintegración interna sin forzar una glosa.
- source_word: עֲצָתוֹ
  english_pob_choice: its counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - sus planes
  - su estrategia
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, plan o deliberación. «Consejo» conserva el sentido de determinación política y deliberativa.
- source_word: אֲבַלֵּעַ
  english_pob_choice: I will swallow up
  chosen_spanish: destruiré
  alternatives_spanish:
  - devoraré
  - consumiré
  - tragaré
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tragaré/devoraré». En español, «destruiré» comunica con claridad el efecto sobre el consejo, aunque se pierde la metáfora concreta; se elige por fluidez y legibilidad pública.
- source_word: וְדָרְשׁוּ אֶל
  english_pob_choice: they will seek
  chosen_spanish: buscarán a
  alternatives_spanish:
  - consultarán a
  - preguntarán a
  - inquirirán de
  lexicon: HALOT
  rationale: En contextos de adivinación, דרשׁ con אֶל implica buscar o consultar. «Buscarán a» mantiene el movimiento hacia esas figuras/objetos y permite listar los referentes con naturalidad.
- source_word: הָאֱלִילִים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los falsos dioses
  - los ídolos vanos
  lexicon: HALOT
  rationale: אֱלִילִים es un término peyorativo estándar para ídolos. «Ídolos» es directo y fiel sin añadir una intensificación no requerida.
- source_word: הָאִטִּים
  english_pob_choice: the mutterers
  chosen_spanish: los murmuradores
  alternatives_spanish:
  - los masculladores
  - los encantadores
  - los adivinos
  lexicon: HALOT
  rationale: La palabra rara permite una referencia a quienes pronuncian fórmulas en voz baja. Dado el auditoría inglesa, «murmuradores» refleja mejor la consonancia con «mutterers» que opciones más interpretativas.
- source_word: הָאֹבוֹת
  english_pob_choice: the mediums
  chosen_spanish: los médiums
  alternatives_spanish:
  - los medianeros
  - los espiritistas
  - los nigromantes
  lexicon: HALOT
  rationale: אוֹבוֹת puede designar al medio consultado o, por metonimia, al médium que lo maneja. «Médiums» es una forma clara y ampliamente entendible en español actual.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: the spiritists
  chosen_spanish: los espiritistas
  alternatives_spanish:
  - los adivinos
  - los videntes
  - los nigromantes
  lexicon: HALOT
  rationale: יִדְּעֹנִים apunta a practicantes de conocimiento oculto o espiritista. «Espiritistas» reproduce bien el valor moderno del término y encaja en la serie de consultas ilícitas.
theological_decisions:
- issue: Conservar el peso profético de la consulta a prácticas ocultas sin suavizarlo con términos religiosos genéricos
  english_pob_reading: Use direct modern terms ('idols,' 'mutterers,' 'mediums,' 'spiritists') that reflect illicit spiritual consultation
  chosen_spanish_reading: Usar términos directos y modernos ('ídolos', 'murmuradores', 'médiums', 'espiritistas') que reflejen consulta espiritual ilícita
  alternative_spanish_readings:
  - usar 'encantadores', 'nigromantes' o 'espíritus familiares'
  - usar vocabulario más tradicional y arcaizante
  rationale: El versículo enumera recursos espirituales prohibidos en un tiempo de crisis. La opción elegida preserva la fuerza profética y la comprensibilidad pública sin introducir doctrinas ajenas al texto.
  doctrine_reference: Translation philosophy §§5–6
- issue: Decidir si la metáfora de 'swallow up' debe mantenerse literalmente o verterse por su efecto
  english_pob_reading: I will swallow up its counsel
  chosen_spanish_reading: destruiré su consejo
  alternative_spanish_readings:
  - devoraré su consejo
  - consumiré su consejo
  - lo tragaré
  rationale: Aunque la imagen literal es fuerte, en español «destruiré» comunica con claridad el resultado de la acción divina sobre el consejo egipcio. Se admite la pérdida parcial de la metáfora por claridad y naturalidad.
  doctrine_reference: Translation philosophy §§2–4
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «the ghosts» por «the mutterers» para acercarse mejor a הָאִטִּים. La versión española sigue esa decisión y opta por «los murmuradores», manteniendo el resto del verso estable y alineado con el audit trail más reciente.
  spanish_consistency_notes:
  - Se mantiene «espíritu» para רוּחַ, conforme al valor interno/metafórico del texto.
  - Se usa «médiums» y «espiritistas» como equivalentes modernos y legibles de los términos de consulta oculta.
  - «Yahvé» no aparece en este versículo; no se aplica la convención del nombre divino.
  - La nota a pie de página conserva la incertidumbre léxica de הָאִטִּים sin introducir una interpretación más fuerte que la auditada.
