    reason: lexical_alternative
  - marker: c
    text: O «peca contra sí mismo» o «contra su alma»; נֶפֶשׁ puede significar «vida», «ser» o «alma» según el contexto.
    reason: lexical_alternative
  revision_rationale: La revisión alinea mejor el español con la decisión léxica principal del POB para נַהַם, mejora la naturalidad de la cláusula verbal sobre provocar la ira del rey, y limpia las notas para que estén plenamente en español y con alternativas bien ordenadas. El resultado sigue siendo fiel al hebreo, más legible, y mejor ajustado a la auditoría inglesa.
