  glossary_alignment: 'No hay conflicto con los términos doctrinales principales del proyecto. La principal cuestión léxica es הַנֶּתֶק: el borrador se aparta de la línea auditada al usar «tiña» como término principal, cuando el POB inglés prefirió una descripción no diagnóstica. La nota puede conservar la alternativa española «tiña», pero no como texto principal.'
