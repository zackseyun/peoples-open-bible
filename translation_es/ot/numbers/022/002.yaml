translation:
  language: es
  text: Entonces Balac, hijo de Zipor, vio todo lo que Israel había hecho[a] a los amorreos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «al amorreo», usando un singular étnico colectivo; en español se traduce de forma natural como «a los amorreos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: Now ... saw
  chosen_spanish: Entonces ... vio
  alternatives_spanish:
  - Y ... vio
  - Ahora ... vio
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; en español, 'Entonces' conserva ese movimiento discursivo de nuevo episodio sin sonar tan abrupto como 'Y'. 'Vio' mantiene el sentido básico del verbo ראה.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: Convención transliterativa española
  rationale: En español bíblico, la adaptación 'Balac' es la forma tradicional y legible; mantiene la identificación del nombre propio sin afectar el sentido.
- source_word: בֶּן צִפּוֹר
  english_pob_choice: son of Zippor
  chosen_spanish: hijo de Zipor
  alternatives_spanish:
  - el hijo de Zipor
  lexicon: Construcción genealógica
  rationale: La cadena constructa se expresa naturalmente en español con 'hijo de'. Se conserva el nombre propio de manera coherente con la transliteración española.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: '''Todo lo que'' reproduce bien la totalidad del objeto directo y es idiomático en español sin perder el valor inclusivo del hebreo.'
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español refleja la relación narrativa: Balac ve una acción ya realizada antes del momento de la observación.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Transliteración estándar
  rationale: Se mantiene la forma habitual del nombre del pueblo.
- source_word: לָאֱמֹרִי
  english_pob_choice: to the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - contra los amorreos
  - al amorreo
  lexicon: HALOT
  rationale: El hebreo usa un singular étnico colectivo; en español, el plural 'amorreos' comunica de forma natural el grupo étnico. La preposición 'a' mantiene una relación amplia y menos interpretativa que 'contra'.
translation_notes:
  revision_awareness: Se siguió el testimonio fuente hebreo (WLC) y el rastro auditado en inglés, manteniendo la decisión colectiva para לָאֱמֹרִי y el valor narrativo de וַיַּרְא. No hubo cambios aplicados en la revisión más reciente del texto inglés.
  spanish_consistency_notes:
  - Se mantiene una sintaxis directa y pública, adecuada para lectura bíblica.
  - Se usa 'Balac' y 'amorreos' para favorecer la recepción natural en español, sin perder el anclaje en el hebreo.
  - El pluscuamperfecto 'había hecho' respeta la relación temporal ya documentada en el audit trail inglés.
