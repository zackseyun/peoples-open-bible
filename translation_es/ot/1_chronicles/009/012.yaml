translation:
  language: es
  text: y Adaías, hijo de Jeroham, hijo de Pashhur, hijo de Malquías, y Maasai, hijo de Adiel, hijo de Jahzerá, hijo de Mesulam, hijo de Mesilemit[a], hijo de Immer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מְשִׁלֵּמִית se refleja aquí como «Mesilemit»; una forma de nombre relacionada aparece en otros lugares como «Mesilemot».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲדָיָה
  english_pob_choice: and Adaiah
  chosen_spanish: y Adaías
  alternatives_spanish:
  - Adaías
  lexicon: HALOT
  rationale: La ו inicial se expresa naturalmente como «y» para continuar la genealogía. El nombre propio se translitera al español como Adaías, manteniendo la forma bíblica reconocible sin traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una secuencia genealógica española, «hijo de» es el equivalente más natural y fiel a בן. «Descendiente de» sería posible, pero atenúa la repetición genealógica explícita del hebreo.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroham
  alternatives_spanish:
  - Jeroham
  lexicon: HALOT
  rationale: Se translitera el nombre propio con ortografía española habitual; la j inicial refleja la pronunciación bíblica tradicional en español, conservando el mismo referente nominal del texto fuente.
- source_word: פַּשְׁחוּר
  english_pob_choice: Pashhur
  chosen_spanish: Pashhur
  alternatives_spanish:
  - Pasjur
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma transliterada; «Pashhur» sigue de cerca la convención bíblica estándar y evita una adaptación innecesaria.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malchijah
  chosen_spanish: Malquías
  alternatives_spanish:
  - Malkías
  lexicon: HALOT
  rationale: El hebreo admite varias transliteraciones. «Malquías» es la forma española bíblica más transparente y legible; mantiene el elemento nominal sin forzar una grafía inglesa.
- source_word: וּ/מַעְשַׂי
  english_pob_choice: and Maasai
  chosen_spanish: y Maasai
  alternatives_spanish:
  - y Maasái
  - y Maasaí
  lexicon: HALOT
  rationale: La conjunción se rinde como «y». El nombre se translitera como Maasai, siguiendo la forma consonántica del texto y distinguiéndolo de nombres afines.
- source_word: עֲדִיאֵל
  english_pob_choice: Adiel
  chosen_spanish: Adiel
  alternatives_spanish:
  - Adiel
  lexicon: HALOT
  rationale: Nombre propio transliterado sin cambio, porque el español ya lo recibe de manera estable en esa forma.
- source_word: יַחְזֵרָה
  english_pob_choice: Jahzerah
  chosen_spanish: Jahzerá
  alternatives_spanish:
  - Jajzerá
  - Jahzerah
  lexicon: HALOT
  rationale: Se conserva el nombre propio con acento gráfico español para guiar la lectura. La forma elegida refleja la transliteración tradicional más natural en español y evita una ortografía híbrida.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  lexicon: HALOT
  rationale: La forma española se simplifica conforme a la adaptación fonética habitual de este nombre bíblico, manteniendo el referente del hebreo sin reproducir una grafía inglesa innecesaria.
- source_word: מְשִׁלֵּמִית
  english_pob_choice: Meshillemith
  chosen_spanish: Mesilemit
  alternatives_spanish:
  - Mesilemít
  - Meshilemit
  lexicon: HALOT
  rationale: La forma del hebreo masorético se translitera de modo cercano al español. Se evita imponer la variante inglesa «Meshillemoth», porque el texto hebreo presente usa específicamente מְשִׁלֵּמִית.
- source_word: אִמֵּר
  english_pob_choice: Immer
  chosen_spanish: Immer
  alternatives_spanish:
  - Immer
  lexicon: HALOT
  rationale: Nombre propio conservado en la forma bíblica ampliamente reconocible en español.
translation_notes:
  revision_awareness: El texto fuente, el desglose morfológico y el audit trail en inglés están en alto acuerdo; no se observan revisiones aplicadas. La decisión principal fue adaptar los nombres propios a formas españolas legibles sin perder correspondencia con la base hebrea, y conservar la nota de variante para מְשִׁלֵּמִית dada la tensión nominal documentada en la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo la cadena genealógica con «hijo de» para reproducir la sintaxis acumulativa del hebreo.
  - Se optó por transliteraciones españolas estables en lugar de copiar sistemáticamente las formas inglesas.
  - La nota [a] se vincula solo con el nombre del segundo linaje final para conservar la variante documental sin sobrecargar el resto del versículo.
