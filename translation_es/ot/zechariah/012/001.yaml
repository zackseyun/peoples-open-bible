revisions:
- from: 'Una carga[a], la palabra de Yahvé acerca de Israel: la declaración de Yahvé, que extiende los cielos, echa los cimientos de la tierra, y forma el espíritu del hombre[b] dentro de él.'
  to: 'Un oráculo[a], la palabra de Yahvé acerca de Israel: la declaración de Yahvé, que extiende los cielos, pone el fundamento de la tierra y forma el espíritu del hombre[b] dentro de él.'
  rationale: Se cambia «Una carga» por «Un oráculo» para ajustarse al sentido de מַשָּׂא en encabezamientos proféticos y a la decisión léxica ya documentada por el POB. También se suaviza la sintaxis española quitando la coma antes de «y» y se usa «pone el fundamento de la tierra», que mantiene con claridad la imagen de יסד en un registro natural y elevado. Se conservan Yahvé, «acerca de Israel», «la declaración», y la nota sobre la alternativa «contra».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea y conserva correctamente Yahvé, «la palabra», «la declaración», «acerca de Israel», y la cadena creadora de participios. También mantiene la nota alternativa sobre עַל = «contra». Sin embargo, la elección principal «Una carga» para מַשָּׂא no sigue la decisión documentada del POB inglés («oracle») ni su justificación léxica; en español «carga» suena demasiado concreta y puede inducir una lectura errónea. Además, «echa los cimientos» es comprensible, pero «pone el fundamento» o «funda» encaja mejor con el tono elevado y la sintaxis del versículo.
  spanish_quality_summary: El español es mayormente claro y digno, pero «Una carga» resulta poco natural como encabezamiento profético en español bíblico moderno. También conviene evitar la coma antes de «y» en una enumeración simple. «Dentro de él» es aceptable, aunque «en su interior» sería más idiomático; no es un error grave.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «espíritu» y la preservación de «el hombre» para אָדָם. La principal desalineación es מַשָּׂא, donde el proyecto documentó «oracle»/«oráculo» como la opción idiomática y solemne, no «carga».
  issues:
  - severity: high
    issue: מַשָּׂא fue traducido como «carga» en lugar de «oráculo».
    rationale: La evidencia léxica y la auditoría inglesa prefieren «oracle» en superscripciones proféticas. En español, «carga» no funciona bien como encabezamiento y desplaza el sentido hacia un objeto pesado o una obligación, en vez de un pronunciamiento profético solemne.
  - severity: low
    issue: Puntuación ligeramente calcada del inglés con coma antes de «y».
    rationale: En español estándar no hace falta la coma en «..., pone el fundamento de la tierra y forma...». Corregirla mejora fluidez sin afectar significado.
  revised_spanish_text: 'Un oráculo[a], la palabra de Yahvé acerca de Israel: la declaración de Yahvé, que extiende los cielos, pone el fundamento de la tierra y forma el espíritu del hombre[b] dentro de él.'
  revised_footnotes:
