translation:
  language: es
  text: sus carnes puestas delante de ellos[a] como máscaras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «colocadas delante de ellos» para el matiz de προκειμένας.
    reason: lexical_alternative
