translation:
  language: es
  text: Seis días trabajarás[a] y harás todo tu trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Seis días podrás trabajar y hacer todo tu trabajo». El imperfecto hebreo puede entenderse aquí con valor instructivo o permisivo en este contexto legal.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: Six days
  chosen_spanish: Seis días
  alternatives_spanish:
  - Por seis días
  lexicon: HALOT
  rationale: 'La secuencia numeral + sustantivo funciona naturalmente en español como duración: «Seis días». Añadir una preposición como «Por» introduciría una relación no expresada de forma explícita en el hebreo.'
- source_word: תַּעֲבֹד
  english_pob_choice: you shall labor
  chosen_spanish: trabajarás
  alternatives_spanish:
  - labrarás
  - te afanarás
  lexicon: HALOT
  rationale: En este contexto legal y sabático, עבד se refiere al trabajo ordinario. «Trabajarás» es claro y natural en español; conserva la fuerza instructiva del imperfecto sin volver la frase demasiado arcaica. «Labrarás» o «te afanarás» son posibles, pero menos directos o menos transparentes para el lector actual.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and do
  chosen_spanish: y harás
  alternatives_spanish:
  - y hacerás
  - y realizarás
  - y cumplirás
  lexicon: HALOT
  rationale: עָשָׂה es amplio; aquí expresa ejecutar las tareas propias. «Harás» mantiene la coordinación con el verbo anterior y reproduce de manera idiomática la amplitud del verbo hebreo. «Realizarás» o «cumplirás» pueden sonar más interpretativos.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: כָּל expresa totalidad. En español, «todo tu trabajo» es la forma más natural y conserva el alcance completo del objeto.
- source_word: מְלַאכְתֶּךָ
  english_pob_choice: your work
  chosen_spanish: tu trabajo
  alternatives_spanish:
  - tu obra
  - tu labor
  - tu ocupación
  lexicon: HALOT
  rationale: מְלָאכָה suele significar trabajo, ocupación o tarea, especialmente en el lenguaje del sábado. «Tu trabajo» es el equivalente más idiomático y consistente en español; «obra» puede sonar demasiado solemne o abstracta en este contexto.
theological_decisions:
- issue: Fuerza legal del imperfecto en la instrucción sabática
  english_pob_reading: 'Render the verbs with instructional force: ''you shall labor and do all your work'''
  chosen_spanish_reading: 'Traducir con fuerza instructiva: «trabajarás y harás todo tu trabajo»'
  alternative_spanish_readings:
  - «puedes trabajar y hacer todo tu trabajo»
  - «trabaja seis días y haz todo tu trabajo»
  rationale: El hebreo imperfecto aquí participa del lenguaje jurídico del mandamiento. El futuro simple español transmite bien el valor de instrucción/mandato sin debilitarlo a mera अनुमति. «Puedes» volvería la frase permisiva, y un imperativo directo alteraría levemente el registro del texto legal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; mantener el sentido jurídico y la legibilidad contemporánea'
- issue: Mantenimiento de la distinción entre עבד y עשה
  english_pob_reading: '''labor'' vs. ''do'' preserves the distinction between the two verbs'
  chosen_spanish_reading: «trabajarás» y «harás» mantienen la distinción entre «trabajo ordinario» y «hacer las tareas»
  alternative_spanish_readings:
  - Usar dos veces «trabajarás»
  - Usar dos veces «harás»
  rationale: El hebreo usa dos verbos distintos, y la POB inglesa intenta reflejar esa diferencia. En español, conservar «trabajarás» / «harás» ayuda a no borrar la matización entre el esfuerzo laboral y la ejecución de las tareas concretas.
  doctrine_reference: Énfasis léxico del texto hebreo en contexto sabático
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión del expediente inglés, marcada como sin cambios, y el acuerdo alto del control cruzado; por eso no se introdujeron cambios de fondo respecto del sentido auditado.
  spanish_consistency_notes:
  - Se usa «trabajar» para עבד y «hacer» para עשה, manteniendo la distinción léxica que el expediente inglés quiso preservar.
  - Se optó por «tu trabajo» para מְלַאכְתֶּךָ por ser la opción más natural en español, sin perder el sentido de tarea/ocupación.
  - La nota [a] se ancla en «trabajarás» para reflejar la alternativa permisiva del imperfecto hebreo.
