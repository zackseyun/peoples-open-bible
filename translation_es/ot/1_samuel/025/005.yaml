  rationale: Se ajustó el estilo al español neutro latinoamericano («Suban», «vayan»), se mejoró la fluidez narrativa («Entonces»), y se reformuló la cláusula final para expresar de manera natural el valor de saludo de לְשָׁלוֹם sin perder el término clave «paz». La nota conserva la alternativa de preguntar por el bienestar, tal como en la auditoría inglesa.
