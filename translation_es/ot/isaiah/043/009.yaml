    rationale: En el texto, [a] aparece en «se reúnan[a]», pero la nota habla de «naciones». Además, la nota inglesa [a] se refiere a וְרִאשֹׁנוֹת («former things» / «first things»), no a כָּל הַגּוֹיִם.
