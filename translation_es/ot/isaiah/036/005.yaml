  - severity: medium
    issue: «para que te hayas rebelado» sugiere finalidad más que acusación retórica
    rationale: 'El hebreo כִּי aquí se refleja mejor en español como «que» dentro de la pregunta retórica: «¿en quién has confiado, que te has rebelado contra mí?».'
  - severity: low
    issue: La secuencia «Yo digo» puede mantenerse, pero conviene evitar una construcción demasiado pesada tras ella
    rationale: Dado que el audit trail inglés terminó con «I say» y conserva la alternativa en nota, mantener «Yo digo[a]» es defendible; la frase siguiente debe sonar más natural en español.
  revised_spanish_text: 'Yo digo[a]: «Solo palabras de los labios: consejo y fuerza para la guerra». Ahora, ¿en quién has confiado, que te has rebelado contra mí?'
