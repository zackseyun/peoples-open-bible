technical_vocabulary_note: This section uses a stable cluster of Valentinian technical
  terms in a parable of epistemic awakening. “Ignorance” (ⲙⲛⲧⲁⲧⲥⲁⲩⲛⲉ) is not mere
  lack of information but the ontic condition of estrangement from the Father; it
  is paired with “sleep” (ⲡϭⲁⲗ) and “dreams” (ⲛⲉⲉⲓ) to depict non-being. “Knowledge”
  is the salvific knowledge of the Father (Greek gnōsis), which we translate as “knowledge”
  but treat as a technical soteriological term. The pairing “shadow and phantasm”
  (ⲣⲡⲧⲉ/ⲱⲡⲧ) marks the unreality of what ignorance begets. “The Spirit” (ⲡⲓⲡⲛⲁ) acts
  personally to pursue, raise, and instruct—functionally the Holy Spirit in this composition,
  though the adjective “holy” is not explicit in our OCR line. We render “revelation”
  of the Son to preserve the apocalyptic/apophatic register of disclosure.
textual_note: 'Translated directly from Codex I, pp. 29–30 OCR as supplied. Line order
  and clause boundaries follow the sense-units evident in the nightmare catalogue
  and the wakefulness contrast. Several lexemes in the vice/condition list (terror,
  disturbance, instability, division, doubt) are well-attested; the item rendered
  “doubt” (ⲡⲱϣⲉ) could also be taken as “questioning/speculation,” but the epistemic
  cluster and parallel translations favor “doubt.” The perception cluster at the end
  (see/hear/taste/grasp) reflects distinct Coptic verbs; some editions include an
  additional sensory verb (“smell/touch”), but our OCR supports at least ‘taste’ (ⲧⲛⲉ)
  and ‘grasp’ (ϫⲓⲧ). The expression “open the eyes of the blind” is partly idiomatic:
  the adjective “blind” is not explicit but implied by the idiom of opening eyes.
  Punctuation is editorial for readability.'
