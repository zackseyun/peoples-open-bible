lexical_decisions:
- source_word: ἐγενήθη
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - llegó a haber
  - se produjo
  - aconteció
  lexicon: BDAG
  rationale: El giro impersonal griego se vierte de manera natural con «hubo», que conserva el valor existencial sin añadir énfasis narrativo no presente en el texto.
- source_word: εὐφροσύνη μεγάλη
  english_pob_choice: very great rejoicing
  chosen_spanish: muy gran regocijo
  alternatives_spanish:
  - gran alegría
  - muy grande alegría
  - gran regocijo
  lexicon: LSJ
  rationale: «Regocijo» expresa mejor la alegría comunitaria y festiva que «alegría» en español, y «muy gran» reproduce con sobriedad la intensificación de μεγάλη + σφόδρα.
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en el pueblo
  - entre la gente
  lexicon: BDAG
  rationale: «Entre el pueblo» conserva el sentido colectivo e interno de la alegría dentro de la comunidad, de forma idiomática en español.
- source_word: σφόδρα
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en extremo
  - grandemente
  lexicon: BDAG
  rationale: Se mantiene la intensificación con un adverbio simple y natural en español, sin sobrecargar el registro.
- source_word: ἀπεστράφη
  english_pob_choice: was turned away
  chosen_spanish: fue apartado
  alternatives_spanish:
  - fue removido
  - se apartó
  - fue desviado
  lexicon: BDAG
  rationale: La pasiva conserva la idea de una vergüenza que queda alejada o quitada, sin introducir un agente no expresado. «Apartado» comunica bien la reversión del oprobio.
- source_word: ὀνειδὸς
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - afrenta
  - reproche
  - vergüenza
  lexicon: BDAG
  rationale: «Oprobio» es un equivalente bíblico claro para un deshonor público e infamante; en español preserva mejor el peso social de ὀνειδός que «reproche».
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: BDAG
  rationale: Se conserva «naciones» como traducción literal y menos cargada teológicamente que «gentiles», manteniendo el contraste histórico del contexto macabeo.
theological_decisions:
- issue: Alcance de 'el pueblo' y 'las naciones'
  english_pob_reading: '''the people'' refers to Israel/Judea, and ''the nations'' refers to surrounding non-Israelite peoples'
  chosen_spanish_reading: «el pueblo» se entiende como Israel/Judea, y «las naciones» como los pueblos no israelitas circundantes
  alternative_spanish_readings:
  - lectura genérica sin matiz covenantal
  - «el pueblo»/«las naciones» como simple contraste sociopolítico
  rationale: El contexto histórico de 1 Macabeos trata de la restauración del culto y de la humillación impuesta por pueblos extranjeros. La traducción mantiene el contraste bíblico sin explicitarlo dentro del texto principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en el último pase; no se reportan revisiones aplicadas. La propuesta española sigue la misma lectura y conserva la alternativa léxica del pie de nota para ὀνειδός / ἐθνῶν.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y moderno.
  - Se evita «SEÑOR» u այլ masking porque el versículo no contiene el nombre divino.
  - «Naciones» se conserva como término base por fidelidad al griego y coherencia con el audit trail inglés.
