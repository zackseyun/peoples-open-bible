review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: los padres descendieron a Egipto con setenta personas, y ahora Yahvé ha multiplicado a Israel. Conserva correctamente «Yahvé», «tus padres», el modismo de conteo con «personas» y el contraste temporal «y ahora».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la comparación final suena poco natural e incompleta en español: «tan numeroso como las estrellas» con sujeto singular implícito («te») resulta áspero. Es más idiomático y fiel al sentido colectivo traducir «te ha multiplicado hasta ser tan numeroso como las estrellas del cielo». También conviene ajustar la nota c para corresponder mejor al hebreo y evitar «firmamento», que no es la alternativa documentada en el audit trail inglés.'
  glossary_alignment: 'La terminología del proyecto está bien observada: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios», אֲבֹתֶיךָ → «tus padres». No hay conflictos doctrinales. El único ajuste recomendado es estilístico-semántico en la cláusula de multiplicación final.'
  issues:
  - severity: medium
    issue: La frase «te ha hecho tan numeroso como las estrellas de los cielos» suena poco natural en español.
    rationale: Aunque comprensible, con objeto singular «te» la predicación «tan numeroso como las estrellas» resulta rígida. El hebreo expresa resultado de multiplicación; en español bíblico natural se entiende mejor con «te ha multiplicado hasta ser tan numeroso...».
  - severity: low
    issue: La nota c usa «firmamento», que no coincide con las alternativas auditadas en inglés.
    rationale: El audit trail preserva alternativas como «las estrellas del cielo» o «las estrellas de los cielos / sky», no «firmamento». Conviene mantener la documentación léxica alineada.
  - severity: low
    issue: «de los cielos» es defendible, pero «del cielo» suena más natural en español en esta imagen fija.
    rationale: Aunque שָׁמַיִם es formalmente plural, en español la expresión establecida es «estrellas del cielo». Puede preservarse la alternativa plural en nota.
  revised_spanish_text: Tus padres descendieron a Egipto con setenta personas[a][b], y ahora Yahvé tu Dios te ha multiplicado hasta ser tan numeroso como las estrellas del cielo[c].
  revised_footnotes:
  - marker: a
    text: O «con setenta almas». נֶפֶשׁ («alma/persona») aquí funciona como un modismo de conteo para personas.
    reason: lexical_alternative
  - marker: b
    text: O «tus antepasados». El hebreo dice específicamente «tus padres».
    reason: lexical_alternative
  - marker: c
    text: O «como las estrellas de los cielos» o «como las estrellas del cielo». El sentido es la abundancia numérica.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para un español más natural y fiel al sentido resultativo de שָׂמְךָ ... לָרֹב, evitando una construcción rígida con «te ha hecho tan numeroso». También se alinea la nota c con las alternativas documentadas en el audit trail inglés.
