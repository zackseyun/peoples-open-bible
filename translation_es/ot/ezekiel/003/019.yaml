review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: advertencia al impío, falta de cambio, muerte en relación con su culpa, y liberación de la vida del profeta. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con la auditoría POB inglesa: (1) הִזְהַרְתָּ está mejor como ''adviertes'' que ''amonestas'', porque el inglés auditado fijó ''warn'' y el contexto es de dar advertencia más que de reprensión; (2) בַּעֲוֺנוֹ se documentó como ''in his iniquity'', y el español principal debe preservar mejor esa formulación con ''en su iniquidad'' en vez de ''por su iniquidad''. Además, la nota b está anclada a la frase equivocada: las alternativas inglesas para b corresponden a ''habrás librado tu vida'', no a ''morirá...''.'
  spanish_quality_summary: El español es claro y digno, pero 'amonestas' introduce un matiz más exhortativo/reprensivo que el de simple advertencia. 'Mal camino' es legible, aunque 'camino perverso' o 'camino impío' serían más literales; no es necesario cambiarlo. La puntuación con punto y coma funciona bien. La corrección principal es mejorar precisión léxica y reparar la asignación de notas al lugar correspondiente.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave deben alinearse mejor con el rastro POB: ''warn'' -> ''adviertes''; שׁוּב -> ''se vuelve''; רֶשַׁע -> ''impiedad''; דֶּרֶךְ metafórico -> ''camino''; בַּעֲוֺנוֹ -> ''en su iniquidad''; נֶפֶשׁ -> ''vida'', no ''alma'' en el texto principal.'
  issues:
  - severity: medium
    issue: '''Amonestas'' para הִזְהַרְתָּ'
    rationale: Es comprensible, pero desplaza el foco de advertencia a reprensión. El audit trail fijó 'warn' como decisión principal; 'adviertes' preserva mejor el acto de avisar con seriedad en el contexto del centinela.
  - severity: high
    issue: '''Por su iniquidad'' en el texto principal para בַּעֲוֺנוֹ'
    rationale: La decisión auditada inglesa preserva 'in his iniquity' para no sobredeterminar causalidad. 'Por su iniquidad' es posible, pero pierde la cautela teológica y lexical documentada. Debe ir como alternativa en nota, no como texto principal.
  - severity: high
    issue: La nota [b] está anclada a 'morirá por su iniquidad' en vez de a la cláusula final
    rationale: En la auditoría inglesa, la nota b corresponde a הִצַּלְתָּ אֶת־נַפְשְׁךָ ('you have saved yourself' / 'you have delivered your soul'). El borrador español reutiliza b para otra frase y omite la alternativa documentada para 'tu vida'.
  revised_spanish_text: Pero si adviertes a un hombre impío, y él no se vuelve de su impiedad ni de su mal camino[a], morirá en su iniquidad; pero tú habrás librado tu vida[b].
  revised_footnotes:
