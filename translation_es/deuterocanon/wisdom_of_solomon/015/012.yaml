translation:
  language: es
  text: Pero consideró que nuestra vida era un juego[a], y nuestro sustento una feria lucrativa; pues, dice, es necesario ganar de donde uno pueda[b], incluso del mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra vida un juguete ... y nuestro sustento una celebración lucrativa».
    reason: lexical_alternative
  - marker: b
    text: O «es necesario sacar provecho de donde uno pueda, incluso mediante el mal».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλογίσατο
  english_pob_choice: considered
  chosen_spanish: consideró
  alternatives_spanish:
  - pensó
  - estimó
  - juzgó
  lexicon: BDAG
  rationale: El aoristo medio de λογίζομαι expresa una evaluación deliberada. «Consideró» comunica bien el juicio reflexivo sin forzar matices innecesarios.
- source_word: παίγνιον
  english_pob_choice: a game
  chosen_spanish: un juego
  alternatives_spanish:
  - un juguete
  - una burla
  - un pasatiempo
  lexicon: LSJ
  rationale: El sustantivo denota algo propio del juego o la diversión. «Un juego» conserva la imagen moral de trivializar la vida sin volver el texto coloquial.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - existencia
  - vida humana
  lexicon: BDAG
  rationale: «Vida» es la traducción natural y mantiene la correspondencia con βίον, donde el griego repite con variación.
- source_word: βίον
  english_pob_choice: livelihood
  chosen_spanish: sustento
  alternatives_spanish:
  - medio de vida
  - modo de vida
  - vida
  lexicon: BDAG
  rationale: Como ζωή ya aparece, βίος no debe aplanarse como «vida». En este contexto económico-moral, «sustento» comunica la idea de ganancia o medios de vida de forma clara en español.
- source_word: πανηγυρισμὸν
  english_pob_choice: fair
  chosen_spanish: feria
  alternatives_spanish:
  - fiesta
  - celebración
  - festival
  lexicon: LSJ
  rationale: El término alude a una celebración pública festiva; en el contexto comercial del pasaje, «feria» reproduce mejor la mezcla de fiesta y provecho que el inglés POB señaló con «fair».
- source_word: ἐπικερδῆ
  english_pob_choice: profitable
  chosen_spanish: lucrativa
  alternatives_spanish:
  - provechosa
  - rentable
  - gananciosa
  lexicon: LSJ
  rationale: El adjetivo añade una nota mercenaria. «Lucrativa» mantiene el filo económico y suena digno en español moderno.
- source_word: δεῖν
  english_pob_choice: one must
  chosen_spanish: es necesario
  alternatives_spanish:
  - uno debe
  - hay que
  - conviene
  lexicon: BDAG
  rationale: La necesidad impersonal del griego se rinde bien con «es necesario», que suena natural en la cita de discurso directo.
- source_word: ὅθεν δὴ κἂν
  english_pob_choice: from wherever one can
  chosen_spanish: de donde uno pueda
  alternatives_spanish:
  - de cualquier parte
  - de donde sea posible
  - de donde se pueda
  lexicon: LSJ
  rationale: La frase expresa amplitud e indiferencia por la procedencia. «De donde uno pueda» conserva la fuerza práctica y la idea de cualquier fuente disponible.
- source_word: ἐκ κακοῦ
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - de la maldad
  - de wrongdoing
  lexicon: BDAG
  rationale: 'El contexto apoya una lectura moral: obtener ganancia incluso a partir del mal. «Del mal» mantiene la tensión ética sin explicitar más de lo que el griego exige.'
- source_word: πορίζειν
  english_pob_choice: gain
  chosen_spanish: obtener ganancia
  alternatives_spanish:
  - ganar
  - adquirir
  - procurar
  lexicon: BDAG
  rationale: El verbo tiene sentido de obtener o procurar con matiz material. «Obtener ganancia» preserva el movimiento adquisitivo y el tono económico del pasaje.
theological_decisions:
- issue: Sentido moral de ἐκ κακοῦ
  english_pob_reading: The speaker endorses obtaining gain by evil means.
  chosen_spanish_reading: El pasaje presenta la idea de sacar provecho incluso del mal.
  alternative_spanish_readings:
  - Podría entenderse más débilmente como sacar provecho de circunstancias malas o adversas.
  - También podría leerse como una referencia general a obtener beneficio de cualquier fuente posible.
  rationale: 'El contexto de crítica moral y económica favorece una lectura ética fuerte. No se diluye la tensión: la frase conserva la acusación de que el lucro se busca aun a costa del mal.'
  doctrine_reference: Preservar la tensión moral del texto sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Sabiduría 15:12 y toma como contexto auditado la traducción POB en inglés. Se reflejó la revisión que privilegia una imagen comercial en βίον y πανηγυρισμόν; en español se optó por «sustento» y «feria lucrativa» para conservar el contraste entre vida cotidiana y provecho mercenario, sin perder la fuerza crítica del pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se mantuvo un registro bíblico contemporáneo y digno, evitando arcaísmos innecesarios.
  - Se preservó la distinción entre ζωή y βίος con dos soluciones distintas en español.
  - Se evitó suavizar el matiz moral de ἐκ κακοῦ; la nota recoge la alternativa de lectura más débil.
  - Las notas a y b reproducen las alternativas relevantes del audit trail inglés en forma idiomática para el español.
