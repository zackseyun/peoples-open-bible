base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/028.yaml
  text: And the report came to Joab[a], for Joab had turned after Adonijah, though he had not turned after Absalom[b]. So Joab fled to the tent of Yahweh and took hold of the horns of the altar.
  footnotes:
