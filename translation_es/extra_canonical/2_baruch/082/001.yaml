translation:
  language: es
  text: 'Porque ahora vemos la abundancia de la prosperidad de las naciones mientras actúan impíamente, pero se las compara con una gota. Miramos la fuerza de su poder, pero serán tenidos por un escupitajo. Consideramos la gloria de su grandeza, aunque no guardan los mandamientos del Poderoso, sino que los han tratado con desprecio. Y consideramos la belleza que se ve, aunque es sacudida en las aflicciones; pero serán buscados como carne en dolor. Pensamos en la confianza en que se apoyan, aunque ante nuestros ojos es sacudida; pero serán aplastados como una ola. Y buscamos solo la esperanza de su fuerza, aunque florece en los bienes que Dios les dio; pero será apartada, y vendrá sobre ella el lamento.


    Porque el Altísimo en verdad está apresurando sus tiempos y acercando sus horas. Juzgará a los que oprimen, y resonarán los pregones de la era. Lo oculto de todos sus pecados será revelado, y brotarán los pensamientos serenos de lo recto. Los que ahora piensan que podrán escapar no podrán salvarse a sí mismos, ni nadie hará un pacto con el hambre por abundancia de alimentos. El humilde no pondrá su esperanza en la prosperidad; más bien, su corazón se alegrará en las cosas que permanecen. Antes bien, esperarán aún más porque ha llegado ese fin temible. No pondrán la vista en las delicias de la era presente, y solo sabrán que están siendo llevados a su fin. Pero la consumación del mundo mostrará la gran fuerza de su gobierno, cuando todo entre en lo interior y vuelva a lo que desde el principio había sido dispuesto. Entonces se verá que lo que ha sido hallado no fue establecido por hombres, sino que verdaderamente llegó a su cumplimiento.


    Porque todo lo que estuvo, o fue hecho, o vino en conflicto y pasó, muestra esto: el mal no es para siempre mal, y el bien no es para siempre bien. Toda salud se vuelve enfermedad, toda fuerza debilidad, toda belleza deformidad, y todo el florecimiento de la juventud, vejez cargada. Toda la belleza que ustedes vieron se vuelve tinieblas y corrupción, y toda ruina que ustedes hicieron se vuelve paz y deleite. Toda tiniebla que había sido dada se vuelve luz de la verdad. Todo error y debilidad se vuelve humildad del reposo. Toda venganza e ira se vuelven descanso y fuerza. Y toda voz de los que velan se vuelve silencio nacido del polvo.


    Y ninguna posesión volverá a ser ocasión de muerte para los que la buscan. Los que arrebatan salarios ya no sacarán muerte antes de su tiempo, y la muerte que es el salario de los sufrimientos será quitada. Ya no habrá ocasión de gozo meramente por deleite. El ámbito del cambio será vuelto conflicto consumado, y ya no se oirá en Sheol la voz de los pecadores.


    Así que, cuando sucedan todas estas cosas, ¿piensas que no se les pedirá cuentas a los habitantes de la tierra en un solo día? Si entonces sus propias manifestaciones muestran que viven, su misma culpa enseña la falsedad que hay en ellos. He puesto por escrito su medida completa, porque fueron engendrados de falsedad antes de morir. Y dije que ponían su confianza en el mal.'
  philosophy: optimal-equivalence
  footnotes: []
