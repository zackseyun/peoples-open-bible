    rationale: El verbo hebreo significa básicamente «pasan»; en este contexto de corrientes estacionales comunica transitoriedad/desaparición. «Se agotan» interpreta el resultado hidrológico, pero no preserva tan bien la imagen verbal de «pasar y desaparecer» documentada en el POB inglés.
