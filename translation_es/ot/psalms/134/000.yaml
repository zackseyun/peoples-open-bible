    issue: '"los que se quedan" para הָעֹמְדִים'
    rationale: El participio hebreo significa "los que están de pie" o "los que permanecen/están", pero "se quedan" desplaza el foco a permanencia o quedarse en el lugar, algo más interpretativo que el texto fuente y que el POB inglés "who stand".
  - severity: low
