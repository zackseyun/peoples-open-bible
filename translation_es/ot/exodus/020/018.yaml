translation:
  language: es
  text: Y todo el pueblo veía[a] los truenos, los destellos de fuego[b], el sonido de la trompeta, y el monte humeando; y cuando el pueblo vio[c] esto, temblaron y se mantuvieron a distancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente 'los sonidos' o 'las voces'; en este contexto probablemente se refiere a truenos.
    reason: lexical_alternative
  - marker: b
    text: O 'antorchas'; en este contexto el término probablemente alude a destellos de fuego semejantes al relámpago.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice que el pueblo 'vio' fenómenos que incluyen sonido, preservando el carácter abrumador de la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאִים
  english_pob_choice: were seeing
  chosen_spanish: estaba viendo
  alternatives_spanish:
  - veía
  - estaba percibiendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción continua o en desarrollo; en español, "estaba viendo" conserva esa vividez. Mantiene además la extrañeza deliberada de que el pueblo "vea" fenómenos que incluyen sonido.
- source_word: הַקּוֹלֹת
  english_pob_choice: the thunder
  chosen_spanish: los truenos
  alternatives_spanish:
  - las voces
  - los sonidos
  lexicon: HALOT
  rationale: Aunque qōl puede significar "sonido" o "voz", en este contexto de teofanía en Sinaí el plural encaja naturalmente como "truenos". Así se conserva el sentido contextual sin perder la referencia a fenómenos audibles poderosos.
- source_word: הַלַּפִּידִם
  english_pob_choice: the flashes of fire
  chosen_spanish: las llamas de fuego
  alternatives_spanish:
  - las antorchas
  - los destellos de fuego
  - los relámpagos
  lexicon: HALOT
  rationale: El término puede ser literalmente "antorchas", pero en este escenario teofánico la imagen apunta a manifestaciones ígneas intensas. "Llamas de fuego" mantiene el valor concreto de fuego y evita decidir demasiado pronto por "relámpagos".
- source_word: קוֹל הַשֹּׁפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del shofar
  alternatives_spanish:
  - el sonido del cuerno
  - el toque del shofar
  - el sonido de la trompeta
  lexicon: HALOT
  rationale: Se conserva "shofar" por ser el instrumento específico del texto hebreo; en español eclesial es comprensible y más preciso que sustituirlo por "trompeta". La construcción constructa se refleja con "el sonido de".
- source_word: הָהָר עָשֵׁן
  english_pob_choice: the mountain smoking
  chosen_spanish: el monte humeaba
  alternatives_spanish:
  - el monte estaba humeando
  - el monte humeante
  lexicon: HALOT
  rationale: La construcción adjetival hebrea se vuelve una frase verbal natural en español. "Humeaba" conserva la imagen visual inmediata y la fluidez del relato.
- source_word: וַיַּרְא הָעָם
  english_pob_choice: when the people saw it
  chosen_spanish: Cuando el pueblo lo vio
  alternatives_spanish:
  - Y el pueblo lo vio
  - Cuando el pueblo vio aquello
  lexicon: HALOT
  rationale: La cláusula retoma en forma resumida el conjunto de fenómenos anteriores; "lo" evita repetir la lista y refleja la referencia colectiva del hebreo. "Cuando" capta bien el giro temporal hacia la reacción.
- source_word: וַיָּנֻעוּ
  english_pob_choice: they trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - se estremecieron
  - se sacudieron
  lexicon: HALOT
  rationale: El verbo expresa temblor o conmoción por temor; "temblaron" es la equivalencia más directa y natural en español.
- source_word: וַיַּעַמְדּוּ מֵרָחֹק
  english_pob_choice: stood at a distance
  chosen_spanish: se quedaron a distancia
  alternatives_spanish:
  - se detuvieron lejos
  - se mantuvieron a distancia
  - quedaron lejos
  lexicon: HALOT
  rationale: La frase expresa retirada espacial por temor. "Se quedaron a distancia" comunica con naturalidad el resultado de apartarse sin perder el matiz de separación física.
- source_word: וְכָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: '"Todo el pueblo" es la forma natural y reverente para el grupo de Israel en este contexto narrativo.'
theological_decisions:
- issue: 'Tensión sensorial: el pueblo "ve" truenos y sonido'
  english_pob_reading: Preserve the Hebrew's mixed sensory imagery rather than smoothing it away entirely
  chosen_spanish_reading: Conservar la imagen de que el pueblo estaba viendo fenómenos que incluyen sonido
  alternative_spanish_readings:
  - Normalizar a "oyó los truenos"
  - Decir solo "percibía" los fenómenos
  rationale: El hebreo presenta la teofanía con una mezcla intencional de sentidos; la traducción conserva esa tensión con "estaba viendo" y "los truenos" en vez de resolverla del todo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Se eliminó cualquier nota sin anclaje y se mantuvo la decisión auditada sobre la imaginería sensorial del pasaje.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el pasaje lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '"Shofar" se conserva como término técnico del instrumento hebreo, coherente con un registro bíblico transparente.'
  - '"Todo el pueblo" y "monte" mantienen un español bíblico claro y ampliamente entendible en Hispanoamérica.'
