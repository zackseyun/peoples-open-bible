translation:
  language: es
  text: Entonces Sanabassar vino y puso los cimientos de la casa del Señor en Jerusalén[a], y desde aquel tiempo hasta ahora ha estado en construcción y no ha llegado a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sanabassar suele identificarse con Sesbasar en la tradición de Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: Σαναβάσσαρος
  english_pob_choice: Sanabassar
  chosen_spanish: Sanabassar
  alternatives_spanish:
  - Sesbasar
  lexicon: LSJ
  rationale: El griego de base trae la forma Σαναβάσσαρος; por fidelidad al testimonio primario, el texto español sigue esa transliteración. Se conserva una alternativa identificativa porque la tradición de Esdras suele relacionar esta figura con Sesbasar.
- source_word: παραγενόμενος
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: BDAG
  rationale: El participio expresa la llegada previa al acto principal. En español, «vino» comunica de forma natural el movimiento sin añadir matices que el griego no exige.
- source_word: εἰσεβάλλετο
  english_pob_choice: laid
  chosen_spanish: echó
  alternatives_spanish:
  - puso
  - asentó
  - colocó
  lexicon: LSJ
  rationale: 'Con «los cimientos» el verbo se entiende en sentido arquitectónico: poner o echar los cimientos. «Echó» conserva esa fuerza idiomática en español y evita una paráfrasis excesivamente interpretativa.'
- source_word: τοὺς θεμελίους
  english_pob_choice: the foundations
  chosen_spanish: los cimientos
  alternatives_spanish:
  - la base
  - los fundamentos
  lexicon: LSJ
  rationale: «Cimientos» es el término arquitectónico más natural en español y refleja bien el sustantivo griego sin perder precisión.
- source_word: τοῦ οἴκου Κυρίου
  english_pob_choice: of the house of the Lord
  chosen_spanish: de la casa del Señor
  alternatives_spanish:
  - de la casa del Señor Dios
  - del templo del Señor
  lexicon: LSJ
  rationale: Se preserva el idioma bíblico «casa del Señor», que sigue de cerca el griego. Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí el fuente griego dice Κυρίου y el auditorio inglés mantuvo «the Lord», por lo que se mantiene «Señor» en español.
- source_word: τοῦ ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  - de Jerusalén
  lexicon: LSJ
  rationale: La construcción identifica la ubicación del edificio; «en Jerusalén» es la forma más clara y directa en español.
- source_word: ἀπ᾽ ἐκείνου μέχρι τοῦ νῦν
  english_pob_choice: from that time until now
  chosen_spanish: desde aquel tiempo hasta ahora
  alternatives_spanish:
  - desde entonces hasta hoy
  - desde aquel momento hasta el presente
  lexicon: BDAG
  rationale: La frase temporal expresa continuidad desde un punto inicial hasta el presente; «desde aquel tiempo hasta ahora» lo comunica con naturalidad y precisión.
- source_word: οἰκοδομουμένου
  english_pob_choice: it has been under construction
  chosen_spanish: ha estado en construcción
  alternatives_spanish:
  - está siendo construido
  - ha sido construido
  lexicon: BDAG
  rationale: El participio indica proceso durativo en curso hasta el presente de referencia. «Ha estado en construcción» expresa bien esa continuidad en español sin forzar un calco.
- source_word: οὐκ ἔλαβεν συντέλειαν
  english_pob_choice: has not reached completion
  chosen_spanish: no ha llegado a su término
  alternatives_spanish:
  - no ha sido terminado
  - no ha alcanzado su completación
  lexicon: BDAG
  rationale: El griego dice literalmente que «no recibió/obtuvo завершение/completación». «No ha llegado a su término» conserva la idea de conclusión alcanzada, en español digno y claro.
theological_decisions:
- issue: Rendering Κυρίου in a temple-context phrase
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: El texto griego usa Κυρίου y el audit trail inglés decidió mantener «the Lord». Aunque el proyecto español prefiere «Yahvé» para יהוה, aquí no hay יהוה en el griego base; por coherencia con el testimonio primario y con la lectura inglesa auditada, se conserva «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: Se revisó el testimonio griego de Swete LXX 1909 como ancla primaria y se contrastó con el paralelo semítico/MT solo como verificación de nombres y fraseo. La solución española sigue de cerca el griego, preservando la forma nominal Σαναβάσσαρος y el valor aspectual de los participios y la frase final de continuidad inacabada.
  spanish_consistency_notes:
  - Se mantiene «Señor» por la presencia de Κυρίου en el griego, a pesar del default general del proyecto para יהוה → Yahvé.
  - «Sanabassar» sigue la transliteración griega; se evita sustituirla por la forma tradicional del paralelo hebreo en el cuerpo principal.
  - «Cimientos» y «ha estado en construcción» conservan el campo semántico arquitectónico y durativo sin sobrerrepresentar el texto.
  - La puntuación y el orden responden a una sintaxis natural en español sin perder la estructura del original.
