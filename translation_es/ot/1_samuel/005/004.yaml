  language: en
  yaml_path: translation/ot/1_samuel/005/004.yaml
  text: When they rose early the next morning[a], behold, Dagon had fallen facedown on the ground before the ark of Yahweh, and the head of Dagon and both the palms of his hands were cut off on the threshold; only Dagon was left on him.
  footnotes:
