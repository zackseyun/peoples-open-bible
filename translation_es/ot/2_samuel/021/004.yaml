translation:
  language: es
  text: 'Y los gabaonitas le dijeron[a]: «No tenemos reclamo de plata ni oro contra Saúl ni contra su casa, y no nos corresponde dar muerte a ningún hombre en Israel».[b] Entonces él dijo: «¿Qué dicen ustedes que haga por ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es asunto de plata ni de oro entre nosotros y Saúl y su casa». La expresión hebrea es idiomática y probablemente alude a compensación monetaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no tenemos derecho de dar muerte a ningún hombre en Israel». El hebreo es elíptico y expresa falta de prerrogativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּבְעֹנִים
  english_pob_choice: The Gibeonites
  chosen_spanish: los gabaonitas
  alternatives_spanish:
  - los de Gabaón
  - los habitantes de Gabaón
  lexicon: HALOT
  rationale: El etnónimo hebreo se expresa de forma natural en español con el gentilicio 'gabaonitas'. Mantiene la referencia al grupo sin añadir explicación innecesaria.
- source_word: אֵין לִי כֶּסֶף וְזָהָב עִם שָׁאוּל וְעִם בֵּיתוֹ
  english_pob_choice: We have no claim for silver or gold against Saul or against his house
  chosen_spanish: No tenemos plata ni oro con Saúl ni con su casa
  alternatives_spanish:
  - No tenemos reclamo de plata ni oro contra Saúl ni contra su casa
  - No hay plata ni oro entre nosotros y Saúl y su casa
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y el inglés POB la entendió como una negación de compensación monetaria. En español, 'no tenemos plata ni oro con...' conserva la idea de que no existe una pretensión económica pendiente, sin forzar un lenguaje jurídico demasiado explícito en el texto principal.
- source_word: עִם
  english_pob_choice: against
  chosen_spanish: con
  alternatives_spanish:
  - contra
  - entre
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por 'against' para aclarar el matiz de disputa, en español 'con' reproduce con mayor naturalidad la construcción idiomática subyacente ('con Saúl y con su casa'). La tensión de sentido se conserva en el conjunto de la frase, y puede explicarse por la nota textual si se desea.
- source_word: וְאֵין לָנוּ אִישׁ לְהָמִית בְּיִשְׂרָאֵל
  english_pob_choice: and it is not for us to put any man in Israel to death
  chosen_spanish: y no nos corresponde matar a ningún hombre en Israel
  alternatives_spanish:
  - y no tenemos derecho de dar muerte a ningún hombre en Israel
  - y no es para nosotros matar a ningún hombre en Israel
  lexicon: HALOT
  rationale: La cláusula es elíptica y el inglés POB la vertió como falta de prerrogativa. 'No nos corresponde' comunica bien la ausencia de autoridad o competencia para ejecutar a un israelita, manteniendo la fuerza idiomática en español.
- source_word: אִישׁ
  english_pob_choice: any man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - cualquier hombre
  - nadie
  lexicon: HALOT
  rationale: אִישׁ funciona aquí de manera genérica. 'Ningún hombre' preserva el singular genérico con una negación adecuada al español; 'persona' sería posible, pero diluiría la correspondencia formal con el término hebreo.
- source_word: מָה אַתֶּם אֹמְרִים אֶעֱשֶׂה לָכֶם
  english_pob_choice: What do you say that I should do for you?
  chosen_spanish: ¿Qué dicen ustedes que haga por ustedes?
  alternatives_spanish:
  - ¿Qué me dicen que haga por ustedes?
  - ¿Qué proponen que haga por ustedes?
  lexicon: HALOT
  rationale: El hebreo es condensado; en español se necesita explicitar el sujeto de la petición. '¿Qué dicen ustedes que haga por ustedes?' reproduce la relación pragmática del original y mantiene el matiz volitivo que el inglés expresó con 'should'.
theological_decisions:
- issue: La distinción entre compensación monetaria y reclamo jurídico implícito en la negación de 'plata ni oro'
  english_pob_reading: We have no claim for silver or gold against Saul or against his house
  chosen_spanish_reading: No tenemos plata ni oro con Saúl ni con su casa
  alternative_spanish_readings:
  - No tenemos reclamo de plata ni oro contra Saúl ni contra su casa
  - No hay plata ni oro entre nosotros y Saúl y su casa
  rationale: El hebreo idiomático puede leerse como ausencia de compensación monetaria o como ausencia de pretensión/reclamo. El texto principal español mantiene la forma más cercana al hebreo ('no tenemos plata ni oro con...') sin borrar la tensión legal que el inglés POB destacó; la nota puede informar que la expresión implica un asunto de compensación o disputa.
  doctrine_reference: HALOT; nota lexical sobre עִם y la expresión idiomática
- issue: La prerrogativa de ejecutar a un israelita
  english_pob_reading: and it is not for us to put any man in Israel to death
  chosen_spanish_reading: y no nos corresponde matar a ningún hombre en Israel
  alternative_spanish_readings:
  - y no tenemos derecho de dar muerte a ningún hombre en Israel
  - y no es para nosotros matar a ningún hombre en Israel
  rationale: La cláusula no describe incapacidad física sino falta de derecho o competencia para ejecutar. 'No nos corresponde' conserva esa fuerza normativa sin introducir una afirmación más dura que la del hebreo.
  doctrine_reference: HALOT; sintaxis elíptica del hebreo
