review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: doble mandato de separación (סוּרוּ), salida explícita (צְאוּ), prohibición de tocar lo inmundo, salida de en medio de la ciudad femenina implícita, y llamado a purificarse dirigido a quienes llevan los vasos de Yahvé. Sin embargo, varias formas verbales en español pasan indebidamente al singular o mezclan registros, debilitando la correspondencia con los imperativos y participios plurales del texto fuente.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero presenta inconsistencia de tratamiento: «Apártate», «sal» y «no toques» están en singular, mientras «purifícaos» y «lleváis» están en plural/vosotros. Para español neutral latinoamericano y lectura eclesial amplia, conviene evitar «vosotros» y usar plural de ustedes: «apártense / salgan / no toquen / purifíquense / ustedes que llevan». También «utensilios» es comprensible, pero «vasijas» o «vasos» suena más adecuado al contexto cultual; «vasijas de Yahvé» preserva mejor el valor de כְּלֵי.'
  glossary_alignment: Se conserva correctamente «Yahvé» para יְהוָה. El lenguaje de impureza/purificación está bien mantenido con «inmundo» y «purifíquense». No hay conflicto con la terminología doctrinal principal, salvo que «utensilios» es menos preciso que «vasijas» para כְּלֵי en este contexto templario.
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en los imperativos principales
    rationale: El hebreo usa imperativos 2mp en סוּרוּ, צְאוּ, תִּגָּעוּ, הִבָּרוּ. El borrador dice «Apártate... sal... No toques», lo cual no preserva fielmente el número gramatical ni la fuerza del llamado comunitario.
  - severity: high
    issue: Mezcla inconsistente de registros pronominales
    rationale: El texto combina singular («apártate», «sal», «no toques») con formas de vosotros («purifícaos», «lleváis»). Esto afecta la legibilidad y no encaja con el objetivo de español neutral latinoamericano.
  - severity: medium
    issue: «Purifícaos» lleva acentuación incorrecta en este contexto y registro no ideal
    rationale: La forma recomendada para español ampliamente legible aquí es «purifíquense»; además evita el voseo peninsular y mantiene el mandato plural.
  - severity: medium
    issue: «Los utensilios de Yahvé» es menos cultualmente preciso que una opción como «las vasijas de Yahvé»
    rationale: כְּלֵי en este contexto se refiere a vasos/vasijas sagradas del templo. «Utensilios» puede sonar doméstico o funcional y pierde algo del tono cultual establecido en la decisión inglesa de 'vessels'.
  - severity: low
    issue: Formato de la nota b poco natural
    rationale: 'La nota comienza con comilla simple innecesaria: ''Hebreo: ...''. Conviene normalizarla en español editorial.'
