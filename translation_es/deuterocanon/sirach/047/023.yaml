translation:
  language: es
  text: Y dio a Jacob un remanente, y a la casa de David una raíz de él[a]. Y Salomón durmió con sus padres[b], y dejó tras de sí uno de sus descendientes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘una raíz de él’; es decir, una línea continua desde David por medio de Salomón. La imagen también puede traducirse ‘un descendiente de él’.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo en este punto es incierto en este testimonio. El paralelo griego dice ‘con sus padres’, y por eso se sigue esa lectura aquí.
    reason: textual_variant
  - marker: c
    text: O ‘un heredero’ o ‘un descendiente’. El sentido es que Salomón dejó un sucesor de su propia línea.
    reason: alternative_reading
lexical_decisions:
- source_word: שארית / κατάλιμμα
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - un resto
  - lo que queda
  - sobrevivientes
  lexicon: HALOT; BDAG
  rationale: ‘Remanente’ comunica el sentido de lo que queda preservado y mantiene el matiz bíblico-covenantal que tiene la imagen en hebreo y griego, sin reducirlo a una simple cantidad sobrante.
- source_word: שורש / ῥίζαν
  english_pob_choice: a root
  chosen_spanish: una raíz
  alternatives_spanish:
  - un retoño
  - un tronco
  - una descendencia
  lexicon: HALOT; BDAG
  rationale: Se conserva la imagen literal de ‘raíz’, porque el texto apunta a continuidad dinástica desde David y no exige explicitar ‘descendencia’ en el cuerpo principal.
- source_word: וישכב ... / ἀνεπαύσατο
  english_pob_choice: lay down with his fathers
  chosen_spanish: durmió con sus padres
  alternatives_spanish:
  - descansó con sus padres
  - se acostó con sus padres
  - reposó con sus padres
  lexicon: HALOT; BDAG
  rationale: En español, ‘durmió con sus padres’ expresa con naturalidad el eufemismo de muerte heredado del hebreo, mientras conserva la referencia funeraria familiar apoyada por el griego.
- source_word: מיושש
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - envejecido
  - agotado
  - gastado
  lexicon: HALOT
  rationale: 'Sigo el apoyo del paralelo griego y la auditoría inglesa: el testimonio hebreo es incierto aquí, pero el sentido más sólido es la fórmula de unión con los padres, no un adjetivo de edad o desgaste.'
- source_word: מנון
  english_pob_choice: one of his offspring
  chosen_spanish: uno de sus descendientes
  alternatives_spanish:
  - un heredero
  - un hijo
  - un sucesor
  lexicon: HALOT
  rationale: ‘Descendientes’ preserva la amplitud y la incertidumbre del término hebreo, sin comprometerse más de lo que el texto permite a ‘hijo’ o ‘heredero’.
theological_decisions:
- issue: Lenguaje dinástico davídico en ‘una raíz de él’
  english_pob_reading: retain the metaphor of a continuing Davidic line without making an explicit messianic claim
  chosen_spanish_reading: mantener la metáfora de una línea davídica continuada sin formular una afirmación mesiánica explícita
  alternative_spanish_readings:
  - una descendencia de él
  - una raíz mesiánica de él
  rationale: La traducción conserva la imagen y el alcance dinástico del pasaje. No amplía el versículo a una identificación mesiánica que el propio texto no formula de manera directa.
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente entre el hebreo de Kahana y el griego de Swete; la única tensión relevante está en el tramo hebreo oscuro después de ‘Salomón durmió’, resuelto siguiendo el apoyo explícito del griego y la auditoría inglesa. No se registran revisiones aplicadas en el inglés base.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Mesías/Cristo’ no aparece en el versículo; no se introduce terminología cristológica ajena al texto.
  - Se conserva el paralelismo poético con ‘remanente / raíz / descendientes’ sin añadir interpretación expansiva.
