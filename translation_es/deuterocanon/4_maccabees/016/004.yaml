translation:
  language: es
  text: Pero, por el razonamiento de la piedad,[a] la madre apagó tantas y tan grandes pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piedad» también puede traducirse «devoción»; el griego enfatiza reverencia devota hacia Dios, no mera racionalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca un contraste fuerte con el contexto previo. «Pero» es la adversativa natural y clara en español contemporáneo, manteniendo la oposición sin elevar el registro en exceso.
- source_word: τῷ λογισμῷ
  english_pob_choice: by the reasoning
  chosen_spanish: por el razonamiento
  alternatives_spanish:
  - por la razón
  - por el juicio racional
  lexicon: LSJ
  rationale: λογισμός aquí conserva el sentido de deliberación racional activa. «Razonamiento» reproduce bien el instrumental y evita reducir el término a una facultad abstracta.
- source_word: τῆς εὐσεβείας
  english_pob_choice: of godliness
  chosen_spanish: de la piedad
  alternatives_spanish:
  - de la devoción
  - de la reverencia
  lexicon: BDAG
  rationale: εὐσέβεια expresa piedad/devoción reverente hacia Dios. «Piedad» es el equivalente más natural en español y mantiene el contenido religioso-moral sin volverlo mera racionalidad.
- source_word: κατεσβεσε
  english_pob_choice: extinguished
  chosen_spanish: apagó
  alternatives_spanish:
  - extinguió
  - sofocó
  lexicon: LSJ
  rationale: El verbo tiene imagen de apagar fuego. «Apagó» es el verbo más natural en español y conserva la metáfora de dominar o extinguir las pasiones.
- source_word: τοσαῦτα καὶ τηλικαῦτα
  english_pob_choice: so many and so great
  chosen_spanish: tan numerosas y tan grandes
  alternatives_spanish:
  - tantas y tan grandes
  - tan muchas y tan grandes
  lexicon: LSJ
  rationale: La pareja de intensificadores subraya cantidad y magnitud. «Tan numerosas y tan grandes» transmite ambos valores con naturalidad y sin perder el paralelismo griego.
- source_word: πάθη
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - afectos
  - impulsos
  lexicon: BDAG
  rationale: En 4 Macabeos πάθη designa impulsos pasionales que la razón domina. «Pasiones» mantiene el vocabulario filosófico del libro y la tensión moral del pasaje.
- source_word: ἡ μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - la madre de ellos
  lexicon: BDAG
  rationale: El griego dice simplemente «la madre». En español puede mantenerse sin añadir posesivo, pues el referente es claro por el contexto.
theological_decisions:
- issue: Cómo traducir λογισμῷ τῆς εὐσεβείας sin resolver la relación entre razón y devoción
  english_pob_reading: by the reasoning of godliness
  chosen_spanish_reading: por el razonamiento de la piedad
  alternative_spanish_readings:
  - por la razón piadosa
  - por el razonamiento piadoso
  rationale: El texto sostiene la tensión entre deliberación racional y reverencia religiosa. «Razonamiento de la piedad» preserva ambos elementos sin fusionarlos ni moralizarlos en exceso.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue la revisión reciente del POB inglés que reordenó la oración para mayor naturalidad y cambió la expresión intensiva a una forma más idiomática. En español se adoptó una estructura igualmente natural, manteniendo el contraste inicial, el instrumental de λογισμῷ y el paralelismo de los intensificadores.
  spanish_consistency_notes:
  - Se mantiene «piedad» para εὐσέβεια, coherente con el valor religioso del término y sin desplazarlo a un sentido meramente ético.
  - Se conserva el vocabulario de «pasiones» para πάθη, porque en 4 Macabeos el campo semántico es filosófico-moral.
  - La metáfora de apagamiento se expresa con «apagó», que en español conserva bien la imagen de extinguir fuego o ardor pasional.
