  yaml_path: translation/ot/genesis/029/033.yaml
  text: Then she conceived again and bore a son[a], and said, “Because Yahweh has heard that I am hated[b], he has given me this one also.” So she called his name Simeon.
  footnotes:
  - marker: a
    text: Or “that I am unloved” or “that I am less loved.” The Hebrew word is literally “hated,” but in context it can denote being rejected or comparatively less loved.
    reason: lexical_alternative
  - marker: b
    text: Simeon sounds like the Hebrew for “heard.”
    reason: lexical_alternative
