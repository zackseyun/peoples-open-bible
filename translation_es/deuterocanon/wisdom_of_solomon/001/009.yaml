review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: habrá escrutinio de los planes/deliberaciones del impío, y lo dicho por él llega al Señor para poner en evidencia sus actos sin ley. Sin embargo, el punto principal a corregir es ἔλεγχον, que en el expediente inglés se justificó como ''the exposing'', no como un veredicto de ''reprobación''. También hay desajustes de notas al pie y anclajes: las notas c y d están cruzadas respecto del texto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'reprobación de sus hechos sin ley' suena menos natural y menos fiel al matiz forense-evidencial que 'exposición' o 'puesta en evidencia'. Además, hay un error ortográfico en la nota 'counsejos' y una inconsistencia de marcadores en el texto y las notas.
  glossary_alignment: No hay conflicto grave con la terminología principal del proyecto. 'el Señor' para Κύριον es aceptable aquí. 'el impío' para ἀσεβοῦς funciona bien. 'hechos sin ley' es entendible, aunque 'actos sin ley' o 'actos contrarios a la ley' serían algo más idiomáticos; no obstante, puede mantenerse si se aclara en nota. La mayor desviación terminológica es ἔλεγχον, donde conviene seguir la racionalidad documentada de exposición/evidencia antes que censura.
  issues:
  - severity: high
    issue: ἔλεγχον se tradujo como 'reprobación'
    rationale: El expediente inglés documenta 'the exposing' como elección principal por su sentido evidencial/forense. 'Reprobación' desplaza el sentido hacia condena o censura y no preserva tan bien la función de poner en evidencia los hechos.
  - severity: high
    issue: Los marcadores de notas c y d no corresponden a sus anclajes
    rationale: En el texto, [c] está en 'Señor' y [d] en 'reprobación', pero la nota c trata ἔλεγχον y la d trata ἀνομημάτων. Esto incumple la disciplina requerida de anclar cada nota exactamente en el lugar pertinente.
  - severity: medium
    issue: La nota a repite 'planes' como alternativa y contiene el error ortográfico 'counsejos'
    rationale: Debe ofrecer alternativas reales a la elección principal y corregir la ortografía a 'consejos'.
  - severity: low
    issue: La nota b con 'audición' resulta poco natural en español
    rationale: Puede mantenerse el valor literal, pero 'oído' o 'oír' comunica mejor que 'audición' en una nota bíblica legible.
