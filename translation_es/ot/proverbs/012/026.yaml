translation:
  language: es
  text: El justo es guía de su prójimo[a][b], pero el camino de los impíos los extravía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es más excelente que su prójimo». El hebreo de יָתֵר es difícil, y esta traducción tradicional sigue siendo posible.
    reason: alternative_reading
  - marker: b
    text: Hebreo «su prójimo»; también puede entenderse «su amigo» o «su compañero».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָתֵר
  english_pob_choice: is a guide to
  chosen_spanish: es guía para
  alternatives_spanish:
  - es más excelente que
  - se adelanta a
  - guía a
  lexicon: HALOT
  rationale: El hebreo es difícil y el POB revisado prefirió una lectura activa de dirección/guía más que la comparación tradicional. «Es guía para» conserva esa orientación sin forzar un calco ni perder la tensión con la alternativa comparativa documentada.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: רֵעַ puede abarcar amigo, compañero o prójimo. «Prójimo» funciona bien en español bíblico actual para un vínculo cercano y social, sin reducir innecesariamente el alcance a amistad íntima.
- source_word: צַדִּיק
  english_pob_choice: the righteous person
  chosen_spanish: el justo
  alternatives_spanish:
  - la persona justa
  - el hombre justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El justo» es natural, compacto y fiel al sentido genérico sin marcar género de manera restrictiva.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: HALOT
  rationale: En lenguaje sapiencial, רְשָׁעִים nombra a quienes se apartan de Dios y de la rectitud. «Impíos» mantiene ese peso moral y religioso de manera idiomática en español.
- source_word: תַּתְעֵם
  english_pob_choice: leads them astray
  chosen_spanish: los extravía
  alternatives_spanish:
  - los hace errar
  - los desvía
  - los hace andar errantes
  lexicon: HALOT
  rationale: El Hifil de תעה expresa causar extravío/errancia. «Los extravía» transmite bien la idea causativa y conserva la oposición con la guía del justo.
theological_decisions:
- issue: Antítesis sapiencial entre el justo y los impíos
  english_pob_reading: The righteous person is a guide to his neighbor, but the way of the wicked leads them astray.
  chosen_spanish_reading: El justo es guía para su prójimo, pero el camino de los impíos los extravía.
  alternative_spanish_readings:
  - El justo es más excelente que su prójimo, pero el camino de los impíos los extravía.
  - El justo guía a su prójimo, pero el camino de los impíos los extravía.
  rationale: Se conserva la lectura revisada del POB que favorece el sentido de guía/dirección en contraste con el extravío del camino impío. La alternativa comparativa se mantiene como posibilidad textual documentada, pero no se adopta en el texto principal.
  doctrine_reference: Proverbios; sabiduría ética y paralelismo antitético
translation_notes:
  revision_awareness: El registro inglés fue revisado desde «searches out» a «is a guide to» para reflejar mejor el hebreo. Esta versión española sigue esa revisión, evitando la lectura comparativa como principal, pero conserva la alternativa tradicional en nota por la dificultad de יָתֵר.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se mantuvo «el justo» y «los impíos» como equivalentes breves y bíblicamente transparentes.
  - «Prójimo» se eligió como equivalente amplio de רֵעַ, con nota de posibles matices relacionales.
  - «Extravía» conserva el valor causativo del Hifil y el contraste antitético con «guía».
