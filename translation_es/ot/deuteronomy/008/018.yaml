translation:
  language: es
  text: Pero recordarás a Yahvé[a] tu Dios, porque él es quien te da poder para obtener riqueza[b], a fin de confirmar su pacto que juró a tus padres, como sucede hoy[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aquí se conserva el nombre propio divino del hebreo: «Yahvé».'
    reason: source_note
  - marker: b
    text: La expresión hebrea puede significar «obtener riqueza», «producir riqueza» o, en un sentido más amplio, «alcanzar éxito».
    reason: lexical_alternative
  - marker: c
    text: 'Modismo hebreo: «como este día», es decir, «como se ve hoy» o «como está ahora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: But you shall remember
  chosen_spanish: Pero recordarás
  alternatives_spanish:
  - Y recordarás
  - Y debes recordar
  lexicon: HALOT
  rationale: El hebreo funciona como mandato/exhortación en discurso instrutivo. «Pero» conserva el contraste con la autosuficiencia de 8:17, y «recordarás» mantiene la fuerza formal sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» para preservar el nombre propio del Dios del pacto, conforme al criterio del proyecto y evitando la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se refleja de manera natural como «tu Dios», manteniendo la relación pactual.
- source_word: הַנֹּתֵן לְךָ
  english_pob_choice: who gives you
  chosen_spanish: quien te da
  alternatives_spanish:
  - el que te da
  - que te da
  lexicon: HALOT
  rationale: El participio expresa acción característica/continua. «Quien te da» suena natural en español y preserva ese valor durativo.
- source_word: כֹּחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: HALOT
  rationale: «Poder» funciona bien en español para la capacidad dada por Dios que permite obtener prosperidad, y conserva el alcance de fuerza/capacidad sin restringirlo demasiado.
- source_word: לַעֲשׂוֹת חָיִל
  english_pob_choice: to get wealth
  chosen_spanish: para hacerte de riqueza
  alternatives_spanish:
  - para obtener riqueza
  - para conseguir riquezas
  - para lograr prosperidad
  lexicon: HALOT
  rationale: La expresión idiomática se entiende aquí en el marco inmediato de 8:17–18 sobre atribuirse el propio éxito económico. «Hacerte de riqueza» comunica la obtención de prosperidad/riqueza sin reducir injustificadamente el hebreo a un solo matiz técnico.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: a fin de
  alternatives_spanish:
  - para que
  - con el propósito de
  lexicon: HALOT
  rationale: Introduce finalidad. «A fin de» mantiene un registro digno y claro en español bíblico contemporáneo.
- source_word: הָקִים
  english_pob_choice: he may confirm
  chosen_spanish: confirmar
  alternatives_spanish:
  - establecer
  - ratificar
  - hacer valer
  lexicon: HALOT
  rationale: En este contexto, el hiphil de קום expresa confirmar/ratificar la validez operativa del pacto en la historia. «Confirmar» coincide con la decisión auditada en inglés y evita sugerir que el pacto carecía de existencia previa.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su pacto
  lexicon: HALOT
  rationale: «Pacto» conserva el registro bíblico y el peso covenantal del término hebreo sin introducir el lenguaje eclesial de «alianza» como preferencia no requerida por el contexto.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ
  english_pob_choice: that he swore to your fathers
  chosen_spanish: que juró a tus padres
  alternatives_spanish:
  - que juró a tus antepasados
  - que prometió a tus padres
  lexicon: HALOT
  rationale: Se conserva el plural masculino «padres» por fidelidad al referente patriarcal y al valor gramatical del hebreo. «Juró» reproduce el lenguaje de promesa juramentada del texto.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hoy
  - como es evidente hoy
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una constatación presente. «Como en este día» mantiene el sabor de la fórmula deuteronómica; la nota explica su sentido actual.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יהוה de manera directa. Se mantiene el nombre propio del pacto como transliteración reverente, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de חָיִל en contexto económico
  english_pob_reading: wealth
  chosen_spanish_reading: riqueza
  alternative_spanish_readings:
  - prosperidad
  - bienes
  - éxito
  rationale: En Deuteronomio 8 el contraste inmediato es la tentación de atribuirse el bienestar obtenido. «Riqueza» hace explícita la referencia económica sin borrar que el hebreo puede abarcar también prosperidad o éxito.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de אֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  rationale: Se mantiene el referente patriarcal masculino plural del hebreo. «Padres» conserva la forma y el vínculo de pacto sin neutralizar el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: actualiza el sentido de la idiomática לַעֲשׂוֹת חָיִל hacia una obtención concreta de riqueza/prosperidad y de הָקִים hacia «confirmar», manteniendo la lectura de promesa juramentada y la referencia patriarcal. También respeta la decisión doctrinal de traducir יהוה como nombre propio y no como sustitución por título.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se mantiene «pacto» para בְּרִית, conforme al registro del proyecto.
  - «Padres» preserva el referente patriarcal masculino plural.
  - Las notas dejan abiertas las alternativas semánticas de חָיִל y del modismo final sin sobrecargar el texto principal.
  - La puntuación sigue convenciones españolas con coma antes de la cláusula causal y cierre por punto.
