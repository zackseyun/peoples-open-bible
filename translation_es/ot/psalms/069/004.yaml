revisions:
- from: Estoy cansado de mi clamor[a]; se me ha secado la garganta[b]; mis ojos fallan mientras espero a mi Dios.
  to: Estoy cansado de tanto clamar; se me ha secado la garganta[a]; mis ojos se consumen mientras espero en mi Dios[b].
