translation:
  language: es
  text: 'Entonces Yahvé dijo a Josué[a]: «No temas y no te desalientes. Toma contigo a todos los guerreros, levántate y sube a Hai. Mira, he entregado en tu mano al rey de Hai, a su pueblo, a su ciudad y a su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todo el pueblo de guerra” / “todos los hombres de guerra”. La expresión hebrea dice literalmente “todo el pueblo de la guerra”, refiriéndose a la fuerza combatiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama; en el proyecto, la forma base en español es 'Yahvé' para preservar el nombre propio divino, no sustituirlo por un título.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas
  lexicon: HALOT
  rationale: La prohibición directa contra el temor se expresa con naturalidad en español como 'No temas', manteniendo el tono breve y solemne del mandato.
- source_word: וְאַל תֵּחָת
  english_pob_choice: and do not be dismayed
  chosen_spanish: y no te desalientes
  alternatives_spanish:
  - y no te desanimes
  - y no te acobardes
  - y no te desmayes
  lexicon: HALOT
  rationale: חתת comunica quedar abatido o desalentado; 'desalentarte' conserva la fuerza emocional sin caer en un arcaísmo o en una lectura excesivamente fuerte que sugiera destrucción literal.
- source_word: כָּל עַם הַמִּלְחָמָה
  english_pob_choice: all the fighting men
  chosen_spanish: todo el pueblo de guerra
  alternatives_spanish:
  - todos los guerreros
  - todo el ejército
  - todo el pueblo de la guerra
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'todo el pueblo de la guerra'. Se conserva esa construcción para no borrar la forma idiomática del original; 'pueblo de guerra' mantiene el matiz colectivo/militar, aunque suene menos idiomático que otras opciones.
- source_word: וְקוּם עֲלֵה
  english_pob_choice: and arise, go up
  chosen_spanish: levántate y sube
  alternatives_spanish:
  - y levántate, sube
  - y alzate, sube
  - y ponte en pie y sube
  lexicon: HALOT
  rationale: Dos imperativos aparecen en hebreo; 'levántate y sube' los reproduce de modo claro y natural en español, preservando la urgencia de la secuencia verbal.
- source_word: הָעָי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: HALOT
  rationale: El nombre propio del lugar se translitera en español como 'Hai', forma usual y fácil de leer en castellano bíblico.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Ve
  - Mira bien
  lexicon: HALOT
  rationale: El imperativo introduce la garantía divina; 'Mira' comunica la atención requerida sin el arcaísmo de 'he aquí'.
- source_word: נָתַתִּי בְיָדְךָ
  english_pob_choice: I have given into your hand
  chosen_spanish: yo he entregado en tu mano
  alternatives_spanish:
  - te he dado en tu mano
  - he puesto en tu mano
  - yo he entregado en tus manos
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo 'en tu mano', que expresa entrega de control/poder. 'He entregado' refleja la certeza del perfecto divino.
- source_word: מֶלֶךְ הָעַי
  english_pob_choice: the king of Ai
  chosen_spanish: al rey de Hai
  alternatives_spanish:
  - al rey de Ai
  lexicon: HALOT
  rationale: Se mantiene la relación constructa y el nombre propio transliterado. En español, la preposición 'a' marca el complemento directo humano.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su pueblo
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'his people', en español 'su pueblo' conserva mejor la relación posesiva y es natural en la enumeración.
- source_word: עִירוֹ
  english_pob_choice: his city
  chosen_spanish: a su ciudad
  alternatives_spanish:
  - a su urbe
  - a su ciudad
  lexicon: HALOT
  rationale: Traducción directa y transparente del posesivo; mantiene la serie de elementos entregados.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su territorio
  - a su país
  - a su tierra
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa el territorio asociado al rey y a la ciudad; 'tierra' es la equivalencia más directa y bíblicamente reconocible en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en español, siguiendo la política del proyecto de no sustituir el Tetragrama por un título. 'Yahvé' comunica mejor la referencia al nombre pactual que una mayúscula litúrgica.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Expresión militar colectiva כָּל עַם הַמִּלְחָמָה
  english_pob_reading: all the fighting men
  chosen_spanish_reading: todo el pueblo de guerra
  alternative_spanish_readings:
  - todos los guerreros
  - todo el ejército
  - todo el pueblo de la guerra
  rationale: El hebreo es literalmente colectivo y masculino en su referente militar. Se conserva la tensión entre literalidad y claridad, evitando neutralizarlo como si fuera una abstracción no marcada.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy #4'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el tramo auditado en inglés. Se preservan la secuencia imperativa, el nombre divino con transliteración y la idiomática 'en tu mano'. No se introducen expansiones interpretativas ni se borra la tensión léxica de עַם הַמִּלְחָמָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de forma consistente con el proyecto.
  - '''Hai'' se mantiene como transliteración española del topónimo.'
  - Se conserva la fórmula verbal breve 'No temas y no te desalientes' con paralelismo claro.
  - La enumeración final mantiene la serie 'rey / pueblo / ciudad / tierra' sin añadir elementos.
