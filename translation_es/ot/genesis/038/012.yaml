translation:
  language: es
  text: Pasados muchos días[a], murió la hija de Súa, la esposa de Judá. Cuando Judá fue consolado[c][b], subió a Timná, a sus esquiladores de ovejas, él y su amigo Hirah, el adulamita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después de mucho tiempo». Literalmente: «los días se hicieron muchos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la hija de Súa»; algunos toman esto como el nombre personal «Batsúa».'
    reason: alternative_reading
  - marker: c
    text: 'O: «Después de que Judá fue consolado» / «Y Judá fue consolado». El verbo hebreo indica que fue consolado después del duelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְבּוּ הַיָּמִים
  english_pob_choice: After many days had passed
  chosen_spanish: Pasados muchos días
  alternatives_spanish:
  - Después de mucho tiempo
  - Y los días se multiplicaron
  lexicon: HALOT
  rationale: El hebreo expresa idiomáticamente que los días “se hicieron muchos”. En español, “Pasados muchos días” conserva el valor temporal sin calcar de forma rígida la estructura hebrea.
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: HALOT
  rationale: Verbo narrativo estándar para מות. “Murió” es claro, natural y fiel al registro del relato.
- source_word: בַּת שׁוּעַ
  english_pob_choice: the daughter of Shua
  chosen_spanish: la hija de Súa
  alternatives_spanish:
  - la hija de Shua
  - Batsúa
  lexicon: HALOT
  rationale: La frase hebrea es transparentemente relacional. “La hija de Súa” mantiene esa transparencia, en vez de asumir un nombre compuesto sin necesidad.
- source_word: אֵשֶׁת יְהוּדָה
  english_pob_choice: Judah’s wife
  chosen_spanish: la mujer de Judá
  alternatives_spanish:
  - la esposa de Judá
  lexicon: HALOT
  rationale: En español, “mujer de Judá” reproduce bien la relación matrimonial del constructo y suena natural en el contexto narrativo. “Esposa” también sería posible, pero “mujer” conserva mejor la forma sencilla del hebreo.
- source_word: וַיִּנָּחֶם יְהוּדָה
  english_pob_choice: When Judah was comforted
  chosen_spanish: Cuando Judá fue consolado
  alternatives_spanish:
  - Y Judá fue consolado
  - Después de ser consolado Judá
  lexicon: HALOT
  rationale: El verbo נָחַם en este contexto significa ser consolado tras el duelo, no arrepentirse. La pasiva “fue consolado” preserva esa fuerza y evita introducir una lectura moral no presente aquí.
- source_word: וַיַּעַל
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה suele conservar la noción de subir. “Subió” mantiene el matiz direccional sin volver la frase extraña en español.
- source_word: עַל גֹּזֲזֵי צֹאנ/וֹ
  english_pob_choice: to his sheep shearers
  chosen_spanish: a donde estaban los esquiladores de sus ovejas
  alternatives_spanish:
  - a sus esquiladores de ovejas
  - para esquilar sus ovejas
  lexicon: HALOT
  rationale: El participio indica a los encargados del esquileo vinculados con su rebaño. “A donde estaban los esquiladores de sus ovejas” expresa el destino y la situación social de la escena sin perder el vínculo posesivo.
- source_word: ה֗וּא וְ/חִירָ֛ה רֵעֵ֥/הוּ
  english_pob_choice: he and his friend Hirah
  chosen_spanish: él y su amigo Hirah
  alternatives_spanish:
  - él, junto con su amigo Hirah
  lexicon: HALOT
  rationale: La construcción hebrea presenta a Judá acompañado de Hirah. “Su amigo” traduce רֵעַ de manera directa y natural; el pronombre enfático se mantiene con “él y...”.
- source_word: הָ/עֲדֻלָּמִ֖י
  english_pob_choice: the Adullamite
  chosen_spanish: el adulamita
  alternatives_spanish:
  - el de Adulam
  lexicon: HALOT
  rationale: Gentilicio que identifica el origen de Hirah. “Adulamita” es la forma española común y precisa.
- source_word: תִּמְנָתָ/ה
  english_pob_choice: to Timnah
  chosen_spanish: a Timnat
  alternatives_spanish:
  - hacia Timnat
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar. “A Timnat” es la manera natural en español para reproducir ese valor sin sobreexplicarlo.
theological_decisions:
- issue: Sentido de וַיִּנָּחֶם יְהוּדָה
  english_pob_reading: The Hebrew verb here means he was consoled after mourning.
  chosen_spanish_reading: Judá fue consolado después del duelo
  alternative_spanish_readings:
  - Judá se tranquilizó
  - Judá se repuso
  rationale: Se preserva el sentido de consuelo por luto, evitando convertir el verbo en arrepentimiento o en una simple recuperación emocional no explicitada por el hebreo.
  doctrine_reference: Ninguna doctrinal; decisión semántica contextual basada en el uso narrativo de נָחַם
translation_notes:
  revision_awareness: Coincide con el texto fuente y con la auditoría inglesa; no se documentan revisiones aplicadas en el pasaje. Se mantuvo la equivalencia óptima del POB inglés, adaptando el orden y la sintaxis al español natural sin perder la transparencia del original.
  spanish_consistency_notes:
  - Se usó “Yahvé” como convención general del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conservó el valor relacional de “hija de Súa” y la posibilidad alternativa de nombre propio en nota.
  - Se mantuvo la distinción entre consuelo por duelo y otras posibles lecturas de נָחַם.
  - “Timnat” se eligió por adaptación española del topónimo; “Timnah” quedó implícito en la nota léxica como equivalente del lugar.
