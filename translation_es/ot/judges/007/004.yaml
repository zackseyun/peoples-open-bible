  to: 'Entonces Yahvé dijo a Gedeón[a]: «Todavía el pueblo es demasiado numeroso. Hazlos descender al agua, y allí los probaré para ti. Y sucederá que el que yo te diga: “Este irá contigo”, ese irá contigo; y todo aquel que yo te diga: “Este no irá contigo”, ese no irá contigo».'
