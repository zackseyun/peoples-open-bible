translation:
  language: es
  text: 'Entonces Labán le dijo: «Si he hallado favor[a] en tus ojos, por favor quédate. He aprendido por adivinación[b] que Yahvé me ha bendecido por causa de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he hallado gracia en tus ojos»; la frase hebrea usa la imagen idiomática de hallar favor ante alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «He adivinado» o «He aprendido por experiencia». El verbo hebreo puede denotar adivinación o lectura de presagios; el texto principal conserva ese sentido léxico más fuerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם נָא מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: If I have found favor in your eyes, please stay
  chosen_spanish: Si he hallado favor en tus ojos, espera
  alternatives_spanish:
  - Si he encontrado favor ante tus ojos, por favor quédate
  - Si he hallado gracia en tus ojos, espera
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: מָצָא חֵן בְּעֵינֵי comunica “encontrar favor” ante alguien. Mantengo “favor” y “en tus ojos” para conservar la imagen hebrea. El verbo pedido por el contexto se expresa con «espera», siguiendo la fuerza implícita de la solicitud; «quédate» también sería posible, pero «espera» evita añadir una idea demasiado específica donde el hebreo solo sugiere la petición.'
- source_word: נִחַשְׁתִּי
  english_pob_choice: I have learned by divination
  chosen_spanish: He adivinado
  alternatives_spanish:
  - He practicado adivinación
  - He aprendido por adivinación
  - He obtenido conocimiento por augurios
  lexicon: HALOT
  rationale: El verbo נחשׁ en este contexto conserva la fuerza de adivinación/lectura de presagios. El español «he adivinado» es breve y natural, pero sigue reflejando la acción de adivinar en un sentido técnico. «He aprendido por adivinación» sería más explícito, aunque menos fluido; por eso se deja como alternativa. No se atenúa a un mero ‘he aprendido por experiencia’, porque el contexto y el audit trail favorecen el sentido más fuerte.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el convenio del proyecto para el Tetragrámaton: «Yahvé». Esto conserva el nombre divino en lugar de sustituirlo por un título. En español, «Yahvé» es la forma principal del proyecto y resulta clara y reverente.'
- source_word: וַיְבָרֲכֵנִי
  english_pob_choice: has blessed me
  chosen_spanish: me ha bendecido
  alternatives_spanish:
  - me bendijo
  - me ha dado su bendición
  lexicon: HALOT
  rationale: El verbo ברך se traduce de forma directa por «bendecir». El presente perfecto español («me ha bendecido») comunica un estado resultante de una acción ya reconocida por Labán, en línea con el inglés auditado.
- source_word: בִּגְלָלֶךָ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - por tu causa
  - debido a ti
  lexicon: HALOT
  rationale: La preposición indica causalidad o motivo. «Por causa de ti» mantiene bien esa relación causal y suena natural en español bíblico moderno sin perder precisión.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  alternatives_spanish:
  - Labán
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio bíblico como «Laban», en consonancia con la forma inglesa del expediente y con la identificación clara del personaje. «Labán» sería una adaptación española posible, pero aquí se mantiene la transliteración estable del proyecto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo nombra explícitamente a YHWH. En el español del proyecto no se enmascara el nombre con «SEÑOR», sino que se lo vierte como «Yahvé». Eso preserva la referencia al nombre propio de Dios y mantiene la coherencia doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de נִחַשְׁתִּי en el habla de Labán
  english_pob_reading: I have learned by divination
  chosen_spanish_reading: He adivinado
  alternative_spanish_readings:
  - He aprendido por adivinación
  - He practicado adivinación
  rationale: La lectura dominante del audit trail es la de adivinación/lectura de presagios, no una simple observación empírica. La traducción española debe conservar esa tensión lexical. «He adivinado» comunica el acto sin suavizarlo; «he aprendido por adivinación» sería más explícito pero menos natural.
  doctrine_reference: HALOT verb נחשׁ; audit trail lexical decision
translation_notes:
  revision_awareness: 'El expediente inglés pasó de «the LORD» a «Yahweh» para reflejar el nombre divino del hebreo. También se ajustó una redacción inglesa redundante sobre נָא. La versión española sigue esos criterios: conserva el nombre divino como «Yahvé», mantiene la solicitud implícita sin añadir redundancia, y preserva el sentido fuerte de נִחַשְׁתִּי con un verbo de adivinación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la imagen idiomática «hallado favor en tus ojos», no se sustituye por una paráfrasis más abstracta.
  - «Laban» se mantiene como transliteración estable del expediente; si la serie española opta en otros lugares por «Labán», convendría uniformar la forma en todo el corpus.
  - El verbo «adivinar» se usa aquí en sentido técnico-lexical, no como mera conjetura.
  - La cláusula final «por causa de ti» preserva la causalidad explícita del hebreo sin intensificarla a un matiz teológico ajeno al contexto.
