translation:
  text: '1[a]. In a short time she would withdraw, to test the purpose of my soul. In ten temptations she proved me approved, and in them all I was patient; for patience is a great remedy.


    2. How many times the Egyptian woman threatened me with death! How many times, after handing me over to punishments[b], she called me back, and when I was unwilling to come together with her, she said to me, “You shall have authority over me also, and over all who are in my house, if you give yourself to me, and you shall be as our master.”


    3. But I remembered the words of my father, and going into my chamber weeping, I prayed to the Lord.


    4. And I fasted during those seven years, and I appeared to the Egyptian as one living in luxury; for those who fast for God''s sake receive grace of face.


    5. And if my master was away, I drank no wine; and every third day I would take my food, and I would give it to the poor and the sick.


    6. And I would rise early to the Lord and weep concerning Memphis the Egyptian woman, because she troubled me greatly without ceasing; for even at night she would come in to me under a pretext of visiting.


    7. And because she had no male child[d][c], she pretended'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some witnesses include an additional repetition of the threat: ''and threatened me.'''
    reason: textual_variant
  - marker: b
    text: '''To the Egyptian'' may refer specifically to Joseph''s Egyptian master, though the Greek leaves the expression terse.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'for three days I would take my food' may also be understood as eating every third day or after a three-day interval.
    reason: lexical_alternative
  - marker: d
    text: Memphis is the name given here for the Egyptian woman in this Greek witness.
    reason: cultural_note
lexical_decisions:
- source_word: δοκιμάσαι / δόκιμον
  chosen: test / approved
  alternatives:
  - prove / genuine
  - test / proven
  lexicon: LSJ
  rationale: The paired language of testing and being shown approved is central to Joseph's moral endurance. 'Approved' preserves the ethical sense of having stood the test without over-expanding the phrase.
- source_word: διαβούλιον
  chosen: purpose
  alternatives:
  - resolve
  - counsel
  - intention
  lexicon: LSJ
  rationale: Here it refers to the inward intention or settled plan of the soul. 'Purpose' is idiomatic and preserves the moral-volitional nuance.
- source_word: μακροθυμία / ἐμακροθύμησα
  chosen: patience / I was patient
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: This virtue is thematic in the chapter. 'Patience' is readable modern English, while still carrying the sense of restrained endurance under provocation.
- source_word: φάρμακον
  chosen: remedy
  alternatives:
  - medicine
  - cure
  lexicon: LSJ
  rationale: Joseph presents patience as the healing answer to temptation and harassment. 'Remedy' fits the metaphor naturally in English.
- source_word: συνελθεῖν
  chosen: come together with
  alternatives:
  - sleep with
  - have relations with
  lexicon: LSJ
  rationale: The phrase is a sexual euphemism. 'Come together with' preserves the elevated testamentary register without becoming vague.
- source_word: κυριεύσεις
  chosen: have authority
  alternatives:
  - rule
  - be lord over
  lexicon: BDAG
  rationale: The woman's offer is one of dominion and status. 'Have authority' communicates power clearly without importing overly theological 'lord' language here.
- source_word: ἐπιδῷς ἑαυτόν
  chosen: give yourself
  alternatives:
  - yield yourself
  - submit yourself
  lexicon: LSJ
  rationale: The expression conveys sexual surrender. 'Give yourself' is direct and idiomatic while preserving the woman's manipulative speech.
- source_word: ταμεῖον
  chosen: chamber
  alternatives:
  - inner room
  - storeroom
  lexicon: LSJ
  rationale: In this context Joseph withdraws privately for prayer. 'Chamber' preserves the private-room sense and the elevated tone.
- source_word: τῷ Αἰγυπτίῳ
  chosen: to the Egyptian
  alternatives:
  - to the Egyptian man
  - to my Egyptian master
  lexicon: LSJ
  rationale: The Greek is singular masculine and likely refers to Joseph's Egyptian master or household perception. The literal rendering is retained, with ambiguity left unresolved in the main text.
- source_word: ἐν τρυφῇ διάγων
  chosen: living in luxury
  alternatives:
  - living delicately
  - living in comfort
  lexicon: LSJ
  rationale: The irony is that fasting made him appear well-favored rather than deprived. 'Living in luxury' captures the external appearance.
- source_word: τοῦ προσώπου τὴν χάριν
  chosen: graciousness of face
  alternatives:
  - favor in appearance
  - beauty of countenance
  lexicon: LSJ
  rationale: The phrase refers to visible attractiveness or favor in one's appearance. 'Graciousness of face' keeps the concrete imagery while remaining understandable.
- source_word: τριημερίζων
  chosen: for three days
  alternatives:
  - every third day
  - after a three-day interval
  lexicon: LSJ
  rationale: The fasting context suggests a three-day pattern of delayed eating. 'For three days I would take my food' reflects the ascetic rhythm, though the exact nuance is difficult.
- source_word: Ὤρθριζον
  chosen: I would rise early
  alternatives:
  - I kept early watch
  - I rose at dawn
  lexicon: LSJ
  rationale: The verb conveys early rising for prayer. 'I would rise early' is natural and preserves the habitual aspect.
- source_word: λόγῳ ἐπισκέψεως
  chosen: under a pretext of visiting
  alternatives:
  - with a word of inquiry
  - on the excuse of concern
  lexicon: LSJ
  rationale: The phrase indicates a plausible social excuse masking illicit intent. 'Under a pretext of visiting' makes the deception explicit from context.
- source_word: τέκνον ἄρρεν
  chosen: male child
  alternatives:
  - son
  - male offspring
  lexicon: LSJ
  rationale: The Greek is literally 'male child.' Retaining that wording preserves the concrete familial motive in the narrative.
- source_word: προσεποιεῖτο
  chosen: pretended
  alternatives:
  - made as though
  - feigned
  lexicon: LSJ
  rationale: The verb marks deliberate pretense. 'Pretended' is concise and clear.
