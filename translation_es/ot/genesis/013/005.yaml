translation:
  language: es
  text: Y Lot[a], que iba con Abram, también tenía rebaños y ganado y tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'rebaños' se refiere de manera amplia al ganado menor, especialmente ovejas y cabras; 'ganado' al ganado bovino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y asimismo
  lexicon: HALOT
  rationale: El hebreo añade a Lot con un matiz acumulativo; en español, 'y también' conserva esa adición de manera natural y enlaza con el contexto anterior.
- source_word: לְלוֹט
  english_pob_choice: Lot
  chosen_spanish: a Lot
  alternatives_spanish:
  - Lot tenía
  - para Lot
  lexicon: HALOT
  rationale: La preposición ל en esta construcción posesiva-existencial puede reflejarse con 'a Lot'; aunque suena menos directo que 'Lot tenía', mantiene la huella del hebreo sin forzar una paráfrasis.
- source_word: הַהֹלֵךְ אֶת אַבְרָם
  english_pob_choice: who went with Abram
  chosen_spanish: que iba con Abram
  alternatives_spanish:
  - que caminaba con Abram
  - que acompañaba a Abram
  lexicon: HALOT
  rationale: El participio funciona de modo atributivo para identificar a Lot como el que iba junto a Abram. 'Iba con Abram' preserva el valor progresivo/acompañante con naturalidad en español.
- source_word: הָיָה
  english_pob_choice: had
  chosen_spanish: le pertenecían
  alternatives_spanish:
  - tenía
  - había
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'had', el hebreo expresa posesión mediante una construcción existencial. En español, 'le pertenecían' comunica posesión de forma idiomática sin perder el sentido de pertenencia.
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  lexicon: HALOT
  rationale: '''צֹאן'' abarca en sentido amplio el ganado menor, especialmente ovejas y cabras. Aquí se opta por ''ovejas'' como término claro y bíblicamente reconocible en español, manteniendo la distinción frente a ''vacas''.'
- source_word: וּבָקָר
  english_pob_choice: herds
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado mayor
  - reses
  lexicon: HALOT
  rationale: '''בָקָר'' se refiere al ganado bovino. ''Vacas'' conserva la concreción del referente en español y mantiene el paralelismo con ''ovejas''.'
- source_word: וְאֹהָלִים
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - carpas
  - campamentos
  lexicon: HALOT
  rationale: '''אֹהָלִים'' se traduce de forma directa como ''tiendas'', el término bíblico usual en español para las estructuras de habitación nómada.'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan estrechamente; no se registran revisiones aplicadas. La versión española conserva la sintaxis aditiva y la posesión existencial con una expresión idiomática de posesión.
  spanish_consistency_notes:
  - Se mantuvo 'Abram' para concordar con el texto fuente y el audit trail inglés.
  - Se evitó 'Cristo' u otra terminología no pertinente.
  - La nota de pie aclara la amplitud semántica de צֹאן frente a la concreción elegida en español.
