  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son adecuadas: «plantada», «prosperará», «viento del oriente» y «se secará». Para יבש, «se secará» preserva bien la imagen vegetal, aunque «se marchitará» sería posible. Se debe conservar también en español la explicación cultural del «viento del oriente» presente en el audit trail inglés.'
