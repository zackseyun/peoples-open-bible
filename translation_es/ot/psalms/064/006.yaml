translation:
  language: es
  text: 'Se aferran a un plan malvado[a]; hablan de tender trampas ocultas; dicen: «¿Quién los verá[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un mal asunto». El hebreo también puede entenderse como «un plan malvado» o «una artimaña perversa», porque la palabra puede significar «palabra», «asunto» o «cosa» además de un designio.
    reason: lexical_alternative
  - marker: b
    text: O «¿Quién nos verá?». Algunos intérpretes entienden que los conspiradores hablan de sí mismos de manera más directa; sin embargo, la forma hebrea es de tercera persona plural («los»/«ellos»).
    reason: alternative_reading
lexical_decisions:
- source_word: יְחַזְּקוּ
  english_pob_choice: they hold fast
  chosen_spanish: fortalecen para sí
  alternatives_spanish:
  - se aferran a
  - mantienen firme
  - fortalecen
  lexicon: HALOT
  rationale: El piel de חזק puede expresar hacer fuerte, firmar o sostener con firmeza. En este contexto de conspiración, «fortalecen para sí» conserva la fuerza verbal y la idea de consolidar deliberadamente un plan dañino, sin introducir un matiz demasiado interpretativo.
- source_word: לָמוֹ
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - para ellos mismos
  lexicon: HALOT
  rationale: 'La forma pronominal apunta a una referencia reflexiva en el contexto: el mal asunto se consolida en beneficio de los propios conspiradores. «Para sí» es natural en español y mantiene la idea reflexiva.'
- source_word: דָּבָר רָע
  english_pob_choice: an evil matter
  chosen_spanish: un mal asunto
  alternatives_spanish:
  - un plan maligno
  - un asunto malo
  - una mala cosa
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto», «cosa» o «materia». Dado el contexto de acecho y trampas, «asunto» conserva amplitud y evita reducirlo solo a «plan», aunque el sentido conspirativo siga presente. «Mal» preserva el valor moral del adjetivo.
- source_word: יְסַפְּרוּ
  english_pob_choice: they talk of
  chosen_spanish: hablan de
  alternatives_spanish:
  - comentan
  - discuten sobre
  - relatan
  lexicon: HALOT
  rationale: El verbo ספר en piel puede significar contar o relatar, pero aquí describe la conversación/maquinación en curso. «Hablan de» es idiomático en español y refleja la acción de discutir el ocultamiento de trampas.
- source_word: לִטְמוֹן
  english_pob_choice: laying hidden
  chosen_spanish: tender
  alternatives_spanish:
  - poner
  - ocultar
  - colocar
  lexicon: HALOT
  rationale: טמן significa ocultar o esconder. Con «trampas» en español, el verbo natural es «tender», que recoge la idea de preparar/colocar una trampa mientras se mantiene la noción de ocultamiento expresada por el contexto y el adjetivo «ocultas».
- source_word: מוֹקְשִׁים
  english_pob_choice: snares
  chosen_spanish: trampas
  alternatives_spanish:
  - redes
  - lazos
  - snares
  lexicon: HALOT
  rationale: מוֹקֵשׁ denota una trampa o lazo. «Trampas» es claro y natural para lectores en español; conserva la imagen de acecho sin sonar forzado.
- source_word: אָמְרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dijeron
  - decían
  lexicon: HALOT
  rationale: Aunque la forma es qatal, en poesía puede funcionar como discurso vivo o habitual. «Dicen» refleja bien la escena presente y continua del complot.
- source_word: מִי יִרְאֶה לָּמוֹ
  english_pob_choice: Who will see them?
  chosen_spanish: ¿Quién las verá?
  alternatives_spanish:
  - ¿Quién los verá?
  - ¿Quién nos verá?
  - ¿Quién verá esto?
  lexicon: HALOT
  rationale: La referencia pronominal de לָּמוֹ es tercera persona plural, por lo que «las» es la opción más directa si se entiende el antecedente implícito como las trampas. En castellano, esto evita la ambigüedad de «los» y mantiene el sentido de invisibilidad de las trampas ocultas. La alternativa «¿Quién nos verá?» queda implícitamente descartada por la lectura gramatical más directa.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: «hold fast to an evil plan» y «laying hidden snares». En español se mantuvo la idea de consolidación/adhesión con «fortalecen para sí» y se hizo explícita la acción de preparar trampas con «tender trampas ocultas», preservando el matiz de ocultamiento sin depender de una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se usa «trampas» para מוֹקְשִׁים de forma consistente con el campo semántico de caza/acecho.
  - 'Se mantiene el paralelismo verbal con tres miembros: consolidar, hablar, decir.'
  - La puntuación conserva el ritmo poético y la cita final en estilo directo.
  - El marcador [a] queda unido a la primera cláusula por la ambigüedad léxica de דָּבָר רָע; [b] marca la ambigüedad pronominal final.
