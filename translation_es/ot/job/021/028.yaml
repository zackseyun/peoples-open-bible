translation:
  language: es
  text: 'Porque ustedes dicen[a]: «¿Dónde está la casa del noble, y dónde está la tienda[b], la morada de los malvados?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirán». El hebreo usa el imperfecto en discurso directo para presentar una pregunta representativa o habitual.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea es compacta y puede entenderse como «la tienda donde habitan los malvados» o como una identificación apposicional: «la tienda, la morada de los malvados».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que se afirma como discurso representativo y mantiene la relación explicativa con el contexto anterior. «Porque» es natural en español al inicio de una cita introducida por la razón o el motivo del enunciado.
- source_word: תֹאמְרוּ
  english_pob_choice: you say
  chosen_spanish: ustedes dicen
  alternatives_spanish:
  - dirán
  - están diciendo
  lexicon: HALOT
  rationale: El imperfecto hebreo en discurso directo funciona aquí como presente representativo. «Ustedes dicen» conserva la fuerza de una declaración habitual o proverbial en español.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se encuentra
  - ¿Dónde queda
  lexicon: HALOT
  rationale: En español la pregunta exige una construcción copulativa; «¿Dónde está?» conserva la fuerza interrogativa sin añadir contenido interpretativo.
- source_word: בֵית
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - el palacio
  - la morada
  lexicon: HALOT
  rationale: «Casa» preserva la imagen básica del hebreo sin cargarla de una interpretación sociológica más específica que la del texto.
- source_word: נָדִיב
  english_pob_choice: noble man
  chosen_spanish: el noble
  alternatives_spanish:
  - el príncipe
  - el hombre noble
  - el generoso
  lexicon: HALOT
  rationale: נָדִיב puede referirse a alguien de rango social elevado o princely, no solo a una persona generosa. «El noble» mantiene esa amplitud de sentido y evita forzar una solución más estrecha.
- source_word: אֹהֶל
  english_pob_choice: tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el tabernáculo
  - la morada
  - la carpa
  lexicon: HALOT
  rationale: «Tienda» reproduce el término básico del hebreo y conserva la imagen original, aun cuando en contexto pueda aludir a una residencia estable o figurada.
- source_word: מִשְׁכְּנוֹת
  english_pob_choice: the dwelling place of
  chosen_spanish: la morada de
  alternatives_spanish:
  - el lugar de habitación de
  - las moradas de
  lexicon: HALOT
  rationale: El plural constructo hebreo puede funcionar de manera apposicional o explicativa respecto de «tienda». En español, «la morada de» expresa bien la función de lugar de residencia sin hacer la frase pesada.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: «Malvados» traduce el sustantivo/adjetivo plural sustantivado con naturalidad en español moderno y mantiene la categoría moral del original. «Impíos» sería más tradicional, pero menos transparente para un lector amplio.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa última prefirió «dwelling place» en lugar de «dwellings» para reflejar mejor el constructo hebreo. Por eso la versión española usa un singular natural («la morada de») que conserva la relación apposicional/complementaria y evita forzar un plural innecesario.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se evitó «SEÑOR» y también «Cristo/Mesías» porque no aparecen en el pasaje.
  - «Malvados» se eligió por claridad moderna, sin borrar la fuerza moral del hebreo רְשָׁעִים.
  - La puntuación de la cita busca reflejar la pregunta retórica y la coordinación de dos interrogantes en el hebreo.
