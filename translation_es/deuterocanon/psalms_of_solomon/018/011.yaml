translation:
  language: es
  text: Grande y glorioso es nuestro Dios[a], que habita en las alturas;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que habita en los lugares más altos» o «que habita en los cielos más altos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  lexicon: BDAG
  rationale: «Grande» conserva el sentido básico del adjetivo y funciona naturalmente en un contexto de alabanza; «poderoso» o «fuerte» desplazarían el énfasis hacia la fuerza más que hacia la grandeza o majestad.
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - honrado
  - lleno de gloria
  lexicon: BDAG
  rationale: «Glorioso» es la equivalencia española más natural en una doxología y mantiene de forma directa la referencia a la gloria divina.
- source_word: ἐν ὑψίστοις
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en los lugares más altos
  - en los cielos más altos
  lexicon: BDAG
  rationale: La expresión griega es literalmente una referencia a las cosas/lugares más altos; «en las alturas» suena idiomático en español y conserva la imagen espacial elevada sin añadir «cielos» que el griego no menciona explícitamente.
- source_word: κατοικῶν
  english_pob_choice: dwelling
  chosen_spanish: que habita
  alternatives_spanish:
  - que mora
  - que reside
  lexicon: BDAG
  rationale: El participio presente expresa una morada continua; «que habita» es natural, reverente y suficientemente cercano al valor aspectual del griego.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se conserva la lectura estable de alta concordancia entre el texto griego y la traducción inglesa de auditoría.
  spanish_consistency_notes:
  - Se mantiene «Dios» como equivalente de θεός, sin mayúsculas innecesarias en otros términos.
  - Se conserva un registro litúrgico claro y sobrio, acorde con una doxología breve.
  - La nota al pie refleja las alternativas semánticas documentadas para ἐν ὑψίστοις sin sobreespecificar «cielos» en el texto principal.
