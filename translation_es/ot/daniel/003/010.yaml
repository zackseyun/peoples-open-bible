translation:
  language: es
  text: 'Tú, rey, has promulgado un decreto: que todo hombre[a] que oiga el sonido de la trompeta, la flauta, la lira, el trígono, el salterio y la gaita[b], y todo género de música, se postre y adore la imagen de oro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todo el que’ / ‘toda persona’. El arameo usa una forma masculina singular con fuerza genérica.
    reason: lexical_alternative
  - marker: b
    text: O ‘doble flauta’ para ‘gaita’; la identificación exacta del nombre arameo del instrumento es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Vos
  lexicon: HALOT
  rationale: El pronombre independiente en segunda persona mantiene el tono de trato directo; en español, ‘Tú’ es natural y conserva la referencia enfática sin recargarla.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: HALOT
  rationale: La forma vocativa en el discurso cortesano se expresa mejor con ‘oh rey’, que conserva la solemnidad del trato directo.
- source_word: שָׂמְתָּ טְּעֵם
  english_pob_choice: have issued a decree
  chosen_spanish: has promulgado un decreto
  alternatives_spanish:
  - has emitido un decreto
  - has dado un decreto
  - has establecido un decreto
  lexicon: HALOT
  rationale: El modismo arameo literalmente es ‘poner/establecer un decreto’; en español, ‘promulgar un decreto’ transmite con naturalidad la fuerza legal y oficial del acto sin perder el sentido.
- source_word: כָל אֱנָשׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - todos
  lexicon: HALOT
  rationale: El singular masculino genérico se conserva como ‘todo hombre’, siguiendo la fuerza del original y la decisión de no suavizarlo a una forma más neutra cuando el texto no lo hace.
- source_word: יִשְׁמַע קָל
  english_pob_choice: hears the sound
  chosen_spanish: oiga el sonido
  alternatives_spanish:
  - escuche el sonido
  - oiga la voz
  lexicon: HALOT
  rationale: ‘Sonido’ es la equivalencia más directa para קָל en este contexto de instrumentos; el subjuntivo con valor eventual/procedimental en español refleja la cláusula legal del decreto.
- source_word: קַרְנָא
  english_pob_choice: horn
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - cuerno de carnero
  - trompa
  lexicon: HALOT
  rationale: Aunque el término básico es ‘horn’, en español bíblico y musical ‘trompeta’ comunica mejor el instrumento de llamada ceremonial sin forzar una identificación demasiado arcaica o ambigua.
- source_word: מַשְׁרֹקִיתָא
  english_pob_choice: pipe
  chosen_spanish: flauta
  alternatives_spanish:
  - flautín
  - chirimía
  - pito
  lexicon: HALOT
  rationale: Como instrumento de viento de identificación incierta, ‘flauta’ es una opción clara y digna en español; preserva el carácter de instrumento soplado sin afirmar más de lo que el término garantiza.
- source_word: קיתרס
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - cítara
  - kithara
  lexicon: HALOT
  rationale: El préstamo afín al griego se vierte como ‘lira’, término accesible en español que distingue este instrumento de los demás y respeta su carácter de cuerda.
- source_word: שַׂבְּכָא
  english_pob_choice: trigon
  chosen_spanish: trígono
  alternatives_spanish:
  - triángulo
  - trigon
  - arpa triangular
  lexicon: HALOT
  rationale: Se conserva la identificación tradicional del instrumento triangular mediante ‘trígono’; así se mantiene la singularidad del término y la incertidumbre moderada sobre su forma exacta.
- source_word: פְסַנְתֵּרִין
  english_pob_choice: psaltery
  chosen_spanish: salterio
  alternatives_spanish:
  - psalterio
  - arpa
  - cítara
  lexicon: HALOT
  rationale: ‘Salterio’ es la forma reconocible en español para este instrumento de cuerdas y distingue bien el vocablo frente a los demás de la lista.
- source_word: סִיפֹנְיָה
  english_pob_choice: bagpipe
  chosen_spanish: gaita
  alternatives_spanish:
  - doble flauta
  - flauta doble
  - gaita de fuelle
  lexicon: HALOT
  rationale: Sigo la rendición tradicional, pero en español ‘gaita’ comunica mejor que ‘bagpipe’; la incertidumbre sobre el instrumento exacto se conserva con una nota.
- source_word: וְכֹל זְנֵי זְמָרָא
  english_pob_choice: and every kind of music
  chosen_spanish: y todo género de música
  alternatives_spanish:
  - y toda clase de música
  - y todo tipo de música
  - y cualquier clase de música
  lexicon: HALOT
  rationale: La frase amplía la lista de instrumentos; ‘todo género de música’ mantiene el alcance inclusivo y el registro formal del decreto.
- source_word: יִפֵּל
  english_pob_choice: must fall down
  chosen_spanish: se postre
  alternatives_spanish:
  - caiga
  - debe postrarse
  - se incline
  lexicon: HALOT
  rationale: El verbo en contexto de decreto implica postración corporal obligatoria; ‘se postre’ expresa mejor la reverencia física requerida que un simple ‘caiga’.
- source_word: וְיִסְגֻּד
  english_pob_choice: and worship
  chosen_spanish: y adore
  alternatives_spanish:
  - y rinda homenaje
  - y se postre en adoración
  - y adore/proste
  lexicon: HALOT
  rationale: En el contexto cultual ante la imagen, ‘adorar’ conserva la fuerza religiosa del verbo; no se rebaja a un mero homenaje político.
- source_word: לְצֶלֶם דַּהֲבָא
  english_pob_choice: the golden image
  chosen_spanish: la imagen de oro
  alternatives_spanish:
  - la imagen dorada
  - el ídolo de oro
  lexicon: HALOT
  rationale: ‘Imagen de oro’ sigue de cerca la construcción aramea y mantiene el referente narrativo sin añadir la carga interpretativa de ‘ídolo’.
theological_decisions:
- issue: Valor genérico del masculino singular אֱנָשׁ
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - todos
  rationale: Se conserva la forma masculina genérica del original, evitando neutralizarla cuando el texto arameo la presenta así; esto preserva la precisión gramatical y el perfil del decreto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Naturaleza de la acción final ante la imagen
  english_pob_reading: must fall down and worship
  chosen_spanish_reading: se postre y adore
  alternative_spanish_readings:
  - caiga y adore
  - se incline y rinda homenaje
  rationale: La escena es cultual, no meramente protocolaria; por eso ‘adorar’ mantiene la dimensión religiosa de la exigencia y ‘postrarse’ conserva el gesto corporal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Identificación incierta de סִיפֹנְיָה
  english_pob_reading: bagpipe
  chosen_spanish_reading: gaita
  alternative_spanish_readings:
  - doble flauta
  - flauta doble
  - gaita de fuelle
  rationale: Como el instrumento exacto es incierto, se retiene una traducción tradicional y comprensible en español, sin afirmar más precisión de la que el término permite.
  doctrine_reference: DOCTRINE.md §Lexical caution and source transparency
translation_notes:
  revision_awareness: 'Revisión reciente: el expediente inglés fue reevaluado con alta concordancia (sin cambios sustanciales), así que la traducción española sigue de cerca sus decisiones léxicas y mantiene la misma cautela donde el instrumento arameo es incierto.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene ‘imagen de oro’ en vez de ‘ídolo’ para no añadir una interpretación no requerida por el texto.
  - Se traduce el conjunto de instrumentos con vocabulario español bíblico reconocible, evitando anglicismos y manteniendo la distinción entre nombres específicos y la cláusula general de música.
