review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite bien las dos preguntas retóricas del hebreo y conserva adecuadamente los sentidos principales de כֹּחִי, קִצִּי y el idiomatismo כִּי אַאֲרִיךְ נַפְשִׁי como continuación de la vida/endurecimiento. Sin embargo, «me queda» añade una idea de remanente no explícita en el hebreo, y la nota al pie está anclada en «fuerza» cuando en realidad explica la cláusula final «para que yo prolongue mi vida».
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para mayor precisión y fluidez. «¿Qué fuerza tengo...?» es más fiel y natural que «¿Qué fuerza me queda...?». La segunda pregunta funciona bien. La nota necesita reubicarse al segmento correcto y pulirse ligeramente para sonar más natural en español.
  glossary_alignment: No hay términos del glosario de proyecto especialmente controvertidos en este versículo. «fuerza», «mi fin» y «mi vida» están alineados con las decisiones auditadas. La principal cuestión es reflejar con fidelidad el idiomatismo hebreo mediante texto principal más nota correctamente ubicada.
  issues:
  - severity: medium
    issue: «me queda» agrega un matiz no explícito
    rationale: El hebreo dice simplemente «¿Qué fuerza tengo...?», no «¿qué fuerza me queda...?». Aunque el contexto de Job sugiere agotamiento, ese matiz adicional no está en la formulación fuente.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La nota explica la alternativa de «כִּי אַאֲרִיךְ נַפְשִׁי» (‘prolongue mi vida’ / ‘sea paciente’ / literal ‘alargue mi alma’), no «fuerza».
  - severity: low
    issue: Redacción mejorable de la nota
    rationale: «siga con paciencia» suena menos natural que «yo tenga paciencia» o «yo sea paciente», y conviene quitar comillas/apóstrofo sobrantes al inicio para mantener estilo limpio.
