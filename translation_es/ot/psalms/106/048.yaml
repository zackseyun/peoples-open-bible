review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayor parte de la doxología: «Bendito sea Yahvé», «el Dios de Israel», la fórmula temporal y «Y que todo el pueblo diga: “Amén”». Sin embargo, no preserva fielmente la decisión fuente sobre הַלְלוּ יָהּ, que el POB inglés traduce explícitamente como «Praise Yah», no como mera transliteración litúrgica. Además, las notas a y b están intercambiadas respecto de sus anclajes y contenidos.'
  spanish_quality_summary: 'El español es claro y natural, pero «Aleluya» en el texto principal pierde la distinción entre el nombre corto יָהּ y una transliteración tradicional. También hay un problema formal importante de notas: [a] aparece en «Yahvé» pero su nota habla de «Bendito sea Yah»; [b] aparece en «diga» pero su nota trata la frase temporal. La puntuación puede simplificarse manteniendo buena legibilidad.'
  glossary_alignment: «Yahvé» para יְהוָה está bien alineado con el glosario del proyecto. Pero para הַלְלוּ יָהּ el proyecto favorece «Alaben a Yah» / «Alabad a Yah» / «Alaben a Yah» según registro, no «Aleluya» en el texto principal, salvo carve-out documentado, que aquí no existe. La distinción Yahvé / Yah debe mantenerse en español como en el inglés auditado.
  issues:
  - severity: high
    issue: Se traduce הַלְלוּ יָהּ como «¡Aleluya!» en lugar de una traducción explícita.
    rationale: El original hebreo y la decisión auditada inglesa preservan el sentido léxico «Praise Yah». «Aleluya» translitera y oscurece tanto el imperativo como el nombre corto divino יָהּ.
  - severity: high
    issue: Las notas [a] y [b] están mal ancladas respecto al texto.
    rationale: La nota [a] está puesta tras «Yahvé» pero comenta otra expresión; la nota [b] está puesta tras «diga» pero contiene la alternativa para «desde la eternidad...». Esto incumple la disciplina de notas del proyecto.
  - severity: medium
    issue: 'La nota [a] contiene un contenido incorrecto: «Hebreo: “Bendito sea Yah”».'
    rationale: No corresponde al término anclado ni a la nota inglesa auditada. La nota relevante conservada en el POB trata «Praise Yah» / «Hallelujah», no «Blessed be Yah».
  - severity: low
    issue: «desde la eternidad y hasta la eternidad» es aceptable pero algo pesado.
    rationale: Una formulación como «desde la eternidad hasta la eternidad» o «de eternidad en eternidad» suena más fluida. No obstante, no es un error semántico.
  revised_spanish_text: 'Bendito sea Yahvé, el Dios de Israel, desde la eternidad hasta la eternidad[a]. Y que todo el pueblo diga: «¡Amén! ¡Alaben a Yah[b]!».'
  revised_footnotes:
