translation:
  language: es
  text: Cantaré para siempre del amor fiel[a] de Yahvé; de generación en generación daré a conocer tu fidelidad con mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordias» o «actos de amor fiel». El hebreo חַסְדֵי puede denotar el amor de pacto de Yahvé expresado en actos repetidos de misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדֵי
  english_pob_choice: steadfast love
  chosen_spanish: misericordias
  alternatives_spanish:
  - amor constante
  - amor leal
  - actos de misericordia
  - bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד / חַסְדֵי puede abarcar amor leal del pacto, bondad y actos de misericordia. En español, «misericordias» preserva bien la idea de acciones concretas de favor y evita una formulación demasiado abstracta; además, mantiene abierta la tensión entre la cualidad del amor y sus expresiones repetidas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino propio. Conforme al estándar del proyecto, se translitera como «Yahvé» para no sustituirlo por un título y conservar el valor del nombre del pacto.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - por toda la eternidad
  lexicon: HALOT
  rationale: Aquí funciona adverbialmente con el verbo «cantar». «Para siempre» es el equivalente natural en español y comunica continuidad duradera sin excesiva rigidez.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - cantaré yo
  - quiero cantar
  - cantaré en alabanza
  lexicon: HALOT
  rationale: El cohortativo expresa resolución o intención. En español, el futuro simple «cantaré» comunica adecuadamente ese compromiso voluntario y suena natural en un salmo.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - para cada generación
  - de una generación a otra
  - por todas las generaciones
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica continuidad sucesiva. «De generación en generación» reproduce de forma idiomática y precisa esa transmisión continua.
- source_word: אוֹדִיעַ
  english_pob_choice: I will make known
  chosen_spanish: daré a conocer
  alternatives_spanish:
  - haré saber
  - proclamaré
  - anunciaré
  lexicon: HALOT
  rationale: El hifil de ידע tiene el sentido de causar conocimiento o hacerlo saber. «Daré a conocer» conserva esa idea de comunicar activamente, con un registro natural y formal en español.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fe
  - tu lealtad
  - tu confiabilidad
  - tu verdad
  lexicon: HALOT
  rationale: Aquí אֱמוּנָה describe la confiabilidad y constancia de Dios. «Fidelidad» es el equivalente más claro en español y mantiene el paralelismo con las misericordias de Yahvé.
- source_word: בְּפִי
  english_pob_choice: with my mouth
  chosen_spanish: con mi boca
  alternatives_spanish:
  - con mis labios
  - por mi boca
  - de viva voz
  lexicon: HALOT
  rationale: La expresión hebrea es concreta y corporal. «Con mi boca» conserva la imagen del órgano de la proclamación y es el equivalente más directo y natural en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB en inglés opta por el nombre propio transliterado del Tetragrámaton. En español, «Yahvé» mantiene esa decisión sin convertir el nombre en un título y sigue la terminología estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: חֶסֶד como cualidad o actos
  english_pob_reading: 'steadfast love; footnote: mercies or acts of steadfast love'
  chosen_spanish_reading: misericordias
  alternative_spanish_readings:
  - amor constante
  - amor leal
  - actos de amor leal
  rationale: El texto admite tanto la idea de amor del pacto como la de manifestaciones concretas de misericordia. «Misericordias» en el cuerpo principal mantiene esa amplitud y deja abierta la posibilidad de entender múltiples actos de favor divino, como indica la nota inglesa.
  doctrine_reference: Lexical note in English POB footnote a
- issue: אֱמוּנָה aplicada a Dios
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - lealtad
  - constancia
  - veracidad
  rationale: En este contexto no se trata de fe humana sino de la confiabilidad de Dios. «Fidelidad» expresa bien el atributo divino y encaja con el paralelo poético del versículo.
  doctrine_reference: HALOT on אֱמוּנָה; poetic parallelism in Psalms 89:2
translation_notes:
  revision_awareness: 'Se revisó el rendimiento del pasaje respecto del audit trail inglés: no hubo cambios aplicados en la última pasada, y la traducción española conserva la misma lectura base con adaptación idiomática natural al español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para יְהוָה según la terminología del proyecto.
  - Se evita «Cristo» o vocabulario cristológico ajeno al versículo.
  - «Misericordias» mantiene la amplitud semántica de חַסְדֵי sin cerrar innecesariamente la tensión entre cualidad y actos.
  - «Fidelidad» traduce אֱמוּנָתְךָ en sentido relacional y covenantal, no como «fe» humana.
  - La sintaxis española sigue el paralelismo poético del hebreo con dos miembros coordinados por punto y coma.
