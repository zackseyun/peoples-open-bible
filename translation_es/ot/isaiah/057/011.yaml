translation:
  language: es
  text: ¿Y a quién temiste y tuviste miedo, que mentiste y no te acordaste de mí, ni lo tomaste a pecho[a]? ¿No fue porque yo he guardado silencio, incluso desde hace mucho tiempo[b], que no me temes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «no lo pusiste sobre tu corazón». El hebreo dice literalmente «no pusiste [eso] sobre tu corazón», es decir, no lo tomaste en serio ni lo consideraste interiormente.
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde antiguo» o «por mucho tiempo». El hebreo expresa un silencio prolongado que se extiende hacia el pasado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּאַגְתְּ
  english_pob_choice: did you dread
  chosen_spanish: temiste
  alternatives_spanish:
  - te angustiaste
  - te preocupaste
  lexicon: HALOT
  rationale: En este contexto de pregunta retórica junto con 'y temiste', el verbo expresa temor angustiado o inquietud ante otros. 'Temiste' conserva la fuerza del paralelo y funciona naturalmente en español.
- source_word: וַתִּירְאִי
  english_pob_choice: and fear
  chosen_spanish: te espantaste
  alternatives_spanish:
  - tuviste miedo
  - temiste
  lexicon: HALOT
  rationale: El paralelo hebreo intensifica el temor. 'Te espantaste' comunica el sobresalto o miedo vivido, manteniendo la coordinación con el verbo anterior sin volverlo redundante.
- source_word: כִּי תְכַזֵּבִי
  english_pob_choice: that you lied
  chosen_spanish: que mentiste
  alternatives_spanish:
  - porque mentiste
  - que actuaste con falsedad
  lexicon: HALOT
  rationale: El verbo כזב en piel suele significar mentir o actuar falsamente. 'Mentiste' es claro y directo en español, y conserva la acusación moral del texto.
- source_word: וְאוֹתִי לֹא זָכַרְתְּ
  english_pob_choice: and did not remember me
  chosen_spanish: y no te acordaste de mí
  alternatives_spanish:
  - y no me recordaste
  - y no me tuviste presente
  lexicon: HALOT
  rationale: זכר aquí es recuerdo relacional y covenantal. 'Acordarte de mí' suena natural en español y preserva esa dimensión personal sin perder el sentido cognitivo.
- source_word: לֹא שַׂמְתְּ עַל לִבֵּךְ
  english_pob_choice: did not lay it to your heart
  chosen_spanish: ni lo pusiste sobre tu corazón
  alternatives_spanish:
  - ni lo tomaste en cuenta
  - ni lo llevaste a tu corazón
  lexicon: HALOT
  rationale: La imagen hebrea de 'poner sobre el corazón' se conserva casi literalmente para mantener la metáfora interna, con 'lo' como referente idiomático del asunto no considerado.
- source_word: הֲלֹא
  english_pob_choice: Was it not because
  chosen_spanish: ¿No fue porque
  alternatives_spanish:
  - ¿No fue que
  - ¿Acaso no fue porque
  lexicon: HALOT
  rationale: La partícula introduce la explicación causal de la conducta. '¿No fue porque…?' comunica bien la relación explicativa sin forzar una perífrasis innecesaria.
- source_word: מַחְשֶׁה
  english_pob_choice: I have kept silent
  chosen_spanish: yo he guardado silencio
  alternatives_spanish:
  - yo he estado callado
  - yo he callado
  lexicon: HALOT
  rationale: חשה significa callar o guardar silencio. 'He guardado silencio' es idiomático en español y conserva el valor de una acción prolongada.
- source_word: וּמֵעוֹלָם
  english_pob_choice: even from long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde antiguo
  - desde hace mucho tiempo
  lexicon: HALOT
  rationale: עולם aquí alude a una duración prolongada hacia el pasado, no a eternidad abstracta. 'Desde hace mucho' preserva el énfasis temporal con naturalidad en español.
- source_word: וְאוֹתִי לֹא תִירָאִי
  english_pob_choice: that you do not fear me
  chosen_spanish: y no me temes
  alternatives_spanish:
  - y no me reverencias
  - y no me tienes temor
  lexicon: HALOT
  rationale: El temor debido a Dios se expresa bien con 'temes'. En la conclusión retórica, el presente español comunica el resultado de la larga silenciosidad divina y mantiene la tensión del texto.
theological_decisions:
- issue: Sentido de la silencio divino
  english_pob_reading: God's prolonged silence/patience is presented as the occasion for Israel's failure to fear him, without implying divine indifference or approval.
  chosen_spanish_reading: El prolongado silencio de Dios aparece como ocasión de la falta de temor de Israel, sin sugerir indiferencia divina ni aprobación del pecado.
  alternative_spanish_readings:
  - El silencio de Dios implica retiro absoluto
  - El silencio de Dios significa desaprobación tácita
  rationale: 'La frase final debe conservar la tensión del texto: Dios ha guardado silencio ''desde hace mucho'', pero eso no equivale a ausencia moral o consentimiento. La redacción española mantiene esa relación causal sin resolverla de más.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada de «so that» a una relación más directa con «that», y de «and that from long ago» a «even from long ago» para mayor naturalidad. La redacción española refleja esa misma relación directa y el matiz de silencio prolongado sin añadir explicaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» según la convención del proyecto para אֱלֹהִים/θεός, y no aparece el Tetragrámaton en este versículo.
  - Se conserva la metáfora de «poner sobre tu corazón» para sostener el paralelismo hebreo, aunque el español idiomático admite también «tomarlo en cuenta».
  - «Temer» se usa con el valor reverencial/moral del texto; aquí no se suaviza a mera preocupación.
  - «Mentiste» refleja la acusación de falsedad de כזב sin añadir matices ajenos al contexto.
