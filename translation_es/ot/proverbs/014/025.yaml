base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/025.yaml
  text: A truthful witness rescues lives[c][b][a], but one who breathes out lies is deceitful.
  footnotes:
  - marker: a
    text: Or, 'A true witness delivers souls/persons.' Here 'lives' reflects Hebrew nephashot in the sense of persons or lives preserved, not specifically immaterial souls.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'breathes out lies.' The Hebrew uses vivid speech imagery for uttering falsehood.
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be rendered more literally, 'and one who breathes out lies is deceit,' or understood adverbially, 'breathes out lies deceitfully.'
    reason: alternative_reading
