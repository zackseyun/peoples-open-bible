translation:
  language: es
  text: 'Y Jeremías escribió en un solo rollo toda la calamidad que vendría sobre Babilonia: todas estas palabras escritas contra Babilonia[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escritas acerca de Babilonia». La preposición hebrea puede traducirse más literalmente, pero aquí introduce el contenido y la dirección profética de las palabras sobre el juicio de Babilonia.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió por escrito
  - registró
  lexicon: HALOT
  rationale: El verbo כתב en narración se vierte con naturalidad como «escribió». En español, «escribió» comunica la acción de poner por escrito sin sobrecargar el estilo.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: toda la desgracia
  alternatives_spanish:
  - todo el mal
  - toda la calamidad
  lexicon: HALOT
  rationale: En contexto profético de juicio, רָעָה apunta a una desgracia/calamidad venidera más que a maldad moral. «Desgracia» conserva ese sentido de infortunio judicial y suena natural en español.
- source_word: אֲשֶׁר תָּבוֹא אֶל־בָּבֶל
  english_pob_choice: that would come upon Babylon
  chosen_spanish: que vendría sobre Babilonia
  alternatives_spanish:
  - que vendría a Babilonia
  - que venía contra Babilonia
  lexicon: HALOT
  rationale: Con בוא + אֶל en este marco de juicio, el español idiomático pide «sobre» para expresar impacto adverso. «Vendría» refleja el valor futuro del verbo hebreo.
- source_word: אֶל־סֵפֶר אֶחָד
  english_pob_choice: in a single scroll
  chosen_spanish: en un solo rollo
  alternatives_spanish:
  - en un solo libro
  - en un único rollo
  lexicon: HALOT
  rationale: סֵפֶר aquí designa un rollo o documento escrito antiguo, no un libro moderno. «Un solo rollo» preserva mejor el referente histórico.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos dichos
  lexicon: HALOT
  rationale: דְּבָרִים puede referirse a palabras/oráculos. «Palabras» conserva el énfasis en el contenido verbal-profético sin forzar una paráfrasis.
- source_word: הַכְּתֻבִים
  english_pob_choice: written
  chosen_spanish: escritas
  alternatives_spanish:
  - escritos
  - inscritas
  lexicon: HALOT
  rationale: 'Como participio pasivo que modifica «palabras», en español concuerda en femenino plural: «palabras escritas». Mantiene la brevedad del original.'
- source_word: אֶל־בָּבֶל
  english_pob_choice: against Babylon
  chosen_spanish: contra Babilonia
  alternatives_spanish:
  - respecto de Babilonia
  - acerca de Babilonia
  lexicon: HALOT
  rationale: Sigo la revisión final del POB en inglés que prefirió «against Babylon», porque el contexto es un oráculo de juicio. «Contra Babilonia» expresa mejor la dirección adversativa del texto.
translation_notes:
  revision_awareness: He seguido el pase de revisión más reciente del POB en inglés, que cambió «concerning Babylon» por «against Babylon» para reflejar mejor el sentido adversativo. La redacción española refleja esa decisión y conserva el matiz textual del hebreo mediante la nota.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el pasaje lo requiriera; aquí no aparece el tetragrámaton.
  - Mantuve «Babilonia» como topónimo estándar en español.
  - Opté por «rollo» para סֵפֶר en coherencia con el soporte material antiguo señalado por el audit trail.
  - Conservé el paralelismo del versículo y la separación con dos puntos para reflejar el cierre explicativo del original.
