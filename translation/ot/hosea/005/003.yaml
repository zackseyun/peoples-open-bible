theological_decisions:
- issue: Metaphorical force of sexual language for covenant unfaithfulness
  chosen_reading: Retain explicit prostitution imagery in the main text
  alternative_readings:
  - Render more generally as 'been unfaithful'
  rationale: Hosea's theology of covenant infidelity is intentionally expressed through sexualized metaphor. Softening the image would reduce the prophetic force and import interpretation beyond the Hebrew's concrete wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Aspect of divine knowledge
  chosen_reading: Use present 'I know' rather than past 'I knew'
  alternative_readings:
  - I knew
  - I have known
  rationale: The verse emphasizes God's ongoing, immediate knowledge and the impossibility of Israel's concealment. Present tense in English preserves that theological emphasis without denying the Hebrew perfect form.
  doctrine_reference: Translation philosophy §§1, 6
