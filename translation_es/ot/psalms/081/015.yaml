review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: כִּמְעַט como cercanía temporal, אַכְנִיעַ como sometimiento, y el modismo אָשִׁיב יָדִי como acción hostil/judicial contra los adversarios. Sin embargo, no preserva adecuadamente la decisión contextual del POB inglés sobre la modalidad condicional del pasaje: en este contexto contrafactual (''si mi pueblo hubiera escuchado...''), el español debe reflejar mejor ''would subdue / would turn'' que un futuro simple.'
  spanish_quality_summary: El español es claro y natural, pero el futuro simple ('someteré', 'volveré') suena demasiado como promesa directa realizada, no como consecuencia no realizada condicionada por la desobediencia de Israel. Además, 'volveré mi mano contra' es comprensible, pero 'volvería mi mano contra' encaja mejor con el contexto y mantiene el modismo con buena legibilidad. Las notas son útiles, aunque la nota b debe normalizar comillas y estilo.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'enemigos' y 'adversarios' distinguen bien los dos términos hebreos. 'mano' conserva correctamente la imagen idiomática. El punto principal es alinear la modalidad verbal con la rationale documentada del POB inglés.
  issues:
  - severity: high
    issue: Modalidad verbal inadecuada en el contexto del salmo
    rationale: El POB inglés documenta explícitamente que los imperfectos aquí deben reflejar una acción contingente/no realizada ('I would subdue ... and turn'). El borrador usa futuro simple ('someteré', 'volveré'), que en español comunica más naturalmente una promesa futura directa y debilita el marco condicional de 81:13-15.
  - severity: low
    issue: Estilo tipográfico de la nota b
    rationale: La nota b abre con comilla simple innecesaria y poco natural en español. Conviene normalizarla a una formulación limpia.
  revised_spanish_text: Dentro de poco[a] sometería a sus enemigos, y volvería mi mano contra sus adversarios[b].
  revised_footnotes:
  - marker: a
    text: «Dentro de poco» también puede entenderse como «pronto». El hebreo כִּמְעַט expresa cercanía temporal; menos probablemente aquí, «casi».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «volvería mi mano sobre sus adversarios», un modismo para dirigir poder en juicio contra ellos.'
    reason: lexical_alternative
  revision_rationale: 'Se cambia el futuro simple a condicional simple para preservar la fuerza contextual documentada por el POB inglés: Dios describe lo que habría hecho por Israel si hubiera escuchado. Se mantiene ''Dentro de poco'' como buena representación de כִּמְעַט, y se conserva el modismo de la mano con español natural. También se limpia el estilo de la nota b sin alterar su contenido esencial.'
