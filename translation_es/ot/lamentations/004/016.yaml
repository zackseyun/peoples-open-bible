translation:
  language: es
  text: El rostro de Yahvé[a] los dispersó; ya no los mirará. No mostraron respeto por los sacerdotes[b]; no mostraron favor a los ancianos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La presencia de Yahvé los dispersó; ya no los mirará».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no levantaron el rostro de los sacerdotes»; es decir, no les mostraron consideración ni respeto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no tuvieron misericordia con los ancianos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵי יְהוָה
  english_pob_choice: The face of Yahweh
  chosen_spanish: El rostro de Yahvé
  alternatives_spanish:
  - La presencia de Yahvé
  - Yahvé mismo
  lexicon: HALOT
  rationale: פָּנִים/פְּנֵי puede ser literalmente «rostro» y también funcionar idiomáticamente como «presencia». Mantener «rostro» conserva la imagen concreta y poética del hebreo, mientras que «Yahvé» respeta el nombre divino según el criterio de la obra.
- source_word: חִלְּקָם
  english_pob_choice: has scattered them
  chosen_spanish: los dispersó
  alternatives_spanish:
  - los dividió
  - los repartió
  lexicon: HALOT
  rationale: En este contexto de juicio, el verbo expresa dispersión. «Dispersó» comunica mejor el efecto del acto divino en español sin perder la base léxica de «dividir».
- source_word: לֹא יוֹסִיף לְהַבִּיטָם
  english_pob_choice: he will no longer look on them
  chosen_spanish: no volverá a mirarlos
  alternatives_spanish:
  - ya no los mirará
  - no seguirá mirándolos
  lexicon: HALOT
  rationale: La construcción hebrea con לֹא יוֹסִיף expresa cese de acción continuada; en español, «no volverá a» reproduce con naturalidad ese valor de «ya no / no más». «Mirarlos» preserva el sentido de נבט como mirar sobre o hacia alguien.
- source_word: לֹא נָשָׂאוּ
  english_pob_choice: They showed no regard for
  chosen_spanish: No mostraron respeto por
  alternatives_spanish:
  - No tuvieron consideración por
  - No honraron a
  lexicon: HALOT
  rationale: נָשָׂא פָּנִים es un modismo de mostrar favor, consideración o respeto. «Mostraron respeto por» expresa el valor idiomático sin traducir de forma literal y opaca como «alzaron el rostro de».
- source_word: זקנים
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los líderes ancianos
  lexicon: HALOT
  rationale: El término puede referir a personas de edad o a ancianos del pueblo como grupo de liderazgo. En español, «ancianos» mantiene esa posible doble resonancia y es claro en contexto poético.
- source_word: לֹא חָנָנוּ
  english_pob_choice: they showed no favor to
  chosen_spanish: no tuvieron favor con
  alternatives_spanish:
  - no tuvieron misericordia con
  - no fueron benignos con
  lexicon: HALOT
  rationale: חנן suele significar mostrar favor, gracia o misericordia. «Tuvieron favor con» conserva el campo semántico de favor/gracia; la negación expresa la ausencia de trato benigno. En español suena más natural con la preposición «con» en esta construcción relacional.
theological_decisions:
- issue: Antropomorfismo divino en «rostro de Yahvé»
  english_pob_reading: Retain 'The face of the LORD' rather than flattening to an abstract expression alone.
  chosen_spanish_reading: Conservar «El rostro de Yahvé» en vez de reducirlo solo a «la presencia de Yahvé».
  alternative_spanish_readings:
  - La presencia de Yahvé los dispersó
  - Yahvé los dispersó
  rationale: El hebreo usa imaginería concreta y antropomórfica. Mantener «rostro» preserva la fuerza poética y la tensión teológica del texto sin implicar una doctrina corporal sobre Dios.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene la imagen de «rostro» para פְּנֵי יְהוָה, resuelve חִלְּקָם como dispersión en contexto de juicio, reproduce el cese de mirar con «no volverá a mirarlos», y conserva el modismo de נָשָׂאוּ / חָנָנוּ mediante equivalentes naturales en español. No se detectaron revisiones posteriores que exigieran cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «rostro» para פְּנֵי cuando la imagen concreta aporta valor poético.
  - Se traduce el modismo de mostrar favor/consideración con lenguaje natural en español, sin literalismo opaco.
  - «Ancianos» se eligió para reflejar tanto edad como función comunitaria posible en el contexto.
