translation:
  language: es
  text: También para ti, Judá, se ha señalado una cosecha[a], cuando yo restaure las fortunas[b] de mi pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se ha establecido una cosecha para ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando yo restaure el cautiverio de mi pueblo». La expresión hebrea también puede significar «cuando yo restaure las fortunas de mi pueblo».'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Incluso
  lexicon: HALOT
  rationale: Conserva el valor aditivo de גַּם al sumar a Judá al oráculo anterior; «También» es natural y directo en español bíblico moderno.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; se mantiene la forma tradicional y reconocible del nombre del pueblo/reino.
- source_word: שָׁת
  english_pob_choice: is appointed
  chosen_spanish: se ha señalado
  alternatives_spanish:
  - se ha establecido
  - ha sido fijada
  - se ha preparado
  lexicon: HALOT
  rationale: El verbo sugiere poner, fijar o establecer; «se ha señalado» comunica que la cosecha está fijada/prevista para Judá sin endurecer el matiz con una expresión demasiado literal.
- source_word: קָצִיר
  english_pob_choice: a harvest
  chosen_spanish: una cosecha
  alternatives_spanish:
  - una siega
  - una cosecha de juicio
  - una cosecha
  lexicon: HALOT
  rationale: «Cosecha» es la equivalencia más natural y clara en español para קָצִיר. Se evita especificar juicio o bendición en el texto principal para conservar la tensión contextual del pasaje.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti misma
  - a ti
  lexicon: HALOT
  rationale: La segunda persona femenina singular concuerda con Judá como entidad gramatical femenina; «para ti» es idiomático en español y preserva la función dativa.
- source_word: בְּשׁוּבִי
  english_pob_choice: when I restore
  chosen_spanish: cuando yo restaure
  alternatives_spanish:
  - cuando yo vuelva
  - al volver yo
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo puede sonar literalmente como «en mi volver», pero en la fórmula profética de restauración el sentido idiomático es mejor expresado como «cuando yo restaure».
- source_word: שְׁבוּת
  english_pob_choice: the fortunes of
  chosen_spanish: las fortunas de
  alternatives_spanish:
  - la cautividad de
  - la suerte de
  - el cautiverio de
  lexicon: HALOT
  rationale: «Fortunas» mantiene el valor restaurativo idiomático de la expresión hebrea sin reducirla únicamente a cautiverio literal. Se conserva la ambigüedad histórica y semántica del hebreo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo amado
  lexicon: HALOT
  rationale: «Mi pueblo» es la expresión covenantal natural en español y corresponde de manera transparente a עַמִּי.
theological_decisions:
- issue: Cómo rendir la expresión profética de restauración שְׁבוּת עַמִּי sin resolverla interpretativamente
  english_pob_reading: when I restore the fortunes of my people, with a footnote allowing 'when I return the captivity of my people.'
  chosen_spanish_reading: cuando yo restaure las fortunas de mi pueblo, con nota que permita 'cuando yo vuelva el cautiverio de mi pueblo'
  alternative_spanish_readings:
  - cuando yo recupere la suerte de mi pueblo
  - cuando yo traiga de vuelta a mi pueblo del cautiverio
  rationale: La frase hebrea admite un giro idiomático de restauración de la suerte/fortunas, pero también puede conservar un matiz más literal de cautiverio. El español principal sigue el sentido restaurativo natural, mientras la nota preserva la alternativa formal sin borrar la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Si la 'cosecha' debe especificarse como juicio o bendición en el texto principal
  english_pob_reading: Retain the metaphor as 'a harvest' without specifying blessing or judgment
  chosen_spanish_reading: Retener la metáfora como 'una cosecha' sin calificarla como juicio o bendición
  alternative_spanish_readings:
  - una cosecha de juicio
  - una cosecha de restauración
  rationale: El contexto inmediato de Oseas favorece lecturas de juicio, pero la cláusula final introduce lenguaje de restauración. Para no imponer una interpretación que el texto no explicita en la misma línea, se conserva la metáfora abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al colocar «para ti» al inicio de la cláusula dativa, reflejando mejor el orden hebreo y manteniendo una redacción natural. También conserva la decisión de no interpretar explícitamente la cosecha como juicio o bendición en el texto principal, y de dejar abierta en nota la oscilación de שְׁבוּת entre «cautiverio» y «fortunas».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma POB por defecto cuando el tetragrámaton está presente; aquí no aparece en el versículo, por lo que no aplica.
  - Se mantiene «Judá» como nombre propio estándar y no como adjetivo.
  - «Cosecha» se eligió por claridad y naturalidad; no se sustituyó por términos eclesiásticos más tradicionales sin base léxica.
  - Se preserva el paralelismo sintáctico sencillo del hebreo con una sola oración principal y una subordinada temporal.
  - La nota de pie para שְׁבוּת evita eliminar la alternativa literal de 'cautiverio' mientras el texto principal usa el giro idiomático de restauración.
