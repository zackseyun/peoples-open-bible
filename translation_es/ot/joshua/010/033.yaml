- from: Entonces Horam, rey de Gezer, subió[a] para ayudar a Laquis, y Josué lo hirió a él y a su pueblo hasta no dejarle ningún sobreviviente[b].
  to: Entonces Horam, rey de Gezer, subió para ayudar a Laquis, y Josué lo derrotó a él y a su pueblo hasta no dejarle ningún sobreviviente[a].
  rationale: Se reemplaza «lo hirió a él» por «lo derrotó a él» para reflejar mejor el valor contextual de וַיַּכֵּהוּ en una escena de victoria militar total. Se elimina la nota sobre «subió» porque no es necesaria para la fidelidad ni para la claridad en español. Se conserva la nota léxica sobre שָׂרִיד, alineada con el audit trail inglés.
