translation:
  language: es
  text: Sembraron campos y plantaron viñedos[a], y produjeron el fruto de la cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «e hicieron fruto de producción» o «e hicieron fruto de cosecha».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְרְעוּ
  english_pob_choice: they sowed
  chosen_spanish: sembraron
  alternatives_spanish:
  - sembraron semillas
  - cosecharon y sembraron
  lexicon: HALOT
  rationale: El verbo hebreo זרע en qal wayyiqtol expresa la acción concreta de sembrar. «Sembraron» conserva el sentido agrícola directo y funciona con naturalidad en español.
- source_word: שָׂדוֹת
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos de cultivo
  - tierras
  lexicon: HALOT
  rationale: El plural de שָׂדֶה puede referirse a campos cultivados o tierras de labor. «Campos» es una equivalencia natural y suficientemente amplia en español; mantiene la imagen agrícola sin sobreespecificar.
- source_word: וַיִּטְּעוּ
  english_pob_choice: planted
  chosen_spanish: plantaron
  alternatives_spanish:
  - establecieron
  - pusieron
  lexicon: HALOT
  rationale: נטע suele usarse para plantar, especialmente árboles o viñedos. «Plantaron» refleja de forma directa esa acción concreta.
- source_word: כְרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñedos
  alternatives_spanish:
  - viñas
  lexicon: HALOT
  rationale: כֶּרֶם designa un viñedo como unidad cultivada. «Viñedos» preserva el valor colectivo mejor que «viñas».
- source_word: וַיַּעֲשׂוּ פְּרִי תְבוּאָה
  english_pob_choice: produced the fruit of the harvest
  chosen_spanish: produjeron el fruto de la cosecha
  alternatives_spanish:
  - produjeron el fruto del producto
  - hicieron fruto de la cosecha
  lexicon: HALOT
  rationale: עשה con פְּרִי תְבוּאָה expresa literalmente algo como «hacer fruto de producto/cosecha». «Produjeron el fruto de la cosecha» mantiene la relación léxica entre fruto y cosecha, pero en español evita una literalidad torpe.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «a fruitful harvest» a «the fruit of the harvest» para acercarse más a פְּרִי תְבוּאָה. La propuesta española sigue esa revisión y conserva la imagen doble de fruto/cosecha sin diluirla en una paráfrasis.
  spanish_consistency_notes:
  - Se usa vocabulario agrícola concreto y sobrio para mantener el paralelismo hebreo.
  - No se introducen términos teológicos ajenos al versículo.
  - «Campos» y «viñedos» conservan el plural poético del hebreo.
