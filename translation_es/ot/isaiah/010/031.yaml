translation:
  language: es
  text: Madmenah ha huido[a]; los habitantes de Gebim han buscado refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha escapado» o «se ha alejado»; el hebreo de este verbo es difícil y aquí puede referirse a una huida apresurada. También: «han tomado refugio» o «han huido para ponerse a salvo» para el verbo final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָדְדָה
  english_pob_choice: has fled
  chosen_spanish: ha huido
  alternatives_spanish:
  - ha escapado
  - ha vagado lejos
  lexicon: HALOT
  rationale: El verbo hebreo נדד puede expresar huida o desplazamiento forzado. En este contexto de alarma militar, «ha huido» comunica bien la acción completa sin forzar una paráfrasis.
- source_word: מַדְמֵנָה
  english_pob_choice: Madmenah
  chosen_spanish: Madmená
  alternatives_spanish:
  - Madmena
  - Madmenah
  lexicon: nombre propio / transliteración
  rationale: Se mantiene el topónimo, adaptado a la ortografía española con acento prosódico natural. No se traduce como sustantivo común.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitan en
  - los residentes de
  lexicon: HALOT
  rationale: El participio sustantivado de ישב funciona como colectivo. «Los habitantes de» preserva el valor grupal y suena natural en español bíblico contemporáneo.
- source_word: הַ/גֵּבִים
  english_pob_choice: Gebim
  chosen_spanish: Guebín
  alternatives_spanish:
  - Gebim
  - Guebim
  lexicon: nombre propio / transliteración
  rationale: Se conserva el topónimo y se adapta a una forma castellana de lectura fluida. El artículo hebreo no se reproduce en español porque forma parte de la estructura nominal original, no del nombre mismo.
- source_word: הֵעִיזוּ
  english_pob_choice: have sought refuge
  chosen_spanish: han buscado refugio
  alternatives_spanish:
  - han tomado refugio
  - han huido para ponerse a salvo
  lexicon: HALOT
  rationale: La forma hiphil de עוז/עזז es difícil y puede implicar apresurarse hacia la seguridad o refugiarse. «Han buscado refugio» mantiene la fuerza de movimiento hacia protección sin imponer una lectura demasiado literal de «mostrar valor».
theological_decisions:
- issue: Lectura del verbo final difícil (protección/huida frente a valentía literal)
  english_pob_reading: have sought refuge; the Hebrew verb here is difficult and may convey hurried action for protection.
  chosen_spanish_reading: han buscado refugio; el hebreo del verbo es difícil y puede implicar acción apresurada para ponerse a salvo.
  alternative_spanish_readings:
  - han tomado refugio
  - han huido para ponerse a salvo
  - han mostrado valor
  rationale: Se sigue la lectura contextual del POB inglés y se evita la acepción literal de ‘fortalecer/se mostrar fuerte’, que no encaja bien en la secuencia de juicio y pánico asirio.
  doctrine_reference: Isaías 10:31; nota léxica sobre עוז/עזז en contexto de crisis militar
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió «seek refuge» por «have sought refuge» para reflejar mejor el valor verbal completo y mantener un estilo narrativo formal. La versión española conserva ese aspecto perfectivo con «han buscado refugio».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - 'Se traduce el participio sustantivado de ישב con un colectivo natural en español: «los habitantes de».'
  - Se preserva la ambigüedad del verbo final en una nota, sin imponer una traducción mecánica que borre la tensión léxica documentada.
