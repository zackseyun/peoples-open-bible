translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; el hebreo mantiene la fórmula narrativa simple וַיַּעַן ... וַיֹּאמַר, sin variantes textuales relevantes. Por eso la traducción española conserva la estructura de doble verbo con un equivalente idiomático.
  spanish_consistency_notes:
  - Se mantiene la puntuación con dos puntos al final para reflejar la introducción de discurso directo.
  - Se usa «respondió y dijo» como fórmula bíblica clara y fiel, evitando una sola paráfrasis que borraría la estructura hebrea.
