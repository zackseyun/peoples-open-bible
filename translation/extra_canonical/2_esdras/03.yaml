translation:
  text: |-
    1 In the thirtieth year after the ruin of the city, I was in Babylon—I, Salathiel, who am also Ezra—and as I lay back on my bed I was troubled, and my thoughts came up over my heart,
    2 because I saw the desolation of Zion and the abundance of those who lived in Babylon.
    3 And my spirit was greatly stirred, and I began to speak fearful words to the Most High,
    4 and I said: “O Lord who rules, did you not speak at the beginning, when you formed the earth—and this you did alone—and command the dust,
    5 and it gave you Adam, a dead body? Yet he too was the work of your hands, and you breathed into him the spirit of life, and he became living before you.
    6 And you brought him into paradise, which your right hand had planted before the earth appeared.
    7 And to him you gave your one command; but he transgressed it, and at once you appointed death for him and for his descendants, and from him were born nations and tribes, peoples and clans, without number.
    8 And each nation walked in its own will, and acted impiously before you and despised you, and you did not hinder them.
    9 Yet again, in time, you brought the flood upon the inhabitants of the world, and destroyed them.
    10 And the same fate came upon them all: as death came to Adam, so the flood came to them.
    11 But you left one of them, Noah with his household; from him came all the righteous.
    12 And it happened that when those who lived on the earth began to multiply, they begot children and peoples and many nations, and they began again to act impiously, more than those before them.
    13 And it happened, when they were committing iniquity before you, you chose for yourself one man from among them,
    14 whose name was Abraham. You loved him, and to him alone you showed the end of the times secretly, by night.
    15 And you established with him an everlasting covenant, and said that you would never forsake his seed. And you gave him Isaac; and to Isaac you gave Jacob and Esau. But Jacob you set apart for yourself, and Esau you separated, and Jacob became
    16 a great multitude.
    17 And it happened, when you were leading his seed out of Egypt and bringing them to Mount Sinai,
    18 you bent down the heavens and set the earth in place, and shook the world,
    19 and made the depths tremble and troubled the age. And your glory passed through the four gates—fire and earthquake and wind and frost—that you might give the law to the seed of Jacob, and your commandment to the generation of Israel.
    20 Yet you did not take away from them the evil heart, so that your law might bear fruit in them.
    21 For the first Adam, burdened with an evil heart, transgressed and was overcome; and so also did all who were born from him.
    22 Thus the weakness became permanent, and the law was in the heart of the people along with the evil root; and what was good departed, and the evil remained.
    23 So the times passed and the years were brought to an end, and you raised up for yourself a servant named David.
    24 And you told him to build a city for your name, and in it to offer to you offerings from what is yours.
    25 And this went on for many years. Then those who lived in the city sinned,
    26 doing in everything as Adam and all his generations had done; for they too made use of the evil heart.
    27 And you gave your city into the hands of your enemies.
    28 Then I said in my heart: ‘Do those who live in Babylon act better, and is that why Babylon has gained dominion over Zion?’
    29 But when I came here and saw impieties beyond number, my soul saw many sinners in this thirtieth year, and my heart overflowed.
    30 For I saw how you endure those who sin and spare those who act impiously, but destroy your people and preserve your enemies, and have not made clear to anyone at all how this way should be abandoned.
    31 Does Babylon act better than Zion?
    32 Or what other nation has known you besides Israel? Or what tribes have believed your covenants as this Jacob has?
    33 Yet their reward has not appeared, nor has their labor borne fruit. For I have passed through the nations and seen them abounding, though they do not remember your commandments.
    34 Now therefore weigh our iniquities in the balance, and those of the inhabitants of the world; and the turning of the scale will be found at the point where it inclines.
    35 Or when have those who dwell on the earth not sinned in your sight? Or what nation has so kept your commandments?
    36 Men by name you may find who have kept your commandments, but nations you will not find.”
