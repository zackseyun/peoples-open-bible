review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: doble comparación con בְּתוֹךְ, repetición léxica de desolación, y referencia de 3ms a Egipto en «sus ciudades». Sin embargo, «serán desolados» suena poco natural en español para tierras/pueblo/ciudades, y «estarán» para תִּהְיֶינָה es menos directo que «serán» en una cláusula copulativa de estado. La nota alternativa también puede formularse con español más natural.'
  spanish_quality_summary: La redacción es en general clara y fiel, pero requiere un ajuste menor para mejorar la naturalidad y dignidad del español sin perder correspondencia léxica. «Quedarán desolados» preserva el resultado pasivo mejor que el calco «serán desolados». «Serán» encaja mejor que «estarán» con «entre ciudades en ruinas».
  glossary_alignment: No hay términos del glosario mayor en juego. Se mantiene correctamente la repetición שׁמם con «desolados/desoladas», y «ciudades en ruinas» comunica bien נַחֲרָבוֹת. «Sus ciudades» es apropiado para וְעָרָיו.
  issues:
  - severity: medium
    issue: «Serán desolados» es un calco poco idiomático en español bíblico actual.
    rationale: Aunque sigue el ajuste del inglés auditado («will be desolated»), en español suena forzado. «Quedarán desolados» conserva el sentido resultativo-pasivo del nifal y mejora mucho la legibilidad.
  - severity: low
    issue: «Estarán» para תִּהְיֶינָה es menos natural que «serán» en esta cláusula nominal.
    rationale: 'Aquí היה funciona como cópula sencilla: «sus ciudades serán entre ciudades en ruinas». «Serán» corresponde más directamente al hebreo y evita un matiz locativo/temporal innecesario de «estarán».'
  - severity: low
    issue: La nota al pie puede expresarse con puntuación más natural en español.
    rationale: 'Conviene evitar comillas y dos puntos innecesariamente recargados; basta con «O bien: “...”».'
  revised_spanish_text: Quedarán desolados entre tierras desoladas[a], y sus ciudades serán entre ciudades en ruinas.
  revised_footnotes:
  - marker: a
    text: 'O bien: «en medio de tierras desoladas ... en medio de ciudades en ruinas».'
    reason: alternative_reading
  revision_rationale: Se corrige un calco poco natural («serán desolados») por una forma española más idiomática que conserva la fuerza resultativa del nifal, y se ajusta «estarán» a «serán» para reflejar mejor la cópula hebrea. La nota se mantiene con redacción española más natural.
