translation:
  language: es
  text: Estos fueron los hijos de Abijaíl, hijo de Huri[a], hijo de Jaroah, hijo de Galaad, hijo de Micael, hijo de Jeshishai, hijo de Jahdo, hijo de Buz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'hijos de' y la repetición de 'hijo de' pueden funcionar genealógicamente para una línea familiar y no siempre requieren que se liste explícitamente cada generación.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: El demostrativo plural introduce una genealogía registrada. En español, el pasado fluye mejor para presentar una lista genealógica como dato histórico, en paralelo con la opción inglesa.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: HALOT
  rationale: En genealogías, בן puede conservar la forma relacional de parentesco. 'Hijos de' refleja con fidelidad la estructura hebrea y es natural en español bíblico contemporáneo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Se mantiene la cadena genealógica con el equivalente español directo. Aunque la línea puede telescopar generaciones, el hebreo repite la fórmula filial y conviene preservarla.
- source_word: אֲבִיחַיִל
  english_pob_choice: Abihail
  chosen_spanish: Abihail
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado sin adaptación para respetar la forma original y la continuidad con el texto fuente.
- source_word: חוּרִי
  english_pob_choice: Huri
  chosen_spanish: Huri
  lexicon: transliteración convencional
  rationale: Nombre propio conservado en transliteración estándar.
- source_word: יָרוֹחַ
  english_pob_choice: Jaroah
  chosen_spanish: Jaroah
  alternatives_spanish:
  - Jaroh
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio en una forma reconocible y cercana a la convención inglesa del proyecto.
- source_word: גִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: transliteración bíblica tradicional
  rationale: En español bíblico, 'Galaad' es la forma establecida y legible para este nombre propio; mantiene la identificación con la forma inglesa y la tradición hispana.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Micael
  alternatives_spanish:
  - Miguel
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio como transliteración del hebreo en vez de sustituirlo por la forma litúrgica española 'Miguel', que no refleja la forma consonántica del texto.
- source_word: יְשִׁישַׁי
  english_pob_choice: Jeshishai
  chosen_spanish: Jeshishai
  alternatives_spanish:
  - Jeshishay
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado para preservar la secuencia genealógica y la forma del original.
- source_word: יַחְדּוֹ
  english_pob_choice: Jahdo
  chosen_spanish: Jahdo
  alternatives_spanish:
  - Yahdo
  - Jachdó
  lexicon: transliteración convencional
  rationale: Se adopta la forma breve y legible usada por la línea inglesa del proyecto, evitando una adaptación innecesaria.
- source_word: בּוּז
  english_pob_choice: Buz
  chosen_spanish: Buz
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado directamente sin cambios.
theological_decisions:
- issue: Alcance genealógico de la fórmula 'hijos de / hijo de'
  english_pob_reading: Hebrew 'sons of' and repeated 'son of' may function genealogically for a family line and do not always require every generation to be listed explicitly.
  chosen_spanish_reading: '''Hijos de'' y la repetición de ''hijo de'' funcionan como fórmulas genealógicas para una línea familiar y no necesariamente exigen que cada generación esté explícitamente listada.'
  alternative_spanish_readings:
  - '''Descendientes de'' y ''descendiente de'''
  - Reducir la cadena para hacerla más fluida
  rationale: La nota inglesa identifica la posibilidad de telescopar generaciones. La traducción española conserva la forma repetida para no borrar esa tensión textual ni sugerir mayor precisión genealógica de la que el hebreo garantiza.
  doctrine_reference: Números 1:18; Esdras 2:62 (uso genealógico amplio de בן/בנים)
- issue: Tratamiento de nombres propios con forma hispana tradicional
  english_pob_reading: English POB transliterates names by convention.
  chosen_spanish_reading: Se transliteran los nombres propios, salvo 'Galaad', que adopta la forma bíblica española establecida.
  alternative_spanish_readings:
  - Gilead
  - Michael
  - Miguel
  rationale: Se evita sustituir sistemáticamente por equivalentes eclesiásticos cuando eso ocultaría la correspondencia con el hebreo. 'Galaad' se preserva por uso bíblico asentado en español.
  doctrine_reference: Principio de transparencia textual; no implica contenido doctrinal
translation_notes:
  revision_awareness: Se revisó el contexto inglés y no hubo cambios posteriores al pass más reciente; la traducción española sigue la lectura aprobada sin introducir expansiones ni omisiones no justificadas.
  spanish_consistency_notes:
  - Se mantuvo la estructura genealógica completa con 'hijo de' repetido para reflejar el hebreo.
  - Se usó 'Galaad' como forma española bíblica establecida, mientras los demás nombres permanecen transliterados.
  - Se evitó 'descendientes' para no diluir la fórmula genealógica del original.
  - La nota [a] acompaña únicamente el matiz genealógico documentado en el texto inglés.
