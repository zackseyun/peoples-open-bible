translation:
  language: es
  text: El pecador que se mete en fianzas[b] y persigue contratos caerá en litigios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'caerá en juicios' o 'en disputas legales'. κρίσεις puede referirse de manera amplia a procedimientos o veredictos judiciales; 'litigios' se elige aquí por el contexto de fianza y obligaciones contractuales.
    reason: lexical_alternative
  - marker: b
    text: '''Fianzas'' aquí alude a hacerse garante o fiador de la deuda u obligación de otra persona.'
    reason: cultural_note
lexical_decisions:
- source_word: ἁμαρτωλός
  english_pob_choice: a sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - un pecador
  - el que peca
  lexicon: BDAG
  rationale: El sustantivo es singular y genérico. En español, 'el pecador' conserva el carácter tipológico del dicho sapiencial y suena natural en este contexto proverbial; 'un pecador' también sería posible, pero el artículo definido mantiene mejor el tono sentencioso.
- source_word: ἐμπεσὼν εἰς ἐγγύην
  english_pob_choice: falls into surety
  chosen_spanish: cae en fianza
  alternatives_spanish:
  - se compromete como fiador
  - cae en garantía
  lexicon: LSJ
  rationale: Ἐγγύη se refiere a hacerse garante o quedar obligado por la deuda de otro. 'Fianza' conserva el campo jurídico de garantía/aval y evita una paráfrasis excesiva; 'cae en fianza' mantiene la imagen de entrar en una obligación arriesgada, aunque es una expresión menos idiomática que 'se compromete como fiador'.
- source_word: διώκων
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - busca
  - anda tras
  lexicon: BDAG
  rationale: El participio expresa una acción activa y continua. 'Persigue' mantiene la fuerza verbal y el matiz de empeñarse en algo de modo insistente.
- source_word: ἐργολαβίας
  english_pob_choice: contracts
  chosen_spanish: contratos
  alternatives_spanish:
  - negocios
  - tratos
  - obras por contrata
  lexicon: LSJ
  rationale: El término puede referirse a compromisos contractuales o empresariales. 'Contratos' es conciso, moderno y suficientemente amplio para el contexto de obligaciones legales; 'obras por contrata' sería demasiado específico en español.
- source_word: ἐμπεσεῖται εἰς κρίσεις
  english_pob_choice: will fall into lawsuits
  chosen_spanish: caerá en litigios
  alternatives_spanish:
  - caerá en juicios
  - caerá en pleitos legales
  lexicon: BDAG
  rationale: κρίσεις puede significar 'juicios' o 'casos/procedimientos legales'. Dado el contexto de fianza y contratos, 'litigios' comunica bien el sentido práctico del pasaje sin reducirlo a una sola forma procesal.
translation_notes:
  revision_awareness: La base inglesa revisada eliminó el segundo 'who' por fluidez, manteniendo intacto el sentido. En español no hacía falta reproducir ese detalle; se optó por una construcción participial natural ('el pecador que cae... y persigue...') fiel al griego y al cierre legal del versículo.
  spanish_consistency_notes:
  - Se mantiene 'pecador' para ἁμαρτωλός, coherente con el registro moral del libro sapiencial.
  - '''Litigios'' conserva la amplitud legal de κρίσεις sin forzar una traducción técnica única.'
  - No se usa 'Señor' ni terminología teológica ajena al versículo.
  - '''Fianza'' se eligió como equivalente funcional de ἐγγύη, pero la nota aclara el sentido de garantía/aval para evitar ambigüedad.'
