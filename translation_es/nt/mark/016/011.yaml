    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego y suena natural en español. Solo se corrigen las notas para que preserven de forma útil las alternativas léxicas documentadas por el English POB y mejoren la claridad editorial.
