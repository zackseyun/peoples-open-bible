  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jefes», «líderes», «Canaán» y la personificación de «el temblor se apoderó de» concuerdan con las decisiones léxicas auditadas. La excepción necesaria es reubicar la nota para que corresponda a «líderes de Moab[a]», ya que la alternativa documentada afecta a אֵילֵי מוֹאָב, no a נִבְהֲלוּ.
