review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la situación legal: un hombre con una emisión seminal debe lavarse y queda ritualmente impuro hasta la tarde. Conserva bien el valor casuístico de כִּי como «si», el sentido idiomático de תֵצֵא מִמֶּנּוּ como emisión, y la nota cultural sobre טָמֵא. Sin embargo, «lavará toda su carne en agua» suena poco natural en español moderno y además sugiere transitivamente que lava la carne, cuando el hebreo en este contexto se refiere a lavarse todo el cuerpo. También conviene ajustar «será inmundo» a «quedará inmundo» para reflejar mejor el resultado ritual de la acción y sonar más natural en español legal-litúrgico.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta una rigidez calca en «lavará toda su carne en agua». En español bíblico legible, «lavará en agua todo su cuerpo» o «se lavará todo el cuerpo con agua» comunica mejor el mandato sin perder el sentido ritual. Dado que el proyecto permite evitar calcos de madera cuando la gramática española se vuelve poco natural, conviene mejorar esa frase. El resto del versículo es claro; la nota sobre «inmundo» ayuda a evitar una lectura moralizante.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Un hombre» para אִישׁ y «semen» para שִׁכְבַת זָרַע están bien. «Inmundo» es aceptable aquí por el respaldo de la nota, aunque «impuro» también sería posible; no hace falta cambiarlo. La excepción justificada es sustituir «toda su carne» por «todo su cuerpo» para preservar el sentido de בָּשָׂר en un español natural, tal como ya contemplaba el audit trail inglés con la alternativa «his whole body».
  issues:
  - severity: medium
    issue: Calco poco natural en «lavará toda su carne en agua»
    rationale: Aunque refleja de cerca אֶת כָּל בְּשָׂרוֹ, en español moderno suena forzado y menos claro que una formulación con «cuerpo» o reflexiva. El proyecto pide evitar calcos de madera cuando resulten antinaturales.
  - severity: low
    issue: «Será inmundo» puede mejorarse a «quedará inmundo»
    rationale: Ambas opciones son fieles, pero «quedará» expresa mejor el estado resultante en este contexto de pureza ritual y suena más idiomático en español.
