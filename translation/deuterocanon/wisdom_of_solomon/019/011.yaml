theological_decisions:
- issue: Moral characterization of Israel's request for food in the wilderness
  chosen_reading: The verse is rendered to emphasize excessive desire and indulgence without overstating the Greek into explicit condemnation beyond the lexical force of ἐπιθυμίᾳ and τρυφῆς.
  alternative_readings:
  - A more neutral rendering that softens the moral critique
  - A stronger rendering such as 'lusting' and 'luxuries' that heightens condemnation
  rationale: The context alludes to the wilderness craving for quail, and the Greek itself carries evaluative force. The chosen wording preserves that critique while remaining anchored to the source text.
  doctrine_reference: Translation philosophy §§1, 3, 6
