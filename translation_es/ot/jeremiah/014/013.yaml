translation:
  language: es
  text: 'Entonces dije: «¡Ah, Señor Yahvé, mira, los profetas les están diciendo: “No verán espada, ni habrá hambre para ustedes; porque yo les daré paz verdadera[a] en este lugar”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paz que es verdadera» para la expresión hebrea «paz verdadera».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh!
  lexicon: HALOT
  rationale: La interjección expresa lamento o dolor. «¡Ah!» conserva el tono exclamativo sin añadir una carga interpretativa más fuerte que el hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahveh
  - Señor Dios
  lexicon: HALOT
  rationale: Se mantiene el título compuesto con «Señor» + el nombre divino «Yahvé», siguiendo la convención del proyecto para יהוה y evitando ocultar el nombre propio.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - he aquí
  lexicon: HALOT
  rationale: «Mira» reproduce la fuerza deíctica y es natural en español actual. «He aquí» sería más tradicional pero menos fluido.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas
  lexicon: HALOT
  rationale: Equivalencia directa y transparente del sustantivo plural con artículo.
- source_word: אֹמְרִים לָהֶם
  english_pob_choice: are saying to them
  chosen_spanish: les están diciendo
  alternatives_spanish:
  - dicen a ellos
  - están diciendo a ellos
  lexicon: HALOT
  rationale: El participio hebreo indica acción característica o en curso. En español, «les están diciendo» comunica ese aspecto sin sonar rígido.
- source_word: לֹא תִרְאוּ חֶרֶב
  english_pob_choice: You will not see the sword
  chosen_spanish: No verán espada
  alternatives_spanish:
  - No verán la espada
  - No experimentarán la espada
  lexicon: HALOT
  rationale: Se conserva el verbo «ver» y la imagen concreta de «espada». En español, omitir el artículo antes de «espada» resulta más natural en este anuncio directo.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: espada
  alternatives_spanish:
  - la espada
  - guerra
  lexicon: HALOT
  rationale: Se mantiene el sentido literal de «espada» como imagen metonímica de juicio/violencia, en lugar de generalizar a «guerra».
- source_word: וְרָעָב לֹא יִהְיֶה לָכֶם
  english_pob_choice: and famine will not be for you
  chosen_spanish: ni habrá hambre para ustedes
  alternatives_spanish:
  - ni habrá hambre para ustedes
  - ni el hambre será para ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el hambre «no será para» ellos. «Ni habrá hambre para ustedes» preserva la idea sin forzar una estructura poco natural en español.
- source_word: שְׁלוֹם אֱמֶת
  english_pob_choice: true peace
  chosen_spanish: verdadera paz
  alternatives_spanish:
  - paz verdadera
  - paz de verdad
  lexicon: HALOT
  rationale: Se conserva la relación entre שָׁלוֹם y אֱמֶת con una formulación natural. «Verdadera paz» mantiene la cualidad de paz genuina, no engañosa.
- source_word: אֶתֵּן לָכֶם
  english_pob_choice: I will give you
  chosen_spanish: les daré
  alternatives_spanish:
  - les concederé
  - les daré a ustedes
  lexicon: HALOT
  rationale: Futuro simple directo; «les daré» reproduce la promesa con claridad.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este lugar
  - en este sitio
  lexicon: HALOT
  rationale: «Lugar»/«lugar» mantiene la concreción del hebreo y evita ampliar indebidamente el referente.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahveh
  rationale: La política del proyecto es traducir יְהוָה como «Yahvé» en el texto principal. Aquí se conserva además el título reverencial compuesto con «Señor», sin ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo, incorporando la revisión auditada del inglés POB que movió el nombre divino a Yahweh/Yahvé y prefirió una formulación más literal para «famine will not be for you». También conserva la observación textual sobre שְׁלוֹם אֱמֶת mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «espada» como imagen concreta, no se generaliza a «guerra».
  - «Verdadera paz» mantiene la tensión lexical documentada en שְׁלוֹם אֱמֶת.
  - La puntuación y el orden intentan respetar la cita directa dentro del discurso profético.
