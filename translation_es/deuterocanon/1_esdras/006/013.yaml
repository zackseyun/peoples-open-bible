translation:
  language: es
  text: Y la casa[a] fue construida durante muchos años en tiempos de un gran y poderoso rey de Israel, y fue completada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La casa se refiere al templo.
    reason: lexical_alternative
  - marker: b
    text: O, 'terminada'.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκοδομεῖτο
  english_pob_choice: was built
  chosen_spanish: fue construida
  alternatives_spanish:
  - estaba siendo construida
  - se construía
  - fue edificada
  lexicon: BDAG
  rationale: El imperfecto pasivo griego expresa un proceso en curso, pero el POB inglés decidió una forma pasada simple por naturalidad en este contexto. En español, 'fue construida' comunica bien el resultado de una obra prolongada sin sonar forzado; 'estaba siendo construida' sería más literal, pero menos ágil para lectura pública.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa de Dios
  lexicon: LSJ
  rationale: Se conserva el sustantivo literal del griego, como en el POB inglés. Aunque el referente es el templo, 'la casa' mantiene la transparencia del texto fuente y la carga idiomática bíblica.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes
  - en tiempos anteriores a
  lexicon: LSJ
  rationale: Para el valor temporal del adverbio/preposición, 'antes de' es la solución española más natural y breve. Evita añadir explicaciones que el griego no exige.
- source_word: ἐτῶν πλειόνων
  english_pob_choice: over many years
  chosen_spanish: durante muchos años
  alternatives_spanish:
  - por muchos años
  - a lo largo de muchos años
  lexicon: LSJ
  rationale: La frase expresa duración extensa; 'durante muchos años' conserva ese sentido de extensión temporal y es idiomática en español.
- source_word: διὰ βασιλέως τοῦ Ἰσραὴλ μεγάλου καὶ ἰσχυροῦ
  english_pob_choice: before a great and mighty king of Israel
  chosen_spanish: antes de un gran y poderoso rey de Israel
  alternatives_spanish:
  - por medio de un gran y poderoso rey de Israel
  - a través de un gran y poderoso rey de Israel
  lexicon: BDAG
  rationale: Aunque διά con genitivo puede ser instrumental, el contexto favorece el valor temporal-histórico que conecta con el templo anterior. En español, 'antes de' reproduce esa lectura y evita una sintaxis oscura.
- source_word: ἐπετέλεσθη
  english_pob_choice: it was completed
  chosen_spanish: fue completada
  alternatives_spanish:
  - fue terminada
  - quedó terminada
  lexicon: BDAG
  rationale: El verbo pasivo de culminación se vierte con una forma clara y formal. 'Fue completada' conserva la idea de llegar a su término sin perder el tono solemne del pasaje.
theological_decisions:
- issue: Referencia de 'la casa'
  english_pob_reading: the temple is meant, but rendered literally as 'the house'
  chosen_spanish_reading: Se mantiene 'la casa' literalmente, aunque el referente sea el templo.
  alternative_spanish_readings:
  - el templo
  - la casa de Dios
  rationale: No hay conflicto doctrinal; la elección sigue la primacía del texto fuente y preserva la expresión bíblica sin ocultar el referente templario.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de la cláusula con 'rey de Israel'
  english_pob_reading: temporal-historical sense ('before a great and mighty king of Israel')
  chosen_spanish_reading: sentido temporal-histórico ('antes de un gran y poderoso rey de Israel')
  alternative_spanish_readings:
  - sentido instrumental ('por medio de un gran y poderoso rey de Israel')
  rationale: El griego transmitido es condensado y algo difícil; el español sigue la solución del POB inglés porque da una oración más coherente y apunta al trasfondo histórico del templo sin sobreinterpretar.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del POB inglés: se evitó una paráfrasis excesiva y se mantuvo una construcción breve y natural, con lectura temporal-histórica de la cláusula sobre el rey de Israel. También se corrigió el problema de validación asegurando que cada nota [a] y [b] aparezca anclada en el texto español.'
  spanish_consistency_notes:
  - Se usa 'la casa' de forma literal, conforme a la preferencia POB por transparencia léxica.
  - Se mantiene 'rey de Israel' sin introducir el nombre de Salomón, porque no aparece en el griego y la alusión queda implícita.
  - '''Fue completada'' conserva el cierre del pasaje con tono formal y público.'
  - La puntuación sigue normas españolas y la sintaxis evita calcos innecesarios.
