translation:
  language: es
  text: Ahora bien, el hombre Mica tenía una casa de dioses[a], e hizo un efod y ídolos domésticos, y consagró a uno de sus hijos[b], y llegó a ser su sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un santuario». El hebreo es literalmente «una casa de dioses»; algunos lo entienden como un recinto cultual privado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «llenó la mano de». Es un modismo para instalar o consagrar a alguien al servicio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאִישׁ מִיכָה
  english_pob_choice: Now the man Micah
  chosen_spanish: Ahora bien, el hombre Micaía
  alternatives_spanish:
  - Y el hombre Micaía
  - Ahora Micaía
  lexicon: HALOT
  rationale: Conservo el artículo hebreo con un giro discursivo natural en español. «Ahora bien» preserva el cambio de escena o reanudación del relato sin sonar forzado.
- source_word: בֵּית אֱלֹהִים
  english_pob_choice: a house of God
  chosen_spanish: una casa de Dios
  alternatives_spanish:
  - un santuario
  - una casa de dioses
  lexicon: HALOT
  rationale: En el contexto inmediato, la expresión puede referirse a un recinto cultual privado. Opto por «casa de Dios» porque sigue de cerca la frase hebrea y evita introducir una lectura más interpretativa que el español no exija; la nota preserva la alternativa de «santuario».
- source_word: אֵפוֹד
  english_pob_choice: an ephod
  chosen_spanish: un efod
  alternatives_spanish:
  - un efod sacerdotal
  - un delantal sacerdotal
  lexicon: HALOT
  rationale: Translitero el término técnico para mantener la referencia cultual específica sin imponer una equivalencia incierta.
- source_word: תְרָפִים
  english_pob_choice: household idols
  chosen_spanish: terafines
  alternatives_spanish:
  - ídolos domésticos
  - terafim
  lexicon: HALOT
  rationale: Como el término es técnico y el inglés POB ya lo trata como un objeto idolátrico doméstico, conservo la transliteración en el texto principal. Así no se pierde la referencia histórica y cultual; el sentido idolátrico queda claro por el contexto.
- source_word: וַיְמַלֵּא אֶת יַד אַחַד מִבָּנָיו
  english_pob_choice: he ordained one of his sons
  chosen_spanish: instaló a uno de sus hijos
  alternatives_spanish:
  - consagró a uno de sus hijos
  - llenó la mano de uno de sus hijos
  lexicon: HALOT
  rationale: El hebreo es un modismo de instalación para servicio sacerdotal. «Instaló» comunica el acto de ponerlo en funciones, y la nota conserva la imagen literal y la carga ritual del idiomático «llenó la mano».
- source_word: וַיְהִי ל֖וֹ לְכֹהֵן
  english_pob_choice: and he became his priest
  chosen_spanish: y este llegó a ser su sacerdote
  alternatives_spanish:
  - y fue su sacerdote
  - y se convirtió en su sacerdote
  lexicon: HALOT
  rationale: «Llegó a ser» preserva el valor resultativo del verbo hebreo. «Sacerdote» es el equivalente natural de כֹּהֵן en este contexto.
theological_decisions:
- issue: Cómo traducir בֵּית אֱלֹהִים en un contexto de culto irregular sin ocultar la ambigüedad
  english_pob_reading: a house of God
  chosen_spanish_reading: una casa de Dios
  alternative_spanish_readings:
  - un santuario
  - una casa de dioses
  rationale: Aunque el contexto muestra un culto desordenado e idólatra, el hebreo admite una designación cultual ambigua. En español mantengo «casa de Dios» para no sobrerresolver la frase; la nota ofrece «santuario» como alternativa interpretativa y deja visible la tensión textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo reflejar la instalación sacerdotal expresada por וַיְמַלֵּא אֶת יַד
  english_pob_reading: he ordained one of his sons
  chosen_spanish_reading: instaló a uno de sus hijos
  alternative_spanish_readings:
  - consagró a uno de sus hijos
  - llenó la mano de uno de sus hijos
  rationale: El modismo hebreo se usa para la puesta en servicio sacerdotal. «Instaló» mantiene la función sin perder naturalidad, mientras la nota documenta la lectura más literal y el trasfondo ritual.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'El registro en inglés muestra una revisión importante sobre בֵּית אֱלֹהִים: de «a house of gods» a «a house of God». Tomé en cuenta ese ajuste y la nota de ambigüedad, pero en español preservé «casa de Dios» como forma principal porque sigue de cerca la última línea editorial del POB y mantiene la tensión contextual sin forzar una paráfrasis. También conservé el carácter técnico de efod/terafines y la idea resultativa de la instalación sacerdotal.'
  spanish_consistency_notes:
  - Mantengo «Dios» sin mayúsculas especiales en la expresión fija según el uso normal del español bíblico contemporáneo.
  - Uso «terafines» en lugar de sustituirlo por «ídolos domésticos» para conservar el término técnico del hebreo; el contexto ya lo marca negativamente.
  - «Instaló» se eligió por fluidez, pero la nota deja claro que el hebreo alude a la investidura sacerdotal.
  - No introduzco «SEÑOR» ni otras normalizaciones, porque el versículo no contiene el Tetragrámaton.
