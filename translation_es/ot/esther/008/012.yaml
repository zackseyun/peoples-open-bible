translation:
  language: es
  text: en un mismo día, en todas las provincias del rey Asuero, el día trece del duodécimo mes, es decir, el mes Adar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּי֣וֹם אֶחָ֔ד
  english_pob_choice: on one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un día solo
  lexicon: HALOT
  rationale: La preposición temporal ב con יוֹם pide una expresión de tiempo natural en español. «Un solo día» conserva el valor numeral de אֶחָד y su fuerza enfática sin introducir una interpretación distinta.
- source_word: בְּכָל מְדִינ֖וֹת
  english_pob_choice: in all the provinces
  chosen_spanish: en todas las provincias
  alternatives_spanish:
  - por todas las provincias
  - a través de todas las provincias
  lexicon: HALOT
  rationale: מְדִינוֹת designa provincias administrativas del imperio. «En todas las provincias» refleja bien el valor locativo y mantiene la sobriedad del hebreo.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵר֑וֹשׁ
  english_pob_choice: of King Ahasuerus
  chosen_spanish: del rey Asuero
  alternatives_spanish:
  - del rey Ahasuero
  - del rey Ahasuero
  lexicon: HALOT
  rationale: El nombre propio se translitera al castellano bíblico común como «Asuero». El genitivo constructo se expresa de manera natural con «del rey».
- source_word: בִּשְׁלוֹשָׁ֥ה עָשָׂ֛ר
  english_pob_choice: on the thirteenth day
  chosen_spanish: el día trece
  alternatives_spanish:
  - el trece
  - en el día trece
  lexicon: HALOT
  rationale: 'En español, la fórmula de fecha resulta más natural con numeral ordinal/cardenal en aposición: «el día trece». El hebreo marca tiempo con ב, por lo que «el día trece» preserva la función dativa sin sobrecargar la frase.'
- source_word: לְחֹ֥דֶשׁ שְׁנֵים עָשָׂ֖ר
  english_pob_choice: of the twelfth month
  chosen_spanish: del mes duodécimo
  alternatives_spanish:
  - del duodécimo mes
  - del mes doce
  lexicon: HALOT
  rationale: «Mes duodécimo» sigue el orden natural del español para fechas bíblicas y preserva el valor ordinal de שְׁנֵים עָשָׂר. Se evita añadir «en» porque la cadena temporal ya quedó establecida por el contexto de la fecha.
- source_word: הוּא חֹדֶשׁ אֲדָר
  english_pob_choice: that is, the month Adar
  chosen_spanish: es decir, el mes de Adar
  alternatives_spanish:
  - que es el mes de Adar
  - o sea, el mes de Adar
  lexicon: HALOT
  rationale: הוּא cumple función explicativa/apositiva. «Es decir» reproduce bien esa aclaración y mantiene la identificación del duodécimo mes con Adar sin perder el tono de glosa cronológica.
translation_notes:
  revision_awareness: El texto español sigue de cerca la formulación hebrea y concuerda con el audit trail inglés en todos los elementos cronológicos y locativos; no se documentaron variantes textuales ni tensiones lexicográficas adicionales en este versículo.
  spanish_consistency_notes:
  - Se usa «Asuero» para el nombre propio, en continuidad con el uso bíblico español tradicional y con la transliteración auditada del inglés POB.
  - Se mantiene «mes duodécimo» como ordinal temporal claro y formal.
  - La puntuación de la fecha sigue el patrón explicativo del hebreo con «es decir».
