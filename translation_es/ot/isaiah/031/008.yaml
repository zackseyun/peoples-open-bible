    text: 'O: ''y una espada no de hombre''. El hebreo contrapone אִישׁ (''hombre'') y אָדָם (''ser humano/humankind'') en paralelo.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, por una espada no empuñada por poder humano; el texto deja sin especificar el medio exacto del juicio de Yahvé.
    reason: alternative_reading
  - marker: c
    text: 'O: ''sus escogidos''. El término hebreo puede referirse a jóvenes en la plenitud de su fuerza, a menudo en contexto militar.'
    reason: lexical_alternative
