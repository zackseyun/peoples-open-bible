theological_decisions:
- issue: Divergence between surviving Hebrew and Greek parallel in Sirach 48:7
  chosen_reading: Main text follows the Hebrew witness about Elijah anointing agents for judgment and appointing a prophetic successor.
  alternative_readings:
  - 'Greek: ''hearing at Sinai reproof, and at Horeb judgments of vengeance'''
  rationale: Per project philosophy, the Hebrew witness is primary for Sirach where it survives. However, the Greek is a substantial parallel and differs notably here, so the alternative is preserved in a footnote rather than ignored. The Hebrew also fits the Elijah narrative context from 1 Kings 19.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
