  text: הַ/צַּדִּ֣יק אָבָ֔ד וְ/אֵ֥ין אִ֖ישׁ שָׂ֣ם עַל לֵ֑ב וְ/אַנְשֵׁי חֶ֤סֶד נֶֽאֱסָפִים֙ בְּ/אֵ֣ין מֵבִ֔ין כִּֽי מִ/פְּנֵ֥י הָ/רָעָ֖ה נֶאֱסַ֥ף הַ/צַּדִּֽיק־־־׃
