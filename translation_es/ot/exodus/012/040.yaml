  lexicon: HALOT
  rationale: "Se mantiene la expresi\0f3n transparente al hebreo. \"Hijos de Israel\" es el equivalente idiom\0e1tico y conservable en espa\0f1ol b\0edblico; \"israelitas\" es m\0e1s fluido, pero menos fiel al relieve formal del original."
