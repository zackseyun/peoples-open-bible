translation:
  language: es
  text: 'Di a la sabiduría: «Tú eres mi hermana», y llama al entendimiento tu parienta[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מוֹדָע puede significar «pariente», «conocido», «allegado» o «amigo íntimo», según el contexto. Aquí, en paralelo con «hermana», se eligió «parienta» para conservar el matiz familiar y la cercanía relacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: HALOT
  rationale: Imperativo masculino singular de אמר. En español, «Di» reproduce con naturalidad el mandato introductorio y mantiene el paralelismo con el segundo imperativo.
- source_word: לַחָכְמָה
  english_pob_choice: to wisdom
  chosen_spanish: a la sabiduría
  alternatives_spanish:
  - a la Sabiduría
  lexicon: HALOT
  rationale: חָכְמָה se rinde de forma estándar como «sabiduría». El artículo y la preposición expresan correctamente el destinatario del habla; se conserva la personificación sin forzar mayúsculas.
- source_word: אֲחֹתִי
  english_pob_choice: my sister
  chosen_spanish: mi hermana
  alternatives_spanish:
  - mi hermana mayor
  - mi parienta
  lexicon: HALOT
  rationale: Término de parentesco literal con sufijo de primera persona. Se conserva la metáfora familiar que el contexto exige.
- source_word: אָתְּ
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres
  lexicon: HALOT
  rationale: Pronombre independiente femenino singular con valor enfático/predicativo. En español se expresa naturalmente con «Tú eres» para reflejar la copulativa implícita.
- source_word: וּמוֹדָע
  english_pob_choice: kinswoman
  chosen_spanish: tu parienta
  alternatives_spanish:
  - tu conocida
  - tu allegada
  - tu pariente
  lexicon: HALOT
  rationale: מֹדָע indica alguien conocido de cerca y, según contexto, puede implicar parentesco o relación íntima. Dado el paralelo con «mi hermana», «tu parienta» preserva la cercanía relacional y el matiz familiar documentado por el POB inglés.
- source_word: לַבִּינָה
  english_pob_choice: understanding
  chosen_spanish: la inteligencia
  alternatives_spanish:
  - el entendimiento
  - la comprensión
  lexicon: HALOT
  rationale: בִּינָה en Proverbios designa discernimiento/entendimiento. «Inteligencia» comunica bien esa capacidad de discernir en español actual y mantiene el paralelismo con «sabiduría».
- source_word: תִקְרָא
  english_pob_choice: call
  chosen_spanish: llama
  alternatives_spanish:
  - nombra
  - invoca
  lexicon: HALOT
  rationale: 'El imperfecto con fuerza exhortativa se expresa naturalmente en español como imperativo coordinado: «llama».'
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador de nota [a] no aparecía en el texto. Esta revisión inserta [a] junto a «sabiduría» y conserva una sola nota anclada; además ajusta «close friend»/«kinswoman» al matiz familiar-relacional documentado en el auditorio inglés.
  spanish_consistency_notes:
  - Se preserva el paralelismo familiar «hermana / parienta», coherente con la personificación femenina de sabiduría e inteligencia.
  - Se evita «SEÑOR» u otras convenciones no pertinentes, pues el versículo no contiene el tetragrámaton ni κύριος.
  - «Inteligencia» se usa como equivalente funcional de בִּינָה en registro bíblico natural, sin desplazar el sentido a inteligencia académica moderna.
