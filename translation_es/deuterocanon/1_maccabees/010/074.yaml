translation:
  language: es
  text: Pero cuando Jonatán oyó las palabras de Apolonio[a], se conmovió interiormente, y escogió diez mil hombres, y salió de Jerusalén, y Simón, su hermano, se encontró con él para ayudarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se vio movido interiormente», «fue provocado interiormente». El griego describe una agitación interior sin especificar la emoción exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  english_pob_choice: But when ... heard
  chosen_spanish: Pero cuando ... oyó
  alternatives_spanish:
  - Y cuando ... oyó
  - Ahora cuando ... oyó
  lexicon: LSJ
  rationale: Ὡς con aoristo marca secuencia temporal, y δέ aporta una transición leve. En español, "Pero cuando" conserva ese giro narrativo sin volverlo forzado.
- source_word: τῶν λόγων
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - lo que ... dijo
  lexicon: LSJ
  rationale: λόγοι se refiere aquí a lo dicho por Apolonio. "Las palabras" es directo, formalmente cercano al griego y natural en español.
- source_word: ἐκινήθη τῇ διανοίᾳ
  english_pob_choice: he was stirred in his mind
  chosen_spanish: se agitó en su mente
  alternatives_spanish:
  - se movió en su mente
  - fue movido en su mente
  - se turbó en su mente
  lexicon: LSJ
  rationale: El pasivo de κινέω con τῇ διανοίᾳ expresa una agitación interior sin precisar la emoción exacta. "Se agitó en su mente" conserva esa ambigüedad y el valor interno del giro griego.
- source_word: ἐπέλεξεν
  english_pob_choice: he chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: El verbo significa escoger o seleccionar. "Escogió" suena natural en español y mantiene la acción deliberada del contexto militar.
- source_word: δέκα χιλιάδας ἀνδρῶν
  english_pob_choice: ten thousand men
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil soldados
  - diez mil tropas
  lexicon: LSJ
  rationale: ἀνδρῶν es literalmente "hombres". Aunque el contexto es militar, mantener "hombres" sigue más de cerca el griego.
- source_word: ἐξῆλθεν ἐξ Ἱερουσαλήμ
  english_pob_choice: went out from Jerusalem
  chosen_spanish: salió de Jerusalén
  alternatives_spanish:
  - partió de Jerusalén
  - marchó fuera de Jerusalén
  lexicon: LSJ
  rationale: ἐξῆλθεν es un verbo común de salida. "Salió de Jerusalén" es la forma más natural en español y no añade color militar no explícito.
- source_word: συνήντησεν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: se encontró con él
  alternatives_spanish:
  - lo encontró
  - salió a su encuentro
  lexicon: LSJ
  rationale: συναντάω puede significar "encontrarse con" o "salir al encuentro". En español, "se encontró con él" mantiene la reciprocidad implícita del verbo sin forzar una dirección no especificada.
- source_word: ἐπὶ βοήθειαν αὐτοῦ
  english_pob_choice: to help him
  chosen_spanish: para ayudarle
  alternatives_spanish:
  - para su ayuda
  - para asistirle
  lexicon: LSJ
  rationale: La preposición con este sustantivo expresa propósito. "Para ayudarle" reproduce con claridad la finalidad de la acción.
theological_decisions:
- issue: Agitación interior sin especificar emoción exacta
  english_pob_reading: The Greek describes an inner stirring or agitation without specifying the exact emotion.
  chosen_spanish_reading: se agitó en su mente
  alternative_spanish_readings:
  - se turbó en su mente
  - se movió en su mente
  - se conmocionó interiormente
  rationale: La frase evita concretar si se trata de ira, temor o preocupación. Así se preserva la tensión lexical del griego y la cautela interpretativa del POB inglés.
  doctrine_reference: Hermenéutica lexical; evitar sobredeterminación psicológica del texto narrativo
translation_notes:
  revision_awareness: 'No se aplicaron revisiones al borrador base: la lectura griega y el audit trail inglés coinciden estrechamente, y la versión española conserva el mismo perfil semántico sin introducir interpretaciones añadidas.'
  spanish_consistency_notes:
  - Usé «Apolonio» y «Jonatán» como formas estándar en español.
  - Mantuve el verbo de movimiento simple «salió» para no añadir matiz militar no explícito en el griego.
  - Conservé la referencia relacional «su hermano» con puntuación natural en español.
  - El pronombre de finalidad «ayudarle» mantiene un registro bíblico moderado y claro en español latinoamericano.
