review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido general del arameo: Daniel responde ante el rey; el ''misterio'' que el rey solicita no puede ser dado a conocer por las clases de especialistas babilónicos. Sin embargo, hay un desajuste importante en las notas: la nota [b] está anclada en «magos», pero la alternativa inglesa documentada (''astrologers'') corresponde a אָשְׁפִין, traducido aquí como «encantadores».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente con «ante el rey» en vez de «delante del rey», que suena más natural en registro narrativo formal. La puntuación con comas repetidas después de «ni» es algo pesada; una enumeración simple mejora la fluidez.
  glossary_alignment: 'La terminología principal está bien alineada: רָזָה -> «misterio», חַכִּימִין -> «sabios», חַרְטֻמִּין -> «magos», גָּזְרִין -> «adivinos». El problema está en la glosa alternativa de אָשְׁפִין: la nota sobre «astrólogos» debe ir con «encantadores», no con «magos».'
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre «magos», pero su contenido describe la alternativa para «encantadores»/אָשְׁפִין.
    rationale: El rastro de auditoría inglés asigna la alternativa 'astrologers' al término אָשְׁפִין ('enchanters'), no a חַרְטֻמִּין ('magicians'). Tal como está, la nota induce una identificación léxica incorrecta.
  - severity: low
    issue: «delante del rey» es menos idiomático que «ante el rey» en este contexto formal.
    rationale: Ambas opciones son posibles para קֳדָם, pero «ante el rey» suena más natural y conciso en español bíblico moderno.
  - severity: low
    issue: La serie «ni los sabios, ni los encantadores, ni los magos, ni los adivinos» resulta algo recargada.
    rationale: 'En español se puede mantener la negación con una sola introducción de «ni» sin perder precisión: «ni los sabios, los encantadores, los magos ni los adivinos…».'
  revised_spanish_text: 'Daniel respondió ante el rey y dijo[a]: «El misterio que el rey pregunta, ni los sabios, los encantadores[b], los magos ni los adivinos pueden darlo a conocer al rey».

    '
  revised_footnotes:
  - marker: a
    text: O «contestó».
    reason: lexical_alternative
  - marker: b
    text: O «astrólogos». El término designa una clase técnica de especialistas babilónicos; la designación exacta es incierta.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota léxica para que «astrólogos» quede asociada al término arameo correspondiente («encantadores»), en conformidad con la evidencia fuente y la auditoría inglesa. Además, se pule levemente el español con «ante el rey» y una enumeración más natural, sin alterar el sentido.
