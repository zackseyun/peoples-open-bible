base_translation:
  language: en
  yaml_path: translation/ot/leviticus/006/003.yaml
  text: And the priest shall put on his linen garment[a], and he shall put linen undergarments on his body, and he shall remove the ashes from the burnt offering that the fire consumed on the altar[b], and he shall place them beside the altar.
  footnotes:
  - marker: a
    text: Or, more literally, 'the ashes which the fire consumed from the burnt offering.' The Hebrew expression is compact and may be rendered in several close ways.
    reason: lexical_alternative
  - marker: b
    text: '''On his body'' is literally ''on his flesh.'''
    reason: lexical_alternative
