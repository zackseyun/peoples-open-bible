revisions:
- from: También construyó ciudades para sí[a], y adquirió abundancia de rebaños y ganado, porque Dios le había dado muy grandes riquezas.
  to: También construyó ciudades para sí[a], y tuvo rebaños y ganado en abundancia, porque Dios le había dado muy grandes riquezas.
  rationale: Se reemplaza «adquirió abundancia de rebaños y ganado» por «tuvo rebaños y ganado en abundancia» para reflejar mejor la construcción hebrea de posesión abundante y lograr un español más natural, sin alterar el sentido general ni la atribución explícita de la prosperidad a Dios. Se conserva la nota léxica sobre «riquezas» porque corresponde al rastro inglés y sigue siendo útil en español.
