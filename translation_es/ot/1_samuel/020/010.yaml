translation:
  language: es
  text: 'Entonces David dijo a Jonatán[a]: «¿Quién me dirá? ¿O qué pasará si tu padre te responde con dureza?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿Quién me dirá? ¿O qué te responderá tu padre, duro/ásperamente?». El hebreo es muy comprimido; la traducción hace explícito el sentido para que sea claro en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la progresión natural en español sin perder la fuerza secuencial.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Nombre propio estándar
  rationale: Transliteración estable y reconocible en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional normal en español es «a» con verbos de habla.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio estándar
  rationale: «Jonatán» es la forma usual y plenamente inteligible en español bíblico.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién... ?
  alternatives_spanish:
  - ¿Quién es el que... ?
  lexicon: HALOT
  rationale: Interrogativo directo; la estructura española debe mantener la pregunta explícita que el hebreo presenta de forma breve.
- source_word: יַגִּיד לִי
  english_pob_choice: will tell me
  chosen_spanish: me lo dirá
  alternatives_spanish:
  - me lo informará
  - me lo comunicará
  lexicon: HALOT
  rationale: נגד en hiphil suele significar «decir, declarar, informar». «Me lo dirá» reproduce bien el sentido y suena natural en español; el pronombre «lo» anticipa el contenido implícito de la pregunta.
- source_word: אוֹ
  english_pob_choice: or if
  chosen_spanish: ¿O qué, si... ?
  alternatives_spanish:
  - o
  - o si
  lexicon: HALOT
  rationale: El hebreo es comprimido y deja una elipsis. Se conserva el valor disyuntivo con «¿O qué, si... ?», que en español mantiene la tensión del original sin convertirlo en una paráfrasis excesiva.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: El interrogativo introduce la segunda cláusula de forma breve; en español «qué» conserva la indeterminación del hebreo.
- source_word: יַּעַנְךָ
  english_pob_choice: answers you
  chosen_spanish: te responde
  alternatives_spanish:
  - te contesta
  - te da respuesta
  lexicon: HALOT
  rationale: ענה en este contexto es «responder/contestar». «Te responde» es natural y mantiene la relación directa con el interlocutor.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  lexicon: HALOT
  rationale: Parece dirigido a Jonatán; el posesivo español debe reflejar la segunda persona singular.
- source_word: קָשָׁה
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - duramente
  - con severidad
  lexicon: HALOT
  rationale: El adjetivo funciona adverbialmente con «responde». «Con dureza» comunica bien la severidad/aspereza de la respuesta sin forzar un adverbio menos idiomático.
theological_decisions:
- issue: No hay decisión doctrinal explícita; conservar la elipsis y la pregunta doble del hebreo.
  english_pob_reading: The Hebrew is compressed; the translation makes the sense explicit.
  chosen_spanish_reading: El hebreo es comprimido; la versión española explicita la segunda pregunta sin borrar la primera.
  alternative_spanish_readings:
  - '«Entonces David dijo a Jonatán: “¿Quién me lo dirá si tu padre te responde con dureza?”»'
  - '«Entonces David dijo a Jonatán: “¿Quién me lo dirá? ¿O qué responderá tu padre con dureza?”»'
  rationale: El verso contiene una construcción elíptica que no debe nivelarse. Mantener dos preguntas respeta la tensión retórica y deja visible la rareza sintáctica del hebreo, como hace el POB en inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto en inglés fue revisado para restaurar la primera pregunta explícita («Who will tell me?») y conservar el disyuntivo «or» del hebreo. La versión española sigue esa revisión y evita omitir מִי o suavizar la segunda cláusula hasta volverla una sola pregunta.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» como forma española estándar del nombre.
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Con dureza» conserva la fuerza adverbial de קָשָׁה sin introducir una interpretación más fuerte que el hebreo.
  - La puntuación con dos preguntas reproduce la compresión del original y la solución del POB en inglés.
