translation:
  language: es
  text: Me aferro[a] a mi justicia y no la soltaré; mi corazón no me reprende[b] en ninguno de mis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi integridad’. El hebreo צִדְקָה comúnmente significa ‘justicia’, pero en Job también puede solaparse con la idea de integridad personal.
    reason: lexical_alternative
  - marker: b
    text: O ‘mi corazón no me reprocha/afrenta en ninguno de mis días’. El hebreo expresa una autoacusación interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצִדְקָתִי
  english_pob_choice: to my righteousness
  chosen_spanish: a mi justicia
  alternatives_spanish:
  - a mi rectitud
  - a mi integridad
  lexicon: HALOT
  rationale: צִדְקָה normalmente expresa ‘justicia’ o ‘rectitud’. En este contexto, el paralelismo con el firme apego de Job pide conservar el valor moral/judicial de la raíz. ‘Justicia’ es más directo que ‘integridad’ y menos interpretativo que convertirlo en mera sinceridad.
- source_word: הֶחֱזַקְתִּי
  english_pob_choice: I hold fast
  chosen_spanish: Me aferro
  alternatives_spanish:
  - Me mantengo firme
  - Sostengo firmemente
  lexicon: HALOT
  rationale: El hifil de חזק comunica agarrar con fuerza o sostener firmemente. ‘Me aferro’ refleja bien la acción sostenida y voluntaria del hebreo con una forma natural en español.
- source_word: וְלֹא אַרְפֶּהָ
  english_pob_choice: and will not let it go
  chosen_spanish: y no la soltaré
  alternatives_spanish:
  - y no la dejaré ir
  - y no aflojaré mi agarre sobre ella
  lexicon: HALOT
  rationale: רפה en hifil significa dejar caer, aflojar o soltar. El pronombre femenino remite a צִדְקָתִי. ‘No la soltaré’ conserva el sentido idiomático con buena naturalidad en español.
- source_word: לֹא יֶחֱרַף לְבָבִי
  english_pob_choice: my heart does not reproach me
  chosen_spanish: mi corazón no me reprende
  alternatives_spanish:
  - mi corazón no me reprocha
  - mi conciencia no me reprende
  - mi corazón no me acusa
  lexicon: HALOT
  rationale: חרף puede significar reprochar, afrentar o vituperar, y con ‘mi corazón’ expresa autoacusación interior. ‘Me reprende’ mantiene la fuerza de la reprensión sin introducir ‘conciencia’, que sería más interpretativo.
- source_word: מִיָּמָי
  english_pob_choice: for any of my days
  chosen_spanish: en todos mis días
  alternatives_spanish:
  - durante todos mis días
  - en ninguno de mis días
  - a lo largo de todos mis días
  lexicon: HALOT
  rationale: 'La construcción con מן y ימים expresa el alcance temporal de la negación: nunca, en ningún momento de su vida. ‘En todos mis días’ comunica el valor global y continuo en un español fluido.'
theological_decisions:
- issue: ¿צִדְקָה debe sonar como ‘justicia’ o suavizarse como ‘integridad’ en la confesión de Job?
  english_pob_reading: righteousness, with integrity as a contextual alternative
  chosen_spanish_reading: justicia, con ‘integridad’ solo como alternativa contextual
  alternative_spanish_readings:
  - integridad
  - rectitud
  rationale: La POB inglesa preserva ‘righteousness’ como lectura principal porque respeta el sentido léxico fuerte de צִדְקָה. En español, ‘justicia’ mantiene ese peso moral-judicial mejor que ‘integridad’, que puede reducir el alcance del término a honestidad personal.
  doctrine_reference: Translation philosophy §1, §5
- issue: ¿La última cola debe traducirse como reproche del corazón o como acusación de la conciencia?
  english_pob_reading: my heart does not reproach me / taunt or revile me
  chosen_spanish_reading: mi corazón no me reprende
  alternative_spanish_readings:
  - mi corazón no me reprocha
  - mi conciencia no me reprende
  rationale: El hebreo personifica el corazón como sede de la autoevaluación interior. ‘Conciencia’ comunica bien la idea, pero introduce un término no presente en el texto. ‘Corazón no me reprende’ conserva la personificación original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje muestra un alto acuerdo textual y la revisión más reciente no introdujo cambios. La redacción española se ajusta al audit trail inglés sin depender mecánicamente de él, manteniendo la tensión entre ‘justicia’ e ‘integridad’ y la imagen del corazón que reprende.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando el hebreo tiene יהוה; aquí no aplica.
  - Se mantiene ‘justicia’ como término principal para צִדְקָה, en coherencia con el proyecto.
  - ‘Corazón’ se conserva como sede de la autoevaluación interior; no se sustituye por ‘conciencia’ en el texto principal.
  - El tono es sobrio y público, apto para lectura bíblica moderna sin arcaísmos innecesarios.
