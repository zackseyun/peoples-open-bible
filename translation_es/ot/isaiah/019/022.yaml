translation:
  language: es
  text: Y Yahvé golpeará a Egipto, golpeando y sanando; y volverán a Yahvé[a], y él responderá a sus ruegos[b] y los sanará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volverán a Yahvé». El verbo hebreo puede denotar volver o dirigirse de nuevo, a menudo con matiz de arrepentimiento en contextos proféticos.
    reason: lexical_alternative
  - marker: b
    text: O «será rogado por ellos» / «escuchará su súplica». La expresión hebrea significa que Yahvé responde favorablemente a su petición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָגַף
  english_pob_choice: will strike
  chosen_spanish: golpeará
  alternatives_spanish:
  - herirá
  - herirá con golpe
  - afligirá
  lexicon: HALOT
  rationale: El verbo transmite la idea de golpear o herir con un acto de juicio divino. 'Golpeará' conserva la fuerza concreta de la imagen sin cargar el texto con un término más técnico o arcaizante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino con la forma de referencia usada por POB en español. No se sustituye por un título, para conservar la transparencia del Tetragrámaton.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Es el nombre geográfico estándar y no presenta dificultad de registro.
- source_word: נָגֹף וְרָפוֹא
  english_pob_choice: striking and healing
  chosen_spanish: golpeando y sanando
  alternatives_spanish:
  - golpeo y sanación
  - golpeando y curando
  - hiriendo y sanando
  lexicon: HALOT
  rationale: La pareja de infinitivos absolutos intensifica y contrapone juicio y restauración. 'Golpeando y sanando' conserva la yuxtaposición sin forzar una secuencia que el hebreo no explicita.
- source_word: וְשָׁבוּ עַד יְהוָה
  english_pob_choice: and they will return to Yahweh
  chosen_spanish: y ellos volverán a Yahvé
  alternatives_spanish:
  - y ellos se volverán a Yahvé
  - y ellos retornarán a Yahvé
  - y se convertirán a Yahvé
  lexicon: HALOT
  rationale: שׁוב aquí puede expresar volver/retornar con matiz de arrepentimiento. 'Volverán' preserva esa amplitud, evitando imponer una formulación doctrinal más estrecha.
- source_word: וְנֶעְתַּר לָהֶם
  english_pob_choice: and he will respond to their pleas
  chosen_spanish: y él responderá a sus ruegos
  alternatives_spanish:
  - y será movido por sus ruegos
  - y escuchará su súplica
  - y les atenderá
  lexicon: HALOT
  rationale: El nifal de עתר comunica que Dios se deja rogar o responde favorablemente. 'Responderá a sus ruegos' es natural en español y preserva el sentido relacional y favorable del hebreo.
- source_word: וּרְפָאָם
  english_pob_choice: and heal them
  chosen_spanish: y los sanará
  alternatives_spanish:
  - y los curará
  - y los restaurará
  lexicon: HALOT
  rationale: רפא significa sanar/curar. 'Sanará' mantiene el vínculo léxico con 'sanando' y deja abierta la amplitud restauradora del contexto sin añadirla explícitamente.
theological_decisions:
- issue: Tensión entre juicio y restauración en la misma acción divina
  english_pob_reading: 'The verse presents both actions as the LORD''s work: he strikes Egypt and also heals it.'
  chosen_spanish_reading: 'El versículo presenta ambas acciones como obra de Yahvé: golpea a Egipto y también lo sana.'
  alternative_spanish_readings:
  - Yahvé primero golpea y luego sana a Egipto.
  - Dios juzga a Egipto y después lo restaura.
  rationale: 'La versión española conserva la tensión textual sin resolverla: un mismo Dios hiere y sana. Se evita suavizar la contraposición o convertirla en una mera secuencia temporal no explicitada.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Matiz de arrepentimiento en שׁוב
  english_pob_reading: return to Yahweh
  chosen_spanish_reading: volverán a Yahvé
  alternative_spanish_readings:
  - se convertirán a Yahvé
  - se volverán a Yahvé
  rationale: '''Volverán'' retiene el movimiento relacional de regreso y el posible matiz penitencial sin sobretraducirlo como fórmula doctrinal cerrada.'
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin revisiones aplicadas; por eso la propuesta española sigue de cerca las decisiones léxicas ya estabilizadas, manteniendo la tensión entre juicio y sanidad, y el valor relacional de 'volver' y 'responder favorablemente'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva la pareja verbal 'golpeando y sanando' para reflejar la intensificación hebrea sin perder fluidez en español.
  - '''Ruegos'' traduce el campo de súplica/plegaria de עתר con un registro bíblico comprensible en español moderno.'
  - No se introduce 'Cristo', 'SEÑOR' ni una interpretación nacional/política que desplace el sentido léxico del hebreo.
