revisions:
- from: Y los hijos de Aarón le trajeron la sangre[a], y él mojó su dedo en la sangre y la puso sobre los cuernos del altar[b], y derramó la sangre a la base del altar[c].
  to: Y los hijos de Aarón le trajeron la sangre[a], y él mojó su dedo en la sangre y la puso sobre los cuernos del altar[b], y derramó la sangre en la base del altar[c].
  rationale: Se mantiene la fidelidad básica del borrador, pero se corrige una expresión poco idiomática («a la base» → «en la base») y se mejora la naturalidad de la nota léxica [a] sin alterar el sentido ni las decisiones documentadas del POB.
