translation:
  text: '1 But concerning the signs: behold[a], days are coming when those who dwell on the earth will be seized in great bewilderment, and the way of truth will be hidden, and the land will be barren of faith.

    2 And unrighteousness will be multiplied beyond what you yourself now see, and beyond what you heard of long ago.

    3 And the land that you now see ruling will become trackless waste, and they will see it laid desolate.

    4 But if the Most High grants that you live, you will see after the third upheaval that the sun will suddenly shine at night, and the moon by day.

    5 And blood will drip from wood, and the stone will give its voice, and peoples will be thrown into confusion, and paths will be changed.

    6 And one whom those who dwell on the earth do not expect will reign, and the birds will migrate together.

    7 And the Sodomitic sea will cast out fish, and by night it will give a voice that many have not known, but all will hear its voice.

    8 And chaos will come in many places, and fire will often break out, and wild beasts will leave their own region,

    9 and women will give birth to monstrous things, and in sweet waters salty waters will be found, and all friends will make war on one another. Then understanding will hide itself, and insight will withdraw into its storehouse.

    10 And it will be sought by many and will not be found, and unrighteousness and lack of self-control will be multiplied on the earth.

    11 And one land will ask its neighbor and say, ''Has righteousness passed through you, making one righteous?''

    12 And that one will say no. And at that time men will hope and not obtain; they will labor, and their ways will not be directed.

    13 I have been permitted to tell you these signs; and if you pray again and weep as now, and fast for seven days[b], you will hear again things greater than these.

    14 Then I awoke, and my body shuddered greatly,

    15 and my soul was so troubled that it was failing. But the angel who had come, the one who had spoken in me, took hold of me and strengthened me and set me on my feet.

    16 And it happened on the second night that Phaltiel, leader of the people, came to me and said, ''Where were you, and why is your face sad?

    17 Or do you not know that Israel has been entrusted to you in the land of their exile? Rise therefore and eat some bread, and do not abandon us like a shepherd his flock in the hands of evil wolves.''

    18 And I said to him, ''Go away from me, and do not come near me for seven days; then you may come to me.'' And he heard what I said and withdrew from me.

    19 And I fasted seven days, wailing and weeping, as Uriel the angel had commanded me.

    20 And it happened after seven days that the thoughts of my heart were again very grievous to me.

    21 And my soul took up again the spirit of understanding, and again I began to speak words before the Most High.

    22 And I said, ''Lord, Master, from every forest of the earth and from all its trees you chose for yourself one vine,

    23 and from all the lands of the world you chose for yourself one pit, and from all the flowers of the world you chose for yourself one lily,

    24 and from all the depths of the sea you filled for yourself one stream, and from all the cities that have been built you sanctified Zion for yourself,

    25 and from all the birds that have been created you named for yourself one dove, and from all the cattle that have been formed you provided for yourself one sheep,

    26 and from all the peoples that have multiplied you acquired for yourself one people, and to this people whom you desired you gave the law approved above all.

    27 And now, Lord, why have you handed over the one to the many, and prepared the one root above the others, yet scattered your only one among the many?

    28 And those who opposed your promises have trampled those who believed your covenants.

    29 And if in hatred you hated your people, they ought to be chastised by your own hands.''

    30 And it happened, when I had spoken these words, that the angel who had come to me on the former night was sent to me,

    31 and he said to me, ''Hear me, and I will instruct you; pay attention to me, and I will add more before you.''

    32 And I said, ''Speak, my lord.'' And he said to me, ''You have become greatly carried away in your mind over Israel. Have you loved him more than he who made him?''

    33 And I said, ''No, lord, but I have spoken in grief, for my inward parts torment me every hour as I seek to grasp the way of the Most High and to search out part of his judgment.''

    34 And he said to me, ''You cannot.'' And I said, ''Why, lord? Why then was I born? Or why did not my mother''s womb become my grave, so that I might not see Jacob''s trouble

    35 and the weariness of the stock of Israel?''

    36 And he said to me, ''Count for me those who have not yet come, and gather for me the scattered drops, and make the dried flowers green again for me.

    37 Open for me the storehouses that are shut, and bring out for me the winds enclosed in them, or show me the image of a voice; then I will show you the labor that you ask to see.''

    38 And I said, ''Lord, Master, who indeed can know these things, except one who does not have his dwelling with men?

    39 But I am foolish; how then can I speak concerning the things about which you have questioned me?''

    40 And he said to me, ''Just as you cannot do one of the things that have been spoken, so you cannot find out my judgment or the end of the love that I promised to my people.''

    41 And I said, ''But behold, lord, you preside over those who are at the end. But what will those do who were before us, or we ourselves, or those who will be after us?''

    42 And he said to me, ''I will compare my judgment to a race: as there is no delay for the last, so there is no haste for the first.''

    43 And I answered and said, ''Could you not make those who have been made, and those who are, and those who will be, all at once, so that you might show your judgment more quickly?''

    44 And he answered me and said, ''The creature cannot hasten beyond the Creator, nor can the age hold at once those who have been created in it.''

    45 And I said, “How then did you say to your servant that you will surely give life to the creature created by you all at once? If then the living will live all at once and the creation will hold them, it could also now bear those who are present all at once.”

    46 And he said to me, ''Ask a woman''s womb and say to it, "If you bear ten, why by stages?" Ask it therefore to give birth to ten all at once.''

    47 And I said, ''It certainly cannot, but only each in its own time.''

    48 And he said to me, ''So I also gave the womb of the earth to those who have been sown upon it, each in its time.

    49 For just as an infant does not bear children, nor one who has grown old any longer, so I ordered the age that I created.''

    50 And I asked and said, ''Since you have now given me a way, I will speak before you: our mother, of whom you spoke to me, is she still young, or is she already drawing near to old age?''

    51 And he answered me and said, ''Ask the woman who bears, and she will tell you.

    52 For you will say to her, "Why are those whom you have now borne not like those who came before, but smaller in stature?"

    53 And she herself will say to you, "Different are those born in the strength of youth,

    54 and different are those born at the time of old age, when the womb is failing."

    55 Therefore consider also for yourself: you are smaller in stature than those before you, and those who come after you will be smaller than you[c][d], as of a creation already growing old and passing beyond the strength of youth.'''
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'the Sodomitic sea' likely refers to the Dead Sea, but the translation keeps the Latin's allusive wording rather than substituting the later conventional name.
    reason: cultural_note
    anchor_ref: '5:7'
  - marker: b
    text: Latin 'menstruata monstra' is obscure. The main text renders the phrase broadly as monstrous births; a more wooden rendering would be difficult English and may overstate precision the surviving Latin does not securely provide.
    reason: lexical_alternative
    anchor_ref: '5:9'
  - marker: d
    text: Or 'the outcome/goal of the love that I promised to my people.' The Latin leaves open whether the emphasis is on the final result of divine love or its consummation.
    reason: alternative_reading
    anchor_ref: '5:40'
  - marker: c
    text: '''Crown'' may also be understood as ''circle'' or ''ring,'' which would make the comparison emphasize symmetry between first and last.'
    reason: lexical_alternative
    anchor_ref: '5:42'
lexical_decisions:
- source_word: excessu multo
  chosen: great bewilderment
  alternatives:
  - great confusion
  - great distress
  - great madness
  lexicon: Lewis & Short
  rationale: In apocalyptic context the phrase signals a state of mental and social disorientation rather than mere numerical excess. 'Bewilderment' preserves the sense of being seized by destabilizing confusion.
- source_word: veritatis via
  chosen: the way of truth
  alternatives:
  - truth's way
  lexicon: Lewis & Short
  rationale: A fairly formal rendering suits the visionary register and preserves possible ethical and revelatory overtones.
- source_word: sterilis erit a fide regio
  chosen: the land will be barren of faith
  alternatives:
  - the region will be sterile from faith
  - the country will be devoid of faith
  lexicon: Lewis & Short
  rationale: Regio here is best rendered 'land' in the broad territorial sense. 'Barren of faith' keeps the fertility metaphor visible.
- source_word: inconposita vestigio
  chosen: trackless waste
  alternatives:
  - without trace
  - pathless
  - disordered in its track
  lexicon: Lewis & Short
  rationale: The Latin is difficult, but the image appears to be of a land left without path or ordered trace. 'Trackless waste' is concise and apocalyptic in tone.
- source_word: turbatam
  chosen: upheaval
  alternatives:
  - disturbance
  - tumult
  lexicon: Lewis & Short
  rationale: A noun-like rendering in English fits the elliptical Latin and preserves the sense of a major convulsion.
- source_word: lapis dabit vocem suam
  chosen: the stone will give its voice
  alternatives:
  - the stone will utter its voice
  - the stone will cry out
  lexicon: Lewis & Short
  rationale: Chosen to stay close to the Latin without importing the more idiomatic biblical phrase 'cry out' unless warranted.
- source_word: gressus commutabuntur
  chosen: courses will be changed
  alternatives:
  - steps will be altered
  - movements will be changed
  lexicon: Lewis & Short
  rationale: The phrase likely refers to ordered patterns or movements being overturned, not merely individual footsteps.
- source_word: mare Sodomiticum
  chosen: the Sodomitic sea
  alternatives:
  - the Sea of Sodom
  - the Dead Sea
  lexicon: Lewis & Short
  rationale: A transparent formal rendering preserves the text's allusive label rather than replacing it with the later conventional geographical name.
- source_word: menstruata monstra
  chosen: monstrous things
  alternatives:
  - menstruous monsters
  - deformed monsters
  lexicon: Lewis & Short
  rationale: The Latin adjective is obscure in English if rendered woodenly. 'Monstrous things' preserves the prodigious-birth sense without false precision.
- source_word: sensus
  chosen: understanding
  alternatives:
  - sense
  - perception
  lexicon: Lewis & Short
  rationale: In parallel with intellectus, this points to human capacity for discernment, not mere sensation.
- source_word: intellectus separabitur in promptuarium suum
  chosen: insight will withdraw into its storehouse
  alternatives:
  - understanding will be set apart into its treasury
  - intellect will retire into its chamber
  lexicon: Lewis & Short
  rationale: Promptuarium is a storehouse or repository. The image is of discernment becoming inaccessible.
- source_word: dirigentur viae eorum
  chosen: their ways will not be directed
  alternatives:
  - their paths will not be made straight
  - their ways will not prosper
  lexicon: Lewis & Short
  rationale: Keeps the passive sense and preserves the moral-path imagery.
- source_word: ululans
  chosen: wailing
  alternatives:
  - howling
  - lamenting
  lexicon: Lewis & Short
  rationale: The stronger lament term fits Ezra's raw grief.
- source_word: Dominator Domine
  chosen: Lord, Master
  alternatives:
  - Sovereign Lord
  - Master Lord
  lexicon: Lewis & Short
  rationale: The doubled address is emphatic. 'Lord, Master' preserves the two titles distinctly without archaic inflation.
- source_word: foveam
  chosen: pit
  alternatives:
  - hollow
  - plot
  - enclosure
  lexicon: Lewis & Short
  rationale: The exact metaphor is difficult, but 'pit' is the plain Latin sense and keeps the sequence of chosen singulars vivid and strange.
- source_word: adquisisti tibi populum unum
  chosen: you acquired for yourself one people
  alternatives:
  - you gained one people
  - you chose one people
  lexicon: Lewis & Short
  rationale: The verb is stronger than mere choosing and reflects covenantal possession language.
- source_word: ab omnibus probatam legem
  chosen: the law approved above all
  alternatives:
  - the law proved among all
  - the law tested by all
  lexicon: Lewis & Short
  rationale: The phrase is compressed; this rendering captures the comparative force without overexplaining.
- source_word: tradidisti unum plurimis
  chosen: handed over the one to the many
  alternatives:
  - delivered the one to the many
  - gave over the one to the multitude
  lexicon: Lewis & Short
  rationale: Ezra's complaint is sharp and judicial; 'handed over' preserves that accusatory force.
- source_word: unicum tuum
  chosen: your only one
  alternatives:
  - your unique one
  - your only child
  lexicon: Lewis & Short
  rationale: The phrase refers to Israel as singular and beloved. 'Your only one' preserves the starkness without importing filial imagery absent here.
- source_word: sponsionibus
  chosen: promises
  alternatives:
  - pledges
  - covenanted assurances
  lexicon: Lewis & Short
  rationale: Readable modern English that still conveys solemn divine commitment.
- source_word: renes mei
  chosen: my inward parts
  alternatives:
  - my kidneys
  - my reins
  lexicon: Lewis & Short
  rationale: A literal 'kidneys' would distract modern readers; 'inward parts' preserves the ancient seat-of-emotion sense.
- source_word: semitam altissimi
  chosen: the way of the Most High
  alternatives:
  - the path of the Most High
  lexicon: Lewis & Short
  rationale: Consistent with earlier 'way' language and with project policy for Altissimus.
- source_word: prumptuaria
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Lewis & Short
  rationale: Concrete image of hidden cosmic reserves; 'storehouses' is natural and faithful.
- source_word: flatos
  chosen: the winds
  alternatives:
  - blasts
  - breaths
  lexicon: Lewis & Short
  rationale: In this cosmological context 'winds' is the most intelligible and likely sense.
- source_word: uocis imaginem
  chosen: the image of a voice
  alternatives:
  - the form of a voice
  lexicon: Lewis & Short
  rationale: The deliberately paradoxical phrase should remain strange rather than be normalized.
- source_word: finem caritatis
  chosen: the end of the love
  alternatives:
  - the outcome of the love
  - the goal of the love
  - the end of my compassion
  lexicon: Lewis & Short
  rationale: Caritas here is divine love/mercy toward the people. 'End of the love' keeps the teleological ambiguity visible.
- source_word: coronae adsimilabo iudicium meum
  chosen: I will compare my judgment to a crown
  alternatives:
  - I will liken my judgment to a circle
  - I will compare my judgment to a wreath
  lexicon: Lewis & Short
  rationale: Corona can suggest a ring or crown. 'Crown' is the direct sense, while the following line explains the image's symmetry.
- source_word: saeculum
  chosen: the age
  alternatives:
  - the world
  lexicon: Lewis & Short
  rationale: In 4 Ezra this term often carries temporal-cosmic force; 'age' preserves that better than the flatter 'world'.
- source_word: matricem terrae
  chosen: the womb of the earth
  alternatives:
  - the matrix of the earth
  lexicon: Lewis & Short
  rationale: The birth metaphor governs the whole exchange and should remain explicit.
- source_word: seminati
  chosen: have been sown
  alternatives:
  - were planted
  lexicon: Lewis & Short
  rationale: Keeps the agricultural metaphor linked to human generations.
- source_word: minores statu
  chosen: smaller in stature
  alternatives:
  - lesser in condition
  - inferior in size
  lexicon: Lewis & Short
  rationale: The maternal analogy points first to diminished bodily vigor; 'stature' preserves that while allowing broader symbolic force.
theological_decisions:
- issue: Identity of the chosen singular entity in Ezra's lament ('unum', 'unicum tuum')
  chosen_reading: Israel is rendered as 'the one' / 'your only one' rather than paraphrased as 'your only son' or 'your unique people' in the main text.
  alternative_readings:
  - your unique people
  - your only child
  rationale: The Latin uses stark singular language to intensify Ezra's protest over Israel's election and scattering. Preserving the singular form keeps the lament's rhetorical force and avoids interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Meaning of 'finem caritatis quam populo meo promisi'
  chosen_reading: Rendered 'the end of the love that I promised to my people.'
  alternative_readings:
  - the outcome of the mercy I promised my people
  - the goal of the compassion I promised my people
  rationale: The phrase may point either to the final outcome of divine covenant love or to its consummation. The chosen wording preserves that ambiguity rather than narrowing it to either mercy or eschatological fulfillment alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of 'coronae adsimilabo iudicium meum'
  chosen_reading: Rendered with 'crown' in the main text.
  alternative_readings:
  - circle
