lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El waw-consecutivo con דבר introduce una nueva unidad de habla narrativa/ legal. En español, «habló» conserva mejor el acto formal de dirigir la palabra que «dijo», y encaja bien con la fórmula «diciendo» que sigue.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La instrucción del proyecto pide «Yahvé» como forma española principal para el Tetragrámaton. Se evita la sustitución tradicional por «el SEÑOR» para preservar el nombre propio del texto מקור.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español natural y fiel al hebreo, «a Moisés» comunica la relación indirecta sin arcaísmo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva funciona como introducción de discurso. «Diciendo» preserva la estructura hebrea y queda natural en español bíblico moderno.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal del POB de conservar el nombre personal del pacto en vez de una sustitución titulada. «Yahvé» es la forma española establecida por el proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés confirma alta concordancia y sin revisiones aplicadas; la única adaptación necesaria es trasladar al español la decisión fija sobre el nombre divino, conservando la fórmula narrativa breve del hebreo.
  spanish_consistency_notes:
  - 'Se conserva el orden básico del hebreo: sujeto divino + verbo de habla + destinatario + fórmula introductoria.'
  - «Yahvé» se usa de forma consistente con la política del proyecto para יְהוָה.
  - La nota al pie está anclada explícitamente en la forma «Yahvé[a]» para cumplir la validación de marcadores.
