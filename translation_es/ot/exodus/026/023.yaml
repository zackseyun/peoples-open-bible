translation:
  language: es
  text: Y harás dos tablas para las esquinas[a] del tabernáculo, en la parte posterior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para las piezas de esquina del tabernáculo, en las dos partes posteriores». Los términos hebreos son arquitectónicos y algo técnicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵי
  english_pob_choice: And ... two
  chosen_spanish: Y ... dos
  alternatives_spanish:
  - Y dos
  lexicon: HALOT
  rationale: El hebreo introduce el siguiente elemento de la secuencia con la conjunción más el numeral. En español, «Y harás dos...» comunica naturalmente esa progresión sin cargar de literalismo la estructura.
- source_word: קְרָשִׁים
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - paneles
  lexicon: HALOT
  rationale: En el contexto técnico del tabernáculo, el término designa piezas estructurales de madera. «Tablas» es una opción clara y bíblicamente inteligible en español; «tablones» suena más toscamente dimensional y «paneles» puede modernizar en exceso el objeto.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - haz
  lexicon: HALOT
  rationale: La forma imperfecta segunda masculina singular funciona aquí como instrucción. «Harás» conserva bien el valor directivo, con un español natural y solemne.
- source_word: לִ/מְקֻצְעֹ֖ת
  english_pob_choice: for the corners
  chosen_spanish: para las esquinas[a]
  alternatives_spanish:
  - para los rincones
  - para las piezas de esquina
  lexicon: HALOT
  rationale: «Esquinas» refleja el valor básico de esquina/ángulo y mantiene la claridad. En esta arquitectura sagrada también puede aludir a piezas de unión; por eso se conserva la nota de alternativa en la versión inglesa. El marcador remite a esa posible precisión técnica.
- source_word: הַ/מִּשְׁכָּ֑ן
  english_pob_choice: the tabernacle
  chosen_spanish: del tabernáculo
  alternatives_spanish:
  - de la morada
  - del santuario portátil
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente consagrado y preciso para מִשְׁכָּן en Éxodo. «Morada» sería demasiado literal y menos claro en castellano.
- source_word: בַּ/יַּרְכָתָֽיִם
  english_pob_choice: at the rear
  chosen_spanish: en la parte posterior
  alternatives_spanish:
  - al fondo
  - en la parte trasera
  - en la retaguardia
  lexicon: HALOT
  rationale: La forma dual apunta a las dos partes posteriores/extremos traseros. «En la parte posterior» expresa ese sentido sin redundar con «esquinas» y sigue de cerca la revisión inglesa que suprimió la repetición final.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la repetición final de «corners» y dejó simplemente «at the rear». La presente redacción española sigue esa revisión, evitando repetir «esquinas» al final y usando una locución natural que conserva la ubicación posterior.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» como término técnico estándar del POB para מִשְׁכָּן.
  - Se evita «SEÑOR» u otras convenciones de sustitución, no aplicables a este versículo.
  - «Tablas» se usa como solución funcional para קְרָשִׁים, sin añadir interpretación estructural no atestiguada.
  - La nota a conserva la ambigüedad arquitectónica reconocida por el aparato inglés.
