translation:
  language: es
  text: Y has obrado con nosotros[a], Señor nuestro Dios, conforme a toda tu clemencia y conforme a toda tu gran compasión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'has tratado con nosotros'. La expresión griega puede significar actuar o tratar con alguien, no simplemente 'hacer a'.
    reason: lexical_alternative
  - marker: b
    text: También podría traducirse 'misericordia' para οἰκτειρμός.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησας εἰς ἡμᾶς
  english_pob_choice: you have dealt with us
  chosen_spanish: has obrado con nosotros
  alternatives_spanish:
  - has actuado hacia nosotros
  - has tratado con nosotros
  lexicon: BDAG
  rationale: La expresión griega idiomática no pide una traducción literal de 'hacer a', sino una forma natural en español que conserve la acción completada de Dios respecto de su pueblo. 'Obrado con nosotros' comunica bien el trato divino y mantiene el tono solemne del texto.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En una dirección a Dios, κύριε se vierte naturalmente como 'Señor' en español. Es la equivalencia cultual y comunicativa más clara sin introducir una máscara tipográfica ajena al griego aquí.
- source_word: ἐπιεικίαν
  english_pob_choice: forbearance
  chosen_spanish: forbearancia
  alternatives_spanish:
  - clemencia
  - mansedumbre
  - indulgencia
  lexicon: BDAG
  rationale: El contexto apunta a benignidad contenida, lenidad o indulgencia divina. 'Forbearancia' preserva ese matiz de paciencia indulgente mejor que 'mansedumbre', que podría sonar demasiado pasiva, y evita reducir el término a un simple 'favor'.
- source_word: οἰκτειρμόν
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - piedad
  lexicon: BDAG
  rationale: '''Compasión'' conserva el valor afectivo de οἰκτειρμός y permite distinguirlo de ἐπιεικία en español, como el POB distingue ''forbearance'' y ''compassion'' en inglés.'
- source_word: τὸν μέγαν
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - abundante
  - mucha
  lexicon: BDAG
  rationale: '''Gran'' es la forma natural en español ante un sustantivo abstracto como ''compasión'' y preserva el énfasis del adjetivo sin sobredeterminarlo.'
- source_word: κατὰ πᾶσαν ... καὶ κατὰ πάντα
  english_pob_choice: according to all ... and according to all
  chosen_spanish: conforme a toda ... y conforme a toda
  alternatives_spanish:
  - según toda ... y según toda
  - de acuerdo con toda ... y de acuerdo con toda
  lexicon: BDAG
  rationale: '''Conforme a'' reproduce bien la estructura repetida de κατὰ + acusativo y conserva el paralelismo retórico. ''Toda'' mantiene la amplitud totalizante de πᾶς sin añadir interpretación.'
theological_decisions:
- issue: Distinguir dos términos cercanos de misericordia divina
  english_pob_reading: Translate ἐπιείκεια as 'forbearance' and οἰκτειρμός as 'compassion'
  chosen_spanish_reading: Traducir ἐπιείκεια como 'forbearancia' y οἰκτειρμός como 'compasión'
  alternative_spanish_readings:
  - Traducir ambos como 'misericordia'
  - Traducir ἐπιείκεια como 'clemencia' y οἰκτειρμός como 'misericordia'
  rationale: El griego usa dos palabras distintas y el texto las yuxtapone para reforzar la riqueza de la disposición divina. Conviene mantener la distinción en español, sin crear una diferencia doctrinal artificial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Tratamiento de κύριος en invocación a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  rationale: Aquí el griego tiene κύριε, vocativo dirigido a Dios. En español, 'Señor' conserva el valor de dirección personal y evita introducir una convención tipográfica no exigida por el fuente griega.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail, donde ἐπιείκεια se afinó de 'gentleness' a 'forbearance'. Por eso el español usa 'forbearancia' para reflejar mejor la idea de lenidad o clemencia divina, manteniendo distinta la segunda palabra de misericordia.
  spanish_consistency_notes:
  - 'Se preserva la dirección solemne de la oración con vocativo: ''Señor nuestro Dios''.'
  - Se mantiene el paralelismo de dos frases con 'conforme a toda... y conforme a toda...'.
  - Se evita un calco demasiado literal de 'hacer a nosotros' en favor de un giro español natural que sigue fielmente el sentido del idiomático griego.
