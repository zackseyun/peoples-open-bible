revisions:
- from: Si hay entre ustedes[a] algún pobre, uno de tus hermanos, en una de tus puertas, en tu tierra que Yahvé tu Dios te está dando, no endurecerás tu corazón ni cerrarás tu mano contra tu hermano pobre.
  to: Si hay entre ustedes[a] algún pobre, uno de tus hermanos[b], en una de tus puertas, en tu tierra que Yahvé tu Dios te está dando, no endurecerás tu corazón ni cerrarás tu mano contra tu hermano pobre[b].
  rationale: Se corrige el registro y la documentación mínima necesaria añadiendo la nota cultural omitida y anclándola a «hermanos/hermano». Se mantiene la literalidad de «puertas» con su nota. Aunque el pronombre inicial conserva «ustedes» para evitar el forzado «entre ti», el resto del versículo mantiene el singular representativo legal; esta combinación sigue siendo menos ideal que una revisión editorial más amplia, por lo que el veredicto es «revise».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:53:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura condicional casuística del hebreo, preserva «Yahvé», mantiene el lenguaje familiar «hermanos/hermano» y refleja adecuadamente las dos prohibiciones idiomáticas («endurecer el corazón» / «cerrar la mano»). Sin embargo, hay un problema de alineación pronominal: el hebreo usa 2ms de forma consistente («entre ti», «tus hermanos», «tus puertas», «tu tierra», «tu corazón», «tu mano»), pero el texto mezcla «ustedes» con «tus/tu», lo que rompe la coherencia y atenúa la dirección singular representativa del original. Además, falta trasladar la nota cultural del inglés sobre «brothers/brother» como lenguaje familiar de la comunidad del pacto.'
  spanish_quality_summary: El español es claro y digno, pero «entre ustedes» junto con «tus hermanos» suena inconsistente y poco pulido. «En una de tus puertas» es literal pero algo extraño en español; no obstante, queda aceptable si se mantiene la nota explicativa. El resto fluye bien y conserva un registro bíblico natural.
  glossary_alignment: Alinea correctamente con la terminología del proyecto en «Yahvé», «hermanos/hermano» y el mantenimiento de imágenes hebreas. No hay conflicto con términos doctrinales mayores. Se recomienda añadir la nota de parentesco covenantal ya documentada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: 'Mezcla de tratamiento pronominal: «entre ustedes» con «tus/tu»'
    rationale: El hebreo está en segunda persona singular masculina a lo largo del versículo. En español bíblico puede mantenerse como singular representativo («entre ti» sería torpe), pero debe expresarse de forma coherente, p. ej. «entre ustedes» con «sus» o bien reformular toda la frase. La mezcla actual afecta fidelidad formal y legibilidad.
  - severity: medium
    issue: Falta la nota cultural sobre «hermanos/hermano»
    rationale: La auditoría inglesa preserva una nota explicando que el lenguaje familiar se refiere a miembros de la comunidad del pacto. Dado que el español también conserva «hermanos/hermano», conviene mantener esa aclaración.
  - severity: low
    issue: «En una de tus puertas» es muy literal y menos natural en español
    rationale: La literalidad es defendible porque el inglés también la conserva con nota, pero en español requiere apoyo de nota para evitar opacidad. La nota ya existe y debe mantenerse con anclaje claro.
  revised_spanish_text: Si hay entre ustedes[a] algún pobre, uno de tus hermanos[b], en una de tus puertas, en tu tierra que Yahvé tu Dios te está dando, no endurecerás tu corazón ni cerrarás tu mano contra tu hermano pobre[b].
  revised_footnotes:
  - marker: a
    text: O «dentro de una de tus ciudades»; literalmente, «en una de tus puertas».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» y «hermano» aquí usan lenguaje familiar para referirse a otros miembros de la comunidad del pacto.
    reason: cultural_note
  revision_rationale: Se corrige el registro y la documentación mínima necesaria añadiendo la nota cultural omitida y anclándola a «hermanos/hermano». Se mantiene la literalidad de «puertas» con su nota. Aunque el pronombre inicial conserva «ustedes» para evitar el forzado «entre ti», el resto del versículo mantiene el singular representativo legal; esta combinación sigue siendo menos ideal que una revisión editorial más amplia, por lo que el veredicto es «revise».
