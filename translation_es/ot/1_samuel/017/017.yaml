translation:
  language: es
  text: 'Y Jesé dijo a David, su hijo: «Por favor, lleva a tus hermanos este efa[a] de grano tostado[b] y estos diez panes, y corre al campamento a tus hermanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un efa era una medida antigua de capacidad para productos secos, de unos 22 litros (aprox. 5.8 galones).
    reason: cultural_note
  - marker: b
    text: O «grano tostado al fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח נָא
  english_pob_choice: Please take
  chosen_spanish: Por favor, toma
  alternatives_spanish:
  - Toma, por favor
  - Ahora toma
  lexicon: HALOT
  rationale: El imperativo קַח con la partícula נָא expresa ruego cortés con urgencia. En español, «Por favor, toma» comunica esa suavidad de manera natural y fiel, sin volver la frase rígida.
- source_word: לְאַחֶיךָ
  english_pob_choice: to your brothers
  chosen_spanish: para tus hermanos
  alternatives_spanish:
  - a tus hermanos
  lexicon: HALOT
  rationale: Aquí ל marca al destinatario/beneficiario de lo que se entrega. En este contexto de provisión, «para tus hermanos» refleja bien la finalidad del envío y suena natural en español.
- source_word: אֵיפַת
  english_pob_choice: this ephah of
  chosen_spanish: este efa de
  alternatives_spanish:
  - esta medida de
  - aproximadamente un efa de
  lexicon: HALOT
  rationale: Se conserva la unidad concreta «efa» para no diluir la medida antigua. El demostrativo «este» sigue la cercanía del hebreo y el contexto de provisión puntual.
- source_word: הַקָּלִיא
  english_pob_choice: roasted grain
  chosen_spanish: grano tostado
  alternatives_spanish:
  - grano parchado
  - grano asado
  lexicon: HALOT
  rationale: El término designa grano preparado por tostado/parcheado. «Grano tostado» es claro en español actual y mantiene el sentido culinario básico sin perder precisión.
- source_word: וַעֲשָׂרָה לֶחֶם
  english_pob_choice: and these ten loaves
  chosen_spanish: y estos diez panes
  alternatives_spanish:
  - y diez hogazas
  - y diez panes de pan
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede abarcar «pan» en general, en este contexto de provisiones la forma plural con numeral se expresa naturalmente como «diez panes». El demostrativo «estos» reproduce el hebreo y enlaza con la entrega concreta.
- source_word: וְהָרֵץ
  english_pob_choice: and run
  chosen_spanish: y corre
  alternatives_spanish:
  - y date prisa
  - y ve corriendo
  lexicon: HALOT
  rationale: El imperativo del causativo de רוץ conserva la idea de ir deprisa con viveza. «Corre» mantiene la fuerza verbal del hebreo mejor que una paráfrasis más general como «date prisa».
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - el campamento de guerra
  lexicon: HALOT
  rationale: En este contexto militar, מַחֲנֶה se entiende naturalmente como «campamento». «Campamento» es claro, digno y suficientemente preciso en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: La frase appositiva identifica a David como hijo de Jesé. En español, «su hijo» es la forma más natural; el posesivo ya queda claro por el contexto y por la mención explícita de Jesé.
translation_notes:
  revision_awareness: La lectura coincide con la última pasada sin cambios reportados. Se mantuvo la estructura de envío de provisiones y el valor concreto de las medidas y alimentos, sin suavizar el tono imperativo-cortés del hebreo.
  spanish_consistency_notes:
  - Se conservó «Y» inicial para reflejar la continuidad narrativa del hebreo.
  - Se usó «Jesé» como forma española estándar del nombre propio.
  - Se mantuvo la secuencia de dos destinatarios («tus hermanos» / «para tus hermanos») para reflejar la repetición del hebreo.
  - Se preservó la medida antigua «efa» con nota explicativa para audibilidad textual.
  - Se evitó «señor» o sustituciones litúrgicas porque no hay aquí un término divino ni una máscara de nombre sagrado.
