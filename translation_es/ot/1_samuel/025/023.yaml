- from: Cuando Abigail vio a David[a], se apresuró y descendió del asno; se echó delante de David, con el rostro en tierra, y se postró hasta el suelo.
  to: Cuando Abigail vio a David[a], se apresuró y descendió del asno; cayó delante de David, con el rostro en tierra, y se postró a tierra.
  rationale: Se ajusta «se echó» a «cayó» para reflejar con mayor precisión וַתִּפֹּל, y se cambia «se postró hasta el suelo» por «se postró a tierra», que suena más natural y bíblico en español y mantiene bien el valor de שׁחה אָרֶץ. La nota se armoniza con la nueva redacción.
