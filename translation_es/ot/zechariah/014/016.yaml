translation:
  language: es
  text: Entonces, todos los que queden de todas las naciones que vinieron contra Jerusalén subirán año tras año para adorar al Rey, Yahvé de los Ejércitos[a], y para celebrar la Fiesta de las Cabañas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: O tradicionalmente, «la Fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Then ... shall
  chosen_spanish: Entonces ...
  alternatives_spanish:
  - Y sucederá que
  - Y será que
  lexicon: HALOT
  rationale: El hebreo introduce la continuación profética del discurso; «Entonces» conserva el avance narrativo con naturalidad en español.
- source_word: כָּל הַנּוֹתָר
  english_pob_choice: all who remain
  chosen_spanish: todos los que queden
  alternatives_spanish:
  - todos los sobrevivientes
  - los que queden
  lexicon: HALOT
  rationale: El participio expresa a los que han quedado en pie o han sobrevivido; «todos los que queden» preserva ese matiz sin volverlo abstracto.
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de entre todas las naciones
  - de todos los pueblos
  lexicon: HALOT
  rationale: גּוֹיִם aquí conserva el sentido internacional de naciones/gentiles; «naciones» es la correspondencia directa y transparente.
- source_word: הַבָּאִים עַל יְרוּשָׁלִָם
  english_pob_choice: that came against Jerusalem
  chosen_spanish: que vinieron contra Jerusalén
  alternatives_spanish:
  - que estaban viniendo contra Jerusalén
  - que atacaron Jerusalén
  lexicon: HALOT
  rationale: La construcción con עַל en contexto militar indica avance hostil; «vinieron contra» mantiene el idiomatismo hebreo sin especificar más de lo que el texto dice.
- source_word: וְעָלוּ
  english_pob_choice: shall go up
  chosen_spanish: subirán
  alternatives_spanish:
  - ascenderán
  - irán subiendo
  lexicon: HALOT
  rationale: עלה es el verbo bíblico usual para subir a Jerusalén con resonancia de peregrinación; «subirán» conserva esa idiomática y es natural en español.
- source_word: מִדֵּי שָׁנָה בְשָׁנָה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - de año en año
  - cada año
  lexicon: HALOT
  rationale: La expresión distributiva denota repetición anual continua; «año tras año» es idiomática y refleja bien esa recurrencia.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para postrarse
  - para rendir culto
  lexicon: HALOT
  rationale: Aunque literalmente implica inclinarse o postrarse, en este contexto cultual el sentido es adorar; «adorar» comunica directamente el acto religioso.
- source_word: לְמֶלֶךְ
  english_pob_choice: the King
  chosen_spanish: al Rey
  alternatives_spanish:
  - ante el Rey
  - para el Rey
  lexicon: HALOT
  rationale: El infinitivo gobierna la relación con el destinatario del culto; en español, «al Rey» expresa de manera natural que la adoración se dirige a él.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el nombre divino: «Yahvé», manteniendo la transparencia del Tetragrámaton sin la sustitución tradicional.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: El título expresa el sentido militar/celestial de צְבָאוֹת; «de los Ejércitos» conserva la mayestática del título y su transparencia semántica.
- source_word: וְלָחֹג
  english_pob_choice: and to celebrate
  chosen_spanish: y para celebrar
  alternatives_spanish:
  - y para guardar
  - y para observar
  lexicon: HALOT
  rationale: חגג expresa celebrar una fiesta de peregrinación; «celebrar» es la equivalencia más clara y fiel en español moderno.
- source_word: חַג הַסֻּכּוֹת
  english_pob_choice: the Feast of Booths
  chosen_spanish: la Fiesta de las Cabañas
  alternatives_spanish:
  - la Fiesta de los Tabernáculos
  - la Fiesta de las Enramadas
  - la Fiesta de las Chozas
  lexicon: HALOT
  rationale: סֻכּוֹת son cabañas/chozas temporales; «Fiesta de las Cabañas» es una traducción transparente del hebreo, mientras que la forma tradicional se deja como alternativa conocida.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto revelado en el hebreo. La elección sigue la política del proyecto de no ocultar el Tetragrámaton bajo una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las Huestes
  - Yahvé de los ejércitos
  rationale: El título combina el nombre divino con צְבָאוֹת; se traduce literalmente para mantener la transparencia semántica y la fuerza teológica del título.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; readable modern English'
- issue: Alcance escatológico de la peregrinación de las naciones
  english_pob_reading: Retained the prophetic image without resolving whether it is to be read strictly literally, typologically, or apocalyptically.
  chosen_spanish_reading: Se conserva la imagen profética sin decidir si debe leerse como peregrinación literal futura, figura tipológica o visión apocalíptica.
  alternative_spanish_readings:
  - peregrinación literal anual de las naciones sobrevivientes
  - símbolo de adoración universal
  rationale: La traducción mantiene la tensión interpretativa del texto y no impone un esquema escatológico que el versículo mismo no explicita.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con la revisión auditada: no se detectaron cambios aplicados en el último pase y el consenso de verificación fue alto. La redacción española sigue esa estabilidad y solo adapta el estilo a una forma publicable en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto.
  - «Ejércitos» conserva la transparencia del título צְבָאוֹת y evita la sustitución eclesiástica sin nota.
  - «Fiesta de las Cabañas» traduce el hebreo con claridad; la forma tradicional queda como alternativa en nota.
  - «Vinieron contra Jerusalén» preserva la imagen de hostilidad del hebreo sin añadir detalles narrativos no presentes en el verso.
