translation:
  language: es
  text: ¿Sobre qué fueron hundidas sus bases[a], o quién puso su piedra angular[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus fundamentos» o «sus encajes». El término hebreo se refiere a soportes estructurales o bases de fundación.
    reason: lexical_alternative
  - marker: b
    text: Lit. «¿quién arrojó/lanzó la piedra de su esquina?», un modismo para poner la piedra angular.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מָה
  english_pob_choice: On what
  chosen_spanish: ¿Sobre qué
  alternatives_spanish:
  - ¿En qué
  - ¿Sobre cuál cosa
  lexicon: HALOT
  rationale: La preposición עַל con el interrogativo מָה introduce una pregunta sobre el soporte o fundamento. «¿Sobre qué» conserva la imagen arquitectónica con un español natural y digno.
- source_word: אֲדָנֶיהָ
  english_pob_choice: its bases
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus bases
  - sus fundamentos
  - sus pedestales
  lexicon: HALOT
  rationale: El hebreo puede referirse a bases, pedestales o apoyos de fundación. En español, «cimientos» comunica bien la idea de soporte estructural sin perder el campo de construcción que exige el contexto poético.
- source_word: הָטְבָּעוּ
  english_pob_choice: were sunk
  chosen_spanish: fueron hundidos
  alternatives_spanish:
  - fueron sumergidos
  - fueron embebidos
  - fueron asentados
  lexicon: HALOT
  rationale: El Hophal de טָבַע expresa ser hecho hundir o quedar hundido/embebido. «Fueron hundidos» mantiene el pasivo y la fuerza visual del verbo, más fiel que una opción más neutra como «fueron asentados».
- source_word: יָרָה
  english_pob_choice: laid
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - echó
  - lanzó
  lexicon: HALOT
  rationale: Aunque el verbo puede significar ‘arrojar/castar’, en esta imagen arquitectónica se entiende idiomáticamente como la acción de colocar la piedra angular. «Puso» es breve, natural y no fuerza una interpretación excesivamente técnica.
- source_word: אֶבֶן פִּנָּתָהּ
  english_pob_choice: its cornerstone
  chosen_spanish: su piedra angular
  alternatives_spanish:
  - la piedra de su esquina
  - su piedra de esquina
  - su piedra del ángulo
  lexicon: HALOT
  rationale: La expresión literal es «la piedra de su esquina», pero en español «piedra angular» es el equivalente idiomático más transparente para una piedra fundacional/cornerstone. Mantiene la metáfora de construcción sin calcar la sintaxis hebrea.
theological_decisions:
- issue: Preservar la metáfora de construcción en la pregunta divina
  english_pob_reading: Retain the metaphor of bases and cornerstone without flattening it into abstract cosmological explanation.
  chosen_spanish_reading: Conservar la imagen de cimientos y piedra angular sin convertirla en una explicación abstracta o científica.
  alternative_spanish_readings:
  - ¿Cómo se sostiene la tierra?
  - ¿En qué se apoya el mundo?
  rationale: La pregunta forma parte del interrogatorio poético de Yahvé a Job. Mantener el lenguaje de construcción respeta el sentido llano del hebreo y evita una paráfrasis que borre la imagen original.
  doctrine_reference: 'Principio de equivalencia óptima: conservar el sentido directo y la metáfora explícita del texto fuente.'
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustanciales; el pasaje permanece estable en la última pasada y el consenso de revisión es alto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma española para el nombre divino cuando el contexto inmediato presenta la voz divina del discurso poético.
  - Se evita ‘SEÑOR’ como máscara, conforme a la terminología del proyecto.
  - La pareja ‘cimientos’ / ‘piedra angular’ conserva el paralelismo arquitectónico del hebreo.
  - La puntuación interrogativa doble refleja las dos preguntas retóricas del verso.
