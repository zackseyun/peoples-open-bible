translation:
  language: es
  text: Y su territorio era Jazer,[a] y todas las ciudades de Galaad, y la mitad de la tierra de los amonitas, hasta Aroer, que está frente a Rabá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que mira hacia Rabá». El hebreo usa un modismo que literalmente dice «que está delante de Rabá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לָהֶם הַגְּבוּל
  english_pob_choice: And their territory was
  chosen_spanish: Y fue su territorio
  alternatives_spanish:
  - Y fue su frontera
  - Y fue su límite
  lexicon: HALOT
  rationale: En una lista de extensión territorial, גְּבוּל puede referirse al límite o, por extensión, al territorio delimitado. «Territorio» comunica bien el sentido del conjunto asignado, mientras que «frontera» o «límite» sonarían más restrictivos o técnicos en español.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Jaazer
  lexicon: Transliteración estándar
  rationale: Se conserva la transliteración usual del topónimo hebreo.
- source_word: עָרֵי הַגִּלְעָד
  english_pob_choice: the cities of Gilead
  chosen_spanish: las ciudades de Galaad
  alternatives_spanish:
  - las poblaciones de Galaad
  - los pueblos de Galaad
  lexicon: HALOT
  rationale: עָרִים designa aquí centros urbanos dentro de una delimitación territorial. «Ciudades» mantiene el registro formal de la lista geográfica, y «Galaad» es la forma tradicional y comprensible del topónimo en español.
- source_word: וַחֲצִי אֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: and half the land of the Ammonites
  chosen_spanish: y la mitad de la tierra de los amonitas
  alternatives_spanish:
  - y la mitad del país de los amonitas
  - y la mitad de la tierra de los hijos de Amón
  lexicon: HALOT
  rationale: בְּנֵי עַמּוֹן es un etnónimo territorial; en español, «amonitas» es la forma idiomática y fiel. «Tierra» conserva el valor geográfico del hebreo, y «mitad» refleja la partición literal del territorio.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - a la altura de
  lexicon: HALOT
  rationale: Marca el límite geográfico de la asignación. «Hasta» es la forma más natural y exacta en español para una extensión territorial.
- source_word: עֲרוֹעֵר
  english_pob_choice: Aroer
  chosen_spanish: Aroer
  alternatives_spanish:
  - Aróer
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio con transliteración convencional en español bíblico.
- source_word: אֲשֶׁר עַל פְּנֵי רַבָּה
  english_pob_choice: which is opposite Rabbah
  chosen_spanish: que está frente a Rabá
  alternatives_spanish:
  - que está opuesta a Rabá
  - que queda delante de Rabá
  lexicon: HALOT
  rationale: La expresión idiomática עַל־פְּנֵי puede significar «frente a», «en presencia de» o «opuesto a». «Que está frente a Rabá» conserva la relación espacial sin introducir una dirección interpretativa que el hebreo no explicita. «Rabá» sigue la forma usual del topónimo en español.
translation_notes:
  revision_awareness: El contexto auditado presenta alta concordancia con la traducción inglesa y no registra revisiones aplicadas; por eso el borrador español sigue de cerca la estructura del hebreo y la decisión inglesa, conservando el matiz espacial de עַל־פְּנֵי con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Galaad» y «Rabá» como formas españolas habituales de los topónimos.
  - Se mantiene «Jazer» y «Aroer» como transliteraciones bíblicas estándar.
  - «Tierra» se usa para אֶרֶץ en un contexto de reparto territorial.
  - La puntuación sigue el español moderno con lista coordinada y coma antes de la cláusula relativa.
