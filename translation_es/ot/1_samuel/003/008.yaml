translation:
  language: es
  text: 'Yahvé llamó a Samuel por tercera vez. Entonces se levantó y fue a Elí y dijo: «Aquí estoy, porque me llamaste». Entonces Elí comprendió que Yahvé estaba llamando al muchacho.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Tetragrámaton / nombre divino
  rationale: Se conserva el nombre propio del pacto, no un título sustitutivo. 'Yahvé' sigue el criterio POB para el Tetragrámaton y evita borrar la referencia explícita del hebreo.
- source_word: וַיֹּסֶף ... קְרֹא
  english_pob_choice: called ... again
  chosen_spanish: llamó ... por tercera vez
  alternatives_spanish:
  - llamó nuevamente ...
  - siguió llamando ...
  lexicon: HALOT
  rationale: La construcción hebrea expresa repetición de la acción. En español, 'por tercera vez' comunica con claridad la reiteración sin calco artificial; además armoniza con 'a third time' del contexto inglés auditado.
- source_word: בַּשְּׁלִשִׁית
  english_pob_choice: a third time
  chosen_spanish: por tercera vez
  alternatives_spanish:
  - una tercera vez
  - la tercera vez
  lexicon: HALOT
  rationale: Es la forma más natural en español para marcar la tercera ocurrencia. Mantiene el valor adverbial de la expresión hebrea.
- source_word: וַיָּקָם
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: Verbo narrativo normal en español, fiel al movimiento físico de la escena y natural en registro bíblico moderno.
- source_word: וַיֵּלֶךְ אֶל עֵלִי
  english_pob_choice: went to Eli
  chosen_spanish: fue a Elí
  alternatives_spanish:
  - se fue con Elí
  - fue hacia Elí
  lexicon: HALOT
  rationale: Resume adecuadamente el desplazamiento hacia Elí con una construcción idiomática y sobria en español.
- source_word: הִנְנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Estoy aquí
  lexicon: HALOT
  rationale: En un contexto de respuesta a un llamado, 'Aquí estoy' expresa disponibilidad y presencia inmediata sin arcaísmo.
- source_word: כִּי קָרָאתָ לִי
  english_pob_choice: for you called me
  chosen_spanish: porque me has llamado
  alternatives_spanish:
  - pues me llamaste
  - ya que me llamaste
  lexicon: HALOT
  rationale: '''Porque'' conserva la relación causal; el perfecto compuesto en español transmite bien la acción pasada relevante para la respuesta de Samuel.'
- source_word: וַיָּבֶן
  english_pob_choice: understood
  chosen_spanish: comprendió
  alternatives_spanish:
  - entendió
  - percibió
  - se dio cuenta
  lexicon: HALOT
  rationale: '''Comprendió'' expresa el paso a la captación correcta de la situación, con un matiz algo más claro y elegante que ''entendió''.'
- source_word: קֹרֵא
  english_pob_choice: was calling
  chosen_spanish: estaba llamando
  alternatives_spanish:
  - llamaba
  - seguía llamando
  lexicon: HALOT
  rationale: El participio indica acción en curso; el progresivo español preserva ese valor aspectual.
- source_word: לַנָּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: '''Muchacho'' es natural en español para נער en este contexto narrativo, sin forzar ni infantilizar demasiado a Samuel.'
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de manera explícita en ambos verbos de llamado; la traducción española debe preservar el nombre divino personal. 'Yahvé' es la forma POB para mantener transparencia textual y coherencia teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés auditado quedó sin cambios en la última revisión; no hay notas de corrección ni variantes textuales relevantes en este versículo, y la versión española sigue el mismo sentido sin introducir diferencias interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se conservó el valor narrativo directo y sencillo del hebreo sin añadir explicaciones.
  - '''Muchacho'' se eligió para נער por coherencia con el relato y la edad de Samuel en el contexto inmediato.'
  - No se introdujeron notas al pie porque el pasaje no presenta variantes textuales o alternativas que requieran anclaje en el texto español.
