translation:
  language: es
  text: 'Entonces el jefe de los coperos habló a Faraón[a], diciendo: «Hoy recuerdo mis ofensas.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis pecados» o «mis faltas». El hebreo puede referirse de manera amplia al mal cometido, sea moral o de carácter oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Entonces» conserva bien ese avance. «Habló» mantiene el valor básico de דבר como introducción al discurso sin añadir matices innecesarios.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el principal copero
  - el capitán de los coperos
  lexicon: HALOT
  rationale: El cargo es cortesano y funcional. «Jefe de los coperos» comunica de forma natural la idea del oficial principal sobre el servicio de bebidas, evitando el arcaísmo de «copero mayor» o «mayordomo».
- source_word: אֶת פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - ante Faraón
  lexicon: HALOT
  rationale: Aunque את marca objeto directo, con un verbo de habla el español exige la preposición «a». Se conserva «Faraón» como título propio convencional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» reproduce la introducción de discurso de manera natural en español y mantiene la estructura del hebreo sin sobretraducir.
- source_word: אֶת חֲטָאַי
  english_pob_choice: my offenses
  chosen_spanish: mis ofensas
  alternatives_spanish:
  - mis pecados
  - mis faltas
  lexicon: HALOT
  rationale: חטא puede abarcar pecado, falta u ofensa. En este contexto de corte, el hablante se refiere a su conducta culpable frente a Faraón; «ofensas» preserva ese alcance moral y oficial sin restringirlo a una sola categoría.
- source_word: אֲנִי מַזְכִּיר
  english_pob_choice: I remember
  chosen_spanish: recuerdo
  alternatives_spanish:
  - hago memoria de
  - menciono
  lexicon: HALOT
  rationale: El hiphil de זכר puede significar «hacer recordar», «mencionar» o «traer a la memoria». Aquí el sentido contextual es que el hablante trae sus faltas al presente de conciencia; «recuerdo» expresa con naturalidad ese valor.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: HALOT
  rationale: «Hoy» es la forma idiomática en español y conserva el énfasis temporal del hebreo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el criterio de equivalencia óptima del POB inglés. Se conservó la ambigüedad de חטא mediante «ofensas», con nota alternativa para no cerrar indebidamente el alcance del término.
  spanish_consistency_notes:
  - Se usó «Faraón» como título propio, en continuidad con la convención bíblica en español.
  - Se prefirió «ofensas» frente a «pecados» para evitar una lectura demasiado teológica o exclusivamente moral en un contexto de corte.
  - La sintaxis reproduce el movimiento narrativo del hebreo sin calco innecesario.
