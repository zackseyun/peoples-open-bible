    text: Or, more formally, 'his favor is like a cloud of the latter rain.'
    reason: lexical_alternative
  - marker: b
    text: The image is of the king’s favorable expression and goodwill bringing life and blessing, like the beneficial late-season rain for crops.
    reason: cultural_note
