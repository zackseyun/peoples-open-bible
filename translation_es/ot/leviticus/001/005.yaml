    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: En el texto, [a] aparece en «toro», pero su contenido explica זרק/«rociarán la sangre»; y [b] aparece en «alrededor», aunque la nota inglesa relevante para el sustantivo explica בֶּן הַבָּקָר. Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: «Sobre el altar alrededor» es poco idiomático en español.
    rationale: Aunque intenta seguir עַל ... סָבִיב, en español bíblico natural es mejor «sobre el altar, por todos lados» o «sobre el altar alrededor de este». La formulación actual suena forzada.
  - severity: low
    issue: «El cual está» es menos natural que «que está» en esta relativa restrictiva.
    rationale: No es un error de sentido, pero «que está a la entrada...» suena más fluido y contemporáneo sin perder dignidad.
