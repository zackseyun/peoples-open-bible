  text: 그러나 가서, 그분의 제자들과 베드로에게 말하십시오. 「그분께서 여러분보다 먼저 갈릴리로 가십니다. 거기서 여러분은 그분을 볼 것입니다. 그분께서 여러분에게 말씀하신 그대로입니다.」」
