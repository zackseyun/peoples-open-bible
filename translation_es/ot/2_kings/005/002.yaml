revisions:
- from: Ahora bandas de arameos[a] habían salido y habían llevado cautiva de la tierra de Israel a una muchacha[b] pequeña, y ella estaba al servicio[c] delante de la mujer de Naamán.
  to: Bandas de arameos habían salido y habían llevado cautiva de la tierra de Israel a una muchacha[b] pequeña, y ella servía[c] a la mujer de Naamán.
  rationale: Se elimina 'Ahora' para evitar un matiz discursivo no exigido por el hebreo. Se reemplaza 'estaba al servicio delante de la mujer de Naamán' por 'servía a la mujer de Naamán' para producir un español natural y fiel al sentido idiomático de לִפְנֵי, conservando la literalidad en nota. Se simplifica el aparato de notas a las alternativas realmente útiles y ancladas en el texto revisado.
