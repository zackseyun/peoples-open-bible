    issue: '''Pero yo y mi casa'' es poco natural en español'
    rationale: Aunque formalmente comprensible, esta secuencia suena forzada en español general y no refleja bien el giro enfático idiomático del hebreo. 'Pero en cuanto a mí y a mi casa' comunica mejor el contraste y mejora la legibilidad sin apartarse del sentido.
  - severity: medium
    issue: La nota d no ofrece una alternativa léxica real
    rationale: La nota dice 'O mi casa', que repite la misma expresión del texto y luego la explica. La nota inglesa preserva una alternativa verdadera ('my household'). En español conviene ofrecer una alternativa como 'mi hogar' o 'mi familia', indicando que 'mi casa' puede abarcar el hogar o household.
