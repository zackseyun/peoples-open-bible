  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La alternativa inglesa 'the prophet teaching lies' corresponde a מורה שקר, no a 'the head'. En español, la nota sobre 'el profeta que enseña mentiras' debe anclarse en la frase del profeta, no en 'cabeza'.
  - severity: medium
