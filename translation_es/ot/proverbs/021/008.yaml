    rationale: El texto fuente contrasta 'el camino del hombre...' con 'la obra/conducta del puro'; el borrador dice 'puro es el proceder del recto', haciendo de 'recto' un sustantivo y no un predicado de 'proceder'.
  - severity: medium
    issue: La elección principal 'extraño' para וָזָר no sigue la decisión principal del POB inglés.
    rationale: El expediente inglés optó por 'guilty' en el texto principal para explicitar la fuerza ética, dejando 'strange' en nota. En español, 'culpable' preserva mejor ese contraste con 'puro'.
  - severity: low
    issue: La sintaxis 'Torcida es ... y extraño' suena poco natural en español actual.
    rationale: Puede entenderse, pero un orden más directo mejora la legibilidad sin perder la dignidad del registro.
