translation:
  language: es
  text: Porque no heredaremos con ellos más allá del Jordán y más adelante, porque nuestra herencia ha venido a nosotros de este lado del Jordán, al este.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestra herencia nos ha recaído al este del Jordán» o «nuestra herencia nos ha caído en suerte al este del Jordán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִנְחַל
  english_pob_choice: we will not inherit
  chosen_spanish: heredaremos
  alternatives_spanish:
  - recibiremos una herencia
  - tendremos una posesión
  lexicon: HALOT
  rationale: El verbo נחל en este contexto de reparto de tierra expresa participar en una herencia territorial. En español, «heredar» conserva esa fuerza de posesión asignada y suena natural en una declaración comunitaria futura; la negación queda marcada por «no heredaremos».
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: La preposición con sufijo indica participación conjunta en la herencia. «Con ellos» es la forma más directa y natural en español.
- source_word: מֵעֵבֶר לַיַּרְדֵּן וָהָלְאָה
  english_pob_choice: beyond the Jordan and farther on
  chosen_spanish: más allá del Jordán y más lejos
  alternatives_spanish:
  - más allá del Jordán y más adelante
  - del otro lado del Jordán y más allá
  lexicon: HALOT
  rationale: La frase combina la idea espacial de מעבר del Jordán con un añadido de extensión. «Más allá del Jordán y más lejos» preserva el doble movimiento sin introducir una glosa interpretativa como «del otro lado».
- source_word: בָאָה
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - ha sido asignada
  lexicon: HALOT
  rationale: El perfecto femenino singular concuerda con «nuestra herencia» y expresa una adquisición ya realizada. «Ha venido a nosotros» sigue de cerca el valor básico del verbo y evita volverlo meramente idiomático.
- source_word: נַחֲלָתֵנוּ
  english_pob_choice: our inheritance
  chosen_spanish: nuestra herencia
  alternatives_spanish:
  - nuestra posesión heredada
  - nuestra heredad
  lexicon: HALOT
  rationale: «Herencia» comunica bien el campo semántico de נחלה en contextos de reparto territorial. «Heredad» sería posible, pero «herencia» es más clara para un español contemporáneo.
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: HALOT
  rationale: La preposición con sufijo se vierte naturalmente con «a nosotros» en español, manteniendo el movimiento hacia el sujeto beneficiario.
- source_word: מֵעֵבֶר הַיַּרְדֵּן מִזְרָחָה
  english_pob_choice: on this side of the Jordan, to the east
  chosen_spanish: del lado oriental del Jordán
  alternatives_spanish:
  - al oriente del Jordán
  - en la parte oriental del Jordán
  lexicon: HALOT
  rationale: El hebreo ubica a los hablantes al este del Jordán; en español, «del lado oriental del Jordán» expresa esa ubicación sin la ambigüedad de repetir «más allá». Integra el sentido direccional de מִזְרָחָה y mantiene la perspectiva geográfica del hablante.
theological_decisions:
- issue: Ninguno; el versículo afirma la delimitación territorial de la herencia de las tribus al este del Jordán.
  english_pob_reading: No theological note was required; the verse is rendered as a land-allotment statement.
  chosen_spanish_reading: Se traduce como una afirmación de reparto de herencia territorial, sin cargar el texto con sentido doctrinal adicional.
  alternative_spanish_readings:
  - como una simple descripción geográfica
  - como una declaración de exclusión tribal
  rationale: El pasaje, en su contexto, es una explicación de por qué no cruzarán a heredar con los demás. La traducción debe conservar ese valor narrativo y legal sin añadir implicaciones doctrinales que el hebreo no exige.
  doctrine_reference: Numbers 32; land allotment context
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente que prefirió «beyond the Jordan and farther on» para evitar una repetición torpe con «on this side of the Jordan». En español, opté por una solución equivalente que preserva la repetición espacial sin calcarla de forma pesada.
  spanish_consistency_notes:
  - Usé «Jordán» con artículo implícito según uso bíblico en español.
  - Mantuve «herencia» para נחלה, coherente con el campo de reparto territorial.
  - Evité «SEÑOR» u այլ máscara porque no aparece el Tetragrámaton en este verso.
  - Elegí una sintaxis fluida pero cercana al hebreo, sin convertir el versículo en paráfrasis.
