translation:
  language: es
  text: Y entre las cámaras había un espacio de veinte codos de ancho alrededor del templo[a], alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite la idea de «alrededor» tres veces para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵין
  english_pob_choice: And between
  chosen_spanish: Y entre
  alternatives_spanish:
  - Ahora entre
  - Entre
  lexicon: HALOT
  rationale: La conjunción con la preposición introduce de modo natural el nuevo detalle arquitectónico. «Y entre» conserva la conexión discursiva sin añadir matiz temporal.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las cámaras laterales
  - las habitaciones
  - los aposentos
  lexicon: HALOT
  rationale: En el contexto del templo de Ezequiel, לְשָׁכוֹת designa habitaciones anexas o cámaras arquitectónicas. «Cámaras» corresponde de cerca al término hebreo y evita una especificación interpretativa como «laterales».
- source_word: רֹחַב
  english_pob_choice: a width
  chosen_spanish: un ancho
  alternatives_spanish:
  - el ancho
  - una anchura
  - una medida de ancho
  lexicon: HALOT
  rationale: El sustantivo expresa anchura/ancho. «Un ancho» mantiene el carácter descriptivo del enunciado y su relación con la medida.
- source_word: עֶשְׂרִים אַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos de largo
  - veinte codos de ancho
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para reflejar directamente la medida del texto fuente, sin convertirla a una unidad moderna.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  - rodeando
  lexicon: HALOT
  rationale: «Alrededor» comunica con naturalidad el sentido circunferencial. La repetición final se conserva para reflejar el énfasis hebreo, aunque en español una reiteración más literal sería torpe.
- source_word: לַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». Aunque el contexto visionario remite al templo, en este versículo la forma más cercana al texto fuente es «la casa». Se evita sustituirla por «templo» para no introducir una equivalencia interpretativa no explicitada por el hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y la revisión inglesa más reciente que mantuvo la repetición de «all around». Se ha ajustado «the temple» a «la casa» por mayor correspondencia léxica con בַּיִת, dejando la interpretación contextual de templo en la nota de decisión léxica.
  spanish_consistency_notes:
  - Se mantuvo «codos» como unidad antigua consistente con la práctica de POB para medidas bíblicas.
  - Se prefirió «cámaras» sobre términos más interpretativos para conservar el paralelismo con el hebreo.
  - La repetición final «alrededor» refleja el triple סָבִיב sin sobrecargar la sintaxis española.
