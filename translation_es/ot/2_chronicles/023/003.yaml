  glossary_alignment: 'Cumple con la terminología clave del proyecto: יְהוָה se vierte como «Yahvé» y no como «SEÑOR»; se conserva literalmente «los hijos de David» en vez de resolverlo en «dinastía» en el texto principal. «Pacto» es adecuado para בְּרִית. No hay conflicto con otros términos doctrinales del glosario.'
