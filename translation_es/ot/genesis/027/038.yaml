translation:
  language: es
  text: 'Entonces Esaú dijo a su padre[a]: «¿Es que tienes una sola bendición, padre mío? ¡Bendíceme también a mí, padre mío!» Luego Esaú alzó su voz y lloró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «¿Es la bendición una para ti, padre mío?». El hebreo expresa la angustia de Esaú al sentir que Isaac parece tener solo una bendición que conceder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: Nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio, como en el texto inglés auditado.
- source_word: הַבְּרָכָה אַחַת הִוא לְךָ
  english_pob_choice: Do you have only one blessing
  chosen_spanish: ¿Es que tienes una sola bendición?
  alternatives_spanish:
  - ¿La bendición es una para ti?
  - ¿Tienes solo una bendición?
  - ¿Es una sola la bendición que tienes?
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal con fuerza retórica; en español, una pregunta natural comunica mejor la sorpresa y la angustia de Esaú sin perder la idea de que Isaac parece tener una sola bendición para dar.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: padre mío
  alternatives_spanish:
  - mi padre
  - padre
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona se preserva con una forma reverente y directa. "Padre mío" mantiene el tono afectivo y la repetición enfática del hebreo.
- source_word: בָּרֲכֵנִי
  english_pob_choice: Bless me
  chosen_spanish: ¡Bendíceme!
  alternatives_spanish:
  - Bendíceme
  - Dame tu bendición
  lexicon: HALOT
  rationale: El imperativo de ברך con sufijo de primera persona se traduce de forma directa y concisa. Se conserva la fuerza de ruego urgente del contexto.
- source_word: גַּם אָֽנִי
  english_pob_choice: me too
  chosen_spanish: también a mí
  alternatives_spanish:
  - yo también
  - a mí también
  - también yo
  lexicon: HALOT
  rationale: La expresión introduce a Esaú como otro hijo que pide bendición. "También a mí" reproduce la inclusión insistente con naturalidad en español.
- source_word: וַיִּשָּׂא ... קֹלוֹ
  english_pob_choice: raised his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - subió la voz
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de elevar la voz, muy cercano al inglés auditado, y plenamente comprensible en español.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró amargamente
  - sollozó
  - se puso a llorar
  lexicon: HALOT
  rationale: El verbo denota llanto; "lloró" es la forma más directa y fiel. Dado el contexto emotivo, la sobriedad funciona mejor que una ampliación interpretativa.
translation_notes:
  revision_awareness: El texto en inglés y la revisión más reciente muestran alto acuerdo y no registran cambios pendientes; esta versión española sigue de cerca esa lectura, preservando la pregunta retórica y la intensificación afectiva del hebreo.
  spanish_consistency_notes:
  - Se usa "bendición" en sentido concreto y no como abstracción general, conforme al contexto narrativo.
  - Se mantiene la repetición de "padre mío" para reproducir la insistencia emocional del hebreo.
  - '"Alzó su voz y lloró" conserva el paralelismo verbal sin introducir interpretación adicional.'
  - La nota al pie marca la alternativa literal del hebreo, sin sustituir la traducción principal.
