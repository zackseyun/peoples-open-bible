review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y la auditoría inglesa: mantiene bien la fuerza imprecativa/jusiva con «Que ... y que ...», traduce נֹשֶׁה como «acreedor», לְכָל אֲשֶׁר לוֹ como «todo lo que le pertenece», וְיָבֹזּוּ con «saqueen», y יְגִיעוֹ como «el fruto de su trabajo». La nota sobre יְנַקֵּשׁ preserva correctamente la alternativa léxica «tienda una trampa/atrape» mientras adopta en contexto el sentido económico de apoderarse o embargar.'
  spanish_quality_summary: El español es natural, claro, digno y ampliamente legible en ámbito eclesial. «Que un acreedor se apodere de todo lo que le pertenece, y que extraños saqueen el fruto de su trabajo» suena idiomático y conserva el tono poético e imprecatorio. La puntuación y el registro son adecuados.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones léxicas principales son coherentes con la auditoría POB: «acreedor» para נֹשֶׁה, «saqueen» para בזז, y «fruto de su trabajo» para יְגִיעוֹ. El uso de «extraños» para זָרִים es defendible y coincide con la decisión inglesa de «strangers», sin sobreespecificar «extranjeros».'
  issues:
  - severity: low
    issue: «Se apodere de» añade un matiz de apropiación más que de embargo o incautación.
    rationale: Aunque el contexto permite esa idea y la nota aclara la base léxica, alternativas como «se adueñe de» o «embargue» podrían perfilar de otro modo el matiz económico. No obstante, «se apodere de» sigue siendo fiel y natural.
