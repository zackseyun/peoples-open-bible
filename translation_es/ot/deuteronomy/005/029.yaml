translation:
  language: es
  text: ¡Oh[a], que siempre tuvieran un corazón como este, para temerme y guardar todos mis mandamientos todos los días de su vida, para que les vaya bien a ellos y a sus hijos y sus hijas para siempre!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «Si tan solo...». El hebreo inicial es un modismo de anhelo, literalmente: «¿Quién dará...?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that
  chosen_spanish: ¡Oh[a], que...
  alternatives_spanish:
  - ¡Ojalá...
  - ¿Quién diera...?
  - Si tan solo...
  lexicon: HALOT
  rationale: El hebreo expresa deseo o anhelo, no una pregunta literal. «¡Oh, que...!» transmite bien el valor optativo en español sin perder el tono afectivo ni forzar una pregunta retórica.
- source_word: וְהָיָה
  english_pob_choice: would always have
  chosen_spanish: siempre tuvieran
  alternatives_spanish:
  - hubieran tenido
  - tuvieran
  - estuviera
  lexicon: HALOT
  rationale: En el contexto del deseo, el verbo se vierte como el contenido del anhelo. «Siempre tuvieran» conserva la idea de continuidad implícita en «todos los días».
- source_word: לְבָבָם
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - disposición interior
  lexicon: HALOT
  rationale: «Corazón» reproduce la antropología bíblica del hebreo לֵב/לְבָב como centro de voluntad, pensamiento y disposición moral. «Mente» estrecharía demasiado el sentido.
- source_word: זֶה
  english_pob_choice: such a heart as this
  chosen_spanish: como este
  alternatives_spanish:
  - así
  - de esta clase
  - tal como este
  lexicon: HALOT
  rationale: El demostrativo señala una cualidad concreta de disposición. «Como este» expresa de forma natural la referencia cualitativa a la actitud recién evocada.
- source_word: לְיִרְאָה אֹתִי
  english_pob_choice: to fear me
  chosen_spanish: para temerme
  alternatives_spanish:
  - para reverenciarme
  - para temer de mí
  lexicon: HALOT
  rationale: «Temerme» preserva el idioma bíblico del temor reverente y obediente hacia Dios. «Reverenciarme» sería válido, pero suaviza un poco la fuerza establecida del giro bíblico.
- source_word: וְלִשְׁמֹר
  english_pob_choice: and to keep
  chosen_spanish: y guardar
  alternatives_spanish:
  - y observar
  - y custodiar
  - y cumplir
  lexicon: HALOT
  rationale: Con mandamientos, שׁמר incluye guardar, observar y obedecer. «Guardar» conserva el valor de custodia obediente y suena natural en español bíblico contemporáneo.
- source_word: אֶת כָּל מִצְוֺתַי
  english_pob_choice: all my commandments
  chosen_spanish: todos mis mandamientos
  alternatives_spanish:
  - todos mis preceptos
  - todos mis mandatos
  lexicon: HALOT
  rationale: «Mandamientos» mantiene la carga legal y pactual de מִצְוֺת mejor que alternativas más abstractas. «Todos» expresa la totalidad explícita del hebreo.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all their days
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - todo el tiempo
  - todos sus días
  - siempre
  lexicon: HALOT
  rationale: La frase hebrea literalmente habla de «todos los días»; en español, «de su vida» aclara que se trata del curso completo de la existencia y evita ambigüedad temporal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce finalidad o resultado. «Para que» es la equivalencia natural y clara en español.
- source_word: יִיטַב לָהֶם
  english_pob_choice: it might go well with them
  chosen_spanish: les fuera bien
  alternatives_spanish:
  - les iría bien
  - les prosperara
  - les fuera favorable
  lexicon: HALOT
  rationale: La fórmula covenantal apunta al bienestar bajo la bendición divina. «Les fuera bien» conserva el modismo sin limitarlo a prosperidad material.
- source_word: וְלִבְנֵיהֶם
  english_pob_choice: and with their children
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a su descendencia
  - y a sus hijos e hijas
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma masculina, aquí funciona de manera representativa para la descendencia. «Hijos» es el equivalente directo y aún natural en el registro bíblico; se mantiene la referencia pactual a la siguiente generación.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para toda la vida
  lexicon: HALOT
  rationale: «Para siempre» es la forma más idiomática en español para expresar duración indefinida y continua entre generaciones.
theological_decisions:
- issue: El deseo inicial del versículo
  english_pob_reading: Oh, that
  chosen_spanish_reading: ¡Oh, que...
  alternative_spanish_readings:
  - ¡Ojalá...!
  - ¿Quién diera...?
  rationale: El hebreo מִי יִתֵּן es una fórmula de deseo. «¡Oh, que...!» conserva el tono de anhelo y evita convertir el pasaje en una simple afirmación o pregunta informativa.
  doctrine_reference: Poética bíblica y uso optativo del hebreo; mantener la fuerza afectiva del texto fuente.
- issue: Antropología de לְבָבָם
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - disposición interior
  rationale: El versículo describe el centro interior de la obediencia delante de Yahvé. «Corazón» preserva la categoría bíblica del interior humano sin reducirla a la cognición.
  doctrine_reference: Antropología bíblica; el corazón como sede de voluntad, afecto y pensamiento.
- issue: Destinatarios de la bendición
  english_pob_reading: their children
  chosen_spanish_reading: a sus hijos
  alternative_spanish_readings:
  - a su descendencia
  - a sus hijos e hijas
  rationale: El hebreo בָּנִים puede funcionar genéricamente en contextos pactales. «Hijos» mantiene la proximidad al texto y la cadencia natural de la fórmula de bendición intergeneracional.
  doctrine_reference: Lectura pactal y generacional de la promesa; equivalencia funcional sin sobrerreformular.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que ajustó la idea a un deseo continuado («would always have») para reflejar mejor el valor optativo del hebreo y la duración indicada por «all their days». Por eso el español usa «siempre tuvieran» y mantiene la finalidad/presente continuo de la cláusula.
  spanish_consistency_notes:
  - Se conserva «Yahvé» implícito en la primera persona divina, sin sustituir el nombre por una fórmula de ocultamiento.
  - «Corazón» se usa como término antropológico bíblico, no como emoción meramente sentimental.
  - «Mandamientos» se mantiene para מִצְוֺת, por su valor pactual y legal.
  - La frase final «para siempre» traduce לְעֹלָם en registro natural y continuo.
  - El marcador [a] aparece en el texto principal junto al giro optativo inicial, donde existe la alternativa lexical documentada.
