translation:
  language: es
  text: Estas palabras habló Yahvé a toda su asamblea en el monte, de en medio del fuego, la nube y la densa oscuridad, con fuerte voz, y no añadió más[a]. Y las escribió sobre dos tablas de piedra y me las dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no continuó»; la frase hebrea puede entenderse como «no añadió más» o «no siguió hablando».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino transliterado que el proyecto usa para יְהוָה. En español, "Yahvé" comunica el nombre personal de Dios sin sustituirlo por un título.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: These words
  chosen_spanish: Estas palabras
  alternatives_spanish:
  - Estas cosas
  - Estos mandamientos
  lexicon: HALOT
  rationale: דְּבָרִים significa básicamente "palabras" o "asuntos". Aquí el contexto inmediato son las palabras del pacto recién pronunciadas, por lo que "palabras" conserva el énfasis verbal sin convertirlas en "mandamientos" en el texto principal.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo es el de hablar en forma solemne. En español, "habló" suena natural y mantiene el registro de proclamación pública.
- source_word: כָּל קְהַלְכֶם
  english_pob_choice: all your assembly
  chosen_spanish: toda su asamblea
  alternatives_spanish:
  - toda su congregación
  - toda la asamblea de ustedes
  lexicon: HALOT
  rationale: קָהָל designa al pueblo reunido. "Asamblea" preserva el sentido corporativo mejor que "congregación" y suena natural en este contexto sinaitico.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: En español bíblico, "monte" es la forma más natural y fiel para este escenario. La preposición hebrea se expresa con "en" para el contexto locativo.
- source_word: מִתּוֹךְ הָאֵשׁ הֶעָנָן וְהָעֲרָפֶל
  english_pob_choice: out of the midst of the fire, the cloud, and the thick darkness
  chosen_spanish: desde en medio del fuego, la nube y la densa oscuridad
  alternatives_spanish:
  - desde el fuego, la nube y la espesa oscuridad
  - de en medio del fuego, la nube y la densa niebla oscura
  lexicon: HALOT
  rationale: מִתּוֹךְ pide una expresión que conserve la intensidad espacial de "en medio de". "Densa oscuridad" refleja עֲרָפֶל como oscuridad profunda o densa, más directamente que un término interpretativo como "niebla oscura".
- source_word: קוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con una gran voz
  alternatives_spanish:
  - con voz potente
  - con voz fuerte
  lexicon: HALOT
  rationale: Literalmente es "voz grande". En español, "gran voz" conserva el valor semítico y el tono solemne mejor que una simple paráfrasis acústica, aunque puede sonar menos idiomático que "voz fuerte".
- source_word: וְלֹא יָסָף
  english_pob_choice: and he added no more
  chosen_spanish: y no añadió más
  alternatives_spanish:
  - y no continuó
  - y no cesó
  lexicon: HALOT
  rationale: La frase es idiomática y admite más de una lectura. "No añadió más" sigue bien el sentido de que no hubo más palabras añadidas en esta proclamación, sin borrar la tensión semántica de que también puede entenderse como "no continuó".
- source_word: וַיִּכְתְּבֵם
  english_pob_choice: And he wrote them
  chosen_spanish: Y las escribió
  alternatives_spanish:
  - Entonces las escribió
  - Y él las escribió
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración. "Las escribió" mantiene la referencia a las palabras y sigue la fluidez del español sin repetir innecesariamente el sujeto.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  english_pob_choice: two tablets of stone
  chosen_spanish: dos tablas de piedra
  alternatives_spanish:
  - dos tablas de piedra labrada
  - dos tabletas de piedra
  lexicon: HALOT
  rationale: '"Tablas de piedra" reproduce bien el sintagma hebreo y es un equivalente tradicional y claro en español. "Tablas" evita modernizar en exceso con "tabletas".'
- source_word: וַיִּתְּנֵם אֵלָי
  english_pob_choice: and gave them to me
  chosen_spanish: y me las entregó
  alternatives_spanish:
  - y me las dio
  - y me las dio a mí
  lexicon: HALOT
  rationale: El hebreo implica la entrega de los objetos al hablante. "Entregó" añade la idea de transferencia formal que encaja bien con el contexto del pacto; el objeto indirecto de primera persona mantiene la referencia clara.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino según el estándar del proyecto, evitando la sustitución por un título y manteniendo transparencia sobre el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Sentido de וְלֹא יָסָף
  english_pob_reading: and he added no more
  chosen_spanish_reading: y no añadió más
  alternative_spanish_readings:
  - y no continuó
  - y no cesó
  rationale: La formulación elegida comunica la clausura del discurso sin resolver de manera excesiva la ambigüedad del hebreo. Se conserva la tensión textual con una redacción que puede entenderse también en clave de no continuar añadiendo palabras.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El antecedente inglés del POB muestra acuerdo alto y sin revisiones aplicadas; esta versión española sigue ese estado, manteniendo el mismo tratamiento de la ambigüedad de וְלֹא יָסָף y el mismo enfoque para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה según la terminología del proyecto.
  - Se usa asamblea para קָהָל y no congregación, para conservar el matiz de reunión comunitaria.
  - Se elige tablas de piedra, no una paráfrasis moderna, para reflejar el hebreo y la tradición bíblica en español.
  - La nota al pie está anclada en «habló[a]» para señalar la alternativa de lectura del verbo final sin sobrecargar el texto principal.
