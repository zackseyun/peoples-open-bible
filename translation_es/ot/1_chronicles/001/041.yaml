translation:
  language: es
  text: 'Los hijos de Anah: Dishón. Y los hijos de Dishón: Hamrán[a], Esbán, Itrán y Querán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En Génesis 36:26, un paralelo genealógico lee «Hemdán» en lugar de «Hamrán». El texto principal sigue aquí el hebreo masorético de 1 Crónicas.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos varones de
  lexicon: HALOT
  rationale: En listas genealógicas, בן en constructo plural suele expresar relación de descendencia. En español, «hijos de» es la forma natural y suficientemente precisa para este contexto; «descendientes» suaviza demasiado el parentesco inmediato.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Anah
  alternatives_spanish:
  - Ana
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma habitual que refleja mejor el hebreo y evita confundirlo con el nombre español común «Ana».
- source_word: דִּישׁוֹן
  english_pob_choice: Dishon
  chosen_spanish: Dishón
  alternatives_spanish:
  - Disón
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. Se mantiene con acento gráfico para lectura española; el valor consonántico corresponde al hebreo del nombre.
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y los hijos varones de
  lexicon: HALOT
  rationale: La conjunción inicial se conserva con «Y» para mantener la secuencia genealógica. Se repite «hijos de» por coherencia con la primera cláusula.
- source_word: חַמְרָן
  english_pob_choice: Hamran
  chosen_spanish: Hamrán
  alternatives_spanish:
  - Hemdán
  lexicon: Nombre propio
  rationale: El texto hebreo base lee חמרן, por lo que la transliteración principal sigue esa forma. Se conserva la posibilidad textual relacionada con la tradición paralela mediante nota.
- source_word: אֶשְׁבָּן
  english_pob_choice: Eshban
  chosen_spanish: Esbán
  alternatives_spanish:
  - Eshbán
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera directa al español, ajustando la acentuación para lectura natural.
- source_word: יִתְרָן
  english_pob_choice: Ithran
  chosen_spanish: Itrán
  alternatives_spanish:
  - Yitrán
  - Jetrán
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. En español se prefiere una forma breve y directa que refleje el hebreo sin depender de una anglicanización secundaria.
- source_word: כְרָן
  english_pob_choice: Keran
  chosen_spanish: Querán
  alternatives_spanish:
  - Kerán
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. Se usa «Qu» antes de «e» para una lectura española natural, sin alterar la identificación del nombre.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético provisto para 1 Crónicas 1:41 y se preservó la variante paralela de Génesis 36:26 en nota, tal como el POB inglés. No se introdujeron expansiones interpretativas; el verso se mantuvo como una lista genealógica breve y directa.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» como fórmula genealógica estable.
  - Se conservaron nombres propios con transliteración española consistente y acentuación gráfica para facilitar la lectura.
  - La nota textual se ancla solo en el nombre variante, sin afectar el texto principal.
