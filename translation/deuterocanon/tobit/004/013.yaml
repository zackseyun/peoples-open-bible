  confidence: high
  validation: agree
translation:
  text: And now[a], child, love your brothers, and do not become proud in your heart over your brothers and the sons and daughters of your people, so as to take a wife for yourself from among them. For in pride there is ruin and much disorder, and in uselessness there is decline and great want[b]; for uselessness is the mother of famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be haughty toward your brothers and the sons and daughters of your people when taking a wife for yourself from among them.' The Greek syntax is compressed, and the relation between the warning against pride and the marriage clause can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: '''Idleness'' could also be rendered ''sloth'' or, less likely in this context, ''worthlessness.'' The surrounding lines about decline, want, and famine favor the sense of laziness or unproductive inactivity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίον
  chosen: child
  alternatives:
  - my child
  - son
  lexicon: BDAG
  rationale: A tender direct address; 'child' preserves the familial tone without over-specifying gender beyond the Greek diminutive. 'My child' would add a possessive not present here.
- source_word: ἀγάπα
  chosen: love
  alternatives:
  - show love to
  - care for
  lexicon: BDAG
  rationale: Direct imperative of ἀγαπάω; 'love' is the plain and consistent rendering.
- source_word: ἀδελφούς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - kinsmen
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural. Per project philosophy, gender-accurate rendering is preferred. Here the following phrase explicitly expands to 'sons and daughters of your people,' so 'brothers' is retained rather than smoothing to a mixed-gender term.
- source_word: ὑπερηφάνευε
  chosen: become proud
  alternatives:
  - be arrogant
  - be haughty
  lexicon: BDAG
  rationale: The prohibition concerns prideful self-exaltation. 'Become proud' reads naturally in English while preserving the moral sense; 'arrogant' and 'haughty' are possible but either more interpretive or less natural.
- source_word: τῇ καρδίᾳ σου
  chosen: in your heart
  alternatives:
  - in your mind
  - within yourself
  lexicon: BDAG
  rationale: A standard anthropological expression for inward disposition; 'heart' should be preserved rather than psychologized.
- source_word: ἀπὸ τῶν ἀδελφῶν σου καὶ τῶν υἱῶν καὶ θυγατέρων τοῦ λαοῦ σου
  chosen: over your brothers and the sons and daughters of your people
  alternatives:
  - against your brothers and the sons and daughters of your people
  - toward your brothers and the sons and daughters of your people
  lexicon: BDAG
  rationale: With pride language, ἀπό here is best represented idiomatically as elevation over others rather than simple separation from them. The phrase marks those over whom one might exalt oneself.
- source_word: λαβεῖν σεαυτῷ ἐξ αὐτῶν γυναῖκα
  chosen: so as to take a wife for yourself from among them
  alternatives:
  - to marry a wife from among them
  - to take for yourself a wife from them
  lexicon: BDAG
  rationale: The infinitive expresses purpose or result connected to the preceding warning. 'Take a wife' reflects the idiom closely; 'marry' is possible but slightly less formal to the source wording.
- source_word: ἀπώλεια
  chosen: ruin
  alternatives:
  - destruction
  - loss
  lexicon: BDAG
  rationale: In this wisdom context, 'ruin' conveys disastrous outcome without overloading the term with eschatological force.
- source_word: ἀκαταστασία πολλή
  chosen: much disorder
  alternatives:
  - great confusion
  - much instability
  lexicon: BDAG
  rationale: The phrase denotes social and practical upheaval. 'Much disorder' is clear and suitably broad.
- source_word: ἀχρειότης
  chosen: idleness
  alternatives:
  - sloth
  - worthlessness
  - laziness
  lexicon: BDAG
  rationale: In the paired consequences 'decline' and 'great want' and the concluding proverb about famine, the sense is not abstract worthlessness but unproductive laziness. 'Idleness' best fits the context and keeps the proverbial tone.
- source_word: ἐλάττωσις
  chosen: decline
  alternatives:
  - diminishing
  - poverty
  - reduction
  lexicon: BDAG
  rationale: The noun indicates being reduced or diminished. 'Decline' works idiomatically in English and fits the economic-social context.
- source_word: ἔνδεια μεγάλη
  chosen: great want
  alternatives:
  - great need
  - great poverty
  lexicon: BDAG
  rationale: The phrase denotes lack or need. 'Great want' preserves the sense of deprivation and matches wisdom-style diction.
- source_word: μήτηρ ἐστὶν τοῦ λιμοῦ
  chosen: is the mother of famine
  alternatives:
  - gives birth to famine
  - is the source of famine
  lexicon: BDAG
  rationale: The maternal metaphor is explicit and vivid in Greek; it should be preserved rather than flattened into an abstract causal statement.
