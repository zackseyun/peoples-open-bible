translation:
  language: es
  text: Levántense y váyanse, porque este no es el lugar de reposo[a]; por causa de la impureza[b] trae destrucción, incluso destrucción gravísima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque este no es el lugar de descanso». El sustantivo hebreo puede significar «reposo» o «lugar de reposo»; aquí probablemente se refiere a la tierra como lugar de asentamiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a causa de impureza». El hebreo expresa la razón con una construcción nominal; también podría entenderse como «por ser impuro», pero el contexto favorece un sustantivo abstracto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמוּ
  english_pob_choice: Rise
  chosen_spanish: Levántense
  alternatives_spanish:
  - Levantaos
  - Pónganse de pie
  lexicon: HALOT
  rationale: Es un imperativo plural directo. 'Levántense' transmite bien el mandato de ponerse en movimiento y suena natural en español actual sin perder fuerza.
- source_word: וּ/לְכ֔וּ
  english_pob_choice: and go
  chosen_spanish: y váyanse
  alternatives_spanish:
  - y vayan
  - y partan
  lexicon: HALOT
  rationale: En este contexto de expulsión o desplazamiento, 'váyanse' expresa mejor el matiz de salida que un simple 'vayan'. Mantiene el paralelismo del mandato con 'Levántense'.
- source_word: כִּ֥י לֹא זֹ֖את הַ/מְּנוּחָ֑ה
  english_pob_choice: for this is not the resting place
  chosen_spanish: porque este no es el lugar de reposo
  alternatives_spanish:
  - porque este no es el reposo
  - porque este no es el lugar de descanso
  lexicon: HALOT
  rationale: '''מְנוּחָה'' puede significar ''reposo'' o ''lugar de reposo''. Dado el demostrativo y el contexto de la tierra como espacio de asentamiento, ''lugar de reposo'' conserva la referencia concreta sin sonar forzado.'
- source_word: בַּ/עֲב֥וּר טָמְאָ֛ה
  english_pob_choice: because of uncleanness
  chosen_spanish: por causa de impureza
  alternatives_spanish:
  - a causa de inmundicia
  - por la impureza
  lexicon: HALOT
  rationale: La construcción causal pide una frase nominal en español. 'Impureza' preserva el sentido cultual y moral de טָמְאָה sin introducir un sujeto innecesario; 'por causa de' refleja bien בַּעֲבוּר.
- source_word: תְּחַבֵּ֖ל
  english_pob_choice: it brings destruction
  chosen_spanish: trae destrucción
  alternatives_spanish:
  - causa destrucción
  - arruina
  lexicon: HALOT
  rationale: El verbo intensivo puede expresar arruinar o traer destrucción. 'Trae destrucción' conserva el efecto resultante y funciona con fluidez en español.
- source_word: וְ/חֶ֥בֶל
  english_pob_choice: indeed, destruction
  chosen_spanish: sí, destrucción
  alternatives_spanish:
  - y destrucción
  - de hecho, destrucción
  lexicon: HALOT
  rationale: El sustantivo cognado refuerza la idea anterior. 'Sí' reproduce la intensificación sin volver artificial la repetición en español.
- source_word: נִמְרָֽץ
  english_pob_choice: grievous
  chosen_spanish: gravísima
  alternatives_spanish:
  - severa
  - violenta
  - muy grave
  lexicon: HALOT
  rationale: נִמְרָץ comunica intensidad y severidad. 'Gravísima' intensifica adecuadamente el sustantivo 'destrucción' y conserva el efecto enfático del hebreo.
theological_decisions:
- issue: Referente implícito de la cláusula causal
  english_pob_reading: The clause refers to the land/resting place as defiled and therefore destructive.
  chosen_spanish_reading: La cláusula se entiende como referida al lugar de reposo/la tierra, que está contaminado por impureza y por eso resulta destructivo.
  alternative_spanish_readings:
  - La impureza en abstracto es la causa de la destrucción.
  - La frase se mantiene impersonal sin precisar el referente.
  rationale: El femenino hebreo concuerda naturalmente con מְנוּחָה ('lugar de reposo'). En español conviene mantener la referencia al lugar, pero sin forzar una glosa más allá de lo que el versículo permite.
  doctrine_reference: Ezequiel 36:17-18; Levítico 18:25-28
- issue: Fuerza de la clausula final וְחֶבֶל נִמְרָץ
  english_pob_reading: 'An emphatic intensification: ''indeed, grievous destruction.'''
  chosen_spanish_reading: 'Una intensificación retórica: ''sí, destrucción gravísima''.'
  alternative_spanish_readings:
  - y destrucción severa
  - de hecho, destrucción violenta
  rationale: El hebreo usa verbo y sustantivo de la misma raíz para reforzar la idea, seguido de un adjetivo de intensidad. La versión española conserva el escalonamiento y el énfasis sin volverse rígida.
  doctrine_reference: Isaías 10:23; Nahúm 1:2-3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una causalidad explícita con 'because of uncleanness' para reflejar más directamente בַּעֲבוּר טָמְאָה y evitar añadir un sujeto. La redacción española sigue esa línea con 'por causa de impureza'. También conserva la intensificación doble del final mediante 'sí, destrucción gravísima'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma predeterminada solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó 'Señor' y 'Cristo' por no corresponder al hebreo de este verso.
  - '''Lugar de reposo'' se usa como equivalente consistente de מְנוּחָה cuando el contexto apunta al asentamiento de la tierra.'
