  language: en
  yaml_path: translation/ot/1_kings/019/014.yaml
  text: And he said[a], “I have been very zealous for Yahweh, the God of hosts, because the sons of Israel have forsaken your covenant, torn down your altars, and killed your prophets with the sword. I alone am left, and they seek my life[b], to take it.”
