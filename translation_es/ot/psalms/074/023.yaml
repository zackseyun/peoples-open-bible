translation:
  language: es
  text: No olvides la voz de tus enemigos[a], el estruendo de los que se levantan contra ti[b], que sube continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de tus enemigos». קוֹל puede significar tanto «voz» como «sonido» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «el tumulto de los que se levantan contra ti sube continuamente». El hebreo puede leerse de modo más breve sin el relativo «que», pero la redacción principal aclara la sintaxis en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No olvides
  alternatives_spanish:
  - No te olvides
  - No olvides nunca
  lexicon: HALOT
  rationale: La partícula negativa con imperfecto funciona como prohibición o ruego. En español, «No olvides» preserva la fuerza directa y mantiene la apelación en segunda persona singular.
- source_word: תִּשְׁכַּח
  english_pob_choice: forget
  chosen_spanish: olvides
  alternatives_spanish:
  - te olvides
  - dejes de recordar
  lexicon: HALOT
  rationale: שׁכח significa «olvidar». «Olvides» conserva el sentido léxico directo sin suavizarlo con una paráfrasis.
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - ruido
  - clamor
  lexicon: HALOT
  rationale: Aunque קוֹל puede ser «sonido/ruido», la elección «voz» sigue la decisión auditada de la POB inglesa y mantiene la concreción del hebreo, aun cuando el contexto hostil permita matiz de sonido.
- source_word: צֹרְרֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus foes
  - los que te son hostiles
  lexicon: HALOT
  rationale: El participio plural con sufijo denota adversarios/enemigos. «Tus enemigos» es natural y fiel, y reproduce el tono directo del texto.
- source_word: שְׁאוֹן
  english_pob_choice: uproar
  chosen_spanish: estruendo
  alternatives_spanish:
  - tumulto
  - rugido
  - ruido
  lexicon: HALOT
  rationale: שְׁאוֹן expresa un gran ruido o conmoción. «Estruendo» transmite bien la intensidad sonora y el desorden implícito, en paralelo con «voz».
- source_word: קָמֶיךָ
  english_pob_choice: those who rise against you
  chosen_spanish: los que se levantan contra ti
  alternatives_spanish:
  - tus adversarios
  - los que se alzan contra ti
  lexicon: HALOT
  rationale: El participio de קום con sufijo describe literalmente a quienes se alzan contra alguien. «Se levantan contra ti» conserva la imagen verbal de oposición.
- source_word: עֹלֶה
  english_pob_choice: goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - va subiendo
  lexicon: HALOT
  rationale: עלה en este contexto describe algo que sube o asciende. «Sube» conserva la imagen hebrea con español natural.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: תמיד indica continuidad o persistencia. «Continuamente» refleja de manera precisa la idea de algo que no cesa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la solución auditada en inglés, manteniendo el paralelismo entre «voz» y «estruendo» y la imagen de ascenso continuo del ruido hostil. No se detectaron revisiones aplicadas en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa segunda persona singular («tus», «ti») para reflejar el sufijo hebreo -ךָ.
  - Se conserva el matiz hostil de los dos miembros paralelos sin convertirlos en una sola idea general.
