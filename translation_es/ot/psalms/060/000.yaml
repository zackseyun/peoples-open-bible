translation:
  language: es
  text: 'Para el director del coro: según «Lirio de Testimonio».[a] Miktam[b] de David[c], para instrucción, cuando combatió contra Aram-naaráim y Aram-zobá, y Joab volvió e hirió a doce mil de Edom en el valle de la Sal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «al son de “Lirio de Testimonio”». El hebreo probablemente conserva un título musical o litúrgico, pero su sentido exacto es incierto.'
    reason: lexical_alternative
  - marker: b
    text: «Miktam» es una etiqueta de género hebrea de sentido incierto; algunos la toman como designación musical o literaria en vez de traducirla.
    reason: lexical_alternative
  - marker: c
    text: «De David» también puede significar «por David» o «para David»; la construcción hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַ֭/מְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de canto
  - Para el director de música
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término designa una función musical/litúrgica. «Director del coro» comunica bien la responsabilidad musical sin volverlo demasiado técnico o arcaico.
- source_word: עַל שׁוּשַׁ֣ן עֵד֑וּת
  english_pob_choice: according to “Lily of Testimony.”
  chosen_spanish: según «Lirio de Testimonio»
  alternatives_spanish:
  - al son de «Lirio de Testimonio»
  - conforme a «Lirio de Testimonio»
  - a la melodía de «Lirio de Testimonio»
  lexicon: HALOT
  rationale: La expresión hebrea probablemente introduce una designación musical o litúrgica; «según» mantiene la ambigüedad entre referencia a melodía, estilo o encabezado sin forzar una explicación no demostrable.
- source_word: שׁוּשַׁן
  english_pob_choice: Lily
  chosen_spanish: Lirio
  alternatives_spanish:
  - Lirio
  - Lirios
  lexicon: HALOT
  rationale: «Lirio» es la forma natural y transparente en español para el nombre floral del título. Se conserva en singular, como en el hebreo y en la auditable decisión inglesa.
- source_word: עֵדוּת
  english_pob_choice: Testimony
  chosen_spanish: Testimonio
  alternatives_spanish:
  - Testimonio
  - Prueba
  lexicon: HALOT
  rationale: «Testimonio» reproduce el sentido más directo y solemne del sustantivo, y encaja mejor en un título litúrgico que una glosa explicativa.
- source_word: מִכְתָּם
  english_pob_choice: miktam
  chosen_spanish: miktam
  alternatives_spanish:
  - inscripción
  - poema
  - canto de oro
  lexicon: HALOT
  rationale: El significado es incierto; la transliteración evita imponer una traducción especulativa y conserva la trazabilidad del término hebreo.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: La construcción hebrea puede indicar autoría, asociación o dedicación. «De David» preserva esa ambigüedad mejor que resolverla en una sola dirección.
- source_word: לְלַמֵּד
  english_pob_choice: for teaching
  chosen_spanish: para enseñar
  alternatives_spanish:
  - para instrucción
  - con fines didácticos
  lexicon: HALOT
  rationale: La forma infinitiva expresa propósito. «Para enseñar» es natural en español y mantiene el valor final sin añadir interpretación.
translation_notes:
  revision_awareness: 'Se respetó la corrección del audit trail que reubicó las marcas de nota: la nota sobre «Lirio de Testimonio» va unida a ese título, la de «miktam» a su transliteración y la de «de David» a esa frase. No se arrastraron marcas mal colocadas de versiones anteriores.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto no contiene el tetragrámaton como sustitución devocional, sino una cabecera musical/litúrgica.
  - Se conservó la mayúscula inicial en «Lirio de Testimonio» por tratarse de un título designativo.
  - El orden de la cláusula final sigue de cerca el hebreo y la versión inglesa auditada, sin normalizar demasiado la sintaxis para no perder el tono de superscripción.
