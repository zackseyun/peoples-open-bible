translation:
  language: es
  text: Porque cierto Simón, oponiéndose a Onías, quien en otro tiempo había ocupado el sumo sacerdocio de por vida, un hombre noble y bueno, cuando no pudo, aunque lo difamaba por todos los medios, hacerle daño en asuntos de la nación, se fue como exiliado[a], con intención de traicionar a su patria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «partió como fugitivo»; el griego φυγάς puede designar tanto a un exiliado como a alguien en fuga.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιπολιτευόμενος
  english_pob_choice: opposing
  chosen_spanish: oponiéndose a
  alternatives_spanish:
  - opuesto a
  - combatiendo contra
  - actuando en contra de
  lexicon: LSJ
  rationale: El participio expresa oposición activa; «oponiéndose a» conserva el sentido adversarial sin añadir un matiz político más técnico del que exige el griego.
- source_word: τὸν ποτε τὴν ἀρχιερωσύνην ἔχοντα διὰ βίου
  english_pob_choice: who had once held the high priesthood for life
  chosen_spanish: quien una vez había tenido el sumo sacerdocio por toda la vida
  alternatives_spanish:
  - quien antes había tenido el sumo sacerdocio de por vida
  - el antiguo sumo sacerdote vitalicio
  lexicon: LSJ
  rationale: «Una vez había tenido» refleja ποτε como estado anterior, y «por toda la vida» conserva διὰ βίου sin perder claridad en español. Se mantiene la idea institucional de sumo sacerdocio y su duración vitalicia.
- source_word: καλὸν καὶ ἀγαθὸν ἄνδρα
  english_pob_choice: a noble and good man
  chosen_spanish: un hombre noble y bueno
  alternatives_spanish:
  - un hombre honorable y bueno
  - un hombre noble y recto
  lexicon: LSJ
  rationale: La fórmula es elogiosa e idiomática; «noble y bueno» reproduce el tono elevado del griego y coincide con la línea del POB en inglés.
- source_word: διαβάλων
  english_pob_choice: slandering him
  chosen_spanish: lo difamaba
  alternatives_spanish:
  - lo calumniaba
  - lo malignaba
  - lo acusaba falsamente
  lexicon: LSJ
  rationale: διαβάλλω expresa desacreditación hostil o calumnia. «Lo difamaba» es natural en español y conserva la fuerza injuriosa del verbo sin suavizarla.
- source_word: ὑπὲρ τοῦ ἔθνους
  english_pob_choice: on behalf of the nation
  chosen_spanish: en favor de la nación
  alternatives_spanish:
  - respecto de la nación
  - por causa de la nación
  - en interés de la nación
  lexicon: LSJ
  rationale: Se sigue la lectura más literal del auditable inglés, pero en español «en favor de» comunica mejor la relación de beneficio/intención que ὑπέρ puede sugerir aquí. Se evita una restricción interpretativa excesiva.
- source_word: οὐκ ἴσχυεν κακῶσαι
  english_pob_choice: was unable ... to harm him
  chosen_spanish: no pudo ... dañarlo
  alternatives_spanish:
  - no logró ... hacerle daño
  - no fue capaz de perjudicarlo
  lexicon: LSJ
  rationale: La construcción expresa incapacidad para infligir daño. «No pudo dañarlo» es conciso y conserva el resultado negativo perseguido por Simon.
- source_word: φυγὰς ᾤχετο
  english_pob_choice: went away as an exile
  chosen_spanish: se fue como exiliado
  alternatives_spanish:
  - partió como fugitivo
  - se marchó desterrado
  - se fue en exilio
  lexicon: LSJ
  rationale: φυγάς puede significar exiliado o fugitivo. «Como exiliado» es legible y mantiene la ambigüedad sin forzar un solo matiz.
- source_word: τὴν πατρίδα προδώσων
  english_pob_choice: intending to betray his homeland
  chosen_spanish: con intención de traicionar a su patria
  alternatives_spanish:
  - con intención de traicionar su tierra natal
  - para traicionar a su patria
  - intentando entregar su patria
  lexicon: LSJ
  rationale: El participio de futuro expresa propósito. «Traicionar a su patria» preserva el peso patriótico de πατρίς en un registro natural y digno.
theological_decisions:
- issue: Sentido de ὑπὲρ τοῦ ἔθνους
  english_pob_reading: on behalf of the nation / in matters concerning the nation
  chosen_spanish_reading: en favor de la nación
  alternative_spanish_readings:
  - respecto de la nación
  - en asuntos de la nación
  - por la nación
  rationale: No hay necesidad de fijar una sola lectura fuerte para ὑπέρ. «En favor de la nación» permite oír el matiz de interés público o beneficio, sin cerrar la posibilidad de un ámbito más general referido a la nación.
  doctrine_reference: No aplica; decisión semántica contextual, no doctrinal.
- issue: Valor de φυγάς
  english_pob_reading: exile / fugitive
  chosen_spanish_reading: exiliado
  alternative_spanish_readings:
  - fugitivo
  - desterrado
  rationale: El griego admite doble posibilidad. Dado el registro narrativo, «exiliado» es más publicable en español y mantiene la ambigüedad de estatus/huida sin convertirla en un hecho legal no explicitado.
  doctrine_reference: No aplica; decisión léxica narrativa.
translation_notes:
  revision_awareness: Se incorporó la revisión reciente del inglés POB que afinó la aposición de «who had once held» y mantuvo una lectura literal de ὑπὲρ τοῦ ἔθνους. En español se preservó esa estructura sin volverla pesada, y se conservó la ambigüedad de φυγάς con una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto cuando corresponda; aquí no aparece.
  - Se mantuvo «sumo sacerdocio» para ἀρχιερωσύνη, evitando sustituirlo por una formulación más eclesial.
  - Se tradujo πατρίς como «patria» para conservar la resonancia cívica y afectiva del término.
  - La puntuación busca reflejar la acumulación apposicional del griego sin descomponer en demasiadas cláusulas.
  - No se añadieron notas textuales, pues el paquete fuente no muestra variantes relevantes para este versículo.
