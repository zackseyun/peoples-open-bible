translation:
  language: es
  text: Porque muchas naciones y grandes reyes harán servir aun a ellos[a], y yo les pagaré conforme a su obra y conforme a la obra de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque muchas naciones y grandes reyes han servido / se han servido de ellos». El hebreo es comprimido; por el contexto, lo más probable es que Babilonia sea la que ahora será obligada a servir a otros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la afirmación anterior; «porque» preserva bien el valor explicativo en español natural.
- source_word: עָבְדוּ בָם
  english_pob_choice: will make even them serve
  chosen_spanish: los harán servir
  alternatives_spanish:
  - han servido de ellos
  - los esclavizarán
  - servirán ellos mismos con ellos
  lexicon: HALOT
  rationale: 'El hebreo es comprimido y, por contexto, expresa una inversión: Babilonia será sometida al servicio de otros. «Los harán servir» comunica esa idea causal sin añadir más de lo que el contexto permite.'
- source_word: גַּם הֵמָּה
  english_pob_choice: even them
  chosen_spanish: ellos mismos también
  alternatives_spanish:
  - también ellos
  - hasta ellos
  lexicon: HALOT
  rationale: El pronombre enfático con גם marca reversión de papeles. En español, el orden elegido mantiene el énfasis sin sonar forzado.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  lexicon: HALOT
  rationale: גוֹיִם es el término geopolítico habitual; «naciones» preserva mejor el referente histórico y político.
- source_word: וּמְלָכִים גְּדוֹלִים
  english_pob_choice: and great kings
  chosen_spanish: y grandes reyes
  alternatives_spanish:
  - y reyes poderosos
  - y reyes fuertes
  lexicon: HALOT
  rationale: גדולים significa literalmente «grandes»; se conserva la forma directa, que en español también puede expresar poder o importancia.
- source_word: וְשִׁלַּמְתִּי לָהֶם
  english_pob_choice: and I will repay them
  chosen_spanish: y yo les pagaré
  alternatives_spanish:
  - y yo les recompensaré
  - y yo les retribuiré
  lexicon: HALOT
  rationale: שׁלם en piel tiene valor de devolver o retribuir; «pagaré» mantiene la idea de restitución/juzgamiento con claridad moderna. El dativo «les» evita ambigüedad sobre el referente.
- source_word: כְּפָעֳלָם
  english_pob_choice: according to their work
  chosen_spanish: conforme a su obra
  alternatives_spanish:
  - según su trabajo
  - de acuerdo con su obra
  lexicon: HALOT
  rationale: פעל puede ser trabajo, obra o acción. «Obra» conserva un registro sobrio y permite la correspondencia con la siguiente cola.
- source_word: וּכְמַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: and according to the work of their hands
  chosen_spanish: y conforme a la obra de sus manos
  alternatives_spanish:
  - y conforme al trabajo de sus manos
  - y según la obra de sus manos
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea del «trabajo/obra de sus manos» y la distinción mínima entre פעל y מעשה, como en el audit trail inglés tras la revisión.
theological_decisions:
- issue: Referente de «los» en la inversión de juicio
  english_pob_reading: '''them'' refers to Babylon/the Chaldeans, who will themselves be subjugated by many nations and great kings'
  chosen_spanish_reading: «los» se refiere a Babilonia / los caldeos, que serán puestos a servir a muchas naciones y grandes reyes
  alternative_spanish_readings:
  - «ellos» como referencia general a las naciones y reyes
  - 'una lectura pasada: «muchas naciones y grandes reyes los sirvieron»'
  rationale: El contexto inmediato de Jeremías 25:12-14 anuncia juicio contra Babilonia. Por eso la traducción debe reflejar la inversión de dominio y no una simple referencia retrospectiva al pasado.
  doctrine_reference: Jeremías 25:12-14; retribución judicial divina en el contexto del juicio sobre Babilonia
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que ajustó «the deed of their hands» a «the work of their hands» para mayor consistencia léxica y paralelismo formal. En español se reflejó esa decisión con «la obra de sus manos».
  spanish_consistency_notes:
  - Se mantiene «obra» para ambos miembros paralelos, respetando la duplicación formal del hebreo y la revisión inglesa.
  - Se evitó «SEÑOR» y no aparece ninguna terminología que reemplace el texto base; este versículo no contiene YHWH explícito.
  - La solución «los harán servir» conserva la inversión de juicio documentada en el audit trail, sin imponer una lectura tradicionalizante distinta.
