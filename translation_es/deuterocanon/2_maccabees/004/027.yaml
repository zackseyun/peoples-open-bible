revisions:
- from: Pero Menelao seguía reteniendo el cargo[a], y no hizo ninguna provisión en absoluto para el dinero que había prometido al rey.
  to: Pero Menelao retenía el cargo[a], y no tomó ninguna medida en absoluto con respecto al dinero que había prometido al rey.
  rationale: Se ajusta el español para que suene natural y fiel al griego y al audit trail inglés. «Retenía el cargo» conserva la idea del imperfecto sin la pesadez de «seguía reteniendo». «No tomó ninguna medida en absoluto» transmite mejor en español el valor de οὐδὲν εὐτάκτει como falta total de disposición o gestión respecto al dinero prometido, sin reducir obligatoriamente el sentido al acto directo de pagar. La nota se reescribe en español más idiomático y mantiene la alternativa explícita preservada por el POB inglés.
