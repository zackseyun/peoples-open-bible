base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/024.yaml
  text: Then call on the name of your god[a], and I will call on the name of Yahweh; and the God who answers by fire, he is God." And all the people answered and said[b], "The thing is good.
  footnotes:
  - marker: a
    text: Or, 'your gods,' if אֱלֹהֵיכֶם is taken as a true plural rather than a singular reference to the deity represented in the contest.
    reason: lexical_alternative
  - marker: b
    text: Or, 'The proposal is good' or 'The thing is good.' Hebrew דָּבָר can mean 'word,' 'matter,' or 'proposal.'
    reason: lexical_alternative
