translation:
  language: es
  text: 'Entonces Caleb hizo callar al pueblo delante de Moisés[a] y dijo: «Ciertamente subamos[b] y tomemos posesión de ella, porque ciertamente podemos hacerlo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acalló al pueblo delante de Moisés». El verbo hebreo también puede significar «silenció» o «sosegó».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «subiendo subamos»; una construcción enfática que expresa firme determinación.
    reason: lexical_alternative
  - marker: c
    text: O «porque bien podemos hacerlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהַס
  english_pob_choice: quieted
  chosen_spanish: calló
  alternatives_spanish:
  - acalló
  - silenció
  - sosegó
  lexicon: HALOT
  rationale: El verbo hebreo expresa hacer que un grupo quede quieto o en silencio. En español, «calló» comunica de forma natural que Caleb hizo guardar silencio al pueblo; «silenció» o «acalló» serían más enfáticos, y «sosegó» desplaza el matiz hacia apaciguar.
- source_word: אֶת־הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  lexicon: HALOT
  rationale: «Pueblo» reproduce el colectivo israelita del contexto. «La gente» sería más genérico y menos preciso para esta escena narrativa.
- source_word: אֶל־מֹשֶׁה
  english_pob_choice: before Moses
  chosen_spanish: delante de Moisés
  alternatives_spanish:
  - ante Moisés
  - en presencia de Moisés
  lexicon: HALOT
  rationale: La construcción hebrea aquí no es sólo direccional; marca la intervención en el marco de Moisés. «Delante de Moisés» conserva bien el valor idiomático que el audit trail inglés expresa con «before Moses».
- source_word: עָלֹה נַעֲלֶה
  english_pob_choice: Let us surely go up
  chosen_spanish: Subamos sin falta
  alternatives_spanish:
  - Subamos seguramente
  - Vayamos sin duda hacia arriba
  lexicon: HALOT
  rationale: La infinitivo absoluto + imperfecto intensifica la acción. En español, «Subamos sin falta» transmite la fuerza exhortativa y la determinación sin sonar artificial. No se añadió un matiz temporal que el hebreo no exige.
- source_word: וְיָרַשְׁנוּ אֹתָהּ
  english_pob_choice: and take possession of it
  chosen_spanish: y tomemos posesión de ella
  alternatives_spanish:
  - y la poseamos
  - y la heredemos
  lexicon: HALOT
  rationale: «Tomar posesión de» refleja el valor de ירשׁ en contexto de conquista y ocupación de la tierra. «Heredarla» sería posible pero más pasivo; «poseerla» pierde la idea de entrada y ocupación.
- source_word: כִּי יָכוֹל נוּכַל
  english_pob_choice: for we are certainly able
  chosen_spanish: porque ciertamente podemos hacerlo
  alternatives_spanish:
  - porque ciertamente somos capaces
  - porque bien podemos hacerlo
  lexicon: HALOT
  rationale: La duplicación verbal intensifica la capacidad. En español, «ciertamente podemos hacerlo» conserva la seguridad enfática de Caleb y mantiene un complemento natural que enlaza con la acción propuesta.
- source_word: לָהּ
  english_pob_choice: to do it
  chosen_spanish: hacerlo
  alternatives_spanish:
  - para ello
  - contra ella
  lexicon: HALOT
  rationale: El sufijo femenino singular retoma la tierra implícita en el contexto. En español, el pronombre enclítico «lo» en «hacerlo» se usa de modo idiomático para resumir la empresa mencionada, sin forzar una traducción demasiado literal.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y la morfología hebrea, manteniendo la intensificación verbal y la referencia femenina implícita sin sobreexplicarla. No hubo revisiones aplicadas en el pasaje base; la versión española conserva el énfasis y la escena narrativa con una formulación idiomática natural.
  spanish_consistency_notes:
  - Se mantiene «Moisés» con acento y forma usual en español.
  - Se conserva la intensificación del hebreo con una expresión natural en español («sin falta», «ciertamente»).
  - La referencia pronominal femenina queda implícita en «ella», coherente con la tierra prometida en el contexto inmediato.
  - No se introduce terminología eclesiástica ajena al texto; el registro es narrativo y sobrio.
