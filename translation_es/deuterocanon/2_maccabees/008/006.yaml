    issue: «al venir inesperadamente sobre ciudades y campos» es un calco poco natural
    rationale: Aunque intenta reflejar ἐρχόμενος + ἀπροσδοκήτως, en español «venir sobre» con complemento de lugar suena forzado. Una formulación como «llegando de improviso a ciudades y al campo» o «cayendo inesperadamente sobre ciudades y el campo» conserva mejor el sentido narrativo y militar.
  - severity: low
    issue: «campos» no representa tan bien χώρας como territorio rural en contraste con ciudades
    rationale: «Campos» puede sugerir parcelas o tierras de cultivo individuales. «El campo» o «la campiña» expresa mejor la oposición urbano/rural presente en πόλεις / χώρας.
  revised_spanish_text: Y llegando de improviso a ciudades y al campo, los incendiaba; y, apoderándose de lugares estratégicos[a], ponía en fuga a no pocos de los enemigos.
