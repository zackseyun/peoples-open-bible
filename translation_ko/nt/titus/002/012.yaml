id: TIT.2.12
reference: Titus 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παιδεύουσα ἡμᾶς, ἵνα ἀρνησάμενοι τὴν ἀσέβειαν καὶ τὰς κοσμικὰς ἐπιθυμίας σωφρόνως καὶ δικαίως καὶ εὐσεβῶς ζήσωμεν ἐν τῷ νῦν αἰῶνι,
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/012.yaml
  text: training us[a], so that, having renounced ungodliness and worldly desires, we might live self-controlled, righteous, and godly lives in the present age[c][b],
  footnotes:
  - marker: a
    text: Or 'instructing us' or 'disciplining us'; the Greek includes the sense of formative training.
    reason: lexical_alternative
  - marker: b
    text: Or 'worldly passions.'
    reason: lexical_alternative
  - marker: c
    text: "The Greek has three adverbs: 'self-controlledly, righteously, and godly,' meaning a life marked by self-control, righteousness, and godliness."
    reason: lexical_alternative
translation:
  language: ko
  text: 그 은혜가 우리를 훈련시켜[a], 우리로 하여금 경건치 못함과 세상적 욕망[b]을 버리고, 이 현 시대에서 신중하고 의롭고 경건하게[c] 살게 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리를 교훈하여」, 「우리를 징계하여」. 헬라어는 인격을 형성하는 훈련의 의미를 포함한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「세상적 정욕」.
    reason: lexical_alternative
  - marker: c
    text: 헬라어는 세 부사 「신중하게, 의롭게, 경건하게」를 사용하며, 신중·의·경건으로 표식된 삶을 의미한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδεύουσα ἡμᾶς
  english_pob_choice: training us
  chosen_korean: 그 은혜가 우리를 훈련시켜
  alternatives_korean:
  - 우리를 가르쳐서
  - 우리를 양육하여
  - 우리를 징계하여
  lexicon: BDAG
  rationale: παιδεύω는 자녀를 양육·교육하는 형성적 훈련. 단순 가르침을 넘어 인격을 빚는 어감. 「훈련시키다」가 자연스러우며, 11절의 χάρις(은혜)를 주어로 명시해 문장을 자립시킨다.
- source_word: ἀρνησάμενοι
  english_pob_choice: having renounced
  chosen_korean: ~을 버리고
  alternatives_korean:
  - ~을 부인하고
  - ~을 끊고
  lexicon: BDAG
  rationale: ἀρνέομαι 부정과거 분사. 결정적 거부의 어감. 「버리다」가 자연스럽다.
- source_word: ἀσέβειαν
  english_pob_choice: ungodliness
  chosen_korean: 경건치 못함
  alternatives_korean:
  - 불경건
  - 신을 두려워하지 않음
  lexicon: BDAG
  rationale: 1:1, 2:12에 나타나는 εὐσέβεια의 반대어. 「경건치 못함」으로 짝을 이룬다.
- source_word: κοσμικὰς ἐπιθυμίας
  english_pob_choice: worldly desires
  chosen_korean: 세상적 욕망
  alternatives_korean:
  - 세상적 정욕
  - 이 세상의 욕심
  lexicon: BDAG
  rationale: ἐπιθυμία는 강한 욕망. 「욕망」이 일반적이며, 부정적 함의로 「정욕」도 가능. 본 번역은 중립적 「욕망」을 본문에 두고 각주로 「정욕」을 둔다.
- source_word: σωφρόνως καὶ δικαίως καὶ εὐσεβῶς
  english_pob_choice: self-controlled, righteous, and godly
  chosen_korean: 신중하고 의롭고 경건하게
  alternatives_korean:
  - 분별 있게, 의롭게, 경건하게
  - 절제하며 의롭게 경건하게
  lexicon: BDAG
  rationale: 세 부사. σωφρόνως는 1:8과 일관되게 「신중하게」. εὐσεβῶς는 글로서리 표준 「경건하게」.
- source_word: ἐν τῷ νῦν αἰῶνι
  english_pob_choice: in the present age
  chosen_korean: 이 현 시대에서
  alternatives_korean:
  - 이 시대 안에서
  - 현재의 세대에서
  lexicon: BDAG
  rationale: αἰών은 「시대·세대」. 종말론적 「이 시대」 vs 「오는 시대」의 대조 구도를 살리는 「현 시대」.
