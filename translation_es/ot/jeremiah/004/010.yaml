translation:
  language: es
  text: 'Entonces dije: «¡Ah[a], Señor Yahvé, ciertamente has engañado por completo a este pueblo y a Jerusalén, diciendo: “Ustedes tendrán paz”, cuando la espada ha llegado hasta el alma[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay!». El hebreo usa una interjección de lamento o angustia.
    reason: lexical_alternative
  - marker: b
    text: O «hasta la vida» o «hasta la garganta». Aquí נֶפֶשׁ probablemente se refiere a la vida misma, expresando que la espada ha llegado al punto de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh!
  lexicon: HALOT
  rationale: Es una interjección de lamento o desconcierto; «¡Ah!» conserva el arranque abrupto y natural en español sin volverlo arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahveh
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de representar YHWH como «Yahvé» y אֲדֹנָי como «Señor», manteniendo visible la combinación del título divino sin convertirla en una fórmula eclesiástica opaca.
- source_word: הַשֵּׁא הִשֵּׁאתָ
  english_pob_choice: have utterly deceived
  chosen_spanish: has engañado por completo
  alternatives_spanish:
  - has engañado totalmente
  - has engañado del todo
  - has grandemente engañado
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto + verbo finito intensifica la acción; «por completo» comunica esa fuerza en español y mantiene el verbo de engaño sin suavizar la acusación.
- source_word: לָעָם הַזֶּה וְלִירוּשָׁלִַם
  english_pob_choice: this people and Jerusalem
  chosen_spanish: a este pueblo y a Jerusalén
  alternatives_spanish:
  - a este pueblo y Jerusalén
  - a este pueblo y para Jerusalén
  lexicon: HALOT
  rationale: La preposición ל rige ambos complementos; en español, «a» se expresa naturalmente antes de ambos objetos, preservando la personificación de Jerusalén junto con el pueblo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Es la introducción estándar del contenido citado; «diciendo» es claro y fiel al valor discursivo del hebreo.
- source_word: שָׁלוֹם יִהְיֶה לָכֶם
  english_pob_choice: You will have peace
  chosen_spanish: Tendréis paz
  alternatives_spanish:
  - Tendrán paz
  - Habrá paz para vosotros
  lexicon: HALOT
  rationale: «Paz» aquí expresa bienestar/seguridad, no solo ausencia de guerra. Se conserva una forma directa de promesa, cercana al hebreo, sin añadir explicación interpretativa al cuerpo del texto.
- source_word: וְנָגְעָה חֶרֶב
  english_pob_choice: while the sword has reached
  chosen_spanish: cuando la espada ha llegado
  alternatives_spanish:
  - y la espada ha llegado
  - mientras la espada ha llegado
  - pero la espada ha alcanzado
  lexicon: HALOT
  rationale: נגע puede significar tocar, llegar o alcanzar; en este contexto de juicio, «ha llegado» transmite el hecho consumado de manera natural en español.
- source_word: עַד הַנָּפֶשׁ
  english_pob_choice: to the soul
  chosen_spanish: hasta el alma
  alternatives_spanish:
  - hasta la vida
  - hasta la garganta
  - hasta el ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida, ser o garganta. Se mantiene «alma» en el texto principal por su fuerza y familiaridad, y porque conserva la literalidad básica del término en esta expresión de amenaza mortal.
theological_decisions:
- issue: Si suavizar o no la acusación de que Yahvé engañó al pueblo
  english_pob_reading: Retain the direct accusation 'you have utterly deceived' in the main text
  chosen_spanish_reading: Mantener la acusación directa «has engañado por completo» en el texto principal
  alternative_spanish_readings:
  - has permitido que este pueblo sea engañado
  - has desviado gravemente
  rationale: El hebreo usa una forma enfática que expresa engaño/misleading con fuerza. La traducción debe conservar la tensión teológica del lamento de Jeremías tal como está formulado, sin resolverla mediante una armonización.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «Lord Yahweh» por transparencia y reforzó la intensificación de la acusación. En español se reflejó esa transparencia con «Señor Yahvé» y la intensificación con «por completo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH, conforme al estándar del proyecto.
  - Se usa «alma» para נֶפֶשׁ en el texto principal y se explicita la alternativa semántica en nota.
  - La puntuación reproduce el ritmo de discurso directo y el giro de lamento del hebreo.
  - Se conserva el registro solemne, pero con español moderno y claro.
