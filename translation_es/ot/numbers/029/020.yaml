revisions:
- from: 'Y en el tercer día: once toros[a], dos carneros, catorce corderos de un año, sin defecto,'
  to: 'Y el tercer día: once toros, dos carneros, catorce corderos de un año, todos sin defecto[a],'
  rationale: Se ajusta la apertura a un español más natural ("Y el tercer día"). Se aclara el alcance de la calificación sacrificial añadiendo "todos", para evitar que "sin defecto" parezca modificar solo a los corderos. Se corrige la nota al pie para que ofrezca una alternativa genuina y siga explicando el sentido cultual de תְּמִימִם.
