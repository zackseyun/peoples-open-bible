translation:
  language: es
  text: y Baalat[a], y Tamar en el desierto, en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Tamar»; el pasaje paralelo de 2 Crónicas 8:4 lee «Tadmor».'
    reason: textual_variant
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: HALOT
  rationale: La construcción combina ו + marcador de objeto directo אֶת. En español no se expresa el marcador, y la coordinación simple con «y» reproduce de manera natural la lista continua de ciudades.
- source_word: בַּעֲלָת
  english_pob_choice: Baalath
  chosen_spanish: Baalat
  alternatives_spanish:
  - Baalath
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se conserva transliterado; «Baalat» sigue de cerca la forma hebrea con una adaptación gráfica fluida para el español.
- source_word: תמר
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  alternatives_spanish:
  - Tadmor
  lexicon: HALOT
  rationale: El texto hebreo dice תמר, que se translitera como «Tamar». La variante «Tadmor» se reserva para la nota, siguiendo el aparato inglés que documenta 2 Crónicas 8:4.
- source_word: בַּ/מִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse «wilderness» o «desert». En español bíblico «desierto» comunica bien la referencia geográfica sin perder el sentido de terreno despoblado.
- source_word: בָּ/אָֽרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: אֶרֶץ aquí señala una extensión territorial amplia. «Tierra» preserva esa amplitud y evita precisar indebidamente el referente con «país» o «región».
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones; se mantuvo el acuerdo alto con la lectura hebrea consonántica y la variante paralela se conservó en nota.
  spanish_consistency_notes:
  - Se prefirió una transliteración estable de nombres propios para mantener la transparencia textual.
  - Se evitó traducir el marcador de objeto directo hebreo, como en el contexto inglés, porque no aporta contenido léxico en español.
  - «En la tierra» conserva la amplitud semántica de אֶרֶץ sin introducir un referente geopolítico más específico.
