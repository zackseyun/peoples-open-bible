translation:
  language: es
  text: 'y no lo ha traído a la entrada de la tienda de reunión, para presentarlo como ofrenda a Yahvé, delante del tabernáculo de Yahvé, se le imputará sangre[a] a ese hombre: ha derramado sangre[b], y ese hombre será cortado[c] de en medio de su pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se le contará sangre a ese hombre’. Hebreo literalmente, ‘sangre será contada a ese hombre’; la frase expresa responsabilidad legal por derramamiento de sangre.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘ha derramado sangre’. La cláusula confirma la culpabilidad por derramamiento de sangre implícita en la expresión anterior.
    reason: translation_note
  - marker: c
    text: ‘Será cortado’ no especifica aquí si la pena consiste en muerte, expulsión u otra forma de remoción del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: la entrada de la tienda de reunión
  alternatives_spanish:
  - la puerta de la tienda de reunión
  - la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: פֶּתַח pide un sustantivo espacial natural en español; ‘entrada’ conserva bien el valor de acceso. אֹהֶל מוֹעֵד se vierte mejor como ‘tienda de reunión’, la designación cultual estable y transparente en español bíblico, sin hacerla más pesada con un giro innecesariamente técnico.
- source_word: הֱבִיאוֹ
  english_pob_choice: has not brought it
  chosen_spanish: no lo ha traído
  alternatives_spanish:
  - no lo trajo
  - no lo había traído
  lexicon: HALOT
  rationale: El hiphil de בוא significa ‘traer’. El perfecto español ‘ha traído’ mantiene el valor de acción no cumplida en el marco legal, con un registro natural y sobrio.
- source_word: לְהַקְרִיב קָרְבָּן
  english_pob_choice: to present it as an offering
  chosen_spanish: presentarlo como ofrenda
  alternatives_spanish:
  - ofrecerlo como ofrenda
  - presentarlo para ofrenda
  lexicon: HALOT
  rationale: הקריב expresa la idea de acercar/presentar en contexto sacrificial. Como קָרְבָּן ya significa ‘ofrenda’, ‘presentarlo como ofrenda’ evita la repetición pesada ‘ofrecer una ofrenda’ sin perder el sentido ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  lexicon: HALOT
  rationale: Según la convención del proyecto, יְהוָה se traduce ‘Yahvé’ en el texto principal. Se preserva así la referencia al nombre divino sin máscara litúrgica.
- source_word: לִפְנֵי מִשְׁכַּן יְהוָה
  english_pob_choice: before the tabernacle of Yahweh
  chosen_spanish: delante del tabernáculo de Yahvé
  alternatives_spanish:
  - ante el tabernáculo de Yahvé
  - frente al tabernáculo de Yahvé
  lexicon: HALOT
  rationale: 'לִפְנֵי aquí es locativo: ‘delante de / ante’. ‘Tabernáculo’ es el término cultual establecido para מִשְׁכָּן y funciona con dignidad en español bíblico.'
- source_word: דָּם יֵחָשֵׁב
  english_pob_choice: blood shall be imputed to that man
  chosen_spanish: sangre se le contará a ese hombre
  alternatives_spanish:
  - sangre se le imputará a ese hombre
  - se le contará sangre a ese hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ‘sangre será contada’ al hombre. Se conserva esa metáfora legal con ‘se le contará’, evitando sustituirla por una paráfrasis doctrinal excesiva. La interpretación jurídica de culpabilidad queda apoyada por el contexto.
- source_word: לָאִישׁ הַהוּא
  english_pob_choice: to that man
  chosen_spanish: a ese hombre
  alternatives_spanish:
  - a aquel hombre
  - a ese varón
  lexicon: HALOT
  rationale: El hebreo es masculino singular y designa al infractor concreto. ‘Ese hombre’ mantiene la deixis y el género sin sonar arcaico.
- source_word: דָּם שָׁפָךְ
  english_pob_choice: he has shed blood
  chosen_spanish: ha derramado sangre
  alternatives_spanish:
  - ha vertido sangre
  - ha derramado sangre humana
  lexicon: HALOT
  rationale: ‘Derramar sangre’ es el equivalente idiomático más natural en español para ‘shed blood’. Mantiene la fuerza legal y moral del hebreo.
- source_word: וְנִכְרַת
  english_pob_choice: shall be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será eliminado de entre
  lexicon: HALOT
  rationale: כרת en estos contextos legales y de pacto conserva bien la imagen de ‘cortar’. ‘Será cortado’ preserva la fórmula tradicional sin decidir el modo exacto de la sanción.
- source_word: מִקֶּרֶב עַמּוֹ
  english_pob_choice: from among his people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - del seno de su pueblo
  lexicon: HALOT
  rationale: ‘De en medio de su pueblo’ reproduce la fórmula de exclusión de manera transparente y evita suavizar el alcance comunitario de la sanción.
theological_decisions:
- issue: Sentido jurídico de דָּם יֵחָשֵׁב
  english_pob_reading: blood shall be imputed to that man
  chosen_spanish_reading: sangre se le contará a ese hombre
  alternative_spanish_readings:
  - sangre se le imputará a ese hombre
  - sangre se le tendrá por culpabilidad de sangre
  rationale: La frase hebrea es una fórmula legal y su literalidad importa. ‘Se le contará’ conserva la imagen textual y deja que el contexto establezca que se trata de responsabilidad por derramamiento de sangre, sin introducir una glosa interpretativa en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de la pena וְנִכְרַת
  english_pob_reading: shall be cut off
  chosen_spanish_reading: será cortado
  alternative_spanish_readings:
  - será excluido
  - será eliminado
  rationale: El hebreo no especifica aquí el mecanismo exacto de la sanción. La traducción mantiene la fórmula abierta, respetando la ambigüedad teológica y legal del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado de la tradición auditada, que prefirió una formulación más cercana a דם יחשב manteniendo el registro formal. Por eso se conservó la estructura legal literal ‘sangre se le contará’ en lugar de una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יהוה conforme a la convención del proyecto.
  - Se conserva ‘tabernáculo’ para מִשְׁכָּן y ‘tienda de reunión’ para אֹהֶל מוֹעֵד.
  - No se neutraliza ‘ese hombre’, porque el hebreo es masculino singular y el caso legal apunta al infractor concreto.
  - La fórmula ‘será cortado’ se deja abierta, sin precisar el tipo de pena.
  - Las notas a pie respetan la ambigüedad lexical y jurídica sin sobreexplicar el texto principal.
