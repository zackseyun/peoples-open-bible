translation:
  language: es
  text: Y la tierra estuvo en calma todos los días de Simón, y él buscó el bien para su nación; y su autoridad y su gloria les agradaron todos sus días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡσύχασεν
  english_pob_choice: was at rest
  chosen_spanish: estuvo en paz
  alternatives_spanish:
  - estuvo tranquila
  - descansó
  - gozó de paz
  lexicon: LSJ
  rationale: El aoristo de ἡσυχάζω describe aquí el estado sereno y apacible de la tierra bajo Simón. «Estuvo en paz» conserva la idea de tranquilidad estable sin volverla un calco rígido ni sugerir más de lo que dice el griego.
- source_word: ἡ γῆ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  - el territorio
  lexicon: LSJ
  rationale: En este contexto histórico, γῆ designa la tierra/territorio del pueblo, no el planeta. «La tierra» es natural en español y mantiene la referencia nacional sin sobreinterpretarla.
- source_word: ἐζήτησεν ἀγαθὰ
  english_pob_choice: sought good
  chosen_spanish: buscó el bien
  alternatives_spanish:
  - buscó lo bueno
  - trabajó por el bien
  - buscó beneficios
  lexicon: LSJ
  rationale: La expresión comunica una acción deliberada en favor del bienestar colectivo. «Buscó el bien» conserva la concisión del griego y la fuerza ética de ἀγαθά sin expandir el sentido.
- source_word: τῷ ἔθνει αὐτοῦ
  english_pob_choice: for his nation
  chosen_spanish: de su nación
  alternatives_spanish:
  - para su pueblo
  - para su nación
  - para su pueblo-nación
  lexicon: LSJ
  rationale: ἔθνος aquí tiene peso corporativo y político-étnico. «Nación» preserva mejor ese alcance que «pueblo», que en español puede sonar más genérico o solo religioso.
- source_word: ἡ ἐξουσία αὐτοῦ
  english_pob_choice: his authority
  chosen_spanish: su autoridad
  alternatives_spanish:
  - su poder
  - su dominio
  - su gobierno
  lexicon: LSJ
  rationale: ἐξουσία denota autoridad ejercida o reconocida. «Autoridad» es la opción más directa y evita cargar el término con una connotación más absolutista como «dominio».
- source_word: ἡ δόξα αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su esplendor
  - su renombre
  lexicon: LSJ
  rationale: δόξα puede abarcar gloria, honor o reputación. «Gloria» mantiene el registro elevado del texto y permite un paralelismo natural con «autoridad».
- source_word: ἤρεσεν αὐτοῖς
  english_pob_choice: were pleasing to them
  chosen_spanish: les agradaron
  alternatives_spanish:
  - les parecieron bien
  - les complacieron
  - fueron gratas para ellos
  lexicon: LSJ
  rationale: El verbo en griego expresa que esas realidades resultaban agradables o satisfactorias a la gente. «Les agradaron» reproduce ese efecto de recepción favorable de manera idiomática en español.
- source_word: πάσας τὰς ἡμέρας ... πάσας τὰς ἡμέρας
  english_pob_choice: all the days ... all his days
  chosen_spanish: todos los días ... todos sus días
  alternatives_spanish:
  - durante todos los días ... durante todos sus días
  - a lo largo de todos los días ... a lo largo de todos sus días
  lexicon: LSJ
  rationale: La repetición enfatiza la duración continua del estado descrito. Se conserva con la misma repetición en español para reflejar el paralelismo enfático del griego.
theological_decisions:
- issue: Naturaleza del pasaje como elogio histórico-político
  english_pob_reading: Render the verse as a historical commendation without importing covenantal or messianic overtones.
  chosen_spanish_reading: Traducirlo como una valoración histórica del gobierno de Simón, sin introducir tonos mesiánicos ni teológicos que el texto no menciona expresamente.
  alternative_spanish_readings:
  - Leer la paz de la tierra como una afirmación de paz concedida por Dios
  - Entender «gloria» como un título honorífico casi sacral
  rationale: El griego presenta una síntesis positiva del gobierno de Simón en términos nacionales e históricos. La traducción debe respetar ese alcance y no añadir una lectura doctrinal no explícita en el versículo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y armoniza con la auditoría inglesa de POB, que decidió «was at rest», «sought good», «his authority», «his glory» y la repetición enfática de «all the days». No se registran revisiones posteriores que alteren esa lectura.
  spanish_consistency_notes:
  - Se mantiene «nación» para ἔθνος por consistencia con el matiz corporativo-político observado en 1 Macabeos.
  - Se usa «autoridad» para ἐξουσία y «gloria» para δόξα, conservando el paralelismo semántico del original.
  - La repetición de «todos los días» se conserva dos veces para reflejar el énfasis temporal del griego.
