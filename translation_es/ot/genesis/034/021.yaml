revisions:
- from: Estos hombres están en paz con nosotros[a]. Que habiten en la tierra y trafiquen en ella, porque, mira, la tierra es bastante ancha delante de ellos. Tomaremos para nosotros a sus hijas por esposas[d][c][b], y daremos nuestras hijas a ellos.
  to: Estos hombres están en paz con nosotros[a]. Que habiten en la tierra y comercien[c] en ella, porque he aquí[d], la tierra es amplia[b] ante ellos. Tomaremos para nosotros a sus hijas por esposas, y les daremos nuestras hijas.
  rationale: Se corrigió «trafiquen» a «comercien» para evitar una connotación moderna de ilegalidad; se suavizó el modismo espacial a «la tierra es amplia ante ellos» para conservar la imagen hebrea con mejor español; se reemplazó «daremos nuestras hijas a ellos» por «les daremos nuestras hijas» por naturalidad gramatical; y se reubicaron las notas al lugar semánticamente pertinente.
