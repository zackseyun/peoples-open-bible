    text: 'El hebreo tiene explícitamente las formas masculina y femenina: «varón estéril» y «mujer estéril».'
    reason: lexical_alternative
  revision_rationale: Se revisa el comparativo a «más que todos los pueblos» para reflejar mejor מן en español natural. Se reemplaza «no habrá en ti» por «no habrá entre los tuyos» para evitar una construcción extraña, manteniendo a la vez la referencia corporativa al pueblo. Se corrige «un estéril varón o mujer» por «ningún varón ni mujer estériles» para expresar con claridad y corrección la explicitud masculina/femenina del hebreo. Se conserva «ganado» por su buena adecuación a בְּהֵמָה.
