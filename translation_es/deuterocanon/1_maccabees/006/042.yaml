translation:
  language: es
  text: Y Judas avanzó[a] con su campamento en formación de batalla, y cayeron seis mil hombres del campamento del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Avanzó» traduce aquí un verbo que literalmente significa «se acercó»; se eligió por el contexto de combate y la frase siguiente «en formación de batalla».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: advanced
  chosen_spanish: avanzaron
  alternatives_spanish:
  - se acercaron
  - se aproximaron
  lexicon: LSJ
  rationale: En un contexto militar con εἰς παράταξιν, el valor no es solo espacial sino de movimiento hacia el choque. «Avanzaron» conserva la idea de acercarse y añade naturalidad en español de combate.
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de guerra
  lexicon: LSJ
  rationale: La palabra designa un campamento o encampamento militar. «Campamento» es claro y bíblico sin sobrecargar el texto.
- source_word: εἰς παράταξιν
  english_pob_choice: into battle formation
  chosen_spanish: en formación de batalla
  alternatives_spanish:
  - para batalla
  - en línea de batalla
  - en formación para combatir
  lexicon: LSJ
  rationale: La expresión señala disposición táctica para el combate. «En formación de batalla» mantiene el matiz militar sin sonar forzado en español.
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - perecieron
  - fueron muertos
  lexicon: LSJ
  rationale: El griego usa el idiomático «cayeron» en contexto bélico. En español también puede implicar muerte sin explicitar más de lo que dice el texto.
- source_word: ἑξακισχίλιοι ἄνδρες
  english_pob_choice: six thousand men
  chosen_spanish: seis mil hombres
  alternatives_spanish:
  - seis mil soldados
  lexicon: LSJ
  rationale: «Hombres» reproduce el sustantivo griego ἄνδρες y sigue de cerca el dato numérico sin introducir una especificación no dicha por el texto.
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste del audit trail inglés: «from the king’s camp» se entiende con «del campamento del rey» modificando a «cayeron seis mil hombres», no a «cayeron» como hecho separado. Se conserva el orden y la relación gramatical básica del griego.'
  spanish_consistency_notes:
  - Se mantuvo «campamento» para παρεμβολή, coherente con la elección inglesa «camp».
  - Se preservó el matiz bélico de παράταξις con una frase nominal natural en español.
  - No se añadió interpretación sobre la muerte; «cayeron» deja el efecto bélico abierto como en el griego.
