translation:
  language: es
  text: Estamos avergonzados, porque hemos oído oprobio; la deshonra ha cubierto nuestros rostros, porque extranjeros han entrado en los lugares santos[a] de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santuarios de la casa de Yahvé». El sustantivo hebreo está en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּשְׁנוּ
  english_pob_choice: We are ashamed
  chosen_spanish: Estamos avergonzados
  alternatives_spanish:
  - Nos sentimos avergonzados
  - Estamos puestos en vergüenza
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante de vergüenza; en español, «estamos avergonzados» conserva el valor de estado comunitario y suena natural sin suavizar la fuerza del término.
- source_word: שָׁמַעְנוּ חֶרְפָּה
  english_pob_choice: we have heard reproach
  chosen_spanish: hemos oído oprobio
  alternatives_spanish:
  - hemos oído reproche
  - hemos oído afrenta
  lexicon: HALOT
  rationale: «חֶרְפָּה» puede cubrir reproche, afrenta u oprobio. Elegí «oprobio» porque en español mantiene mejor la carga pública de insulto y vergüenza colectiva, cercana al inglés «reproach» del POB.
- source_word: כִּסְּתָה
  english_pob_choice: has covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - cubrió
  - ha sobrecubierto
  lexicon: HALOT
  rationale: El perfecto femenino singular mantiene la imagen metafórica de una vergüenza que envuelve el rostro. «Ha cubierto» conserva bien esa metáfora en español.
- source_word: כְלִמָּה
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - humillación
  lexicon: HALOT
  rationale: Dado que ya aparece «avergonzados», conviene diferenciar el segundo término de vergüenza con «deshonra», que expresa la afrenta pública y evita redundancia excesiva.
- source_word: פָּנֵינוּ
  english_pob_choice: our faces
  chosen_spanish: nuestros rostros
  alternatives_spanish:
  - nuestras caras
  - nuestro semblante
  lexicon: HALOT
  rationale: La imagen corporal se conserva mejor con «rostros», que mantiene el hebraísmo visible y el sentido de vergüenza expuesta públicamente.
- source_word: בָּאוּ זָרִים
  english_pob_choice: foreigners have come
  chosen_spanish: han entrado extranjeros
  alternatives_spanish:
  - han venido extranjeros
  - han llegado extranjeros
  lexicon: HALOT
  rationale: El contexto de profanación del templo favorece «han entrado» más que solo «han venido». «Extranjeros» refleja bien זָרִים como no pertenecientes, en contexto cultual e invasivo.
- source_word: עַל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - contra
  lexicon: HALOT
  rationale: Aunque el audit trail inglés revisó «against» a «into», el español natural aquí pide una construcción locativa simple; «en» comunica la intrusión dentro de los espacios sagrados sin forzar una preposición menos idiomática.
- source_word: מִקְדְּשֵׁי בֵּית יְהוָה
  english_pob_choice: the holy places of the house of Yahweh
  chosen_spanish: los lugares santos de la casa de Yahvé
  alternatives_spanish:
  - los santuarios de la casa de Yahvé
  - el lugar santo de la casa de Yahvé
  lexicon: HALOT
  rationale: Se preserva el plural hebreo מִקְדְּשֵׁי con «lugares santos». «Casa de Yahvé» sigue la terminología POB para el nombre divino, y mantiene la referencia al complejo del templo sin singularizarlo indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política española del proyecto usa «Yahvé» como forma principal para el Tetragrámaton, manteniendo el nombre divino en vez de sustituirlo por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre personal del pacto y no una sustitución litúrgica. En español, «Yahvé» es la forma principal adoptada por el proyecto para reproducir el valor del Tetragrámaton con lectura reconocible y reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Plural de מִקְדְּשֵׁי
  english_pob_reading: the holy places of the house of Yahweh
  chosen_spanish_reading: los lugares santos de la casa de Yahvé
  alternative_spanish_readings:
  - los santuarios de la casa de Yahvé
  - el lugar santo de la casa de Yahvé
  rationale: El plural hebreo se mantiene explícito para no reducir la referencia a un solo recinto. Esto preserva la amplitud del ataque a los espacios sagrados del templo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Intrusión de los extranjeros en el santuario
  english_pob_reading: foreigners have come into the holy places
  chosen_spanish_reading: han entrado extranjeros en los lugares santos
  alternative_spanish_readings:
  - han venido extranjeros a los lugares santos
  - han penetrado extranjeros en los lugares santos
  rationale: La idea no es mera llegada geográfica, sino profanación mediante entrada indebida. «Han entrado» comunica la violación del espacio santo sin añadir intensidad no sustentada por el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del POB en inglés, que pasó de «against» a «into» para reflejar mejor la entrada en los recintos sagrados. En español se optó por «en» con «han entrado» para conservar esa intrusión dentro de los lugares santos sin calcar una preposición poco natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología española del proyecto para el Tetragrámaton.
  - Se preservó el plural de מִקְדְּשֵׁי con «los lugares santos» para no singularizar el hebreo.
  - «Oprobio», «deshonra» y «avergonzados» distribuyen los tres campos de vergüenza del verso sin colapsarlos en un solo término.
  - La construcción «han entrado extranjeros» refleja mejor la intrusión profanadora que una traducción meramente espacial.
