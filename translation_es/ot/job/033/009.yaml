translation:
  language: es
  text: «Soy puro[a], sin transgresión; soy limpio[b], y no hay iniquidad[c] en mí.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpio» o «inocente»; זַךְ puede denotar pureza moral o limpieza.
    reason: lexical_alternative
  - marker: b
    text: O «inocente»; חַף puede denotar libertad de culpa además de limpieza.
    reason: lexical_alternative
  - marker: c
    text: O «no hay culpa en mí»; עָוֺן también puede llevar el sentido de culpa o maldad.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַךְ
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - inocente
  lexicon: HALOT
  rationale: El adjetivo hebreo describe pureza moral o limpieza. «Puro» mantiene el paralelo con el segundo miembro sin repetir exactamente la misma idea; «limpio» queda mejor reservado para חַף.
- source_word: בְּלִי פָשַׁע
  english_pob_choice: without transgression
  chosen_spanish: sin transgresión
  alternatives_spanish:
  - sin rebelión
  - libre de ofensa
  lexicon: HALOT
  rationale: בְּלִי expresa ausencia y פָשַׁע denota transgresión o rebelión. «Sin transgresión» conserva el sentido moral-jurídico de forma natural en español.
- source_word: חַף
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - inocente
  - sin culpa
  - irreprensible
  lexicon: HALOT
  rationale: El término puede significar estar limpio o libre de culpa. «Limpio» reproduce la imagen y distingue este segundo predicado del anterior «puro», como en el inglés auditado.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral tradicional del término y sigue de cerca la elección inglesa documentada. En este contexto también puede implicar culpa o maldad, pero el texto afirma su ausencia con una negación absoluta.
- source_word: לִי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - para mí
  - sobre mí
  - a mí
  lexicon: HALOT
  rationale: Aunque literalmente significa «a mí», en una predicación de condición moral el español natural es «en mí», que expresa la ausencia interna de iniquidad.
theological_decisions:
- issue: Fuerza de la afirmación de Job en la cita de Eliú
  english_pob_reading: Render the statement straightforwardly as a claim of moral purity without softening or intensifying it.
  chosen_spanish_reading: Presentar la afirmación de manera directa como una declaración de pureza moral, sin atenuarla ni convertirla en una negación más fuerte de lo que dice el hebreo.
  alternative_spanish_readings:
  - «Me considero puro...»
  - «No tengo pecado alguno en mí...»
  rationale: El hebreo presenta predicados enfáticos en primera persona. El español debe conservar esa tensión sin resolverla doctrinalmente ni suavizar la cita atribuida a Job en boca de Eliú.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el juicio de consenso externo permanece en alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «pecado» como traducción principal de פָשַׁע para no debilitar el matiz de transgresión/rebelión documentado en el audit trail.
  - 'Se conserva la duplicación poética con dos predicados breves: «puro» / «limpio».'
