translation:
  language: es
  text: Cualquier varón acepta a una mujer, pero un hombre elige a una joven.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No hagas nada sin consejo, y cuando actúes, no te arrepientas». La tradición griega aquí refleja un texto sustancialmente diferente del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: כָּל זָכָר
  english_pob_choice: Any male
  chosen_spanish: Todo varón
  alternatives_spanish:
  - Todo hombre
  - Cualquier varón
  lexicon: HALOT
  rationale: '''זָכָר'' señala al sexo masculino de forma explícita; ''varón'' conserva ese rasgo mejor que ''hombre'', que en español puede sonar más genérico. ''Todo varón'' mantiene el tono proverbial de generalización sin introducir una universalidad absoluta más fuerte que el hebreo.'
- source_word: תְּקַבֵּל
  english_pob_choice: will accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - tomará
  - aceptará
  lexicon: HALOT
  rationale: קבל tiene el campo semántico de recibir/aceptar. En español, 'acepta' transmite bien la idea de recibir o aceptar a alguien sin cargar el verso con una connotación más activa o coercitiva. El presente proverbial funciona naturalmente en español.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a una esposa
  lexicon: HALOT
  rationale: El hebreo permite 'mujer' o 'esposa', pero el proverbio no marca de manera explícita el estado marital. 'Mujer' es la opción menos interpretativa y preserva el paralelismo con 'una joven' en el segundo colon.
- source_word: אַךְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - aunque
  lexicon: HALOT
  rationale: La partícula introduce contraste directo entre los dos miembros del proverbio. 'Pero' es la equivalencia más natural y clara en español.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - un varón
  lexicon: HALOT
  rationale: '''איש'' contrasta con ''זכר'' en el primer colon. ''Un hombre'' conserva esa diferencia léxica y suena natural en español.'
- source_word: יִבְחַר
  english_pob_choice: will choose
  chosen_spanish: elige
  alternatives_spanish:
  - escoge
  - selecciona
  lexicon: HALOT
  rationale: בחר significa 'elegir/escoger'. El presente proverbial 'elige' comunica mejor la sentencia general en español que un futuro más rígido.
- source_word: עַלְמָה
  english_pob_choice: a young woman
  chosen_spanish: a una joven
  alternatives_spanish:
  - a una muchacha
  - a una doncella
  - a una virgen
  lexicon: HALOT
  rationale: '''עַלְמָה'' designa a una mujer joven en edad casadera; ''joven'' conserva la amplitud semántica mejor que ''virgen'', que sería demasiado específica, y evita el arcaísmo de ''doncella''.'
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The Greek parallel reads: ''Do nothing without counsel, and when you act, do not regret it.'' The main text follows the Hebrew proverb.'
  chosen_spanish_reading: El texto principal sigue el proverbio hebreo conservado; el paralelo griego se preserva en nota como variante textual sustancialmente distinta.
  alternative_spanish_readings:
  - '''No hagas nada sin consejo, y cuando actúes, no te arrepientas.'''
  - Un texto híbrido que intentara armonizar hebreo y griego.
  rationale: La política de la POB para Sirácides es traducir desde el hebreo cuando se conserva, y declarar honestamente las variantes importantes. Aquí el griego no es una mera paráfrasis, sino un dicho diferente; por eso debe quedar como nota textual, no como lectura principal.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el ciclo más reciente sin cambios sustantivos (''unchanged: true''). La alerta de control cruzado señaló ''major-issues'', pero no aportó una alternativa textual que desplazara la lectura hebrea; por eso se mantiene la decisión principal y se conserva la variante griega en nota.'
  spanish_consistency_notes:
  - Se prefirió 'varón' para reflejar mejor זָכָר y evitar neutralizar la diferencia léxica con 'hombre'.
  - Se usó presente proverbial ('acepta', 'elige') para un refrán breve y natural en español.
  - '''Joven'' mantiene la amplitud de עַלְמָה sin especificar ''virgen'' ni recurrir a un arcaísmo.'
