translation:
  language: es
  text: porque tomaron mi plata y mi oro[a], y llevaron mis cosas preciosas a sus templos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus palacios». El hebreo הֵיכָל puede significar «templo» o «palacio»; aquí se prefiere «templos» porque el contexto sugiere la apropiación cultual de lo que pertenece a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: En este contexto la partícula introduce la causa o motivo del juicio anunciado antes; en español, «porque» expresa mejor esa relación causal que una simple relativa.
- source_word: כַּסְפִּי
  english_pob_choice: my silver
  chosen_spanish: mi plata
  alternatives_spanish:
  - mi silver
  - mi dinero
  lexicon: HALOT
  rationale: כֶּסֶף/כַּסְפִּי se refiere literalmente a plata; «plata» es el equivalente natural y fiel en español.
- source_word: וּזְהָבִי
  english_pob_choice: and my gold
  chosen_spanish: y mi oro
  alternatives_spanish:
  - y mi metal precioso
  - y mi oro fino
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo poseído; se mantiene la coordinación con «mi plata».
- source_word: לְקַחְתֶּם
  english_pob_choice: you took
  chosen_spanish: tomaste
  alternatives_spanish:
  - tomaron
  - se llevaron
  lexicon: HALOT
  rationale: El verbo לקח en este contexto puede ser «tomar»; en español bíblico contemporáneo «tomaste» preserva la acusación directa sin añadir matiz de violencia que no exige el texto.
- source_word: וּמַחֲמַדַּי
  english_pob_choice: my precious things
  chosen_spanish: mis cosas preciosas
  alternatives_spanish:
  - mis cosas deseables
  - mis objetos preciosos
  - mis preciadas cosas
  lexicon: HALOT
  rationale: El sustantivo comunica aquello que es deseable/valioso; «cosas preciosas» conserva el valor sin introducir «tesoros», que sería más interpretativo.
- source_word: הַטֹּבִים
  english_pob_choice: precious
  chosen_spanish: preciosas
  alternatives_spanish:
  - buenas
  - finas
  lexicon: HALOT
  rationale: El adjetivo literalmente es «los buenos»; en español, unido a «cosas», funciona mejor como cualidad de valor o excelencia, por eso se integra en «cosas preciosas».
- source_word: הֲבֵאתֶם
  english_pob_choice: brought
  chosen_spanish: llevaste
  alternatives_spanish:
  - trajiste
  - metiste
  lexicon: HALOT
  rationale: Aunque el hebreo puede expresarse como «traer», el movimiento aquí es hacia el lugar de los destinatarios; «llevaste» funciona naturalmente en español para el traslado al interior de sus propios santuarios.
- source_word: לְהֵיכְלֵיכֶם
  english_pob_choice: into your temples
  chosen_spanish: a tus templos
  alternatives_spanish:
  - a tus palacios
  - a tus santuarios
  lexicon: HALOT
  rationale: הֵיכָל puede significar «templo» o «palacio». Dado el contexto cultual del saqueo de bienes pertenecientes a Dios, «templos» preserva mejor la fuerza sacrílega; se mantiene la alternativa en nota.
theological_decisions:
- issue: Sentido de לְהֵיכְלֵיכֶם / הֵיכָל
  english_pob_reading: cultic buildings ('your temples')
  chosen_spanish_reading: tus templos
  alternative_spanish_readings:
  - tus palacios
  - tus santuarios
  rationale: El contexto acusa a las naciones de trasladar lo que pertenecía a Yahvé a sus propios recintos de culto, no solo a sus residencias reales. Por eso se prefiere «templos», dejando «palacios» como alternativa léxica posible.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referencia implícita al nombre divino en el contexto inmediato
  english_pob_reading: my silver and my gold
  chosen_spanish_reading: mi plata y mi oro
  alternative_spanish_readings:
  - mi plata y mi oro de Yahvé
  rationale: El versículo habla en primera persona posesiva en el marco del juicio divino; no es necesario añadir el nombre divino en el texto español, pero el contexto de Joel lo presupone.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB en inglés, que reemplazó «precious treasures» por «precious things» para reflejar con mayor directitud la frase hebrea sin añadir la interpretación de «tesoros». La redacción española evita también sobreinterpretar y conserva el valor de la alternativa léxica para הֵיכָל en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino del proyecto, pero en este versículo no aparece explícitamente en el texto fuente inmediato, por lo que no se inserta en la línea principal.
  - Se prefirió «plata» y «oro» por ser equivalentes transparentes y estándar en español bíblico.
  - «Templos» se usa de modo consistente con la decisión POB inglesa y se documenta la alternativa «palacios» en nota.
  - No se introdujo «tesoros», para no exceder el grado de especificidad del hebreo ni la revisión inglesa más reciente.
