translation:
  language: es
  text: Y toda la asamblea clamó[a] a gran voz, y bendijo a Dios, que salva a los que esperan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exclamó». El verbo griego expresa un clamor o exclamación fuerte; «clamó» preserva mejor esa intensidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: LSJ
  rationale: El verbo griego expresa una exclamación o clamor fuerte. En español, «exclamó» comunica el estallido vocal sin volverse demasiado coloquial; «clamó» y «gritó» son posibles, pero «exclamó» mantiene un registro más bíblico y natural.
- source_word: πᾶσα ἡ συναγωγή
  english_pob_choice: the whole assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  lexicon: LSJ
  rationale: Aquí συναγωγή designa al grupo reunido, no la institución sinagogal. «Asamblea» conserva el sentido colectivo y narrativo del griego; «congregación» también funciona, pero «asamblea» resulta más neutral y preciso.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: LSJ
  rationale: La expresión es un modismo para hablar o clamar en voz alta. «A gran voz» es una fórmula española bíblica y fiel al giro concreto del griego; «en voz alta» es más idiomática, pero menos cercana a la imagen original.
- source_word: εὐλόγησαν
  english_pob_choice: they blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - dieron bendición a
  lexicon: LSJ
  rationale: El verbo es literalmente «bendecir». Aunque en español moderno puede sonar más habitual «alabaron», «bendijeron» preserva la forma léxica del griego y el registro bíblico de hablar bien de Dios.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: LSJ
  rationale: El dativo con εὐλόγησαν funciona como complemento dirigido a Dios. En español, «bendijeron a Dios» reproduce de manera natural la relación verbal sin añadir nada ajeno al texto.
- source_word: τῷ σώζοντι
  english_pob_choice: who saves
  chosen_spanish: que salva
  alternatives_spanish:
  - que rescata
  - el que salva
  lexicon: LSJ
  rationale: El participio presente atributivo presenta a Dios como el que salva de manera característica. «Que salva» conserva ese valor aspectual y evita introducir una reformulación más interpretativa como «el que salva» en el texto principal.
- source_word: τοὺς ἐλπίζοντας ἐπ’ αὐτόν
  english_pob_choice: those who hope in him
  chosen_spanish: a los que esperan en él
  alternatives_spanish:
  - a los que confían en él
  - a los que ponen su esperanza en él
  lexicon: LSJ
  rationale: ἐλπίζω pertenece al campo de la esperanza; «esperan en él» preserva ese léxico sin desplazarlo por «confían», que introduce un matiz válido pero distinto. En español, «esperar en» comunica bien la dependencia confiada del original.
theological_decisions:
- issue: 'εὐλόγησαν τῷ θεῷ: bendecir a Dios o alabar a Dios'
  english_pob_reading: they blessed God
  chosen_spanish_reading: bendijeron a Dios
  alternative_spanish_readings:
  - alabaron a Dios
  rationale: El griego usa εὐλογέω, no un verbo de alabanza general. Mantener «bendijeron» conserva la tensión bíblica de que los humanos pueden «bendecir» a Dios en el sentido de hablar bien de él, sin borrar la forma del verbo original.
  doctrine_reference: Translation philosophy §1, §5
- issue: 'ἐλπίζοντας: esperanza o confianza'
  english_pob_reading: those who hope in him
  chosen_spanish_reading: los que esperan en él
  alternative_spanish_readings:
  - los que confían en él
  rationale: La base léxica griega es la esperanza. «Esperan en él» mantiene esa elección y deja visible el trasfondo de confianza solo como posibilidad secundaria, en vez de reemplazarla en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje no presentó revisiones aplicadas en el historial; la redacción española sigue el texto griego normalizado y el análisis auditado de la POB inglesa, sin cambios respecto del último pase de revisión indicado como «unchanged».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo usa τῷ θεῷ; por tanto, corresponde «Dios» y no el nombre divino.
  - Se prefirió el verbo literal «bendijeron» para conservar la correspondencia con εὐλόγησαν, en línea con el criterio auditado de no sustituirlo por una paráfrasis de sentido general.
  - «Esperan en él» reproduce el campo semántico de ἐλπίζω y evita confundirlo con la palabra «confían» salvo como alternativa documentada.
