revisions:
- from: Así que Jehú envió a todo Israel[a], y vinieron todos los adoradores de Baal; no quedó ningún hombre que no viniera. Entraron en la casa de Baal, y la casa de Baal fue llena de un extremo al otro.
  to: Así que Jehú envió por todo Israel[a], y vinieron todos los adoradores de Baal; no quedó ningún hombre que no viniera. Entraron en la casa de Baal, y la casa de Baal se llenó de un extremo al otro.
  rationale: Se ajusta ‘a todo Israel’ a ‘por todo Israel’ para reflejar mejor el alcance distributivo de בְּכָל יִשְׂרָאֵל, conforme al audit trail inglés (‘throughout all Israel’). Se cambia ‘fue llena’ a ‘se llenó’ para lograr un español natural y digno sin perder el valor resultativo/pasivo del hebreo. Se conserva el resto porque representa fielmente el sentido fuente y las decisiones léxicas documentadas.
