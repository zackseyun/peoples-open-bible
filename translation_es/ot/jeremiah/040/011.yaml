    text: O «Además»; la partícula añade otro grupo al informe previo.
    reason: lexical_alternative
  - marker: b
    text: O «sobrevivientes para Judá»; el término hebreo puede referirse más generalmente a los que quedaron con vida después del desastre.
    reason: lexical_alternative
  revision_rationale: Se ajusta «Además» a «También» para reflejar mejor la partícula aditiva simple וְגַם en español narrativo. Se cambia «había puesto sobre ellos a Gedalías» por «había nombrado a Gedalías ... sobre ellos» para expresar con más naturalidad y precisión administrativa el sentido de הִפְקִיד. Además, se añade en español la nota alternativa sobre «remanente/sobrevivientes», ya que el inglés la preservó y el término tiene un matiz léxico relevante.
