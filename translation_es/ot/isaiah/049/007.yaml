base_translation:
  language: en
  yaml_path: translation/ot/isaiah/049/007.yaml
  text: 'Thus says Yahweh[a], the Redeemer of Israel, his Holy One, to one despised in soul, abhorred by the nation, a servant of rulers: Kings will see and rise up, princes also, and they will bow down, because of Yahweh, who is faithful, the Holy One of Israel[d][c][b], who has chosen you.'
  footnotes:
  - marker: a
    text: Or 'to the one despised,' 'to one deeply despised,' or possibly 'despised by people'; the Hebrew expression is compressed and difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'abhorred by nations' or 'one whom the nation abhors.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a servant of rulers'; Hebrew עֶבֶד can mean either 'servant' or 'slave,' but here the context of humiliation favors 'slave.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew may imply that kings and princes honor the servant, with the LORD as the ultimate reason for that homage; the exact object of 'bow down' is not explicitly stated.
    reason: alternative_reading
