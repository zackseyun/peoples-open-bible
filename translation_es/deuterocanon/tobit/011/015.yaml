translation:
  language: es
  text: porque me afligiste y tuviste misericordia de mí. Mira[a], veo a Tobías, mi hijo. Y su hijo entró gozoso, y le contó a su padre las grandes cosas que le habían sucedido en Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». El griego ἰδοὺ introduce una llamada de atención solemne; «Mira» conserva ese valor en un español más natural.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμαστίγωσας
  english_pob_choice: you afflicted me
  chosen_spanish: me afligiste
  alternatives_spanish:
  - me golpeaste
  - me azotaste
  - me castigaste
  lexicon: BDAG
  rationale: El griego puede ir desde una golpiza literal hasta una aflicción severa. «Afligiste» conserva la acción directa atribuida a Dios sin fijar innecesariamente un instrumento físico que el contexto narrativo no exige.
- source_word: ἠλέησάς
  english_pob_choice: had mercy on me
  chosen_spanish: me tuviste misericordia
  alternatives_spanish:
  - me mostraste misericordia
  - te compadeciste de mí
  lexicon: BDAG
  rationale: Es la equivalencia natural y reverente de ἐλεέω. Mantiene el contraste con la aflicción previa y el sujeto divino explícito.
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Miren
  lexicon: BDAG
  rationale: En español moderno «Mira» conserva el gesto deíctico y exclamativo de atención inmediata; es más natural que «He aquí» en este contexto, sin perder el impacto del descubrimiento de la vista restaurada.
- source_word: βλέπω
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - puedo ver
  - estoy viendo
  lexicon: BDAG
  rationale: «Veo» expresa de forma directa la visión recuperada y mantiene el paralelismo con el objeto nombrado inmediatamente después.
- source_word: χαίρων
  english_pob_choice: rejoicing
  chosen_spanish: gozoso
  alternatives_spanish:
  - alegre
  - regocijándose
  - lleno de gozo
  lexicon: BDAG
  rationale: La forma participial se vierte con un adjetivo participial natural en español. «Gozoso» conserva el estado de alegría sin volver la frase pesada.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: le anunció
  alternatives_spanish:
  - le informó
  - le contó
  - le refirió
  lexicon: BDAG
  rationale: El verbo implica llevar un informe o dar noticia. «Le anunció» funciona bien en la secuencia narrativa y comunica que Tobías transmite hechos significativos a su padre.
- source_word: τὰ μεγάλα
  english_pob_choice: the great things
  chosen_spanish: las grandes cosas
  alternatives_spanish:
  - las grandes obras
  - las cosas grandes
  - los grandes hechos
  lexicon: BDAG
  rationale: Se mantiene la amplitud del sintagma griego sin especificar prematuramente si se trata de obras, hechos o acontecimientos providenciales.
- source_word: τὰ γενόμενα αὐτῷ
  english_pob_choice: that had happened to him
  chosen_spanish: que le habían sucedido
  alternatives_spanish:
  - que le habían acontecido
  - que le habían pasado
  - que le habían ocurrido
  lexicon: BDAG
  rationale: «Sucedido» es natural en español y refleja el valor de acontecer del participio sustantivado sin añadir interpretación adicional.
- source_word: ἐν τῇ Μηδείᾳ
  english_pob_choice: in Media
  chosen_spanish: en Media
  alternatives_spanish:
  - en la Media
  - en la tierra de los medos
  lexicon: BDAG
  rationale: Se conserva el nombre geográfico tradicional de la región. «En Media» es breve, estándar y fiel al original.
theological_decisions:
- issue: Atribución directa a Dios de aflicción y misericordia
  english_pob_reading: 'Retain direct address to God: ''you afflicted me and had mercy on me.'''
  chosen_spanish_reading: 'Mantener el dirigirse a Dios en segunda persona: «me afligiste y me tuviste misericordia».'
  alternative_spanish_readings:
  - me causaste aflicción y me mostraste misericordia
  - me castigaste y me tuviste misericordia
  rationale: El griego atribuye ambas acciones al mismo sujeto divino. La traducción conserva esa tensión teológica en lugar de suavizar la primera acción o volverla impersonal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la elección final favorece «afligiste» sobre un golpe más literal, y un equivalente formal para ἰδοὺ; en español se conserva la misma tensión de sufrimiento y misericordia sin introducir una lectura más fuerte de castigo físico.'
  spanish_consistency_notes:
  - Se usó «Tobías» para el nombre propio, coherente con el uso hispano usual y con el griego Τωβείαν.
  - Se mantuvo «Media» como topónimo y no se expandió a una glosa interpretativa en el texto principal.
  - La cadencia de la primera cláusula preserva la relación causal implícita del griego con una puntuación fluida en español.
