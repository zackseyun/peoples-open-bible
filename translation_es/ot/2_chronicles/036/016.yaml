translation:
  language: es
  text: Pero seguían burlándose de los mensajeros de Dios[a], despreciando sus palabras y mofándose de sus profetas, hasta que la ira de Yahvé se levantó contra su pueblo, hasta que no hubo remedio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ángeles de Dios»; aquí el contexto favorece claramente «mensajeros», es decir, enviados humanos de Dios, porque la frase siguiente habla de «sus profetas».
    reason: lexical_alternative
  - marker: b
    text: O «hasta que no hubo curación» o «hasta que quedó más allá de toda cura».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְעִבִים
  english_pob_choice: mocking
  chosen_spanish: se burlaban de
  alternatives_spanish:
  - se mofaban de
  - ridiculizaban a
  lexicon: HALOT
  rationale: El participio expresa una conducta continua o habitual de desprecio. «Se burlaban de» comunica bien esa acción repetida en español y mantiene el tono narrativo progresivo.
- source_word: בְּמַלְאֲכֵי הָאֱלֹהִים
  english_pob_choice: the messengers of God
  chosen_spanish: los mensajeros de Dios
  alternatives_spanish:
  - los ángeles de Dios
  lexicon: HALOT
  rationale: Aunque מַלְאָךְ puede significar «ángel», el contexto inmediato lo vincula con «sus profetas», así que «mensajeros» preserva la referencia a enviados humanos sin introducir seres celestiales.
- source_word: וּבוֹזִים
  english_pob_choice: despising
  chosen_spanish: despreciaban
  alternatives_spanish:
  - menospreciaban
  - desdeñaban
  lexicon: HALOT
  rationale: בזה transmite rechazo con desdén. «Despreciaban» conserva el valor evaluativo y suena natural junto a las demás acciones de la frase.
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su palabra
  - sus mensajes
  lexicon: HALOT
  rationale: El plural con sufijo se refleja de manera directa como «sus palabras», manteniendo el carácter múltiple de las comunicaciones divinas.
- source_word: וּמִתַּעְתְּעִים
  english_pob_choice: scoffing at
  chosen_spanish: se mofaban de
  alternatives_spanish:
  - se burlaban de
  - se reían de
  lexicon: HALOT
  rationale: El verbo añade otro matiz de burla o trato insultante. «Se mofaban de» distingue este segundo término del primero y conserva la escalada retórica.
- source_word: בִּנְבִיאָיו
  english_pob_choice: his prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - los profetas de Dios
  lexicon: HALOT
  rationale: La forma con sufijo se traduce de modo directo, y el antecedente es Dios en el contexto de la cláusula anterior.
- source_word: חֲמַת יְהוָה
  english_pob_choice: the wrath of Yahweh
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - el furor de Yahvé
  - la cólera de Yahvé
  lexicon: HALOT
  rationale: חֲמָה denota ira ardiente o indignación severa. «Ira» es claro y solemne en español; se conserva el nombre divino «Yahvé» según el estándar del proyecto.
- source_word: בְּעַמּוֹ
  english_pob_choice: against his people
  chosen_spanish: contra su pueblo
  alternatives_spanish:
  - sobre su pueblo
  - en su pueblo
  lexicon: HALOT
  rationale: Con el sustantivo de juicio, el preposición ב expresa aquí el objeto afectado. «Contra» comunica mejor la dirección del juicio que una simple localización.
- source_word: עַד לְאֵין מַרְפֵּא
  english_pob_choice: until there was no remedy
  chosen_spanish: hasta que no hubo remedio
  alternatives_spanish:
  - hasta que no hubo curación
  - hasta que quedó sin remedio
  lexicon: HALOT
  rationale: מַרְפֵּא puede significar curación o remedio. En este contexto de sentencia, «no hubo remedio» preserva la idea de imposibilidad de recuperación sin forzar una paráfrasis médica.
theological_decisions:
- issue: Referente de מַלְאֲכֵי הָאֱלֹהִים
  english_pob_reading: human prophetic messengers, not angels
  chosen_spanish_reading: mensajeros humanos de Dios, no ángeles
  alternative_spanish_readings:
  - ángeles de Dios
  - enviados de Dios
  rationale: La cláusula siguiente menciona explícitamente a «sus profetas», por lo que el paralelo contextual favorece entender aquí enviados humanos. Traducir «ángeles» desviaría el sentido histórico-profético del pasaje.
  doctrine_reference: Contextual parallelism in 2 Chronicles 36:16
- issue: Renderización del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. Conforme al estándar del proyecto, se preserva como «Yahvé» en vez de ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el pasaje según el último control de acuerdo alto y no se detectaron cambios necesarios; la presente redacción mantiene la distinción de las tres acciones de desprecio y la culminación judicial con «no hubo remedio».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, en coherencia con el estándar del proyecto.
  - 'Se conserva la tríada verbal con matices diferenciados: burlarse, despreciar, mofarse.'
  - «Mensajeros de Dios» se usa para preservar la lectura humana del hebreo en paralelo con «sus profetas».
