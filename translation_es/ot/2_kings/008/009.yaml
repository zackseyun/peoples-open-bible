  to: 'Entonces Hazael fue a su encuentro y tomó un presente en su mano, y toda clase de bienes de Damasco, una carga de cuarenta camellos. Llegó, se presentó ante él y dijo: «Tu hijo[a] Ben-adad, rey de Aram, me ha enviado a ti para decir: “¿Sanaré[b] de esta enfermedad?”»'
  rationale: Se reubicó la nota cultural en «Tu hijo» para reflejar la decisión documentada por la POB inglesa; se mejoró la naturalidad de «al encuentro de él» a «a su encuentro» y de «se puso delante de él» a «se presentó ante él»; y se afinó la nota literal de la pregunta para expresar mejor el hebreo en español natural.
