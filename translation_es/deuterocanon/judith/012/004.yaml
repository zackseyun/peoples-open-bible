translation:
  language: es
  text: 'Y Judit le dijo: «Por tu vida[a], mi señor, tu esclava[b] no gastará lo que llevo conmigo[c] hasta que él[d] haya realizado por mi mano lo que se ha propuesto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «Como ciertamente vives, mi señor». El griego dice literalmente: «Tu vida vive».'
    reason: lexical_alternative
  - marker: b
    text: «Esclava» conserva la fuerza de δούλη; «sierva» sería una alternativa más suave, pero menos precisa para este proyecto.
    reason: lexical_alternative
  - marker: c
    text: «Lo que llevo conmigo» probablemente se refiere a las provisiones o alimentos de Judit.
    reason: lexical_alternative
  - marker: d
    text: El sujeto de «haya realizado» es implícito en griego; en el contexto, se entiende más naturalmente como Dios.
    reason: theological_note
lexical_decisions:
- source_word: Ζῇ ἡ ψυχή σου
  english_pob_choice: As your life lives
  chosen_spanish: Vive tu vida
  alternatives_spanish:
  - Como ciertamente vives
  - Por tu vida
  lexicon: LSJ
  rationale: El griego es una fórmula de juramento con sentido literal de “tu vida/alma vive”. En español, “Vive tu vida” conserva la fuerza idiomática del juramento y su estructura enfática sin resultar tan extraña como una calca literal.
- source_word: κύριέ μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  lexicon: LSJ
  rationale: Aquí κύριος es un tratamiento respetuoso y cortesano dirigido a Holofernes, no un título divino. “Mi señor” reproduce el registro social con naturalidad en español.
- source_word: ἡ δούλη σου
  english_pob_choice: your slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  lexicon: LSJ
  rationale: Siguiendo la preferencia del proyecto por δοῦλος/δούλος como “esclavo” cuando el vínculo de sujeción está explícito, “tu esclava” preserva el peso de la autoidentificación subordinada de Judith.
- source_word: οὐ δαπανήσει
  english_pob_choice: will not use up
  chosen_spanish: no gastará
  alternatives_spanish:
  - no consumirá
  - no agotará
  lexicon: LSJ
  rationale: El verbo significa gastar o expender. En el contexto de provisiones, “gastará” en español transmite de forma natural la idea de consumir los recursos sin perder el matiz de expendio.
- source_word: τὰ ὄντα μετʼ ἐμοῦ
  english_pob_choice: what is with me
  chosen_spanish: lo que está conmigo
  alternatives_spanish:
  - las cosas que están conmigo
  - mis provisiones
  lexicon: LSJ
  rationale: La expresión griega es literalmente “las cosas que están conmigo”. “Lo que está conmigo” mantiene la cercanía al texto y deja abierta la referencia concreta a provisiones o pertenencias, como indica el contexto narrativo.
- source_word: ἕως ἄν ποιήσῃ
  english_pob_choice: until he has accomplished
  chosen_spanish: hasta que él haya realizado
  alternatives_spanish:
  - hasta que haga
  - hasta que lleve a cabo
  lexicon: LSJ
  rationale: El subjuntivo con ἕως ἄν marca una acción futura hasta un punto de cumplimiento. “Haya realizado” refleja bien la anterioridad relativa y la idea de cumplimiento completo.
- source_word: ἐν χειρί μου
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - mediante mi mano
  - por medio de mí
  lexicon: LSJ
  rationale: La expresión idiomática expresa instrumentalidad o agencia. “Por mi mano” conserva el giro bíblico y sugiere que la acción será ejecutada a través de Judith.
- source_word: ἃ ἐβουλεύσατο
  english_pob_choice: what he has planned
  chosen_spanish: lo que se ha propuesto
  alternatives_spanish:
  - lo que ha planeado
  - lo que ha resuelto
  lexicon: LSJ
  rationale: El verbo puede significar planear, resolver o proponerse. “Se ha propuesto” es una opción natural en español y mantiene la idea de una decisión deliberada sin sobreespecificar más allá del griego.
theological_decisions:
- issue: Sujeto implícito de ποιήσῃ / ἐβουλεύσατο
  english_pob_reading: The subject is rendered as 'he,' left implicit in English contextually, referring most naturally to God.
  chosen_spanish_reading: El sujeto se deja como “él” en el texto principal, entendido por el contexto como Dios.
  alternative_spanish_readings:
  - “hasta que se cumpla por mi mano lo que se ha propuesto”
  - “hasta que Dios haya realizado por mi mano lo que se ha propuesto”
  rationale: El griego omite el sujeto explícito, pero el contexto de Judit apunta a Dios como quien ha planeado y realizará la obra. El texto principal conserva el sujeto masculino implícito sin introducir una explicitación que el griego no formula directamente.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera indebida cuando el sujeto es implícito.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la secuencia de revisiones del audit trail: la forma inglesa volvió de “servant” a “slave”, y la redacción de τὰ ὄντα se simplificó a “what is with me”. La versión española conserva la fuerza de δούλη como “esclava”, pero mantiene una formulación natural para τὰ ὄντα μετʼ ἐμοῦ como “lo que está conmigo”, y refleja la ambigüedad del sujeto implícito de manera contextual.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplicable en este versículo; no aparece el tetragrámaton.
  - Se evitó “Cristo” porque no corresponde a este pasaje.
  - Se usó “esclava” para δούλη según la preferencia del proyecto.
  - Se conservó la ambigüedad del sujeto implícito con una nota explicativa en vez de forzar una explicitación en el cuerpo del texto.
  - La puntuación y el tratamiento dialogal siguen el español moderno de registro bíblico digno.
