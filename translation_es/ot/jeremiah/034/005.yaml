  to: 'Morirás en paz[a]. Y así como se quemaban aromas por tus padres, los reyes anteriores que te precedieron, así quemarán aromas por ti, y harán duelo por ti, diciendo: «¡Ay, señor![b]» Porque yo he hablado la palabra, declara Yahvé.'
  rationale: 'Se corrigen dos calcos poco naturales y una imprecisión semántica: «los primeros reyes» pasa a «los reyes anteriores» para reflejar mejor הָרִאשֹׁנִים en contexto; «que fueron antes de ti» pasa a «que te precedieron» para un español más claro; «te harán lamento» pasa a «harán duelo por ti» para expresar naturalmente יִסְפְּדוּ לָךְ sin perder el matiz formal de lamentación. Se mantienen «en paz», «aromas», «¡Ay, señor!» y «Yahvé», que sí concuerdan con la evidencia fuente y el criterio del proyecto.'
  reviewer_model: gpt-5.4
