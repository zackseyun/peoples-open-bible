  to: 'Hombre anciano, hombre joven, virgen, niños pequeños y mujeres: mátenlos por completo. Pero no se acerquen a ningún hombre sobre quien esté la marca[a], y comiencen por mi santuario. Y comenzaron con los hombres ancianos[b] que estaban delante de la casa.'
  rationale: Se corrigieron los anclajes de notas para que correspondan a 'la marca' y a 'hombres ancianos'. Se reemplazó 'viejo' por 'hombre anciano' y 'hombres viejos' por 'hombres ancianos' para mantener la lectura etaria principal con mejor dignidad y naturalidad en español eclesial. Se cambió 'hasta la destrucción' por 'por completo' para reflejar el intensivo לְמַשְׁחִית de forma idiomática. Se ajustó 'desde mi santuario' a 'por mi santuario' para expresar mejor el punto de inicio.
