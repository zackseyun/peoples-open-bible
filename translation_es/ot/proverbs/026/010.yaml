translation:
  language: es
  text: Como un arquero que hiere a todos[a], así es el que contrata a un necio o a cualquier transeúnte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea es notoriamente difícil. Esta lectura sigue una interpretación tradicional: ''como un arquero que hiere a todos''. Otras versiones entienden el inicio de manera más literal, por ejemplo, ''un gran hombre produce todas las cosas'' o algo similar, pero eso resulta menos coherente en el contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''el que contrata a un necio o contrata a transeúntes''. La idea es una contratación indiscriminada que causa daño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב
  english_pob_choice: like an archer
  chosen_spanish: Como arquero
  alternatives_spanish:
  - Como un gran hombre
  - Como un maestro
  - Como muchos
  lexicon: HALOT
  rationale: Sigo la interpretación auditada que entiende el inicio del proverbio como una comparación con un arquero; en español, 'como arquero' transmite de modo natural la imagen coherente con el resto del verso. Las alternativas literales no producen un proverbio inteligible en contexto.
- source_word: מְחֹולֵל
  english_pob_choice: who wounds
  chosen_spanish: que hiere
  alternatives_spanish:
  - que perfora
  - que trae a luz
  - que causa dolor
  lexicon: HALOT
  rationale: El participio se traduce con un verbo de daño físico, como en el análisis inglés. 'Hiere' conserva el valor injurioso sin sonar excesivamente técnico.
- source_word: כֹּל
  english_pob_choice: everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los hombres
  - a todo
  - a cada uno
  lexicon: HALOT
  rationale: En español, con el verbo 'herir', el complemento natural es personal; 'a todos' preserva el alcance inclusivo del hebreo sin forzar un objeto impersonal.
- source_word: וְשֹׂכֵר
  english_pob_choice: is one who hires / or hires
  chosen_spanish: es el que contrata / el que contrata
  alternatives_spanish:
  - y contrata
  - y alquila
  - es quien contrata
  lexicon: HALOT
  rationale: Mantengo la idea de acción habitual e irresponsable mediante una cláusula relativa explícita. 'Contratar' expresa bien la idea de emplear personas, sin perder el paralelismo de las dos repeticiones.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un tonto
  - un insensato
  - un estúpido
  lexicon: HALOT
  rationale: '''Necio'' es un equivalente sobrio y tradicional para la categoría sapiencial כסיל; conserva la carga moral e intelectual mejor que opciones coloquiales.'
- source_word: עֹבְרִים
  english_pob_choice: passersby
  chosen_spanish: los que pasan
  alternatives_spanish:
  - pasajeros
  - transeúntes
  - los que van pasando
  lexicon: HALOT
  rationale: '''Los que pasan'' es claro y neutral en español, y reproduce la idea de personas tomadas al azar mientras se desplazan. Evita una palabra más técnica que podría sonar menos natural.'
translation_notes:
  revision_awareness: El registro inglés auditado mantiene la lectura tradicional de 'archer' y la alternativa literal como nota; no se aplicaron revisiones posteriores que alteraran el sentido. La versión española sigue esa misma decisión interpretativa y conserva la advertencia sobre la dificultad del hebreo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí el Tetragrámaton ni una cita divina directa.
  - '''Necio'' conserva el término sapiencial estándar para כסיל.'
  - '''Los que pasan'' refleja el plural participial sin introducir un matiz ajeno como ''viajeros''.'
  - La comparación se expresa con 'Como...' para mantener la estructura proverbial del hebreo y del análisis inglés.
