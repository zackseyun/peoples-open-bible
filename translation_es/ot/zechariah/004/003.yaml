translation:
  language: es
  text: Y dos olivos estaban junto a ella[b][a], uno a la derecha del cuenco y otro a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre ella» / «encima de ella»; la preposición hebrea puede abarcar más que una proximidad estricta, pero las descripciones de la derecha y la izquierda favorecen el sentido «junto a ella».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el cuenco o depósito de aceite en la visión del candelabro.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/שְׁנַיִם
  english_pob_choice: And two
  chosen_spanish: Y dos
  alternatives_spanish:
  - Ahora dos
  - Y dos árboles
  lexicon: HALOT
  rationale: La conjunción waw continúa de forma natural la descripción de la visión; en español, 'Y' conserva esa continuidad. 'Dos' mantiene explícito el numeral.
- source_word: זֵיתִים
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - árboles de olivo
  - olivos
  lexicon: HALOT
  rationale: En este contexto visionario y espacial, el sustantivo se refiere a los árboles, no a los frutos. 'Olivos' es natural en español y fiel al referente.
- source_word: עָלֶיהָ
  english_pob_choice: beside it
  chosen_spanish: junto a él
  alternatives_spanish:
  - sobre él
  - encima de él
  - al lado de él
  lexicon: HALOT
  rationale: El hebreo על es más amplio que una simple colocación 'sobre'. Como las cláusulas siguientes sitúan los árboles a la derecha e izquierda del recipiente, 'junto a' expresa bien la relación espacial sin imponer una postura literal de encima.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  lexicon: HALOT
  rationale: 'Valor distributivo simple en la estructura paralela: uno a cada lado.'
- source_word: מִ/ימִין
  english_pob_choice: on the right of
  chosen_spanish: a la derecha de
  alternatives_spanish:
  - a la derecha del
  - del lado derecho de
  lexicon: HALOT
  rationale: La expresión señala posición lateral. 'A la derecha de' es la forma más natural en español y conserva la relación espacial.
- source_word: הַ/גֻּלָּה
  english_pob_choice: the bowl
  chosen_spanish: el cuenco
  alternatives_spanish:
  - el tazón
  - la taza
  - el recipiente
  lexicon: HALOT
  rationale: En la visión del candelabro, la גֻּלָּה es el recipiente redondeado para el aceite. 'Cuenco' es claro en español y evita una connotación demasiado doméstica de 'bowl'.
- source_word: וְ/אֶחָד
  english_pob_choice: and one
  chosen_spanish: y otro
  alternatives_spanish:
  - y uno
  - y el otro
  lexicon: HALOT
  rationale: El paralelo exige un segundo miembro contrastivo. 'Y otro' fluye naturalmente en español y mantiene la simetría.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  - al lado de
  lexicon: HALOT
  rationale: Aquí el valor espacial se expresa en español con la preposición 'a' en la construcción 'a su izquierda', que resulta idiomática y preserva la dirección lateral.
- source_word: שְׂמֹאלָהּ
  english_pob_choice: on its left
  chosen_spanish: a su izquierda
  alternatives_spanish:
  - del lado izquierdo de él
  - a la izquierda de él
  lexicon: HALOT
  rationale: La frase indica la posición correspondiente en el lado izquierdo. 'A su izquierda' es conciso y natural, y mantiene el paralelismo con 'a la derecha de'.
theological_decisions:
- issue: Alcance espacial de עָלֶיהָ en una visión simbólica
  english_pob_reading: '''beside it'' with a note that Hebrew can also mean ''upon it'' / ''over it'''
  chosen_spanish_reading: '''junto a él'' con posibilidad de lectura amplia preservada implícitamente por la nota'
  alternative_spanish_readings:
  - sobre él
  - encima de él
  - al lado de él
  rationale: El hebreo permite un rango espacial más amplio que la mera proximidad física. La escena siguiente, con los olivos a derecha e izquierda del cuenco, favorece la lectura de proximidad lateral. En español, 'junto a' conserva esa amplitud sin perder naturalidad.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés y con la revisión más reciente: no hubo cambios necesarios. Se mantuvo la lectura espacial amplia de על y el referente visionario de גֻּלָּה como recipiente de aceite.'
  spanish_consistency_notes:
  - Se usó 'olivos' para זֵיתִים por el contexto visionario, no 'aceitunas'.
  - Se evitó 'SEÑOR' u otra terminología de sustitución, porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo el paralelismo derecha/izquierda para reflejar la estructura hebrea.
  - La nota b aclara el referente del cuenco sin introducir interpretación adicional.
