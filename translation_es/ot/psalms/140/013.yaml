translation:
  language: es
  text: Yo sé[a] que Yahvé defenderá la causa del afligido[b] y hará justicia a los necesitados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘Yo he sabido’; la forma hebrea se entiende tradicionalmente aquí como la confesión del salmista: ‘Yo sé’. Algunos toman la forma consonántica como ‘Tú sabes’.'
    reason: textual_variant
  - marker: b
    text: Literalmente, ‘hará la causa/el caso del afligido’; es decir, actuará para sostener su causa legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ידעת
  english_pob_choice: I know
  chosen_spanish: Yo sé
  alternatives_spanish:
  - Yo he sabido
  - Tú sabes
  lexicon: HALOT
  rationale: La forma hebrea es morfológicamente 2ms, pero el audit trail inglés sigue la lectura confesional tradicional en 1cs. En español, ‘Yo sé’ transmite con naturalidad esa confesión del salmista y conserva la fuerza aspectual del perfecto en contexto.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que el hablante sabe; ‘que’ es el complemento más natural y fiel en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: will uphold
  chosen_spanish: hará
  alternatives_spanish:
  - sostendrá
  - defenderá
  - hará valer
  lexicon: HALOT
  rationale: Con דִּין, el verbo literalmente ‘hacer’ expresa actuar respecto del caso o derecho. En español, ‘hará el derecho’ conserva la base léxica de ‘hacer’ y permite la lectura forense sin forzar una paráfrasis excesiva. La glosa inglesa ‘will uphold’ queda reflejada en el sentido jurídico de la frase completa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según la convención del POB en español: ‘Yahvé’, evitando la sustitución por un título.'
- source_word: דִּין
  english_pob_choice: the cause
  chosen_spanish: el derecho
  alternatives_spanish:
  - la causa
  - el caso
  - la justicia
  lexicon: HALOT
  rationale: En este contexto jurídico, la POB inglés entiende דין como ‘the cause/case’ del oprimido. En español, ‘el derecho’ comunica de forma natural la pretensión legal del afligido y preserva el matiz forense sin reducirlo a un simple abstracto de ‘justicia’.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: del afligido
  alternatives_spanish:
  - del pobre
  - del humilde
  lexicon: HALOT
  rationale: El término puede ser ‘pobre’, ‘afligido’ o ‘humilde’. Dado el contexto de opresión y violencia, ‘afligido’ recoge mejor el sufrimiento y la vulnerabilidad que subraya la lectura inglesa.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - el derecho
  - la rectitud
  lexicon: HALOT
  rationale: Aquí mishpat denota la decisión justa o la justicia otorgada. ‘La justicia’ es la opción más clara y idiomática en español, y mantiene el paralelismo con la línea anterior.
- source_word: אֶבְיֹנִים
  english_pob_choice: the needy
  chosen_spanish: de los necesitados
  alternatives_spanish:
  - de los pobres
  - de los indigentes
  lexicon: HALOT
  rationale: ‘Necesitados’ preserva la amplitud semántica de אֶבְיוֹן sin limitarla a pobreza material; armoniza con el paralelismo poético y con la decisión inglesa ‘the needy’.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrama directamente. La política del POB es transliterarlo como nombre propio, no sustituirlo por un título devocional. En español, ‘Yahvé’ es la forma establecida para esta convención.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto español. El contenido sigue el paquete fuente hebreo y el audit trail inglés, sin depender mecánicamente del inglés para la elección léxica central.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma española del nombre divino.
  - Se conserva el registro jurídico-poético de דין / משפט con ‘derecho’ y ‘justicia’.
  - ‘Afligido’ y ‘necesitados’ respetan el paralelismo semántico del hebreo.
  - La puntuación española usa coma antes de la segunda cola poética para claridad, sin alterar el paralelismo.
