translation:
  language: es
  text: Así, el pueblo llevó su masa antes de que se leudara, con sus artesas de amasar[a] atadas en sus mantos, sobre sus hombros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus recipientes de amasado». El hebreo nombra recipientes usados para preparar la masa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: carried
  chosen_spanish: llevó
  alternatives_spanish:
  - cargó
  - transportó
  - tomó
  lexicon: HALOT
  rationale: נשׂא aquí expresa llevar algo al salir; en español, «llevó» comunica de modo natural la acción de transportar la masa durante la partida.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto narrativo, עָם se refiere colectivamente a Israel. «El pueblo» es claro y mantiene el sentido corporativo.
- source_word: בְּצֵקוֹ
  english_pob_choice: their dough
  chosen_spanish: su masa
  alternatives_spanish:
  - su masa de pan
  - la masa
  lexicon: HALOT
  rationale: Aunque el sufijo es singular en hebreo, el referente colectivo permite un singular posesivo en español. «Masa» es más natural que una traducción demasiado técnica o forzada.
- source_word: טֶרֶם יֶחְמָץ
  english_pob_choice: before it was leavened
  chosen_spanish: antes de que fermentara
  alternatives_spanish:
  - antes de que leudara
  - antes de que se leudara
  lexicon: HALOT
  rationale: El hebreo indica que la masa aún no había pasado por el proceso de leudado/fermentación. «Fermentara» conserva bien el valor verbal y evita una formulación pesada.
- source_word: מִשְׁאֲרֹתָם
  english_pob_choice: their kneading bowls
  chosen_spanish: sus artesas de amasar
  alternatives_spanish:
  - sus artesas
  - sus recipientes de amasado
  - sus troughs de amasar
  lexicon: HALOT
  rationale: El término designa recipientes usados para preparar la masa. «Artesa de amasar» es un equivalente español tradicional y preciso; «artesas» preserva el objeto doméstico de la escena.
- source_word: צְרֻרֹת
  english_pob_choice: bound up
  chosen_spanish: atadas
  alternatives_spanish:
  - ligadas
  - envueltas
  - anudadas
  lexicon: HALOT
  rationale: El participio pasivo expresa que los objetos estaban sujetos o amarrados para el viaje. «Atadas» es la opción más directa y natural en español.
- source_word: בְּשִׂמְלֹתָם
  english_pob_choice: in their cloaks
  chosen_spanish: en sus mantos
  alternatives_spanish:
  - en sus capas
  - en sus mantos exteriores
  - en sus ropas
  lexicon: HALOT
  rationale: שִׂמְלָה designa un vestido exterior o manto. «Mantos» mantiene una imagen bíblica comprensible sin depender de «cloaks», que suena menos natural en español.
- source_word: עַל שִׁכְמָם
  english_pob_choice: on their shoulders
  chosen_spanish: sobre sus hombros
  alternatives_spanish:
  - en sus hombros
  - a sus hombros
  lexicon: HALOT
  rationale: La expresión describe la posición de los bultos al ser cargados. «Sobre sus hombros» reproduce la imagen espacial con claridad.
theological_decisions:
- issue: La referencia a la masa sin leudar en el marco de la Pascua
  english_pob_reading: before it was leavened
  chosen_spanish_reading: antes de que fermentara
  alternative_spanish_readings:
  - antes de que fuera leudada
  - antes de que se leudara
  rationale: La redacción mantiene el dato narrativo de prisa y salida inmediata sin introducir interpretación adicional; «fermentara» conserva la idea procesual del hebreo y encaja con el contexto pascual.
  doctrine_reference: Éxodo 12; memorial pascual y salida apresurada de Egipto
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del paquete fuente y el audio-trazado inglés: no hay revisiones aplicadas ni cambios de última pasada, y el acuerdo de revisión es alto (1.0), por lo que no se introducen notas de texto crítico ni ajustes interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta sección solo cuando el texto fuente lo requiera; aquí no aparece.
  - «El pueblo» conserva el sujeto colectivo sin pluralizar innecesariamente.
  - «Masa» y «artesas de amasar» evitan calcos del inglés y reflejan el objeto doméstico del hebreo.
  - No se usa «SEÑOR» ni terminología eclesiástica añadida, porque el versículo no contiene el Tetragrámaton ni un título cristológico.
