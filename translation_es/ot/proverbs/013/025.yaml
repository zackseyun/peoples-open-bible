revisions:
- from: El justo come hasta quedar satisfecho[a], pero el vientre de los impíos carece.
  to: El justo come hasta saciar su alma[a], pero al vientre de los impíos le falta.
  rationale: La revisión restaura en el texto principal el equivalente de נַפְשׁוֹ («su alma»), en conformidad con la decisión documentada del POB inglés, y deja «apetito» como alternativa léxica en nota. También mejora la naturalidad española del segundo hemistiquio con «al vientre de los impíos le falta», que expresa carencia de manera idiomática y conserva la brevedad sapiencial.
  reviewer_model: gpt-5.4
