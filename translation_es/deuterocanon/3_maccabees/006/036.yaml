translation:
  language: es
  text: Y habiendo establecido un estatuto común acerca de estas cosas para toda su comunidad, por sus generaciones[a], decretaron que los días antes mencionados se celebraran como días de gozo, no por causa de la bebida y de la glotonería, sino a causa de la liberación que les había llegado de parte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «a través de los dioses» (διὰ θεῶν). En este contexto, el sentido probablemente sea la liberación divina atribuida al único Dios; la forma plural puede reflejar la redacción transmitida o un modismo textual.'
    reason: textual_variant
lexical_decisions:
- source_word: κοινὸν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - compartido
  - público
  lexicon: LSJ
  rationale: El adjetivo califica a θεσμόν y señala una disposición compartida por todo el grupo. «Común» conserva ese sentido corporativo sin forzar una lectura más técnica de «público».
- source_word: ὁρισάμενοι
  english_pob_choice: having established
  chosen_spanish: habiendo establecido
  alternatives_spanish:
  - habiendo determinado
  - habiendo ordenado
  lexicon: LSJ
  rationale: El participio expresa la acción formal de fijar o instituir algo. «Habiendo establecido» suena natural en español y mantiene el valor de instauración normativa.
- source_word: θεσμὸν
  english_pob_choice: ordinance
  chosen_spanish: estatuto
  alternatives_spanish:
  - ordenanza
  - decreto
  - costumbre
  lexicon: LSJ
  rationale: θεσμός designa una disposición establecida o norma instituida. «Estatuto» conserva el carácter formal y comunitario sin depender de un tecnicismo excesivo; «ordenanza» o «decreto» también serían posibles, pero «estatuto» encaja bien con la idea de una norma fijada para la comunidad.
- source_word: παροικίαν
  english_pob_choice: community
  chosen_spanish: comunidad
  alternatives_spanish:
  - asentamiento
  - diáspora
  - comunidad de residentes
  lexicon: LSJ
  rationale: Aquí el término remite al cuerpo judío residente como minoría. «Comunidad» comunica con claridad la realidad colectiva en español y evita la literalidad extraña de «sojourning».
- source_word: εἰς γενεάς
  english_pob_choice: throughout their generations
  chosen_spanish: para todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por generaciones
  lexicon: LSJ
  rationale: La frase indica observancia continua a través de generaciones sucesivas. «Para todas sus generaciones» preserva el alcance heredado y suena idiomático en español bíblico contemporáneo.
- source_word: τὰς προειρημένας ἡμέρας
  english_pob_choice: the previously mentioned days
  chosen_spanish: los días antes mencionados
  alternatives_spanish:
  - los días mencionados antes
  - los días ya dichos
  lexicon: LSJ
  rationale: El participio remite a días ya introducidos en la narración. «Antes mencionados» mantiene esa referencia retrospectiva con fluidez natural.
- source_word: ἄγειν
  english_pob_choice: to be observed
  chosen_spanish: se celebraran
  alternatives_spanish:
  - se observaran
  - se guardaran
  - se mantuvieran
  lexicon: LSJ
  rationale: Con días como objeto, ἄγειν puede significar celebrar o guardar una festividad. Dado que el contexto habla de días de gozo, «se celebraran» transmite mejor el carácter festivo que «observaran», sin perder la idea de conmemoración.
- source_word: εὐφροσύνους
  english_pob_choice: as days of rejoicing
  chosen_spanish: como días de gozo
  alternatives_spanish:
  - como días de alegría
  - como días festivos
  lexicon: LSJ
  rationale: El adjetivo describe el carácter de los días. «Gozo» es una opción digna y natural en registro bíblico, equivalente al valor festivo y jubiloso del griego.
- source_word: πότου
  english_pob_choice: drinking
  chosen_spanish: beber
  alternatives_spanish:
  - bebida
  - borrachera
  - libaciones
  lexicon: LSJ
  rationale: El sustantivo se refiere al beber, a menudo con matiz de banquete o exceso. «Beber» conserva la cercanía al griego; el contexto negativo queda reforzado por el término siguiente.
- source_word: λιχνείας
  english_pob_choice: gluttony
  chosen_spanish: glotonería
  alternatives_spanish:
  - gula
  - exceso en la comida
  - voracidad
  lexicon: LSJ
  rationale: El término denota apetito desordenado o exceso en la comida. «Glotonería» es el equivalente más directo en español para este contraste moral.
- source_word: σωτηρίας
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - rescate
  lexicon: LSJ
  rationale: En este contexto histórico la referencia es a una liberación concreta del peligro. «Liberación» conserva ese sentido de rescate real sin cargar innecesariamente el término con un matiz exclusivamente soteriológico.
- source_word: τῆς διὰ θεῶν γενομένης αὐτοῖς
  english_pob_choice: that had come to them through God
  chosen_spanish: que les había venido por Dios
  alternatives_spanish:
  - que les había sobrevenido por Dios
  - que había sido obrada para ellos por Dios
  lexicon: LSJ
  rationale: La frase atribuye su liberación a la agencia divina. Aunque el texto transmitido lee θεῶν en plural, el contexto judío favorece entender la referencia como «Dios»; la redacción española conserva la tensión textual en la nota a pie.
theological_decisions:
- issue: Cómo reflejar διὰ θεῶν en un contexto judío sin borrar la forma plural del texto griego
  english_pob_reading: through God
  chosen_spanish_reading: por Dios
  alternative_spanish_readings:
  - por los dioses
  rationale: El contexto narrativo es judío y atribuye la liberación a la acción divina. Traducir mecánicamente «por los dioses» daría una lectura teológicamente desalineada con el conjunto del pasaje. «Por Dios» preserva el sentido narrativo, mientras que la forma plural queda documentada en la nota textual.
  doctrine_reference: Mantener la tensión textual sin imponer una lectura politeísta ajena al contexto
- issue: Matiz de ἄγειν en relación con días festivos
  english_pob_reading: to be observed
  chosen_spanish_reading: se celebraran
  alternative_spanish_readings:
  - se observaran
  - se guardaran
  rationale: En este contexto la acción se refiere a días instituidos para conmemoración gozosa. «Celebraran» expresa mejor el carácter festivo de la decisión, sin perder que se trata de una observancia establecida.
  doctrine_reference: Fiesta/observancia comunitaria según el contexto narrativo
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés auditado, que pasó de «they set» a «they decreed» para reflejar mejor ἐστήσαν. En español se optó por «decretaron», coherente con el valor formal de la decisión comunitaria y con el tono normativo del pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto griego y el audit trail lo exijan; aquí no aparece el tetragrámaton, por lo que se empleó «Dios».
  - Se prefirió «liberación» en lugar de «salvación» para mantener el sentido histórico-concreto del contexto.
  - Se evitó «SEÑOR» como máscara convencional, ya que no corresponde a este versículo ni al razonamiento textual auditado.
