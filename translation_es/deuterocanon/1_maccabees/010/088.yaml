translation:
  language: es
  text: Y sucedió que, cuando Alejandro el rey oyó estas palabras[a], continuó honrando a Jonatán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siguió honrando a Jonatán»; el griego προσέθετο δοξάσαι expresa una honra añadida o incrementada.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο ὡς
  english_pob_choice: And it happened that when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Y aconteció que cuando
  lexicon: BDAG
  rationale: La fórmula narrativa expresa transición y encadena la acción. «Y sucedió que, cuando» conserva el valor de ἐγένετο sin sonar excesivamente rígido en español.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: BDAG
  rationale: Aquí ἀκούω indica percibir el contenido del mensaje; «oyó» es natural y mantiene la relación directa con las palabras pronunciadas.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este mensaje
  - estas cosas
  lexicon: BDAG
  rationale: «Palabras» reproduce con precisión λόγοι en este contexto de discurso reportado. «Mensaje» sería posible, pero suaviza el paralelismo con el griego.
- source_word: προσέθετο δοξάσαι
  english_pob_choice: he continued to honor Jonathan
  chosen_spanish: continuó honrando
  alternatives_spanish:
  - siguió honrando
  - le honró todavía más
  - aumentó su honra hacia
  lexicon: BDAG
  rationale: El inglés POB entiende la expresión como aumento o continuación de honor. En español, «continuó honrando» preserva la idea de acción añadida o intensificada sin introducir un giro artificial.
- source_word: τὸν Ἰωναθάν
  english_pob_choice: Jonathan
  chosen_spanish: a Jonatán
  alternatives_spanish:
  - a Jonathan
  lexicon: Project transliteration policy / Spanish customary form
  rationale: Se usa la forma española establecida «Jonatán» para el nombre propio, con la preposición objeto directo explícita en español.
theological_decisions:
- issue: δοξάζω en contexto real/político, no doxología religiosa
  english_pob_reading: he continued to honor Jonathan
  chosen_spanish_reading: continuó honrando a Jonatán
  alternative_spanish_readings:
  - lo glorificó
  - lo exaltó
  rationale: El contexto es político-cortesano; por eso se evita cargar el verbo con un sentido litúrgico o teológico que el griego aquí no exige. «Honrar» conserva el matiz de reconocimiento y favor.
  doctrine_reference: Uso contextual de δοξάζω en narración histórica
translation_notes:
  revision_awareness: La revisión inglesa cambió de una formulación más literal («added to honoring») a una más natural («continued to honor»). La versión española sigue esa decisión revisada, pero conserva la posibilidad de entender el griego como honra aumentada mediante la nota.
  spanish_consistency_notes:
  - Se mantiene el nombre «Jonatán» conforme a la práctica española habitual del POB.
  - «Oyó estas palabras» conserva el objeto directo plural del griego y el estilo narrativo breve.
  - No se usa «Cristo» ni terminología teológica no pertinente; la escena es histórica y cortesana.
  - La nota al pie preserva la tensión lexical entre continuidad y aumento de honor sin resolverla de manera excesiva.
