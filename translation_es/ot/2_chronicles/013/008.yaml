base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/013/008.yaml
  text: And now you are saying that you are strong enough to stand against the kingdom of Yahweh in the hand of the sons of David[c][b][a], because you are a great multitude and have with you the golden calves that Jeroboam made for you as gods.
  footnotes:
  - marker: a
    text: Or, 'you say that you will show yourselves strong before the kingdom of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the hand of the sons of David,' an idiom for rule or administration through David's line.
    reason: cultural_note
  - marker: c
    text: Or, 'for gods.' The Hebrew is plural, referring polemically to Jeroboam's calf idols.
    reason: lexical_alternative
