review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal y temporal del hebreo, preserva correctamente «el hijo de Isaí» y comunica bien la orden de Saúl. Sin embargo, se aparta de una decisión importante del POB inglés en la cláusula final: el original mantiene el modismo transparente «בן מות / son of death» en el texto principal, con nota explicativa. El español lo reemplaza por una paráfrasis interpretativa («un hombre condenado a muerte»), lo cual pierde la transparencia formal del original y de la auditoría inglesa.'
  spanish_quality_summary: 'El español es claro y legible, pero «serán establecidos» suena algo forzado con sujeto coordinado personal + institucional; «quedarán establecidos» mejora la naturalidad sin perder el valor pasivo/resultativo. «Ahora pues» es aceptable. La nota al pie actual está bien formulada, pero el ancla [a] está mal colocada: debe ir en la frase idiomática final, no en «tierra».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se mantiene bien «Isaí». La principal desalineación es con la política de preservar modismos significativos del texto fuente cuando el POB inglés los conserva en el texto principal; por eso debe traducirse «es un hijo de muerte[a]» y explicar el sentido en la nota.
  issues:
  - severity: high
    issue: La cláusula final parafrasea en vez de preservar el modismo hebreo
    rationale: El hebreo dice literalmente «בן מות הוא»; el POB inglés decidió conservar «he is a son of death» en el texto principal. «Es un hombre condenado a muerte» interpreta el modismo y reduce la transparencia con la fuente y con la decisión auditada.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La nota explica «hijo de muerte», pero el marcador [a] aparece tras «tierra». El marcador debe colocarse junto a la expresión idiomática que comenta.
  - severity: low
    issue: «Serán establecidos» suena poco idiomático en español
    rationale: Aunque es comprensible y formalmente cercano, con «ni tú ni tu reino» suena más natural «quedarán establecidos» o «serán afirmados». Esto mejora legibilidad sin alterar el sentido.
  revised_spanish_text: Porque mientras el hijo de Isaí viva sobre la tierra, ni tú ni tu reino quedarán establecidos. Ahora pues, envía y tráelo a mí, porque es un hijo de muerte[a].
  revised_footnotes:
  - marker: a
    text: 'Modismo hebreo: «un hijo de muerte», es decir, alguien merecedor de muerte o destinado a morir.'
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear el español con el hebreo y con la decisión documentada del POB inglés de conservar el modismo «son of death» en el texto principal y explicarlo en nota. También se reubica correctamente el marcador de nota y se suaviza una construcción pasiva poco natural en español con «quedarán establecidos».
