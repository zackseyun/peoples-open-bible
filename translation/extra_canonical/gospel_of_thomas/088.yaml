translation:
  text: Jesus said[what belongs to you], "The angels and the prophets will come to
    you, and they will give you what belongs to you. And you, in turn, give them what
    is in your hands, and say to yourselves[what is in your hands], 'On what day will
    they come and take what is theirs?'"
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:21:28Z'
  footnotes:
  - marker: what belongs to you
    text: Literally 'the things which you have' (ⲛ̄ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ).
    reason: lexical_alternative
  - marker: what is in your hands
    text: The Coptic form ⲛⲉⲧⲛ̄ⲧⲟⲧ⳿ⲧⲏⲛⲉ uses the regional/Lycopolitan suffix ⲧⲏⲛⲉ
      for the second-person plural, rather than the standard Sahidic ⲧⲏⲩⲧⲛ.
    reason: dialect_note
lexical_decisions:
- source_word: ⲛ̄ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ
  chosen: what belongs to you
  rationale: Literally 'the things which you have them.' In Coptic, ⲟⲩⲛⲧⲁ= denotes
    possession. Translated dynamically as 'what belongs to you' to establish the reciprocal
    contrast with 'what is theirs' (ⲡⲉⲧⲉⲡⲱⲟⲩ) at the end of the saying.
  lexicon: Crum 327a
  alternatives:
  - what you have
  - what is yours
- source_word: ⲛⲉⲧⲛ̄ⲧⲟⲧ⳿ⲧⲏⲛⲉ
  chosen: what is in your hands
  rationale: ⲛ̄ⲧⲟⲟⲧ= is the preposition 'in the hand of, with.' The physical imagery
    of holding something in the hands is preserved here, rather than flattening it
    to 'what you have.'
  lexicon: Crum 425b
  alternatives:
  - what you have with you
- source_word: ϩⲱⲧ̂ⲧⲏⲩⲧⲛ̄
  chosen: in turn
  rationale: ϩⲱⲱ= is an enclitic pronoun meaning 'too, for one's part, in turn.' It
    emphasizes the reciprocal action of the disciples giving back.
  lexicon: Crum 653a
  alternatives:
  - for your part
  - yourselves
- source_word: ⲡⲉⲧⲉⲡⲱⲟⲩ
  chosen: what is theirs
  rationale: ⲡⲱⲟⲩ is the independent possessive pronoun 'theirs.'
  lexicon: Crum 258a
theological_decisions:
- issue: The nature of the exchange
  chosen_reading: '''what belongs to you'' and ''what is theirs'''
  rationale: The text contrasts ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ (what you possess) with ⲡⲉⲧⲉⲡⲱⲟⲩ (what
    is theirs). The translation highlights this reciprocal restoration of property,
    a common Thomasine theme of returning things to their proper origin.
  alternatives_noted:
  - what you have
drafter_notes: This saying presents a reciprocal exchange between the disciples and
  the divine messengers (angels and prophets). The translation preserves the literal
  'in your hands' to maintain the physical imagery of the exchange, while rendering
  the possessive constructions to highlight the contrast between 'what belongs to
  you' and 'what is theirs.'
