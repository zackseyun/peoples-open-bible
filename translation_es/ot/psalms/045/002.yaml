translation:
  language: es
  text: 'Mi corazón rebosa con una palabra buena[a]; yo digo: «Mi obra es para el rey[b]». Mi lengua es la pluma de un escriba hábil[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un tema agradable» o «un asunto noble». La expresión hebrea puede referirse tanto a las palabras mismas como al tema que se expresa.
    reason: alternative_reading
  - marker: b
    text: O «con respecto al rey» o «al rey». La preposición puede indicar dedicación, asunto o dirección.
    reason: alternative_reading
  - marker: c
    text: O «la pluma de un escriba presto». El adjetivo hebreo puede enfatizar la prontitud además de la destreza.
    reason: alternative_reading
lexical_decisions:
- source_word: רָחַשׁ
  english_pob_choice: overflows
  chosen_spanish: rebosa
  alternatives_spanish:
  - hierve
  - fluye
  - se derrama
  lexicon: HALOT
  rationale: Rebosa conserva la imagen de un impulso interior que se desborda hacia la expresión, sin volver el verso demasiado literal o áspero en español.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón interior
  - mi alma
  lexicon: HALOT
  rationale: Corazón es el equivalente natural para el centro de pensamiento y emoción en este contexto poético, y mantiene la imagen bíblica sin parafrasear.
- source_word: דָּבָר טוֹב
  english_pob_choice: a good word
  chosen_spanish: una palabra buena
  alternatives_spanish:
  - un tema agradable
  - un asunto noble
  - una buena palabra
  lexicon: HALOT
  rationale: La secuencia puede referirse tanto a las palabras como al tema. 'Palabra buena' mantiene la forma verbal del hebreo; en español se invierte el orden para naturalidad, sin perder la ambigüedad documentada.
- source_word: אֹמֵר אָנִי
  english_pob_choice: I say
  chosen_spanish: yo digo
  alternatives_spanish:
  - yo declaro
  - yo recito
  lexicon: HALOT
  rationale: '''Digo'' es la forma más directa y sobria para introducir la cita, fiel al hebreo sin sobredeterminación retórica.'
- source_word: מַעֲשַׂי
  english_pob_choice: my work
  chosen_spanish: mi obra
  alternatives_spanish:
  - mi trabajo
  - mi composición
  - mis hechos
  lexicon: HALOT
  rationale: En este salmo, el término apunta a lo producido o compuesto; 'obra' preserva ese sentido de una creación dedicada, sin reducirlo a 'hechos' ni imponer 'poema'.
- source_word: לְמֶלֶךְ
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - acerca del rey
  - al rey
  lexicon: HALOT
  rationale: '''Para el rey'' expresa naturalmente la dedicación o destinación del canto/obra, y deja abierta la gama semántica del ל hebreo mejor que una solución más cerrada.'
- source_word: לְשׁוֹנִי
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi habla
  - mis palabras
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del original; 'lengua' es la forma más directa y poética en español.
- source_word: עֵט
  english_pob_choice: pen
  chosen_spanish: pluma
  alternatives_spanish:
  - cálamo
  - estilete
  lexicon: HALOT
  rationale: '''Pluma'' es el equivalente moderno más natural para un instrumento de escritura, sin perder el efecto figurado del verso.'
- source_word: סוֹפֵר
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - escritor
  lexicon: HALOT
  rationale: '''Escriba'' conserva el trasfondo antiguo y profesional del término, mejor que ''escritor'', que puede sonar demasiado general.'
- source_word: מָהִיר
  english_pob_choice: skillful
  chosen_spanish: hábil
  alternatives_spanish:
  - diestro
  - rápido
  - pronto
  lexicon: HALOT
  rationale: El adjetivo puede sugerir prontitud o destreza; 'hábil' comunica bien la competencia de un escriba experto, sin forzar la idea de velocidad.
translation_notes:
  revision_awareness: Se ha seguido la lectura del texto hebreo con el mismo conjunto de ambigüedades recogidas en el audit trail inglés; no hubo revisiones aplicadas en la fuente inglesa, y el borrador español mantiene esas tensiones léxicas sin resolverlas artificialmente.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético en tres miembros.
  - Se conserva la ambigüedad de דָּבָר טוֹב mediante nota, sin cerrar el sentido a 'tema' o 'palabra'.
  - '''Para el rey'' refleja la dedicación implícita del ל sin excluir otras lecturas.'
  - '''Escriba hábil'' mantiene la metáfora de oficio y la posible idea de prontitud en nota.'
