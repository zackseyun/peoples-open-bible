translation:
  language: es
  text: Entonces toda la congregación de los hijos de Israel salió de delante de Moisés[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la asamblea» para «la congregación».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... salió
  alternatives_spanish:
  - Y ... salió
  - partió
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo. «Entonces» conserva la secuencia; «salió» expresa el sentido básico de יצא con naturalidad en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: אֵין כאן sustantivo plural explícito en español que exija «todos»; «toda» concuerda con «la congregación» y mantiene la idea de totalidad.
- source_word: עֲדַת
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: «Congregación» preserva el sentido corporativo de עֵדָה en el Pentateuco y coincide con la opción auditada del inglés POB.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la filiación literal de בנים sin aplanarla a un etnónimo más libre. En español, «hijos de Israel» es idiomático y fiel a la forma constructa.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de ante
  lexicon: HALOT
  rationale: La locución hebrea espacial se vierte con «de delante de», que conserva el valor relacional de «from before» sin recurrir a una paráfrasis excesiva.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: onomástica estándar
  rationale: Nombre propio bíblico en su forma española establecida.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no presentan revisiones textuales o de sentido que requieran ajuste adicional; se mantuvo la secuencia narrativa y la elección corporativa de עֵדָה.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como forma española estándar del nombre.
  - Se conservaron dos notas léxicas para reflejar las alternativas auditadas del inglés POB.
  - «Hijos de Israel» evita sustituir la filiación literal por el etnónimo «israelitas», respetando la preferencia documentada por la forma más cercana al hebreo.
