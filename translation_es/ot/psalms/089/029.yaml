review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: duración permanente («Para siempre»), preservación del חסד divino, y fiabilidad/fidelidad del pacto para el referente masculino singular. También conserva correctamente el referente inmediato davídico sin introducir lectura mesiánica explícita. Sin embargo, la segunda cláusula suena poco natural en español («mi pacto le permanecerá fiel»), y «pacto» es menos alineado que «alianza» con la decisión inglesa documentada sobre בְּרִית como término de pacto/alianza con peso teológico.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una construcción torpe en la segunda cláusula. «Guardaré para él mi amor leal» es comprensible, aunque «le guardaré mi amor leal» o «conservaré» podrían sonar más fluidos; no obstante, el problema principal es «mi pacto le permanecerá fiel», que no es idiomático. «Mi alianza permanecerá fiel para él» mejora algo, pero lo más natural y fiel al expediente es «mi alianza le será fiel».
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé/Mesías. En léxico clave, «amor leal» para חַסְדִּי es defendible y legible; «alianza» se ajusta mejor que «pacto» al registro bíblico amplio en español y al peso teológico de בְּרִית. La nota alternativa debe seguir reflejando «le será fiel» / «le será segura».
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «mi pacto le permanecerá fiel»'
    rationale: Aunque intenta representar el matiz de permanencia de נֶאֱמֶנֶת, en español esa combinación verbal resulta forzada y poco natural. El sentido relacional se expresa mejor con «le será fiel», que además coincide con la nota alternativa ya contemplada.
  - severity: low
    issue: «Pacto» puede sonar menos natural que «alianza» en este contexto
    rationale: Ambos son posibles para בְּרִית, pero «alianza» suele funcionar mejor en español bíblico general para la relación pactal divina y evita una resonancia más contractual o coloquial de «pacto».
  revised_spanish_text: Para siempre guardaré para él mi amor leal,[a] y mi alianza le será fiel.
  revised_footnotes:
  - marker: a
    text: 'O: «mi alianza le permanecerá fiel» o «mi alianza le será segura».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «pacto» por «alianza» para una expresión bíblica más natural en español y se corrige la segunda cláusula a «le será fiel», que preserva el valor relacional de נֶאֱמֶנֶת sin la torpeza idiomática de «le permanecerá fiel». La nota conserva las alternativas de permanencia y seguridad documentadas en el expediente inglés.
