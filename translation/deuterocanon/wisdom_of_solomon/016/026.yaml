translation:
  text: so that your children[a], whom you loved, might learn, O Lord, that it is not the produce of crops that nourishes a man[b], but your word preserves those who trust in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who believe you.' The Greek participle can denote trusting reliance or believing response.
    reason: lexical_alternative
  - marker: b
    text: 'This line likely echoes Deuteronomy 8:3: human life is sustained not merely by food but by God''s word.'
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα μάθωσιν
  chosen: so that ... might learn
  alternatives:
  - that ... may learn
  - in order that ... might know
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose; 'might learn' gives natural English while preserving the purposive force.
- source_word: οἱ υἱοί σου
  chosen: your sons
  alternatives:
  - your children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'sons.' Per gender-accurate policy, the masculine form is retained rather than neutralized to 'children.'
- source_word: οὓς ἠγάπησας
  chosen: whom you loved
  alternatives:
  - whom you have loved
  - whom you cherished
  lexicon: BDAG
  rationale: Aorist verb rendered simply as past 'loved'; this is idiomatic and preserves the direct statement of divine love without adding aspectual nuance not required in English.
- source_word: Κύριε
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Vocative address is naturally represented by 'O Lord' in elevated prayer language; 'Lord' follows the project's default for κύριος.
- source_word: οὐχ αἱ γενέσεις τῶν καρπῶν
  chosen: it is not the produce of crops
  alternatives:
  - it is not the products of fruits
  - it is not the growth of fruits
  - it is not the yield of produce
  lexicon: LSJ
  rationale: γενέσεις here refers to products/growths/yields, and καρπῶν broadly to produce/crops rather than only tree-fruit. 'Produce of crops' communicates agricultural yield in clear modern English without over-literal awkwardness.
- source_word: τρέφουσιν ἄνθρωπον
  chosen: nourishes man
  alternatives:
  - feeds a man
  - nourishes a human being
  - feeds humanity
  lexicon: BDAG
  rationale: τρέφω is 'nourish/feed.' Singular ἄνθρωπον is generic; 'man' preserves the source's gender-accurate representative usage per project policy.
- source_word: ἀλλὰ τὸ ῥῆμά σου
  chosen: but your word
  alternatives:
  - but your utterance
  - but what you say
  lexicon: BDAG
  rationale: ῥῆμα is 'word/utterance.' 'Your word' is both natural and theologically resonant, especially given the likely echo of Deut 8:3, without becoming archaic.
- source_word: τοὺς σοὶ πιστεύοντας
  chosen: those who trust in you
  alternatives:
  - those who believe you
  - those who have faith in you
  lexicon: BDAG
  rationale: πιστεύω with dative can mean trust/believe in someone. 'Trust in you' best captures personal reliance in this context and reads naturally in English.
- source_word: διατηρεῖ
  chosen: preserves
  alternatives:
  - keeps alive
  - sustains
  - maintains
  lexicon: BDAG
  rationale: διατηρέω conveys preserving/keeping safe or alive. 'Preserves' matches the contrast with physical nourishment while allowing the broader sense of sustaining life.
