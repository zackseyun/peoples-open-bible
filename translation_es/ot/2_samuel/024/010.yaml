translation:
  language: es
  text: 'Después de eso[a], el corazón de David lo golpeó[b] después de haber hecho un censo del pueblo. Y David dijo a Yahvé: «He pecado mucho en lo que he hecho. Y ahora, Yahvé, te ruego que quites la culpa[c] de tu siervo, porque he actuado muy neciamente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber contado el pueblo» o «después de haber numerado el pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: literalmente, «el corazón de David lo golpeó», expresión de convicción interior o conciencia herida.'
    reason: cultural_note
  - marker: c
    text: 'O: «la iniquidad de tu siervo». El hebreo puede referirse a iniquidad, culpa, o en ocasiones al castigo que resulta del pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ לֵב דָּוִד אֹתוֹ
  english_pob_choice: David’s heart struck him
  chosen_spanish: el corazón de David lo golpeó
  alternatives_spanish:
  - David fue golpeado en su conciencia
  - David sintió el golpe de su conciencia
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de que el corazón “golpea” a David, evitando una explicación que borre la metáfora. En español, “el corazón de David lo golpeó” mantiene la fuerza idiomática; las otras opciones interpretan más explícitamente la conciencia.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After that
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Después
  - Más tarde
  lexicon: HALOT
  rationale: Es un conector temporal simple y natural en español, equivalente al arranque narrativo del texto.
- source_word: סָפַר אֶת־הָעָם
  english_pob_choice: he had counted the people
  chosen_spanish: después de haber contado al pueblo
  alternatives_spanish:
  - después de haber numerado al pueblo
  - después de haber hecho un censo del pueblo
  lexicon: HALOT
  rationale: “Contar” es el sentido básico del verbo y evita volver el texto demasiado técnico. “Numerado” suena más literal pero menos natural; “hecho un censo” explicita el acto, pero añade interpretación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Sigo la norma del proyecto para el Tetragrámaton: el nombre divino se translitera como “Yahvé” en vez de ocultarlo con un título.'
- source_word: חָטָאתִי מְאֹד
  english_pob_choice: I have sinned greatly
  chosen_spanish: He pecado mucho
  alternatives_spanish:
  - He pecado gravemente
  - He pecado sobremanera
  lexicon: HALOT
  rationale: “He pecado mucho” reproduce la confesión con naturalidad y conserva el intensificador מְאֹד. “Gravemente” es posible, pero cambia el matiz hacia la gravedad moral más que hacia la intensidad.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: in what I have done
  chosen_spanish: en lo que he hecho
  alternatives_spanish:
  - por lo que he hecho
  - en aquello que he hecho
  lexicon: HALOT
  rationale: La cláusula relativa delimita la esfera de la culpa; “en lo que he hecho” es fiel y fluido en español.
- source_word: הַעֲבֶר נָא
  english_pob_choice: please take away
  chosen_spanish: te ruego que quites
  alternatives_spanish:
  - por favor quita
  - te suplico que apartes
  lexicon: HALOT
  rationale: El hifil de עבר comunica remover o hacer pasar. “Quites” transmite bien la petición de retirar la carga de culpa sin sonar forzado; con “te ruego” se conserva la súplica implícita de נָא.
- source_word: עֲוֺן עַבְדְּךָ
  english_pob_choice: the guilt of your servant
  chosen_spanish: la culpa de tu siervo
  alternatives_spanish:
  - la iniquidad de tu siervo
  - el pecado de tu siervo
  lexicon: HALOT
  rationale: En este contexto de confesión y petición de perdón, “culpa” expresa mejor el peso moral-relacional que David pide que sea quitado. “Iniquidad” es más literal pero menos natural; “pecado” desplaza el sustantivo hebreo hacia la acción ya confesada.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí el hablante se presenta con la fórmula reverente y convencional de dependencia ante Dios. “Siervo” es la opción española más fiel y comprensible; “esclavo” sería demasiado marcado en este contexto.
- source_word: כִּי נִסְכַּלְתִּי מְאֹד
  english_pob_choice: for I have acted very foolishly
  chosen_spanish: porque he actuado muy neciamente
  alternatives_spanish:
  - porque he sido muy necio
  - porque he hecho una locura muy grande
  lexicon: HALOT
  rationale: El verbo comunica conducta insensata o necia; “he actuado muy neciamente” conserva la idea de comportamiento, no solo de estado mental. “Neceado” se evita por ser menos idiomático; “he sido muy necio” es posible, pero menos preciso respecto de la acción.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige traducir el Tetragrámaton como “Yahvé” en el texto principal. Eso preserva el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עָוֹן en la petición de David
  english_pob_reading: the guilt of your servant
  chosen_spanish_reading: la culpa de tu siervo
  alternative_spanish_readings:
  - la iniquidad de tu siervo
  - el castigo de tu siervo
  rationale: En esta súplica, el sustantivo no apunta primero al castigo sino a la carga moral que David pide que sea removida. “Culpa” mantiene esa tensión sin fijar prematuramente un solo matiz.
  doctrine_reference: HALOT; uso contextual de עָוֹן en confesión y petición de perdón
translation_notes:
  revision_awareness: 'La revisión más reciente ajustó la secuencia para reflejar con mayor cercanía el hebreo: David fue golpeado en su corazón después de haber contado al pueblo. Esta versión en español sigue esa misma secuencia temporal y conserva las demás decisiones auditadas del texto inglés.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se conserva la metáfora del corazón que ‘golpea’ para no borrar el idiom hebreo.
  - Se usa ‘culpa’ para עָוֹן en el cuerpo del texto, con nota alternativa para ‘iniquidad’.
  - Se traduce δοῦλος implícito aquí como ‘siervo’, siguiendo la decisión auditada del contexto reverente ante Dios.
  - La secuencia temporal principal se expresa con ‘Después de eso... después de haber contado al pueblo’, coherente con la revisión del inglés auditado.
