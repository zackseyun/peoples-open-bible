source:
  edition: WLC
  text: וְ/זֹאת֙ שֵׁנִ֣ית תַּֽעֲשׂ֔וּ כַּסּ֤וֹת דִּמְעָה֙ אֶת מִזְבַּ֣ח יְהוָ֔ה בְּכִ֖י וַֽ/אֲנָקָ֑ה מֵ/אֵ֣ין ע֗וֹד פְּנוֹת֙ אֶל הַ/מִּנְחָ֔ה וְ/לָ/קַ֥חַת רָצ֖וֹן מִ/יֶּדְ/כֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/013.yaml
  text: 'And this second thing you do: you cover the altar of Yahweh with tears[a], with weeping and groaning, because he no longer regards the offering or accepts it with favor from your hand.'
  footnotes:
  - marker: a
    text: Or 'the grain offering.' The Hebrew מִנְחָה can denote a specific grain offering or, more broadly, an offering.
    reason: lexical_alternative
