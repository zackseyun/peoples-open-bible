    reason: lexical_alternative
  revision_rationale: Se reubicó y corrigió la nota [a] para que corresponda a «bestias del bosque», en línea con la alternativa léxica documentada en el audit trail. Se fortaleció רמס con «pisotea» para reflejar mejor la violencia del hebreo y del inglés POB «tramples». Se ajustó ligeramente la prosa a un español más natural con «como un león». También se hizo que la nota [b] refleje mejor la alternativa expansiva documentada (‘tears to pieces’).
