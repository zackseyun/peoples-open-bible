revisions:
- from: Porque ha despreciado la palabra de Yahvé y ha quebrantado su mandamiento[a], esa persona[b] ciertamente será cortada; su culpa[c] quedará sobre él.
  to: Porque ha despreciado[a] la palabra de Yahvé y ha quebrantado su mandamiento, esa persona[b] ciertamente será cortada[c]; su culpa[d] quedará sobre él.
  rationale: 'Se requiere una reparación menor: reubicar la nota alternativa de «ha despreciado» al segmento correcto y añadir la nota cultural para «ciertamente será cortada», en consonancia con el audit trail inglés y con la política de preservar alternativas significativas e idiomatismos judiciales. El texto base español es sustancialmente fiel, por lo que no hace falta una reescritura mayor.'
