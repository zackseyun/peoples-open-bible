translation:
  language: es
  text: 'Y dijo Manoa a su esposa[a]: «Ciertamente moriremos, porque hemos visto a Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dios» o «un ser divino». El hebreo אֱלֹהִים puede referirse en algunos contextos de modo más amplio a un ser divino, pero aquí el contexto favorece «Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Así dijo
  lexicon: HALOT
  rationale: La forma narrativa consecutiva se expresa con un simple enlace natural en español. «Y dijo» preserva el fluir del relato sin añadir una inferencia temporal o discursiva más fuerte de la que exige el hebreo.
- source_word: מָנוֹחַ
  english_pob_choice: Manoah
  chosen_spanish: Manoaj
  alternatives_spanish:
  - Manoa
  - Manoah
  lexicon: Transliteración onomástica
  rationale: Se adapta el nombre propio a la ortografía española común con ajuste fonético leve, manteniendo identificable la forma hebrea y evitando una grafía demasiado anglicada.
- source_word: אֶל אִשְׁתּוֹ
  english_pob_choice: to his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  - a su esposa
  lexicon: HALOT
  rationale: La expresión es relacional e idiomática; «esposa» es la equivalencia clara y digna en español. Se evita «mujer» por posible ambigüedad o tono menos preciso en este contexto.
- source_word: מוֹת נָמוּת
  english_pob_choice: We will surely die
  chosen_spanish: ¡Ciertamente moriremos!
  alternatives_spanish:
  - Sin duda moriremos
  - Moriremos, ciertamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la certeza. «Ciertamente moriremos» preserva el énfasis sin sobrerrepresentarlo con una perífrasis más pesada; la exclamación refleja el tono angustiado de Manoaj.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la conclusión de Manoaj; «porque» es la opción causal más directa y natural en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - un ser divino
  lexicon: HALOT
  rationale: Se conserva «Dios» porque el contexto narrativo favorece la lectura del encuentro como una experiencia con el Dios de Israel. No se atenúa la afirmación con una paráfrasis más vaga.
- source_word: רָאִינוּ
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  - hemos contemplado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera natural con pretérito perfecto compuesto en español, manteniendo la relevancia inmediata de la experiencia para el temor expresado.
theological_decisions:
- issue: Lectura de אֱלֹהִים en la exclamación de Manoaj
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - un ser divino
  rationale: 'La escena de Jueces 13 mantiene una tensión teológica deliberada: Manoaj interpreta la aparición como un encuentro con Dios y teme morir por ello. Traducir «Dios» preserva esa fuerza y no resuelve prematuramente la identidad del mensajero.'
  doctrine_reference: Mantener la tensión narrativa y teológica del texto; primacía del sentido del original sobre una neutralización interpretativa.
translation_notes:
  revision_awareness: El texto base inglés no muestra cambios de revisión ni variantes textuales relevantes; se sigue el mismo juicio auditado respecto de אֱלֹהִים y de la intensificación verbal de מוֹת נָמוּת.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al contexto y al juicio auditado.
  - Se conserva el énfasis de certeza de מוֹת נָמוּת con «ciertamente moriremos».
  - El registro es bíblico, claro y apto para lectura pública, sin calcos innecesarios.
