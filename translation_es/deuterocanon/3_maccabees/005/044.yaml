translation:
  language: es
  text: Entonces, los amigos y parientes, llenos de alegría, con fe[a], apostaban las fuerzas en los lugares más adecuados de la ciudad para la guardia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fielmente» o «con confianza». El griego dice μετὰ πίστεως, literalmente «con fe», y puede describir tanto su confianza como la manera fiel de su actuación.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιχαρεῖς
  english_pob_choice: overjoyed
  chosen_spanish: llenos de alegría
  alternatives_spanish:
  - sumamente gozosos
  - desbordados de alegría
  lexicon: LSJ
  rationale: El adjetivo intensifica la alegría; «llenos de alegría» comunica ese énfasis de manera natural en español sin perder solemnidad.
- source_word: ἀναλύσαντες
  english_pob_choice: having regained confidence
  chosen_spanish: habiendo recobrado la confianza
  alternatives_spanish:
  - habiendo recuperado la confianza
  - habiendo partido
  - habiendo levantado el campamento
  lexicon: LSJ
  rationale: En este contexto la revisión inglesa favorece un sentido de restablecimiento interior más que de mera salida física. «Recobrado la confianza» sigue esa lectura y evita imponer un matiz militar no asegurado por el griego.
- source_word: οἱ φίλοι καὶ συγγενεῖς
  english_pob_choice: the friends and relatives
  chosen_spanish: los amigos y parientes
  alternatives_spanish:
  - los amigos y los familiares
  - los amigos y los parientes
  lexicon: LSJ
  rationale: Se preservan los dos grupos sociales nombrados por el griego con un español claro y no arcaizante.
- source_word: μετὰ πίστεως
  english_pob_choice: with faith
  chosen_spanish: la confianza
  alternatives_spanish:
  - la fe
  - la fidelidad
  - la confianza
  lexicon: LSJ
  rationale: La redacción española incorpora el valor adverbial que la revisión inglesa consideró más natural en contexto. «Confianza» refleja bien el posible sentido de πίστις aquí, sin forzar un uso puramente doctrinal en el flujo narrativo.
- source_word: διέτασσον
  english_pob_choice: stationed
  chosen_spanish: colocaban
  alternatives_spanish:
  - apostaban
  - estacionaban
  - disponían
  lexicon: LSJ
  rationale: El verbo expresa ordenar o disponer fuerzas en posiciones concretas. «Colocaban» conserva la idea de distribución organizada con un español fluido.
- source_word: τὰς δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - las tropas
  - los guardias
  lexicon: LSJ
  rationale: «Fuerzas» mantiene amplitud semántica y se ajusta al contexto de seguridad/defensa sin especificar más de lo que el griego dice.
- source_word: ἐπὶ τοὺς εὐκαιροτάτους τόπους
  english_pob_choice: in the most suitable places
  chosen_spanish: en los lugares más adecuados
  alternatives_spanish:
  - en los lugares más estratégicos
  - en los sitios más oportunos
  lexicon: LSJ
  rationale: «Más adecuados» reproduce el superlativo de conveniencia o idoneidad sin introducir una tecnicidad estratégica que el griego no exige.
- source_word: πρὸς τὴν τήρησιν
  english_pob_choice: for guard duty
  chosen_spanish: para la guardia
  alternatives_spanish:
  - para vigilar
  - para el resguardo
  - para hacer guardia
  lexicon: LSJ
  rationale: La frase expresa finalidad de vigilancia/guarda. «Para la guardia» es idiomático y suficientemente preciso en español.
theological_decisions:
- issue: Renderización de πίστις en μετὰ πίστεως
  english_pob_reading: with faith
  chosen_spanish_reading: habiendo recobrado la confianza
  alternative_spanish_readings:
  - con fe
  - fielmente
  - con confianza
  rationale: La tradición de POB mantiene «fe» como base léxica, pero la revisión inglesa reconoce que en este contexto la idea puede ser de confianza recobrada más que de un contenido doctrinal explícito. La traducción española sigue esa decisión revisada, conservando la tensión semántica sin ocultarla.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se aleja de una lectura puramente literal de ἀναλύσαντες como simple «partida» y adopta el sentido contextual de confianza recobrada. También integra el valor adverbial de μετὰ πίστεως en una forma española más natural, sin perder la nota léxica en pie de página.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Fe» se conserva en la nota para reflejar la tensión léxica de πίστις, mientras el cuerpo del texto privilegia la naturalidad contextual.
  - «Las fuerzas» mantiene el término amplio del griego sin convertirlo en un tecnicismo militar más específico.
