  rationale: Se corrigió la concordancia verbal a plural para reflejar ἐξήλθοσαν de manera natural en español. Se sustituyó «hacia las alturas» por «hacia las subidas» para preservar mejor el sentido literal de ἀναβάσεις sin sobreinterpretar. Se mantuvo «despuntó el alba» y la exhibición «desde el muro» como opciones fieles y legibles; la nota relevante se trasladó al punto donde sí existe una alternativa significativa en español.
