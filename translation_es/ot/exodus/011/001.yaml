translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Traeré una plaga más[a] sobre Faraón y sobre Egipto. Después de eso, él los enviará fuera de aquí. Cuando los envíe fuera[b], ciertamente los expulsará por completo de aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «golpe», «azote» o «aflicción» por «plaga».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «ciertamente los expulsará» es enfática; literalmente, «expulsando, los expulsará».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el Nombre divino explícito; en español se mantiene como «Yahvé» para preservar el nombre propio y no sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa encadena la acción; «Entonces» conserva el avance secuencial de la waw-consecutiva con español natural.
- source_word: עוֹד נֶגַע אֶחָד
  english_pob_choice: One more plague
  chosen_spanish: Una plaga más
  alternatives_spanish:
  - Un golpe más
  - Una aflicción más
  lexicon: HALOT
  rationale: «נֶגַע» aquí designa el juicio final sobre Egipto; «plaga» es la equivalencia contextual más clara en español, sin perder la idea de un golpe o aflicción.
- source_word: אָבִיא
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - haré venir
  - yo traeré
  lexicon: HALOT
  rationale: El Hifil de בוא expresa traer sobre alguien; «traeré» reproduce bien la dirección del juicio sobre Faraón y Egipto.
- source_word: עַל פַּרְעֹה וְעַל מִצְרַיִם
  english_pob_choice: upon Pharaoh and upon Egypt
  chosen_spanish: sobre Faraón y sobre Egipto
  alternatives_spanish:
  - contra Faraón y contra Egipto
  - sobre Faraón y Egipto
  lexicon: HALOT
  rationale: «Sobre» conserva el sentido de peso/venida del juicio sin cambiarlo a una oposición más interpretativa como «contra».
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After that
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Después
  - Más tarde
  lexicon: HALOT
  rationale: Expresa con naturalidad la secuencia temporal inmediata del hebreo.
- source_word: יְשַׁלַּח אֶתְכֶם מִזֶּה
  english_pob_choice: he will send you away from here
  chosen_spanish: él los dejará ir de aquí
  alternatives_spanish:
  - él los enviará lejos de aquí
  - él los mandará salir de aquí
  lexicon: HALOT
  rationale: En contexto, שׁלח significa dejar ir/soltar con fuerza de expulsión; «los dejará ir» es idiomático en español y corresponde al primer paso del paralelismo.
- source_word: כְּשַׁלְּחוֹ
  english_pob_choice: When he sends you away
  chosen_spanish: Cuando los deje ir
  alternatives_spanish:
  - Cuando los envíe
  - Al dejarlos ir
  lexicon: HALOT
  rationale: Se mantiene el valor temporal de כ. El verbo se alinea con la cláusula anterior para evitar una repetición rígida que suene forzada en español.
- source_word: כָּלָה
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - del todo
  - totalmente
  lexicon: HALOT
  rationale: Adverbio intensivo que refuerza la expulsión total; «por completo» es claro y natural.
- source_word: גָּרֵשׁ יְגָרֵשׁ
  english_pob_choice: he will surely drive you out
  chosen_spanish: ciertamente los expulsará
  alternatives_spanish:
  - los echará con fuerza
  - los expulsará del todo
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la acción. «Expulsará» conserva el valor de גרש como echar fuera, y «ciertamente» comunica la fuerza enfática en español.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: Referencia deíctica natural en español; mantiene el punto de salida sin añadir interpretación geográfica adicional.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de preservar el Nombre propio del pacto como «Yahvé», evitando la sustitución por un título genérico o una forma tradicional menos transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés; no se registraron revisiones pendientes en la última pasada y el control cruzado informó alto acuerdo. La redacción española conserva el paralelismo y la intensificación final con una solución idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, en línea con la terminología del proyecto.
  - Se usa «plaga» para נֶגַע por claridad contextual en Éxodo.
  - 'Se traduce שׁלח con dos matices coherentes: «dejar ir» en la primera cláusula y «dejar ir» con nota de intensidad en la segunda, para reflejar el avance hacia la expulsión.'
  - «Expulsará» se usa para גרשׁ, preservando el sentido fuerte de echar fuera.
  - «Por completo» y «ciertamente» distribuyen el énfasis de כָּלָה + infinitivo absoluto + imperfecto.
