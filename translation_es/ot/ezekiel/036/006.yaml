revisions:
- from: 'Por tanto, profetiza contra la tierra de Israel[a], y di a los montes y a las colinas, a los barrancos y a los valles: «Así ha dicho Adonai Yahvé: He aquí, he hablado en mi celo y en mi ira[b], porque han llevado la vergüenza de las naciones».'
  to: 'Por tanto, profetiza acerca de la tierra de Israel, y di a los montes y a las colinas, a los barrancos y a los valles: «Así dice el Señor Yahvé: He aquí, he hablado en mis celos[a] y en mi ira, porque ustedes han llevado la vergüenza de las naciones[b]».'
  rationale: 'La revisión corrige el sentido de עַל como ''acerca de/sobre'' en vez de ''contra'', restaura la segunda persona plural de נְשָׂאתֶם con ''ustedes han llevado'', y mejora la naturalidad eclesial de אֲדֹנָי יְהוִה con ''el Señor Yahvé'' sin ocultar el nombre divino. También reordena las notas para que correspondan exactamente a los puntos léxicos preservados por la auditoría: קִנְאָה y כְּלִמַּת גּוֹיִם.'
