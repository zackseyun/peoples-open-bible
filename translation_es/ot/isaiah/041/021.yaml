translation:
  language: es
  text: «Presenten su causa», dice Yahvé[a]; «traigan sus argumentos sólidos[b]», dice el Rey de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «acerquen su causa/litigio». La expresión es una convocatoria legal; «Presenten su causa» comunica el sentido de tribunal.'
    reason: lexical_alternative
  - marker: b
    text: O «sus razones de peso», «sus pruebas» o «sus defensas».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבוּ
  english_pob_choice: Present
  chosen_spanish: Presenten
  alternatives_spanish:
  - Acérquense
  - Traigan
  lexicon: HALOT
  rationale: El imperativo de קרב puede ser literalmente 'acercarse' o 'traer cerca', pero en este reto forense el español 'presenten' comunica de manera natural la invitación a exponer un caso ante un tribunal.
- source_word: רִיבְכֶם
  english_pob_choice: your case
  chosen_spanish: su causa
  alternatives_spanish:
  - su caso
  - su pleito
  - su disputa
  lexicon: HALOT
  rationale: רִיב tiene aquí sentido jurídico de disputa o litigio. 'Causa' funciona bien en español jurídico y mantiene el matiz de asunto contencioso sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se usa 'Yahvé' como forma española estable para el nombre divino, siguiendo el principio del proyecto de no sustituir el Nombre por un título y reflejar el tetragrámaton.
- source_word: הַגִּישׁוּ
  english_pob_choice: bring forward
  chosen_spanish: traigan
  alternatives_spanish:
  - presenten
  - acerquen
  lexicon: HALOT
  rationale: El hifil de נגשׁ tiene el sentido de hacer acercar o presentar. 'Traigan' conserva la acción de poner algo delante en un contexto de debate legal.
- source_word: עֲצֻמֹתֵיכֶם
  english_pob_choice: strong arguments
  chosen_spanish: fuertes argumentos
  alternatives_spanish:
  - fuertes razones
  - pruebas sólidas
  - defensas fuertes
  lexicon: HALOT
  rationale: El hebreo no habla de fuerza física, sino de argumentos robustos o sólidos. 'Fuertes argumentos' reproduce bien esa fuerza retórica y mantiene la tensión del original.
- source_word: יֹאמַר מֶלֶךְ יַעֲקֹב
  english_pob_choice: says the King of Jacob
  chosen_spanish: dice el Rey de Jacob
  alternatives_spanish:
  - dice el Rey de Jacob
  - declara el Rey de Jacob
  lexicon: HALOT
  rationale: Se conserva la fórmula profética 'dice' y el título 'Rey de Jacob' sin suavizarlo a una expresión posesiva; así se preserva la resonancia pactal del hebreo.
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La decisión sigue el criterio doctrinal del proyecto de transparentar el Nombre divino. 'Yahvé' es la forma española más reconocible y natural para el tetragrámaton en un texto bíblico público.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Marco forense de desafío divino
  english_pob_reading: Present your case ... bring forward your strong arguments
  chosen_spanish_reading: Presenten su causa ... traigan sus fuertes argumentos
  alternative_spanish_readings:
  - Acérquense a su disputa ... traigan sus fuertes razones
  - Presenten su pleito ... traigan sus defensas sólidas
  rationale: El versículo forma parte de una convocatoria judicial contra los ídolos y sus defensores. Se explicita el sentido forense en español sin abandonar la estructura del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source text''s plain sense'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del auditor inglés, que intensificó 'arguments' a 'strong arguments'. En español se reflejó esa intensificación con 'fuertes argumentos', manteniendo el tono formal y el paralelismo del verso.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para el tetragrámaton y se usó 'Yahvé' según la terminología del proyecto.
  - Se conservó 'Rey de Jacob' en vez de suavizar a una posesión posesiva ('el rey de Jacob' en sentido interpretativo) para respetar la forma hebrea.
  - '''Causa'' se eligió por su naturalidad jurídica en español, equivalente funcional de ריב en este contexto.'
