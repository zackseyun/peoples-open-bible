  yaml_path: translation/ot/1_samuel/007/011.yaml
  text: Then the men of Israel went out from Mizpah[a], pursued the Philistines[b], and struck them down as far as below Beth-car.
  footnotes:
  - marker: a
    text: Or 'and defeated them as far as below Beth-car.' The Hebrew verb can denote striking in battle with the sense of defeat, not only physical blows.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'below Beth-car,' likely indicating a point lower in elevation than Beth-car.
    reason: cultural_note
