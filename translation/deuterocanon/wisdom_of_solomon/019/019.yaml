theological_decisions:
- issue: Nature of the described change in creation
  chosen_reading: Render the verse as describing a reversal or exchange of creaturely habitats without specifying a mechanism beyond the text.
  alternative_readings:
  - Literal metamorphosis of species
  - Phenomenological description of creatures behaving contrary to nature
  rationale: The Greek states that land creatures were changed into water creatures and swimming creatures moved onto land. The translation preserves the text's imagery and tension without importing a more precise natural or allegorical explanation than the verse itself provides.
