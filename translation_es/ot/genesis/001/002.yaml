translation:
  language: es
  text: Ahora la tierra estaba sin forma y vacía, y las tinieblas estaban sobre la superficie del abismo, y el Espíritu[a] de Dios se cernía sobre la superficie de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento de Dios» o «el viento de Dios» se cernía sobre la superficie de las aguas.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָאָרֶץ
  english_pob_choice: Now the earth
  chosen_spanish: Ahora la tierra
  alternatives_spanish:
  - Y la tierra
  lexicon: HALOT
  rationale: El hebreo introduce la escena con ו seguida de הָאָרֶץ. En español, «Ahora» funciona como marcador narrativo natural de apertura de escena, equivalente al valor discursivo que el POB inglés dio con «Now», sin perder la continuidad con lo anterior. «La tierra» refleja directamente אָרֶץ en este contexto cosmogónico.
- source_word: הָיְתָה
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - fue
  - llegó a estar
  lexicon: HALOT
  rationale: El perfecto de היה aquí funciona como estado descriptivo. «Estaba» preserva el valor estativo que el POB inglés resolvió con «was» y evita una lectura de cambio de estado que el hebreo no exige.
- source_word: תֹהוּ וָבֹהוּ
  english_pob_choice: formless and empty
  chosen_spanish: desordenada y vacía
  alternatives_spanish:
  - sin forma y vacía
  - desolada y vacía
  lexicon: HALOT
  rationale: La pareja תֹהוּ וָבֹהוּ expresa una condición de desorden, inanidad o falta de configuración. «Desordenada y vacía» mantiene la doble idea en un español natural y digno; «sin forma y vacía» es posible, pero suena más calcado y menos idiomático. Se evita fijar innecesariamente una sola metáfora tradicional si el hebreo permite una gama semántica amplia.
- source_word: וְחֹשֶׁךְ
  english_pob_choice: and darkness
  chosen_spanish: y las tinieblas
  alternatives_spanish:
  - y la oscuridad
  lexicon: HALOT
  rationale: El sustantivo es חֹשֶׁךְ, «tinieblas/oscuridad». Se eligió el plural solemne «tinieblas» para una cadencia bíblica clara, sin alterar el sentido básico de oscuridad del texto.
- source_word: עַל־פְּנֵי
  english_pob_choice: over the surface of
  chosen_spanish: cubrían la superficie de
  alternatives_spanish:
  - sobre la superficie de
  - estaban sobre la superficie de
  lexicon: HALOT
  rationale: El hebreo usa la locución espacial «sobre la faz/superficie de». En español, «cubrían la superficie de» traduce el efecto visual de manera natural y conserva la imagen espacial sin recurrir a «la faz», que suena más arcaica.
- source_word: תְהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - el profundo
  - las aguas profundas
  lexicon: HALOT
  rationale: תְהוֹם designa el océano primordial, el abismo acuático. «Abismo» preserva la fuerza cósmica y la densidad semántica del término; «las aguas profundas» explicita el referente, pero pierde algo del carácter singular del hebreo.
- source_word: וְרוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - un viento de Dios
  - el viento de Dios
  lexicon: HALOT
  rationale: רוּחַ puede significar «espíritu», «viento» o «aliento». El texto principal adopta «Espíritu de Dios», como hizo el POB inglés, pero se conserva la ambigüedad reconocida por la nota al pie. En español, «Espíritu» mantiene la lectura personal/divina sin cerrar la otra posibilidad.
- source_word: מְרַחֶפֶת
  english_pob_choice: was hovering
  chosen_spanish: se movía
  alternatives_spanish:
  - aleteaba
  - planeaba
  lexicon: HALOT
  rationale: El participio expresa una acción continua. «Se movía» es una solución amplia y sobria que comunica actividad sostenida sin forzar una imagen demasiado específica. «Planeaba» o «aleteaba» podrían sugerir matices más restringidos que el hebreo no obliga a tomar como exclusivos.
- source_word: הַמָּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se conserva como plural en español. «Las aguas» coincide con la imaginería cósmica del pasaje y con la decisión del POB inglés de mantener el plural.
theological_decisions:
- issue: ¿Debe הָיְתָה entenderse como estado descriptivo o como cambio de estado?
  english_pob_reading: was
  chosen_spanish_reading: estaba
  alternative_spanish_readings:
  - llegó a estar
  - se volvió
  rationale: La escena describe la condición de la tierra en este punto del relato. «Estaba» preserva el sentido estativo y evita introducir una reconstrucción teológica o cosmogónica de cambio de estado que el hebreo no requiere.
  doctrine_reference: Prioridad del lenguaje original sobre lecturas doctrinales importadas; no añadir afirmaciones que el texto no explicita.
- issue: ¿וְרוּחַ אֱלֹהִים debe traducirse como el Espíritu de Dios o como un viento de Dios?
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - un viento de Dios
  - el viento de Dios
  rationale: El hebreo es genuinamente ambiguo. Se mantiene la lectura fuerte «Espíritu de Dios» en el texto principal, siguiendo el POB inglés, pero sin borrar la alternativa meteorológica/cosmológica, que permanece en nota para preservar la tensión interpretativa.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: El borrador se alinea con la última revisión marcada como sin cambios y con el veredicto de alta concordancia del control cruzado. No se registraron revisiones aplicadas posteriores, por lo que se mantiene la solución principal del POB inglés y su nota de ambigüedad para רוּחַ אֱלֹהִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva el plural «las aguas» para reflejar el hebreo.
  - Se evita «SEÑOR» porque aquí no aparece יהוה; el problema lexical central es רוּחַ אֱלֹהִים.
  - La opción «desordenada y vacía» busca una equivalencia natural sin imponer la fórmula tradicional «sin forma y vacía» como si fuera obligatoria.
  - La nota al pie se ancla en la frase «Espíritu de Dios» para preservar la ambigüedad señalada por el POB inglés.
