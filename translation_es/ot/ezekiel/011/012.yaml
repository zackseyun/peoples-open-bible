review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo: resultado profético (''Entonces sabrán''), nombre divino ''Yahvé'', contraste entre no seguir los estatutos/juicios de Yahvé y actuar según los de las naciones circundantes. También preserva la repetición de מִשְׁפָּט en ambas cláusulas y la nota léxica alternativa sobre ''prácticas/costumbres''. Sin embargo, la sintaxis española puede ajustarse para reflejar mejor el relativo hebreo (''mis estatutos / mis juicios'') sin la construcción algo rígida ''en cuyos... y cuyos...''.'
  spanish_quality_summary: El texto es comprensible y digno, pero 'en cuyos estatutos no anduvieron, y cuyos juicios no cumplieron' suena algo forzado en español contemporáneo. Una redacción con 'mis' mejora la naturalidad y la claridad sin perder fidelidad. También conviene cambiar el punto y coma antes de 'sino que' por coma, ya que la estructura adversativa funciona mejor así en español bíblico fluido.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה -> ''Yahvé''; חֻקִּים -> ''estatutos''; מִשְׁפָּטִים -> ''juicios''. La conservación de ''juicios'' en ambas ocurrencias sigue la decisión inglesa y la nota preserva la alternativa contextual ''prácticas/costumbres''. No hay conflicto teológico relevante.'
  issues:
  - severity: medium
    issue: Construcción relativa 'en cuyos... y cuyos...' poco natural en español
    rationale: Aunque posible, esta formulación suena rígida y menos clara que 'en mis estatutos... mis juicios...' para un lector hispano general. El hebreo permite una traducción más directa y natural sin pérdida semántica.
  - severity: low
    issue: Puntuación antes de 'sino que'
    rationale: El punto y coma no es incorrecto, pero una coma enlaza mejor el contraste dentro de una misma oración y mejora el flujo.
