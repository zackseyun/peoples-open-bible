translation:
  language: es
  text: Por tanto, guardarán todos mis estatutos y todas mis ordenanzas[a], y los pondrán por obra. Yo, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «mis decretos» para «mis estatutos», y «mis juicios», «mis reglas» o «mis ordenanzas» para «mis ordenanzas». El hebreo usa dos términos legales distintos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  english_pob_choice: So you shall keep
  chosen_spanish: Así que ustedes guardarán
  alternatives_spanish:
  - Y ustedes guardarán
  - Por tanto, ustedes guardarán
  - Así ustedes guardarán
  lexicon: HALOT
  rationale: שׁמר en contexto legal y de pacto tiene el sentido de guardar/observar. «Guardarán» mantiene esa fuerza y suena natural en español. «Así que» reproduce el valor conclusivo del hebreo al cerrar la sección.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» conserva el valor jurídico de חֻקֹּת y distingue este término del siguiente par de palabras legales.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  - mis decisiones legales
  lexicon: HALOT
  rationale: «Juicios» refleja la raíz de מִשְׁפָּט y mantiene la distinción lexical con חֻקֹּת. Aunque «reglas» sería más coloquial, «juicios» preserva mejor el registro legal del pasaje.
- source_word: וַ/עֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los cumplirán
  alternatives_spanish:
  - y los harán
  - y los practicarán
  - y los pondrán por obra
  lexicon: HALOT
  rationale: עָשָׂה aplicado a mandatos legales puede expresar hacer/cumplir/poner por obra. «Cumplirán» transmite bien la obediencia efectiva en español sin perder la idea de ejecución concreta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción debe conservar el nombre divino y no sustituirlo por un título genérico. «Yahvé» es la forma preferida del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre חֻקֹּתַי y מִשְׁפָּטַי
  english_pob_reading: my statutes / my judgments
  chosen_spanish_reading: mis estatutos / mis juicios
  alternative_spanish_readings:
  - mis decretos / mis ordenanzas
  - mis estatutos / mis reglas
  rationale: Se preserva la distinción lexical entre los dos términos legales hebreos. En español, «estatutos» y «juicios» mantienen la diferencia sin borrar la tensión semántica que el texto presenta.
  doctrine_reference: 'HALOT lexical distinction: חֻקִּים vs. מִשְׁפָּטִים'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción conserva la fuerza legal del hebreo, la forma conclusiva del verso y el nombre divino según el criterio auditado de POB.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se preservó la distinción entre dos términos legales hebreos mediante «estatutos» y «juicios».
  - Se evitó el calco rígido «hacerlos» y se optó por «cumplirlos» para naturalidad bíblica en español.
  - El conector inicial «Así que» refleja el cierre conclusivo del versículo en su ubicación final del capítulo.
