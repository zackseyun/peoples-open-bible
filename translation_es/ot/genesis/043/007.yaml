    text: 'Hebreo: “según/conforme a estas palabras”, es decir, en línea con lo que él había preguntado.'
    reason: lexical_alternative
  revision_rationale: Se movió la nota al sintagma que realmente explica (‘conforme a estas palabras’), se ajustó la pregunta retórica final para reflejar mejor la fuerza del hebreo y del audit trail inglés sin sobretraducir con ‘cómo’, y se suavizó ‘Así le contamos’ a ‘Así le dijimos’ para mayor naturalidad contextual en español.
