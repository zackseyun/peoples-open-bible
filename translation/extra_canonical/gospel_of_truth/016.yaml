  lexicon: Crum
  rationale: In Gospel of Truth, teleiotic language emphasizes completion; “complete”
    fits English semantics without over-theologizing.
- source_word: ⲥⲡⲉⲣⲙⲁ
  chosen: seed
  alternatives:
