  text: לָ֤/מָּה צַּ֨מְנוּ֙ וְ/לֹ֣א רָאִ֔יתָ עִנִּ֥ינוּ נַפְשֵׁ֖/נוּ וְ/לֹ֣א תֵדָ֑ע הֵ֣ן בְּ/י֤וֹם צֹֽמְ/כֶם֙ תִּמְצְאוּ חֵ֔פֶץ וְ/כָל עַצְּבֵי/כֶ֖ם תִּנְגֹּֽשׂוּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/058/003.yaml
  text: Why have we fasted[a], and you have not seen? Why have we humbled ourselves, and you do not know it? Behold, on the day of your fast you find your own pleasure[c][b], and you oppress all your laborers.
  footnotes:
  - marker: a
    text: Or 'have we afflicted ourselves' or 'have we denied ourselves?' Literally, 'have we afflicted our soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you find pleasure,' 'you seek your own desire,' or possibly 'you pursue your own business.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you oppress all your workers' or 'you exact all your labors/tasks.' The Hebrew may refer either to laborers or to the labor exacted from them.
    reason: lexical_alternative
