translation:
  language: es
  text: 'Y Ana oró y dijo: «Mi corazón se regocija en Yahvé; mi cuerno[a] se alza en alto en Yahvé. Mi boca se abre ampliamente contra mis enemigos[b], porque me alegro en tu salvación[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «mi cuerno», metáfora de fuerza, honra o estatus exaltado.
    reason: cultural_note
  - marker: b
    text: O «mi boca se jacta sobre mis enemigos» / «hablo con valentía contra mis enemigos». El hebreo literalmente dice «mi boca se abre ampliamente contra mis enemigos».
    reason: lexical_alternative
  - marker: c
    text: O «liberación». El término hebreo puede referirse a salvación en sentido amplio o a rescate concreto de la angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró con fervor
  - hizo oración
  lexicon: HALOT
  rationale: El verbo hitpael de פלל expresa ‘orar’/‘hacer oración’. En español, ‘oró’ es natural, solemne y fiel al valor narrativo de una oración pronunciada.
- source_word: וַתֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - dijo en oración
  lexicon: HALOT
  rationale: El hebreo usa el verbo común ‘decir’; aunque el contenido es poético, no hay un verbo específico para ‘cantar’. ‘Dijo’ conserva esa forma simple y directa.
- source_word: עָלַץ לִבִּי
  english_pob_choice: My heart exults
  chosen_spanish: Mi corazón se exulta
  alternatives_spanish:
  - Mi corazón se alegra
  - Mi corazón triunfa
  lexicon: HALOT
  rationale: עָלַץ expresa gozo jubiloso, exultación. ‘Se exulta’ mantiene el tono elevado y poético sin reducirlo a un mero ‘alegrarse’.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - por Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la terminología del proyecto. ‘En Yahvé’ refleja la esfera o base del gozo, como en el hebreo.
- source_word: רָמָה קַרְנִי
  english_pob_choice: my horn is lifted high
  chosen_spanish: mi cuerno es levantado
  alternatives_spanish:
  - mi cuerno es exaltado
  - mi fuerza es levantada
  lexicon: HALOT
  rationale: ‘Cuerno’ preserva la metáfora hebrea de fuerza, honor o estatus exaltado. ‘Es levantado’ sigue de cerca la imagen verbal sin explicarla en el texto principal.
- source_word: רָחַב פִּי
  english_pob_choice: My mouth is opened wide
  chosen_spanish: mi boca se ensancha
  alternatives_spanish:
  - mi boca se abre ampliamente
  - mi boca habla con soltura
  lexicon: HALOT
  rationale: El hebreo expresa literalmente una boca ‘anchada/ensanchada’. ‘Se ensancha’ conserva la imagen corporal y la fuerza poética mejor que una paráfrasis interpretativa.
- source_word: עַל אֹיְבַי
  english_pob_choice: against my enemies
  chosen_spanish: contra mis enemigos
  alternatives_spanish:
  - sobre mis enemigos
  - ante mis enemigos
  lexicon: HALOT
  rationale: ‘Contra’ comunica bien la orientación hostil o desafiante del giro hebreo, manteniendo la tensión del original.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la exultación. ‘Porque’ es natural en español y conserva la relación causal.
- source_word: שָׂמַחְתִּי
  english_pob_choice: I rejoice
  chosen_spanish: me alegro
  alternatives_spanish:
  - me gozo
  - me regocijo
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar un estado resultante o una acción poética actual. ‘Me alegro’ es claro en español y compatible con el tono de alabanza.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: in your salvation
  chosen_spanish: en tu salvación
  alternatives_spanish:
  - en tu liberación
  - en tu rescate
  lexicon: HALOT
  rationale: ישועה puede significar salvación o liberación. ‘Salvación’ conserva el alcance teológico amplio que el POB inglés preserva.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se traslada al español como ‘Yahvé’, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje; el último control indicó concordancia alta y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de acuerdo con la política del proyecto.
  - Se conserva la metáfora de «cuerno» en el texto principal y se explica en nota.
  - «Se ensancha» reproduce la imagen hebrea de boca abierta/anchada sin perder la posibilidad de lectura alternativa.
  - «Salvación» preserva el rango semántico amplio de ישועה, con ‘liberación’ ofrecida en nota.
  - La puntuación y las comillas se ajustan al uso editorial español.
