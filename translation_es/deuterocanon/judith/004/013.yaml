    text: O «cilicio». El griego usa la imagen de una tela de duelo o penitencia; «saco» conserva con más literalidad el objeto material.
    reason: lexical_alternative
  - marker: b
    text: O «causa de regocijo para las naciones»; el sentido puede ser de júbilo hostil o triunfo de los pueblos sobre ellos.
    reason: lexical_alternative
  revision_rationale: 'Ajusté solo lo necesario para mejorar la naturalidad española sin perder el paralelismo ni la fuerza del griego: cambié «para que no entregara» por «que no entregara» como contenido de la súplica; «sus pequeños hijos para saqueo» por «sus pequeños al saqueo» para una construcción más idiomática; y «a sus mujeres para botín» por «a sus mujeres como botín», que expresa mejor προνομή en español. También regularicé la serie paralela con «ni ... ni ... ni ... ni ...».'
