translation:
  language: es
  text: el que no escucha la voz de los encantadores[a][b], de quien recita conjuros con habilidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sonido de los susurradores». El término hebreo detrás de «encantadores» se relaciona con susurrar o recitar una incantación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «unidor de conjuros/encantamientos, hábil». La expresión hebrea es idiomática para un encantador o conjurador experto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִשְׁמַע
  english_pob_choice: does not listen
  chosen_spanish: no escucha
  alternatives_spanish:
  - no oye
  - no presta atención
  lexicon: שׁמע
  rationale: En este símil poético, el hebreo expresa una negativa de respuesta atenta, no solo de percepción auditiva. «No escucha» conserva esa idea relacional y responde bien al contexto de la serpiente encantada que no atiende a los encantadores.
- source_word: לְקוֹל
  english_pob_choice: to the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: קול
  rationale: «Qol» puede ser «voz» o «sonido». Mantengo «voz» porque el contexto inmediato incluye agentes que murmuran o pronuncian fórmulas; en español suena natural y preserva la relación con la palabra hablada.
- source_word: מְלַחֲשִׁים
  english_pob_choice: charmers
  chosen_spanish: hechiceros
  alternatives_spanish:
  - murmuradores
  - encantadores
  - susurradores
  lexicon: מלחש
  rationale: El término hebreo está relacionado con susurro/incantación. «Hechiceros» comunica el oficio mágico implicado sin depender de una calca poco transparente; «encantadores» y «susurradores» quedan como alternativas posibles, pero «hechiceros» transmite mejor la función en español bíblico actual.
- source_word: חוֹבֵר חֲבָרִים
  english_pob_choice: one who skillfully casts spells
  chosen_spanish: del que ata hechizos
  alternatives_spanish:
  - del que enlaza conjuros
  - del que liga encantamientos
  - del que reúne hechizos
  lexicon: חבר
  rationale: La expresión es idiomática y literalmente alude a «atar/unir» con fórmulas mágicas. «Ata hechizos» conserva la metáfora verbal del hebreo sin perder inteligibilidad; el participio compuesto inglés también apunta a un practicante de magia, no a un oficio literal de unir objetos.
- source_word: מְחֻכָּם
  english_pob_choice: skillfully
  chosen_spanish: experto
  alternatives_spanish:
  - con habilidad
  - diestramente
  - con pericia
  lexicon: חכם
  rationale: Aunque la raíz conecta con sabiduría, en este contexto funciona como calificación de destreza. «Experto» comunica la idea de práctica competente sin introducir una valoración moral que el hebreo aquí no exige.
theological_decisions:
- issue: La imagen de la serpiente que no atiende a los encantadores y hechiceros
  english_pob_reading: that does not listen to the voice of charmers, of one who skillfully casts spells.
  chosen_spanish_reading: el que no escucha la voz de los hechiceros, del que ata hechizos, experto.
  alternative_spanish_readings:
  - el que no oye la voz de los encantadores
  - el que no presta atención a la voz de los susurradores
  rationale: No hay aquí una doctrina explícita, pero sí una imagen poética de insensibilidad a la magia o encantamiento. Conservo ese sentido sin suavizarlo ni sustituirlo por una explicación moralizante, para respetar la fuerza figurativa del texto.
  doctrine_reference: Imagen poética y semántica del texto hebreo; no aplica una doctrina sistemática específica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su evaluación de alta concordancia: la decisión de traducir el participio de respuesta auditiva como «escucha» y el sintagma mágico como una expresión idiomática se mantuvo, pero adaptando la solución al español con mayor naturalidad sin perder la tensión lexical del hebreo.'
  spanish_consistency_notes:
  - Se conservó una formulación breve y poética, acorde con el paralelismo del versículo.
  - «Hechiceros» y la nota alternativa preservan la relación semántica con susurro/incantación documentada en el inglés POB.
  - «Ata hechizos» mantiene la metáfora de חוֹבֵר sin convertirla en una paráfrasis excesiva.
  - No se introdujo terminología eclesiástica ajena al campo semántico del pasaje.
