id: 2SA.14.17
reference: 2 Samuel 14:17
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ שִׁפְחָ֣תְ/ךָ֔ יִֽהְיֶה נָּ֛א דְּבַר אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ לִ/מְנוּחָ֑ה כִּ֣י כְּ/מַלְאַ֣ךְ הָ/אֱלֹהִ֗ים כֵּ֣ן אֲדֹנִ֤/י הַ/מֶּ֨לֶךְ֙ לִ/שְׁמֹ֨עַ֙ הַ/טּ֣וֹב וְ/הָ/רָ֔ע וַֽ/יהוָ֥ה אֱלֹהֶ֖י/ךָ יְהִ֥י עִמָּֽ/ךְ־־׀׃פ
translation:
  text: Then your servant said[a], ‘Please let the word of my lord the king bring rest, for my lord the king is like the angel of God, to hear the good and the evil[b]. And may Yahweh your God be with you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like an angel of God'; the Hebrew phrase could also be understood more broadly as 'like a messenger of God.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to hear the good and the evil,' an idiom for discerning or judging between good and evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְחָתְךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female slave
  lexicon: HALOT
  rationale: Literally a female servant/slave. In this courtly petition context, 'your servant' is idiomatic and natural in English while preserving the speaker's self-humbling posture. The feminine nuance is present in Hebrew but awkward to foreground in the main text here.
- source_word: יִהְיֶה נָּא
  chosen: Please let ... be
  alternatives:
  - May ... please be
  - Let ... be, please
  lexicon: HALOT
  rationale: The jussive with נָא expresses polite entreaty. 'Please let' captures both the volitional force and the deferential tone.
- source_word: דְּבַר אֲדֹנִי הַמֶּלֶךְ
  chosen: the word of my lord the king
  alternatives:
  - the decision of my lord the king
  - the matter from my lord the king
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'decision.' Here the woman is asking for the king's pronouncement to settle the matter, so 'word' preserves the Hebrew while still fitting the context.
- source_word: לִמְנוּחָה
  chosen: bring rest
  alternatives:
  - be for rest
  - bring relief
  - give repose
  lexicon: HALOT
  rationale: The noun denotes rest, relief, or tranquility. In context the sense is that the king's ruling would calm the situation and remove anxiety. 'Bring rest' is idiomatic and close to the Hebrew image.
- source_word: כְּמַלְאַךְ הָאֱלֹהִים
  chosen: like the angel of God
  alternatives:
  - like an angel of God
  - like the messenger of God
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel,' but in this royal-comparison formula the supernatural sense is most likely. The definite article on האלהים supports 'the angel of God' as a known exalted comparison rather than merely 'a messenger of God.'
- source_word: לִשְׁמֹעַ הַטּוֹב וְהָרָע
  chosen: able to discern the good and the evil
  alternatives:
  - to hear the good and the evil
  - to distinguish good and evil
  lexicon: HALOT
  rationale: Literally 'to hear the good and the evil,' but 'hear' here carries the judicial sense of perceiving/discerning. 'Discern' communicates the king's capacity for wise judgment in natural English. The paired nouns with articles are rendered 'the good and the evil' to preserve the Hebrew specificity.
- source_word: וַיהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: 'Per doctrine, יהוה is rendered ''the LORD.'' The possessive construction is retained: ''your God.'''
- source_word: יְהִי עִמָּךְ
  chosen: may ... be with you
  alternatives:
  - let ... be with you
  lexicon: HALOT
  rationale: A standard benedictory/jussive expression. 'May ... be with you' is the most natural English equivalent.
