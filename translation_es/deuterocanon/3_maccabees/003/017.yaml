    text: 'O: «verbalmente aceptaron nuestra presencia, pero en la práctica actuaron con insinceridad».'
    reason: alternative_reading
  - marker: b
    text: El término griego para «ofrendas» también puede significar dones dedicados u ofrendas votivas colocadas en un templo.
    reason: cultural_note
  revision_rationale: Se ajustó el contraste retórico a un español más idiomático y más cercano al griego ('de palabra ... de hecho') y se fortaleció la fuerza volitiva de προθυμηθέντων ἡμῶν con 'estábamos deseosos' en lugar de 'estábamos dispuestos'. Se mantuvieron 'templo', 'honrarlo' y la nota cultural sobre ἀναθήμασιν.
