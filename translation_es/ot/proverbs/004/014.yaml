translation:
  language: es
  text: No entres por el camino de los impíos, ni andes[a] por la senda de los malos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no prosigas por la senda de los malos». El verbo hebreo puede significar «ir adelante», «avanzar» o «caminar rectamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֹרַח
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - senda
  - sendero
  lexicon: HALOT
  rationale: אֹרַח designa un camino o ruta de tránsito, y en sentido figurado una manera de vivir. En español, 'camino' comunica bien la imagen moral y permite diferenciarlo de דֶּרֶךְ en el segundo hemistiquio, donde 'senda' suena más natural para variar el paralelismo sin perder el valor metafórico.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural masculino nombra a personas culpables o perversas. 'Impíos' es un equivalente bíblico natural en español y conserva el tono moral-religioso del término, sin introducir una lectura más específica que la del hebreo.
- source_word: אַל תָּבֹא
  english_pob_choice: do not enter
  chosen_spanish: No entres
  alternatives_spanish:
  - No entres en
  - No vayas
  lexicon: HALOT
  rationale: Con בְּאֹרַח, בוא expresa la idea de entrar en un curso o trayecto. 'No entres' reproduce bien el valor de prohibición y mantiene la metáfora de acceso a un camino moral.
- source_word: תְּאַשֵּׁר
  english_pob_choice: do not walk
  chosen_spanish: andes
  alternatives_spanish:
  - vayas adelante
  - prosigas
  - camines rectamente
  lexicon: HALOT
  rationale: El verbo en piel puede significar avanzar, ir rectamente o proseguir. En español, 'andes' es una forma natural que conserva la imagen de caminar por una senda; además evita hacer demasiado explícita una de las posibles matizaciones ('avanzar', 'ir derecho') que el hebreo permite.
- source_word: בְּ/דֶרֶךְ
  english_pob_choice: way
  chosen_spanish: la senda
  alternatives_spanish:
  - el camino
  - la ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser 'camino', 'ruta' o 'senda'. Aquí se escogió 'senda' para mantener la variación estilística con el primer hemistiquio y conservar el paralelismo poético sin repetir el mismo término.
- source_word: רָעִים
  english_pob_choice: evil men
  chosen_spanish: los malos
  alternatives_spanish:
  - los hombres malos
  - los malvados
  lexicon: HALOT
  rationale: La forma masculina plural tiene referencia personal. 'Los malos' es breve y natural en español bíblico contemporáneo; aunque no explicita 'hombres', preserva la fuerza colectiva y evita una formulación pesada en el cierre del verso.
theological_decisions:
- issue: Cómo reflejar el masculino plural רָעִים sin forzar una explicitación de género en español
  english_pob_reading: evil men
  chosen_spanish_reading: los malos
  alternative_spanish_readings:
  - los hombres malos
  - los malvados
  rationale: El hebreo es masculino plural y puede tener fuerza representativa. En español, 'los malos' conserva la referencia personal y el tono moral sin añadir 'hombres' donde el contexto sapiencial ya presupone personas. Se evita también neutralizar en exceso el plural masculino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Preservar la metáfora de movimiento sin decidir demasiado entre 'caminar', 'avanzar' o 'ir rectamente'
  english_pob_reading: do not walk
  chosen_spanish_reading: andes
  alternative_spanish_readings:
  - camines
  - prosigas
  - vayas adelante
  rationale: El POB inglés documenta que el verbo hebreo puede significar 'go on', 'advance' o 'walk straight'. 'Andes' es suficientemente amplio para abarcar esas posibilidades en un español fluido, sin eliminar la tensión semántica ni imponer una sola glosa.
  doctrine_reference: HALOT; nota lexical de la POB inglesa
translation_notes:
  revision_awareness: Se revisó el paso más reciente y no hubo cambios sustanciales en el texto de origen ni en la decisión inglesa; la versión española sigue el mismo sentido auditado, con ajuste idiomático para conservar la metáfora de camino y la ambigüedad verbal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el primer hemistiquio ('camino') y el segundo ('senda') para reflejar אָרַח / דֶּרֶךְ.
  - Se preservó la prohibición doble con 'No entres' / 'ni andes' como paralelismo fluido y fiel.
  - Se eligieron equivalentes morales comunes en español bíblico ('impíos', 'malos') sin introducir términos más técnicos que el hebreo no exige.
