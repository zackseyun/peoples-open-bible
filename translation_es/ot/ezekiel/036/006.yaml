review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del versículo y la lista topográfica, pero falla en varios puntos clave de alineación con el hebreo y con las decisiones auditadas: עַל אַדְמַת יִשְׂרָאֵל aquí es ''acerca de/sobre la tierra de Israel'', no ''contra''; נְשָׂאתֶם es segunda persona plural (''ustedes han llevado/soportado''), no tercera plural ''han llevado''; y la nota al pie está mal anclada, pues el marcador [a] aparece en ''Israel'' mientras la nota habla de una alternativa para la preposición (''en la tierra de Israel''). También falta preservar la alternativa documentada para כְּלִמַּת גּוֹיִם (''oprobio/reproche de las naciones'') y la decisión sobre קִנְאָה debería reflejar mejor el valor fuente principal (''celos'' o al menos nota equivalente) en vez de invertir principal/alternativa sin necesidad.'
  spanish_quality_summary: El español es generalmente legible y digno, con buenas opciones como 'montes', 'barrancos', 'valles', 'He aquí' e 'ira'. Sin embargo, 'profetiza contra' distorsiona el sentido, 'Adonai Yahvé' suena menos natural para una lectura eclesial amplia que 'el Señor Yahvé', y 'han llevado' rompe la concordancia con el vocativo a la tierra y sus accidentes geográficos, donde corresponde segunda persona plural. La puntuación y el registro pueden mantenerse con una revisión menor.
  glossary_alignment: Se valora que el borrador use 'Yahvé' y no enmascare el Tetragrámaton. No obstante, para אֲדֹנָי יְהוִה el proyecto permite explicar la combinación; en español 'el Señor Yahvé' preserva ambos elementos con mejor legibilidad que 'Adonai Yahvé'. Además, el borrador se aparta innecesariamente de la auditoría al elegir 'celo' como lectura principal para קִנְאָה cuando la evidencia auditada privilegia 'jealousy'; en español neutral y fiel, 'celos' con nota 'o celo' conserva mejor la fuerza relacional/covenantal.
  issues:
  - severity: high
    issue: '`contra la tierra de Israel` traduce mal עַל אַדְמַת יִשְׂרָאֵל'
    rationale: La preposición עַל con הִנָּבֵא aquí introduce el tema/objeto del oráculo ('acerca de', 'sobre'), no hostilidad contra Israel. El contexto inmediato muestra que el profeta habla a la tierra de Israel para prometer vindicación, no para pronunciar juicio contra ella.
  - severity: high
    issue: '`han llevado` cambia la persona verbal de נְשָׂאתֶם'
    rationale: 'El hebreo está en segunda persona plural: ''ustedes habéis/han llevado/soportado''. Debe concordar con los destinatarios personificados (''montes... colinas... barrancos... valles'').'
  - severity: medium
    issue: '`Adonai Yahvé` es menos natural que `el Señor Yahvé`'
    rationale: Aunque preserva ambos elementos hebreos, en español general de iglesia 'Adonai' no es la opción por defecto del proyecto y puede sonar importada. 'El Señor Yahvé' mantiene la titulatura y la legibilidad.
  - severity: medium
    issue: La nota [a] está mal ubicada y no corresponde a la alternativa que explica
    rationale: El marcador aparece en 'Israel[a]', pero la nota propone 'en la tierra de Israel', que afecta la frase/preposición completa, no solo 'Israel'. Si se mantiene una nota, debe anclarse a la frase pertinente.
  - severity: medium
    issue: Falta nota para la alternativa de כְּלִמַּת גּוֹיִם
    rationale: La auditoría inglesa preserva una alternativa léxica ('reproach'). En español conviene conservarla como 'oprobio' o 'reproche de las naciones'.
  - severity: low
    issue: La decisión principal `en mi celo` para קִנְאָה no refleja la prioridad auditada
    rationale: El expediente inglés prioriza 'jealousy' y deja 'zeal' como alternativa. En español, 'celos' puede sonar fuerte pero es la correspondencia más directa; una nota puede ofrecer 'celo' para claridad teológica.
