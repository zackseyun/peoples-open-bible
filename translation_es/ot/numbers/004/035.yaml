- from: desde los treinta años y más[a], hasta los cincuenta años, todo el que entra al servicio[b] para hacer la obra en el tabernáculo de reunión.
  to: desde los treinta años en adelante[a], hasta los cincuenta años, todo el que entra al servicio[b] para hacer la obra en la tienda de reunión.
