translation:
  language: es
  text: Ahora, en el año decimocuarto del rey Ezequías, Senaquerib, rey de Asiria, marchó contra todas las ciudades fortificadas de Judá y las capturó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa de inicio introduce un nuevo episodio. «Ahora» cumple en español la función discursiva de transición con naturalidad, sin arrastrar una fórmula más arcaica.
- source_word: בְּאַרְבַּע עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the fourteenth year
  chosen_spanish: en el año decimocuarto
  alternatives_spanish:
  - en el año catorce
  - en el año número catorce
  lexicon: HALOT
  rationale: Se trata de una fórmula cronológica de reinado. «En el año decimocuarto» es la equivalencia española más natural y fiel al valor ordinal del hebreo.
- source_word: לַמֶּלֶךְ חִזְקִיָּהוּ
  english_pob_choice: of King Hezekiah
  chosen_spanish: del rey Ezequías
  alternatives_spanish:
  - del rey Hezequías
  - para el rey Ezequías
  lexicon: HALOT
  rationale: El ל de la fórmula dativa indica relación con el reinado; en español se expresa naturalmente con «del rey». Se conserva el nombre bíblico habitual «Ezequías».
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - ascendió contra
  - marchó contra
  lexicon: HALOT
  rationale: En contexto militar, עלה con עַל expresa avance/agresión contra un objetivo. «Subió contra» mantiene el componente direccional del hebreo, a la vez que es comprensible en español bíblico moderno.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  - Sanquerib
  lexicon: transliteration
  rationale: Se usa la forma española tradicional ampliamente reconocible «Senaquerib», que corresponde al nombre propio transliterado.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa identifica cargo y reino; «rey de Asiria» reproduce el valor relacional de manera natural en español.
- source_word: עַל כָּל עָרֵי יְהוּדָה
  english_pob_choice: against all the fortified cities of Judah
  chosen_spanish: contra todas las ciudades fortificadas de Judá
  alternatives_spanish:
  - contra todas las ciudades de Judá
  - contra cada una de las ciudades fortificadas de Judá
  lexicon: HALOT
  rationale: La preposición con sentido hostil se rinde con «contra». «Todas las ciudades fortificadas de Judá» conserva el alcance total y el sustantivo especificado por el adjetivo hebreo.
- source_word: הַבְּצֻרוֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - amuralladas
  - defendidas
  lexicon: HALOT
  rationale: El adjetivo describe ciudades hechas fuertes mediante fortificación. «Fortificadas» es el término técnico más preciso y transparente en español.
- source_word: וַיִּתְפְּשֵׂם
  english_pob_choice: and captured them
  chosen_spanish: y las capturó
  alternatives_spanish:
  - y las tomó
  - y se apoderó de ellas
  lexicon: HALOT
  rationale: El verbo תפשׂ significa tomar por la fuerza, capturar o apresar. En el contexto de ciudades conquistadas, «capturó» transmite bien el sentido militar sin añadir matices ajenos.
theological_decisions:
- issue: Inicio narrativo con וַיְהִי
  english_pob_reading: Now ...
  chosen_spanish_reading: Ahora ...
  alternative_spanish_readings:
  - Y aconteció ...
  - Y sucedió ...
  rationale: No hay una decisión doctrinal explícita, pero sí una cuestión de tono bíblico-narrativo. Se evita una fórmula excesivamente arcaizante y se conserva la función de transición del hebreo sin alterar el contenido.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto coincide con la lectura inglesa auditada y no requiere cambios respecto al sentido base: datación de reinado, avance militar de Senaquerib y captura de las ciudades fortificadas de Judá.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» y «Judá» como topónimos bíblicos estándar en español.
  - Se usa «capturó» para el resultado militar de וַיִּתְפְּשֵׂם, siguiendo el valor contextual del verbo.
  - No se introduce «SEÑOR» ni otras convenciones de ocultamiento del nombre divino porque este versículo no contiene el Tetragrámaton.
