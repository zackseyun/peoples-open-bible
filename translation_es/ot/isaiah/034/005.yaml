review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: כִּי como explicación (''Porque''), רִוְּתָה como saturación metafórica de la espada, ''en los cielos'', descenso sobre Edom, y ''para juicio''. El principal problema está en עַם חֶרְמִי: mantener ''herem'' en el texto principal no preserva bien la legibilidad eclesial en español y deja sin traducir un término hebreo que el propio material inglés explica semánticamente como dedicación a destrucción bajo juicio divino.'
  spanish_quality_summary: La redacción es clara y digna en casi todo el versículo. 'Porque mi espada está empapada en los cielos; he aquí, descenderá sobre Edom' suena natural y solemne. Sin embargo, 'el pueblo de mi herem' resulta opaco y poco español; en registro bíblico accesible funciona mejor una traducción semántica en el texto con nota explicativa sobre el hebreo.
  glossary_alignment: No hay conflicto con los términos base del proyecto salvo la decisión de dejar חֶרְמִי como 'herem'. Dado que no existe instrucción de proyecto para transliterar חרם, y la racionalidad documentada prioriza comunicar 'devoted to destruction' frente a un tecnicismo oscuro, conviene usar 'consagrado a la destrucción' en español. 'Juicio', 'cielos' y el resto están alineados.
  issues:
  - severity: medium
    issue: Uso de 'herem' sin traducir en el texto principal
    rationale: Aunque la revisión inglesa volvió a una formulación más literal ('people of my ban'), en español 'herem' no es transparente para lectores generales y deja de ser traducción. El hebreo חֶרְמִי se entiende mejor en español como 'consagrado a la destrucción' o equivalente, con nota que preserve el término técnico.
  - severity: low
    issue: La nota b repite el hebraísmo en vez de aclararlo primero
    rationale: La nota actual explica bien el concepto, pero sería más útil si presentara explícitamente el hebreo חֵרֶם/ḥérem como trasfondo de la traducción elegida, evitando que el cuerpo del texto dependa de un préstamo no adaptado.
  revised_spanish_text: Porque mi espada está empapada en los cielos[a]; he aquí, descenderá sobre Edom, sobre el pueblo consagrado a la destrucción[b], para juicio.
  revised_footnotes:
  - marker: a
    text: 'O: "está saciada en los cielos" / "ha bebido hasta saciarse en los cielos". La imagen hebrea presenta la espada de Yahvé saturada antes de descender en juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el pueblo de mi ḥérem"; es decir, el pueblo apartado o entregado a destrucción bajo el juicio divino.'
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador, pero se reemplaza 'el pueblo de mi herem' por 'el pueblo consagrado a la destrucción' para traducir realmente el sentido de חֶרְמִי en un español claro y eclesialmente legible. La nota retiene el término hebreo técnico y explica su matiz judicial, preservando la evidencia fuente y la justificación léxica.
