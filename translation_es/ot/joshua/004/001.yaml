revisions:
- from: Y aconteció[a] que, cuando toda la nación había terminado de cruzar el Jordán, Yahvé dijo a Josué,
  to: Y sucedió[a] que, cuando toda la nación habían terminado de cruzar el Jordán, Yahvé dijo a Josué,
  rationale: Se ajusta la fórmula narrativa a un español más natural («Y sucedió») y se mejora la fluidez de la cláusula con el colectivo humano manteniendo la elección léxica «toda la nación» y la nota explicativa ya documentada. No se requiere adjudicación especial.
