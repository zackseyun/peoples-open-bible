  text: שָׁ֣מָּ/ה אֱד֗וֹם מְלָכֶ֨י/הָ֙ וְ/כָל נְשִׂיאֶ֔י/הָ אֲשֶׁר נִתְּנ֥וּ בִ/גְבוּרָתָ֖/ם אֶת חַלְלֵי חָ֑רֶב הֵ֛מָּה אֶת עֲרֵלִ֥ים יִשְׁכָּ֖בוּ וְ/אֶת יֹ֥רְדֵי בֽוֹר־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/029.yaml
  text: There is Edom[a], her kings and all her princes, who were laid among those slain by the sword despite their might[b]. They lie with the uncircumcised and with those who go down to the pit.
  footnotes:
  - marker: a
    text: Or 'with their might' or 'in their might'; the Hebrew phrase may be read more literally, but the context highlights the irony that their strength did not prevent their downfall.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' is a common Hebrew image for the realm of the dead or the grave.'
    reason: cultural_note
