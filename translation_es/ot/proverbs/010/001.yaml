review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: encabezado de colección, contraste antitético entre hijo sabio y necio, y el sufijo posesivo explícito en «su madre». Sin embargo, la nota al pie no preserva la alternativa inglesa documentada, porque repite exactamente el texto principal en vez de ofrecer la opción equivalente a «es una tristeza para su madre».'
  spanish_quality_summary: El español es claro, natural y de tono sapiencial digno. «Proverbios de Salomón» funciona bien como encabezado, y «necio» es una buena elección. La única reparación necesaria es la nota al pie; además, conviene pulir «alegra al padre» a «alegra a un padre» si se quisiera acercar más al indefinido inglés, pero no es obligatorio para fidelidad suficiente. El texto principal puede mantenerse.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «sabio», «necio», «dolor» y «su madre» son compatibles con el hebreo y con la justificación léxica auditada. La excepción relevante es la nota léxica, que debe reflejar la alternativa «una tristeza para su madre» o equivalente, no duplicar la redacción principal.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite el texto principal en lugar de dar la alternativa léxica auditada.
    rationale: 'El English POB conserva una alternativa real: «a foolish son is a grief to his mother». En español, la nota debe ofrecer una formulación distinta, como «un hijo necio es una tristeza para su madre», no repetir «es el dolor de su madre».'
  revised_spanish_text: 'Proverbios de Salomón: el hijo sabio alegra al padre[a], pero el hijo necio es el dolor de su madre.'
  revised_footnotes:
  - marker: a
    text: 'O: «un hijo necio es una tristeza para su madre».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, idiomático y sapiencial. Se corrige únicamente la nota al pie para que preserve una alternativa léxica genuina documentada en la auditoría inglesa, en vez de repetir la misma redacción del cuerpo del texto. Aunque la nota está anclada tras «padre» por herencia del registro inglés, su contenido sigue refiriéndose a la segunda mitad del proverbio; no es ideal, pero no exige una reescritura mayor del versículo.
