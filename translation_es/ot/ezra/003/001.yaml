translation:
  language: es
  text: Cuando llegó[a] el séptimo mes, y los hijos de Israel estaban en las ciudades, el pueblo se reunió como un solo hombre[b] a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa aquí un verbo temporal idiomático: literalmente ‘alcanzó/llegó’ el mes, es decir, ‘cuando llegó el séptimo mes’.'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: ‘como un solo hombre’, es decir, en acción unida o de común acuerdo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּע
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - alcanzó
  lexicon: HALOT
  rationale: Con una expresión temporal (“el séptimo mes”), el verbo funciona idiomáticamente como ‘llegó’ o ‘vino’. ‘Llegó’ es natural en español y conserva el sentido temporal sin forzar un calco.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: the seventh month
  chosen_spanish: el séptimo mes
  alternatives_spanish:
  - el mes séptimo
  lexicon: HALOT
  rationale: Es la correspondencia directa y clara del sintagma temporal hebreo; no hay base textual para sustituirlo por un nombre de mes posterior.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva el paralelismo formal del hebreo con ‘hijos’. ‘Israelitas’ sería más idiomático, pero atenúa la forma lexical del original y borra la decisión de mantener el sustantivo filial.
- source_word: בֶּעָרִים
  english_pob_choice: were in the cities
  chosen_spanish: estaban en las ciudades
  alternatives_spanish:
  - vivían en las ciudades
  - se hallaban en las ciudades
  lexicon: HALOT
  rationale: El hebreo es elíptico y predicativo; en español requiere una cópula implícita. ‘Estaban en las ciudades’ es fiel y sobrio, sin añadir posesión no expresada (‘sus ciudades’).
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se asamblearon
  lexicon: HALOT
  rationale: אָסף en Niphal indica reunirse/ser reunidos. ‘Se reunieron’ comunica bien la acción comunitaria en español moderno y mantiene el valor de ensamblaje sin redundancia.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: ‘El pueblo’ expresa mejor la comunidad del retorno que ‘la gente’, y es una correspondencia estable para העם en contexto histórico-sagrado.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como uno solo
  - con un solo propósito
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea masculina singular de unidad corporativa. ‘Como un solo hombre’ es transparente, reconocible y evita neutralizar la forma del texto base.
- source_word: אֶל יְרוּשָׁלִָם
  english_pob_choice: to Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: El movimiento de reunión culmina en la ciudad; en español, ‘en Jerusalén’ suena natural con ‘reunirse’, mientras que ‘a Jerusalén’ puede sonar más direccional que locativo. Se preserva el destino implícito sin rigidez preposicional.
theological_decisions:
- issue: Lenguaje corporativo masculino en וּבְנֵי יִשְׂרָאֵל y כְּאִישׁ אֶחָד
  english_pob_reading: Retain ‘sons of Israel’ and ‘as one man’ in the main text
  chosen_spanish_reading: Conservar ‘los hijos de Israel’ y ‘como un solo hombre’
  alternative_spanish_readings:
  - los israelitas
  - como uno solo
  - con un solo acuerdo
  rationale: La política del POB favorece transparencia ante la forma masculina del hebreo cuando tiene fuerza representativa. Aquí ambas expresiones son fórmulas corporativas asentadas y mantenerlas evita suavizar el texto por neutralización innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó ‘together’ por redundante con ‘gathered’ y con ‘as one man’. En español se reflejó esa misma economía al usar ‘se reunieron’ sin añadir un adverbio equivalente.
  spanish_consistency_notes:
  - Se mantuvo ‘hijos de Israel’ para reflejar la forma hebrea, en línea con la política de exactitud lexical.
  - Se evitó ‘SEÑOR’ u otras sustituciones teológicas no presentes en este versículo.
  - La preposición ‘en’ con ‘reunirse’ busca naturalidad española sin alterar el valor de destino de אֶל Jerusalén.
  - ‘Como un solo hombre’ preserva la imagen idiomática y su fuerza de unidad corporativa.
