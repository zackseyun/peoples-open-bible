review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: denuncia profética («¡Ay…!»), singular representativo («del malvado… le… se le…») y lógica de retribución. Sin embargo, «la retribución de sus manos» suena menos natural en español y desplaza el énfasis desde «lo que producen sus manos / la obra de sus manos» hacia una abstracción algo opaca. Dado que el English POB revisado fijó «the work of his hands» para reflejar más directamente גמול/ידיו en registro formal, el español debe ajustarse para preservar esa relación de forma clara y eufónica.'
  spanish_quality_summary: '«¡Ay del malvado! Le irá mal» es claro y fiel. El problema principal es la frase final: «la retribución de sus manos se le hará» es gramatical pero poco idiomática y pesada para lectura eclesial; «retribución de sus manos» no suena natural en español contemporáneo. Una solución mejor es «la obra de sus manos se le hará», que conserva el paralelismo formal y el verbo repetido, o alternativamente «la obra de sus manos le será hecha». La primera mantiene mejor la sencillez del texto.'
  glossary_alignment: 'No hay conflicto con la terminología global del proyecto. «Malvado» es aceptable para רשע. No aparecen términos sensibles como Yahvé/Mesías/etc. La decisión clave es lexical: preferir «obra» frente a «retribución» aquí por claridad en español y por alineación con la revisión inglesa documentada.'
  issues:
  - severity: medium
    issue: «la retribución de sus manos» es poco natural en español
    rationale: Aunque גְּמוּל puede denotar retribución, la combinación completa «retribución de sus manos» resulta opaca y dura en español. El lector puede tropezar con la expresión en vez de captar de inmediato la idea de correspondencia entre obras y castigo.
  - severity: medium
    issue: Desalineación con la revisión inglesa auditada («the work of his hands» )
    rationale: El English POB fue revisado específicamente para usar «the work of his hands» como formulación más directa y formal. El borrador español volvió a una opción más abstracta («retribución»), alejándose de esa decisión auditada sin necesidad.
  - severity: low
    issue: La nota alternativa «Le sobrevendrá mal» es comprensible pero algo menos natural
    rationale: No es errónea, pero puede mejorarse levemente para sonar más castellano y reflejar la alternativa formal inglesa con «El mal vendrá sobre él» o equivalente más directo.
  revised_spanish_text: ¡Ay del malvado! Le irá mal[a], porque la obra de sus manos se le hará.
