    rationale: El hebreo apunta a ‘ser puesto a muerte / ejecutado’, no simplemente a morir. Conviene explicitar la idea de ejecución judicial.
  - severity: low
    issue: «sean para mí un adversario» suena menos natural en español.
    rationale: La relación predicativa funciona mejor como «sean un adversario para mí» sin pérdida de sentido.
