translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los ejércitos acerca de los profetas: «Mira, les estoy dando a comer ajenjo y les estoy haciendo beber agua envenenada[a], porque de los profetas de Jerusalén ha salido la impiedad a toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «agua de hiel». El hebreo dice literalmente «aguas de rosh», una sustancia amarga o venenosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino mediante transliteración, de acuerdo con la práctica del proyecto. 'Yahvé' es el equivalente natural en español para mantener visible el Tetragrámaton sin sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' mantiene la imagen concreta y transparente del hebreo. Evita la forma más tradicional ''huestes'', que resulta menos clara para lectores modernos.'
- source_word: עַל הַנְּבִאִים
  english_pob_choice: concerning the prophets
  chosen_spanish: acerca de los profetas
  alternatives_spanish:
  - contra los profetas
  - sobre los profetas
  lexicon: HALOT
  rationale: '''עַל'' en esta fórmula puede expresar ''acerca de'' o ''contra''. Se eligió ''acerca de'' porque reproduce de manera amplia la fórmula oracular, mientras el contexto ya deja ver el tono de juicio.'
- source_word: הִנְנִי
  english_pob_choice: Look, I am
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren, yo
  - He aquí
  lexicon: HALOT
  rationale: En español, 'Miren' comunica bien la fuerza discursiva de atención inmediata. Se integra con la frase siguiente sin forzar una construcción más pesada como 'He aquí'.
- source_word: מַאֲכִיל
  english_pob_choice: feeding
  chosen_spanish: dando a comer
  alternatives_spanish:
  - alimentando
  - haciendo comer
  lexicon: HALOT
  rationale: 'El hiphil de אכל conserva el valor causativo: ''hacer comer / dar a comer''. ''Dando a comer'' suena natural en español y mantiene la acción causada por Yahvé.'
- source_word: לַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - ajenjo amargo
  - absintio
  lexicon: HALOT
  rationale: En español bíblico, 'ajenjo' es el equivalente clásico de 'wormwood' y conserva la imagen vegetal amarga del juicio. Es más transparente que 'absintio' para lectores amplios.
- source_word: וְהִשְׁקִתִים
  english_pob_choice: making them drink
  chosen_spanish: les estoy haciendo beber
  alternatives_spanish:
  - les daré a beber
  - los haré beber
  lexicon: HALOT
  rationale: Se mantiene el causativo del verbo שׁקה con una construcción natural en español. 'Les estoy haciendo beber' refleja la forma verbal contextualizada que el POB inglés decidió preservar.
- source_word: מֵי רֹאשׁ
  english_pob_choice: poisoned water
  chosen_spanish: agua envenenada
  alternatives_spanish:
  - agua de hiel
  - agua de veneno
  - agua amarga
  lexicon: HALOT
  rationale: El hebreo alude a una sustancia amarga o tóxica; 'agua envenenada' comunica claramente el efecto nocivo en español. Se preserva la alternativa más literal en la nota.
- source_word: חֲנֻפָּה
  english_pob_choice: ungodliness
  chosen_spanish: la impiedad
  alternatives_spanish:
  - la profanación
  - la irreligión
  - la perversión
  lexicon: HALOT
  rationale: '''Impiedad'' recoge bien el campo semántico de irreligión/profanidad/maldad religiosa sin sonar demasiado técnico. Mantiene la acusación moral y teológica del texto.'
- source_word: יָצְאָה
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido fuera
  - se ha difundido
  lexicon: HALOT
  rationale: '''Ha salido'' conserva la metáfora espacial del hebreo (''has gone out'') y sigue siendo natural en español. Evita una paráfrasis demasiado interpretativa como ''se ha difundido''.'
- source_word: לְכָל הָאָרֶץ
  english_pob_choice: into all the land
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - por toda la tierra del país
  - por todo el país
  lexicon: HALOT
  rationale: '''La tierra'' reproduce el valor territorial de הָאָרֶץ en Jeremías. ''Por toda la tierra'' expresa bien el alcance de la corrupción sin restringirlo a un solo matiz geográfico moderno.'
theological_decisions:
- issue: Imaginería de juicio divino concreta
  english_pob_reading: God feeds the false prophets wormwood and gives them poisoned water to drink.
  chosen_spanish_reading: Yahvé da a comer ajenjo y hace beber agua envenenada a los profetas falsos.
  alternative_spanish_readings:
  - Dios les aplica un juicio amargo.
  - Yahvé los castigará con amargura.
  rationale: Se conserva la imaginería corporal y concreta del hebreo, porque el texto profético comunica retribución divina mediante acciones simbólicas intensas. No se suaviza en abstracción para no perder la carga teológica del juicio.
  doctrine_reference: Principio de primacía del texto original y preservación de la fuerza retórica profética.
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del POB inglés, que ajustó el valor verbal para reflejar más directamente las formas hebreas continuas ('I am feeding... and making them drink') en vez de una lectura volitiva futura. También conserva la nota léxica sobre מֵי רֹאשׁ como alternativa literal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - '''De los ejércitos'' mantiene el título divino sin recurrir a ''huestes'', más arcaico en español.'
  - '''Ajenjo'' corresponde al registro bíblico común y evita una explicación innecesaria en el texto principal.'
  - Se eligió 'impiedad' para חֲנֻפָּה por claridad y continuidad con vocabulario bíblico en español, sin borrar su matiz de profanación religiosa.
  - La nota al pie preserva la alternativa literal de 'agua de hiel' para reflejar la tensión léxica del hebreo.
