revisions:
- from: Quien golpee[a] a su padre o a su madre, ciertamente será muerto.
  to: Quien golpee[a] a su padre o a su madre, ciertamente se le dará muerte.
  rationale: Se conserva el sentido jurídico del hebreo y la nota sobre la conjunción disyuntiva, pero se reemplaza «será muerto» por «se le dará muerte» para lograr un español más natural y ampliamente legible, manteniendo a la vez la fuerza de la fórmula penal pasiva/intensificada.
  reviewer_model: gpt-5.4
