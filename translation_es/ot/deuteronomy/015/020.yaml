translation:
  language: es
  text: Tú y tu casa lo comerán delante de Yahvé tu Dios, año tras año, en el lugar que Yahvé escogerá.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en presencia de Yahvé tu Dios".
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי / לפני
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: La expresión idiomática con פני admite el sentido cultual de estar ante alguien. En español, 'delante de' comunica de manera natural esa idea de comer en la presencia de Yahvé sin forzar una fórmula más rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo, siguiendo el criterio del proyecto. 'Yahvé' es la forma española establecida en este trabajo para YHWH y evita sustituir el nombre por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de 2ms puede reflejarse en español con trato reverencial de tercera persona plural en una traducción eclesial general, especialmente dentro de un discurso legal dirigido a Israel. Mantiene el sentido posesivo sin cambiar el registro.
- source_word: תֹאכֲלֶנּוּ
  english_pob_choice: shall eat it
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo comerás
  - deberán comerlo
  lexicon: HALOT
  rationale: El imperfecto legal/instruccional en hebreo se expresa naturalmente en español con futuro. Se mantiene el objeto pronominal masculino singular 'lo' para el referente implícito del animal mencionado en el contexto inmediato.
- source_word: שָׁנָה בְשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año tras año
  - cada año
  lexicon: HALOT
  rationale: La locución distributiva indica repetición anual. 'Año tras año' conserva mejor el valor iterativo y el ritmo idiomático en español que una paráfrasis más explicativa.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: in the place that Yahweh will choose
  chosen_spanish: en el lugar que Yahvé escogerá
  alternatives_spanish:
  - en el lugar que Yahvé elegirá
  - en el lugar donde Yahvé escogerá
  lexicon: HALOT
  rationale: Se preserva la fórmula deuteronómica del santuario central con un futuro que expresa la elección venidera. 'Escogerá' reproduce con naturalidad el valor del verbo hebreo y la cadencia del mandato.
- source_word: אַתָּה וּבֵיתֶךָ
  english_pob_choice: You and your household
  chosen_spanish: ustedes y su casa
  alternatives_spanish:
  - tú y tu casa
  - ustedes y su hogar
  - ustedes y su familia
  lexicon: HALOT
  rationale: Para una versión bíblica de lectura comunitaria, 'ustedes' puede funcionar como tratamiento plural genérico del pueblo o del oyente colectivo. 'Su casa' conserva בית de forma sobria, aunque 'hogar' o 'familia' serían menos literales.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama, y la política del proyecto exige transliterarlo en lugar de reemplazarlo por un título. 'Yahvé' mantiene la referencia personal y pactal del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Registro del posesivo en אֱלֹהֶיךָ y el destinatario singular
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - tu Dios
  rationale: Aunque el hebreo usa segunda persona singular, el español bíblico de uso eclesial puede optar por tercera persona de respeto para una lectura amplia y solemne. Esta elección no altera el sentido posesivo ni la relación de pacto.
  doctrine_reference: Spanish style decision for communal ecclesial readability
- issue: Valor del verbo יִבְחַר en la fórmula del lugar escogido
  english_pob_reading: will choose
  chosen_spanish_reading: escogerá
  alternative_spanish_readings:
  - elegirá
  rationale: La elección futura en Deuteronomio señala el lugar designado por Yahvé. 'Escogerá' conserva la continuidad léxica con otras formulaciones del libro y evita un matiz estilísticamente más general.
  doctrine_reference: Deuteronomic central-sanctuary formula
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el análisis del POB en inglés. Se mantuvo el campo semántico de la fórmula cultual 'delante de Yahvé', el futuro legal de 'escogerá' y el nombre divino transliterado. No se introdujeron glosas interpretativas adicionales ni cambios textuales.
  spanish_consistency_notes:
  - Se normalizó la puntuación al uso español con coma para la locución distributiva y sin marcar con mayúsculas el pronombre de tratamiento.
  - Se prefirió 'Yahvé' por consistencia con la terminología del proyecto.
  - '''Casa'' se usó como equivalente sobrio de בית en este contexto legal-social.'
  - No se añadió nota al pie porque no hubo una alternativa textual o lexical indispensable que requiriera anclaje explícito en el cuerpo del versículo.
