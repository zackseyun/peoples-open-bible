  to: 'Por tanto, así dice Yahvé: Ustedes no me han escuchado, para proclamar libertad[a], cada hombre a su hermano y cada hombre a su prójimo. He aquí, yo proclamo libertad[a] para ustedes, declara Yahvé: a la espada, a la peste[b] y al hambre; y los convertiré en objeto de horror[c] para todos los reinos de la tierra.'
