translation:
  language: es
  text: Un yugo y una correa doblarán el cuello[a], y para un esclavo[b] malvado hay potros y torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerviz».
    reason: lexical_alternative
  - marker: b
    text: O «sirviente» o «criado doméstico»; aquí se mantiene «esclavo» por el matiz de sujeción coercitiva en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγὸς
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - balanza
  - barra de carga
  lexicon: LSJ
  rationale: El contexto de doblar el cuello exige el sentido concreto de instrumento de carga o sujeción; en español, «yugo» conserva la imagen física y la fuerza proverbial.
- source_word: ἱμὰς
  english_pob_choice: strap
  chosen_spanish: correa
  alternatives_spanish:
  - tira
  - lazo
  - reata
  lexicon: LSJ
  rationale: Designa una banda o correa de cuero/amarre. «Correa» es natural en español y mantiene el paralelismo con «yugo» como instrumento de constricción.
- source_word: κάμψουσιν
  english_pob_choice: will bend
  chosen_spanish: doblarán
  alternatives_spanish:
  - harán doblar
  - inclinarán
  lexicon: LSJ
  rationale: El verbo expresa la acción de doblar o hacer doblar. «Doblarán» conserva la imagen corporal directa sin añadir matiz interpretativo.
- source_word: τράχηλον
  english_pob_choice: the neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - la cerviz
  - el pescuezo
  lexicon: LSJ
  rationale: En español moderno, «cuello» comunica con claridad la parte del cuerpo afectada; «cerviz» sería más tradicional, pero menos natural para lectores amplios.
- source_word: οἰκέτῃ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - sirviente
  - criado doméstico
  lexicon: LSJ
  rationale: Aunque οἰκέτης puede significar siervo de casa, el contexto de castigo coercitivo y sometimiento físico hace que «esclavo» preserve mejor la dureza social del término. No se suaviza a «sirviente» porque eso diluiría la carga léxica documentada en la auditoría inglesa.
- source_word: κακούργῳ
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - malhechor
  - criminal
  - perverso
  lexicon: LSJ
  rationale: Como adjetivo moral, «malvado» encaja bien en el tono sapiencial. «Malhechor» o «criminal» estrecharían demasiado el sentido hacia lo jurídico.
- source_word: στρέβλαι
  english_pob_choice: racks
  chosen_spanish: potros
  alternatives_spanish:
  - racks de tortura
  - instrumentos de torsión
  lexicon: LSJ
  rationale: El término alude a instrumentos de torsión y suplicio. «Potros» es una equivalencia española histórica y concreta para un aparato de tortura, manteniendo la severidad sin perder inteligibilidad.
- source_word: βάσανοι
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  lexicon: LSJ
  rationale: «Torturas» reproduce con precisión la intensidad del término y combina naturalmente con «potros» en español.
theological_decisions:
- issue: Renderización del término de dependencia doméstica en un contexto de castigo
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - sirviente
  - criado doméstico
  rationale: La auditoría inglesa documenta que el contexto enfatiza sujeción coercitiva. En español, «esclavo» preserva esa realidad social y evita suavizar la imagen sapiencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος servant/slave (context-dependent); use ''slave'' where bonded nature is salient'
translation_notes:
  revision_awareness: La auditoría inglesa muestra un vaivén editorial entre «servant» y «slave» para οἰκέτῃ; el estado final restituye «slave» por coherencia doctrinal y por el énfasis del contexto en una condición sometida y castigable. La versión española sigue ese criterio y además conserva la imaginería concreta de yugo/correa, cuello y aparatos de tortura.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para οἰκέτῃ, en línea con la política terminológica indicada en la auditoría.
  - «Yugo» y «correa» conservan la metáfora de sujeción física sin convertir el dicho en explicación abstracta.
  - «Cuello» se usa por claridad moderna; la nota permite la alternativa «cerviz» para lectores que prefieran un término más tradicional.
  - «Potros» comunica el instrumento de suplicio de στρέβλαι con fuerza histórica y evita la paráfrasis genérica de «instrumentos de tortura».
