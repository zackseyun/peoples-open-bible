theological_decisions:
- issue: Meaning of רוּחַ in the childbirth metaphor
  chosen_reading: wind
  alternative_readings:
  - spirit
  - breath
  rationale: 'The verse laments futility: pregnancy and labor result only in ''wind,'' followed by failure to accomplish deliverance. Rendering as ''spirit'' could suggest a positive or pneumatological sense not warranted by the context. ''Wind'' preserves the image of emptiness.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretation of יִפְּלוּ in the final clause
  chosen_reading: have not fallen
  alternative_readings:
  - have not come to birth
  - have not been born
  rationale: The default is the ordinary lexical sense of נפל, and the translation should not paraphrase beyond what the source warrants. Because the childbirth imagery may extend into the final clause, the birth-related interpretation is preserved in a footnote rather than resolved silently.
  doctrine_reference: Translation philosophy §3
