  yaml_path: translation/deuterocanon/sirach/011/027.yaml
  text: The blessing of God is the lot of the righteous[b][a], and in the time of his hope it will blossom.
  footnotes:
  - marker: a
    text: 'Hebrew: ''The blessing of God is the lot of the righteous, and at the time of his hope it will blossom.'' The Greek parallel reads quite differently: ''An evil hour brings forgetfulness of luxury, and at a man''s end there is a revealing of his works.'' This suggests a divergent textual tradition for this verse.'
    reason: textual_variant
  - marker: b
    text: Or 'his hope will blossom.' The Hebrew verb can be understood with either 'blessing' or 'hope' as its referent.
    reason: lexical_alternative
