- from: Deja a los simples[a], y vive; y anda por el camino de la inteligencia.
  to: Dejen a los simples[a], y vivan; y anden por el camino del entendimiento.
  rationale: Se corrigen los tres imperativos al plural para reflejar fielmente el hebreo. Se cambia 'inteligencia' por 'entendimiento' para una equivalencia sapiencial más natural y más cercana a בינה/understanding. Se conserva 'a los simples' con nota porque reproduce el objeto directo del hebreo sin introducir 'caminos' o 'maneras' en el texto principal.
