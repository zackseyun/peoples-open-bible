  text: וּ/מִן הָ/עִ֡יר לָקַח֩ סָרִ֨יס אֶחָ֜ד אֲֽשֶׁר ה֥וּא פָקִ֣יד עַל אַנְשֵׁ֣י הַ/מִּלְחָמָ֗ה וַ/חֲמִשָּׁ֨ה אֲנָשִׁ֜ים מֵ/רֹאֵ֤י פְנֵֽי הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר נִמְצְא֣וּ בָ/עִ֔יר וְ/אֵ֗ת הַ/סֹּפֵר֙ שַׂ֣ר הַ/צָּבָ֔א הַ/מַּצְבִּ֖א אֶת עַ֣ם הָ/אָ֑רֶץ וְ/שִׁשִּׁ֥ים אִישׁ֙ מֵ/עַ֣ם הָ/אָ֔רֶץ הַֽ/נִּמְצְאִ֖ים בָּ/עִֽיר־־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/019.yaml
  text: And from the city he took one official[a], who was appointed over the men of war, and five men from those who saw the king’s face, who were found in the city, and the scribe, the commander of the army, who mustered the people of the land[c][b], and sixty men from the people of the land who were found in the city.
  footnotes:
  - marker: a
    text: Or 'eunuch'; the Hebrew term can denote either a literal eunuch or a royal court officer.
    reason: lexical_alternative
  - marker: b
    text: '''Those who saw the king’s face'' is a Hebrew idiom for those with direct access to the king, likely royal attendants or courtiers.'
    reason: cultural_note
  - marker: c
    text: Or 'enrolled' or 'conscripted' the people of the land.
    reason: lexical_alternative
