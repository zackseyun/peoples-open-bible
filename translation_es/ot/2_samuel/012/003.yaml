translation:
  language: es
  text: Pero el hombre pobre no tenía nada, excepto una sola cordera pequeña[a], que había comprado. La mantenía con vida, y crecía con él y con sus hijos[b] juntos; comía de su bocado, bebía de su copa y se acostaba en su regazo[c], y era para él como una hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una sola cordera pequeña».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hijos». En este contexto doméstico, la expresión puede abarcar naturalmente a la familia del hogar.'
    reason: lexical_alternative
  - marker: c
    text: «En su regazo» también puede traducirse «en sus brazos» o «en su seno», expresando cercanía afectuosa dentro del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשׁ
  english_pob_choice: poor man
  chosen_spanish: el hombre pobre
  alternatives_spanish:
  - el pobre
  - el hombre necesitado
  lexicon: HALOT
  rationale: El sustantivo describe a una persona pobre o desposeída. En español, "el hombre pobre" conserva la referencia masculina singular y mantiene el contraste narrativo con el hombre rico del contexto anterior.
- source_word: אֵין כֹּל כִּי אִם
  english_pob_choice: had nothing except
  chosen_spanish: no tenía nada, excepto
  alternatives_spanish:
  - no tenía nada sino
  - no tenía nada más que
  lexicon: HALOT
  rationale: La expresión hebrea comunica carencia total con una sola excepción. "No tenía nada, excepto" preserva esa exclusividad de forma natural en español.
- source_word: כִּבְשָׂה אַחַת קְטַנָּה
  english_pob_choice: one little ewe lamb
  chosen_spanish: una sola cordera pequeña
  alternatives_spanish:
  - una sola cordera pequeña y querida
  - una corderita
  lexicon: HALOT
  rationale: כִּבְשָׂה es específicamente una hembra de oveja; "cordera" mantiene el sexo del animal. "Pequeña" conserva el matiz diminutivo de קְטַנָּה sin volverlo infantil o demasiado coloquial.
- source_word: אֲשֶׁר קָנָה
  english_pob_choice: which he had bought
  chosen_spanish: que había comprado
  alternatives_spanish:
  - que había adquirido
  - que compró
  lexicon: HALOT
  rationale: קנה puede significar comprar o adquirir. "Había comprado" es directo, natural y conserva la idea de posesión establecida por la compra.
- source_word: וַיְחַיֶּהָ
  english_pob_choice: He kept it alive
  chosen_spanish: La mantenía con vida
  alternatives_spanish:
  - La criaba
  - La preservaba con vida
  lexicon: HALOT
  rationale: El verbo en causativo expresa sostener/guardar la vida. "La mantenía con vida" reproduce ese sentido de cuidado continuo sin añadir más de lo que el hebreo dice.
- source_word: וַתִּגְדַּל
  english_pob_choice: it grew up
  chosen_spanish: crecía
  alternatives_spanish:
  - creció
  - fue creciendo
  lexicon: HALOT
  rationale: El verbo indica crecimiento y desarrollo. En esta escena doméstica, "crecía" transmite el proceso de manera natural en español.
- source_word: עִמּוֹ וְעִם בָּנָיו יַחְדָּו
  english_pob_choice: with him and with his children together
  chosen_spanish: con él y con sus hijos juntos
  alternatives_spanish:
  - con él y con sus hijos
  - con él y con sus hijos a la vez
  lexicon: HALOT
  rationale: La frase subraya convivencia compartida en la casa. Aunque la forma hebrea es literalmente "sus hijos", en este contexto "hijos" mantiene la referencia familiar natural; "juntos" conserva יַחְדָּו.
- source_word: מִפִּתּוֹ
  english_pob_choice: from his morsel
  chosen_spanish: de su bocado
  alternatives_spanish:
  - de su pan
  - de su comida
  lexicon: HALOT
  rationale: פַּת alude a una porción pequeña de alimento, especialmente de pan. "Bocado" reproduce la imagen íntima de compartir la propia porción.
- source_word: מִכֹּסוֹ
  english_pob_choice: from his cup
  chosen_spanish: de su copa
  alternatives_spanish:
  - de su vaso
  lexicon: HALOT
  rationale: La imagen es sencilla y concreta. "Copa" mantiene bien el paralelo con el hebreo y la forma literaria del pasaje.
- source_word: בְחֵיקוֹ
  english_pob_choice: in his bosom
  chosen_spanish: en su seno[c]
  alternatives_spanish:
  - en sus brazos
  - en su regazo
  lexicon: HALOT
  rationale: חֵיק puede referirse al pecho, regazo o seno en sentido de cercanía afectuosa. "En su seno" conserva la imagen tradicional de intimidad doméstica; se documentan alternativas posibles porque el español abre ese campo semántico.
- source_word: תִשְׁכָּב
  english_pob_choice: lie
  chosen_spanish: se acostaba
  alternatives_spanish:
  - se recostaba
  - yace
  lexicon: HALOT
  rationale: El verbo literalmente significa acostarse o yacer. "Se acostaba" sigue la imagen física sin forzar la idea de dormir.
- source_word: וַתְּהִי לוֹ כְּבַת
  english_pob_choice: it was like a daughter to him
  chosen_spanish: y era para él como una hija
  alternatives_spanish:
  - y le era como una hija
  - y fue para él como una hija
  lexicon: HALOT
  rationale: La comparación afectiva se conserva de forma idiomática. "Era para él como una hija" suena natural en español y mantiene la ternura del hebreo.
theological_decisions:
- issue: Imagen doméstica afectiva de la cordera
  english_pob_reading: Retain the intimate familial language straightforwardly
  chosen_spanish_reading: Conservar sin suavizar la imagen afectiva y doméstica
  alternative_spanish_readings:
  - Atenuar la personificación para evitar exceso de ternura
  - volver más literal la escena sin referencias familiares
  rationale: La parábola intensifica a propósito el pathos mediante el trato casi familiar de la cordera. La traducción debe preservar esa fuerza emocional en vez de rebajarla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderización de בָּנָיו
  english_pob_reading: children
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus varones
  - sus muchachos
  rationale: Aunque la forma hebrea es formalmente masculina plural, en español "sus hijos" comunica naturalmente la pertenencia familiar y la convivencia doméstica que el contexto demanda.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que prefirió 'little' frente a 'small' para קְטַנָּה; por eso se eligió 'pequeña' en español, evitando un tono demasiado técnico o frío. También se respetó la decisión auditada de mantener la escena doméstica íntima y la equivalencia funcional de 'children' para בָּנָיו.
  spanish_consistency_notes:
  - Se mantuvo 'cordera' para reflejar el sexo femenino del animal y la imagen pastoral del hebreo.
  - Se evitó 'SEÑOR' o términos de máscara porque este versículo no contiene el nombre divino.
  - Se conservó el paralelismo 'de su bocado... de su copa... en su seno' para respetar la cadencia del hebreo.
  - El uso de 'era para él como una hija' mantiene la simetría afectiva del cierre sin añadir información.
