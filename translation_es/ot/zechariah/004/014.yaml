    rationale: Es más limpio anclar la nota léxica directamente después de «aceite» y la nota alternativa después de la cláusula relevante, sin una nota final adicional tras las comillas.
  revised_spanish_text: 'Y dijo: «Estos son los dos hijos del aceite[a], los que están junto al Señor de toda la tierra[b]».'
