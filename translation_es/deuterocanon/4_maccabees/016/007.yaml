translation:
  language: es
  text: ¡Oh, siete vanos embarazos, y siete períodos[a] de diez meses, y lactancias sin fruto, y miserables crianzas con leche!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «períodos de diez meses», reflejando el modo antiguo de contar la duración normal del embarazo.
    reason: cultural_note
lexical_decisions:
- source_word: ὦ μάταιοι
  english_pob_choice: futile / wasted
  chosen_spanish: vanas
  alternatives_spanish:
  - fútiles
  - inútiles
  - vacías
  lexicon: LSJ
  rationale: El griego abre con una exclamación de lamento; «vanas» conserva ese tono y el valor de algo que no llegó a su fin esperado. En español suena más natural y solemne que «fútiles» o «inútiles» en una lamentación poética.
- source_word: κυοφορίαι
  english_pob_choice: pregnancies
  chosen_spanish: gestaciones
  alternatives_spanish:
  - embarazos
  - pregnancias
  - concepciones
  lexicon: LSJ
  rationale: La palabra griega refiere al acto de llevar en el vientre. «Gestaciones» es precisa, digna y no fuerza una lectura moderna más coloquial que el texto no pide.
- source_word: ἑπτὰ δεκάμηνοι
  english_pob_choice: seven ten-month terms
  chosen_spanish: siete períodos de diez meses
  alternatives_spanish:
  - siete términos de diez meses
  - siete embarazos de diez meses
  - siete períodos decimonovenales
  lexicon: LSJ
  rationale: Se conserva el idiomatismo cultural del cálculo antiguo de la gestación sin explicarlo dentro del texto. «Períodos de diez meses» mantiene la referencia temporal y su carácter lamentativo.
- source_word: ἀνόνητοι
  english_pob_choice: useless / fruitless
  chosen_spanish: estériles
  alternatives_spanish:
  - inútiles
  - sin provecho
  - sin fruto
  lexicon: LSJ
  rationale: Aunque «estériles» puede sugerir infertilidad literal, aquí funciona metafóricamente para lo que no produjo el resultado deseado. En la serie poética enlaza bien con la imagen de parto y crianza.
- source_word: ἄκαρποι
  english_pob_choice: fruitless / unproductive
  chosen_spanish: estériles
  alternatives_spanish:
  - sin fruto
  - infructuosas
  - sin resultado
  lexicon: LSJ
  rationale: Se repite deliberadamente un campo semántico de esterilidad/ausencia de fruto, porque el griego acumula calificaciones negativas. La repetición en español preserva la insistencia retórica de la lamentación.
- source_word: τιθηνίαι
  english_pob_choice: nursing
  chosen_spanish: lactancias
  alternatives_spanish:
  - crianzas al pecho
  - amamantamientos
  - nursing
  lexicon: LSJ
  rationale: El término apunta a la acción de amamantar o criar al pecho. «Lactancias» es elevado y breve, adecuado para una frase exclamativa compacta.
- source_word: γαλακτοτροφίαι
  english_pob_choice: suckling
  chosen_spanish: alimentaciones con leche
  alternatives_spanish:
  - amamantamientos
  - crianzas con leche
  - lactancias
  lexicon: LSJ
  rationale: El compuesto significa nutrir con leche. «Alimentaciones con leche» reproduce con claridad el contenido del compuesto sin introducir una expresión demasiado técnica o demasiado moderna.
theological_decisions:
- issue: Conservar la estructura de lamento exclamativo sin convertirla en prosa explicativa
  english_pob_reading: Kept as compressed exclamatory noun phrases rather than expanding into full clauses.
  chosen_spanish_reading: Se mantiene como una cadena de exclamaciones nominales, sin añadir verbos finitos.
  alternative_spanish_readings:
  - ¡Oh, cuán vanos fueron...!
  - Tus siete gestaciones fueron vanas...
  rationale: El griego presenta una serie condensada de invocaciones/lamentos. En español, expandirla a oraciones completas suavizaría la fuerza poética y haría perder la brusquedad retórica del texto.
  doctrine_reference: Poética bíblica y equivalencia óptima; respeto de la forma retórica del original.
- issue: Implicación cultural de «diez meses» en la gestación
  english_pob_reading: Translated literally as 'ten-month terms' with explanatory footnote.
  chosen_spanish_reading: Se traduce literalmente como «períodos de diez meses», con nota si fuera necesario.
  alternative_spanish_readings:
  - embarazos a término
  - gestaciones completas
  rationale: El texto presupone un modo antiguo de contar la gestación. La traducción conserva ese dato cultural en lugar de normalizarlo a una expresión médica moderna.
  doctrine_reference: Claridad moderna sin borrar el trasfondo histórico-cultural del testimonio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió un tono más formal y compacto en las descripciones. Por eso la versión española conserva la concisión del lamento y evita expandir las frases en cláusulas completas. También se atendió a la tensión léxica entre términos cercanos de esterilidad/frustración, manteniéndolos como un paralelismo acumulativo en vez de diversificarlos en exceso.
  spanish_consistency_notes:
  - Se usa «gestaciones» para κυοφορίαι y no «concepciones», porque el contexto mira al llevar en el vientre y al lamento materno retrospectivo.
  - Se conserva la repetición de un campo semántico de esterilidad con «estériles» para ἀνόνητοι y ἄκαρποι, reflejando la acumulación del griego.
  - «Lactancias» y «alimentaciones con leche» diferencian los dos últimos miembros del paralelismo sin perder su relación temática.
  - La puntuación reproduce la serie exclamativa del original, con coma antes de cada miembro para mantener el ritmo de lamento.
