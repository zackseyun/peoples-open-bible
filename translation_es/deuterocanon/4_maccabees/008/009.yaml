translation:
  language: es
  text: Y después de cambiar su manera de vivir[a], disfruten de su juventud. Porque si por su desobediencia me hacen enojar, me obligarán, con terribles castigos, a destruir a cada uno de ustedes por medio de torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «si por su desobediencia disponen de mí airadamente». La frase griega es difícil; el texto principal expresa el sentido más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταδιαιτηθέντες
  english_pob_choice: after changing your way of life
  chosen_spanish: después de cambiar su manera de vivir
  alternatives_spanish:
  - después de adoptar otra forma de vida
  - después de reformar su conducta
  - después de cambiar su modo de vivir
  lexicon: LSJ
  rationale: El participio expresa cambio de régimen o modo de vida. En español, «cambiar su manera de vivir» conserva el valor conductual sin introducir explícitamente el lenguaje de arrepentimiento, que no está formulado aquí de manera directa en griego.
- source_word: ἐντρυφήσατε
  english_pob_choice: enjoy
  chosen_spanish: disfruten
  alternatives_spanish:
  - gocen
  - deléitense
  - entreguense al disfrute
  lexicon: LSJ
  rationale: El imperativo significa disfrutar o deleitarse. «Disfruten» mantiene el tono exhortativo y encaja con la referencia a la juventud sin cargar el texto con una connotación moral ajena al griego.
- source_word: ταῖς νεότησιν ὑμῶν
  english_pob_choice: your youth
  chosen_spanish: su juventud
  alternatives_spanish:
  - sus años de juventud
  - su edad juvenil
  - su juventud en años
  lexicon: LSJ
  rationale: El plural dativo se entiende naturalmente como el período de la juventud. «Su juventud» es la forma más idiomática y fiel en español.
- source_word: ὀργίλως
  english_pob_choice: to anger / make me angry
  chosen_spanish: me hagan enojar
  alternatives_spanish:
  - me provoquen a ira
  - me irriten
  - me enfurezcan
  lexicon: LSJ
  rationale: El adverbio y la construcción con διαθῆσθε apuntan al efecto de provocar enojo. «Me hagan enojar» transmite de forma natural ese resultado en español, sin añadir una formulación excesivamente técnica o arcaica.
- source_word: διαθῆσθε
  english_pob_choice: you make me angry
  chosen_spanish: me hagan enojar
  alternatives_spanish:
  - me traten de cierta manera
  - me dispongan así
  - me irriten
  lexicon: LSJ
  rationale: 'El medio de διατίθημι aquí tiene un sentido idiomático y afectivo. En contexto, la mejor equivalencia española es la que expresa el efecto sobre el hablante: causar su enojo.'
- source_word: ἀπειθείας
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - rebeldía
  - negativa a obedecer
  - inconformidad
  lexicon: LSJ
  rationale: ἀπείθεια designa desobediencia o negativa a obedecer. «Desobediencia» es la traducción más directa y clara.
- source_word: δειναῖς κολάσεσιν
  english_pob_choice: through dreadful punishments
  chosen_spanish: por medio de terribles castigos
  alternatives_spanish:
  - mediante castigos espantosos
  - a través de castigos terribles
  - con castigos atroces
  lexicon: LSJ
  rationale: La expresión intensifica la severidad de los castigos. «Por medio de terribles castigos» conserva el valor instrumental y la gravedad del griego con un español natural.
- source_word: βασάνων
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  - instrumentos de tortura
  lexicon: LSJ
  rationale: βάσανος remite aquí a tortura judicial o tormento. «Torturas» es breve, fiel y suficientemente fuerte para el contexto.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: a destruir
  alternatives_spanish:
  - a matar
  - a dar muerte a
  - a aniquilar
  lexicon: LSJ
  rationale: ἀπόλλυμι puede significar destruir o matar. Se conserva «destruir» para respetar la elección verbal del griego, dejando que el contexto de torturas implique la muerte.
- source_word: ἕνα ἕκαστον ὑμῶν
  english_pob_choice: each one of you
  chosen_spanish: a cada uno de ustedes
  alternatives_spanish:
  - a cada uno de ustedes individualmente
  - a cada uno
  - a todos y cada uno de ustedes
  lexicon: LSJ
  rationale: La expresión distributiva enfatiza aplicación individual. «A cada uno de ustedes» preserva ese énfasis de manera natural.
theological_decisions:
- issue: Interpretación de ἐὰν ὀργίλως με διαθῆσθε
  english_pob_reading: if by your disobedience you make me angry
  chosen_spanish_reading: si por su desobediencia me hacen enojar
  alternative_spanish_readings:
  - si por su desobediencia me tratan con ira
  - si de manera airada me disponen
  - si con su desobediencia me provocan a ira
  rationale: El griego es idiomático y la lectura más coherente en contexto es que la desobediencia de ellos provoque el enojo del hablante. La traducción española conserva esa relación causal sin resolver la tensión del original ni suavizar la amenaza.
  doctrine_reference: Prioridad del texto original y preservación de la tensión lexical; no armonizar con fórmulas tradicionales.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «But» por «For» para reflejar ἐπεὶ y ajustó la frase del enojo a una correspondencia más directa con ὀργίλως ... διαθῆσθε. La versión española sigue esa misma decisión, usando «Porque» y una formulación causal directa («me hacen enojar»), sin perder el valor amenazante del cierre.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece ningún tetragrámaton ni κύριος divino en el texto fuente.
  - Se usó «desobediencia» en lugar de «rebeldía» para conservar la equivalencia lexical directa de ἀπείθεια.
  - «Torturas» se reservó para βάσανοι, mientras que «castigos» traduce κολάσεσιν, preservando la diferencia entre pena y medio de ejecución.
