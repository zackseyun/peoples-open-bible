translation:
  language: es
  text: Si es así[a], nuestro Dios, a quien servimos, es capaz de librarnos del horno de fuego ardiente[b], y nos librará de tu mano[c], oh, rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Si existe [tal caso]». La apertura aramea es idiomática y remite a la amenaza del rey.'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «del horno ardiente de fuego».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «él puede librarnos» o «que nos libre». El arameo puede entenderse de forma diferente, aunque el texto principal adopta una afirmación confiada.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן אִיתַי
  english_pob_choice: If it is so
  chosen_spanish: Si es así
  alternatives_spanish:
  - Si existe tal caso
  - Si esto es así
  lexicon: HALOT
  rationale: La apertura aramea es idiomática y retoma la amenaza del rey; en español, «Si es así» expresa el valor condicional sin forzar una traducción literal de cada partícula.
- source_word: אֱלָהַנָא
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: El poseído plural inclusivo se expresa de manera natural y reverente como «nuestro Dios».
- source_word: דִּי אֲנַחְנָא פָלְחִין
  english_pob_choice: whom we serve
  chosen_spanish: a quien servimos
  alternatives_spanish:
  - a quien adoramos
  - que servimos
  lexicon: HALOT
  rationale: פְּלַח conserva la idea de servicio devocional; «servimos» mantiene el verbo base sin reducirlo a un mero acto litúrgico ni desplazarlo innecesariamente hacia «adoramos».
- source_word: יָכִל
  english_pob_choice: is able
  chosen_spanish: es capaz de
  alternatives_spanish:
  - puede
  - tiene poder para
  lexicon: HALOT
  rationale: «Es capaz de» refleja la capacidad afirmada por el verbo y su tono solemne, equivalente al inglés POB «is able».
- source_word: לְשֵׁיזָבוּתַנָא
  english_pob_choice: to deliver us
  chosen_spanish: librarnos
  alternatives_spanish:
  - rescatarnos
  - salvarnos
  lexicon: HALOT
  rationale: El verbo denota liberación de peligro; «librarnos» conserva bien esa fuerza en español contemporáneo sin perder el registro bíblico.
- source_word: מִן אַתּוּן נוּרָא יָקִדְתָּא
  english_pob_choice: from the furnace of blazing fire
  chosen_spanish: del horno de fuego ardiente
  alternatives_spanish:
  - del horno de fuego abrasador
  - del horno de ardiente fuego
  - del horno de fuego encendido
  lexicon: HALOT
  rationale: אַתּוּן es «horno»; la triple acumulación semántica se mantiene con «fuego ardiente». La combinación resulta natural en español y conserva el énfasis intensivo del arameo.
- source_word: וּמִן יְדָךְ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu dominio
  lexicon: HALOT
  rationale: La imagen idiomática de liberación del poder de alguien se conserva con «de tu mano», como en el texto inglés y el uso bíblico.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - ¡oh rey!
  - rey
  lexicon: HALOT
  rationale: Se mantiene la vocación directa con el vocativo solemne «oh rey».
- source_word: יְשֵׁיזִב
  english_pob_choice: he will deliver
  chosen_spanish: nos librará
  alternatives_spanish:
  - nos rescatará
  - nos salvará
  - que nos libre
  lexicon: HALOT
  rationale: El imperfecto se entiende como afirmación confiada y no se suaviza a mera posibilidad; «nos librará» conserva la seguridad declarativa del inglés POB y deja intacta la tensión teológica del verso siguiente.
theological_decisions:
- issue: Fuerza del imperfecto final יְשֵׁיזִב
  english_pob_reading: 'confident future assertion: ''he will deliver us'''
  chosen_spanish_reading: 'afirmación confiada: «nos librará»'
  alternative_spanish_readings:
  - «que nos libre»
  - «nos puede librar»
  - «nos librará o nos librará»
  rationale: El contexto favorece una confesión audaz ante el rey; no conviene rebajar el verbo a mero deseo. La traducción mantiene la confianza en la capacidad y la acción divina sin resolver de antemano la tensión que el versículo siguiente dejará explícita.
  doctrine_reference: Preservar la tensión teológica en Daniel 3:17–18
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada recientemente y quedó sin cambios; el consenso general es alto. Esta propuesta española sigue de cerca las decisiones léxicas y la lectura teológica documentadas, manteniendo la tensión del futuro imperfecto y la apertura idiomática del arameo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהַנָא, en consonancia con el estándar del proyecto.
  - Se mantiene «servimos» para פָֽלְחִ֔ין, evitando sustituirlo por «adoramos» sin necesidad contextual.
  - «Librar» conserva el valor de rescate/deliverance y armoniza con el registro bíblico.
  - Se conserva el vocativo explícito «oh rey» para מַלְכָּא.
  - La nota a evita sobrecargar la frase con una literalidad poco natural, pero marca la abertura idiomática del arameo.
