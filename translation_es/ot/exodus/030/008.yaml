translation:
  language: es
  text: Y cuando Aarón coloque las lámparas al atardecer[a], quemará incienso regularmente[b] delante de Yahvé, a lo largo de sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “entre las tardes”, un modismo para el período del atardecer.'
    reason: lexical_alternative
  - marker: b
    text: O “incienso continuo”. El hebreo puede poner el acento en la regularidad prescrita o en la perpetuidad de la ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַעֲלֹת
  english_pob_choice: And when ... sets up
  chosen_spanish: Cuando ... coloque
  alternatives_spanish:
  - y cuando ... encienda
  - y cuando ... disponga
  lexicon: HALOT
  rationale: 'El infinitivo con prefijo temporal introduce una acción circunstancial: ''cuando''. En contexto tabernacular, el verbo puede referirse no solo a encender, sino a poner en orden o disponer las lámparas para su servicio. ''Coloque'' conserva esa amplitud ritual sin reducirlo solo al encendido.'
- source_word: הַנֵּרֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  - las lámparas/llamas
  lexicon: HALOT
  rationale: נֵרֹת es el término normal para las lámparas del santuario; 'lámparas' es la equivalencia más directa y clara en español.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: at twilight
  chosen_spanish: al atardecer
  alternatives_spanish:
  - entre las dos tardes
  - al caer la tarde
  lexicon: HALOT
  rationale: El hebreo es un modismo cultual que literalmente significa 'entre las tardes'. En español, 'al atardecer' comunica bien el periodo vespertino sin sonar forzado. Se preserva la alternativa literal en nota porque la expresión tiene valor técnico y tradicional.
- source_word: יַקְטִירֶנָּה
  english_pob_choice: he shall burn it
  chosen_spanish: quemará incienso
  alternatives_spanish:
  - lo hará arder
  - lo ofrecerá en humo
  lexicon: HALOT
  rationale: En contextos de incienso, קטר expresa hacer subir humo / quemar como ofrenda. En español, 'quemará incienso' es natural y mantiene la idea cultual; el objeto implícito se integra de forma idiomática.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - ofrenda de incienso
  - perfume
  lexicon: HALOT
  rationale: El sustantivo designa incienso; el sentido de ofrenda ya queda implicado por el verbo ritual.
- source_word: תָּמִיד
  english_pob_choice: regular
  chosen_spanish: regular
  alternatives_spanish:
  - continua
  - perpetua
  lexicon: HALOT
  rationale: Como en el inglés POB, aquí destaca la recurrencia prescrita, no la incesancia absoluta. 'Regular' comunica bien la idea de acto ordenado y repetido. Se conserva la tensión semántica con 'continua'/'perpetua' como alternativas.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי indica posición/presencia delante de Dios en el espacio cultual. Se mantiene 'Yahvé' como nombre divino según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El tetragrámaton se translitera como 'Yahvé' en español para preservar el nombre personal del Dios del pacto, en línea con la norma del proyecto.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por vuestras generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La frase expresa vigencia a través de generaciones sucesivas. 'Por todas sus generaciones' suena natural en español bíblico contemporáneo y conserva la fuerza durativa del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide no ocultar el nombre divino tras una sustitución de título. 'Yahvé' conserva la referencia al nombre revelado a Israel y sigue la convención española establecida para este texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de תָּמִיד en un rito periódico
  english_pob_reading: regular
  chosen_spanish_reading: regular
  alternative_spanish_readings:
  - continua
  - perpetua
  rationale: La ofrenda no es incesante en sentido físico, sino establecida como práctica recurrente. 'Regular' evita exagerar la continuidad y preserva la tensión entre habitualidad y permanencia normativa.
  doctrine_reference: Exodus 30 cultic ordinance context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la puntuación para una lectura más formal y fluida; en español se optó por una sola cláusula temporal inicial y una estructura directa sin guion, manteniendo la solemnidad y la claridad. También se respetó la decisión auditada de no traducir mecánicamente el modismo hebreo y de conservar la tensión de תָּמִיד mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Al atardecer'' funciona como equivalente idiomático de ''entre las tardes''; por eso lleva nota.'
  - '''Quemará incienso'' expresa el verbo cultual sin añadir elementos no presentes en el hebreo.'
  - '''Regular'' se usa consistentemente para תָּמִיד cuando el contexto apunta a prescripción recurrente.'
