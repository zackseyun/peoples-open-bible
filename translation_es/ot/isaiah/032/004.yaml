    rationale: Aunque replica de cerca el inglés, en español carece de artículo y suena rígido. 'Entenderá el conocimiento' preserva el valor nominal de לָדַעַת con mejor legibilidad.
  - severity: low
    issue: '''los apresurados'' debilita el matiz de impulsividad'
    rationale: El hebreo נמהרים y la nota inglesa destacan 'rash/impulsive'. 'Los precipitados' expresa mejor esa cualidad estable que una mera prisa circunstancial.
  - severity: low
    issue: La nota [b] está anclada solo a 'claramente' en vez de a la frase verbal relevante
    rationale: La alternativa inglesa corresponde a 'will be quick to speak plainly/distinctly', no solo al adverbio final. En español conviene mantener la nota al final de la frase para cubrir toda la expresión.
  revised_spanish_text: El corazón de los precipitados entenderá el conocimiento[a], y la lengua de los tartamudos se apresurará a hablar claramente[b].
  revised_footnotes:
