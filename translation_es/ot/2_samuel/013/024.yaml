  rationale: 'Se hicieron dos ajustes menores para mayor fidelidad y naturalidad: «vino al rey» representa mejor וַיָּבֹא que «fue al rey», y «vayan» concuerda naturalmente con el sujeto compuesto «el rey y sus siervos». Se conserva el resto del borrador, incluida la nota léxica, porque refleja bien el hebreo y el rastro de auditoría del POB inglés.'
