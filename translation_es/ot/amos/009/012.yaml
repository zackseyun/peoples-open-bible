revisions:
- from: para que posean el remanente de Edom y de todas las naciones, sobre las cuales es invocado mi nombre[a]”, declara Yahvé[b], el que hace esto.
  to: para que posean el remanente de Edom y todas las naciones que son llamadas por mi nombre[a]”, declara Yahvé[b], quien hace esto.
  rationale: Se ajusta la coordinación del objeto directo para reflejar mejor el hebreo ('y todas las naciones') y se restituye en el texto principal la opción idiomática que comunica pertenencia ('que son llamadas por mi nombre'), dejando la formulación más literal en nota, en línea con la auditoría del POB inglés. También se suaviza 'el que hace esto' a 'quien hace esto' por naturalidad sin pérdida de sentido.
