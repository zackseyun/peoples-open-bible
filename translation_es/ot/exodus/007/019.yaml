  to: 'Entonces Yahvé dijo a Moisés: «Di a Aarón: “Toma tu vara y extiende tu mano sobre las aguas de Egipto —sobre sus ríos, sobre sus canales, sobre sus estanques y sobre todo depósito de sus aguas— para que se conviertan en sangre. Y habrá sangre en toda la tierra de Egipto, incluso en vasos de madera y de piedra[a]”».[b]'
