review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: el incienso preparado según su composición no debe hacerse para uso propio, porque es santo y está dedicado a Yahvé. También mantiene correctamente el singular representativo en ‘para ti’ y el nombre divino ‘Yahvé’. Sin embargo, la cláusula final ‘santo será para ti para Yahvé’ suena poco natural en español y no expresa con suficiente claridad la relación cultual de dedicación indicada por לַיהוָה.'
  spanish_quality_summary: El español es mayormente claro, pero presenta una frase final rígida y algo calcada. ‘No lo harás para ustedes’ mezcla singular y plural, lo que debilita la concordancia interna del mandato; además, la decisión léxica documentada dice ‘no lo haréis para ustedes’, mientras que el texto puesto dice ‘harás’. Conviene regularizar la persona verbal y mejorar la naturalidad de la última cláusula sin perder el sentido de consagración.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה → ‘Yahvé’, קֹדֶשׁ → ‘santo’, הַקְּטֹרֶת → ‘incienso’. No hay conflicto doctrinal. El único ajuste necesario es estilístico-sintáctico para reflejar mejor ‘holy to you for Yahweh’ en español natural: ‘será santo para ti, dedicado a Yahvé’.'
  issues:
  - severity: medium
    issue: Mezcla de persona verbal en ‘no lo harás para ustedes’
    rationale: El hebreo pasa de singular (‘que hagas’) a plural (‘no haréis’), pero en español el borrador combina singular con plural de manera incoherente. Debe regularizarse a una forma natural y fiel al mandato dirigido al pueblo.
  - severity: medium
    issue: Frase final ‘santo será para ti para Yahvé’ es poco idiomática
    rationale: Aunque intenta conservar ambos complementos, ‘para ti para Yahvé’ suena forzado en español y puede oscurecer la idea de consagración exclusiva a Yahvé. Una reformulación breve y fiel mejora la legibilidad.
  revised_spanish_text: Y el incienso que hagas según su composición[a], no lo harán para ustedes[b]; será santo para ti, dedicado a Yahvé.
  revised_footnotes:
