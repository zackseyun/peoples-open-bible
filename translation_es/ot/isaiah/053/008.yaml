base_translation:
  language: en
  yaml_path: translation/ot/isaiah/053/008.yaml
  text: By oppression and judgment he was taken away[a]; and as for his generation, who considered that he was cut off from the land of the living[c][b], stricken for the transgression of my people?
  footnotes:
  - marker: a
    text: Or 'who spoke of,' 'who declared,' or 'who pondered' his generation; the Hebrew verb is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: '''His generation'' may refer to his contemporaries, his descendants, or more broadly his fate in his lifetime.'
    reason: alternative_reading
  - marker: c
    text: Or 'the stroke was upon him'; Hebrew לָמוֹ is formally plural but may function as a poetic singular here. Some take it as 'upon them.'
    reason: alternative_reading
