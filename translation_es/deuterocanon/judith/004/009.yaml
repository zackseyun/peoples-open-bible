    rationale: La alternativa ‘los hijos de Israel’ duplica el texto principal; debe ofrecer la otra opción documentada, ‘los hijos de Jacob’ no corresponde, así que aquí debe ser ‘los hijos de Israel’ principal y alternativas ‘los israelitas’ o ‘los descendientes de Israel’/‘los hijos de Israel’ no sirve. La mejor equivalencia del audit trail es ‘los israelitas’ o ‘los hijos del pueblo de Israel’ no es ideal; en este caso conviene usar ‘los israelitas’ y ‘los hijos de Israel’ en el texto sin segunda alternativa, o bien ‘los israelitas’ y ‘los descendientes de Israel’.
