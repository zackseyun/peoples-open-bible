translation:
  language: es
  text: mientras el ejército del rey de Babilonia combatía contra Jerusalén y contra todas las ciudades restantes de Judá[a], contra Laquis y contra Azeca, porque solo estas quedaban entre las ciudades de Judá como ciudades fortificadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades restantes de Judá, a saber, Laquis y Azeca». El hebreo identifica específicamente cuáles eran esas ciudades de Judá que todavía seguían bajo asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza militar
  - hueste
  lexicon: HALOT
  rationale: En este contexto militar, חֵיל designa una fuerza armada organizada. «Ejército» es el equivalente natural y preciso en español, manteniendo el sentido colectivo del hebreo.
- source_word: נִלְחָמִים
  english_pob_choice: was fighting
  chosen_spanish: combatía
  alternatives_spanish:
  - estaba combatiendo
  - luchaba
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso. En español, el imperfecto «combatía» conserva bien la duración del conflicto sin sonar forzado.
- source_word: הַנּוֹתָרוֹת
  english_pob_choice: the remaining
  chosen_spanish: restantes
  alternatives_spanish:
  - que quedaban
  - las que quedaban
  lexicon: HALOT
  rationale: El participio adjetival modifica «ciudades de Judá» e indica las que todavía no habían caído. «Restantes» reproduce esa función de manera clara y sobria.
- source_word: אֶל לָכִישׁ וְאֶל עֲזֵקָה
  english_pob_choice: against Lachish and against Azekah
  chosen_spanish: contra Laquis y contra Azeca
  alternatives_spanish:
  - contra Laquis y Azeca
  - es decir, Laquis y Azeca
  lexicon: HALOT
  rationale: Sigo la repetición preposicional del hebreo con «contra... y contra...», que el audit trail inglés decidió preservar al revisar la versión más explicativa. «Laquis» y «Azeca» son las formas españolas usuales de estos topónimos.
- source_word: כִּי הֵנָּה
  english_pob_choice: for these alone
  chosen_spanish: porque estas solas
  alternatives_spanish:
  - pues solo estas
  - porque solo estas
  lexicon: HALOT
  rationale: 'La frase introduce la razón restrictiva: únicamente esas dos ciudades seguían en pie. «Estas solas» conserva esa restricción sin añadir explicación interpretativa extra.'
- source_word: נִשְׁאֲרוּ
  english_pob_choice: remained
  chosen_spanish: habían quedado
  alternatives_spanish:
  - quedaron
  - permanecieron
  lexicon: HALOT
  rationale: El verbo expresa continuidad de supervivencia frente a las demás ciudades ya tomadas. «Habían quedado» en español transmite bien ese resultado anterior con valor de estado presente en el relato.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: among the cities of Judah
  chosen_spanish: entre las ciudades de Judá
  alternatives_spanish:
  - en las ciudades de Judá
  - dentro de las ciudades de Judá
  lexicon: HALOT
  rationale: 'El contexto es partitivo: estas dos ciudades quedan como las últimas entre el conjunto. «Entre» comunica mejor esa relación que un simple locativo.'
- source_word: עָרֵי מִבְצָר
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades amuralladas
  - plazas fuertes
  lexicon: HALOT
  rationale: La construcción denomina ciudades con defensas militares. «Ciudades fortificadas» es el equivalente más natural y estándar en español para mantener la fuerza descriptiva del hebreo.
translation_notes:
  revision_awareness: La redacción sigue la revisión del audit trail inglés que prefirió repetir la preposición «against»/«contra» en lugar de introducir una explicación explícita tipo «es decir», para reflejar con más literalidad la sintaxis hebrea sin perder claridad en español. También conserva el matiz partitivo de «among the cities of Judah».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - 'Los topónimos se adaptan a las formas españolas habituales: Jerusalén, Judá, Laquis, Azeca.'
  - Se conservó la repetición de «contra» para reflejar el paralelismo del hebreo y evitar una glosa interpretativa excesiva.
