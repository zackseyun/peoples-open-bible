revisions:
- from: No te inclines a él, ni le escuches[a]; tu ojo no tendrá piedad de él[b], no lo perdonarás, ni lo encubrirás[c].
  to: No cedas ante él[a], ni lo escuches; tu ojo no tendrá piedad de él[b], ni lo eximirás, ni lo encubrirás[c].
  rationale: Se reemplaza «No te inclines a él» por «No cedas ante él» para reflejar mejor el sentido de consentir o ceder a la seducción. Se sustituye «no lo perdonarás» por «ni lo eximirás» para diferenciarlo del hebraísmo anterior sobre piedad y para acercarlo al sentido judicial de ‘no spared/no ahorrar’, evitando la idea de absolución personal. También se ajusta la coordinación con «ni» para mantener la acumulación de prohibiciones del original.
