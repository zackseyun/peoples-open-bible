revisions:
- from: Entonces Moisés hizo acercarse[a] a los hijos de Aarón, y los vistió con túnicas, y les ciñó fajas, y les ajustó gorros[b], tal como Yahvé había mandado a Moisés.
  to: Entonces Moisés hizo acercarse[a] a los hijos de Aarón, y los vistió con túnicas, y les ciñó ceñidores, y les puso turbantes[b], tal como Yahvé había mandado a Moisés.
  rationale: Se reemplazó «fajas» por «ceñidores» para reflejar mejor la prenda sacerdotal textil que se ciñe a la cintura, y «gorros» por «turbantes» para evitar un tono demasiado cotidiano y mantener la dignidad ceremonial del pasaje. También se ajustó la nota correspondiente para explicar mejor la prenda en su contexto sacerdotal.
