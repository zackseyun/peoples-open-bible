review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: כִּי como base argumentativa, יָדַע como verdad general presente, מְתֵי שָׁוְא como personas caracterizadas por falsedad, וַיַּרְא temporalizado naturalmente, y la cláusula final correctamente entendida como pregunta retórica con nota de alternativa. La nota también preserva adecuadamente la posibilidad de una negación simple.'
  spanish_quality_summary: 'El español es claro y digno, pero dos giros suenan algo poco naturales o demasiado calcados: «hombres de falsedad» y «la toma en cuenta». En español bíblico natural y legible, «hombres falsos» comunica mejor מְתֵי שָׁוְא sin perder el perfil moral, y «¿no se fija en ella?» o «¿no la considera?» refleja mejor יִתְבּוֹנָן que «tomar en cuenta», que puede sonar más administrativo que observacional. También «maldad» es más natural que «iniquidad» aquí, aunque «iniquidad» no es incorrecto.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La decisión teológica sobre la pregunta retórica está bien preservada. La revisión propuesta mejora naturalidad española sin apartarse del razonamiento léxico documentado.
  issues:
  - severity: medium
    issue: «los hombres de falsedad» suena calcado y poco idiomático en español
    rationale: Aunque reproduce la construcción hebrea, en español moderno y eclesial resulta rígido. «los hombres falsos» conserva el sentido moral de שָׁוְא y mantiene buena legibilidad.
  - severity: medium
    issue: «¿no la toma en cuenta?» no refleja de la mejor manera el matiz de יִתְבּוֹנָן
    rationale: El verbo hebreo apunta a notar, observar atentamente, considerar. «Tomar en cuenta» puede entenderse como valorar o considerar para decidir, no necesariamente como percibir/notar. «¿no se fija en ella?» o «¿no la considera?» es más cercano y natural.
  - severity: low
    issue: «iniquidad» es posible, pero «maldad» suena más natural en español neutral
    rationale: El inglés POB eligió «wickedness». «Iniquidad» conserva peso moral, pero «maldad» comunica con mayor claridad contemporánea y amplitud eclesial.
  revised_spanish_text: Porque él conoce a los hombres falsos; cuando ve la maldad[a], ¿no se fija en ella?
  revised_footnotes:
