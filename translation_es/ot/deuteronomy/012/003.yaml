  source_alignment_summary: 'El borrador español refleja bien la secuencia verbal del hebreo y conserva la fuerza destructiva del mandato: altares, pilares sagrados, asheras, imágenes talladas y la eliminación de su nombre del lugar. Sin embargo, hay un desajuste importante en la nota [a]: está anclada a ''altares'', pero su contenido explica אֲשֵׁרֵיהֶם o, en parte, terminología de objetos cultuales alternativos, no מִזְבּחֹתָם. Además, el POB inglés sitúa la nota lexical sobre Asherah en ese segmento, no sobre ''altares''. Conviene reanclar y ajustar las notas para preservar fielmente el rastro de auditoría.'
