  yaml_path: translation/ot/amos/005/015.yaml
  text: Hate evil[a], and love good, and establish justice in the gate; perhaps Yahweh, the God of hosts[c][b], will be gracious to the remnant of Joseph.
  footnotes:
  - marker: a
    text: The gate was the public place where elders and officials heard legal cases and administered civic justice.
    reason: cultural_note
  - marker: b
    text: Or 'at the gate.' The Hebrew idiom refers to the place of public judgment in the city.
    reason: lexical_alternative
  - marker: c
    text: Joseph here refers to the people descended from Joseph, especially the northern kingdom; 'the remnant of Joseph' means those left after judgment.
    reason: cross_reference
