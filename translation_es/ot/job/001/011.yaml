translation:
  language: es
  text: Pero extiende tu mano, por favor, y toca todo lo que él tiene, y ciertamente te maldecirá[a] en tu cara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «te bendecirá». En Job 1:5, 1:11 y 2:5, «bendecir» suele entenderse como un eufemismo reverente para «maldecir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: HALOT
  rationale: Marca un giro adversativo fuerte frente a la declaración anterior. «Pero» es natural en español y conserva el contraste sin añadir matices innecesarios.
- source_word: שְׁלַח נָא יָדְךָ
  english_pob_choice: stretch out your hand, please
  chosen_spanish: extiende ahora tu mano, por favor
  alternatives_spanish:
  - tiende tu mano, por favor
  - alarga tu mano, por favor
  lexicon: HALOT
  rationale: «Extiende tu mano» conserva la imagen idiomática de acción/poder. Se vierte נָא con «por favor»; «ahora» refleja el tono de exhortación urgente que la partícula puede aportar en este contexto.
- source_word: וְגַע
  english_pob_choice: touch
  chosen_spanish: toca
  alternatives_spanish:
  - hiere
  - golpea
  - acerca tu mano a
  lexicon: HALOT
  rationale: La revisión inglesa optó por «touch» por cercanía al verbo hebreo נגע. En español, «toca» preserva esa literalidad sin introducir un grado de violencia que el hebreo no exige en esta forma.
- source_word: בְּכָל אֲשֶׁר ל֑וֹ
  english_pob_choice: all that he has
  chosen_spanish: todo lo que él tiene
  alternatives_spanish:
  - todo lo que posee
  - todo lo que le pertenece
  lexicon: HALOT
  rationale: Expresa de modo natural la posesión total de Job. «Lo que él tiene» mantiene la amplitud del hebreo y resulta claro para lectura pública.
- source_word: אִם לֹא
  english_pob_choice: he will surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguro que
  - sin duda
  lexicon: HALOT
  rationale: Aquí la construcción funciona de modo enfático, no como condición simple. «Ciertamente» reproduce la certeza predictiva sin forzar una estructura condicional en español.
- source_word: עַל פָּנֶיךָ
  english_pob_choice: to your face
  chosen_spanish: en tu rostro
  alternatives_spanish:
  - delante de ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea comunica confrontación abierta y directa. «En tu rostro» mantiene la fuerza figurada y el tono agresivo del dicho.
- source_word: יְבָרֲכֶךָּ
  english_pob_choice: curse you
  chosen_spanish: te maldecirá
  alternatives_spanish:
  - te bendecirá
  - te insultará
  lexicon: HALOT
  rationale: En el prólogo de Job, ברך funciona como eufemismo reverencial entendido tradicionalmente como «maldecir». En español, «te maldecirá» comunica el sentido pragmático; la alternativa literal se conserva en nota para auditoría.
theological_decisions:
- issue: Eufemismo de ברך en Job 1:11
  english_pob_reading: Render יְבָרֲכֶךָּ as 'curse you' in the main text, with a footnote preserving the literal 'bless you.'
  chosen_spanish_reading: «te maldecirá» en el texto principal, con nota que preserve el valor literal «te bendecirá»
  alternative_spanish_readings:
  - te bendecirá
  - te dirá bendiciones
  rationale: 'El contexto inmediato es acusatorio y hostil: Satanás predice la reacción de Job si es tocado en sus bienes. Mantener «maldecirá» evita oscurecer el sentido, mientras la nota conserva la tensión léxica del hebreo ברך.'
  doctrine_reference: Principio de primacía del idioma original y preservación de tensiones léxicas donde el texto las documenta.
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que corrigió la opción inglesa de 'strike' a 'touch' para ajustarse mejor al verbo hebreo נגע, manteniendo la fuerza idiomática del desafío de Satanás. También se conservó el sentido eufemístico de ברך documentado en la nota, con una redacción española natural para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «mano» y no una paráfrasis abstracta, porque el hebreo usa la imagen corporal como metonimia de acción/poder.
  - Se evita «bendecirá» en el cuerpo principal para no contradecir el uso contextual del eufemismo en Job.
  - «En tu rostro» conserva el hebraísmo de confrontación directa y resulta comprensible en español bíblico contemporáneo.
