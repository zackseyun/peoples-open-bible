translation:
  language: es
  text: Agar dio a luz un hijo para Abram, y Abram[a] puso por nombre a su hijo, que Agar dio a luz, Ismael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Abram nombró a su hijo, que Agar dio a luz, Ismael».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El hebreo ילד en qal con sujeto femenino expresa el parto. En español, 'dio a luz' comunica con naturalidad el acto de dar nacimiento sin añadir carga interpretativa.
- source_word: לְאַבְרָם
  english_pob_choice: to Abram
  chosen_spanish: para Abram
  alternatives_spanish:
  - a Abram
  lexicon: HALOT
  rationale: 'La preposición ל aquí expresa relación/beneficiario: el hijo nace en la esfera de Abram como su descendiente. ''Para Abram'' conserva bien esa relación en español bíblico natural.'
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: '''Hijo'' es el equivalente natural en español para בֵּן en este contexto genealógico. ''Un hijo'' mantiene el indefinido del hebreo.'
- source_word: וַיִּקְרָא ... שֵׁם
  english_pob_choice: called the name of
  chosen_spanish: puso por nombre a
  alternatives_spanish:
  - llamó el nombre de
  - nombró
  lexicon: HALOT
  rationale: La expresión hebrea קרא שם es idiomática. 'Puso por nombre a' reproduce con bastante transparencia el acto de nombrar sin perder naturalidad en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - de su hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa de manera directa en español como 'su hijo'. La frase se integra mejor en la construcción de nombramiento.
- source_word: אֲשֶׁר יָלְדָה הָגָר
  english_pob_choice: whom Hagar bore
  chosen_spanish: a quien Hagar había dado a luz
  alternatives_spanish:
  - que Hagar había dado a luz
  - a quien Hagar dio a luz
  lexicon: HALOT
  rationale: La relativa identifica al hijo recién mencionado. El pluscuamperfecto ('había dado a luz') refleja bien la relación retrospectiva dentro de la oración y evita ambigüedad temporal en español.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio. Mantiene reconocimiento litúrgico y lectura natural.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide sustancialmente con la auditoría inglesa: se preserva el verbo de parto, la relación לְאַבְרָם, la fórmula de nombramiento y la relativa identificadora. Se optó por una formulación española más natural (''puso por nombre a'') sin perder la estructura del original.'
  spanish_consistency_notes:
  - Se mantiene 'Abram' según el texto fuente.
  - Se conserva 'Hagar' e 'Ismael' con transliteración/forma española establecida.
  - No se introduce 'SEÑOR' ni otras sustituciones teológicas; el versículo no contiene el Tetragrámaton.
  - La nota al pie recoge la alternativa idiomática reconocida por la auditoría inglesa.
