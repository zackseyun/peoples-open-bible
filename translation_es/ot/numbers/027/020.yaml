translation:
  language: es
  text: Y pondrás sobre él parte de tu esplendor[a], para que toda la congregación de los hijos[b] de Israel lo obedezca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘parte de tu majestad’ o ‘parte de tu honor’. El hebreo הוד puede denotar esplendor o dignidad, así como la autoridad ligada al oficio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘los hijos de Israel’.'
    reason: lexical_alternative
  - marker: c
    text: O ‘lo escuche’ o ‘lo oiga’. El verbo hebreo suele llevar el sentido de oír con obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y darás
  - Y colocarás
  lexicon: HALOT
  rationale: En este contexto de investidura, נתן con עַל se entiende naturalmente como ‘poner/colocar sobre’. ‘Pondrás’ conserva la imagen de la imposición sin sonar artificial en español.
- source_word: מֵהוֹדְךָ
  english_pob_choice: some of your splendor
  chosen_spanish: parte de tu esplendor
  alternatives_spanish:
  - parte de tu majestad
  - parte de tu honra
  - parte de tu honor
  lexicon: HALOT
  rationale: הוד puede abarcar esplendor, majestad u honor. En esta escena de comisión pública, ‘esplendor’ mantiene la amplitud semántica sin introducir de entrada una glosa interpretativa como ‘autoridad’.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre él mismo
  lexicon: HALOT
  rationale: La preposición עַל con sufijo se expresa de forma directa con ‘sobre’, preservando la metáfora de confiera/transferencia.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce una cláusula final de propósito; ‘para que’ es claro y natural en español moderno.
- source_word: יִשְׁמְעוּ
  english_pob_choice: may obey
  chosen_spanish: lo obedezca
  alternatives_spanish:
  - lo escuche
  - le preste oído
  - lo escuche y obedezca
  lexicon: HALOT
  rationale: שמַע puede implicar oír, escuchar u obedecer. Dado el contexto de autoridad conferida a Josué, el sentido funcional es obediencia. El singular castellano concuerda naturalmente con ‘toda la congregación’ como sujeto colectivo.
- source_word: כָּל עֲדַת
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - la congregación entera
  lexicon: HALOT
  rationale: ‘Congregación’ es el equivalente más estable de עֵדָה en este contexto comunitario de Israel.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la forma masculina del hebreo en español bíblico claro. ‘Hijos de Israel’ mantiene la visibilidad del original sin forzar una neutralización que el texto no ofrece.
theological_decisions:
- issue: Naturaleza de lo transferido a Josué en la comisión
  english_pob_reading: The text speaks of a partial transfer of Moses' official authority to Joshua.
  chosen_spanish_reading: El texto se entiende como una participación de la dignidad/esplendor asociado al oficio de Moisés que, por el contexto, funciona como investidura pública para la obediencia del pueblo.
  alternative_spanish_readings:
  - El texto habla principalmente de autoridad oficial transferida a Josué.
  - El texto habla ante todo de honor o majestad, no de autoridad.
  rationale: El hebreo הוד es semánticamente amplio. En español, ‘esplendor’ respeta mejor esa amplitud que ‘autoridad’, pero el propósito de la cláusula final muestra que lo conferido tiene efectos de investidura pública. Por eso se evita estrechar demasiado el sentido en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de יִשְׁמְעוּ en la cláusula de propósito
  english_pob_reading: The congregation is to obey Joshua, not merely hear him.
  chosen_spanish_reading: La congregación debe obedecer a Josué, no solo oírlo.
  alternative_spanish_readings:
  - La congregación debe escucharlo
  - La congregación debe prestarle oído
  rationale: En español, ‘obedecer’ comunica con precisión el valor de שׁמע en un contexto de liderazgo y autoridad. ‘Oír’ o ‘escuchar’ sonarían incompletos aquí y podrían debilitar la finalidad del versículo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado del audit trail inglés, pero decide mantener ‘esplendor’ en el texto principal para reflejar הוד con más fidelidad semántica que ‘autoridad’. También conserva el valor funcional de יִשְׁמְעוּ como ‘obedezca’, en línea con la nota inglesa, y mantiene visible la forma ‘los hijos de Israel’ con nota explicativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando aparezca el nombre divino en este tipo de proyecto; este versículo no lo contiene.
  - Se preserva ‘hijos de Israel’ por visibilidad del hebreo, con nota para lectores que prefieran ‘israelitas’.
  - ‘Esplendor’ se elige como término principal porque permite abarcar majestad/honor/dignidad sin imponer una lectura más estrecha.
  - La sintaxis evita el calco excesivo y mantiene un español litúrgico pero actual.
