translation:
  language: es
  text: Y los hijos de Israel hicieron lo malo a los ojos de Yahvé[b][a], olvidaron a Yahvé su Dios y sirvieron a los Baales y a las Aseras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «lo malo a los ojos de Yahvé», una expresión estándar para lo que Yahvé juzgaba que era malo.
    reason: lexical_alternative
  - marker: c
    text: O «los postes de Asera». El hebreo puede referirse a objetos de culto asociados con Asera o, más ampliamente, al culto de Asera.
    reason: alternative_reading
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la estructura filia/más formal del hebreo sin sonar tan rígido como una traducción literal de «sons». En español bíblico, «hijos de Israel» mantiene la referencia corporativa y la transparencia formal del original.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  english_pob_choice: what was evil in the eyes of Yahweh
  chosen_spanish: lo malo a los ojos de Yahvé
  alternatives_spanish:
  - lo que era malo a los ojos de Yahvé
  - lo malo ante Yahvé
  - lo malo en la estimación de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula evaluativa fija. «A los ojos de» reproduce bien בְּעֵינֵי, y «lo malo» preserva el valor sustantivado del hebreo sin sobreexplicar el juicio divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no ocultarlo tras un título.'
- source_word: וַיִּשְׁכְּחוּ
  english_pob_choice: they forgot
  chosen_spanish: olvidaron
  alternatives_spanish:
  - se olvidaron de
  - abandonaron
  - desatendieron
  lexicon: HALOT
  rationale: «Olvidaron» es el equivalente más directo de שׁכח. En este contexto del pacto, el descuido práctico queda implícito sin añadir una paráfrasis interpretativa en el texto principal.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  lexicon: HALOT
  rationale: Aunque el hebreo permite una lectura genérica en abstracto, aquí el referente es Yahvé; por eso en español debe mantenerse el singular teológico «su Dios».
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron culto a
  - fueron esclavos de
  lexicon: HALOT
  rationale: עבד puede abarcar servicio y culto. «Sirvieron» conserva esa amplitud semántica y evita imponer de entrada una equivalencia más estrecha como «adoraron».
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los baales
  - los dioses Baal
  - las imágenes de Baal
  lexicon: HALOT
  rationale: La forma plural hebrea se refleja con un plural transliterado. «Baales» es legible en español y conserva la pluralidad y el tono polémico del texto.
- source_word: הָאֲשֵׁרוֹת
  english_pob_choice: the Asherahs
  chosen_spanish: las Aseras
  alternatives_spanish:
  - los postes de Asera
  - las Asheras
  - las Aserot
  lexicon: HALOT
  rationale: 'Se mantiene la ambigüedad del hebreo: puede aludir a objetos de culto o a manifestaciones asociadas con Asera. «Aseras» es una transliteración comprensible en español y no fuerza una identificación arqueológica más estrecha que la del texto.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. En consonancia con la política del proyecto, se evita sustituirlo por un título y se conserva la distinción teológica del nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הָאֲשֵׁרוֹת
  english_pob_reading: the Asherahs
  chosen_spanish_reading: las Aseras
  alternative_spanish_readings:
  - los postes de Asera
  - las Asheras
  - las Aserot
  rationale: 'El hebreo admite más de una concreción: objetos de culto o la esfera de culto de Asera. La traducción principal preserva esa amplitud en vez de imponer una lectura única no explicitada por el versículo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la fórmula evaluativa hebrea, el nombre divino como Yahvé, el valor amplio de עבד como «sirvieron» y la ambigüedad de הָאֲשֵׁרוֹת sin estrecharla a una sola imagen cultual. No se registran revisiones posteriores que alteren la línea traductológica.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «hijos de Israel» por transparencia formal, en armonía con el registro bíblico en español.
  - «Baales» y «Aseras» conservan el plural y la posible referencia cultual pluralizada del hebreo.
  - La puntuación sigue el orden de las cláusulas del hebreo y del inglés auditado, con una cadencia natural para lectura pública.
