translation:
  language: es
  text: Como un esclavo que anhela la sombra[a], y como un jornalero que espera su salario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siervo' para עֶבֶד. El hebreo puede abarcar ambos sentidos, pero 'esclavo' conserva mejor aquí la condición de sujeción.
    reason: lexical_alternative
  - marker: b
    text: O 'su paga' o 'su recompensa' para 'su salario'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/עֶ֥בֶד
  english_pob_choice: like a slave
  chosen_spanish: como un esclavo
  alternatives_spanish:
  - como un siervo
  lexicon: HALOT
  rationale: עֶבֶד puede abarcar 'siervo' o 'esclavo', pero aquí la comparación destaca la condición de dependencia y la vulnerabilidad del trabajador; 'esclavo' preserva mejor esa fuerza en español.
- source_word: יִשְׁאַף
  english_pob_choice: longs for
  chosen_spanish: anhela
  alternatives_spanish:
  - desea intensamente
  - suspira por
  lexicon: HALOT
  rationale: El verbo expresa un deseo intenso y expectante. 'Anhela' comunica bien esa intensidad sin volver la frase extraña en español moderno.
- source_word: צֵל
  english_pob_choice: shade
  chosen_spanish: la sombra
  alternatives_spanish:
  - sombra
  lexicon: HALOT
  rationale: En este contexto la idea es alivio del calor. 'Sombra' es natural en español; 'la sombra' mantiene la imagen concreta del refugio buscado.
- source_word: וּכְ/שָׂכִיר
  english_pob_choice: and like a hired worker
  chosen_spanish: y como un jornalero
  alternatives_spanish:
  - y como un trabajador contratado
  - y como un asalariado
  lexicon: HALOT
  rationale: שָׂכִיר es una persona contratada por salario. 'Jornalero' transmite bien el matiz de trabajo por paga, de manera idiomática y bíblicamente reconocible en español.
- source_word: יְקַוֶּה
  english_pob_choice: waits for
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - anhela
  lexicon: HALOT
  rationale: Aquí el objeto es la paga debida tras la jornada; 'espera' expresa la espera expectante de manera clara y fiel.
- source_word: פָעֳלוֹ
  english_pob_choice: his wages
  chosen_spanish: su salario
  alternatives_spanish:
  - su paga
  - su recompensa
  lexicon: HALOT
  rationale: En el paralelismo con el jornalero, פָעֳלוֹ alude a la remuneración del trabajo. 'Salario' preserva ese valor de pago debido por la labor.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin cambios en su sentido básico: ''slave'', ''shade'', ''hired worker'' y ''wages'' siguen reflejando bien el hebreo. La versión española adopta equivalentes naturales y conserva la tensión lexical entre ''esclavo/siervo'' y entre ''salario/paga/recompensa''.'
  spanish_consistency_notes:
  - Se mantiene 'esclavo' en lugar de suavizar a 'siervo' por coherencia con el peso social de עֶבֶד en este contexto.
  - '''Jornalero'' comunica el trabajador asalariado de forma idiomática; evita una literalidad excesivamente técnica.'
  - '''Sombra'' se entiende como alivio del calor, no como ''sombra'' en sentido ambiguo de ''shadow''.'
