translation:
  language: es
  text: Cuando su escudero[a] vio que Saúl estaba muerto[b], él también cayó sobre su espada y murió con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Escudero'' recoge el oficio militar del hebreo נֹשֵׂא כֵלָיו (''portador de armas/equipo'').'
    reason: lexical_alternative
  - marker: b
    text: O 'había muerto'. El hebreo permite tanto una descripción de estado ('estaba muerto') como un hecho ya consumado visto como base de la acción del escudero.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - su portador de armas
  - el que llevaba su equipo
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'el que lleva sus armas/equipo'. En español, 'escudero' es el equivalente militar natural y tradicional para esta función de asistencia armada, y comunica el cargo sin sonar forzado. Se evita 'siervo' porque no es el matiz principal del sintagma.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo que el escudero percibió: vio que Saúl había muerto. ''Que'' refleja mejor la subordinación completiva en español y no añade causalidad.'
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - había fallecido
  lexicon: HALOT
  rationale: El valor verbal perfecto del hebreo permite entender una muerte ya realizada como base de la acción siguiente. 'Había muerto' conserva ese evento completado con naturalidad narrativa en español. 'Estaba muerto' sigue siendo posible, pero 'había muerto' mantiene mejor el matiz de hecho previo.
- source_word: גַּם הוּא
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - incluso él
  lexicon: HALOT
  rationale: La partícula intensiva/additiva se expresa de manera natural con 'también'. 'Él también' conserva el paralelismo con la acción de Saúl sin sobrecargar el sentido.
- source_word: עַל חַרְבּוֹ
  english_pob_choice: on his sword
  chosen_spanish: sobre su espada
  alternatives_spanish:
  - encima de su espada
  - sobre la espada
  lexicon: HALOT
  rationale: El hebreo usa la preposición de contacto/superposición; 'sobre su espada' es una traducción directa y clara. 'Se echó sobre su espada' mantiene el modo de muerte sin convertirlo en una paráfrasis excesiva.
- source_word: וַיָּמָת עִמּוֹ
  english_pob_choice: and died with him
  chosen_spanish: y murió con él
  alternatives_spanish:
  - y murió junto con él
  - y murió al mismo tiempo que él
  lexicon: HALOT
  rationale: '''Con él'' reproduce la idea de acompañamiento del hebreo עִם sin añadir detalle espacial. Se conserva la simetría narrativa de la frase final.'
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Al ver
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, 'Cuando' expresa de forma fluida la relación temporal entre la observación y la acción resultante.
theological_decisions:
- issue: 'Alcance de la muerte de Saúl: estado resultante vs. evento completado'
  english_pob_reading: '''Saul was dead'' with footnoted alternative ''had died'''
  chosen_spanish_reading: '''Saúl había muerto'' con nota alternativa posible de estado resultante'
  alternative_spanish_readings:
  - Saúl estaba muerto
  - Saúl murió
  rationale: El hebreo permite leer מֵת como descripción estática o como evento completo previo. En español, 'había muerto' preserva ambas posibilidades de manera más narrativa y deja abierta la tensión que el inglés POB anotó. 'Estaba muerto' enfatiza el estado; 'murió' vuelve más explícito el evento, pero puede estrechar indebidamente la ambigüedad.
  doctrine_reference: Narrativa histórica; aspecto verbal hebreo
- issue: Suicidio del escudero como acción correlativa a la muerte de Saúl
  english_pob_reading: '''he too fell on his sword and died with him'''
  chosen_spanish_reading: '''él también se echó sobre su espada y murió con él'''
  alternative_spanish_readings:
  - él también cayó sobre su espada y murió con él
  - él también se arrojó sobre su espada y murió con él
  rationale: El hebreo usa una formulación narrativa directa. 'Se echó sobre su espada' reproduce el gesto sin introducir un verbo demasiado interpretativo. La expresión mantiene la relación de correspondencia con la muerte de Saúl sin ampliar el sentido más allá del texto.
  doctrine_reference: Narrativa histórica; sintaxis de paralelismo
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés sin depender mecánicamente de él. Mantiene la ambigüedad aspectual de מֵת con una solución narrativa natural ('había muerto') y conserva el paralelo 'he too' / 'él también'. No se introdujeron notas textuales porque el paquete fuente no presenta variantes textuales relevantes ni revisiones aplicadas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - '''Escudero'' se mantiene como equivalente militar contextual para נֹשֵׂא כֵלָיו.'
  - '''Espada'' y la construcción ''se echó sobre su espada'' preservan el modo de suicidio sin suavizarlo.'
  - La nota de muerte de Saúl conserva la tensión aspectual documentada en el inglés POB.
