translation:
  language: es
  text: Hermanos míos[a], ¿puede una higuera producir aceitunas, o una vid higos? Tampoco el agua salada[b] puede producir agua dulce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hermanos y hermanas míos». El griego usa un plural masculino que puede dirigirse a un grupo mixto.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es elíptica en griego y también puede entenderse, a la luz de la imagen del versículo anterior, como «Tampoco una fuente salada puede producir agua dulce».
    reason: alternative_reading
  - marker: c
    text: Lit. «dulce»; en este contraste con el agua salada, el sentido es «agua dulce» o «agua fresca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοί μου
  english_pob_choice: My brothers
  chosen_spanish: Hermanos míos
  alternatives_spanish:
  - Mis hermanos
  - Hermanos y hermanas míos
  lexicon: BDAG
  rationale: El vocativo griego está en plural masculino; en español, "Hermanos míos" conserva la forma directa y natural para dirigirse a la comunidad sin sobrecargar el texto. La alternativa inclusiva puede mencionarse en nota, pero el cuerpo mantiene el valor lexical del plural masculino.
- source_word: μὴ δύναται
  english_pob_choice: can
  chosen_spanish: ¿puede
  alternatives_spanish:
  - ¿es capaz de?
  - ¿podrá?
  lexicon: BDAG
  rationale: En una pregunta retórica con μή, el sentido esperado es negativo. En español, "¿puede... ?" comunica mejor la imposibilidad retórica que una versión más literal y menos idiomática.
- source_word: συκῆ
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  - higuera de higos
  lexicon: BDAG
  rationale: El término nombra el árbol, y en español "higuera" es el equivalente natural y preciso. Mantiene la imagen agrícola sin añadir explicaciones innecesarias.
- source_word: ἐλαίας ποιῆσαι
  english_pob_choice: produce olives
  chosen_spanish: producir aceitunas
  alternatives_spanish:
  - dar aceitunas
  - llevar aceitunas
  lexicon: BDAG
  rationale: ποιέω aquí significa producir o dar fruto. "Producir aceitunas" es claro, moderno y fiel al valor productivo del verbo en esta metáfora.
- source_word: ἄμπελος
  english_pob_choice: grapevine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  - vid de uvas
  lexicon: BDAG
  rationale: '"Vid" es el equivalente natural en español para la planta de la vid. El contexto agrícola hace innecesario explicitar "uva" dentro del sustantivo.'
- source_word: σῦκα
  english_pob_choice: figs
  chosen_spanish: higos
  alternatives_spanish:
  - brevas
  - frutos de higo
  lexicon: BDAG
  rationale: El plural griego designa el fruto, no el árbol. En español, "higos" conserva esa referencia directa y es el equivalente más natural.
- source_word: οὔτε ἁλυκόν
  english_pob_choice: Neither can salt water
  chosen_spanish: Tampoco el agua salada
  alternatives_spanish:
  - Ni el agua salada
  - Tampoco el agua salobre
  lexicon: BDAG
  rationale: El griego es elíptico; ἁλυκόν funciona sustantivado y el contexto inmediato habla de agua. "Agua salada" preserva el contraste con el agua dulce sin forzar una expansión interpretativa mayor que la necesaria.
- source_word: γλυκὺ ποιῆσαι ὕδωρ
  english_pob_choice: produce fresh water
  chosen_spanish: producir agua dulce
  alternatives_spanish:
  - producir agua fresca
  - hacer agua dulce
  lexicon: BDAG
  rationale: Aunque γλυκύς significa literalmente "dulce", en contraste con lo salado el español natural es "agua dulce". Esta opción conserva la oposición semántica y evita una calca menos idiomática.
theological_decisions:
- issue: Lectura del final elíptico sobre agua salada y agua dulce
  english_pob_reading: Neither can salt water produce fresh water.
  chosen_spanish_reading: Tampoco el agua salada puede producir agua dulce.
  alternative_spanish_readings:
  - Tampoco una fuente salada puede producir agua dulce.
  - Ni un manantial salado puede dar agua dulce.
  rationale: El griego permite una elipsis; el texto inglés opta por completar con "salt water" para una lectura clara. En español mantengo esa misma decisión como lectura principal, sin cerrar la posibilidad de la imagen de fuente/manantial sugerida por el contexto inmediato de 3:11.
  doctrine_reference: James 3:11-12; consistencia retórica de la imagen de la fuente y el agua.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la revisión inglesa más reciente y no requiere cambios textuales sustanciales; la draft española sigue la misma solución interpretativa para el vocativo masculino, la elipsis final y la equivalencia idiomática de γλυκύς como «agua dulce».
  spanish_consistency_notes:
  - Se mantiene «Hermanos míos» para reflejar el vocativo plural masculino, con nota inclusiva.
  - Se usa «higuera» y «vid» como equivalentes agrícolas naturales en español.
  - Se preserva la oposición «agua salada / agua dulce» como solución idiomática y consistente con el contexto de Santiago 3:11-12.
  - No se introduce terminología eclesiástica tradicional que oscurezca la imagen metafórica del verso.
