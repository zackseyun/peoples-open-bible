review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: poner el Urim y el Tumim en el pectoral del juicio, que estén sobre el corazón de Aarón al entrar delante de Yahvé, y que Aarón lleve el juicio de los hijos de Israel sobre su corazón delante de Yahvé continuamente. Mantiene correctamente «Yahvé», la repetición de «juicio» y «corazón», y la transliteración de los términos técnicos. Sin embargo, hay dos desajustes importantes con el expediente inglés y con la disciplina de notas: la nota [a] está anclada en «juicio» pero habla de «Urim» y «Tumim», y falta la nota alternativa sobre «pectoral del juicio» / «para decisión» / «de justicia», que sí está documentada en el POB inglés.'
  spanish_quality_summary: El español es claro, digno y generalmente natural. «Pectoral del juicio», «sobre el corazón», «delante de Yahvé» y «continuamente» son legibles y fieles. «Cuando entre» funciona bien en contexto cultual. La principal reparación necesaria es de aparato de notas, no de fluidez. Conviene también ubicar las notas en los términos pertinentes para evitar confusión del lector.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; אוּרִים / תֻּמִּים -> «Urim» / «Tumim» por transliteración; מִשְׁפָּט -> «juicio» en ambas ocurrencias; בְּנֵי יִשְׂרָאֵל -> «hijos de Israel». No hay conflicto doctrinal relevante. La excepción necesaria es añadir en nota la alternativa semántica de «juicio» para reflejar el expediente inglés.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «juicio», pero su contenido explica «Urim» y «Tumim».
    rationale: 'Esto incumple la disciplina de notas: el marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce a pensar que la nota explica «juicio» cuando en realidad explica los objetos sagrados transliterados.'
  - severity: medium
    issue: Falta en español la nota alternativa para «pectoral del juicio».
    rationale: El POB inglés conserva explícitamente la alternativa lexical de מִשְׁפָּט en esta frase («for decision» / «of justice»). La revisión española debe preservarla, especialmente porque «juicio» puede sonar más estrecho en español.
  - severity: low
    issue: El orden actual de notas no sigue de manera transparente el orden de anclaje ideal en el texto.
    rationale: Al reanclar la nota de Urim/Tumim y añadir la nota sobre «juicio», conviene ordenar los marcadores secuencialmente según su aparición en el texto para claridad editorial.
  revised_spanish_text: Y pondrás en el pectoral del juicio[a] los Urim y los Tumim[b], y estarán sobre el corazón de Aarón cuando entre delante de Yahvé[c]; y Aarón llevará el juicio de los hijos de Israel sobre su corazón delante de Yahvé continuamente.
  revised_footnotes:
