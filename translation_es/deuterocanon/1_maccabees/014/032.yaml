translation:
  language: es
  text: Entonces Simón se levantó[b] y peleó por su nación[a], y gastó mucho de su propio dinero, y armó a los hombres de las fuerzas de su nación, y les dio salario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἔθνος también puede traducirse «pueblo» aquí; se eligió «nación» para preservar el sentido colectivo y político del contexto.
    reason: lexical_alternative
  - marker: b
    text: La forma impresa ἀνέστησενσεν parece reflejar una duplicación de sílaba en la transmisión; el sentido es que Simón «se levantó» o «se alzó».
    reason: textual_variant
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: LSJ
  rationale: Marca la secuencia narrativa de forma natural en español sin añadir causa que el griego no expresa.
- source_word: ἀνέστησενσεν
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: LSJ
  rationale: La forma transmitida parece contener una duplicación gráfica, pero el sentido claro es que Simón tomó la iniciativa. 'Se levantó' conserva ese valor idiomático sin sobreinterpretar.
- source_word: ἐπολέμησεν περὶ τοῦ ἔθνους αὐτοῦ
  english_pob_choice: fought for his nation
  chosen_spanish: peleó por su nación
  alternatives_spanish:
  - peleó en favor de su pueblo
  - luchó por su nación
  lexicon: LSJ
  rationale: περὶ con este verbo comunica defensa o actuación en favor de. 'Por' expresa bien esa relación en español.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  lexicon: LSJ
  rationale: Se mantiene el sentido colectivo-político del contexto macabeo. 'Pueblo' también es posible, pero 'nación' preserva mejor la dimensión corporativa.
- source_word: ἐδαπάνησεν χρήματα πολλὰ τῶν ἑαυτοῦ
  english_pob_choice: spent much of his own money
  chosen_spanish: gastó mucho de su propio dinero
  alternatives_spanish:
  - gastó mucho de sus propios recursos
  - expendió mucho de su propia fortuna
  lexicon: LSJ
  rationale: '''Gastó'' es natural para ἐδαπάνησεν; ''de su propio dinero'' mantiene τῶν ἑαυτοῦ y el matiz de recursos personales.'
- source_word: ὡπλοδότησεν
  english_pob_choice: armed
  chosen_spanish: armó
  alternatives_spanish:
  - equipó con armas
  - suministró armas a
  lexicon: LSJ
  rationale: El verbo indica proveer con armas; 'armó' es breve, exacto y idiomático en español.
- source_word: τοὺς ἄνδρας τῆς δυνάμεως τοῦ ἔθνους αὐτοῦ
  english_pob_choice: the men of his nation's forces
  chosen_spanish: a los hombres de las fuerzas de su nación
  alternatives_spanish:
  - a los hombres del ejército de su nación
  - a los guerreros de su nación
  lexicon: LSJ
  rationale: Se conserva el masculino explícito de ἄνδρας. 'Fuerzas' traduce δυνάμεως con un matiz militar general, acorde al griego.
- source_word: ὀψώνια
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - sueldo
  lexicon: BDAG
  rationale: En este contexto militar, ὀψώνια designa la paga entregada a los combatientes. 'Salario' comunica esa compensación regular en español contemporáneo.
theological_decisions:
- issue: Valor corporativo de ἔθνος en contexto judío macabeo
  english_pob_reading: nation
  chosen_spanish_reading: nación
  alternative_spanish_readings:
  - pueblo
  rationale: El versículo presenta la defensa y provisión de Simón hacia un cuerpo político y colectivo. 'Nación' conserva mejor esa fuerza que una lectura meramente étnica o devocional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Referencia masculina explícita de τοὺς ἄνδρας
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - los soldados
  - los guerreros
  rationale: El griego emplea un masculino explícito. Se preserva esa referencia sin neutralizarla, conforme a la precisión de género del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje mantiene alto acuerdo con el original griego y con la auditoría inglesa, con solo cuestiones menores de matiz léxico.'
  spanish_consistency_notes:
  - Se mantiene 'nación' para ἔθνος, en continuidad con la decisión inglesa documentada.
  - Se conserva el masculino explícito 'los hombres' para ἄνδρας.
  - '''Armó'' y ''salario'' buscan un registro bíblico claro sin calco excesivo.'
  - No se usa 'SEÑOR' ni terminología litúrgica no presente en el versículo.
