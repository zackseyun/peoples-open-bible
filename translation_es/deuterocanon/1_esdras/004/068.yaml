translation:
  language: es
  text: 'Y ahora esto es lo que pido, oh señor rey, y lo que solicito de ti; y esta es la grandeza que procede de ti: por tanto, te ruego que cumplas[a] el voto que hice al Rey del cielo, para hacerlo por tu boca[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer el voto». El griego dice literalmente «hacer el voto», un giro idiomático para llevar a cabo lo prometido.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «por tu boca»; es decir, por tu palabra hablada o por tu autorización.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιῶ
  english_pob_choice: I ask
  chosen_spanish: pido
  alternatives_spanish:
  - solicito
  - ruego
  - pido formalmente
  lexicon: BDAG
  rationale: En este contexto de súplica ante el rey, el verbo expresa una petición respetuosa más que una exigencia. «Pido» mantiene la naturalidad del español y conserva el tono deferente del griego.
- source_word: αἰτοῦμαί
  english_pob_choice: I request
  chosen_spanish: solicito
  alternatives_spanish:
  - pido
  - solicito formalmente
  - ruego
  lexicon: BDAG
  rationale: Se distingue de ἀξιῶ para preservar la duplicación retórica. «Solicito» suena formal y conserva el matiz de petición deliberada sin repetir exactamente «pido».
- source_word: μεγαλωσύνη ἡ παρὰ σοῦ
  english_pob_choice: the greatness that comes from you
  chosen_spanish: la grandeza que procede de ti
  alternatives_spanish:
  - tu grandeza
  - la grandeza de parte de ti
  - la magnanimidad que procede de ti
  lexicon: LSJ
  rationale: La construcción griega sugiere algo que viene del rey, no solo una cualidad abstracta. «Que procede de ti» conserva esa procedencia y el matiz de favor real.
- source_word: δέομαι
  english_pob_choice: I beg
  chosen_spanish: te ruego
  alternatives_spanish:
  - te suplico
  - te imploro
  - te pido
  lexicon: BDAG
  rationale: Este verbo intensifica la súplica. «Te ruego» es fuerte, reverente y natural en español bíblico sin sonar excesivamente arcaico.
- source_word: ποιήσῃς τὴν εὐχήν
  english_pob_choice: you fulfill the vow
  chosen_spanish: cumplas el voto
  alternatives_spanish:
  - hagas el voto
  - lleves a cabo el voto
  - cumplas la promesa
  lexicon: BDAG
  rationale: El contexto inmediato con ηὐξάμην favorece el sentido de voto y no de simple oración. «Cumplas el voto» expresa bien el idiomático «hacer»/«cumplir» un voto.
- source_word: ηὐξάμην
  english_pob_choice: I vowed
  chosen_spanish: hice
  alternatives_spanish:
  - prometí
  - voté
  - hice un voto
  lexicon: BDAG
  rationale: Para evitar el doblete incómodo «el voto que voté», el español usa una formulación natural que sigue implicando la acción de hacer un voto. Dado que el objeto ya aparece como «voto», el verbo puede quedar implícito en el castellano de forma fluida.
- source_word: τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: the King of heaven
  chosen_spanish: el Rey del cielo
  alternatives_spanish:
  - el Rey celestial
  - el Rey de los cielos
  lexicon: LSJ
  rationale: Se conserva el título reverente y la referencia teológica a Dios. «Del cielo» reproduce la estructura nominal del griego con claridad.
- source_word: ἐκ στόματός σου
  english_pob_choice: by your mouth
  chosen_spanish: por tu boca
  alternatives_spanish:
  - de tu boca
  - por tu palabra
  - mediante tu mandato
  lexicon: LSJ
  rationale: El griego dice literalmente «desde fuera de tu boca», y el POB inglés ya explicó el sentido de autorización hablada. «Por tu boca» conserva la imagen concreta y el valor de mediación/autorización verbal.
theological_decisions:
- issue: Referencia de «el Rey del cielo»
  english_pob_reading: A divine title referring to God
  chosen_spanish_reading: Un título divino que se refiere a Dios
  alternative_spanish_readings:
  - un título para el Dios del cielo
  - una referencia al Rey celestial
  rationale: En el marco judío del pasaje, el título no alude al rey terrenal sino a Dios. Se mantiene la reverencia y la distinción entre el rey humano y el Rey del cielo.
  doctrine_reference: Teología bíblica del nombre y la soberanía de Dios
- issue: Sentido de εὐχή / ηὐξάμην
  english_pob_reading: vow-language rather than general prayer-language
  chosen_spanish_reading: Lenguaje de voto más que de oración general
  alternative_spanish_readings:
  - lenguaje de plegaria
  - promesa religiosa
  rationale: 'La forma cognada del griego favorece el sentido de voto: se trata de una obligación asumida ante Dios que debe ser ejecutada con autorización real. Por eso se traduce «voto» y no «oración».'
  doctrine_reference: Votos y cumplimiento de promesas ante Dios
translation_notes:
  revision_awareness: La redacción sigue el giro final revisado del POB en inglés, prefiriendo «cumplas el voto» por naturalidad en español y manteniendo el valor idiomático de ποιήσῃς τὴν εὐχήν. También conserva la conclusión «por tu boca» para reflejar la imagen concreta y su sentido de autorización verbal.
  spanish_consistency_notes:
  - Se usa «Rey del cielo» para el título divino, en coherencia con la terminología POB.
  - Se evita «SEÑOR» como máscara para el nombre divino porque el texto aquí no contiene el Tetragrámaton sino un título de Dios.
  - «Voto» se reserva para εὐχή cuando el contexto y ηὐξάμην lo exigen; no se sustituye por «oración».
  - La duplicación de ἀξιῶ / αἰτοῦμαί se mantiene con dos verbos distintos («pido» / «solicito») para no perder el paralelismo retórico.
