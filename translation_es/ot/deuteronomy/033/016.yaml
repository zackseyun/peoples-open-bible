translation:
  language: es
  text: y con lo más selecto de la tierra y su plenitud[a], y el favor del que habitó en la zarza, venga sobre la cabeza de José[b], y sobre la coronilla del que fue apartado de entre sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la buena voluntad del que habitó en la zarza». La frase hebrea alude a la aparición de Dios a Moisés en la zarza ardiente.
    reason: lexical_alternative
  - marker: b
    text: O «el príncipe entre sus hermanos» o «el consagrado entre sus hermanos». El hebreo נְזִיר subraya estar apartado, y en el caso de José puede implicar también preeminencia.
    reason: alternative_reading
lexical_decisions:
- source_word: מִמֶּגֶד
  english_pob_choice: with the choicest things of
  chosen_spanish: con lo más selecto de
  alternatives_spanish:
  - de lo más selecto de
  - con las cosas más preciosas de
  lexicon: HALOT
  rationale: מֶגֶד en esta bendición designa productos/bienes selectos o preciados. «Con lo más selecto de» conserva el valor de abundancia otorgada y suena natural en español bíblico actual.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/terreno
  - el país
  lexicon: HALOT
  rationale: Aunque puede significar «tierra» o «tierra/territorio», aquí la combinación con «su plenitud» favorece el sentido amplio de la tierra. En español, «la tierra» mantiene la amplitud poética sin perder claridad.
- source_word: מְלֹאָהּ
  english_pob_choice: its fullness
  chosen_spanish: su plenitud
  alternatives_spanish:
  - todo lo que la llena
  - todo lo que contiene
  lexicon: HALOT
  rationale: La expresión compacta del hebreo se conserva bien con «su plenitud», que mantiene el paralelismo y el tono poético sin volverse rígido.
- source_word: רְצוֹן
  english_pob_choice: the favor
  chosen_spanish: el favor
  alternatives_spanish:
  - la buena voluntad
  - el beneplácito
  lexicon: HALOT
  rationale: En este contexto se refiere al favor benevolente de Dios hacia José. «El favor» es la opción más natural y fiel al peso teológico del texto.
- source_word: שֹׁכְנִי סְנֶה
  english_pob_choice: the one who dwelt in the bush
  chosen_spanish: el que habita en la zarza
  alternatives_spanish:
  - el que moraba en la zarza
  - el que habitó en la zarza
  lexicon: HALOT
  rationale: La expresión alude a la manifestación divina a Moisés en Éxodo 3. «Habita» conserva el participio hebreo con una formulación reverente y reconocible en español; «zarza» mantiene la alusión bíblica sin explicitar más de lo que el texto dice.
- source_word: תָּבֹואתָה
  english_pob_choice: may it come
  chosen_spanish: venga
  alternatives_spanish:
  - que venga
  - vengan
  lexicon: HALOT
  rationale: El verbo jussivo funciona como bendición. «Venga» mantiene la fuerza optativa en español y puede referirse colectivamente al cúmulo de bendiciones anterior.
- source_word: לְרֹאשׁ יוֹסֵף
  english_pob_choice: on the head of Joseph
  chosen_spanish: sobre la cabeza de José
  alternatives_spanish:
  - sobre la cabeza de José
  - en la cabeza de José
  lexicon: HALOT
  rationale: Es un modismo de bendición. «Sobre la cabeza de José» es claro, directo y formalmente cercano al hebreo.
- source_word: קָדְקֹד
  english_pob_choice: the crown of the head
  chosen_spanish: la coronilla
  alternatives_spanish:
  - la corona de la cabeza
  - la parte superior de la cabeza
  lexicon: HALOT
  rationale: El término designa la parte alta/coronilla de la cabeza. «Coronilla» evita la repetición literal de «cabeza» y preserva el paralelismo poético.
- source_word: נְזִיר אֶחָיו
  english_pob_choice: the one set apart from his brothers
  chosen_spanish: el que fue apartado de entre sus hermanos
  alternatives_spanish:
  - el apartado de entre sus hermanos
  - el consagrado entre sus hermanos
  - el príncipe entre sus hermanos
  lexicon: HALOT
  rationale: נָזִיר denota fundamentalmente a alguien separado/consagrado. Aquí se conserva esa base semántica con «apartado de entre sus hermanos», sin imponer «príncipe», que sería más interpretativo.
theological_decisions:
- issue: Identificación del «que habita en la zarza»
  english_pob_reading: A divine title referring to God as revealed to Moses at the burning bush
  chosen_spanish_reading: Un título divino que alude a la revelación de Dios a Moisés en la zarza ardiente
  alternative_spanish_readings:
  - Una referencia más general a una manifestación divina vinculada con Sinaí/Horeb
  rationale: La frase remite con fuerza a Éxodo 3. Traducirla de modo descriptivo conserva la alusión sin sobreexplicarla, y mantiene la tensión teológica del texto original.
  doctrine_reference: Primacía del texto original y preservación de la alusión intertextual sin resolverla en exceso.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y no hubo cambios relevantes en la revisión más reciente; la redacción española conserva las dos tensiones principales documentadas: la alusión divina de «la zarza» y el valor semántico de נְזִיר sin cerrar la interpretación a «príncipe».'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparece explícitamente el nombre divino; aquí el texto usa una circunlocución («el que habita en la zarza»), por lo que no se introduce el nombre.
  - Se prefirió «José» en lugar de «Joseph» por norma de nombres bíblicos en español.
  - «Coronilla» evita una redundancia pesada con «cabeza» y mantiene el paralelismo poético.
  - No se sustituyó «apartado» por «consagrado» en el texto principal para no adelantar una lectura cultual no obligatoria en este contexto.
