translation:
  language: es
  text: Hijo mío[a], desde tu juventud recibe instrucción, y hasta las canas alcanzarás sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «elige instrucción» donde el hebreo lee «recibe instrucción». El testimonio hebreo es primario aquí, pero ambos apuntan a acoger una formación que modela la vida desde la juventud.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי / Τέκνον
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, hijo
  - Mi hijo
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo y el griego usan un vocativo filial masculino e instructivo. En español, «Hijo mío» conserva el tono paternal de exhortación sin neutralizar el género ni volverlo excesivamente literal como «mi hijo» en posición vocativa.
- source_word: מִנְּעוּרֶיךָ / ἐκ νεότητός σου
  english_pob_choice: from your youth
  chosen_spanish: desde tu juventud
  alternatives_spanish:
  - desde tus jóvenes años
  - desde tu niñez
  lexicon: HALOT; Swete LXX 1909
  rationale: La expresión apunta al período de juventud temprana. «Desde tu juventud» es natural en español y mantiene la amplitud temporal del hebreo y del griego.
- source_word: קַח / ἐπίλεξαι
  english_pob_choice: receive
  chosen_spanish: recibe
  alternatives_spanish:
  - toma
  - elige
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo literal «toma» funciona idiomáticamente como aceptar o recibir instrucción; el griego, en cambio, dice «elige». En español, «recibe instrucción» expresa bien la idea de acogerla, y se conserva en la nota la tensión con la lectura griega de seleccionar/escoger formación.
- source_word: לֶקַח / παιδίαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - disciplina
  - formación
  lexicon: HALOT; Swete LXX 1909
  rationale: «Instrucción» refleja el campo de enseñanza formativa de sabiduría. También se ajusta al griego παιδείαν, que puede abarcar formación, disciplina o crianza educativa.
- source_word: וְעַד שֵׂיבָה / ἕως πολιῶν
  english_pob_choice: until gray hair
  chosen_spanish: y hasta las canas
  alternatives_spanish:
  - y hasta la vejez
  - y hasta que encanezcas
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo y el griego usan una imagen concreta de vejez marcada por el canoso/las canas. «Hasta las canas» preserva la metáfora corporal y suena natural en español.
- source_word: תַּשִּׂיג / εὑρήσεις
  english_pob_choice: you will attain / you will find
  chosen_spanish: alcanzarás
  alternatives_spanish:
  - encontrarás
  - obtendrás
  - llegarás a
  lexicon: HALOT; Swete LXX 1909
  rationale: «Alcanzarás» transmite la idea de llegar a poseer sabiduría por el proceso continuo de instrucción. Es compatible con el hebreo «alcanzar» y, sin borrar la variante griega «encontrarás», evita una traducción demasiado mecanicista.
- source_word: חָכְמָה / σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - prudencia
  lexicon: HALOT; Swete LXX 1909
  rationale: Es el término estándar de sabiduría sapiencial; «sabiduría» preserva su sentido amplio y tradicional sin introducir restricción innecesaria.
theological_decisions:
- issue: Relación entre el hebreo y el griego en el mandato inicial
  english_pob_reading: Greek has 'choose instruction' where the Hebrew reads 'receive instruction.' The Hebrew witness is primary here, but both point to embracing formative teaching from youth.
  chosen_spanish_reading: El texto principal sigue «recibe instrucción», con una nota que reconoce que el griego dice «elige instrucción».
  alternative_spanish_readings:
  - elige instrucción
  - toma instrucción
  rationale: 'No se borra la tensión textual: el hebreo presenta la imagen de recibir/aceptar enseñanza, mientras el griego añade el matiz de escogerla. La traducción principal favorece el hebreo como testimonio primario, y la nota preserva la variante significativa.'
  doctrine_reference: Crítica textual / transmisión sapiencial
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia entre hebreo y griego, con una única tensión léxica relevante en el verbo inicial: hebreo «recibe/toma» frente a griego «elige». La versión española principal sigue el hebreo, pero la nota conserva la variante griega sin diluirla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene un registro sapiencial sobrio y natural, sin arcaísmos innecesarios.
  - «Sabiduría» se conserva como término técnico sapiencial; no se sustituye por «prudencia».
