  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐν πάσῃ ἀπάτῃ ⸀ἀδικίας τοῖς ἀπολλυμένοις, ἀνθ’ ὧν τὴν ἀγάπην τῆς ἀληθείας οὐκ ἐδέξαντο εἰς τὸ σωθῆναι αὐτούς·
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/010.yaml
  text: and with every deception of unrighteousness for those who are perishing[d][c][b][a], because they did not accept the love of the truth so as to be saved.
translation:
  language: ko
  text: 또한 멸망하고 있는 자들에게는 불의의 온갖 속임수를 동반합니다[a]. 그것은 그들이 진리에 대한 사랑을 받아들이지 않아 구원받지 못한 까닭입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「멸망당하고 있는 자들 가운데서」, 「멸망하고 있는 자들을 향하여」. 헬라어 여격의 정확한 방향성은 다소 유동적이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάτῃ
  english_pob_choice: deception
  chosen_korean: 속임수
  alternatives_korean:
  - 속임
  - 기만
  lexicon: BDAG
  rationale: 능동적 미혹의 의미를 한국어 「속임수」로 자연스럽게 표현한다.
- source_word: ἀδικίας
  english_pob_choice: of unrighteousness
  chosen_korean: 불의의
  alternatives_korean:
  - 악의
  - 부정의
  lexicon: BDAG
  rationale: 속격의 어떤 종류의 속임인지를 한정 — 「불의의 속임수」는 신학적 무게를 보존한다.
- source_word: τοῖς ἀπολλυμένοις
  english_pob_choice: for those who are perishing
  chosen_korean: 멸망하고 있는 자들에게는
  alternatives_korean:
  - 멸망당하고 있는 자들에게는
  - 멸망 중에 있는 자들에게는
  lexicon: BDAG
  rationale: 현재 분사의 진행되는 멸망 상태를 「멸망하고 있는」으로 보존한다. 결정적 「멸망한 자들」 같은 의역을 피한다.
- source_word: ἀνθ’ ὧν
  english_pob_choice: because
  chosen_korean: 그것은 ~ 까닭입니다
  alternatives_korean:
  - 그 이유는 ~ 때문입니다
  - ~ 까닭에
  lexicon: BDAG
  rationale: ἀνθ’ ὧν의 인과적 도입을 한국어 「그것은 ~ 까닭입니다」 구조로 자연스럽게 옮긴다.
- source_word: τὴν ἀγάπην τῆς ἀληθείας
  english_pob_choice: the love of the truth
  chosen_korean: 진리에 대한 사랑
  alternatives_korean:
  - 진리의 사랑
  - 진리를 향한 사랑
  lexicon: BDAG
  rationale: 정황상 객관적 속격(진리를 향한 사랑)이 자연스럽다. 「~에 대한 사랑」으로 옮긴다.
- source_word: ἐδέξαντο
  english_pob_choice: did not accept
  chosen_korean: 받아들이지 않아
  alternatives_korean:
  - 영접하지 않아
  - 환영하지 않아
  lexicon: BDAG
  rationale: 추상적 대상(진리에 대한 사랑)을 「받아들이다」로 표현하는 것이 자연스럽다.
- source_word: εἰς τὸ σωθῆναι αὐτούς
  english_pob_choice: so as to be saved
  chosen_korean: 구원받지 못한
  alternatives_korean:
  - 구원에 이르지 못한
  - 구원받기 위한 (사랑을)
  lexicon: BDAG
  rationale: 부정 인과 구조에서 결과를 「구원받지 못한」으로 자연스럽게 표현한다.
theological_decisions:
- issue: 「멸망하고 있는 자들」의 결정성 어조
  chosen_reading: 진행상의 「멸망하고 있는」
  alternative_readings:
  - 결정된 「멸망 정해진 자들」
  - 「멸망당하고 있는」
  rationale: 현재 분사는 진행 상태를 가리킨다. 특정 구원론 체계의 결정 어조를 본문에 도입하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: 「진리에 대한 사랑」의 속격 방향
  chosen_reading: 객관적 — 진리를 향한 사랑
  alternative_readings:
  - 주관적 — 진리가 그들에게 베푸는 사랑
  - 진리의 사랑(중립적 형식)
  rationale: 정황은 진리를 받아들이는 데 실패한 것을 가리키므로 객관적 속격이 자연스럽다.
  doctrine_reference: 'Original-language primacy; preserve genuine tension'
