translation:
  language: es
  text: 'Y llevaron su ofrenda delante de Yahvé: seis carros cubiertos[a] y doce bueyes, un carro por cada dos líderes y un buey para cada uno; y los presentaron delante del tabernáculo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carros cubiertos». La expresión hebrea עֶגְלֹת צָב se entiende tradicionalmente como vehículos de transporte con cubierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנָם
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su contribución
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. «Ofrenda» comunica bien el valor de presentación religiosa sin forzar una lectura sacrificial específica que el contexto no desarrolla aquí.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'לִפְנֵי expresa posición relacional/espacial: «delante de» o «ante». Se conserva «Yahvé» por la norma del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la decisión doctrinal del proyecto: el Tetragrámaton se rinde como «Yahvé» para preservar el nombre propio del Dios de Israel.'
- source_word: עֶגְלֹת צָב
  english_pob_choice: covered carts
  chosen_spanish: carros cubiertos
  alternatives_spanish:
  - carros con cubierta
  - carros de transporte cubiertos
  lexicon: HALOT
  rationale: La expresión se entiende tradicionalmente como vehículos de transporte cubiertos. «Carros cubiertos» es natural en español y mantiene la ambigüedad controlada del hebreo sin recargarla.
- source_word: בָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: En este contexto de tiro y transporte, «bueyes» es la equivalencia más idiomática y precisa en español para animales de yugo, más natural que «toros» o el más genérico «ganado».
- source_word: עֲגָלָה עַל שְׁנֵי הַנְּשִׂאִים
  english_pob_choice: a cart for every two leaders
  chosen_spanish: un carro por cada dos líderes
  alternatives_spanish:
  - un carro para cada dos príncipes
  - un carro por cada pareja de líderes
  lexicon: HALOT
  rationale: 'La frase es distributiva: un carro corresponde a dos נשיאים. «Líderes» traduce bien el rango tribal sin introducir matices monárquicos que «príncipes» podría sugerir en español.'
- source_word: הַנְּשִׂאִים
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - príncipes
  lexicon: HALOT
  rationale: En Números 7, נשיאים son cabezas tribales. «Líderes» es claro, contemporáneo y suficientemente amplio para no fijar un cargo más específico de lo que el contexto exige.
- source_word: וְשׁוֹר לְאֶחָד
  english_pob_choice: and an ox for each one
  chosen_spanish: y un buey para cada uno
  alternatives_spanish:
  - y un buey para cada líder
  - y un toro para cada uno
  lexicon: HALOT
  rationale: 'Se mantiene la distribución uno a uno: un buey por cada líder. «Para cada uno» conserva la referencialidad al antecedente sin añadir palabras innecesarias.'
- source_word: וַיַּקְרִיבוּ אוֹתָם
  english_pob_choice: and they presented them
  chosen_spanish: y los presentaron
  alternatives_spanish:
  - y los trajeron cerca
  - y los ofrecieron
  lexicon: HALOT
  rationale: הקריב en este contexto cultual significa presentar o acercar al santuario. «Los presentaron» evita sugerir inmolación y conserva el acto ceremonial.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda de reunión
  - la morada
  lexicon: HALOT
  rationale: מִשְׁכָּן se traduce con el término eclesial y bíblico estándar «tabernáculo». «Tienda de reunión» correspondería más específicamente a אֹהֶל מוֹעֵד.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se preserva el nombre propio como «Yahvé» en vez de sustituirlo por un título, conforme a la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la decisión revisada del POB inglés: יְהוָה se conserva como Yahvé; עֶגְלֹת צָב se entiende como vehículos cubiertos; la presentación de los carros y bueyes se expresa con un verbo de presentación cultual, sin sobreinterpretar el acto como sacrificio.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «ofrenda» y la posterior presentación de los carros y bueyes.
  - «Bueyes» se usó por el contexto de tiro; no se sustituyó por «ganado» para no perder precisión.
  - «Yahvé» se conserva de forma consistente con el estándar del proyecto para el nombre divino.
  - «Tabernáculo» se prefirió sobre «tienda de reunión» por correspondencia léxica con מִשְׁכָּן.
