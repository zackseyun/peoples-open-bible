- from: 'Y dijo Esaú a Jacob: «Por favor, déjame tragar de ese rojo, de ese rojo[a] de ahí, porque estoy agotado». Por eso llamó su nombre Edom[b].'
  to: 'Y Esaú le dijo a Jacob[a]: «Por favor, déjame tragar algo de esa cosa roja, esa cosa roja de ahí, porque estoy agotado». Por eso se le llamó Edom[b].'
  rationale: 'Se ajustó la frase repetida para que preserve la elipsis hebrea con mejor legibilidad en español, sin añadir ''guiso'' al texto principal. Se añadió ''algo de'' para reflejar el valor partitivo de מִן. Se corrigió la fórmula de nombramiento a una construcción española natural y fiel: ''se le llamó Edom''. También se ancló la nota [a] en ''Jacob'', como en el rastro inglés, porque explica la repetición posterior del hebreo en la cita.'
