  yaml_path: translation/deuterocanon/1_esdras/001/005.yaml
  text: according to the writing of David king of Israel[a], and according to the greatness of Solomon his son; and standing in the sanctuary according to your ancestral division, O Levites, before your brothers, the sons of Israel[c][b],
  footnotes:
  - marker: a
    text: Or 'according to the majesty/magnificence of Solomon his son.' The Greek term can denote grandeur or magnificence; here it likely refers to the authoritative scale or dignity of Solomon's arrangement.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'in the holy [place],' which may also be rendered 'in the holy place.'
    reason: lexical_alternative
  - marker: c
    text: The Greek phrase is compressed. The Hebrew parallel more fully reflects the sense 'by your fathers' houses, according to your divisions.'
