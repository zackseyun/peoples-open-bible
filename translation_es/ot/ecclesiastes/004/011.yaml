revisions:
- from: Otra vez[a], si dos se acuestan juntos, se mantienen calientes; pero ¿cómo puede calentarse uno solo?
  to: Además[a], si dos se acuestan juntos, se mantienen abrigados; pero ¿cómo puede calentarse uno solo?
  rationale: Se ajusta גַּם a «Además» para reflejar mejor la función aditiva del hebreo en la secuencia sapiencial. Se reemplaza «se mantienen calientes» por «se mantienen abrigados» para un español más natural y digno, manteniendo el sentido práctico de conservar el calor. La estructura y el contraste retórico del original se conservan intactos.
