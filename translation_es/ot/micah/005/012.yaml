translation:
  language: es
  text: Y cortaré tus imágenes talladas y tus pilares[a] de en medio de ti, y ya no te postrarás[b] a la obra de tus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pilares sagrados» o «piedras erguidas». El término hebreo se refiere a piedras verticales usadas en contextos de culto.
    reason: lexical_alternative
  - marker: b
    text: O «ya no adorarás la obra de tus manos». El hebreo, más literalmente, habla de postrarse; se conserva el acto físico de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: And I will cut off
  chosen_spanish: Y cortaré
  alternatives_spanish:
  - Y eliminaré
  - Y destruiré
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción concreta de cortar o quitar de en medio; «cortaré» conserva esa imagen y su fuerza de remoción sin volverla demasiado abstracta.
- source_word: פְסִילֶיךָ
  english_pob_choice: your carved images
  chosen_spanish: tus imágenes talladas
  alternatives_spanish:
  - tus ídolos
  - tus imágenes esculpidas
  lexicon: HALOT
  rationale: «Imágenes talladas» mantiene la referencia a objetos hechos por talla, más precisa que el genérico «ídolos», y es comprensible en español contemporáneo.
- source_word: וּמַצֵּבוֹתֶיךָ
  english_pob_choice: your pillars
  chosen_spanish: tus pilares
  alternatives_spanish:
  - tus piedras erguidas
  - tus piedras sagradas
  lexicon: HALOT
  rationale: «Pilares» sigue de cerca el valor base de la forma en inglés POB y conserva la referencia a objetos verticales de culto; el contexto permite entender su uso idolátrico.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu interior
  - de en medio de ustedes
  lexicon: HALOT
  rationale: La expresión española reproduce la imagen espacial hebrea de expulsión o remoción desde el centro del pueblo o territorio.
- source_word: וְלֹא תִשְׁתַּחֲוֶה עוֹד
  english_pob_choice: and you will no longer bow down
  chosen_spanish: y ya no te postrarás
  alternatives_spanish:
  - y ya no te inclinarás
  - y ya no adorarás
  lexicon: HALOT
  rationale: «Postrarás» conserva el gesto corporal de adoración que el hebreo subraya; «adorar» sería válido pero más interpretativo y menos concreto.
- source_word: לְמַעֲשֵׂה יָדֶיךָ
  english_pob_choice: to the work of your hands
  chosen_spanish: ante la obra de tus manos
  alternatives_spanish:
  - a la obra de tus manos
  - a lo hecho por tus manos
  lexicon: HALOT
  rationale: «Obra de tus manos» preserva el modismo hebreo; «ante» ayuda en español a expresar el acto de postración delante del objeto sin cambiar el referente.
theological_decisions:
- issue: Distinción entre objetos cultuales concretos y resumen genérico
  english_pob_reading: Translate the specific Hebrew terms as 'carved images' and 'pillars' rather than collapsing both into the generic 'idols.'
  chosen_spanish_reading: 'Mantener dos referentes concretos: «imágenes talladas» y «pilares», en vez de resumirlos como «ídolos».'
  alternative_spanish_readings:
  - tus ídolos y tus piedras sagradas
  - tus imágenes grabadas y tus pilares
  rationale: El hebreo nombra dos clases distintas de objetos de culto; conservar ambas evita perder precisión y respeta la denuncia específica del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza del acto final de culto
  english_pob_reading: 'Render the result as cessation of physical-religious prostration: ''you will no longer bow down to the work of your hands.'''
  chosen_spanish_reading: 'Traducir con un gesto corporal explícito: «ya no te postrarás ante la obra de tus manos».'
  alternative_spanish_readings:
  - ya no adorarás la obra de tus manos
  - ya no te inclinarás ante la obra de tus manos
  rationale: El verbo hebreo señala inclinarse o postrarse, con sentido cultual; «postrar» mantiene esa tensión entre acción física y adoración sin diluirla en un término más general.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios aplicados y el estado de concordancia es alto. La redacción española sigue la distinción del hebreo entre objetos cultuales concretos y el gesto final de postración.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se mantiene «postrar» para reflejar el gesto corporal del hebreo, en línea con la decisión inglesa de no reducirlo a «adorar».
  - «Imágenes talladas» evita el arcaísmo de «imágenes grabadas» y conserva la idea de talla/carvado.
  - «Pilares» es suficientemente neutral en español y admite la aclaración de la nota sin sobrecargar el texto principal.
