translation:
  language: es
  text: 'Pero Saúl dijo[a]: «No se dará muerte a ningún hombre en este día, porque hoy Yahvé ha dado salvación en Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé ha obrado liberación» o «Yahvé ha dado victoria en Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Saul said
  chosen_spanish: Pero Saúl dijo
  alternatives_spanish:
  - Y Saúl dijo
  - Entonces Saúl dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «pero» refleja bien el contraste inmediato con la propuesta anterior y mantiene el sentido de continuación narrativa.
- source_word: לֹא יוּמַת אִישׁ
  english_pob_choice: Not a man shall be put to death
  chosen_spanish: Ningún hombre será muerto
  alternatives_spanish:
  - No se dará muerte a ningún hombre
  - Ninguna persona será ejecutada
  lexicon: HALOT
  rationale: יוּמַת expresa un pasivo causativo/legal de מות; en español, «será muerto» conserva esa fuerza legal mejor que «morirá». «Ningún hombre» mantiene el valor genérico de אִישׁ sin volver la frase demasiado literal o extraña.
- source_word: בַּיּוֹם הַזֶּה
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - en este mismo día
  lexicon: HALOT
  rationale: La frase temporal se mantiene de forma bastante directa con «en este día», que preserva la estructura hebrea. Se evita sustituirla por «hoy» para no nivelar dos expresiones temporales distintas del versículo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la decisión de Saúl; «porque» comunica con claridad la relación explicativa en español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma natural y clara en español para el segundo marcador temporal, conservando la variación observada en el hebreo/inglés auditado.
- source_word: עָשָׂה יְהוָה תְּשׁוּעָה
  english_pob_choice: Yahweh has brought salvation
  chosen_spanish: Yahvé ha dado salvación
  alternatives_spanish:
  - Yahvé ha traído salvación
  - Yahvé ha obrado liberación
  - Yahvé ha dado victoria
  lexicon: HALOT
  rationale: La expresión idiomática עָשָׂה תְּשׁוּעָה se traduce de manera natural como «ha dado salvación», manteniendo la agencia divina y la amplitud teológica de תְּשׁוּעָה. «Liberación» o «victoria» son posibles, pero «salvación» conserva mejor la formulación del texto base.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé», preservando el nombre divino personal en vez de sustituirlo por un título.'
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - para Israel
  - entre Israel
  lexicon: HALOT
  rationale: El valor locativo de ב se conserva con «en», que reproduce la relación espacial/social básica del hebreo.
theological_decisions:
- issue: El Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino. La política del proyecto pide transliterarlo como «Yahvé», no reemplazarlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: תְּשׁוּעָה en contexto militar
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - victoria
  rationale: Aunque el contexto es militar, «salvación» conserva el alcance teológico más amplio del término y mantiene centrada en Dios la acción salvadora.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios pendientes y el cruce de control informa acuerdo alto sin objeciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la diferencia entre «en este día» y «hoy» para reflejar la repetición temporal del hebreo.
  - «Ser muerto» preserva mejor el matiz legal-pasivo de יוּמַת que una simple traducción intransitiva como «morirá».
