    issue: La nota al pie [a] está colocada sobre 'desnudos' en lugar de sobre 'coberturas'.
    rationale: Las alternativas 'ceñidores' y 'delantales' explican חֲגֹרֹת, no עֵירֻמִּם. Tal como está, la nota induce una relación léxica incorrecta con 'desnudos'.
  - severity: low
    issue: '''Coberturas'' es algo rígido en español para una prenda.'
    rationale: Aunque es defendible por amplitud semántica, no es la opción más idiomática. Aun así, no exige un cambio obligatorio si se prioriza la cautela semántica del hebreo y de la POB inglesa.
  revised_spanish_text: Entonces se abrieron los ojos de ambos, y supieron que estaban desnudos. Así cosieron hojas de higuera y se hicieron coberturas[a] para sí mismos.
  revised_footnotes:
