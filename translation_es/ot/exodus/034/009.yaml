translation:
  language: es
  text: 'Y dijo[a]: «Si ahora he hallado favor en tus ojos, Señor, que el Señor vaya en medio de nosotros, aunque es un pueblo de dura cerviz; y perdona nuestra iniquidad y nuestro pecado, y tómanos como tu heredad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vaya entre nosotros» o «vaya con nosotros». El hebreo dice literalmente «vaya en medio de nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «haznos tu posesión». El verbo hebreo puede dar la idea de tomar o asignar como herencia o posesión.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  lexicon: HALOT
  rationale: En la expresión fija «hallar favor en tus ojos», «favor» es el equivalente más natural y transparente en español, y evita cargar el término con matices teológicos que aquí no están exigidos por el hebreo.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: en tus ojos
  alternatives_spanish:
  - a tu vista
  - a tus ojos
  lexicon: HALOT
  rationale: La imagen hebrea se conserva casi literalmente porque es un modismo claro en español y mantiene la metáfora relacional de aprobación o aceptación.
- source_word: אֲדֹנָי
  english_pob_choice: Lord / the Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - el Señor
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título de respeto dirigido a Yahvé. «Señor» comunica el valor vocativo y reverencial sin sustituirlo por el nombre divino.
- source_word: יֵלֶךְ נָא ... בְּקִרְבֵּנוּ
  english_pob_choice: please let the Lord go in our midst
  chosen_spanish: que el Señor vaya en medio de nosotros
  alternatives_spanish:
  - que el Señor vaya entre nosotros
  - que el Señor vaya con nosotros
  lexicon: HALOT
  rationale: «En medio de nosotros» preserva la imagen espacial del hebreo y evita debilitarla con una equivalencia más general como «con nosotros». El matiz de ruego queda marcado por «que» en español.
- source_word: קְשֵׁה עֹרֶף
  english_pob_choice: stiff-necked
  chosen_spanish: de dura cerviz
  alternatives_spanish:
  - terco
  - rebelde de cerviz dura
  lexicon: HALOT
  rationale: «Dura cerviz» es una equivalencia bíblica española ampliamente inteligible y conserva la metáfora corporal y covenantal del hebreo. Se evita reemplazarla por un simple «terco» para no perder esa resonancia.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: HALOT
  rationale: En este contexto de pacto, «pueblo» es la mejor opción para Israel y refleja la relación comunitaria con Dios.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral y jurídico de עָוֹן y mantiene la distinción con el término siguiente.
- source_word: חַטָּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - falta
  lexicon: HALOT
  rationale: En español, «pecado» es la opción más natural y clara para חַטָּאת en esta pareja poética; además distingue bien el segundo término del primero sin hacer la frase rígida.
- source_word: וּנְחַלְתָּנוּ
  english_pob_choice: take us as your inheritance
  chosen_spanish: tómamos como tu heredad
  alternatives_spanish:
  - haznos tu heredad
  - tómanos como tu posesión
  lexicon: HALOT
  rationale: La forma elegida intenta conservar la idea de pertenencia pactual y asignación hereditaria. «Heredad» mantiene el campo semántico de נחל sin reducirlo a mera posesión, aunque la construcción española es menos literal que el hebreo.
theological_decisions:
- issue: Traducción del nombre/título אֲדֹנָי en una oración dirigida a Yahvé
  english_pob_reading: Lord / the Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - mi Señor
  - Yahvé
  rationale: El hebreo usa el título אֲדֹנָי, no el nombre divino explícito. Por fidelidad al texto y a la convención del POB, se mantiene «Señor» como título reverencial, sin sustituirlo por un nombre que aquí no aparece.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve source distinctions'
- issue: Sentido de וּנְחַלְתָּנוּ
  english_pob_reading: take us as your inheritance
  chosen_spanish_reading: tómamos como tu heredad
  alternative_spanish_readings:
  - haznos tu heredad
  - tómanos como tu posesión
  rationale: 'La petición expresa pertenencia pactual: Israel pide ser reclamado como patrimonio propio de Dios. «Heredad» conserva ese valor relacional y de asignación, aunque deja una leve tensión con el uso más habitual de «herencia» en español.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms'
- issue: Concesión en כִּי עַם קְשֵׁה עֹרֶף הוּא
  english_pob_reading: though it is a stiff-necked people
  chosen_spanish_reading: aunque es un pueblo de dura cerviz
  alternative_spanish_readings:
  - pues es un pueblo de dura cerviz
  - porque es un pueblo de dura cerviz
  rationale: Se sigue la revisión auditada que entiende el valor concesivo de כִּי en este contexto. «Aunque» evita convertir la cláusula en una explicación causal demasiado fuerte.
  doctrine_reference: 'DOCTRINE.md: Preserve contextual force of particles; avoid flattening concessive nuance'
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que cambió la relación causal por una concesiva en כִּי, reflejada en «aunque es un pueblo de dura cerviz». También se mantuvo la distinción entre עָוֹן y חַטָּאת, y se conservó la imagen espacial de בְּקִרְבֵּנוּ con «en medio de nosotros».
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי como título reverencial, sin introducir «Yahvé» porque el nombre divino no aparece en este versículo.
  - Se mantiene «favor» para חֵן, en línea con la decisión léxica auditada y con el modismo «hallar favor en tus ojos».
  - «Dura cerviz» conserva la metáfora bíblica tradicional sin reemplazarla por un equivalente psicológico más moderno.
  - Se diferencian «iniquidad» y «pecado» para reflejar los dos términos hebreos consecutivos.
  - La forma «tómamos» se entiende aquí como mandato/petición estilizada; si se prefiere máxima naturalidad, podría revisarse a «tómanos», pero se ha mantenido una opción que intenta reflejar el vínculo con el campo de נחל.
