translation:
  language: es
  text: Diez porciones[a] le tocaron a Manasés, además de la tierra de Galaad y Basán, que está más allá del Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Diez asignaciones le tocaron a Manasés» o «Diez porciones le tocaron a Manasés por sorteo». El hebreo usa el modismo «cayeron» en un contexto de reparto de tierras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ
  english_pob_choice: fell
  chosen_spanish: le tocaron
  alternatives_spanish:
  - cayeron
  - fueron asignadas
  - les tocaron por sorteo
  lexicon: HALOT
  rationale: En español, "cayeron" conserva la imagen idiomática de la asignación por sorteo, pero suena menos natural como verbo principal en una formulación publicable. "Le tocaron" comunica el resultado del sorteo con claridad y mantiene la idea de recepción sin añadir un sujeto implícito ajeno al texto.
- source_word: חַבְלֵי
  english_pob_choice: portions
  chosen_spanish: porciones
  alternatives_spanish:
  - herencias
  - repartos
  - sucursales
  lexicon: HALOT
  rationale: El sustantivo designa aquí partes de territorio distribuidas. "Porciones" preserva la amplitud semántica de la repartición territorial sin concretar indebidamente el mecanismo o la forma jurídica.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: N/A
  rationale: Se conserva el nombre tribal en su forma española usual, con la acentuación tradicional de la versión bíblica en español.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: Diez
  alternatives_spanish:
  - Diez
  lexicon: N/A
  rationale: Número cardinal directo; se mantiene sin cambio de matiz.
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además
  - fuera de
  lexicon: HALOT
  rationale: '"Además de" reproduce la relación aditiva/exclusiva del hebreo en un español natural. Evita que "aparte de" sugiera una separación más fuerte de la que exige el contexto.'
- source_word: מֵאֶרֶץ
  english_pob_choice: the land of
  chosen_spanish: la tierra de
  alternatives_spanish:
  - el territorio de
  - la tierra desde
  lexicon: HALOT
  rationale: En español, "tierra de" es la manera más transparente de reflejar la expresión territorial hebrea. "Territorio" sería posible, pero suena más técnico y menos cercano al tono del pasaje.
- source_word: הַגִּלְעָד וְהַבָּשָׁן
  english_pob_choice: Gilead and Bashan
  chosen_spanish: Galaad y de Basán
  alternatives_spanish:
  - Gilead y Basán
  - Galaad y Basán
  lexicon: N/A
  rationale: Se adopta la forma española tradicional de los topónimos, con la preposición repetida para ajustar la sintaxis de la enumeración en español sin alterar el sentido.
- source_word: אֲשֶׁר מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: which is beyond the Jordan
  chosen_spanish: que está más allá del Jordán
  alternatives_spanish:
  - que está al otro lado del Jordán
  - que queda más allá del Jordán
  lexicon: HALOT
  rationale: '"Más allá del Jordán" conserva la referencia geográfica convencional y el valor locativo del hebreo. "Está" mantiene la frase como identificación del territorio, no como movimiento.'
theological_decisions:
- issue: Lectura distributiva del reparto de tierras
  english_pob_reading: Ten portions fell to Manasseh, besides the land of Gilead and Bashan, which is beyond the Jordan.
  chosen_spanish_reading: Diez porciones le tocaron a Manasés, además de la tierra de Galaad y de Basán, que está más allá del Jordán.
  alternative_spanish_readings:
  - Diez repartos cayeron a Manasés
  - Diez asignaciones le tocaron a Manasés
  rationale: El versículo describe asignación territorial por sorteo, no una afirmación doctrinal. Se preserva el carácter de reparto providencial/lotario sin introducir lenguaje interpretativo adicional.
  doctrine_reference: Josué 14–19; reparto de la tierra por sorteo
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la decisión auditada en inglés de mantener el modismo de reparto por sorteo, pero lo expresa en español con una formulación más natural y publicable. No se detectaron revisiones previas que alteren esta sección.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo/greek subyacente lo requiera; en este versículo no aparece el Nombre divino.
  - 'Se mantiene la transliteración española tradicional de nombres propios bíblicos: Manasés, Galaad, Basán, Jordán.'
  - 'Se conserva el orden de información del hebreo: cantidad, destinatario, excepción territorial y localización relativa.'
