translation:
  language: es
  text: Así tomó Moisés la vara[a] de delante de Yahvé, tal como él le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bastón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - agarró
  - tomó en sus manos
  lexicon: HALOT
  rationale: El wayyiqtol de לקח expresa una acción narrativa simple; «tomó» reproduce con naturalidad ese pasado sin añadir matices innecesarios.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: Nombre propio bíblico estándar
  rationale: Se mantiene el nombre propio en su forma española habitual y reconocible.
- source_word: הַמַּטֶּה
  english_pob_choice: the staff
  chosen_spanish: el bastón
  alternatives_spanish:
  - la vara
  - el cayado
  - el bastón
  lexicon: HALOT
  rationale: El término puede ser «staff/rod/rod» según contexto; en español, «bastón» comunica bien el objeto físico visible. Aun así, se preserva la alternativa semántica en nota porque la forma tradicional «vara» también es posible y el contexto cultual no exige especificar más.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - desde delante de
  lexicon: HALOT
  rationale: «De delante de» conserva la imagen espacial concreta del hebreo y evita convertir prematuramente la expresión en una abstracción teológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la decisión doctrinal del proyecto para el Tetragrámaton, adaptando la transliteración a la ortografía española usual («Yahvé»).
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justo como
  lexicon: HALOT
  rationale: «Tal como» expresa conformidad exacta con el mandato previo, con un español natural y solemne.
- source_word: צִוָּהוּ
  english_pob_choice: he had commanded him
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había comandado
  lexicon: HALOT
  rationale: «Mandado» reproduce el valor de un encargo/orden dada previamente; el pluscuamperfecto refleja correctamente la anterioridad del mandato respecto de la acción narrada.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se evita la sustitución por un título impersonal y se conserva el nombre divino con una transliteración comprensible para lectores en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de מִלִּפְנֵי יְהוָה
  english_pob_reading: from before Yahweh
  chosen_spanish_reading: de delante de Yahvé
  alternative_spanish_readings:
  - de la presencia de Yahvé
  - desde delante de Yahvé
  rationale: La expresión hebrea es espacial y cultual. «De delante de» mantiene esa concreción sin forzar una paráfrasis más abstracta.
  doctrine_reference: HALOT / sintaxis del hebreo bíblico
translation_notes:
  revision_awareness: El control de revisión disponible indica alta concordancia con la traducción inglesa auditada y no reporta cambios aplicados; la propuesta española se ajusta a ese mismo sentido, manteniendo el orden narrativo y la relación de conformidad con el mandato previo.
  spanish_consistency_notes:
  - Se mantiene la distinción entre nombre divino («Yahvé») y título («el SEÑOR») según la pauta del proyecto.
  - «Tal como» y el pluscuamperfecto («había mandado») reflejan bien la conformidad exacta y la anterioridad narrativa.
  - Se conserva una nota léxica porque מַטֶּה admite más de una equivalencia española legítima.
