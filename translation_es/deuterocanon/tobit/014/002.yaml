translation:
  language: es
  text: Y tenía cincuenta y ocho años cuando perdió la vista[a], y después de ocho años la recobró; y hacía obras de misericordia[b], y siguió temiendo a Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente que «perdió las vistas/los ojos», un giro idiomático para perder la vista y luego recuperarla.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «daba limosnas»; el término griego puede abarcar limosna en sentido estricto o actos de misericordia en sentido más amplio.
    reason: lexical_alternative
  - marker: c
    text: El griego dice solo «temer»; el complemento «a Dios» se sobreentiende por el contexto piadoso y se explicita para claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἐτῶν πεντήκοντα ὀκτὼ
  english_pob_choice: he was fifty-eight years old
  chosen_spanish: tenía cincuenta y ocho años
  alternatives_spanish:
  - era de cincuenta y ocho años
  - contaba con cincuenta y ocho años
  lexicon: LSJ
  rationale: La expresión griega es una fórmula idiomática de edad; en español, «tenía cincuenta y ocho años» es natural y fiel sin forzar una estructura arcaica.
- source_word: ἀπώλεσεν τὰς ὄψεις
  english_pob_choice: he lost his sight
  chosen_spanish: perdió la vista
  alternatives_spanish:
  - quedó ciego
  - perdió sus ojos
  lexicon: LSJ
  rationale: El griego dice literalmente que «perdió las vistas/los ojos» en un giro idiomático para la ceguera. «Perdió la vista» conserva el sentido y la imagen sin sonar extraño en español.
- source_word: μετὰ ἔτη ὀκτὼ
  english_pob_choice: after eight years
  chosen_spanish: después de ocho años
  alternatives_spanish:
  - ocho años después
  lexicon: LSJ
  rationale: Ambas opciones son válidas; «después de ocho años» sigue de cerca la relación temporal del griego y mantiene un tono sobrio.
- source_word: ἀνέβλεψεν
  english_pob_choice: he regained it
  chosen_spanish: la recobró
  alternatives_spanish:
  - recuperó la vista
  - volvió a ver
  lexicon: LSJ
  rationale: En contextos de sanidad de la vista, el verbo significa volver a ver o recuperar la vista. Como la cláusula anterior ya menciona «la vista», el pronombre «la» evita repetición innecesaria y mantiene la referencia clara.
- source_word: ἐποίει ἐλεημοσύνας
  english_pob_choice: he did acts of mercy
  chosen_spanish: hacía obras de misericordia
  alternatives_spanish:
  - daba limosnas
  - hacía actos de misericordia
  - practicaba la limosna
  lexicon: LSJ
  rationale: El término griego puede referirse a limosnas o, más ampliamente, a obras de misericordia. «Hacía obras de misericordia» conserva esa amplitud y la fuerza moral de la frase, mientras el imperfecto se refleja con «hacía».
- source_word: προσεθέτο φοβεῖσθαι
  english_pob_choice: he continued to fear God
  chosen_spanish: siguió temiendo a Dios
  alternatives_spanish:
  - continuó temiendo
  - se propuso temer a Dios
  lexicon: LSJ
  rationale: El giro expresa continuidad o añadidura en el temor piadoso. En español, «siguió temiendo a Dios» comunica claramente la persistencia del acto reverente y mantiene el objeto explícito que el contexto supone.
theological_decisions:
- issue: Objeto implícito de φοβεῖσθαι
  english_pob_reading: 'Supplied ''God'' in English: ''continued to fear God'''
  chosen_spanish_reading: «siguió temiendo a Dios»
  alternative_spanish_readings:
  - «siguió temiendo»
  - «continuó en temor reverente»
  rationale: En la literatura bíblica, «temer» en un resumen piadoso suele referirse a temer a Dios. El español necesita el complemento para evitar ambigüedad; añadir «a Dios» refleja la intención implícita del contexto sin ampliar indebidamente el sentido.
  doctrine_reference: Decisión de claridad contextual; mantiene la lectura devocional y no introduce una afirmación doctrinal nueva.
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó «kept doing acts of mercy» a «did acts of mercy» para un reflejo más directo de ἐποίει. La redacción española adopta una solución igualmente directa con imperfecto («hacía») y conserva la amplitud semántica de ἐλεημοσύνας. También se mantiene la aclaración del objeto implícito de φοβεῖσθαι, siguiendo el criterio auditado de la versión inglesa.
  spanish_consistency_notes:
  - Se usó «vista» en lugar de una expresión más literal como «los ojos» por naturalidad y fidelidad idiomática.
  - Se eligió «obras de misericordia» para preservar la amplitud de ἐλεημοσύνας sin reducirla solo a dinero.
  - Se explicitó «a Dios» por la misma razón de claridad que en el audit trail inglés, sin alterar el sentido del griego.
  - El tono general es formal y bíblico, pero en español moderno natural, evitando calcos innecesarios.
