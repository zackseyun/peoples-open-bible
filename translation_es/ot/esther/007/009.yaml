revisions:
- from: 'Entonces Harbona[a], uno de los eunucos delante del rey, dijo: «También, he aquí, el madero que Amán hizo para Mardoqueo, que habló bien por el rey, está en la casa de Amán, alto de cincuenta codos». Y el rey dijo[c][b]: «Cuélguenlo en él».'
  to: 'Entonces Harbona, uno de los eunucos delante del rey, dijo: «También, he aquí, la horca[a] que Amán hizo para Mardoqueo, que habló en favor del rey[b], está en la casa de Amán, de cincuenta codos de alto». Y el rey dijo[c]: «Cuélguenlo en ella».'
  rationale: Se ajusta הָעֵץ a 'la horca' para seguir la decisión principal contextual del expediente POB, dejando la literalidad en nota; se mejora el español de דִּבֶּר טוֹב עַל הַמֶּלֶךְ con 'en favor del rey' y se conserva la ambigüedad en nota; se hace más natural la expresión de altura; y se simplifica el aparato de notas quitando el anclaje invertido [c][b] tras 'dijo', ya que las notas b y c pertenecen respectivamente a 'en favor del rey' y al mandato final.
