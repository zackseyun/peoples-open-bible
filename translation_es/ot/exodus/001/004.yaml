lexical_decisions:
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dán
  lexicon: HALOT
  rationale: Nombre propio de una de las tribus de Israel. En español bíblico la forma establecida es «Dan», por lo que se mantiene la transliteración usual sin añadir artículo ni glosa.
- source_word: וְ/נַפְתָּלִ֖י
  english_pob_choice: and Naphtali
  chosen_spanish: y Neftalí
  alternatives_spanish:
  - y Naphtalí
  lexicon: HALOT
  rationale: La conjunción וְ se rinde naturalmente como «y». Para el nombre propio, «Neftalí» es la forma española bíblica más reconocible y fiel en uso eclesial general, preferible a una transliteración más inglesa.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gád
  lexicon: HALOT
  rationale: Nombre propio de tribu/personaje. Se conserva la forma tradicional española «Gad», que coincide con el valor transliterado del hebreo.
- source_word: וְ/אָשֵֽׁר
  english_pob_choice: and Asher
  chosen_spanish: y Aser
  alternatives_spanish:
  - y Asher
  lexicon: HALOT
  rationale: La conjunción וְ se traduce como «y». Para el nombre propio se usa «Aser», forma española tradicional y plenamente reconocible, en lugar de la transliteración inglesa «Asher».
translation_notes:
  revision_awareness: El inglés POB eliminó la coma innecesaria tras el primer nombre para reflejar una lista simple. En español se adopta también una lista simple sin coma tras «Dan», manteniendo el mismo ritmo enumerativo y la correspondencia directa con el hebreo.
  spanish_consistency_notes:
  - 'Se mantienen los nombres propios en su forma bíblica española usual: Dan, Neftalí, Gad y Aser.'
  - No se añaden notas textuales porque el verso es una lista nominal sin variantes interpretativas relevantes en el paquete fuente.
  - Se conserva la coordinación simple con «y» antes del último elemento, acorde con el hebreo conjuntivo y con el registro natural del español.
