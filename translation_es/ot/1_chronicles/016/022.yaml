translation:
  language: es
  text: No toquen a mis ungidos[a], ni hagan daño a mis profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «mis ungidos»; el término está emparentado con «Mesías», pero aquí designa en sentido amplio a los que Dios ha ungido, no al Mesías singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְּעוּ
  english_pob_choice: touch
  chosen_spanish: toquen
  alternatives_spanish:
  - toquen
  - pongan la mano sobre
  - hieran
  lexicon: HALOT
  rationale: נגע suele significar ‘tocar’ o ‘hacer contacto’. En esta prohibición, «toquen» conserva la fuerza directa y el valor de contacto hostil implícito en el paralelismo con la segunda cláusula, sin añadir una violencia no explícita en el verbo.
- source_word: בִּמְשִׁיחָי
  english_pob_choice: my anointed ones
  chosen_spanish: mis ungidos
  alternatives_spanish:
  - mis ungidos
  - mis mesías
  - mis consagrados
  lexicon: HALOT
  rationale: מָשִׁיחַ significa literalmente ‘ungido’. En español, «ungidos» comunica el sentido común y evita importar la lectura técnica o única de «Mesías», que aquí no es el valor del plural con sufijo de primera persona.
- source_word: וּבִנְבִיאַי
  english_pob_choice: my prophets
  chosen_spanish: mis profetas
  alternatives_spanish:
  - mis profetas
  lexicon: HALOT
  rationale: נָבִיא es de sentido directo ‘profeta’. El sufijo de primera persona se refleja naturalmente con «mis profetas».
- source_word: תָּרֵעוּ
  english_pob_choice: harm
  chosen_spanish: hagan daño
  alternatives_spanish:
  - perjudiquen
  - maltraten
  - hagan mal a
  lexicon: HALOT
  rationale: La forma causativa/jussiva de רעע expresa causar daño o mal. «Hagan daño» es natural en español, mantiene la amplitud semántica y corresponde bien al paralelismo con «toquen».
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - 'No'
  - Nunca
  lexicon: HALOT
  rationale: אַל introduce prohibición. En español bíblico moderno, «No» es la forma más transparente y directa.
theological_decisions:
- issue: Sentido no mesiánico de מְשִׁיחִי / מְשִׁיחָי en plural
  english_pob_reading: my anointed ones
  chosen_spanish_reading: mis ungidos
  alternative_spanish_readings:
  - mis mesías
  - mis consagrados
  rationale: Aunque el término está relacionado con «Mesías», el contexto habla de personas apartadas por Dios en general. «Mis ungidos» preserva la referencia amplia sin convertir el plural en un título cristológico singular ni perder la relación lexical con la unción.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; no importar afirmaciones doctrinales que el texto no hace.'
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo de WLC y concuerda con el audit trail en inglés: mantiene el plural de sentido en מְשִׁיחָי, la prohibición breve de אַל + imperfecto, y el paralelismo entre el contacto prohibido y el daño prohibido. No se requerían revisiones textuales adicionales según el registro más reciente.'
  spanish_consistency_notes:
  - Se prefirió «ungidos» en vez de «mesías» para evitar una carga cristológica no presente en el verso.
  - «Hagan daño» conserva la amplitud de תָּרֵעוּ sin especificar el tipo de lesión.
  - La puntuación sigue el paralelismo hebreo con dos mandatos negativos coordinados por coma y «ni».
