translation:
  language: es
  text: 'Sucedió en uno de aquellos días que él subió a una barca, y sus discípulos con él, y les dijo: «Pasemos al otro lado del lago».[a] Y salieron.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Crucemos al otro lado del lago».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego es náutico y puede significar «zarparon», «se hicieron a la vela» o «salieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula introduce una transición narrativa lucana. «Y aconteció» conserva el valor de apertura de evento sin sonar tan arcaico como «y aconteció que», y representa el matiz de δέ con una simple coordinación inicial.
- source_word: ἐν μιᾷ τῶν ἡμερῶν
  english_pob_choice: on one of those days
  chosen_spanish: en uno de aquellos días
  alternatives_spanish:
  - un día
  - en uno de los días
  lexicon: BDAG
  rationale: La expresión es idiomática e indefinida dentro de un período ya sugerido por el contexto. «En uno de aquellos días» preserva mejor el sentido partitivo y la deixis implícita que «un día».
- source_word: ἐνέβη εἰς πλοῖον
  english_pob_choice: got into a boat
  chosen_spanish: subió a una barca
  alternatives_spanish:
  - se subió a una barca
  - entró en una barca
  lexicon: BDAG
  rationale: ἐμβαίνω expresa una acción de subir/embarcar. «Subió a una barca» es natural en español y conserva el movimiento ingresivo. Se prefiere «barca» a «barco» por el tamaño probable y el uso más cercano al contexto lacustre.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples with him
  chosen_spanish: sus discípulos con él
  alternatives_spanish:
  - y sus discípulos
  - junto con sus discípulos
  lexicon: BDAG
  rationale: El griego coordina la presencia de los discípulos con la acción de embarcar. «Con él» explicita de manera sobria que iban en la misma barca, sin añadir contenido ajeno al texto.
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo a ellos
  - les habló
  lexicon: BDAG
  rationale: La construcción griega es un decir dirigido. En español, «les dijo» es la forma más natural y transparente; mantiene la dirección del habla sin sobrecargar la frase.
- source_word: Διέλθωμεν
  english_pob_choice: Let us go across
  chosen_spanish: Pasemos
  alternatives_spanish:
  - Crucemos
  - Vayamos al otro lado
  lexicon: BDAG
  rationale: El subjuntivo exhortativo en primera plural pide una invitación inclusiva. «Pasemos» transmite la propuesta de ir de un lado a otro; la dirección completa queda explícita con la frase siguiente.
- source_word: εἰς τὸ πέραν τῆς λίμνης
  english_pob_choice: to the other side of the lake
  chosen_spanish: al otro lado del lago
  alternatives_spanish:
  - a la otra orilla del lago
  - al lado opuesto del lago
  lexicon: BDAG
  rationale: τὸ πέραν es un idiomatismo de localización opuesta. «Al otro lado del lago» comunica con naturalidad la relación espacial y conserva el sustantivo concreto «lago» para λίμνη.
- source_word: ἀνήχθησαν
  english_pob_choice: they set out
  chosen_spanish: se hicieron a la mar
  alternatives_spanish:
  - partieron
  - se alejaron navegando
  lexicon: BDAG
  rationale: ἀνάγω en uso náutico puede significar zarpar o hacerse a la mar. Aunque el cuerpo de agua es un lago, la expresión española tradicional «se hicieron a la mar» conserva la idea de partir por agua; se mantiene con cautela como equivalencia dinámica breve, reconocida en uso náutico.
theological_decisions:
- issue: Término náutico final en un lago
  english_pob_reading: they set out
  chosen_spanish_reading: se hicieron a la mar
  alternative_spanish_readings:
  - partieron
  - zarparon
  rationale: 'No hay tensión doctrinal, pero sí una tensión léxica: el griego usa un verbo técnico de navegación que en español se expresa de varias maneras. Se eligió una frase idiomática breve que preserve el movimiento de partida por agua; aun así, el lago impide leerla como referencia estricta al mar.'
  doctrine_reference: No aplica
- issue: Dirección del desplazamiento
  english_pob_reading: Let us go across to the other side of the lake
  chosen_spanish_reading: Pasemos al otro lado del lago
  alternative_spanish_readings:
  - Crucemos al otro lado del lago
  - Vayamos al otro lado del lago
  rationale: La exhortación incluye intención compartida y destino. «Pasemos» mantiene la inclusividad del subjuntivo exhortativo sin forzar una traducción demasiado literal que sonaría pesada en español.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se revisó el paquete fuente griego SBLGNT y el audit trail inglés POB. No se detectaron revisiones posteriores que alteraran el sentido; se preservó la progresión narrativa, la invitación inclusiva en primera persona plural y el cierre náutico con una solución idiomática española ajustada al contexto de un lago.
  spanish_consistency_notes:
  - Se mantuvo «lago» para λίμνη, no «mar», por fidelidad contextual.
  - Se prefirió «barca» por coherencia con un entorno lacustre y con el valor anarthrous de πλοῖον.
  - Se evitó «Cristo» y otras terminologías no presentes en el versículo.
  - La puntuación sigue el discurso directo español con comillas latinas.
  - Las alternativas en notas preservan la ambigüedad legítima del verbo náutico final.
