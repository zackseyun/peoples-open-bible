  to: Bel se inclina; Nebo se encorva. Sus ídolos[a] son para las bestias y para el ganado. Vuestras cargas son llevadas[c][b], cargadas como una carga para el fatigado[d].
  rationale: Se corrige la persona gramatical a «vuestras cargas» para reflejar el sufijo hebreo 2mp y el inglés auditado «your loads», se ajusta el verbo inicial a presente profético («se inclina»), se recoloca la nota [a] al sustantivo «ídolos» para conservar la alternativa documentada «imágenes», y se afina «como una carga» para acercarse mejor a מַשָּׂא sin perder naturalidad en español.
