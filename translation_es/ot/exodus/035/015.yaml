review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la lista de objetos cultuales de Éxodo 35:15 y sigue bien el sentido del hebreo: altar del incienso, sus varas, el aceite de la unción, el incienso aromático y el colgante de entrada del tabernáculo. Sin embargo, la nota alternativa de מָסַךְ הַפֶּתַח introduce «pantalla», que en español bíblico moderno suena impropia y menos fiel al objeto cultual. Además, el sistema de notas está desalineado: la nota [b] en inglés corresponde a «incienso de especias / incienso condimentado», pero en el borrador español se aplicó erróneamente a «a la entrada del tabernáculo».'
  spanish_quality_summary: 'El texto es claro, natural y de buen registro eclesial: «el altar del incienso», «sus varas», «el aceite de la unción», «el incienso aromático». La secuencia final también es legible. La principal mejora necesaria es reparar las notas para que reflejen las alternativas correctas y evitar «pantalla», que no es una opción idiomática adecuada aquí. Conviene mantener «cortina» en el texto principal por claridad, con «colgadura» o «cortina para la entrada» como alternativas mejores.'
  glossary_alignment: No hay conflicto con los términos teológicos principales del proyecto. «Tabernáculo» está bien. «Altar del incienso» y «aceite de la unción» siguen fielmente el rastro léxico. «Incienso aromático» representa bien קְטֹרֶת הַסַּמִּים. Para מָסָךְ, «cortina» es aceptable en español, pero las alternativas deben preservar la distinción cultual mejor que «pantalla».
  issues:
  - severity: medium
    issue: Las notas [b] y [c] no corresponden al mismo contenido alternativo que en el audit trail inglés.
    rationale: La nota inglesa [b] pertenece a קְטֹרֶת הַסַּמִּים («incienso de especias / incienso condimentado»), mientras que en el borrador español [b] se ancló a la frase final sobre la entrada del tabernáculo.
  - severity: medium
    issue: La alternativa «la pantalla» para מָסַךְ resulta poco natural e inadecuada en español bíblico.
    rationale: Aunque «screen» fue útil en inglés para distinguir tipos de cortinaje, «pantalla» en español suele evocar otros objetos y no comunica bien una pieza textil cultual de entrada.
  - severity: low
    issue: El orden de marcadores al final puede simplificarse para que cada nota quede anclada en la palabra o frase correspondiente.
    rationale: Anclar [b] en «incienso aromático» y [c] en «cortina» mejora la trazabilidad semántica y evita confusión al lector.
  revised_spanish_text: el altar del incienso y sus varas, y el aceite de la unción, y el incienso aromático[b], y la cortina[c] para la entrada del tabernáculo;
  revised_footnotes:
