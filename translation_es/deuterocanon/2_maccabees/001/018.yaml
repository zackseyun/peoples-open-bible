translation:
  language: es
  text: Puesto que estamos a punto de celebrar la purificación del templo el veinticinco de Quisleu[a], hemos juzgado necesario explicárselo, para que ustedes también celebren la fiesta de las tiendas y del fuego, cuando Nehemías, que construyó tanto el templo como el altar, ofreció sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «y la fiesta del fuego». El griego dice simplemente «y del fuego», probablemente aludiendo al relato conmemorativo que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μέλλοντες ἄγειν
  english_pob_choice: Since we are about to celebrate
  chosen_spanish: Como estamos a punto de celebrar
  alternatives_spanish:
  - Puesto que vamos a celebrar
  - Estando a punto de celebrar
  lexicon: LSJ
  rationale: El participio con μέλλω expresa inminencia, y ἄγειν en contexto festivo significa celebrar o conmemorar una fiesta. «Como estamos a punto de celebrar» conserva esa inminencia con español natural.
- source_word: ἐν τῷ Χασελεὺ πέμπτῃ καὶ εἰκάδι
  english_pob_choice: on the twenty-fifth of Chislev
  chosen_spanish: en el veinticinco de Quisleu
  alternatives_spanish:
  - el veinticinco de Chislev
  - el veinticinco día de Quisleu
  lexicon: LSJ
  rationale: Se conserva el nombre del mes como transliteración en español, siguiendo el valor de nombre propio del calendario judío. «Veinticinco» expresa πέμπτῃ καὶ εἰκάδι de manera natural.
- source_word: τὸν καθαρισμὸν τοῦ ἱεροῦ
  english_pob_choice: the purification of the temple
  chosen_spanish: la purificación del templo
  alternatives_spanish:
  - la limpieza del templo
  - la purificación del santuario
  lexicon: LSJ
  rationale: καθαρισμός es «purificación/limpieza», y ἱερόν aquí refiere al templo. «Purificación del templo» es fiel y clara, sin añadir «dedicación» que el griego no usa.
- source_word: δέον ἡγησάμεθα διασαφῆσαι ὑμῖν
  english_pob_choice: we thought it necessary to explain this to you
  chosen_spanish: hemos juzgado necesario explicárselo
  alternatives_spanish:
  - hemos considerado necesario explicarlo a ustedes
  - hemos pensado que era necesario aclararlo
  lexicon: LSJ
  rationale: La combinación de δέον y ἡγησάμεθα expresa una decisión fundada en necesidad/convicción; διασαφῆσαι es «explicar con claridad». El clítico «-selo» enlaza naturalmente con lo ya mencionado en español.
- source_word: ἵνα καὶ αὐτοὶ ἄγητε
  english_pob_choice: so that you also may celebrate
  chosen_spanish: para que ustedes también celebren
  alternatives_spanish:
  - para que también ustedes observen
  - a fin de que ustedes también conmemoren
  lexicon: LSJ
  rationale: De nuevo ἄγω en contexto de fiesta se traduce mejor como «celebrar». «También» reproduce καὶ αὐτοί con el valor de inclusión de los destinatarios.
- source_word: σκηνοπηγίας
  english_pob_choice: the festival of booths
  chosen_spanish: la fiesta de las tiendas
  alternatives_spanish:
  - la fiesta de los tabernáculos
  - la fiesta de las cabañas
  lexicon: LSJ
  rationale: σκηνοπηγία remite a la fiesta de las tiendas/cabañas. «Fiesta de las tiendas» es transparente en español y conserva la imagen de las tiendas sin recurrir a un término más eclesiástico o menos transparente.
- source_word: καὶ τοῦ πυρός
  english_pob_choice: and of the fire
  chosen_spanish: y del fuego
  alternatives_spanish:
  - y la fiesta del fuego
  - y del fuego [como fiesta]
  lexicon: LSJ
  rationale: Se preserva la expresión sobria del griego sin resolverla interpretativamente. «Del fuego» mantiene la tensión textual y permite una posible alusión conmemorativa sin sobreexplicarla en el cuerpo del texto.
- source_word: ὅτε Νεεμίας
  english_pob_choice: when Nehemiah
  chosen_spanish: cuando Nehemías
  alternatives_spanish:
  - en tiempos de Nehemías
  - cuando el Nehemías
  lexicon: LSJ
  rationale: ὅτε introduce la ocasión histórica evocada. «Cuando Nehemías» es la correspondencia directa y natural.
- source_word: ὁ οἰκοδομήσας τό τε ἱερὸν καὶ τὸ θυσιαστήριον
  english_pob_choice: who built both the temple and the altar
  chosen_spanish: que construyó tanto el templo como el altar
  alternatives_spanish:
  - que edificó tanto el templo como el altar
  - el cual construyó el templo y el altar
  lexicon: LSJ
  rationale: El participio aoristo funciona como aposición descriptiva de Nehemías. «Que construyó tanto... como...» evita añadir secuencia temporal no explícita y conserva el paralelismo.
- source_word: ἀνήνεγκεν θυσίας
  english_pob_choice: offered sacrifices
  chosen_spanish: ofreció sacrificios
  alternatives_spanish:
  - presentó sacrificios
  - levantó sacrificios
  lexicon: LSJ
  rationale: ἀναφέρω en contexto sacrificial significa ofrecer. «Ofreció sacrificios» es la equivalencia idiomática y cultualmente precisa en español.
theological_decisions:
- issue: σκηνοπηγίας como nombre de fiesta judía
  english_pob_reading: the festival of booths
  chosen_spanish_reading: la fiesta de las tiendas
  alternative_spanish_readings:
  - la fiesta de los tabernáculos
  - la fiesta de las cabañas
  rationale: Se evita una forma demasiado tradicional o eclesiástica si oscurece la imagen concreta del texto. «Fiesta de las tiendas» mantiene la referencia judía y la transparencia semántica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: καὶ τοῦ πυρός como expresión breve y alusiva
  english_pob_reading: and of the fire
  chosen_spanish_reading: y del fuego
  alternative_spanish_readings:
  - y la fiesta del fuego
  - y del fuego [como fiesta]
  rationale: El griego es condensado y no define plenamente la relación de «fuego» con la fiesta. La traducción principal conserva la ambigüedad en vez de resolverla, respetando la tensión textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés POB: se prefirió la forma estándar del nombre del mes en español («Quisleu») y se reflejó la sintaxis participial de Nehemías como cláusula descriptiva («que construyó»), sin añadir la idea temporal de «después de». También se mantuvo la claridad de «explicar» mediante un español natural («explicárselo»).'
  spanish_consistency_notes:
  - Se mantiene Yahvé no pertinente aquí; no aparece el nombre divino en el versículo.
  - «Templo» se usa para ἱερόν, coherente con el audit trail inglés.
  - «Altar» traduce θυσιαστήριον de forma directa y uniforme.
  - Se conserva el tono cultual de «celebrar» para ἄγειν en dos ocurrencias.
  - La nota al pie queda anclada solo en «fuego» porque allí reside la ambigüedad principal.
