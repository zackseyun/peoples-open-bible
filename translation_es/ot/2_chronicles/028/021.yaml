translation:
  language: es
  text: Porque Acaz saqueó la casa de Yahvé[a], la casa del rey y a los príncipes[b], y lo entregó al rey de Asiria, pero no le ayudó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dividió' / 'repartió'; aquí el sentido es que Acaz despojó de bienes estos lugares y personas.
    reason: lexical_alternative
  - marker: b
    text: O 'los oficiales'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal o justificativa del hecho anterior; 'Porque' conserva esa función en español de manera natural y formal.
- source_word: חָלַק
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - despojó
  - dividió
  - apropió
  lexicon: HALOT
  rationale: En este contexto, el verbo no describe una división neutral sino el vaciamiento de recursos del templo, del palacio y de los príncipes para pagar tributo; 'saqueó' comunica esa acción concreta sin suavizarla.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Jehová
  lexicon: HALOT
  rationale: Se conserva la forma literal 'casa de' para reflejar el hebreo y mantener la estructura paralela con los otros dos objetos; 'Yahvé' sigue el estándar del proyecto para el nombre divino.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the house of the king
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - la casa real
  - el palacio del rey
  lexicon: HALOT
  rationale: Es la correspondencia directa y transparente del hebreo, sin convertirla en una paráfrasis más interpretativa.
- source_word: הַשָּׂרִים
  english_pob_choice: the princes / the officials
  chosen_spanish: los príncipes
  alternatives_spanish:
  - los oficiales
  - los jefes
  - los gobernantes
  lexicon: HALOT
  rationale: Sigo la opción de la POB inglesa 'the princes' porque en el marco cortesano de Crónicas puede referirse a altos dignatarios; en español 'príncipes' conserva esa ambigüedad institucional sin borrar el matiz nobiliario.
- source_word: וַיִּתֵּן
  english_pob_choice: and gave
  chosen_spanish: y lo entregó
  alternatives_spanish:
  - y se lo dio
  - y lo dio
  lexicon: HALOT
  rationale: El pronombre neutro 'lo' resume el tributo o los objetos tomados en el saqueo; 'entregó' expresa que fueron puestos en manos del rey de Asiria como pago.
- source_word: לְמֶלֶךְ אַשּׁוּר
  english_pob_choice: to the king of Assyria
  chosen_spanish: al rey de Asiria
  alternatives_spanish:
  - al rey asirio
  - al rey de Asiria
  lexicon: HALOT
  rationale: Forma directa y usual en español bíblico contemporáneo, manteniendo el referente histórico con claridad.
- source_word: וְלֹא לְעֶזְרָה לֽוֹ
  english_pob_choice: but it did not help him
  chosen_spanish: pero no le fue de ayuda
  alternatives_spanish:
  - pero no le ayudó
  - pero no le sirvió de ayuda
  lexicon: HALOT
  rationale: El hebreo expresa resultado y utilidad, no una acción personalizada del objeto; 'no le fue de ayuda' conserva esa evaluación sin forzar el sujeto en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para יְהוָה. 'Yahvé' preserva el nombre propio del pacto sin reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Valor semántico de חָלַק en contexto de tributación
  english_pob_reading: plundered
  chosen_spanish_reading: saqueó
  alternative_spanish_readings:
  - despojó
  - dividió
  - repartió
  rationale: Aunque el lexema puede significar 'dividir/apartar', el contexto narrativo de tomar bienes para tributo exige un verbo de despojo. 'Saqueó' preserva esa tensión sin perder la posible lectura más neutra que la nota inglesa reconoce.
  doctrine_reference: 'DOCTRINE.md: lexical precision in historical narrative'
- issue: Lectura de הַשָּׂרִים
  english_pob_reading: the princes / the officials
  chosen_spanish_reading: los príncipes
  alternative_spanish_readings:
  - los oficiales
  - los dignatarios
  rationale: La traducción mantiene la ambigüedad deliberada entre nobleza y administración cortesana. 'Príncipes' es suficientemente amplio en español bíblico y no obliga a una identificación exclusiva con funcionarios.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tensions'
translation_notes:
  revision_awareness: La base inglesa pasó de 'stripped' a 'plundered' por revisión reciente, manteniendo intacto el sentido de despojo; además, la lista hebrea distingue tres objetos separados del verbo, por lo que la versión española conserva la coordinación triple y evita unir indebidamente 'la casa del rey' con 'los príncipes'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - 'Se mantiene una estructura de lista clara: ''la casa de Yahvé, la casa del rey y la de los príncipes''.'
  - '''Saqueó'' refleja el despojo material implicado por el contexto y la tradición textual auditada.'
  - '''No le fue de ayuda'' reproduce la valoración final de utilidad sin añadir matices interpretativos.'
