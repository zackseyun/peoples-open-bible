translation:
  language: es
  text: Pero cuando su corazón se ensoberbeció y su espíritu se endureció en arrogancia[a], fue derribado de su trono real, y su gloria[b] le fue quitada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su espíritu se hizo fuerte en presunción» o «su espíritu se volvió arrogante».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su honra» o «su majestad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְדִי
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: HALOT
  rationale: La conjunción introduce el marco temporal de la acción y, en este contexto de contraste narrativo, "Pero cuando" conserva tanto el valor temporal como el giro adversativo del flujo previo.
- source_word: רִם לִבְבֵהּ
  english_pob_choice: his heart was lifted up
  chosen_spanish: su corazón se ensoberbeció
  alternatives_spanish:
  - su corazón fue levantado
  - su corazón se exaltó
  - su corazón se hizo orgulloso
  lexicon: HALOT
  rationale: 'La imagen hebreo-aramea es literal: el corazón se levanta. En español, "se ensoberbeció" comunica con fidelidad el sentido moral de orgullo sin perder la elevación figurada.'
- source_word: וְרוּחֵהּ תִּקְפַת לַהֲזָדָה
  english_pob_choice: his spirit was hardened in arrogance
  chosen_spanish: su espíritu se endureció en arrogancia
  alternatives_spanish:
  - su espíritu se fortaleció en presunción
  - su espíritu se volvió arrogante
  - su espíritu se hizo fuerte en presunción
  lexicon: HALOT
  rationale: תִּקְפַת expresa fuerza/endurecimiento y לַהֲזָדָה apunta a presunción/arrogancia. "Se endureció en arrogancia" conserva la tensión entre fortaleza interior y actitud insolente, alineándose con la revisión inglesa que prefirió "in arrogance".
- source_word: הָנְחַת
  english_pob_choice: he was brought down
  chosen_spanish: fue derribado
  alternatives_spanish:
  - fue bajado
  - fue depuesto
  - fue humillado y removido
  lexicon: HALOT
  rationale: El verbo indica descenso/caída desde una posición elevada. "Fue derribado" mantiene la imagen de humillación y conserva el paralelo con el orgullo previo mejor que un verbo más abstracto como "depuesto".
- source_word: מִן כָּרְסֵא מַלְכוּתֵהּ
  english_pob_choice: from his royal throne
  chosen_spanish: de su trono real
  alternatives_spanish:
  - del trono de su reino
  - de su trono del reino
  lexicon: HALOT
  rationale: כָּרְסֵא es "trono" y מַלְכוּתֵהּ califica su carácter regio. "Trono real" es natural en español y preserva la referencia al puesto de soberanía.
- source_word: וִיקָרֵהּ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honra
  - su majestad
  - su esplendor
  lexicon: HALOT
  rationale: El término abarca honor, gloria y majestad. "Gloria" conserva la amplitud semántica en un registro bíblico claro y no reduce el matiz regio a una sola noción social.
- source_word: הֶעְדִּיוּ מִנֵּהּ
  english_pob_choice: was taken away from him
  chosen_spanish: le fue quitada
  alternatives_spanish:
  - fue quitada de él
  - le fue retirada
  - se le arrebató
  lexicon: HALOT
  rationale: La forma verbal plural funciona de modo impersonal/indefinido. "Le fue quitada" preserva la pasiva sin introducir un sujeto explícito, igual que la decisión inglesa de no nombrar al agente.
theological_decisions:
- issue: Agente del derribo y de la pérdida de gloria
  english_pob_reading: The verse describes divine humbling through royal deposition without explicitly naming God in this line.
  chosen_spanish_reading: El versículo presenta un derribo y una privación de gloria con sujeto implícito, sin nombrar explícitamente a Dios en esta línea.
  alternative_spanish_readings:
  - El versículo puede leerse como una pasiva divina implícita.
  - Dios lo derribó y le quitó la gloria, aunque no se mencione aquí.
  rationale: La línea aramea usa formas pasivas/indefinidas; conviene mantener esa sobriedad y dejar que el contexto amplio identifique a Dios como actor último, sin adelantar una explicitación no presente en el texto inmediato.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre orgullo interior y arrogancia del espíritu
  english_pob_reading: his spirit was hardened in arrogance
  chosen_spanish_reading: su espíritu se endureció en arrogancia
  alternative_spanish_readings:
  - su espíritu se volvió arrogante
  - su espíritu se fortaleció en presunción
  rationale: 'La frase conserva dos movimientos: elevación del corazón y endurecimiento del espíritu. Traducirlo de forma que ambos elementos permanezcan ayuda a no diluir la advertencia moral del pasaje.'
  doctrine_reference: Daniel 5:20, lectura lexical de la humillación soberana
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la expresión a "in arrogance" por ser más natural que "into arrogance"; por eso el español usa "en arrogancia" y mantiene el paralelismo con el endurecimiento del espíritu. También se respetó la decisión auditada de no nombrar explícitamente al agente del derribo ni de la pérdida de gloria.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma por defecto cuando corresponda, pero este versículo no lo nombra explícitamente.
  - '"Trono real" conserva el valor de כָּרְסֵא מַלְכוּתֵהּ sin recurrir a perífrasis innecesarias.'
  - '"Gloria" se usa con amplitud semántica suficiente para honor/majestad, coherente con el registro bíblico del libro de Daniel.'
  - Las dos notas al pie corresponden a alternativas léxicas reales documentadas en el audit trail inglés y están ancladas en los términos clave.
