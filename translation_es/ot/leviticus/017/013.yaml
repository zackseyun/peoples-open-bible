base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/013.yaml
  text: And any man from the sons of Israel[a], or from the sojourner who sojourns among them, who hunts game—whether wild animal or bird—that may be eaten[b], shall pour out its blood and cover it with earth.
  footnotes:
  - marker: a
    text: Or, 'the resident foreigner living among them.' The Hebrew גר denotes a non-Israelite residing within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'cover it with dust/earth'; the pronoun most naturally refers to the blood.
    reason: lexical_alternative
