base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/037/009.yaml
  text: 'Then he said to me[a], “Prophesy to the breath; prophesy, son of man, and say to the breath, ‘Thus says the Lord GOD: Come from the four winds, O breath, and breathe on these slain, so that they may live.’”'
  footnotes:
  - marker: a
    text: Hebrew רוּחַ can mean breath, wind, or spirit. Here it is rendered 'breath' in the singular and 'winds' in 'the four winds'; alternatively, 'spirit' could be understood, preserving the vision's layered imagery.
    reason: lexical_alternative
