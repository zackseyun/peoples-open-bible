translation:
  language: es
  text: Entonces miré, y he aquí, una mano estaba extendida hacia mí, y he aquí, en ella[a] había un rollo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «un rollo». La frase hebrea es literalmente «un rollo de un libro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: Then I looked
  chosen_spanish: Entonces miré
  alternatives_spanish:
  - Y vi
  - Entonces vi
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración y el verbo en primera persona introduce una nueva escena visual. «Entonces miré» conserva el progreso narrativo sin sonar forzado en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: La partícula introduce una aparición súbita y solemne. «He aquí» mantiene el énfasis profético y la vividez del original.
- source_word: יָד
  english_pob_choice: a hand
  chosen_spanish: una mano
  alternatives_spanish:
  - una mano/brazo
  lexicon: HALOT
  rationale: El sentido básico es «mano». El hebreo no especifica poseedor, así que se conserva el sustantivo concreto e indefinido.
- source_word: שְׁלוּחָה
  english_pob_choice: was stretched out
  chosen_spanish: estaba extendida
  alternatives_spanish:
  - estaba alargada
  - fue extendida
  lexicon: HALOT
  rationale: El valor verbal comunica una extensión visible hacia el profeta. En español, «estaba extendida» reproduce la imagen con naturalidad y sin sobreinterpretar la forma pasiva.
- source_word: אֵלַי
  english_pob_choice: toward me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: La preposición expresa dirección; «hacia mí» conserva mejor el movimiento espacial de la mano extendida.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en él
  - dentro de ella
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es masculino singular, en español el antecedente más inmediato y natural es «mano», que es femenino. Se usa «en ella» para respetar la referencia visible del contexto sin añadir un poseedor no explícito.
- source_word: מְגִלַּת סֵפֶר
  english_pob_choice: a scroll
  chosen_spanish: un rollo
  alternatives_spanish:
  - un pergamino
  - un rollo de libro
  lexicon: HALOT
  rationale: La POB inglesa revisó la expresión literalmente más amplia a «a scroll». En español, «rollo» conserva el objeto material sin forzar una calca como «rollo de libro».
theological_decisions:
- issue: Identidad del dueño de la mano
  english_pob_reading: Leave the hand's owner unspecified
  chosen_spanish_reading: Dejar sin especificar el dueño de la mano
  alternative_spanish_readings:
  - la mano de Dios
  - la mano de un mensajero angelical
  rationale: El hebreo presenta solo «una mano» sin identificar su poseedor. La traducción conserva esa reserva y no introduce una explicación teológica no explicitada por el texto.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión exegética en lugar de resolverla por tradición.
- issue: Valor de מְגִלַּת סֵפֶר
  english_pob_reading: Or simply, 'a scroll.' The Hebrew phrase is literally 'a scroll of a book.'
  chosen_spanish_reading: «un rollo» como traducción principal, sin desarrollar la literalidad completa
  alternative_spanish_readings:
  - «un rollo de un libro»
  - «un libro en rollo»
  rationale: El hebreo es literalmente una construcción de sustantivos que describe un documento enrollado. Siguiendo la revisión inglesa, la forma natural y publicable en español es «un rollo», preservando la imagen sin una expansión poco idiomática.
  doctrine_reference: 'Equivalencia óptima con restricción semántica: mantener la imagen material sin sobrecargarla con glosas innecesarias.'
translation_notes:
  revision_awareness: La base inglesa fue revisada para simplificar «scroll of a book» a «scroll», manteniendo alta concordancia con el hebreo. La versión española sigue esa revisión y conserva el orden narrativo, la deixis solemne de הִנֵּה y la ambigüedad del poseedor de la mano.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el tetragrámaton.
  - Se prefirió «rollo» a «scroll» por inteligibilidad en español y por coherencia con la revisión inglesa.
  - «He aquí» se usa consistentemente para הִנֵּה en estilo profético.
  - No se añadió sujeto explícito para la mano, siguiendo la reserva del hebreo y del auditable inglés.
