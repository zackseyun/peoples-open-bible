base_translation:
  language: en
  yaml_path: translation/ot/exodus/025/022.yaml
  text: And there I will meet with you[a], and I will speak with you from above the mercy seat, from between the two cherubim that are over the ark of the testimony[b], about all that I will command you for the sons of Israel.
  footnotes:
