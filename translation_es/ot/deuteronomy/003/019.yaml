translation:
  language: es
  text: Solo[a] sus esposas, sus pequeños[b] y su ganado —sé que tienen mucho ganado— quedarán en sus ciudades[c] que les he dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «solamente». La partícula hebrea introduce una excepción o restricción.
    reason: lexical_alternative
  - marker: b
    text: O «sus hijos». El término hebreo puede referirse a niños pequeños o dependientes.
    reason: lexical_alternative
  - marker: c
    text: O «pueblos» en lugar de «ciudades». La palabra hebrea puede denotar asentamientos de diversa extensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Sólo
  alternatives_spanish:
  - Solamente
  - Únicamente
  lexicon: HALOT
  rationale: Marca una excepción restrictiva respecto de la orden anterior. «Sólo» es natural en español y conserva el matiz de exclusión sin añadir interpretación.
- source_word: נְשֵׁיכֶם
  english_pob_choice: your wives
  chosen_spanish: vuestras mujeres
  alternatives_spanish:
  - vuestras esposas
  lexicon: HALOT
  rationale: El contexto doméstico permite precisar «esposas», pero el hebreo literalmente dice «mujeres». Mantener «mujeres» evita cerrar la referencia de manera más estrecha que el texto, aunque la relación marital esté implícita en el contexto.
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: vuestros pequeños
  alternatives_spanish:
  - vuestros hijos
  - vuestros dependientes
  lexicon: HALOT
  rationale: טַף designa niños pequeños o dependientes. «Pequeños» reproduce el sentido concreto y familiar de la expresión sin sonar arcaico.
- source_word: מִקְנֵיכֶם / מִקְנֶה רַב
  english_pob_choice: your livestock / much livestock
  chosen_spanish: vuestro ganado / mucho ganado
  alternatives_spanish:
  - vuestras reses / muchas reses
  - vuestras manadas / abundante ganado
  lexicon: HALOT
  rationale: מִקְנֶה abarca animales domésticos en general; en español «ganado» es el término amplio y natural. Repetirlo en ambas ocurrencias conserva la repetición hebrea.
- source_word: יָדַעְתִּי כִּי
  english_pob_choice: I know that
  chosen_spanish: sé que
  alternatives_spanish:
  - porque sé que
  - pues sé que
  lexicon: HALOT
  rationale: La explicación causal queda suficientemente marcada por la puntuación en español. «Sé que» es directo y fiel a la afirmación personal del hablante.
- source_word: יֵשְׁבוּ
  english_pob_choice: shall remain
  chosen_spanish: quedarán
  alternatives_spanish:
  - morarán
  - permanecerán
  - habitarán
  lexicon: HALOT
  rationale: Aunque el verbo literalmente puede significar habitar o sentarse, aquí contrasta con quienes cruzarán a la guerra. «Quedarán» expresa mejor esa función situacional en español.
- source_word: בְּעָרֵיכֶם
  english_pob_choice: in your towns
  chosen_spanish: en vuestras ciudades
  alternatives_spanish:
  - en vuestros pueblos
  - en vuestras poblaciones
  lexicon: HALOT
  rationale: עִיר puede referirse a asentamientos de diversa escala. Siguiendo el audit trail inglés, «ciudades» es una opción válida y amplia; en español bíblico también puede abarcar poblados, sin forzar una imagen urbana moderna.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם
  english_pob_choice: that I have given you
  chosen_spanish: que os he dado
  alternatives_spanish:
  - que os di
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una concesión ya realizada con vigencia presente. El pretérito perfecto compuesto español transmite bien esa acción completada y todavía relevante.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés, manteniendo la estructura restrictiva de רַק, la triple enumeración doméstica, la explicación causal implícita en יָדַעְתִּי כִּי y el contraste situacional de יֵשְׁבוּ. No hubo revisiones previas aplicadas en el paquete inglés, y el cotejo indicó alta concordancia.
  spanish_consistency_notes:
  - Se prefirió «Sólo» con acento por norma ortográfica tradicional; si el estilo editorial opta por la forma sin acento, puede normalizarse a «Solo» sin cambio de sentido.
  - Se mantuvo «vuestro/vuestras» para preservar la segunda persona plural del hebreo.
  - Se eligió «ganado» como hiperónimo amplio, coherente con el valor de מִקְנֶה.
  - Las notas al pie conservan las alternativas significativas del audit trail inglés y añaden la posible oscilación española entre «ciudades» y «pueblos».
