revisions:
- from: 'Pero si digo esto al joven[a]: “Mira, las flechas están más allá de ti”, entonces vete, porque Yahvé te ha despedido.”'
  to: 'Pero si digo esto al joven[a]: «Mira, las flechas están más allá de ti», entonces ve, porque Yahvé te ha enviado lejos.'
  rationale: Se reemplaza «te ha despedido» por «te ha enviado lejos» para reflejar mejor שִׁלַּחֲךָ según el audit trail inglés («has sent you away») y evitar una connotación laboral ajena al contexto. Se ajusta «vete» a «ve» por mayor cercanía al imperativo hebreo, y se corrige la puntuación final. La nota léxica alternativa se conserva sin cambios sustanciales porque sigue representando bien la ambigüedad manejada en el POB inglés.
