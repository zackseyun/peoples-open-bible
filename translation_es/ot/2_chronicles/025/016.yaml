revisions:
- from: 'Y aconteció[a], mientras él le hablaba, que el rey le dijo: «¿Te hemos puesto como consejero del rey? ¡Calla! ¿Por qué han de golpearte?». Entonces el profeta se detuvo y dijo: «Sé que Dios ha determinado destruirte[c][b], porque has hecho esto y no has escuchado mi consejo».'
  to: 'Y sucedió, mientras él le hablaba, que el rey le dijo: «¿Te hemos puesto[a] como consejero del rey? ¡Deja ya! ¿Por qué han de golpearte?[b]». Entonces el profeta se detuvo y dijo: «Sé que Dios ha determinado destruirte[c], porque has hecho esto y no has escuchado mi consejo».'
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a la pregunta retórica sobre el cargo de consejero, como en la auditoría inglesa. Además, se cambió «Y aconteció» por «Y sucedió» para una lectura más natural y «¡Calla!» por «¡Deja ya!» para reflejar mejor חֲדַל sin reducirlo solo al silencio verbal. Los demás elementos del borrador son fieles y no requieren cambios.
