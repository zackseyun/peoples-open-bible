review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los levitas nombrados toman posición en un lugar elevado y claman a Yahvé su Dios. Conserva correctamente la repetición de Bani y el nombre divino Yahvé. La nota sobre מַעֲלֵה también preserva la alternativa léxica documentada.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos mejoras importantes: (1) «con voz fuerte» suena menos idiomático y menos preciso que «con fuerte voz» o mejor «a gran voz / con voz potente», dado el hebreo idiomático בְּקוֹל גָּדוֹל; (2) la coma en «a Yahvé, su Dios» introduce una pausa poco natural; lo normal es «a Yahvé su Dios». Además, «se pusieron en el estrado» funciona, pero «se pusieron de pie sobre el estrado» expresa mejor el valor de וַיָּקָם sin perder naturalidad.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; אֱלֹהֵיהֶם → «su Dios» correctamente. Los nombres propios están transliterados de forma aceptable para español bíblico. No hay conflicto teológico serio.'
  issues:
  - severity: medium
    issue: La expresión «con voz fuerte» es poco idiomática para בְּקוֹל גָּדוֹל.
    rationale: El hebreo significa literalmente «con/en una voz grande», es decir, «a gran voz» o «con fuerte voz». «Con voz fuerte» en español puede describir calidad de voz más que volumen puntual del clamor.
  - severity: medium
    issue: La frase «a Yahvé, su Dios» lleva una coma innecesaria.
    rationale: 'El sintagma hebreo אֶל יְהוָה אֱלֹהֵיהֶם es continuo: «a Yahvé su Dios». La coma introduce una aposición marcada que no ayuda a la fluidez ni refleja la sintaxis de modo natural.'
  - severity: low
    issue: «Se pusieron en el estrado» atenúa el componente de ponerse de pie de וַיָּקָם.
    rationale: Aunque es comprensible, el verbo hebreo indica levantarse/estar de pie. «Se pusieron de pie sobre el estrado» conserva mejor ese matiz y sigue siendo natural en español.
  revised_spanish_text: Entonces Jesúa[a], Bani, Cadmiel, Sebanías, Buni, Serebías, Bani y Quenaní se pusieron de pie sobre el estrado de los levitas, y clamaron a gran voz a Yahvé su Dios.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «la subida / los escalones de los levitas»; la frase puede referirse a un lugar elevado o a una escalera asociada con los levitas.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para reflejar mejor וַיָּקָם («se pusieron de pie»), mejorar la idiomaticidad de בְּקוֹל גָּדוֹל («a gran voz») y eliminar la coma innecesaria en «a Yahvé su Dios», sin cambiar el sentido ni la terminología del proyecto.
