translation:
  language: es
  text: que traman cosas malas en su corazón[a]; todo el día provocan guerras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cada día se reúnen para pelear' o 'cada día provocan conflictos'. El verbo hebreo יָגוּרוּ es difícil y admite varias posibilidades según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la caracterización de los malvados; en español, 'que' suena natural y fiel para este uso, sin forzar un relativo personal más marcado que el hebreo requiere.
- source_word: חָשְׁבוּ
  english_pob_choice: devise
  chosen_spanish: traman
  alternatives_spanish:
  - planean
  - maquinan
  - idean
  lexicon: HALOT
  rationale: El verbo expresa una planificación intencional y maliciosa, no solo actividad mental. 'Traman' conserva la idea de contrivancia hostil y encaja bien con el paralelo poético.
- source_word: רָעוֹת
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - males
  - cosas perversas
  - maldades
  lexicon: HALOT
  rationale: El plural hebreo apunta a actos o planes dañinos. 'Cosas malas' mantiene la pluralidad y la transparencia en español, evitando reducir el matiz a una abstracción moral.
- source_word: בְּלֵב
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su mente
  - en el corazón
  lexicon: HALOT
  rationale: Con un sujeto plural, el hebreo usa el singular colectivo 'corazón'. 'En su corazón' preserva el término antropológico bíblico sin reemplazarlo por 'mente'.
- source_word: כָּל יוֹם
  english_pob_choice: all day
  chosen_spanish: todo el día
  alternatives_spanish:
  - cada día
  - constantemente
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de manera natural como una continuidad que ocupa toda la jornada; 'todo el día' comunica bien la persistencia en el contexto poético.
- source_word: יָגוּרוּ
  english_pob_choice: stir up
  chosen_spanish: provocan
  alternatives_spanish:
  - suscitan
  - agitan
  - levantan
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto exige un sentido activo de incitar conflicto. 'Provocan' refleja esa fuerza hostil sin sobretraducir a un significado más específico que el hebreo no garantiza.
- source_word: מִלְחָמֽוֹת
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - batallas
  - conflictos
  - pleitos
  lexicon: HALOT
  rationale: El plural hebreo designa guerras o combates. 'Guerras' conserva el peso léxico y la intensidad del término, y armoniza con la imagen de hostilidad continua.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés. La principal tensión léxica está en יָגוּרוּ, por lo que se mantuvo una traducción contextual ('provocan') y se registró una nota con alternativas plausibles. No se requieren revisiones previas adicionales.
  spanish_consistency_notes:
  - Se conservó el antropologismo bíblico 'corazón' en lugar de 'mente'.
  - Se evitó 'Señor' o terminología de reemplazo porque el versículo no contiene el nombre divino.
  - 'El paralelismo poético queda en dos miembros: planificación interna y acción hostil continua.'
