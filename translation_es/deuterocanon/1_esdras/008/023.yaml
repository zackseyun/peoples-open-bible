review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro POB en casi todo: mantiene «tu Dios» en ambas menciones, preserva la distinción «jueces y magistrados», conserva «Siria y Fenicia» según la geografía griega de 1 Esdras, y expresa correctamente la finalidad con «para que juzguen». La única desviación significativa está en διδάξεις: «tú los enseñarás» en español estándar significa más naturalmente ‘los harás aprender / enseñarás a ellos como objeto directo’, mientras que aquí el sentido es ‘les enseñarás’ o ‘instruirás a los que no conocen la ley’.'
  spanish_quality_summary: 'El texto es claro y legible, con tono digno y natural. «Conforme a la sabiduría de tu Dios» funciona bien. «Establece» es aceptable, aunque «nombra» o «designa» sonarían algo más idiomáticos para cargos; no obstante, no exige cambio. Sí conviene corregir «tú los enseñarás» por una construcción idiomática y exacta en español: «les enseñarás» o «los instruirás».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios», «ley», «jueces», «magistrados» y «Fenicia» están alineados con el expediente inglés y con el griego fuente. No hay términos teológicos sensibles mal resueltos. La decisión de mantener «Siria y Fenicia» debe conservarse sin armonizar con el paralelo masorético.
  issues:
  - severity: medium
    issue: Construcción verbal poco natural e imprecisa en «tú los enseñarás».
    rationale: Para διδάξεις con objeto personal implícitamente receptivo, el español natural pide «les enseñarás» o un verbo como «instruirás». «Enseñar a alguien» suele requerir complemento de cosa; sin él, «los enseñarás» suena anómalo y puede sugerir otro sentido.
  revised_spanish_text: Y tú, Esdras, conforme a la sabiduría de tu Dios, establece jueces y magistrados, para que juzguen en toda Siria y Fenicia a todos los que conocen la ley de tu Dios; y a los que no la conocen, les enseñarás.
  revision_rationale: 'Se corrige únicamente la cláusula final para que el español exprese con naturalidad y precisión el sentido de διδάξεις dirigido a personas receptoras de enseñanza: «les enseñarás». El resto del texto refleja fielmente el griego y el razonamiento léxico-teológico documentado.'
