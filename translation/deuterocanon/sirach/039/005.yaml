theological_decisions:
- issue: Rendering κύριος in a deuterocanonical Greek wisdom context
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' Nothing in the immediate context requires deviation, and 'Lord' preserves the reverential theological force of address to God.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Implication of prayer 'for his sins'
  chosen_reading: for his sins
  alternative_readings:
  - concerning his sins
  - because of his sins
  rationale: The Greek does not explicitly state forgiveness, atonement, or confession formulae; it only says that he makes supplication regarding his sins. The translation preserves that theological openness rather than resolving it into a more specific doctrinal claim.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
