id: ISA.46.8
reference: Isaiah 46:8
source:
  edition: WLC
  text: זִכְרוּ זֹ֖את וְ/הִתְאֹשָׁ֑שׁוּ הָשִׁ֥יבוּ פוֹשְׁעִ֖ים עַל לֵֽב־־׃
translation:
  text: Remember this and be ashamed[a]; take it to heart[c][b], you transgressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show yourselves men,' 'be strong,' or 'take courage' for 'stand firm.' The Hebrew verb is rare and conveys strengthening or firmness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'bring back upon the heart'; that is, 'lay it to heart' or 'consider it well.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you rebels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: HALOT
  rationale: Imperative plural of זכר, a direct command to remember or call to mind. 'Remember' is the most natural and direct English imperative.
- source_word: זֹאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Singular feminine demonstrative, referring to the immediately preceding or following matter. 'This' preserves the singular demonstrative force.
- source_word: וְהִתְאֹשָׁשׁוּ
  chosen: stand firm
  alternatives:
  - show yourselves men
  - be strong
  - take courage
  lexicon: HALOT
  rationale: Hitpolel imperative plural from a rare verb meaning to be firm/strong. Traditional renderings like 'show yourselves men' reflect older interpretation and can over-specify masculinity not explicit in the form's immediate English sense. 'Stand firm' conveys the exhortation to strengthen or steady themselves in context.
- source_word: הָשִׁיבוּ
  chosen: take it to heart
  alternatives:
  - bring it back
  - lay it to heart
  - consider it
  lexicon: HALOT
  rationale: Hiphil imperative plural of שוב, literally 'bring back/return.' With the idiom עַל־לֵב, the sense is to bring something back upon the heart/mind, i.e., take it to heart or lay it to heart. The idiomatic English rendering best captures the phrase as a unit.
- source_word: פוֹשְׁעִים
  chosen: you transgressors
  alternatives:
  - rebels
  - you rebels
  lexicon: HALOT
  rationale: Active participle plural from פשע, denoting those who rebel or transgress. 'Transgressors' is slightly broader and fits the moral-religious context; 'rebels' is also possible and worth preserving as an alternative.
- source_word: עַל לֵב
  chosen: to heart
  alternatives:
  - upon the heart
  - in mind
  lexicon: HALOT
  rationale: Hebrew idiom for internalizing or seriously considering something. In English, 'to heart' naturally conveys the idiomatic force while remaining faithful to the metaphor of the heart as the seat of thought and resolve.
