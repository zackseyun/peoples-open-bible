base_translation:
  language: en
  yaml_path: translation/ot/judges/020/048.yaml
  text: And the men of Israel turned back against the sons of Benjamin and struck them with the edge of the sword[a], from the city, men to livestock, all that was found[c][b]. Also all the cities that were found they set on fire.
  footnotes:
  - marker: a
    text: Hebrew 'sons of Benjamin'; that is, the Benjaminites.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'from each city, men' is difficult. It likely means that they struck down the inhabitants of the cities completely, along with the livestock and everything else found there.
    reason: lexical_alternative
  - marker: c
    text: Or 'they put to the torch.'
    reason: lexical_alternative
