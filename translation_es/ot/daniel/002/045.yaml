  text: Just as you saw that a stone was cut from the mountain not by hands[a], and that it crushed the iron, the bronze, the clay, the silver, and the gold, the great God has made known to the king what will happen after this. The dream is certain, and its interpretation is trustworthy.
  footnotes:
