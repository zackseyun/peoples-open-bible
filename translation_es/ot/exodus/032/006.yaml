translation:
  language: es
  text: Y madrugaron al día siguiente, ofrecieron holocaustos y presentaron ofrendas de paz. Luego el pueblo se sentó a comer y a beber[a], y se levantaron para entregarse al desenfreno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se levantaron para jugar». El verbo hebreo puede significar «jugar», «celebrar» o «entregarse al desenfreno»; aquí el contexto sugiere una festividad desordenada más que un entretenimiento inocente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: rose early
  chosen_spanish: madrugaron
  alternatives_spanish:
  - se levantaron temprano
  - se apuraron a levantarse temprano
  lexicon: HALOT
  rationale: El hebreo expresa levantarse temprano; «madrugaron» conserva esa idea de manera natural en español y mantiene el énfasis temporal sin ampliar el sentido.
- source_word: מִמָּחֳרָת
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - a la mañana siguiente
  lexicon: HALOT
  rationale: Se refiere al día posterior a los hechos anteriores. «Al día siguiente» es claro y fiel en español actual.
- source_word: וַיַּעֲלוּ עֹלֹת
  english_pob_choice: offered burnt offerings
  chosen_spanish: ofrecieron holocaustos
  alternatives_spanish:
  - presentaron holocaustos
  - ofrecieron ofrendas quemadas
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה con עֹלָה significa ofrecer sacrificios totalmente quemados. «Holocaustos» es el término bíblico establecido en español para esa categoría cultual.
- source_word: וַיַּגִּשׁוּ שְׁלָמִים
  english_pob_choice: brought peace offerings
  chosen_spanish: presentaron ofrendas de paz
  alternatives_spanish:
  - ofrecieron ofrendas de paz
  - presentaron sacrificios de comunión
  lexicon: HALOT
  rationale: נגשׁ aquí es traer o presentar sacrificios. Para שְׁלָמִים, «ofrendas de paz» preserva la categoría sacrificial tradicional y es suficientemente transparente en español.
- source_word: וַיֵּשֶׁב הָעָם
  english_pob_choice: the people sat down
  chosen_spanish: el pueblo se sentó
  alternatives_spanish:
  - el pueblo se sentó a la mesa
  - el pueblo se acomodó
  lexicon: HALOT
  rationale: ישׁב en esta secuencia narrativa introduce la comida. «Se sentó» es directo y natural, sin añadir elementos no explícitos.
- source_word: לֶאֱכֹל וְשָׁתוֹ
  english_pob_choice: to eat and drink
  chosen_spanish: a comer y a beber
  alternatives_spanish:
  - para comer y beber
  - comiendo y bebiendo
  lexicon: HALOT
  rationale: La construcción infinitiva expresa la actividad del banquete. «A comer y a beber» mantiene el valor verbal y fluye bien en español.
- source_word: וַיָּקֻמוּ לְצַחֵק
  english_pob_choice: rose up to revel
  chosen_spanish: se levantó para darse a la algazara
  alternatives_spanish:
  - se levantó para jugar
  - se levantó para regocijarse
  - se levantó para entregarse a la juerga
  lexicon: HALOT
  rationale: צחק puede significar jugar, celebrar o entregarse a una festividad desordenada. En este contexto del becerro de oro, «darse a la algazara» comunica un festejo desordenado sin precisar más de lo que el hebreo exige.
theological_decisions:
- issue: Alcance moral de לְצַחֵק en el episodio del becerro de oro
  english_pob_reading: rendered as 'to revel'
  chosen_spanish_reading: «para darse a la algazara»
  alternative_spanish_readings:
  - para jugar
  - para celebrar
  - para entregarse a la juerga
  rationale: El contexto inmediato —sacrificios, banquete y la reacción divina posterior— sugiere una festividad idolátrica desordenada, no simple diversión inocente. «Algazara» preserva esa carga negativa sin introducir conjeturas sexuales que el verso no obliga a adoptar.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El borrador sigue la lectura inglesa auditada en todos los elementos principales: levantarse temprano, ofrecer holocaustos y ofrendas de paz, sentarse a comer y beber, y levantarse para una acción final con matiz moralmente cargado. La principal decisión abierta es cómo verter לְצַחֵק; se optó por una solución española que conserve la ambigüedad controlada del hebreo sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Holocaustos» y «ofrendas de paz» conservan la terminología sacrificial tradicional correspondiente a los términos hebreos.
  - «Algazara» busca evitar el calco mecánico de «play» y refleja mejor el tono del episodio en español contemporáneo.
  - La coordinación «a comer y a beber» sigue de cerca la estructura infinitiva hebrea sin volverla pesada.
