review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la secuencia del griego: matar/ser muertos, no desobedecer al rey, vencer y llevarle todo, incluido lo saqueado. Sin embargo, contiene una falla léxica grave en «plotean», que no corresponde a προνομεύσωσιν (‘saquear’, ‘tomar botín’). Además, «le llevan al rey todo» es poco natural en español por la duplicación dativa + complemento explícito, y la nota [a] no preserva una alternativa real porque el texto ya dice «salen victoriosos».'
  spanish_quality_summary: La redacción necesita pulido para lograr español natural y digno. «Son matados» es comprensible pero torpe; «son muertos» conserva bien la pasiva y suena idiomático. «No quebrantan la palabra del rey» es aceptable, aunque «no desobedecen la palabra del rey» comunica mejor el sentido contextual de οὐ παραβαίνουσιν. «Plotean» es inaceptable en español bíblico y general.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales deben alinearse con el audit trail: λόγον puede conservarse como «palabra»; οὐ παραβαίνουσιν se expresa mejor como «no desobedecen» en contexto de mandato real; προνομεύσωσιν debe ser «saquean» o equivalente de botín de guerra.'
  issues:
  - severity: high
    issue: «plotean» no traduce προνομεύσωσιν
    rationale: El griego significa ‘saquear’, ‘tomar botín’. «Plotear» no es equivalente semántico y rompe la fidelidad al texto fuente.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa distinta del texto
    rationale: El texto principal ya dice «salen victoriosos», y la nota repite esencialmente lo mismo; no cumple una función útil ni preserva adecuadamente la alternativa del inglés.
  - severity: medium
    issue: «le llevan al rey todo» suena poco natural
    rationale: En español es preferible «llevan todo al rey» o «se lo llevan al rey». La forma actual resulta torpe.
  - severity: low
    issue: «son matados» es gramatical pero poco idiomático
    rationale: «Son muertos» mantiene la pasiva del griego y mejora mucho la fluidez del español.
  revised_spanish_text: Matan y son muertos, y no desobedecen la palabra del rey; y si salen victoriosos, llevan todo al rey, y también todo lo demás que saquean.
  revision_rationale: Se corrige el error léxico grave «plotean» por «saquean», se elimina la nota innecesaria, y se mejora la naturalidad y fidelidad contextual con «son muertos», «no desobedecen» y «llevan todo al rey». Se conserva «palabra del rey» para reflejar λόγον, conforme al razonamiento auditado en inglés.
