revisions:
- from: hasta que Yahvé removió a Israel de delante de él[a], tal como había hablado por medio de todos sus siervos, los profetas[b]. Así Israel fue exiliado de su tierra a Asiria, hasta el día de hoy.
  to: hasta que Yahvé apartó a Israel de delante de él[a], tal como había hablado por medio de todos sus siervos, los profetas[b], e Israel fue exiliado de su tierra a Asiria, hasta el día de hoy.
  rationale: Se reemplaza 'removió' por 'apartó' para lograr un español más natural y fiel al valor causativo de הֵסִיר; se elimina 'Así' para evitar un matiz consecutivo innecesario; y se pule la nota sobre el modismo hebreo de presencia/judicio. No se requieren cambios doctrinales ni estructurales mayores.
