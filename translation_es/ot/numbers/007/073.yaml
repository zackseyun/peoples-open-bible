translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], su peso era de ciento treinta siclos, un cuenco de plata de setenta siclos, según el siclo del santuario[b]; ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plato hondo» o «fuente» para קַעֲרָה; se trata de un recipiente poco hondo de plata en el inventario del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «conforme al siclo del santuario». El hebreo indica el patrón sagrado de peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su don fue
  - Su presentación fue
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda/presentación cultual. En español, «ofrenda» comunica con claridad el valor sacrificial sin introducir una paráfrasis mayor. Se conserva la estructura nominal del hebreo con «fue» para una redacción natural.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un dish de plata
  - un platillo de plata
  lexicon: HALOT
  rationale: קַעֲרָה es un recipiente poco hondo del inventario del santuario. «Plato» es el equivalente español más claro y digno en este contexto; «platillo» sonaría menos natural y «dish» no pertenece al registro.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - su peso, ciento treinta siclos
  - pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: La construcción hebrea nombra el recipiente y luego su peso. «De peso de» conserva ese estilo inventarial sin forzar una inversión demasiado mecánica; «siclos» mantiene la unidad monetario-pesada del texto.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - una vasija de plata
  - una taza de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual para usos sacerdotales. «Tazón» comunica la forma de recipiente más que un uso doméstico banal, aunque «vasija» también sería posible; se evita «cuenco» si pudiera sonar demasiado genérico según el flujo inventarial.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - pesando setenta siclos
  - con peso de setenta siclos
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón de peso en español que para el primer objeto, conservando el paralelismo y la economía del original.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo sagrado
  lexicon: HALOT
  rationale: La frase señala la norma de medida. «Según el siclo del santuario» es fiel y transparente; mantiene el carácter técnico sin sustituirlo por una generalización como «sagrado».
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: HALOT
  rationale: El pronombre dual/plural enfatiza que se trata de los dos recipientes. «Ambos» es la forma más natural en español y conserva la referencia conjunta.
- source_word: מְלֵאִים
  english_pob_choice: full of
  chosen_spanish: estaban llenos de
  alternatives_spanish:
  - llenos de
  - estaban colmados de
  lexicon: HALOT
  rationale: Se explicita el verbo copulativo para una sintaxis española fluida. «Llenos de» mantiene el sentido directo del participio predicativo.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de flor
  lexicon: HALOT
  rationale: סֹלֶת se refiere a la harina selecta usada en ofrendas. «Flor de harina» es la expresión tradicional más precisa en español bíblico y mantiene la especificidad cultual.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - meneada con aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina fue mezclada con aceite. «Mezclada con aceite» es claro y fiel; «amasada» introduciría una acción no expresada explícitamente.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de grano
  - para una oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial puede traducirse como «ofrenda vegetal» para mantener la referencia al cereal/harina sin perder el carácter cultual. Se preserva la tensión terminológica con una alternativa posible en español («de grano»), sin reducirlo a un genérico.
theological_decisions:
- issue: מִנְחָה como nombre sacrificial técnico
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para una ofrenda vegetal
  alternative_spanish_readings:
  - para una ofrenda de grano
  - para una oblación
  rationale: El contexto inmediato describe harina fina mezclada con aceite; por eso el sentido técnico de מִנְחָה queda anclado en un producto vegetal y no en una ofrenda animal. «Ofrenda vegetal» conserva el valor sacrificial y la materia ofrecida sin ocultar el perfil del rito.
  doctrine_reference: Levítico 2; Números 7
- issue: Medida sagrada del peso
  english_pob_reading: according to the shekel of the sanctuary
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según el siclo sagrado
  rationale: La frase no describe el objeto sino la norma de peso usada en el santuario. En español conviene conservar el referente institucional («santuario») para no diluir el estándar técnico.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo del inventario cultual y toma en cuenta la revisión inglesa más reciente que prefirió 'according to the shekel of the sanctuary' por naturalidad formal; en español se reflejó con «según el siclo del santuario». También se preservó el paralelismo de los dos recipientes y la identificación específica de מִנְחָה mediante una traducción cultual explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - «Siclo» se usa de manera uniforme para שֶׁקֶל en el contexto de peso bíblico.
  - Se conserva el registro culto y técnico propio del inventario del santuario, evitando un estilo devocional libre.
  - «Ofrenda vegetal» fue elegida para resguardar el matiz de la ofrenda de cereal/harina sin perder el valor sacrificial.
