base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/023.yaml
  text: until Yahweh removed Israel from before him[a], just as he had spoken by the hand of all his servants the prophets. So Israel was exiled from its land to Assyria[b], to this day.
  footnotes:
