translation:
  language: es
  text: Y para las familias de los hijos de Coat[a], los levitas que quedaban de los hijos de Coat, las ciudades que les tocaron por sorteo fueron de la tribu de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También, más literalmente: «las ciudades de su lote fueron de la tribu de Efraín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִשְׁפְּחוֹת
  english_pob_choice: for the families of
  chosen_spanish: para las familias de
  alternatives_spanish:
  - a las familias de
  - según las familias de
  lexicon: HALOT
  rationale: El prefijo ל aquí expresa relación distributiva o de asignación. «Para las familias de» conserva esa relación con español natural y adecuado al contexto de repartición territorial.
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los descendientes de Coat
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica directa del hebreo. «Hijos de» conserva la transparencia formal del linaje; «descendientes» sería posible, pero menos cercano a la estructura del texto.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - la tribu de Leví
  lexicon: HALOT
  rationale: Es la designación tribal/etnorreligiosa estándar y directa. En español, «levitas» comunica con claridad el grupo dentro del contexto levítico.
- source_word: הַנּוֹתָרִים
  english_pob_choice: who remained
  chosen_spanish: que habían quedado
  alternatives_spanish:
  - los que quedaron
  - los restantes
  lexicon: HALOT
  rationale: El participio indica los que quedaron o permanecieron como remanente. «Que habían quedado» preserva el valor de remanencia sin sonar rígido.
- source_word: מִבְּנֵי קְהָת
  english_pob_choice: from the sons of Kohath
  chosen_spanish: de los hijos de Coat
  alternatives_spanish:
  - entre los hijos de Coat
  - de entre los hijos de Coat
  lexicon: HALOT
  rationale: 'El מן marca aquí un valor partitivo: son un subconjunto dentro de la línea coatita. «De los hijos de Coat» refleja bien esa pertenencia/subdivisión sin sobreexplicar.'
- source_word: עָרֵי גוֹרָלָם
  english_pob_choice: the cities of their lot
  chosen_spanish: las ciudades de su suerte
  alternatives_spanish:
  - las ciudades asignadas por suerte
  - las ciudades que les tocaron por suerte
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática «suerte» para גורל, manteniendo el vínculo con el reparto por sorteo. «Ciudades de su suerte» sigue de cerca la formulación hebrea y es comprensible en español bíblico actual.
- source_word: מִמַּטֵּה אֶפְרָיִם
  english_pob_choice: from the tribe of Ephraim
  chosen_spanish: de la tribu de Efraín
  alternatives_spanish:
  - procedentes de la tribu de Efraín
  lexicon: HALOT
  rationale: מַטֶּה en listas tribales significa «tribu». La forma «de la tribu de Efraín» es la equivalencia natural y precisa en español.
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura distributiva y partitiva del hebreo, y añade una nota para explicitar que el sentido de גורל puede formularse como ciudades asignadas por sorteo. La versión española conserva esa misma tensión idiomática con «ciudades de su suerte», sin perder la posibilidad alternativa más explícita.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma reservada para el nombre divino cuando aparezca; aquí no aparece.
  - Se conserva la fórmula genealógica «hijos de Coat» para mantener transparencia con el hebreo.
  - «Suerte» traduce גורל en su valor de reparto por sorteo, coherente con el audit trail inglés.
  - El orden de los elementos sigue la lógica del hebreo y del inglés POB, con adaptación mínima al español natural.
