translation:
  language: es
  text: 'Pero Jesús dijo[b][a]: «Nadie que ha puesto la mano al arado y mira hacia atrás es apto para el reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de poner la mano en el arado». La imagen es la de comenzar la labor de arar y luego volver la atención hacia atrás.
    reason: lexical_alternative
  - marker: b
    text: O «bien dispuesto» o «útil» para el reino de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - No uno
  - Ninguna persona
  lexicon: BDAG
  rationale: El pronombre negativo indefinido tiene fuerza universal. «Nadie» es la forma natural en español y conserva el alcance general sin añadir matiz masculino innecesario.
- source_word: ἐπιβαλὼν τὴν χεῖρα ἐπ’ ἄροτρον
  english_pob_choice: has put his hand to the plow
  chosen_spanish: ha puesto la mano en el arado
  alternatives_spanish:
  - ha puesto la mano al arado
  - ha puesto su mano sobre el arado
  lexicon: BDAG
  rationale: La imagen idiomática agrícola se conserva con un español claro. «Ha puesto» refleja el participio aoristo con valor de acción iniciada y relevante para el estado actual del discípulo.
- source_word: ἄροτρον
  english_pob_choice: plow
  chosen_spanish: arado
  alternatives_spanish:
  - trillo
  - arar
  lexicon: BDAG
  rationale: Es el instrumento agrícola correcto en español. «Arado» mantiene la imagen concreta sin desviarse a una paráfrasis.
- source_word: βλέπων εἰς τὰ ὀπίσω
  english_pob_choice: looks back
  chosen_spanish: mira hacia atrás
  alternatives_spanish:
  - está mirando hacia atrás
  - vuelve la vista atrás
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso o característica. «Mira hacia atrás» reproduce bien la imagen y sugiere atención dividida o retroceso de la disposición.
- source_word: εὔθετός
  english_pob_choice: fit
  chosen_spanish: apto
  alternatives_spanish:
  - adecuado
  - bien dispuesto
  - útil
  lexicon: BDAG
  rationale: «Apto» comunica suficiencia o idoneidad para una tarea. Mantiene la evaluación del texto sin cargarla de forma excesiva con un matiz doctrinal no explícito.
- source_word: τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: for the kingdom of God
  chosen_spanish: para el reino de Dios
  alternatives_spanish:
  - para el reino de Dios
  - para el gobierno de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la traducción establecida de βασιλεία τοῦ θεοῦ y resulta transparente en español. «Para» conserva la relación de aptitud con la esfera o exigencia del reino.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca transición con contraste leve hacia la declaración de Jesús; «Pero» funciona de modo natural en español.
theological_decisions:
- issue: Alcance de εὔθετός ἐστιν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_reading: Rendered as suitability for the kingdom's demands, not as an explicit statement about final salvation or exclusion.
  chosen_spanish_reading: Se traduce como idoneidad para el reino, no como una afirmación explícita sobre salvación final o exclusión eterna.
  alternative_spanish_readings:
  - no es digno de entrar en el reino
  - no sirve para el servicio del reino
  rationale: El adjetivo griego expresa aptitud o idoneidad. «Apto para el reino de Dios» conserva la advertencia sobre el discipulado sin introducir una lectura soteriológica más precisa que el texto no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador coincide con el contexto auditado inglés en la imagen agrícola, el contraste discursivo y la decisión de no cargar εὔθετός con una lectura doctrinal más específica que la idoneidad para el reino. No se aplicaron revisiones posteriores adicionales.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como sujeto explícito, en línea con la fuente.
  - «Reino de Dios» se conserva de forma estable para βασιλεία τοῦ θεοῦ.
  - El registro es formal y readable para uso eclesial amplio, sin eco innecesario de formulaciones tradicionales que oculten el griego.
  - Los corchetes de nota se colocan en las dos opciones léxicas principales, como exige el texto español.
