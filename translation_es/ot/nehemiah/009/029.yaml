revisions:
- from: Tú los amonestaste para hacerlos volver a tu ley[a], pero ellos obraron con presunción y no escucharon tus mandamientos; pecaron contra tus juicios, por los cuales el hombre vivirá si los hace. Les dieron hombro contumaz, endurecieron su cerviz[b] y no quisieron escuchar.
  to: Tú los amonestaste para hacerlos volver[a] a tu ley, pero ellos obraron con presunción y no escucharon tus mandamientos; pecaron contra tus juicios, por los cuales el hombre vivirá si los hace. Presentaron un hombro rebelde, endurecieron su cerviz[b] y no quisieron escuchar.
  rationale: Se corrige una expresión española defectuosa («Les dieron hombro contumaz») por «Presentaron un hombro rebelde», que preserva mejor el modismo hebreo de resistencia obstinada sin introducir un pronombre ajeno al texto. También se reubica la nota [a] al segmento verbal que realmente comenta. No se requieren cambios doctrinales ni terminológicos mayores.
