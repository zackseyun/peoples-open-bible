revisions:
- from: Pues nuestros hermanos[a], después de haber soportado un breve sufrimiento, han caído bajo el pacto de Dios hacia la vida eterna; pero tú, por el juicio de Dios, sufrirás con justicia las penas de tu arrogancia.
  to: Pues nuestros hermanos[a], después de haber soportado un breve sufrimiento, han caído bajo el pacto de Dios en la vida eterna; pero tú, por el juicio de Dios, cargarás justamente con las penas de tu arrogancia.
  rationale: Se ajusta la cláusula de la vida eterna para lograr un español natural que preserve mejor la compresión y tensión del griego sin introducir una dirección espacial extraña. También se cambia «sufrirás con justicia» por «cargarás justamente con» para reflejar mejor el sentido de ἀποίσῃ como soportar/llevar las penalidades. La nota al pie se mantiene, pues sigue siendo pertinente y está correctamente anclada.
