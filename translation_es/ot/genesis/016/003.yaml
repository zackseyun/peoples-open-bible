    rationale: «Al cabo de diez años de haber habitado Abram...» es comprensible, pero «después de que Abram había vivido diez años...» fluye mejor en español moderno y sigue siendo fiel al sentido temporal.
  revised_spanish_text: Entonces Sarai, esposa de Abram, tomó a Agar la egipcia, su esclava, después de que Abram había vivido diez años en la tierra de Canaán[a], y se la dio a Abram, su esposo, como esposa[b].
  revised_footnotes:
