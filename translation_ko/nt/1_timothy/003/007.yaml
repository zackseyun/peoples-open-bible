id: 1TI.3.7
reference: 1 Timothy 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δεῖ ⸀δὲ καὶ μαρτυρίαν καλὴν ἔχειν ἀπὸ τῶν ἔξωθεν, ἵνα μὴ εἰς ὀνειδισμὸν ἐμπέσῃ καὶ παγίδα τοῦ διαβόλου.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/007.yaml
  text: And he must also have a good testimony from those outside, so that he may not fall into reproach and the devil’s snare.
  footnotes:
  - marker: a
    text: Or 'from outsiders.' The phrase refers to people outside the Christian community.
    reason: lexical_alternative
  - marker: b
    text: Or 'fall into disgrace.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the slanderer’s trap,' if διάβολος is taken in a more generic sense; here it is understood as 'the devil.'
    reason: alternative_reading
translation:
  language: ko
  text: 또한 바깥 사람들[a]에게서도 좋은 평판을 받아야 합니다. 그렇지 않으면 수치[b]와 마귀의 올무[c]에 빠질 수 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「외부인들」. 그리스도 공동체 밖의 사람들을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「치욕에 빠질」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「비방하는 자의 덫」. διάβολος를 일반적 의미로 보면 가능하나, 본 절은 「마귀」로 이해한다.
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρίαν καλὴν
  english_pob_choice: a good testimony
  chosen_korean: 좋은 평판
  alternatives_korean:
  - 좋은 증언
  - 선한 평가
  lexicon: BDAG
  rationale: 외부인의 「증언」은 한국어로 「평판」이 더 자연스럽다.
- source_word: ἀπὸ τῶν ἔξωθεν
  english_pob_choice: from those outside
  chosen_korean: 바깥 사람들에게서
  alternatives_korean:
  - 외부 사람들에게서
  - 교회 밖 사람들에게서
  lexicon: BDAG
  rationale: ἔξωθεν 표현을 자연스러운 「바깥 사람들」로 옮긴다.
- source_word: εἰς ὀνειδισμὸν ἐμπέσῃ
  english_pob_choice: fall into reproach
  chosen_korean: 수치에 빠질
  alternatives_korean:
  - 책망에 빠질
  - 치욕에 빠질
  lexicon: BDAG
  rationale: ὀνειδισμός의 「공개적 비난·수치」를 「수치」로 옮긴다.
- source_word: παγίδα τοῦ διαβόλου
  english_pob_choice: the devil’s snare
  chosen_korean: 마귀의 올무
  alternatives_korean:
  - 마귀의 덫
  - 마귀의 함정
  lexicon: BDAG
  rationale: παγίς의 「올무·덫」을 한국 신학 어휘 「올무」로 옮긴다.
