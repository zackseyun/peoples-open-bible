translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Un adversario[a] rodeará la tierra, te quitará tu fuerza, y tus fortalezas[b] serán saqueadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enemigo».
    reason: lexical_alternative
  - marker: b
    text: O «tus palacios». El hebreo puede referirse a palacios o a fortalezas fortificadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: La combinación de título y nombre divino se conserva en español con «Señor Yahvé», evitando ocultar el nombre propio y manteniendo la relación reverencial de אֲדֹנָי con יְהוִה. «Dios» no reproduce el valor del Tetragrama; «Yahvéh» no es la forma preferida del proyecto.
- source_word: צַר
  english_pob_choice: an adversary
  chosen_spanish: un adversario
  alternatives_spanish:
  - un enemigo
  - un opresor
  - una amenaza
  lexicon: HALOT
  rationale: Aquí el sustantivo designa un agente hostil concreto o personificado, no la idea abstracta de angustia. «Adversario» conserva la singularidad y la fuerza hostil sin decidir demasiado entre enemigo político o militar.
- source_word: וּסְבִיב הָאָרֶץ
  english_pob_choice: shall surround the land
  chosen_spanish: rodeará la tierra
  alternatives_spanish:
  - rodeará el país
  - estará alrededor de la tierra
  - ceñirá la tierra
  lexicon: HALOT
  rationale: El hebreo es breve y el verbo implícito de amenaza se expresa naturalmente en español con «rodeará». Se conserva «tierra» para respetar el paralelo territorial del juicio, aunque «país» también sería posible según contexto.
- source_word: וְהוֹרִד
  english_pob_choice: he shall bring down
  chosen_spanish: derribará
  alternatives_spanish:
  - hará bajar
  - rebajará
  - abatirá
  lexicon: HALOT
  rationale: El hiphil de ירד comunica causar descenso. En español, «derribará» transmite bien la caída de poder y encaja con la imagen de despojo militar; «abatirá» o «rebajará» serían alternativas cercanas.
- source_word: מִמֵּךְ עֻזֵּךְ
  english_pob_choice: your strength from you
  chosen_spanish: de ti tu fuerza
  alternatives_spanish:
  - tu fuerza de ti
  - tu poder de ti
  - tu fortaleza de ti
  lexicon: HALOT
  rationale: «Fuerza» traduce adecuadamente עֹז como poder/capacidad nacional. La construcción «de ti tu fuerza» mantiene la idea hebrea de remoción desde la propia persona/ciudad, aunque suena menos pulida que otras soluciones; se conserva por cercanía estructural al original.
- source_word: וְנָבֹזּוּ
  english_pob_choice: shall be plundered
  chosen_spanish: serán saqueadas
  alternatives_spanish:
  - serán despojadas
  - serán plunderadas
  - serán robadas
  lexicon: HALOT
  rationale: El niphal expresa que las fortalezas quedan expuestas al saqueo por invasores. «Saqueadas» es idiomático en español para edificios y ciudades y mantiene el marco bélico del pasaje.
- source_word: אַרְמְנוֹתָיִךְ
  english_pob_choice: your citadels
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus palacios
  - tus ciudadelas
  - tus alcázares
  lexicon: HALOT
  rationale: אַרְמוֹן puede significar palacio o fortaleza elevada. En este contexto de invasión, «fortalezas» comunica mejor la dimensión defensiva y evita limitar el sentido a residencias reales; «ciudadelas» sería una alternativa válida pero menos común.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוִה en una fórmula con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvéh
  rationale: Se preserva el nombre propio divino en español, siguiendo la directriz del proyecto de no mascarar יְהוָה. La fórmula resultante refleja la doble designación reverencial del hebreo sin repetir «Señor» dos veces.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se identificaron cambios necesarios en el auditoría inglesa; se ha trasladado el mismo equilibrio entre fuerza literal y claridad idiomática al español, manteniendo las tensiones lexicales de עֹז y אַרְמְנוֹת.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוִה, conforme a la terminología del proyecto.
  - Se ha preferido «fortalezas» en el texto principal para evitar reducir אַרְמְנוֹת a «palacios» en un contexto de asedio.
  - «Adversario» conserva el valor hostil singular de צַר sin añadir especificación histórica no presente en el hebreo.
