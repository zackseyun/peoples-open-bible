base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/001.yaml
  text: Now the people were like those who complain of hardship in the hearing of Yahweh[a], and Yahweh heard it, and his anger burned[d][c][b], and the fire of Yahweh burned among them and consumed some at the edge of the camp.
  footnotes:
  - marker: a
    text: Or 'as complainers,' 'as those complaining,' or possibly 'as if complaining.' The Hebrew form is rare and somewhat difficult.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the ears of the LORD,' an idiom meaning that their complaint came to the LORD's attention.
    reason: lexical_alternative
  - marker: c
    text: Or 'a fire from the LORD burned among them.'
    reason: alternative_reading
  - marker: d
    text: Hebrew 'at the edge/outskirts of the camp.'
    reason: lexical_alternative
