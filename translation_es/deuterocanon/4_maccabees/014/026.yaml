translation:
  language: es
  text: Pero de entre todas las madres, la madre de los siete llegó a ser la más entregada a sus hijos[a], ella que, a través de siete embarazos, tenía profundamente plantado en su interior el afecto por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la más amorosa con sus hijos”. El comparativo griego φιλοτεκνοτέρα, en el contexto de “de entre todas las madres”, comunica que sobresalía entre todas por su devoción materna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πασῶν δὲ τῶν μητέρων
  english_pob_choice: But of all mothers
  chosen_spanish: Pero de entre todas las madres
  alternatives_spanish:
  - Y de entre todas las madres
  - Ahora bien, de entre todas las madres
  lexicon: LSJ
  rationale: El partitivo con pasōn tôn mēterōn pide 'de entre todas las madres'; δέ marca transición/adversación leve, por eso 'Pero' conserva el giro discursivo sin exagerarlo.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - fue
  - se mostró
  lexicon: LSJ
  rationale: ἐγένετο expresa llegada a un estado; 'llegó a ser' mantiene esa fuerza mejor que una simple cópula.
- source_word: ἡ τῶν ἑπτὰ μήτηρ
  english_pob_choice: the mother of the seven
  chosen_spanish: la madre de los siete
  alternatives_spanish:
  - la madre de los siete hijos
  - su madre
  lexicon: LSJ
  rationale: El griego dice literalmente 'la madre de los siete'. En español se conserva así sin añadir 'hijos' en el texto principal.
- source_word: φιλοτεκνοτέρα
  english_pob_choice: the most devoted to her children
  chosen_spanish: la más entregada a sus hijos
  alternatives_spanish:
  - la más amorosa con sus hijos
  - la que más amaba a sus hijos
  lexicon: LSJ
  rationale: El comparativo de φιλοτέκνος apunta a una devoción excepcional hacia los hijos; 'la más entregada a sus hijos' comunica esa intensidad en español sin perder el matiz comparativo.
- source_word: ἥτις
  english_pob_choice: she who
  chosen_spanish: ella que
  alternatives_spanish:
  - la cual
  - quien
  lexicon: LSJ
  rationale: Mantiene el valor explicativo/qualitativo del relativo y enlaza con naturalidad la cláusula causal siguiente.
- source_word: ἑπτὰ κυοφορίας
  english_pob_choice: through seven pregnancies
  chosen_spanish: a través de siete embarazos
  alternatives_spanish:
  - tras siete gestaciones
  - por medio de siete embarazos
  lexicon: LSJ
  rationale: κυοφορία remite a embarazo/gestación; 'embarazos' es claro y digno en español, y 'a través de' reproduce la idea de una trayectoria vivida mediante esas gestaciones.
- source_word: τὴν πρὸς αὐτοὺς ἐπιφυτευομένην φιλοστοργίαν
  english_pob_choice: her affection for them deeply planted within her
  chosen_spanish: tenía profundamente injertado en sí el cariño afectuoso hacia ellos
  alternatives_spanish:
  - tenía profundamente plantado en sí el afecto por ellos
  - tenía arraigado en sí el cariño hacia ellos
  lexicon: LSJ
  rationale: φιλοστοργία expresa cariño familiar tierno y natural; 'cariño afectuoso' intenta reflejar ese campo semántico sin forzar una terminología eclesiástica. ἐπιφυτευομένην conserva la metáfora de algo 'injertado/plantado', por eso 'injertado en sí' preserva la imagen de implantación profunda.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés que eliminó 'motherly' antes de 'affection' por no añadir una expansión interpretativa no explícita en el griego. La redacción española evita igualmente añadir 'maternal' al sustantivo 'cariño' y conserva la metáfora de algo profundamente implantado.
  spanish_consistency_notes:
  - Se mantuvo 'madre de los siete' de forma literal, sin expandir a 'hijos' en el cuerpo principal.
  - '''Embrazos'' se usó para κυοφορίας por claridad y fidelidad al proceso de gestación.'
  - La comparación superlativa en español responde al contexto partitivo 'de entre todas las madres', equivalente al sentido del inglés POB.
  - Se evitó un vocabulario devocional o litúrgico ajeno al pasaje; el tono permanece narrativo y sobrio.
