translation:
  language: es
  text: ¿Por qué desprecian[a] mi sacrificio y mi ofrenda, que yo mandé para la morada[b], y honras a tus hijos más que a mí, engordándoos[c] con lo primero de toda ofrenda de Israel, mi pueblo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "dan patadas a" o "tratan con desprecio". El verbo hebreo es vívido y, literalmente, sugiere una patada despectiva contra lo que Dios mandó.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "para/en la morada". El término puede referirse al santuario como lugar donde Dios habita.'
    reason: alternative_reading
  - marker: c
    text: O "haciéndoos gordos" o "alimentándoos de la porción más selecta de toda ofrenda de Israel, mi pueblo".
    reason: lexical_alternative
lexical_decisions:
- source_word: תִבְעֲטוּ
  english_pob_choice: scorn
  chosen_spanish: desprecian
  alternatives_spanish:
  - pisotean
  - tratan con desprecio
  - desprecian con burla
  lexicon: HALOT
  rationale: El verbo hebreo evoca la imagen vívida de “dar una patada” a algo, pero en esta reprensión el sentido idiomático es el de rechazo despectivo. “Desprecian” conserva la fuerza de la acusación en español natural sin perder el matiz de menosprecio.
- source_word: זִבְחִי
  english_pob_choice: my sacrifice
  chosen_spanish: mi sacrificio
  alternatives_spanish:
  - mi ofrenda sacrificial
  - mi sacrificio de animales
  lexicon: HALOT
  rationale: זֶבַח denota un sacrificio, normalmente con derramamiento de sangre. “Mi sacrificio” es fiel y claro en español, y mantiene la simetría con la frase siguiente.
- source_word: מִנְחָתִי
  english_pob_choice: my offering
  chosen_spanish: mi ofrenda
  alternatives_spanish:
  - mi ofrenda vegetal
  - mi ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה puede ser más específicamente una ofrenda vegetal o de cereal, pero aquí funciona en paralelo con זִבְחִי en un sentido más amplio de ofrenda cultual. “Mi ofrenda” preserva ese rango sin estrecharlo indebidamente.
- source_word: אֲשֶׁר צִוִּיתִי מָעוֹן
  english_pob_choice: which I commanded for the dwelling
  chosen_spanish: que yo mandé para el santuario
  alternatives_spanish:
  - que yo mandé para la morada
  - que yo mandé para el lugar de habitación
  lexicon: HALOT
  rationale: מָעוֹן puede referirse al lugar de habitación o morada, y en este contexto al santuario como lugar donde Dios hace habitar su nombre y donde se ofrecen los sacrificios. “Santuario” explicita la función cultual que el inglés POB preserva con “the dwelling” y resulta más transparente para el lector español.
- source_word: וַתְּכַבֵּד
  english_pob_choice: and honor
  chosen_spanish: y honras
  alternatives_spanish:
  - y honraste
  - y has honrado
  - y glorificas
  lexicon: HALOT
  rationale: כבד en este contexto significa “honrar”. Se mantiene el verbo en presente castellano para reproducir la fuerza directa de la acusación, con la segunda persona singular coherente con el cambio de foco del plural inicial al individuo reprendido.
- source_word: מִמֶּנִּי
  english_pob_choice: above me
  chosen_spanish: más que a mí
  alternatives_spanish:
  - por encima de mí
  - antes que a mí
  - sobre mí
  lexicon: HALOT
  rationale: 'El valor comparativo es claro: Eli ha dado más honor a sus hijos que a Dios. “Más que a mí” expresa la comparación de forma natural en español y evita una construcción menos idiomática.'
- source_word: לְהַבְרִיאֲכֶם
  english_pob_choice: fattening yourselves
  chosen_spanish: engordándolos
  alternatives_spanish:
  - engordándoos
  - haciéndolos engordar
  - alimentándolos en exceso
  lexicon: HALOT
  rationale: 'La forma verbal alude a volverse o hacer volverse gordo, y en el contexto sacerdotal apunta al abuso de las porciones sacrificadas. En español, el referente del sufijo se entiende como los hijos mencionados inmediatamente antes: “engordándolos” conserva la acusación concreta y la relación sintáctica con la frase anterior. La alternativa “engordándoos” sería posible si se siguiera la lectura del inglés POB sobre el sacerdocio beneficiándose de las ofrendas, pero el hebreo aquí enfoca a los hijos como beneficiarios del trato de Eli.'
- source_word: מֵרֵאשִׁית
  english_pob_choice: from the first
  chosen_spanish: con lo primero
  alternatives_spanish:
  - de la primera porción
  - del primer fruto
  - de lo mejor
  lexicon: HALOT
  rationale: רֵאשִׁית puede significar “primero”, “primicias” o por extensión la porción principal o selecta. “Con lo primero” mantiene la cercanía al hebreo y deja abierta la posible referencia a la porción inicial o principal; “de lo mejor” sería más interpretativo.
- source_word: כָּל מִנְחַת יִשְׂרָאֵל
  english_pob_choice: every offering of Israel
  chosen_spanish: toda ofrenda de Israel
  alternatives_spanish:
  - cada ofrenda de Israel
  - toda ofrenda vegetal de Israel
  - toda ofrenda ritual de Israel
  lexicon: HALOT
  rationale: Aquí מִנְחָה puede abarcar la ofrenda presentada por Israel en general, no solo una ofrenda vegetal estricta. “Toda ofrenda de Israel” conserva el alcance amplio que la POB inglesa documenta.
- source_word: לְעַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - para mi pueblo
  - de mi pueblo
  lexicon: HALOT
  rationale: 'La frase funciona como identificación appositiva: Israel es el pueblo de Dios. “Mi pueblo” es la forma más natural y fiel en español, manteniendo el tono posesivo relacional.'
theological_decisions:
- issue: 'Extensión de la reprensión: plural inicial y singular posterior'
  english_pob_reading: The verse begins with a plural form ('do you all scorn') and then turns to singular when addressing Eli directly ('you honor your sons').
  chosen_spanish_reading: La traducción conserva el plural inicial con “desprecian” y luego pasa al singular con “honras”, reflejando el cambio de foco sin nivelarlo.
  alternative_spanish_readings:
  - Uniformar todo en plural para toda la casa de Eli
  - Uniformar todo en singular desde el inicio
  rationale: El hebreo abre la reprensión de manera amplia y luego concentra la culpa en Eli. Mantener esa oscilación ayuda a respetar la estructura retórica y la responsabilidad personal que el texto subraya.
  doctrine_reference: 1 Samuel 2:29; enfoque retórico y responsabilidad individual
- issue: Sentido de מָעוֹן
  english_pob_reading: which I commanded for the dwelling
  chosen_spanish_reading: que yo mandé para el santuario
  alternative_spanish_readings:
  - que yo mandé para la morada
  - que yo mandé para el lugar de habitación
  rationale: El término puede aludir a la morada de Dios, pero en este contexto la denuncia trata del abuso del sistema sacrificial del santuario. “Santuario” explicita ese marco sin negar la posibilidad semántica de “morada”.
  doctrine_reference: Uso cultual de מָעוֹן en el contexto del tabernáculo/santuario
- issue: Beneficiarios del verbo final
  english_pob_reading: fattening yourselves from the first of every offering of Israel, my people
  chosen_spanish_reading: engordándolos con lo primero de toda ofrenda de Israel, mi pueblo
  alternative_spanish_readings:
  - engordándoos con lo primero de toda ofrenda de Israel, mi pueblo
  - alimentándolos de lo mejor de toda ofrenda de Israel, mi pueblo
  rationale: El hebreo dirige el foco gramatical hacia los hijos de Eli como receptores del privilegio indebido. La formulación española intenta conservar esa referencia inmediata, aunque el inglés POB haya subrayado el autoengorde del grupo sacerdotal en general como implicación contextual.
  doctrine_reference: Abuso sacerdotal de las ofrendas; 1 Samuel 2:12-17, 29
translation_notes:
  revision_awareness: La POB inglesa revisó la frase final de “for my dwelling” a “for the dwelling” para no añadir un posesivo no explícito en el hebreo. La versión española evita igualmente añadir posesivo y opta por “para el santuario” en el texto principal, con nota que preserva la alternativa “para/en la morada”. También se mantuvo la tensión interpretativa del verbo final entre el autoengorde de los sacerdotes y el engorde de los hijos beneficiados por el abuso.
  spanish_consistency_notes:
  - Se usa “Yahvé” no pertinente aquí porque el versículo no contiene el nombre divino explícito, aunque la primera persona divina se mantiene en el habla directa.
  - Se conserva “sacrificio/ofrenda” para reproducir la pareja cultual del hebreo sin reducir מִנְחָה a una sola categoría más estrecha.
  - No se introduce “Cristo”, “SEÑOR” ni terminología eclesiástica ajena al contexto.
  - La puntuación sigue el español moderno con comas para sostener el reproche retórico y la acumulación de acusaciones.
