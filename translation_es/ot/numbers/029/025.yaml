translation:
  language: es
  text: y un macho cabrío como ofrenda por el pecado, además del holocausto continuo[a], su ofrenda vegetal y su libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el holocausto continuo".
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂעִיר עִזִּים
  english_pob_choice: and one male goat
  chosen_spanish: y un macho de las cabras
  alternatives_spanish:
  - y un macho cabrío
  - y un chivo
  lexicon: HALOT
  rationale: La expresión sacrificial hebrea señala un macho de la especie caprina. En español, "macho de las cabras" conserva el valor literal del genitivo y evita introducir un término más interpretativo que el hebreo. "Macho cabrío" es natural, pero algo más idiomático y menos transparente para la lectura fuente-centrada.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: Se conserva el numeral cardinal explícito del hebreo. Aquí funciona como aposición al sustantivo y puede expresarse naturalmente con "uno".
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - por ofrenda por el pecado
  - como ofrenda expiatoria
  lexicon: HALOT
  rationale: En contexto sacrificial, חטאת designa la ofrenda, no solo la noción abstracta de pecado. "Como ofrenda por el pecado" mantiene la referencia cultual y evita una paráfrasis doctrinal como "expiatoria" que podría estrechar el sentido.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además del
  alternatives_spanish:
  - aparte del
  - fuera del
  lexicon: HALOT
  rationale: La preposición marca adición a otra ofrenda ya prescrita. "Además del" expresa con claridad esa relación suplementaria en español.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto continuo
  alternatives_spanish:
  - la ofrenda quemada continua
  - el holocausto regular
  lexicon: HALOT
  rationale: '"עֹלָה" se traduce de forma tradicional y precisa como "holocausto" en contexto sacrificial. "הַתָּמִיד" conserva la idea de continuidad o regularidad; "continuo" sigue de cerca el valor léxico y deja abierta la relación con el sacrificio diario/regular.'
- source_word: מִנְחָתָהּ
  english_pob_choice: its grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su oblación
  lexicon: HALOT
  rationale: En español bíblico, "ofrenda vegetal" comunica la ofrenda acompañante de grano/pan sin sonar demasiado técnica. "Ofrenda de cereal" es más explicativa, pero menos natural en un registro litúrgico. Se evita "oblación" por ser más arcaizante.
- source_word: וְנִסְכָּהּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda de bebida
  - y su derramamiento
  lexicon: HALOT
  rationale: '"Libación" es el equivalente cultual habitual para נסך cuando se trata de una ofrenda líquida derramada. Aunque el inglés POB usa "drink offering", en español "libación" es más idiomático y preciso para el acto ritual.'
theological_decisions:
- issue: Naturaleza de חטאת en contexto ritual
  english_pob_reading: for a sin offering
  chosen_spanish_reading: como ofrenda por el pecado
  alternative_spanish_readings:
  - como ofrenda expiatoria
  - como sacrificio por el pecado
  rationale: La POB trata חטאת como designación de la ofrenda sacrificial. En español, "ofrenda por el pecado" preserva esa tensión entre designación del rito y referencia al pecado, sin resolverla prematuramente hacia una explicación doctrinal más amplia.
  doctrine_reference: Levítico 4; Levítico 6:25-30
- issue: עֹלַת הַתָּמִיד como sacrificio de referencia ya prescrito
  english_pob_reading: the regular burnt offering
  chosen_spanish_reading: el holocausto continuo
  alternative_spanish_readings:
  - el holocausto regular
  - el holocausto diario
  rationale: '"Continuo" refleja la constancia del sacrificio de referencia sin forzar que cada lector lo entienda solo como "diario". Se mantiene la relación con el culto regular establecido.'
  doctrine_reference: Éxodo 29:38-42; Números 28:3-8
translation_notes:
  revision_awareness: 'Concordancia alta con la evaluación previa: no se requieren revisiones sustantivas respecto al sentido cultual del hebreo ni al reparto sintáctico del verso. La única nota alternativa preserva la tensión léxica de עֹלַת הַתָּמִיד tal como lo hace el POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene el registro sacrificial técnico pero readable para lectura pública.
  - '"Holocausto" se usa para עֹלָה por consistencia con el campo cultual bíblico; "ofrenda vegetal" y "libación" se emplean como equivalentes naturales para מנחה y נסך en este contexto.'
  - 'La numeración y la adición preposicional quedan explícitas: "un macho... uno" y "además del".'
