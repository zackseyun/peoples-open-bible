    rationale: לְבֹנָה es el producto cultual puesto sobre la ofrenda. En español bíblico cuidado, «ni pondrá sobre ella incienso» mantiene mejor el paralelismo con «No pondrá sobre ella aceite» y evita el matiz más coloquial de «echará».
