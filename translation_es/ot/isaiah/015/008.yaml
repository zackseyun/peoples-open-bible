  to: Porque el clamor[a] ha rodeado la frontera de Moab; su lamento llega hasta Eglaim, y su lamento hasta Beer-elim[b].
  rationale: 'Se hicieron ajustes menores para mejorar la fidelidad semántica y la naturalidad del español bíblico: «frontera» refleja mejor el sentido geográfico de גְּבוּל, y «lamento» comunica mejor יִלְלָתָהּ en un registro digno y ampliamente legible que «aullido». Se mantuvo la estructura repetitiva del verso y las notas pertinentes.'
