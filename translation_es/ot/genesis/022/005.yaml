translation:
  language: es
  text: 'Y Abraham dijo a sus muchachos: «Quédense aquí con el asno. Yo y el muchacho iremos hasta allá, y adoraremos[a] y volveremos a ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos postraremos»; el verbo hebreo puede referirse más literalmente a inclinarse o postrarse en adoración.
    reason: lexical_alternative
  - marker: b
    text: 'Abraham dice, literalmente: «volveremos a ustedes». El texto no explica si se trata de ocultamiento, de expectativa o de confianza en la provisión de Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: נְעָרָיו
  english_pob_choice: his young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus siervos
  - sus ayudantes
  - sus muchachos
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, criado o acompañante según el contexto. Aquí el grupo que acompaña a Abraham queda atrás, y «sus jóvenes» conserva esa amplitud sin imponer una relación servil más fuerte de la que el contexto exige.
- source_word: שְׁבוּ לָכֶם פֹּה
  english_pob_choice: Stay here
  chosen_spanish: Quédense aquí
  alternatives_spanish:
  - Permanezcan aquí
  - Siéntense aquí
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar sentarse, permanecer o quedarse. En español, «Quédense aquí» transmite con naturalidad la orden de no avanzar más sin sonar forzado.
- source_word: עִם הַחֲמוֹר
  english_pob_choice: with the donkey
  chosen_spanish: con el asno
  alternatives_spanish:
  - con el burro
  - con el pollino
  lexicon: HALOT
  rationale: חֲמוֹר es el animal doméstico común, y «asno» es una equivalencia adecuada y digna en español bíblico. «Burro» sería más coloquial; «pollino» no corresponde al término aquí.
- source_word: וַאֲנִי וְהַנַּעַר
  english_pob_choice: I and the boy
  chosen_spanish: Yo y el muchacho
  alternatives_spanish:
  - El muchacho y yo
  - Yo y el joven
  lexicon: HALOT
  rationale: נַעַר aquí apunta a Isaac desde la perspectiva de Abraham. «Muchacho» conserva mejor ese tono narrativo y la amplitud semántica del hebreo que «joven» en este contexto.
- source_word: נֵלְכָה עַד כֹּה
  english_pob_choice: will go over there
  chosen_spanish: iremos hasta allá
  alternatives_spanish:
  - iremos allá
  - iremos hasta ese lugar
  lexicon: HALOT
  rationale: La expresión indica un destino cercano pero distinto. «Hasta allá» reproduce bien el valor deíctico de כֹּה sin recurrir a un arcaísmo como «allende» o «allá lejos».
- source_word: וְנִשְׁתַּחֲוֶה
  english_pob_choice: we will worship
  chosen_spanish: adoraremos
  alternatives_spanish:
  - nos postraremos
  - haremos reverencia
  lexicon: HALOT
  rationale: שׁחה puede referirse al acto físico de postrarse, y en contexto cultual a la adoración. Aquí se conserva en el texto principal el sentido religioso con «adoraremos»; el matiz corporal queda disponible como alternativa.
- source_word: וְנָשׁוּבָה אֲלֵיכֶם
  english_pob_choice: and return to you
  chosen_spanish: volveremos a ustedes
  alternatives_spanish:
  - regresaremos a ustedes
  - volveremos junto a ustedes
  lexicon: HALOT
  rationale: שׁוּב significa volver o regresar. Se mantiene el plural de la primera persona con «volveremos» para no resolver en la traducción la tensión narrativa sobre si Abraham habla con certeza, con ambigüedad o con reserva.
theological_decisions:
- issue: Pluralidad en «volveremos» al final de la frase
  english_pob_reading: 'Retain the plain plural: ''we will ... return to you.'''
  chosen_spanish_reading: 'Mantener el plural llano: «volveremos a ustedes».'
  alternative_spanish_readings:
  - Interpretarlo como ocultamiento deliberado de Abraham
  - Interpretarlo como una afirmación de fe de que ambos volverán
  rationale: El hebreo usa formas cohortativas/volitivas en plural para adorar y para volver. La traducción debe conservar esa formulación sin decidir en el texto principal si Abraham oculta algo, expresa confianza en la provisión divina o habla con ambigüedad intencional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Sentido de וְנִשְׁתַּחֲוֶה
  english_pob_reading: we will worship; footnote allows 'bow down' / prostrate oneself
  chosen_spanish_reading: «adoraremos» con nota de posible sentido corporal de postrarse.
  alternative_spanish_readings:
  - nos postraremos
  - nos inclinaremos en adoración
  rationale: El contexto es de culto, pero el verbo hebreo conserva una base física de inclinación o postración. Por eso se da la lectura religiosa en el cuerpo del texto y se preserva la alternativa más literal en nota.
  doctrine_reference: HALOT; comentario textual de la POB sobre el verbo
- issue: Referencia del destinatario de «el muchacho»
  english_pob_reading: the boy refers to Isaac
  chosen_spanish_reading: Mantener «el muchacho» sin identificarlo explícitamente en el texto.
  alternative_spanish_readings:
  - Isaac
  - el joven
  rationale: El hebreo no nombra a Isaac en este versículo; la traducción debe respetar ese nivel de explicitud y dejar que la identificación surja del contexto narrativo inmediato.
  doctrine_reference: Génesis 22:1-19, contexto narrativo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó «then» por no estar explícito en el hebreo. Por eso la versión española evita añadir conectores temporales no presentes y mantiene simplemente «adoraremos, y volveremos a ustedes».
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó traducir נַעַר como «siervo» para no introducir una relación institucional que el contexto no exige.
  - Se conservó el plural de primera persona en «volveremos» para reflejar la tensión narrativa documentada en la POB.
  - «Adoraremos» se eligió por claridad cultual, pero la nota preserva el valor más literal de postrarse.
  - Se prefirió «asno» frente a «burro» por tono bíblico y registro digno en español.
