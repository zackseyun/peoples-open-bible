translation:
  language: es
  text: 'Porque se habían escrito cartas a los judíos de Lisias, que contenían esta forma[a]: «Lisias a la multitud de los judíos[b], saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que contenían estas palabras» / «que contenían esta redacción». El griego τὸν τρόπον τοῦτον puede referirse a la forma o al tenor literal de la carta.
    reason: lexical_alternative
  - marker: b
    text: O «al cuerpo de los judíos» / «a la asamblea de los judíos». El griego τῷ πλήθει conserva un matiz colectivo de «multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν γὰρ γεγραμμέναι
  english_pob_choice: For letters had been written
  chosen_spanish: Porque habían sido escritas
  alternatives_spanish:
  - Pues habían sido escritas
  - Porque se habían escrito
  lexicon: LSJ
  rationale: El pluscuamperfecto pasivo expresa bien el estado previo de las cartas ya redactadas; «porque» reproduce el γάρ explicativo con naturalidad en español.
- source_word: ἐπιστολαὶ
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - epístolas
  lexicon: LSJ
  rationale: «Cartas» es el equivalente natural para correspondencia oficial; «epístolas» sonaría más literario o eclesiástico sin requerimiento del contexto.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - para los judíos
  lexicon: LSJ
  rationale: El dativo marca a los destinatarios de la correspondencia; en español, «a los judíos» es la forma más directa y natural.
- source_word: παρὰ μὲν Λυσίου
  english_pob_choice: from Lysias
  chosen_spanish: por parte de Lisias
  alternatives_spanish:
  - de Lisias
  - desde Lisias
  lexicon: LSJ
  rationale: παρά con genitivo indica procedencia o autoría; «por parte de» conserva esa relación sin forzar una equivalencia demasiado moderna. «De Lisias» sería más breve, pero menos explícito sobre el origen documental.
- source_word: περιέχουσαι
  english_pob_choice: containing
  chosen_spanish: conteniendo
  alternatives_spanish:
  - que contenían
  - incluyendo
  lexicon: LSJ
  rationale: Introduce la fórmula citada que sigue; «conteniendo» mantiene la relación participial con el texto que viene a continuación.
- source_word: τὸν τρόπον τοῦτον
  english_pob_choice: this form
  chosen_spanish: esta forma
  alternatives_spanish:
  - esta manera
  - estas palabras
  - esta redacción
  lexicon: LSJ
  rationale: En un contexto epistolar, τρόπος puede referirse a la forma o redacción del documento; «esta forma» es conciso y fiel. La nota conserva la alternativa «esta redacción/palabras».
- source_word: τῷ πλήθει τῶν Ἰουδαίων
  english_pob_choice: to the multitude of the Jews
  chosen_spanish: al pueblo de los judíos
  alternatives_spanish:
  - a la multitud de los judíos
  - a la asamblea de los judíos
  - al cuerpo de los judíos
  lexicon: LSJ
  rationale: πλῆθος señala un colectivo amplio; «pueblo» comunica la referencia colectiva en español sin introducir una formalidad institucional que el griego no exige. Se conserva la alternativa más literal en nota.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - regocijaos
  - que se alegren
  lexicon: LSJ
  rationale: En las aperturas epistolares, el infinitivo χαίρειν funciona como fórmula de saludo; «saludos» es el equivalente español establecido y claro.
theological_decisions:
- issue: La fórmula epistolar y el matiz de destinatario colectivo en «τῷ πλήθει τῶν Ἰουδαίων»
  english_pob_reading: To the multitude of the Jews
  chosen_spanish_reading: al pueblo de los judíos
  alternative_spanish_readings:
  - a la multitud de los judíos
  - a la asamblea de los judíos
  - al cuerpo de los judíos
  rationale: 'No hay carga doctrinal directa, pero sí una decisión semántica importante: πλῆθος puede ser simplemente multitud, un grupo colectivo, o incluso el conjunto del pueblo. En español, «pueblo» transmite la referencia colectiva sin suponer una institución formal ni rebajar el tono del original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión disponible indica que no se requirieron cambios y que el acuerdo con el texto fuente es alto; se mantuvo la lectura epistolar estándar y solo se ajustó la elección española para hacer explícita la procedencia y el matiz colectivo sin sobreinterpretación.
  spanish_consistency_notes:
  - Se mantiene «Lisias» como forma española del nombre propio.
  - Se usa «judíos» en plural para reflejar el dativo destinatario colectivo del griego.
  - «Saludos» conserva la fórmula epistolar breve de χαίρειν sin ampliar el sentido.
  - Se prefirió «pueblo» en el cuerpo del texto para la lectura natural, dejando la literalidad de πλῆθος en nota.
