translation:
  language: es
  text: ¡Ojalá sean grabadas en la roca para siempre con un punzón de hierro y plomo[b][a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean talladas en la roca para siempre». El verbo hebreo suele significar «tallar» o «cortar»; aquí se refiere a palabras inscritas de forma permanente.'
    reason: lexical_alternative
  - marker: b
    text: El plomo puede aludir al metal usado junto con la herramienta de hierro, quizá para rellenar las letras incisas y hacerlas más visibles; el hebreo, sin embargo, solo nombra el material.
    reason: cultural_note
lexical_decisions:
- source_word: בְּעֵט
  english_pob_choice: with a stylus
  chosen_spanish: con un punzón
  alternatives_spanish:
  - con un estilete
  - con un instrumento de grabar
  lexicon: HALOT
  rationale: El hebreo עֵט puede ser instrumento de escritura o de grabado. En este contexto, unido a hierro y a la roca, el sentido práctico es el de una herramienta para incidir o grabar; 'punzón' comunica bien esa función en español sin perder la imagen instrumental.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: de hierro
  alternatives_spanish:
  - de metal
  - de acero
  lexicon: HALOT
  rationale: El sustantivo designa el material de la herramienta. 'Hierro' es la correspondencia directa y conserva la concreción del original.
- source_word: וְעֹפָרֶת
  english_pob_choice: and lead
  chosen_spanish: y plomo
  alternatives_spanish:
  - y una barra de plomo
  - y plomo
  lexicon: HALOT
  rationale: עֹפָרֶת nombra el metal plomo. Se mantiene la simple mención del material, como en el texto hebreo, sin añadir explícitamente una función que el verso no formula.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa permanencia duradera de manera natural en español y refleja el alcance temporal del hebreo.
- source_word: בַּצּוּר
  english_pob_choice: in the rock
  chosen_spanish: en la roca
  alternatives_spanish:
  - en el peñasco
  - en la piedra
  lexicon: HALOT
  rationale: צוּר alude a roca/peñasco. 'Roca' es fiel y más precisa que 'piedra' para la imagen de una inscripción tallada.
- source_word: יֵחָצְבוּן
  english_pob_choice: may they be engraved
  chosen_spanish: fueran grabados
  alternatives_spanish:
  - sean grabados
  - fueran tallados
  lexicon: HALOT
  rationale: El verbo חצב significa cortar/henchir/esculturar; en este contexto de escritura permanente en roca, 'grabar' comunica mejor el resultado final en español. El subjuntivo imperfecto 'fueran' preserva el tono de deseo/jussivo del hebreo dentro de la exclamación optativa.
translation_notes:
  revision_awareness: 'El texto base en inglés ya refleja una solución consensuada: ''with an iron stylus and lead, may they be engraved in the rock forever!''. No se registran revisiones aplicadas; se conserva la misma lectura semántica, ajustando únicamente la formulación al español natural y manteniendo la tensión léxica entre ''grabar/tallar'' y la imagen de inscripción permanente.'
  spanish_consistency_notes:
  - Se usa 'roca' para צוּר en vez de 'piedra' por mayor precisión y por continuidad con la imagen de inscripción durable.
  - Se conserva 'plomo' sin explicar funcionalidad en el cuerpo principal; la posible función material queda reservada para nota.
  - '''Grabados'' mantiene la imagen de inscripción permanente mejor que una paráfrasis más libre como ''escritos''.'
  - El modo optativo se refleja con '¡Ojalá...!' y el imperfecto de subjuntivo 'fueran', que suena natural en español y preserva el matiz desiderativo.
