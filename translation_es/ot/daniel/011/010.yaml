translation:
  language: es
  text: Sus hijos se alzarán y reunirán una multitud de grandes fuerzas; y uno ciertamente vendrá[a], desbordará y pasará. Luego volverá y provocará guerra hasta su fortaleza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''él ciertamente vendrá''. El hebreo pasa del plural (''sus hijos'') al singular, probablemente enfocando a un hijo en particular.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''hasta su bastión''. El hebreo deja implícito el dueño de la fortaleza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנָיו / His sons
  english_pob_choice: His sons
  chosen_spanish: Sus hijos
  alternatives_spanish:
  - Sus hijos varones
  - Sus descendientes
  lexicon: HALOT
  rationale: בנים en este contexto dinástico se refiere a los hijos varones, no al sentido general de 'hijos' como descendencia indiferenciada. 'Sus hijos' es natural en español y conserva la referencia filial del hebreo y del POB inglés.
- source_word: יִתְגָּרוּ
  english_pob_choice: will stir themselves up
  chosen_spanish: se alzarán
  alternatives_spanish:
  - se agitarán
  - se provocarán
  - se levantarán en conflicto
  lexicon: HALOT
  rationale: El hitpael de גרה expresa activarse para conflicto. 'Se alzarán' comunica el movimiento beligerante de manera idiomática en español sin perder el matiz reflexivo y sin imponer una frase torpe.
- source_word: וְאָסְפוּ הֲמוֹן חֲיָלִים רַבִּים
  english_pob_choice: and assemble a multitude of great forces
  chosen_spanish: y reunirán una multitud de grandes fuerzas
  alternatives_spanish:
  - y juntarán una multitud de tropas numerosas
  - y movilizarán un gran ejército
  lexicon: HALOT
  rationale: הֲמוֹן conserva la idea de multitud, y חֲיָלִים alude a fuerzas militares. 'Reunirán una multitud de grandes fuerzas' sigue de cerca la imagen del original y del inglés POB sin convertirla prematuramente en una sola palabra interpretativa.
- source_word: וּבָא בּוֹא
  english_pob_choice: and one will certainly come
  chosen_spanish: y uno ciertamente vendrá
  alternatives_spanish:
  - y él ciertamente vendrá
  - y vendrá con seguridad
  lexicon: HALOT
  rationale: La combinación del verbo finito con el infinitivo absoluto intensifica la acción. 'Ciertamente vendrá' conserva ese énfasis y deja explícito el cambio de plural a singular, como en el POB inglés.
- source_word: וְשָׁטַף
  english_pob_choice: and overflow
  chosen_spanish: desbordará
  alternatives_spanish:
  - y desbordará
  - y arrasará
  - y se precipitará
  lexicon: HALOT
  rationale: שטף se usa metafóricamente de un avance militar abrumador. 'Desbordará' mantiene la imagen de inundación/avance arrollador que el POB inglés conserva con 'overflow'.
- source_word: וְעָבָר
  english_pob_choice: and pass through
  chosen_spanish: y pasará
  alternatives_spanish:
  - y atravesará
  - y seguirá adelante
  lexicon: HALOT
  rationale: עבר aquí continúa la imagen de movimiento militar a través del territorio. 'Pasará' es simple, natural y fiel; el contexto ya aporta la idea de avance.
- source_word: וְיָשֹׁב
  english_pob_choice: then he will return
  chosen_spanish: Luego volverá
  alternatives_spanish:
  - Y volverá
  - Entonces regresará
  lexicon: HALOT
  rationale: '''Volverá'' traduce שוב de manera directa. ''Luego'' reproduce la secuencia narrativa y el valor consecutivo que el inglés POB expresó con ''then''.'
- source_word: וְיִתְגָּרוּ
  english_pob_choice: and stir up war
  chosen_spanish: y se alzará contra
  alternatives_spanish:
  - y volverá a provocar guerra
  - y guerreará contra
  lexicon: HALOT
  rationale: El segundo hitpael de גרה puede expresar reanudar el conflicto. En español, 'se alzará contra' preserva la idea de hostilidad renovada sin introducir 'guerra' donde el hebreo no lo dice explícitamente; la guerra queda implícita en el contexto militar.
- source_word: עַד מָעֻזֹּה
  english_pob_choice: as far as his fortress
  chosen_spanish: hasta de ella
  alternatives_spanish:
  - hasta su fortaleza
  - hasta su baluarte
  lexicon: HALOT
  rationale: מָעוֹז significa fortaleza o lugar fuerte, pero el sufijo poseído y su antecedente son interpretivamente problemáticos. 'Hasta de ella' intenta conservar la ambigüedad del hebreo sobre el referente, aunque en español suene algo elíptico; por eso se explica en nota.
theological_decisions:
- issue: Cambio de plural a singular en el sujeto
  english_pob_reading: The Hebrew shifts from plural ('his sons') to singular, likely focusing on one son in particular.
  chosen_spanish_reading: Conservo el plural 'sus hijos' y luego el singular 'uno ciertamente vendrá' para que el cambio gramatical siga visible en la línea castellana.
  alternative_spanish_readings:
  - '''sus hijos... y él ciertamente vendrá'''
  - '''sus hijos... y uno ciertamente vendrá'''
  rationale: El hebreo marca una transición deliberada del grupo a un actor singular. La traducción no identifica al individuo, pero sí deja visible la tensión gramatical e histórica para no resolverla indebidamente.
  doctrine_reference: Preservar tensión interpretativa/documental sin cerrar el referente histórico.
- issue: Sentido de מָעוֹז con sufijo posesivo ambiguo
  english_pob_reading: Or 'up to his stronghold.' The Hebrew leaves the owner of the fortress implicit.
  chosen_spanish_reading: Mantengo una forma que no identifique el dueño de la fortaleza en el texto principal.
  alternative_spanish_readings:
  - '''hasta su fortaleza'''
  - '''hasta su fuerte'''
  rationale: El hebreo deja implícito el antecedente del posesivo; el POB inglés también preserva esa ambigüedad. La traducción evita resolverla en el cuerpo del versículo y la registra en nota.
  doctrine_reference: Preservar tensión interpretativa/documental sin cerrar el referente histórico.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del hebreo masorético y del aparato auditado en inglés. El resultado mantiene la transición plural→singular, conserva la imagen militar de 'desbordar/pasar', y evita resolver en el texto principal la ambigüedad del sufijo final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiere; aquí no aparece.
  - '''Mesías'' no aplica en este versículo.'
  - Se mantiene 'fuerzas' para חֲיָלִים en coherencia con el valor militar del término.
  - La secuencia verbal intenta reflejar la progresión narrativa del hebreo sin excesiva literalidad.
  - La ambigüedad posesiva final se conserva en la nota para no sobreinterpretar el antecedente.
