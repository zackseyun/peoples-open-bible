revisions:
- from: Y traerán a todos sus hermanos de entre todas las naciones como una ofrenda a Yahvé[a], en caballos, en carros, en literas y en mulas y en camellos, a mi santo monte, Jerusalén, dice Yahvé[b], así como los hijos de Israel traen la ofrenda en un recipiente limpio a la casa de Yahvé.
  to: Y traerán a todos sus hermanos[a] de todas las naciones como una ofrenda a Yahvé, en caballos, en carros, en literas, en mulas y en camellos[b], a mi santo monte, Jerusalén, dice Yahvé, así como los hijos de Israel traen la ofrenda en un recipiente limpio a la casa de Yahvé.
  rationale: Se corrigen los anclajes de las notas para que correspondan a 'hermanos' y 'camellos', y se ajusta 'de entre todas las naciones' a 'de todas las naciones' por fidelidad más directa al hebreo, sin cambiar el sentido general del borrador.
