review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y la prohibición comercial del hebreo: venta/compra con el prójimo y la orden de no aprovecharse injustamente del hermano. Sin embargo, conserva literalmente «de la mano de vuestro prójimo», mientras que en español aquí suena forzado y el propio rastro de auditoría inglesa ya determinó que no conviene mantener «hand» en el texto principal. Además, «vendéis/compráis/vuestro» introduce voseo/vosotros peninsular, no el estilo neutral latinoamericano solicitado.'
  spanish_quality_summary: La redacción es comprensible, pero no cumple bien el estilo meta. «Vendéis... vuestro» suena peninsular y menos ampliamente eclesial para América Latina. «De la mano de vuestro prójimo» es innecesariamente literal y poco natural en este contexto comercial. La cláusula final «nadie oprimirá a su hermano» es aceptable y conserva el registro legal y la fuerza distributiva.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Prójimo» y «hermano» preservan bien עָמִית y אָחִיו. La nota léxica sobre el verbo está bien encaminada, pero conviene ajustar el texto principal a español natural: «de tu prójimo» en vez de «de la mano de vuestro prójimo».'
  issues:
  - severity: medium
    issue: Uso de formas peninsulares («vendéis», «compráis», «vuestro»)
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. Formas con «ustedes/su» o una formulación impersonal son más apropiadas.
  - severity: medium
    issue: «De la mano de vuestro prójimo» suena forzado en español
    rationale: Aunque מִיַּד literalmente contiene «mano», el inglés auditado ya decidió omitirlo por naturalidad. En español comercial/jurídico «comprar de la mano de» no suena idiomático aquí y no añade sentido esencial.
  - severity: low
    issue: La nota al pie está anclada en «prójimo» pero explica el verbo de la prohibición
    rationale: El contenido de la nota corresponde mejor a la cláusula «oprima»/«oprimirá» que a «prójimo», para evitar ambigüedad interpretativa.
  revised_spanish_text: Y si venden algo a su prójimo, o compran de su prójimo, nadie oprimirá[a] a su hermano.
  revised_footnotes:
  - marker: a
    text: 'O: «no hagan injusticia unos a otros»; el verbo puede implicar tomar ventaja de manera desleal, especialmente en asuntos comerciales.'
    reason: lexical_alternative
  revision_rationale: Se corrige el registro al español neutral latinoamericano («venden/compran/su»), se elimina el calco poco natural «de la mano de» conforme al sentido del hebreo y al precedente del rastro inglés, y se reubica la nota para anclarla en el verbo que realmente explica. Se conserva «prójimo» y «hermano» para mantener la red relacional del hebreo y «oprimirá» por coherencia con la decisión léxica de la POB.
