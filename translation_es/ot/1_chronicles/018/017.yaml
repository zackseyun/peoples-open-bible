  language: en
  yaml_path: translation/ot/1_chronicles/018/017.yaml
  text: And Benaiah son of Jehoiada was over the Kerethites and the Pelethites[c][b][a], and David’s sons were the chief officials at the king’s side.
  footnotes:
  - marker: a
    text: Or 'Cherethites,' the traditional English form of the group name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the first ones' or 'the foremost ones'; likely a title for leading court officials.
    reason: lexical_alternative
  - marker: c
    text: Literally 'to/at the hand of the king,' an idiom for close attendance or service.
    reason: lexical_alternative
