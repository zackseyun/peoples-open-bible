base_translation:
  language: en
  yaml_path: translation/ot/amos/001/009.yaml
  text: 'Thus says Yahweh: “For three transgressions of Tyre[a], and for four, I will not revoke its punishment[c][b], because they delivered up an entire population of exiles to Edom and did not remember a covenant of brotherhood.”'
  footnotes:
  - marker: a
    text: Or, more literally, “I will not turn it back,” with the object left unstated in Hebrew; the sense is that the announced judgment will not be revoked.
    reason: lexical_alternative
  - marker: b
    text: Or “an entire exile community” or “a whole captivity.” The Hebrew phrase refers to handing over a complete group of captives/exiles.
    reason: lexical_alternative
  - marker: c
    text: Literally, “a covenant of brothers.”
    reason: lexical_alternative
