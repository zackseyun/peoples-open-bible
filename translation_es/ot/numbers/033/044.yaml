translation:
  language: es
  text: Partieron de Obot y acamparon en Iye-abarim[a], en la frontera de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Iyye-abarim»; el hebreo puede reflejar un nombre de lugar cuyos elementos se relacionan con «ruinas» y «Abarim/las regiones más allá».
