- from: Desde el día en que el arca quedó[a] en Quiriat-jearim, los días se multiplicaron, y fueron veinte años; y toda la casa de Israel lamentó[b] tras Yahvé.
  to: Desde el día en que el arca quedó[a] en Quiriat-jearim, los días se hicieron muchos, y fueron veinte años; y toda la casa de Israel lamentó[b] tras Yahvé.
  rationale: Se ajusta el idiomatismo temporal a un español más natural y cercano al sentido fuente ('los días se hicieron muchos') y se corrige la nota [a] para que describa con precisión el valor de שֶׁבֶת. También se mejora levemente la alternativa de la nota [b] para español más natural ('anheló a Yahvé'). No se requiere adjudicación adicional porque el sentido general y la teología ya están bien documentados en el audit trail.
