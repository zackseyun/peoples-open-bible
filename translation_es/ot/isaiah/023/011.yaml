translation:
  language: es
  text: Ha extendido su mano sobre el mar[a]; ha hecho temblar a los reinos. Yahvé ha ordenado acerca de Canaán[b], para destruir sus fortalezas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra el mar». La preposición hebrea puede entenderse de más de una manera aquí.
    reason: alternative_reading
  - marker: b
    text: «Canaán» aquí probablemente se refiere a la región fenicia asociada con Tiro.
    reason: cultural_note
  - marker: c
    text: O «sus fortalezas». El hebreo usa un sufijo femenino singular, coherente con la personificación de la tierra o la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su poder
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de la mano, como en el inglés POB, para conservar el gesto antropomórfico de acción y juicio sin abstraerlo a 'poder'.
- source_word: נָטָה
  english_pob_choice: has stretched out
  chosen_spanish: ha extendido
  alternatives_spanish:
  - ha tendido
  - ha alargado
  lexicon: HALOT
  rationale: '''Ha extendido'' comunica bien en español la idea de extender o alargar deliberadamente la mano, con un registro natural y fiel al hebreo.'
- source_word: עַל הַיָּם
  english_pob_choice: over the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - contra el mar
  - sobre el mar
  lexicon: HALOT
  rationale: '''Sobre el mar'' reproduce la imagen de alcance soberano. ''Contra'' quedaría disponible como matiz interpretativo en la nota, porque el hebreo puede admitir esa lectura en contexto.'
- source_word: הִרְגִּיז
  english_pob_choice: has made tremble
  chosen_spanish: ha hecho temblar
  alternatives_spanish:
  - ha sacudido
  - ha agitado
  lexicon: HALOT
  rationale: La forma causativa expresa que Dios provoca temor o estremecimiento en los reinos; 'ha hecho temblar' es la equivalencia más directa y natural.
- source_word: מַמְלָכוֹת
  english_pob_choice: kingdoms
  chosen_spanish: los reinos
  alternatives_spanish:
  - los dominios
  lexicon: HALOT
  rationale: '''Reinos'' es el equivalente más transparente para entidades políticas y conserva la amplitud del plural hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el Tetragrámaton: ''Yahvé'' preserva el nombre propio divino, en lugar de sustituirlo por un título.'
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha dado orden
  alternatives_spanish:
  - ha mandado
  - ha ordenado
  lexicon: HALOT
  rationale: '''Ha dado orden'' expresa bien el acto de emitir una disposición con autoridad. Evita la rigidez de un calco y mantiene la fuerza jurídica del verbo.'
- source_word: אֶל כְּנַעַן
  english_pob_choice: concerning Canaan
  chosen_spanish: acerca de Canaán
  alternatives_spanish:
  - contra Canaán
  - para Canaán
  lexicon: HALOT
  rationale: '''Acerca de'' conserva la amplitud de אֶל después de צוה sin cerrar prematuramente la relación semántica. La nota deja abierta la posibilidad de ''contra''.'
- source_word: כְּנַעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Fenicia
  lexicon: HALOT
  rationale: Conservo el nombre hebreo 'Canaán' en el texto principal, siguiendo la primacía del original; la identificación con Fenicia queda para la nota contextual.
- source_word: לַשְׁמִיד
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para aniquilar
  - para arrasar
  lexicon: HALOT
  rationale: El infinitivo comunica finalidad. 'Para destruir' es suficientemente fuerte sin intensificar más de lo que exige el hebreo.
- source_word: מָעֻזְנֶיהָ
  english_pob_choice: her strongholds
  chosen_spanish: sus fortalezas
  alternatives_spanish:
  - sus bastiones
  - sus defensas
  lexicon: HALOT
  rationale: '''Fortalezas'' corresponde bien al sustantivo de lugar fuerte/refugio y suena natural en español bíblico contemporáneo. Uso ''sus'' para reflejar el sufijo femenino singular del hebreo, sin forzar género en castellano.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Mantengo el nombre propio divino según la convención del proyecto en español, para no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֶל כְּנַעַן
  english_pob_reading: concerning Canaan
  chosen_spanish_reading: acerca de Canaán
  alternative_spanish_readings:
  - contra Canaán
  - para Canaán
  rationale: La preposición hebrea y el contexto permiten más de una lectura. Prefiero una formulación neutral en el texto principal y conservo la alternativa hostil en nota, sin resolver artificialmente la tensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it'
- issue: Identificación contextual de Canaán
  english_pob_reading: Canaan here likely refers to the Phoenician region associated with Tyre.
  chosen_spanish_reading: Canaán como nombre del área fenicia asociada con Tiro, indicado en nota
  alternative_spanish_readings:
  - Fenicia
  rationale: En Isaías 23 el referente contextual es probablemente la región fenicia. Mantengo el nombre fuente en el texto principal y explico la identificación histórica en una nota para preservar la primacía del hebreo.
  doctrine_reference: DOCTRINE.md Original-language primacy over translation tradition
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que indicó alta concordancia y sin cambios necesarios; por eso conservo la estructura semántica del audit trail inglés y únicamente la vierto a español con equivalencias naturales y auditables.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'Canaán' en el cuerpo del texto, con la identificación fenicia en nota para no perder el término fuente.
  - '''Sus fortalezas'' refleja el sufijo femenino singular hebreo sin alterar el castellano natural.'
  - El orden de los marcadores [a][c][b] sigue el texto inglés auditado y sus anclajes correspondientes.
