lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: LSJ
  rationale: La conjunción simple enlaza esta cláusula con el contexto inmediato; en español, «y» es la solución natural y fiel.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - fama
  lexicon: LSJ
  rationale: «Nombre» conserva el valor bíblico del término como designación y reputación de la persona, sin convertirlo en una paráfrasis más abstracta.
- source_word: ἁγιασμοῦ
  english_pob_choice: name of holiness
  chosen_spanish: nombre de santidad
  alternatives_spanish:
  - nombre santo
  - nombre de consagración
  - nombre de santificación
  lexicon: LSJ
  rationale: El genitivo griego es literalmente «de santidad/santificación». En español, «nombre de santidad» mantiene esa relación nominal sin imponer un adjetivo que suavice la tensión del original.
- source_word: αἰνέσουσιν
  english_pob_choice: they will praise
  chosen_spanish: lo alabarán
  alternatives_spanish:
  - lo ensalzarán
  - le darán alabanza
  lexicon: LSJ
  rationale: El futuro de αἰνέω es «alabar». En español, el objeto implícito se recupera naturalmente por el contexto, de modo que «lo alabarán» resulta fluido y fiel al sentido.
theological_decisions:
- issue: Cómo reflejar la expresión compacta ὄνομα ἁγιασμοῦ sin borrar su tensión lexical
  english_pob_reading: the name of holiness
  chosen_spanish_reading: el nombre de santidad
  alternative_spanish_readings:
  - el nombre santo
  - el nombre de consagración
  rationale: La lectura inglesa revisada prefirió una reproducción más directa de la genitiva. En español, «nombre de santidad» conserva la literalidad relativa de ὄνομα ἁγιασμοῦ y evita convertirla demasiado pronto en un adjetivo («nombre santo»), aunque esa sigue siendo una posible lectura idiomática.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without unnecessary paraphrase.'
translation_notes:
  revision_awareness: La versión inglesa del POB fue revisada de «the holy name» a «the name of holiness» para reflejar con mayor precisión ὄνομα ἁγιασμοῦ. Esta versión española sigue esa revisión y evita volver a una paráfrasis adjetival no requerida por el griego.
  spanish_consistency_notes:
  - Se mantiene «alabar» para αἰνέω, en línea con la decisión inglesa.
  - Se evita «Señor» o cualquier sustitución teológica no presente en el griego.
  - «Santidad» conserva la ambigüedad entre cualidad santa y santificación, como permite el genitivo griego.
