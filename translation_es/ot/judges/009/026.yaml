translation:
  language: es
  text: Entonces Gaal hijo de Ebed vino con sus hermanos[a] y entraron en Siquem[b], y los líderes[c] de Siquem confiaron en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sus hermanos»; el hebreo dice simplemente «y», aunque en español después de «vino» es natural expresar acompañamiento con «con sus hermanos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pasaron por Siquem» o «cruzaron hacia Siquem»; el verbo hebreo puede denotar cruzar o pasar, y el matiz exacto en este contexto es debatido.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los señores de Siquem»; el hebreo dice literalmente «los בעלי de Siquem», refiriéndose a los hombres principales o detentores de poder de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y ... vino
  - Luego ... vino
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «entonces» comunica bien esa progresión en español sin perder la secuencia del verbo de movimiento.
- source_word: גַּעַל
  english_pob_choice: Gaal
  chosen_spanish: Gaal
  alternatives_spanish:
  - —
  lexicon: transliteración del nombre propio
  rationale: Los nombres propios se transliteran, no se traducen.
- source_word: בֶּן עֶבֶד
  english_pob_choice: son of Ebed
  chosen_spanish: hijo de Ebed
  alternatives_spanish:
  - —
  lexicon: patronímico estándar
  rationale: La construcción patronímica hebrea se conserva de forma directa y natural en español.
- source_word: וְאֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - y sus hermanos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y sus hermanos», en español, con un verbo de llegada, la relación de acompañamiento se expresa con más naturalidad como «con sus hermanos».
- source_word: וַיַּעַבְרוּ בִּשְׁכֶם
  english_pob_choice: crossed into Shechem
  chosen_spanish: pasó por Siquem
  alternatives_spanish:
  - cruzó hacia Siquem
  - atravesó Siquem
  - entró en Siquem
  lexicon: HALOT
  rationale: El verbo עבר puede significar cruzar, pasar o atravesar. Como el contexto permite movimiento por la ciudad, «pasó por Siquem» evita sobreespecificar la dirección y mantiene la ambigüedad posible del original.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los señores de Siquem
  alternatives_spanish:
  - los líderes de Siquem
  - los dueños de Siquem
  - los notables de Siquem
  lexicon: HALOT
  rationale: בעלי de una ciudad refiere a sus hombres principales o detentores de poder. «Señores» conserva el peso social y evita reducirlo a una glosa interpretativa demasiado moderna.
- source_word: וַיִּבְטְחוּ בּוֹ
  english_pob_choice: put their trust in him
  chosen_spanish: confiaron en él
  alternatives_spanish:
  - pusieron su confianza en él
  - se fiaron de él
  lexicon: HALOT
  rationale: בטח con ב expresa confianza personal. «Confiaron en él» es una equivalencia natural y fiel en español.
theological_decisions:
- issue: Rango semántico de בעלי שכם
  english_pob_reading: the leaders of Shechem
  chosen_spanish_reading: los señores de Siquem
  alternative_spanish_readings:
  - los líderes de Siquem
  - los notables de Siquem
  - los dueños de Siquem
  rationale: No se trata de todos los habitantes, sino del grupo con autoridad o influencia en la ciudad. «Señores» conserva la idea de poder-holdership sin imponer una sola categoría sociológica.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: La revisión auditada reporta alta concordancia y sin cambios sustantivos recientes; esta versión sigue de cerca el consenso del contexto inglés y ajusta únicamente la idiomaticidad española.
  spanish_consistency_notes:
  - Se mantiene «Siquem» como forma española del topónimo.
  - Se conserva la progresión narrativa con «Entonces».
  - No se introduce terminología eclesiástica ajena al contexto histórico del texto.
  - Se evita sobretraducción de עבר para dejar margen a la ambigüedad del hebreo.
