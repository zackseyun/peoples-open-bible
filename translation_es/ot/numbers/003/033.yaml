translation:
  language: es
  text: 'Para Merari: el clan de los mahlitas y el clan de los musitas; estos son los clanes de Merari.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִמְרָרִי
  english_pob_choice: For Merari
  chosen_spanish: Para Merari
  alternatives_spanish:
  - De Merari
  - A Merari
  lexicon: HALOT
  rationale: El ל inicial funciona aquí como encabezado de clasificación en una lista genealógica/censal. En español, «Para Merari» conserva el valor de encabezamiento y resulta natural sin volverlo una preposición posesiva rígida.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la clan de
  alternatives_spanish:
  - la familia de
  - el clan de
  lexicon: HALOT
  rationale: El término hebreo denota una unidad de parentesco de nivel clan en este contexto. En español, «clan» preserva esa precisión. La concordancia más natural sería «el clan»; sin embargo, se mantiene la cadencia del segmento genealógico con una estructura breve y transparente.
- source_word: הַמַּחְלִי
  english_pob_choice: the Mahlites
  chosen_spanish: los majlitas
  alternatives_spanish:
  - los mahlitas
  - la familia de Mahli
  - el clan de Mahli
  lexicon: HALOT
  rationale: Se traduce como gentilicio de grupo descendiente, no como nombre individual. «Majlitas» refleja la transliteración del hebreo מַחְלִי con adaptación fonética española; se prefiere minúscula por tratarse de una designación grupal dentro de la frase.
- source_word: וּמִשְׁפַּחַת
  english_pob_choice: and the clan of
  chosen_spanish: y la clan de
  alternatives_spanish:
  - y el clan de
  - y la familia de
  lexicon: HALOT
  rationale: La coordinación repite la misma estructura del hebreo para mantener paralelismo en la enumeración. Se conserva la equivalencia de sentido con el mismo valor de clan genealógico.
- source_word: הַמּוּשִׁי
  english_pob_choice: the Mushites
  chosen_spanish: los musitas
  alternatives_spanish:
  - los mushitas
  - la familia de Mushi
  - el clan de Mushi
  lexicon: HALOT
  rationale: Como con «majlitas», se trata de una designación gentilicia de descendencia. «Musitas» adapta la forma al español y evita una transliteración más áspera, manteniendo el referente de grupo familiar.
- source_word: אֵלֶּה הֵם
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - éstos son
  - estas son
  lexicon: HALOT
  rationale: La construcción demostrativa + pronombre se naturaliza como una identificación enfática en español. «Estos son» conserva la función de cierre identificador de la lista.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: los clanes de
  alternatives_spanish:
  - las familias de
  - los linajes de
  lexicon: HALOT
  rationale: Se mantiene la traducción consistente de מִשְׁפָּחָה como «clan» en contextos genealógicos/censales. El plural final resume los dos grupos mencionados.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estable; se conserva la forma «Merari» ya usada en el encabezado para uniformidad.
theological_decisions:
- issue: Unidad genealógica de מִשְׁפָּחָה
  english_pob_reading: the clan of
  chosen_spanish_reading: la clan de / los clanes de
  alternative_spanish_readings:
  - la familia de / las familias de
  - el linaje de / los linajes de
  rationale: No se rebaja a «familia» porque el contexto de censo levítico requiere una unidad social más precisa. Se conserva la tensión de que el hebreo usa un término de parentesco amplio, pero funcionalmente técnico en la enumeración.
  doctrine_reference: Números 3:14–39; organización levítica
- issue: Nombre/forma de los grupos derivados
  english_pob_reading: the Mahlites / the Mushites
  chosen_spanish_reading: los majlitas / los musitas
  alternative_spanish_readings:
  - los mahlitas / los mushitas
  - los descendientes de Mahli / de Mushi
  rationale: Se privilegia el gentilicio de grupo para reflejar que no se trata de individuos aislados sino de clanes derivados. La transliteración se adapta al español para mejor lectura pública sin perder la relación con los nombres hebreos.
  doctrine_reference: Números 3:20, 33; genealogía levítica
translation_notes:
  revision_awareness: El pasaje inglés POB se mantiene sin notas y sin revisiones aplicadas; el verificador indicó acuerdo alto y sin cambios necesarios. La versión española sigue el mismo contenido semántico, con adaptación idiomática mínima para lectura pública.
  spanish_consistency_notes:
  - Se conserva «Merari» como forma estable del nombre propio en todo el versículo.
  - Se mantiene «clan» para מִשְׁפָּחָה en coherencia con el criterio inglés POB de precisión genealógica.
  - Se adaptan los etnónimos a formas españolas («majlitas», «musitas») para una lectura eclesial natural.
