base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/010.yaml
  text: So Elisha sent a messenger to him[a], saying, “Go and wash in the Jordan seven times, and your flesh will be restored to you[b], and you will be clean.”
  footnotes:
