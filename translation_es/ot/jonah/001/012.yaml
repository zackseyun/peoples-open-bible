translation:
  language: es
  text: 'Y él les dijo[a]: «Levántenme y arrójenme al mar, y el mar se calmará para ustedes[b], porque sé que esta gran tormenta está sobre ustedes[c] por mi causa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrójenme al mar»; el hebreo primero dice «levántenme» y luego «arrójenme».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el mar estará quieto de sobre ustedes».
    reason: lexical_alternative
  - marker: c
    text: 'O: «esta gran tormenta ha venido sobre ustedes por mi causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא֨וּ/נִי
  english_pob_choice: Pick me up
  chosen_spanish: Levántenme
  alternatives_spanish:
  - Tómenme
  - Alcénmenme
  lexicon: HALOT
  rationale: נשא aquí describe la acción física de alzar a Jonás para echarlo por la borda. En español, «levantar» comunica bien ese movimiento concreto y suena natural; «tomarme» sería más general y «alzarme» es posible pero menos usual en este registro.
- source_word: וַ/הֲטִילֻ֣/נִי
  english_pob_choice: throw me
  chosen_spanish: arrójenme
  alternatives_spanish:
  - échenme
  - tírenme
  lexicon: HALOT
  rationale: El hiphil de טול expresa arrojar o echar con fuerza. «Arrójenme» conserva esa fuerza y la claridad del original. «Échenme» es más neutro, y «tírenme» puede sonar demasiado coloquial.
- source_word: הַ/יָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  lexicon: HALOT
  rationale: En español, «mar» es el equivalente más natural de ים. «Océano» sobreespecificaría el término y no está respaldado por el hebreo.
- source_word: וְ/יִשְׁתֹּ֥ק
  english_pob_choice: will become calm
  chosen_spanish: se calmará
  alternatives_spanish:
  - se aquietará
  - quedará en calma
  lexicon: HALOT
  rationale: El verbo puede significar «quedarse quieto/silencioso», pero con el mar tempestuoso el sentido es el cese de la agitación. «Se calmará» comunica ese valor en español con naturalidad, sin perder la imagen de quietud.
- source_word: מֵֽ/עֲלֵי/כֶ֑ם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - alejado de ustedes
  - por ustedes
  lexicon: HALOT
  rationale: La revisión inglesa optó por una expresión más natural que conserva el efecto del hebreo. En español, «para ustedes» refleja el beneficio resultante y evita un calco torpe como «desde sobre ustedes», manteniendo la relación con la tormenta que pesa sobre ellos.
- source_word: יוֹדֵ֣עַ אָ֔נִי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - yo mismo sé
  lexicon: HALOT
  rationale: La combinación participio + pronombre expresa certeza enfática. «Sé» basta en español y mantiene la sobriedad del reconocimiento de Jonás; agregar «yo» sería posible, pero no necesario.
- source_word: בְ/שֶׁ/לִּ֔/י
  english_pob_choice: because of me
  chosen_spanish: por causa mía
  alternatives_spanish:
  - por mi culpa
  - a causa de mí
  lexicon: HALOT
  rationale: La preposición indica causa o responsabilidad. «Por causa mía» conserva esa relación causal sin intensificarla con una interpretación más explícita como «por mi culpa», aunque esa sería una alternativa válida en algunos contextos.
- source_word: הַ/סַּ֧עַר הַ/גָּד֛וֹל הַ/זֶּ֖ה
  english_pob_choice: this great storm
  chosen_spanish: esta gran tormenta
  alternatives_spanish:
  - este gran temporal
  - esta gran tempestad
  lexicon: HALOT
  rationale: סער designa una tormenta violenta o tempestad. «Tormenta» es claro y contemporáneo; «gran» conserva el adjetivo y el demostrativo «esta» reproduce el énfasis del hebreo.
- source_word: עֲלֵי/כֶֽם
  english_pob_choice: is upon you
  chosen_spanish: está sobre ustedes
  alternatives_spanish:
  - cae sobre ustedes
  - pesa sobre ustedes
  lexicon: HALOT
  rationale: La imagen hebrea es la de algo que está encima de ellos. «Está sobre ustedes» preserva esa metáfora de modo transparente; «pesa sobre ustedes» explicita el efecto, pero se aleja un poco más del texto.
theological_decisions:
- issue: Confesión de responsabilidad causal por la tormenta
  english_pob_reading: Jonah explicitly states that the storm has come upon the sailors because of him.
  chosen_spanish_reading: Jonás afirma claramente que la gran tormenta está sobre ellos por causa suya.
  alternative_spanish_readings:
  - Jonás solo sugiere asociación, sin asumir culpabilidad directa.
  - La tormenta les ha venido a ellos por su presencia, sin declaración explícita de causa personal.
  rationale: El hebreo בשלִי señala causa o responsabilidad, no mera asociación. La traducción debe conservar la confesión directa de Jonás sin suavizarla.
  doctrine_reference: Jonah 1:12; responsibilidad personal y confesión de culpa
translation_notes:
  revision_awareness: Se integró la revisión auditada del POB en inglés que prefirió una expresión más natural para el resultado de יִשְׁתֹּק, evitando un calco como «desde sobre ustedes» y dejando el sentido como beneficio/resultante para los marineros. También se mantuvo la causalidad explícita de בשלִי sin atenuarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto, aunque este versículo no contiene el nombre divino.
  - Se eligió «mar» para ים y «tormenta» para סער, con registro bíblico claro pero natural.
  - Se preservó la fuerza causal de «por causa mía» para reflejar el reconocimiento de responsabilidad de Jonás.
  - Se usó «Jesús» y «Mesías» no aplican en este versículo; no se introdujo terminología cristológica ajena al texto.
