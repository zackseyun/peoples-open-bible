  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «El impío» refleja bien δυσσεβής. No hay nombres divinos ni títulos mesiánicos en este versículo. El manejo de «vida» y «muerte» conserva la decisión auditada de mantener el circunloquio con nota explicativa.
