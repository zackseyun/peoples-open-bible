translation:
  language: es
  text: 'Entonces José dijo a sus hermanos: «Acérquense a mí, por favor». Y ellos se acercaron. Entonces dijo: «Yo soy José, el hermano de ustedes, a quien ustedes vendieron a Egipto».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva esa progresión de manera natural en español sin perder el valor secuencial.
- source_word: אֶל־אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - para sus hermanos
  lexicon: HALOT
  rationale: La relación fraternal es directa y el español exige la preposición «a» con «dijo a» para el complemento personal destinatario.
- source_word: גְּשׁוּ נָא אֵלַי
  english_pob_choice: Please come near to me
  chosen_spanish: Acérquense, por favor, a mí
  alternatives_spanish:
  - Vengan cerca de mí, por favor
  - Acérquense a mí, por favor
  lexicon: HALOT
  rationale: «Acérquense» refleja el imperativo plural de נגשׁ y preserva la cercanía física; «por favor» expresa נָא como ruego cortés. La inversión con «a mí» mantiene claridad natural en español.
- source_word: וַיִּגָּשׁוּ
  english_pob_choice: And they came near
  chosen_spanish: Y ellos se acercaron
  alternatives_spanish:
  - Y se acercaron
  - Y se aproximaron
  lexicon: HALOT
  rationale: Se conserva la repetición verbal con el mismo campo léxico de גְּשׁוּ. «Se acercaron» es el equivalente más claro y directo en español.
- source_word: אֲנִי יוֹסֵף
  english_pob_choice: I am Joseph
  chosen_spanish: Yo soy José
  alternatives_spanish:
  - Yo soy Yosef
  - Soy José
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se expresa naturalmente con «yo soy». Se usa «José» como forma española estable del nombre propio.
- source_word: אֲחִיכֶם
  english_pob_choice: your brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su propio hermano
  - el hermano de ustedes
  lexicon: HALOT
  rationale: Aunque el hebreo tiene sufijo de segunda persona plural, el español evita la repetición explícita con «ustedes» dentro del discurso directo; el posesivo «su» comunica adecuadamente la relación.
- source_word: אֲשֶׁר מְכַרְתֶּם אֹתִי
  english_pob_choice: whom you sold
  chosen_spanish: al que ustedes vendieron
  alternatives_spanish:
  - a quien ustedes vendieron
  - que ustedes vendieron
  lexicon: HALOT
  rationale: Se mantiene el carácter personal y acusatorio del relativo. «Vender» es el equivalente directo de מכר; «ustedes» aclara el sujeto plural implícito del verbo.
- source_word: מִצְרָיְמָה
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - en Egipto
  lexicon: HALOT
  rationale: El he direccional expresa destino. En español, «a Egipto» comunica esa dirección de forma idiomática y suficiente sin añadir una imagen espacial más fuerte que la del hebreo.
translation_notes:
  revision_awareness: El español sigue el sentido y la progresión narrativa confirmados por el audit trail en inglés, manteniendo la repetición de «acercarse» y el tono acusatorio de la revelación de José sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «José» en la forma española estándar del nombre propio, coherente con el uso bíblico común y sin alterar la referencia al personaje hebreo.
  - Se mantiene un registro reverente pero claro, apto para lectura pública e iglesia, sin arcaísmos innecesarios.
  - La repetición verbal «acérquense / se acercaron» conserva el paralelismo del hebreo y la decisión inglesa de mantener la misma raíz léxica.
