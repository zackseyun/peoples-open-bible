    rationale: La nota [a] del POB inglés corresponde a ἐὰν σκυβαλωθῶσιν («treated like refuse»), no a «mi corazón se ha entristecido». En español, el borrador además introduce una nota distinta sobre el perfecto griego, pero el proyecto pide preservar alternativas significativas y la auditoría documentada.
  - severity: medium
