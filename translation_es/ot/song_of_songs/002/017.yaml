revisions:
- from: Hasta que el día [a] despunte y las sombras huyan, vuelve[b], amado mío; sé como una gacela o como un cervatillo de los ciervos sobre los montes de Bether[c].
  to: Hasta que el día[a] respire y las sombras huyan, gira, amado mío; sé como una gacela o como un cervatillo sobre los montes de Bether[b].
  rationale: Se corrige 'despunte' a 'respire' para preservar la metáfora hebrea documentada por la POB, evitando sobreinterpretar la escena como amanecer. Se cambia 'vuelve' a 'gira' para acercarse al valor básico de סֹב ('turn'). Se mejora la naturalidad de 'cervatillo de los ciervos' a 'cervatillo', que mantiene la imagen de un animal joven sin rigidez innecesaria. Se reducen las notas a las que realmente preservan alternativas significativas del audit trail.
