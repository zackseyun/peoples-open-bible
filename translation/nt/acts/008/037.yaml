id: ACT.8.37
reference: Acts 8:37
source:
  edition: robinson-pierpont-2005-byzantine
  text: Εἶπεν δὲ ὁ Φίλιππος, Εἰ πιστεύεις ἐξ ὅλης τῆς καρδίας, ἔξεστιν. Ἀποκριθεὶς
    δὲ εἶπεν, Πιστεύω τὸν υἱὸν τοῦ θεοῦ εἶναι τὸν Ἰησοῦν Χριστόν.
  language: Greek
translation:
  text: And Philip[a] said, “If you believe with all your heart, you may.” And he
    answered and said, “I believe that Jesus is the Messiah, the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 3rd-century
      papyri and the 4th-century Sinaiticus and Vaticanus) and early Coptic translations.
      It is present in the Byzantine majority tradition and the Latin tradition, and
      was cited by early church fathers like Irenaeus and Cyprian in the late 2nd
      century. It is often described by scholars as an early baptismal liturgical
      formula that was later incorporated into the narrative text of Acts.
    reason: textual_critical
lexical_decisions:
- source_word: ἔξεστιν
  chosen: you may
  alternatives:
  - it is permitted
  - it is lawful
  - it is allowed
  lexicon: BDAG
  rationale: The impersonal verb ἔξεστιν denotes what is permitted or possible. In
    this context, 'you may' naturally conveys the permission to be baptized without
    sounding overly legalistic.
- source_word: καρδίας
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: BDAG
  rationale: The phrase 'with all your heart' (ἐξ ὅλης τῆς καρδίας) is a standard
    biblical idiom for complete sincerity and devotion, best preserved literally in
    English.
- source_word: Πιστεύω
  chosen: I believe
  alternatives:
  - I trust
  lexicon: BDAG
  rationale: In this confessional context, 'believe' accurately captures the intellectual
    and relational assent to the identity of Jesus Christ.
