lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  - Viajaron
  lexicon: HALOT
  rationale: En este formulario de itinerario, נסע expresa el movimiento de una etapa a otra. «Partieron» comunica la salida desde el campamento previo con naturalidad en español y sin añadir matices inexistentes.
- source_word: מֵעִיִּים
  english_pob_choice: from Iyyim
  chosen_spanish: de Iyim
  alternatives_spanish:
  - de Iyyim
  - de Iim
  lexicon: HALOT
  rationale: La preposición מֵ se rinde con «de». El topónimo se translitera; «Iyim» conserva la forma breve del nombre y funciona bien en español bíblico.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y acamparon en tienda
  - y se establecieron en campamento
  lexicon: HALOT
  rationale: חנה en fórmulas de recorrido significa acampar o plantar campamento. «Acamparon» es idiomático en español y conserva el valor del verbo sin sobreexplicarlo.
- source_word: בְּדִיבֹן גָּד
  english_pob_choice: at Dibon-gad
  chosen_spanish: en Dibon-gad
  alternatives_spanish:
  - en Dibon-gad
  - a Dibon-gad
  - en Dibon de Gad
  lexicon: HALOT
  rationale: En este tipo de nota de viaje, בְּ con un lugar suele expresarse naturalmente con «en». «Dibon-gad» se mantiene como topónimo estable, sin descomponerlo en una relación posesiva que el contexto no exige.
- source_word: עִיִּים
  english_pob_choice: Iyyim / Iyim / Iim
  chosen_spanish: Iyim
  alternatives_spanish:
  - Iyyim
  - Iim
  lexicon: HALOT
  rationale: La transliteración «Iyim» es breve, legible y compatible con el uso en español. Se conserva el carácter de nombre propio sin intentar traducirlo.
