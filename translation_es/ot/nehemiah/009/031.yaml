translation:
  language: es
  text: Pero en tus abundantes misericordias no acabaste con ellos[a], ni los abandonaste, porque eres un Dios clemente y compasivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero en tus grandes misericordias no los destruiste por completo ni los abandonaste»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרַחֲמֶיךָ הָרַבִּים
  english_pob_choice: But in your abundant mercies
  chosen_spanish: Pero en tus abundantes misericordias
  alternatives_spanish:
  - Mas en tus grandes misericordias
  - Pero conforme a tus muchas misericordias
  lexicon: HALOT
  rationale: רַחֲמִים expresa compasión/misericordia en plural intensivo; הָרַבִּים refuerza la abundancia. «Abundantes misericordias» conserva ese plural intensificado de manera natural en español. El waw inicial funciona aquí con valor adversativo por el contraste con el juicio merecido, de modo que «Pero» refleja bien la relación discursiva.
- source_word: לֹא עֲשִׂיתָם כָּלָה
  english_pob_choice: you did not make an end of them
  chosen_spanish: no les diste fin
  alternatives_spanish:
  - no los destruiste del todo
  - no los consumiste
  lexicon: HALOT
  rationale: La expresión idiomática עשה כלה significa llevar a un fin completo, acabar por completo o aniquilar. «No les diste fin» preserva el giro idiomático en español sin especificar más de lo que el hebreo exige. El complemento con «les» sigue el referente colectivo del contexto.
- source_word: וְלֹא עֲזַבְתָּם
  english_pob_choice: or abandon them
  chosen_spanish: ni los abandonaste
  alternatives_spanish:
  - ni los forsaste
  - y no los dejaste
  lexicon: HALOT
  rationale: עָזַב puede significar dejar, abandonar o forsake/forsake. «Abandonaste» comunica con claridad el sentido y mantiene el paralelismo con la cláusula anterior. El enlace «ni» reproduce bien la segunda negación coordinada del hebreo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como nombre/título común de Dios, sin exigir un matiz adicional de poder. «Dios» es la equivalencia más directa y adecuada al contexto.
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - benigno
  lexicon: HALOT
  rationale: חַנּוּן denota la cualidad de conceder favor con benevolencia. En español bíblico, «clemente» expresa bien esa disposición favorable y evita la ambigüedad de «gracioso». Mantiene además una distinción útil respecto de רַחוּם.
- source_word: וְרַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - piadoso
  lexicon: HALOT
  rationale: רַחוּם alude a la compasión, con trasfondo de ternura entrañable. «Compasivo» conserva esa cercanía semántica y distingue este término de חַנּוּן y de las «misericordias» del inicio del versículo.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  - tú mismo eres
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza la afirmación, pero en español la cópula simple «eres» basta en una cláusula predicativa breve y digna. El énfasis queda sostenido por el contexto y el cierre formulaico.
theological_decisions:
- issue: Fuerza de la conjunción inicial waw
  english_pob_reading: adversative ('But')
  chosen_spanish_reading: adversativa ('Pero')
  alternative_spanish_readings:
  - copulativa ('Y')
  - concesiva ('Aunque')
  rationale: En la oración de Nehemías, la cláusula contrasta la gravedad del pecado con la persistencia de la misericordia divina. «Pero» comunica mejor esa función discursiva que una simple coordinación, sin forzar el hebreo.
  doctrine_reference: 'Translation philosophy: optimal-equivalence'
- issue: Fórmula divina חַנּוּן וְרַחוּם
  english_pob_reading: gracious and compassionate
  chosen_spanish_reading: clemente y compasivo
  alternative_spanish_readings:
  - gracioso y compasivo
  - misericordioso y compasivo
  rationale: 'La pareja de atributos se mantiene diferenciada en español: חַנּוּן como benevolencia/favor otorgado («clemente») y רַחוּם como compasión entrañable («compasivo»). Esto evita colapsar ambos términos en un solo concepto y conserva el carácter formulaico de la descripción divina.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'Texto alineado con la revisión más reciente: no se registraron cambios posteriores; el consenso de control cruzado es alto y no hubo observaciones pendientes.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל conforme al estándar del proyecto.
  - Se usa «misericordias» en plural para conservar la intensificación del hebreo.
  - Se evita «SEÑOR» porque el hebreo aquí no contiene el Tetragrámaton.
  - La alternancia «clemente y compasivo» preserva la distinción léxica entre חַנּוּן y רַחוּם.
