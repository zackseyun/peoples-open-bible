  to: En el campo cosechan forraje[a], y rebuscan en la viña del malvado[b][c].
  rationale: Se mantiene el sentido del original y del POB inglés, pero se sustituye «espigan» por «rebuscan» para expresar mejor la acción de recoger remanentes en una viña. También se actualiza una alternativa de nota para mayor claridad en español contemporáneo.
