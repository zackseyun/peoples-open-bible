translation:
  language: es
  text: Ha apartado su mano del pobre[a], no ha tomado interés ni ganancia[b], ha cumplido mis juicios y ha andado en mis estatutos. No morirá por la iniquidad de su padre[c]; ciertamente vivirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha vuelto atrás su mano del pobre». El hebreo presenta una imagen idiomática de abstenerse de dañar o explotar al pobre.'
    reason: lexical_alternative
  - marker: b
    text: «Interés» y «ganancia» traducen dos términos hebreos relacionados para la ganancia obtenida de un préstamo; tradicionalmente, «usura e incremento».
    reason: lexical_alternative
  - marker: c
    text: 'O: «no morirá en la iniquidad de su padre». El sentido en el contexto es que no morirá a causa de la culpa de su padre.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעָנִי
  english_pob_choice: from the poor
  chosen_spanish: del pobre
  alternatives_spanish:
  - del afligido
  - del necesitado
  lexicon: HALOT
  rationale: El contexto de 'retener la mano' apunta a no explotar a una persona vulnerable en sentido social o económico. 'Del pobre' conserva esa referencia concreta y coincide con la lectura de la POB inglesa.
- source_word: הֵשִׁיב יָדוֹ
  english_pob_choice: has withheld his hand
  chosen_spanish: ha retenido su mano
  alternatives_spanish:
  - ha vuelto atrás su mano
  - ha apartado su mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'ha vuelto atrás su mano'. En español, 'ha retenido su mano' preserva la imagen y sugiere abstenerse de hacer daño o de aprovecharse del pobre.
- source_word: נֶשֶׁךְ
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  - rédito
  lexicon: HALOT
  rationale: '''Interés'' expresa con claridad el cobro en un préstamo sin restringirse al sentido moderno más estrecho de ''usura''. Mantiene la separación del término paralelo.'
- source_word: תַרְבִּית
  english_pob_choice: profit
  chosen_spanish: ganancia
  alternatives_spanish:
  - incremento
  - provecho
  lexicon: HALOT
  rationale: El término acompaña a נֶשֶׁךְ y denota una ganancia o aumento obtenido del préstamo. 'Ganancia' comunica bien el matiz económico y preserva la distinción con 'interés'.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis leyes
  - mis ordenanzas
  lexicon: HALOT
  rationale: '''Juicios'' mantiene el tono jurídico de מִשְׁפָּט y suena natural en español bíblico sin perder la fuerza legal del término.'
- source_word: בְּחֻקּוֹתַי הָלָךְ
  english_pob_choice: has walked in my statutes
  chosen_spanish: ha andado en mis estatutos
  alternatives_spanish:
  - ha vivido conforme a mis estatutos
  - ha seguido mis estatutos
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de caminar; 'ha andado en mis estatutos' la conserva de manera directa y reconocible, con registro bíblico claro en español.
- source_word: בַּעֲוֺן אָבִיו
  english_pob_choice: for his father's iniquity
  chosen_spanish: por la iniquidad de su padre
  alternatives_spanish:
  - en la iniquidad de su padre
  - a causa de la culpa de su padre
  lexicon: HALOT
  rationale: La preposición puede expresar causa o base de la muerte. 'Por la iniquidad de su padre' comunica la relación causal que el contexto de Ezequiel 18 enfatiza, sin borrar la tensión del hebreo.
- source_word: חָיֹה יִחְיֶה
  english_pob_choice: he will surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá sin duda
  - vivirá plenamente
  lexicon: HALOT
  rationale: La construcción intensiva se reproduce naturalmente con 'ciertamente vivirá', que transmite la seguridad enfática del hebreo sin sonar forzado.
theological_decisions:
- issue: Responsabilidad individual frente a castigo heredado
  english_pob_reading: The son is not punished with death for the father's iniquity when he acts righteously.
  chosen_spanish_reading: No morirá por la iniquidad de su padre; el énfasis recae en que será juzgado por su propia conducta.
  alternative_spanish_readings:
  - No morirá en la iniquidad de su padre.
  - No morirá a causa de la culpa de su padre.
  rationale: Ezequiel 18 subraya la responsabilidad personal. 'Por la iniquidad de su padre' hace explícita la relación causal sin suavizar el peso del hebreo ni resolver más de lo que el pasaje permite.
  doctrine_reference: Ezequiel 18:20; principio de responsabilidad personal en el capítulo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios. Se conservó la lectura óptima ya alineada con el texto hebreo y con el audit trail inglés, manteniendo las decisiones léxicas y la nota teológica sobre responsabilidad individual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada del proyecto solo cuando aparece el Tetragrámaton; este verso no lo contiene.
  - '''Juicios'' y ''estatutos'' preservan el paralelismo jurídico-covenantal del hebreo.'
  - Se evita 'siervo' para עָנִי; el contexto exige la referencia social a 'pobre'.
  - La intensificación final se expresa con 'ciertamente' para conservar el valor enfático del infinitivo absoluto + imperfecto.
