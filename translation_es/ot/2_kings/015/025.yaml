translation:
  language: es
  text: Entonces Pecaj hijo de Remalías[a], su oficial, conspiró contra él y lo derribó en Samaria, en la ciudadela de la casa del rey[b], con Argob y con Arie[c], y con él había cincuenta hombres de entre los gileaditas[d]. Así lo mató y reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su capitán». El hebreo שָׁלִישׁ designa un oficial militar de alto rango, pero el cargo exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «en el palacio de la casa del rey». אַרְמוֹן puede denotar un palacio o una residencia real fortificada.
    reason: lexical_alternative
  - marker: c
    text: אַרְיֵה puede entenderse como el nombre propio «Arie»; léxicamente también significa «león», pero en este contexto se lee mejor como nombre junto a Argob.
    reason: lexical_alternative
  - marker: d
    text: O «y con él había cincuenta hombres de los gileaditas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  english_pob_choice: conspired against him
  chosen_spanish: conspiró contra él
  alternatives_spanish:
  - trazó una conspiración contra él
  - maquinó contra él
  lexicon: HALOT
  rationale: El verbo קשר en contexto real/monárquico expresa conspiración o traición política. «Conspiró contra él» conserva el valor de traición y suena natural en español.
- source_word: שָׁלִישׁוֹ
  english_pob_choice: his officer
  chosen_spanish: su oficial
  alternatives_spanish:
  - su capitán
  - su ayudante de campo
  lexicon: HALOT
  rationale: שָׁלִישׁ designa un funcionario militar de alto rango, pero el cargo exacto es incierto. «Su oficial» mantiene la relación jerárquica sin precisar más de lo que el hebreo garantiza.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo derribó
  - lo golpeó
  lexicon: HALOT
  rationale: El hebreo נכה puede significar golpear, herir o derribar. Aquí se distingue del verbo posterior «lo mató», por eso se evita repetir una traducción que ya implicara la muerte.
- source_word: בְשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: Es un topónimo directo y no requiere adaptación especial.
- source_word: בְּאַרְמוֹן בֵּית מֶלֶךְ
  english_pob_choice: in the citadel of the king’s house
  chosen_spanish: en la ciudadela de la casa del rey
  alternatives_spanish:
  - en el palacio de la casa del rey
  - en la fortaleza de la casa real
  lexicon: HALOT
  rationale: אַרְמוֹן puede ser palacio, fortaleza o residencia fortificada. «Ciudadela» comunica bien la idea de recinto fortificado y evita la redundancia que podría producir «palacio de la casa del rey».
- source_word: אֶת אַרְגֹּב וְאֶת הָאַרְיֵה
  english_pob_choice: with Argob and Arieh
  chosen_spanish: con Argob y con Arie
  alternatives_spanish:
  - con Argob y con Arieh
  - con Argob y el león
  lexicon: HALOT
  rationale: En este contexto narrativo, ambos términos se leen mejor como nombres propios. Se mantiene «Arie» como forma hispanizada breve y se conserva la repetición de «con» para reflejar el hebreo.
- source_word: וְעִמּוֹ חֲמִשִּׁים אִישׁ מִבְּנֵי גִלְעָדִים
  english_pob_choice: and with him were fifty men of the Gileadites
  chosen_spanish: y con él había cincuenta hombres de los gileaditas
  alternatives_spanish:
  - y con él estaban cincuenta hombres de los gileaditas
  - y había con él cincuenta hombres de entre los gileaditas
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y puede leerse como compañía/acompañantes. «Había» reproduce con naturalidad el valor circunstancial, y «de los gileaditas» conserva la pertenencia partitiva sin cargarla de más.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: So he put him to death
  chosen_spanish: Así lo mató
  alternatives_spanish:
  - Entonces lo hizo morir
  - Así lo puso a muerte
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. «Lo mató» es una equivalencia natural en español; el contexto ya ha distinguido previamente este acto del simple herir.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: and reigned in his place
  chosen_spanish: y reinó en su lugar
  alternatives_spanish:
  - y gobernó en su lugar
  - y fue rey en su lugar
  lexicon: HALOT
  rationale: La fórmula de sucesión en Reyes se vierte mejor con «reinó en su lugar», que es fiel e idiomática en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pasaje revisado del POB en inglés, pero ajusta la sintaxis al español para evitar calcos pesados. Se mantiene la distinción entre «herir» y «matar» del hebreo, se conserva la incertidumbre del cargo שָׁלִישׁ, y se refleja la lectura de Arie como nombre propio con nota alternativa. También se preserva la ambigüedad partitiva de מִבְּנֵי גִלְעָדִים.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí, pues no aparece el nombre divino.
  - Se mantiene «reinó en su lugar» como fórmula sucesoria bíblica natural en español.
  - Se usa «oficial» para שָׁלִישׁ por su neutralidad jerárquica.
  - Se conserva la forma nominal «gileaditas» para reflejar el gentilicio plural del hebreo.
  - 'La puntuación separa las acciones para hacer visible la secuencia: conspiró, hirió, mató, reinó.'
