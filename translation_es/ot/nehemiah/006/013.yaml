translation:
  language: es
  text: 'Fue pagado[a] con este propósito: para que yo tuviera miedo, actuara de esa manera y pecara, de modo que ellos tuvieran base para un mal informe[b], a fin de poder reprocharme.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue contratado» o «fue sobornado». El participio hebreo שָׂכוּר significa de manera más directa «pagado» o «contratado»; «sobornado» hace más explícita la intención corrupta.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «y sería para ellos para un mal nombre». La expresión probablemente significa que el pecado de Nehemías les daría a sus enemigos base o material para difamarlo o atribuirle mala reputación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: for this purpose / so that / in order that
  chosen_spanish: con este propósito / para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  - para
  lexicon: HALOT
  rationale: El hebreo repite לְמַעַן como marca de finalidad. En español, "con este propósito" conserva el valor discursivo inicial, y "para que" mantiene la cadena de propósito/resultados sin sonar forzado.
- source_word: שָׂכוּר
  english_pob_choice: hired
  chosen_spanish: fue alquilado
  alternatives_spanish:
  - fue pagado
  - fue sobornado
  - fue contratado
  lexicon: HALOT
  rationale: El participio pasivo expresa que alguien recibió pago para esta acción. "Fue alquilado" sigue el sentido básico de "hired/paid" y deja que el contexto muestre la intención corrupta sin imponer "sobornado" en el texto principal.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: 'Se mantiene el pronombre explícito para conservar el énfasis: se identifica a esa persona como la que fue contratada/alquilada para el engaño.'
- source_word: אִירָא
  english_pob_choice: I should become afraid
  chosen_spanish: yo tuviera miedo
  alternatives_spanish:
  - yo temiera
  - yo llegara a tener miedo
  - yo me asustara
  lexicon: HALOT
  rationale: 'La forma expresa finalidad: el efecto buscado sobre Nehemías. "Tuviera miedo" es natural en español y conserva la intención, sin endurecer el matiz modal.'
- source_word: וְאֶעֱשֶׂה כֵּן
  english_pob_choice: and act that way
  chosen_spanish: y hiciera así
  alternatives_spanish:
  - y actuara de esa manera
  - y hiciera lo mismo
  - y procediera así
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de forma breve y natural. "Hiciera así" mantiene la referencia a la conducta indebida implícita en el contexto.
- source_word: וְחָטָאתִי
  english_pob_choice: and sin
  chosen_spanish: y pecara
  alternatives_spanish:
  - y pecase
  - y así pecara
  - y cometiera pecado
  lexicon: HALOT
  rationale: Se conserva el verbo moral directo. El subjuntivo en la secuencia final reproduce el valor de consecuencia intencional en español.
- source_word: וְהָיָה לָהֶם לְשֵׁם רָע
  english_pob_choice: so that they would have grounds for an evil report
  chosen_spanish: y para que ellos tuvieran motivo para un mal nombre
  alternatives_spanish:
  - y para que ellos tuvieran un mal nombre
  - y para que tuvieran material para un mal informe
  - y les quedara un mal nombre
  lexicon: HALOT
  rationale: La frase hebrea es idiomática. "Motivo para un mal nombre" conserva el vínculo literal con "nombre" y, a la vez, comunica la función de dar pie a difamación o mala reputación.
- source_word: שֵׁם רָע
  english_pob_choice: an evil report / bad name
  chosen_spanish: un mal nombre
  alternatives_spanish:
  - un mal informe
  - mala reputación
  - un nombre malo
  lexicon: HALOT
  rationale: '"Nombre" reproduce el sustantivo שֵׁם, mientras que "mal" expresa רָע. En español, "mal nombre" es una equivalencia clara y suficientemente cercana a la imagen hebrea.'
- source_word: יְחָרְפוּנִי
  english_pob_choice: they might reproach me
  chosen_spanish: me reprocharan
  alternatives_spanish:
  - me injuriaran
  - me escarnecieran
  - me vituperaran
  lexicon: HALOT
  rationale: El verbo חרף cubre reproche, burla y afrenta. "Reprocharan" ofrece un registro fuerte y comprensible, cercano al valor de la POB inglesa sin sobreactuar el tono.
theological_decisions:
- issue: Finalidad moral del engaño y del pecado
  english_pob_reading: The hired action is designed to induce fear, sinful behavior, and public shame.
  chosen_spanish_reading: La contratación tenía por fin inducir miedo, llevar al pecado y producir deshonra pública.
  alternative_spanish_readings:
  - El pago tenía por fin causar miedo y caída moral.
  - Fue contratado para asustarme y hacerme pecar.
  rationale: El versículo encadena propósito, miedo, pecado y vergüenza pública. La redacción española conserva esa secuencia sin suavizar la intención moralmente corrupta del acto.
  doctrine_reference: Nehemías 6:13; ética bíblica sobre engaño y pecado
- issue: Valor idiomático de "mal nombre"
  english_pob_reading: Literally, 'and it would be to them for an evil name.' The phrase likely means slander or bad reputation.
  chosen_spanish_reading: '"Mal nombre" se entiende como base para difamación o mala reputación.'
  alternative_spanish_readings:
  - mala reputación
  - mal informe
  - nombre infame
  rationale: No se debe borrar la imagen nominal del hebreo. Al mismo tiempo, en español la frase necesita quedar inteligible como material para desprestigio, no como mera etiqueta abstracta.
  doctrine_reference: Nehemías 6:13; semántica de שֵׁם רָע
translation_notes:
  revision_awareness: Se sigue de cerca el texto hebreo y el audit trail inglés. La principal decisión fue conservar la estructura de finalidad repetida de לְמַעַן, mantener la imagen de "nombre" en שֵׁם רָע y traducir חרף como "reprochar" para preservar el tono de afrenta pública sin exagerar el registro.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según la norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un español contemporáneo y eclesialmente legible, sin depender de fórmulas tradicionales no requeridas por el hebreo.
  - '"Fue alquilado" se mantiene como opción principal por fidelidad léxica; la nota ofrece «sobornado» como alternativa contextual, no como sustitución automática.'
