base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/001/013.yaml
  text: And the word of Yahweh came to me a second time[a], saying, “What do you see?” And I said, “I see a boiling pot[b], and its face is from the north.”
  footnotes:
  - marker: a
    text: Or “a seething pot”; the Hebrew participle can suggest a pot being blown upon or fanned into a boil.
    reason: lexical_alternative
  - marker: b
    text: Literally “its face is from the face of the north.” The expression likely refers to the pot’s exposed side or opening being oriented with reference to the north.
    reason: alternative_reading
