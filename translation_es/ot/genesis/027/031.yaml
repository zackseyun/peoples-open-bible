translation:
  language: es
  text: 'Él también preparó comida sabrosa[a] y la llevó a su padre, y le dijo a su padre: «Levántese mi padre y coma de la caza de su hijo, para que su alma[b] me bendiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manjares sabrosos». El hebreo se refiere a comida preparada con especial sabor y esmero en esta escena.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su alma me bendiga». Es un giro idiomático que puede significar «que usted me bendiga», pero el texto principal conserva una formulación cercana al hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטְעַמִּים
  english_pob_choice: tasty food
  chosen_spanish: comida sabrosa
  alternatives_spanish:
  - comida sazonada
  - manjares
  - viandas sabrosas
  lexicon: HALOT
  rationale: El término apunta a comida especialmente preparada y sabrosa en este episodio. «Comida sabrosa» comunica bien el sentido en español actual sin forzar un registro arcaico ni perder el matiz de alimento preparado con esmero.
- source_word: גַּם הוּא
  english_pob_choice: He too
  chosen_spanish: Él también
  alternatives_spanish:
  - Él asimismo
  - También él
  lexicon: HALOT
  rationale: La construcción añade paralelismo con la acción previa de Jacob. «Él también» conserva esa fuerza aditiva de manera natural en español.
- source_word: וַיָּבֵא לְאָבִיו
  english_pob_choice: brought it to his father
  chosen_spanish: se la llevó a su padre
  alternatives_spanish:
  - la llevó a su padre
  - la trajo a su padre
  lexicon: HALOT
  rationale: El objeto está implícito en el contexto. En español, «se la llevó» mantiene la secuencia narrativa y evita una repetición pesada, sin perder la referencia al plato preparado.
- source_word: מִצֵּיד בְּנוֹ
  english_pob_choice: of his son's game
  chosen_spanish: de la caza de su hijo
  alternatives_spanish:
  - de la presa de su hijo
  - de lo cazado por su hijo
  lexicon: HALOT
  rationale: צַיִד aquí denota caza o presa cazada, no simple comida. «De la caza de su hijo» conserva el campo semántico de la cacería y la filiación expresada por el hebreo.
- source_word: יָקֻם
  english_pob_choice: Let my father rise
  chosen_spanish: Levántese mi padre
  alternatives_spanish:
  - Que se levante mi padre
  - Levantese mi padre
  lexicon: HALOT
  rationale: El yusivo expresa una petición respetuosa. «Levántese mi padre» mantiene el tono formal y adecuado en boca de Esaú ante su padre.
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: La preposición introduce propósito o resultado deseado. «Para que» es la opción más clara y natural en español.
- source_word: תְּבָרֲכַנִּי
  english_pob_choice: may bless me
  chosen_spanish: lo bendiga
  alternatives_spanish:
  - me bendiga
  - pronuncie una bendición sobre mí
  lexicon: HALOT
  rationale: El verbo es de bendecir, con objeto de primera persona. En español, tras el giro idiomático de «su alma», la forma verbal se expresa con «lo bendiga» para mantener la referencia a la persona de manera natural dentro de la frase.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: su alma
  alternatives_spanish:
  - tu alma
  - usted mismo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu alma». En este pasaje, el español requiere concordancia de cortesía con el discurso directo («mi padre»), y «su alma» preserva el valor solemne del hebreo sin volver incómoda la sintaxis; además, mantiene la posibilidad de leerlo como una referencia personal intensiva.
theological_decisions:
- issue: Conservar el idiomático hebreo «tu alma» en la frase de bendición
  english_pob_reading: The main text preserves the Hebrew expression 'your soul may bless me,' while a footnote notes the idiom can mean 'you may bless me.'
  chosen_spanish_reading: El texto principal traduce de forma natural «su alma lo bendiga», y la nota aclara que el hebreo literalmente dice «tu alma» y puede funcionar como un giro que equivale a «tú me bendigas».
  alternative_spanish_readings:
  - «tu alma me bendiga»
  - «usted me bendiga»
  - «tu ser me bendiga»
  rationale: El hebreo נַפְשֶׁךָ es explícito, pero en español una reproducción literal puede sonar extraña o ambigua. Mantener «su alma» en el texto principal conserva solemnidad y se ajusta al contexto de respeto filial; la nota preserva la tensión idiomática documentada por la POB inglesa.
  doctrine_reference: Hebreo bíblico idiomático; preservación de la formulación sin borrar el giro personal
- issue: Destino de la bendición expresado por medio de un sustantivo con lectura personal
  english_pob_reading: '''so that your soul may bless me'''
  chosen_spanish_reading: «para que su alma lo bendiga»
  alternative_spanish_readings:
  - «para que usted me bendiga»
  - «para que él me bendiga»
  rationale: El verbo de bendecir aquí recae sobre la persona del padre en una fórmula ritual y relacional. En español, el pronombre átono «lo» evita la repetición de «me» en una frase ya cargada y deja intacto el sentido de la solicitud de bendición paterna.
  doctrine_reference: Narrativa patriarcal de la bendición; no hay cambio doctrinal, solo ajuste sintáctico
translation_notes:
  revision_awareness: La versión inglesa revisada cambió una construcción menos natural por «eat of his son's game» para conservar el sentido con mayor fluidez. En español, esa misma decisión se refleja con «coma de la caza de su hijo», una solución que mantiene el matiz de procedencia y resulta idiomática. También se tuvo en cuenta que la frase hebrea final conserva un giro personal ('your soul may bless me'); el español lo preserva con una formulación comprensible y una nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparecen en el texto.
  - «Caza» se usa en el sentido de presa cazada, no como alimento genérico.
  - El registro de respeto en el discurso directo se conserva con «mi padre» y el imperativo de cortesía «Levántese».
  - La nota sobre «su alma» preserva la tensión idiomática del hebreo sin imponer una lectura dogmática.
