translation:
  language: es
  text: '¿No levantarán todos estos una burla contra él[a], con mofa y enigmas acerca de él, y dirán: «¡Ay del que amontona lo que no es suyo —¿hasta cuándo?— y se carga de bienes pignorados!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se carga con arcilla espesa». El término hebreo es raro y puede implicar un juego de palabras entre bienes tomados en prenda y una masa pesada que carga al que acumula.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָשָׁל
  english_pob_choice: taunt
  chosen_spanish: taunt
  alternatives_spanish:
  - reproche
  - sarcasmo
  - canto de burla
  lexicon: HALOT
  rationale: En el contexto profético de juicio, el valor discursivo es de una expresión despectiva y condenatoria. Mantengo el préstamo inglés 'taunt' porque en español puede funcionar como tecnicismo transparente dentro de este proyecto y evita perder la fuerza de burla denunciatoria que el texto subraya.
- source_word: יִשָּׂאוּ
  english_pob_choice: take up
  chosen_spanish: levantarán
  alternatives_spanish:
  - dirán
  - pronunciarán
  - entonarán
  lexicon: HALOT
  rationale: La construcción con מָשָׁל sugiere iniciar o alzar una pieza de habla formal. 'Levantarán' conserva la imagen idiomática sin alejarse del valor verbal del hebreo.
- source_word: מְלִיצָה
  english_pob_choice: mockery
  chosen_spanish: burla
  alternatives_spanish:
  - escarnio
  - mofa
  - sátira
  lexicon: HALOT
  rationale: El término añade tono despectivo a la taunt. 'Burla' es natural en español y preserva el matiz de menosprecio.
- source_word: חִידוֹת
  english_pob_choice: riddles
  chosen_spanish: enigmas
  alternatives_spanish:
  - adivinanzas
  - acertijos
  - dichos enigmáticos
  lexicon: HALOT
  rationale: '''Enigmas'' comunica el carácter críptico y punzante del plural hebreo sin sonar infantil o folclórico como ''acertijos''.'
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay de aquel!
  - ¡Ay,
  lexicon: HALOT
  rationale: La interjección profética funciona bien como '¡Ay!'; aquí la incorporo en la fórmula '¡Ay del...' para reflejar el juicio oracular con naturalidad en español.
- source_word: הַמַּרְבֶּה לֹּא לוֹ
  english_pob_choice: him who heaps up what is not his
  chosen_spanish: del que amontona lo que no es suyo
  alternatives_spanish:
  - del que acumula lo que no es suyo
  - del que aumenta lo que no le pertenece
  - del que amasa lo ajeno
  lexicon: HALOT
  rationale: '''Amontona'' expresa acumulación insistente y concreta, y ''lo que no es suyo'' conserva la denuncia moral de apropiación injusta sin añadir explicaciones ajenas al hebreo.'
- source_word: עַד מָתַי
  english_pob_choice: how long?
  chosen_spanish: hasta cuándo
  alternatives_spanish:
  - ¿hasta cuándo?
  - ¿hasta cuándo será?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: 'Es la exclamación idiomática de impaciencia o protesta. En español queda mejor como inciso: ''—hasta cuándo—'', reproduciendo el golpe retórico.'
- source_word: וּמַכְבִּיד עָלָיו
  english_pob_choice: loads himself
  chosen_spanish: se carga de
  alternatives_spanish:
  - se agobia con
  - se llena de
  - se sobrecarga con
  lexicon: HALOT
  rationale: El hiphil sugiere poner una carga pesada sobre sí. 'Se carga de' mantiene la imagen física y la conexión con el peso de la acumulación.
- source_word: עַבְטִיט
  english_pob_choice: pledged goods
  chosen_spanish: bienes pignorados
  alternatives_spanish:
  - prendas
  - bienes empeñados
  - cosas dadas en prenda
  lexicon: HALOT
  rationale: 'La referencia económica es la más probable en contexto: bienes tomados o retenidos como garantía. ''Bienes pignorados'' conserva precisión técnica y evita eliminar la tensión lexical con la lectura tradicional alternativa.'
theological_decisions:
- issue: Sentido de la maldición profética en הוֹי
  english_pob_reading: Woe to him...
  chosen_spanish_reading: ¡Ay del que...!
  alternative_spanish_readings:
  - ¡Ay de quien...!
  - ¡Ay para el que...!
  rationale: La fórmula profética expresa denuncia judicial, no mera tristeza. '¡Ay del que...!' reproduce bien el tono de oráculo de juicio que el hebreo activa aquí.
  doctrine_reference: Profetas menores; oráculo de juicio
- issue: Lectura de עַבְטִיט
  english_pob_reading: 'economic image: ''pledged goods'''
  chosen_spanish_reading: bienes pignorados
  alternative_spanish_readings:
  - prendas
  - bienes empeñados
  - arcilla espesa
  rationale: Sigo la lectura económico-legal documentada en el audit trail porque encaja con la denuncia de acumulación injusta. La lectura alternativa tradicional 'arcilla espesa' se conserva implícitamente en el trasfondo del aparato crítico, pero no domina el texto principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto principal junto al término al que remite la alternativa lexical.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - '''Mesías/Cristo'' no interviene en este versículo.'
  - Se mantuvo el contraste entre burla/enigmas y la denuncia de apropiación injusta sin suavizar el juicio profético.
  - Se prefirió una formulación económica para עַבְטִיט conforme al audit trail en inglés, con la lectura tradicional alternativa preservada en nota.
