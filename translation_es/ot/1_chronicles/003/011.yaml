  text: Joram[a][b], su hijo; Ocozías, su hijo; Joás[c], su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías, «hijo» puede designar también a un descendiente posterior; aquí se mantiene «hijo» porque el versículo presenta una fórmula breve de sucesión real.
