id: 1CO.3.1
reference: '1 Corinthians 3:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Κἀγώ, ἀδελφοί, οὐκ ἠδυνήθην ⸂λαλῆσαι ὑμῖν⸃ ὡς πνευματικοῖς ἀλλ’ ὡς ⸀σαρκίνοις, ὡς νηπίοις ἐν Χριστῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/003/001.yaml
  text: And I[a], brothers, was not able to speak to you as spiritual people, but as fleshly people[b], as infants in Messiah.
  footnotes:
  - marker: a
    text: 'Or ''brothers and sisters''; the Greek says ''brothers.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in Christ.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 형제들이여, 나도 여러분에게 영적인 자들에게 하듯 말할 수 없었고, 다만 육적인 자들에게 하듯, 곧 메시아 안의 어린아이들에게 하듯 말하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνευματικοῖς … σαρκίνοις
  english_pob_choice: spiritual … fleshly
  chosen_korean: 영적인 자들 … 육적인 자들
  alternatives_korean:
  - 성령에 속한 자들 … 육신에 속한 자들
  lexicon: BDAG
  rationale: '2:14–15에서 도입한 πνευματικός/ψυχικός 짝과 호응하는 세 번째 항 σαρκικός/σάρκινος. 「영적/육적」을 일관 적용.'
- source_word: νηπίοις ἐν Χριστῷ
  english_pob_choice: infants in Messiah
  chosen_korean: 메시아 안의 어린아이들
  alternatives_korean:
  - 메시아 안에서 갓난아기들
  lexicon: BDAG
  rationale: νήπιος는 발달적·영적 미성숙을 가리키는 핵심 비유.
theological_decisions:
- issue: '3:1–3 고린도 회중에 대한 「육적」 책망의 강도 보존'
  chosen_reading: 'σαρκικός를 「육적」으로 일관되게 옮겨 2:14–15의 어휘 체계 안에서 책망의 무게를 살린다'
  alternative_readings:
  - 「세속적」 또는 「육신적」으로 완화하여 옮기는 전통적 선택
  rationale: '바울은 2:6–16에서 영을 받은 자들로 그들을 칭찬한 직후, 3:1–3에서 그들을 「영적」이 아닌 「육적」으로 부르며 분파주의를 책망한다. 이는 의도적으로 충격적인 어조다. 「육적」을 약화시키지 않고 어휘 체계의 무게를 살린다.'
  doctrine_reference: 'DOCTRINE.md §5: 원어 일차성; 2:14 결정 참조'
