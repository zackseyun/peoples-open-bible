revisions:
- from: El terror de un rey es como el rugido de un leoncillo[a]; el que lo provoca a ira[b] peca contra su propia vida[c].
  to: El terror de un rey es como el gruñido de un león joven[a]; quien provoca su ira[b] peca contra su propia vida[c].
