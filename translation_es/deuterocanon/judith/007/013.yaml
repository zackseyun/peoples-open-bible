translation:
  language: es
  text: porque de allí todos los que habitan en Baithylúa[a] sacan agua, y la sed los destruirá, y entregarán su ciudad; y nosotros y nuestro pueblo subiremos a las cimas cercanas de las montañas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre se translitera aquí como Baithylúa para seguir más de cerca la forma griega Βαιτυλουά; en otras traducciones tradicionales aparece como «Bethulia».
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: BDAG
  rationale: Introduce la causa de la afirmación anterior; «porque» expresa de forma natural y directa el valor explicativo de διότι en español.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  lexicon: BDAG
  rationale: Mantiene la referencia espacial al lugar previamente mencionado y conserva el matiz de origen o procedencia.
- source_word: ὑδρεύονται
  english_pob_choice: draw water
  chosen_spanish: sacan agua
  alternatives_spanish:
  - toman agua
  - van por agua
  lexicon: BDAG
  rationale: El verbo denota obtener agua; «sacan agua» es claro en español y conserva la acción concreta sin añadir más de lo que el griego dice.
- source_word: πάντες οἱ κατοικοῦντες
  english_pob_choice: all who live
  chosen_spanish: todos los que habitan
  alternatives_spanish:
  - todos los habitantes
  - todos los que residen
  lexicon: BDAG
  rationale: Reproduce la totalidad del grupo y la fuerza participial de «los que habitan» sin perder naturalidad en español.
- source_word: Βαιτυλουά
  english_pob_choice: Baithyloua
  chosen_spanish: Baityluá
  alternatives_spanish:
  - Baithyloua
  - Bethulia
  lexicon: transliteration
  rationale: Se conserva una transliteración cercana al griego Βαιτυλουά, siguiendo la política del proyecto de no reemplazar por la forma tradicional anglicizada o castellana cuando la forma griega es la base auditable.
- source_word: ἀνελεῖ
  english_pob_choice: will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - matará
  - acabará con
  lexicon: BDAG
  rationale: Con «la sed» como sujeto, «destruirá» comunica bien el efecto letal o ruinoso que el griego expresa sin forzar un sujeto personal.
- source_word: ἡ δίψα
  english_pob_choice: thirst
  chosen_spanish: la sed
  alternatives_spanish:
  - la sed misma
  lexicon: BDAG
  rationale: Se mantiene la personificación del sustantivo como agente de destrucción, preservando el sujeto griego de manera natural en español.
- source_word: ἐκδώσουσι
  english_pob_choice: will surrender
  chosen_spanish: entregarán
  alternatives_spanish:
  - se rendirán
  - cederán
  lexicon: BDAG
  rationale: En contexto de capitulación con objeto directo «su ciudad», «entregarán» refleja la rendición sin añadir una formulación más interpretativa que «se rendirán».
- source_word: τὴν πόλιν αὐτῶν
  english_pob_choice: their city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - la ciudad de ellos
  - su población
  lexicon: BDAG
  rationale: Se conserva el possessivo explícito y el sentido normal de πόλις como «ciudad».
- source_word: ἀναβησόμεθα
  english_pob_choice: will go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - iremos hacia arriba
  - ascenderemos
  lexicon: BDAG
  rationale: «Subiremos» reproduce el movimiento ascendente del verbo con un español natural y sencillo.
- source_word: ἐπὶ τὰς πλησίον κορυφὰς τῶν ὀρέων
  english_pob_choice: to the nearby summits of the mountains
  chosen_spanish: a las cimas cercanas de las montañas
  alternatives_spanish:
  - a las cimas próximas de los montes
  - a los picos cercanos de las montañas
  lexicon: BDAG
  rationale: «Cimas» corresponde bien a κορυφαί; «cercanas» traduce πλησίον; «de las montañas» conserva la relación genitiva sin sobreadaptar el paisaje.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan estrechamente; no se detectaron revisiones sustantivas en el pasaje. Se mantuvo la secuencia causal y la imaginería de la sed como agente personificado, sin suavizar la amenaza implícita.
  spanish_consistency_notes:
  - 'Se preserva la progresión lógica: causa («porque»), efecto letal de la sed, rendición de la ciudad y ascenso a las cimas.'
  - La transliteración de Baityluá se mantiene consistente con la política del proyecto de reflejar la forma griega cuando es auditable.
  - «Sed» y «destruirá» conservan el tono personificado y severo del griego sin recurrir a un giro más interpretativo.
