translation:
  language: es
  text: Sus ojos sobresalen por la gordura[a]; las imaginaciones de su corazón desbordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus ojos se salen por la gordura; los pensamientos o designios del corazón sobrepasan toda medida»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָא
  english_pob_choice: bulge out
  chosen_spanish: se les saltan
  alternatives_spanish:
  - sobresalen
  - protuyen
  - se les salen
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'salir', pero con 'ojos' y 'por la gordura' expresa una imagen corporal de ojos que sobresalen o se salen. 'Se les saltan' conserva esa fuerza idiomática en español natural sin diluir el cuadro.
- source_word: מֵחֵלֶב
  english_pob_choice: from fatness
  chosen_spanish: por la gordura
  alternatives_spanish:
  - de la gordura
  - por la grasa
  - por la abundancia
  lexicon: HALOT
  rationale: חֵלֶב es 'grasa/fat'. En este contexto poético no sólo apunta a grasa física, sino al estado de prosperidad o corpulencia. 'Por la gordura' mantiene la imagen concreta y la relación causal sin sustituirla por una abstracción excesiva.
- source_word: עֵינֵימוֹ
  english_pob_choice: their eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  - sus miradas
  lexicon: HALOT
  rationale: El sufijo posesivo ya queda implícito por el dativo/partitivo reflexivo español ('se les'). 'Los ojos' conserva la referencia directa y suena más natural en la construcción idiomática.
- source_word: עָבְרוּ
  english_pob_choice: overflow
  chosen_spanish: desbordan
  alternatives_spanish:
  - rebosan
  - pasan más allá
  - sobrepasan
  lexicon: HALOT
  rationale: El verbo puede significar 'pasar más allá'. En paralelo poético, 'desbordan' comunica excedencia y movimiento fuera de límites, como en la imagen inglesa de overflow.
- source_word: מַשְׂכִּיּוֹת
  english_pob_choice: imaginations
  chosen_spanish: las imaginaciones
  alternatives_spanish:
  - los pensamientos
  - las fantasías
  - los designios
  lexicon: HALOT
  rationale: El sustantivo admite imágenes, figuras o concepciones internas. 'Imaginaciones' conserva la amplitud del término y el vínculo con la vida interior, sin reducirlo a una sola categoría de pensamientos o planes.
- source_word: לֵבָב
  english_pob_choice: their heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de su mente
  - de su interior
  - de su corazón
  lexicon: HALOT
  rationale: En español, 'corazón' refleja bien el centro interior de pensamiento y voluntad que suele expresar לֵבָב. La construcción 'de su corazón' sigue el sentido colectivo del hebreo y mantiene el paralelismo con 'las imaginaciones'.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y la decisión auditada en inglés para conservar la imagen corporal y el paralelismo poético. No se detectaron revisiones textuales relevantes respecto del pase más reciente; el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos miembros con una puntuación fuerte de punto y coma.
  - '''Corazón'' se usa en sentido bíblico de centro interior, no sólo emocional.'
  - La nota mantiene la alternativa léxica documentada en el audit trail inglés para 'imaginations'.
