translation:
  language: es
  text: 'Entonces Joab dijo al cusita[a]: «Ve, informa al rey lo que has visto». Y el cusita se inclinó ante Joab y corrió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cushi» si se toma como nombre propio; tradicionalmente, «el etíope».
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - Cushi
  - el etíope
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de reflejar el designador étnico/geográfico como gentilicio transparente. «Cusita» conserva el vínculo con כּוּשִׁי sin imponer como nombre propio una lectura que el texto no obliga ni sustituirlo por una equivalencia tradicional menos precisa.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo hebreo de הלך se rinde de forma directa y natural en español con «ve», que conserva el impulso narrativo y la orden inmediata.
- source_word: הַגֵּד
  english_pob_choice: tell
  chosen_spanish: anuncia
  alternatives_spanish:
  - dile
  - cuenta
  - informa
  lexicon: HALOT
  rationale: El hiphil de נגד implica hacer saber o comunicar. «Anuncia» mantiene el valor de comunicar formalmente a un destinatario importante; «dile» sería más llano, pero menos acorde con la función de reportar al rey.
- source_word: אֲשֶׁר רָאִיתָה
  english_pob_choice: what you have seen
  chosen_spanish: lo que has visto
  alternatives_spanish:
  - lo que viste
  - aquello que has visto
  lexicon: HALOT
  rationale: La estructura relativa se vierte de modo idiomático como «lo que has visto». El presente perfecto sugiere la relevancia inmediata del testimonio que debe transmitirse, como en la lectura inglesa auditada.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - rindió homenaje
  lexicon: HALOT
  rationale: El verbo indica inclinarse o postrarse. «Se inclinó» preserva el gesto físico sin cargarlo necesariamente con un matiz cultual, coherente con la relación de deferencia hacia Joab.
- source_word: וַיָּרֹץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - salió corriendo
  - se fue corriendo
  lexicon: HALOT
  rationale: Rוץ se expresa con el verbo simple «corrió», que conserva la rapidez narrativa y la correspondencia directa con la elección inglesa.
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto de la revisión más reciente (sin cambios necesarios) y conserva la misma ambigüedad lexical principal sobre כּוּשִׁי que el aparato inglés, trasladándola a una nota equivalente en español.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como norma general cuando aparezca el nombre divino; en este versículo no ocurre.
  - Uso «cusita» para כּוּשִׁי de manera coherente con el gentilicio transparente decidido en inglés.
  - Conservo un registro sobrio y narrativo, sin añadir explicaciones que el hebreo no exige.
  - La puntuación y las comillas siguen la norma tipográfica española.
