translation:
  language: es
  text: Y los hijos de Jambri salieron de Medabá[a], y apresaron a Juan y todo lo que tenía, y se fueron llevándose a Juan y todo lo que tenía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se fueron con ello». El griego literalmente dice «se fueron teniendo [ellos/ello]», aludiendo a Juan y a todo lo que tenía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰαμβρεὶ
  english_pob_choice: the sons of Jambri
  chosen_spanish: los hijos de Jambri
  alternatives_spanish:
  - los hijos de Jambrín
  - los hijos de Jambre
  lexicon: LSJ
  rationale: υἱοὶ se traduce con el valor literal de filiación. Conservé el nombre propio en forma transliterada como Jambri, siguiendo la decisión del POB en inglés y evitando una adaptación semitradicional no atestiguada en el griego.
- source_word: ἐκ Μηδαβά
  english_pob_choice: from Medaba
  chosen_spanish: de Medabá
  alternatives_spanish:
  - desde Medabá
  - fuera de Medabá
  lexicon: LSJ
  rationale: ἐκ indica procedencia o salida desde un lugar. En español, 'de Medabá' conserva esa procedencia de forma natural. Mantengo el topónimo transliterado.
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: apresaron
  alternatives_spanish:
  - capturaron
  - tomaron preso a
  lexicon: BDAG
  rationale: El verbo expresa tomar por la fuerza. 'Apresaron' comunica captura hostil sin añadir un matiz judicial demasiado fuerte como 'arrestaron'.
- source_word: Ἰωάνην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johánan
  lexicon: LSJ
  rationale: La forma griega corresponde al nombre conocido en español como Juan. 'Johánan' reflejaría una reconstrucción semítica no presente en el texto griego.
- source_word: πάντα ὅσα εἶχεν
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo cuanto tenía
  - todas sus posesiones
  lexicon: LSJ
  rationale: La construcción es inclusiva y total. 'Todo lo que tenía' conserva la amplitud del griego y suena natural en español, sin convertirlo en un tecnicismo posesivo.
- source_word: ἀπῆλθον ἔχοντες
  english_pob_choice: went away with it
  chosen_spanish: se fueron llevándolo
  alternatives_spanish:
  - se fueron con ello
  - partieron llevándolo consigo
  lexicon: LSJ
  rationale: El participio ἔχοντες expresa que se alejaron teniendo en su poder a Juan y lo que le pertenecía. 'Llevándolo' mantiene la referencia compacta al conjunto de lo apresado, en línea con la observación auditada de que el griego mira hacia atrás a Juan y sus bienes.
theological_decisions:
- issue: Referencia pronominal y alcance de lo tomado en ἀπῆλθον ἔχοντες
  english_pob_reading: went away with it; the Greek literally says 'went away having [them],' referring back to John and everything he had.
  chosen_spanish_reading: se fueron llevándolo
  alternative_spanish_readings:
  - se fueron con ello
  - se fueron llevándose a Juan y todo lo que tenía
  rationale: El griego es breve y deja la referencia en suspense, pero el contexto indica que los agresores se fueron con Juan y sus bienes en su poder. La formulación española conserva esa ambigüedad controlada sin introducir detalles ajenos al texto.
  doctrine_reference: Ninguno; decisión de referencia textual y de estilo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y el audit trail inglés. Se incorporó la revisión del POB que ajusta el final para reflejar mejor el valor de ἔχοντες, evitando una lectura que desplace indebidamente el referente singular/plural. En español, la solución 'se fueron llevándolo' mantiene esa compacidad y la referencia al conjunto apresado.
  spanish_consistency_notes:
  - Se mantiene Jambri como transliteración del nombre propio, coherente con el tratamiento de nombres familiares en el proyecto.
  - '''Medabá'' conserva el topónimo con acento español, sin traducirlo ni expandirlo.'
  - No se introdujo terminología eclesiástica posterior; el verso narra una acción violenta y se traduce con verbos de captura y traslado acordes al griego.
