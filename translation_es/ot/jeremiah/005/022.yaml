translation:
  language: es
  text: ¿No me temerán? —declara Yahvé—. ¿No temblarán delante de mí, yo que puse la arena como límite para el mar, decreto perpetuo al que no puede sobrepasar? Aunque sus olas se encrespen, no pueden prevalecer; aunque bramen, no pueden pasar sobre él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַאוֹתִי / תִירָאוּ
  english_pob_choice: Do you not fear me?
  chosen_spanish: ¿No me temen?
  alternatives_spanish:
  - ¿No me reverencian?
  - ¿No me temen ustedes?
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica con ירא. En español, «temer» conserva mejor el doble matiz de temor y reverencia que «reverenciar», sin suavizar la reprensión.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé
  alternatives_spanish:
  - —dice Yahvé
  - —oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la fórmula profética solemne y el nombre divino conforme al criterio POB: «Yahvé», no la sustitución por «SEÑOR».'
- source_word: אִם מִפָּנַי לֹא תָחִילוּ
  english_pob_choice: Do you not tremble before me
  chosen_spanish: ¿No tiemblan delante de mí?
  alternatives_spanish:
  - ¿No se estremecen delante de mí?
  - ¿No tiemblan ante mí?
  lexicon: HALOT
  rationale: חיל en este contexto expresa temblor, estremecimiento o angustia reverente. «Temblar delante de mí» conserva la imagen corporal y el paralelismo con «temer».
- source_word: אֲשֶׁר שַׂמְתִּי
  english_pob_choice: who set
  chosen_spanish: que puse
  alternatives_spanish:
  - que establecí
  - que coloqué
  lexicon: HALOT
  rationale: El relativo retoma al hablante divino y la acción creadora/establecedora. «Puse» es directo y fiel al hebreo, sin introducir una explicación más abstracta que el texto no exige.
- source_word: חוֹל גְּבוּל לַיָּם
  english_pob_choice: the sand as a boundary for the sea
  chosen_spanish: la arena como límite para el mar
  alternatives_spanish:
  - la arena como frontera para el mar
  - la arena por límite del mar
  lexicon: HALOT
  rationale: «Límite» reproduce bien גְּבוּל en español actual; «frontera» suena más territorial y puede desviar la imagen cósmica.
- source_word: חָק עוֹלָם
  english_pob_choice: an everlasting decree
  chosen_spanish: un decreto perpetuo
  alternatives_spanish:
  - un estatuto perpetuo
  - un decreto eterno
  lexicon: HALOT
  rationale: חָק tiene el sentido de decreto/estatuto fijado; «decreto perpetuo» conserva la fuerza normativa y la duración de עוֹלָם sin forzar un tecnicismo legalista.
- source_word: וְלֹא יַעַבְרֶנְהוּ / וְלֹא יַעַבְרֻנְהוּ
  english_pob_choice: that it cannot pass / they cannot pass over it
  chosen_spanish: que no puede pasar / no pueden pasar sobre él
  alternatives_spanish:
  - que no lo puede atravesar / no lo pueden atravesar
  - que no puede cruzarlo / no pueden cruzarlo
  lexicon: HALOT
  rationale: El hebreo repite el verbo עבר con dos sujetos relacionados. «Pasar» y «pasar sobre él» conservan la repetición y la idea de sobrepasar el límite impuesto al mar.
- source_word: וַיִּתְגָּעֲשׁוּ
  english_pob_choice: Though its waves toss
  chosen_spanish: Aunque sus olas se agiten
  alternatives_spanish:
  - Aunque sus olas se sacudan
  - Aunque sus olas se revuelvan
  lexicon: HALOT
  rationale: El verbo puede denotar agitación, conmoción o rugido violento. «Se agiten» ofrece una solución natural en español y mantiene la fuerza del movimiento sin añadir una interpretación excesiva.
- source_word: וְהָמוּ גַלָּיו
  english_pob_choice: though they roar
  chosen_spanish: aunque bramen
  alternatives_spanish:
  - aunque rujan
  - aunque sus olas bramen
  lexicon: HALOT
  rationale: המה expresa ruido, bramido o rugido. «Bramen» comunica la sonoridad violenta y evita repetir innecesariamente «olas», ya presente en la cláusula anterior.
- source_word: וְלֹא יַעַבְרֻנְהוּ
  english_pob_choice: they cannot pass over it
  chosen_spanish: no pueden pasar sobre él
  alternatives_spanish:
  - no lo pueden sobrepasar
  - no pueden atravesarlo
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera ocurrencia de עבר y la imagen del mar que no sobrepasa el límite fijado. «Sobre él» se ajusta al referente «límite/decreto».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo el criterio del proyecto, se traduce como «Yahvé» para preservar el nombre personal del pacto, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Retaining the rhetorical force of the prophet’s rebuke
  english_pob_reading: Do you not fear me? ... Do you not tremble before me
  chosen_spanish_reading: ¿No me temen?... ¿No tiemblan delante de mí?
  alternative_spanish_readings:
  - ¿No me reverencian?... ¿No se estremecen delante de mí?
  - ¿No me temen?... ¿No sienten pavor delante de mí?
  rationale: La reprensión profética exige una formulación interrogativa directa. «Temen» y «tiemblan» preservan el tono de juicio sin rebajarlo a una mera falta de respeto.
  doctrine_reference: Jeremías 5:22 en su contexto de acusación por la insensibilidad ante el Creador
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo y el audit trail inglés con las revisiones más recientes: se mantiene la formulación simple y directa («who set» → «que puse»), y se conserva la repetición de עבר con «pasar» / «pasar sobre él» para reflejar el paralelismo del texto. No se añaden notas textuales porque la línea española ya integra la alternancia semántica sin ambigüedad crítica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la terminología POB en español.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Temer» se conserva para ירא; no se sustituye por «reverenciar» salvo necesidad contextual.
  - «Carne», «gracia» y otros términos no aparecen en este versículo, por lo que no se aplican aquí.
  - La puntuación española mantiene el ritmo retórico de dos preguntas seguidas de la imagen del mar y dos cláusulas concesivas.
