base_translation:
  language: en
  yaml_path: translation/ot/psalms/025/007.yaml
  text: Do not remember the sins of my youth or my transgressions[a]; according to your steadfast love, remember me—for the sake of your goodness[b], O Yahweh.
  footnotes:
