base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/020.yaml
  text: Then David said to all the assembly[a], “Now bless Yahweh your God.” And all the assembly blessed Yahweh, the God of their fathers[b], and bowed down and prostrated themselves before Yahweh and before the king.
  footnotes:
  - marker: a
    text: Or 'Please bless the LORD your God.' The particle נָא can add entreaty or urgency.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says they 'prostrated themselves' before 'the LORD and the king.' The wording describes bodily homage; some translations render the action toward the king as 'paid homage.'
    reason: alternative_reading
