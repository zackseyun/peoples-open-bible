review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, la repetición de «sabio» y la idea de beneficio personal en לָּךְ. Sin embargo, en la segunda mitad se aparta del valor verbal de וְלַצְתָּ al convertirlo en sustantivo/predicado («eres escarnecedor») en vez de una acción o actitud verbal condicional más paralela al hebreo. Además, «lo soportarás» para תִשָּׂא es comprensible, pero «cargarás con ello» preserva mejor la imagen de llevar una carga implícita y evita un matiz algo pasivo.
  spanish_quality_summary: 'El español es claro y legible, pero «si eres escarnecedor» suena algo más nominal y menos natural en la secuencia paralela del proverbio. Una formulación verbal como «si te burlas» o «si te mofas» fluye mejor en español moderno. También conviene alinear la única nota al punto donde realmente hay una alternativa documentada en el English POB: תִשָּׂא, no la primera cláusula.'
  glossary_alignment: No hay términos del glosario maestro especialmente sensibles en este versículo. «Escarnecedor» encaja con el campo semántico de לוץ en Proverbios, pero aquí el hebreo usa forma verbal, por lo que en el texto principal conviene un verbo. La decisión inglesa mantuvo «scoff»; en español «te burlas» es una equivalencia natural. Para תִשָּׂא, «cargar con ello» mantiene mejor la fuerza de נשא que «soportar».
  issues:
  - severity: medium
    issue: וְלַצְתָּ se vierte como predicado nominal («si eres escarnecedor») en vez de verbo.
    rationale: El hebreo presenta un verbo perfectivo paralelo a חָכַמְתָּ. Aunque el sustantivo conserva parte del sentido sapiencial, se pierde la simetría verbal y se introduce una reformulación menos directa que la auditada en inglés.
  - severity: medium
    issue: La nota al pie está anclada en «sabio», pero la alternativa documentada en el English POB corresponde a תִשָּׂא.
    rationale: La nota inglesa preserva la posibilidad interpretativa «will bear the consequences alone» porque el hebreo deja implícita la carga. La nota española actual introduce una alternativa no preservada en la auditoría inglesa como nota principal.
  - severity: low
    issue: «Lo soportarás» suaviza la imagen de llevar/cargar implícita en תִשָּׂא.
    rationale: Aunque no es incorrecto, נשא aquí se entiende mejor como cargar/llevar una carga. «Cargarás con ello» suena natural y preserva más de cerca la metáfora del hebreo.
  revised_spanish_text: Si eres sabio, eres sabio para ti mismo; si te burlas, tú solo cargarás con ello[a].
