translation:
  language: es
  text: ¿Aún hay en la casa del impío tesoros de maldad, y una medida[a] escasa que es maldita?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''efa'', una medida seca estándar; aquí se refiere al recipiente usado para medir en el comercio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''una efa deficiente que es maldita''.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹוד
  english_pob_choice: still
  chosen_spanish: Aún
  alternatives_spanish:
  - Todavía
  - Aún queda
  lexicon: HALOT
  rationale: Mantiene la idea de continuidad o persistencia en el tiempo, con naturalidad en español y sin añadir contenido interpretativo.
- source_word: הַאִשׁ
  english_pob_choice: Are there
  chosen_spanish: ¿hay... ?
  alternatives_spanish:
  - ¿Aún hay... ?
  - ¿Existe... ?
  lexicon: HALOT
  rationale: La forma hebrea es difícil y funciona aquí como una pregunta retórica. En español, '¿hay...?' reproduce bien el valor interrogativo sin forzar una estructura artificial.
- source_word: בֵּית רָשָׁע
  english_pob_choice: the house of the wicked
  chosen_spanish: la casa del impío
  alternatives_spanish:
  - la casa del malvado
  - el hogar del impío
  lexicon: HALOT
  rationale: '''Casa'' puede referirse al hogar o al conjunto doméstico, y ''impío'' conserva el matiz moral fuerte y bíblico del hebreo sin volverlo más general de lo que permite el texto.'
- source_word: אֹצְרוֹת רֶשַׁע
  english_pob_choice: treasures of wickedness
  chosen_spanish: tesoros de maldad
  alternatives_spanish:
  - tesoros de impiedad
  - riquezas de maldad
  - depósitos de maldad
  lexicon: HALOT
  rationale: '''Tesoros'' conserva la imagen concreta de bienes acumulados; ''maldad'' expresa el sustantivo abstracto hebreo. Evito ampliar a ''ganancias injustas'' porque el hebreo, tal como está, deja abierta la forma exacta del acopio.'
- source_word: אֵיפַת
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - efa
  - contenedor de medida
  lexicon: HALOT
  rationale: En español, 'medida' comunica la función comercial del término. El valor técnico de 'efa' se preserva en la nota, siguiendo la alternativa lexical documentada.
- source_word: רָזוֹן
  english_pob_choice: scant
  chosen_spanish: escasa
  alternatives_spanish:
  - deficiente
  - insuficiente
  - mezquina
  lexicon: HALOT
  rationale: '''Escasa'' transmite una medida intencionalmente reducida o corta, una solución natural en español que mantiene la acusación de fraude comercial.'
- source_word: זְעוּמָה
  english_pob_choice: accursed
  chosen_spanish: maldita
  alternatives_spanish:
  - maldecida
  - bajo maldición
  - detestada
  lexicon: HALOT
  rationale: '''Maldita'' reproduce la carga fuerte de condena divina o maldición sobre la medida. En español suena directo y conserva el peso evaluativo del hebreo.'
theological_decisions:
- issue: Valor retórico de la primera cláusula
  english_pob_reading: 'A rhetorical question: ''Are there still...?'''
  chosen_spanish_reading: 'Una pregunta retórica: ''¿Aún hay...?'''
  alternative_spanish_readings:
  - 'Una afirmación: ''Aún hay...'''
  - 'Una pregunta más explícita: ''¿Acaso aún hay...?'''
  rationale: El contexto inmediato de Miqueas 6 presenta acusaciones divinas en forma interrogativa. Por eso la versión española mantiene la pregunta retórica en vez de convertirla en enunciado.
  doctrine_reference: Contexto discursivo profético; cf. Miqueas 6:1-8
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. Se mantuvo la pregunta retórica y la tensión léxica entre el término técnico de medida y su función comercial, evitando una paráfrasis interpretativa amplia. La elección de 'maldita' conserva la fuerza de זְעוּמָה, y 'tesoros de maldad' preserva la expresión concreta sin suavizarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en otros contextos, pero este versículo no contiene el tetragrámaton.
  - Se prefirió 'impío/maldad/maldita' para conservar el registro bíblico y la fuerza moral del hebreo.
  - '''Medida'' se mantiene como traducción principal, con ''efa'' en nota para la alternativa técnica.'
  - La puntuación interrogativa se ajusta al español moderno, conservando el valor retórico del hebreo.
