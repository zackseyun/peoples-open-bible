base_translation:
  language: en
  yaml_path: translation/ot/genesis/015/010.yaml
  text: So he brought all these to him[a], cut them in two, and placed each half opposite the other[c][b]; but he did not cut the birds in two.
  footnotes:
  - marker: a
    text: Or 'cut them down the middle.' The Hebrew verb refers to dividing the animals into pieces, a covenant-making ritual.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'placed each piece opposite its fellow.'
    reason: lexical_alternative
  - marker: c
    text: Or 'So he took all these for himself'.
    reason: previous_rendering
