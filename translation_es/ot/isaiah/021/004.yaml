translation:
  language: es
  text: Mi corazón se desorienta; el estremecimiento me aterra. El crepúsculo que yo anhelaba[a] lo ha vuelto para mí terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El crepúsculo de mi deseo lo ha vuelto para mí estremecimiento/terror»; o «El crepúsculo que yo deseaba lo ha convertido para mí en estremecimiento/terror».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּעָה
  english_pob_choice: reels
  chosen_spanish: se desorienta
  alternatives_spanish:
  - se tambalea
  - vaga
  - anda errante
  lexicon: HALOT
  rationale: El verbo expresa extravío o desvío; con «mi corazón» conviene una formulación idiomática en español que conserve la idea de desorientación interior sin volverlo meramente físico.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi interior
  lexicon: HALOT
  rationale: «Corazón» preserva la antropología bíblica del centro interior de la persona y corresponde bien al hebreo לְבָבִי.
- source_word: פַּלָּצוּת
  english_pob_choice: shuddering
  chosen_spanish: el estremecimiento
  alternatives_spanish:
  - el espanto
  - el temblor
  lexicon: HALOT
  rationale: El sustantivo denota una reacción física intensa de miedo o sacudida; «estremecimiento» conserva esa fuerza sin forzar un abstracto más débil.
- source_word: בִּעֲתָתְנִי
  english_pob_choice: terrifies me
  chosen_spanish: me aterra
  alternatives_spanish:
  - me espanta
  - me ha aterrorizado
  lexicon: HALOT
  rationale: El verbo significa asustar o aterrorizar; «me aterra» comunica bien el efecto presente y mantiene el impacto del hebreo perfecto en contexto visionario.
- source_word: נֶשֶׁף
  english_pob_choice: twilight
  chosen_spanish: el crepúsculo
  alternatives_spanish:
  - el anochecer
  - la penumbra
  lexicon: HALOT
  rationale: «Crepúsculo» es un equivalente natural y poético para el momento de luz tenue que indica נֶשֶׁף.
- source_word: חִשְׁקִי
  english_pob_choice: I longed for
  chosen_spanish: yo anhelaba
  alternatives_spanish:
  - yo deseaba
  - mi anhelo
  lexicon: HALOT
  rationale: 'El sustantivo con sufijo expresa «mi deseo/nostalgia/afecto». En español, una forma verbal resulta más fluida: «yo anhelaba».'
- source_word: שָׂם לִי
  english_pob_choice: he has turned ... for me
  chosen_spanish: lo ha vuelto para mí
  alternatives_spanish:
  - lo ha hecho para mí
  - lo ha puesto para mí
  lexicon: HALOT
  rationale: El verbo «poner/hacer» en hebreo aquí expresa transformación del objeto esperado en otra realidad; «lo ha vuelto para mí» conserva ese cambio de estado sin añadir sujeto explícito innecesario.
- source_word: לַחֲרָדָה
  english_pob_choice: terror
  chosen_spanish: motivo de terror
  alternatives_spanish:
  - terror
  - espanto
  lexicon: HALOT
  rationale: 'La construcción final expresa resultado: el crepúsculo deseado se convirtió en algo aterrador. «Motivo de terror» comunica ese valor resultativo con naturalidad en español.'
theological_decisions:
- issue: Preservación de la antropología bíblica del «corazón»
  english_pob_reading: My heart reels
  chosen_spanish_reading: Mi corazón se desorienta
  alternative_spanish_readings:
  - Mi mente se desorienta
  - Mi interior se desorienta
  rationale: Se mantiene «corazón» para no reducir el centro personal a mera cognición; el hebreo usa el órgano/centro interior como sede del desconcierto.
  doctrine_reference: Antropología bíblica / lenguaje del corazón en el AT
- issue: La intensidad del miedo como transformación del objeto deseado
  english_pob_reading: The twilight I longed for he has turned into terror for me
  chosen_spanish_reading: El crepúsculo que yo anhelaba lo ha vuelto para mí motivo de terror
  alternative_spanish_readings:
  - El crepúsculo que yo anhelaba se ha convertido para mí en terror
  - El crepúsculo que yo deseaba lo ha hecho terror para mí
  rationale: 'La línea hebrea no solo afirma miedo, sino una inversión dramática: lo esperado como deleite se convierte en horror. La formulación elegida conserva esa tensión sin suavizarla.'
  doctrine_reference: Poética profética / reversión del objeto deseado
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión menor: se ajustó «trembling» a «shuddering» y la clausula final de «made a horror to me» a «turned into terror for me» para reflejar mejor פַּלָּצוּת y שָׂם ... לַחֲרָדָה. La versión española sigue esa revisión, pero conserva la flexibilidad semántica entre estremecimiento y terror en nota.'
  spanish_consistency_notes:
  - Se mantiene «corazón» para לְבָבִי, coherente con la antropología bíblica habitual del proyecto.
  - Se evita «SEÑOR» u otras sustituciones no presentes; no hay aquí términos divinos que requieran decisión especial.
  - «Crepúsculo» se usa para נֶשֶׁף por claridad y tono poético, sin imponer una lectura exclusivamente vespertina.
  - La nota a preserva la alternativa léxica entre «estremecimiento» y «terror», ya que el hebreo admite esa oscilación semántica.
