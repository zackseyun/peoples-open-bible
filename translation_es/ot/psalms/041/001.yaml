translation:
  language: es
  text: Para el director del coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director de música
  - Para el maestro de coro
  - Para el músico principal
  lexicon: HALOT
  rationale: En los encabezados de salmos, este participio con ל suele funcionar como una nota de ejecución/dedicación dirigida a quien supervisa la música. "Director del coro" comunica esa función en español moderno con naturalidad y sin recurrir a una fórmula arcaica.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: En un título de salmo, el término es el género literario estándar. "Salmo" es la equivalencia más precisa y transparente en español.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede indicar autoría, asociación o dedicación. "De David" preserva esa amplitud sin decidir indebidamente entre "por" y "para".
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo permite varias relaciones legítimas. La versión española mantiene la misma amplitud semántica que la POB inglesa, evitando resolver la tensión del encabezado con una afirmación más fuerte de autoría o dedicación.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje no recibió revisiones sustantivas en el último pase; el acuerdo de revisión fue alto y no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo "David" como nombre propio sin adaptación.
  - Se evitó "SEÑOR" porque el texto hebreo de este encabezado no contiene el nombre divino.
  - El orden y la puntuación siguen el carácter de encabezado breve y litúrgico del original.
