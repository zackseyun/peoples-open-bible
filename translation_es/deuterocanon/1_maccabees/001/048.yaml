translation:
  language: es
  text: y dejar a sus hijos sin circuncidar, hacer abominables[a] sus almas con toda cosa inmunda, y profanarlas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contaminar sus almas» o «contaminar sus personas»; el griego de βδελύξαι puede destacar tanto la abominación como la contaminación.'
    reason: lexical_alternative
  - marker: b
    text: El «las» se refiere en griego a «sus almas», aunque en español puede oírse también de modo más amplio respecto de las personas mismas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεῖναι
  english_pob_choice: to leave
  chosen_spanish: dejar
  alternatives_spanish:
  - permitir que permanezcan
  - dejar que permanezcan
  lexicon: LSJ
  rationale: El infinitivo aoristo de ἀφίημι aquí expresa el acto de dejar a alguien en cierto estado; en español, «dejar» comunica con naturalidad esa permanencia sin sobrecargar el texto.
- source_word: τοὺς υἱοὺς αὐτῶν
  english_pob_choice: their sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos (varones)
  lexicon: LSJ
  rationale: Aunque υἱούς significa literalmente «hijos/varones», en este contexto la mención posterior a la circuncisión hace claro el referente masculino; «a sus hijos» suena más natural en español y el contexto mantiene la precisión.
- source_word: ἀπεριτμήτους
  english_pob_choice: uncircumcised
  chosen_spanish: sin circuncidar
  alternatives_spanish:
  - incircuncisos
  - sin la circuncisión
  lexicon: LSJ
  rationale: «Sin circuncidar» conserva el valor ritual y covenantal del adjetivo y resulta más natural y legible en español que un término más técnico o arcaizante.
- source_word: βδελύξαι
  english_pob_choice: to make their souls abominable
  chosen_spanish: hacer abominables sus almas
  alternatives_spanish:
  - abominar sus almas
  - volver abominables sus almas
  - hacer detestables sus almas
  lexicon: LSJ
  rationale: La revisión inglesa optó por «make their souls abominable» para reflejar mejor la fuerza de βδελύξαι; en español, «hacer abominables» conserva ese sentido de tornar objeto de abominación sin reducirlo solo a «defile».
- source_word: τὰς ψυχὰς αὐτῶν
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - sus personas
  lexicon: LSJ
  rationale: «Almas» mantiene el peso moral-religioso de ψυχή en un contexto de corrupción ritual y de pacto; «vidas» o «personas» serían más neutros y perderían fuerza teológica.
- source_word: ἐν παντὶ ἀκαθάρτῳ
  english_pob_choice: with every unclean thing
  chosen_spanish: con toda cosa inmunda
  alternatives_spanish:
  - con todo lo inmundo
  - por toda cosa inmunda
  lexicon: LSJ
  rationale: La preposición y el sintagma funcionan de modo asociativo/instrumental; «con toda cosa inmunda» preserva el alcance amplio de la impureza ritual y suena bien en español.
- source_word: βεβηλώσαι
  english_pob_choice: to profane them
  chosen_spanish: profanarlas
  alternatives_spanish:
  - desecrarlas
  - profanar sus almas
  lexicon: LSJ
  rationale: βεβηλόω significa profanar/desecrar; «profanarlas» mantiene el contraste con «hacer abominables» y evita suavizar el acto de violación de lo sagrado.
theological_decisions:
- issue: Valor de ψυχή en un contexto de impureza ritual y pacto
  english_pob_reading: their souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - sus vidas
  - sus personas
  rationale: 'La referencia no es meramente psicológica: el texto describe la corrupción de la identidad religiosa y moral. «Almas» conserva esa gravedad y sigue de cerca la lectura auditada del POB inglés.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 6
- issue: Relación entre defilement and profanation
  english_pob_reading: to make their souls abominable ... and to profane them
  chosen_spanish_reading: hacer abominables sus almas ... y profanarlas
  alternative_spanish_readings:
  - defile their souls ... and profane them
  - volver inmundas sus almas ... y profanarlas
  rationale: 'Conviene distinguir dos acciones: una ligada a la abominación/repulsión moral, y otra a la profanación de lo santo. El español elegido conserva esa tensión sin colapsar ambos verbos en una sola idea.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 2 y 4
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del POB inglés, que prefirió «make their souls abominable» en lugar de «defile their souls» para βδελύξαι, y conserva la referencia pronominal final hacia «their souls» aunque en lectura amplia pueda incluir a las personas.
  spanish_consistency_notes:
  - Se mantiene «almas» para ψυχή por coherencia con el valor moral-religioso documentado en el audit trail.
  - Se usa «profanarlas» para βεβηλώσαι, en paralelo con el verbo anterior y sin borrar la distinción entre abominación y profanación.
  - No se introduce «SEÑOR» ni terminología eclesiástica no presente en el fuente; el pasaje no contiene el tetragrámaton.
  - La forma «sin circuncidar» evita un calco rígido y conserva el sentido ritual preciso.
