revisions:
- from: Y las calamidades y la maldición que Yahvé había dispuesto para Moisés, su siervo, se nos pegaron[a], el día en que sacó a nuestros padres para darnos una tierra que fluye leche y miel[b], como lo es hasta hoy.
  to: Y las calamidades[a] y la maldición que Yahvé dispuso[b] para Moisés, su siervo, se nos adhirieron, el día en que sacó a nuestros padres para darnos una tierra que fluye con leche y miel, como sucede hasta hoy.
  rationale: 'Se revisa para mejorar fidelidad y español natural sin alterar el sentido: «se nos adhirieron» conserva la metáfora de ἐκολλήθη con mejor registro; «fluye con leche y miel» corrige la fórmula española; «como sucede hasta hoy» expresa mejor la continuidad de ὡς ἡ ἡμέρα αὕτη. También se reordena la anotación para preservar la alternativa léxica principal de συνέταξεν documentada en el POB inglés.'
  reviewer_model: gpt-5.4
