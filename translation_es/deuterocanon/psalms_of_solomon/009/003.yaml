review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: finalidad con «para que», vocativo «oh Dios» y el sentido pasivo de δικαιωθῇς como reconocimiento de la justicia divina. Sin embargo, se aparta innecesariamente del rastro POB en dos puntos: traduce ἐν τῇ δικαιοσύνῃ σου como «en tu justicia» en vez de conservar la opción principal documentada «en tu rectitud», y omite la nota alternativa correspondiente a «justicia». Además, la única nota actual mezcla la alternativa de δικαιωθῇς con el resto de la frase completa, pero no preserva la alternativa separada para δικαιοσύνη que el audit trail inglés sí conserva.'
  spanish_quality_summary: 'El español es claro y digno, pero «actos de iniquidad» suena algo pesado. «Actos inicuos» sería más natural, aunque el texto actual sigue siendo comprensible. La reparación necesaria es pequeña y principalmente terminológica/documental: ajustar «justicia» a «rectitud» en el texto principal para seguir el criterio POB documentado y añadir la nota de alternativa «justicia».'
  glossary_alignment: 'Cumple bien con θεός → «Dios» y con la elección teológica de δικαιωθῇς → «vindicado». El punto principal de alineación pendiente es δικαιοσύνη: el proyecto y el audit trail aquí favorecen «righteousness» como lectura principal, por lo que en español conviene «rectitud» en el texto principal y «justicia» en nota. No hay términos del glosario mayor en conflicto adicional.'
  issues:
  - severity: medium
    issue: δικαιοσύνη se tradujo en el texto principal como «justicia» en vez de reflejar la lectura principal documentada
    rationale: El audit trail inglés conserva «righteousness» como opción principal y «justice» solo como alternativa. En español, «rectitud» preserva mejor esa prioridad, mientras «justicia» puede ir en nota.
  - severity: medium
    issue: Falta una nota separada para la alternativa de δικαιοσύνη
    rationale: El inglés preserva explícitamente la alternativa «in your justice». La nota española actual solo cubre «seas justificado» y no mantiene esa segunda alternativa semántica.
  - severity: low
    issue: La nota actual reproduce la frase completa en vez de aislar con precisión la alternativa léxica principal
    rationale: No es incorrecto, pero es menos limpio editorialmente. Conviene una nota para «vindicado/justificado» y otra para «rectitud/justicia».
  revised_spanish_text: para que seas vindicado[a], oh Dios, en tu rectitud[b] en medio de nuestros actos de iniquidad;
  revised_footnotes:
