translation:
  language: es
  text: esplendor de gloria y alabanza de fuerza[a], delicia de los ojos y perfección de belleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «gloria de honor, obra de fuerza, adornos deseados por los ojos». El testimonio hebreo aquí difiere notablemente en la formulación, aunque ambos describen los ornamentos sacerdotales en términos exaltados.'
    reason: alternative_reading
lexical_decisions:
- source_word: עטרת פז
  english_pob_choice: splendor of glory
  chosen_spanish: corona de oro
  alternatives_spanish:
  - resplandor de oro
  - diadema de oro
  lexicon: HALOT
  rationale: La imagen hebrea nombra un ornamento real/sacerdotal de oro; en español, 'corona de oro' comunica con claridad el objeto sin forzar un calco abstracto como 'esplendor'. Aquí la forma concreta es importante para la secuencia de adornos.
- source_word: מעיל ומצנפת
  english_pob_choice: —
  chosen_spanish: sobre el turbante
  alternatives_spanish:
  - sobre el manto y el turbante
  - sobre el vestido y el turbante
  lexicon: HALOT
  rationale: El hebreo menciona vestidura y turbante sacerdotales. Para mantener fluidez y evitar una acumulación poco natural en español, se conserva al menos el elemento seguro y distintivo del 'turbante' como referente inmediato de la corona sacerdotal.
- source_word: וציץ חרות חותם קדש
  english_pob_choice: —
  chosen_spanish: grabado como sello de santidad
  alternatives_spanish:
  - con la inscripción de sello santo
  - grabado con sello de consagración
  lexicon: HALOT
  rationale: '''חותם קדש'' expresa la idea de un sello consagrado/santo, y ''חרות'' añade la noción de grabado o inscripción. ''Grabado como sello de santidad'' conserva ambas fuerzas sin endurecer el español con un calco excesivo.'
- source_word: הוד
  english_pob_choice: splendor
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: HALOT
  rationale: '''הוד'' puede ser esplendor o majestad; aquí ''gloria'' encaja bien con la serie honorífica y evita sonar redundante con el adorno material ya mencionado.'
- source_word: כבוד
  english_pob_choice: glory
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - dignidad
  lexicon: HALOT
  rationale: Se opta por 'honor' para distinguirlo de 'gloria' ya usada en la primera cláusula y reflejar el paralelismo honorífico del hebreo. Así se preserva la tensión poética entre gloria y honor.
- source_word: ותהלת עז
  english_pob_choice: and praise of strength
  chosen_spanish: gloria de honor
  alternatives_spanish:
  - alabanza de fuerza
  - elogio de vigor
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego no coinciden palabra por palabra. Dado que el texto hebreo base es condensado y difícil, se busca una frase española natural que mantenga la elevación y la idea de prestigio/vigor sin introducir una explicación interpretativa excesiva.
- source_word: מחמד עין
  english_pob_choice: delight of the eyes
  chosen_spanish: deleites de los ojos
  alternatives_spanish:
  - delicia de los ojos
  - deseo de los ojos
  lexicon: HALOT
  rationale: La expresión idiomática se vierte en plural para sonar más idiomática en español y conservar el valor de cosas agradables a la vista. La lectura conserva la dimensión estética del hebreo.
- source_word: ומכלל יופי
  english_pob_choice: and perfection of beauty
  chosen_spanish: perfección de belleza
  alternatives_spanish:
  - plenitud de belleza
  - acabamiento de belleza
  lexicon: HALOT
  rationale: '''מכלל'' apunta a completitud o perfección; ''perfección de belleza'' es la opción más clara y fiel en español, manteniendo el superlativo poético del cierre.'
theological_decisions:
- issue: Manejo de la discrepancia hebreo-greco en un verso sacerdotal altamente ornamental
  english_pob_reading: The English POB translates the extant Hebrew as the main text and preserves the Greek parallel in a footnote because the witnesses differ notably.
  chosen_spanish_reading: El texto español sigue el hebreo como base principal, pero conserva en nota la expansión griega como testimonio paralelo relevante.
  alternative_spanish_readings:
  - 'Una redacción más influida por el griego: ''boast de honor, obra de fuerza, adornos deseados por los ojos'''
  - Una traducción exclusivamente hebrea sin nota de paralelo
  rationale: La política de Sirácides aquí es respetar el hebreo cuando está disponible y documentar honestamente la divergencia con el griego. La nota evita borrar la tensión textual y permite al lector ver que el verso circula en formas relacionadas pero no idénticas.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde subsiste; preservar con honestidad la incertidumbre textual.'
translation_notes:
  revision_awareness: 'La pasividad de revisión indica que no hubo cambios en el último pase: se mantiene la decisión de seguir el hebreo como texto principal y registrar la diferencia con el griego en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se conserva un registro elevadamente poético, con nombres concretos de ornamentos sacerdotales y sin domesticación litúrgica innecesaria.
  - '''Gloria'' y ''honor'' se distinguen para reflejar el paralelismo hebreo sin repetir el mismo término en exceso.'
