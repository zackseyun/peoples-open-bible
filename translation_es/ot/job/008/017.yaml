  - Se conserva la literalidad de «casa de piedras» en el cuerpo del texto y se aclara la ambigüedad en nota.
  - No se introdujo terminología doctrinal; el verso es puramente imagístico.
  - El orden de los miembros sigue el hebreo y el flujo de la edición inglesa auditada.
