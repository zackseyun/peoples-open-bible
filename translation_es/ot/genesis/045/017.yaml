translation:
  language: es
  text: 'Entonces Faraón dijo a José[a]: “Di a tus hermanos: ‘Hagan esto: carguen sus bestias y vayan[b]; regresen a la tierra de Canaán.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘O, más formalmente: “Di a tus hermanos: ‘’Hagan esto: carguen sus bestias y vayan; lleguen a la tierra de Canaán.’’”’
    reason: lexical_alternative
  - marker: b
    text: ‘O: “y vayan; lleguen”.’
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; ‘Entonces’ conserva la secuencia en español con fluidez natural sin perder el orden narrativo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Pharaón
  lexicon: HALOT
  rationale: ‘Faraón’ es la forma usual y digna en español bíblico para el título real egipcio, y corresponde directamente al hebreo.
- source_word: אֱמֹר אֶל אַחֶיךָ
  english_pob_choice: Tell your brothers
  chosen_spanish: Di a tus hermanos
  alternatives_spanish:
  - Diles a tus hermanos
  - Di a tus hermanos esto
  lexicon: HALOT
  rationale: El imperativo introduciendo discurso citado se expresa con naturalidad en español como ‘Di a tus hermanos’. Mantiene el valor directivo sin añadir matices ajenos.
- source_word: זֹאת עֲשׂוּ
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Haced esto
  - Hagan esta cosa
  lexicon: HALOT
  rationale: La construcción demostrativo + imperativo se rinde de forma idiomática como ‘Hagan esto’, clara y fiel al mandato breve del hebreo.
- source_word: טַעֲנוּ
  english_pob_choice: load
  chosen_spanish: carguen
  alternatives_spanish:
  - carguen sus animales
  - carguen
  lexicon: HALOT
  rationale: El verbo se usa para cargar animales o medios de transporte. ‘Carguen’ conserva el sentido verbal directo en español; en este contexto la carga recae sobre las bestias, aunque el verbo no necesita explicitarlo.
- source_word: בְּעִירְכֶם
  english_pob_choice: your beasts
  chosen_spanish: sus bestias
  alternatives_spanish:
  - sus animales
  - sus bestias de carga
  - sus bestias
  lexicon: HALOT
  rationale: ‘בְּעִיר’ designa animales de carga o de servicio en este contexto. ‘Bestias’ refleja mejor la correspondencia léxica que ‘animales’, y evita suavizar el término.
- source_word: וּלְכוּ בֹאוּ
  english_pob_choice: and go; come
  chosen_spanish: vayan; regresen
  alternatives_spanish:
  - vayan y vengan
  - vayan y lleguen
  - salgan y lleguen
  lexicon: HALOT
  rationale: 'Los dos imperativos conservan el doble movimiento: salir de Egipto y arribar a Canaán. En español, ‘vayan; regresen’ comunica ese trayecto completo de manera natural y no omite ninguno de los dos verbos.'
- source_word: אַרְצָה כְּנָעַן
  english_pob_choice: to the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - a la tierra de Canaán
  - a Canaán
  lexicon: HALOT
  rationale: El sufijo direccional y el sustantivo ‘tierra’ se reflejan explícitamente como ‘a la tierra de Canaán’, preservando la forma del hebreo y la referencia geográfica completa.
theological_decisions:
- issue: Cómo verter el título real egipcio פַּרְעֹה sin neutralizarlo
  english_pob_reading: Pharaoh
  chosen_spanish_reading: Faraón
  alternative_spanish_readings:
  - Pharaón
  rationale: No hay tensión doctrinal aquí; se conserva el título histórico convencional en español para mantener claridad y reconocimiento lector.
  doctrine_reference: Uso histórico-bíblico del título egipcio
- issue: Cómo representar los dos imperativos consecutivos וּלְכוּ בֹאוּ sin perder su doble dirección
  english_pob_reading: and go; come
  chosen_spanish_reading: vayan; regresen
  alternative_spanish_readings:
  - vayan y vengan
  - salgan y lleguen
  rationale: El hebreo describe el mismo desplazamiento desde dos ángulos. En español, ‘regresen’ expresa de modo natural la llegada al lugar de origen esperado, sin borrar el primer mandato de partir.
  doctrine_reference: Ninguna; decisión de equivalencia dinámica controlada
translation_notes:
  revision_awareness: 'El contexto en inglés pasó por dos ajustes relevantes: de ‘animals’ a ‘beasts’ para acercarse más a בְּעִירְכֶם, y de una formulación más áspera de los dos imperativos a una redacción que preserve ambos movimientos. La versión española sigue esa trayectoria: conserva ‘bestias’ para reflejar el léxico y usa ‘vayan; regresen’ para no perder la doble acción del hebreo.'
  spanish_consistency_notes:
  - Se mantiene ‘Faraón’ como forma estándar en español bíblico.
  - Se usa ‘tierra de Canaán’ para reproducir el sustantivo explícito del hebreo con naturalidad.
  - ‘Bestias’ se conserva por fidelidad léxica, aun cuando ‘animales’ sería más suave; aquí el contexto de carga justifica el término.
  - Los dos verbos finales se mantienen separados por punto y coma para reflejar la secuencia hebrea sin convertirla en una sola idea borrosa.
