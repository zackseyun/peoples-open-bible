  language: en
  yaml_path: translation/ot/2_kings/023/004.yaml
  text: Then the king commanded Hilkiah the high priest[a], the priests of the second order, and the keepers of the threshold to bring out from the temple of Yahweh all the vessels made for Baal, for Asherah, and for all the host of heaven. He burned them outside Jerusalem in the fields of the Kidron, and carried their dust to Bethel.
  footnotes:
