revisions:
- from: Aun hasta tu vejez[a], yo soy él, y hasta las canas yo te llevaré. Yo te hice, y yo te sostendré; yo te llevaré[b], y te rescataré.
  to: Aun hasta tu vejez, yo soy el mismo, y hasta las canas te llevaré[a]. Yo te hice, y yo te soportaré; yo te llevaré, y te rescataré[b].
  rationale: Se corrige la autoidentificación divina a una formulación española más fielmente solemne y legible («yo soy el mismo»). Se reubica la nota [a] para que corresponda a la alternativa léxica documentada para אֶסְבֹּל, y se conserva [b] para la alternativa de וַאֲמַלֵּט. También se ajusta la secuencia verbal para mantener mejor el patrón del original y la auditoría inglesa sin sacrificar naturalidad española.
