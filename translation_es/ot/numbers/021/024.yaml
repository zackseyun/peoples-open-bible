revisions:
- from: Israel lo hirió[a] con la punta de la espada, y tomó posesión de su tierra, desde el Arnón hasta el Jaboc, hasta los hijos de Amón, porque el límite de los hijos de Amón era fuerte.
  to: Israel lo hirió al filo de la espada, y tomó posesión de su tierra, desde el Arnón hasta el Jaboc, hasta los hijos de Amón[a], porque el límite de los hijos de Amón era fuerte.
  rationale: Se corrige el modismo hebreo לְפִי חָרֶב con «al filo de la espada», que preserva mejor la imagen fuente y su sentido bélico natural en español. Se elimina la nota errónea sobre «lo hirió» y se restituye la nota auditada en el segmento «hijos de Amón», preservando la alternativa idiomática española «amonitas» conforme al English POB. No se requieren cambios doctrinales ni adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la línea del English POB en la estructura general: Israel hiere a Sehón, toma posesión de su tierra, delimita el territorio desde Arnón hasta Jaboc y hasta los hijos de Amón, y da la razón de ese límite. Sin embargo, hay dos desajustes importantes con la evidencia fuente/auditoría: (1) לְפִי חָרֶב corresponde mejor a «al filo de la espada» que a «con la punta de la espada», ya que «punta» cambia la imagen de borde/filo a extremo puntiagudo; (2) la nota al pie actual para וַיַּכֵּהוּ no refleja la nota del English POB, que está anclada a Jabbok/sons of Ammon y ofrece la alternativa idiomática «hasta los amonitas», no alternativas para «lo hirió».'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno adecuado. «Tomó posesión de su tierra», «desde el Arnón hasta el Jaboc» y «porque el límite... era fuerte» son naturales. No obstante, «con la punta de la espada» suena menos fiel y algo extraño frente al giro más establecido «al filo de la espada». También conviene reubicar la nota al pie al segmento geográfico/étnico pertinente.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. La decisión «los hijos de Amón» está bien alineada con la preferencia del proyecto por conservar la expresión de parentesco del hebreo, y la alternativa idiomática «los amonitas» debe preservarse en nota, como hace el English POB.
  issues:
  - severity: high
    issue: «con la punta de la espada» no representa bien לְפִי חָרֶב
    rationale: El hebreo expresa literalmente la idea de borde/filo («boca» de la espada), no la punta. «Punta» altera la imagen y puede sugerir una estocada específica más que el modismo general de ejecución bélica.
  - severity: high
    issue: La nota al pie está anclada al lugar equivocado y con contenido equivocado
    rationale: La auditoría inglesa pone la nota en «Jabbok / sons of Ammon» para explicar la alternativa idiomática «as far as the Ammonites». El borrador español la pone en «lo hirió» y además introduce alternativas que el English POB explícitamente no eligió para וַיַּכֵּהוּ.
  - severity: medium
    issue: Falta la alternativa idiomática española para «hasta los hijos de Amón»
    rationale: Dado que el English POB preserva la alternativa «as far as the Ammonites» en nota, el español debería reflejarlo como «hasta los amonitas» para mantener la trazabilidad auditada.
  revised_spanish_text: Israel lo hirió al filo de la espada, y tomó posesión de su tierra, desde el Arnón hasta el Jaboc, hasta los hijos de Amón[a], porque el límite de los hijos de Amón era fuerte.
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «hasta los amonitas» ... «porque el límite de los amonitas era fuerte».
    reason: lexical_alternative
  revision_rationale: Se corrige el modismo hebreo לְפִי חָרֶב con «al filo de la espada», que preserva mejor la imagen fuente y su sentido bélico natural en español. Se elimina la nota errónea sobre «lo hirió» y se restituye la nota auditada en el segmento «hijos de Amón», preservando la alternativa idiomática española «amonitas» conforme al English POB. No se requieren cambios doctrinales ni adjudicación adicional.
