  to: ya sea tres años de hambruna[a], o tres meses de ser arrasado[b] delante de tus enemigos mientras la espada de tus enemigos te alcanza, o tres días de la espada de Yahvé, esto es, pestilencia en la tierra, con el ángel de Yahvé destruyendo en todo el territorio de Israel[c]. Ahora considera qué respuesta debo llevar al que me envió.
