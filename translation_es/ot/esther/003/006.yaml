translation:
  language: es
  text: Pero le pareció despreciable poner la mano sobre Mardoqueo solo, porque le habían dicho de qué pueblo era Mardoqueo. Así que Amán buscó destruir a todos los judíos que había en todo el reino de Asuero, el pueblo de Mardoqueo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el pueblo de Mardoqueo'; es decir, el pueblo al que pertenecía Mardoqueo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶז בְּעֵינָיו
  english_pob_choice: it seemed contemptible in his eyes
  chosen_spanish: le pareció despreciable
  alternatives_spanish:
  - lo consideró indigno
  - lo tuvo por despreciable
  lexicon: HALOT
  rationale: La expresión hebrea usa el verbo de desprecio con el modismo 'en sus ojos'. En español, 'le pareció despreciable' conserva el juicio evaluativo sin volver la frase pesada o artificial.
- source_word: לִשְׁלֹחַ יָד בְּ
  english_pob_choice: to lay a hand on
  chosen_spanish: echar mano de
  alternatives_spanish:
  - poner la mano sobre
  - atacar
  lexicon: HALOT
  rationale: El hebreo literalmente habla de 'extender/enviar la mano' contra alguien. 'Echar mano de' mantiene la imagen concreta de agresión y funciona de manera natural en español.
- source_word: בְּמָרְדֳּכַי לְבַדּוֹ
  english_pob_choice: on Mordecai alone
  chosen_spanish: solo de Mardoqueo
  alternatives_spanish:
  - contra Mardoqueo solo
  - a Mardoqueo únicamente
  lexicon: HALOT
  rationale: '''Solo de Mardoqueo'' expresa que el blanco inmediato era Mordecai en forma aislada, en contraste con el pueblo entero que luego se menciona.'
- source_word: כִּי הִגִּידוּ לֹו אֶת עַם מָרְדֳּכָי
  english_pob_choice: because they had told him what people Mordecai belonged to
  chosen_spanish: porque le habían dicho de qué pueblo era Mardoqueo
  alternatives_spanish:
  - porque le habían dicho cuál era el pueblo de Mardoqueo
  - porque le habían informado acerca del pueblo de Mardoqueo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'el pueblo de Mardoqueo'. En español, 'de qué pueblo era' comunica con claridad la pertenencia étnica/nacional sin perder el sentido relacional del genitivo.
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - intentó
  - se propuso
  lexicon: HALOT
  rationale: '''Buscar'' conserva la intención deliberada del verbo, sin afirmar más de lo que el contexto inmediato dice sobre el resultado.'
- source_word: לְהַשְׁמִיד
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - exterminar
  lexicon: HALOT
  rationale: '''Destruir'' transmite la intención devastadora del verbo sin introducir un matiz técnico adicional que exceda el español básico del pasaje.'
- source_word: כָּל הַיְּהוּדִים
  english_pob_choice: all the Jews
  chosen_spanish: a todos los judíos
  alternatives_spanish:
  - a todos los judíos de Judea
  - a todos los judeos
  lexicon: HALOT
  rationale: En Ester, el término designa al pueblo judío dentro del imperio persa. 'Judíos' es la equivalencia contextual más clara y natural.
- source_word: בְּכָל מַלְכוּת אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: throughout the whole kingdom of Ahasuerus
  chosen_spanish: que había en todo el reino de Asuero
  alternatives_spanish:
  - en todo el reino de Asuero
  - por todo el reino de Asuero
  lexicon: HALOT
  rationale: La construcción hebrea distribuye la acción por todo el imperio. 'Que había en todo el reino' reproduce ese alcance de manera idiomática en español.
- source_word: עַם מָרְדֳּכָי
  english_pob_choice: the people of Mordecai
  chosen_spanish: el pueblo de Mardoqueo
  alternatives_spanish:
  - el pueblo al que pertenecía Mardoqueo
  - el pueblo de Mardoqueo
  lexicon: HALOT
  rationale: Se mantiene la expresión literal que el POB inglés conserva al final del versículo, porque funciona como resumen retórico y refuerzo de identidad colectiva.
translation_notes:
  revision_awareness: Alineado con la revisión más reciente sin cambios sustantivos; se conserva la lectura de alta concordancia y la estructura retórica del hebreo, con ajuste idiomático natural en español.
  spanish_consistency_notes:
  - Se usa 'Mardoqueo' y 'Amán' de forma consistente con la tradición bíblica en español y con el contexto de Ester.
  - Se evita 'SEÑOR' o equivalentes porque el versículo no contiene el nombre divino.
  - '''Judíos'' se mantiene por fuerza contextual, no como sustitución litúrgica.'
  - La segunda mitad del versículo preserva la repetición de 'el pueblo de Mardoqueo' como cierre enfático.
