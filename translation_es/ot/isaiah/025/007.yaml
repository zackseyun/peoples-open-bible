translation:
  language: es
  text: Y en este monte se tragará la cubierta que cubre sobre todos los pueblos[b][a], y el velo que está extendido sobre todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el sudario que amortaja a todos los pueblos". El hebreo usa términos cognados repetidos para una cobertura envuelta sobre la humanidad.
    reason: lexical_alternative
  - marker: b
    text: El "velo" o "cubierta" probablemente anticipa el acto de tragarse la muerte en el versículo siguiente, aunque la imagen también puede sugerir, de manera más amplia, la eliminación de lo que yace sobre las naciones.
    reason: cross_reference
lexical_decisions:
- source_word: וּבִלַּע
  english_pob_choice: he will swallow up
  chosen_spanish: él tragará
  alternatives_spanish:
  - él engullirá
  - él destruirá
  lexicon: HALOT
  rationale: En español, "tragar" conserva la imagen concreta de בלע como acción de engullir o absorber completamente. "Destruirá" explicaría el efecto, pero perdería la metáfora que el contexto inmediato retoma en el versículo siguiente.
- source_word: בָּהָר הַזֶּה
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: HALOT
  rationale: La preposición hebrea en contexto locativo admite un español natural con "en". "Monte" mantiene el referente poético de Sion y suena más bíblico y preciso que una calca con "montaña".
- source_word: פְּנֵי הַלּוֹט
  english_pob_choice: the covering
  chosen_spanish: el velo
  alternatives_spanish:
  - la cubierta
  - el cubrimiento
  lexicon: HALOT
  rationale: Aunque פְּנֵי literalmente es "rostro/parte frontal de", la frase completa funciona como la superficie visible de una cobertura. "Velo" da una imagen clara y digna en español para algo extendido sobre los pueblos, sin forzar "rostro" en una expresión extraña.
- source_word: הַלּוֹט
  english_pob_choice: the covering / that covers
  chosen_spanish: que cubre
  alternatives_spanish:
  - que envuelve
  - que recubre
  lexicon: HALOT
  rationale: El hebreo repite la raíz para intensificar la imagen. "Que cubre" preserva el efecto de cobertura continua de modo natural en español y mantiene el vínculo con el sustantivo anterior.
- source_word: עַל כָּל הָעַמִּים
  english_pob_choice: all peoples
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - sobre todos los pueblos
  - a todos los pueblos de la tierra
  lexicon: HALOT
  rationale: '"Pueblos" distingue היטב את עַמִּים de גּוֹיִם, que sigue después como "naciones". El giro "a" funciona bien con un verbo de acción que recae sobre esa cobertura.'
- source_word: וְהַמַּסֵּכָה
  english_pob_choice: and the veil
  chosen_spanish: y la cubierta
  alternatives_spanish:
  - y el velo
  - y la máscara
  lexicon: HALOT
  rationale: מַסֵּכָה puede sugerir "velo" o, en otros contextos, imagen fundida. Aquí el paralelo con הַלּוֹט y con el participio siguiente favorece una cobertura textil o envolvente. "Cubierta" evita introducir una imagen más específica que el hebreo no exige.
- source_word: הַנְּסוּכָה
  english_pob_choice: that is spread
  chosen_spanish: que está extendida
  alternatives_spanish:
  - que está tendida
  - que está derramada
  lexicon: HALOT
  rationale: El participio pasivo sugiere algo desplegado o tendido sobre algo. "Extendida" reproduce esa idea con naturalidad en español y conserva la relación imagética con un velo o cubierta.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: over all nations
  chosen_spanish: sobre todas las naciones
  alternatives_spanish:
  - sobre todos los pueblos
  - sobre todas las gentes
  lexicon: HALOT
  rationale: '"Naciones" es la correspondencia más directa para גּוֹיִם y preserva el paralelismo poético con "pueblos". "Sobre" mantiene la imagen de algo colocado encima de ellas.'
theological_decisions:
- issue: Naturaleza de la cobertura removida
  english_pob_reading: A metaphorical covering/veil over the nations
  chosen_spanish_reading: Una cobertura metafórica —velo o cubierta— sobre los pueblos y las naciones
  alternative_spanish_readings:
  - Un sudario funerario que anticipa la muerte
  - Un símbolo de ceguera o vergüenza espiritual
  rationale: El hebreo presenta una imagen amplia de algo puesto sobre la humanidad. La cercanía del v. 8 permite una lectura asociada con la muerte, pero aquí el texto aún no la identifica explícitamente. La redacción española mantiene la tensión interpretativa sin resolverla demasiado pronto.
  doctrine_reference: Preservar la tensión teológica y la progresión del contexto inmediato.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de forma fuente-primera, preservando el verbo metafórico de 'swallow up', el paralelismo entre 'pueblos' y 'naciones', y la ambigüedad intencional de la cobertura/velo sin adelantar la explicación de v. 8.
  spanish_consistency_notes:
  - Se mantuvo 'monte' para הַר y 'naciones' para גּוֹיִם.
  - Se evitó 'SEÑOR' porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se eligió 'pueblos' para עַמִּים para distinguirlo de 'naciones' en la segunda cola.
  - La imagen de cobertura se dejó abierta entre 'velo' y 'cubierta' para reflejar el campo semántico del hebreo.
