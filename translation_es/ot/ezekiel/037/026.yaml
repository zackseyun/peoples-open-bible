translation:
  language: es
  text: Haré con ellos un pacto de paz[a]; será para ellos un pacto perpetuo. Y los pondré[b] y los multiplicaré, y pondré mi santuario en medio de ellos[c] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será para ellos un pacto perpetuo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «los colocaré».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָרַתִּי
  english_pob_choice: I will make
  chosen_spanish: Haré
  alternatives_spanish:
  - Haré un pacto
  - Cortaré
  - Celebraré
  lexicon: HALOT
  rationale: Con בְּרִית, כרת expresa la fórmula idiomática de hacer/celebrar un pacto. En español, «haré» conserva la naturalidad y el valor pactal sin volver literal la imagen de «cortar».
- source_word: בְּרִית שָׁלוֹם
  english_pob_choice: a covenant of peace
  chosen_spanish: un pacto de paz
  alternatives_spanish:
  - un pacto de bienestar
  - un pacto de shalom
  lexicon: HALOT
  rationale: Se conserva la estructura nominal y el sentido de שָׁלוֹם como paz, integridad y bienestar. «Pacto de paz» es claro y mantiene la fuerza teológica del término.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto perpetuo
  alternatives_spanish:
  - un pacto eterno
  - un pacto para siempre
  lexicon: HALOT
  rationale: עוֹלָם en contextos de pacto suele expresar duración indefinida y continua. «Perpetuo» comunica bien esa permanencia sin forzar una precisión metafísica ajena al contexto.
- source_word: יִהְיֶה אוֹתָם
  english_pob_choice: it will be with them
  chosen_spanish: será para ellos
  alternatives_spanish:
  - será con ellos
  - les pertenecerá
  lexicon: HALOT
  rationale: El hebreo indica relación/beneficio respecto de ellos. «Será para ellos» reproduce bien esa función relacional del pacto sin volverla demasiado libre.
- source_word: וּנְתַתִּי
  english_pob_choice: I will place them
  chosen_spanish: los pondré
  alternatives_spanish:
  - los colocaré
  - los estableceré
  lexicon: HALOT
  rationale: En este contexto de restauración, נתן con objeto personal se traduce de forma concreta como «poner/colocar». «Los pondré» sigue de cerca la decisión auditada en inglés y su sentido básico.
- source_word: וְהִרְבֵּיתִי אוֹתָם
  english_pob_choice: multiply them
  chosen_spanish: los multiplicaré
  alternatives_spanish:
  - los aumentaré
  - los haré muchos
  lexicon: HALOT
  rationale: La forma causativa de רבה expresa hacer numerosos. «Multiplicar» preserva el paralelismo y el lenguaje de bendición de manera natural en español.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» es la equivalencia precisa y suficientemente amplia para מִקְדָּשׁ, evitando restringir indebidamente el término a «templo».
- source_word: בְּתוֹכָם
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: La expresión corporal/comunitaria del hebreo se comunica mejor con «en medio de ellos». Evita la lectura individualista de «dentro de ellos».
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la forma natural y reverente en español para expresar duración continua. Conserva el sentido durativo de לְעוֹלָם.
theological_decisions:
- issue: Conservación explícita del lenguaje de pacto
  english_pob_reading: 'Retain explicit covenant terminology: ''a covenant of peace'' and ''an everlasting covenant'''
  chosen_spanish_reading: Mantener «pacto de paz» y «pacto perpetuo»
  alternative_spanish_readings:
  - Parafrasear como promesa de paz duradera
  - Reducirlo a un simple acuerdo de bienestar
  rationale: El verso es estructuralmente pactal; conservar ese vocabulario evita diluir el peso teológico del compromiso divino con su pueblo restaurado.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Ubicación del santuario de Yahvé
  english_pob_reading: Corporate presence 'in their midst'
  chosen_spanish_reading: «en medio de ellos» como presencia corporativa
  alternative_spanish_readings:
  - «dentro de ellos» como interioridad individual
  - «entre ellos» como formulación menos precisa
  rationale: El hebreo favorece una presencia entre el pueblo como cuerpo, no una lectura primariamente interior o individual. «En medio de ellos» preserva esa imagen comunitaria.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en inglés, donde וּנְתַתִּי se ajustó de «establish them» a «place them» para reflejar con mayor precisión el valor básico de נתן en este contexto. Por eso se eligió «los pondré» en lugar de una solución más interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «pacto» de forma consistente para בְּרִית, conforme al peso pactal del versículo.
  - Se tradujo עוֹלָם como «perpetuo» y «para siempre» para conservar la duración continua sin introducir matices ajenos.
  - «Santuario» se usó para מִקְדָּשׁ por ser el término más amplio y preciso en español.
  - La cláusula final conserva la imagen corporativa de presencia divina «en medio de ellos».
