  spanish_consistency_notes:
  - Se mantuvo un registro genealógico conciso y directo, acorde con el hebreo.
  - Se prefirió transliteración estable de nombres propios, con adaptación mínima para fluidez española.
  - La nota al pie marca únicamente la alternativa relevante en la transliteración de צוֹפַח; no se añadieron otras notas porque no hay tensiones textuales o teológicas significativas en este verso.
