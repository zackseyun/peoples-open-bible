translation:
  language: es
  text: Oh Yahvé, a nosotros nos corresponde la vergüenza en el rostro[a]—a nuestros reyes, a nuestros príncipes y a nuestros padres[b]—porque hemos pecado contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «vergüenza de rostro», un idiomatismo para la deshonra o humillación pública.
    reason: lexical_alternative
  - marker: b
    text: O «y a nuestros antepasados» para «a nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Lord / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo según la norma del proyecto para יהוה. En español, «Yahvé» es la forma auditable y reverente, más transparente que «Señor» como sustituto.
- source_word: לָנוּ
  english_pob_choice: to us belongs
  chosen_spanish: a nosotros nos corresponde
  alternatives_spanish:
  - para nosotros
  - nos pertenece
  - es nuestro
  lexicon: HALOT
  rationale: El hebreo expresa una relación de pertenencia/atribución. En español, «nos corresponde» comunica naturalmente que la vergüenza recae sobre el pueblo, sin perder el matiz de posesión o incumbencia.
- source_word: בֹּשֶׁת הַפָּנִים
  english_pob_choice: shame of face
  chosen_spanish: la vergüenza de rostro
  alternatives_spanish:
  - la vergüenza
  - el oprobio público
  - la confusión de rostro
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático concreto del hebreo, como en la POB inglesa «shame of face», para no aplanarlo a «vergüenza» sin más. «Rostro» conserva el valor corporal de la expresión bíblica y su sentido de humillación pública.
- source_word: לִמְלָכֵינוּ
  english_pob_choice: to our kings
  chosen_spanish: a nuestros reyes
  alternatives_spanish:
  - para nuestros reyes
  lexicon: HALOT
  rationale: Se preserva el paralelismo de la serie de destinatarios/afectados por la vergüenza. «A nuestros reyes» es la forma española más directa y natural.
- source_word: לְשָׂרֵינוּ
  english_pob_choice: to our princes
  chosen_spanish: a nuestros príncipes
  alternatives_spanish:
  - a nuestros oficiales
  - a nuestros gobernantes
  - a nuestros jefes
  lexicon: HALOT
  rationale: «Príncipes» mantiene el registro político-cortesano del hebreo שָׂרִים y conserva la correspondencia con «reyes». No se neutraliza a «líderes» para no borrar el matiz institucional.
- source_word: וְלַאֲבֹתֵינוּ
  english_pob_choice: and to our fathers
  chosen_spanish: y a nuestros padres
  alternatives_spanish:
  - y a nuestros antepasados
  lexicon: HALOT
  rationale: Se sigue de cerca la forma masculina explícita del hebreo. «Padres» mantiene la literalidad; «antepasados» queda como alternativa contextual, tal como la POB inglesa documenta.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La partícula introduce la causa de la vergüenza/confesión. «Porque» reproduce de modo natural la fuerza causal en español.
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una culpa consumada con relevancia presente; el presente perfecto español transmite bien esa confesión orante.
- source_word: לָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Con חטא, la preposición puede señalar a la parte ofendida. «Contra ti» expresa correctamente el sentido relacional y confesional que la POB inglesa ya explicitó.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en una oración de confesión
  english_pob_reading: O Lord / O Yahweh
  chosen_spanish_reading: ¡Oh Yahvé!
  alternative_spanish_readings:
  - ¡Oh Señor!
  rationale: La invocación directa en vocativo exige una forma natural de súplica en español. Se conserva el nombre divino, no el sustituto litúrgico, conforme al criterio del proyecto y a la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: «Vergüenza de rostro» como idiomatismo hebreo
  english_pob_reading: shame of face
  chosen_spanish_reading: vergüenza de rostro
  alternative_spanish_readings:
  - vergüenza
  - oprobio público
  - confusión de rostro
  rationale: Se preserva la imagen hebrea y su tensión semántica. No se reduce a una simple abstracción, porque el texto señala humillación pública o deshonra visible.
  doctrine_reference: HALOT / idiomática hebrea de בֹּשֶׁת הַפָּנִים
- issue: Relación semántica de לָךְ con חָטָאנוּ
  english_pob_reading: we have sinned against you
  chosen_spanish_reading: hemos pecado contra ti
  alternative_spanish_readings:
  - hemos pecado a ti
  - hemos pecado delante de ti
  rationale: En español bíblico actual, «contra ti» comunica con claridad el ofendido de la acción y evita una construcción forzada. Mantiene la lectura confesional del hebreo sin añadir contenido ajeno.
  doctrine_reference: Uso preposicional de חטא con complemento de persona ofendida
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente ambas notas al texto español mediante los marcadores [a] y [b], y se mantuvo la estructura paralela del hebreo. La redacción sigue de cerca el auditable inglés POB, pero en español usa una formulación natural («a nosotros nos corresponde») sin perder el valor idiomático de «vergüenza de rostro».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה según el estándar del proyecto.
  - 'Se conserva el paralelismo de tres grupos: reyes, príncipes y padres.'
  - Se mantiene la confesión en primera persona plural con tiempo perfecto compuesto.
  - No se sustituye «padres» por «antepasados» en el texto principal, pero se documenta la alternativa.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, como exige la validación.
