translation:
  language: es
  text: Si he pecado[a], ¿qué puedo hacerte, oh vigilante de la humanidad[b]? ¿Por qué me has hecho tu blanco[c], de modo que me he vuelto una carga para mí mismo[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He pecado». El hebreo tiene un perfecto de primera persona que puede leerse como una afirmación directa; aquí se vierte con valor concesivo por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vigilante del hombre». El hebreo usa אדם en singular genérico para la humanidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «¿Por qué me has hecho un blanco para ti?». El hebreo permite la idea de un objeto de ataque.'
    reason: lexical_alternative
  - marker: d
    text: Hebreo «una carga para mí mismo»; algunas versiones antiguas reflejan «una carga para ti».
    reason: alternative_reading
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: If I have sinned
  chosen_spanish: Si he pecado
  alternatives_spanish:
  - He pecado
  lexicon: HALOT
  rationale: El perfecto hebreo es una afirmación completa, pero en el contexto de la queja de Job funciona concesivamente; por eso se traslada con ‘si’ para conservar el valor retórico sin convertirlo en una confesión más fuerte de lo que el texto exige.
- source_word: מָה אֶפְעַל לָךְ
  english_pob_choice: what can I do to you
  chosen_spanish: ¿qué puedo hacerte?
  alternatives_spanish:
  - ¿qué haré por ti?
  - ¿qué te he hecho?
  lexicon: HALOT
  rationale: El verbo expresa acción posible o realizable. ‘Puedo’ refleja mejor la pregunta retórica sobre incapacidad que un futuro simple, y ‘hacerte’ conserva la relación directa marcada por el dativo.
- source_word: נֹצֵר הָאָדָם
  english_pob_choice: watcher of mankind
  chosen_spanish: guardián de la humanidad
  alternatives_spanish:
  - guardián del hombre
  - vigilante de la humanidad
  - observador de la humanidad
  lexicon: HALOT
  rationale: נֹצֵר admite la idea de vigilar, guardar o custodiar. Dado el giro del versículo, ‘guardián’ mantiene la ambigüedad entre protección y escrutinio. ‘La humanidad’ refleja mejor el valor genérico colectivo que el hebreo singular representa aquí, siguiendo la revisión inglesa más reciente.
- source_word: הָאָדָם
  english_pob_choice: mankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el hombre
  - la gente
  - los seres humanos
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular genérico אדם, en español ‘la humanidad’ comunica con naturalidad el valor colectivo que el inglés POB finalmente privilegió, sin perder el sentido representativo del término.
- source_word: לָמָה שַׂמְתַּנִי לְמִפְגָּע לָךְ
  english_pob_choice: Why have you made me your target
  chosen_spanish: ¿Por qué me has puesto como blanco para ti?
  alternatives_spanish:
  - ¿Por qué me has hecho tu blanco?
  - ¿Por qué me has hecho un blanco para ti?
  - ¿Por qué me has puesto como objetivo para ti?
  lexicon: HALOT
  rationale: מִפְגָּע denota algo con lo que se choca o que queda expuesto al golpe; ‘blanco’ es una equivalencia natural en español para el objeto de ataque. ‘Para ti’ conserva el dativo del hebreo y el sentido relacional del texto.
- source_word: וָאֶהְיֶה עָלַי לְמַשָּׂא
  english_pob_choice: so that I have become a burden to myself
  chosen_spanish: de modo que me he vuelto una carga para mí mismo
  alternatives_spanish:
  - y me he vuelto una carga para mí mismo
  - de modo que soy una carga para mí mismo
  - y he quedado como carga sobre mí
  lexicon: HALOT
  rationale: La lectura masorética con עָלַי se expresa con naturalidad como auto-carga. ‘Para mí mismo’ comunica la idea de una carga que recae sobre la propia persona, preservando el sentido difícil que el POB inglés mantiene como lectura principal.
theological_decisions:
- issue: Valor genérico de אדם en una frase vocativa sobre Dios
  english_pob_reading: watcher of mankind
  chosen_spanish_reading: guardián de la humanidad
  alternative_spanish_readings:
  - guardián del hombre
  - vigilante de la humanidad
  rationale: El hebreo usa un singular genérico que abarca a la especie humana. En español, ‘la humanidad’ evita una lectura exclusivamente masculina y, al mismo tiempo, mantiene el alcance universal del término. Esto sigue la línea del ajuste inglés más reciente hacia un valor colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Lectura difícil de עָלַי en la cláusula final
  english_pob_reading: a burden to myself
  chosen_spanish_reading: una carga para mí mismo
  alternative_spanish_readings:
  - una carga sobre mí
  - una carga para ti
  rationale: Se conserva la lectura masorética difícil y principal del POB. ‘Para mí mismo’ refleja de manera idiomática que la carga recae sobre el propio Job, sin adoptar la variante antigua ‘para ti’, que queda solo como posibilidad secundaria en la tradición.
  doctrine_reference: Texto masorético de Job 7:20; aparato y nota inglesa sobre lectura alternativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió ‘watcher of man’ por ‘watcher of mankind’ para reflejar mejor el alcance colectivo de אדם. La versión española adopta esa misma orientación con ‘la humanidad’, y mantiene la lectura masorética difícil en la última cláusula, conservando la tensión textual indicada por el POB.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo a Dios en segunda persona singular, coherente con el hebreo.
  - Se evitó ‘SEÑOR’ porque el versículo no contiene el Tetragrámaton; la dirección del texto es a Dios implícito en el discurso de Job.
  - ‘Blanco’ se eligió como equivalente español natural de מִפְגָּע en este contexto de hostilidad y exposición al golpe.
  - La cláusula final conserva la lectura de auto-carga, sin normalizarla hacia una formulación más interpretativa.
