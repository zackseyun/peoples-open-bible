translation:
  language: es
  text: No aborrezcas[a] al edomita[b], porque él es tu hermano. No aborrezcas al egipcio, porque tú fuiste forastero[c] en su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «detestes» o «abomines» para traducir «aborrezcas».
    reason: lexical_alternative
  - marker: b
    text: «Tu hermano» se refiere al parentesco de Israel con Edom por medio de Esaú.
    reason: cross_reference
  - marker: c
    text: 'También: «residente extranjero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְתַעֵב
  english_pob_choice: abhor
  chosen_spanish: aborrezcas
  alternatives_spanish:
  - detestes
  - desprecies
  lexicon: HALOT
  rationale: El piel de תעב expresa una aversión fuerte; «aborrecer» transmite bien esa fuerza en español sin debilitarla a un simple «no gustes de». Mantiene además el paralelismo de la doble prohibición.
- source_word: אֲדֹמִי
  english_pob_choice: Edomite
  chosen_spanish: edomita
  alternatives_spanish:
  - idumeo
  lexicon: HALOT
  rationale: Se conserva el gentilicio transparente y directo para el pueblo de Edom, en línea con el nombre étnico del hebreo.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu kinsman
  lexicon: HALOT
  rationale: La forma literal mantiene el fundamento fraternal-histórico del mandato, sin suavizarlo a una relación general de parentesco.
- source_word: מִצְרִי
  english_pob_choice: Egyptian
  chosen_spanish: egipcio
  alternatives_spanish:
  - de Egipto
  lexicon: HALOT
  rationale: El gentilicio español es la correspondencia natural del hebreo y conserva la estructura paralela con «edomita».
- source_word: גֵר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero residente
  - peregrino
  lexicon: HALOT
  rationale: «Forastero» comunica en español el sentido de alguien que vive fuera de su tierra propia; evita cargar el término con una categoría legal más técnica que el contexto inmediato no exige. Se preserva la alternativa semántica de residencia extranjera en nota.
- source_word: בְאַרְצוֹ
  english_pob_choice: in his land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce con naturalidad el valor de ארץ y mantiene el vínculo con el territorio del egipcio de manera idiomática en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del mandato con una causalidad clara y natural en español, acorde con el hebreo explicativo.
theological_decisions:
- issue: Relación de Edom con Israel expresada por «hermano»
  english_pob_reading: '''Your brother'' refers to Israel''s kinship with Edom through Esau.'
  chosen_spanish_reading: «Tu hermano» conserva la referencia a la fraternidad histórica de Israel con Edom.
  alternative_spanish_readings:
  - «Tu pariente»
  - «tu hermano» interpretado de modo general
  rationale: 'La formulación literal preserva la base teológica e histórica del mandato: la prohibición se apoya en la relación genealógica con Edom, no en una mera afinidad ética general.'
  doctrine_reference: Translation philosophy §§1, 4
- issue: Singular representativo en los gentilicios
  english_pob_reading: Retain singular forms ('an Edomite,' 'an Egyptian,' 'he is your brother,' 'his land')
  chosen_spanish_reading: 'Se conservan los singulares representativos: «al edomita», «al egipcio», «él es tu hermano», «su tierra».'
  alternative_spanish_readings:
  - 'Pluralizar: «a los edomitas», «a los egipcios», «ellos son tus hermanos», «su tierra»'
  rationale: El hebreo usa formas singulares para hablar representativamente de miembros de un pueblo; el español puede reflejar esa estrategia sin perder claridad y gana precisión al mantener el patrón legal del original.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada en la pasada más reciente; esta redacción sigue la decisión estable de la POB en inglés y ajusta únicamente la formulación natural en español sin alterar el contenido fuente.
  spanish_consistency_notes:
  - Se mantuvo la repetición verbal de la prohibición para reflejar el paralelismo hebreo.
  - Se conservaron los gentilicios en singular representativo para respetar la forma legal del original.
  - «Tierra» se usa de manera coherente con ארץ y con el sufijo posesivo de tercera masculina singular.
  - La nota sobre «forastero» preserva la alternativa semántica documentada por la POB inglesa.
