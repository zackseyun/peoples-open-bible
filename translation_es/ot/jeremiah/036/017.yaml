translation:
  language: es
  text: 'Y le preguntaron a Baruc[a]: «Por favor, dinos, ¿cómo escribiste todas estas palabras según lo que él dictaba?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «de su boca»; es decir, a partir de su dictado oral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת בָּרוּךְ
  english_pob_choice: And they asked Baruch
  chosen_spanish: Y preguntaron a Baruc
  alternatives_spanish:
  - Y consultaron a Baruc
  - Y interrogaron a Baruc
  lexicon: HALOT
  rationale: El hebreo pone a Baruc como objeto directo del verbo ‘preguntaron’; el español natural conserva ese orden con ‘preguntaron a Baruc’. Se mantiene la secuencia narrativa con ‘Y’.
- source_word: שָׁאֲלוּ
  english_pob_choice: asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - pidieron
  - interrogaron
  lexicon: HALOT
  rationale: ‘Preguntar’ expresa bien el sentido común del verbo en este contexto de solicitud directa. ‘Interrogaron’ sería más fuerte de lo que el hebreo exige.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se conserva con ‘diciendo’, que refleja la estructura hebrea sin forzar una paráfrasis.
- source_word: הַגֶּד נָא
  english_pob_choice: Please tell
  chosen_spanish: Por favor, dinos
  alternatives_spanish:
  - Te rogamos, dinos
  - Por favor, cuéntanos
  lexicon: HALOT
  rationale: El imperativo cortés con נָא combina urgencia y cortesía. ‘Por favor, dinos’ es natural en español y conserva el valor rogativo del original.
- source_word: אֵיךְ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué modo
  lexicon: HALOT
  rationale: Interrogativo directo de manera; ‘cómo’ es la equivalencia más clara y fiel.
- source_word: כָּתַבְתָּ
  english_pob_choice: did you write
  chosen_spanish: escribiste
  alternatives_spanish:
  - has escrito
  - compusiste
  lexicon: HALOT
  rationale: El perfecto hebreo aquí mira a una acción concreta ya realizada. En español, el pretérito simple ‘escribiste’ es natural y preciso.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos dichos
  lexicon: HALOT
  rationale: En este contexto de dictado profético-escribal, ‘palabras’ comunica mejor el contenido oral/escrito que ‘cosas’ o ‘asuntos’.
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - desde su boca
  - a partir de su boca
  lexicon: HALOT
  rationale: La expresión hebrea es literal y señala dictado oral. En español, ‘de su boca’ conserva la imagen sin sonar demasiado rígido; el sentido de procedencia oral queda claro.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y mantiene la imagen de procedencia oral en «de su boca», alineado con la nota de auditoría inglesa que aclara el valor idiomático de la expresión.
  spanish_consistency_notes:
  - Se usa «Baruc» para el nombre propio, coherente con la transliteración española habitual.
  - Se conserva el tono reverente y directo del diálogo con «Por favor» y el plural de primera persona «dinos».
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones teológicas ajenas al verso.
  - La nota de pie de página se ancla en «de su boca» para preservar la lectura literal y el matiz de dictado.
