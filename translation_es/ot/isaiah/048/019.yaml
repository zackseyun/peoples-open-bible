translation:
  language: es
  text: Tu descendencia habría sido como la arena, y los descendientes de tu cuerpo como sus granos[a]; su nombre[b] no habría sido cortado ni destruido de delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como sus partículas' o 'como sus piedrecillas'; el hebreo se refiere a las pequeñas unidades de la arena.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente 'su nombre'; el singular puede personificar la descendencia como una línea colectiva. Otras traducciones reflejan 'su nombre' o 'el nombre de ellos'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: would have been
  chosen_spanish: habría sido
  alternatives_spanish:
  - habría sido
  - sería
  - llegó a ser
  lexicon: HALOT
  rationale: El hebreo continúa el resultado contrafactual del contexto inmediato; el perfecto condicional en español comunica mejor esa irrealidad que un pasado simple.
- source_word: כַחוֹל
  english_pob_choice: like the sand
  chosen_spanish: como la arena
  alternatives_spanish:
  - como la arena
  - como la arena fina
  - como el polvo
  lexicon: HALOT
  rationale: חוֹל denota arena; 'arena' es el equivalente natural en español y conserva la imagen de multitud incontable.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus hijos
  - tu posteridad
  lexicon: HALOT
  rationale: Aquí el sentido es genealógico. 'Descendencia' mantiene el valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: וְצֶאֱצָאֵי
  english_pob_choice: and the descendants
  chosen_spanish: y los descendientes
  alternatives_spanish:
  - y los que salen de ti
  - y tu prole
  - y tus vástagos
  lexicon: HALOT
  rationale: El sustantivo refuerza la idea de progenie que procede de una persona; 'descendientes' distingue este término del anterior sin perder paralelismo.
- source_word: מֵעֶיךָ
  english_pob_choice: from your body
  chosen_spanish: de tu cuerpo
  alternatives_spanish:
  - de tus entrañas
  - de tus lomos
  - de lo interior de ti
  lexicon: HALOT
  rationale: En contexto genealógico la expresión apunta al origen corporal de la descendencia. 'De tu cuerpo' es claro, digno y evita arcaísmos innecesarios.
- source_word: כִּמְעֹתָיו
  english_pob_choice: like its grains
  chosen_spanish: como sus granos
  alternatives_spanish:
  - como sus partículas
  - como sus piedrecillas
  - como sus granos de arena
  lexicon: HALOT
  rationale: El término se refiere a pequeñas unidades del arena; 'granos' comunica bien la pequeñez y conserva la referencia al antecedente 'arena'.
- source_word: לֹא יִכָּרֵת
  english_pob_choice: would not have been cut off
  chosen_spanish: no habría sido cortado
  alternatives_spanish:
  - no habría sido exterminado
  - no habría sido eliminado
  - no habría desaparecido
  lexicon: HALOT
  rationale: כרת en pasivo se usa para quedar cortado o extirpado; 'cortado' preserva la fuerza semítica sin sobreexplicar.
- source_word: וְלֹא יִשָּׁמֵד
  english_pob_choice: or destroyed
  chosen_spanish: ni destruido
  alternatives_spanish:
  - ni arrasado
  - ni aniquilado
  - ni borrado
  lexicon: HALOT
  rationale: שׁמד intensifica la idea de ruina total; 'destruido' es el equivalente más directo y comprensible en español.
- source_word: שְׁמוֹ
  english_pob_choice: their name / his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  - el nombre de ellos
  - su nombre colectivo
  lexicon: HALOT
  rationale: El hebreo lleva sufijo singular masculino, pero el referente es colectivo. En español, 'su nombre' preserva esa ambigüedad natural sin forzar pluralidad ni singularidad personal.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de ante mí
  - de mi rostro
  lexicon: HALOT
  rationale: La locución hebrea es idiomática; 'de delante de mí' conserva el registro solemne y reproduce bien el valor espacial/relacional del original.
theological_decisions:
- issue: Valor contrafactual de toda la cláusula
  english_pob_reading: Render the verse as an unrealized result ('would have been ... would not have been cut off').
  chosen_spanish_reading: Usar el condicional perfecto para expresar un resultado no realizado ('habría sido... no habría sido...').
  alternative_spanish_readings:
  - Usar pretérito simple ('fue... no fue...')
  - Usar futuro ('será... no será...')
  rationale: El versículo depende de la lamentación condicional previa; el español necesita marcar con claridad que se trata de una posibilidad no cumplida, no de una afirmación histórica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Número y referente de שְׁמוֹ
  english_pob_reading: Keep the singular 'his name' / later revision noted collective sense with 'their name'.
  chosen_spanish_reading: Mantener 'su nombre' en singular gramatical, con referente colectivo implícito.
  alternative_spanish_readings:
  - '''Su nombre'' entendido como singular personal'
  - '''el nombre de ellos'' para explicitar el colectivo'
  - '''su nombre'' con nota sobre el plural implícito'
  rationale: El hebreo conserva el singular; en español 'su nombre' permite reflejar esa forma y, al mismo tiempo, admite naturalmente el sentido colectivo de la descendencia.
  doctrine_reference: Translation philosophy §4, §5
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada del audit trail en cuanto al carácter contrafactual del versículo y al referente colectivo del nombre. Se conservó la imagen de abundancia ('arena') y la duplicación semítica de 'cortado' / 'destruido' sin suavizarla.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito, por lo que no aplica.
  - Se evitó 'simiente' por ser menos natural en español contemporáneo, aunque sigue siendo una alternativa válida en el campo semántico de זרע.
  - '''De delante de mí'' mantiene la idiomática hebrea y la solemnidad del cierre.'
  - '''Descendencia'' y ''descendientes'' permiten distinguir los dos sustantivos hebreos sin perder el paralelismo.'
