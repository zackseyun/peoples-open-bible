review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato secuencial, objeto de oro puro, acción de grabar sobre la pieza e inscripción dedicatoria a Yahvé. Sin embargo, «con grabado de sello» debilita el valor comparativo de פִּתּוּחֵי חֹתָם y no refleja bien el plural ni el sentido de ‘como los grabados de un sello’. Además, la nota [a] no aporta una alternativa real al texto principal porque repite «placa».'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un ajuste menor para sonar más natural y preciso en la frase artesanal: «como los grabados de un sello» funciona mejor que «con grabado de sello». También conviene eliminar la nota redundante sobre «placa» y conservar solo alternativas útiles. El resto del verso lee bien en español eclesial moderno.'
  glossary_alignment: Correcto en el uso de «Yahvé» para יהוה y en no introducir terminología ajena al proyecto. «Santo para Yahvé» es aceptable y la alternativa «Santidad para Yahvé» está bien preservada en nota. No hay conflicto con la terminología doctrinal principal.
  issues:
  - severity: medium
    issue: «con grabado de sello» no expresa con suficiente fidelidad el comparativo de פִּתּוּחֵי חֹתָם
    rationale: La frase hebrea describe el estilo del grabado, ‘como los grabados de un sello’, no simplemente un grabado perteneciente a un sello. La revisión mejora la precisión exegética y la naturalidad en español.
  - severity: low
    issue: La nota [a] es redundante y poco útil
    rationale: El texto principal ya usa «placa», y la nota comienza con la misma palabra como si fuera alternativa. Las alternativas verdaderas pueden conservarse sin repetir el término principal.
  revised_spanish_text: 'Y harás una placa de oro puro[a], y grabarás sobre ella, como los grabados de un sello: «Santo para Yahvé[b]».'
  revised_footnotes:
  - marker: a
    text: También puede entenderse como «lámina» u «ornamento frontal».
    reason: lexical_alternative
  - marker: b
    text: 'O: «Santidad para Yahvé».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de técnica artesanal para reflejar mejor el comparativo hebreo y el plural implícito en ‘grabados de un sello’, y se limpia una nota redundante para dejar solo alternativas léxicas útiles. Se mantiene «Yahvé» y la fórmula inscrita «Santo para Yahvé» con la alternativa tradicional en nota.
