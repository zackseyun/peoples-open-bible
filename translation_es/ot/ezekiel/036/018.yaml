translation:
  language: es
  text: Así que derramé mi ira sobre ellos, por la sangre que habían derramado en la tierra, y porque la habían profanado con sus ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término fuertemente despectivo para los ídolos; algunas traducciones intentan reflejar más explícitamente ese matiz peyorativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁפֹּךְ
  english_pob_choice: I poured out
  chosen_spanish: derramé
  alternatives_spanish:
  - vertí
  - derramé hacia fuera
  lexicon: HALOT
  rationale: El verbo hebreo שׁפךְ conserva la imagen de un derramamiento, y en español "derramé" expresa con naturalidad tanto el acto literal como la metáfora judicial de la ira divina.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi indignación
  lexicon: HALOT
  rationale: '"Ira" comunica bien el juicio divino en español; mantiene el tono solemne sin sonar excesivamente coloquial. Se conserva la fuerza de juicio de חֵמָה sin suavizarla a mera molestia.'
- source_word: עֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: HALOT
  rationale: '"Sobre ellos" reproduce el movimiento de la ira derramada encima de los culpables y mantiene la imagen espacial del original.'
- source_word: עַל הַדָּם אֲשֶׁר שָׁפְכוּ
  english_pob_choice: for the blood that they had poured out
  chosen_spanish: por la sangre que habían derramado
  alternatives_spanish:
  - a causa de la sangre que habían derramado
  - por la sangre que habían vertido
  lexicon: HALOT
  rationale: '"Derramado" preserva la repetición verbal con וָאֶשְׁפֹּךְ / שָׁפְכוּ y evita perder el juego léxico del hebreo. "Por la sangre" refleja la relación causal del sintagma preposicional.'
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: En este contexto profético, "tierra" transmite con claridad el ámbito territorial afectado y permite conservar la imagen de sangre derramada sobre el suelo/territorio.
- source_word: וּבְגִלּוּלֵיהֶם
  english_pob_choice: with their idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - por medio de sus ídolos
  - con sus imágenes detestables
  lexicon: HALOT
  rationale: Se conserva "ídolos" como término claro y fiel; el hebreo גִּלּוּלִים tiene fuerza despectiva, pero en español no se fuerza un equivalente grotesco en el texto principal. La nota preserva esa carga peyorativa.
- source_word: טִמְּאוּהָ
  english_pob_choice: they had defiled it
  chosen_spanish: la habían profanado
  alternatives_spanish:
  - la habían contaminado
  - la habían hecho impura
  lexicon: HALOT
  rationale: '"Profanado" comunica bien la contaminación cultual y moral de la tierra en lenguaje bíblico español, y mantiene el objeto directo femenino referido a la tierra.'
theological_decisions:
- issue: Naturaleza de la respuesta divina
  english_pob_reading: 'Rendered חֲמָתִי as ''my wrath'' and kept the causal grounds explicit: bloodshed and idolatrous defilement of the land.'
  chosen_spanish_reading: 'Se expresa como un acto justo de juicio: Dios derrama su ira por la sangre derramada y por la profanación idolátrica de la tierra.'
  alternative_spanish_readings:
  - mi furor
  - mi indignación
  rationale: El versículo presenta una respuesta judicial y pactual, no un arrebato emocional. "Ira" conserva la solemnidad del juicio divino y deja visibles las dos razones dadas en el texto hebreo.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Alcance de הָאָרֶץ
  english_pob_reading: Translated as 'the land' rather than 'the earth.'
  chosen_spanish_reading: '"La tierra" se entiende como el territorio pactal, no como todo el planeta.'
  alternative_spanish_readings:
  - la tierra
  - el país
  rationale: En Ezequiel el contexto apunta a la tierra de Israel como espacio profanado por sangre e idolatría. "La tierra" es natural en español y evita ampliar indebidamente el alcance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza despectiva de גִּלּוּלִים
  english_pob_reading: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; some renderings try to reflect this pejorative force more explicitly.
  chosen_spanish_reading: Se mantiene "ídolos" en el texto principal y se preserva la fuerza despectiva en nota.
  alternative_spanish_readings:
  - imágenes detestables
  - ídolos repugnantes
  rationale: El español puede sonar forzado si intenta imitar literalmente la injuria del hebreo; por eso se prioriza la claridad y se documenta el matiz en nota, sin borrar la carga polémica del término.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés que cambió "because" por "and because" para reflejar con mayor claridad el paralelismo de las dos frases causales hebreas. En español se conserva ese paralelismo con "por... y porque...".
  spanish_consistency_notes:
  - Se mantiene "Yahvé" en lugar de un eufemismo de título divino cuando el hebreo usa el nombre divino; en este versículo no aparece explícitamente.
  - 'Se evita reemplazar el doble eco verbal del hebreo por un sinónimo distinto: "derramé" / "derramado" preserva la repetición de שׁפךְ.'
  - '"La tierra" se usa con sentido territorial pactual, coherente con el contexto de Ezequiel.'
  - '"Profanado" se prefiere a "contaminado" porque comunica mejor la impureza cultual y moral del pasaje.'
