translation:
  language: es
  text: 'Entonces dijo Miqueas[a]: «Ahora sé que Yahvé me hará bien, porque tengo un levita como sacerdote».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el levita como sacerdote». El hebreo tiene el artículo («el levita»), que puede referirse al levita específico ya mencionado; sin embargo, en español el texto principal suena más natural con «un levita» en esta construcción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Y entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces dijo» conserva la secuencia de forma natural en español sin perder el enlace narrativo.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Miqueas
  alternatives_spanish:
  - Micah
  lexicon: convención bíblica española
  rationale: En español bíblico, el nombre se adapta como «Miqueas», forma reconocible y estable en el canon, manteniendo la identificación del personaje.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Pues ahora
  lexicon: HALOT
  rationale: Marca la conclusión inmediata de Miqueas; «Ahora» expresa de modo claro el valor temporal y discursivo.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - me doy cuenta
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una certeza presente; «sé» comunica bien el estado resultante de su conclusión.
- source_word: יֵיטִיב
  english_pob_choice: will do good
  chosen_spanish: me hará bien
  alternatives_spanish:
  - me tratará bien
  - hará el bien para mí
  lexicon: HALOT
  rationale: La forma causativa de יטב expresa hacer bien/tratar bien. En español, «me hará bien» conserva la fuerza relacional y la idea de beneficio sin sobreinterpretar prosperidad material.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: tradición POB para el nombre divino
  rationale: Se conserva el nombre propio del Tetragrámaton como «Yahvé», en línea con el criterio del proyecto de no sustituirlo por un título.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El complemento dativo funciona como beneficiario; en español, «me» es la forma más natural tras «hará bien».
- source_word: הָיָה לִי
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - me ha quedado
  - lo tengo
  lexicon: HALOT
  rationale: La construcción idiomática hebrea expresa posesión o tenencia; «tengo» comunica de manera natural el sentido de posesión efectiva.
- source_word: הַלֵּוִי
  english_pob_choice: a Levite / the Levite
  chosen_spanish: al levita
  alternatives_spanish:
  - un levita
  - el levita
  lexicon: HALOT
  rationale: El artículo hebreo puede ser específico o genérico; tras «tengo» y en función de oficio, español fluido pide «al levita», que puede oírse como referencia al levita ya presente y además evita una construcción forzada.
- source_word: לְכֹהֵן
  english_pob_choice: as priest
  chosen_spanish: como sacerdote
  alternatives_spanish:
  - para sacerdote
  - de sacerdote
  lexicon: HALOT
  rationale: La lamed indica función/rol; «como sacerdote» mantiene el valor funcional en un español natural y claro.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso usa יְהוָה directamente; la forma española elegida conserva el nombre propio revelado y evita el sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia al oficio levítico
  english_pob_reading: a Levite / the Levite as priest
  chosen_spanish_reading: al levita como sacerdote
  alternative_spanish_readings:
  - un levita como sacerdote
  - el levita como sacerdote
  rationale: 'El hebreo lleva artículo con הַלֵּוִי, pero el contexto admite tanto especificidad como valor genérico. La redacción española conserva esa tensión sin resolverla de forma excesiva: Miqueas se apoya en el estatus levítico del hombre para su función sacerdotal.'
  doctrine_reference: Notas lexicográficas del pasaje y auditoría inglesa POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo cruzado indicó alto acuerdo; por ello, el borrador español sigue de cerca la lectura auditada sin añadir matices no respaldados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «levita» y «sacerdote» en registro bíblico neutro y contemporáneo.
  - La puntuación y el uso de comillas angulares siguen normas editoriales españolas.
  - La nota al pie preserva la tensión del artículo hebreo sin imponer una sola solución interpretativa.
