translation:
  language: es
  text: Sus hijos no echarán raíz[a], y sus ramas no darán fruto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus hijos no echarán raíz». El griego literalmente dice «no se extenderán hacia una raíz», una imagen botánica idiomática para no llegar a establecerse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ διαδώσουσιν
  english_pob_choice: will not take root / will spread out
  chosen_spanish: no echarán raíz
  alternatives_spanish:
  - no se extenderán
  - no se propagarán
  lexicon: LSJ
  rationale: El griego expresa una imagen vegetal de expansión o establecimiento frustrado. En español, «echar raíz» comunica de manera natural esa idea de no llegar a establecerse, preservando la metáfora sin forzar un calco como «extenderse hacia una raíz».
- source_word: τὰ τέκνα αὐτῆς
  english_pob_choice: Her children
  chosen_spanish: Sus hijos
  alternatives_spanish:
  - Su descendencia
  - Sus retoños
  lexicon: LSJ
  rationale: τέκνα puede ser «hijos» u «offspring». «Sus hijos» es claro y mantiene el parentesco metafórico del pasaje; «descendencia» sería más general, pero menos directo.
- source_word: εἰς ῥίζαν
  english_pob_choice: into a root
  chosen_spanish: raíz
  alternatives_spanish:
  - en raíz
  - hasta echar raíz
  lexicon: LSJ
  rationale: La frase griega es comprimida e idiomática. En español, el sentido se comunica mejor con el verbo «echar raíz», que conserva la imagen botánica y evita una formulación artificial.
- source_word: οἱ κλάδοι αὐτῆς
  english_pob_choice: her branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus bástagos
  lexicon: LSJ
  rationale: κλάδοι son «ramas» o brotes. «Ramas» es la equivalencia más natural y transparente en español, y mantiene el paralelo vegetal del versículo.
- source_word: οὐ δώσουσιν καρπόν
  english_pob_choice: will not bear fruit
  chosen_spanish: no darán fruto
  alternatives_spanish:
  - no producirán fruto
  - no llevarán fruto
  lexicon: LSJ
  rationale: Aunque el verbo griego es literalmente «dar», en español bíblico y moderno «dar fruto» es idiomático y fiel a la imagen agrícola. «No darán fruto» conserva el sentido sin añadir explicación.
theological_decisions:
- issue: La imagen de juicio mediante metáfora botánica sin explicitar más de lo que dice el verso
  english_pob_reading: Retain the familial and botanical imagery without explicating the moral consequence beyond the verse itself.
  chosen_spanish_reading: Conservar la imagen familiar y botánica sin desarrollar una explicación moral adicional.
  alternative_spanish_readings:
  - Sus hijos no prosperarán y su linaje quedará estéril
  - No echarán raíces porque están bajo juicio
  rationale: El griego presenta el resultado en imagen vegetal; la traducción no debe convertirlo en paráfrasis doctrinal ni añadir una glosa interpretativa no presente en el texto. Así se preserva la tensión del proverbio/oráculo dentro de su propia forma.
  doctrine_reference: Principios de equivalencia óptima y de no sobreexplicar la metáfora del texto fuente
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que pasó de una forma más literal («se extenderán hacia una raíz») a «echarán raíz» por naturalidad y mejor correspondencia con εἰς ῥίζαν, sin perder la metáfora vegetal.
  spanish_consistency_notes:
  - Se prefirió «hijos» para τέκνα, en línea con el valor familiar directo del término y con una lectura natural en español.
  - Se mantuvo el paralelismo vegetal «raíz / ramas / fruto» para reproducir la estructura del griego.
  - Se evitó «Cristo», «Señor» u otras terminologías no pertinentes al versículo.
  - La nota al pie preserva la alternativa literal del griego sin duplicar indebidamente el sentido principal del texto.
