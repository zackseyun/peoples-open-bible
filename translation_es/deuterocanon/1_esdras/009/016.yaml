revisions:
- from: Y Esdras el sacerdote seleccionó para sí hombres, jefes de sus casas paternas, todos designados por nombre, y se congregaron el primer día del décimo mes para examinar el asunto.
  to: Y Esdras el sacerdote seleccionó para sí hombres, jefes de sus casas paternas, todos designados por su nombre, y se congregaron el primer día[a] del décimo mes para examinar el asunto.
  rationale: Se conserva la traducción base por ser fiel al griego, pero se hace una mejora menor de naturalidad en «por su nombre» y se añade la nota necesaria para preservar la alternativa literal de νουμηνία ya documentada en el expediente inglés.
