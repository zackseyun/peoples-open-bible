revisions:
- from: Así fue terminada toda la obra que el rey Salomón hizo para la casa de Yahvé. Y Salomón hizo entrar las cosas consagradas de David, su padre[a], el plata, el oro y los utensilios, y los puso en los tesoros de la casa de Yahvé.
  to: 'Así quedó terminada toda la obra que el rey Salomón hizo para la casa de Yahvé. Y Salomón trajo las cosas consagradas[a] de David, su padre: la plata, el oro y los utensilios; y los puso en las tesorerías de la casa de Yahvé.'
  rationale: La revisión corrige el error gramatical 'el plata', mejora la naturalidad de וַיָּבֵא con 'trajo', y ajusta אֹצְרוֹת a 'tesorerías', que representa mejor los lugares de almacenamiento del templo. También se reubica el marcador de nota al sintagma que realmente recibe la alternativa léxica. Se conserva 'casa de Yahvé' y 'cosas consagradas' por fidelidad al hebreo y a la política terminológica del proyecto.
