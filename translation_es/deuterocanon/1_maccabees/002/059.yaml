translation:
  language: es
  text: Hananías[a], Azarías y Misael, habiendo creído[b], fueron librados de la llama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Ananías, Azarías, Misael». La traducción usa las formas hebreas más reconocibles, «Hananías, Azarías y Misael», para identificar a los tres jóvenes de Daniel 3.'
    reason: lexical_alternative
  - marker: b
    text: O «por haber creído»; también, «fueron salvados de la llama» o «fueron rescatados de la llama».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀνανίας, Ἀζαρίας, Μισαήλ
  english_pob_choice: Hananiah, Azariah, and Mishael
  chosen_spanish: Ananías, Azarías y Misael
  alternatives_spanish:
  - Hananías, Azarías y Misael
  - Ananías, Azarías y Misael
  lexicon: N/A
  rationale: Se conservan los nombres propios en forma reconocible para el lector español, siguiendo de cerca la forma griega. «Ananías» y «Misael» reflejan la transliteración directa, mientras que «Azarías» mantiene la forma bíblica habitual en español.
- source_word: πιστεύσαντες
  english_pob_choice: having believed
  chosen_spanish: habiendo creído
  alternatives_spanish:
  - después de haber creído
  - por haber creído
  - habiendo confiado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa o concomitante respecto del verbo principal. «Habiendo creído» mantiene esa relación participial sin convertirla en una causalidad más explícita de la que el griego exige.
- source_word: ἐσώθησαν
  english_pob_choice: were saved
  chosen_spanish: fueron librados
  alternatives_spanish:
  - fueron salvados
  - fueron rescatados
  - fueron librados
  lexicon: BDAG
  rationale: Aunque el inglés POB mantiene «were saved», en español «salvados» puede sonar más abstracto o teológico; aquí el contexto narrativo de rescate del fuego hace más natural y fiel «fueron librados», sin perder la fuerza del pasivo de σῴζω.
- source_word: ἐκ φλογός
  english_pob_choice: from the flame
  chosen_spanish: de la llama
  alternatives_spanish:
  - del fuego
  - de la llama
  - del incendio
  lexicon: LSJ
  rationale: φλόξ significa «llama» o «fuego ardiente». «De la llama» conserva la imagen singular y vívida del griego, evitando ampliar el sentido a «incendio», que sería más interpretativo.
theological_decisions:
- issue: Relación entre πιστεύσαντες y ἐσώθησαν
  english_pob_reading: having believed, were saved from the flame
  chosen_spanish_reading: habiendo creído, fueron librados de la llama
  alternative_spanish_readings:
  - porque creyeron, fueron librados de la llama
  - por haber creído, fueron librados de la llama
  rationale: El griego presenta el creer como participio que antecede o acompaña al verbo principal. «Habiendo creído» preserva mejor esa estructura que una causalidad explícita. «Fueron librados» expresa aquí el rescate concreto del peligro, en consonancia con el valor narrativo de σῴζω.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 3; Contested terms: πίστις'
translation_notes:
  revision_awareness: El control de revisión en inglés sustituyó una causalidad más explícita («because they believed») por una forma participial más cercana al griego («having believed»). La versión española sigue esa decisión al usar «habiendo creído», manteniendo la relación verbal sin añadir una explicación causal no exigida por el texto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico sobrio y directo, adecuado para una cita breve y narrativa.
  - «Librados» se prefiere aquí por el contexto de rescate físico, aunque «salvados» sigue siendo una alternativa semántica válida.
