translation:
  language: es
  text: Una oración del afligido[a], cuando desfallece[b] y derrama su lamento[c] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «del pobre». «Afligido» se prefiere aquí porque refleja mejor el sentido de alguien que sufre u opresión, sin reducirlo solo a la pobreza económica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando es abrumado». El hebreo también puede expresar la idea de estar sobrecogido o desfallecer.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «su queja» o «su meditación». El hebreo שִׂיחַ puede referirse a lamento, queja o meditación; aquí se prefiere «lamento» por el contexto de aflicción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Una oración
  alternatives_spanish:
  - Oración
  lexicon: HALOT
  rationale: En un encabezado poético, el sustantivo indefinido en español fluye naturalmente como «Una oración», conservando el carácter de título sin forzar una estructura más literal que en español sonaría áspera.
- source_word: לְעָנִי
  english_pob_choice: of the afflicted one
  chosen_spanish: del afligido[a]
  alternatives_spanish:
  - del afligido
  - del pobre
  - del atribulado
  lexicon: HALOT
  rationale: «Afligido» preserva el matiz de uno que sufre o es oprimido, y «del» refleja bien el valor relacional del prefijo לְ en un título. Se evita especificar género por fidelidad al ajuste revisado del audit trail.
- source_word: כִּי יַעֲטֹף
  english_pob_choice: when he grows faint
  chosen_spanish: cuando desfallece
  alternatives_spanish:
  - cuando se siente abatido
  - cuando se rinde
  - cuando se agota
  lexicon: HALOT
  rationale: El verbo admite la idea de debilitarse, desmayar o quedar exhausto. «Desfallece» comunica de forma clara y natural la condición de extrema debilidad sin introducir una interpretación más fuerte de la necesaria.
- source_word: וְלִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto. «Delante de» reproduce bien el valor relacional de לִפְנֵי y suena idiomático en español.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - derrama fuera
  - vacía
  - expresa
  lexicon: HALOT
  rationale: El verbo conserva la imagen de verter lo interior. «Derrama» es la forma más natural en español para hablar de una queja o lamento puesto delante de Dios.
- source_word: שִׂיחוֹ
  english_pob_choice: his complaint
  chosen_spanish: su lamento[b]
  alternatives_spanish:
  - su queja
  - su meditación
  - su lamentación
  lexicon: HALOT
  rationale: Aunque «queja» es posible, en un encabezado de oración afligida «lamento» captura mejor el tono de dolor y súplica. Se conserva la tensión semántica de שִׂיחַ, que puede oscilar entre meditación, queja o lamento, mediante nota textual.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: El texto fuente usa directamente el Tetragrámaton. En la norma del proyecto, se traduce como «Yahvé» para preservar el nombre pactual en el texto principal y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de שִׂיחוֹ en un encabezado de salmo
  english_pob_reading: his complaint
  chosen_spanish_reading: su lamento
  alternative_spanish_readings:
  - su queja
  - su meditación
  - su lamentación
  rationale: El contexto de un salmo de aflicción favorece la lectura de lamento/queja más que una meditación neutral. «Lamento» preserva el tono devocional y doloroso sin cancelar la ambigüedad semántica del hebreo.
  doctrine_reference: HALOT, entrada שִׂיחַ
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase inicial de «afflicted man» a «afflicted one» para evitar especificar género innecesariamente. La versión española sigue esa revisión con «el afligido» y, por estilo, lo integra en una estructura nominal breve propia de un encabezado poético. También se conserva la decisión doctrinal de traducir יְהוָה como el nombre propio divino y no como una sustitución de tipo litúrgico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se usa «afligido» en lugar de «pobre» para conservar el matiz de sufrimiento/opresión presente en עָנִי.
  - «Desfallece» comunica una debilidad creciente sin añadir contenido emocional no garantizado por el hebreo.
  - «Lamento» se elige por naturalidad en español, pero la nota conserva la amplitud semántica de שִׂיחוֹ.
