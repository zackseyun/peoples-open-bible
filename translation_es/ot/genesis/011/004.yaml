translation:
  language: es
  text: 'Y dijeron: «Vamos, edifiquemos para nosotros una ciudad y una torre, con su cima en los cielos[a], y hagámonos un nombre, para que no seamos dispersados[b] sobre la faz de toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con su cima alcanzando los cielos». El hebreo dice literalmente «con su cima en los cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no seamos esparcidos sobre la faz de toda la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vamos
  - Vamos ahora
  lexicon: HALOT
  rationale: La interjección hortativa invita a la acción conjunta. En español, «Vengan» transmite con naturalidad ese llamado sin añadir énfasis que el hebreo no explicita.
- source_word: נִבְנֶה לָּנוּ
  english_pob_choice: let us build for ourselves
  chosen_spanish: edifiquemos para nosotros
  alternatives_spanish:
  - construyamos para nosotros
  - edifiquemos para nosotros mismos
  lexicon: HALOT
  rationale: El cohortativo expresa exhortación o resolución colectiva. «Edifiquemos» conserva ese tono; «para nosotros» refleja bien לָּנוּ con una formulación natural en español.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - una villa
  - un poblado
  lexicon: HALOT
  rationale: «Ciudad» es el equivalente estándar y más fiel al alcance narrativo del término en este contexto.
- source_word: מִגְדָּל
  english_pob_choice: tower
  chosen_spanish: una torre
  alternatives_spanish:
  - una torre fortificada
  lexicon: HALOT
  rationale: El sentido básico es «torre». No hay en el contexto inmediato base suficiente para especificar una función militar.
- source_word: וְרֹאשׁוֹ בַשָּׁמַיִם
  english_pob_choice: with its top in the heavens
  chosen_spanish: con su cima en los cielos
  alternatives_spanish:
  - con su cima en el cielo
  - y su cima en los cielos
  - con su punta en los cielos
  lexicon: HALOT
  rationale: «Cima» transmite bien la idea de רֹאשׁ como parte superior. «En los cielos» conserva la imagen plural del hebreo שָּׁמַיִם; «con» funciona mejor que un calco más rígido en español.
- source_word: וְנַעֲשֶׂה לָּנוּ שֵׁם
  english_pob_choice: and let us make a name for ourselves
  chosen_spanish: y hagámonos un nombre
  alternatives_spanish:
  - y hagamos para nosotros un nombre
  - y hagámonos una fama
  lexicon: HALOT
  rationale: El español bíblico natural usa con frecuencia «hacerse un nombre». Mantiene la fuerza idiomática y la resonancia literaria del hebreo mejor que una paráfrasis como «una fama».
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: פֶּן introduce un resultado temido o una finalidad negativa. En español, «para que no» expresa bien esa relación sin sonar arcaico.
- source_word: נָפוּץ
  english_pob_choice: we be scattered
  chosen_spanish: seamos dispersados
  alternatives_spanish:
  - seamos esparcidos
  - seamos dispersos
  lexicon: HALOT
  rationale: «Dispersados» conserva el sentido pasivo de ser esparcidos por fuera. Aunque «esparcidos» también es posible, «dispersados» suena más natural en registro bíblico actual.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: over the face of the whole earth
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - sobre la superficie de toda la tierra
  - por toda la faz de la tierra
  lexicon: HALOT
  rationale: «Sobre la faz de» preserva el giro hebreo עַל־פְּנֵי y su tono literario. «Tierra» comunica mejor el alcance mundial del contexto que «país» o «territorio».
theological_decisions:
- issue: Alcance de הָאָרֶץ en el relato de Babel
  english_pob_reading: earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: En el marco de Génesis 11, el contraste es entre una humanidad unida en un solo lugar y su dispersión mundial. «Toda la tierra» preserva ese alcance universal mejor que una lectura local.
  doctrine_reference: Génesis 11:1-9; coherencia narrativa del relato primeval
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó לָּנוּ de «build ourselves» a «build for ourselves» por mayor naturalidad y precisión formal; por eso el español usa «edifiquemos para nosotros» y evita un reflexivo más fuerte. También se conservó la decisión revisada de mantener «cima en los cielos» y «sobre la faz de toda la tierra».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - Se mantiene «dispersados» para reproducir el matiz pasivo de נָפוּץ.
  - «Cielos» en plural sigue el valor morfológico de שָׁמַיִם y la redacción auditada del POB inglés.
