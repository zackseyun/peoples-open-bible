translation:
  language: es
  text: Y lo reprochó por haber deseado su reino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo culpó por codiciar su reino». El verbo griego puede tener aquí el sentido más fuerte de «codiciar» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐψόγισεν
  english_pob_choice: reproached
  chosen_spanish: lo reprochó
  alternatives_spanish:
  - lo culpó
  - lo censuró
  - lo reprendió
  lexicon: LSJ
  rationale: ψογίζω expresa censurar, culpar o reprochar. «Lo reprochó» conserva el tono personal y acusatorio del griego sin intensificarlo indebidamente a una reprensión formal o judicial.
- source_word: χάριν τοῦ
  english_pob_choice: because
  chosen_spanish: por haber
  alternatives_spanish:
  - porque
  - a causa de
  - debido a que
  lexicon: LSJ
  rationale: La construcción con χάριν y el infinitivo articular indica causa o motivo. En español, «por haber» reproduce de manera natural la relación causal con un matiz verbal compacto y fiel al original.
- source_word: ἐπιθυμῆσαι
  english_pob_choice: desired
  chosen_spanish: haber deseado
  alternatives_spanish:
  - haber codiciado
  - haber ambicionado
  - haber anhelado
  lexicon: LSJ
  rationale: ἐπιθυμέω puede ser un deseo neutral o, en contexto, una aspiración más fuerte. «Haber deseado» mantiene la cercanía al griego y deja que el contexto político sugiera el peso negativo; «codiciado» sería más interpretativo.
- source_word: τῆς βασιλείας
  english_pob_choice: kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reino real
  - su realeza
  - su soberanía
  lexicon: LSJ
  rationale: βασιλεία suele significar reino o dominio real. «Reino» es el equivalente más directo e inteligible en español bíblico; el posesivo refleja la misma relación de pertenencia expresada por el griego.
- source_word: αὐτοῦ ... αὐτοῦ
  english_pob_choice: him ... his
  chosen_spanish: lo ... su
  alternatives_spanish:
  - le ... su
  - a él ... su
  lexicon: Greek grammar
  rationale: 'El griego repite pronombres para una relación compacta: uno reprocha a otro porque desea su reino. El español conserva esa relación con «lo» y «su», sin aclarar más de lo que el texto permite.'
translation_notes:
  revision_awareness: El texto griego es breve y directo; la versión española sigue de cerca la estructura causal y mantiene la ambigüedad/prudencia léxica del verbo de deseo, tal como refleja la nota inglesa sobre la posible fuerza de «coveted». No se aplicaron revisiones previas.
  spanish_consistency_notes:
  - Se mantiene «reino» para βασιλεία, en armonía con el uso bíblico habitual y con la decisión inglesa auditada.
  - Se evita «Mesías», «Cristo» u այլ terminología no pertinente al versículo.
  - La nota al pie preserva la alternativa fuerte «codiciar» porque la auditoría inglesa también conservó esa tensión léxica.
