translation:
  language: es
  text: Él es tu alabanza[a], y él es tu Dios, que ha hecho por ti estas cosas grandes y asombrosas[b], que tus ojos han visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «él es aquel a quien alabas» o «él es tu motivo de orgullo». El hebreo dice literalmente: «Él es tu alabanza».'
    reason: lexical_alternative
  - marker: b
    text: O «temibles» o «terribles». El término hebreo designa hechos que producen temor y asombro reverente.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְהִלָּתְךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - el que tú alabas
  - tu motivo de alabanza
  - tu gloria
  lexicon: HALOT
  rationale: La construcción predicativa hebrea se mantiene con una frase nominal breve y directa. «Alabanza» conserva el valor de תְהִלָּה como aquello que corresponde al reconocimiento de Dios; evita volverlo demasiado explicativo como «el que tú alabas», que suaviza la concisión del hebreo.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: La forma posesiva directa reproduce el lenguaje de pacto y la dirección personal del hebreo, sin introducir formulaciones más interpretativas.
- source_word: עָשָׂה אִתְּךָ
  english_pob_choice: has done for you
  chosen_spanish: ha hecho contigo
  alternatives_spanish:
  - ha hecho por ti
  - ha obrado para ti
  - ha tratado contigo
  lexicon: HALOT
  rationale: En español, «ha hecho contigo» conserva con mayor cercanía la idiomaticidad básica de עשה עם/את. Aunque «ha hecho por ti» explicita el sentido benefactivo, aquí se prefiere una redacción menos interpretativa para no perder la tensión del hebreo; el contexto de las acciones salvadoras aclara el valor benefactivo.
- source_word: הַגְּדֹלֹת
  english_pob_choice: great things
  chosen_spanish: cosas grandes
  alternatives_spanish:
  - grandes cosas
  - cosas poderosas
  - obras grandes
  lexicon: HALOT
  rationale: El sustantivo está elíptico en hebreo. «Cosas grandes» sigue el orden y la relación adjetival de forma natural en español, sin restringir el matiz a «poderosas».
- source_word: הַנּוֹרָאוֹת
  english_pob_choice: awe-inspiring things
  chosen_spanish: asombrosas
  alternatives_spanish:
  - temibles
  - que inspiran temor
  - terribles
  lexicon: HALOT
  rationale: «Asombrosas» comunica el campo de temor reverente y maravilla del hebreo en un español contemporáneo y digno. Se evita «terribles» por su posible valor negativo excesivo; «temibles» conservaría mejor el temor, pero sonaría más oscuro que el contexto busca.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - éstas
  - dichas
  lexicon: HALOT
  rationale: El demostrativo inmediato se vierte con «estas» para conservar la cercanía referencial del hebreo.
- source_word: רָאוּ עֵינֶיךָ
  english_pob_choice: your eyes have seen
  chosen_spanish: tus ojos han visto
  alternatives_spanish:
  - tus propios ojos han visto
  - has visto con tus ojos
  - tus ojos vieron
  lexicon: HALOT
  rationale: Se mantiene el énfasis hebreo en la evidencia ocular con una expresión natural en español. «Tus ojos han visto» reproduce la imagen sin recargarla.
theological_decisions:
- issue: La frase predicativa הוּא תְהִלָּתְךָ
  english_pob_reading: He is your praise
  chosen_spanish_reading: Él es tu alabanza
  alternative_spanish_readings:
  - Él es el que tú alabas
  - Él es tu gloria
  rationale: 'Se preserva la tensión teológica del hebreo: Dios no solo recibe alabanza, sino que él mismo es la base y contenido de esa alabanza. «Tu alabanza» mantiene la densidad de la expresión sin convertirla en paráfrasis explicativa.'
  doctrine_reference: Translation philosophy §3, §6
- issue: El valor de הַנּוֹרָאוֹת
  english_pob_reading: awe-inspiring things
  chosen_spanish_reading: cosas asombrosas
  alternative_spanish_readings:
  - cosas temibles
  - cosas terribles
  rationale: El contexto habla de actos divinos que generan temor reverente y maravilla. «Asombrosas» conserva esa mezcla sin reducirla a simple espectacularidad ni cargarla de una severidad que el contexto inmediato no exige.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto sigue de cerca el patrón del hebreo y la solución auditada de la POB en inglés. Se conservó la estructura repetida «Él es... y él es...», el predicado nominal con תְהִלָּתְךָ, el valor benefactivo/relacional de עשה אִתְּךָ sin sobrerinterpretarlo, y el contraste semántico entre «grandes» y «asombrosas». No hubo revisiones previas aplicadas en el registro inglés; la versión española mantiene esa lectura base con equivalencias naturales.
  spanish_consistency_notes:
  - Se usa «alabanza» para תְהִלָּה, evitando «gloria» salvo donde el contexto lo requiriera con más fuerza poética.
  - Se mantiene «Dios» para אֱלֹהֶיךָ y no se sustituye por una perífrasis confesional.
  - «Ha hecho contigo» conserva la cercanía formal al hebreo; el contexto del versículo justifica leerlo en sentido benefactivo sin necesidad de añadirlo en el texto principal.
  - «Asombrosas» busca un registro reverente y no coloquial; evita el falso amigo «awesome».
