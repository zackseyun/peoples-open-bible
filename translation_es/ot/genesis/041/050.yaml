    text: Or 'the year of the famine came.' The Hebrew has the singular 'year' here, referring to the onset of the famine period.
    reason: lexical_alternative
  - marker: b
    text: On was an Egyptian city, later known in Greek as Heliopolis.
    reason: cultural_note
