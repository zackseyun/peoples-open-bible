    ܕܝܢ ܐܙܠ ܥܡ ܥܡܐ܂

    ܐܢܐ ܕܝܢ ܒܪܘܟ ܐܦܩܬ

    ܐܢܘܢ܂ ܘܝܬܒܬ ܩܕܡ

    ܬܪ̈ܥܘܗܝ ܕܗܝܟܠܐ ܘܐܠܝܬ

    ܐܠܝܬܐ ܗܕܐ ܥܠ

    ܨܗܝܘܢ ܘܐܡܪܬ܆ ܛܘܒܘܗܝ

    ܠܗܘ ܕܠܐ ܐܬܝܠܕ܂ ܐܘ

    ܠܗܘ ܕܐܬܝܠܕ ܘܡܝܬ܂

    ܠܢ ܕܝܢ ܠܐܝܠܝܢ ܕܚܝ̈ܝܢ ܚܙ

    ܠܢ܂ ܕܚ̈ܙܝܢܢ ܒܩ̈ܠܢܐ ܕܨܗܝܘܢ܂

    ܘܡܕܡ ܕܓܕܫܗ ܠܐܘܪܫܠܡ܂

    ܐܩܪܐ ܠܣܝܪ̈ܝܢܘܣ ܡܢ

