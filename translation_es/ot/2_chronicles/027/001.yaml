translation:
  language: es
  text: Jotam tenía veinticinco años cuando comenzó a reinar, y reinó dieciséis años en Jerusalén. El nombre de su madre era Jerusá, hija de Sadoc.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: was twenty-five years old
  chosen_spanish: tenía veinticinco años
  alternatives_spanish:
  - era de veinticinco años
  - era un hijo de veinticinco años
  lexicon: HALOT
  rationale: La fórmula hebrea de edad se expresa de manera natural en español con 'tenía veinticinco años', conservando el valor idiomático sin volverla demasiado literal.
- source_word: בְּמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - al comenzar a reinar
  lexicon: HALOT
  rationale: El giro con ב marca el momento de la entronización. 'Comenzó a reinar' mantiene la idea de inicio del reinado de forma clara y fiel.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo indica ejercer la realeza, no solo portar el título; 'reinó' conserva ese sentido de manera directa.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se vierte de forma directa y natural en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Conserva la fórmula genealógica del hebreo. Se prefirió la construcción nominal porque refleja mejor el patrón del texto fuente.
- source_word: יְרוּשָׁה
  english_pob_choice: Jerushah
  chosen_spanish: Yerusá
  alternatives_spanish:
  - Jerusá
  - Yerushá
  lexicon: HALOT
  rationale: Se translitera el nombre propio con ortografía española estable y pronunciable, manteniendo la identificación nominal del original.
- source_word: בַּת צָדוֹק
  english_pob_choice: daughter of Zadok
  chosen_spanish: hija de Zadoc
  alternatives_spanish:
  - descendiente de Zadoc
  - hija de Sadoc
  lexicon: HALOT
  rationale: La relación filial se expresa con 'hija de', siguiendo el valor genealógico del hebreo. 'Zadoc' mantiene la transliteración del nombre propio tal como aparece en el registro base.
translation_notes:
  revision_awareness: No hay notas textuales ni revisiones aplicadas en el expediente inglés; el hebreo y la traducción inglesa concuerdan estrechamente, por lo que la versión española sigue la misma lectura sin introducir variantes.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio del rey como 'Jotam' y el de su madre como 'Yerusá' para uniformidad con la transliteración española en el resto del proyecto.
  - Se conservó la estructura narrativa de cronística con dos cláusulas regales y un cierre genealógico, sin añadir conectores interpretativos.
