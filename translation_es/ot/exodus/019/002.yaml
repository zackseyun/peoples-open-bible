    issue: La nota [a] está anclada a «Sinaí» en lugar de a «frente al monte».
    rationale: La alternativa léxica documentada en el inglés corresponde a נֶגֶד הָהָר, no a מִדְבַּר סִינַי. Debe aparecer junto a la frase relevante en el texto español.
  - severity: low
    issue: La redacción de la nota usa «en oposición a algo», que puede sugerir hostilidad o contraste indebido.
    rationale: El hebreo נֶגֶד aquí describe relación espacial («frente a», «delante de», «opuesto a»), no oposición conceptual. Una formulación espacial más precisa evita ambigüedad.
  revised_spanish_text: Partieron de Refidim y llegaron al desierto de Sinaí, y acamparon en el desierto. Allí acampó Israel frente al monte[a].
  revised_footnotes:
  - marker: a
    text: O «opuesto al monte». La preposición hebrea puede indicar una posición frente a algo o delante de ello.
    reason: lexical_alternative
