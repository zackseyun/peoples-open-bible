  language: en
  yaml_path: translation/ot/1_samuel/021/014.yaml
  text: So he changed his behavior before their eyes and acted like a madman in their hands[b][a]; he made marks on the doors of the gate and let his saliva run down onto his beard.
  footnotes:
  - marker: a
    text: Or 'feigned madness' for 'acted like a madman'; the Hebrew verb describes behaving in a crazed way, and the wider context indicates this was deliberate.
    reason: lexical_alternative
  - marker: b
