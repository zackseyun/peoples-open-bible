review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: excepción para Leví, negación de heredad territorial, mención de las ofrendas para Yahvé como heredad, y cierre con ''como le habló/dijo''. También preserva la nota teológica alternativa sobre ''Yahvé ... es su heredad''. Sin embargo, dos elecciones debilitan la fidelidad fina: ''ofrendas encendidas'' no refleja bien אִשֵּׁי (''ofrendas por fuego / ofrecidas por fuego'') y ''como le había dicho'' se aparta del inglés auditado y del valor más directo de דִּבֶּר (''habló/dijo'') al sonar más específico que el hebreo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'ofrendas encendidas' suena poco idiomático y puede sugerir simplemente que fueron prendidas, no la categoría sacrificial. 'Como le había dicho' es comprensible, aunque 'como le habló' resulta menos natural; una solución mejor es 'como le dijo', que mantiene legibilidad y cercanía al source/audit trail. La nota a también debe corregirse para español natural y para alinear 'to Yahweh' como 'a Yahvé', no 'para Yahvé'.
  glossary_alignment: Se respeta bien 'Yahvé' para יהוה y 'Dios' para אֱלֹהֵי. 'Heredad' es una opción válida y coherente con el contexto de Josué. La principal desalineación terminológica está en אִשֵּׁי, donde el proyecto auditó 'offerings by fire'; en español conviene 'ofrendas hechas por fuego' o similar, no 'ofrendas encendidas'.
  issues:
  - severity: medium
    issue: '"las ofrendas encendidas para Yahvé" no representa bien אִשֵּׁי יְהוָה'
    rationale: אִשֵּׁי se refiere a ofrendas sacrificiales por fuego; 'encendidas' no es la expresión española natural para esa categoría y puede sonar imprecisa o extraña.
  - severity: medium
    issue: '"como le había dicho" añade un matiz menos directo que כַּאֲשֶׁר דִּבֶּר לוֹ'
    rationale: El hebreo y el inglés auditado preservan el verbo 'hablar/decir' sin interpretarlo como promesa ni reformularlo; 'como le dijo' mantiene mejor la simplicidad del original en español natural.
  - severity: low
    issue: La nota [a] usa una formulación poco natural y una preposición discutible
    rationale: '"O, más formalmente" debería ser "O, de manera más formal" o similar, y en la alternativa conviene ''a Yahvé'' para reflejar mejor la dirección de la ofrenda en español bíblico natural.'
  revised_spanish_text: Solo a la tribu de Leví no dio heredad[a]; las ofrendas hechas por fuego a Yahvé, Dios de Israel, son su heredad[b], como le dijo.
