translation:
  language: es
  text: hijo[a] de Abisúa, hijo de Fineas, hijo de Eleazar[b], hijo de Aarón, el sacerdote principal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendiente de»; en genealogías hebreas, «hijo de» puede indicar descendencia lineal en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «sumo sacerdote». El hebreo dice literalmente «el sacerdote, el jefe/principal», no la expresión más usual para «sumo sacerdote».
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una genealogía, בֶּן marca descendencia filial de manera directa. En español, la fórmula natural y fiel es «hijo de», aunque también puede implicar descendencia más amplia; esa posible extensión queda preservada en la nota.
- source_word: אֲבִישׁוּעַ
  english_pob_choice: Abishua
  chosen_spanish: Abisúa
  alternatives_spanish:
  - Abisúa
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado al español con adaptación ortográfica habitual para lectura eclesial, manteniendo la identidad del nombre bíblico sin traducirlo.
- source_word: פִּינְחָס
  english_pob_choice: Phinehas
  chosen_spanish: Fineas
  alternatives_spanish:
  - Finees
  - Phinehas
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa la forma tradicional y reconocible en español bíblico, que conserva continuidad con el uso eclesial y sigue siendo una transliteración del nombre propio.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázar
  lexicon: Transliteración estándar
  rationale: Nombre propio conservado en su forma bíblica habitual en español, inteligible y estable en la tradición textual.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Transliteración estándar
  rationale: Nombre propio con forma asentada en español bíblico. Se mantiene la adaptación tradicional con acento gráfico.
- source_word: הַכֹּהֵן הָרֹאשׁ
  english_pob_choice: the chief priest
  chosen_spanish: el sacerdote principal
  alternatives_spanish:
  - el sacerdote jefe
  - sumo sacerdote
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «el sacerdote, el jefe/cabeza». En español, «el sacerdote principal» conserva el valor de primacía sin imponer el título técnico posterior «sumo sacerdote», que no es la forma usual del hebreo aquí.
theological_decisions:
- issue: Título sacerdotal de Aarón
  english_pob_reading: chief priest
  chosen_spanish_reading: sacerdote principal
  alternative_spanish_readings:
  - sumo sacerdote
  - sacerdote jefe
  rationale: Se evita armonizar automáticamente con el título técnico posterior «sumo sacerdote», porque el hebreo usa una construcción literal con רֹאשׁ (‘cabeza’, ‘principal’). «Sacerdote principal» preserva la tensión lexical y el sentido de primacía sin sobretraducir.
  doctrine_reference: 'Translation philosophy: primacía del texto original y fidelidad lexical; mantener distinciones terminológicas cuando el hebreo no usa el título técnico más tardío.'
- issue: Valor genealógico de בֶּן
  english_pob_reading: son of / descendant of
  chosen_spanish_reading: hijo de / descendiente de
  alternative_spanish_readings:
  - descendiente de
  - progenitor de
  rationale: La genealogía puede omitir generaciones, de modo que «hijo de» no debe leerse de forma estrictamente biológica. La nota preserva la alternativa semántica sin alterar la fluidez del texto principal.
  doctrine_reference: Uso genealógico semítico de formulaciones de descendencia; consistencia con la evidencia del hebreo.
translation_notes:
  revision_awareness: 'El texto español sigue el estado de alta concordancia del registro fuente y no introduce revisiones no atestiguadas. Se conservan las dos tensiones documentadas por la POB inglesa: el uso genealógico amplio de «hijo de» y la expresión literal para el cargo sacerdotal de Aarón.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usaron nombres propios bíblicos en formas españolas establecidas para facilitar lectura eclesial sin perder transliteración.
  - Se evitó «sumo sacerdote» en el cuerpo principal para no borrar la distinción lexical señalada en el hebreo y en el audit trail inglés.
