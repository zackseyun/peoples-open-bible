translation:
  language: es
  text: No hay cabeza por encima de la cabeza de una serpiente[a], y no hay ira por encima de la ira de un enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay veneno como el veneno de una serpiente». El griego dice literalmente «cabeza... cabeza de una serpiente», y se conserva esa imagen en lugar de reemplazarla por una paráfrasis interpretativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - veneno
  - ponzoña
  lexicon: LSJ
  rationale: El griego dice literalmente κεφαλή en ambos casos. Mantengo «cabeza» para conservar la imagen concreta, en lugar de sustituirla por una interpretación como «veneno» o «ponzoña».
- source_word: ὄφις
  english_pob_choice: snake
  chosen_spanish: serpiente
  alternatives_spanish:
  - víbora
  - culebra
  lexicon: LSJ
  rationale: «Serpiente» es claro y natural en español bíblico actual. Aunque el inglés POB usa «snake», en español «serpiente» preserva mejor el registro sin perder inteligibilidad.
- source_word: θυμός
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - rabia
  lexicon: LSJ
  rationale: θύμος expresa una ira intensa. «Ira» conserva mejor esa fuerza que «enojo»; «rabia» suena más coloquial o desbordada.
- source_word: ἐχθρός
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - oponente
  lexicon: LSJ
  rationale: «Enemigo» es la equivalencia directa y más clara para el sentido relacional y hostil del término griego.
- source_word: ὑπέρ
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - más que
  - por encima de
  lexicon: LSJ
  rationale: En esta comparación, ὑπέρ expresa superioridad. «Sobre» conserva la imagen literal del griego mejor que una paráfrasis como «más que».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisiones textuales. La única tensión lexical relevante es κεφαλή, donde el inglés POB opta por mantener la imagen concreta de «head» y anota la posible lectura interpretativa de «venom»; el español sigue esa decisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se conserva la paralelismo del griego con dos miembros coordinados unidos por «y».
