source:
  edition: SBLGNT
  text: ἀλλὰ τί λέγει ἡ γραφή; Ἔκβαλε τὴν παιδίσκην καὶ τὸν υἱὸν αὐτῆς, οὐ γὰρ μὴ ⸀κληρονομήσει ὁ υἱὸς τῆς παιδίσκης μετὰ τοῦ υἱοῦ τῆς ἐλευθέρας.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/030.yaml
  text: But what does the Scripture say? “Cast out the slave woman and her son[c][b][a], for the son of the slave woman will certainly not inherit with the son of the free woman.”
  footnotes:
  - marker: a
    text: Or “bondwoman.” The Greek term denotes a female slave/servant; “slave woman” is used here because the slavery/freedom contrast is central to the passage.
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Genesis 21:10.
    reason: cross_reference
  - marker: c
    text: 'Greek has an emphatic negation: “will certainly not inherit,” alternatively “will by no means inherit.”'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 성경은 무엇이라고 합니까? 「노예 여자와 그 아들을 내쫓아라. 노예 여자의 아들은 자유로운 여자의 아들과 함께 결단코 유산을 받지 못할 것이다.」[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '창세기 21:10의 인용을 반향한다. 헬라어는 강한 부정형: 「결단코 유산을 받지 못할 것이다.」'
    reason: cross_reference
