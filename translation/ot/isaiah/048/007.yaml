id: ISA.48.7
reference: Isaiah 48:7
source:
  edition: WLC
  text: עַתָּ֤ה נִבְרְאוּ֙ וְ/לֹ֣א מֵ/אָ֔ז וְ/לִ/פְנֵי י֖וֹם וְ/לֹ֣א שְׁמַעְתָּ֑/ם פֶּן תֹּאמַ֖ר הִנֵּ֥ה יְדַעְתִּֽי/ן־־׃
translation:
  text: Now they are created[a], and not from long ago; before today you had not heard them, lest you should say, ‘Look, I knew them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Now they have been created, and not from of old; before this day you had not heard of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - Now indeed
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking present realization in contrast to former time references in the context. 'Now' is the most natural and sufficiently precise English rendering.
- source_word: נִבְרְאוּ
  chosen: they are created
  alternatives:
  - they were created
  - they come into being
  lexicon: HALOT
  rationale: Nifal perfect of ברא, 'create.' In context it refers to the newly announced things as now brought into created/actual existence. English present 'are created' preserves the prophetic-present force better than a simple past, while keeping the creation language explicit.
- source_word: מֵאָז
  chosen: from long ago
  alternatives:
  - from then
  - from of old
  lexicon: HALOT
  rationale: 'The phrase negates antiquity: these things are not from some remote past. ''From long ago'' is idiomatic modern English and preserves the temporal contrast.'
- source_word: וְלִפְנֵי יוֹם
  chosen: before today
  alternatives:
  - before the day
  - before this day
  lexicon: HALOT
  rationale: Idiomatic Hebrew for 'before today/previously.' 'Before today' is clear modern English and fits the contrast with 'now.'
- source_word: שְׁמַעְתָּם
  chosen: you had not heard them
  alternatives:
  - you did not hear them
  - you had not been told them
  lexicon: HALOT
  rationale: Qal perfect 2ms with 3mp suffix from שמע, here in the sense of hearing/learning of announced matters. Pluperfect English best reflects prior non-disclosure relative to the present revelation.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that you may not
  - otherwise
  lexicon: HALOT
  rationale: 'Introduces purpose/prevention: God withheld prior disclosure to prevent Israel''s boast. ''Lest'' is concise and accurate.'
- source_word: תֹּאמַר
  chosen: you should say
  alternatives:
  - you say
  - you would say
  lexicon: HALOT
  rationale: Imperfect after פֶּן expresses potential result. 'You should say' fits the preventive sense in English.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing the content of the boast. 'Look' is readable modern English; 'Behold' would sound archaic.
- source_word: יְדַעְתִּין
  chosen: I already knew them
  alternatives:
  - I knew them
  - I have known them
  lexicon: HALOT
  rationale: Perfect of ידע with 3fp/3mp object suffix used idiomatically for prior knowledge. 'Already' brings out the implied boast of antecedent knowledge. Although the suffix form is feminine in the pointing, the referent is the newly announced 'things'; English 'them' is natural.
