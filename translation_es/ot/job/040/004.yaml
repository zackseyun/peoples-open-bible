translation:
  language: es
  text: Mira[a], soy insignificante; ¿qué puedo responderte? He puesto mi mano sobre mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «soy de poca importancia»; tradicionalmente, «soy vil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  - Atiende
  lexicon: HALOT
  rationale: La partícula introduce una toma de conciencia inmediata y puede sonar natural en español con un imperativo breve. 'Mira' conserva el tono de atención súbita sin caer en un arcaísmo como 'He aquí'.
- source_word: קַלֹּתִי
  english_pob_choice: I am insignificant
  chosen_spanish: soy insignificante
  alternatives_spanish:
  - soy de poca importancia
  - soy de poco valor
  - soy vil
  lexicon: HALOT
  rationale: En este contexto, el hebreo expresa pequeñez, ligereza o poca estimación, no necesariamente depravación moral. 'Soy insignificante' preserva la humillación de Job sin cargar el término con 'vil'.
- source_word: מָה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: El interrogativo introduce la pregunta retórica directa y funciona naturalmente en español con el verbo siguiente.
- source_word: אֲשִׁיבֶךָּ
  english_pob_choice: can I answer you
  chosen_spanish: te responderé
  alternatives_spanish:
  - te contestaré
  - podría responderte
  - he de responderte
  lexicon: HALOT
  rationale: El hebreo usa el hiphil de שוב en el sentido idiomático de 'responder'. En español, la pregunta retórica se expresa con futuro simple para mantener el tono de incapacidad implícita sin añadir modalización ajena al texto.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - la mano
  lexicon: HALOT
  rationale: Se mantiene la referencia corporal literal, necesaria para conservar la imagen y el gesto de silencio.
- source_word: שַׂמְתִּי
  english_pob_choice: I put
  chosen_spanish: puse
  alternatives_spanish:
  - he puesto
  - coloqué
  lexicon: HALOT
  rationale: El qatal se entiende como acción completa en la respuesta inmediata de Job. 'Puse' suena natural y reproduce el gesto descrito sin sobrerreflejar tiempo verbal.
- source_word: לְמוֹ
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre mi
  lexicon: HALOT
  rationale: En combinación con 'boca', la preposición indica colocación encima o sobre ella. 'Sobre' reproduce el idioma español más común para este gesto.
- source_word: פִי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  lexicon: HALOT
  rationale: '''Boca'' conserva el cuerpo y la imagen idiomática de silencio y rendición. En español, ''mano sobre la boca'' es natural y transparente.'
theological_decisions:
- issue: Cómo traducir la autodescripción de Job sin moralizarla en exceso
  english_pob_reading: I am insignificant
  chosen_spanish_reading: soy insignificante
  alternative_spanish_readings:
  - soy vil
  - soy de poco valor
  - soy de poca importancia
  rationale: 'La evidencia léxica favorece una idea de pequeñez o poca cuenta, especialmente en el contexto de la respuesta humillada de Job ante Yahvé. ''Soy insignificante'' conserva la tensión teológica: Job se rebaja profundamente, pero la traducción no añade una confesión explícita de vileza moral que el hebreo no exige.'
  doctrine_reference: Preservar la tensión lexical y teológica del texto; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail inglés: se mantiene la lectura no moralizante de קַלֹּתִי, el sentido idiomático de אֲשִׁיבֶךָּ como respuesta, y el gesto literal de poner la mano sobre la boca. No se aplicaron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología del proyecto cuando aparece el nombre divino en el contexto inmediato, pero en este versículo no figura explícitamente.
  - '''Mi boca'' mantiene la imagen corporal del hebreo y evita una paráfrasis abstracta.'
  - La sintaxis española se ajusta a un registro bíblico moderno y sobrio, sin recurrir a arcaísmos innecesarios.
