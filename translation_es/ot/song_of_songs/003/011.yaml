  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Sion», «rey Salomón», «corona», «boda» y «gozo de su corazón» están alineados con el sentido fuente. La única desalineación importante está en la nota léxica: debe anclarse a «corona» y reflejar la alternativa «guirnalda»/«corona festiva», tal como documenta el POB inglés.'
