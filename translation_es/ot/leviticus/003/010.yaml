review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la anatomía sacrificial básica y la sintaxis general del hebreo: los dos riñones, la grasa sobre ellos/sobre los lomos, y la parte asociada al hígado que se ha de remover con los riñones. Sin embargo, introduce una precisión no presente en la evidencia fuente al traducir הַיֹּתֶרֶת como ‘la porción adherida’, y además cambia la relación espacial de עַל הַכָּבֵד a ‘al hígado’. La POB inglesa documenta deliberadamente una opción imprecisa (‘appendage’) por la incertidumbre léxica de יֹתֶרֶת, por lo que el español debe mantener esa cautela.'
  spanish_quality_summary: El texto es legible y digno, pero ‘porción adherida’ suena interpretativo y algo pesado. ‘Apéndice sobre el hígado’ suena más natural y preserva mejor la indeterminación anatómica. También conviene eliminar la nota a sobre ‘las dos piedras’, porque no corresponde a una alternativa preservada por la auditoría inglesa y añade una ambigüedad innecesaria y coloquial en este contexto bíblico.
  glossary_alignment: No hay conflictos con términos teológicos mayores del glosario. ‘Riñones’, ‘grasa’, ‘lomos’ y ‘quitará’ están bien encaminados. El principal ajuste léxico requerido es alinear יֹתֶרֶת con una opción española prudente como ‘apéndice’, conservando la alternativa ‘lóbulo’ en nota, y mantener ‘sobre el hígado’ para עַל.
  issues:
  - severity: medium
    issue: ‘porción adherida’ sobreinterpreta הַיֹּתֶרֶת
    rationale: La auditoría inglesa escogió ‘appendage’ precisamente para evitar una precisión anatómica excesiva. ‘Porción adherida’ añade la idea de adhesión/materialidad que el hebreo no expresa de forma específica.
  - severity: medium
    issue: ‘al hígado’ debilita la relación espacial de עַל הַכָּבֵד
    rationale: El hebreo usa עַל (‘sobre/en/on’). Aunque en contexto anatómico puede implicar asociación, ‘sobre el hígado’ preserva mejor la formulación fuente y coincide con la decisión inglesa documentada.
  - severity: low
    issue: La nota [a] con ‘las dos piedras’ no está respaldada por la auditoría inglesa y reduce la dignidad del registro
    rationale: La POB inglesa no conserva esa alternativa, y en español eclesial actual ‘piedras’ puede sonar coloquial o confuso. No añade claridad útil al lector.
  revised_spanish_text: y los dos riñones, y la grasa que está sobre ellos, que está sobre los lomos, y el apéndice sobre el hígado[b], que quitará con los riñones.
  revised_footnotes:
  - marker: b
    text: O ‘el lóbulo sobre el hígado’. El término hebreo (יֹתֶרֶת) para esta parte anatómica es incierto; ‘apéndice’ en el texto principal evita afirmar más precisión de la que ofrece el hebreo.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente el tramo de יֹתֶרֶת עַל הַכָּבֵד para reflejar la cautela léxica documentada en la POB inglesa y para conservar mejor la relación espacial del hebreo. Se elimina la nota sobre ‘las dos piedras’ por no estar justificada por la auditoría y por introducir una alternativa poco adecuada en español bíblico actual.
