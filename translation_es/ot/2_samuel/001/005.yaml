translation:
  language: es
  text: 'Entonces David dijo al joven que le había dado la noticia: «¿Cómo sabes que Saúl y Jonatán su hijo han muerto?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativo-secuencial del wayyiqtol se conserva mejor en español con 'Entonces', que mantiene el avance de la narración sin sonar tan calco como 'Y'.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el sirviente
  lexicon: HALOT
  rationale: נַעַר puede referirse a un joven o muchacho; en este contexto de mensajero con noticia de batalla, 'el joven' comunica la edad/condición sin introducir la idea de servidumbre que no está en el texto.
- source_word: הַמַּגִּיד ל֑וֹ
  english_pob_choice: who told him
  chosen_spanish: que le informaba
  alternatives_spanish:
  - que le dijo
  - el que le contaba
  - que le daba el informe
  lexicon: HALOT
  rationale: El participio resaltado por el hebreo identifica al joven como el portador del reporte. 'Informaba' conserva el valor de comunicación formal y evita reducir el participio a un simple pasado puntual; el relativo mantiene la función atributiva.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo es que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta sobre la base del conocimiento; '¿Cómo' es la equivalencia natural y fiel en español.
- source_word: יָדַעְתָּ
  english_pob_choice: do you know
  chosen_spanish: sabes
  alternatives_spanish:
  - supiste
  - has sabido
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en perfecto, en discurso directo español es natural usar presente: la cuestión es la fuente actual de la certeza de David, no el momento verbal estrictamente pasado.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - pues que
  lexicon: HALOT
  rationale: Introduce el contenido conocido o supuesto; 'que' funciona de manera directa y transparente en español.
- source_word: מֵת
  english_pob_choice: are dead
  chosen_spanish: han muerto
  alternatives_spanish:
  - están muertos
  - murieron
  lexicon: HALOT
  rationale: En español, el perfecto compuesto expresa con naturalidad el estado recién resultante de la muerte notificada. 'Han muerto' evita una lectura meramente narrativa y conserva el hecho como noticia confirmada.
- source_word: שָׁאוּל וִיהוֹנָתָן בְּנוֹ
  english_pob_choice: Saul and Jonathan his son
  chosen_spanish: Saúl y Jonatán, su hijo
  alternatives_spanish:
  - Saúl y Jonatán, el hijo de él
  - Saúl y Jonatán, hijo de Saúl
  lexicon: HALOT
  rationale: 'El posesivo se liga naturalmente a ''Jonatán'' mediante aposición en español: ''su hijo''. Se conserva el referente de בְּנוֹ sin añadir explicaciones ajenas al texto.'
translation_notes:
  revision_awareness: 'Se siguió el alineamiento del audit trail en inglés: continuidad narrativa con ''Then'', identificación atributiva del mensajero, y preservación del contenido interrogativo sobre la certeza de la muerte de Saúl y Jonatán sin añadir material interpretativo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se emplea 'Jonatán' como forma española estándar del nombre propio.
  - Se mantiene el tono directo de la pregunta de David sin suavizar la sorpresa implícita del hebreo.
