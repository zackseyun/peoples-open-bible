translation:
  language: es
  text: Dios mío, en ti confío; no permitas que sea avergonzado[a]; no permitas que mis enemigos triunfen sobre mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no permitas que me avergüence» o «no permitas que quede avergonzado». El verbo hebreo puede expresar vergüenza interna o deshonra pública.
    reason: lexical_alternative
  - marker: b
    text: O «se regocijen sobre mí» o «exulten sobre mí». El hebreo expresa gozo hostil o júbilo burlón ante la caída del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Oh, Dios mío
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona exige un vocativo posesivo directo. «Dios mío» conserva la relación inmediata de oración y evita añadir una interjección que el hebreo no requiere.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - en ti mismo
  - sobre ti
  lexicon: HALOT
  rationale: Con ב + בטח, el sentido normal es el objeto de confianza. «En ti» es la equivalencia natural en español para expresar confianza dirigida a Dios.
- source_word: בָטַחְתִּי
  english_pob_choice: I trust
  chosen_spanish: confío
  alternatives_spanish:
  - he confiado
  - confié
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar una confianza estable y actual; en español, el presente «confío» comunica mejor esa postura continua de dependencia en una plegaria.
- source_word: אַל
  english_pob_choice: do not let
  chosen_spanish: no permitas
  alternatives_spanish:
  - no dejes que
  - no permitas que
  lexicon: HALOT
  rationale: La partícula de ruego negativa con jussivo se vierte de manera idiomática como una petición en imperativo negativo dirigido a Dios. «No permitas» transmite con claridad la súplica sin arcaísmo.
- source_word: אֵבוֹשָׁה
  english_pob_choice: me be put to shame
  chosen_spanish: me avergüence
  alternatives_spanish:
  - sea avergonzado
  - quede avergonzado
  - sea puesto en vergüenza
  lexicon: HALOT
  rationale: El hebreo puede referirse a vergüenza interior o a deshonra pública. Dado el contraste con los enemigos, el español «me avergüence» mantiene la ambigüedad útil entre sentir vergüenza y quedar deshonrado, sin forzar una paráfrasis excesiva.
- source_word: יַעַלְצ֖וּ
  english_pob_choice: exult over
  chosen_spanish: se regocijen sobre
  alternatives_spanish:
  - triunfen sobre
  - exulten sobre
  - se alegren sobre
  lexicon: HALOT
  rationale: El verbo expresa júbilo/exultación y, con el complemento «sobre mí», el matiz es el de gozo hostil o burla victoriosa. «Se regocijen sobre» conserva el tono poético y la relación preposicional.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me adversan
  - los que me odian
  lexicon: HALOT
  rationale: Es la correspondencia más directa y clara del sustantivo con sufijo posesivo.
- source_word: לִי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - contra mí
  - a mi costa
  lexicon: HALOT
  rationale: Con un verbo de regocijo hostil, la preposición marca a la persona sobre la que se celebra. «Sobre mí» reproduce de forma natural esa relación.
theological_decisions:
- issue: La vergüenza como deshonra pública o sentimiento interno
  english_pob_reading: do not let me be put to shame
  chosen_spanish_reading: no permitas que me avergüence
  alternative_spanish_readings:
  - no permitas que sea avergonzado
  - no permitas que quede avergonzado
  rationale: La súplica del salmo busca vindicación frente a los enemigos. En español, «me avergüence» puede abarcar tanto la experiencia interna como la deshonra pública; así se preserva la tensión del hebreo sin cerrar indebidamente la lectura.
  doctrine_reference: Salmos de lamentación y vindicación; traducción con atención a la vergüenza social en el AT
- issue: El gozo hostil de los enemigos
  english_pob_reading: do not let my enemies exult over me
  chosen_spanish_reading: no permitas que mis enemigos se regocijen sobre mí
  alternative_spanish_readings:
  - no permitas que mis enemigos triunfen sobre mí
  - no permitas que mis enemigos se alegren sobre mí
  rationale: El hebreo no habla simplemente de victoria militar, sino de júbilo burlón ante la caída del justo. «Se regocijen sobre mí» conserva esa carga emocional y no reduce el sentido a un triunfo meramente estratégico.
  doctrine_reference: Teología de la vindicación del justo; Salmos de confianza
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. Se conservaron las dos tensiones léxicas principales: el alcance de אֵבוֹשָׁה (vergüenza interna frente a deshonra pública) y el matiz de יַעַלְצוּ con לִי (gozo hostil / regocijo sobre el salmista). No hubo revisiones posteriores relevantes en el contexto inglés, y el cotejo cruzado reporta alta concordancia.'
  spanish_consistency_notes:
  - Se usó «Dios» y no «SEÑOR» porque el hebreo aquí dice אֱלֹהַי, no el Tetragrámaton.
  - Se prefirió «en ti confío» como equivalente natural del hebreo בך + בטח, manteniendo la relación de dependencia personal.
  - Se mantuvo el tono de súplica directa y poética, sin arcaísmos innecesarios.
  - «Sobre mí» conserva la estructura relacional del hebreo con לִי en el contexto de regocijo enemigo.
