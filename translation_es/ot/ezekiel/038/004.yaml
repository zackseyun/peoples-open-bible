translation:
  language: es
  text: 'Te haré volver[a], pondré ganchos en tus quijadas, y te sacaré a ti y a todo tu ejército: caballos y jinetes, todos ellos vestidos con armadura completa, una gran multitud con escudo y broquel[b], todos ellos empuñando espadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te haré dar la vuelta». El hebreo puede sugerir redirigir o hacer volver.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo distingue dos clases de escudo aquí, probablemente uno grande y otro más pequeño; por eso la traducción conserva la pareja «escudo y broquel».
    reason: cultural_note
lexical_decisions:
- source_word: וְשׁוֹבַבְתִּיךָ
  english_pob_choice: I will turn you around
  chosen_spanish: Te haré dar la vuelta
  alternatives_spanish:
  - Te haré volver
  - Te giraré
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción causativa de reorientación; en español, «te haré dar la vuelta» conserva la idea de ser redirigido por iniciativa de Yahvé sin forzar una interpretación excesiva del trayecto.
- source_word: חַחִים
  english_pob_choice: hooks
  chosen_spanish: garfios
  alternatives_spanish:
  - anillos
  - ganchos
  lexicon: HALOT
  rationale: El término alude a un instrumento de control colocado en un animal o cautivo. «Garfios» comunica con viveza la imagen de sujeción y evita una lectura demasiado mecánica.
- source_word: בִּלְחָיֶיךָ
  english_pob_choice: in your jaws
  chosen_spanish: en tus quijadas
  alternatives_spanish:
  - en tus mejillas
  - en tus mandíbulas
  lexicon: HALOT
  rationale: La palabra hebrea puede referirse a mejilla o mandíbula. En esta imagen de dominio, «quijadas» reproduce bien la parte del rostro donde se coloca el arnés y mantiene la fuerza figurativa.
- source_word: וְהוֹצֵאתִי אוֹתְךָ
  english_pob_choice: and bring you out
  chosen_spanish: y te sacaré
  alternatives_spanish:
  - y te llevaré afuera
  - y te haré salir
  lexicon: HALOT
  rationale: El causativo de יצא pide una forma verbal directa; «te sacaré» es natural en español y preserva a Yahvé como agente activo.
- source_word: חֵילֶךָ
  english_pob_choice: your army
  chosen_spanish: tu ejército
  alternatives_spanish:
  - tu fuerza
  - tu hueste
  lexicon: HALOT
  rationale: El contexto es militar, por lo que «ejército» transmite con claridad el valor de fuerza organizada de combate.
- source_word: סוּסִים וּפָרָשִׁים
  english_pob_choice: horses and horsemen
  chosen_spanish: caballos y jinetes
  alternatives_spanish:
  - caballos y caballeros
  - caballos y soldados a caballo
  lexicon: HALOT
  rationale: La pareja hebrea distingue monturas y quienes las montan. «Caballos y jinetes» conserva esa dualidad de modo natural en español.
- source_word: לְבֻשֵׁי מִכְלוֹל
  english_pob_choice: clothed in full armor
  chosen_spanish: vestidos de completo equipo de guerra
  alternatives_spanish:
  - vestidos con armadura completa
  - ataviados de guerra completa
  lexicon: HALOT
  rationale: La expresión denota estar totalmente equipados para la guerra. «Completo equipo de guerra» evita reducir la imagen a una sola pieza de armadura y mantiene el matiz de preparación total.
- source_word: קָהָל רָב
  english_pob_choice: a great assembly
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran asamblea
  - una gran reunión
  lexicon: HALOT
  rationale: En este contexto, el énfasis está en la magnitud del grupo reunido; «multitud» comunica mejor el volumen humano que una palabra más formal como «asamblea».
- source_word: צִנָּה וּמָגֵן
  english_pob_choice: shield and buckler
  chosen_spanish: escudo y broquel
  alternatives_spanish:
  - escudo grande y escudo pequeño
  - escudo y adarga
  lexicon: HALOT
  rationale: El hebreo distingue dos tipos de defensa, probablemente uno grande y otro menor. «Escudo y broquel» conserva la distinción de manera idiomática en español y refleja la decisión del POB inglés de no neutralizar la pareja armamentística.
- source_word: תֹּפְשֵׂי חֲרָבוֹת
  english_pob_choice: wielding swords
  chosen_spanish: empuñando espadas
  alternatives_spanish:
  - blandiendo espadas
  - tomando espadas
  lexicon: HALOT
  rationale: El participio expresa acción de agarrar o manejar armas. «Empuñando espadas» suena natural y conserva la idea de disposición activa para la guerra.
theological_decisions:
- issue: Agencia divina en la movilización de Gog
  english_pob_reading: YHWH is portrayed as actively redirecting and bringing Gog and his forces out for judgment.
  chosen_spanish_reading: Yahvé aparece como quien activamente hace girar, sujeta y saca a Gog y a su ejército.
  alternative_spanish_readings:
  - Yahvé simplemente permite que Gog venga
  - Yahvé solo supervisa el proceso
  rationale: La cadena de verbos en primera persona expresa iniciativa divina fuerte. La traducción mantiene esa tensión sin suavizarla ni resolver la relación entre soberanía divina e intención humana.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica sin explicarla de más.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta la revisión inglesa más reciente, que prefirió mantener la pareja armamentística diferenciada como «shield and buckler». En español se conserva esa distinción con «escudo y broquel», sin convertirla en una paráfrasis genérica.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - 'Se mantiene el paralelismo militar del hebreo: ejército, caballos/jinetes, equipo completo, multitud, escudo/broquel, espadas.'
  - «Quijadas» se eligió por claridad idiomática en español y para conservar la imagen corporal de dominio.
