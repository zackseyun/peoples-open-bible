base_translation:
  language: en
  yaml_path: translation/ot/numbers/024/008.yaml
  text: God brings him out of Egypt[a]; he has for him the horns of a wild ox. He will consume the nations that are his adversaries[b], and will gnaw their bones and crush them with his arrows.
  footnotes:
  - marker: a
    text: Or 'the strength of a wild ox.' The Hebrew phrase כְּתוֹעֲפֹת רְאֵם is difficult; traditional versions often render the image more generally as strength rather than explicitly as horns.
    reason: lexical_alternative
  - marker: b
    text: Or 'will break their bones' or 'will strip their bones bare.' The Hebrew verb יְגָרֵם is rare and its precise nuance is uncertain.
    reason: lexical_alternative
