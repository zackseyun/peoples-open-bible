revisions:
- from: Eleazar murió y no tuvo hijos[a], sino solo hijas; y los hijos de Quis, sus hermanos[b], las tomaron por mujeres.
  to: Eleazar murió y no tuvo hijos varones, sino solo hijas; y los hijos de Quis, sus hermanos[a], se casaron con ellas[b].
  rationale: Se corrige «hijos» a «hijos varones» para preservar el contraste fuente entre בָּנִים y בָּנוֹת. Se reubica y reescribe la nota léxica para que ancle correctamente en el verbo de matrimonio. También se mejora la naturalidad del español con «se casaron con ellas» en el texto principal, manteniendo la alternativa más literal en nota, en línea con la filosofía del POB inglés.
