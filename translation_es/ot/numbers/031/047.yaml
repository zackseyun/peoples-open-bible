translation:
  language: es
  text: De la mitad perteneciente a los hijos de Israel[a], Moisés tomó una porción de uno de cada cincuenta[b], de entre las personas y de entre el ganado, y se los dio a los levitas que estaban encargados del cuidado del tabernáculo de Yahvé, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "hijos de Israel"; es decir, los israelitas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "una porción tomada de cada cincuenta".'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמַּחֲצִת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: From the half belonging to the sons of Israel
  chosen_spanish: De la mitad perteneciente a los hijos de Israel
  alternatives_spanish:
  - De la mitad de los israelitas
  - De la mitad de Israel
  lexicon: HALOT
  rationale: מַחֲצִית es 'mitad' o 'porción de mitad'; el constructo con בְּנֵי יִשְׂרָאֵל indica la mitad correspondiente a Israel. 'Hijos de Israel' conserva la expresión formal del hebreo y el paralelismo con el POB inglés, sin perder inteligibilidad en español.
- source_word: הָאָחֻז אֶחָד מִן הַחֲמִשִּׁים
  english_pob_choice: one portion out of fifty
  chosen_spanish: una porción de uno de cada cincuenta
  alternatives_spanish:
  - una porción tomada de cada cincuenta
  - un tomado de cada cincuenta
  lexicon: HALOT
  rationale: אָחֻז aquí designa una porción tomada como gravamen o cuota. 'Uno de cada cincuenta' comunica la relación 1:50 de forma natural en español, manteniendo la idea de una cuota determinada sin añadir interpretación extra.
- source_word: מִן הָאָדָם
  english_pob_choice: from the people
  chosen_spanish: de entre los hombres
  alternatives_spanish:
  - de entre las personas
  - del pueblo
  lexicon: HALOT
  rationale: אָדָם aquí se refiere de forma colectiva a seres humanos entre el botín. 'De entre los hombres' conserva la concreción del término hebreo y evita aplanarlo demasiado en una abstracción.
- source_word: וּמִן הַבְּהֵמָה
  english_pob_choice: from the livestock
  chosen_spanish: de entre el ganado
  alternatives_spanish:
  - de entre los animales
  - del ganado
  lexicon: HALOT
  rationale: בְּהֵמָה en este contexto alude a animales domésticos o de rebaño. 'Ganado' es el equivalente español más natural y suficientemente específico en este pasaje.
- source_word: וַיִּתֵּן אֹתָם
  english_pob_choice: and gave them
  chosen_spanish: y los dio
  alternatives_spanish:
  - y se los dio
  - y los entregó
  lexicon: HALOT
  rationale: El sufijo plural requiere un referente plural o colectivo en español. 'Los dio' sigue de cerca la estructura hebrea y mantiene el número plural del objeto.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: Traducción directa del grupo tribal receptor del tributo.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת מִשְׁכַּן יְהוָה
  english_pob_choice: who kept charge of the tabernacle of Yahweh
  chosen_spanish: los que guardaban la custodia del tabernáculo de Yahvé
  alternatives_spanish:
  - los que cuidaban la obligación del tabernáculo de Yahvé
  - los que vigilaban el servicio del tabernáculo de Yahvé
  lexicon: HALOT
  rationale: La combinación participio + sustantivo cognado expresa responsabilidad de custodia/guardia. 'Guardaban la custodia' conserva el sentido de deber vigilante y la fuerza formal del hebreo sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' según la terminología del proyecto, preservando el nombre personal del pacto y evitando la sustitución por un título.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé mandó a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca conformidad con un mandato previo. 'Había mandado' refleja bien la secuencia narrativa y 'tal como' es una equivalencia idiomática natural en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. El POB inglés lo rinde como 'Yahweh'; en español, 'Yahvé' preserva esa decisión teológica y filológica, manteniendo el nombre propio de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Renderización de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - los hijos de Israel
  rationale: El hebreo dice literalmente 'hijos'. La forma 'hijos de Israel' conserva la transparencia del original y evita neutralizar el término sin necesidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que prefirió 'one portion out of fifty' por una formulación más natural; por eso se usó 'una porción de uno de cada cincuenta'. No se detectaron tensiones textuales adicionales; la traducción mantiene la estructura y los referentes del hebreo con el nombre divino explícito.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - '''Hijos de Israel'' conserva la expresión hebrea formal sin reemplazarla por una neutralización innecesaria.'
  - '''De entre los hombres y de entre el ganado'' respeta la distribución de מן + sustantivo en el hebreo.'
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - La construcción 'los dio' reproduce el plural pronominal del original.
