translation:
  language: es
  text: Israel ha pecado. También han transgredido mi pacto que yo les mandé, y también han tomado de lo dedicado al anatema[a][b], y también han robado, y también han engañado[c], y también lo han puesto entre sus pertenencias[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «han tomado de las cosas dedicadas al anatema» o «han tomado del anatema».'
    reason: lexical_alternative
  - marker: b
    text: «חרם» puede referirse a cosas puestas bajo anatema, es decir, dedicadas a destrucción; la frase conserva ese sentido técnico.
    reason: source_note
  - marker: c
    text: O «han negado esto»; el verbo hebreo puede implicar engaño, falsedad o negación en un contexto judicial.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «entre sus vasos/artículos»; la frase se refiere a esconder los objetos entre sus posesiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָא
  english_pob_choice: has sinned
  chosen_spanish: ha pecado
  alternatives_spanish:
  - ha cometido pecado
  - ha faltado
  lexicon: HALOT
  rationale: El verbo expresa pecado contra Dios; «ha pecado» es directo, natural y conserva el peso teológico sin suavizarlo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el sujeto corporativo del hebreo, aunque el contexto inmediato señale a un individuo, para preservar la tensión del pacto.
- source_word: עָבְרוּ אֶת־בְּרִיתִי
  english_pob_choice: have transgressed my covenant
  chosen_spanish: han transgredido mi pacto
  alternatives_spanish:
  - han violado mi pacto
  - han quebrantado mi pacto
  lexicon: HALOT
  rationale: «Transgredido» conserva el matiz formal de violar límites del pacto, más preciso que una simple paráfrasis.
- source_word: אֲשֶׁר צִוִּיתִי אוֹתָם
  english_pob_choice: that I commanded them
  chosen_spanish: que yo les mandé
  alternatives_spanish:
  - que yo les mandé guardar
  - que yo les ordené
  lexicon: HALOT
  rationale: El hebreo dice solo que Dios les mandó; no se añade «guardar» porque no está explícito en el texto fuente.
- source_word: לָקְחוּ מִן־הַחֵרֶם
  english_pob_choice: have taken some of what was devoted to destruction
  chosen_spanish: han tomado de lo dedicado al anatema
  alternatives_spanish:
  - han tomado de lo dedicado a destrucción
  - han tomado de las cosas dedicadas al anatema
  lexicon: HALOT
  rationale: «חרם» se traduce con el término POB «anatema», que preserva la carga técnica del término; «de lo dedicado al anatema» refleja la partícula מִן sin añadir más de lo que el hebreo dice.
- source_word: גָּנְבוּ
  english_pob_choice: have also stolen
  chosen_spanish: han robado
  alternatives_spanish:
  - han hurtado
  - han sustraído
  lexicon: HALOT
  rationale: El verbo significa robar; «han robado» es claro en español y mantiene la secuencia acusatoria.
- source_word: כִּחֲשׁוּ
  english_pob_choice: have also deceived / have also denied it
  chosen_spanish: han engañado
  alternatives_spanish:
  - han mentido
  - han negado esto
  - han sido falsos
  lexicon: HALOT
  rationale: La POB inglesa entiende un campo semántico de engaño/negación. «Han engañado» preserva mejor esa amplitud que limitarlo a «mentido».
- source_word: שָׂמוּ בִכְלֵיהֶם
  english_pob_choice: have also put it among their own belongings
  chosen_spanish: y también lo han puesto entre sus pertenencias
  alternatives_spanish:
  - y también lo han puesto entre sus utensilios
  - y también lo han escondido entre sus cosas
  lexicon: HALOT
  rationale: כְלִים puede significar utensilios, artículos o pertenencias; «pertenencias» da un español natural y conserva la idea de ocultarlo entre sus bienes.
- source_word: וְגַם ... וְגַם ... וְגַם
  english_pob_choice: also ... also ... also
  chosen_spanish: También ... y también ... y también ...
  alternatives_spanish:
  - Y también ... y también ...
  - También ... también ... también ...
  lexicon: HALOT
  rationale: La repetición de גַם intensifica la acumulación de cargos; repetir «también» conserva esa fuerza retórica en español.
theological_decisions:
- issue: Atribución corporativa del pecado a Israel en lugar de individualizarlo
  english_pob_reading: Retain the corporate subject 'Israel' and plural verbs/pronouns without softening to an individualizing paraphrase.
  chosen_spanish_reading: Mantener «Israel» como sujeto y los verbos en plural, sin convertir el enunciado en una referencia exclusiva a Acán.
  alternative_spanish_readings:
  - Acán ha pecado
  - Israel ha pecado, es decir, Acán ha pecado
  rationale: El hebreo atribuye el pecado a Israel como pueblo del pacto. La traducción debe preservar esa tensión teológica en vez de resolverla anticipadamente.
  doctrine_reference: Solidaridad pactual y responsabilidad corporativa
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «lied» por «deceived» para reflejar mejor el hebreo כִּחֲשׁוּ y unió las cláusulas con comas. La redacción española sigue esa revisión, manteniendo la repetición enfática de «también» y evitando reducir el verbo a un simple «mentir».
  spanish_consistency_notes:
  - Se conserva el sujeto plural de la acción y la atribución corporativa a Israel.
  - «Anatema» se usa como término técnico coherente con la tradición POB para חֵרֶם.
  - La secuencia de acusaciones conserva la repetición enfática del hebreo mediante «también».
