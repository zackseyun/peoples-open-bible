translation:
  language: es
  text: Él ordenó a los guardias[a] que arrastraran a cada uno de los hebreos y los obligaran a probar carne de cerdo y carne sacrificada a los ídolos[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los guardias personales» o, más literalmente, «los portadores de lanza».
    reason: lexical_alternative
  - marker: b
    text: O «alimento sacrificado a los ídolos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκέλευεν
  english_pob_choice: He ordered
  chosen_spanish: Él ordenó
  alternatives_spanish:
  - Él mandó
  - Él dio órdenes
  lexicon: BDAG
  rationale: El imperfecto expresa acción continuada o reiterada en la narración; «ordenó» conserva bien la autoridad del mandato en un español natural y digno.
- source_word: τοῖς δορυφόροις
  english_pob_choice: the guards
  chosen_spanish: a los guardias
  alternatives_spanish:
  - a los bodyguards
  - a los lanceros
  lexicon: LSJ
  rationale: En este contexto de corte y ejecución, «guardias» comunica con claridad su función. «Guardias» evita sobreespecificar el arma, aunque el término griego también puede sugerir «portadores de lanza» o «guardias de corps».
- source_word: ἕνα ἕκαστον τῶν Ἐβραίων
  english_pob_choice: each one of the Hebrews
  chosen_spanish: a cada uno de los hebreos
  alternatives_spanish:
  - a cada uno de los judíos
  - a cada hebreo
  lexicon: BDAG
  rationale: La combinación distributiva enfatiza a cada individuo; «a cada uno» conserva esa fuerza. Se mantiene «hebreos» como equivalente más directo de Ἐβραίων, siguiendo el testimonio del griego y la decisión auditada en inglés.
- source_word: περισπᾶσθαι
  english_pob_choice: to drag away
  chosen_spanish: arrastraran
  alternatives_spanish:
  - se llevaran
  - lo apartaran
  lexicon: LSJ
  rationale: El verbo comunica ser jalado o separado por la fuerza. «Arrastraran» refleja mejor esa coerción que un simple «llevar» o «apartar».
- source_word: κρεῶν ὑείων
  english_pob_choice: pork
  chosen_spanish: carne de cerdo
  alternatives_spanish:
  - puerco
  - carne porcina
  lexicon: LSJ
  rationale: «Carne de cerdo» es claro y natural en español moderno, y preserva el sentido de carne de cerdo como infracción alimentaria para los hebreos.
- source_word: εἰδωλοθύτων
  english_pob_choice: meat sacrificed to idols
  chosen_spanish: carne sacrificada a los ídolos
  alternatives_spanish:
  - alimento sacrificado a los ídolos
  - carne ofrecida a los ídolos
  lexicon: BDAG
  rationale: Aunque el inglés explicita «meat», el término griego designa lo sacrificado a ídolos. En español, repetir «carne» junto a la coordinación con τος κρεῶν ὑείων mantiene la estructura y hace explícita la ofensa ritual.
- source_word: ἀναγκάζειν
  english_pob_choice: force
  chosen_spanish: obligaran
  alternatives_spanish:
  - forzaran
  - coaccionaran
  lexicon: BDAG
  rationale: «Obligaran» expresa compul­sión de manera natural y sobria en español. Se evita un calco demasiado áspero donde el contexto ya proporciona la coerción.
- source_word: ἀπογεύεσθαι
  english_pob_choice: to taste
  chosen_spanish: probar
  alternatives_spanish:
  - gustar
  - degustar
  lexicon: BDAG
  rationale: «Probar» conserva la idea de un consumo mínimo o siquiera un contacto oral con lo prohibido, sin intensificar indebidamente hasta «comer».
theological_decisions:
- issue: 'Ἐβραίων: Hebrews vs. Jews'
  english_pob_reading: Hebrews
  chosen_spanish_reading: hebreos
  alternative_spanish_readings:
  - judíos
  rationale: Se conserva la denominación explícita del griego y la decisión auditada en inglés. No hay razón contextual para sustituirla por el término más interpretativo «judíos».
  doctrine_reference: Primacía del texto original; mantener el color histórico-étnico del pasaje
- issue: 'ἀπογεύεσθαι: grado de participación en lo prohibido'
  english_pob_reading: taste
  chosen_spanish_reading: probar
  alternative_spanish_readings:
  - comer
  - partir de
  rationale: '«Probar» mantiene la tensión del texto: la imposición busca incluso una ingestión mínima o un contacto obligatorio con lo prohibido, sin resolver la ambigüedad hacia una comida plena.'
  doctrine_reference: Preservar la tensión teológica y ritual del testimonio martirial
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «seize» por «drag away» para reflejar mejor περισπᾶσθαι. La redacción española adopta ese ajuste con «arrastraran». No se requieren otros cambios respecto del audit trail.
  spanish_consistency_notes:
  - Se mantiene «hebreos» en vez de «judíos» para corresponder al griego Ἐβραίων y a la decisión auditada en inglés.
  - Se traduce ἀπογεύεσθαι con «probar», no con «comer», para no borrar la tensión de una violación forzada incluso mínima.
  - 'Se conserva la doble mención de carne: «carne de cerdo» y «carne sacrificada a los ídolos», siguiendo la coordinación del griego y la explicación del audit trail.'
