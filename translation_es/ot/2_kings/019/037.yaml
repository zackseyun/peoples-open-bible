    text: Hebreo «Nisrok»; tradicionalmente se vierte «Nisroch».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo de agresión a «lo derribaron» para reflejar mejor el valor contextual de הִכֻּהוּ en un asesinato con espada, sin sobreexplicarlo como «lo mataron». También se pule la puntuación en los nombres y aposiciones para que el español suene más natural y cercano a la sintaxis fuente. La nota se mantiene y se mejora levemente el estilo tipográfico.
