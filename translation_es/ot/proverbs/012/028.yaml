translation:
  language: es
  text: En el camino de la justicia hay vida[a], y en su senda no hay muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y en su senda hay inmortalidad». Esto refleja una comprensión alternativa del hebreo difícil en la segunda línea.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/אֹרַח
  english_pob_choice: In the path of
  chosen_spanish: En el camino de
  alternatives_spanish:
  - En la senda de
  - En el sendero de
  lexicon: HALOT
  rationale: אֹרַח designa un camino o senda figurada. En español, "camino de" suena natural y conserva la imagen de un curso moral o de vida. La preposición ב se expresa con "en" para mantener la idea de esfera o ubicación.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: צְדָקָה puede abarcar justicia o rectitud. Aquí el paralelismo sapiencial con vida/muerte permite "justicia" como término claro y bíblicamente adecuado en español; también conserva la fuerza ética del hebreo. Se evita "rectitud" porque, aunque posible, suena menos natural en este proverbio.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida misma
  - vidas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, en español el valor idiomático es singular. "Vida" reproduce el contraste directo con "muerte".
- source_word: וְ/דֶרֶךְ
  english_pob_choice: and in its pathway
  chosen_spanish: y en su senda
  alternatives_spanish:
  - y en su camino
  - y en su vereda
  lexicon: HALOT
  rationale: דֶרֶךְ es "camino/senda". "Senda" evita repetir exactamente "camino" del primer cola y conserva el paralelismo poético. El posesivo "su" refleja el vínculo con la justicia en el contexto.
- source_word: נְתִיבָה
  english_pob_choice: pathway
  chosen_spanish: senda
  alternatives_spanish:
  - camino
  - sendero
  lexicon: HALOT
  rationale: נְתִיבָה denota un sendero o camino trazado. En español, "senda" funciona bien como variación poética y mantiene el campo semántico de la primera línea.
- source_word: אַל
  english_pob_choice: 'no'
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: HALOT
  rationale: En esta línea difícil, el valor negativo se expresa de manera natural en español con "no hay", que hace legible el proverbio sin introducir una perífrasis interpretativa más fuerte que el hebreo permite.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - mortalidad
  - fin
  lexicon: HALOT
  rationale: מָוֶת significa "muerte" de forma directa. Se conserva el contraste tajante con "vida".
theological_decisions:
- issue: 'Interpretación del segundo cola: אַל מָוֶת'
  english_pob_reading: 'The pathway belonging to righteousness does not lead to death: ''and in its pathway there is no death.'''
  chosen_spanish_reading: 'La senda de la justicia no conduce a la muerte: ''y en su senda no hay muerte.'''
  alternative_spanish_readings:
  - '''y en su senda hay inmortalidad'''
  - '''y su camino termina en vida eterna'''
  rationale: El hebreo es breve y admite más de una lectura interpretativa. En el cuerpo principal se conserva la lectura negativa más directa y coherente con el contraste sapiencial vida/muerte. Se deja constancia de la alternativa interpretativa tradicional sin incorporarla al texto principal, para no resolver la tensión del hebreo más allá de lo que permite el original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo el paralelismo y la ambigüedad reconocida del segundo cola. No se detectaron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se mantuvo el contraste vida/muerte con vocabulario común y claro en español.
  - Se prefirió "justicia" por su naturalidad en un proverbio sapiencial, sin perder el sentido ético del hebreo.
  - La variación entre "camino" y "senda" reproduce el paralelismo poético y evita repetición mecánica.
  - La nota al pie preserva la lectura alternativa tradicional sin desplazar la lectura principal.
