translation:
  language: es
  text: 'Y el rey juró y dijo: «Vive Yahvé, que ha redimido mi vida[a] de toda adversidad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma». נֶפֶשׁ puede significar alma, yo mismo o vida; aquí, por contexto, se entiende más naturalmente como vida preservada del peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - tomó juramento
  lexicon: HALOT
  rationale: El verbo שׁבע en este contexto expresa prestar juramento. «Juró» es la forma más natural y concisa en español narrativo, y conserva el valor forense del acto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título definido, no el nombre propio; por eso se mantiene «el rey» sin explicitar David en el texto principal.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: La fórmula narrativa פשוטה de אמר se rinde con «dijo», sin añadir matiz retórico innecesario.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Por vida de Yahvé
  lexicon: HALOT
  rationale: Es una fórmula de juramento. «Vive Yahvé» conserva el valor idiomático de la expresión y mantiene el nombre divino conforme al criterio del proyecto.
- source_word: פָּדָה
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha librado
  - ha rescatado y redimido
  lexicon: HALOT
  rationale: פָּדָה tiene el sentido de redimir/rescatar con intervención eficaz. «Ha redimido» preserva el peso teológico y evita rebajar el verbo a un simple «librar».
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere al sujeto preservado del peligro, es decir, la vida de David. «Mi vida» sigue la lectura contextual preferida por la POB inglesa y evita importar una noción más abstracta de «alma».
- source_word: מִכָּל צָרָה
  english_pob_choice: from every distress
  chosen_spanish: de toda angustia
  alternatives_spanish:
  - de toda aflicción
  - de todo apuro
  - de toda tribulación
  lexicon: HALOT
  rationale: צָרָה designa opresión, angustia o aflicción. «Angustia» comunica bien la amplitud de la amenaza en español y corresponde al campo semántico del término en este contexto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la pauta del proyecto, se translitera como «Yahvé» en vez de sustituirlo por un título o por una convención litúrgica en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of נַפְשִׁי in this context
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: El contexto es el de salvación o preservación del peligro, no una afirmación antropológica sobre un componente inmaterial. «Mi vida» reproduce con claridad la referencia contextual y evita una carga doctrinal no exigida por el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La versión española sigue de cerca el pasaje hebreo y concuerda con la revisión inglesa más reciente, que mantuvo sin cambios la lectura de juramento, el nombre divino y el sentido contextual de נֶפֶשׁ como «vida». No se detectaron cambios de revisión que exijan ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la norma del proyecto para יְהוָה.
  - «Mi vida» conserva la decisión léxica principal y evita oscilar entre «alma» y «vida» en el cuerpo del texto.
  - La estructura narrativa «Y el rey juró y dijo» mantiene el orden y la sobriedad del hebreo sin sobreexplicar el sujeto implícito.
  - Se conserva el tono de juramento con una fórmula breve y publicable en español bíblico contemporáneo.
