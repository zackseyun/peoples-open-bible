revisions:
- from: Las manos de mujeres compasivas cocinaron a sus propios hijos[a]; llegaron a ser alimento para ellas en la destrucción de la hija de mi pueblo[b].
  to: Las manos de mujeres compasivas cocinaron a sus propios hijos[a]; fueron alimento para ellas en la destrucción de la hija de mi pueblo[b].
  rationale: Se propone una revisión menor. Se conserva la fidelidad general del borrador, pero se elimina de la nota [a] una expansión no respaldada por el rastro inglés y se suaviza «llegaron a ser» a «fueron» para una sintaxis española más natural sin alterar el sentido del hebreo en contexto.
