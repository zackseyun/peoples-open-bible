translation:
  language: es
  text: Y los holocaustos[a], la ofrenda vegetal, y la libación, en las fiestas, en las lunas nuevas y en los sábados, en todos los tiempos señalados de la casa de Israel, serán responsabilidad del príncipe. Él proveerá la ofrenda por el pecado[b], la ofrenda vegetal, el holocausto y los sacrificios de paz[c], para hacer expiación por la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los holocaustos completos» para הָעוֹלוֹת.
    reason: lexical_alternative
  - marker: b
    text: O «la ofrenda purificadora» para הַחַטָּאת.
    reason: lexical_alternative
  - marker: c
    text: O «las ofrendas de comunión» o «las ofrendas de bienestar» para הַשְּׁלָמִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל הַנָּשִׂיא יִהְיֶה
  english_pob_choice: shall be the prince’s responsibility
  chosen_spanish: sobre el príncipe estarán
  alternatives_spanish:
  - serán responsabilidad del príncipe
  - corresponderán al príncipe
  lexicon: HALOT
  rationale: La construcción con עַל + הָיָה expresa carga u obligación que recae sobre alguien. En español, “sobre el príncipe estarán” conserva esa idea de incumbencia sin forzar una paráfrasis excesiva. Se evita resolverla explícitamente como “responsabilidad” para no alejarse demasiado de la forma del hebreo, pero la noción de encargo queda clara por el contexto.
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: “Príncipe” mantiene el uso establecido en Ezequiel y no introduce ‘rey’, que el texto no dice.
- source_word: הָעוֹלוֹת
  english_pob_choice: the burnt offerings
  chosen_spanish: los holocaustos
  alternatives_spanish:
  - las ofrendas quemadas
  - los holocaustos completos
  lexicon: HALOT
  rationale: En español bíblico, “holocausto” es el equivalente tradicional y claro de עוֹלָה. Aunque puede sonar más litúrgico, aquí conserva mejor la categoría sacrificial que una paráfrasis moderna.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de grano
  - la oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial es una ofrenda de cereal/grano. “Ofrenda vegetal” sigue la solución POB en español para evitar un tecnicismo menos natural como “oblación” y a la vez no reducirla a una simple “ofrenda” genérica.
- source_word: הַנֵּסֶךְ
  english_pob_choice: the drink offering
  chosen_spanish: la ofrenda de libación
  alternatives_spanish:
  - la libación
  - la ofrenda derramada
  lexicon: HALOT
  rationale: “Libación” es el término español preciso para נֶסֶךְ, y “ofrenda de libación” aclara su función ritual. Se evita “bebida” por ser demasiado general.
- source_word: בַּחַגִּים וּבֶחֳדָשִׁים וּבַשַּׁבָּתוֹת
  english_pob_choice: at the feasts, at the new moons, and at the Sabbaths
  chosen_spanish: en las fiestas, en las lunas nuevas y en los sábados
  alternatives_spanish:
  - en las solemnidades, en las lunas nuevas y en los sábados
  - en las festividades, en las lunas nuevas y en los sábados
  lexicon: HALOT
  rationale: Se conserva el paralelismo con una serie de tiempos sagrados. “Lunas nuevas” traduce literalmente חֳדָשִׁים en su sentido calendárico; “sábados” mantiene el plural del hebreo, aun cuando en español puede sonar menos usual que “sábados/reposos”, porque el texto enumera múltiples tiempos de reposo.
- source_word: בְּכָל מוֹעֲדֵי בֵּית יִשְׂרָאֵל
  english_pob_choice: at all the appointed times of the house of Israel
  chosen_spanish: en todos los tiempos señalados de la casa de Israel
  alternatives_spanish:
  - en todas las fechas señaladas de la casa de Israel
  - en todas las convocaciones señaladas de la casa de Israel
  lexicon: HALOT
  rationale: “Tiempos señalados” refleja bien מוֹעֲדִים sin repetir “fiestas”, ya usado antes en la línea. “Casa de Israel” se conserva para mantener el lenguaje corporativo del texto.
- source_word: הוּא יַעֲשֶׂה
  english_pob_choice: He shall provide
  chosen_spanish: él ofrecerá
  alternatives_spanish:
  - él hará
  - él proveerá
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה puede significar presentar u ofrecer los sacrificios requeridos. “Ofrecerá” comunica naturalmente que el príncipe tiene a su cargo la presentación de las víctimas y ofrendas, sin implicar necesariamente una acción sacerdotal literal con sus propias manos.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda purificadora
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: “Ofrenda por el pecado” es transparente y fiel al uso sacrificial. Aunque “ofrenda de purificación” expresa otra posible matización, aquí se mantiene la designación más reconocible en español.
- source_word: הַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de bienestar
  - las ofrendas de comunión
  lexicon: HALOT
  rationale: “Sacrificios de paz” conserva el término tradicional y permite mantener la referencia cultual. Se prefirió no sustituirlo por una expresión interpretativa más amplia, para no borrar la tensión lexical documentada entre paz, bienestar y comunión.
- source_word: לְכַפֵּר בְּעַד
  english_pob_choice: to make atonement for
  chosen_spanish: para hacer expiación por
  alternatives_spanish:
  - para hacer atonamiento por
  - para reconciliar por
  lexicon: HALOT
  rationale: “Hacer expiación por” preserva el lenguaje ritual de כפר sin imponer una formulación doctrinal posterior. En español es claro y mantiene el sentido cultual de cobertura/expiación por la casa de Israel.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión corporativa “casa de Israel” por fidelidad al hebreo y al estilo de Ezequiel.
theological_decisions:
- issue: Responsabilidad del príncipe en los sacrificios
  english_pob_reading: The verse assigns responsibility to the prince to provide the required offerings for Israel’s appointed times.
  chosen_spanish_reading: El versículo atribuye al príncipe la incumbencia de presentar u ofrecer los sacrificios requeridos para los tiempos señalados de Israel.
  alternative_spanish_readings:
  - El príncipe actúa aquí como sacerdote y realiza personalmente los sacrificios.
  - El príncipe solo financia los sacrificios, sin ninguna función ritual.
  rationale: 'La formulación española conserva la ambigüedad funcional del hebreo: el príncipe tiene la carga/encargo de que se ofrezcan las ofrendas, pero el texto no obliga a leerlo como un acto sacerdotal estrictamente personal ni a reducirlo a mero financiamiento.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Sentido de la expiación sacrificial
  english_pob_reading: The text speaks of cultic atonement for the house of Israel within Ezekiel’s temple vision.
  chosen_spanish_reading: El texto habla de expiación cultual por la casa de Israel dentro de la visión del templo en Ezequiel.
  alternative_spanish_readings:
  - El texto enseña una doctrina sistemática completa de la expiación.
  - El texto usa un lenguaje puramente ceremonial sin peso teológico.
  rationale: “Hacer expiación” mantiene el vocabulario sacrificial del hebreo y evita importar categorías doctrinales posteriores o vaciar el rito de su contenido teológico.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'Conforme al audit trail en inglés, se mantuvieron: la obligación/incumbencia del príncipe, el vocabulario sacrificial técnico, y la distinción entre ofrenda por el pecado, ofrenda vegetal, holocausto y sacrificios de paz. No se aplicaron revisiones posteriores al texto base, ya que el registro inglés indica que no hubo cambios en la última pasada.'
  spanish_consistency_notes:
  - Se usó “casa de Israel” de forma consistente para בֵּית יִשְׂרָאֵל.
  - Se mantuvo la serie de tiempos sagrados con paralelismo sintáctico en español.
  - “Ofrenda vegetal” y “ofrenda de libación” siguen la terminología sacrificial ya establecida en el proyecto.
  - Se evitó introducir “SEÑOR” o “Cristo”, pues el versículo no contiene esos términos.
  - Se conservó el valor técnico de expiación sin convertirlo en una explicación doctrinal más amplia.
