revisions:
- from: Desciende de tu gloria y siéntate en la sed[a], oh habitante, hija de Dibón, porque el devastador de Moab ha subido contra ti; ha destruido tus fortalezas.
  to: Desciende de tu gloria y siéntate sedienta[a], oh moradora[b], hija de Dibón, porque el devastador de Moab ha subido contra ti; ha destruido tus fortalezas.
  rationale: Se ajusta la personificación al femenino con «moradora» para corresponder al hebreo y a «hija de Dibón», y se mejora la naturalidad del español con «siéntate sedienta» sin perder la ambigüedad del original, la cual se conserva en la nota. También se añade la nota cultural presente en la auditoría inglesa para explicar la personificación.
