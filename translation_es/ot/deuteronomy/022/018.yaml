translation:
  language: es
  text: Entonces los ancianos de aquella ciudad tomarán al hombre y lo castigarán.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo disciplinarán», «lo corregirán» o, posiblemente, «lo azotarán». El verbo hebreo es amplio para una corrección disciplinaria; la forma exacta del castigo se aclara por el contexto legal circundante, no por el verbo solo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  english_pob_choice: shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán consigo
  - aprehenderán
  lexicon: HALOT
  rationale: לקח en este contexto legal expresa tomar o llevar bajo custodia; en español, «tomarán» comunica el acto sin añadir una violencia que el hebreo no especifica aquí.
- source_word: זִקְנֵי
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los ancianos de la ciudad
  lexicon: HALOT
  rationale: En contextos cívico-legales, זקנים designa a los dirigentes reconocidos de la comunidad. «Los ancianos» mantiene esa función institucional mejor que una referencia meramente etaria.
- source_word: הָעִיר הַהִוא
  english_pob_choice: of that city
  chosen_spanish: de aquella ciudad
  alternatives_spanish:
  - de esa ciudad
  - de aquella villa
  lexicon: HALOT
  rationale: «Aquella» conserva la referencia demostrativa específica del hebreo y «ciudad» es el equivalente natural para עיר en este marco legal.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - el esposo
  lexicon: HALOT
  rationale: איש puede significar «hombre» o, por contexto, «esposo». Aquí el hebreo dice literalmente «el hombre», y esa forma permite que el contexto inmediato determine la identidad jurídica.
- source_word: וְיִסְּרוּ אֹתוֹ
  english_pob_choice: and discipline him
  chosen_spanish: y lo disciplinarán
  alternatives_spanish:
  - y lo castigarán
  - y lo corregirán
  - y lo azotarán
  lexicon: HALOT
  rationale: יסר tiene un campo semántico amplio de corrección, disciplina y castigo. «Disciplinarán» conserva esa amplitud sin fijar todavía el tipo exacto de sanción; el contexto legal posterior aclara la medida.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con la última pasada revisada y con el consenso de alta concordancia: no se requieren cambios sustantivos respecto del sentido legal y del alcance léxico de יסר.'
  spanish_consistency_notes:
  - Se prefirió «ancianos» para זקני por su valor institucional en español bíblico y por evitar la mera lectura cronológica.
  - Se mantuvo «aquella ciudad» para preservar la deixis del demostrativo hebreo.
  - «Disciplinarán» conserva la amplitud semántica del verbo hebreo y deja que el contexto legal determine la clase de sanción.
