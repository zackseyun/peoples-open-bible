translation:
  language: es
  text: Entonces creyeron en sus palabras[a]; cantaron su alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y creyeron en sus palabras». La forma narrativa hebrea puede traducirse con «y» o con un conector más explícito de secuencia como «entonces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמִינוּ
  english_pob_choice: Then they believed
  chosen_spanish: Entonces creyeron
  alternatives_spanish:
  - Y creyeron
  - Así creyeron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la secuencia; «entonces» conserva ese valor consecutivo de manera natural en español. «Creyeron» expresa היטב el sentido de confiar/creer sin añadir matices ajenos.
- source_word: בִּדְבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su palabra
  - lo que dijo
  lexicon: HALOT
  rationale: El plural hebreo con sufijo de 3ms pide conservar el plural en español. «Sus palabras» refleja mejor la forma original que singularizarla como «su palabra».
- source_word: יָשִׁירוּ
  english_pob_choice: they sang
  chosen_spanish: cantaron
  alternatives_spanish:
  - cantarían
  - cantaban
  lexicon: HALOT
  rationale: En la secuencia narrativa, el imperfecto puede equivaler naturalmente a pretérito simple en español. «Cantaron» mantiene la acción completa y coordinada con el primer verbo.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - alabanza para él
  - su gloria
  lexicon: HALOT
  rationale: תְּהִלָּה denota alabanza/praise; con sufijo posesivo, «su alabanza» conserva la relación morfológica. «Alabanza» es más directo y transparente que reemplazarlo por «gloria».
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo y con la lectura auditada en inglés; se conserva la secuencia narrativa, el plural de «palabras» y la relación posesiva en «su alabanza». No se detectaron revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usa «entonces» para el valor consecutivo del wayyiqtol, en línea con la opción inglesa «Then».
  - Se mantiene el plural «palabras» por la forma hebrea בִּדְבָרָיו.
  - «Alabanza» conserva el campo semántico de תְּהִלָּה sin introducir lenguaje litúrgico adicional.
