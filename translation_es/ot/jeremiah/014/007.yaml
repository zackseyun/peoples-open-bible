  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé» correctamente; עָוֹן → «iniquidades» preserva el peso moral; מְשׁוּבֹתֵינוּ → «apostasías» sigue la decisión teológica inglesa; חָטָאנוּ → «hemos pecado» es apropiado. No hay conflicto doctrinal; solo hay que ajustar las notas para reflejar correctamente las alternativas léxicas ya documentadas.'
