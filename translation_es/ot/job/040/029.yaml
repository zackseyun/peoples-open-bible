translation:
  language: es
  text: ¿Jugarás con él[a] como un pájaro, o lo atarás para tus muchachas[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ello» en lugar de «con él»; el hebreo usa un pronombre masculino singular que se refiere a Leviatán.
    reason: lexical_alternative
  - marker: b
    text: O «para tus doncellas» o «para tus jóvenes mujeres».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְשַׂחֶק
  english_pob_choice: Will you play
  chosen_spanish: ¿Jugarás
  alternatives_spanish:
  - ¿Harás juego
  - ¿Te divertirás
  - ¿Bromearás
  lexicon: HALOT
  rationale: El verbo שׂחק en este contexto retórico conserva la idea de jugar o tratar como juguete. «Jugarás» es natural en español y mantiene la fuerza de la pregunta desafiante.
- source_word: בּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere a Leviatán; «con él» preserva esa referencia pronominal, mientras que «con ello» diluiría la concordancia que el hebreo marca.
- source_word: כַּצִּפּוֹר
  english_pob_choice: like a bird
  chosen_spanish: como con un pájaro
  alternatives_spanish:
  - como un pájaro
  - como con un ave
  lexicon: HALOT
  rationale: El hebreo usa una comparación que sugiere tratarlo como un animal doméstico o de juego. «Como con un pájaro» deja visible el matiz de trato, no solo de semejanza.
- source_word: וְתִקְשְׁרֶנּוּ
  english_pob_choice: or tie him up
  chosen_spanish: o lo atarás
  alternatives_spanish:
  - o lo amarrarás
  - o lo sujetarás
  lexicon: HALOT
  rationale: קשר significa atar o sujetar. «Atarás» es claro y fiel; en español no hace falta intensificar con «up» como en inglés para comunicar la restricción.
- source_word: לְנַעֲרוֹתֶיךָ
  english_pob_choice: for your girls
  chosen_spanish: para tus muchachas
  alternatives_spanish:
  - para tus jóvenes
  - para tus doncellas
  lexicon: HALOT
  rationale: נַעֲרוֹת es femenino plural de jóvenes muchachas. «Muchachas» es más preciso y menos infantil que «niñas»; también evita la arcaización de «doncellas».
translation_notes:
  revision_awareness: El texto coincide con la lectura base del WLC y con el audit trail inglés en sentido y referencias pronominales. Se eligió una españolización más natural que conserva el desafío retórico y la comparación doméstica del original.
  spanish_consistency_notes:
  - Se mantuvo el masculino singular en el pronombre de Leviatán («él»), coherente con el hebreo y con la elección inglesa.
  - Se prefirió «muchachas» como equivalente neutral y contemporáneo de נַעֲרוֹת, evitando tanto el arcaísmo como una edad demasiado adulta.
