translation:
  language: es
  text: Porque, aunque era joven y estaba en la plenitud de la vida para la unión sexual, anuló por medio de la razón el aguijón[a] de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el acicate de las pasiones» o «el frenesí de las pasiones». El griego οἶστρον puede sugerir un impulso agudo o una incitación vehemente.
    reason: lexical_alternative
lexical_decisions:
- source_word: νέος
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - un muchacho
  - de edad joven
  lexicon: LSJ
  rationale: El adjetivo expresa juventud. «Joven» conserva la sencillez del predicado con ὢν y no añade un matiz masculino que el griego no exige por sí mismo.
- source_word: ἀκμάζων
  english_pob_choice: in the prime of life
  chosen_spanish: estaba en la plenitud de la vida
  alternatives_spanish:
  - estaba en su apogeo
  - estaba en pleno vigor
  - florecía
  lexicon: LSJ
  rationale: El participio indica estar en el punto más alto de vigor o madurez. «En la plenitud de la vida» comunica esa fuerza física y madurez sin sonar técnico o recargado en español.
- source_word: πρὸς συνουσιασμόν
  english_pob_choice: for sexual union
  chosen_spanish: para la unión sexual
  alternatives_spanish:
  - para el acto sexual
  - para el coito
  - para la convivencia sexual
  lexicon: LSJ
  rationale: La frase apunta a la capacidad o aptitud para la relación sexual. «Unión sexual» es claro, digno y suficientemente directo en español sin volverlo abrupto.
- source_word: ἠκύρωσεν
  english_pob_choice: nullified
  chosen_spanish: anuló
  alternatives_spanish:
  - invalidó
  - dejó sin efecto
  - neutralizó
  lexicon: LSJ
  rationale: El verbo significa volver ineficaz o dejar sin valor. «Anuló» conserva el carácter decisivo de la acción y suena natural en español.
- source_word: τῷ λογισμῷ
  english_pob_choice: by reason
  chosen_spanish: por medio de la razón
  alternatives_spanish:
  - por la razón
  - por su juicio racional
  - mediante el razonamiento
  lexicon: LSJ
  rationale: λογισμός es un término clave del libro para la razón reflexiva que gobierna las pasiones. «Por medio de la razón» mantiene ese valor central y evita reducirlo a mera lógica abstracta.
- source_word: οἶστρον
  english_pob_choice: sting
  chosen_spanish: aguijón
  alternatives_spanish:
  - goad
  - frenesí
  - impulso
  lexicon: LSJ
  rationale: La metáfora puede sugerir aguijón, acicate o frenesí. «Aguijón» reproduce bien la imagen incisiva en español y conserva la fuerza figurada del griego.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de los deseos
  - de las emociones
  - de los apetitos
  lexicon: LSJ
  rationale: En 4 Macabeos πάθη nombra las pasiones o apetitos que la razón debe dominar. «Pasiones» es el equivalente más estable y fiel al vocabulario ético de la obra.
theological_decisions:
- issue: Conservar el tema antropológico y ético de 4 Macabeos sobre la supremacía de la razón frente a las pasiones
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el razonamiento
  - la facultad racional
  - el juicio racional
  rationale: La obra presenta la razón como principio rector de la vida moral. «La razón» preserva esa idea central sin introducir distinciones filosóficas posteriores que el texto no exige.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: El texto griego fue validado con alta confianza; el contexto inglés no recibió revisiones sustanciales y la traducción española sigue de cerca las decisiones léxicas auditadas, especialmente en λόγισμος y οἶστρον.
  spanish_consistency_notes:
  - Se mantiene «razón» para λογισμός, coherente con el eje moral-filosófico de 4 Macabeos.
  - «Pasiones» conserva el valor ético del término πάθη y evita suavizarlo como simples emociones.
  - «Y» griega inicial se vierte con la causal española «Porque», que respeta la ilación del período.
  - Se usa «unión sexual» como equivalente digno y comprensible de πρὸς συνουσιασμόν.
