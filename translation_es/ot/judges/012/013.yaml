translation:
  language: es
  text: Después de él, Abdón hijo de Hilel, el piratonita, juzgó a Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - dirigió
  lexicon: HALOT
  rationale: En Jueces, שׁפט designa la función de los jueces de Israel. «Juzgó» conserva esa terminología recurrente y deja abierto el alcance de gobierno/administración sin añadir más de lo que el texto dice.
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Después de éste
  - Tras él
  lexicon: HALOT
  rationale: La expresión señala sucesión respecto del juez anterior. «Después de él» es natural en español y mantiene la relación temporal sin explicitar más de lo que aporta el hebreo.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdon
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio en forma española usual con acento gráfico para lectura natural en español.
- source_word: בֶּן הִלֵּל
  english_pob_choice: son of Hillel
  chosen_spanish: hijo de Hilel
  alternatives_spanish:
  - hijo de Hillel
  - el hijo de Hilel
  lexicon: HALOT
  rationale: La relación de parentesco es directa y se rinde con la construcción española estándar. «Hilel» refleja la transliteración más habitual en español para este nombre propio.
- source_word: הַפִּרְעָתוֹנִי
  english_pob_choice: the Pirathonite
  chosen_spanish: el piratonita
  alternatives_spanish:
  - el de Piratón
  - el piratoneo
  lexicon: HALOT
  rationale: El gentilicio con artículo se conserva como gentilicio españolizado. «Piratonita» reproduce la fuerza adjectival del hebreo y evita una paráfrasis geográfica que atenúe la forma del original.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura confirmada por la revisión más reciente y el control cruzado de alta concordancia, sin cambios sustantivos respecto del inglés POB: solo se adapta la sintaxis al español natural y se españolizan los nombres propios.'
  spanish_consistency_notes:
  - Se mantiene el verbo «juzgó» para conservar la terminología característica del libro de Jueces.
  - 'Se conserva el orden informativo básico: sucesión temporal, identificación personal, gentilicio y acción.'
  - No se añadió nota textual porque no hay variantes o tensiones léxicas documentadas en el paquete de auditoría.
