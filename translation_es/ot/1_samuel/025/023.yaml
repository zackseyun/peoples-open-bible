translation:
  language: es
  text: Cuando Abigail vio a David[a], se apresuró y descendió del asno; cayó delante de David, con el rostro en tierra, y se postró a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se prosternó a tierra». El verbo hebreo puede denotar una inclinación profunda o una postración completa; aquí describe un gesto de homenaje ante David, no necesariamente adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - alcanzó a ver
  - divisó
  lexicon: HALOT
  rationale: ראָה en este contexto narrativo expresa ver de manera ordinaria. «Vio» es la equivalencia natural y fiel en español.
- source_word: וַתְּמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apuró
  lexicon: HALOT
  rationale: מהר indica actuar con rapidez. «Se apresuró» conserva la urgencia narrativa con buen registro en español.
- source_word: וַתֵּרֶד מֵעַל הַחֲמוֹר
  english_pob_choice: got down from the donkey
  chosen_spanish: descendió del asno
  alternatives_spanish:
  - bajó del asno
  - se desmontó del asno
  lexicon: HALOT
  rationale: ירד significa «bajar/descender». En español, «descendió del asno» preserva el movimiento y mantiene un tono bíblico claro. «Asno» es posible y aquí coincide bien con el registro tradicional del relato.
- source_word: הַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el borrico
  lexicon: HALOT
  rationale: חמור denota el animal de carga. «Asno» es exacto y de registro bíblico; evita el matiz coloquial de «burro».
- source_word: וַתִּפֹּל לְאַפֵּי דָוִד
  english_pob_choice: fell before David
  chosen_spanish: se echó delante de David
  alternatives_spanish:
  - cayó delante de David
  - se postró ante David
  lexicon: HALOT
  rationale: La expresión señala caer en actitud de sumisión/obeisancia. «Se echó delante de David» refleja el gesto sin añadir «pies» que no está en el hebreo. Se mantiene el sentido de caída reverente.
- source_word: עַל פָּנֶיהָ
  english_pob_choice: on her face
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con el rostro contra el suelo
  - cara a tierra
  lexicon: HALOT
  rationale: La frase es concreta y complementa la caída previa. «Con el rostro en tierra» expresa el contacto del rostro con el suelo de manera natural en español.
- source_word: וַתִּשְׁתַּחוּ אָרֶץ
  english_pob_choice: bowed to the ground
  chosen_spanish: se postró hasta el suelo
  alternatives_spanish:
  - se inclinó hasta el suelo
  - se prosternó hasta el suelo
  lexicon: HALOT
  rationale: שׁחה aquí describe un acto de homenaje humano, no adoración divina. «Se postró hasta el suelo» comunica la prostración sin importar «adoró»; «hasta el suelo» conserva el valor de אָרֶץ.
theological_decisions:
- issue: Distinción entre homenaje humano y adoración divina en שׁחה
  english_pob_reading: bowed to the ground
  chosen_spanish_reading: se postró hasta el suelo
  alternative_spanish_readings:
  - adoró
  - se inclinó profundamente
  rationale: El gesto va dirigido a David, así que en español debe leerse como homenaje/obeisancia, no como culto religioso. «Se postró hasta el suelo» mantiene esa distinción y evita una carga teológica indebida.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje no presenta revisiones aplicadas en el audit trail más reciente; se mantiene la alta concordancia del control cruzado, sin cambios necesarios respecto del sentido base. La formulación española procura reflejar fielmente cada segmento del hebreo y conservar la distinción entre caída, rostro en tierra y postración final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma de referencia al nombre divino cuando aparezca en otros pasajes, conforme al proyecto.
  - Aquí se emplea «asno» por el registro bíblico y la correspondencia léxica de חמור.
  - «Postrarse» se reserva para el gesto corporal de homenaje; no se entiende como adoración divina en este contexto.
  - 'La progresión verbal queda visible en español: vio → se apresuró → descendió → se echó → se postró.'
