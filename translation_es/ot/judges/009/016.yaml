translation:
  language: es
  text: Ahora, pues, si han actuado en verdad y con integridad cuando hicieron rey a Abimélec, y si han obrado bien con Yerubaal y con su casa, y si han tratado con él de acuerdo con lo que sus manos merecían[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a la recompensa de sus manos». El hebreo idiomático alude a un trato correspondiente a lo que una persona hizo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La expresión introduce una transición discursiva con matiz inferencial. «Ahora, pues» conserva el valor de enlace lógico de וְעַתָּה sin sonar demasiado rígido en español.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - con verdad
  lexicon: HALOT
  rationale: El hebreo apunta a veracidad/fiabilidad en la conducta. «En verdad» mantiene el giro idiomático y la fuerza moral del término.
- source_word: וּבְתָמִים
  english_pob_choice: and integrity
  chosen_spanish: y con integridad
  alternatives_spanish:
  - y con sinceridad
  - y con rectitud
  lexicon: HALOT
  rationale: תָמִים en contexto ético expresa integridad o completitud moral. «Con integridad» es natural en español y preserva la pareja semántica con «en verdad».
- source_word: עֲשִׂיתֶם
  english_pob_choice: you have acted
  chosen_spanish: han actuado
  alternatives_spanish:
  - han hecho
  - han obrado
  lexicon: HALOT
  rationale: El verbo es amplio, pero aquí el contexto es evaluativo y moral. «Han actuado» transmite la idea de conducta examinada sin forzar una sola acción puntual.
- source_word: וַתַּמְלִיכוּ
  english_pob_choice: when you made ... king
  chosen_spanish: cuando hicieron rey
  alternatives_spanish:
  - y hicieron rey
  - cuando coronaron
  lexicon: HALOT
  rationale: El causativo de מלך significa hacer rey o entronizar. «Hicieron rey» es claro y fiel; «cuando» refleja la relación temporal del enunciado en la serie condicional.
- source_word: אֶת אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  lexicon: HALOT
  rationale: Se translitera el nombre propio conforme al uso bíblico en español, con acento para la lectura natural.
- source_word: טוֹבָה עֲשִׂיתֶם עִם
  english_pob_choice: you have dealt well with
  chosen_spanish: han obrado bien con
  alternatives_spanish:
  - han tratado bien a
  - han hecho bien con
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «hacer bien con/toward». «Han obrado bien con» conserva el matiz relacional sin sonar extrañamente literal.
- source_word: יְרֻבַּעַל
  english_pob_choice: Jerubbaal
  chosen_spanish: Yerubaal
  alternatives_spanish:
  - Jerubaal
  - Jerobaal
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo transliterado, no la forma interpretativa ni el nombre alterno Gideón, siguiendo la especificidad del texto fuente.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su familia
  - su casa doméstica
  lexicon: HALOT
  rationale: «Casa» mantiene la amplitud semántica hebrea de linaje/hogar/dinastía, sin restringirla solo a la familia nuclear.
- source_word: כִּגְמוּל יָדָיו
  english_pob_choice: according to the recompense of his hands
  chosen_spanish: conforme al pago de sus manos
  alternatives_spanish:
  - según el pago de sus manos
  - según lo que sus manos merecían
  - conforme a sus obras
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo sobre lo que las manos han merecido. «Pago de sus manos» mantiene la metáfora y la tensión idiomática que la versión inglesa también quiso preservar.
- source_word: עֲשִׂיתֶם לוֹ
  english_pob_choice: you have dealt with him
  chosen_spanish: le han hecho
  alternatives_spanish:
  - han tratado con él
  - han obrado con él
  lexicon: HALOT
  rationale: El hebreo termina con la misma idea de trato acorde con lo merecido. «Le han hecho» queda cercano al verbo base y permite completar naturalmente la expresión idiomática con el complemento anterior.
theological_decisions:
- issue: Valor de una serie de condicionales retóricos evaluativos
  english_pob_reading: if you have acted in truth and integrity ... and if you have dealt well ... and if you have dealt with him according to the recompense of his hands
  chosen_spanish_reading: si han actuado en verdad y con integridad ... y si han obrado bien ... y si le han hecho conforme al pago de sus manos
  alternative_spanish_readings:
  - si realmente actuaron ...
  - si se condujeron con lealtad ...
  rationale: La frase no plantea una duda neutral, sino una acusación/criterio moral en forma de condicionales encadenadas. La redacción española mantiene ese tono evaluativo sin volverlo explicativo o interpretativo.
  doctrine_reference: No doctrinal; discourse/pragmatics of rhetorical conditionals
- issue: Idiomatismo de retribución según las obras
  english_pob_reading: according to the recompense of his hands / according to what his hands deserved
  chosen_spanish_reading: conforme al pago de sus manos
  alternative_spanish_readings:
  - según lo que sus manos merecían
  - conforme a sus obras
  rationale: La imagen hebrea de las manos como metonimia de obras merece conservarse porque el POB inglés también preserva la tensión entre literalidad e idiomatismo. La versión española deja visible esa metáfora y no la sustituye por una abstracción completa.
  doctrine_reference: Principio bíblico de retribución según obras; cf. uso idiomático del hebreo bíblico
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del control cruzado: no se requieren cambios mayores. La principal atención en español es conservar el tono acusatorio y el idiomatismo de כִּגְמוּל יָדָיו sin perder inteligibilidad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - 'Se mantiene transliteración de nombres propios bíblicos de forma coherente: Abimélec, Yerubaal.'
  - «Casa» conserva el valor dinástico/familiar de בַּיִת sin sustituirlo por términos más estrechos.
  - La serie condicional se ha mantenido con repeticiones de «si» para reflejar la estructura hebrea.
