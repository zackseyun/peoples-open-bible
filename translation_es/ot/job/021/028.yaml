base_translation:
  language: en
  yaml_path: translation/ot/job/021/028.yaml
  text: For you say[a], ‘Where is the house of the noble man, and where is the tent[b], the dwelling place of the wicked?’
  footnotes:
  - marker: a
    text: Or 'prince' for 'noble man.' The Hebrew נָדִיב can denote a socially prominent or princely figure, not only a generous person.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the tent, the dwellings of the wicked' is compressed in Hebrew. It may mean 'the tent where the wicked dwell' or function appositionally, identifying the tent as the dwelling place of the wicked.
    reason: lexical_alternative
