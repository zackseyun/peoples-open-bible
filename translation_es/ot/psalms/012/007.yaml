translation:
  language: es
  text: Las palabras de Yahvé son palabras puras, como plata refinada en un horno[a] sobre la tierra[b], purificada siete veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un crisol» o «en un recipiente de fundición»; el término hebreo es raro y su referente preciso es incierto, aunque el sentido es claramente metalúrgico.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre la tierra». La frase puede describir la ubicación o el entorno del proceso de refinación; su matiz exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמֲרוֹת / אֲמָרוֹת
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - enunciados
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo אמר en forma poética y general. «Palabras» conserva esa repetición natural en español y no estrecha el sentido a «promesas» ni a un tipo específico de discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal del Tetragrámaton, siguiendo la convención del proyecto. «Yahvé» comunica la identidad del nombre sin la sustitución titulizante de «SEÑOR».
- source_word: טְהֹרוֹת
  english_pob_choice: pure
  chosen_spanish: puras
  alternatives_spanish:
  - limpias
  - purificadas
  lexicon: HALOT
  rationale: El adjetivo expresa pureza/limpieza. «Puras» funciona bien en el paralelismo poético y mantiene tanto la dimensión moral como la metáfora metalúrgica.
- source_word: צָרוּף
  english_pob_choice: refined
  chosen_spanish: refinada
  alternatives_spanish:
  - fundida
  - ensayada
  - purificada
  lexicon: HALOT
  rationale: El participio describe metal sometido a refinación. «Refinada» reproduce con naturalidad la imagen metalúrgica en español y deja ver el proceso de purificación del metal.
- source_word: בַּעֲלִיל
  english_pob_choice: in a furnace
  chosen_spanish: en un horno
  alternatives_spanish:
  - en un crisol
  - en un horno de fundición
  - en un recipiente de fundición
  lexicon: HALOT
  rationale: El término es raro y su referente exacto es incierto, pero el contexto exige un recipiente o espacio metalúrgico. «Horno» ofrece una solución clara y digna en español, manteniendo la idea de refinación sin fijar en exceso el objeto técnico.
- source_word: לָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra misma
  - en el suelo
  lexicon: HALOT
  rationale: La frase es sintácticamente difícil. «Sobre la tierra» preserva la referencia espacial de manera bastante literal y deja abierta la precisión del matiz, tal como lo hace el audit trail en inglés.
- source_word: מְזֻקָּק
  english_pob_choice: purified
  chosen_spanish: purificada
  alternatives_spanish:
  - refinada
  - depurada
  - aclarada
  lexicon: HALOT
  rationale: El participio intensifica la imagen de metal depurado. «Purificada» evita una repetición exacta de «refinada» y conserva el énfasis en la pureza obtenida por proceso.
- source_word: שִׁבְעָתָיִם
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - sietefold
  - completamente
  - de manera completa
  lexicon: HALOT
  rationale: La forma adverbial expresa plenitud por repetición. «Siete veces» es transparente en español y mantiene la idiomática hebrea de completitud.
theological_decisions:
- issue: Alcance de la afirmación sobre las palabras de Yahvé
  english_pob_reading: The verse speaks of the complete purity and reliability of the LORD's spoken words, expressed through metallurgical imagery.
  chosen_spanish_reading: El versículo afirma la pureza total y la confiabilidad de las palabras habladas por Yahvé, mediante imaginería metalúrgica.
  alternative_spanish_readings:
  - Una afirmación solo moral acerca de la pureza
  - Una formulación ampliada sobre preservación textual posterior
  rationale: El hebreo compara las palabras de Yahvé con plata completamente refinada. La traducción debe conservar esa afirmación poética sin introducir formulaciones doctrinales posteriores que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no importar afirmaciones doctrinales ausentes del verso.
translation_notes:
  revision_awareness: 'No hay cambios en la última pasada de revisión; el texto sigue el testimonio hebreo masorético y el audit trail inglés con alta concordancia, manteniendo las dos zonas de incertidumbre señaladas: el vocablo metalúrgico raro y la frase espacial ''sobre la tierra''.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo poético con dos miembros sobre las palabras divinas.
  - «Puras» y «purificada» distinguen el estado y el proceso sin borrar la imagen metalúrgica.
  - La frase final mantiene la equivalencia semántica de «siete veces» sin convertirla en explicación interpretativa.
