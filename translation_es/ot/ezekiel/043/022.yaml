translation:
  language: es
  text: Y al segundo día presentarás un macho cabrío sin defecto, para una ofrenda por el pecado[a], y purificarán el altar, así como lo purificaron con el toro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para una ofrenda de purificación'. El hebreo חַטָּאת puede designar tanto la ofrenda usada para remover impureza como la 'ofrenda por el pecado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשֵּׁנִי
  english_pob_choice: And on the second day
  chosen_spanish: Y en el segundo día
  alternatives_spanish:
  - En el segundo día
  - Y al segundo día
  lexicon: HALOT
  rationale: La expresión temporal mantiene la secuencia cultual del contexto inmediato. 'Y en el segundo día' conserva la conjunción consecutiva y suena natural en español bíblico moderno.
- source_word: תַּקְרִיב
  english_pob_choice: you shall present
  chosen_spanish: presentarás
  alternatives_spanish:
  - ofrecerás
  - harás llevar
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa presentar/ofrecer una víctima. 'Presentarás' preserva el matiz formal de llevar la ofrenda ante Dios sin reducirlo a un simple 'dar'.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de las cabras
  - un chivo
  lexicon: HALOT
  rationale: '''Macho cabrío'' es el equivalente español más natural y preciso para el animal sacrificial masculino. Evita una traducción demasiado descriptiva y conserva el valor técnico del término.'
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin imperfección
  lexicon: HALOT
  rationale: En el lenguaje sacrificial, תמים señala ausencia de defecto físico apta para la ofrenda. 'Sin defecto' es claro, idiomático y fiel al requisito cultual.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para una ofrenda por el pecado
  alternatives_spanish:
  - para una ofrenda por el pecado/culpa
  - para una ofrenda de purificación
  lexicon: HALOT
  rationale: חטאת puede nombrar tanto el pecado como la ofrenda asociada. Aquí se mantiene la relación tradicional con 'pecado', pero en forma que también deja visible el carácter de ofrenda ritual; por eso no se reduce a una paráfrasis funcional.
- source_word: וְחִטְּאוּ אֶת הַמִּזְבֵּחַ
  english_pob_choice: and they shall purify the altar
  chosen_spanish: y purificarán el altar
  alternatives_spanish:
  - y limpiarán el altar
  - y harán purificación del altar
  lexicon: HALOT
  rationale: El verbo חטא en este contexto ritual significa purgar/purificar, no 'pecar'. 'Purificarán' comunica adecuadamente la acción cultual sobre el altar en español.
- source_word: כַּאֲשֶׁר חִטְּאוּ בַּפָּר
  english_pob_choice: just as they purified it with the bull
  chosen_spanish: así como lo purificaron con el becerro
  alternatives_spanish:
  - así como lo purificaron con el toro
  - tal como lo purificaron con el becerro
  lexicon: HALOT
  rationale: La comparación remite al rito anterior. 'Así como' conserva el paralelo. Se eligió 'becerro' para seguir el valor del hebreo פָּר en un registro bíblico comprensible; el pronombre 'lo' recupera el altar como objeto implícito.
theological_decisions:
- issue: חַטָּאת como nombre de ofrenda y su relación con el verbo ritual de purificación
  english_pob_reading: Use 'sin offering' for לְחַטָּאת and 'purify' for the verb חטא applied to the altar.
  chosen_spanish_reading: Usar 'ofrenda por el pecado' para לְחַטָּאת y 'purificar' para el verbo חטא aplicado al altar.
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: El hebreo une el sustantivo de la ofrenda con un verbo de purificación ritual. En español, 'ofrenda por el pecado' conserva la conexión tradicional con חטאת sin borrar su función purificadora, mientras que 'purificar' evita una lectura moral del altar. La tensión semántica se mantiene visible en lugar de resolverse artificialmente.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cruce de control mostró alto acuerdo; por eso esta versión sigue de cerca la solución base, con ajustes en español para naturalidad y precisión cultual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre la ofrenda ('ofrenda por el pecado') y la acción ritual ('purificar'), evitando homogeneizarlas.
  - '''Macho cabrío'' traduce el animal sacrificial de modo claro y técnicamente adecuado en español.'
  - '''Becerro'' sigue la referencia al animal usado en el rito previo, sin forzar una equivalencia demasiado técnica que empobrezca el estilo.'
