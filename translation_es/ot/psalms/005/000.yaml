translation:
  language: es
  text: 'Para el maestro de coro: según las flautas[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los instrumentos de viento»; el término hebreo puede ser una notación musical técnica. Tradicionalmente se deja sin traducir como «Nehilot».
    reason: lexical_alternative
  - marker: b
    text: El encabezamiento «de David» puede indicar autoría, dedicación o asociación con la colección davídica.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Para el director
  - Para el líder
  - Al maestro de coro
  lexicon: HALOT
  rationale: En encabezamientos de salmos, la forma señala al responsable de la ejecución musical. «Maestro de coro» conserva bien esa función litúrgico-musical en español; «para» refleja el valor dativo del hebreo de encabezamiento.
- source_word: אֶל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - a
  - para
  - con referencia a
  lexicon: HALOT
  rationale: En este tipo de superscripción musical, אֶל puede introducir la indicación de melodía, instrumento o estilo. «Según» comunica esa relación técnica sin cerrarla indebidamente.
- source_word: הַנְּחִילוֹת
  english_pob_choice: the flutes
  chosen_spanish: las flautas
  alternatives_spanish:
  - los instrumentos de viento
  - Nehilot
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido probable del término, aunque reconoce incertidumbre. «Flautas» es una equivalencia natural y clara en español; se mantiene la ambigüedad técnica en una nota.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: Es el término estándar del encabezamiento canónico. En español, «Salmo» es la equivalencia más directa y reconocible.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: «De David» conserva la ambigüedad del hebreo entre autoría, dedicación o asociación con la colección davídica, sin forzar una afirmación más precisa de la que permite el texto.
theological_decisions:
- issue: Sentido de la adscripción davídica
  english_pob_reading: The heading 'of David' may indicate authorship, dedication, or association with the Davidic collection.
  chosen_spanish_reading: El encabezamiento «de David» puede indicar autoría, dedicación o asociación con la colección davídica.
  alternative_spanish_readings:
  - «por David» sugiriendo autoría directa
  - «para David» sugiriendo dedicación
  rationale: El hebreo no obliga a una sola relación. La traducción evita cerrar el sentido y preserva la tensión documental que la POB inglesa ya señaló.
  doctrine_reference: Salmos; encabezamientos poéticos y su función histórica/litúrgica
translation_notes:
  revision_awareness: La revisión inglesa reciente movió la nota sobre «de David» al final del versículo para anclarla a «David» y dejar la nota sobre «flutes» junto al término musical. Esta versión española sigue esa corrección y coloca las marcas [a] y [b] en los mismos puntos funcionales.
  spanish_consistency_notes:
  - Se mantiene «maestro de coro» para לַמְנַצֵּחַ, en línea con la POB inglesa.
  - Se usa «según» para אֶל en un contexto musical, evitando sobrerinterpretar el término.
  - «Flautas» traduce el sentido probable de הַנְּחִילוֹת, pero la nota conserva la alternativa de «instrumentos de viento» y la posibilidad técnica no resuelta.
  - «Salmo» reproduce el encabezamiento estándar מִזְמוֹר sin expansión.
  - «de David» conserva la ambigüedad del lamed hebreo, sin convertirla en autoría explícita.
