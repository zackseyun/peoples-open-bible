translation:
  language: es
  text: Dios se apareció a Jacob otra vez, cuando volvió de Paddán-aram[a], y lo bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Dios se reveló a Jacob otra vez». El verbo hebreo puede denotar aparecer o hacerse ver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - se dejó ver
  - se reveló
  - fue visto
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa una manifestación visible o una aparición divina. «Se apareció» conserva esa idea de presencia manifestada sin obligar a decidir entre aparición objetiva o revelación explicada.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El verbo singular y el contexto narrativo muestran referencia al Dios único; «Dios» es la forma natural y fiel en español.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  - todavía
  lexicon: HALOT
  rationale: El adverbio marca repetición de una aparición anterior; «otra vez» transmite con claridad el valor repetitivo en español actual.
- source_word: בְּבֹאוֹ
  english_pob_choice: when he came
  chosen_spanish: cuando venía
  alternatives_spanish:
  - cuando llegó
  - al venir
  - a su regreso
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo constructo + sufijo se expresa de forma natural con una subordinada temporal en español. «Venía» preserva el marco de llegada sin sonar forzado.
- source_word: מִפַּדַּן אֲרָם
  english_pob_choice: from Paddan-aram
  chosen_spanish: de Paddán-aram
  alternatives_spanish:
  - desde Paddán-aram
  - de Paddan Aram
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera y se mantiene con preposición simple equivalente al prefijo מִן. Se conserva el guion como en el uso bíblico habitual.
- source_word: וַיְבָרֶךְ אֹתוֹ
  english_pob_choice: and he blessed him
  chosen_spanish: y lo bendijo
  alternatives_spanish:
  - y le bendijo
  - y bendijo a Jacob
  lexicon: HALOT
  rationale: ברך en piel significa «bendecir». «Lo bendijo» mantiene la relación sujeto-objeto explícita y suena natural en español; el clítico de objeto directo es adecuado para Jacob como referente animado.
theological_decisions:
- issue: Naturaleza de la aparición divina
  english_pob_reading: 'Render the event as a straightforward divine appearance: ''God appeared to Jacob again.'''
  chosen_spanish_reading: Dios se apareció a Jacob otra vez.
  alternative_spanish_readings:
  - Dios fue visto por Jacob otra vez.
  - Dios se reveló a Jacob otra vez.
  rationale: 'La frase española conserva la tensión del hebreo: relata una manifestación real de Dios sin precisar el modo. No se resuelve la cuestión entre aparición objetiva y revelación introspectiva.'
  doctrine_reference: Preservar la tensión teológica sin imponer una interpretación explicativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide con la línea inglesa auditada: aparición divina repetida, referencia temporal en la llegada desde Paddán-aram y bendición final. No hay revisiones pendientes en el audit trail utilizado.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según la referencia singular del contexto.
  - Se mantiene «Paddán-aram» como transliteración de nombre propio.
  - Se conserva la ambigüedad del verbo de aparición mediante la nota alternativa, en paralelo con la nota inglesa.
  - «otra vez» traduce עוֹד con naturalidad y sin añadir matices innecesarios.
