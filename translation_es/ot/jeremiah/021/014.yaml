revisions:
- from: Y yo los castigaré[a] según el fruto de sus obras, dice Yahvé; y prenderé fuego en su bosque[b], y consumirá todo lo que la rodea.
  to: Y yo los castigaré[a] según el fruto de sus obras, declara Yahvé; encenderé un fuego en su bosque[b], y el fuego consumirá todo lo que está alrededor de ella.
  rationale: Se ajusta la segunda mitad del versículo para hacer explícito que el sujeto que consume es el fuego, conforme al hebreo, y para mejorar la naturalidad del español. También se usa 'declara Yahvé' por mejor correspondencia con la fórmula profética auditada, y 'encenderé un fuego' para reflejar más de cerca וְהִצַּתִּי אֵשׁ. Se mantienen 'Yahvé', 'bosque' y la nota léxica sobre פקד.
