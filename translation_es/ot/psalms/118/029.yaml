translation:
  language: es
  text: Den gracias a Yahvé[a], porque él es bueno, porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «porque para siempre es su amor fiel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Den alabanza
  lexicon: HALOT
  rationale: El imperativo plural de ידה en hifil puede expresar dar gracias o alabar. En un salmo litúrgico de acción de gracias, 'Den gracias' conserva el valor exhortativo y resulta natural en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo nombra directamente a YHWH. Siguiendo el criterio del proyecto, se mantiene el nombre propio 'Yahvé' en vez de sustituirlo por un título como 'SEÑOR'.
- source_word: כִּי טוֹב
  english_pob_choice: for he is good
  chosen_spanish: porque él es bueno
  alternatives_spanish:
  - pues él es bueno
  - porque es bueno
  lexicon: HALOT
  rationale: כִּי introduce la razón de la acción de gracias. En español hace falta explicitar el sujeto; 'él es bueno' preserva la referencia a Yahvé y el tono confesional.
- source_word: לְעוֹלָם
  english_pob_choice: is forever / endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Aunque el inglés POB discutió 'is forever' frente a 'endures forever', el hebreo aquí forma la expresión fija 'para siempre' con el sustantivo siguiente. En español transmite bien la duración sin forzar un verbo no expresado.
- source_word: חַסְדוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor fiel
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su amor constante
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad, bondad y amor de pacto. 'Amor fiel' conserva esa fidelidad relacional mejor que 'misericordia' y suena natural en español contemporáneo de iglesia.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El verso usa el Tetragrama. Se preserva el nombre revelado de Dios como 'Yahvé', coherente con la política terminológica del proyecto y sin ocultarlo bajo un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de חֶסֶד en un contexto de alabanza litúrgica
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor fiel
  alternative_spanish_readings:
  - su misericordia
  - su bondad leal
  - su amor de pacto
  rationale: No se reduce חֶסֶד a 'misericordia', porque el término hebreo apunta a amor leal y duradero. 'Amor fiel' comunica bien la dimensión pactal y la permanencia del verso.
  doctrine_reference: HALOT; uso consistente de חֶסֶד en salmos de alabanza
translation_notes:
  revision_awareness: El audit trail inglés pasó de una formulación más literal («is forever») a una más natural («endures forever»). En español, se evitó reproducir esa oscilación con un verbo innecesario, porque la construcción hebrea con לְעוֹלָם + חֶסֶד se expresa de forma idiomática como «para siempre»; la nota conserva la alternativa literal que el POB inglés documentó.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - '''Amor fiel'' conserva la carga de חֶסֶד sin caer en un término exclusivamente sentimental.'
  - La sintaxis del verso conserva el paralelismo de dos razones introducidas por 'porque'.
