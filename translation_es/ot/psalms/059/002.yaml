  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהָי se traduce correctamente como «Dios mío» y no interviene Yahvé ni otros términos sensibles. La metáfora de שגב se conserva adecuadamente con «ponme en alto».'
