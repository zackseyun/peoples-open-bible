translation:
  language: es
  text: Hijo mío[a], si los pecadores te tientan, no consientas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo mío» conserva la forma masculina singular del hebreo; es un llamado sapiencial de padre o maestro.
    reason: cultural_note
  - marker: b
    text: O «no cedas» o «no quieras». El verbo hebreo significa estar dispuesto o consentir.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo
  lexicon: HALOT
  rationale: Conserva el vocativo sapiencial y la forma masculina singular del hebreo. 'Hijo mío' suena natural en español bíblico actual y mantiene el tono de instrucción paterna sin neutralizar el género documentado.
- source_word: יְפַתּוּךָ
  english_pob_choice: entice you
  chosen_spanish: te seducen
  alternatives_spanish:
  - te tientan
  - te persuaden
  - te engañan
  lexicon: HALOT
  rationale: El verbo hebreo פתה expresa atraer o persuadir hacia una conducta, con fuerza manipuladora. 'Seducen' comunica esa presión moral en español; 'tientan' es posible, pero puede sugerir solo atracción pasiva. Se evita 'engañan' porque añade una idea más específica de falsedad no exigida por el verbo.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los malvados
  - los que pecan
  lexicon: HALOT
  rationale: El sustantivo plural designa a personas caracterizadas por el pecado. 'Pecadores' es el equivalente directo y natural; conserva el valor de sujeto personal plural sin suavizarlo a una descripción abstracta.
- source_word: תֹּבֵא
  english_pob_choice: consent
  chosen_spanish: consientas
  alternatives_spanish:
  - cedas
  - quieras
  - te prestes
  lexicon: HALOT
  rationale: El verbo אבה en este contexto significa estar dispuesto o dar consentimiento. 'Consientas' mantiene con precisión la idea de aceptar interiormente la invitación, más que solo ceder externamente.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - jamás
  lexicon: HALOT
  rationale: La partícula prohibitiva se expresa de forma directa en español con 'no' antes del subjuntivo, que refleja adecuadamente la prohibición hebrea.
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales o decisiones de aparato crítico en el paquete fuente; la redacción sigue la lectura hebrea masorética provista y el consenso del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el tratamiento vocativo sapiencial en segunda persona singular.
  - Se conserva el matiz moral de advertencia sin ampliar el contenido más allá de la invitación de los pecadores.
  - '''Consientas'' traduce la disposición interior, en línea con la nota léxica inglesa sobre אבה.'
