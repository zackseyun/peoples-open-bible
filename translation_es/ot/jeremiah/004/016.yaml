translation:
  language: es
  text: 'Declárenlo entre las naciones: «¡Miren![a] Proclámenlo con respecto a Jerusalén: Vienen sitiadores[b] de una tierra lejana, y alzan su voz contra las ciudades de Judá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡He aquí!». La partícula hebrea introduce una llamada de atención enfática; «Miren» es una opción idiomática, pero el matiz solemne puede expresarse también con «He aquí».
    reason: lexical_alternative
  - marker: b
    text: O «vigilantes» o «guardianes». El término hebreo literalmente denota a quienes vigilan o guardan, pero en este contexto puede referirse a fuerzas hostiles que rodean una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְכִּירוּ
  english_pob_choice: Declare it
  chosen_spanish: Declárenlo
  alternatives_spanish:
  - Háganlo saber
  - Declárenlo públicamente
  - Menciónenlo
  lexicon: HALOT
  rationale: El imperativo hiphil de זכר puede expresar hacer recordar, mencionar o dar a conocer. En este contexto profético de anuncio público, «Declárenlo» conserva el impulso de proclamación y suena natural en español.
- source_word: לַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - a las naciones
  - entre los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: La preposición ל con גויים admite dirección o ámbito. «Entre las naciones» mantiene el matiz de proclamación pública en un ámbito colectivo sin cargar el término con un sentido técnico posterior de «gentiles».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Vean!
  - ¡Atención!
  lexicon: HALOT
  rationale: La partícula deíctica exige llamar la atención. «¡Miren!» es idiomático en español moderno y conserva la urgencia del recurso profético.
- source_word: הַשְׁמִיעוּ עַל יְרוּשָׁלִַם
  english_pob_choice: proclaim it concerning Jerusalem
  chosen_spanish: Proclámenlo con respecto a Jerusalén
  alternatives_spanish:
  - Hagan que se oiga sobre Jerusalén
  - Proclámenlo contra Jerusalén
  - Anúncienlo acerca de Jerusalén
  lexicon: HALOT
  rationale: El hiphil de שמע es ‘hacer oír’ / anunciar. Con עַל + nombre de ciudad, el sentido puede ser ‘acerca de’ o, en contexto hostil, ‘contra’. «Con respecto a Jerusalén» preserva la ambigüedad del hebreo y evita decidir demasiado pronto por una lectura adversativa que el contexto solo desarrolla en la cláusula siguiente.
- source_word: נֹצְרִים
  english_pob_choice: Besiegers
  chosen_spanish: sitiadores
  alternatives_spanish:
  - vigilantes
  - guardianes
  - centinelas
  lexicon: HALOT
  rationale: Aunque el término deriva de la idea de guardar/vigilar, el contexto bélico inmediato favorece una fuerza hostil que rodea la ciudad. «Sitiadores» refleja la interpretación contextual adoptada en la revisión inglesa, sin perder del todo la imagen militar del término.
- source_word: בָּאִים
  english_pob_choice: are coming
  chosen_spanish: Vienen
  alternatives_spanish:
  - están viniendo
  - están llegando
  - se acercan
  lexicon: HALOT
  rationale: El participio indica acción en curso e inminente. «Vienen» es breve, natural y conserva la sensación de aproximación.
- source_word: מֵאֶרֶץ הַמֶּרְחָק
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra lejana
  alternatives_spanish:
  - de una tierra distante
  - de un país remoto
  - de una tierra apartada
  lexicon: HALOT
  rationale: La expresión describe lejanía geográfica. «Tierra lejana» mantiene el valor colectivo y evita imponer una precisión geopolítica que el hebreo no da.
- source_word: וַיִּתְּנוּ ... קוֹלָם
  english_pob_choice: and they raise their voice
  chosen_spanish: alzan su voz
  alternatives_spanish:
  - levantan su voz
  - dan su voz
  - gritan
  lexicon: HALOT
  rationale: El hebreo idiomático ‘dar la voz’ equivale a alzar o levantar la voz. «Alzan su voz» conserva la imagen corporal y suena natural en español.
- source_word: עַל עָרֵי יְהוּדָה
  english_pob_choice: against the cities of Judah
  chosen_spanish: contra las ciudades de Judá
  alternatives_spanish:
  - sobre las ciudades de Judá
  - acerca de las ciudades de Judá
  lexicon: HALOT
  rationale: En este contexto militar, עַל tiene fuerza adversativa. «Contra» hace explícita esa hostilidad, en línea con la lectura inglesa revisada.
translation_notes:
  revision_awareness: La versión inglesa pasó de «Watchers» a «Besiegers» por ajuste contextual; la español adopta esa lectura contextual con «sitiadores». También se conservó la función de anuncio público de הַזְכִּירוּ y el valor exhortativo de הִנֵּה sin traducir mecánicamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Judá» con la forma habitual española del topónimo bíblico.
  - Se preserva la ambigüedad de עַל יְרוּשָׁלִַם con «con respecto a Jerusalén», para no adelantar la carga hostil más allá de lo que el hebreo expresa en la primera cláusula.
