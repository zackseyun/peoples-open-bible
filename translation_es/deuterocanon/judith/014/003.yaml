  text: Y estos hombres, después de tomar sus armas, irán a su campamento y despertarán a los comandantes del ejército de Asiria;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναλαβόντες
  english_pob_choice: after taking up
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - después de haber tomado
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción anterior a los verbos principales. «Después de tomar» mantiene esa secuencia en español natural sin cargar el estilo.
- source_word: οὗτοι
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estos
  - ellos
  lexicon: LSJ
  rationale: El demostrativo es enfático. En este contexto militar, en español conviene explicitar el sustantivo para conservar claridad y fuerza deíctica.
- source_word: πανοπλίας
  english_pob_choice: armor
  chosen_spanish: sus armas
  alternatives_spanish:
  - su armadura
  - su armamento
  - su panoplia
  lexicon: LSJ
  rationale: πανοπλία puede referirse al conjunto completo de armas/equipo de combate. «Sus armas» comunica el sentido militar de manera natural; «armadura» sería más estrecho y «panoplia» demasiado técnico para el flujo del verso.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή significa campamento o encampment. «Campamento» es claro y sobrio en español.
- source_word: ἐγεροῦσι
  english_pob_choice: will rouse
  chosen_spanish: despertarán
  alternatives_spanish:
  - harán despertar
  - incitarán
  lexicon: LSJ
  rationale: ἐγείρω puede significar despertar o provocar activación. Aquí el matiz más directo es despertar a los jefes del sueño; «despertarán» conserva esa posibilidad sin añadir interpretación excesiva.
- source_word: στρατηγοὺς
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - generales
  - jefes militares
  - oficiales
  lexicon: LSJ
  rationale: στρατηγός puede ser general o comandante. «Comandantes» evita fijar un rango moderno específico y mantiene el sentido funcional del texto.
- source_word: δυνάμεως
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - hueste
  lexicon: LSJ
  rationale: Aunque literalmente puede ser «fuerza», aquí la collocación con Asiria señala el cuerpo militar. «Ejército» es la equivalencia más transparente en español.
- source_word: Ἀσσούρ
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  - Asur
  lexicon: LSJ
  rationale: El referente es el país/potencia asiria. En español bíblico claro, «Asiria» es más inteligible que la transliteración «Assur».
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no registran revisiones aplicadas; por eso la propuesta española sigue de cerca el sentido del original sin introducir variantes interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, con sintaxis directa.
  - Se evita la transliteración innecesaria cuando el español bíblico estándar ofrece una forma más comprensible.
  - «sus armas» conserva el valor colectivo de πανοπλία sin sobretraducir a «armadura» exclusivamente.
