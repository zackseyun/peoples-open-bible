translation:
  language: es
  text: 'Cuando los días de Israel se acercaban a su muerte, llamó a su hijo José y le dijo: «Si ahora he hallado favor ante tus ojos, pon, por favor, tu mano bajo mi muslo[a], y trata conmigo con amor leal y fidelidad[b]. Por favor, no me entierres en Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mano bajo mi muslo» alude a un gesto solemne de juramento en los relatos patriarcales; compárese Génesis 24:2.
    reason: cultural_note
  - marker: b
    text: O «amor constante y fidelidad». El par hebreo חֶסֶד וֶאֱמֶת comunica bondad leal y confiable, con matiz de compromiso relacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ יְמֵי
  english_pob_choice: When the days ... drew near
  chosen_spanish: Cuando los días ... se acercaron
  alternatives_spanish:
  - Cuando llegó el momento ...
  - Cuando se acercó el tiempo ...
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de «los días» que se acercan, con un español natural. Evito reducirlo solo a «el tiempo» para no perder el color idiomático del original.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El hebreo dice «Israel», no «Jacob». Mantener el nombre del texto fuente preserva el dato explícito.
- source_word: לָמוּת
  english_pob_choice: for him to die
  chosen_spanish: para morir
  alternatives_spanish:
  - para que muriera
  - a morir
  lexicon: HALOT
  rationale: En español, «para morir» expresa con naturalidad la proximidad de la muerte sin sobreexplicar el infinitivo hebreo.
- source_word: לִבְנוֹ לְיוֹסֵף
  english_pob_choice: his son Joseph
  chosen_spanish: a su hijo José
  alternatives_spanish:
  - a su hijo Yosef
  lexicon: HALOT
  rationale: Sigo la forma castellana usual «José» para legibilidad litúrgica y lectura pública, sin alterar la identidad del referente.
- source_word: אִם נָא מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: If now I have found favor in your eyes
  chosen_spanish: Si ahora he hallado favor ante tus ojos
  alternatives_spanish:
  - Si ahora he hallado gracia ante tus ojos
  - Si he hallado favor en tus ojos
  lexicon: HALOT
  rationale: «Hallado favor» reproduce el giro hebreo de manera fiel y comprensible. «Ante tus ojos» conserva la imagen idiomática de בְּעֵינֶיךָ mejor que «en tu vista».
- source_word: שִׂים נָא יָדְךָ תַּחַת יְרֵכִי
  english_pob_choice: please put your hand under my thigh
  chosen_spanish: por favor pon tu mano bajo mi muslo
  alternatives_spanish:
  - por favor coloca tu mano bajo mi muslo
  - jura por favor con la mano bajo mi muslo
  lexicon: HALOT
  rationale: Mantengo la formulación concreta del gesto de juramento. «Bajo mi muslo» sigue el hebreo de forma directa; la explicación cultural puede quedar en nota.
- source_word: וְעָשִׂיתָ עִמָּדִי
  english_pob_choice: deal with me
  chosen_spanish: y muéstrame
  alternatives_spanish:
  - y actúa conmigo
  - y haz conmigo
  lexicon: HALOT
  rationale: El verbo עשׂה con עִם aquí pide una expresión idiomática en español. «Muéstrame» enlaza naturalmente con el complemento siguiente, aunque «actúa conmigo» es más literal. La elección intenta equilibrar claridad y cercanía al hebreo.
- source_word: חֶסֶד וֶאֱמֶת
  english_pob_choice: steadfast love and faithfulness
  chosen_spanish: misericordia y fidelidad
  alternatives_spanish:
  - amor leal y fidelidad
  - bondad y verdad
  - amor constante y verdad
  lexicon: HALOT
  rationale: En este contexto de juramento funerario, חֶסֶד וֶאֱמֶת expresa lealtad confiable. «Misericordia y fidelidad» es publicable y comunica el compromiso relacional; con todo, reconozco la posibilidad de «amor leal» o «bondad» según matiz.
- source_word: אַל נָא תִקְבְּרֵנִי בְּמִצְרָיִם
  english_pob_choice: Please do not bury me in Egypt
  chosen_spanish: Por favor, no me entierres en Egipto
  alternatives_spanish:
  - No me entierres, por favor, en Egipto
  - Por favor, no me sepultes en Egipto
  lexicon: HALOT
  rationale: «Enterrar» es el verbo más directo y común para lectura pública. Mantiene la petición negativa cortés del hebreo con naturalidad en español.
theological_decisions:
- issue: Valor del nombre divino no presente explícitamente en este versículo
  english_pob_reading: No divine-name masking issue occurs in the verse
  chosen_spanish_reading: No aplica una decisión sobre Yahvé en el texto principal
  alternative_spanish_readings:
  - Sustituir por Señor en una tradición litúrgica
  rationale: El versículo no contiene יהוה ni κύριος, así que no hay que introducir «SEÑOR» ni una estrategia de ocultamiento. Esto evita añadir una convención ajena al texto.
  doctrine_reference: Translation philosophy §1
- issue: Sentido de חֶסֶד וֶאֱמֶת en contexto patriarcal
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: misericordia y fidelidad
  alternative_spanish_readings:
  - amor leal y fidelidad
  - lealtad y verdad
  - bondad y fidelidad
  rationale: El contexto es una súplica solemne dentro de una obligación familiar pactal. «Misericordia y fidelidad» mantiene el peso relacional y la confiabilidad exigidos por el hebreo, sin forzar un lenguaje demasiado técnico.
  doctrine_reference: Translation philosophy §1, §5
- issue: Conservación del gesto de juramento «mano bajo mi muslo»
  english_pob_reading: Translate literally in the main text and explain culturally in a footnote
  chosen_spanish_reading: Traducir literalmente en el cuerpo y explicar culturalmente en nota
  alternative_spanish_readings:
  - Parafrasear como «júrame»
  - Suavizarlo sin nota
  rationale: La concreción del gesto forma parte del relato patriarcal. Mantenerlo en la línea principal preserva la textura histórica; la nota ayuda a evitar malentendidos modernos.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Tomé como base el hebreo WLC y contrasté el expediente inglés POB. La traducción inglesa revisada pasó de una formulación más literal de Yosef a Joseph y afinó חֶסֶד וֶאֱמֶת como «steadfast love and faithfulness». Para el español, opté por un registro público claro: mantengo la idiomaticidad hebrea en «los días ... se acercaron» y «hallado favor», con una versión más natural del cierre («no me entierres en Egipto») y una nota cultural para el gesto de juramento.'
  spanish_consistency_notes:
  - Usé «José» como forma castellana estándar del nombre propio.
  - Preservé «Israel» porque el hebreo nombra así al sujeto.
  - Evité «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino.
  - Mantuve el gesto de juramento literal y expliqué su sentido en nota.
  - Elegí un par lexical claro para חֶסֶד וֶאֱמֶת que sea publicable en español, sin borrar su carga de lealtad relacional.
