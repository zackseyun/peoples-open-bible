  to: 'Ahora bien, esta es la ley de la ofrenda por la culpa[a]: es santísima.'
  rationale: Se ajusta el arranque para un español más natural que conserve la función discursiva del hebreo, y se reemplaza ‘cosa santísima’ por ‘santísima’ para expresar con mayor claridad e idiomaticidad la clasificación cultual de קֹדֶשׁ קָדָשִׁים. La nota léxica sobre אָשָׁם se mantiene, anclada ahora directamente en el término principal.
