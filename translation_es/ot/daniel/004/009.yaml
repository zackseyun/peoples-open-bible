  to: Su follaje era hermoso y su fruto abundante, y en él había alimento para todos. Debajo de él encontraban sombra las bestias del campo, y en sus ramas habitaban las aves de los cielos, y de él se alimentaba toda carne[a].
  rationale: Se traslada la nota [a] a «toda carne», que es donde realmente se necesita la aclaración léxica, en concordancia con el POB en inglés. Además, se reemplaza «se refugiaban» por «encontraban sombra» para reflejar con mayor precisión la imagen del árbol que da sombra en el arameo original.
