lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Mantiene el valor explicativo o causal que introduce la razón de la afirmación de Sabiduría. 'Porque' es natural en español y conserva la relación con el contexto previo.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lo verdadero
  lexicon: HALOT
  rationale: En un contexto de habla, אֱמֶת apunta primariamente a contenido verdadero o veracidad en la expresión. 'Verdad' es la opción más directa y clara en español.
- source_word: יֶהְגֶּה
  english_pob_choice: will utter
  chosen_spanish: pronunciará
  alternatives_spanish:
  - dirá
  - emitirá
  - hablará
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar murmurar o articular; aquí, con el órgano de habla como sujeto y con 'verdad' como objeto, el sentido es expresión verbal. 'Pronunciará' conserva el matiz de articulación deliberada sin volverlo mecánico.
- source_word: חִכִּי
  english_pob_choice: my mouth
  chosen_spanish: mi paladar[a]
  alternatives_spanish:
  - mi boca
  - mi paladar
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mi paladar'. Se conserva la imagen corporal porque el texto poético la usa como metonimia del órgano del habla. En español, 'paladar' puede sonar menos natural, por eso se aclara con nota y se mantiene el término literal en el texto para no borrar la figura.
- source_word: וְתוֹעֲבַת
  english_pob_choice: and ... is an abomination
  chosen_spanish: y ... es abominación
  alternatives_spanish:
  - y ... es detestable
  - y ... es algo abominable
  lexicon: HALOT
  rationale: תּוֹעֵבָה conserva su fuerza moral fuerte. 'Abominación' reproduce el registro bíblico y la gravedad del término, en línea con la decisión inglesa.
- source_word: שְׂפָתַי
  english_pob_choice: to my lips
  chosen_spanish: para mis labios
  alternatives_spanish:
  - a mis labios
  - con mis labios
  lexicon: HALOT
  rationale: La construcción expresa relación con los labios como esfera del habla. 'Para mis labios' funciona como equivalente idiomático en español y mantiene el vínculo corporal sin forzar un dativo literal.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: la perversidad
  alternatives_spanish:
  - la maldad
  - la impiedad
  - la iniquidad
  lexicon: HALOT
  rationale: רֶשַׁע denota maldad o impiedad moral. 'Perversidad' comunica el carácter torcido y moralmente reprobable del término, manteniendo la oposición con 'verdad'.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés, conservando la metáfora corporal de חִכִּי y el valor moral intenso de תּוֹעֵבָה; no se registraron revisiones sustantivas en el paso inglés previo.
  spanish_consistency_notes:
  - Se prefirió 'verdad' para אֱמֶת, en paralelo con el inglés auditado.
  - Se conservó la imagen literal de 'paladar' con nota para no perder la metáfora poética.
  - '''Abominación'' mantiene el registro bíblico fuerte de תּוֹעֵבָה.'
  - '''Perversidad'' recoge רֶשַׁע con un matiz moral fuerte y natural en español.'
  - 'La puntuación sigue el paralelismo hebreo: primera cláusula afirmativa, segunda cláusula con contraste moral.'
