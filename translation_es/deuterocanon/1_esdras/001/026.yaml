translation:
  language: es
  text: Y Josías no se volvió a su carro[a], sino que intentó combatir contra él, sin prestar atención a las palabras del profeta Jeremías, de la boca de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no retrocedió hacia su carro". El griego es breve y puede sugerir un repliegue o movimiento de retirada hacia el carro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀπέστρεψεν ἑαυτὸν
  english_pob_choice: did not turn back
  chosen_spanish: no se volvió
  alternatives_spanish:
  - no retrocedió
  - no volvió atrás
  lexicon: LSJ
  rationale: La construcción reflexiva expresa que Josías no se apartó ni se retiró. 'No se volvió' mantiene la idea de giro/retirada de manera natural en español y corresponde bien al sentido militar del contexto.
- source_word: ἐπὶ τὸ ἅρμα αὐτοῦ
  english_pob_choice: to his chariot
  chosen_spanish: hacia su carro
  alternatives_spanish:
  - a su carro
  - de vuelta a su carro
  lexicon: LSJ
  rationale: El griego es comprimido y puede sugerir movimiento de repliegue hacia el carro. 'Hacia su carro' conserva esa dirección sin fijar demasiado una interpretación más específica.
- source_word: πολεμεῖν αὐτὸν ἐπεχείρει
  english_pob_choice: attempted to fight him
  chosen_spanish: intentó combatir contra él
  alternatives_spanish:
  - intentó pelear contra él
  - se empeñó en luchar contra él
  lexicon: LSJ
  rationale: ἐπιχειρέω con infinitivo indica intento u উদ্যোগ. 'Intentó combatir contra él' refleja el valor de intento y el lenguaje bélico del pasaje sin exagerar el matiz.
- source_word: οὐ προσέχων
  english_pob_choice: not paying attention to
  chosen_spanish: sin prestar atención a
  alternatives_spanish:
  - sin hacer caso a
  - sin atender a
  lexicon: LSJ
  rationale: La forma participial expresa no prestar atención o no hacer caso. 'Sin prestar atención a' es idiomático y conserva el valor de heed/attention del verbo.
- source_word: ῥήμασιν
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - los mensajes
  lexicon: LSJ
  rationale: ῥήματα son palabras o expresiones dichas. 'Las palabras' es la equivalencia más directa y mantiene el plural concreto del griego.
- source_word: Ἰερεμίου προφήτου
  english_pob_choice: of Jeremiah the prophet
  chosen_spanish: del profeta Jeremías
  alternatives_spanish:
  - de Jeremías el profeta
  lexicon: LSJ
  rationale: Ambas opciones son válidas; en español contemporáneo 'del profeta Jeremías' resulta más natural y conserva la identificación profética.
- source_word: ἐκ στόματος Κυρίου
  english_pob_choice: from the mouth of the Lord
  chosen_spanish: de la boca de Yahvé
  alternatives_spanish:
  - de la boca del Señor
  - procedentes de la boca de Yahvé
  lexicon: LSJ
  rationale: Se preserva la metáfora de origen verbal/divino. 'Yahvé' sigue el criterio del proyecto para κύριος cuando remite al nombre divino, evitando la máscara 'SEÑOR' y manteniendo la fuerza teológica de la expresión.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: Aquí κύριος forma parte de la fórmula que explicita procedencia profética desde la boca divina. Según la terminología del proyecto, se rinde como 'Yahvé' para transparentar el referente del nombre divino.
theological_decisions:
- issue: Autoridad profética en 'de la boca de Yahvé'
  english_pob_reading: Retain the explicit idiom to show that Jeremiah's words are presented as divine speech.
  chosen_spanish_reading: Conservar la imagen de la boca para indicar que las palabras de Jeremías se presentan como habla divina.
  alternative_spanish_readings:
  - simplificar a 'de parte de Yahvé'
  - reducir a 'de Yahvé'
  rationale: 'La imagen no es meramente ornamental: marca el origen autorizado de las palabras proféticas. Mantenerla preserva la carga teológica y el testimonio de inspiración/autoridad del mensaje.'
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica; traducir κύριος de forma transparente cuando el contexto apunta al nombre divino.'
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla primaria, con el paralelo hebreo como comprobación de sentido militar y de la fórmula profética. La revisión inglesa no introdujo cambios sustanciales; la redacción española refleja la misma lectura óptimo-equivalente y conserva la metáfora de la boca del Señor/Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para κύριος cuando remite al nombre divino.
  - Se conserva 'carro' para ἅρμα, en vez de domesticarlo a 'carreta' o 'vehículo', por fidelidad al contexto antiguo.
  - '''Palabras'' traduce ῥήματα de forma concreta y no se amplía a ''mensaje'' para no borrar el plural del original.'
