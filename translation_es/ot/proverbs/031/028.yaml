translation:
  language: es
  text: Sus hijos[a] se levantan y la llaman bienaventurada[b]; su esposo también, y él la alaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «sus hijos varones». El hebreo בָנֶיהָ puede referirse específicamente a varones o, en un sentido más amplio, a hijos.'
    reason: lexical_alternative
  - marker: b
    text: O «la declaran bienaventurada». El verbo hebreo lleva la idea de declarar a alguien dichosa, afortunada o bendecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָמוּ
  english_pob_choice: rise up
  chosen_spanish: se levantan
  alternatives_spanish:
  - se ponen de pie
  - se alzan
  lexicon: HALOT
  rationale: El hebreo expresa levantarse o ponerse en pie; en español, 'se levantan' comunica la acción concreta y mantiene el valor honorífico del contexto sin sonar forzado.
- source_word: בָנֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus niños
  lexicon: HALOT
  rationale: La forma hebrea puede referirse a hijos varones o, en sentido más amplio, a hijos/descendencia. 'Sus hijos' conserva esa amplitud mejor que limitarlo a 'hijos varones'.
- source_word: וַיְאַשְּׁרוּהָ
  english_pob_choice: call her blessed
  chosen_spanish: la llaman bienaventurada
  alternatives_spanish:
  - la proclaman bienaventurada
  - la llaman feliz
  - la declaran bendita
  lexicon: HALOT
  rationale: El verbo ashr en piel tiene el sentido de declarar dichosa, feliz o bendecida. 'Bienaventurada' preserva la valoración pública y el matiz de dicha reconocida; 'bendita' podría sonar más devocional y menos cercano al valor evaluativo del verbo.
- source_word: בַּעְלָהּ
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su dueño
  lexicon: HALOT
  rationale: Aunque בעל puede significar dueño/amo en otros contextos, aquí designa claramente al esposo en un ámbito doméstico. 'Esposo' es fiel y natural en español contemporáneo.
- source_word: וַיְהַלְלָהּ
  english_pob_choice: he praises her
  chosen_spanish: y él la alaba
  alternatives_spanish:
  - y él la alaba en alto
  - y él la exalta
  - y él la celebra
  lexicon: HALOT
  rationale: הלל significa alabar/presentar elogio. 'La alaba' es directo y conserva la acción verbal sin introducir una interpretación más amplia que el hebreo.
- source_word: ו
  english_pob_choice: also, and
  chosen_spanish: también, y
  alternatives_spanish:
  - y
  - además, y
  lexicon: HALOT
  rationale: La partícula añade al esposo al grupo anterior; 'también' refleja ese valor aditivo en español de manera natural.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo. No se registran revisiones textuales relevantes; se conserva la lectura convencional del versículo con una traducción española que mantiene la alternancia entre los hijos y el esposo y el matiz declarativo del verbo אשר.
  spanish_consistency_notes:
  - Se eligió 'sus hijos' por la amplitud semántica del hebreo בָנֶיהָ, en línea con la decisión inglesa 'her children'.
  - Se evitó 'SEÑOR' u otro término disfrazado porque el versículo no contiene el nombre divino.
  - Se prefirió 'bienaventurada' para representar el sentido declarativo de אשר sin perder el tono elogioso del contexto.
  - '''Esposo'' se usa para בעלה conforme al contexto doméstico; no se adoptó el valor ''dueño'' porque no corresponde aquí.'
