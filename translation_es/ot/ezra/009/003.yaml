revisions:
- from: Y cuando oí este asunto[a], rasgué mi ropa y mi manto, me arranqué algunos cabellos de la cabeza y de la barba[b], y me senté desolado.
  to: En cuanto oí este asunto[a], rasgué mi ropa y mi manto, me arranqué algunos cabellos de mi cabeza y de mi barba[b], y me senté consternado.
  rationale: Se ajusta la cláusula temporal para reflejar la inmediatez del hebreo, se mejora la naturalidad de la expresión sobre el cabello, y se sustituye 'desolado' por 'consternado' para conservar mejor el sentido de shock horrorizado que documenta el expediente POB. También se normaliza la redacción de la nota alternativa.
