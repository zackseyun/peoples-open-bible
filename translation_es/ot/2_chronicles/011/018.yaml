review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo y sigue la lectura del POB inglés: una sola esposa, Mahalat, con genealogía comprimida y nota aclaratoria. Sin embargo, la redacción principal introduce una ambigüedad no deseada al decir «y a Abihail», lo que en español suena como objeto directo coordinado y favorece la lectura de una segunda esposa, precisamente la lectura que el POB descarta en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero necesita un ajuste menor para evitar que la coordinación con «y a Abihail» contradiga la intención explicativa. También conviene suavizar «aviso familiar» en la nota, que suena poco natural en español bíblico, y reemplazarlo por una formulación más idiomática.
  glossary_alignment: No hay términos teológicos del glosario mayor en juego. Los nombres propios están razonablemente transliterados. «Tomó por esposa» es una buena equivalencia de וַיִּקַּח לוֹ ... אִשָּׁה. «la hija de» refleja adecuadamente בַּת en la resolución sintáctica adoptada.
  issues:
  - severity: high
    issue: «y a Abihail» en el texto principal sugiere una segunda esposa
    rationale: El hebreo usa singular («una mujer/esposa»), y la decisión documentada del POB es que Abihail forma parte de la genealogía de Mahalat, no una segunda esposa. En español, la preposición personal «a» tras la conjunción coordina naturalmente otro objeto directo de «tomó por esposa», lo que desalinearía el texto con la lectura aprobada.
  - severity: low
    issue: «aviso familiar» en la nota suena poco idiomático
    rationale: Aunque no es incorrecto, resulta poco natural en español eclesial o bíblico. «Noticia genealógica» o «registro familiar» expresa mejor la idea del inglés «family notice».
  revised_spanish_text: Roboam tomó por esposa a Mahalat, la hija de Jerimot hijo de David[a], y de Abihail, la hija de Eliab hijo de Jesé.
  revised_footnotes:
  - marker: a
    text: 'La genealogía hebrea está condensada: literalmente, «Mahalat hijo/hija de Jerimot hijo de David, Abihail hija de Eliab hijo de Jesé». El sentido probable es que Mahalat descendía de ambas líneas; algunos entienden que Abihail es un segundo nombre dentro de la noticia genealógica o, menos probablemente, una segunda esposa.'
    reason: alternative_reading
  revision_rationale: Se cambia «y a Abihail» por «y de Abihail» para que el español exprese con claridad que Abihail pertenece a la genealogía de Mahalat y no funciona como una segunda esposa en el texto principal. También se mejora levemente la nota para una expresión más natural en español.
