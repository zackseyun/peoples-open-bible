translation:
  language: es
  text: Tocan sus sacrificios mientras están sentadas aparte y en cama. Por tanto[a], sabiendo por estas cosas que no son dioses, no les teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «mientras mujeres en aislamiento y mujeres en cama tocan sus sacrificios». El griego es condensado y puede referirse más explícitamente a impureza ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκαθημένη
  english_pob_choice: sitting apart
  chosen_spanish: sentadas aparte
  alternatives_spanish:
  - sentadas separadas
  - sentadas en aislamiento
  - sentadas en apartamiento ritual
  lexicon: LSJ
  rationale: Conserva la imagen concreta de estar sentadas aparte y deja visible, sin explicitar de más, la posible idea de separación ritual que la nota inglesa preserva.
- source_word: λεχὼς
  english_pob_choice: lying with women
  chosen_spanish: acostadas con mujeres
  alternatives_spanish:
  - en cama con mujeres
  - yaciendo con mujeres
  - mujeres en lecho
  lexicon: LSJ
  rationale: La forma griega es comprimida y ambigua; en español, 'acostadas con mujeres' mantiene la rareza del giro y la conexión con un estado de impureza o de lecho sin fijar una interpretación más allá del texto.
- source_word: ἅπτονται
  english_pob_choice: touch
  chosen_spanish: tocan
  alternatives_spanish:
  - manosean
  - toman con la mano
  - tocan con la mano
  lexicon: BDAG
  rationale: '''Tocar'' es el equivalente más directo y reproduce la fuerza polémica de la impureza por contacto.'
- source_word: γνόντες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - al saber
  - reconociendo
  lexicon: BDAG
  rationale: Introduce la inferencia que debe sacar el lector con naturalidad en español.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  - seres divinos
  lexicon: BDAG
  rationale: '''Dioses'' conserva el contraste directo con Yahvé y la polémica antiidolátrica del pasaje.'
- source_word: μὴ φοβηθῆτε
  english_pob_choice: do not fear
  chosen_spanish: no les teman
  alternatives_spanish:
  - no teman a ellos
  - no tengan miedo de ellos
  - no los teman
  lexicon: BDAG
  rationale: La negación se formula en forma natural en español y mantiene el mandato dirigido a la audiencia.
theological_decisions:
- issue: Impureza ritual y defilement by contact
  english_pob_reading: The verse refers to idols being touched by women in states viewed as ritually impure, supporting the argument that they are not true gods.
  chosen_spanish_reading: El versículo alude a un contacto que, en su contexto antiguo, sugiere impureza ritual y sirve para mostrar que esos ídolos no son dioses verdaderos.
  alternative_spanish_readings:
  - El versículo sólo describe mujeres sentadas y acostadas alrededor de los ídolos, sin matiz de impureza ritual.
  - El versículo se puede entender como una escena doméstica más general, sin especificar el tipo de impureza.
  rationale: La sintaxis griega es comprimida y no obliga a explicitar todos los detalles; el español debe conservar la tensión entre la imagen literal y la implicación ritual sin resolverla en exceso.
  doctrine_reference: Preservar la tensión exegética y el argumento antiidolátrico del texto.
translation_notes:
  revision_awareness: Revisé el pasaje a partir del griego de Swete y del expediente inglés POB; no se requirieron cambios textuales adicionales, pero sí una formulación española que preserve la ambigüedad comprimida del original y la nota alternativa sobre impureza ritual.
  spanish_consistency_notes:
  - Usé 'Dioses' en plural para θεοί, manteniendo la polémica contra la idolatría.
  - Opté por 'sentadas aparte' y 'acostadas con mujeres' para conservar la imagen extraña del griego sin explicarla en exceso.
  - Mantuve 'no les teman' como mandato directo y natural en español.
  - La nota[a] se ancla en 'Por tanto' para reflejar la alternativa interpretativa del inglés POB.
