translation:
  language: es
  text: No tendrás otros dioses delante de mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además de mí». El hebreo dice literalmente «delante de mi rostro», lo cual puede expresar tanto presencia como exclusividad.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יִהְיֶה
  english_pob_choice: You shall have no
  chosen_spanish: No tendrás
  alternatives_spanish:
  - No habrá para ti
  - No tendrás que tener
  lexicon: HALOT
  rationale: El hebreo usa la negación con היה y el dativo de relación para expresar posesión prohibida. En español, «No tendrás» comunica con naturalidad la prohibición y conserva la fuerza normativa sin introducir un calco torpe.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: tú / para ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular queda implícito en el verbo español. El sentido relacional de לְךָ se refleja en la construcción prohibitiva dirigida directamente al oyente.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  - divinidades
  lexicon: HALOT
  rationale: Aquí el plural con «otros» designa deidades rivales. «Dioses» es el equivalente más directo y transparente en español.
- source_word: אֲחֵרִים
  english_pob_choice: other
  chosen_spanish: otros
  alternatives_spanish:
  - ajenos
  - extraños
  lexicon: HALOT
  rationale: El adjetivo marca distinción respecto de Yahvé. «Otros» reproduce esa oposición sin añadir matices ajenos al texto.
- source_word: עַל פָּנָי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  - además de mí
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «sobre/delante de mi rostro». «Delante de mí» conserva la imagen espacial y relacional, y deja abierta la posible extensión a exclusividad que el inglés POB preserva en nota.
theological_decisions:
- issue: Sentido de עַל פָּנָי en el mandamiento
  english_pob_reading: before me, with a note that it can also mean besides me
  chosen_spanish_reading: delante de mí, con nota de que también puede entenderse como además de mí
  alternative_spanish_readings:
  - en mi presencia
  - además de mí
  rationale: El hebreo admite tanto la idea de presencia/frontalidad como la de exclusividad. Mantener «delante de mí» en el texto principal evita resolver la tensión semántica; la nota preserva la lectura alternativa «además de mí» sin desplazar la forma más transparente del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preservar la tensión teológica en lugar de resolverla)'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no se requieren cambios adicionales y la propuesta mantiene la lectura principal y la nota alternativa documentadas.'
  spanish_consistency_notes:
  - Se usa «dioses» en plural para reflejar אֱלֹהִים en este contexto de deidades rivales.
  - Se evita «SEÑOR» para יהוה porque este versículo no lo contiene explícitamente; la referencia implícita al hablante divino se mantiene solo por el pronombre «mí».
  - «Delante de mí» conserva la imagen del hebreo y permite la alternativa «además de mí» en nota, siguiendo el manejo del inglés POB.
  - La segunda persona singular queda implicada en el verbo «tendrás», coherente con el hebreo לְךָ.
