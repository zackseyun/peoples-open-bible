lexical_decisions:
- source_word: δυνατὸς
  english_pob_choice: is able
  chosen_spanish: es capaz de
  alternatives_spanish:
  - puede ser
  - tiene poder para
  lexicon: LSJ
  rationale: ἰδios de capacidad, no de poder abstracto; en español 'es capaz de' expresa aptitud efectiva de manera natural y fiel.
- source_word: σώφρων
  english_pob_choice: self-controlled
  chosen_spanish: sobria
  alternatives_spanish:
  - dueña de sí
  - templada
  - prudente
  lexicon: LSJ
  rationale: Aquí σώφρων describe una mente disciplinada y con dominio de sí. 'Sobria' comunica mesura y autocontrol con dignidad en español, aunque conserva un matiz más breve que la frase explicativa 'dueña de sí'.
- source_word: νοῦς
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - razón
  - entendimiento
  lexicon: LSJ
  rationale: El término puede significar la facultad racional o la mente. 'Mente' mantiene el alcance amplio del griego y permite conservar la función gobernante de la facultad racional en el contexto.
- source_word: νικῆσαι
  english_pob_choice: to conquer
  chosen_spanish: vencer
  alternatives_spanish:
  - conquistar
  - derrotar
  lexicon: LSJ
  rationale: El infinitivo expresa dominio victorioso sobre algo que resiste. 'Vencer' es natural en español y conserva la imagen de triunfo, sin el matiz potencialmente demasiado externo de 'conquistar'.
- source_word: ἀνάγκας
  english_pob_choice: compulsions
  chosen_spanish: compulsiones
  alternatives_spanish:
  - coacciones
  - necesidades
  - presiones
  lexicon: LSJ
  rationale: En este contexto moral-psicológico, ἀνάγκη no es 'necesidad' en sentido neutro, sino una fuerza coactiva interna. 'Compulsiones' reproduce bien esa presión interna y el vínculo con las pasiones.
- source_word: πάθη
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - afectos desordenados
  - emociones
  - deseos
  lexicon: LSJ
  rationale: En el lenguaje ético helenístico, πάθη alude a pasiones desordenadas. 'Pasiones' es el equivalente directo y reconocido en español para ese campo semántico.
- source_word: σβέσαι
  english_pob_choice: to extinguish
  chosen_spanish: apagar
  alternatives_spanish:
  - extinguir
  - sofocar
  lexicon: LSJ
  rationale: La imagen es la de apagar fuego. 'Apagar' en español conserva la metáfora con claridad y resulta más idiomático que una opción más técnica.
- source_word: οἴστρων
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - ardores
  - impulsos
  - frenesíes
  lexicon: LSJ
  rationale: El griego puede abarcar impulsos intensos o punzantes, no solo deseo sexual. 'Deseos' mantiene amplitud semántica y evita restringir el pasaje a la lujuria sexual.
- source_word: φλεγμονάς
  english_pob_choice: burnings
  chosen_spanish: ardores
  alternatives_spanish:
  - inflamaciones
  - llamas
  - incendios
  lexicon: LSJ
  rationale: El sustantivo expresa ardor/inflamación con metáfora de fuego. 'Ardores' preserva la imagen térmica y sugiere intensidad interior sin sonar clínico o demasiado literal.
theological_decisions:
- issue: Función de νοῦς como facultad racional gobernante
  english_pob_reading: Rendered νοῦς as 'mind' while preserving its rational-governing force through context.
  chosen_spanish_reading: Traducir νοῦς como 'mente' y no como un término doctrinal más cargado como 'razón' o 'entendimiento'.
  alternative_spanish_readings:
  - razón
  - entendimiento
  rationale: El versículo contrapone la facultad sobria que domina las pasiones. 'Mente' permite incluir la fuerza racional sin reducir el término a una sola teoría antropológica; el contexto de vencer y apagar sostiene su papel gobernante.
  doctrine_reference: Translation philosophy §6; preserve source sense without importing extra doctrinal claims.
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del inglés, que ajustó la segunda cláusula para reflejar con mayor precisión φλεγμονάς y οἴστρων. En español se mantuvo esa precisión mediante 'ardores de los deseos', evitando una formulación más interpretativa o sexualizada en exceso.
  spanish_consistency_notes:
  - Se usó 'pasiones' para πάθη, manteniendo el uso POB del campo ético helenístico.
  - Se evitó 'Cristo' o terminología cristológica, ya que el pasaje no la contiene.
  - Se preservó la metáfora de fuego con 'apagar' y 'ardores'.
  - '''Mente'' se eligió por claridad, pero la nota a aclara la alternativa ''razón'' para respetar la tensión lexical del griego.'
