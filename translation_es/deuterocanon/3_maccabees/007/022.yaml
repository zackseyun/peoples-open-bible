translation:
  language: es
  text: Y todos ellos recobraron todos sus bienes del registro[a], de modo que quienes tenían algo se los devolvieron con el mayor temor, porque el gran Dios había realizado plenamente grandes hechos para su liberación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del inventario» o «del registro oficial»; ἀπογραφή puede referirse a una inscripción administrativa de personas o bienes.
    reason: lexical_alternative
  - marker: b
    text: O «para su salvación». El griego σωτηρία puede denotar tanto un rescate concreto como la salvación en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκομίσαντο
  english_pob_choice: recovered
  chosen_spanish: recobraron
  alternatives_spanish:
  - recibieron de nuevo
  - recuperaron
  - obtuvieron de vuelta
  lexicon: LSJ
  rationale: El verbo medio expresa que volvieron a obtener lo que les pertenecía. «Recobraron» conserva la idea de recuperación/restauración y suena natural en español bíblico contemporáneo.
- source_word: ἐξ ἀπογραφῆς
  english_pob_choice: from the registration
  chosen_spanish: por el registro
  alternatives_spanish:
  - de la inscripción
  - desde el inventario
  - por el censo
  lexicon: LSJ
  rationale: ἀπογραφή puede aludir a un registro administrativo o inventario. «Por el registro» mantiene esa referencia documental sin estrechar indebidamente el sentido a un censo de personas.
- source_word: τοὺς ἔχοντάς τι
  english_pob_choice: those who had anything
  chosen_spanish: los que tenían algo
  alternatives_spanish:
  - los que poseían algo
  - los que tenían cualquiera de ello
  - los que tenían alguna cosa
  lexicon: LSJ
  rationale: La frase abarca de manera general a quienes poseían parte de lo requisado. «Los que tenían algo» reproduce bien esa amplitud sin sonar pesado.
- source_word: μετὰ φόβου μεγίστου
  english_pob_choice: with the greatest fear
  chosen_spanish: con el mayor temor
  alternatives_spanish:
  - con gran temor
  - con muchísimo temor
  - en extremo temor
  lexicon: LSJ
  rationale: φόβος aquí expresa temor/dread ante la acción divina. «Temor» es más fiel que «awe» y «el mayor» refleja el superlativo μεγίστου.
- source_word: ἀποδοῦναι αὐτοῖς
  english_pob_choice: gave it back to them
  chosen_spanish: se lo devolvieran
  alternatives_spanish:
  - se lo restituyeran
  - se lo entregaran de nuevo
  - se lo devolvieran a ellos
  lexicon: LSJ
  rationale: El infinitivo expresa restitución. En español, dentro de una construcción de resultado, «se lo devolvieran» comunica con claridad la devolución de lo que era suyo.
- source_word: τὰ μεγαλεῖα
  english_pob_choice: mighty deeds
  chosen_spanish: grandes obras
  alternatives_spanish:
  - mighty deeds
  - maravillas
  - obras poderosas
  lexicon: LSJ
  rationale: El sustantivo puede referirse a actos grandes o maravillosos de Dios. «Grandes obras» preserva la elevación del registro y evita sobreinterpretar el matiz.
- source_word: ποιήσαντος τελέως
  english_pob_choice: had fully performed
  chosen_spanish: había realizado plenamente
  alternatives_spanish:
  - había cumplido plenamente
  - había hecho por completo
  - había llevado a cabo plenamente
  lexicon: LSJ
  rationale: La construcción subraya una acción completa y eficaz. «Había realizado plenamente» refleja bien la fuerza de τελέως y mantiene un estilo formal.
- source_word: ἐπὶ σωτηρίᾳ αὐτῶν
  english_pob_choice: for their deliverance
  chosen_spanish: para su liberación
  alternatives_spanish:
  - para su salvación
  - para su rescate
  - para su deliverancia
  lexicon: LSJ
  rationale: En este contexto narrativo, σωτηρία indica rescate/liberación concreta. «Liberación» conserva el valor histórico inmediato sin perder resonancia teológica.
theological_decisions:
- issue: Valor de σωτηρία en un contexto narrativo de rescate
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: La escena celebra una intervención concreta de Dios en favor del pueblo, por lo que «liberación» expresa mejor el sentido inmediato. «Salvación» sigue siendo posible como eco teológico más amplio, pero aquí sería más abstracta que el contexto exige.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without importing later doctrinal specificity.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: mantiene la causalidad explícita con «porque» y refleja la fuerza de πλήρως/τελέως con «había realizado plenamente». También conserva la decisión revisada de expresar el verbo de acción divina con un registro directo y formal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, siguiendo la norma del proyecto.
  - Se conserva «liberación» para σωτηρία en el flujo principal, con nota alternativa «salvación» donde el griego admite ambas lecturas.
  - «Registro» traduce ἀπογραφή en sentido administrativo, coherente con el contexto de bienes restituidos.
  - El superlativo «el mayor temor» refleja φόβου μεγίστου sin suavizar el tono de dread o reverencia temerosa.
