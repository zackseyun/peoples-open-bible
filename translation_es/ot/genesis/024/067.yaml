base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/067.yaml
  text: And Isaac brought her into the tent of Sarah his mother[a], and he took Rebekah, and she became his wife, and he loved her[b]. So Isaac was comforted after his mother's death.
  footnotes:
  - marker: a
    text: Or 'into the tent of his mother Sarah.' The Hebrew word order allows either English arrangement, with the same basic sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'after his mother'; the sense is after the loss/death of his mother, though 'death' is not stated explicitly in Hebrew.
    reason: lexical_alternative
