revisions:
- from: La justicia es echada atrás[a], y la rectitud queda lejos; porque la verdad tropieza en la calle[b], y la honradez no puede entrar.
  to: La justicia es hecha retroceder, y la rectitud queda lejos; porque la verdad tropieza en la calle[a], y la rectitud no puede entrar[b].
  rationale: Se corrigen las notas para que coincidan con la pista auditada del POB y se reubican en los segmentos pertinentes del texto. Se sustituye «honradez» por «rectitud» para reflejar mejor נְכֹחָה como cualidad abstracta personificada. También se mejora «es echada atrás» a «es hecha retroceder» por mayor naturalidad y fidelidad al pasivo hebreo.
