base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/009.yaml
  text: She who bore seven has withered away[a]; she has breathed out her life. Her sun has gone down while it was still day. She is ashamed and humiliated. And the remnant of them I will give to the sword before their enemies[c][b], declares Yahweh.
  footnotes:
