translation:
  language: es
  text: Y todo hombre hábil[a] entre los que hacían la obra hizo el tabernáculo con diez cortinas de lino finamente torcido, azul, púrpura y carmesí; las hizo con querubines[b], obra de un diseñador hábil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sabio de corazón», un modismo para un artesano hábil.
    reason: lexical_alternative
  - marker: b
    text: El hebreo termina con un verbo singular, «las hizo», aunque el versículo comenzó con un sujeto plural; algunas versiones lo suavizan a «las hicieron».
    reason: alternative_reading
lexical_decisions:
- source_word: כָל חֲכַם לֵב
  english_pob_choice: every skillful man
  chosen_spanish: todo hombre de corazón sabio
  alternatives_spanish:
  - todo hombre hábil
  - toda persona hábil
  lexicon: HALOT
  rationale: Conserva la imagen literal hebrea «corazón sabio» y a la vez comunica el sentido idiomático de habilidad artesanal. Mantengo «hombre» para reflejar la forma masculina singular/generica del hebreo, siguiendo la decisión auditada en inglés.
- source_word: בְּעֹשֵׂי הַמְּלָאכָה
  english_pob_choice: among those doing the work
  chosen_spanish: entre los que hacían la obra
  alternatives_spanish:
  - entre los obreros
  - entre los que trabajaban
  lexicon: HALOT
  rationale: La preposición con participio expresa pertenencia al grupo ocupado en la labor. «Entre los que hacían la obra» conserva esa relación sin perder naturalidad en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente bíblico establecido para esta estructura cultual en Éxodo. «Morada» sería demasiado general aquí.
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - paneles
  - lienzos
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa grandes paños o cubiertas textiles. «Cortinas» es el equivalente más natural y claro en español.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: finely twisted linen
  chosen_spanish: lino torcido
  alternatives_spanish:
  - lino finamente torcido
  - lino retorcido fino
  lexicon: HALOT
  rationale: La frase describe lino de calidad con hilo torcido o hilado. En español, «lino torcido» conserva la referencia textil sin sobrecargar la frase; el adverbio «finamente» puede entenderse implícito por el contexto de lujo y manufactura especializada.
- source_word: וּתְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: de azul
  alternatives_spanish:
  - azul
  - de azul púrpura
  lexicon: HALOT
  rationale: Sigo el valor cromático básico del término. La preposición «de» enlaza naturalmente con la serie de materiales/crores del texto.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - de púrpura
  - morado
  lexicon: HALOT
  rationale: «Púrpura» reproduce el color/tejido prestigioso del hebreo en registro bíblico sin volverse arcaizante.
- source_word: וְתוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  lexicon: HALOT
  rationale: El hebreo alude a material teñido de escarlata/carmesí. En español, «carmesí» funciona bien como color-textil y evita añadir «hilo» sin una marca explícita en el texto base; la serie de colores ya sugiere material teñido.
- source_word: כְּרֻבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines sagrados
  - querubos
  lexicon: HALOT
  rationale: «Querubines» es el equivalente bíblico estándar en español y preserva el registro cultual. Evito «querubs» o formas no usuales.
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de un diseñador hábil
  alternatives_spanish:
  - obra de un artesano hábil
  - obra de un tejedor experto
  - trabajo de un hábil diseñador
  lexicon: HALOT
  rationale: La expresión apunta a trabajo artísticamente concebido y ejecutado. «Diseñador hábil» capta el elemento de planificación/arte implícito en חֹשֵׁב y mantiene la decisión auditada de no reducirlo a simple bordado.
- source_word: עָשָׂה אֹתָם
  english_pob_choice: he made them
  chosen_spanish: los hizo
  alternatives_spanish:
  - él los hizo
  - los hicieron
  lexicon: HALOT
  rationale: Conservo el singular verbal del hebreo final, como en el registro inglés auditado. En español, el sujeto implícito singular se expresa de manera natural con «los hizo» sin armonizarlo a plural.
theological_decisions:
- issue: Renderizar חֲכַם לֵב con una frase que conserve tanto la metáfora como la función artesanal
  english_pob_reading: skillful man
  chosen_spanish_reading: hombre de corazón sabio
  alternative_spanish_readings:
  - hombre hábil
  - persona hábil
  rationale: La lectura auditada en inglés reconoce la idiomatización de «wise of heart». En español, «de corazón sabio» preserva la metáfora hebrea y evita perder la tensión entre sabiduría interior y destreza manual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mantener el verbo singular final sin armonización
  english_pob_reading: he made them
  chosen_spanish_reading: los hizo
  alternative_spanish_readings:
  - los hicieron
  rationale: El hebreo termina con un verbo singular después de un sujeto plural inicial. Mantener la forma singular en español conserva la auditable particularidad textual y evita una normalización interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se revisó el audit trail inglés y se mantuvieron las decisiones clave: el valor idiomático de «wise of heart», la referencia cultual de «tabernacle», la serie textil/colorida, la retención de «cherubim», y el singular final del verbo hebreo. La redacción española se ajusta a la sintaxis natural sin borrar esas tensiones textuales.'
  spanish_consistency_notes:
  - Uso «tabernáculo» para הַמִּשְׁכָּן en coherencia con el POB inglés.
  - Uso «querubines» y no «querubs» para mantener el registro bíblico estándar.
  - Conservo la metáfora «corazón sabio» como anclaje para la nota lexical.
  - Alineo la nota del verbo singular con el final del texto español «los hizo».
