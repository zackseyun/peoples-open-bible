  spanish_consistency_notes:
  - Se mantiene el valor relacional de אֲחֵי como 'hermanos' en lugar de 'parientes', siguiendo el sentido mínimo exigido por el hebreo y la decisión inglesa.
  - Los nombres propios se hispanizan de forma consistente y legible; no se añaden títulos ni equivalentes interpretativos.
