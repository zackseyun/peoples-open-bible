review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido básico del hebreo: medición fuera de la ciudad en las cuatro direcciones, dos mil codos por lado, con la ciudad en medio, y designación del área circundante para las ciudades. Sin embargo, hay pequeños ajustes de fidelidad y naturalidad: «desde fuera de la ciudad» suena menos preciso que «fuera de la ciudad», y «Esto será para ellos los terrenos de pasto...» necesita una preposición para reflejar mejor זֶה יִהְיֶה לָהֶם מִגְרְשֵׁי.'
  spanish_quality_summary: 'La redacción es clara y entendible, pero puede pulirse para sonar más natural y digna en español eclesial general. «Lado oriental/occidental» no es incorrecto, pero «lado este/oeste» resulta más directo y uniforme con «sur/norte». La cláusula final requiere mejora gramatical: «Esto será para ellos los terrenos...» es torpe; «Estos serán para ellos los terrenos...» o «Esto será para ellos como...» serían mejores. También conviene mantener la nota [b] anclada en «terrenos de pasto», no en «en medio».'
  glossary_alignment: No hay términos teológicos mayores en juego. La decisión por «codos» es adecuada. La nota sobre יָם > oeste es correcta. Para מִגְרְשֵׁי הֶעָרִים, «terrenos de pasto» es aceptable, aunque «pastizales» o «tierras de pastoreo» también funcionarían; la nota alternativa ya preserva el campo semántico de terreno comunal/abierto. La colocación de la nota [b] debe corresponder al término מִגְרְשֵׁי, no a «en medio».
  issues:
  - severity: medium
    issue: La frase final «Esto será para ellos los terrenos de pasto de las ciudades» es gramaticalmente poco natural.
    rationale: El hebreo expresa designación/asignación. En español se requiere una construcción más natural, como «Estos serán para ellos los terrenos de pasto de las ciudades».
  - severity: low
    issue: «Desde fuera de la ciudad» añade un matiz de punto de partida que no es necesario.
    rationale: מִחוּץ לָעִיר se refleja mejor con «fuera de la ciudad», que coincide mejor con el inglés auditado y suena más natural.
  - severity: low
    issue: La nota [b] está anclada a «en medio» en vez de al término correspondiente a מִגְרְשֵׁי.
    rationale: La nota explica el sentido de «terrenos de pasto / terreno comunal abierto», no la ubicación de la ciudad.
  revised_spanish_text: 'Medirán fuera de la ciudad: el lado este, dos mil codos; el lado sur, dos mil codos; el lado oeste[a], dos mil codos; y el lado norte, dos mil codos, con la ciudad en medio. Estos serán para ellos los terrenos de pasto[b] de las ciudades.'
  revised_footnotes:
