  to: Entonces José enjaezó su carro y subió para ir al encuentro de Israel su padre en Gosén. Se presentó ante él[a], se echó sobre su cuello[b] y lloró sobre su cuello por mucho tiempo.
  rationale: Se reemplaza «Se le apareció» por «Se presentó ante él» para evitar un matiz de aparición sobrenatural o repentina que no corresponde al contexto y no refleja bien la justificación léxica auditada. También se ajusta «por largo tiempo» a «por mucho tiempo» por mayor naturalidad en español, sin cambiar el sentido.
