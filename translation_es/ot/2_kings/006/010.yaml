  text: וַ/יִּשְׁלַ֞ח מֶ֣לֶךְ יִשְׂרָאֵ֗ל אֶֽל הַ/מָּק֞וֹם אֲשֶׁ֨ר אָֽמַר ל֧/וֹ אִישׁ הָ/אֱלֹהִ֛ים ו/הזהיר/ה וְ/נִשְׁמַ֣ר שָׁ֑ם לֹ֥א אַחַ֖ת וְ/לֹ֥א שְׁתָּֽיִם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/006/010.yaml
  text: So the king of Israel sent to the place about which the man of God had spoken to him and warned him[c][b][a], and he kept himself on guard there—not once or twice.
  footnotes:
  - marker: a
    text: Or, 'sent to the place'; the Hebrew verb is simply 'sent,' and the exact object is implicit in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was on his guard there.' The Hebrew may emphasize either the king's guardedness or his taking precautions at that place.
    reason: lexical_alternative
  - marker: c
    text: Or 'sent word to the place'.
    reason: previous_rendering
