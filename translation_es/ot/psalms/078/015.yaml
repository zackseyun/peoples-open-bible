- from: Él partió las rocas en el desierto y les dio de beber abundantemente[a], como de los grandes abismos.
  to: Partió las rocas en el desierto y les dio de beber abundantemente[a], como de las grandes profundidades.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad y precisión semántica en español: «profundidades» refleja mejor la imagen acuática de תְּהֹמוֹת que «abismos», y se elimina el pronombre innecesario «Él». Se mantiene la abundancia, la comparación poética y la nota alternativa del POB inglés.'
