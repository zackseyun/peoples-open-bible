  source_alignment_summary: 'El borrador refleja bien la estructura sumaria del hebreo y la lista sacrificial: totalidad del ganado para el holocausto, doce toros, doce carneros, doce corderos de un año, su ofrenda asociada, y doce machos cabríos para חַטָּאת. Conserva adecuadamente la nota alternativa sobre חַטָּאת.'
