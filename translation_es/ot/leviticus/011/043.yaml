  text: אַל תְּשַׁקְּצוּ֙ אֶת נַפְשֹׁ֣תֵי/כֶ֔ם בְּ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֑ץ וְ/לֹ֤א תִֽטַּמְּאוּ֙ בָּ/הֶ֔ם וְ/נִטְמֵתֶ֖ם בָּֽ/ם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/043.yaml
  text: Do not make yourselves detestable by any swarming thing that swarms[a], and do not make yourselves unclean by them, so that you do not become unclean by them.
  footnotes:
  - marker: a
    text: Or 'by any creeping thing that creeps.' The Hebrew refers to the class of small creatures that swarm or teem; 'swarming thing' preserves the broader category better than the traditional 'creeping thing.'
    reason: lexical_alternative
