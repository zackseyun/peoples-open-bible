translation:
  language: es
  text: Como guerreros corren; como hombres de guerra[a] escalan el muro. Cada uno va por su camino, y no se desvían de sus senderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como soldados» o «como combatientes» para «como hombres de guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּגִבּוֹרִים
  english_pob_choice: Like warriors
  chosen_spanish: Como guerreros
  alternatives_spanish:
  - Como hombres valientes
  - Como héroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים en este contexto militar se refiere a combatientes fuertes o guerreros. «Guerreros» conserva el sentido bélico natural en español y evita un tono demasiado abstracto.
- source_word: יְרֻצוּן
  english_pob_choice: they run
  chosen_spanish: corren
  alternatives_spanish:
  - se apresuran
  - salen corriendo
  lexicon: HALOT
  rationale: El verbo רוץ expresa correr; el presente en español comunica bien la acción característica y vívida de la comparación.
- source_word: כְּאַנְשֵׁי מִלְחָמָה
  english_pob_choice: like men of war
  chosen_spanish: como hombres de guerra
  alternatives_spanish:
  - como soldados
  - como combatientes
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «como hombres de guerra». Se conserva la forma más cercana al original, con una fórmula comprensible en español.
- source_word: יַעֲלוּ חוֹמָה
  english_pob_choice: they climb the wall
  chosen_spanish: suben el muro
  alternatives_spanish:
  - escalan el muro
  - suben por la muralla
  lexicon: HALOT
  rationale: עלה con חוֹמָה describe ascender un muro. «Suben el muro» mantiene la imagen directa; «muralla» también sería posible, pero «muro» sigue más de cerca el término hebreo.
- source_word: וְאִישׁ בִּדְרָכָיו יֵלֵכוּן
  english_pob_choice: Each goes in his own way
  chosen_spanish: Cada uno va por su camino
  alternatives_spanish:
  - Cada uno marcha por su senda
  - Cada uno sigue su propio camino
  lexicon: HALOT
  rationale: 'אִישׁ tiene fuerza distributiva: «cada uno». דֶּרֶךְ puede ser «camino» o «modo de proceder»; aquí se conserva la imagen espacial y ordenada de avance individual dentro del grupo.'
- source_word: וְלֹא יְעַבְּטוּן
  english_pob_choice: they do not swerve
  chosen_spanish: no se desvían
  alternatives_spanish:
  - no se apartan
  - no rompen fila
  lexicon: HALOT
  rationale: El verbo es raro y difícil; en contexto sugiere no desviarse del curso o de la formación. «No se desvían» mantiene la ambigüedad útil entre trayectoria y disciplina militar sin imponer una lectura excesiva.
- source_word: אֹרְחוֹתָם
  english_pob_choice: their paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus huellas
  lexicon: HALOT
  rationale: אֹרְחוֹתָם significa sus sendas o caminos trazados. «Senderos» funciona bien en paralelo con «camino» y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Masculino explícito en la comparación militar
  english_pob_reading: Retain 'men of war' and 'his own way' in the distributive clause
  chosen_spanish_reading: Conservar «hombres de guerra» y «cada uno» con «su camino»
  alternative_spanish_readings:
  - como soldados ... cada uno va por su propio camino
  - como combatientes ... cada uno va por su camino
  rationale: El hebreo usa formas masculinas explícitas y un singular distributivo en אִישׁ con sufijo de tercera persona masculina. Se preserva esa huella del original sin neutralizarla innecesariamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés; no se detectan revisiones textuales relevantes en la fuente base. Se mantiene la estructura comparativa y la imagen militar con una equivalencia optimizada, evitando suavizar la fuerza del hebreo.
  spanish_consistency_notes:
  - Se mantiene «camino/senderos» para reflejar el contraste entre דֶּרֶךְ y אֹרְחוֹתָם.
  - Se conserva el masculino del original en «hombres de guerra» y «cada uno».
  - «Muro» se usa para חוֹמָה, en línea con la imagen de asalto urbano y con el sentido directo del hebreo.
