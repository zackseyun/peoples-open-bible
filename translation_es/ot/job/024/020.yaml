review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y las decisiones principales del hebreo y del POB inglés: mantiene «vientre», el cese de la memoria, la lectura abstracta de עַוְלָה y la comparación «como un árbol». Sin embargo, «el gusano se deleita en él» no preserva con suficiente claridad la idea léxica documentada de מְתָקוֹ con רִמָּה como sujeto: el gusano lo halla dulce/comestible. La nota [a] también introduce una alternativa («su madre») que no corresponde a la nota inglesa conservada para esta cláusula.'
  spanish_quality_summary: 'El español es claro y digno, pero dos ajustes mejoran fidelidad y naturalidad: 1) «El vientre lo olvida» suena más directo e idiomático que «El vientre se olvida de él» para un sujeto personificado; 2) «el gusano se alimenta dulcemente de él» o una formulación equivalente expresa mejor el sentido macabro de ‘sweet’ aplicado al alimento. Además, conviene alinear las notas con las alternativas auditadas y evitar añadir una nota innecesaria sobre «su madre».'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «La injusticia» para עַוְלָה está bien y conserva la decisión abstracta del POB, con nota para la lectura concreta. «Vientre» es aceptable para רֶחֶם. El problema principal no es glosario sino precisión semántica en מְתָקוֹ/רִמָּה.
  issues:
  - severity: medium
    issue: «El gusano se deleita en él» debilita el sentido léxico de מְתָקוֹ.
    rationale: El hebreo, según la auditoría inglesa, comunica que el gusano lo encuentra dulce como alimento / se alimenta de él con dulzura. «Se deleita en él» sugiere placer general, pero pierde la dimensión alimentaria explícita que el POB decidió hacer inteligible.
  - severity: medium
    issue: La nota [a] no corresponde a la nota inglesa preservada y añade una alternativa distinta.
    rationale: La nota del POB inglés para el primer segmento era sobre el gusano («the worm finds him sweet»), no sobre «the womb». Añadir «su madre» como alternativa interpretativa desplaza el foco de la evidencia auditada.
  - severity: low
    issue: «El vientre se olvida de él» es menos natural que «El vientre lo olvida».
    rationale: Ambas son comprensibles, pero «lo olvida» suena más limpio y mantiene mejor la fuerza personificada del hebreo sin reflexividad innecesaria.
  revised_spanish_text: El vientre lo olvida; el gusano se alimenta dulcemente de él[a]. Ya no se le recuerda[b], y la injusticia se quiebra como un árbol[c].
