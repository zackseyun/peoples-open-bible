translation:
  language: es
  text: Aunque Babilonia se eleve hasta los cielos[a], y aunque fortifique la altura de su fuerza[b], vendrán a ella destructores de parte mía[c], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo»; el hebreo usa el plural «los cielos», que conserva el tono elevado y poético.
    reason: lexical_alternative
  - marker: b
    text: Lit. «la altura de su fuerza»; la expresión puede referirse a su fortaleza elevada o a la altura de su poder defensivo.
    reason: lexical_alternative
  - marker: c
    text: O «saqueadores»; el término hebreo puede denotar a quienes devastan saqueando, además de destruir.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  - Incluso si
  - Porque
  lexicon: HALOT
  rationale: En este contexto la partícula introduce una concesión; «Aunque» reproduce bien ese valor y conserva el paralelismo enfático de la cláusula siguiente.
- source_word: תַעֲלֶה
  english_pob_choice: should ascend
  chosen_spanish: se eleve
  alternatives_spanish:
  - ascienda
  - suba
  - se alce
  lexicon: HALOT
  rationale: עלה expresa ascenso o elevación. «Se eleve» mantiene la imagen hiperbólica de Babel elevándose a los cielos y suena natural en español bíblico contemporáneo.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: uso bíblico estándar
  rationale: El nombre de la ciudad se vierte de forma reconocible en español como «Babilonia». «Babel» podría sugerir la torre o la confusión de lenguas, no el referente geográfico aquí.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos celestiales
  lexicon: HALOT
  rationale: El plural hebreo conserva el tono elevado y poético. «Los cielos» comunica mejor esa pluralidad formal que «el cielo».
- source_word: תְבַצֵּר
  english_pob_choice: should fortify
  chosen_spanish: fortifique
  alternatives_spanish:
  - haga inaccesible
  - asegure
  - refuerce
  lexicon: HALOT
  rationale: El Piel de בצר aquí tiene sentido militar de fortificar o hacer inexpugnable. «Fortifique» conserva ese valor sin sobredetallar.
- source_word: מְרוֹם עֻזָּהּ
  english_pob_choice: the height of her strength
  chosen_spanish: la altura de su poder
  alternatives_spanish:
  - la altura de su fortaleza
  - la cumbre de su fuerza
  - su fuerte elevado
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «la altura de su fuerza». «La altura de su poder» mantiene la metáfora de elevación y la idea de fuerza defensiva/imperial, sin forzar un sustantivo espacial que en español sonaría menos natural que el inglés "stronghold".
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - desde mí
  - por mi parte
  - de parte mía
  lexicon: HALOT
  rationale: 'La preposición marca origen: los destructores proceden de Yahvé como su envío judicial. «De mí» preserva la fuente directa y la dureza del juicio.'
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán sobre ella
  - llegarán
  - irán
  lexicon: HALOT
  rationale: El futuro profético anuncia acción segura. «Vendrán» es natural y deja implícita la dirección hostil del contexto.
- source_word: שֹׁדְדִים
  english_pob_choice: destroyers
  chosen_spanish: destruidores
  alternatives_spanish:
  - saqueadores
  - devastadores
  - depredadores
  lexicon: HALOT
  rationale: El participio puede denotar quienes saquean o devastan. «Destruidores» recoge el sentido amplio que el audit trail inglés prefirió, sin excluir el matiz de saqueo.
- source_word: לָהּ
  english_pob_choice: to her
  chosen_spanish: contra ella
  alternatives_spanish:
  - a ella
  - para ella
  - sobre ella
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a/para ella», el contexto de juicio hostil hace explícita la dirección adversativa en español. Esto evita una literalidad que podría sonar benigna.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: fórmula profética
  rationale: Se preserva el nombre divino en la forma POB «Yahvé» y la fórmula profética solemne «declara».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto pide usar el nombre divino en español como «Yahvé» cuando el hebreo trae explícitamente el Tetragrámaton. Aquí no hay mediación por κύριος; por eso se conserva el nombre propio de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Dirección del juicio en לָהּ / מֵאִתִּי
  english_pob_reading: destroyers will come to her from me
  chosen_spanish_reading: de mí vendrán destruidores contra ella
  alternative_spanish_readings:
  - destructores vendrán a ella de mí
  - de mí vendrán saqueadores para ella
  rationale: El hebreo combina origen divino y destino contra Babilonia. En español, «contra ella» hace explícita la hostilidad ya implícita en el contexto, sin alterar el origen 'de mí'.
  doctrine_reference: Jeremías 51:53 en su contexto de juicio sobre Babilonia
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés, pero se ajustaron dos puntos para el español: el nombre de Babilonia se normalizó como «Babilonia» y el complemento final se volvió adversativo («contra ella») para reflejar la carga hostil del hebreo sin debilitar la literalidad de לָהּ.'
  spanish_consistency_notes:
  - 'Se mantuvo la terminología POB para el nombre divino: «Yahvé».'
  - Se preservó el paralelismo concessivo con dos «Aunque».
  - «Destruidores» refleja el campo semántico amplio del participio, sin excluir el matiz de saqueo.
  - La frase «altura de su poder» mantiene la metáfora de exaltación y fortificación de la imagen hebrea.
