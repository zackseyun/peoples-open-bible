review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: totalidad del grupo censado, agentes del censo, objeto levítico y clasificación por clanes y casas paternas. Sin embargo, «los contados» suena poco natural en español bíblico actual y debilita la legibilidad de una fórmula censal recurrente. Una leve reparación mejora la fidelidad funcional al uso censal de פקד sin apartarse del sentido fuente.'
  spanish_quality_summary: La redacción general es clara y digna, pero «Todos los contados» resulta torpe en español. «Todos los registrados» o «Todos los censados» sería más natural; dado el rastro inglés y las notas ya preservadas, «Todos los registrados» mantiene el matiz administrativo y permite conservar las alternativas. El resto del verso lee bien, incluyendo «líderes de Israel», «entre los levitas» y «casas paternas».
  glossary_alignment: No hay términos del glosario mayor en juego salvo nomenclatura israelita. «Líderes» para נשיאים concuerda con la decisión auditada. «Casas paternas» preserva la fórmula técnica בית אבות y su nota cultural la aclara correctamente. La repetición de פקד debe mantenerse con lenguaje censal; por eso conviene ajustar «los contados» a una opción española más idiomática.
  issues:
  - severity: medium
    issue: «Todos los contados» es poco idiomático en español
    rationale: Aunque literalmente posible, no suena natural en español eclesial moderno y puede distraer al lector. En contexto censal, «todos los registrados» comunica mejor el participio pasivo de פקד.
  - severity: low
    issue: La nota [a] puede mantenerse, pero el texto principal debe reflejar mejor el registro censal
    rationale: La nota ya ofrece «numerados» y «registrados»; al elegir «registrados» en el texto principal, la alternativa «contados» puede quedar implícita en el verbo repetido «contaron», preservando la coherencia del pasaje.
  revised_spanish_text: Todos los registrados[a], a quienes Moisés y Aarón y los líderes de Israel contaron entre los levitas[b], por sus clanes y por sus casas paternas—
