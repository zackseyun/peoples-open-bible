translation:
  language: es
  text: Hay lira y arpa[a], pandero y flauta, y vino en sus banquetes; pero no miran la obra de Yahvé[b], ni ven la obra de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «laúd» para uno de estos instrumentos; el hebreo distingue dos instrumentos de cuerda, pero su identificación exacta en español no puede determinarse con total certeza.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la obra de Yahvé ... la obra de sus manos», una expresión paralela que subraya las acciones de Yahvé que ellos ignoran.'
    reason: cross_reference
lexical_decisions:
- source_word: כִנּוֹר
  english_pob_choice: lyre
  chosen_spanish: cítara
  alternatives_spanish:
  - lira
  - arpa
  lexicon: HALOT
  rationale: El hebreo כִּנּוֹר designa un instrumento de cuerda; en español, “cítara” comunica un instrumento pulsado de manera clara y natural, sin depender del calco de la tradición eclesiástica. “Lira” también sería posible, pero puede sonar más literario o ambiguo; “arpa” se reserva aquí para diferenciar el otro instrumento de cuerda.
- source_word: נֶבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - salterio
  - laúd
  lexicon: HALOT
  rationale: נֶבֶל es otro instrumento de cuerda distinto de כִּנּוֹר. Dado que el inglés POB distingue los dos instrumentos, el español también los diferencia con “arpa”; aunque la identificación exacta no es segura, esta opción es comprensible y mantiene la separación léxica del par.
- source_word: תֹּף
  english_pob_choice: tambourine
  chosen_spanish: pandero
  alternatives_spanish:
  - tambor
  - pandereta
  lexicon: HALOT
  rationale: תֹּף se refiere a un tambor de marco o similar al pandero. “Pandero” conserva la referencia al instrumento de percusión sin depender de un diminutivo moderno que podría sonar menos sobrio.
- source_word: חָלִיל
  english_pob_choice: flute
  chosen_spanish: flauta
  alternatives_spanish:
  - pífano
  - tubo
  lexicon: HALOT
  rationale: חָלִיל nombra un instrumento de viento; “flauta” es la equivalencia española más clara y natural. “Pífano” sería demasiado específico y menos accesible en un texto bíblico general.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - bebida fermentada
  lexicon: HALOT
  rationale: יַיִן se traduce de manera estándar como “vino”. No hay motivo contextual para atenuar o parafrasear el término.
- source_word: מִשְׁתֵּיהֶם
  english_pob_choice: their feasts
  chosen_spanish: sus banquetes
  alternatives_spanish:
  - sus fiestas
  - sus comidas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a banquetes o festines de bebida. “Banquetes” expresa bien el contexto festivo y el vínculo con el vino, y mantiene un registro digno y bíblico sin ocultar la dimensión de celebración.
- source_word: פֹּעַל יְהוָה
  english_pob_choice: the work of Yahweh
  chosen_spanish: la obra de Yahvé
  alternatives_spanish:
  - el trabajo de Yahvé
  - la acción de Yahvé
  lexicon: HALOT
  rationale: פֹּעַל en este paralelismo poético nombra la obra/actividad de Yahvé. “Obra” conserva la fuerza compacta del hebreo y el paralelismo con “la obra de sus manos”, mejor que “trabajo”, que en español suena más cotidiano y menos teológico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino en forma transliterada como “Yahvé”, siguiendo la decisión del POB de no enmascarar el Tetragrámaton con un título. La forma castellana debe ser consistente con el uso del proyecto.
- source_word: יַבִּיטוּ
  english_pob_choice: look to
  chosen_spanish: miran
  alternatives_spanish:
  - ponen su mirada en
  - atienden a
  lexicon: HALOT
  rationale: El verbo comunica atención dirigida, no mera visión física. En español, “miran” funciona de modo natural en esta denuncia poética; el complemento “la obra de Yahvé” ya orienta el sentido. “Atienden a” sería más explícito pero menos directo.
- source_word: מַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - lo que sus manos han hecho
  - su obra manual
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se repite en paralelo con “la obra de Yahvé”. “La obra de sus manos” preserva el paralelismo y la imagen concreta de creación/acción divina.
- source_word: רָאוּ
  english_pob_choice: they do not see
  chosen_spanish: ven
  alternatives_spanish:
  - perciben
  - reparan en
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en el paralelismo poético funciona como caracterización presente. En español, “ven” mantiene la naturalidad del doble paralelo con “miran” y deja implícita la ceguera espiritual denunciada por el profeta.
theological_decisions:
- issue: Rendering the divine name יְהוָה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título genérico. La forma “Yahvé” conserva esa identidad y sigue la convención del POB en español, evitando sustituir el nombre por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Poetic parallelism in the final cola: directed attention vs. seeing'
  english_pob_reading: but they do not look to ... and they do not see ...
  chosen_spanish_reading: pero no miran ... ni ven ...
  alternative_spanish_readings:
  - pero no atienden ... ni perciben ...
  - pero no consideran ... ni reparan en ...
  rationale: El hebreo usa dos verbos distintos en paralelo para expresar desatención e indiferencia. “Miran” y “ven” preservan el contraste sin sobreinterpretarlo, y en español mantienen la cadencia del reproche poético.
  doctrine_reference: Poetic parallelism / source-level rhetorical force
- issue: Lexical force of מִשְׁתֵּיהֶם
  english_pob_reading: their feasts
  chosen_spanish_reading: sus banquetes
  alternative_spanish_readings:
  - sus fiestas de beber
  - sus festines
  rationale: El contexto inmediato menciona vino; por eso “banquetes” comunica una reunión festiva con comida y bebida sin reducir el término a simple entretenimiento. La formulación conserva la crítica profética a la indulgencia.
  doctrine_reference: HALOT lexical range in context
translation_notes:
  revision_awareness: 'El borrador sigue la lectura final sin cambios sustanciales del audit trail inglés: conserva el nombre divino, mantiene la distinción de los instrumentos y refleja el paralelismo poético entre la obra de Yahvé y la obra de sus manos.'
  spanish_consistency_notes:
  - Se emplea “Yahvé” de forma consistente para יְהוָה.
  - Se mantiene “obra” para פֹּעַל y מַעֲשֶׂה en armonía con el paralelismo hebreo.
  - Se diferencia el par de instrumentos de cuerda con dos equivalentes españoles no idénticos.
  - El registro es bíblico y moderno, evitando arcaísmos innecesarios.
