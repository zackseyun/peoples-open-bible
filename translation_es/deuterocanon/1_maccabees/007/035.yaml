- from: 'Y juró con ira, diciendo: «Si Judas y su campamento no son entregados ahora en mis manos[a], y si vuelvo en paz, ...»'
  to: 'Y juró con ira[a], diciendo: «Si Judas y su campamento no son entregados ahora en mis manos, entonces, cuando yo vuelva en paz, ...»'
