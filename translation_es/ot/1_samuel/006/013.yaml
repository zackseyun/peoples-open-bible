translation:
  language: es
  text: Ahora bien, los habitantes de Bet-semes estaban segando la cosecha de trigo en el valle, y alzaron sus ojos[a] y vieron el arca, y se alegraron de verla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «alzaron sus ojos», un modismo hebreo que significa que miraron hacia arriba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵית שֶׁמֶשׁ
  english_pob_choice: the people of Beth-shemesh
  chosen_spanish: los habitantes de Bet-semes
  alternatives_spanish:
  - la gente de Bet-semes
  - los hombres de Bet-semes
  - Bet-semes
  lexicon: HALOT
  rationale: El hebreo usa el nombre del lugar con verbos plurales, por lo que refiere metonímicamente a sus habitantes. En español, «los habitantes de Bet-semes» conserva esa referencia y evita un masculino más restrictivo que no exige el texto.
- source_word: קֹצְרִים
  english_pob_choice: were reaping
  chosen_spanish: estaban segando
  alternatives_spanish:
  - estaban cosechando
  - segaban
  - cosechaban
  lexicon: HALOT
  rationale: El participio expresa acción en curso de fondo. «Estaban segando» mantiene ese aspecto progresivo y suena natural en español narrativo.
- source_word: קְצִיר חִטִּים
  english_pob_choice: the wheat harvest
  chosen_spanish: la cosecha de trigo
  alternatives_spanish:
  - la siega de trigo
  - la cosecha del trigo
  - el trigo
  lexicon: HALOT
  rationale: La construcción en hebreo designa la cosecha específica del trigo. «La cosecha de trigo» es clara, precisa y no introduce un matiz innecesariamente técnico.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la llanura
  - en la depresión
  - en el llano
  lexicon: HALOT
  rationale: עֵמֶק suele denotar un valle o zona baja amplia. «En el valle» es la equivalencia más directa y comprensible.
- source_word: וַיִּשְׂאוּ אֶת עֵינֵיהֶם
  english_pob_choice: they lifted up their eyes
  chosen_spanish: alzaron los ojos
  alternatives_spanish:
  - levantaron los ojos
  - miraron hacia arriba
  - alzaron la vista
  lexicon: HALOT
  rationale: El hebreo emplea un modismo que literalmente dice «levantaron/alzaron sus ojos». «Alzaron los ojos» conserva el giro idiomático sin hacerlo pesado en español; la nota aclara el sentido.
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - alcanzaron a ver
  - vislumbraron
  - miraron y vieron
  lexicon: HALOT
  rationale: El perfecto narrativo se rinde de manera simple con «vieron», que sigue el orden de acciones del hebreo sin añadir matices no requeridos.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Dios
  - el cofre
  - el arca del pacto
  lexicon: HALOT
  rationale: En este contexto narrativo, el referente ya está fijado como el arca. «El arca» reproduce la brevedad del hebreo y mantiene la referencia conocida sin explicitar más de lo que el versículo dice.
- source_word: וַיִּשְׂמְחוּ לִרְאוֹת
  english_pob_choice: they rejoiced to see it
  chosen_spanish: se alegraron de verla
  alternatives_spanish:
  - se regocijaron al verla
  - se gozaron al verla
  - se alegraron al verla
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la ocasión del gozo; en español, «se alegraron de verla» comunica naturalmente esa relación. El pronombre femenino «la» corresponde a «el arca».
theological_decisions:
- issue: Referencia del arca sin añadir explicaciones doctrinales
  english_pob_reading: the ark
  chosen_spanish_reading: el arca
  alternative_spanish_readings:
  - el arca de Dios
  - el arca del pacto
  rationale: El versículo presupone el referente narrativo ya establecido y no requiere ampliar el nombre. Mantener «el arca» evita imponer una formulación interpretativa que el hebreo no desarrolla aquí.
  doctrine_reference: Narrativa del arca en 1 Samuel 4–6; continuidad contextual interna
- issue: Metonimia del sujeto plural
  english_pob_reading: the people of Beth-shemesh
  chosen_spanish_reading: los habitantes de Bet-semes
  alternative_spanish_readings:
  - la gente de Bet-semes
  - los hombres de Bet-semes
  rationale: El plural verbal del hebreo indica que no se trata de la ciudad como entidad abstracta, sino de sus residentes. La opción elegida preserva el sentido colectivo sin restringir innecesariamente el género.
  doctrine_reference: Lectura gramatical del plural verbal en hebreo
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el criterio de equivalencia óptima del registro inglés. No hubo revisiones aplicadas en el pase más reciente; la concordancia general con el audit trail es alta y solo requiere la aclaración idiomática de «alzaron los ojos».
  spanish_consistency_notes:
  - Se mantuvo «Bet-semes» como transliteración del topónimo.
  - «Arca» se dejó en forma breve y natural, coherente con el contexto inmediato.
  - Se evitó una traducción demasiado literal de la secuencia verbal para conservar la fluidez narrativa en español.
  - La nota de pie marca la única ambigüedad idiomática relevante del versículo.
