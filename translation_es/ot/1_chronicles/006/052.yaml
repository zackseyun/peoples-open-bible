    issue: Coma que separa indebidamente el complemento locativo
    rationale: 'En «Siquem con sus pastizales, en la región montañosa de Efraín», la coma introduce una pausa que no ayuda y puede desligar «en la región montañosa de Efraín» de Siquem. El hebreo presenta una secuencia continua: «Siquem y sus pastos en la serranía de Efraín».'
  - severity: low
    issue: «Pastizales» es correcto pero algo menos idiomático en registro bíblico
    rationale: Para מִגְרָשֶׁיהָ, «pastos» o «tierras de pasto» suele leerse con mayor naturalidad en español bíblico que «pastizales», sin pérdida de sentido.
  - severity: low
    issue: La nota al pie debe reflejar exactamente la redacción revisada
    rationale: Si se ajusta la puntuación y la opción léxica principal, la nota alternativa también debe actualizarse para no conservar una estructura menos natural.
  revised_spanish_text: 'Les dieron las ciudades de refugio: Siquem con sus pastos[a] en la región montañosa de Efraín, y Gezer con sus pastos.'
