translation:
  language: es
  text: y volveré en paz a la casa de mi padre[a], y Yahvé será mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y regresaré con seguridad a la casa de mi padre». La expresión hebrea «en paz» también puede destacar un retorno seguro o un estado de bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  english_pob_choice: and I return
  chosen_spanish: y volveré
  alternatives_spanish:
  - y regreso
  - y retornaré
  - y iré de vuelta
  lexicon: HALOT
  rationale: שׁוּב expresa volver o regresar. En español, «volveré» transmite bien el movimiento de regreso y conserva el valor prospectivo de la promesa/voto de Jacob sin sonar forzado.
- source_word: בְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sano y salvo
  - seguro
  - con bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y seguridad. «En paz» es la equivalencia más directa y mantiene la amplitud semántica; «sano y salvo» sería más restrictivo.
- source_word: אֶל בֵּית אָבִי
  english_pob_choice: to my father's house
  chosen_spanish: a la casa de mi padre
  alternatives_spanish:
  - a la casa paterna
  - a la casa de mi padre
  lexicon: HALOT
  rationale: La construcción hebrea es literal y relacional. «A la casa de mi padre» conserva la imagen del hogar familiar/linaje sin sobreinterpretarla como «hogar ancestral».
- source_word: וְהָיָה
  english_pob_choice: and ... will be
  chosen_spanish: y ... será
  alternatives_spanish:
  - entonces ... será
  - y ... llegaría a ser
  lexicon: HALOT
  rationale: La secuencia verbal funciona como apódosis del voto. En español, «y ... será» reproduce la relación sin introducir un «entonces» que no está en el hebreo y que el audit trail en inglés ya decidió evitar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como nombre divino transliterado, no una sustitución por título.'
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'Aunque literalmente es «para mí / a mí», en la predicación nominal en español naturaliza la relación posesiva: «será mi Dios».'
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - como Dios
  - por Dios
  lexicon: HALOT
  rationale: אֱלֹהִים aquí funciona como predicado de relación de alianza. «Dios» mantiene la fuerza nominal sin añadir una glosa interpretativa.
theological_decisions:
- issue: Si la frase final debe sonar como una afirmación incondicional o como parte de una promesa/voto condicionado.
  english_pob_reading: Retain the conditional/result force in English without softening it into an unconditional declaration.
  chosen_spanish_reading: Mantener la fuerza de voto/resultado sin convertirlo en una afirmación absoluta distinta del contexto.
  alternative_spanish_readings:
  - Y Yahvé será mi Dios.
  - entonces Yahvé será mi Dios.
  rationale: El hebreo continúa la estructura del voto de Jacob. En español conviene conservar esa tensión contextual y no resolverla añadiendo un enlace explicativo que el texto no expresa de forma explícita.
  doctrine_reference: Preservar la tensión teológica y sintáctica del texto sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que cambió «then» por «and» para reflejar con mayor fidelidad la conjunción hebrea. En español se conserva ese mismo valor coordinante con «y», evitando introducir una partícula conclusiva no presente en el hebreo. También se adopta «Yahvé» conforme a la terminología del proyecto, en lugar de la sustitución tradicional «SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la política del proyecto.
  - «En paz» preserva el rango semántico de שָׁלוֹם sin reducirlo solo a seguridad física.
  - La puntuación con coma antes del segundo miembro sigue la cadencia natural del español y la coordinación del hebreo.
  - «Mi Dios» refleja el predicado relacional del hebreo y el audit trail inglés («my God»).
