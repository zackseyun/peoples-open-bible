base_translation:
  language: en
  yaml_path: translation/ot/joshua/014/009.yaml
  text: And Moses swore on that day[a], saying, ‘Surely the land on which your foot has trodden shall be an inheritance for you and for your sons forever[b], because you have fully followed Yahweh my God.’
  footnotes:
