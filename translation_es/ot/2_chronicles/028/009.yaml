  to: 'Ahora había allí un profeta de Yahvé,[a] cuyo nombre era Oded; y salió delante del ejército que llegaba a Samaria y les dijo: «He aquí,[b] porque Yahvé, el Dios de sus padres, estaba airado con Judá, los entregó en su mano, y ustedes los mataron con un furor que ha llegado hasta el cielo».'
