translation:
  language: es
  text: Yahvé escuchó la voz de Elías[a], y la vida del niño volvió a su ser interior, y vivió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el alma del niño volvió a su ser interior.' El hebreo nephesh puede significar 'vida', 'alma' o 'ser' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע / listened
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  lexicon: HALOT
  rationale: שׁמע puede significar tanto 'oír' como 'escuchar/responder'. En este contexto de oración, 'escuchó' comunica mejor que Yahvé atendió favorablemente la petición, sin perder naturalidad en español.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino en la forma de uso del proyecto en español, 'Yahvé', en vez de sustituirlo por un título. Esto preserva el nombre personal revelado a Israel.
- source_word: בְּקוֹל / to the voice
  english_pob_choice: to the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - la oración
  - la súplica
  lexicon: HALOT
  rationale: 'Se conserva la expresión concreta del hebreo: Yahvé escucha ''la voz'' de Elías. ''Oración'' o ''súplica'' interpretan el sentido, pero el texto fuente es más literal.'
- source_word: נֶפֶשׁ / the life
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - el aliento de vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser vida, alma, ser o yo. Aquí describe la restauración de la vida del niño; 'la vida' es la opción más directa y evita importar una antropología dualista no exigida por el hebreo.
- source_word: הַיֶּלֶד / the child
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el hijo
  lexicon: HALOT
  rationale: יֶלֶד designa a un niño o pequeño. 'El niño' es natural en español y mantiene la referencia narrativa sin precisar más de lo que el hebreo requiere.
- source_word: עַל קִרְבּוֹ / to his inner being
  english_pob_choice: to his inner being
  chosen_spanish: a su interior
  alternatives_spanish:
  - a su ser interior
  - dentro de él
  lexicon: HALOT
  rationale: קֶרֶב expresa interioridad, el centro o dentro de una persona. 'A su interior' reproduce esa imagen de manera clara y sobria en español, sin forzar 'alma' ni 'entrañas'.
- source_word: וַיֶּחִי / and he lived
  english_pob_choice: and he lived
  chosen_spanish: y vivió
  alternatives_spanish:
  - y revivió
  - y cobró vida
  lexicon: HALOT
  rationale: חיה aquí declara simplemente que el niño vivió. 'Vivió' es breve y fiel; 'revivió' explicaría más de lo que el hebreo dice explícitamente.
theological_decisions:
- issue: Cómo rendir נֶפֶשׁ en un contexto de restauración de vida
  english_pob_reading: the life
  chosen_spanish_reading: la vida
  alternative_spanish_readings:
  - el alma
  rationale: La escena narra la restauración del niño a la vida; por eso 'la vida' conserva el sentido inmediato del relato. Se deja abierta la tensión semántica de נֶפֶשׁ sin resolverla con 'alma', que en español puede sugerir una antropología posterior no explícita en el hebreo.
  doctrine_reference: Translation philosophy §3; tabla de términos controvertidos no fija נֶפֶשׁ.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; este borrador conserva la misma lectura principal que el audit trail inglés, adaptada a un español natural y transparente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino.
  - Se evita 'alma' en el texto principal para no cerrar indebidamente la polisemia de נֶפֶשׁ.
  - '''Escuchó'' mantiene el matiz responsivo de שׁמע en contexto de oración.'
  - '''Vivió'' conserva la concisión del cierre hebreo.'
