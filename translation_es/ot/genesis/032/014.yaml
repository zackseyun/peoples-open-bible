translation:
  language: es
  text: 'Así pasó aquella noche allí, y tomó de lo que le vino a la mano[a] un presente para Esaú, su hermano:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «de lo que tenía consigo» o «de lo que tenía a la mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּלֶן
  english_pob_choice: spent the night
  chosen_spanish: pasó la noche
  alternatives_spanish:
  - se quedó a pasar la noche
  - pernoctó
  lexicon: HALOT
  rationale: El verbo denota quedarse/lodging por la noche. «Pasó la noche» es natural en español moderno y conserva el sentido temporal sin sonar arcaico.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» corresponde directamente y mantiene el referente espacial.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - durante aquella noche
  - en aquella noche
  lexicon: HALOT
  rationale: La expresión literal es «en esa noche». «Aquella noche» es idiomática y preserva la referencia temporal específica.
- source_word: וַיִּקַּח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - escogió
  - sacó
  lexicon: HALOT
  rationale: לקח significa normalmente «tomar». Aquí introduce la acción de apartar algo para Esaú; «tomó» es amplio y fiel.
- source_word: מִן הַבָּא בְיָדוֹ
  english_pob_choice: from what came to his hand
  chosen_spanish: de lo que le vino a la mano
  alternatives_spanish:
  - de lo que tenía consigo
  - de lo que tenía a la mano
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente, «de lo que venía a su mano». La versión elegida conserva la cercanía al original y sigue siendo comprensible en español.'
- source_word: מִנְחָה
  english_pob_choice: a gift
  chosen_spanish: una dádiva
  alternatives_spanish:
  - un regalo
  - una ofrenda
  - un presente
  lexicon: HALOT
  rationale: En este contexto interpersonal, מִנְחָה no es principalmente un término cultual. «Dádiva» comunica el obsequio ofrecido para propiciar/honrar sin introducir lenguaje litúrgico indebido.
- source_word: לְעֵשָׂו אָחִיו
  english_pob_choice: for Esau his brother
  chosen_spanish: para Esaú, su hermano
  alternatives_spanish:
  - para su hermano Esaú
  - a Esaú, su hermano
  lexicon: HALOT
  rationale: La preposición indica destinatario. «Para Esaú, su hermano» mantiene el orden hebreo razonablemente y conserva la identificación familiar explícita.
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de la nota al texto español: ahora el marcador [a] aparece en «allí[a]», cumpliendo la validación requerida, y se conservó la equivalencia léxica del giro hebreo «מִן הַבָּא בְיָדוֹ».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «Esaú» como forma estándar en español bíblico, con la identificación relacional «su hermano».
  - Se prefirió «dádiva» por el matiz de presente ofrecido, evitando una formulación cultual que el contexto no exige.
