    issue: La nota [b] está anclada a 'sus nietas' pero en el POB inglés la segunda nota corresponde a 'all his offspring / all his seed'.
    rationale: 'Esto altera la evidencia documentada: la alternativa literal relevante para [b] es זַרְעוֹ, no וּבְנוֹת בָּנָיו.'
  - severity: medium
    issue: La nota [a] omite una de las dos expresiones literales paralelas.
    rationale: El inglés documenta en una sola nota la literalidad de 'los hijos de sus hijos' y 'las hijas de sus hijos'. En español conviene conservar ese paralelismo o distribuirlo correctamente.
  - severity: medium
    issue: '''la llevó consigo a Egipto'' es menos natural en español con antecedente colectivo resumido por ''descendencia''.'
    rationale: Aunque no es incorrecto, 'los trajo consigo a Egipto' o una reestructuración equivalente fluye mejor y evita que 'descendencia' fuerce un pronombre femenino singular algo rígido.
  revised_spanish_text: Sus hijos y sus nietos con él[a], sus hijas y sus nietas, y toda su descendencia[b] los trajo consigo a Egipto.
  revised_footnotes:
