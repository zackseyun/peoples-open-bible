translation:
  language: es
  text: No ha visto calamidad en Jacob[a], ni ha visto miseria en Israel. Yahvé su Dios está con él[c][b], y el clamor de un rey está entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No ha visto iniquidad en Jacob, ni ha visto perversidad, aflicción o calamidad en Israel». Los términos hebreos también pueden entenderse en sentido moral («iniquidad»), o en el sentido de problema o aflicción.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «en él». Israel aparece aquí como un singular colectivo.'
    reason: lexical_alternative
  - marker: c
    text: La frase puede aludir a una aclamación real en medio del pueblo, y posiblemente sugerir la presencia regia de Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: הִבִּיט
  english_pob_choice: has not seen / looked on
  chosen_spanish: ha visto
  alternatives_spanish:
  - ha contemplado
  - ha mirado
  lexicon: HALOT
  rationale: El paralelo con רָאָה favorece un verbo español común de percepción visual. «Ha visto» mantiene la relación semántica con el verbo siguiente y evita una redundancia artificial en español.
- source_word: אָוֶן
  english_pob_choice: trouble
  chosen_spanish: iniquidad
  alternatives_spanish:
  - calamidad
  - mal
  - aflicción
  lexicon: HALOT
  rationale: 'Aquí se conserva la tensión léxica documentada: אָוֶן puede leerse en sentido moral o en sentido de daño/trouble. Para reflejar la posibilidad que el inglés POB preserva en nota, el texto principal opta por «iniquidad», mientras la nota explica la alternativa de calamidad/aflicción. Así no se borra la ambigüedad del hebreo.'
- source_word: רָאָה
  english_pob_choice: has he seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - ha considerado
  - ha observado
  lexicon: HALOT
  rationale: Se traduce de forma directa y paralela al primer miembro. «Ha visto» es natural en español y conserva el aspecto perfectivo del hebreo en esta línea poética.
- source_word: עָמָל
  english_pob_choice: misery
  chosen_spanish: calamidad
  alternatives_spanish:
  - miseria
  - aflicción
  - trabajo penoso
  lexicon: HALOT
  rationale: Se eligió «calamidad» para diferenciarlo de אָוֶן y mantener el campo semántico de daño o aflicción sin volverlo idéntico al primer término. «Miseria» es posible, pero en español actual puede sonar más económico-social que poético; «calamidad» comunica mejor el golpe o mal padecido.
- source_word: בְּיַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - en medio de Jacob
  - contra Jacob
  lexicon: HALOT
  rationale: La preposición se mantiene locativa, como en el inglés POB. «En Jacob» conserva el paralelismo hebreo y la personificación colectiva sin añadir elementos no atestiguados.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - en medio de Israel
  - contra Israel
  lexicon: HALOT
  rationale: Se mantiene la misma relación locativa que en el miembro anterior, respetando el paralelismo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología base del proyecto: el Tetragrámaton se vierte como «Yahvé» en el texto principal español, preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - su Dios de él
  lexicon: HALOT
  rationale: El sufijo es singular masculino; en español, «su Dios» comunica con naturalidad la posesión relacional sin forzar la referencia. El singular colectivo de Israel/Jacob queda preservado por el contexto.
- source_word: עִמּוֹ
  english_pob_choice: is with him
  chosen_spanish: está con él
  alternatives_spanish:
  - está con ellos
  - está junto a él
  lexicon: HALOT
  rationale: Se conserva el singular del sufijo hebreo en el texto principal, siguiendo la personificación colectiva. Esto mantiene la precisión morfológica mejor que pasar directamente al plural.
- source_word: תְרוּעַת
  english_pob_choice: the shout
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la aclamación
  - el toque
  lexicon: HALOT
  rationale: «Clamor» permite abarcar el rango de תְּרוּעָה como grito, aclamación o señal sonora, sin cerrar prematuramente su sentido. Es suficientemente amplio para una lectura regia y litúrgica.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: de un rey
  alternatives_spanish:
  - del rey
  - de rey
  lexicon: HALOT
  rationale: El hebreo carece de artículo, por lo que «de un rey» refleja la indefinición formal. En español suena natural dentro de la construcción nominal «el clamor de un rey».
- source_word: בּוֹ
  english_pob_choice: is among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en él
  - entre él
  lexicon: HALOT
  rationale: El sufijo hebreo es singular, pero el contexto colectivo permite en español una referencia corporativa natural. «Entre ellos» reproduce la idea espacial del POB inglés y conserva la posible referencia al pueblo como conjunto.
theological_decisions:
- issue: Si el versículo enseña ausencia moral de pecado o ausencia de daño/aflicción bajo la mirada favorable de Dios
  english_pob_reading: The verse speaks of God not regarding trouble/misery in Jacob-Israel, rather than declaring absolute absence of sin in the nation.
  chosen_spanish_reading: El texto principal permite una lectura moral («iniquidad») pero la nota aclara que el hebreo también puede significar calamidad o aflicción; así no se impone una afirmación de impecabilidad nacional.
  alternative_spanish_readings:
  - No ha visto calamidad en Jacob, ni ha visto miseria en Israel.
  - No ha visto maldad en Jacob, ni ha visto aflicción en Israel.
  rationale: El hebreo admite ambas posibilidades semánticas. Dado el contexto bíblico más amplio, no conviene convertir el versículo en una declaración doctrinal de ausencia absoluta de pecado en Israel. La solución española conserva la tensión y deja visible la alternativa lexical.
  doctrine_reference: Preservar la tensión lexical y no resolverla doctrinalmente sin necesidad textual
- issue: A quién se refiere «el clamor de un rey»
  english_pob_reading: The phrase 'the shout of a king' may refer to royal acclamation in Israel's midst, possibly alluding to the LORD's kingly presence.
  chosen_spanish_reading: Se mantiene «el clamor de un rey» sin identificar explícitamente al rey, dejando abierta la posibilidad de aclamación real en medio del pueblo o de una alusión a la presencia regia de Yahvé.
  alternative_spanish_readings:
  - el clamor por su rey
  - la aclamación del Rey divino
  rationale: El hebreo es deliberadamente abierto. La traducción conserva la ambigüedad y no la resuelve en el texto principal, en coherencia con el POB inglés.
  doctrine_reference: Preservar la ambigüedad textual y no imponer una identificación teológica explícita
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «has not seen» sobre «has not looked on» para alinearse mejor con el paralelismo; la presente redacción española sigue ese ajuste con «ha visto». También mantiene el nombre divino como Yahvé y conserva la ambigüedad interpretativa del final del versículo, en línea con la auditoría inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto, no «Señor» ni «SENOR».
  - Se mantuvo la personificación singular de Israel/Jacob en «su Dios» y «está con él», con nota aclaratoria por el hebreo singular colectivo.
  - No se introdujo una lectura de impecabilidad moral absoluta; la nota deja visible la alternativa semántica documentada en el POB inglés.
  - El cierre se dejó abierto con «el clamor de un rey», sin resolver si el rey es humano, colectivo o una alusión al rey divino.
