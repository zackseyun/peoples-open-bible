translation:
  language: es
  text: La propia sustancia de los cielos multiplica su esplendor[a], y para toda necesidad el conjunto obedece. Todos ellos difieren unos de otros, y él no hizo que ninguno de ellos fallara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conservado de este versículo en la Géniza de El Cairo es difícil y difiere notablemente de la línea griega; el rollo de Masada también conserva aquí una lectura hebrea diferente. La traducción principal sigue la evidencia hebrea proporcionada en este expediente, teniendo en cuenta también el paralelo griego y la incertidumbre textual documentada.
    reason: textual_variant
lexical_decisions:
- source_word: στερέωμα / ועצם שמים
  english_pob_choice: firmament
  chosen_spanish: firmamento
  alternatives_spanish:
  - expansión
  - bóveda del cielo
  lexicon: HALOT; LSJ
  rationale: El griego στερέωμα y la tradición hebrea difícil apuntan a la imagen cosmológica de una estructura celeste. En español, «firmamento» conserva esa resonancia bíblica sin caer en una explicación excesiva, y es más fiel al registro poético que «cielo» a secas.
- source_word: ὕψους
  english_pob_choice: the heights
  chosen_spanish: de la altura
  alternatives_spanish:
  - de las alturas
  - del cielo alto
  lexicon: LSJ
  rationale: La construcción griega expresa elevación. «De la altura» suena natural en español y mantiene el sentido de lo alto sin añadir precisión cosmológica que el texto no exige.
- source_word: καθαριότητος
  english_pob_choice: clear
  chosen_spanish: claro en su pureza
  alternatives_spanish:
  - puro
  - limpio
  - brillante
  lexicon: LSJ
  rationale: El término describe la cualidad visual de pureza o limpidez del cielo. «Claro» comunica bien la idea, y se amplía con «en su pureza» para no perder el matiz de καθαριότητος sin moralizarlo.
- source_word: γαύριαμα
  english_pob_choice: splendor
  chosen_spanish: gloria / resplandor
  alternatives_spanish:
  - esplendor
  - majestad
  - brillo
  lexicon: LSJ
  rationale: Aunque el verso griego es breve y poético, el campo semántico apunta a magnificencia visible. En español, «gloria» dentro de «visión de gloria» conserva el tono doxológico del cierre, mientras que «resplandor» hubiera duplicado la idea visual de modo menos elegante.
- source_word: εἶδος οὐρανοῦ
  english_pob_choice: the appearance of heaven
  chosen_spanish: la apariencia del cielo
  alternatives_spanish:
  - la forma del cielo
  - el aspecto del cielo
  lexicon: LSJ
  rationale: «Apariencia» es el equivalente más directo de εἶδος en este contexto descriptivo. «Del cielo» sigue el orden natural del español y evita una traducción demasiado técnica de «forma».
- source_word: ἐν ὁράματι δόξης
  english_pob_choice: in a vision of glory
  chosen_spanish: en una visión de gloria
  alternatives_spanish:
  - en un vislumbre de gloria
  - en un espectáculo de gloria
  lexicon: LSJ
  rationale: La frase es visual y elevadamente poética. «Visión de gloria» preserva la ambigüedad entre visión literal y visión contemplativa, sin forzar un sentido profético técnico que el griego no impone aquí.
theological_decisions:
- issue: Preferencia por el paralelo griego frente al hebreo divergente/difícil
  english_pob_reading: Base the main translation on the Greek parallel while remaining informed by the surviving Hebrew witness
  chosen_spanish_reading: Tomar como base principal el paralelo griego, reconociendo en nota la divergencia del hebreo conservado
  alternative_spanish_readings:
  - Una versión más literal del hebreo de Géniza, aunque el texto es problemático
  - Una paráfrasis que mezcle ambas tradiciones sin declarar la tensión
  rationale: La pauta editorial del proyecto para Sirácida es traducir del hebreo cuando es estable, pero aquí el hebreo conservado es difícil y no coincide limpiamente con el griego. En español, ocultar esa tensión sería engañoso; por eso la versión principal sigue el griego y la nota explica la variante textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva y del griego donde hace falta; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La revisión más reciente sustituyó un borrador previo que dependía de otra tradición textual por una lectura basada en el hebreo proporcionado. Para este expediente en particular, el paralelo griego sigue siendo el ancla del texto fuente visible, mientras la divergencia hebrea se registra abiertamente en nota.
  spanish_consistency_notes:
  - Se mantuvo «firmamento» para στερέωμα, coherente con el vocabulario poético bíblico del proyecto.
  - Se evitó «SEÑOR» o formulaciones de tradición litúrgica no pertinentes al versículo.
  - «Visión de gloria» conserva el tono elevado y la ambigüedad del cierre griego.
  - La nota al pie marca explícitamente la tensión textual entre el hebreo conservado y el griego paralelo.
