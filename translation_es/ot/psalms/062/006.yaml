translation:
  language: es
  text: Solo para Dios[c], guarda silencio, alma mía[a][b], porque de él viene mi esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo para Dios, mi alma espera en silencio», tomando el verbo como una afirmación descriptiva y no como una exhortación.'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo puede tener el sentido de estar en silencio, quedarse quieto o esperar calladamente; por eso algunas traducciones ponen «espera en silencio».
    reason: lexical_alternative
  - marker: c
    text: 'O: «Para Dios solo».'
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: For God alone
  chosen_spanish: Solo para Dios
  alternatives_spanish:
  - Únicamente para Dios
  - Solo Dios
  lexicon: HALOT
  rationale: אַךְ expresa exclusividad/enfasis. En español, "Solo para Dios" comunica de manera natural que la orientación exclusiva de la exhortación es hacia Dios, sin añadir un matiz que el hebreo no exige.
- source_word: לֵאלֹהִים
  english_pob_choice: for God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - ante Dios
  - en Dios
  lexicon: HALOT
  rationale: La preposición ל con אֱלֹהִים conserva una dirección u orientación hacia Dios. "Para Dios" mantiene esa relación y encaja bien con la exhortación del verso.
- source_word: דּוֹמִּי
  english_pob_choice: be silent
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - sé silenciosa
  - permanece en silencio
  - espera en silencio
  lexicon: HALOT
  rationale: La forma verbal se entiende como exhortación dirigida al alma. "Guarda silencio" es una equivalencia natural y directa en español; "espera en silencio" introduce explícitamente el componente de espera, que el verbo por sí solo no requiere.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo mismo
  - mi vida
  - mi ser interior
  lexicon: HALOT
  rationale: '"Mi alma" conserva el modo hebreo de autoexhortación y es perfectamente comprensible en español bíblico sin perder la fuerza poética del original.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la exhortación. "Porque" expresa con claridad esa relación causal en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - proviene de él
  lexicon: HALOT
  rationale: El pronombre remite a Dios. "De él" preserva la referencia y permite una cláusula final más fluida; el verbo "proviene" explicita la procedencia implícita en el hebreo.
- source_word: תִּקְוָתִי
  english_pob_choice: my hope
  chosen_spanish: mi esperanza
  alternatives_spanish:
  - mi expectativa
  - mi anhelo
  lexicon: HALOT
  rationale: תִּקְוָה suele significar esperanza/expectativa. "Mi esperanza" es la forma más natural y fiel en este contexto devocional.
theological_decisions:
- issue: ¿Imperativo a la propia alma o afirmación descriptiva?
  english_pob_reading: 'Exhortation: ''be silent, my soul'''
  chosen_spanish_reading: 'Exhortación: «guarda silencio, mi alma»'
  alternative_spanish_readings:
  - 'Afirmación: «mi alma guarda silencio para Dios»'
  - 'Afirmación: «mi alma espera en silencio para Dios»'
  rationale: La forma hebrea se toma como una exhortación/autodirección. El español mantiene esa fuerza directa sin convertirla en una afirmación más interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo expresar la exclusividad de אַךְ sin oscurecer la sintaxis
  english_pob_reading: For God alone
  chosen_spanish_reading: Solo para Dios
  alternative_spanish_readings:
  - Solo Dios
  - Únicamente para Dios
  rationale: La exclusividad recae sobre Dios como objeto de la exhortación. "Solo para Dios" conserva esa restricción sin sugerir que el silencio tenga otro propósito distinto al del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El audit trail inglés registró una revisión desde una redacción más rígida hacia «For God alone» por razones de claridad idiomática. La versión española sigue esa misma orientación: prioriza una formulación natural («Solo para Dios») que conserva la exclusividad de אַךְ y evita ambigüedad, sin introducir una paráfrasis interpretativa adicional.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se usa «esperanza» para תִּקְוָה, coherente con el valor principal del término.
  - Se conserva la autoexhortación en segunda persona implícita dirigida al alma, respetando el hebreo.
  - La cláusula final se expresa con una estructura española natural («de él proviene mi esperanza») sin perder la fuente implícita en el pronombre hebreo.
