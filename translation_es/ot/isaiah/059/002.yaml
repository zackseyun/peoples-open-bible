review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien el contraste adversativo, mantiene la distinción entre עֲוֺנֹתֵיכֶם ('iniquidades') y חַטֹּאותֵיכֶם ('pecados'), preserva la imagen antropomórfica de 'su rostro' y comunica correctamente el resultado de מִשְּׁמוֹעַ como consecuencia de no oír. Sin embargo, la frase 'han ocultado su rostro de ustedes' no es idiomática en español; la construcción natural y fiel al hebreo es 'han ocultado su rostro de ustedes' mejor expresada como 'han escondido/ocultado de ustedes su rostro' o, más naturalmente, 'han hecho que esconda su rostro de ustedes'. Dado el rastro POB inglés, conviene mantener la formulación más directa con el rostro como objeto, pero en español debe ajustarse el orden y la preposición para sonar natural.
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta un problema de naturalidad sintáctica en ''han ocultado su rostro de ustedes''. También hay un pequeño desajuste de registro/pronombres: ''sus... los han separado... su Dios... de ustedes'' mezcla tratamiento de tercera persona con complemento directo que puede leerse bien, pero suena más cohesivo con ''los han separado de su Dios'' y ''han ocultado de ustedes su rostro''. Las notas a y b son aceptables, aunque la nota b con ''faltas'' es más débil como alternativa léxica porque reduce el peso moral de ''pecados''.'
  glossary_alignment: 'Alinea bien con los términos del proyecto: אֱלֹהֵיכֶם = ''su Dios'', mantiene ''iniquidades'' frente a ''pecados'', y conserva ''rostro'' para פָנִים. No hay conflicto con Yahvé/Mesías/Cristo u otros términos troncales. La única corrección necesaria es estilística-sintáctica, no de glosario.'
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: ''han ocultado su rostro de ustedes'''
    rationale: Aunque reproduce los elementos hebreos, en español esa secuencia suena forzada. La idea debe expresarse con una construcción natural que mantenga 'rostro' y 'de ustedes', por ejemplo 'han ocultado de ustedes su rostro'.
  - severity: low
    issue: Nota léxica para 'pecados' demasiado débil
    rationale: La alternativa 'faltas' es posible, pero rebaja la fuerza moral de חַטָּאות y no refleja tan bien el término fuente como 'transgresiones' o simplemente sin nota.
  revised_spanish_text: Pero sus iniquidades[a] los han separado de su Dios, y sus pecados han ocultado de ustedes su rostro, de modo que no oye.
