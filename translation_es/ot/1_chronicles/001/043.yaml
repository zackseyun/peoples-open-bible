translation:
  language: es
  text: 'Y estos son los reyes que reinaron en la tierra de Edom antes de que reinara un rey sobre los hijos de Israel[a]: Bela, hijo de Beor, y el nombre de su ciudad era Dinhabá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes del reinar de un rey sobre los hijos de Israel». El hebreo dice literalmente «antes del reinar de un rey para/sobre los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: La forma introductoria de lista se conserva con la conjunción inicial, y «estos son» suena natural y solemne en español.
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  lexicon: HALOT
  rationale: «Reyes» es el equivalente directo y más natural para el término hebreo en este contexto histórico-genealógico.
- source_word: אֲשֶׁר מָלְכוּ
  english_pob_choice: who reigned
  chosen_spanish: que reinaron
  alternatives_spanish:
  - que gobernaron
  - que fueron reyes
  lexicon: HALOT
  rationale: «Reinaron» conserva la idea de ejercicio real de מלך sin sobreexplicarla.
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: Se mantiene «tierra» porque el hebreo la expresa explícitamente y la fórmula es idiomática en español bíblico.
- source_word: לִפְנֵי מְלָךְ מֶלֶךְ
  english_pob_choice: before a king reigned
  chosen_spanish: antes de que reinara un rey
  alternatives_spanish:
  - antes de que reinara un monarca
  - antes del reinado de un rey
  lexicon: HALOT
  rationale: La construcción infinitiva se vierte de modo natural en español con una subordinada temporal. Se conserva el singular del hebreo y el sentido de anterioridad temporal.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: over the sons of Israel
  chosen_spanish: sobre los hijos de Israel
  alternatives_spanish:
  - sobre Israel
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea tradicional «hijos de Israel» por fidelidad al texto y a la forma genealógica del pasaje.
- source_word: בֶּלַע בֶּן בְּעוֹר
  english_pob_choice: Bela son of Beor
  chosen_spanish: Bela, hijo de Beor
  alternatives_spanish:
  - Bela, el hijo de Beor
  lexicon: HALOT
  rationale: Los nombres se transliteran; «hijo de» es la formulación genealógica española más clara.
- source_word: וְשֵׁם עִירוֹ
  english_pob_choice: and the name of his city was
  chosen_spanish: y el nombre de su ciudad era
  alternatives_spanish:
  - y el nombre de su ciudad fue
  lexicon: HALOT
  rationale: Se preserva la estructura nominal del hebreo con un copulativo en pasado, y «era» da un tono narrativo natural.
- source_word: דִּנְהָבָה
  english_pob_choice: Dinhabah
  chosen_spanish: Dinhabá
  alternatives_spanish:
  - Dinhabah
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación ortográfica mínima al español para facilitar la lectura, sin alterar la identificación del lugar.
theological_decisions:
- issue: Anteposición temporal del reinado de Edom respecto del reinado israelita
  english_pob_reading: before a king reigned over the sons of Israel
  chosen_spanish_reading: antes de que reinara un rey sobre los hijos de Israel
  alternative_spanish_readings:
  - antes de que reinara cualquier rey sobre los hijos de Israel
  - antes del reinado de un rey sobre los hijos de Israel
  rationale: El hebreo marca simplemente anterioridad a la instauración de la monarquía en Israel; el español conserva esa relación sin añadir matices no presentes. Se evita suavizar el singular del original.
  doctrine_reference: 1 Samuel 8; 2 Samuel 5:1-5
- issue: Uso de la expresión «hijos de Israel»
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - descendientes de Israel
  - israelitas
  rationale: La fórmula tradicional refleja mejor la estructura hebrea y preserva el vínculo genealógico del pasaje, sin cambiarlo por un etnónimo más interpretativo.
  doctrine_reference: Génesis 32:28; Éxodo 1:1
translation_notes:
  revision_awareness: La decisión en inglés pasó de «before any king reigned» a «before a king reigned» para ajustarse mejor al singular hebreo. La versión española sigue ese ajuste y evita pluralizar o generalizar la referencia. También se tomó una decisión de estilo para adaptar el topónimo a una forma legible en español («Dinhabá») sin perder la identificación del nombre propio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se conservó la fórmula genealógica «hijo de» en singular, coherente con el patrón de listas en Crónicas.
  - No se sustituyó «hijos de Israel» por «Israelitas» para no perder la correspondencia verbal con el hebreo y con la traducción auditada en inglés.
