id: 2CO.8.10
reference: '2 Corinthians 8:10'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γνώμην ἐν τούτῳ δίδωμι· τοῦτο γὰρ ὑμῖν συμφέρει, οἵτινες οὐ μόνον τὸ ποιῆσαι ἀλλὰ καὶ τὸ θέλειν προενήρξασθε ἀπὸ πέρυσι·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/010.yaml
  text: 'And in this matter I give my judgment: for this is beneficial for you[b][a], who began last year not only to do it but also to will it.'
translation:
  language: ko
  text: 이 일에 나는 의견을 드립니다. 작년부터 행하기를 시작했을 뿐만 아니라 원하기까지 시작한 여러분에게는 이것이 유익합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνώμην
  english_pob_choice: judgment
  chosen_korean: 의견
  lexicon: BDAG
  rationale: '여기서 γνώμη는 명령이 아닌 권면적 의견. 8:8과 호응하여 「의견」으로 옮긴다.'
  alternatives_korean:
  - 판단
  - 권고
- source_word: συμφέρει
  english_pob_choice: is beneficial
  chosen_korean: 유익합니다
  lexicon: BDAG
  rationale: συμφέρω는 「유익을 준다」. 한국어에서 「유익하다」가 표준 등가어.
  alternatives_korean:
  - 이롭습니다
- source_word: προενήρξασθε
  english_pob_choice: began
  chosen_korean: 시작한
  lexicon: BDAG
  rationale: 접두 πρό-는 시점적 「앞서」를 함의하나 본문에서 「작년부터」와 결합되어 시간 부사로 흡수된다.
  alternatives_korean:
  - 먼저 시작한
