translation:
  language: es
  text: 'Entonces les dijimos[a]: «¿Cuáles son los nombres de los hombres que están construyendo este edificio?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Entonces les dijimos así: “¿Cuáles son los nombres de los hombres que están construyendo este edificio?”»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: HALOT
  rationale: Adverbio temporal/secuencial que introduce la acción siguiente en la narración. «Entonces» suena natural en español y conserva el avance del relato.
- source_word: כְּנֵמָא
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: HALOT
  rationale: 'El adverbio arameo significa «así/como esto». En español, con discurso directo posterior, «esto» funciona de manera idiomática como fórmula introductoria: «les dijimos esto».'
- source_word: אֲמַרְנָא לְּהֹם
  english_pob_choice: we told them
  chosen_spanish: les dijimos
  alternatives_spanish:
  - les hablamos
  - les preguntamos
  lexicon: HALOT
  rationale: El verbo básico es «decir». En español, con un contenido interrogativo en discurso directo, «les dijimos» mantiene la cercanía al original sin forzar una equivalencia semántica más específica que el hebreo/arameo no exige.
- source_word: מַן אִנּוּן
  english_pob_choice: What are
  chosen_spanish: ¿Cuáles son
  alternatives_spanish:
  - ¿Quiénes son?
  - ¿Qué son?
  lexicon: HALOT
  rationale: La pregunta apunta a la identidad expresada por los nombres de los hombres. En español, «¿Cuáles son los nombres...?» es la manera más natural de reproducir ese valor interrogativo.
- source_word: שְׁמָהָת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - nombres
  lexicon: HALOT
  rationale: Plural constructo de «nombres de». El artículo definido en español es natural y conserva el sentido pleno de identificación.
- source_word: גֻּבְרַיָּא
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: Término arameo específicamente masculino. Se conserva «hombres» por fidelidad léxica y por la referencia concreta a sujetos varones.
- source_word: דִּי
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  - el cual
  lexicon: HALOT
  rationale: Partícula relativa que introduce la cláusula sobre los hombres. En español, «que» es la forma más natural y directa para este contexto.
- source_word: דְנָה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  - esto
  lexicon: HALOT
  rationale: Demostrativo que modifica el sustantivo «edificio». «Este» concuerda en género y número con «edificio».
- source_word: בִנְיָנָא
  english_pob_choice: building
  chosen_spanish: edificio
  alternatives_spanish:
  - construcción
  - obra
  lexicon: HALOT
  rationale: El sustantivo se refiere a la estructura en construcción. «Edificio» comunica con claridad el objeto material sin importar una reinterpretación contextual como «obra».
- source_word: בָּנַיִן
  english_pob_choice: are building
  chosen_spanish: están edificando
  alternatives_spanish:
  - están construyendo
  - edifican
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Están edificando» conserva ese aspecto progresivo y mantiene la correspondencia verbal con «edificio».
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al pasaje de referencia y al trazado auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se conserva el paralelismo entre el sustantivo «edificio» y el participio «edificando» para reflejar la repetición léxica del original.
  - Se prefiere un español moderno y eclesialmente legible sin importar matices que el arameo no sostiene explícitamente.
