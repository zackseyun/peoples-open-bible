    changes_summary: 'Revised several terms for closer lexical accuracy and more natural formal English: ''chains'' to ''bonds,'' ''untie the cords'' to ''undo the straps,'' ''send the oppressed out free'' to ''let the oppressed go free,'' and ''tear off'' to ''break'' for the final clause.'
translation:
  language: es
  text: '¿No es este el ayuno que yo escojo: desatar las ataduras de la maldad[a], deshacer las ataduras del yugo[c], dejar libres a los oprimidos[b], y romper todo yugo?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «cadenas de maldad»; el hebreo permite una imagen de vínculos o cadenas asociados con la maldad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «los quebrantados»; el hebreo participial puede describir a quienes han sido aplastados u oprimidos.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo repite «yugo» dos veces para dar énfasis y presentar la opresión como una sujeción física que debe ser removida.
    reason: cultural_note
lexical_decisions:
- source_word: צ֣וֹם
  english_pob_choice: fast
  chosen_spanish: ayuno
  alternatives_spanish:
  - el ayuno
  - el ayunar
  lexicon: HALOT
  rationale: 'En español, el sustantivo ''ayuno'' es el equivalente natural de este nombre de práctica religiosa. Mantiene la construcción predicativa del texto: no se describe una acción genérica, sino el ayuno concreto del que Yahvé habla.'
- source_word: אֶבְחָרֵהוּ
  english_pob_choice: that I choose
  chosen_spanish: que yo escogí
  alternatives_spanish:
  - que yo elijo
  - que yo he elegido
  - que yo prefiero
  lexicon: HALOT
  rationale: בחר expresa elección/preferencia. 'Escogí' comunica la elección divina con naturalidad en español y deja abierta la fuerza evaluativa del contexto, sin convertirla en 'prefiero', que suavizaría el verbo.
- source_word: פַּתֵּחַ
  english_pob_choice: to loosen
  chosen_spanish: desatar
  alternatives_spanish:
  - soltar
  - aflojar
  - liberar
  lexicon: HALOT
  rationale: El verbo introduce una acción concreta sobre ataduras; 'desatar' preserva la imagen física y funciona bien con 'cadenas'. 'Soltar' o 'liberar' serían más abstractos.
- source_word: חַרְצֻבּוֹת
  english_pob_choice: bonds
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - ligaduras
  - ataduras
  lexicon: HALOT
  rationale: El inglés revisado eligió 'bonds' por precisión y 'cadenas' en su nota alternativa. En español, 'cadenas' da una imagen vívida de restricción opresiva, pero se mantiene la alternativa más amplia 'ataduras' en la segunda cola para distinguir términos. No se fuerza una terminología eclesiástica tradicional.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - impiedad
  - iniquidad
  - injusticia
  lexicon: HALOT
  rationale: '''Maldad'' reproduce bien el campo moral de רֶשַׁע sin convertirlo únicamente en un concepto legal. ''Iniquidad'' es posible pero más arcaizante; ''injusticia'' estrecharía el término hacia lo social.'
- source_word: הַתֵּר
  english_pob_choice: to untie
  chosen_spanish: deshacer
  alternatives_spanish:
  - desatar
  - soltar
  - desanudar
  lexicon: HALOT
  rationale: El paralelo poético pide una segunda acción distinta de 'desatar'. 'Deshacer' comunica la ruptura de un vínculo o amarre y suena natural con 'ataduras del yugo'.
- source_word: אֲגֻדּוֹת
  english_pob_choice: cords
  chosen_spanish: ataduras
  alternatives_spanish:
  - ligaduras
  - cintas
  - cuerdas
  lexicon: HALOT
  rationale: '''Ataduras'' conserva la idea de ligaduras sin obligar a imaginar cuerdas literales. También permite formar la expresión ''ataduras del yugo'' con fluidez en español.'
- source_word: מוֹטָה
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - barra de yugo
  - barra
  - opresión
  lexicon: HALOT
  rationale: '''Yugo'' es el equivalente bíblico y mantiene la metáfora de servidumbre. Se conserva su repetición al final del versículo para respetar el énfasis retórico del hebreo.'
- source_word: וְשַׁלַּח
  english_pob_choice: to let the oppressed go free
  chosen_spanish: dejar libres
  alternatives_spanish:
  - soltar
  - poner en libertad
  - liberar
  lexicon: HALOT
  rationale: El sentido contextual es de soltar para que salgan en libertad. 'Dejar libres' conserva la dinámica de la frase y evita sobrecargarla con una perífrasis más interpretativa.
- source_word: רְצוּצִים
  english_pob_choice: the oppressed
  chosen_spanish: a los oprimidos
  alternatives_spanish:
  - a los quebrantados
  - a los aplastados
  - a los triturados
  lexicon: HALOT
  rationale: El participio pasivo de רצץ puede leerse como 'quebrantados/aplastados', pero el POB inglés optó por 'the oppressed' para expresar la fuerza social del término. 'Oprimidos' conserva esa dimensión y es idiomático en español; se deja implícita la imagen de los 'crushed' en la nota.
- source_word: חָפְשִׁים
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - en libertad
  - como libres
  lexicon: HALOT
  rationale: Adjetivo predicativo natural en español. 'Libres' mantiene el estado resultante sin expandir el sentido.
- source_word: תְּנַתֵּקוּ
  english_pob_choice: to break
  chosen_spanish: romper
  alternatives_spanish:
  - quebrar
  - arrancar
  - desgarrar
  lexicon: HALOT
  rationale: El verbo final pide una acción fuerte de separación o destrucción de la sujeción. 'Romper' es claro, directo y acorde con la revisión inglesa más reciente ('break every yoke').
- source_word: וְכָל מוֹטָה
  english_pob_choice: every yoke
  chosen_spanish: todo yugo
  alternatives_spanish:
  - cada yugo
  - todo el yugo
  - toda barra de yugo
  lexicon: HALOT
  rationale: Se conserva la repetición de 'yugo' para reflejar el énfasis del hebreo. 'Todo yugo' es la forma más natural y solemne en español.
theological_decisions:
- issue: Naturaleza del ayuno que Yahvé escoge
  english_pob_reading: The fast is rendered as concrete acts of liberation and justice rather than merely inward piety.
  chosen_spanish_reading: El ayuno se presenta como acciones concretas de liberación y justicia, no solo como piedad interior.
  alternative_spanish_readings:
  - Un ayuno principalmente ritual con implicaciones éticas secundarias
  - Un ayuno metafórico de bondad general
  rationale: El hebreo encadena infinitivos que describen actos tangibles de liberación. La traducción mantiene esa concreción y evita espiritualizar o generalizar el texto más allá de lo que el hebreo permite.
  doctrine_reference: Poética profética; filosofía de traducción §1, §3, §6
- issue: Imagen de opresión mediante yugo repetido
  english_pob_reading: The repetition of 'yoke' is retained literally to preserve the physical restraint imagery.
  chosen_spanish_reading: Se conserva la repetición de 'yugo' para mantener la imagen física de opresión.
  alternative_spanish_readings:
  - Sustituir 'yugo' por 'opresión' o 'carga' en ambas menciones
  - Hacer explícita solo la idea social y no la metáfora corporal
  rationale: El hebreo repite מוֹטָה para énfasis; traducirlo literalmente preserva la fuerza profética y evita diluir la metáfora en abstracciones.
  doctrine_reference: Poética profética; filosofía de traducción §1, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que ajustó varios términos hacia mayor precisión y naturalidad: ''chains'' pasó a ''bonds'', ''untie the cords'' a ''undo the straps'', ''send the oppressed out free'' a ''let the oppressed go free'', y ''tear off'' a ''break''. La versión española sigue esa línea de precisión, pero adapta cada cola al español con verbos y sustantivos idiomáticos: ''desatar'', ''deshacer'', ''dejar libres'' y ''romper''. También se preserva la repetición de ''yugo'' del hebreo, algo que el audit trail considera teológicamente importante.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la convención del proyecto para יהוה.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - Se mantiene el paralelismo verbal con cuatro infinitivos/imperativos en español para reflejar la secuencia del hebreo.
  - '''Oprimidos'' traduce el participio pasivo con sentido social, mientras la nota preserva la alternativa literal ''quebrantados''.'
  - No se introducen términos eclesiásticos tradicionales no motivados por el texto.
