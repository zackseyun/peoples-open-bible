translation:
  language: es
  text: 'Todo esto lo probé[a] con sabiduría. Me dije[b]: «Llegaré a ser sabio», pero la sabiduría[c] estaba lejos de mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todas estas cosas las probé con sabiduría» o «Todo esto lo examiné con sabiduría».
    reason: lexical_alternative
  - marker: b
    text: O «Dije».
    reason: lexical_alternative
  - marker: c
    text: Es decir, la sabiduría seguía distante o fuera de mi alcance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל זֹה
  english_pob_choice: All this
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todas estas cosas
  lexicon: HALOT
  rationale: La combinación כָּל + זֹה funciona de modo idiomático como una referencia global a lo anterior. «Todo esto» conserva el alcance total sin volverlo innecesariamente fragmentado.
- source_word: נִסִּיתִי
  english_pob_choice: I tested
  chosen_spanish: lo probé
  alternatives_spanish:
  - lo testé
  - lo examiné
  - lo puse a prueba
  lexicon: HALOT
  rationale: El piel de נסה expresa probar, poner a prueba o ensayar. En español, «lo probé» comunica la acción de examinar por experiencia y mantiene una relación natural con el objeto implícito de la indagación; «puse a prueba» queda como alternativa más explícita.
- source_word: בַּחָכְמָה
  english_pob_choice: by wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - por sabiduría
  - mediante sabiduría
  lexicon: HALOT
  rationale: La preposición ב aquí puede indicar medio o instrumento. «Con sabiduría» es una forma natural en español para el modo en que se realizó la prueba, sin forzar un calco rígido.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Me dije
  alternatives_spanish:
  - Dije
  - Pensé
  - Me propuse
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «dije», el contexto introduce un propósito interno. «Me dije» conserva el valor de habla interior que el español entiende de forma inmediata.
- source_word: אֶחְכָּמָה
  english_pob_choice: I will become wise
  chosen_spanish: Llegaré a ser sabio
  alternatives_spanish:
  - Seré sabio
  - Llegaré a tener sabiduría
  - Iré adquiriendo sabiduría
  lexicon: HALOT
  rationale: La forma cohortativa expresa aspiración o resolución hacia una condición futura. «Llegaré a ser sabio» mantiene ese movimiento hacia la sabiduría mejor que un simple futuro estático.
- source_word: וְהִיא
  english_pob_choice: but it
  chosen_spanish: pero ella
  alternatives_spanish:
  - y ella
  - pero eso
  - pero la sabiduría
  lexicon: HALOT
  rationale: El hebreo enlaza con ו, pero el contraste discursivo es adversativo. En español, «pero» expresa mejor la oposición. El pronombre femenino se refiere a la sabiduría, por eso se traduce «ella» para conservar el referente gramatical del hebreo.
- source_word: רְחוֹקָה מִמֶּנִּי
  english_pob_choice: was far from me
  chosen_spanish: estaba lejos de mí
  alternatives_spanish:
  - estaba distante de mí
  - seguía fuera de mi alcance
  lexicon: HALOT
  rationale: La construcción indica distancia real o figurada. «Estaba lejos de mí» es directo y fiel, y deja abierta la tensión de si la sabiduría era inaccesible o simplemente distante.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y mantiene alta concordancia con el texto fuente. La versión española sigue esa misma lectura, conservando la tensión entre el intento de alcanzar sabiduría y el reconocimiento de su lejanía.
  spanish_consistency_notes:
  - Se conserva «sabiduría» para חָכְמָה siguiendo la terminología POB, sin sustituirla por una paráfrasis.
  - Se mantiene la referencia femenina implícita de וְהִיא con «ella», para no borrar el antecedente nominal de sabiduría.
  - Se usa pasado perfecto simple/imperf. según el sentido discursivo del versículo, evitando una traducción mecánica palabra por palabra.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde cada alternativa.
