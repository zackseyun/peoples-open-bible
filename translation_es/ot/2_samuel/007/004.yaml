translation:
  language: es
  text: 'Pero aquella noche vino la palabra de Yahvé a Natán[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Y aconteció aquella noche que la palabra de Yahvé vino a Natán, diciendo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: But ... came
  chosen_spanish: Pero ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  - Ahora bien
  lexicon: HALOT
  rationale: El waw consecutivo con היה introduce avance narrativo. En español, 'Pero' conserva el contraste con la aprobación previa de Natán en el verso anterior, y 'vino' permite una construcción natural con 'la palabra de Yahvé' sin calcar 'y aconteció' de forma rígida.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en aquella noche
  - en esa noche
  lexicon: HALOT
  rationale: La expresión marca una referencia temporal precisa. 'Aquella noche' es idiomática en español y mantiene la distancia temporal del hebreo sin sonar artificial.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: la palabra de Yahvé vino
  alternatives_spanish:
  - el mensaje de Yahvé vino
  - la palabra de Yahvé llegó
  lexicon: HALOT
  rationale: Se mantiene 'palabra' para conservar la fórmula profética y su peso teológico. 'Vino' refleja el movimiento de la revelación hacia Natán; 'llegó' sería posible, pero 'vino' es más directo y estilísticamente más cercano a la fórmula bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito según la política del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma aprobada para el Tetragrámaton en el texto español.
- source_word: אֶל נָתָן
  english_pob_choice: to Nathan
  chosen_spanish: a Natán
  alternatives_spanish:
  - para Natán
  - hacia Natán
  lexicon: HALOT
  rationale: La preposición hebrea introduce al destinatario de la revelación. En español, 'a Natán' es la forma natural y precisa para indicar dirección/recipiente.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: '''Diciendo'' reproduce la cláusula introductoria de discurso y prepara el contenido del versículo siguiente. Se conserva la puntuación con dos puntos para señalar la continuación inmediata del habla.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo la norma del proyecto y la decisión auditada en inglés, se traslada el nombre propio como 'Yahvé', preservando el valor del nombre revelado y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de revelación
  english_pob_reading: the word of Yahweh came to Nathan
  chosen_spanish_reading: la palabra de Yahvé vino a Natán
  alternative_spanish_readings:
  - la palabra de Yahvé llegó a Natán
  - vino la palabra de Yahvé a Natán
  rationale: La construcción mantiene la fórmula revelatoria característica sin diluirla en una mera idea de 'mensaje'. 'Vino' conserva el movimiento de irrupción divina y, a la vez, suena natural en español.
  doctrine_reference: Uso profético estándar en los libros históricos y proféticos
- issue: Contraste narrativo inicial
  english_pob_reading: But that night
  chosen_spanish_reading: Pero aquella noche
  alternative_spanish_readings:
  - Y aquella noche
  - Ahora bien, aquella noche
  rationale: 'El ''Pero'' comunica el contraste implícito con el contexto inmediato: la aprobación previa de Natán queda corregida por la nueva palabra de Yahvé durante la noche. Esto respeta la función discursiva observada en la traducción auditada en inglés.'
  doctrine_reference: Narrativa de corrección profética en 2 Samuel 7
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el audit trail inglés; el paso más reciente indicó ''unchanged: true'' con alta concordancia y sin cambios necesarios. Por eso la versión española sigue de cerca la lectura auditada, ajustando solo la naturalidad del orden y la puntuación.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene 'Natán' con acento agudo conforme al español.
  - Se conserva la fórmula profética 'la palabra de Yahvé' para mantener continuidad terminológica en el corpus.
  - La nota al pie recoge la alternativa más formal documentada en el inglés auditado, sin introducir otra lectura no sustentada.
