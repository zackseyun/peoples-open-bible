    rationale: El inglés conserva como alternativa de formulación «Then he spoke to him yet again and said»; la nota española actual añade una explicación («repetición enfática del habla») que no está mal, pero no refleja con precisión la nota auditada y además queda anclada al segundo «dijo», donde sí corresponde una nota sobre la primera cláusula completa.
  - severity: low
