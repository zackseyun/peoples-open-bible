review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo y el rastro POB en la mayor parte: la prenda está sobre Aarón, se oye el sonido de la prenda/campanillas al entrar y salir del recinto sagrado, y la finalidad es evitar la muerte. También respeta correctamente Yahvé para יהוה. Sin embargo, hay un desajuste importante entre el texto principal y la nota b: el texto dice «entre en el Lugar Santo», pero la nota alternativa ofrece «al santuario», lo que muestra que la preposición principal debería expresar movimiento de entrada hacia el recinto. «En el Lugar Santo» después de «entre» no es gravemente erróneo, pero «en» debilita la correspondencia con אֶל הַקֹּדֶשׁ y con el inglés auditado «into the Holy Place».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Cuando ministre» funciona bien en contexto sacerdotal. La principal mejora estilístico-semántica es cambiar «en el Lugar Santo» por «al Lugar Santo» (o equivalente), para que la sintaxis de movimiento sea más precisa y más idiomática con «entre». Además, la nota c actualmente repite exactamente el texto principal («para que no muera») donde el inglés preservó una alternativa distinta: «lest he die»; en español conviene reflejarla como «no sea que muera» o similar.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> «Yahvé» correctamente; terminología cultual «Lugar Santo» es apropiada; no hay conflictos con términos teológicos principales. Se mantiene la interpretación documentada de que el sonido es el de la prenda con campanillas. Solo hace falta ajustar la preposición de movimiento y la nota alternativa de finalidad negativa.'
  issues:
  - severity: medium
    issue: Preposición de movimiento insuficientemente precisa en «entre en el Lugar Santo».
    rationale: El hebreo אֶל הַקֹּדֶשׁ expresa dirección hacia/entrada al recinto sagrado. Con «entrar», el español más fiel aquí es «al Lugar Santo»; la propia nota b confirma esa dirección. «En el Lugar Santo» suena más locativo que direccional.
  - severity: medium
    issue: La nota c no preserva la alternativa real del inglés POB.
    rationale: La nota dice «O “para que no muera”», que repite la redacción principal y no aporta alternativa. El inglés auditado conserva «lest he die»; en español debe reflejarse como «O “no sea que muera”» o equivalente.
  revised_spanish_text: Estará sobre Aarón cuando ministre[a], y se oirá su sonido cuando entre al Lugar Santo delante de Yahvé y cuando salga[c][b], para que no muera.
  revised_footnotes:
