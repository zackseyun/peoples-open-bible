translation:
  language: es
  text: Después de dar gracias y de exhortarlos de antemano también para el futuro a estar bien dispuestos hacia la nación[a], llegaron a Jerusalén, mientras se acercaba la fiesta de las semanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la Fiesta de las Semanas»; tradicionalmente, «Pentecostés».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστήσαντες
  english_pob_choice: after giving thanks
  chosen_spanish: Después de dar gracias
  alternatives_spanish:
  - después de expresar gratitud
  - después de agradecer
  lexicon: LSJ
  rationale: El participio aoristo señala una acción previa; «dar gracias» conserva la brevedad y la forma verbal natural en español sin añadir un receptor explícito que el griego no expresa.
- source_word: προπαρακαλέσαντες
  english_pob_choice: urging them beforehand
  chosen_spanish: de exhortarlos de antemano
  alternatives_spanish:
  - de animarlos de antemano
  - de exhortarlos previamente
  lexicon: LSJ
  rationale: El compuesto expresa exhortación o ruego previo. «Exhortarlos de antemano» mantiene el matiz paraenético y la referencia temporal del prefijo.
- source_word: εἰς τὰ λοιπά
  english_pob_choice: also in the future
  chosen_spanish: también para el futuro
  alternatives_spanish:
  - en adelante
  - para lo que sigue
  - de aquí en adelante
  lexicon: LSJ
  rationale: La locución es idiomática y mira al porvenir; «también para el futuro» reproduce con naturalidad la fuerza prospectiva sin sobrecargar el español.
- source_word: πρὸς τὸ γένος
  english_pob_choice: toward the nation
  chosen_spanish: hacia la nación
  alternatives_spanish:
  - hacia su pueblo
  - hacia el linaje
  - hacia la raza
  lexicon: LSJ
  rationale: Aquí γένος designa al pueblo judío como cuerpo étnico-nacional. «Nación» es más claro y menos cargado que «raza», y evita estrechar el sentido a «parientes».
- source_word: εὐμενεῖς εἶναι
  english_pob_choice: to be well-disposed
  chosen_spanish: a mostrarse bien dispuestos
  alternatives_spanish:
  - a ser favorables
  - a permanecer benignos
  lexicon: LSJ
  rationale: εὐμενής indica una disposición favorable o benigna. En español, el reflexivo «mostrarse» comunica bien la actitud continua sin perder naturalidad.
- source_word: παρεγενήθησαν
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: LSJ
  rationale: Verbo narrativo de llegada a un lugar; «llegaron» es la opción más idiomática en español y conserva la sencillez del griego.
- source_word: τῆς τῶν ἑβδομάδων ἑορτῆς
  english_pob_choice: the feast of weeks
  chosen_spanish: la fiesta de las semanas
  alternatives_spanish:
  - la Fiesta de las Semanas
  - Pentecostés
  lexicon: LSJ
  rationale: El griego nombra la fiesta con su designación descriptiva; «fiesta de las semanas» traduce directamente la expresión y evita sustituirla por el nombre posterior «Pentecostés» en el texto principal.
- source_word: οὔσης ὑπογύου
  english_pob_choice: was approaching
  chosen_spanish: estaba próxima
  alternatives_spanish:
  - se acercaba
  - estaba acercándose
  - estaba ya cerca
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto marca una circunstancia concomitante, y ὑπόγυος expresa cercanía. «Estaba próxima» es fiel y fluido en español.
theological_decisions:
- issue: Nombre de la festividad judía
  english_pob_reading: the feast of weeks
  chosen_spanish_reading: la fiesta de las semanas
  alternative_spanish_readings:
  - la Fiesta de las Semanas
  - Pentecostés
  rationale: La fuente griega usa el título descriptivo judío; el texto principal lo traduce directamente para respetar la primacía del original. «Pentecostés» queda como alternativa interpretativa, no como sustitución del nombre fuente.
  doctrine_reference: Principio POB de primacía del idioma original y transparencia terminológica en nombres festivos judíos.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó εἰς τὰ λοιπά para reflejar más directamente la orientación al futuro y afinó ὑπογύου como «was approaching». La redacción española sigue esa revisión con «también para el futuro» y «estaba próxima», manteniendo el sentido de proximidad y prospectiva sin sobreinterpretar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Nación» traduce γένος siguiendo el valor colectivo étnico-histórico del contexto macabeo.
  - «Fiesta de las semanas» conserva la metáfora calendárica del griego y no impone una equivalencia litúrgica posterior en el cuerpo del texto.
