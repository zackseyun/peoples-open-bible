review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: Josué habla a los sacerdotes, les ordena tomar el arca, pasar delante del pueblo, y luego se narra su obediencia. Sin embargo, «pasen» debilita el valor contextual de וְעִבְרוּ en el marco del cruce del Jordán, donde «crucen» preserva mejor la fuerza de «cross over» documentada por el POB inglés. Además, la nota sobre «pacto» no es necesaria aquí y puede introducir una alternativa no preservada en el audit trail inglés sin necesidad contextual.'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces Josué dijo...» y «delante del pueblo» funcionan bien. La principal mejora es usar «crucen» en lugar de «pasen» para mayor precisión contextual. También conviene eliminar la nota al pie porque el texto no crea ambigüedad nueva en español y la terminología principal queda clara sin nota.
  glossary_alignment: No hay conflicto con los términos de proyecto sensibles. «Josué», «sacerdotes» y «arca del pacto» son aceptables en este contexto. La consistencia léxica entre el mandato y la obediencia se mantiene con «tomen / tomaron». La única desalineación parcial es que «pasen» no refleja tan claramente el matiz de עבר como «crucen».
  issues:
  - severity: medium
    issue: «pasen» para וְעִבְרוּ
    rationale: Aunque posible, «pasen» es más general. Dado el contexto explícito del cruce del Jordán y la decisión inglesa «cross over», «crucen» representa mejor el sentido espacial concreto sin sobreinterpretar.
  - severity: low
    issue: Nota al pie innecesaria sobre «pacto»
    rationale: El inglés auditado no exige preservar una alternativa aquí, y en español «arca del pacto» se entiende bien sin nota. La nota añade complejidad sin resolver una ambigüedad real del pasaje.
  revised_spanish_text: 'Entonces Josué dijo a los sacerdotes: «Tomen el arca del pacto y crucen delante del pueblo». Y ellos tomaron el arca del pacto y fueron delante del pueblo.'
  revision_rationale: Se reemplaza «pasen» por «crucen» para reflejar con más precisión el verbo עבר en el contexto del cruce del Jordán, en línea con la decisión documentada del POB inglés. Se elimina la nota al pie sobre «pacto» porque no es necesaria para la claridad ni para preservar una alternativa relevante en este versículo.
