  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: contraste adversativo, ignorancia presente, רְפָאִים como los muertos, y el destino de los invitados en las profundidades de Sheol. Sin embargo, hay un pequeño desajuste en la nota al pie: la alternativa española debe corresponder al anclaje sobre «muertos», no invertir el orden con «están allí».'
  spanish_quality_summary: El español es claro, natural y digno. «Pero él no sabe» y «en lo profundo de Sheol» son fluidos y fieles. «Sus invitados» funciona bien para קְרֻאֶיהָ. La única reparación necesaria es ajustar la formulación de la nota alternativa para que sea idiomática y alineada con el texto principal.
  glossary_alignment: Se mantiene correctamente «Sheol» conforme a la decisión teológica documentada. No hay términos del glosario principal en conflicto. «Los muertos» para רְפָאִים concuerda con la auditoría inglesa, conservando «sombras» como alternativa en nota.
  issues:
