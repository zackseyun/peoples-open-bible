    reason: lexical_alternative
  - marker: b
    text: El griego presenta un final comprimido; la lectura más natural es que Judith cargó los bienes sobre las carretas ya preparadas para el transporte.
    reason: source_note
  revision_rationale: Se ajusta ἀργυρώματα a «objetos de plata» para expresar con más fidelidad y naturalidad que se trata de bienes concretos de plata, no de plata trabajada en abstracto. Se cambia «unció» por «aparejó» para un español más natural y ampliamente legible, manteniendo el sentido de preparar las carretas para llevar la carga. Se conservan las demás elecciones, que reflejan bien el griego y el audit trail.
