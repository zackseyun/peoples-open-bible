base_translation:
  language: en
  yaml_path: translation/ot/proverbs/027/025.yaml
  text: The hay is removed[a], and the new growth appears[c][b], and the grasses of the mountains are gathered.
  footnotes:
  - marker: a
    text: Or 'The grass is gone,' or 'The hay is uncovered.' The Hebrew verb can denote being uncovered or removed; the context suggests the hay has been cut or has disappeared.
    reason: lexical_alternative
  - marker: b
    text: Or 'tender grass' or 'fresh grass' for 'new growth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the herbs/plants of the mountains are gathered.'
    reason: lexical_alternative
