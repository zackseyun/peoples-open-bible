translation:
  language: es
  text: Y pondré sobre ustedes oprobio perpetuo y vergüenza perpetua[a], que no será olvidada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oprobio sempiterno y vergüenza sempiterna». El hebreo עוֹלָם puede denotar perpetuidad duradera o indefinida según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will put
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y daré
  - Y pondré sobre
  lexicon: HALOT
  rationale: נתן tiene un rango amplio de sentidos. En este contexto, con un objeto abstracto impuesto sobre los destinatarios, ‘poner sobre’ expresa bien la idea de imponer o cargar una condición negativa. ‘Pondré’ conserva esa fuerza de colocación/imposición en español natural.
- source_word: עֲלֵיכֶם
  english_pob_choice: on you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - en ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición עַל con sufijo pronominal indica algo colocado encima de los destinatarios. ‘Sobre ustedes’ mantiene la imagen espacial y la carga de imposición mejor que una reformulación más abstracta.
- source_word: חֶרְפַּת
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  - escarnio
  lexicon: HALOT
  rationale: חֶרְפָּה puede abarcar reproche, escarnio y deshonra pública. ‘Oprobio’ preserva con dignidad bíblica la idea de deshonra pública duradera y evita confundirlo con el segundo sustantivo, ‘vergüenza’.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: perpetuo
  alternatives_spanish:
  - eterno
  - duradero
  - de largo tiempo
  lexicon: HALOT
  rationale: En oráculos de juicio, עוֹלָם suele señalar duración indefinida o perdurable. ‘Perpetuo’ refleja bien esa permanencia en un registro bíblico adecuado; en la nota se conserva la alternativa contextual de ‘duradero/indefinido’.
- source_word: וּכְלִמּוּת
  english_pob_choice: and everlasting disgrace
  chosen_spanish: y vergüenza perpetua
  alternatives_spanish:
  - y deshonra perpetua
  - y humillación perpetua
  lexicon: HALOT
  rationale: כְּלִמּוּת denota vergüenza, humillación o deshonra. ‘Vergüenza’ funciona bien junto con ‘oprobio’ y mantiene la distinción entre los dos términos sin recargar el español.
- source_word: לֹא תִשָּׁכֵחַ
  english_pob_choice: will not be forgotten
  chosen_spanish: no será olvidada
  alternatives_spanish:
  - no se olvidará
  - no quedará olvidada
  lexicon: HALOT
  rationale: El nifal de שׁכח expresa ‘ser olvidado’. ‘No será olvidada’ conserva la pasiva y concuerda con el antecedente colectivo femenino del par ‘oprobio/vergüenza’.
theological_decisions:
- issue: Fuerza de עוֹלָם en un anuncio de juicio
  english_pob_reading: everlasting / perpetual
  chosen_spanish_reading: perpetuo
  alternative_spanish_readings:
  - eterno
  - duradero
  - indefinido
  rationale: El texto anuncia una deshonra que permanece como marca de juicio. ‘Perpetuo’ transmite esa duración seria sin convertir automáticamente el término en una afirmación filosófica sobre eternidad absoluta; la nota conserva la alternativa semántica documentada por el hebreo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el control inglés auditado: mantiene la doble imposición de deshonra (‘oprobio’ / ‘vergüenza’), conserva la cualidad duradera de עוֹלָם con una nota lexical, y refleja la pasiva final del nifal para no diluir el matiz de ‘ser olvidada’.'
  spanish_consistency_notes:
  - Usé ‘Yahvé’ por defecto solo cuando el hebreo o el griego lo exigieran explícitamente; este versículo no lo contiene.
  - Mantuve ‘oprobio’ y ‘vergüenza’ como dos términos distintos para preservar la duplicación semántica del hebreo.
  - Opté por ‘perpetuo’ en el cuerpo principal y dejé la alternativa ‘duradero o indefinido’ en la nota, siguiendo el tratamiento auditado de עוֹלָם.
  - Conservé el femenino singular en ‘olvidada’ para reflejar el acuerdo gramatical con el antecedente colectivo en hebreo.
