id: COL.4.10
reference: Colossians 4:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀσπάζεται ὑμᾶς Ἀρίσταρχος ὁ συναιχμάλωτός μου, καὶ Μᾶρκος ὁ ἀνεψιὸς Βαρναβᾶ (περὶ οὗ ἐλάβετε ἐντολάς, ἐὰν ἔλθῃ πρὸς ὑμᾶς δέξασθε αὐτόν),
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/010.yaml
  text: Aristarchus, my fellow prisoner, greets you, and Mark, the cousin of Barnabas (about whom you received instructions—if he comes to you, welcome him),
translation:
  language: ko
  text: 나의 동료 죄수[a]인 아리스다고가 여러분에게 문안하며, 바나바의 사촌[b] 마가도 문안합니다(여러분은 그에 관하여 지시를 받았는데, 그가 여러분에게 오거든 그를 영접하십시오).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「함께 잡힌 자」. 헬라어 합성어는 「함께 사로잡힌 자」를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「조카」. 헬라어 ἀνεψιός는 코이네에서 「사촌」을 가리킨다. 옛 영역본은 「조카」로 옮기기도 했으나 본 번역은 어휘적 정확성을 위해 「사촌」을 사용한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεται ὑμᾶς
  english_pob_choice: greets you
  chosen_korean: 여러분에게 문안하며
  alternatives_korean:
  - 여러분에게 인사합니다
  - 여러분에게 안부를 전합니다
  lexicon: BDAG
  rationale: 「문안하다」는 한국 교회의 정립된 서신 인사 표현.
- source_word: Ἀρίσταρχος ὁ συναιχμάλωτός μου
  english_pob_choice: Aristarchus, my fellow prisoner
  chosen_korean: 나의 동료 죄수인 아리스다고
  alternatives_korean:
  - 나와 함께 갇힌 자 아리스다고
  lexicon: BDAG
  rationale: 「동료 죄수」는 함께 옥에 갇힌 자를 가리킨다(직역).
- source_word: Μᾶρκος ὁ ἀνεψιὸς Βαρναβᾶ
  english_pob_choice: Mark, the cousin of Barnabas
  chosen_korean: 바나바의 사촌 마가
  alternatives_korean:
  - 바나바의 조카 마가
  lexicon: BDAG
  rationale: ἀνεψιός는 코이네에서 「사촌」. 「조카」는 옛 영역본 영향을 받은 한국 전통이나 어휘적 정확성 우선.
- source_word: περὶ οὗ ἐλάβετε ἐντολάς
  english_pob_choice: about whom you received instructions
  chosen_korean: 여러분은 그에 관하여 지시를 받았는데
  alternatives_korean:
  - 그에 대하여 명령을 받았으니
  lexicon: BDAG
  rationale: ἐντολή의 「지시·명령」을 「지시」로 옮긴다.
- source_word: ἐὰν ἔλθῃ πρὸς ὑμᾶς δέξασθε αὐτόν
  english_pob_choice: if he comes to you, welcome him
  chosen_korean: 그가 여러분에게 오거든 그를 영접하십시오
  alternatives_korean:
  - 그가 너희에게 가거든 영접하라
  lexicon: BDAG
  rationale: δέχομαι의 환대적 「영접」을 한국 교회의 정립된 표현으로 옮긴다.
