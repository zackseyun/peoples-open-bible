translation:
  language: es
  text: Le dio el pan santo más escogido[a]; ellos comerán las ofrendas de alimento[b] de Yahvé. El pan de la Presencia[c] es su porción, un regalo para él y para su descendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: ''la primera de las cosas santas se la dio como pan''. El hebreo es comprimido, y el paralelo griego amplía el sentido hacia porciones sacrificiales sacerdotales.'
    reason: lexical_alternative
  - marker: b
    text: '''Ofrendas de alimento'' traduce el término hebreo que a menudo se vierte ''ofrendas por fuego''.'
    reason: lexical_alternative
  - marker: c
    text: '''Pan de la Presencia'' es el pan sagrado tradicionalmente llamado ''pan de la proposición'' o ''showbread''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ראשית קדש
  english_pob_choice: the choicest holy bread
  chosen_spanish: la porción más escogida de las cosas santas
  alternatives_spanish:
  - la primera de las cosas santas
  - la primicia de la santidad
  - la porción santa principal
  lexicon: HALOT
  rationale: El hebreo es compacto y sugiere prioridad/primacía en el ámbito sagrado. Como el contexto inmediato habla de pan y el paralelo griego aclara una distribución sacerdotal de porciones sacrificiales, en español conviene preservar la idea de una porción selecta sin forzar un giro poco natural como 'pan' en la primera cola. 'Porción más escogida' comunica la prioridad y el valor sagrado.
- source_word: לחם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - porción
  lexicon: HALOT
  rationale: El término hebreo dice literalmente 'pan'. En la segunda cola, la tradición del 'pan de la Presencia' exige mantener esa equivalencia básica; por eso se traduce de forma directa y reverente.
- source_word: אשי יהוה
  english_pob_choice: the food offerings of Yahweh
  chosen_spanish: las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - las ofrendas por fuego de Yahvé
  - las ofrendas quemadas de Yahvé
  lexicon: HALOT
  rationale: El término es técnico y sacrificial. 'Ofrendas encendidas' conserva la idea de ofrendas hechas por fuego sin introducir una paráfrasis excesiva. Se usa 'Yahvé' por la política terminológica del proyecto para יהוה.
- source_word: יאכלון
  english_pob_choice: they shall eat
  chosen_spanish: ellos comerán
  alternatives_spanish:
  - comerán
  - podrán comer
  lexicon: HALOT
  rationale: La forma plural apunta a los beneficiarios sacerdotales y tiene fuerza futura/legal. 'Ellos comerán' es claro y mantiene el mandato o derecho cultual.
- source_word: לחם פנים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la presencia
  - el pan de la faz
  - el pan de la proposición
  lexicon: HALOT
  rationale: Es la expresión cultual estándar para el pan colocado ante Dios. 'Presencia' es más transparente para el lector actual que 'de la proposición' y evita la opacidad de 'showbread'.
- source_word: חלקו
  english_pob_choice: is his portion
  chosen_spanish: es su porción
  alternatives_spanish:
  - es su parte
  - le corresponde como porción
  lexicon: HALOT
  rationale: El sustantivo designa una parte asignada. 'Es su porción' es breve, idiomático y conserva el sentido de asignación cultual.
- source_word: ומתנה לו ולזרעו
  english_pob_choice: a gift to him and to his offspring
  chosen_spanish: un regalo para él y para su descendencia
  alternatives_spanish:
  - un don para él y para su linaje
  - un regalo para él y para sus hijos
  lexicon: HALOT
  rationale: מתנה es un don o regalo; זרעו indica línea descendiente. 'Descendencia' preserva la continuidad genealógica sin reducirla a hijos inmediatos.
- source_word: τῷ σπέρματι αὐτοῦ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - sus descendientes
  lexicon: BDAG
  rationale: El paralelo griego confirma la extensión generacional del derecho sacerdotal. 'Descendencia' mantiene el valor colectivo y evita un literalismo extraño en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política terminológica del proyecto para el Tetragrámaton es usar 'Yahvé' en el texto principal. Aquí el hebreo contiene יהוה directamente, y el paralelo griego Κυρίου no cambia esa decisión; por eso no se usa una convención de ocultamiento como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial priestly portions
  english_pob_reading: food offerings / bread of the Presence
  chosen_spanish_reading: ofrendas encendidas / pan de la Presencia
  alternative_spanish_readings:
  - ofrendas por fuego / pan de la proposición
  - ofrendas quemadas / pan del rostro
  rationale: La unidad habla de porciones sacerdotales del culto. Se mantiene el lenguaje sacrificial y del tabernáculo de forma comprensible, sin sustituirlo por términos eclesiásticos posteriores. El griego con θυσίας Κυρίου refuerza que se trata de porciones sacrificiales destinadas al consumo sacerdotal.
  doctrine_reference: DOCTRINE.md translation philosophy §§5–6
- issue: Collective beneficiaries in priestly line
  english_pob_reading: his offspring
  chosen_spanish_reading: su descendencia
  alternative_spanish_readings:
  - su linaje
  - sus hijos
  rationale: Tanto el hebreo זרעו como el griego σπέρμα αὐτοῦ señalan una línea sucesoria, no un individuo aislado. 'Descendencia' preserva el sentido colectivo y la continuidad del derecho cultual.
  doctrine_reference: 'DOCTRINE.md: source-driven lexical decisions'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: evita añadir un ''para comer'' después de ''pan'' porque el hebreo no lo expresa ahí, pero conserva el verbo explícito de comer en la segunda cola. También toma en cuenta el paralelo griego, que confirma la lectura sacrificial y la extensión a la descendencia.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה conforme a la terminología del proyecto.
  - Se prefirió 'Presencia' en 'pan de la Presencia' por transparencia y consistencia cultual.
  - '''Descendencia'' se usa de manera consistente para זרע/σπέρμα cuando el sentido es lineal y colectivo.'
  - No se tradujo de manera mecánica desde el inglés; se ajustó la sintaxis para un español natural sin perder la densidad sacrificial del hebreo y del griego.
