lexical_decisions:
- source_word: κατευθῦναι
  english_pob_choice: to guide
  chosen_spanish: para guiar
  alternatives_spanish:
  - para dirigir
  - para enderezar
  lexicon: LSJ
  rationale: El infinitivo expresa una acción intencional de orientar moralmente; «guiar» es natural en español y conserva la idea de conducir a un curso recto sin sobrecargar el texto con una imagen más fuerte de corrección mecánica.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los varones
  lexicon: LSJ
  rationale: El griego usa el plural masculino ἄνδρας, no un término genérico neutro. Se mantiene el masculino explícito, como en la decisión auditada del inglés POB.
- source_word: ἐν ἔργοις δικαιοσύνης
  english_pob_choice: in works of righteousness
  chosen_spanish: en obras de justicia
  alternatives_spanish:
  - en obras de rectitud
  - en obras de recto obrar
  - en obras de justicia/righteousness
  lexicon: LSJ
  rationale: «Obras» conserva el sustantivo concreto; para δικαιοσύνη, el español permite «justicia» con buena transparencia léxica y mantiene la tensión reconocida por el POB entre «righteousness» y «justice» en este contexto ético-sapiencial.
- source_word: φόβῳ θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - con el temor de Dios
  - por el temor de Dios
  lexicon: LSJ
  rationale: La construcción dativa se entiende naturalmente como esfera o manera. «Temor de Dios» reproduce el modismo bíblico sin reducirlo a miedo emocional.
- source_word: καταστῆσαι
  english_pob_choice: to set
  chosen_spanish: para ponerlos
  alternatives_spanish:
  - para establecerlos
  - para colocarlos
  - para constituirlos
  lexicon: LSJ
  rationale: El verbo puede significar poner/establecer. «Ponerlos» es suficientemente amplio, evita una lectura institucional no garantizada y encaja con la paralela finalidad del infinitivo anterior.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: ante el Señor
  alternatives_spanish:
  - delante del Señor
  - en la presencia del Señor
  lexicon: LSJ
  rationale: La expresión adverbial se traduce con una preposición natural en español. «Señor» sigue la decisión del POB para κύριος; aquí no hay indicio suficiente para introducir «Yahvé» porque el griego cita Κυρίου sin señal explícita del Nombre divino.
theological_decisions:
- issue: Rendición de δικαιοσύνη en un contexto ético
  english_pob_reading: righteousness; footnote also allows justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: En español «justicia» es una traducción lexicalmente directa de δικαιοσύνη y preserva la tensión que el POB documenta con la alternativa «justice». Dado que el contexto habla de obras, la carga ética y relacional también admite esta opción sin borrar el matiz religioso.
  doctrine_reference: DOCTRINE.md contested terms table
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su última revisión y obtuvo alto acuerdo en la verificación cruzada; esta propuesta española sigue esa lectura sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Señor» y «Yahvé» conforme al testimonio griego inmediato; aquí Κυρίου se vierte como «Señor».
  - 'Se conserva el paralelismo de dos infinitivos finales: «para guiar... para ponerlos...».'
  - «Obras de justicia» se eligió como forma principal, pero se documenta la alternativa «obras justas» para reflejar la tensión léxica del original y del audit trail en inglés.
