translation:
  language: es
  text: y toda esta asamblea sabrá que Yahvé no salva por espada ni por lanza; porque la batalla es de Yahvé[a], y él los entregará en nuestra mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque de Yahvé es la batalla».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en nuestra mano»; el modismo significa «en nuestro poder» o «entregados a nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵדְעוּ
  english_pob_choice: and ... will know
  chosen_spanish: sabrá
  alternatives_spanish:
  - conocerá
  - llegará a saber
  lexicon: HALOT
  rationale: El imperfecto aquí tiene valor prospectivo en la declaración de David. En español, «sabrá» expresa de modo natural ese conocimiento futuro sin perder la fuerza predictiva del hebreo.
- source_word: כָּל הַקָּהָל הַזֶּה
  english_pob_choice: all this assembly
  chosen_spanish: todo este asamblea
  alternatives_spanish:
  - toda esta asamblea
  - toda esta congregación
  lexicon: HALOT
  rationale: קהל designa al grupo reunido presente. Se mantiene «asamblea» como en el audit trail inglés, pero en español el sustantivo exige concordancia; por ello la forma correcta es «toda esta asamblea». El marcador en el texto refleja el sintagma completo y la necesidad de concordancia española.
- source_word: לֹא בְּחֶרֶב וּבַחֲנִית
  english_pob_choice: does not save by sword or by spear
  chosen_spanish: no salva por espada ni por lanza
  alternatives_spanish:
  - no libra con espada ni con lanza
  - no salva con espada y lanza
  lexicon: HALOT
  rationale: El hebreo expresa instrumento/medio. «Por espada ni por lanza» preserva esa relación de medio y suena natural en español. Se conserva el paralelismo negativo sin introducir interpretación excesiva.
- source_word: יְהוֹשִׁיעַ
  english_pob_choice: does not save
  chosen_spanish: salva
  alternatives_spanish:
  - libra
  - da la victoria
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע conserva fuerza de salvar/liberar. «Salvar» mantiene el alcance teológico más amplio que «dar la victoria», sin perder la referencia militar del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé», en vez de una sustitución por título. Esto preserva el nombre propio divino revelado en el texto fuente.'
- source_word: כִּי לַיהוָה הַמִּלְחָמָה
  english_pob_choice: for the battle belongs to Yahweh
  chosen_spanish: porque la batalla es de Yahvé
  alternatives_spanish:
  - porque la batalla pertenece a Yahvé
  - pues la batalla es de Yahvé
  lexicon: HALOT
  rationale: La construcción לַיהוה expresa pertenencia. «Es de Yahvé» reproduce esa relación con naturalidad en español y conserva el énfasis teológico de posesión soberana.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En este contexto de duelo y enfrentamiento puntual, «batalla» es más idiomático que «guerra» y refleja bien el campo semántico del hebreo.
- source_word: וְנָתַן
  english_pob_choice: and he will give
  chosen_spanish: y él entregará
  alternatives_spanish:
  - y dará
  - y pondrá en manos
  lexicon: HALOT
  rationale: Aunque la forma verbal es qatal, el discurso es profético y prospectivo. «Entregará» comunica con precisión la idea de entregar/poner en poder de alguien, coherente con el idiomático «en nuestra mano».
- source_word: אֶתְכֶם בְּיָדֵנוּ
  english_pob_choice: you into our hand
  chosen_spanish: los entregará en nuestra mano
  alternatives_spanish:
  - los pondrá en nuestro poder
  - los entregará en nuestras manos
  lexicon: HALOT
  rationale: El hebreo usa el singular idiomático «mano» para indicar poder o control. En español se puede mantener el singular idiomático «nuestra mano» para reflejar el original, aun cuando el sentido natural sea «en nuestro poder».
theological_decisions:
- issue: Renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre propio del pacto en forma castellana «Yahvé», conforme a la convención del proyecto. No se sustituye por un título como «el Señor», para no ocultar el Tetragrama del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Alcance de יְהוֹשִׁיעַ en contexto militar
  english_pob_reading: save
  chosen_spanish_reading: salva
  alternative_spanish_readings:
  - libra
  - da la victoria
  rationale: '«Salvar» mantiene la amplitud semántica del hebreo ישׁע: no solo victoria táctica, sino liberación efectiva por intervención divina.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje está en alta concordancia con el audit trail inglés y la última revisión quedó sin cambios; esta propuesta solo ajusta la expresión española para concordancia, naturalidad y transparencia del Tetragrama.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se mantiene «batalla» en lugar de «guerra» por adecuación contextual.
  - Se conserva el sentido idiomático de «mano» como poder/control, con nota explicativa.
  - Se corrigió la concordancia española de «asamblea» a femenino singular.
