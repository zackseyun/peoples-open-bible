revisions:
- from: Entonces Yahvé descendió en una columna de nube y se detuvo[a] a la entrada de la tienda[b]; llamó a Aarón y a Miriam, y ambos salieron.
  to: Entonces Yahvé descendió en una columna de nube y se detuvo a la entrada de la tienda[b]; llamó a Aarón y a Miriam, y ambos salieron adelante[a].
  rationale: Se reubica la nota léxica al verbo final, donde está el verdadero punto de decisión textual según la auditoría inglesa. Se cambia «ambos salieron» por «ambos salieron adelante», que conserva el verbo básico «salieron» pero aclara en español la respuesta al llamado. Se mantiene «Yahvé», «descendió», «columna de nube» y «a la entrada de la tienda» por fidelidad al hebreo y a la terminología del proyecto.
  reviewer_model: gpt-5.4
