revisions:
- from: Y la luz de la luna será como la luz del sol[a], y la luz del sol será siete veces, como la luz de siete días, el día en que Yahvé venda la fractura de su pueblo y sane la herida de su golpe.
  to: Y la luz de la luna será como la luz del sol, y la luz del sol será siete veces más intensa, como la luz de siete días, en el día en que Yahvé venda la fractura de su pueblo y sane la herida[a] causada por su golpe.
  rationale: Se reubica y corrige la nota al pie para que siga el audit trail inglés y el punto lexical real del hebreo. Se mejora 'será siete veces' a una formulación idiomática en español que conserva la intensificación. También se explicita mejor la relación temporal y causal en la última cláusula sin perder la tensión teológica de que Yahvé hiere y Yahvé sana.
  reviewer_model: gpt-5.4
