translation:
  language: es
  text: 'Y fue comunicado a la casa de David, diciendo: «Aram se ha aliado con Efraín[a]». Y se estremeció su corazón y el corazón de su pueblo, como se estremecen los árboles del bosque ante el viento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aram se ha asentado sobre Efraín». El hebreo dice literalmente «ha descansado sobre Efraín», una expresión que puede describir una posición militar o una alineación política.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: fue comunicado
  alternatives_spanish:
  - fue dicho
  - se informó
  - fue reportado
  lexicon: HALOT
  rationale: El hebreo usa un pasivo impersonal; en español, «fue comunicado» conserva el carácter impersonal y narrativo sin añadir un sujeto no presente en el texto.
- source_word: לְבֵית דָּוִד
  english_pob_choice: to the house of David
  chosen_spanish: a la casa de David
  alternatives_spanish:
  - a la casa real de David
  - a la dinastía de David
  lexicon: HALOT
  rationale: Se mantiene la designación dinástica literal, no una referencia reducida a un individuo, preservando el matiz político-covenantal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - así
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción del discurso directo y conserva la transición narrativa del hebreo.
- source_word: נָחָה אֲרָם עַל אֶפְרָיִם
  english_pob_choice: Aram has allied itself with Ephraim
  chosen_spanish: Aram se ha aliado con Efraín
  alternatives_spanish:
  - Aram se ha asentado sobre Efraín
  - Aram se ha posado sobre Efraín
  - Aram ha acampado contra Efraín
  lexicon: HALOT
  rationale: El hebreo literalmente expresa «ha descansado/settled on». La versión inglesa POB adoptó la lectura contextual de alianza; en español «se ha aliado con» comunica esa relación política/militar sin ocultar la tensión del hebreo, que queda registrada en la nota.
- source_word: וַיָּנַע
  english_pob_choice: shook
  chosen_spanish: se estremeció
  alternatives_spanish:
  - tembló
  - vaciló
  - se sacudió
  lexicon: HALOT
  rationale: El verbo נוע transmite movimiento de sacudida o bamboleo. «Se estremeció» funciona bien para el corazón y conserva la imagen de inestabilidad emocional.
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: «Corazón» reproduce la antropología hebrea del interior humano, incluyendo emoción y pensamiento, sin reducirlo a un sentido meramente sentimental.
- source_word: וּלְבַב עַמּוֹ
  english_pob_choice: and the heart of his people
  chosen_spanish: y el corazón de su pueblo
  alternatives_spanish:
  - y el corazón de su gente
  - y el interior de su pueblo
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «su corazón» y la misma imagen del interior colectivo de la población.
- source_word: כְּנוֹעַ
  english_pob_choice: as ... shake
  chosen_spanish: como se estremecen
  alternatives_spanish:
  - como tiemblan
  - como se mueven
  lexicon: HALOT
  rationale: El infinitivo constructo introduce una comparación de acción; en español la estructura natural es «como se estremecen», manteniendo la repetición de la idea verbal.
- source_word: עֲצֵי יַעַר
  english_pob_choice: the trees of the forest
  chosen_spanish: los árboles del bosque
  alternatives_spanish:
  - los árboles de la selva
  - los árboles del monte
  lexicon: HALOT
  rationale: Es la equivalencia natural y fiel del sintagma constructo, preservando la imagen visual concreta.
- source_word: מִפְּנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: ante el viento
  alternatives_spanish:
  - por causa del viento
  - frente al viento
  lexicon: HALOT
  rationale: «Ante el viento» conserva el sentido de enfrentamiento/presencia del hebreo מִפְּנֵי y su fuerza imagética en el símil.
theological_decisions:
- issue: Sentido de la frase sobre Aram y Efraín
  english_pob_reading: Aram has allied itself with Ephraim, with the literal Hebrew tension preserved in a footnote.
  chosen_spanish_reading: Aram se ha aliado con Efraín, con la tensión del hebreo preservada en una nota.
  alternative_spanish_readings:
  - Aram se ha asentado sobre Efraín
  - Aram ha acampado contra Efraín
  rationale: La frase hebrea es comprimida y admite un rango de sentidos político-militares. Se prioriza una lectura contextual natural en español, pero se documenta la literalidad para no borrar la tensión semántica del original.
  doctrine_reference: Translation philosophy §3
- issue: Referencia a la casa de David
  english_pob_reading: Retained as 'the house of David' rather than identifying only Ahaz.
  chosen_spanish_reading: Se conserva «la casa de David» como designación dinástica.
  alternative_spanish_readings:
  - Acaz
  - la casa real de David
  rationale: El texto hebreo nombra a la casa davídica, no solo al rey individual. Mantenerla evita empobrecer el alcance histórico y teológico del pasaje.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «has settled on Ephraim» a «has allied itself with Ephraim» para reflejar mejor el sentido contextual. En español se siguió esa revisión, pero se conservó en nota la literalidad del hebreo para no perder la imagen verbal ni la ambigüedad político-militar.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «casa de David» por su valor dinástico, en paralelo con el audit trail inglés.
  - «Corazón» se mantuvo para לֵבָב sin reducirlo a mera emoción moderna.
  - El símil final mantiene la repetición verbal con «se estremecen» para reflejar וַיָּנַע / כְּנוֹעַ.
  - La nota al pie marca explícitamente la tensión entre la lectura contextual y la literalidad hebrea.
