id: COL.1.13
reference: Colossians 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς ἐρρύσατο ἡμᾶς ἐκ τῆς ἐξουσίας τοῦ σκότους καὶ μετέστησεν εἰς τὴν βασιλείαν τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/013.yaml
  text: who rescued us from the authority of darkness and transferred us into the kingdom of the Son of his love,
translation:
  language: ko
  text: 그분은 우리를 어둠의 권세에서 건져 내시고, 그 사랑하시는 아들의 나라[a]로 옮기셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「그분의 사랑의 아들의 나라」. 헬라어 속격 구조를 풀어 「그 사랑하시는 아들」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_korean: 건져 내시고
  alternatives_korean:
  - 구해 내시고
  - 구원하시고
  lexicon: BDAG
  rationale: ῥύομαι의 「적대적 권세에서 빼내심」을 「건져 내시고」로 살린다.
- source_word: ἐξουσίας
  english_pob_choice: authority
  chosen_korean: 권세
  alternatives_korean:
  - 통치
  - 영역
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「권세」를 사용한다. 어둠의 지배적 권한을 가리킨다.
- source_word: σκότους
  english_pob_choice: darkness
  chosen_korean: 어둠
  alternatives_korean:
  - 흑암
  lexicon: BDAG
  rationale: 「어둠」이 현대 한국어에서 자연스럽고 도덕·영적 함의를 함께 담는다.
- source_word: μετέστησεν
  english_pob_choice: transferred
  chosen_korean: 옮기셨습니다
  alternatives_korean:
  - 이주시키셨습니다
  - 옮겨 놓으셨습니다
  lexicon: BDAG
  rationale: μεθίστημι의 「다른 영역으로의 이전」을 「옮기셨습니다」로 옮긴다.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_korean: 나라
  alternatives_korean:
  - 왕국
  - 통치
  lexicon: BDAG
  rationale: εἰς + 이전 동사 문맥에서 영역적 「나라」가 자연스럽다.
- source_word: τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ
  english_pob_choice: the Son of his love
  chosen_korean: 그 사랑하시는 아들
  alternatives_korean:
  - 그분의 사랑의 아들
  - 그분이 사랑하시는 아들
  lexicon: BDAG
  rationale: 헬라어 속격 구조를 그대로 「~의 사랑의 아들」로 옮기면 한국어에서 어색하므로, 본문은 자연스러운 관형절 「그 사랑하시는 아들」로 옮기고, 직역은 각주로 보존한다.
