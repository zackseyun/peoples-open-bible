  to: El temor de Yahvé lleva a la vida[a], y quien lo tiene descansará satisfecho[b]; no será visitado por ningún daño[c].
  rationale: Se ajusta solo la cláusula final para alinear mejor el español con la decisión léxica documentada para רָע ('harm') y evitar que 'el mal' se entienda como mal moral. Se mantiene la metáfora de 'ser visitado' para respetar יִפָּקֶד, y se conserva 'mal' como alternativa más literal en la nota.
