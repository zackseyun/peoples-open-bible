lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: You shall keep
  chosen_spanish: Guardarás
  alternatives_spanish:
  - Observarás
  - Guardarás y cumplirás
  lexicon: HALOT
  rationale: שׁמר abarca guardar, observar y preservar. En un contexto legal/cultual, «guardarás» comunica la obligación continua sin cargar con un tecnicismo eclesiástico.
- source_word: הַחֻקָּה הַזֹּאת
  english_pob_choice: this statute
  chosen_spanish: esta estatuto
  alternatives_spanish:
  - esta ordenanza
  - esta prescripción
  lexicon: HALOT
  rationale: חֻקָּה designa una disposición fija, estatuto o prescripción. «Estatuto» conserva la formalidad jurídica. Se mantiene el demostrativo «esta» para reflejar el hebreo.
- source_word: לְמוֹעֲדָהּ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo designado
  - en la ocasión fijada para ella
  lexicon: HALOT
  rationale: מוֹעֵד refiere a un tiempo u ocasión fijados. «En su tiempo señalado» reproduce la referencia al momento establecido para la observancia y sugiere la relación con la fiesta concreta.
- source_word: מִיָּמִים יָמִימָה
  english_pob_choice: from year to year
  chosen_spanish: de año en año
  alternatives_spanish:
  - de tiempo en tiempo
  - de días en días
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de días a días», pero el contexto de la celebración indica un sentido idiomático anual. «De año en año» preserva el valor idiomático señalado en el POB inglés sin perder la naturalidad en español.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una traducción literal de מִיָּמִים יָמִימָה («from days to days») a la lectura idiomática «from year to year». Esta redacción española sigue esa revisión y conserva el carácter formal del mandato.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - «Estatuto» mantiene el registro jurídico-cultual del hebreo y evita el tono eclesiástico de «ordenanza» en este contexto.
  - La nota al pie conserva la tensión entre la literalidad hebrea y el sentido idiomático anual.
  - La puntuación y el uso del demostrativo siguen el ritmo breve y legislativo del verso.
