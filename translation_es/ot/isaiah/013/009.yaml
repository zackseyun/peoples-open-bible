review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: anuncio del día de Yahvé, carácter cruel del juicio, acumulación de términos de ira, propósito de dejar la tierra en desolación y destrucción de sus pecadores. Sin embargo, hay ajustes necesarios: הִנֵּה se puede expresar mejor con un registro más solemne que «¡Mira!», y la nota b no corresponde bien porque ofrece «desolación» como alternativa cuando esa ya es la lectura principal. También conviene reflejar mejor la acumulación de וְעֶבְרָה וַחֲרוֹן אָף con una formulación más natural y fuerte en español.'
  spanish_quality_summary: El texto es legible, pero «¡Mira!» suena demasiado coloquial para un oráculo profético solemne; «He aquí» o «Miren» serían más adecuados, y «He aquí» encaja mejor con el registro. «Ardor de enojo» es comprensible pero algo rígido; «furor ardiente» suena más idiomático y conserva la imagen de intensidad. La sintaxis general es buena. Las notas necesitan corrección de correspondencia y formulación.
  glossary_alignment: Alinea correctamente יְהוָה como «Yahvé». No hay conflicto con terminología doctrinal principal. «La tierra» es aceptable para הָאָרֶץ, aunque el expediente inglés revisado prefirió «land»; en español «tierra» sigue siendo una solución fiel y natural. «Pecadores» para חַטָּאֶיהָ y «destruirá» para יַשְׁמִיד están bien.
  issues:
  - severity: medium
    issue: Registro de «¡Mira!» para הִנֵּה
    rationale: Aunque semánticamente posible, suena coloquial y menos digno que el tono profético del hebreo. «He aquí» preserva mejor la solemnidad documentada en el POB.
  - severity: medium
    issue: «Ardor de enojo» es algo poco natural
    rationale: La expresión intenta conservar la imagen de calor de וַחֲרוֹן אָף, pero en español bíblico-natural «furor ardiente» o «ardiente ira» fluye mejor sin perder fuerza.
  - severity: high
    issue: La nota [b] no corresponde a una verdadera alternativa del texto anclado
    rationale: El texto principal ya dice «desolación», pero la nota ofrece «ruina» o «desolación». Una nota no debe presentar como alternativa exacta la misma lectura ya usada; además el expediente inglés asociaba aquí alternativas más amplias sobre desolación/devastación, no una duplicación.
  revised_spanish_text: ¡He aquí[a], el día de Yahvé viene, cruel, con ira y furor ardiente, para convertir la tierra en desolación[b], y destruirá de ella a sus pecadores[c].
