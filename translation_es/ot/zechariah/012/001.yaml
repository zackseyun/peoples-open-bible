translation:
  language: es
  text: 'Un oráculo[a], la palabra de Yahvé acerca de Israel: la declaración de Yahvé, que extiende los cielos, pone el fundamento de la tierra y forma el espíritu del hombre[b] dentro de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Un oráculo: la palabra de Yahvé contra Israel». La preposición puede significar «acerca de» o, en algunos contextos, «contra».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el espíritu del hombre»; o «el espíritu humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: carga
  alternatives_spanish:
  - oráculo
  - pronunciamiento
  lexicon: HALOT
  rationale: En los encabezamientos proféticos, מַשָּׂא puede introducir una carga solemne o una sentencia profética. En español, 'carga' conserva la fuerza semántica y la ambigüedad histórica del término, aunque suene menos técnico que 'oráculo'.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' mantiene la fórmula profética estable y el vínculo con revelación directa. Se evita ''mensaje'' por ser más interpretativo y menos formal.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma castellana 'Yahvé', siguiendo la norma del proyecto para יְהוָה y evitando la sustitución litúrgica 'SEÑOR'.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: Aquí la preposición introduce el tema del oráculo. 'Acerca de' comunica el sentido amplio de referencia y evita anticipar demasiado un matiz adversativo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: the declaration of Yahweh
  chosen_spanish: la declaración de Yahvé
  alternatives_spanish:
  - declara Yahvé
  - el dicho de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal elevada del hebreo. 'Declaración' refleja bien el valor solemne de נְאֻם sin convertirlo en verbo.
- source_word: נֹטֶה שָׁמַיִם
  english_pob_choice: who stretches out the heavens
  chosen_spanish: que extiende los cielos
  alternatives_spanish:
  - que despliega los cielos
  - que tiende los cielos
  lexicon: HALOT
  rationale: '''Extiende'' es un equivalente natural en español para el participio con sentido creador, y preserva la imagen de amplitud y majestad.'
- source_word: וְיֹסֵד אָרֶץ
  english_pob_choice: lays the foundation of the earth
  chosen_spanish: echa los cimientos de la tierra
  alternatives_spanish:
  - pone el fundamento de la tierra
  - funda la tierra
  lexicon: HALOT
  rationale: La imagen de יסד se expresa con la metáfora edificatoria 'echa los cimientos', clara y fiel al hebreo, sin perder la fuerza creadora del verbo.
- source_word: וְיֹצֵר רוּחַ אָדָם
  english_pob_choice: and forms the spirit of man
  chosen_spanish: y forma el espíritu del hombre
  alternatives_spanish:
  - y forma el espíritu humano
  - y modela el espíritu del hombre
  lexicon: HALOT
  rationale: '''Forma'' reproduce bien el valor de יֹצֵר como acto de moldear/crear. ''Espíritu del hombre'' conserva la construcción singular del hebreo y su referencia al interior humano.'
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en singular genérico y representativo. 'El hombre' conserva esa forma sin reducirla a un plural abstracto.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: within him
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en su interior
  - en él
  lexicon: HALOT
  rationale: La terminación masculina singular remite a אָדָם. 'Dentro de él' es natural en español y mantiene la localización interna del espíritu.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español se adopta 'Yahvé' como forma del nombre propio divino, no la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic singular sense of אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: אָדָם aparece en singular masculino y con valor representativo. Se conserva esa forma en la línea principal para no borrar la estructura del hebreo, aunque el sentido es genérico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
- issue: Scope of עַל יִשְׂרָאֵל
  english_pob_reading: concerning Israel
  chosen_spanish_reading: acerca de Israel
  alternative_spanish_readings:
  - contra Israel
  - sobre Israel
  rationale: La preposición admite un rango semántico amplio. Se evita fijarla como 'contra' en la línea principal porque el contexto inmediato mezcla juicio y restauración; 'acerca de' preserva esa tensión.
  doctrine_reference: English POB footnote a
translation_notes:
  revision_awareness: Se revisó el pasaje según el último control de revisión, sin cambios necesarios; la solución española sigue el mismo equilibrio del POB inglés entre fórmula profética, nombre divino explícito y conservación del singular genérico de אָדָם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo, en coherencia con la norma del proyecto.
  - Se conserva la fórmula profética elevada con sustantivos («carga», «declaración») y participios/verbos creadores para reflejar el hebreo.
  - La puntuación divide el encabezamiento profético de la declaración y el contenido creador, siguiendo la estructura del original.
  - No se introduce pluralización ni lenguaje abstracto para אָדָם, porque el hebreo es singular representativo.
