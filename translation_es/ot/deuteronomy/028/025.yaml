translation:
  language: es
  text: Yahvé te entregará como derrotado delante de tus enemigos. Saldrás contra ellos por un camino, y por siete caminos huirás delante de ellos; y serás horror[a] para todos los reinos de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘objeto de horror’. El término hebreo puede señalar algo que causa horror o espanto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֶּנְךָ / יְהוָה
  english_pob_choice: will give you over / Yahweh
  chosen_spanish: te entregará / Yahvé
  alternatives_spanish:
  - te dará
  - te pondrá en manos de
  lexicon: HALOT
  rationale: נתן en este contexto de maldición pactal expresa entrega a una condición de derrota, no solo ‘dar’. ‘Entregará’ conserva esa fuerza y suena natural en español. El Tetragrámaton se mantiene como ‘Yahvé’ conforme a la convención del proyecto.
- source_word: נִגָּף
  english_pob_choice: defeated
  chosen_spanish: derrotado
  alternatives_spanish:
  - abatido
  - golpeado
  - vencido
  lexicon: HALOT
  rationale: El participio niphal aquí describe el estado de derrota militar delante del enemigo. ‘Derrotado’ comunica con claridad ese resultado en español moderno.
- source_word: לִפְנֵי אֹיְבֶיךָ
  english_pob_choice: before your enemies
  chosen_spanish: delante de tus enemigos
  alternatives_spanish:
  - ante tus enemigos
  - en presencia de tus enemigos
  lexicon: HALOT
  rationale: ‘Delante de’ reproduce bien la relación espacial del hebreo y, en contexto bélico, la idea de quedar expuesto o vencido ante ellos.
- source_word: בְּדֶרֶךְ אֶחָד
  english_pob_choice: by one way
  chosen_spanish: por un camino
  alternatives_spanish:
  - por una sola vía
  - en un solo camino
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino o ruta. ‘Por un camino’ conserva la imagen concreta y la paridad con ‘por siete caminos’ sin sonar forzado.
- source_word: תֵּצֵא אֵלָיו
  english_pob_choice: you will go out against them
  chosen_spanish: saldrás contra ellos
  alternatives_spanish:
  - marcharás contra ellos
  - saldrás a enfrentarlos
  lexicon: HALOT
  rationale: יצא + אל en lenguaje militar apunta a salir para combatir. ‘Salir contra’ transmite ese valor bélico sin agregar elementos ajenos al texto.
- source_word: וּבְשִׁבְעָה דְרָכִים
  english_pob_choice: by seven ways
  chosen_spanish: por siete caminos
  alternatives_spanish:
  - en siete direcciones
  - por siete rutas
  lexicon: HALOT
  rationale: Se conserva el número y la imagen de dispersión. ‘Caminos’ mantiene el paralelismo con ‘un camino’ y el tono poético del hebreo.
- source_word: תָּנ֣וּס לְפָנָיו
  english_pob_choice: you will flee before them
  chosen_spanish: huirás delante de ellos
  alternatives_spanish:
  - huirás ante ellos
  - escaparás delante de ellos
  lexicon: HALOT
  rationale: נוס significa huir. ‘Delante de ellos’ sigue el patrón del hebreo y mantiene la repetición del contraste militar.
- source_word: וְהָיִיתָ לְזַעֲוָה
  english_pob_choice: you will become a horror
  chosen_spanish: serás horror
  alternatives_spanish:
  - serás objeto de horror
  - serás una señal de horror
  lexicon: HALOT
  rationale: זַעֲוָה designa algo que provoca espanto o horror. ‘Serás horror’ es breve y fiel; la alternativa más explicativa se reserva en nota.
- source_word: לְכֹל מַמְלְכֹת הָאָרֶץ
  english_pob_choice: to all the kingdoms of the earth
  chosen_spanish: para todos los reinos de la tierra
  alternatives_spanish:
  - ante todos los reinos de la tierra
  - para todos los reinos del mundo
  lexicon: HALOT
  rationale: מַמְלָכוֹת הָאָרֶץ tiene alcance amplio e internacional. ‘Reinos de la tierra’ sigue bien el hebreo; ‘para’ refleja el valor de destinatario/alcance del ser ‘horror’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto y no se sustituye por un título. ‘Yahvé’ es la forma estándar del proyecto para el Tetragrámaton y evita la máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de זַעֲוָה
  english_pob_reading: a horror
  chosen_spanish_reading: horror
  alternative_spanish_readings:
  - objeto de horror
  - terror
  rationale: El texto describe el efecto público y vergonzoso de la maldición sobre Israel. ‘Horror’ conserva esa intensidad sin convertirla en una explicación interpretativa más larga.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
- issue: Pronombres colectivos en ‘your enemies / them’
  english_pob_reading: your enemies / them
  chosen_spanish_reading: tus enemigos / ellos
  alternative_spanish_readings:
  - tu enemigo / él
  rationale: El hebreo usa formas singulares en referencia colectiva. En español se normaliza al plural para concordar con ‘tus enemigos’, siguiendo la revisión auditada del POB en inglés.
  doctrine_reference: Applied revisions / latest revision pass
translation_notes:
  revision_awareness: Esta redacción sigue el estado revisado más reciente del POB en inglés, especialmente la corrección de los pronombres para concordar con ‘your enemies’/‘them’. También conserva la decisión ya afirmada de traducir יְהוָה como ‘Yahvé’ y de mantener la fuerza de זַעֲוָה con un término breve y directo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de manera uniforme para el nombre divino.
  - ‘Delante de’ y ‘por’ reproducen la alternancia preposicional del hebreo sin rigidizar el español.
  - Se conserva el paralelismo ‘un camino / siete caminos’.
  - ‘Horror’ queda como término principal; la nota ofrece la alternativa semántica sin debilitar el texto.
  - Los pronombres plurales ‘tus enemigos / ellos’ reflejan la decisión revisada del audit trail en inglés.
