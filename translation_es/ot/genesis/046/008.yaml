translation:
  language: es
  text: 'Ahora bien, estos son los nombres de los hijos de Israel que vinieron a Egipto: Jacob y sus hijos. El primogénito de Jacob fue Rubén.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estos son
  alternatives_spanish:
  - Y estos son
  - Estos son
  lexicon: HALOT
  rationale: La partícula conjuntiva más el demostrativo introduce una nueva sección genealógica; «Ahora bien» conserva ese valor discursivo en español sin sonar rígido. «Estos son» por sí solo sería más breve, pero perdería parte del encuadre narrativo.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - los nombres propios
  - la lista de nombres
  lexicon: HALOT
  rationale: Es el equivalente directo y natural para la introducción de una nómina genealógica.
- source_word: בְּנֵֽי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Aquí «hijos» refleja bien el lenguaje genealógico y mantiene la precisión del hebreo. «Descendientes» sería más amplio, pero el contexto inmediato enumera varones por nombre.
- source_word: הַבָּאִים
  english_pob_choice: who came
  chosen_spanish: que vinieron
  alternatives_spanish:
  - que llegaron
  - que estaban viniendo
  lexicon: HALOT
  rationale: El participio con artículo funciona descriptivamente como referencia retrospectiva a un grupo que efectuó la llegada. «Vinieron» preserva la simplicidad del inglés POB y el sentido del movimiento pasado.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hasta Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: La terminación direccional expresa movimiento hacia Egipto; en español, «a Egipto» es la forma más natural y fiel.
- source_word: יַעֲקֹב וּבָנָיו
  english_pob_choice: Jacob and his sons
  chosen_spanish: Jacob y sus hijos
  alternatives_spanish:
  - Jacob, con sus hijos
  - Jacob y sus descendientes
  lexicon: HALOT
  rationale: El sintagma funciona como apposición aclaratoria dentro de la identificación del grupo. «Sus hijos» sigue la misma línea genealógica y evita una traducción demasiado analítica.
- source_word: בְּכֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - el mayor
  - el hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» es el término español establecido para la prioridad de nacimiento y preserva el peso genealógico y legal del hebreo.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rúben
  lexicon: HALOT
  rationale: Se usa la forma tradicional y ampliamente reconocible del nombre en español bíblico.
theological_decisions:
- issue: El valor de «hijos de Israel» en un contexto genealógico masculino
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los descendientes de Israel
  - los hijos de Jacob
  rationale: El pasaje introduce una lista de varones concretos y el término hebreo aquí no requiere ampliación al sentido más general de «descendientes». Mantener «hijos» preserva el alcance inmediato del texto.
  doctrine_reference: Génesis 46:8; precisión genealógica del texto hebreo
translation_notes:
  revision_awareness: Se atendió la revisión del inglés POB que ajustó la puntuación para marcar la estructura appositiva; en español se reflejó con dos oraciones breves y dos puntos tras «Egipto» para mantener claridad sintáctica. No se trasladaron notas del inglés porque la redacción española quedó suficientemente transparente sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se mantuvo «Egipto» como nombre propio sin preposición compuesta.
  - Se prefirió «Rubén» por conveniencia lectoral y tradición bíblica en español.
  - No se añadió nota al pie porque la solución española no introduce una alternativa textual que deba auditarse en el propio versículo.
