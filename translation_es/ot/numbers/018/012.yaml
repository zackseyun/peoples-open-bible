translation:
  language: es
  text: Lo mejor del aceite[a], y lo mejor del vino nuevo y del grano—sus primicias, que dan a Yahvé—te las he dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «grasa» del aceite, del vino nuevo y del grano; un modismo para la porción más rica o mejor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  english_pob_choice: the best of
  chosen_spanish: la mejor parte de
  alternatives_spanish:
  - la grasa de
  - la parte más rica de
  - la parte escogida de
  lexicon: HALOT
  rationale: En contextos de productos agrícolas, חֵלֶב no se refiere a grasa literal sino a la porción más rica o selecta. En español, «la mejor parte de» comunica ese valor idiomático sin introducir un tecnicismo extraño.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite fresco
  lexicon: HALOT
  rationale: יִצְהָר designa aceite, normalmente de oliva. «Aceite» es la forma más natural y directa en español; el contexto agrícola ya orienta al lector.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino fresco
  - mosto
  lexicon: HALOT
  rationale: La expresión distingue este término de «vino» en sentido general. «Vino nuevo» conserva la distinción léxica y es entendible en español bíblico moderno.
- source_word: דָגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: דָגָן es un término amplio para el producto de grano. «Grano» mantiene esa amplitud sin restringirlo a una especie concreta.
- source_word: רֵאשִׁיתָם
  english_pob_choice: their firstfruits
  chosen_spanish: las primicias de ellos
  alternatives_spanish:
  - sus primicias
  - la primera porción de ellos
  lexicon: HALOT
  rationale: En español, «primicias» es el equivalente cultual y agrícola de רֵאשִׁיתָם. Añadir «de ellos» conserva el referente plural del sufijo y evita perder la relación con aceite, vino nuevo y grano.
- source_word: אֲשֶׁר יִתְּנוּ לַיהוָה
  english_pob_choice: which they give to Yahweh
  chosen_spanish: que dan a Yahvé
  alternatives_spanish:
  - que ofrecen a Yahvé
  - que entregan a Yahvé
  lexicon: HALOT
  rationale: El verbo נתן significa «dar». «Dan a Yahvé» sigue de cerca el hebreo y evita añadir un matiz sacrificial más específico de lo que exige el texto.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Project default terminology
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo el nombre propio «Yahvé» en el texto principal.
- source_word: לְךָ נְתַתִּים
  english_pob_choice: I have given to you
  chosen_spanish: te las he dado
  alternatives_spanish:
  - te las he entregado
  - te las he dado a ti
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un don ya concedido. «Te las he dado» reproduce la acción completada y recupera en español el objeto plural implícito por el contexto inmediato sin añadir «them» como redundancia ajena.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: the LORD / Yahweh depending on audit context; here English uses Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete de auditoría usa «Yahweh» en inglés; el proyecto exige «Yahvé» como forma principal en español. Esto preserva la referencia al nombre propio divino sin mascararlo.
  doctrine_reference: Tetragrámaton / nomen divinum
- issue: Naturaleza de las primicias
  english_pob_reading: their firstfruits
  chosen_spanish_reading: las primicias de ellos
  alternative_spanish_readings:
  - sus primicias
  - la primera parte de ellos
  rationale: El texto no solo enumera productos, sino que los define como la porción primera dedicada a Dios. «Primicias» conserva el sentido cultual y agrícola del hebreo y del POB en inglés.
  doctrine_reference: Ofrendas y primicias (ley cultual de Israel)
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar el pronombre objeto redundante después de «I have given». La traducción española sigue esa revisión y expresa el objeto solo en la forma exigida por el contexto, sin duplicación innecesaria. También conserva la equivalencia óptima de חֵלֶב como una expresión idiomática de la parte mejor, no como grasa literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para el nombre divino.
  - «Primicias» se usa con sentido cultual, no meramente cronológico.
  - «Aceite», «vino nuevo» y «grano» conservan el campo agrícola amplio del hebreo.
  - 'La construcción verbal en español refleja un don ya concedido: «te las he dado».'
