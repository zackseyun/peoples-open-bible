translation:
  language: es
  text: e hizo pasar a Israel por en medio de ella[a], porque su amor constante[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «e hizo que Israel pasara por en medio de ella».'
    reason: alternative_reading
  - marker: b
    text: El hebreo חֶסֶד también puede traducirse «misericordia», «amor fiel» o «lealtad amorosa», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֶעֱבִ֣יר
  english_pob_choice: and brought
  chosen_spanish: e hizo pasar
  alternatives_spanish:
  - e condujo
  - e hizo atravesar
  lexicon: HALOT
  rationale: El hiphil de עבר expresa causar que alguien pase. En español, «hizo pasar» reproduce con naturalidad la causatividad del verbo sin perder la imagen del movimiento.
- source_word: יִשְׂרָאֵ֣ל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Nombre propio estándar
  rationale: Nombre propio transliterado de forma convencional en español.
- source_word: בְּ/תוֹכ֑/וֹ
  english_pob_choice: through the midst of it
  chosen_spanish: por en medio de ella
  alternatives_spanish:
  - a través de ella
  - en medio de ella
  lexicon: HALOT
  rationale: La forma hebrea señala el paso por el interior o centro de algo; aquí el referente es el mar del verso anterior. «Por en medio de ella» conserva el sentido espacial y la referencia al paso atravesando el mar.
- source_word: כִּ֖י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este estribillo, la partícula introduce la razón que sustenta la alabanza. «Porque» es claro y natural en español, aunque mantiene el valor causal del hebreo.
- source_word: לְ/עוֹלָ֣ם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo aquí es una expresión adverbial de permanencia; en español, «para siempre» reproduce con precisión la duración indefinida sin añadir un verbo inexistente en el original.
- source_word: חַסְדּֽ/וֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su misericordia
  - su lealtad amorosa
  - su amor fiel
  lexicon: HALOT
  rationale: חֶסֶד combina amor leal, misericordia y fidelidad pactual. «Amor constante» transmite bien la durabilidad y la dimensión relacional sin convertirlo en una mera emoción ni imponer un término demasiado técnico.
theological_decisions:
- issue: Cómo renderizar חֶסֶד en el estribillo de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor constante para siempre
  alternative_spanish_readings:
  - su misericordia para siempre
  - su amor fiel para siempre
  - su lealtad amorosa para siempre
  rationale: El estribillo del salmo celebra la fidelidad durable de Yahvé en la historia de salvación. «Amor constante» preserva la dimensión afectiva y de pacto de חֶסֶד sin perder legibilidad en español. No se elimina la tensión entre misericordia, fidelidad y amor; se conserva en la nota.
  doctrine_reference: Consistencia terminológica en el salterio; matiz pactual de חֶסֶד.
translation_notes:
  revision_awareness: El contexto de revisión indica acuerdo alto y sin cambios aplicados; esta versión sigue de cerca el hebreo y conserva la imagen espacial del paso por el mar, junto con el estribillo fijo sobre חֶסֶד.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la serie, pero aquí el versículo no lo expresa explícitamente.
  - Se mantiene «Israel» como nombre propio sin adaptación.
  - Se conserva la referencia femenina «ella» por el antecedente implícito del mar en el contexto inmediato.
  - «Amor constante» se elige como equivalente español principal de חֶסֶד, manteniendo abierta la gama semántica en la nota.
