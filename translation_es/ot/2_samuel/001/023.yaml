translation:
  language: es
  text: Saúl y Jonatán, amados y agradables[a] en su vida, no fueron separados en su muerte; más veloces que águilas[b] y más fuertes[c] que leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «encantadores»; «agradables» conserva mejor el paralelismo poético y el tono sobrio del lamento.
    reason: lexical_alternative
  - marker: b
    text: O «más veloces que buitres», porque el hebreo puede referirse de manera más amplia a una gran ave de presa; se conserva «águilas» por ser la opción tradicional y más natural aquí.
    reason: lexical_alternative
  - marker: c
    text: O «más poderosos» o «más imponentes» que leones; el hebreo expresa superioridad en fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאוּל וִיהוֹנָתָן
  english_pob_choice: Saul and Jonathan
  chosen_spanish: Saúl y Jonatán
  alternatives_spanish:
  - Saúl y Jonathan
  lexicon: Nombres propios bíblicos en transliteración estándar
  rationale: Se conservan los nombres propios con la forma española usual y reconocible, sin alterar el referente del lamento.
- source_word: הַנֶּאֱהָבִים
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados entrañablemente
  - queridos
  - amados
  lexicon: HALOT
  rationale: La forma pasiva/adjetival de אהב pide una expresión de ser amados; 'amados' mantiene la fuerza afectiva y el tono elevado del duelo. 'Beloved' en inglés se vierte mejor con 'amados' que con 'queridos' para evitar atenuar el matiz solemne.
- source_word: וְהַנְּעִימִם
  english_pob_choice: pleasant
  chosen_spanish: agradables
  alternatives_spanish:
  - amables
  - gratos
  - hermosos
  lexicon: HALOT
  rationale: נעים expresa agradabilidad o deleite. 'Agradables' conserva el paralelo poético con 'amados' sin cargar el término con una interpretación moral o estética más fuerte de la que el hebreo exige.
- source_word: בְּחַיֵּיהֶם
  english_pob_choice: in their lives
  chosen_spanish: en su vida
  alternatives_spanish:
  - durante su vida
  - mientras vivieron
  lexicon: HALOT
  rationale: La preposición marca la esfera temporal de su vida. En español, 'en su vida' mantiene el paralelismo con 'en su muerte' y suena natural en el registro poético.
- source_word: וּבְמוֹתָם
  english_pob_choice: in their death
  chosen_spanish: en su muerte
  alternatives_spanish:
  - al morir
  - cuando murieron
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior. El singular 'muerte' refleja bien el uso colectivo del hebreo y la formulación poética del lamento.
- source_word: לֹא נִפְרָדוּ
  english_pob_choice: were not parted
  chosen_spanish: no fueron separados
  alternatives_spanish:
  - no se separaron
  - no fueron apartados
  lexicon: HALOT
  rationale: El nifal de פרד expresa separación pasiva/reflexiva. 'No fueron separados' preserva la voz y el registro solemne; 'no se separaron' sería más idiomático pero menos cercano a la forma verbal hebrea.
- source_word: מִנְּשָׁרִים קַלּוּ
  english_pob_choice: they were swifter than eagles
  chosen_spanish: más veloces que águilas
  alternatives_spanish:
  - más rápidos que águilas
  - más ligeros que águilas
  - más veloces que buitres
  lexicon: HALOT
  rationale: En este comparativo, קלל comunica rapidez o ligereza. 'Más veloces' transmite el sentido con naturalidad en español. Se conserva 'águilas' como equivalente tradicional y natural del término poético hebreo, tal como refleja la opción inglesa del POB.
- source_word: מֵאֲרָיוֹת גָּבֵרוּ
  english_pob_choice: they were stronger than lions
  chosen_spanish: más fuertes que leones
  alternatives_spanish:
  - más poderosos que leones
  - más valientes que leones
  - más fuertes que leones
  lexicon: HALOT
  rationale: גבר expresa superioridad o fortaleza. 'Más fuertes que leones' es la forma más clara y directa en español, sin perder el tono heroico del poema.
theological_decisions:
- issue: Tono elogioso en el lamento por Saúl y Jonatán
  english_pob_reading: Render the verse as honorific poetic praise without importing moral evaluation or suppressing the lament's positive portrayal of Saul.
  chosen_spanish_reading: Mantener el elogio poético y funerario sin suavizarlo por la historia previa de Saúl ni idealizarlo más allá de lo que el texto dice.
  alternative_spanish_readings:
  - Atenuar el elogio por las fallas previas de Saúl
  - Convertirlo en una canonización implícita
  rationale: El versículo forma parte de una elegía y usa lenguaje honorífico para Saúl y Jonatán juntos. La traducción debe conservar esa tensión teológica y literaria, sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión narrativa y teológica del texto bíblico.
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior asegurando que los marcadores de nota [a], [b] y [c] aparezcan exactamente en el texto español junto a las palabras anotadas. Se mantiene la decisión lexical y poética del POB inglés, con anclajes visibles y consistentes.
  spanish_consistency_notes:
  - Se usó «Saúl» con tilde y «Jonatán» como forma española estándar.
  - Se mantuvo el paralelismo 'en su vida / en su muerte' en singular para reflejar el hebreo y su cadencia.
  - Se prefirió «no fueron separados» para conservar la pasiva del nifal.
  - Se conservaron «águilas» y «leones» como imágenes poéticas naturales en español.
  - La puntuación y el orden de miembros respetan la estructura paralela del original hebreo.
