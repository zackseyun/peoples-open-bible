translation:
  language: es
  text: Comerán, pero no se saciarán; se prostituirán[a], pero no aumentarán[b], porque han abandonado a Yahvé[c], para aferrarse a la prostitución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «cometerán inmoralidad sexual» / «cometerán prostitución». El verbo hebreo puede referirse específicamente a prostitución y, en Oseas, a menudo lleva resonancias de infidelidad de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «se multiplicarán». El hebreo literalmente tiene la idea de «irrumpir» o «desbordarse»; aquí probablemente se refiere al aumento de descendencia o población.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo es muy escueto: «han abandonado a Yahvé, para guardar». El sentido probable aquí, según el contexto, es que se aferran o se entregan a la prostitución; otros entienden que han dejado de observar a Yahvé o sus caminos.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכְלוּ
  english_pob_choice: they will eat
  chosen_spanish: Comerán
  alternatives_spanish:
  - Comen
  - Han comido
  lexicon: HALOT
  rationale: El perfecto con waw en contexto profético anuncia una consecuencia futura; en español, el futuro simple comunica bien ese valor de anuncio/jucio.
- source_word: יִשְׂבָּעוּ
  english_pob_choice: be satisfied
  chosen_spanish: se saciarán
  alternatives_spanish:
  - estarán satisfechos
  - quedarán satisfechos
  lexicon: HALOT
  rationale: שׂבע expresa quedar lleno o saciado tras comer. 'Saciarse' conserva la imagen corporal y el contraste con comer sin plenitud.
- source_word: הִזְנוּ
  english_pob_choice: commit sexual immorality
  chosen_spanish: se prostituirán
  alternatives_spanish:
  - cometerán inmoralidad sexual
  - cometerán prostitución
  - serán promiscuos
  lexicon: HALOT
  rationale: En Oseas, זנה suele tener fuerza de prostitución/infidelidad sexual. 'Se prostituirán' mantiene la fuerza léxica y el eco oseánico sin diluirlo en una abstracción general.
- source_word: יִפְרֹצוּ
  english_pob_choice: increase
  chosen_spanish: aumentarán
  alternatives_spanish:
  - se multiplicarán
  - crecerán
  - brotarán
  lexicon: HALOT
  rationale: Aunque el verbo literalmente sugiere 'romperse/irrumpir', aquí el contexto sexual apunta a aumento de descendencia o población. 'Aumentarán' preserva ese resultado sin forzar una lectura técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, de acuerdo con la política POB, en lugar de sustituirlo por un título.
- source_word: עָזְבוּ
  english_pob_choice: have abandoned
  chosen_spanish: han abandonado
  alternatives_spanish:
  - han dejado
  - han abandonado por completo
  - han forsaken
  lexicon: HALOT
  rationale: '''Abandonado'' expresa de manera clara la deserción de pacto que denuncia Oseas.'
- source_word: לִשְׁמֹר
  english_pob_choice: to cherish prostitution
  chosen_spanish: para entregarse a la prostitución
  alternatives_spanish:
  - para guardar la prostitución
  - para conservar la prostitución
  - para dedicarse a la prostitución
  lexicon: HALOT
  rationale: 'El infinitivo es el punto más elíptico del verso. A la luz del contexto de infidelidad sexual, ''para entregarse a la prostitución'' refleja el sentido funcional: no atender a Yahvé, sino persistir en la prostitución. Se evita introducir un objeto inexistente y se mantiene la tensión textual.'
theological_decisions:
- issue: Sentido de הִזְנוּ en Oseas
  english_pob_reading: Rendered as literal/general sexual immorality with possible covenantal resonance left implicit.
  chosen_spanish_reading: se prostituirán, con resonancia de infidelidad de pacto implícita
  alternative_spanish_readings:
  - cometerán inmoralidad sexual
  - practicarán prostitución
  - se entregarán a la idolatría
  rationale: El contexto inmediato permite una referencia sexual concreta, mientras que en Oseas esa conducta también carga el trasfondo teológico de infidelidad a Yahvé. La formulación española conserva ambas capas sin resolverlas artificialmente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Interpretación de לִשְׁמֹר en el cierre del verso
  english_pob_reading: Understood as abandoning attentiveness/observance toward the LORD, expressed as 'to cherish prostitution.'
  chosen_spanish_reading: para entregarse a la prostitución
  alternative_spanish_readings:
  - para guardar la prostitución
  - para observar la prostitución
  - para atender a Yahvé
  rationale: La secuencia hebrea es breve y ambigua; el inglés POB resolvió la clausula hacia el campo semántico de la prostitución. El español sigue esa decisión, evitando un objeto añadido y manteniendo la relación con la infidelidad sexual del contexto.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la cláusula final desde una paráfrasis de 'give heed to him' hacia 'cherish prostitution', para evitar un objeto inexistente en el hebreo y reflejar mejor el campo semántico de לִשְׁמֹר en este contexto. La redacción española sigue esa revisión, optando por una solución contextual que no añade un objeto personal y mantiene el enlace con la prostitución/infidelidad.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme a la política POB.
  - Se usa 'prostituirse' para זנה, preservando el peso léxico y el trasfondo de Oseas.
  - '''Aumentarán'' comunica el sentido contextual de יפרצו sin borrar la imagen subyacente de irrupción/expansión.'
  - La cláusula final se resuelve de modo contextual y no literalista, siguiendo el audit trail inglés y evitando introducir 'él' o 'Dios' como objeto no expresado.
