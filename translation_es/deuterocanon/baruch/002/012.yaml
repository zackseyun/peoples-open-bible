translation:
  language: es
  text: Hemos pecado[a], hemos actuado impíamente, hemos hecho mal, oh Señor, nuestro Dios, contra todas tus ordenanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra todos tus justos juicios» o «con respecto a todas tus ordenanzas»; la frase griega puede entenderse en relación con los decretos de Dios o con sus normas de manera más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτομεν
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos errado
  - Hemos cometido pecado
  lexicon: BDAG
  rationale: El aoristo confesional expresa una culpa real ya cometida; en español, el perfecto compuesto mantiene bien el tono de confesión vigente. «Pecado» es el equivalente más directo y natural.
- source_word: ἠσεβήσαμεν
  english_pob_choice: we have acted ungodly
  chosen_spanish: hemos actuado impíamente
  alternatives_spanish:
  - hemos sido impíos
  - hemos vivido sin piedad
  lexicon: BDAG
  rationale: El verbo es dinámico, no solo descriptivo. «Actuado impíamente» conserva la fuerza verbal y reproduce la idea de conducta irreverente sin volverla meramente estática.
- source_word: ἠδικήσαμεν
  english_pob_choice: we have done wrong
  chosen_spanish: hemos hecho mal
  alternatives_spanish:
  - hemos obrado injustamente
  - hemos hecho injusticia
  lexicon: BDAG
  rationale: Sin objeto personal explícito, la frase amplia «hecho mal» corresponde bien al valor general de ἀδικέω y evita especificar una injusticia interpersonal que el griego no menciona.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  lexicon: BDAG
  rationale: Aunque el griego tiene κύριε, en este contexto traduce la invocación al Dios de Israel. Según el criterio del proyecto, se usa «Yahvé» para el nombre divino, manteniendo el vocativo solemne con «oh».
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: BDAG
  rationale: Es la forma natural y reverente en español para el posesivo del griego, sin perder la relación confesional de pertenencia.
- source_word: ἐπὶ πᾶσιν τοῖς δικαιώμασίν σου
  english_pob_choice: against all your ordinances
  chosen_spanish: contra todos tus preceptos
  alternatives_spanish:
  - respecto de todos tus estatutos
  - contra todas tus ordenanzas
  - en relación con todos tus decretos
  lexicon: BDAG
  rationale: La preposición con dativo admite relación o base, y el contexto penitencial favorece un sentido de ofensa/contradicción. «Preceptos» preserva el campo normativo de δικαιώματα en español sin limitarlo solo a fallos judiciales.
theological_decisions:
- issue: Tratamiento del nombre divino en un vocativo griego que usa κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El expediente del proyecto establece Yahvé para el nombre divino en el texto principal. Aunque la forma superficial griega es κύριε, el contexto de oración/confesión dirige a Dios como el Dios de Israel, por lo que no se enmascara el nombre con «Señor».
  doctrine_reference: 'Proyecto POB: יהוה / YHWH → Yahvé; κύριος en contexto de divina invocación'
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios respecto del pase más reciente y que el acuerdo con la evaluación cruzada es alto; se mantiene la decisión léxica principal de traducir δικαιώματα con un término normativo amplio y de conservar el tono confesional en perfecto compuesto.
  spanish_consistency_notes:
  - Se evitó «Cristo» y «SEÑOR» por no corresponder a este pasaje ni al estándar de nombres del proyecto.
  - Se mantuvo un registro confesional directo, breve y reverente, sin expandir el texto más allá de la evidencia griega.
  - La nota[a] preserva la ambigüedad documentada de ἐπί + dativo con δικαιώματα en este contexto.
