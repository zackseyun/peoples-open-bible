translation:
  text: And Lysias marched at first with a strong force[a], but was driven back before them, and they grew strong by means of the weapons that they had taken from the camps they had cut down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they prevailed with the weapons that they had taken from the camps they had destroyed/struck down.' The Greek allows either an emphasis on becoming strong or on prevailing, and the final relative clause is compressed in a military idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  chosen: marched
  alternatives:
  - went
  - advanced
  lexicon: LSJ
  rationale: In military context with δυνάμει ἰσχυρᾷ, 'marched' conveys movement of an army more naturally than the more generic 'went'.
- source_word: δυνάμει ἰσχυρᾷ
  chosen: with a strong force
  alternatives:
  - with great power
  - with a mighty army
  lexicon: LSJ
  rationale: δύναμις here refers to military strength/force rather than abstract power. 'Strong force' preserves the military sense without over-specifying 'army' where the Greek phrase itself is broader.
- source_word: ἐν πρώτοις
  chosen: at first
  alternatives:
  - formerly
  - in the beginning
  lexicon: LSJ
  rationale: The phrase marks an initial stage in the campaign report. 'At first' is idiomatic and fits the narrative contrast with the later reversal.
- source_word: ἀνετράπη ἀπὸ προσώπου αὐτῶν
  chosen: was driven back before them
  alternatives:
  - was overthrown by them
  - was turned back from before them
  lexicon: LSJ
  rationale: The passive of ἀνατρέπω in battle context indicates being routed or repulsed. 'Driven back before them' preserves the vivid ἀπὸ προσώπου idiom while reading naturally in English.
- source_word: ἴσχυσαν
  chosen: they grew strong
  alternatives:
  - they prevailed
  - they became powerful
  lexicon: LSJ
  rationale: The verb can mean become strong or prevail. Here, followed by instrumental ὅπλοις, the sense is that their strength increased through captured arms; 'grew strong' best reflects that development.
- source_word: ὅπλοις
  chosen: by means of the weapons
  alternatives:
  - with arms
  - by weapons
  lexicon: LSJ
  rationale: ὅπλα are weapons/arms. 'By means of the weapons' makes the instrumental dative explicit in clear English.
- source_word: παρεμβολῶν
  chosen: camps
  alternatives:
  - encampments
  - army camps
  lexicon: LSJ
  rationale: παρεμβολή commonly denotes a camp or encampment in military settings. 'Camps' is concise and natural.
- source_word: ἐξέκοψαν
  chosen: had cut down
  alternatives:
  - had destroyed
  - had struck down
  lexicon: LSJ
  rationale: The verb literally means cut out/down and in battle can refer to cutting down enemies. Because the relative clause modifies the camps as the source from which the weapons were taken, the implied sense is the enemy forces in those camps whom they had cut down. This keeps closer to the Greek image than the smoother 'defeated'.
