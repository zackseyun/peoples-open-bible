theological_decisions:
- issue: Gendered proverb with morally troubling comparison between men and women
  chosen_reading: Retain the source's gender-specific contrast ('a man' / 'a woman') without softening or universalizing.
  alternative_readings:
  - Better a person's wickedness than a woman's goodness
  - Better male wickedness than female goodness
  rationale: The verse explicitly contrasts איש and אשה. The translation should preserve the text's rhetoric rather than mute it. No doctrinal correction is imported; the line is rendered transparently as a proverb from Sirach.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Primary witness and difficult final colon
  chosen_reading: Follow the Hebrew as primary while allowing the Greek parallel to clarify the sense of the difficult final clause.
  alternative_readings:
  - and in a house a woman is sought out for reproach
  - and a disgraceful woman brings reproach
  rationale: The Hebrew final colon is somewhat opaque, especially around תביע, but the Greek parallel strongly supports a sense involving a shame-bringing woman and reproach. The main text therefore reflects the Hebrew wording with Greek-supported sense, while noting the lexical uncertainty in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
