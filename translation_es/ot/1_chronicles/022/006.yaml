translation:
  language: es
  text: Entonces llamó a Salomón, su hijo, y le mandó edificar una casa para Yahvé[a], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un templo para Yahvé’. El hebreo dice literalmente ‘una casa para Yahvé’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: Then he called for
  chosen_spanish: Entonces llamó a
  alternatives_spanish:
  - Entonces convocó a
  - Entonces llamó
  lexicon: HALOT
  rationale: El verbo קרא con ל y una persona puede expresar ‘llamar’ o ‘convocar’. En español, ‘llamó a’ comunica con naturalidad la acción narrativa sin añadir una idea más fuerte que la del texto.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Salomón
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma castellana estándar.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: El sufijo posesivo indica la relación filial; ‘su hijo’ es suficiente y natural en español, sin sobreexpansión.
- source_word: וַיְצַוֵּהוּ
  english_pob_choice: and commanded him
  chosen_spanish: y le mandó
  alternatives_spanish:
  - y le ordenó
  - y le encargó
  lexicon: HALOT
  rationale: צוה expresa una orden con autoridad. ‘Mandó’ conserva esa fuerza en español bíblico actual y es claro para el lector.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - edificar
  lexicon: HALOT
  rationale: El infinitivo indica la acción encargada. ‘Edificar’ mantiene bien el registro bíblico y la relación con una obra sagrada.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - una casa
  - un templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘casa’. En español, ‘casa’ conserva la literalidad; el contexto permite entender que se trata del templo sin reemplazar el término del original.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en su forma española acordada, Yahvé, en lugar de ocultarlo con ‘SEÑOR’.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva estándar y precisa para identificar a Yahvé como el Dios propio de Israel.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: La pauta del proyecto exige traducir יְהוָה como ‘Yahvé’. Se conserva así el nombre del pacto en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: בית como ‘casa’ frente a ‘templo’
  english_pob_reading: a house
  chosen_spanish_reading: una casa
  alternative_spanish_readings:
  - un templo
  rationale: El hebreo usa בית, término ordinario para ‘casa’. Aunque el referente es el templo, la traducción conserva la palabra del original y deja que el contexto haga la identificación.
  doctrine_reference: HALOT בית; English audit note on lexical alternative
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura literal ‘a house’ y registra ‘a temple’ como alternativa léxica. No hay cambios revisados posteriores; el presente borrador conserva esa tensión entre literalidad y referencia contextual al templo, aplicándola en español con ‘casa’ y una nota alternativa.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ conforme a la terminología del proyecto, no ‘SEÑOR’.
  - Se prefirió ‘casa’ para reflejar בית de forma literal; el contexto de una obra sagrada permite entender el templo sin añadirlo al texto principal.
  - ‘Mandó’ y ‘edificar’ sostienen un registro bíblico claro y natural en español.
  - No se introdujeron términos doctrinalmente más interpretativos que los que el hebreo y el audit trail justifican.
