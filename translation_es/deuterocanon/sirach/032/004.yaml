translation:
  language: es
  text: Como un sello sobre una bolsa de oro, así es un canto[a] a Dios en un banquete de vino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una canción». La frase hebrea es breve y puede entenderse como un canto dirigido a Dios o relacionado con Dios.'
    reason: lexical_alternative
  - marker: b
    text: Las líneas hebreas precedentes en esta unidad del versículo presentan dificultades de transmisión textual; este símil final es la parte más clara y se traduce directamente del hebreo conservado, teniendo en cuenta el griego como control de consistencia.
    reason: textual_variant
lexical_decisions:
- source_word: כחותם
  english_pob_choice: Like a seal
  chosen_spanish: Como un sello
  alternatives_spanish:
  - Como un signet
  - Así como un sello
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige una comparación explícita; «sello» reproduce con naturalidad la imagen concreta del hebreo sin añadir especialización innecesaria como «signet».
- source_word: על כיס זהב
  english_pob_choice: on a bag of gold
  chosen_spanish: sobre una bolsa de oro
  alternatives_spanish:
  - sobre una bolsa con oro
  - sobre un saco de oro
  lexicon: HALOT
  rationale: כיס puede designar bolsa, bolso o bolsa para objetos valiosos. «Bolsa de oro» conserva la imagen material y resulta idiomático en español.
- source_word: שיר
  english_pob_choice: a song
  chosen_spanish: una canción
  alternatives_spanish:
  - un canto
  - un canto/salmo
  lexicon: HALOT
  rationale: El sustantivo singular se vierte de forma concreta. «Canción» comunica bien la unidad breve del símil en español contemporáneo, sin cargarlo de matices litúrgicos que el hebreo no exige aquí.
- source_word: אל
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - de Dios
  - a Dios
  lexicon: HALOT
  rationale: La frase hebrea es comprimida y admite relación direccional o genitiva. «Para Dios» mantiene la orientación cultual sin cerrar la ambigüedad del hebreo; en español suena natural en este contexto.
- source_word: על משתה היין
  english_pob_choice: at a banquet of wine
  chosen_spanish: en un banquete de vino
  alternatives_spanish:
  - en un festín de vino
  - en un banquete vinario
  lexicon: HALOT
  rationale: משתה es un banquete o festín, normalmente asociado a bebida. «Banquete de vino» preserva la imagen del hebreo y mantiene la relación con el vino sin paraphrasear más allá del texto.
theological_decisions:
- issue: Fuerza de אל en שיר אל
  english_pob_reading: song to God
  chosen_spanish_reading: canción para Dios
  alternative_spanish_readings:
  - canción de Dios
  - canción a Dios
  rationale: 'La estructura hebrea permite varias relaciones. Se conserva una lectura abierta pero reverente: la canción está orientada a Dios, sin afirmar más de lo que la frase breve garantiza. Esto evita cerrar la ambigüedad con una formulación excesivamente interpretativa.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Texto hebreo transmitido con dificultad en el entorno inmediato
  english_pob_reading: The preceding Hebrew lines in this verse unit are textually difficult in transmission; this closing comparison is the clearest portion and is translated directly from the surviving Hebrew, with the Greek kept in view as a consistency check.
  chosen_spanish_reading: El símil final se traduce directamente del hebreo conservado, con el griego en vista como control de consistencia.
  alternative_spanish_readings:
  - Se podría armonizar más fuertemente con el griego
  - Se podría suavizar la comparación por la transmisión difícil
  rationale: Dado el aviso de transmisión difícil, la redacción española sigue el hebreo que se conserva y no intenta reconstruir en exceso las líneas anteriores. El griego sirve como verificación, no como sustituto del texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que prefirió «bag of gold» y una lectura más natural de אל como «to God»; sin embargo, para el español se optó por «bolsa de oro» y «para Dios» por claridad y por mantener abierta la relación breve del hebreo. También se consideró el testimonio griego, que confirma el símil final pero no resuelve la densidad de la frase nominal hebrea.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אל cuando el contexto lo exige, sin usar convenciones de sustitución litúrgica.
  - Se conserva la comparación explícita con «Como un sello...», acorde con el prefijo כ.
  - No se introduce vocabulario eclesiástico ajeno al símil breve del verso.
  - La puntuación refleja una sola frase comparativa, con la segunda mitad organizada para lectura natural en español.
