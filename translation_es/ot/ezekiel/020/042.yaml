revisions:
- from: Entonces sabrán que yo soy Yahvé[a], cuando los haga entrar en la tierra de Israel, en la tierra que alcé mi mano para dar a sus padres.
  to: Entonces sabrán que yo soy Yahvé[a], cuando los haga entrar en la tierra de Israel, en la tierra por la cual alcé mi mano para dársela a sus padres.
  rationale: Se conserva fielmente el nombre divino «Yahvé» y el modismo concreto de juramento, pero se corrige la sintaxis para que el español sea natural y transparente. «Por la cual alcé mi mano» expresa mejor la relación del gesto de juramento con la tierra prometida, y «dársela» refleja con más claridad el objeto femenino explícito del hebreo.
  reviewer_model: gpt-5.4
