  text: אָ֣ז יַקְהֵ֣ל שְׁלֹמֹ֣ה אֶת זִקְנֵ֣י יִשְׂרָאֵ֡ל אֶת כָּל רָאשֵׁ֣י הַ/מַּטּוֹת֩ נְשִׂיאֵ֨י הָ/אָב֜וֹת לִ/בְנֵ֧י יִשְׂרָאֵ֛ל אֶל הַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה יְרוּשָׁלִָ֑ם לְֽ/הַעֲל֞וֹת אֶת אֲר֧וֹן בְּרִית יְהוָ֛ה מֵ/עִ֥יר דָּוִ֖ד הִ֥יא צִיּֽוֹן־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/001.yaml
  text: Then Solomon assembled the elders of Israel[a], all the heads of the tribes, the leaders of the fathers’ houses of the sons of Israel, to King Solomon in Jerusalem, to bring up the ark of the covenant of Yahweh from the city of David, that is, Zion.
  footnotes:
