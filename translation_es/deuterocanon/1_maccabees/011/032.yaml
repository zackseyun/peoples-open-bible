lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  - El rey Demetrio
  lexicon: LSJ
  rationale: Se conserva el título real inicial del formulario epistolar griego. En español, 'El rey' funciona de manera natural y mantiene el orden solemne del encabezado sin añadir contenido no presente en el griego.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrio el rey
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio al español estándar, como corresponde a la política del proyecto y al uso eclesial amplio.
- source_word: Λασθένει
  english_pob_choice: Lasthenes
  chosen_spanish: Lasthenes
  alternatives_spanish:
  - Lástenes
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio en forma transliterada. La forma 'Lasthenes' sigue de cerca el griego y coincide con la tradición editorial del texto base inglés.
- source_word: τῷ πατρὶ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre
  - padre
  lexicon: LSJ
  rationale: 'Se mantiene la ambigüedad documentada: la expresión puede funcionar como título honorífico o indicación de relación. En español, ''su padre'' conserva la literalidad relacional sin resolver en exceso la cuestión.'
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - que se regocije
  - regocijarse
  lexicon: LSJ
  rationale: Se vierte la fórmula epistolar griega con el equivalente idiomático español 'saludos', evitando un calco de infinitivo que sonaría ajeno en una salutación de carta.
theological_decisions:
- issue: Sentido de 'su padre' en la fórmula cortesana
  english_pob_reading: '''His father'' likely functions as an honorific or court title in context, not necessarily a statement of biological relationship.'
  chosen_spanish_reading: '''su padre'' se deja como posible título honorífico o designación cortesana, no como afirmación biológica explícita.'
  alternative_spanish_readings:
  - su padre biológico
  - el padre de él
  rationale: El griego y el audit trail inglés no obligan a interpretar paternidad biológica. La traducción española conserva la tensión y permite la lectura cortesana sugerida por el contexto.
  doctrine_reference: Nota histórico-filológica; no doctrinal.
translation_notes:
  revision_awareness: 'El registro inglés auditado permaneció sin cambios en la última revisión; no se documentan correcciones textuales ni desplazamientos de sentido. La presente propuesta sigue esa estabilidad y conserva la decisión léxica principal: saludo epistolar idiomático, con nota sobre la fórmula griega y la posible lectura honorífica de ''su padre''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque el texto no contiene el nombre divino.
  - Se usa 'saludos' para χαίρειν por coherencia con la equivalencia idiomática del formulario de carta.
  - Se preserva la ambigüedad de 'su padre' mediante nota, en línea con el audit trail inglés.
