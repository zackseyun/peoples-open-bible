revisions:
- from: Y él mismo y su gente acamparon frente a ellos; y cuando vio al pueblo atemorizado para cruzar el wadi[a], cruzó primero, y los hombres lo vieron y cruzaron detrás de él.
  to: Él mismo acampó frente a ellos con su pueblo; y cuando vio que la gente tenía miedo de cruzar el wadi[a], cruzó primero, y los hombres lo vieron y cruzaron detrás de él.
  rationale: Se ajusta el inicio para reflejar el verbo singular del griego de manera natural en español («Él mismo acampó... con su pueblo»). Se cambia «atemorizado para cruzar» por «tenía miedo de cruzar», que expresa con claridad e idiomaticidad el valor de δειλούμενον διαπερᾶσαι. Se mantiene «wadi» con nota, en continuidad con la decisión léxica inglesa.
