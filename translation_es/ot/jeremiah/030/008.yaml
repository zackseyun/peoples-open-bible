revisions:
- from: Y sucederá en aquel día[a], declara Yahvé de los Ejércitos, que romperé su yugo de sobre tu cuello, y arrancaré tus ataduras[b], y los extranjeros ya no lo someterán a esclavitud.
  to: Y sucederá en aquel día, declara Yahvé de los Ejércitos[b], que romperé su yugo de tu cuello, y arrancaré tus ataduras, y los extranjeros ya no lo harán su esclavo[a].
  rationale: 'La revisión corrige la correspondencia de notas con el audit trail, mejora la naturalidad de «de tu cuello», y refuerza la cláusula final con una formulación más cercana a la decisión inglesa documentada («make him their slave»). Se mantiene la terminología del proyecto: «Yahvé» y «de los Ejércitos».'
