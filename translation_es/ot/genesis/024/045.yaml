    text: 'Hebreo: «hablar a mi corazón», un modismo para el habla interior o la oración.'
    reason: lexical_alternative
  - marker: b
    text: O «fuente»; el término hebreo designa una surgencia de agua, no la palabra más usual para «pozo».
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [b] para que acompañe al término que realmente explica. Se sustituyó «la fuente» por «el manantial» para reflejar mejor עַיִן en español actual y mantener la distinción frente a «pozo». También se ajustó «Antes de terminar» a «Antes de que terminara» para expresar con más naturalidad la acción aún no concluida, y «salía» a «salió» para una narrativa más idiomática y vívida.
