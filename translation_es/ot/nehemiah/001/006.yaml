    text: El hebreo dice literalmente «los hijos de Israel», preservando una expresión filial de pacto; también puede entenderse como «el pueblo de Israel» o «los israelitas».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad en español sin cambiar el sentido: se reubicó «hoy» para una sintaxis más fluida y se añadió «Aun» para reflejar el énfasis de וַאֲנִי, en línea con el audit trail en inglés. Se conservan el lenguaje antropomórfico, «hijos de Israel», «siervo» y la nota léxica existente.'
