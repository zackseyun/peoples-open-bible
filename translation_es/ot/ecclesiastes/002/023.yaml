    text: 'O «su corazón no descansa». El hebreo dice literalmente: «su corazón no se recuesta», expresando inquietud interior que continúa durante la noche.'
    reason: lexical_alternative
  - marker: c
    text: O «vanidad» o «aliento». El hebreo הֶבֶל se traduce aquí como «vapor» para preservar la imagen recurrente del libro de lo fugaz e insustancial.
    reason: lexical_alternative
