translation:
  language: es
  text: '¿No fue Ezequías mismo quien quitó sus lugares altos y sus altares[a], y dijo a Judá y a Jerusalén: “Delante de un solo altar se postren, y sobre él quemen incienso”?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Delante de un solo altar adoren, y sobre él hagan subir ofrendas en humo”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue...
  alternatives_spanish:
  - ¿Acaso no fue...
  - ¿No era...
  lexicon: HALOT
  rationale: La pregunta retórica del hebreo espera acuerdo; en español, ‘¿No fue...?’ conserva el valor interrogativo y el marco pasado de la narración.
- source_word: הוּא יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah himself
  chosen_spanish: Ezequías mismo
  alternatives_spanish:
  - el mismo Ezequías
  - Ezequías en persona
  lexicon: HALOT
  rationale: El pronombre enfático se refleja naturalmente con ‘mismo’, manteniendo el énfasis sin sonar forzado.
- source_word: הֵסִיר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - eliminó
  - removió
  lexicon: HALOT
  rationale: En español, ‘quitó’ expresa de manera clara y directa la supresión de objetos/instalaciones cultuales; conserva el sentido de retirada sin sobrecargar el registro.
- source_word: בָּמֹתָיו
  english_pob_choice: his high places
  chosen_spanish: sus lugares altos
  alternatives_spanish:
  - sus altos
  - sus santuarios de altura
  lexicon: HALOT
  rationale: ‘Lugares altos’ es una forma transparente y fiel para בָּמוֹת en contexto cultual, más natural en español bíblico que una paráfrasis explicativa.
- source_word: מִזְבְּחֹתָיו
  english_pob_choice: his altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - los altares
  - sus aras
  lexicon: HALOT
  rationale: El sufijo posesivo se conserva como en el hebreo y en el inglés auditado, manteniendo la perspectiva polémica del hablante.
- source_word: וַיֹּאמֶר לִיהוּדָה וְלִירוּשָׁלִַם לֵאמֹר
  english_pob_choice: and said to Judah and Jerusalem, saying
  chosen_spanish: 'y dijo a Judá y a Jerusalén:'
  alternatives_spanish:
  - 'y habló a Judá y a Jerusalén:'
  - 'y les dijo a Judá y a Jerusalén:'
  lexicon: HALOT
  rationale: Se conserva la doble marca de discurso del hebreo con un estilo español fluido; se omite una repetición innecesaria de ‘diciendo’ porque en español sería redundante.
- source_word: לִפְנֵי מִזְבֵּחַ אֶחָד
  english_pob_choice: Before one altar
  chosen_spanish: Delante de un solo altar
  alternatives_spanish:
  - Ante un solo altar
  - Delante de un altar único
  lexicon: HALOT
  rationale: ‘Delante de’ reproduce el sentido básico de לִפְנֵי, y ‘un solo altar’ preserva el énfasis numérico y restrictivo del hebreo.
- source_word: תִּשְׁתַּחֲוּוּ
  english_pob_choice: you shall bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: HALOT
  rationale: El verbo denota prosternación física; ‘postrarse’ preserva mejor esa imagen que el más general ‘adorar’.
- source_word: וְעָלָיו תַּקְטִירוּ
  english_pob_choice: and on it you shall burn incense
  chosen_spanish: y sobre él quemarán incienso
  alternatives_spanish:
  - y sobre él harán subir humo
  - y en él ofrecerán incienso
  lexicon: HALOT
  rationale: ‘Quemar incienso’ es la forma idiomática más clara en español para קטר en este contexto cultual; se conserva la preposición ‘sobre él’ como en el hebreo.
theological_decisions:
- issue: Perspectiva del hablante en los posesivos de ‘lugares altos’ y ‘altares’
  english_pob_reading: Retain 'his high places' and 'his altars' in the main text as the Assyrian speaker's characterization
  chosen_spanish_reading: Mantener ‘sus lugares altos’ y ‘sus altares’ en el texto principal como caracterización del asirio
  alternative_spanish_readings:
  - los lugares altos y los altares
  - sus santuarios y sus altares
  rationale: El hebreo marca explícitamente la posesión; conservarla deja visible la voz y la intención polémica del hablante, sin suavizar la tensión narrativa entre la acusación asiria y la reforma de Ezequías.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en lugar de resolverla
- issue: Centralización cultual expresada en el mandato
  english_pob_reading: Render the command in terms of one altar without explaining or defending Hezekiah's reform in the main text
  chosen_spanish_reading: Traducir el mandato como referencia a un solo altar, sin explicar ni defender la reforma de Ezequías en el texto principal
  alternative_spanish_readings:
  - parafrasear como adoración exclusiva en el altar del templo
  - explicar que se trata del altar del templo
  rationale: El versículo reporta una acusación y no la explicación narrativa; mantener el lenguaje de ‘un solo altar’ conserva la tensión histórico-teológica del pasaje.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail inglés, manteniendo la omisión de la repetición redundante equivalente a 'to Jerusalem' en una formulación española natural, y se evitó introducir notas no ancladas en el texto.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento de nombres propios bíblicos en su forma española estándar: Ezequías, Judá, Jerusalén.'
  - Se evita ‘SEÑOR’ porque no aparece el Tetragrámaton en este versículo.
  - ‘Lugares altos’ conserva el término cultual tradicional sin reemplazarlo por una explicación interpretativa.
  - Se preserva la voz del hablante asirio con posesivos explícitos en ‘sus’ para reflejar el hebreo y la retórica del pasaje.
