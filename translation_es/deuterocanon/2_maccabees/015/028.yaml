  glossary_alignment: No hay términos teológicos sensibles aquí. «Armadura» para πανοπλίᾳ y «reconocieron» para ἐπέγνωσαν están bien. «Urgencia» es defendible para χρείας en contexto bélico, aunque «necesidad apremiante» sigue siendo alternativa válida que conviene conservar en nota.
