translation:
  language: es
  text: 'No sea que digan: «Hemos hallado sabiduría; Dios lo vencerá[a], no el hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo expulsará», «le responderá» o «lo subyugará». El verbo hebreo comúnmente significa «ahuyentar» o «hacer huir», pero aquí el sentido idiomático también puede referirse más ampliamente a derrotar o refutar a Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - Para que no
  - No vaya a ser que
  lexicon: HALOT
  rationale: Introduce con naturalidad una advertencia contra una posible afirmación; en español bíblico contemporáneo, «No sea que» expresa bien la idea precautoria de פֶּן sin sonar forzado.
- source_word: תֹּאמְרוּ
  english_pob_choice: you say
  chosen_spanish: digan
  alternatives_spanish:
  - digan ustedes
  - digáis
  lexicon: HALOT
  rationale: El plural masculino del hebreo en discurso directo se refleja de forma natural con «digan»; el contexto de advertencia futura queda claro sin añadir modales innecesarios.
- source_word: מָצָאנוּ
  english_pob_choice: we have found
  chosen_spanish: Hemos hallado
  alternatives_spanish:
  - Hemos encontrado
  - Encontramos
  lexicon: HALOT
  rationale: El perfecto hebreo comunica un hallazgo ya reclamado; «hemos hallado» conserva ese matiz y suena digno en español literario.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es la correspondencia directa y más estable del sustantivo en este contexto; no hay motivo para estrecharlo a «prudencia».
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo dice אֵל, el contexto contrapone a Dios con el hombre. En esta línea se mantiene el nombre divino del proyecto, Yahvé, para no enmascarar la referencia teológica.
- source_word: יִדְּפֶנּוּ
  english_pob_choice: will vanquish him
  chosen_spanish: lo vencerá
  alternatives_spanish:
  - lo abatirá
  - lo derrotará
  - lo echará
  lexicon: HALOT
  rationale: El verbo hebreo puede sugerir expulsar, refutar o vencer; el audit trail inglés revisó hacia una idea de triunfo decisivo. «Lo vencerá» preserva esa fuerza sin introducir una imagen demasiado específica que el español no exige.
- source_word: לֹא אִישׁ
  english_pob_choice: not man
  chosen_spanish: no el hombre
  alternatives_spanish:
  - no un hombre
  - no el ser humano
  lexicon: HALOT
  rationale: Se mantiene el contraste representativo del hebreo entre Dios y el ser humano. «No el hombre» conserva la forma breve y antitética del original, acorde con la política de precisión genérica.
theological_decisions:
- issue: Referencia divina de אֵל en un dicho contrastivo
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  rationale: El hebreo emplea אֵל, pero el sentido es inequívocamente divino. Conforme al criterio del proyecto, se usa Yahvé en el texto principal para evitar el ocultamiento del nombre divino, manteniendo la tensión entre el término hebreo general y la referencia concreta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Sentido de יִדְּפֶנּוּ en el contexto
  english_pob_reading: God will vanquish him, not man
  chosen_spanish_reading: lo vencerá, no el hombre
  alternative_spanish_readings:
  - lo expulsará, no el hombre
  - lo refutará, no el hombre
  - lo subyugará, no el hombre
  rationale: El audit trail inglés reconoce ambigüedad entre expulsar, responder, subyugar o vencer. El español principal opta por «vencerá» porque recoge la idea de derrota decisiva sin cerrar indebidamente la imagen verbal hebrea; las alternativas se conservan implícitamente en la decisión léxica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Contraste genérico con אִישׁ
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un hombre
  - un ser humano
  rationale: Se conserva el singular genérico del hebreo como contraste representativo con Dios. «El hombre» es idiomático en español y mantiene el paralelismo antitético sin perder el valor colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que desplazó la idea de «can drive him away» hacia una lectura más fuerte («will vanquish him»). Por eso el español principal evita una traducción demasiado suave como «lo echará» y adopta «lo vencerá», manteniendo abierto el rango semántico documentado en la nota.
  spanish_consistency_notes:
  - Se usa Yahvé conforme al estándar del proyecto para el nombre divino, aunque el hebreo base sea אֵל; esto se hace solo donde el contexto identifica inequívocamente a Dios.
  - Se preserva la antítesis entre Dios y el hombre con sintaxis breve y directa, adecuada para un proverbio/advertencia poética.
  - 'No se mecaniza desde el inglés: «No sea que» y «hemos hallado» responden tanto al hebreo como al estilo natural del español bíblico contemporáneo.'
