translation:
  language: es
  text: 7 Porque misericordioso es el que ustedes buscan, y bondadoso aquel en quien ustedes esperan; y veremos que guarda y no abandona.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܡܚܣܢܢܐ
  english_pob_choice: merciful / gracious
  chosen_spanish: misericordioso / bondadoso
  alternatives_spanish:
  - compasivo / gracioso
  - clemente / benigno
  lexicon: Payne Smith
  rationale: El paralelismo exige dos matices cercanos pero no idénticos. 'Misericordioso' conserva la carga de misericordia activa; 'bondadoso' evita un falso amigo literal de 'gracious' y suena natural en español sin debilitar la benevolencia divina.
- source_word: ܒܥܝܢ
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscáis
  - buscan a
  lexicon: Payne Smith
  rationale: El control revisado del inglés POB corrigió 'worship' a 'seek'. En español, 'buscan' expresa bien la dependencia y el anhelo dirigidos a Dios, sin introducir un matiz de culto que el verbo siríaco no exige aquí.
- source_word: ܡܣܒܪܝܢ
  english_pob_choice: hope
  chosen_spanish: esperan
  alternatives_spanish:
  - ponen su esperanza en
  - confían en
  lexicon: Payne Smith
  rationale: El verbo en este contexto tiene dirección futura y confianza activa. 'Esperan' mantiene la noción de esperanza confiada que el inglés POB conserva con 'hope', y encaja con el paralelismo de la línea.
- source_word: ܢܚܙܐ
  english_pob_choice: we shall see
  chosen_spanish: veremos
  alternatives_spanish:
  - hemos de ver
  - llegaremos a ver
  lexicon: Payne Smith
  rationale: La revisión del inglés POB mostró que el siríaco dice 'y veremos'. Mantengo la primera persona plural para conservar la participación del hablante con el pueblo, y traduzco de manera directa y natural.
- source_word: ܐܬܚܙܝܬ
  english_pob_choice: he preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - conserva
  lexicon: Payne Smith
  rationale: El contexto inmediatamente posterior explica que Dios no abandona. 'Preserva' comunica el cuidado continuo y encaja con la acción durativa implícita en el texto.
- source_word: ܠܐ ܢܥܙܒ
  english_pob_choice: not forsake
  chosen_spanish: no abandona
  alternatives_spanish:
  - no desampara
  - no deja
  lexicon: Payne Smith
  rationale: '''Abandona'' es el equivalente más claro y sobrio en español actual para el sentido de no dejar al pueblo a su suerte. ''Desampara'' es posible, pero ''abandona'' mantiene la simetría verbal con ''preserva''.'
theological_decisions:
- issue: Si la frase inicial debe expresar 'buscar' o 'adorar' a Dios.
  english_pob_reading: For merciful is he whom you seek
  chosen_spanish_reading: Porque misericordioso es el que ustedes buscan
  alternative_spanish_readings:
  - Porque misericordioso es el que ustedes adoran
  - Porque misericordioso es el que ustedes invocan
  rationale: La auditoría inglesa revisada ya corrigió 'worship' a 'seek' por razones textuales siríacas. Mantener 'buscan' evita introducir una lectura cultual no sostenida por el verbo y conserva el movimiento de dependencia del verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cómo reflejar la forma verbal final sin perder la perspectiva comunitaria.
  english_pob_reading: and we shall see that he preserves and does not forsake
  chosen_spanish_reading: y veremos que preserva y no abandona
  alternative_spanish_readings:
  - y es fiel para preservar y no abandonar
  - y preserva y no abandona
  rationale: La revisión de la POB señaló que el siríaco tiene una primera persona plural ('veremos'). La versión española la conserva para no borrar la inclusión del hablante con la comunidad. Además, la cláusula queda abierta como afirmación de confianza colectiva, no como una descripción abstracta de fidelidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que corrigió el verbo inicial de 'worship' a 'seek' y reconoció que el siríaco final dice 'y veremos', no una cláusula de 'faithful to preserve'. La traducción española conserva esas dos correcciones y evita reintroducir la lectura ya descartada.
  spanish_consistency_notes:
  - Se mantiene 'ustedes' para el destinatario plural, acorde con el discurso directo colectivo del pasaje.
  - Se preserva el paralelismo misericordioso/bondadoso sin convertirlo en una simple duplicación semántica.
  - La nota al pie se usa solo para la alternativa textual relevante del final del verso; no se añaden notas innecesarias.
