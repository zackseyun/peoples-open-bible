translation:
  language: es
  text: El hombre prudente[a] oculta el conocimiento, pero el corazón de los necios proclama la necedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El hombre astuto». El hebreo עָרוּם puede tener el sentido de «astuto» además de «prudente», y el verbo literalmente significa «cubre».
    reason: lexical_alternative
  - marker: b
    text: O «el corazón de los necios llama a la necedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: En este proverbio singular, אָדָם se refiere a un individuo representativo. «El hombre» conserva el valor genérico masculino singular que el inglés POB también mantuvo, sin volver la frase innecesariamente abstracta.
- source_word: עָרוּם
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - astuto
  - cauto
  lexicon: HALOT
  rationale: En Proverbios, עָרוּם suele expresar una sabiduría práctica positiva. «Prudente» mantiene ese sentido moral e intelectual; «astuto» podría sugerir ambigüedad ética que el contexto inmediato no exige.
- source_word: כֹּסֶה
  english_pob_choice: conceals
  chosen_spanish: oculta
  alternatives_spanish:
  - cubre
  - esconde
  lexicon: HALOT
  rationale: El participio comunica la acción de cubrir o reservar algo. «Oculta» transmite de modo natural el acto de no divulgar conocimiento, con menos ambigüedad física que «cubre».
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el saber
  - la comprensión
  lexicon: HALOT
  rationale: «Conocimiento» es la correspondencia directa y habitual para דָּעַת en lenguaje sapiencial. Mantiene el contraste con la necedad en la segunda cola.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  lexicon: HALOT
  rationale: En hebreo, לֵב alude al centro de la persona, incluyendo pensamiento y disposición. «Corazón» preserva esa imagen antropológica bíblica sin reducirla a mera emoción.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los torpes
  - los insensatos
  lexicon: HALOT
  rationale: «Necios» es un equivalente bíblico natural para la categoría sapiencial de כְּסִילִים. Conserva el registro proverbial mejor que alternativas más coloquiales.
- source_word: יִקְרָא
  english_pob_choice: proclaims
  chosen_spanish: proclama
  alternatives_spanish:
  - clama
  - anuncia
  - llama
  lexicon: HALOT
  rationale: Aunque el verbo puede significar literalmente «llamar» o «gritar», aquí la idea es hacer pública la necedad. «Proclama» reproduce bien esa fuerza comunicativa abierta.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: la necedad
  alternatives_spanish:
  - la locura
  - la insensatez
  lexicon: HALOT
  rationale: «Necedad» refleja el sustantivo sapiencial אִוֶּלֶת y armoniza con «necios». «Locura» en español puede sonar demasiado clínica o moderna; «insensatez» es válida, pero algo más abstracta.
translation_notes:
  revision_awareness: 'Se mantuvo alta concordancia con el audit trail en inglés: se conservó el paralelismo proverbial, la distinción entre prudencia y necedad, y el valor figurado de לֵב como «corazón». No se introdujeron cambios textuales respecto del sentido base; solo se ajustó la naturalidad del español y se preservaron alternativas léxicas documentadas.'
  spanish_consistency_notes:
  - Se usó «el hombre» para אָדָם conforme al singular representativo del proverbio.
  - Se prefirió «prudente» frente a «astuto» para evitar una lectura moralmente ambigua no exigida por el contexto.
  - Se mantuvo «corazón» para לֵב y «necios/necedad» para el campo sapiencial de כְּסִילִים/אִוֶּלֶת.
  - Se eligió «proclama» para יִקְרָא por su fuerza pública y proverbial en español.
  - La puntuación sigue la coordinación adversativa del hebreo con una coma antes de «pero».
