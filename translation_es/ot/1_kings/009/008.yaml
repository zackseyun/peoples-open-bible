    text: 'Hebrew: ''this house will be high/exalted.'' In context, many understand the sense to be that it will become a ruin or object of horror; compare 2 Chronicles 7:21.'
    reason: textual_variant
  - marker: b
    text: Or 'hiss.' The Hebrew verb refers to making a sharp sound in astonishment or derision.
    reason: lexical_alternative
