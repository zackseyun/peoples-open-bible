base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/034.yaml
  text: But Absalom fled[a]. And the young man who was watching lifted up his eyes and saw, and behold, many people were coming by the road behind him[c][b], from the side of the mountain.
  footnotes:
  - marker: a
    text: Or 'the watchman' for 'the young man who was watching'; the Hebrew combines 'young man/attendant' with a participle meaning 'watching' or 'keeping lookout.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'lifted up his eyes,' an idiom meaning he looked up.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the road behind him, from the mountainside.' The exact spatial relation in the Hebrew is somewhat compressed.
    reason: alternative_reading
