  at the end of the saying ([ⲉⲧ]ⲙⲛ̄[ⲧⲉⲣ]ⲟ); Dilley’s normalized lemmatization reads
  ⲉⲡⲙⲛⲧⲣⲣⲟ (''the Kingdom''). No Greek POxy overlap is known for Saying 22.'
