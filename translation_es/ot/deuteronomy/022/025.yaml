translation:
  language: es
  text: Pero si en el campo el hombre encuentra a la joven desposada, y el hombre la sujeta[a] y se acuesta con ella, entonces solo el hombre que se acostó con ella morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la domina” o “la fuerza”; el hebreo dice literalmente “la sujeta”, y el contexto legal deja claro que se trata de un acto no consensual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En contexto legal introduce un caso contrastante respecto del verso anterior; “Pero si” conserva ese matiz adversativo de manera natural en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo
  lexicon: HALOT
  rationale: שָׂדֶה significa “campo”; “en el campo” es fiel y natural. No se añade “abierto” porque el español no lo requiere para expresar la escena aislada.
- source_word: יִמְצָא
  english_pob_choice: finds
  chosen_spanish: encuentra
  alternatives_spanish:
  - halla
  - se encuentra con
  lexicon: HALOT
  rationale: El verbo מצא se rinde de forma directa con “encuentra”, que mantiene el tono narrativo-jurídico sin exceso de interpretación.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  lexicon: HALOT
  rationale: El artículo está presente en hebreo; “el hombre” refleja la forma definida y la especificidad del caso legal.
- source_word: הַנַּעַר
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la doncella
  lexicon: HALOT
  rationale: Aunque נער puede tener otros matices, aquí el contexto y la forma gramatical apuntan a una mujer joven; “la joven” es claro y sobrio en español.
- source_word: הַמְאֹרָשָׂה
  english_pob_choice: the betrothed young woman / who is betrothed
  chosen_spanish: desposada
  alternatives_spanish:
  - prometida
  - comprometida
  lexicon: HALOT
  rationale: ארשׂ denota un vínculo legal previo al matrimonio. “Desposada” preserva mejor esa fuerza jurídica que “comprometida”, que en español moderno suena demasiado débil o informal.
- source_word: וְהֶחֱזִיק בָּהּ
  english_pob_choice: seizes her
  chosen_spanish: la sujeta
  alternatives_spanish:
  - la agarra
  - la toma por la fuerza
  - la domina
  lexicon: HALOT
  rationale: חזק con ב expresa tomar con fuerza o sujetar. “La sujeta” conserva el gesto coercitivo sin añadir más contenido que el verbo hebreo por sí mismo.
- source_word: וְשָׁכַב עִמָּהּ
  english_pob_choice: lies with her
  chosen_spanish: se acuesta con ella
  alternatives_spanish:
  - duerme con ella
  - tiene relaciones con ella
  lexicon: HALOT
  rationale: Es un eufemismo hebreo estándar para relación sexual. “Se acuesta con ella” es una equivalencia digna y transparente en español.
- source_word: וּמֵת
  english_pob_choice: then only the man ... shall die
  chosen_spanish: entonces ... morirá
  alternatives_spanish:
  - y morirá
  - de modo que morirá
  lexicon: HALOT
  rationale: En este contexto legal, el perfecto/imperfectivo expresa consecuencia normativa. “Morirá” mantiene el registro judicial y la fuerza prescriptiva.
- source_word: לְבַדּוֹ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: 'Expresa exclusividad: la pena recae únicamente en el hombre, no en la mujer. “Solo” es claro y natural en español.'
theological_decisions:
- issue: Cómo reflejar la violencia implícita de וְהֶחֱזִיק בָּהּ sin sobreinterpretar el verbo
  english_pob_reading: Retain 'seizes her' in the main text and let the coercive legal context imply the assault, with a footnote preserving the stronger interpretive alternative.
  chosen_spanish_reading: Mantener “la sujeta” en el texto principal y señalar en nota que el contexto jurídico indica un acto coercitivo o violento, sin sustituir el verbo por una interpretación más fuerte en la línea principal.
  alternative_spanish_readings:
  - la fuerza
  - la viola
  - la domina
  rationale: El hebreo usa חזק, no un verbo técnico para violación. El contexto deja claro el carácter no consensual, pero la traducción principal debe seguir de cerca la forma verbal del מקור. La nota permite registrar la fuerza interpretativa sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó “in the open field” a “in the field” y reordenó la frase sobre la joven comprometida para mayor naturalidad. La línea española sigue esa revisión: usa “en el campo” sin añadir “abierto” y coloca “la joven desposada” de forma natural y precisa.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” fuera de este versículo porque no aparece el nombre divino.
  - “Desposada” preserva mejor la fuerza legal de ארשׂ que “comprometida”.
  - “La sujeta” conserva la tensión semántica de חזק sin expandirla a una explicación interpretativa en el cuerpo del texto.
  - “Solo” corresponde al valor exclusivizante de לְבַדּוֹ y evita ambigüedad.
  - La nota a[a] conserva la alternativa lexical y la implicación de coerción sin reemplazar el texto principal.
