id: 2TI.4.17
reference: 2 Timothy 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ κύριός μοι παρέστη καὶ ἐνεδυνάμωσέν με, ἵνα δι’ ἐμοῦ τὸ κήρυγμα πληροφορηθῇ καὶ ⸀ἀκούσωσιν πάντα τὰ ἔθνη, καὶ ἐρρύσθην ἐκ στόματος λέοντος.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/017.yaml
  text: But the Lord stood by me and strengthened me, so that through me the proclamation might be fully accomplished and all the Gentiles might hear, and I was rescued from the lion’s mouth.
translation:
  language: ko
  text: 그러나 주께서는 내 곁에 서 주시고 나에게 힘을 주셨습니다. 나를 통하여 선포가 온전히 이루어지고[a] 모든 이방인이 듣게 하시려는 것이었습니다. 그리고 나는 사자의 입에서[b] 건짐을 받았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 4:5의 「사역을 끝까지 다하다」(πληροφόρησον)와 같은 동사. 선포의 완성을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「사자의 입」은 죽음의 위협에서 건져 주심을 가리키는 비유적 표현으로, 문자적 사자가 아닐 가능성이 크다. 시편 22:21과 다니엘 6장의 그림자가 함께 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριός μοι παρέστη
  english_pob_choice: the Lord stood by me
  chosen_korean: 주께서는 내 곁에 서 주시고
  alternatives_korean:
  - 주께서 내 곁에 함께해 주시고
  - 주께서 내 곁에 서셨고
  lexicon: BDAG
  rationale: παρίστημι는 「곁에 섬·도움으로 함께함」. 4:16의 「아무도 내 곁에 서 주지 않음」과 대조를 살리기 위해 같은 어법 「곁에 서 주다」를 사용한다.
- source_word: ἐνεδυνάμωσέν με
  english_pob_choice: strengthened me
  chosen_korean: 나에게 힘을 주셨습니다
  alternatives_korean:
  - 나를 강건케 하셨습니다
  - 나에게 능력을 주셨습니다
  lexicon: BDAG
  rationale: 2:1의 「강건해지십시오」(ἐνδυναμοῦ)와 어휘적 호응. 본 절은 「힘을 주셨다」로 능동의 의미를 자연스럽게 담는다.
- source_word: τὸ κήρυγμα πληροφορηθῇ
  english_pob_choice: the proclamation might be fully accomplished
  chosen_korean: 선포가 온전히 이루어지고
  alternatives_korean:
  - 메시지가 충만히 선포되고
  - 전파가 완성되고
  lexicon: BDAG
  rationale: 4:5의 πληροφόρησον과 같은 동사. 「온전히 이루어지다」가 그 완성의 무게를 담는다. κήρυγμα는 1:11의 κῆρυξ와 같은 어근으로 「선포」.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the Gentiles
  chosen_korean: 모든 이방인
  alternatives_korean:
  - 모든 민족
  - 만국
  lexicon: BDAG
  rationale: ἔθνη는 신약에서 「이방 민족·이방인」을 주로 가리키며, 본 절의 바울 사역 회고에서는 한국 성서 전통의 「이방인」이 자연스럽다.
- source_word: ἐρρύσθην ἐκ στόματος λέοντος
  english_pob_choice: I was rescued from the lion's mouth
  chosen_korean: 사자의 입에서 건짐을 받았습니다
  alternatives_korean:
  - 사자의 입으로부터 구원받았습니다
  - 사자의 입에서 구해졌습니다
  lexicon: BDAG
  rationale: 3:11의 ῥύομαι(건지다)와 어휘 통일. 「사자의 입」 비유의 시각적 무게를 한국 성서 전통대로 보존한다.
