review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido principal del hebreo: revelación oída por el profeta, negación enfática de expiación por medio de la fórmula de juramento con אִם, y el límite temporal ''hasta que ustedes mueran''. También conserva adecuadamente ''iniquidad'' y el campo sacrificial de כפר con ''expiada''. Sin embargo, falla en un punto importante de terminología del proyecto y de la fórmula hebrea final: אֲדֹנָי יְהוִה צְבָאוֹת no debe quedar como ''el Señor Yahvé de los Ejércitos'', sino como ''el Señor Dios, Yahvé de los Ejércitos'' o equivalente, porque la pauta auditada en inglés distingue אֲדֹנָי + יְהוִה mediante ''Lord GOD'', y la política española del proyecto pide no enmascarar יהוה pero sí preservar la distinción.'
  spanish_quality_summary: 'El español es claro y digno. ''Ha revelado en mis oídos'' suena algo calcado, pero sigue siendo comprensible y defendible por su valor idiomático solemne. ''Ciertamente'' funciona bien para la negación enfática. La principal mejora necesaria es la secuencia divina final: ''Señor Yahvé'' suena menos natural en español y además no expresa bien la diferencia entre אֲדֹנָי y יְהוִה. También conviene ajustar la nota b para reflejar una alternativa española más adecuada.'
  glossary_alignment: 'Hay buena alineación con los términos base del proyecto en ''Yahvé'', ''iniquidad'' y ''expiada''. No obstante, la combinación אֲדֹנָי יְהוִה requiere una excepción controlada: en vez de ''Señor Yahvé'', conviene ''el Señor Dios, Yahvé...'' para mantener tanto el título reverencial como el nombre divino sin colapsarlos. ''Ejércitos'' está bien como equivalente transparente de צְבָאוֹת.'
  issues:
  - severity: high
    issue: Renderización de אֲדֹנָי יְהוִה como 'el Señor Yahvé'
    rationale: No preserva bien la distinción hebrea ni la decisión auditada en inglés ('the Lord GOD'). En español del proyecto, יהוה debe verse como 'Yahvé', pero aquí hace falta además reflejar אֲדֹנָי de forma natural; 'el Señor Dios, Yahvé de los Ejércitos' lo hace mejor que 'el Señor Yahvé'.
  - severity: medium
    issue: Nota b desalineada con la mejor solución española
    rationale: La nota actual ofrece 'el Señor Yahvé de las Huestes', pero esa formulación participa del mismo problema del texto principal. Debe ofrecer alternativas coherentes con la distinción entre título y nombre.
  revised_spanish_text: 'Yahvé de los Ejércitos ha revelado en mis oídos: «Ciertamente, esta iniquidad no será expiada[a] hasta que ustedes mueran», dice el Señor Dios, Yahvé de los Ejércitos[b].'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: la fórmula de juramento equivale literalmente a «si esta iniquidad será expiada para ustedes», un giro que aquí expresa negación enfática: «ciertamente no será expiada».'
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las Huestes»; también, para la cláusula completa, «el Señor Dios, Yahvé de las Huestes».
    reason: lexical_alternative
  revision_rationale: Se corrige la fórmula divina final para reflejar con más fidelidad y naturalidad la combinación אֲדֹנָי יְהוִה צְבָאוֹת, manteniendo a la vez la política del proyecto de traducir יהוה como 'Yahvé'. Se actualiza la nota correspondiente para que sus alternativas no repitan la formulación problemática.
