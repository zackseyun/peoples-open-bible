id: 3MA.5.47
reference: 3 Maccabees 5:47
source:
  edition: lxx-swete-1909
  text: ὁ δὲ ὀργῇ βαρείᾳ γεμίσας δυσσεβῆ φρένα, παντὶ τῷ βάρει σὺν τοῖς θηρίοις ἐξώρμησε, βουλόμενος ἀτρώτῳ καρδίᾳ καὶ κόραις ὀφθαλμῶν θεάσασθαι τὴν ἐπί- πονον καὶ ταλαίπωρον τῶν προσεσημαμμένων καταστροφήν.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: But he[a], filled with heavy wrath and impious in mind, rushed out with all his force along with the beasts[b], wanting with unfeeling heart and with the pupils of his eyes to look upon the painful and miserable destruction of those who had been marked out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an unfeeling heart.' The Greek literally says 'with an unpierced heart,' likely describing a heart untouched by pity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the pupils of his eyes,' an emphatic way of saying that he wanted to see it personally and directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργῇ βαρείᾳ γεμίσας
  chosen: filled with heavy wrath
  alternatives:
  - filled with grievous anger
  - filled with intense rage
  lexicon: LSJ
  rationale: βαρεῖα literally means 'heavy,' and paired with ὀργή it intensifies the anger. 'Heavy wrath' preserves the metaphor while remaining intelligible in English.
- source_word: δυσσεβῆ φρένα
  chosen: with impious intent
  alternatives:
  - with godless mind
  - with wicked thoughts
  lexicon: LSJ
  rationale: φρήν can denote mind, understanding, or disposition; δυσσεβής conveys impiety rather than mere moral evil. 'Impious intent' captures both the inward disposition and its religious character in idiomatic English.
- source_word: παντὶ τῷ βάρει
  chosen: with all his force
  alternatives:
  - with all the weight
  - with full force
  lexicon: LSJ
  rationale: The idiom here is not about literal weight alone but about the full mass or force of the movement. 'With all his force' best conveys the sense in context.
- source_word: σὺν τοῖς θηρίοις
  chosen: along with the beasts
  alternatives:
  - with the animals
  lexicon: LSJ
  rationale: θηρία in this context refers specifically to the dangerous animals prepared for execution, so 'beasts' preserves the menace better than the flatter 'animals.'
- source_word: ἐξώρμησε
  chosen: rushed out
  alternatives:
  - charged out
  - set out violently
  lexicon: LSJ
  rationale: The verb conveys a sudden, forceful movement outward. 'Rushed out' is natural English and preserves the urgency.
- source_word: ἀτρώτῳ καρδίᾳ
  lemma: ἀτρώτος
  chosen: with an unpierced heart
  alternatives:
  - with an unfeeling heart
  - with an untroubled heart
  - with an unhurt heart
  lexicon: LSJ
  rationale: ἀτρώτος literally means 'unwounded' or 'unpierced.' The phrase likely depicts a heart untouched by pity. The more literal 'unpierced heart' preserves the image, even if somewhat stark, and avoids over-interpreting as purely emotional numbness.
- source_word: καὶ κόραις ὀφθαλμῶν
  chosen: and with the pupils of his eyes
  alternatives:
  - with his own eyes
  - with the apples of his eyes
  lexicon: LSJ
  rationale: κόραι can mean the pupils of the eyes. The expression heightens vivid personal seeing. 'With the pupils of his eyes' is literal and preserves the intensity of direct visual witness.
- source_word: θεάσασθαι
  chosen: to look upon
  alternatives:
  - to behold
  - to watch
  lexicon: LSJ
  rationale: '''Look upon'' balances formal dignity with readability and fits the infinitive of purpose after βουλόμενος.'
- source_word: τὴν ἐπίπονον καὶ ταλαίπωρον ... καταστροφήν
  chosen: the painful and miserable destruction
  alternatives:
  - the grievous and wretched ruin
  - the agonizing and pitiable destruction
  lexicon: LSJ
  rationale: Both adjectives intensify the calamity. 'Painful and miserable destruction' keeps the double description without paraphrasing away the severity.
- source_word: τῶν προσεσημαμμένων
  chosen: of those who had been marked out
  alternatives:
  - of those who had been designated
  - of those who had been singled out
  lexicon: LSJ
  rationale: The perfect participle indicates persons previously marked or designated, likely for destruction. 'Marked out' preserves that prior official designation.
