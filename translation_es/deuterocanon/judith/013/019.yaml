revisions:
- from: Y bendito es Yahvé Dios[a], que creó los cielos y la tierra, que te dirigió para herir la cabeza del jefe de nuestros enemigos.
  to: Y bendito es Yahvé, Dios[a], que creó los cielos y la tierra, que te guió a herir la cabeza del gobernante de nuestros enemigos.
