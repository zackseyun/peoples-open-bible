theological_decisions:
- issue: Nature of δαιμόνιον in Tobit
  chosen_reading: a personal demon that harms Sarah's prospective husbands
  alternative_readings:
  - an evil spirit in a more generalized sense
  rationale: The narrative world of Tobit presents δαιμόνιον as a personal hostile spiritual being. The translation therefore uses 'demon' rather than a more diffuse expression.
  doctrine_reference: Original-language primacy over translation tradition; preserve the text's plain sense.
