translation:
  language: es
  text: Porque de cierto lo pondrás a muerte; tu mano será la primera contra él para darle muerte[a], y después la mano de todo el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciertamente lo matarás'. El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón o explicación de la orden anterior; en español, 'Porque' mantiene esa relación lógica de manera natural y sobria.
- source_word: הָרֹג תַּהַרְגֶנּוּ
  english_pob_choice: you must surely put him to death
  chosen_spanish: ciertamente lo matarás
  alternatives_spanish:
  - seguramente lo pondrás a muerte
  - de veras lo matarás
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. 'Ciertamente' conserva la fuerza enfática; 'lo matarás' mantiene el sentido básico del hebreo, aunque en un contexto jurídico puede entenderse como ejecución.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu propia mano
  - la mano de ti
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo y la paralelismo con la línea siguiente. En español, 'tu mano' suena natural y mantiene el valor idiomático.
- source_word: תִּהְיֶה בּוֹ בָרִאשׁוֹנָה
  english_pob_choice: shall be first against him
  chosen_spanish: será la primera sobre él
  alternatives_spanish:
  - estará primero contra él
  - será la primera en él
  lexicon: HALOT
  rationale: La expresión hebrea señala prioridad en la ejecución. 'La primera sobre él' conserva la metáfora de la mano y el orden judicial; añadí 'para darle muerte' para explicitar el propósito ya presente en el contexto inmediato.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to put him to death
  chosen_spanish: para darle muerte
  alternatives_spanish:
  - para matarlo
  - para ejecutarlo
  lexicon: HALOT
  rationale: La forma causativa de מות en un marco legal favorece una traducción formal. 'Darle muerte' mantiene la seriedad judicial sin suavizar el contenido.
- source_word: וְיַד כָּל הָעָם
  english_pob_choice: and afterward the hand of all the people
  chosen_spanish: y después la mano de todo el pueblo
  alternatives_spanish:
  - y luego la mano de todo el pueblo
  - y después todo el pueblo
  lexicon: HALOT
  rationale: Se preserva el paralelismo con 'tu mano'. Aunque en español puede sonar figurado, la imagen legal del hebreo queda intacta.
- source_word: בָּאַחֲרֹנָה
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - al final
  lexicon: HALOT
  rationale: '''Después'' reproduce la secuencia temporal con claridad y mantiene el contraste con ''la primera''.'
theological_decisions:
- issue: Lenguaje de ejecución judicial sin atenuación ni crudeza añadida
  english_pob_reading: put him to death
  chosen_spanish_reading: darle muerte / lo matarás
  alternative_spanish_readings:
  - ejecutarlo
  - quitarle la vida
  rationale: El versículo prescribe una pena capital en un marco legal del pacto. Se evita suavizar el texto, pero también se evita un giro excesivamente técnico que no está explícito en el hebreo. La redacción mantiene la fuerza judicial del original.
  doctrine_reference: 'Principio traductológico: equivalencia óptima; conservar el sentido llano del texto fuente sin paraphrasear.'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, que ya resolvió correctamente la fuerza enfática del infinitivo absoluto y el paralelismo 'tu mano / la mano de todo el pueblo'. No se introdujeron cambios textuales adicionales.
  spanish_consistency_notes:
  - Se conservó 'mano' literalmente para respetar la imaginería legal del hebreo.
  - '''Pueblo'' se mantuvo sin expansión a ''la gente'' para reflejar el término colectivo del original.'
  - La nota al pie marca la alternativa principal reconocida por el POB inglés y explica el énfasis verbal del hebreo.
