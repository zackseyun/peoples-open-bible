translation:
  language: es
  text: Y haré conocer mi santo nombre en medio de mi pueblo Israel, y no permitiré que mi santo nombre vuelva a ser profanado; y las naciones sabrán que yo soy Yahvé, el Santo en Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que yo soy el Señor, santo en Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - el nombre de mi santidad
  lexicon: HALOT
  rationale: La expresión hebrea es una construcción idiomática que en español se expresa de manera natural como «mi santo nombre». Mantiene la referencia al nombre revelado de Dios y a su santidad sin volverla una frase abstracta o extraña.
- source_word: אוֹדִיעַ
  english_pob_choice: I will make known
  chosen_spanish: haré conocer
  alternatives_spanish:
  - daré a conocer
  - me daré a conocer
  lexicon: HALOT
  rationale: El hiphil de ידע tiene fuerza causativa. «Haré conocer» conserva esa causación de manera clara y natural en español, sin perder el objeto directo «mi santo nombre».
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en medio
  lexicon: HALOT
  rationale: «En medio de» preserva la imagen espacial del hebreo y suena natural en español bíblico moderno.
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  - mi pueblo de Israel
  lexicon: HALOT
  rationale: La aposición hebrea identifica a Israel como el pueblo del pacto. «Mi pueblo Israel» mantiene la compactación del original; la coma es posible, pero no necesaria en español si se busca fluidez reverente.
- source_word: אַחֵל
  english_pob_choice: I will no longer let ... be profaned
  chosen_spanish: no permitiré que ... vuelva a ser profanado
  alternatives_spanish:
  - no profanaré ...
  - no permitiré que ... sea profanado
  lexicon: HALOT
  rationale: 'El verbo en hiphil puede leerse de forma activa o permisiva. Aquí se conserva la tensión del hebreo con una forma causativa-permisiva: Dios no vuelve a permitir la profanación de su nombre santo.'
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: vuelva a
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: Con la negación, עוֹד expresa cese de una acción previa. «Vuelva a» en la frase «no permitiré que... vuelva a ser profanado» comunica bien ese sentido de continuidad interrumpida.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel, el término designa a los pueblos/naciones en sentido amplio. «Las naciones» evita una carga confesional posterior que no está en el hebreo del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: קָדוֹשׁ בְּיִשְׂרָאֵל
  english_pob_choice: the Holy One in Israel
  chosen_spanish: el Santo en Israel
  alternatives_spanish:
  - santo en Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: La forma predicativa hebrea admite una lectura titulística. «El Santo en Israel» conserva la fuerza del inglés POB y evita borrar la ubicación relacional del enunciado. Se evita «el Santo de Israel» porque sugiere un giro más fijo/tradicional que el auditable aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se traslada como «Yahvé» para preservar el nombre revelado y no ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de וְלֹא אַחֵל אֶת שֵׁם קָדְשִׁי עוֹד
  english_pob_reading: I will no longer let my holy name be profaned
  chosen_spanish_reading: no permitiré que mi santo nombre vuelva a ser profanado
  alternative_spanish_readings:
  - no profanaré mi santo nombre
  - ya no profanaré mi santo nombre
  rationale: 'La forma hebrea puede leerse con fuerza activa, pero el contexto de vindicación del nombre favorece un valor permisivo/causativo: Dios promete no permitir que su nombre santo siga siendo tratado como común.'
  doctrine_reference: Ezequiel 39:7; tema bíblico de la santificación/vindicación del nombre de Yahvé
- issue: Lectura de קָדוֹשׁ בְּיִשְׂרָאֵל
  english_pob_reading: the Holy One in Israel
  chosen_spanish_reading: el Santo en Israel
  alternative_spanish_readings:
  - santo en Israel
  - el Santo de Israel
  rationale: La construcción hebrea final puede sentirse titular. «El Santo en Israel» preserva la relación locativa/reveladora y evita reescribirla como una fórmula teológica posterior sin base explícita en este versículo.
  doctrine_reference: 'Isaías/Ezequiel: fórmula de santidad divina en relación con Israel'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo de forma directa y coincide con la auditoría inglesa en los puntos clave: nombre divino, fuerza causativa de ידע, y sentido permisivo de חלל en hiphil. No se requieren revisiones adicionales respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «mi santo nombre» como calco idiomático natural del hebreo.
  - «Las naciones» refleja היטב el uso contextual de הַגּוֹיִם en Ezequiel.
  - La formulación «en medio de mi pueblo Israel» sigue de cerca la imagen espacial del original sin sonar forzada en español.
