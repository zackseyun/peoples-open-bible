    rationale: El hebreo puede dejar sobreentendido el verbo después de «y mi instrucción como la pupila de tu ojo», pero en español esa elipsis suena incompleta. «Y guarda mi instrucción como la pupila de tu ojo» o «y guárdala…» expresa con claridad el mandato implícito sin añadir contenido ajeno.
  - severity: low
