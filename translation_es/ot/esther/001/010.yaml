base_translation:
  language: en
  yaml_path: translation/ot/esther/001/010.yaml
  text: On the seventh day[a], when the king’s heart was merry with wine, he told Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar[b], and Karkas—the seven eunuchs who attended King Ahasuerus—
  footnotes:
  - marker: a
    text: Or 'when the king was in good spirits from wine.' The Hebrew idiom speaks of the king’s heart being glad because of wine, without explicitly stating drunkenness.
    reason: lexical_alternative
  - marker: b
    text: '''Eunuchs'' can in some contexts refer more broadly to royal court officials, but the more direct lexical sense is retained here.'
    reason: lexical_alternative
