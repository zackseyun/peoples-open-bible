translation:
  language: es
  text: Y en cuanto a ti[a], si andas delante de mí como anduvo tu padre David, y haces todo lo que te he mandado, y guardas mis estatutos y mis juicios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mis ordenanzas' para 'mis juicios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And as for you
  chosen_spanish: Y en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Ahora bien, tú
  lexicon: HALOT
  rationale: El hebreo presenta un pronombre frontal con valor enfático y de transición discursiva. 'En cuanto a ti' conserva ese énfasis y la focalización mejor que un simple 'y tú'.
- source_word: תֵּלֵךְ לְפָנַי
  english_pob_choice: you walk before me
  chosen_spanish: andas delante de mí
  alternatives_spanish:
  - caminas delante de mí
  - vives delante de mí
  lexicon: HALOT
  rationale: La imagen de 'andar/caminar delante' preserva el modismo de conducta de pacto. 'Andas' suena natural en español y mantiene la metáfora sin diluirla.
- source_word: כַּאֲשֶׁר הָלַךְ דָּוִיד אָבִיךָ
  english_pob_choice: as your father David walked
  chosen_spanish: como anduvo tu padre David
  alternatives_spanish:
  - como anduvo David tu padre
  - como vivió delante de mí tu padre David
  lexicon: HALOT
  rationale: Se conserva la repetición de la imagen de 'andar' para mantener coherencia con la primera cláusula. El orden 'tu padre David' es natural en español y fiel al sentido.
- source_word: וְלַעֲשׂוֹת כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: and do all that I have commanded you
  chosen_spanish: y haces todo lo que te he mandado
  alternatives_spanish:
  - y hacer todo lo que te he mandado
  - y haces conforme a todo lo que te he mandado
  lexicon: HALOT
  rationale: El infinitivo con waw expresa una acción concomitante dentro de la condición; en español, 'y haces' reproduce con fluidez la secuencia hebrea sin añadir una subordinación innecesaria. 'Todo' refleja el alcance de כְּכֹל.
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente jurídico-covenantal más estable para חֻקִּים y mantiene la distinción con el término siguiente.'
- source_word: וּמִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis ordenanzas
  - mis normas
  lexicon: HALOT
  rationale: '''Juicios'' conserva la fuerza judicial de מִשְׁפָּטִים y distingue este término de ''estatutos''. Se evita ''ordenanzas'' como opción más interpretativa, aunque sigue siendo viable.'
- source_word: תִּשְׁמֹר
  english_pob_choice: you keep
  chosen_spanish: guardas
  alternatives_spanish:
  - observas
  - cumples
  lexicon: HALOT
  rationale: '''Guardar'' reproduce bien el valor pactal de obedecer y observar preceptos. En español bíblico, ''guardas'' es claro y fiel, sin sonar arcaizante.'
theological_decisions:
- issue: Conservar la condicionalidad del pacto sin suavizarla
  english_pob_reading: if you walk before me ... and do all that I have commanded you, and keep my statutes and my judgments
  chosen_spanish_reading: si andas delante de mí ... y haces todo lo que te he mandado, y guardas mis estatutos y mis juicios
  alternative_spanish_readings:
  - si caminas delante de mí ...
  - si vives delante de mí ...
  rationale: El versículo formula una condición real de obediencia dentro del discurso de Yahvé a Salomón. La traducción debe preservar esa estructura y su tensión teológica sin diluirla en una mera exhortación general.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para conservar la secuencia hebrea: ''if you walk... and do... and keep...''. La redacción española sigue esa misma secuencia condicional y no introduce un segundo ''si''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en otros pasajes del proyecto, pero aquí el texto no contiene el nombre divino explícito; por eso se conserva la primera persona de Dios sin introducir sustituciones.
  - '''Juicios'' y ''estatutos'' se distinguen deliberadamente para reflejar מִשְׁפָּטַי y חֻקַּי.'
  - Se prefieren formas verbales naturales en presente ('andas', 'haces', 'guardas') para expresar la condición continua del hebreo sin perder literalidad.
