base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/007.yaml
  text: But if the scaly eruption indeed spreads on the skin after he has shown himself to the priest for his cleansing[c][b][a], then he shall appear before the priest a second time.
  footnotes:
  - marker: a
    text: Or 'the eruption,' 'the rash,' or traditionally 'the scab.' The Hebrew term refers to a superficial skin condition under examination.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew intensifies the verb: ''if the eruption surely/indeed spreads.'''
    reason: lexical_alternative
  - marker: c
    text: '''For his cleansing'' refers to the process or purpose of being examined with a view to being declared clean.'
    reason: cultural_note
