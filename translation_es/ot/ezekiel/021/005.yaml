    text: 'O: «Entonces dije: “¡Ah, Señor Yahvé! Ellos me dicen… ”»; el hebreo puede entenderse como lo que dicen acerca de Ezequiel o como lo que le dicen directamente.'
    reason: alternative_reading
  - marker: b
    text: Hebreo «mashal mashalim», literalmente, «uno que habla parábolas/proverbios»; la expresión también puede sugerir hablar en dichos figurados o enunciados enigmáticos.
    reason: lexical_alternative
