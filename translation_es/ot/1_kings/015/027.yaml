translation:
  language: es
  text: Entonces Baasá, hijo de Ahías, de la casa de Isacar, conspiró contra él, y Baasá lo hirió[a] en Gibetón, que pertenecía a los filisteos[b], mientras Nadab y todo Israel sitiaban Gibetón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo mató»; el hebreo literalmente dice «lo hirió» o «lo golpeó».
    reason: lexical_alternative
  - marker: b
    text: O «que estaba en poder de los filisteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  english_pob_choice: conspired against him
  chosen_spanish: conspiró contra él
  alternatives_spanish:
  - planeó contra él
  - formó una conspiración contra él
  lexicon: HALOT
  rationale: קשר con עַל expresa una acción de conspirar contra una persona; en español, «conspiró contra él» conserva el sentido político y narrativo sin debilitarlo a un simple plan privado.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  english_pob_choice: Baasha son of Ahijah
  chosen_spanish: Baasá, hijo de Ahías
  alternatives_spanish:
  - Baasá, hijo de Ahía
  lexicon: Convención onomástica bíblica
  rationale: Los nombres propios se transliteran según uso bíblico en español. «Hijo de» refleja fielmente בֶּן en un contexto genealógico.
- source_word: לְבֵית יִשָּׂשכָר
  english_pob_choice: of the house of Issachar
  chosen_spanish: de la casa de Isacar
  alternatives_spanish:
  - de la casa de Isáscar
  - perteneciente a la casa de Isacar
  lexicon: HALOT
  rationale: La expresión hebrea señala pertenencia tribal o de linaje. «Casa de Isacar» preserva ese valor familiar/tribal sin cargarlo con una formulación más interpretativa.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo mató
  lexicon: HALOT
  rationale: נכה puede significar golpear o herir. Como el contexto muestra que la agresión fue mortal, «lo hirió» conserva la imagen verbal sin cerrar prematuramente la lectura con «lo mató».
- source_word: בְּגִבְּת֖וֹן
  english_pob_choice: at Gibbethon
  chosen_spanish: en Guebaón
  alternatives_spanish:
  - en Gibetón
  - junto a Guebaón
  lexicon: Topónimo bíblico
  rationale: Se translitera el topónimo con una forma española estable y natural. «En» funciona bien para un episodio ocurrido en el lugar de la acción militar.
- source_word: אֲשֶׁר לַפְּלִשְׁתִּים
  english_pob_choice: which belonged to the Philistines
  chosen_spanish: que pertenecía a los filisteos
  alternatives_spanish:
  - que estaba en poder de los filisteos
  - que era de los filisteos
  lexicon: HALOT
  rationale: La construcción con ל indica posesión o control. «Pertenecía a» mantiene esa relación de manera directa y clara en español.
- source_word: וְנָדָב וְכָל יִשְׂרָאֵל
  english_pob_choice: while Nadab and all Israel
  chosen_spanish: mientras Nadab y todo Israel
  alternatives_spanish:
  - y Nadab y todo Israel
  - cuando Nadab y todo Israel
  lexicon: Sintaxis discursiva
  rationale: La conjunción inicial introduce un marco circunstancial. «Mientras» explicita el trasfondo temporal del ataque y hace fluido el relato en español.
- source_word: צָרִים עַל גִּבְּתֽוֹן
  english_pob_choice: were besieging Gibbethon
  chosen_spanish: sitiaban Guebaón
  alternatives_spanish:
  - asediaban Guebaón
  - estaban sitiando Guebaón
  lexicon: HALOT
  rationale: צור על en contexto militar significa «sitiar/asediar». «Sitiaban» es conciso y narrativo, y conserva el aspecto continuo del participio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el auditor en inglés: conserva la estructura narrativa, el valor de conspiración de קשר עַל, la referencia tribal de «casa de Isacar», el matiz verbal de נכה como «hirió» y el contexto militar de un sitio en curso. No se detectaron revisiones posteriores que exigieran ajustar el texto.'
  spanish_consistency_notes:
  - Se usó «Baasá» para el nombre propio con acento ortográfico español natural, manteniendo la transliteración bíblica reconocible.
  - Se empleó «sitiaban» para reflejar el aspecto durativo del participio hebreo.
  - Se optó por «que pertenecía a los filisteos» porque reproduce bien la relación de posesión/control del hebreo sin añadir explicaciones extrabíblicas.
  - No se introdujo vocabulario eclesiástico tradicional que desplazara el sentido militar o genealógico del pasaje.
