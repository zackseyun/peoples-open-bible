translation:
  language: es
  text: y a oídos de los nobles[a][b] y de los hijos de los reyes[c], y a oídos de los ancianos, y a oídos de todo el pueblo, desde el menor hasta el mayor, todos los que habitaban en Babilonia junto al río Sud[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'en los oídos de'; es un modismo que significa 'para que oyeran' o 'a oídos de'.
    reason: lexical_alternative
  - marker: b
    text: El griego también puede entenderse como 'los poderosos'; se eligió 'nobles' por el marco social del pasaje.
    reason: lexical_alternative
  - marker: c
    text: O 'los príncipes'. El griego más literalmente dice 'los hijos de los reyes'.
    reason: lexical_alternative
  - marker: d
    text: El nombre del río se translitera del griego; su identificación exacta es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ὠσίν
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a los oídos de
  - en el oído de
  lexicon: BDAG
  rationale: 'El griego es idiomático: literalmente dice ''en los oídos de'', es decir, en un anuncio hecho para ser escuchado. En español, ''en presencia de'' comunica la escena pública y la audición colectiva sin sonar forzado. La alternativa más literal se preserva en nota.'
- source_word: τῶν δυνατῶν
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los poderosos
  - los magnates
  lexicon: LSJ
  rationale: El término puede referirse a personas influyentes o prominentes. 'Nobles' conserva el matiz social y encaja con el conjunto 'hijos de los reyes' y 'ancianos'.
- source_word: υἱῶν τῶν βασιλέων
  english_pob_choice: the sons of kings
  chosen_spanish: los hijos de los reyes
  alternatives_spanish:
  - los príncipes
  - los hijos reales
  lexicon: LSJ
  rationale: Se mantiene la relación explícita del griego ('hijos de'). 'Príncipes' sería más interpretativo; 'hijos de los reyes' es más transparente al texto fuente.
- source_word: τῶν πρεσβυτέρων
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los mayores
  lexicon: BDAG
  rationale: En contextos comunitarios antiguos, el término denota líderes reconocidos, no solo personas de edad avanzada. 'Ancianos' es el equivalente natural y eclesialmente legible en español. No se optó por 'presbíteros' porque aquí el referente es comunitario amplio, no una función eclesiástica técnica.
- source_word: παντὸς τοῦ λαοῦ
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  lexicon: BDAG
  rationale: Traducción directa y natural del colectivo; conserva la amplitud del término griego.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  - desde el más humilde hasta el más encumbrado
  lexicon: LSJ
  rationale: La expresión es una merisma que abarca todo el rango social. 'Más pequeño / más grande' es claro en español y mantiene el paralelismo de escala sin restringirlo solo a edad.
- source_word: πάντων τῶν κατοικούντων
  english_pob_choice: all who were dwelling
  chosen_spanish: todos los que habitaban
  alternatives_spanish:
  - todos los que vivían
  - todos los habitantes
  lexicon: BDAG
  rationale: El participio presente describe a quienes estaban establecidos allí. 'Habitaban' conserva esa descripción continua y fluida en español.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en la ciudad de Babilonia
  lexicon: LSJ
  rationale: Nombre propio estándar.
- source_word: ἐπὶ ποταμοῦ Σούδ
  english_pob_choice: by the river Sud
  chosen_spanish: junto al río Sud
  alternatives_spanish:
  - a la orilla del río Sud
  - por el río Sud
  lexicon: LSJ
  rationale: La preposición con genitivo indica localización cercana o a lo largo del río. 'Junto al' suena natural y mantiene la ubicación sin sugerir exactamente 'sobre' el río. Se translitera 'Sud' porque la identificación exacta es incierta.
theological_decisions:
- issue: Alcance social de la lista de oyentes
  english_pob_reading: nobles, sons of kings, elders, and all the people, from the least to the greatest
  chosen_spanish_reading: nobles, hijos de los reyes, ancianos y todo el pueblo, desde el más pequeño hasta el más grande
  alternative_spanish_readings:
  - los poderosos
  - los príncipes
  - los mayores
  rationale: No hay una tesis doctrinal en juego, pero sí una tensión lexical sobre el nivel social exacto de algunos grupos. Se conserva la enumeración amplia y jerárquica sin suavizarla a categorías eclesiásticas posteriores.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'the sons of the kings' por 'the sons of kings' para acercarse más al griego y evitar una definitud innecesaria. La versión española sigue esa línea con 'los hijos de los reyes', sin introducir 'los príncipes' como título interpretativo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió 'en presencia de' para reflejar el modismo griego sin calco pesado.
  - '''Ancianos'' se usa en sentido comunitario, no meramente etario, en coherencia con la tradición de traducción del POB para πρεσβύτεροι.'
  - '''Babilonia'' se conserva como topónimo estándar; ''Sud'' permanece transliterado por incertidumbre geográfica.'
