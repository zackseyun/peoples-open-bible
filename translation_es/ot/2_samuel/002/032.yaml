    text: O «en la sepultura de su padre». El hebreo קֶבֶר puede referirse tanto a una tumba como a una sepultura o lugar de enterramiento familiar.
    reason: lexical_alternative
  - marker: b
    text: O «y el alba los alcanzó en Hebrón». El hebreo idiomático dice literalmente que «se hizo luz para ellos».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «caminaron» por «viajaron» para reflejar mejor el sentido amplio de הלך en contexto narrativo. Se sustituye la frase final por «les amaneció en Hebrón», que vierte naturalmente el modismo hebreo ויאר להם y coincide con la alternativa ya reconocida en la auditoría. También se corrige la nota [a] para que preserve una alternativa real al término principal.
