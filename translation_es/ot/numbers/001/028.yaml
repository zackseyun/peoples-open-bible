translation:
  language: es
  text: 'Para los hijos de Isacar[a], por sus generaciones, por sus clanes, por las casas de sus padres, por el número de nombres, de veinte años arriba, todo varón apto para salir a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que sale a la guerra». La expresión hebrea es literalmente «todo el que sale al ejército/ a la guerra» y aquí se refiere a los hombres con elegibilidad militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יִשָּׂשכָר
  english_pob_choice: For the sons of Issachar
  chosen_spanish: Para los hijos de Isacar
  alternatives_spanish:
  - Para los descendientes de Isacar
  - De los hijos de Isacar
  lexicon: HALOT
  rationale: En este encabezado censal, לְ introduce el grupo tribal. «Para» conserva la función formulística; «hijos» mantiene el valor genealógico y masculino del hebreo, que en este contexto señala a los miembros varones de la tribu.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus genealogías
  lexicon: HALOT
  rationale: La expresión señala divisiones de descendencia dentro de la fórmula del censo. «Por sus generaciones» conserva la estructura formal sin convertirla en un término técnico más específico de lo que exige el hebreo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  lexicon: HALOT
  rationale: En organización tribal, מִשְׁפָּחָה designa una subdivisión kinship más precisa que «familia». «Clan» comunica mejor esa unidad dentro de la tribu en español contemporáneo.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por los hogares de sus padres
  - por las casas paternas
  lexicon: HALOT
  rationale: Se preserva la imagen israelita de la casa patriarcal. «Casas de sus padres» es transparente y fiel al vínculo de linaje, sin suavizar la estructura social que expresa el hebreo.
- source_word: בְּמִסְפַּר שֵׁמֹת
  english_pob_choice: by the number of names
  chosen_spanish: por el número de nombres
  alternatives_spanish:
  - según el número de nombres
  - por la cuenta de nombres
  lexicon: HALOT
  rationale: La frase refleja el modo censal de contar personas por nombre. «Número de nombres» suena natural en español y conserva el idiomatismo hebreo.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años y arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - a partir de los veinte años
  lexicon: HALOT
  rationale: Es la fórmula estándar de umbral de edad. «Y arriba» mantiene la inclusividad del límite inferior con un giro natural en español bíblico contemporáneo.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man able to go out to war
  chosen_spanish: todo varón apto para salir a la guerra
  alternatives_spanish:
  - todo el que sale a la guerra
  - cada uno apto para salir a la guerra
  - todo varón que sale a la guerra
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «todo el que sale del ejército/para la guerra» y, en este contexto censal, se refiere a hombres militarmente elegibles. «Varón apto» conserva la referencia masculina y la idea de capacidad/eligibilidad sin forzar una paráfrasis excesiva.
theological_decisions:
- issue: Lenguaje censal masculino y elegibilidad militar
  english_pob_reading: every man able to go out to war
  chosen_spanish_reading: todo varón apto para salir a la guerra
  alternative_spanish_readings:
  - todo el que puede salir a la guerra
  - todos los aptos para servir en el ejército
  rationale: El hebreo del censo es gramatical y contextualmente masculino, y apunta a varones en edad militar. Se evita la neutralización para no borrar ese dato del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el registro inglés; el control cruzado indicó alta concordancia y sin cambios necesarios. La versión española sigue esa lectura estable, manteniendo la fórmula censal y la restricción masculina del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Hijos» se conserva por la fuerza genealógica y masculina del hebreo en un encabezado tribal/censal.
  - «Clan» y «casas de sus padres» mantienen la organización social israelita sin modernizarla en exceso.
