translation:
  language: es
  text: Benditos sean ustedes de parte de Yahvé[a], hacedor del cielo y de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La preposición hebrea puede indicar la fuente o el agente de la bendición; también podría entenderse 'por Yahvé' o 'de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los cielos y la tierra''. La expresión es un merismo para el conjunto de la creación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרוּכִים
  english_pob_choice: Blessed are you
  chosen_spanish: Benditos sean ustedes
  alternatives_spanish:
  - Sean benditos ustedes
  - Bienaventurados sean ustedes
  lexicon: HALOT
  rationale: El participio pasivo plural de ברך funciona aquí como fórmula de bendición. En español, una construcción copulativa con subjuntivo desiderativo transmite bien la fuerza benedictoria sin volverse rígida. 'Benditos' conserva el valor léxico de bendición; 'bienaventurados' sonaría más marcado y menos directo en este contexto.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: HALOT
  rationale: El hebreo está en segunda persona plural; 'ustedes' es la correspondencia natural y amplia para el español latinoamericano.
- source_word: לַ/יהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: En una fórmula de bendición, la preposición ל expresa la fuente o el agente de la bendición. 'Por Yahvé' comunica mejor en español que la bendición proviene de Yahvé y preserva el nombre divino en la forma de uso del proyecto.
- source_word: עֹשֵׂה
  english_pob_choice: Maker of
  chosen_spanish: Hacedor de
  alternatives_spanish:
  - Creador de
  - el que hizo
  lexicon: HALOT
  rationale: El participio qal usado sustantivamente funciona como título divino. 'Hacedor de' mantiene el valor titular y la concisión; 'Creador' sería comprensible, pero desplaza levemente el matiz de 'hacer' del verbo hebreo.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  - cielo
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español el par fijo 'cielo y tierra' es más natural y fiel al merismo bíblico. 'Los cielos' sería posible, pero en esta fórmula puede sonar más literal que idiomática.
- source_word: וָאָרֶץ
  english_pob_choice: and earth
  chosen_spanish: y de la tierra
  alternatives_spanish:
  - y la tierra
  - y el suelo
  lexicon: HALOT
  rationale: La segunda mitad completa el par merístico tradicional. El genitivo 'de la tierra' en español armoniza con 'Hacedor de' y conserva el sentido de origen/creación del conjunto 'cielo y tierra'.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, evitando el reemplazo por un título en mayúsculas. 'Yahvé' preserva la identidad del nombre del pacto y es coherente con el marco editorial dado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de la preposición ל en una fórmula de bendición
  english_pob_reading: by Yahweh
  chosen_spanish_reading: por Yahvé
  alternative_spanish_readings:
  - de Yahvé
  - desde Yahvé
  rationale: 'La lectura no es posesiva sino instrumental/agentiva en una bendición: la bendición procede de Yahvé. ''Por Yahvé'' mantiene esa tensión sin convertirla en una simple marca de posesión.'
  doctrine_reference: Hebrew ברך blessing-formula usage
- issue: Estructura nominal del predicado hebreo
  english_pob_reading: Blessed are you
  chosen_spanish_reading: Benditos sean ustedes
  alternative_spanish_readings:
  - Sean benditos ustedes
  - Benditos ustedes
  rationale: El hebreo es más nominal que verbal; en español conviene una forma copulativa que suene natural y conserve el carácter declarativo de la bendición. El subjuntivo desiderativo expresa bien la fórmula benedictoria sin añadir contenido no presente.
  doctrine_reference: Hebrew verbless clause / benediction formula
translation_notes:
  revision_awareness: El audit trail inglés pasó de una formulación exhortativa ('May you be blessed') a una más cercana al hebreo sin verbo ('Blessed are you'). La versión española sigue esa revisión con una construcción nominal-copulativa y evita añadir un verbo de petición que no está en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - Se conserva el merismo bíblico 'cielo y tierra' en español, con nota sobre la literalidad hebrea plural.
  - '''Hacedor'' refleja el participio sustantivado de עשה y evita reemplazarlo por un título más teológico que el hebreo no exige.'
