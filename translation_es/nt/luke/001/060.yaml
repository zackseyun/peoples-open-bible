lexical_decisions:
- source_word: ἀποκριθεῖσα
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι introduce el discurso directo con el sentido de 'responder/contestar'. En español, 'respondió' mantiene la naturalidad narrativa y la relación directa con la réplica, sin forzar una construcción participial.
- source_word: μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  lexicon: BDAG
  rationale: La posesión pronominal española reproduce con naturalidad la referencia definida del griego y evita una perífrasis pesada. 'Su madre' conserva la claridad del referente en el contexto inmediato.
- source_word: Οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Ciertamente no
  - De ningún modo
  lexicon: BDAG
  rationale: Οὐχί expresa una negación fuerte y correctiva en el diálogo. 'No' es la equivalencia más directa y natural en español, sin perder el rechazo tajante de la respuesta.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - pero
  - sino
  lexicon: BDAG
  rationale: Aquí ἀλλά corrige la suposición previa; 'más bien' conserva mejor el matiz de rectificación que un simple 'pero' y funciona con fluidez en español.
- source_word: κληθήσεται
  english_pob_choice: he shall be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - se le llamará
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se vierte de forma natural con 'será llamado', que preserva el sentido de nominación y la pasividad verbal. 'Se le llamará' es posible, pero menos cercano al verbo español correspondiente.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan
  lexicon: BDAG
  rationale: Nombre propio estándar en español, coherente con la transliteración tradicional del nombre bíblico y con el uso público e inteligible.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el griego de SBLGNT y el audit trail inglés de POB. Se conserva la fuerza correctiva de οὐχί/ἀλλά y la pasividad nominal de κληθήσεται, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se prefiere 'respondió' frente a una calca participial para mantener español natural sin perder el valor de réplica.
  - '''Más bien'' expresa la rectificación implícita en ἀλλά mejor que ''pero'' en este contexto.'
  - '''Será llamado'' conserva la voz pasiva y el acto de nombrar; la nota recoge la variante igualmente válida ''será llamado'' como alternativa estilística.'
