translation:
  language: es
  text: Abre tus ojos y mira que no son los muertos en el Hades[a], de quienes ha sido tomado el espíritu de sus entrañas, los que darán gloria y justicia al Señor[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de quienes el espíritu ha sido tomado de dentro de ellos».
    reason: lexical_alternative
  - marker: b
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνοιξον
  english_pob_choice: Open
  chosen_spanish: Abre
  alternatives_spanish:
  - Abre tu
  - Ábre
  lexicon: LSJ
  rationale: Imperativo aoristo de ἀνοίγω; en español, «Abre» expresa el mandato de forma natural y fiel.
- source_word: ὀφθαλμούς σου
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - los ojos tuyos
  - sus ojos
  lexicon: LSJ
  rationale: El plural del griego se conserva con «tus ojos», que suena natural en español y mantiene la referencia corporal concreta.
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  lexicon: LSJ
  rationale: Aunque el inglés opta por «see», en español «mira» funciona como imperativo directo y natural; conserva la fuerza exhortativa sin forzar un calco rígido.
- source_word: οὐχ οἱ τεθνηκότες
  english_pob_choice: it is not the dead
  chosen_spanish: no son los muertos
  alternatives_spanish:
  - no son los que han muerto
  - no son los difuntos
  lexicon: LSJ
  rationale: La construcción griega es contrastiva; en español, «no son los muertos» reproduce con claridad la negación enfática sin añadir contenido extra.
- source_word: ἐν τῷ ᾅδῃ
  english_pob_choice: in Hades
  chosen_spanish: en el Hades
  alternatives_spanish:
  - en el reino de los muertos
  - en el lugar de los muertos
  lexicon: LSJ
  rationale: Se conserva el término específico «Hades» para respetar la designación lexical del griego y evitar una interpretación más general como «sepulcro» o «infierno».
- source_word: ὧν ἐλήμφθη τὸ πνεῦμα αὐτῶν
  english_pob_choice: whose spirit has been taken
  chosen_spanish: de quienes el espíritu ha sido tomado
  alternatives_spanish:
  - de quienes la vida ha sido quitada
  - a quienes se les ha quitado el espíritu
  lexicon: LSJ
  rationale: Se mantiene «espíritu» para seguir la revisión auditada del inglés POB y no resolver la tensión entre aliento vital y espíritu personal; la pasiva «ha sido tomado» conserva el valor del perfecto pasivo.
- source_word: ἀπὸ τῶν σπλάγχνων αὐτῶν
  english_pob_choice: from their inward parts
  chosen_spanish: de sus entrañas
  alternatives_spanish:
  - de sus partes internas
  - desde dentro de ellos
  lexicon: LSJ
  rationale: «σπλάγχνα» designa literalmente las entrañas o partes internas; «entrañas» preserva la concreción física con buen ajuste al español bíblico y moderno.
- source_word: δώσουσιν
  english_pob_choice: will give
  chosen_spanish: darán
  alternatives_spanish:
  - habrán de dar
  - van a dar
  lexicon: LSJ
  rationale: Futuro simple natural para el verbo griego; mantiene la declaración prospectiva.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - alabanza
  lexicon: LSJ
  rationale: «Gloria» es el equivalente directo y conserva el registro bíblico del término.
- source_word: δικαίωμα
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - vindicación
  lexicon: LSJ
  rationale: Aunque el inglés POB eligió «righteousness» como lectura principal y «justice» como alternativa, en español «justicia» expresa mejor la pareja semántica con «gloria» y el reconocimiento del justo debido al Señor.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  - al Dueño
  lexicon: LSJ
  rationale: «κύριος» se traduce por «Señor» en el registro bíblico común; la contracción «al» es natural en español.
theological_decisions:
- issue: Sentido de πνεῦμα en contexto de muerte
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - vida
  rationale: 'Se conserva «espíritu» para seguir la revisión final del inglés POB y mantener la tensión interpretativa: el texto puede evocar el aliento vital retirado al morir, pero no se reduce de forma unilateral a «aliento».'
  doctrine_reference: Preservar la tensión léxica sin resolverla indebidamente.
- issue: Valor de δικαίωμα respecto de Dios
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - vindicación
  rationale: 'En este contexto, el término describe lo que corresponde atribuir a Dios: su justicia o justo derecho. «Justicia» es la opción más clara y natural en español, sin perder el peso moral del pasaje.'
  doctrine_reference: Consistencia terminológica con apertura a una alternativa documentada.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión auditada del inglés POB, que cambió la puntuación para reflejar ὅτι con «that» y sustituyó «breath» por «spirit». Se conservó la estructura contrastiva del griego, el término específico Hades y la imagen física de σπλάγχνα como «entrañas»; además, se mantuvo la ambigüedad teológica de πνεῦμα con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Señor» para τῷ κυρίῳ conforme al valor bíblico de κύριος.
  - Se conserva «Hades» sin sustituirlo por «sepulcro» o «infierno» para respetar el término fuente.
  - «Justicia» en el texto principal y «righteousness»/«justice» en la documentación mantienen la tensión lexical del original.
  - La sintaxis española intenta reproducir la cláusula negativa del griego sin sobrecargarla con giros arcaicos.
