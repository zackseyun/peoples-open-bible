translation:
  language: es
  text: Si la desgracia te sobrecoge[a], él se volverá contra ti y se ocultará de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «si eres humillado», en lugar de hebreo: «si la desgracia te sobrecoge».'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם / ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT; BDAG
  rationale: La condición es directa y general; «Si» conserva la estructura condicional del hebreo y del griego sin añadir matices temporales que el texto no exige.
- source_word: תַּשִּׂיגְךָ / ταπεινωθῇς
  english_pob_choice: overtakes you / if you are brought low
  chosen_spanish: la desgracia te sobrecoge
  alternatives_spanish:
  - el mal te alcanza
  - la aflicción te alcanza
  - si eres humillado
  lexicon: HALOT; BDAG
  rationale: El hebreo habla de un mal que alcanza o sobrecoge; el griego añade la posibilidad de «ser humillado / rebajado». «La desgracia te sobrecoge» integra el sentido de adversidad del hebreo con una formulación natural en español y deja visible en la nota la alternativa griega.
- source_word: רָעָה
  english_pob_choice: trouble
  chosen_spanish: desgracia
  alternatives_spanish:
  - mal
  - trouble
  - aflicción
  - infortunio
  lexicon: HALOT
  rationale: Aquí el término designa adversidad, no mal moral. «Desgracia» expresa bien una mala circunstancia que irrumpe y encaja con el comportamiento del falso amigo.
- source_word: יֵהָפֵךְ בְּךָ
  english_pob_choice: he will turn against you
  chosen_spanish: se volverá contra ti
  alternatives_spanish:
  - se volverá en tu contra
  - te dará la espalda
  - se te tornará contrario
  lexicon: HALOT
  rationale: El giro verbal comunica inversión de actitud respecto de la persona afectada; «se volverá contra ti» conserva esa hostilidad relacional de manera idiomática en español.
- source_word: וּמִפָּנֶיךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu presencia
  - delante de ti
  - de tu rostro
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una expresión más directa que «from your presence». En español, «de ti» refleja esa naturalidad y mantiene el valor relacional del hebreo sin sonar artificial.
- source_word: יִסָּתֵר
  english_pob_choice: hide himself
  chosen_spanish: se ocultará
  alternatives_spanish:
  - se esconderá
  - se retirará
  - se ocultará de ti
  lexicon: HALOT
  rationale: El verbo puede expresar ocultarse o retirarse. «Se ocultará» conserva el acto deliberado de evadir al necesitado y permite el complemento «de ti» para reproducir la relación del original.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego en la cláusula condicional
  english_pob_reading: Follow the extant Hebrew as primary for Sirach where it survives, while preserving the Greek alternative in a footnote.
  chosen_spanish_reading: 'Seguir el hebreo conservado como base principal, y señalar en nota la alternativa griega: «si eres humillado».'
  alternative_spanish_readings:
  - Si eres humillado, él se volverá contra ti y se ocultará de ti.
  - Si te abaten, él se volverá contra ti y se ocultará de ti.
  rationale: 'Sirácida presenta aquí una diferencia real entre testigos: el hebreo dice que la desgracia te alcanza, mientras que el griego dice que eres humillado. La traducción principal sigue el hebreo extante, pero no borra la variante griega, porque ambas forman parte del expediente textual.'
  doctrine_reference: 'PHILOSOPHY.md: primacía del testimonio hebreo donde existe; preservar la tensión textual sin resolverla silenciosamente.'
translation_notes:
  revision_awareness: La redacción inglesa revisada reemplazó «from your presence» por «from you» como formulación más natural. La versión española adopta esa misma naturalidad con «de ti», sin perder la relación personal del original. También se conserva la decisión de mantener la cláusula condicional del hebreo como lectura principal y de explicitar la alternativa griega en nota.
  spanish_consistency_notes:
  - Se usa «desgracia» para רָעָה porque el contexto es adversidad y no mal moral.
  - «Se volverá contra ti» conserva la fuerza relacional del hebreo y evita un calco torpe.
  - «Se ocultará de ti» mantiene la idea de retirada deliberada; el complemento reproduce la relación personal del original.
  - La nota al pie marca la lectura griega alternativa sin desplazar el texto principal.
