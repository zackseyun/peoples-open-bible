translation:
  language: es
  text: 'Sirvieron a los ídolos[a], acerca de los cuales Yahvé les había dicho: «No hagan esto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלֻּלִים es un término despectivo para los ídolos, con un matiz degradante como «ídolos inmundos» o «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  english_pob_choice: They served
  chosen_spanish: Sirvieron
  alternatives_spanish:
  - Adoraron
  - Dieron servicio
  lexicon: HALOT
  rationale: עבד puede expresar servicio cultual o adoración. «Sirvieron» conserva la relación lexical con el servicio rendido a una deidad y evita reducir el matiz a una sola equivalencia interpretativa.
- source_word: הַגִּלֻּלִים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos inmundos
  - los ídolos despreciables
  lexicon: HALOT
  rationale: El término hebreo es despectivo. En el texto principal, «ídolos» es natural y claro en español; el tono peyorativo queda señalado en nota para no sobrecargar la línea principal con una glosa interpretativa.
- source_word: אֲשֶׁר
  english_pob_choice: concerning which
  chosen_spanish: respecto de los cuales
  alternatives_spanish:
  - sobre los cuales
  - acerca de los cuales
  lexicon: HALOT
  rationale: La relativa introduce el asunto del mandato previo. «Respecto de los cuales» mantiene el registro formal y el vínculo lógico con el precepto de Yahvé sin sonar rígido en español.
- source_word: אָמַר יְהוָה לָהֶם
  english_pob_choice: the LORD had said to them
  chosen_spanish: Yahvé había dicho a ellos
  alternatives_spanish:
  - Yahvé les había dicho
  - Yahvé dijo a ellos
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé, conforme al criterio del proyecto. El pluscuamperfecto español refleja que la prohibición precede a la acción narrada.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: You shall not do
  chosen_spanish: No hagan
  alternatives_spanish:
  - No harán
  - No deben hacer
  lexicon: HALOT
  rationale: En español bíblico actual, una prohibición directa en segunda persona plural se expresa de modo natural con el imperativo negativo. Se mantiene la fuerza normativa del mandato sin calco excesivo.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta cosa/esta práctica
  lexicon: HALOT
  rationale: דָּבָר es aquí una referencia amplia al acto prohibido. «Esta cosa» reproduce el alcance indefinido y formal del hebreo; «práctica» explicaría más de lo que el texto dice.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El hebreo presenta el Tetragrámaton de forma explícita. Siguiendo la convención del POB en español, se usa Yahvé en el texto principal para preservar el nombre del pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción española sigue el consenso alto del audit trail inglés, pero adapta la relativa al español con una forma más natural («respecto de los cuales») y conserva en la nota el tono peyorativo de גִּלֻּלִים que el texto principal no expande.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה, en coherencia con el estándar del proyecto.
  - Se prefirió «Sirvieron» sobre «adoraron» para conservar la amplitud semántica de עבד en contexto cultual.
  - La prohibición se vertió con imperativo negativo plural («No hagan») por naturalidad del español bíblico actual.
  - La expresión final «esta cosa» refleja la concreción amplia de הַדָּבָר הַזֶּה sin añadir interpretación.
