revisions:
- from: Maldito[a] el que hace la obra de Yahvé negligentemente, y maldito el que retiene su espada de sangre.
  to: Maldito[a] el que hace la obra de Yahvé negligentemente, y maldito el que aparta su espada de la sangre.
  rationale: Se hace un ajuste menor para mejorar la fidelidad semántica y la naturalidad del español en la segunda cláusula. «Aparta su espada de la sangre» preserva mejor la imagen hebrea de retenerla de derramar sangre, sin suavizar la violencia judicial ni introducir una paráfrasis interpretativa mayor. La nota léxica sobre רְמִיָּה se mantiene intacta.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:26Z'
