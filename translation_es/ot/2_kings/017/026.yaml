base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/026.yaml
  text: So they spoke to the king of Assyria[a], saying, “The nations that you have exiled and settled in the cities of Samaria do not know the law of the god of the land, so he has sent lions among them; and behold, they are killing them[b], because they do not know the law of the god of the land.”
  footnotes:
  - marker: a
    text: Or “the God of the land.” The Hebrew can refer to Israel’s God, but the lowercase rendering in the main text preserves the reported pagan perspective of the speakers.
    reason: alternative_reading
  - marker: b
    text: “Custom” may also be rendered “law,” “requirement,” or “prescribed practice,” referring here to the expected manner of worship for the deity of the land.
    reason: lexical_alternative
