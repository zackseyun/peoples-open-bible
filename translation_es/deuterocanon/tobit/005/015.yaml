  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: pregunta directa sobre la paga, tarifa diaria en dracmas y provisión adicional. Sin embargo, «como también a mi hijo» no expresa con suficiente naturalidad y precisión comparativa ὡς καὶ τῷ υἱῷ μου, que indica trato igual al que Tobit daría a su propio hijo. Además, «Un dracma» debe corregirse a «Una dracma».'
  spanish_quality_summary: 'El texto es mayormente claro y legible, pero presenta dos detalles de calidad: el género de «dracma» en español estándar es femenino («una dracma»), y la comparación final suena forzada. «Igual que a mi hijo» o «como a mi propio hijo» sería más natural y fiel. El resto del verso fluye bien en español eclesial moderno.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. «Salario» es aceptable para μισθὸν, aunque «paga» o «jornal» también serían posibles. «Lo que necesites» corresponde bien a τὰ δέοντά σοι. La principal mejora léxica necesaria está en ὡς καὶ τῷ υἱῷ μου, que conviene expresar como comparación de trato equivalente.
  issues:
  - severity: medium
    issue: Uso de «Un dracma»
    rationale: En español, «dracma» es normalmente femenino; «una dracma» es la forma estándar y más cuidada.
  - severity: medium
    issue: «como también a mi hijo» suena poco natural y debilita la comparación
    rationale: El griego expresa que Tobit lo proveerá del mismo modo que a su hijo. «Como también a mi hijo» no suena idiomático en español y puede leerse como añadido coordinado más que como comparación clara.
  - severity: low
    issue: La rationale léxica rechaza «propio», pero el inglés auditado sí realza la comparación filial
    rationale: Aunque «propio» no sea estrictamente explícito en el griego, en español «mi hijo» ya basta. No hace falta insistir en evitar cualquier intensificación si eso perjudica la naturalidad.
