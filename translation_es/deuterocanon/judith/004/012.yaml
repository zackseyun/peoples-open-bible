translation:
  language: es
  text: Y todo varón de Israel[a], y las mujeres y los niños, los que habitaban en Jerusalén, cayeron sobre sus rostros delante del templo, y se echaron ceniza sobre sus cabezas, y extendieron sus vestiduras de saco[b] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los hombres de Israel». El griego usa una expresión distributiva con ἀνήρ, y el sentido exacto enfatiza a los varones; la formulación española mantiene esa precisión.
    reason: lexical_alternative
  - marker: b
    text: O «extendieron su ropa de luto». El griego es algo inusual, y la acción física exacta puede referirse a desplegar las vestiduras de saco o extenderse ante Dios vestidos de saco como señal de duelo y súplica.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ἀνὴρ Ἰσραήλ
  english_pob_choice: every man of Israel
  chosen_spanish: todo varón de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - todos los hombres de Israel
  lexicon: LSJ
  rationale: ἀνήρ señala aquí un varón masculino, no un colectivo genérico; la enumeración posterior de mujeres y niños confirma la distribución por grupos. «Todo varón de Israel» conserva esa precisión y el alcance distributivo de πᾶς.
- source_word: γυνή
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - la mujer
  lexicon: LSJ
  rationale: El contexto exige plural y no especifica estado civil; por eso «mujeres» reproduce el sentido sin añadir un matiz no presente en el griego.
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los niños pequeños
  - los pequeños
  lexicon: LSJ
  rationale: El término designa niños en general. «Los niños» mantiene la amplitud del referente y suena natural en español.
- source_word: οἱ κατοικοῦντες ἐν Ἰερουσαλήμ
  english_pob_choice: those dwelling in Jerusalem
  chosen_spanish: los que habitaban en Jerusalén
  alternatives_spanish:
  - los que vivían en Jerusalén
  - los habitantes de Jerusalén
  lexicon: LSJ
  rationale: El participio expresa una descripción de residencia. «Los que habitaban» conserva la forma participial con buen español y sin volverla demasiado estática.
- source_word: ἔπεσον κατὰ πρόσωπον
  english_pob_choice: fell on their faces
  chosen_spanish: cayeron rostro en tierra
  alternatives_spanish:
  - cayeron sobre sus rostros
  - se postraron
  lexicon: LSJ
  rationale: La expresión griega comunica postración física. «Cayeron rostro en tierra» es una equivalencia bíblica clara en español y conserva el gesto corporal sin perder naturalidad.
- source_word: τοῦ ναοῦ
  english_pob_choice: before the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - ante el templo
  - frente al templo
  lexicon: LSJ
  rationale: En coordinación con «cayeron rostro en tierra», el genitivo expresa la escena delante del templo. «Del templo» funciona aquí como complemento del marco locativo dado por el contexto; alternativas más explícitas se anotan en nota.
- source_word: ἐσποδώσαντο τὰς κεφαλὰς αὐτῶν
  english_pob_choice: put ashes on their heads
  chosen_spanish: se echaron ceniza sobre sus cabezas
  alternatives_spanish:
  - pusieron ceniza sobre sus cabezas
  - se cubrieron la cabeza con ceniza
  lexicon: LSJ
  rationale: El verbo expresa el gesto de colocarse ceniza como señal de luto y súplica. «Se echaron ceniza sobre sus cabezas» mantiene el carácter ritual y evita suavizar la acción.
- source_word: ἐξέτειναν τοὺς σάκκους αὐτῶν
  english_pob_choice: spread out their sackcloth
  chosen_spanish: extendieron sus sacos
  alternatives_spanish:
  - extendieron sus vestiduras de saco
  - tendieron sus sacos
  lexicon: LSJ
  rationale: El griego es algo inusual y admite más de una imagen física. «Sacos» reproduce el término de duelo de manera breve; «extendieron» conserva la acción de extender o desplegar, conforme al valor del verbo.
- source_word: κατὰ πρόσωπον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en la presencia del Señor
  lexicon: LSJ
  rationale: La fórmula es un modismo de presencia ante Dios. «Delante del Señor» corresponde de modo natural al español y evita ocultar el valor relacional del giro.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  lexicon: LSJ
  rationale: En este contexto bíblico judío, κύριος se refiere a Dios. «El Señor» conserva el uso reverente común en español sin sustituirlo por un título menos preciso.
theological_decisions:
- issue: Enumeración explícita de varones, mujeres y niños
  english_pob_reading: Retain the explicit sequence 'every man of Israel, and the women and the children' rather than collapsing to a collective.
  chosen_spanish_reading: 'Conservar la secuencia explícita: «todo varón de Israel, y las mujeres y los niños».'
  alternative_spanish_readings:
  - todos los israelitas
  - la comunidad de Israel
  rationale: El griego enumera grupos de manera deliberada; traducirlo como un colectivo borraría ese relieve retórico y la precisión social del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Uso de κύριος para la deidad de Israel
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: En este contexto de Judit, κύριος remite al Dios de Israel. La forma española «el Señor» refleja con fidelidad el uso reverente establecido en el proyecto sin introducir una transliteración que altere el registro del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
- issue: Postración como gesto de súplica
  english_pob_reading: fell on their faces before the temple
  chosen_spanish_reading: cayeron rostro en tierra delante del templo
  alternative_spanish_readings:
  - se postraron delante del templo
  - cayeron sobre sus rostros ante el templo
  rationale: La acción no es una caída cualquiera, sino una postura ritual de humillación y súplica. Mantenerla explícita en español preserva el peso devocional del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: Se revisó el ajuste entre el griego y la versión inglesa auditada, especialmente en la frase final sobre los sacos, donde el griego admite una imagen física algo ambigua. La redacción española conserva esa ambigüedad moderada sin decidir más de lo que el texto permite.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para κύριος en armonía con la terminología bíblica del proyecto.
  - Se prefirió «varón» para ἀνήρ por la fuerza masculina explícita del pasaje.
  - Se conservó el paralelismo entre varones, mujeres y niños sin fundirlo en un colectivo genérico.
  - «Rostro en tierra» se eligió para expresar la postración ritual con naturalidad bíblica en español.
