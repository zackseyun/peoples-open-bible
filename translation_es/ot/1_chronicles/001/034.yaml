translation:
  language: es
  text: 'Abraham engendró a Isaac[a]. Los hijos de Isaac: Esaú e Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Israel», es decir, Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - procreó
  lexicon: HALOT
  rationale: En una lista genealógica, el verbo hebreo indica generación de descendencia. «Engendró» conserva la fuerza genealógica y la concisión del original; «fue el padre de» es correcto pero más perifrástico, y «procreó» suena menos natural en este contexto.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente independiente en español. Su función queda absorbida por la sintaxis «engendró a Isaac».
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En una secuencia genealógica, «בְּנֵי» introduce la lista de descendientes. «Hijos» es el equivalente más natural y fiel en español; «descendientes» sería más explicativo que el hebreo aquí.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: Nombre propio hebreo
  rationale: Se conserva la transliteración española usual del nombre propio.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  - e Jacob
  lexicon: Nombre propio hebreo
  rationale: El texto hebreo dice «Israel», y la versión española debe reflejar esa forma sin armonizarla a «Jacob». Se usa «e» por eufonía ante vocal.
theological_decisions:
- issue: Nombre pactal «Israel» donde el referente histórico es Jacob
  english_pob_reading: Israel, preserving the Hebrew covenant name instead of harmonizing to Jacob
  chosen_spanish_reading: Israel, conservando el nombre del texto hebreo en vez de armonizarlo a Jacob
  alternative_spanish_readings:
  - Jacob
  rationale: 'La decisión no es doctrinal sino textual: el hebreo nombra a Israel, y la traducción debe mantener esa forma para no borrar la elección lexical del original. El lector entiende el referente por el contexto genealógico.'
  doctrine_reference: Principio de primacía del texto original; transliteración y conservación de nombres propios
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo con el audit trail inglés; no se detectan revisiones aplicadas y la forma española puede seguir de cerca la decisión inglesa de conservar «Israel» en lugar de armonizarla a «Jacob».
  spanish_consistency_notes:
  - Se mantiene el registro genealógico breve y sobrio.
  - Se evita «SEÑOR» o cualquier otro ajuste teológico no presente en el texto.
  - 'La puntuación reproduce la división natural del hebreo: una afirmación genealógica seguida de la lista de hijos.'
