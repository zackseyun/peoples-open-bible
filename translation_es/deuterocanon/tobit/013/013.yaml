review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: dos imperativos de gozo, el objeto de ese gozo en relación con los hijos de los justos, el futuro pasivo de reunión y la bendición al Señor de los justos. También preserva correctamente el genitivo relacional en «el Señor de los justos».'
  spanish_quality_summary: 'El español es claro y de buen registro bíblico, pero hay un problema formal importante: la nota [a] está anclada a «exulta» aunque en realidad comenta la intensificación del segundo imperativo, lo cual es aceptable, pero el texto carece del cierre de exclamación tras la primera exhortación; además, conviene cerrar la oración con puntuación completa. Más importante, la nota [a] es secundaria frente a la nota documentada por el English POB, que solo exige preservar la alternativa para «sons/children». Para alinear mejor con el rastro auditado y evitar sobreanotación innecesaria, conviene eliminar [a] y conservar solo la nota sobre «hijos».'
  glossary_alignment: 'La terminología principal está bien alineada: «justos» por δικαίων, «bendecirán» por εὐλογήσουσιν, y «Señor» por κύριον en este contexto. No aparece el nombre divino Yahvé en la fuente, así que «Señor» es apropiado. «Hijos» mantiene la referencia masculina de υἱοί, con alternativa de descendencia en nota, en conformidad con la filosofía del proyecto.'
  issues:
  - severity: medium
    issue: Sobreanotación no respaldada por el rastro inglés
    rationale: El English POB solo conserva nota para la alternativa de «sons/children». La nota española [a] sobre «exulta» no es incorrecta, pero añade aparato no necesario y desvía la atención del punto lexical principal documentado.
  - severity: low
    issue: Puntuación de apertura/cierre de exclamación mejorable
    rationale: «¡Alégrate y exulta...» abre con exclamación pero no la cierra; en español es más natural cerrar la secuencia exclamativa antes de continuar con la cláusula causal.
  revised_spanish_text: ¡Alégrate y exulta por los hijos[a] de los justos! Porque serán reunidos y bendecirán al Señor de los justos.
  revised_footnotes:
  - marker: a
    text: O «los descendientes de los justos». El griego dice «hijos», que puede referirse más ampliamente a la descendencia.
    reason: lexical_alternative
  revision_rationale: Se simplifica el aparato de notas para alinearlo con el audit trail inglés, conservando la alternativa significativa de υἱοί. También se mejora levemente la puntuación española sin alterar el sentido ni la estructura del original.
