translation:
  language: es
  text: 'Así que el cocinero tomó la pierna[a] y lo que estaba sobre ella[b], y la puso delante de Saúl. Y dijo: «Mira, lo que ha sido reservado[c] está puesto delante de ti. Come, porque ha sido reservado para ti para el tiempo señalado, cuando dije[d]: “He invitado al pueblo”». Así que Saúl comió con Samuel aquel día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el muslo»; el hebreo שׁוֹק se refiere a la porción de la pierna del animal.
    reason: lexical_alternative
  - marker: b
    text: O «y lo que iba con ella». El hebreo no identifica de manera explícita la porción acompañante.
    reason: lexical_alternative
  - marker: c
    text: O «lo que queda». El hebreo puede significar tanto lo que quedó como lo que fue apartado o reservado; el contexto favorece la idea de una porción apartada para Saúl.
    reason: alternative_reading
  - marker: d
    text: O «llamé al pueblo». En este contexto de comida, «invité» expresa mejor el sentido probable del verbo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטַּבָּח
  english_pob_choice: the cook
  chosen_spanish: el cocinero
  alternatives_spanish:
  - el carnicero
  lexicon: HALOT
  rationale: El sustantivo designa al encargado de preparar y servir la carne en el banquete. «Cocinero» comunica bien esa función en español actual y preserva el sentido contextual mejor que «carnicero», que suena menos natural para el acto de servir en esta escena.
- source_word: הַשּׁוֹק
  english_pob_choice: the leg
  chosen_spanish: la pierna
  alternatives_spanish:
  - el muslo
  - la pata
  lexicon: HALOT
  rationale: El hebreo se refiere a la porción de la extremidad del animal. «Pierna» es una equivalencia clara y amplia en español. Se evita «muslo» porque estrecha demasiado el corte y «pata» porque suena más coloquial o animalizante.
- source_word: וְהֶעָלֶיהָ
  english_pob_choice: and what was on it
  chosen_spanish: lo que estaba sobre ella
  alternatives_spanish:
  - y lo que había sobre ella
  - y lo que iba con ella
  lexicon: HALOT
  rationale: La frase hebrea no nombra explícitamente el acompañamiento; por eso se conserva la indeterminación. «Lo que estaba sobre ella» mantiene la referencia amplia y evita precisar más de lo que el texto dice.
- source_word: הַנִּשְׁאָר
  english_pob_choice: what has been kept
  chosen_spanish: lo que ha sido guardado
  alternatives_spanish:
  - lo que queda
  - la porción reservada
  lexicon: HALOT
  rationale: El participio puede significar «lo que queda» o «lo reservado/guardado». El contexto favorece la idea de una porción apartada para Saúl, por eso «ha sido guardado» conserva la tensión semántica entre resto y reserva especial.
- source_word: שִׂים לְפָנֶיךָ
  english_pob_choice: is set before you
  chosen_spanish: está puesto delante de ti
  alternatives_spanish:
  - colócalo delante de ti
  - se ha puesto delante de ti
  lexicon: HALOT
  rationale: La forma hebrea funciona de modo idiomático en la escena de la comida. En español, una construcción resultativa pasiva suena natural y refleja que la porción ya está dispuesta para comer.
- source_word: לַמּוֹעֵד
  english_pob_choice: for the appointed time
  chosen_spanish: para el tiempo señalado
  alternatives_spanish:
  - para la ocasión señalada
  - para el momento fijado
  lexicon: HALOT
  rationale: מוֹעֵד denota un tiempo u ocasión fijados de antemano. «Tiempo señalado» comunica bien esa idea sin llevar al lector a un sentido técnico de fiesta o calendario litúrgico.
- source_word: שָׁמוּר לְךָ
  english_pob_choice: it has been kept for you
  chosen_spanish: ha sido guardado para ti
  alternatives_spanish:
  - ha sido reservado para ti
  - se ha preservado para ti
  lexicon: HALOT
  rationale: El participio pasivo expresa que la porción fue apartada previamente. «Ha sido guardado» es idiomático y fiel; «reservado» también sería posible, pero puede sonar más administrativo que alimenticio en este contexto.
- source_word: לֵאמֹר הָעָם קָרָאתִי
  english_pob_choice: when I said, ‘I have invited the people’
  chosen_spanish: 'desde que dije: «He invitado a la gente»'
  alternatives_spanish:
  - 'cuando dije: «He invitado a la gente»'
  - 'al decir: «He invitado a la gente»'
  - 'porque dije: «He llamado a la gente»'
  lexicon: HALOT
  rationale: קרא puede significar «llamar» o «invitar». En una comida, «invitar» expresa mejor el sentido pragmático. «Desde que dije» reproduce de forma natural la relación temporal que el inglés POB revisó con «from when I said» y mantiene la referencia al momento en que se apartó la porción.
- source_word: עִם שְׁמוּאֵל
  english_pob_choice: with Samuel
  chosen_spanish: con Samuel
  alternatives_spanish:
  - en compañía de Samuel
  lexicon: HALOT
  rationale: La preposición indica compañía compartiendo la comida. «Con Samuel» es la forma más directa y natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con apoyo del rastro auditado en inglés: se conservó la porción indeterminada «lo que estaba sobre ella», se reflejó el matiz resultativo de שָׁמוּר con «ha sido guardado», y se adaptó la relación temporal de לֵאמֹר con una formulación española natural («desde que dije»), acorde con la revisión inglesa más reciente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «Saúl» y «Samuel» con la forma española estándar.
  - Se evitó una traducción excesivamente literal de la estructura verbal hebrea para conservar una lectura natural en español sin perder la reserva semántica del original.
