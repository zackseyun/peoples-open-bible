translation:
  language: es
  text: Cada una de estas ciudades tenía sus tierras de pastoreo[a] alrededor de ella; lo mismo sucedía con todas estas ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ciudad por ciudad y sus tierras de pastoreo alrededor de ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּהְיֶינָה
  english_pob_choice: were / had
  chosen_spanish: tenía
  alternatives_spanish:
  - eran
  - llegaron a ser
  - quedaban
  lexicon: HALOT
  rationale: El imperfecto qal de היה aquí resume un estado ya establecido en el relato. En español, el imperfecto de estado 'tenía' transmite bien la situación permanente o descriptiva sin forzar un cambio de sentido.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas villas
  - estas poblaciones
  lexicon: HALOT
  rationale: עִיר suele abarcar 'ciudad' y a veces 'población', pero en este contexto de asignación territorial 'ciudades' mantiene el tono formal y estándar del inglés POB y del hebreo.
- source_word: עִיר עִיר
  english_pob_choice: each
  chosen_spanish: cada una
  alternatives_spanish:
  - ciudad por ciudad
  - cada ciudad
  lexicon: HALOT
  rationale: La repetición distributiva literalmente dice 'ciudad, ciudad', es decir, individualmente. 'Cada una' conserva la fuerza distributiva de forma natural en español.
- source_word: וּמִגְרָשֶׁיהָ
  english_pob_choice: its surrounding pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pastoreo
  - sus terrenos abiertos
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a la ciudad, especialmente en textos de reparto levítico. 'Pastizales' comunica de manera clara la función de ese espacio; el contexto aclara que pertenece a la ciudad.
- source_word: סְבִיבֹתֶיהָ
  english_pob_choice: surrounding
  chosen_spanish: circundantes
  alternatives_spanish:
  - alrededores
  - que la rodeaban
  - alrededor de ella
  lexicon: HALOT
  rationale: El sufijo y el sustantivo indican lo que está alrededor de la ciudad. 'Circundantes' preserva el matiz adjetival del hebreo y evita una paráfrasis excesiva.
- source_word: כֵּן
  english_pob_choice: so it was
  chosen_spanish: así fue
  alternatives_spanish:
  - de este modo
  - así ocurrió
  - de igual manera
  lexicon: HALOT
  rationale: כֵּן introduce la conclusión general del patrón descrito. 'Así fue' conserva el carácter recapitulativo y narrativo de la frase.
- source_word: לְכָל הֶעָרִים הָאֵלֶּה
  english_pob_choice: for all these cities
  chosen_spanish: con todas estas ciudades
  alternatives_spanish:
  - para todas estas ciudades
  - en todas estas ciudades
  - para cada una de estas ciudades
  lexicon: HALOT
  rationale: La preposición לְ en este cierre funciona para generalizar el patrón 'para/con respecto a'. 'Con todas estas ciudades' refleja el resumen distributivo sin sonar forzado en español.
translation_notes:
  revision_awareness: 'El inglés POB revisó la estructura para hacerla más natural: de una formulación distributiva literal a ''Each of these cities had...''. La versión española sigue esa misma solución idiomática, manteniendo la relación entre cada ciudad y sus terrenos circundantes sin perder el paralelismo del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'ciudades' para הֶעָרִים, siguiendo el valor colectivo-formal del contexto de reparto.
  - '''Pastizales'' traduce מִגְרָשׁ con una opción clara y bíblicamente funcional; no se usó ''suburbios'' por su carga moderna.'
  - La nota al pie conserva la alternativa literal distributiva para dejar auditable la frase hebrea.
  - No se introdujeron términos confesionales; el versículo es descriptivo y de cierre resumido.
