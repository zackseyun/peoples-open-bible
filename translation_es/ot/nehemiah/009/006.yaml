translation:
  language: es
  text: Solo tú eres Yahvé. Tú hiciste los cielos, los cielos de los cielos[a] y toda su hueste; la tierra y todo lo que hay sobre ella, los mares y todo lo que hay en ellos; y tú mantienes con vida a todos ellos[b], y la hueste de los cielos se postra ante ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cielos de los cielos», un giro idiomático que significa «los cielos más altos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «das vida a todos ellos» / «los mantienes con vida».'
    reason: alternative_reading
  - marker: c
    text: 'O: «la hueste celestial se postra ante ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en lugar de sustituirlo por un título. En español, 'Yahvé' es la transliteración POB elegida por coherencia con el texto fuente y con la política de no enmascarar el nombre.
- source_word: אַתָּה הוּא ... לְבַדֶּךָ
  english_pob_choice: You alone are
  chosen_spanish: Tú solo eres
  alternatives_spanish:
  - Tú eres solo
  - Tú eres el único
  lexicon: HALOT
  rationale: La construcción enfática hebrea se refleja de forma natural con 'Tú solo eres', preservando la exclusividad atribuida a Yahvé sin calcar la sintaxis inglesa.
- source_word: עָשִׂיתָ
  english_pob_choice: made
  chosen_spanish: hiciste
  alternatives_spanish:
  - formaste
  - creaste
  lexicon: HALOT
  rationale: El verbo עשה aquí abarca la acción creadora de Dios; 'hiciste' es fiel al verbo hebreo sin imponer un término más específico que el original no usa.
- source_word: הַשָּׁמַיִם / שְׁמֵי הַשָּׁמַיִם
  english_pob_choice: the heavens / the highest heavens
  chosen_spanish: los cielos / los cielos de los cielos
  alternatives_spanish:
  - el cielo / el cielo de los cielos
  - los cielos supremos
  lexicon: HALOT
  rationale: Se mantiene el plural cosmológico 'los cielos' y la expresión superlativa literal 'los cielos de los cielos', porque el español la entiende bien y conserva la fuerza idiomática del hebreo.
- source_word: צְבָאָם
  english_pob_choice: their host
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - su hoste
  - su hueste
  - todo su host
  lexicon: HALOT
  rationale: En contexto celestial, צָבָא designa el conjunto del cielo creado; 'ejército' comunica el sentido colectivo con claridad en español, y el posesivo se refiere a los cielos mencionados inmediatamente antes.
- source_word: הָאָרֶץ וְכָל אֲשֶׁר עָלֶיהָ
  english_pob_choice: the earth and all that is on it
  chosen_spanish: la tierra y todo lo que hay sobre ella
  alternatives_spanish:
  - la tierra y todo lo que está en ella
  - la tierra y cuanto hay sobre ella
  lexicon: HALOT
  rationale: '''La tierra'' funciona de manera natural en español para el orden creado; ''sobre ella'' reproduce con claridad la preposición hebrea y evita una traducción demasiado técnica.'
- source_word: הַיַּמִּים וְכָל אֲשֶׁר בָּהֶם
  english_pob_choice: the seas and all that is in them
  chosen_spanish: los mares y todo lo que hay en ellos
  alternatives_spanish:
  - los mares y todo cuanto hay en ellos
  - los océanos y todo lo que hay en ellos
  lexicon: HALOT
  rationale: '''Mares'' es el equivalente natural de יַמִּים en este catálogo creador. ''En ellos'' conserva el referente plural sin cambiar el alcance del original.'
- source_word: מְחַיֶּה
  english_pob_choice: preserve all of them alive
  chosen_spanish: mantienes con vida a todos
  alternatives_spanish:
  - das vida a todos
  - los conservas con vida a todos
  - mantienes vivos a todos
  lexicon: HALOT
  rationale: El participio piel puede expresar dar vida o mantener con vida. Se eligió 'mantienes con vida' para reflejar el sentido de sostenimiento providencial que la POB inglesa destaca, sin cerrar la posibilidad de que también implique vivificación.
- source_word: אֶת כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a cada uno de ellos
  lexicon: HALOT
  rationale: El objeto explícito totalizante se expresa de manera breve en español con 'a todos', conservando la universalidad del enunciado sin sobrecargar la frase.
- source_word: וּצְבָא הַשָּׁמַיִם
  english_pob_choice: the host of heaven
  chosen_spanish: el ejército de los cielos
  alternatives_spanish:
  - la hueste de los cielos
  - el host de los cielos
  lexicon: HALOT
  rationale: Se mantiene la imagen colectiva celeste con un sustantivo comprensible y bíblicamente reconocible en español. 'Ejército de los cielos' preserva la amplitud semántica de צְבָא sin reducirla a estrellas o ángeles solamente.
- source_word: לְךָ מִשְׁתַּחֲוִים
  english_pob_choice: bows down to you
  chosen_spanish: se postra ante ti
  alternatives_spanish:
  - te adora
  - se inclina ante ti
  lexicon: HALOT
  rationale: El verbo implica prosternación física antes que una abstracción devocional. 'Se postra ante ti' mantiene la imagen corporal y deja explícito el acto reverente.
theological_decisions:
- issue: Exclusividad de Yahvé como único Dios y Creador
  english_pob_reading: You alone are Yahweh
  chosen_spanish_reading: Tú solo eres Yahvé
  alternative_spanish_readings:
  - Tú eres Yahvé solo
  - Tú eres el único Yahvé
  rationale: La estructura española conserva la énfasis de exclusividad del hebreo sin convertirla en una formulación doctrinal ajena al versículo. Se evita reemplazar el nombre divino por un título genérico.
  doctrine_reference: 'DOCTRINE.md: preservar el nombre divino y la fuerza enfática del texto fuente'
- issue: 'Sentido de מְחַיֶּה: dar vida o mantener con vida'
  english_pob_reading: and you preserve all of them alive
  chosen_spanish_reading: y tú mantienes con vida a todos
  alternative_spanish_readings:
  - y tú das vida a todos
  - y tú los mantienes vivos a todos
  rationale: Se preserva la tensión entre acción vivificadora y sustentadora. 'Mantienes con vida' comunica la continuidad de la acción divina en el orden creado, sin excluir el matiz de conceder vida.
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica; equivalencia óptima'
translation_notes:
  revision_awareness: El texto se revisó a la luz del audit trail inglés y del hebreo WLC. Se mantuvo la estructura de catálogo creador y la tensión de מְחַיֶּה entre dar vida y sostener con vida; no se introdujeron cambios doctrinales ni se normalizó el nombre divino a una sustitución tradicional.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה, conforme a la política del proyecto.
  - 'Se conservaron los paralelismos del listado cósmico: cielos, tierra, mares y el ejército celeste.'
  - La frase final usa 'se postra' para reflejar el verbo hebreo de prosternación y evitar una abstracción excesiva.
  - Las notas a pie de página marcan alternativas reales ya presentes en el audit trail y una aclaración idiomática del hebreo superlativo.
