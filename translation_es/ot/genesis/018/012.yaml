translation:
  language: es
  text: 'Entonces Sara se rió para sí[a], diciendo: «Después de estar gastada, ¿tendré placer, mientras mi señor ya es anciano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deleite», posiblemente con el sentido de placer sexual renovado o vigor juvenil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְחַק
  english_pob_choice: laughed
  chosen_spanish: se rio
  alternatives_spanish:
  - se rió
  - se burló
  lexicon: HALOT
  rationale: צחק en qal normalmente significa “reír”. El contexto muestra una reacción interior de Sara ante la promesa, no una burla abierta; por eso “se rio” comunica el acto con naturalidad en español.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: to herself
  chosen_spanish: para sí
  alternatives_spanish:
  - en su interior
  - dentro de sí
  lexicon: HALOT
  rationale: La idea literal es “dentro de ella”. En español, “para sí” expresa bien una risa o habla interior sin perder el sentido de interioridad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - pensando
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce la frase citada. “Diciendo” mantiene el valor formal y funciona bien en español con la expresión de interioridad ya dada por “para sí”.
- source_word: אַחֲרֵי בְלֹתִי
  english_pob_choice: After I am worn out
  chosen_spanish: Después de haber envejecido
  alternatives_spanish:
  - Después de estar gastada
  - Después de estar agotada
  lexicon: HALOT
  rationale: בּלה transmite la idea de desgaste o consumición. En español, “haber envejecido” comunica la condición corporal avanzada de modo claro y digno, aunque “gastada” o “agotada” serían más literales pero menos naturales.
- source_word: הָיְתָה לִּי עֶדְנָה
  english_pob_choice: shall I have pleasure
  chosen_spanish: ¿tendré placer?
  alternatives_spanish:
  - ¿tendré deleite?
  - ¿tendré gozo?
  lexicon: HALOT
  rationale: עֶדְנָה es raro y puede implicar placer, deleite o vigor renovado. “Placer” conserva la amplitud semántica y deja abierta la posible resonancia sexual o vital sin explicitarla de más.
- source_word: וַאדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: HALOT
  rationale: Con sufijo de primera persona, se refiere al trato respetuoso de Sara hacia Abraham, no a un título divino. “Mi señor” es la forma natural y fiel en español.
- source_word: זָקֵן
  english_pob_choice: is old
  chosen_spanish: es viejo
  alternatives_spanish:
  - está viejo
  - ha envejecido
  lexicon: HALOT
  rationale: El predicado expresa edad avanzada en forma directa. “Es viejo” es breve y transparente en español, aunque “ha envejecido” podría sonar más suave.
theological_decisions:
- issue: Alcance de עֶדְנָה (placer/delicia/vigor)
  english_pob_reading: 'A restrained rendering that leaves the term broad: ''shall I have pleasure'''
  chosen_spanish_reading: 'Una traducción contenida: «¿tendré placer?»'
  alternative_spanish_readings:
  - ¿tendré deleite?
  - ¿volveré a tener vigor juvenil?
  rationale: El hebreo probablemente incluye matices corporales y conyugales, pero el texto no los define de manera estrecha. La redacción principal mantiene la amplitud y deja las otras posibilidades como alternativas interpretativas, preservando la tensión del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de ‘and my lord is old’ a ‘while my lord is old’ para reflejar mejor el contraste contextual. En español, se mantuvo ese contraste con «mientras» y se conservó la ambigüedad de עֶדְנָה mediante «placer» y la nota alternativa.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según las normas del proyecto, pero este versículo no contiene ninguno de esos términos.
  - Se evitó «Cristo», «SEÑOR» y otras formas de sustitución no pertinentes al versículo.
  - «Mi señor» conserva el valor relacional de אדני sin mayúsculas de título divino.
  - La nota a conserva la alternativa semántica relevante sin sobreinterpretar el término raro עֶדְנָה.
