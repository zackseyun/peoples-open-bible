translation:
  language: es
  text: Él te envolverá[a] con fuerza, como una pelota, a una tierra espaciosa[b]. Allí morirás, y allí estarán los carros de tu gloria[c], ¡oh vergüenza de la casa de tu señor!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te enrollará con fuerza» / «te hará rodar con fuerza». El hebreo usa una forma intensificada del mismo radical con un sustantivo cognado para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: Lit. «a una tierra ancha de manos», un modismo hebreo para una tierra amplia o espaciosa.
    reason: cultural_note
  - marker: c
    text: O «los carros gloriosos» / «los carros que fueron tu gloria». El hebreo puede referirse a los carros en los que él se gloriaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָנוֹף יִצְנָפְךָ צְנֵפָה
  english_pob_choice: He will surely wrap you up tightly
  chosen_spanish: Él te envolverá con fuerza
  alternatives_spanish:
  - Él te envolverá estrechamente
  - Él te enrollará con fuerza
  - Él te arrollará con fuerza
  lexicon: HALOT
  rationale: El hebreo combina infinitivo absoluto e imperfecto del mismo radical para intensificar la acción. «Envolverá con fuerza» preserva esa intensificación de manera natural en español sin fijar demasiado si la imagen es de envolver, enrollar o arrollar.
- source_word: כַּדּוּר
  english_pob_choice: like a ball
  chosen_spanish: como una pelota
  alternatives_spanish:
  - como una bola
  - como una esfera
  lexicon: HALOT
  rationale: El símil exige una imagen concreta y natural en español. «Pelota» comunica bien la forma redondeada y la idea de ser compactado/enrollado; «bola» sería una alternativa igualmente válida, pero algo menos idiomática en este contexto.
- source_word: אֶל אֶרֶץ רַחֲבַת יָדָיִם
  english_pob_choice: into a broad land
  chosen_spanish: hacia una tierra ancha
  alternatives_spanish:
  - hacia una tierra espaciosa
  - a una tierra ancha
  - a una tierra espaciosa de gran amplitud
  lexicon: HALOT
  rationale: El hebreo literal dice «a una tierra ancha de manos», un modismo para amplitud o espacioso. «Tierra ancha» conserva la imagen y evita explicar demasiado el modismo en el texto principal.
- source_word: שָׁמָּה
  english_pob_choice: There
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» reproduce con naturalidad la repetición enfática del adverbio hebreo y mantiene la estructura paralela del verso.
- source_word: תָמוּת
  english_pob_choice: you will die
  chosen_spanish: morirás
  alternatives_spanish:
  - tú morirás
  - vas a morir
  lexicon: HALOT
  rationale: El futuro simple es el registro más natural para la amenaza profética y conserva la confrontación directa del original.
- source_word: מַרְכְּב֣וֹת כְּבוֹדֶ֔/ךָ
  english_pob_choice: the chariots of your glory
  chosen_spanish: los carros de tu gloria
  alternatives_spanish:
  - los carros gloriosos
  - los carros que fueron tu gloria
  - los carros de tu esplendor
  lexicon: HALOT
  rationale: '«Carros» traduce de manera más directa מַרְכְּבוֹת que «carros de combate» o «carrozas». La construcción «de tu gloria» conserva la ambigüedad del hebreo: puede aludir a los carros en los que se gloriaba o a los carros que constituían su orgullo.'
- source_word: בֵּית אֲדֹנֶיךָ
  english_pob_choice: your master's house
  chosen_spanish: la casa de tu señor
  alternatives_spanish:
  - la casa de tu amo
  - la casa de tu superior
  - la casa de tu maestro
  lexicon: HALOT
  rationale: אֲדֹן aquí se refiere a un superior humano, no a un título divino. «Señor» es una opción española natural y respetuosa en este contexto; «amo» sería más literal, pero más áspero en el registro general del verso.
theological_decisions:
- issue: Tono de juicio profético y vocativo final
  english_pob_reading: O shame of your master's house
  chosen_spanish_reading: ¡oh vergüenza de la casa de tu señor!
  alternative_spanish_readings:
  - vergüenza de la casa de tu señor
  - ¡oh deshonra de la casa de tu señor!
  - ¡oh oprobio de la casa de tu señor!
  rationale: El hebreo funciona como un reproche vocativo. «¡Oh vergüenza!» mantiene el tono de invectiva profética y no suaviza la condena. «Deshonra» u «oprobio» serían posibles, pero «vergüenza» es más directo y transparente para el lector español.
  doctrine_reference: Profecía de juicio; no hay decisión doctrinal controvertida, sino preservación del tono oracular.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «and throw you», porque el hebreo enfatiza el envolvimiento/arrollamiento compacto más que añadir un verbo separado de lanzamiento. La redacción española sigue esa revisión y evita introducir «arrojar» como acción independiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del verso porque el texto hebreo no contiene el nombre divino en esta línea.
  - Se tradujo אֲדֹן como «señor» en sentido humano, no como título divino.
  - Se preservó la repetición de «allí... y allí...» para reflejar el paralelo retórico del hebreo.
  - El orden general sigue de cerca el hebreo y la revisión inglesa, sin añadir un verbo equivalente a «throw».
