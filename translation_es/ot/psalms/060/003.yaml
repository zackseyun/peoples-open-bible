translation:
  language: es
  text: Dios, nos has rechazado; has abierto brecha entre nosotros; has estado airado. Restáuranos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vuélvete a nosotros». El hebreo puede expresar tanto la restauración del pueblo como el retorno de Dios hacia ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo dirige la frase directamente a Dios; en español, «Dios» conserva bien el valor vocativo por el contexto y la puntuación. «Oh Dios» es posible, pero añade un tono más litúrgico y marcado que el texto no exige.
- source_word: זְנַחְתָּנוּ
  english_pob_choice: you have rejected us
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has apartado de ti
  lexicon: HALOT
  rationale: זנח expresa rechazar, desechar o repudiar. «Nos has rechazado» es claro, natural y preserva el sentido de repudio/castigo implícito en el lamento.
- source_word: פְרַצְתָּנוּ
  english_pob_choice: you have broken us through
  chosen_spanish: nos has abierto una brecha
  alternatives_spanish:
  - nos has quebrantado
  - nos has hecho una brecha
  lexicon: HALOT
  rationale: El verbo פרץ comunica la idea de romper, abrir paso o hacer una brecha. En español, «abrir una brecha» conserva mejor la imagen violenta y concreta que un simple «rompernos», y evita una formulación poco natural.
- source_word: אָ֝נַפְתָּ
  english_pob_choice: you have been angry
  chosen_spanish: has estado airado
  alternatives_spanish:
  - has estado enojado
  - te has airado
  lexicon: HALOT
  rationale: El verbo transmite ira o enojo divino. «Has estado airado» mantiene el tono solemne y la fuerza del juicio sin sonar demasiado coloquial.
- source_word: תְּשׁוֹבֵב לָנוּ
  english_pob_choice: Restore us
  chosen_spanish: Restáuranos
  alternatives_spanish:
  - vuélvete a nosotros
  - haznos volver
  lexicon: HALOT
  rationale: La forma puede referirse a la restauración del pueblo o al retorno de Dios hacia ellos. «Restáuranos» es una oración idiomática en español que conserva la petición de reversión/restauración, sin perder la ambigüedad teológica del hebreo.
theological_decisions:
- issue: 'Ambigüedad de תְּשׁוֹבֵב לָנוּ: restauración del pueblo o retorno de Dios'
  english_pob_reading: A plea for God to restore his people after judgment, with the alternative of God's turning back to them preserved in a note
  chosen_spanish_reading: Una súplica para que Dios restaure a su pueblo después del juicio, manteniendo abierta la posibilidad de que también se entienda como que Dios vuelva a su pueblo
  alternative_spanish_readings:
  - Haz que vuelvas a nosotros
  - Vuélvete a nosotros
  rationale: El hebreo permite una lectura orientada al pueblo ('restáuranos') o una relacional ('vuélvete a nosotros'). La redacción principal conserva la súplica de reversión, y la nota mantiene la tensión sin resolverla en exceso.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Imagen de פרץ como ruptura violenta o brecha abierta
  english_pob_reading: you have broken us through
  chosen_spanish_reading: nos has abierto una brecha
  alternative_spanish_readings:
  - nos has quebrantado
  - nos has roto
  rationale: La imagen bíblica apunta a una brecha provocada por Dios, no solo a una ruptura abstracta. «Abrir una brecha» comunica mejor esa acción concreta de juicio y mantiene la tensión poética del salmo.
  doctrine_reference: HALOT; source context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió una imagen más directa de brecha/ruptura para פרץ. En español se eligió «nos has abierto una brecha» para conservar la fuerza del verbo y evitar una formulación ambigua o antinatural. También se preservó la ambigüedad de תְּשׁוֹבֵב לָנוּ con una nota que mantiene la alternativa relacional.
  spanish_consistency_notes:
  - Se usó «Dios» como vocativo directo, coherente con el tratamiento de אֱלֹהִים en el contexto.
  - Se evitó «SEÑOR» porque el hebreo no contiene el tetragrámaton en este verso.
  - Se prefirió el lenguaje de brecha/ruptura para פרץ, en lugar de una traducción suavizada.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
