translation:
  language: es
  text: Oh Yahvé, esperanza de Israel, todos los que te abandonan serán avergonzados; los que se apartan de ti[a] serán escritos en la tierra[b], porque han abandonado a Yahvé, la fuente de aguas vivas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual es difícil aquí; la lectura seguida armoniza con la segunda persona del verso, aunque existe una variante antigua en primera persona («de mí»).
    reason: textual_variant
  - marker: b
    text: O «en la tierra» puede entenderse también como «en la tierra/país». La imagen sugiere una inscripción pasajera en el suelo, en contraste con un recuerdo permanente.
    reason: lexical_alternative
  - marker: c
    text: «Aguas vivas» se refiere a agua fresca y corriente de un manantial, no a agua estancada.
    reason: cultural_note
lexical_decisions:
- source_word: מִקְוֵה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza de
  - objeto de esperanza
  - refugio
  lexicon: HALOT
  rationale: En este vocativo con «Israel» y aplicado a Yahvé, el sustantivo funciona de manera figurada como aquello en lo que Israel espera. «Esperanza» conserva el valor relacional y evita volverlo a un sentido material de reservorio o reunión de agua.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en forma transparente, conforme a la convención del proyecto, en vez de sustituirlo por un título.
- source_word: עֹזְבֶיךָ
  english_pob_choice: those who forsake you
  chosen_spanish: los que te abandonan
  alternatives_spanish:
  - los que te dejan
  - los que te desamparan
  - tus abandonadores
  lexicon: HALOT
  rationale: El participio expresa una acción característica o continua. «Abandonan» transmite bien el valor covenantal de עזב en español natural, con la fuerza de una ruptura de lealtad.
- source_word: יֵבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán cubiertos de vergüenza
  - serán humillados
  lexicon: HALOT
  rationale: El verbo lleva el resultado de deshonra/vergüenza en contexto de juicio. «Serán avergonzados» conserva ese efecto sin suavizarlo demasiado.
- source_word: יסור/י
  english_pob_choice: those who turn away from you
  chosen_spanish: los que se apartan de ti
  alternatives_spanish:
  - los que se desvían de ti
  - los que se vuelven atrás de ti
  - los que se apartan de mí
  lexicon: HALOT
  rationale: Dado el contexto de la segunda persona en el verso y la revisión de la POB inglesa, se adopta la lectura dirigida a «ti». «Se apartan» conserva el sentido de desviación/alejamiento sin sobrecargarlo con un tecnicismo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra del suelo
  - en el polvo
  - en la tierra misma
  lexicon: HALOT
  rationale: «Tierra» mantiene la imagen de inscripción efímera sobre el suelo y evita el posible sesgo político de «país» o «tierra prometida».
- source_word: יִכָּתֵבוּ
  english_pob_choice: will be written
  chosen_spanish: serán escritos
  alternatives_spanish:
  - serán inscritos
  - quedarán escritos
  - serán registrados
  lexicon: HALOT
  rationale: El nifal es pasivo directo. «Serán escritos» conserva la metáfora con transparencia, dejando que el contexto aporte la ironía de lo efímero.
- source_word: מְקוֹר מַיִם חַיִּים
  english_pob_choice: the fountain of living waters
  chosen_spanish: la fuente de aguas vivas
  alternatives_spanish:
  - el manantial de aguas vivas
  - la fuente de agua viva
  - el manantial de agua viva
  lexicon: HALOT
  rationale: «Fuente» y «aguas vivas» reproducen la imagen de origen de agua fresca y corriente. El plural «aguas» refleja mejor el hebreo y coincide con la revisión auditada de la POB.
- source_word: חַיִּים
  english_pob_choice: living
  chosen_spanish: vivas
  alternatives_spanish:
  - viva
  - corrientes
  - frescas
  lexicon: HALOT
  rationale: En la imagen hídrica, el adjetivo no describe vida biológica del agua sino agua fresca, activa y manantial. «Vivas» conserva la fuerza literal y su resonancia teológica.
theological_decisions:
- issue: Lectura pronominal en «los que se apartan de ti» frente a «de mí»
  english_pob_reading: The revised English POB follows the second-person address for consistency in the verse.
  chosen_spanish_reading: 'Se sigue la lectura en segunda persona: «los que se apartan de ti».'
  alternative_spanish_readings:
  - los que se apartan de mí
  rationale: La línea previa habla a Yahvé en segunda persona, y la revisión auditada de la POB opta por armonizar el referente con esa dirección. En español se preserva esa coherencia discursiva sin ocultar que existe una tensión textual subyacente.
  doctrine_reference: Texto difícil / preservación prudente de la variante comunicativa.
- issue: Imagen de «fuente de aguas vivas»
  english_pob_reading: fountain of living waters
  chosen_spanish_reading: fuente de aguas vivas
  alternative_spanish_readings:
  - manantial de aguas vivas
  - fuente de agua viva
  rationale: La expresión conserva la metáfora de Yahvé como origen de vida sostenida y corriente. El plural «aguas» no solo refleja mejor el hebreo, sino que ayuda a mantener la imagen tradicional sin convertirla en una abstracción.
  doctrine_reference: Teología bíblica del agua viva / metáfora de vida proveniente de Dios.
translation_notes:
  revision_awareness: La revisión inglesa más reciente desplazó la frase de primera persona a segunda persona («from you») y ajustó «living water» a «living waters». Esta versión española sigue esa revisión, pero mantiene el posible matiz vocativo en la apertura y conserva la imagen plural de aguas vivas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el Tetragrama.
  - Se eligió «aguas vivas» en plural para reflejar el hebreo y la revisión auditada.
  - Se evitó «SEÑOR» como sustituto del nombre divino para preservar la transparencia del texto fuente.
  - Se usó «serán escritos» para mantener la pasiva y la metáfora de inscripción efímera.
