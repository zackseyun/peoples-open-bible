translation:
  language: es
  text: Los hijos de extranjeros[a] reedificarán tus muros, y sus reyes te ministrarán[b]; porque en mi ira te herí, pero en mi favor[c] he tenido compasión de ti[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'extranjeros'; la expresión hebrea puede funcionar idiomáticamente para extranjeros en general.
    reason: lexical_alternative
  - marker: b
    text: O 'te servirán'. El verbo hebreo puede llevar un matiz de servicio ministerial o de asistencia.
    reason: lexical_alternative
  - marker: c
    text: O 'en mi buena voluntad' / 'en mi beneplácito'.
    reason: lexical_alternative
  - marker: d
    text: O 'te he mostrado misericordia' / 'me he compadecido de ti'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָנ֤וּ
  english_pob_choice: will rebuild
  chosen_spanish: reedificarán
  alternatives_spanish:
  - construirán
  - reconstruirán
  lexicon: HALOT
  rationale: En contexto con 'tus muros', 'reedificarán' comunica la idea de levantar de nuevo una estructura dañada sin añadir más contenido del que el pasaje sustenta. 'Reconstruirán' sería posible, pero 'reedificarán' mantiene un registro bíblico claro y preciso.
- source_word: בְנֵֽי נֵכָר
  english_pob_choice: The sons of foreigners
  chosen_spanish: los hijos de extranjeros
  alternatives_spanish:
  - los hijos de forasteros
  - los extranjeros
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede referirse a extranjeros en general. 'Los hijos de extranjeros' conserva la forma del original y sigue siendo inteligible en español; 'forasteros' es viable, pero puede sonar menos directo en este contexto.
- source_word: חֹמֹתַ֔יִךְ
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus murallas
  - tus paredes
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de segunda femenina singular se refiere a la ciudad personificada. 'Muros' es una traducción natural y sobria; 'murallas' también sería posible, pero 'muros' sigue de cerca el término genérico del hebreo.
- source_word: יְשָׁרְת֑וּ/נֶךְ
  english_pob_choice: will minister to you
  chosen_spanish: te servirán
  alternatives_spanish:
  - te ministrarán
  - te atenderán
  lexicon: HALOT
  rationale: El verbo puede denotar servicio ministerial o de asistencia. En español, 'te servirán' es más natural y suficientemente amplio; 'ministrarán' sonaría demasiado técnico eclesiásticamente y podría ocultar el sentido de servicio subordinado del texto.
- source_word: בְקִצְפִּי
  english_pob_choice: in my wrath
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi furor
  - en mi enojo
  lexicon: HALOT
  rationale: קצף expresa ira/indignación en registro solemne. 'Ira' mantiene la fuerza del juicio divino y funciona bien como contraste con 'mi favor'.
- source_word: הִכִּיתִיךְ
  english_pob_choice: I struck you
  chosen_spanish: te herí
  alternatives_spanish:
  - te golpeé
  - te castigué
  lexicon: HALOT
  rationale: El verbo נכה puede significar 'golpear/derribar/herir' según el contexto. Dado el paralelismo con juicio divino, 'te herí' preserva la gravedad sin introducir una literalidad áspera en español moderno.
- source_word: וּבִרְצוֹנִי
  english_pob_choice: in my favor
  chosen_spanish: en mi favor
  alternatives_spanish:
  - en mi buena voluntad
  - en mi beneplácito
  lexicon: HALOT
  rationale: רָצוֹן aquí comunica favor o beneplácito divino. 'En mi favor' es la opción más idiomática en español y conserva el contraste con la ira del miembro anterior.
- source_word: רִחַמְתִּיךְ
  english_pob_choice: I have had compassion on you
  chosen_spanish: he tenido compasión de ti
  alternatives_spanish:
  - te he mostrado misericordia
  - me he compadecido de ti
  lexicon: HALOT
  rationale: רחם expresa compasión misericordiosa. 'He tenido compasión de ti' conserva el matiz afectivo y evita reducir el término a una fórmula más fría como 'misericordia'.
theological_decisions:
- issue: Preservar la tensión entre juicio y restauración divina
  english_pob_reading: for in my wrath I struck you, but in my favor I have had compassion on you
  chosen_spanish_reading: porque en mi ira te herí, pero en mi favor he tenido compasión de ti
  alternative_spanish_readings:
  - porque en mi enojo te golpeé, pero en mi buena voluntad te mostré misericordia
  rationale: La formulación española mantiene sin suavizar el contraste teológico del hebreo entre disciplina judicial y restauración compasiva. No resuelve la tensión ni la explica; la deja visible en el texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Mantener la personificación femenina de la ciudad sin añadir un nombre propio
  english_pob_reading: your walls
  chosen_spanish_reading: tus muros
  alternative_spanish_readings:
  - tus muros, Jerusalén
  - tus muros, Sion
  rationale: El hebreo usa sufijo femenino singular para dirigirse a la ciudad, pero no menciona explícitamente 'Jerusalén' ni 'Sion'. La traducción conserva la dirección implícita sin introducir información no presente en el verso.
  doctrine_reference: Original-language primacy over translation tradition; do not add supplied nouns without source warrant.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que conservó 'the sons of foreigners' por ser más natural que una inversión posesiva, y mantuvo sin cambios el resto del verso. La presente redacción refleja esa decisión con 'los hijos de extranjeros' y conserva el paralelo juicio-compasión del original.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención proyectual, pero este verso no contiene el nombre divino; el pronombre posesivo y el discurso directo preservan la referencia implícita.
  - '''Muros'' traduce חֹמֹתַיִךְ de manera amplia y clara; no se usó ''murallas'' porque el texto no exige una especificación arquitectónica más marcada.'
  - '''Te servirán'' conserva la ambigüedad entre servicio general y ministerial sin introducir vocabulario eclesiástico ajeno al hebreo.'
