translation:
  language: es
  text: Pero Jonatán no había oído cuando su padre puso al pueblo bajo juramento[a], así que extendió la punta del bastón que tenía en su mano, la mojó en el panal de miel y se llevó la mano a la boca[b], y sus ojos se iluminaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'en el bosque/matorral de miel'; la expresión hebrea probablemente se refiere a un panal o masa densa de miel.
    reason: lexical_alternative
  - marker: b
    text: '''Sus ojos se iluminaron'' es un modismo hebreo que indica vigor o alerta renovados después de comer.'
    reason: cultural_note
lexical_decisions:
- source_word: לֹא שָׁמַע
  english_pob_choice: had not heard
  chosen_spanish: no había oído
  alternatives_spanish:
  - no oyó
  - no había escuchado
  lexicon: HALOT
  rationale: En contexto, la falta de oír implica desconocimiento de la prohibición de Saúl, no desobediencia. El pluscuamperfecto español conserva bien la anterioridad narrativa de la acción respecto del juramento.
- source_word: בְּהַשְׁבִּיעַ
  english_pob_choice: when his father put the people under oath
  chosen_spanish: cuando su padre puso al pueblo bajo juramento
  alternatives_spanish:
  - cuando su padre hizo jurar al pueblo
  - cuando su padre obligó al pueblo con juramento
  lexicon: HALOT
  rationale: El hifil de שבע expresa causar a jurar. 'Puso al pueblo bajo juramento' mantiene la fuerza jurídica sin recurrir a una forma arcaica.
- source_word: קְצֵה הַמַּטֶּה
  english_pob_choice: the tip of the staff
  chosen_spanish: la punta del bastón
  alternatives_spanish:
  - el extremo del bastón
  - la punta de la vara
  lexicon: HALOT
  rationale: '''Punta'' reproduce bien la parte que se introduce en la miel. ''Bastón'' resulta natural en español para un implemento portátil; ''vara'' es posible pero más ambigua aquí.'
- source_word: וַיִּטְבֹּל אוֹתָהּ
  english_pob_choice: dipped it
  chosen_spanish: la metió
  alternatives_spanish:
  - la sumergió
  - la hundió
  lexicon: HALOT
  rationale: Aunque el verbo puede ser 'sumergir', en español el movimiento concreto hacia la miel se expresa de modo más natural con 'la metió', sin perder la acción de introducirla en el panal.
- source_word: בְּיַעְרַת הַדְּבָשׁ
  english_pob_choice: into the honeycomb
  chosen_spanish: en el panal de miel
  alternatives_spanish:
  - en el panal
  - en la colmena de miel
  lexicon: HALOT
  rationale: La POB inglesa ya documenta que la expresión probablemente alude a un panal o masa densa de miel. 'Panal de miel' es claro y fiel; evita la calca literal 'bosque de miel', que sería opaca en español.
- source_word: וַיָּשֶׁב יָדוֹ אֶל פִּיו
  english_pob_choice: he brought his hand to his mouth
  chosen_spanish: volvió su mano a su boca
  alternatives_spanish:
  - llevó su mano a su boca
  - se llevó la mano a la boca
  lexicon: HALOT
  rationale: La frase hebrea describe el movimiento de la mano hacia la boca para comer. 'Volvió su mano a su boca' conserva la secuencia verbal del hebreo y es entendible en español; 'se llevó la mano a la boca' es una opción más idiomática pero menos cercana al patrón del original.
- source_word: וַתָּרְאֶנָה עֵינָיו
  english_pob_choice: his eyes brightened
  chosen_spanish: sus ojos se reanimaron
  alternatives_spanish:
  - sus ojos brillaron
  - sus ojos se iluminaron
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo de vigor renovado después de comer. 'Se reanimaron' comunica el cambio de energía sin introducir una imagen exclusivamente óptica que pudiera sonar demasiado figurada en español.
theological_decisions:
- issue: Valor idiomático de 'sus ojos' al final del versículo
  english_pob_reading: '''His eyes brightened'' is a Hebrew idiom indicating renewed strength or alertness after eating.'
  chosen_spanish_reading: '''Sus ojos se reanimaron'' como modismo de vigor renovado tras comer.'
  alternative_spanish_readings:
  - sus ojos brillaron
  - sus ojos se iluminaron
  rationale: Se mantiene la tensión entre la imagen corporal del hebreo y su sentido idiomático. En español, 'reanimarse' comunica el resultado sin convertir el texto en una observación médica ni en una metáfora espiritual no indicada por el contexto.
  doctrine_reference: 'No aplica: observación idiomática/narrativa, no doctrinal.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo con el mismo sentido que la POB inglesa: Jonathan no sabía del juramento previo de Saúl, extendió la punta del bastón, la introdujo en la miel y luego comió; el final conserva el modismo hebreo sobre los ojos sin suavizarlo en exceso.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - '''Juramento'' conserva el valor forense del hifil de שבע.'
  - '''Panal de miel'' sigue la decisión auditada de la POB inglesa frente a una traducción más literal y oscura.'
