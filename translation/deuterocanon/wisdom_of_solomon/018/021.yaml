translation:
  text: For a blameless man hurried forward and fought in the front line[a], bringing the weapon of his own service—prayer and atonement by incense; he stood against the wrath and put an end to the disaster[b], showing that he is your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prayer and expiation by incense.' The Greek ἐξιλασμός can be rendered in several related ways in cultic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'showing that he is your servant.' The Greek θεράπων denotes an attendant in honored service.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπεύσας
  chosen: hurried forward
  alternatives:
  - hastened
  - rushed
  lexicon: LSJ
  rationale: Aorist participle conveying prompt, urgent action. 'Hurried forward' is natural English and preserves the sense of swift intervention.
- source_word: ἀνὴρ ἄμεμπτος
  chosen: a blameless man
  alternatives:
  - an irreproachable man
  - a faultless man
  lexicon: LSJ
  rationale: Gender-accurate singular is retained per philosophy. ἄμεμπτος denotes one against whom no blame can be laid; 'blameless' is idiomatic and suitably weighty.
- source_word: προεμάχησεν
  chosen: fought in the front line
  alternatives:
  - fought in front
  - championed
  - defended in advance
  lexicon: LSJ
  rationale: The verb is martial and literally suggests fighting before others or in the forefront. 'Fought in the front line' preserves the military metaphor better than a generalized 'defended'.
- source_word: λειτουργίας
  chosen: ministry
  alternatives:
  - service
  - priestly service
  - public service
  lexicon: LSJ
  rationale: In this context Aaron's cultic role is in view. 'Ministry' is readable and broad enough to include priestly function; the cultic specifics are clarified by the following prayer and incense language.
- source_word: ὅπλον
  chosen: weapon
  alternatives:
  - armament
  - instrument
  lexicon: LSJ
  rationale: The verse explicitly casts prayer and incense in martial imagery. 'Weapon' preserves the metaphor strongly and clearly.
- source_word: προσευχὴν καὶ θυμιάματος ἐξιλασμόν
  chosen: prayer and atonement by incense
  alternatives:
  - prayer and expiation by incense
  - prayer and the appeasing effect of incense
  lexicon: LSJ
  rationale: The phrase names the contents of the 'weapon.' ἐξιλασμός involves making atonement/expiation; 'atonement by incense' is accessible English and keeps the cultic sense without importing later technical jargon.
- source_word: ἀντέστη τῷ θυμῷ
  chosen: he stood against the wrath
  alternatives:
  - he resisted the anger
  - he opposed the fury
  lexicon: LSJ
  rationale: ἀντέστη is forceful opposition; θυμός here refers to divine wrath in context. 'Stood against the wrath' preserves the vivid personified confrontation.
- source_word: πέρας ἐπέθηκε τῇ συμφορᾷ
  chosen: put an end to the disaster
  alternatives:
  - set a limit to the calamity
  - brought the affliction to an end
  lexicon: LSJ
  rationale: Idiomatic English for imposing a boundary/termination on a calamity. 'Disaster' fits the plague/judgment context.
- source_word: θεράπων
  chosen: attendant
  alternatives:
  - servant
  - minister
  lexicon: LSJ
  rationale: θεράπων often denotes a personal attendant or devoted servant, sometimes with dignified nuance. 'Attendant' avoids confusion with δοῦλος while preserving the idea of honored service to God.
