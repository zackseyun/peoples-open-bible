translation:
  language: es
  text: Y cuando Yahvé tu Dios te introduzca en la tierra a la que vas para poseerla, pondrás[a] la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclamarás la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal». El hebreo dice literalmente «poner/dar», y el gesto ceremonial exacto se explica en el pasaje inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y acontecerá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una circunstancia futura; «Y cuando» conserva la fuerza temporal en español sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar «Yahvé» como nombre propio del pacto, en vez de una sustitución titulada.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona expresa posesión relacional; «tu Dios» es el equivalente natural y fiel.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio, el referente es la tierra prometida. En español bíblico actual, «la tierra» reproduce bien el uso técnico del hebreo.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: that you are entering
  chosen_spanish: que vas a poseer
  alternatives_spanish:
  - que estás entrando
  - a la que vas entrando
  lexicon: HALOT
  rationale: El contexto inmediato incluye לְרִשְׁתָּהּ, por lo que en español conviene unir la idea de entrada con la posesión; «que vas a poseer» recoge la meta de la cláusula completa de forma natural.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: a poseer
  alternatives_spanish:
  - para poseerla
  - para tomar posesión de ella
  lexicon: HALOT
  rationale: ירשׁ en este contexto apunta a tomar posesión de la tierra prometida. «Poseer» es breve y fiel; el sentido de herencia/ocupación queda implícito en el marco deuteronómico.
- source_word: וְנָתַתָּה
  english_pob_choice: you shall set
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - proclamarás
  lexicon: HALOT
  rationale: נתן conserva su valor concreto de poner/colocar; «pondrás» es el equivalente más directo y natural en español. Se evita explicitar «proclamarás» porque el hebreo no lo dice de forma explícita.
- source_word: הַבְּרָכָה
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la bendición ceremonial
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de forma directa. «Bendición» mantiene el paralelismo con «maldición» y el trasfondo del pacto.
- source_word: עַל הַר גְּרִזִים
  english_pob_choice: on Mount Gerizim
  chosen_spanish: sobre el monte Gerizim
  alternatives_spanish:
  - en el monte Gerizim
  lexicon: HALOT
  rationale: «Sobre» reproduce bien עַל con la imagen de ubicación/colocación sobre el monte en la escena ritual.
- source_word: הַקְּלָלָה
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición del pacto
  lexicon: HALOT
  rationale: El paralelo con la bendición requiere «maldición» en español para expresar el término deuteronómico opuesto sin suavizarlo.
- source_word: עַל הַר עֵיבָל
  english_pob_choice: on Mount Ebal
  chosen_spanish: sobre el monte Ebal
  alternatives_spanish:
  - en el monte Ebal
  lexicon: HALOT
  rationale: Se mantiene la misma estructura preposicional que con Gerizim para conservar el paralelismo sintáctico y ritual.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto pide transliterar el Nombre divino en español. «Yahvé» preserva la identidad personal del Dios del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de la cláusula final con la bendición y la maldición
  english_pob_reading: you shall set the blessing on Mount Gerizim and the curse on Mount Ebal
  chosen_spanish_reading: pondrás la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal
  alternative_spanish_readings:
  - proclamarás la bendición... y la maldición...
  - colocarás la bendición... y la maldición...
  rationale: Se conserva la literalidad funcional de נתן («poner/colocar») sin decidir de antemano el detalle ceremonial. El contexto cercano explicará el acto, pero aquí el texto mantiene la forma concreta del hebreo.
  doctrine_reference: POB translation principle on preserving lexical tension and not over-specifying ritual mechanics
translation_notes:
  revision_awareness: El control de revisión indica que el texto inglés quedó sin cambios en el último pase y obtuvo alta concordancia entre revisores; por eso esta propuesta sigue de cerca la lectura inglesa auditada, pero ajusta el destino de entrada a posesión («vas a poseer») para reflejar mejor el hebreo completo, que combina entrada en la tierra y toma de posesión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme a la terminología estándar del proyecto.
  - Se usa «monte» con mayúscula cuando forma parte del topónimo, siguiendo el uso bíblico en español.
  - «Bendición» y «maldición» conservan el paralelismo del hebreo y la terminología pactual establecida.
