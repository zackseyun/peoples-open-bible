base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/031.yaml
  text: Pharaoh will see them and be comforted over all his multitude[a], Pharaoh and all his army, slain by the sword, declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'and be consoled' / 'and take comfort.' The Hebrew verb can also mean 'be sorry' or 'relent' in other contexts, but here it likely means that Pharaoh finds grim consolation when he sees others sharing his downfall.
