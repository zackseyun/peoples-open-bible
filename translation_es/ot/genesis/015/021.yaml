lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - además
  - también
  lexicon: HALOT
  rationale: En esta lista de pueblos, וְ funciona como simple continuidad enumerativa. En español, la coordinación natural es repetir «y» antes de cada grupo, sin intentar reproducir el marcador hebreo אֶת de forma visible.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa un singular colectivo, en español la referencia a un pueblo dentro de una lista etnónica se expresa con plural: «los amorreos».'
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Se mantiene el plural etnónimo por la misma razón de uso natural en español para nombres de pueblos enumerados.
- source_word: הַגִּרְגָּשִׁי
  english_pob_choice: the Girgashites
  chosen_spanish: los gergeseos
  alternatives_spanish:
  - los girgaseos
  - el gergeseo
  lexicon: HALOT
  rationale: Para este etnónimo, «gergeseos» conserva el valor de pueblo y sigue la práctica de pluralizar los nombres de grupos humanos en la lista.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  lexicon: HALOT
  rationale: Se usa el plural etnónimo estándar en español para armonizar con la enumeración y comunicar claramente el nombre del pueblo.
translation_notes:
  revision_awareness: El texto fuente y el rastro de auditoría inglesa coinciden plenamente; no hubo revisiones textuales ni decisiones teológicas especiales en este versículo. La versión española sigue la misma estructura enumerativa sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se conserva la coordinación repetida con coma serial para reflejar la lista hebrea.
  - Se emplean plurales etnónimos en español por claridad idiomática, en línea con la decisión inglesa auditada.
  - No se introduce «SEÑOR» ni otra terminología teológica ajena, porque el verso solo enumera pueblos.
