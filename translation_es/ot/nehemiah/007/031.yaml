lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: The men of
  chosen_spanish: Los hombres de
  alternatives_spanish:
  - La gente de
  - Los habitantes de
  lexicon: HALOT
  rationale: En este listado censal, el constructo plural de אִישׁ funciona como fórmula de pertenencia o adscripción a un lugar. En español, «los hombres de» conserva el valor masculino/colectivo que la POB inglesa resolvió con naturalidad, sin diluirlo en una expresión más genérica.
- source_word: מִכְמָס
  english_pob_choice: Mikmas
  chosen_spanish: Mikmas
  alternatives_spanish:
  - Michmas
  lexicon: HALOT
  rationale: Es un topónimo propio. Se conserva la transliteración directa «Mikmas», en línea con la decisión inglesa de preferir la forma que refleja más de cerca el hebreo, manteniendo «Michmas» como variante tradicional pero no principal.
- source_word: מֵאָה וְעֶשְׂרִים וּשְׁנַיִם
  english_pob_choice: '122'
  chosen_spanish: '122'
  alternatives_spanish:
  - ciento veintidós
  lexicon: HALOT
  rationale: En una lista censal, las cifras en dígitos son claras y compactas en español moderno. El hebreo expresa literalmente «cien y veinte y dos»; el número arábigo preserva el sentido sin añadir ruido estilístico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo quedó en alta concordancia. No hay indicios textuales o de sentido que requieran una nota crítica adicional en español para este versículo de lista.
  spanish_consistency_notes:
  - Se mantiene el estilo de listas genealógicas/censales con topónimo transliterado y cifra en dígitos.
  - No se introduce puntuación interpretativa adicional más allá de los dos puntos, que reflejan bien la estructura breve del hebreo y la inglesa.
  - Se evita «SEÑOR» u სხვა terminología teológica porque el versículo no contiene léxico divino ni tensiones doctrinales.
