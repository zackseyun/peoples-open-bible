review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: condición temporal solemne, cruce del Cedrón, énfasis de certeza en יָדֹעַ תֵּדַע y certeza de muerte en מוֹת תָּמוּת. También conserva adecuadamente la fórmula jurídica final de responsabilidad personal. Sin embargo, hay dos ajustes importantes para alinearse mejor con la evidencia fuente y con el rastro auditado en inglés: (1) la nota [b] está anclada en ''morirás'', pero su contenido explica el modismo final ''tu sangre... sobre tu cabeza'', por lo que debe moverse al sintagma final; (2) ''caerá sobre tu propia cabeza'' introduce el verbo ''caer'' que no está en el hebreo, donde el verbo es simplemente ''ser/estar'' (יִהְיֶה).'
  spanish_quality_summary: El español es claro, natural y de tono bíblico digno. 'Porque el día en que...' y 'debes saber con certeza' funcionan bien en registro jurídico-solemne. No obstante, 'tu sangre caerá sobre tu propia cabeza' suena algo más interpretativo y menos fiel que 'tu sangre estará sobre tu propia cabeza' o 'será sobre tu propia cabeza'. Además, la ubicación actual de la nota [b] puede confundir al lector, porque comenta otra frase distinta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. 'Cedrón' es apropiado para קִדְרוֹן. La elección de 'valle' con nota alternativa para נחל concuerda con el POB inglés. No aparecen términos sensibles del glosario (Yahvé, Mesías, esclavo, etc.).
  issues:
  - severity: medium
    issue: La nota [b] está colocada en 'morirás' pero explica el modismo final 'tu sangre... sobre tu cabeza'.
    rationale: El rastro inglés preserva una nota cultural sobre דָּמְךָ יִהְיֶה בְרֹאשֶׁךָ, no sobre מוֹת תָּמוּת. En español, el marcador debe ir junto a la frase que la nota aclara.
  - severity: medium
    issue: '''Caerá sobre tu propia cabeza'' añade un matiz verbal no presente en el hebreo.'
    rationale: יִהְיֶה significa 'será/estará', no 'caerá'. Aunque la idea general de culpabilidad se mantiene, el verbo añadido se aleja innecesariamente de la imagen hebrea y del razonamiento documentado por el POB inglés.
  revised_spanish_text: Porque el día en que salgas y cruces el valle[a] de Cedrón, debes saber con certeza que ciertamente morirás; tu sangre estará sobre tu propia cabeza[b].
  revised_footnotes:
  - marker: a
    text: O 'cruces el arroyo de Cedrón'. El hebreo נחל puede referirse a un valle, un uadi o un cauce estacional.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: ''tu sangre estará sobre tu cabeza'', es decir, tú mismo cargarás con la responsabilidad de tu muerte.'
    reason: cultural_note
  revision_rationale: Se conserva la buena base del borrador, pero se corrige la frase final para reflejar mejor el verbo hebreo ('estará' en vez de 'caerá') y se mueve la nota cultural al lugar correcto, donde explica el modismo de responsabilidad personal. Así el texto queda más fiel a la fuente, mejor alineado con el POB inglés y más claro para el lector.
