translation:
  language: es
  text: 'Y di instrucciones[a] a Baruc ante sus ojos[b], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mandé» o «encargué».
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «ante sus ojos», es decir, públicamente y a la vista de los testigos.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲצַוֶּה
  english_pob_choice: And I charged
  chosen_spanish: Y mandé
  alternatives_spanish:
  - Y ordené
  - Y encargué
  lexicon: HALOT
  rationale: The Hebrew verb צוה commonly means dar una orden/mandar. En español, «mandé» expresa con naturalidad la acción narrativa pasada y mantiene la fuerza de una instrucción solemne en un contexto jurídico-público, sin sonar tan técnico como «encargué» ni tan rígido como «ordené».
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[marcado por el objeto directo, no traducido]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: La partícula marca a Baruc como objeto directo; no requiere equivalente léxico en español.
- source_word: בָּרוּךְ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruch
  lexicon: Transliteration convention
  rationale: Se adapta el nombre propio a la forma habitual en español bíblico, Baruc, conservando la identificación inequívoca del personaje.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en presencia de ellos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «a/in sus ojos» y es un modismo de publicidad y testimonio visible. «Delante de sus ojos» conserva la imaginería corporal y la fuerza pública del gesto mejor que una paráfrasis más abstracta.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la forma estándar que introduce el discurso directo en hebreo; «diciendo» mantiene la estructura discursiva sin añadir contenido.
translation_notes:
  revision_awareness: El texto hebreo y la audición inglesa están en alto acuerdo; no se registran revisiones posteriores que alteren el sentido. La versión española conserva la lectura pública/legal de la escena y sigue de cerca la sintaxis narrativa del original.
  spanish_consistency_notes:
  - Se mantiene la traducción de לְעֵינֵיהֶם como un modismo visible y público, no como una mera locución abstracta.
  - Se usa Baruc, forma habitual en español, en vez de una transliteración más cercana al inglés.
  - «Mandé» refleja el valor de צוה en esta escena de instrucción solemne sin sobrecargar el registro.
