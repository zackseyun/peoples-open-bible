  text: Therefore my heart moans for Moab like flutes[a], and my heart moans like flutes for the men of Kir-heres[c][b], because the abundance they acquired has perished.
  footnotes:
  - marker: a
    text: Or “like pipes.” The Hebrew term refers to a wind instrument used especially in mourning contexts.
    reason: lexical_alternative
  - marker: b
    text: Kir-heres is traditionally rendered “Kir-hareseth” or “Kir-hereseth.”
    reason: alternative_reading
  - marker: c
    text: Or “because the wealth he acquired has perished.” The Hebrew expression may refer to what Moab had made, produced, or amassed.
    reason: lexical_alternative
