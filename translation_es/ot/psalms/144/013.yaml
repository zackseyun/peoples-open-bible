translation:
  language: es
  text: Que nuestros almacenes estén llenos, proveyendo toda clase de productos[a]; que nuestros rebaños sean multiplicados por millares, por decenas de millares, en nuestras calles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'de clase en clase'. La frase expresa abundancia en muchas variedades de productos.
    reason: lexical_alternative
  - marker: b
    text: O 'en nuestros espacios abiertos'. El término hebreo puede referirse a lugares abiertos o públicos dentro o alrededor de un asentamiento; aquí se conserva 'calles' por su correspondencia más directa con el hebreo y con la revisión inglesa más reciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזָוֵינוּ
  english_pob_choice: our storehouses
  chosen_spanish: nuestros almacenes
  alternatives_spanish:
  - nuestros graneros
  - nuestros depósitos
  - nuestros almacenes de provisiones
  lexicon: HALOT
  rationale: El sustantivo raro designa un lugar de almacenamiento o provisión. 'Almacenes' es claro en español moderno y conserva la idea de depósito de bienes mejor que un calco arcaico.
- source_word: מְלֵאִים
  english_pob_choice: be full
  chosen_spanish: estén llenos
  alternatives_spanish:
  - sean llenos
  - estén colmados
  lexicon: HALOT
  rationale: Es un adjetivo predicativo en un contexto de deseo o bendición. En español, el subjuntivo 'estén llenos' expresa mejor ese matiz que un simple indicativo.
- source_word: מְפִיקִים
  english_pob_choice: providing
  chosen_spanish: proveyendo
  alternatives_spanish:
  - produciendo
  - sacando
  - suministrando
  lexicon: HALOT
  rationale: El participio expresa sacar o producir abundancia para uso. 'Proveyendo' comunica bien la función de abastecer y mantiene la fluidez poética.
- source_word: מִזַּן אֶל זַן
  english_pob_choice: every kind of produce
  chosen_spanish: de toda clase de provisiones
  alternatives_spanish:
  - de un tipo a otro
  - de toda clase de fruto
  - de diversas clases de productos
  lexicon: HALOT
  rationale: La expresión literalmente significa 'de clase en clase', indicando variedad abundante. 'De toda clase de provisiones' hace explícita esa diversidad en un español natural y acorde con el contexto agrícola.
- source_word: צֹאונֵנוּ
  english_pob_choice: our flocks
  chosen_spanish: nuestros rebaños
  alternatives_spanish:
  - nuestro ganado menor
  - nuestras ovejas
  lexicon: HALOT
  rationale: El sustantivo colectivo puede abarcar ovejas y cabras. 'Rebaños' preserva el sentido colectivo sin restringirlo a una sola especie.
- source_word: מַאֲלִיפוֹת
  english_pob_choice: be multiplied by thousands
  chosen_spanish: se multipliquen por millares
  alternatives_spanish:
  - sean aumentados por miles
  - produzcan millares
  lexicon: HALOT
  rationale: La forma comunica aumento en miles o millares. 'Se multipliquen por millares' refleja el crecimiento numérico y conserva la progresión poética.
- source_word: מְרֻבָּבוֹת
  english_pob_choice: by tens of thousands
  chosen_spanish: por decenas de millares
  alternatives_spanish:
  - por miríadas
  - por decenas de miles
  lexicon: HALOT
  rationale: La forma denota multiplicación en decenas de miles. 'Decenas de millares' mantiene la escalada paralela y es transparente para el lector moderno.
- source_word: בְּחוּצוֹתֵינוּ
  english_pob_choice: in our streets
  chosen_spanish: en nuestras calles
  alternatives_spanish:
  - en nuestros espacios abiertos
  - en nuestras plazas
  - en nuestros alrededores
  lexicon: HALOT
  rationale: El término puede referirse a lugares públicos o abiertos dentro de una población. Dado el texto hebreo y la decisión inglesa revisada, 'calles' es la correspondencia más directa; la imagen rural no exige cambiarla a 'campos'.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del texto inglés auditado: ''providing'' en lugar de ''supplying'', pasivo ''se multipliquen'' y ''streets'' en lugar de ''open fields''. Se conservó el paralelismo poético y la idea de abundancia progresiva.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - '''Millares'' y ''decenas de millares'' mantienen el incremento paralelo del hebreo.'
  - '''Rebaños'' conserva el sentido colectivo de צֹאן sin limitarlo a ovejas exclusivamente.'
  - No se introdujeron términos eclesiásticos ajenos al contexto agrícola del versículo.
