translation:
  language: es
  text: 'Y sucederá que, cuando ustedes se hayan multiplicado y hayan sido fecundos en la tierra, en aquellos días —declara Yahvé—, ya no dirán: «El arca del pacto de Yahvé». No vendrá a la mente, no se acordarán de ella ni la echarán de menos[a], ni volverá a hacerse[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni la buscarán», «ni la atenderán». El verbo hebreo admite el matiz de preocuparse por ella o notar su ausencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni se hará otra». El hebreo es pasivo y deja implícito el objeto; el sentido es que no se construirá un arca de reemplazo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula profética introduce una situación futura; «sucederá» conserva el tono formal sin sonar tan arcaico como otras opciones.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: Aquí marca una cláusula temporal; «cuando» expresa mejor el valor circunstancial del hebreo en este contexto.
- source_word: תִרְבּוּ
  english_pob_choice: you have multiplied
  chosen_spanish: ustedes se hayan multiplicado
  alternatives_spanish:
  - ustedes se multipliquen
  - ustedes lleguen a ser muchos
  lexicon: HALOT
  rationale: Rבה indica hacerse numeroso; el pretérito compuesto subordinado con «cuando» comunica bien el futuro anterior natural en español.
- source_word: וּפְרִיתֶם
  english_pob_choice: and been fruitful
  chosen_spanish: y sean fructíferos
  alternatives_spanish:
  - y hayan dado fruto
  - y se hayan hecho fecundos
  lexicon: HALOT
  rationale: «Ser fructíferos» mantiene la resonancia de פרה y la pareja tradicional «multiplicarse / ser fructíferos» sin forzar un calco.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra de ustedes
  lexicon: HALOT
  rationale: En Jeremías, el referente natural es la tierra de la promesa; «tierra» conserva esa amplitud teológica y la palabra hebrea básica.
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: HALOT
  rationale: Expresión profética estable; «aquellos días» es idiomático y solemne en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se preserva la fórmula profética con el nombre divino no velado según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor editorial establecido para el Tetragrámaton en el texto principal español.
- source_word: לֹא יֹאמְרוּ עוֹד
  english_pob_choice: they will no longer say
  chosen_spanish: ya no dirán
  alternatives_spanish:
  - no dirán más
  - no volverán a decir
  lexicon: HALOT
  rationale: «Ya no» captura la cesación expresada por עוֹד y funciona con naturalidad en español contemporáneo.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: The ark of the covenant of Yahweh
  chosen_spanish: El arca del pacto de Yahvé
  alternatives_spanish:
  - El arca del pacto de Yahweh
  - El arca del pacto de Yahvé
  lexicon: HALOT
  rationale: «Arca del pacto» reproduce la cadena constructa de forma transparente; «pacto» evita sustituir el término por formulaciones eclesiales menos directas.
- source_word: וְלֹא יַעֲלֶה עַל לֵב
  english_pob_choice: It will not come to mind
  chosen_spanish: No vendrá a la mente
  alternatives_spanish:
  - No subirá al corazón
  - No llegará al pensamiento
  lexicon: HALOT
  rationale: La imagen hebrea de «subir sobre el corazón» se vuelve un equivalente natural en español sin perder el sentido idiomático de recordar/pensar en algo.
- source_word: וְלֹא יִזְכְּרוּ בּוֹ
  english_pob_choice: and they will not remember it
  chosen_spanish: no se acordarán de ella
  alternatives_spanish:
  - no la recordarán
  - no se acordarán de él
  lexicon: HALOT
  rationale: El pronombre retoma el arca, sustantivo femenino en español; «acordarse de» expresa bien el recuerdo deliberado.
- source_word: וְלֹא יִפְקֹדוּ
  english_pob_choice: or miss it
  chosen_spanish: ni la echarán de menos
  alternatives_spanish:
  - ni la buscarán
  - ni la visitarán
  - ni atenderán a ella
  lexicon: HALOT
  rationale: El hebreo פקד tiene un rango amplio; aquí, como en el audit trail inglés, el sentido más probable es notar su ausencia o echarla de menos.
- source_word: וְלֹא יֵעָשֶׂה עוֹד
  english_pob_choice: nor will it be made again
  chosen_spanish: ni volverá a hacerse
  alternatives_spanish:
  - ni se hará de nuevo
  - ni será hecho otra vez
  lexicon: HALOT
  rationale: El pasivo hebreo deja implícito el objeto; en español, la forma impersonal mantiene la ambigüedad y evita precisar más de lo que el texto exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso contiene explícitamente el Tetragrámaton. En coherencia con el estándar del proyecto, se conserva el nombre divino y se evita su ocultamiento mediante una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido del arca en la futura restauración
  english_pob_reading: The ark will no longer function as the focal symbol of covenant life, without implying any denial of God's covenant faithfulness.
  chosen_spanish_reading: El texto afirma que el arca dejará de ocupar el centro de la memoria y del habla del pueblo, sin negar la fidelidad del pacto de Yahvé.
  alternative_spanish_readings:
  - El arca desaparecerá físicamente
  - El pacto quedará anulado
  rationale: La serie de negaciones en el hebreo apunta a la pérdida de centralidad del arca, no a una negación del pacto mismo. La traducción conserva esa tensión sin expandirla indebidamente.
  doctrine_reference: Jeremías 3:16; audit trail inglés
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la traducción sigue el pasaje con acuerdo alto entre los controles de revisión y conserva las decisiones léxicas y teológicas auditadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en línea con el criterio del proyecto.
  - Se usa «arca del pacto» como equivalente directo de la cadena constructa hebrea.
  - Se conserva el matiz de cesación con «ya no» y «ni volverá a hacerse», en lugar de una paraprástica más interpretativa.
  - Se respeta la referencia del pronombre en femenino («ella») por el género de «arca» en español.
