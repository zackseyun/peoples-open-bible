translation:
  language: es
  text: Él hará salir tu justicia[a] como la luz, y tu justicia[b] como el mediodía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tu vindicación” para “tu justicia”.
    reason: lexical_alternative
  - marker: b
    text: O “tu causa” para “tu justicia”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  english_pob_choice: He will bring forth
  chosen_spanish: hará salir
  alternatives_spanish:
  - traerá a la luz
  - sacará
  lexicon: HALOT
  rationale: El causativo hifil de יצא expresa hacer que algo salga o emerja. En español, “hará salir” conserva bien el sentido causativo y suena natural en un registro bíblico moderno.
- source_word: כָאוֹר
  english_pob_choice: like the light
  chosen_spanish: como la luz
  alternatives_spanish:
  - como la luz del día
  - como claridad
  lexicon: HALOT
  rationale: El hebreo usa comparación con אוֹר, “luz”. “Como la luz” reproduce la imagen con transparencia lexical y evita sobreinterpretar el símbolo.
- source_word: צִדְקֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu vindicación
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene “righteousness”, el paralelismo con מִשְׁפָּטֶךָ y el contexto forense-poético permiten “justicia” en español, que comunica bien la demostración pública de lo recto o reivindicado. Se preserva la tensión semántica en nota mediante la alternativa “causa” para el segundo miembro y no se borra la posibilidad de vindicación.
- source_word: וּמִשְׁפָּטֶךָ
  english_pob_choice: and your justice
  chosen_spanish: y tu causa
  alternatives_spanish:
  - y tu justicia
  - y tu juicio
  - y tu vindicación
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicio, derecho, causa o reivindicación. Aquí el paralelo poético sugiere la causa/caso que será públicamente aclarado. “Causa” evita reducirlo solo a un acto judicial y encaja bien con la nota de alternativa del inglés POB.
- source_word: כַצָּהֳרָיִם
  english_pob_choice: like the noonday
  chosen_spanish: como el mediodía
  alternatives_spanish:
  - como el mediodía pleno
  - como el pleno día
  lexicon: HALOT
  rationale: צהריים significa mediodía. “Como el mediodía” es la equivalencia española más directa y conserva la imagen de máxima claridad.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con alta concordancia y sin cambios recientes; la versión española conserva el paralelismo poético, pero ajusta 'justice/righteousness' a una distribución idiomática más natural en español sin perder la posibilidad de vindicación implícita en el contexto.
  spanish_consistency_notes:
  - Se usó “Yahvé” no porque aparezca explícitamente en este versículo, sino por la norma general del proyecto cuando el Tetragrámaton está en el texto fuente; aquí no aplica directamente.
  - Se mantuvo un registro poético sobrio, sin añadir explicaciones interpretativas al texto principal.
  - “Causa” se eligió para מִשְׁפָּט por ser una opción española que conserva la idea de caso/derecho reivindicado y armoniza con el paralelismo.
