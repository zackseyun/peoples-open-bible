    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «oyó»; la piedra está personificada como testigo de las palabras del pacto.'
    reason: cultural_note
  - marker: c
    text: O «traten falsamente con su Dios» o «se muestren falsos para con su Dios».
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea el español con la decisión léxica y teológica ya documentada por el POB: la piedra actúa como testigo adversativo en un contexto de pacto, por lo que «contra nosotros / contra ustedes» es más fiel al sentido y mucho más natural en español que «entre nosotros / entre ustedes». También se ajusta פֶּן con «no sea que» para reflejar mejor la advertencia preventiva del hebreo.'
