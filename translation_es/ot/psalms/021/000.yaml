translation:
  language: es
  text: Para el maestro de coro. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el superscrito hebreo puede indicar autoría, asociación o dedicación.
