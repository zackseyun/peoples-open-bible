translation:
  language: es
  text: No mires con tus ojos y gimas[a], como un eunuco que abraza a una joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «No des tristeza a tu alma, ni te aflijas en tu consejo». El testimonio hebreo conservado presenta una imagen vívida de anhelo frustrado; el griego expresa el versículo de manera más directa como una amonestación contra la tristeza autoinfligida.'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ δῷς εἰς λύπην τὴν ψυχήν σου
  english_pob_choice: Do not look with your eyes and groan
  chosen_spanish: No des tristeza a tu alma
  alternatives_spanish:
  - No entregues tu alma a la tristeza
  - No pongas tu alma en tristeza
  lexicon: BDAG
  rationale: La versión griega expresa de manera directa una prohibición contra el dolor autoinfligido; en español, «dar tristeza a tu alma» conserva la fuerza idiomática de λύπη sin forzar una paráfrasis excesiva, y encaja con el valor exhortativo que el hebreo y el paralelo griego comparten.
- source_word: τὴν ψυχήν σου
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  lexicon: BDAG
  rationale: «Alma» reproduce el campo semántico de ψυχή en una forma natural para el español bíblico moderno; «vida» o «ser» suavizarían la correspondencia léxica.
- source_word: μὴ θλίψῃς σεαυτὸν
  english_pob_choice: do not afflict yourself
  chosen_spanish: ni te aflijas
  alternatives_spanish:
  - ni te tortures
  - ni te entristezcas
  lexicon: BDAG
  rationale: θλίβω tiene la idea de oprimir/afligir; «afligirte» conserva el matiz de presión interior y mantiene un tono digno y comprensible en español.
- source_word: ἐν βουλῇ σου
  english_pob_choice: in your own counsel/planning
  chosen_spanish: en tu consejo
  alternatives_spanish:
  - en tu plan
  - en tu propia deliberación
  lexicon: BDAG
  rationale: βουλή puede significar consejo, decisión o plan. «Consejo» es una opción amplia y fiel; deja abierta la posibilidad de decisión interior o planificación sin imponer una sola interpretación.
- source_word: כאשר סריס יחבק נערה
  english_pob_choice: like a eunuch embracing a young woman
  chosen_spanish: como un eunuco que abraza a una joven
  alternatives_spanish:
  - como un eunuco que abraza a una muchacha
  - como un eunuco abrazando a una joven
  lexicon: HALOT
  rationale: El hebreo preserva la imagen vívida de deseo frustrado. «Eunuco» es necesario para mantener la fuerza de la comparación, y «joven» resulta claro y digno en español; «abraza» comunica cercanía física sin volver la frase demasiado coloquial.
- source_word: ראה בעיניו
  english_pob_choice: Do not look with your eyes
  chosen_spanish: No des tristeza a tu alma
  alternatives_spanish:
  - No mires con tus ojos
  - No veas con tus ojos
  lexicon: HALOT
  rationale: El hebreo sugiere una escena visual de anhelo frustrado, mientras que el paralelo griego formula el mandato de forma más directa. Dado que el texto fuente hebreo y el griego no coinciden literalmente, se privilegia el sentido admonitorio común de ambos testigos en una redacción española publicable.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate primarily from the surviving Hebrew image, while allowing the Greek parallel to supply the prohibitory force and second-person address.
  chosen_spanish_reading: Se conserva la prohibición explícita del griego, pero sin perder la imagen hebrea de frustración y anhelo que culmina en la comparación con el eunuco.
  alternative_spanish_readings:
  - 'Traducir solo la imagen hebrea como descripción: «Mirando con sus ojos y gimiendo…»'
  - 'Traducir solo el griego: «No entregues tu alma a la tristeza…»'
  rationale: En este versículo, el testimonio hebreo y el griego no son paralelos verbales exactos. El español debe reflejar ambos sin fabricar una armonización artificial. La formulación elegida toma la fuerza exhortativa del griego y la imagen concreta del hebreo, manteniendo la tensión textual documentada.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as translation input'
- issue: Tratamiento de λύπη / θλίβω
  english_pob_reading: self-inflicted sorrow / afflict yourself
  chosen_spanish_reading: tristeza / aflijas
  alternative_spanish_readings:
  - dolor / oprimas
  - aflicción / atormentes
  rationale: «Tristeza» y «afligir» reproducen bien el tono pastoral y el peso emocional del griego, sin introducir una intensificación no sustentada por el texto.
  doctrine_reference: BDAG
- issue: Tratamiento de סריס
  english_pob_reading: eunuch
  chosen_spanish_reading: eunuco
  alternative_spanish_readings:
  - funcionario de palacio
  - castrado
  rationale: La comparación depende de la incapacidad o exclusión sexual del término; «eunuco» es la forma más fiel y comprensible en español bíblico.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción española sigue la línea revisada del inglés auditado que evita calcar innecesariamente y prioriza la naturalidad. A la vez, se aparta de la formulación inglesa basada solo en el hebreo visible para incorporar de modo explícito la prohibición del griego, porque el paquete fuente exige atender ambos testigos y aquí el paralelo griego es semánticamente determinante.
  spanish_consistency_notes:
  - Se usa «alma» para ψυχή, conforme al uso bíblico normal y sin neutralizar su referencia interior.
  - Se usa «eunuco» de forma literal, no como eufemismo burocrático, para preservar la imagen del símil.
  - «Consejo» se mantiene amplio para abarcar decisión, deliberación o planificación sin cerrar el sentido de βουλή.
  - La puntuación y la cadencia buscan un registro bíblico moderno y publicable, sin arcaísmos innecesarios.
