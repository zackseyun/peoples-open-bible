translation:
  language: es
  text: Y me levantaré contra ellos[a], declara Yahvé de los ejércitos, y exterminaré de Babilonia nombre y remanente, descendencia y posteridad[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me alzaré contra ellos».'
    reason: lexical_alternative
  - marker: b
    text: «Nombre y remanente, descendencia y posteridad» es una expresión abarcadora para borrar por completo la memoria de Babilonia y su linaje superviviente.
    reason: cultural_note
lexical_decisions:
- source_word: וְקַמְתִּי
  english_pob_choice: I will rise up
  chosen_spanish: me levantaré
  alternatives_spanish:
  - me alzaré
  - me levantaré contra ellos
  lexicon: HALOT
  rationale: La expresión profética futura comunica intervención activa de juicio. "Me levantaré" conserva el valor idiomático de קום sin sonar demasiado literal en español; el complemento adversativo se mantiene con "contra ellos".
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - encima de ellos
  lexicon: HALOT
  rationale: Con קום en contexto hostil, עַל expresa oposición. "Contra ellos" es la forma natural en español para conservar el sentido judicial/adversativo.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - oráculo de Yahvé de los ejércitos
  - declara Yahvé de los ejércitos
  lexicon: HALOT
  rationale: נְאֻם se traduce con el verbo de declaración profética "declara". YHWH se vierte como "Yahvé" según el estándar del proyecto. צְבָאוֹת se traduce como "de los ejércitos" para evitar la máscara tradicional y conservar el título militar/judicial.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: arrancaré
  alternatives_spanish:
  - cortaré
  - extirparé
  - eliminaré
  lexicon: HALOT
  rationale: Aunque el inglés POB usa "cut off" para preservar el idiomario de כרת, en español "arrancaré" comunica con naturalidad la idea de extirpación total en esta lista de abolición. Se evita suavizarlo con "eliminaré", que pierde la fuerza imagética del verbo.
- source_word: לְבָבֶל
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  - de en Babilonia
  lexicon: HALOT
  rationale: La preposición ל aquí tiene sentido privativo tras הִכְרִית. En español se expresa naturalmente con "de Babilonia" para indicar remoción desde esa entidad.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - memoria
  lexicon: HALOT
  rationale: '"Nombre" preserva la concisión hebrea y permite el alcance amplio de identidad, fama o memorial sin fijar demasiado el matiz.'
- source_word: שְׁאָר
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - sobreviviente
  lexicon: HALOT
  rationale: '"Remanente" refleja el valor de resto sobreviviente sin introducir una carga teológica no requerida por el contexto inmediato.'
- source_word: וְנִין
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  - linaje
  lexicon: HALOT
  rationale: El término apunta a la línea descendiente. "Descendencia" es natural en español y mantiene el campo semántico familiar/genealógico.
- source_word: וָנֶכֶד
  english_pob_choice: posterity
  chosen_spanish: posteridad
  alternatives_spanish:
  - descendencia
  - generación futura
  lexicon: HALOT
  rationale: En combinación con נִין, el término funciona como merismo de descendientes a través de generaciones. "Posteridad" conserva ese alcance amplio sin concretarlo en una sola generación.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética solemne al final del versículo, usando el nombre divino en la forma editorial del proyecto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton; conforme al estándar del proyecto, se traduce con el nombre propio divino "Yahvé", no con una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de los hosts
  - de los ejércitos celestiales
  rationale: '"De los ejércitos" transmite el sentido del título como soberanía militar y judicial de Yahvé de un modo transparente para el lector español.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con la fuente y sin cambios necesarios en el último pase; la redacción española mantiene esa lectura estable, conservando la estructura profética, la fórmula de mensajero y la enumeración totalizante.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como forma estándar del nombre divino en todo el versículo.
  - Se tradujo צְבָאוֹת como «de los ejércitos» para mantener coherencia con el estándar del proyecto y evitar la máscara «SEÑOR».
  - La secuencia nominal final se mantiene como una lista intensiva de erradicación total, sin suavizar el paralelismo hebreo.
