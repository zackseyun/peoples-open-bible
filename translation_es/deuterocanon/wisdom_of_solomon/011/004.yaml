translation:
  language: es
  text: Tenían sed y te invocaron[a], y se les dio agua de una roca escarpada[b], y un remedio para la sed de una piedra dura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te llamaron».
    reason: lexical_alternative
  - marker: b
    text: O «de una roca cortada abruptamente»; el griego destaca lo improbable de que el agua proviniera de allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίψησαν
  english_pob_choice: They were thirsty
  chosen_spanish: Estaban sedientos
  alternatives_spanish:
  - Tenían sed
  - Sintieron sed
  lexicon: BDAG
  rationale: El aoristo de διψάω expresa el estado de necesidad; en español, «estaban sedientos» conserva bien ese estado con un tono más digno y natural que un calco verbal rígido.
- source_word: ἐπεκαλέσαντό σε
  english_pob_choice: called on you
  chosen_spanish: te invocaron
  alternatives_spanish:
  - te llamaron
  - te invocaron a ti
  - clamaron a ti
  lexicon: BDAG
  rationale: Aquí el verbo implica una apelación orante a Dios en necesidad. «Te invocaron» conserva esa fuerza religiosa y evita la ambigüedad de «llamaron».
- source_word: ἐδόθη αὐτοῖς
  english_pob_choice: was given to them
  chosen_spanish: se les dio
  alternatives_spanish:
  - les fue dado
  - les dieron
  - se les concedió
  lexicon: BDAG
  rationale: El pasivo griego deja implícito al dador; «se les dio» preserva esa forma impersonal en español sin introducir explícitamente al agente en la cláusula.
- source_word: ἐκ πέτρας ἀκροτόμου
  english_pob_choice: from a sheer rock
  chosen_spanish: de una roca escarpada
  alternatives_spanish:
  - de una roca abrupta
  - de una roca cortada a pico
  - de una roca vertical
  lexicon: LSJ
  rationale: ἀκρότομος sugiere algo cortado de forma abrupta o escarpada. «Roca escarpada» comunica bien la imagen de una fuente improbable sin sonar forzado.
- source_word: ὕδωρ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: BDAG
  rationale: Equivalente directo y claro.
- source_word: ἄκος δίψης
  english_pob_choice: a remedy for thirst
  chosen_spanish: un remedio para la sed
  alternatives_spanish:
  - una cura para la sed
  - un alivio para la sed
  - sanación para la sed
  lexicon: LSJ
  rationale: ἄκος tiene sentido de remedio o cura. «Un remedio para la sed» conserva el matiz terapéutico/metafórico del griego, que el texto presenta como alivio sanador y no solo como bebida.
- source_word: ἐκ λίθου σκληροῦ
  english_pob_choice: from hard stone
  chosen_spanish: de una piedra dura
  alternatives_spanish:
  - de una roca dura
  - de piedra dura
  - de una piedra firme
  lexicon: LSJ
  rationale: σκληρός significa duro. «Piedra dura» conserva el paralelismo con la primera cola y el contraste con el origen improbable del agua.
theological_decisions:
- issue: Mantener el pasivo sin hacer explícito el dador
  english_pob_reading: Retain the passive 'was given to them' without supplying 'by you' in the main text.
  chosen_spanish_reading: Conservar «se les dio» sin añadir «por ti» en el texto principal.
  alternative_spanish_readings:
  - y tú les diste agua
  - y les fue dado agua por ti
  rationale: El griego usa pasivo y el contexto ya atribuye la provisión a Dios; la traducción debe respetar esa reserva sintáctica y no explicitar la agencia en la cláusula principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservar el matiz figurado de ἄκος δίψης
  english_pob_reading: Use 'a remedy for thirst' rather than flattening to simple 'drink' or 'relief.'
  chosen_spanish_reading: Usar «un remedio para la sed» en vez de reducirlo a «agua» o «alivio».
  alternative_spanish_readings:
  - un alivio para la sed
  - una cura para la sed
  rationale: La imagen presenta el agua como respuesta sanadora y no meramente utilitaria; mantener «remedio» preserva la metáfora sin exagerarla.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Concordancia alta con la POB inglesa: se conservan el pasivo, la apelación a Dios y la metáfora de ἄκος δίψης. La única variación relevante es la naturalización del inicio a «Estaban sedientos» y la elección de «roca escarpada» / «piedra dura» para mantener el paralelismo y la imagen del origen imposible del agua.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto, sin introducirlo en la cláusula pasiva.
  - Se eligió «invocaron» para preservar el matiz orante del verbo griego.
  - «Remedio» se usa de forma consistente para ἄκος cuando el contexto es terapéutico o metafórico.
  - No se usa «SEÑOR» porque el texto griego aquí no contiene κύριος ni una sustitución del nombre divino.
