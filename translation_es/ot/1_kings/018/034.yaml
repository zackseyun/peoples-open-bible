translation:
  language: es
  text: 'Entonces él dijo[a]: «Llenen cuatro cántaros de agua y derrámenla sobre el holocausto y sobre la leña». Entonces él dijo: «Háganlo por segunda vez», y lo hicieron por segunda vez. Entonces él dijo: «Háganlo por tercera vez», y lo hicieron por tercera vez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuatro cántaros»; el término hebreo designa un recipiente para transportar líquidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «entonces» comunica bien esa secuencia en español. Se conserva el sujeto explícito «él» para claridad, como en la narración previa.
- source_word: מִלְאוּ
  english_pob_choice: Fill
  chosen_spanish: Llenen
  alternatives_spanish:
  - Llenen completamente
  - Rellenen
  lexicon: HALOT
  rationale: Imperativo plural de מלא. «Llenen» es natural, directo y fiel al mandato sin añadir matiz innecesario.
- source_word: אַרְבָּעָה כַדִּים
  english_pob_choice: four jars
  chosen_spanish: cuatro cántaros
  alternatives_spanish:
  - cuatro jarros
  - cuatro vasijas
  lexicon: HALOT
  rationale: כד designa un recipiente para líquidos; en español «cántaros» comunica bien un recipiente transportable de agua. Se evita «jarras» si pudiera sonar más genérico o menos adecuado al contexto rural.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua fresca
  lexicon: HALOT
  rationale: Equivalente directo del sustantivo común, sin ampliación.
- source_word: וְיִצְקוּ
  english_pob_choice: and pour it
  chosen_spanish: y derrámenla
  alternatives_spanish:
  - y viértanla
  - y échenla
  lexicon: HALOT
  rationale: El verbo expresa echar/verter líquido sobre algo. «Derrámenla» conserva el imperativo plural y el movimiento físico exigido por el contexto; el pronombre femenino concuerda con «agua» en español.
- source_word: עַל הָעֹלָה
  english_pob_choice: on the burnt offering
  chosen_spanish: sobre el holocausto
  alternatives_spanish:
  - sobre el sacrificio quemado
  - sobre la ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente quemado; «holocausto» es el término tradicional y preciso en español bíblico. Se mantiene la relación espacial con «sobre» porque el agua cae encima del sacrificio.
- source_word: וְעַל הָעֵצִים
  english_pob_choice: and on the wood
  chosen_spanish: y sobre la leña
  alternatives_spanish:
  - y sobre la madera
  - y sobre los leños
  lexicon: HALOT
  rationale: עֵצִים aquí son las piezas de madera preparadas para el altar. «Leña» es natural en español y transmite mejor el material dispuesto para arder.
- source_word: שְׁנוּ
  english_pob_choice: Do it a second time
  chosen_spanish: Háganlo por segunda vez
  alternatives_spanish:
  - Repítanlo
  - Háganlo otra vez
  lexicon: HALOT
  rationale: La raíz שנה indica repetir. Se explicita el ordinal para mantener la progresión cuantificada del relato, como en el inglés POB.
- source_word: וַיִּשְׁנ֔וּ
  english_pob_choice: and they did it a second time
  chosen_spanish: y lo hicieron por segunda vez
  alternatives_spanish:
  - y lo repitieron
  - y lo hicieron otra vez
  lexicon: HALOT
  rationale: Se conserva la respuesta narrativa a la orden anterior. El ordinal refleja el conteo explícito del hebreo.
- source_word: שַׁלֵּשׁוּ
  english_pob_choice: Do it a third time
  chosen_spanish: Háganlo por tercera vez
  alternatives_spanish:
  - Repítanlo por tercera vez
  - Háganlo tres veces
  lexicon: HALOT
  rationale: El verbo intensifica la repetición hasta la tercera vez; la formulación ordinal preserva el patrón del versículo.
- source_word: וַיְשַׁלֵּשׁוּ
  english_pob_choice: and they did it a third time
  chosen_spanish: y lo hicieron por tercera vez
  alternatives_spanish:
  - y lo repitieron por tercera vez
  - y lo hicieron tres veces
  lexicon: HALOT
  rationale: Cierra la secuencia con la misma estructura repetitiva del original, manteniendo la correspondencia narrativa.
theological_decisions:
- issue: Rendering of עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio quemado
  rationale: עֹלָה es el sacrificio ofrecido completamente por fuego. «Holocausto» es el equivalente bíblico establecido en español y conserva la fuerza sacrificial del término sin explicación añadida.
  doctrine_reference: Levítico 1; uso sacrificial de עֹלָה
- issue: Maintaining the concrete pouring action on sacrifice and wood
  english_pob_reading: pour it on the burnt offering and on the wood
  chosen_spanish_reading: derrámenla sobre el holocausto y sobre la leña
  alternative_spanish_readings:
  - viértanla sobre el holocausto y sobre la leña
  - échenla sobre el holocausto y sobre la leña
  rationale: El hebreo describe una acción física concreta sobre ambos objetos. «Sobre» conserva la localización exacta del agua, y la elección verbal mantiene la escena de provocación y sobreabundancia del relato.
  doctrine_reference: 1 Reyes 18:33-35; contexto narrativo del sacrificio de Elías
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de acuerdo con el texto base inglés y la tradición textual hebrea; no se detectaron revisiones sustantivas en el pasaje auditado. La única decisión sensible es el término del recipiente, donde el español admite «cántaros» como equivalente natural de כד.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «holocausto» para עֹלָה por consistencia con el valor sacrificial técnico del término en español bíblico.
  - Se conserva la progresión ordinal explícita («por segunda vez», «por tercera vez») para reflejar la repetición marcada del hebreo.
