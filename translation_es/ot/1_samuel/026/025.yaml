translation:
  language: es
  text: 'Entonces Saúl dijo a David[a]: «Bendito eres, mi hijo David. Ciertamente harás, y ciertamente prevalecerás». Entonces David siguió su camino, y Saúl volvió a su lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «hacer, harás, y poder, podrás»; dos construcciones de infinitivo absoluto intensifican la certeza del éxito futuro de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּר֤וּךְ אַתָּה
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Sea bendito
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula declarativa de bendición dirigida a David. «Bendito eres tú» conserva el valor afirmativo y suena natural en español sin convertirlo en mera exhortación.
- source_word: בְּנִ֣/י דָוִ֔ד
  english_pob_choice: my son David
  chosen_spanish: mi hijo David
  alternatives_spanish:
  - mi hijo, David
  - hijo mío David
  lexicon: HALOT
  rationale: Se mantiene el matiz familiar/patronal del vocativo de Saúl. En español, «mi hijo David» reproduce la cercanía sin añadir explicaciones no presentes en el texto.
- source_word: גַּ֚ם עָשֹׂ֣ה תַעֲשֶׂ֔ה
  english_pob_choice: You will surely do
  chosen_spanish: Ciertamente harás
  alternatives_spanish:
  - Sin duda harás
  - Harás con certeza
  - Ciertamente actuarás
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la certeza de la acción. El español «ciertamente harás» conserva esa fuerza sin introducir «grandes cosas», que no está explícito en el hebreo.
- source_word: וְ/גַ֖ם יָכֹ֣ל תּוּכָ֑ל
  english_pob_choice: you will surely prevail
  chosen_spanish: y ciertamente podrás
  alternatives_spanish:
  - y sin duda podrás
  - y ciertamente prevalecerás
  - y seguramente triunfarás
  lexicon: HALOT
  rationale: El hebreo dice literalmente «podiendo podrás», una intensificación enfática. El inglés POB optó por «prevail» por el contexto; en español, «podrás» conserva la estructura y el énfasis, dejando la idea de éxito implícita sin sobreinterpretar.
- source_word: וַ/יֵּ֤לֶךְ דָּוִד֙ לְ/דַרְכּ֔/וֹ
  english_pob_choice: Then David went on his way
  chosen_spanish: Entonces David siguió su camino
  alternatives_spanish:
  - Entonces David se fue por su camino
  - Entonces David fue por su camino
  lexicon: HALOT
  rationale: Es una expresión narrativa idiomática de partida. «Siguió su camino» comunica el sentido con naturalidad y sin perder la imagen hebrea del desplazamiento.
- source_word: וְ/שָׁא֖וּל שָׁ֥ב לִ/מְקוֹמֽ/וֹ
  english_pob_choice: and Saul returned to his place
  chosen_spanish: y Saúl volvió a su lugar
  alternatives_spanish:
  - y Saúl regresó a su lugar
  - y Saúl retornó a su lugar
  - y Saúl volvió a su sitio
  lexicon: HALOT
  rationale: «Volvió a su lugar» reproduce con precisión שׁוּב + לִמְקוֹמוֹ, sin añadir «casa» ni otro referente no especificado.
theological_decisions:
- issue: Intensificación verbal en las dos cláusulas finales
  english_pob_reading: You will surely do, and you will surely prevail
  chosen_spanish_reading: Ciertamente harás, y ciertamente podrás
  alternative_spanish_readings:
  - Harás sin duda, y sin duda prevalecerás
  - Ciertamente actuarás, y ciertamente triunfarás
  rationale: 'No hay doctrina controvertida aquí, pero sí una tensión de traducción: el hebreo usa dos infinitivos absolutos para enfatizar certeza. Se decidió preservar la forma enfática en español sin añadir contenido interpretativo como «grandes cosas» o «triunfar», que no aparecen explícitamente en el texto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para eliminar «great things», porque no está explícito en el hebreo, y mantuvo la intensidad de las construcciones enfáticas. La presente redacción española sigue esa revisión: conserva el paralelismo enfático con «ciertamente harás» / «ciertamente podrás» y evita introducir un objeto implícito.'
  spanish_consistency_notes:
  - Se prefirió «Bendito eres tú» por ser una fórmula directa y natural en español, equivalente al valor declarativo del hebreo.
  - Se evitó «Cristo» o terminología eclesiástica tradicional, ya que el verso no contiene lenguaje mesiánico ni cristológico.
  - «Lugar» se mantuvo en singular para seguir el hebreo לִמְקוֹמוֹ sin especificar domicilio o residencia.
