  text: ἀλλὰ αὐτοὶ ἐν ἑαυτοῖς τὸ ἀπόκριμα τοῦ θανάτου ἐσχήκαμεν, ἵνα μὴ πεποιθότες ὦμεν ἐφ’ ἑαυτοῖς ἀλλ’ ἐπὶ τῷ θεῷ τῷ ἐγείροντι τοὺς νεκρούς·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/009.yaml
  text: Indeed, we ourselves had the sentence of death within ourselves, so that we would not rely on ourselves but on God, who raises the dead.
  footnotes:
  - marker: a
    text: Or 'the verdict of death.'
    reason: lexical_alternative
translation:
  language: ko
  text: 참으로 우리는 우리 안에 사형 선고를 받은 것처럼 여겼는데, 이는 우리가 우리 자신을 의지하지 않고 죽은 자들을 일으키시는 하나님을 의지하게 하시려 함이었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόκριμα τοῦ θανάτου
  english_pob_choice: sentence of death
  chosen_korean: 사형 선고
  alternatives_korean:
  - 죽음의 판결
  lexicon: BDAG
  rationale: 법정 용어로 사형 판결을 의미. 한국어 「사형 선고」가 정확한 등가어.
- source_word: πεποιθότες
  english_pob_choice: rely
  chosen_korean: 의지하다
  alternatives_korean:
  - 신뢰하다
  lexicon: BDAG
  rationale: 완료분사로 지속적 신뢰의 상태를 표현. 「의지하다」가 자연스럽다.
- source_word: τῷ ἐγείροντι τοὺς νεκρούς
  english_pob_choice: who raises the dead
  chosen_korean: 죽은 자들을 일으키시는
  alternatives_korean:
  - 죽은 자들을 살리시는
  lexicon: BDAG
  rationale: 부활 신학의 정형 표현. 「일으키시다」가 ἐγείρω의 본뜻에 더 가깝다.
