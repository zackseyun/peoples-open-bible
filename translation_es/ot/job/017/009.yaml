translation:
  language: es
  text: Sin embargo, el justo se aferra a su camino, y el de manos limpias cobra más fuerza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el de manos limpias añade fuerza»; el hebreo dice literalmente «añade fuerza», y también puede entenderse como «crece en fuerza» o, más estrechamente, «gana valor» o «gana coraje».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹאחֵז
  english_pob_choice: Yet ... holds fast
  chosen_spanish: Sin embargo, ... se aferra
  alternatives_spanish:
  - Y ... se aferra
  - Pero ... se aferra
  - '... sostiene firmemente'
  lexicon: HALOT
  rationale: El valor conjuntivo-adversativo de וְ en este contexto se refleja mejor con «Sin embargo» que con un simple «y». El verbo אחז expresa tomar, asir o mantener; «se aferra» comunica perseverancia y conservación firme del camino sin añadir más de lo que el hebreo dice.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «El justo» conserva el singular representativo del hebreo y evita introducir «hombre» sin necesidad textual.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su andar
  - su curso
  lexicon: HALOT
  rationale: «Camino» es una equivalencia natural en español para דֶּרֶךְ y mantiene tanto el sentido literal como el figurado de conducta o curso de vida.
- source_word: וּטֳהָר יָדַיִם
  english_pob_choice: the one with clean hands
  chosen_spanish: el de manos limpias
  alternatives_spanish:
  - el que tiene las manos limpias
  - el limpio de manos
  - el de manos puras
  lexicon: HALOT
  rationale: La expresión es idiomática y alude a inocencia o pureza moral. «El de manos limpias» preserva la imagen concreta y suena natural en español bíblico moderno.
- source_word: יֹסִיף
  english_pob_choice: grows
  chosen_spanish: cobra más fuerza
  alternatives_spanish:
  - aumenta
  - gana fuerza
  - se fortalece
  lexicon: HALOT
  rationale: El hifil de יסף literalmente significa añadir o aumentar. En esta construcción con אֹמֶץ, la idea resultante es incremento de vigor o firmeza; «cobra más fuerza» expresa ese aumento sin volverlo mecánicamente literal.
- source_word: אֹמֶץ
  english_pob_choice: stronger
  chosen_spanish: fuerza
  alternatives_spanish:
  - valor
  - vigor
  - fortaleza
  lexicon: HALOT
  rationale: אֹמֶץ puede denotar fuerza, vigor o valor. Dado que el verbo ya expresa incremento, en español conviene explicitar el sustantivo implícito con «fuerza»; así se mantiene la relación semántica de crecimiento en vigor.
theological_decisions:
- issue: Sentido del contraste inicial
  english_pob_reading: Yet the righteous holds fast
  chosen_spanish_reading: Sin embargo, el justo se aferra
  alternative_spanish_readings:
  - Y el justo se aferra
  - Pero el justo se aferra
  rationale: El hebreo permite una conjunción simple, pero el flujo del versículo en contexto sugiere una transición adversativa o contrastiva. «Sin embargo» conserva esa tensión sin convertirla en una conclusión doctrinal añadida.
  doctrine_reference: Contexto literario de Job; manejo de partículas concesivas/adversativas.
- issue: Valor de יֹסִיף אֹמֶץ
  english_pob_reading: grows stronger
  chosen_spanish_reading: cobra más fuerza
  alternative_spanish_readings:
  - gana fuerza
  - se fortalece
  - añade fuerza
  rationale: El hebreo dice literalmente que «añade fuerza». La POB inglesa reconoció la alternativa «adds strength» y la posibilidad de entender «grows in strength» o «gains courage». «Cobra más fuerza» conserva el incremento sin fijar indebidamente si el matiz principal es fortaleza, vigor o valentía.
  doctrine_reference: No aplica; cuestión léxica y semántica del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés y no introduce cambios sustantivos respecto de la última revisión: mantiene el tono adversativo de apertura, el sustantivo sustantivado «el justo», la imagen idiomática de «manos limpias» y la ambigüedad de יֹסִיף אֹמֶץ mediante una equivalencia española natural con nota alternativa.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «El justo» se usa de forma sustantivada, coherente con la política del proyecto para צַדִּיק.
  - La imagen corporal «manos limpias» se mantiene sin moralizarla en exceso, para preservar el hebreo idiomático.
  - La nota mantiene abierta la tensión entre fuerza, vigor y valor/coraje, como en el audit trail inglés.
