lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición o esperanza precedente; «Porque» conserva con naturalidad la relación causal en español.
- source_word: רָצוּ
  english_pob_choice: delight in
  chosen_spanish: les agradan
  alternatives_spanish:
  - se deleitan en
  - tienen deleite en
  - les complacen
  lexicon: HALOT
  rationale: El verbo expresa agrado o complacencia hacia las piedras de Sion. «Les agradan» mantiene la idea de afecto/aprecio sin forzar una construcción poco natural en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: En el discurso dirigido a Dios, «siervos» es la equivalencia española más natural y reverente; aunque «esclavos» refleja la fuerza léxica, aquí el uso devocional y la construcción poética favorecen «siervos».
- source_word: אֶת אֲבָנֶיהָ
  english_pob_choice: her stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - sus piedras de ella
  - las piedras de ella
  lexicon: HALOT
  rationale: El sufijo femenino se refiere a Sion/Jerusalén personificada. En español, «sus piedras» puede conservar esa referencia sin romper la fluidez; el contexto ya fija la personificación.
- source_word: וְאֶת עֲפָרָהּ
  english_pob_choice: and ... her dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su polvo y escombros
  - su polvo / su escombro
  lexicon: HALOT
  rationale: «Polvo» reproduce el valor literal de עפר y preserva la imagen de ruina. En combinación con el paralelo anterior, la personificación femenina queda implicada en el posesivo.
- source_word: יְחֹנֵנוּ
  english_pob_choice: show favor to
  chosen_spanish: tienen favor para con
  alternatives_spanish:
  - muestran favor a
  - se apiadan de
  - les muestran gracia
  lexicon: HALOT
  rationale: La raíz חנן con objeto «polvo» expresa una respuesta de gracia/favor/compasión. «Tienen favor para con» intenta retener el enlace léxico con «favor/gracia» que el POB en inglés quiso preservar, sin perder el sentido afectivo.
theological_decisions:
- issue: Personificación femenina de Sion/Jerusalén
  english_pob_reading: Rendered with 'her' throughout
  chosen_spanish_reading: Renderizada con posesivos femeninos implícitos en «sus/su» según el contexto
  alternative_spanish_readings:
  - Renderizar explícitamente «de ella»
  - Impersonalizar con «sus/ su» neutro
  rationale: El hebreo usa sufijos femeninos para la ciudad. En español, los posesivos pueden transmitir la misma personificación con mayor naturalidad; no se elimina la referencia femenina, solo se adapta la forma gramatical.
  doctrine_reference: Principio de primacía del idioma original y preservación de la textura poética
- issue: Alcance semántico de יְחֹנֵנוּ frente a «gracia/favor/compasión»
  english_pob_reading: show favor to
  chosen_spanish_reading: tienen favor para con
  alternative_spanish_readings:
  - muestran favor a
  - tienen compasión por
  - son benignos con
  rationale: La forma elegida conserva la idea de favor benigno sin exigir una traducción excesivamente literal que sonaría extraña en español. Se mantiene la tensión entre favor, gracia y compasión que el inglés POB también dejó abierta en su nota.
  doctrine_reference: Precisión léxica y respeto por la amplitud semántica del texto fuente
translation_notes:
  revision_awareness: Coincide con el estado de revisión más reciente indicado como sin cambios; se mantiene la lectura poética y la personificación de Sion/Jerusalén sin introducir expansiones no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el tetragrámaton porque este versículo no lo contiene explícitamente; no aplica en la redacción directa.
  - Se preservó la imagen concreta de «polvo» en paralelo con «piedras», siguiendo la literalidad del hebreo y la decisión del POB inglés.
  - Se mantuvo un estilo bíblico moderno y digno, evitando el calco excesivo mientras se conserva la textura poética.
