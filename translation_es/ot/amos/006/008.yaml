    rationale: El rastro auditado inglés conservó explícitamente la tensión léxica. La versión española eligió «palacios» pero no informa al lector de la alternativa contextual más fortificada.
  - severity: low
    issue: La nota sobre גְּאוֹן ofrece «orgullo» pero no la alternativa auditada «majestad».
    rationale: No es indispensable reproducir todas las alternativas, pero aquí la documentación inglesa preserva de manera relevante la tensión «pride/majesty», y conviene mantenerla en español.
