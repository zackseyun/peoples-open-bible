revisions:
- from: 'Estas fueron las familias de Judá conforme a los registrados de ellas[a]: setenta y seis mil quinientos.'
  to: 'Estas fueron las familias de Judá, según su número[a]: setenta y seis mil quinientos.'
  rationale: Se reemplaza la fórmula poco idiomática 'conforme a los registrados de ellas' por 'según su número', que está explícitamente respaldada por la nota del POB y comunica con claridad la función censal del hebreo. Se mantiene 'familias' por ser aceptable y natural en español general.
