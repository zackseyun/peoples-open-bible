translation:
  language: es
  text: 'Y ella dijo: «Por favor, mi señor, tan cierto como que vives[a], mi señor, yo soy la mujer que estaba aquí junto a ti, orando a Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por tu vida» o, más literalmente, «como vive tu alma»; fórmula de juramento que expresa una súplica ferviente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Permíteme
  - Perdón
  lexicon: HALOT
  rationale: En este contexto, בִּי funciona como partícula de súplica o cortesía, no con sentido locativo. «Por favor» comunica la deferencia y la petición amable en español moderno sin endurecer el tono.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi dueño
  - señor
  lexicon: HALOT
  rationale: Aquí es un tratamiento respetuoso dirigido a Eli, no un título divino. «Mi señor» mantiene la forma de deferencia y evita la asociación con el Nombre divino.
- source_word: חֵי נַפְשְׁךָ
  english_pob_choice: as surely as you live
  chosen_spanish: ¡viva tu alma!
  alternatives_spanish:
  - como vive tu vida
  - por tu vida
  - mientras tu alma viva
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento que apela a la vida de la persona interpelada. Se ha preferido una traducción de fuerza juratoria que conserve la tensión lexical de «alma/vida»; «por tu vida» es más natural, pero borra algo de la literalidad que el POB inglés mantuvo al mencionar «your soul lives» como alternativa.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - esa mujer
  - aquella mujer
  lexicon: HALOT
  rationale: El artículo definido identifica a Hannah como la misma mujer ya vista por Eli. «La mujer» es directo y fiel.
- source_word: הַנִּצֶּבֶת
  english_pob_choice: who stood
  chosen_spanish: que estaba aquí
  alternatives_spanish:
  - que se puso de pie
  - que estuvo de pie
  - que permanecía
  lexicon: HALOT
  rationale: El participio describe su presencia localizada ante Eli. En español, «que estaba aquí» evita la dureza de un calco y encaja bien con la cláusula relativa; la idea de estar de pie queda reforzada por el contexto inmediato y por «junto a ti».
- source_word: עִמְּכָה
  english_pob_choice: beside you
  chosen_spanish: junto a ti
  alternatives_spanish:
  - con vos
  - a tu lado
  - con usted
  lexicon: HALOT
  rationale: En este pasaje la preposición expresa proximidad espacial más que compañía abstracta. «Junto a ti» conserva esa cercanía con naturalidad en español.
- source_word: בָּזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - allí
  lexicon: HALOT
  rationale: El demostrativo con preposición señala el lugar del encuentro previo. «Aquí» es idiomático y mantiene la referencia deíctica.
- source_word: לְהִתְפַּלֵּל
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - orando
  - orando a
  - para orar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción en curso de Hanna ante Yahvé. «Orando» suena natural en registro bíblico y conserva el aspecto durativo; se evita «rezando» por su connotación más específicamente litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en español como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título como «el SEÑOR».
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente, por lo que la traducción mantiene el nombre propio divino y no lo vela con un sustituto funcional. «Yahvé» sigue el estándar editorial del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Fórmula juratoria «חֵי נַפְשְׁךָ»
  english_pob_reading: as surely as you live
  chosen_spanish_reading: ¡viva tu alma!
  alternative_spanish_readings:
  - por tu vida
  - tan cierto como que vives
  - como vive tu alma
  rationale: La expresión hebrea es una fórmula de juramento y ruego solemnizado. Se opta por una traducción que conserve el énfasis formal y la alusión a la «alma/vida» sin volverla una paráfrasis demasiado libre.
  doctrine_reference: 'DOCTRINE.md: Translation principles — preserve lexical tension where the source uses oath formulas'
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra un ajuste reciente de «was standing» a «stood» para mayor naturalidad, sin cambio doctrinal. La redacción española adopta una solución igualmente natural («que estaba aquí junto a ti») mientras conserva la escena de presencia local y la acción de oración. También se preserva la decisión estable de traducir יְהוָה como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «mi señor» para אֲדֹנִי, coherente con un tratamiento humano respetuoso y distinto del Nombre divino.
  - Se evitó «SEÑOR» para יְהוָה, siguiendo la terminología del proyecto y el audit trail inglés.
  - «Orando» conserva el sentido progresivo del participio hebreo sin introducir matices litúrgicos ajenos.
  - La exclamación juratoria se colocó en el discurso directo para reflejar la fuerza retórica del hebreo.
