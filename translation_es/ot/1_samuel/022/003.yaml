revisions:
- from: 'Entonces David se fue de allí a Mizpa[a] de Moab, y dijo al rey de Moab: «Por favor, deja que mi padre y mi madre salgan[b] con ustedes hasta que yo sepa qué hará Dios por mí[c]».'
  to: 'Entonces David se fue de allí a Mizpa[a] de Moab, y dijo al rey de Moab: «Por favor, deja que mi padre y mi madre vengan[b] a quedarse con ustedes hasta que yo sepa qué hará Dios por mí[c]».'
  rationale: 'Se revisa el texto principal para reflejar mejor la decisión auditada del POB sobre יֵצֵא נָא: no solo el movimiento de salida, sino también la permanencia bajo la protección del rey. «Vengan a quedarse con ustedes» suena natural en español y conserva el sentido contextual. También se pulen las notas para que las alternativas sean fieles al hebreo y estén expresadas en español idiomático.'
