translation:
  language: es
  text: Y ahora Yahvé, Dios de Israel, ha despojado[a] a los amorreos de delante de su pueblo Israel; ¿y tú vas a tomar posesión de ella[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ha expulsado’ / ‘ha hecho perder la posesión’. El hebreo expresa el desplazamiento de un pueblo respecto de la tierra.
    reason: lexical_alternative
  - marker: b
    text: O ‘la vas a heredar’ / ‘vas a poseerla’. El verbo hebreo puede expresar recibir o tomar posesión de una tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora, pues
  - Ahora bien
  lexicon: HALOT
  rationale: Mantiene el marcador discursivo y el giro argumentativo de Jefté sin volverlo pesado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito del Tetragrámaton en una forma natural y reverente para el español bíblico de esta serie.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de aposición queda clara en español con el genitivo relacional 'Dios de Israel', sin perder la identificación específica.
- source_word: הוֹרִישׁ
  english_pob_choice: has dispossessed
  chosen_spanish: ha desposeído
  alternatives_spanish:
  - ha expulsado
  - ha hecho perder la posesión
  lexicon: HALOT
  rationale: '''Desposeer'' conserva el valor de tenencia/posesión del verbo en este contexto territorial mejor que un simple ''expulsar''.'
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - al amorreo
  - a los amoritas
  lexicon: HALOT
  rationale: El singular hebreo funciona colectivamente; en español resulta más claro y natural el plural para el grupo étnico.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de delante de la presencia de
  lexicon: HALOT
  rationale: Se conserva el modismo espacial hebreo con una fórmula española comprensible y suficientemente literal.
- source_word: עַמּוֹ יִשְׂרָאֵל
  english_pob_choice: his people Israel
  chosen_spanish: su pueblo Israel
  alternatives_spanish:
  - su pueblo, Israel
  - el pueblo de él, Israel
  lexicon: HALOT
  rationale: El posesivo remite a Yahvé; 'su pueblo Israel' mantiene la relación y la identificación appositiva.
- source_word: וְאַתָּה
  english_pob_choice: and are you
  chosen_spanish: ¿y tú...
  alternatives_spanish:
  - ¿y tú eres...
  - ¿y tú vas a...
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis polémico; en español se mantiene con el sujeto explícito antes del verbo.
- source_word: תִּירָשֶׁנּוּ
  english_pob_choice: to possess it
  chosen_spanish: vas a poseerlo
  alternatives_spanish:
  - lo vas a poseer
  - lo vas a heredar
  - vas a tomar posesión de él
  lexicon: HALOT
  rationale: Se conserva la fuerza posesiva/territorial del verbo. El futuro perifrástico refleja bien la pregunta retórica y la expectativa implícita.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La serie POB mantiene el nombre propio divino en transliteración; en español 'Yahvé' es la forma estable y legible que evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del verbo ירש en contexto de posesión territorial
  english_pob_reading: to possess it / to take possession of it
  chosen_spanish_reading: poseerlo
  alternative_spanish_readings:
  - heredarlo
  - tomar posesión de él
  rationale: El contexto habla de territorio y herencia legítima. 'Poseerlo' mantiene la pregunta retórica breve; la alternativa 'tomar posesión de él' queda implícita en el vocabulario de la nota.
  doctrine_reference: HALOT ירש, hiphil/qal; contexto de tenencia de tierra
