translation:
  language: es
  text: y a los reyes que estaban en el norte, en la región montañosa, en el Arabá al sur de Quinéret, en la llanura, y en las alturas de Dor[a] hacia el oeste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los distritos de Dor», «en la región de Dor» o «en las laderas de Dor». El término hebreo es poco común y su sentido topográfico preciso se discute.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «desde el mar»; en el uso geográfico hebreo, esto suele significar «hacia el oeste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - a
  - y para
  lexicon: HALOT
  rationale: La conjunción más la preposición continúan la lista del versículo anterior y marcan que estos reyes también quedan incluidos en el alcance del llamado o referencia; en español, «y a» reproduce esa continuación de forma natural.
- source_word: הַמְּלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los gobernantes
  - los monarcas
  lexicon: HALOT
  rationale: מֶלֶךְ designa de manera directa reyes; «reyes» mantiene la precisión y evita ampliar indebidamente el sentido.
- source_word: אֲשֶׁר מִצְּפוֹן
  english_pob_choice: who were in the north
  chosen_spanish: que estaban en el norte
  alternatives_spanish:
  - que eran del norte
  - que estaban al norte
  lexicon: HALOT
  rationale: El relativo identifica la ubicación geográfica de esos reyes. «Que estaban en el norte» es natural en español y conserva el valor locativo.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en la tierra montañosa
  lexicon: HALOT
  rationale: Aquí הַר funciona como región/topografía colectiva más que como una montaña aislada. «Región montañosa» comunica ese valor sin perder la referencia territorial.
- source_word: וּבָעֲרָבָה
  english_pob_choice: in the Arabah
  chosen_spanish: en el Arabá
  alternatives_spanish:
  - en la Arabá
  - en la llanura del Arabá
  lexicon: HALOT
  rationale: عֲרָבָה es un topónimo/geografía estable; se conserva como «Arabá» para no borrar el nombre regional.
- source_word: נֶגֶב כִּנֲרוֹת
  english_pob_choice: south of Kinneroth
  chosen_spanish: al sur de Quinéret
  alternatives_spanish:
  - al sur de Kinnerot
  - al sur de Quinéret
  lexicon: HALOT
  rationale: En este contexto נֶגֶב es direccional, no el nombre técnico «Néguev». Se traduce como ubicación relativa. «Quinéret» mantiene el topónimo de forma reconocible en español.
- source_word: וּבַשְּׁפֵלָה
  english_pob_choice: in the lowland
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en la Sefelá
  - en la zona baja
  lexicon: HALOT
  rationale: שְׁפֵלָה designa la franja baja/foothill de Judá. «Llanura» es una equivalencia española comprensible; se evita «Sefelá» en el texto principal por menor transparencia para lectores generales.
- source_word: וּבְנָפ֥וֹת דּוֹר
  english_pob_choice: in the heights of Dor
  chosen_spanish: en las alturas de Dor
  alternatives_spanish:
  - en los distritos de Dor
  - en las laderas de Dor
  - en la región de Dor
  lexicon: HALOT
  rationale: נָפוֹת es un término difícil y debatido; la POB inglesa preserva la incertidumbre con una solución topográfica. «Alturas de Dor» sigue esa línea, manteniendo el carácter locativo sin fijar de manera excesiva el matiz exacto.
- source_word: מִיָּם
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - al oeste
  - desde el mar
  lexicon: HALOT
  rationale: יָם puede funcionar direccionalmente como «oeste» en la geografía hebrea. «Hacia el oeste» reproduce el valor direccional preferido por la POB inglesa sin perder la relación con el mar implícita en el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: mantiene la secuencia locativa y conserva la solución direccional para יָם como «hacia el oeste», evitando una traducción más literal que oscurezca el patrón geográfico. También refleja la preferencia por una formulación consistente para las frases de ubicación, análoga al cambio inglés de «on» a «in» en las expresiones topográficas.'
  spanish_consistency_notes:
  - Se mantuvo «Arabá» como nombre geográfico estable, no como «desierto» o «llanura» genérica, para respetar el término regional.
  - Se evitó «Sefelá» en el cuerpo principal porque el texto inglés opta por una equivalencia accesible («lowland»); la nota conserva la alternativa técnica.
  - Se prefirió «alturas de Dor» para acompañar la solución inglesa y no resolver de forma dogmática el término debatido נָפוֹת.
  - «Hacia el oeste» sigue el valor direccional del hebreo מִיָּם y la decisión auditada en inglés.
