translation:
  language: es
  text: Y puso a las siervas[a] y a sus hijos e hijas primero, y a Lea y a sus hijos e hijas detrás de ellas, y a Raquel y a José al final.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las criadas»; el hebreo puede designar mujeres de la casa de condición subordinada y, en algunos contextos, puede superponerse con «mujeres esclavas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: he put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso en orden
  - situó
  lexicon: HALOT
  rationale: שׂוּם expresa poner/colocar/establecer. «Puso» es natural en español moderno y conserva el carácter narrativo de la disposición por orden.
- source_word: הַשְּׁפָחוֹת
  english_pob_choice: the female servants
  chosen_spanish: las siervas
  alternatives_spanish:
  - las sirvientas
  - las criadas
  - las esclavas
  lexicon: HALOT
  rationale: El hebreo puede referirse a mujeres de condición doméstica subordinada y, según contexto, también a esclavas. «Siervas» mantiene la ambigüedad social sin forzar un matiz más fuerte que el contexto inmediato no exige; se deja constancia de la alternativa de esclavitud en la nota.
- source_word: יַלְדֵיהֶן
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  - sus hijos e hijas
  lexicon: HALOT
  rationale: Aquí el sustantivo es amplio, pero en español narrativo «hijos» puede abarcar a la descendencia inmediata del grupo; evita una expansión innecesaria. La alternativa «hijos e hijas» sería más explícita, pero el texto no la marca.
- source_word: רִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - al frente
  lexicon: HALOT
  rationale: El adverbio femenino singular funciona adverbialmente para la primera posición en la secuencia. «Primero» es la forma española más directa y natural.
- source_word: וִילָדֶיהָ
  english_pob_choice: and her children
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus niños
  - y a su descendencia
  lexicon: HALOT
  rationale: Se conserva la repetición del paralelo hebreo con un complemento directo coordinado. «Hijos» mantiene la referencia amplia a la descendencia inmediata sin sobreinterpretar.
- source_word: אַחֲרֹנִים
  english_pob_choice: behind them / last
  chosen_spanish: detrás de ellas
  alternatives_spanish:
  - después de ellas
  - tras ellas
  - al final
  lexicon: HALOT
  rationale: En la posición intermedia, el hebreo sugiere colocación posterior respecto del primer grupo. «Detrás de ellas» reproduce mejor la relación espacial que «después» o «al final» en ese tramo.
- source_word: רָחֵל וְאֶת יוֹסֵף אַחֲרֹנִים
  english_pob_choice: Rachel and Joseph last
  chosen_spanish: Raquel y a José al final
  alternatives_spanish:
  - Raquel y José detrás de todos
  - Raquel y José los últimos
  lexicon: HALOT
  rationale: Para el cierre de la lista, «al final» comunica correctamente el último lugar en el orden. Se mantiene la coordinación con el paralelismo del hebreo y el sentido narrativo del arreglo.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético tal como está en el paquete de fuente, y la redacción inglesa auditada coincide sustancialmente con esa secuencia: siervas/children first, Leah behind them, Rachel and Joseph last. No se detectaron revisiones textuales ni divergencias de sentido que exigieran ajuste adicional.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «siervas» por la ambigüedad lexical de שִׁפְחָה; no se usó «esclavas» en el texto principal para no cerrar indebidamente el rango semántico.
  - 'Se preservó la progresión espacial del hebreo: primero / detrás de ellas / al final.'
  - Se usó «hijos» en sentido inclusivo de descendencia inmediata, coherente con el uso narrativo del hebreo y con la traducción auditada en inglés.
