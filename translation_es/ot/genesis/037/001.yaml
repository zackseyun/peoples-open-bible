    issue: «moradas» no transmite el matiz de מְגוּרֵי
    rationale: מְגוּרֵי deriva de גור y denota residencia como forastero o estancia temporal. «Moradas» solo indica lugares de habitación y pierde el componente de sojornar.
  - severity: medium
    issue: La construcción «la tierra de las moradas de su padre» es poco natural en español
    rationale: Aunque intenta seguir el genitivo del hebreo y del inglés revisado, en español resulta rígida y extraña. Una reformulación más natural puede preservar el sentido sin paraphrasear en exceso.
  - severity: low
    issue: La nota al pie debe alinearse con la revisión del texto principal
    rationale: Si se mejora el cuerpo del texto, la nota debe conservar la alternativa más formal/literal y usar el mismo marcador correctamente anclado.
  revised_spanish_text: Ahora Jacob habitó en la tierra donde su padre había vivido como forastero[a], en la tierra de Canaán.
