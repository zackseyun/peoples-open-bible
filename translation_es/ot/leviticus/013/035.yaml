revisions:
- from: Pero si la tiña[a] se extiende de veras en la piel después de su purificación,
  to: Pero si la erupción escamosa[a] realmente se extiende en la piel después de su purificación,
  rationale: Se reemplaza «tiña» por «erupción escamosa» para mantener la cautela descriptiva del original y del expediente inglés, evitando un diagnóstico médico demasiado estrecho. Se cambia «de veras» por «realmente» para reflejar el énfasis del infinitivo absoluto en un español más natural y de registro más digno. Se conserva «después de su purificación» como formulación breve y adecuada al contexto ritual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:12Z'
