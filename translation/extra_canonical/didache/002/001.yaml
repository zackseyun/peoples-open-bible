  text: Δευτέρα δὲ ἐντολὴ τῆς διδαχῆς Οὐ φονεύσεις, οὐ μοιχεύσεις, οὐ παιδοφθορήσεις,
    οὐ πορνεύσεις, οὐ κλέψεις, οὐ μαγεύσεις, οὐ φαρμακεύσεις, οὐ φονεύσεις τέκνον
    ἐν φθορᾷ οὐδὲ γεννηθὲν ἀποκτενεῖς. Οὐκ ἐπιθυμήσεις τὰ τοῦ πλησίον, οὐκ ἐπιορκήσεις,
    οὐ ψευδομαρτυρήσεις, οὐ κακολογήσεις, οὐ μνησικακήσεις. Οὐκ ἔσῃ διγνώμων οὐδὲ
    δίγλωσσος· παγὶς γὰρ θανάτου ἡ διγλωσσία. Οὐκ ἔσται ὁ λόγος σου ψευδής, οὐ κενός,
    ἀλλὰ μεμεστωμένος πράξει. Οὐκ ἔσῃ πλεονέκτης οὐδὲ ἅρπαξ οὐδὲ ὑποκριτὴς οὐδὲ κακοήθης
    οὐδὲ ὑπερήφανος. Οὐ λήψῃ βουλὴν πονηρὰν κατὰ τοῦ πλησίον σου. Οὐ μισήσεις πάντα
    ἄνθρωπον, ἀλλὰ οὓς μὲν ἐλέγξεις, περὶ δὲ ὧν προσεύξῃ, οὓς δὲ ἀγαπήσεις ὑπὲρ τὴν
    ψυχήν σου.
