id: JOS.5.14
reference: Joshua 5:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לֹ֗א כִּ֛י אֲנִ֥י שַׂר צְבָֽא יְהוָ֖ה עַתָּ֣ה בָ֑אתִי וַ/יִּפֹּל֩ יְהוֹשֻׁ֨עַ אֶל פָּנָ֥י/ו אַ֨רְצָ/ה֙ וַ/יִּשְׁתָּ֔חוּ וַ/יֹּ֣אמֶר ל֔/וֹ מָ֥ה אֲדֹנִ֖/י מְדַבֵּ֥ר אֶל עַבְדּֽ/וֹ׀־־־־׃
translation:
  text: He said[a], “No; rather, I have now come as the commander of the army of Yahweh.” Then Joshua fell with his face to the ground and bowed down, and said to him[b], “What is my lord saying to his servant?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Neither; I have now come as the commander of the LORD’s host.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered “worshiped”; here it is translated “bowed down” to preserve the act without resolving the figure’s identity from this verse alone.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Neither
  lexicon: HALOT
  rationale: Direct negation answering Joshua’s prior either/or question. 'No' is the plainest English response; 'Neither' is interpretive and can be preserved as an alternative because the sense is that he is on neither side as such.
- source_word: כִּי
  chosen: rather
  alternatives:
  - but
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces a corrective/explanatory statement after the negation. ''Rather'' best captures the force in idiomatic English: not that option, but this identity.'
- source_word: שַׂר
  chosen: commander
  alternatives:
  - captain
  - prince
  - chief
  lexicon: HALOT
  rationale: In military context with צְבָא, 'commander' is the most natural modern English rendering. 'Captain' is traditional but narrower/archaic; 'prince' would mislead here.
- source_word: צְבָא יְהוָה
  chosen: the army of the LORD
  alternatives:
  - the host of the LORD
  - the LORD's army
  lexicon: HALOT
  rationale: צָבָא can mean army/host. 'Army of the LORD' is clear modern English and preserves the military sense. 'Host' is traditional but less accessible. The divine name follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַתָּה בָאתִי
  chosen: I have now come
  alternatives:
  - now I have come
  - I have come now
  lexicon: HALOT
  rationale: English present perfect communicates the completed arrival with present relevance. Word order chosen for natural English while retaining the temporal adverb 'now'.
- source_word: פָּנָיו אַרצה
  chosen: facedown to the ground
  alternatives:
  - on his face to the earth
  - with his face to the ground
  lexicon: HALOT
  rationale: The idiom means prostration with face toward the ground. 'Facedown to the ground' is natural and vivid without losing the physical posture.
- source_word: וַיִּשְׁתָּחוּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated himself
  lexicon: HALOT
  rationale: The verb can denote bowing in reverence or worship. 'Bowed down' preserves the physical act without prematurely resolving whether the act should be interpreted specifically as worship in a theological sense.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - Lord
  lexicon: HALOT
  rationale: With first-person suffix and in direct address to this figure, 'my lord' is the most straightforward respectful address. Lowercase avoids importing a stronger identification than the verse itself states.
- source_word: מְדַבֵּר אֶל עַבְדּוֹ
  chosen: is saying to his servant
  alternatives:
  - speaks to his servant
  - would say to his servant
  lexicon: HALOT
  rationale: The participle gives an ongoing/imperfective sense; 'is saying' fits the immediate dialogue. 'His servant' preserves the self-humbling address of Joshua.
