base_translation:
  language: en
  yaml_path: translation/ot/leviticus/009/009.yaml
  text: And Aaron’s sons brought the blood to him[a], and he dipped his finger in the blood and put it on the horns of the altar[c][b], and he poured out the blood at the base of the altar.
