translation:
  language: es
  text: Él recordó su pacto por causa de ellos[a], y cedió según la abundancia de su amor leal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cambió de parecer» o «tuvo compasión». El verbo hebreo puede expresar la idea de ceder, cambiar el curso de la acción o ser movido a piedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: He remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - se acordó de
  - lo tuvo presente
  lexicon: HALOT
  rationale: En contexto de pacto, זכר no es mera memoria mental sino recordar con implicación de actuar conforme al compromiso previo. «Se acordó» expresa bien esa idea en español natural y mantiene el valor relacional del verbo.
- source_word: לָהֶם
  english_pob_choice: for their sake
  chosen_spanish: por ellos
  alternatives_spanish:
  - para ellos
  - a favor de ellos
  - por su causa
  lexicon: HALOT
  rationale: La preposición ל con sufijo pronominal puede expresarse idiomáticamente como beneficio o relación en favor de alguien. «Por ellos» conserva la referencia a su beneficio sin sonar forzado.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su tratado
  - su convenio
  lexicon: HALOT
  rationale: בְּרִית es el término bíblico de pacto/alianza. «Pacto» es claro y bíblicamente adecuado en español; «alianza» también es posible, pero «pacto» evita una lectura más moderna o política.
- source_word: וַיִּנָּחֵם
  english_pob_choice: and relented
  chosen_spanish: se contuvo
  alternatives_spanish:
  - se arrepintió
  - cambió de parecer
  - se apaciguó
  lexicon: HALOT
  rationale: 'El nifal de נחם puede indicar aliviarse, ceder o relentir. Aquí, tras recordar el pacto, la idea es que Dios no ejecuta el juicio pleno: «se contuvo» mantiene la tensión antropopática sin sugerir error o ignorancia en Dios.'
- source_word: כְּרֹב
  english_pob_choice: according to the abundance of
  chosen_spanish: según la abundancia de
  alternatives_spanish:
  - conforme a la abundancia de
  - de acuerdo con la abundancia de
  - según lo grande de
  lexicon: HALOT
  rationale: La construcción כ + רֹב expresa medida o proporción. «Según la abundancia de» reproduce esa relación proporcional de forma clara y fiel.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su bondad fiel
  lexicon: HALOT
  rationale: חסד es un término de lealtad amorosa y fidelidad de pacto. «Amor leal» comunica bien la combinación de afecto y constancia; evita reducirlo a simple «misericordia».
theological_decisions:
- issue: Lenguaje antropopático en וַיִּנָּחֵם
  english_pob_reading: and relented
  chosen_spanish_reading: y se contuvo
  alternative_spanish_readings:
  - y cambió de parecer
  - y tuvo compasión
  - y se arrepintió
  rationale: 'Se preserva la tensión teológica del hebreo: se describe un cambio real en la manera en que Dios trata al pueblo, sin implicar que Dios haya cometido un error o recibido información nueva. «Se contuvo» evita tanto la literalidad problemática de «se arrepintió» como el cierre interpretativo excesivo.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó acuerdo alto y no introdujo cambios; por eso se mantiene la línea de decisión del borrador inglés: recordar el pacto en sentido de acción de gracia y relentar/contenerse ante el pueblo, sin suavizar la tensión antropopática.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Pacto» se usó como término bíblico estable para בְּרִית.
  - «Amor leal» mantiene la fuerza de חסד sin recurrir a un calco arcaizante.
