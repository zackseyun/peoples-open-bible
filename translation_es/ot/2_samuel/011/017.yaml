translation:
  language: es
  text: Los hombres de la ciudad salieron[a] y pelearon contra Joab, y algunos del pueblo entre los siervos de David cayeron[b]; Urías el hitita también murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salieron de la ciudad» para וַיֵּצְאוּ.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «del pueblo, de los siervos de David», una expresión partitiva que indica que cayeron algunos de los hombres de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - fueron hacia afuera
  lexicon: HALOT
  rationale: יצא expresa salir o ir/venir afuera. En español, «salieron» conserva el movimiento narrativo sin sobrecargarlo; el contexto de combate hace claro que la salida es para enfrentar al enemigo.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los hombres de la ciudadela
  - los varones de la ciudad
  lexicon: HALOT
  rationale: La construcción nominal hebrea es literalmente «hombres de la ciudad». «Hombres» mantiene el referente masculino de combatientes y evita una paráfrasis innecesaria.
- source_word: וַיִּלָּחֲמוּ אֶת יוֹאָב
  english_pob_choice: fought against Joab
  chosen_spanish: pelearon contra Joab
  alternatives_spanish:
  - combatieron contra Joab
  - lucharon contra Joab
  lexicon: HALOT
  rationale: El valor hostil del verbo y את con nombre personal se expresa bien con «contra». «Pelearon» es natural en español y conserva el sentido bélico directo.
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayeron muertos
  - fueron abatidos
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «caer» como idiomático de bajas en batalla. «Cayeron» preserva esa imagen sin explicitar más de lo que el texto dice.
- source_word: מִן הָעָם
  english_pob_choice: some of the people
  chosen_spanish: algunos de entre el pueblo
  alternatives_spanish:
  - algunos del pueblo
  - algunos del pueblo en combate
  lexicon: HALOT
  rationale: מן es partitivo aquí, «de entre». «Algunos de entre el pueblo» mantiene esa relación interna y evita borrar la estructura hebrea.
- source_word: מֵעַבְדֵי דָוִד
  english_pob_choice: among David’s servants
  chosen_spanish: de entre los siervos de David
  alternatives_spanish:
  - entre los servidores de David
  - de los siervos de David
  lexicon: HALOT
  rationale: עבדים puede ser «siervos» en contexto real/militar. Se conserva «siervos» por transparencia léxica, y «de entre» explicita el partitivo del hebreo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: גם añade a Urías a la lista de muertos. «También» reproduce esa adición de forma simple y directa.
- source_word: אוּרִיָּה הַחִתִּי
  english_pob_choice: Uriah the Hittite
  chosen_spanish: Urías el hitita
  alternatives_spanish:
  - Uría el hitita
  - Urías, el hitita
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma bíblica usual en español («Urías») y la designación étnica «el hitita» como equivalente transparente de הַחִתִּי.
theological_decisions:
- issue: Ninguna tensión doctrinal explícita; mantener la crudeza narrativa de la muerte de Urías
  english_pob_reading: Uriah the Hittite also died.
  chosen_spanish_reading: Urías el hitita también murió.
  alternative_spanish_readings:
  - Urías el hitita también cayó
  - Urías el hitita también fue muerto
  rationale: El verso culmina con la muerte de Urías sin comentario interpretativo. «Murió» preserva la afirmación directa del hebreo y del POB inglés, sin suavizar ni ampliar la escena.
  doctrine_reference: Narrativa histórica, sin afirmación doctrinal adicional
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «among David’s servants» para expresar con más naturalidad el partitivo de מֵעַבְדֵי דָוִד. La versión española conserva esa misma fuerza con «de entre los siervos de David», y mantiene el cierre narrativo con «también murió» como equivalente de גַּם + וַיָּמָת.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto cuando corresponda; este verso no contiene el Tetragrámaton.
  - Se prefirió «siervos» para עבדים por transparencia léxica, en línea con el criterio del proyecto cuando el contexto real/militar lo permite.
  - Se usó «el hitita» como designación étnica estable y bíblica en español.
  - La estructura partitiva «de entre» se conservó dos veces para reflejar el hebreo sin ocultar la relación textual.
