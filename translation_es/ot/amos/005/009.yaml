revisions:
- from: Él que hace venir una destrucción repentina sobre el fuerte[a], de modo que la destrucción viene sobre la fortaleza.
  to: El que trae destrucción repentina sobre el fuerte[a], de modo que la destrucción viene sobre la fortaleza[b].
  rationale: Se corrige «Él que» a «El que» para reflejar con naturalidad la construcción participial hebrea, y se cambia «hace venir una destrucción repentina» por «trae destrucción repentina» para un español más claro y digno sin pérdida de sentido. Además, se añade la nota léxica para מִבְצָר conforme al expediente inglés.
