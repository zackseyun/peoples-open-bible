translation:
  language: es
  text: 'Y no tardé hasta que Dios me mostró su insolencia[a]: traspasado[b] en los montes de Egipto, más despreciado que el más insignificante[c] en tierra y mar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Insolencia»; también puede entenderse como «arrogancia» o «ultraje».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «traspasado en los montes de Egipto». El participio describe la caída violenta del opresor, no a «su insolencia».
    reason: lexical_alternative
  - marker: c
    text: El griego es muy comprimido, literalmente algo como «más despreciado que el más insignificante»; el sentido es el de una humillación extrema.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐχρόνισα
  english_pob_choice: I did not delay
  chosen_spanish: Y no tardé
  alternatives_spanish:
  - Y no me demoré
  - Y no tardé mucho
  lexicon: LSJ
  rationale: El verbo expresa no demorarse; en español, «no tardé» es natural, elevado y fiel. Mantiene la idea de prontitud sin añadir la interpretación de que el hablante “esperó poco tiempo”.
- source_word: ὕβριν
  english_pob_choice: arrogance / insolence / outrage
  chosen_spanish: insolencia
  alternatives_spanish:
  - arrogancia
  - ultraje
  - atrevimiento
  lexicon: LSJ
  rationale: El término griego puede abarcar arrogancia insolente o conducta abusiva. «Insolencia» conserva el tono moral fuerte y funciona bien en el contexto de humillación del orgulloso, sin sobretraducir hacia un término demasiado técnico.
- source_word: ἐκκενεκεντημένον
  english_pob_choice: pierced through
  chosen_spanish: atravesado
  alternatives_spanish:
  - perforado
  - traspasado
  - herido de muerte
  lexicon: LSJ
  rationale: El participio describe una acción violenta de atravesar/perforar. «Atravesado» transmite la imagen concreta y evita forzar un detalle no explícito sobre el instrumento o la causa exacta.
- source_word: ἐπὶ τῶν ὀρέων Αἰγύπτου
  english_pob_choice: on the mountains of Egypt
  chosen_spanish: en los montes de Egipto
  alternatives_spanish:
  - sobre los montes de Egipto
  - en las montañas de Egipto
  - en la sierra de Egipto
  lexicon: LSJ
  rationale: «Montes» reproduce de forma directa ὄρη y suena más natural en español bíblico que «montañas» en este contexto. Se conserva la localización literal del texto.
- source_word: ὑπὲρ ἐλάχιστον
  english_pob_choice: more despised than the least person
  chosen_spanish: más despreciado que el más pequeño
  alternatives_spanish:
  - más despreciado que el menor
  - por encima de lo mínimo, despreciado
  - más despreciado que el más insignificante
  lexicon: LSJ
  rationale: La comparación griega es elíptica. En español, «el más pequeño» comunica el sentido de extrema disminución y conserva la fuerza comparativa sin añadir «persona», que no está en el griego.
- source_word: ἐξουδενωμένον
  english_pob_choice: utterly despised / made more despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - menospreciado
  - tratado como nada
  - puesto en total desprecio
  lexicon: LSJ
  rationale: El participio expresa ser rebajado al desprecio o a la nulidad. Unido a la comparación anterior, «más despreciado» mantiene el valor intensivo sin duplicar la idea con una perífrasis excesiva.
theological_decisions:
- issue: Participio masculino referido al personaje y no a «su insolencia»
  english_pob_reading: The Greek participle refers to the man himself; the prior English draft was revised to avoid making 'arrogance' the antecedent of 'pierced through'.
  chosen_spanish_reading: «atravesado» se entiende referido al mismo sujeto implícito que aparece en la escena, no a «su insolencia»
  alternative_spanish_readings:
  - «su insolencia, atravesada»
  - '«su insolencia: él fue atravesado»'
  rationale: 'El griego presenta una incongruencia si se toma el participio como referido al sustantivo abstracto ὕβριν. La traducción española debe respetar la corrección del sentido: se trata del hombre humillado y abatido, no de su insolencia literalmente atravesada.'
  doctrine_reference: Ps. de Salomón 2:30; revisión gramatical del participio según el análisis del original griego
translation_notes:
  revision_awareness: Se ha seguido el último estado revisado del inglés auditado en cuanto a la corrección gramatical del participio («he was pierced through» implícito), pero se ha preferido una solución española sin añadir una cópula explícita que el griego no exige. También se ha recuperado la fuerza lexical de ὕβριν con una opción española que conserva el matiz de insolencia/arrogancia y no diluye la escena.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se conserva la imaginería literal de violencia y humillación sin suavizarla.
  - No se usa «Cristo» ni terminología cristológica; el texto no la requiere.
  - La comparación final se resuelve de forma comprensible en español sin introducir «persona», que no aparece en el griego.
