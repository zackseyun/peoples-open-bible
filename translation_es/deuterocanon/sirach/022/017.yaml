translation:
  language: es
  text: Un corazón firmemente establecido sobre una comprensión inteligente[a] es como un acabado sobre un muro pulido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen griega es arquitectónica y algo comprimida: literalmente, algo como «un corazón hecho firme sobre un pensamiento de entendimiento, como el acabado de un muro arenado, alisado/emplastado». El matiz exacto de los términos de la superficie del muro es incierto; el punto es la estabilidad y la buena construcción.'
    reason: cultural_note
lexical_decisions:
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: LSJ
  rationale: En la sabiduría bíblica, καρδία designa el centro interior de pensamiento, voluntad y decisión. «Corazón» conserva ese campo antropológico bíblico en español y mantiene la imagen breve y natural.
- source_word: ἠδρασμένη
  english_pob_choice: firmly established
  chosen_spanish: firmemente establecido
  alternatives_spanish:
  - establecido
  - hecho firme
  - afirmado
  lexicon: LSJ
  rationale: El participio expresa algo hecho estable o firme. «Firmemente establecido» reproduce el estado resultante con un tono idiomático y claro en español.
- source_word: ἐπὶ
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - con base en
  - apoyado en
  lexicon: LSJ
  rationale: La preposición señala base o soporte de la firmeza del corazón. «Sobre» conserva la imagen espacial sin añadir demasiada interpretación.
- source_word: διανοίας συνέσεως
  english_pob_choice: intelligent understanding
  chosen_spanish: un entendimiento inteligente
  alternatives_spanish:
  - un entendimiento discernidor
  - una comprensión inteligente
  - un discernimiento comprensivo
  lexicon: LSJ
  rationale: 'La cadena genitiva es comprimida: διανοία aporta la idea de pensamiento/mente y σύνεσις la de entendimiento o discernimiento. «Entendimiento inteligente» conserva ambos componentes con naturalidad. Se antepone el artículo para que la frase funcione fluidamente como base de la metáfora.'
- source_word: ὡς
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - como
  - tal como
  lexicon: LSJ
  rationale: Introduce una comparación directa. «Es como» la expresa de modo claro y estándar en español.
- source_word: κόσμος
  english_pob_choice: decoration
  chosen_spanish: decoración de estuco
  alternatives_spanish:
  - ornamento
  - adorno
  - acabado
  lexicon: LSJ
  rationale: En este contexto arquitectónico, κόσμος apunta a un revestimiento o acabado del muro más que a un adorno meramente ornamental. «Decoración de estuco» mantiene la imagen de una capa aplicada al muro y sigue la lectura del POB inglés que subraya el elemento constructivo.
- source_word: ψαμμωτός
  english_pob_choice: polished
  chosen_spanish: estuco
  alternatives_spanish:
  - arenado
  - emplastado con arena
  - revocado con arena
  lexicon: LSJ
  rationale: El término es raro y remite a arena (ψάμμος), por lo que describe una superficie tratada con arena o un revestimiento arenoso. En español, la secuencia completa se resuelve mejor como una imagen arquitectónica de estuco sobre pared pulida; el matiz exacto del tratamiento superficial queda recogido en la nota textual.
- source_word: τοίχου
  english_pob_choice: wall
  chosen_spanish: pared
  alternatives_spanish:
  - muro
  - tabique
  lexicon: LSJ
  rationale: «Pared» es el equivalente más natural en español para la imagen doméstico-arquitectónica, sin perder el sentido de muro o superficie vertical.
- source_word: ξυστοῦ
  english_pob_choice: polished
  chosen_spanish: pulida
  alternatives_spanish:
  - alisada
  - lustrada
  - raspada y alisada
  lexicon: LSJ
  rationale: El adjetivo sugiere una superficie raspada, alisada o terminada. «Pulida» funciona bien en español para una pared acabada y conserva la idea de superficie trabajada.
translation_notes:
  revision_awareness: Se ajustó la versión española para que cada nota tenga anclaje explícito en el texto y para reflejar la metáfora arquitectónica sin repetir mecánicamente el inglés. También se evitó dejar una nota sin marcador, corrigiendo el problema de validación previo.
  spanish_consistency_notes:
  - Se mantiene «corazón» para καρδία por coherencia con el antropologismo bíblico del libro sapiencial.
  - Se usa «entendimiento inteligente» como solución compacta para διανοίας συνέσεως, evitando reducir la frase a solo «comprensión».
  - 'Se conserva la metáfora de construcción con vocabulario natural para español: «decoración de estuco» y «pared pulida».'
  - La nota textual marca la incertidumbre léxica de los términos arquitectónicos griegos sin sobreespecificar el revestimiento.
