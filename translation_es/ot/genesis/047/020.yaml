translation:
  language: es
  text: Entonces José compró toda la tierra de Egipto para Faraón[a], porque todo egipcio vendió su campo, ya que el hambre era severa sobre ellos[b]; y la tierra pasó a ser de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adquirió toda la tierra de Egipto para Faraón».
    reason: lexical_alternative
  - marker: b
    text: Lit. «el hambre fue fuerte sobre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֶן
  english_pob_choice: bought
  chosen_spanish: compró
  alternatives_spanish:
  - adquirió
  - compró
  lexicon: HALOT
  rationale: קנה en este contexto económico expresa una adquisición por compra. «Compró» es el equivalente más natural y directo en español, y mantiene la relación con la venta de las tierras.
- source_word: אַדְמַת
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  lexicon: HALOT
  rationale: אַדְמָה puede significar tierra/suelo/terreno. Aquí se trata de propiedad agrícola y territorial; «tierra» comunica bien ese alcance en español bíblico contemporáneo.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt / Egyptian
  chosen_spanish: Egipto / egipcio
  alternatives_spanish:
  - Egipto / egipcios
  lexicon: HALOT
  rationale: La primera ocurrencia designa el país en relación con la tierra; la segunda, al pueblo colectivo que vende sus campos. «Egipcio» en singular distributivo sigue el hebreo con אִישׁ y evita una repetición menos fluida.
- source_word: לְפַרְעֹה
  english_pob_choice: for Pharaoh
  chosen_spanish: para Faraón
  alternatives_spanish:
  - en favor de Faraón
  - para propiedad de Faraón
  lexicon: HALOT
  rationale: La preposición ל indica destinatario/beneficiario de la compra. «Para Faraón» conserva esa función sin introducir una paráfrasis más interpretativa.
- source_word: מָכְרוּ ... אִישׁ שָׂדֵהוּ
  english_pob_choice: every Egyptian sold his field
  chosen_spanish: todo egipcio vendió su campo
  alternatives_spanish:
  - cada egipcio vendió su campo
  - los egipcios vendieron, cada uno su campo
  lexicon: HALOT
  rationale: El hebreo combina un sujeto colectivo con valor distributivo y אִישׁ. «Todo egipcio» reproduce ese matiz distributivo de manera idiomática en español.
- source_word: שָׂדֵהוּ
  english_pob_choice: his field
  chosen_spanish: su campo
  alternatives_spanish:
  - su tierra de labor
  - su parcela
  lexicon: HALOT
  rationale: שָׂדֶה es un campo cultivado. «Campo» es la equivalencia directa y adecuada al contexto agrícola.
- source_word: חָזַק ... הָרָעָב
  english_pob_choice: the famine was severe
  chosen_spanish: el hambre se había agravado
  alternatives_spanish:
  - el hambre se había hecho fuerte
  - el hambre era muy intensa
  lexicon: HALOT
  rationale: חזק con רעב literalmente es «ser fuerte»/«hacerse fuerte». En español, con «hambre» la forma natural y fiel es «se había agravado», que comunica intensidad creciente sin perder la fuerza del hebreo.
- source_word: עֲלֵהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - contra ellos
  lexicon: HALOT
  rationale: עַל con calamidad expresa presión o carga que recae. «Sobre ellos» preserva esa imagen y el tono del original.
- source_word: וַתְּהִי הָאָרֶץ לְפַרְעֹה
  english_pob_choice: the land became Pharaoh’s
  chosen_spanish: la tierra llegó a ser de Faraón
  alternatives_spanish:
  - la tierra pasó a ser de Faraón
  - la tierra se hizo de Faraón
  lexicon: HALOT
  rationale: וַתְּהִי marca resultado de estado. «Llegó a ser de Faraón» expresa el cambio de posesión de forma clara y fiel, manteniendo la transición legal del texto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el expediente inglés POB y su lectura óptima-equivalente, conservando las dos alternativas señaladas en las notas: קנה como adquisición/compró y חזק con רעב como intensidad del hambre. No se detectaron revisiones posteriores que afectaran la redacción.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «Faraón» de manera consistente para el nombre/título egipcio.
  - Se evitó «SEÑOR» y otras sustituciones litúrgicas no presentes en el hebreo.
  - El singular distributivo «todo egipcio» reproduce el valor colectivo del hebreo sin añadir explicaciones al texto principal.
