translation:
  language: es
  text: Seguía mirando, y aquel cuerno hacía guerra contra los consagrados[a] y prevalecía sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos». El arameo literalmente dice «los holy ones», es decir, «los santos/consagrados», y puede referirse al pueblo santo de Dios o a los seres santos según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept watching
  chosen_spanish: Yo seguía mirando
  alternatives_spanish:
  - Yo estaba mirando
  - Yo seguía observando
  lexicon: HALOT
  rationale: La forma aramea expresa una acción pasada en curso; en español, «seguía mirando» comunica bien la duratividad sin sonar rígido. «Mirando» mantiene la inmediatez visual del contexto profético.
- source_word: וְקַרְנָא דִכֵּן
  english_pob_choice: that horn
  chosen_spanish: aquel cuerno
  alternatives_spanish:
  - ese cuerno
  - ese mismo cuerno
  lexicon: HALOT
  rationale: «דִכֵּן» funciona aquí como demostrativo anafórico. «Aquel cuerno» es natural en español y conserva la referencia a un cuerno ya presentado sin añadir énfasis interpretativo.
- source_word: עָבְדָה קְרָב
  english_pob_choice: was making war
  chosen_spanish: hacía guerra
  alternatives_spanish:
  - estaba haciendo guerra
  - libraba guerra
  - estaba guerreando
  lexicon: HALOT
  rationale: El giro arameo literalmente combina «hacer» con «guerra/batalla». «Hacía guerra» conserva esa estructura idiomática con un español claro y sobrio, sin resolverlo demasiado hacia una sola perífrasis moderna.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: contra
  alternatives_spanish:
  - con
  - frente a
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «con», en español «hacer guerra con» suena poco natural o ambiguo. Dado el contexto hostil y para comunicar correctamente la relación enemiga, «contra» expresa la fuerza semántica implicada sin perder fidelidad al sentido.
- source_word: קַדִּישִׁין
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los seres santos
  lexicon: HALOT
  rationale: El arameo sustantivado significa literalmente «los santos / los santos seres». En español, «los santos» es una forma breve y tradicionalmente inteligible, y permite mantener la tensión interpretativa entre seres celestiales y pueblo de Dios sin cerrar prematuramente el referente.
- source_word: וְיָכְלָה לְהוֹן
  english_pob_choice: was prevailing over them
  chosen_spanish: prevalecía sobre ellos
  alternatives_spanish:
  - vencía sobre ellos
  - los dominaba
  - salía vencedor sobre ellos
  lexicon: HALOT
  rationale: El verbo puede significar poder, prevalecer u obtener superioridad. «Prevalecía sobre ellos» reproduce bien el aspecto progresivo del pasaje y evita volverlo demasiado puntual con «venció» o demasiado interpretativo con «dominaba».
theological_decisions:
- issue: Referente de קַדִּישִׁין
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos de Dios
  - los holy ones
  rationale: 'La traducción conserva la ambigüedad del texto: puede referirse al pueblo de Dios, a seres celestiales santos, o a ambos en la visión. «Los santos» mantiene esa amplitud sin introducir una resolución doctrinal que el texto no exige.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y ningún cambio necesario; se mantiene la lectura durativa y la referencia anafórica del cuerno, con una formulación española más natural en «hacía guerra contra».
  spanish_consistency_notes:
  - Se usa «aquel» para el demostrativo anafórico, coherente con la referencia previa del cuerno.
  - Se mantiene «los santos» como traducción literal y flexible de קַדִּישִׁין, sin forzar «santos de la iglesia» ni «santos de Dios» en el texto principal.
  - La frase «hacía guerra contra» adapta la preposición aramea a un español idiomático, preservando la hostilidad explícita del contexto.
  - El aspecto progresivo se conserva con «seguía mirando» y «prevalecía», alineado con el audit trail inglés.
