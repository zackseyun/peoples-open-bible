translation:
  language: es
  text: Y no escuchamos tu voz para servir al rey de Babilonia[a], y has cumplido tus palabras que hablaste por medio de tus siervos los profetas[b], para que fueran sacados los huesos de nuestros reyes y los huesos de nuestros padres de su lugar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no obedecimos tu voz». El griego usa el giro de oír/escuchar, con la obediencia implícita por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «por las manos de tus siervos los profetas», un giro que significa «por medio de tus siervos los profetas».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, desde su lugar de sepultura; el griego dice solo «de su lugar».
    reason: cultural_note
lexical_decisions:
- source_word: ἠκούσαμεν τῆς φωνῆς σου
  english_pob_choice: did not listen to your voice
  chosen_spanish: no escuchamos tu voz
  alternatives_spanish:
  - no obedecimos tu voz
  - no oímos tu voz
  lexicon: BDAG
  rationale: ἀκούω con genitivo puede implicar oír con atención o atender obedientemente. «Escuchar» conserva el giro auditivo y deja que el contexto exprese la desobediencia sin volverlo una paráfrasis explícita en el texto principal.
- source_word: ἐργάσασθαι τῷ βασιλεῖ Βαβυλῶνος
  english_pob_choice: to serve the king of Babylon
  chosen_spanish: para servir al rey de Babilonia
  alternatives_spanish:
  - para trabajar para el rey de Babilonia
  - para laborar para el rey de Babilonia
  lexicon: LSJ
  rationale: Aunque ἐργάζομαι suele significar «trabajar/hacer», aquí con dativo de persona y en el marco histórico de sujeción, «servir» comunica mejor la idea de prestar servicio al rey babilonio.
- source_word: ἔστησας τοὺς λόγους σου
  english_pob_choice: you have fulfilled your words
  chosen_spanish: has cumplido tus palabras
  alternatives_spanish:
  - has स्थापितado tus palabras
  - has realizado tus palabras
  - has llevado a cabo tus palabras
  lexicon: LSJ
  rationale: ἵστημι puede significar establecer, confirmar o hacer permanecer. En este contexto de juicio anunciado y ahora realizado, «cumplir» expresa bien que las palabras de Dios se han hecho realidad.
- source_word: ἐν χερσὶν τῶν παίδων σου τῶν προφητῶν
  english_pob_choice: by the hands of your servants the prophets
  chosen_spanish: por medio de las manos de tus siervos los profetas
  alternatives_spanish:
  - por medio de tus siervos los profetas
  - por las manos de tus siervos los profetas
  lexicon: LSJ
  rationale: La locución literal «en las manos de» funciona como idiomático de agencia. En español, «por medio de las manos de» mantiene esa imagen y a la vez comunica con claridad la mediación profética.
- source_word: παίδων σου
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - criados
  lexicon: BDAG
  rationale: Aquí παῖς, referido a Dios y a los profetas, es un título convencional de servicio comisionado. «Siervos» es más natural en español bíblico y evita la sobrecarga social de «esclavos».
- source_word: τοῦ ἐξενεχθῆναι
  english_pob_choice: would be brought out
  chosen_spanish: para que fueran sacados
  alternatives_spanish:
  - para ser sacados
  - para que fuesen traídos fuera
  - para que salieran
  lexicon: LSJ
  rationale: El infinitivo articular expresa el resultado o contenido de la palabra profética. «Para que fueran sacados» refleja el pasivo con naturalidad en español.
- source_word: τὰ ὀστᾶ
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los restos
  - los cuerpos
  lexicon: LSJ
  rationale: Se conserva la referencia concreta a «huesos»; el texto alude específicamente a la exhumación o traslado de restos desde su lugar, y no conviene generalizarlo innecesariamente.
- source_word: ἐκ τοῦ τόπου αὐτῶν
  english_pob_choice: from their place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - de su lugar de sepultura
  - de sus tumbas
  lexicon: LSJ
  rationale: τόπος significa literalmente «lugar». Aunque el contexto sugiere lugar de sepultura, el griego no lo dice de modo explícito; por eso se mantiene la expresión más literal en el texto principal.
theological_decisions:
- issue: Si explicitar en la primera cláusula la obediencia o mantener el giro de oír/escuchar
  english_pob_reading: did not listen to your voice
  chosen_spanish_reading: no escuchamos tu voz
  alternative_spanish_readings:
  - no obedecimos tu voz
  rationale: La idea es de desobediencia del pacto, pero el griego conserva el modismo de oír/escuchar. Mantenerlo preserva el tejido bíblico del pasaje y deja que el contexto lleve la fuerza obediencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Cómo expresar la acción de Dios respecto de sus palabras proféticas
  english_pob_reading: you have fulfilled your words
  chosen_spanish_reading: has cumplido tus palabras
  alternative_spanish_readings:
  - has establecido tus palabras
  - has llevado a cabo tus palabras
  rationale: El punto teológico es que Dios ha hecho acontecer lo que había dicho. «Cumplir» comunica realización efectiva sin añadir formulaciones doctrinales ajenas al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que quedó sin cambios y con acuerdo alto entre auditoría y revisión. La redacción española mantiene el paralelismo del griego y las decisiones léxicas ya validadas en el contexto inglés.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como término por defecto en el proyecto cuando el contexto lo requiera, pero en este versículo el griego habla directamente de «tu voz» y de «tus palabras», sin necesidad de introducir el nombre divino.
  - Se mantuvo «siervos» para παῖδες en el marco profético, siguiendo la decisión auditada del inglés y evitando «esclavos», que sonaría excesivo en este contexto.
  - «Los huesos» se mantuvo literal, con nota explicativa sobre el trasfondo funerario implícito.
  - La puntuación y el tono procuran una lectura bíblica moderna y digna en español, sin calcos innecesarios ni arcaísmos forzados.
