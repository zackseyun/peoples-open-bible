translation:
  language: es
  text: 'Cuando ella era sacada, mandó decir a su suegro: «Estoy encinta del hombre a quien pertenecen estas cosas». Y dijo: «Por favor, identifica[a] de quién son estas cosas: el anillo de sello, los cordones y el bastón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconoce». El verbo hebreo puede significar tanto reconocer como identificar; aquí tiene una fuerza forense y acusatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּצֵאת
  english_pob_choice: was being brought out
  chosen_spanish: era sacada
  alternatives_spanish:
  - era llevada afuera
  - la estaban sacando
  - era sacada para ser castigada
  lexicon: HALOT
  rationale: El participio pasivo en contexto narrativo expresa una acción en curso de extracción pública. «Era sacada» conserva el valor progresivo sin añadir interpretación excesiva; «llevada afuera» sería posible, pero menos directa en el matiz procesal del texto.
- source_word: שָׁלְחָה
  english_pob_choice: sent word
  chosen_spanish: envió aviso
  alternatives_spanish:
  - envió un mensaje
  - mandó decir
  - envió palabra
  lexicon: HALOT
  rationale: En este contexto no se trata solo de un envío físico, sino de un comunicado verbal. «Envió aviso» expresa bien la transmisión del mensaje con tono formal y narrativo.
- source_word: חָמִיהָ
  english_pob_choice: her father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su padre político
  - su suegro
  lexicon: HALOT
  rationale: El término de parentesco es directo y claro en español; «suegro» es la equivalencia natural y precisa.
- source_word: לְאִישׁ אֲשֶׁר אֵלֶּה לּוֹ
  english_pob_choice: by the man to whom these belong
  chosen_spanish: del hombre a quien pertenecen estas cosas
  alternatives_spanish:
  - del hombre cuyas son estas cosas
  - del hombre al que pertenecen estas cosas
  lexicon: HALOT
  rationale: La construcción expresa posesión e implica paternidad en el contexto. «A quien pertenecen estas cosas» conserva la relación posesiva sin forzar una paráfrasis más interpretativa.
- source_word: הָרָה
  english_pob_choice: pregnant
  chosen_spanish: encinta
  alternatives_spanish:
  - embarazada
  - preñada
  lexicon: HALOT
  rationale: «Encinta» es una opción digna y plenamente comprensible en español bíblico contemporáneo; evita la posible rusticidad de «preñada» y el registro demasiado moderno de «embarazada».
- source_word: הַכֶּר נָא
  english_pob_choice: Please identify
  chosen_spanish: Por favor, identifica
  alternatives_spanish:
  - Por favor, reconoce
  - Reconoce, por favor
  - Identifica, por favor
  lexicon: HALOT
  rationale: El verbo נכר puede significar reconocer o identificar. En este escenario forense y de confrontación, «identifica» comunica mejor la fuerza acusatoria y la demanda de prueba, como refleja el audit trail inglés.
- source_word: לְמִי
  english_pob_choice: whose
  chosen_spanish: de quién
  alternatives_spanish:
  - de quién son
  - a quién pertenecen
  lexicon: HALOT
  rationale: En español, la pregunta posesiva se vuelve naturalmente «de quién». El resto de la frase explicita la pertenencia con claridad.
- source_word: חֹתֶמֶת
  english_pob_choice: signet ring
  chosen_spanish: anillo de sello
  alternatives_spanish:
  - sello de anillo
  - anillo-sello
  lexicon: HALOT
  rationale: La revisión inglesa corrigió «signet seal» a «signet ring» por precisión léxica. En español, «anillo de sello» transmite con claridad el objeto personal de identificación.
- source_word: פְּתִילִים
  english_pob_choice: cords
  chosen_spanish: los cordones
  alternatives_spanish:
  - las cuerdas
  - los cordeles
  - los hilos
  lexicon: HALOT
  rationale: El plural apunta a las cuerdas o cordones asociados al sello. «Cordones» conserva el plural y suena natural sin perder concreción.
- source_word: מַטֶּה
  english_pob_choice: staff
  chosen_spanish: el bastón
  alternatives_spanish:
  - la vara
  - el cayado
  - el bastón de caminar
  lexicon: HALOT
  rationale: «Bastón» es un equivalente claro y digno en español. Aunque «vara» o «cayado» son posibles, «bastón» resulta más natural para lectores generales sin abandonar la imagen de un objeto personal de autoridad o uso cotidiano.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas cosas
  alternatives_spanish:
  - éstas
  - estos
  lexicon: HALOT
  rationale: El demostrativo plural se refiere a los objetos mencionados. «Estas cosas» mantiene la referencia explícita y evita ambigüedad en español.
translation_notes:
  revision_awareness: La base inglesa revisada cambió «signet seal» por «signet ring» para mayor precisión. La traducción española sigue esa revisión con «anillo de sello» y mantiene la estructura narrativa y forense del audit trail, conservando la alternativa léxica de נכר en nota.
  spanish_consistency_notes:
  - Se preservó la terminología de posesión («a quien pertenecen estas cosas») para reflejar la relación implícita del hebreo y el inglés auditado.
  - Se evitó «SEÑOR» u otras sustituciones teológicas irrelevantes; el versículo no contiene léxico divino.
  - «Encinta» se eligió por registro bíblico claro y neutral, sin modernizar en exceso ni arcaizar.
  - «Anillo de sello» traduce el objeto identificado con precisión y coincide con la revisión inglesa más reciente.
  - La nota sobre הַכֶּר נָא conserva la tensión entre «reconocer» e «identificar», sin borrar el matiz forense documentado.
