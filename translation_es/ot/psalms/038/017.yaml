translation:
  language: es
  text: 'Porque dije[a]: «No sea que se alegren por mi desgracia; cuando mi pie resbale[b], se engrandezcan contra mí[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que no se alegren por mi desgracia»; la partícula hebrea expresa temor ante un resultado no deseado.
    reason: lexical_alternative
  - marker: b
    text: O «cuando mi pie vacile» / «cuando mi pie titubee».
    reason: lexical_alternative
  - marker: c
    text: O «se jacten contra mí» / «se exalten sobre mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación de la afirmación anterior. «Porque» conserva bien la relación causal/explanatoria en español y es natural en el registro poético.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - pensé
  - afirmé
  lexicon: HALOT
  rationale: El verbo básico es «decir». En español, «dije» mantiene la cercanía al hebreo sin sobreinterpretar como pensamiento interno, aunque el contexto puede implicar una reflexión interior.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: La partícula expresa temor ante un resultado no deseado. «No sea que» comunica con claridad esa prevención en español actual, sin perder el matiz de eventualidad temida.
- source_word: יִשְׂמְחוּ לִי
  english_pob_choice: they rejoice over me
  chosen_spanish: se alegren de mí
  alternatives_spanish:
  - se regocijen por mí
  - se alegren sobre mí
  lexicon: HALOT
  rationale: El hebreo expresa alegría hostil ante la desgracia del hablante. «Se alegren de mí» conserva la relación preposicional y el sentido adversativo; se evita una formulación demasiado literal como «sobre mí», que suena menos natural en español.
- source_word: בְּמוֹט רַגְלִי
  english_pob_choice: when my foot slips
  chosen_spanish: cuando mi pie resbale
  alternatives_spanish:
  - cuando mi pie vacile
  - cuando mi pie titubee
  - al resbalar mi pie
  lexicon: HALOT
  rationale: מוט puede denotar resbalar, tambalearse o vacilar. «Resbale» funciona bien en español y reproduce la imagen de inestabilidad personal de manera idiomática. Se conserva el singular «pie», como en el hebreo.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi perjuicio
  lexicon: HALOT
  rationale: En este contexto hostil, la preposición es adversativa. «Contra mí» expresa con precisión la oposición de los enemigos y su sentido de agresión o confrontación.
- source_word: הִגְדִּילוּ
  english_pob_choice: they magnify themselves
  chosen_spanish: se engrandezcan
  alternatives_spanish:
  - se hagan grandes
  - se exalten
  - se jacten
  lexicon: HALOT
  rationale: El verbo en hifil de גדל puede significar «hacerse grande» o «engrande(cer)se» en sentido de autoexaltación. «Se engrandezcan» preserva la imagen verbal del hebreo y evita sustituirla demasiado pronto por una interpretación como «jactarse».
theological_decisions:
- issue: Valor de פֶּן como expresión de temor ante un desenlace no deseado
  english_pob_reading: Lest they rejoice over me
  chosen_spanish_reading: No sea que se alegren de mí cuando mi pie resbale
  alternative_spanish_readings:
  - para que no se alegren de mí
  - no vaya a ser que se alegren de mí
  rationale: 'No hay aquí una doctrina particular, sino una decisión de matiz modal: el hebreo expresa prevención temerosa. «No sea que» transmite mejor el riesgo anticipado que un simple «para que no».'
  doctrine_reference: N/A
- issue: Autoexaltación hostil de los adversarios
  english_pob_reading: they magnify themselves against me
  chosen_spanish_reading: se engrandezcan contra mí
  alternative_spanish_readings:
  - se jacten contra mí
  - se exalten sobre mí
  rationale: La frase puede entenderse como autoengrandecimiento o arrogancia contra el justo. «Se engrandezcan» conserva la metáfora del hebreo y deja abierta la carga de arrogancia implícita sin imponer una glosa interpretativa más fuerte.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, especialmente la corrección reciente de פֶּן a «lest» y la preferencia final por una traducción que mantenga el matiz de temor, así como la decisión de preservar «magnify themselves» en un registro más formal. También se consideró la revisión que veía el giro como hebraísmo; en español se optó por una forma natural («se engrandezcan») que todavía refleja el verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo el singular «pie» conforme al hebreo.
  - Se preservó el sentido adversativo de לי/עלַי con «de mí» y «contra mí» sin neutralizar la hostilidad.
  - El registro general es poético, claro y de iglesia amplia, evitando arcaísmos innecesarios.
