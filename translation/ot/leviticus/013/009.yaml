id: LEV.13.9
reference: Leviticus 13:9
source:
  edition: WLC
  text: נֶ֣גַע צָרַ֔עַת כִּ֥י תִהְיֶ֖ה בְּ/אָדָ֑ם וְ/הוּבָ֖א אֶל הַ/כֹּהֵֽן־׃
translation:
  text: When an infection of leprosy is in a person[a], then he shall be brought to the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת traditionally rendered 'leprosy'; the term likely covers a broader range of serious skin conditions rather than specifically modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  chosen: infection
  alternatives:
  - affliction
  - plague
  - mark
  lexicon: HALOT
  rationale: In Leviticus 13 the term denotes a visible diseased condition or outbreak rather than a general calamity. 'Infection' is natural modern English and fits the diagnostic context better than the more archaic 'plague' or broader 'affliction.'
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprous disease
  - leprosy
  lexicon: HALOT
  rationale: The Hebrew term refers to a broader ritual/dermatological condition than modern Hansen's disease. 'Skin disease' avoids the misleading medical specificity of 'leprosy' while remaining readable. 'Leprous disease' is possible but less natural in contemporary English.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: Here the particle introduces a case law condition. 'When' fits the legal-instruction style of Leviticus and reads more idiomatically than 'if' in English casuistic formulation.
- source_word: תִהְיֶה
  chosen: is
  alternatives:
  - comes to be
  - appears
  lexicon: HALOT
  rationale: The verb is the simple copula 'to be.' In English, 'is' gives the clearest legal statement. 'Appears' would add nuance not explicit in the verb itself.
- source_word: בְּאָדָם
  chosen: in a man
  alternatives:
  - on a person
  - in a person
  - in humankind
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle and the default handling of אָדָם, 'man' is retained here as the singular generic human subject in legal material. The preposition is rendered naturally in context with the disease expression. 'Person' is possible but less source-transparent.
- source_word: וְהוּבָא
  chosen: then he shall be brought
  alternatives:
  - and he shall be brought
  - he must be brought
  lexicon: HALOT
  rationale: The passive perfect with prefixed conjunction functions here in procedural sequence. 'Then he shall be brought' captures the legal consequence in idiomatic English. 'Must be brought' is interpretive; 'and' is possible but less smooth in English case-law style.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: The definite article in Hebrew supports 'the priest,' referring to the priestly examiner in the legal procedure rather than an indefinite priest in general.
