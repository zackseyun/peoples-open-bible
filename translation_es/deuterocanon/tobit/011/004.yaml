    rationale: En español, «seguirlos» ya incorpora la idea de ir tras ellos; añadir «detrás de ellos» produce duplicación innecesaria y una lectura poco natural. El griego expresa acompañamiento/seguimiento con ubicación espacial; conviene representarlo sin calco torpe.
  revised_spanish_text: Pero toma la hiel[a] del pez en tu mano. Y siguieron adelante[b], y el perro iba detrás de ellos.
