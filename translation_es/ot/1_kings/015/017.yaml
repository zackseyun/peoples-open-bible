translation:
  language: es
  text: Entonces Baasá, rey de Israel, subió contra Judá y edificó Ramá[a], para no permitir que nadie saliera ni entrara hacia Asa, rey de Judá.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortificó Ramá». El verbo hebreo dice simplemente «edificó», pero el contexto sugiere una construcción militar estratégica.
    reason: lexical_alternative
  - marker: b
    text: La expresión «salir y entrar» reproduce un modismo hebreo para movimiento o acceso ordinario; aquí indica que Baasá buscó bloquear el tránsito hacia Asa, rey de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - marchó contra
  - subió a la guerra contra
  lexicon: HALOT
  rationale: עלה con עַל en contexto militar expresa avance hostil. «Subió contra» conserva el giro hebreo y es natural en español bíblico.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  - Baasá
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio con acentuación española para facilitar la lectura; se mantiene la forma bíblica reconocible sin adaptar el sentido.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: Construct chain
  rationale: 'La cadena posesiva se vierte de manera directa y sobria: «rey de Israel».'
- source_word: עַל יְהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - hacia Judá
  - sobre Judá
  lexicon: HALOT
  rationale: En este contexto עַל tiene sentido hostil, no meramente direccional; «contra» expresa mejor la acción militar.
- source_word: וַיִּבֶן אֶת הָרָמָה
  english_pob_choice: built Ramah
  chosen_spanish: edificó Ramá
  alternatives_spanish:
  - construyó Ramá
  - fortificó Ramá
  lexicon: בנה
  rationale: El hebreo dice literalmente «edificó». «Edificó» preserva el verbo sin anticipar de más la función militar; la posible idea de fortificación queda implícita en el contexto.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: Topónimo
  rationale: Se conserva el nombre del lugar con transliteración española estándar y acento gráfico por pronunciación.
- source_word: לְבִלְתִּי תֵּת
  english_pob_choice: so as not to allow
  chosen_spanish: para no permitir
  alternatives_spanish:
  - a fin de no permitir
  - para impedir
  lexicon: HALOT
  rationale: La construcción final expresa propósito de prevención. «Para no permitir» es fiel y fluido en español.
- source_word: יֹצֵא וָבָא
  english_pob_choice: to go out or come in
  chosen_spanish: saliera ni entrara
  alternatives_spanish:
  - fuera y viniera
  - saliera o entrara
  lexicon: HALOT
  rationale: Se reproduce el merismo hebreo con un par verbal natural en español. En este contexto la restricción es de acceso o tránsito, no una oposición lógica entre dos acciones aisladas.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: to Asa king of Judah
  chosen_spanish: a Asa, rey de Judá
  alternatives_spanish:
  - para Asa, rey de Judá
  - hacia Asa, rey de Judá
  lexicon: HALOT
  rationale: La preposición ל marca relación/destino respecto de Asa. En español, «a Asa» comunica el objetivo del bloqueo sin sobreinterpretar el sintagma.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el expediente inglés auditado. Se mantuvo el verbo simple «edificó» en el cuerpo, con nota para la posible lectura de fortificación; también se conservó el modismo hebreo de movimiento con explicación cultural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma base para el nombre divino, pero este versículo no lo contiene.
  - Se eligió «Baasá» y «Ramá» para una lectura fluida en español, manteniendo correspondencia transparente con los nombres propios hebreos.
  - Se preservó la estructura causal final con «para no permitir», en línea con la intención preventiva del hebreo.
