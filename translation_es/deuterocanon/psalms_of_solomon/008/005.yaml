    rationale: Aunque sigue de cerca 'report' del inglés POB, en español 'informe' suele sonar técnico o administrativo. El griego expresa causa por algo oído; 'por la noticia' o 'por lo que oí' conserva mejor el tono poético y el significado.
  - severity: low
