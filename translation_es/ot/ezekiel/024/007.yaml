translation:
  language: es
  text: Porque su sangre está en medio de ella[a]; la puso sobre una roca desnuda[b]. No la derramó sobre la tierra para cubrirla con polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su culpabilidad de sangre»; el hebreo dice literalmente «su sangre», usando la imagen concreta para expresar culpa violenta.
    reason: lexical_alternative
  - marker: b
    text: Cubrir la sangre con tierra alude al deber de no dejar sangre derramada expuesta; aquí la sangre queda abierta y visible sobre una roca desnuda.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del juicio anterior. «Porque» mantiene claramente el valor causal/explicativo que la auditoría inglesa resolvió con «For».
- source_word: דָמָהּ
  english_pob_choice: her blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su culpabilidad de sangre
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de sangre como en el inglés auditado. En este contexto también puede sugerir culpabilidad, pero la metáfora visual de sangre expuesta es central y no debe explicitarse en el cuerpo del texto.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: Reproduce la imagen locativa y la referencia a Jerusalén como entidad/cuerpo colectivo. «En medio de ella» es natural en español bíblico y mantiene la noción de interioridad pública o corporativa.
- source_word: הָיָה
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - estaba
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfectiva, la función estativa en el discurso profético pide presente en español para conservar la vividez de la afirmación.
- source_word: עַל צְחִיחַ סֶלַע
  english_pob_choice: on a bare rock
  chosen_spanish: sobre una roca desnuda
  alternatives_spanish:
  - sobre una peña desnuda
  - sobre una roca áspera y desnuda
  - sobre una roca estéril
  lexicon: HALOT
  rationale: «Roca desnuda» transmite la exposición total de la sangre y conserva de manera natural el valor de צְחִיחַ como superficie desprovista de cobertura.
- source_word: שָׂמָתְהוּ
  english_pob_choice: she set it
  chosen_spanish: la puso
  alternatives_spanish:
  - la colocó
  - la depositó
  lexicon: HALOT
  rationale: Verbo simple y directo para שׂים con sufijo. En español «la puso» resulta más natural que una formulación más marcada, sin perder el gesto de colocar la sangre allí.
- source_word: לֹא שְׁפָכַתְהוּ
  english_pob_choice: She did not pour it out
  chosen_spanish: No la derramó
  alternatives_spanish:
  - No la vertió
  - No la esparció
  lexicon: HALOT
  rationale: «Derramar» en español conserva bien el campo semántico de שפך para líquidos y sangre. Aquí mantiene el contraste entre dejarla expuesta y ocultarla.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - sobre el terreno
  lexicon: HALOT
  rationale: «Tierra» reproduce con más fidelidad el paralelismo con cubrir con polvo y mantiene la resonancia bíblica del contraste entre tierra y roca.
- source_word: לְכַסּוֹת עָלָיו עָפָר
  english_pob_choice: to cover it with dust
  chosen_spanish: para cubrirla con polvo
  alternatives_spanish:
  - para taparla con tierra
  - para ocultarla con polvo
  lexicon: HALOT
  rationale: «Polvo» es la equivalencia natural de עָפָר en este contexto y preserva la imagen de una sangre que habría debido ser cubierta. Se usa «cubrirla» para concordar con «la sangre» en español.
theological_decisions:
- issue: Sangre concreta vs. culpabilidad de sangre
  english_pob_reading: Retain the concrete image of blood left uncovered as a sign of public guilt and defilement, without making the metaphor more explicit in the main text.
  chosen_spanish_reading: Conservar la imagen concreta de sangre expuesta, sin traducirla en el cuerpo principal como «culpabilidad de sangre» o «sangre derramada» interpretativa.
  alternative_spanish_readings:
  - Traducir como «culpabilidad de sangre»
  - Traducir como «sangre derramada» en todo el verso
  rationale: La teología del versículo se apoya en la imagen visible de sangre no cubierta. Mantener la literalidad permite que la acusación moral surja del propio símbolo, en vez de anticiparla con una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Exposición pública de la sangre
  english_pob_reading: Covering blood with earth alludes to the duty not to leave shed blood exposed; here the blood is left openly visible on bare rock.
  chosen_spanish_reading: Mantener la oposición entre roca desnuda y tierra/polvo, de modo que la sangre quede visiblemente expuesta.
  alternative_spanish_readings:
  - Hacer explícita la alusión cultural en el texto principal
  - Suavizar la imagen para que suene menos cruda
  rationale: El contraste retórico depende de que la sangre permanezca visible sobre la roca y no quede absorbida por la tierra. La traducción conserva la fuerza profética del reproche sin sobreexplicar la costumbre aludida.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; el texto actual coincide con el consenso alto del control cruzado y con la decisión de mantener la imagen concreta de sangre expuesta sin interpretación adicional en el cuerpo principal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término estándar del proyecto, pero este versículo no lo contiene.
  - Se mantiene «sangre» y no «culpabilidad de sangre» en el texto principal para no diluir la metáfora profética.
  - «Roca desnuda» y «polvo» reproducen de forma natural el contraste visual entre exposición y cobertura.
  - La concordancia pronominal femenina («la») se refiere a «sangre» en español, ajustando el sufijo hebreo sin cambiar el referente.
