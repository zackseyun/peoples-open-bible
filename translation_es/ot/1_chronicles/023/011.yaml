translation:
  language: es
  text: Jahat fue el primero, y Zizá el segundo[a]; Jeús y Bería no tuvieron muchos hijos, y llegaron a ser una sola casa paterna para un solo registro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Ziza'.
    reason: lexical_alternative
  - marker: b
    text: O 'una sola casa ancestral para un solo recuento'. El hebreo se refiere a un solo clan paterno contado como una sola unidad administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַת הָרֹאשׁ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - la cabeza
  - el jefe
  lexicon: HALOT
  rationale: En la lista ordenada, ראש funciona como marcador de rango/orden, no como 'cabeza' en sentido literal. 'El primero' reproduce el valor secuencial que el inglés POB ya identificó.
- source_word: וְזִיזָה הַשֵּׁנִי
  english_pob_choice: Zizah the second
  chosen_spanish: Zizá el segundo
  alternatives_spanish:
  - Ziza el segundo
  - Zizá, el segundo
  lexicon: HALOT
  rationale: Es un nombre propio con la forma española más natural en este contexto. Se conserva el ordinal para mantener la relación de orden con 'el primero'.
- source_word: וִיעוּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jehús
  - Jeush
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación ortográfica mínima para lectura eclesial, sin alterar la identidad del nombre.
- source_word: וּבְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Berías
  alternatives_spanish:
  - Beria
  - Beriah
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española legible. Se evita una forma demasiado anglicada; la terminación se adapta para una pronunciación natural en español.
- source_word: לֹא הִרְבּוּ בָנִים
  english_pob_choice: did not have many sons
  chosen_spanish: no tuvieron muchos hijos
  alternatives_spanish:
  - no multiplicaron hijos
  - no tuvieron muchos hijos varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'no multiplicaron hijos' y mantiene un referente masculino. En español, 'hijos' comunica el mismo campo semántico genealógico de manera natural, sin perder que se trata de descendencia varonil en el conteo familiar.
- source_word: וַיִּהְיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - se hicieron
  lexicon: HALOT
  rationale: El verbo introduce el estado resultante de su escasez de hijos. 'Llegaron a ser' conserva mejor ese cambio de condición que un simple 'fueron'.
- source_word: לְבֵית אָב
  english_pob_choice: one father’s house
  chosen_spanish: una sola casa paterna
  alternatives_spanish:
  - una sola casa de padre
  - un solo clan paterno
  lexicon: HALOT
  rationale: בית אב es un término técnico de linaje/clan paternal. 'Casa paterna' comunica esa unidad familiar-tribal sin perder el matiz genealógico.
- source_word: לִפְקֻדָּה אֶחָת
  english_pob_choice: for one reckoning
  chosen_spanish: para un solo conteo
  alternatives_spanish:
  - para un solo recuento
  - para una sola reckoning
  - para una sola división
  lexicon: HALOT
  rationale: פקדה aquí es un término administrativo de enumeración o registro. 'Conteo' expresa con claridad la idea de ser contados como una sola unidad, manteniendo el sentido de 'reckoning' en el audit trail inglés.
theological_decisions:
- issue: Unidad administrativa y genealógica de dos casas en un solo registro
  english_pob_reading: The Hebrew refers to a single paternal clan counted as one administrative unit.
  chosen_spanish_reading: Se entiende como una sola casa paterna registrada en un único conteo administrativo.
  alternative_spanish_readings:
  - una sola división
  - un solo encargo
  - una sola asignación
  rationale: El texto no sugiere solo parentesco biológico, sino una unidad de registro/clasificación dentro de la organización levítica. 'Conteo administrativo' preserva la tensión entre linaje y ordenamiento oficial.
  doctrine_reference: 1 Crónicas 23:11; cf. organización levítica en Crónicas
- issue: Relación entre 'hijos' y descendencia masculina
  english_pob_reading: did not have many sons
  chosen_spanish_reading: no tuvieron muchos hijos
  alternative_spanish_readings:
  - no tuvieron muchos hijos varones
  - no multiplicaron hijos
  rationale: En español, 'hijos' es la forma natural para la descendencia familiar, pero el contexto genealógico conserva el matiz masculino del hebreo. Se evita sobrecargar el verso con una explicación que rompa el fluir del texto.
  doctrine_reference: HALOT; uso genealógico de בנים
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'assignment' a 'reckoning' para reflejar mejor לִפְקֻדָּה como término de conteo/enumeración. La traducción española sigue esa revisión con 'conteo' y mantiene la unidad de clan ('casa paterna') que el POB inglés destacó.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton como norma del proyecto, pero este versículo no lo contiene.
  - Se evita 'Cristo'/'Mesías' porque no aparece en el texto.
  - La estructura paralela 'el primero / el segundo' conserva el orden del hebreo y del inglés auditado.
  - '''Casa paterna'' y ''conteo'' se usan de manera coherente como términos técnicos de linaje y registro.'
