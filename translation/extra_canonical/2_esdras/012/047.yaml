  from: For your remembrance is before the Most High, and the Mighty One has not forgotten you in the struggle.
  to: For the memory of you is before the Most High, and the Mighty One has not forgotten you in the struggle.
  rationale: 'The Latin ''memoria uestri'' uses the objective genitive (''uestri''). ''Your remembrance'' in modern English typically implies the subject''s act of remembering, whereas the author means God''s memory *of* them. ''The memory of you'' accurately conveys the objective genitive. | Azure: The proposed change is closer to the Latin. In 4 Ezra 12:47, the clause is "Est enim memoria uestri coram altissimo," where "uestri" is a genitive dependent on "memoria" and naturally means memory/rem'
