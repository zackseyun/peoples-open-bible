review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: fórmula de nombramiento, topónimo transliterado, relación causal con el entierro, y referencia a los que se entregaron al deseo. Sin embargo, la redacción principal en español resulta poco natural al decir «fue llamado el nombre», y el participio final en singular («había codiciado») no concuerda bien con «pueblo» entendido colectivamente en este contexto; conviene una formulación plural relativa para reflejar הַמִּתְאַוִּים.'
  spanish_quality_summary: La legibilidad necesita un ajuste menor. «Así fue llamado el nombre de aquel lugar» suena calcado; «Aquel lugar fue llamado…» o «El nombre de aquel lugar fue…» sería más natural. Además, la nota al pie contiene errores tipográficos graves («deso dese») y una opción léxica poco idiomática («Sepulcros de anhelo»); conviene corregirla a una explicación clara y digna en español.
  glossary_alignment: 'No hay conflicto con los términos teológicos de proyecto. La transliteración del topónimo es admisible, aunque conviene uniformarla mejor como «Kibrot-hataavá». La nota debe reflejar con más claridad el sentido documentado: «Sepulcros de avidez» o «Sepulcros de deseo codicioso», más cercano a «Graves of Craving/Greedy Desire» que «anhelo».'
  issues:
  - severity: medium
    issue: Calco poco natural en «fue llamado el nombre de aquel lugar».
    rationale: Aunque intenta conservar la fórmula hebrea, en español suena antinatural. Se puede preservar el sentido sin perder fidelidad con «Aquel lugar fue llamado…».
  - severity: medium
    issue: Desajuste semántico y gramatical en «el pueblo que había codiciado».
    rationale: הַמִּתְאַוִּים es participio plural, ‘los que habían codiciado / los que habían deseado con avidez’. La relativa singular con «pueblo» pierde ese matiz más explícito.
  - severity: high
    issue: La nota al pie contiene errores tipográficos y léxicos.
    rationale: «deso dese» es una corrupción textual clara, y «Sepulcros de anhelo» no comunica bien el matiz de deseo desordenado o avidez presente en la explicación inglesa y hebrea.
  revised_spanish_text: Así, aquel lugar fue llamado Kibrot-hataavá[a], porque allí sepultaron al pueblo que había codiciado con avidez.
  revised_footnotes:
  - marker: a
    text: Kibrot-hataavá probablemente significa «Sepulcros de avidez» o «Sepulcros de deseo codicioso».
    reason: lexical_alternative
  revision_rationale: Se corrigió la fórmula de nombramiento a un español natural sin perder el sentido del hebreo. Se mantuvo el topónimo transliterado según la política del proyecto y se reparó la nota léxica para reflejar mejor el valor de תַּאֲוָה. También se fortaleció «codiciado» con «con avidez» para comunicar con más claridad el matiz de deseo desordenado presente en הַמִּתְאַוִּים, manteniendo una redacción digna y clara.
