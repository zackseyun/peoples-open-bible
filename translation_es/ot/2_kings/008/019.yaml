revisions:
- from: Sin embargo, Yahvé no quiso destruir a Judá, por amor de David, su esclavo[a], tal como le había dicho que le daría una lámpara para sus hijos[b] todos los días.
  to: Sin embargo, Yahvé no quiso destruir a Judá, por amor de David, su siervo, tal como le había dicho[a] que le daría una lámpara para sus hijos[b] todos sus días.
  rationale: Se cambia «su esclavo» por «su siervo» porque, en este contexto, עֶבֶד aplicado a David funciona como título pactual y honorífico, y «siervo» es la equivalencia fiel y natural en español bíblico. Se ajusta «todos los días» a «todos sus días» para reflejar mejor כָּל הַיָּמִים como duración continua de la promesa, no como frecuencia cotidiana. Se añade una nota léxica en «dicho» para preservar la alternativa «prometido» ya documentada en la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: contraste adversativo, voluntad divina de no destruir a Judá, motivación por David, recuerdo de la palabra dada, y la imagen de la lámpara. También acierta al usar «Yahvé» conforme a la política española del proyecto. Sin embargo, dos decisiones debilitan la fidelidad contextual: «su esclavo» para עַבְדּוֹ aplicado a David suena impropio en español bíblico y no refleja bien el uso honorífico-covenantal de «siervo» en este contexto; y «todos los días» para כָּל הַיָּמִים suena en español como frecuencia cotidiana, no como duración continua/covenantal.'
  spanish_quality_summary: La frase es generalmente clara, pero «por amor de David, su esclavo» resulta poco natural y teológicamente torpe en registro bíblico. Además, «todos los días» introduce una lectura idiomática española de repetición diaria que no comunica bien la idea de continuidad permanente de la promesa davídica. Una leve revisión produce un español más digno y más preciso.
  glossary_alignment: Alinea bien con «Yahvé» y conserva «lámpara». La excepción necesaria al valor por defecto de «esclavo» está justificada por el contexto de עֶבֶד aplicado a David como título de relación pactual ante Dios; aquí «siervo» es la opción fiel y natural. También conviene mantener «hijos» (no «descendientes») por cercanía formal al hebreo, y ajustar כָּל הַיָּמִים a «todos sus días» para evitar ambigüedad idiomática.
  issues:
  - severity: high
    issue: «su esclavo» para David
    rationale: Aunque el proyecto favorece «esclavo» cuando la fuerza léxica debe sentirse, en fórmulas como «David su siervo» el hebreo עֶבֶד funciona como designación pactual y honorífica estable. «Su esclavo» en español moderno sugiere servidumbre deshonrosa o impropia y no es una formulación bíblica natural aquí.
  - severity: medium
    issue: «todos los días» para כָּל הַיָּמִים
    rationale: En español, «todos los días» suele entenderse como ‘cada día’. El hebreo aquí apunta a duración continua de la lámpara dinástica. «Todos sus días» conserva mejor el giro bíblico y evita la lectura adverbial de frecuencia.
  - severity: low
    issue: Nota a sobreexplica una decisión que conviene corregir en el texto principal
    rationale: La nota defiende «esclavo», pero la mejor solución es corregir el texto a «siervo» y usar la nota para explicar la excepción contextual, no para sostener una elección menos fiel al registro y al sentido.
  revised_spanish_text: Sin embargo, Yahvé no quiso destruir a Judá, por amor de David, su siervo, tal como le había dicho[a] que le daría una lámpara para sus hijos[b] todos sus días.
  revised_footnotes:
  - marker: a
    text: O «le había prometido». El hebreo dice literalmente «le había dicho», pero en este contexto de pacto esa palabra funciona como promesa.
    reason: lexical_alternative
  - marker: b
    text: «Lámpara» mantiene la imagen real/dinástica del hebreo para la continuidad de la línea de David; no se explicita en el texto principal como «dinastía» o «linaje».
    reason: theological_note
  revision_rationale: Se cambia «su esclavo» por «su siervo» porque, en este contexto, עֶבֶד aplicado a David funciona como título pactual y honorífico, y «siervo» es la equivalencia fiel y natural en español bíblico. Se ajusta «todos los días» a «todos sus días» para reflejar mejor כָּל הַיָּמִים como duración continua de la promesa, no como frecuencia cotidiana. Se añade una nota léxica en «dicho» para preservar la alternativa «prometido» ya documentada en la auditoría inglesa.
