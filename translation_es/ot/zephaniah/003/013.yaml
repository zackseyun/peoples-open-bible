    text: 'O: «falsedad».'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final conserva la imagen pastoral: «pastarán y se echarán», como un rebaño que habita en seguridad.'
    reason: cultural_note
  revision_rationale: Se ajusta al plural implícito/colectivo del hebreo con formulaciones más naturales en español, se corrige la nota [a] para que corresponda al punto donde está anclada, y se afina la imagen pastoral con 'se echarán', que refleja mejor el verbo רבץ sin perder dignidad ni claridad.
