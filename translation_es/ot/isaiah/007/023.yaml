translation:
  language: es
  text: Y en aquel día[a][b], todo lugar donde había mil vides valoradas en mil piezas de plata se convertirá en espinos y zarzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde habrá mil vides valoradas en mil piezas de plata». El imperfecto hebreo puede traducirse más literalmente en futuro, pero el contexto favorece el contraste entre el antiguo valor del viñedo y su futura desolación.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «mil vides por mil plata». El versículo no indica explícitamente la unidad monetaria exacta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will become
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... llegará a ser
  - Y ... se convertirá en
  lexicon: HALOT
  rationale: La forma hebrea introduce la situación profética y el resultado de cambio; en español, «será» comunica el estado final sin forzar una perífrasis más interpretativa. Se conserva el matiz de transformación por el contexto de desolación.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: Es la fórmula profética habitual. «Aquel» mantiene la distancia estilística y el tono solemne del oráculo.
- source_word: כָל מָקוֹם
  english_pob_choice: every place
  chosen_spanish: todo lugar
  alternatives_spanish:
  - cada lugar
  - todo sitio
  lexicon: HALOT
  rationale: «Todo lugar» reproduce bien el sentido distributivo y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר יִהְיֶה שָׁם
  english_pob_choice: where there were
  chosen_spanish: donde había
  alternatives_spanish:
  - donde habrá
  - en donde había
  lexicon: HALOT
  rationale: El hebreo usa imperfecto, pero el contexto contrasta el valor anterior del viñedo con su futura ruina. «Había» expresa ese estado previo de manera directa y no excesivamente mecánica; no se explicita «antes» porque el contraste ya está dado por la frase completa y la lectura auditada del POB en inglés.
- source_word: אֶלֶף גֶּפֶן
  english_pob_choice: a thousand vines
  chosen_spanish: mil vides
  alternatives_spanish:
  - mil viñas
  - mil parras
  lexicon: HALOT
  rationale: «גפן» designa la vid o parra; «vides» conserva el referente vegetal sin añadir una interpretación agrícola más amplia. «Viñas» podría sugerir terreno o plantación, no cada planta individual.
- source_word: בְּאֶלֶף כָּסֶף
  english_pob_choice: worth a thousand pieces of silver
  chosen_spanish: por mil piezas de plata
  alternatives_spanish:
  - a mil piezas de plata
  - por mil de plata
  lexicon: HALOT
  rationale: El hebreo expresa valoración/precio, pero no especifica la unidad monetaria. «Piezas de plata» sigue la decisión auditada del POB en inglés y evita añadir «siclos», que no aparece explícitamente en el verso.
- source_word: לַשָּׁמִיר וְלַשַּׁיִת
  english_pob_choice: briars and thorns
  chosen_spanish: espinos y zarzas
  alternatives_spanish:
  - zarzas y espinos
  - briñas y espinos
  lexicon: HALOT
  rationale: La pareja hebrea apunta a maleza espinosa y desolación del terreno; en español, «espinos y zarzas» comunica el efecto imagético con naturalidad. No se intenta distinguir botánicamente cada término hebreo, porque la incertidumbre léxica favorece un par amplio y comprensible.
- source_word: יִהְיֶה
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se volverá
  lexicon: HALOT
  rationale: La secuencia en español ya contiene la transformación completa por el contraste de estado; «será» funciona como predicado resultativo y mantiene la concisión del hebreo.
translation_notes:
  revision_awareness: Se siguió la revisión del POB en inglés que sustituyó una formulación más libre por «there were», reforzando la lectura formal del imperfecto hebreo en la cláusula relativa. En español se preservó ese valor de estado previo con «había», mientras la cláusula principal quedó en futuro resultativo («será») para reflejar el cambio de estado del terreno.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también se evitó introducir términos no explícitos como «siclos».
  - Se usó un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
