translation:
  language: es
  text: Pero, así como se comen la gacela[a] y el ciervo, así podrás comerlo[b]; el impuro y el puro podrán comerlo por igual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el corzo y el venado».
    reason: lexical_alternative
  - marker: b
    text: Es decir, tanto las personas ritualmente impuras como las ritualmente puras pueden comerlo.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: HALOT
  rationale: Introduce una restricción o matiz respecto de la instrucción previa, con un conector natural en español sin perder el valor adversativo.
- source_word: כַּאֲשֶׁר ... כֵּן
  english_pob_choice: just as ... so
  chosen_spanish: así como ... así
  alternatives_spanish:
  - como ... así
  - tal como ... así
  lexicon: HALOT
  rationale: La correlación comparativa se conserva de forma clara y pública en español con una estructura simétrica equivalente.
- source_word: יֵאָכֵל
  english_pob_choice: are eaten
  chosen_spanish: se come
  alternatives_spanish:
  - son comidos
  - se comen
  lexicon: HALOT
  rationale: El pasivo impersonal en español suena más natural como construcción con 'se'; la forma singular genérica permite referir el par de animales sin sobrecargar el verso.
- source_word: הַצְּבִי
  english_pob_choice: the gazelle
  chosen_spanish: el venado
  alternatives_spanish:
  - la gacela
  - el ciervo
  lexicon: HALOT
  rationale: Se opta por un término ampliamente entendido en español para el animal salvaje de caza menor; como el par hebreo incluye dos animales emparentados y el POB inglés ya ofrece una alternativa zoológica, se mantiene una solución natural y se documenta la posibilidad de otra identificación. La ubicación exacta del referente zoológico admite margen en las lenguas receptoras.
- source_word: הָאַיָּל
  english_pob_choice: the deer
  chosen_spanish: el ciervo
  alternatives_spanish:
  - el venado
  - el stag
  lexicon: HALOT
  rationale: Se traduce con el término más natural y transparente en español para el animal mayor del par, conservando la distinción léxica entre ambos nombres hebreos.
- source_word: תֹּאכְלֶנּוּ
  english_pob_choice: you may eat it
  chosen_spanish: lo comerás tú
  alternatives_spanish:
  - lo podrás comer
  - lo puedes comer
  lexicon: HALOT
  rationale: Aquí el hebreo funciona como instrucción normativa; en español puede expresarse de forma directa como mandato/prescripción. Se evita 'puedes' porque debilita el tono legal, pero se conserva el destinatario singular del verbo con énfasis contextual.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean
  chosen_spanish: el impuro
  alternatives_spanish:
  - el inmundo
  - el ceremonialmente impuro
  lexicon: HALOT
  rationale: Se mantiene la fuerza ritual del término con un adjetivo breve y bíblico en español. 'Impuro' preserva el contraste terminológico sin sonar excesivamente técnico.
- source_word: הַטָּהוֹר
  english_pob_choice: the clean
  chosen_spanish: el puro
  alternatives_spanish:
  - el limpio
  - el ceremonialmente puro
  lexicon: HALOT
  rationale: Se usa el par léxico natural de 'impuro/puro', que comunica la oposición ritual del texto con claridad en español.
- source_word: יַחְדָּו
  english_pob_choice: alike
  chosen_spanish: juntos
  alternatives_spanish:
  - por igual
  - ambos
  lexicon: HALOT
  rationale: El adverbio hebreo expresa aquí simultaneidad y equivalencia de participación. 'Juntos' mantiene la imagen de inclusión mutua, aunque la noción principal es que ambos tipos pueden comer.
- source_word: יֹאכְלֶנּוּ
  english_pob_choice: may eat it
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo podrán comer
  - comerán de él
  lexicon: HALOT
  rationale: Como en la primera forma verbal, el valor es normativo; el futuro en español puede funcionar como prescripción. La repetición mantiene el paralelismo del hebreo.
theological_decisions:
- issue: Distinción ritual entre 'impuro' y 'puro'
  english_pob_reading: the unclean and the clean alike may eat it
  chosen_spanish_reading: el impuro y el puro, juntos, lo comerán
  alternative_spanish_readings:
  - el ceremonialmente impuro y el ceremonialmente puro lo comerán
  - el impuro y el puro pueden comerlo por igual
  rationale: El texto trata de acceso ritual a la comida, no de moralidad. La formulación conserva el contraste y deja claro que no se habla de culpa ética sino de estado ceremonial.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor normativo de los imperfectos hebreos
  english_pob_reading: you may eat it
  chosen_spanish_reading: lo comerás tú ... lo comerán
  alternative_spanish_readings:
  - puedes comerlo
  - podrán comerlo
  rationale: En este contexto legal, los imperfectos expresan permiso/instrucción. El español bíblico puede usar futuro prescriptivo para reflejar esa norma sin introducir una mera posibilidad.
  doctrine_reference: Translation philosophy §3 (legal discourse and verbal aspect)
- issue: Identificación zoológica de צְבִי y אַיָּל
  english_pob_reading: the gazelle and the deer
  chosen_spanish_reading: el venado y el ciervo
  alternative_spanish_readings:
  - la gacela y el ciervo
  - el venado y el venado
  rationale: Los nombres animales hebreos admiten cierta oscilación en español. Se conserva un par distinguible y natural, sin absolutizar una equivalencia zoológica que el propio expediente inglés trata con cautela mediante nota alternativa.
  doctrine_reference: Translation philosophy §6 (lexical transparency and documented alternatives)
translation_notes:
  revision_awareness: Se corrigió la falla de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. También se ajustó la redacción para que las notas estén ancladas y no queden huérfanas.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno, claro y digno, evitando arcaísmos innecesarios.
  - Se preservó la distinción ritual impuro/puro como contraste lexical estable.
  - Se usó futuro prescriptivo en español para reflejar el valor normativo de los imperfectos hebreos en contexto legal.
  - Se evitó 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
