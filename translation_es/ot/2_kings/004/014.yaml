translation:
  language: es
  text: 'Entonces dijo[a]: «¿Qué, pues, debe hacerse por ella?» Y Guejazí dijo: «Bueno, no tiene hijo[b], y su marido es anciano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué se debe hacer por ella?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no hay hijo para ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: So he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración; «Entonces» expresa bien la secuencia discursiva en español sin sonar forzado.
- source_word: וּמֶה
  english_pob_choice: What then
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Qué entonces?
  - ¿Qué, entonces?
  lexicon: HALOT
  rationale: El interrogativo con la conjunción añade matiz discursivo. «Pues» comunica ese giro natural en español y conserva la idea de continuación o inferencia.
- source_word: לַעֲשׂוֹת לָהּ
  english_pob_choice: is to be done for her
  chosen_spanish: se hará por ella
  alternatives_spanish:
  - debe hacerse por ella
  - hay que hacerle
  lexicon: HALOT
  rationale: La construcción infinitiva con preposición expresa una acción destinada a ella; el pasivo/reflexivo español da una equivalencia natural sin perder la orientación benefactiva.
- source_word: גֵּיחֲזִי
  english_pob_choice: Gehazi
  chosen_spanish: Guejazí
  alternatives_spanish:
  - Gehazi
  lexicon: Transcripción hebrea
  rationale: Se opta por una transcripción española que refleje mejor la pronunciación aproximada y sea legible en español, manteniendo el nombre propio del personaje.
- source_word: אֲבָל
  english_pob_choice: Well
  chosen_spanish: Bueno
  alternatives_spanish:
  - Pues
  - Bien
  lexicon: HALOT
  rationale: La partícula introduce una respuesta reflexiva y conversacional. «Bueno» conserva ese matiz pragmático mejor que un contraste fuerte como «pero».
- source_word: בֵּן אֵין לָהּ
  english_pob_choice: she has no son
  chosen_spanish: no tiene hijo
  alternatives_spanish:
  - no tiene hijo varón
  - no tiene hijo/a
  lexicon: HALOT
  rationale: Aunque בן puede ser «hijo» o «hijo varón», el español natural aquí expresa la carencia filial sin repetir una estructura posesiva extraña; se conserva la nota de descendencia masculina en el contexto narrativo.
- source_word: וְאִישָׁהּ
  english_pob_choice: and her husband
  chosen_spanish: y su marido
  alternatives_spanish:
  - y su esposo
  - y su hombre
  lexicon: HALOT
  rationale: En este contexto, אִישׁ con sufijo refiere al esposo. «Marido» es claro, bíblico y natural en español.
- source_word: זָקֵן
  english_pob_choice: is old
  chosen_spanish: es anciano
  alternatives_spanish:
  - es viejo
  - está viejo
  lexicon: HALOT
  rationale: El adjetivo/participio describe su edad avanzada. «Anciano» conserva dignidad estilística y precisión semántica en español bíblico.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el audit trail inglés: mantiene la secuencia narrativa de וַיֹּאמֶר, el matiz discursivo de וּמֶה y la respuesta conversacional de אֲבָל. Se adapta la sintaxis al español para que el verso suene publicable sin perder las tensiones léxicas del original.'
  spanish_consistency_notes:
  - Se usa «Guejazí» de forma consistente como transcripción española del nombre hebreo גֵּיחֲזִי.
  - Se mantiene «marido» para אִישָׁהּ por claridad contextual y porque el pasaje habla del esposo.
  - La nota sobre «no tiene hijo» preserva la alternativa literal del hebreo sin recargar el cuerpo principal del verso.
