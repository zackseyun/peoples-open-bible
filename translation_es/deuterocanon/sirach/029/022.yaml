  yaml_path: translation/deuterocanon/sirach/029/022.yaml
  text: Better is the life of a poor man under shelter than splendid food in another's house[a][b].
  footnotes:
  - marker: a
    text: 'The Greek participle translated in the clause ''under shelter'' is textually or lexically difficult here; taken strictly, it commonly means ''seeming'' or ''being thought.'' The rendering follows the proverb''s apparent sense: modest security is better than luxurious meals dependent on others.'
    reason: textual_variant
  - marker: b
    text: Or 'splendid dishes among strangers' / 'in others' houses.' The Greek ἐν ἀλλοτρίοις can refer more generally to what belongs to others.
    reason: lexical_alternative
