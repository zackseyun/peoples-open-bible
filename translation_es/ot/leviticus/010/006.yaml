translation:
  language: es
  text: 'Y dijo Moisés a Aarón y a Eleazar e Itamar, sus hijos[a]: «No descubran sus cabezas, y no rasguen sus vestidos, para que no mueran y la ira venga sobre toda la congregación. Pero sus hermanos, toda la casa de Israel, llorarán por el incendio[b] que Yahvé ha encendido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No dejen su cabello desarreglado». El hebreo alude a una señal de duelo relacionada con la cabeza o el cabello.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el incendio que Yahvé quemó»; «ha encendido» se usa en español por naturalidad idiomática dentro de esta expresión cognada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָֽאשֵׁי/כֶם אַל תִּפְרָעוּ
  english_pob_choice: Do not uncover your heads
  chosen_spanish: No descubran sus cabezas
  alternatives_spanish:
  - No dejen su cabello desordenado
  - No dejen su cabeza suelta
  lexicon: HALOT
  rationale: El hebreo describe una señal de duelo asociada con la cabeza/cabello desarreglado o suelto. En español, «descubran sus cabezas» comunica la práctica de duelo sin imponer de antemano una forma ritual específica que el hebreo no explicita con total precisión.
- source_word: וּ/בִגְדֵי/כֶם לֹא תִפְרֹמוּ
  english_pob_choice: do not tear your garments
  chosen_spanish: no rasguen sus vestidos
  alternatives_spanish:
  - no rompan sus vestidos
  - no desgarren sus ropas
  lexicon: HALOT
  rationale: פָרַם se refiere al rasgado de vestiduras como gesto de duelo. «Rasguen sus vestidos» es claro, digno y conserva la fuerza ritual del mandamiento.
- source_word: וְ/לֹ֣א תָמֻ֔תוּ
  english_pob_choice: lest you die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - no sea que mueran
  - y no mueran
  lexicon: HALOT
  rationale: La construcción expresa consecuencia y advertencia. En español, «para que no mueran» mantiene la finalidad negativa sin volverla más libre de lo que permite el hebreo.
- source_word: וְ/עַ֥ל כָּל הָ/עֵדָ֖ה יִקְצֹ֑ף
  english_pob_choice: wrath come upon all the congregation
  chosen_spanish: la ira venga sobre toda la congregación
  alternatives_spanish:
  - él se irrite contra toda la congregación
  - venga la ira sobre toda la congregación
  lexicon: HALOT
  rationale: El verbo está sin sujeto explícito; el contexto implica la reacción de Yahvé. En español, «la ira venga sobre toda la congregación» preserva esa falta de explicitación y evita añadir un sujeto que el hebreo no formula aquí.
- source_word: וַ/אֲחֵי/כֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus parientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hermanos» en plural masculino. Se conserva esa forma, que luego queda aclarada por la apposición nacional siguiente.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: the whole house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - toda la familia de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión pactal e idiomática «casa de Israel», que en español bíblico es comprensible y fiel al original.
- source_word: יִבְכּוּ אֶת הַ/שְּׂרֵפָה
  english_pob_choice: shall weep for the burning
  chosen_spanish: llorarán por la combustión
  alternatives_spanish:
  - llorarán por el incendio
  - llorarán por el fuego
  lexicon: HALOT
  rationale: שְׂרֵפָה nombra la realidad del quemar/ardor/burning producido por el fuego divino. «Combustión» conserva el sustantivo de proceso/resultado y evita suavizarlo con una paráfrasis interpretativa.
- source_word: אֲשֶׁר שָׂרַף יְהוָה
  english_pob_choice: that Yahweh has kindled
  chosen_spanish: que Yahvé ha encendido
  alternatives_spanish:
  - que Yahvé ha quemado
  - que Yahvé ha prendido
  lexicon: HALOT
  rationale: El verbo שָׂרַף aquí mantiene la agencia divina en el acto de fuego. «Ha encendido» suena natural en español y conserva la atribución directa a Yahvé sin volver la frase redundante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se adopta la forma editorial POB para el Tetragrámaton, preservando el nombre divino en vez de sustituirlo por un título.
theological_decisions:
- issue: Advertencia de muerte e ira divina ante la desobediencia cultual
  english_pob_reading: lest you die and wrath come upon all the congregation
  chosen_spanish_reading: para que no mueran y la ira venga sobre toda la congregación
  alternative_spanish_readings:
  - no sea que mueran y la ira venga sobre toda la congregación
  - para que no mueran y venga la ira sobre toda la congregación
  rationale: 'El hebreo presenta dos consecuencias ligadas a la desobediencia: muerte de los sacerdotes e ira sobre la asamblea. La formulación española conserva ambas sin suavizarlas ni convertir la ira en una abstracción impersonal.'
  doctrine_reference: Levítico 10:6; santidad sacerdotal y responsabilidad corporativa en el culto
- issue: Conservación del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo contiene יְהוָה de forma explícita. Se conserva el nombre propio divino como exige la política editorial, en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: El llanto de Israel por el juicio de fuego
  english_pob_reading: shall weep for the burning
  chosen_spanish_reading: llorarán por la combustión
  alternative_spanish_readings:
  - llorarán por el incendio
  - llorarán por la quemazón
  rationale: La mención final no explica el evento con categorías más abstractas, sino que mantiene el sustantivo concreto derivado de fuego. «Combustión» conserva esa concreción y la relación verbal con lo que Yahvé ha encendido.
  doctrine_reference: Levítico 10:6; juicio santo manifestado en fuego
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se preferió una formulación formal para la señal de duelo en la cabeza, se mantuvo la advertencia de muerte e ira con sintaxis más natural, y se conservó la expresión concreta del ‘burning’ como sustantivo. La versión española sigue esas decisiones, pero ajusta el registro para que resulte idiomático y publicable en español sin perder la transparencia lexical.'
  spanish_consistency_notes:
  - Se mantiene Yahvé de manera uniforme para יְהוָה.
  - Se conserva el paralelismo entre la prohibición sobre la cabeza y la de los vestidos.
  - «Congregación» traduce consistentemente הָעֵדָה con sentido comunitario-cultual.
  - La nota [a] se ancla en «cabezas» porque allí está la ambigüedad principal del hebreo.
  - La nota [b] se ancla en «casa de Israel» para preservar la expresión nacional-covenantal.
