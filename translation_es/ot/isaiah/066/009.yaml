  text: הַ/אֲנִ֥י אַשְׁבִּ֛יר וְ/לֹ֥א אוֹלִ֖יד יֹאמַ֣ר יְהוָ֑ה אִם אֲנִ֧י הַ/מּוֹלִ֛יד וְ/עָצַ֖רְתִּי אָמַ֥ר אֱלֹהָֽיִ/ךְ־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/009.yaml
  text: Shall I bring to the point of birth and not cause to give birth? says Yahweh[a]. Shall I, who cause to give birth[c][b], shut the womb? says your God.
  footnotes:
  - marker: a
    text: Or 'bring to the breaking point'; the Hebrew uses childbirth imagery for bringing to the moment of delivery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'restrain' or 'shut up'; 'shut the womb' makes the implied childbirth image explicit in English.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'your God' with a feminine singular 'your,' addressing Zion/Jerusalem as a woman in the surrounding context.
    reason: cultural_note
