translation:
  language: es
  text: Tengamos compasión de nuestra propia juventud, y compadezcámonos de la vejez de nuestra madre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido dice literalmente: «y compadezcámonos de lo de nuestra madre», con un sustantivo implícito en este testimonio. «La vejez» se suple por el contexto como el sentido más probable.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐλεήσωμεν
  english_pob_choice: Let us have mercy
  chosen_spanish: Tengamos compasión
  alternatives_spanish:
  - Tengamos misericordia
  - Seamos misericordiosos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pide una invitación colectiva a la compasión. En español, "tener compasión" comunica con naturalidad la fuerza de ἐλεέω sin sonar tan frío o jurídico como otras opciones.
- source_word: τὰς ἑαυτῶν ἡλικίας
  english_pob_choice: our own youth
  chosen_spanish: nuestra juventud
  alternatives_spanish:
  - nuestra edad
  - nuestros años de vida
  - nuestra etapa de vida
  lexicon: LSJ
  rationale: ἡλικία puede referirse a edad, etapa vital o juventud. Dado el contexto de los hermanos jóvenes, "juventud" reproduce bien el valor situacional y el tono patético del pasaje en español.
- source_word: κατοικτειρήσωμεν
  english_pob_choice: let us pity
  chosen_spanish: compadezcámonos
  alternatives_spanish:
  - tengamos compasión de
  - apiadémonos de
  lexicon: LSJ
  rationale: El verbo expresa piedad compasiva. "Compadecernos" evita una repetición demasiado rígida de "misericordia" y mantiene el matiz afectivo de la exhortación griega.
- source_word: τὸ τῆς μητρὸς
  english_pob_choice: our mother’s old age
  chosen_spanish: la vejez de nuestra madre
  alternatives_spanish:
  - la condición de nuestra madre
  - la suerte de nuestra madre
  - lo de nuestra madre
  lexicon: LSJ
  rationale: El griego transmitido es elíptico y deja implícito el sustantivo. En contexto, la referencia más probable es la vejez de la madre; en español, "la vejez de nuestra madre" conserva esa inferencia sin añadir más de lo que el contexto exige.
translation_notes:
  revision_awareness: El texto inglés auditado propone "our own youth" y una reconstrucción contextual para la frase elíptica final; la versión española sigue esa misma línea, manteniendo la exhortación en primera persona plural y preservando la incertidumbre textual mediante una nota.
  spanish_consistency_notes:
  - Se ha mantenido el plural exhortativo en ambas cláusulas para reflejar el subjuntivo hortatorio griego.
  - Se optó por "compasión/compadecernos" para conservar el campo semántico de misericordia sin introducir un matiz de mera indulgencia.
  - '"Juventud" funciona como equivalente natural de ἡλικία en este contexto y evita una literalidad poco idiomática en español.'
  - La nota a pie de página marca la elipsis del último sintagma y no se presenta como traducción segura sin contexto.
