translation:
  language: es
  text: Ahora, pues, hoy te hemos escogido para que seas para nosotros, en su lugar, un jefe y un caudillo[a], para combatir nuestra guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Caudillo» busca reflejar el matiz de ἡγούμενον como quien guía o conduce. Si se prefiere un término más neutro, también puede entenderse como «líder».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡρετισάμεθα
  english_pob_choice: we have chosen
  chosen_spanish: te hemos escogido
  alternatives_spanish:
  - te hemos elegido
  - te hemos nombrado
  lexicon: LSJ
  rationale: ἡρετίζομαι expresa la idea de seleccionar para una función. «Escoger» conserva bien esa acción de selección sin forzar un tecnicismo institucional que el griego no exige aquí.
- source_word: ἀντʼ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - como su reemplazo
  lexicon: LSJ
  rationale: La expresión marca sucesión respecto de la persona anterior. «En su lugar» reproduce ese valor relacional de manera natural en español.
- source_word: ἄρχοντα
  english_pob_choice: a ruler
  chosen_spanish: un jefe
  alternatives_spanish:
  - un gobernante
  - un príncipe
  - un dirigente
  lexicon: LSJ
  rationale: ἄρχων tiene un campo amplio de autoridad y dirección. En español, «jefe» comunica esa función de mando sin cargar el término con una connotación monárquica que el contexto inmediato no obliga a asumir.
- source_word: ἡγούμενον
  english_pob_choice: leader
  chosen_spanish: un caudillo
  alternatives_spanish:
  - un líder
  - un conductor
  - un guía
  lexicon: LSJ
  rationale: ἡγούμενος subraya la función de conducir. Se opta por «caudillo» para mantener la diferencia con ἄρχων y conservar el matiz de conducción; en el registro bíblico español también puede sonar fuerte y directivo. Se deja constancia de la alternativa más neutral «líder».
- source_word: τοῦ πολεμῆσαι
  english_pob_choice: to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - para luchar
  - para pelear
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. «Combatir» mantiene el sentido bélico de πολεμέω con un español digno y claro.
- source_word: τὸν πόλεμον ἡμῶν
  english_pob_choice: our war
  chosen_spanish: nuestra guerra
  alternatives_spanish:
  - nuestro combate
  - nuestra batalla
  - nuestra guerra
  lexicon: LSJ
  rationale: πόλεμος significa «guerra» en sentido pleno, no solo una batalla puntual. «Nuestra guerra» conserva el alcance del sustantivo y el posesivo colectivo.
theological_decisions:
- issue: Cómo distinguir ἄρχοντα y ἡγούμενον sin fusionarlos en un solo cargo
  english_pob_reading: a ruler and leader
  chosen_spanish_reading: un jefe y un caudillo
  alternative_spanish_readings:
  - un gobernante y un líder
  - un jefe y un dirigente
  - un gobernante y un caudillo
  rationale: El texto presenta dos títulos complementarios. La versión española mantiene ambos de forma distinta para no borrar la duplicación semántica ni convertirla en un único oficio técnico.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el sentido auditado del inglés POB y el griego: selección para función de autoridad y conducción, con propósito militar. No se detectan cambios necesarios respecto del pass más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se preserva la distinción entre dos términos de autoridad: uno para el cargo de mando y otro para la función de conducción.'
  - Se opta por una sintaxis española directa y formal, cercana al ritmo del original sin calcado excesivo.
