translation:
  language: es
  text: Y comerán tu cosecha y tu pan[a]; comerán tus hijos y tus hijas; comerán tu rebaño y tu ganado; comerán tu vid y tu higuera; destruirán tus ciudades fortificadas, en las que confías[b], con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devorarán» para el verbo repetido «comer» a lo largo del versículo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa entre formas singulares y plurales para el invasor o invasores, tratándolo probablemente como un colectivo y también como sus fuerzas individuales.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָכַל / יֹאכְלוּ / יֹאכַל
  english_pob_choice: will consume / will consume
  chosen_spanish: comerán
  alternatives_spanish:
  - devorarán
  - consumirán
  lexicon: HALOT
  rationale: אָכַל significa literalmente «comer», y en este contexto de juicio se extiende a la destrucción de cosechas, personas y recursos. «Comerán» mantiene la repetición del verbo hebreo y permite que la imagen siga siendo audible en toda la serie, sin sobreadornar el texto. «Consumirán» sería más explicativo; «devorarán» es más intenso de lo que exige el hebreo en cada cláusula.
- source_word: קְצִירְךָ
  english_pob_choice: your harvest
  chosen_spanish: tu cosecha
  alternatives_spanish:
  - tu cosecha recolectada
  - tu siega
  lexicon: HALOT
  rationale: קָצִיר puede designar la cosecha obtenida o el tiempo de cosecha. «Cosecha» es natural en español y comunica bien el sentido de los bienes agrícolas que serán tomados o destruidos.
- source_word: לַחְמֶךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu alimento
  - tu comida
  lexicon: HALOT
  rationale: לֶחֶם es literalmente «pan» y también puede abarcar alimento. Aquí conviene conservar la imagen concreta del pan, en paralelo con la cosecha, como parte de la devastación del sustento cotidiano.
- source_word: בָּנֶיךָ וּבְנוֹתֶיךָ
  english_pob_choice: your sons and your daughters
  chosen_spanish: tus hijos y tus hijas
  alternatives_spanish:
  - tus muchachos y tus muchachas
  - tus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos. En español, «hijos y hijas» conserva esa pareja sin borrar la precisión del original; «hijos» solo sería más genérico de lo que permite el texto.
- source_word: צֹאנְךָ וּבְקָרֶךָ
  english_pob_choice: your flock and your herd
  chosen_spanish: tu rebaño y tu ganado
  alternatives_spanish:
  - tus ovejas y tu ganado vacuno
  - tu rebaño y tu manada
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor, especialmente ovejas y cabras, y בָּקָר el ganado mayor. «Rebaño y ganado» preserva la distinción de manera idiomática y clara, sin forzar una especificación zoológica que el hebreo no da aquí.
- source_word: גַּפְנְךָ וּתְאֵנָתֶךָ
  english_pob_choice: your vine and your fig tree
  chosen_spanish: tu vid y tu higuera
  alternatives_spanish:
  - tu vid y tu árbol de higos
  - tu viña y tu higuera
  lexicon: HALOT
  rationale: Los sustantivos están en singular y funcionan como emblemas de la provisión agrícola. «Vid y higuera» conserva esa pareja tradicional sin convertirla en un colectivo como «viña», que iría más allá de la forma hebrea.
- source_word: יְרֹשֵׁשׁ
  english_pob_choice: will destroy / will lay waste
  chosen_spanish: destruirán
  alternatives_spanish:
  - arruinarán
  - devastarán
  - dejarán en ruinas
  lexicon: HALOT
  rationale: El verbo raro יְרֹשֵׁשׁ conlleva la idea de arrasar o dejar en ruinas. «Destruirán» es suficientemente directo en español y funciona bien con «ciudades fortificadas», sin perder el sentido de ruina militar.
- source_word: עָרֵי מִבְצָרֶיךָ
  english_pob_choice: your fortified cities
  chosen_spanish: tus ciudades fortificadas
  alternatives_spanish:
  - tus ciudades fuertes
  - tus ciudades de fortaleza
  lexicon: HALOT
  rationale: La construcción indica ciudades caracterizadas por defensas o fortificación. «Ciudades fortificadas» es la equivalencia más clara y natural en español moderno.
- source_word: אֲשֶׁר אַתָּה בּוֹטֵחַ בָּהֵנָּה
  english_pob_choice: in which you trust
  chosen_spanish: en las cuales tú confías
  alternatives_spanish:
  - en las que confías
  - en las cuales confías
  lexicon: HALOT
  rationale: בָּטַח expresa confiar, apoyarse, sentirse seguro. «En las cuales tú confías» conserva la relación con las ciudades fortificadas y mantiene el matiz de confianza mal depositada que el contexto denuncia.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con espada
  alternatives_spanish:
  - por espada
  - a espada
  lexicon: HALOT
  rationale: La preposición hebrea marca el instrumento del juicio militar. «Con espada» es fiel y natural; «a espada» también sería posible, pero «con» conserva mejor el valor instrumental directo.
theological_decisions:
- issue: Sujeto colectivo singular/plural del invasor
  english_pob_reading: The Hebrew shifts between singular and plural verbs for the invader(s), likely treating the attacking nation both as a collective whole and as its individual forces.
  chosen_spanish_reading: El español usa plural sostenido («comerán», «destruirán») para reflejar la serie verbal plural dominante, sin borrar que el agente es un invasor colectivo.
  alternative_spanish_readings:
  - usar singular colectivo («comerá», «destruirá»)
  - mezclar singular y plural para imitar más de cerca la oscilación hebrea
  rationale: La secuencia hebrea alterna formas verbales, pero el español puede sonar forzado si intenta reproducir cada oscilación de manera literal. Mantener el plural comunica bien el sentido y sigue la revisión inglesa más reciente, sin resolver indebidamente la tensión del sujeto colectivo.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió sujetos singulares por plurales para ajustarse a los verbos hebreos y sustituyó «lay waste» por «destroy». Esta entrada española sigue ese ajuste plural, pero conserva la fuerza de la devastación con «destruirán» y mantiene la repetición verbal del original.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - «Pan» se usa literalmente para לֶחֶם, sin generalizar a «alimento», para respetar el paralelismo con «cosecha».
  - «Vid e higuera» mantiene el singular hebreo y evita convertir la imagen en una paráfrasis agrícola más amplia.
  - La puntuación conserva la cadena de juicios separada por punto y coma, como en la estructura del hebreo y la tradición auditada.
