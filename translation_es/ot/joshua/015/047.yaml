translation:
  language: es
  text: Asdod, sus ciudades hijas[a] y sus aldeas; Gaza, sus ciudades hijas y sus aldeas; hasta el arroyo de Egipto[b], y el Mar Grande[c], su límite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'hijas' es un modismo para pueblos o ciudades dependientes, subordinados o satélites de una ciudad principal.
    reason: lexical_alternative
  - marker: b
    text: O «wadi de Egipto». El hebreo nájal puede denotar un cauce estacional o wadi.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el mar Mediterráneo.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנוֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus hijas
  - sus ciudades dependientes
  - sus poblados hijos
  lexicon: HALOT
  rationale: En listas territoriales, la imagen de 'hijas' designa asentamientos dependientes de una ciudad principal. 'Ciudades hijas' conserva la metáfora y la hace inteligible en español sin perder el valor administrativo o territorial.
- source_word: חֲצֵרֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus villas
  - sus poblados
  - sus asentamientos
  lexicon: HALOT
  rationale: El término refiere aquí a asentamientos menores periféricos. 'Aldeas' comunica bien ese rango en español moderno y mantiene la distinción frente a 'ciudades hijas'.
- source_word: נַחַל מִצְרַיִם
  english_pob_choice: the Brook of Egypt
  chosen_spanish: el arroyo de Egipto
  alternatives_spanish:
  - el torrente de Egipto
  - el wadi de Egipto
  - el arroyo/Wadi de Egipto
  lexicon: HALOT
  rationale: '''Nájal'' puede designar un cauce estacional o arroyo torrencial. ''Arroyo de Egipto'' conserva la forma breve y clara en español, sin ocultar que se trata de un curso de agua estacional; el nombre tradicional queda explicado mejor que con una transliteración técnica.'
- source_word: הַיָּם
  english_pob_choice: the Great Sea
  chosen_spanish: el Mar Grande
  alternatives_spanish:
  - el mar
  - el Mediterráneo
  - el Gran Mar
  lexicon: HALOT
  rationale: '''Mar Grande'' reproduce el giro bíblico habitual y evita sustituirlo por un término geográfico moderno que explicitaría más de lo que dice el hebreo. En contexto fronterizo, el referente es claro para el lector bíblico.'
- source_word: הַגְּבוּל וּגְבוּל
  english_pob_choice: which is its boundary
  chosen_spanish: que es su límite
  alternatives_spanish:
  - que es su frontera
  - y su límite
  - que es la frontera de ésta
  lexicon: HALOT
  rationale: La clausura hebrea es elíptica y expresa función limítrofe. 'Límite' mantiene el sentido territorial y suena natural en español; 'frontera' sería posible, pero 'límite' resulta más cercano a la fórmula bíblica.
- source_word: אַשְׁדּוֹד / עַזָּה
  english_pob_choice: Ashdod / Gaza
  chosen_spanish: Asdod / Gaza
  alternatives_spanish:
  - Asdod / Gazza
  - Ashdod / Gaza
  lexicon: convención toponímica hispana
  rationale: Son nombres propios geográficos. 'Asdod' es la forma habitual en español bíblico; se mantiene 'Gaza' sin adaptación adicional.
theological_decisions:
- issue: Alcance territorial de la frontera occidental y meridional
  english_pob_reading: the Great Sea, which is its boundary
  chosen_spanish_reading: el Mar Grande, que es su límite
  alternative_spanish_readings:
  - el Mediterráneo, que es su límite
  - el mar, que era su frontera
  rationale: Se conserva la función de borde territorial sin precisar más allá del hebreo. 'Mar Grande' deja visible la formulación bíblica, y 'límite' reproduce la idea de frontera marcada por el mar.
  doctrine_reference: Geografía bíblica / delimitación territorial de la heredad
translation_notes:
  revision_awareness: 'La traducción sigue el texto hebreo masorético y el audit trail inglés sin cambios sustantivos respecto del sentido territorial: dos ciudades principales con sus asentamientos dependientes, hasta la frontera meridional y el mar occidental como límite.'
  spanish_consistency_notes:
  - Se usa 'ciudades hijas' para conservar la metáfora territorial de בְּנוֹתֶיהָ sin volverla opaca.
  - '''Aldeas'' distingue los asentamientos menores de las ''ciudades hijas''.'
  - '''Mar Grande'' mantiene el giro bíblico y se armoniza con el uso de ''límite'' para גבול.'
  - Se evita 'SEÑOR' o terminología teológica ajena porque el versículo es puramente geográfico.
