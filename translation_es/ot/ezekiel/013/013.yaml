  revision_rationale: Se ajustó el título divino para representar mejor אֲדֹנָי יְהוִה sin ocultar 'Yahvé'; se reemplazó 'soltaré' por 'desencadenaré' para reflejar mejor la fuerza causativa de וּבִקַּעְתִּי; se cambió 'en furia' a 'con furia' por naturalidad; y se reformuló לְכָלָה como 'para destruir por completo', que expresa con claridad el fin total de la destrucción en español natural.
