translation:
  language: es
  text: Mi carne y mi corazón pueden desfallecer[a], pero Dios es la roca[b] de mi corazón y mi porción para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Mi carne y mi corazón desfallecen»; el verbo hebreo puede expresar un sentido simple de presente o una idea más general de consumirse o llegar al fin.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la fuerza de mi corazón». El hebreo dice más literalmente: «la roca de mi corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלָה
  english_pob_choice: may fail
  chosen_spanish: pueden desfallecer
  alternatives_spanish:
  - desfallecen
  - pueden fallar
  - se acaban
  lexicon: HALOT
  rationale: El hebreo puede expresar llegar al fin, consumirse o desfallecer. En español, «desfallecer» conserva la idea de debilitamiento o agotamiento y mantiene bien el paralelismo poético con «mi carne y mi corazón».
- source_word: שְׁאֵרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi ser corporal
  lexicon: HALOT
  rationale: Aquí el paralelismo con «mi corazón» apunta a la dimensión corporal del salmista. «Carne» preserva la imaginería bíblica y la tensión antropológica entre exterior e interior.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  lexicon: HALOT
  rationale: «Corazón» es la equivalencia bíblica natural para לֵבָב y conserva la repetición poética del versículo.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - la fuerza
  - el refugio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «roca». Mantener la metáfora evita reducirla a una explicación abstracta y conserva su fuerza de estabilidad y seguridad.
- source_word: חֶלְקִי
  english_pob_choice: my portion
  chosen_spanish: mi porción
  alternatives_spanish:
  - mi parte
  - mi herencia
  lexicon: HALOT
  rationale: «Porción» es el equivalente tradicional y exacto para la imagen de la herencia o parte asignada; conserva el matiz devocional y pactual.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En esta confesión directa, el referente es el Dios de Israel; «Dios» es la traducción natural y transparente.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión comunica permanencia duradera. «Para siempre» suena natural en español actual y conserva el sentido devocional del hebreo.
theological_decisions:
- issue: Contraste antropológico entre la fragilidad humana y la suficiencia de Dios
  english_pob_reading: My flesh and my heart may fail
  chosen_spanish_reading: Mi carne y mi corazón pueden desfallecer
  alternative_spanish_readings:
  - Mi cuerpo y mi mente pueden desfallecer
  - Mi carne y mi corazón desfallecen
  rationale: Se conserva la tensión entre debilidad física e interior, sin reemplazarla por categorías modernas que reduzcan la antropología bíblica. El matiz de posibilidad encaja bien con el hebreo y con la lectura POB.
  doctrine_reference: Antropología bíblica; traducción de texto poético sapiencial.
- issue: Metáfora concreta para la suficiencia divina
  english_pob_reading: God is the rock of my heart
  chosen_spanish_reading: Dios es la roca de mi corazón
  alternative_spanish_readings:
  - Dios es la fuerza de mi corazón
  - Dios es mi refugio interior
  rationale: Se mantiene la imagen concreta de «roca» en vez de interpretarla como «fuerza», porque el hebreo usa una metáfora material que comunica estabilidad, firmeza y seguridad.
  doctrine_reference: Teología del lenguaje figurado; preservación de metáfora bíblica.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se requirieron revisiones adicionales; la redacción española conserva el paralelismo, la metáfora de «roca» y el matiz aspectual del verbo hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלֹהִים.
  - Se mantiene «carne» para שְׁאֵרִי y no se sustituye por «cuerpo», para no aplanar la antropología bíblica.
  - «Porción» conserva el valor pactal/devocional del hebreo.
  - La nota al pie marca la ambigüedad verbal sin duplicar la lectura principal.
