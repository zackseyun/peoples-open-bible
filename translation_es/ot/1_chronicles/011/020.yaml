base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/020.yaml
  text: And Abishai[a], the brother of Joab, was chief of the Three. He brandished his spear against three hundred slain[c][b], and had a name among the Three.
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Three.'' In the parallel passage (2 Sam 23:18), some English versions render the group differently because of textual and contextual difficulties involving ''three'' and ''thirty.'''
    reason: textual_variant
  - marker: b
    text: Or 'lifted up his spear' or 'wielded his spear.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom is literally 'had a name,' that is, 'was renowned.'
    reason: lexical_alternative
