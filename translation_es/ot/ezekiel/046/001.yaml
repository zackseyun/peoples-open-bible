translation:
  language: es
  text: 'Así dice el Señor Yahvé: la puerta del atrio interior que mira al oriente estará cerrada durante los seis días de trabajo, pero en el día de reposo se abrirá, y en el día de la luna nueva[a] se abrirá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el día de la luna nueva»; es decir, la observancia mensual de la luna nueva.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un registro solemne y natural en español, equivalente al tono de anuncio autorizado del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino YHWH como 'Yahvé' según la norma del proyecto, y אֲדֹנָי se rinde como 'Señor' para preservar la combinación titulativa sin ocultar el nombre propio.
- source_word: שַׁעַר הֶחָצֵר הַפְּנִימִית
  english_pob_choice: The gate of the inner court
  chosen_spanish: la puerta del atrio interior
  alternatives_spanish:
  - la puerta del patio interior
  - la entrada del atrio interior
  lexicon: HALOT
  rationale: '''Atrio'' conserva el vocabulario del contexto del templo y ''puerta'' traduce con claridad שַׁעַר sin desplazar el término técnico.'
- source_word: הַפֹּנֶה קָדִים
  english_pob_choice: that faces east
  chosen_spanish: que mira al oriente
  alternatives_spanish:
  - que da al oriente
  - orientada al este
  lexicon: HALOT
  rationale: '''Mira al oriente'' reproduce el sentido direccional del participio de manera natural en español y mantiene el lenguaje bíblico sin endurecerlo.'
- source_word: יִהְיֶה סָגוּר
  english_pob_choice: shall be shut
  chosen_spanish: estará cerrada
  alternatives_spanish:
  - será cerrada
  - permanecerá cerrada
  lexicon: HALOT
  rationale: El hebreo expresa estado continuo; en español, 'estará cerrada' comunica mejor la condición vigente que un mero futuro pasivo.
- source_word: שֵׁשֶׁת יְמֵי הַמַּעֲשֶׂה
  english_pob_choice: during the six working days
  chosen_spanish: durante los seis días de trabajo
  alternatives_spanish:
  - durante los seis días laborables
  - a lo largo de los seis días de labor
  lexicon: HALOT
  rationale: '''Días de trabajo'' preserva el contraste idiomático con el día de reposo sin forzar una equivalencia demasiado técnica.'
- source_word: וּבְיוֹם הַשַּׁבָּת
  english_pob_choice: but on the Sabbath day
  chosen_spanish: pero en el día de reposo
  alternatives_spanish:
  - y en el día de reposo
  - pero en sábado
  lexicon: HALOT
  rationale: '''Día de reposo'' comunica con precisión el valor cultual de שַׁבָּת y evita reducirlo a un nombre de día meramente calendárico.'
- source_word: יִפָּתֵחַ
  english_pob_choice: it shall be opened
  chosen_spanish: se abrirá
  alternatives_spanish:
  - será abierta
  - quedará abierta
  lexicon: HALOT
  rationale: La pasiva nifal se expresa de forma natural en español con 'se abrirá', manteniendo el carácter normativo y repetitivo del mandato.
- source_word: וּבְיוֹם הַחֹדֶשׁ
  english_pob_choice: and on the day of the new moon
  chosen_spanish: y en el día de la luna nueva
  alternatives_spanish:
  - y en el día de la nueva luna
  - y en el día del novilunio
  lexicon: HALOT
  rationale: Se conserva la lectura cultual del texto; 'luna nueva' es clara en español y comunica la observancia mensual sin perder el trasfondo calendárico.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El texto contiene el Tetragrámaton, y la política del proyecto pide 'Yahvé' en el texto principal. Se conserva 'Señor' para אֲדֹנָי, de modo que el lector perciba tanto el título como el nombre propio sin sustituirlo por una máscara tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor cultual de הַחֹדֶשׁ
  english_pob_reading: the day of the new moon
  chosen_spanish_reading: el día de la luna nueva
  alternative_spanish_readings:
  - el día del novilunio
  - el día de la nueva luna
  rationale: En este contexto de regulaciones del templo, el término apunta a la observancia mensual de luna nueva, no solo al dato astronómico de 'mes'. La traducción mantiene esa referencia cultual sin añadir explicación en el cuerpo del verso.
  doctrine_reference: Ezequiel 46:1; contexto calendárico-cultual del templo
- issue: Estilo de imperativo/mandato legal en la descripción del templo
  english_pob_reading: shall be shut / shall be opened
  chosen_spanish_reading: estará cerrada / se abrirá
  alternative_spanish_readings:
  - será cerrada / será abierta
  - permanecerá cerrada / quedará abierta
  rationale: El hebreo usa formas que describen estado normativo y acciones prescritas. En español, la combinación de futuro y pasiva refleja la instrucción sin exagerar la fuerza modal.
  doctrine_reference: Uso profético-legal en textos cultuales
translation_notes:
  revision_awareness: 'Alineado con la última revisión auditada: sin cambios necesarios según el informe de alta concordancia. Se respetó la decisión del nombre divino como Yahvé, y se mantuvo la observancia de la luna nueva como nota cultural sin alterar el sentido del versículo.'
  spanish_consistency_notes:
  - Se usó 'atrio' para mantener coherencia con terminología del templo.
  - Se evitó 'SEÑOR' como máscara del nombre divino, siguiendo la política del proyecto.
  - Se eligió 'día de reposo' como equivalente funcional de 'Sabbath day' en este contexto.
  - La pasiva de יִפָּתֵחַ se uniformó como 'se abrirá' en ambas ocurrencias.
  - La nota al pie marca únicamente la aclaración cultural ya documentada en el inglés POB.
