  to: Pero si no hubiéramos quedado implicados en muchos pecados[a], entonces, así como Heliodoro, que fue enviado por el rey Seleuco para inspeccionar la tesorería, fue inmediatamente azotado y hecho retroceder en su audacia cuando se adelantó, también nosotros habríamos sido derribados.
