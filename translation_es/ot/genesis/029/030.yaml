revisions:
- from: Así que entró también a Raquel[a], y amó a Raquel más que a Lea; y sirvió con él por otros siete años.
  to: Así que se unió también a Raquel, y amó a Raquel más que a Lea[a]; y sirvió con él por otros siete años.
  rationale: Se ajusta el modismo matrimonial a un español más natural y digno («se unió a») sin perder el eufemismo del hebreo, y se corrige la ubicación de la nota al pie para que explique correctamente la frase comparativa מִלֵּאָה.
