revisions:
- from: 'Habla a los hijos de Israel y diles: Cuando un hombre haga un voto especial, conforme a tu valuación de personas para Yahvé[a][b],'
  to: 'Habla a los hijos de Israel y diles: Cuando un hombre haga un voto especial, según tu valoración[a] de personas, a Yahvé[b],'
  rationale: Se reemplaza «valuación» por «valoración» para mejorar la naturalidad y la legibilidad en español sin perder el matiz técnico. Se ajusta «para Yahvé» a «a Yahvé» para reflejar mejor la construcción hebrea. Además, se reordena el anclaje de notas para que la nota textual difícil recaiga sobre «valoración» y la nota léxica sobre «Yahvé», manteniendo ambos marcadores presentes en el texto y corrigiendo la falta de una alternativa real en la nota [a].
