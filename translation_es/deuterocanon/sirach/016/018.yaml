    rationale: El English POB documenta una traducción idiomática del superlativo semítico («the highest heavens»). En español, «los cielos más altos» preserva mejor el sentido sin rigidez innecesaria.
  - severity: medium
    issue: «al visitarlos» cambia el matiz de בְּפָקְדוֹ
    rationale: La forma hebrea y el paralelo griego sostienen un sustantivo/evento de intervención divina («visitación»), no necesariamente una acción transitiva con objeto explícito. «En su visitación» conserva mejor el peso teológico y evita añadir «-los».
  - severity: low
