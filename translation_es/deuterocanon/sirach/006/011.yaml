revisions:
- from: En tu prosperidad, él será como tú[a], pero en tu adversidad se separará de ti.
  to: En tu prosperidad, él es como tú[a], pero en tu adversidad se separará de ti.
  rationale: Se ajusta la primera cola a «él es como tú» para reflejar con mayor fidelidad y naturalidad el hebreo principal, y se fortalece la transparencia léxica de la variante griega con «esclavos».
