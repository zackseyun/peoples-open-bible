  rationale: Se mantiene «edifica Jerusalén» como traducción fiel y natural de בּוֹנֵה יְרוּשָׁלַם, en línea con la revisión inglesa que evitó añadir «up». Se cambia «desterrados» por «expulsados» para reflejar mejor el sentido más amplio de נִדְחֵי como personas echadas fuera o apartadas, sin limitarlo a exilio formal. Se añade una nota con alternativas léxicas significativas preservadas en el expediente inglés.
