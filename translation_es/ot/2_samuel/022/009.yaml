review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue la decisión del POB de conservar la imaginería antropomórfica: humo que sube, fuego que sale de la boca, y brasas procedentes de él. También preserva adecuadamente la nota alternativa sobre אַף como nariz/narices o ira. Sin embargo, dos elecciones debilitan la viveza y naturalidad del original: «fuego consumidor» suena menos idiomático que una construcción verbal/adjetival más natural en español, y «brasas se encendieron de él» reproduce demasiado literalmente el inglés, cuando el hebreo/inglés apuntan a que las brasas ardieron o llamearon procedentes de él.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «de sus narices» resulta algo tosco; puede mantenerse por fidelidad, aunque «de sus fosas nasales» sería demasiado técnico. El mayor problema de legibilidad está en «brasas se encendieron de él», que suena forzado en español e innecesariamente calcado. «Fuego que consume» y «las brasas ardieron de él» conservan mejor el sentido y mejoran la fluidez.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Se preserva la imaginería corporal y no se resuelve indebidamente אַף como «ira» en el texto principal. «Brasas» para גחלים es apropiado. La revisión propuesta solo mejora naturalidad y fuerza poética sin apartarse de las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: «fuego consumidor» suena poco natural en este contexto
    rationale: Aunque posible, en español bíblico actual resulta más idiomático «fuego que consume» o «fuego devorador». La forma actual conserva el sentido, pero endurece innecesariamente la frase.
  - severity: medium
    issue: «brasas se encendieron de él» es una construcción forzada
    rationale: «De él» al final tras «se encendieron» suena calcado y poco natural. El hebreo expresa procedencia y combustión; «las brasas ardieron de él» preserva ambas ideas con mejor español y tono poético.
  - severity: low
    issue: Falta artículo en «brasas»
    rationale: En español, «las brasas» funciona mejor como sintagma nominal definido en este paralelismo poético; sin artículo suena más abrupto de lo necesario.
  revised_spanish_text: Subió humo de sus narices[a], y fuego que consume de su boca; las brasas ardieron de él.
  revised_footnotes:
  - marker: a
    text: O «de su nariz»; también puede entenderse idiomáticamente como «de su ira», porque el hebreo para «nariz/narices» puede expresar enojo.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene todas las decisiones exegéticas del POB —especialmente la imaginería corporal literal y la nota sobre la alternativa idiomática— pero mejora la naturalidad y fuerza poética del español. «Fuego que consume» expresa con claridad el valor activo de תֹאכֵל, y «las brasas ardieron de él» comunica mejor la combustión y la procedencia de מִמֶּנּוּ sin sonar como calco rígido.
