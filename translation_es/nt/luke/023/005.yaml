translation:
  language: es
  text: 'Pero ellos seguían insistiendo[a], diciendo: «Él agita al pueblo, enseñando por toda Judea[b], comenzando desde Galilea hasta aquí[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incita al pueblo». El verbo griego puede significar provocar o agitar en un sentido perturbador.
    reason: lexical_alternative
  - marker: b
    text: «Judea» puede referirse aquí a la región de Judea específicamente o, en un contexto más amplio, al territorio judío en discusión; aquí la expresión subraya la amplitud de su actividad.
    reason: cultural_note
  - marker: c
    text: O «hasta aquí» o «hasta este lugar». La frase apunta desde Galilea hasta el sitio donde están ahora ante Pilato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίσχυον
  english_pob_choice: kept insisting
  chosen_spanish: seguían insistiendo
  alternatives_spanish:
  - insistían con más fuerza
  - seguían presionando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; «seguían insistiendo» conserva esa persistencia y el tono de presión de la acusación sin volverla más técnica de lo que permite el griego.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  - argumentando
  lexicon: BDAG
  rationale: Es el participio que introduce el contenido de lo que afirmaban. «Diciendo» es la equivalencia más directa y natural en español.
- source_word: Ἀνασείει
  english_pob_choice: stirs up
  chosen_spanish: agita
  alternatives_spanish:
  - incita
  - alborota
  lexicon: BDAG
  rationale: El verbo puede significar provocar o conmover de manera perturbadora. «Agita» preserva la idea de mover de forma inquietante sin convertir la acusación en un cargo político más específico que el texto griego.
- source_word: τὸν λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: BDAG
  rationale: λαός aquí se refiere al conjunto del pueblo, no a una multitud puntual. «Al pueblo» mantiene ese alcance amplio.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseña
  - al enseñar
  lexicon: BDAG
  rationale: El participio expresa la manera o circunstancia de la supuesta acción. «Enseñando» conserva la función participial de forma breve y clara.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας
  english_pob_choice: throughout all Judea
  chosen_spanish: por toda Judea
  alternatives_spanish:
  - a lo largo de toda Judea
  - por toda la región de Judea
  lexicon: BDAG
  rationale: La construcción indica extensión por toda la región. «Por toda Judea» suena natural en español y conserva el sentido de alcance general.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  lexicon: BDAG
  rationale: Es un nombre geográfico propio; en español se mantiene la forma tradicional y transparente «Judea».
- source_word: ἀρξάμενος
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - habiendo comenzado
  - empezando
  lexicon: BDAG
  rationale: El participio aoristo marca el punto de partida de la actividad denunciada. «Comenzando» fluye bien con la frase siguiente y conserva esa referencia inicial.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - a partir de Galilea
  - procediendo de Galilea
  lexicon: BDAG
  rationale: ἀπό señala el origen o punto de partida. «Desde Galilea» preserva de manera natural ese valor espacial.
- source_word: ἕως ὧδε
  english_pob_choice: even to here
  chosen_spanish: hasta aquí
  alternatives_spanish:
  - hasta este lugar
  - incluso hasta aquí
  lexicon: BDAG
  rationale: La frase enfatiza la extensión desde Galilea hasta el lugar presente. «Hasta aquí» conserva la deixis del original con naturalidad en español.
theological_decisions:
- issue: Naturaleza de la acusación contra Jesús
  english_pob_reading: He stirs up the people, teaching throughout all Judea, beginning from Galilee even to here.
  chosen_spanish_reading: Él agita al pueblo, enseñando por toda Judea, comenzando desde Galilea hasta aquí.
  alternative_spanish_readings:
  - Él incita al pueblo
  - Él alborota al pueblo
  rationale: La redacción mantiene la acusación hostil sin añadir un delito político técnico que el griego no exige. «Agita» conserva el matiz de perturbación social y deja abierta la tensión histórica del cargo.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión revisada del POB en inglés no requirió cambios: se mantuvo la lectura de ἐπίσχυον como insistencia continua, de Ἀνασείει como perturbación social general y de ἕως ὧδε como referencia deíctica al lugar presente.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de disfraz para el nombre divino porque este versículo no contiene un referente al Tetragrámaton.
  - «Agita» se eligió para no endurecer innecesariamente la acusación en «incita» dentro del texto principal; la alternativa queda preservada en nota.
  - «Por toda Judea» mantiene el alcance regional sin añadir explicaciones que correspondan solo al aparato crítico o cultural.
