translation:
  language: es
  text: a causa de toda la maldad de los hijos de Israel y de los hijos de Judá, que hicieron para provocarme a ira[a] —ellos, sus reyes, sus oficiales, sus sacerdotes y sus profetas, y cada hombre de Judá[b] y los habitantes de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para irritarme»; el hebreo puede expresarse también de manera más breve como «enojarme».
    reason: lexical_alternative
  - marker: b
    text: O «los hombres de Judá»; la forma hebrea singular puede tener sentido distributivo o representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: En este contexto la preposición expresa base causal de la acción divina anunciada en el versículo anterior. «A causa de» mantiene la fuerza causal de forma natural en español.
- source_word: כָּל רָעַת
  english_pob_choice: all the evil
  chosen_spanish: toda la maldad
  alternatives_spanish:
  - todo el mal
  - toda la perversidad
  - toda la maldad cometida
  lexicon: HALOT
  rationale: רָעָה aquí apunta a maldad moral, y el alcance de כָּל se conserva con «toda». «Maldad» comunica bien el peso ético del término en español.
- source_word: בְּנֵי יִשְׂרָאֵל וּבְנֵי יְהוּדָה
  english_pob_choice: the sons of Israel and the sons of Judah
  chosen_spanish: los hijos de Israel y de los hijos de Judá
  alternatives_spanish:
  - el pueblo de Israel y el pueblo de Judá
  - los israelitas y los judíos de Judá
  - los hijos de Israel y los hijos de Judá
  lexicon: HALOT
  rationale: Se preserva la forma literal y marcada del hebreo, «hijos de», porque el POB inglés también retuvo esa forma por fidelidad formal y porque la carga colectiva masculina es significativa. En español «hijos de» es plenamente inteligible y evita neutralizar demasiado pronto el texto.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they did
  chosen_spanish: que hicieron
  alternatives_spanish:
  - que han hecho
  - que cometieron
  - que realizaron
  lexicon: HALOT
  rationale: עשה se rinde de manera simple con «hacer / hicieron» sin añadir una interpretación más fuerte de la que exige el hebreo.
- source_word: לְהַכְעִסֵנִי
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - para enojarme
  - para irritarme
  - para provocarme
  lexicon: HALOT
  rationale: El piel/hiphil de כעס expresa causar ira. «Provocarme a ira» conserva tanto la causalidad como la respuesta emocional divina. «Ira» mantiene el registro bíblico sin suavizarlo.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - son ellos
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y abre la lista de responsables; en español puede reflejarse con un inciso appositivo y «ellos» sin exagerar la intensificación.
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - los reyes de ellos
  lexicon: HALOT
  rationale: Posesivo directo y natural en español, sin pérdida del referente.
- source_word: שָׂרֵיהֶם
  english_pob_choice: their officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus líderes
  - sus gobernantes
  lexicon: HALOT
  rationale: שָׂרִים designa funcionarios o jefes; «oficiales» mantiene el matiz administrativo y evita el posible tono nobiliario de «príncipes».
- source_word: כֹּהֲנֵיהֶם
  english_pob_choice: their priests
  chosen_spanish: sus sacerdotes
  lexicon: HALOT
  rationale: Equivalente estándar y transparente.
- source_word: וּנְבִיאֵיהֶם
  english_pob_choice: and their prophets
  chosen_spanish: y sus profetas
  lexicon: HALOT
  rationale: Equivalente estándar y transparente.
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: and the men of Judah
  chosen_spanish: y cada hombre de Judá
  alternatives_spanish:
  - y los hombres de Judá
  - y todo hombre de Judá
  - y la gente de Judá
  lexicon: HALOT
  rationale: אִישׁ en singular con valor colectivo/distributivo puede expresarse como «cada hombre» para conservar el singular hebreo y la fuerza distributiva que el POB inglés quiso preservar con una nota. La nota aclara la alternativa colectiva posible.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and the inhabitants of Jerusalem
  chosen_spanish: y los habitantes de Jerusalén
  alternatives_spanish:
  - y los que habitaban en Jerusalén
  - y los moradores de Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» es la forma natural y fiel para el participio colectivo de residencia.
theological_decisions:
- issue: Alcance del culpable colectivo masculino
  english_pob_reading: Preserve masculine-marked collectives as 'sons' and 'men' rather than neutralizing to 'people'
  chosen_spanish_reading: Preservar las formas masculinas colectivas («hijos», «cada hombre») en vez de neutralizarlas a «pueblo»
  alternative_spanish_readings:
  - el pueblo de Israel y de Judá
  - las personas de Israel y de Judá
  - la población de Israel y de Judá
  rationale: El hebreo usa términos masculinos colectivos con valor representativo. Para reflejar la forma del original y la decisión auditada del POB, el español conserva esa marcación donde sigue siendo comprensible. La nota sobre «cada hombre» mantiene visible la tensión entre el singular hebreo y el sentido colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensidad de לְהַכְעִסֵנִי
  english_pob_reading: to provoke me to anger
  chosen_spanish_reading: para provocarme a ira
  alternative_spanish_readings:
  - para enojarme
  - para irritarme
  - para provocar mi ira
  rationale: «Ira» reproduce el registro bíblico y la fuerza del causativo mejor que una formulación más moderna pero más débil. No se atenúa la reacción divina ni se reescribe como simple molestia.
  doctrine_reference: Uso consistente del lenguaje bíblico de juicio y ofensa divina en la serie POB
- issue: Tratamiento del pronombre enfático הֵמָּה
  english_pob_reading: they—their kings, their officials...
  chosen_spanish_reading: ellos, sus reyes, sus oficiales...
  alternative_spanish_readings:
  - ellos mismos, sus reyes, sus oficiales...
  - ellos —sus reyes, sus oficiales...
  rationale: El hebreo introduce un énfasis retórico antes de la lista de culpables. El español lo conserva mediante incisión y pronombre explícito sin forzar una reiteración excesiva.
  doctrine_reference: Principio de transparencia retórica del POB
translation_notes:
  revision_awareness: 'El pasaje mantiene el sentido y la estructura del audit trail inglés, pero adapta el orden para sonar natural en español. Se conservan las tensiones documentadas: literalidad de «hijos», valor causativo de לְהַכְעִסֵנִי, y el singular colectivo de אִישׁ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el tetragrámaton.
  - Se mantiene «hijos» para בני y «hombre» para אִישׁ siguiendo la política de marcación masculina colectiva del POB.
  - «Oficiales» se usa para שָׂרִים por coherencia con otros pasajes donde se evita la sobrecarga nobiliaria de «príncipes».
  - La puntuación con guion largo ayuda a reproducir el inciso enfático del hebreo sin oscurecer la fluidez española.
