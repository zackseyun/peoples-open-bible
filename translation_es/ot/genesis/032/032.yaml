translation:
  language: es
  text: El sol salió sobre él cuando pasó Penuel[a], y cojeaba sobre su muslo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo escribe aquí el nombre del lugar como Penuel; en otros pasajes también aparece como Peniel.
    reason: lexical_alternative
  - marker: b
    text: O «por su cadera». Lit. «sobre su muslo». El hebreo conserva aquí una expresión más literal, aunque puede entenderse como referencia a la lesión en la cadera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְרַח
  english_pob_choice: rose
  chosen_spanish: salió
  alternatives_spanish:
  - amaneció
  - resplandeció
  lexicon: HALOT
  rationale: En este contexto, con el sol como sujeto, זרח describe su salida/irradiación. En español, «salió» es natural y comunica el movimiento del sol sin forzar una metáfora más intensa que la que el hebreo exige.
- source_word: לוֹ
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - para él
  - en él
  lexicon: HALOT
  rationale: El ל con este verbo y con el sol como sujeto expresa el efecto del sol alcanzándolo. «Sobre él» conserva mejor la perspectiva del hebreo que una paráfrasis como «para él».
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo con artículo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: mientras
  alternatives_spanish:
  - como
  - cuando
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal simultánea del amanecer con el paso por Penuel. «Mientras» suena natural en español y refleja la simultaneidad sin añadir interpretación.
- source_word: עָבַר
  english_pob_choice: passed
  chosen_spanish: pasaba
  alternatives_spanish:
  - pasó
  - cruzaba
  lexicon: HALOT
  rationale: El imperfecto hebreo con valor descriptivo se expresa bien con «pasaba». Mantiene la escena en desarrollo y no obliga a un evento puntual más fuerte que el texto.
- source_word: פְּנוּאֵל
  english_pob_choice: Penuel
  chosen_spanish: Penuel
  alternatives_spanish:
  - Peniel
  lexicon: HALOT
  rationale: Se conserva la forma consonántica del versículo presente, como hace el POB inglés. La nota explica la variación ortográfica con Peniel en otros lugares.
- source_word: וְהוּא
  english_pob_choice: and he was
  chosen_spanish: y
  alternatives_spanish:
  - y él estaba
  - mientras él
  lexicon: HALOT
  rationale: En español el pronombre puede omitirse sin perder referencia. El sentido continuativo queda marcado por la forma verbal siguiente, evitando rigidez innecesaria.
- source_word: צֹלֵעַ
  english_pob_choice: limping
  chosen_spanish: cojeaba
  alternatives_spanish:
  - renqueaba
  - estaba cojeando
  lexicon: HALOT
  rationale: El participio expresa estado continuado. «Cojeaba» es claro, digno y idiomático en español; conserva la idea de una cojera persistente sin añadir matices médicos no presentes en el hebreo.
- source_word: עַל יְרֵכוֹ
  english_pob_choice: on his thigh
  chosen_spanish: de su muslo
  alternatives_spanish:
  - sobre su muslo
  - a causa de su muslo
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «sobre su muslo», pero en español la relación natural con la cojera se expresa mejor como procedencia/afectación corporal: «de su muslo». Esto evita una construcción extraña sin borrar la base anatómica del texto.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de WLC y el POB inglés, pero adapta la sintaxis al español para evitar calcos poco naturales. Se preserva la variación ortográfica de Penuel/Peniel y la imagen corporal de יְרֵךְ sin convertirla en una paráfrasis médica ajena al versículo.
  spanish_consistency_notes:
  - Se mantiene «Penuel» por la forma del versículo y se explica la variante «Peniel» en nota.
  - Se traduce זרח con un verbo de salida/irradiación apropiado al sol; no se introduce «SEÑOR» ni otras sustituciones.
  - Se conserva un registro sobrio y bíblico, evitando el arcaísmo innecesario pero también evitando una paráfrasis demasiado libre.
  - «Muslo» se mantiene como término anatómico básico; la nota aclara el hebreo más literal para no perder la tensión lexical.
