base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/006.yaml
  text: But he did not put the sons of the killers to death[a], according to what is written in the Book of the Law of Moses, which Yahweh commanded, saying, “Fathers shall not be put to death for sons, and sons shall not be put to death for fathers; rather[b], each man shall die for his own sin.”
  footnotes:
  - marker: a
    text: Or, 'the children of the murderers.' The Hebrew literally says 'the sons of the killers.'
    reason: lexical_alternative
  - marker: b
    text: This quotation reflects Deuteronomy 24:16.
    reason: cross_reference
