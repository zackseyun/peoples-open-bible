translation:
  language: es
  text: En el esplendor glorioso de tu majestad, y en tus obras maravillosas, meditaré[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablaré de» o «musitaré sobre». El verbo hebreo puede tener tanto un matiz reflexivo como verbal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲדַר
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - majestad
  - hermosura
  - honor
  lexicon: HALOT
  rationale: En este encadenamiento poético, הֲדַר aporta la idea de brillo, magnificencia y dignidad real. «Esplendor» conserva ese matiz visual y ceremonial en español sin volver la frase pesada.
- source_word: כְּבוֹד
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - gloria
  - honor
  - peso
  lexicon: HALOT
  rationale: El hebreo añade otra capa de magnificencia dentro de la cadena constructa. En español, «glorioso» funciona naturalmente como adjetivo que intensifica «esplendor», manteniendo la fuerza acumulativa del original.
- source_word: הוֹדֶךָ
  english_pob_choice: your majesty
  chosen_spanish: tu majestad
  alternatives_spanish:
  - tu honor
  - tu esplendor
  - tu grandeza
  lexicon: HALOT
  rationale: הוד suele expresar majestad, dignidad regia o honor imponente, especialmente aplicado a Dios. «Tu majestad» es la equivalencia más clara y digna en español para ese registro.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous works
  chosen_spanish: tus obras maravillosas
  alternatives_spanish:
  - tus maravillas
  - tus hechos maravillosos
  - tus obras portentosas
  lexicon: HALOT
  rationale: Aunque el sustantivo puede traducirse como «maravillas», el contexto habla de las acciones de Dios. «Obras maravillosas» preserva el valor concreto de hechos realizados y no solo de cualidades abstractas.
- source_word: אָשִׂיחָה
  english_pob_choice: I will meditate
  chosen_spanish: meditaré
  alternatives_spanish:
  - hablaré
  - musearé
  - recontaré
  lexicon: HALOT
  rationale: שיח puede abarcar meditar, hablar o reflexionar en voz baja. Siguiendo el audit trail inglés y el tono contemplativo del verso, «meditaré» comunica bien la intención principal, sin negar la posibilidad verbal del verbo.
theological_decisions:
- issue: Cómo rendir la cadena de magnificencia aplicada a Dios sin debilitarla ni volverla antinatural en español
  english_pob_reading: '"On the glorious splendor of your majesty" preserves a stacked poetic expression of divine royal grandeur.'
  chosen_spanish_reading: «En el esplendor glorioso de tu majestad» conserva la acumulación poética y el tono regio aplicado a Yahvé.
  alternative_spanish_readings:
  - En el esplendor de tu majestad gloriosa
  - En la gloriosa majestad de tu esplendor
  rationale: El hebreo amontona términos afines para intensificar la grandeza divina. La opción escogida mantiene esa tensión poética en una secuencia española natural y reverente.
  doctrine_reference: Divine majesty / regal imagery of God in the Psalms
- issue: Si אָשִׂיחָה debe dejar abierta la alternativa de hablar o meditar
  english_pob_reading: '"I will meditate" with footnoted alternatives ''I will speak of'' / ''I will muse on.'''
  chosen_spanish_reading: «meditaré» con nota que preserve la alternativa verbal/reflectiva.
  alternative_spanish_readings:
  - hablaré de ello
  - meditaré y hablaré de ello
  - pensaré en ello
  rationale: El verbo hebreo admite tanto reflexión interna como expresión verbal. En español, «meditaré» es la forma más natural para el sentido contemplativo, mientras la nota explica que el original también puede implicar hablar o musitar sobre ello.
  doctrine_reference: Lexical ambiguity of שיח in poetic praise
- issue: Mantener el referente directo de las maravillas de Dios sin añadir una expresión no sustentada por el hebreo
  english_pob_reading: The revised English removed 'the words of' and rendered directly 'your wondrous works.'
  chosen_spanish_reading: «tus obras maravillosas» sigue directamente el referente de las maravillas divinas.
  alternative_spanish_readings:
  - las palabras de tus obras maravillosas
  - tus maravillas
  rationale: La revisión inglesa indica que «words of» no debe insertarse. El español adopta igualmente una construcción directa para evitar una mediación innecesaria y respetar la imagen del texto hebreo.
  doctrine_reference: Faithful rendering of Hebrew construct and poetic object
- issue: Referencia divina implícita
  english_pob_reading: The verse addresses God in the second person throughout.
  chosen_spanish_reading: Uso de «tu/tus» y verbo en primera persona singular al final, manteniendo la alabanza directa a Dios.
  alternative_spanish_readings:
  - usted/ sus
  - Su/Sus
  rationale: Se mantiene el trato reverente pero cercano del poema hebreo sin introducir mayúsculas teológicas o fórmulas de sustitución que oculten el nombre divino en el marco del proyecto.
  doctrine_reference: POB naming convention for YHWH in Spanish
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «the words of» porque el hebreo se entiende mejor como un objeto directo de contemplación/palabra: «your wondrous works». La redacción española sigue esa revisión y mantiene la cadencia poética sin reintroducir la frase descartada.'
  spanish_consistency_notes:
  - Se usó «esplendor» para הֲדַר, coherente con la preferencia por el valor visual/ceremonial del término.
  - Se evitó «Señor» o máscaras tipográficas porque el verso usa segunda persona directa y el proyecto indica «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no es necesario introducirlo en el texto.
  - «Obras maravillosas» conserva el sentido de actos concretos y no solo de maravilla abstracta.
  - La nota al pie refleja la misma ambigüedad lexical registrada en el audit trail inglés, adaptada al español.
