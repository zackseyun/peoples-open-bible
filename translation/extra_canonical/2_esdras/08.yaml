    3 sic et actus praesentis saeculi: Multi quidem creati sunt, pauci autem saluabuntur.

    4 Et respondi et dixi: absorbe ergo anima sensum et deuoret quod sapit.

    5 Conuenisti enim obaudire et profecta es nolens, non enim tibi est datum spatium nisi solum modicum uiuere.

    6 O domine super nos, si permittes seruo tuo ut oremus coram te et des nobis semen cordis et sensui culturam unde fructum fiat, unde uiuere possit omnis corruptus qui

    7 portabit locum hominis. Solus enim es, et una plasmatio nos sumus manuum tuarum, sicut locutus es.

    8 Et quoniam uiuificans uiuificas nunc in matrice plasmatum corpus et praestas membra, conseruatur in igni et aqua tua creatio et nouem mensibus patitur tua plasmatio tuae creaturae quae in eo creata est.

    9 est. Ipsum autem quod seruat et quod seruatur utraque seruabuntur seruatione tua. et quando iterum reddit matrix quae

    10 in ea creata fuerint, Imperasti ut ex ipsis membris, hoc est

    11 mamillis, praeberi lac, fructum mamillarum, Vt nutriatur id quod plasmatum est usque in tempus aliquem, et postea dispones eum tuae misericordiae. Enutristi eum tuae iusticiae et erudisti eum in lege tua et corripuisti eum tuo intellectu,

    12 enutristi eum tuae iustitiae, et erudisti eum in lege tua et corripuisti eum tuo intellectu,

    13 Et mortificabis eum ut tuam creaturam et uiuificabis eum ut

    14 tuum opus. Si ergo perdideris, qui tantis laboribus plasmatus

    15 est tuo iussu, facili ordine, et utquid fiebat? Et nunc dicens dicam: de omni homine tu magis scis, de populo autem tuo

    16 quod mihi dolet, Et de hereditate tua propter quam lugeo, et de Israel propter quem tristis sum, et de semine Iacob

    17 propter quod conturbor. Ideo incipiam orare coram te pro me et pro eis, quoniam uideo lapsos nostros qui inhabitamus

    18 terram. Sed audiui celeritatem iudicii quod futurum est.

    19 Ideo audi meam uocem et intellege sermonum meorum, et loquar coram te. Initium uerborum orationis Ezrae priusquam adsumeretur.

