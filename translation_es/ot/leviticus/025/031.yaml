translation:
  language: es
  text: Pero las casas de las aldeas[a], que no tienen muro alrededor, serán consideradas como los campos de la tierra; tendrán derecho de redención[b], y en el jubileo saldrán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las casas de los asentamientos'; el hebreo se refiere a comunidades rurales, y la cláusula siguiente aclara que no tienen muro alrededor.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'habrá redención para ello/ellas'; es decir, estas propiedades siguen siendo legalmente rescatables. O 'y en el jubileo saldrá', refiriéndose a la propiedad que revierte en el año del jubileo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בָתֵּי הַ/חֲצֵרִים
  english_pob_choice: the houses of the villages
  chosen_spanish: las casas de las aldeas
  alternatives_spanish:
  - las casas de los poblados
  - las casas de las villas
  - las casas de las aldeas sin muralla
  lexicon: HALOT
  rationale: בָּתֵּי es constructo plural de “casas de”, y חֲצֵרִים puede designar aldeas o asentamientos rurales. “Aldeas” comunica de forma natural el carácter rural/comunitario del término sin añadir un matiz técnico no exigido por el hebreo.
- source_word: אֲשֶׁר אֵין לָהֶם חֹמָה סָבִיב
  english_pob_choice: that have no wall around them
  chosen_spanish: que no tienen muro alrededor
  alternatives_spanish:
  - que no están rodeadas por un muro
  - que no tienen una muralla alrededor
  lexicon: HALOT
  rationale: Se conserva la idea de ausencia de un muro o muralla que rodee el lugar. “Muro” es idiomático y claro en español; “alrededor” reproduce סָבִיב sin forzar la sintaxis.
- source_word: עַל שְׂדֵה הָאָרֶץ יֵחָשֵׁב
  english_pob_choice: shall be regarded as the fields of the land
  chosen_spanish: serán consideradas como los campos de la tierra
  alternatives_spanish:
  - serán contadas como el campo de la tierra
  - serán reckonedas como los campos de la tierra
  - se estimarán como los campos del país
  lexicon: HALOT
  rationale: El hebreo usa el verbo de “ser contado/considerado” y la expresión “campo de la tierra”, una clasificación legal. “Serán consideradas como los campos de la tierra” mantiene la fuerza jurídica y la imagen rural sin introducir una paráfrasis excesiva.
- source_word: גְּאֻלָּה תִּהְיֶה לּוֹ
  english_pob_choice: redemption shall be available for them
  chosen_spanish: habrá para ellas redención
  alternatives_spanish:
  - tendrán redención
  - será para ellas redención
  - habrá derecho de redención para ellas
  lexicon: HALOT
  rationale: גְּאֻלָּה expresa la posibilidad jurídica de ser rescatado/redimido. “Habrá para ellas redención” conserva la categoría nominal y la disponibilidad legal sin reducirla a una formulación interpretativa demasiado explícita.
- source_word: וּ/בַ/יֹּבֵל יֵצֵא
  english_pob_choice: and in the Jubilee they shall go out
  chosen_spanish: y en el jubileo saldrán
  alternatives_spanish:
  - y en el jubileo saldrán de allí
  - y en el jubileo saldrá
  - y en el jubileo quedarán libres
  lexicon: HALOT
  rationale: יֵצֵא conserva el idiomático “salir” en un contexto legal de liberación o reversiones de propiedad. “Saldrán” preserva el verbo hebreo y deja el sentido legal implícito, como en el inglés auditado.
theological_decisions:
- issue: Reversión legal de la propiedad en el jubileo
  english_pob_reading: and in the Jubilee they shall go out
  chosen_spanish_reading: y en el jubileo saldrán
  alternative_spanish_readings:
  - y en el jubileo revertirán
  - y en el jubileo volverán
  rationale: El texto habla de la salida/restitución de la propiedad en el año jubilar. En español, “saldrán” conserva la metáfora hebrea y evita explicitar una interpretación que el versículo solo sugiere legalmente.
  doctrine_reference: Levítico 25:10, 25:28, 25:31
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene la clasificación legal de las casas sin muralla como equivalentes a los campos de la tierra, conserva el sustantivo jurídico “redención” y preserva el verbo “salir” para el jubileo. Se evitó traducir mecánicamente desde el inglés cuando la sintaxis española permitía una forma más natural sin perder la relación con el texto fuente.'
  spanish_consistency_notes:
  - Se usó “Yahvé” solo donde corresponda al tetragrama; este versículo no lo contiene.
  - “Jubileo” se mantiene como término técnico bíblico, coherente con la terminología del capítulo.
  - “Redención” se conserva como sustantivo jurídico-legal, en línea con el patrón del hebreo גְּאֻלָּה.
  - “Aldeas” evita una equivalencia más urbana (“pueblos”) y refleja mejor חֲצֵרִים en contexto rural.
