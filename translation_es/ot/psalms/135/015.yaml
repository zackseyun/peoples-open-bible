translation:
  language: es
  text: Los ídolos de las naciones son plata y oro[a][b], obra de manos humanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "imágenes" para עֲצַבֵּי.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "obra de las manos del hombre".
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַבֵּי
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  lexicon: HALOT
  rationale: En este contexto polémico contra la falsa adoración, "ídolos" comunica mejor que una imagen neutral la carga religiosa negativa del hebreo עֲצַבִּים, como también la hizo el POB en inglés.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: HALOT
  rationale: גוֹיִם en los Salmos suele referirse a los pueblos/naciones fuera de Israel. "Las naciones" es natural en español y conserva el sentido colectivo.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  lexicon: HALOT
  rationale: Es una descripción material directa de la composición de los ídolos; no requiere ajuste idiomático.
- source_word: מַעֲשֵׂה
  english_pob_choice: the work of
  chosen_spanish: obra de
  alternatives_spanish:
  - hecha por
  - trabajo de
  lexicon: HALOT
  rationale: '"Obra de" mantiene la construcción formal del hebreo מַעֲשֵׂה יְדֵי sin sonar forzado en español.'
- source_word: יְדֵי אָדָם
  english_pob_choice: the work of the hands of man
  chosen_spanish: manos humanas
  alternatives_spanish:
  - manos de hombre
  - las manos del hombre
  lexicon: HALOT
  rationale: אָדָם aquí es genérico, no masculino específico. "Humanas" conserva el sentido antropológico y evita una lectura sexista, como en el POB inglés con "human hands".
theological_decisions:
- issue: Carácter genérico de אָדָם en la frase final
  english_pob_reading: human hands
  chosen_spanish_reading: manos humanas
  alternative_spanish_readings:
  - manos de hombre
  - las manos del hombre
  rationale: El versículo subraya el contraste entre los ídolos y su origen meramente humano. "Humanas" expresa con naturalidad ese valor genérico sin perder la fuerza antitética del texto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
- issue: Posible ambigüedad de עֲצַבִּים como 'ídolos' o 'imágenes'
  english_pob_reading: idols
  chosen_spanish_reading: ídolos
  alternative_spanish_readings:
  - imágenes
  rationale: En este marco de denuncia de la idolatría, "ídolos" es la opción más fiel al peso teológico del hebreo y a la lectura auditada del POB en inglés.
  doctrine_reference: HALOT; contexto de polémica antiidolátrica
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la auditoría inglesa más reciente indica que no fue necesario cambiar la traducción.
  spanish_consistency_notes:
  - Se mantuvo "ídolos" para עֲצַבֵּי, en línea con el uso polémico del término en el salmo.
  - '"Las naciones" preserva el valor colectivo de גּוֹיִם sin introducir un matiz técnico innecesario.'
  - La frase final se naturalizó como "manos humanas" para expresar el genérico אָדָם con claridad y fidelidad.
