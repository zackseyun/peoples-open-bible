- from: los que se postran en las azoteas ante el ejército del cielo[a], y los que se postran, los que juran por Yahvé y juran por Milcóm.
  to: los que se postran en las azoteas al ejército del cielo[a] y los que se postran, los que juran por Yahvé y juran por Milcóm.
  rationale: Se ajusta 'ante' a 'al' para reflejar mejor el complemento del acto de postración en el hebreo y en la auditoría inglesa. También se elimina una coma innecesaria para mejorar la fluidez del español sin cambiar el sentido. La nota textual sobre Milcóm se conserva tal como corresponde.
