translation:
  language: es
  text: Cuando terminó de hablar con él[a], Dios subió de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios ascendió de Abraham». El hebreo usa el verbo «subió/ascendió», presentando en términos espaciales el final de la manifestación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: When he finished
  chosen_spanish: Cuando terminó
  alternatives_spanish:
  - Y terminó
  - Cuando hubo terminado
  lexicon: HALOT
  rationale: El wayyiqtol de כלה marca acción completada; en español, «Cuando terminó» conserva el valor temporal y fluye de manera natural sin introducir una paráfrasis innecesaria.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - hablando
  - para hablar
  lexicon: HALOT
  rationale: El infinitivo constructo con כלה expresa el cierre del acto de hablar. «De hablar» refleja bien el idiomático «terminó de hablar» en español, con menos rigidez que un calco literal.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: La preposición indica compañía/interacción, no dirección. «Con él» conserva el sentido relacional del hebreo y mantiene la referencia a Abraham por el contexto.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה conserva imaginería vertical concreta. «Subió» es el equivalente natural en español y preserva esa imagen sin sonar más solemne de lo que exige el hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aunque la forma es plural, el verbo es singular y el contexto identifica al único Dios verdadero; por ello se traduce con el singular usual en español.
- source_word: מֵעַל
  english_pob_choice: from Abraham
  chosen_spanish: de junto a
  alternatives_spanish:
  - de encima de
  - de sobre
  lexicon: HALOT
  rationale: La expresión literalmente es «de sobre/de encima de». En español, «de junto a» comunica la retirada de la presencia visible sin forzar una imagen espacial extraña, pero sigue dejando percibir el matiz de separación del texto hebreo.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: HALOT
  rationale: Nombre propio estándar en español, acorde con la práctica de transliteración.
theological_decisions:
- issue: Lenguaje espacial de la teofanía
  english_pob_reading: Retain the spatial language 'God went up from Abraham'
  chosen_spanish_reading: 'Mantener un verbo de elevación y una frase de separación visible: «Dios subió de junto a Abraham»'
  alternative_spanish_readings:
  - Dios ascendió de Abraham
  - Dios se retiró de Abraham
  rationale: El hebreo usa un lenguaje concreto de ascenso. La traducción española conserva la imagen sin convertirla en una explicación abstracta; a la vez, «de junto a» evita sugerir que Dios quede localizado corporalmente. Se preserva así la tensión narrativa de la manifestación divina.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el consenso de auditoría fue de alta concordancia; no se requieren ajustes de revisión adicionales para esta nota española.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no una mayúscula honorífica distinta, conforme al uso bíblico español estándar para אֱלֹהִים.
  - Se conserva el verbo de movimiento ascendente para no neutralizar la imaginería del hebreo.
  - La frase «de junto a» busca equilibrio entre literalidad y naturalidad, evitando tanto el calco rígido como la paráfrasis doctrinal.
