  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en la secuencia: mandato, ejecución, sangre que salpica, y acción final con sujeto singular. También conserva adecuadamente la nota sobre la formulación más literal de «desde/de su sangre». Sin embargo, la última cláusula no refleja con suficiente precisión רמס, que es ‘pisotear/tramplar’, no el uso más amplio y moderno de «atropellar».'
  spanish_quality_summary: 'El español es claro y legible, pero hay una pequeña tensión léxica: el mandato usa «Échenla abajo» y la narración «la arrojaron abajo», rompiendo la repetición del mismo verbo que el hebreo sí conserva y que el inglés POB procuró mantener. Además, «la atropelló» suena más a accidente vehicular en español contemporáneo que a la brutalidad deliberada de ‘trample’.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión es léxica: para וירמסנה conviene «la pisoteó» o «la holló»; «la pisoteó» es más natural en español moderno y conserva la fuerza semántica. También es preferible mantener paralelismo verbal entre שמטהו y וישמטוה con «arrójenla abajo / la arrojaron abajo» o «échenla abajo / la echaron abajo».'
  issues:
  - severity: medium
    issue: «la atropelló» no representa con precisión וירמסנה
    rationale: רמס significa ‘pisotear, hollar, trample’. En español actual, «atropellar» suele evocar sobre todo ser embestido por un vehículo o, más ampliamente, arrollar, y no expresa tan directamente el acto de pisotear/tramplar que el hebreo destaca.
  - severity: low
    issue: Se pierde la repetición léxica entre el mandato y su cumplimiento
    rationale: El hebreo usa el mismo verbo שמט en «¡éch(en)la abajo!» y «la echaron/arrojaron abajo». El borrador alterna «Échenla abajo» con «la arrojaron abajo». No es un error grave, pero sí una pequeña pérdida del efecto narrativo que puede repararse fácilmente.
  revised_spanish_text: 'Y dijo[a]: «¡Arrójenla abajo!». Entonces la arrojaron abajo; y parte de su sangre salpicó[b] sobre el muro y sobre los caballos, y él la pisoteó.'
  revised_footnotes:
