id: JHN.15.13
reference: 'John 15:13'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: μείζονα ταύτης ἀγάπην οὐδεὶς ἔχει, ἵνα τις τὴν ψυχὴν αὐτοῦ θῇ ὑπὲρ τῶν φίλων αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/013.yaml
  text: 'No one has greater love than this: that someone lay down his life for his friends[a][b][c][d].'
  footnotes:
  - marker: a
    text: Or 'that one lay down his life for his friends.' The Greek uses an indefinite singular subject.
    reason: lexical_alternative
  - marker: b
    text: '''Life'' translates Greek psychē, which can also mean ''soul'' or ''self''; here the sense is one''s life given up in death.'
    reason: lexical_alternative
  - marker: c
    text: '''For'' translates Greek hyper, which can also be rendered ''on behalf of'' or ''for the sake of.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'someone lay down his life for his friends'.
    reason: previous_rendering
translation:
  language: ko
  text: 누군가 자기 친구들을 위해 자기 목숨을 내어놓는 것보다 더 큰 사랑은 없습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「한 사람이 자기 친구들을 위해 자기 목숨을 내어놓는 것」. 헬라어는 부정 단수 주어를 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 「목숨」은 헬라어 psychē의 번역이며 「영혼·자기」의 뜻도 지니나, 본문에서는 죽음으로 내어놓는 「생명」을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 「위해」는 헬라어 hyper의 번역으로 「~을 대신하여」 또는 「~을 위해」로 옮길 수 있다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「누군가 자기 친구들을 위해 자기 목숨을 내려놓는 것」.
    reason: lexical_alternative
