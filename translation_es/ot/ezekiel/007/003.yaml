translation:
  language: es
  text: Ahora el fin ha venido sobre ti[a], y enviaré mi ira contra ti. Te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pondré sobre ti todas tus abominaciones». El hebreo dice literalmente «dar/poner sobre ti todas tus abominaciones», un modismo para hacer recaer sobre el oyente las consecuencias de esas abominaciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - Y ahora
  lexicon: HALOT
  rationale: Marca la inmediatez profética del anuncio. «Ahora» es natural en español y conserva el golpe discursivo de inicio.
- source_word: הַקֵּץ
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el final
  - el término
  lexicon: HALOT
  rationale: El sustantivo con artículo apunta al desenlace/juicio decisivo anunciado en el contexto. «El fin» reproduce bien la gravedad profética en español.
- source_word: עָלַיִךְ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: «Sobre ti» mantiene la imagen espacial/metafórica del hebreo y funciona de manera natural en español.
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: I will send
  chosen_spanish: enviaré
  alternatives_spanish:
  - desataré
  - soltaré
  lexicon: HALOT
  rationale: El verbo básico es «enviar». Aquí, con «mi ira», conserva la literalidad suficiente sin perder claridad.
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi enojo
  - mi furor
  lexicon: HALOT
  rationale: La imagen hebrea literal alude al «rostro/nariz», pero el sentido idiomático es ira divina. «Ira» preserva el peso judicial mejor que un término más suave.
- source_word: בָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en ti
  lexicon: HALOT
  rationale: Con un objeto de juicio, la dirección hostil se expresa con naturalidad en español como «contra ti».
- source_word: וּשְׁפַטְתִּיךְ
  english_pob_choice: I will judge you
  chosen_spanish: Te juzgaré
  alternatives_spanish:
  - Te haré juicio
  - Pronunciaré juicio contra ti
  lexicon: HALOT
  rationale: Traducción directa del verbo judicial, conservando el tono legal-covenantal del pasaje.
- source_word: כִּדְרָכָיִךְ
  english_pob_choice: according to your ways
  chosen_spanish: conforme a tus caminos
  alternatives_spanish:
  - según tus caminos
  - de acuerdo con tu conducta
  lexicon: HALOT
  rationale: «Caminos» preserva la metáfora profética habitual para conducta; «conforme a» reproduce bien el valor normativo de la preposición.
- source_word: וְנָתַתִּי עָלַיִךְ
  english_pob_choice: I will bring ... upon you
  chosen_spanish: pondré sobre ti
  alternatives_spanish:
  - traeré sobre ti
  - echaré sobre ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dar/poner sobre ti»; en este contexto, español natural conserva la imagen con «pondré sobre ti».
- source_word: אֵת כָּל תּוֹעֲבֹתָיִךְ
  english_pob_choice: all your abominations
  chosen_spanish: todas tus abominaciones
  alternatives_spanish:
  - todas tus cosas abominables
  - todos tus actos abominables
  lexicon: HALOT
  rationale: «Abominaciones» conserva el término profético fuerte para prácticas detestables, especialmente de carácter idólatra.
theological_decisions:
- issue: Naturaleza del «fin»
  english_pob_reading: A historical-prophetic announcement of imminent judgment, rendered simply as 'the end' without importing later technical eschatological categories.
  chosen_spanish_reading: Un anuncio profético e inminente de juicio histórico, expresado simplemente como «el fin» sin cargarlo con categorías escatológicas posteriores.
  alternative_spanish_readings:
  - Un fin absoluto en sentido escatológico
  - La consumación final
  rationale: El contexto inmediato de Ezequiel 7 es el juicio que se aproxima sobre Jerusalén/la tierra. Mantener «el fin» respeta la ambigüedad controlada del hebreo y evita sobrerinterpretar el pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lenguaje de la ira y el juicio divinos
  english_pob_reading: Use direct judicial and affective terms ('anger,' 'judge,' 'abominations') without softening or systematizing them.
  chosen_spanish_reading: Usar términos directos de ira y juicio («ira», «juzgar», «abominaciones») sin suavizarlos ni sistematizarlos.
  alternative_spanish_readings:
  - «furor» en vez de «ira»
  - «condenaré» en vez de «juzgaré»
  rationale: El versículo combina metáfora afectiva y sentencia judicial. «Ira» y «juzgaré» conservan ambos planos con claridad y sin atenuar el tono del texto.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios; el castellano sigue de cerca sus decisiones léxicas y su lectura profética del pasaje, ajustando únicamente la idiomaticidad natural del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se conserva «abominaciones» por su peso técnico-profético y su coherencia con el resto de la obra.
  - «sobre ti» mantiene el valor metafórico de juicio descendente presente en el hebreo y en la POB inglesa.
