revisions:
- from: Pero el mismo Macabeo[a], tomando primero las armas, instó a los otros a exponerse al peligro con él y a acudir en ayuda de sus hermanos[b]; y juntos también salieron con prontitud.
  to: Pero Macabeo mismo[a], siendo el primero en tomar las armas, instó a los otros a exponerse al peligro con él y a acudir en ayuda de sus hermanos[b]; y juntos también se lanzaron con prontitud.
  rationale: Se ajusta la frase inicial para que «primero» destaque mejor la iniciativa de Macabeo, conforme a πρῶτος, y se refuerza el verbo final con «se lanzaron» para reflejar mejor ἐξώρμησαν sin exagerar el tono militar. Se conservan las notas existentes porque siguen siendo pertinentes y están bien ancladas.
