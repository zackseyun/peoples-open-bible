revisions:
- from: Entonces todo el pueblo se apresuró[a] juntamente, y cayeron rostro en tierra para postrarse ante el Altísimo[b], ante el Santo de Israel.
  to: Toda carne juntamente se apresuró[a], y cayeron sobre sus rostros en tierra, para postrarse ante el Altísimo[b], ante el Santo de Israel.
  rationale: Se revisa para respetar la decisión principal documentada del POB de conservar כָּל בָּשָׂר como «toda carne» en el texto principal, dejando «todo el pueblo» como alternativa en nota. También se elimina «Entonces», que depende más del griego que del hebreo base, y se suaviza la sintaxis de la prostración con «cayeron sobre sus rostros en tierra», más natural en español sin perder literalidad ni dignidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:21:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del hebreo y del control griego: acción colectiva, caída en prostración, y reverencia ante el Altísimo y el Santo de Israel. Sin embargo, se aparta de la decisión principal del POB en un punto importante al poner «todo el pueblo» en el texto principal donde la traducción auditada preserva el hebreo «All flesh» como lectura principal y deja «all the people» como alternativa en nota. También «Entonces» introduce un matiz temporal procedente del griego más que del hebreo base.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «cayeron rostro en tierra» suena algo elíptico tras «cayeron»; «cayeron sobre sus rostros en tierra» o «cayeron rostro en tierra» puede discutirse, pero conviene una forma más natural y completa. «Juntamente» es aceptable, aunque «todos juntos» sería más llano; no es necesario cambiarlo. El conjunto necesita un ajuste menor para alinearse mejor con la filosofía del proyecto y mejorar la naturalidad.
  glossary_alignment: Los títulos divinos «el Altísimo» y «el Santo de Israel» están bien alineados. La decisión «postrarse» para לְהִשְׁתַּחֲוֹת respeta la materialidad del verbo. El problema principal de glosario/auditoría es que el hebreo כָּל בָּשָׂר debía conservarse como «toda carne» en el texto principal, con «todo el pueblo» en nota alternativa, conforme a la justificación documentada del POB.
  issues:
  - severity: high
    issue: El texto principal sustituye «toda carne» por «todo el pueblo».
    rationale: La auditoría inglesa decidió explícitamente conservar el idiomatismo hebreo כָּל בָּשָׂר en el texto principal y relegar «all the people» a nota por primacía del hebreo. El español puede decir «toda carne» de manera inteligible y bíblica.
  - severity: medium
    issue: «Entonces» refleja la expansión/fluidez griega más que el hebreo base.
    rationale: El hebreo presentado no contiene un equivalente necesario de «entonces». Puede omitirse para mantener mayor cercanía al texto base.
  - severity: medium
    issue: «cayeron rostro en tierra» es algo abrupto en español moderno.
    rationale: Aunque tiene sabor bíblico, tras el verbo «caer» la construcción resulta menos natural que «cayeron sobre sus rostros en tierra», que conserva la imagen física del hebreo.
  revised_spanish_text: Toda carne juntamente se apresuró[a], y cayeron sobre sus rostros en tierra, para postrarse ante el Altísimo[b], ante el Santo de Israel.
  revised_footnotes:
  - marker: a
    text: El griego dice «entonces todo el pueblo juntamente se apresuró» en lugar del hebreo «toda carne juntamente se apresuró». El griego probablemente aclara el modismo hebreo para la asamblea reunida.
    reason: alternative_reading
  - marker: b
    text: O «para adorar ante el Altísimo». El verbo hebreo se refiere específicamente a inclinarse o postrarse en reverencia.
    reason: lexical_alternative
  revision_rationale: Se revisa para respetar la decisión principal documentada del POB de conservar כָּל בָּשָׂר como «toda carne» en el texto principal, dejando «todo el pueblo» como alternativa en nota. También se elimina «Entonces», que depende más del griego que del hebreo base, y se suaviza la sintaxis de la prostración con «cayeron sobre sus rostros en tierra», más natural en español sin perder literalidad ni dignidad.
