translation:
  text: But you[a], by the threats of your ungodliness, are being tortured; and you will not escape, most defiled tyrant, the punishments of divine wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the threats of your ungodliness.' The Greek phrase is compressed and may be rendered more literally, but the context points to threatened sufferings resulting from impiety.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασανίζῃ
  lemma: βασανίζω
  chosen: will be tortured
  alternatives:
  - are tortured
  - will torment yourself
  - will be tested
  lexicon: BDAG
  rationale: The verb βασανίζω commonly means to torture or torment. Given the future-oriented threat in context and the parallel with ἀπειλαῖς, an English future best conveys the sense. 'Will be tortured' is more natural and contextually fitting than a literal present-form rendering.
- source_word: ἐν ταῖς τῆς ἀσεβείας ἀπειλαῖς
  chosen: in the torments threatened by your ungodliness
  alternatives:
  - by the threats of ungodliness
  - amid the threats belonging to impiety
  - under the threats brought on by your impiety
  lexicon: LSJ
  rationale: The phrase is compressed. ἀπειλαῖς means threats, but in context the speaker predicts the tyrant's coming suffering as the outworking of his impiety. Rendering it as 'the torments threatened by your ungodliness' makes explicit the force of the dative phrase without straying far from the Greek. 'Your ungodliness' reflects the likely personal force in address.
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - godlessness
  lexicon: BDAG
  rationale: '''Ungodliness'' is clear modern English and preserves the religious-moral force of ἀσέβεια. ''Impiety'' is possible but less natural for contemporary readers.'
- source_word: μιερώτατε
  chosen: most defiled
  alternatives:
  - most polluted
  - most abominable
  - most impure
  lexicon: LSJ
  rationale: The superlative insult emphasizes ritual and moral pollution. 'Most defiled' preserves that force better than the more generic 'most abominable'.
- source_word: τύραννε
  chosen: tyrant
  alternatives:
  - despot
  - ruler
  lexicon: BDAG
  rationale: '''Tyrant'' is the standard and contextually appropriate rendering, preserving the condemnatory political-moral sense.'
- source_word: τὰς ... δίκας
  chosen: the punishments
  alternatives:
  - the penalties
  - the justice
  - the sentences
  lexicon: BDAG
  rationale: Here δίκαι refers to penalties or punishments inflicted in justice. 'Punishments' is the clearest idiomatic rendering in this judgment context.
- source_word: θείας ὀργῆς
  chosen: of divine wrath
  alternatives:
  - of God's wrath
  - of heavenly wrath
  lexicon: BDAG
  rationale: θείας is adjectival, 'divine.' 'Divine wrath' preserves the Greek wording without over-specifying the referent beyond what the text states, though God is clearly implied.
