review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario: «Escuchen ... la instrucción de un padre ... para que vivan» preserva la genericidad de אָב y el resultado «vivan» frente al griego «sean salvos». También mantiene la variante griega en nota. Sin embargo, «hagan así» añade un matiz de «así» no presente explícitamente en el hebreo, y la nota «yo, el padre» suena poco natural e inexacta frente al griego Ἐμοῦ τοῦ πατρὸς.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y fidelidad. «Hagan» basta y evita añadir contenido. En la nota, «Escúchenme, hijos, yo, el padre»/«de mí, el padre» debe expresarse de manera idiomática; además «sean salvos» es menos natural aquí que «se salven».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por claridad moderna. «Hijos» es aceptable en registro sapiencial, aunque genéricamente inclusivo; «instrucción» alinea bien con מִשְׁפַט en contexto. No hay conflicto con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: «hagan así» sobretraduce וַעֲשׂוּ
    rationale: El hebreo dice simplemente «y hagan». Añadir «así» puede sonar natural, pero introduce un elemento anafórico no explícito. Dado que el inglés auditado fue revisado a «do» precisamente por fidelidad más directa, conviene reflejarlo en español con «hagan».
  - severity: medium
    issue: La nota al pie formula torpemente la variante griega
    rationale: «Escúchenme, yo, el padre» no es español natural y no refleja bien la construcción griega. Conviene expresar la diferencia como «Escúchenme, hijos, su padre ... para que se salven» o equivalente idiomático, manteniendo el contraste con el hebreo genérico.
  - severity: low
    issue: «sean salvos» en la nota es menos idiomático que «se salven»
    rationale: Ambas opciones son posibles, pero «para que se salven» suena más natural en español bíblico moderno y refleja bien el valor verbal del griego σωθῆτε.
  revised_spanish_text: Escuchen[a], hijos, la instrucción de un padre, y hagan para que vivan.
  revised_footnotes:
  - marker: a
    text: 'Griego: «Escúchenme, hijos, su padre ... para que se salven». El testigo hebreo lee de modo más general: «la instrucción de un padre ... para que vivan».'
