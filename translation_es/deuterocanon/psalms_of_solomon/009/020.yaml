- from: La misericordia del Yahvé está sobre la casa de Israel por siempre y para siempre[a].
  to: La misericordia de Yahvé está sobre la casa de Israel por siempre y para siempre[a].
  rationale: Se corrige «del Yahvé» a «de Yahvé» para un español natural y digno, manteniendo la política del proyecto de usar el nombre divino. Se conserva el resto de la redacción, que es fiel al griego y legible en español. La nota se mantiene con redacción ligeramente más limpia sin cambiar su función.
