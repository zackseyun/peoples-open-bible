theological_decisions:
- issue: Meaning of divine withdrawal in the final clause
  chosen_reading: The clause refers to God's departure/withdrawal from the people as an act of judgment.
  alternative_readings:
  - God's turning away from them
  - the people's removal from God
  rationale: 'The first-person suffix in בְּשׂוּרִי strongly favors God''s own departure rather than the people''s movement. The verse''s logic is covenantal judgment: loss of children culminates in woe when God withdraws his protecting presence. The translation preserves that theological tension without expanding it into a fuller doctrinal statement.'
  doctrine_reference: Translation philosophy §3
