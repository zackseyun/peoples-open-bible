  glossary_alignment: No hay términos teológicos de proyecto en juego. Las decisiones «dominaron», «territorio», «por su consejo», «por la espada», «desde el extremo de la tierra» y «tributo año tras año» son compatibles con el expediente léxico. Se justifica mantener «los demás» para preservar la amplitud de οἱ ἐπίλοιποι.
