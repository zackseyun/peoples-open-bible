base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/039/015.yaml
  text: With the music of harp and instruments[c][b][a], so you shall speak with a shout.
  footnotes:
  - marker: a
    text: Or 'lyre' for 'harp'; the Hebrew names an ancient stringed instrument whose exact modern equivalent is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'with a shout' or 'with acclamation'; the Hebrew term can denote a loud cry of rejoicing, and in some contexts a trumpet-like blast.
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel for this verse is considerably fuller, explicitly calling for blessing the Lord and giving greatness to his name; the Hebrew witness here preserves only the musical-and-acclamatory portion.
    reason: textual_variant
