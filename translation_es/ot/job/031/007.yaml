translation:
  language: es
  text: si mi paso se ha desviado del camino, y mi corazón ha ido tras mis ojos[a], y alguna mancha se ha pegado a mis manos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi corazón ha seguido a mis ojos».
    reason: lexical_alternative
  - marker: b
    text: O «algún defecto» o «alguna mácula». El término hebreo puede denotar mancha, defecto o mácula.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּטֶּה
  english_pob_choice: has turned aside
  chosen_spanish: se ha desviado
  alternatives_spanish:
  - se apartó
  - ha virado
  lexicon: HALOT
  rationale: נטה aquí expresa desviación del curso correcto; en español, «desviarse» conserva la imagen moral del apartarse del camino sin sonar forzado. El perfecto compuesto refleja bien la serie condicional de autoimprecación.
- source_word: אַשֻּׁרִי
  english_pob_choice: my step
  chosen_spanish: mi paso
  alternatives_spanish:
  - mi pisada
  - mi huella
  lexicon: HALOT
  rationale: El término designa el paso o la marcha. «Mi paso» es natural en español y mantiene la metáfora de conducta moral.
- source_word: מִנִּי הַדָּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - del sendero
  lexicon: HALOT
  rationale: «Camino» conserva la fuerza metafórica bíblica para la conducta recta y suena más idiomático que una calca literal menos natural.
- source_word: וְאַחַר עֵינַי הָלַךְ לִבִּי
  english_pob_choice: my heart has gone after my eyes
  chosen_spanish: mi corazón ha ido tras mis ojos
  alternatives_spanish:
  - mi corazón ha seguido a mis ojos
  - mi corazón ha perseguido lo que vieron mis ojos
  lexicon: HALOT
  rationale: Se conserva la correlación hebrea entre corazón y ojos, porque en el texto la interioridad deseante sigue a la visión. «Ir tras» reproduce la dirección de la frase sin reinterpretarla.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi interior
  lexicon: HALOT
  rationale: «Corazón» es el término antropológico bíblico estándar y en español comunica deseo, voluntad y centro interior mejor que una abstracción psicológica.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - lo que vi
  - mi vista
  lexicon: HALOT
  rationale: Se mantiene el literalismo porque la imagen de deseo nacido de la visión es parte del tejido poético y moral del verso.
- source_word: וּבְכַפַּי דָּבַק
  english_pob_choice: has clung to my hands
  chosen_spanish: a mis manos se ha pegado
  alternatives_spanish:
  - se ha adherido a mis manos
  - se ha quedado en mis manos
  lexicon: HALOT
  rationale: דבק es «pegarse/adhirirse». En español, «se ha pegado» conserva la imagen de una impureza que se adhiere a las manos, con resonancia ética y concreta.
- source_word: מֻאוּם
  english_pob_choice: any stain
  chosen_spanish: alguna mancha
  alternatives_spanish:
  - alguna mancha
  - algún defecto
  - alguna mácula
  lexicon: HALOT
  rationale: El término puede significar mancha, defecto o defecto físico/moral. En este contexto ético, «mancha» comunica mejor la idea de impureza o culpa adherida a las acciones.
theological_decisions:
- issue: Metáfora del camino como conducta moral
  english_pob_reading: Retain 'the way' rather than flattening to 'right conduct' or similar abstraction.
  chosen_spanish_reading: Conservar «camino» como imagen de la conducta moral, no reducirlo a una abstracción.
  alternative_spanish_readings:
  - del recto proceder
  - de la conducta correcta
  rationale: El hebreo usa imaginería concreta de tránsito. Mantenerla en español preserva el tono sapiencial y la textura literaria sin añadir interpretación.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Corazón y ojos como dinámica del deseo
  english_pob_reading: Preserve 'heart' and 'eyes' literally.
  chosen_spanish_reading: Preservar «corazón» y «ojos» literalmente.
  alternative_spanish_readings:
  - mente y deseos
  - interior y percepción
  rationale: El verso describe la secuencia entre percepción y deseo. Traducirlo literalmente mantiene la antropología bíblica y la fuerza retórica del juramento.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios en la revisión más reciente; el consenso de revisión es alto y no hubo observaciones que exigieran reajuste del sentido.
  spanish_consistency_notes:
  - Se conserva un registro léxico uniforme para la metáfora del camino en contextos morales.
  - «Corazón» y «ojos» se mantienen literales para no perder la dinámica antropológica del hebreo.
  - «Mancha» se usa como equivalente principal de מֻאוּם, con nota para sus alternativas semánticas.
