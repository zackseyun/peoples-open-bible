translation:
  language: es
  text: Yo he suscitado[a] a uno desde el norte, y ha venido; desde la salida del sol invoca mi nombre. Vendrá sobre gobernantes como sobre barro[c][b], y como un alfarero pisa el lodo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «desde el oriente» (literalmente, «desde la salida del sol»).
    reason: lexical_alternative
  - marker: b
    text: «Invoca mi nombre» también puede verterse «llama a mi nombre» o «proclama mi nombre».
    reason: lexical_alternative
  - marker: c
    text: La figura suscitada por Dios suele entenderse como Ciro; el hebreo aquí no lo nombra.
    reason: cross_reference
lexical_decisions:
- source_word: הַעִירוֹתִי
  english_pob_choice: I have stirred up
  chosen_spanish: Yo he suscitado
  alternatives_spanish:
  - he despertado
  - he levantado
  lexicon: HALOT
  rationale: El verbo hifil de עור expresa provocar o poner en acción; «suscitado» conserva la agencia divina y funciona bien en español bíblico sin sonar mecánico.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  lexicon: HALOT
  rationale: Es la dirección literal y clara; «desde» conserva mejor el movimiento de procedencia.
- source_word: וַיַּאת
  english_pob_choice: and he has come
  chosen_spanish: y ha venido
  alternatives_spanish:
  - y vino
  - y viene
  lexicon: HALOT
  rationale: El sentido resultativo/profético se transmite bien con presente perfecto en español.
- source_word: מִמִּזְרַח שֶׁמֶשׁ
  english_pob_choice: from the rising of the sun
  chosen_spanish: desde el nacimiento del sol
  alternatives_spanish:
  - desde el oriente
  - desde donde nace el sol
  lexicon: HALOT
  rationale: La imagen hebrea se mantiene de manera natural en español; «nacimiento del sol» preserva el giro figurado y su posible equivalente direccional.
- source_word: יִקְרָא בִשְׁמִי
  english_pob_choice: he calls on my name
  chosen_spanish: invoca mi nombre
  alternatives_spanish:
  - llama en mi nombre
  - proclama mi nombre
  lexicon: HALOT
  rationale: «Invoca mi nombre» recoge el modismo קרא בשם y evita decidir demasiado pronto entre oración, reconocimiento o proclamación.
- source_word: וְיָבֹא
  english_pob_choice: He will come upon
  chosen_spanish: Vendrá sobre
  alternatives_spanish:
  - y vendrá contra
  - vendrá sobre ellos
  lexicon: HALOT
  rationale: Con el objeto siguiente, el movimiento es hostil; «vendrá sobre» preserva el avance y la presión sin añadir más de lo que dice el texto.
- source_word: סְגָנִים
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - jefes
  - oficiales
  - magistrados
  lexicon: HALOT
  rationale: El término designa altos funcionarios; «gobernantes» es suficientemente amplio y natural en español.
- source_word: כְּמוֹ חֹמֶר
  english_pob_choice: as upon clay
  chosen_spanish: como sobre barro
  alternatives_spanish:
  - como barro
  - como sobre arcilla
  lexicon: HALOT
  rationale: «Barro» comunica mejor la fragilidad del material en español común; con «sobre» se conserva la relación de la acción con el objeto comparado.
- source_word: וּכְמוֹ יוֹצֵר
  english_pob_choice: and like a potter
  chosen_spanish: y como alfarero
  alternatives_spanish:
  - y como un alfarero
  - y como quien modela
  lexicon: HALOT
  rationale: «Alfarero» es el equivalente natural y tradicional para el artesano de la imagen.
- source_word: יִרְמָס
  english_pob_choice: he treads
  chosen_spanish: pisa
  alternatives_spanish:
  - aplasta
  - tritura
  - hollará
  lexicon: HALOT
  rationale: En la imagen del alfarero con lodo, «pisa» conserva el acto manual de amasar o presionar el barro sin perder la fuerza del verbo.
- source_word: טִיט
  english_pob_choice: mud
  chosen_spanish: lodo
  alternatives_spanish:
  - barro
  - fango
  - barro mojado
  lexicon: HALOT
  rationale: En español, «lodo» encaja naturalmente con el alfarero y mantiene el matiz terroso/húmedo del término.
theological_decisions:
- issue: Identidad del agente suscitado por Dios
  english_pob_reading: Render the figure generically as 'one'/'he' without naming him or specifying whether 'calls on my name' implies true worship.
  chosen_spanish_reading: 'Se conserva la referencia genérica: «a uno» / «ha venido», sin nombrarlo.'
  alternative_spanish_readings:
  - Ciro
  - el conquistador
  - a un rey
  rationale: El hebreo no nombra al personaje. La versión española mantiene esa reserva y no resuelve la identificación histórica dentro del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de 'calls on my name'
  english_pob_reading: '''Calls on my name'' may also be rendered ''invokes my name'' or ''proclaims my name.'''
  chosen_spanish_reading: «Invoca mi nombre» deja abierta la relación exacta entre reconocimiento, apelación y proclamación.
  alternative_spanish_readings:
  - llama mi nombre
  - proclama mi nombre
  - usa mi nombre
  rationale: La expresión hebrea admite más de un matiz; la traducción evita fijar una lectura devocional o meramente declarativa donde el texto no la precisa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no hay revisiones aplicadas en el pasaje base, y se conservan las tensiones léxicas e históricas señaladas por la versión POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino implícito en la primera persona de Dios, sin sustituirlo por una convención de máscara.
  - Se preserva la ambigüedad histórica del agente suscitado, sin introducir «Ciro» en el texto principal.
  - «Invoca mi nombre» conserva el modismo sin cerrarlo a una sola interpretación.
  - Las imágenes de dirección y alfarería se mantienen con vocabulario natural y bíblicamente reconocible en español.
