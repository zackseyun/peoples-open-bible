translation:
  language: es
  text: 'Entonces el rey mandó a Hilcías el sacerdote[a], a Ahicam hijo de Safán, a Acbor hijo de Micaía, a Safán el escriba[b], y a Asaías esclavo[c] del rey, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «Hilcías el sacerdote», no explícitamente «Hilcías el sumo sacerdote».
    reason: lexical_alternative
  - marker: b
    text: O «Safán el secretario». El término hebreo puede referirse a un escriba real o a un secretario administrativo.
    reason: lexical_alternative
  - marker: c
    text: O «Asaías, el oficial del rey». El hebreo literalmente dice «esclavo», aunque en una corte real puede denotar a un funcionario al servicio del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó
  lexicon: HALOT
  rationale: En español, «mandó» comunica con naturalidad la acción real de dar una instrucción autoritativa y conserva el tono narrativo breve del hebreo. «Ordenó» también sería posible, pero «mandó» resulta más directo y bíblicamente adecuado sin sonar forzado.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido sin añadidos; es la referencia directa al sujeto del verbo.
- source_word: חִלְקִיָּה הַכֹּהֵן
  english_pob_choice: Hilkiah the priest
  chosen_spanish: Hilcías el sacerdote
  alternatives_spanish:
  - Hilcías el sacerdote
  - Hilcías el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el sacerdote», no «sumo sacerdote». En español, «sacerdote» preserva esa precisión. «Sumo sacerdote» introduciría un rango que el texto de este versículo no expresa.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Ahikam son of Shaphan
  chosen_spanish: Ahicam hijo de Safán
  alternatives_spanish:
  - Ahicam hijo de Safán
  - Ahicam, hijo de Safán
  lexicon: HALOT
  rationale: «Hijo de» es el equivalente natural de בן en una identificación genealógica. Se usa la forma castellana de los nombres personales para una lectura fluida y reconocible.
- source_word: עַכְבּוֹר בֶּן מִיכָיָה
  english_pob_choice: Achbor son of Micaiah
  chosen_spanish: Acbor hijo de Micaía
  alternatives_spanish:
  - Acbor hijo de Micaía
  - Akbor hijo de Micaías
  lexicon: HALOT
  rationale: Se transliteran los nombres con una forma española transparente. «Micaía» refleja bien מִיכָיָה y evita imponer una adaptación más tradicional que no sea necesaria.
- source_word: שָׁפָן הַסֹּפֵר
  english_pob_choice: Shaphan the scribe
  chosen_spanish: Safán el escriba
  alternatives_spanish:
  - Safán el escriba
  - Safán el secretario
  lexicon: HALOT
  rationale: «Escriba» conserva el valor léxico básico de סֹפֵר y su uso es inteligible en español bíblico. «Secretario» es una alternativa contextual posible, pero «escriba» mantiene mejor el eco del término hebreo.
- source_word: עֲשָׂיָה עֶבֶד הַמֶּלֶךְ
  english_pob_choice: Asaiah the king’s servant
  chosen_spanish: Asaías, esclavo del rey
  alternatives_spanish:
  - Asaías, esclavo del rey
  - Asaías, siervo del rey
  - Asaías, oficial del rey
  lexicon: HALOT
  rationale: POB suele conservar la fuerza directa de עֶבֶד con «esclavo» cuando esa es la opción léxica elegida. Aunque en contexto de corte puede denotar un funcionario, aquí se mantiene la tensión semántica documentada en el audit trail sin suavizarla prematuramente con «oficial».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función introductoria del infinitivo y su enlace con el discurso siguiente de manera natural en español.
theological_decisions:
- issue: Título de Hilcías
  english_pob_reading: Hilkiah the priest, not explicitly the high priest.
  chosen_spanish_reading: Hilcías el sacerdote, sin añadir «sumo»
  alternative_spanish_readings:
  - Hilcías el sumo sacerdote
  - Hilcías el sacerdote principal
  rationale: El texto hebreo solo identifica a Hilcías como «el sacerdote». Para no sobretraducir el rango, se evita una designación jerárquica no expresada en el versículo.
  doctrine_reference: Precisión histórica y textual; fidelidad al valor explícito del hebreo
- issue: עֶבֶד הַמֶּלֶךְ en contexto cortesano
  english_pob_reading: The Hebrew literally reads "servant," which in a royal court can denote an official in the king’s service.
  chosen_spanish_reading: esclavo del rey, manteniendo la posibilidad contextual de un funcionario de corte
  alternative_spanish_readings:
  - siervo del rey
  - oficial del rey
  rationale: Se conserva la fuerza literal de עֶבֶד sin borrar la nota contextual de que en un entorno real puede referirse a alguien al servicio del rey en un sentido administrativo. La ambigüedad queda disponible para la lectura y para la nota.
  doctrine_reference: Semántica léxica y contexto histórico del AT
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios de revisión aplicados en la fuente consultada. Se conserva la distinción entre «sacerdote» y «sumo sacerdote», y la ambigüedad de עֶבֶד en el entorno cortesano.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando el Tetragrámaton aparezca; este versículo no lo contiene.
  - 'Se prefieren formas españolas transparentes de los nombres propios: Hilcías, Ahicam, Safán, Acbor, Micaía, Asaías.'
  - «Escriba» se mantiene para סֹפֵר por consistencia con el uso bíblico y la audit trail inglesa.
  - La coma antes de «diciendo» sigue el cierre narrativo natural del español y reproduce la introducción de discurso directo.
