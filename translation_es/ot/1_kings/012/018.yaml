base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/018.yaml
  text: Then King Rehoboam sent Adoram[a], who was over the forced labor, and all Israel stoned him with stones, and he died[c][b]. And King Rehoboam made haste to get up into the chariot to flee to Jerusalem.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Adoram''; some related passages use the name form ''Adoniram.'''
    reason: alternative_reading
  - marker: b
    text: Or simply, 'stoned him'; the Hebrew explicitly says, 'stoned him with stones.'
    reason: lexical_alternative
  - marker: c
    text: Or, in smoother English, 'hurried to get into the chariot.' The Hebrew more literally says, 'strengthened himself to get up into the chariot.'
    reason: lexical_alternative
