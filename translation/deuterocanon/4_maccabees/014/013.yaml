translation:
  text: But see how intricate the affection of love for children is[a], drawing everything toward the sympathy of the inward parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''maternal love,'' since the immediate context is the mother of the seven brothers, though the Greek term itself is broader: affection for one''s children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖτε
  chosen: see
  alternatives:
  - consider
  - observe
  - look
  lexicon: LSJ
  rationale: Imperative plural inviting the audience to attend to the example. 'See' is concise and natural in English while preserving the exhortational force.
- source_word: πολυπλόκος
  chosen: intricate
  alternatives:
  - complex
  - many-twisted
  - manifold
  lexicon: LSJ
  rationale: The adjective conveys something many-layered or complicated. 'Intricate' preserves the metaphorical sense without sounding overly technical.
- source_word: φιλοτεκνίας
  chosen: a parent's affection for children
  alternatives:
  - love of children
  - maternal affection
  - parental love
  lexicon: LSJ
  rationale: The noun denotes affection for one's children. Because the immediate context concerns a mother, 'maternal affection' is possible, but the term itself is broader; 'a parent's affection for children' keeps the lexical sense while remaining idiomatic.
- source_word: στοργή
  chosen: affection
  alternatives:
  - natural affection
  - familial love
  - tenderness
  lexicon: LSJ
  rationale: στοργή refers to natural familial affection. 'Affection' is the clearest base rendering; the familial nuance is carried by the surrounding phrase.
- source_word: ἕλκουσα
  chosen: drawing
  alternatives:
  - pulling
  - dragging
  - attracting
  lexicon: LSJ
  rationale: The participle describes the force exerted by parental affection. 'Drawing' preserves the metaphor without implying violence.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - everyone
  lexicon: LSJ
  rationale: Neuter plural used comprehensively. 'Everything' best reflects the broad scope of what is pulled toward sympathy.
- source_word: σπλάγχνων
  chosen: heartfelt
  alternatives:
  - inward
  - deep
  - from the entrails
  lexicon: LSJ
  rationale: Literally 'inward parts,' a common idiom for deep emotions or compassion. Rather than a wooden anatomical rendering, 'heartfelt' communicates the emotional force in natural English.
- source_word: συμπάθειαν
  chosen: sympathy
  alternatives:
  - fellow-feeling
  - compassion
  - shared feeling
  lexicon: LSJ
  rationale: The noun denotes shared feeling or sympathetic participation. 'Sympathy' is the most direct English equivalent, with 'heartfelt' sharpening the emotional depth.
