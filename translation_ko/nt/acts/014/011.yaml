source:
  edition: SBLGNT
  text: οἵ ⸀τε ὄχλοι ἰδόντες ὃ ⸀ἐποίησεν Παῦλος ἐπῆραν τὴν φωνὴν αὐτῶν Λυκαονιστὶ λέγοντες· Οἱ θεοὶ ὁμοιωθέντες ἀνθρώποις κατέβησαν πρὸς ἡμᾶς
base_translation:
  language: en
  yaml_path: translation/nt/acts/014/011.yaml
  text: And when the crowds saw what Paul had done[a], they raised their voices, saying in the Lycaonian language, “The gods, having become like men[b], have come down to us!”
  footnotes:
  - marker: a
    text: Or “The gods, having become like men, have come down to us”; Greek “having been made like men.”
    reason: lexical_alternative
  - marker: b
    text: Or simply “in Lycaonian.”
    reason: lexical_alternative
translation:
  language: ko
  text: 무리가 바울이 행한 일을 보고 목소리를 높여, 루가오니아 말로 「신들이 사람의 모습이 되어 우리에게 내려왔다!」 하고 말하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λυκαονιστί
  english_pob_choice: in the Lycaonian language
  chosen_korean: 루가오니아 말로
  alternatives_korean:
  - 루가오니아 방언으로
  lexicon: BDAG
  rationale: 지역 토착어로 외친 사실 자체가 바울과 바나바가 즉시 이해하지 못한 이유를 설명한다. 「말로」를 명시해 언어 단절을 보존.
- source_word: Οἱ θεοὶ ὁμοιωθέντες ἀνθρώποις
  english_pob_choice: The gods, having become like men
  chosen_korean: 신들이 사람의 모습이 되어
  alternatives_korean:
  - 신들이 사람과 같이 되어
  lexicon: BDAG
  rationale: 「신들이 사람의 모습이 되어」가 루가오니아의 헬레니즘적 신화 도식(제우스·헤르메스 현현 전승)을 자연스럽게 환기한다.
theological_decisions:
- issue: 루스드라의 신현현 오인 사건의 문화적 무게
  chosen_reading: 신들이 사람의 모습이 되어 우리에게 내려왔다!
  alternative_readings:
  - 신들이 사람의 형상으로 우리에게 임하였도다
  rationale: 루가오니아 지방은 제우스와 헤르메스가 노인의 모습으로 인간을 방문했다는 오비드 「변신 이야기」 8권의 바우키스-필레몬 전승의 지리적 배경이다. 군중의 외침은 그 신화 도식 그대로 바울과 바나바를 신으로 오인한 것이며, 한국어 번역에서도 「신들이 사람의 모습이 되어」라는 직역으로 그 문화적 오인을 보존한다.
  doctrine_reference: 'DOCTRINE.md: cultural-context preservation; Greco-Roman myth substrate'
