translation:
  language: es
  text: En Dios nos gloriamos todo el día[a], y a tu nombre daremos gracias para siempre[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabamos todo el día en Dios» o «nos gloriamos en Dios todo el día». El verbo hebreo puede expresar alabanza o jactancia exultante según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a tu nombre», una manera bíblica de referirse al carácter revelado y la reputación de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: In God
  chosen_spanish: En Dios
  alternatives_spanish:
  - Por Dios
  - Con Dios
  lexicon: HALOT
  rationale: La preposición ב aquí expresa el ámbito o fundamento de la acción, no mera instrumentalidad. «En Dios» conserva bien el sentido idiomático de gloriarse dentro de la relación con Dios.
- source_word: הִלַּלְנוּ
  english_pob_choice: we boast
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - loamos
  - nos jactamos
  lexicon: HALOT
  rationale: El piel de הלל puede significar alabar o gloriarse. En esta construcción con בֵּאלֹהִים, el sentido de exultación/confianza se expresa mejor en español con «gloriarse», que mantiene la fuerza del verbo sin sonar tan duro como «jactarse».
- source_word: כָל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - constantemente
  lexicon: HALOT
  rationale: La frase denota duración continua a lo largo del día. «Todo el día» es natural en español y conserva la extensión temporal concreta.
- source_word: וְשִׁמְךָ
  english_pob_choice: and to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - y tu nombre
  - para tu nombre
  lexicon: HALOT
  rationale: El hebreo introduce el objeto de la acción verbal con לְ/שֵׁם en una formulación bíblica típica. «A tu nombre» mantiene la referencia al nombre revelado de Dios y la dirección del agradecimiento.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión indica duración sin fin. «Para siempre» es idiomática, clara y fiel al valor de permanencia.
- source_word: נוֹדֶה
  english_pob_choice: we will give thanks
  chosen_spanish: daremos gracias
  alternatives_spanish:
  - alabaremos
  - confesaremos
  lexicon: HALOT
  rationale: El hifil de ידה suele significar «dar gracias» o «alabar». En paralelo con «nos gloriamos», «daremos gracias» preserva una respuesta agradecida distinta del primer hemistiquio y funciona naturalmente en español.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  - '[pausa]'
  lexicon: HALOT
  rationale: El término tiene sentido litúrgico incierto; se translitera para no imponer una explicación especulativa y mantener la transparencia del texto hebreo.
theological_decisions:
- issue: El valor de hablar «en Dios» como esfera/fundamento de la acción
  english_pob_reading: In God we boast
  chosen_spanish_reading: En Dios nos gloriamos
  alternative_spanish_readings:
  - Por Dios nos gloriamos
  - Nos gloriamos con Dios
  rationale: La lectura conserva que la confianza y el gozo del pueblo están fundados en Dios mismo. Evita reducir la preposición a un mero instrumento y mantiene el matiz relacional del hebreo.
  doctrine_reference: Teología bíblica del gozo y la confianza en Yahvé; cf. la idea de jactarse en el Señor (Jer 9:23-24; 1 Co 1:31)
translation_notes:
  revision_awareness: El texto sigue la lectura de alta concordancia del inglés POB y no introduce cambios revisados; se mantiene la ambigüedad lexical documentada en הלל y la fórmula bíblica de «tu nombre».
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים de acuerdo con la norma del proyecto.
  - Se preservó «Selah» por transparencia textual.
  - «Nos gloriamos» se eligió para reflejar el matiz de exultación/boast de הלל sin perder legibilidad en español.
  - Se mantuvo la distinción entre el primer hemistiquio de exultación y el segundo de agradecimiento.
