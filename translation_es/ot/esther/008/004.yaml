revisions:
- from: Entonces el rey extendió el cetro de oro[a] a Ester, y Ester se levantó y se quedó de pie delante del rey.
  to: Entonces el rey tendió a Ester el cetro de oro[a], y Ester se levantó y se puso de pie ante el rey.
  rationale: Se ajusta el verbo principal a «tendió» para que la nota preserve una alternativa léxica real («extendió»), conforme al rastro de auditoría inglés sobre וַיּוֹשֶׁט. También se mejora «se quedó de pie delante del rey» a «se puso de pie ante el rey» por mayor naturalidad y dignidad en español, manteniendo la distinción narrativa entre וַתָּקָם y וַתַּעֲמֹד.
