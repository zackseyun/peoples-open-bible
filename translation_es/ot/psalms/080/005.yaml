translation:
  language: es
  text: Yahvé, Dios de las huestes[a], ¿hasta cuándo te enojarás contra la oración de tu pueblo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios de los ejércitos». Literalmente, el verbo hebreo evoca «humear» como imagen de ira; el texto principal expresa el sentido con naturalidad en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto divino, en línea con la decisión auditada de no sustituir el Tetragrama por un título. 'Yahvé' es la forma española estable y digna para el nombre revelado.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - el Divino
  lexicon: HALOT
  rationale: En aposición a Yahvé, funciona como título y no como nombre genérico; por eso se traduce 'Dios' con mayúscula inicial en el saludo dirigido a la deidad.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Hosts'' tiene en español una fuerza militar/cósmica mejor captada por ''ejércitos''. ''Huestes'' es posible, pero menos transparente para lectura pública actual.'
- source_word: עַד מָתַי
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: Es la fórmula idiomática del lamento hebreo y se preserva con la misma urgencia natural en español.
- source_word: עָשַׁנְתָּ
  english_pob_choice: will you be angry at
  chosen_spanish: te enojarás
  alternatives_spanish:
  - humeas de ira
  - arderá tu ira
  - te irritarás
  lexicon: HALOT
  rationale: El hebreo literalmente evoca 'humear/fumar' como imagen de ira. En español, para lectura litúrgica clara, se opta por 'te enojarás', manteniendo el sentido sin forzar una metáfora poco natural en la línea principal.
- source_word: בִּתְפִלַּת
  english_pob_choice: at the prayer
  chosen_spanish: contra la oración
  alternatives_spanish:
  - ante la oración
  - en la oración
  - por la oración
  lexicon: HALOT
  rationale: 'El contexto exige un matiz adversativo: la oración aparece como el objeto frente al cual se manifiesta la ira. ''Contra'' conserva mejor esa tensión que un simple ''a'' o ''ante''.'
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: Se mantiene el sentido pactual y comunitario del poseedor divino; 'tu pueblo' es la opción más precisa y reverente en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en el inicio del versículo
  english_pob_reading: O Yahweh God of hosts
  chosen_spanish_reading: Oh Yahvé, Dios de los ejércitos
  alternative_spanish_readings:
  - Oh SEÑOR Dios de los ejércitos
  - Oh Jehová, Dios de los ejércitos
  rationale: Se sigue la política del proyecto de representar el Nombre con una transliteración y no con una sustitución funcional. 'Oh Yahvé' preserva la identidad personal del Dios del pacto y evita el ocultamiento del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy items 1 and 6'
- issue: Metáfora de la ira asociada con עָשַׁן
  english_pob_reading: will you be angry at the prayer of your people
  chosen_spanish_reading: te enojarás contra la oración de tu pueblo
  alternative_spanish_readings:
  - humea tu ira contra la oración de tu pueblo
  - te irritarás contra la oración de tu pueblo
  rationale: El inglés POB pasó de la metáfora más literal ('smoke') a una equivalencia más natural ('be angry') en su revisión. En español se prioriza una expresión comprensible y oralmente fluida, pero se conserva el matiz adversativo con 'contra'.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy items 1, 3, and 6'
translation_notes:
  revision_awareness: El texto inglés auditado muestra una revisión desde una versión más literal ('smoke against') hacia una equivalencia más natural ('be angry at'). En esta entrega española se adopta una solución igualmente natural, pero sin perder la tensión del hebreo mediante 'contra'. Se decidió no mantener la metáfora de 'humear' en la línea principal para no oscurecer la lectura pública, aunque se documenta en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrama, consistente con el estándar del proyecto.
  - '''Dios de los ejércitos'' conserva el título compuesto sin suavizarlo a una fórmula eclesiástica tradicional.'
  - '''tu pueblo'' sigue la dimensión pactual y comunitaria del hebreo.'
  - La puntuación reproduce el tono de lamento con vocativo y pregunta retórica.
