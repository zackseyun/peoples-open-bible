translation:
  language: es
  text: Llamo al Dios Altísimo, al Dios que completa lo que me concierne.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al Dios que cumple su propósito para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: Clamo
  alternatives_spanish:
  - Llamo
  - Yo llamo
  - Grito
  lexicon: HALOT
  rationale: El imperfecto qal de קרא en poesía puede expresar acción presente o futura. En español, "clamo" conserva la vivacidad del acto de dirigirse a Dios sin añadir la intensidad emocional de "grito". Es más natural y solemne que un simple "llamo" en este contexto poético.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a dioses
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים tiene forma plural, aquí el contexto exige referencia singular al Dios de Israel. "A Dios" reproduce el valor singular sin perder la forma verbal de dirección del hebreo.
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - el Altísimo
  - Exaltado
  - Altísimo Dios
  lexicon: HALOT
  rationale: El título divino עֶלְיוֹן se traduce con el valor reconocido de supremacía. En español, "Altísimo" funciona bien como título sustantivado y evita la rigidez de "el Más Alto".
- source_word: לָאֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a El
  - a el Dios fuerte
  lexicon: HALOT
  rationale: Aquí אֵל aparece en paralelo poético con אֱלֹהִים. Traducir ambos como "Dios" preserva el paralelismo sinonímico y evita introducir la lectura de nombre propio "El", que podría oscurecer el sentido en español.
- source_word: גֹמֵר
  english_pob_choice: who fulfills his purpose
  chosen_spanish: que cumple lo que me concierne
  alternatives_spanish:
  - que completa
  - que lleva a término
  - que realiza su propósito para mí
  lexicon: HALOT
  rationale: El participio de גמר con עָלַי expresa la idea de completar o llevar a término lo que atañe al hablante. En español, "cumple lo que me concierne" conserva la idea idiomática sin exagerar una noción de "propósito" que el hebreo no formula explícitamente.
- source_word: עָלָי
  english_pob_choice: for me
  chosen_spanish: me concierne
  alternatives_spanish:
  - por mí
  - para mí
  - sobre mí
  lexicon: HALOT
  rationale: La preposición עַל con sufijo, en esta construcción, tiene fuerza idiomática de referencia a lo que afecta al salmista. "Me concierne" comunica bien el valor de "acerca de mí / lo que me atañe" y mantiene la transparencia del hebreo mejor que un simple "para mí".
theological_decisions:
- issue: Sentido de גֹמֵר עָלַי
  english_pob_reading: God fulfills his purpose for the psalmist
  chosen_spanish_reading: Dios cumple lo que concierne al salmista / lo que le atañe
  alternative_spanish_readings:
  - Dios completa lo que me concierne
  - Dios realiza su propósito para mí
  - Dios lleva a término lo que me atañe
  rationale: El hebreo transmite que Dios lleva a término aquello que pertenece al ámbito del hablante. En español se evita imponer una paráfrasis doctrinalmente más cargada que el texto. "Cumple lo que me concierne" refleja la idea de завершение/terminación sin borrar la ambigüedad intencional del participio y la preposición.
  doctrine_reference: Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: La versión inglesa auditada eligió una equivalencia óptima y mantuvo la ambigüedad de גֹמֵר עָלַי con una nota alternativa. Esta redacción española conserva esa misma tensión semántica, evitando tanto un calco rígido como una expansión interpretativa no sostenida por el hebreo.
  spanish_consistency_notes:
  - Se usa "Dios" para לֵאלֹהִים y לָאֵל, preservando el paralelismo poético.
  - '"Altísimo" traduce el título עֶלְיוֹן con un registro bíblico natural en español.'
  - '"Clamo" mantiene el tono poético sin introducir una emoción no explícita en el verbo.'
  - La nota al pie conserva una alternativa transparente para גֹמֵר עָלַי, como en el inglés POB.
