base_translation:
  language: en
  yaml_path: translation/ot/numbers/017/025.yaml
  text: And Yahweh said to Moses[a], “Put Aaron’s staff back before the testimony, to be kept as a sign for the rebellious sons, so that you may put an end to their grumblings against me[b], and they may not die.”
  footnotes:
  - marker: a
    text: Or “for the rebels” or “for the rebellious sons.”
    reason: lexical_alternative
  - marker: b
    text: “The testimony” likely refers to the covenant testimony associated with the ark; the Hebrew expression is kept concise here.
    reason: cultural_note
