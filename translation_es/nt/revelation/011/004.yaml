review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la metáfora básica del griego: «Estos son los dos olivos y los dos candelabros…», manteniendo la referencia a Zacarías 4 y evitando explicitar «testigos». También refleja correctamente ἐνώπιον τοῦ κυρίου τῆς γῆς como «delante del Señor de la tierra». Sin embargo, la nota b no preserva una verdadera alternativa léxica, porque repite exactamente la redacción principal en vez de ofrecer la alternativa documentada para ἑστῶτες («de pie» / construcción participial distinta).'
  spanish_quality_summary: El español es claro y legible. «Olivos» y «candelabros» funcionan bien en registro bíblico moderno. No obstante, la nota a introduce «el candelabro» en singular, cuando el texto tiene «los dos candelabros» y el inglés auditado habla de «olive trees and lampstand imagery» de modo más general; conviene ajustar la nota para no desalinearla del plural del versículo. La nota b debe corregirse para que realmente aporte una variante útil.
  glossary_alignment: No hay conflictos con los términos base del proyecto. «Señor» para κύριος aquí es adecuado; no hay motivo para sustituir por «Yahvé». «Candelabros» es aceptable para λυχνίαι, aunque «candeleros» sería otra opción tradicional; el borrador no requiere cambio en el texto principal por ello.
  issues:
  - severity: medium
    issue: La nota b no ofrece una alternativa real
    rationale: El texto principal ya dice «que están delante del Señor de la tierra», y la nota repite exactamente esa frase. El inglés auditado preserva una alternativa de formulación para ἑστῶτες; la nota española debe reflejar una variante como «de pie delante del Señor de la tierra».
  - severity: low
    issue: La nota a cambia al singular «el candelabro»
    rationale: El versículo habla de «los dos candelabros». Aunque la referencia a Zacarías 4 incluye un candelabro singular en la visión, la nota tal como está puede sonar desalineada con la formulación del versículo y con la redacción inglesa más general.
  revised_spanish_text: Estos son los dos olivos y los dos candelabros[a] que están delante del Señor de la tierra[b].
  revised_footnotes:
  - marker: a
    text: Alusión a Zacarías 4, donde la imaginería de los olivos y del candelabro simboliza a los siervos designados por Dios y empoderados por su Espíritu.
    reason: cross_reference
  - marker: b
    text: 'O: «de pie delante del Señor de la tierra».'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal porque refleja fielmente el griego y la decisión teológica auditada. Solo se corrigen las notas: la nota a se ajusta para expresar mejor la imaginería intertextual sin chocar con el plural del versículo, y la nota b ahora sí preserva una alternativa válida para ἑστῶτες.'
