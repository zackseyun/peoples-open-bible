lexical_decisions:
- source_word: וּ/בִ/שְׁנַ֣ת
  english_pob_choice: In the ... year
  chosen_spanish: En el ... año
  alternatives_spanish:
  - Y en el ... año
  - En el año de
  lexicon: HALOT
  rationale: La fórmula cronológica con prefijo conjuntivo/preposicional se expresa naturalmente en español como 'En el ... año'. El 'y' inicial no es necesario en castellano y sonaría forzado en un aviso regnal.
- source_word: עֶשְׂרִ֔ים
  english_pob_choice: twentieth
  chosen_spanish: veinte
  alternatives_spanish:
  - vigésimo
  lexicon: HALOT
  rationale: El hebreo usa el cardinal 'veinte'; en español, en esta construcción cronológica, 'año veinte' es plenamente natural y fiel. 'Vigésimo' también es posible, pero aquí el cardinal conserva mejor el patrón hebreo subyacente.
- source_word: לְ/יָרָבְעָ֖ם
  english_pob_choice: of Jeroboam
  chosen_spanish: de Jeroboam
  alternatives_spanish:
  - para Jeroboam
  - perteneciente a Jeroboam
  lexicon: HALOT
  rationale: La preposición ל marca el punto de referencia del cómputo regnal. 'De Jeroboam' comunica bien ese referente temporal en español.
- source_word: מֶ֣לֶךְ יִשְׂרָאֵ֑ל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey sobre Israel
  lexicon: HALOT
  rationale: Título real directo y transparente. Se mantiene la relación genitiva normal en español.
- source_word: מָלַ֥ךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - reinó
  - llegó a ser rey
  lexicon: HALOT
  rationale: En fórmulas regnales, el qatal de מָלַךְ señala la entronización/inicio del reinado. 'Comenzó a reinar' conserva esa fuerza de acceso mejor que un simple pasado durativo.
- source_word: אָסָ֖א
  english_pob_choice: Asa
  chosen_spanish: Asa
  lexicon: HALOT
  rationale: Transliteración estándar del nombre propio.
- source_word: מֶ֥לֶךְ יְהוּדָֽה
  english_pob_choice: king over Judah / literally, 'king of Judah'
  chosen_spanish: rey sobre Judá
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: El hebreo en constructo dice literalmente 'rey de Judá'. Dado que el verbo 'comenzó a reinar' ya expresa la entronización, 'rey sobre Judá' refleja con claridad el ámbito gobernado, siguiendo la orientación del audit trail inglés. Se deja registrada la alternativa literal en las notas.
theological_decisions:
- issue: Título regnal y alcance territorial
  english_pob_reading: king over Judah; literally, 'king of Judah'
  chosen_spanish_reading: rey sobre Judá
  alternative_spanish_readings:
  - rey de Judá
  rationale: 'No hay carga doctrinal especial, pero sí una decisión semántica: el español puede sonar más natural con ''sobre Judá'' después de ''comenzó a reinar''. Para preservar la literalidad del constructo hebreo, se documenta la alternativa ''rey de Judá''.'
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la lectura fuente y con el audit trail inglés. La única adaptación editorial importante en español es mantener la naturalidad cronológica y verbal sin perder la fuerza inceptiva de מָלַךְ. Se preserva la alternativa literal para el título final.
  spanish_consistency_notes:
  - Se mantiene 'Judá' como nombre territorial estándar.
  - Se evita 'Señor' u otras sustituciones no pertinentes.
  - La frase 'comenzó a reinar' corresponde al valor de acceso del verbo en fórmulas regnales.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal.
