translation:
  language: es
  text: Y ella dejó de llorar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego usado aquí es muy breve: «Y ella dejó de llorar». Una tradición semítica más extensa para este versículo continúa con la narración del viaje («el joven siguió su camino...»), pero esa redacción no está presente en el texto griego primario traducido aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción solo enlaza esta cláusula con el contexto previo. «Y» conserva la conexión simple del griego y suena natural en español narrativo.
- source_word: ἐπαύσατο
  english_pob_choice: stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - se detuvo
  lexicon: BDAG
  rationale: El aoristo medio de παύω expresa el cese de una acción en curso. En español, «dejó de» comunica con claridad que la acción de llorar terminó, sin añadir matices ajenos.
- source_word: κλαίουσα
  english_pob_choice: weeping
  chosen_spanish: llorar
  alternatives_spanish:
  - llanto
  - lamentarse
  lexicon: BDAG
  rationale: El participio presente de κλαίω indica una acción continuada que aquí se interrumpe. «Llorar» es la forma verbal más natural en español para reflejar esa continuidad; «llanto» sería más nominal y menos directo.
translation_notes:
  revision_awareness: El texto griego de base es extremadamente breve y el estado de revisión indica concordancia alta sin cambios necesarios. La versión española conserva esa brevedad y no incorpora la ampliación narrativa de la tradición semítica relacionada, porque no pertenece al testimonio griego principal.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple del griego con una sintaxis española natural.
  - No se introduce terminología eclesiástica ni explicativa que el texto no exija.
  - La nota al pie preserva la tensión textual entre el griego breve y la tradición semítica más amplia.
