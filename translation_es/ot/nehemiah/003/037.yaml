revisions:
- from: Y no cubras[a] su culpa, y no sea borrado su pecado de delante de ti, porque te provocaron a ira delante de los constructores.
  to: Y no cubras[a] su culpa, y no sea borrado su pecado de delante de ti, porque te provocaron a ira delante de los que edificaban.
  rationale: Se mantiene la fidelidad al hebreo y al rastro POB, pero se mejora la naturalidad del español. Se conserva la imagen de «cubrir» la culpa y la severidad imprecatoria. Se reemplaza «los constructores» por «los que edificaban» para una lectura más idiomática y contextual en español bíblico. No se requiere adjudicación adicional porque el ajuste es menor y no afecta una cuestión doctrinal o textual incierta.
