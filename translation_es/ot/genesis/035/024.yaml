translation:
  language: es
  text: 'Los hijos de Raquel: José y Benjamín.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los niños de
  lexicon: HALOT
  rationale: El plural constructo de בֵּן introduce aquí una lista genealógica. En español, «los hijos de» reproduce de manera natural y precisa el valor genealógico inmediato del hebreo, especialmente porque los dos nombres que siguen son varones. «Descendientes de» es posible, pero es más general de lo necesario aquí.
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rajel
  lexicon: Convención bíblica en español
  rationale: Nombre propio personal. «Raquel» es la forma estándar y ampliamente reconocible en español bíblico, sin alterar el referente.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Convención bíblica en español
  rationale: Nombre propio personal. «José» es la forma española estándar de יוֹסֵף y mantiene la identificación inmediata del personaje.
- source_word: וּ/בִנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y Benjamín
  alternatives_spanish:
  - e Benjamín
  lexicon: Convención bíblica en español
  rationale: La conjunción waw se expresa con «y». El nombre propio בִנְיָמִן se traduce con la forma usual «Benjamín». La variante «e» sería gramaticalmente posible ante una palabra iniciada con /i/; aquí, no es necesaria porque el nombre comienza con consonante.
translation_notes:
  revision_awareness: El texto inglés POB y el hebreo coinciden plenamente en este versículo; no se documentan variantes textuales ni tensiones léxicas adicionales. La versión española sigue esa misma lectura con nomenclatura bíblica estándar y sin ampliación interpretativa.
  spanish_consistency_notes:
  - Se mantuvo un registro genealógico directo, sin convertir «hijos» en un término más amplio como «descendientes», porque el contexto nombra explícitamente dos varones.
  - Se prefirieron las formas bíblicas tradicionales en español de los nombres propios para favorecer legibilidad y consistencia canónica.
  - No se añadieron notas al pie porque no hay alternativas relevantes preservadas por la POB inglesa ni ambigüedad española que requiera aclaración.
