review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general bien el hebreo y el rastro POB en inglés: mantiene la partitiva de מִדַּם, la acción ritual de הִזָּה, la secuencia de aplicar parte de la sangre al altar y vaciar el resto en su base, y conserva la clasificación final de חַטָּאת con nota alternativa adecuada. Sin embargo, dos formulaciones españolas no preservan de la mejor manera el sentido y la naturalidad ritual: «sobre el lado del altar» suena poco idiomático para קִיר/‘side’, y «será drenado a la base» es una construcción forzada en español para יִמָּצֵה אֶל יְסוֹד.'
  spanish_quality_summary: 'El texto es mayormente claro, pero presenta giros algo calcados del inglés. «En el costado del altar» o «sobre un costado del altar» suena más natural que «sobre el lado del altar», y «será escurrido en la base del altar» comunica mejor la acción ritual que «será drenado a la base del altar». También conviene repetir el artículo en la cláusula final: «es una ofrenda por el pecado».'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «ofrenda por el pecado» es aceptable para חַטָּאת y la nota con «ofrenda purificadora» preserva la alternativa documentada. No hay términos del glosario mayor que entren en conflicto. La revisión propuesta mantiene esa decisión lexical.'
  issues:
  - severity: medium
    issue: «sobre el lado del altar» suena poco natural en español bíblico
    rationale: Aunque refleja el inglés «on the side of the altar», en español «lado» con «sobre» resulta duro. «En el costado del altar» preserva mejor la superficie lateral del altar sin sonar arquitectónicamente extraño.
  - severity: medium
    issue: «será drenado a la base del altar» es una construcción poco idiomática
    rationale: «Drenado» suele sonar técnico o moderno, y «a la base» no encaja bien con el verbo. Para יִמָּצֵה, «será escurrido en la base del altar» o similar transmite mejor la idea de hacer salir el resto de la sangre en contexto ritual.
  - severity: low
    issue: Falta de artículo en «es ofrenda por el pecado»
    rationale: En español suena más completo y natural «es una ofrenda por el pecado», sin alterar el sentido clasificatorio de חַטָּאת הוּא.
  revised_spanish_text: Y rociará parte de la sangre de la ofrenda por el pecado[a] en el costado del altar, y el resto de la sangre será escurrido en la base del altar; es una ofrenda por el pecado.
