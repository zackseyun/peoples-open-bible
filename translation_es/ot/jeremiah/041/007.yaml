  text: וַ/יְהִ֕י כְּ/בוֹאָ֖/ם אֶל תּ֣וֹךְ הָ/עִ֑יר וַ/יִּשְׁחָטֵ֞/ם יִשְׁמָעֵ֤אל בֶּן נְתַנְיָה֙ אֶל תּ֣וֹךְ הַ/בּ֔וֹר ה֖וּא וְ/הָ/אֲנָשִׁ֥ים אֲשֶׁר אִתּֽ/וֹ־־־־׃
base_translation:
