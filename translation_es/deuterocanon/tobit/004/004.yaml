translation:
  language: es
  text: Y haz lo que le agrada, y no la afligas. Acuérdate, hijo, de que ella ha visto muchos peligros a causa de ti en el vientre[a]; cuando muera, sepúltala junto a mí en una sola tumba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «ha visto muchos peligros a causa de ti en el vientre», un modismo que se refiere a los peligros que ella sufrió durante el embarazo y el parto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la misma tumba».'
    reason: alternative_reading
lexical_decisions:
- source_word: ποίηει τὸ ἀρεστὸν αὐτῇ
  english_pob_choice: do what is pleasing to her
  chosen_spanish: haz lo que le sea agradable a ella
  alternatives_spanish:
  - haz lo que le agrade
  - haz lo que le sea placentero
  lexicon: BDAG
  rationale: ἀρεστός expresa lo que agrada o resulta aceptable. En español, 'sea agradable a ella' mantiene la relación con el dativo αὐτῇ y conserva el sentido de actuar según lo que la madre aprueba o desea, sin endurecer el tono.
- source_word: μὴ λυπήσῃς αὐτήν
  english_pob_choice: do not grieve her
  chosen_spanish: no la afligas
  alternatives_spanish:
  - no la entristezcas
  - no la causes dolor
  lexicon: BDAG
  rationale: λυπέω abarca causar tristeza, pena o aflicción. 'Afligir' conserva la fuerza emocional y funciona de modo natural en una exhortación directa.
- source_word: μνήσθητι, παιδίον
  english_pob_choice: Remember, child
  chosen_spanish: Acuérdate, niño
  alternatives_spanish:
  - Acuérdate, hijo
  - Recuerda, niño
  lexicon: BDAG
  rationale: παιδίον es un tratamiento afectuoso. 'Niño' conserva la ternura y evita añadir posesión o especificar 'hijo' cuando el griego aquí no lo dice explícitamente.
- source_word: πολλοὺς κινδύνους ἑόρακεν
  english_pob_choice: she has seen many dangers
  chosen_spanish: ha visto muchos peligros
  alternatives_spanish:
  - ha afrontado muchos peligros
  - ha pasado por muchos peligros
  lexicon: BDAG
  rationale: El verbo ἑόρακεν dice literalmente 'ha visto', pero en el idioma del pasaje apunta a experiencias sufridas o afrontadas. 'Ha visto muchos peligros' conserva la imagen del griego y su peso idiomático.
- source_word: ἐπὶ σοὶ ἐν τῇ κοιλίᾳ
  english_pob_choice: on your account in the womb
  chosen_spanish: a causa de ti en el vientre
  alternatives_spanish:
  - por tu causa en el vientre
  - en el vientre por causa de ti
  lexicon: BDAG
  rationale: 'ἐπὶ σοὶ aquí expresa causalidad: por tu causa / a causa de ti. κοιλία puede referirse al vientre materno; en español ''vientre'' es claro y sobrio. Con ello se conserva la referencia a los peligros de la gestación.'
- source_word: ὅταν ἀποθάνῃ
  english_pob_choice: when she dies
  chosen_spanish: cuando muera
  alternatives_spanish:
  - cuando fallezca
  - cuando llegue a morir
  lexicon: BDAG
  rationale: ὅταν con subjuntivo expresa un futuro esperado o contingente. 'Cuando muera' es la equivalencia española natural y fiel en este contexto.
- source_word: θάψον αὐτὴν παρʼ ἐμοὶ
  english_pob_choice: bury her beside me
  chosen_spanish: sepúltala junto a mí
  alternatives_spanish:
  - entiérrala junto a mí
  - sepúltala al lado mío
  lexicon: BDAG
  rationale: παρά con dativo indica cercanía/proximidad. En contexto funerario, 'junto a mí' comunica de manera directa el entierro al lado del hablante.
- source_word: ἐν ἑνὶ τάφῳ
  english_pob_choice: in one grave
  chosen_spanish: en una sola tumba
  alternatives_spanish:
  - en la misma tumba
  - en un solo sepulcro
  lexicon: BDAG
  rationale: El griego dice literalmente 'en un solo sepulcro/tumba'. 'Una sola tumba' conserva la idea de sepultura compartida y suena natural en español contemporáneo.
theological_decisions:
- issue: Tratamiento afectuoso παιδίον
  english_pob_reading: child
  chosen_spanish_reading: niño
  alternative_spanish_readings:
  - hijo
  - mi hijo
  rationale: El griego expresa ternura sin marcar posesión explícita ni especificar 'hijo'. 'Niño' conserva el matiz afectuoso y evita añadir información no presente en el texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Imagen de la madre que 'ha visto muchos peligros'
  english_pob_reading: she has seen many dangers on your account in the womb
  chosen_spanish_reading: ha visto muchos peligros a causa de ti en el vientre
  alternative_spanish_readings:
  - ha afrontado muchos peligros por tu causa en el vientre
  - ha visto muchos peligros por tu causa en el vientre
  rationale: Se mantiene la tensión idiomática del griego ἑόρακεν ('ha visto') sin normalizarla por completo, pero en español se hace comprensible la referencia a los riesgos sufridos durante la gestación.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
- issue: Sepultura compartida
  english_pob_reading: bury her beside me in one grave
  chosen_spanish_reading: sepúltala junto a mí en una sola tumba
  alternative_spanish_readings:
  - sepúltala junto a mí en la misma tumba
  - sepúltala a mi lado en una sola tumba
  rationale: El texto griego subraya la proximidad funeraria y la unidad de la tumba. 'Junto a mí en una sola tumba' conserva ambas ideas sin sobreinterpretar el tipo exacto de sepulcro.
  doctrine_reference: TOB 4:4 textual sense
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último giro del audit trail en inglés: ''she has seen many dangers on your account in the womb'', evitando la paráfrasis más libre ''faced many dangers because of you while you were in the womb''. También conserva la tensión entre el literal ''ha visto'' y el sentido idiomático de peligro materno en el embarazo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Niño'' traduce παιδίον con valor afectivo y sin añadir posesividad.'
  - '''Vientre'' se eligió para κοιλία por claridad natural en español, sin perder la referencia al embarazo.'
  - '''Sepúltala'' mantiene el tono exhortativo directo del imperativo griego.'
