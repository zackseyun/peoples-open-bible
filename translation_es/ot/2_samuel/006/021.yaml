review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y las decisiones principales del hebreo: mantiene la repetición de «delante de Yahvé», preserva «Yahvé», conserva el contraste con Saúl y su casa, y retiene el doble «sobre». Sin embargo, hay un desajuste gramatical serio en el verbo final: וְשִׂחַקְתִּי es perfecto 1cs («y jugué/celebré/dancé»), no futuro («y danzaré»). Además, la nota a sobre Mical no está justificada por la evidencia fuente ni por el POB inglés.'
  spanish_quality_summary: El español es en general claro y digno, pero «Fue delante de Yahvé» suena algo rígido; «Fue ante Yahvé» o «Fue delante de Yahvé» ambos son posibles. El problema principal es «danzaré», que rompe la sintaxis y el sentido temporal de la respuesta de David. También sobra la nota a, que además se ancla al nombre sin necesidad y crea confusión («Mical[a]» dentro de la propia nota).
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» está correctamente aplicado; נָגִיד → «gobernante» es aceptable; לְצַוֹּת אֹתִי → «para designarme» es defendible. Para וְשִׂחַקְתִּי, el español puede seguir la revisión inglesa con «dancé», pero debe mantenerse en pasado y con nota léxica alternativa.'
  issues:
  - severity: high
    issue: El verbo final «danzaré» está en futuro, pero el hebreo וְשִׂחַקְתִּי es 1ª persona singular en perfecto.
    rationale: Esto altera el tiempo/aspecto y el sentido de la frase. David está defendiendo lo que hizo ante Yahvé, no anunciando una acción futura.
  - severity: medium
    issue: La nota [a] sobre «Mical» no está respaldada por el texto fuente ni por el rastro de auditoría inglés.
    rationale: No hay variación textual ni problema léxico aquí que requiera nota. La explicación sobre vocativo/discurso directo resulta impropia, porque el hebreo simplemente dice «David dijo a Mical».
  - severity: low
    issue: «Fue delante de Yahvé» es comprensible, pero algo tieso en español.
    rationale: «Fue ante Yahvé» suena más natural y sigue siendo fiel a לִפְנֵי יְהוָה. No es un error, pero mejora la fluidez.
  revised_spanish_text: 'David dijo a Mical: «Fue ante Yahvé, quien me escogió en lugar de tu padre y en lugar de toda su casa, para designarme gobernante sobre el pueblo de Yahvé, sobre Israel; y dancé[a] ante Yahvé».'
  revised_footnotes:
