translation:
  language: es
  text: Porque he aquí, tus enemigos se alborotan[a], y los que te odian han levantado la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacen tumulto», «braman» o «se conmocionan». El verbo hebreo expresa agitación ruidosa y hostil.
    reason: lexical_alternative
  - marker: b
    text: O «se han exaltado» o «se han vuelto arrogantes»; el modismo hebreo «levantar la cabeza» comunica aquí autoafirmación desafiante.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base o razón del clamor del salmo; «Porque» conserva esa relación causal de manera natural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - ve
  lexicon: HALOT
  rationale: Se mantiene la fuerza deíctica y la invitación a fijarse en la escena. «Mira» suena más natural que el arcaísmo «he aquí», sin perder énfasis.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  lexicon: HALOT
  rationale: El sustantivo es directo y plural; «enemigos» reproduce con precisión la relación hostil expresada por el hebreo.
- source_word: יֶהֱמָיוּן
  english_pob_choice: are in an uproar
  chosen_spanish: se alborotan
  alternatives_spanish:
  - hacen tumulto
  - rugien
  lexicon: HALOT
  rationale: El verbo expresa agitación ruidosa o tumulto colectivo. «Se alborotan» comunica bien esa conmoción hostil en español contemporáneo.
- source_word: וּמְשַׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - tus odiadores
  - los que te aborrecen
  lexicon: HALOT
  rationale: El participio funciona sustantivamente; la construcción relativa en español conserva la identidad continua de quienes mantienen odio hacia el destinatario.
- source_word: נָשְׂאוּ רֹאשׁ
  english_pob_choice: have lifted up their heads
  chosen_spanish: han levantado la cabeza
  alternatives_spanish:
  - han alzado la cabeza
  - se han envalentonado
  - se han engrandecido
  lexicon: HALOT
  rationale: Se conserva el modismo verbal de «levantar la cabeza», que es claro en español y mantiene el valor poético del hebreo. La nota explica la posible carga interpretativa de arrogancia o desafío.
theological_decisions:
- issue: Sentido del modismo «levantar la cabeza»
  english_pob_reading: the Hebrew idiom 'lift up the head' conveys defiant self-assertion here
  chosen_spanish_reading: el modismo «levantar la cabeza» comunica desafío y autoexaltación arrogante
  alternative_spanish_readings:
  - han mostrado arrogancia
  - se han exaltado
  - han alzado la cabeza
  rationale: No se reduce el modismo a mera postura física; se conserva la imagen verbal y se explicita su fuerza contextual de desafío hostil, siguiendo la nota auditada del POB inglés.
  doctrine_reference: Poética bíblica y uso idiomático del AT
- issue: Tratamiento del singular hebreo רֹאשׁ con sujeto plural
  english_pob_reading: have lifted up their heads
  chosen_spanish_reading: han levantado la cabeza
  alternative_spanish_readings:
  - han levantado sus cabezas
  - han levantado su cabeza
  rationale: El hebreo usa un sustantivo singular con referencia colectiva. En español, «la cabeza» funciona de manera natural como singular colectivo y evita una expresión forzada.
  doctrine_reference: Concordancia poética y colectividad en hebreo bíblico
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés: el POB pasó de «look» a «behold» para הִנֵּה y consolidó la forma plural «their heads» por idiomaticidad inglesa, pero el hebreo sigue usando רֹאשׁ en singular. La versión española conserva el tono formal con una deíxis viva («mira») y una equivalencia poética natural («han levantado la cabeza») sin perder el modismo ni la tensión interpretativa.'
  spanish_consistency_notes:
  - Se emplea «Dios»/nombre divino no aparece en este versículo; no aplica.
  - «Mira» se usa como interjección deíctica, no como mandato narrativo fuerte.
  - «Los que te odian» mantiene el participio sustantivado sin convertirlo en un sustantivo técnico.
  - «La cabeza» se deja en singular por fidelidad al hebreo y fluidez del español.
