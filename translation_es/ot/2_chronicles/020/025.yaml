translation:
  language: es
  text: Entonces Josafat y su pueblo fueron a saquear su botín[a], y hallaron entre ellos en abundancia bienes, cadáveres y objetos deseables; y tomaron para sí más de lo que podían cargar. Estuvieron tres días saqueando el botín, porque era mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cadáveres». Algunos testigos antiguos y traducciones reflejan una lectura como «vestiduras» u omiten el término para suavizar el sentido del inventario, pero el Texto Masorético lee «cadáveres», probablemente indicando los cuerpos de los enemigos caídos entre los cuales se halló el botín.'
    reason: textual_variant
lexical_decisions:
- source_word: לָבֹז
  english_pob_choice: to plunder
  chosen_spanish: saquear
  alternatives_spanish:
  - saquear como botín
  - tomar el botín
  lexicon: HALOT
  rationale: El infinitivo expresa propósito militar y de toma de despojos. En español, 'saquear' comunica con naturalidad esa acción de guerra sin perder la fuerza del verbo.
- source_word: שְׁלָלָם
  english_pob_choice: their spoil
  chosen_spanish: su botín
  alternatives_spanish:
  - su despojo
  - su presa
  lexicon: HALOT
  rationale: שָׁלָל designa el botín de guerra. 'Su botín' preserva la referencia concreta a lo capturado por el enemigo y funciona bien en español bíblico actual.
- source_word: בָהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición con pronombre señala el lugar donde se halló lo encontrado. 'Entre ellos' es idiomático y amplio, y puede abarcar tanto a los caídos como a lo que había en su medio.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  lexicon: HALOT
  rationale: La expresión adverbial enfatiza cantidad. 'En abundancia' es natural y conciso en español.
- source_word: רְכוּשׁ
  english_pob_choice: goods
  chosen_spanish: bienes
  alternatives_spanish:
  - posesiones
  - riquezas
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a propiedad móvil, posesiones o bienes. 'Bienes' mantiene la amplitud semántica sin restringirla a dinero o a objetos sagrados.
- source_word: פְגָרִים
  english_pob_choice: corpses
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos muertos
  - cuerpos
  lexicon: HALOT
  rationale: El sustantivo normalmente significa cadáveres/cuerpos muertos. 'Cadáveres' conserva el sentido directo y la referencia dura del texto masorético.
- source_word: כְלֵי חֲמֻדוֹת
  english_pob_choice: desirable articles
  chosen_spanish: objetos deseables
  alternatives_spanish:
  - objetos preciosos
  - vasijas deseables
  - objetos de valor
  lexicon: HALOT
  rationale: La expresión literalmente habla de 'objetos/vajillas de cosas deseables'. 'Objetos deseables' preserva la amplitud sin forzar el tipo de artículo.
- source_word: וַיְנַצְּלוּ לָהֶם
  english_pob_choice: they stripped off for themselves
  chosen_spanish: se quitaron para sí
  alternatives_spanish:
  - se despojaron para sí
  - tomaron para sí
  lexicon: HALOT
  rationale: El verbo en este contexto transmite el acto de quitar/despojar de los despojos. 'Se quitaron para sí' intenta conservar esa vividez sin sonar demasiado áspero en español; refleja también el matiz reflexivo de לָהֶם.
- source_word: לְאֵין מַשָּׂא
  english_pob_choice: more than they could carry
  chosen_spanish: más de lo que podían cargar
  alternatives_spanish:
  - más de lo que podían llevar
  - hasta no poder cargar más
  lexicon: HALOT
  rationale: La frase idiomática expresa que la cantidad excedía la capacidad de carga. La formulación elegida es clara y fluida en español.
- source_word: וַיִּהְיוּ יָמִים שְׁלוֹשָׁה בֹּזְזִים
  english_pob_choice: They were three days plundering
  chosen_spanish: Estuvieron tres días saqueando
  alternatives_spanish:
  - Fueron tres días saqueando
  - Pasaron tres días saqueando
  lexicon: HALOT
  rationale: La construcción hebrea marca duración de una acción continua. 'Estuvieron tres días saqueando' reproduce bien esa duración sin sonar forzado.
- source_word: כִּי רַב הוּא
  english_pob_choice: because it was so much
  chosen_spanish: porque era mucha la cantidad
  alternatives_spanish:
  - porque era muchísimo
  - porque era muy grande
  lexicon: HALOT
  rationale: La cláusula explica la duración por la gran cantidad del botín. 'Era mucha la cantidad' transmite el énfasis cuantitativo con naturalidad.
theological_decisions:
- issue: Mantener el término del texto masorético para פְגָרִים, aunque el audit trail inglés menciona una variante probable más suave
  english_pob_reading: corpses in the main text; footnote notes some witnesses/versions reflect garments or omission
  chosen_spanish_reading: cadáveres en el texto principal, con nota sobre la variante
  alternative_spanish_readings:
  - vestiduras
  - ropas
  - omisión del término
  rationale: 'El hebreo masorético lee claramente ''cadáveres''. La POB inglesa también preserva esa lectura en la nota, aunque su revisión textual sugirió otra posibilidad. En español conviene mantener la tensión: texto principal fiel al MT y nota sobre la variante.'
  doctrine_reference: Textual criticism; priority of the Masoretic Text with documented variant awareness
- issue: Decidir entre 'saquear' y una fórmula más tradicional como 'tomar botín'
  english_pob_reading: to plunder / plundering the spoil
  chosen_spanish_reading: saquear / saqueando
  alternative_spanish_readings:
  - tomar el botín
  - hacer botín
  rationale: '''Saquear'' conserva el valor militar y narrativo del pasaje y evita una formulación demasiado eclesiástica o arcaizante. Corresponde bien al campo semántico de בוז/בזז.'
  doctrine_reference: Lexical consistency in war/spoil narratives
translation_notes:
  revision_awareness: La POB inglesa pasó por una revisión que propuso 'garments' en lugar de 'corpses' y suavizó 'stripped off for themselves' a 'took for themselves'. Sin embargo, el paquete de fuente masorética conserva פְגָרִים ('corpses'), por lo que esta versión española mantiene 'cadáveres' en el texto principal y refleja el matiz de despojo con una formulación idiomática ('se quitaron para sí') que preserva la acción sin depender de la revisión más suave.
  spanish_consistency_notes:
  - Se mantiene 'Josafat' sin tilde para el nombre bíblico usual en español.
  - '''Botín'' se usa de forma coherente para שָׁלָל y evita alternar con ''presa'' o ''despojo'' sin necesidad.'
  - '''Cadáveres'' queda en el texto principal para respetar el hebreo masorético; la nota aclara la variante textual.'
  - La cláusula final se traduce con una estructura natural en español, manteniendo el énfasis cuantitativo del hebreo.
