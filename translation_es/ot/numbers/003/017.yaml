translation:
  language: es
  text: 'Estos eran los hijos de Leví, por sus nombres: Gersón[a], Coat y Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus nombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - llegaron a ser
  lexicon: HALOT
  rationale: En una lista genealógica, היה funciona como copula de identificación en pasado. «Eran» conserva el valor de introducción nominal sin sugerir cambio de estado.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - éstos
  - estos son
  lexicon: HALOT
  rationale: El demostrativo apunta a los nombres que siguen; en español, «Estos eran...» reproduce bien la apertura identificadora del hebreo.
- source_word: בְנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los descendientes de Leví
  - los hijos de Leví
  lexicon: HALOT
  rationale: «Hijos» es la correspondencia más directa y natural en una lista genealógica, y aquí designa a los tres varones nombrados como hijos inmediatos de Leví.
- source_word: בִּשְׁמֹתָם
  english_pob_choice: by their names
  chosen_spanish: por sus nombres
  alternatives_spanish:
  - según sus nombres
  - por nombre
  lexicon: HALOT
  rationale: La construcción hebrea puede ser «por/según sus nombres». «Por sus nombres» mantiene el giro formal del texto y su función introductoria del listado.
- source_word: גֵּרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gershon
  lexicon: Transliteración estándar al español
  rationale: Se adapta al uso bíblico español con acento agudo y forma establecida en biblias y catálogos hispanos.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kehat
  - Kohat
  lexicon: Transliteración tradicional española
  rationale: En español bíblico, «Coat» es la forma asentada y más reconocible; preserva la identidad del nombre propio en la tradición hispana.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: Transliteración estándar al español
  rationale: La forma «Merari» es la transliteración habitual y clara en español; no requiere adaptación adicional para este contexto.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el testimonio fuente y con el rastro auditado en inglés; no se requieren ajustes textuales ni decisiones teológicas adicionales.
  spanish_consistency_notes:
  - Se mantuvo el orden de lista nominal y el registro genealógico breve del hebreo.
  - Se prefirió «hijos» en vez de «descendientes» para respetar la referencia inmediata a los tres nombres enumerados.
  - La nota alternativa reproduce la ambigüedad reconocida en el POB inglés para בִּשְׁמֹתָם.
