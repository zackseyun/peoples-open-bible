id: JDG.20.39
reference: Judges 20:39
source:
  edition: WLC
  text: וַ/יַּהֲפֹ֥ךְ אִֽישׁ יִשְׂרָאֵ֖ל בַּ/מִּלְחָמָ֑ה וּ/בִנְיָמִ֡ן הֵחֵל֩ לְ/הַכּ֨וֹת חֲלָלִ֤ים בְּ/אִֽישׁ יִשְׂרָאֵל֙ כִּ/שְׁלֹשִׁ֣ים אִ֔ישׁ כִּ֣י אָמְר֔וּ אַךְ֩ נִגּ֨וֹף נִגָּ֥ף הוּא֙ לְ/פָנֵ֔י/נוּ כַּ/מִּלְחָמָ֖ה הָ/רִאשֹׁנָֽה־־׃
translation:
  text: Then the men of Israel turned in the battle[a], and Benjamin began to strike down the slain among the men of Israel, about thirty men, for they said, “Surely he is utterly defeated before us[b], as in the first battle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'he is utterly defeated' uses a singular form, likely referring to Israel collectively; it could also be rendered 'they are utterly defeated.'
    reason: lexical_alternative
  - marker: b
    text: Or 'began to strike down about thirty men from among the men of Israel.' The Hebrew phrase with 'the slain' is terse and battle-idiomatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  chosen: turned
  alternatives:
  - turned around
  - reversed
  lexicon: HALOT
  rationale: In this battle narrative context, the verb denotes a turning movement or reversal in action. 'Turned' is concise and natural English; 'turned around' is possible but slightly more expansive.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - Israel
  - each man of Israel
  lexicon: HALOT
  rationale: Although singular in form, אִישׁ here functions collectively. 'The men of Israel' best reflects the collective military sense and follows the gender-accurate policy.
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in the fighting
  - in battle
  lexicon: HALOT
  rationale: The phrase situates the turning within the ongoing combat. 'In the battle' is a natural rendering preserving the definite article.
- source_word: וּבִנְיָמִן
  chosen: and Benjamin
  alternatives:
  - and the Benjaminites
  lexicon: HALOT
  rationale: The tribal name stands metonymically for the tribe's warriors. 'Benjamin' preserves the Hebrew form; the military sense is clear from context.
- source_word: הֵחֵל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: Standard rendering of the ingressive verb; 'began' is slightly more formal and suits narrative style.
- source_word: לְהַכּוֹת
  chosen: to strike down
  alternatives:
  - to strike
  - to kill
  lexicon: HALOT
  rationale: In warfare context נכה commonly means to strike/defeat/kill. 'Strike down' preserves the violent action without over-specifying beyond the context.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - casualties
  - dead
  lexicon: HALOT
  rationale: Formally the word means 'slain' or 'dead ones.' Here it is used idiomatically for those being cut down in battle. 'The slain' is close to the Hebrew, though somewhat abrupt in English.
- source_word: בְּאִישׁ יִשְׂרָאֵל
  chosen: among the men of Israel
  alternatives:
  - from the men of Israel
  - against the men of Israel
  lexicon: HALOT
  rationale: The preposition marks the group from whom the casualties were taken. 'Among the men of Israel' communicates that Benjamin was inflicting losses on Israel.
- source_word: כִּשְׁלֹשִׁים אִישׁ
  chosen: about thirty men
  alternatives:
  - some thirty men
  - around thirty men
  lexicon: HALOT
  rationale: The prefixed כ indicates approximation. 'About thirty men' is clear modern English.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: Introduces the reason for Benjamin's action/confidence. 'For' fits the narrative flow well.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - certainly
  lexicon: HALOT
  rationale: Adds emphatic confidence. 'Surely' captures the force naturally.
- source_word: נִגּוֹף נִגָּף הוּא
  chosen: he is utterly defeated
  alternatives:
  - he is surely defeated
  - they are utterly defeated
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite/passive form intensifies the verb: ''surely/utterly defeated.'' The singular pronoun likely treats Israel collectively as a unit, so singular is retained in the main text. Because English readers may expect a plural referent, the alternative is worth preserving in a footnote.'
- source_word: לְפָנֵינוּ
  chosen: before us
  alternatives:
  - in front of us
  - at our hands
  lexicon: HALOT
  rationale: A standard idiom for being defeated in someone's presence or before them. 'Before us' is sufficiently literal and idiomatic.
- source_word: כַּמִּלְחָמָה הָרִאשֹׁנָה
  chosen: as in the first battle
  alternatives:
  - as in the former battle
  - as in the first fighting
  lexicon: HALOT
  rationale: Refers back to the earlier engagement in the chapter. 'First battle' is the clearest modern rendering.
