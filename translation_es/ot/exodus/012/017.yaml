base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/017.yaml
  text: And you shall keep the Feast of Unleavened Bread[a], because on this very day I brought your hosts out from the land of Egypt[c][b]. And you shall keep this day throughout your generations as a permanent statute.
  footnotes:
  - marker: a
    text: Or 'the Feast of Unleavened Bread.' The Hebrew literally says 'the unleavened breads/things,' which can refer to the bread itself or, by extension, the festival observance.
    reason: lexical_alternative
  - marker: b
    text: Or 'your multitudes,' 'your divisions,' or 'your companies.' The Hebrew 'hosts' portrays Israel as an ordered body coming out of Egypt.
    reason: lexical_alternative
  - marker: c
    text: Or 'as a statute forever' or 'as an everlasting statute.'
    reason: lexical_alternative
