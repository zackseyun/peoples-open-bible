review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: ''Cuando Lea vio que...'' reproduce adecuadamente וַתֵּרֶא + כִּי, ''había dejado de dar a luz'' comunica bien עָמְדָה מִלֶּדֶת, y ''se la dio a Jacob como esposa'' preserva correctamente לְיַעֲקֹב לְאִשָּׁה. Sin embargo, la elección principal ''su sierva'' para שִׁפְחָתָהּ suaviza innecesariamente el sentido frente al criterio del POB, que aquí busca mantener el estatus servil/subordinado con mayor fuerza léxica. Además, la nota a usa una formulación literal española poco natural (''se había detenido de dar a luz'').'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Cuando Lea vio...'' y ''había dejado de dar a luz'' suenan bien en registro bíblico moderno. ''Como esposa'' también es idiomático. La reparación necesaria es menor: fortalecer שִׁפְחָה en el texto principal a ''esclava'' para alinearlo mejor con la política terminológica y ajustar la nota literal para que el español no suene forzado.'
  glossary_alignment: 'Hay buena alineación general con los nombres propios y el lenguaje matrimonial. El punto principal de glosario es שִׁפְחָה: el proyecto pide no suavizar el estatus subordinado; ''esclava'' encaja mejor que ''sierva'' aquí, mientras ''sierva'' puede quedar como alternativa en nota. No hay otros términos del glosario mayor implicados.'
  issues:
  - severity: medium
    issue: שִׁפְחָתָהּ se traduce como 'su sierva' en el texto principal
    rationale: Aunque 'sierva' es posible, aquí suaviza el estatus servil más de lo deseable frente a la decisión inglesa documentada ('female servant' con alternativa cercana a 'slave-girl') y la política del proyecto que favorece 'esclavo/esclava' cuando se quiere preservar la fuerza léxica de servidumbre.
  - severity: low
    issue: 'La nota [a] usa una literalidad española poco natural: ''se había detenido de dar a luz'''
    rationale: Para reflejar 'stood from bearing' de forma más comprensible en español, conviene 'se había detenido en/dejado de dar a luz' o una explicación como 'literalmente, se había detenido de seguir dando a luz'. La redacción actual suena torpe.
  - severity: low
    issue: La nota [b] presenta alternativas con barra
    rationale: No es incorrecto, pero una formulación más limpia con 'O' y comas mejora la legibilidad editorial.
  revised_spanish_text: Cuando Lea vio que había dejado de dar a luz[a], tomó a Zilpa, su esclava[b], y se la dio a Jacob como esposa.
  revised_footnotes:
