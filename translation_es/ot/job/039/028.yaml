translation:
  language: es
  text: Habita en la peña y pasa allí la noche[a], sobre el diente[b] de la peña y el fortín[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y se aloja allí» o «y permanece allí durante la noche».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el diente de la peña», una imagen hebrea de una saliente rocosa aguda o de un pico rocoso.'
    reason: cultural_note
  - marker: c
    text: 'O: «la fortaleza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: סֶלַע
  english_pob_choice: cliff
  chosen_spanish: peña
  alternatives_spanish:
  - roca
  - acantilado
  - peñón
  lexicon: HALOT
  rationale: El hebreo סֶלַע designa aquí una elevación rocosa o pared de roca donde un ave puede posarse. «Peña» comunica bien una masa rocosa prominente en español natural y mantiene el tono poético sin sonar mecánico. Evita además repetir exactamente el mismo sustantivo en ambas apariciones de סֶלַע.
- source_word: יִשְׁכֹּן
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  - vive
  lexicon: HALOT
  rationale: שׁכן expresa habitar o morar de manera estable. «Habita» conserva el sentido durativo y el registro elevado del verso, en un español claro y bíblico sin arcaísmo innecesario.
- source_word: וְיִתְלֹנָן
  english_pob_choice: and spends the night there
  chosen_spanish: y pasa allí la noche
  alternatives_spanish:
  - y se aloja allí
  - y pernocta allí
  - y se queda allí a pasar la noche
  lexicon: HALOT
  rationale: La forma de לון/לין expresa alojarse o permanecer durante la noche. «Pasa allí la noche» hace explícita la permanencia nocturna, como en la traducción inglesa auditada, y mantiene la naturalidad del español.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: En el sintagma «en la punta...», el español requiere una preposición más idiomática que el simple calco «sobre». El sentido locativo se conserva sin forzar la sintaxis.
- source_word: שֶׁן סֶלַע
  english_pob_choice: the tooth of the crag
  chosen_spanish: la punta de la peña
  alternatives_spanish:
  - el diente de la peña
  - el pico de la peña
  - la arista de la peña
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «diente de peña/roca», una proyección rocosa aguda. En español, «punta» transmite la misma imagen de saliente afilado de modo natural, sin perder la fuerza poética. Se conserva la tensión metafórica en nota.
- source_word: סֶלַע
  english_pob_choice: crag
  chosen_spanish: peña
  alternatives_spanish:
  - roca
  - peñón
  - acantilado
  lexicon: HALOT
  rationale: La segunda ocurrencia retoma «peña» para mantener la cohesión del paralelo hebreo. Aunque la POB inglesa alterna entre cliff y crag, en español la repetición controlada es más fluida y sigue el mismo campo semántico.
- source_word: וּמְצוּדָה
  english_pob_choice: and the stronghold
  chosen_spanish: y en la fortaleza
  alternatives_spanish:
  - y en el baluarte
  - y en la ciudadela
  - y en la fortaleza inaccesible
  lexicon: HALOT
  rationale: מְצוּדָה puede referirse a una fortaleza o fortín, y por extensión a un refugio rocoso seguro. «Fortaleza» es el equivalente más directo y comprensible en español; el contexto poético permite este traslado sin perder la idea de lugar seguro e inaccesible.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y conserva la paralela imaginería rocosa del verso. En comparación con la POB inglesa, se optó por un español más natural («pasa allí la noche», «peña», «fortaleza») sin eliminar la metáfora de «diente/punta»; la nota b explicita la tensión entre literalidad e inteligibilidad.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio.
  - Se evita «SEÑOR» o sustitución teológica, pues el verso no contiene el Tetragrámaton.
  - La elección de «peña» para ambas apariciones de סֶלַע preserva el paralelismo; la variación semántica queda absorbida por el contexto y la nota sobre la imagen literal.
  - «Pasa allí la noche» evita el calco rígido y conserva el matiz temporal de וְיִתְלֹנָן.
