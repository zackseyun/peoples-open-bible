revisions:
- from: Y las jóvenes que apenas habían entrado en la cámara nupcial[a] para la comunión de la vida en el matrimonio, tomando lamentación en lugar de gozo, y con el cabello empapado en perfumes, mezclado con polvo, llevadas sin velo[b], entonaban un lamento en vez de cantos nupciales, con un mismo sentir, como si hubieran sido desgarradas por abusos de extranjeros[c].
  to: Y las jóvenes que apenas habían entrado en la cámara nupcial[a] para compartir la vida en matrimonio, cambiando el gozo por lamentación, y con su cabellera empapada de perfume embadurnada de polvo, siendo llevadas sin velo[b], entonaban un lamento en vez de cantos nupciales, unánimes, como si hubieran sido desgarradas por abusos de extranjeros[c].
  rationale: 'La revisión hace ajustes menores pero importantes: reemplaza «comunión de la vida» por una expresión idiomática y fiel («compartir la vida en matrimonio»), intensifica la imagen de contaminación del cabello perfumado con «embadurnada de polvo», integra mejor el sentido adverbial de ἀκαλύπτως, y suaviza una frase algo rígida con «unánimes». No cambia el sentido global ni las notas esenciales del audit trail inglés.'
  reviewer_model: gpt-5.4
