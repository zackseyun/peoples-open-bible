translation:
  language: es
  text: Acepta el sacrificio por todo tu pueblo Israel, y preserva tu porción[a] y santifícala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «tu porción» probablemente se refiere a Israel como la porción propia de Dios, aunque algunos podrían entender una referencia más amplia, como la tierra o el santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσδεξαι
  english_pob_choice: Accept
  chosen_spanish: Acepta
  alternatives_spanish:
  - Recibe
  - Acoge favorablemente
  lexicon: LSJ
  rationale: El imperativo de petición dirigido a Dios pide que reciba favorablemente la ofrenda. «Acepta» es natural en español moderno y conserva el tono súplica sin volverse áspero o técnico.
- source_word: τὴν θυσίαν
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la ofrenda
  lexicon: LSJ
  rationale: θυσία designa aquí un sacrificio concreto en contexto cultual; «sacrificio» preserva mejor esa fuerza que el más general «ofrenda».
- source_word: ὑπὲρ παντὸς τοῦ λαοῦ σου Ἰσραήλ
  english_pob_choice: for all your people Israel
  chosen_spanish: por todo tu pueblo, Israel
  alternatives_spanish:
  - en favor de todo tu pueblo, Israel
  - por todo tu pueblo Israel
  lexicon: LSJ
  rationale: ὑπέρ expresa beneficio o representación. «Por» comunica bien la idea de una acción en beneficio de Israel, y «todo tu pueblo» mantiene el alcance total del conjunto.
- source_word: διαφύλαξον
  english_pob_choice: preserve
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - protege
  lexicon: LSJ
  rationale: El verbo pide conservar a salvo o mantener intacto. «Preserva» sigue la revisión inglesa más reciente y suena formal y preciso en español bíblico.
- source_word: τὴν μερίδα σου
  english_pob_choice: your portion
  chosen_spanish: tu porción
  alternatives_spanish:
  - tu herencia
  - tu parte asignada
  lexicon: LSJ
  rationale: μερίς/μερίδα significa una porción o parte asignada. «Tu porción» conserva la metáfora sin resolverla prematuramente hacia «herencia» u otra interpretación.
- source_word: καθαγίασον
  english_pob_choice: sanctify it
  chosen_spanish: santifícala
  alternatives_spanish:
  - conságrala
  - hazla santa
  lexicon: LSJ
  rationale: El verbo significa hacer santo o consagrar. «Santifícala» mantiene el registro formal y la correspondencia tradicional sin perder claridad en español.
theological_decisions:
- issue: Referente de «tu porción»
  english_pob_reading: Israel, el pueblo de Dios, es descrito metafóricamente como su porción.
  chosen_spanish_reading: Israel, tu pueblo, es descrito metafóricamente como tu porción.
  alternative_spanish_readings:
  - la tierra como tu porción
  - el santuario como tu porción
  rationale: El contexto inmediato nombra a «todo tu pueblo, Israel» y la frase siguiente continúa naturalmente ese referente en singular. Se mantiene la metáfora abierta sin especificar más de lo que permite el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla; mantener la coherencia terminológica con la fuente.
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente al preferir «preserva» para διαφύλαξον y una forma formal equivalente a «sanctify it» mediante «santifícala». La nota mantiene la alternativa interpretativa documentada para «tu porción» sin añadir elementos no sustentados por el griego.
  spanish_consistency_notes:
  - Se usa «sacrificio» para θυσία por su sentido cultual concreto.
  - «Por todo tu pueblo, Israel» conserva la función representativa de ὑπέρ sin sobredeterminarla.
  - «Porción» se mantiene como metáfora abierta y no se sustituye por «herencia» para no cerrar la ambigüedad documentada.
  - La segunda cláusula se traduce con dos objetos coordinados en español, manteniendo la continuidad sintáctica del griego.
