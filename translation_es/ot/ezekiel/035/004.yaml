translation:
  language: es
  text: Convertiré tus ciudades en ruinas, y tú llegarás a ser una desolación; entonces sabrás que yo soy Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR», pero aquí se translitera como «Yahvé» para conservar el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָרֶיךָ
  english_pob_choice: your cities
  chosen_spanish: tus ciudades
  alternatives_spanish:
  - tus poblaciones
  - tus villas
  lexicon: HALOT
  rationale: El plural con sufijo de 2.ª persona masculina se refiere a centros urbanos pertenecientes al destinatario. «Ciudades» es el equivalente natural y estándar en español bíblico para este contexto de juicio.
- source_word: חָרְבָּה
  english_pob_choice: ruins
  chosen_spanish: ruinas
  alternatives_spanish:
  - destrucción
  - lugares devastados
  lexicon: HALOT
  rationale: El sustantivo expresa un estado de devastación. En español, con «haré» y un objeto plural, «ruinas» reproduce bien la imagen de desolación total.
- source_word: אָשִׂים
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - pondré
  - convertiré en
  lexicon: HALOT
  rationale: שׂוּם puede significar «poner», «establecer» o «hacer». En esta construcción predicativa, «haré» comunica de forma natural la acción causativa sin perder el sentido del hebreo.
- source_word: וְאַתָּה
  english_pob_choice: and you
  chosen_spanish: y tú
  alternatives_spanish:
  - y en cuanto a ti
  - y tú mismo
  lexicon: HALOT
  rationale: El pronombre explícito introduce contraste y énfasis frente al destino de las ciudades. «Y tú» conserva la directitud sin sobreexplicar.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolación
  - un lugar desierto
  lexicon: HALOT
  rationale: El sustantivo funciona como complemento nominal de estado. «Una desolación» mantiene la estructura del original y el tono profético de ruina total.
- source_word: תִהְיֶה
  english_pob_choice: you will become
  chosen_spanish: serás
  alternatives_spanish:
  - llegarás a ser
  - te convertirás en
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir proceso o resultado, en español «serás» suena más natural y sigue expresando el estado final de desolación; no conviene recargar la frase con una perífrasis innecesaria.
- source_word: וְיָדַעְתָּ
  english_pob_choice: then you will know
  chosen_spanish: entonces sabrás
  alternatives_spanish:
  - y sabrás
  - así sabrás
  lexicon: HALOT
  rationale: La conjunción marca consecuencia del juicio. «Entonces» explicita esa relación discursiva de manera natural y fiel al patrón profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino transliterado según la pauta del proyecto en español. «Yahvé» es la forma asentada en español y preserva el nombre propio del pacto sin sustituirlo por un título.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre divino directamente, no un título. En español, el proyecto pide preservar ese nombre como «Yahvé», evitando el sustituto litúrgico «SEÑOR» y manteniendo la referencia al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de reconocimiento en Ezequiel
  english_pob_reading: then you will know that I am Yahweh
  chosen_spanish_reading: entonces sabrás que yo soy Yahvé
  alternative_spanish_readings:
  - y sabrás que yo soy Yahvé
  - entonces conocerás que yo soy Yahvé
  rationale: Se conserva la fórmula característica de Ezequiel para reconocer a Yahvé después del juicio. «Sabrás» comunica adecuadamente el conocimiento resultante sin alterar el sentido del hebreo.
  doctrine_reference: Ezequiel 35:4; fórmula profética de reconocimiento
- issue: Matiz de estado final en la cláusula de desolación
  english_pob_reading: you will become a desolation
  chosen_spanish_reading: serás una desolación
  alternative_spanish_readings:
  - llegarás a ser una desolación
  - te volverás desolación
  rationale: El hebreo puede leerse como ingreso a un estado de desolación. En español, «serás una desolación» conserva el resultado sin añadir una dinámica innecesaria; el contexto de juicio ya aporta la transición implícita.
  doctrine_reference: HALOT; sintaxis predicativa de היה
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia y no registra cambios aplicados en la última revisión; la propuesta española sigue esa lectura estable y únicamente adapta la formulación al español natural, preservando el nombre divino como Yahvé según la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - «Ciudades» y «ruinas» conservan el paralelismo nominal del hebreo sin suavizar el juicio.
  - «Entonces sabrás» mantiene la fórmula profética de reconocimiento típica de Ezequiel.
  - La puntuación con punto y coma refleja bien el encadenamiento de juicio y reconocimiento.
