translation:
  language: es
  text: Pero si una persona peca por inadvertencia, esa persona presentará una cabra de un año como ofrenda por el pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חַטָּאת puede referirse a la ofrenda ritual que trata el pecado o la impureza, no solo al pecado mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En este contexto jurídico, la partícula introduce un caso contrastivo respecto de la legislación anterior. «Pero si» conserva el matiz adversativo/continuativo con naturalidad en español.
- source_word: נֶפֶשׁ אַחַת
  english_pob_choice: one person
  chosen_spanish: una persona
  alternatives_spanish:
  - un alma
  - un individuo
  lexicon: HALOT
  rationale: נֶפֶשׁ en contextos legales designa a una persona. «Una persona» evita una traducción demasiado literal de «alma» y mantiene la singularidad marcada por אַחַת.
- source_word: תֶּחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete un pecado
  - pecará
  lexicon: HALOT
  rationale: El imperfecto en esta construcción casuística funciona como condición general. «Peca» es breve, claro y fiel al valor verbal del hebreo.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: por inadvertencia
  alternatives_spanish:
  - sin querer
  - por error
  - involuntariamente
  lexicon: HALOT
  rationale: El término legal indica una falta hecha sin intención o por descuido. «Por inadvertencia» conserva el matiz jurídico mejor que opciones más coloquiales.
- source_word: וְהִקְרִיבָה
  english_pob_choice: then she shall present
  chosen_spanish: entonces presentará
  alternatives_spanish:
  - y presentará
  - entonces ofrecerá
  - y ofrecerá
  lexicon: HALOT
  rationale: En contexto sacrificial, קרב en Hifil significa traer/presentar una ofrenda. «Presentará» es natural en español y mantiene la imagen de llevar la ofrenda delante de Yahvé.
- source_word: עֵז
  english_pob_choice: female goat
  chosen_spanish: una cabra hembra
  alternatives_spanish:
  - una cabra
  - una chiva
  lexicon: HALOT
  rationale: El sustantivo especifica una cabra hembra. «Cabra hembra» hace explícito el sexo del animal, aunque en español sea menos idiomático que simplemente «cabra».
- source_word: בַּת שְׁנָתָהּ
  english_pob_choice: one-year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión hebrea indica que el animal está en su primer año. «De un año» es compacto y natural en español, sin perder el valor temporal.
- source_word: לְחַטָּאת
  english_pob_choice: as a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado/para purificación
  - como ofrenda de expiación
  lexicon: HALOT
  rationale: El término חַטָּאת puede referirse tanto al pecado como a la ofrenda ritual asociada. «Ofrenda por el pecado» preserva la lectura tradicional y reconoce la tensión lexical, sin cerrar la posibilidad de función purificadora.
theological_decisions:
- issue: Género gramatical del oferente singular
  english_pob_reading: Rendered the offender as 'she' in keeping with the feminine singular Hebrew forms.
  chosen_spanish_reading: Se conserva el sujeto en femenino singular implícito en «presentará».
  alternative_spanish_readings:
  - presentará (genérico masculino)
  - presentará(n)
  rationale: El hebreo usa formas femeninas singulares concordando con נֶפֶשׁ, que es femenino. El español no necesita explicitar «ella»; basta con mantener la concordancia verbal implícita en una formulación natural y fiel.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sentido de חַטָּאת en el rito
  english_pob_reading: Rendered as 'sin offering' in the main text.
  chosen_spanish_reading: Se traduce como «ofrenda por el pecado».
  alternative_spanish_readings:
  - ofrenda de expiación
  - ofrenda de purificación
  rationale: En español, «ofrenda por el pecado» comunica con claridad el uso ritual del término y conserva la conexión con la raíz semántica. Se preserva así la tensión entre pecado y función expiatoria/purificadora.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 5
translation_notes:
  revision_awareness: El pasaje inglés reciente no fue revisado en el contenido sustancial; el análisis de revisión indica que no hubo cambios aplicados y que el texto quedó sin modificaciones en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito según la terminología del proyecto, aunque este versículo no lo nombra explícitamente.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el hebreo de este versículo no lo contiene.
  - Se conserva un registro sobrio y jurídico, adecuado a la casuística sacerdotal.
  - La opción «ofrenda por el pecado» mantiene la tradición bíblica sin borrar la posible lectura de purificación, que se explica en nota.
