    text: O, más literalmente, «estén lejos de allí».
    reason: lexical_alternative
  - marker: b
    text: «Más Allá del Río» es el nombre administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
  - marker: c
    text: El término traducido como «funcionarios» también puede transliterarse como «Apharsachitas».
    reason: alternative_reading
  revision_rationale: Se corrigió el posesivo a segunda persona plural para reflejar el arameo y la decisión léxica inglesa («your associates»). Se reubicó la nota [a] a la orden final, donde realmente corresponde. Además, se ajustó la orden a «manténganse lejos de allí» para reflejar mejor la fuerza del original y la alternativa literal documentada, y se suavizó la nota cultural para evitar sobreespecificación innecesaria.
