translation:
  language: es
  text: Que ofrezcan sacrificios con fuego continuo[a], en un edificio de sesenta codos de altura y sesenta codos de anchura, con tres hiladas de piedra labrada y una hilada de madera local nueva[b]; y que el gasto se pague de la casa de Ciro el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por fuego perpetuo». La frase griega puede entenderse de modo instrumental, pero aquí se toma como descripción del fuego sacrificial continuo.
    reason: lexical_alternative
  - marker: b
    text: «Casa de Ciro» probablemente se refiere al tesoro real o a los recursos de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: θύουσιν
  english_pob_choice: Let them offer sacrifices
  chosen_spanish: Que ofrezcan sacrificios
  alternatives_spanish:
  - que sacrifiquen
  - ofrezcan sacrificios
  lexicon: LSJ
  rationale: En este contexto de decreto, el griego tiene fuerza prescriptiva. En español, «Que ofrezcan sacrificios» conserva el mandato sin volverlo mecánicamente imperativo, y mantiene el sentido cultual de θύω.
- source_word: διὰ πυρὸς ἐνδελεχοῦς
  english_pob_choice: with continual fire
  chosen_spanish: con fuego continuo
  alternatives_spanish:
  - por fuego perpetuo
  - con fuego incesante
  lexicon: LSJ
  rationale: La frase describe la continuidad del fuego sacrificial. «Con fuego continuo» es natural en español y conserva tanto la idea de constancia como el matiz cultual; se evita resolver demasiado pronto la posible lectura instrumental.
- source_word: τὸ ὕψος ... πλάτος
  english_pob_choice: height ... width
  chosen_spanish: altura ... anchura
  alternatives_spanish:
  - altura ... ancho
  - altura ... amplitud
  lexicon: LSJ
  rationale: Son términos dimensionales directos. «Anchura» funciona bien en español formal y conserva la medida arquitectónica del texto.
- source_word: δόμων λιθίνων ξυστῶν τριῶν
  english_pob_choice: three courses of polished stone
  chosen_spanish: tres hiladas de piedra labrada
  alternatives_spanish:
  - tres hileras de piedra labrada
  - tres cursos de piedra labrada
  lexicon: LSJ
  rationale: δόμος aquí expresa una hilada o curso de construcción; ξυστός indica piedra alisada/labrada. «Hiladas de piedra labrada» suena natural en español y mantiene el sentido arquitectónico.
- source_word: δόμου ξυλίνου ἐγχωρίου καινοῦ ἑνός
  english_pob_choice: one course of new local timber
  chosen_spanish: una hilada de madera local nueva
  alternatives_spanish:
  - una hilada de madera nativa nueva
  - una hilada de madera nueva del lugar
  lexicon: LSJ
  rationale: Se conserva la simetría con las «hiladas» anteriores y el contraste entre piedra y madera. «Local» traduce ἐγχώριος, y «nueva» mantiene καινοῦ. «Madera» es más natural que «madera/timber» en español.
- source_word: τὸ δαπάνημα
  english_pob_choice: the expense
  chosen_spanish: el gasto
  alternatives_spanish:
  - la erogación
  - el costo
  lexicon: LSJ
  rationale: En un contexto administrativo, δαπάνημα se refiere al desembolso o gasto. «El gasto» es claro y plenamente idiomático en español contemporáneo.
- source_word: δοθῆναι
  english_pob_choice: let ... be given
  chosen_spanish: sea dado
  alternatives_spanish:
  - sea entregado
  - se dé
  lexicon: LSJ
  rationale: El infinitivo funciona con fuerza directiva. «Sea dado» conserva la pasiva/decreto del griego y mantiene el tono formal sin añadir explicaciones.
- source_word: ἐκ τοῦ οἴκου Κύρου τοῦ βασιλέως
  english_pob_choice: from the house of Cyrus the king
  chosen_spanish: de la casa de Ciro el rey
  alternatives_spanish:
  - del tesoro de Ciro el rey
  - de la corte de Ciro el rey
  lexicon: LSJ
  rationale: Se preserva literalmente οἶκος como «casa», ya que el griego no dice explícitamente «tesoro». La posible referencia administrativa se deja abierta, como en el texto base y su nota inglesa.
theological_decisions:
- issue: Fuerza prescriptiva del verbo de sacrificio en un decreto imperial
  english_pob_reading: Let them offer sacrifices with continual fire
  chosen_spanish_reading: Que ofrezcan sacrificios con fuego continuo
  alternative_spanish_readings:
  - Que sacrifiquen con fuego continuo
  - Ofrezcan sacrificios con fuego continuo
  rationale: La traducción conserva el carácter ordenativo del pasaje sin convertirlo en una descripción neutra. «Ofrezcan sacrificios» mantiene el lenguaje cultual sin introducir categorías posteriores.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Posible sentido instrumental o descriptivo de διὰ πυρὸς ἐνδελεχοῦς
  english_pob_reading: with continual fire
  chosen_spanish_reading: con fuego continuo
  alternative_spanish_readings:
  - por fuego perpetuo
  - mediante fuego continuo
  rationale: El griego puede entenderse de manera instrumental o como rasgo continuo del rito. La redacción principal favorece la lectura cultual continua, como en el audit trail inglés, sin eliminar la otra posibilidad.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido administrativo de «la casa de Ciro»
  english_pob_reading: from the house of Cyrus the king
  chosen_spanish_reading: de la casa de Ciro el rey
  alternative_spanish_readings:
  - del tesoro de Ciro el rey
  - de los recursos reales de Ciro el rey
  rationale: Se mantiene la literalidad de οἶκος para no sobretraducir el dato administrativo. La posible referencia al tesoro queda implícita y se documenta en la nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete como ancla principal y refleja el audit trail inglés en dos puntos sensibles: διὰ πυρὸς ἐνδελεχοῦς se conserva como «con fuego continuo» con nota alternativa, y ἐκ τοῦ οἴκου Κύρου τοῦ βασιλέως se mantiene literalmente como «de la casa de Ciro el rey» para no resolver sin necesidad la nuance administrativa. También se adaptó el registro para español bíblico moderno, evitando calcos duros como «por fuego» o «de la casa» sin artículo excesivo, y se preservó la estructura de medidas y materiales de construcción.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando aparezca el nombre divino; aquí no aparece.
  - «Ciro el rey» mantiene el orden formal del título para corresponder al griego.
  - Se prefirió «hilada» para δόμος por su valor arquitectónico natural en español.
  - Se mantuvo «fuego continuo» en vez de una paráfrasis más libre para conservar la posible ambigüedad cultual del original.
