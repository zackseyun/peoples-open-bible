translation:
  language: es
  text: Yahvé juzga a los pueblos; júzgame[a], oh Yahvé, conforme a mi justicia y conforme a mi integridad[b], que está sobre mí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vindícame». El imperativo hebreo «júzgame» puede llevar el sentido de dictar un veredicto favorable.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «conforme a mi irreprochabilidad» para «conforme a mi integridad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que está en mí». El hebreo dice literalmente «sobre mí», y aquí se conserva esa imagen.'
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, en línea con el criterio del POB de no sustituir el Tetragrámaton por un título. «Yahvé» es la forma española estándar para transliterar el nombre divino.
- source_word: יָדִין
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - juzgará
  - administra justicia
  lexicon: HALOT
  rationale: El imperfecto hebreo en poesía puede expresar presente gnómico; «juzga» mantiene el valor verbal directo y la relación con el mandato siguiente «júzgame».
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: «Pueblos» conserva el plural colectivo sin cargar el texto con una connotación política más fuerte como «naciones». En español suena natural y sigue el alcance amplio del hebreo.
- source_word: שָׁפְטֵנִי
  english_pob_choice: judge me
  chosen_spanish: júzgame
  alternatives_spanish:
  - vindícame
  - hazme justicia
  lexicon: HALOT
  rationale: Se mantiene el verbo «juzgar» para reflejar la conexión léxica con el primer hemistiquio. La posible fuerza vindicativa queda sugerida por el contexto, sin resolverla en una paráfrasis.
- source_word: כְּצִדְקִי
  english_pob_choice: according to my righteousness
  chosen_spanish: conforme a mi justicia
  alternatives_spanish:
  - según mi rectitud
  - conforme a mi justicia/rectitud
  lexicon: HALOT
  rationale: «Justicia» comunica bien la fuerza de צדק en un contexto judicial y de vindicación. Se conserva «conforme a» para reflejar el valor normativo del prefijo כ.
- source_word: וּכְתֻמִּי
  english_pob_choice: and according to my integrity
  chosen_spanish: y conforme a mi integridad
  alternatives_spanish:
  - y conforme a mi blamelessness
  - y conforme a mi inocencia
  lexicon: HALOT
  rationale: «Integridad» recoge la idea de תֹּם / תֻּם como integridad moral o entereza sin convertirla en «inocencia» absoluta. Es una opción natural en español y mantiene la tensión del original.
- source_word: עָלָי
  english_pob_choice: that is upon me
  chosen_spanish: que está sobre mí
  alternatives_spanish:
  - que recae sobre mí
  - que está en mí
  - que me pertenece
  lexicon: HALOT
  rationale: Se conserva la imagen preposicional de על («sobre/upon»). «Que está sobre mí» es una forma española fiel y legible que evita borrar el matiz espacial del hebreo.
theological_decisions:
- issue: Cómo traducir la afirmación del salmista sobre su justicia e integridad sin suavizarla ni absolutizarla
  english_pob_reading: Retain the first-person claim straightforwardly as a situational appeal to righteousness and integrity
  chosen_spanish_reading: Mantener la afirmación en primera persona como apelación situacional a justicia e integridad
  alternative_spanish_readings:
  - «mi supuesta inocencia»
  - «mi causa justa»
  - parafrasear para evitar toda autodescripción moral
  rationale: El hebreo dice explícitamente «mi justicia» y «mi integridad»; la traducción conserva esa tensión teológica en vez de resolverla. «Integridad» evita insinuar impecabilidad absoluta, mientras que el contexto judicial queda abierto a una reivindicación forense o moral.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial auditado del POB inglés: la elección final recupera «upon me» frente a la revisión intermedia «in me», por ser más cercana al hebreo עָלָי. También se preservó la lectura forense/judicial del verbo שפט sin convertirla en paráfrasis explicativa en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton, no «SEÑOR».
  - «Juzga/júzgame» conserva el enlace léxico entre los dos miembros del versículo.
  - «Justicia» y «integridad» se mantienen como términos distintos para reflejar los dos sustantivos hebreos.
  - La nota sobre «sobre mí» conserva la imagen espacial del hebreo sin perder legibilidad en español.
