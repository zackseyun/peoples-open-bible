  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios» es correcto para אֱלָהָא; no aparece Yahvé ni Mesías. «Poder» para גְבוּרְתָא es aceptable en español, aunque el inglés use «might»; la nota alternativa con «fuerza» preserva la amplitud semántica. La fórmula doxológica «Sea bendito» está bien alineada con la justificación auditada.'
