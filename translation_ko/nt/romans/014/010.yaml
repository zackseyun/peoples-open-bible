id: ROM.14.10
reference: Romans 14:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σὺ δὲ τί κρίνεις τὸν ἀδελφόν σου; ἢ καὶ σὺ τί ἐξουθενεῖς τὸν ἀδελφόν σου; πάντες γὰρ παραστησόμεθα τῷ βήματι τοῦ ⸀θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/010.yaml
  text: But you, why do you judge your brother? Or you also, why do you despise your brother? For we will all stand before the judgment seat of God,
translation:
  language: ko
  text: 그런데 당신은 어찌하여 당신의 형제[a]를 판단합니까? 또 당신은 어찌하여 당신의 형제를 업신여깁니까? 우리가 다 하나님의 심판대[b] 앞에 서게 될 것이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφός는 문법적으로 남성 단수이나, 신앙 공동체 내 동료를 일반적으로 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 어떤 사본들은 「메시아의 심판대」로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: Σὺ δὲ
  english_pob_choice: But you
  chosen_korean: 그런데 당신은
  alternatives_korean:
  - 그러나 당신은
  lexicon: BDAG
  rationale: 강조적 σύ와 δέ의 대조를 자연스럽게.
- source_word: τὸν ἀδελφόν σου
  english_pob_choice: your brother
  chosen_korean: 당신의 형제
  alternatives_korean:
  - 당신의 형제자매
  lexicon: BDAG
  rationale: 헬라어 단수 남성 형식을 그대로 보존. 문맥상 신앙 공동체 동료를 일반적으로 가리킨다.
- source_word: ἐξουθενεῖς
  english_pob_choice: do you despise
  chosen_korean: 업신여기다
  alternatives_korean:
  - 멸시하다
  lexicon: BDAG
  rationale: 14:3과 어휘 일관성.
- source_word: παραστησόμεθα
  english_pob_choice: stand before
  chosen_korean: 앞에 서다
  alternatives_korean:
  - 출두하다
  lexicon: BDAG
  rationale: 미래 중간태로 법정 앞 출두를 가리킨다. 「앞에 서다」가 자연스럽고 「심판대」와 어울린다.
- source_word: τῷ βήματι τοῦ θεοῦ
  english_pob_choice: the judgment seat of God
  chosen_korean: 하나님의 심판대
  alternatives_korean:
  - 하나님의 법정
  lexicon: BDAG
  rationale: βῆμα는 사법적 자리. 「심판대」가 정형화된 한국어 표현.
