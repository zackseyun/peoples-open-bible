id: 1TI.2.12
reference: 1 Timothy 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂διδάσκειν δὲ γυναικὶ⸃ οὐκ ἐπιτρέπω, οὐδὲ αὐθεντεῖν ἀνδρός, ἀλλ’ εἶναι ἐν ἡσυχίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/012.yaml
  text: But I do not permit a woman to teach or to exercise authority over a man[a]; instead[c][b], she is to be in quietness.
  footnotes:
  - marker: a
    text: Or 'a wife ... a husband.' The Greek words can carry either the general sense ('woman/man') or the marital sense ('wife/husband').
    reason: alternative_reading
  - marker: b
    text: Or 'to have authority over'; possibly 'to domineer over.' The Greek verb is rare and its nuance is debated.
    reason: lexical_alternative
  - marker: c
    text: Or 'in silence.' The Greek term can denote quietness, calmness, or silence depending on context.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 나는 여자[a]가 가르치거나 남자에게 권위를 행사하는[b] 것을 허락하지 않습니다. 다만 조용한 가운데[c] 있어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아내 ~ 남편」. 헬라어 γυνή·ἀνήρ는 일반적 의미(여자/남자)와 부부 관계(아내/남편) 두 의미가 모두 가능하다.
    reason: alternative_reading
  - marker: b
    text: 또는 「권세를 가지다」; 가능성으로 「전횡하다」. 헬라어 αὐθεντέω는 드문 어휘이며 그 어감이 논의 중이다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「침묵 가운데」. 헬라어 ἡσυχία는 문맥에 따라 「조용함·차분함·침묵」의 폭을 가진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διδάσκειν δὲ γυναικὶ οὐκ ἐπιτρέπω
  english_pob_choice: But I do not permit a woman to teach
  chosen_korean: 그러나 나는 여자가 가르치는 것을 허락하지 않습니다
  alternatives_korean:
  - 그러나 나는 여자가 가르치도록 허용하지 않습니다
  - 그러나 나는 아내가 가르치는 것을 허용하지 않습니다
  lexicon: BDAG
  rationale: ἐπιτρέπω의 「허락·허용」을 「허락」으로, 부정사 διδάσκειν의 행위 의미를 「가르치는 것」으로 옮긴다.
- source_word: αὐθεντεῖν ἀνδρός
  english_pob_choice: to exercise authority over a man
  chosen_korean: 남자에게 권위를 행사하는
  alternatives_korean:
  - 남자에게 권세를 부리는
  - 남자를 좌지우지하는
  - 남편에게 권위를 행사하는
  lexicon: BDAG
  rationale: αὐθεντέω는 드문 어휘로 「(스스로) 권위를 행사하다·(때로) 전횡하다」의 폭을 가진다. 부정적 어감(전횡)으로 좁히지 않고 중립적 「권위를 행사하다」를 본문에 두며, 각주에 어감 폭을 보존한다.
- source_word: ἀλλ’ εἶναι ἐν ἡσυχίᾳ
  english_pob_choice: instead, she is to be in quietness
  chosen_korean: 다만 조용한 가운데 있어야 합니다
  alternatives_korean:
  - 오히려 침묵 가운데 있어야 합니다
  - 도리어 고요함 속에 있어야 합니다
  lexicon: BDAG
  rationale: 11절 ἡσυχίᾳ와 동일 어휘. 일관되게 「조용한 가운데」로 옮긴다.
theological_decisions:
- issue: 2:12 - 가르치거나 권위를 행사함의 금지
  chosen_reading: 「나는 여자가 가르치거나 남자에게 권위를 행사하는 것을 허락하지 않습니다.」
  alternative_readings:
  - 「나는 아내가 가르치거나 남편에게 권세를 부리는 것을 허락하지 않습니다.」
  - 「나는 여자가 가르치거나 남자를 좌지우지하는 것을 허용하지 않습니다.」
  rationale: 본 번역은 본 절의 강한 어조를 그대로 옮기되, 두 가지 본문적 모호함을 각주에 보존한다. (1) γυνή/ἀνήρ가 「여자/남자」인지 「아내/남편」인지, (2) αὐθεντέω가 중립적 「권위 행사」인지 부정적 「전횡」인지. 본문은 한 가지로 결정짓지 않으므로, 약화하거나 강화하지 않고 가장 절제된 직역을 본문에 두며 모호성은 각주로 드러낸다. 1인칭 ἐπιτρέπω(현재형, 「허락하지 않습니다」)는 사도의 직접 발언으로 보존한다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not soften or sharpen; document contested renderings in footnotes'
