translation:
  language: es
  text: Así fijaron un día en el que se reunirían en privado; y de cada lado fue sacada una silla de manos[a], y se colocaron asientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego δίφραξ es raro aquí y puede designar una litera, silla de manos o un asiento portátil semejante; la forma exacta del objeto no es segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτάξαντο
  english_pob_choice: they set
  chosen_spanish: fijaron
  alternatives_spanish:
  - señalaron
  - concertaron
  - establecieron
  lexicon: LSJ
  rationale: El aoristo medio de τάσσω aquí expresa la acción de fijar o concertar una fecha. «Fijaron» reproduce bien el acto de determinar un día concreto en español natural.
- source_word: ἡμέραν
  english_pob_choice: a day
  chosen_spanish: un día
  alternatives_spanish:
  - el día
  - un día señalado
  - una fecha
  lexicon: LSJ
  rationale: El sustantivo sin artículo se rinde con valor indefinido en español. «Un día» conserva la sencillez y evita sobreespecificar.
- source_word: κατʼ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - privadamente
  - a solas
  - por separado
  lexicon: LSJ
  rationale: La expresión indica que el encuentro no sería público. «En privado» es natural, digno y fiel al sentido.
- source_word: ἥξουσιν εἰς τὸ αὐτό
  english_pob_choice: they would come together
  chosen_spanish: vendrían
  alternatives_spanish:
  - se reunirían
  - vendrían juntos
  - acudirían al mismo lugar
  lexicon: LSJ
  rationale: El giro griego literalmente dice «llegarán al mismo [lugar]». En español, el contexto ya implica el encuentro; «vendrían» mantiene la referencia temporal y permite que el sentido de reunión quede claro por el contexto inmediato.
- source_word: προῆλθε
  english_pob_choice: was brought forward
  chosen_spanish: se adelantó
  alternatives_spanish:
  - salió al frente
  - fue traído adelante
  - apareció
  lexicon: LSJ
  rationale: La forma singular introduce la preparación ceremonial. «Se adelantó» conserva la idea de avanzar o salir al frente sin forzar una pasiva artificial en español.
- source_word: παρʼ ἑκάστου
  english_pob_choice: from each side
  chosen_spanish: de cada lado
  alternatives_spanish:
  - por cada parte
  - de cada uno
  - por ambas partes
  lexicon: LSJ
  rationale: El contexto narrativo apunta a las dos partes presentes en la negociación. «De cada lado» comunica esa distribución bilateral de manera clara.
- source_word: δίφραξ
  english_pob_choice: sedan chair
  chosen_spanish: dífrax
  alternatives_spanish:
  - litera
  - silla de manos
  - sedán
  lexicon: LSJ
  rationale: El término griego es raro y su referente exacto es incierto. Se conserva una transliteración marcada para no imponer una equivalencia demasiado precisa donde el audit trail reconoce la ambigüedad léxica.
- source_word: ἔθεσαν δίφρους
  english_pob_choice: seats were set out
  chosen_spanish: se colocaron asientos
  alternatives_spanish:
  - pusieron asientos
  - se dispusieron asientos
  - se instalaron asientos
  lexicon: LSJ
  rationale: δίφρος puede significar asiento, taburete o silla. «Se colocaron asientos» refleja el acto de disponerlos sin comprometer una forma específica de mueble que el griego no exige.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa; la única tensión relevante es el término raro δίφραξ, cuya equivalencia exacta permanece incierta. Por eso se conserva una transliteración en el texto español y se explicita la ambigüedad en nota.
  spanish_consistency_notes:
  - Se mantiene «dífrax» para reflejar la rareza y la incertidumbre léxica del término griego, en lugar de cerrar la opción interpretativa con «litera» o «silla de manos».
  - «En privado» conserva el valor de κατʼ ἰδίαν sin introducir una connotación más fuerte que la del texto.
  - No hay decisiones teológicas explícitas en este versículo; el trabajo es principalmente narrativo y léxico.
