revisions:
- from: Y extenderé mi mano contra los profetas que ven mentira y que practican adivinación engañosa. No estarán en el consejo[a] de mi pueblo, ni serán inscritos en el registro[b] de la casa de Israel, ni entrarán en la tierra de Israel. Entonces sabrán que yo soy el Señor Yahvé[c].
  to: Y mi mano estará contra los profetas que ven mentira y que practican adivinación engañosa. No estarán en el consejo[a] de mi pueblo, ni serán inscritos en el registro[b] de la casa de Israel, ni entrarán en la tierra de Israel. Entonces ustedes sabrán que yo soy el Señor Yahvé[c].
  rationale: Se corrigió la persona verbal final a segunda plural para reflejar fielmente וִידַעְתֶּם, se ajustó la cláusula inicial a «mi mano estará contra» para evitar añadir un matiz no exigido por el hebreo, y se repararon las notas para que presenten alternativas reales y mejor documentadas. No se requiere adjudicación adicional porque los cambios son directos y bien sustentados por la evidencia fuente y el criterio del proyecto.
