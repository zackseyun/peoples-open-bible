translation:
  language: es
  text: Si yo tuviera hambre[a], no te lo diría, porque mío es el mundo y su plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mundo habitado y todo lo que lo llena».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - En caso de que
  - Si llegara a
  lexicon: HALOT
  rationale: El hebreo introduce una condición hipotética; «Si» preserva de forma natural y directa ese valor condicional en español.
- source_word: אֶרְעַב
  english_pob_choice: I were hungry
  chosen_spanish: yo tuviera hambre
  alternatives_spanish:
  - yo estuviera hambriento
  - yo tuviera necesidad de comer
  lexicon: HALOT
  rationale: El imperfecto en este contexto expresa una situación hipotética o irreal; «yo tuviera hambre» reproduce bien esa fuerza sin sonar forzado en español.
- source_word: לֹא אֹמַר לָךְ
  english_pob_choice: I would not tell you
  chosen_spanish: no te lo diría
  alternatives_spanish:
  - no te lo diría a ti
  - no te lo diría
  lexicon: HALOT
  rationale: «Decir» puede traducirse como «decirlo», pero en español «no te lo diría» resulta idiomático y mantiene el sentido de hablarle a alguien sobre la necesidad propia.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior; «porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: תֵבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - el orbe
  lexicon: HALOT
  rationale: La POB en inglés opta por «the world»; en español «el mundo» es la equivalencia natural y conserva el contraste poético con la provisión divina.
- source_word: וּמְלֹאָהּ
  english_pob_choice: and its fullness
  chosen_spanish: y todo lo que lo llena
  alternatives_spanish:
  - y su plenitud
  - y cuanto hay en él
  lexicon: HALOT
  rationale: «Plenitud» es posible, pero en español puede sonar abstracto; «todo lo que lo llena» preserva el sentido de contenido total y hace explícita la imagen sin excederla.
theological_decisions:
- issue: Hipótesis retórica sobre la necesidad divina
  english_pob_reading: The verse is rendered as a rhetorical hypothetical emphasizing that God does not depend on human provision.
  chosen_spanish_reading: 'El versículo se entiende como una hipótesis retórica: aun si Dios tuviera hambre, no dependería de la gente para satisfacer esa necesidad.'
  alternative_spanish_readings:
  - Si yo tuviera hambre, no te lo diría, porque mío es el mundo y su plenitud.
  - Si tuviera hambre, no te lo diría, pues mío es el mundo y todo cuanto contiene.
  rationale: La estructura condicional del hebreo expresa una situación contrafactual; la traducción española debe mantener esa tensión para evitar la idea de una necesidad real de Dios. La formulación resultante conserva el argumento del texto sin introducir explicaciones filosóficas ajenas.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el sentido registrado en el audit trail inglés: condicional hipotético, negación de dependencia de la provisión humana y par de términos poéticos «world/fullness». No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «mundo» para תֵבֵל, en armonía con la elección inglesa y con un español claro y natural.
  - Se evitó «SEÑOR» u այլ sustitutos, porque el versículo no contiene el nombre divino explícito.
  - Se prefirió una construcción verbal natural en español («no te lo diría») para reflejar la fuerza hipotética del hebreo sin perder la claridad litúrgica.
  - La nota al pie preserva la alternativa semántica tradicional de «la tierra habitada», útil para lectores que desean una precisión más literal.
