  source_alignment_summary: 'El borrador capta bien la secuencia sapiencial del hebreo: primero investigar/examinar, luego una respuesta correctiva. También conserva en nota la importante alternativa griega. Sin embargo, ''no hables contra él'' añade un objeto (''él'') ausente del hebreo y desplaza el matiz de ''hallar falta / censurar prematuramente'' hacia hablar contra una persona específica. La nota [b] está anclada en ''primero'', pero explica el verbo anterior אַל תְּסַלֵּף, por lo que el anclaje no corresponde.'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para sonar más natural y más fiel al sentido documentado. 'No encuentres falta' es comprensible, pero 'no censures' o 'no halles falta' sería más idiomático; se prefiere 'no censures' por claridad contemporánea. La puntuación y el registro son adecuados.
  glossary_alignment: No hay términos teológicos mayores en juego. Las decisiones léxicas principales siguen razonablemente el expediente inglés, salvo que 'no hables contra él' se aparta del 'do not find fault' documentado y del matiz de juicio adverso prematuro. La preservación de la alternativa griega en nota es correcta.
  issues:
  - severity: medium
    issue: Se añade 'él' en 'no hables contra él'
    rationale: El hebreo no expresa objeto directo aquí; introducir 'él' personaliza indebidamente la admonición y reduce la generalidad sapiencial.
  - severity: medium
    issue: La frase principal no refleja bien la decisión léxica documentada para אַל תְּסַלֵּף
    rationale: El expediente inglés justificó 'do not find fault' como sentido probable; 'no hables contra él' se acerca más a una reacción verbal contra alguien que a censura o juicio adverso prematuro.
  - severity: high
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota explica el verbo 'no ...' derivado de אַל תְּסַלֵּף, pero el marcador aparece sobre 'primero'. Los marcadores deben aparecer en la palabra o frase pertinente.
  - severity: low
    issue: Una alternativa léxica contiene texto corrupto
    rationale: En las decisiones léxicas aparece 'no encuentres दोष?', lo cual evidencia un error editorial, aunque no afecta directamente el texto bíblico final.
  revised_spanish_text: Antes de investigar[a], no censures[b]; examina primero, y después reprende.
