base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/015.yaml
  text: So now[a], do not let Hezekiah deceive you, and do not let him mislead you in this way, and do not believe him; for no god of any nation or kingdom has been able to deliver his people from my hand and from the hand of my fathers[c][b]. How much less will your God deliver you from my hand!
  footnotes:
  - marker: a
    text: Or 'incite you' / 'entice you' for 'persuade you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from my hand and from the hand of my fathers,' with 'hand' meaning power or control.
    reason: cultural_note
  - marker: c
    text: Or 'certainly not' for 'How much less,' reflecting the Hebrew idiom of intensified negative conclusion.
    reason: lexical_alternative
