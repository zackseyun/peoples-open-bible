review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido base del hebreo: mantiene las dos imágenes animales paralelas, la referencia explícita a «sus pechos», la satisfacción sensual continua, y el uso positivo de תִּשְׁגֶּה como quedar embriagado/arrebatado por el amor. Sin embargo, introduce problemas menores de fidelidad y presentación: el anclaje de notas está mal formado, hay una nota adicional para «con su amor» que no responde a una ambigüedad necesaria del español ni al rastro principal del POB inglés, y «cierva amante» suena menos natural que una formulación que preserve mejor el valor atributivo de אֲהָבִים.'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita pequeños ajustes de naturalidad y corrección editorial. «Cierva amante» puede entenderse, pero en español suena algo forzado o potencialmente agentivo; «cierva amorosa» fluye mejor y mantiene el tono poético. Hay un error tipográfico en el marcador «[ a]». Además, la secuencia de notas debe limpiarse para que solo queden las necesarias y con anclajes exactos.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La explicitud sexual se mantiene correctamente con «sus pechos». «Embriagado» refleja bien תִּשְׁגֶּה en este contexto. «Cabra montés» para יַעֲלָה es adecuado, con nota alternativa para «íbice».
  issues:
  - severity: medium
    issue: «cierva amante» es poco natural y algo ambiguo en español
    rationale: Aunque intenta reflejar «a loving doe», en español «amante» puede sugerir el agente que ama o incluso un amante extramarital, lo que enturbia el contexto. «Cierva amorosa» o «amable» preserva mejor el matiz atributivo y el tono poético-marital.
  - severity: medium
    issue: 'Marcación de nota defectuosa: «[ a]»'
    rationale: El marcador debe aparecer exactamente como `[a]` y no con espacio interno. La disciplina de salida exige coincidencia exacta entre texto y notas.
  - severity: low
    issue: Nota [b] sobre «con su amor» es innecesaria
    rationale: El POB inglés no preserva una nota aquí, y el español no crea una ambigüedad nueva que exija aclaración. Mantenerla sobrecarga el versículo sin necesidad.
  revised_spanish_text: una cierva amorosa, una cabra montés[a] encantadora; sus pechos te satisfagan en todo tiempo; con su amor estés siempre embriagado[b].
