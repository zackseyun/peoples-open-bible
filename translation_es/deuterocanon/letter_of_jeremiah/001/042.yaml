translation:
  language: es
  text: Y las mujeres[a], con cuerdas puestas alrededor de sí, se sientan en las calles[b], quemando salvado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiéndose puesto cuerdas alrededor de sí». El griego indica cuerdas colocadas alrededor de las mujeres, pero no explica aquí su significado simbólico.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, salvado usado para producir humo, como en una ofrenda; el griego no emplea aquí la palabra normal para «incienso».
    reason: cultural_note
lexical_decisions:
- source_word: περιθέμεναι
  english_pob_choice: with cords wrapped around themselves
  chosen_spanish: con cuerdas ceñidas alrededor de sí
  alternatives_spanish:
  - con cuerdas puestas alrededor de sí
  - con cuerdas envueltas alrededor de sí
  lexicon: LSJ
  rationale: El participio indica poner algo alrededor del propio cuerpo; en español, «ceñidas alrededor de sí» conserva el gesto reflexivo y corporal sin sonar tan mecánico como una traducción palabra por palabra.
- source_word: σχοινία
  english_pob_choice: cords
  chosen_spanish: cuerdas
  alternatives_spanish:
  - cordeles
  - sogas
  lexicon: LSJ
  rationale: σχοινία puede significar cuerdas o cordones. «Cuerdas» es el equivalente más natural y neutral en español, sin cargar el texto con el tamaño sugerido por «sogas».
- source_word: ἐν ταῖς ὁδοῖς
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en los caminos
  - por las calles
  lexicon: LSJ
  rationale: En este contexto público y urbano, «calles» comunica mejor que «caminos» la escena descrita por el griego.
- source_word: ἐγκάθηνται
  english_pob_choice: sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - están sentadas
  - se sientan y permanecen
  lexicon: LSJ
  rationale: El verbo expresa la postura de sentarse. «Se sientan» mantiene el valor descriptivo simple del original sin introducir duración o intención adicionales.
- source_word: θυμιῶσα
  english_pob_choice: burning
  chosen_spanish: quemando
  alternatives_spanish:
  - ofreciendo humo
  - haciendo humear
  lexicon: LSJ
  rationale: El verbo remite a hacer humo o quemar en un acto de tipo ritual. Dado que el objeto directo es salvado, «quemando» comunica con claridad la acción sin forzar «incienso» donde el griego no lo usa.
- source_word: τὰ πίτυρα
  english_pob_choice: bran
  chosen_spanish: salvado
  alternatives_spanish:
  - afrecho
  - cascarilla
  lexicon: LSJ
  rationale: πίτυρα significa salvado. «Salvado» es el equivalente directo en español y evita confundirlo con otro subproducto agrícola como la paja o la cáscara.
theological_decisions:
- issue: Sentido ritual de la acción femenina
  english_pob_reading: The verse is rendered as a straightforward description of women sitting publicly with cords around themselves while burning bran.
  chosen_spanish_reading: El versículo se traduce como una descripción directa de mujeres sentadas en público con cuerdas alrededor de sí mientras queman salvado.
  alternative_spanish_readings:
  - Las mujeres realizan un rito específico de carácter cultual o fértil.
  - Las mujeres están practicando un gesto simbólico no explicado en el texto.
  rationale: El griego describe las acciones visibles, pero no explica aquí su significado simbólico. La traducción española conserva esa misma reserva interpretativa para no importar una lectura más específica que la que permite el texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del texto fuente y con el juicio de alta concordancia: no se registran revisiones aplicadas y la lectura inglesa se mantiene descriptiva y prudente en lo ritual.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto.
  - 'Se prefiere el registro bíblico moderno y claro: «se sientan», «en las calles», «quemando salvado».'
  - Se conserva la ambigüedad del acto ritual sin añadir vocabulario de incienso que el griego no usa.
