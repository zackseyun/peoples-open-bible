translation:
  language: es
  text: No tendrás en tu casa una efa y una efa[a], una grande y una pequeña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una efa era una antigua medida hebrea de volumen para productos secos.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא יִהְיֶה
  english_pob_choice: You shall not have
  chosen_spanish: No tendrás
  alternatives_spanish:
  - No habrá para ti
  - No deberás tener
  lexicon: HALOT
  rationale: 'El hebreo usa una construcción negativa de existencia/posesión con לְךָ, que en español legal suena natural como prohibición directa: «No tendrás». Mantiene la fuerza normativa sin añadir más explicación de la que el texto da.'
- source_word: בְּבֵיתְךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu hogar
  - en tu casa-hogar
  lexicon: HALOT
  rationale: בַּיִת es literalmente «casa». Aquí se trata del lugar donde se guardan medidas, así que «casa» conserva el sentido concreto mejor que «hogar».
- source_word: אֵיפָה וְאֵיפָה
  english_pob_choice: an ephah and an ephah
  chosen_spanish: una efa y una efa
  alternatives_spanish:
  - dos efas
  - una medida y otra medida
  lexicon: HALOT
  rationale: Se conserva el nombre de la unidad de medida para no neutralizarla como «medida». La repetición refleja el duplicado deliberado del hebreo y su paralelo con la advertencia contra dobles estándares.
- source_word: גְּדוֹלָה וּקְטַנָּה
  english_pob_choice: a large and a small
  chosen_spanish: una grande y una pequeña
  alternatives_spanish:
  - una mayor y una menor
  - una grande y una chica
  lexicon: HALOT
  rationale: Los adjetivos concuerdan con «efa». «Grande» y «pequeña» reproducen la brevedad del hebreo y son claros en español; «mayor/menor» sería más interpretativo en este contexto de medidas.
translation_notes:
  revision_awareness: 'El texto inglés POB mantuvo «ephah» por fidelidad a la unidad de medida y añadió una nota cultural. La versión española conserva esa estrategia, con adaptación idiomática mínima: «No tendrás» por la construcción hebrea negativa de posesión y «en tu casa» por בְּבֵיתְךָ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el versículo lo requiere; aquí no aparece el nombre divino.
  - Se preserva la repetición de «una efa y una efa» para reflejar la duplicación enfática del hebreo.
  - «Casa» se usa en sentido literal de lugar doméstico/almacenamiento, no como «familia» o «hogar» abstracto.
