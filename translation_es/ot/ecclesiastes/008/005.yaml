translation:
  language: es
  text: El que guarda un mandamiento no conocerá cosa mala[a]; y un corazón sabio conoce el tiempo oportuno[b] y el juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosa mala» o «cosa dañina». La frase hebrea es literalmente «una cosa mala», y puede referirse ya sea al mal moral o, más probablemente aquí, a una consecuencia dañina o a una desgracia.
    reason: lexical_alternative
  - marker: b
    text: O «tiempo y juicio», es decir, el tiempo apropiado y la decisión o procedimiento correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹמֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - cumple
  - observa
  lexicon: HALOT
  rationale: El participio expresa a quien mantiene fielmente una norma. «Guarda» conserva la idea de observar/obedecer con naturalidad en español bíblico actual.
- source_word: מִצְוָה
  english_pob_choice: a command
  chosen_spanish: un mandamiento
  alternatives_spanish:
  - un mandato
  - un precepto
  lexicon: HALOT
  rationale: El singular hebreo es genérico. «Un mandamiento» mantiene esa generalidad y suena claro en español, sin forzar plural ni especificación.
- source_word: לֹא יֵדַע
  english_pob_choice: will not know
  chosen_spanish: no conocerá
  alternatives_spanish:
  - no sabrá
  - no experimentará
  lexicon: HALOT
  rationale: El imperfecto puede expresar consecuencia general. «No conocerá» conserva la construcción hebrea y permite la lectura de experiencia o encuentro con la consecuencia negativa.
- source_word: דָּבָר רָע
  english_pob_choice: an evil thing
  chosen_spanish: cosa mala
  alternatives_spanish:
  - cosa mala y/o dañina
  - mal
  lexicon: HALOT
  rationale: La expresión es literalmente «cosa mala/evil». En español, «cosa mala» mantiene la forma concreta sin decidir de antemano entre mal moral o daño/trouble; así se preserva la tensión semántica documentada en el texto fuente.
- source_word: וְעֵת
  english_pob_choice: the proper time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el tiempo oportuno
  - el momento adecuado
  lexicon: HALOT
  rationale: עֵת puede referirse al tiempo debido o apropiado. Dado que la frase se completa con «el juicio», «el tiempo» conserva la pareja semántica sin sobre-explicar; el matiz de oportunidad queda disponible por el contexto.
- source_word: וּמִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la decisión
  - el procedimiento
  - la justicia
  lexicon: HALOT
  rationale: «Juicio» conserva el rango de decisión/criterio/procedimiento y refleja la pareja tradicional con «tiempo» sin estrecharlo indebidamente.
- source_word: יֵדַע לֵב חָכָם
  english_pob_choice: a wise heart knows
  chosen_spanish: un corazón sabio conoce
  alternatives_spanish:
  - el corazón del sabio conoce
  - una persona sabia conoce
  lexicon: HALOT
  rationale: Se mantiene «corazón» como sede hebrea del discernimiento. «Un corazón sabio conoce» preserva la imagen antropológica sin convertirla en mera cognición moderna.
theological_decisions:
- issue: Idiomático-anthropological reading of לֵב חָכָם
  english_pob_reading: a wise heart
  chosen_spanish_reading: un corazón sabio
  alternative_spanish_readings:
  - el corazón del sabio
  - una persona sabia
  rationale: La decisión conserva la antropología bíblica del «corazón» como centro de discernimiento, en vez de sustituirla por una abstracción psicológica. No hay carga doctrinal controvertida, pero sí una imagen que conviene mantener.
  doctrine_reference: Translation philosophy §5, §6
- issue: Sentido de דָּבָר רָע
  english_pob_reading: an evil thing
  chosen_spanish_reading: cosa mala
  alternative_spanish_readings:
  - cosa mala y dañina
  - un mal
  rationale: El hebreo permite tanto mal moral como desgracia/daño. «Cosa mala» deja abierta esa tensión y evita resolverla demasiado rápido en una sola dirección.
  doctrine_reference: Translation philosophy §2, §3
- issue: Generic singular subject
  english_pob_reading: Whoever keeps a command
  chosen_spanish_reading: El que guarda un mandamiento
  alternative_spanish_readings:
  - Quien guarda un mandamiento
  - El que cumple un mandamiento
  rationale: El sujeto es genérico y masculino singular en forma, pero incluye a cualquier persona. «El que» es idiomático en español bíblico y mantiene la referencia representativa sin añadir género restrictivo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El inglés POB pasó de «harmful thing» a «evil thing» para acercarse más a רָע. En español se optó por «cosa mala» para conservar la ambigüedad semántica del hebreo entre mal moral y daño/trouble, sin perder la concreción del sustantivo.
  spanish_consistency_notes:
  - Se mantuvo «mandamiento» para מִצְוָה, coherente con un mandato singular genérico.
  - Se tradujo לֵב como «corazón» y no como «mente», para respetar la imaginería hebrea.
  - «Juicio» conserva la amplitud de מִשְׁפָּט y su enlace sapiencial con «tiempo».
  - No se usó «SEÑOR» ni otros términos de sustitución, pues el versículo no contiene el tetragrámaton.
