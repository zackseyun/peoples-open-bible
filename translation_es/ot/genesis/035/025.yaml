translation:
  language: es
  text: 'Y los hijos de Bila[a], la sierva de Raquel: Dan y Neftalí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la criada de Raquel». El término hebreo denota a una mujer de condición servil inferior; en algunos contextos puede implicar el sentido de esclava.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de ellos
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En un listado genealógico, בְנֵי se rinde naturalmente como «los hijos de»; «y» conserva la simple coordinación del hebreo sin añadir matiz narrativo. «Hijos» mantiene la relación genealógica directa que el contexto exige.
- source_word: בִלְהָה
  english_pob_choice: Bilhah
  chosen_spanish: Bila
  alternatives_spanish:
  - Bilhá
  - Bilhah
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio con transliteración española breve y legible. La forma «Bila» evita una grafía final innecesaria para la pronunciación en español, sin alterar la identificación del personaje.
- source_word: שִׁפְחַת
  english_pob_choice: female servant
  chosen_spanish: la sierva
  alternatives_spanish:
  - la criada
  - la sirvienta
  - la esclava
  lexicon: HALOT
  rationale: El término hebreo designa una mujer de baja condición servil. En español, «sierva» comunica ese vínculo de dependencia sin sonar tan arcaico como «sirvienta» ni cargar de manera excesiva con «esclava» en este contexto genealógico. Se preserva la referencia al estatus social que el inglés POB anotó.
- source_word: רָחֵל
  english_pob_choice: Rachel’s
  chosen_spanish: de Raquel
  alternatives_spanish:
  - de la familia de Raquel
  - de Rachel
  lexicon: Nombre propio transliterado
  rationale: La relación de pertenencia se expresa con el giro natural español «de Raquel», equivalente al constructo hebreo y al posesivo inglés.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dán
  lexicon: Nombre propio transliterado
  rationale: Nombre propio conservado sin cambio, como en el texto fuente.
- source_word: וְ/נַפְתָּלִי
  english_pob_choice: and Naphtali
  chosen_spanish: y Neftalí
  alternatives_spanish:
  - y Naftalí
  - y Naphtalí
  lexicon: Nombre propio transliterado
  rationale: Se conserva la coordinación y se adapta el nombre a una forma española clara y ampliamente reconocible. «Neftalí» refleja la pronunciación usual en español bíblico sin depender de la ortografía inglesa.
translation_notes:
  revision_awareness: 'El texto hebreo y el audio de control en inglés muestran alta concordancia; no se requieren correcciones textuales. La única decisión relevante es lexical: cómo verter שִׁפְחַת en un español natural sin perder su matiz social.'
  spanish_consistency_notes:
  - 'Se mantuvo la estructura genealógica breve del original: coordinador + filiación + aposición + nombres.'
  - Se evitó «SEÑOR» o cualquier sustitución teológica porque no aparece un nombre divino en el versículo.
  - La nota conserva la tensión léxica entre «sierva», «sirvienta» y «esclava» sin imponer una sola opción como absoluta.
