    text: 'O: «la tribu de los danitas».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no le había caído heredad», un modismo que se refiere a la asignación de tierra tribal.'
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las expresiones relevantes del texto fuente y del audit trail inglés. También se reemplazó la nota sobre 'una heredad' por la explicación del modismo completo 'no le había caído heredad', que es el punto lexical significativo preservado en la evidencia inglesa. El texto base se mantiene sustancialmente igual porque es fiel y legible.
