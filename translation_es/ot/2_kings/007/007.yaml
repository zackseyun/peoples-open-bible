review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: se levantaron, huyeron al crepúsculo/anochecer, dejaron tiendas, caballos y asnos, dejaron el campamento tal como estaba, y huyeron para preservar la vida. También conserva correctamente la repetición de נוּס con «huyeron ... huyeron». Sin embargo, hay un ajuste importante de concordancia semántica: אֶל נַפְשָׁם es plural («sus vidas»), por lo que «para salvar su vida» debilita el referente distributivo/plural presente en hebreo y en el inglés POB.'
  spanish_quality_summary: 'El español es mayormente natural y legible, pero la puntuación actual («sus caballos[c][b], sus asnos: el campamento tal como estaba;») resulta algo trabada y coloca las notas de forma confusa. Conviene reubicar las notas para que [b] ancle en «el campamento tal como estaba» y [c] en la cláusula idiomática final. También es preferible una puntuación más limpia con raya o comas en vez de dos puntos y punto y coma.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «al anochecer», «dejaron», «tiendas», «caballos», «asnos», «el campamento tal como estaba». La única corrección necesaria es llevar el idiomático final a plural: «por sus vidas» o «para salvar sus vidas».'
  issues:
  - severity: medium
    issue: «para salvar su vida» usa singular donde el hebreo tiene sufijo plural en אֶל נַפְשָׁם
    rationale: Aunque el español a veces usa singular colectivo, aquí el original y el POB inglés expresan plural/distributivo («for their lives»). «Para salvar sus vidas» o «por sus vidas» preserva mejor el sentido.
  - severity: medium
    issue: Anclaje de notas [b] y [c] mal ubicado en el texto
    rationale: La nota [b] explica «el campamento tal como estaba», pero aparece junto a «sus caballos». La nota [c] explica la expresión idiomática final, no «sus caballos». Las notas deben anclarse donde corresponde.
  - severity: low
    issue: Puntuación poco natural con dos puntos y punto y coma
    rationale: 'La secuencia «sus asnos: el campamento tal como estaba;» suena forzada en español. Una raya parentética o comas mejoran la legibilidad sin alterar el sentido.'
  revised_spanish_text: Así que se levantaron y huyeron al anochecer[a], y dejaron sus tiendas, sus caballos y sus asnos, el campamento tal como estaba[b], y huyeron para salvar sus vidas[c].
  revised_footnotes:
