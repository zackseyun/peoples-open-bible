translation:
  language: es
  text: Así que volví mi rostro hacia el Señor Dios[a], para buscar con oración y súplicas[b], con ayuno, cilicio y cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «puse mi rostro hacia el Señor Dios». El hebreo dice más literalmente «di/puse mi rostro a».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ruegos». El hebreo también puede expresarse con un término más tradicional como «súplicas» para peticiones urgentes y humildes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  english_pob_choice: I turned
  chosen_spanish: volví
  alternatives_spanish:
  - dirigí
  - puse
  - volví mi rostro hacia
  lexicon: HALOT
  rationale: La forma hebrea expresa el giro intencional de la persona hacia Dios. «Volví» comunica de manera natural ese movimiento deliberado, manteniendo la fuerza idiomática sin perder la imagen corporal del texto.
- source_word: אֶת פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi atención
  - a mí mismo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «Rostro» es digno y fiel en español bíblico, y puede sostener la carga idiomática de una orientación deliberada hacia Dios.
- source_word: אֶל אֲדֹנָי הָאֱלֹהִים
  english_pob_choice: to the Lord God
  chosen_spanish: al Señor Dios
  alternatives_spanish:
  - al Señor, Dios
  - al Señor, el Dios
  - al Señor Jehová
  lexicon: HALOT
  rationale: El hebreo une el título reverencial אֲדֹנָי con הָאֱלֹהִים. En español, «Señor Dios» reproduce con claridad ambos títulos sin introducir el nombre divino donde el texto no lo tiene.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek prayer
  chosen_spanish: para buscar
  alternatives_spanish:
  - para pedir
  - para procurar
  - para buscar oración
  lexicon: HALOT
  rationale: El infinitivo marca finalidad. «Para buscar» preserva esa dirección de propósito. Aquí el objeto implícito de la búsqueda no se explicita en español, siguiendo la revisión inglesa que eliminó añadidos no explícitos.
- source_word: תְּפִלָּה
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - oración de súplica
  lexicon: HALOT
  rationale: El término básico es oración. «Oración» es claro, bíblico y suficientemente amplio para el término general que aparece antes de la expresión más intensa siguiente.
- source_word: וְתַחֲנוּנִים
  english_pob_choice: pleas for mercy
  chosen_spanish: súplicas
  alternatives_spanish:
  - ruegos
  - plegarias de misericordia
  - peticiones de misericordia
  lexicon: HALOT
  rationale: El sustantivo denota peticiones urgentes y humildes. «Súplicas» conserva esa fuerza y permite mantener el contraste con la «oración» general anterior. Aunque el inglés optó por explicitar «mercy», el hebreo no la nombra de forma directa aquí.
- source_word: בְּצוֹם
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - en ayuno
  - ayunando
  lexicon: HALOT
  rationale: La preposición expresa circunstancia acompañante. «Con ayuno» es natural y preciso en español.
- source_word: וְשַׂק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco
  - tela burda
  - saco de penitencia
  lexicon: HALOT
  rationale: En español bíblico, «cilicio» transmite el atuendo de aflicción y penitencia asociado al hebreo. Aunque «sackcloth» podría renderizarse más literalmente como «tela áspera» o «saco», «cilicio» es el término tradicional y comprensible en contexto religioso.
- source_word: וָאֵפֶר
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo de ceniza
  lexicon: HALOT
  rationale: El singular colectivo «ceniza» funciona bien en español como sustancia/símbolo de humillación y duelo. También sería posible «cenizas», pero «ceniza» suena más natural junto con los otros signos de penitencia.
theological_decisions:
- issue: Tratamiento del título divino אֲדֹנָי הָאֱלֹהִים
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - el Señor, Dios
  - el Señor, el Dios
  - Señor Dios
  rationale: Se conserva la reverencia del doble título sin sustituirlo por una convención de enmascaramiento como «SEÑOR». El texto hebreo no usa YHWH aquí, sino אֲדֹנָי unido a הָאֱלֹהִים, por lo que «Señor Dios» es la equivalencia directa y transparente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος/Kyrios → Señor; יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó un objeto implícito («him») y ajustó la estructura para reflejar mejor el hebreo. Por eso la versión española evita añadir un objeto explícito a «buscar» y mantiene una construcción de finalidad simple: «para buscar oración y súplicas».'
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי y «Dios» para הָאֱלֹהִים, evitando «SEÑOR» porque aquí no aparece YHWH.
  - Se usa «oración» para תְּפִלָּה y «súplicas» para תַחֲנוּנִים, preservando la distinción entre la petición general y la insistencia humilde.
  - «Cilicio» y «ceniza» conservan el lenguaje ritual de duelo y penitencia en un español eclesial amplio.
