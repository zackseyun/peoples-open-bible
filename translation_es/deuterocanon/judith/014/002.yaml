revisions:
- from: Y sucederá que, cuando despunte el alba y salga el sol sobre la tierra, cada uno de ustedes tomará sus armas de guerra, y todo hombre fuerte saldrá fuera de la ciudad. Ustedes les pondrán un jefe[a], como si bajaran al llano contra la avanzada de los hijos de Assur[b]; pero no bajarán.
  to: Y sucederá que, cuando despunte el alba y salga el sol sobre la tierra, cada uno de ustedes tome sus armas de guerra, y todo hombre poderoso salga fuera de la ciudad. Ustedes nombrarán un jefe[a] sobre ellos, como si bajaran al llano contra la avanzada de los hijos de Assur[b]; pero no bajarán.
  rationale: Se ajustó la sintaxis para que el español refleje con más naturalidad la instrucción distributiva del griego y mantenga mejor la coherencia con el resto de los verbos. Se reemplazó «les pondrán un jefe» por «nombrarán un jefe sobre ellos» para representar con mayor precisión ἀρχηγός y δώσετε. También se elevó «hombre fuerte» a «hombre poderoso» para alinearse mejor con la revisión auditada en inglés («mighty man») y conservar un tono más formal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:10:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: marco temporal al amanecer, preparación militar, salida de los hombres capaces, nombramiento de un jefe y movimiento fingido hacia la avanzada asiria sin llegar a bajar realmente. Sin embargo, hay dos desajustes de forma/sentido que conviene corregir: «cada uno de ustedes tomará» no concuerda bien con el futuro plural griego/inglés y se expresa mejor como mandato distributivo plural («cada uno de ustedes tome» o «tomarán cada uno»), y «Ustedes les pondrán un jefe» suena menos preciso que «nombrarán/designarán un jefe sobre ellos».'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión militar. «Todo hombre fuerte» es aceptable, aunque «todo hombre poderoso» refleja mejor el matiz formal de 'mighty man' sin perder literalidad. «Les pondrán un jefe» es comprensible, pero más idiomático y exacto es «nombrarán un jefe sobre ellos». También conviene mantener coherencia verbal en segunda persona plural a lo largo del versículo.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preservación de «los hijos de Assur», que está bien mantenida y correctamente explicada en nota. La opción «avanzada» para προφυλακή es adecuada; la nota alternativa sobre ἀρχηγός puede mantenerse, aunque el texto principal debe usar una formulación más precisa que «poner un jefe».
  issues:
  - severity: medium
    issue: Incongruencia y torpeza en «cada uno de ustedes tomará»
    rationale: El griego ἀναλήμψεσθε es futuro plural dirigido al grupo. Aunque «cada uno» expresa bien ἕκαστος, en español «cada uno de ustedes tomará» dentro de una cadena de futuros plurales rompe la cohesión. «Tomarán cada uno» o mejor un subjuntivo exhortativo tras «cuando» («cada uno de ustedes tome») fluye mejor y conserva el valor distributivo.
  - severity: medium
    issue: «Les pondrán un jefe» es menos exacto para δώσετε ἀρχηγὸν εἰς αὐτούς
    rationale: δώσετε ἀρχηγόν expresa designar/nombrar/poner al frente. En español bíblico legible, «nombrarán un jefe sobre ellos» o «designarán un jefe para ellos» refleja mejor el acto de nombramiento y la relación de autoridad.
  - severity: low
    issue: «Todo hombre fuerte» podría elevarse a «todo hombre poderoso»
    rationale: La revisión inglesa fijó «every mighty man». «Fuerte» no es erróneo, pero «poderoso» o «vigoroso» da un tono más formal y militar. Es mejora estilística, no corrección indispensable.
  revised_spanish_text: Y sucederá que, cuando despunte el alba y salga el sol sobre la tierra, cada uno de ustedes tome sus armas de guerra, y todo hombre poderoso salga fuera de la ciudad. Ustedes nombrarán un jefe[a] sobre ellos, como si bajaran al llano contra la avanzada de los hijos de Assur[b]; pero no bajarán.
  revised_footnotes:
