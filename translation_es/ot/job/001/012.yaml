translation:
  language: es
  text: 'Yahvé dijo al Acusador[a]: «Mira, todo lo que tiene está en tu mano; solo contra él no extiendas tu mano». Entonces el Acusador salió de la presencia de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Satanás» o «el adversario». El hebreo lleva artículo, lo que sugiere un título o función.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en una forma reconocible y sobria para el español, en línea con la decisión del POB inglés de no sustituirlo por un título. "Yahvé" mantiene la referencia al nombre propio revelado a Israel.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - el Satanás
  - el adversario
  lexicon: HALOT
  rationale: El artículo hebreo sugiere un título o función, no necesariamente un nombre propio. "Acusador" conserva el sentido forense del contexto y sigue de cerca la opción inglesa sin importar una identificación posterior más fuerte de la que exige el texto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: Es una partícula discursiva de énfasis. "Mira" transmite la fuerza de atención inmediata con español natural, evitando un arcaísmo innecesario.
- source_word: כָל אֲשֶׁר לוֹ
  english_pob_choice: all that he has
  chosen_spanish: todo lo que tiene
  alternatives_spanish:
  - todo lo que le pertenece
  - todo cuanto es suyo
  lexicon: HALOT
  rationale: La frase totalizadora se expresa de manera natural en español sin perder su alcance. "Tiene" comunica posesión amplia y evita sobrecargar el verso.
- source_word: בְּיָדֶךָ
  english_pob_choice: is in your hand
  chosen_spanish: está en tu mano
  alternatives_spanish:
  - está bajo tu poder
  - está bajo tu control
  lexicon: HALOT
  rationale: Se retiene la imagen de "mano" para conservar el hebraísmo y el contraste repetido con la siguiente prohibición. La metáfora de control queda clara en español.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - excepto
  lexicon: HALOT
  rationale: Marca la única restricción concedida al Acusador. "Solo" es breve, natural y conserva el valor limitativo.
- source_word: אֵלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - hacia él
  lexicon: HALOT
  rationale: En combinación con "extiendas tu mano", la preposición expresa acción hostil dirigida a Job. "Contra él" hace explícita esa fuerza sin suavizarla.
- source_word: אַל תִּשְׁלַח יָדֶךָ
  english_pob_choice: do not stretch out your hand
  chosen_spanish: no extiendas tu mano
  alternatives_spanish:
  - no pongas tu mano sobre él
  - no alargues tu mano
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de la "mano" para mantener la repetición intencional y el paralelismo del verso. "Extiendas" suena natural en español y sigue el valor idiomático del verbo.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: Verbo narrativo simple y directo, adecuado para el movimiento en la escena. "Salió" mantiene la inmediatez del hebreo.
- source_word: מֵעִם פְּנֵי יְהוָה
  english_pob_choice: from the presence of Yahweh
  chosen_spanish: de la presencia de Yahvé
  alternatives_spanish:
  - de delante de Yahvé
  - de ante el rostro de Yahvé
  lexicon: HALOT
  rationale: Se vierte el modismo con una expresión natural en español que conserva la escena de la corte celestial. "Presencia" comunica bien la relación espacial y reverencial del hebreo.
theological_decisions:
- issue: Cómo traducir הַשָּׂטָן en el prólogo de Job
  english_pob_reading: the Accuser, with the article indicating a title or role
  chosen_spanish_reading: el Acusador, con artículo que sugiere título o función
  alternative_spanish_readings:
  - Satanás
  - el adversario
  - el Satanás
  rationale: 'Se preserva la tensión textual: el hebreo lleva artículo, por lo que la lectura natural es la de un cargo o papel dentro de la escena, no necesariamente un nombre propio fijo. "Acusador" conserva el matiz judicial que domina el contexto y evita resolver la cuestión más allá de lo que el texto exige.'
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa; no imponer una identificación teológica posterior al nivel de traducción.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustanciales; el acuerdo de auditoría es alto y no se registraron objeciones en las pasadas de revisión. La redacción española mantiene las decisiones léxicas y teológicas del POB inglés sin mecanizar desde él.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene la repetición de «mano» en ambas cláusulas para reflejar el juego lexical del hebreo.
  - «Acusador» se usa de forma consistente con la función judicial sugerida por el artículo hebreo.
  - La puntuación reproduce la división directa del discurso y la salida narrativa final en un registro bíblico claro y moderno.
