revisions:
- from: Todos los prosperados[a] de la tierra comerán y se postrarán; delante de él se inclinarán todos los que bajan al polvo[b] —incluso él, cuya vida no logró mantenerse[c].
  to: Todos los prósperos[a] de la tierra comerán y se postrarán; delante de él se arrodillarán todos los que bajan al polvo[b], incluso él que no pudo conservarse con vida[c].
  rationale: 'Se hicieron tres ajustes menores pero necesarios: (1) «los prósperos» reemplaza el poco natural «los prosperados»; (2) «se arrodillarán» preserva la distinción verbal entre השתחוה y כרע; (3) la cláusula final se reformuló en español más claro y fiel a la lectura adoptada por el POB, sin resolver en exceso la dificultad del hebreo.'
