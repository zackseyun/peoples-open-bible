translation:
  language: es
  text: 'Y se le informó a Salomón, diciendo: «Mira, Adonías teme al rey Salomón, y mira, se ha aferrado a los cuernos del altar[a], diciendo: “Que el rey Salomón me jure hoy que no matará a su siervo con la espada”[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aferrarse a los cuernos del altar era una apelación de refugio o de misericordia ante el altar.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «si mata a su siervo con la espada», una fórmula de juramento que expresa la petición de que Salomón jure no ejecutarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le dijo
  - le fue comunicado
  lexicon: HALOT
  rationale: La pasiva impersonal preserva el hecho de que la noticia llega a Salomón sin destacar al mensajero. «Informó» comunica bien el valor de reporte del verbo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - con estas palabras
  lexicon: HALOT
  rationale: Mantiene la construcción quotativa directa del hebreo y el flujo del discurso reportado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: «Mira» conserva la función deíctica de llamar la atención con un español vivo; «He aquí» sería más formal pero más arcaizante.
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonías
  lexicon: Nombre propio
  rationale: Se translitera con la forma habitual en español bíblico, sin añadir glosa.
- source_word: יָרֵא
  english_pob_choice: fears
  chosen_spanish: teme
  alternatives_spanish:
  - está asustado de
  - tiene miedo de
  lexicon: HALOT
  rationale: «Teme» preserva el valor directo del verbo y funciona con naturalidad en español.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Salomón el rey
  - el rey, Salomón
  lexicon: HALOT
  rationale: La apposición de título y nombre se vierte con el orden natural del español.
- source_word: אָחַז בְּקַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: has taken hold of the horns of the altar
  chosen_spanish: ha echado mano de los cuernos del altar
  alternatives_spanish:
  - ha tomado los cuernos del altar
  - se ha aferrado a los cuernos del altar
  lexicon: HALOT
  rationale: «Echado mano de» es idiomático y conserva la acción concreta; «cuernos del altar» mantiene la imagen cultual sin explicarla en exceso.
- source_word: יִשָּׁבַע לִי
  english_pob_choice: Let ... swear to me
  chosen_spanish: Que ... me jure
  alternatives_spanish:
  - Que ... me haga juramento
  - Que ... me preste juramento
  lexicon: HALOT
  rationale: El jussivo se expresa de modo natural con una subordinada exhortativa en español. «Jure» retiene la fuerza de obligación solicitada.
- source_word: כַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalente temporal directo y claro.
- source_word: אִם יָמִית אֶת עַבְדּוֹ בֶּחָרֶב
  english_pob_choice: that he will not put his servant to death with the sword
  chosen_spanish: que no matará a su siervo con la espada
  alternatives_spanish:
  - que no dará muerte a su siervo con la espada
  - que no ejecutará a su siervo a espada
  lexicon: HALOT
  rationale: La cláusula juramentaria hebrea se vuelve una promesa negativa natural en español, como en la auditoría inglesa; «siervo» se conserva porque aquí es la autodenominación deferente de Adonías ante el rey.
theological_decisions:
- issue: Sentido de la toma de los cuernos del altar como apelación de refugio o clemencia
  english_pob_reading: Taking hold of the horns of the altar was an appeal for sanctuary or mercy at the altar.
  chosen_spanish_reading: Ha echado mano de los cuernos del altar como apelación de refugio o clemencia.
  alternative_spanish_readings:
  - como pedido de asilo en el altar
  - como súplica de misericordia junto al altar
  rationale: El texto no explica el rito, pero el contexto narrativo exige conservar la carga cultual y jurídica de la acción sin borrarla. La frase española deja abierta la misma tensión interpretativa que la nota inglesa.
  doctrine_reference: 1 Reyes 2:28-34; Éxodo 21:13-14
- issue: Fórmula juramentaria negativa con אִם
  english_pob_reading: that he will not put his servant to death with the sword
  chosen_spanish_reading: que no matará a su siervo con la espada
  alternative_spanish_readings:
  - si mata a su siervo con la espada
  - que no lo mate a espada
  rationale: La partícula hebrea puede reflejar una fórmula de juramento que, en contexto, expresa la petición de no ejecución. El español opta por la lectura explícita y natural, manteniendo la tensión señalada por la auditoría inglesa.
  doctrine_reference: HALOT s.v. אִם; cf. fórmulas juramentarias en contextos de petición
translation_notes:
  revision_awareness: La auditoría inglesa mantuvo «Behold» por registro más formal y conservó la explicación del giro juramentario con una nota textual; esta versión española sigue esa decisión, pero evita un calco rígido donde el español pide una solución más natural. También conserva la imagen cultual de los cuernos del altar y la cláusula negativa como promesa juramentaria, sin suavizar la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Siervo» se mantiene para עַבְדּוֹ por la autodesignación deferente de Adonías, no como equivalencia general de δοῦλος.
  - «Cuernos del altar» se conserva de forma literal por tratarse de una imagen cultual estable y auditable.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
