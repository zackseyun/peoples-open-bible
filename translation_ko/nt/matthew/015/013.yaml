  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Πᾶσα φυτεία ἣν οὐκ ἐφύτευσεν ὁ πατήρ μου ὁ οὐράνιος ἐκριζωθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/013.yaml
  text: 'But he answered and said[a], "Every plant that my heavenly Father did not plant will be uprooted."'
translation:
  language: ko
  text: '그러나 그가 대답하여 말씀하셨습니다. 「하늘에 계신 내 아버지께서 심으시지 않은 모든 식물은 뽑힐 것이다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φυτεία
  english_pob_choice: plant
  chosen_korean: 식물
  alternatives_korean:
  - 심긴 것
  lexicon: BDAG
  rationale: 식물 일반 또는 심긴 것 자체. 「식물」이 자연스럽고 비유의 농업적 그림을 살린다.
- source_word: ὁ πατήρ μου ὁ οὐράνιος
  english_pob_choice: my heavenly Father
  chosen_korean: 하늘에 계신 내 아버지
  alternatives_korean:
  - 내 하늘 아버지
  lexicon: BDAG
  rationale: 마태 특유의 정형 표현. 「하늘에 계신」 관형절이 한국어에서 가장 자연스럽다.
- source_word: ἐκριζωθήσεται
  english_pob_choice: will be uprooted
  chosen_korean: 뽑힐 것이다
  lexicon: BDAG
  rationale: ἐκριζόω는 「뿌리째 뽑다」. 「뽑히다」가 한국어에서 수동·미래의 자연스러운 형태이다.
