review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo y preserva adecuadamente la fórmula profética, el lamento y la tríada de juicio. Sin embargo, dos puntos importantes requieren corrección: (1) וּרְקַע בְּרַגְלְךָ significa ‘golpea/estampa con tu pie’ o idiomáticamente ‘golpea el suelo con tu pie / patea con fuerza’, no ‘golpea tu pie’, que en español sugiere pegarle al propio pie; (2) faltan en español las notas que el rastro inglés preservó para אָח y para la alternativa de אֶל כָּל תּוֹעֲבוֹת רָעוֹת. También conviene mejorar ‘abominaciones malas’, que suena poco natural en español, sin perder la fuerza de רָעוֹת.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero ‘golpea tu pie’ no es español natural para esta acción gestual profética. ‘Abominaciones malas’ es comprensible pero rígido; ‘malvadas abominaciones’ o ‘abominaciones malvadas’ suena mejor. La puntuación y el registro general son adecuados.
  glossary_alignment: ‘Yahvé’ respeta la política del proyecto para יהוה. ‘Casa de Israel’, ‘espada’, ‘hambre’ y ‘peste’ están bien alineados. No hay conflicto doctrinal serio. La única tensión léxica relevante es que el inglés documenta ‘stamp your foot’, y el español debe reflejar esa idea gestual con naturalidad.
  issues:
  - severity: high
    issue: ‘golpea tu pie’ traduce de forma inadecuada וּרְקַע בְּרַגְלְךָ
    rationale: El hebreo describe una acción enfática con el pie, equivalente a ‘golpea el suelo con tu pie’, ‘da un pisotón’ o ‘patea con fuerza’; ‘golpea tu pie’ en español implica pegarle al pie mismo y distorsiona el sentido.
  - severity: medium
    issue: Faltan dos notas presentes en la auditoría inglesa
    rationale: El inglés conserva una nota para אָח (‘¡Ay!’ / ‘¡Ah!’) y otra para la posibilidad de entender אֶל כָּל... como ‘sobre todas...’. El español debería preservarlas porque siguen siendo significativas y no quedan absorbidas por la redacción.
  - severity: medium
    issue: ‘abominaciones malas’ suena poco idiomático
    rationale: Aunque formalmente cercano al hebreo, en español resulta tieso. ‘malvadas abominaciones’ conserva el énfasis moral y cultual sin sonar torpe.
