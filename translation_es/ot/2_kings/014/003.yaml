  text: וַ/יַּ֤עַשׂ הַ/יָּשָׁר֙ בְּ/עֵינֵ֣י יְהוָ֔ה רַ֕ק לֹ֖א כְּ/דָוִ֣ד אָבִ֑י/ו כְּ/כֹ֧ל אֲשֶׁר עָשָׂ֛ה יוֹאָ֥שׁ אָבִ֖י/ו עָשָֽׂה־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/003.yaml
  text: He did what was right in the eyes of Yahweh[a], yet not like David his father[c][b]; he did according to all that Joash his father had done.
  footnotes:
  - marker: a
    text: '''David his father'' uses ''father'' in the dynastic sense of ancestor, not necessarily immediate parentage.'
    reason: cultural_note
  - marker: b
    text: Or 'only, not like David his father.' The Hebrew רַק can be rendered 'only' to introduce the qualification.
    reason: lexical_alternative
  - marker: c
    text: Joash is also spelled Jehoash in English translations.
    reason: lexical_alternative
