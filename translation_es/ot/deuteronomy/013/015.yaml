review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia legal de investigación intensificada (דרש / חקר / שאל היטב) y la fórmula de verificación final. También mantiene adecuadamente «abominación» para תועבה y el sentido comunitario de בְּקִרְבְּךָ. Sin embargo, la cláusula «si es verdad y está confirmado que...» suena algo truncada en español porque omite un sujeto explícito para «está confirmado», donde el hebreo incluye הַדָּבָר, ‘el asunto/la cosa’.
  spanish_quality_summary: El español es generalmente claro y digno, pero «ha sido hecha» resulta poco natural con «abominación» en español bíblico-jurídico; «se ha cometido» comunica mejor el hecho realizado sin perder el sentido. Además, conviene ajustar la construcción de verificación a «si es verdad y es cierto el asunto» o similar; la opción más natural aquí es explicitar «el asunto».
  glossary_alignment: No hay conflictos con la terminología global del proyecto. «Abominación» está bien alineado. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección «escudriñarás» es aceptable aunque más elevada; «preguntarás con diligencia» también funciona, pero el punto principal a corregir es la fórmula judicial y la naturalidad de «ha sido hecha».
  issues:
  - severity: medium
    issue: La fórmula «si es verdad y está confirmado» deja implícito el referente de «confirmado».
    rationale: El hebreo incluye הַדָּבָר, ‘el asunto/la cosa’, dentro de la fórmula confirmatoria. En español, omitirlo hace la frase menos natural y ligeramente menos precisa jurídicamente.
  - severity: medium
    issue: «ha sido hecha» suena forzado con «abominación».
    rationale: Aunque refleja literalmente נֶעֶשְׂתָה, en español bíblico y jurídico «se ha cometido» es más idiomático para un acto abominable y preserva bien el sentido de un hecho consumado.
  - severity: low
    issue: La nota [b] no corresponde exactamente a la mejor solución del texto principal revisado.
    rationale: Si se explicita «el asunto» en el texto principal, la nota alternativa debe mantenerse solo como alternativa real distinta, no como reparación de una omisión del cuerpo del texto.
  revised_spanish_text: y investigarás[a], y escudriñarás, y preguntarás con diligencia; y he aquí, si es verdad y es cierto el asunto[b] que esta abominación se ha cometido en medio de ti,
