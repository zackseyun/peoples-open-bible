translation:
  language: es
  text: Y los oficiales se enfurecieron contra Jeremías[a], y lo golpearon y lo pusieron en la casa de confinamiento, en la casa de Jehonatán el escriba[b], porque la habían hecho una prisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los príncipes se enfurecieron contra Jeremías».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «casa de confinamiento»; es decir, un edificio usado como prisión en la casa de Jehonatán el escriba.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְצְפוּ
  english_pob_choice: were enraged
  chosen_spanish: se enojaron
  alternatives_spanish:
  - se enfurecieron
  - se indignaron
  lexicon: HALOT
  rationale: קצף expresa enojo fuerte o indignación. En español, «se enojaron» comunica bien la reacción hostil sin sonar artificial; «se enfurecieron» sería más intenso y «se indignaron» algo más formal.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  - los gobernantes
  lexicon: HALOT
  rationale: En el contexto de corte, שָׂרִים puede referirse a funcionarios de gobierno. «Oficiales» conserva esa referencia institucional sin sugerir necesariamente hijos reales, como haría «príncipes».
- source_word: וְהִכּוּ אֹתוֹ
  english_pob_choice: and they beat him
  chosen_spanish: lo golpearon
  alternatives_spanish:
  - lo hirieron
  - lo pegaron
  lexicon: HALOT
  rationale: נכה puede significar golpear o azotar. «Lo golpearon» mantiene la fuerza física del acto y es natural en español; «lo pegaron» es menos digno, y «lo hirieron» introduce una lesión no explicitada.
- source_word: וְנָתְנוּ אֹתוֹ
  english_pob_choice: and put him
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo colocaron
  - lo encerraron
  lexicon: HALOT
  rationale: נתן aquí funciona como verbo simple de colocar/poner. «Lo pusieron» sigue de cerca la acción básica antes de especificar el lugar; «lo encerraron» ya interpreta la consecuencia.
- source_word: בֵּית הָאֵסוּר
  english_pob_choice: the prison house
  chosen_spanish: la casa del encarcelamiento
  alternatives_spanish:
  - la casa de la prisión
  - la casa de confinamiento
  - la prisión
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de confinamiento». «Casa del encarcelamiento» conserva la metáfora constructiva del original mejor que reducirla a «la prisión».
- source_word: בֵּית יְהוֹנָתָן הַסֹּפֵר
  english_pob_choice: the house of Jehonathan the scribe
  chosen_spanish: la casa de Jehonatán el escriba
  alternatives_spanish:
  - la casa de Jonatán el escriba
  - la casa de Jehonatán, el secretario
  lexicon: HALOT
  rationale: Se translitera el nombre en su forma hebrea, Jehonatán, y se conserva «escriba» para סֹפֵר, que es la equivalencia más cercana y tradicionalmente reconocible.
- source_word: כִּי אֹת֥וֹ עָשׂ֖וּ לְבֵית הַכֶּלֶא
  english_pob_choice: for they had made it a prison
  chosen_spanish: porque de ella habían hecho una prisión
  alternatives_spanish:
  - porque la habían hecho una prisión
  - porque la habían convertido en una prisión
  - pues la habían hecho cárcel
  lexicon: HALOT
  rationale: עָשׂוּ לְבֵית expresa «hacer algo una cosa», es decir, convertir una casa en prisión. «De ella habían hecho una prisión» retiene el antecedente femenino de «casa» y evita añadir interpretaciones más fuertes que el hebreo.
theological_decisions:
- issue: How to render the Hebrew building metaphors for imprisonment without flattening them into a generic noun
  english_pob_reading: Hebrew 'house of confinement'; that is, a prison building in the house of Jehonathan the scribe.
  chosen_spanish_reading: «la casa del encarcelamiento ... porque de ella habían hecho una prisión»
  alternative_spanish_readings:
  - «la prisión ... porque la habían hecho una prisión»
  - «la casa de confinamiento ... porque la habían convertido en prisión»
  rationale: 'El hebreo presenta dos imágenes: un lugar-contenedor («casa del encarcelamiento») y la explicación de que ese edificio fue usado como prisión. Mantener ambas evita borrar la concreción del texto y conserva la tensión entre lugar doméstico y lugar carcelario.'
  doctrine_reference: No aplica; decisión léxico-metafórica sin implicación doctrinal.
translation_notes:
  revision_awareness: La redacción sigue el estado final del texto inglés auditado, especialmente la clausula explicativa directa «they had made it a prison», sin añadir el interpretivo «into». También conserva la opción lexical de intensidad para קצף y el matiz concreto de בֵּית הָאֵסוּר.
  spanish_consistency_notes:
  - «oficiales» se mantiene para שָׂרִים, coherente con el contexto de gobierno.
  - «Jehonatán» conserva la transliteración hebrea documentada en el audit trail.
  - «casa del encarcelamiento» preserva el valor imagístico de בֵּית הָאֵסוּר sin reemplazarlo por una abstracción totalmente distinta.
