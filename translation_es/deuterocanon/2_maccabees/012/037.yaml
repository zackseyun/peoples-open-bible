translation:
  language: es
  text: Iniciando el grito de batalla en la lengua de sus padres[a], con himnos, sacudió por sorpresa a los que estaban con Gorgias y los puso en fuga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la lengua ancestral». La frase griega puede enfatizar tanto la lengua usada como el carácter ancestral del grito.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hizo una derrota de ellos» o «causó su retirada». La expresión griega describe una derrota que termina en huida.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταρξάμενος
  english_pob_choice: Beginning
  chosen_spanish: Iniciando
  alternatives_spanish:
  - Comenzando
  - Iniciando
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción iniciadora de Judas. «Iniciando» conserva el carácter de arranque inmediato y suena natural en español sin perder la relación participial con la acción principal.
- source_word: τῇ πατρίῳ φωνῇ
  english_pob_choice: in the language of his fathers
  chosen_spanish: en la lengua de sus padres
  alternatives_spanish:
  - en la lengua ancestral
  - con la voz de sus padres
  lexicon: LSJ
  rationale: φωνή puede referir voz, habla o lengua; aquí el contexto favorece la lengua usada para el grito. «La lengua de sus padres» mantiene el matiz ancestral/paternal que documenta la traducción inglesa y evita una paráfrasis excesiva.
- source_word: τὴν μεθʼ ὕμνων κραυγήν
  english_pob_choice: the battle cry ... with hymns
  chosen_spanish: el grito de batalla ... con himnos
  alternatives_spanish:
  - el grito con himnos
  - la aclamación con himnos
  lexicon: LSJ
  rationale: κραυγή es un grito o alarido fuerte; en contexto militar, «grito de batalla» expresa bien la fuerza bélica. «Con himnos» preserva el elemento litúrgico/religioso sin suavizarlo.
- source_word: ἐνσείσας
  english_pob_choice: he shook
  chosen_spanish: los sacudió
  alternatives_spanish:
  - los conmovió
  - los trastornó
  lexicon: LSJ
  rationale: El verbo significa literalmente «sacudir» y, en este contexto, apunta al desorden repentino causado al enemigo. «Los sacudió» conserva la imagen y admite el sentido de desconcierto.
- source_word: ἀπροσδοκήτως
  english_pob_choice: by surprise
  chosen_spanish: inesperadamente
  alternatives_spanish:
  - de sorpresa
  - repentinamente
  lexicon: LSJ
  rationale: El adverbio subraya la falta de anticipación del ataque. «Inesperadamente» es claro y directo en español; la versión inglesa «by surprise» se expresa aquí de forma adverbial.
- source_word: τοῖς περὶ τὸν Γοργίαν
  english_pob_choice: those around Gorgias
  chosen_spanish: a los del entorno de Gorgias
  alternatives_spanish:
  - a los que estaban con Gorgias
  - a los hombres de Gorgias
  lexicon: LSJ
  rationale: La frase designa al grupo ligado a Gorgias. «Del entorno de Gorgias» mantiene cercanía al griego sin convertir la relación en una identificación más precisa de la que el texto exige.
- source_word: τροπὴν ἐποιήσατο αὐτῶν
  english_pob_choice: put them to flight
  chosen_spanish: los puso en fuga
  alternatives_spanish:
  - los derrotó
  - los hizo huir
  lexicon: LSJ
  rationale: τροπή en uso militar denota una derrota que termina en huida. «Los puso en fuga» comunica bien el resultado táctico y conserva la fuerza bélica de la expresión.
theological_decisions:
- issue: Presencia conjunta de elemento bélico y elemento hímnico
  english_pob_reading: The cry is rendered as a battle cry accompanied by hymns, preserving both military action and worship.
  chosen_spanish_reading: El texto conserva tanto el carácter bélico del grito como su acompañamiento con himnos.
  alternative_spanish_readings:
  - un grito de alabanza
  - un grito acompañado de cantos
  rationale: El griego une κραυγή con μεθʼ ὕμνων; no conviene reducirlo solo a lo militar ni solo a lo devocional. La formulación española mantiene ambos aspectos sin añadir una explicación doctrinal ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa auditada ya está marcada como estable y sin cambios recientes; esta propuesta sigue esa lectura, manteniendo la tensión entre el matiz ancestral de τῇ πατρίῳ φωνῇ y el valor militar de τροπὴν ἐποιήσατο αὐτῶν sin amplificarlos indebidamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la distinción entre «lengua» y «voz» porque el contexto favorece el valor idiomático de φωνή.
  - «Puso en fuga» mantiene el registro bíblico pero evita el calco excesivo de una construcción más literal como «hizo una derrota de ellos».
