  text: Proclamen su gloria entre las naciones, sus obras maravillosas entre todos los pueblos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: סַפְּרוּ
  english_pob_choice: Declare
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Declaren
  - Anuncien
  - Cuenten
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural de ספר con fuerza pública y proclamatoria. «Proclamen» conserva ese matiz exhortativo y solemne en español mejor que un simple «cuenten».
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - a las naciones
  lexicon: HALOT
  rationale: גוֹיִם aquí corresponde a «naciones» en sentido amplio. «Entre» reproduce bien la preposición ב en este contexto poético de difusión pública.
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su esplendor
  lexicon: HALOT
  rationale: כָּבוֹד refiere al peso, honor y esplendor manifestado de Dios. «Gloria» es la equivalencia natural y teológicamente estable en español.
- source_word: בְּכָל־הָעַמִּים
  english_pob_choice: among all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todas las naciones
  - entre todos los pueblos de la tierra
  lexicon: HALOT
  rationale: עַמִּים se traduce mejor como «pueblos», manteniendo el paralelismo con גּוֹיִם y distinguiendo ambos términos. «Entre» refleja de nuevo el valor contextual de ב.
- source_word: נִפְלְאֹתָיו
  english_pob_choice: his wondrous deeds
  chosen_spanish: sus obras maravillosas
  alternatives_spanish:
  - sus maravillas
  - sus hechos portentosos
  lexicon: HALOT
  rationale: Desde פלא, el término señala actos extraordinarios que provocan asombro. «Obras maravillosas» comunica con naturalidad tanto la cualidad de maravilla como la concreción de hechos/acciones.
theological_decisions:
- issue: Referencia de los sufijos pronominales
  english_pob_reading: The verse refers to the God of Israel, whose glory and wondrous deeds are to be proclaimed universally.
  chosen_spanish_reading: El versículo se refiere al Dios de Israel, cuya gloria y cuyas obras maravillosas deben proclamarse universalmente.
  alternative_spanish_readings:
  - su gloria y sus obras maravillosas
  - la gloria de Yahvé y sus obras maravillosas
  rationale: En el contexto inmediato de 1 Crónicas 16, el referente es Yahvé. El español conserva los posesivos de tercera persona como en el hebreo, sin añadir explicaciones doctrinales fuera del alcance del verso.
  doctrine_reference: Afirmaciones; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El texto base en inglés no trae notas ni revisiones aplicadas; el registro muestra acuerdo alto y sin cambios en la última pasada, así que la versión española sigue de cerca el sentido ya estabilizado.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם y «pueblos» para עַמִּים, preservando el paralelismo del hebreo.
  - Se usa «gloria» para כָּבוֹד y «obras maravillosas» para נִפְלְאֹתָיו, siguiendo la fuerza semántica del audit trail inglés.
  - No se añade nota al pie porque el verso no presenta una alternativa textual o lexical que requiera anclaje explícito en el texto español.
