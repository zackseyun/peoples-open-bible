translation:
  language: es
  text: Entonces salió Noé[a], y sus hijos, y su esposa, y las esposas de sus hijos[b], con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Así salió Noé» o «Y salió Noé». La forma narrativa hebrea admite varios conectores simples en español.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «las esposas de sus hijos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: So Noah went out
  chosen_spanish: Así salió Noé[a]
  alternatives_spanish:
  - Entonces salió Noé[a]
  - Y salió Noé[a]
  - Noé salió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración con valor resultativo o consecutivo; en español, «Así» expresa bien esa continuidad narrativa sin volverla demasiado pesada. «Salió» traduce יָצָא con naturalidad y fidelidad; «salió» es más directo que un calco como «fue fuera».
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: Transliteración bíblica estándar
  rationale: Se usa la forma bíblica habitual en español, «Noé», que es la equivalente establecida en la tradición y plenamente inteligible.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus hijos
  lexicon: HALOT
  rationale: בָּנִים aquí refiere específicamente a los hijos varones de Noé; en español «hijos» comunica la referencia filial y, en este contexto narrativo, conserva naturalmente el sentido masculino sin necesidad de ampliar.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: and his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - y su esposa
  - y su mujer
  lexicon: HALOT
  rationale: 'La lista coordinada en español fluye mejor con la repetición mínima: «su esposa» mantiene el sentido de la forma posesiva hebrea y resulta más natural que repetir «y su esposa» después de «sus hijos».'
- source_word: וּנְשֵׁי בָנָיו
  english_pob_choice: and his sons’ wives
  chosen_spanish: y las esposas de sus hijos[b]
  alternatives_spanish:
  - y las esposas de sus hijos
  - y sus nueras
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «las esposas de sus hijos». Se conserva esa forma para no sustituirla por el equivalente interpretativo «nueras», aunque este sea semánticamente válido; el texto español deja visible la relación genealógica exacta.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con Noé
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ms se traduce de manera directa como «con él», manteniendo el cierre natural de la enumeración y la referencia a Noé.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] exactamente en el texto español donde corresponde. La redacción principal se mantuvo cercana al audit trail inglés y al hebreo, sin introducir notas sin anclaje.
  spanish_consistency_notes:
  - 'Se preservó el orden narrativo y la lista familiar del hebreo: Noé, sus hijos, su esposa y las esposas de sus hijos.'
  - Se evitó «nueras» en el texto principal para no perder la literalidad observable de la expresión hebrea, aunque se reconoce como equivalente interpretativo.
  - «Así» funciona aquí como conector narrativo resultativo, alineado con el waw consecutivo del hebreo y con el valor de «So» en la versión inglesa auditada.
