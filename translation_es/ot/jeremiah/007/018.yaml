- from: Los hijos recogen leña[a], los padres avivan el fuego, y las mujeres amasan masa para hacer tortas para la Reina del Cielo y para derramar libaciones a otros dioses, para provocarme a ira.
  to: Los hijos recogen leña, los padres avivan el fuego, y las mujeres amasan masa para hacer tortas para la Reina del Cielo[a] y para derramar libaciones a otros dioses, para provocar mi ira.
  rationale: Se corrige la ubicación del marcador de nota para que corresponda a «Reina del Cielo», que es el término discutido en la nota. Además, se ajusta la cláusula final a «para provocar mi ira», una formulación más natural y fiel al sentido causativo del hebreo sin perder el tono solemne.
