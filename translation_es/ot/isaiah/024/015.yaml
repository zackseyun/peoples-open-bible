translation:
  language: es
  text: Por tanto, en el oriente[a] den gloria a Yahvé; en las costas del mar, al nombre de Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las regiones de luz»; la palabra hebrea es difícil y también se ha entendido como «en los fuegos».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Por ello
  lexicon: HALOT
  rationale: La frase introduce una consecuencia inferida del contexto previo; en español, «Por tanto» conserva el valor conclusivo con registro natural y digno.
- source_word: בָּאֻרִים
  english_pob_choice: in the east
  chosen_spanish: en el oriente
  alternatives_spanish:
  - en las regiones de luz
  - en los fuegos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de entender la expresión en sentido geográfico/direccional. «Oriente» es una opción española natural que mantiene el contraste con las «costas del mar» y evita resolver en exceso la dificultad léxica.
- source_word: כַּבְּדוּ
  english_pob_choice: give glory
  chosen_spanish: den gloria
  alternatives_spanish:
  - glorifiquen
  - honren
  lexicon: HALOT
  rationale: El imperativo plural comunica la exhortación a atribuir gloria a Dios. «Den gloria» es idiomático en español y conserva el valor verbal de dar/atribuir gloria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino revelado, siguiendo la política del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: בְּאִיֵּי הַיָּם
  english_pob_choice: in the coastlands of the sea
  chosen_spanish: en las costas del mar
  alternatives_spanish:
  - en las islas del mar
  - en las costas
  lexicon: HALOT
  rationale: «איִּים» puede abarcar islas o costas lejanas; «costas del mar» preserva el sentido amplio y la imaginería marítima, y resulta más fluido que una traducción estrictamente literal.
- source_word: שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: al nombre de Yahvé
  alternatives_spanish:
  - al nombre de Yahvé
  - al nombre del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de rendir honor al nombre revelado de Dios. El dativo con «al nombre de» reproduce adecuadamente la construcción y la finalidad del mandato.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva/covenantal se vierte con la fórmula española estable y transparente «el Dios de Israel», que comunica identidad relacional y pacto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton de forma directa. La traducción conserva el nombre propio divino en español para mantener la identificación covenantal e histórica, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación de בָּאֻרִים
  english_pob_reading: geographical sense ('in the east')
  chosen_spanish_reading: sentido geográfico ('en el oriente')
  alternative_spanish_readings:
  - en las regiones de luz
  - en los fuegos
  rationale: La expresión es difícil y la tradición de traducción la ha resuelto de varias maneras. El contexto paralela con regiones marítimas favorece una localización geográfica; «oriente» conserva esa lectura sin borrar la ambigüedad léxica, que queda reflejada en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes respecto de la última revisión: la lectura geográfica de בָּאֻרִים se mantiene como principal, con la alternativa léxica preservada en nota, y el nombre divino se vierte consistentemente como Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה.
  - «Oriente» mantiene el contraste espacial con «las costas del mar» y suena natural en español bíblico contemporáneo.
  - «Den gloria» conserva el imperativo plural y evita una paráfrasis más libre.
  - La nota [a] está anclada en «mar» para reflejar la ambigüedad léxica de בָּאֻרִים sin interrumpir la lectura principal.
