lexical_decisions:
- source_word: ܥܢܐ ܘܐܡܪ ܠܝ
  english_pob_choice: He answered and said to me
  chosen_spanish: Él respondió y me dijo
  alternatives_spanish:
  - Respondió y me dijo
  - Él contestó y me dijo
  lexicon: Payne Smith
  rationale: La fórmula siriaca es una introducción narrativa común para discurso directo. En español, «respondió y me dijo» preserva el valor de reacción al discurso previo sin añadir matices interpretativos.
- source_word: ܫܡܥ
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escuchen
  lexicon: Payne Smith
  rationale: El singular imperativo encaja con el interlocutor directo. «Escucha» es natural en español moderno y conserva la fuerza exhortativa del imperativo.
- source_word: ܒܪܡ
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - ahora bien
  lexicon: Payne Smith
  rationale: El adverbio introduce la continuación del discurso y funciona bien como enlace temporal/discursivo en español. «Entonces» refleja la secuencia argumental sin sobreinterpretarla.
- source_word: ܡܠܬܐ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la declaración
  lexicon: Payne Smith
  rationale: El sustantivo abstracto siriaco aquí se mantiene con «la palabra», que es fiel y estilísticamente sobria. «Mensaje» sería más explicativo y menos cercano a la forma del original.
theological_decisions:
- issue: Alcance del versículo y exclusión de material ajeno
  english_pob_reading: Verse 1 consists only of the answering formula and the command to hear the word; the resurrection material belongs to later verses and must not be imported here.
  chosen_spanish_reading: El versículo se limita a la respuesta y a la orden de escuchar la palabra.
  alternative_spanish_readings:
  - Incluir aquí la explicación sobre la tierra y los muertos
  - Fusionar el verso con el contenido de los versículos siguientes
  rationale: La revisión auditada mostró que la traducción inglesa anterior había incorporado contenido fuera del versículo. En español se evita repetir ese error y se mantiene la frontera textual del versículo 1.
  doctrine_reference: Fidelidad textual y delimitación versicular
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que corrigió una sobrerrepresentación del contenido: el verso 1 de la fuente siriaca sólo contiene la fórmula de respuesta y la orden de escuchar la palabra. Se evitó incorporar el material de resurrección de los versículos posteriores.'
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y bíblico sin recurrir a fórmulas eclesiásticas innecesarias.
  - No se introdujo terminología doctrinal ajena al breve alcance del versículo.
  - La puntuación abre el discurso directo de manera clara y natural para lectura pública.
