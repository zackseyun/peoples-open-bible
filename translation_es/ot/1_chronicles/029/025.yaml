review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo en líneas generales: mantiene ‘Yahvé’ para יְהוָה, comunica el intensificador לְמַעְלָה con ‘sobremanera’, preserva la idea pública de לְעֵינֵי כָּל יִשְׂרָאֵל y traduce הוֹד מַלְכוּת con una expresión adecuada (‘majestad real’). También conserva correctamente la comparación sin precedente respecto de reyes anteriores sobre Israel.'
  spanish_quality_summary: 'El español es claro y digno, pero la cláusula comparativa ‘como no la había tenido ningún rey’ introduce una leve paráfrasis: desplaza la imagen hebrea de una majestad ‘puesta sobre’ o ‘que había estado sobre’ reyes anteriores hacia la idea de ‘poseerla’. Además, ‘a la vista de todo Israel’ es aceptable, pero ‘ante los ojos de todo Israel’ o ‘ante todo Israel’ se alinea mejor con el modismo bíblico sin perder naturalidad.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ‘Yahvé’ para יְהוָה; no hay términos doctrinales conflictivos adicionales. La nota léxica para הוֹד מַלְכוּת debe mantenerse, pero conviene ajustar una alternativa para español más natural.'
  issues:
  - severity: medium
    issue: La frase ‘como no la había tenido ningún rey’ no refleja con suficiente precisión el hebreo ‘אֲשֶׁר לֹא הָיָה עַל כָּל מֶלֶךְ’.
    rationale: El hebreo expresa que tal majestad no había estado/sido puesta sobre ningún rey antes de Salomón. ‘Haberla tenido’ es comprensible, pero cambia ligeramente la imagen y el enfoque de la construcción original.
  - severity: low
    issue: ‘A la vista de todo Israel’ es menos transparente que una formulación más cercana al modismo bíblico.
    rationale: לְעֵינֵי significa literalmente ‘ante los ojos de’, con valor idiomático de reconocimiento público. ‘Ante los ojos de todo Israel’ suena natural en español bíblico moderno y se alinea mejor con la evidencia fuente.
  - severity: low
    issue: La alternativa de nota ‘majestad de realeza’ suena poco natural en español.
    rationale: Aunque intenta reflejar מַלְכוּת, en español resulta más idiomático ‘majestad regia’ o ‘esplendor real’. La nota debe ofrecer alternativas fieles pero también naturales.
  revised_spanish_text: Y Yahvé engrandeció a Salomón sobremanera ante los ojos de todo Israel, y le dio majestad real[a], como no había estado sobre ningún rey antes de él sobre Israel.
  revised_footnotes:
