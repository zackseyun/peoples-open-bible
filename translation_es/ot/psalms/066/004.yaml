translation:
  language: es
  text: Toda la tierra se postrará[a] ante ti y te cantará alabanzas; cantarán alabanzas a tu nombre. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te adorará»; el hebreo puede referirse a la postración como acto de adoración.
    reason: lexical_alternative
  - marker: b
    text: «Selah» probablemente es una notación musical o litúrgica; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: כָּל הָאָרֶץ
  english_pob_choice: All the earth
  chosen_spanish: Toda la tierra
  alternatives_spanish:
  - Toda la tierra habitada
  - El mundo entero
  lexicon: HALOT
  rationale: «Toda la tierra» expresa el alcance universal del hebreo con naturalidad en español. «Tierra» conserva el valor cósmico de אֶרֶץ mejor que «país» o «territorio», y evita restringir el alcance del verso.
- source_word: יִשְׁתַּחֲווּ
  english_pob_choice: will bow down
  chosen_spanish: se postrará
  alternatives_spanish:
  - se inclinará
  - adorará
  lexicon: HALOT
  rationale: El verbo hebreo describe una acción corporal de postración ante Dios. «Se postrará» preserva esa imagen concreta mejor que «adorará», que sería más abstracto. En español singular impersonal/poético, el sentido colectivo sigue siendo claro.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: ante ti
  alternatives_spanish:
  - a ti
  - delante de ti
  lexicon: HALOT
  rationale: Aunque la preposición hebrea marca dirección hacia el destinatario, en español «ante ti» comunica mejor el gesto de postración ligado al verbo anterior. Mantiene el sentido relacional y cultual sin sonar forzado.
- source_word: וִיזַמְּרוּ / יְזַמְּרוּ
  english_pob_choice: sing praise
  chosen_spanish: cantará alabanzas
  alternatives_spanish:
  - cantará
  - cantará salmos
  - hará música en alabanza
  lexicon: HALOT
  rationale: זמר en contextos de alabanza implica canto de alabanza. «Cantar alabanzas» reproduce bien el valor verbal y el tono litúrgico sin introducir la restricción moderna de «hacer música». Mantiene también la repetición enfática del hebreo con una forma equivalente en español.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu renombre
  - tu fama
  lexicon: HALOT
  rationale: «Nombre» es la forma bíblica normal y teológicamente cargada para referirse al carácter revelado y la reputación de Dios. En español, conservar «tu nombre» es más fiel que explicitar «renombre».
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Interludio
  lexicon: HALOT
  rationale: El término permanece transliterado porque su función exacta es incierta. Retenerlo evita una interpretación especulativa y sigue la decisión auditada de la POB inglesa.
theological_decisions:
- issue: 'יִשְׁתַּחֲווּ: gesto corporal de postración vs. acto explícito de adoración'
  english_pob_reading: bow down
  chosen_spanish_reading: se postrará
  alternative_spanish_readings:
  - adorará
  - se inclinará en adoración
  rationale: La POB inglesa preserva la imagen física de la prostración y deja implícito el valor cultual. En español, «se postrará» mantiene esa concreción y evita sustituir el símbolo corporal por una abstracción devocional.
  doctrine_reference: 'Principio de primacía del texto fuente: conservar la imagen de adoración corporal sin borrar su dimensión cultual.'
- issue: «Selah» como nota musical/litúrgica de sentido incierto
  english_pob_reading: Selah
  chosen_spanish_reading: Selah
  alternative_spanish_readings:
  - Interludio
  rationale: No hay base suficiente para explicar el término con certeza. Mantenerlo transliterado respeta la incertidumbre documental y la transparencia del proyecto.
  doctrine_reference: 'Nota textual/cultural: evitar glosas interpretativas donde el hebreo no permite certeza.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustanciales respecto del sentido base: mantiene el alcance universal de «toda la tierra», la imagen corporal de postración en el verbo principal, la repetición de la alabanza y la transliteración de «Selah».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto fuente no lo contiene explícitamente; el verso se dirige en segunda persona a Dios.
  - Se prefirió «cantar alabanzas» para reflejar la repetición verbal del hebreo y conservar un registro culto y natural en español.
  - La puntuación separa claramente las dos colonas poéticas y conserva el cierre con «Selah».
