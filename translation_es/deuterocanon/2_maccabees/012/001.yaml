translation:
  language: es
  text: Después de haberse concertado estos acuerdos[a], Lisias se fue al rey, pero los judíos andaban en sus labores agrícolas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haberse concluido» para «haberse concertado»; el participio griego puede subrayar la realización completa de los acuerdos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «andaban alrededor de la agricultura», un giro idiomático que significa que estaban dedicados al trabajo agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἹΓενομένων / Γενομένων
  english_pob_choice: had been made
  chosen_spanish: haberse concertado
  alternatives_spanish:
  - haberse hecho
  - haberse concluido
  lexicon: LSJ
  rationale: El participio aoristo con συνθηκῶν expresa la culminación previa de los acuerdos. En español, «haberse concertado» conserva la idea de un pacto ya establecido sin sonar tan mecánico como «haberse hecho», y mantiene el matiz de acción completada anterior a los verbos principales.
- source_word: συνθηκῶν
  english_pob_choice: agreements
  chosen_spanish: acuerdos
  alternatives_spanish:
  - pactos
  - convenios
  - tratados
  lexicon: LSJ
  rationale: El término griego designa un acuerdo o convenio. «Acuerdos» es la opción más neutral y natural en español. «Tratados» suena más político o formal de lo que exige el contexto, y «pactos» puede intensificar indebidamente el tono.
- source_word: ἀπῆε
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  - salió
  lexicon: LSJ
  rationale: El imperfecto narrativo indica salida o partida. «Se fue» comunica con claridad y naturalidad la idea de que Lisias se retiró de allí.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - de vuelta al rey
  lexicon: LSJ
  rationale: La preposición πρὸς con acusativo expresa dirección. «Al rey» es la forma más directa y fiel en español; no se añade «de vuelta» porque no está explícito en el griego, aunque el contexto lo sugiera.
- source_word: περὶ τὴν γεωργίαν
  english_pob_choice: went about their farming
  chosen_spanish: se ocuparon de la agricultura
  alternatives_spanish:
  - se dedicaron a la agricultura
  - anduvieron en sus labores agrícolas
  - se pusieron a cultivar la tierra
  lexicon: LSJ
  rationale: La construcción idiomática con περὶ + acusativo indica dedicación u զբաղamiento con una actividad. «Se ocuparon de la agricultura» conserva el sentido de estar dedicados al trabajo agrícola sin forzar una imagen demasiado literal o coloquial.
- source_word: ἐγίνοντο
  english_pob_choice: went about
  chosen_spanish: se ocuparon
  alternatives_spanish:
  - estaban dedicados
  - andaban
  - se aplicaron
  lexicon: LSJ
  rationale: En combinación con περὶ τὴν γεωργίαν, el verbo expresa estar dedicados a una actividad. «Se ocuparon» refleja bien ese sentido de dedicación activa en español y mantiene el tono narrativo formal.
theological_decisions:
- issue: Naturaleza del término 'agreements' en un contexto histórico no explícitamente teológico
  english_pob_reading: agreements
  chosen_spanish_reading: acuerdos
  alternative_spanish_readings:
  - pactos
  - convenios
  - tratados
  rationale: El contexto de 2 Macabeos 12:1 es narrativo e histórico; no hay base suficiente para cargar el término con un sentido específicamente teológico. «Acuerdos» preserva la neutralidad del griego συνθήκαι sin introducir resonancias de pacto bíblico que el texto no exige.
  doctrine_reference: Lexical neutrality in historical narrative
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB, que prefirió una formulación más directa para περὶ τὴν γεωργίαν ἐγίνοντο («went about their farming»). En español se reflejó ese ajuste con una solución igualmente natural y formal: «se ocuparon de la agricultura».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y vocabulario eclesiástico ajeno al pasaje, dado que el texto es narrativo e histórico.
  - «Agricultura» conserva el campo semántico de γεωργία sin reducirlo a una sola técnica de cultivo.
