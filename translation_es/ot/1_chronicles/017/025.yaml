base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/017/025.yaml
  text: For you[a], my God, have revealed to your servant that you will build him a house[b]; therefore your servant has found courage to pray before you.
  footnotes:
  - marker: a
    text: Hebrew literally, 'have uncovered the ear of your servant,' an idiom meaning 'have revealed to your servant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'establish a dynasty for him'; 'house' here likely carries the sense of an enduring royal line as well as a household.
    reason: alternative_reading
