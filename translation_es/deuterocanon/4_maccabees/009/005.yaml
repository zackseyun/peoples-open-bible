translation:
  language: es
  text: Pero intentas atemorizarnos, amenazándonos con la muerte mediante torturas, como si no hubieras aprendido de Eleazar hace poco[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «como si nada hubieras aprendido de Eleazar recientemente». El sentido de la comparación (ὥσπερ οὐχί) es retórico y sarcástico; no niega que el tirano fuera testigo del ejemplo de Eleazar, sino que le reprocha haber actuado como si ese ejemplo no le hubiera enseñado nada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκφοβεῖς
  english_pob_choice: you are trying to frighten
  chosen_spanish: intentas atemorizarnos
  alternatives_spanish:
  - nos atemorizas
  - tratas de asustarnos
  - nos intimidas
  - procuras atemorizarnos
  lexicon: LSJ
  rationale: 'El presente indicativo de ἐκφοβέω tiene aquí fuerza conativa: el tirano intenta amedrentar sin conseguirlo. ''Intentas atemorizarnos'' preserva ese matiz de acción no lograda y le añade el tono de burla propio del contexto martirológico, donde los hermanos rechazan la amenaza con desprecio. Se prefiere sobre el simple ''nos atemorizas'', que resultaría demasiado neutro.'
- source_word: βασάνων
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  - tormento
  lexicon: LSJ
  rationale: βάσανος en contexto martirológico designa instrumentos y procedimientos físicos de tormento extremo. El plural griego τῶν βασάνων se reproduce con el plural 'torturas', que es claro y directo en español moderno. 'Tormentos' es igualmente válido pero más vago; 'suplicios' es apropiado pero más arcaico.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: LSJ
  rationale: Equivalente estándar. El artículo 'la' está justificado por el artículo griego τόν con θάνατον y naturaliza la construcción en español.
- source_word: ἀπειλῶν
  english_pob_choice: by threatening
  chosen_spanish: amenazándonos con
  alternatives_spanish:
  - al amenazarnos
  - amenazando con
  lexicon: LSJ
  rationale: El participio presente nominativo ἀπειλῶν indica el medio por el cual el tirano intenta atemorizar. El gerundio 'amenazándonos con' mantiene la fuerza instrumental de la construcción griega y fluye con naturalidad en español; el complemento 'con' introduce el objeto de la amenaza ('la muerte').
- source_word: διὰ τῶν βασάνων
  english_pob_choice: through tortures
  chosen_spanish: mediante torturas
  alternatives_spanish:
  - a través de torturas
  - con torturas
  - por medio de torturas
  lexicon: LSJ
  rationale: διά con genitivo señala el medio o instrumento. 'Mediante' es la preposición española que mejor reproduce ese valor instrumental en registro formal y mantiene la estructura sin sonar redundante junto con 'amenazándonos con'.
- source_word: πρὸ βραχέως
  english_pob_choice: a little while ago
  chosen_spanish: hace poco
  alternatives_spanish:
  - recientemente
  - poco antes
  - no hace mucho
  lexicon: LSJ
  rationale: Expresión temporal idiomática que sitúa el episodio de Eleazar como evento reciente en la memoria de todos los presentes. 'Hace poco' es transparente y natural en español neutro latinoamericano; 'recientemente' es igualmente correcto pero ligeramente más formal y pierde la concreción del πρό temporal.
- source_word: παρὰ Ἐλεαζάρου μαθών
  english_pob_choice: learned from Eleazar
  chosen_spanish: hubieras aprendido de Eleazar
  alternatives_spanish:
  - aprendido algo de Eleazar
  - recibido lección de Eleazar
  - tomado ejemplo de Eleazar
  lexicon: LSJ
  rationale: παρά con genitivo tras μανθάνω indica la fuente o maestro de quien se aprende. El subjuntivo pluscuamperfecto 'hubieras aprendido' es obligatorio en español después de 'como si' (ὥσπερ οὐχί), reproduciendo fielmente la irrealidad retórica del original. 'De Eleazar' preserva la preposición de fuente del griego παρά.
theological_decisions:
- issue: Fuerza retórica de ὥσπερ οὐχί + participio aoristo μαθών
  english_pob_reading: as though you had not learned from Eleazar a little while ago
  chosen_spanish_reading: como si no hubieras aprendido de Eleazar hace poco
  alternative_spanish_readings:
  - a pesar de que acabas de aprender algo de Eleazar
  - como si nada hubieras aprendido de Eleazar recientemente
  - cual si no te hubiera enseñado nada Eleazar poco antes
  rationale: 'ὥσπερ οὐχί introduce una comparación irreal de tono sarcástico: el tirano actúa como si el ejemplo de Eleazar no lo hubiera aleccionado, cuando en realidad debería haberlo hecho. ''Como si no hubieras aprendido'' preserva ese aguijón retórico sin resolver la tensión hacia una concesiva (''aunque aprendiste'') ni hacia una negación absoluta (''nada aprendiste''). La variante ''como si nada hubieras aprendido'' enfatiza la inutilidad del aprendizaje y se ofrece como alternativa en la nota al pie; ambas leen el texto como reproche irónico, no como negación fáctica de que el tirano hubiera presenciado el martirio de Eleazar.'
  doctrine_reference: 'Principio POB: preservar la tensión retórica y teológica documentada en lugar de resolverla mediante paráfrasis; cf. decisión teológica inglesa sobre ὥσπερ οὐχί.'
