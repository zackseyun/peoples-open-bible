revisions:
- from: Trajeron el arca de Yahvé y la colocaron en su lugar[a], dentro de la tienda que David le había extendido. Y David ofreció holocaustos y sacrificios de paz delante de Yahvé.
  to: Trajeron el arca de Yahvé y la colocaron en su lugar, dentro de la tienda que David había levantado para ella. Y David ofreció holocaustos y sacrificios de paz[a] delante de Yahvé.
  rationale: Se reubica la nota al término correcto ('sacrificios de paz') para mantener coherencia con la evidencia y la práctica editorial. Se sustituye 'le había extendido' por 'había levantado para ella', que expresa de manera más natural en español el sentido de נטה aplicado a una tienda, sin perder la referencia al arca.
