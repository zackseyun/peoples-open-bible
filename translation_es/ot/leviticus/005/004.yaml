translation:
  language: es
  text: O si una persona jura precipitadamente con sus labios[a] hacer mal o hacer bien —cualquier cosa que una persona pronuncie en un juramento—, y se le oculta, y llega a saberlo y se hace culpable en una de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pronuncia con sus labios»; la expresión hebrea puede enfatizar el acto mismo de proferir verbalmente, aunque el contexto sugiere un juramento precipitado o irreflexivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  lexicon: HALOT
  rationale: En este contexto jurídico, נֶפֶשׁ designa a un individuo, no al alma inmortal. «Persona» conserva el valor legal y es natural en español.
- source_word: תִשָּׁבַע
  english_pob_choice: swears
  chosen_spanish: jura
  alternatives_spanish:
  - hace un juramento
  - toma juramento
  lexicon: HALOT
  rationale: El verbo hebreo se refiere al acto de jurar. «Jura» es idiomático en español y mantiene la concisión casuística del hebreo.
- source_word: לְבַטֵּא בִשְׂפָתַיִם
  english_pob_choice: rashly with his lips
  chosen_spanish: precipitadamente con sus labios
  alternatives_spanish:
  - con sus labios
  - impulsivamente con sus labios
  - al hablar con sus labios
  lexicon: HALOT
  rationale: El audit trail inglés entiende aquí una palabra dicha de manera descuidada o irreflexiva. «Precipitadamente» conserva la idea de imprudencia verbal sin suavizarla, y «con sus labios» preserva la expresión hebrea.
- source_word: לְהָרַע אוֹ לְהֵיטִיב
  english_pob_choice: to do evil or to do good
  chosen_spanish: hacer mal o hacer bien
  alternatives_spanish:
  - para dañar o para beneficiar
  - para perjudicar o para ayudar
  lexicon: HALOT
  rationale: La pareja verbal funciona como un merismo amplio para el contenido de un juramento. «Hacer mal o hacer bien» sigue de cerca el hebreo y su rango polar.
- source_word: לְכֹל אֲשֶׁר יְבַטֵּא הָאָדָם בִּשְׁבֻעָה
  english_pob_choice: whatever a person may utter in an oath
  chosen_spanish: cualquier cosa que una persona declare con juramento
  alternatives_spanish:
  - todo lo que una persona pronuncie en juramento
  - cualquier cosa que una persona exprese con juramento
  lexicon: HALOT
  rationale: «Declare con juramento» conserva el valor de la expresión verbal vinculada a la fórmula juramentada. Se usa «persona» para el sujeto genérico, coherente con נֶפֶשׁ y con el sentido inclusivo del pasaje.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  english_pob_choice: it is hidden from him
  chosen_spanish: eso le queda oculto
  alternatives_spanish:
  - le pasa inadvertido
  - él no lo percibe
  - se le oculta
  lexicon: HALOT
  rationale: Se mantiene la pasiva/impersonal del hebreo. «Le queda oculto» evita convertir el texto en una mera falta de atención, preservando que la cosa está fuera de su conocimiento.
- source_word: וְהוּא יָדַע
  english_pob_choice: he comes to know it
  chosen_spanish: luego llega a saberlo
  alternatives_spanish:
  - y entonces lo sabe
  - y después lo conoce
  - y se da cuenta
  lexicon: HALOT
  rationale: La secuencia verbal indica conocimiento adquirido después de la ocultación previa. «Llega a saberlo» expresa bien ese cambio de estado.
- source_word: וְאָשֵׁם
  english_pob_choice: becomes guilty
  chosen_spanish: se hace culpable
  alternatives_spanish:
  - queda culpable
  - incurre en culpa
  - es culpable
  lexicon: HALOT
  rationale: El verbo marca el paso a una condición de culpabilidad reconocida. «Se hace culpable» conserva ese matiz dinámico mejor que una simple afirmación estática.
- source_word: לְאַחַת מֵאֵלֶּה
  english_pob_choice: in one of these matters
  chosen_spanish: en una de estas cosas
  alternatives_spanish:
  - en uno de estos asuntos
  - por una de estas cosas
  - en una de estas materias
  lexicon: HALOT
  rationale: «Cosas» mantiene la referencia anafórica a los casos precedentes sin sobreespecificar. En español jurídico-bíblico, «asuntos» también sería posible, pero «cosas» es más directo al hebreo.
theological_decisions:
- issue: Alcance genérico del sujeto humano
  english_pob_reading: Retain representative masculine in 'whatever a man may utter in an oath' while using 'person' earlier for נֶפֶשׁ
  chosen_spanish_reading: Usar «una persona» de manera consistente para el sujeto genérico, sin introducir marcadores masculinos innecesarios
  alternative_spanish_readings:
  - cualquier cosa que un hombre declare con juramento
  - cualquier cosa que una persona declare con juramento
  rationale: El hebreo combina un término general para individuo con un sustantivo humano genérico. En español, «persona» comunica el valor representativo sin perder el alcance legal del mandato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El borrador inglés auditado fue revisado para armonizar el sujeto genérico en la frase paralela y mantener el sentido legal del hebreo. La presente versión sigue esa decisión y la adapta de modo consistente al español.
  spanish_consistency_notes:
  - Se mantiene «persona» para נֶפֶשׁ y para הָאָדָם, evitando alternancia innecesaria entre «persona» y «hombre».
  - «Con sus labios» preserva el componente corporal de la expresión hebrea sin sonar forzado en español.
  - 'La secuencia verbal «queda oculto / llega a saberlo / se hace culpable» reproduce el movimiento del hebreo: ocultación, descubrimiento y culpabilidad.'
  - No se introduce «SEÑOR» ni terminología cultual ajena al texto; el versículo no contiene el nombre divino.
