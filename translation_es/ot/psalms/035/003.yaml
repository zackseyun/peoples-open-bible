translation:
  language: es
  text: 'Desenvaina la lanza y cierra el paso contra los que me persiguen[a]; di a mi alma[b]: «Yo soy tu salvación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desenvaina la lanza y la hacha de guerra contra los que me persiguen», si וּסְגֹר se toma como nombre de un arma en vez del verbo «cerrar / bloquear el paso».'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu liberación». El término hebreo puede referirse al rescate concreto en una crisis o a la salvación en sentido más amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרֵק
  english_pob_choice: Draw
  chosen_spanish: Desenvaina
  alternatives_spanish:
  - Saca
  - Extrae
  lexicon: HALOT
  rationale: El verbo en hifil comunica sacar un arma de su funda. En español, «desenvaina» transmite con precisión la acción militar y es natural en este contexto.
- source_word: חֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la jabalina
  - la lanza de guerra
  lexicon: HALOT
  rationale: El término designa un arma lanzada o empuñada de combate. «Lanza» es claro y digno en español; «spear» puede abarcar también lanza, y aquí la imagen militar se conserva bien.
- source_word: וּסְגֹר
  english_pob_choice: block the way
  chosen_spanish: cierra el paso
  alternatives_spanish:
  - bloquea el camino
  - cierra el camino
  - obstruye el paso
  lexicon: HALOT
  rationale: El hebreo literalmente es «cierra»; en contexto, la idea es impedir el avance de los perseguidores. «Cierra el paso» expresa esa obstrucción de forma idiomática en español.
- source_word: לִקְרַאת
  english_pob_choice: against
  chosen_spanish: frente a
  alternatives_spanish:
  - contra
  - ante
  - al encuentro de
  lexicon: HALOT
  rationale: La preposición indica movimiento hacia un encuentro hostil. «Frente a» mantiene la confrontación sin sonar forzado en español.
- source_word: רֹדְפָי
  english_pob_choice: those who pursue me
  chosen_spanish: los que me persiguen
  alternatives_spanish:
  - mis perseguidores
  - los que me siguen persiguiendo
  lexicon: HALOT
  rationale: El participio con sufijo expresa una acción continua. «Los que me persiguen» conserva esa idea procesual y es natural en español.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - diles
  - declara
  lexicon: HALOT
  rationale: Es un imperativo directo. «Di» reproduce la forma más inmediata y simple del mandato.
- source_word: לְנַפְשִׁי
  english_pob_choice: to my soul
  chosen_spanish: a mi alma
  alternatives_spanish:
  - a mí
  - a mi vida
  - a mi ser interior
  lexicon: HALOT
  rationale: «Nephesh» puede ser alma, vida o yo mismo. Se conserva «alma» por su fuerza poética y porque el hebreo habla directamente a la interioridad del orante.
- source_word: יְשֻׁעָתֵךְ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  lexicon: HALOT
  rationale: El sustantivo admite tanto rescate concreto como salvación amplia. «Salvación» preserva el alcance teológico sin excluir el rescate inmediato del salmo.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la afirmación. En español, «yo soy» mantiene ese énfasis y suena natural en la cita directa.
theological_decisions:
- issue: יְשׁוּעָה como rescate inmediato o salvación plena
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: El verso está en un contexto de peligro militar, así que «liberación» o «rescate» serían posibles. Sin embargo, «salvación» conserva el rango semántico más amplio del hebreo y la redacción de la POB inglesa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Afirmación divina implícita en «Yo soy tu salvación»
  english_pob_reading: I am your salvation
  chosen_spanish_reading: Yo soy tu salvación
  alternative_spanish_readings:
  - Yo soy tu liberación
  rationale: La frase mantiene el sujeto implícito en el discurso directo sin añadir contenido doctrinal extra. No se suaviza la identificación personal entre Yahvé y la salvación ofrecida al salmista.
  doctrine_reference: Psalmic divine speech / rescue theology
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó igual tras la comprobación cruzada, con alto acuerdo entre evaluadores. Se ha mantenido la misma lectura principal y se ha reflejado la ambigüedad relevante de וּסְגֹר e יְשֻׁעָה en notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero en este verso no aparece el tetragrámaton de forma explícita; por eso no se inserta aquí.
  - Se prefirió «salvación» como equivalente principal de יְשׁוּעָה, coherente con el patrón terminológico del POB.
  - «Desenvaina» conserva la fuerza verbal sin mecanicismo; «cierra el paso» evita una calca dura de «block the way».
