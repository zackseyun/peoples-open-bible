  text: הַגִּ֣ידוּ בִֽ/יהוּדָ֗ה וּ/בִ/ירוּשָׁלִַ֨ם֙ הַשְׁמִ֔יעוּ וְ/אִמְר֕וּ ו/תקעו שׁוֹפָ֖ר בָּ/אָ֑רֶץ קִרְא֤וּ מַלְאוּ֙ וְ/אִמְר֔וּ הֵאָסְפ֥וּ וְ/נָב֖וֹאָה אֶל עָרֵ֥י הַ/מִּבְצָֽר־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/005.yaml
  text: 'Declare in Judah[a], and proclaim in Jerusalem, and say: Blow the trumpet in the land. Cry aloud and say: Gather yourselves[d][c][b], and let us go into the fortified cities.'
  footnotes:
  - marker: a
    text: Or 'make it heard in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sound the horn in the land'; 'shofar' refers to a ram's horn or trumpet used as an alarm signal.
    reason: cultural_note
  - marker: c
    text: The Hebrew behind 'fill the air' is terse and idiomatic; it may mean 'raise a full cry' or 'fill the land with the alarm.'
    reason: lexical_alternative
  - marker: d
    text: Or 'to the fortified cities.'
    reason: lexical_alternative
