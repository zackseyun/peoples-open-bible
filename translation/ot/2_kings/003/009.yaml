id: 2KI.3.9
reference: 2 Kings 3:9
source:
  edition: WLC
  text: וַ/יֵּלֶךְ֩ מֶ֨לֶךְ יִשְׂרָאֵ֤ל וּ/מֶֽלֶך יְהוּדָה֙ וּ/מֶ֣לֶךְ אֱד֔וֹם וַ/יָּסֹ֕בּוּ דֶּ֖רֶךְ שִׁבְעַ֣ת יָמִ֑ים וְ/לֹא הָיָ֨ה מַ֧יִם לַֽ/מַּחֲנֶ֛ה וְ/לַ/בְּהֵמָ֖ה אֲשֶׁ֥ר בְּ/רַגְלֵי/הֶֽם־־׃
translation:
  text: So the king of Israel went[a], along with the king of Judah and the king of Edom, and they went around by a route of seven days; but there was no water for the camp or for the livestock that followed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the livestock that was at their feet,' an idiom for animals accompanying them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - marched
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of הלך, introducing the expedition. 'Went' is the plain sense; military nuance is supplied by context rather than forced into the verb.
- source_word: מֶלֶךְ יִשְׂרָאֵל ... וּמֶלֶךְ יְהוּדָה ... וּמֶלֶךְ אֱדוֹם
  chosen: the king of Israel ... the king of Judah and the king of Edom
  lexicon: HALOT
  rationale: Titles are translated and place names transliterated. Repeating 'the king of' preserves the Hebrew coordination and the three-party alliance.
- source_word: וַיָּסֹבּוּ
  chosen: they went around
  alternatives:
  - they circled around
  - they made a circuit
  lexicon: HALOT
  rationale: From סבב, here describing a circuitous movement or detour. 'Went around' is idiomatic modern English and preserves the directional sense without overformal wording.
- source_word: דֶּרֶךְ שִׁבְעַת יָמִים
  chosen: by a route of seven days
  alternatives:
  - on a seven-day journey
  - for seven days' journey
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road, way, or journey. Here it likely denotes the route/extent of travel. 'By a route of seven days' keeps the Hebrew structure while remaining readable; the phrase indicates a seven-day circuit or march.
- source_word: וְלֹא הָיָה מַיִם
  chosen: there was no water
  alternatives:
  - water was not available
  - they had no water
  lexicon: HALOT
  rationale: Existential clause with היה. 'There was no water' is the most natural and direct rendering.
- source_word: לַמַּחֲנֶה
  chosen: for the camp
  alternatives:
  - for the army camp
  - for the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה can denote camp or army camp. 'Camp' is sufficient in context and avoids adding military specificity beyond the Hebrew.
- source_word: וְלַבְּהֵמָה
  chosen: for the livestock
  alternatives:
  - for the animals
  - for the cattle
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to beasts/animals accompanying the force. 'Livestock' fits the collective singular in English and likely reflects pack and domestic animals rather than wild beasts.
- source_word: אֲשֶׁר בְּרַגְלֵיהֶם
  chosen: that followed them
  alternatives:
  - that was at their feet
  - that was with them
  lexicon: HALOT
  rationale: Literally 'which was at their feet.' In context this idiom refers to animals accompanying the army. 'That followed them' conveys the sense in natural English; the more literal image is preserved in a footnote.
