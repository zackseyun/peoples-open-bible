translation:
  language: es
  text: Después de estas cosas, fueron escogidos para subir los jefes de las casas paternas, conforme a sus tribus, junto con sus esposas, sus hijos y sus hijas, sus siervos y sus siervas[a], y su ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus sirvientes y sus sirvientas'. Los términos griegos pueden referirse a siervos domésticos o esclavos; aquí se usa una formulación más cauta para reflejar las formas masculina y femenina sin afirmar más de lo que este versículo por sí solo establece.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: LSJ
  rationale: Conserva la transición temporal del griego y el plural demostrativo ταῦτα sin volver la frase artificial en español.
- source_word: ἐξελέγησαν
  english_pob_choice: were chosen
  chosen_spanish: fueron escogidos
  alternatives_spanish:
  - fueron seleccionados
  - fueron elegidos
  lexicon: LSJ
  rationale: El pasivo de ἐκλέγω se refleja bien con 'fueron escogidos'; mantiene la idea de selección sin añadir matices institucionales ajenos al texto.
- source_word: ἀναβῆναι
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - ir arriba
  - ir a subir
  lexicon: LSJ
  rationale: En español, el infinitivo 'subir' comunica el movimiento ascendente del griego y preserva el valor idiomático bíblico sin forzar una perífrasis.
- source_word: ἀρχηγοὶ οἴκου πατριῶν
  english_pob_choice: the heads of ancestral houses
  chosen_spanish: los cabezas de las casas paternas
  alternatives_spanish:
  - los jefes de las casas paternas
  - los jefes de familias ancestrales
  lexicon: LSJ
  rationale: Se mantiene la estructura social del griego. 'Casas paternas' refleja οἴκου πατριῶν con cercanía al linaje/familia extensa; 'cabezas' conserva ἀρχηγοί como dirigentes principales, aunque 'jefes' es una alternativa más natural en español.
- source_word: κατὰ φυλὰς αὐτῶν
  english_pob_choice: according to their tribes
  chosen_spanish: conforme a sus tribus
  alternatives_spanish:
  - según sus tribus
  - por sus tribus
  lexicon: LSJ
  rationale: '''Conforme a'' conserva la distribución organizativa de κατά con acusativo y suena natural en español bíblico contemporáneo.'
- source_word: αἱ γυναῖκες αὐτῶν
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres y esposas
  lexicon: LSJ
  rationale: Dado que el contexto es una lista doméstica, 'sus mujeres' sigue de cerca el griego γυναῖκες sin restringirlo a un tecnicismo matrimonial que el texto no explicita.
- source_word: οἱ υἱοὶ καὶ αἱ θυγατέρες
  english_pob_choice: their sons and daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - sus hijos varones y sus hijas
  lexicon: LSJ
  rationale: El español requiere una formulación natural; se preserva la mención explícita de ambos sexos, como en el griego.
- source_word: οἱ παῖδες αὐτῶν
  english_pob_choice: their male servants
  chosen_spanish: sus esclavos varones
  alternatives_spanish:
  - sus siervos varones
  - sus servidores varones
  lexicon: LSJ
  rationale: Siguiendo la decisión POB de no suavizar la fuerza léxica, παῖδες se entiende aquí como personal doméstico dependiente; 'esclavos varones' preserva la tensión social posible del término sin afirmar más de lo que el verso garantiza.
- source_word: αἱ παιδίσκαι
  english_pob_choice: female servants
  chosen_spanish: sus esclavas
  alternatives_spanish:
  - sus siervas
  - sus muchachas
  lexicon: LSJ
  rationale: La forma femenina empareja con παῖδες; 'esclavas' mantiene la simetría léxica y la posible fuerza de dependencia del grupo doméstico.
- source_word: τὰ κτήνη αὐτῶν
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales de carga
  - su ganado y bestias de carga
  lexicon: LSJ
  rationale: '''Ganado'' es la opción española más concisa y natural para κτήνη en una lista de migración/hogar, y conserva el sentido de animales domésticos sin ampliar el alcance a ''posesiones''.'
theological_decisions:
- issue: Naturaleza de παῖδες / παιδίσκαι en la lista doméstica
  english_pob_reading: The Greek terms can denote household slaves or servants; the English text uses 'male servants' and 'female servants' to reflect the paired masculine and feminine forms without overstating legal status from this verse alone.
  chosen_spanish_reading: '''esclavos varones'' y ''esclavas'' conservan la posibilidad de dependencia servil fuerte que el griego puede implicar, sin convertir la frase en una afirmación técnica sobre estatus jurídico más allá del verso.'
  alternative_spanish_readings:
  - '''siervos varones'' y ''siervas'''
  - '''servidores varones'' y ''servidoras'''
  rationale: El contexto de inventario doméstico y la simetría masculino/femenino favorecen una traducción que no diluya el término. A la vez, el verso no define jurídicamente la condición de cada persona, así que la redacción mantiene la tensión semántica.
  doctrine_reference: Ninguna; decisión léxica y social, no doctrinal.
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego y el aparato auditado en inglés, sin cambios sustantivos respecto de la decisión POB. La única adaptación principal fue ajustar el orden y la naturalidad del español, manteniendo la lista doméstica completa y la posible fuerza social de παῖδες / παιδίσκαι.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un español claro y bíblicamente solemne, evitando paráfrasis que oculten la estructura enumerativa del griego.
  - Se mantuvo la secuencia de miembros del hogar y bienes como una sola unidad narrativa, como en el original.
