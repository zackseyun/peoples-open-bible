translation:
  language: es
  text: 'Entonces Isaac dijo a su hijo: «¿Cómo es que encontraste tan pronto, hijo mío?» Y él dijo[a]: «Porque Yahvé tu Dios hizo que ocurriera delante de mí».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «causó que ocurriera delante de mí».'
    reason: previous_rendering
  - marker: b
    text: 'O: «Yahvé tu Dios me dio éxito» / «hizo que ocurriera para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה זֶּה
  english_pob_choice: How is it that
  chosen_spanish: ¿Cómo es que
  alternatives_spanish:
  - ¿Qué es esto que
  - ¿Por qué es que
  lexicon: HALOT
  rationale: La expresión hebrea introduce una pregunta de sorpresa e indagación. En español, «¿Cómo es que» reproduce bien ese matiz sin sonar artificial ni convertirlo en una simple pregunta de causa.
- source_word: מִהַרְתָּ
  english_pob_choice: you found it so quickly
  chosen_spanish: hallaste tan pronto
  alternatives_spanish:
  - te apresuraste a hallar
  - fuiste rápido para hallar
  lexicon: HALOT
  rationale: El verbo comunica rapidez. En el contexto, español naturaliza el resultado como «hallaste tan pronto», manteniendo la sorpresa de Isaac por la brevedad del tiempo.
- source_word: לִמְצֹא
  english_pob_choice: found it
  chosen_spanish: hallaste
  alternatives_spanish:
  - encontraste
  - hallaste eso
  lexicon: HALOT
  rationale: Aunque formalmente es «encontrar», el español fluido en la pregunta exige un verbo conjugado. El objeto queda implícito por el contexto narrativo, como en el inglés auditado.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: El sufijo de primera persona expresa posesión afectuosa y vocativo directo. «Hijo mío» conserva mejor el tono de trato directo en español bíblico contemporáneo.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación inmediata de Jacob. «Porque» es la equivalencia más clara y natural en español para este uso causal.
- source_word: הִקְרָה
  english_pob_choice: caused it to happen
  chosen_spanish: hizo que ocurriera
  alternatives_spanish:
  - causó que sucediera
  - lo hizo acontecer
  - le dio éxito
  lexicon: HALOT
  rationale: El hiphil de קרה conserva fuerza causativa. «Hizo que ocurriera» mantiene esa causalidad sin ampliar innecesariamente a «éxito», que sería una interpretación contextual posible pero no obligada por el verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del POB en español para el nombre divino del Tetragrámaton: «Yahvé», preservando el nombre propio y no sustituyéndolo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios de ti
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular es significativo; Jacob no dice «mi Dios», sino «tu Dios». En español se preserva esa relación directa con «tu Dios».
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en frente de mí
  - para mí
  lexicon: HALOT
  rationale: La locución hebrea admite varios matices. «Delante de mí» conserva la imagen espacial sin forzar una explicitación teológica mayor que la que permite el hebreo, y suena natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. En la tradición POB en español se mantiene el nombre propio «Yahvé», evitando la sustitución por un título genérico. Esto preserva la referencia al nombre del pacto sin ocultarlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Causalidad providencial en הִקְרָה...לְפָנַי
  english_pob_reading: caused it to happen before me
  chosen_spanish_reading: hizo que ocurriera delante de mí
  alternative_spanish_readings:
  - causó que sucediera delante de mí
  - lo hizo llegar a mí
  - me dio éxito
  rationale: La frase hebrea atribuye el hallazgo rápido a la acción causativa de Dios, pero no especifica más allá de eso. La traducción conserva la causalidad y la localización relacional («delante de mí») sin convertirla en una afirmación más fuerte sobre éxito o dirección explícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que volvió de «brought it to me» a «caused it to happen before me» para reflejar mejor הִקְרָה ... לְפָנַי. La versión española evita tanto la paráfrasis excesiva como la literalidad rígida, y conserva la sorpresa de Isaac, la causalidad divina y el contraste pronominal «tu Dios».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma fija para el Tetragrámaton, conforme a la política del proyecto en español.
  - «Hijo mío» mantiene el vocativo afectivo y no introduce un cambio de registro innecesario.
  - «Delante de mí» se eligió por coherencia con el auditable «before me», aunque «ante mí» sería una alternativa posible en español.
  - No se usó «Cristo» ni vocabulario cristológico, pues el versículo no lo requiere.
