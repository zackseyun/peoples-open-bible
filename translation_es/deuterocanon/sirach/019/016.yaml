translation:
  language: es
  text: Reprende a tu prójimo antes de amenazar[a], y da lugar a la ley del Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haz lugar para la ley del Altísimo», es decir, cede tu respuesta a su dirección en vez de escalar hasta las amenazas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγξον
  english_pob_choice: Rebuke
  chosen_spanish: Corrige
  alternatives_spanish:
  - Reprende
  - Redarguye
  lexicon: BDAG
  rationale: ἔλεγξον expresa una corrección verbal directa. En español, «corrige» comunica la amonestación moral sin sonar tan dura como «reprende», pero conserva la exigencia de confrontar el error.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  lexicon: BDAG
  rationale: πλησίον en este contexto sapiencial designa al cercano o fellow human. «Prójimo» es el equivalente bíblico más natural y mantiene el sentido ético-relacional.
- source_word: πρὶν ἢ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes que
  - previo a
  lexicon: BDAG
  rationale: La frase marca prioridad temporal. «Antes de» es la forma más clara y natural en español.
- source_word: ἀπειλῆσαι
  english_pob_choice: you threaten
  chosen_spanish: amenazar
  alternatives_spanish:
  - hacer amenazas
  - proferir amenazas
  lexicon: LSJ
  rationale: El verbo significa amenazar; el español infinitivo tras «antes de» reproduce bien la progresión desde la corrección a la amenaza sin añadir matices ajenos.
- source_word: δὸς τόπον
  english_pob_choice: give place
  chosen_spanish: da lugar
  alternatives_spanish:
  - haz espacio
  - cede lugar
  - abre espacio
  lexicon: BDAG
  rationale: La expresión idiomática se conserva de modo bastante literal. «Dar lugar» mantiene la imagen de hacer espacio o ceder ante algo.
- source_word: νόμῳ
  english_pob_choice: the law
  chosen_spanish: a la ley
  alternatives_spanish:
  - a la instrucción
  - a la norma
  lexicon: BDAG
  rationale: Aquí νόμος apunta a la norma divina. «Ley» es la correspondencia más directa y funciona bien con «del Altísimo».
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Supremo
  - del Más Alto
  lexicon: BDAG
  rationale: Título divino estable en el lenguaje bíblico. «Altísimo» preserva la reverencia y el uso habitual en español bíblico.
theological_decisions:
- issue: Fuerza de δὸς τόπον νόμῳ Ὑψίστου
  english_pob_reading: an exhortation to yield to or make room for the law of the Most High as the controlling norm after rebuking one's neighbor
  chosen_spanish_reading: una exhortación a ceder espacio a la ley del Altísimo como norma rectora, después de corregir al prójimo
  alternative_spanish_readings:
  - dejar que la ley del Altísimo tenga lugar
  - someter la propia respuesta a la ley del Altísimo
  rationale: La metáfora de «dar lugar» deja visible la imagen original y, en contexto, comunica la idea de no escalar a amenazas sino abrir espacio a la guía normativa de la ley divina.
  doctrine_reference: Sabiduría bíblica / ética de la reprensión fraterna
translation_notes:
  revision_awareness: El texto griego ofrece un paralelismo entre corrección fraterna y la respuesta regulada por la ley del Altísimo. La versión española mantiene el imperativo directo, la secuencia temporal de πρὶν ἢ y la metáfora de δὸς τόπον con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Altísimo» para Ὑψίστου, coherente con el título divino bíblico.
  - «Prójimo» conserva el valor ético-relacional de πλησίον en un contexto sapiencial.
  - «Ley» mantiene la fuerza normativa de νόμος sin suavizarla a «instrucción».
