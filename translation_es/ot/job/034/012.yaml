translation:
  language: es
  text: Ciertamente[a], Dios no actúa con maldad, y el Todopoderoso no pervierte la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios no condena injustamente» o «Dios no declara culpable injustamente». El verbo hebreo puede tener un matiz judicial en algunos contextos.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַף אָמְנָם
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De hecho
  - En verdad
  - Sin duda
  lexicon: HALOT
  rationale: La combinación hebrea intensifica y afirma la declaración. «Ciertamente» reproduce bien el matiz aseverativo en español moderno sin sonar forzado.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Fuerte
  - Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino. «Dios» es la forma más natural y fiel en español, y mantiene el paralelismo con «el Todopoderoso».
- source_word: יַרְשִׁיעַ
  english_pob_choice: does not act wickedly
  chosen_spanish: no actúa con maldad
  alternatives_spanish:
  - no hace maldad
  - no condena injustamente
  - no declara culpable injustamente
  lexicon: HALOT
  rationale: El hifil puede tener un sentido forense de «declarar culpable/condenar», pero el paralelismo con la segunda cola favorece una afirmación más amplia de rectitud moral. «No actúa con maldad» conserva esa amplitud sin perder el peso verbal.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  - el Omnipotente
  - el Todo-suficiente
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el título divino se vierte al español. «El Todopoderoso» es el equivalente idiomático estándar y encaja bien en el paralelismo poético.
- source_word: יְעַוֵּת
  english_pob_choice: does not pervert
  chosen_spanish: no pervierte
  alternatives_spanish:
  - no tuerce
  - no distorsiona
  - no retuerce
  lexicon: HALOT
  rationale: El verbo expresa torcer, doblar o desviar. «No pervierte» es la correspondencia más estable en español para este uso jurídico-moral.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo justo
  - el derecho
  lexicon: HALOT
  rationale: En este contexto מִשְׁפָּט apunta a la justicia o al orden judicial recto. «La justicia» es la opción más clara y natural en español.
theological_decisions:
- issue: Sentido de יַרְשִׁיעַ respecto del carácter de Dios
  english_pob_reading: God does not act wickedly
  chosen_spanish_reading: Dios no actúa con maldad
  alternative_spanish_readings:
  - Dios no condena injustamente
  - Dios no declara culpable injustamente
  rationale: La POB en inglés preserva la tensión entre el posible matiz forense del verbo y el contexto amplio de rectitud divina. «No actúa con maldad» mantiene esa amplitud, mientras que las alternativas más judiciales quedan posibles pero no impuestas por el contexto inmediato.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y léxica sin resolverla artificialmente'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios. La solución española mantiene el paralelismo, la fuerza aseverativa inicial y la ambigüedad controlada del verbo יַרְשִׁיעַ.'
  spanish_consistency_notes:
  - Se conserva «Dios» y «el Todopoderoso» conforme al tratamiento estándar de los títulos divinos en español del proyecto.
  - «Justicia» mantiene el valor jurídico-moral de מִשְׁפָּט.
  - La nota al pie se ancla en el verbo con la alternativa forense documentada por la POB inglesa.
