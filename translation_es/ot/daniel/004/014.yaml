review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del arameo y conserva la mayoría de las decisiones del POB inglés: ‘sentencia’, ‘vigilantes’, ‘para que’, ‘el Altísimo gobierna’, y la cláusula final sobre establecer a uno sobre el reino. Sin embargo, no preserva plenamente la decisión léxica documentada para קַדִּישִׁין, que en el POB inglés se mantuvo como ‘holy ones’, no ‘saints’; en español ‘los santos’ introduce asociaciones eclesiales más fuertes que ‘los santos/holy ones’ en inglés quería evitar. También falta la nota cultural equivalente a la nota inglesa sobre ‘watchers’.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en dos puntos. ‘Los santos’ suena más interpretativo y eclesial de lo deseado en este contexto de corte celestial; ‘los santos seres’ sería raro, pero ‘los seres santos’ o mejor ‘los santos’ con nota no resuelve bien el problema. La opción más fiel y legible es ‘los santos[a? no],’ pero por el rationale del proyecto conviene evitarla; una solución natural es ‘los seres santos’, aunque algo marcada, o ‘los santos’ con nota explicativa. Además, la ausencia de la nota sobre ‘vigilantes’ empobrece la inteligibilidad del término técnico. ‘Al más humilde de los hombres’ es aceptable, aunque suaviza un poco ‘lowliest’; no obstante sigue dentro de tolerancia estilística en español.
  glossary_alignment: 'Alineación parcial. Se conserva ‘Altísimo’, ‘vigilantes’, ‘los hombres’, y no hay conflictos con terminología de Yahvé/Mesías/etc. El principal desajuste es קַדִּישִׁין: el registro del POB inglés pidió ‘holy ones’ precisamente para evitar ‘saints’; en español debe reflejarse esa cautela, idealmente con ‘los seres santos’. También debe añadirse la nota cultural para ‘vigilantes’ que el inglés preservó.'
  issues:
  - severity: medium
    issue: ‘los santos’ para קַדִּישִׁין no refleja bien la decisión documentada ‘holy ones’
    rationale: La justificación inglesa evita asociaciones eclesiales de ‘saints’. En español, ‘los santos’ las activa aún más. Conviene una formulación que mantenga seres celestiales santos sin colapsarlos en la categoría tradicional de ‘santos’.
  - severity: medium
    issue: Falta la nota cultural sobre ‘vigilantes’
    rationale: El POB inglés incluye una nota explícita indicando que ‘watchers’ es un término literal de Daniel para seres celestiales y que muchos lo entienden como ángeles. Esa información debe preservarse también en español.
  - severity: low
    issue: La nota alternativa usa ‘los santos’ también en la lectura alterna
    rationale: Si se ajusta el texto principal para evitar ‘santos’ en sentido eclesial, la nota debería armonizarse con esa misma cautela terminológica.
  revised_spanish_text: La sentencia es por decreto de los vigilantes[a], y la decisión por la palabra de los seres santos, para que los vivos sepan que el Altísimo gobierna en el reino de los hombres[c] y lo da a quien él quiere, y establece sobre él al más humilde de los hombres.
  revised_footnotes:
  - marker: a
    text: 'O: «La sentencia es por el decreto de los vigilantes, y la decisión es una petición por la palabra de los seres santos». El arameo es condensado, y שְׁאֵלְתָא puede entenderse como «petición» o «solicitud».'
    reason: lexical_alternative
  - marker: b
    text: «Vigilantes» es una traducción literal de un término propio de Daniel para seres celestiales; muchos intérpretes entienden que se refiere a ángeles.
    reason: cultural_note
  - marker: c
    text: 'O: «sobre el reino de los hombres» o «sobre el reino de la humanidad».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con la evidencia y con la racionalidad léxica documentada del POB inglés. ‘Los seres santos’ evita las asociaciones eclesiales de ‘los santos’ y refleja mejor la intención de ‘holy ones’. Además, se restituyen las notas b y c del inglés. Dado que toda nota debe ir anclada en el texto, se ancla [c] en ‘reino de los hombres’; la nota cultural [b] debe anclarse también en ‘vigilantes’, por lo que en una implementación final convendría colocar ambos marcadores allí en orden: ‘vigilantes[a][b]’.'
