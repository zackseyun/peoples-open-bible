translation:
  language: es
  text: Él limpiará un alma de los pecados[a] por confesión, por reconocimiento abierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él limpiará un alma de los pecados»; el griego, más literalmente, dice: «un alma en pecados».'
    reason: lexical_alternative
  - marker: b
    text: «Reconocimiento abierto» también puede traducirse como «plena confesión» o «declaraciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρίσει
  english_pob_choice: will cleanse
  chosen_spanish: limpiará
  alternatives_spanish:
  - purificará
  - hará limpio
  lexicon: BDAG
  rationale: καθαρίζω expresa limpieza o purificación. En español, «limpiará» conserva la acción futura y la idea moral de limpieza sin volverse demasiado ritualista.
- source_word: ἐν ἁμαρτίαις
  english_pob_choice: from sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de entre los pecados
  - en los pecados
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, el contexto y la revisión inglesa favorecen entender una liberación/limpieza respecto de los pecados. «De los pecados» comunica esa relación de manera natural en español sin perder el vínculo con la condición pecaminosa.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: BDAG
  rationale: En este contexto penitencial y religioso, «alma» preserva mejor el peso espiritual y moral que las alternativas más amplias.
- source_word: ἐν ἐξομολογήσει
  english_pob_choice: by confession
  chosen_spanish: por confesión
  alternatives_spanish:
  - con confesión
  - mediante confesión
  lexicon: LSJ
  rationale: El sustantivo se entiende aquí como confesión de pecados. «Por confesión» refleja bien el medio o acompañamiento de la limpieza y mantiene la sobriedad del registro.
- source_word: ἐν ἐξαγορίαις
  english_pob_choice: by open acknowledgment
  chosen_spanish: por abierta declaración
  alternatives_spanish:
  - por plena confesión
  - por declaraciones abiertas
  - por manifestación abierta
  lexicon: LSJ
  rationale: El término es raro y parece intensificar la confesión con una declaración pública o abierta. «Abierta declaración» conserva esa fuerza sin reducirlo a un simple sinónimo de la primera expresión.
theological_decisions:
- issue: Relación entre limpieza y confesión
  english_pob_reading: The verse presents cleansing as occurring in connection with confession and open acknowledgment of sin.
  chosen_spanish_reading: El versículo presenta la limpieza como vinculada a la confesión y a la declaración abierta del pecado.
  alternative_spanish_readings:
  - La limpieza ocurre por medio de la confesión y la declaración abierta.
  - El texto podría leerse de manera más dinámica como limpieza de los pecados mediante confesión.
  rationale: El griego vincula la limpieza con la confesión, pero no define un mecanismo ritual posterior. La traducción conserva la lógica penitencial sin introducir precisiones doctrinales no expresadas por el texto.
  doctrine_reference: Penitencia bíblica; confesión de pecados sin especificación sacramental
- issue: Sentido de ψυχή
  english_pob_reading: Rendered as “soul” in the main text.
  chosen_spanish_reading: Se mantiene «alma» en el texto principal.
  alternative_spanish_readings:
  - vida
  - yo
  rationale: «Alma» preserva mejor el registro espiritual del pasaje que opciones más generales.
  doctrine_reference: Antropología bíblica
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que cambió la idea de “in sins” por “from sins” para un sentido más natural con καθαρίσει, pero conserva la doble paralelismo de confesión y declaración abierta.
  spanish_consistency_notes:
  - Se usa «alma» para ψυχή en coherencia con el contexto penitencial.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene el paralelismo de dos expresiones distintas para no borrar la tensión léxica entre ἐξομολογήσει y ἐξαγορίαις.
