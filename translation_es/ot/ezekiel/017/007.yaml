translation:
  language: es
  text: Y hubo otra águila grande, de grandes alas y de abundante plumaje[a]; y he aquí, esta vid inclinó sus raíces hacia él y extendió sus ramas hacia él[b], para que él la regara[c] desde los bancales donde estaba plantada[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buitre» para נֶשֶׁר; el hebreo puede designar más ampliamente un ave rapaz grande, aunque «águila» encaja mejor con la imagen de esta alegoría.
    reason: lexical_alternative
  - marker: b
    text: O «volvió sus raíces hacia él y extendió sus brotes hacia él».
    reason: lexical_alternative
  - marker: c
    text: O «a fin de regarla».
    reason: previous_rendering
  - marker: d
    text: O «desde los bancales de su plantación» o «desde los bancales donde fue plantada».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶשֶׁר
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - buitre
  lexicon: HALOT
  rationale: El término hebreo puede designar un ave rapaz grande en general, pero en el contexto de Ezequiel 17 la imagen real-imperial se entiende mejor con «águila». En español, «águila» conserva esa fuerza imagética y sigue la decisión contextual de la POB inglesa.
- source_word: גָּדוֹל גְּדֹל כְּנָפַיִם
  english_pob_choice: great ... with great wings
  chosen_spanish: grande, de grandes alas
  alternatives_spanish:
  - grande, de alas largas
  - grandiosa, alada
  lexicon: HALOT
  rationale: La duplicación de גדול intensifica la descripción. En español, «grande, de grandes alas» conserva esa repetición enfática sin sonar artificial.
- source_word: וְרַב נוֹצָה
  english_pob_choice: much plumage
  chosen_spanish: de mucho plumaje
  alternatives_spanish:
  - de muchas plumas
  - plumífero
  lexicon: HALOT
  rationale: נוֹצָה se refiere al plumaje o las plumas del ave. «De mucho plumaje» mantiene el valor descriptivo y la densidad del original, en línea con la POB inglesa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y he aquí que
  lexicon: HALOT
  rationale: La fórmula introduce un giro vívido en la alegoría. «Y he aquí» reproduce bien ese efecto discursivo en español bíblico moderno.
- source_word: כָּפְנָה
  english_pob_choice: bent
  chosen_spanish: inclinó
  alternatives_spanish:
  - volvió
  - torció
  lexicon: HALOT
  rationale: El verbo expresa una orientación o giro hacia algo. «Inclinó» conserva la imagen física de la vid reorientándose hacia el segundo águila sin sobrecargar la frase.
- source_word: שָׁרֳשֶׁיהָ עָלָיו
  english_pob_choice: its roots toward him
  chosen_spanish: sus raíces hacia él
  alternatives_spanish:
  - sus raíces a él
  - sus raíces sobre él
  lexicon: HALOT
  rationale: Con על aquí el sentido es direccional, no de contacto literal. «Hacia él» preserva esa orientación y evita una lectura demasiado material de la preposición.
- source_word: וְדָלִיּוֹתָיו שִׁלְחָה לּוֹ
  english_pob_choice: sent out its branches to him
  chosen_spanish: extendió sus ramas hacia él
  alternatives_spanish:
  - envió sus sarmientos hacia él
  - alargó sus ramas hacia él
  lexicon: HALOT
  rationale: La imagen es la de la vid expandiendo su crecimiento hacia el águila. «Extendió sus ramas» es natural en español y mantiene la metáfora vegetal; «ramas» evita forzar un tecnicismo innecesario.
- source_word: לְהַשְׁקוֹת אוֹתָהּ
  english_pob_choice: that he might water it
  chosen_spanish: para que la regara
  alternatives_spanish:
  - a fin de regarla
  - para regarla
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. En español, «para que la regara» deja claro que el águila es el sujeto implícito de la acción, como en la lectura revisada de la POB.
- source_word: מֵעֲרֻגוֹת מַטָּעָהּ
  english_pob_choice: from the beds where it was planted
  chosen_spanish: desde los bancales donde estaba plantada
  alternatives_spanish:
  - desde los surcos donde fue plantada
  - desde los bancales de su plantación
  lexicon: HALOT
  rationale: עֲרֻגוֹת se refiere a bancales o camas de cultivo, y מַטָּעָהּ a su plantación. «Desde los bancales donde estaba plantada» sigue la revisión inglesa que vincula la frase con el lugar de origen de la vid, no con el objeto de «regar».
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB, que corrigió la relación sintáctica de «from the beds where it was planted» para que modifique la acción de la vid y no el infinitivo «regar». También se tomó en cuenta la nota previa sobre el posible valor alternativo de נֶשֶׁר y la tensión entre raíces y ramas en la imagen, manteniendo ambas imágenes en español sin eliminar la variación. '
  spanish_consistency_notes:
  - Se mantiene «águila» para נֶשֶׁר en coherencia con la decisión contextual del proyecto.
  - Se conserva «Yahvé» en el sistema general del proyecto, aunque este versículo no lo contiene.
  - «Ramas» se usa como equivalente amplio y readable para דָלִיּוֹתָיו; no se introdujo un tecnicismo agrícola que oscureciera la imagen.
  - 'La preposición «desde» en la frase final refleja el punto revisado del inglés: el complemento indica el lugar de procedencia/relación de la vid, no el medio por el que el águila la riega.'
