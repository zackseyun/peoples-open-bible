    issue: La nota [a] está anclada en 'ahora' pero comenta 'den alabanza' / תְּנוּ תוֹדָה.
    rationale: El marcador debe aparecer en la palabra o frase pertinente según la disciplina de salida requerida. Tal como está, induce a pensar que la variante afecta 'ahora' en vez del modismo verbal hebreo.
  - severity: medium
    issue: Falta la nota contextual sobre 'mujeres extranjeras' como alternativa 'esposas extranjeras'.
    rationale: El English POB preserva esta alternativa significativa; el borrador español incluso la documenta en sus decisiones léxicas y teológicas, pero no la refleja en las notas del texto.
  - severity: low
