translation:
  language: es
  text: 'Entonces los filisteos dijeron: «¿Quién hizo esto?». Y dijeron: «Sansón, el yerno del timnita, porque tomó a su mujer y se la dio a su compañero[a]». Entonces los filisteos subieron y la quemaron a ella y a su padre con fuego[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a su amigo”. El término hebreo puede denotar compañero o amigo; algunos lo entienden más específicamente en el contexto de la boda como padrino o acompañante del novio.
    reason: lexical_alternative
  - marker: b
    text: Lit. “la quemaron a ella y a su padre con fuego”.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos, el pueblo filisteo
  lexicon: HALOT
  rationale: Se conserva el этnónimo estándar en español, con artículo plural natural y sin añadir explicaciones no presentes en el texto.
- source_word: מִי עָשָׂה זֹאת
  english_pob_choice: Who did this?
  chosen_spanish: ¿Quién hizo esto?
  alternatives_spanish:
  - ¿Quién ha hecho esto?
  - ¿Quién hizo tal cosa?
  lexicon: HALOT
  rationale: El español narrativo fluye bien con pretérito simple, y 'esto' mantiene la referencia inmediata al acto sin ampliarla.
- source_word: חֲתַן הַתִּמְנִי
  english_pob_choice: the Timnite’s son-in-law
  chosen_spanish: el yerno del timnita
  alternatives_spanish:
  - el suegro/nuero del timnita
  - el esposo de la hija del timnita
  lexicon: HALOT
  rationale: חָתָן puede ser 'yerno' o 'novio/esposo en relación de alianza'. Aquí la relación ya es la del esposo de la hija del timnita, por lo que 'yerno' comunica con claridad la relación matrimonial implicada.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del señalamiento; 'porque' es la causal directa y natural en español.
- source_word: לָקַח אֶת אִשְׁתּוֹ
  english_pob_choice: he took his wife
  chosen_spanish: tomó a su mujer
  alternatives_spanish:
  - tomó a su esposa
  - se llevó a su mujer
  lexicon: HALOT
  rationale: '''Tomó'' conserva el verbo verbalmente breve del hebreo, y ''su mujer'' refleja la relación marital sin sobreespecificar. Se evita ''esposa'' para mantener el registro narrativo y la posible dureza del episodio.'
- source_word: וַיִּתְּנָהּ לְמֵרֵעֵהוּ
  english_pob_choice: and gave her to his companion
  chosen_spanish: se la dio a su compañero
  alternatives_spanish:
  - se la dio a su amigo
  - se la dio a su camarada
  lexicon: HALOT
  rationale: '''Compañero'' preserva la amplitud semántica de מֵרֵעַ, tal como la POB inglesa evita precisar ''amigo'' o ''best man'' sin base explícita en el texto.'
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron allá arriba
  - ascendieron
  lexicon: HALOT
  rationale: '''Subieron'' conserva el movimiento ascendente idiomático del hebreo y funciona de manera natural en español bíblico.'
- source_word: וַיִּשְׂרְפ֥וּ אוֹתָ֛/הּ וְ/אֶת אָבִ֖י/הָ בָּ/אֵֽשׁ
  english_pob_choice: burned her and her father with fire
  chosen_spanish: la quemaron a ella y a su padre con fuego
  alternatives_spanish:
  - la quemaron junto con su padre con fuego
  - los quemaron a ambos con fuego
  lexicon: HALOT
  rationale: Se retiene la construcción enfática 'con fuego' para reflejar el hebreo y la decisión inglesa de no suavizarla. 'A ella' explicita el objeto pronominal femenino del hebreo y evita ambigüedad en español.
theological_decisions:
- issue: Traducción de חֲתַן y la relación de Samson con el timnita
  english_pob_reading: the Timnite’s son-in-law
  chosen_spanish_reading: el yerno del timnita
  alternative_spanish_readings:
  - el esposo de la hija del timnita
  - el novio del timnita
  rationale: No se debe convertir el término en una designación eclesiástica o ceremonial. 'Yerno' comunica la relación familiar real que el contexto ya había establecido, sin borrar la tensión de que el vocablo hebreo también puede abarcar el campo de 'novio/bridegroom'.
  doctrine_reference: Lexical theology / narrative context, not a doctrinal issue
- issue: Conservación de la violencia explícita de la clausula final
  english_pob_reading: burned her and her father with fire
  chosen_spanish_reading: la quemaron a ella y a su padre con fuego
  alternative_spanish_readings:
  - los quemaron con fuego
  - la incineraron junto con su padre
  rationale: La frase conserva la crudeza del texto fuente y la nota inglesa. No se debe atenuar el acto ni reemplazarlo por una formulación más general que borre el medio ('con fuego').
  doctrine_reference: Faithful narrative preservation / textual ethics
translation_notes:
  revision_awareness: 'Se siguió el sentido del texto hebreo y el audit trail inglés sin cambios sustantivos respecto de la lectura base: se mantuvo el etnónimo, la causa con ''porque'', el valor relacional de חֲתַן y la clausula final enfática ''con fuego''.'
  spanish_consistency_notes:
  - Se usa 'filisteos' de forma consistente para פְלִשְׁתִּים.
  - Se prefirió 'yerno' para חֲתַן porque el contexto narrativo ya define la relación matrimonial.
  - Se mantuvo el contraste de género en 'la quemaron a ella y a su padre' para respetar el objeto femenino explícito del hebreo.
  - Se evitó 'SEÑOR' u այլ terminología no pertinente, ya que este versículo no contiene el nombre divino.
