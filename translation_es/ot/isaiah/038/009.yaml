translation:
  language: es
  text: 'Escrito de Ezequías, rey de Judá, cuando había estado enfermo y se había recuperado[a] de su enfermedad[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se había restablecido». El verbo hebreo dice literalmente «y vivió», pero aquí significa que se recuperó.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de/desde su enfermedad». La expresión hebrea indica que se recuperó.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְתָּב
  english_pob_choice: A writing
  chosen_spanish: Escritura
  alternatives_spanish:
  - Escrito
  - Escritura literaria
  - Poema
  - Registro
  lexicon: HALOT
  rationale: El término hebreo denota una composición escrita sin precisar el género. En español, «Escritura» conserva la amplitud semántica de «A writing» y funciona bien como encabezado breve; «Poema» o «Registro» cargarían el género de modo indebido.
- source_word: לְחִזְקִיָּהוּ
  english_pob_choice: of Hezekiah
  chosen_spanish: de Ezequías
  alternatives_spanish:
  - para Ezequías
  - perteneciente a Ezequías
  lexicon: HALOT
  rationale: La preposición ל en este encabezado indica atribución o asociación. «De Ezequías» reproduce naturalmente esa relación en español sin volverla dativa de destinatario.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  - rey sobre Judá
  lexicon: HALOT
  rationale: La cadena constructa identifica oficio y reino de manera directa. «Rey de Judá» es la forma natural y fiel en español.
- source_word: בַּחֲלֹתוֹ
  english_pob_choice: when he had been sick
  chosen_spanish: cuando había estado enfermo
  alternatives_spanish:
  - cuando estaba enfermo
  - en su enfermedad
  - cuando enfermó
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. «Cuando había estado enfermo» conserva el marco retrospectivo del encabezado sin introducir un matiz ingresivo que el hebreo no exige.
- source_word: וַיְחִי
  english_pob_choice: had recovered
  chosen_spanish: había recuperado[b]
  alternatives_spanish:
  - vivió
  - revivió
  - se restableció
  lexicon: HALOT
  rationale: En combinación con «de su enfermedad», el verbo literalmente «vivió» expresa recuperación. «Había recuperado» sigue el sentido idiomático del audit trail; se mantiene la nota porque el hebreo dice literalmente «y vivió desde su enfermedad».
- source_word: מֵחָלְיוֹ
  english_pob_choice: from his sickness
  chosen_spanish: de su enfermedad
  alternatives_spanish:
  - de su mal
  - de su dolencia
  - desde su enfermedad
  lexicon: HALOT
  rationale: 'El מן marca origen/separación: recuperación desde un estado de enfermedad. «De su enfermedad» es idiomático en español y conserva el valor de origen, aunque la nota aclara la literalidad «desde su enfermedad».'
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del control cruzado y conserva la tensión léxica principal del hebreo: el encabezado es una composición escrita atribuida a Ezequías, y el cierre usa un verbo de vida para expresar recuperación. Se mantiene la lectura idiomática en el cuerpo y la literalidad en la nota.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Escritura» preserva la amplitud genérica de מִכְתָּב sin fijarlo como poema.
  - Se mantuvo «Judá» como nombre propio geográfico-político sin expansión interpretativa.
  - La nota sobre «vivió» conserva la tensión entre traducción natural y literalidad hebrea.
