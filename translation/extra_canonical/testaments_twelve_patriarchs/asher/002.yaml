translation:
  text: '1 There is[a], then, a soul that in its words turns away the good for the sake of evil, and leads the outcome of the matter into wickedness.


    2 There is a man who does not pity his own servants; and though this is double-faced, the whole of it is evil.


    3 And there is a man who loves one who acts wickedly, because he himself also chooses to die in evil on that man''s account; and concerning this it is plain that he is double-faced, but the whole of it is an evil deed.


    4 Even if they are in love, they are in wickedness when they hide evil under a good name; but the end of the deed comes to evil.


    5 Another steals[b], acts unjustly, plunders, is greedy, and yet shows mercy to the poor. This too is double-faced, but the whole of it is evil.


    6 The one who defrauds his neighbor provokes God, swears falsely by the Most High, and sets aside the Lord, the giver of the law, yet gives rest to the poor.


    7 He stains the soul and makes the body bright; he kills many and shows mercy to a few. This too is double-faced, but the whole of it is evil.


    8 Another commits adultery and practices sexual immorality, and abstains from foods. And while fasting he does evil, and by the force of his wealth he drags many down, and out of his excessive wickedness performs the commandments. This is double-faced, but the whole of it is evil.


    9 Such people are like hares, because they are half clean, but in truth they are unclean.


    10 For God also, in the tablets of the commandments[c], has declared it so.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The comparison to hares reflects Jewish purity categories: the hare was regarded as showing one outward sign associated with cleanness while still being unclean overall. Asher uses the image for people whose conduct appears mixed or partly virtuous.'
    reason: cultural_note
    anchor_ref: '2:9'
  - marker: b
    text: The Greek excerpt provided for this chapter breaks off at the start of verse 10 ('For God also, in the ...'). The translation reflects the likely continuation about the tablets of the commandments, but the line should be checked against the full witness in revision.
    reason: textual_variant
    anchor_ref: '2:10'
  - marker: c
    text: Or 'overreaches his neighbor.' The Greek term can denote greed generally or exploitative taking advantage of another person.
    reason: lexical_alternative
    anchor_ref: '2:6'
lexical_decisions:
- source_word: διπρόσωπον
  chosen: double-faced
  alternatives:
  - two-faced
  - double-minded
  lexicon: LSJ
  rationale: The chapter's central vice is moral duplicity expressed in outwardly mixed behavior. 'Double-faced' preserves the image of having two faces better than the more idiomatic 'two-faced,' and avoids conflation with inward vacillation implied by 'double-minded.'
- source_word: τὸ δὲ ὅλον πονηρόν / κακόν
  chosen: the whole of it is evil
  alternatives:
  - it is altogether evil
  - the whole thing is wicked
  lexicon: LSJ
  rationale: This repeated refrain needs stable rendering. 'The whole of it is evil' preserves the summative force of ὅλον while sounding elevated and readable.
- source_word: οἰκτείρει
  chosen: pity
  alternatives:
  - have compassion on
  - show mercy to
  lexicon: LSJ
  rationale: In v.2 the point is failure of humane feeling toward one's own servants. 'Pity' is direct and matches the emotional register; 'show mercy' is reserved elsewhere in the chapter for ἐλεεῖ.
- source_word: λειτουργοὺς αὐτοῦ
  chosen: his own servants
  alternatives:
  - his attendants
  - his ministers
  lexicon: LSJ
  rationale: In this ethical testament context the referent is household or personal subordinates, not cultic ministers. 'Servants' fits the social setting better than the more technical 'ministers.'
- source_word: ἀγαπῶν τὸν πονηρευόμενον
  chosen: loves one who acts wickedly
  alternatives:
  - loves the evildoer
  - loves one engaged in wickedness
  lexicon: LSJ
  rationale: The participle denotes active wrongdoing. This rendering keeps the verbal force without over-condensing it into a label.
- source_word: ἀποθανεῖν αἱρεῖται ἐν κακῷ
  chosen: chooses to die in evil
  alternatives:
  - chooses death in wickedness
  - chooses to perish in evil
  lexicon: LSJ
  rationale: The phrase is stark and should remain so. 'Die in evil' preserves the testamentary warning tone without interpretive expansion.
- source_word: συγκρύπτοντες τὸ κακὸν ὃ ὀνόματι ὡς καλὸν φαίνεται
  chosen: hide evil under a good name
  alternatives:
  - conceal evil as though it were good
  - cover over evil with a noble name
  lexicon: LSJ
  rationale: This captures the rhetorical contrast between evil reality and good appearance, preserving the moral critique of relabeling vice as virtue.
- source_word: πλεονεκτεῖ / ὁ πλεονεκτῶν
  chosen: is greedy / defrauds
  alternatives:
  - covets
  - takes advantage of
  lexicon: LSJ
  rationale: The term can denote greed or overreaching. In v.5 the vice list favors 'is greedy'; in v.6 with an object ('his neighbor') the sense of exploitative overreaching is better brought out by 'defrauds.' This is a documented contextual variance.
- source_word: ἐπιορκεῖ
  chosen: swears falsely
  alternatives:
  - commits perjury
  - breaks an oath
  lexicon: LSJ
  rationale: '''Swears falsely'' is accessible modern English and preserves the explicit oath dimension.'
- source_word: τὸν ἐντολέα τοῦ νόμου Κύριον ἀθετεῖ
  chosen: has no regard for the Lord, the giver of the law
  alternatives:
  - rejects the Lord who gave the law
  - sets aside the Lord, the lawgiver
  lexicon: LSJ
  rationale: ἀθετεῖ conveys setting aside or nullifying. 'Has no regard for' reads naturally in English while still expressing practical repudiation; 'giver of the law' makes ἐντολέα τοῦ νόμου intelligible in context.
- source_word: ἀναπαύει
  chosen: gives rest to
  alternatives:
  - refreshes
  - relieves
  lexicon: LSJ
  rationale: The irony is that one may relieve the poor while otherwise violating God. 'Gives rest to' preserves the concrete verbal image.
- source_word: σπιλοῖ
  chosen: stains
  alternatives:
  - defiles
  - spots
  lexicon: LSJ
  rationale: The contrast with making the body bright is vivid. 'Stains' keeps the imagery sharp and parallel.
- source_word: λαμπρύνει
  chosen: makes ... bright
  alternatives:
  - adorns
  - beautifies
  lexicon: LSJ
  rationale: The point is outward polish over against inward stain. 'Makes the body bright' preserves the visual contrast more literally than 'beautifies.'
- source_word: μοιχεύει καὶ πορνεύει
  chosen: commits adultery and practices sexual immorality
  alternatives:
  - commits adultery and fornicates
  lexicon: LSJ
  rationale: The paired sexual sins should remain distinct. 'Practices sexual immorality' is clearer for modern readers than 'fornicates' while preserving the vice-list tone.
- source_word: ἀπέχεται ἐδεσμάτων
  chosen: abstains from foods
  alternatives:
  - keeps from foods
  - refrains from eating certain foods
  lexicon: LSJ
  rationale: The phrase likely refers to ascetic or ritual abstinence. 'Abstains from foods' stays close to the Greek without over-specifying.
- source_word: τῇ δυναστείᾳ τοῦ πλούτου πολλοὺς κατασύρει
  chosen: by the force of his wealth he drags many down
  alternatives:
  - through the power of wealth he ensnares many
  - by his rich influence he pulls many down
  lexicon: LSJ
  rationale: The phrase depicts oppressive social power. 'By the force of his wealth' and 'drags many down' preserve both means and effect.
- source_word: ἐκ τῆς ὑπερόγκου κακίας ποιεῖ τὰς ἐντολάς
  chosen: out of his excessive wickedness performs the commandments
  alternatives:
  - from overgrown wickedness keeps the commandments
  - in monstrous wickedness practices the commandments
  lexicon: LSJ
  rationale: 'The line is intentionally paradoxical: outward commandment-keeping can coexist with deep evil. The translation preserves that jarring juxtaposition rather than smoothing it.'
- source_word: δασύποδες
  chosen: hares
  alternatives:
  - rabbit-like creatures
  lexicon: LSJ
  rationale: The term is the standard Greek word for hare. The comparison depends on the hare's status in Jewish purity discourse.
- source_word: ἐξ ἡμισείας εἰσὶ καθαροί
  chosen: they are half clean
  alternatives:
  - they are clean in part
  - they are partly clean
  lexicon: LSJ
  rationale: The phrase should sound proverbial and pointed. 'Half clean' is concise and preserves the irony.
- source_word: πλάξιν τῶν ἐντολῶν
  chosen: the tablets of the commandments
  alternatives:
  - the tablets of the law
  lexicon: LSJ
  rationale: Although only the beginning of v.10 is extant here, the likely phrase evokes the Sinai tablets. 'Tablets of the commandments' remains close to the Greek wording and avoids importing later formulaic English.
