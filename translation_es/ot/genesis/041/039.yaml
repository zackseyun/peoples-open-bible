translation:
  language: es
  text: 'Entonces el faraón dijo a José: «Puesto que[a] Dios te ha hecho saber todo esto, no hay nadie tan perspicaz y sabio como tú».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después de que». El hebreo אַחֲרֵי puede traducirse más formalmente como «después de», aunque aquí expresa la base de la conclusión del faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la acción; «Entonces ... dijo» conserva la secuencia con fluidez natural en español.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: En español bíblico actual es claro y natural usar artículo definido al referirse al rey de Egipto en narración.
- source_word: אַחֲרֵי
  english_pob_choice: Since
  chosen_spanish: Después de que
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: El hebreo admite una relación temporal/formal con valor causal inferido; «Después de que» conserva la base literal documentada por la nota inglesa, mientras deja implícito el valor inferencial del contexto.
- source_word: הוֹדִיעַ
  english_pob_choice: has made ... known
  chosen_spanish: ha hecho saber
  alternatives_spanish:
  - ha dado a conocer
  - ha informado
  lexicon: HALOT
  rationale: El causativo de ידע se expresa bien con «hacer saber»; mantiene la idea de que Dios causó el conocimiento en José.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  lexicon: HALOT
  rationale: 'El contexto inmediato apunta a un referente singular: la fuente de la revelación a José. En español, «Dios» comunica ese sentido con naturalidad.'
- source_word: אֶת כָּל זֹאת
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  lexicon: HALOT
  rationale: «Todo esto» resume de forma natural el conjunto del asunto interpretado y revelado a José.
- source_word: אֵין
  english_pob_choice: there is no one
  chosen_spanish: no hay nadie
  alternatives_spanish:
  - no existe nadie
  lexicon: HALOT
  rationale: La negación existencial se vierte idiomáticamente en español con «no hay nadie».
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: perspicaz
  alternatives_spanish:
  - entendido
  - prudente
  lexicon: HALOT
  rationale: «Perspicaz» comunica discernimiento perceptivo e inteligencia práctica, muy acorde al juicio de Faraón sobre José.
- source_word: וְחָכָם
  english_pob_choice: and wise
  chosen_spanish: y sabio
  alternatives_spanish:
  - y entendido
  - y hábil
  lexicon: HALOT
  rationale: «Sabio» conserva el valor habitual de חכם y su pareja con «perspicaz» reproduce bien la doble caracterización.
- source_word: כָּמוֹךָ
  english_pob_choice: as you
  chosen_spanish: como tú
  alternatives_spanish:
  - igual que tú
  lexicon: HALOT
  rationale: En español, la comparación negativa suena natural como «tan ... como tú».
theological_decisions:
- issue: Referencia de אֱלֹהִים en boca de Faraón
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: Aunque אֱלֹהִים puede ser formalmente plural, el contexto narrativo y la declaración de Faraón se refieren al ser divino que reveló la interpretación a José; «Dios» preserva esa lectura.
  doctrine_reference: Monoteísmo bíblico / contexto inmediato
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado en el paquete fuente: sin cambios necesarios y alta concordancia entre revisores. La redacción española conserva la fuerza causal/temporal debatida en אַחֲרֵי mediante una formulación explícita en el texto principal y una nota alternativa que mantiene la posibilidad formal de «después de».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en el habla de Faraón conforme al contexto.
  - Se evita «Señor» como sustituto de Yahvé, porque este versículo no contiene el tetragrámaton.
  - «Perspicaz y sabio» reproduce la doble caracterización נָבוֹן / חָכָם sin diluirla.
