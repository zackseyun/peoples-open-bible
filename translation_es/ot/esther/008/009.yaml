  text: וַ/יִּקָּרְא֣וּ סֹפְרֵֽי הַ/מֶּ֣לֶךְ בָּֽ/עֵת הַ֠/הִיא בַּ/חֹ֨דֶשׁ הַ/שְּׁלִישִׁ֜י הוּא חֹ֣דֶשׁ סִיוָ֗ן בִּ/שְׁלוֹשָׁ֣ה וְ/עֶשְׂרִים֮ בּ/וֹ֒ וַ/יִּכָּתֵ֣ב כְּֽ/כָל אֲשֶׁר צִוָּ֣ה מָרְדֳּכַ֣י אֶל הַ/יְּהוּדִ֡ים וְ/אֶ֣ל הָ/אֲחַשְׁדַּרְפְּנִֽים וְ/הַ/פַּחוֹת֩ וְ/שָׂרֵ֨י הַ/מְּדִינ֜וֹת אֲשֶׁ֣ר מֵ/הֹ֣דּוּ וְ/עַד כּ֗וּשׁ שֶׁ֣בַע וְ/עֶשְׂרִ֤ים וּ/מֵאָה֙ מְדִינָ֔ה מְדִינָ֤ה וּ/מְדִינָה֙ כִּ/כְתָבָ֔/הּ וְ/עַ֥ם וָ/עָ֖ם כִּ/לְשֹׁנ֑/וֹ וְ/אֶ֨ל הַ/יְּהוּדִ֔ים כִּ/כְתָבָ֖/ם וְ/כִ/לְשׁוֹנָֽ/ם־־־־־־־׀־־׃
