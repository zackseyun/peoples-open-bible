    reason: alternative_reading
  revision_rationale: Se ajusta un giro español poco natural ('por su propio camino' -> 'a su propio camino') para reflejar mejor el hebreo y mejorar la legibilidad. También se afina la nota [c] para corresponder con mayor fidelidad a la alternativa documentada en inglés ('from every quarter') en español natural. El resto del borrador es fiel y adecuado.
