  glossary_alignment: 'No hay términos teológicos mayores en juego. La revisión debe alinearse con la decisión léxica auditada: כַּף = ''fuente''/''plato'' ritual pequeño; עֲשָׂרָה זָהָב = ''de diez siclos[a] de oro''; קְטֹרֶת = ''incienso''.'
