translation:
  language: es
  text: Entonces yo era insensato y no sabía; era como una bestia[a] delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo plural «bestias»; probablemente una expresión intensiva o colectiva, con sentido de «como una bestia» o «bestialmente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: Then I
  chosen_spanish: Entonces yo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: El waw consecutivo introduce la confesión como consecuencia reflexiva del contexto previo; «Entonces» conserva esa relación mejor que un simple «Y», y «yo» explicita el sujeto en español sin alterar el sentido.
- source_word: בַּעַר
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - bruto
  - necio
  - falto de entendimiento
  lexicon: HALOT
  rationale: El término hebreo describe torpeza de juicio y falta de discernimiento. «Insensato» comunica esa carga moral e intelectual con dignidad en español; evita el arcaísmo de «bruto» y la aspereza de «necio».
- source_word: וְלֹא אֵדָע
  english_pob_choice: and did not know
  chosen_spanish: y no entendía
  alternatives_spanish:
  - y no sabía
  - y no conocía
  - y no comprendía
  lexicon: HALOT
  rationale: Aunque el verbo ידע es literalmente «conocer», aquí el paralelismo con «insensato» pide en español una expresión de falta de entendimiento. «No entendía» conserva el valor cognitivo sin volver la frase pesada o redundante.
- source_word: בְּהֵמוֹת
  english_pob_choice: like a beast
  chosen_spanish: como una bestia
  alternatives_spanish:
  - como bestia
  - como un animal
  - bestialmente
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar de modo intensivo o colectivo. En español, «como una bestia» reproduce bien la imagen autodenigrante y suena natural; «bestias» en plural sería menos idiomático en esta comparación.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: era
  alternatives_spanish:
  - fui
  - había sido
  lexicon: HALOT
  rationale: El qatal expresa aquí un estado pasado. En español, «era» fluye mejor dentro de la confesión y mantiene el valor descriptivo de condición anterior.
- source_word: עִמָּךְ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - contigo
  - frente a ti
  lexicon: HALOT
  rationale: Aunque el hebreo permite el sentido de relación/presencia, el audit trail inglés optó por «before you» por el giro idiomático. «Delante de ti» conserva esa presencia ante Dios en un español claro y sobrio sin forzar la idea de mera compañía.
theological_decisions:
- issue: Fuerza de la comparación con la bestia en presencia de Dios
  english_pob_reading: 'A simile of beastlike senselessness: ''I was like a beast before you.'''
  chosen_spanish_reading: 'Una comparación de insensatez vergonzosa: «era como una bestia delante de ti».'
  alternative_spanish_readings:
  - era como una bestia contigo
  - era como un animal delante de ti
  - era bestial delante de ti
  rationale: El versículo no enseña una antropología esencialista, sino una confesión humilde de torpeza espiritual e intelectual. Mantener la similitud con «como una bestia» preserva la fuerza del reproche sin exagerarla ni suavizarla.
  doctrine_reference: Salmo 73:22; traducción de simile/confesión
- issue: Elección de una expresión española para ידע en paralelo con בַּעַר
  english_pob_reading: and did not know
  chosen_spanish_reading: y no entendía
  alternative_spanish_readings:
  - y no sabía
  - y no comprendía
  rationale: En este contexto, «conocer» sería demasiado neutro y podría debilitar la línea paralela. «Entender» expresa mejor la falta de discernimiento que acompaña a «insensato», manteniendo la tensión textual entre conocimiento y sabiduría.
  doctrine_reference: Salmo 73:22; semántica de ידע
- issue: Relación espacial/presencial de עִמָּךְ
  english_pob_reading: before you
  chosen_spanish_reading: delante de ti
  alternative_spanish_readings:
  - ante ti
  - con respecto a ti
  - en tu presencia
  rationale: El hebreo admite una presencia relacional, pero el inglés auditado ya resolvió la expresión como situación ante Dios. «Delante de ti» conserva esa presencia sin desplazar el énfasis a una mera proximidad física.
  doctrine_reference: Salmo 73:22; idiomática de עִמָּךְ
translation_notes:
  revision_awareness: El inglés POB pasó de «with you» a «before you» en la revisión más reciente para reflejar mejor el giro idiomático de עִמָּךְ. La versión española sigue esa decisión con «delante de ti», evitando un calco de compañía que podría ocultar el matiz de presencia ante Dios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la norma del proyecto solo cuando corresponda; aquí el versículo no contiene el nombre divino, sino un pronombre de segunda persona, por lo que se traduce de forma directa.
  - Se usó «insensato» y «entendía» para conservar el paralelismo semántico entre falta de juicio y falta de comprensión.
  - «Bestia» se mantuvo en singular en el cuerpo por naturalidad del español, con nota que preserva la observación del plural hebreo.
  - «Delante de ti» armoniza con la revisión inglesa y con un registro bíblico claro en español, sin recurrir a una fórmula litúrgica más fija que el hebreo no exige.
