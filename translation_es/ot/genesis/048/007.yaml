base_translation:
  language: en
  yaml_path: translation/ot/genesis/048/007.yaml
  text: As for me[a], when I came from Paddan, Rachel died to my sorrow in the land of Canaan on the way, while there was still some distance to go to Ephrath; and I buried her there on the way to Ephrath (that is[c][b], Bethlehem).
  footnotes:
  - marker: a
    text: Hebrew 'Paddan'; many English versions expand this to 'Paddan-aram' from related passages, but the Hebrew here has only 'Paddan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Rachel died upon me,' a Hebrew idiom that may emphasize either her dying near Jacob or the personal weight of her death on him.
    reason: lexical_alternative
  - marker: c
    text: The expression 'some distance' renders a Hebrew idiom for a remaining stretch of land; the exact distance is uncertain.
    reason: cultural_note
