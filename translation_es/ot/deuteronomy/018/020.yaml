translation:
  language: es
  text: Pero el profeta que, con presunción[a], hable una palabra en mi nombre, que yo no le mandé hablar, o que hable en nombre de otros dioses, ese profeta morirá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presuntuosamente» / «con arrogancia». El verbo hebreo comunica presunción voluntaria o un sobrepaso arrogante de los límites permitidos.
    reason: lexical_alternative
  - marker: b
    text: O «será puesto a muerte» o «deberá morir». El hebreo presenta la sentencia legal de muerte de forma breve.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - Solo
  lexicon: HALOT
  rationale: Introduce el contraste fuerte con el profeta legítimo anterior; «Pero» es natural en español y conserva el valor adversativo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - ese profeta
  - el profeta aquel
  lexicon: HALOT
  rationale: Mantiene el sustantivo definido de forma directa y clara.
- source_word: יָזִיד
  english_pob_choice: presumptuously
  chosen_spanish: con presunción
  alternatives_spanish:
  - presuntuosamente
  - con arrogancia
  - se atreva presuntuosamente
  lexicon: HALOT
  rationale: La raíz comunica audacia culpable y sobrepaso deliberado. «Con presunción» conserva el matiz moral y legal sin sonar artificial en español; la nota permite la alternativa más literal «presuntuosamente».
- source_word: לְדַבֵּר דָּבָר
  english_pob_choice: speaks a word
  chosen_spanish: hable una palabra
  alternatives_spanish:
  - diga una palabra
  - pronuncie un mensaje
  - hable algo
  lexicon: HALOT
  rationale: Se conserva la construcción verbal sustantiva del hebreo de modo legible. «Una palabra» refleja el valor formal de דָּבָר sin ampliar el sentido.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - en nombre mío
  lexicon: HALOT
  rationale: Es el equivalente idiomático normal en español para reclamar autoridad divina; se preserva la primera persona del discurso divino.
- source_word: אֵת אֲשֶׁר לֹא צִוִּיתִיו לְדַבֵּר
  english_pob_choice: that I have not commanded him to speak
  chosen_spanish: que yo no le mandé hablar
  alternatives_spanish:
  - que yo no le mandé decir
  - que no le ordené decir
  - que yo no le mandé a hablar
  lexicon: HALOT
  rationale: La relación causal/legal se conserva sin sobrecargar el español. «Mandé» refleja צִוִּיתִי con un registro claro y digno; el infinitivo «hablar» mantiene la economía del hebreo.
- source_word: וַאֲשֶׁר יְדַבֵּר
  english_pob_choice: or who speaks
  chosen_spanish: o que hable
  alternatives_spanish:
  - o quien hable
  - y que hable
  - o que diga
  lexicon: HALOT
  rationale: La waw presenta una segunda infracción alternativa; en español, «o que hable» expresa bien la disyunción y evita repetir innecesariamente la estructura completa.
- source_word: בְּשֵׁם אֱלֹהִים אֲחֵרִים
  english_pob_choice: in the name of other gods
  chosen_spanish: en nombre de otros dioses
  alternatives_spanish:
  - en el nombre de otros dioses
  - por nombre de otros dioses
  lexicon: HALOT
  rationale: Respeta el sentido de invocar otras deidades como autoridad. «Dioses» mantiene el plural de אֱלֹהִים אֲחֵרִים sin suavizarlo.
- source_word: וּמֵת
  english_pob_choice: shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - deberá morir
  - ha de morir
  - morirá ciertamente
  lexicon: HALOT
  rationale: El hebreo formula la sentencia legal de manera tersa; el futuro simple en español comunica de modo natural el castigo decretado sin añadir una explicitación causal.
- source_word: הַנָּבִיא הַהוּא
  english_pob_choice: that prophet
  chosen_spanish: ese profeta
  alternatives_spanish:
  - aquel profeta
  - ese mismo profeta
  - el profeta aquel
  lexicon: HALOT
  rationale: La demostración enfática se conserva con «ese», que suena natural y mantiene la referencia despectiva o identificadora del original.
theological_decisions:
- issue: Referencia divina en primera persona dentro de la cita
  english_pob_reading: Retained first-person divine speech as 'my name' without substituting 'the LORD' into the quotation.
  chosen_spanish_reading: 'Se conserva la primera persona divina: «en mi nombre», sin sustituirla por una fórmula impersonal como «en nombre de Yahvé» dentro de la cita.'
  alternative_spanish_readings:
  - en nombre de Yahvé
  - en el nombre del Señor
  rationale: El hebreo está en discurso directo divino; la traducción debe preservar la primera persona y no introducir una reformulación que el texto no dice. Esto mantiene la transparencia del pasaje y el vínculo con el original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fórmula legal de la pena
  english_pob_reading: Rendered וּמֵת as 'shall die' rather than 'is to be put to death.'
  chosen_spanish_reading: Se tradujo וּמֵת como «morirá», preservando la declaración jurídica breve.
  alternative_spanish_readings:
  - deberá morir
  - será puesto a muerte
  - ha de morir
  rationale: El hebreo expresa la sentencia con concisión legal. «Morirá» comunica la pena sin añadir una voz pasiva explícita que el verbo hebreo no requiere de manera abierta.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés sin depender mecánicamente de la versión inglesa. No se documentan revisiones previas en este verso; la redacción busca equivalencia óptima y transparencia lexical.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero aquí el hebreo está en primera persona divina («mi nombre»), por lo que no se sustituyó por «Yahvé» dentro de la cita.
  - Se conservó «dioses» en plural para אֱלֹהִים אֲחֵרִים, sin normalizarlo a singular.
  - Se evitó «siervo» porque no corresponde al término lexical del verso.
  - La estructura legal del versículo se refleja con un futuro simple en español, sin agregar explicaciones interpretativas.
