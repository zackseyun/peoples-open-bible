  text: חֶ֤רֶב פָּֽתְח֣וּ רְשָׁעִים֮ וְ/דָרְכ֪וּ קַ֫שְׁתָּ֥/ם לְ֭/הַפִּיל עָנִ֣י וְ/אֶבְי֑וֹן לִ֝/טְב֗וֹחַ יִשְׁרֵי דָֽרֶךְ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/014.yaml
  text: The wicked have drawn the sword and bent their bow[a], to bring down the poor and needy[b], to slaughter those upright in way.
