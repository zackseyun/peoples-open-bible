  yaml_path: translation/ot/numbers/035/006.yaml
  text: And the cities that you give to the Levites shall be the six cities of refuge[a], which you shall give for the manslayer to flee there; and besides them you shall give forty-two cities.
  footnotes:
  - marker: a
    text: Or 'the slayer' or 'the killer.' The Hebrew term here is used in the legal context of the cities of refuge and does not by itself specify whether the killing was intentional or accidental; 'manslayer' preserves that nuance.
