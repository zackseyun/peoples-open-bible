translation:
  language: es
  text: Tú has alejado de mí al amante y al amigo[a]; mis conocidos son tinieblas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis conocidos están en tinieblas»; o: «tinieblas son mis únicos conocidos». El final hebreo es muy breve y admite más de una lectura.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִרְחַקְתָּ
  english_pob_choice: You have put far
  chosen_spanish: has alejado
  alternatives_spanish:
  - has puesto lejos
  - has apartado
  - has hecho distante
  lexicon: HALOT
  rationale: 'El hifil perfecto 2ms expresa una acción causativa: no solo que algo esté lejos, sino que ha sido alejado por el destinatario del lamento. «Has alejado» mantiene esa fuerza causal y suena natural en español.'
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartado de mí
  lexicon: HALOT
  rationale: La preposición מן con sufijo de primera persona indica separación desde la persona que habla. «De mí» es el complemento más directo y sobrio en español.
- source_word: אֹהֵב
  english_pob_choice: lover
  chosen_spanish: al amante
  alternatives_spanish:
  - al que ama
  - al amado
  - al amigo que ama
  lexicon: HALOT
  rationale: Como participio sustantivado de אהב, el término nombra a una persona con vínculo afectivo activo. «Amante» conserva esa relación personal y la concisión del hebreo, sin convertirlo en «amado», que invertiría la perspectiva.
- source_word: וָרֵעַ
  english_pob_choice: and friend
  chosen_spanish: y al amigo
  alternatives_spanish:
  - y al compañero
  - y al prójimo
  lexicon: HALOT
  rationale: רֵעַ en contextos relacionales suele significar amigo o compañero cercano. «Amigo» comunica bien el paralelo con «amante» y la pérdida de vínculos íntimos.
- source_word: מְיֻדָּעַי
  english_pob_choice: my acquaintances
  chosen_spanish: mis conocidos
  alternatives_spanish:
  - mis allegados
  - los que me conocen
  - mis amistades
  lexicon: HALOT
  rationale: La forma pasiva/denominativa de ידע con sufijo de 1cs apunta a personas conocidas por el hablante. «Conocidos» preserva el enlace semántico con «conocer» y evita elevarlos innecesariamente a «amigos».
- source_word: מַחְשָׁךְ
  english_pob_choice: my acquaintances are darkness
  chosen_spanish: son tinieblas
  alternatives_spanish:
  - son oscuridad
  - se vuelven tinieblas
  - 'son lo único que me queda: tinieblas'
  lexicon: HALOT
  rationale: El final hebreo es elíptico y permite un enunciado nominal. En español, «mis conocidos son tinieblas» conserva la dureza y la tersura del hebreo, manteniendo la lectura más directa sin forzar una explicación interpretativa.
translation_notes:
  revision_awareness: La versión inglesa más reciente estabilizó la línea final como «my acquaintances are darkness», evitando la inversión anterior «darkness is my acquaintances». La traducción española sigue esa lectura sintáctica directa y conserva la tersura del hebreo, sin añadir un sujeto explicativo que el texto no expresa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se conservan las relaciones personales del paralelismo («amante / amigo / conocidos») sin suavizarlas a un lenguaje más eclesiástico.
  - «Tinieblas» se usa como predicado nominal para respetar la clausula elíptica del hebreo.
