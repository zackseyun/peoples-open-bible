  to: 'Porque así dice Yahvé: Miren[a], yo extiendo hacia ella la paz como un río, y la gloria de las naciones como un torrente que se desborda; y ustedes mamarán, serán llevados en brazos, sobre la cadera, y mecidos sobre las rodillas[b].'
