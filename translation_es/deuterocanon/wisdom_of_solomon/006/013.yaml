translation:
  language: es
  text: La Sabiduría se apresura a darse a conocer a los que la desean[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «se adelanta a los que desean que ella sea conocida de antemano». El griego es comprimido; el texto principal expresa el sentido probable de que la Sabiduría toma la iniciativa hacia quienes la desean.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθάνει
  english_pob_choice: hastens
  chosen_spanish: se adelanta
  alternatives_spanish:
  - se apresura
  - llega antes
  - anticipa
  lexicon: LSJ
  rationale: φθάνει puede expresar llegar antes, anticipar o tomar la delantera. En español, «se adelanta» conserva la iniciativa activa de Sabiduría sin sonar forzado. Mantiene la idea de precedencia que el inglés POB resolvió con «hastens».
- source_word: τοὺς ἐπιθυμοῦντας
  english_pob_choice: those who desire
  chosen_spanish: los que desean
  alternatives_spanish:
  - los que anhelan
  - los que buscan con empeño
  - los que la desean
  lexicon: BDAG
  rationale: El participio expresa deseo intenso. «Los que desean» es natural y suficientemente fuerte en español; el contexto identifica a Sabiduría como el objeto implícito del deseo, por eso no hace falta repetirlo en el texto principal.
- source_word: προγνωσθῆναι
  english_pob_choice: to make herself known
  chosen_spanish: ser conocidos de antemano
  alternatives_spanish:
  - ser reconocidos de antemano
  - ser sabidos antes
  - ser conocidos previamente
  lexicon: LSJ
  rationale: El griego es pasivo e idiomáticamente comprimido. La forma más cercana en español es «ser conocidos de antemano», que conserva la noción de conocimiento previo sin convertirla prematuramente en un activo explicativo. La paráfrasis interpretativa se reserva para la nota.
theological_decisions:
- issue: Personificación de Sabiduría como sujeto femenino
  english_pob_reading: Retain feminine personal language ('She ... herself ... her')
  chosen_spanish_reading: 'Mantener la personificación femenina: «Se adelanta» con referencia implícita a Sabiduría femenina en el contexto'
  alternative_spanish_readings:
  - 'Usar un impersonal: «La sabiduría se adelanta»'
  - 'Reforzar con pronombres femeninos explícitos: «Ella se adelanta»'
  rationale: El pasaje presenta a Sabiduría como figura personificada femenina. En español, el antecedente puede quedar en el contexto inmediato sin sobrecargar el versículo con pronombres repetidos. La nota preserva la alternativa interpretativa más formal que el inglés POB documenta.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological tension; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: El texto griego breve y comprimido fue leído con el audit trail inglés, que entiende el verbo como iniciativa de Sabiduría hacia los buscadores. No se introdujeron ampliaciones doctrinales; la nota conserva la alternativa más literal, mientras el texto principal ofrece una solución española idiomática y fiel.
  spanish_consistency_notes:
  - Usé «Sabiduría» con mayúscula como sujeto personificado, en línea con el contexto literario del libro.
  - Elegí «se adelanta» para φθάνει por su valor de precedencia activa, evitando un calco rígido.
  - Mantengo «de antemano» para conservar la idea de conocimiento previo del infinitivo griego.
  - La nota a pie de página preserva la lectura más formal sin sustituir el sentido principal del versículo.
