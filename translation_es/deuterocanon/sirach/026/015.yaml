translation:
  language: es
  text: La esposa callada es un don de Yahvé, y no hay equivalente para un alma disciplinada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un alma bien instruida». El griego πεπαιδευμένης ψυχῆς puede enfatizar tanto la instrucción como la disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: δόσις
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - don
  - obsequio
  - presente
  lexicon: LSJ
  rationale: En este proverbio, δόσις se refiere a algo dado, no al acto de dar. «Regalo» comunica con naturalidad la idea de un bien concedido.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: El griego usa κύριος como referencia divina. Siguiendo el criterio del proyecto, se explicita el nombre divino como «Yahvé» en lugar de enmascararlo con «el Señor».
- source_word: γυνὴ
  english_pob_choice: wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: LSJ
  rationale: Aunque puede significar «esposa», el griego aquí no repite un término explícito de matrimonio; por eso «mujer» evita introducir más especificidad que la del texto. La referencia al matrimonio está dada por el contexto amplio, pero no obliga a cerrar la ambigüedad aquí.
- source_word: σιγηρά
  english_pob_choice: quiet
  chosen_spanish: callada
  alternatives_spanish:
  - silenciosa
  - tranquila
  - reservada
  lexicon: LSJ
  rationale: «Callada» conserva la idea de habla contenida sin sugerir mutismo absoluto. En español mantiene el tono proverbial de virtud doméstica con naturalidad.
- source_word: ἀντάλλαγμα
  english_pob_choice: equivalent
  chosen_spanish: equivalente
  alternatives_spanish:
  - cambio
  - compensación
  - precio
  lexicon: LSJ
  rationale: El valor de ἀντάλλαγμα es el de algo que pueda ponerse en lugar de otra cosa. «Equivalente» expresa bien la incomparabilidad sin forzar una imagen comercial más fuerte de la que el español requiere.
- source_word: πεπαιδευμένης
  english_pob_choice: disciplined
  chosen_spanish: disciplinada
  alternatives_spanish:
  - bien instruida
  - educada
  - formada
  lexicon: LSJ
  rationale: El participio puede abarcar instrucción y disciplina moral. «Disciplinada» preserva ese doble matiz y encaja con la sabiduría proverbial mejor que una lectura meramente escolar.
- source_word: ψυχῆς
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - yo
  lexicon: LSJ
  rationale: «Alma» conserva el registro interior y sapiencial de ψυχή. En español suena más natural que «soul» calcoado, y mantiene el sentido de la persona interior formada.
theological_decisions:
- issue: Relación entre la primera cláusula y la segunda respecto de la persona elogiada
  english_pob_reading: The proverb presents a quiet wife as a gift from the Lord and says there is no equivalent for a disciplined soul.
  chosen_spanish_reading: 'La formulación española conserva dos predicaciones paralelas: una mujer callada como don de Yahvé, y la incomparabilidad de un alma disciplinada.'
  alternative_spanish_readings:
  - una esposa callada
  - una mujer silenciosa
  - un alma bien instruida
  rationale: El griego no repite «mujer» o «esposa» en la segunda cláusula, de modo que conviene dejar la frase abierta. «Alma disciplinada» refleja la formación moral sugerida por πεπαιδευμένης ψυχῆς sin reducirla a educación académica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete y el razonamiento auditado en inglés. Se conserva la tensión léxica entre γυνή como «mujer»/«esposa» y πεπαιδευμένης ψυχῆς como formación interior con matiz de disciplina e instrucción, sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para κύριος con referencia divina.
  - Se evita «Cristo» u otras formulaciones no presentes en el texto.
  - «Alma» conserva el registro sapiencial de ψυχή y mantiene coherencia con otros pasajes de sabiduría.
  - «Regalo» y «equivalente» reflejan incomparabilidad sin añadir interpretación devocional extra.
