translation:
  language: es
  text: Y la casa de Israel hizo duelo por ella durante siete días. Y antes de morir[a], dividió sus bienes entre todos los parientes más cercanos de Manasés, su esposo, y los parientes más cercanos de su familia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega es compacta; también puede entenderse como «antes de su muerte». La traducción mantiene la forma más natural en español sin perder la idea de anterioridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπένθησεν
  english_pob_choice: mourned
  chosen_spanish: la lloró
  alternatives_spanish:
  - la hizo duelo
  - la lloró y guardó duelo
  lexicon: BDAG / LEH
  rationale: El verbo expresa duelo por la muerte; en español, «la lloró» comunica el lamento funerario de forma natural y concisa. Mantiene el sentido de duelo sin introducir una formulación más interpretativa que «hizo duelo».
- source_word: οἶκος Ἰσραήλ
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: LEH
  rationale: Se conserva el giro colectivo transparente del griego. «La casa de Israel» mantiene el tono bíblico y no reduce la expresión a un simple nombre colectivo.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: LEH
  rationale: El español fluye mejor con la duración expresada como complemento temporal. El sentido sigue siendo estrictamente durativo.
- source_word: διεῖλεν
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - distribuyó
  - apropió
  lexicon: BDAG
  rationale: En el contexto de herencia y distribución de bienes, «repartió» comunica la idea de dividir entre destinatarios. «Dividió» sería más literal, pero menos natural en español jurídico-familiar.
- source_word: τὰ ὑπάρχοντα αὐτῆς
  english_pob_choice: her possessions
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - lo que le pertenecía
  lexicon: BDAG
  rationale: «Bienes» es la forma más idiomática en español para patrimonio o propiedad distribuible, y preserva el alcance material de la expresión griega.
- source_word: πρὸ τοῦ ἀποθανεῖν αὐτήν
  english_pob_choice: before she died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: BDAG
  rationale: La construcción temporal se traduce de manera natural en español sin perder la anterioridad expresa por el infinitivo articular griego.
- source_word: πᾶσι τοῖς ἔγγιστα
  english_pob_choice: among all the nearest kin
  chosen_spanish: entre todos los parientes más cercanos
  alternatives_spanish:
  - a todos los parientes más cercanos
  - entre los más cercanos parientes
  lexicon: LEH
  rationale: La frase es compacta y algo comprimida en griego; en español se aclara con «parientes más cercanos», que conserva la idea relacional e inherente al contexto de distribución patrimonial.
- source_word: Μανασσῆ τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: Manasseh her husband
  chosen_spanish: de Manasés, su esposo
  alternatives_spanish:
  - de Manasés, su marido
  - de Manasés, su hombre
  lexicon: LEH
  rationale: Se mantiene la identificación appositiva. «Esposo» es claro y digno en español; «de Manasés» conserva el enlace genitivo sin sobreexplicar.
- source_word: τοῦ γένους αὐτῆς
  english_pob_choice: her family
  chosen_spanish: de su familia
  alternatives_spanish:
  - de su parentela
  - de su clan
  lexicon: LEH
  rationale: «Familia» reproduce la amplitud de γένος en un registro accesible. La repetición de «parientes más cercanos» ya ha absorbido el matiz de parentesco, por lo que no es necesario cargar más el término.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto español junto a «antes de morir». Se mantuvo la segmentación y el sentido heredado del audit trail inglés, pero con español más natural en el contexto de reparto de bienes.
  spanish_consistency_notes:
  - Se usó «la lloró» para expresar duelo funerario de forma natural, conservando el valor de luto del griego.
  - «La casa de Israel» mantiene el colectivo bíblico transparente.
  - «Parientes más cercanos» traduce la construcción comprimida de ἔγγιστα sin crear una paráfrasis excesiva.
  - Se eligió «sus bienes» por ser el equivalente patrimonial más idiomático en español.
  - No se introdujeron términos doctrinalmente cargados ni equivalencias no atestiguadas por el texto.
