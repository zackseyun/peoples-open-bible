translation:
  language: es
  text: Cuando se le informó a Saúl que David había huido a Gat[a], ya no lo buscó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción hebrea puede entenderse también como «se le dijo a Saúl que David había huido a Gat».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - le dijeron
  - se le dio noticia
  lexicon: HALOT
  rationale: 'El hebreo presenta una forma pasiva/impersonal de נגד: la noticia llega a Saúl sin especificar agente. «Se le informó» conserva ese valor impersonal de manera natural en español.'
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - para Saúl
  lexicon: HALOT
  rationale: La preposición indica al destinatario del informe; en español, «a Saúl» es la forma directa y idiomática.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - como
  lexicon: HALOT
  rationale: Introduce el contenido de la noticia; «que» reproduce la función complementante sin añadir interpretación.
- source_word: בָרַח
  english_pob_choice: had fled
  chosen_spanish: había huido
  alternatives_spanish:
  - había escapado
  - huyó
  lexicon: HALOT
  rationale: El verbo expresa huida/escape. «Había huido» mantiene la relación temporal narrativa que refleja el inglés POB y sugiere la acción completa antes del informe.
- source_word: גַּת
  english_pob_choice: to Gath
  chosen_spanish: a Gat
  alternatives_spanish:
  - en Gat
  lexicon: HALOT
  rationale: Aunque el hebreo no explicita preposición, el lugar funciona como destino del movimiento. En español, el destino se expresa naturalmente con «a».
- source_word: וְלֹא יֹסֶף עוֹד
  english_pob_choice: he no longer sought him
  chosen_spanish: ya no lo buscó
  alternatives_spanish:
  - no continuó buscándolo
  - ya no siguió buscándolo
  lexicon: HALOT
  rationale: La expresión idiomática con יסף + עוד comunica cese. El inglés POB simplificó a la idea de dejar de buscarlo; en español, «ya no lo buscó» preserva ese cese de forma natural sin perder la fuerza del hebreo.
- source_word: לְבַקְשׁוֹ
  english_pob_choice: to seek him
  chosen_spanish: buscarlo
  alternatives_spanish:
  - buscarlo con insistencia
  - seguirlo buscando
  lexicon: HALOT
  rationale: בקש suele significar «buscar/seek». En este contexto Saul intenta dar con David; «buscarlo» es suficientemente amplio y fiel, sin forzar una equivalencia más interpretativa como «perseguirlo».
translation_notes:
  revision_awareness: Se tomó como base la revisión final del audit trail inglés, que simplifica la idea idiomática a «ya no lo buscó». Se mantuvo el valor impersonal de «וַיֻּגַּד» y la relación narrativa de anterioridad en «había huido» para reflejar mejor el hebreo y el texto auditado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Gat» como topónimo transliterado, consistente con la práctica bíblica en español.
  - «Buscarlo» mantiene la terminología sobria del POB frente a alternativas más interpretativas como «perseguirlo».
