base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/049.yaml
  text: But they mocked his messengers[a], and whenever the Lord spoke, they were making sport of his prophets, until, in his anger against his nation because of their ungodly deeds[b], he commanded the kings of the Chaldeans to come up against them.
  footnotes:
  - marker: a
    text: Or 'his angels'; here the context more likely means God's human messengers, especially in parallel with 'his prophets.'
    reason: lexical_alternative
  - marker: b
    text: The Greek reads 'the kings of the Chaldeans' (plural). The Hebrew parallel in 2 Chronicles 36 emphasizes the king of Babylon/Nebuchadnezzar. The main text follows the Greek witness of 1 Esdras.
    reason: textual_variant
