translation:
  language: es
  text: Haré memoria del amor fiel de Yahvé[a], de las alabanzas de Yahvé, conforme a todo lo que Yahvé nos ha concedido[b][c], y de la gran bondad a la casa de Israel, que él les ha concedido conforme a su compasión y conforme a la abundancia de su amor fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordias» o «bondad fiel» para «amor fiel» (hebreo חסד), término que denota amor leal y pactal.
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» representa el nombre divino יְהוָה; el proyecto lo translitera en español en lugar de sustituirlo por un título.
    reason: source_note
  - marker: c
    text: O «nos ha favorecido» para «nos ha concedido».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדֵי
  english_pob_choice: steadfast love
  chosen_spanish: misericordias
  alternatives_spanish:
  - amor leal
  - amor firme
  - bondad fiel
  lexicon: HALOT
  rationale: חסד abarca amor leal, bondad pactal y misericordia; en español, 'misericordias' mantiene el plural poético del hebreo y enlaza bien con el recuerdo público de las obras de Yahvé, sin perder del todo el matiz de benevolencia pactal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se translitera como 'Yahvé' en el español del proyecto, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אַזְכִּיר
  english_pob_choice: I will recount
  chosen_spanish: Recordaré
  alternatives_spanish:
  - mencionaré
  - haré memoria de
  - proclamaré
  lexicon: HALOT
  rationale: El hifil de זכר aquí tiene fuerza declarativa y pública. 'Recordaré' funciona en español como acto verbal de rememorar y declarar a la vez, apropiado para un contexto de alabanza.
- source_word: תְּהִלֹּת
  english_pob_choice: the praises
  chosen_spanish: las alabanzas
  alternatives_spanish:
  - los actos de alabanza
  - las cosas dignas de alabanza
  lexicon: HALOT
  rationale: El plural hebreo permite tanto 'alabanzas' como 'hechos dignos de alabanza'; se eligió 'las alabanzas' para conservar la forma plural y el paralelismo con el verbo de recuento.
- source_word: כְּ/עַל כֹּל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - por todo lo que
  - a causa de todo lo que
  lexicon: HALOT
  rationale: La construcción introduce medida o base del recuento. 'Conforme a todo lo que' conserva esa relación sin forzar una causalidad más explícita que la del hebreo.
- source_word: גְּמָלָנוּ
  english_pob_choice: has bestowed on us
  chosen_spanish: nos ha hecho
  alternatives_spanish:
  - nos ha favorecido
  - nos ha tratado
  - nos ha dado
  lexicon: HALOT
  rationale: גמל puede significar tratar, recompensar o hacer algo por alguien. Dado el paralelismo con el segundo hemistiquio y el objeto amplio de los actos divinos, 'nos ha hecho' conserva la amplitud verbal del hebreo; en español se aclara por el contexto benevolente del verso.
- source_word: וְרַב טוּב
  english_pob_choice: and the great goodness
  chosen_spanish: y la gran bondad
  alternatives_spanish:
  - y la abundante bondad
  - y la gran benignidad
  lexicon: HALOT
  rationale: טוּב es bondad/bien. 'Gran bondad' reproduce con naturalidad el énfasis de רַב y suena idiomático en español bíblico contemporáneo.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - hacia la casa de Israel
  lexicon: HALOT
  rationale: '''Casa de Israel'' conserva el valor corporativo-covenantal de la expresión. ''Para'' rinde bien el sentido benefactivo del contexto.'
- source_word: גְּמָלָם
  english_pob_choice: has bestowed on them
  chosen_spanish: les ha hecho
  alternatives_spanish:
  - los ha favorecido
  - les ha tratado
  - les ha dado
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo amplio que en la primera mitad para reflejar la repetición hebrea de גמל y su paralelismo, dejando que el contexto de bondad determine el sentido.
- source_word: כְּרַחֲמָיו
  english_pob_choice: according to his compassion
  chosen_spanish: conforme a su compasión
  alternatives_spanish:
  - según su misericordia
  - de acuerdo con su compasión
  lexicon: HALOT
  rationale: רחמים expresa compasión entrañable. 'Compasión' es preciso y transparente en español, y mantiene el matiz afectivo sin reducirlo a un mero acto de clemencia.
- source_word: וּכְרֹב חֲסָדָיו
  english_pob_choice: and according to the abundance of his steadfast love
  chosen_spanish: y conforme a la abundancia de su misericordia
  alternatives_spanish:
  - y conforme a la abundancia de su amor leal
  - y según la multitud de sus misericordias
  lexicon: HALOT
  rationale: רֹב expresa abundancia; חסד vuelve a exigir una decisión coherente con la primera ocurrencia. Aquí se eligió 'misericordia' para que la progresión del verso sea fluida en español y para mantener el paralelismo de benevolencia, aunque el término sigue cargando el trasfondo pactal del hebreo.
theological_decisions:
- issue: Cómo rendir חסד en un solo verso con dos apariciones
  english_pob_reading: steadfast love ... his steadfast love
  chosen_spanish_reading: misericordias ... su misericordia
  alternative_spanish_readings:
  - amor leal ... amor leal
  - bondad fiel ... bondad fiel
  - misericordias ... amor leal
  rationale: El hebreo repite חסד y el inglés POB mantiene 'steadfast love' para esa red semántica. En español, se optó por variar entre 'misericordias' y 'misericordia' para sostener naturalidad y paralelismo poético, sin borrar el valor pactal del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino mediante transliteración en español, conforme a la práctica del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de גמל en dos mitades paralelas
  english_pob_reading: has bestowed on us / has bestowed on them
  chosen_spanish_reading: nos ha hecho / les ha hecho
  alternative_spanish_readings:
  - nos ha dado / les ha dado
  - nos ha favorecido / les ha favorecido
  - nos ha tratado / les ha tratado
  rationale: El verbo hebreo es semánticamente amplio y el contexto es benévolo, pero no meramente 'dar'. 'Ha hecho' conserva la amplitud de 'ha hecho por nosotros' implícita en la construcción, aunque queda algo abierto; esa apertura respeta la elasticidad del hebreo sin imponer una sola glosa.
  doctrine_reference: HALOT and source-context reading
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el audit trail inglés. Se reconoce una tensión léxica real en חסד y גמל: el español no permite mantener todas las resonancias con una sola palabra sin sonar forzado, por lo que se documentan alternativas y se conserva el paralelismo semántico del versículo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, en coherencia con el estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - Se mantiene 'casa de Israel' como expresión corporativa.
  - Las dos apariciones de חסד se traducen con formas cercanas pero no idénticas para preservar fluidez sin borrar la repetición hebrea.
  - '''Compasión'' se reserva para רחמים y no se mezcla con חסד en las notas para distinguir los campos semánticos.'
