translation:
  language: es
  text: El nombre del hombre era Elimélec, y el nombre de su esposa era Noemí, y los nombres de sus dos hijos eran Mahlón y Quilyón[a]. Eran efrateos[b] de Belén en Judá. Llegaron a los campos[c] de Moab y estuvieron allí[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre hebreo כִלְיוֹן también puede transliterarse «Quilión» o «Chilión».
    reason: lexical_alternative
  - marker: b
    text: «Efrateos» conserva el gentilicio hebreo; no debe confundirse con «efraimitas».
    reason: lexical_alternative
  - marker: c
    text: O «la tierra de Moab» o «el territorio de Moab»; el hebreo dice literalmente «los campos de Moab».
    reason: lexical_alternative
  - marker: d
    text: O «y estaban allí» o «y se quedaron allí»; el hebreo literalmente dice «y fueron/estuvieron allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם הָאִישׁ
  english_pob_choice: The man's name was
  chosen_spanish: El nombre del hombre era
  alternatives_spanish:
  - Y el nombre del hombre era
  - El nombre del varón era
  lexicon: HALOT
  rationale: Sigo la fórmula hebrea de identificación nominal con una construcción natural en español. 'Hombre' reproduce אִישׁ de forma directa; 'varón' sería posible, pero aquí no aporta una distinción semántica necesaria.
- source_word: אֱלִימֶלֶךְ
  english_pob_choice: Elimelech
  chosen_spanish: Elimélec
  alternatives_spanish:
  - Elimelec
  lexicon: Transliteración estándar del nombre propio
  rationale: Conservo el nombre propio en forma española habitual y con acentuación prosódica natural para lectura pública. No se traduce el nombre.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife's
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: HALOT
  rationale: '''Esposa'' comunica con claridad el vínculo marital en español contemporáneo y mantiene el sentido del posesivo. ''Mujer'' sería literal, pero menos preciso en registro eclesial moderno.'
- source_word: נָעֳמִי
  english_pob_choice: Naomi
  chosen_spanish: Noemí
  alternatives_spanish:
  - Naomí
  lexicon: Transliteración estándar del nombre propio
  rationale: Uso la forma española tradicional y ampliamente reconocible del nombre propio.
- source_word: שְׁנֵי בָנָיו
  english_pob_choice: his two sons
  chosen_spanish: sus dos hijos
  alternatives_spanish:
  - sus dos hijos varones
  - los dos hijos de él
  lexicon: HALOT
  rationale: '''Hijos'' es natural en español y el contexto ya deja claro que se trata de varones; en este caso no hace falta explicitarlo. Mantiene la relación posesiva y el número.'
- source_word: מַחְלוֹן וְכִלְיוֹן
  english_pob_choice: Mahlon and Chilion
  chosen_spanish: Mahlón y Quilyón
  alternatives_spanish:
  - Mahlón y Quilión
  - Mahlón y Chilión
  lexicon: Transliteración de nombres propios
  rationale: Conservo los nombres propios. Para כִלְיוֹן opto por una forma española coherente con la sonoridad del hebreo; la terminación '-ón' ayuda a reflejar el acento y evita una transliteración rígida.
- source_word: אֶפְרָתִים
  english_pob_choice: Ephrathites
  chosen_spanish: efrateos
  alternatives_spanish:
  - de Efrata
  - ephrateos
  lexicon: HALOT
  rationale: '''Efrateos'' reproduce el gentilicium de forma natural en español y mantiene la conexión con Efrata/Efratá sin confundirlo con ''efraimitas''. Esta elección preserva la referencia geográfica y étnica.'
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem in Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén en Judá
  - de Belén, en Judá
  lexicon: HALOT
  rationale: 'La expresión identifica el origen geográfico: Belén situada en Judá. ''De'' conserva la procedencia de manera natural en español y evita una formulación más pesada.'
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came
  chosen_spanish: Llegaron
  alternatives_spanish:
  - Vinieron
  - Fueron
  lexicon: HALOT
  rationale: '''Llegaron'' expresa con naturalidad el movimiento narrativo y el punto de llegada. En español suena más idiomático que un simple ''vinieron'' en este contexto descriptivo.'
- source_word: שְׂדֵי מוֹאָב
  english_pob_choice: the fields of Moab
  chosen_spanish: los campos de Moab
  alternatives_spanish:
  - la tierra de Moab
  - el territorio de Moab
  lexicon: HALOT
  rationale: '''Campos'' conserva la imagen concreta de שְׂדֵי y sigue de cerca la formulación hebrea. Mantiene también la posibilidad de un sentido regional sin borrar la metáfora espacial.'
- source_word: וַיִּהְיוּ שָׁם
  english_pob_choice: and were there
  chosen_spanish: y estuvieron allí
  alternatives_spanish:
  - y estaban allí
  - y se quedaron allí
  lexicon: HALOT
  rationale: '''Estuvieron allí'' traduce de manera sobria la simple presencia/estancia del hebreo, sin añadir la idea de permanencia prolongada que tendría ''se quedaron''. Preserva la revisión inglesa que volvió a un equivalente más literal.'
theological_decisions:
- issue: Tratamiento del nombre divino en este versículo
  english_pob_reading: No explicit divine-name rendering occurs in the verse, though the place-name "Bethlehem in Judah" preserves a geographic designation associated with Israel's covenant setting.
  chosen_spanish_reading: No se introduce ningún equivalente del nombre divino en el texto, porque el versículo no contiene יהוה como forma explícita.
  alternative_spanish_readings:
  - No aplicable
  rationale: El hebreo de este versículo no presenta el tetragrámaton ni una cita directa que requiera decisión sobre Yahvé/SEÑOR. Por tanto, no se fuerza ninguna lectura teológica adicional.
  doctrine_reference: No aplica
- issue: Relación entre 'Efrateos' y el origen en Belén de Judá
  english_pob_reading: They were Ephrathites from Bethlehem in Judah.
  chosen_spanish_reading: Eran efrateos de Belén de Judá.
  alternative_spanish_readings:
  - Eran de Efrata, de Belén de Judá
  - Eran efrateos procedentes de Belén de Judá
  rationale: La lectura une gentilicio y procedencia local sin confundirlos con una tribu distinta. Esto preserva la tensión geográfica del hebreo y el audit trail inglés, que opta por 'Ephrathites' frente a alternativas erróneas como 'Ephraimites'.
  doctrine_reference: Geografía bíblica y genealogía narrativa
translation_notes:
  revision_awareness: La versión inglesa más reciente del POB cambió 'and remained there' por 'and were there' para acercarse más al hebreo וַיִּהְיוּ שָׁם. En español, por la misma razón, se eligió 'y estuvieron allí' en lugar de una paráfrasis con matiz de permanencia.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no lo contiene.
  - Se usa 'Mesías' solo cuando el fuente lo requiera; aquí no aplica.
  - Se conserva el nombre propio 'Noemí' con ortografía española habitual.
  - No se introduce una equivalencia devocional adicional para 'estuvieron allí'; se evita sobreinterpretar la estancia.
