translation:
  language: es
  text: 'No piensen que yo los acusaré delante del Padre[a]; hay uno que los acusa: Moisés[b], en quien ustedes han puesto su esperanza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No supongan que yo los acusaré delante del Padre».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Moisés, aquel en quien ustedes pusieron su confianza, especialmente como mediador y testigo de la ley, será su acusador.
    reason: cross_reference
lexical_decisions:
- source_word: μὴ δοκεῖτε
  english_pob_choice: Do not think
  chosen_spanish: No piensen
  alternatives_spanish:
  - No supongan
  - No imaginen
  lexicon: BDAG
  rationale: μή con el imperativo presente δοκεῖτε funciona como prohibición directa. En español, «No piensen» comunica con naturalidad la advertencia de Jesús y conserva la fuerza inmediata de la negación.
- source_word: κατηγορήσω
  english_pob_choice: I will accuse
  chosen_spanish: los acusaré
  alternatives_spanish:
  - presentaré cargos contra ustedes
  - los denunciaré
  lexicon: BDAG
  rationale: κατηγορέω tiene sentido forense de acusar o presentar cargos. «Acusaré» preserva ese valor legal sin intensificarlo indebidamente hasta «condenar».
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: before the Father
  chosen_spanish: delante del Padre
  alternatives_spanish:
  - ante el Padre
  - en presencia del Padre
  lexicon: BDAG
  rationale: Con un verbo de acusación, la relación con πρός más acusativo sugiere una escena judicial o de comparecencia. «Delante del Padre» suena natural en español y conserva la idea de comparecer ante él.
- source_word: ἔστιν ὁ κατηγορῶν ὑμῶν
  english_pob_choice: there is one who accuses you
  chosen_spanish: hay uno que los acusa
  alternatives_spanish:
  - existe uno que los acusa
  - el que los acusa es uno
  lexicon: BDAG
  rationale: La construcción introduce a otro acusador en contraste con Jesús. «Hay uno que los acusa» mantiene el presente del participio y evita una formulación menos idiomática en español.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: εἰς ὃν
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  - sobre quien
  lexicon: BDAG
  rationale: La preposición εἰς con ἐλπίζω expresa la dirección de la confianza hacia una persona. «En quien» es la equivalencia española más directa y mantiene la relación personal del texto.
- source_word: ἠλπίκατε
  english_pob_choice: you have put your hope
  chosen_spanish: han puesto su esperanza
  alternatives_spanish:
  - han esperado
  - han depositado su esperanza
  lexicon: BDAG
  rationale: El perfecto comunica una confianza ya establecida y vigente. «Han puesto su esperanza» reproduce bien ese estado resultante y es natural en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance forense de la afirmación de Jesús
  english_pob_reading: The verse is rendered with legal language ('accuse') rather than stronger judicial language such as 'condemn.'
  chosen_spanish_reading: La versión usa lenguaje forense («acusar») y no intensifica la idea hasta «condenar».
  alternative_spanish_readings:
  - los condenaré delante del Padre
  - los juzgaré delante del Padre
  rationale: El griego κατηγορέω significa acusar o presentar cargos, no ejecutar la condena final. Mantener «acusar» preserva la imagen legal del pasaje sin añadir una afirmación doctrinal que el verso no expresa.
  doctrine_reference: Principio de primacía del texto original y de no importar más de lo que el texto dice.
- issue: Referencia de la esperanza en Moisés
  english_pob_reading: The text states that the audience has put hope 'in' Moses.
  chosen_spanish_reading: La traducción conserva que la esperanza ha sido puesta «en Moisés».
  alternative_spanish_readings:
  - en la ley de Moisés
  - en los escritos de Moisés
  rationale: Aunque el contexto amplio vincula a Moisés con la ley y el testimonio, el griego nombra directamente a Moisés. La traducción mantiene esa referencia personal y deja la implicación contextual sin introducirla en el texto principal.
  doctrine_reference: Principio de fidelidad al referente explícito del original.
translation_notes:
  revision_awareness: Se siguió el último pase revisado sin cambios reportados; la redacción española conserva las mismas decisiones léxicas y la misma lectura forense del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí el texto dice «el Padre», por lo que no aplica.
  - Se conserva «Moisés» como nombre propio estándar y «acusar» para κατηγορέω conforme al valor forense documentado.
  - «Esperanza» traduce ἠλπίκατε de manera más idiomática que un simple «han esperado», preservando el matiz de confianza establecida.
