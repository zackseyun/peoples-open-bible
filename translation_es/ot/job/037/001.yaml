translation:
  language: es
  text: Ante esto también mi corazón tiembla[a] y salta de su lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se estremece»; el verbo hebreo puede denotar temblor por temor, asombro o agitación.
    reason: lexical_alternative
  - marker: b
    text: O «salta fuera de su lugar»; la expresión hebrea presenta de manera vívida al corazón como si fuera desplazado súbitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף לְזֹאת
  english_pob_choice: At this also
  chosen_spanish: A causa de esto también
  alternatives_spanish:
  - También por esto
  - Incluso por esto
  - Ante esto también
  lexicon: HALOT
  rationale: אַף + לְזֹאת expresa enlace intensivo con la situación presente; en español, «A causa de esto también» conserva el valor conectivo y la reacción emocional sin volverlo mecánico ni oscurecer la relación causal/pragmática.
- source_word: יֶחֱרַד
  english_pob_choice: trembles
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se sacude
  - se aterra
  lexicon: HALOT
  rationale: חרד puede abarcar temblor por temor, asombro o agitación. «Tiembla» mantiene esa amplitud semántica y evita especificar más de lo que el hebreo exige.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  - yo
  lexicon: HALOT
  rationale: El hebreo usa «corazón» para el centro interior de la persona. En español, «mi corazón» conserva la imagen antropológica sin diluirla en una paráfrasis abstracta.
- source_word: וְיִתַּר
  english_pob_choice: leaps
  chosen_spanish: salta
  alternatives_spanish:
  - da un salto
  - brinca
  - salta violentamente
  lexicon: HALOT
  rationale: El verbo presenta un movimiento súbito y vívido del corazón. «Salta» reproduce bien esa imagen en español y conserva la fuerza corporal del hebreo.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - fuera de su lugar
  - de su posición
  lexicon: HALOT
  rationale: La expresión idiomática describe al corazón desplazado de su ubicación normal. «De su lugar» es natural en español y suficientemente literal para preservar la metáfora.
translation_notes:
  revision_awareness: Coincide con la lectura del POB en inglés y con el estado de alta concordancia del control cruzado; no se detectaron revisiones aplicadas en la fuente auditada. Se mantuvo la metáfora del corazón que tiembla y salta, sin suavizar la intensidad emocional del hebreo.
  spanish_consistency_notes:
  - Se conservó «corazón» para לִבִּי por su valor antropológico bíblico.
  - Se eligió «tiembla» frente a opciones más específicas como «se aterra» para no fijar un matiz que el hebreo permite, pero no obliga.
  - Se tradujo la imagen de desplazamiento con «de su lugar» para mantener la metáfora sin sobreexplicar.
  - La partícula inicial se integró como «A causa de esto también» para reflejar el enlace intensivo de אַף לְזֹאת en un español fluido.
