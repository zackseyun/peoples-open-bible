revisions:
- from: Les damos gracias a ti, oh Dios; damos gracias, porque cercano está tu nombre; se cuentan tus maravillas.
  to: Te damos gracias, oh Dios; damos gracias, porque tu nombre está cerca[a]; se cuentan[b] tus maravillas.
  rationale: Se corrigió el pronombre objeto a «Te» para reflejar correctamente לְּךָ y producir español idiomático. Se suavizó «cercano está tu nombre» a «tu nombre está cerca» por claridad natural sin perder el modismo teológico. Se añadieron notas equivalentes a las del POB inglés para preservar la ambigüedad documentada y la indefinición del verbo final.
