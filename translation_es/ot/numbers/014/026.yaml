lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo introduce un nuevo acto de habla divino en una fórmula narrativa. En español, «habló» conserva el carácter formal de esta fórmula y suena natural en un contexto bíblico; «dijo» también sería posible, pero es menos específico para el inicio de una comunicación solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la transliteración establecida por el proyecto en español. «Yahvé» evita la sustitución por un título y refleja directamente el Tetragrámaton, según la decisión doctrinal del POB.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia natural y precisa en una fórmula de comunicación.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Onomastics / standard Spanish biblical name
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y para
  lexicon: HALOT
  rationale: Conserva la coordinación de dos destinatarios, manteniendo visible la estructura hebrea sin recargar el español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: Onomastics / standard Spanish biblical name
  rationale: Nombre propio estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Funciona como marcador formal de introducción del discurso. «Diciendo» preserva la relación sintáctica con la cita siguiente y mantiene el tono bíblico sin añadir contenido.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española conserva el nombre propio en vez de sustituirlo por un título, siguiendo la política doctrinal del POB. «Yahvé» es la forma estable para el español en este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado traduce el Tetragrámaton como «Yahweh» y no muestra cambios de revisión; el español sigue esa decisión con la forma estable del proyecto, «Yahvé», y conserva la coordinación explícita de los dos destinatarios y el marcador de discurso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como equivalente regular de YHWH en el texto principal.
  - 'Se usan nombres propios bíblicos españoles estándar: Moisés y Aarón.'
  - «Habló ... diciendo» conserva la fórmula narrativa breve y solemne del hebreo sin expandir el contenido.
