- from: Entonces, si el que oye oye el sonido de la trompeta y no toma advertencia[a], y viene la espada y lo arrebata, su sangre recaerá sobre su propia cabeza.
  to: Entonces, si el que oye oye el sonido de la trompeta y no hace caso a la advertencia,[a] y viene la espada y se lo lleva, su sangre estará sobre su propia cabeza.
  rationale: Se revisa «toma advertencia» a «hace caso a la advertencia» para lograr un español natural y claro que aún preserve la responsabilidad de responder al aviso. Se cambia «lo arrebata» por «se lo lleva» para reflejar mejor el sentido de לקח sin intensificación innecesaria. También se ajusta la cláusula final a «su sangre estará sobre su propia cabeza» para conservar más directamente el modismo hebreo y alinear mejor el texto principal con la nota explicativa.
