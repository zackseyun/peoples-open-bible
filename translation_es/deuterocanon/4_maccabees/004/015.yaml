translation:
  language: es
  text: Ahora bien, cuando murió el rey Seleuco, su hijo Antíoco Epífanes lo sucedió en el poder, un hombre orgulloso y formidable[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «un hombre temible o terrible». El griego δεινός puede abarcar varios matices: formidable, terrible o temible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τελευτήσαντος
  english_pob_choice: had died
  chosen_spanish: murió
  alternatives_spanish:
  - había muerto
  - al haber muerto
  lexicon: LSJ
  rationale: El genitivo absoluto aoristo expresa una acción anterior al verbo principal. En español, "murió" da una relación temporal natural y directa, sin perder la anterioridad contextual que ya aporta "cuando".
- source_word: διάδεχεται
  english_pob_choice: succeeded to
  chosen_spanish: sucedió en
  alternatives_spanish:
  - recibió en sucesión
  - tomó el poder
  - heredó
  lexicon: LSJ
  rationale: El verbo indica sucesión a un cargo o dominio. "Sucedió en" conserva el valor formal de sucesión dinástica mejor que expresiones más libres como "tomó el poder".
- source_word: τὴν ἀρχήν
  english_pob_choice: the rule
  chosen_spanish: el poder
  alternatives_spanish:
  - el gobierno
  - la soberanía
  - el reino
  lexicon: LSJ
  rationale: Aquí ἀρχή denota autoridad gobernante. "El poder" funciona en español como equivalente natural de la autoridad efectiva que hereda Antíoco, sin forzar una especificación adicional como "reino".
- source_word: Ἐπιφανής
  english_pob_choice: Epiphanes
  chosen_spanish: Epífanes
  alternatives_spanish:
  - Ilustre
  - Manifestado
  lexicon: LSJ
  rationale: Se conserva como epíteto histórico propio y no se traduce, siguiendo la práctica de transliterar nombres y títulos establecidos.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: LSJ
  rationale: El griego usa explícitamente el sustantivo masculino singular. "Un hombre" es la equivalencia directa y natural en español.
- source_word: ὑπερήφανος
  english_pob_choice: proud
  chosen_spanish: orgulloso
  alternatives_spanish:
  - arrogante
  - haughty
  lexicon: LSJ
  rationale: El término apunta a una soberbia negativa. "Orgulloso" reproduce el valor básico y deja claro el matiz desfavorable por el contexto; "arrogante" sería una opción más fuerte.
- source_word: δεινός
  english_pob_choice: formidable
  chosen_spanish: formidable
  alternatives_spanish:
  - terrible
  - temible
  - peligroso
  lexicon: LSJ
  rationale: δεινός puede abarcar 'temible', 'terrible' o 'formidable'. "Formidable" mantiene el rango de amenaza y poder sin cerrar la ambigüedad del término griego.
theological_decisions:
- issue: Caracterización moral de Antíoco
  english_pob_reading: a proud and formidable man
  chosen_spanish_reading: un hombre orgulloso y formidable
  alternative_spanish_readings:
  - un hombre arrogante y temible
  - un hombre soberbio y terrible
  rationale: No hay un asunto doctrinal directo, pero sí una evaluación ética del gobernante. Se conserva la doble caracterización negativa del griego y del inglés auditado, sin suavizarla ni intensificarla indebidamente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el cierre del audit trail en inglés. Se mantuvo la estructura temporal del genitivo absoluto, la sucesión dinástica y el epíteto propio transliterado. La única nota necesaria es la amplitud semántica de δεινός, que en español también admite más de una solución válida.
  spanish_consistency_notes:
  - Se usa "Epífanes" como transliteración del epíteto, no como adjetivo traducido.
  - '"Sucedió en el poder" mantiene una cadencia natural en español y preserva la idea de sucesión política.'
  - No se introdujo terminología eclesiástica ni doctrinal ajena al pasaje.
  - La nota al pie se ancla en "formidable[a]" para reflejar la alternativa semántica documentada.
