theological_decisions:
- issue: Divine relenting from judgment without implying changeability contrary to God's holiness
  chosen_reading: The verse is rendered as a declaration that God will not execute total destructive wrath against Ephraim, grounded in his being God, not man, and the Holy One present among his people.
  alternative_readings:
  - A more anthropopathic reading that stresses emotional reversal without qualification
  rationale: The Hebrew presents God's refusal to carry out full anger and to destroy again, with the rationale rooted in his divine holiness. The translation preserves this tension without importing a philosophical explanation of immutability or denying the relational language of the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Interpretation of וְלֹא אָבֹוא בְּעִיר
  chosen_reading: Rendered idiomatically as 'I will not come in wrath' in the main text.
  alternative_readings:
  - I will not come into the city
  rationale: The clause is lexically difficult and contextually tied to withheld judgment. The main text favors the sense of non-destructive visitation; the more literal alternative is preserved in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it.
