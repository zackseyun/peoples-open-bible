translation:
  language: es
  text: Su pórtico daba al atrio exterior, y había palmeras[a] en sus jambas, de un lado y del otro[b]; y ocho escalones conducían a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palmeras talladas», porque el término es literal («palmeras») pero en este contexto arquitectónico probablemente alude a motivos decorativos.
    reason: lexical_alternative
  - marker: b
    text: O «postes laterales» para «jambas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלַמּוֹ
  english_pob_choice: Its portico
  chosen_spanish: Su pórtico
  alternatives_spanish:
  - Y su pórtico
  - Su vestíbulo
  lexicon: HALOT
  rationale: En contexto arquitectónico del templo, אֵלָם designa el pórtico o antecámara de la puerta. «Pórtico» es natural en español y conserva el valor estructural sin imponer una interpretación más amplia como «vestíbulo».
- source_word: לֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: faced the outer court
  chosen_spanish: daba al atrio exterior
  alternatives_spanish:
  - estaba hacia el atrio exterior
  - miraba al atrio exterior
  lexicon: HALOT
  rationale: La preposición ל en esta descripción indica orientación hacia un espacio. «Daba al» expresa bien esa relación espacial en español y evita una traducción demasiado mecánica.
- source_word: וְתִמֹרִים
  english_pob_choice: and palm trees
  chosen_spanish: y había palmeras
  alternatives_spanish:
  - y palmeras
  - y tallas de palmeras
  - y motivos de palmera
  lexicon: HALOT
  rationale: El hebreo dice literalmente «palmeras». Como el contexto es arquitectónico, puede aludir a decoración tallada, pero el texto base no lo explicita; por eso se mantiene «palmeras» en el cuerpo y se deja la alternativa implícita en la nota.
- source_word: אֶל־אֵלָיו
  english_pob_choice: were on its jambs
  chosen_spanish: en sus jambas
  alternatives_spanish:
  - en sus postes laterales
  - en sus pilares laterales
  lexicon: HALOT
  rationale: En estas descripciones de puertas del templo, el término refiere a los soportes laterales/jambas de la entrada. «Jambas» es preciso y conciso en español arquitectónico.
- source_word: מִפֹּה וּמִפֹּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de un lado y del otro
  alternatives_spanish:
  - a uno y otro lado
  - a ambos lados
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y bilateral. «De un lado y del otro» conserva ese paralelismo con español natural y sin comprimir demasiado el matiz.
- source_word: וּשְׁמֹנֶה מַעֲלֹות
  english_pob_choice: and eight steps
  chosen_spanish: ocho escalones
  alternatives_spanish:
  - ocho gradas
  - ocho peldaños
  lexicon: HALOT
  rationale: מַעֲלוֹת puede referirse a escalones o gradas. «Escalones» comunica la idea con claridad en español bíblico actual y funciona bien en la imagen arquitectónica.
- source_word: מַעֲלוֹ
  english_pob_choice: went up to it
  chosen_spanish: subían a él
  alternatives_spanish:
  - llevaban hasta él
  - daban acceso a él
  lexicon: HALOT
  rationale: El sustantivo final completa la idea de ascenso de la escalera. En español, «subían a él» expresa esa función sin forzar una perífrasis demasiado interpretativa.
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente: no hubo cambios aplicados y el texto base se mantiene en alta concordancia con el auditoría inglesa.'
  spanish_consistency_notes:
  - Se conservó «pórtico» para la estructura de acceso, coherente con el uso arquitectónico del pasaje.
  - Se evitó «SEÑOR» u otra terminología teológica no presente en este versículo.
  - «Atrio exterior» mantiene la distinción espacial del templo sin adaptar el término a vocabulario eclesiástico moderno.
  - La alternancia singular/plural no plantea tensión doctrinal aquí; el verso es puramente descriptivo.
