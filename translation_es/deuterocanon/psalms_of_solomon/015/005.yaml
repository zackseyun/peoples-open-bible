translation:
  language: es
  text: un salmo nuevo con canto[a], en el gozo del corazón; el fruto de los labios con el instrumento bien afinado de la lengua[c][b]; las primicias de los labios de un corazón santo y justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «el fruto de los labios con un instrumento ajustado a la lengua». El griego es compacto y algo difícil, así que el texto principal expresa su sentido más natural en español.
    reason: lexical_alternative
  - marker: b
    text: Las expresiones «fruto de los labios» y «primicias de los labios» conservan la imagen de ofrenda del poema, en vez de reducirla a mero habla o alabanza.
    reason: cultural_note
  - marker: c
    text: O «con la lengua como instrumento bien afinado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ψαλμὸν καινόν
  english_pob_choice: a new psalm
  chosen_spanish: un salmo nuevo
  alternatives_spanish:
  - un salmo fresco
  - un nuevo himno
  lexicon: LSJ
  rationale: ψαλμός se conserva naturalmente como «salmo», que en español mantiene el género literario-religioso mejor que «himno». καινός se traduce de forma directa por «nuevo».
- source_word: ᾠδῆς
  english_pob_choice: song
  chosen_spanish: canto
  alternatives_spanish:
  - canción
  - oda
  lexicon: LSJ
  rationale: ᾠδή significa «canto/canción». Elegí «canto» porque suena más digno y fluido en español bíblico que «canción», sin añadir un matiz ajeno al griego.
- source_word: ἐν εὐφροσύνῃ καρδίας
  english_pob_choice: in the joy of the heart
  chosen_spanish: en el gozo del corazón
  alternatives_spanish:
  - con la alegría del corazón
  - en la alegría del corazón
  lexicon: LSJ
  rationale: εὐφροσύνη expresa gozo/alegría interior. «Gozo del corazón» conserva el genitivo de fuente y mantiene un registro bíblico claro en español.
- source_word: καρπὸν χειλέων
  english_pob_choice: the fruit of lips
  chosen_spanish: el fruto de los labios
  alternatives_spanish:
  - el fruto que dan los labios
  - el fruto de los labios
  lexicon: LSJ
  rationale: Se conserva la metáfora de «fruto» para no aplanar la imagen de ofrenda verbal. «De los labios» refleja el genitivo y el sentido idiomático.
- source_word: ἐν ὀργάνῳ ἤρμοσμένῳ γλώσσης
  english_pob_choice: with the well-tuned instrument of the tongue
  chosen_spanish: con el instrumento bien afinado de la lengua
  alternatives_spanish:
  - con la lengua como instrumento bien afinado
  - con el instrumento de la lengua bien afinado
  lexicon: LSJ
  rationale: La construcción griega es compacta y poética. «Instrumento bien afinado de la lengua» conserva la imagen y el genitivo de «lengua», evitando forzar una paráfrasis comparativa.
- source_word: ἀπαρχὴν χειλέων
  english_pob_choice: the firstfruits of lips
  chosen_spanish: las primicias de los labios
  alternatives_spanish:
  - la primera ofrenda de los labios
  - las primicias que dan los labios
  lexicon: LSJ
  rationale: «Primicias» preserva la imaginería sacrificial/ofertorial del término ἀπαρχή, que en español bíblico es transparente y no se reduce a una simple «ofrenda».
- source_word: ἀπὸ καρδίας ὁσίας καὶ δικαίας
  english_pob_choice: from a holy and righteous heart
  chosen_spanish: de un corazón santo y justo
  alternatives_spanish:
  - de un corazón santo y recto
  - de un corazón piadoso y justo
  lexicon: LSJ
  rationale: ὁσία y δικαία forman un par moral-religioso. «Santo y justo» reproduce bien la pareja y evita sobreexplicar con términos más interpretativos.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del griego que privilegia la estructura nominal «instrumento bien afinado de la lengua» frente a una paráfrasis con «como». El español principal sigue esa orientación, manteniendo la relación genitiva y la imaginería poética del original. También se respetó el acuerdo alto de las revisiones recientes, sin introducir cambios innecesarios.
  spanish_consistency_notes:
  - Se conservó «salmo» para ψαλμός, en línea con el registro bíblico español y la práctica POB.
  - Se mantuvo la metáfora de ofrenda en «fruto» y «primicias» para no neutralizar el lenguaje cultual del verso.
  - «Santo y justo» reproduce la pareja moral del griego sin convertirla en una glosa explicativa.
  - La puntuación separa las tres miembros poéticos con punto y coma, siguiendo la segmentación del original.
