  yaml_path: translation/nt/acts/028/004.yaml
  text: When the islanders saw the creature hanging from his hand[a], they said to one another, “Surely this man is a murderer, whom Justice has not allowed to live[d][c][b], though he was brought safely from the sea.”
  footnotes:
  - marker: a
    text: "Or 'the natives' or, more literally, 'the barbarians'—that is, the non-Greek-speaking local inhabitants."
    reason: lexical_alternative
  - marker: b
    text: "'Justice' translates Greek dikē, here likely personified as retributive justice; possibly an allusion to a goddess figure in the islanders' pagan understanding."
    reason: cultural_note
  - marker: c
    text: "Or 'whom justice did not permit to live, though he had escaped from the sea.'"
    reason: alternative_reading
  - marker: d
    text: "Or 'through from the sea'."
    reason: previous_rendering
translation:
  language: ko
  text: 그 지역 사람들이 그 짐승이 그의 손에 달려 있는 것을 보고 서로 말했습니다. 「이 사람은 분명 살인자다. 그가 바다에서 무사히 건져졌으나 「정의의 여신」[a]이 그를 살려 두지 않는구나.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「정의」(δίκη)는 여기서 의인화된 응징의 정의를 가리키며, 그 섬 주민들의 이교적 이해에서 어떤 여신을 암시할 가능성이 있다.
    reason: cultural_note
