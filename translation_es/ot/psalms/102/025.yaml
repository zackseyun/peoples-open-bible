    text: Or, more literally, “do not bring me up in the middle of my days.” The Hebrew verb can mean “bring up,” but here likely carries the sense of being taken away prematurely.
    reason: lexical_alternative
  - marker: b
    text: Or “from generation to generation.”
    reason: lexical_alternative
