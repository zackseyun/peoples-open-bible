revisions:
- from: El nombre de la esposa de Amram era Jocabed[a], la hija de Leví, que fue dada a luz a Leví en Egipto. Ella dio a luz a Amram a Aarón y a Moisés[b], y a Miriam, su hermana.
  to: El nombre de la esposa de Amram era Jocabed[a], la hija de Leví, que le nació a Leví en Egipto. Ella le dio a Amram a Aarón y a Moisés[b], y a Miriam, la hermana de ellos.
  rationale: 'Se corrigen dos giros no idiomáticos ni fieles en español: la cláusula relativa pasa a «que le nació a Leví en Egipto», que comunica naturalmente el valor del hebreo sin suplir a la madre; y la segunda cláusula se ajusta a «Ella le dio a Amram a Aarón y a Moisés», donde Amram queda correctamente como referente relacional, no como hijo nacido. También se precisa el plural de «la hermana de ellos». Se conservan la literalidad teológicamente importante de «la hija de Leví» y las notas léxicas del expediente inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:47:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: fórmula introductoria, identificación de Jocabed, retención literal de «la hija de Leví», y la lista de Aarón, Moisés y Miriam. Sin embargo, falla en dos puntos importantes de alineación semántica: «que fue dada a luz a Leví en Egipto» es español antinatural y además expresa mal la relación; y «Ella dio a luz a Amram a Aarón y a Moisés» sugiere erróneamente que Amram es objeto directo del parto, cuando en hebreo לְעַמְרָם marca la relación paterna/esposa. También «su hermana» pierde el plural de אֲחֹתָם (‘la hermana de ellos’).'
  spanish_quality_summary: La legibilidad en español es deficiente en las dos cláusulas de nacimiento. «Fue dada a luz» suena forzado y no idiomático; «dio a luz a Amram a Aarón y a Moisés» es sintácticamente torpe y puede confundirse. Una redacción más natural y fiel es «que nació para Leví en Egipto» o mejor «que le nació a Leví en Egipto», y «le dio a Amram a Aarón y a Moisés». También conviene ajustar «su hermana» a «la hermana de ellos» para reflejar el plural sin ambigüedad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres Jocabed, Leví, Aarón, Moisés y Miriam son aceptables en español bíblico. La decisión teológica de mantener «la hija de Leví» está bien alineada con el expediente inglés. Las notas deben mantenerse, pero la nota b debe formularse en español más claro.
  issues:
  - severity: high
    issue: «que fue dada a luz a Leví en Egipto» es una formulación española antinatural y semánticamente débil
    rationale: Aunque busca reflejar el pasivo usado en inglés, en español esa construcción no es digna ni clara. El hebreo expresa ‘a quien dio a luz ... para/a Leví en Egipto’ con la madre implícita; una solución natural es «que le nació a Leví en Egipto», que preserva el sentido sin introducir sujeto explícito.
  - severity: high
    issue: «Ella dio a luz a Amram a Aarón y a Moisés» distribuye mal los complementos
    rationale: En español, «dar a luz a» toma como objeto al hijo nacido, no al padre. Aquí el hebreo לְעַמְרָם marca relación paterna/conyugal. Debe decirse «le dio a Amram a Aarón y a Moisés» o reestructurarse equivalentemente.
  - severity: medium
    issue: «su hermana» no refleja con precisión el sufijo plural de אֲחֹתָם
    rationale: El hebreo dice literalmente ‘la hermana de ellos’. «Su hermana» puede entenderse, pero en español queda ambiguo y pierde la referencia explícita a Aarón y Moisés.
  - severity: low
    issue: La nota b puede expresarse con mejor español
    rationale: '«a quien dio a luz a Leví en Egipto» repite la torpeza de la línea principal. Conviene aclarar: «Hebreo literalmente: “a quien dio a luz para Leví en Egipto”, con la madre implícita...»'
  revised_spanish_text: El nombre de la esposa de Amram era Jocabed[a], la hija de Leví, que le nació a Leví en Egipto. Ella le dio a Amram a Aarón y a Moisés[b], y a Miriam, la hermana de ellos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la hija de Leví». En contextos genealógicos, «hija» puede funcionar de manera más amplia para una descendiente femenina.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «a quien dio a luz para Leví en Egipto», con la madre implícita en la construcción.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos giros no idiomáticos ni fieles en español: la cláusula relativa pasa a «que le nació a Leví en Egipto», que comunica naturalmente el valor del hebreo sin suplir a la madre; y la segunda cláusula se ajusta a «Ella le dio a Amram a Aarón y a Moisés», donde Amram queda correctamente como referente relacional, no como hijo nacido. También se precisa el plural de «la hermana de ellos». Se conservan la literalidad teológicamente importante de «la hija de Leví» y las notas léxicas del expediente inglés.'
