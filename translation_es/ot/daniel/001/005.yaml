base_translation:
  language: en
  yaml_path: translation/ot/daniel/001/005.yaml
  text: And the king assigned to them a daily portion from the king’s food and from the wine he drank[a], and to bring them up for three years[c][b]; and at the end of them they were to stand before the king.
  footnotes:
  - marker: a
    text: Or 'from the king’s delicacies' or 'from the king’s rich food.' The Hebrew refers to provisions from the royal table and may imply luxury food.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'at the end of them,' referring to the end of the three years.
    reason: lexical_alternative
  - marker: c
    text: '''Stand before the king'' is a court expression meaning to appear in royal service or attendance.'
    reason: cultural_note
