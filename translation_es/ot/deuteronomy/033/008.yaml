base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/008.yaml
  text: 'And of Levi he said: “Your Thummim and your Urim belong to your faithful one[a], whom you tested at Massah[b], with whom you contended at the waters of Meribah.”'
  footnotes:
  - marker: a
    text: Or 'for your godly man' or 'for your loyal one.' The Hebrew expression can denote one marked by covenant loyalty.
    reason: lexical_alternative
  - marker: b
    text: Massah means 'testing,' and Meribah is associated with 'quarreling/contention' (see Exod 17:1–7; Num 20:1–13).
    reason: cross_reference
