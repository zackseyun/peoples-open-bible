theological_decisions:
- issue: Rendering the sexual violence in a way that is faithful to the Hebrew without euphemism or over-interpretation
  chosen_reading: 'The verse is translated to state plainly that Shechem committed sexual violation: ''he took her and lay with her and violated her.'''
  alternative_readings:
  - '''he seized her and raped her'''
  - '''he took her and humbled her'''
  rationale: The narrative sequence ויקח... וישכב... ויענה presents an act of coercive sexual wrongdoing. The translation avoids softening the event, but also distinguishes between the more general verb לקח ('took') and the climactic evaluative verb ענה ('violated/humiliated'). This preserves the Hebrew's progression and gravity.
  doctrine_reference: Translation philosophy §§1, 3, 6
