translation:
  language: es
  text: Así que los sacerdotes y los levitas recibieron la plata ya pesada[a], el oro y los utensilios, para llevarlos a Jerusalén[b], a la casa de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el peso de la plata». El hebreo puede referirse tanto al peso mismo como a la cantidad de plata ya pesada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al templo de nuestro Dios». Literalmente: «a la casa de nuestro Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִבְּלוּ
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - tomaron bajo su custodia
  lexicon: HALOT
  rationale: קבל en este contexto de entrega administrativa expresa recepción formal de bienes; «recibieron» comunica con naturalidad la transferencia de responsabilidad sin introducir un matiz más interpretativo como «tomaron bajo su custodia».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Correspondencia directa y estable para כהנים. «Sacerdotes» es el término español más claro y fiel al oficio cultual.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levíticos
  lexicon: HALOT
  rationale: Leví/levitas es el equivalente consolidado en español para לויים; se preserva el nombre colectivo tradicional sin añadir explicación.
- source_word: מִשְׁקַל
  english_pob_choice: the weighed silver
  chosen_spanish: la plata pesada
  alternatives_spanish:
  - el peso de la plata
  - la plata que había sido pesada
  lexicon: HALOT
  rationale: El inglés POB decidió mantener la idea de que el metal ya había sido pesado. En español, «plata pesada» conserva la concisión y el hecho administrativo de peso/ponderación, aunque suena algo más terso; se evita convertirlo en una abstracción como «el peso de la plata» para no perder el valor material del objeto entregado.
- source_word: הַכֶּסֶף וְהַזָּהָב וְהַכֵּלִים
  english_pob_choice: the silver, the gold, and the vessels
  chosen_spanish: la plata, el oro y los utensilios
  alternatives_spanish:
  - la plata, el oro y los vasos
  - la plata, el oro y los objetos
  lexicon: HALOT
  rationale: כסף y זהב se traducen de forma literal. Para כלים, «utensilios» conserva la amplitud semántica de objetos/implementos sin forzar una lectura exclusivamente litúrgica como «vasos»; en este contexto de bienes del templo, sigue siendo natural y suficientemente exacto.
- source_word: לְהָבִיא
  english_pob_choice: to bring them
  chosen_spanish: para llevarlos
  alternatives_spanish:
  - para traerlos
  - para transportarlos
  lexicon: HALOT
  rationale: El infinitivo de finalidad expresa propósito. «Llevarlos» es más natural en español que un calco de «traer» desde el punto de referencia de Jerusalén, y mantiene la dirección del traslado sin sobreinterpretar el modo.
- source_word: לִירוּשָׁלַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español con preposición direccional simple.
- source_word: לְבֵית אֱלֹהֵינוּ
  english_pob_choice: to the house of our God
  chosen_spanish: a la casa de nuestro Dios
  alternatives_spanish:
  - al templo de nuestro Dios
  lexicon: HALOT
  rationale: Se mantiene la metáfora/hebraísmo literal «casa de nuestro Dios», como en el inglés POB. «Templo» queda como alternativa interpretativa, pero no se usa en el texto principal porque el hebreo dice literalmente «casa».
translation_notes:
  revision_awareness: El inglés POB fue revisado desde una formulación más pesada («the weighed amount of the silver») a «the weighed silver» para mayor naturalidad, sin perder el sentido de מִשְׁקַל. La versión española sigue esa misma decisión de concisión y concreción material. También se mantiene la alternativa interpretativa de בית אלהינו como «templo» en nota, pero el texto principal conserva «casa».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el hebreo dice אֱלֹהֵינוּ («nuestro Dios»), por lo que no aplica.
  - Se conserva «levitas» como término fijo para לויים.
  - «Utensilios» se usa como término amplio y sobrio para כֵּלִים en un contexto de traslado de objetos sagrados, evitando restringirlo indebidamente a «vasos».
  - La traducción sigue un registro formal pero natural, sin añadir elementos no presentes en el hebreo.
