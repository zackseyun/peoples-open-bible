revisions:
- from: Porque tu esposo es tu Hacedor[a]; Yahvé de los Ejércitos es su nombre. Y tu Redentor es el Santo de Israel[b]; será llamado el Dios de toda la tierra.
  to: Porque tu esposo es tu Hacedor; Yahvé de los Ejércitos[a] es su nombre. Y tu Redentor es el Santo de Israel; es llamado[b] el Dios de toda la tierra.
