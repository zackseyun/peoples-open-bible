review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva con suficiente fidelidad la distinción verbal del hebreo ni la decisión léxica auditada en inglés. וְהִכְרַתִּי fue documentado como 'I will cut off', pero el español lo igualó a 'derribaré', confundiendo el primer acto de remover/eliminar ciudades con el segundo acto concreto de derribar fortificaciones. עָרֵי אַרְצְךָ, וְהָרַסְתִּי, כָּל, y מִבְצָרֶיךָ están sustancialmente bien representados.
  spanish_quality_summary: 'El español es legible y natural, pero la repetición de ''derribaré'' en ambas cláusulas debilita la imagen profética y suena menos precisa: uno no ''derriba'' ciudades de manera tan idiomática como sí derriba fortalezas. ''Quitaré de en medio'' o ''exterminaré'' serían posibles, pero ''cortaré de raíz'' sería demasiado interpretativo. ''Eliminaré'' es natural, aunque algo menos imagístico; ''cortaré'' solo sería poco idiomático con ciudades. La mejor reparación breve y fiel es ''quitaré de en medio''.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías/esclavo. La revisión se centra en respetar la distinción entre כרת ('cortar/quitar de en medio') y הרס ('derribar'). 'Fortalezas' alinea bien con מִבְצָרֶיךָ.
  issues:
  - severity: high
    issue: El primer verbo וְהִכְרַתִּי se tradujo como 'derribaré' en vez de reflejar 'cut off'.
    rationale: La auditoría inglesa justificó explícitamente 'cut off' para conservar la imagen y fuerza profética de כרת. Repetir 'derribaré' borra una distinción significativa del hebreo y del audit trail.
  - severity: medium
    issue: La repetición de 'derribaré' hace menos natural la primera cláusula en español.
    rationale: En español 'derribar ciudades' es menos idiomático que 'derribar fortalezas'. La primera cláusula pide una expresión de remoción/eliminación más que de demolición estructural.
  revised_spanish_text: Y quitaré de en medio las ciudades de tu tierra, y derribaré todas tus fortalezas.
  revision_rationale: Se reemplaza el primer 'derribaré' por 'quitaré de en medio' para reflejar mejor הִכְרַתִּי ('cut off') sin caer en un calco poco natural como 'cortaré' con 'ciudades'. Se mantiene 'derribaré' para הָרַסְתִּי y 'fortalezas' para מִבְצָרֶיךָ, preservando la imagen concreta de desmantelar defensas.
