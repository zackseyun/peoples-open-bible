  glossary_alignment: Se mantiene correctamente «Yahvé» para יהוה y «santo» para קֹדֶשׁ. No hay conflicto terminológico mayor. La revisión conserva la apertura semántica de הִלּוּלִים con «para alabanza» y preserva la nota alternativa.
