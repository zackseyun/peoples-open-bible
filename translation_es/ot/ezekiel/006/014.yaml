base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/006/014.yaml
  text: So I will stretch out my hand against them and make the land a desolation and a waste[a], from the wilderness to Diblah, throughout all their settlements[b]. Then they will know that I am Yahweh.
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the wilderness toward Diblath.'' The place name is uncertain; some understand ''from the wilderness to Diblath,'' and some textual proposals relate it to Riblah.'
    reason: textual_variant
  - marker: b
    text: Or 'in all their dwelling places.'
    reason: lexical_alternative
