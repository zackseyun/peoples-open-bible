translation:
  language: es
  text: Retuércete y gime[a], hija de Sion, como una mujer que da a luz; porque ahora saldrás de la ciudad y habitarás en el campo, y llegarás hasta Babilonia. Allí serás rescatada[b]; allí Yahvé te redimirá de la mano de tus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clama». El verbo hebreo puede expresar un grito o gemido de dolor, acorde con la imagen del parto.
    reason: lexical_alternative
  - marker: b
    text: O «serás librada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ח֧וּלִי
  english_pob_choice: Writhe
  chosen_spanish: Retuércete
  alternatives_spanish:
  - Estremécete
  - Retuércete de dolor
  - Padéce
  lexicon: HALOT
  rationale: El verbo en imperativo femenino singular en contexto de parto expresa convulsión física y dolor. «Retuércete» conserva la intensidad corporal sin añadir una explicación ajena al hebreo.
- source_word: וָ/גֹ֛חִי
  english_pob_choice: and groan
  chosen_spanish: y gime
  alternatives_spanish:
  - y clama
  - y lanza un grito
  - y suspira
  lexicon: HALOT
  rationale: El verbo puede denotar un clamor o gemido de dolor. «Gime» encaja bien con la imagen de parto y mantiene la fuerza dolorosa del paralelo poético.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sion
  alternatives_spanish:
  - hija Sion
  - Daughter Zion
  - hija de Jerusalén
  lexicon: HALOT
  rationale: La fórmula profética personifica a Sion/Jerusalén. «Hija de Sion» conserva el giro idiomático sin volverlo una paráfrasis más interpretativa.
- source_word: כַּ/יּֽוֹלֵדָה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como una mujer que da a luz
  alternatives_spanish:
  - como una mujer en parto
  - como una parturienta
  - como una mujer dando a luz
  lexicon: HALOT
  rationale: La comparación es explícita con una mujer que está dando a luz. Esta forma es natural en español y preserva la metáfora del alumbramiento.
- source_word: מִ/קִּרְיָה
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - desde la ciudad
  - de la villa
  lexicon: HALOT
  rationale: El término remite a la ciudad como lugar habitado y protegido. «De la ciudad» sigue de cerca el hebreo y funciona con naturalidad en español.
- source_word: וְ/שָׁכַ֣נְתְּ בַּ/שָּׂדֶ֗ה
  english_pob_choice: and dwell in the field
  chosen_spanish: y habitarás en el campo
  alternatives_spanish:
  - y morarás en el campo
  - y vivirás en el campo
  - y acamparás en el campo
  lexicon: HALOT
  rationale: שׁכן expresa morar o habitar; «habitarás» mantiene el verbo con solemnidad. «En el campo» reproduce el ámbito expuesto fuera de la protección urbana.
- source_word: וּ/בָ֤את עַד בָּבֶל֙
  english_pob_choice: and you will go as far as Babylon
  chosen_spanish: y llegarás hasta Babilonia
  alternatives_spanish:
  - y irás hasta Babilonia
  - y vendrás hasta Babilonia
  - y alcanzarás Babilonia
  lexicon: HALOT
  rationale: La partícula עַד marca extensión o límite alcanzado. «Llegarás hasta Babilonia» conserva ese matiz de desplazamiento hasta ese punto.
- source_word: שָׁ֣ם תִּנָּצֵ֔לִי
  english_pob_choice: There you will be rescued
  chosen_spanish: Allí serás rescatada
  alternatives_spanish:
  - Allí serás librada
  - Allí serás entregada
  - Allí serás salvada
  lexicon: HALOT
  rationale: El nifal de נצל comunica ser librada de peligro. «Rescatada» expresa bien la acción pasiva de liberación y evita que el verbo se confunda con גאל.
- source_word: יִגְאָלֵ֣ךְ
  english_pob_choice: will redeem you
  chosen_spanish: te redimirá
  alternatives_spanish:
  - te rescatará
  - te rescatará mediante rescate
  - te reivindicará
  lexicon: HALOT
  rationale: גאל es un término clave de redención con peso relacional y covenantal. «Redimirá» preserva esa densidad mejor que equivalentes más generales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología base del proyecto, manteniendo el nombre divino propio y no sustituyéndolo por un título.
- source_word: מִ/כַּ֖ף אֹיְבָֽיִ/ךְ
  english_pob_choice: from the hand of your enemies
  chosen_spanish: de la mano de tus enemigos
  alternatives_spanish:
  - del poder de tus enemigos
  - del dominio de tus enemigos
  - del alcance de tus enemigos
  lexicon: HALOT
  rationale: «Mano» conserva el hebraísmo de poder/control. Es una imagen idiomática clara en español y no requiere explicación añadida.
theological_decisions:
- issue: Distinción entre תִּנָּצֵלִי y יִגְאָלֵךְ
  english_pob_reading: There you will be rescued; there Yahweh will redeem you
  chosen_spanish_reading: Allí serás rescatada; allí Yahvé te redimirá
  alternative_spanish_readings:
  - Allí serás librada; allí Yahvé te redimirá
  - Allí serás salvada; allí Yahvé te rescatará
  rationale: Conviene mantener dos verbos distintos en español, porque el hebreo distingue entre ser librada del peligro y la acción redentora de Yahvé. «Rescatada» para נצל y «redimirá» para גאל preservan esa tensión semántica y teológica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La base del proyecto pide traducir el Tetragrámaton como «Yahvé». Esto conserva el nombre propio del Dios de Israel y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada de traducir בַּשָּׂדֶה simplemente como «en el campo», sin ampliar a «campo abierto». También conserva la distinción auditada entre נצל y גאל, y mantiene el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se conserva la personificación profética «hija de Sion» como giro idiomático estable.
  - «Redimirá» se reserva para גאל, mientras «rescatada» traduce נצל, para no borrar la diferencia léxica documentada.
  - El pronombre y la flexión verbal en segunda persona femenina singular siguen el hebreo.
  - «De la mano de tus enemigos» preserva la metáfora de poder/control sin sustituirla por un abstracto.
