translation:
  language: es
  text: Mantén tus ojos en el campo donde siegan, y ve detrás de ellas. ¿No he ordenado a los jóvenes que no te toquen[a]? Cuando tengas sed, ve a los cántaros y bebe de lo que los jóvenes han sacado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más contextualmente, ‘que no te pongan la mano encima’. El hebreo dice literalmente ‘que no te toquen’, lo cual puede incluir protección contra hostigamiento o agresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַיִךְ
  english_pob_choice: Keep your eyes on
  chosen_spanish: Mantén tus ojos en
  alternatives_spanish:
  - Tus ojos deben estar en
  - Deja tus ojos puestos en
  lexicon: HALOT
  rationale: El hebreo usa literalmente ‘tus ojos’ con fuerza directiva; en español, ‘mantén tus ojos en’ conserva la instrucción de atención continua sin volverla artificial.
- source_word: בַּשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el sembrado
  - la parcela
  lexicon: HALOT
  rationale: שָׂדֶה se refiere aquí al terreno de labor; ‘campo’ es el equivalente natural y fiel en español.
- source_word: אֲשֶׁר יִקְצֹרוּן
  english_pob_choice: that they are reaping
  chosen_spanish: donde ellos siegan
  alternatives_spanish:
  - que ellos están segando
  - donde ellos están cosechando
  lexicon: HALOT
  rationale: Se conserva la relación descriptiva del campo con la acción de siega. ‘Siegan’ mantiene mejor la cercanía lexical con el hebreo que ‘cosechan’, aunque ambas son posibles en español.
- source_word: וְהָלַכְתִּ אַחֲרֵיהֶן
  english_pob_choice: and go after them
  chosen_spanish: y ve detrás de ellos
  alternatives_spanish:
  - y síguelos
  - y camina detrás de ellas
  lexicon: HALOT
  rationale: El hebreo enfatiza posición posterior y seguimiento. ‘Ve detrás de ellos’ es fiel y claro; ‘síguelos’ sería más idiomático pero menos transparente respecto de la dirección espacial.
- source_word: הֲלוֹא
  english_pob_choice: Have I not
  chosen_spanish: ¿No he ordenado
  alternatives_spanish:
  - ¿Acaso no he ordenado
  - ¿No es cierto que he ordenado
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de seguridad. En español, la forma interrogativa conserva el valor exhortativo y tranquilizador.
- source_word: צִוִּיתִי
  english_pob_choice: commanded
  chosen_spanish: ordenado
  alternatives_spanish:
  - mandado
  - encargado
  lexicon: HALOT
  rationale: ‘Ordenado’ expresa adecuadamente la autoridad de Booz en este contexto; ‘mandado’ también sería válido, pero ‘ordenado’ suena más natural y preciso en español actual.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los trabajadores jóvenes
  lexicon: HALOT
  rationale: נערים designa aquí a los varones del grupo de trabajo; ‘los jóvenes’ mantiene el rasgo de edad/género sin introducir una explicación ajena al texto.
- source_word: לְבִלְתִּי נָגְעֵךְ
  english_pob_choice: not to touch you
  chosen_spanish: que no te toquen
  alternatives_spanish:
  - que no te toquen ni te hagan daño
  - que no te pongan la mano encima
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘no tocarte’. En español, ‘que no te toquen’ conserva la literalidad, y el contexto permite la posible implicación de hostigamiento sin explicitarla en el texto principal.
- source_word: וְצָמִת
  english_pob_choice: When you are thirsty
  chosen_spanish: Cuando tengas sed
  alternatives_spanish:
  - Y cuando estés sedienta
  - Si tienes sed
  lexicon: HALOT
  rationale: La cláusula expresa una situación esperable; ‘cuando tengas sed’ es natural y preserva la instrucción concreta.
- source_word: הַכֵּלִים
  english_pob_choice: the jars
  chosen_spanish: los cántaros
  alternatives_spanish:
  - las vasijas
  - los recipientes
  lexicon: HALOT
  rationale: En el contexto de agua para beber, ‘cántaros’ comunica bien el tipo de recipiente y resulta más concreto que el genérico ‘vasijas’.
- source_word: וְשָׁתִית מֵאֲשֶׁר יִשְׁאֲבוּן
  english_pob_choice: and drink from what the young men have drawn
  chosen_spanish: y bebe de lo que los jóvenes han sacado
  alternatives_spanish:
  - y bebe de lo que los jóvenes hayan sacado
  - y bebe del agua que los jóvenes han sacado
  lexicon: HALOT
  rationale: שׁתה + מן + אשר indica beber de aquello que ha sido sacado. ‘Han sacado’ conserva la acción previa de extraer agua y evita añadir ‘agua’ si el hebreo no la nombra explícitamente.
- source_word: יִשְׁאֲבוּן
  english_pob_choice: have drawn
  chosen_spanish: han sacado
  alternatives_spanish:
  - han extraído
  - sacan
  lexicon: HALOT
  rationale: El verbo se usa para sacar agua; ‘han sacado’ es idiomático en español y refleja la acción de extraer sin tecnicismo innecesario.
theological_decisions:
- issue: Posible tono de protección frente a contacto físico
  english_pob_reading: not to touch you; may include protection from harassment or assault
  chosen_spanish_reading: que no te toquen
  alternative_spanish_readings:
  - que no te pongan la mano encima
  - que no te hagan daño
  rationale: El texto hebreo dice literalmente ‘no tocarte’. El español principal conserva esa literalidad, dejando la posible implicación de abuso o acoso para nota, sin cerrarla en la traducción base.
  doctrine_reference: Cuidado pastoral y protección de la dignidad personal; no depende de una formulación doctrinal específica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: ‘that they are reaping’ / ‘go after them’, manteniendo el orden de las acciones y la instrucción de protección. Se evita expandir el verso más allá del hebreo y se conserva la ambigüedad contextual de נגע en la nota.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene el registro narrativo sobrio y legible.
  - Se evita ‘siervo’ o ‘criado’ porque נערים aquí refiere específicamente a los varones del grupo de trabajo.
  - ‘Cántaros’ traduce el recipiente de manera concreta y compatible con el contexto de bebida.
  - La nota al pie queda anclada en ‘toquen’ para preservar la ambigüedad semántica del hebreo.
