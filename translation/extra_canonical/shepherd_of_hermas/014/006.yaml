translation:
  text: 6. And I answered her, “Lady, when then will they become fit for the building?” She said, “When
    their wealth that ensnares them has been cut away, then they will be useful to God. For just as a
    round stone, unless it is cut and casts off something from itself, cannot become square, so also those
    who are rich in this age, unless their wealth is cut away, cannot become useful to the Lord.
