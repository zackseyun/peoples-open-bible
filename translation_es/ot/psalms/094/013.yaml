translation:
  language: es
  text: para darle descanso de días de aflicción[a], hasta que se cave una fosa para el impío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de días de mal» o «de días malos». La expresión hebrea dice literalmente «de días de mal», es decir, días caracterizados por aflicción, calamidad o angustia.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que se cave la fosa de destrucción para el impío». El sustantivo puede llevar connotaciones de destrucción o sepulcro, además del sentido básico de «fosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַשְׁקִיט
  english_pob_choice: to give him rest
  chosen_spanish: darle descanso
  alternatives_spanish:
  - causarle quietud
  - concederle paz
  - hacerlo descansar
  lexicon: HALOT
  rationale: El hifil infinitivo expresa causar reposo o quietud a alguien. «Darle descanso» comunica con naturalidad esa acción causal en español, sin perder el matiz de alivio temporal.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: pronombre dativo
  rationale: El sufijo pronominal indica al beneficiario de la acción; en español se expresa bien con el dativo enclítico «-le» en «darle».
- source_word: מִימֵי רָע
  english_pob_choice: from days of trouble
  chosen_spanish: de días de mal
  alternatives_spanish:
  - de días de aflicción
  - de días de calamidad
  - de días malos
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «de días de mal/evil», y el inglés POB preserva la tensión entre lo literal y lo experiencial. «Días de mal» mantiene la cercanía al hebreo; el sentido contextual de aflicción queda implícito y se explica en la nota.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: conector temporal
  rationale: Marca el límite temporal del descanso concedido, por lo que «hasta que» reproduce con claridad la relación temporal.
- source_word: יִכָּרֶה
  english_pob_choice: is dug
  chosen_spanish: se cave
  alternatives_spanish:
  - sea excavada
  - se prepare
  - se haga un hoyo
  lexicon: HALOT
  rationale: 'El nifal imperfecto aquí es pasivo: una fosa/pit «se cave». El español impersonal refleja bien la pasividad sin forzar un sujeto explícito.'
- source_word: לָרָשָׁע
  english_pob_choice: for the wicked
  chosen_spanish: para el impío
  alternatives_spanish:
  - para el malvado
  - para el perverso
  - para el inicuo
  lexicon: HALOT
  rationale: El adjetivo sustantivado designa al perverso como tipo. «Impío» es una opción bíblica clara y digna en español; «malvado» sería más general y menos marcado religiosamente.
- source_word: שָׁחַת
  english_pob_choice: a pit
  chosen_spanish: una fosa
  alternatives_spanish:
  - un pozo
  - una cisterna
  - una fosa de destrucción
  lexicon: HALOT
  rationale: Aunque el término puede llevar matices de destrucción o sepulcro, la imagen básica es la de un hoyo/fosa. «Fosa» conserva el campo semántico y suena natural en español; la nota recoge la alternativa con sobretono destructivo.
theological_decisions:
- issue: Naturaleza del descanso concedido al justo afligido
  english_pob_reading: temporal relief from troubled days until judgment overtakes the wicked
  chosen_spanish_reading: alivio temporal de días de mal hasta que llegue la fosa preparada para el impío
  alternative_spanish_readings:
  - paz interior en medio del sufrimiento
  - descanso escatológico solamente
  rationale: La sintaxis del verso describe un alivio otorgado por Dios dentro del marco de la retribución divina, no una resolución total del sufrimiento. La traducción conserva ese carácter temporal y deja abierta la tensión teológica que el contexto sugiere.
  doctrine_reference: Preservar la tensión bíblica entre alivio presente y juicio futuro, sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue el cierre revisado de alta concordancia del audit trail inglés; no hay revisiones aplicadas en el texto fuente reciente, y la formulación española conserva tanto la lectura literal como la alternativa léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - «Impío» se usa por su valor bíblico y su correspondencia con el singular sustantivado del hebreo.
  - La nota de pie a conserva la tensión entre traducción literal y sentido contextual, conforme al audit trail inglés.
  - La nota de pie b preserva la ambigüedad de שׁחת entre fosa simple y fosa con connotación destructiva.
