translation:
  language: es
  text: 'Entonces José recordó los sueños que había soñado acerca de ellos, y les dijo: «Ustedes son espías; han venido a ver la desnudez[a] de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las partes expuestas/vulnerables de la tierra»; el hebreo dice literalmente «la desnudez de la tierra», una expresión idiomática para las zonas abiertas al ataque.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó
  - recordó en su memoria
  lexicon: HALOT
  rationale: El verbo hebreo זכר narra aquí la recuperación de algo a la mente. «Recordó» es el equivalente narrativo natural en español y conserva la inmediatez del relato.
- source_word: הַחֲלֹמוֹת אֲשֶׁר חָלַם
  english_pob_choice: the dreams that he had dreamed
  chosen_spanish: los sueños que había soñado
  alternatives_spanish:
  - los sueños que soñó
  - los sueños que había tenido
  lexicon: HALOT
  rationale: La construcción hebrea con חלם + חלומות tiene fuerza enfática/cognada. «Había soñado» mantiene esa relación verbal sin sonar forzado en español.
- source_word: לָהֶם
  english_pob_choice: about them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - referentes a ellos
  lexicon: HALOT
  rationale: El complemento expresa que los sueños tenían a ellos como asunto. «Acerca de ellos» comunica mejor la referencia relacional que una traducción más rígida.
- source_word: מְרַגְּלִים
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - exploradores
  - reconocedores
  lexicon: HALOT
  rationale: En este contexto el participio de רגל se usa para acusar de espionaje. «Espías» es la correspondencia clara y natural en español.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - inspeccionar
  - reconocer
  lexicon: HALOT
  rationale: El infinitivo literal es «ver». «Ver» conserva la forma básica del hebreo, mientras que el sentido de reconocimiento militar se entiende por el contexto acusatorio.
- source_word: עֶרְוַת הָאָרֶץ
  english_pob_choice: the nakedness of the land
  chosen_spanish: la desnudez de la tierra
  alternatives_spanish:
  - las partes expuestas de la tierra
  - la vulnerabilidad de la tierra
  - los puntos descubiertos de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es metafórica e idiomática; el texto literal habla de «desnudez». Se conserva la imagen para respetar la fuerza del hebreo, sin borrar la tensión semántica que luego puede explicarse en nota.
- source_word: בָּאתֶם
  english_pob_choice: you have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - ustedes vinieron
  lexicon: HALOT
  rationale: En español, el presente perfecto funciona bien en una acusación directa que tiene relevancia inmediata en la escena. Mantiene la vivacidad del intercambio.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de WLC y el audit trail inglés. No hubo revisiones aplicadas en la fuente inglesa; la formulación española conserva la metáfora idiomática de עֶרְוַת הָאָרֶץ y reproduce el tono acusatorio del discurso directo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «espías» para מְרַגְּלִים por ser el valor contextual claro.
  - Se conserva la metáfora de «desnudez» en el texto principal y se explica su sentido idiomático en nota.
  - Se emplea «Jesús/Mesías/Yahvé» según las reglas del proyecto, pero aquí no aplican.
  - La puntuación de diálogo sigue el uso editorial español con comillas angulares.
  - «Han venido» refleja el valor narrativo de la acusación directa sin alterar el contenido hebreo.
