    issue: «¿Cuál será la señal...?» añade un matiz futuro no necesario
    rationale: El hebreo מָה אוֹת pregunta por la señal misma, no específicamente por cuál será en el futuro. «¿Qué señal habrá...?» o «¿Cuál es la señal...?» preserva mejor el valor interrogativo sin interpretar de más.
  revised_spanish_text: 'Y dijo Ezequías a Isaías[a]: «¿Qué señal habrá de que Yahvé me sanará y de que subiré a la casa de Yahvé al tercer día?»'
