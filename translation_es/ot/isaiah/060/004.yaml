review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y la alternancia aspectual principal, pero no preserva con suficiente precisión dos decisiones auditadas clave: בָּנַיִךְ debe mantenerse como «tus hijos varones»/«tus hijos» en sentido masculino específico frente a «tus hijas», y עַל צַד תֵּאָמַנָה se entiende mejor como una imagen concreta de ser llevadas «en la cadera» que como el más vago «al costado». Además, las notas al pie están cruzadas: la nota [a] pertenece a «en la cadera/al costado», no a «mira», y la nota [b] debe explicar «serán llevadas», no «de lejos».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay problemas de legibilidad y precisión: «Levanta tus ojos alrededor» suena menos idiomático que «Alza tus ojos y mira alrededor» o «Alza tus ojos en derredor y mira». «Tus hijos» en contraste con «tus hijas» introduce ambigüedad inclusiva no deseada en español. «Al costado» es comprensible, pero pierde la imagen natural de cargar a una niña en brazos/cadera. También hay un error formal importante en la colocación y contenido de las notas.'
  glossary_alignment: 'No hay conflictos con Yahvé/Mesías/etc. En cuanto a decisiones léxicas del proyecto, conviene respetar la especificidad de género del hebreo: aquí no debe neutralizarse בָּנַיִךְ. La elección de «serán llevadas en la cadera» sigue mejor la racionalidad léxica documentada por el POB para עַל צַד תֵּאָמַנָה.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota [a] habla de «al costado / en la cadera», pero está anclada a «mira»; la nota [b] habla del verbo «serán llevadas/cuidadas/sostenidas», pero está anclada a «de lejos». Esto incumple el rastro auditado y el formato requerido.
  - severity: high
    issue: «Tus hijos» no preserva con suficiente claridad la oposición específica «sons / daughters».
    rationale: En español, «hijos» puede entenderse como inclusivo. Dado que el hebreo contrasta explícitamente «tus hijos» masculinos con «tus hijas», conviene usar «tus hijos varones» para evitar neutralización semántica.
  - severity: medium
    issue: «al costado» debilita la imagen concreta de עַל צַד.
    rationale: El POB auditado prefirió «on the hip» como mejor ajuste contextual. En español, «en la cadera» comunica la imagen natural de una niña cargada al lado del cuerpo mejor que «al costado», que puede sonar estático o anatómicamente vago.
  - severity: low
    issue: «Levanta tus ojos alrededor» suena algo poco idiomático.
    rationale: Aunque entendible, el giro no es el más natural en español bíblico contemporáneo. Una formulación como «Alza tus ojos alrededor y mira» o similar mejora la fluidez sin apartarse del hebreo.
  revised_spanish_text: Alza tus ojos alrededor y mira; todos se han reunido; vienen a ti. Tus hijos varones vendrán de lejos, y tus hijas serán llevadas en la cadera[a].[b]
