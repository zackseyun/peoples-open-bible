id: LUK.1.32
reference: Luke 1:32
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὗτος ἔσται μέγας καὶ υἱὸς Ὑψίστου κληθήσεται, καὶ δώσει αὐτῷ κύριος ὁ θεὸς τὸν θρόνον Δαυὶδ τοῦ πατρὸς αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/032.yaml
  text: He will be great and will be called the Son of the Most High[a], and the Lord God will give him the throne of David his father[c][b],
  footnotes:
  - marker: a
    text: 'Or ''This one will be great.'' The Greek begins with a demonstrative pronoun: ''This one.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'will be named Son of the Most High.'
    reason: lexical_alternative
  - marker: c
    text: '''His father'' refers to David as Jesus'' royal ancestor in the Davidic line.'
    reason: cultural_note
translation:
  language: ko
  text: 그는 큰 자가 될 것이며, 지극히 높으신 분의 아들이라 일컬어질 것이며, 야훼 하나님[a]께서 그에게 그의 조상 다윗의 보좌를 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문의 「κύριος ὁ θεός」는 다윗 언약(삼하 7:12-16)을 반향하는 LXX 양식의 「YHWH 엘로힘」을 그대로 반영한다.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος ὁ θεὸς
  english_pob_choice: the Lord God
  chosen_korean: 야훼 하나님
  alternatives_korean:
  - 주 하나님
  lexicon: BDAG
  rationale: 다윗 언약 문맥의 명백한 YHWH 호칭.
theological_decisions:
- issue: 가브리엘의 수태 고지에서 예수의 신원 — 지극히 높으신 분의 아들 + 다윗의 보좌
  chosen_reading: 「지극히 높으신 분의 아들」 + 「야훼 하나님께서 다윗의 보좌를 주실 것」
  alternative_readings:
  - 「하나님의 아들」로 단순화
  - 「주께서 다윗의 보좌를」
  rationale: 본문은 의도적으로 다윗 언약(삼하 7)과 시 2편의 메시아 양식을 결합한다. 「지극히 높으신 분의 아들」 칭호는 메시아의 신적·왕적 정체를 함께 가리키며, 다윗 언약의 주체가 명백히 야훼임을 본문이 칠십인역 양식으로 드러내므로 「야훼 하나님」으로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Davidic covenant + Divine name policy'
