translation:
  language: es
  text: Y el ala derecha[a] fue destrozada ante ellos, y él los persiguió hasta el monte de Azoto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cuerno derecho»; traducción literal de la metáfora militar. Aquí designa el lado o ala derecha del ejército.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hasta el Monte Azoto». El griego puede referirse a una montaña específica o a la zona elevada asociada con Azoto.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνετρίβη
  english_pob_choice: was crushed
  chosen_spanish: se quebró
  alternatives_spanish:
  - fue aplastado
  - fue quebrantado
  - fue destruido
  lexicon: LSJ
  rationale: El pasivo de συντρίβω expresa ser roto o aplastado. En español, «se quebró» conserva la imagen de ruptura y suena natural en un contexto bélico, sin convertirlo en una paráfrasis interpretativa como «fue derrotado».
- source_word: τὸ δεξιὸν κέρας
  english_pob_choice: the right wing
  chosen_spanish: el ala derecha
  alternatives_spanish:
  - el cuerno derecho
  - el flanco derecho
  lexicon: LSJ
  rationale: Aunque κέρας es literalmente «cuerno», en formación militar funciona como metáfora del lado o ala del ejército. «Ala derecha» mantiene el valor militar natural en español y deja visible la imagen figurada.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - de ellos
  - ante ellos
  lexicon: LSJ
  rationale: La idea no es un simple origen espacial, sino el retroceso o derrumbe del ala ante la presión enemiga. «Delante de ellos» comunica el avance del derrumbe en presencia de sus fuerzas, de modo idiomático en español.
- source_word: ἔδωκεν ὀπίσω αὐτῶν
  english_pob_choice: he pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los siguió de cerca
  - los acosó
  lexicon: LSJ
  rationale: La expresión griega es idiomática para la persecución de un enemigo en fuga. «Los persiguió» es la equivalencia española más clara y fiel, sin añadir matices no explicitados por el texto.
- source_word: ἕως Ἀζώτου ὄρους
  english_pob_choice: as far as Mount Azotus
  chosen_spanish: hasta el monte de Azoto
  alternatives_spanish:
  - hasta el Monte Azoto
  - hasta el monte de Azoto
  - hasta la región montañosa de Azoto
  lexicon: LSJ
  rationale: El griego puede referirse a una montaña concreta o al área elevada asociada con Azoto. «Monte de Azoto» conserva la cercanía formal del original y evita decidir más de lo que el texto permite. Se mantiene «Azoto» como forma española habitual del topónimo.
translation_notes:
  revision_awareness: 'El texto griego presenta una metáfora militar con κέρας («cuerno»), que la POB inglesa resuelve como «wing»; en español se sigue esa equivalencia natural. La frase ἕως Ἀζώτου ὄρους también conserva su ambigüedad geográfica: puede ser un monte específico o la zona montañosa vinculada con Azoto, por lo que se mantiene una nota alternativa.'
  spanish_consistency_notes:
  - Se usó «Azoto» para el topónimo, en coherencia con la tradición española de nombres bíblicos y para evitar una transliteración innecesaria.
  - Se prefirió «delante de ellos» para reflejar la caída del ala en contexto de combate, sin introducir una lectura demasiado técnica.
  - No se añadió lenguaje doctrinal; el versículo es narrativo-militar y no requiere explicitación teológica.
