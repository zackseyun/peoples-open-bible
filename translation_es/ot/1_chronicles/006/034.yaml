translation:
  language: es
  text: Y Aarón y sus hijos estaban ofreciendo en el altar del holocausto y en el altar del incienso[a], para toda la obra del Lugar Santísimo y para hacer expiación por Israel, conforme a todo lo que Moisés, el siervo de Dios, había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el santo de los santos»; la expresión hebrea también puede denotar «las cosas santísimas», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְטִירִים
  english_pob_choice: were offering
  chosen_spanish: estaban quemando incienso
  alternatives_spanish:
  - estaban ofreciendo
  - estaban haciendo subir humo de ofrenda
  lexicon: HALOT
  rationale: El verbo הִקְטִיר en contexto cultual puede abarcar la acción de hacer subir humo de una ofrenda o del incienso. Como el versículo menciona tanto el altar del holocausto como el del incienso, en español conviene una formulación que cubra la acción ritual de fuego sin restringirla solo a incienso ni introducir 'sacrificios' que el hebreo no expresa de manera explícita aquí. 'Quemando incienso' mantiene la imagen cultual, aunque en sentido amplio la acción es de ofrenda por fuego.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio quemado
  - el altar de la ofrenda quemada
  lexicon: HALOT
  rationale: La expresión cultual estándar en español bíblico es 'altar del holocausto', clara y reconocible. Conserva la referencia específica al altar asociado con la עולה sin perder naturalidad en español.
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar del perfume
  - el altar del sahumerio
  lexicon: HALOT
  rationale: '''Altar del incienso'' es la equivalencia más transparente y tradicional para el hebreo constructo y coincide con el uso cultual normal en español.'
- source_word: לְכֹל מְלֶאכֶת
  english_pob_choice: for all the work of
  chosen_spanish: para toda la obra de
  alternatives_spanish:
  - para todo el servicio de
  - para toda la labor de
  lexicon: HALOT
  rationale: מְלָאכָה aquí nombra trabajo asignado o desempeño ritual. 'Obra' conserva la amplitud del término sin volverlo demasiado técnico ni limitarlo a 'servicio' en sentido clerical.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: el Lugar Santísimo
  alternatives_spanish:
  - el Santo de los santos
  - las cosas santísimas
  lexicon: HALOT
  rationale: La expresión admite tanto una referencia al lugar interior santísimo como a realidades santísimas. En este contexto de ministerio sacerdotal y expiación, 'Lugar Santísimo' da una lectura espacial natural en español y preserva la ambigüedad con el verbo 'obra', aunque el hebreo puede también sugerir 'cosas santísimas'.
- source_word: וּלְכַפֵּר עַל יִשְׂרָאֵל
  english_pob_choice: and to make atonement for Israel
  chosen_spanish: para hacer expiación por Israel
  alternatives_spanish:
  - para hacer propiciación por Israel
  - para reconciliar a Israel
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal pide un término que conserve el sentido sacrificial y expiatorio. 'Hacer expiación' mantiene la fuerza ritual sin imponer una teoría doctrinal más estrecha que el texto.
- source_word: כְּכֹל אֲשֶׁר צִוָּה
  english_pob_choice: according to all that ... had commanded
  chosen_spanish: conforme a todo lo que ... había mandado
  alternatives_spanish:
  - según todo lo que ... había mandado
  - tal como ... había mandado
  lexicon: HALOT
  rationale: La construcción insiste en conformidad plena con el mandato de Moisés. 'Conforme a todo lo que' preserva esa totalidad de manera natural en español.
- source_word: עֶבֶד הָאֱלֹהִים
  english_pob_choice: the servant of God
  chosen_spanish: el siervo de Dios
  alternatives_spanish:
  - el esclavo de Dios
  - el servidor de Dios
  lexicon: HALOT
  rationale: Aunque 'esclavo' puede reflejar la fuerza léxica de עבד en otros contextos, aquí funciona claramente como título honorífico de Moisés. 'Siervo de Dios' es la forma más fiel y tradicional en español para ese uso titular y evita una dureza ajena al registro del pasaje.
theological_decisions:
- issue: Sentido de קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: el Lugar Santísimo
  alternative_spanish_readings:
  - el Santo de los santos
  - las cosas santísimas
  rationale: El hebreo permite una ambigüedad entre lugar santísimo y cosas santísimas. En este contexto sacerdotal, la lectura locativa es plausible y readable en español. La formulación elegida conserva la posibilidad de que el lector perciba el trasfondo de superlativo santidad sin forzar una aclaración interpretativa definitiva.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it'
- issue: Renderización de כפר
  english_pob_reading: and to make atonement for Israel
  chosen_spanish_reading: para hacer expiación por Israel
  alternative_spanish_readings:
  - para atonecer por Israel
  - para hacer propiciación por Israel
  rationale: Se mantiene el término sacrificial amplio sin insertar una explicación doctrinal particular. 'Expiación' comunica bien la función ritual del verbo en este entorno levítico y evita restringir su alcance semántico.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make'
- issue: Alcance de מַקְטִירִים
  english_pob_reading: were offering
  chosen_spanish_reading: estaban quemando incienso
  alternative_spanish_readings:
  - estaban ofreciendo
  - estaban haciendo subir humo de ofrenda
  rationale: El hebreo describe una acción cultual por fuego, y el versículo une dos altares. En español, la formulación escogida comunica el acto ritual sin depender de una traducción excesivamente literal que sonaría extraña; a la vez, no fuerza 'sacrificios' donde el texto no lo explicita.
  doctrine_reference: 'Translation philosophy: Preserve lexical range without narrowing the ritual action'
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para evitar añadir ''sacrificios'' a מַקְטִירִים y para mantener abierta la ambigüedad de קֹדֶשׁ הַקֳּדָשִׁים. La presente versión española sigue esa misma cautela: conserva la referencia cultual, evita sobreespecificar el acto verbal y mantiene una nota para la posible lectura alternativa de la expresión superlativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la convención general del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - '''Siervo de Dios'' se reserva como título para Moisés, no como equivalente genérico de δοῦλος.'
  - '''Expiación'' se emplea para כפר en contexto sacerdotal, coherente con el rango semántico del término y con la filosofía de traducción del proyecto.'
  - '''Lugar Santísimo'' conserva una lectura espacial natural en español y queda anotada la alternativa lexical del hebreo.'
