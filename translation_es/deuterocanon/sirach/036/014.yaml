translation:
  language: es
  text: Ten misericordia del pueblo, oh Yahvé, al que se llama por tu nombre, y de Israel,[a] al que has hecho como un primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Israel, al que has hecho tu primogénito», reflejando el tema bíblico más amplio de Israel como el hijo primogénito de Dios (compárese Éx 4:22). Más literalmente, el griego dice «al que hiciste como un primogénito».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλέησον
  english_pob_choice: Have mercy
  chosen_spanish: Ten misericordia
  alternatives_spanish:
  - Muestra misericordia
  - Sé misericordioso con
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una súplica directa por acción compasiva. «Ten misericordia» es la fórmula española natural y solemne que conserva el tono de oración sin añadir contenido ajeno.
- source_word: λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - tu pueblo
  - un pueblo
  lexicon: BDAG
  rationale: El griego no explicita posesivo. «El pueblo» mantiene la referencia abierta y fiel al texto, dejando que la cláusula siguiente identifique a quién se refiere.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Señor
  - oh Señor
  lexicon: BDAG
  rationale: En el contexto del POB, cuando el texto griego usa Κύριε en una invocación que corresponde al nombre divino, se traduce con «Yahvé» en vez de una máscara de «Señor». El vocativo español «oh» conserva el tono de ruego.
- source_word: κεκλημένον ἐπʼ ὀνόματί σου
  english_pob_choice: who are called by your name
  chosen_spanish: que es llamado por tu nombre
  alternatives_spanish:
  - que son llamados por tu nombre
  - que llevan tu nombre
  - que invoca tu nombre
  lexicon: BDAG
  rationale: La expresión idiomática de pertenencia/designación por el nombre se conserva con una formulación transparente en español. Se usa singular colectivo «el pueblo ... que es llamado» para reflejar el sustantivo singular griego y su valor colectivo.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Transliteración propia
  rationale: Nombre propio conservado sin cambio.
- source_word: πρωτόγονον
  english_pob_choice: a firstborn son
  chosen_spanish: a un primogénito
  alternatives_spanish:
  - a un hijo primogénito
  - al primogénito
  lexicon: LSJ
  rationale: El adjetivo significa «primogénito». En español, «a un primogénito» reproduce la comparación de forma sobria y evita añadir «hijo» en el texto principal, ya que el griego no lo explicita aquí.
- source_word: ὡμοίωσας
  english_pob_choice: you made like / you likened
  chosen_spanish: has hecho semejante
  alternatives_spanish:
  - has hecho como
  - has comparado
  - has asemejado
  lexicon: BDAG
  rationale: El verbo ὁμοιόω expresa hacer semejante o comparar. «Has hecho semejante» preserva la fuerza comparativa y el tiempo perfecto en un español natural y formal.
theological_decisions:
- issue: Si el último miembro afirma identidad filial plena o solo una comparación con un primogénito
  english_pob_reading: 'Render ὡμοίωσας with its comparative force: ''whom you made like a firstborn son.'''
  chosen_spanish_reading: «al cual has hecho semejante a un primogénito» mantiene la fuerza comparativa, sin convertirla en una declaración más fuerte de identidad.
  alternative_spanish_readings:
  - al cual has hecho tu primogénito
  - a quien has llamado primogénito
  - tu primogénito Israel
  rationale: El griego de ὁμοιόω indica semejanza/comparación. La traducción evita armonizar el pasaje con otros textos sobre Israel como primogénito y conserva la tensión interpretativa en lugar de resolverla.
  doctrine_reference: Preservar la tensión textual y teológica; primacía del testimonio griego sobre la armonización canónica en la traducción principal.
translation_notes:
  revision_awareness: 'La redacción española sigue la última decisión revisada del audit trail inglés, pero mantiene la cautela filológica del griego en el último miembro: se preserva la comparación explícita de ὡμοίωσας sin convertirla en una afirmación más fuerte de identidad filial. También se adopta la convención POB de traducir Κύριε en invocación con el nombre divino «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para Κύριε en oración directa, conforme al estándar del proyecto.
  - «Primogénito» se usa como adjetivo sustantivado breve para evitar añadir interpretaciones no explícitas en el griego.
  - La primera cláusula usa un sustantivo colectivo singular («el pueblo ... que es llamado») para reflejar la forma griega singular con sentido colectivo.
