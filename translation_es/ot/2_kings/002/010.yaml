revisions:
- from: 'Y dijo[a]: «Has pedido una cosa difícil. Si me ves cuando sea llevado de ti, te será así; pero si no, no será así».'
  to: 'Y dijo[a]: «Has pedido una cosa difícil. Si me ves cuando yo sea llevado de tu lado, así será para ti; pero si no, no será».'
  rationale: Se ajusta la expresión de separación espacial para evitar el calco poco natural «de ti», se mejora ligeramente la fluidez de la cláusula de resultado, y se conserva la alternativa léxica del inglés POB en una forma idiomática en español.
