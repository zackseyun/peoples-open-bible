review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: punto de observación («Desde allí»), búsqueda de alimento, y la mirada a gran distancia. Sin embargo, «rastrea» introduce un matiz de seguir huellas que no corresponde tan bien al contexto visual del águila como el inglés auditado «spies out» y la nota alternativa sobre ver a distancia.'
  spanish_quality_summary: 'El español es claro y digno, pero «rastrea el alimento» suena algo mecánico y menos natural para un ave que divisa presa/comida desde altura. Además, la nota al pie actual desplaza la alternativa del inglés: el contraste principal no es «desde lejos» vs. «desde una distancia», sino que toda la segunda cláusula también puede entenderse como «sus ojos lo ven desde lejos / de lejos».'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Léxicamente, conviene ajustar חָפַר a un verbo español de percepción/búsqueda visual más afín al contexto, y alinear la nota con la alternativa documentada en el rastro inglés.
  issues:
  - severity: medium
    issue: «rastrea» para חָפַר
    rationale: Aunque comunica búsqueda cuidadosa, en español sugiere seguir rastros/huellas. En este contexto del águila observando desde lo alto, «divisa» o «detecta» reproduce mejor la idea de localizar alimento a distancia y armoniza con la revisión inglesa «spies out».
  - severity: medium
    issue: Nota al pie no preserva la alternativa principal del audit trail
    rationale: La nota inglesa ofrece como alternativa «his eyes see it from afar», es decir, una reformulación de la segunda cláusula con objeto implícito. La nota española actual solo parafrasea «desde lejos» como «desde una distancia», lo cual no transmite la alternativa exegética más importante.
  revised_spanish_text: Desde allí divisa el alimento; sus ojos miran desde lejos[a].
  revised_footnotes:
  - marker: a
    text: O «sus ojos lo ven de lejos». El hebreo también puede entenderse de forma más dinámica para enfatizar que detecta su alimento a gran distancia.
    reason: lexical_alternative
