- from: Así que me volví[a] a desesperar en mi corazón[b] por todo el trabajo con que me había afanado[c] debajo del sol[d].
  to: Así que me volví para desesperar[a] en mi corazón[b] por todo el trabajo en el que había trabajado[c] debajo del sol[d].
