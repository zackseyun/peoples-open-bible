review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: fórmula profética, nombre divino, secuencia de imperativos de juicio y la cláusula causal/final sobre la espada enviada entre ellos. Sin embargo, hay un problema de alineación de nota: la nota [a] está anclada en «se levanten», pero el rastro auditado en inglés preserva la alternativa léxica para וּקְיוּ («vomit / spew»), por lo que el marcador debe ir con «vomiten[a]». También conviene mejorar «a ellos» a «les» por naturalidad del español sin alterar el sentido.'
  spanish_quality_summary: 'El español es claro y digno, con registro bíblico natural. «Así dice Yahvé de los ejércitos» y la serie «Beban y embriáguense, y vomiten, y caigan, y no se levanten» suenan bien en español eclesial contemporáneo. La principal reparación es de legibilidad y técnica editorial: «Y les dirás» es más idiomático que «Y dirás a ellos», y la nota debe colocarse donde realmente corresponde.'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: יְהוָה → «Yahvé», אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel», y la cadena de juicio conserva la fuerza del hebreo. «de los ejércitos» es una opción aceptable para צְבָאוֹת en este contexto. No hay conflicto doctrinal relevante; el ajuste necesario es editorial y de fidelidad al aparato de notas.'
  issues:
  - severity: medium
    issue: Marcador de nota anclado a la palabra equivocada
    rationale: La nota [a] explica una alternativa léxica para וּקְיוּ, es decir, «y vomiten / y echen fuera / y spew», pero en el borrador está colocada en «se levanten[a]». Esto desalineá el aparato con la evidencia fuente y el rastro del POB en inglés.
  - severity: low
    issue: «dirás a ellos» suena poco natural en español
    rationale: Aunque comprensible y formalmente cercano al hebreo, en español bíblico natural «les dirás» expresa mejor el complemento indirecto sin perder fuerza directiva.
  - severity: low
    issue: La nota española introduce «escupan», que no refleja bien la alternativa auditada
    rationale: El inglés documenta «spew», alternativa cercana a «vomitar / echar fuera», no específicamente «escupir». «Escupan» puede reducir o desviar el sentido del verbo raro.
  revised_spanish_text: 'Y les dirás: «Así dice Yahvé de los ejércitos, el Dios de Israel: Beban y embriáguense, y vomiten[a], y caigan, y no se levanten, por causa de la espada que yo envío en medio de ustedes».'
  revised_footnotes:
