translation:
  language: es
  text: Sus iniquidades[a] atraparán al impío[b], y será retenido en las cuerdas[c] de su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus pecados»; el plural hebreo עַוֹּנוֹתָיו puede verterse así, aunque «iniquidades» conserva mejor el peso moral del término.
    reason: lexical_alternative
  - marker: b
    text: O «el impío»; el hebreo es singular masculino.
    reason: lexical_alternative
  - marker: c
    text: O «sogas» en lugar de «cuerdas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַוֹּנוֹתָיו
  english_pob_choice: his iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus pecados
  - sus culpas
  - sus actos perversos
  lexicon: HALOT
  rationale: «Iniquidades» conserva el peso moral del plural de עָוֹן y reproduce bien la idea de culpa acumulada que recae sobre el culpable. El posesivo «sus» mantiene la referencia al singular masculino del hebreo sin forzar una formulación más explicativa que el texto no da.
- source_word: יִלְכְּדֻנוֹ
  english_pob_choice: will capture
  chosen_spanish: atraparán
  alternatives_spanish:
  - capturarán
  - apresarán
  - asirán
  lexicon: HALOT
  rationale: El verbo לָכַד expresa la idea de tomar o prender a alguien como presa. «Atraparán» transmite con naturalidad la imagen de ser sorprendido y vencido por las propias iniquidades, sin perder el matiz de captura.
- source_word: הָרָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al hombre impío
  - al perverso
  lexicon: HALOT
  rationale: En español, «impío» es una forma compacta y bíblica para el adjetivo sustantivado hebreo. El artículo y la preposición exigidos por la sintaxis española hacen explícito el objeto directo sin añadir información ajena al hebreo.
- source_word: וּבְחַבְלֵי
  english_pob_choice: and in the cords of
  chosen_spanish: en las cuerdas de
  alternatives_spanish:
  - en las sogas de
  - en los cordeles de
  - en las ligaduras de
  lexicon: HALOT
  rationale: חֶבֶל puede referirse a cuerda, soga o cordel. «Cuerdas» es una opción natural y fiel al campo semántico, y conserva la imagen de sujeción que acompaña al verbo final.
- source_word: חַטָּאתוֹ
  english_pob_choice: his sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su pecado culpable
  - su falta
  - su ofensa
  lexicon: HALOT
  rationale: El singular «pecado» sigue el hebreo y mantiene la fuerza abstracta/colectiva del sustantivo. En español, esta forma funciona bien con la imagen de las «cuerdas» que sujetan al culpable por aquello mismo que hizo.
- source_word: יִתָּמֵךְ
  english_pob_choice: he will be held fast
  chosen_spanish: será retenido
  alternatives_spanish:
  - quedará sujeto
  - será sujetado
  - quedará atrapado
  lexicon: HALOT
  rationale: El nifal de תמך aquí comunica la idea de quedar sostenido o mantenido en una condición de sujeción. «Será retenido» preserva la pasividad y el resultado de quedar trabado, sin introducir una metáfora distinta.
theological_decisions:
- issue: Imagen moral de culpa y consecuencias
  english_pob_reading: The verse depicts the wicked person being ensnared by his own wrongdoing rather than by an external arbitrary force.
  chosen_spanish_reading: El impío queda preso por sus propias iniquidades y por las cuerdas de su pecado.
  alternative_spanish_readings:
  - El impío sufrirá las consecuencias de su pecado.
  - Sus pecados lo destruirán.
  rationale: 'La traducción conserva la personificación moral del texto: el mal cometido se vuelve el medio de captura. No suaviza la tensión ni la convierte en una mera generalidad moral, porque el hebreo presenta una imagen concreta de aprisionamiento.'
  doctrine_reference: 'Translation philosophy §3: conservar la tensión teológica y la imaginería del texto; §4: precisión morfológica del singular masculino.'
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el control inglés revisado: se mantiene la imagen de captura por la propia maldad, la equivalencia léxica principal (iniquidades / atrapar / cuerdas / pecado / retenido) y la nota sobre la singularidad masculina de הָרָשָׁע. No se requirieron cambios de revisión adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino.
  - «Impío» funciona aquí como sustantivo/adjetivo bíblico natural en español, manteniendo el valor del singular masculino hebreo.
  - «Cuerdas» conserva el paralelismo con la imagen de captura y evita sobreinterpretar el término como «ligaduras» en un sentido más técnico.
  - Se mantiene «pecado» en singular para respetar la forma hebrea y el carácter abstracto/colectivo del sustantivo.
