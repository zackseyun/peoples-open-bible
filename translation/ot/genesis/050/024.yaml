id: GEN.50.24
reference: Genesis 50:24
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ אֶל אֶחָ֔י/ו אָנֹכִ֖י מֵ֑ת וֵֽ/אלֹהִ֞ים פָּקֹ֧ד יִפְקֹ֣ד אֶתְ/כֶ֗ם וְ/הֶעֱלָ֤ה אֶתְ/כֶם֙ מִן הָ/אָ֣רֶץ הַ/זֹּ֔את אֶל הָ/אָ֕רֶץ אֲשֶׁ֥ר נִשְׁבַּ֛ע לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹֽב־־־׃
translation:
  text: And Joseph said to his brothers[a], “I am dying, but God will surely visit you and bring you up from this land to the land that he swore to Abraham, to Isaac, and to Jacob.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will surely visit you.” The Hebrew idiom can denote God’s decisive attention and intervention on behalf of his people.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine plural with a 3ms suffix, and in Genesis regularly refers to Joseph's male brothers specifically. Per the gender-accurate policy, 'brothers' best matches the source and context.
- source_word: אָנֹכִי מֵת
  chosen: I am dying
  alternatives:
  - I am about to die
  - I die
  lexicon: HALOT
  rationale: The participial expression with אָנֹכִי conveys Joseph's imminent death rather than a simple present-state assertion 'I am dead.' 'I am dying' is idiomatic English and preserves the sense of approaching death.
- source_word: פָּקֹד יִפְקֹד
  chosen: will surely attend to
  alternatives:
  - will surely visit
  - will surely take notice of
  - will surely come to your aid
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect intensifies the verb: ''surely'' or ''certainly.'' In this covenantal context פקד denotes God''s decisive attention/intervention on behalf of his people, not merely a visit. ''Attend to'' preserves the breadth of the Hebrew without over-specifying the mode of action.'
- source_word: וֵאלֹהִים
  chosen: but God
  alternatives:
  - and God
  lexicon: HALOT
  rationale: 'The conjunction here is best rendered adversatively in English: Joseph is dying, but God will act. This reflects the discourse contrast naturally without altering the underlying conjunction.'
- source_word: וְהֶעֱלָה אֶתְכֶם
  chosen: and bring you up
  alternatives:
  - and lead you up
  - and bring you out
  lexicon: HALOT
  rationale: עלה in the Hiphil means 'cause to go up/bring up.' 'Bring you up' preserves the directional imagery and anticipates the ascent from Egypt to the promised land. 'Bring you out' would flatten the specific verb choice.
- source_word: מִן הָאָרֶץ הַזֹּאת
  chosen: from this land
  alternatives:
  - out of this land
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition and demonstrative. 'This land' refers to Egypt from Joseph's perspective.
- source_word: אֶל הָאָרֶץ אֲשֶׁר נִשְׁבַּע
  chosen: to the land that he swore
  alternatives:
  - to the land that he promised with an oath
  - to the land he swore to give
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear.' The object 'to give' is implied by context but not explicit in the Hebrew, so the translation keeps the wording closer to the source by rendering simply 'that he swore.'
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Repeating 'to' reflects the Hebrew prepositions and gives solemnity to the patriarchal formula, while remaining natural English.
