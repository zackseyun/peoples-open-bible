translation:
  language: es
  text: El sonido del lamento de los pastores[a], porque su esplendor[b] ha sido arruinado; el sonido del rugido de los leones jóvenes, porque el orgullo[c] del Jordán ha sido arruinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aullido». El hebreo transmite un clamor de dolor o duelo.
    reason: lexical_alternative
  - marker: b
    text: O «su gloria»; el término hebreo puede aludir a magnificencia y, concretamente, a lo que los adornaba.
    reason: lexical_alternative
  - marker: c
    text: O «la majestad del Jordán»; la expresión puede referirse específicamente a los matorrales exuberantes a lo largo de las orillas del Jordán.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וֹל
  english_pob_choice: The sound of
  chosen_spanish: El sonido de
  alternatives_spanish:
  - La voz de
  - Un sonido de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. Aquí introduce dos cola poéticos auditivos; «El sonido de» conserva el énfasis en lo audible sin convertirlo en una voz personificada.
- source_word: יִֽלְלַ֣ת
  english_pob_choice: wailing
  chosen_spanish: lamento
  alternatives_spanish:
  - gemido
  - aullido
  - lamentación
  lexicon: HALOT
  rationale: Deriva de ילל y expresa un clamor de dolor o duelo. En español, «lamento» comunica bien el tono de queja y resulta natural con sujetos humanos como los pastores.
- source_word: הָ/רֹעִ֔ים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los ganaderos
  - los pastores de ovejas
  lexicon: HALOT
  rationale: El sentido básico es literal «pastores». Se conserva la imagen para permitir que el contexto profético la cargue de posible valor simbólico sin resolverla en la traducción.
- source_word: כִּ֥י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del lamento y del rugido. «Porque» es claro y natural en español.
- source_word: שֻׁדְּדָ֖ה
  english_pob_choice: is ruined
  chosen_spanish: ha sido arruinado
  alternatives_spanish:
  - ha sido devastado
  - ha sido destruido
  - ha sido saqueado
  lexicon: HALOT
  rationale: De שׁדד, con el sentido de devastar, despojar o arruinar. Como el objeto es abstracto, «ha sido arruinado» transmite bien la pérdida severa y mantiene el paralelismo.
- source_word: אַדַּרְתָּ֑/ם
  english_pob_choice: their splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su magnificencia
  - su gloria
  - su manto
  lexicon: HALOT
  rationale: אדרת puede referirse a una prenda espléndida y, por extensión, a esplendor o magnificencia. «Su esplendor» conserva el valor abstracto y coincide con la lectura auditada del inglés.
- source_word: שַׁאֲגַ֣ת
  english_pob_choice: roaring
  chosen_spanish: rugido
  alternatives_spanish:
  - bramido
  - rugir
  lexicon: HALOT
  rationale: De שׁאג, el rugido del león. «Rugido» mantiene la fuerza sonora y el paralelismo con «lamento».
- source_word: כְּפִירִ֔ים
  english_pob_choice: the young lions
  chosen_spanish: los cachorros de león
  alternatives_spanish:
  - los leoncillos
  - los jóvenes leones
  lexicon: HALOT
  rationale: כְּפִיר designa un león joven. «Cachorros de león» es preciso y natural en español, aunque «jóvenes leones» también sería posible.
- source_word: גְּא֥וֹן
  english_pob_choice: the pride / majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - el orgullo
  - la magnificencia
  - la altivez
  lexicon: HALOT
  rationale: גאון puede significar majestad, exaltación o orgullo. En relación con el Jordán, la lectura más sobria y elevada es «majestad», que evita la connotación moral negativa de «orgullo».
- source_word: הַ/יַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - del río Jordán
  - del Jordán
  lexicon: HALOT
  rationale: Nombre propio del río. «Del Jordán» es la forma bíblica natural en español y basta en el contexto poético.
theological_decisions:
- issue: Si explicitar los referentes metafóricos de pastores y cachorros de león
  english_pob_reading: Retain the literal imagery in the main text without interpretive expansion.
  chosen_spanish_reading: Conservar la imaginería literal en el texto principal sin ampliar el referente.
  alternative_spanish_readings:
  - Traducir pastores como líderes
  - Traducir cachorros de león como opresores o gobernantes
  rationale: El hebreo presenta imágenes poéticas vivas cuya fuerza simbólica depende del contexto. La traducción no debe resolver la metáfora de antemano, sino dejarla disponible para el lector.
  doctrine_reference: Principios de traducción §1, §3
- issue: Cómo verter גְּאוֹן הַיַּרְדֵּן
  english_pob_reading: the pride of the Jordan
  chosen_spanish_reading: la majestad del Jordán
  alternative_spanish_readings:
  - el orgullo del Jordán
  - los matorrales del Jordán
  rationale: El sustantivo hebreo admite un campo semántico de majestad/exaltación/orgullo. En español, «majestad» preserva el tono poético y evita una lectura psicológica indebida; la posible referencia a la vegetación ribereña queda abierta sin imponerse en el cuerpo principal.
  doctrine_reference: Principios de traducción §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés auditado, que prefirió «splendor» para אַדַּרְתָּם y «pride» para גְּאוֹן, pero en español se eligieron «esplendor» y «majestad» para conservar la elevación poética sin cargar «orgullo» con una connotación moral no necesaria en este contexto.
  spanish_consistency_notes:
  - 'Se conserva la estructura paralela del versículo: sonido + genitivo + razón + sonido + genitivo + razón.'
  - Se mantiene el pasivo perfecto con «ha sido arruinado» para ambos cola, respetando la repetición del hebreo.
  - «Pastores» y «cachorros de león» permanecen literales para no cerrar las lecturas metafóricas.
  - Se usa «Jordán» sin añadir «río», siguiendo el registro poético bíblico.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
