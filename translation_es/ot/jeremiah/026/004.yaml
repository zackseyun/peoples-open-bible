revisions:
- from: 'Y dirás a ellos[a]: «Así dice Yahvé: Si no me escuchan, andando en mi ley[b] que yo he puesto delante de ustedes»'
  to: 'Y les dirás: «Así dice Yahvé: Si no me escuchan[a] al andar en mi ley[b] que he puesto delante de ustedes»'
  rationale: Se reubicó la nota [a] al verbo pertinente, se mejoró la naturalidad de «a ellos» a «les», y se ajustó «andando» a «al andar» para expresar de modo más idiomático en español la construcción de conducta/caminar del hebreo sin perder la metáfora ni la fuerza covenantal de «ley».
