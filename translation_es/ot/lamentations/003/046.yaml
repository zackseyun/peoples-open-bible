translation:
  language: es
  text: Todos nuestros enemigos han abierto[a] sus bocas contra nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han abierto de par en par sus bocas contra nosotros», para resaltar el matiz hostil o burlón del modismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצ֥וּ
  english_pob_choice: have opened
  chosen_spanish: han abierto
  alternatives_spanish:
  - han abierto de par en par
  - han desencajado
  lexicon: HALOT
  rationale: El verbo hebreo פצה, con 'boca', funciona idiomáticamente para abrir la boca con tono hostil o de burla. 'Han abierto' conserva la acción verbal sin añadir en español una imagen más fuerte de la que exige el texto; la nota puede explicitar la posibilidad de 'de par en par'.
- source_word: פִּיהֶ֖ם
  english_pob_choice: their mouths
  chosen_spanish: su boca
  alternatives_spanish:
  - sus bocas
  lexicon: HALOT
  rationale: Aunque el hebreo tiene un sustantivo singular con sufijo plural, en español 'su boca' suena más natural al referirse distributivamente a un sujeto plural colectivo. 'Sus bocas' es posible, pero puede sonar menos fluido en un giro proverbial/poético.
- source_word: עָלֵ֛ינוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - hacia nosotros
  lexicon: HALOT
  rationale: La preposición עַל aquí tiene fuerza adversativa y hostil; 'contra nosotros' expresa mejor ese valor que una mera relación espacial.
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos los
  lexicon: HALOT
  rationale: כָּל tiene sentido colectivo delante de 'nuestros enemigos'; 'Todos nuestros enemigos' es una reproducción directa y natural en español.
- source_word: אֹיְבֵינוּ
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - los que nos son hostiles
  lexicon: HALOT
  rationale: '''Enemigos'' es la equivalencia directa y transparente para אויב en este lamento; mantiene el registro del texto sin suavizar la hostilidad.'
translation_notes:
  revision_awareness: El texto inglés POB y el control textual muestran alta concordancia con el hebreo; no se requieren revisiones sustantivas. Se mantiene el valor hostil de עַל con 'contra', y se conserva la imagen idiomática de abrir la boca sin sobredesarrollarla.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o terminología cultual no pertinente; el verso no contiene el nombre divino.
  - Se conserva el plural colectivo 'nuestros enemigos' y el objeto singular 'su boca' por fluidez natural en español poético.
  - La nota a pie de página preserva la alternativa léxica indicada por el audit trail inglés sin introducir una nueva interpretación.
