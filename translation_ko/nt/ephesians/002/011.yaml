  language: ko
  text: 그러므로 기억하십시오. 한때 여러분은 육신으로는 이방인이었고, 손으로 육신에 행한 「할례」라 일컬어지는 자들로부터 「무할례」라 불리던 자였습니다[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「할례」와 「무할례」는 단순한 해부학적 표현이 아니라 언약·민족적 신분을 가리키는 호칭이다. 「손으로 육신에 행한」(χειροποίητος)에는 외형뿐인 할례에 대한 비판적 함의가 있을 수 있다.
