translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Porque han hecho que se recuerde su culpa al poner al descubierto sus transgresiones[a], de modo que sus pecados se vean en todas sus acciones, porque han venido a ser recordados, caerán en la mano[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han causado que se recuerde su culpa». El hebreo repite formas de זכר («recordar») con efecto retórico a lo largo del versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán capturados en la mano», es decir, caerán en manos de un enemigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: 'Se conserva la distinción del título compuesto: אֲדֹנָי se rinde como «Señor» y el nombre divino YHWH como «Yahvé», conforme al criterio del proyecto para no ocultar el nombre propio. «Dios» sería posible, pero perdería la señalización explícita del Tetragrámaton.'
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio con una causal natural en español. «Porque» es claro y fiel al valor causal del hebreo.
- source_word: הַזְכַּרְכֶם
  english_pob_choice: you have brought ... to remembrance
  chosen_spanish: has hecho que se recuerde
  alternatives_spanish:
  - has causado que se recuerde
  - has traído a la memoria
  lexicon: HALOT
  rationale: El hiphil de זכר tiene fuerza causativa; por eso se evita una traducción meramente pasiva. «Has hecho que se recuerde» conserva la causalidad y el juego verbal con זכר del versículo.
- source_word: עֲוֺנְכֶם
  english_pob_choice: your guilt
  chosen_spanish: tu culpa
  alternatives_spanish:
  - tu iniquidad
  - tu culpa por la iniquidad
  lexicon: HALOT
  rationale: En este contexto profético, עָוֹן puede expresar culpa o culpa-consecuencia. «Culpa» comunica bien el estado de responsabilidad que vuelve a ser recordado, sin perder la fuerza moral del término.
- source_word: בְּהִגָּלוֹת פִּשְׁעֵיכֶם
  english_pob_choice: by uncovering your transgressions
  chosen_spanish: al poner al descubierto tus transgresiones
  alternatives_spanish:
  - al revelar tus rebeliones
  - cuando se descubren tus transgresiones
  lexicon: HALOT
  rationale: La imagen de exposición se mantiene con «poner al descubierto». «Transgresiones» traduce פשע de manera idiomática y conserva el matiz de rebelión o quiebre de lealtad.
- source_word: לְהֵרָאוֹת חַטֹּאותֵיכֶם
  english_pob_choice: so that your sins are seen
  chosen_spanish: de modo que tus pecados aparecen
  alternatives_spanish:
  - para que tus pecados sean vistos
  - de modo que se vean tus pecados
  lexicon: HALOT
  rationale: El infinitivo pasivo de ראה expresa que los pecados quedan visibles. «Aparecen» evita una pasiva pesada en español y conserva el resultado de quedar expuestos.
- source_word: חַטֹּאותֵיכֶם
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus faltas
  - tus ofensas
  lexicon: HALOT
  rationale: «Pecados» es la equivalencia más natural y estable para חטאות en este marco moral.
- source_word: בְּכֹל עֲלִילוֹתֵיכֶם
  english_pob_choice: in all your deeds
  chosen_spanish: en todas tus acciones
  alternatives_spanish:
  - en todas tus obras
  - en todas tus prácticas
  lexicon: HALOT
  rationale: עֲלִילוֹת puede abarcar actos o hechos, a menudo con matiz negativo. «Acciones» es amplio y claro en español, sin añadir interpretación innecesaria.
- source_word: הִזָּכֶרְכֶם
  english_pob_choice: you have come to remembrance
  chosen_spanish: has llegado a ser recordado
  alternatives_spanish:
  - has sido recordado
  - has venido a la memoria
  lexicon: HALOT
  rationale: 'Se conserva el segundo juego verbal de זכר: no sólo la culpa, sino también la persona queda traída a memoria ante el juicio. La forma elegida mantiene el pasivo/reflexivo sin sonar mecánica.'
- source_word: בַּכַּף
  english_pob_choice: by the hand
  chosen_spanish: por la mano
  alternatives_spanish:
  - en la mano
  - en el puño
  lexicon: HALOT
  rationale: כַּף literalmente es palma/mano; en el idiomatismo con תפשׂ comunica captura o aprehensión. «Por la mano» conserva la imagen concreta de ser tomado.
- source_word: תִּתָּפֵשׂוּ
  english_pob_choice: you will be seized
  chosen_spanish: serás apresado
  alternatives_spanish:
  - serás capturado
  - serás tomado
  lexicon: HALOT
  rationale: El nifal de תפשׂ indica ser atrapado o prendido. «Apresado» comunica bien la fuerza judicial y militar del verbo en español bíblico contemporáneo.
theological_decisions:
- issue: Representación del nombre divino YHWH en el título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La base hebrea contiene explícitamente יְהוִה, por lo que se preserva el nombre propio en español como «Yahvé». Se mantiene «Señor» para אֲדֹנָי, evitando ocultar el contraste entre el título soberano y el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Juego retórico con זכר ('recordar') aplicado a culpa y a la persona
  english_pob_reading: you have brought your guilt to remembrance ... because you have come to remembrance
  chosen_spanish_reading: has hecho que se recuerde tu culpa ... porque has llegado a ser recordado
  alternative_spanish_readings:
  - has traído tu culpa a la memoria ... porque has sido recordado
  - has causado que se recuerde tu culpa ... porque has venido a memoria
  rationale: El hebreo repite formas de זכר para intensificar el juicio. La traducción conserva la repetición semántica sin borrar la tensión entre recordar la culpa y ser recordado como persona ante Dios/judgment.
  doctrine_reference: Estrategia lexical-teológica del POB para juegos de palabras y causalidad verbal
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y el texto hebreo directo; no se aplicaron revisiones posteriores, y se preservó el paralelismo de זכר, la imaginería de exposición y el cierre idiomático de captura por la mano.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - Se mantuvo el registro profético con vocabulario sobrio y contemporáneo, evitando paráfrasis interpretativas.
  - «Transgresiones», «pecados» y «culpa» se distinguen para reflejar los tres términos hebreos sin homogeneizarlos.
  - La imagen de exposición y captura se conservó en español sin suavizarla.
