translation:
  language: es
  text: 'Concibió y dio a luz un hijo[a], y dijo: «Dios ha quitado mi afrenta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios ha removido mi deshonra» o «mi vergüenza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: She conceived
  chosen_spanish: Concibió
  alternatives_spanish:
  - Quedó encinta
  - Se embarazó
  lexicon: HALOT
  rationale: הרה expresa quedar embarazada / concebir. En español, «concibió» es breve, natural en narración bíblica y conserva el avance secuencial del relato.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y tuvo un hijo
  lexicon: HALOT
  rationale: ילד con בֵּן indica dar a luz a un hijo. «Dio a luz» es la forma más directa y natural en español para este contexto; «hijo» mantiene la referencia concreta del hebreo.
- source_word: וַתֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y ella dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte de manera fluida con «y dijo». El sujeto ya está claro por el contexto, por lo que no es necesario repetir «ella».
- source_word: אָסַף
  english_pob_choice: has taken away
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha removido
  - ha apartado
  lexicon: HALOT
  rationale: En este contexto, אסף significa retirar / quitar la vergüenza o afrenta. «Ha quitado» conserva la fuerza resultativa del perfecto y suena natural en español; evita perder el matiz de eliminación de la deshonra pública.
- source_word: חֶרְפָּתִי
  english_pob_choice: my reproach
  chosen_spanish: mi afrenta
  alternatives_spanish:
  - mi reproche
  - mi vergüenza
  - mi deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה denota vergüenza pública, deshonra o afrenta. «Afrenta» preserva el peso social y honorífico del término en este contexto de esterilidad y comparación familiar, sin suavizarlo demasiado.
theological_decisions:
- issue: Referencia singular de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: Aunque אֱלֹהִים tiene forma plural, aquí rige un verbo singular y se refiere al Dios de Israel. En español debe ir en singular como «Dios», sin introducir una lectura politeísta ajena al contexto.
  doctrine_reference: Monoteísmo bíblico y concordancia verbal del hebreo
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa coinciden plenamente en el sentido básico: concepción, nacimiento de un hijo y declaración sobre la retirada de la afrenta. No se registran revisiones sustantivas; se mantiene el valor resultativo del perfecto y la ambigüedad léxica de חֶרְפָּה en una nota de alternativas.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y natural, sin calcar el inglés.
  - «Afrenta» conserva mejor la dimensión pública y social del hebreo que una simple «vergüenza» en el texto principal.
  - No se usa «SEÑOR» porque el verso no contiene el tetragrámaton; «Dios» refleja correctamente אֱלֹהִים en singular.
