  text: זְכֹ֤ר עֲדָתְ/ךָ֨ קָ֘נִ֤יתָ קֶּ֗דֶם גָּ֭אַלְתָּ שֵׁ֣בֶט נַחֲלָתֶ֑/ךָ הַר צִ֝יּ֗וֹן זֶ֤ה שָׁכַ֬נְתָּ בּֽ/וֹ׀־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/074/002.yaml
  text: Remember your congregation[a], which you acquired long ago, which you redeemed as the tribe of your inheritance—Mount Zion[d][c][b], where you have dwelled.
  footnotes:
  - marker: a
    text: Or 'from of old.'
    reason: lexical_alternative
  - marker: b
    text: '''You acquired'' could also be rendered ''you purchased'' or, less likely here, ''you created.'''
    reason: lexical_alternative
  - marker: c
    text: '''The tribe of your inheritance'' could also be rendered ''the scepter/rod of your inheritance,'' but ''tribe'' best fits the reference to the redeemed people.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'this,' referring to Mount Zion.
    reason: lexical_alternative
