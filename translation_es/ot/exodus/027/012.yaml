translation:
  language: es
  text: Y para el ancho del atrio, al lado occidental[a], habrá colgaduras de cincuenta codos, con diez columnas y diez bases[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «lado de mar», un modismo habitual para indicar el lado occidental.
    reason: lexical_alternative
  - marker: b
    text: O «basas» para el término técnico de los apoyos inferiores de las columnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רֹחַב
  english_pob_choice: And for the width
  chosen_spanish: Y para el ancho
  alternatives_spanish:
  - Y el ancho
  - Y para la anchura
  lexicon: HALOT
  rationale: רֹחַב denota la medida de ancho o anchura. En español, «ancho» conserva la idea dimensional y suena natural en una instrucción arquitectónica. Mantengo el valor introductorio de la conjunción con «Y» y la función de especificación con «para».
- source_word: הֶֽ/חָצֵר
  english_pob_choice: of the court
  chosen_spanish: del atrio
  alternatives_spanish:
  - de la corte
  - del patio
  lexicon: HALOT
  rationale: חָצֵר en el contexto del tabernáculo designa el recinto exterior sagrado. «Atrio» es el término español más estable y preciso para ese espacio; «patio» sería más genérico y «corte» no comunica bien el contexto cultual.
- source_word: לִ/פְאַת יָ֔ם
  english_pob_choice: on the west side
  chosen_spanish: al lado occidental[a]
  alternatives_spanish:
  - al lado del mar
  - hacia el oeste
  - en el lado del mar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «lado de mar», un modismo direccional para el oeste. Sigo el sentido espacial y no la metáfora literal en el cuerpo del texto, pero la documento en la nota para no borrar la imagen hebrea.
- source_word: קְלָעִ֖ים
  english_pob_choice: hangings
  chosen_spanish: colgaduras
  alternatives_spanish:
  - cortinas
  - pendones
  lexicon: HALOT
  rationale: En la descripción del tabernáculo, קְלָעִים son paños colgantes que forman el cercado. «Colgaduras» preserva la función arquitectónica sin imponer la idea moderna de cortina doméstica.
- source_word: חֲמִשִּׁ֣ים אַמָּ֑ה
  english_pob_choice: fifty cubits
  chosen_spanish: cincuenta codos
  alternatives_spanish:
  - cincuenta codos de largo
  lexicon: HALOT
  rationale: La medida se traduce de manera directa con «codos», el equivalente tradicional y fiel del hebreo אַמָּה. No añado «de largo» porque la referencia dimensional ya queda implícita por el contexto.
- source_word: עַמֻּדֵי/הֶ֣ם עֲשָׂרָ֔ה
  english_pob_choice: with ten pillars
  chosen_spanish: con diez columnas
  alternatives_spanish:
  - con diez pilares
  - y diez columnas
  lexicon: HALOT
  rationale: עַמּוּד puede ser «columna» o «pilar». Opto por «columnas» porque en español describe bien un soporte vertical estructural y suena más natural que una secuencia literal como «con sus columnas diez».
- source_word: וְ/אַדְנֵי/הֶ֖ם עֲשָׂרָֽה
  english_pob_choice: and ten bases
  chosen_spanish: y diez basas
  alternatives_spanish:
  - y diez bases
  - y diez zócalos
  - con diez basas
  lexicon: HALOT
  rationale: אֶדֶן en el tabernáculo nombra el apoyo o receptáculo inferior de la columna. «Basas» conserva el matiz técnico y estructural; «bases» es posible, pero «basas» evita asociarlo solo a una base genérica o ornamental.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido del hebreo y del auditor de la POB en inglés, pero adapta a un español natural: mantiene la especificación direccional, la medida exacta y la enumeración estructural sin calcos rígidos. La nota del «lado de mar» preserva la tensión literal/direccional documentada en la fuente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Atrio» mantiene la terminología cultual común en español bíblico para el recinto del tabernáculo.
  - «Codos», «columnas» y «basas» mantienen el registro técnico del pasaje sin modernizarlo en exceso.
  - La nota [a] resuelve la ambigüedad de יָם sin introducir una paráfrasis en el cuerpo del verso.
