revisions:
- from: Porque Dios traerá toda obra a juicio[a], junto con toda cosa oculta, sea buena o sea mala.
  to: Porque Dios llevará todo acto a juicio[a], junto con toda cosa oculta, sea bueno o malo.
  rationale: Se ajusta «toda obra» a «todo acto» para reflejar mejor el matiz moral de מַעֲשֶׂה en contexto de juicio, en línea con la decisión inglesa «every deed». También se cambia «traerá» por «llevará» por mayor naturalidad en español con «a juicio». Se mantiene «junto con toda cosa oculta» y la nota alternativa, que preservan bien la amplitud semántica de עַל כָּל נֶעְלָם sin sobreinterpretarla.
