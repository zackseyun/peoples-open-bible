revisions:
- from: Porque los hijos de Israel habían andado en el desierto cuarenta años[a], hasta que toda la nación —los hombres de guerra que salieron de Egipto— llegó a su fin, porque no habían escuchado la voz de Yahvé. Yahvé les había jurado que no les dejaría ver la tierra que Yahvé había jurado a sus padres dar a nosotros, una tierra que fluye leche y miel.
  to: Porque los hijos de Israel habían andado en el desierto cuarenta años[a], hasta que toda la nación —los hombres de guerra que salieron de Egipto— llegó a su fin, porque no habían escuchado la voz de Yahvé. Yahvé les había jurado que no les dejaría ver la tierra que Yahvé había jurado a sus padres darnos, una tierra que mana leche y miel.
  rationale: Se corrigen dos calcos poco naturales para lograr un español fiel y claramente legible sin perder las decisiones del POB. 'Darnos' conserva la lectura masorética de primera persona plural mejor que 'dar a nosotros', y la nota sigue registrando la variante 'darles'. 'Una tierra que mana leche y miel' expresa de manera idiomática y bíblicamente reconocible la imagen hebrea de abundancia.
