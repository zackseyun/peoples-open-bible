  text: עֹצֶ֣ה עֵ֭ינָי/ו לַ/חְשֹׁ֣ב תַּהְפֻּכ֑וֹת קֹרֵ֥ץ שְׂ֝פָתָ֗י/ו כִּלָּ֥ה רָעָֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/030.yaml
  text: He who shuts his eyes to devise perverse things[a], who purses his lips[b], has completed evil.
  footnotes:
  - marker: a
    text: Or 'who compresses his lips.' Some translations render the gesture more loosely; the Hebrew specifically refers to the lips, not the eyes.
    reason: lexical_alternative
  - marker: b
    text: Or 'has completed evil' / 'has accomplished evil.' The Hebrew verb emphasizes bringing an evil scheme to its full end.
    reason: lexical_alternative
