translation:
  language: es
  text: Hay quien calla y es hallado sabio[a], y hay quien es odiado por mucho hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «a causa de mucho hablar» o «por excesiva palabrería». La frase griega dice literalmente «de mucho hablar», y ἀπό expresa causa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Existe quien
  lexicon: LSJ
  rationale: La fórmula existencial introduce un tipo de persona en forma proverbial. En español, «Hay quien» reproduce bien ese valor general sin volver rígida la construcción.
- source_word: σιωπῶν
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - permanece en silencio
  - guarda silencio
  lexicon: BDAG
  rationale: El participio presente expresa una actitud continua de silencio. «Calla» es natural en español y conserva la idea de contención deliberada.
- source_word: εὑρισκόμενος
  english_pob_choice: is found
  chosen_spanish: es hallado
  alternatives_spanish:
  - es considerado
  - se muestra
  lexicon: BDAG
  rationale: La pasiva se mantiene de forma cercana al griego y deja abierta la idea de hallazgo por observación o por reputación, sin interpretarla de más.
- source_word: σοφός
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - una persona sabia
  - prudente
  lexicon: BDAG
  rationale: «Sabio» es el equivalente directo y adecuado en un contexto sapiencial. «Prudente» estrecharía demasiado el sentido.
- source_word: μισητός
  english_pob_choice: hated
  chosen_spanish: aborrecido
  alternatives_spanish:
  - odiado
  - detestado
  lexicon: LSJ
  rationale: «Aborrecido» comunica una valoración fuerte y es natural en español bíblico sin perder la intensidad del adjetivo griego.
- source_word: ἀπὸ πολλῆς λαλιᾶς
  english_pob_choice: because of much talk
  chosen_spanish: por mucha conversación
  alternatives_spanish:
  - a causa de mucho hablar
  - por excesiva palabrería
  - por mucho hablar
  lexicon: LSJ
  rationale: Aquí ἀπό expresa causa. «Conversación» traduce el matiz de habla continua de λαλιά con un registro claro y amplio; evita el tono demasiado coloquial de «cháchara» y mantiene el contraste proverbial con el silencio.
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el griego de Sirácida 20:4 y el criterio auditado del POB inglés: conservar la antítesis silencio / mucha habla, mantener la pasiva «es hallado», y reflejar el valor causal de ἀπό sin diluirlo en una paráfrasis.'
  spanish_consistency_notes:
  - Se usa un estilo sapiencial sobrio y publicable, sin introducir vocabulario eclesiástico ajeno al griego.
  - «Sabio» se mantiene como calco semántico directo de σοφός en contexto gnómico.
  - La nota recoge la alternativa causal que el audit trail inglés ya documenta para ἀπό, adaptada a un español natural.
