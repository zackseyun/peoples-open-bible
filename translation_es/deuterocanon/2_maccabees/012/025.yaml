revisions:
- from: Pero, cuando hubo asegurado [a] a aquellos por más palabras que los devolvería sanos e íntegros [b], lo soltaron por la seguridad de sus hermanos.
  to: Pero, cuando les había asegurado largamente[a] que devolvería a estos hombres ilesos, lo dejaron ir por la seguridad[b] de sus hermanos.
