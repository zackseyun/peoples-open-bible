review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite correctamente la estructura condicional, la consagración cultual a Yahvé y el contraste legal entre campo comprado y heredad ancestral. Sin embargo, la nota al pie no preserva bien la alternativa léxica del inglés POB, porque repite esencialmente la misma redacción principal en vez de reflejar la alternativa más literal/documentada.
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial moderno: «Pero si consagra a Yahvé un campo que ha comprado, y que no forma parte del campo de su heredad». La sintaxis es fluida y fiel. La única reparación necesaria es la nota, además de quitar las comillas internas innecesarias para ajustarla al estilo habitual de notas.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé»; יַקְדִּישׁ → «consagra»; אֲחֻזָּה → «heredad» en contexto legal-familiar. No hay conflicto teológico relevante. La distinción entre tierra comprada y propiedad heredada se conserva adecuadamente.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no refleja una verdadera alternativa léxica respecto del texto principal.
    rationale: El inglés POB nota como alternativa «a field he has bought» frente a «a field of his purchase». En español, el texto principal ya usa «un campo que ha comprado», pero la nota repite prácticamente lo mismo, por lo que no añade la alternativa documentada. Conviene usar una opción como «un campo de su compra» para preservar la justificación léxica auditada.
  - severity: low
    issue: La nota al pie tiene puntuación y comillas algo pesadas.
    rationale: La formulación actual comienza con comillas simples y luego españolas, lo que resulta innecesario y menos limpio en español editorial. Puede simplificarse sin pérdida de contenido.
  revised_spanish_text: Pero si consagra a Yahvé un campo que ha comprado[a], y que no forma parte del campo de su heredad,
  revised_footnotes:
  - marker: a
    text: 'O: «un campo de su compra», en contraste con la tierra que pertenece a su heredad ancestral.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota [a] para que represente una alternativa léxica real, en línea con el rastro de auditoría inglés, y se simplifica su estilo editorial.
