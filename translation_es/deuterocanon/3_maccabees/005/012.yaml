base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/005/012.yaml
  text: And by the action of the Sovereign he was overcome with a most pleasant and deep stupor[b][a], having been greatly frustrated in his lawless purpose and utterly disappointed in his unchangeable resolve.
  footnotes:
  - marker: a
    text: Or 'was overcome by the most sweet and deep working of the Master.' The Greek imagery is unusual and metaphorical, combining pleasantness and depth with divine restraint.
    reason: lexical_alternative
