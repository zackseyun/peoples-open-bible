translation:
  language: es
  text: 'En cuanto a mí[a], yo dije en mi prosperidad: «Jamás seré conmovido[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en mi sosiego» o «en mi seguridad». El término hebreo puede denotar bienestar tranquilo, no solo prosperidad material.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no seré conmovido para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: La construcción con pronombre independiente marca contraste o énfasis personal. «En cuanto a mí» expresa naturalmente ese foco en español sin perder el matiz de contraste reflejado por la traducción inglesa.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: yo dije
  alternatives_spanish:
  - yo había dicho
  lexicon: HALOT
  rationale: El qatal se lee bien como pasado simple en este contexto reflexivo. El pluscuamperfecto no es necesario por la forma hebrea ni por el flujo del verso.
- source_word: בְשַׁלְוִי
  english_pob_choice: in my prosperity
  chosen_spanish: en mi prosperidad
  alternatives_spanish:
  - en mi tranquilidad
  - en mi seguridad
  - en mi sosiego
  lexicon: HALOT
  rationale: שַׁלְוָה puede significar bienestar sereno, quietud o seguridad. «Prosperidad» conserva el sentido de bienestar favorable y la autoconfianza implícita en el contexto, sin reducirlo solo a riqueza material.
- source_word: בַּל
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - 'no'
  lexicon: HALOT
  rationale: Como partícula negativa poética, junto con el imperfecto y לְעוֹלָם, expresa negación enfática y duradera. «Jamás» comunica mejor esa fuerza que un simple «no».
- source_word: אֶמּוֹט
  english_pob_choice: be shaken
  chosen_spanish: seré ... sacudido
  alternatives_spanish:
  - seré ... movido
  - vacilaré
  - tambalearé
  lexicon: HALOT
  rationale: El nifal de מוט expresa ser sacudido, movido o volverse inestable. «Seré sacudido» preserva la metáfora de inestabilidad con español natural y digno.
- source_word: לְעוֹלָם
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - por toda la vida
  lexicon: HALOT
  rationale: Con la negación, לְעוֹלָם intensifica la duración indefinida. En español, «jamás» integra esa fuerza temporal de manera idiomática y fiel.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido y las decisiones del audit trail inglés; no se requirieron revisiones sustantivas respecto al borrador base. Se mantuvo la equivalencia óptima: se conservó el énfasis del pronombre, la referencia a un estado de bienestar, y la negación enfática de permanencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se conserva el registro poético y directo del hebreo sin añadir paráfrasis explicativas al texto principal.
  - La nota [a] mantiene la tensión semántica de שַׁלְוִי entre prosperidad, tranquilidad y seguridad.
  - La nota [b] preserva la fuerza de לְעוֹלָם unida a la negación sin duplicar innecesariamente la duración en el cuerpo del texto.
