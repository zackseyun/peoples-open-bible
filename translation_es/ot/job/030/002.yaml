translation:
  language: es
  text: Incluso la fuerza de sus manos—¿de qué me sirve? Su vigor[a] ha perecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su edad madura ha perecido', tomando el raro sustantivo hebreo como referencia a la madurez o plena fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - También
  - Aun
  lexicon: HALOT
  rationale: Expresa el valor aditivo y enfático de גַּם en un tono natural para el español bíblico contemporáneo.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - músculo
  lexicon: HALOT
  rationale: En este contexto físico y laboral, 'fuerza' comunica mejor la capacidad corporal de las manos que 'poder', que sería más abstracto.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  - sus brazos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de las 'manos' como metonimia de capacidad de trabajo.
- source_word: לָמָה לִּי
  english_pob_choice: what is it to me?
  chosen_spanish: ¿qué es para mí?
  alternatives_spanish:
  - ¿qué me importa?
  - ¿de qué me sirve?
  lexicon: HALOT
  rationale: La pregunta retórica expresa desdén o falta de provecho. '¿Qué es para mí?' mantiene la fuerza idiomática sin volverla demasiado explicativa.
- source_word: עָלֵימוֹ
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - para ellos
  lexicon: HALOT
  rationale: 'Sigue la lectura contextual del POB inglés: el sufijo se integra con el sustantivo siguiente para formar ''su vigor'', no un literalismo preposicional.'
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: ha desaparecido
  alternatives_spanish:
  - se ha perdido
  - ha perecido
  lexicon: HALOT
  rationale: '''Ha desaparecido'' comunica pérdida total y naturalidad en español, sin sugerir necesariamente muerte personal como podría hacerlo ''ha perecido''.'
- source_word: כָּלַח
  english_pob_choice: vigor
  chosen_spanish: vigor
  alternatives_spanish:
  - prime
  - madurez
  - plenitud
  lexicon: HALOT
  rationale: Se adopta la opción del POB inglés porque, en este contexto, el sustantivo raro apunta a la fuerza útil o plenitud de la edad madura.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura ya establecida en el POB inglés y conserva la ambigüedad léxica principal de כָּלַח mediante una nota alternativa. No se detectaron revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí un sustituto del nombre divino.
  - '''Incluso'' conserva el matiz de גַּם sin volver el inicio artificialmente solemne.'
  - La puntuación con raya reproduce el quiebre retórico del hebreo y del POB inglés.
  - '''Su vigor'' refleja la decisión contextual de unir עָלֵימוֹ con el sustantivo siguiente.'
