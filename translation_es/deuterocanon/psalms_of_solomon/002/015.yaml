    text: O 'cosas santas' para 'lo que era puro'.
    reason: lexical_alternative
  - marker: b
    text: La revisión textual favorece aquí 'inmundicia' (ῥύπῳ, 'mugre/inmundicia') y no la lectura previa 'calle'; la expresión 'mezcla' probablemente tiene aquí una carga moral, quizá sexual.
    reason: textual_note
  revision_rationale: Se ajusta ἐμίαυσαν a 'contaminaron' para reflejar mejor el valor léxico de contaminación moral/ritual documentado por la traducción inglesa y las decisiones léxicas. Se simplifican las notas para evitar que la antigua lectura 'calle' compita indebidamente con la corrección textual ya adoptada, mientras se conserva tanto la alternativa de ἁγνά ('cosas santas') como la observación sobre la carga moral de ἀναμίξεως.
