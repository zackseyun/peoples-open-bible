base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/012.yaml
  text: Now the messenger who had gone to summon Micaiah spoke to him[a], saying, “Look, the words of the prophets are unanimously favorable to the king. Please let your word be like one of theirs, and speak favorably.”
  footnotes:
