translation:
  language: es
  text: Y aquel toro que nació de él engendró un jabalí negro y una oveja blanca[a]; y aquel jabalí produjo muchos jabalíes[c][b], y aquella oveja produjo doce ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia probablemente continúa la genealogía simbólica de pueblos o linajes en la visión onírica; la traducción conserva las figuras animales en lugar de sustituir sus referentes históricos probables.
    reason: cultural_note
  - marker: b
    text: El texto etiópico distingue entre un jabalí negro y una oveja blanca; el contraste de color probablemente es significativo dentro de la visión y por eso se conserva explícitamente.
    reason: lexical_alternative
  - marker: c
    text: 'O: «aquella novilla que nació de él produjo».'
    reason: previous_rendering
lexical_decisions:
- source_word: ላህም
  english_pob_choice: heifer
  chosen_spanish: toro
  alternatives_spanish:
  - novilla
  - vaca joven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual indica que el sustantivo ge''ez es masculino y que el referente simbólico es un toro, no una hembra bovina. Por eso el español debe reflejar el género y la imagen animal con precisión: "toro" conserva el valor genealógico y alegórico.'
- source_word: ሐራዊያ
  english_pob_choice: wild boar
  chosen_spanish: jabalí
  alternatives_spanish:
  - jabalí salvaje
  - puerco salvaje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa un cerdo salvaje. En español, "jabalí" es la forma natural y vívida, y mantiene el contraste simbólico con el toro y la oveja.
- source_word: ገዳም ጸሊመ
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - de color negro
  - oscuro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El color está explícito y tiene valor simbólico. "Negro" es la traducción directa y clara en español.
- source_word: በግዐ ጸዐዳ
  english_pob_choice: white sheep
  chosen_spanish: oveja blanca
  alternatives_spanish:
  - oveja
  - borrega blanca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez usa el término plural/abstracto de ovejas con el color blanco. En español, "oveja blanca" conserva la imaginería y evita una sobreespecificación sexual que el contexto no exige.
- source_word: አሕርወ ብዙኃነ
  english_pob_choice: many boars
  chosen_spanish: muchos jabalíes
  alternatives_spanish:
  - muchos puercos
  - muchos cerdos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pluralidad debe corresponder al animal anterior y mantener la taxonomía visionaria. "Jabalíes" preserva la continuidad simbólica y la fuerza léxica.
- source_word: ዐሠርተ ወክልኤተ አባግዐ
  english_pob_choice: twelve sheep
  chosen_spanish: doce ovejas
  alternatives_spanish:
  - doce carneros
  - doce corderos
  lexicon: Dillmann, Lexicon Linguae Aethiopiae
  rationale: El numeral es literal y el sustantivo es el de las ovejas. "Ovejas" evita introducir juventud o sexo no indicados por el texto y conserva el esquema alegórico de descendencia.
theological_decisions:
- issue: Conservación de la imaginería apocalíptica animal
  english_pob_reading: Retain the animal imagery literally rather than interpretively identifying the figures in the main text.
  chosen_spanish_reading: Conservar literalmente la imaginería animal, sin sustituirla por referenciales históricos en el texto principal.
  alternative_spanish_readings:
  - Reemplazar los animales por nombres de pueblos o personajes históricos
  - Parafrasear el símbolo para aclararlo dentro del versículo
  rationale: La visión comunica su sentido mediante una cadena zoológica simbólica. El texto español debe preservar esa retórica y dejar la identificación histórica para notas o comentario, no incorporarla al versículo.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica y no aplanar la prosa visionaria.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una lectura previa errónea de "heifer" a "bull". La forma ge'ez es masculina, y el contexto allegórico exige "toro"; por ello se evitó cualquier solución femenina en español. También se preservó el valor contrastivo de negro/blanco y la secuencia genealógica de la visión.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera expresamente; aquí no aparece.
  - Se conserva "oveja" y no "cordero" para no introducir juventud no indicada.
  - Se evita "siervo"/"esclavo" porque el pasaje no trata ese léxico.
  - La puntuación sigue el estilo español moderno y mantiene la estructura coordinada del original.
