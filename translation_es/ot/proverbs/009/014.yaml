translation:
  language: es
  text: y se sienta a la entrada de su casa, en un asiento[a] en las alturas de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en un trono en las alturas de la ciudad". El hebreo כִּסֵּא puede designar un asiento real o un trono, pero el contexto inmediato no exige imaginería regia, por lo que se conserva "asiento" en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבָה
  english_pob_choice: and sits
  chosen_spanish: y se sienta
  alternatives_spanish:
  - y está sentada
  - y se ha sentado
  lexicon: HALOT
  rationale: El perfecto qal femenino singular funciona aquí como descripción viva y continua; en español, el presente reflexivo 'se sienta' reproduce mejor la escena vigente que un pasado narrativo.
- source_word: לְפֶתַח
  english_pob_choice: at the doorway
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la puerta
  - al portal
  lexicon: HALOT
  rationale: פֶּתַח denota una abertura o acceso. 'Entrada' es natural en español y conserva el valor espacial sin forzar una imagen demasiado específica de 'puerta'.
- source_word: בֵּיתָהּ
  english_pob_choice: of her house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su hogar
  lexicon: HALOT
  rationale: Aquí el lugar físico es el foco; 'casa' mantiene mejor el sentido concreto que 'hogar', que en español suena más afectivo.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: La preposición hebrea introduce la ubicación del asiento. En español, 'en un asiento' expresa con naturalidad la relación locativa y evita una sobrecarga de 'sobre'.
- source_word: כִּסֵּא
  english_pob_choice: a seat
  chosen_spanish: un asiento
  alternatives_spanish:
  - un trono
  - una silla
  lexicon: HALOT
  rationale: כִּסֵּא puede significar silla, asiento o trono. El contexto inmediato no exige imaginería real; 'asiento' preserva la neutralidad léxica de la POB en inglés.
- source_word: מְרֹמֵי
  english_pob_choice: the heights of
  chosen_spanish: las alturas de
  alternatives_spanish:
  - los lugares altos de
  - las partes elevadas de
  lexicon: HALOT
  rationale: El constructo plural de מָרוֹם apunta a elevación/prominencia. 'Alturas' es la forma más natural y fiel en español para reflejar esa ubicación elevada y pública.
- source_word: קָרֶת
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el poblado
  - la villa
  lexicon: HALOT
  rationale: קָרֶת designa una ciudad o población urbana. 'Ciudad' corresponde al contexto sapiencial y al registro de la POB inglesa.
theological_decisions:
- issue: Imagen de 'כִּסֵּא' sin exigencia de realeza
  english_pob_reading: The Hebrew can denote a royal seat or throne, but the immediate context does not require regal imagery, so 'seat' is retained.
  chosen_spanish_reading: '''un asiento'' mantiene la imagen pública sin introducir una lectura real explícita.'
  alternative_spanish_readings:
  - '''un trono'''
  - '''una silla'''
  rationale: El texto personifica a la insensatez en un puesto público; no hay señal inmediata de entronización. Mantener un término neutral evita añadir un matiz doctrinal o simbólico no sustentado por el verso.
  doctrine_reference: Proverbs 9:14 context; lexical caution on כִּסֵּא
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés de POB y el hebreo WLC: perfecto descriptivo en presente, ubicación concreta en la entrada de la casa, y preservación de la neutralidad de כִּסֵּא ante la alternativa ''trono''. No se detectaron revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se mantiene 'casa' en vez de 'hogar' por el matiz espacial concreto.
  - '''Alturas de la ciudad'' conserva la imagen urbana elevada sin introducir ''lugares altos'' como término técnico religioso.'
  - '''Asiento'' evita tanto la trivialización de ''silla'' como la sobrelectura de ''trono''.'
