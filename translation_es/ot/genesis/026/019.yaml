revisions:
- from: Entonces los siervos de Isaac cavaron en el wadi[a] y allí hallaron un pozo de agua viva[b].
  to: Entonces los servidores de Isaac cavaron en el cauce[a] y allí hallaron un pozo de agua viva[b].
  rationale: Se ajusta «siervos» a «servidores» para reflejar mejor la rationale auditada de עבדֵי en este contexto narrativo sin intensificar el matiz de esclavitud. Se reemplaza «wadi» por «cauce[a]» para mejorar la naturalidad y legibilidad en español, preservando en nota la precisión geográfica del hebreo נחל. Se mantiene «agua viva[b]» por fidelidad literal y resonancia bíblica, con nota explicativa más precisa.
