translation:
  language: es
  text: diez reses cebadas, y veinte reses de pastoreo, y cien ovejas[a], además de ciervos, gacelas, corzos[b] y aves cebadas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: צֹאן puede referirse de manera más amplia al ganado menor, incluidas ovejas y cabras; aquí se traduce «ovejas» por brevedad y claridad.
    reason: lexical_alternative
  - marker: b
    text: O «gamos»; la identificación exacta de יַחְמוּר es incierta.
    reason: lexical_alternative
  - marker: c
    text: O «gansos cebados»; la especie exacta indicada por בַרְבֻּרִים es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָקָר בְּרִאִים
  english_pob_choice: fattened cattle
  chosen_spanish: reses cebadas
  alternatives_spanish:
  - ganado cebado
  - reses engordadas
  lexicon: HALOT
  rationale: בָקָר es un término colectivo para ganado vacuno/reses; בְּרִיאִים indica animales gordos, robustos o bien alimentados. 'Reses cebadas' conserva la idea de animales preparados para consumo y suena natural en español bíblico contemporáneo.
- source_word: בָקָר רְעִי
  english_pob_choice: pasture-fed cattle
  chosen_spanish: reses de pasto
  alternatives_spanish:
  - ganado de pastoreo
  - reses apacentadas
  lexicon: HALOT
  rationale: רְעִי se relaciona con pastar o apacentarse. 'Reses de pasto' mantiene el contraste con las reses cebadas y es una expresión clara y breve en español.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaño
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras como ganado menor, pero en esta lista de provisiones 'ovejas' es una equivalencia concisa y natural. La nota conserva la amplitud posible del término.
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: Introduce elementos añadidos a la lista principal. 'Además de' comunica con naturalidad la función de adición.
- source_word: אַיָּל
  english_pob_choice: deer
  chosen_spanish: ciervos
  alternatives_spanish:
  - venados
  - gamos
  lexicon: HALOT
  rationale: El término designa un ciervo/venado. 'Ciervos' es la categoría moderna más clara y neutra en español.
- source_word: צְבִי
  english_pob_choice: gazelles
  chosen_spanish: gacelas
  alternatives_spanish:
  - gazelas
  lexicon: HALOT
  rationale: צְבִי suele referirse a una gacela. 'Gacelas' conserva el sentido zoológico y es un equivalente natural en español.
- source_word: יַחְמוּר
  english_pob_choice: roebucks
  chosen_spanish: ciervos machos
  alternatives_spanish:
  - gamos
  - corzos
  lexicon: HALOT
  rationale: La identificación exacta de יַחְמוּר es incierta. En lugar de forzar una especie moderna específica, 'ciervos machos' preserva el valor general del animal y deja abierta la incertidumbre taxonómica documentada en el POB inglés.
- source_word: בַרְבֻּרִים אֲבוּסִים
  english_pob_choice: fattened fowl
  chosen_spanish: aves cebadas
  alternatives_spanish:
  - aves engordadas
  - aves de corral cebadas
  lexicon: HALOT
  rationale: בַרְבֻּרִים alude a aves/fowl, aunque la especie exacta no es segura; אֲבוּסִים significa cebadas o engordadas. 'Aves cebadas' es idiomático y evita precisar indebidamente la especie.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el repaso más reciente indicó acuerdo alto y sin cambios necesarios; por eso se mantuvo la estructura de la lista, conservando las incertidumbres léxicas donde el hebreo no permite mayor precisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirieron equivalentes zoológicos claros en español y se evitaron tecnicismos innecesarios.
  - Se conservaron las ambigüedades documentadas en el POB inglés para יַחְמוּר, בַרְבֻּרִים y צֹאן.
