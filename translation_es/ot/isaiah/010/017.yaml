base_translation:
  language: en
  yaml_path: translation/ot/isaiah/010/017.yaml
  text: And the light of Israel will become a fire[a], and his Holy One a flame[c][b]; it will burn and consume his thorns and his briers in a single day.
  footnotes:
  - marker: a
    text: Or 'will be a fire ... a flame'; the Hebrew construction can be rendered more formally, but here likely carries the sense of becoming.
    reason: lexical_alternative
  - marker: b
    text: '''His Holy One'' is likely a divine title, referring to the LORD, a frequent theme in Isaiah.'
    reason: cross_reference
  - marker: c
    text: The Hebrew terms rendered 'thorns' and 'briers' refer to thorny growth; the first term is relatively rare and may also be understood more broadly as undergrowth.
    reason: lexical_alternative
