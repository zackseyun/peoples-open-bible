revisions:
- from: 'Y David anheló y dijo[a]: «¿Quién me dará a beber agua del pozo de Belén[b], el que está junto a la puerta?»'
  to: 'Y David anheló y dijo[a]: «¿Quién me dará agua de beber del pozo de Belén, que está junto a la puerta?»'
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder la forma ni el matiz del hebreo. «Agua de beber» transmite bien la idea de «dar de beber» en esta construcción, «que está junto a la puerta» aligera la sintaxis, y se elimina una nota no necesaria porque no preservaba una alternativa textual sustantiva.
