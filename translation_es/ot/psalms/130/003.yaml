revisions:
- from: Si tú, Yahvé, guardaras cuenta de las iniquidades, Señor, ¿quién podría mantenerse en pie?
  to: Si tú, Yah[a], llevaras cuenta de las iniquidades, Señor, ¿quién podría mantenerse en pie?
  rationale: Se corrige la distinción entre יָהּ y אֲדֹנָי conforme a la evidencia fuente y la auditoría inglesa, usando «Yah» para la forma breve poética. También se mejora la naturalidad del español con «llevaras cuenta de», que expresa mejor la idea de llevar registro de las iniquidades sin perder el matiz judicial. Se añade una nota breve para preservar la alternativa «Yahvé» y evitar ambigüedad para lectores hispanos.
