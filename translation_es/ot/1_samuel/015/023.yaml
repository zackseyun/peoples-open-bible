revisions:
- from: Porque la rebelión es como el pecado de la adivinación[a], y la obstinación es como la maldad y los terafines[b]. Porque has rechazado la palabra de Yahvé, él también te ha rechazado[c] para que no seas rey.
  to: Porque la rebelión es como el pecado de la adivinación[a], y la obstinación es como la maldad y los ídolos domésticos[b]. Porque has rechazado la palabra de Yahvé, él también te ha rechazado como rey[c].
  rationale: Se corrige la cláusula final para reflejar remoción del cargo real en vez de propósito, y se cambia «terafines» por «ídolos domésticos» en el texto principal para seguir la decisión semántica auditada y mejorar claridad. Se conserva la nota técnica sobre תְּרָפִים y la simetría de «rechazado».
