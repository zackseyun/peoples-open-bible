source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֥י חֹשֵׁ֛ב עַל הַ/מִּשְׁפָּחָ֥ה הַ/זֹּ֖את רָעָ֑ה אֲ֠שֶׁר לֹֽא תָמִ֨ישׁוּ מִ/שָּׁ֜ם צַוְּארֹֽתֵי/כֶ֗ם וְ/לֹ֤א תֵֽלְכוּ֙ רוֹמָ֔ה כִּ֛י עֵ֥ת רָעָ֖ה הִֽיא־־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/002/003.yaml
  text: 'Therefore[a], this is what Yahweh says: Look, I am planning disaster against this family, from which you will not remove your necks, and you will not walk haughtily[d][c][b], for it is an evil time.'
  footnotes:
  - marker: a
    text: Or 'family.' The Hebrew מִשְׁפָּחָה can denote a household, family line, or larger clan-group.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from there you will not remove your necks,' an image of being unable to escape an imposed yoke or burden.
    reason: cultural_note
  - marker: c
    text: Or 'you will not walk proudly' / 'with head held high.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew repeats the word רָעָה ('evil/disaster') earlier in the verse, creating a wordplay between the announced judgment and the coming time.
    reason: lexical_alternative
