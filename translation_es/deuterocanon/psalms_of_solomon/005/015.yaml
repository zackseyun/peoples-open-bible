translation:
  language: es
  text: La bondad[a] de un hombre se da con medida y para mañana; y si la repite sin murmuración, aun de esto te maravillarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bondad» traduce χρηστότης de manera natural en español; también podría verterse «benevolencia» o «amabilidad». La expresión «se da con medida y para mañana» también puede entenderse como que se da escasamente y se deja para mañana, ya que el griego es breve y elíptico alrededor de «para mañana».
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηστότης
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benevolencia
  lexicon: LSJ
  rationale: En este proverbio la palabra describe una disposición benéfica hacia otros. "Bondad" conserva el tono moral general del término sin sonar tan débil como una simple cortesía, y en español fluye bien junto con la imagen de medida y demora.
- source_word: ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - del ser humano
  lexicon: LSJ
  rationale: El griego está en singular masculino y el contexto proverbial permite un sujeto genérico. "De un hombre" mantiene esa forma proverbial y sigue la decisión auditada del inglés de conservar el singular masculino cuando no hay motivo claro para neutralizarlo.
- source_word: ἐν φειδῷ
  english_pob_choice: is sparing
  chosen_spanish: es medida
  alternatives_spanish:
  - se da con reserva
  - es escasa
  lexicon: LSJ
  rationale: La expresión comunica contención o escasez. Elegí "es medida" para expresar la restricción sin cargarla innecesariamente con la idea de tacañería, que sería más fuerte de lo que exige el griego en este dicho breve.
- source_word: αὔριον
  english_pob_choice: for tomorrow
  chosen_spanish: para mañana
  alternatives_spanish:
  - hasta mañana
  - dejada para mañana
  lexicon: LSJ
  rationale: La frase es elíptica en griego. "Para mañana" conserva esa brevedad y deja visible la posible idea de aplazamiento sin añadir una glosa interpretativa al texto principal.
- source_word: δευτερώσῃ
  english_pob_choice: repeats it
  chosen_spanish: la repite
  alternatives_spanish:
  - la hace de nuevo
  - la hace por segunda vez
  lexicon: LSJ
  rationale: El verbo expresa hacer algo una segunda vez. "La repite" es natural en español y sigue el ajuste del inglés revisado, manteniendo la referencia a la misma acción benefactora.
- source_word: γογγυσμοῦ
  english_pob_choice: grumbling
  chosen_spanish: murmuración
  alternatives_spanish:
  - queja
  - rezongo
  lexicon: LSJ
  rationale: '"Murmuración" preserva un registro bíblico y refleja la protesta baja o refunfuño implicada por el griego. Evita hacer el tono demasiado coloquial.'
- source_word: θαυμάσεις
  english_pob_choice: you will marvel
  chosen_spanish: te maravillarás
  alternatives_spanish:
  - te asombrarás
  - te admirarás
  lexicon: LSJ
  rationale: El futuro singular se refleja directamente. "Te maravillarás" conserva el nivel elevado del proverbio y corresponde bien al asombro que el dicho espera provocar.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al reflejar δευτερώσῃ como "la repite" y mantener la conjunción "y" antes de la cláusula condicional. También conserva la brevedad elíptica de αὔριον con "para mañana", sin expandir el texto más de lo que el griego exige.
  spanish_consistency_notes:
  - Se mantiene un registro proverbial y sobrio, apto para lectura eclesial.
  - Se evita "SEÑOR" u otros términos no presentes, ya que no hay vocabulario divino en este versículo.
  - '"Murmuración" se usa de forma consistente con el matiz de protesta baja o refunfuño, no como simple conversación.'
