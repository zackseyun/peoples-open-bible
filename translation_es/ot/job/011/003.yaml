translation:
  language: es
  text: ¿Hará tu palabrería vacía[a] callar a los hombres, y cuando te burlas, ¿no te avergonzará nadie?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tus jactancias’ o ‘tu charla vana’ para ‘tu palabrería vacía’. El hebreo puede denotar habla vacía, ociosa, jactanciosa o falsa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדֶּיךָ
  english_pob_choice: your empty talk
  chosen_spanish: tus palabras vacías
  alternatives_spanish:
  - tus vanaglorias
  - tus charlas vanas
  - tus palabras ociosas
  - tus mentiras
  lexicon: HALOT
  rationale: El hebreo בד puede abarcar habla vacía, ociosa, jactanciosa o falsa. En español, 'palabras vacías' conserva la idea de habla hueca y despectiva sin decidir innecesariamente por 'mentiras'. Se prefirió un sustantivo plural natural en español para la fuerza retórica del verso.
- source_word: מְתִים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los mortales
  - la gente
  lexicon: HALOT
  rationale: El plural hebreo designa personas/hombres. 'Los hombres' mantiene la correspondencia formal con la forma masculina plural y suena idiomático en el reproche poético.
- source_word: יַחֲרִישׁו
  english_pob_choice: make ... keep silent
  chosen_spanish: callar
  alternatives_spanish:
  - guardar silencio
  - hacer callar
  - silenciar
  lexicon: HALOT
  rationale: 'El hifil de חרש expresa causar silencio. ''Harán callar'' reproduce la causatividad, pero aquí se integró en una pregunta natural: ''¿Harán... callar?''. La opción conserva el sentido sin volverlo torpe en español.'
- source_word: וַתִּלְעַג
  english_pob_choice: when you mock
  chosen_spanish: cuando te burlas
  alternatives_spanish:
  - y te burlas
  - cuando te mofas
  - cuando te escarneces
  lexicon: HALOT
  rationale: לעג significa burlarse o mofarse. 'Cuando te burlas' es la equivalencia más clara y natural en español, y preserva el matiz discursivo del segundo miembro de la pregunta.
- source_word: מַכְלִם
  english_pob_choice: shame you
  chosen_spanish: te avergonzará
  alternatives_spanish:
  - te hará quedar mal
  - te humillará
  - te cubrirá de vergüenza
  lexicon: HALOT
  rationale: El participio hifil de כלם comunica causar vergüenza o deshonra. 'Te avergonzará' mantiene la fuerza interpersonal del término y evita suavizarlo a 'reprenderte'.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la traducción auditada en inglés y con la revisión más reciente: no se requieren cambios de sentido mayores. La principal adaptación fue hacer el reproche más natural en español sin perder la fuerza del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo el registro poético-reprobatorio del texto.
  - Se evitó 'SEÑOR' o terminología teológica ajena al versículo, que no contiene el nombre divino.
  - Se conservó la ambigüedad lexical de בד mediante la nota, como en el POB inglés.
