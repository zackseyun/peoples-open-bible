source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ὃς ἂν οὖν ἐλθὼν διδάξῃ ὑμᾶς ταῦτα πάντα, τὰ προειρημένα, δέξασθε αὐτόν· ἐὰν δὲ αὐτὸς ὁ διδάσκων στραφεὶς διδάσκῃ ἄλλην διδαχὴν εἰς τὸ καταλῦσαι, μὴ αὐτοῦ ἀκούσητε· εἰς δὲ τὸ προσθεῖναι δικαιοσύνην καὶ γνῶσιν Κυρίου, δέξασθε αὐτὸν ὡς Κύριον. Περὶ δὲ τῶν ἀποστόλων καὶ προφητῶν κατὰ τὸ δόγμα τοῦ εὐαγγελίου, οὕτω ποιήσατε. Πᾶς δὲ ἀπόστολος ἐρχόμενος πρὸς ὑμᾶς δεχθήτω ὡς Κύριος· οὐ μενεῖ δὲ ἡμέραν μίαν· ἐὰν δὲ ᾖ χρεία, καὶ τὴν ἄλλην· τρεῖς δὲ ἐὰν μείνῃ, ψευδοπροφήτης ἐστίν. Ἐξερχόμενος δὲ ὁ ἀπόστολος μηδὲ λαμβανέτω εἰμὴ ἄρτον ἕως οὗ αὐλισθῇ· ἐὰν δὲ ἀργύριον αἰτῇ, ψευδοπροφήτης ἐστί. Καὶ πάντα προφήτην λαλοῦντα ἐν πνεύματι οὐ πειράσετε οὐδὲ διακρινεῖτε· πᾶσα γὰρ ἁμαρτία ἀφεθήσεται, αὕτη δὲ ἡ ἁμαρτία οὐκ ἀφεθήσεται. Οὐ πᾶς δὲ ὁ λαλῶν ἐν πνεύματι προφήτης ἐστίν, ἀλλ' ἐὰν ἔχῃ τοὺς τρόπους Κυρίου. Ἀπὸ οὖν τῶν τρόπων γνωσθήσεται ὁ ψευδοπροφήτης καὶ ὁ προφήτης. Καὶ πᾶς προφήτης ὁρίζων τράπεζαν ἐν πνεύματι, οὐ φάγεται ἀπ᾽ αὐτῆς, εἰδὲ μήγε ψευδοπροφήτης ἐστί· πᾶς δὲ προφήτης διδάσκων τὴν ἀλήθειαν, εἰ ἃ διδάσκει οὐ ποιεῖ, ψευδοπροφήτης ἐστί. Πᾶς δὲ προφήτης δεδοκιμασμένος, ἀληθινός, ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας, μὴ διδάσκων δὲ ποιεῖν ὅσα αὐτὸς ποιεῖ, οὐ κριθήσεται ἐφ᾽ ὑμῶν· μετὰ Θεοῦ γὰρ ἔχει τὴν κρίσιν· ὡσαύτως γὰρ ἐποίησαν καὶ οἱ ἀρχαῖοι προφῆται. Ὃς δ᾽ ἂν εἴπῃ ἐν πνεύματι· Δός μοι ἀργύρια ἢ ἕτερά τινα, οὐκ ἀκούσεσθε αὐτοῦ· ἐὰν δὲ περὶ ἄλλων ὑστερούντων εἴπῃ δοῦναι, μηδεὶς αὐτὸν κρινέτω.
