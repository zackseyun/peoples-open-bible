  to: 'Entonces el rey Sedequías envió y lo mandó traer, y el rey lo interrogó en su casa, en privado[a], y dijo: «¿Hay alguna palabra de Yahvé?» Jeremías dijo: «Sí, hay». Luego dijo[b]: «Serás entregado en manos del rey de Babilonia».'
