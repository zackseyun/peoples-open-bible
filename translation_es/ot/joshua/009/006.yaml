translation:
  language: es
  text: 'Ellos fueron a Josué, al campamento de Guilgal, y le dijeron a Josué y a los hombres de Israel[a]: «Hemos venido de una tierra lejana; así que ahora hagan un pacto con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hagan un tratado con nosotros». La expresión hebrea dice literalmente «corten un pacto con nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: They went
  chosen_spanish: Ellos fueron
  alternatives_spanish:
  - Ellos vinieron
  - Ellos se dirigieron
  lexicon: HALOT
  rationale: הלך expresa el movimiento narrativo básico de ir. En español, «fueron» conserva ese desplazamiento sin introducir el matiz direccional de «vinieron», que ya queda aclarado por los complementos de lugar.
- source_word: אֶל יְהוֹשֻׁעַ אֶל הַמַּחֲנֶה הַגִּלְגָּל
  english_pob_choice: to Joshua at the camp at Gilgal
  chosen_spanish: a Josué, al campamento en Gilgal
  alternatives_spanish:
  - a Josué, al campamento de Gilgal
  - a Josué, en el campamento de Gilgal
  lexicon: HALOT
  rationale: La repetición de אֶל indica dirección hacia Josué y hacia el lugar del campamento. En español, «a Josué, al campamento en Gilgal» mantiene ambos valores con una construcción natural y legible.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la hueste
  lexicon: HALOT
  rationale: מַחֲנֶה designa un campamento o lugar de acampada. «Campamento» es el equivalente normal y claro en español contemporáneo.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y dijeron
  - y hablaron
  lexicon: HALOT
  rationale: אָמַר introduce habla directa. En español, «dijeron» mantiene la concisión narrativa; se añade el pronombre dativo por la sintaxis natural del discurso.
- source_word: אֵלָיו וְאֶל אִישׁ יִשְׂרָאֵל
  english_pob_choice: to him and to the men of Israel
  chosen_spanish: a él y a los hombres de Israel
  alternatives_spanish:
  - a él y al hombre de Israel
  - a él y al pueblo de Israel
  lexicon: HALOT
  rationale: אִישׁ יִשְׂרָאֵל es un singular colectivo con forma masculina. «Hombres de Israel» conserva la fuerza colectiva y la forma masculina del hebreo mejor que una generalización a «pueblo».
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra lejana
  alternatives_spanish:
  - de una tierra distante
  - de un país lejano
  lexicon: HALOT
  rationale: אֶרֶץ puede referirse a tierra o país; רְחוֹקָה expresa lejanía. «Tierra lejana» reproduce bien el reclamo de distancia geográfica con naturalidad en español.
- source_word: בָּאנוּ
  english_pob_choice: We have come
  chosen_spanish: Hemos venido
  alternatives_spanish:
  - Vinimos
  - Hemos llegado
  lexicon: HALOT
  rationale: El perfecto hebreo admite valor de resultado presente. «Hemos venido» conserva ese estado actual de haber llegado, sin convertirlo en un simple pasado narrativo.
- source_word: וְעַתָּה
  english_pob_choice: so now
  chosen_spanish: así que ahora
  alternatives_spanish:
  - y ahora
  - ahora, pues
  lexicon: HALOT
  rationale: La expresión marca transición inferencial hacia una petición. «Así que ahora» refleja bien ese paso discursivo en un español natural.
- source_word: כִּרְתוּ לָנוּ בְרִית
  english_pob_choice: make a covenant with us
  chosen_spanish: hagan un pacto con nosotros
  alternatives_spanish:
  - corten un pacto con nosotros
  - hagan un tratado con nosotros
  lexicon: HALOT
  rationale: כרת ברית es literalmente «cortar un pacto/covenant». En español, «hacer un pacto» comunica de forma natural el sentido idiomático; «tratado» es posible, pero desplaza el término bíblico clave y su continuidad léxica.
theological_decisions:
- issue: Renderización de בְרִית en un contexto diplomático
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - tratado
  - alianza
  rationale: Aunque el contexto es claramente político, el hebreo usa el término bíblico estándar בְרִית. Se conserva «pacto» como equivalente bíblico ampliamente reconocible en español, sin reducirlo a una mera categoría diplomática.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura principal «covenant» y la nota alternativa «treaty». No hubo revisiones posteriores ni cambios sugeridos en el pass más reciente; por eso la versión española conserva la misma decisión léxica principal y refleja la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Josué» para יְהוֹשֻׁעַ y «Gilgal» como topónimo transliterado.
  - Se conserva la forma masculina colectiva «hombres de Israel» para אַישׁ יִשְׂרָאֵל, en paralelo con la decisión inglesa.
  - «Pacto» se usa de modo consistente para בְרִית en la línea principal; la alternativa «tratado» queda en nota sin desplazar el término bíblico.
  - El registro es formal y bíblico, pero con sintaxis española natural; no se imita de manera servil el orden hebreo.
