translation:
  language: es
  text: Y Jonatán y su campamento acamparon junto al agua de Genesar[a], y se levantaron temprano por la mañana y fueron a la llanura de Nasor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Genesar» sigue la forma griega Γεννησάρ del texto base; muchos lectores conocen este lugar como «Genesaret».
    reason: alternative_reading
  - marker: b
    text: O «a la llanura de Nasor». El griego dice literalmente «se levantaron temprano por la mañana hacia/a la llanura de Nasor», con el movimiento hacia la llanura implícito más que expresado por un verbo separado de viaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa el conjunto que acampa. «Campamento» comunica naturalmente la noción colectiva y encaja con el verbo siguiente sin sobreespecificar como «ejército».
- source_word: παρενέβαλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon
  - establecieron campamento
  lexicon: LSJ
  rationale: El verbo expresa la acción de hacer campamento. «Acamparon» es directo, natural en español y mantiene la imagen militar del pasaje.
- source_word: ἐπὶ τὸ ὕδωρ
  english_pob_choice: by the water
  chosen_spanish: junto al agua
  alternatives_spanish:
  - al lado del agua
  - cerca del agua
  lexicon: LSJ
  rationale: Con lenguaje de campamento, ἐπί con acusativo tiene aquí sentido locativo. «Junto al agua» conserva la ubicación sin forzar una traducción literal poco natural como «sobre el agua».
- source_word: τοῦ Γεννησάρ
  english_pob_choice: of Gennesar
  chosen_spanish: de Genesar
  alternatives_spanish:
  - de Gennesar
  - de Genesaret
  lexicon: LSJ
  rationale: Se conserva la forma griega de Swete mediante transliteración española simple. No se armoniza con la forma más conocida «Genesaret» porque la tarea pide partir del texto fuente auditado.
- source_word: ὤρθρισαν
  english_pob_choice: rose early
  chosen_spanish: madrugaron
  alternatives_spanish:
  - se levantaron temprano
  - se levantaron de madrugada
  lexicon: LSJ
  rationale: El verbo denota levantarse temprano o al amanecer. «Madrugaron» reproduce bien la idea de levantarse muy temprano de manera idiomática en español.
- source_word: τὸ πρωὶ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - muy de mañana
  lexicon: LSJ
  rationale: La construcción refuerza el momento temprano del día. «Por la mañana» es una equivalencia clara y natural que preserva el valor adverbial.
- source_word: εἰς τὸ πεδίον Νασώρ
  english_pob_choice: and went to the plain of Nasor
  chosen_spanish: fueron a la llanura de Nasor
  alternatives_spanish:
  - se dirigieron a la llanura de Nasor
  - caminaron hacia la llanura de Nasor
  lexicon: LSJ
  rationale: εἰς con acusativo marca dirección a un destino. «Fueron a» expresa el movimiento implícito sin añadir contenido no presente en el griego; «llanura» corresponde a πεδίον y «Nasor» refleja la forma griega Νασώρ.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete y refleja la misma decisión que la revisión inglesa reciente: hacer explícito el movimiento implícito en εἰς τὸ πεδίον Νασώρ con un verbo de desplazamiento natural en español («fueron a»). No se armoniza Γεννησάρ con la forma más familiar «Genesaret», porque la fuente auditada conserva la variante griega Γεννησάρ.'
  spanish_consistency_notes:
  - Se mantiene «Jonatán» para el nombre propio, acorde con el uso español estándar y el equivalente inglés auditado.
  - Se usa «acamparon» para repetir la relación semántica con «campamento» y conservar la estructura narrativa militar.
  - «Llanura» traduce πεδίον de forma precisa y estilísticamente sobria.
  - 'La puntuación separa claramente las dos acciones temporales: acampar junto al agua y salir al amanecer hacia la llanura.'
