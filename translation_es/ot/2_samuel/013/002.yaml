    rationale: El inglés POB eligió 'made himself sick' y documentó en nota la alternativa resultativa. El español puede expresar esto naturalmente con 'se puso enfermo' o 'se enfermó hasta ponerse enfermo'; la primera opción es más idiomática y deja la alternativa en nota.
  - severity: high
