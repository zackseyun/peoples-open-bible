translation:
  language: es
  text: De David. Un Maskil[a]. Bienaventurado aquel cuya transgresión ha sido perdonada[b], cuyo pecado está cubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Maskil, un encabezado de salmo cuyo sentido preciso es incierto; posiblemente una composición instructiva o contemplativa.
    reason: cultural_note
  - marker: b
    text: Literalmente, «levantada» o «llevada» para «perdonada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד / Of David
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - Para David.
  lexicon: superscripción poética/dedicatoria
  rationale: La frase hebrea funciona como encabezado breve de atribución; «De David» mantiene la sobriedad del original sin añadir una paráfrasis interpretativa. «Salmo de David» es posible, pero introduce un sustantivo no presente en este verso/encabezado.
- source_word: מַשְׂכִּיל / Maskil
  english_pob_choice: A Maskil.
  chosen_spanish: Un Maskil.
  alternatives_spanish:
  - Un salmo didáctico.
  - Una composición contemplativa.
  - Un poema de instrucción.
  lexicon: título/encabezado de género
  rationale: Se conserva el término técnico transliterado porque su sentido exacto es incierto y la POB inglesa también lo preserva con nota. En español, traducirlo como «didáctico» o «contemplativo» cerraría indebidamente la ambigüedad del hebreo.
- source_word: נְשׂוּי פֶּשַׁע / whose transgression is forgiven
  english_pob_choice: whose transgression is forgiven[b]
  chosen_spanish: cuyo pecado ha sido perdonado[b]
  alternatives_spanish:
  - cuya transgresión es perdonada
  - cuyo delito ha sido levantado
  lexicon: perdón/levantado
  rationale: El POB inglés anota literalmente «lifted»/«borne away». En español, «ha sido perdonado» comunica el resultado natural para el lector, mientras que la nota preserva la alternativa más literal. Se usa «pecado» en la frase principal para alinearse con la segunda línea y evitar dureza innecesaria, aunque «transgresión» queda como alternativa fiel al hebreo.
- source_word: כְּסוּי חֲטָאָה / whose sin is covered
  english_pob_choice: whose sin is covered.
  chosen_spanish: cuyo pecado está cubierto.
  alternatives_spanish:
  - cuya falta está cubierta
  - cuyo pecado ha sido velado
  lexicon: cubrir/velar
  rationale: «Cubierto» reproduce con claridad la imagen del hebreo y coincide con el inglés POB. «Velado» es posible, pero menos directo y más literario; no se prefiere porque el paralelo hebreo ya aporta la metáfora suficiente.
theological_decisions:
- issue: La bienaventuranza del perdón como estado recibido, no como logro humano
  english_pob_reading: Blessed is the one whose transgression is forgiven, whose sin is covered.
  chosen_spanish_reading: Bienaventurado el que ha sido perdonado de su transgresión, cuyo pecado está cubierto.
  alternative_spanish_readings:
  - Dichoso el que recibe perdón por su transgresión, cuyo pecado queda cubierto
  - Bienaventurado el que es absuelto de su transgresión
  rationale: La estructura pasiva conserva que la bienaventuranza proviene de una acción recibida de parte de Dios, no de mérito humano. «Ha sido perdonado» y «está cubierto» mantienen ese matiz sin añadir explicaciones doctrinales ajenas al verso.
  doctrine_reference: Salmo 32:1; cf. Romanos 4:7-8
translation_notes:
  revision_awareness: La versión inglesa de auditoría fue revisada para completar el contenido del versículo tras el encabezado («Of David. A Maskil.»), añadiendo la bienaventuranza y las dos cláusulas paralelas. Esta traducción española sigue esa forma final completa y conserva la nota léxica sobre el valor literal de נְשׂוּי.
  spanish_consistency_notes:
  - Se mantiene «David» sin artículo para la atribución del encabezado.
  - Se preserva la transliteración «Maskil» por la incertidumbre lexical documentada.
  - Se traduce la bienaventuranza con «Bienaventurado», de registro bíblico pero natural en español.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este verso.
