id: T12P.DAN.4.2
reference: Testament of Dan 4:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Ἐν γὰρ λόγῳ παροξύνεται⁵ πρῶτον εἶτα⁶ *ἐν ἔργοις⁷ †δυναμοῖ⁸ τὸν ὀργιζόμενον⁹, καὶ¹⁰ ἐν *ζημίαις πικραῖς διαταράσσει τὸ διαβούλιον αὐτοῦ¹¹, καὶ οὕτως διεγείρει ἐν θυμῷ μεγάλῳ τὴν ψυχὴν αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/002.yaml
  text: For first he is provoked by a word; then by deeds it strengthens the one becoming angry; and by bitter losses it provokes him. It throws his purpose into confusion, and so it stirs up his soul in great wrath.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:33Z'
    unchanged: false
    changes_summary: Changed 'it is stirred up' to 'he is provoked' for clearer alignment with the singular person in context and the verb's sense; adjusted 'rouses' to 'stirs up' and 'fury' to 'wrath' for more formal consistency with θυμός. Retained 'strengthens the one becoming angry' as the most direct rendering of δυναμοῖ τὸν ὀργιζόμενον.
translation:
  language: es
  text: Pues primero es provocado por una palabra; luego, por las obras, ella fortalece al que se enoja; y con pérdidas amargas lo provoca. Arroja en confusión su propósito, y así agita su alma con gran ira.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παροξύνεται
  english_pob_choice: is provoked
  chosen_spanish: es provocado
  alternatives_spanish:
  - es irritado
  - se enardece
  lexicon: LSJ
  rationale: Conserva el sentido pasivo-incoativo y se alinea con la revisión inglesa 'is provoked'.
- source_word: δυναμοῖ
  english_pob_choice: strengthens
  chosen_spanish: fortalece
  alternatives_spanish:
  - empodera
  - robustece
  lexicon: LSJ
  rationale: Refleja la imagen de que las obras refuerzan al iracundo.
- source_word: ζημίαις πικραῖς
  english_pob_choice: by bitter losses
  chosen_spanish: con pérdidas amargas
  alternatives_spanish:
  - con daños penosos
  - con perjuicios dolorosos
  lexicon: LSJ
  rationale: Conserva el aguijón moral-psicológico sin sobreespecificar.
- source_word: διαβούλιον
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - deliberación
  lexicon: LSJ
  rationale: Transmite la facultad de la intención considerada que la ira trastorna.
- source_word: διεγείρει ἐν θυμῷ μεγάλῳ
  english_pob_choice: stirs up his soul in great wrath
  chosen_spanish: agita su alma con gran ira
  alternatives_spanish:
  - alborota su alma con gran furor
  lexicon: LSJ
  rationale: Aquí el griego usa θυμός; mantengo 'ira' por consistencia, aunque el inglés revisado dice 'wrath'. La distinción ὀργή/θυμός es léxica en el griego original.
translation_notes:
  revision_awareness: 'El inglés POB se revisó: ''it is stirred up'' → ''he is provoked'', ''rouses'' → ''stirs up'', ''fury'' → ''wrath'' por consistencia formal con θυμός. El español sigue ''ira'' para θυμός aquí dado que el contexto reabre el tema y la consistencia interna prima.'
  spanish_consistency_notes:
  - θυμός → ira (consistente).
  - διαβούλιον → propósito.
  - παροξύνομαι → ser provocado.
