translation:
  language: es
  text: También[a], desde el día en que me nombró para ser gobernador en la tierra de Judá, desde el año veinte hasta el año treinta y dos del rey Artajerjes —doce años— mis hermanos y yo no comimos la asignación de comida del gobernador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan del gobernador», es decir, las provisiones o la asignación acostumbrada del gobernador.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: La partícula añade otro dato a la defensa de Nehemías; «también» conserva ese valor aditivo de manera natural en español.
- source_word: מִיּוֹם אֲשֶׁר
  english_pob_choice: from the day that
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde el día que
  - desde el momento en que
  lexicon: HALOT
  rationale: La expresión marca el punto de inicio de un período continuo; «desde el día en que» mantiene el sentido idiomático y la continuidad temporal.
- source_word: צִוָּה אֹתִי
  english_pob_choice: he appointed me
  chosen_spanish: me nombró
  alternatives_spanish:
  - me designó
  - me comisionó
  - me mandó
  lexicon: HALOT
  rationale: En este contexto administrativo la idea es una investidura oficial, no solo un mandato general. «Nombró» expresa bien el acto de poner a alguien en el cargo de gobernador.
- source_word: לִהְיוֹת פֶּחָם
  english_pob_choice: to be governor
  chosen_spanish: para ser gobernador
  alternatives_spanish:
  - para ser gobernador sobre ellos
  - para ocupar el cargo de gobernador
  lexicon: HALOT
  rationale: פֶּחָה es el título persa de gobernador provincial. En español conviene traducir el título con su equivalente funcional, sin transliterarlo.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en Judá
  - en la provincia de Judá
  lexicon: HALOT
  rationale: «Tierra de Judá» reproduce de cerca la formulación hebrea y es clara en español. «Provincia» sería más interpretativo dentro del marco persa.
- source_word: מִשְּׁנַת עֶשְׂרִים וְעַד שְׁנַת שְׁלֹשִׁים וּשְׁתַּיִם לְאַרְתַּחְשַׁסְתְּא הַמֶּלֶךְ
  english_pob_choice: from the twentieth year until the thirty-second year of King Artaxerxes
  chosen_spanish: desde el año veinte hasta el año treinta y dos del rey Artajerjes
  alternatives_spanish:
  - desde el año veinte hasta el año treinta y dos de Artajerjes el rey
  lexicon: HALOT
  rationale: Se conserva la fórmula cronológica regnal con el nombre propio hispanizado. «Del rey Artajerjes» expresa de forma natural la relación posesiva sin perder precisión.
- source_word: שָׁנִים שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve years
  chosen_spanish: doce años
  alternatives_spanish:
  - por doce años
  lexicon: HALOT
  rationale: La cifra resume el intervalo anterior. «Doce años» comunica la apposición de manera directa y fiel.
- source_word: אֲנִי וְאַחַי
  english_pob_choice: I and my brothers
  chosen_spanish: yo y mis hermanos
  alternatives_spanish:
  - yo y mis parientes
  - yo y mis compañeros
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mis hermanos». Se conserva ese término para no diluir la fuerza lexical ni neutralizar el plural masculino del original.
- source_word: לֶחֶם הַפֶּחָה
  english_pob_choice: the governor’s food allowance
  chosen_spanish: el pan del gobernador
  alternatives_spanish:
  - las provisiones del gobernador
  - la ración del gobernador
  - el sustento del gobernador
  lexicon: HALOT
  rationale: Aquí «pan» mantiene la metáfora hebrea básica y deja abierta la nota explicativa sobre provisiones o asignación acostumbrada. Se evita resolver de antemano la tensión léxica que el audit trail preserva.
- source_word: לֹא אָכַלְתִּי
  english_pob_choice: did not eat
  chosen_spanish: no comimos
  alternatives_spanish:
  - no he comido
  - no participamos
  lexicon: HALOT
  rationale: La negación del acto de comer se expresa de modo concreto en español. Se adapta a la coordinación con «yo y mis hermanos» en la primera persona plural.
theological_decisions:
- issue: Sentido de צִוָּה en un contexto de investidura administrativa
  english_pob_reading: he appointed me
  chosen_spanish_reading: me nombró
  alternative_spanish_readings:
  - me mandó
  - me designó
  - me comisionó
  rationale: El contexto de gobernación persa favorece la idea de nombramiento oficial. «Nombró» evita confundir el pasaje con una simple orden verbal y conserva el matiz de investidura.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
- issue: Cómo tratar לֶחֶם הַפֶּחָה sin borrar la tensión entre literalidad e idiomática
  english_pob_reading: the governor’s food allowance
  chosen_spanish_reading: el pan del gobernador
  alternative_spanish_readings:
  - las provisiones del gobernador
  - la ración del gobernador
  - el sustento del gobernador
  rationale: El hebreo usa «pan», pero el contexto administrativo apunta a provisiones o asignación. La forma elegida conserva el término base y permite que una nota aclare el sentido idiomático, sin borrar la tensión lexical.
  doctrine_reference: DOCTRINE.md §Translation philosophy, lexical transparency
- issue: Mantenimiento de אַחַי como referencia literal
  english_pob_reading: my brothers
  chosen_spanish_reading: mis hermanos
  alternative_spanish_readings:
  - mis parientes
  - mis compañeros
  rationale: El plural masculino del hebreo se conserva en español. Aunque el grupo pueda abarcar más que hermanos biológicos, la traducción no debe neutralizar la forma explícita del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate policy
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que eliminó «their» antes de «governor» por no estar en el hebreo. La redacción española evita añadir un posesivo equivalente. También se retuvo la apertura léxica de לֶחֶם הַפֶּחָה mediante una nota, porque el audit trail inglés señaló la tensión entre «pan» y «food allowance».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «Artajerjes» como forma española del nombre propio persa, coherente con la tradición bíblica en español y con el nombre del original.
  - «Gobernador» se emplea como equivalente funcional de פֶּחָה, evitando transliteración innecesaria.
  - La coordinación «yo y mis hermanos» conserva el orden del hebreo y la referencia explícita al plural masculino.
