translation:
  language: es
  text: Pero cuando ya no pudo ocultarlo[a], tomó para él una canasta de papiro y la recubrió con betún y brea. Luego puso al niño en ella y la colocó entre los juncos, a la orilla del Nilo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arca de papiro». La palabra hebrea tevá es la misma que se usa para el arca de Noé en Génesis, preservando un eco literario de liberación por medio del agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּפִינוֹ
  english_pob_choice: hide him
  chosen_spanish: ocultarlo
  alternatives_spanish:
  - esconderlo
  - tenerlo oculto
  lexicon: HALOT
  rationale: El verbo en hitpael/causativo expresa la acción de ocultar al niño; 'ocultarlo' es natural en español y conserva el sentido concreto de imposibilidad creciente que marca לֹא יָכְלָה עוֹד.
- source_word: תֵּבַת
  english_pob_choice: basket
  chosen_spanish: canastillo
  alternatives_spanish:
  - canasta
  - arca
  - caja
  lexicon: HALOT
  rationale: Tevá designa un contenedor; en este contexto el objeto es pequeño y preparado para un bebé. 'Canastillo' evita la imagen demasiado solemne de 'arca' en el texto principal, pero no borra el eco literario del término bíblico.
- source_word: גֹּמֶא
  english_pob_choice: papyrus
  chosen_spanish: papiro
  alternatives_spanish:
  - junco
  - caña de papiro
  lexicon: HALOT
  rationale: גֹמֶא se refiere específicamente al papiro, no a juncos en general. 'Papiro' conserva la precisión botánica y el trasfondo egipcio.
- source_word: וַתַּחְמְרָה בַחֵמָר
  english_pob_choice: coated it with bitumen
  chosen_spanish: lo recubrió con betún
  alternatives_spanish:
  - lo untó con betún
  - lo cubrió con asfalto
  lexicon: HALOT
  rationale: La idea verbal es revestir o embadurnar con חומר impermeabilizante; 'recubrió con betún' transmite bien el proceso y mantiene la sustancia principal del texto fuente.
- source_word: וּבַזָּפֶת
  english_pob_choice: and pitch
  chosen_spanish: y brea
  alternatives_spanish:
  - y pez
  - y resina
  lexicon: HALOT
  rationale: זֶפֶת corresponde a un material resinoso impermeabilizante. 'Brea' es una equivalencia clara y ampliamente inteligible en español; mantiene la doble sustancia junto con betún.
- source_word: הַיֶּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el bebé
  - el muchacho
  - el niño pequeño
  lexicon: HALOT
  rationale: Aunque יֶלֶד puede ser 'niño' o 'hijo', aquí el referente inmediato es el infante. 'El niño' es natural y no sobreespecifica la edad más allá de lo que el contexto permite.
- source_word: בַּסּוּף
  english_pob_choice: among the reeds
  chosen_spanish: entre los juncos
  alternatives_spanish:
  - entre los carrizos
  - entre las cañas
  lexicon: HALOT
  rationale: סוּף designa vegetación acuática tipo juncos/carrizos. 'Entre los juncos' conserva la colocación dentro de la vegetación sin volverla demasiado técnica.
- source_word: עַל שְׂפַת הַיְאֹר
  english_pob_choice: by the bank of the Nile
  chosen_spanish: a la orilla del Nilo
  alternatives_spanish:
  - junto a la ribera del Nilo
  - en la ribera del Nilo
  lexicon: HALOT
  rationale: יְאֹר en Éxodo remite al Nilo en el contexto egipcio. 'A la orilla del Nilo' es idiomático en español y conserva la localización fluvial precisa.
- source_word: לֹא יָכְלָה עוֹד
  english_pob_choice: could no longer
  chosen_spanish: ya no pudo
  alternatives_spanish:
  - no pudo ya
  - no podía seguir
  lexicon: HALOT
  rationale: La combinación expresa el punto en que la acción previa se vuelve imposible. 'Ya no pudo' reproduce esa límite de capacidad de forma natural.
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para el niño
  - en favor de él
  lexicon: HALOT
  rationale: 'El dativo se conserva de manera explícita porque forma parte de la escena: el recipiente fue preparado para el niño. En español, ''para él'' es claro y fiel.'
theological_decisions:
- issue: Ecos literarios de תֵּבָה entre Éxodo 2:3 y Génesis 6–9
  english_pob_reading: The footnote notes that tebah is the same word used for Noah's ark in Genesis, preserving a literary echo of deliverance through water.
  chosen_spanish_reading: Se mantiene 'canastillo' en el texto principal, con nota que preserva el eco de 'arca' como alternativa léxica.
  alternative_spanish_readings:
  - arca
  - arca de juncos
  - arca pequeña
  rationale: 'La tensión es literaria y lexical: en español, ''arca'' comunica mejor el eco con Noé, pero puede sonar demasiado solemne para el objeto descrito. Se opta por una forma más natural en el texto principal y se preserva la alternativa con nota para no borrar el vínculo intertextual.'
  doctrine_reference: Intertextualidad bíblica / tipología narrativa
- issue: 'Materiales de impermeabilización: חֵמָר y זָפֶת'
  english_pob_reading: bitumen and pitch
  chosen_spanish_reading: betún y brea
  alternative_spanish_readings:
  - asfalto y brea
  - betún y pez
  - alquitrán y brea
  rationale: El texto distingue dos materiales. En español conviene no fusionarlos ni simplificarlos. 'Betún y brea' conserva la duplicidad y la función impermeabilizante sin introducir un tecnicismo innecesario.
  doctrine_reference: Fidelidad material del relato histórico
- issue: Identificación geográfica de הַיְאֹר
  english_pob_reading: the Nile
  chosen_spanish_reading: el Nilo
  alternative_spanish_readings:
  - el río
  - el río Nilo
  rationale: En el contexto egipcio, יְאֹר no es un río cualquiera. Traducirlo como 'Nilo' evita perder la referencia histórica y geográfica que el texto presupone.
  doctrine_reference: Contexto histórico-geográfico del Éxodo
translation_notes:
  revision_awareness: El inglés POB mantuvo 'basket', 'papyrus', 'bitumen and pitch', 'the child', 'among the reeds', y 'the Nile', con una nota de alternativa para tebah/ark. El borrador español sigue esas decisiones con equivalencias naturales ('canastillo', 'papiro', 'betún y brea', 'el niño', 'entre los juncos', 'el Nilo') y conserva la alternativa intertextual en nota sin ampliar el sentido del verso.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otros reemplazos no pertinentes, ya que no aparece el nombre divino en este versículo.
  - '''Canastillo'' se eligió por fluidez; la nota a preserva la alternativa ''arca de papiro'' para no perder el eco con Noé.'
  - Se prefirió 'brea' para זָפֶת en lugar de 'alquitrán' por ser más estable como par con 'betún' en español bíblico.
  - '''A la orilla del Nilo'' mantiene la referencia concreta sin añadir glosa en el texto principal.'
