review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: petición de que Dios afirme el alma con εὐδοκία y ἱλαρότης, seguida de una cláusula temporal con ἐν τῷ + infinitivo y la idea de suficiencia de ἀρκέσει μοι respecto de τὸ δοθέν. Sin embargo, «establece» suena algo menos natural en español para una súplica dirigida al alma, y «lo que ha sido dado» es fiel pero algo pesado; puede mejorarse sin perder amplitud semántica.'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora de naturalidad y fluidez. «Afirma mi alma» comunica mejor στήρισον en registro devocional, y «lo dado» conserva la amplitud del participio sustantivado con una formulación más idiomática que «lo que ha sido dado». Las notas al pie están bien planteadas y deben conservarse con el ajuste correspondiente del texto base.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Alma» para ψυχήν, «favor» para εὐδοκία y «fortalezcas» para ἐνισχῦσαί son adecuados. La revisión propuesta mantiene la distinción entre στήρισον y ἐνισχῦσαί mediante «afirma» / «fortalezcas».
  issues:
  - severity: medium
    issue: «Establece mi alma» es comprensible, pero poco idiomático en español devocional.
    rationale: στήρισον pide hacer firme o afirmar. En español bíblico natural, «afirma mi alma» o «haz firme mi alma» suenan más fluidos que «establece mi alma», que puede sentirse calcado.
  - severity: low
    issue: «Lo que ha sido dado» resulta innecesariamente pesado.
    rationale: τὸ δοθέν es amplio, pero el español puede expresar esa amplitud con «lo dado» sin perder fidelidad y con mejor legibilidad.
  revised_spanish_text: Pero afirma mi alma con favor y alegría[a]; cuando fortalezcas mi alma, me bastará lo dado[b].
