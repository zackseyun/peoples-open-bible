    text: 'O: «No me he vuelto impura».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede evocar una camella joven moviéndose con pasos erráticos o retorcidos; el matiz exacto del participio es incierto.
    reason: lexical_alternative
  revision_rationale: Se corrigió «reconoce» a «sabe» para reflejar con menos interpretación el imperativo דְּעִי y alinearlo con el POB inglés «know». Se eliminó la nota [b] porque no preservaba una alternativa textual genuina. Se añadió «ágil» para representar explícitamente קַלָּה. Se rehízo la cláusula final como «torciendo sus sendas», que conserva la rareza e incertidumbre del hebreo, pero en español suena más natural y comunica mejor el movimiento errático del símil.
