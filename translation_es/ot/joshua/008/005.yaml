translation:
  language: es
  text: Y yo y todo el pueblo que están conmigo nos acercaremos a la ciudad[a]. Y cuando ellos salgan a encontrarnos, como antes[b], huiremos delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos acercaremos a la ciudad» también puede traducirse «nos aproximaremos a la ciudad» o «nos acercaremos a la ciudad».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como la primera vez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי וְכָל הָעָם אֲשֶׁר אִתִּי
  english_pob_choice: And I and all the people who are with me
  chosen_spanish: Y yo y todo el pueblo[a] que está conmigo
  alternatives_spanish:
  - Y yo y toda la gente que está conmigo
  - Y yo y todas las personas que están conmigo
  lexicon: HALOT
  rationale: Se conserva la coordinación inicial con ‘Y’, y הָעָם se vierte como ‘el pueblo’ por su valor colectivo en el contexto militar. La cláusula relativa ‘que está conmigo’ mantiene el sentido de compañía sin añadir énfasis interpretativo.
- source_word: נִקְרַב
  english_pob_choice: will approach
  chosen_spanish: nos acercaremos
  alternatives_spanish:
  - nos aproximaremos
  - nos pondremos cerca
  lexicon: HALOT
  rationale: El verbo de קרב expresa movimiento hacia la ciudad; ‘nos acercaremos’ es natural en español y conserva la idea de aproximación sin endurecerla con una lectura técnica.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: La referencia es directa a Hai/Ai en el relato; ‘la ciudad’ es la equivalencia más clara y sobria en español.
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: Se reproduce la función temporal narrativa con una construcción natural en español, sin perder la conexión secuencial del hebreo.
- source_word: יֵצְאוּ לִקְרָאתֵנוּ
  english_pob_choice: they come out to meet us
  chosen_spanish: ellos salgan a encontrarnos
  alternatives_spanish:
  - ellos salgan a nuestro encuentro
  - ellos vengan a encontrarnos
  lexicon: HALOT
  rationale: לִקְרָאתֵנוּ expresa encuentro dirigido hacia los hablantes; ‘a encontrarnos’ comunica bien el movimiento sin introducir la idea de hostilidad que a veces acompaña ‘contra nosotros’.
- source_word: כַּאֲשֶׁר בָּרִאשֹׁנָה
  english_pob_choice: as before
  chosen_spanish: como al principio[b]
  alternatives_spanish:
  - como antes
  - como la primera vez
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘como en lo primero/primer tiempo’. ‘Como al principio’ preserva el matiz temporal y el eco de la primera incursión; se marca la alternativa por su posible lectura idiomática como ‘antes’.
- source_word: וְנַסְנוּ
  english_pob_choice: we will flee
  chosen_spanish: huiremos
  alternatives_spanish:
  - huiremos de allí
  - nos retiraremos
  lexicon: HALOT
  rationale: נוס denota huida; ‘huiremos’ mantiene la fuerza del verbo mejor que ‘nos retiraremos’, que podría suavizar la retirada fingida.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: En español, ‘delante de ellos’ comunica de forma natural la imagen espacial de huir ‘ante/en presencia de’ ellos, sin perder el valor idiomático del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura y decisiones léxicas del POB en inglés, manteniendo la secuencia narrativa, el valor táctico del movimiento y las dos alternativas anotadas: el acercamiento a la ciudad y la expresión temporal ‘as before’. No se documentaron revisiones posteriores ni cambios de criterio en el pasaje.'
  spanish_consistency_notes:
  - Se usa ‘pueblo’ para הָעָם en sentido colectivo militar, coherente con el registro del pasaje.
  - Se mantiene ‘nos acercaremos’ para נִקְרַב y ‘huiremos’ para וְנַסְנוּ, preservando la fuerza dinámica de los verbos.
  - Se vierte לִקְרָאתֵנוּ como ‘a encontrarnos’ para respetar el movimiento de encuentro sin añadir hostilidad explícita.
  - ‘Como al principio’ conserva la ambigüedad útil de בָּרִאשֹׁנָה y deja visible la alternativa textual/idiomática en nota.
