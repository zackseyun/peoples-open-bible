  text: וַ/יְבָ֤רֶךְ דָּוִיד֙ אֶת יְהוָ֔ה לְ/עֵינֵ֖י כָּל הַ/קָּהָ֑ל וַ/יֹּ֣אמֶר דָּוִ֗יד בָּר֨וּךְ אַתָּ֤ה יְהוָה֙ אֱלֹהֵי֙ יִשְׂרָאֵ֣ל אָבִ֔י/נוּ מֵ/עוֹלָ֖ם וְ/עַד עוֹלָֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/010.yaml
  text: Then David blessed Yahweh in the sight of all the assembly[a], and David said, “Blessed are you, Yahweh, the God of Israel our father, from everlasting to everlasting.”
  footnotes:
