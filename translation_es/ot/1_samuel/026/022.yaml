translation:
  language: es
  text: 'David respondió y dijo: «Aquí está la lanza del rey. Que pase[a] uno de los jóvenes[b] y la tome».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cruce». El verbo hebreo significa literalmente «pasar/cruzar», aunque aquí también puede entenderse como «venir» hasta donde está David.
    reason: lexical_alternative
  - marker: b
    text: «Jóvenes» también puede traducirse «servidores» o «asistentes», ya que el término hebreo puede referirse tanto a la edad como a una condición subordinada, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה introduce una respuesta en discurso directo. En español, «respondió» conserva bien la función narrativa y suena natural; se mantiene además la secuencia con «y dijo» para reflejar ambos verbos del hebreo.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - dijo
  - y habló
  lexicon: HALOT
  rationale: El hebreo conserva dos verbos narrativos sucesivos. «Y dijo» preserva esa duplicación sin volver la frase pesada en español.
- source_word: הִנֵּה
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula es deíctica y llama la atención sobre la lanza presente. «Aquí está» comunica ese valor con naturalidad en español actual.
- source_word: הַחֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la lanza arrojadiza
  - la jabalina
  lexicon: HALOT
  rationale: חנית puede ser «lanza» o «jabalina». En este contexto narrativo, «lanza» es claro y suficientemente amplio para el arma de Saúl.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey Saúl
  - real
  lexicon: HALOT
  rationale: El hebreo expresa una relación posesiva. «Del rey» reproduce esa relación de forma natural; el contexto ya identifica a Saúl como el rey.
- source_word: וְיַעֲבֹר
  english_pob_choice: come over
  chosen_spanish: Que pase
  alternatives_spanish:
  - Que cruce
  - Que venga
  lexicon: HALOT
  rationale: עבר significa literalmente «pasar/cruzar». En este contexto, David invita a un hombre a moverse hasta donde él está para tomar la lanza; «Que pase» conserva el sentido y permite reflejar la alternativa de «cruzar» que destacó la POB inglesa.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - alguien
  - alguno
  lexicon: HALOT
  rationale: 'El numeral funciona sustantivado: «uno de los jóvenes». «Uno» es la forma más directa y fiel al hebreo.'
- source_word: מֵהַנְּעָרִים
  english_pob_choice: of the young men
  chosen_spanish: de los jóvenes
  alternatives_spanish:
  - de los servidores
  - de los criados
  - de los asistentes
  lexicon: HALOT
  rationale: נַעַר puede referirse a edad o a condición subordinada. En este pasaje, «jóvenes» preserva la amplitud semántica sin decidir demasiado pronto por «sirvientes» o «asistentes».
- source_word: וְיִקָּחֶהָ
  english_pob_choice: and take it
  chosen_spanish: y la tome
  alternatives_spanish:
  - y la lleve
  - y la reciba
  lexicon: HALOT
  rationale: לקח es el verbo común «tomar». El sufijo femenino retoma «la lanza»; «la tome» es natural en español y mantiene la referencia directa.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo masorético de 1 Samuel 26:22 y toma en cuenta la audit trail inglesa: mantiene la duplicación verbal narrativa, el valor deíctico de הִנֵּה, la posible alternativa literal de וְיַעֲבֹר como «pasar/cruzar», y la ambigüedad de נְעָרִים entre edad y subordinación. No se registran revisiones textuales en el paquete recibido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere una sintaxis española natural sin borrar rasgos hebreos relevantes, como la secuencia «respondió y dijo».
  - «Jóvenes» conserva la amplitud del hebreo נְעָרִים, evitando estrecharlo indebidamente a «siervos» o «sirvientes».
