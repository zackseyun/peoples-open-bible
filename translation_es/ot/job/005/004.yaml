translation:
  language: es
  text: Sus hijos están lejos de la seguridad[b], y son aplastados en la puerta[a], sin que haya quien los rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En la puerta» alude a la puerta de la ciudad, lugar acostumbrado de juicio legal y decisión pública.
    reason: cultural_note
  - marker: b
    text: También puede traducirse «de la liberación» o «de la salvación» para מִיֶּשַׁע.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְחֲקוּ
  english_pob_choice: are far
  chosen_spanish: están lejos
  alternatives_spanish:
  - están apartados
  - quedan lejos
  - se hallan lejos
  lexicon: HALOT
  rationale: רחק expresa distancia o estar lejos. En este contexto describe la condición de los hijos respecto de la seguridad o el rescate; «están lejos» conserva el valor estativo natural en español sin añadir matices que el hebreo no exige.
- source_word: בָנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  - sus hijos varones
  lexicon: HALOT
  rationale: בנים puede referirse de manera amplia a descendencia. «Sus hijos» mantiene la referencia filial de forma natural en español y no restringe innecesariamente a varones, como tampoco lo hace la lectura inglesa.
- source_word: מִיֶּשַׁע
  english_pob_choice: from safety
  chosen_spanish: de la seguridad
  alternatives_spanish:
  - de la salvación
  - de la liberación
  - del rescate
  lexicon: HALOT
  rationale: יֶשַׁע puede abarcar seguridad, liberación o salvación. Dado el paralelismo con el cierre del versículo y el contexto práctico-jurídico, «seguridad» refleja bien la idea inmediata sin borrar del todo la amplitud del término. La alternativa «salvación» se reserva para contextos más claramente teológicos.
- source_word: וְיִדַּכְּאוּ
  english_pob_choice: they are crushed
  chosen_spanish: son aplastados
  alternatives_spanish:
  - son quebrantados
  - son oprimidos
  - son triturados
  lexicon: HALOT
  rationale: דכא tiene la fuerza de ser aplastado, quebrado o abatido. «Son aplastados» reproduce ese golpe fuerte y el resultado pasivo del hebreo con una imagen clara en español.
- source_word: בַשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el portal
  - en la puerta de la ciudad
  lexicon: HALOT
  rationale: שַׁעַר es la puerta o entrada de la ciudad, lugar de juicio público. «En la puerta» es una traducción breve y fiel; la nota aclara el sentido cultural y jurídico sin cargar el texto principal.
- source_word: וְאֵין מַצִּיל
  english_pob_choice: with no one to rescue them
  chosen_spanish: sin que haya quien los rescate
  alternatives_spanish:
  - y no hay quien los rescate
  - sin nadie que los rescate
  - y no hay salvador
  lexicon: HALOT
  rationale: El participio מַצִּיל indica quien rescata o libra. «Sin que haya quien los rescate» preserva la negación existencial de אֵין y suena natural en español, manteniendo la conexión con la idea de rescate.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC de Job 5:4 y el auditable English POB, conservando la imagen judicial de la puerta y el campo semántico amplio de יֶשַׁע. No se introdujeron cambios textuales respecto del testimonio base; solo se ajustó la dicción para una publicación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se eligió «aplastados» para conservar la intensidad de דכא sin suavizarla a «oprimidos».
  - «Puerta» se dejó en forma breve en el cuerpo del texto y se explicó su sentido forense en nota, como hizo el audit trail en inglés con «gate».
