    rationale: 'El English POB conserva una nota explícita: el hebreo dice «before the LORD», una expresión cultual que significa en la presencia del SEÑOR. El borrador español solo conservó la nota sobre «entrada/puerta», perdiendo una decisión auditada significativa.'
