translation:
  language: es
  text: Y Oholibamá dio a luz a Jeús, a Jalam y a Kóraj. Estos son los hijos varones de Esaú, que le nacieron en la tierra de Canaán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Oholibama
  alternatives_spanish:
  - Aholibama
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma natural en español. Se mantiene la misma referencia personal del hebreo; "Aholibama" queda como variante posible, pero "Oholibama" conserva mejor la vocalización usual y la fluidez en español.
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En contexto genealógico, el hebreo expresa parto/maternidad; en español "dio a luz" comunica el hecho sin sonar mecánico. "Parió" sería más brusco y "engendró" desplaza el foco hacia el padre.
- source_word: יעיש
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeúsh
  lexicon: HALOT
  rationale: Se sigue la transliteración tradicional española del nombre, ajustada a la ortografía y acentuación del español. La forma con acento evita lectura incorrecta de la palabra.
- source_word: יַעְלָם
  english_pob_choice: Jalam
  chosen_spanish: Jalam
  alternatives_spanish:
  - Jaalam
  lexicon: HALOT
  rationale: Se mantiene la forma breve ya atestiguada en la tradición inglesa del POB. En español, "Jalam" es clara y evita una grafía menos natural como "Jaalam".
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional del nombre, bien conocida en Biblia en español. Aunque el hebreo permite transliteración más directa, "Coré" es la forma más inteligible y estable en español bíblico.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo concuerda con el sustantivo masculino plural implícito "hijos"; en español debe hacerse explícita la concordancia natural del resumen genealógico.
- source_word: בְּנֵי
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - descendientes
  - varones
  lexicon: HALOT
  rationale: Aunque el hebreo significa literalmente "hijos/varones", en español "hijos" conserva el registro genealógico y evita una rigidez innecesaria. "Descendientes" sería más amplio, pero aquí el contexto de nombres propios favorece "hijos".
- source_word: אֲשֶׁר יֻלְּדוּ לוֹ
  english_pob_choice: who were born to him
  chosen_spanish: que le nacieron
  alternatives_spanish:
  - que le fueron nacidos
  - que fueron nacidos para él
  - que le fueron dados
  lexicon: HALOT
  rationale: Se preserva la pasiva hebrea con un español idiomático. "Le nacieron" mantiene la relación de paternidad sin añadir un sujeto materno explícito que el hebreo de esta cláusula no expresa.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en el país de Canaán
  lexicon: HALOT
  rationale: Se conserva el sustantivo "tierra" porque el hebreo dice literalmente "en tierra de Canaán" y el registro genealógico lo sostiene. "Canaán" a secas perdería esa explicitud geográfica.
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes textuales; por eso la versión española sigue de cerca el mismo contenido sin expandir ni resolver tensiones inexistentes en este versículo.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico breve y coordinado del hebreo.
  - Se usa transliteración de nombres propios consistente con un español bíblico moderno y legible.
  - No se introducen notas al pie porque el contexto auditado no preserva variantes ni ambigüedades que requieran marcación adicional.
