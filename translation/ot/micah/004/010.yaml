id: MIC.4.10
reference: Micah 4:10
source:
  edition: WLC
  text: ח֧וּלִי וָ/גֹ֛חִי בַּת צִיּ֖וֹן כַּ/יּֽוֹלֵדָ֑ה כִּֽי עַתָּה֩ תֵצְאִ֨י מִ/קִּרְיָ֜ה וְ/שָׁכַ֣נְתְּ בַּ/שָּׂדֶ֗ה וּ/בָ֤את עַד בָּבֶל֙ שָׁ֣ם תִּנָּצֵ֔לִי שָׁ֚ם יִגְאָלֵ֣/ךְ יְהוָ֔ה מִ/כַּ֖ף אֹיְבָֽיִ/ךְ־־־׃
translation:
  text: Writhe and groan[a], daughter Zion, like a woman giving birth; for now you will go out from the city and dwell in the field, and you will go as far as Babylon. There you will be rescued[b]; there Yahweh will redeem you from the hand of your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry out' for 'groan.' The Hebrew verb can denote a cry of pain, fitting the childbirth image.
    reason: lexical_alternative
  - marker: b
    text: Or 'There you will be delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ח֧וּלִי
  chosen: Writhe
  alternatives:
  - Labor
  - Tremble
  lexicon: HALOT
  rationale: Imperative feminine singular from חול in a childbirth context; 'writhe' captures physical convulsion and anguish without over-specifying emotion.
- source_word: וָ/גֹ֛חִי
  chosen: and groan
  alternatives:
  - and cry out
  - and gasp
  lexicon: HALOT
  rationale: Imperative coordinated with the previous verb; the root conveys crying out/groaning in pain. 'Groan' fits the labor imagery and pairs naturally with 'writhe'.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - daughter of Zion
  lexicon: HALOT
  rationale: A personified designation for Zion/Jerusalem. 'daughter Zion' preserves the compact prophetic idiom better than the more interpretive 'daughter of Zion.' Lowercase 'daughter' treats it as an appellative, not a formal title.
- source_word: כַּ/יּֽוֹלֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - as one giving birth
  lexicon: HALOT
  rationale: The comparison is explicitly to a birthing woman. 'Like a woman giving birth' is idiomatic modern English and keeps the childbirth metaphor clear.
- source_word: מִ/קִּרְיָה
  chosen: from the city
  alternatives:
  - from the town
  lexicon: HALOT
  rationale: Qiryah commonly means city/town; here 'the city' most naturally refers to Jerusalem/Zion in context.
- source_word: וְ/שָׁכַ֣נְתְּ בַּ/שָּׂדֶ֗ה
  chosen: and dwell in the open field
  alternatives:
  - and camp in the field
  - and live in the countryside
  lexicon: HALOT
  rationale: The verb means dwell/stay, and 'field' here suggests exposure outside urban protection. 'Open field' makes that sense explicit without paraphrasing too far.
- source_word: וּ/בָ֤את עַד בָּבֶל֙
  chosen: and you will go as far as Babylon
  alternatives:
  - and you will come to Babylon
  - and you will go to Babylon
  lexicon: HALOT
  rationale: The construction with עַד emphasizes extent or destination reached. 'Go as far as Babylon' preserves the movement and the force of עַד.
- source_word: שָׁ֣ם תִּנָּצֵ֔לִי
  chosen: There you will be rescued
  alternatives:
  - There you will be delivered
  - There you will escape
  lexicon: HALOT
  rationale: Niphal of נצל here is passive/reflexive deliverance from danger. 'Rescued' is clear modern English and avoids overly churchy diction while preserving the saving sense.
- source_word: יִגְאָלֵ֣ךְ
  chosen: will redeem you
  alternatives:
  - will ransom you
  - will reclaim you
  lexicon: HALOT
  rationale: גאל is a key covenantal redemption term. 'Redeem' preserves its theological and relational weight better than flatter alternatives.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִ/כַּ֖ף אֹיְבָֽיִ/ךְ
  chosen: from the hand of your enemies
  alternatives:
  - from the grasp of your enemies
  - from the power of your enemies
  lexicon: HALOT
  rationale: '''Hand'' is a standard Hebrew idiom for power/control. Retaining ''hand'' preserves the metaphor and remains natural in English.'
