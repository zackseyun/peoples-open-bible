translation:
  language: es
  text: Entonces David se levantó y llegó al lugar donde Saúl había acampado, y David vio el lugar donde Saúl yacía, y a Abner, hijo de Ner, comandante de su ejército. Saúl estaba acostado dentro del círculo del campamento[a], y la gente estaba acampada alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en el círculo''; probablemente se refiere al anillo interior o al área central del campamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de קום marca la siguiente acción narrativa. En español, 'se levantó' comunica con naturalidad el inicio de la acción sin perder el tono formal del relato.
- source_word: וַיָּבֹא אֶל־הַמָּקוֹם
  english_pob_choice: came to the place
  chosen_spanish: llegó al lugar
  alternatives_spanish:
  - vino al lugar
  - fue al lugar
  lexicon: HALOT
  rationale: בוא con אֶל indica movimiento hacia un lugar. 'Llegó al lugar' es idiomático en español y mantiene la proximidad al hebreo narrativo.
- source_word: חָנָה
  english_pob_choice: had camped
  chosen_spanish: había acampado
  alternatives_spanish:
  - había estado acampado
  - había estado de campamento
  lexicon: HALOT
  rationale: El qatal en la relativa describe una situación previa. El pluscuamperfecto español conserva ese valor anterior y mantiene el sentido militar de acampar.
- source_word: וַיַּרְא ... אֶת־הַמָּקוֹם
  english_pob_choice: saw the place
  chosen_spanish: vio el lugar
  alternatives_spanish:
  - observó el lugar
  - miró el lugar
  lexicon: HALOT
  rationale: ראה aquí introduce la inspección visual de David. 'Vio el lugar' es la correspondencia más directa y no añade matices interpretativos.
- source_word: שָׁכַב ... שֹׁכֵב
  english_pob_choice: lay ... was lying
  chosen_spanish: yacía ... estaba acostado
  alternatives_spanish:
  - estaba tendido ... estaba tendido
  - dormía ... estaba durmiendo
  lexicon: HALOT
  rationale: El hebreo usa un perfecto y luego un participio de שכב. 'Yacía' y 'estaba acostado' preservan la diferencia entre la localización del lugar y la postura presente. Se evita 'dormía' porque el hebreo no lo dice explícitamente.
- source_word: וְאַבְנֵר בֶּן־נֵר שַׂר צְבָאוֹ
  english_pob_choice: and Abner son of Ner, the commander of his army
  chosen_spanish: y a Abner, hijo de Ner, comandante de su ejército
  alternatives_spanish:
  - y a Abner hijo de Ner, jefe de su ejército
  - y a Abner, hijo de Ner, capitán de su ejército
  lexicon: HALOT
  rationale: El hebreo coordina a Abner como otro objeto de la visión de David. En español, la preposición 'a' ayuda a marcar ese objeto directo. 'Comandante de su ejército' refleja שַׂר צְבָאוֹ en un registro claro y contemporáneo.
- source_word: בַּמַּעְגָּל
  english_pob_choice: within the encampment
  chosen_spanish: dentro del círculo del campamento
  alternatives_spanish:
  - dentro del campamento
  - en el círculo
  lexicon: HALOT
  rationale: מַעְגָּל alude literalmente a una forma circular y probablemente al anillo interno o área central del campamento. 'Dentro del círculo del campamento' conserva la imagen sin perder inteligibilidad en español.
- source_word: חֹנִים סְבִיבֹתָיו
  english_pob_choice: were camped around him
  chosen_spanish: acampaba alrededor de él
  alternatives_spanish:
  - estaban acampados alrededor de él
  - acamparon alrededor de él
  lexicon: HALOT
  rationale: El participio plural describe a la gente situada alrededor de Saúl. Se eligió una forma progresiva para mantener el cuadro descriptivo. Aunque el sujeto es plural, en español puede entenderse colectivamente como 'la gente'.
theological_decisions:
- issue: Representación del nombre divino
  english_pob_reading: No aparece el Tetragrámaton en este versículo; el texto menciona a Saúl, David y Abner.
  chosen_spanish_reading: No se introduce ningún término divino; se mantiene el contenido narrativo estrictamente humano.
  alternative_spanish_readings:
  - usar fórmulas reverenciales no aplicables
  - recontextualizar el pasaje con lenguaje devocional
  rationale: No hay base textual para añadir o ajustar terminología teológica en este versículo. La traducción debe limitarse a la escena militar descrita por el hebreo.
  doctrine_reference: Principio de fidelidad textual y no expansión interpretativa
- issue: Sentido de בַּמַּעְגָּל
  english_pob_reading: '''within the encampment'' with a note that Hebrew more literally means ''in the circle,'' likely the inner ring or central area.'
  chosen_spanish_reading: '''dentro del círculo del campamento'' conserva la metáfora espacial sin convertirla en explicación excesiva.'
  alternative_spanish_readings:
  - '''dentro del campamento'''
  - '''en el círculo'''
  rationale: El hebreo tiene una tensión entre literalidad ('círculo') y referencia funcional ('zona interior del campamento'). La traducción española debe conservar ambas posibilidades de lectura, sin borrar la imagen circular ni ocultar la ubicación central.
  doctrine_reference: Principio de preservación de la imagen original y de la ambigüedad léxica legítima
translation_notes:
  revision_awareness: El inglés POB fue revisado para agregar 'and' antes de 'Abner son of Ner' y así reflejar mejor la coordinación hebrea. En español se siguió esa coordinación explícita con 'y a Abner, hijo de Ner'. También se respetó la nota sobre בַּמַּעְגָּל mediante una nota al pie que conserva la alternativa literal 'círculo' frente a la lectura funcional del campamento.
  spanish_consistency_notes:
  - Se mantuvo 'Saúl' y 'David' como nombres propios sin transliteración adicional.
  - Se tradujo שַׂר צְבָאוֹ como 'comandante de su ejército' para coherencia con el registro narrativo y militar.
  - '''La gente'' traduce הָעָם como colectivo singular en español, aunque el hebreo usa un plural participial; la concordancia es idiomática y no altera el sentido.'
  - Se evitó 'SEÑOR' o cualquier fórmula reverencial porque no aparece el Tetragrámaton en el versículo.
