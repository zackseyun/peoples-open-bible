translation:
  language: es
  text: Mi corazón tuvo miedo[a]; mis huesos fueron sacudidos como lino[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi corazón temió».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis huesos fueron turbados/agitados».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como flax». El griego dice con más literalidad «como lino»; la imagen es difícil, pero se conserva la comparación material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβήθη
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - fue afligido de temor
  - se atemorizó
  lexicon: BDAG
  rationale: La forma expresa el surgimiento de temor. «Tuvo miedo» es natural en español y conserva el sentido sin volverlo más interpretativo de lo que permite el griego.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - ser interior
  lexicon: BDAG
  rationale: «Corazón» mantiene la imagen antropológica concreta del original y es la equivalencia más transparente en español.
- source_word: ἐταράχθη
  english_pob_choice: were shaken
  chosen_spanish: fueron sacudidos
  alternatives_spanish:
  - fueron turbados
  - fueron agitados
  lexicon: BDAG
  rationale: El contexto de huesos y la comparación material favorecen una imagen física. «Fueron sacudidos» refleja mejor la agitación corporal que «turbados».
- source_word: ὀστᾶ
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - osamenta
  - huesos del cuerpo
  lexicon: BDAG
  rationale: El sustantivo es literal y concreto; «huesos» preserva la fuerza corporal de la lamentación.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  lexicon: BDAG
  rationale: Introduce comparación de manera directa y natural en español.
- source_word: λίνον
  english_pob_choice: flax
  chosen_spanish: lino
  alternatives_spanish:
  - lino de fibra
  - lino/flax
  lexicon: LSJ
  rationale: Aunque el inglés POB optó por «flax» para mantener la materia prima, en español «lino» comunica la misma imagen con mejor naturalidad. Dado que el término puede abarcar la planta/fibra y también el material textil, «lino» conserva la tensión del original sin explicitar más de lo debido.
theological_decisions:
- issue: Imagen corporal de temor y conmoción interior
  english_pob_reading: My heart was afraid; my bones were shaken like flax.
  chosen_spanish_reading: Mi corazón tuvo miedo; mis huesos fueron sacudidos como lino.
  alternative_spanish_readings:
  - Mi corazón temió; mis huesos fueron turbados como lino.
  - Mi corazón se atemorizó; mis huesos fueron agitados como lino.
  rationale: No se suaviza la imagen corporal ni se espiritualiza. La frase mantiene la simultaneidad de emoción interior y reacción física marcada en el texto griego.
  doctrine_reference: Anthropological imagery in lament poetry; no doctrinal assertion beyond the text.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «were troubled» a «were shaken» por la adecuación del verbo a un sujeto corporal («bones») y al paralelo material con «flax/linen». La traducción española sigue esa revisión con un verbo físico («fueron sacudidos») y evita una lectura meramente psicológica. También se ajusta el término final a «lino» para naturalidad del español, manteniendo la referencia material del griego.
  spanish_consistency_notes:
  - Se mantiene el paralelismo breve del verso con dos miembros coordinados por punto y coma.
  - «Corazón» y «huesos» conservan la imaginería corporal concreta del texto.
  - No se introduce mayúscula en «corazón» ni en «huesos» por tratarse de sustantivos comunes en el verso.
  - La comparación final usa «como» para una equivalencia directa y sobria.
