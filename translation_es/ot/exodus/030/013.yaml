translation:
  language: es
  text: 'Esto es lo que dará todo el que pase entre los registrados[a]: medio siclo según el siclo del santuario (el siclo equivale a veinte geras), medio siclo como ofrenda a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «todo el que pase a los contados»; el hebreo usa una expresión idiomática de censo para quienes entran en el conteo oficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is what
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Esto
  - Esto será
  lexicon: HALOT
  rationale: La fórmula deíctica introductoria se conserva con naturalidad en español y mantiene el valor de presentación normativa del texto.
- source_word: יִתְּנוּ
  english_pob_choice: shall give
  chosen_spanish: dará
  alternatives_spanish:
  - deberá dar
  - ha de dar
  lexicon: HALOT
  rationale: El imperfecto hebreo en contexto legal expresa obligación/provisión futura. En español, 'dará' mantiene la fuerza prescriptiva de manera sobria y directa.
- source_word: כָּל הָעֹבֵר עַל הַפְּקֻדִים
  english_pob_choice: everyone who passes over to those who are numbered
  chosen_spanish: todo el que pase entre los registrados
  alternatives_spanish:
  - todo el que pase entre los contados
  - todo el que sea contado entre los registrados
  - todo el que pase a los registrados
  lexicon: HALOT
  rationale: Se preserva el idiomatismo censal con una expresión española natural. 'Entre los registrados' refleja el conjunto oficialmente inscrito sin borrar la imagen de 'pasar' asociada al conteo.
- source_word: מַחֲצִית הַשֶּׁקֶל
  english_pob_choice: half a shekel
  chosen_spanish: medio siclo
  alternatives_spanish:
  - la mitad de un siclo
  - medio shéquel
  lexicon: HALOT
  rationale: '''Siclo'' es el equivalente español asentado para la unidad monetaria bíblica; ''medio'' reproduce con claridad la cantidad exacta.'
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo sagrado
  - conforme al siclo santo
  lexicon: HALOT
  rationale: '''Según'' comunica correctamente la norma o medida. ''Del santuario'' conserva el valor técnico de medida estándar asociada al culto, evitando una paráfrasis más libre.'
- source_word: עֶשְׂרִים גֵּרָה הַשֶּׁקֶל
  english_pob_choice: the shekel is twenty gerahs
  chosen_spanish: el siclo equivale a veinte geras
  alternatives_spanish:
  - el siclo es de veinte geras
  - veinte geras hacen un siclo
  lexicon: HALOT
  rationale: La cláusula explica el valor del siclo como equivalencia. 'Equivale a' es idiomático en español y conserva el carácter definitorio del hebreo.
- source_word: תְּרוּמָה לַיהוָה
  english_pob_choice: as an offering to Yahweh
  chosen_spanish: como ofrenda a Yahvé
  alternatives_spanish:
  - como contribución a Yahvé
  - como tributo a Yahvé
  - como ofrenda para Yahvé
  lexicon: HALOT
  rationale: '''Ofrenda'' expresa bien תְּרוּמָה en contexto cultual sin introducir un tecnicismo innecesario. Se mantiene ''Yahvé'' conforme al criterio del proyecto para el Tetragrámaton.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se adopta la forma española establecida por el proyecto para el nombre divino, preservando el carácter propio del Tetragrámaton sin sustituirlo por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La forma 'Yahvé' respeta la política del proyecto y comunica que no se trata de un simple título, sino del nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor censal de עֹבֵר עַל הַפְּקֻדִים
  english_pob_reading: passes over to those who are numbered
  chosen_spanish_reading: pase entre los registrados
  alternative_spanish_readings:
  - pase entre los contados
  - sea contado entre los registrados
  - pase a los registrados
  rationale: Se conserva la imagen hebrea de tránsito vinculada al registro censal, pero en una forma española fluida que no oculta el sentido técnico del pasaje.
  doctrine_reference: Lexical / discourse decision; no doctrinal change
- issue: Naturaleza de la ofrenda
  english_pob_reading: offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - contribución
  - oblación
  - ofrecimiento
  rationale: En este contexto, 'ofrenda' comunica adecuadamente la porción apartada para Yahvé y evita oscurecer el carácter cultual del término.
  doctrine_reference: Lexical / cultic terminology
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail inglés, que privilegia la imagen hebrea 'passes over to those who are numbered' frente a una paráfrasis más interpretativa. Por eso el español mantiene la idea de pasar 'entre los registrados' en vez de suavizarla a una simple forma pasiva de contar.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה.
  - '''Siclo'' se empleó como unidad monetaria estable y ''gera'' se adaptó al plural español ''geras''.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino, conforme a la política del proyecto.
  - La frase censal se mantuvo con valor idiomático y no se reemplazó por una simplificación interpretativa.
