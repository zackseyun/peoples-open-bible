translation:
  language: es
  text: Y ahora escúchame, y hablaré con su padre; y cuando volvamos de Ragues, arreglaremos el matrimonio. Porque sé que Ragüel ciertamente no se la dará a otro hombre en contra de la ley de Moisés[a], o quedará sujeto a muerte, porque a ti te corresponde recibir la herencia antes que cualquier otro hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego más literalmente: «según la ley de Moisés»; aquí el sentido es que darla a otro hombre violaría esa ley y haría a Ragüel sujeto a muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄκουσόν
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - óyeme
  - escúchame atentamente
  lexicon: BDAG
  rationale: El imperativo pide atención activa, no mera percepción auditiva. «Escúchame» es natural en español y conserva el tono directo de la súplica.
- source_word: λαλήσω
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - le hablaré
  lexicon: BDAG
  rationale: El futuro de λαλέω se expresa bien con «hablaré». Mantiene la sencillez del griego sin añadir matices de contenido que «diré» podría imponer.
- source_word: ὑποστρέψωμεν
  english_pob_choice: we return
  chosen_spanish: volvamos
  alternatives_spanish:
  - regresemos
  - retornemos
  lexicon: BDAG
  rationale: 'El subjuntivo con ὅταν indica un futuro condicionado: «cuando volvamos». «Volvamos» es fluido y exacto en español.'
- source_word: ποιήσωμεν τὸν γάμον
  english_pob_choice: we will arrange the marriage
  chosen_spanish: hagamos la boda
  alternatives_spanish:
  - celebremos la boda
  - concertemos el matrimonio
  - arreglemos la boda
  lexicon: BDAG
  rationale: La expresión griega es idiomática y alude a llevar a cabo el matrimonio. «Hagamos la boda» conserva la literalidad idiomática del verbo «hacer» y el sentido matrimonial del contexto; «concertemos el matrimonio» explicita más, pero se aparta un poco del giro del griego.
- source_word: οὐ μὴ δῷ
  english_pob_choice: will certainly not give
  chosen_spanish: no le dará en absoluto
  alternatives_spanish:
  - de ninguna manera le dará
  - ciertamente no le dará
  - no se la dará en absoluto
  lexicon: BDAG
  rationale: Οὐ μή con subjuntivo expresa negación enfática. «No le dará en absoluto» transmite bien la certeza de la negativa sin sonar excesivamente técnica.
- source_word: ἀνδρὶ ἑτέρῳ
  english_pob_choice: to another man
  chosen_spanish: a otro hombre
  alternatives_spanish:
  - a otro varón
  - a otro marido
  - a otro hombre distinto
  lexicon: BDAG
  rationale: «Ἀνήρ» puede ser «hombre» o «marido»; aquí, dado que se trata del otorgamiento en matrimonio, «otro hombre» mantiene la literalidad y deja que el contexto matrimonial haga el resto.
- source_word: κατὰ τὸν νόμον Μωυσῆ
  english_pob_choice: contrary to the law of Moses
  chosen_spanish: en contra de la ley de Moisés
  alternatives_spanish:
  - contrario a la ley de Moisés
  - según la ley de Moisés
  lexicon: BDAG
  rationale: La negación previa hace que la frase signifique una acción prohibida por la ley. En español, «en contra de la ley de Moisés» comunica con claridad esa fuerza sin perder el vínculo explícito con Moisés.
- source_word: ὀφειλέσει θάνατον
  english_pob_choice: he will incur death
  chosen_spanish: incurrirá en muerte
  alternatives_spanish:
  - será culpable de muerte
  - quedará sujeto a muerte
  - merecerá la muerte
  lexicon: BDAG
  rationale: El griego expresa responsabilidad o pena de muerte. «Incurrirá en muerte» conserva la fórmula legal y la gravedad del resultado, aunque suene algo arcaizante; se mantiene por su cercanía semántica.
- source_word: τὴν κληρονομίαν
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la posesión heredada
  - el patrimonio
  lexicon: BDAG
  rationale: En este contexto, κληρονομία se refiere a los derechos patrimoniales/hereditarios. «La herencia» es la opción más natural y fiel en español.
- source_word: σοὶ καθήκει λαβεῖν
  english_pob_choice: it is fitting for you to receive
  chosen_spanish: a ti te corresponde recibir
  alternatives_spanish:
  - te toca recibir
  - es debido que recibas
  - es tu derecho recibir
  lexicon: BDAG
  rationale: Καθήκει comunica lo que corresponde o pertenece por derecho/convención. «Te corresponde» preserva esa mezcla de adecuación y reclamo legítimo mejor que una formulación puramente moral.
- source_word: ἢ πάντα ἄνθρωπον
  english_pob_choice: rather than any other man
  chosen_spanish: más que a cualquier otro hombre
  alternatives_spanish:
  - antes que a cualquier otro hombre
  - en lugar de cualquier otro hombre
  - más que a todo hombre
  lexicon: BDAG
  rationale: La comparación griega es idiomática y literalmente irregular. «Más que a cualquier otro hombre» reproduce con naturalidad la prioridad de derecho que el contexto requiere.
theological_decisions:
- issue: Sentido legal de la prohibición bajo la ley de Moisés
  english_pob_reading: Raguel cannot give Sarah to another man without violating the law and becoming liable to death.
  chosen_spanish_reading: Ragüel no puede darle a ella a otro hombre sin quedar en contra de la ley de Moisés y sujeto a muerte.
  alternative_spanish_readings:
  - Ragüel no se la dará a otro hombre conforme a la ley de Moisés
  - Ragüel no le dará a otro hombre, porque violaría la ley de Moisés y moriría
  rationale: La secuencia «no… en contra de la ley… o incurrirá en muerte» muestra que la frase no es una aprobación de la acción, sino su prohibición con pena. La traducción española conserva esa tensión legal sin suavizarla.
  doctrine_reference: Principio de primacía del texto original; mantener la fuerza jurídica del pasaje.
translation_notes:
  revision_awareness: 'Se revisó el orden y la fuerza de las cláusulas para reflejar el griego: imperativo de atención, futuro de acción planeada, negación enfática y comparación idiomática de prioridad hereditaria. No se observaron revisiones previas aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo el texto no contiene el tetragrámaton.
  - Se usa «ley de Moisés» de manera explícita porque el griego nombra a Moisés y el contexto legal depende de esa referencia.
  - Se conserva «herencia» para κληρονομία y «hombre» para ἀνήρ, dejando que el contexto matrimonial aporte la relación de matrimonio sin sobretraducir.
