  lexicon: BDAG
  rationale: ἀνεκλάλητος는 신약 단 한 번 쓰인 강한 표현이며, 한국어 「말로 다 할 수 없는」이 가장 자연스럽게 그 강도를 살린다.
- source_word: δεδοξασμένῃ
