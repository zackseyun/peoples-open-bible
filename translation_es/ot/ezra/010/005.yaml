translation:
  language: es
  text: Entonces Esdras se levantó e hizo jurar a los principales sacerdotes, a los levitas y a todo Israel, que harían conforme a esta palabra[a]; y juraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a este asunto» o «conforme a esta propuesta». El hebreo דָּבָר puede referirse tanto a una palabra hablada como al asunto tratado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: קום en wayyiqtol expresa una acción narrativa decisiva. En español, “se levantó” comunica ese paso a la acción de forma natural y digna, sin perder el movimiento explícito del hebreo.
- source_word: וַיַּשְׁבַּע
  english_pob_choice: made ... swear
  chosen_spanish: hizo jurar
  alternatives_spanish:
  - los puso bajo juramento
  - les hizo prestar juramento
  lexicon: HALOT
  rationale: El causativo de שׁבע indica que Esdras llevó a otros a jurar. “Hizo jurar” conserva bien esa fuerza causativa y suena natural en español bíblico actual.
- source_word: שָׂרֵי הַכֹּהֲנִים
  english_pob_choice: the chief priests
  chosen_spanish: los jefes de los sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los jefes sacerdotales
  lexicon: HALOT
  rationale: שָׂרִים son jefes o oficiales. Dado que el propio hebreo habla de “los sacerdotes” y no necesariamente de una expresión técnica posterior, “jefes de los sacerdotes” conserva la relación genitiva y evita importar una formulación eclesiástica más fija de la que el contexto inmediato exige.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: Es el término estándar para el grupo tribal/cultual לְוִיִּם. “Los levitas” es la equivalencia directa y clara.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - y a todo Israel
  - y a todos los israelitas
  lexicon: HALOT
  rationale: La fórmula colectiva se mantiene sin explicitar de más. La preposición “a” está exigida por el verbo de causación/juramento en español.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: que harían
  alternatives_spanish:
  - para hacer
  - a actuar
  lexicon: HALOT
  rationale: En este contexto, el infinitivo de finalidad expresa el contenido del juramento. “Que harían” hace explícita la promesa jurada en español natural, sin añadir contenido ajeno.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: according to this word
  chosen_spanish: conforme a esta palabra
  alternatives_spanish:
  - según esta palabra
  - de acuerdo con este asunto
  - conforme a este asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar “palabra”, “asunto” o “cosa”. Aquí la referencia inmediata es a la propuesta/juramento formulado, y “palabra” mantiene la cercanía verbal del hebreo, mientras que la nota preserva la alternativa semántica.
- source_word: וַיִּשָּׁבֵעוּ
  english_pob_choice: and they swore
  chosen_spanish: y juraron
  alternatives_spanish:
  - y prestaron juramento
  lexicon: HALOT
  rationale: 'El nifal presenta el resultado: respondieron bajo juramento. “Juraron” es breve, solemne y transparente en español.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta el audit trail inglés. Se adoptó una solución española natural para el causativo de שׁבע (“hizo jurar”) y una opción reverente pero transparente para שָׂרֵי הַכֹּהֲנִים (“jefes de los sacerdotes”), conservando la ambigüedad de דָּבָר en la nota.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el nombre divino cuando aparezca en contextos relacionados, aunque este versículo no lo contiene.
  - “Levitas” se usa como término técnico estable, sin adaptar a una forma más explicativa.
  - Se conserva la estructura narrativa breve del hebreo, con una coordinación final en perfecto simple (“y juraron”).
