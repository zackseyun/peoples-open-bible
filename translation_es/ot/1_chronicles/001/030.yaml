    rationale: Aunque es nombre propio y admite adaptación, «Misma» elimina la secuencia sh ya establecida por el POB y crea ambigüedad con la palabra común española «misma». «Mishma» conserva mejor la identidad del nombre y sigue siendo legible en español eclesial.
  - severity: low
