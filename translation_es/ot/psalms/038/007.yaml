translation:
  language: es
  text: Estoy encorvado y muy abatido; todo el día ando en duelo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sombrío» o «en tinieblas»; el participio hebreo también puede sugerir oscuridad además de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲוֵיתִי
  english_pob_choice: I am bent
  chosen_spanish: Estoy encorvado
  alternatives_spanish:
  - Estoy torcido
  - Estoy doblado
  - Estoy inclinado
  lexicon: HALOT
  rationale: El verbo expresa estar torcido, doblado o deformado. «Encorvado» comunica en español la imagen corporal de abatimiento y mantiene un tono natural y digno, sin volverlo excesivamente literal o mecánico.
- source_word: שַׁחֹתִי
  english_pob_choice: bowed down
  chosen_spanish: agobiado
  alternatives_spanish:
  - humillado
  - inclinado
  - postrado
  lexicon: HALOT
  rationale: Este verbo añade la idea de estar echado abajo o rebajado. «Agobiado» conserva el peso de la imagen y la intensidad del paralelismo, a la vez que funciona bien en español moderno junto con «encorvado».
- source_word: עַד מְאֹד
  english_pob_choice: very low
  chosen_spanish: en gran manera
  alternatives_spanish:
  - muchísimo
  - en extremo
  - sumamente
  lexicon: HALOT
  rationale: La construcción hebrea intensifica lo anterior. En español, «en gran manera» reproduce bien la fuerza adverbial sin imponer una imagen distinta que sustituya la del doble encorvamiento.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - a lo largo del día
  lexicon: HALOT
  rationale: Es la forma idiomática natural en español para una duración continua.
- source_word: קֹדֵר
  english_pob_choice: mourning
  chosen_spanish: en duelo
  alternatives_spanish:
  - en luto
  - en tristeza
  - sombrío
  lexicon: HALOT
  rationale: El participio puede expresar oscuridad, abatimiento o duelo. «En duelo» preserva la lectura de lamento y tristeza personal que la versión inglesa decidió con «mourning», sin perder la posible resonancia de oscuridad.
- source_word: הִלָּכְתִּי
  english_pob_choice: I go about
  chosen_spanish: ando
  alternatives_spanish:
  - voy
  - camino
  - me desplazo
  lexicon: HALOT
  rationale: El verbo describe el modo de andar o conducirse durante el día. «Ando» es breve, natural y adecuado para la escena continua del lamento.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide sustancialmente con la solución inglesa: dos verbos de abatimiento corporal, una intensificación adverbial, duración continua y un participio con posible doble campo semántico (duelo/oscuridad). No se introdujeron cambios doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, sin recurrir a fórmulas arcaizantes.
  - «En duelo» conserva mejor que «de luto» la posibilidad de un estado vivido y continuo, acorde con el paralelismo del verso.
  - La nota al pie marca la ambigüedad semántica del participio hebreo, como en el aparato inglés, sin eliminar la lectura principal.
