translation:
  language: es
  text: Recuérdame; entremos en juicio juntos[a]. Expón tu causa, para que se demuestre que tienes razón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arguyamos la causa juntos» o «entremos juntos en juicio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «seas justificado» o «quedes vindicado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְכִּירֵנִי
  english_pob_choice: Remind me
  chosen_spanish: Hazme recordar
  alternatives_spanish:
  - Recuérdame
  - Hazme memoria
  lexicon: HALOT
  rationale: 'El hifil con sufijo de 1cs expresa causación: “hacer recordar / recordar a alguien”. En español, “Hazme recordar” conserva la fuerza imperativa y la confrontación judicial sin sonar arcaico.'
- source_word: נִשָּׁפְטָה
  english_pob_choice: let us argue the case
  chosen_spanish: entremos en juicio juntos
  alternatives_spanish:
  - arguyamos la causa juntos
  - entremos juntos en juicio
  - discutamos el caso juntos
  lexicon: HALOT
  rationale: La forma niphal de שפט en este contexto es forense y recíproca. “Entrar en juicio” comunica mejor el escenario judicial que un simple “discutir”, y “juntos” preserva la participación mutua señalada por יָחַד.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - mutuamente
  lexicon: HALOT
  rationale: Adverbio de participación compartida; “juntos” es natural en español y mantiene la idea de comparecer en el mismo proceso.
- source_word: סַפֵּר
  english_pob_choice: State your case
  chosen_spanish: Expón tu causa
  alternatives_spanish:
  - Declara tu causa
  - Presenta tu caso
  - Relata tu versión
  lexicon: HALOT
  rationale: El piel de ספר puede significar declarar o relatar. En un marco judicial, “Expón tu causa” transmite de manera clara la idea de presentar el argumento o la pretensión propia sin añadir contenido ajeno al hebreo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Conjunción final estándar en español para introducir propósito o resultado buscado.
- source_word: תִּצְדָּק
  english_pob_choice: you may be proved right
  chosen_spanish: seas declarado justo
  alternatives_spanish:
  - seas justificado
  - quedes vindicado
  - se vea que tienes la razón
  lexicon: HALOT
  rationale: En este contexto forense, צדק expresa ser hallado en lo correcto o justo. “Seas declarado justo” preserva la dimensión jurídica sin forzar una lectura doctrinal posterior; “justificado” queda como alternativa posible, pero puede sonar más técnica y teológicamente cargada en español.
theological_decisions:
- issue: Forensic vindication of צדק
  english_pob_reading: Rendered in legal-vindication terms ('be proved right') rather than overtly doctrinal 'be justified.'
  chosen_spanish_reading: seas declarado justo
  alternative_spanish_readings:
  - seas justificado
  - seas vindicado
  - se vea que tienes la razón
  rationale: La escena es una disputa de tribunal divino. “Declarado justo” conserva el veredicto legal y evita importar categorías paulinas ajenas al énfasis inmediato del pasaje; al mismo tiempo, mantiene la tensión entre justicia, rectitud y vindicación.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión menor que eliminó el pronombre redundante 'you' tras 'State your case' para mayor naturalidad. En español se evitó igualmente cualquier pronombre innecesario después del imperativo, manteniendo la concisión del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'justo' / 'justificado' en el campo forense para no diluir la fuerza de צדק.
  - '''Hazme recordar'' refleja la causación del hifil y evita un simple ''recuérdame'' si se quisiera destacar el acto de poner a prueba a Dios.'
  - '''Expón tu causa'' conserva el registro judicial y es más natural que una transliteración del inglés ''state your case''.'
