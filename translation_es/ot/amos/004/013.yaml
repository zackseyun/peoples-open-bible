base_translation:
  language: en
  yaml_path: translation/ot/amos/004/013.yaml
  text: For behold[a], the one who forms the mountains and creates the wind, and declares to man what his thought is, who makes the dawn darkness and treads on the heights of the earth—Yahweh, the God of hosts[c][b], is his name.
  footnotes:
  - marker: a
    text: Or 'creates the spirit'; Hebrew רוּחַ can mean 'wind,' 'breath,' or 'spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'declares to humankind'; Hebrew 'to man' uses the representative singular אָדָם.
    reason: lexical_alternative
  - marker: c
    text: Or 'what he is thinking' / 'what his meditation is'; the Hebrew term can refer to inward musing or thought.
    reason: lexical_alternative
