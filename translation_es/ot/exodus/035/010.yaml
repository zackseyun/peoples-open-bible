review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: conjunción inicial, sujeto distributivo, ubicación «entre ustedes», mandato de venir y hacer, y el nombre divino «Yahvé». Sin embargo, «todo sabio de corazón» en español suena poco natural y puede leerse como mera sabiduría interior más que destreza artesanal; además, el inglés auditado preservó una nota de alternativa distributiva inclusiva que aquí falta. El singular «vendrá… hará» es defendible por el distributivo, pero en combinación con «todo sabio» resulta algo rígido.'
  spanish_quality_summary: La redacción es comprensible, pero «todo sabio de corazón» es demasiado calcada y no suena idiomática en español bíblico moderno. «Toda persona hábil[a] entre ustedes» comunica con mayor claridad el sentido artesanal documentado, mantiene buena legibilidad y evita una literalidad opaca. Conviene además conservar en nota la alternativa literal «sabio de corazón» y la opción distributiva «todo el que sea hábil entre ustedes».
  glossary_alignment: 'Correcto en «Yahvé». No hay otros términos doctrinales conflictivos. La decisión sobre חֲכַם לֵב debe alinearse mejor con la racionalidad léxica de la POB inglesa: el sentido principal aquí es habilidad/destreza, mientras que la literalidad idiomática puede preservarse en nota. La nota inglesa b sobre la fuerza distributiva merece reflejo en español.'
  issues:
  - severity: medium
    issue: «todo sabio de corazón» es una calca poco natural
    rationale: Aunque refleja literalmente el hebreo, en español moderno no comunica con claridad el sentido artesanal principal de חֲכַם לֵב en este contexto.
  - severity: medium
    issue: Falta una nota para la alternativa distributiva
    rationale: La auditoría inglesa preserva «everyone who is skillful among you» como alternativa; en español conviene reflejar esa posibilidad para no perder la documentación del singular distributivo.
  - severity: low
    issue: La combinación singular «vendrá y hará» con «todo sabio» suena rígida
    rationale: No es incorrecta, pero mejora mucho al usar «toda persona hábil», que suaviza el distributivo sin apartarse del sentido fuente.
  revised_spanish_text: Y toda persona hábil[a] entre ustedes vendrá y hará todo lo que Yahvé ha mandado.[b]
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «sabio de corazón», un modismo para alguien con destreza o habilidad, especialmente en el trabajo artesanal.
    reason: lexical_alternative
  - marker: b
    text: O «todo el que sea hábil entre ustedes». El hebreo es gramaticalmente masculino singular con fuerza distributiva.
    reason: alternative_reading
  revision_rationale: Se reemplaza la calca poco idiomática «sabio de corazón» en el texto principal por «persona hábil», que comunica mejor el sentido contextual de destreza artesanal, mientras la literalidad idiomática se preserva en nota. También se añade una nota para la alternativa distributiva documentada en la POB inglesa. Se mantiene «Yahvé» conforme al glosario del proyecto.
