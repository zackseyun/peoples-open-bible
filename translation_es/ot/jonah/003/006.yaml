review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa hebrea: la noticia/mensaje llega al rey, él se levanta de su trono, se quita la prenda exterior distinguida, se cubre de cilicio y se sienta en señal de humillación. Sin embargo, hay pequeños desajustes con la estela auditada del POB inglés: la nota [a] repite ‘la noticia’ como alternativa en vez de preservar mejor ‘el mensaje’/‘el asunto’/‘el reporte’, y la expresión final ‘sobre la ceniza’ suena menos natural en español que una formulación idiomática equivalente al inglés auditado, aunque sea literalmente posible.'
  spanish_quality_summary: El español es claro y digno, pero necesita una ligera mejora de naturalidad y consistencia. ‘Se sentó sobre la ceniza’ es comprensible, pero en español bíblico general resulta más natural ‘se sentó en la ceniza’, con nota literal. También conviene afinar la nota [a] para evitar redundancia con el texto principal y reflejar mejor el abanico semántico de דָּבָר.
  glossary_alignment: No hay términos del glosario principal en conflicto. ‘Cilicio’ para שַׂק es adecuado en contexto eclesial y readable; ‘manto’ para אַדֶּרֶת también está bien. No intervienen Yahvé/Mesías/Cristo ni otros términos sensibles del proyecto.
  issues:
  - severity: medium
    issue: La nota [a] no preserva bien las alternativas auditadas para הַדָּבָר.
    rationale: El texto principal usa ‘la noticia’, pero la nota dice ‘O “el asunto” o “la noticia”’, repitiendo la opción ya elegida y omitiendo la alternativa más cercana al POB inglés, ‘el mensaje’, además de ‘el reporte/informe’.
  - severity: medium
    issue: ‘Se sentó sobre la ceniza’ es demasiado literal y menos idiomático en español.
    rationale: El hebreo tiene עַל הָאֵפֶר, literalmente ‘sobre la ceniza/las cenizas’, pero el POB inglés adoptó una forma idiomática (‘in the ashes’). En español, ‘se sentó en la ceniza’ o ‘en las cenizas’ transmite mejor la escena de humillación sin perder fidelidad, dejando la literalidad para la nota.
  - severity: low
    issue: La nota [c] puede simplificarse para apoyar mejor la redacción revisada.
    rationale: Si el texto principal usa una formulación idiomática, la nota debe registrar con claridad la literalidad hebrea (‘sobre la ceniza’ o ‘sobre las cenizas’).
  revised_spanish_text: Cuando la noticia llegó al rey de Nínive[a], se levantó de su trono, se quitó su manto[b], se cubrió de cilicio y se sentó en la ceniza[c].
