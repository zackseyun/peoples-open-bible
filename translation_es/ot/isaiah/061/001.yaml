base_translation:
  language: en
  yaml_path: translation/ot/isaiah/061/001.yaml
  text: The Spirit of the Lord GOD is upon me[a], because Yahweh has anointed me to bring good news to the humble; he has sent me to bind up the brokenhearted[b], to proclaim liberty to the captives and opening of the prison to the bound.
  footnotes:
  - marker: a
    text: Or "to bring good news to the poor"; the Hebrew עֲנָוִים can denote the humble, meek, afflicted, or poor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew פְּקַח־קוֹחַ is difficult; alternatively, "opening of the eyes" or more generally "release/opening" for those bound.
    reason: alternative_reading
