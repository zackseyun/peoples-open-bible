translation:
  language: es
  text: Muchas aguas no pueden apagar el amor, ni los ríos pueden arrastrarlo. Si un hombre diera toda la riqueza de su casa por amor, sería despreciado por completo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguramente lo despreciarían». El hebreo expresa un desprecio intenso mediante un infinitivo absoluto junto con un verbo finito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם רַבִּים
  english_pob_choice: Many waters
  chosen_spanish: Muchas aguas
  alternatives_spanish:
  - Grandes aguas
  - Aguas abundantes
  lexicon: HALOT
  rationale: Conserva la imagen poética y la fuerza de amplitud del hebreo sin convertirla en una explicación. ‘Muchas aguas’ es natural en español y sigue de cerca el paralelismo del texto.
- source_word: לֹא יֽוּכְלוּ לְכַבּוֹת
  english_pob_choice: cannot quench
  chosen_spanish: no pueden apagar
  alternatives_spanish:
  - no pueden extinguir
  - no logran apagar
  lexicon: HALOT
  rationale: כבה se usa de apagar o extinguir. ‘Apagar’ funciona con naturalidad en español y mantiene la imagen de algo que no puede ser sofocado por el agua, especialmente en el marco de 8:6-7.
- source_word: הָֽאַהֲבָה
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - el amor ese
  - la amor
  lexicon: HALOT
  rationale: El sustantivo designa amor de manera directa. En español, el artículo definido con un abstracto es natural y preserva la referencia al amor como realidad concreta del poema.
- source_word: וּנְהָר֖וֹת לֹ֣א יִשְׁטְפ֑וּהָ
  english_pob_choice: nor can rivers sweep it away
  chosen_spanish: ni lo arrastran los ríos
  alternatives_spanish:
  - ni los ríos lo pueden arrastrar
  - ni los ríos lo inundan
  lexicon: HALOT
  rationale: שטף expresa arrastrar, inundar u ओverwhelm. ‘Arrastran’ comunica bien la fuerza destructiva del agua en español y preserva el paralelismo con ‘muchas aguas’.
- source_word: אִם יִתֵּ֨ן אִ֜ישׁ
  english_pob_choice: If a man were to give
  chosen_spanish: Si un hombre diera
  alternatives_spanish:
  - Si un hombre diese
  - Si alguien diera
  lexicon: HALOT
  rationale: Se conserva el valor hipotético del hebreo con un subjuntivo imperfecto natural en español. ‘Un hombre’ corresponde a אִישׁ sin forzar generalizaciones más amplias.
- source_word: כָּל ה֤וֹן בֵּית/וֹ
  english_pob_choice: all the wealth of his house
  chosen_spanish: toda la riqueza de su casa
  alternatives_spanish:
  - todas las riquezas de su casa
  - toda la hacienda de su casa
  lexicon: HALOT
  rationale: הוֹן denota riqueza, bienes o patrimonio. ‘Riqueza’ es claro y digno en español; ‘de su casa’ conserva la estructura semítica de hogar/patrimonio familiar.
- source_word: בָּאַהֲבָה
  english_pob_choice: for love
  chosen_spanish: por amor
  alternatives_spanish:
  - a cambio de amor
  - para amor
  lexicon: HALOT
  rationale: La preposición ב aquí expresa ámbito o costo/compensación. ‘Por amor’ mantiene la concisión poética y deja la ambigüedad de intercambio sin explicitarla demasiado.
- source_word: בּוֹז יָב֥וּזוּ לֽוֹ
  english_pob_choice: he would be utterly despised
  chosen_spanish: sería despreciado por completo
  alternatives_spanish:
  - sería objeto de desprecio total
  - lo despreciarían de veras
  lexicon: HALOT
  rationale: El hebreo usa intensificación con infinitivo absoluto más verbo finito. ‘Por completo’ comunica esa fuerza sin perder fluidez; la pasiva mantiene la indefinición del sujeto despectivo presente en el hebreo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo de WLC y el archivo auditado en inglés. No hubo revisiones aplicadas en el antecedente inglés; se mantuvo el paralelismo poético y la intensificación final del hebreo.
  spanish_consistency_notes:
  - Se prefirió ‘amor’ frente a ‘caridad’ por fidelidad al campo léxico del poema.
  - Se evitó ‘SEÑOR’ u otras convenciones de sustitución porque aquí no aparece el nombre divino.
  - Se conservó el sujeto indefinido final en pasiva española para reflejar la ambigüedad del hebreo sobre quién desprecia.
