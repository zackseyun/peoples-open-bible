translation:
  language: es
  text: Y después de enrollar el rollo y devolverlo al encargado[a][b], se sentó. Y los ojos de todos en la sinagoga estaban fijos en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libro». El término griego puede referirse más ampliamente a un documento escrito, pero en este contexto sinagogal lo más probable es un rollo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el encargado de la sinagoga responsable de los rollos y de ayudar en el servicio.
    reason: cultural_note
lexical_decisions:
- source_word: πτύξας
  english_pob_choice: rolling up
  chosen_spanish: enrollar
  alternatives_spanish:
  - plegar
  - cerrar
  lexicon: BDAG
  rationale: En este contexto de lectura en sinagoga, el objeto es un rollo; en español, «enrollar» expresa con naturalidad la acción física de volver a enrollarlo sin introducir una imagen de libro encuadernado.
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  - documento
  lexicon: BDAG
  rationale: Aunque βιβλίον puede significar «libro» en general, aquí el contexto sinagogal favorece «rollo», que es más preciso históricamente para el soporte de lectura.
- source_word: ἀποδοὺς
  english_pob_choice: giving ... back
  chosen_spanish: devolver
  alternatives_spanish:
  - dar de vuelta
  - entregar nuevamente
  lexicon: BDAG
  rationale: El verbo compuesto expresa retorno al dueño o responsable legítimo; «devolver» conserva ese matiz de restitución de manera idiomática en español.
- source_word: ὑπηρέτῃ
  english_pob_choice: attendant
  chosen_spanish: asistente
  alternatives_spanish:
  - encargado
  - ministro
  - servidor
  lexicon: BDAG
  rationale: En el marco de la sinagoga, se trata del funcionario que maneja los rollos y ayuda en el servicio. «Asistente» evita la posible ambigüedad de «siervo» y no añade connotaciones eclesiásticas ajenas al contexto.
- source_word: ἐκάθισεν
  english_pob_choice: he sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - se sentó a
  - tomó asiento
  lexicon: BDAG
  rationale: Es una acción narrativa simple; «se sentó» es natural y transmite la postura sin explicar de más.
- source_word: πάντων
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos los presentes
  - todos ellos
  lexicon: BDAG
  rationale: Como genitivo de conjunto ligado a «los ojos», «todos» mantiene la amplitud de la escena de forma fluida en español.
- source_word: οἱ ὀφθαλμοὶ
  english_pob_choice: the eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - las miradas
  - sus ojos
  lexicon: BDAG
  rationale: Se conserva la imagen concreta del griego. «Los ojos» mantiene la vividez del sujeto gramatical y evita suavizar la expresión a «miradas».
- source_word: ἀτενίζοντες
  english_pob_choice: were fixed on
  chosen_spanish: estaban fijos en
  alternatives_spanish:
  - miraban atentamente a
  - estaban mirando fijamente a
  lexicon: BDAG
  rationale: El participio denota una mirada sostenida e intensa. «Estaban fijos en» comunica esa intensidad sin sugerir necesariamente rudeza o tensión indebida.
- source_word: συναγωγῇ
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: El sentido institucional y espacial es claro aquí; «sinagoga» es la traducción directa y precisa.
theological_decisions:
- issue: 'Objeto leído en la sinagoga: βιβλίον como ''rollo'' en vez de ''libro'''
  english_pob_reading: Rendered as 'scroll' rather than the more generic 'book.'
  chosen_spanish_reading: Se traduce «rollo», no «libro».
  alternative_spanish_readings:
  - libro
  rationale: No es una cuestión doctrinal, sino de fidelidad al escenario histórico. La decisión evita proyectar la forma moderna de un libro encuadernado sobre un contexto de lectura en rollo.
  doctrine_reference: Translation philosophy §1 (primacía del texto original y del contexto histórico)
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión menor que añadió la conjunción «and» para unir más naturalmente los participios sin alterar la secuencia de acciones. La redacción española refleja esa misma secuencia encadenada y mantiene la precisión histórica de «rollo» y la intensidad de «los ojos ... fijos».
  spanish_consistency_notes:
  - Se mantuvo «sinagoga» por coherencia con el contexto institucional del pasaje.
  - Se evitó «SEÑOR» o términos litúrgicos no presentes en el verso; no hay reemplazos terminológicos ajenos al griego.
  - «Asistente» se usa aquí con valor funcional y narrativo, no como título eclesiástico.
  - 'La puntuación sigue la sucesión de acciones del griego: dos participios previos, acción principal, y luego la observación final.'
