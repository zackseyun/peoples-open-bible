translation:
  language: es
  text: Por la iniquidad de su ganancia injusta me enojé[a], y lo golpeé; me oculté y me enojé[b], y siguió apartándose en el camino de su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su codicia». El término hebreo puede referirse tanto al deseo codicioso como a la ganancia obtenida por la codicia.
    reason: lexical_alternative
  - marker: b
    text: O «oculté mi rostro y me enojé». «Oculté mi rostro» refleja un modismo bíblico común, aunque «rostro» no aparece explícitamente en el hebreo aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲוֺן
  english_pob_choice: Because of the iniquity of
  chosen_spanish: Por la iniquidad de
  alternatives_spanish:
  - A causa de la iniquidad de
  - Por el pecado de
  lexicon: HALOT
  rationale: La preposición ב con עָוֺן es causal en este contexto. «Por la iniquidad de» conserva la causa y el sustantivo moral sin volverlo demasiado interpretativo.
- source_word: בִּצְעוֹ
  english_pob_choice: his unjust gain
  chosen_spanish: su injusta ganancia
  alternatives_spanish:
  - su codicia
  - su ganancia codiciosa
  - su lucro injusto
  lexicon: HALOT
  rationale: בֶּצַע puede referirse a ganancia obtenida por avidez o injusticia. «Injusta ganancia» preserva el valor económico y moral del término, siguiendo la decisión inglesa de no reducirlo solo a una disposición interna.
- source_word: קָצַפְתִּי
  english_pob_choice: I was angry
  chosen_spanish: me enojé
  alternatives_spanish:
  - estuve airado
  - me irrité
  - me llené de ira
  lexicon: HALOT
  rationale: El verbo קצף expresa enojo/ira. «Me enojé» es natural en español moderno y mantiene el registro sobrio del texto.
- source_word: וְאַכֵּהוּ
  english_pob_choice: and I struck him
  chosen_spanish: y lo herí
  alternatives_spanish:
  - y lo golpeé
  - y lo castigué
  - y lo herí con un golpe
  lexicon: HALOT
  rationale: נכה en hiphil puede expresar golpear o herir de manera punitiva. «Lo herí» comunica la acción concreta sin sonar excesivamente arcaica; también deja abierta la idea de castigo corporal.
- source_word: הַסְתֵּר
  english_pob_choice: I hid myself
  chosen_spanish: me oculté
  alternatives_spanish:
  - me escondí
  - oculté mi rostro
  - me aparté
  lexicon: HALOT
  rationale: El infinitivo absoluto de סתר funciona aquí de manera elíptica/adverbial. «Me oculté» sigue la lectura inglesa y evita añadir «rostro» al texto principal, ya que ese sustantivo no aparece explícitamente en hebreo.
- source_word: וְאֶקְצֹף
  english_pob_choice: and was angry
  chosen_spanish: y me enojé
  alternatives_spanish:
  - y estuve airado
  - y me llené de ira
  - y seguí enojado
  lexicon: HALOT
  rationale: Se conserva la repetición de קצף con una formulación paralela. En español, repetir «me enojé» mantiene la secuencia sin forzar una construcción extraña.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went on
  chosen_spanish: y siguió
  alternatives_spanish:
  - y fue
  - y continuó
  - y prosiguió
  lexicon: HALOT
  rationale: El verbo con el adjetivo siguiente comunica continuidad de conducta, no solo desplazamiento físico. «Siguió» refleja ese valor durativo.
- source_word: שׁוֹבָב
  english_pob_choice: backsliding
  chosen_spanish: apartándose
  alternatives_spanish:
  - retrocediendo
  - rebelándose
  - en apostasía
  lexicon: HALOT
  rationale: שׁוֹבָב expresa desvío/apartamiento del camino debido. «Apartándose» conserva la imagen verbal; «backsliding» no es idiomático en español, por lo que se optó por una solución más transparente.
- source_word: בְּדֶרֶךְ לִבּוֹ
  english_pob_choice: in the way of his heart
  chosen_spanish: en el camino de su corazón
  alternatives_spanish:
  - según el camino de su corazón
  - por el camino de su corazón
  - en la senda de su corazón
  lexicon: HALOT
  rationale: La frase es metafórica para la conducta guiada por la voluntad o inclinación interior. «Camino de su corazón» preserva la imagen hebrea de manera comprensible en español.
theological_decisions:
- issue: Expresión de la ocultación divina en הַסְתֵּר
  english_pob_reading: I hid myself
  chosen_spanish_reading: me oculté
  alternative_spanish_readings:
  - oculté mi rostro
  - me escondí
  rationale: El hebreo no menciona explícitamente «rostro». La traducción principal evita introducirlo; la alternativa tradicional queda disponible como lectura idiomática más amplia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Objeto moral del juicio en בִּצְעוֹ
  english_pob_reading: his unjust gain
  chosen_spanish_reading: su injusta ganancia
  alternative_spanish_readings:
  - su codicia
  - su lucro injusto
  rationale: El término puede referirse tanto al afán de ganancia como al beneficio obtenido de forma avariciosa. «Injusta ganancia» conserva esa tensión lexical sin reducirla a una sola dimensión moral.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó «but» por «and» para reflejar con mayor fidelidad la conjunción hebrea. La presente redacción española conserva esa coordinación con «y» en ambas apariciones, sin introducir contraste adversativo no explicitado por el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
  - «Me enojé» se repite para conservar el paralelismo de קָצַפְתִּי / וְאֶקְצֹף.
  - «Camino de su corazón» preserva la metáfora hebrea sin aclararla en exceso.
