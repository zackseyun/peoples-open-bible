translation:
  language: es
  text: Y pondré mi rostro contra aquel hombre, y lo haré una señal y un proverbio[a], y lo cortaré de en medio de mi pueblo. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dicho de burla». El hebreo puede denotar un proverbio, una burla pública o un dicho acerca de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי פָנַי בָּאִישׁ הַהוּא
  english_pob_choice: I will set my face against that man
  chosen_spanish: pondré mi rostro contra[a] aquel hombre
  alternatives_spanish:
  - volveré mi rostro contra aquel hombre
  - dirigiré mi rostro contra aquel hombre
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de oposición judicial. 'Poner mi rostro contra' conserva la imagen concreta de 'rostro' y la fuerza adversativa de la frase sin volverla demasiado literal en español.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - esa persona
  - ese hombre
  lexicon: HALOT
  rationale: El referente es masculino singular. 'Aquel hombre' mantiene la deixis del texto y la concordancia de género, sin introducir neutralización innecesaria.
- source_word: וַהֲשִׂמֹתִיהוּ
  english_pob_choice: I will make him
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo pondré
  - lo nombraré
  lexicon: HALOT
  rationale: 'En contexto el verbo introduce el resultado: el hombre pasa a ser algo. ''Lo haré'' funciona naturalmente con los predicados siguientes (''una señal y un proverbio'') y preserva la idea de transformación de estado.'
- source_word: לְאוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una seña
  - un signo
  lexicon: HALOT
  rationale: '''Señal'' es el equivalente más natural en español y mantiene la amplitud semántica de אוֹת como señal visible o evidencia pública de juicio.'
- source_word: וְלִמְשָׁלִים
  english_pob_choice: and a proverb
  chosen_spanish: y un proverbio
  alternatives_spanish:
  - y un refrán
  - y un dicho
  lexicon: HALOT
  rationale: POB eligió 'proverb' para conservar el núcleo léxico de מָשָׁל; en español 'proverbio' es el correlato más directo. Se mantiene el singular idiomático para expresar el resultado en una sola formulación memorable.
- source_word: וְהִכְרַתִּיו
  english_pob_choice: I will cut him off
  chosen_spanish: lo eliminaré
  alternatives_spanish:
  - lo cortaré
  - lo exterminaré
  lexicon: HALOT
  rationale: El hebreo suele expresar juicio severo con כרת, literalmente 'cortar'. En español, 'eliminar' comunica la exclusión definitiva del pueblo de manera natural, aunque es menos imagístico que el inglés. Se preserva la gravedad del acto sin sonar forzado.
- source_word: מִתּוֹךְ עַמִּי
  english_pob_choice: from the midst of my people
  chosen_spanish: de en medio de mi pueblo
  alternatives_spanish:
  - de entre mi pueblo
  - del medio de mi pueblo
  lexicon: HALOT
  rationale: '''De en medio de mi pueblo'' reproduce de forma bastante cercana la imagen hebrea de separación y expulsión del grupo. Es solemne y transparente en español.'
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: El hebreo marca consecuencia; 'Entonces' hace explícita la relación resultativa que el contexto pide. En español, el plural mantiene el destinatario colectivo del anuncio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es usar 'Yahvé' en el texto principal. Se conserva el nombre propio divino en lugar de una sustitución por título.
theological_decisions:
- issue: Fórmula de juicio con el 'rostro' divino
  english_pob_reading: set my face against that man
  chosen_spanish_reading: pondré mi rostro contra aquel hombre
  alternative_spanish_readings:
  - volveré mi rostro contra aquel hombre
  rationale: La frase debe sonar como un acto deliberado de oposición y juicio divino, no como una simple disposición interior. 'Pondré mi rostro contra' conserva esa fuerza antropomórfica y judicial.
  doctrine_reference: Translation philosophy §1, §3
- issue: מְשָׁלִים en contexto de juicio público
  english_pob_reading: a proverb
  chosen_spanish_reading: un proverbio
  alternative_spanish_readings:
  - un refrán
  - un dicho
  rationale: El contexto presenta al hombre como ejemplo público de juicio. 'Proverbio' mantiene la base léxica de מָשָׁל y deja abierta la idea de dicho memorable o fórmula de escarnio sin imponer una sola lectura estrecha.
  doctrine_reference: Translation philosophy §3, §5
- issue: Nombre divino en el cierre de la fórmula
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre propio divino conforme al principio del proyecto, para evitar la sustitución por un título y preservar la referencia explícita al Tetragrámaton.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la lectura y decisiones del POB en inglés; no se requieren revisiones textuales relevantes. Se ha ajustado el léxico español para conservar la imagen hebrea, la severidad judicial y el nombre divino según la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la imaginería corporal de 'rostro' para el modismo de juicio.
  - '''Proverbio'' mantiene la base léxica de מָשָׁל sin forzar un equivalente más interpretativo.'
  - El cierre colectivo 'Entonces sabrán' refleja el resultado público del juicio.
