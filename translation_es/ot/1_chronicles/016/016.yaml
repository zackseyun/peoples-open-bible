translation:
  language: es
  text: que él hizo[a] con Abraham, y su juramento a Isaac—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'que él cortó con Abraham', un modismo hebreo que significa 'que hizo un pacto con Abraham'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula y en español natural se traduce con 'que'. Como el antecedente implícito es femenino en el versículo previo ('alianza'), 'que' evita sobrecargar el texto con un relativo marcado por género.
- source_word: כָּרַת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - concertó
  - estableció
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'cortó', idiomáticamente 'hizo/estableció una alianza'. En español, 'hizo' comunica el sentido pactal sin la aspereza de 'cortó', que se conserva mejor en nota.
- source_word: אֶת אַבְרָהָם
  english_pob_choice: with Abraham
  chosen_spanish: con Abraham
  alternatives_spanish:
  - con Abraham el pacto
  - a Abraham
  lexicon: HALOT
  rationale: Aunque אֶת marca el objeto directo, el modismo de pacto en español exige la preposición 'con'. Esto preserva la relación bilateral del pacto sin una traducción mecánica del marcador objeto.
- source_word: וּשְׁבוּעָתוֹ
  english_pob_choice: and his oath
  chosen_spanish: y su juramento
  alternatives_spanish:
  - y su juramento jurado
  - y su promesa jurada
  lexicon: HALOT
  rationale: '''Juramento'' mantiene el sustantivo correspondiente a שְׁבוּעָה y la posesión de tercera persona. ''Promesa jurada'' explicita la fuerza del término, pero añade interpretación que el hebreo no exige.'
- source_word: לְיִצְחָק
  english_pob_choice: to Isaac
  chosen_spanish: para Isaac
  alternatives_spanish:
  - a Isaac
  - con Isaac
  lexicon: HALOT
  rationale: El ל aquí puede indicar dirección o destinatario. 'Para Isaac' conserva mejor esa orientación y mantiene la paralela fuerza de la cláusula respecto de Abraham, sin forzar una relación verbal inexistente en español.
theological_decisions:
- issue: Idiom of covenant-making implied by כרת ברית
  english_pob_reading: which he made with Abraham
  chosen_spanish_reading: que él hizo con Abraham
  alternative_spanish_readings:
  - que él cortó con Abraham
  - que él concertó con Abraham
  rationale: Se conserva el sentido del modismo hebreo de alianza sin abandonar por completo la literalidad, porque 'hizo' expresa adecuadamente el acto pactal en español. La alusión literal a 'cortar' queda disponible en la nota para no borrar la tensión léxica documentada.
  doctrine_reference: Lexical fidelity to Hebrew covenant idiom; original-language primacy over inherited ecclesial phrasing.
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene una equivalencia óptima: traduce el modismo כרת ברית por ''made with Abraham'' y documenta en nota la forma literal ''cut''. No hay revisiones aplicadas en el registro fuente; la presente propuesta conserva esa estrategia, trasladando al español la tensión entre el sentido idiomático y la literalidad documentada.'
  spanish_consistency_notes:
  - Se mantiene 'Abraham' e 'Isaac' como nombres propios estándar.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton.
  - '''Juramento'' conserva la fuerza nominal del hebreo sin diluirla en ''promesa''.'
  - La nota a pie de página guarda la literalidad 'cortó' para transparentar el modismo hebreo sin imponerla en el cuerpo del texto.
