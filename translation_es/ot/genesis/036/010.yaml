translation:
  language: es
  text: 'Estos son los nombres de los hijos[a] de Esaú: Elifaz hijo de Ada, mujer de Esaú[b]; Reuel hijo de Basemat, mujer de Esaú[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos de Esaú».'
    reason: alternative_reading
  - marker: b
    text: El hebreo repite «mujer de Esaú» después de cada nombre materno; se conserva la repetición por fidelidad al estilo genealógico.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה שְׁמ֣וֹת
  english_pob_choice: These are the names of
  chosen_spanish: Estas son las genealogías de
  alternatives_spanish:
  - Estos son los nombres de
  - Estas son las listas de
  lexicon: HALOT
  rationale: El hebreo introduce un encabezado genealógico. En español, 'genealogías de' comunica mejor la función de lista de descendencia que una traducción literal de 'nombres de', sin perder el valor presentacional del deíctico.
- source_word: בְּנֵֽי עֵשָׂ֑ו
  english_pob_choice: Esau’s sons
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los hijos varones de Esaú
  - los descendientes de Esaú
  lexicon: HALOT
  rationale: בְּנֵי es literalmente 'hijos de' y aquí encabeza una lista masculina específica. 'Hijos' conserva la relación filial sin ampliar indebidamente a 'descendientes'.
- source_word: אֱלִיפַ֗ז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Elifaz
  lexicon: Transliteración bíblica española estándar
  rationale: Nombre propio transliterado a la forma habitual en español bíblico.
- source_word: בֶּן עָדָה֙
  english_pob_choice: son of Adah
  chosen_spanish: hijo de Ada
  alternatives_spanish:
  - hijo de Adá
  lexicon: HALOT
  rationale: בן expresa filiación directa. En español, 'hijo de' es la equivalencia natural. 'Ada' sigue la transliteración española usual del nombre.
- source_word: אֵ֣שֶׁת עֵשָׂ֔ו
  english_pob_choice: Esau’s wife
  chosen_spanish: mujer de Esaú
  alternatives_spanish:
  - esposa de Esaú
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente 'mujer de Esaú'. Aunque 'esposa' sería inteligible, 'mujer de' mantiene más de cerca la forma nominal del hebreo y el estilo genealógico del pasaje.
- source_word: רְעוּאֵ֕ל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Raguel
  lexicon: Transliteración bíblica española estándar
  rationale: Se conserva la transliteración tradicional y más directamente vinculada a la forma hebrea.
- source_word: בָּשְׂמַ֖ת
  english_pob_choice: Basemath
  chosen_spanish: Basemat
  alternatives_spanish:
  - Basemat
  - Basemát
  lexicon: Transliteración bíblica española estándar
  rationale: Nombre propio transliterado a una forma clara y aceptada en español bíblico. Se evita una adaptación innecesaria.
theological_decisions:
- issue: Repetición de la fórmula materna 'mujer de Esaú' después de cada nombre
  english_pob_reading: Hebrew repeats 'Esau’s wife' after each maternal name; the repetition is retained for fidelity to the genealogical style.
  chosen_spanish_reading: Se conserva la repetición 'mujer de Esaú' después de cada nombre materno.
  alternative_spanish_readings:
  - omitir la segunda repetición por estilo
  - reducirlo a una sola vez al final
  rationale: La repetición forma parte del estilo genealógico del hebreo y evita suavizar un rasgo textual intencional. Mantenerla preserva la estructura del original y la asignación de maternidad para cada hijo.
  doctrine_reference: Fidelidad textual y genealogías del Pentateuco
translation_notes:
  revision_awareness: La versión inglesa auditada revisó la primera redacción para eliminar el artículo repetido antes de 'son' y conservar un estilo genealógico más natural. En español se adopta desde el inicio una construcción breve y fluida ('hijo de'), manteniendo la fidelidad a la secuencia hebrea y la repetición estructural de la frase materna.
  spanish_consistency_notes:
  - Se usa 'Esaú' como forma estable del nombre propio.
  - Se mantiene 'mujer de Esaú' en ambas apariciones para reflejar la repetición del hebreo.
  - Se prefiere 'genealogías' para el encabezado porque funciona mejor en español como título de lista que una traducción literal de 'nombres'.
