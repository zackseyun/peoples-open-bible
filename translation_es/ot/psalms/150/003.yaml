translation:
  language: es
  text: Alábenlo con toque de trompeta[a]; alábenlo con arpa y lira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con el sonido del shofar’; el shofar era un cuerno, a menudo de carnero, usado en el culto y para dar señales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּ/הוּ
  english_pob_choice: Praise him
  chosen_spanish: Alabadle
  alternatives_spanish:
  - Alabenle
  - Dadle alabanza
  lexicon: HALOT
  rationale: El imperativo plural hebreo llama a la comunidad a alabar directamente a Yahvé; en español, 'alabadle' conserva el mandato exhortativo y el objeto pronominal de tercera persona singular.
- source_word: בְּ/תֵ֣קַע
  english_pob_choice: trumpet blast
  chosen_spanish: toque
  alternatives_spanish:
  - sonido
  - soplo
  - toque de trompeta
  lexicon: HALOT
  rationale: תֵקַע designa el acto o sonido de hacer sonar el instrumento; 'toque' expresa bien el evento sonoro sin cargar de más el instrumento mismo.
- source_word: שׁוֹפָר
  english_pob_choice: the trumpet
  chosen_spanish: shofar
  alternatives_spanish:
  - trompeta
  - cuerno
  - cuerno de carnero
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'trumpet' por idiomaticidad, el hebreo nombra específicamente el shofar. En español se conserva el término técnico para no perder la referencia cultural y cultual, y se acompaña con nota explicativa.
- source_word: בְּ/נֵבֶל
  english_pob_choice: with harp
  chosen_spanish: con arpa
  alternatives_spanish:
  - con salterio
  - con lira
  lexicon: HALOT
  rationale: נֵבֶל es un instrumento de cuerda. 'Arpa' es el equivalente español más natural y reconocible en registro bíblico para este contexto de alabanza.
- source_word: וְ/כִנּוֹר
  english_pob_choice: and lyre
  chosen_spanish: y lira
  alternatives_spanish:
  - y arpa
  - y cítara
  lexicon: HALOT
  rationale: כִנּוֹר se distingue de נֵבֶל como otro instrumento de cuerda; 'lira' preserva la diferencia entre ambos instrumentos y corresponde bien al sentido histórico-musical.
theological_decisions:
- issue: Nombre del instrumento cultual שׁוֹפָר
  english_pob_reading: The shofar was a horn, often a ram's horn, used in worship and signaling.
  chosen_spanish_reading: shofar, es decir, un cuerno usado en el culto y para señales
  alternative_spanish_readings:
  - trompeta
  - cuerno de carnero
  rationale: La traducción no debe borrar la especificidad cultural del término. Se conserva el hebraísmo 'shofar' en el texto principal y se aclara su sentido en nota, siguiendo la tensión lexical documentada por la tradición auditada.
  doctrine_reference: Éxodo 19:16-19; Josué 6:4; Salmo 81:3
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el artículo antes de 'trumpet blast' para reflejar más de cerca la construcción hebrea. En español, 'toque de shofar' mantiene esa concisión y evita añadir artículo innecesario.
  spanish_consistency_notes:
  - Se conserva el imperativo plural exhortativo con 'alabadle' para reflejar la repetición enfática del hebreo.
  - Se mantiene 'shofar' como préstamo técnico porque una equivalencia genérica ('trompeta' o 'cuerno') perdería precisión cultual.
  - '''Arpa'' y ''lira'' diferencian los dos instrumentos de cuerda del versículo, evitando colapso semántico.'
