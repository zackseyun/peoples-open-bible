lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción sucesiva; «entonces» conserva la secuencia narrativa y suena natural en español.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - la longitud de ello
  lexicon: HALOT
  rationale: El sufijo de 3ms remite al espacio medido; «su longitud» expresa con claridad y sin forzar el posesivo.
- source_word: עֶשְׂרִים אַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos de medida
  - veinte codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para mantener transparencia histórica y textual, como en el inglés POB.
- source_word: וְרֹחַב
  english_pob_choice: and the width
  chosen_spanish: y su anchura
  alternatives_spanish:
  - y el ancho
  - y su ancho
  lexicon: HALOT
  rationale: «Anchura» comunica bien רֹחַב en español bíblico moderno. El posesivo se entiende por contexto, pero se explicita para paralelismo con «su longitud».
- source_word: אֶל פְּנֵי הַהֵיכָל
  english_pob_choice: before the nave
  chosen_spanish: delante del santuario
  alternatives_spanish:
  - frente al santuario
  - ante el santuario
  - delante del templo
  lexicon: HALOT
  rationale: En este contexto de visión del templo, הֵיכָל designa la sala principal del santuario; «santuario» es claro en español y mantiene la relación espacial de אֶל פְּנֵי sin la ambigüedad de «templo» como complejo completo.
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: and he said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y dijo a mí
  - entonces me dijo
  lexicon: HALOT
  rationale: Fórmula narrativa directa y natural en español; el complemento pronominal expresa el dativo personal sin pesadez.
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  - Éste es
  lexicon: HALOT
  rationale: Se requiere cópula en español para una predicación natural.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: Lugar Santísimo
  alternatives_spanish:
  - Santo de los Santos
  - Lugar Santísimo
  lexicon: HALOT
  rationale: La construcción hebrea superlativa designa el recinto interior más sagrado. «Lugar Santísimo» es una forma pública, clara y reverente en español; se preserva la equivalencia tradicional sin depender de una paráfrasis.
theological_decisions:
- issue: Nombre del recinto קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: Lugar Santísimo
  alternative_spanish_readings:
  - Santo de los Santos
  rationale: No hay tensión doctrinal, pero sí una decisión terminológica importante. «Lugar Santísimo» comunica el superlativo espacial del hebreo y es reconocible en lectura eclesial; la alternativa tradicional se mantiene implícita como equivalente idiomático.
  doctrine_reference: Translation philosophy §5-6
- issue: Valor espacial de אֶל פְּנֵי הַהֵיכָל
  english_pob_reading: before the nave
  chosen_spanish_reading: delante del santuario
  alternative_spanish_readings:
  - frente al santuario
  - ante el santuario
  rationale: La frase indica localización frente a una sala específica del templo. «Delante de» preserva la relación espacial sin añadir interpretación excesiva; «santuario» refleja mejor el referente arquitectónico en español que «nave» en un contexto de visión veterotestamentaria.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa revisada cambió de “in front of the nave” a “before the nave”; el español sigue esa precisión con «delante de» y mantiene el resto del verso sin ampliaciones. La nota conserva la alternativa tradicional documentada por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «codos» como unidad antigua transparente, coherente con el POB inglés.
  - Se evita «SEÑOR» porque el texto hebreo aquí no contiene el tetragrámaton.
  - «Lugar Santísimo» preserva la equivalencia tradicional y el tono reverente sin ocultar el superlativo hebreo.
  - La puntuación con dos puntos reproduce la segmentación explicativa del inglés POB de forma natural en español.
