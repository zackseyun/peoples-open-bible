    text: O 'las grandes pruebas severas'. El hebreo puede denotar pruebas o actos de prueba.
    reason: lexical_alternative
  - marker: b
    text: O 'naciones'. 'Pueblos' es más literal al hebreo עַמִּים.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'con todos los pueblos' por 'a todos los pueblos' para reflejar mejor el objeto de la acción en el hebreo y en el audit trail inglés. Se suaviza 'de los que tú tienes miedo' a 'de los que tienes miedo' para un español más natural y digno. Se mejora la nota lexical [a] eliminando la expresión torpe 'pruebas de examen'.
