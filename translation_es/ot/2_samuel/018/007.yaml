translation:
  language: es
  text: 'Allí el pueblo de Israel fueron derrotados[a] ante los siervos de David, y la matanza[b] fue grande aquel día: veinte mil hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron vencidos», «fueron batidos» o «fueron derribados». El verbo hebreo indica ser golpeados o derrotados en combate.
    reason: lexical_alternative
  - marker: b
    text: O «el golpe», «la derrota» o «la plaga». Aquí el contexto militar favorece «matanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגְפוּ
  english_pob_choice: were defeated
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue vencido
  - fue batido
  - fue derribado
  lexicon: HALOT
  rationale: El nifal de נָגַף expresa ser golpeado/derrotado en combate. «Fue derrotado» comunica con naturalidad el sentido militar, sin añadir detalles sobre el modo exacto de la caída de cada combatiente.
- source_word: עַם יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - el ejército de Israel
  - las tropas de Israel
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «pueblo de Israel». En este contexto de guerra puede referirse a fuerzas militares, pero la traducción conserva la expresión base y sigue siendo clara en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En un relato de batalla, la idea es de derrota frente a un adversario. «Delante de» mantiene la relación espacial/forense del hebreo y suena natural en español narrativo.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: the servants of David
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los hombres de David
  lexicon: HALOT
  rationale: עֶבֶד puede significar siervo, servidor o funcionario. Aquí se conserva «siervos» porque refleja con más fidelidad el sustantivo hebreo y la relación de lealtad/servicio a David; «hombres de David» sería más interpretativo.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the slaughter
  chosen_spanish: la matanza
  alternatives_spanish:
  - el golpe
  - la derrota
  - la plaga
  lexicon: HALOT
  rationale: Aunque el término puede significar «plaga» en otros contextos, aquí el marco bélico exige un sentido de golpe mortal o gran mortandad. «Matanza» comunica bien la intensidad del texto sin perder la tensión lexical.
- source_word: גְדוֹלָה
  english_pob_choice: was great
  chosen_spanish: fue grande
  alternatives_spanish:
  - fue severa
  - fue inmensa
  lexicon: HALOT
  rationale: El adjetivo significa simplemente «grande». «Fue grande» reproduce de manera directa la valoración hebrea y funciona bien con «matanza».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Es una expresión temporal fija. «Aquel día» es breve, elegante y fiel al valor del hebreo.
- source_word: עֶשְׂרִים אָלֶף
  english_pob_choice: twenty thousand men
  chosen_spanish: veinte mil hombres
  alternatives_spanish:
  - veinte mil
  - veinte mil personas
  lexicon: HALOT
  rationale: El hebreo da solo el número; en un informe bélico el complemento «hombres» aclara que se trata de bajas humanas, siguiendo la decisión auditada en inglés.
theological_decisions:
- issue: Sentido de מַגֵּפָה en un contexto de guerra
  english_pob_reading: the slaughter; not 'plague' in this verse, though the Hebrew word can mean plague elsewhere
  chosen_spanish_reading: la matanza; no «plaga» en este versículo, aunque el término puede significar «plaga» en otros contextos
  alternative_spanish_readings:
  - la plaga
  - el golpe
  - la derrota
  rationale: 'Se conserva la tensión semántica del hebreo: el sustantivo tiene campo amplio, pero aquí el contexto de batalla orienta la lectura hacia mortandad/estrago bélico. «Matanza» expresa esa lectura sin borrar el valor alternativo atestiguado por el léxico.'
  doctrine_reference: No aplica; decisión léxica contextual.
translation_notes:
  revision_awareness: 'Se mantuvo la alta concordancia con la revisión inglesa vigente: el texto conserva la lectura bélica de וַיִּנָּגְפוּ y de הַמַּגֵּפָה, y sigue la aclaración numérica de «veinte mil hombres» para hacer explícito el referente humano.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se conserva «siervos» para עֲבָדִים por fidelidad léxica y coherencia con la terminología POB.
  - «Matanza» mantiene el registro narrativo bélico y evita diluir el impacto del sustantivo hebreo.
  - La puntuación con dos puntos refleja bien la clausula final cuantitativa del hebreo y del inglés auditado.
