base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/003.yaml
  text: But Zerubbabel[a], Jeshua, and the rest of the heads of the fathers’ houses of Israel said to them, “It is not for you and for us to build a house for our God, but we alone will build it for Yahweh, the God of Israel, just as King Cyrus, the king of Persia[b], commanded us.”
  footnotes:
  - marker: a
    text: Or, more literally, “for we together will build”; here “together” is understood in context to mean that they themselves, without the offered partners, would do the building.
    reason: lexical_alternative
  - marker: b
    text: “A house” refers to the temple.
    reason: cultural_note
