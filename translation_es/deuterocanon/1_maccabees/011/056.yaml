translation:
  language: es
  text: Y Trifón tomó los elefantes y se apoderó de Antioquía[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, ‘las bestias’; en este contexto militar, el referente son elefantes de guerra.
