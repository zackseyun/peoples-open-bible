  text: וְ/אָֽמַרְתָּ֙ שִׁמְע֣וּ דְבַר יְהוָ֔ה מַלְכֵ֣י יְהוּדָ֔ה וְ/יֹשְׁבֵ֖י יְרֽוּשָׁלִָ֑ם כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֨י מֵבִ֤יא רָעָה֙ עַל הַ/מָּק֣וֹם הַ/זֶּ֔ה אֲשֶׁ֥ר כָּל שֹׁמְעָ֖/הּ תִּצַּ֥לְנָה אָזְנָֽי/ו־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/019/003.yaml
  text: 'And say[a], ‘Hear the word of Yahweh, O kings of Judah and inhabitants of Jerusalem. Thus says Yahweh of hosts, the God of Israel: Behold, I am bringing disaster on this place[b], such that the ears of everyone who hears of it will tingle.’'
  footnotes:
  - marker: a
    text: Or 'calamity'; the Hebrew term can denote harmful judgment rather than moral evil.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his ears will tingle,' an idiom for being shocked or horrified by what is heard.
    reason: cultural_note
