revisions:
- from: 'Hijo de hombre[a], habla a los hijos de tu pueblo y diles: «Si yo trajera una espada sobre una tierra, y el pueblo de la tierra tomara de entre ellos a un hombre y lo pusiera para ellos como centinela»,'
  to: '«Hijo de hombre[a], habla a los hijos de tu pueblo y diles: “Si yo traigo una espada sobre una tierra, y el pueblo de la tierra toma de entre ellos a un hombre y lo pone como su centinela,”»'
  rationale: Se ajusta el tiempo verbal a un condicional más natural y más cercano al hebreo/POB («si yo traigo»), y se reemplaza la construcción rígida «para ellos como centinela» por «como su centinela», que comunica el mismo sentido de designación de manera idiomática en español. Se conserva el resto de las decisiones léxicas fieles al proyecto.
  reviewer_model: gpt-5.4
