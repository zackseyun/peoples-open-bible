translation:
  language: es
  text: y de lo mejor de los montes antiguos[a], y de la abundancia de las colinas eternas[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la cima de los montes antiguos». La frase hebrea puede entenderse de modo espacial («cima/cabeza de») o cualitativo («lo mejor de»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de las cosas preciosas de las colinas eternas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֹאשׁ
  english_pob_choice: from the choicest things of
  chosen_spanish: desde lo más alto de
  alternatives_spanish:
  - desde la cima de
  - desde la parte más selecta de
  - desde lo mejor de
  lexicon: HALOT
  rationale: El hebreo puede leerse espacialmente ('cima/cabeza de') o cualitativamente ('lo principal/mejor de'). En español, 'desde lo más alto de' conserva la imagen espacial y deja abierta la lectura de excelencia que el contexto de bendición sugiere.
- source_word: הַרְרֵי
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - cerros
  lexicon: HALOT
  rationale: El plural constructo de הַר refiere a elevaciones grandes; 'montes' es natural en español bíblico y mantiene el contraste con 'colinas' en la segunda cola.
- source_word: קֶדֶם
  english_pob_choice: ancient
  chosen_spanish: antiguos
  alternatives_spanish:
  - de oriente
  - antiguos de tiempos
  - primordiales
  lexicon: HALOT
  rationale: Aquí el sentido temporal es más probable que el direccional, por el paralelo con עוֹלָם. 'Antiguos' comunica bien la antigüedad de los montes.
- source_word: מִמֶּגֶד
  english_pob_choice: from the abundance of
  chosen_spanish: desde la abundancia de
  alternatives_spanish:
  - desde lo precioso de
  - desde el rico fruto de
  - desde la excelencia de
  lexicon: HALOT
  rationale: מֶגֶד denota producto precioso o abundante. 'Abundancia' es claro en español y conserva la idea de riqueza/bondad del don.
- source_word: גִּבְע֥וֹת
  english_pob_choice: hills
  chosen_spanish: colinas
  alternatives_spanish:
  - cerros
  - lomas
  lexicon: HALOT
  rationale: Se reserva un término menor que 'montes' para respetar el contraste poético del hebreo.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eternas
  alternatives_spanish:
  - perpetuas
  - de larga duración
  - antiguas
  lexicon: HALOT
  rationale: En esta descripción poética, עוֹלָם puede expresar duración perdurable. 'Eternas' reproduce el tono elevado y la correspondencia con 'antiguos'.
translation_notes:
  revision_awareness: Revisado a partir del texto hebreo WLC y del rastro de auditoría en inglés. Se ajustó el español para que las notas queden ancladas explícitamente en las palabras traducidas y no queden marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre 'montes antiguos' y 'colinas eternas'.
  - Se eligió 'desde' para reflejar la partícula מִ/מֵ- de procedencia.
  - Se preservó la tensión semántica entre lectura espacial y cualitativa en מֵרֹאשׁ mediante nota textual anclada.
