  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La decisión verbal para el jussivo imprecatorio es correcta. El principal ajuste es léxico: preferir un equivalente general para בגד y una expresión que preserve mejor el valor de עטה.'
