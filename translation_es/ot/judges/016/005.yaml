revisions:
- from: 'Entonces los señores de los filisteos subieron a ella y le dijeron[a]: «Engáñalo, y mira en qué consiste su gran fuerza, y por qué medio podremos prevalecer contra él, para que lo atemos y lo aflijamos; y cada uno de nosotros te dará mil cien piezas de plata».'
  to: 'Entonces los señores de los filisteos fueron a verla y le dijeron: «Sedúcelo, y mira en qué consiste su gran fuerza, y por qué medio podremos prevalecer contra él, para que lo atemos y lo aflijamos; y cada uno de nosotros te dará mil cien piezas de plata[a]».'
  rationale: Se corrige un calco poco natural («subieron a ella») por una expresión idiomática fiel al movimiento hacia Dalila; se ajusta פַּתִּי a «Sedúcelo», que preserva mejor el sentido de atraer/inducir para obtener información en este contexto; y se reubica la nota monetaria al sintagma que realmente explica.
