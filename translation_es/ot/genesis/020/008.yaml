  to: Así que Abimelec se levantó muy de madrugada, llamó a todos sus siervos[a] y habló todas estas cosas en presencia de ellos[b], y los hombres tuvieron mucho miedo.
  rationale: Se corrige el modismo de בְּאָזְנֵיהֶם para evitar el sentido erróneo de hablar «al oído» y para expresar en español natural que Abimelec les comunicó estas cosas abiertamente y de manera audible. Se mantienen las demás decisiones, que son sustancialmente fieles al hebreo y al expediente inglés.
