translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Extiende tu mano hacia el cielo[a], para que caiga granizo sobre toda la tierra de Egipto, sobre el hombre[b] y sobre la bestia y sobre toda planta del campo en la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia los cielos». El hebreo puede referirse al cielo visible o a los cielos; aquí el contexto habla del ámbito desde el cual cae el granizo.
    reason: lexical_alternative
  - marker: b
    text: «El hombre» aquí se refiere a los seres humanos en general, en contraste con «la bestia».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el nombre divino: transliterar el Tetragrámaton en lugar de sustituirlo por un título. «Yahvé» mantiene el carácter propio del nombre revelado y es el equivalente español más asentado en este marco.'
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Alarga
  - Extiende la mano
  lexicon: HALOT
  rationale: El imperativo de נטה pide un gesto físico dirigido. En español, «extiende» comunica con naturalidad la acción de alzar o estirar la mano, sin cargarlo con matices ajenos.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: HALOT
  rationale: El hebreo usa el término ordinario para «mano». No hay motivo contextual para ampliar a «brazo»; «tu mano» conserva el paralelismo con el mandato de extenderla hacia el cielo.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo visible
  - hacia los cielos
  - hacia el firmamento
  lexicon: HALOT
  rationale: El contexto meteorlógico de la plaga orienta la frase al ámbito visible desde el que cae el granizo. «Hacia el cielo» es natural en español y preserva la alternativa semántica entre «cielo» y «cielos» sin forzarla en el texto principal.
- source_word: וִיהִי
  english_pob_choice: so that hail may come
  chosen_spanish: para que caiga
  alternatives_spanish:
  - y haya granizo
  - para que haya granizo
  - y caiga granizo
  lexicon: HALOT
  rationale: 'La forma jussiva expresa resultado deseado tras el mandato. Dado que el sustantivo siguiente es «granizo», en español lo más claro es expresar el efecto del verbo: «para que caiga», manteniendo el vínculo causal sin recargar la frase.'
- source_word: בָרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - granizada
  - hielo
  lexicon: HALOT
  rationale: «Granizo» es el término normal y preciso en español para el fenómeno meteorológico de la plaga.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  - sobre toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Sobre» reproduce bien la idea de precipitación del granizo sobre la tierra, y «toda la tierra de Egipto» conserva la amplitud total del hebreo.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la gente
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: En contraste con «la bestia», el hebreo usa אדם en sentido representativo general. «El hombre» conserva esa fuerza genérica y la simetría del par hebreo, sin diluirlo en una paráfrasis abstracta.
- source_word: הַבְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el ganado
  - los animales
  - el ganado doméstico
  lexicon: HALOT
  rationale: La POB inglesa preserva la correspondencia compacta con «man». «La bestia» mantiene ese contraste directo y la economía del texto fuente.
- source_word: כָּל עֵשֶׂב הַשָּׂדֶה
  english_pob_choice: every plant of the field
  chosen_spanish: toda planta del campo
  alternatives_spanish:
  - toda hierba del campo
  - toda vegetación del campo
  - todo pasto del campo
  lexicon: HALOT
  rationale: עֵשֶׂב abarca hierba, vegetación o plantas pequeñas. «Planta» ofrece una solución amplia y clara en español, adecuada al daño agrícola descrito, y «del campo» conserva el vínculo genitivo.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en la región de Egipto
  lexicon: HALOT
  rationale: Se conserva la repetición final porque el hebreo la usa con valor de énfasis y alcance. «Tierra de Egipto» corresponde al registro bíblico sin caer en una formulación innecesariamente técnica.
theological_decisions:
- issue: Nombre divino en español para יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El proyecto establece como norma principal transliterar el nombre divino. «Yahvé» evita la sustitución por un título y mantiene la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido genérico de הָאָדָם frente a la bestia
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  - la gente
  rationale: El hebreo está en singular con valor representativo y en paralelo con «la bestia». «El hombre» conserva la simetría lexical y la fuerza colectiva sin borrar la forma de origen.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: אָדָם adam → man / humankind (context)'
- issue: Relación causal de וִיהִי con el mandato previo
  english_pob_reading: so that hail may come
  chosen_spanish_reading: para que caiga
  alternative_spanish_readings:
  - y caiga granizo
  - para que haya granizo
  rationale: La jussiva expresa finalidad o resultado deseado, no simple yuxtaposición. «Para que caiga» comunica el vínculo de mandato-resultado y evita una lectura menos precisa del movimiento del granizo.
  doctrine_reference: Grammar note on jussive/resultative Hebrew forms
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que sustituyó «come over» por «fall on» para expresar con más naturalidad la acción del granizo. En español se adopta directamente una formulación de precipitación («caiga granizo sobre»), preservando el sentido revisado y la precisión meteorológica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino, en coherencia con el proyecto.
  - «Tierra de Egipto» se conserva dos veces porque el hebreo repite la expresión para amplitud y énfasis.
  - «El hombre» y «la bestia» conservan el contraste bíblico breve del original.
  - La frase final «en la tierra de Egipto» no se omite aunque parezca redundante en español, porque refleja la repetición enfática del hebreo.
