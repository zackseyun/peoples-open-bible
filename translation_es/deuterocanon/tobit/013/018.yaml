translation:
  language: es
  text: 'Y dirán todas sus calles: «¡Aleluya y alabanza!», diciendo: «Bendito es Dios, que ha exaltado a todos los siglos[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «que es exaltado para siempre» o «por todos los siglos». El griego dice literalmente «que ha exaltado a todos los siglos», una expresión inusual.'
    reason: alternative_reading
lexical_decisions:
- source_word: ῥῦμαι
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - callejuelas
  - avenidas
  - plazoletas
  lexicon: LSJ
  rationale: ῥῦμαι denota aquí calles o vías urbanas dentro de la imagen personificada de la ciudad; «calles» es el equivalente español más natural y fiel al registro.
- source_word: ἀλληλουιά
  english_pob_choice: Hallelujah
  chosen_spanish: Aleluya
  alternatives_spanish:
  - Hallelujah
  - Alabado sea Yahvé
  lexicon: LSJ
  rationale: El griego conserva la forma litúrgica transliterada; en español, «Aleluya» es la forma asentada y comunica ese mismo valor de aclamación.
- source_word: αἴνεσιν
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - loor
  - alabanzas
  lexicon: LSJ
  rationale: El sustantivo expresa alabanza; «alabanza» mantiene el paralelo con «Aleluya» y funciona bien en la exclamación.
- source_word: Εὐλογητός
  english_pob_choice: Blessed
  chosen_spanish: Bendito es
  alternatives_spanish:
  - Sea bendito
  - Alabado es
  - Bendito sea
  lexicon: LSJ
  rationale: Como predicado doxológico referido a Dios, «Bendito es Dios» reproduce bien la afirmación declarativa del griego sin forzar un subjuntivo exhortativo.
- source_word: ὕψωσεν
  english_pob_choice: has exalted
  chosen_spanish: ha exaltado
  alternatives_spanish:
  - ha levantado
  - ha enaltecido
  - ha puesto en alto
  lexicon: LSJ
  rationale: ὑψόω significa levantar o exaltar; «ha exaltado» conserva el tono solemne y la relación semántica con la elevación.
- source_word: πάντας τοὺς αἰῶνας
  english_pob_choice: all the ages
  chosen_spanish: todos los siglos
  alternatives_spanish:
  - todas las edades
  - por todos los siglos
  - para siempre
  lexicon: LSJ
  rationale: El griego dice literalmente «todos los siglos/edades». «Todos los siglos» preserva la forma extraña pero significativa, sin resolverla prematuramente en un simple «para siempre».
theological_decisions:
- issue: Sentido de πάντας τοὺς αἰῶνας al final de la doxología
  english_pob_reading: all the ages
  chosen_spanish_reading: todos los siglos
  alternative_spanish_readings:
  - para siempre
  - por todas las edades
  - en todos los siglos
  rationale: La frase griega es inusual y puede sugerir una temporalidad total o un sentido idiomático de eternidad. Se mantiene la literalidad en el texto principal para conservar la tensión textual, y el lector recibe la opción idiomática en nota.
  doctrine_reference: Preservar tensión léxica y teológica sin suavizarla; consistencia con el criterio POB de transparencia textual.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden sustancialmente; se conserva la rareza de πάντας τοὺς αἰῶνας en la línea principal y se traslada a nota la lectura idiomática más fluida. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se usó «Aleluya» como forma litúrgica estable, en lugar de traducirla como «Alabado Yahvé», porque el griego conserva la transliteración.
  - Se evitó «SEÑOR» para el nombre divino porque el versículo usa θεός, que aquí corresponde naturalmente a «Dios».
  - «Todos los siglos» mantiene la literalidad del original y la misma tensión documentada por la auditoría inglesa.
