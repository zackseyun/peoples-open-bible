translation:
  language: es
  text: Durante siete días ofrecerán una ofrenda de alimento[a] a Yahvé. El octavo día tendrán una santa convocación, y ofrecerán una ofrenda de alimento a Yahvé. Es una asamblea solemne; no harán ningún trabajo ordinario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por fuego». El hebreo אִשֶּׁה es el término sacrificial estándar para una ofrenda presentada por fuego; «ofrenda de alimento» se usa aquí como una traducción española clara y moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּקְרִיבוּ / וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - presentarán
  - traerán
  lexicon: HALOT
  rationale: El verbo hifil de קרב en este contexto cultual expresa llevar/presentar una ofrenda ante Dios. En español, «ofrecerán» comunica con naturalidad la acción sacrificial sin perder el sentido ritual; «presentarán» es posible pero algo más técnico, y «traerán» suena demasiado literal.
- source_word: אִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda de fuego
  lexicon: HALOT
  rationale: El término designa una ofrenda sacrificial relacionada con el fuego. Como en español «ofrenda encendida» conserva el vínculo con el fuego sin sonar tan extraño como un calco directo, se prefiere esta forma; se mantiene la tensión léxica con la nota alternativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la convención del proyecto. La preposición ל en contexto de ofrenda expresa dirección/dedicación, y en español «a Yahvé» es la formulación más natural.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una convocación santa
  - una asamblea santa
  lexicon: HALOT
  rationale: La expresión fija del calendario cultual se traduce de manera bastante directa para conservar su carácter técnico. «Santa convocación» mantiene el registro litúrgico y evita diluir el sentido institucional del término.
- source_word: עֲצֶרֶת
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea de solemnidad
  - una reunión solemne
  lexicon: HALOT
  rationale: El sustantivo apunta a una asamblea especial, marcada por solemnidad y restricción festiva. «Asamblea solemne» reproduce bien ese valor en español, sin desplazarlo hacia una simple reunión.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: no ordinary work
  chosen_spanish: ningún trabajo ordinario
  alternatives_spanish:
  - ninguna labor ordinaria
  - ningún trabajo de servicio
  lexicon: HALOT
  rationale: La expresión distingue el trabajo común o regular del servicio cultual. «Trabajo ordinario» comunica esa oposición de manera clara en español moderno y conserva la fuerza normativa del texto.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: On the eighth day
  chosen_spanish: El octavo día
  alternatives_spanish:
  - En el octavo día
  lexicon: HALOT
  rationale: La frase temporal es directa; en español, empezar con «El octavo día» mantiene fluidez y corresponde al valor temporal del hebreo.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: you shall have
  chosen_spanish: tendrán
  alternatives_spanish:
  - les corresponderá
  - será para ustedes
  lexicon: HALOT
  rationale: El hebreo usa una construcción existencial/dedicativa que en español se expresa con naturalidad mediante un verbo de posesión/tenencia en contexto normativo. «Tendrán» es idiomático y mantiene el carácter prescriptivo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Por siete días
  alternatives_spanish:
  - Durante siete días
  lexicon: HALOT
  rationale: La frase introduce duración obligatoria. «Por siete días» es una equivalencia natural y precisa en español para marcar el intervalo temporal.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme a la convención editorial del proyecto en español, se usa «Yahvé» como forma principal, preservando el nombre del pacto y evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nature of the offering term אִשֶּׁה
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda de fuego
  rationale: La tensión entre una traducción más literal y una más idiomática se mantiene en español con «ofrenda encendida». Esta forma conserva la relación con el fuego sacrificial sin imponer una paráfrasis ajena al registro cultual.
  doctrine_reference: HALOT, uso cultual de אִשֶּׁה en la legislación sacerdotal
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin depender mecánicamente de ella: se verificó el hebreo fuente, el valor cultual de קרב, אִשֶּׁה, מִקְרָא קֹדֶשׁ, עֲצֶרֶת y כָּל מְלֶאכֶת עֲבֹדָה, y se mantuvo la decisión editorial sobre el nombre divino como Yahvé. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la política española del proyecto.
  - Se usa «ofrenda encendida» de manera consistente para אִשֶּׁה y se ancla con nota alternativa.
  - «Santa convocación» y «asamblea solemne» conservan el registro técnico-litúrgico del texto.
  - «Trabajo ordinario» preserva la distinción normativa frente al trabajo común, sin suavizarla.
