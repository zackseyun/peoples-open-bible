translation:
  language: es
  text: 'Y harás una placa de oro puro[a], y grabarás sobre ella, como los grabados de un sello: «Santo para Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «lámina» u «ornamento frontal».
    reason: lexical_alternative
  - marker: b
    text: 'O: «Santidad para Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y debes hacer
  - Entonces harás
  lexicon: HALOT
  rationale: El hebreo es una orden en secuencia dentro de instrucciones rituales. «Harás» conserva el valor directivo con español natural y solemne.
- source_word: צִּיץ
  english_pob_choice: plate
  chosen_spanish: placa
  alternatives_spanish:
  - lámina
  - ornamento frontal
  - roseta
  lexicon: HALOT
  rationale: En este contexto el término designa una pieza de oro llevada sobre el tocado del sumo sacerdote. «Placa» refleja bien el objeto material sin cargarlo con una interpretación tradicional innecesaria.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro fino
  - de oro limpio
  lexicon: HALOT
  rationale: La construcción hebrea describe material y calidad. «De oro puro» es la equivalencia más directa y clara en español.
- source_word: וּפִתַּחְתָּ עָלָיו
  english_pob_choice: and engrave on it
  chosen_spanish: y grabarás sobre ella
  alternatives_spanish:
  - y inscribirás sobre ella
  - y tallarás sobre ella
  lexicon: HALOT
  rationale: El verbo en este contexto se refiere al trabajo de grabado sobre metal. «Grabar» comunica mejor la acción artesanal que «inscribir» o «tallar».
- source_word: פִּתּוּחֵי חֹתָם
  english_pob_choice: like the engravings of a seal
  chosen_spanish: con grabado de sello
  alternatives_spanish:
  - como los grabados de un sello
  - con grabado como de sello
  lexicon: HALOT
  rationale: El hebreo compara el estilo del texto con el grabado de un sello. «Con grabado de sello» conserva la comparación de manera breve y apta para una inscripción.
- source_word: קֹדֶשׁ
  english_pob_choice: Holy
  chosen_spanish: Santo
  alternatives_spanish:
  - Santificado
  - Santidad
  lexicon: HALOT
  rationale: En la fórmula inscrita, קֹדֶשׁ funciona como una declaración breve y formal. «Santo» mantiene el tono conciso del letrero/inscripción.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahveh
  - a Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto. «Para» expresa bien la dedicación inscrita en la fórmula ritual.
theological_decisions:
- issue: La fórmula inscrita קֹדֶשׁ לַיהוָה
  english_pob_reading: Holy to Yahweh
  chosen_spanish_reading: Santo para Yahvé
  alternative_spanish_readings:
  - Santidad para Yahvé
  rationale: El hebreo es una fórmula brevísima y dedicatoria. Se opta por «Santo para Yahvé» para mantener el carácter de inscripción y la tensión entre adjetivo y sustantivo, dejando «Santidad para Yahvé» como alternativa viable.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension where ambiguity is genuine
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El nombre divino se translitera como «Yahvé» conforme al criterio del proyecto, evitando la sustitución por un título y conservando el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «the engraving» a «the engravings» para reflejar mejor el plural hebreo פִּתּוּחֵי; en español se preserva la idea de grabado como estilo de inscripción mediante «con grabado de sello», sin sobrecargar el texto. También se mantuvo la decisión auditada de traducir el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene un registro ritual y sobrio, apropiado para vestimenta sacerdotal.
  - La fórmula final se conserva breve y epigráfica, sin añadir verbos o conectores interpretativos innecesarios.
