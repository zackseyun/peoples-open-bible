  to: Y también[a], ¿qué son ustedes para mí, Tiro y Sidón, y todas las regiones[b] de Filistea? ¿Me están retribuyendo? Y si me están retribuyendo, con rapidez y prontitud haré volver su retribución sobre su propia cabeza.
  rationale: Se ajustó el registro al español neutral latinoamericano ('ustedes', 'su') y se sustituyó 'pagar/pago' por 'retribuir/retribución' para reflejar mejor el campo semántico judicial de גמול/שלם documentado en la auditoría. También se eligió 'regiones' como texto principal porque suena más natural y sigue una de las alternativas documentadas del inglés, manteniendo 'distritos' y 'territorios' en nota. 'Haré volver su retribución' preserva mejor la imaginería de אָשִׁיב que simplemente 'devolveré', sin perder naturalidad.
