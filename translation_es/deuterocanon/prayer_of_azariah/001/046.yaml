translation:
  language: es
  text: ¡Bendigan al Señor, escarcha y frío; cántenle alabanzas y exáltenlo en gran manera para siempre!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a ofrecer alabanza doxológica. «Bendecid» conserva mejor que «alabad» el valor litúrgico de εὐλογέω en este himno.
- source_word: πάγος
  english_pob_choice: frost
  chosen_spanish: escarcha
  alternatives_spanish:
  - hielo
  - helada
  lexicon: LSJ
  rationale: En la pareja con ψῦχος, el sentido atmosférico es el más natural. «Escarcha» distingue mejor la capa congelada o helada del simple frío general.
- source_word: ψῦχος
  english_pob_choice: cold
  chosen_spanish: frío
  alternatives_spanish:
  - frialdad
  - hiel
  lexicon: LSJ
  rationale: El sustantivo significa frío o frescura fría. «Frío» es la equivalencia más directa e idiomática en español, especialmente junto a «escarcha».
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: Aquí κύριον se traduce como «el Señor» conforme al uso estándar del POB para κύριος en este contexto griego; no hay indicio en el texto inmediato de que deba explicitarse el nombre divino con «Yahvé».
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - cantadlo
  - himnadlo
  - alabadlo cantando
  lexicon: LSJ
  rationale: El verbo expresa cantar un himno o canto de alabanza. «Cantadle alabanzas» transmite la dimensión musical sin perder la relación directa con el objeto del mandato.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo altamente
  alternatives_spanish:
  - exaltadlo grandemente
  - ensalzádlo sobremanera
  lexicon: LSJ
  rationale: El compuesto intensifica el acto de exaltar. «Exaltadlo altamente» preserva la fuerza enfática y mantiene un registro bíblico claro en español.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión idiomática comunica duración sin fin. «Para siempre» es la forma más natural y transparente en español para este refrán doxológico.
theological_decisions:
- issue: Traducción de κύριος en un himno de alabanza deuterocanónico griego
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: El texto griego tiene κύριον y el POB inglés adopta 'the Lord'. En este pasaje no hay una razón textual inmediata para forzar la convención de mayúsculas del Tetragrámaton ni para sustituirlo por el nombre Yahvé en el cuerpo del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Alcance de la doxología dirigida a elementos de la creación
  english_pob_reading: Bless the Lord, frost and cold; sing praise to him and highly exalt him forever.
  chosen_spanish_reading: Bendecid al Señor, escarcha y frío; cantadle alabanzas y exaltadlo altamente para siempre.
  alternative_spanish_readings:
  - Bendecid al Señor, escarcha y frío; alabadlo y ensalzádlo para siempre.
  - Bendecid al Señor, escarcha y frío; cantad himnos y engrandecedlo para siempre.
  rationale: 'La sintaxis conserva el mandato poético a la creación y mantiene dos acciones distintas: cantar alabanzas y exaltar. No se atenúa la personificación ni se reemplaza por una paráfrasis más libre.'
  doctrine_reference: Poética doxológica de Daniel 3 / Prayer of Azariah
translation_notes:
  revision_awareness: La traducción sigue el pasaje griego normalizado de Swete LXX 1909 para PAZ 1:46 y coincide con la línea auditada del POB inglés ('Bless the Lord, frost and cold; sing praise to him and highly exalt him forever.'). No se detectaron revisiones aplicadas en el historial más reciente, y la concordancia de revisión indica acuerdo alto sin incidencias.
  spanish_consistency_notes:
  - Se usa «el Señor» como forma estándar para κύριος en este contexto, conforme al marco doctrinal del proyecto y al audit trail inglés.
  - Se eligió «escarcha y frío» para mantener la distinción semántica entre πάγος y ψῦχος en español.
  - «Cantadle alabanzas» preserva el matiz musical de ὑμνεῖτε sin desplazarlo a una simple repetición de «alabar».
  - «Para siempre» traduce el idiomático εἰς τοὺς αἰῶνας de forma natural y reverente.
  - No se introdujo nota al pie porque no hay variante textual ni ambigüedad adicional que requiera marcación en el verso.
