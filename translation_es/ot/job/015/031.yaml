translation:
  language: es
  text: No confíe en el vacío[a], engañándose a sí mismo[b], porque el vacío será su retribución[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en la vanidad", "en la falsedad" o "en lo que no vale nada". El hebreo שָׁוְא también puede expresar vaciedad, falsedad o inutilidad; se traduce "vacío" para conservar ese sentido y la repetición del término en el versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "extraviándose", "siendo llevado por mal camino" o "siendo engañado". El hebreo también puede entenderse como "siendo desviado"; aquí se traduce de manera que expresa el autoengaño implícito.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "su recompensa" o "lo que recibirá a cambio". תְּמוּרָה puede denotar intercambio, retorno o lo recibido a cambio; "retribución" conserva la idea de lo que le vuelve como resultado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / יַאֲמֵן
  english_pob_choice: Let him not trust
  chosen_spanish: No confíe
  alternatives_spanish:
  - No crea
  - No ponga su confianza
  lexicon: HALOT
  rationale: 'El hebreo usa una prohibición con imperfecto/jusivo; en español, la forma natural y fiel en este contexto exhortativo es una prohibición directa en tercera persona: ''No confíe''. Conserva el valor de advertencia más que una mera afirmación proposicional.'
- source_word: בְּשָׁוְא
  english_pob_choice: in emptiness
  chosen_spanish: en la vanidad
  alternatives_spanish:
  - en la vaciedad
  - en la falsedad
  - en lo que no vale nada
  lexicon: HALOT
  rationale: שָׁוְא admite 'vanidad', 'vaciedad', 'falsedad' o 'nulidad'. 'Vanidad' mantiene el campo semántico tradicional y poético, y permite conservar bien la repetición del término en el verso.
- source_word: נִתְעָה
  english_pob_choice: deceiving himself
  chosen_spanish: engañándose a sí mismo
  alternatives_spanish:
  - desviándose
  - yendo extraviado
  - siendo engañado
  lexicon: HALOT
  rationale: El nifal de תעה puede expresar extravío o ser llevado por mal camino. En este contexto, tras 'confiar en la vanidad', la lectura resultante es de autoengaño; 'engañándose a sí mismo' comunica esa fuerza sin perder la idea de extravío implícita.
- source_word: שָׁוְא
  english_pob_choice: emptiness
  chosen_spanish: la vanidad
  alternatives_spanish:
  - la vaciedad
  - la nulidad
  - la falsedad
  lexicon: HALOT
  rationale: Se repite deliberadamente el mismo término español para reflejar la repetición retórica del hebreo. 'Vanidad' funciona aquí como equivalente consistente de שָׁוְא y preserva el contraste poético con el resultado final.
- source_word: תְּמוּרָתוֹ
  english_pob_choice: his recompense
  chosen_spanish: su retribución
  alternatives_spanish:
  - su pago
  - su recompensa
  - lo que recibirá a cambio
  lexicon: HALOT
  rationale: תְּמוּרָה puede significar intercambio, retorno o lo recibido a cambio. 'Retribución' mantiene la idea de resultado recibido en correspondencia con lo buscado, sin reducirlo a una mera 'recompensa' positiva.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; se mantiene la lectura óptima ya aprobada, conservando la repetición de שָׁוְא y la ambigüedad productiva entre extravío y autoengaño en una forma española idiomática.
  spanish_consistency_notes:
  - Se usa 'vanidad' de manera uniforme para ambas apariciones de שָׁוְא, reflejando la repetición del original.
  - '''No confíe'' conserva el matiz exhortativo/prohibitivo del hebreo mejor que una simple negación descriptiva.'
  - '''Engañándose a sí mismo'' explicita el sentido contextual preferido por el POB inglés, aunque el hebreo también admite la idea de extravío.'
  - '''Retribución'' se eligió para תְּמוּרָתוֹ por su capacidad de expresar resultado devuelto o correspondencia, sin forzar una noción moral ajena al contexto poético.'
