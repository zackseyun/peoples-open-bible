translation:
  language: es
  text: Cuando llegué a Jerusalén, entendí el mal que había hecho Eliasib para Tobías, al hacerle una sala[a] en los atrios de la casa de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuarto'; el término hebreo puede referirse a una estancia, sala o habitación dentro del complejo del templo.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'la casa de Dios' se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: וָאָב֖וֹא
  english_pob_choice: When I came
  chosen_spanish: Cuando llegué
  alternatives_spanish:
  - Y llegué
  - Cuando vine
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de בוא se expresa de forma natural en español con una subordinada temporal. 'Cuando llegué' conserva el valor temporal de la secuencia sin sonar forzado.
- source_word: לִירוּשָׁלִָ֑ם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - a la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición direccional se vierte de manera directa con 'a Jerusalén'.
- source_word: וָאָבִ֣ינָה
  english_pob_choice: I understood
  chosen_spanish: entendí
  alternatives_spanish:
  - comprendí
  - percibí
  - me di cuenta
  lexicon: HALOT
  rationale: בין aquí expresa comprensión cognitiva al llegar. 'Entendí' preserva ese sentido con claridad y dignidad. Se evita 'me di cuenta' por ser más coloquial.
- source_word: בָרָעָ֗ה
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el mal hecho
  - la cosa mala
  lexicon: HALOT
  rationale: Se mantiene el peso moral de רָעָה. 'El mal' es directo y permite conservar la evaluación ética fuerte del texto.
- source_word: אֲשֶׁ֨ר עָשָׂ֤ה
  english_pob_choice: that ... had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que había cometido
  lexicon: HALOT
  rationale: El pluscuamperfecto en español ayuda a marcar que la acción de Eliasib precede a la percepción de Nehemías. 'Había hecho' sigue de cerca el verbo hebreo sin sobreinterpretar.
- source_word: אֶלְיָשִׁיב֙
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliasib
  lexicon: transliteration
  rationale: Se usa la transliteración bíblica habitual en español, adaptada fonéticamente como 'Eliasib'.
- source_word: לְ/ט֣וֹבִיָּ֔ה
  english_pob_choice: for Tobiah
  chosen_spanish: para Tobías
  alternatives_spanish:
  - a favor de Tobías
  - para beneficio de Tobías
  lexicon: HALOT
  rationale: El ל indica aquí beneficio o ventaja. 'Para Tobías' conserva esa orientación y es idiomático en español bíblico contemporáneo.
- source_word: לַ/עֲשׂ֥וֹת ל/וֹ֙ נִשְׁכָּ֔ה
  english_pob_choice: by making a chamber for him
  chosen_spanish: al hacerle una cámara
  alternatives_spanish:
  - al hacerle un cuarto
  - al prepararle una cámara
  - al hacerle una habitación
  lexicon: HALOT
  rationale: La construcción infinitiva con ל expresa el medio o la manera del acto. 'Al hacerle' reproduce bien esa función. Se elige 'cámara' para נִשְׁכָּה siguiendo la revisión inglesa más formal y la referencia al espacio dentro del recinto del templo.
- source_word: נִשְׁכָּ֔ה
  english_pob_choice: chamber
  chosen_spanish: cámara
  alternatives_spanish:
  - chambre
  - cuarto
  - habitación
  lexicon: HALOT
  rationale: נִשְׁכָּה designa una estancia dentro del complejo del templo. 'Cámara' es más formal y más preciso que 'habitación', y evita reducir demasiado el sentido arquitectónico.
- source_word: בְּ/חַצְרֵ֖י
  english_pob_choice: in the courts
  chosen_spanish: en los atrios
  alternatives_spanish:
  - en los patios
  - en las cortes
  - en los recintos
  lexicon: HALOT
  rationale: En contexto del templo, חצרות se traduce mejor como 'atrios', término natural en español bíblico para los recintos sagrados del templo.
- source_word: בֵּ֥ית הָ/אֱלֹהִֽים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Dios, es decir, el templo
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'casa de Dios', como en el inglés POB, sin sustituirla por 'templo' en el texto principal. Esto conserva la formulación hebrea y permite una nota aclaratoria.
theological_decisions:
- issue: Carácter moral de la acción de Eliasib
  english_pob_reading: Render רָעָה as 'the evil' rather than a softer term
  chosen_spanish_reading: Traducir רָעָה como 'el mal' para conservar la acusación moral fuerte
  alternative_spanish_readings:
  - la maldad
  - el daño
  - la cosa mala
  rationale: El texto no describe solo una imprudencia sino una acción moralmente mala respecto de la santidad del lugar. 'El mal' conserva ese peso sin agregar comentario interpretativo.
  doctrine_reference: Principio de primacía del idioma original; preservar la evaluación ética explícita del texto.
- issue: Referencia cultural de 'la casa de Dios'
  english_pob_reading: '''The house of God'' refers to the temple.'
  chosen_spanish_reading: Mantener 'la casa de Dios' en el texto y explicarlo como el templo en nota
  alternative_spanish_readings:
  - el templo de Dios
  - la casa de Dios
  rationale: La forma literal preserva la expresión hebrea, mientras que la nota aclara el referente cultural para el lector hispanohablante. Así se evita perder la textura del original.
  doctrine_reference: Claridad cultural sin sustitución innecesaria del giro bíblico original.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'chamber' frente a 'room' para נִשְׁכָּה. En español se siguió esa preferencia con 'cámara', manteniendo además la precisión del contexto del templo y la evaluación moral fuerte de רָעָה. No se introdujeron cambios textuales adicionales respecto del sentido base del audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'casa de Dios' como expresión literal, con aclaración cultural en nota.
  - Se usa 'Eliasib' y 'Tobías' con transliteración española habitual.
  - Se eligió 'atrios' para el espacio del templo por coherencia con el uso bíblico en español.
  - Se conservó la temporalidad narrativa con 'Cuando llegué' y 'había hecho' para reflejar la secuencia del hebreo.
