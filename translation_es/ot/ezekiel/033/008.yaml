revisions:
- from: 'Cuando yo diga al malvado[a]: “Malvado, de cierto morirás”, y tú no le hables para advertir al malvado de su camino, ese malvado morirá por su iniquidad; pero su sangre demandaré de tu mano.'
  to: 'Cuando yo diga al malvado[a]: «Malvado, ciertamente morirás», y tú no hables para advertir al malvado de su camino, ese malvado morirá en su iniquidad; pero demandaré su sangre de tu mano.[b]'
  rationale: La revisión corrige un error de modo verbal en español, mejora la naturalidad sin perder solemnidad, restituye explícitamente el objeto «su sangre» en el modismo forense, y alinea «en su iniquidad» con la decisión léxica/teológica del POB inglés. No requiere adjudicación especial.
  reviewer_model: gpt-5.4
