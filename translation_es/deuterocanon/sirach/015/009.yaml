  revision_rationale: 'Se conserva la traducción principal porque es fiel al hebreo y al razonamiento del POB, con una mejora menor de naturalidad («en boca de»). Se corrige la nota para ajustarla al glosario del proyecto: la lectura griega con κύριος debe reflejarse como «Yahvé», no «Señor». No se requiere adjudicación adicional.'
