revisions:
- from: 'Entonces el pueblo fue a Moisés y dijo: «Hemos pecado, porque hemos hablado contra Yahvé y contra ti. Ruega a Yahvé, para que quite de nosotros[a] la serpiente». Y Moisés oró por el pueblo.'
  to: 'Entonces el pueblo fue a Moisés y dijo: «Hemos pecado, porque hemos hablado contra Yahvé y contra ti. Ruega a Yahvé, para que quite de encima de nosotros la serpiente[a]». Y Moisés oró por el pueblo.'
  rationale: Se conserva la traducción general del borrador, pero se corrige una construcción poco natural en español («quite de nosotros») por «quite de encima de nosotros», que expresa mejor el valor de מֵעָלֵינוּ. También se corrige la nota al pie para que aporte una alternativa real y se ancla correctamente en «la serpiente», que es el término afectado por la observación sobre el singular colectivo.
