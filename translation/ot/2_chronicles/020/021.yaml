id: 2CH.20.21
reference: 2 Chronicles 20:21
source:
  edition: WLC
  text: וַ/יִּוָּעַץ֙ אֶל הָ/עָ֔ם וַ/יַּעֲמֵ֤ד מְשֹֽׁרֲרִים֙ לַ/יהוָ֔ה וּֽ/מְהַֽלְלִ֖ים לְ/הַדְרַת קֹ֑דֶשׁ בְּ/צֵאת֙ לִ/פְנֵ֣י הֶֽ/חָל֔וּץ וְ/אֹֽמְרִים֙ הוֹד֣וּ לַ/יהוָ֔ה כִּ֥י לְ/עוֹלָ֖ם חַסְדּֽ/וֹ־־׃
translation:
  text: After consulting with the people[a], he appointed singers to Yahweh, who praised the splendor of holiness as they went out before the vanguard, saying, “Give thanks to Yahweh[c][b], for his steadfast love endures forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the beauty of holiness.” The Hebrew phrase may also be rendered “holy splendor.”
    reason: lexical_alternative
  - marker: b
    text: Or “before the advance troops” or “before the front line.”
    reason: lexical_alternative
  - marker: c
    text: Or “for his mercy endures forever.” The Hebrew חֶסֶד includes the sense of steadfast, covenantal love.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ אֶל הָעָם
  chosen: After consulting with the people
  alternatives:
  - and he took counsel with the people
  - and he consulted the people
  lexicon: HALOT
  rationale: The Niphal of יעץ here conveys taking counsel/consulting. 'After consulting with the people' gives natural English while preserving the sequence and the involvement of the people in deliberation.
- source_word: וַיַּעֲמֵד
  chosen: he appointed
  alternatives:
  - he stationed
  - he set
  lexicon: HALOT
  rationale: עמד in the Hiphil can mean cause to stand, set, station, or appoint. In context of assigning liturgical personnel before battle, 'appointed' best captures the administrative action rather than mere physical placement.
- source_word: מְשֹׁרֲרִים
  chosen: singers
  alternatives:
  - those who sing
  - musicians
  lexicon: HALOT
  rationale: The participial/nominal form from שׁיר refers specifically to singers. 'Musicians' would be too broad.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל can be rendered 'to' or 'for' here. 'To the LORD' fits the idea of directed praise. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: וּמְהַלְלִים
  chosen: those praising
  alternatives:
  - and praising
  - praisers
  lexicon: HALOT
  rationale: The participle functions appositionally with 'singers.' Rendering it as 'those praising' preserves the descriptive force without overloading the sentence.
- source_word: לְהַדְרַת קֹדֶשׁ
  chosen: the splendor of holiness
  alternatives:
  - holy splendor
  - the beauty of holiness
  lexicon: HALOT
  rationale: This phrase can denote either the holy splendor belonging to God/worship or the splendor characterized by holiness. 'The splendor of holiness' is transparent and close to the Hebrew. 'Beauty of holiness' is traditional but slightly more interpretive/stylistic.
- source_word: בְּצֵאת
  chosen: as they went out
  alternatives:
  - when they went out
  - in going out
  lexicon: HALOT
  rationale: The infinitive construct with ב marks contemporaneous action. 'As they went out' reads naturally and preserves the temporal sense.
- source_word: לִפְנֵי הֶחָלוּץ
  chosen: before the vanguard
  alternatives:
  - before the army
  - before those armed for battle
  - before the front line
  lexicon: HALOT
  rationale: החלוץ refers to the force going ahead, the vanguard or advance troops, not the whole army. 'Vanguard' is concise and accurate.
- source_word: וְאֹמְרִים
  chosen: saying
  alternatives:
  - and saying
  - while saying
  lexicon: HALOT
  rationale: A standard participial introduction to direct speech; 'saying' is idiomatic in English.
- source_word: הוֹדוּ לַיהוָה
  chosen: Give thanks to the LORD
  alternatives:
  - Praise the LORD
  - Confess to the LORD
  lexicon: HALOT
  rationale: ידה in the Hiphil in worship contexts commonly means give thanks/praise. Because the following clause gives the reason for thanksgiving, 'Give thanks to the LORD' is the most precise rendering.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  chosen: for his steadfast love endures forever
  alternatives:
  - for his lovingkindness is forever
  - for his covenant faithfulness is everlasting
  - for his mercy endures forever
  lexicon: HALOT
  rationale: חסד carries covenantal love, loyal love, mercy, and steadfast love. 'Steadfast love' is a strong established English equivalent that preserves covenantal depth without archaic wording. 'Endures' is supplied naturally to complete the verbless Hebrew clause.
