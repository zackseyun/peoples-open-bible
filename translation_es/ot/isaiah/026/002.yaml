translation:
  language: es
  text: Abran las puertas, para que entre la nación justa, la que guarda la fidelidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la verdad» o «la fe». El hebreo אֱמֻנִים puede denotar fidelidad, confiabilidad o verdad según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְח֖וּ
  english_pob_choice: Open
  chosen_spanish: Abrid
  alternatives_spanish:
  - Abre
  - Abran
  lexicon: HALOT
  rationale: Es un imperativo plural directo; «Abrid» conserva con precisión el mandato y el tono exhortativo del hebreo.
- source_word: שְׁעָרִ֑ים
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - los portones
  - las entradas
  lexicon: HALOT
  rationale: En español, «puertas» comunica de forma natural la imagen de acceso urbano/cívico. Aunque el hebreo dice literalmente «gates», el contexto permite esta equivalencia clara y digna.
- source_word: וְיָבֹ֥א
  english_pob_choice: that ... may enter
  chosen_spanish: para que entre
  alternatives_spanish:
  - y entre
  - para que pueda entrar
  lexicon: HALOT
  rationale: El hebreo con imperativo seguido de imperfecto expresa finalidad o resultado. «Para que entre» refleja bien esa relación y suena natural en español.
- source_word: גוֹי
  english_pob_choice: nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: «Nación» preserva el sentido colectivo-político y el trasfondo covenantal del término mejor que «pueblo» en este contexto.
- source_word: צַדִּ֖יק
  english_pob_choice: righteous
  chosen_spanish: justa
  alternatives_spanish:
  - recta
  - righteous
  lexicon: HALOT
  rationale: «Justa» mantiene el valor moral y relacional del adjetivo. En español, aquí suena más natural que «recta» y conserva la fuerza bíblica del término.
- source_word: שֹׁמֵ֥ר
  english_pob_choice: one that keeps
  chosen_spanish: la que guarda
  alternatives_spanish:
  - la que observa
  - la que mantiene
  lexicon: HALOT
  rationale: El participio funciona de manera atributiva. Dado que «nación» es femenino en español, «la que guarda» mantiene la concordancia y el matiz de custodia/fidelidad.
- source_word: אֱמֻנִֽים
  english_pob_choice: faithfulness
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la fe
  - la verdad
  - la confiabilidad
  lexicon: HALOT
  rationale: El sustantivo plural intensivo puede abarcar fe, verdad o confiabilidad, pero en este contexto el POB entiende la idea de fidelidad constante. «Fidelidad» expresa bien esa lealtad perseverante sin reducirla a mera creencia subjetiva.
theological_decisions:
- issue: Sentido de אֱמֻנִים aplicado a la nación justa
  english_pob_reading: faithfulness
  chosen_spanish_reading: la fidelidad
  alternative_spanish_readings:
  - la verdad
  - la fe
  rationale: 'La frase describe una identidad ética y covenantal: una nación caracterizada por fidelidad estable. «La fidelidad» conserva esa fuerza y evita estrechar el sentido a «fe» en sentido interior solamente.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «so that ... may enter» a «that ... may enter»; en español se optó por «para que entre», que conserva con naturalidad la finalidad/resultad o implícita del hebreo y evita una calca forzada.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino por la convención editorial del proyecto cuando corresponda; aquí no fue necesario.
  - Se evitó «siervo» u otros términos no relevantes al versículo.
  - La concordancia femenina de «la nación ... la que guarda» sigue el género de «nación» en español y mantiene la relación atributiva del participio hebreo.
