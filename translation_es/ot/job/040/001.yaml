lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, 'respondió' conserva la fórmula narrativa de diálogo y expresa bien la idea de ענה en este contexto. 'Contestó' también sería posible, pero 'respondió' suena más sobrio y natural en registro bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: traducir יְהוָה como ''Yahvé'', nombre propio divino, en lugar de una sustitución titulada como ''SEÑOR''. ''Jehová'' queda como alternativa histórica, pero no como opción principal.'
- source_word: אֶת
  english_pob_choice: '[direct object marker, not translated]'
  chosen_spanish: '[marcador de objeto directo, no traducido]'
  lexicon: HALOT
  rationale: אֶת solo marca que 'Job' es objeto directo. No tiene equivalente natural en español y, como en la traducción inglesa, no se representa explícitamente.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma establecida en español.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: אמר se traduce normalmente 'decir'. 'Y dijo' mantiene la secuencia narrativa y reproduce de manera directa la fórmula de introducción al discurso.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura española elegida preserva el nombre personal de Dios y sigue la línea doctrinal indicada para el proyecto; se evita la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el cruce de control reporta alto acuerdo, por lo que no hay tensiones textuales adicionales que reflejar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma consistente para יְהוָה.
  - Se conserva el verbo de habla en pasado simple para reflejar la secuencia narrativa hebrea.
  - No se traduce el marcador de objeto directo אֶת, conforme al criterio auditado.
