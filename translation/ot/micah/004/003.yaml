id: MIC.4.3
reference: Micah 4:3
source:
  edition: WLC
  text: וְ/שָׁפַ֗ט בֵּ֚ין עַמִּ֣ים רַבִּ֔ים וְ/הוֹכִ֛יחַ לְ/גוֹיִ֥ם עֲצֻמִ֖ים עַד רָח֑וֹק וְ/כִתְּת֨וּ חַרְבֹתֵי/הֶ֜ם לְ/אִתִּ֗ים וַ/חֲנִיתֹֽתֵי/הֶם֙ לְ/מַזְמֵר֔וֹת לֹֽא יִשְׂא֞וּ גּ֤וֹי אֶל גּוֹי֙ חֶ֔רֶב וְ/לֹא יִלְמְד֥וּ/ן ע֖וֹד מִלְחָמָֽה־־־־׃
translation:
  text: And he will judge between many peoples[a], and will arbitrate for strong nations far away; and they will beat their swords into plowshares and their spears into pruning hooks. Nation will not lift up sword against nation[c][b], nor will they learn war anymore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and will reprove' / 'and will arbitrate' for strong nations far away.
    reason: lexical_alternative
  - marker: b
    text: Or 'plow blades' for 'plowshares.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'learn war' may also mean 'train for war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַט
  chosen: and he will judge
  alternatives:
  - and he shall judge
  - and he will govern
  lexicon: HALOT
  rationale: שׁפט commonly denotes judging/governing. In this context of international arbitration, 'judge' best preserves the judicial sense without overexpanding to 'govern.' Future sense is appropriate in prophetic discourse.
- source_word: בֵּין עַמִּים רַבִּים
  chosen: between many peoples
  alternatives:
  - among many peoples
  - between many nations
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' here, distinguishing ethnic/political groups broadly rather than modern nation-states. 'Between' matches בֵּין straightforwardly.
- source_word: וְהוֹכִיחַ
  chosen: and will decide disputes
  alternatives:
  - and will reprove
  - and will arbitrate
  - and will render decisions
  lexicon: HALOT
  rationale: יכח in this causative form can mean to reprove, correct, or decide a case. Given the parallel with 'judge between many peoples' and the international-peace context, 'decide disputes' captures the forensic/arbitrative force in natural English.
- source_word: לְגוֹיִם עֲצֻמִים עַד רָחוֹק
  chosen: for strong nations far away
  alternatives:
  - for mighty nations afar off
  - concerning powerful nations far away
  lexicon: HALOT
  rationale: גּוֹיִם here refers to nations; עֲצֻמִים means strong/mighty; עַד רָחוֹק idiomatically conveys great distance. 'For strong nations far away' reads naturally while preserving scope.
- source_word: וְכִתְּתוּ
  chosen: and they will beat
  alternatives:
  - and they will hammer
  - and they will forge
  lexicon: HALOT
  rationale: כתת means to beat/crush. In the idiom of refashioning weapons into tools, 'beat' is the established and accurate English equivalent.
- source_word: חַרְבֹתֵיהֶם
  chosen: their swords
  lexicon: HALOT
  rationale: 'Straightforward plural possessive: weapons of war, ''their swords.'''
- source_word: לְאִתִּים
  chosen: into plowshares
  alternatives:
  - into plow blades
  lexicon: HALOT
  rationale: אִתִּים refers to agricultural implements used for plowing. 'Plowshares' is the standard precise term and fits the prophetic image.
- source_word: וַחֲנִיתֹתֵיהֶם
  chosen: and their spears
  lexicon: HALOT
  rationale: Straightforward rendering of the plural possessive noun for spears.
- source_word: לְמַזְמֵרוֹת
  chosen: into pruning hooks
  alternatives:
  - into pruning knives
  lexicon: HALOT
  rationale: מַזְמֵרוֹת denotes pruning tools for vines/branches. 'Pruning hooks' is the conventional and sufficiently precise rendering.
- source_word: לֹא יִשְׂאוּ גּוֹי אֶל גּוֹי חֶרֶב
  chosen: Nation will not lift up sword against nation
  alternatives:
  - No nation will raise a sword against another nation
  lexicon: HALOT
  rationale: נשא חרב is an idiom for taking up or raising the sword in hostility. Singular גּוֹי used distributively is well represented by singular 'Nation ... nation' in English.
- source_word: וְלֹא יִלְמְדוּן עוֹד מִלְחָמָה
  chosen: nor will they learn war anymore
  alternatives:
  - nor will they train for war any longer
  - nor will they study war anymore
  lexicon: HALOT
  rationale: למד מלחמה can mean learn/train for war. 'Learn war anymore' preserves the Hebrew closely while remaining idiomatic enough in context; 'anymore' reflects עוֹד.
