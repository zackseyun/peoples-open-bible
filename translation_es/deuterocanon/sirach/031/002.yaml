translation:
  language: es
  text: La ansiedad por el sustento perturba el sueño, y la enfermedad grave perturba el sueño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς
  english_pob_choice: Like
  chosen_spanish: Como
  alternatives_spanish:
  - Tal como
  - Así como
  lexicon: LSJ
  rationale: Introduce la comparación de manera natural en español y conserva el valor de símil del griego.
- source_word: δρασσόμενος
  english_pob_choice: grasps at
  chosen_spanish: agarra
  alternatives_spanish:
  - se aferra a
  - intenta tomar
  lexicon: LSJ
  rationale: En este símil, el verbo expresa un intento de tomar algo inasible; «agarra» es claro y mantiene la imagen de inutilidad sin sonar demasiado interpretativo.
- source_word: σκιᾶς
  english_pob_choice: a shadow
  chosen_spanish: una sombra
  alternatives_spanish:
  - una sombra
  - la sombra
  lexicon: LSJ
  rationale: «Sombra» conserva la idea de algo insustancial y fácilmente esquivo.
- source_word: διώκων
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - corre tras
  - va detrás de
  lexicon: LSJ
  rationale: «Persigue» mantiene el sentido activo y continuo del participio sin introducir exceso de idiomatización.
- source_word: ἄνεμον
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - viento
  lexicon: LSJ
  rationale: Se conserva el objeto inasible del proverbio con la forma más natural en español.
- source_word: ὁ ἐπέχων
  english_pob_choice: one who clings to
  chosen_spanish: el que se aferra a
  alternatives_spanish:
  - el que se atiene a
  - el que se prende de
  lexicon: LSJ
  rationale: El verbo puede implicar sostenerse o atender; en este contexto proverbial, «se aferra a» comunica mejor la adhesión equivocada a los sueños.
- source_word: ἐνυπνίοις
  english_pob_choice: dreams
  chosen_spanish: los sueños
  alternatives_spanish:
  - los sueños nocturnos
  - los ensueños
  lexicon: LSJ
  rationale: La forma plural se refiere a sueños; «los sueños» es suficiente y idiomático en español.
theological_decisions:
- issue: Selección del testimonio textual principal ante una fuerte discrepancia entre hebreo y griego
  english_pob_reading: Translate the Greek simile about grasping a shadow and pursuing the wind, while noting the Hebrew witness preserves a substantially different text.
  chosen_spanish_reading: Traducir el símil griego de agarrar una sombra y perseguir el viento, indicando en una nota que el testimonio hebreo conservado ofrece una lectura sustancialmente diferente.
  alternative_spanish_readings:
  - 'Seguir únicamente el hebreo conservado: «La ansiedad por el sustento perturba el sueño, y la enfermedad grave perturba el sueño.»'
  rationale: La evidencia proporcionada marca una discrepancia mayor entre el hebreo y el griego para esta referencia. Como el texto griego sí ofrece una unidad coherente para Sirácide 31:2 en esta numeración, se traduce ese testimonio y se preserva honestamente la alternativa hebrea en nota, en vez de fusionar lecturas no equivalentes.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives and from Greek where it does not; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que sustituyó un borrador previo no relacionado y priorizó el testimonio hebreo para la numeración disponible. Dado que el paquete de fuente señala una discrepancia mayor entre hebreo y griego, esta versión reubica el texto principal en el símil griego de Sirácide 31:2 y conserva la alternativa hebrea en nota, sin borrar la tensión textual documentada.
  spanish_consistency_notes:
  - Se mantiene «sueños» para ἐνυπνίοις, con nota que conserva las alternativas semánticas relevantes.
  - Se evita «Cristo/Mesías» y demás terminología no pertinente a este versículo.
  - El registro es sobrio y bíblico, pero con español moderno natural.
  - La puntuación y el orden sintáctico siguen una línea publicable en español neutral latinoamericano.
