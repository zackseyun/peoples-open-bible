translation:
  language: es
  text: Estos, que habían sido registrados por nombre, vinieron en los días de Ezequías, rey de Judá; y abatieron sus tiendas y a los meunitas[a] que fueron hallados allí, y los consagraron al exterminio[b] hasta este día. Luego se establecieron en su lugar, porque allí había pasto para sus rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo הַמְּעִינִים es difícil. Tradicionalmente se entiende como «los meunitas», un pueblo; algunos lo interpretan, en cambio, como «las moradas» o «las viviendas».
    reason: alternative_reading
  - marker: b
    text: «Los consagraron al exterminio» refleja el valor técnico de חֵרֶם, es decir, poner algo bajo destrucción consagrada.
    reason: theological_note
lexical_decisions:
- source_word: הַכְּתוּבִים בְּשֵׁמוֹת
  english_pob_choice: who were recorded by name
  chosen_spanish: que habían sido registrados por nombre
  alternatives_spanish:
  - que fueron escritos por nombres
  - que fueron inscritos por nombre
  lexicon: HALOT
  rationale: El participio pasivo con בְּשֵׁמוֹת expresa una inscripción administrativa o genealógica. «Registrados por nombre» conserva esa idea en español natural y evita la calca torpe de «escritos por nombres».
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: HALOT
  rationale: בוא suele significar venir/llegar. «Vinieron» mantiene el movimiento narrativo sin añadir matices no exigidos.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: atacaron
  alternatives_spanish:
  - derrotaron
  - hirieron
  lexicon: HALOT
  rationale: El verbo נכה en contexto militar puede abarcar golpear, derrotar o infligir una derrota violenta. Elegí «atacaron» para no especificar más de lo que el hebreo garantiza, aunque el contexto implica una acción contundente.
- source_word: אָהֳלֵיהֶם
  english_pob_choice: their tents
  chosen_spanish: sus tiendas
  alternatives_spanish:
  - sus tiendas de campaña
  lexicon: HALOT
  rationale: אָהֶל es «tienda»; «sus tiendas» es idiomático y fiel. «Tiendas de campaña» es comprensible, pero algo más explicativo.
- source_word: הַמעינים
  english_pob_choice: the Meunites
  chosen_spanish: los meunitas
  alternatives_spanish:
  - las moradas
  - las viviendas
  lexicon: HALOT
  rationale: Sigo la lectura tradicional de un grupo étnico o tribal. Conservé la opción gentilicia porque el contexto de atacar tiendas y un grupo hallado allí la favorece; la alternativa de entenderlo como sustantivo común queda documentada en la nota.
- source_word: אֲשֶׁר נִמְצְאוּ שָׁמָּה
  english_pob_choice: who were found there
  chosen_spanish: que fueron hallados allí
  alternatives_spanish:
  - que se encontraron allí
  lexicon: HALOT
  rationale: La relativa se refiere naturalmente a personas si se adopta «meunitas». «Fueron hallados allí» conserva la pasiva hebrea y el sentido narrativo.
- source_word: וַיַּחֲרִימֻם
  english_pob_choice: devoted them to destruction
  chosen_spanish: los dedicaron a destrucción
  alternatives_spanish:
  - los destruyeron por completo
  - los pusieron bajo ḥerem
  lexicon: HALOT
  rationale: 'חרם tiene fuerza técnica de ḥerem: consagrar algo para destrucción. «Dedicaron a destrucción» conserva esa tensión sin suavizarla; se evita reemplazarla por un simple «destruyeron».'
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  lexicon: HALOT
  rationale: Fórmula temporal idiomática. «Hasta este día» es clara y suficientemente literal en español.
- source_word: וַיֵּשְׁבוּ תַּחְתֵּיהֶם
  english_pob_choice: they settled in their place
  chosen_spanish: se establecieron en su lugar
  alternatives_spanish:
  - habitaron en su lugar
  - vivieron en su lugar
  lexicon: HALOT
  rationale: La expresión תַּחְתֵּי/תַּחַת con personas suele indicar sustitución o reemplazo. «Se establecieron en su lugar» comunica bien el sentido de asentamiento en reemplazo de otros.
- source_word: מִרְעֶה לְצֹאנָם
  english_pob_choice: there was pasture there for their flocks
  chosen_spanish: había pasto para sus rebaños
  alternatives_spanish:
  - había pastura para sus ovejas
  - había pastoreo para su ganado
  lexicon: HALOT
  rationale: מִרְעֶה es pasto/pastura. «Pasto» funciona en español general y «rebaños» preserva el valor colectivo de צֹאן sin restringirlo solo a ovejas.
theological_decisions:
- issue: Sentido técnico de חֵרֶם / destrucción consagrada
  english_pob_reading: devoted them to destruction
  chosen_spanish_reading: los dedicaron a destrucción
  alternative_spanish_readings:
  - los destruyeron por completo
  - los pusieron bajo ḥerem
  rationale: El texto no describe solo violencia militar, sino la categoría bíblica de poner algo bajo ḥerem. La redacción elegida conserva la tensión entre consagración y destrucción sin perder legibilidad.
  doctrine_reference: Concepto bíblico de חֵרֶם (ḥerem) en el antiguo Israel
- issue: Identificación de הַמעינים
  english_pob_reading: the Meunites
  chosen_spanish_reading: los meunitas
  alternative_spanish_readings:
  - las moradas
  - las viviendas
  rationale: La POB inglesa preserva la lectura tradicional de un pueblo, pero documenta la dificultad textual y la posible lectura como sustantivo común. En español mantengo el gentilicio y dejo constancia de la alternativa.
  doctrine_reference: Crítica textual y ambigüedad léxica del término hebreo
- issue: Valor de תַּחְתֵּיהֶם
  english_pob_reading: they settled in their place
  chosen_spanish_reading: se establecieron en su lugar
  alternative_spanish_readings:
  - se asentaron en su lugar
  - habitaron en su lugar
  rationale: El hebreo puede sugerir reemplazo, no solo ubicación física. La versión elegida refleja el asentamiento sucesorio sin sobreexplicar.
  doctrine_reference: Uso idiomático hebreo de תַּחַת con sentido de sustitución
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como unchanged; no se incorporaron cambios sustantivos respecto del texto base inglés, salvo la adaptación normal al español y la documentación explícita de la ambigüedad de הַמעינים y del valor técnico de חֵרֶם.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en todo el proyecto; este versículo no lo contiene.
  - Se usa «Dios»/«Espíritu»/«Mesías» según corresponda, pero no aparecen en este versículo.
  - Se conservó un estilo bíblico moderno y digno, evitando calcos como «escritos por nombres».
  - 'La nota a y b no duplican contenido de forma funcional: la primera recoge la lectura tradicional y la segunda la ambigüedad léxica en español.'
