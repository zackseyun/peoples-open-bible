  to: Y las aguas del mar se secarán[a], y el río[b] quedará reseco y seco.
  rationale: Se reemplaza 'agostado' por 'reseco' para una imagen más natural y fiel aplicada a un río, manteniendo a la vez la distinción intensificadora entre los dos verbos hebreos. Se añade la nota sobre la probable referencia al Nilo porque forma parte del rastro auditado del POB y ayuda a preservar la precisión exegética sin sobretraducir el texto principal.
