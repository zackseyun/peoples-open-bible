  text: But the man who touches them must arm himself with iron and the shaft of a spear[c][b][a], and they must be completely burned with fire in their place.
  footnotes:
  - marker: a
    text: Or 'must equip himself with iron and a spear shaft'; literally, 'must be filled with iron and wood of a spear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they shall surely be burned with fire on the spot.' The Hebrew uses an infinitive absolute with the verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: The 'them' refers back to the thorn-like 'worthless men' in the previous verse.
    reason: cross_reference
