base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/021.yaml
  text: And the sons of Israel who were found in Jerusalem kept the Feast of Unleavened Bread for seven days with great joy[b][a], and the Levites and the priests praised Yahweh day by day with mighty instruments to Yahweh.
  footnotes:
  - marker: a
    text: Or 'with mighty instruments' or 'with loud instruments'; the Hebrew literally says 'with instruments of strength.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with instruments of strength to the LORD'.
    reason: previous_rendering
