translation:
  language: es
  text: Él, en el primer año de su reinado, en el primer mes, abrió las puertas de la casa de Yahvé y las reparó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "y las fortaleció", es decir, las dejó seguras o firmes de nuevo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente funciona como retoma enfática del sujeto en la narración. En español, 'él' basta para mantener la referencia clara sin sobrecargar la frase.
- source_word: בַשָּׁנָה הָרִאשׁוֹנָה לְמָלְכוֹ
  english_pob_choice: in the first year of his reign
  chosen_spanish: en el primer año de su reinado
  alternatives_spanish:
  - en el primer año cuando reinó
  - en el primer año de su realeza
  lexicon: HALOT
  rationale: La construcción expresa el primer año regnal de manera idiomática. 'Reinado' comunica bien el valor temporal y dinástico del hebreo sin sonar artificial en español.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural de la frase temporal.
- source_word: פָּתַח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desbloqueó
  - abrió de par en par
  lexicon: HALOT
  rationale: El verbo señala la acción básica de abrir puertas; 'abrió' conserva el sentido llano del hebreo sin añadir matices no requeridos.
- source_word: דַּלְת֥וֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - los batientes
  lexicon: HALOT
  rationale: El hebreo refiere puertas/hojas de puerta; 'puertas' es el término natural en español y mantiene la imagen del templo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahweh
  lexicon: HALOT
  rationale: Se conserva 'casa' porque reproduce de cerca la expresión fuente y coincide con el registro bíblico. Se usa 'Yahvé' según el estándar del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como 'Yahvé' conforme a la política del proyecto para el Tetragrámaton, preservando el nombre propio en vez de sustituirlo por un título.
- source_word: וַיְחַזְּקֵם
  english_pob_choice: and repaired them
  chosen_spanish: y las reparó
  alternatives_spanish:
  - y las fortaleció
  - y las reforzó
  - y las dejó firmes
  lexicon: HALOT
  rationale: 'El piel de חזק puede significar ''fortalecer'', pero aquí, con puertas como objeto en un contexto de restauración del templo, ''reparó'' expresa con mayor naturalidad la acción resultante: volverlas firmes y seguras.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La fuente hebrea usa directamente el nombre propio del pacto. Se mantiene como 'Yahvé' para no ocultarlo tras un título y para seguir la norma doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וַיְחַזְּקֵם con objeto arquitectónico
  english_pob_reading: and repaired them
  chosen_spanish_reading: y las reparó
  alternative_spanish_readings:
  - y las fortaleció
  - y las reforzó
  rationale: Aunque el verbo base puede significar 'fortalecer', el contexto concreto son puertas del templo en una reforma. 'Reparó' comunica el efecto práctico sin perder la idea de hacerlas fuertes o seguras.
  doctrine_reference: HALOT s.v. חזק; contexto narrativo de restauración del templo
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece estable en la revisión más reciente y fue confirmado por verificación cruzada de alta concordancia; no se registraron cambios aplicados. La versión española conserva esa decisión principal, pero ajusta el nombre divino al estándar español del proyecto: ''Yahvé''.'
  spanish_consistency_notes:
  - 'Se mantiene el orden sintáctico natural del español, sin perder la secuencia temporal del hebreo: año primero, mes primero, acción sobre las puertas.'
  - '''Casa de Yahvé'' conserva la expresión fuente y armoniza con el uso del nombre divino exigido por el proyecto.'
  - La nota[a] preserva la tensión léxica entre 'reparar' y 'fortalecer' presente en el verbo hebreo, sin eliminar la alternativa documentada.
