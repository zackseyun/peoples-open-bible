translation:
  language: es
  text: Pero ¿dónde están tus dioses que hiciste para ti? Que se levanten, si pueden salvarte[a] en el tiempo de tu calamidad[b]. Porque tus dioses, Judá, son tantos como tus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si pudieran salvarte». La frase expresa un desafío retórico que pone en duda su capacidad real de salvar.'
    reason: alternative_reading
  - marker: b
    text: «Calamidad» aquí se refiere a desastre o aflicción, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיֵּה
  english_pob_choice: But where are
  chosen_spanish: ¿Pero dónde están
  alternatives_spanish:
  - ¿Y dónde están
  - ¿Dónde están, pues
  lexicon: HALOT
  rationale: אַיֵּה es una pregunta de ubicación; el וְ inicial funciona de modo discursivo/adversativo en este reproche profético, por lo que «Pero» comunica bien el giro polémico sin perder naturalidad en español.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your gods
  chosen_spanish: tus dioses
  alternatives_spanish:
  - tu dios
  - tus dioses/dioses
  lexicon: HALOT
  rationale: La forma hebrea es plural con sufijo de 2ms y el contexto habla de ídolos de Judá; por eso conviene mantener el plural explícito «dioses» y no suavizarlo a singular.
- source_word: אֲשֶׁר עָשִׂיתָ לָּךְ
  english_pob_choice: that you made for yourself
  chosen_spanish: los que te hiciste para ti
  alternatives_spanish:
  - que hiciste para ti mismo
  - que te hiciste
  lexicon: HALOT
  rationale: La cláusula subraya fabricación humana y posesión/reflexividad. «Los que te hiciste para ti» conserva ese doble matiz con un relativo natural en español.
- source_word: יָקוּמוּ
  english_pob_choice: Let them arise
  chosen_spanish: Que se levanten
  alternatives_spanish:
  - Que se alcen
  - Levántense
  lexicon: HALOT
  rationale: El jussivo plural tiene fuerza de desafío; «Que se levanten» comunica la orden irónica sin añadir interpretación excesiva.
- source_word: אִם יוֹשִׁיעוּךָ
  english_pob_choice: if they can save you
  chosen_spanish: si pueden salvarte
  alternatives_spanish:
  - si te salvarán
  - si logran salvarte
  lexicon: HALOT
  rationale: El condicional aquí expresa desafío y duda retórica; «si pueden salvarte» reproduce la idea de capacidad puesta a prueba, más que una simple futura promesa.
- source_word: בְּעֵת רָעָתֶךָ
  english_pob_choice: in the time of your trouble
  chosen_spanish: en el tiempo de tu calamidad
  alternatives_spanish:
  - en el tiempo de tu aflicción
  - cuando te venga la desgracia
  lexicon: HALOT
  rationale: רָעָה aquí denota calamidad/desastre, no mal moral. «Calamidad» hace explícita esa carga; «tiempo de tu calamidad» mantiene la estructura temporal del hebreo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del reproche; «Porque» es la coordinación causal más natural en español para el argumento profético.
- source_word: מִסְפַּר עָרֶיךָ
  english_pob_choice: as many as your cities
  chosen_spanish: son tantos como tus ciudades
  alternatives_spanish:
  - equivalen al número de tus ciudades
  - son tantos cuantos tus ciudades
  lexicon: HALOT
  rationale: La expresión indica correspondencia numérica. «Son tantos como tus ciudades» es idiomático en español y conserva el paralelismo cuantitativo.
- source_word: הָיוּ אֱלֹהֶיךָ
  english_pob_choice: are your gods
  chosen_spanish: son tus dioses
  alternatives_spanish:
  - han sido tus dioses
  - llegan a ser tus dioses
  lexicon: HALOT
  rationale: Aunque el hebreo usa perfecto, el inglés POB ya lo vierte en presente resultativo («are»), y en español «son» transmite ese estado actual de manera más natural que un perfecto artificial.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español como «Judá»; funciona aquí como vocativo directo.
theological_decisions:
- issue: Sentido de 'tus dioses' en una acusación profética
  english_pob_reading: The phrase refers to idols/false gods made by Judah, not to the LORD.
  chosen_spanish_reading: La expresión se refiere a ídolos o falsos dioses hechos por Judá, no a Yahvé.
  alternative_spanish_readings:
  - La frase podría leerse de manera vaga como 'tus divinidades'
  - Podría suavizarse como 'tus imágenes'
  rationale: El modificador «los que te hiciste para ti» excluye a Yahvé y mantiene el tono de reproche sarcástico. Traducir con plural explícito preserva la polémica contra la idolatría.
  doctrine_reference: Exodo 20:3-5; Jeremías 10:3-5
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente, que cambió la clausula final a un presente relacional («are as many as your cities») en vez de un perfecto resultativo; por eso el español usa «son tantos como tus ciudades». También conserva el matiz de desafío en el jussivo («Que se levanten») y la lectura de רָעָה como calamidad, no mal moral.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre propio bíblico estándar en español.
  - Se conserva el plural «dioses» para אֱלֹהֶיךָ, acorde con el contexto idólatra.
  - Se usa «calamidad» para רָעָה, en línea con el sentido contextual documentado.
  - La nota al pie se ancla en «si pueden salvarte» para registrar la alternativa modal sin introducir ambigüedad innecesaria en el cuerpo del texto.
