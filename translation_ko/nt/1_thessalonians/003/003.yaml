id: 1TH.3.3
reference: 1 Thessalonians 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ μηδένα σαίνεσθαι ἐν ταῖς θλίψεσιν ταύταις. αὐτοὶ γὰρ οἴδατε ὅτι εἰς τοῦτο κείμεθα·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/003.yaml
  text: so that no one would be shaken by these afflictions[c][b][a]. For you yourselves know that we are appointed for this.
  footnotes:
  - marker: a
    text: Or 'disturbed,' 'unsettled'; the rare verb may also carry the sense 'deceived' or 'won over by flattery' in other contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'tribulations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'we are destined for this' or 'we are set for this.'
    reason: alternative_reading
translation:
  language: ko
  text: 이는 누구도 이 환난들[b]로 인하여 흔들리지[a] 않게 하려는 것이었습니다. 우리가 이 일을 위하여 정해져 있다는[c] 것을 여러분 자신이 알고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「동요되지」, 「불안에 빠지지」. 드문 어휘는 다른 문맥에서 「속아 넘어가지」의 의미도 가질 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「고난들」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「이 일에 부르심을 받았다」, 「이 일에 세워져 있다」.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδένα σαίνεσθαι
  english_pob_choice: no one would be shaken
  chosen_korean: 누구도 ... 흔들리지 않게
  alternatives_korean:
  - 누구도 동요되지 않게
  - 아무도 마음이 흔들리지 않게
  lexicon: BDAG
  rationale: σαίνω는 「꼬리치다·흔들다」, 수동으로는 「동요·흔들림」. 「흔들리다」가 본문의 정서적 동요 의미를 가장 잘 담는다.
- source_word: ἐν ταῖς θλίψεσιν ταύταις
  english_pob_choice: by these afflictions
  chosen_korean: 이 환난들로 인하여
  alternatives_korean:
  - 이 고난들로 인해
  - 이 환난 가운데서
  lexicon: BDAG
  rationale: 1:6과 일관된 「환난」 어휘. 「~로 인하여」가 원인을 분명히 한다.
- source_word: εἰς τοῦτο κείμεθα
  english_pob_choice: we are appointed for this
  chosen_korean: 이 일을 위하여 정해져 있다
  alternatives_korean:
  - 이 일에 세워져 있다
  - 이 일에 부르심을 받았다
  rationale: κεῖμαι의 「두어져 있다·정해져 있다」. 신적 작정의 함의를 「정해져 있다」로 보존하되, 특정 교리 체계로 좁히지 않는다.
  lexicon: BDAG
