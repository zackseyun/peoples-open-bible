  glossary_alignment: No hay términos teológicos sensibles en este versículo. La decisión de evitar «ejército» concuerda con la racionalidad de la POB; «tropa» es defendible. Para פקד, conviene preferir «inscritos» frente a «contados de ella» para respetar el valor censal oficial y la legibilidad del español.
