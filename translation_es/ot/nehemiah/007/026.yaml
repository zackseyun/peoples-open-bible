translation:
  language: es
  text: los hombres de Belén y de Netofá[a], ciento ochenta y ocho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los habitantes de Belén y de Netofá'. El hebreo dice literalmente 'los hombres de', una fórmula habitual en listas de censos y de retorno.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: El hebreo usa el plural constructo de אִישׁ en una lista censal/local; en español, 'los hombres de' conserva mejor la forma masculina y el tono de registro de enumeración que 'la gente de', sin borrar la fuerza lexical del original.
- source_word: בֵית לֶחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bet-lehem
  lexicon: HALOT
  rationale: Es un topónimo establecido en español bíblico; 'Belén' es la forma estándar y legible para el público hispanohablante, manteniendo la identificación del lugar sin calcar la forma hebrea.
- source_word: וּנְטֹפָה
  english_pob_choice: and Netophah
  chosen_spanish: y de Netofá
  alternatives_spanish:
  - y Netofá
  - y de Netofah
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración habitual en español. La preposición 'de' se repite por paralelismo con 'de Belén' y refleja el vínculo locativo del listado.
- source_word: מֵאָה שְׁמֹנִים וּשְׁמֹנָה
  english_pob_choice: one hundred eighty-eight
  chosen_spanish: ciento ochenta y ocho
  alternatives_spanish:
  - ciento ochenta y ocho
  lexicon: HALOT
  rationale: La secuencia numérica hebrea suma 188; el español normal para cantidades en prosa bíblica usa la forma cardinal completa y clara, sin necesidad de cifras.
