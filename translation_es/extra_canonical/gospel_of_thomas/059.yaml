base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/059.yaml
  text: Jesus said[a], “Seek after the Living One while you are living[g][f][e][d][c][b], so that you do not die and then seek to see him—and you will not be able to see.”
  footnotes:
  - marker: a
    text: “Seek after” renders ϭⲱϣⲧ with ⲛⲥⲁ; alternatives include “seek” or “search.”
    reason: lexical_alternative
  - marker: b
    text: “Living One” translates the relative phrase ⲡⲉⲧⲉⲣⲉⲱⲛϩ; literally, “the one who is living.”
    reason: lexical_alternative
  - marker: c
    text: The negative purpose construction (ϩⲓⲛⲁ ϫⲉ … ⲛⲛⲉ … ⲙⲟⲩ) can be rendered “so that you do not die” or more compactly “lest you die.”
    reason: lexical_alternative
  - marker: d
    text: ϣⲓⲛⲉ can mean “seek” or “try”; “try to see” brings out the nuance of attempted action distinct from the initial ϭⲱϣⲧ.
    reason: lexical_alternative
  - marker: e
    text: ϣϭⲙϭⲟⲙ literally “be strong,” idiomatically “be able,” commonly followed by ⲛⲁ + infinitive (here, ⲛⲁ ⲉⲛⲁⲩ, “to see”).
    reason: cultural_note
  - marker: f
    text: The manuscript’s ⲉⲣⲟϥ is a common object-marker form; Dilley’s normalized text uses ⲉⲛⲧⲟϥ. Both mean “him.”
    reason: dialect_note
  - marker: g
    text: Or 'try to see him'.
    reason: previous_rendering
