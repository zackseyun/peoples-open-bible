translation:
  language: es
  text: Ahora[a], hermanos, mostremos a nuestros hermanos que su vida[b] depende de nosotros, y que las cosas santas y la casa y el altar dependen de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas», si el vocativo se entiende de manera inclusiva y no como estrictamente masculino.
    reason: lexical_alternative
  - marker: b
    text: O «su alma»; aquí el sentido más probable es «su vida» o «su supervivencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  - hermanos de sangre
  lexicon: BDAG
  rationale: Conservo el plural masculino del vocativo como forma directa de address fraternal, que en español bíblico es natural y reconocible. En este contexto puede incluir al grupo como comunidad; por eso dejo abierta la alternativa inclusiva en nota, sin borrar la forma del fuente.
- source_word: ἐπιδειξώμεθα
  english_pob_choice: let us show
  chosen_spanish: mostremos
  alternatives_spanish:
  - demostremos
  - probemos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide una acción visible y persuasiva. 'Mostremos' mantiene el tono de exhortación y evita un calco pesado.
- source_word: ἐξ ἡμῶν κρέμαται
  english_pob_choice: hangs on us
  chosen_spanish: de nosotros depende
  alternatives_spanish:
  - cuelga de nosotros
  - está colgada de nosotros
  - pende de nosotros
  lexicon: BDAG
  rationale: En español, 'depende de nosotros' comunica con naturalidad la metáfora de dependencia que el griego expresa con 'cuelga de'. La alternativa literal suena forzada, pero la imagen de responsabilidad se conserva.
- source_word: ἡ ψυχὴ αὐτῶν
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - sus vidas
  lexicon: BDAG
  rationale: Aquí ψυχή se refiere al vivir o sobrevivir del pueblo, no a una afirmación antropológica sobre el alma. 'Su vida' preserva ese sentido colectivo y evita cargar el texto con una lectura doctrinal que no está explícita.
- source_word: τὰ ἅγια
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - las cosas santas
  - lo santo
  - los objetos sagrados
  lexicon: LSJ
  rationale: Sigo la revisión inglesa más reciente, que opta por una referencia cultual más natural en este contexto. Aunque el plural griego puede sugerir 'las cosas santas', en español 'el santuario' comunica mejor el ámbito sagrado sin deshacer la cohesión de la lista.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa de Dios
  lexicon: LSJ
  rationale: Mantengo el sustantivo general 'la casa' para conservar la estructura del texto fuente. En contexto cultual se entiende la referencia al templo, pero no la explicito para no sobreinterpretar ni duplicar el sentido de la lista.
- source_word: τὸ θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar de sacrificio
  lexicon: BDAG
  rationale: '''Altar'' es el equivalente cultual directo y claro en español, suficiente para reproducir el término técnico del griego.'
- source_word: ἐπεστήρισται ἐφʼ ἡμῖν
  english_pob_choice: depend on us
  chosen_spanish: dependen de nosotros
  alternatives_spanish:
  - están sostenidos por nosotros
  - reposan sobre nosotros
  - están establecidos sobre nosotros
  lexicon: LSJ
  rationale: El perfecto expresa un estado resultante de soporte o dependencia. 'Dependen de nosotros' reproduce esa relación de manera natural en español y armoniza con el miembro anterior.
theological_decisions:
- issue: ¿Cómo traducir ἡ ψυχὴ αὐτῶν en un contexto de amenaza comunitaria?
  english_pob_reading: their life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - sus vidas
  rationale: La escena trata de supervivencia colectiva, no de una enseñanza sobre el alma inmortal. Traducir 'su vida' mantiene la tensión retórica del pasaje y evita trasladar al lector una categoría teológica no señalada por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: ¿Debe ἀδελφοί verterse de forma inclusiva?
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - parientes
  rationale: Conservo la forma masculina gramatical del vocativo como el reflejo más directo del griego. La posible inclusión de mujeres en la audiencia se deja como alternativa, sin borrar la forma documentada del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail inglés, especialmente la preferencia por 'the sanctuary' para τὰ ἅγια y por una formulación de dependencia para ἐπεστήρισται. Al mismo tiempo, se conserva la imagen de responsabilidad compartida del griego con un español natural y publicable.
  spanish_consistency_notes:
  - Mantengo 'hermanos' como vocativo principal para preservar el paralelismo con el audit trail, y solo abro la alternativa inclusiva en nota.
  - Uso 'santuario' para τὰ ἅγια siguiendo la revisión más reciente del inglés, aunque el plural griego podría sugerir una traducción más literal como 'las cosas santas'.
  - Conservo 'casa' en lugar de 'templo' para respetar la estructura nominal del griego y evitar fusionar dos referentes de la lista.
  - No uso 'alma' en el texto principal porque el contexto inmediato exige el sentido de vida/supervivencia.
