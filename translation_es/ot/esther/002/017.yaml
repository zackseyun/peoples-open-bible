base_translation:
  language: en
  yaml_path: translation/ot/esther/002/017.yaml
  text: The king loved Esther more than all the women[a], and she found favor and kindness before him more than all the virgins[b]. So he placed the royal crown on her head and made her queen instead of Vashti.
  footnotes:
  - marker: a
    text: Or 'she won favor and kindness before him.' The Hebrew idiom is literally 'she bore favor and kindness before him.'
    reason: lexical_alternative
  - marker: b
    text: '''Virgins'' translates a more specific Hebrew term than ''women'' earlier in the verse; the distinction is preserved in English.'
    reason: lexical_alternative
