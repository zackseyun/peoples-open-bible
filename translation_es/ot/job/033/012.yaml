review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en casi todo: הֶן = «Mira», זֹאת = «en esto», לֹא צָדַקְתָּ = idea forense/argumentativa de no estar en lo correcto, אֶעֱנֶךָּ = respuesta futura, כִּי = causal, יִרְבֶּה = superioridad comparativa, אֱלוֹהַ = «Dios», מֵאֱנוֹשׁ = contraste con el hombre/mortal. Sin embargo, «no estás en lo correcto» suena más pesado y menos idiomático que una opción española natural que preserve el mismo sentido, y la nota de «Mira bien» no refleja la alternativa inglesa documentada.'
  spanish_quality_summary: La frase es clara y fiel, pero puede mejorar en naturalidad y dignidad eclesial. «No tienes razón» expresa mejor el valor argumentativo de צדק en este contexto que «no estás en lo correcto», evitando un giro algo calcado. También conviene alinear la nota con la alternativa auditada sobre אֱנוֹשׁ, que en español sí aporta un matiz semántico útil.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «Dios» para אֱלוֹהַ es correcto; no aparece Yahvé, Mesías, etc. «El hombre» es aceptable para אֱנוֹשׁ como singular genérico, pero debe conservarse la alternativa «un mortal» en nota, tal como el POB inglés la preservó.'
  issues:
  - severity: medium
    issue: «No estás en lo correcto» suena poco idiomático y algo calcado.
    rationale: Aunque semánticamente correcto, el español bíblico natural y moderno preferiría «no tienes razón» o «no estás en lo cierto». El hebreo trata de estar en lo correcto en una disputa, no de rectitud moral; «no tienes razón» preserva bien ese sentido.
  - severity: medium
    issue: La nota al pie actual sobre הֶן no sigue la alternativa documentada en el POB inglés.
    rationale: La auditoría inglesa conserva una nota sobre אֱנוֹשׁ = «a mortal», no sobre הֶן. Añadir una alternativa no auditada para הֶן no es necesario aquí, mientras que omitir la alternativa de «mortal» pierde una decisión léxica preservada por el proyecto.
  revised_spanish_text: Mira, en esto no tienes razón; te responderé, porque Dios es mayor que el hombre[a].
  revised_footnotes:
  - marker: a
    text: O «que un mortal». El hebreo אֱנוֹשׁ suele resaltar la fragilidad humana.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción a un español más natural y digno sin cambiar el sentido del hebreo: «no tienes razón» comunica mejor el valor argumentativo de לֹא צָדַקְתָּ. Se elimina la nota innecesaria sobre הֶן y se repone la alternativa léxica auditada para אֱנוֹשׁ («un mortal»), anclándola donde corresponde en el texto.'
