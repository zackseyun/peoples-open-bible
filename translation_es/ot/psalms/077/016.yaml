translation:
  language: es
  text: Tú has redimido a tu pueblo con tu brazo[a], los hijos de Jacob y José[c]. Selah[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescatado» o «liberado» para «redimido».
    reason: lexical_alternative
  - marker: b
    text: «Con tu brazo» conserva la imagen hebrea del poder fuerte y actuante de Dios.
    reason: lexical_alternative
  - marker: c
    text: «Los hijos de Jacob y José» puede funcionar como una manera poética de referirse a Israel, con «José» quizá destacando a las tribus descendientes de él.
    reason: alternative_reading
  - marker: d
    text: «Selah» es probablemente una indicación litúrgica o musical; su sentido exacto es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: גָּאַ֣לְתָּ
  english_pob_choice: redeemed
  chosen_spanish: has redimido
  alternatives_spanish:
  - has rescatado
  - has liberado
  lexicon: HALOT
  rationale: «Redimir» conserva el peso pactal y salvador del verbo, como en el inglés POB. «Rescatar» o «liberar» serían posibles, pero bajan o desplazan la carga redentora del hebreo.
- source_word: בִּזְרוֹעַ
  english_pob_choice: with your arm
  chosen_spanish: con tu brazo
  alternatives_spanish:
  - por tu brazo
  - con tu poder
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal de «brazo» para reflejar el hebreo y su fuerza poética. «Con tu poder» explicita el sentido, pero aplana la metáfora.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo del pacto
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona se traduce naturalmente como «tu pueblo», que es claro y fiel al sentido comunitario/covenantal.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos varones de
  lexicon: HALOT
  rationale: «Los hijos de» preserva la forma formal hebrea y el paralelo poético. «Descendientes» sería más interpretativo y menos transparente.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: Standard biblical onomastics
  rationale: Se conserva el nombre propio tradicional «Jacob», que es el equivalente bíblico estándar en español y el más reconocible para lectores de iglesia.
- source_word: וְיוֹסֵף
  english_pob_choice: and Joseph
  chosen_spanish: y de José
  alternatives_spanish:
  - y José
  lexicon: Standard biblical onomastics
  rationale: 'Se mantiene el nombre propio «José». La preposición repetida «de» en español facilita la coordinación de dos grupos genealógicos: «los hijos de Jacob y de José».'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Interludio
  - Pausa
  lexicon: HALOT
  rationale: Se translitera por ser un marcador litúrgico/musical de sentido incierto. Traducirlo como «pausa» o «interludio» sería más interpretativo de lo que permite el hebreo.
theological_decisions:
- issue: El alcance de «los hijos de Jacob y de José»
  english_pob_reading: Retain the dual naming literally without resolving whether 'Joseph' stands for the northern tribes, all Israel, or a poetic parallel to Jacob.
  chosen_spanish_reading: Conservar literalmente el doble nombramiento sin decidir si «José» representa a las tribus del norte, a todo Israel o un paralelismo poético con Jacob.
  alternative_spanish_readings:
  - Interpretar «José» como referencia específica a Efraín y Manasés o al reino del norte
  - Entender la frase como un sinónimo completo de todo Israel
  rationale: El hebreo nombra juntos a Jacob y José, pero no explica la función representativa. La traducción española conserva esa tensión poética e histórica sin imponer una resolución exegética no explicitada por el texto.
  doctrine_reference: Preservar la tensión textual en vez de resolverla.
translation_notes:
  revision_awareness: El inglés POB revisó «by your arm» a «with your arm» para conservar el valor instrumental natural; en español se refleja con «con tu brazo», manteniendo la imagen literal. También se preserva la decisión de dejar «Selah» transliterado y de no resolver la posible referencia tribal de «José».
  spanish_consistency_notes:
  - Se usa «redimido» para mantener el campo semántico salvador pactal, coherente con el POB inglés.
  - Se conserva «brazo» como metáfora de poder divino, evitando sustituirla por una abstracción.
  - «Selah» queda sin traducir para respetar la incertidumbre del marcador.
  - La coordinación «Jacob y de José» mejora la fluidez en español sin alterar el contenido hebreo.
