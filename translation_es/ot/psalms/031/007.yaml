translation:
  language: es
  text: Odio a los que guardan ídolos vanos[a], pero yo confío en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «los que guardan vanidades vanas», «los que consideran ídolos vanos» o «los que se aferran a vanidades vacías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: Odio
  alternatives_spanish:
  - He odiado
  - Odié
  lexicon: HALOT
  rationale: El perfecto qal de שׂנא en poesía puede expresar una postura firme y vigente. En español, «odio» comunica mejor esa disposición asentada que un pasado simple o compuesto.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: those who keep
  chosen_spanish: los que guardan
  alternatives_spanish:
  - los que mantienen
  - los que observan
  - los que cuidan
  lexicon: HALOT
  rationale: El verbo שמר tiene el sentido básico de guardar, vigilar u observar. Dado el objeto del complemento, «guardan» conserva la relación lexical sin forzar una paráfrasis.
- source_word: הַבְלֵי שָׁוְא
  english_pob_choice: worthless idols
  chosen_spanish: ídolos vanos
  alternatives_spanish:
  - ídolos inútiles
  - vanidades vacías
  - cosas vanas
  lexicon: HALOT
  rationale: La expresión hebrea combina hebel y shav, con fuerza de vaciedad, falsedad e inutilidad. En este contexto cultual, «ídolos vanos» mantiene el tono despectivo y el referente idolátrico que la POB inglesa hizo explícito.
- source_word: וַאֲנִי
  english_pob_choice: but as for me
  chosen_spanish: pero yo
  alternatives_spanish:
  - y yo
  - en cuanto a mí
  lexicon: HALOT
  rationale: La construcción marca contraste enfático. En español, la oposición queda bien expresada con «pero yo», sin necesidad de una expansión más larga.
- source_word: אֶל יְהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: Aunque אֶל tiene sentido de dirección («a/hacia»), con בטח la fórmula idiomática en español es «confiar en». Se mantiene el nombre divino «Yahvé» según el estándar del proyecto.
- source_word: בָּטָחְתִּי
  english_pob_choice: I trust
  chosen_spanish: confío
  alternatives_spanish:
  - he confiado
  - confié
  lexicon: HALOT
  rationale: El perfecto qal en confesión poética puede expresar una confianza presente y estable. «Confío» suena natural en español y conserva la idea de confianza vigente.
theological_decisions:
- issue: Referencia de הַבְלֵי שָׁוְא
  english_pob_reading: Worthless idols
  chosen_spanish_reading: ídolos vanos
  alternative_spanish_readings:
  - vanidades vacías
  - ídolos falsos
  - cosas vanas
  rationale: La frase admite una traducción más abstracta, pero el contexto de confianza y contraste con Yahvé favorece explicitar el sentido idolátrico. «Ídolos vanos» preserva la tensión entre vaciedad y falsedad sin añadir doctrina ajena.
  doctrine_reference: Salmo 31:7; cf. la lectura contextual del paralelismo entre ídolos y confianza en Yahvé
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «cling to» a «keep» para reflejar mejor שמר. En español, «guardan» sigue esa corrección mientras mantiene la naturalidad. Se conservó la explicitación de los ídolos para hacer audible el sentido contextual de הַבְלֵי שָׁוְא.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «confío» frente a un pasado para reflejar el valor presente de la confesión poética.
  - «Ídolos vanos» conserva el matiz despectivo y la lectura contextual de referencia idolátrica.
