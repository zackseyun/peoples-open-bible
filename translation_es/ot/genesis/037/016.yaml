translation:
  language: es
  text: 'Él dijo[a]: «Estoy buscando a mis hermanos. Por favor, dígame dónde están apacentando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dónde están pastoreando» / «dónde están apacentando el rebaño». El participio hebreo se refiere al cuidado de animales en el pasto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se rinde de forma natural como un pasado simple en español. Se conserva la sencillez narrativa sin forzar una conjunción innecesaria.
- source_word: אֶת אַחַי
  english_pob_choice: my brothers
  chosen_spanish: a mis hermanos
  alternatives_spanish:
  - mis hermanos
  - a mis hermanos varones
  lexicon: HALOT
  rationale: El hebreo marca el objeto directo con אֶת; en español el objeto personal/animado se expresa bien con la preposición 'a'. 'Hermanos' refleja correctamente el vínculo familiar masculino en este contexto.
- source_word: אָנֹכִי מְבַקֵּשׁ
  english_pob_choice: I am looking for
  chosen_spanish: estoy buscando
  alternatives_spanish:
  - busco
  - estoy en busca de
  lexicon: HALOT
  rationale: La combinación de pronombre independiente más participio expresa una acción en curso o inmediata; 'estoy buscando' preserva ese matiz progresivo mejor que un simple presente gnomico.
- source_word: הַגִּידָה נָּא לִי
  english_pob_choice: Please tell me
  chosen_spanish: por favor, díganme
  alternatives_spanish:
  - por favor, dígame
  - díganme, por favor
  - háganme saber
  lexicon: HALOT
  rationale: El imperativo intensificado por נָא expresa una petición cortés. Se eligió la forma plural reverencial de trato público ('díganme') por la claridad y naturalidad del español bíblico de lectura congregacional, aunque el hebreo no indica plural explícito aquí.
- source_word: אֵיפֹה
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - donde
  - en qué lugar
  lexicon: HALOT
  rationale: Interrogativo locativo directo; 'dónde' es la forma natural en español para preguntar por ubicación.
- source_word: הֵם
  english_pob_choice: they
  chosen_spanish: están
  alternatives_spanish:
  - ellos están
  - se encuentran
  lexicon: HALOT
  rationale: El pronombre explícito se puede sobreentender en español; se integra en la cláusula verbal para evitar redundancia y mantener fluidez.
- source_word: רֹעִים
  english_pob_choice: are pasturing / shepherding / grazing the flock
  chosen_spanish: apacentando
  alternatives_spanish:
  - pastoreando
  - cuidando el rebaño
  - pastoreando el rebaño
  lexicon: HALOT
  rationale: El participio qal de רעה en contexto pastoril expresa el cuidado de animales al pasto. 'Apacentando' es preciso, mantiene el matiz pastoral y evita añadir un objeto que no está en el hebreo.
translation_notes:
  revision_awareness: 'Alineado con el texto hebreo WLC y con la nota de la POB inglesa: se preserva el valor progresivo de מְבַקֵּשׁ y la ambigüedad léxica de רֹעִים sin sobreinterpretar ni suavizar el contexto pastoral.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda; este versículo no contiene el nombre divino.
  - '''Apacentando'' mantiene la imagen pastoral y evita un calco innecesario de ''shepherding''.'
  - Se optó por puntuación de cita española con comillas angulares y acentos normativos en 'díganme' y 'dónde'.
