    rationale: El English POB incluye una nota importante que explica la tensión con el versículo anterior y la posible comprensión de Egipto como receptor de plaga en vez de lluvia. Esa información auditada debe preservarse.
  - severity: medium
    issue: 'Redacción poco natural: «sobre ellos no habrá la plaga»'
    rationale: Aunque busca reflejar el hebreo, esa estructura suena rígida en español. «La plaga no estará sobre ellos» conserva mejor el sentido y resulta más legible.
  - severity: medium
