translation:
  language: es
  text: 'Pero en cuanto a mí[a], en ti confío, Yahvé; digo: «Tú eres mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero yo he confiado en ti, Yahvé; he dicho: “Tú eres mi Dios”». Los perfectos hebreos pueden entenderse como pasado o como perfecto presente; aquí se expresan como una confesión vigente de confianza y reconocimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: La construcción hebrea introduce contraste y énfasis personal. «Pero en cuanto a mí» conserva mejor ese matiz adversativo y focal que un simple «Pero yo».
- source_word: עָלֶיךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - en ti confié
  lexicon: HALOT
  rationale: Con בָטַח, על expresa el objeto de la confianza; en español, «en ti» es la forma natural y fiel para dependencia/reliance dirigida a Dios.
- source_word: בָטַחְתִּי
  english_pob_choice: I trust
  chosen_spanish: confío
  alternatives_spanish:
  - he confiado
  - confié
  lexicon: HALOT
  rationale: El qatal puede expresar una confianza presentada como estado actual o declaración vigente. En español, el presente «confío» comunica mejor la confianza continua del contexto poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrama con la forma de uso del proyecto en español: «Yahvé», evitando sustituirlo por un título genérico.'
- source_word: אָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - dije
  - he dicho
  lexicon: HALOT
  rationale: Aunque formalmente es perfectivo, aquí funciona como confesión viva en paralelo con la confianza presente. «Digo» mantiene la inmediatez de la declaración.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El sustantivo con sufijo de primera persona se vierte naturalmente como «mi Dios», que es claro, directo y fiel al hebreo.
- source_word: אָתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - eres tú
  - tú
  lexicon: HALOT
  rationale: 'El pronombre independiente marca énfasis. En español se expresa con la copula explícita: «Tú eres», preservando la fuerza enfática y la clausura predicativa.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue la política del proyecto de transliterar el nombre divino en lugar de ocultarlo con un sustituto. «Yahvé» preserva el nombre personal del pacto y evita la convención litúrgica de reemplazo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; el consenso de auditoría es alto. La versión española sigue esa lectura estable, manteniendo el contraste inicial, el nombre divino transliterado y los verbos en presente para reflejar la confianza y confesión actuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se usa «mi Dios» y no una paráfrasis como «Dios de mí», por claridad natural sin perder fidelidad.
  - Se conserva el énfasis de la primera persona con «en cuanto a mí».
  - La puntuación respeta la cita directa final y el paralelismo poético del versículo.
