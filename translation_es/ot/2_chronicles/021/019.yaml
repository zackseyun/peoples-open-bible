translation:
  language: es
  text: Y después de algún tiempo[a], al cabo de dos años, le salieron las entrañas[b] a causa de su enfermedad, y murió de enfermedades graves. Y su pueblo no hizo por él una quema[c], como la quema por sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tras algún tiempo». El hebreo expresa un lapso indefinido.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus intestinos». El hebreo se refiere literalmente a sus órganos internos.'
    reason: lexical_alternative
  - marker: c
    text: La «quema» aquí probablemente se refiere a un honor funerario, como la quema de especias, no a la cremación de su cuerpo; compárese con otras costumbres de sepultura real en Crónicas.
    reason: cultural_note
lexical_decisions:
- source_word: לְיָמִים מִיָּמִים
  english_pob_choice: after some time
  chosen_spanish: después de algún tiempo
  alternatives_spanish:
  - tras un tiempo
  - después de un tiempo
  lexicon: HALOT
  rationale: El hebreo expresa un lapso indefinido; en español, «después de algún tiempo» comunica la misma indeterminación sin sonar literalista de forma artificial.
- source_word: וּכְעֵת צֵאת הַקֵּץ לְיָמִים שְׁנַיִם
  english_pob_choice: at the end of two years
  chosen_spanish: al cabo de dos años
  alternatives_spanish:
  - al final de dos años
  - cuando llegó el fin de dos años
  lexicon: HALOT
  rationale: La expresión fija el término temporal de la enfermedad; «al cabo de dos años» es natural en español y preserva la idea de culminación del plazo.
- source_word: מֵעָיו
  english_pob_choice: his bowels
  chosen_spanish: las entrañas
  alternatives_spanish:
  - los intestinos
  - las vísceras
  lexicon: HALOT
  rationale: El sustantivo designa concretamente los órganos internos. «Entrañas» conserva la fuerza corporal y bíblica del hebreo sin restringirlo demasiado a un término clínico.
- source_word: יָצְאוּ מֵעָיו
  english_pob_choice: his bowels came out
  chosen_spanish: le salieron las entrañas
  alternatives_spanish:
  - le salieron los intestinos
  - le salieron las vísceras
  lexicon: HALOT
  rationale: Se mantiene el carácter gráfico del evento físico sin suavizarlo. En español, la construcción impersonal con dativo refleja bien el movimiento de salida.
- source_word: עִם חָלְיוֹ
  english_pob_choice: because of his sickness
  chosen_spanish: a causa de su enfermedad
  alternatives_spanish:
  - con su enfermedad
  - junto con su enfermedad
  lexicon: HALOT
  rationale: Aunque la preposición básica puede ser «con», el contexto pide relación causal o circunstancial; «a causa de» transmite la función pragmática indicada por el audit trail inglés.
- source_word: בְּתַחֲלֻאִים רָעִים
  english_pob_choice: of severe diseases
  chosen_spanish: de enfermedades graves
  alternatives_spanish:
  - de dolencias graves
  - de enfermedades terribles
  lexicon: HALOT
  rationale: El plural con adjetivo expresa padecimientos intensos. «Enfermedades graves» es claro y conserva el plural sin exagerar más allá del hebreo.
- source_word: שְׂרֵפָה
  english_pob_choice: burning
  chosen_spanish: una quema
  alternatives_spanish:
  - una cremación
  - un rito de quema
  lexicon: HALOT
  rationale: El término apunta a una quema funeraria u honorífica, no necesariamente a la incineración del cuerpo. «Una quema» conserva la transparencia léxica y deja espacio para la aclaración contextual.
- source_word: כִשְׂרֵפַת אֲבֹתָיו
  english_pob_choice: like the burning for his fathers
  chosen_spanish: como la quema de sus padres
  alternatives_spanish:
  - como la quema por sus padres
  - como el rito de quema de sus padres
  lexicon: HALOT
  rationale: La comparación remite al honor funerario dado a los reyes anteriores. «De sus padres» refleja el valor de antepasados/antecesores en el registro genealógico de Crónicas.
theological_decisions:
- issue: Naturaleza de שְׂרֵפָה en contexto real y funerario
  english_pob_reading: a funerary honorific burning, not cremation of Jehoram's body
  chosen_spanish_reading: una quema funeraria u honorífica, no la cremación del cuerpo de Joram
  alternative_spanish_readings:
  - cremación
  - rito de quema no especificado
  rationale: En el contexto de Crónicas, el contraste es entre los honores dados a los reyes anteriores y la omisión de ese honor para Joram. Mantener «quema» en el texto preserva la transparencia lexical; la lectura doctrinal/histórica se entiende como un rito honorífico, no como cremación, según el contexto narrativo.
  doctrine_reference: Crónicas 21:19; costumbres funerarias reales en Crónicas
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «in severe diseases» a «of severe diseases» por naturalidad, sin cambiar el sentido. En español se refleja esa misma relación causal/resultativa con «murió de enfermedades graves». También se conserva la decisión de mantener «burning» como valor transparente de שְׂרֵפָה, aclarado por el contexto de honra funeraria y no cremación.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se prefirió «entrañas» para mantener la fuerza concreta del hebreo y la coherencia con el audit trail inglés «bowels».
  - «Una quema» evita imponer «cremación», que sería interpretativamente más fuerte que el hebreo y el inglés auditado.
  - La puntuación sigue el flujo narrativo del hebreo y del inglés POB, con una sola oración principal coordinada al final.
