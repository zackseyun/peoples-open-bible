translation:
  language: es
  text: y por su hermana virgen, que es cercana a él[a], que no ha estado unida a un hombre, podrá hacerse impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no ha tenido marido» o «que no ha estado con un hombre». La expresión hebrea es idiomática y se refiere a una hermana que no ha entrado en unión con un hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/אֲחֹתוֹ
  english_pob_choice: and for his sister
  chosen_spanish: y por su hermana
  alternatives_spanish:
  - y por su propia hermana
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la preposición introducen otro caso permitido en la lista. El sufijo posesivo marca la relación de posesión/parentesco; en español no hace falta añadir «propia» para conservar el sentido.
- source_word: הַבְּתוּלָה
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - soltera
  lexicon: HALOT
  rationale: «בְּתוּלָה» denota de manera más directa el estado de virginidad. «Virgen» mantiene el rasgo sexual relevante para la condición legal del versículo.
- source_word: הַקְּרוֹבָה אֵלָיו
  english_pob_choice: who is near to him
  chosen_spanish: la que le es cercana
  alternatives_spanish:
  - la que está cerca de él
  - la más cercana a él
  lexicon: HALOT
  rationale: La expresión señala cercanía relacional o familiar. «Le es cercana» conserva la imagen hebrea sin restringirla solo a cercanía emocional.
- source_word: אֲשֶׁר לֹא הָיְתָה לְאִישׁ
  english_pob_choice: who has not belonged to a man
  chosen_spanish: que no ha pertenecido a un hombre
  alternatives_spanish:
  - que no ha tenido marido
  - que no ha estado con un hombre
  - que no se ha casado con un hombre
  lexicon: HALOT
  rationale: La frase es idiomática y en contexto legal apunta a una mujer que no ha entrado en unión con un varón. «Ha pertenecido a un hombre» conserva mejor la fuerza formal del hebreo que una paráfrasis más específica como «ha tenido marido».
- source_word: יִטַּמָּא
  english_pob_choice: he may make himself unclean
  chosen_spanish: podrá hacerse impuro
  alternatives_spanish:
  - podrá contaminarse ritualmente
  - podrá volverse impuro
  - podrá hacerse inmundo
  lexicon: HALOT
  rationale: En la ley sacerdotal, טמא describe impureza ritual, no corrupción moral. «Hacerse impuro» comunica la categoría ceremonial con naturalidad en español y evita moralizar el término.
theological_decisions:
- issue: Naturaleza de la impureza sacerdotal
  english_pob_reading: rendered as ritual uncleanness, not moral corruption
  chosen_spanish_reading: impureza ritual, no culpa moral
  alternative_spanish_readings:
  - impureza ceremonial
  - contaminación legal
  rationale: El pasaje trata regulaciones de contacto con cadáveres dentro de la ley sacerdotal. La traducción debe reflejar estatus ritual, no pecado personal.
  doctrine_reference: Levítico 21; pureza ritual sacerdotal
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a la frase correspondiente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino cuando corresponda; este versículo no lo contiene.
  - «Impuro» se usa en sentido ritual levítico, coherente con el registro legal del libro.
  - Se preserva la estructura coordinada del hebreo con una formulación natural en español.
  - No se reemplaza la tensión idiomática de «pertenecido a un hombre» por una equivalencia más interpretativa en el cuerpo principal.
