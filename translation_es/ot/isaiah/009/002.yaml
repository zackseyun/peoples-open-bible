translation:
  language: es
  text: Has multiplicado la nación[a]; no has aumentado el gozo. Se alegran delante de ti como con el gozo de la cosecha[b], como cuando se regocijan al repartir el botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones antiguas y muchas traducciones leen «has aumentado su gozo», reflejando una lectura hebrea como לוֹ («a ello» o «a él») en lugar de לֹא («no»).
    reason: textual_variant
  - marker: b
    text: 'O: «como el gozo de la cosecha, como cuando se regocijan al repartir el botín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבִּיתָ
  english_pob_choice: have multiplied
  chosen_spanish: has multiplicado
  alternatives_spanish:
  - has hecho grande
  - has aumentado
  lexicon: HALOT
  rationale: El perfecto causativo de רבה expresa la idea de hacer numeroso o multiplicar. «Has multiplicado» conserva esa fuerza causal y suena natural en español bíblico contemporáneo.
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: גוי puede significar nación o pueblo. Aquí el singular colectivo funciona bien como «la nación», manteniendo el referente corporativo del texto hebreo.
- source_word: לֹא הִגְדַּלְתָּ הַשִּׂמְחָה
  english_pob_choice: you have not increased the joy
  chosen_spanish: no has aumentado el gozo
  alternatives_spanish:
  - no has hecho grande el gozo
  - has aumentado su gozo
  lexicon: HALOT
  rationale: Se mantiene la lectura masorética con לֹא («no»), aunque el contexto resulte tenso. «Aumentado el gozo» expresa bien el verbo הגדל sin imponer una corrección textual en el cuerpo principal.
- source_word: שָׂמְחוּ
  english_pob_choice: They rejoice
  chosen_spanish: Se alegran
  alternatives_spanish:
  - se regocijan
  - se gozan
  lexicon: HALOT
  rationale: El verbo שמח denota alegría y regocijo. «Se alegran» es una opción clara y digna; evita sobrecargar el español con una repetición innecesaria de «gozo».
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La preposición idiomática preserva la orientación hacia Dios. «Delante de ti» es natural y reproduce bien la imagen espacial del hebreo.
- source_word: כְּשִׂמְחַת בַּקָּצִיר
  english_pob_choice: as with the joy at harvest
  chosen_spanish: como con el gozo de la cosecha
  alternatives_spanish:
  - como el gozo en la siega
  - como la alegría de la siega
  lexicon: HALOT
  rationale: La comparación alude al júbilo propio del tiempo de recolección. «Cosecha» comunica la escena de modo claro y moderno, sin perder la referencia agrícola.
- source_word: כַּאֲשֶׁר יָגִילוּ
  english_pob_choice: as men exult when
  chosen_spanish: como cuando se regocijan
  alternatives_spanish:
  - como cuando exultan
  - como cuando se alegran con júbilo
  lexicon: HALOT
  rationale: גיל expresa alegría intensa o exultación. En español, el verbo pronominal «se regocijan» transmite ese matiz con naturalidad; no hace falta añadir «hombres» en el texto principal porque el plural verbal ya cubre el referente genérico.
- source_word: בְּחַלְּקָם שָׁלָל
  english_pob_choice: they divide spoil
  chosen_spanish: al repartir el botín
  alternatives_spanish:
  - cuando se reparten el botín
  - al dividir el despojo
  lexicon: HALOT
  rationale: El idiomático repartir/dividir botín refleja el reparto de bienes capturados tras la victoria. «Botín» conserva el trasfondo bélico y es claro para el lector actual.
theological_decisions:
- issue: Lectura textual de לֹא frente a לוֹ en la segunda cola
  english_pob_reading: 'Main text follows the Masoretic Text: ''you have not increased the joy.'' The smoother alternative is preserved in a footnote as a textual variant.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo masorético: «no has aumentado el gozo».'
  alternative_spanish_readings:
  - «has aumentado su gozo»
  - «has hecho grande su gozo»
  rationale: Dado que la fuente hebrea provista lee explícitamente לֹא («no»), la traducción no debe corregir silenciosamente el texto. La tensión se conserva en el cuerpo principal y la lectura alternativa queda registrada como variante textual.
  doctrine_reference: Primacía del texto original; preservación de variantes textuales sin armonización silenciosa.
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo masorético provisto y se ha preservado la tensión textual en la segunda cola; la nota a documenta la variante antigua señalada en el audit trail inglés. No se aplicaron revisiones posteriores adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino; en este versículo no es necesario.
  - Se usa «gozo» para conservar el paralelismo con el audit trail inglés y la intensidad celebrativa del pasaje.
  - «Botín» se eligió por claridad y porque preserva el trasfondo militar sin suavizarlo.
  - No se introdujo «Cristo/Mesías» ni terminología ajena al versículo.
