revisions:
- from: Como un pájaro en su vagar[a], como una golondrina en su vuelo[c][b], así la maldición sin causa no llega a posarse.
  to: Como un gorrión en su vagar, como una golondrina[a] en su vuelo, así la maldición sin causa[b] no llega a posarse[c].
  rationale: 'La revisión alinea mejor el español con el original y con las decisiones léxicas auditadas del POB: se adopta ''gorrión'' para כַּצִּפּוֹר en el texto principal, se mueve la alternativa zoológica al segundo ave (''golondrina''/''vencejo'') donde realmente corresponde, y se conservan las notas explicativas sobre ''sin causa'' y el literal ''no llega''. El resultado sigue siendo natural en español y mantiene la fuerza proverbial del versículo.'
  reviewer_model: gpt-5.4
