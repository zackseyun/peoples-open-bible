translation:
  language: es
  text: Porque él es nuestro Dios[a], y nosotros somos el pueblo de su pastura, y las ovejas de su mano. Hoy, si escuchan su voz—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hoy, ¡ojalá que escucharan su voz!». La partícula hebrea puede introducir un deseo o una exhortación, no solo una condición simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: En este contexto, la partícula introduce la base o razón de la exhortación anterior. «Porque» mantiene bien el valor explicativo sin sonar forzado en español bíblico actual.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: El posesivo de primera persona plural expresa pertenencia pactual; «nuestro Dios» es la forma más natural y fiel en español.
- source_word: עַם מַרְעִיתוֹ
  english_pob_choice: the people of his pasture
  chosen_spanish: el pueblo de su pasto
  alternatives_spanish:
  - el pueblo de su pastura
  - el pueblo que él apacienta
  lexicon: HALOT
  rationale: Se conserva la metáfora pastoral. «Pasto» refleja de manera directa el sustantivo hebreo y evita reemplazarla por una explicación más interpretativa.
- source_word: צֹאן יָדוֹ
  english_pob_choice: the sheep of his hand
  chosen_spanish: las ovejas de su mano
  alternatives_spanish:
  - el rebaño de su mano
  - las ovejas bajo su mano
  lexicon: HALOT
  rationale: «Ovejas» sigue el paralelo poético y «de su mano» conserva la relación posesiva/metafórica del hebreo. Se evita resolver la imagen hacia una explicación como «bajo su mano».
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y conserva el giro retórico que conduce a la exhortación del verso siguiente.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - ¡oh, si
  - ojalá
  lexicon: HALOT
  rationale: Se mantiene la lectura condicional que encaja con la advertencia de los versículos siguientes. La opción exhortativa queda registrada en la nota, sin perder la tensión del hebreo.
- source_word: בְּקֹלוֹ תִשְׁמָעוּ
  english_pob_choice: you hear his voice
  chosen_spanish: escuchen su voz
  alternatives_spanish:
  - oigan su voz
  - obedezcan su voz
  lexicon: HALOT
  rationale: «Escuchen» conserva el valor básico de שׁמע sin imponer de entrada el sentido de obediencia, aunque este permanece implicado por el contexto.
theological_decisions:
- issue: Fuerza de la cláusula final הַיּוֹם אִם בְּקֹלוֹ תִשְׁמָעוּ
  english_pob_reading: 'Rendered as a conditional-exhortatory opening: ''Today, if you hear his voice—'''
  chosen_spanish_reading: «Hoy, si escuchan su voz—» como apertura condicional al llamado de advertencia.
  alternative_spanish_readings:
  - «Hoy, ¡ojalá que escucharan su voz!»
  - «Hoy, si oyen su voz—»
  rationale: La sintaxis del salmo favorece la lectura condicional que introduce la advertencia de los versículos 8 y siguientes. La posibilidad exhortativa o desiderativa del hebreo se reconoce como alternativa, pero no se vuelve la lectura principal.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés al mantener la estructura paralela con dos miembros coordinados: «el pueblo de su pasto» y «las ovejas de su mano», sin añadir explicaciones interpretativas. También se conservó la apertura condicional del cierre del verso.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando el hebreo tiene el nombre divino explícito; aquí el texto usa אֱלֹהֵינוּ, por lo que corresponde «nuestro Dios».
  - Se mantuvo la imagen pastoral sin sustituirla por una explicación doctrinal o eclesial.
  - «Escuchen» preserva el verbo de oír/escuchar sin forzar la obediencia en la superficie del texto.
