base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/039.yaml
  text: And after you another kingdom[a], inferior to yours, will arise; and yet a third kingdom, of bronze[b], which will rule over all the earth.
  footnotes:
  - marker: a
    text: Or 'lower than you.' The Aramaic expression is difficult; the sense is that the next kingdom is less than Nebuchadnezzar's kingdom in rank or splendor.
    reason: lexical_alternative
  - marker: b
    text: Or 'over the whole land.' The term can mean either 'earth' or 'land,' but here likely refers to broad imperial dominion.
    reason: lexical_alternative
