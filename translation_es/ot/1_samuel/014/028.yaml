revisions:
- from: 'Entonces respondió uno de los del pueblo y dijo[a]: «Tu padre impuso al pueblo un juramento estrictísimo, diciendo[b]: “Maldito el hombre que coma pan hoy”». Y el pueblo estaba cansado.'
  to: 'Entonces respondió uno del pueblo y dijo: «Tu padre hizo jurar estrictamente al pueblo, diciendo: “Maldito el hombre que coma pan[a] hoy”». Y el pueblo estaba desfallecido[b].'
  rationale: Se revisa la frase del juramento para reflejar mejor el causativo intensificado del hebreo en un español natural («hizo jurar estrictamente al pueblo»). Se fortalece la última cláusula con «desfallecido», más fiel al contexto y al valor de וַיָּעַף. También se corrige el anclaje de las notas para que correspondan exactamente a los elementos explicados.
