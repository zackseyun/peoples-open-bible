id: ACT.19.6
reference: Acts 19:6
source:
  edition: SBLGNT
  text: καὶ ἐπιθέντος αὐτοῖς τοῦ ⸀Παύλου χεῖρας ἦλθε τὸ πνεῦμα τὸ ἅγιον ἐπ’ αὐτούς, ἐλάλουν τε γλώσσαις καὶ ἐπροφήτευον.
translation:
  text: And when Paul laid his hands on them[a], the Holy Spirit came upon them, and they began speaking in tongues and prophesying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speaking in languages.' The Greek can mean 'tongues' or 'languages'; the main text preserves the ambiguity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθέντος ... χεῖρας
  chosen: when Paul laid his hands on them
  alternatives:
  - after Paul had laid hands on them
  - with Paul having laid hands on them
  lexicon: BDAG
  rationale: The aorist participle with genitive absolute is most naturally rendered as a temporal clause in English. 'Laid his hands on them' preserves the idiom without awkward literalism.
- source_word: ἦλθε ... ἐπ’ αὐτούς
  chosen: came upon them
  alternatives:
  - came on them
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of ἔρχομαι with ἐπί in this context of the Spirit's coming. 'Upon' preserves the directional force and echoes Luke-Acts usage.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary English rendering; 'Holy Spirit' is clear, natural, and theologically precise.
- source_word: ἐλάλουν
  chosen: they began speaking
  alternatives:
  - they were speaking
  - they spoke
  lexicon: BDAG
  rationale: The imperfect indicates ongoing/inceptive action in narrative context. 'Began speaking' captures the onset of the manifestation more naturally in English than a bare imperfective gloss.
- source_word: γλώσσαις
  chosen: in tongues
  alternatives:
  - in other languages
  - with tongues
  lexicon: BDAG
  rationale: In Acts this expression conventionally refers to Spirit-enabled speech and is best rendered 'tongues' to preserve the lexical form and theological ambiguity. 'Languages' is possible but more interpretively specific than the Greek here requires.
- source_word: ἐπροφήτευον
  chosen: prophesying
  alternatives:
  - speaking prophetically
  lexicon: BDAG
  rationale: The verb directly denotes prophetic speech. 'Prophesying' is the most transparent and established rendering.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - both
  lexicon: BDAG
  rationale: The enclitic τε links the first and second manifestations closely. In smooth English, the coordination is adequately conveyed by 'and' in the paired construction.
