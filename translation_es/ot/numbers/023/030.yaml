  text: Así Balac hizo tal como Balaán había dicho, y ofreció un toro y un carnero en el altar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - actuó
  lexicon: HALOT
  rationale: En esta construcción con כַּאֲשֶׁר אָמַר, el verbo expresa cumplimiento de una instrucción previa. «Hizo» conserva el sentido narrativo natural en español y corresponde al valor funcional de «did» en inglés.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - como
  - según lo que
  lexicon: HALOT
  rationale: El hebreo introduce conformidad con lo dicho por Balaam. «Conforme a lo que» mantiene esa idea de ajuste a una instrucción, sin volver la frase pesada o poco natural.
- source_word: אָמַר
  english_pob_choice: had said
  chosen_spanish: había dicho
  alternatives_spanish:
  - dijo
  - había hablado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien que la orden de Balaam precede a la acción de Balac. «Había dicho» conserva la relación temporal marcada en la traducción inglesa auditada.
- source_word: וַיַּעַל
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en holocausto
  - hizo subir
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה puede aludir a la ofrenda que sube en humo. En español, «ofreció» es suficiente y fluido; la precisión cultual queda sostenida por el contexto del altar. Se evita añadir «holocausto» porque el hebreo aquí no lo explicita.
- source_word: פָּר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un bull
  - un becerro
  lexicon: HALOT
  rationale: «Toro» es el equivalente natural y claro en español para el animal sacrificial adulto, sin el matiz más técnico o arcaizante de «becerro».
- source_word: אַיִל
  english_pob_choice: a ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un cordero macho
  - un macho de oveja
  lexicon: HALOT
  rationale: «Carnero» reproduce con precisión el animal sacrificial de אַיִל y es más idiomático que una perífrasis.
- source_word: בַּמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: «Sobre el altar» comunica de forma natural el sentido locativo-cultual de la acción sacrificial. Conserva el tono de colocación ritual sin sonar mecánico.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones sustantivas; el hebreo y el inglés concuerdan en el sentido narrativo y cultual básico. La versión española sigue esa línea sin introducir explicaciones adicionales no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se eligieron vocablos sacrificiales claros y actuales («toro», «carnero», «altar») para una lectura pública, evitando arcaísmos.
  - No se añadió nota textual porque no hay variante relevante en el paquete fuente proporcionado.
