translation:
  language: es
  text: Y fue adversario de Israel todos los días de Salomón[a], además del daño[b] que Hadad causó. Y aborreció a Israel y reinó sobre Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante toda la vida de Salomón». La expresión hebrea también puede referirse a todo su reinado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «además del mal», «además de la calamidad» o «además de la aflicción que Hadad causó». La frase hebrea es elíptica y puede entenderse como un añadido al daño ya causado por Hadad.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂטָן
  english_pob_choice: adversary
  chosen_spanish: adversario
  alternatives_spanish:
  - enemigo
  - acusador
  lexicon: HALOT
  rationale: En este relato histórico, el término designa a un oponente humano, no al personaje teológico posterior llamado Satanás. 'Adversario' conserva el sentido relacional de oposición sin importar una lectura demonológica ajena al contexto.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - contra Israel
  - para Israel
  lexicon: HALOT
  rationale: Con שָׂטָן, la preposición expresa el bando o esfera afectada por la oposición. En español, 'adversario de Israel' suena natural y mantiene la relación adversativa sin forzar la sintaxis.
- source_word: כָּל יְמֵי שְׁלֹמֹה
  english_pob_choice: all the days of Solomon
  chosen_spanish: todos los días de Salomón
  alternatives_spanish:
  - durante todos los días de Salomón
  - a lo largo de los días de Salomón
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática que abarca toda la vida o reinado de Salomón. La forma elegida es transparente y cercana al hebreo.
- source_word: וְאֶת הָרָעָה אֲשֶׁר הֲדָד
  english_pob_choice: besides the trouble that Hadad caused
  chosen_spanish: además del mal que Hadad causó
  alternatives_spanish:
  - además de la calamidad que Hadad causó
  - junto con el daño que Hadad causó
  lexicon: HALOT
  rationale: La frase es elíptica y difícil. Se entiende mejor como un agregado a la oposición ya mencionada. 'Mal' conserva la amplitud semántica de רָעָה, aunque aquí no debe oírse como maldad moral sino como daño o calamidad causada a Israel.
- source_word: רָעָה
  english_pob_choice: trouble
  chosen_spanish: mal
  alternatives_spanish:
  - daño
  - calamidad
  - problema
  lexicon: HALOT
  rationale: El campo semántico aquí apunta a aflicción o perjuicio sobre Israel, no a maldad ética abstracta. 'Mal' es breve y fiel; el contexto determina su sentido de daño/aflicción.
- source_word: וַיָּקָץ
  english_pob_choice: he abhorred
  chosen_spanish: aborreció
  alternatives_spanish:
  - detestó
  - le repugnó
  - tuvo aversión a
  lexicon: HALOT
  rationale: El verbo expresa rechazo intenso, incluso aversión. 'Aborreció' preserva ese tono fuerte y coincide con el registro elevado del texto narrativo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - contra Israel
  - de Israel
  lexicon: HALOT
  rationale: Con קוץ, la preposición marca al objeto del aborrecimiento. En español, 'aborreció a Israel' comunica ese valor de forma natural y fiel.
- source_word: וַיִּמְלֹךְ עַל אֲרָם
  english_pob_choice: reigned over Aram
  chosen_spanish: reinó sobre Aram
  alternatives_spanish:
  - reinó sobre Aram
  - llegó a reinar sobre Aram
  lexicon: HALOT
  rationale: '''Aram'' se conserva como nombre propio transliterado, no como ''Siria'', para respetar el marco histórico del hebreo. ''Reinó sobre'' refleja el verbo מלך en forma narrativa simple.'
theological_decisions:
- issue: שָׂטָן como nombre propio versus sustantivo común
  english_pob_reading: human 'adversary'
  chosen_spanish_reading: adversario
  alternative_spanish_readings:
  - Satanás
  - Satan
  rationale: El contexto habla de opositores políticos levantados contra Salomón. Traducirlo como nombre propio introduciría una referencia teológica posterior que el pasaje no exige. 'Adversario' mantiene la lectura común y la tensión semántica del hebreo.
  doctrine_reference: Primacía del texto original y distinción entre uso común y uso onomástico
- issue: Valor de וְאֶת הָרָעָה אֲשֶׁר הֲדָד como cláusula elíptica
  english_pob_reading: besides the trouble that Hadad caused
  chosen_spanish_reading: además del mal que Hadad causó
  alternative_spanish_readings:
  - además de la aflicción que Hadad causó
  - junto con el daño que Hadad causó
  rationale: El hebreo es abreviado y admite varias reconstrucciones. La versión española conserva la adición al cuadro de hostilidad sin resolver artificialmente la ambigüedad, y permite leer 'mal' como daño/calamidad más que como maldad moral.
  doctrine_reference: Principio de no borrar ambigüedad textual documentada
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB al preferir un tono formal equivalente a ''abhorred'' y una conexión aditiva natural para la cláusula difícil: no intenta resolver la elipsis de forma excesiva, sino conservar su fuerza y su ambigüedad documentada.'
  spanish_consistency_notes:
  - Se mantiene 'Aram' como transliteración del nombre propio, en continuidad con el criterio POB para evitar la etiqueta histórica posterior 'Siria'.
  - Se usa 'adversario' y no 'Satanás' para conservar el valor léxico común de שָׂטָן en este contexto narrativo.
  - 'La voz verbal española respeta la secuencia narrativa del hebreo: oposición continua, añadido de daño de Hadad, aborrecimiento de Israel y reinado sobre Aram.'
