id: 2CO.1.8
reference: 2 Corinthians 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ γὰρ θέλομεν ὑμᾶς ἀγνοεῖν, ἀδελφοί, ⸀ὑπὲρ τῆς θλίψεως ἡμῶν τῆς ⸀γενομένης ἐν τῇ Ἀσίᾳ, ὅτι καθ’ ὑπερβολὴν ⸂ὑπὲρ δύναμιν ἐβαρήθημεν⸃, ὥστε ἐξαπορηθῆναι ἡμᾶς καὶ τοῦ ζῆν·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/008.yaml
  text: For we do not want you to be unaware, brothers, about our affliction that happened in Asia, that we were burdened exceedingly, beyond our strength, so that we despaired even of life.
  footnotes:
  - marker: a
    text: “Brothers” translates the masculine plural ἀδελφοί; in context Paul likely addresses the believing community inclusively.
    reason: cultural_note
  - marker: b
    text: “Asia” refers to the Roman province in western Asia Minor, not the modern continent.
    reason: cultural_note
  - marker: c
    text: Or “so that we despaired even of continuing to live.”
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 우리는 아시아에서 우리에게 닥친 환난에 대해 여러분이 모르기를 원치 않습니다. 우리는 힘에 겹도록 심히 눌려 살 소망까지 끊어졌습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제 여러분
  alternatives_korean:
  - 형제들
  - 형제자매들
  lexicon: BDAG
  rationale: 바울의 호격 정형. 한국어 합쇼체 호칭으로 「형제 여러분」이 자연스럽다.
- source_word: τῇ Ἀσίᾳ
  english_pob_choice: Asia
  chosen_korean: 아시아
  alternatives_korean:
  - 아시아 (소아시아)
  lexicon: BDAG
  rationale: 로마 속주 「아시아」. 한국어 정립 표기 그대로.
- source_word: ἐβαρήθημεν
  english_pob_choice: were burdened
  chosen_korean: 눌리다
  alternatives_korean:
  - 짓눌리다
  - 무거운 짐을 지다
  lexicon: BDAG
  rationale: 수동태 「짓눌리다」의 강한 표현. 「눌리다」가 자연스러운 한국어.
- source_word: ἐξαπορηθῆναι
  english_pob_choice: despaired
  chosen_korean: 소망이 끊어지다
  alternatives_korean:
  - 절망하다
  lexicon: BDAG
  rationale: 강세 합성어로 완전한 절망을 표현. 한국어 「살 소망까지 끊어지다」가 본문의 무게를 자연스럽게 담는다.
