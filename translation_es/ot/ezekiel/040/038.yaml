review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: una cámara, su entrada, su ubicación junto a un elemento arquitectónico de las puertas, y la acción de lavar la ofrenda. También preserva adecuadamente la nota sobre אֵילִים como término arquitectónico debatido. Sin embargo, hay dos puntos mejorables: (1) «enjuagarían» suena algo estrecho y menos natural en español bíblico para el lavado ritual de una víctima/ofrenda; «lavaban» o «lavarían» comunica mejor el sentido cultual. (2) «el holocausto» es tradicional, pero en español contemporáneo puede crear una asociación fuerte con el evento histórico moderno; dado que el inglés POB eligió «the burnt offering» y no una formulación más cargada, «la ofrenda quemada» preserva mejor el sentido sin ambigüedad innecesaria.'
  spanish_quality_summary: 'La frase es mayormente clara y digna. «Cámara» funciona en contexto arquitectónico-templario. «Junto a los postes de las puertas» es natural y fiel, con la nota aclaratoria adecuada. La combinación «allí enjuagarían el holocausto» es comprensible, pero menos idiomática: en español se lava una ofrenda o la víctima sacrificial; «enjuagar» suele activar un marco más doméstico o parcial. Una redacción ligeramente más natural mejora la legibilidad sin perder precisión.'
  glossary_alignment: No hay términos del glosario principal en tensión salvo עֹלָה. Aunque «holocausto» tiene pedigree bíblico, aquí conviene alinearse más estrechamente con la decisión inglesa «burnt offering» y evitar ambigüedad moderna con «ofrenda quemada». El resto de las decisiones léxicas está alineado con la evidencia fuente y la práctica POB.
  issues:
  - severity: medium
    issue: «enjuagarían» suena poco natural para el lavado ritual de la ofrenda
    rationale: El hebreo יָדִיחוּ se refiere al lavado/rinsing en contexto cultual, pero en español «enjuagar» suele sonar más doméstico o parcial. «Lavaban» expresa mejor la acción ritual habitual/descriptiva del imperfecto.
  - severity: medium
    issue: «el holocausto» puede introducir una asociación moderna innecesaria
    rationale: Aunque es un equivalente bíblico tradicional para עֹלָה, el inglés POB escogió «the burnt offering». En español actual, «ofrenda quemada» o similar evita ambigüedad sin perder fidelidad.
  revised_spanish_text: Había una cámara con su entrada junto a los postes de las puertas[a]; allí lavaban la ofrenda quemada.
