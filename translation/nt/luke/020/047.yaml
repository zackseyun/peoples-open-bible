id: LUK.20.47
reference: Luke 20:47
source:
  edition: SBLGNT
  text: οἳ κατεσθίουσιν τὰς οἰκίας τῶν χηρῶν καὶ προφάσει μακρὰ προσεύχονται· οὗτοι λήμψονται περισσότερον κρίμα.
translation:
  text: who devour widows’ houses and for a pretense pray at length[b][a]. These will receive greater condemnation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a pretense' / 'as a pretext.'
    reason: lexical_alternative
  - marker: b
    text: Or 'more severe judgment' or 'greater condemnation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσθίουσιν
  chosen: devour
  alternatives:
  - consume
  - eat up
  lexicon: BDAG
  rationale: The verb is metaphorical here for rapacious exploitation, not literal eating. 'Devour' preserves the vivid, condemnatory force common in English Bible usage without softening the abuse.
- source_word: οἰκίας
  chosen: houses
  alternatives:
  - homes
  - property
  lexicon: BDAG
  rationale: The literal noun is 'houses.' In context it likely stands metonymically for households or property, but 'houses' preserves the Greek wording and the idiomatic force of exploiting widows' possessions.
- source_word: χηρῶν
  chosen: widows’
  lexicon: BDAG
  rationale: Standard rendering of the genitive plural; the possessive in English naturally conveys the relation to 'houses.'
- source_word: προφάσει
  chosen: for appearance’s sake
  alternatives:
  - for a pretense
  - as a pretext
  lexicon: BDAG
  rationale: 'The dative expresses manner or basis: their long prayers are done under a false outward show. ''For appearance’s sake'' is idiomatic modern English that captures hypocritical display. A more formal alternative is preserved in a footnote.'
- source_word: μακρὰ
  chosen: at length
  alternatives:
  - long
  - for a long time
  lexicon: BDAG
  rationale: Used adverbially with 'pray'; 'at length' communicates extended duration in a natural, elevated but still readable way.
- source_word: προσεύχονται
  chosen: pray
  lexicon: BDAG
  rationale: Straightforward present middle/passive deponent meaning 'pray.'
- source_word: λήμψονται
  chosen: will receive
  alternatives:
  - will get
  lexicon: BDAG
  rationale: Future middle of λαμβάνω here means to receive as the outcome of divine judgment. 'Will receive' is standard and suitably solemn.
- source_word: περισσότερον κρίμα
  chosen: greater judgment
  alternatives:
  - more severe judgment
  - greater condemnation
  lexicon: BDAG
  rationale: The comparative adjective with κρίμα indicates a heightened judicial sentence. 'Greater judgment' stays close to the Greek while allowing the context of divine condemnation to be heard. 'Greater condemnation' is possible but slightly more interpretive.
