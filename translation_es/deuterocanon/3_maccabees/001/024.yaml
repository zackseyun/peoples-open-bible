    rationale: Aunque fiel, una formulación participial más simple como 'Habiendo vuelto atrás' mantiene mejor la concisión del griego y su enlace con el verbo principal, sin perder naturalidad.
  revised_spanish_text: Habiendo vuelto atrás[a], regresaron a la misma postura de súplica.
