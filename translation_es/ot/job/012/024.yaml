    text: Or 'the leaders of the people of the earth.' Hebrew 'heads of the people of the land/earth.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'heart'; here it refers to understanding or judgment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in a waste, no road'—that is, in a pathless wasteland.
    reason: lexical_alternative
