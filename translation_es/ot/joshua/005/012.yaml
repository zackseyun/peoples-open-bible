review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el cese del maná, la secuencia temporal tras comer del producto de la tierra, la cláusula existencial negativa, y el consumo del rendimiento de Canaán ese año. También preserva correctamente «hijos de Israel» con nota. Sin embargo, hay dos ajustes de fidelidad/estilo: 1) la nota [a] está anclada en «al día siguiente», pero su contenido explica «del fruto de la tierra»; el anclaje debe moverse al sintagma relevante. 2) «después de que habían comido» suena menos natural para una acción anterior puntual; «después de que comieron» o «después de haber comido» representa mejor la temporalidad en español narrativo.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión. «Ya no hubo más maná» resulta algo redundante; «ya no hubo maná» expresa bien el hebreo. «Fruto de la tierra» es comprensible, aunque «producto de la tierra» armoniza mejor con la nota y con el campo semántico agrícola del pasaje. El resto del verso fluye bien en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Maná», «hijos de Israel» y «tierra de Canaán» están bien alineados. La decisión de conservar «hijos de Israel» con nota explicativa sigue adecuadamente la filosofía documentada.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: El marcador aparece tras «al día siguiente», pero la nota comenta el sentido de עֲבוּר הָאָרֶץ, es decir, «producto/fruto de la tierra». Esto rompe la correspondencia exigida entre marcador y palabra explicada.
  - severity: low
    issue: «después de que habían comido» suena poco natural en esta secuencia narrativa.
    rationale: El hebreo expresa una relación temporal simple. En español narrativo, «después de que comieron» o «después de haber comido» es más idiomático que el pluscuamperfecto con imperfecto auxiliar.
  - severity: low
    issue: «Ya no hubo más maná» es redundante.
    rationale: La combinación «ya no» + «más» recarga innecesariamente la expresión. «Ya no hubo maná» o «No hubo más maná» transmite mejor la cláusula existencial negativa.
  revised_spanish_text: Y el maná cesó al día siguiente, después de que comieron del producto[a] de la tierra. Ya no hubo maná para los hijos de Israel[b], y comieron del producto de la tierra de Canaán aquel año.
  revised_footnotes:
  - marker: a
    text: O «del producto almacenado de la tierra». El término hebreo puede referirse más específicamente a provisiones guardadas de la cosecha del año anterior.
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Israel» es más literal respecto del hebreo; otras traducciones usan «israelitas» o «pueblo de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que coincida con la expresión que realmente explica, se mejora la naturalidad temporal con «después de que comieron», se elimina la redundancia de «ya no hubo más», y se usa «producto» para armonizar mejor con la nota léxica y el sentido agrícola del hebreo.
