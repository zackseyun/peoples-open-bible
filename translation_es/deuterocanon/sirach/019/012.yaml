translation:
  language: es
  text: Cuestiona a un amigo[a], no sea que no lo haya hecho; y si sí lo hizo, para que no lo vuelva a hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reprende a un amigo … no sea que añada a ello». El verbo inicial también puede entenderse como «confronta», y la última cláusula puede leerse más literalmente como una advertencia contra repetir o intensificar el acto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  english_pob_choice: Question
  chosen_spanish: Corrige
  alternatives_spanish:
  - Cuestiona
  - Confronta
  - Examina
  - Reprende
  lexicon: LSJ
  rationale: El verbo griego puede abarcar cuestionar, confrontar, reprender o poner en evidencia. En español, «corrige» conserva la fuerza de intervención moral o fraterna que el contexto proverbial requiere, sin sonar tan forense como «examina» ni tan duro como «reprende».
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a tu amigo
  - a un amigo tuyo
  - al amigo
  lexicon: LSJ
  rationale: El sustantivo es singular e indefinido; en español, «a un amigo» mantiene el carácter proverbial/general y no introduce una relación posesiva que el griego no expresa explícitamente.
- source_word: μή ποτε
  english_pob_choice: perhaps / lest perhaps
  chosen_spanish: no sea que quizás
  alternatives_spanish:
  - por si acaso
  - no sea que
  - quizás
  - para que no
  lexicon: LSJ
  rationale: La combinación griega introduce cautela ante una posibilidad. «No sea que quizás» reproduce esa cautela y la incertidumbre del original mejor que un simple «quizás», aunque la frase resulte algo marcada.
- source_word: οὐκ ἐποίησεν
  english_pob_choice: he did not do it
  chosen_spanish: no lo hizo
  alternatives_spanish:
  - no lo ha hecho
  - no hizo eso
  - no lo hizo realmente
  lexicon: LSJ
  rationale: ποίησεν es un aoristo con objeto implícito; el español necesita un referente. «No lo hizo» es natural y conserva la referencia a un acto no especificado.
- source_word: καὶ εἴ τι ἐποίησεν
  english_pob_choice: and if he did do it
  chosen_spanish: y si sí lo hizo
  alternatives_spanish:
  - y si hizo algo
  - y si en efecto lo hizo
  - y si lo hizo de verdad
  lexicon: LSJ
  rationale: τι es indefinido, pero aquí contrasta con la posibilidad anterior. «Si sí lo hizo» refleja el énfasis y evita añadir contenido que el griego no da.
- source_word: προσθῇ
  english_pob_choice: do it again
  chosen_spanish: lo vuelva a hacer
  alternatives_spanish:
  - lo repita
  - añada a ello
  - lo haga otra vez
  lexicon: LSJ
  rationale: προστίθημι literalmente significa «añadir», pero en este contexto ético la idea es no proseguir ni repetir la acción. «Lo vuelva a hacer» comunica bien la lectura contextual que la POB inglesa adoptó.
translation_notes:
  revision_awareness: La revisión inglesa pasó de «lest perhaps» y una clausula final literal («add to it») a una formulación más natural («do it again»). La versión española sigue esa revisión al priorizar el sentido contextual de προσθῇ como repetición de la acción, pero conserva la cautela de μή ποτε con una construcción equivalente aunque algo más marcada en español.
  spanish_consistency_notes:
  - Se mantiene el registro proverbial y admonitorio, sin convertir la frase en una orden judicial.
  - «Amigo» se deja sin posesivo para conservar la generalidad del proverbio.
  - La partícula final se resuelve como repetición de la acción, no como mera suma abstracta, porque el contexto inmediato apunta a conducta.
  - Se evita «Señor»/«Cristo» porque no hay terminología teológica relevante en este verso.
