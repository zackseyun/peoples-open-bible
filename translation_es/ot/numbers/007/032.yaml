  glossary_alignment: 'No hay términos teológicos mayores en juego. «Incienso» y «siclos» están bien. La principal cuestión léxica es כַּף: el inglés auditado escogió «dish» frente a spoon/bowl/pan. En español, «platillo» es posible, pero «cazoleta» comunica mejor un pequeño recipiente cultual sin sonar doméstico ni moderno en exceso.'
