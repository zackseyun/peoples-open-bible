    reason: lexical_alternative
  - marker: b
    text: Aquí «judaísmo» se refiere a la religión judía y al modo de vida judío defendidos frente a la presión extranjera.
    reason: cultural_note
  - marker: c
    text: El griego conserva una designación etnocultural despectiva; alternativamente, «las multitudes extranjeras».
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el texto para reflejar mejor la fuente griega y la auditoría inglesa: «del cielo» por ἐξ οὐρανοῦ, «a los que» para evitar una expansión interpretativa, y «combatieron noblemente» para conservar el matiz militar de ἀνδραγαθήσασιν con una expresión natural en español. También se alineó ἐπιφανείας con la elección principal de la POB («apariciones») y se añadió la nota cultural sobre «judaísmo» presente en la auditoría inglesa.'
