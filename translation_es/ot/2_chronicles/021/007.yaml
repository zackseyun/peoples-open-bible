base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/007.yaml
  text: Yet Yahweh was not willing to destroy the house of David[a], because of the covenant that he had made with David[c][b], and as he had said that he would give to him and to his sons a lamp for all days.
