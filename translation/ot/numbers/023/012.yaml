theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of compulsion in Balaam's response
  chosen_reading: Must I not be careful to speak what the LORD puts in my mouth?
  alternative_readings:
  - Should I not speak only what the LORD puts in my mouth?
  - Must I not be careful to speak what the LORD puts in my mouth?
  rationale: The Hebrew combines rhetorical obligation (הֲלֹא) with שׁמר + infinitive, which suggests careful adherence rather than mere future action. The chosen wording preserves Balaam's constrained responsibility without overstating mechanical dictation.
