translation:
  language: es
  text: Pues Yah[a] ha escogido a Jacob para sí mismo, a Israel como su posesión preciada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», la forma corta del nombre divino.'
