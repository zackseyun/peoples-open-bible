review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido global del hebreo: Faraón concede la salida para sacrificar a Yahvé en el desierto, impone una restricción de distancia y pide intercesión. También acierta al usar “Yahvé” conforme a la doctrina del proyecto. Sin embargo, la frase final de la restricción, “no se alejen mucho para ir”, no representa bien el hebreo idiomáticamente ni la intensificación הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת, que significa que no deben ir muy lejos, no ‘alejarse mucho para ir’.'
  spanish_quality_summary: El español es generalmente claro y digno, pero “Solo, no se alejen mucho para ir” suena forzado e innecesariamente calcado. “No vayan muy lejos” o equivalente expresa mejor el sentido en español natural. Además, “desierto” es aceptable, pero en Éxodo “wilderness” suele reflejarse mejor como “desierto” o “región desierta”; no requiere cambio obligatorio. El resto fluye bien.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יהוה -> “Yahvé” correctamente; אֱלֹהֵיכֶם -> “su Dios” natural con ustedes; עתר -> “Rueguen” aceptable, aunque “suplicuen” también serviría. El único ajuste relevante es idiomático-semántico en הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת.'
  issues:
  - severity: medium
    issue: La cláusula “no se alejen mucho para ir” es un calco poco natural y semánticamente torpe.
    rationale: 'El hebreo intensifica la idea de distancia en el acto de ir: ‘no vayan muy lejos’. La redacción actual introduce una construcción española extraña (“alejarse ... para ir”) que no preserva bien la fuerza ni la naturalidad del original.'
  revised_spanish_text: 'Entonces el faraón dijo: “Yo los dejaré ir, para que sacrifiquen a Yahvé su Dios en el desierto. Solo, no vayan muy lejos. Rueguen por mí.”'
  revision_rationale: 'Se ajusta únicamente la cláusula de restricción de distancia para reflejar con fidelidad e idiomaticidad el hebreo intensificado הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת: en español natural, ‘no vayan muy lejos’. No se requieren notas al pie, porque no se pierde una alternativa significativa ni surge ambigüedad nueva.'
