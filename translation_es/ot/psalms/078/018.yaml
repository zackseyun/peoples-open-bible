translation:
  language: es
  text: Pusieron a prueba a Dios en su corazón, al pedir comida para sí mismos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sus corazones». El hebreo dice literalmente «en su corazón», con singular colectivo que también puede entenderse de manera distributiva.'
    reason: alternative_reading
  - marker: b
    text: 'O: «para su apetito». El hebreo dice literalmente «para su néfesh», que aquí también puede referirse al deseo o apetito corporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַסּוּ
  english_pob_choice: they tested
  chosen_spanish: pusieron a prueba
  alternatives_spanish:
  - tentaron
  - probaron
  - lo pusieron a prueba
  lexicon: HALOT
  rationale: נסה en piel expresa la idea de poner a prueba o someter a prueba. «Pusieron a prueba» conserva bien la fuerza verbal y es natural en español bíblico contemporáneo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Poderoso
  - el Poderoso
  lexicon: HALOT
  rationale: אֵל es un título divino común. En este contexto, «Dios» es la equivalencia más clara y fiel en español.
- source_word: בִּלְבָבָם
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - dentro de su corazón
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo para una disposición interior del pueblo. «En su corazón» preserva el idioma semítico y suena natural en español.
- source_word: לִשְׁאָל
  english_pob_choice: by asking
  chosen_spanish: pidiendo
  alternatives_spanish:
  - al pedir
  - mediante pedir
  - cuando pedían
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa medio o manera. En español, el gerundio «pidiendo» comunica bien que lo pusieron a prueba mediante esa petición.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - comida para comer
  lexicon: HALOT
  rationale: אֹכֶל es un término general para comida/alimento. «Comida» es claro, natural y suficientemente amplio en español.
- source_word: לְנַפְשָׁם
  english_pob_choice: for themselves / for their appetite
  chosen_spanish: para sí
  alternatives_spanish:
  - para su apetito
  - para su alma
  - para ellos mismos
  lexicon: HALOT
  rationale: נפש puede significar alma, vida, ser o apetito según el contexto. Aquí el contexto de pedir comida apunta a la demanda egoísta dirigida a su propio provecho; «para sí» evita forzar «apetito» y mantiene la amplitud semántica documentada.
theological_decisions:
- issue: Valor de נֶפֶשׁ en un contexto de deseo por comida
  english_pob_reading: for themselves / for their appetite
  chosen_spanish_reading: para sí
  alternative_spanish_readings:
  - para su apetito
  - para su alma
  - para ellos mismos
  rationale: La POB en inglés decidió no imponer «soul» y finalmente restringió la frase a «for themselves». En español, «para sí» preserva esa lectura más literal y evita introducir una interpretación psicológica más específica de la que el texto exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El audit trail inglés muestra una evolución desde «for their appetite» a «for themselves», con acuerdo general alto y sin objeciones sustanciales. La versión española sigue la decisión revisada más literal («para sí») y evita expandir el sentido a «apetito» en el texto principal, reservando esa posibilidad para nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל conforme al uso POB documentado.
  - Se evitó «SEÑOR» porque el término hebreo aquí no es יהוה sino אֵל.
  - Se conservó una formulación breve y publicable, con notas solo donde el español introduce o revela una ambigüedad real.
  - «Corazón» sigue el singular hebreo colectivo y es idiomático en español bíblico actual.
