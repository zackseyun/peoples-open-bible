    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación menor, no una reescritura sustancial: reubicar correctamente la nota al término que comenta y suavizar la cláusula final a un español más natural sin perder la distinción léxica ni el sentido del hebreo. El resto del versículo es fiel y apto.'
