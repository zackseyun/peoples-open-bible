translation:
  language: es
  text: 'Y estos son los nombres de los hombres que estarán junto a ustedes: para Rubén[a], Elizur hijo de Shedeur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Rubén». El hebreo puede entenderse como marcando afiliación tribal o representación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: Conservo la conjunción inicial para reflejar la continuidad de la lista, y uso la fórmula presentacional natural en español 'estos son'.
- source_word: שְׁמ֣וֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - los nombres
  lexicon: HALOT
  rationale: La construcción en español sigue de forma directa el genitivo del hebreo y presenta adecuadamente la lista que sigue.
- source_word: הָֽ/אֲנָשִׁ֔ים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los varones
  lexicon: HALOT
  rationale: אֲנָשִׁים designa aquí a representantes masculinos concretos; 'hombres' mantiene la referencia personal y de género sin suavizarla.
- source_word: אֲשֶׁ֥ר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  lexicon: HALOT
  rationale: En español, 'que' funciona naturalmente para introducir la relativa que describe a los hombres nombrados.
- source_word: יַֽעַמְד֖וּ
  english_pob_choice: shall stand
  chosen_spanish: estarán
  alternatives_spanish:
  - estarán de pie
  - se presentarán
  - estarán al lado
  lexicon: HALOT
  rationale: En este contexto administrativo, el hebreo expresa presencia representativa más que mera postura física. 'Estarán' comunica de modo natural esa función de comparecer junto a Moisés y Aarón sin añadir explicación interpretativa excesiva.
- source_word: אִתְּ/כֶ֑ם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto a ustedes
  lexicon: HALOT
  rationale: El pronombre plural de segunda persona se vierte con 'ustedes' por claridad y registro neutral latinoamericano; 'con' conserva la preposición simple del hebreo.
- source_word: לִ/רְאוּבֵ֕ן
  english_pob_choice: for Reuben
  chosen_spanish: para Rubén
  alternatives_spanish:
  - de Rubén
  - a Rubén
  - en favor de Rubén
  lexicon: HALOT
  rationale: La ל indica asignación tribal o representación. 'Para Rubén' preserva esa relación funcional con buena naturalidad en español, sin fijar una única glosa más fuerte que el hebreo no exige.
- source_word: אֱלִיצ֖וּר
  english_pob_choice: Elizur
  chosen_spanish: Elizur
  lexicon: HALOT
  rationale: Nombre propio transliterado sin traducción.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Fórmula genealógica estándar en español bíblico contemporáneo, fiel al hebreo sin sobrecargar el ritmo de la frase.
- source_word: שְׁדֵיאוּר
  english_pob_choice: Shedeur
  chosen_spanish: Sedeur
  alternatives_spanish:
  - Shedeur
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración, con adaptación ortográfica al español para facilitar lectura pública y coherencia fonética.
translation_notes:
  revision_awareness: El texto español sigue de cerca el análisis lexical auditado del inglés POB y no requiere revisión adicional frente al testimonio masorético recibido; se mantiene la ambigüedad funcional de לִרְאוּבֵן mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; aquí no aparece.
  - Se conserva 'Rubén' como forma española estándar del nombre tribal.
  - Se eligió 'ustedes' por el público objetivo latinoamericano neutral y por correspondencia con el plural hebreo.
  - No se introduce terminología eclesiástica no motivada por el hebreo.
