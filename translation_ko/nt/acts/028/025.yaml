    text: Or “to your ancestors.” The Greek reads “to your fathers,” referring to Israel’s forefathers.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 서로 의견이 갈려 흩어지려 할 때, 바울이 한마디 말씀을 하였습니다. 「성령께서 예언자 이사야를 통해 여러분의 조상들에게 옳게 말씀하셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
