review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del rastro POB en casi todos los puntos clave: «Yahvé», «tu Dios», la deferencia de «tus siervos», la petición negativa «no nos dejes morir» y la confesión acumulativa de culpa. Sin embargo, la última cláusula «pedir para nosotros un rey» suena menos natural en español que el orden más idiomático «pedir un rey para nosotros», sin pérdida de sentido. También conviene ajustar la nota para que armonice mejor con el verbo principal elegido en español.'
  spanish_quality_summary: La redacción es clara, digna y ampliamente legible en español eclesial moderno. «Ruega a Yahvé tu Dios por tus siervos» funciona bien, aunque «Ora» también sería posible; no requiere cambio. El único tropiezo de fluidez está en «pedir para nosotros un rey», que resulta algo forzado. «Pedir un rey para nosotros» conserva la estructura semántica y mejora la naturalidad.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֶיךָ -> «tu Dios» preserva la tensión teológica; עֲבָדֶיךָ -> «tus siervos» es apropiado aquí; no hay conflictos con otras directrices léxicas del glosario.'
  issues:
  - severity: medium
    issue: Orden poco natural en «pedir para nosotros un rey»
    rationale: Aunque es comprensible y formalmente cercano al hebreo, en español natural y digno suena mejor «pedir un rey para nosotros». Este ajuste mantiene exactamente el contenido de לִשְׁאֹל לָנוּ מֶלֶךְ sin calco innecesario.
  - severity: low
    issue: La nota alternativa puede sonar ligeramente desajustada con «Ruega»
    rationale: La nota «intercede ... en favor de tus siervos» es válida, pero conviene conservarla con puntuación y formulación coherentes tras el leve ajuste del texto principal. No hay problema de contenido, solo de pulido editorial.
  revised_spanish_text: 'Entonces todo el pueblo dijo a Samuel[a]: «Ruega a Yahvé tu Dios por tus siervos, y no nos dejes morir, porque hemos añadido a todos nuestros pecados este mal: pedir un rey para nosotros».'
  revised_footnotes:
