translation:
  language: es
  text: Y Trifón regresó y se fue a su propia tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: turned back
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - dio la vuelta
  lexicon: BDAG
  rationale: El griego expresa el movimiento de volver/retroceder en la secuencia narrativa. En español, «regresó» comunica ese retorno de manera natural y sobria; «volvió» también sería posible, pero «regresó» conserva mejor el matiz de cambio de dirección sin sonar marcado.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: ἀπέρχομαι aquí indica alejamiento o salida de la escena. «Se fue» es la forma más natural en español moderno y refleja el abandono del lugar sin añadir solemnidad innecesaria.
- source_word: γῆν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  - land
  lexicon: BDAG
  rationale: El sustantivo griego puede significar tierra, país o territorio. «Tierra» mantiene la amplitud semántica y reproduce bien la frase simple del texto, sin precisar más de lo que el griego dice.
- source_word: αὐτοῦ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - su
  - la suya
  lexicon: BDAG
  rationale: El posesivo con refuerzo refleja el sentido de pertenencia y destino. «Su propia tierra» suena natural en español y conserva la misma claridad idiomática que la solución inglesa auditada.
- source_word: Τρύφων
  english_pob_choice: Tryphon
  chosen_spanish: Trifón
  alternatives_spanish:
  - Tryfon
  - Trifón
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio al uso normal en español bíblico. «Trifón» es la forma más natural y legible para lectores hispanohablantes.
translation_notes:
  revision_awareness: El texto griego es breve y narrativo; la versión inglesa auditada no presenta notas ni revisiones. La propuesta española sigue de cerca el orden y la sencillez del original, sin introducir explicaciones adicionales.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio con transliteración española estándar: Trifón.'
  - 'Se conserva la secuencia verbal breve del griego con dos verbos de movimiento: «regresó» y «se fue».'
  - No se añaden notas porque el versículo no presenta variantes textuales, tensiones léxicas relevantes ni decisiones teológicas explícitas.
