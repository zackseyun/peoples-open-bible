translation:
  language: es
  text: Pero ahora tu reino no se mantendrá[a]. Yahvé ha buscado para sí un hombre conforme a su corazón, y Yahvé lo ha nombrado gobernante[b] sobre su pueblo[c], porque no has guardado lo que Yahvé te mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no permanecerá». El hebreo literalmente dice «no se levantará / no quedará firme».
    reason: lexical_alternative
  - marker: b
    text: O «líder». El hebreo נָגִיד designa a una persona puesta al frente con autoridad.
    reason: lexical_alternative
  - marker: c
    text: «Su pueblo» se refiere al pueblo de Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: La partícula marca un giro adversativo y no solo temporal; «Pero ahora» conserva ese contraste con naturalidad en español.
- source_word: מַמְלַכְתְּךָ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu reinado
  lexicon: HALOT
  rationale: El contexto habla de la estabilidad del gobierno real de Saúl; «reino» es natural y mantiene la idea institucional sin sonar forzado.
- source_word: לֹא תָקוּם
  english_pob_choice: will not endure
  chosen_spanish: no se mantendrá
  alternatives_spanish:
  - no se sostendrá
  - no permanecerá
  lexicon: HALOT
  rationale: El hebreo literalmente dice «no se levantará/estará firme», con sentido de permanencia establecida. «No se mantendrá» comunica esa estabilidad sin perder la imagen de firmeza.
- source_word: בִּקֵּשׁ יְהוָה ל֜וֹ
  english_pob_choice: The LORD has sought for himself
  chosen_spanish: Yahvé ha buscado para sí
  alternatives_spanish:
  - Yahvé ha buscado para sí mismo
  - Yahvé se ha buscado
  lexicon: HALOT
  rationale: El verbo de búsqueda en perfecto presenta una acción ya realizada. «Para sí» conserva el matiz reflexivo de לּוֹ sin sobrecargar el español.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y apunta a un sucesor concreto; «hombre» conserva esa precisión referencial.
- source_word: כִּלְבָבוֹ
  english_pob_choice: according to his own heart
  chosen_spanish: conforme a su corazón
  alternatives_spanish:
  - según su corazón
  - de acuerdo con su corazón
  lexicon: HALOT
  rationale: «Conforme a su corazón» refleja bien el hebreo «según/al tenor de su corazón» y suena natural en español bíblico contemporáneo.
- source_word: וַיְצַוֵּהוּ יְהוָה
  english_pob_choice: and Yahweh has appointed him
  chosen_spanish: Yahvé lo ha nombrado
  alternatives_spanish:
  - Yahvé lo ha designado
  - Yahvé lo ha encomendado
  lexicon: HALOT
  rationale: El verbo puede significar ordenar/comisionar, pero con לְנָגִיד la idea es la de conferir un cargo. «Nombrado» expresa la designación a una función.
- source_word: לְנָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernador
  alternatives_spanish:
  - jefe
  - líder
  lexicon: HALOT
  rationale: נָגִיד refiere a una autoridad puesta al frente del pueblo. «Gobernador» intenta captar la función de mando sin introducir un título eclesiástico ni cargarlo con un matiz dinástico posterior.
- source_word: עַל עַמּוֹ
  english_pob_choice: over his people
  chosen_spanish: sobre su pueblo
  alternatives_spanish:
  - sobre el pueblo de Yahvé
  - sobre su propio pueblo
  lexicon: HALOT
  rationale: El sufijo posesivo apunta al referente divino en el contexto; «su pueblo» deja clara la referencia sin explicitar más de lo que el hebreo dice.
- source_word: לֹא שָׁמַרְתָּ
  english_pob_choice: you have not kept
  chosen_spanish: no has guardado
  alternatives_spanish:
  - no has obedecido
  - no has cumplido
  lexicon: HALOT
  rationale: שׁמר tiene el sentido de guardar/observar un mandato. «Guardar» preserva la correspondencia semántica y el eco de la obediencia pactal.
- source_word: צִוְּךָ יְהוָה
  english_pob_choice: what Yahweh commanded you
  chosen_spanish: lo que Yahvé te mandó
  alternatives_spanish:
  - lo que Yahvé te ordenó
  - el mandamiento que Yahvé te dio
  lexicon: HALOT
  rationale: El objeto del mandato se expresa con naturalidad en español como «lo que Yahvé te mandó»; mantiene la relación directa entre la orden divina y la desobediencia de Saúl.
theological_decisions:
- issue: Sentido de כִּלְבָבוֹ ('according to his heart')
  english_pob_reading: 'The pronoun refers to the LORD: ''a man according to his own heart.'''
  chosen_spanish_reading: un hombre conforme a su corazón
  alternative_spanish_readings:
  - un hombre conforme al corazón de Yahvé
  - un hombre según el corazón de Yahvé
  rationale: La sintaxis hebrea permite que el pronombre se entienda del propio Yahvé; en español, «conforme a su corazón» conserva esa ambigüedad controlada sin resolverla de manera más interpretativa.
  doctrine_reference: Preservar la tensión exegética sin convertir la frase en una explicación teológica ajena al texto.
- issue: Valor de נָגִיד
  english_pob_reading: Rendered as 'ruler' rather than a dynastic or messianic title.
  chosen_spanish_reading: gobernador
  alternative_spanish_readings:
  - ruler
  - líder
  rationale: El término señala a alguien designado para ejercer autoridad sobre el pueblo en este contexto. «Gobernador» comunica función de mando sin cargar el pasaje con una lectura mesiánica posterior.
  doctrine_reference: Evitar proyectar títulos posteriores sobre una designación histórica inmediata.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y el archivo inglés auditado. Se mantuvo la estructura causal y la secuencia de acciones divina/humana. Se evitó traducir mecánicamente «will not endure» con un calco duro; en cambio, se usó una forma española que expresa estabilidad o permanencia. También se preservó la referencia implícita de «su pueblo» al pueblo de Yahvé, como en la nota inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió «guardar» para שׁמר, manteniendo el vínculo con obediencia/observancia de mandatos.
  - Se tradujo נָגִיד con una función de cargo («gobernador») en lugar de un título litúrgico o mesiánico.
  - La frase «conforme a su corazón» conserva el hebreo sin introducir una glosa excesiva.
  - Las notas al pie están ancladas en el texto con marcas únicas y en el mismo orden que las decisiones lexicales relevantes.
