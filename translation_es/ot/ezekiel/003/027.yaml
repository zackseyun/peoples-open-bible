base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/003/027.yaml
  text: 'But when I speak with you[a], I will open your mouth, and you shall say to them, ‘Thus says the Lord GOD: The one who hears, let him hear; and the one who refrains, let him refrain[b], for they are a rebellious house.’'
  footnotes:
  - marker: a
    text: Or, 'The one who hears will hear, and the one who refuses will refuse.' The Hebrew forms can be taken as either permissive/volitive ('let him hear/refuse') or predictive ('will hear/refuse').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'a rebellious house,' a recurring Ezekiel expression for the people of Israel in their stubborn rebellion.
    reason: cultural_note
