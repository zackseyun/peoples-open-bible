translation:
  language: es
  text: Porque la vida[a] de la carne está en la sangre, y yo les he dado la sangre sobre el altar para hacer expiación por sus vidas[b], porque la sangre es la que, por la vida[c], hace expiación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo nephesh, a menudo “vida”, “ser” o “alma” según el contexto; en este versículo el sentido es “vida”.
    reason: lexical_alternative
  - marker: b
    text: Hebreo nephesh; en este versículo se entiende como “vidas”.
    reason: lexical_alternative
  - marker: c
    text: O, “porque la sangre hace expiación por medio de la vida que hay en ella”. La frase hebrea es compacta y algo debatida.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - persona
  lexicon: HALOT
  rationale: En este contexto sacrificial, נֶפֶשׁ se refiere a la vida animante, no a una entidad separada llamada “alma”. “Vida” mantiene la coherencia con la relación sangre-vida del versículo.
- source_word: הַבָּשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - el cuerpo
  - la carne viva
  lexicon: HALOT
  rationale: “Carne” es el equivalente directo y natural para בָּשָׂר. Conserva el matiz de criatura viviente sin reducirlo a “cuerpo” en sentido abstracto.
- source_word: בַּדָּם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - dentro de la sangre
  - en sangre
  lexicon: HALOT
  rationale: 'La preposición expresa esfera o localización: la vida está en la sangre. “En la sangre” es la forma más natural y fiel en español.'
- source_word: נְתַתִּיו לָכֶם
  english_pob_choice: I have given it to you
  chosen_spanish: se la he dado a ustedes
  alternatives_spanish:
  - se la di a ustedes
  - os la he dado
  lexicon: HALOT
  rationale: El español requiere ajustar el clítico para concordar con “la sangre” implícita en el objeto. El pretérito perfecto mantiene la relevancia actual de la provisión divina, como en el POB inglés.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: “Sobre el altar” reproduce de manera natural la ubicación cultual sin sonar arcaico.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: hacer expiación
  alternatives_spanish:
  - hacer atonamiento
  - expiar
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, “hacer expiación” comunica el valor cultual de כפר con claridad y sin forzar un tecnicismo menos asentado. Se preserva el sentido sacrificial central.
- source_word: עַל נַפְשֹׁתֵיכֶם
  english_pob_choice: for your lives
  chosen_spanish: por sus vidas
  alternatives_spanish:
  - por sus almas
  - por ustedes
  lexicon: HALOT
  rationale: Se mantiene la coherencia léxica con נֶפֶשׁ = vida. “Por sus vidas” expresa la finalidad expiatoria sin introducir dualismo cuerpo/alma.
- source_word: הַדָּם הוּא
  english_pob_choice: it is the blood
  chosen_spanish: la sangre es la que
  alternatives_spanish:
  - es la sangre la que
  - porque la sangre es
  lexicon: HALOT
  rationale: El español necesita resolver la copularidad con un relativo enfático. “La sangre es la que” conserva la fuerza explicativa y el foco del hebreo.
- source_word: בַּנֶּפֶשׁ
  english_pob_choice: by the life
  chosen_spanish: por la vida
  alternatives_spanish:
  - con la vida
  - mediante la vida
  lexicon: HALOT
  rationale: La frase es sintácticamente densa. “Por la vida” conserva la relación instrumental/asociativa sin sobreexplicar, y corresponde al valor que el POB inglés preserva con “by the life”.
- source_word: יְכַפֵּר
  english_pob_choice: makes atonement
  chosen_spanish: hace expiación
  alternatives_spanish:
  - expiará
  - realiza expiación
  lexicon: HALOT
  rationale: Se mantiene la misma terminología que en לְכַפֵּר para asegurar consistencia y reflejar la acción cultual del verso.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en el contexto sacrificial
  english_pob_reading: Rendered as 'life' throughout the verse rather than 'soul.'
  chosen_spanish_reading: Traducido como “vida” en todo el versículo, no como “alma”.
  alternative_spanish_readings:
  - alma
  - persona
  - ser
  rationale: El versículo fundamenta la eficacia sacrificial en la vida vinculada con la sangre. “Vida” evita importar una antropología posterior que el hebreo aquí no exige y mantiene la lógica del texto.
  doctrine_reference: Levítico 17:11; filosofía de traducción §1, §5
- issue: Valor de בַּנֶּפֶשׁ en la cláusula final
  english_pob_reading: Rendered 'by the life' and retained in the main text as a somewhat marked phrase.
  chosen_spanish_reading: “por la vida”, conservando una formulación algo marcada.
  alternative_spanish_readings:
  - por medio de la vida
  - con la vida
  - en la vida
  rationale: La sintaxis hebrea es breve y debatida. Se conserva la tensión interpretativa sin resolverla excesivamente; la frase española sigue siendo comprensible y auditable.
  doctrine_reference: Levítico 17:11; filosofía de traducción §3
- issue: Naturaleza de la expiación
  english_pob_reading: make atonement / makes atonement
  chosen_spanish_reading: hacer expiación / hace expiación
  alternative_spanish_readings:
  - hacer propiciación
  - cubrir
  rationale: “Expiación” preserva el registro cultual del pasaje y evita reducir el concepto a una sola teoría teológica. Mantiene la equivalencia funcional con el inglés POB.
  doctrine_reference: Levítico 17:11; teología sacrificial bíblica
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente que prefirió una clausula final más natural: “for it is the blood that makes atonement by the life.” En español se refleja con “porque la sangre es la que, por la vida, hace expiación”, manteniendo el foco en la sangre y la relación instrumental/asociativa con la vida. También se conserva la coherencia léxica de נֶפֶשׁ como “vida” en ambas apariciones.'
  spanish_consistency_notes:
  - Se mantiene “vida” para נֶפֶשׁ en todo el versículo.
  - Se usa “sangre” de manera consistente para דָּם.
  - Se usa “hacer expiación / hace expiación” como terminología cultual uniforme.
  - Se evita “alma” para no introducir una distinción antropológica ajena al contexto inmediato.
  - La puntuación con punto y coma separa las dos mitades del versículo de forma clara en español.
