translation:
  language: es
  text: Entonces Moisés habló a Yahvé[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''YHWH''; tradicionalmente se traduce ''el SEÑOR''.'
