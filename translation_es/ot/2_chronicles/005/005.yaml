translation:
  language: es
  text: Y ellos subieron el arca, la tienda de reunión y todos los utensilios sagrados que estaban en la tienda; los sacerdotes levitas[a] los subieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los sacerdotes, los levitas».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ / הֶעֱלוּ
  english_pob_choice: brought up
  chosen_spanish: subieron
  alternatives_spanish:
  - trajeron arriba
  - llevaron arriba
  - hicieron subir
  lexicon: HALOT
  rationale: El hebreo usa עלה en hifil con sentido de hacer subir/transportar hacia arriba. En español, «subieron» comunica de forma natural el movimiento ascendente y la acción de trasladar objetos sagrados, sin introducir una expresión forzada.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: Aquí el hebreo dice simplemente «el arca», no la expresión ampliada «arca del pacto». Mantener «el arca» sigue de cerca la fuente y conserva la sobriedad del texto.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo
  - la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce de manera transparente la frase hebrea y evita sustituirla por «tabernáculo», que es más interpretativo y menos literal respecto del sintagma original.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  english_pob_choice: all the holy vessels
  chosen_spanish: todos los utensilios sagrados
  alternatives_spanish:
  - todos los vasos sagrados
  - todos los objetos sagrados
  - todos los implementos sagrados
  lexicon: HALOT
  rationale: כְּלִים abarca utensilios, objetos o implementos. «Utensilios» es natural en español bíblico contemporáneo y preserva el campo semántico sin limitarlo a recipientes. «Sagrados» refleja הַקֹּדֶשׁ con un adjetivo igualmente reverente y claro.
- source_word: אֲשֶׁר בָּאֹהֶל
  english_pob_choice: that were in the tent
  chosen_spanish: que estaban en la tienda
  alternatives_spanish:
  - que estaban en el tabernáculo
  - que se hallaban en la tienda
  lexicon: HALOT
  rationale: La cláusula relativa especifica la ubicación de los utensilios. Se mantiene «tienda» para conservar coherencia con «tienda de reunión» y evitar alternar innecesariamente con otro término sin base textual.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los sacerdotes que eran levitas
  lexicon: HALOT
  rationale: La apposición hebrea puede leerse literalmente como «los sacerdotes, los levitas». En español, «sacerdotes levitas» conserva la relación entre ambos términos y suena natural, sin borrar la tensión entre sacerdocio y pertenencia levítica.
theological_decisions:
- issue: Relación entre «sacerdotes» y «levitas» en la expresión final
  english_pob_reading: the Levitical priests
  chosen_spanish_reading: los sacerdotes levitas
  alternative_spanish_readings:
  - los sacerdotes, los levitas
  - los sacerdotes que eran levitas
  rationale: La expresión no debe resolverse como si todos los levitas fueran sacerdotes ni como si la apposición fuera irrelevante. «Sacerdotes levitas» mantiene la identificación funcional y genealógica sugerida por el texto, preservando la tensión documental del hebreo en vez de eliminarla.
  doctrine_reference: Preservar la tensión textual y la distinción sacerdotal-levítica donde el contexto la exige.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de 2 Crónicas 5:5 y coincide sustancialmente con la solución auditada en inglés: repite el movimiento de «subir» para ambos verbos, conserva «el arca» sin ampliar innecesariamente, traduce אֹהֶל מוֹעֵד con una frase transparente y mantiene la expresión final sin colapsar la distinción entre sacerdotes y levitas.'
  spanish_consistency_notes:
  - Se mantiene «tienda» en ambos miembros de אֹהֶל para coherencia interna.
  - «Sacerdotes levitas» evita un calco demasiado rígido y a la vez conserva la relación semántica señalada por el hebreo.
  - La nota sobre «Yahvé» queda anclada al término «arca» para ofrecer una alternativa léxica útil sin alterar el texto principal.
