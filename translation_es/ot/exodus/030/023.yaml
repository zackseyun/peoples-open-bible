    text: Or 'pure myrrh' for 'flowing myrrh.' The Hebrew expression likely refers to myrrh that flows freely in its natural state.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'sweet cinnamon' and 'sweet calamus.' The Hebrew more broadly denotes aromatic or fragrant cinnamon and cane.
    reason: lexical_alternative
