translation:
  language: es
  text: 'diciéndoles[a]: «Está escrito: “Y mi casa será casa de oración”, pero ustedes la han hecho una guarida de ladrones[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mi templo será casa de oración». El griego dice «mi casa», con eco de Isaías 56:7.
    reason: lexical_alternative
  - marker: b
    text: «Guarida de ladrones» evoca Jeremías 7:11; «ladrones» también puede rendirse como «bandidos».
    reason: cross_reference
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - y les decía
  - diciendo a ellos
  lexicon: BDAG
  rationale: El participio presente introduce la acción narrativa de manera continua; «diciéndoles» conserva esa fluidez mejor que convertirlo en una forma finita y sigue de cerca el valor aspectual del griego.
- source_word: Γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Se ha escrito
  - Fue escrito
  lexicon: BDAG
  rationale: Es la fórmula bíblica habitual en español para introducir una cita con autoridad. «Está escrito» transmite bien el sentido perfecto/pasivo del griego sin forzar una construcción poco natural.
- source_word: ὁ οἶκός μου
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa
  - mi templo
  lexicon: BDAG
  rationale: Se mantiene «casa» para conservar la cita intertextual y no resolver interpretativamente el referente como «templo». La nota explica que, en contexto, se trata del templo, pero el griego dice literalmente «mi casa».
- source_word: οἶκος προσευχῆς
  english_pob_choice: a house of prayer
  chosen_spanish: casa de oración
  alternatives_spanish:
  - casa de oración
  - casa para la oración
  lexicon: BDAG
  rationale: La construcción posesiva con genitivo se vierte de manera natural como «casa de oración», preservando el eco bíblico de Isaías 56:7.
- source_word: ὑμεῖς δὲ
  english_pob_choice: but you
  chosen_spanish: pero ustedes
  alternatives_spanish:
  - pero vosotros
  - sin embargo, ustedes
  lexicon: BDAG
  rationale: «Pero» expresa el contraste adversativo; «ustedes» es la forma neutral y ampliamente inteligible para el español latinoamericano, manteniendo además el énfasis del pronombre explícito.
- source_word: ἐποιήσατε
  english_pob_choice: have made
  chosen_spanish: han convertido
  alternatives_spanish:
  - han hecho
  - hicieron
  lexicon: BDAG
  rationale: El perfecto griego puede expresar un estado resultante; en español, «han convertido» comunica con naturalidad el cambio de condición del lugar. Se evita suavizar el verbo de manera excesiva, aunque la idea básica sigue siendo «hacer».
- source_word: σπήλαιον
  english_pob_choice: den
  chosen_spanish: cueva
  alternatives_spanish:
  - cueva
  - antro
  lexicon: BDAG
  rationale: En español, «cueva» conserva la imagen espacial de refugio o escondite que tiene el griego en la cita de Jeremías 7:11. «Antro» sería más idiomático en algunos contextos, pero más marcado y menos transparente.
- source_word: λῃστῶν
  english_pob_choice: robbers
  chosen_spanish: de ladrones
  alternatives_spanish:
  - de bandidos
  - de asaltantes
  lexicon: BDAG
  rationale: «Ladrones» mantiene la formulación tradicional del eco profético sin perder fuerza semántica. «Bandidos» sería posible, pero desplaza el tono bíblico heredado por la cita de Jeremías.
theological_decisions:
- issue: Preservar «mi casa» en vez de explicar directamente «mi templo»
  english_pob_reading: my house ... a house of prayer
  chosen_spanish_reading: mi casa ... casa de oración
  alternative_spanish_readings:
  - mi templo ... casa de oración
  rationale: El texto griego cita la Escritura con οἶκος, y el antecedente intertextual importa. Traducir «casa» conserva el enlace con Isaías 56:7 y el matiz teológico de la morada de Dios, mientras el contexto narrativo deja claro que se habla del templo.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: Conservar el eco profético sin suavizar «cueva de ladrones»
  english_pob_reading: den of robbers
  chosen_spanish_reading: cueva de ladrones
  alternative_spanish_readings:
  - cueva de bandidos
  - antro de ladrones
  rationale: La expresión remite a Jeremías 7:11. «Cueva de ladrones» mantiene el golpe profético y el paralelo bíblico sin introducir una interpretación más específica de la que el griego exige.
  doctrine_reference: Intertextual fidelity to Jeremiah 7:11; maintain prophetic indictment language.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente del texto fuente inglés: no hubo cambios aplicados después del último pase, y el control cruzado reportó alto acuerdo. La redacción española conserva las decisiones auditadas, especialmente la fuerza de «casa» frente a «templo» y el eco de Jeremías en «cueva de ladrones».'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico formal, pero con sintaxis española natural.
  - Se preserva el contraste adversativo del original con «pero ustedes».
  - No se normaliza «casa» a «templo» en el texto principal para respetar la cita literal.
  - La nota a explica la alternativa legítima «templo» sin sustituirla en el cuerpo.
  - La nota b conserva el vínculo con Jeremías 7:11 y la posible amplitud semántica de λῃστῶν.
