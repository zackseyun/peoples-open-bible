review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: Judá como sujeto colectivo, «hizo lo malo», el nombre divino «Yahvé», la comparación «más que todo lo que habían hecho sus padres» y la cláusula final sobre los pecados cometidos. Sin embargo, «lo provocaron a celos» suena poco natural en español y no expresa tan bien como podría el lenguaje de celos pactales documentado en la auditoría inglesa. Además, la nota al pie está anclada en «lo malo», pero corresponde al segmento sobre los celos divinos.'
  spanish_quality_summary: 'El español es mayormente comprensible, pero presenta dos problemas de legibilidad: 1) la nota está mal colocada; 2) «provocaron a celos» y «por los pecados con que pecaron» suenan demasiado calcados. Conviene mantener la fuerza semántica sin sacrificar naturalidad. «Despertaron sus celos» o «provocaron sus celos» es más idiomático. En la cláusula final, «por los pecados que cometieron» comunica el sentido con claridad y dignidad.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en «Yahvé», «Judá» y el manejo de la maldad. No hay conflicto mayor de glosario. La única excepción es estilística/lexical: para קנא, el proyecto pide preservar celos pactales; en español eso se logra mejor con «despertaron sus celos» que con «lo provocaron a celos».'
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada en «lo malo», pero su contenido trata sobre «provocar/despertar celos».
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. Tal como está, el lector asociará erróneamente la nota con הָרַע en vez de וַיְקַנְאוּ אֹתוֹ.
  - severity: medium
    issue: «Lo provocaron a celos» es poco idiomático en español bíblico actual.
    rationale: Aunque intenta ser cercano al hebreo, suena forzado. «Despertaron sus celos» o «provocaron sus celos» preserva mejor la categoría de celos pactales y mejora la lectura.
  - severity: low
    issue: «Por los pecados con que pecaron» es excesivamente calcado.
    rationale: El hebreo usa un cognado intensivo, pero en español esta forma suena rígida. «Por los pecados que cometieron» conserva el sentido sin pérdida sustancial.
  revised_spanish_text: Y Judá hizo lo malo a los ojos de Yahvé, y despertaron sus celos[a] más que todo lo que habían hecho sus padres, por los pecados que cometieron.
  revised_footnotes:
  - marker: a
    text: 'O: «lo hicieron celoso» o «provocaron sus celos». El hebreo usa lenguaje de celos pactales para la respuesta de Yahvé a la infidelidad de Judá.'
    reason: lexical_alternative
  revision_rationale: 'Se reubicó la nota al segmento correcto y se mejoró la naturalidad del español en dos puntos sin apartarse del hebreo ni de la auditoría inglesa: «despertaron sus celos» preserva mejor el lenguaje pactual de קנא, y «por los pecados que cometieron» comunica claramente el cognado hebreo sin calco innecesario.'
