  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la secuencia hebrea: fórmula de muerte real (וישכב עם אבתיו), sepultura en Samaria, y sucesión de Acab. La nota también preserva correctamente el valor idiomático de la expresión. No hay problemas de contenido mayores.'
  spanish_quality_summary: 'El español es claro y natural, pero hay dos ajustes menores de calidad y consistencia: usar la forma establecida en español «Omri» en vez de «Omrí», y «Acab» en vez de «Ahab», que es la forma bíblica española normal y mejora la legibilidad eclesial. La puntuación puede mantenerse sencilla sin coma innecesaria.'
  glossary_alignment: 'No intervienen términos del glosario principal como Yahvé/Mesías. El tratamiento de la fórmula real es adecuado: «durmió con sus padres» conserva el hebraísmo respaldado por la nota. «Fue sepultado», «en Samaria» y «reinó en su lugar» están bien alineados con la evidencia fuente y con el razonamiento léxico documentado.'
  issues:
  - severity: medium
    issue: Uso de «Omrí»
    rationale: Aunque translitera el hebreo, en español bíblico y eclesial la forma asentada es «Omri». La tilde final suena menos natural y reduce la legibilidad.
  - severity: medium
    issue: Uso de «Ahab» en vez de «Acab»
    rationale: La forma normal en español para אַחְאָב es «Acab». Mantener «Ahab» introduce anglicismo innecesario frente al uso bíblico español ampliamente reconocido.
  - severity: low
    issue: Coma en «Ahab, su hijo»
    rationale: No es incorrecta, pero la aposición sin coma («Acab su hijo») sigue más de cerca la fórmula narrativa y suena más fluida en este contexto.
