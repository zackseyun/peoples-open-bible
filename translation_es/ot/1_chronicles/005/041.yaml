translation:
  language: es
  text: Y Jehozadac se fue[a] cuando Yahvé exilió a Judá y a Jerusalén por mano de Nabucodonosor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y Jehozadac fue cuando Yahvé exilió a Judá y a Jerusalén por mano de Nabucodonosor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוֹצָדָק
  english_pob_choice: And Jehozadak
  chosen_spanish: Y Jehozadac
  alternatives_spanish:
  - Y Jozadac
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración bíblica reconocible en español. Mantengo la forma plena 'Jehozadac', que refleja mejor la vocalización hebrea que la variante abreviada 'Jozadac'. La conjunción inicial se vierte como 'Y'.
- source_word: הָלַךְ
  english_pob_choice: went away
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT
  rationale: El hebreo הָלַךְ aquí expresa desplazamiento en el contexto del exilio. 'Fue' es natural en español y no añade la fuerza interpretativa de 'partió' o 'se fue' más de lo que el contexto exige.
- source_word: בְּ/הַגְל֣וֹת יְהוָ֔ה
  english_pob_choice: when Yahweh sent ... into exile
  chosen_spanish: cuando Yahvé hizo exiliar
  alternatives_spanish:
  - cuando Yahvé exilió
  - al exiliar Yahvé
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo constructo de גלה se rinde con una cláusula natural en español. 'Hizo exiliar' conserva con claridad la acción causal de Yahvé y evita borrar la agencia divina documentada en el original y en el POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto. 'Yahvé' preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: אֶת יְהוּדָה וִ/ירוּשָׁלִָ֑ם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: a Judá y a Jerusalén
  alternatives_spanish:
  - a Judá y Jerusalén
  - a la tierra de Judá y a Jerusalén
  lexicon: HALOT
  rationale: El marcador de objeto directo introduce a ambos nombres propios. En español, duplico la preposición para hacer natural la coordinación y conservar la referencia directa a Judá y Jerusalén sin añadir explicaciones no presentes en el texto.
- source_word: בְּ/יַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a manos de
  lexicon: HALOT
  rationale: La idiomática hebrea de agencia/instrumentalidad se conserva en una forma breve y bíblica. 'Por mano de' mantiene el nexo entre la acción divina y el agente humano sin suavizarlo demasiado.
- source_word: נְבֻכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodreosor
  lexicon: HALOT
  rationale: Se usa la transliteración tradicional y reconocible en español para el rey babilonio. Es la forma más inteligible para lectura eclesial amplia.
theological_decisions:
- issue: Agencia divina y humana en el exilio
  english_pob_reading: The LORD sent Judah and Jerusalem into exile, by the hand of Nebuchadnezzar.
  chosen_spanish_reading: Yahvé hizo exiliar a Judá y a Jerusalén por mano de Nabucodonosor.
  alternative_spanish_readings:
  - Nabucodonosor exilió a Judá y a Jerusalén
  - Yahvé exilió a Judá y a Jerusalén mediante Nabucodonosor
  rationale: La redacción conserva que Yahvé es el sujeto de la acción y que Nabucodonosor es el agente instrumental. No se resuelve la tensión entre soberanía divina e ისტორical agency, sino que se expresa de forma directa en español.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió el fallo de validación anterior anclando la nota [a] en el texto principal. La nota ofrece la alternativa más formal del POB inglés sin alterar la lectura principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - Se conserva 'Nabucodonosor' como forma española tradicional y clara.
  - La frase 'por mano de' mantiene la idiomática hebrea de agencia.
  - No se introduce 'Mesías', 'SEÑOR' ni otras sustituciones no justificadas por el texto.
