translation:
  language: es
  text: Cerca está el que me vindica[a]; ¿quién contenderá conmigo? Pongámonos de pie juntos. ¿Quién es el dueño de mi causa[b]? Que se acerque a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me justifica» o «me declara justo». El verbo hebreo es forense en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el dueño/amo de mi causa», es decir, el que sostiene una reclamación legal contra mí.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: Near is
  chosen_spanish: Cerca está
  alternatives_spanish:
  - Él está cerca
  - Cerca es
  lexicon: HALOT
  rationale: Conserva el énfasis inicial del hebreo al anteponer el predicado. «Cerca está» suena natural en español y mantiene el tono breve y forense del original.
- source_word: מַצְדִּיקִי
  english_pob_choice: the one who vindicates me
  chosen_spanish: el que me vindica
  alternatives_spanish:
  - el que me justifica
  - el que me declara justo
  lexicon: HALOT
  rationale: 'El contexto es jurídico: contienda, causa y comparecencia. «Vindica» comunica la exoneración o reivindicación legal sin cargar la lectura con un matiz doctrinal posterior. En español, «justifica» sería posible, pero puede sonar más técnico o teológico de lo que exige este pasaje.'
- source_word: יָרִיב אִתִּי
  english_pob_choice: will contend with me
  chosen_spanish: contenderá conmigo
  alternatives_spanish:
  - disputará conmigo
  - presentará una demanda contra mí
  lexicon: HALOT
  rationale: «Contenderá» reproduce bien la fuerza adversarial y jurídica de ריב sin especificar demasiado el procedimiento legal.
- source_word: נַעַמְדָה יָּחַד
  english_pob_choice: Let us stand together
  chosen_spanish: Pongámonos de pie juntos
  alternatives_spanish:
  - Tomemos juntos nuestra posición
  - Pongámonos juntos de pie
  lexicon: HALOT
  rationale: Mantiene la idea de comparecer o presentarse juntos. «Pongámonos de pie juntos» conserva el carácter de desafío y comparecencia, aunque en español se suaviza ligeramente para sonar natural.
- source_word: בַעַל מִשְׁפָּטִי
  english_pob_choice: the master of my case
  chosen_spanish: el dueño de mi causa
  alternatives_spanish:
  - el dueño de mi caso
  - el maestro de mi causa
  - el que posee mi causa
  lexicon: HALOT
  rationale: «בעל» permite la idea de dueño/poseedor; en español «dueño» comunica esa metáfora mejor que «maestro». «Causa» conserva el matiz forense y resulta idiomática en un registro jurídico-literario.
- source_word: יִגַּשׁ אֵלַי
  english_pob_choice: Let him come near to me
  chosen_spanish: Que se acerque a mí
  alternatives_spanish:
  - Que venga a mí
  - Que se me acerque
  lexicon: HALOT
  rationale: Retoma el campo semántico de cercanía del inicio y funciona bien como desafío imperativo/jusivo en español.
theological_decisions:
- issue: Rendering of מַצְדִּיקִי in a forensic context
  english_pob_reading: forensic 'vindicates me'
  chosen_spanish_reading: «me vindica» con sentido forense
  alternative_spanish_readings:
  - «me justifica»
  - «me declara justo»
  - «me hace justo»
  rationale: 'El pasaje enumera elementos de un conflicto legal: contender, causa, acercarse para litigar. Por eso se mantiene una lectura forense. «Me vindica» comunica reivindicación pública/jurídica sin desplazar el texto hacia una formulación moral o dogmática ajena al contexto.'
  doctrine_reference: Translation philosophy items 1, 3, and 6
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo con apoyo del audit trail inglés. No hubo revisiones aplicadas en el registro de origen, y el borrador español conserva esa lectura estable sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Vindica» se eligió por su fuerza jurídica y para mantener la tensión lexical sin sustituirla por un lenguaje doctrinal más cargado.
  - «Causa» conserva el campo judicial de מִשְׁפָּט sin forzar terminología eclesiástica.
  - La puntuación reproduce el ritmo interrogativo y de desafío del hebreo, con dos preguntas seguidas de una invitación a comparecer.
