translation:
  language: es
  text: Así, los filisteos fueron sometidos y no volvieron[a] a entrar en el territorio de Israel. Y la mano de Yahvé estuvo contra los filisteos todos los días de Samuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''la mano de Yahvé estuvo sobre los filisteos''. La expresión es un modismo para el poder activo de Yahvé, aquí en oposición a ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  english_pob_choice: were subdued
  chosen_spanish: fueron sometidos
  alternatives_spanish:
  - fueron humillados
  - fueron abatidos
  - se sometieron
  lexicon: HALOT
  rationale: El nifal de כנע expresa quedar reducido a sujeción o sometimiento. En español, 'fueron sometidos' conserva el matiz pasivo/resultativo y encaja mejor con el contexto militar-político que 'fueron humillados'.
- source_word: הַפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Designación étnica estándar; en español se mantiene la forma usual y clara 'filisteos'.
- source_word: וְלֹא יָסְפוּ עוֹד
  english_pob_choice: did not again
  chosen_spanish: no volvieron
  alternatives_spanish:
  - no continuaron
  - no siguieron
  - no volvieron otra vez
  lexicon: HALOT
  rationale: La combinación idiomática expresa que la acción no se repitió. 'No volvieron' transmite bien la idea de repetición cancelada en un español natural, sin añadir contenido.
- source_word: לָבוֹא
  english_pob_choice: come
  chosen_spanish: a entrar
  alternatives_spanish:
  - a venir
  - a llegar
  lexicon: HALOT
  rationale: En este contexto, el movimiento se orienta hacia el interior del territorio; por eso 'entrar' refleja mejor el valor espacial que un simple 'venir'.
- source_word: בִּגְבוּל יִשְׂרָאֵל
  english_pob_choice: into the territory of Israel
  chosen_spanish: en el territorio de Israel
  alternatives_spanish:
  - dentro del territorio de Israel
  - en los límites de Israel
  - en la frontera de Israel
  lexicon: HALOT
  rationale: 'גְּבוּל puede abarcar frontera o territorio. Aquí el sentido es político-espacial: penetrar en la tierra de Israel. ''Territorio'' evita reducirlo a una mera línea fronteriza.'
- source_word: וַתְּהִי יַד יְהוָה
  english_pob_choice: the hand of Yahweh was
  chosen_spanish: la mano de Yahvé estuvo
  alternatives_spanish:
  - la mano de Yahvé fue
  - la mano de Yahvé estuvo sobre
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'la mano de Yahvé' como metáfora de acción/poder divino. 'Estuvo' reproduce bien el estado durativo y, junto con el contexto, deja implícita la fuerza activa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio divino en español.
- source_word: בַּפְּלִשְׁתִּים
  english_pob_choice: against the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - sobre los filisteos
  - en los filisteos
  lexicon: HALOT
  rationale: La preposición hebrea con el modismo de 'la mano de Yahvé' aquí comunica oposición hostil. 'Contra' explicita esa fuerza sin abandonar la imagen bíblica.
- source_word: כֹּל יְמֵי שְׁמוּאֵל
  english_pob_choice: all the days of Samuel
  chosen_spanish: todos los días de Samuel
  alternatives_spanish:
  - durante toda la vida de Samuel
  - mientras Samuel vivió
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural del giro temporal hebreo, manteniendo su amplitud sin paráfrasis excesiva.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el proyecto ha fijado 'Yahvé' como forma principal para preservar el nombre personal de Dios y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del modismo 'la mano de Yahvé ...'
  english_pob_reading: against the Philistines
  chosen_spanish_reading: contra los filisteos
  alternative_spanish_readings:
  - sobre los filisteos
  - en contra de los filisteos
  rationale: En este contexto bélico, el hebraísmo indica acción divina adversa. 'Contra' expresa con claridad esa oposición teológica y narrativa sin borrar la metáfora de la mano.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue el estado final del audit trail en inglés, sin cambios recientes en la revisión más alta; se mantienen las decisiones estables sobre el nombre divino y el modismo de 'la mano de Yahvé'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'filisteos' como etnónimo estándar.
  - '''Territorio de Israel'' evita una lectura demasiado estrecha de גְּבוּל como simple ''frontera''.'
  - '''Fueron sometidos'' preserva la pasividad y el resultado de la acción verbal hebrea.'
