translation:
  language: es
  text: 'Abrieron mucho la boca contra mí; dijeron[a]: «¡Ja, ja! Nuestros ojos lo han visto!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Nuestro ojo ha visto» o «Nuestros ojos han visto». El hebreo usa un verbo singular con la expresión colectiva «nuestros ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְחִיבוּ
  english_pob_choice: opened ... wide
  chosen_spanish: Abrían mucho
  alternatives_spanish:
  - Abrieron ampliamente
  - Abrían ampliamente
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ‘ensanchar/made wide’ la boca; en español, ‘abrir mucho la boca’ conserva la imagen corporal y comunica con naturalidad la burla hostil.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - hacia mí
  lexicon: HALOT
  rationale: El contexto es adversarial; ‘contra mí’ reproduce el valor hostil de עַל mejor que una relación espacial neutra.
- source_word: פִּיהֶם
  english_pob_choice: their mouths
  chosen_spanish: su boca
  alternatives_spanish:
  - sus bocas
  - su boca
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo (‘su boca’), y el español puede conservar ese valor sin perder claridad. También evita forzar un plural donde el original presenta una imagen unificada del órgano de burla.
- source_word: אָמְרוּ
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  - hablaron
  lexicon: HALOT
  rationale: Verbo narrativo directo para introducir el discurso citado; ‘dijeron’ es la forma más simple y fiel en español.
- source_word: הֶאָח הֶאָח
  english_pob_choice: Aha, aha!
  chosen_spanish: ¡Ja, ja! ¡Ja, ja!
  alternatives_spanish:
  - ¡Ajá, ajá!
  - ¡Ah, ah!
  lexicon: HALOT
  rationale: La interjección expresa regocijo burlón y triunfal. En español, ‘¡Ja, ja!’ comunica mejor la risa de mofa que ‘ajá’, que puede sonar menos natural en este contexto; la repetición preserva la insistencia del hebreo.
- source_word: רָאֲתָה עֵינֵינוּ
  english_pob_choice: Our eyes have seen it
  chosen_spanish: Nuestros ojos lo han visto
  alternatives_spanish:
  - Nuestro ojo lo ha visto
  - Lo hemos visto
  lexicon: HALOT
  rationale: El hebreo tiene un verbo singular con un sustantivo colectivo (‘ojo/ojos’). El español idiomático pide el plural ‘nuestros ojos’; ‘lo’ explicita el objeto implícito del orgullo o la presunta evidencia vista, como en la POB inglesa.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español en el punto correspondiente al verbo introductorio del discurso.
  spanish_consistency_notes:
  - Se preserva el tono de burla hostil del hebreo sin suavizarlo.
  - Se mantiene el singular colectivo del hebreo en ‘su boca’ como opción estilística natural en español.
  - La nota [a] está anclada en el texto y explica la alternativa literal del miembro final.
