translation:
  language: es
  text: Vamos, bajemos allí y confundamos su lengua[a], para que uno no entienda la lengua[b] de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «labio»; aquí, un modismo para «lengua» o «idioma».
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que uno no oiga/entienda la lengua de su prójimo».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Ven ahora
  lexicon: HALOT
  rationale: Es una interjección exhortativa que invita a una acción conjunta inmediata. «Ven» conserva la fuerza imperativa breve y natural en español sin añadir solemnidad innecesaria.
- source_word: נֵרְדָה
  english_pob_choice: let us go down
  chosen_spanish: bajemos
  alternatives_spanish:
  - descendamos
  - vamos a bajar
  lexicon: HALOT
  rationale: El cohortativo plural se mantiene con una forma exhortativa inclusiva. «Bajemos» es más natural que «descendamos» en español y preserva el movimiento hacia abajo.
- source_word: וְנָבְלָה
  english_pob_choice: and confuse
  chosen_spanish: y confundamos
  alternatives_spanish:
  - y mezclemos
  - y trastornemos
  lexicon: HALOT
  rationale: En el contexto de Babel, בלל expresa la desorganización de la comunicación. «Confundamos» comunica el efecto de hacer incomprensible la lengua sin perder la idea de mezcla o perturbación.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo simple. «Allí» es claro y directo en español.
- source_word: שְׂפָתָם
  english_pob_choice: their language
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lenguaje
  - su habla
  lexicon: HALOT
  rationale: Literalmente es «labio», pero aquí funciona como idiomático para «lengua/lenguaje». «Su lengua» mantiene el vínculo con el hebreo y es comprensible en español bíblico contemporáneo.
- source_word: אֲשֶׁר לֹא יִשְׁמְע֔וּ
  english_pob_choice: so that one will not understand
  chosen_spanish: para que no entienda
  alternatives_spanish:
  - para que no oiga
  - para que no escuche
  lexicon: HALOT
  rationale: שמע aquí apunta a comprender la lengua ajena, no meramente a oír sonidos. «Entienda» expresa la falla de comprensión que resulta de la confusión lingüística.
- source_word: אִישׁ
  english_pob_choice: one
  chosen_spanish: nadie
  alternatives_spanish:
  - uno
  - cada uno
  lexicon: HALOT
  rationale: 'Aunque el hebreo es singular distributivo, el español fluido pide una formulación impersonal. «Nadie» conserva el efecto distributivo del verso: la incapacidad de comprenderse mutuamente.'
- source_word: שְׂפַת רֵעֵהוּ
  english_pob_choice: the language of his neighbor
  chosen_spanish: la lengua de su prójimo
  alternatives_spanish:
  - la lengua de su compañero
  - el habla de su vecino
  lexicon: HALOT
  rationale: Se conserva la idiomática de «lengua» para שפה y se traduce רֵעַ con «prójimo», que es natural y fiel al sentido de compañero/fellow sin limitarlo a mera proximidad geográfica.
theological_decisions:
- issue: Plural cohortativo divino («bajemos... confundamos»).
  english_pob_reading: Retain the plural as direct speech without explaining it.
  chosen_spanish_reading: Conservar el plural exhortativo sin explicarlo en el texto principal.
  alternative_spanish_readings:
  - plural de majestad
  - consejo divino
  - anticipación trinitaria
  rationale: El hebreo presenta pluralidad verbal explícita. La traducción debe preservar esa tensión interpretativa sin resolverla doctrinalmente dentro del versículo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado de la POB inglesa: mantiene el imperativo breve, el cohortativo plural, y el resultado de incomprensión lingüística, evitando resolver la pluralidad divina y preservando la idiomática hebrea de שפה como «lengua».'
  spanish_consistency_notes:
  - Se eligió «lengua» para שפה con consistencia con el modismo hebreo y para evitar la abstracción excesiva de «idioma» en el cuerpo del verso.
  - Se prefirió una construcción impersonal («nadie») para reflejar el distributivo de אִישׁ sin forzar una masculinidad semántica innecesaria en español.
  - «Prójimo» conserva el matiz relacional de רֵעַ y mantiene resonancia bíblica sin convertir el término en simple vecino geográfico.
