translation:
  language: es
  text: Pero, después de consumir los sobrantes[a] de su trabajo en la preparación de alimento, quedó saciado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recortes», «restos», «desperdicios» o «sobras». El griego se refiere a lo que se desecha o se desprende del trabajo del artesano.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «quedó saciado» probablemente significa que aplacó su hambre después de usar esos sobrantes para preparar su alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποβλήματα
  english_pob_choice: scraps
  chosen_spanish: sobrantes
  alternatives_spanish:
  - recortes
  - restos
  - desperdicios
  - sobras
  lexicon: LSJ
  rationale: El griego designa lo que se arroja fuera o queda desprendido del trabajo artesanal. «Sobrantes» comunica bien la idea de piezas que quedan después de la labor sin cargar el término con una valoración excesivamente negativa; «sobras» y «restos» sonarían más alimentarios o más generales, y «desperdicios» sería más fuerte de lo que el contexto exige.
- source_word: ἐργασίας
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - oficio
  - obra
  - faena
  lexicon: LSJ
  rationale: El sustantivo es amplio y el contexto ya sugiere el quehacer artesanal. «Trabajo» es natural en español y mantiene la referencia a la actividad del artesano sin introducir una especificación interpretativa innecesaria.
- source_word: εἰς ἑτοιμασίαν τροφῆς
  english_pob_choice: in preparing food
  chosen_spanish: para preparar alimento
  alternatives_spanish:
  - en la preparación de alimento
  - para la preparación de comida
  - con el fin de preparar alimento
  lexicon: LSJ
  rationale: La frase expresa finalidad. «Para preparar alimento» reproduce esa finalidad de forma clara y fluida en español. «Alimento» conserva un registro algo más sobrio que «comida», y evita sugerir un matiz demasiado coloquial.
- source_word: ἀναλώσας
  english_pob_choice: using up
  chosen_spanish: haber usado
  alternatives_spanish:
  - haber consumido
  - haber gastado
  - haber agotado
  lexicon: LSJ
  rationale: El participio señala que los restos se expendieron o se emplearon completamente. En español, «haber usado» dentro de la construcción verbal comunica el uso efectivo de esos sobrantes; «gastado» o «agotado» sonarían menos naturales aquí, y «consumido» podría sugerir sólo combustión o ingestión.
- source_word: ἐνεπλήσθη
  english_pob_choice: he was filled
  chosen_spanish: quedó saciado
  alternatives_spanish:
  - fue llenado
  - quedó lleno
  - se sació
  lexicon: LSJ
  rationale: En contexto la pasiva significa haber quedado satisfecho en su hambre después de preparar la comida. «Quedó saciado» conserva el sentido resultativo sin perder naturalidad en español. «Quedó lleno» es posible, pero menos idiomático en este contexto; «fue llenado» sería demasiado literal y ambiguo.
- source_word: τὰ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: La partícula introduce contraste o avance argumental respecto de la escena anterior. «Pero» refleja mejor ese giro que una simple coordinación.
theological_decisions:
- issue: Sentido de 'quedó saciado' en relación con la comida preparada a partir de los sobrantes
  english_pob_reading: '''He was filled'' likely means he satisfied his hunger after using the leftover wood to prepare his meal.'
  chosen_spanish_reading: '''Quedó saciado'' se entiende como que satisfizo su hambre después de usar los sobrantes para preparar el alimento.'
  alternative_spanish_readings:
  - quedó lleno
  - se sació
  - quedó satisfecho
  rationale: 'No hay una decisión doctrinal propiamente dicha, pero sí una elección semántica importante: el resultado no es sólo estar ''lleno'' en sentido físico, sino haber quedado alimentado. «Saciado» expresa mejor esa consecuencia sin añadir contenido ajeno al griego.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del inglés POB, que afinó εἰς ἑτοιμασίαν τροφῆς como ''in preparing food''. En español se optó por una equivalencia natural con finalidad explícita (''para preparar alimento'') y se mantuvo la secuencia narrativa: contraste inicial, uso de sobrantes, resultado de saciedad. No se introdujeron lecturas textuales alternativas porque el expediente presenta alto acuerdo y validación concordante.'
  spanish_consistency_notes:
  - Se preservó la continuidad semántica entre 'sobrantes' y 'trabajo' para reflejar que los restos proceden de la labor artesanal.
  - '''Alimento'' se eligió por registro; en una versión más cotidiana podría decirse ''comida'', pero aquí ''alimento'' se ajusta mejor al tono sobrio del pasaje.'
  - '''Quedó saciado'' mantiene el resultado pasivo del verbo griego sin convertirlo en una paráfrasis explicativa excesiva.'
