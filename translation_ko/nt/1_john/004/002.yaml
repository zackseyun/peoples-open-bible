  - marker: b
    text: Or 'has come in the flesh.' The Greek uses a perfect participle, emphasizing the enduring significance of Jesus Messiah's coming in real human flesh.
    reason: lexical_alternative
  - marker: c
    text: Or 'confesses Jesus Messiah as having come in the flesh'.
    reason: previous_rendering
