    text: Or 'the islands'; the Hebrew term can refer literally to islands or more broadly to distant maritime lands/coastlands.
    reason: lexical_alternative
  - marker: b
    text: '''Tribute'' renders a term that can also mean ''gift'' or ''offering''; in this royal context it likely refers to gifts brought in acknowledgment of the king''s rule.'
    reason: lexical_alternative
