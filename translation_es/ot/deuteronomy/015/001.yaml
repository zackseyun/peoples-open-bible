translation:
  language: es
  text: Al final de cada siete años harás una remisión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una cancelación»; el hebreo שְׁמִטָּה se refiere a la remisión establecida en la ley de deudas del séptimo año.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ
  english_pob_choice: At the end of
  chosen_spanish: Al final de
  alternatives_spanish:
  - Al término de
  - Al cabo de
  lexicon: HALOT
  rationale: La expresión hebrea marca un límite temporal idiomático. «Al final de» conserva el sentido de cierre del período sin sobreespecificar si la acción ocurre exactamente en el instante final o dentro de la culminación del ciclo.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: every seven years
  chosen_spanish: cada siete años
  alternatives_spanish:
  - de siete en siete años
  - cada período de siete años
  lexicon: HALOT
  rationale: El contexto legal pide una lectura cíclica. «Cada siete años» expresa de forma natural la institución recurrente, manteniendo el valor numérico del hebreo sin añadir contenido extra.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - harás una
  - realizarás
  - efectuarás
  lexicon: HALOT
  rationale: El verbo עשה es amplio y aquí rige una disposición jurídica. En español, «harás» permite la obligación normativa con un objeto nominal que puede entenderse como la acción de instituir/establecer la liberación.
- source_word: שְׁמִטָּה
  english_pob_choice: a release
  chosen_spanish: una liberación
  alternatives_spanish:
  - una remisión
  - un perdón
  - una cancelación
  lexicon: HALOT
  rationale: שְׁמִטָּה designa la liberación propia del año sabático, especialmente en el marco de la condonación de deudas. «Liberación» es un equivalente amplio y claro en español, y deja que el contexto inmediato precise el alcance legal.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente. La versión española mantiene la misma estructura temporal y el mismo alcance semántico general, con una elección léxica equivalente para שְׁמִטָּה.
  spanish_consistency_notes:
  - Se mantiene un registro legal claro y digno, adecuado para una formulación normativa bíblica.
  - «Liberación» se usa como equivalente funcional de «release»; no se introduce «remisión» en el cuerpo principal para evitar un tecnicismo menos natural en español actual.
  - La línea temporal «Al final de cada siete años» respeta la lógica cíclica del hebreo y de la traducción inglesa auditada.
