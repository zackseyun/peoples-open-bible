review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: aumento de poder, poder no propio, destrucción extraordinaria, éxito, acción y destrucción de los poderosos y del pueblo relacionado con los ‘santos/seres santos’. Sin embargo, hay dos ajustes importantes. Primero, el marcador [a] está anclado en el texto principal aunque la nota ofrece alternativas menos preferibles; en español conviene poner en el texto la opción principal más cercana al POB inglés y dejar ‘crecerá’ como alternativa. Segundo, ‘prosperará y hará’ es menos natural y algo más ambiguo que ‘tendrá éxito y actuará’, que reproduce mejor el inglés auditado ‘succeed and act’ y evita sugerir prosperidad material o aprobación.'
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘Su poder crecerá’ se aparta un poco de la formulación principal auditada ‘will become great’, y ‘prosperará y hará’ suena rígido y poco idiomático en una secuencia moderna. ‘Destruirá a los poderosos y al pueblo de los santos’ es legible y fiel, aunque la nota debe conservar la alternativa ‘pueblo santo’.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. La decisión sobre קְדֹשִׁים como ‘santos’ preserva la tensión teológica documentada y es aceptable. El problema principal es de precisión estilística respecto al audit trail: preferible ‘se hará grande’ y ‘tendrá éxito y actuará’.'
  issues:
  - severity: medium
    issue: La opción principal ‘Su poder crecerá’ no coincide tan bien como debería con la decisión auditada ‘His power will become great’.
    rationale: Aunque ‘crecerá’ cabe semánticamente, el POB dejó como principal la idea de llegar a ser grande. En español ‘se hará grande’ conserva mejor el predicado dinámico sin convertirlo en mero aumento cuantitativo.
  - severity: medium
    issue: ‘Prosperará y hará’ suena poco natural y menos preciso que el sentido auditado.
    rationale: ‘Prosperará’ puede sugerir prosperidad material, y ‘hará’ queda demasiado desnudo en español. ‘Tendrá éxito y actuará’ mantiene el tono formal y la secuencia verbal del original sin expansión interpretativa.
  - severity: low
    issue: La nota [a] está anclada a una lectura que en realidad debería ser alternativa, no principal.
    rationale: Si el texto principal se corrige a ‘se hará grande’, la nota puede preservar ‘crecerá’ y ‘será grande’ como alternativas; así la jerarquía entre principal y alternativa queda mejor alineada con el expediente inglés.
  revised_spanish_text: Su poder se hará grande[a], pero no por su propio poder. Causará destrucción extraordinaria, y tendrá éxito y actuará; destruirá a los poderosos y al pueblo de los santos[b].
  revised_footnotes:
