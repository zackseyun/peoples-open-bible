translation:
  language: es
  text: Por tanto, el prudente[a] guarda silencio en aquel tiempo, porque es un tiempo malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sabio» o «el discernidor»; el hebreo es masculino singular y aquí se usa en sentido representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: La partícula introduce una conclusión inferida del reproche anterior. «Por tanto» conserva con claridad la relación lógica sin sonar forzado en español bíblico contemporáneo.
- source_word: הַמַּשְׂכִּיל
  english_pob_choice: the prudent man
  chosen_spanish: el prudente
  alternatives_spanish:
  - el sabio
  - el hombre prudente
  - la persona prudente
  lexicon: HALOT
  rationale: El participio hiphil de שכל describe a quien actúa con discernimiento o prudencia. En español, «el prudente» comunica bien la cualidad y permite conservar el singular masculino representativo sin añadir innecesariamente «hombre» al texto principal.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en ese tiempo
  alternatives_spanish:
  - en aquel tiempo
  - a ese tiempo
  - en esa ocasión
  lexicon: HALOT
  rationale: La expresión temporal se refiere al momento concreto de la denuncia. «En ese tiempo» es natural y preciso; «a ese tiempo» sería poco idiomático en español.
- source_word: יִדֹּם
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - guarda silencio
  - se calla
  - permanece en silencio
  lexicon: HALOT
  rationale: El verbo דמם expresa silencio o quietud. «Calla» transmite la acción de manera directa y sobria; en este contexto profético funciona bien sin añadir matices ajenos.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Introduce la razón del silencio. «Porque» expresa la causalidad con naturalidad en español y mantiene la relación explicativa del hebreo.
- source_word: עֵת רָעָה
  english_pob_choice: an evil time
  chosen_spanish: un tiempo malo
  alternatives_spanish:
  - un tiempo malo y funesto
  - un tiempo de maldad
  - un tiempo funesto
  lexicon: HALOT
  rationale: La frase caracteriza el tiempo como marcado por רָעָה. «Malo» es menos interpretativo que «funesto» y evita cargar de más el valor moral; sin embargo, deja intacta la evaluación negativa del contexto.
- source_word: הִיא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - se trata de
  - se está en
  lexicon: HALOT
  rationale: El pronombre femenino retoma «tiempo». En español basta con el verbo copulativo implícito en «es»; no hace falta explicitar el sujeto pronominal.
theological_decisions:
- issue: Renderización de הַמַּשְׂכִּיל en singular masculino representativo
  english_pob_reading: the prudent man; masculine singular used in a representative sense
  chosen_spanish_reading: el prudente
  alternative_spanish_readings:
  - el prudente hombre
  - la persona prudente
  - el sabio
  rationale: El hebreo es masculino singular y el POB inglés conserva esa forma como representativa. En español, «el prudente» mantiene la referencia humana singular y el valor representativo sin sobrecargar el verso con un sustantivo innecesario como «hombre»; la posible lectura genérica queda suficientemente abierta por el artículo masculino tradicional.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de רָעָה en la frase final
  english_pob_reading: an evil time
  chosen_spanish_reading: un tiempo malo
  alternative_spanish_readings:
  - un tiempo de maldad
  - un tiempo funesto
  - un tiempo perverso
  rationale: La expresión no describe solo una circunstancia desagradable, sino un tiempo moral y socialmente desordenado. Aun así, en español «malo» preserva la cualidad negativa de forma breve y evita decidir en exceso entre valor moral, calamidad o ambas cosas; el contexto profético sostiene esa densidad.
  doctrine_reference: HALOT lexical range for רָעָה
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada, pero ajusta la sintaxis al español natural. Se mantuvo el valor inferencial de לָכֵן, la cualidad humana de הַמַּשְׂכִּיל, y la causalidad de כִּי. No se introdujeron cambios textuales ni variantes manuscritas, y la revisión reciente indica que no se requieren modificaciones adicionales.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como término estándar del proyecto solo cuando el hebreo lo exige; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» porque no aparece en el texto fuente.
  - «Prudente» se usa como equivalente de insight/prudence, no como simple cortesía.
  - La nota textual marca la alternativa semántica principal sin duplicar el sentido ya presente en el cuerpo del verso.
