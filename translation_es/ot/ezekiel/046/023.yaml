translation:
  language: es
  text: Y había una hilera alrededor dentro de ellos, alrededor de los cuatro; y se habían hecho fogones debajo de las hileras[a], todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de los recintos», «debajo de los salientes» o «debajo de los muros»; el sentido arquitectónico exacto del término hebreo es incierto.
