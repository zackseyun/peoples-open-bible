revisions:
- from: Y yo vengo[a] a la presencia de Holofernes, el comandante en jefe de sus fuerzas, para anunciar palabras de verdad, y mostraré delante de él el camino por el cual él irá y ganará dominio sobre toda la región montañosa, y no faltará[b] ni una sola carne de sus hombres, ni un aliento de vida.
  to: Y yo vengo[a] a la presencia de Holofernes, el comandante en jefe de vuestras fuerzas, para anunciar palabras de verdad, y mostraré delante de él el camino por el cual irá y ganará dominio sobre toda la región montañosa, y no faltará de entre sus hombres ni una sola carne[b], ni un aliento de vida.
  rationale: Se corrige «sus fuerzas» a «vuestras fuerzas» para reflejar ὑμῶν con fidelidad al interlocutor del discurso. También se mejora la claridad partitiva con «de entre sus hombres» y se reubica/ajusta la nota sobre «carne» para que corresponda exactamente a la expresión griega preservada por el POB inglés.
