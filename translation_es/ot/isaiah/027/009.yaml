translation:
  language: es
  text: 'Por tanto, por esto se expiará la iniquidad de Jacob, y este será todo el fruto[a] de la remoción de su pecado: cuando haga que todas las piedras del altar sean como piedras de cal trituradas[b], los postes de Asera y los altares de incienso[c] no quedarán en pie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esta será toda la cosecha: la remoción de su pecado». La sintaxis hebrea puede leerse de manera más compacta, con «fruto» en el sentido de «resultado».'
    reason: alternative_reading
  - marker: b
    text: «Piedras de cal» también puede verterse «piedras de tiza» o «piedras de caliza»; la imagen es la de piedras del altar reducidas a fragmentos quebradizos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «postes solares». El término hebreo probablemente designa un objeto cultual asociado con la idolatría, posiblemente con culto solar.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְכֻפַּר
  english_pob_choice: will be atoned for
  chosen_spanish: se expiará
  alternatives_spanish:
  - será expiada
  - será perdonada
  lexicon: HALOT
  rationale: El pual de כפר expresa aquí la cobertura/remoción de la culpa en sentido cultual y reconciliador. 'Se expiará' conserva el valor pasivo y el peso teológico sin añadir un mecanismo no explicitado por el texto.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: En español, 'iniquidad' mantiene la correspondencia lexical con עָוֹן y permite distinguirla de חַטָּאתוֹ ('su pecado') en la segunda mitad del versículo.
- source_word: וְזֶה כָּל פְּרִי
  english_pob_choice: and this will be the full fruit
  chosen_spanish: y este será todo el fruto
  alternatives_spanish:
  - y este será el fruto completo
  - y este será todo el resultado
  lexicon: HALOT
  rationale: '''Fruto'' conserva la metáfora del hebreo y también puede implicar ''resultado''. ''Todo el fruto'' refleja la totalidad del efecto sin aplanar la imagen.'
- source_word: הָסִר חַטָּאתוֹ
  english_pob_choice: the removal of his sin
  chosen_spanish: la remoción de su pecado
  alternatives_spanish:
  - el quitar de su pecado
  - la retirada de su pecado
  lexicon: HALOT
  rationale: El infinitivo constructo funciona sustantivamente; 'remoción' permite un sustantivo natural en español y preserva la idea de quitar/alejar el pecado.
- source_word: בְּשׂוּמוֹ
  english_pob_choice: when he makes
  chosen_spanish: cuando haga
  alternatives_spanish:
  - al poner
  - en su poner
  lexicon: HALOT
  rationale: La preposición con infinitivo introduce la circunstancia por la cual se realiza el resultado. 'Cuando haga' expresa con claridad esa relación temporal/instrumental en español.
- source_word: אַבְנֵי מִזְבֵּחַ
  english_pob_choice: the stones of the altar
  chosen_spanish: las piedras del altar
  alternatives_spanish:
  - las piedras del sacrificio
  - las piedras del ara
  lexicon: HALOT
  rationale: La construcción posesiva es directa; 'altar' es el término natural y fiel en español.
- source_word: כְּאַבְנֵי גִר מְנֻפָּצוֹת
  english_pob_choice: like crushed chalkstones
  chosen_spanish: como piedras de cal trituradas
  alternatives_spanish:
  - como piedras de tiza molidas
  - como piedras de cal pulverizadas
  lexicon: HALOT
  rationale: '''Cal trituradas'' comunica la imagen concreta de un material quebradizo y desmenuzado. En español es más natural y comprensible que una transliteración o una calca demasiado técnica.'
- source_word: לֹא יָקֻמוּ
  english_pob_choice: will not stand
  chosen_spanish: no se levantarán
  alternatives_spanish:
  - no permanecerán en pie
  - no se mantendrán
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'no se levantarán' o 'no permanecerán en pie', en el contexto de objetos cultuales destruidos el verbo español suena natural y comunica que no volverán a quedar erguidos/establecidos.
- source_word: אֲשֵׁרִים
  english_pob_choice: the Asherah poles
  chosen_spanish: los postes de Asera
  alternatives_spanish:
  - los postes sagrados de Asera
  - las aserás
  lexicon: HALOT
  rationale: '''Postes de Asera'' conserva la referencia cultual y el vínculo con el nombre propio. Evita una sustitución más tradicional que podría ocultar el referente material.'
- source_word: וְחַמָּנִים
  english_pob_choice: incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los altares solares
  - los postes solares
  lexicon: HALOT
  rationale: La identidad exacta del término es debatida; en este contexto cultual, 'altares de incienso' mantiene una lectura plausible y funcional. La alternativa solar se preserva como lectura posible sin imponerla en el texto principal.
theological_decisions:
- issue: Relación entre expiación y destrucción de ídolos
  english_pob_reading: The verse links atonement for Jacob's guilt with the concrete destruction of idolatrous worship objects, without specifying a later doctrinal mechanism of atonement.
  chosen_spanish_reading: El versículo enlaza la expiación de la iniquidad de Jacob con la destrucción concreta de objetos idolátricos, sin precisar un mecanismo doctrinal posterior de expiación.
  alternative_spanish_readings:
  - La destrucción de los ídolos es el medio mismo de la expiación
  - La destrucción de los ídolos es la evidencia o el fruto de una expiación previa
  rationale: El hebreo presenta la expiación y el 'fruto' de la remoción del pecado muy cerca de la destrucción idolátrica. La traducción conserva esa relación sin resolver si la destrucción es medio, evidencia o ambas cosas.
  doctrine_reference: Conservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y refleja la revisión más reciente del POB en el matiz de עֲוֹן como 'iniquidad', manteniendo a la vez el valor metafórico de 'fruto' y la imagen concreta de las piedras quebradas. También preserva la ambigüedad cultual de חַמָּנִים mediante una traducción principal plausible y una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'Asera' como nombre propio cultual para אֲשֵׁרִים, coherente con el POB.
  - '''Expiar'' se usa para יְכֻפַּר, evitando diluir la fuerza sacrificial/cultual.'
  - '''Iniquidad'' diferencia עֲוֺן de ''pecado'' (חַטָּאתוֹ) en la segunda cláusula.'
  - '''Altares de incienso'' se reserva como opción contextual para חַמָּנִים, con nota sobre la lectura alternativa.'
