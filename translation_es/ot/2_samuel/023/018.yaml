base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/018.yaml
  text: Now Abishai[a], the brother of Joab son of Zeruiah, was chief of the Three. He wielded his spear against three hundred and killed them[b], and he had a name among the Three.
  footnotes:
  - marker: a
    text: 'Hebrew: ''chief of the Three.'' Some interpreters, influenced by the parallel in 1 Chronicles 11:20 and textual uncertainty in this section, understand the group as ''the Thirty'' instead.'
    reason: textual_variant
  - marker: b
    text: 'Or ''raised/brandished his spear against three hundred and killed them.'' The Hebrew is terse: literally, ''awakened/raised his spear against three hundred slain.'''
    reason: lexical_alternative
