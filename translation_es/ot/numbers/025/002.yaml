revisions:
- from: Y las invitaron a los sacrificios de sus dioses[a], y el pueblo comió y se postró ante sus dioses.
  to: Y ellas invitaron al pueblo a los sacrificios de sus dioses, y el pueblo comió y se postró[a] ante sus dioses.
  rationale: Se corrige el sentido del primer verbo para reflejar que las mujeres invitaron al pueblo, no que alguien invitó a unas mujeres. También se mueve la nota al verbo 'se postró' para que el anclaje coincida con la alternativa léxica documentada en el POB inglés. No se requiere adjudicación adicional porque la corrección es directa desde el hebreo y el rastro de auditoría inglés.
