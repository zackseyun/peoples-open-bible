translation:
  language: es
  text: Entonces se llegó a su esposa, y ella concibió y dio a luz un hijo, y le puso por nombre Bería[a][c], porque la desgracia[b] había estado en su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo llamó Bería».'
    reason: lexical_alternative
  - marker: b
    text: «Desgracia» aquí se refiere a calamidad o infortunio que había golpeado a su casa, no a mal moral.
    reason: lexical_alternative
  - marker: c
    text: 'O: «le puso nombre Bería».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא אֶל אִשְׁתּוֹ
  english_pob_choice: he went in to his wife
  chosen_spanish: se llegó a su esposa
  alternatives_spanish:
  - tuvo relaciones con su esposa
  - entró a su esposa
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo convencional para relaciones sexuales. En español, «se llegó a su esposa» conserva el valor idiomático y la reserva del giro, sin volverse demasiado explícito ni sonar artificial.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: HALOT
  rationale: «Concibió» es el equivalente narrativo natural y fiel en español para הרה en relatos de nacimiento.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: «Dio a luz» reproduce bien el verbo de parto sin perder claridad; «hijo» mantiene el objeto directo simple del hebreo.
- source_word: וַיִּקְרָא אֶת שְׁמוֹ בְּרִיעָה
  english_pob_choice: he called his name Beriah
  chosen_spanish: le puso por nombre Bería
  alternatives_spanish:
  - lo llamó Bería
  - nombró a su hijo Bería
  lexicon: HALOT
  rationale: El hebreo usa la fórmula nominal de poner/callar el nombre. «Le puso por nombre» es transparente en español y mantiene la formalidad del registro narrativo.
- source_word: בְּרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Bería
  alternatives_spanish:
  - Beriah
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española habitual para lectura bíblica en español, con acento agudo para reflejar la acentuación natural del español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: «Porque» expresa de manera directa la causa del nombre.
- source_word: בְרָעָה
  english_pob_choice: disaster
  chosen_spanish: desgracia
  alternatives_spanish:
  - calamidad
  - misfortune
  - mal
  lexicon: HALOT
  rationale: En este contexto no se trata de mal moral sino de una aflicción/fatalidad doméstica. «Desgracia» comunica bien el valor de calamidad o infortunio en español actual.
- source_word: הָיְתָה בְּבֵיתוֹ
  english_pob_choice: had been in his house
  chosen_spanish: había habido ... en su casa
  alternatives_spanish:
  - había estado en su casa
  - había sido en su casa
  lexicon: HALOT
  rationale: La hebrea es literalmente estática («había estado/en su casa»), pero el español fluido requiere un giro natural para el estado de calamidad. «Había habido» evita añadir un verbo de movimiento y mantiene la idea de presencia de una desgracia en la casa.
- source_word: בְּבֵיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: «Casa» preserva בית con su valor de hogar/habitación familiar, respetando la transparencia léxica sin forzar «hogar» o «familia» como interpretación principal.
theological_decisions:
- issue: בְרָעָה se refiere a la desgracia familiar, no a maldad moral
  english_pob_reading: '''Disaster'' here refers to calamity or misfortune that had struck his household, not moral evil.'
  chosen_spanish_reading: «Desgracia» se entiende como calamidad o infortunio doméstico, no como mal moral.
  alternative_spanish_readings:
  - «mal»
  - «maldad»
  rationale: El contexto exige distinguir entre una desgracia sufrida y una perversidad ética. La formulación española debe preservar esa tensión semántica y evitar que el lector entienda un juicio moral donde el texto habla de aflicción.
  doctrine_reference: Distinción lexical entre mal moral y calamidad providencial en la exégesis bíblica
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «had come upon his house» a «had been in his house» para reflejar más de cerca el hebreo הָיְתָה בְּבֵיתוֹ sin añadir interpretación. La versión española sigue esa revisión con «había habido desgracia en su casa», manteniendo la presencia de la calamidad en la casa más que un movimiento hacia ella.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Bería» como transliteración española consistente de בְּרִיעָה.
  - Se evita «Señor» o eufemismos litúrgicos que no están en el texto.
  - «Casa» se conserva para בית, sin sustituirlo por «familia» en el texto principal.
