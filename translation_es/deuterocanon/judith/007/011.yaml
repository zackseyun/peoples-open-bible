translation:
  language: es
  text: Y ahora, amo, no luches contra ellos como en una batalla campal[a], y no caerá ni un solo hombre[b] de tu pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como se libra una batalla en formación». El griego se refiere al combate convencional con tropas dispuestas en formación.
    reason: lexical_alternative
  - marker: b
    text: O «ningún hombre»; el griego es masculino singular con énfasis numérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: master
  chosen_spanish: maestro
  alternatives_spanish:
  - señor
  - soberano
  lexicon: BDAG
  rationale: δέσποτα es un vocativo de autoridad dirigido a un superior humano. «Maestro» preserva la relación de mando sin confundirlo con κύριος, que en este proyecto se reserva normalmente para «Señor» o «Yahvé» según el contexto. «Señor» sería más tradicional, pero borra la distinción documental del texto griego y del audio inglés.
- source_word: μὴ πολέμει
  english_pob_choice: do not fight
  chosen_spanish: no luches
  alternatives_spanish:
  - no combatas
  - no hagas guerra
  lexicon: LSJ
  rationale: El imperativo prohibitivo transmite una orden negativa directa. «No luches» es natural en español y mantiene la fuerza verbal de πολεμέω mejor que una paraphrase más interpretativa.
- source_word: καθὼς γίνεται πόλεμος παρατάξεως
  english_pob_choice: as in a pitched battle
  chosen_spanish: como en una batalla campal
  alternatives_spanish:
  - como se libra una batalla campal
  - como en una batalla en formación
  lexicon: LSJ
  rationale: παράταξις alude a tropas ordenadas en formación; la revisión inglesa optó por «pitched battle» por ser más idiomático sin perder el contraste militar. «Batalla campal» comunica bien esa idea en español moderno y conserva el matiz de combate formal/ordenado.
- source_word: οὐ πεσεῖται
  english_pob_choice: will fall
  chosen_spanish: no caerá
  alternatives_spanish:
  - no será derribado
  - no morirá
  lexicon: LSJ
  rationale: En contexto bélico, πίπτω puede significar caer en combate, con la muerte implícita. «No caerá» conserva la metáfora sin explicitar más de lo que el griego dice.
- source_word: ἀνὴρ εἷς
  english_pob_choice: not one man
  chosen_spanish: ni un solo hombre
  alternatives_spanish:
  - no un hombre
  - ningún hombre
  lexicon: BDAG
  rationale: La secuencia enfática del griego es masculina y singular. «Ni un solo hombre» mantiene el énfasis numérico y la concordancia masculina sin volverlo genérico.
- source_word: λαοῦ σου
  english_pob_choice: your people
  chosen_spanish: de tu pueblo
  alternatives_spanish:
  - de tu gente
  - de tus tropas
  lexicon: BDAG
  rationale: λαός denota normalmente «pueblo». Aunque el contexto es militar, el griego no cambia a un término técnico para tropas; por eso se conserva «tu pueblo».
theological_decisions:
- issue: Tratamiento del vocativo δέσποτα frente a títulos divinos habituales
  english_pob_reading: master
  chosen_spanish_reading: maestro
  alternative_spanish_readings:
  - señor
  - soberano
  rationale: La frase se dirige a un superior humano dentro del relato, no a Dios. Traducirlo como «maestro» mantiene la distinción funcional que el POB inglés documenta para δέσποτα y evita sobrecargarlo con el valor litúrgico de «Señor».
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for κύριος'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente, que prefirió una formulación idiomática para καθὼς γίνεται πόλεμος παρατάξεως («as in a pitched battle») en lugar de una calca torpe. La versión española adopta la misma decisión semántica con una expresión natural de registro bíblico: «como en una batalla campal». Se preservó también la distinción del vocativo δέσποτα y el valor enfático de ἀνὴρ εἷς.'
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento de títulos con distinción funcional: δέσποτα no se iguala automáticamente a «Señor».'
  - «Pueblo» se conserva para λαός, evitando militarizar indebidamente el sustantivo.
  - El negativo y la imagen de caída en combate se mantienen sin explicitar muerte, conforme al griego.
  - El estilo es formal y readable para uso eclesial amplio, sin arcaísmos innecesarios.
