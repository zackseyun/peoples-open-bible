    text: O «el brillo de los ojos», es decir, una mirada alegre o radiante.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «engorda el hueso»; la expresión es un modismo para indicar vigor corporal profundo o renovación.'
    reason: cultural_note
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrige el anclaje de la nota [b], se normaliza la redacción de la nota [a] y se ajusta la nota [b] para reflejar con mayor precisión el singular hebreo señalado en la auditoría inglesa.
