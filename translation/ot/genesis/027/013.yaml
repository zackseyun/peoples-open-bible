id: GEN.27.13
reference: Genesis 27:13
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר ל/וֹ֙ אִמּ֔/וֹ עָלַ֥/י קִלְלָתְ/ךָ֖ בְּנִ֑/י אַ֛ךְ שְׁמַ֥ע בְּ/קֹלִ֖/י וְ/לֵ֥ךְ קַֽח לִֽ/י־׃
translation:
  text: His mother said to him[a], “Your curse be on me, my son. Only listen to my voice, and go[b], get them for me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “listen to my voice,” an idiom that can also mean “obey me.”
    reason: lexical_alternative
  - marker: b
    text: The object “them” is implied from the previous verse, referring to the young goats.
    reason: cross_reference
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, best rendered with simple past 'said' in English narrative.
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - his mom
  lexicon: HALOT
  rationale: Literal kinship term with 3ms suffix; 'his mother' is accurate and appropriately dignified for biblical narrative.
- source_word: עָלַי
  chosen: on me
  alternatives:
  - upon me
  lexicon: HALOT
  rationale: Preposition על with 1cs suffix expresses burden or consequence resting on the speaker; 'on me' is idiomatic modern English.
- source_word: קִלְלָתְךָ
  chosen: your curse
  alternatives:
  - the curse on you
  - your cursing
  lexicon: HALOT
  rationale: Noun from קלל with 2ms suffix. In context Rebekah offers to bear any curse that might result from Jacob's deception; 'your curse' preserves the direct suffix relation.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Vocative with 1cs suffix; 'my son' preserves both the familial address and emotional force.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - surely
  - nevertheless
  - just
  lexicon: HALOT
  rationale: Here אַךְ marks restriction/emphasis, narrowing Jacob's responsibility to obedience; 'Only' fits the exhortational force.
- source_word: שְׁמַע בְּקֹלִי
  chosen: listen to my voice
  alternatives:
  - obey me
  - listen to me
  lexicon: HALOT
  rationale: Literally 'hear/listen to my voice.' In Hebrew idiom this can mean obedience. The more transparent rendering 'listen to my voice' preserves the Hebrew expression while remaining understandable.
- source_word: וְלֵךְ
  chosen: and go
  alternatives:
  - go
  lexicon: HALOT
  rationale: Imperative of הלך joined by waw to the next command. Retaining 'and go' reflects the sequence of commands without awkwardness.
- source_word: קַח לִי
  chosen: get them for me
  alternatives:
  - take for me
  - bring them to me for my use
  lexicon: HALOT
  rationale: לקח with לִי in this context refers back to the goats from the previous verse. English requires the implied object for clarity, so 'them' is supplied. 'Get them for me' is more idiomatic than the overly literal 'take for me' while staying within the context.
