translation:
  language: es
  text: Y Asa durmió con sus padres[a], y fue sepultado con sus padres en la ciudad de David su padre[b]; y Josafat, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con sus antepasados'. El hebreo dice literalmente 'con sus padres', una fórmula real estándar para la muerte y sepultura.
    reason: lexical_alternative
  - marker: b
    text: '''Su padre'' se refiere a David como antepasado real de Asa, no a su padre biológico inmediato.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - murió
  - se durmió
  lexicon: HALOT
  rationale: Mantengo la fórmula real de muerte y entierro sin reducirla a un simple 'murió'. En español, 'durmió' conserva el valor idiomático de la construcción hebrea y sigue siendo natural en este contexto narrativo.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres/padres de su linaje
  lexicon: HALOT
  rationale: '''Padres'' reproduce de manera directa la fórmula hebrea y conserva la resonancia dinástica/ancestral. ''Antepasados'' aclara el sentido, pero interpreta más de lo que exige el hebreo.'
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: '''Sepultado'' es una forma digna y precisa para el pasivo de la raíz, adecuada al registro de las crónicas reales. ''Enterrado'' también es posible, pero ''sepultado'' suena más formal en este pasaje.'
- source_word: בְּעִיר דָּוִד אָבִיו
  english_pob_choice: in the city of David his father
  chosen_spanish: en la ciudad de David, su padre
  alternatives_spanish:
  - en la ciudad de David, su antepasado David
  - en la ciudad de David, padre suyo
  lexicon: HALOT
  rationale: Sigo la sintaxis hebrea y mantengo la relación posesiva con 'su padre'. En español, esta frase puede sonar ambigua, pero se preserva así la referencia dinástica que el texto destaca; el contexto aclara que David es el antecesor real de Asa.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente natural y conciso de la fórmula de sucesión real. ''Comenzó a reinar'' explicita el inicio, pero no es necesario aquí.'
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '''En su lugar'' expresa con claridad la sustitución en la sucesión real. ''Después de él'' comunica temporalidad, pero no la idea de reemplazo tan bien.'
theological_decisions:
- issue: Fórmula de muerte y sepultura real
  english_pob_reading: The Hebrew idiom 'slept with his fathers' is preserved as a standard royal death formula.
  chosen_spanish_reading: '''Durmió con sus padres'' conserva la fórmula idiomática y su tono funerario-regio.'
  alternative_spanish_readings:
  - '''murió y fue sepultado con sus padres'''
  - '''se reunió con sus antepasados'''
  rationale: No conviene deshacer la fórmula en una explicación plana de muerte, porque el hebreo une muerte, linaje y continuidad dinástica. La opción elegida mantiene esa tensión literaria y tradicional del libro de los Reyes.
  doctrine_reference: 1 R 15:24; uso formulaico de las crónicas reales
- issue: Referencia a David como 'su padre'
  english_pob_reading: '''His father'' refers to David as Asa''s royal forefather, not his immediate parent.'
  chosen_spanish_reading: '''su padre'' se entiende como referencia a David, antepasado real de Asa, no como padre biológico inmediato.'
  alternative_spanish_readings:
  - '''su antepasado David'''
  - '''David, su padre real'''
  rationale: El español conserva la ambigüedad del hebreo, pero el contexto histórico y dinástico la resuelve. Añadir una glosa en el texto principal sería demasiado interpretativo; la nota permite explicarlo sin alterar la formulación bíblica.
  doctrine_reference: 1 R 15:24; línea dinástica davídica
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada en inglés. No se identificaron revisiones aplicadas en el registro de referencia; por eso se mantiene una solución consistente con la fórmula real de Reyes y con la terminología POB ya documentada.
  spanish_consistency_notes:
  - Se mantiene 'padres' para reproducir la fórmula hebrea, en lugar de normalizarla a 'antepasados'.
  - Se usa 'sepultado' por registro digno y concordante con narraciones reales.
  - '''En su lugar'' expresa mejor la sucesión que una mera referencia temporal.'
  - La nota sobre David preserva la tensión entre la forma literal y el sentido dinástico sin introducir un nombre adicional en el cuerpo del texto.
