  yaml_path: translation/ot/proverbs/020/013.yaml
  text: Do not love sleep[a], lest you become poor; open your eyes[b], and you will have your fill of bread.
  footnotes:
  - marker: a
    text: Or 'you come to poverty' / 'you be impoverished.' The Hebrew verb can carry the sense of becoming dispossessed or poor; here it refers to falling into poverty through laziness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'open your eyes; be satisfied with bread.' The final clause is rendered as a result in English to make the proverb's sense clear.
    reason: lexical_alternative
