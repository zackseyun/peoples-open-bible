translation:
  language: es
  text: 'Pero todos ellos son sumamente necios y más miserables que el alma de un infante: los enemigos de tu pueblo, que los oprimieron[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más lastimosos que un infante» o «más miserables que la vida de un bebé». La expresión griega compara de forma comprimida con «el alma/la vida de un infante», lo que puede enfatizar una condición extrema de debilidad o miseria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: LSJ
  rationale: Conserva el alcance total del sujeto y suena natural en español en una frase appositiva como esta.
- source_word: ἀφρονέστατοι
  english_pob_choice: most foolish
  chosen_spanish: muy necios
  alternatives_spanish:
  - sumamente necios
  - los más necios
  lexicon: LSJ
  rationale: El superlativo griego expresa extrema falta de sensatez; en español, 'muy necios' transmite la intensidad sin forzar una construcción poco natural.
- source_word: τάλανες
  english_pob_choice: more miserable
  chosen_spanish: más miserables
  alternatives_spanish:
  - desdichados
  - lastimosos
  lexicon: LSJ
  rationale: El término expresa condición lamentable o miserable. 'Más miserables' preserva el comparativo del griego y su fuerza valorativa.
- source_word: ὑπὲρ
  english_pob_choice: more ... than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - por encima de
  lexicon: LSJ
  rationale: Aquí ὑπέρ es comparativo; en español, la comparación se expresa de forma natural con 'más ... que'.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  - el ser interior
  lexicon: LSJ
  rationale: '''Alma'' reproduce el término griego y mantiene el contraste retórico. ''Vida'' es posible, pero el texto griego permite conservar la referencia al alma.'
- source_word: νηπίου
  english_pob_choice: infant's
  chosen_spanish: de un infante
  alternatives_spanish:
  - de un bebé
  - de un niño pequeño
  lexicon: LSJ
  rationale: νήπιος denota un niño muy pequeño o infante. 'Infante' conserva la debilidad implícita y evita una paráfrasis excesiva.
- source_word: οἱ ἐχθροὶ τοῦ λαοῦ σου
  english_pob_choice: these enemies of your people
  chosen_spanish: los enemigos de tu pueblo
  alternatives_spanish:
  - estos enemigos de tu pueblo
  - los adversarios de tu pueblo
  lexicon: LSJ
  rationale: La frase identifica al grupo mediante una apposición explicativa. En español, el demostrativo añadido en inglés no es necesario; se mantiene el referente sin sobretraducción.
- source_word: οἱ καταδυναστεύσαντες
  english_pob_choice: who oppressed
  chosen_spanish: que lo oprimieron
  alternatives_spanish:
  - que lo dominaron cruelmente
  - que lo tiranizaron
  lexicon: LSJ
  rationale: El aoristo participial indica acción opresiva y dominadora. 'Oprimieron' es fiel, claro y suficientemente fuerte.
- source_word: αὐτόν
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - les
  lexicon: LSJ
  rationale: El pronombre griego retoma singularmente al colectivo 'pueblo' (λαός), aunque el sentido remite al pueblo como conjunto. En español, el referente colectivo se puede expresar con 'lo'; se conserva así el enlace más cercano al griego, con una nota para la alternativa plural si se desea.
theological_decisions:
- issue: Comparación comprimida con ψυχὴν νηπίου
  english_pob_reading: 'a comparative statement of pitiable condition: ''more miserable than an infant''s soul'''
  chosen_spanish_reading: 'una comparación de condición lamentable: ''más miserables que el alma de un infante'''
  alternative_spanish_readings:
  - más lastimosos que un infante
  - más desdichados que la vida de un bebé
  rationale: El griego conserva una comparación breve y algo áspera. La traducción mantiene la imagen sin convertirla en paráfrasis explicativa, preservando la tensión retórica del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Referencia final del pronombre αὐτόν
  english_pob_reading: 'plural object in revision: ''who oppressed them'''
  chosen_spanish_reading: 'singular colectivo en concordancia con λαός: ''que lo oprimieron'''
  alternative_spanish_readings:
  - que los oprimieron
  - que oprimieron a su pueblo
  rationale: El griego usa un singular que remite al sustantivo colectivo 'pueblo'. Aunque el inglés revisado optó por pluralizar, en español puede conservarse el enlace singular-colectivo para reflejar mejor la forma griega, sin perder el sentido colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: La base inglesa revisó el pronombre final de singular a plural para armonizar con 'your people'; aquí se señaló la opción singular-colectiva del griego y se mantuvo una nota alternativa para la lectura plural. La comparación con ψυχὴν νηπίου se conservó como imagen comprimida, sin expandirla interpretativamente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo.
  - '''alma'' preserva ψυχή; se evitó ''vida'' en el texto principal para mantener la imagen griega.'
  - '''necios'' comunica el superlativo de ἀφρονέστατοι con un español natural y digno.'
  - El pronombre final se dejó en singular colectivo ('lo') por fidelidad a αὐτόν y al antecedente λαός.
