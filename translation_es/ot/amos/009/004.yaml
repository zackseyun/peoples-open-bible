revisions:
- from: Y si van al cautiverio delante de sus enemigos[a], desde allí mandaré la espada, y los matará; y pondré mis ojos sobre ellos para mal y no para bien.
  to: Y si van al cautiverio ante sus enemigos[a], desde allí ordenaré a la espada, y los matará; y pondré mis ojos sobre ellos para mal y no para bien.
  rationale: Se revisa principalmente 'mandaré la espada' a 'ordenaré a la espada' para preservar la personificación del hebreo y la decisión léxica documentada en el POB inglés. También se ajusta 'delante de' a 'ante' por mayor naturalidad. Se mantiene 'para mal y no para bien' con la nota explicativa, ya que es fiel, legible y teológicamente aclarado por la nota.
