revisions:
- from: Y aconteció[a], después que Alejandro el macedonio, hijo de Filipo, que había salido de la tierra de Kittim, hirió al rey Darío de los persas y de los medos, que reinó en su lugar[b], habiendo reinado primero sobre Grecia.
  to: Y aconteció, después de que Alejandro el Macedonio, hijo de Filipo, que había salido de la tierra de Kittim[a], hirió a Darío, rey de los persas y medos, reinó él en su lugar[b], habiendo reinado primero sobre Grecia.
  rationale: 'Se reancló la nota cultural a «Kittim», que es el término que comenta. Se rehízo la sintaxis para reflejar con claridad la secuencia del griego: después de herir a Darío, Alejandro reinó en su lugar. También se pulió el español con «después de que», «rey de los persas y medos» y la explicitación de «él» para deshacer la ambigüedad del sujeto.'
