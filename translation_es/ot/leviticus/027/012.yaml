translation:
  language: es
  text: y el sacerdote la tasará[a], sea buena o mala; conforme a la tasación del sacerdote, así será.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «según tu tasación, el sacerdote, así será». El sentido es que la tasación del sacerdote es la que queda en vigor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱרִיךְ
  english_pob_choice: shall assess
  chosen_spanish: la tasará
  alternatives_spanish:
  - la valorará
  - la apreciará
  - la estimará
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto legal indica fijar una valoración. «Tasar» comunica bien en español la acción oficial de determinar un valor sin cargar el texto con un tecnicismo innecesario.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el cura
  lexicon: HALOT
  rationale: En el contexto levítico, «sacerdote» es el equivalente natural y transparente de כֹּהֵן. «Cura» no es adecuado por registro ni por precisión bíblica.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la
  - a ella
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere al animal. En español, el objeto directo femenino se expresa naturalmente con «la»; mantiene la referencia sin forzar un neutro inexistente.
- source_word: בֵּין טוֹב וּבֵין רָע
  english_pob_choice: whether good or bad
  chosen_spanish: sea buena o mala
  alternatives_spanish:
  - sea buena o mala
  - entre buena y mala
  lexicon: HALOT
  rationale: La construcción hebrea funciona como un merismo evaluativo. «Sea buena o mala» transmite el sentido de evaluación de calidad de modo natural en español, mejor que una calca literal.
- source_word: כְּעֶרְכְּךָ הַכֹּהֵן
  english_pob_choice: as the priest assesses it
  chosen_spanish: conforme a la tasación del sacerdote
  alternatives_spanish:
  - conforme a la tasación del sacerdote
  - según la tasación del sacerdote
  - según la valoración del sacerdote
  lexicon: HALOT
  rationale: Aunque el hebreo lleva un sufijo de segunda persona singular, el contexto aclara que la tasación vinculante es la del sacerdote. «Conforme a la tasación del sacerdote» preserva la fuerza normativa sin introducir un «tu» artificial en español.
- source_word: כֵּן יִהְיֶה
  english_pob_choice: so it shall be
  chosen_spanish: así será
  alternatives_spanish:
  - así será
  - así quedará
  - así se hará
  lexicon: HALOT
  rationale: La fórmula concluye con validez legal. «Así será» es breve, formal y equivalente al valor confirmatorio del hebreo en este contexto.
theological_decisions:
- issue: Autoridad vinculante de la valoración sacerdotal
  english_pob_reading: The priest's valuation is the binding one.
  chosen_spanish_reading: La tasación del sacerdote es la que queda en vigor.
  alternative_spanish_readings:
  - La tasación del sacerdote es la vinculante.
  - La valoración del sacerdote es la que vale.
  rationale: La nota inglesa aclara que la frase no solo describe una estimación, sino una decisión con fuerza normativa. En español, «conforme a la tasación del sacerdote, así será» deja esa obligatoriedad implícita sin añadir una paráfrasis doctrinal innecesaria.
  doctrine_reference: Levítico 27:12; función legal del sacerdote en las disposiciones votivas
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido confirmado por el audit trail inglés: valoración sacerdotal oficial, no simple opinión. No se aplicaron revisiones previas; el estado más reciente indica acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן, en línea con el uso bíblico estándar y el contexto levítico.
  - Se evita «SEÑOR» o terminología litúrgica ajena, porque este versículo trata de una tasación ritual/legal, no del nombre divino.
  - Se conserva la fuerza normativa final con «así será», equivalente funcional de la fórmula hebrea.
