    issue: «con razón» es ambiguo para λογισμῷ
    rationale: En español común, «con razón» suele entenderse como «justificadamente» o «no es de extrañar», no como instrumento de la razón. Aquí el griego subraya el gobierno racional sobre la pasión, por lo que la frase actual puede desviar el sentido temático del pasaje.
  - severity: low
