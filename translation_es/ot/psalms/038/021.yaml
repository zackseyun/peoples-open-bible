revisions:
- from: Y los que pagan mal por bien me son adversarios[a], porque yo sigo lo bueno.
  to: Y los que pagan mal por bien se me oponen[a], porque yo persigo lo bueno.
  rationale: Se ajusta שטן a una formulación verbal más natural y más cercana al original ('se me oponen') y רדף a 'persigo', en línea con la decisión léxica del POB inglés. También se mejora la nota al pie para que preserve la alternativa más literal sin sonar forzada en español.
  reviewer_model: gpt-5.4
