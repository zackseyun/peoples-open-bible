revisions:
- from: Yahvé da su voz delante de su ejército[a], porque muy grande es su campamento; porque poderoso es el que hace su palabra[b]. Porque grande es el día de Yahvé, y muy terrible[c]; ¿quién lo podrá soportar?
  to: Yahvé da su voz delante de su ejército[a], porque muy grande es su campamento; porque poderoso es el que cumple su palabra[b]. Porque grande es el día de Yahvé, y muy terrible[c]; ¿quién lo podrá soportar?
  rationale: Se ajusta «hace su palabra» a «cumple su palabra» para que el español sea natural y siga expresando que el agente pone por obra la palabra/mandato de Yahvé. También se corrige la nota c para que refleje una alternativa española de intensidad equivalente a la documentada en inglés. No se requieren cambios doctrinales ni estructurales.
