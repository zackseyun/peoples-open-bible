revisions:
- from: Cuando José entró en la casa[a], le llevaron a él la ofrenda[b] que tenían en las manos, dentro de la casa[c], y se inclinaron ante él hasta el suelo.
  to: Cuando José entró en la casa, le llevaron el regalo[a] que tenían en las manos a la casa[b], y se inclinaron ante él hasta el suelo.
  rationale: Se reemplaza 'ofrenda' por 'regalo' para evitar una connotación cultual ajena al contexto y alinearse con la decisión lexical auditada. Se simplifica 'le llevaron a él' a 'le llevaron' para un español más natural. Se ajusta la segunda referencia a la casa a 'a la casa' para reflejar mejor el valor direccional del hebreo, mientras una nota preserva la repetición y la alternativa de orden sintáctico. Se eliminó la nota innecesaria sobre la primera entrada en la casa.
