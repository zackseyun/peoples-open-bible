translation:
  language: es
  text: 'Entonces Moisés habló a Aarón, a Eleazar y a Itamar[a], sus hijos restantes: «Tomen la ofrenda de cereal que queda de las ofrendas por fuego de Yahvé, y cómanla sin levadura junto al altar, porque es santísima».


    [a] O, más formalmente, «sus hijos que habían quedado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «sus hijos que habían quedado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then Moses spoke
  chosen_spanish: Entonces Moisés habló
  alternatives_spanish:
  - Y habló Moisés
  - Luego Moisés habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, “Entonces” conserva la secuencia natural sin forzar contraste. “Habló” reproduce el verbo de decir de forma directa y sobria.
- source_word: הַנּוֹתָרִים
  english_pob_choice: remaining
  chosen_spanish: que habían quedado
  alternatives_spanish:
  - restantes
  - que quedaban
  lexicon: HALOT
  rationale: El participio designa a los hijos de Aarón que quedaron tras la muerte de Nadab y Abiú. “Que habían quedado” expresa con claridad ese estado resultante sin perder la referencia contextual.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la oblación
  lexicon: HALOT
  rationale: En el contexto sacrificial levítico, מִנְחָה no es una ofrenda genérica. “Ofrenda de cereal” es una forma castellana clara y ampliamente inteligible para ese sacrificio específico.
- source_word: הַנּוֹתֶרֶת
  english_pob_choice: that remains
  chosen_spanish: que queda
  alternatives_spanish:
  - que resta
  - sobrante
  lexicon: HALOT
  rationale: La forma femenina modifica a “ofrenda de cereal”. “Que queda” refleja bien la porción no consumida como parte de la ofrenda, sin añadir matiz innecesario.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas para Yahvé
  alternatives_spanish:
  - de las ofrendas por fuego de Yahvé
  - de las ofrendas consumidas por el fuego de Yahvé
  lexicon: HALOT
  rationale: El hebreo alude a ofrendas hechas por fuego. “Ofrendas encendidas” preserva la imagen del fuego y evita reemplazarla por una paraphrasis demasiado libre. Se mantiene “Yahvé” conforme al nombre divino en la fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español como “Yahvé”, siguiendo la pauta del proyecto y evitando la sustitución por un título.
- source_word: וְאִכְלֻהָ מַצּוֹת
  english_pob_choice: and eat it unleavened
  chosen_spanish: y cómanla sin levadura
  alternatives_spanish:
  - y cómanla ácimos
  - y cómanla como panes sin levadura
  lexicon: HALOT
  rationale: El adverbial hebreo expresa el modo de comerla. “Sin levadura” es natural en español bíblico contemporáneo y comunica la ausencia de fermentación sin añadir una forma específica de pan que el hebreo no exige.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  english_pob_choice: beside the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - cerca del altar
  lexicon: HALOT
  rationale: אֵצֶל marca proximidad. “Junto al altar” es la equivalencia más natural y precisa en español.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísimo
  - muy santo
  lexicon: HALOT
  rationale: El hebreo usa una superlación nominal aplicada a la ofrenda. “Cosa santísima” mantiene el valor superlativo y, en español, evita la ambigüedad de usar “santísimo” como mero adjetivo sin sustantivo.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto sacerdotal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se conserva como nombre propio transliterado, no como sustitución litúrgica, para mantener la trazabilidad hacia la fuente hebrea.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de קֹדֶשׁ קָדָשִׁים aplicado a la ofrenda
  english_pob_reading: most holy
  chosen_spanish_reading: cosa santísima
  alternative_spanish_readings:
  - santísimo
  - santo de santos
  rationale: La expresión funciona aquí como superlativo de santidad sobre la ofrenda. “Cosa santísima” preserva el sentido jerárquico sin desplazar la referencia al objeto sacrificial hacia el espacio del santuario.
  doctrine_reference: Leviticus sacrificial holiness categories
translation_notes:
  revision_awareness: La versión coincide con la línea revisada del inglés POB y no requiere enmiendas adicionales; se mantiene la decisión de traducir מֵאִשֵּׁי יְהוָה con énfasis en el fuego sacrificial, y el nombre divino con Yahvé/Yahvé en español.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - 'Se conserva la terminología sacrificial de forma consistente: ofrenda de cereal, ofrendas encendidas, sin levadura, junto al altar.'
  - No se introduce puntuación o segmentación que altere la unidad imperativa del mandato.
  - La vocación del plural imperativo en español (“Tomen”, “cómanla”) responde al plural hebreo y al destinatario colectivo.
