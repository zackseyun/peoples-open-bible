translation:
  language: es
  text: Y tú escucharás[a], porque ¿quién es bondadoso y clemente sino tú, para alegrar el alma del humilde[b] cuando abres tu mano[c] con misericordia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «responderás favorablemente» o «oirás con favor»; ἐπακούω puede sugerir una escucha atenta y eficaz, especialmente en la oración.'
    reason: lexical_alternative
  - marker: b
    text: El sentido es «el alma del humilde», es decir, la persona humilde.
    reason: textual_clarification
  - marker: c
    text: «Abrir tu mano» es un modismo de dar generosamente o proveer.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπακούσῃ
  english_pob_choice: you will hear
  chosen_spanish: escucharás
  alternatives_spanish:
  - oirás
  - atenderás favorablemente
  - responderás
  lexicon: LSJ
  rationale: ἐπακούω puede implicar oír con atención o de manera favorable, especialmente en contexto de oración. «Escucharás» conserva la respuesta personal implícita sin volver la frase demasiado interpretativa.
- source_word: χρηστός
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - bueno
  - benigno
  - amable
  lexicon: LSJ
  rationale: «Bondadoso» comunica bien la benevolencia activa y encaja con un registro reverente en español. «Bueno» es posible, pero resulta más general; «benigno» preserva la dignidad, aunque suena algo más técnico.
- source_word: ἐπιεικής
  english_pob_choice: gentle
  chosen_spanish: benigno
  alternatives_spanish:
  - clemente
  - manso
  - indulgente
  lexicon: LSJ
  rationale: 'El par «bondadoso y benigno» mantiene la doble cualidad del griego: benevolencia y mansedumbre/clemencia. «Benigno» evita suavizar demasiado el matiz de trato compasivo y moderado.'
- source_word: εὐφρᾶναι
  english_pob_choice: to gladden
  chosen_spanish: alegrar
  alternatives_spanish:
  - hacer gozosa
  - dar alegría a
  - regocijar
  lexicon: LSJ
  rationale: 'El infinitivo aoristo expresa el efecto o propósito: «alegrar» conserva esa relación sintáctica en español y suena natural. «Regocijar» sería más elevado, pero menos inmediato.'
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  - persona
  lexicon: LSJ
  rationale: «Alma» refleja bien el registro poético-devocional del texto y corresponde al uso bíblico habitual sin reducirlo a mero «vida».
- source_word: ταπεινὸν
  english_pob_choice: humble
  chosen_spanish: humilde
  alternatives_spanish:
  - bajo
  - afligido
  - manso
  lexicon: LSJ
  rationale: La forma transmitida en el griego apunta a la humildad/bajeza antes que a una emoción o aflicción. «Humilde» es la equivalencia más directa y clara en español.
- source_word: ἐν τῷ ἀνοῖξαι χεῖρά σου
  english_pob_choice: when you open your hand
  chosen_spanish: cuando abres tu mano
  alternatives_spanish:
  - al abrir tu mano
  - cuando extiendes tu mano
  lexicon: LSJ
  rationale: Se preserva el idioma hebreo subyacente de generosidad/provisión sin explicitarlo en el cuerpo del verso. La imagen funciona naturalmente en español y mantiene la fuerza bíblica.
- source_word: ἐν ἐλέει
  english_pob_choice: in mercy
  chosen_spanish: en misericordia
  alternatives_spanish:
  - con misericordia
  - misericordiosamente
  - por misericordia
  lexicon: LSJ
  rationale: «En misericordia» sigue de cerca la preposición griega y conserva el tono litúrgico/poético. «Con misericordia» también sería viable, pero cambia ligeramente el relieve de la expresión.
translation_notes:
  revision_awareness: 'La versión inglesa auditada revisó la frase final de «making glad a humble soul» a «to gladden the soul of the humble» para reflejar mejor el infinitivo aoristo εὐφρᾶναι y la probable corrección textual de ταπεινὸν a un genitivo con sentido de «del humilde». La presente versión española sigue esa línea: mantiene el infinitivo de finalidad/resulto con «alegrar» y traduce el sintagma como «el alma del humilde», sin convertirlo en participio.'
  spanish_consistency_notes:
  - Se usa «Y tú» para conservar el contraste enfático de καὶ σὺ.
  - Se preserva la imagen idiomática de «abrir tu mano» como provisión generosa, sin paraphrasearla en el texto principal.
  - «Misericordia» mantiene el registro devocional y la correspondencia léxica con ἐλέει.
  - La nota textual [c] evita ocultar que la forma griega transmitida es problemática y que la traducción refleja la lectura más probable.
