  text: דּוֹרִ֗/י נִסַּ֧ע וְ/נִגְלָ֛ה מִ/נִּ֖י כְּ/אֹ֣הֶל רֹעִ֑/י קִפַּ֨דְתִּי כָ/אֹרֵ֤ג חַיַּ/י֙ מִ/דַּלָּ֣ה יְבַצְּעֵ֔/נִי מִ/יּ֥וֹם עַד לַ֖יְלָה תַּשְׁלִימֵֽ/נִי־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/038/012.yaml
  text: My dwelling is pulled up and carried away from me like a shepherd’s tent[a]; I have rolled up my life like a weaver; from the loom he cuts me off[c][b]. From day to night you bring me to an end.
  footnotes:
  - marker: a
    text: Or 'My generation has departed and been removed from me like a shepherd’s tent.' The Hebrew word can mean 'generation' or, in this context, 'dwelling/habitation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have cut off my life like a weaver.' The Hebrew verb is difficult; the translation follows the weaving imagery by rendering it 'rolled up.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the thrum/warp he cuts me off.' The Hebrew term refers more specifically to the loom’s hanging threads.
    reason: lexical_alternative
