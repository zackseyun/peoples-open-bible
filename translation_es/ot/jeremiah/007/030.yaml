base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/007/030.yaml
  text: For the sons of Judah have done what is evil in my sight[a], declares Yahweh. They have put their abominations in the house that is called by my name[c][b], to defile it.
  footnotes:
  - marker: a
    text: Or “their abominations”; the Hebrew term often refers to abhorrent cult objects, likely including idols here.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple in Jerusalem.
    reason: cultural_note
  - marker: c
    text: Literally, “the house over which my name is called.”
    reason: lexical_alternative
