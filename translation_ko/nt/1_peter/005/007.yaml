source:
  edition: SBLGNT
  text: πᾶσαν τὴν μέριμναν ὑμῶν ἐπιρίψαντες ἐπ’ αὐτόν, ὅτι αὐτῷ μέλει περὶ ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/007.yaml
  text: 'casting all your anxiety on him, because he cares for you.'
translation:
  language: ko
  text: '여러분의 모든 염려를 그분께 맡기십시오.[a] 그분께서 여러분을 돌보시기 때문입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 55:22(LXX 54:23)의 인유.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπιρίψαντες
  english_pob_choice: casting
  chosen_korean: 맡기십시오
  alternatives_korean:
  - 던지십시오
  - 위탁하십시오
  lexicon: BDAG
  rationale: ἐπιρίπτω의 「위에 던짐」을 「맡기다」로 풀어 옮긴다 (시 55:22 LXX의 ἐπιρίπτω 인유). 분사이지만 5:6의 명령 흐름에 이어져 명령적 기능.
- source_word: μέριμνα
  english_pob_choice: anxiety
  chosen_korean: 염려
  alternatives_korean:
  - 근심
  - 걱정
  lexicon: BDAG
  rationale: 한국 성서 전통의 「염려」 (마 6:25-34과 동일 어휘).
- source_word: αὐτῷ μέλει περὶ ὑμῶν
  english_pob_choice: he cares for you
  chosen_korean: 그분께서 여러분을 돌보시기 때문
  alternatives_korean:
  - 그분께 너희 일이 관심사이기 때문
  lexicon: BDAG
  rationale: μέλει + 여격은 「~에게 관심사가 됨」. 한국어 「돌보다」가 가장 자연스럽다.
