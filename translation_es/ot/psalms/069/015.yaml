    issue: «Sácame» para הַצִּילֵנִי es demasiado estrecho
    rationale: Aunque encaja con la imagen del lodo, הַצִּילֵנִי es una petición general de rescate/liberación. «Sácame» reduce el verbo a extracción física y debilita el paralelismo con אִנָּצְלָה más adelante.
  - severity: low
    issue: Inconsistencia léxica entre «Sácame» y «Líbrame»
    rationale: El hebreo repite la raíz נצל. Conviene reflejar esa repetición con un verbo español de la misma familia semántica al inicio, idealmente «Rescátame» o «Líbrame».
  - severity: low
    issue: Nota al pie con formulación poco natural
    rationale: La nota empieza con una comilla innecesaria y «O:» debería integrarse mejor. «déjame escapar» puede sonar menos natural que «permíteme escapar» o «O bien». También conviene mantener correspondencia con «de los que me odian / de aguas profundas» o explicar la alternativa inglesa tradicional de «mis enemigos».
