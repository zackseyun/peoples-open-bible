translation:
  language: es
  text: En poco más de un año[a] ustedes temblarán, mujeres complacientes[b], porque se acabará la vendimia; no vendrá la cosecha de frutos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «días sobre un año», un modismo que significa «en poco más de un año».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mujeres confiadas» o «mujeres seguras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la recolección no vendrá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים עַל שָׁנָה
  english_pob_choice: In little more than a year
  chosen_spanish: En poco más de un año
  alternatives_spanish:
  - En días sobre un año
  - Después de un año y días
  - Dentro de un año y algunos días
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no calcula un número exacto; comunica un lapso apenas mayor que un año completo. «En poco más de un año» conserva la proximidad temporal y suena natural en español.
- source_word: תִּרְגַּזְנָה
  english_pob_choice: you will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - estremecerán
  - quedarán perturbadas
  - se turbarán
  lexicon: HALOT
  rationale: El verbo comunica agitación o temblor ante una amenaza inminente. «Temblarán» reproduce bien ese sentido en un aviso profético y mantiene el tono directo del oráculo.
- source_word: בֹּטְחוֹת
  english_pob_choice: you complacent women
  chosen_spanish: mujeres confiadas
  alternatives_spanish:
  - mujeres seguras
  - mujeres complacientes
  lexicon: HALOT
  rationale: El participio expresa mujeres que se sienten seguras o confiadas. En español, «mujeres confiadas» mantiene esa base semántica sin forzar una evaluación moral extra que el contexto inmediato ya aporta.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del temblor anunciado. «Porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: כָּלָה
  english_pob_choice: will fail
  chosen_spanish: se acabará
  alternatives_spanish:
  - llegará a su fin
  - se terminará
  - fallará
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es perfecta, en discurso profético apunta a una certeza futura. «Se acabará» comunica que la vendimia quedará sin resultado, de manera natural para el lector español.
- source_word: בָצִיר
  english_pob_choice: the grape harvest
  chosen_spanish: la vendimia
  alternatives_spanish:
  - la cosecha de uvas
  - la recolección de la vid
  lexicon: HALOT
  rationale: בָצִיר designa específicamente la recolección de uvas. «Vendimia» es el equivalente español preciso y conciso, y preserva el referente agrícola concreto.
- source_word: אֹסֶף
  english_pob_choice: the fruit harvest
  chosen_spanish: la cosecha de frutos
  alternatives_spanish:
  - el acopio
  - la recolección
  - la cosecha
  lexicon: HALOT
  rationale: El término apunta a la juntada o recolección final de los productos. «Cosecha de frutos» hace explícita la imagen agrícola en español sin perder el sentido de acopio/ingathering.
- source_word: בְּלִי יָבֹא
  english_pob_choice: will not come
  chosen_spanish: no vendrá
  alternatives_spanish:
  - no llegará
  - no llegará a venir
  - no habrá
  lexicon: HALOT
  rationale: La frase expresa la ausencia de llegada de lo esperado. «No vendrá» conserva el movimiento implícito del hebreo y encaja con «cosecha» en un español fluido.
translation_notes:
  revision_awareness: Se incorporó la revisión del POB en inglés que eliminó el artículo de «a little more than a year», por lo que el español también evita un indefinido que sonaría más exacto en castellano. Se mantuvo la distinción entre la vendimia (בָצִיר) y la cosecha de frutos (אֹסֶף), con la segunda como recolección distinta y posterior.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» como sustituto no presente en el texto fuente.
  - 'Se mantuvo el contraste agrícola entre dos recolecciones distintas: vendimia y cosecha de frutos.'
  - «Mujeres confiadas» preserva la base lexical de בטח sin introducir innecesariamente una interpretación doctrinal.
