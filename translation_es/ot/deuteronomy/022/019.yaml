revisions:
- from: Entonces lo multarán con cien siclos de plata y los darán al padre de la joven[a], porque ha puesto un mal nombre sobre una virgen de Israel. Y ella será su esposa; no podrá despedirla en todos sus días.
  to: Entonces lo multarán con cien siclos de plata y los darán al padre de la joven, porque ha traído mala fama sobre una virgen de Israel. Y ella será su esposa; no podrá enviarla lejos[a] todos sus días.
  rationale: Se ajusta el texto para conservar mejor el sentido y la estrategia del POB inglés a la vez que se mejora la naturalidad del español. «Ha traído mala fama sobre» comunica el idiomático שֵׁם רָע sin el giro poco natural «poner un mal nombre». «Enviarla lejos» preserva mejor el hebreo לְשַׁלְּחָהּ y deja la explicitación jurídica «divorciarla» en nota, como en el expediente inglés. «Todos sus días» mantiene el hebraísmo temporal en español natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido jurídico del hebreo: multa monetaria, pago al padre, razón de la sanción, obligación marital y prohibición de disolver el matrimonio. Sin embargo, dos giros españoles no preservan bien ni la naturalidad ni del todo la fuerza idiomática del original: «ha puesto un mal nombre sobre» suena antinatural en español, y «en todos sus días» es un calco poco idiomático frente al hebraísmo mejor conservado como «todos sus días».'
  spanish_quality_summary: El español es en general claro y digno, pero necesita un ajuste de naturalidad y fidelidad estilística. «Lo multarán con cien siclos de plata» y «ella será su esposa» funcionan bien. En cambio, «ha puesto un mal nombre sobre una virgen de Israel» no es español natural; conviene «ha traído mala fama sobre» o equivalente, que mantiene la imagen reputacional. También «despedirla» funciona, pero en este contexto legal «enviarla lejos» preserva mejor la literalidad que el inglés POB quiso mantener, dejando «divorciarla» en nota. «Todos sus días» es mejor que «en todos sus días».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Virgen», «esposa» y «siclos de plata» están alineados con el expediente léxico. La principal corrección es estilístico-lexical: ajustar la expresión de שֵׁם רָע para que suene natural en español sin perder la imagen semántica, y acercar לְשַׁלְּחָהּ a «enviarla lejos» como equivalente más literal que «despedirla».'
  issues:
  - severity: medium
    issue: «ha puesto un mal nombre sobre» es antinatural en español
    rationale: Aunque intenta conservar la imagen hebrea, esta formulación no es idiomática ni clara en español general. El sentido es reputacional/infamante; «ha traído mala fama sobre» conserva la imaginería y mejora mucho la legibilidad.
  - severity: medium
    issue: «despedirla» atenúa la literalidad de לְשַׁלְּחָהּ
    rationale: El POB inglés retuvo «send her away» y reservó «divorce her» para nota. En español, «enviarla lejos» o «echarla» reflejaría mejor el verbo de envío. «Despedirla» puede sonar laboral o coloquial y no comunica tan bien la expresión fuente.
  - severity: low
    issue: «en todos sus días» es un calco menos natural
    rationale: Para כָּל יָמָיו, «todos sus días» conserva la literalidad hebraica y suena más natural que «en todos sus días».
  revised_spanish_text: Entonces lo multarán con cien siclos de plata y los darán al padre de la joven, porque ha traído mala fama sobre una virgen de Israel. Y ella será su esposa; no podrá enviarla lejos[a] todos sus días.
  revised_footnotes:
