translation:
  language: es
  text: 'En aquel tiempo Yahvé me dijo: «Lábrate dos tablas de piedra como las primeras, y sube hacia mí al monte, y hazte un arca de madera[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hazte un arca de madera». También puede expresarse «hazte un arca de madera» o «haz para ti un arca de madera»; el hebreo es literalmente «un arca de madera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִוא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal introduce el marco narrativo con una deixis retrospectiva. «En aquel tiempo» conserva bien ese valor y es natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton, siguiendo la convención del proyecto en español. «Yahvé» preserva la referencia al nombre del pacto sin reemplazarlo por un título.
- source_word: פְּסָל
  english_pob_choice: Carve
  chosen_spanish: Córtate
  alternatives_spanish:
  - Tallate
  - Hazte
  lexicon: HALOT
  rationale: En este contexto el verbo exige una acción manual sobre las tablas. «Córtate» comunica la fabricación de las dos piezas de piedra con naturalidad en español; la forma reflexiva refleja el valor benefactivo de לְךָ.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  english_pob_choice: two stone tablets
  chosen_spanish: dos tablas de piedra
  alternatives_spanish:
  - dos tablas de piedra
  - dos tablas de piedras
  lexicon: HALOT
  rationale: «Tablas de piedra» reproduce de manera fiel la construcción hebrea y evita una paráfrasis excesiva. En español, «tablas» funciona mejor que «lajas» o «lápidas» en este contexto de pacto.
- source_word: כָּרִאשֹׁנִים
  english_pob_choice: like the first ones
  chosen_spanish: semejantes a las primeras
  alternatives_spanish:
  - como las primeras
  - iguales a las primeras
  lexicon: HALOT
  rationale: La comparación remite a las tablas anteriores. «Semejantes a las primeras» conserva la relación comparativa sin forzar una identidad absoluta, dejando abierta la leve tensión lexical del hebreo.
- source_word: וַעֲלֵה אֵלַי הָהָרָה
  english_pob_choice: and come up to me on the mountain
  chosen_spanish: y sube a mí al monte
  alternatives_spanish:
  - y sube hacia mí al monte
  - y asciende a mí al monte
  lexicon: HALOT
  rationale: La forma hebrea combina ascenso y dirección hacia Dios. «Sube a mí al monte» mantiene ambos componentes con un español conciso y reverente.
- source_word: וְעָשִׂיתָ לְּךָ אֲרוֹן עֵץ
  english_pob_choice: and make for yourself a wooden ark
  chosen_spanish: y hazte un arca de madera
  alternatives_spanish:
  - y hazte un arca de madera
  - y haz para ti un arca de madera
  - y hazte un arca de madera
  lexicon: HALOT
  rationale: «Arca» conserva el término tradicional para el receptáculo sagrado y responde al uso contextual, no a un «arca» náutica. La forma reflexiva «hazte» traduce el matiz benefactivo de לְּךָ.
theological_decisions:
- issue: Nombre divino del Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה directamente; se preserva el nombre divino en transliteración convencional del proyecto. Se evita la sustitución por un título para mantener la transparencia respecto del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto de revisión muestra alta concordancia y ningún cambio requerido en la versión inglesa auditada. La propuesta española sigue la misma decisión principal sobre el nombre divino, conserva el paralelismo imperativo del hebreo y mantiene las dos alternativas textuales ya documentadas en el aparato inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para יְהוָה.
  - «Arca» se usa en sentido cultual/covenantal, no como embarcación.
  - La voz reflexiva en «córtate» y «hazte» intenta reflejar el valor benefactivo de לְךָ sin sobrerrogar el español.
  - Se mantiene un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
