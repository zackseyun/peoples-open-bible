base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/025.yaml
  text: If your brother becomes poor and sells some of his property[b][a], then his nearest kinsman-redeemer shall come and redeem what his brother has sold.
  footnotes:
  - marker: a
    text: Or, 'his nearest kinsman-redeemer may come and redeem.' The Hebrew term refers to a close relative with the right and duty to reclaim family property.
    reason: lexical_alternative
  - marker: b
    text: '''Inherited property'' refers to a hereditary family landholding within Israel.'
    reason: cultural_note
