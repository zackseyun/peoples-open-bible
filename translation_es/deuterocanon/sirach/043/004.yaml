    text: El hebreo de esta parte del versículo es difícil y no coincide del todo con el griego en cada punto. La traducción sigue el hebreo conservado como base, con apoyo del paralelo griego para aclarar varias frases comprimidas o inciertas.
    reason: textual_variant
  - marker: b
    text: La cláusula central sigue una formulación tentativa basada en un hebreo oscuro. El paralelo griego habla de vapores ígneos y de rayos resplandecientes, pero el texto principal conserva la imagen más literal de una acción consumidora acompañada de soplo.
    reason: source_note
  revision_rationale: 'Se ajustó el castellano para reflejar mejor la revisión final del POB inglés: se restauró el matiz de ''consume'' en la cláusula difícil y se sustituyó ''ciega los ojos'' por la imagen más literal ''quema el ojo'', que sigue mejor el hebreo tal como fue interpretado en la auditoría. También se actualizaron las notas para que expliquen correctamente la relación entre hebreo difícil y apoyo griego sin desplazar el texto principal hacia la alternativa griega.'
