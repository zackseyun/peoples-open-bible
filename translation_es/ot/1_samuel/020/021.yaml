    text: Or, ‘the arrows are nearer than you’ or ‘the arrows are on this side of you.’ The Hebrew indicates the arrows have fallen short of the attendant, not beyond him.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ‘as the LORD lives,’ an oath formula affirming the truth of the statement.'
    reason: cultural_note
