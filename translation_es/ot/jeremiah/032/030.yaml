translation:
  language: es
  text: Porque los hijos de Israel y los hijos de Judá no han hecho sino hacer lo que era malo[a] ante mis ojos desde su juventud; porque los hijos de Israel no han hecho sino provocarme[b] por la obra de sus manos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «los israelitas» / «el pueblo de Israel» y «el pueblo de Judá». El hebreo dice literalmente «los hijos de Israel» y «los hijos de Judá».
    reason: lexical_alternative
  - marker: b
    text: «La obra de sus manos» también puede aludir específicamente a los ídolos que hicieron.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la forma literal y paralela del hebreo, y mantiene el mismo registro formal que el sintagma paralelo con Judá.
- source_word: וּבְנֵי יְהוּדָה
  english_pob_choice: and the sons of Judah
  chosen_spanish: y los hijos de Judá
  alternatives_spanish:
  - y los judaítas
  - y el pueblo de Judá
  lexicon: HALOT
  rationale: Sigue de cerca la estructura del hebreo y preserva la distinción entre ambas comunidades del pacto.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: no han hecho sino
  alternatives_spanish:
  - solo
  - únicamente
  - nada más
  lexicon: HALOT
  rationale: En español, la perífrasis negativa expresa bien la exclusividad enfática de אַךְ sin sonar rígida ni perder fuerza semántica.
- source_word: עֹשִׂים הָרַע בְּעֵינַי
  english_pob_choice: done only what was evil in my eyes
  chosen_spanish: lo malo ante mis ojos
  alternatives_spanish:
  - el mal a mis ojos
  - lo que es malo ante mis ojos
  - lo malo en mi opinión
  lexicon: HALOT
  rationale: ‘Ante mis ojos’ conserva el modismo hebreo. ‘Lo malo’ comunica el juicio moral de forma natural en español sin diluir el valor idiomático.
- source_word: מִנְּעֻרֹתֵיהֶם
  english_pob_choice: from their youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde sus primeros días
  - desde su adolescencia
  - desde su niñez
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más natural en español para indicar una conducta arraigada desde temprano.
- source_word: מַכְעִסִים אֹתִי
  english_pob_choice: provoked me
  chosen_spanish: provocarme
  alternatives_spanish:
  - enojarme
  - irritarme
  - hacerme enojar
  lexicon: HALOT
  rationale: ‘Provocar’ reproduce mejor el matiz de ofensa reiterada y rebelde que el simple resultado emocional de ‘enojar’.
- source_word: בְּמַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: by the work of their hands
  chosen_spanish: con la obra de sus manos
  alternatives_spanish:
  - por la obra de sus manos
  - por lo que hicieron sus manos
  - con lo que sus manos hicieron
  lexicon: HALOT
  rationale: ‘Con la obra de sus manos’ sigue el giro hebreo y deja abierta la resonancia cultural a ídolos fabricados, sin cerrarla artificialmente.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme al criterio del proyecto, y se usa una fórmula profética solemne y contemporánea.
theological_decisions:
- issue: Repetición de 'los hijos de Israel' en la segunda cláusula
  english_pob_reading: Retain 'the sons of Israel' literally, without expanding or harmonizing to include Judah explicitly.
  chosen_spanish_reading: Conservar la repetición de ‘los hijos de Israel’ en la segunda cláusula, sin armonizarla ni generalizarla.
  alternative_spanish_readings:
  - ‘ellos’
  - ‘Israel y Judá’
  - ‘los israelitas’
  rationale: El hebreo repite la expresión de manera específica; mantenerla preserva la retórica y no borra una posible restricción o énfasis representativo del texto.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que simplificó ‘have only been provoking me’ a ‘have only provoked me’ para reflejar con mayor naturalidad el participio hebreo en este contexto. En español se optó por ‘no han hecho sino provocarme’ para conservar esa naturalidad y el valor aspectual repetitivo sin perder la fuerza del original.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה, conforme al criterio editorial del proyecto.
  - Se prefirió ‘hijos de Israel’ / ‘hijos de Judá’ por paralelismo formal y auditabilidad.
  - Se evitó ‘SEÑOR’ como sustitución del nombre divino.
  - ‘Provocar’ se conserva para mantener la fuerza relacional y polémica del hebreo.
  - La nota sobre ‘obra de sus manos’ deja abierta la referencia general a obras humanas y la específica a ídolos.
