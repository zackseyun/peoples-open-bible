base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/013.yaml
  text: Then I heard a holy one speaking[a], and one holy one said to the one speaking, “How long is the vision concerning the regular burnt offering and the desolating transgression[d][c][b], and the giving over of both the sanctuary and the host to be trampled?”
  footnotes:
  - marker: a
    text: Or possibly, 'to Palmoni, the one speaking,' if לַפַּלְמוֹנִי is taken as a proper name or title rather than an indefinite expression.
    reason: alternative_reading
  - marker: b
    text: Traditionally, 'the daily sacrifice.' The Hebrew תָּמִיד refers to the regular continual offering in the temple service.
    reason: lexical_alternative
  - marker: c
    text: Or 'the transgression that desolates.'
    reason: lexical_alternative
  - marker: d
    text: '''Host'' may refer to the people associated with the sanctuary, an army, or another collective force; the Hebrew is not fully specific here.'
    reason: lexical_alternative
