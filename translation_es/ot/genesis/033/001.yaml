translation:
  language: es
  text: Entonces Jacob alzó sus ojos y miró[a], y he aquí[b], Esaú venía, y con él cuatrocientos hombres. Así dividió a los niños entre Lea, Raquel y las dos siervas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alzó la mirada» o «levantó la vista».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «he aquí», un marcador vívido que llama la atención a la llegada de Esaú.
    reason: lexical_alternative
  - marker: c
    text: O «las dos sirvientas»; el hebreo se refiere a las dos servidoras de la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó sus ojos
  alternatives_spanish:
  - levantó sus ojos
  - alzó la mirada
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para ‘levantar la vista’. En español, ‘alzó sus ojos’ conserva el giro bíblico con buena naturalidad y evita una paráfrasis excesiva. ‘Alzó la mirada’ sería más fluido, pero pierde parte del paralelismo verbal con el original.
- source_word: וַיַּרְא
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - vio
  - observó
  lexicon: HALOT
  rationale: 'Siguiendo la decisión inglesa de distinguir la acción de mirar del contenido de lo visto, ‘miró’ funciona mejor que ‘vio’. Mantiene el movimiento narrativo: primero levanta los ojos y luego fija la vista.'
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: ‘He aquí’ preserva la fuerza de presentación vívida y de sorpresa. Es una forma formal pero todavía comprendida en español bíblico; además, corresponde bien al valor discursivo de וְהִנֵּה.
- source_word: בָּא
  english_pob_choice: was coming
  chosen_spanish: venía
  alternatives_spanish:
  - venía acercándose
  - iba llegando
  lexicon: HALOT
  rationale: El participio hebreo presenta a Esaú en acción continua. ‘Venía’ transmite ese aspecto progresivo mejor que un simple pasado puntual.
- source_word: וְעִמּוֹ אַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: and with him were four hundred men
  chosen_spanish: con él, y cuatrocientos hombres
  alternatives_spanish:
  - y con él estaban cuatrocientos hombres
  - y lo acompañaban cuatrocientos hombres
  lexicon: HALOT
  rationale: En español, la coordinación breve ‘venía con él, y cuatrocientos hombres’ mantiene el peso del número y la compañía de Esaú sin forzar una estructura demasiado literal. El contexto permite omitir ‘estaban’ por economía estilística.
- source_word: וַיַּחַץ
  english_pob_choice: divided
  chosen_spanish: dividió
  alternatives_spanish:
  - repartió
  - separó
  lexicon: HALOT
  rationale: ‘Dividió’ reproduce la acción de distribuir a los niños en grupos vinculados con las distintas mujeres. Es el equivalente más directo y transparente.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: a los niños
  alternatives_spanish:
  - a los hijos
  - a los pequeños
  lexicon: HALOT
  rationale: El sustantivo hebreo puede abarcar hijos/niños; aquí, en el contexto doméstico inmediato, ‘niños’ es claro y natural en español. Se mantiene la referencia amplia a los hijos de Jacob sin introducir una precisión no explicitada por el hebreo.
- source_word: עַל לֵאָה וְעַל רָחֵל וְעַל שְׁתֵּי הַשְּׁפָחוֹת
  english_pob_choice: among Leah, Rachel, and the two female servants
  chosen_spanish: entre Lea, Raquel y las dos siervas
  alternatives_spanish:
  - con Lea, con Raquel y con las dos siervas
  - entre Lea, Raquel y las dos sirvientas
  lexicon: HALOT
  rationale: El valor distributivo de עַל en este contexto se expresa mejor en español con ‘entre’. ‘Siervas’ respeta la relación doméstica del hebreo שְׁפָחוֹת sin imponer ‘esclavas’, que sería una carga legal más fuerte de la que el contexto inmediato exige. ‘Sirvientas’ es posible, pero ‘siervas’ mantiene un registro bíblico claro.
translation_notes:
  revision_awareness: This draft follows the high-agreement audit with no substantive revisions applied. It preserves the Hebrew discourse sequence (eye-lifting, looking, behold), the participial sense of Esau’s approach, and the distributive grouping of the children. The Spanish wording was adjusted for naturalness while remaining source-grounded.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma de proyecto, pero este versículo no lo contiene.
  - Se usa ‘siervas’ para שְׁפָחוֹת como término de hogar/servicio femenino; no se adopta ‘esclavas’ porque el contexto inmediato no exige la carga jurídica.
  - ‘He aquí’ se conserva para וְהִנֵּה por su valor discursivo y su compatibilidad con el registro bíblico español.
  - ‘Entre’ expresa el reparto de los niños con Lea, Raquel y las dos siervas sin añadir información no presente en el hebreo.
