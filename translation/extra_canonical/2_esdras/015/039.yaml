  text: et superinvalescent venti ab oriente et recludent eum et nubem quam suscitavit in ira, et sidus ad faciendam exteritionem ab orientalem notum et occidentem violabitur.
  language: Latin
translation:
  text: And the winds from the east will grow strong and shut it in[a], along with the cloud that he raised up in wrath; and the star appointed to bring destruction will be violently assailed by the east wind, the south wind[b], and the west wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is one of the chapter's harder Latin cruxes. The rendering reflects a best-effort sense of cosmic forces being shut in and thrown into disorder, but the syntax and referents are uncertain.
    reason: textual_variant
    anchor_ref: '15:39'
  - marker: b
    text: Or 'and the cloud that he raised up in wrath, and the star appointed to bring destruction toward east and west, will be thrown into confusion.'.
    reason: previous_rendering
