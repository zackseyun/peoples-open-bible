translation:
  language: es
  text: Sansón fue a Gaza[a], y allí vio a una prostituta, y se llegó a ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y tuvo relaciones sexuales con ella». El hebreo usa una expresión eufemística convencional en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  lexicon: HALOT
  rationale: En el encadenamiento narrativo del wayyiqtol, הלך expresa movimiento ordinario. En español, "fue" comunica ese desplazamiento de forma natural sin añadir matiz innecesario.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: convención castellana bíblica
  rationale: El nombre propio se adapta a la forma española habitual y reconocible para lectura eclesial en castellano.
- source_word: עַזָּתָה
  english_pob_choice: to Gaza
  chosen_spanish: a Gaza
  alternatives_spanish:
  - hacia Gaza
  - a la ciudad de Gaza
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia la ciudad. "A Gaza" mantiene la naturalidad del español y conserva la dirección implícita del hebreo.
- source_word: וַיַּרְא שָׁם
  english_pob_choice: and there he saw
  chosen_spanish: y allí vio
  alternatives_spanish:
  - y vio allí
  - y allí observó
  lexicon: HALOT
  rationale: שָׁם significa "allí". La colocación "y allí vio" suena natural en español y preserva el orden narrativo sin forzar el sintagma.
- source_word: אִשָּׁה זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  lexicon: HALOT
  rationale: זוֹנָה nombra directamente a una mujer que ejerce prostitución. "Prostituta" es la equivalencia clara, actual y precisa; "ramera" es arcaizante y "mujer prostituta" resulta pesado.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: and he went in to her
  chosen_spanish: y fue a ella
  alternatives_spanish:
  - y entró a ella
  - y tuvo relaciones con ella
  lexicon: HALOT
  rationale: El hebreo usa una expresión euphemística para la relación sexual. En español, "fue a ella" conserva el pudor e idiomatismo del giro sin explicitar más de lo que el hebreo dice en superficie. Se mantiene la tensión semántica para no reemplazar el eufemismo por una paráfrasis explícita.
theological_decisions:
- issue: Cómo reflejar el eufemismo sexual de וַיָּבֹא אֵלֶיהָ sin sobreexplicarlo
  english_pob_reading: Preserve the euphemistic idiom with 'he went in to her'
  chosen_spanish_reading: Preservar el eufemismo con 'y fue a ella'
  alternative_spanish_readings:
  - y entró a ella
  - y tuvo relaciones con ella
  - y se acostó con ella
  rationale: El hebreo emplea una fórmula convencional, no un verbo explícito de coito. En español, "y fue a ella" mantiene la reserva del original y evita intensificar el sentido más allá de lo que el texto manifiesta de manera directa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión del contexto inglés: no se requieren cambios adicionales; se mantiene la equivalencia óptima y la preservación del eufemismo.'
  spanish_consistency_notes:
  - Se usa "Gaza" con mayúscula y artículo omitido, conforme al topónimo español habitual.
  - Se evita "SEÑOR" porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se mantiene "prostituta" por fuerza léxica directa de זוֹנָה, sin suavizar a términos menos precisos.
  - La nota al pie marca la alternativa interpretativa solo en el punto del eufemismo sexual, donde el español podría ocultar la literalidad del hebreo.
