base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/088.yaml
  text: Behold[a], we are before you in our lawless deeds[b], for there is no longer any standing before you because of these things.
  footnotes:
  - marker: a
    text: Or, 'in our iniquities.' The Greek ἀνομίαι can denote acts of lawlessness or the state of guilt resulting from them.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel (Ezra 9:14) expresses the same crisis in different words, emphasizing God's anger and the possible end of any remnant; 1 Esdras here frames it as an inability to stand before God because of these sins.
    reason: cross_reference
