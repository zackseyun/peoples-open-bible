translation:
  language: es
  text: Y junto al territorio de los sacerdotes[a], los levitas tendrán veinticinco mil codos de longitud y diez mil de anchura. Toda la longitud será de veinticinco mil, y la anchura de diez mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «veinticinco mil» y «diez mil»; «codos» se entiende por el contexto de las medidas de Ezequiel 48.
    reason: cross_reference
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: the Levites shall have
  chosen_spanish: los levitas tendrán
  alternatives_spanish:
  - y los levitas
  - los levitas
  lexicon: HALOT
  rationale: El hebreo es elíptico y el contexto de repartición de tierras exige suplir una relación posesiva o distributiva. «Tendrán» expresa con naturalidad la adjudicación del territorio sin añadir contenido ajeno.
- source_word: לְעֻמַּת
  english_pob_choice: alongside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - frente a
  - correspondiente a
  lexicon: HALOT
  rationale: En este contexto de lindes y asignaciones territoriales, la relación es espacial y de contigüidad. «Junto a» es natural en español y conserva la idea de disposición paralela.
- source_word: גְּב֣וּל
  english_pob_choice: territory
  chosen_spanish: territorio
  alternatives_spanish:
  - límite
  - frontera
  - confín
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «límite» o «frontera», aquí designa el lote delimitado. «Territorio» comunica mejor el sentido de porción de tierra asignada.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes levíticos
  - los presbíteros
  lexicon: HALOT
  rationale: Es la equivalencia estándar y transparente para el grupo cultual mencionado. «Sacerdotes» mantiene el valor del término hebreo sin introducir matices eclesiásticos posteriores.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand cubits
  chosen_spanish: veinticinco mil codos
  alternatives_spanish:
  - veinticinco mil
  - veinticinco mil medidas
  lexicon: HALOT
  rationale: El hebreo solo da la cifra, pero el contexto inmediato de Ezequiel 48 presupone la unidad de medida. «Codos» sigue ese contexto y evita la ambigüedad en español.
- source_word: אֹרֶךְ
  english_pob_choice: in length
  chosen_spanish: de longitud
  alternatives_spanish:
  - en longitud
  - largo
  lexicon: HALOT
  rationale: La expresión dimensional en español se dice con naturalidad como «de longitud». Conserva la función mensurativa del sustantivo hebreo.
- source_word: וְרֹחַב עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: and ten thousand in width
  chosen_spanish: y diez mil de anchura
  alternatives_spanish:
  - y una anchura de diez mil
  - y diez mil de ancho
  lexicon: HALOT
  rationale: Se mantiene el paralelismo dimensional del texto fuente. «Anchura» reproduce el sustantivo con claridad y solemnidad bíblica.
- source_word: כָּל אֹרֶךְ
  english_pob_choice: The whole length
  chosen_spanish: Toda la longitud
  alternatives_spanish:
  - La longitud total
  - Toda la extensión
  lexicon: HALOT
  rationale: «Toda la longitud» refleja el resumen totalizador del hebreo y conserva la repetición enfática del dato de medida.
- source_word: כָּל
  english_pob_choice: The whole
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - La totalidad de la
  lexicon: HALOT
  rationale: El artículo pronominal en español transmite el valor resumidor y totalizador del hebreo sin necesidad de ampliar la frase.
translation_notes:
  revision_awareness: El inglés POB mantiene el paralelismo de las medidas y solo explicita «cubits» por el contexto; la presente versión conserva esa decisión en español con «codos» y mantiene la misma estructura resumidora del versículo. No se detectan revisiones textuales que alteren el sentido básico.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto cuando aparezca el tetragrámaton, pero este versículo no lo contiene.
  - «Territorio» se reserva aquí para el lote asignado; no se traduce como «frontera» porque el sentido es distributivo, no meramente limítrofe.
  - La nota sobre la unidad de medida se ancla en el texto porque la unidad no aparece explícita en el hebreo, pero sí en el contexto canónico inmediato.
