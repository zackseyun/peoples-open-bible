- from: Quien anda en integridad anda con seguridad[a], pero el que hace torcidos sus caminos será dado a conocer.
  to: Quien anda en integridad anda con seguridad[a], pero el que tuerce sus caminos será descubierto.
  rationale: Se ajusta el español para que suene natural y siga fielmente el hebreo y el audit trail inglés. «Tuerce sus caminos» expresa mejor עקשׁ que «hace torcidos sus caminos», y «será descubierto» comunica con claridad el sentido contextual de יִוָּדֵעַ, mientras la nota conserva las alternativas semánticas documentadas.
