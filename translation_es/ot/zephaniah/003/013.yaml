base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/003/013.yaml
  text: The remnant of Israel will do no wrong and speak no lies[a], and no deceitful tongue will be found in their mouth; for they will graze and lie down[b], with no one to make them afraid.
