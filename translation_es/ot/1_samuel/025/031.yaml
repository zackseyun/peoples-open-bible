translation:
  language: es
  text: 'Y esto no te será motivo de remordimiento[a] ni obstáculo para el corazón[b] de mi señor: ya sea que hayas derramado sangre sin causa, o que mi señor se haya vengado por sí mismo[c]. Y cuando Yahvé haya hecho bien a mi señor, entonces acuérdate de tu sierva[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «motivo de ofensa» / «ocasión de remordimiento»; el término hebreo es raro y puede aludir a algo que más tarde produce doloroso arrepentimiento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «obstáculo de corazón».
    reason: lexical_alternative
  - marker: c
    text: O «que mi señor se haya salvado por sí mismo»; en contexto, la frase se refiere a que David tome venganza por su propia mano.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «tu sierva», una autodesignación humilde y femenina de Abigail.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפוּקָה
  english_pob_choice: a cause of grief
  chosen_spanish: motivo de tropiezo
  alternatives_spanish:
  - causa de dolor
  - causa de disgusto
  - ocasión de remordimiento
  lexicon: HALOT
  rationale: El término es raro y apunta a algo que después produce doloroso arrepentimiento o perturbación. ‘Motivo de tropiezo’ conserva la idea de algo que hace caer moralmente o produce tropiezo interior, sin forzar una glosa demasiado interpretativa.
- source_word: מִכְשׁוֹל לֵב
  english_pob_choice: a stumbling block of heart
  chosen_spanish: obstáculo de corazón
  alternatives_spanish:
  - tropezadero del corazón
  - obstáculo para el corazón
  - conciencia turbada
  lexicon: HALOT
  rationale: 'La imagen hebrea es literal: ‘tropezadero/obstáculo del corazón’. En español, ‘obstáculo de corazón’ mantiene la metáfora con una leve naturalización. Se preserva la tensión entre imagen interna y sentido moral.'
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  lexicon: HALOT
  rationale: En el contexto de respeto y subordinación hacia David, ‘mi señor’ refleja el registro deferente de manera natural en español y evita ‘amo’, que suena más áspero aquí.
- source_word: לִשְׁפָּךְ דָּם חִנָּם
  english_pob_choice: by shedding blood without cause
  chosen_spanish: que hayas derramado sangre sin causa
  alternatives_spanish:
  - que hayas derramado sangre injustamente
  - que hayas derramado sangre gratuitamente
  lexicon: HALOT
  rationale: 'La frase explica el posible tropiezo futuro: derramar sangre ‘sin causa’, es decir, sin justificación. ‘Sin causa’ conserva la concisión moral del hebreo y coincide con la decisión auditada en inglés.'
- source_word: וּלְהוֹשִׁיעַ אֲדֹנִי לוֹ
  english_pob_choice: by my lord avenging himself
  chosen_spanish: que mi señor se haya vengado por sí mismo
  alternatives_spanish:
  - que mi señor se haya salvado por sí mismo
  - que mi señor haya tomado la justicia por su mano
  - que mi señor haya buscado su propia vindicación
  lexicon: HALOT
  rationale: Aunque el verbo puede significar ‘salvar’, el contexto narra la toma de venganza/justicia por la propia mano. ‘Vengado por sí mismo’ sigue la lectura contextual del POB en inglés sin diluir el problema ético que Abigail está evitando.
- source_word: וְהֵיטִב יְהוָה
  english_pob_choice: When Yahweh has dealt well
  chosen_spanish: Y cuando Yahvé haya hecho bien
  alternatives_spanish:
  - Y cuando Yahvé haya obrado bien
  - Y cuando Yahvé haya sido bueno
  lexicon: HALOT
  rationale: El verbo היטיב expresa hacer bien/obrar favorablemente. ‘Haya hecho bien’ es una forma natural y fiel que conserva la orientación futura de la cláusula temporal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como ‘Yahvé’, evitando la sustitución por ‘SEÑOR’.'
- source_word: אֲמָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu criada
  - tu esclava
  lexicon: HALOT
  rationale: La forma es femenina y auto-humillante. ‘Sierva’ preserva la humildad y hace visible el matiz femenino sin sonar demasiado duro en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La política del proyecto pide transliterarlo como ‘Yahvé’ para mantener auditable el nombre propio del pacto, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Posible tensión entre ‘salvarse’ y ‘vengarse’ en וּלְהוֹשִׁיעַ אֲדֹנִי לוֹ
  english_pob_reading: by my lord avenging himself
  chosen_spanish_reading: que mi señor se haya vengado por sí mismo
  alternative_spanish_readings:
  - que mi señor se haya salvado por sí mismo
  - que mi señor haya tomado la justicia por su mano
  rationale: La raíz salvar/deliver aparece, pero el contexto inmediato es el de una acción violenta de autoprotección o venganza. Se mantiene la lectura contextual del POB, preservando la tensión semántica sin suavizarla.
  doctrine_reference: 'DOCTRINE.md lexical/theological tensions: self-help vengeance vs divine vindication'
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión auditada en inglés: la cláusula inicial se volvió completa y la segunda mitad se explicitó como dos posibilidades coordinadas. En español se mantuvo la misma estructura de advertencia moral, con la metáfora interna (‘obstáculo de corazón’) y el giro temporal futuro (‘haya hecho bien’) conservados de forma natural.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa ‘mi señor’ como tratamiento respetuoso, consistente con el registro de Abigail.
  - ‘Sierva’ se reserva aquí para reflejar tanto la humildad como el femenino explícito del hebreo.
  - La puntuación refleja la división de las dos cláusulas infinitivas como alternativas coordinadas.
  - No se introdujo ‘Cristo’, ‘SEÑOR’ ni otras sustituciones tradicionales que oculten el nombre divino.
