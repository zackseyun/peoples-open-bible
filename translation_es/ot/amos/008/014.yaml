translation:
  language: es
  text: 'Los que juran por la culpa[a] de Samaria y dicen: «¡Vive tu dios, Dan!»[b], y «¡Vive el camino de Beerseba!»[c], caerán y nunca más se levantarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el pecado de Samaria»; algunos entienden esto como una referencia a un ídolo o deidad asociada con Samaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¡Vive tu dios de Dan!»'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la ruta de Beerseba»; puede aludir a la peregrinación o a la práctica cultual asociada a Beerseba.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנִּשְׁבָּעִים
  english_pob_choice: Those who swear
  chosen_spanish: Los que juran
  alternatives_spanish:
  - los que están jurando
  - los juradores
  lexicon: HALOT
  rationale: El participio sustantivado introduce un grupo definido bajo juicio; en español, una relativa con «Los que juran» comunica con naturalidad la acción habitual o característica sin perder el valor sustantivo.
- source_word: בְּאַשְׁמַת שֹׁמְרוֹן
  english_pob_choice: by the guilt of Samaria
  chosen_spanish: por la culpa de Samaria
  alternatives_spanish:
  - por el pecado de Samaria
  - por la culpa/güenza de Samaria
  lexicon: HALOT
  rationale: אַשְׁמָה puede denotar culpa o culpabilidad. «Culpa» conserva el sentido léxico básico y deja abierta la referencia metonímica a un culto idólatra o a la condición culpable de Samaria, sin resolverla excesivamente.
- source_word: חֵי
  english_pob_choice: As ... lives
  chosen_spanish: ¡Vive ...!
  alternatives_spanish:
  - Por la vida de ...
  - ¡Tan cierto como que ... vive!
  lexicon: HALOT
  rationale: La fórmula juratoria hebrea se expresa de manera idiomática en español con «¡Vive ...!», manteniendo el carácter de juramento y su fuerza breve.
- source_word: אֱלֹהֶיךָ דָּן
  english_pob_choice: your god, Dan
  chosen_spanish: tu dios, Dan
  alternatives_spanish:
  - el dios de Dan
  - tu dios de Dan
  lexicon: HALOT
  rationale: El hebreo es compacto y permite entender a Dan en aposición al dios invocado. «Tu dios, Dan» reproduce la tensión sintáctica sin añadir una preposición no asegurada por el texto.
- source_word: דֶּרֶךְ בְּאֵר שָׁבַע
  english_pob_choice: the way of Beer-sheba
  chosen_spanish: el camino de Beerseba
  alternatives_spanish:
  - la ruta de Beerseba
  - la peregrinación a Beerseba
  - la práctica cultual de Beerseba
  lexicon: HALOT
  rationale: דֶּרֶךְ significa literalmente «camino» o «ruta». Se conserva esa literalidad en la línea principal y se deja abierta la posible carga cultual del sintagma, como en el audit trail inglés.
- source_word: וְנָפְלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - y caerán
  - caerán entonces
  lexicon: HALOT
  rationale: El futuro profético en español se expresa naturalmente con «caerán», sin necesidad de repetir la conjunción inicial en exceso.
- source_word: וְלֹא יָקוּמוּ עוֹד
  english_pob_choice: and never rise again
  chosen_spanish: y nunca más se levantarán
  alternatives_spanish:
  - y no se levantarán más
  - y no volverán a levantarse
  lexicon: HALOT
  rationale: «Nunca más» preserva la finalidad de עוֹד con negación; «se levantarán» transmite el contraste con la caída y funciona con claridad en español contemporáneo.
theological_decisions:
- issue: Sentido de "la culpa de Samaria"
  english_pob_reading: A metonymic reference to Samaria's guilty/idolatrous cult, rendered 'the guilt of Samaria'
  chosen_spanish_reading: Una referencia metonímica a la culpa idolátrica de Samaria, mantenida como «la culpa de Samaria»
  alternative_spanish_readings:
  - el pecado de Samaria
  - la deidad/ídolo de Samaria
  rationale: «Culpa» conserva el valor léxico del hebreo y no fuerza una identificación precisa del referente cultual. Así se preserva la tensión entre culpa moral y posible objeto de culto, en vez de cerrarla prematuramente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido de "el camino de Beerseba"
  english_pob_reading: Retain the literal expression in the main text
  chosen_spanish_reading: Conservar la expresión literal «el camino de Beerseba»
  alternative_spanish_readings:
  - la peregrinación a Beerseba
  - el culto de Beerseba
  rationale: El hebreo admite una lectura cultual o de ruta de peregrinación. Mantener «camino» respeta la forma del texto y deja visible la ambigüedad interpretativa documentada en el audit trail.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Fórmula juratoria con el verbo "vivir"
  english_pob_reading: As ... lives
  chosen_spanish_reading: «¡Vive ...!» como equivalente idiomático de juramento
  alternative_spanish_readings:
  - «Por la vida de ...»
  - «¡Tan cierto como que ... vive!»
  rationale: El hebreo usa una fórmula juratoria fija. La equivalencia idiomática en español conserva la fuerza performativa sin convertirla en una explicación paraprástica.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el pronombre redundante final para hacer más natural la sintaxis sin alterar el sentido. En español se siguió esa misma economía, terminando directamente con «caerán y nunca más se levantarán».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino según la norma del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se eligió «dios» en minúscula para אֱלֹהֶיךָ, porque el texto presenta una fórmula juratoria ligada a un referente cultual, no un título divino explícito en español.
  - No se añadió una nota para «culpa de Samaria» en el texto porque la ambigüedad queda explicada en las decisiones lexicográficas y teológicas; solo se marcó la alternativa de «Beerseba» donde la POB inglesa preservó nota de lectura alternativa.
