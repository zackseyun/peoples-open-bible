translation:
  language: es
  text: 'Entonces David regresó para bendecir a su hogar. Pero Mical, hija de Saúl, salió al encuentro de David y dijo: «¡Qué honrado[a] estuvo hoy el rey de Israel, descubriéndose hoy ante la vista de las esclavas de sus esclavos[b], como se descubre sin vergüenza cualquiera de esos hombres vulgares[c]!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Qué glorioso estuvo hoy el rey de Israel»; el hebreo es deliberadamente sarcástico en contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sirvientas» para «esclavas». El hebreo designa dependientes domésticas de bajo estatus.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como se expone sin vergüenza cualquiera de esos hombres indignos»; también puede entenderse «uno de esos hombres despreciables».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: bendecir
  alternatives_spanish:
  - pronunciar una bendición sobre
  - dar su bendición a
  lexicon: HALOT
  rationale: El infinitivo expresa la intención de David de impartir bendición; en español, «bendecir» es el equivalente natural y fiel, sin añadir paráfrasis.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su familia
  - a su casa/linaje
  lexicon: HALOT
  rationale: Aunque el hebreo puede incluir a la familia o la casa como grupo doméstico, aquí el contexto de regresar para bendecir permite «su casa» como traducción breve y comprensible, sin perder el sentido colectivo implícito.
- source_word: מִיכַל בַּת שָׁאוּל
  english_pob_choice: Michal daughter of Saul
  chosen_spanish: Mical, hija de Saúl
  alternatives_spanish:
  - Mical, la hija de Saúl
  - Mical, hija de Saúl
  lexicon: HALOT
  rationale: Se conserva la apposición y el énfasis narrativo en su identidad como hija de Saúl; «Mical» sigue la forma usual en español bíblico.
- source_word: מַה נִּכְבַּד הַיּוֹם
  english_pob_choice: How honored ... was today
  chosen_spanish: ¡Qué honrado estuvo hoy...!
  alternatives_spanish:
  - ¡Qué glorioso estuvo hoy...!
  - ¡Qué distinguido estuvo hoy...!
  lexicon: HALOT
  rationale: El hebreo usa un enunciado irónico con כבד («ser pesado, honrado, glorioso»). «Honrado» mantiene la base léxica y deja que el contexto comunique la ironía.
- source_word: נִגְלָה
  english_pob_choice: uncovering himself
  chosen_spanish: descubriéndose
  alternatives_spanish:
  - desnudándose
  - exponiéndose
  lexicon: HALOT
  rationale: El nifal de גלה remite a quedar descubierto o desvestirse. «Descubriéndose» conserva la literalidad y el matiz vergonzoso sin volverlo más gráfico de lo necesario.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: ante la vista de
  alternatives_spanish:
  - a la vista de
  - delante de
  lexicon: HALOT
  rationale: La locución española reproduce el valor público del hebreo y su tono de desprecio ante testigos de bajo estatus.
- source_word: אַמְהוֹת עֲבָדָיו
  english_pob_choice: the slave girls of his slaves
  chosen_spanish: las esclavas de sus esclavos
  alternatives_spanish:
  - las sirvientas de sus esclavos
  - las esclavas de sus siervos
  lexicon: HALOT
  rationale: Se preserva la dureza social del hebreo y la ironía de Mical. «Esclavas» y «esclavos» reflejan con fidelidad el vínculo de dependencia subrayado por la traducción inglesa POB.
- source_word: כְּהִגָּלוֹת נִגְלוֹת
  english_pob_choice: as ... shamelessly uncovers himself
  chosen_spanish: como se descubre uno ... sin vergüenza
  alternatives_spanish:
  - como se desnuda uno ... sin vergüenza
  - como se expone uno ... sin vergüenza
  lexicon: HALOT
  rationale: La construcción intensiva se vierte con una frase española natural que transmite repetición/enfático desprecio; «sin vergüenza» recoge el juicio insultante implícito.
- source_word: אַחַד הָרֵקִים
  english_pob_choice: one of the vulgar fellows
  chosen_spanish: uno de los hombres vulgares
  alternatives_spanish:
  - uno de los inútiles
  - uno de los bribones vulgares
  - uno de los hombres indignos
  lexicon: HALOT
  rationale: ריקים designa personas vacías o despreciables. «Hombres vulgares» comunica el menosprecio sin introducir un término excesivamente coloquial o una valoración no atestiguada por el hebreo.
theological_decisions:
- issue: Mantener el tono irónico y humillante de Mical
  english_pob_reading: The Hebrew wording is overtly sarcastic in context.
  chosen_spanish_reading: El español conserva la ironía mediante una exclamación formal que suena elogiosa en la superficie pero queda desmentida por el contexto.
  alternative_spanish_readings:
  - trasladar la ironía con un giro más explícito
  - suavizar el elogio aparente
  rationale: El pasaje depende de la tensión entre elogio aparente y burla real. Traducirlo demasiado explícito borraría la forma discursiva hebrea; demasiado neutro perdería la sarcasmo narrativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Preservar el lenguaje de esclavitud en אַמְהוֹת עֲבָדָיו
  english_pob_reading: slave girls of his slaves
  chosen_spanish_reading: las esclavas de sus esclavos
  alternative_spanish_readings:
  - las sirvientas de sus esclavos
  - las criadas de sus esclavos
  rationale: La POB inglesa opta por mantener el estatus de esclavitud donde es socialmente relevante. Aquí la humillación pública de David ante mujeres de bajo rango forma parte del desprecio de Mical, así que «esclavas» conserva la fuerza social del original.
  doctrine_reference: DOCTRINE.md Contested terms table on δοῦλος by analogy of bonded-status rendering
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: «fellows» se refleja aquí con «hombres vulgares», y se conserva la restauración de «slave»/«esclavas» frente a cualquier suavización hacia «siervos» o «sirvientes». No se introduce una paráfrasis más fuerte que la que permite el hebreo; sí se mantiene la ironía explícita y el registro de vergüenza pública.'
  spanish_consistency_notes:
  - Se usa «Mical» para la forma del nombre en español bíblico y «Saúl» para el antropónimo.
  - «Esclavas/esclavos» se mantiene de forma consistente para reflejar el estatus vinculado en el hebreo y en la auditoría inglesa.
  - La exclamación inicial mantiene la construcción valorativa e irónica del hebreo sin cambiar el contenido proposicional.
  - «Descubriéndose» se prefiere a «desnudándose» para conservar el paralelismo con el hebreo y evitar una intensificación innecesaria.
