translation:
  language: es
  text: Él sana a los quebrantados de corazón y les venda sus heridas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus dolores' o 'sus lesiones'. El término hebreo puede denotar dolor o herida; 'heridas' se elige porque encaja con la imagen de vendar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹפֵא
  english_pob_choice: he heals
  chosen_spanish: Él sana
  alternatives_spanish:
  - el que sana
  - él está sanando
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera predicativa y descriptiva en el contexto de alabanza del salmo. En español, el presente verbal 'sana' comunica con naturalidad la acción habitual de Dios sin volver la frase rígidamente participial.
- source_word: לִשְׁבוּרֵי לֵב
  english_pob_choice: the brokenhearted
  chosen_spanish: los quebrantados de corazón
  alternatives_spanish:
  - los quebrados de corazón
  - los de corazón quebrantado
  lexicon: HALOT
  rationale: La construcción literal es 'los quebrantados de corazón'. 'Quebrantados de corazón' conserva la metáfora y suena bíblico y comprensible en español, sin convertirla en una paráfrasis emocional más libre.
- source_word: וּמְחַבֵּשׁ
  english_pob_choice: and binds up
  chosen_spanish: y venda
  alternatives_spanish:
  - y venda las heridas
  - y las cura vendándolas
  lexicon: HALOT
  rationale: El verbo חבש en contextos de sanidad expresa vendar o envolver una herida. 'Venda' mantiene la imagen concreta de tratamiento médico, equivalente a 'binds up' y más natural que un calco más pesado.
- source_word: לְעַצְּבוֹתָם
  english_pob_choice: their wounds
  chosen_spanish: sus heridas
  alternatives_spanish:
  - sus dolores
  - sus penas
  - sus lesiones
  lexicon: HALOT
  rationale: El sustantivo puede abarcar dolor, herida o daño. En paralelo con 'venda', 'heridas' conserva la imagen concreta elegida por la POB inglesa, sin excluir el trasfondo de dolor interior que el paralelismo también sugiere.
theological_decisions:
- issue: Alcance de la imagen de sanidad
  english_pob_reading: Retain both emotional and physical-healing imagery without narrowing the verse to either exclusively spiritual comfort or bodily healing.
  chosen_spanish_reading: Mantener simultáneamente la imagen de consuelo interior y la de sanidad de heridas, sin reducir el versículo solo a una de las dos.
  alternative_spanish_readings:
  - solo sanidad espiritual o emocional
  - principalmente curación física
  rationale: El paralelismo une a los 'quebrantados de corazón' con la acción de vendar 'heridas'. La traducción preserva esa tensión poética y teológica en vez de resolverla en un sentido más estrecho.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo auditado sin cambios finales; la versión inglesa estable confirmó la lectura de 'wounds' y la preservación de la tensión entre dolor interior e imagen médica concreta.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el nombre divino explícito.
  - '''Quebrantados de corazón'' mantiene el registro bíblico sin recurrir a una expresión demasiado libre.'
  - '''Venda'' comunica la imagen médica de חבש de forma natural en español y evita diluirla en un mero ''cura''.'
