  to: En aquel tiempo Alcimo[a] fue herido, y sus obras quedaron impedidas; su boca quedó tapada, y quedó paralizado, y ya no podía pronunciar palabra ni dar órdenes acerca de su casa.
  rationale: Se ajusta ἐπλήγη a «fue herido» para evitar la imagen poco natural de «fue derribado» y reflejar mejor una aflicción súbita y grave. Se refuerza ἀπεφράγη con «su boca quedó tapada», que preserva la imagen concreta de obstrucción. Se mejora la naturalidad de «hablar palabra» a «pronunciar palabra» sin perder el sentido de incapacidad total. La nota sobre οἶκος se mantiene porque sigue siendo pertinente.
