  yaml_path: translation/deuterocanon/1_maccabees/010/029.yaml
  text: And we will grant you many remissions[a], and we will give you gifts. And now I release you and exempt all the Jews from the taxes, from the salt duty[c][b], and from the crown levies.
  footnotes:
  - marker: a
    text: Or 'many exemptions' for 'many remissions' (ἀφέματα πολλά); the phrase refers to fiscal releases in context.
    reason: lexical_alternative
  - marker: b
    text: The expression 'salt duty' translates τιμῆς τοῦ ἁλός, likely a tax or assessed charge connected with salt.
    reason: cultural_note
  - marker: c
    text: '''Crown levies'' renders στεφάνων, literally ''crowns,'' a term used for royal tribute or its monetary equivalent.'
    reason: cultural_note
