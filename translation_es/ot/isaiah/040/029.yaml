lexical_decisions:
- source_word: נֹתֵן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - da continuamente
  lexicon: HALOT
  rationale: El participio qal expresa una acción característica y general de Dios en este contexto. En español, el presente simple 'da' comunica mejor ese valor gnómico sin sobrecargar el aspecto.
- source_word: לַיָּעֵף
  english_pob_choice: to the weary
  chosen_spanish: al cansado
  alternatives_spanish:
  - al fatigado
  - al exhausto
  - al desfallecido
  lexicon: HALOT
  rationale: El adjetivo describe a quien está agotado o rendido. 'Cansado' es natural y claro en español contemporáneo, y conserva la idea de fatiga personal.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT
  rationale: Aquí el sustantivo apunta a capacidad o vigor personal. 'Fuerza' es la equivalencia más directa y natural en español, manteniendo el contraste con el cansancio.
- source_word: וּלְאֵין אוֹנִים
  english_pob_choice: to the one without vigor
  chosen_spanish: al que no tiene vigor
  alternatives_spanish:
  - al que no tiene fuerzas
  - al desprovisto de vigor
  - al impotente
  lexicon: HALOT
  rationale: La construcción expresa carencia de vigor o fuerza. 'Al que no tiene vigor' conserva el sentido singular implícito y evita una traducción demasiado literal que suene extraña en español.
- source_word: עָצְמָה
  english_pob_choice: might
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fuerza
  - el poder
  lexicon: HALOT
  rationale: El término añade intensidad y paralelismo poético respecto de כֹּחַ. 'Fortaleza' mantiene la idea de vigor reforzado y evita repetir exactamente 'fuerza'.
- source_word: יַרְבֶּה
  english_pob_choice: he increases
  chosen_spanish: le aumenta
  alternatives_spanish:
  - la multiplica
  - la hace abundar
  lexicon: HALOT
  rationale: El hiphil de רבה expresa hacer crecer o aumentar. En español, 'le aumenta' comunica con naturalidad el aumento otorgado por Dios y conserva el objeto implícito de fuerza/fortaleza.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: He refers to God, continuing the description from the surrounding context.
  chosen_spanish_reading: Él refiere a Dios, continuando la descripción del contexto inmediato.
  alternative_spanish_readings:
  - Dios da fuerza...
  - El Señor da fuerza...
  rationale: El hebreo no expresa sujeto en este versículo, pero el contexto inmediato identifica a Yahvé como el agente. Usar 'Él' preserva esa continuidad sin introducir una glosa más explícita que el texto no formula.
  doctrine_reference: Primacía del texto original y dependencia del contexto discursivo inmediato.
translation_notes:
  revision_awareness: El auditor inglés no introdujo cambios ni notas textuales adicionales; la traducción española sigue el mismo consenso de lectura y conserva la alternativa léxica principal mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'fuerza' para כֹּחַ y se reserva 'fortaleza' para עָצְמָה, reproduciendo el paralelismo sin empobrecerlo por repetición innecesaria.
  - Se conserva un sujeto implícito ('Él') coherente con el contexto, sin sustituirlo por un nombre divino añadido en el versículo.
  - El ritmo poético binario se preserva con dos miembros paralelos y sintaxis clara en español.
  - La nota refleja la alternativa léxica inglesa 'powerless'/'strength' sin desplazar la lectura principal del texto.
