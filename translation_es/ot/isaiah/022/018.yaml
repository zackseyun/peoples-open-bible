  to: Él te envolverá[a] con fuerza, como una pelota, a una tierra espaciosa[b]. Allí morirás, y allí estarán los carros de tu gloria[c], ¡oh vergüenza de la casa de tu señor!
  rationale: Se ajusta «hacia una tierra ancha» a «a una tierra espaciosa» para reflejar mejor el sentido de destino del hebreo y sonar más natural en español. También se mejora la nota alternativa de [a] evitando «arrollará», que en español puede sugerir atropellar o derribar, no envolver/enrollar.
