translation:
  language: es
  text: 'Los hijos de Elifaz: Temán, Omar, Zefi[b], Gatam, Quenaz, Timna[a] y Amalec.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 36:12 identifica a Timna como concubina de Elifaz y a Amalec como su hijo. Aquí Crónicas presenta ambos nombres dentro de la lista de los hijos de Elifaz.
    reason: cross_reference
  - marker: b
    text: Hebreo Zefi; Génesis 36:11 tiene la variante Zefo.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: La construcción genealógica expresa una relación de filiación en una lista de nombres; «hijos de» reproduce con naturalidad y precisión ese valor, mientras que «descendientes de» sería más general.
- source_word: אֱלִיפָז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Elifás
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio en forma reconocible en español bíblico moderno; «Elifaz» conserva la sonoridad y evita una adaptación no atestiguada por el hebreo.
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Teman
  lexicon: Nombre propio
  rationale: El nombre propio se adapta a la acentuación española manteniendo la transliteración del hebreo; el acento ayuda a la lectura en español sin alterar el valor del nombre.
- source_word: אוֹמָר
  english_pob_choice: Omar
  chosen_spanish: Omar
  lexicon: Nombre propio
  rationale: Transliteración directa del nombre propio, ya naturalizada en español.
- source_word: צְפִי
  english_pob_choice: Zephi
  chosen_spanish: Zefi
  alternatives_spanish:
  - Zefi
  - Zefi
  lexicon: HALOT
  rationale: El POB inglés refleja la forma consonántica de Crónicas frente a la variante de Génesis. En español, «Zefi» conserva la señal del hebreo צפי sin importar la forma variante de Génesis, que se deja para la nota.
- source_word: גַעְתָּם
  english_pob_choice: Gatam
  chosen_spanish: Gatam
  lexicon: Nombre propio
  rationale: Transliteración directa y estable del nombre propio.
- source_word: קְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  lexicon: Nombre propio
  rationale: En español, la grafía con qu- refleja mejor el valor /k/ ante e e i; mantiene la identidad del nombre sin depender de la convención inglesa.
- source_word: תִמְנָע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  lexicon: Nombre propio
  rationale: Se conserva la forma breve del nombre tal como aparece aquí; la acentuación no es obligatoria porque la forma es clara y ya usable en español bíblico.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: Nombre propio
  rationale: Se adapta la terminación al uso español bíblico más natural, manteniendo el nombre personal/tribal reconocible.
theological_decisions:
- issue: Relación entre Timna y Amalec en esta genealogía frente a Génesis 36
  english_pob_reading: El texto de Crónicas presenta a Timna y Amalec dentro de la lista de los hijos de Elifaz; la nota inglesa preserva la tensión con Génesis 36:12, donde Timna aparece como concubina de Elifaz y Amalec como su hijo.
  chosen_spanish_reading: El texto principal presenta a Timna y Amalec como integrantes de la lista de los hijos de Elifaz, y la nota aclara la variante en Génesis sin armonizarla en el cuerpo del versículo.
  alternative_spanish_readings:
  - 'Harmonizar el versículo con Génesis: «Timna, la concubina de Elifaz, y Amalec, su hijo»'
  - Explicar la genealogía en el texto principal
  rationale: Se sigue el hebreo de Crónicas tal como está, preservando la tensión documental en vez de resolverla por armonización; la nota permite al lector advertir el paralelo sin alterar el sentido llano del versículo.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensión textual y teológica)
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia y sin cambios del último pase: no se requirieron revisiones respecto del borrador base inglés-auditable.'
  spanish_consistency_notes:
  - Se mantiene «hijos de» para la estructura genealógica.
  - Los nombres propios se transliteran de forma consistente y readable en español.
  - Se conserva la tensión entre Crónicas y Génesis mediante nota, no por armonización en el texto principal.
  - El marcador de nota a se ubica en Temán por corresponder a la nota de cruce con Génesis; el marcador b se ubica en Zefi para la variante textual.
