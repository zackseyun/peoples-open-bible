review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé dejó a esas naciones, no las expulsó pronto y no las entregó a Josué. También preserva correctamente el nombre divino «Yahvé» y la alternativa léxica «pueblos» para גּוֹיִם. Sin embargo, «sin expulsarlas pronto» suena algo adverbialmente forzado y «en mano de Josué» queda menos natural en español que una forma con artículo, sin perder la imagen hebrea.'
  spanish_quality_summary: El texto es claro y fiel, pero requiere un ajuste menor de naturalidad y estilo bíblico legible. «rápidamente» fluye mejor que «pronto» con «expulsarlas», y «en la mano de Josué» suena más idiomático y plenamente comprensible en español eclesial sin aplanar la metáfora.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; הַגּוֹיִם הָאֵלֶּה → «estas naciones» con nota alternativa válida; no hay conflictos con otros términos doctrinales. El único ajuste recomendado es estilístico en la representación del modismo בְּיַד.'
  issues:
  - severity: medium
    issue: «sin expulsarlas pronto» es algo poco natural en español
    rationale: Aunque es comprensible y fiel, la combinación suena menos fluida que «sin expulsarlas rápidamente» o «sin expulsarlas enseguida». El hebreo מַהֵר expresa rapidez; «rápidamente» conserva bien ese valor con mejor lectura.
  - severity: low
    issue: «en mano de Josué» resulta menos idiomático que «en la mano de Josué»
    rationale: La imagen hebrea debe conservarse, pero en español general y bíblico contemporáneo el artículo mejora la naturalidad y la legibilidad. No altera el sentido de poder/control del original.
  revised_spanish_text: Así que Yahvé dejó a estas naciones[a], sin expulsarlas rápidamente, y no las entregó en la mano de Josué.
  revised_footnotes:
  - marker: a
    text: O «estos pueblos»; el hebreo puede referirse tanto a naciones como a pueblos, según el énfasis del contexto.
    reason: lexical_alternative
  revision_rationale: 'Se aplican dos mejoras menores sin cambiar el sentido: «rápidamente» expresa מַהֵר de manera más natural con «expulsarlas», y «en la mano de Josué» conserva el modismo hebreo con mejor español. El resto del borrador es fiel al texto fuente y a las decisiones léxicas del POB.'
