translation:
  language: es
  text: entonces yo les daré sus lluvias[a] a su debido tiempo, y la tierra dará su producto, y los árboles del campo darán su fruto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en su tiempo" o "en la estación debida".'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa la forma singular "árbol del campo" con fuerza colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will give
  chosen_spanish: yo les daré
  alternatives_spanish:
  - yo concederé
  - yo proporcionaré
  lexicon: HALOT
  rationale: נתן es el verbo básico 'dar'. En español, 'daré' comunica de forma directa la promesa de provisión divina. Se añade 'yo' para reforzar el sujeto explícito y 'les' para reflejar el valor beneficiario del sufijo de 2mp.
- source_word: גִשְׁמֵיכֶם
  english_pob_choice: your rains
  chosen_spanish: sus lluvias
  alternatives_spanish:
  - su lluvia
  - las lluvias para ustedes
  lexicon: HALOT
  rationale: El hebreo usa plural; 'lluvias' preserva esa pluralidad idiomática. El posesivo de tercera persona plural con valor de segunda persona en contexto bíblico se rinde naturalmente como 'sus' en español, manteniendo la referencia a Israel como destinatario.
- source_word: בְּעִתָּם
  english_pob_choice: in their season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en la estación debida
  lexicon: HALOT
  rationale: La frase expresa momento apropiado o debido. 'En su tiempo' suena natural en español y conserva la idea de lluvias dadas en el momento adecuado sin añadir precisión interpretativa más allá del hebreo.
- source_word: וְנָתְנָה הָאָרֶץ
  english_pob_choice: and the land will yield
  chosen_spanish: y la tierra dará
  alternatives_spanish:
  - y la tierra rendirá
  - y la tierra producirá
  lexicon: HALOT
  rationale: '''Dar'' conserva la repetición verbal del hebreo נתן, que el POB inglés también preserva en parte. ''Tierra'' traduce הָאָרֶץ de manera natural en contexto agrícola; ''dará'' mantiene la imagen de la tierra como agente de provisión.'
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - su producción
  - su cosecha
  lexicon: HALOT
  rationale: יבול designa el producto o rendimiento de la tierra. 'Producto' es amplio y fiel; evita restringir el sentido solo a 'cosecha' y mantiene la idea de rendimiento agrícola.
- source_word: וְעֵץ הַשָּׂדֶה
  english_pob_choice: the trees of the field
  chosen_spanish: los árboles del campo
  alternatives_spanish:
  - el árbol del campo
  - los árboles del campo abierto
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, el contexto y la revisión inglesa favorecen una lectura colectiva natural. 'Árboles del campo' fluye bien en español y refleja el alcance genérico del hebreo sin perder el singular colectivo de fondo.
- source_word: יִתֵּן פִּרְיוֹ
  english_pob_choice: will give their fruit
  chosen_spanish: darán su fruto
  alternatives_spanish:
  - producirán su fruto
  - llevarán fruto
  lexicon: HALOT
  rationale: El verbo hebreo vuelve a usar נתן, 'dar'. 'Dar su fruto' conserva la repetición léxica y sigue de cerca el patrón del versículo; en español, 'fruto' resulta más natural que una paráfrasis como 'rendimiento'.
theological_decisions:
- issue: Promesa de bendición del pacto en términos agrícolas concretos
  english_pob_reading: Render the promise straightforwardly as divine provision of rain and fertility without expanding it into a broader theological system.
  chosen_spanish_reading: Presentar la promesa como provisión divina concreta de lluvias y fertilidad agrícola, sin espiritualizarla ni convertirla en una promesa abstracta de prosperidad.
  alternative_spanish_readings:
  - Espiritualizar las lluvias y la fertilidad como abundancia simbólica
  - Generalizarla como promesa universal de prosperidad material
  rationale: El contexto de Levítico 26 es una lista de bendiciones del pacto vinculadas a la obediencia. La traducción debe conservar el sentido agrícola literal y no ampliar el alcance del texto más allá de lo que el hebreo dice.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión teológica y el contexto pactual sin resolverlos por anticipación.
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de 'the tree of the field will give its fruit' a 'the trees of the field will give their fruit' para reflejar mejor el valor colectivo. La versión española sigue esa lectura colectiva con 'los árboles del campo' y mantiene la repetición de 'dar' del hebreo.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' para el nombre divino solo cuando aparezca; este versículo no lo contiene.
  - Se mantiene el paralelismo verbal con 'daré/dará/darán' para reflejar la repetición de נתן.
  - '''Lluvias'' conserva el plural hebreo; ''su'' se usa con valor posesivo colectivo de segunda persona.'
  - La frase 'en su tiempo' queda abierta a la alternativa de 'a su debido tiempo' indicada en la nota.
