  glossary_alignment: No hay conflicto con los términos troncales del proyecto. Para אֲחֻזָּה, el inglés auditado eligió «property» con nota cultural; en español, «propiedad» se alinea mejor que «posesión» con esa decisión documentada, mientras la nota conserva el matiz de heredad/tenencia hereditaria.
