translation:
  language: es
  text: de modo que nadie pueda comprar ni vender a menos que tenga la marca, el nombre de la bestia o el número de su nombre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἵνα μή τις δύνηται
  english_pob_choice: so that no one can
  chosen_spanish: de modo que nadie pueda
  alternatives_spanish:
  - para que nadie pueda
  - así que nadie puede
  lexicon: BDAG
  rationale: ἵνα μή expresa propósito o resultado negativo. En español, «de modo que» + subjuntivo conserva esa relación final/resultativa sin sonar forzado; «nadie pueda» refleja la posibilidad/capacidad de δύνηται y el sujeto indefinido μή τις.
- source_word: ἀγοράσαι ἢ πωλῆσαι
  english_pob_choice: buy or sell
  chosen_spanish: comprar ni vender
  alternatives_spanish:
  - comprar o vender
  - hacer compras ni ventas
  lexicon: BDAG
  rationale: Los infinitivos coordinados describen actividad comercial común. En español, con la negación previa, «ni vender» reproduce con naturalidad la coordinación negativa implícita y mantiene la restricción económica del pasaje.
- source_word: εἰ μὴ
  english_pob_choice: unless
  chosen_spanish: sino el que
  alternatives_spanish:
  - a menos que
  - excepto el que
  lexicon: BDAG
  rationale: Aquí εἰ μὴ introduce la única excepción a la prohibición. Después de una negación, «sino» comunica con claridad la exclusión exceptiva, y «el que» da continuación natural al participio sustantivado siguiente.
- source_word: ὁ ἔχων
  english_pob_choice: he has
  chosen_spanish: el que tiene
  alternatives_spanish:
  - el que posea
  - quien tenga
  lexicon: BDAG
  rationale: 'El participio articular funciona sustantivamente: «el que tiene». Esta forma conserva el valor genérico sin imponer una marcada masculinidad en español donde la construcción natural ya es inclusiva.'
- source_word: τὸ χάραγμα
  english_pob_choice: the mark
  chosen_spanish: la marca
  alternatives_spanish:
  - el sello
  - la señal
  lexicon: BDAG
  rationale: χάραγμα denota una marca, sello o señal impresa. «La marca» es la equivalencia más transparente y ya establecida en este contexto apocalíptico.
- source_word: τὸ ὄνομα τοῦ θηρίου
  english_pob_choice: the name of the beast
  chosen_spanish: el nombre de la bestia
  alternatives_spanish:
  - el nombre de la fiera
  - el nombre del monstruo
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de manera directa. «Bestia» es el equivalente técnico y simbólico para θηρίον en Apocalipsis.
- source_word: τὸν ἀριθμὸν τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: the number of its name
  chosen_spanish: o el número de su nombre
  alternatives_spanish:
  - o el número del nombre de ella
  - o el número de su nombre [de él]
  lexicon: BDAG
  rationale: La secuencia griega presenta una alternativa adicional con ἤ; por eso se traduce «o». El pronombre «su» refleja de forma natural la relación posesiva con «bestia» sin forzar una decisión de género que el español aquí no exige de manera inequívoca. Se preserva la ambigüedad de referencia presente en el griego y señalada en el audit trail inglés.
theological_decisions:
- issue: Naturaleza de la restricción económica impuesta por la marca
  english_pob_reading: no one can buy or sell unless he has the mark
  chosen_spanish_reading: nadie pueda comprar ni vender, sino el que tiene la marca
  alternative_spanish_readings:
  - nadie puede comprar o vender si no tiene la marca
  - nadie pueda comprar o vender, a menos que tenga la marca
  rationale: La cláusula expresa una prohibición universal con excepción exclusiva. «Sino el que tiene la marca» mantiene la fuerza restrictiva del texto sin suavizarla ni reinterpretarla; además conserva el ritmo lógico de la secuencia griega.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
- issue: Referencia del pronombre posesivo αὐτοῦ
  english_pob_reading: the number of its name
  chosen_spanish_reading: el número de su nombre
  alternative_spanish_readings:
  - el número de su nombre [de la bestia]
  - el número de su nombre [de él]
  rationale: El antecedente inmediato es θηρίου, un sustantivo neutro griego. En español, «su» evita una personalización obligatoria y permite una referencia gramaticalmente natural. A la vez, no cierra la lectura personalizante que el contexto apocalíptico puede sugerir.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para usar coma en lugar de raya antes de la serie final; la redacción española evita igualmente una apposición fuerte y conserva la enumeración simple del griego. También se atendió la nota inglesa sobre el participio articular y la posible ambigüedad de αὐτοῦ, manteniendo una forma española natural y auditable.
  spanish_consistency_notes:
  - Se usó «marca» para χάραγμα en coherencia con el uso POB documentado.
  - Se mantuvo «bestia» para θηρίον como término técnico apocalíptico.
  - Se empleó «el que tiene» en lugar de una forma más literal y pesada como «el poseedor», por naturalidad y fidelidad funcional.
  - La secuencia final se presentó con comas implícitas en la coordinación, sin introducir una apposición adicional que el griego no exige.
