translation:
  language: es
  text: 'La palabra de Yahvé que vino a Sofonías, hijo de Cusí[a], hijo de Gedalías, hijo de Amarías, hijo de Ezequías[b], en los días de Josías, hijo de Amón, rey de Judá:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cusí también puede entenderse como «cusita», pero aquí se mantiene como nombre personal dentro de la genealogía.
    reason: lexical_alternative
  - marker: b
    text: Ezequías puede referirse al rey Ezequías, lo que haría de Sofonías un descendiente de la casa real, pero el texto no lo identifica explícitamente como el rey.
    reason: cross_reference
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר־יְהוָה, «palabra» conserva el registro técnico y el paralelismo con la tradición profética sin volver la frase rígidamente arcaica. «Mensaje» sería posible, pero suaviza la fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, en vez de sustituirlo por un título como «SEÑOR».
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que llegó a
  - que fue dirigida a
  lexicon: HALOT
  rationale: La cláusula profética se expresa de modo natural en español como «que vino a», manteniendo el sentido de un mensaje revelado dirigido a un profeta.
- source_word: צְפַנְיָה
  english_pob_choice: Zephaniah
  chosen_spanish: Sofonías
  alternatives_spanish:
  - Zephanías
  lexicon: convención bíblica española
  rationale: En español bíblico la forma establecida es «Sofonías»; se usa la convención onomástica española más reconocible para el lector hispanohablante.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La genealogía repite el marcador filial de manera directa; «hijo de» conserva la relación formal del hebreo sin sobreinterpretar la línea genealógica.
- source_word: כּוּשִׁי
  english_pob_choice: Cushi
  chosen_spanish: Cusí
  alternatives_spanish:
  - Cushí
  - Cushita
  lexicon: HALOT
  rationale: Se mantiene como nombre propio dentro de la genealogía. «Cusí» respeta la función onomástica mejor que «Cushita», que podría sugerir una designación étnica en el texto principal.
- source_word: גְּדַלְיָה
  english_pob_choice: Gedaliah
  chosen_spanish: Gedalías
  alternatives_spanish:
  - Guedalías
  lexicon: convención bíblica española
  rationale: Se sigue la forma española habitual del nombre propio.
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amarías
  lexicon: convención bíblica española
  rationale: Se sigue la forma española habitual del nombre propio.
- source_word: חִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jezecías
  lexicon: convención bíblica española
  rationale: Se usa la forma española establecida del nombre. La posible referencia al rey Ezequías se reserva para nota, porque el hebreo solo da el nombre.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  - en tiempos de
  lexicon: HALOT
  rationale: La expresión temporal se traduce de manera bastante literal para conservar la fórmula histórica y profética del hebreo.
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josías
  lexicon: convención bíblica española
  rationale: Se adopta la forma española tradicional del nombre del rey.
- source_word: אָמֹון
  english_pob_choice: Amon
  chosen_spanish: Amón
  alternatives_spanish:
  - Amon
  lexicon: convención bíblica española
  rationale: Se sigue la acentuación habitual en español para el nombre propio del rey.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La relación apposicional se conserva con la fórmula natural en español «rey de Judá».
theological_decisions:
- issue: Posible identificación de Ezequías con el rey Ezequías
  english_pob_reading: Retain the name simply as 'Hezekiah' without adding 'King' or otherwise identifying him in the main text.
  chosen_spanish_reading: Conservar «Ezequías» sin añadir «rey» ni explicitar el linaje real en el texto principal.
  alternative_spanish_readings:
  - Ezequías, el rey
  - Ezequías, posiblemente el rey Ezequías
  rationale: El hebreo nombra a Ezequías, pero no lo identifica explícitamente como rey. Para no introducir una conclusión histórica no dicha por el texto, la traducción principal mantiene el nombre desnudo y deja la posibilidad en nota.
  doctrine_reference: Primacía del texto fuente sobre inferencias históricas no explícitas; evitar expandir el sentido más allá del hebreo.
translation_notes:
  revision_awareness: 'Coincide con el expediente inglés revisado: no se introdujeron cambios sustantivos; se conservaron la lectura genealógica sobria, la forma del nombre divino y la nota sobre la posible referencia a Ezequías. La traducción española ajusta las convenciones onomásticas al uso bíblico hispano sin alterar las decisiones léxicas auditadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «Sofonías» como forma española del nombre propio, mientras se preserva la estructura genealógica literal.
  - «Cusí» se trata como nombre propio en el texto principal; la alternativa étnica queda reservada para nota.
  - No se añadió «rey» a Ezequías en el texto principal, en coherencia con el expediente inglés y con el hebreo.
  - La puntuación final con dos puntos reproduce el cierre de encabezamiento profético.
