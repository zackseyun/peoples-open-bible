translation:
  language: es
  text: Sus aguas rugen y espumean; las montañas se estremecen ante su crecida[a]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante su hinchazón», «ante su soberbia» o «ante su surgir impetuoso». El sustantivo hebreo puede transmitir exaltación, orgullo o aumento/hinchazón; aquí se prefiere la imagen física del agua que sube.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶהֱמ֣וּ
  english_pob_choice: roar
  chosen_spanish: rugen
  alternatives_spanish:
  - braman
  - rujen
  - retumban
  lexicon: HALOT
  rationale: El verbo hebreo expresa rumor tumultuoso y sonoro. En español, «rugen» comunica bien la fuerza acústica del agua agitada y mantiene el carácter vívido de la imagen, sin volverla excesivamente interpretativa.
- source_word: יֶחְמְר֣וּ
  english_pob_choice: foam
  chosen_spanish: espumean
  alternatives_spanish:
  - hacen espuma
  - borbotean
  - se agitan
  lexicon: HALOT
  rationale: El contexto es de aguas turbulentas; «espumean» reproduce de manera natural la idea de chocar y formar espuma. Conserva la coordinación poética con «rugen» y evita un giro demasiado explicativo.
- source_word: מֵימָ֑י/ו
  english_pob_choice: its waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - sus aguas
  - el agua de él/ello
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa naturalmente como «sus», manteniendo la relación posesiva sin forzar un referente personal en español. «Aguas» conserva la pluralidad poética del hebreo.
- source_word: יִֽרְעֲשֽׁוּ
  english_pob_choice: quake
  chosen_spanish: tiemblan
  alternatives_spanish:
  - sacuden
  - se estremecen
  - retumban
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir sacudida sísmica, en español «tiemblan» comunica con claridad el efecto sobre las montañas. Se evita «quebrantan» o un término más técnico, porque el cuadro poético es de vibración visible.
- source_word: הָרִ֖ים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - montes
  - los montes
  - las sierras
  lexicon: HALOT
  rationale: Se conserva el artículo definido y el sustantivo plural natural en español. «Montañas» es claro y solemne, y no altera la referencia poética a los grandes relieves del paisaje.
- source_word: בְּ/גַאֲוָת֣/וֹ
  english_pob_choice: at its swelling
  chosen_spanish: ante su oleaje
  alternatives_spanish:
  - ante su hinchazón
  - ante su crecida
  - a causa de su pujanza
  - ante su soberbia
  lexicon: HALOT
  rationale: El hebreo admite sentidos como exaltación, orgullo o hinchazón/oleaje. En este contexto acuático, «oleaje» preserva la imagen física del agua en aumento sin imponer la lectura moral de «orgullo». La preposición «ante» expresa adecuadamente el impacto de ese movimiento sobre las montañas.
- source_word: סֶֽלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque su función exacta sigue siendo incierta y una traducción cerrada sería más especulativa de lo que permite el texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la imaginería sonora y acuática, mantiene el carácter poético de la línea y resuelve la ambigüedad de גאוה en favor de una imagen física coherente con las aguas agitadas.'
  spanish_consistency_notes:
  - Se usó «Sus aguas» para reflejar el posesivo del hebreo de forma natural en español.
  - Se prefirió «espumean» para emparejar el campo semántico acuático con «rugen».
  - «Selah» se deja transliterado por la misma razón de incertidumbre funcional que en el POB inglés.
  - La nota al pie preserva la tensión semántica de גאוה sin borrar la posibilidad de lectura como orgullo/exaltación.
