translation:
  language: es
  text: Dejen a los simples[a], y vivan; y anden por el camino del entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Dejen a los simples». En el contexto sapiencial, la exhortación puede referirse a dejar atrás la simpleza o la compañía/condición de los simples; por eso el español conserva el objeto humano directo del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִזְבוּ
  english_pob_choice: Leave
  chosen_spanish: Deja
  alternatives_spanish:
  - Abandona
  - Déjalos
  - Dejad
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa y decisiva. «Deja» mantiene la fuerza del mandato en un español moderno y sobrio, sin el tono más duro o arcaizante de «abandona».
- source_word: פְתָאִים
  english_pob_choice: the simple
  chosen_spanish: a los simples
  alternatives_spanish:
  - a los ingenuos
  - a los sencillos
  - a la simpleza
  lexicon: HALOT
  rationale: El hebreo nombra literalmente a «los simples/ingenuos». Siguiendo la revisión inglesa, se conserva el referente humano directo en español para no añadir «caminos» que el texto no dice. «Simples» mantiene la ambigüedad moral/intelectual propia del término sapiencial.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vive
  alternatives_spanish:
  - para que vivas
  - y vivirás
  lexicon: HALOT
  rationale: Se conserva el imperativo coordinado del hebreo. «Y vive» reproduce la concisión poética y la relación inmediata entre apartarse de los simples y vivir.
- source_word: וְאִשְׁרוּ
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - procede
  - avanza
  lexicon: HALOT
  rationale: El verbo puede expresar ir rectamente o avanzar por un camino; en español, «anda» es natural con «por el camino» y preserva la imagen de conducta continua.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - en la senda
  - por la senda
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora sapiencial de modo de vida o conducta. «Por» expresa mejor el movimiento dentro de esa vía que un simple «en».
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: de la inteligencia
  alternatives_spanish:
  - del entendimiento
  - de la comprensión
  - del discernimiento
  lexicon: HALOT
  rationale: En Proverbios, בינה denota discernimiento inteligente y capacidad de comprender rectamente. «Inteligencia» es una opción válida en español que mantiene el matiz de entendimiento práctico y sapiencial sin sonar demasiado técnico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la revisión inglesa más reciente, que prefirió un objeto directo humano («the simple») frente a añadir «ways». También preserva la segunda exhortación coordinada con «y» antes de «anda», reflejando el paralelismo verbal del original.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita de κύριος.
  - Se eligió «simples» para mantener la tensión entre ingenuidad e inmadurez sapiencial sin moralizar de más el término.
  - «Inteligencia» se usa aquí como equivalente natural de בינה en lenguaje sapiencial, coherente con el registro bíblico en español.
  - Se conservó el paralelismo de dos imperativos y la breve cadencia poética del hebreo.
