    text: Literalmente, «escucha la voz de tu sierva»; es un modismo hebreo que significa «haz caso a tu sierva» o «escucha lo que dice tu sierva».
    reason: lexical_alternative
  - marker: b
    text: 'O: «criada». El hebreo usa específicamente un término femenino para «sierva».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un bocado de pan».'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el sentido del hebreo, pero se ajusta la redacción a un español más natural («permíteme poner») y se rehacen las notas para alinearlas con las decisiones léxicas significativas ya auditadas en inglés: el modismo «escuchar la voz de», el sustantivo femenino «sierva», y la alternativa «bocado» para פַּת לֶחֶם. Se eliminan notas menos necesarias para evitar dispersión y reflejar mejor el expediente de traducción.'
