translation:
  language: es
  text: 'Digan a Dios: «¡Qué asombrosas son tus obras! Por la grandeza de tu fuerza, tus enemigos se someten[b] ante ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'También puede entenderse: «se someten fingidamente ante ti» o «ceden de mala gana ante ti». El verbo hebreo puede denotar una sumisión engañosa o forzada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Digan ustedes
  - Hablen
  lexicon: HALOT
  rationale: El imperativo plural pide una convocatoria comunitaria. «Digan» conserva la fuerza directa de hablar a Dios en un registro natural y reverente del español.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: HALOT
  rationale: La preposición marca destinatario del mandato. «A Dios» es la equivalencia más directa y clara en español.
- source_word: מַה נּוֹרָא
  english_pob_choice: How awesome
  chosen_spanish: ¡Qué asombrosas
  alternatives_spanish:
  - ¡Qué temibles
  - ¡Qué terribles
  lexicon: HALOT
  rationale: La exclamación expresa admiración reverente. «Asombrosas» comunica bien la idea de reverencia y maravilla sin perder el trasfondo de temor sagrado que puede tener נּוֹרָא.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus acciones
  lexicon: HALOT
  rationale: «Obras» conserva el lenguaje poético habitual de los Salmos y corresponde al plural de acción/obrar del hebreo.
- source_word: בְּרֹב עֻזְּךָ
  english_pob_choice: Because of the greatness of your strength
  chosen_spanish: Por la grandeza de tu fuerza
  alternatives_spanish:
  - Por la abundancia de tu fuerza
  - A causa de la grandeza de tu poder
  lexicon: HALOT
  rationale: La construcción con בְּ aquí expresa base o causa. «Por la grandeza de tu fuerza» mantiene el sentido causal y la intensificación de רֹב + עֹז.
- source_word: יְכַחֲשׁוּ לְךָ
  english_pob_choice: cringe before you
  chosen_spanish: se encogen delante de ti
  alternatives_spanish:
  - se humillan delante de ti
  - se rinden delante de ti
  lexicon: HALOT
  rationale: El piel de כחש puede implicar sumisión forzada, fingida o humillante. «Se encogen delante de ti» preserva esa tensión de sometimiento coaccionado sin suavizarla en una obediencia sincera.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  lexicon: HALOT
  rationale: Es la equivalencia directa normal para אויב en plural con sufijo de segunda persona masculina singular.
theological_decisions:
- issue: Naturaleza de la respuesta de los enemigos a Dios
  english_pob_reading: The verse describes compelled, insincere submission rather than sincere worship.
  chosen_spanish_reading: El versículo describe un sometimiento forzado y humillante, no una adoración sincera.
  alternative_spanish_readings:
  - El versículo solo dice que los enemigos se someten.
  - El versículo describe una rendición general sin matizar su sinceridad.
  rationale: El hebreo יְכַחֲשׁוּ con ל puede incluir la idea de sumisión fingida o arrancada por la presión. En español conviene mantener esa tensión sin resolverla hacia una obediencia interior que el texto no afirma.
  doctrine_reference: Preservar la tensión léxica y teológica del verbo hebreo כחש en contexto poético.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «cringe before you» sobre una formulación más explícita de acercamiento, y la reproduce en español con un giro natural que conserva la idea de sumisión forzada.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al criterio del proyecto.
  - Se conserva un tono poético y reverente, evitando arcaísmos innecesarios.
  - Se preserva la ambigüedad léxica de יְכַחֲשׁוּ en una nota, sin sobreinterpretar el verso.
