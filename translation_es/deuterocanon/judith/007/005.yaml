- from: Y cada uno tomó sus armas de guerra, y después de encender fuegos sobre sus torres, permanecieron en guardia toda aquella noche.
  to: Y cada uno tomó sus armas de guerra, y después de encender hogueras en sus torres, se quedaron en guardia toda aquella noche.
  rationale: 'Se corrigió la discordancia de número mediante una reformulación verbal plural natural tras el distributivo inicial, y se mejoró la idiomaticidad de dos expresiones contextuales: ''hogueras'' para πυράς y ''en sus torres'' para el emplazamiento defensivo. La revisión conserva el sentido, la secuencia y la fuerza militar del griego y del POB en inglés.'
