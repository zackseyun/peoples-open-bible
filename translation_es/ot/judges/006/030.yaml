translation:
  language: es
  text: 'Entonces los hombres de la ciudad dijeron a Joás: «Saca a tu hijo, para que muera, porque ha derribado el altar de Baal y ha cortado la Aserá[a] que estaba junto a él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el poste de Aserá». El término hebreo puede referirse al objeto de culto asociado con Aserá; aquí el contexto favorece el objeto más que la diosa misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - la gente de la ciudad
  - los ciudadanos de la ciudad
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». En español, «los hombres de la ciudad» preserva el masculino plural y la referencia a los actores cívicos, sin neutralizar indebidamente el término.
- source_word: הוֹצֵא
  english_pob_choice: Bring out
  chosen_spanish: Saca
  alternatives_spanish:
  - Trae afuera
  - Haz salir
  lexicon: HALOT
  rationale: El imperativo causativo pide hacer salir a la persona. «Saca» es natural, directo y fiel al valor verbal sin añadir matices judiciales.
- source_word: וְיָמֹת
  english_pob_choice: that he may die
  chosen_spanish: para que muera
  alternatives_spanish:
  - y que muera
  - para que sea muerto
  lexicon: HALOT
  rationale: La forma expresa el resultado deseado de la orden. «Para que muera» conserva la fuerza final sin introducir explícitamente una fórmula legal que el hebreo no dice.
- source_word: נָתַץ
  english_pob_choice: has torn down
  chosen_spanish: ha derribado
  alternatives_spanish:
  - ha demolido
  - ha tumbado
  lexicon: HALOT
  rationale: Para un altar, «derribado» comunica bien el acto de desmantelar o echar abajo una estructura y suena más natural en español bíblico contemporáneo que una calca rígida.
- source_word: מִזְבַּח הַבַּעַל
  english_pob_choice: the altar of Baal
  chosen_spanish: el altar de Baal
  alternatives_spanish:
  - el altar de Baal
  - el altar perteneciente a Baal
  lexicon: HALOT
  rationale: La construcción de genitivo se expresa de manera transparente en español con «de Baal».
- source_word: כָרַת
  english_pob_choice: cut down
  chosen_spanish: ha cortado
  alternatives_spanish:
  - ha talado
  - ha derribado
  lexicon: HALOT
  rationale: Para un objeto/culto arbóreo o equivalente, «cortado» reproduce bien el verbo hebreo sin precisar más de lo que el contexto exige.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Aserá
  alternatives_spanish:
  - el poste de Aserá
  - la Aserá (objeto de culto)
  lexicon: HALOT
  rationale: Se conserva el término hebreo transcrito para no decidir de antemano entre la deidad y el objeto de culto. En este contexto, el gesto de «cortar» favorece el referente cultual, pero la traducción mantiene la tensión lexical.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that was beside it
  chosen_spanish: que estaba junto a él
  alternatives_spanish:
  - que estaba sobre él
  - que estaba al lado de él
  lexicon: HALOT
  rationale: El hebreo admite relación espacial amplia. «Junto a él» comunica la asociación probable con el altar sin forzar una ubicación literal sobre la estructura.
theological_decisions:
- issue: Referencia de הָאֲשֵׁרָה
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Aserá
  alternative_spanish_readings:
  - el poste de Aserá
  - la diosa Aserá
  rationale: La POB inglesa preserva el término «Asherah» y añade una nota para la posible lectura como objeto cultual. En español, «Aserá» mantiene esa misma reserva interpretativa. No se traduce como «poste» en el texto principal para no cerrar prematuramente el sentido del hebreo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de וְיָמֹת
  english_pob_reading: that he may die
  chosen_spanish_reading: para que muera
  alternative_spanish_readings:
  - que muera
  - para que sea muerto
  rationale: La petición de muerte se mantiene como resultado exigido de la orden. «Para que muera» refleja la sintaxis final sin sobreespecificar el modo jurídico de la muerte.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la versión inglesa POB más reciente, que ajustó «so that he may die» a «that he may die». En español se optó por «para que muera», equivalente natural que conserva la fuerza final de la petición. También se mantuvo la cautela léxica de la POB respecto de הָאֲשֵׁרָה mediante la transcripción «Aserá» y una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «Baal» como nombre propio convencional, sin traducir.
  - La combinación de verbos en perfecto («ha derribado», «ha cortado») sigue el valor narrativo hebreo, coherente con el estilo del POB en narración histórica.
