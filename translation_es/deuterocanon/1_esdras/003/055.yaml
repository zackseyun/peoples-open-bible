translation:
  language: es
  text: ¡Oh hombres[a], cómo no son fuertes las mujeres, que hacen tales cosas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «varones». El vocativo griego es masculino plural y conserva un tono de exhortación directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  english_pob_choice: O men
  chosen_spanish: ¡Oh hombres!
  alternatives_spanish:
  - Hombres
  - Varones
  - Caballeros
  lexicon: LSJ
  rationale: El vocativo plural requiere una interpelación directa. «¡Oh hombres!» conserva el tono exclamativo y la dirección retórica mejor que una simple forma nominal.
- source_word: πῶς οὐκ
  english_pob_choice: how are ... not
  chosen_spanish: cómo no son
  alternatives_spanish:
  - cómo pueden no ser
  - por qué no son
  lexicon: LSJ
  rationale: La pregunta es retórica y expresa asombro. «Cómo no son» mantiene el valor interrogativo sin añadir una fuerza modal que el griego no exige aquí.
- source_word: ἰσχυραὶ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - fuertes de carácter
  - poderosas
  - valientes
  lexicon: LSJ
  rationale: «Fuertes» es la equivalencia más directa y natural en español para el adjetivo físico/general ἰσχυραί. «Poderosas» sería más interpretativa.
- source_word: αἱ γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: LSJ
  rationale: El plural es genérico y se refiere a mujeres en general, no específicamente a esposas.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: LSJ
  rationale: En esta frase introduce la base de la pregunta retórica. «Que» refleja bien el vínculo sintáctico sin cargarlo con una causalidad más fuerte.
- source_word: οὕτως πράσσουσιν
  english_pob_choice: they do such things
  chosen_spanish: hacen tales cosas
  alternatives_spanish:
  - actúan así
  - realizan estas cosas
  lexicon: LSJ
  rationale: «Πράσσω» aquí apunta a su conducta o acciones. «Hacen tales cosas» conserva la amplitud del verbo y su referencia a los ejemplos previos sin estrechar demasiado el sentido.
translation_notes:
  revision_awareness: La base inglesa del POB fue revisada de «since» a «that» para ὅτι, y el español sigue esa decisión con «que», evitando una causalidad más explícita de «porque/pues».
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, evitando calcos innecesarios pero conservando la pregunta retórica del griego.
  - No se usa «SEÑOR» ni terminología ajena al versículo; la traducción permanece estrictamente textual.
  - «Fuertes» se eligió por su transparencia semántica y por corresponder al adjetivo griego sin sobreinterpretación.
