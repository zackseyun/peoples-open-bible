  to: Sus camellos serán botín, y la abundancia de su ganado, despojo. Yo los esparciré a todo viento, a los que se cortan los bordes del cabello[a], y desde todos los lados haré venir sobre ellos su calamidad[b], declara Yahvé.
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a קְצוּצֵי פֵאָה y no a «botín». También se cambió «las puntas del cabello» por «los bordes del cabello», que representa mejor פֵאָה. Finalmente, se reordenó ligeramente la cláusula final a «haré venir sobre ellos su calamidad» para un español más natural conservando el sentido fuente.
