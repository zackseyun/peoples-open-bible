translation:
  language: es
  text: Instrucción de entendimiento y maestría de expresión[a], por Shimon hijo de Yeshúa, hijo de Eleazar hijo de Sira, la cual brotó en la interpretación de su corazón[b], y la cual expresó con entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maestría de expresión» refleja una frase hebrea difícil (מוֹשֵׁל אוֹפַנִּים). Puede aludir a habilidad en la expresión ordenada o en la composición; el matiz exacto no es seguro.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de esta cláusula final es incierto en el testimonio de la Geniza. El paralelo griego dice: «quien derramó sabiduría desde su corazón»; esa lectura guía el sentido general, aunque aquí se conserva una formulación más cercana a la solución auditada que preserva ambas cláusulas hebreas difíciles.'
    reason: textual_variant
lexical_decisions:
- source_word: מוּסַר
  english_pob_choice: Instruction
  chosen_spanish: Instrucción
  alternatives_spanish:
  - Disciplina
  - Enseñanza
  lexicon: HALOT
  rationale: En el encabezado colofónico de Sirácida, el sustantivo funciona como presentación del contenido didáctico; «Instrucción» conserva la fuerza formativa sin volverlo más áspero de lo necesario.
- source_word: שֵׂכֶל
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: HALOT
  rationale: «Entendimiento» mantiene el campo semántico de capacidad intelectual/práctica y suena natural junto a «instrucción» en español.
- source_word: וּמוֹשֵׁל אוֹפַנִּים
  english_pob_choice: mastery of expression
  chosen_spanish: maestría de expresión
  alternatives_spanish:
  - dominio de los giros
  - gobierno de las formas
  - arte de la expresión
  lexicon: HALOT
  rationale: La frase hebrea es difícil y el inglés auditado opta por una solución que apunta a habilidad verbal ordenada. «Maestría de expresión» comunica ese valor sin cerrar indebidamente la ambigüedad del original.
- source_word: לְשִׁמְעוֹן
  english_pob_choice: by Shimon
  chosen_spanish: por Shimon
  alternatives_spanish:
  - de Shimon
  - atribuido a Shimon
  lexicon: HALOT
  rationale: En una fórmula de autoría/colofón, «por» expresa atribución de manera clara y breve en español.
- source_word: נִיבַּע
  english_pob_choice: bubbled up
  chosen_spanish: brotó
  alternatives_spanish:
  - manó
  - surgió
  - fluyó
  lexicon: HALOT
  rationale: El verbo hebreo sugiere emergencia abundante o espontánea de habla; «brotó» conserva la imagen de algo que surge desde dentro.
- source_word: בִּפְתוֹר לְבָן
  english_pob_choice: in the interpretation of his heart
  chosen_spanish: desde la interpretación de su corazón
  alternatives_spanish:
  - en la interpretación de su corazón
  - desde la comprensión de su corazón
  lexicon: HALOT
  rationale: El hebreo es textual y semánticamente difícil; siguiendo el control del griego, la idea se conserva como procedencia interior. «Interpretación» refleja el sustantivo ya presente en el inglés auditado y evita una paráfrasis más libre.
- source_word: הִבִּיעַ
  english_pob_choice: uttered
  chosen_spanish: expresó
  alternatives_spanish:
  - pronunció
  - manifestó
  - dijo
  lexicon: HALOT
  rationale: El verbo indica sacar a la luz o dar voz a algo. «Expresó» funciona bien en español para un enunciado sapiencial y retiene la noción de exteriorización deliberada.
- source_word: בִּתְבוּנוֹת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimientos
  - discernimientos
  - comprensiones
  lexicon: HALOT
  rationale: Aunque la forma hebrea apunta literalmente a «entendimientos/insights», el paralelo griego trae σοφίαν. «Sabiduría» recoge mejor la auto-descripción literaria del libro y el control griego, sin borrar la tensión textual.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa, que corrigió una adición no sustentada y restauró las dos cláusulas finales. Por eso el español mantiene ambas: una de surgimiento interior («brotó») y otra de exteriorización verbal («expresó»), sin reducirlas a una sola idea.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se usa «sabiduría» para la última cláusula conforme al paralelo griego y a la revisión inglesa, en vez de una traducción más literal pero menos controlada como «entendimientos».
  - El nombre propio se deja como Shimon/Yeshúa/Eleazar/Sira, siguiendo la forma del paquete de fuente y la transliteración estable del material de trabajo.
  - Se prefirió una sintaxis española fluida pero cercana al orden y a las imágenes del texto fuente, evitando paraphrasear el colofón.
