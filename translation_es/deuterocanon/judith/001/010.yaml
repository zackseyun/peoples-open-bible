translation:
  language: es
  text: hasta Tanis y Menfis[a], y todos los que habitan Egipto, hasta los límites de Etiopía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego repite literalmente una construcción de límite espacial antes de ambos topónimos; en español se suaviza con una sola formulación de extensión («hasta»), sin perder el sentido de frontera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως τοῦ ἐλθεῖν
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta el llegar a
  - tan lejos como
  - hasta la llegada a
  lexicon: LSJ
  rationale: La construcción griega marca límite espacial, no tiempo; en español, «hasta» comunica de forma natural ese alcance geográfico sin añadir una paráfrasis pesada.
- source_word: ἐπάνω
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  - arriba a
  lexicon: LSJ
  rationale: Con nombres de lugar, la función idiomática es indicar movimiento o extensión hacia un punto; «hasta» mantiene el valor de límite que el audit trail inglés preserva.
- source_word: Τάνεως
  english_pob_choice: Tanis
  chosen_spanish: Tanis
  alternatives_spanish:
  - Taneos
  lexicon: LSJ
  rationale: Se conserva la forma toponímica estándar en español, coincidente con la transliteración inglesa habitual.
- source_word: Μέμφεως
  english_pob_choice: Memphis
  chosen_spanish: Menfis
  alternatives_spanish:
  - Memfis
  lexicon: LSJ
  rationale: «Menfis» es la forma asentada en español para la ciudad egipcia; mantiene la referencia geográfica del griego con naturalidad léxica.
- source_word: κατοικοῦντας
  english_pob_choice: inhabiting
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los habitantes de
  - los que viven en
  - los que moran en
  lexicon: LSJ
  rationale: El participio describe a quienes residen en Egipto; «los que habitan» conserva el matiz descriptivo de la enumeración geográfica sin volverlo demasiado abstracto.
- source_word: τὴν Αἴγυπτον
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: LSJ
  rationale: El objeto directo se traduce naturalmente con el nombre del país. «La tierra de Egipto» sería posible, pero no necesaria para reflejar el griego.
- source_word: ἐπὶ τὰ ὅρια
  english_pob_choice: to the borders of
  chosen_spanish: hasta los límites de
  alternatives_spanish:
  - hasta las fronteras de
  - hasta los confines de
  lexicon: LSJ
  rationale: ὅρια designa límites territoriales; «límites» reproduce el sentido de frontera geográfica y suena más neutral que opciones más marcadas.
- source_word: Αἰθιοπίας
  english_pob_choice: Ethiopia
  chosen_spanish: Etiopía
  alternatives_spanish:
  - Aitiopía
  - Cus
  lexicon: LSJ
  rationale: Se mantiene el nombre propio geográfico en su forma española estándar. Aunque el referente antiguo puede solaparse con otras designaciones, el texto griego nombra directamente a Etiopía.
translation_notes:
  revision_awareness: El texto inglés revisado eliminó una repetición incómoda de «the approach to» y dejó el sentido de extensión espacial como «as far as». La versión española sigue esa misma decisión de fluidez controlada, conservando todos los elementos geográficos del griego.
  spanish_consistency_notes:
  - Se mantiene el registro geográfico formal y conciso.
  - No se introduce terminología eclesiástica ni interpretativa ajena al texto.
  - Se preserva la secuencia de lugares y habitantes como en el griego y el audit trail inglés.
