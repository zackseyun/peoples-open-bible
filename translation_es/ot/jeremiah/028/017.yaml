translation:
  language: es
  text: Y murió Hananías el profeta en aquel año[a], en el séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «en ese año».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - entonces murió
  lexicon: HALOT
  rationale: El verbo hebreo expresa muerte en narración simple; en español, 'murió' comunica con naturalidad el valor del wayyiqtol, y la conjunción inicial ya queda representada en el flujo de la oración.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Ananías
  lexicon: Transliteración bíblica tradicional en español
  rationale: Es un nombre propio; se mantiene transcrito al español como Hananías para una lectura eclesial y reconocible, sin traducirlo ni interpretarlo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el falso profeta
  lexicon: HALOT
  rationale: El hebreo usa el título neutral נָבִיא. Aunque el contexto mayor lo juzga, este versículo no añade un modificador negativo, por lo que se conserva 'el profeta'.
- source_word: בַּשָּׁנָה הַהִיא
  english_pob_choice: in that year
  chosen_spanish: en aquel año
  alternatives_spanish:
  - en ese año
  - en aquel mismo año
  lexicon: HALOT
  rationale: '''Aquel año'' expresa bien la referencia anafórica sin intensificarla a ''mismo'', ya que el texto fuente dice simplemente ''en ese año''.'
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: HALOT
  rationale: La frase preposicional se rinde de forma directa y natural en español con 'en el séptimo mes'.
theological_decisions:
- issue: Si traducir el título de Hananías como una afirmación explícita de falsedad
  english_pob_reading: Retain 'the prophet'
  chosen_spanish_reading: Conservar 'el profeta'
  alternative_spanish_readings:
  - el falso profeta
  - el profeta mentiroso
  rationale: El verso no introduce un calificativo peyorativo; añadirlo sería importar una conclusión contextual que el hebreo de esta cláusula no formula. Se preserva la precisión narrativa y teológica.
  doctrine_reference: 'Principio de fidelidad textual: no añadir juicios interpretativos que el versículo no expresa.'
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'same' porque el hebreo dice solo 'en ese año'. La versión española evita igualmente 'mismo' y usa 'aquel año' para mantener la referencia anafórica sin sobretraducir.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma española bíblica: Hananías.'
  - '''El profeta'' conserva el título hebreo sin intensificarlo a ''falso profeta''.'
  - 'La secuencia temporal sigue el orden del hebreo: muerte, año, mes.'
  - Se evita la convención de ocultar el nombre divino porque no aparece en este versículo.
