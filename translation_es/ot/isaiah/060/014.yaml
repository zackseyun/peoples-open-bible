translation:
  language: es
  text: Los hijos de los que te afligieron vendrán ante ti inclinados[a], y todos los que te despreciaron se inclinarán a las plantas de tus pies[b]; y te llamarán Ciudad de Yahvé[c], Sion del Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los hijos de tus opresores vendrán ante ti inclinados». El hebreo dice literalmente: «los hijos de los que te afligieron».'
    reason: lexical_alternative
  - marker: b
    text: «Se inclinarán» expresa sumisión u homenaje a Sion, no adoración divina a la ciudad.
    reason: theological_note
  - marker: c
    text: 'Hebreo: «Sion del Santo de Israel», un título que presenta a Sion como perteneciente al Santo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁחֹחַ
  english_pob_choice: bowed down
  chosen_spanish: inclinados
  alternatives_spanish:
  - humillados
  - doblados
  lexicon: HALOT
  rationale: El participio describe una postura corporal abatida al acercarse. En español, «inclinados» mantiene la imagen física y sugiere sumisión sin sonar forzado. «Humillados» enfatiza el estado, pero pierde la postura visible.
- source_word: בְּנֵי מְעַנַּיִךְ
  english_pob_choice: The sons of those who afflicted you
  chosen_spanish: Los hijos de los que te afligieron
  alternatives_spanish:
  - Los hijos de tus opresores
  - Los hijos de los que te oprimieron
  lexicon: HALOT
  rationale: «בְּנֵי» es literalmente «hijos de», y el complemento describe a quienes causaron aflicción. Se conserva la relación filial y el sentido verbal de ענה con «afligieron», como en la decisión inglesa.
- source_word: וְהִשְׁתַּחֲווּ
  english_pob_choice: will bow down
  chosen_spanish: se inclinarán
  alternatives_spanish:
  - se postrarán
  - rendirán homenaje
  lexicon: HALOT
  rationale: El verbo puede implicar postración y, según contexto, adoración. Aquí el objeto es Sion/Jerusalén, así que corresponde el sentido de homenaje o sumisión, no culto divino. «Se inclinarán» es natural y preserva la cautela teológica del POB.
- source_word: עַל כַּפּוֹת רַגְלַיִךְ
  english_pob_choice: at the soles of your feet
  chosen_spanish: ante las plantas de tus pies
  alternatives_spanish:
  - a las plantas de tus pies
  - a tus pies
  lexicon: HALOT
  rationale: La expresión hebrea es vívida y denota máxima humillación. «Plantas de tus pies» conserva el valor idiomático de כַּפּוֹת y evita la neutralización de «a tus pies».
- source_word: מְנַאֲצָיִךְ
  english_pob_choice: who despised you
  chosen_spanish: los que te despreciaron
  alternatives_spanish:
  - los que te desestimaron
  - los que te trataron con desprecio
  lexicon: HALOT
  rationale: נאץ expresa desprecio o desdén. «Despreciaron» es breve, fuerte y fiel al tono hostil del pasaje.
- source_word: עִיר יְהוָה
  english_pob_choice: The City of Yahweh
  chosen_spanish: Ciudad de Yahvé
  alternatives_spanish:
  - la ciudad de Yahvé
  - Ciudad del SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se rinde según el estándar del proyecto, «Yahvé». Se capitaliza «Ciudad» porque funciona como título designativo, siguiendo el valor titular de la frase.
- source_word: צִיּוֹן קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: Zion of the Holy One of Israel
  chosen_spanish: Sion del Santo de Israel
  alternatives_spanish:
  - Sion, el Santo de Israel
  - Sion perteneciente al Santo de Israel
  lexicon: HALOT
  rationale: La secuencia hebrea es compacta y puede leerse como título relacional. «Del Santo de Israel» comunica pertenencia e identificación sin sugerir que Sion sea el Santo de Israel.
- source_word: וְקָרְאוּ לָךְ
  english_pob_choice: they will call you
  chosen_spanish: te llamarán
  alternatives_spanish:
  - te nombrarán
  - te proclamarán
  lexicon: HALOT
  rationale: El idiomismo hebreo designa con un título o nombre. «Te llamarán» es la equivalencia más directa y natural en español.
theological_decisions:
- issue: La postura de los enemigos ante Sion
  english_pob_reading: human enemies bow in submission before restored Zion, not offering divine worship to the city
  chosen_spanish_reading: los enemigos se someten ante Sion; no se presenta adoración divina a la ciudad
  alternative_spanish_readings:
  - podría entenderse como adoración
  - se postran en sentido cultual
  rationale: Aunque השתחוה puede implicar adoración en otros contextos, aquí el objeto es la ciudad de Dios. Por eso se evita «adorarán» o equivalentes cultuales, preservando el sentido de homenaje/sumisión.
  doctrine_reference: Translation philosophy §3
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre propio divino como «Yahvé», en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del audit trail inglés, con la actualización consistente del nombre divino a «Yahvé» y sin introducir cambios adicionales al sentido base. Se preserva la distinción entre homenaje humano y adoración divina en el verbo de postración.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Sion» sin tilde, conforme al uso bíblico español habitual y la forma del topónimo.
  - Se conserva una sintaxis de paralelismo poético con dos miembros principales y un cierre nominal en aposición.
