translation:
  language: es
  text: Había una matanza de jóvenes y ancianos[a], aniquilación de hombres, mujeres y niños, y matanzas de vírgenes[b] e infantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «jóvenes varones y ancianos», si los términos de edad se toman de manera más específica; el contexto, sin embargo, favorece un contraste general entre la juventud y la vejez.'
    reason: lexical_alternative
  - marker: b
    text: «Vírgenes» traduce un término que marca más específicamente a mujeres jóvenes no casadas y de estado virginal; «jóvenes mujeres» es una alternativa posible, pero menos precisa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνετο
  english_pob_choice: There was
  chosen_spanish: Había
  alternatives_spanish:
  - Se produjo
  - Hubo
  lexicon: LSJ
  rationale: El imperfecto impersonal introduce una situación en curso; «Había» conserva bien el tono narrativo y la continuidad del relato sin sobrecargar con un matiz más puntual de ocurrencia.
- source_word: νέων
  english_pob_choice: young
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jovencitos
  - muchachos
  lexicon: LSJ
  rationale: La pareja con πρεσβυτέρων pide un contraste etario general, no una categoría social masculina específica. «Jóvenes» mantiene ese sentido amplio.
- source_word: πρεσβυτέρων
  english_pob_choice: old
  chosen_spanish: ancianos
  alternatives_spanish:
  - viejos
  - mayores
  lexicon: LSJ
  rationale: Aunque literalmente puede ser «viejos» o «mayores», en este contexto el contraste es de edad y «ancianos» suena natural y solemne en español bíblico. No lo leo como oficio eclesial ni como «ancianos» en sentido institucional.
- source_word: ἀναίρεσις
  english_pob_choice: killing
  chosen_spanish: matanza
  alternatives_spanish:
  - muerte violenta
  - asesinato
  lexicon: LSJ
  rationale: El término expresa el quitar la vida de modo violento; «matanza» refleja mejor la crudeza colectiva del pasaje que un «asesinato» más jurídico o una simple «muerte».
- source_word: ἀφανισμός
  english_pob_choice: annihilation
  chosen_spanish: aniquilación
  alternatives_spanish:
  - destrucción
  - exterminio
  lexicon: LSJ
  rationale: 'Sigo la revisión inglesa que prefirió «annihilation» por su fuerza: en español «aniquilación» comunica exterminio total y preserva la intensidad acumulativa del griego.'
- source_word: παρθένων
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas
  - jóvenes mujeres
  lexicon: LSJ
  rationale: El griego marca más específicamente el estado de virginidad que solo la edad o el género. «Vígenes» conserva ese rasgo; «doncellas» podría sonar más literario y menos preciso.
- source_word: νηπίων
  english_pob_choice: infants
  chosen_spanish: infantes
  alternatives_spanish:
  - bebés
  - niños pequeños
  lexicon: LSJ
  rationale: Designa a niños muy pequeños, y «infantes» es un equivalente sobrio y preciso en español bíblico.
- source_word: σφαγαί
  english_pob_choice: slaughters
  chosen_spanish: degollamiento
  alternatives_spanish:
  - degollamientos
  - masacres
  - matanzas
  lexicon: LSJ
  rationale: El plural intensifica la imagen de matanza sacrificial o brutal. «Degollamiento» conserva la violencia concreta del término; en español, el singular colectivo funciona bien para esta lista estilística.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en ἀφανισμός: se evita un término demasiado general como «destrucción» y se opta por «aniquilación» para reflejar mejor el sentido de exterminio. También se mantiene la progresión retórica de tres miembros: matanza / aniquilación / degollamiento.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en el proyecto; este versículo no lo contiene.
  - Se evita «Cristo»/«Mesías» porque no aparece lenguaje mesiánico en este texto.
  - Se usa «vírgenes» y no «jóvenes mujeres» para conservar la precisión del griego.
  - «Ancianos» se entiende aquí como contraste etario, no como cargo.
  - La lista conserva el paralelismo y la escalada de violencia del original griego.
