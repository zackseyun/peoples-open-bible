translation:
  language: es
  text: Me vestí de rectitud[a], y ella me vistió; mi justicia era como un manto y un turbante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me vestí de justicia». El hebreo צֶדֶק puede traducirse «rectitud» o «justicia».'
    reason: lexical_alternative
  - marker: b
    text: «Turbante» nombra aquí una prenda envuelta sobre la cabeza, parte de la imagen de honor y dignidad pública.
    reason: cultural_note
lexical_decisions:
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: HALOT
  rationale: El hebreo צֶדֶק puede significar tanto ‘righteousness’ como ‘justice’. En español, ‘justicia’ comunica mejor la cualidad moral y social del término, y además permite conservar la tensión con מִשְׁפָּטִי en el segundo hemistiquio.
- source_word: לָבַשְׁתִּי
  english_pob_choice: I put on
  chosen_spanish: me vestí de
  alternatives_spanish:
  - puse sobre mí
  - me revestí de
  lexicon: HALOT
  rationale: El verbo לָבַשׁ admite la imagen de ponerse una prenda. ‘Me vestí de’ es natural en español y preserva la metáfora activa de apropiarse de la justicia como ropa.
- source_word: וַיִּלְבָּשֵׁנִי
  english_pob_choice: and it clothed me
  chosen_spanish: y me cubrió
  alternatives_spanish:
  - y me vistió
  - y se vistió de mí
  lexicon: HALOT
  rationale: La forma hebrea repite la raíz con justicia como sujeto y a Job como objeto, invirtiendo la imagen. ‘Me cubrió’ mantiene la idea de envolvimiento y el efecto poético sin sonar forzado en español.
- source_word: כִּמְעִיל
  english_pob_choice: like a robe
  chosen_spanish: como un manto
  alternatives_spanish:
  - como una túnica
  - como una ropa exterior
  lexicon: HALOT
  rationale: מְעִיל designa una prenda exterior de dignidad. ‘Manto’ es un equivalente claro y solemne en español, más natural aquí que ‘robe’ o ‘túnica’ para la imagen de honor público.
- source_word: וְצָנִיף
  english_pob_choice: and a turban
  chosen_spanish: y un turbante
  alternatives_spanish:
  - y un tocado
  - y una prenda para la cabeza
  lexicon: HALOT
  rationale: צָנִיף se refiere a un envoltorio para la cabeza. ‘Turbante’ es la equivalencia más directa y reconocible, conservando la referencia cultural del texto.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi juicio
  - mi derecho
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicio, justicia o causa justa. Aquí ‘mi justicia’ conserva la fuerza ética/jurídica del término y su paralelismo con צֶדֶק, sin reducirlo a un mero veredicto.
translation_notes:
  revision_awareness: La versión sigue de cerca el sentido del hebreo y conserva la imagen de vestidura y dignidad pública; no fue necesario introducir cambios de revisión respecto del acuerdo alto del cotejo. La decisión principal fue mantener dos términos españoles distintos para צֶדֶק y מִשְׁפָּטִי, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo ‘justicia’ para ambos sustantivos, diferenciando la imagen mediante la sintaxis y evitando una paráfrasis más libre.
  - ‘Manto’ y ‘turbante’ reflejan prendas distintas y conservan el paralelismo poético.
  - El texto principal es idiomático en español pero sigue siendo auditables sus equivalencias con el hebreo.
