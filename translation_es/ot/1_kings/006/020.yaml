translation:
  language: es
  text: Delante del santuario interior había veinte codos de longitud, veinte codos de anchura y veinte codos de altura. Lo revistió de oro puro[a], y revistió el altar de cedro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oro fino'. La expresión hebrea זָהָב סָגוּר denota oro refinado de alta calidad.
    reason: lexical_alternative
  - marker: b
    text: O 'un altar de cedro'. El hebreo puede entenderse de manera compacta como un altar hecho de cedro o como un altar revestido con cedro.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי הַדְּבִיר
  english_pob_choice: In front of the inner sanctuary
  chosen_spanish: Delante del santuario interior
  alternatives_spanish:
  - En frente del santuario interior
  - Ante el santuario interior
  - Delante del Lugar Santísimo
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición delante de/in front of. הַדְּבִיר designa el recinto interior del templo; 'santuario interior' conserva la referencia sin imponer de antemano una terminología litúrgica más técnica que el hebreo mismo no explicita aquí.
- source_word: עֶשְׂרִים אַמָּה ... אֹרֶךְ / רֹחַב / קוֹמָתוֹ
  english_pob_choice: twenty cubits in length, twenty cubits in width, and twenty cubits in its height
  chosen_spanish: veinte codos de longitud, veinte codos de anchura y veinte codos de altura
  alternatives_spanish:
  - veinte codos de largo, veinte codos de ancho y veinte codos de alto
  - veinte codos en longitud, veinte codos en anchura y veinte codos en altura
  lexicon: HALOT
  rationale: La fórmula hebrea es dimensional y repetitiva. 'Codos' preserva la unidad histórica; 'longitud/anchura/altura' refleja los sustantivos hebreos אֹרֶךְ, רֹחַב y קוֹמָה sin convertirlos en adjetivos que puedan sonar menos formales en español bíblico.
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: He overlaid it
  chosen_spanish: Lo revistió
  alternatives_spanish:
  - Lo recubrió
  - Lo sobrepuso
  - Lo cubrió
  lexicon: HALOT
  rationale: צפה en este contexto de carpintería/templo puede significar revestir u overlay. 'Revestió' es natural en español para un recubrimiento precioso y mantiene la idea de aplicar una capa al objeto.
- source_word: זָהָב סָגוּר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro fino
  - oro refinado
  lexicon: HALOT
  rationale: La POB inglesa opta por 'pure gold' para capturar la calidad del metal. 'Oro puro' comunica bien en español esa calidad de oro refinado; 'fino' o 'refinado' quedan como alternativas posibles en la nota por la tensión lexical del hebreo.
- source_word: וַיְצַף מִזְבֵּחַ אָרֶז
  english_pob_choice: he overlaid the cedar altar
  chosen_spanish: revistió el altar de cedro
  alternatives_spanish:
  - revistió el altar de madera de cedro
  - revistió el altar de cedro
  - revistió un altar de cedro
  lexicon: HALOT
  rationale: La secuencia constructa hebrea puede leerse como un altar de cedro o como un altar revestido con cedro. En español, 'altar de cedro' mantiene la compactación del hebreo y la ambigüedad documentada por la POB inglesa; 'altar de madera de cedro' explicita el material, pero añade una interpretación.
theological_decisions:
- issue: 'Terminología del espacio sagrado: דְּבִיר'
  english_pob_reading: inner sanctuary
  chosen_spanish_reading: santuario interior
  alternative_spanish_readings:
  - Lugar Santísimo
  - santuario interno
  - recinto interior
  rationale: El hebreo nombra el dĕbîr como la cámara más interior del templo. 'Santuario interior' conserva la referencia arquitectónica sin resolver de forma demasiado técnica una equivalencia que el propio texto no define aquí; además evita imponer 'Lugar Santísimo' donde el inglés de la POB eligió una formulación más descriptiva.
  doctrine_reference: 1 Reyes 6:19-20; uso bíblico del dĕbîr como espacio más interno del templo.
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó la apertura para reflejar mejor el hebreo: ''In front of the inner sanctuary was...''. En español se siguió esa misma decisión sintáctica con ''Delante del santuario interior había...'', evitando convertir el santuario en sujeto. También se mantuvo la triple medida con una fórmula completa y paralela.'
  spanish_consistency_notes:
  - Se prefirió 'codos' para la medida bíblica, en consonancia con la POB inglesa que retiene 'cubits'.
  - Se usó 'oro puro' para reflejar la calidad especial de זָהָב סָגוּר y mantener la nota alternativa 'oro fino'.
  - Se mantuvo 'altar de cedro' sin expandirlo innecesariamente, preservando la ambigüedad documentada en la tradición auditada.
  - No se sustituyó 'santuario interior' por terminología eclesiástica posterior sin necesidad textual.
