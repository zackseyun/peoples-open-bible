translation:
  language: es
  text: y Galaad, y el territorio[a] del gesureo y del maacateo, y todo el monte Hermón[b], y todo Basán hasta Salecá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frontera del gesureo y del maacateo». La palabra hebrea puede denotar una línea limítrofe o el territorio perteneciente a un pueblo; aquí el sentido territorial más amplio encaja mejor con la lista.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo el monte Hermón»; la expresión puede referirse no solo a la cumbre, sino también a todo el macizo o zona montañosa de Hermón.'
    reason: cultural_note
lexical_decisions:
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - el Galaad
  lexicon: HALOT
  rationale: Es un nombre geográfico propio; en español bíblico estándar la forma establecida es «Galaad». Se omite el artículo, como en el registro normal de topónimos.
- source_word: גְב֧וּל
  english_pob_choice: territory
  chosen_spanish: territorio
  alternatives_spanish:
  - frontera
  - límite
  - región
  lexicon: HALOT
  rationale: Aquí גְּבוּל no funciona solo como línea limítrofe, sino como ámbito territorial perteneciente a un pueblo. «Territorio» conserva ese valor y suena natural en español.
- source_word: הַגְּשׁוּרִי
  english_pob_choice: the Geshurite
  chosen_spanish: los gesureos
  alternatives_spanish:
  - el gesureo
  - los gesureitas
  lexicon: HALOT
  rationale: El gentilicio singular del hebreo tiene sentido colectivo. En español, el plural colectivo «los gesureos» comunica mejor el pueblo/ámbito asociado que un singular artificial.
- source_word: הַמַּעֲכָתִי
  english_pob_choice: the Maacathite
  chosen_spanish: los maacateos
  alternatives_spanish:
  - el maacateo
  - los maacatitas
  lexicon: HALOT
  rationale: Como con el término anterior, el gentilicio se entiende de manera colectiva. «Maacateos» mantiene el vínculo con Maacá y fluye de forma natural en español.
- source_word: כֹל הַר חֶרְמוֹן
  english_pob_choice: all Mount Hermon
  chosen_spanish: todo el monte Hermón
  alternatives_spanish:
  - toda la cordillera del Hermón
  - todo el macizo del Hermón
  lexicon: HALOT
  rationale: «הר» puede abarcar montaña o macizo montañoso; con Hermón, «monte Hermón» es la forma más clara y reconocible. «Todo» conserva la extensión total indicada por כֹל.
- source_word: כָל הַבָּשָׁן
  english_pob_choice: all Bashan
  chosen_spanish: todo Basán
  alternatives_spanish:
  - todo el Basán
  - toda la región de Basán
  lexicon: HALOT
  rationale: Basán es un nombre regional propio; en español puede omitirse el artículo. «Todo» conserva el valor distributivo del hebreo dentro del resumen territorial.
- source_word: עַד סַלְכָה
  english_pob_choice: as far as Salecah
  chosen_spanish: hasta Salecá
  alternatives_spanish:
  - hasta Salecá
  - hasta Salca
  lexicon: HALOT
  rationale: עַד marca el límite territorial, por eso «hasta» es la equivalencia más directa. «Salecá» sigue una transliteración española tradicional y clara del topónimo.
translation_notes:
  revision_awareness: La base inglesa del POB está en acuerdo alto con el hebreo y no requiere correcciones sustanciales. La redacción española sigue directamente el texto hebreo, conservando el valor territorial de גְּבוּל, el uso colectivo de los gentilicios y la amplitud de כֹל con los nombres propios regionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta serie editorial cuando el texto lo requiera, pero aquí no aparece el tetragrámaton ni un equivalente explícito.
  - Se usa «territorio» para גְּבוּל según el contexto de lista geográfica, no «frontera».
  - 'Los nombres propios se normalizan a formas bíblicas españolas reconocibles: Galaad, Hermón, Basán, Salecá.'
  - 'Se conserva el singular territorial de la serie con paralelismo claro en español: «y… y… y…».'
