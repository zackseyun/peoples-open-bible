translation:
  language: es
  text: ¡Bendigan al Señor, mares y ríos; cántenle alabanzas y exáltenlo en gran manera para siempre!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a ofrecer bendición/alabanza. «Bendecid» conserva el tono litúrgico y la correspondencia directa con el llamado a dirigirse al Señor.
- source_word: θάλασσαι
  english_pob_choice: seas
  chosen_spanish: mares
  alternatives_spanish:
  - mares del mar
  - océanos
  lexicon: LSJ
  rationale: El plural pide mantener la imagen poética de múltiples cuerpos de agua. En español, «mares» es natural y conserva mejor la personificación que una expresión más explicativa.
- source_word: ποταμοί
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: LSJ
  rationale: «Ríos» es el equivalente normal y directo de ποταμοί en español, y se ajusta bien al paralelismo con «mares».
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  - el Dueño
  lexicon: BDAG
  rationale: En este contexto himnódico, κύριον funciona como título divino. Se conserva la decisión del POB inglés con «Señor», que es el equivalente español más estable y reverente para este uso.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - cantad un himno
  - alabad cantando
  lexicon: BDAG
  rationale: El verbo implica cantar un himno o alabanza. «Cantadle alabanzas» expresa con naturalidad la dimensión musical y la referencia al mismo destinatario del mandato.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo en gran manera
  alternatives_spanish:
  - exaltadlo muchísimo
  - levantadlo en extremo
  lexicon: LSJ
  rationale: El compuesto intensifica la acción de exaltar. «En gran manera» preserva esa intensificación sin caer en un giro poco idiomático en español.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega indica duración perpetua. «Por los siglos» conserva el matiz de tiempo extendido y el registro doxológico del refrán, sin añadir más de lo que el griego dice de forma explícita.
theological_decisions:
- issue: Título divino κύριος en la doxología
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el maestro
  rationale: Aunque el texto griego presenta κύριον y no el tetragrama, aquí se trata claramente del título divino en una alabanza. En español, «el Señor» reproduce de forma fiel y reconocible la lectura del POB inglés, sin trasladar artificialmente un nombre propio que no está en el griego citado.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada: el texto griego exhorta a mares y ríos a bendecir/alabar/exaltar al Señor para siempre; no hay notas textuales ni variantes registradas en el paquete inglés, y la traducción española mantiene ese paralelismo y la fuerza litúrgica sin añadir interpretaciones.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de tres imperativos: «Bendecid», «cantadle alabanzas» y «exaltadlo».'
  - Se evitó traducir mecánicamente «the Lord» como una mayúscula tipográfica no idiomática; en español se usa «el Señor».
  - «Por los siglos» conserva el tono doxológico y la duración indefinida del refrán griego.
