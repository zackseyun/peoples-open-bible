    text: O «a uno que conoce la escritura»; literalmente, «a uno que conoce el rollo/libro».
    reason: lexical_alternative
  revision_rationale: Se cambia «libro» por «rollo» para respetar la decisión lexical documentada sobre סֵפֶר en su contexto histórico y conservar la imagen de revelación inaccesible mediante un documento sellado. Se reemplaza la nota cultural por una nota lexical alineada con la auditoría inglesa, preservando el matiz literal de יוֹדֵעַ הַסֵּפֶר mientras el texto principal mantiene el español natural «uno que sabe leer».
