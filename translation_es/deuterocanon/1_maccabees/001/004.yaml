translation:
  language: es
  text: Y reunió una fuerza muy poderosa, y comenzó a gobernar[a] sobre tierras y naciones y dominios[b], y se hicieron tributarios de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzó a reinar sobre» o simplemente «gobernó sobre»; el verbo griego puede denotar el ejercicio del gobierno, y el aoristo puede subrayar el comienzo de ese dominio.'
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido aquí como «dominios» designa reinos o gobiernos bajo tiranos; es una equivalencia formal del griego, aunque en español también serían posibles «principados» o «despotismos» como alternativas interpretativas.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆξεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  lexicon: LSJ
  rationale: El aoristo de συνάγω en este contexto militar expresa la acción de concentrar o reunir recursos armados. «Reunió» es natural en español y conserva la idea concreta sin sobreinterpretar.
- source_word: δύναμιν
  english_pob_choice: force
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - ejército
  lexicon: LSJ
  rationale: En un marco militar, δύναμις puede referirse a fuerza armada o efectivos. «Fuerza» mantiene esa amplitud y suena más directo que «poder»; «ejército» sería más específico de lo que el griego exige.
- source_word: ἰσχυρὰν σφόδρα
  english_pob_choice: very strong
  chosen_spanish: muy poderosa
  alternatives_spanish:
  - muy fuerte
  - sumamente poderosa
  lexicon: LSJ
  rationale: La combinación intensifica la magnitud de la fuerza. En español, «muy poderosa» comunica bien la fuerza enfática del giro y resulta más idiomática que una calca como «muy fuerte» aplicada a «fuerza».
- source_word: ἦρξεν
  english_pob_choice: began to rule over
  chosen_spanish: empezó a dominar sobre
  alternatives_spanish:
  - comenzó a reinar sobre
  - empezó a gobernar sobre
  lexicon: LSJ
  rationale: ἄρχω con genitivo puede indicar el ejercicio de gobierno; el aoristo aquí también puede marcar el inicio de ese dominio. «Empezó a dominar sobre» conserva ese matiz ingresivo sin forzar «reinar», que en español suena más monárquico y menos amplio.
- source_word: χωρῶν
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - regiones
  - territorios
  lexicon: LSJ
  rationale: Χώρα denota tierra, territorio o región. «Tierras» reproduce bien el plural político-geográfico y evita la impresión de estados modernos.
- source_word: ἐθνῶν
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - naciones gentiles
  lexicon: LSJ
  rationale: ἔθνη designa pueblos/naciones sometidos o conquistados. «Naciones» es la opción más natural en español en este contexto histórico.
- source_word: τυραννιῶν
  english_pob_choice: dominions
  chosen_spanish: dominios
  alternatives_spanish:
  - tiranías
  - principados
  - despotismos
  lexicon: LSJ
  rationale: El griego se refiere a reinos o gobiernos regidos por tiranos, es decir, a entidades políticas, no solo a la cualidad abstracta de opresión. El inglés POB revisado opta por «dominions» para mayor naturalidad; en español, «dominios» conserva el valor formal de territorios sometidos sin introducir una palabra demasiado técnica o cargada como «tiranías».
- source_word: ἐγένοντο αὐτῷ εἰς φόρον
  english_pob_choice: became tributary to him
  chosen_spanish: se hicieron tributarios de él
  alternatives_spanish:
  - quedaron sujetos a tributo para él
  - pagaron tributo a él
  lexicon: LSJ
  rationale: La frase expresa quedar bajo obligación tributaria y en condición de sujeción. «Se hicieron tributarios de él» conserva tanto el resultado como la relación política y fiscal mejor que una simple traducción de pago.
translation_notes:
  revision_awareness: 'El audit trail en inglés fue revisado: el término para τυραννιῶν pasó de «tyrannies» a «dominions» por naturalidad y precisión contextual. La versión española sigue esa revisión, pero conserva la tensión semántica formal del griego mediante «dominios» y no la aplana con una paráfrasis.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - «Tributarios» reproduce la relación fiscal-política del griego sin sustituirla por una formulación más interpretativa.
  - Se prefirió un español bíblico moderno y claro, evitando arcaísmos innecesarios.
