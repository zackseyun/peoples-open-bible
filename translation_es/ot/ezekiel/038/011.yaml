translation:
  language: es
  text: 'y dirás: «Subiré contra una tierra de aldeas sin murallas[a]; iré contra los que están en reposo, los que habitan seguros. Todos ellos habitan sin muro y no tienen cerrojo[b] ni puertas[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una tierra de campo abierto» o «una tierra de asentamientos rurales»; el hebreo se refiere a lugares sin murallas defensivas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «barra»; el hebreo se refiere a una pieza que asegura una entrada o puerta.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «portones»; «puertas» es la traducción más directa del hebreo, aunque el contexto es defensivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and you will say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y dirá
  - y dirás tú
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético funciona como secuencia futura dirigida al interlocutor. «Dirás» conserva la fuerza predictiva y suena natural en español.
- source_word: אֶעֱלֶה
  english_pob_choice: I will go up
  chosen_spanish: subiré
  alternatives_spanish:
  - iré hacia arriba
  - iré a
  lexicon: HALOT
  rationale: עלה expresa literalmente ‘subir’. «Subiré» preserva la imagen direccional sin forzar una paráfrasis.
- source_word: אֶרֶץ פְּרָזוֹת
  english_pob_choice: a land of unwalled villages
  chosen_spanish: una tierra de aldeas sin murallas
  alternatives_spanish:
  - una tierra de poblados abiertos
  - una tierra de asentamientos rurales sin murallas
  lexicon: HALOT
  rationale: פְּרָזוֹת apunta a lugares abiertos o sin fortificación. «Aldeas sin murallas» conserva el sentido concreto y la conexión con el resto del versículo sobre muros, barrotes y puertas.
- source_word: אָבוֹא
  english_pob_choice: I will come against
  chosen_spanish: vendré contra
  alternatives_spanish:
  - iré contra
  - me acercaré contra
  lexicon: HALOT
  rationale: En contexto hostil, בוא adquiere valor adversativo. «Vendré contra» mantiene el matiz de ataque sin añadir demasiado.
- source_word: הַשֹּׁקְטִים
  english_pob_choice: those who are at rest
  chosen_spanish: los que están en reposo
  alternatives_spanish:
  - los tranquilos
  - los que viven tranquilos
  lexicon: HALOT
  rationale: El participio de שקט expresa quietud, calma o reposo. «Los que están en reposo» es idiomático y conserva la idea de ausencia de alarma.
- source_word: יֹשְׁבֵי לָבֶטַח
  english_pob_choice: who dwell securely
  chosen_spanish: los que habitan con seguridad
  alternatives_spanish:
  - los que viven seguros
  - los que moran con confianza
  lexicon: HALOT
  rationale: El giro participial describe una habitación segura. «Habitan con seguridad» mantiene el valor de residencia y protección.
- source_word: כֻּלָּם יֹשְׁבִים
  english_pob_choice: all of them dwelling
  chosen_spanish: todos ellos habitando
  alternatives_spanish:
  - todos ellos viven
  - todos ellos están habitando
  lexicon: HALOT
  rationale: Conservar «habitando» reproduce el participio y el énfasis hebreo en la residencia estable.
- source_word: בְּאֵין חוֹמָה
  english_pob_choice: without a wall
  chosen_spanish: sin muro
  alternatives_spanish:
  - sin muralla
  - en ausencia de muro
  lexicon: HALOT
  rationale: El hebreo expresa carencia; «sin muro» es breve, fiel y natural en español. «Muralla» también sería posible, pero «muro» sigue más de cerca el término genérico.
- source_word: וּבְרִיחַ
  english_pob_choice: bar
  chosen_spanish: barrotes
  alternatives_spanish:
  - barra
  - cerrojo
  lexicon: HALOT
  rationale: בריח se refiere a la pieza que asegura una entrada. En plural coordinado con «puertas», «barrotes» comunica bien la idea de cierre defensivo y evita sonar técnico o ambiguo.
- source_word: וּדְלָתַיִם
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - hojas
  lexicon: HALOT
  rationale: דלתים significa literalmente ‘puertas’ o ‘dobles puertas’. «Puertas» es el equivalente directo y transparente.
- source_word: אֵין לָהֶם
  english_pob_choice: having no
  chosen_spanish: y sin
  alternatives_spanish:
  - sin que tengan
  - no tienen
  lexicon: HALOT
  rationale: El hebreo finaliza con una cláusula de carencia. «Y sin» permite español fluido manteniendo la negación acumulativa del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético, pero también toma en cuenta el análisis de la POB en inglés: el movimiento hostil de אָבוֹא, la estructura separada del segundo miembro con כֻּלָּם, y la conclusión acumulativa sobre muro, barrotes y puertas. Se evita la traducción mecánica del inglés cuando el español pide una reestructuración más natural, sin perder la tensión entre ‘muro’/‘muralla’ ni la imaginería defensiva del pasaje.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ fuera de este versículo porque no aparece el nombre divino en el texto hebreo.
  - Se conserva el paralelismo entre ‘habitando’ y ‘habitan con seguridad’ para reflejar la repetición de ישב.
  - ‘Barrotes’ y ‘puertas’ traducen el campo defensivo sin sustituirlo por lenguaje eclesiástico o interpretativo.
