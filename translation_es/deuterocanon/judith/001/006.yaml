review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del rastro de auditoría inglés: συνήντησαν πρὸς αὐτόν se entiende correctamente como adhesión; τὴν ὀρεινήν como región montañosa; κατοικοῦντες con nombres de ríos se expresa idiomáticamente; y συνῆλθον conserva el sentido de reunirse. Sin embargo, hay problemas de fidelidad y claridad en la segunda mitad: la puntuación hace parecer fragmentaria la cláusula de ''la llanura de Arioc, rey de los elimeos'', y ''para batalla'' suena poco natural en español para εἰς παράταξιν. Además, el marcador [c] está anclado a ''elimeos'', pero la nota inglesa c trata sobre el término militar, no sobre ese etnónimo.'
  spanish_quality_summary: El español es en general comprensible, pero requiere reparación menor para fluidez y estructura sintáctica. 'Junto al Éufrates, el Tigris y el Hidaspes' conviene armonizarse como 'junto al Éufrates, al Tigris y al Hidaspes'. 'Arioj' es una forma poco natural; 'Arioc' funciona mejor en español y además ya figura como alternativa documentada. 'Para batalla' es torpe; 'para combatir' expresa mejor el propósito militar sin sobreliteralidad. También conviene reestructurar la oración para que 'los que habitaban en la llanura de Arioc, rey de los elimeos' dependa claramente de 'todos'.
  glossary_alignment: No hay términos teológicos mayores en juego. La decisión de no usar 'elamitas' y mantener una forma derivada de Elymais es correcta. La transliteración de Χελεούλ como 'Cheleúl' es aceptable. La nota sobre συνήντησαν debe mantenerse; la nota sobre el nombre propio puede mantenerse adaptada al español. La nota sobre el término militar debe aplicarse al segmento correspondiente, no a 'elimeos'.
  issues:
  - severity: medium
    issue: La sintaxis deja incompleta la referencia a 'la llanura de Arioj, rey de los elimeos'.
    rationale: En griego, la secuencia depende de 'todos los que habitaban'; en español el punto y la puntuación actual hacen que parezca un inciso suelto, no otro grupo de habitantes.
  - severity: medium
    issue: '''Para batalla'' no es idiomático en español.'
    rationale: Aunque sigue la simplificación inglesa 'for battle', en español natural y fiel conviene 'para combatir' o 'para la batalla'.
  - severity: medium
    issue: El marcador [c] está mal asignado.
    rationale: La nota c del rastro inglés explica el término militar εἰς παράταξιν, pero en el borrador español se ancla a 'elimeos', creando desalineación documental.
  - severity: low
    issue: La coordinación con los ríos puede mejorarse.
    rationale: '''Junto al Éufrates, el Tigris y el Hidaspes'' es entendible, pero ''junto al Éufrates, al Tigris y al Hidaspes'' es más pulido y consistente.'
  - severity: low
    issue: '''Arioj'' resulta poco natural como forma española principal.'
    rationale: La propia documentación admite 'Arioc' como alternativa; en español bíblico y general esa forma se lee mejor que 'Arioj'.
