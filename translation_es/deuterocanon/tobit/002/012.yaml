    issue: κυρίοις traducido como 'amos' en el texto principal
    rationale: La evidencia y la rationale del POB favorecen 'owners' por el contexto económico/laboral. En español, 'dueños' comunica mejor ese sentido contextual y evita una carga jerárquica innecesaria de 'amos'.
  - severity: low
    issue: Nota al pie invierte la prioridad léxica
    rationale: Si el texto principal se ajusta a 'dueños', la nota debe conservar 'amos' como alternativa, no al revés.
  - severity: low
    issue: '''añadiendo además'' suena redundante'
    rationale: El participio ya expresa adición; 'además' puede mantenerse, pero conviene una formulación más natural como 'añadiendo también'.
  revised_spanish_text: Y ella lo enviaba a los dueños[a], y ellos también le pagaban el salario, añadiendo también un cabrito.
  revised_footnotes:
