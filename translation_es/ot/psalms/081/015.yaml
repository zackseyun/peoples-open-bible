translation:
  language: es
  text: Dentro de poco[a] sometería a sus enemigos, y volvería mi mano contra sus adversarios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dentro de poco» también puede entenderse como «pronto». El hebreo כִּמְעַט expresa cercanía temporal; menos probablemente aquí, «casi».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «volvería mi mano sobre sus adversarios», un modismo para dirigir poder en juicio contra ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  english_pob_choice: In a little while
  chosen_spanish: Dentro de poco
  alternatives_spanish:
  - Pronto
  - En poco tiempo
  - Dentro de un poco
  lexicon: HALOT
  rationale: La expresión hebrea aquí comunica cercanía temporal. «Dentro de poco» suena natural en español y conserva la idea de inminencia mejor que una traducción mecánica de la secuencia léxica.
- source_word: אוֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus foes
  lexicon: HALOT
  rationale: En este contexto militar/oposicional, «enemigos» es la equivalencia más clara y directa para אויב. Mantiene el paralelo con el segundo hemistiquio sin añadir matices no exigidos por el hebreo.
- source_word: אַכְנִיעַ
  english_pob_choice: I would subdue
  chosen_spanish: someteré
  alternatives_spanish:
  - humillaré
  - abatiré
  - reduciré
  lexicon: HALOT
  rationale: El hifil de כנע expresa hacer que otros queden bajo dominio o sometimiento. «Someteré» preserva esa fuerza causal mejor que «humillaré», que en español puede sonar más moral o psicológica que militar.
- source_word: צָרֵיהֶם
  english_pob_choice: their adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus opresores
  - sus enemigos
  lexicon: HALOT
  rationale: Se mantiene una distinción estilística con el primer hemistiquio. «Adversarios» refleja bien el matiz de oposición hostil de צרר sin repetir exactamente «enemigos».
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano poderosa
  - mi brazo
  lexicon: HALOT
  rationale: La imagen corporal se conserva de forma literal porque forma parte del idioma hebreo del juicio y la acción poderosa. «Mi mano» es transparente y fiel en español.
- source_word: אָשִׁיב יָדִי
  english_pob_choice: turn my hand against
  chosen_spanish: volveré mi mano contra
  alternatives_spanish:
  - extenderé mi mano contra
  - haré volver mi mano contra
  lexicon: HALOT
  rationale: La frase es idiomática y describe una acción hostil o de juicio dirigida contra los opositores. «Volveré mi mano contra» mantiene la metáfora sin desdibujar su sentido de intervención punitiva.
theological_decisions:
- issue: Valor condicional del futuro verbal en el contexto del salmo
  english_pob_reading: Use 'would subdue' / 'would turn' rather than simple future
  chosen_spanish_reading: Usar futuro contextual («someteré», «volveré») con nota de alternativa temporal cercana
  alternative_spanish_readings:
  - sometería
  - volvería
  - hubiera sometido
  rationale: El hebreo usa imperfectos que pueden leerse como futuro o como acción potencial/prometida en el marco de la reprensión divina. En español, el futuro simple resulta más natural y mantiene la fuerza del ofrecimiento divino; la nota conserva la alternativa de cercanía temporal implícita en כִּמְעַט.
  doctrine_reference: Salmo 81:13-15; cf. la lectura del contexto de obediencia y bendición en el mismo salmo
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el texto hebreo y con el auditorial inglés: la principal decisión es mantener la cercanía temporal de כִּמְעַט y la metáfora idiomática de «volver la mano» sin eliminar su fuerza judicial. No hubo revisiones previas que alteraran el sentido.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» en esta edición, pero este versículo no contiene el tetragrámaton explícito.
  - «Someteré» conserva mejor el valor causativo de כנע que alternativas más psicológicas como «humillaré».
  - Se mantuvo el paralelismo entre «enemigos» y «adversarios» para reflejar la variación léxica del hebreo.
