translation:
  language: es
  text: hasta cien talentos de plata, y hasta cien coros de trigo, y hasta cien batos de vino, y hasta cien batos de aceite, y sal sin medida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sal, que no está escrita»; es decir, sal sin una cantidad especificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: up to
  chosen_spanish: hasta
  alternatives_spanish:
  - así como
  - hasta el límite de
  lexicon: HALOT
  rationale: En una lista administrativa de provisiones, expresa límite máximo o tope; «hasta» transmite con naturalidad ese valor en español sin perder precisión.
- source_word: כְּסַף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - metal plata
  lexicon: HALOT
  rationale: El hebreo/arameo nombra el metal; en español, «plata» es la forma más natural y fiel para una cantidad pesada en talentos.
- source_word: כַּכְּרִ֣ין
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talentos de peso
  - talen tos
  lexicon: HALOT
  rationale: Conserva la unidad antigua de peso/valor sin convertirla a una medida moderna.
- source_word: חִנְטִין
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: HALOT
  rationale: Designa específicamente el cereal trigo; «grano» sería demasiado general.
- source_word: כֹּרִין
  english_pob_choice: cors
  chosen_spanish: coros
  alternatives_spanish:
  - medidas de coro
  - cors
  lexicon: HALOT
  rationale: Se conserva la unidad antigua mediante la transliteración adaptada al español «coros», reconocible y legible.
- source_word: חֲמַר
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino de uva
  lexicon: HALOT
  rationale: El término denota vino en este contexto de provisiones; no hay base textual para especificar otro tipo.
- source_word: בַּתִּ֣ין
  english_pob_choice: baths
  chosen_spanish: batos
  alternatives_spanish:
  - baths
  - medidas de bato
  lexicon: HALOT
  rationale: Se conserva la medida antigua con una forma castellanizada y comprensible; evita una conversión especulativa.
- source_word: מְשַׁח
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: El texto dice simplemente «aceite»; añadir «de oliva» iría más allá de lo expresado.
- source_word: מְלַח
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal común
  lexicon: HALOT
  rationale: Correspondencia directa y natural del commodity final de la lista.
- source_word: דִּי לָא כְתָב
  english_pob_choice: without limit
  chosen_spanish: sin medida
  alternatives_spanish:
  - sin límite
  - sin especificación
  - lo que no está escrito
  lexicon: HALOT
  rationale: La frase comunica que no se fijó una cantidad determinada para la sal; «sin medida» conserva el sentido administrativo y admite la ambigüedad literal del original. La alternativa más literal se reserva en nota.
theological_decisions:
- issue: Sentido de «sal sin medida» frente al giro más literal «sal, que no está escrita»
  english_pob_reading: without limit; footnote notes the literal idiom and administrative meaning
  chosen_spanish_reading: sal sin medida
  alternative_spanish_readings:
  - sal, que no está escrita
  - sal sin cantidad fijada
  - sal sin límite
  rationale: El inglés POB opta por una equivalencia idiomática y añade nota sobre el valor literal del hebreo/arameo. En español, «sin medida» comunica con claridad la ausencia de cantidad fijada, manteniendo la tensión entre literalidad y sentido administrativo.
  doctrine_reference: No aplica; decisión de fraseología administrativa y textual.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión más reciente; no se requieren cambios respecto del sentido auditado. La versión española conserva la lista de provisiones y la ambigüedad del giro final en una nota breve.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y administrativo, acorde con una orden de provisiones.
  - Se conservan las unidades antiguas sin conversión moderna para reflejar el texto fuente.
  - «Plata» y «aceite» siguen el valor léxico directo del original sin ampliaciones interpretativas.
