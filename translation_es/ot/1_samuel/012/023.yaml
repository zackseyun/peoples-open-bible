base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/012/023.yaml
  text: As for me[a], far be it from me that I should sin against Yahweh by ceasing to pray for you[c][b]; and I will instruct you in the good and upright way.
  footnotes:
  - marker: a
    text: Or 'from ceasing to pray for you.' The Hebrew expresses the sin as stopping intercession on their behalf.
    reason: lexical_alternative
  - marker: b
    text: Or 'teach you' instead of 'instruct you.' The Hebrew verb can include both teaching and directing.
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
