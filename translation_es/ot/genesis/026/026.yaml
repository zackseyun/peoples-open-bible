  to: Entonces Abimelec fue a él de Gerar, con Ahuzat su amigo[a] y Ficol, el comandante de su ejército.
  rationale: 'Se hacen ajustes menores de naturalidad y de formato editorial: «de Gerar» suena más idiomático que «desde Gerar» en español bíblico narrativo, y la marca de nota se mueve a «amigo[a]» para anclar correctamente la alternativa léxica al término pertinente. Se conserva «su amigo» conforme a la revisión auditada del POB inglés.'
