translation:
  language: es
  text: Porque él reconocerá[a] que todos son hijos[b] de su Dios, y los repartirá entre sus tribus sobre la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los conocerá».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hijos» puede entenderse más ampliamente como «hijos e hijas» o «descendientes», aunque el griego más literalmente dice «hijos/sons».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la tierra», si γῆ se toma en un sentido más local.'
    reason: alternative_reading
lexical_decisions:
- source_word: γνώσεται
  english_pob_choice: will recognize
  chosen_spanish: los reconocerá
  alternatives_spanish:
  - los conocerá
  - los reconocerá y aceptará
  lexicon: BDAG
  rationale: Se conserva el sentido relacional de reconocimiento/identificación, más preciso que un simple 'sabrá'. 'Reconocerá' reproduce bien la decisión inglesa de no limitarlo a información mental.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural y el inglés opta por 'sons', en español 'hijos' es la forma natural y puede abarcar la filiación del grupo sin sonar artificial. Se mantiene la tensión de filiación con el matiz covenantal, sin forzar 'hijos varones'.
- source_word: θεοῦ
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - de su Dios
  lexicon: BDAG
  rationale: El posesivo español idiomático requiere 'su Dios'. Se evita añadir artículo inexistente y se conserva la relación posesiva del griego y del inglés auditado.
- source_word: καταμερίσει
  english_pob_choice: will apportion
  chosen_spanish: los repartirá
  alternatives_spanish:
  - los repartirá por partes
  - los asignará
  lexicon: BDAG
  rationale: '''Repartirá'' expresa distribución con claridad en español y mantiene la idea de asignación por porciones. ''Apportion'' no es idiomático aquí; ''repartir'' comunica adecuadamente el reparto tribal.'
- source_word: ἐν ταῖς φυλαῖς αὐτῶν
  english_pob_choice: among their tribes
  chosen_spanish: entre sus tribus
  alternatives_spanish:
  - según sus tribus
  - en sus tribus
  lexicon: BDAG
  rationale: '''Entre sus tribus'' expresa mejor el valor distributivo que ''en'', y conserva la estructura tribal del texto. Es la opción española más natural para la distribución por tribus.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the earth / upon the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad fuente entre 'tierra' en sentido territorial o más amplio, pero con una formulación natural en español. 'Sobre' sigue el valor de ἐπί y evita resolver prematuramente la referencia.
theological_decisions:
- issue: filiación de 'hijos de Dios'
  english_pob_reading: sons of their God
  chosen_spanish_reading: hijos de su Dios
  alternative_spanish_readings:
  - hijos varones de su Dios
  - hijos de Dios
  rationale: El texto griego usa υἱοὶ, y el inglés preserva la filiación masculina. En español, 'hijos' comunica filiación sin necesidad de calco rígido. Se evita introducir una formulación más neutral que pudiera borrar el énfasis lexical del original, pero tampoco se sobrecarga con una marca de género que en español no añade claridad.
  doctrine_reference: Gender-accurate over gender-neutral; preserve source lexical force
- issue: alcance de γῆς
  english_pob_reading: upon the earth / in the land
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - en la tierra
  - en el país
  rationale: El contexto puede sostener tanto una lectura territorial como más amplia. La redacción escogida preserva esa tensión sin resolverla del todo, y permite que 'tierra' funcione en español tanto como tierra/territorio como tierra en sentido amplio.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: distribución tribal
  english_pob_reading: among their tribes
  chosen_spanish_reading: entre sus tribus
  alternative_spanish_readings:
  - según sus tribus
  - por sus tribus
  rationale: La preposición y el verbo indican una asignación ordenada en relación con las tribus. 'Entre' expresa el reparto dentro de ese orden tribal sin perder la dimensión distributiva del pasaje.
  doctrine_reference: Maintain covenant-allotment imagery
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una corrección importante: se eliminó una duplicación accidental y se afirmó la distribución ''among their tribes upon the land''. También se documentó la posibilidad de leer γῆ como ''la tierra'' o ''el país'', con adjudicación reciente favoreciendo el sentido territorial. La versión española sigue ese estado revisado y conserva la ambigüedad útil en ''sobre la tierra''.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se evita 'Cristo' porque no aparece ningún título mesiánico en el texto.
  - Se conserva un registro bíblico digno y claro, sin arcaísmos innecesarios.
  - '''Tierra'' se usa aquí como equivalente funcional de γῆ, sin fijar de antemano si se trata de tierra/territorio o tierra en sentido amplio.'
  - El reparto tribal se expresa con 'entre sus tribus' para reflejar el valor distributivo de ἐν ταῖς φυλαῖς αὐτῶν.
