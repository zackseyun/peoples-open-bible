translation:
  language: es
  text: 'Porque ¿acaso alguno ha dicho a Dios[a]: «He soportado castigo; no volveré a obrar mal»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «He soportado; no volveré a obrar corruptamente». El hebreo deja sin expresar el objeto de «soportado», lo cual puede sugerir castigo, disciplina o culpa soportada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el contexto anterior; en español, «Porque» conserva bien la fuerza causal/explicativa de la partícula.
- source_word: אֶל אֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: HALOT
  rationale: La preposición con אֵל expresa dirección/referencia; en este contexto, «a Dios» es la formulación natural y fiel en español.
- source_word: הֶאָמַר
  english_pob_choice: has anyone said
  chosen_spanish: ¿acaso alguno ha dicho
  alternatives_spanish:
  - ¿ha dicho alguien
  - ¿alguna vez dijo alguien
  lexicon: HALOT
  rationale: El hebreo tiene una forma verbal 3ms, pero el contexto es retórico e indefinido. En español, explicitar el sujeto genérico como «alguno» preserva la fuerza interrogativa sin volver la frase oscura.
- source_word: נָשָׂאתִי
  english_pob_choice: I have borne punishment
  chosen_spanish: He soportado castigo
  alternatives_spanish:
  - He soportado
  - He sufrido castigo
  - He cargado con castigo
  lexicon: HALOT
  rationale: El verbo básico es «llevar/bear/soportar», con objeto elíptico. Dado el contexto de confesión ante Dios, «castigo» hace explícita la elipsis como posibilidad semántica documentada, pero «He soportado» conserva la apertura del hebreo mejor que una traducción excesivamente específica.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Negación estándar.
- source_word: אֶחְבֹּל
  english_pob_choice: I will not offend again
  chosen_spanish: volveré a obrar mal
  alternatives_spanish:
  - volveré a actuar corruptamente
  - volveré a hacer el mal
  lexicon: HALOT
  rationale: El campo semántico aquí apunta a actuar mal/corruptamente. «Obrar mal» comunica bien el valor ético en español natural; se mantiene la idea de renuncia futura implícita en la formulación inglesa «will not offend again».
theological_decisions:
- issue: Objeto implícito de «he soportado» / sentido de la confesión
  english_pob_reading: The Hebrew leaves the object of 'borne' unstated, which may imply punishment, chastisement, or guilt borne.
  chosen_spanish_reading: «He soportado castigo» conserva la interpretación posible de una carga sufrida, sin cerrar por completo la elipsis del hebreo.
  alternative_spanish_readings:
  - «He soportado»
  - «He sufrido castigo»
  - «He cargado con culpa»
  rationale: 'La nota inglesa reconoce una tensión lexical real: el objeto no está expresado. En español, una versión completamente literal («He soportado») sería demasiado oscura; una más explícita («He sufrido castigo») explica una lectura posible, pero «He soportado castigo» mantiene la ambigüedad razonable entre castigo, disciplina o carga moral.'
  doctrine_reference: No aplica como doctrina definida; se trata de una decisión semántica sobre una elipsis hebrea.
translation_notes:
  revision_awareness: El texto sigue el acuerdo de revisión más reciente (sin cambios necesarios) y conserva la apertura semántica del hebreo señalada en el aparato inglés, mientras adapta la frase al español con naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל según el estándar del proyecto.
  - Se usa «obrar mal» en lugar de un calco duro como «actuar corruptamente» por claridad idiomática, sin perder el sentido ético.
  - La nota a pie preserva la alternativa más literal y la ambigüedad del objeto implícito de נָשָׂאתִי.
