translation:
  language: es
  text: Y juzgarán al pueblo en todo tiempo[a]. Entonces, todo asunto grande te lo traerán, pero todo asunto pequeño lo juzgarán ellos mismos. Así será más ligero para ti[b], y llevarán la carga contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todo momento». El hebreo usa una expresión temporal amplia para indicar disponibilidad continua.
    reason: lexical_alternative
  - marker: b
    text: El hebreo expresa un alivio o disminución de peso, no un mandato directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  english_pob_choice: let them judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - que juzguen
  - juzgarán / que juzguen
  lexicon: HALOT
  rationale: El hebreo usa una forma narrativa con valor directivo en contexto exhortativo. En español, «juzgarán» mantiene la secuencia verbal sin forzar un imperativo ajeno al ritmo del hebreo; el valor instructivo queda claro por el contexto de Moisés y Jetró. «Que juzguen» sería más marcadamente exhortativo, pero menos pegado a la forma del texto.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: «Pueblo» refleja la comunidad israelita como colectivo. «Al pueblo de Israel» explicita más de lo que dice el hebreo, y «gente» pierde la referencia comunitaria más formal.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  lexicon: HALOT
  rationale: La expresión temporal apunta a disponibilidad continua para juzgar. «En todo tiempo» conserva la amplitud formal del hebreo; «siempre» es natural, pero un poco más idiomático que literal.
- source_word: כָּל הַדָּבָר הַגָּדֹל
  english_pob_choice: every great matter
  chosen_spanish: todo asunto grande
  alternatives_spanish:
  - todo caso importante
  - todo asunto mayor
  lexicon: HALOT
  rationale: דָּבָר en este contexto es una materia o caso sometido a juicio. Se mantiene «asunto» para no estrecharlo demasiado a un término técnico; «grande» conserva la tensión léxica que el POB inglés preserva con «great matter». Se evita sustituirlo sin más por «importante», porque eso suaviza el contraste textual.
- source_word: יָבִיאוּ אֵלֶיךָ
  english_pob_choice: they shall bring to you
  chosen_spanish: lo traerán a ti
  alternatives_spanish:
  - lo llevarán a ti
  - lo traerán ante ti
  lexicon: HALOT
  rationale: El verbo en hifil expresa llevar/traer algo para presentarlo a Moisés. «Traerán a ti» sigue de cerca la dirección del movimiento; el objeto singular «lo» funciona por referencia a «asunto». «Ante ti» sería posible, pero añade una locución no explícita.
- source_word: כָּל הַדָּבָר הַקָּטֹן
  english_pob_choice: every small matter
  chosen_spanish: todo asunto pequeño
  alternatives_spanish:
  - todo caso menor
  - todo asunto menor
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «asunto grande». «Pequeño» mantiene el contraste lexical directo con «grande», tal como el hebreo y el POB inglés prefieren frente a una interpretación jurídica más técnica.
- source_word: יִשְׁפְּטוּ הֵם
  english_pob_choice: they themselves shall judge
  chosen_spanish: lo juzgarán ellos mismos
  alternatives_spanish:
  - ellos juzgarán
  - ellos mismos lo juzgarán
  lexicon: HALOT
  rationale: El pronombre explícito enfatiza que no será Moisés sino ellos quienes asuman esos casos. «Ellos mismos» conserva ese matiz enfático que el inglés POB marcó con «themselves».
- source_word: וְהָקֵל מֵעָלֶיךָ
  english_pob_choice: So it will be lighter for you
  chosen_spanish: Así te será más liviano
  alternatives_spanish:
  - Así se aliviará sobre ti
  - Así será más ligero para ti
  lexicon: HALOT
  rationale: 'El hebreo expresa un resultado: algo se hará más ligero respecto de Moisés. «Te será más liviano» transmite el valor resultativo sin convertirlo en mandato directo. «Liviano» mantiene la metáfora de peso; «ligero» sería también posible, pero «liviano» suena más natural en este registro.'
- source_word: וְנָשְׂאוּ אִתָּךְ
  english_pob_choice: and they will bear the burden with you
  chosen_spanish: y llevarán la carga contigo
  alternatives_spanish:
  - y soportarán la carga contigo
  - y cargarán contigo
  lexicon: HALOT
  rationale: נָשָׂא tiene el sentido de llevar, cargar, soportar. Dado el contexto judicial, «la carga» expresa el peso implícito que el inglés POB explicitó como «the burden». «Llevarán» conserva el verbo básico; «carga» hace audible la metáfora sin añadir una explicación ajena.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que entendió la cláusula final como resultado («it will be lighter for you») y añadió explícitamente «the burden» en la frase sobre llevar. La redacción española refleja ese mismo resultado con «te será más liviano» y hace explícita la carga implícita con «la carga».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para el nombre divino, pero en este versículo no aparece el tetragrámaton.
  - Se conserva el paralelismo «asunto grande / asunto pequeño» para respetar la tensión lexical del hebreo y del audit trail inglés.
  - Se evita sustituir «juzgar» por términos eclesiásticos o jurídicos más técnicos que no están exigidos por el contexto.
