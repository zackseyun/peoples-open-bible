review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés en casi todos los elementos: אֵלֶּה como apertura de lista, מַסְעֵי como etapas sucesivas del itinerario, בְנֵי יִשְׂרָאֵל como ''hijos de Israel'', la salida de Egipto, לְצִבְאֹתָם con sentido organizativo, y בְּיַד como modismo de agencia/liderazgo. Sin embargo, la colocación de las notas [c][b] en ''compañías'' es incorrecta: la nota b pertenece a ''hijos de Israel'', no a ''compañías''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Etapas del viaje' funciona bien. 'Bajo la mano de' preserva el hebraísmo, aunque suena marcado; la nota lo aclara adecuadamente. El principal problema es técnico-editorial y de anclaje de notas. Además, conviene pulir la nota b, que actualmente ofrece como alternativa 'los hijos de Israel', idéntica al texto principal; debería ofrecer las alternativas reales no escogidas.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Los nombres propios están bien en español. 'Hijos de Israel' respeta la decisión documentada de no aplanar a 'israelitas'. 'Compañías' refleja adecuadamente לְצִבְאֹתָם con alternativa militar en nota.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota b en el texto
    rationale: La nota b explica בְנֵי יִשְׂרָאֵל ('hijos de Israel'), pero en el borrador está colocada junto a 'compañías'. Esto desordena la correspondencia entre texto y notas y puede confundir al lector.
  - severity: low
    issue: Contenido de la nota b mal formulado
    rationale: 'La nota dice ''O los hijos de Israel o los israelitas'', pero ''los hijos de Israel'' ya es la lectura principal. La nota debe listar alternativas reales, p. ej. ''los hijos de Israel'' literal / ''los hijos de Israel'' ya no es alternativa; mejor ''los hijos de Israel'' no se repite y se ofrecen ''los hijos de Israel'' literal ya explicado en la nota inglesa como base, con alternativas ''los hijos de Israel'' no corresponde. En español conviene: ''O los hijos de Israel'' no aplica; las alternativas pertinentes son ''los hijos de Israel'' si el texto principal fuera otro, o aquí ''los israelitas'' y quizá ''los hijos de Jacob'' no está en el audit trail. Lo más fiel es conservar la explicación de literalidad y dar ''los israelitas'' como alternativa idiomática.'
  revised_spanish_text: Estas son las etapas del viaje de los hijos de Israel[b], que salieron de la tierra de Egipto, según sus compañías[c], bajo la mano de Moisés y Aarón[d].
