translation:
  language: es
  text: Cuando se levantaron temprano la mañana siguiente, he aquí, Dagón había caído boca abajo al suelo delante del arca de Yahvé, y la cabeza de Dagón y ambas palmas de sus manos estaban cortadas sobre el umbral; sólo Dagón quedó sobre él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sólo Dagón quedó sobre él», probablemente con el sentido de que sólo quedó el cuerpo o tronco del ídolo después de que su cabeza y sus manos fueron cortadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּ֣מוּ
  english_pob_choice: When they rose early
  chosen_spanish: Cuando se levantaron temprano
  alternatives_spanish:
  - Y se levantaron temprano
  - Y se madrugaron
  lexicon: HALOT
  rationale: El hebreo expresa levantarse temprano; en español, 'levantarse temprano' es natural y conserva el valor narrativo de la acción inicial sin forzar una construcción más pesada.
- source_word: בַבֹּקֶר מִמָּחֳרָת
  english_pob_choice: the next morning
  chosen_spanish: la mañana siguiente
  alternatives_spanish:
  - a la mañana del día siguiente
  - temprano en la mañana del día siguiente
  lexicon: HALOT
  rationale: La combinación hebrea señala la mañana del día siguiente. 'La mañana siguiente' es breve, clara y fiel al sentido temporal.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y he aquí
  lexicon: HALOT
  rationale: '''He aquí'' conserva el giro de sorpresa y el énfasis discursivo del hebreo, con un registro digno y bíblico en español.'
- source_word: נֹפֵל לְפָנָיו אַרְצָה
  english_pob_choice: had fallen facedown on the ground
  chosen_spanish: había caído boca abajo al suelo
  alternatives_spanish:
  - había caído rostro en tierra
  - había caído sobre el suelo
  lexicon: HALOT
  rationale: '''Boca abajo'' comunica el matiz de caída postrada; ''al suelo'' traduce אַרְצָה. La forma compuesta refleja que Dagón ya estaba en ese estado cuando llegaron.'
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  english_pob_choice: before the ark of Yahweh
  chosen_spanish: delante del arca de Yahvé
  alternatives_spanish:
  - frente al arca de Yahvé
  - ante el arca de Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' es la forma espacial más natural y fiel. Se mantiene ''Yahvé'' conforme al criterio del proyecto para יְהוָה.'
- source_word: וְרֹאשׁ דָּגוֹן
  english_pob_choice: the head of Dagon
  chosen_spanish: la cabeza de Dagón
  alternatives_spanish:
  - el cabeza de Dagón
  lexicon: HALOT
  rationale: Traducción directa del sustantivo en constructo; 'cabeza' es el equivalente natural y preciso en español.
- source_word: וּשְׁתֵּי כַּפּוֹת יָדָיו
  english_pob_choice: both the palms of his hands
  chosen_spanish: ambas palmas de sus manos
  alternatives_spanish:
  - las dos palmas de sus manos
  - ambas manos
  lexicon: HALOT
  rationale: '''Palmas'' preserva la especificidad de כַּף como la parte interior de la mano, no sólo la mano en general. ''Ambas'' conserva el dual.'
- source_word: כְּרֻתוֹת
  english_pob_choice: were cut off
  chosen_spanish: estaban cortadas
  alternatives_spanish:
  - habían sido cortadas
  - estaban seccionadas
  lexicon: HALOT
  rationale: El participio pasivo describe un estado resultante. 'Estaban cortadas' transmite el hecho consumado y su estado visible con estilo natural en español.
- source_word: אֶל הַמִּפְתָּן
  english_pob_choice: on the threshold
  chosen_spanish: sobre el umbral
  alternatives_spanish:
  - en el umbral
  - junto al umbral
  lexicon: HALOT
  rationale: '''Sobre el umbral'' corresponde al lugar donde quedaron los miembros cortados y reproduce bien la localización resultante.'
- source_word: רַק דָּגוֹן נִשְׁאַר עָלָיו
  english_pob_choice: only Dagon was left on him
  chosen_spanish: sólo Dagón quedó sobre él
  alternatives_spanish:
  - sólo Dagón quedó en él
  - sólo el cuerpo de Dagón quedó sobre él
  lexicon: HALOT
  rationale: Se conserva la literalidad relativa del hebreo sin introducir 'tronco' ni otra explicación interpretativa. 'Sobre él' refleja el complemento pronominal עָלָיו; el antecedente implícito puede aludir a la estatua restante o al pedestal, y conviene no cerrarlo sin necesidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama directamente. Siguiendo el criterio doctrinal y terminológico del POB en español, se usa 'Yahvé' para preservar el nombre propio del pacto, no un reemplazo litúrgico.
  doctrine_reference: 'DOCTRINE.md: términos en disputa, יְהוָה / YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que corrigió la clausula final para evitar la adición interpretativa ''the trunk''. Por eso el español mantiene una equivalencia sobria: ''sólo Dagón quedó sobre él'', sin introducir explicaciones no presentes en el texto hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Dagón' como transliteración estable del nombre propio.
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - No se añadió 'tronco' ni equivalente interpretativo en la cláusula final, para respetar la revisión del inglés POB.
  - '''Boca abajo'' se eligió para expresar la postura de postración sin perder naturalidad en español.'
  - La puntuación refleja un registro bíblico moderno y publicable en español.
