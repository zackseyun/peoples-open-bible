translation:
  language: es
  text: ¿Puede un hombre hacer dioses para sí?[a] Pero ellos no son dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hace un hombre dioses para sí? Pero ellos no son dioses.»'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲ/יַעֲשֶׂה
  english_pob_choice: Can ... make
  chosen_spanish: ¿Puede ... hacerse
  alternatives_spanish:
  - ¿Hace ...
  - ¿Hará ...
  lexicon: HALOT
  rationale: El interrogativo הֲ con el imperfecto de עשה expresa una pregunta retórica de asombro o incredulidad. En español, «¿Puede ... hacerse» transmite mejor esa fuerza que un presente simple o un futuro, y mantiene el tono retórico del hebreo y del inglés auditado.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: HALOT
  rationale: La preposición ל con sufijo masculino singular funciona aquí de modo reflexivo e idiomático. «Para sí» conserva esa referencia a beneficio/posesión personal sin volver la frase pesada.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - la humanidad
  lexicon: HALOT
  rationale: אָדָם es singular y genérico. «Un hombre» preserva la forma singular representativa del hebreo, como hace el inglés auditado, y suena natural en español bíblico contemporáneo.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - un dios
  - seres divinos
  lexicon: HALOT
  rationale: Aquí el plural se refiere a deidades/ídolos fabricados por humanos. «Dioses» conserva el plural y el contraste polémico del texto; «un dios» borraría esa pluralidad.
- source_word: וְ/הֵמָּה
  english_pob_choice: Yet they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Sin embargo, ellos
  lexicon: HALOT
  rationale: 'La conjunción con el pronombre independiente introduce contraste. «Pero ellos» comunica con claridad la oposición: el ser humano puede fabricar, pero los objetos fabricados no poseen verdadera divinidad.'
- source_word: לֹא אֱלֹהִים
  english_pob_choice: are not gods
  chosen_spanish: no son dioses
  alternatives_spanish:
  - no son Dios
  - no son verdaderos dioses
  lexicon: HALOT
  rationale: El predicado niega su condición divina real. «No son dioses» conserva la fuerza ontológica del hebreo y evita singularizar indebidamente el plural.
theological_decisions:
- issue: Negación de la condición divina real de los ídolos
  english_pob_reading: The verse denies that human-made deities are truly gods.
  chosen_spanish_reading: El versículo niega que las deidades fabricadas por humanos sean realmente dioses.
  alternative_spanish_readings:
  - El versículo se burla de la fabricación de ídolos sin afirmar una negación ontológica más amplia.
  - El versículo dice que no son Dios, en singular.
  rationale: La cláusula final לֹא אֱלֹהִים es una negación directa de su estatus divino. La traducción española conserva esa fuerza polémica sin añadir terminología filosófica ajena al texto.
  doctrine_reference: Anti-idolatría profética; monoteísmo bíblico
- issue: Valor retórico de la pregunta
  english_pob_reading: Can a man make gods for himself?
  chosen_spanish_reading: ¿Puede un hombre hacerse dioses para sí?
  alternative_spanish_readings:
  - ¿Hace un hombre dioses para sí?
  - ¿Se puede hacer un hombre dioses para sí?
  rationale: La pregunta hebrea es retórica e incrédula. «¿Puede un hombre hacerse dioses para sí?» reproduce ese efecto en español sin perder la acusación implícita contra la idolatría humana.
  doctrine_reference: Retórica profética; idolatría
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no modificó el texto; el acuerdo de revisión fue alto. Por eso se conserva la lectura auditada principal: pregunta retórica con contraste final y negación explícita de la divinidad de los ídolos.'
  spanish_consistency_notes:
  - Se mantiene «dioses» en plural para אֱלֹהִים, siguiendo el valor polémico del contexto.
  - Se evita «SEÑOR» o «Dios» como sustitutos del plural hebreo, porque aquí no hay el tetragrámaton ni un uso singular de אלֹהִים.
  - Se conserva un español bíblico claro y moderno, sin arcaísmo innecesario.
