translation:
  language: es
  text: Yahvé habló a Moisés y a Aarón[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “YHWH”. Tradicionalmente se vierte “el SEÑOR” en muchas traducciones al español.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: El hebreo introduce una nueva fórmula narrativa de habla divina. En español, 'habló' comunica con naturalidad ese evento de habla solemne sin perder la precisión formal del verbo de discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma española 'Yahvé', que refleja la decisión doctrinal del proyecto de no sustituir el Tetragrámaton por un título. 'El SEÑOR' ocultaría el nombre; 'Jehová' no es la forma adoptada por el POB en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, 'a' es el equivalente natural y preciso para introducir el complemento de persona.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: nombre propio
  rationale: Se emplea la forma castellana estable del nombre propio bíblico.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y a
  - a
  lexicon: HALOT
  rationale: El hebreo coordina explícitamente un segundo destinatario; 'y a' preserva tanto la coordinación como el valor direccional del complemento.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aarón
  lexicon: nombre propio
  rationale: Se usa la forma castellana estable del nombre propio bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - diciendo,
  - y dijo
  lexicon: HALOT
  rationale: La construcción infinitiva introduce la fórmula de discurso que enlaza con la sección siguiente. 'Diciendo,' preserva la función formal sin añadir paráfrasis.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión teológica y textual del POB de transparentar el Tetragrámaton como nombre propio en lugar de sustituirlo por una титulación. 'Yahvé' es la forma española estándar dentro de este proyecto para ese nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto coincide con el marco auditado del inglés POB: verbo de habla en fórmula narrativa, preservación del nombre divino y coordinación explícita de los dos destinatarios. No se requieren revisiones adicionales respecto del pasaje fuente.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' como sustituto del Tetragrámaton para mantener la transparencia del nombre divino.
  - '''Yahvé'' se usa como forma española del nombre propio divino, coherente con la política terminológica del proyecto.'
  - La coordinación 'a Moisés y a Aarón' reproduce el hebreo אֶל ... וְאֶל sin nivelar la estructura.
  - '''Diciendo,'' conserva la función de introducción al discurso siguiente sin expansión interpretativa.'
