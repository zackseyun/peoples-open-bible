translation:
  language: es
  text: Entonces Jonás oró a Yahvé, su Dios, desde el vientre del pez[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde las entrañas del pez»; «vientre» es una traducción contextualmente natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: Then ... prayed
  chosen_spanish: Entonces ... oró
  alternatives_spanish:
  - Y ... oró
  - Y comenzó a orar
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo secuencial. En español, «Entonces» conserva bien esa sucesión sin forzar un calco; «oró» expresa de modo natural el hitpael de פלל en este contexto.
- source_word: יוֹנָה
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonah
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma usual en español bíblico, «Jonás», que es plenamente reconocible y natural para lectores en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Con verbos de oración, la preposición direccional se expresa naturalmente en español como «a».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma española establecida por el proyecto, «Yahvé», en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona singular se refleja con «su Dios», manteniendo la relación de pacto y pertenencia personal de Jonás.
- source_word: מִמְּעֵי
  english_pob_choice: from the belly
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde las entrañas
  - desde el interior
  lexicon: HALOT
  rationale: מֵעֶה puede significar entrañas, interior o vientre. Dado el pez como contexto, «vientre» comunica de forma clara y natural la imagen corporal sin añadir información no presente.
- source_word: הַדָּגָה
  english_pob_choice: the fish
  chosen_spanish: del pez
  alternatives_spanish:
  - del pez grande
  - del pescado
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pez», sin importar el adjetivo «grande» de 1:17. «Pez» mantiene la referencia concreta y evita añadir un rasgo no expresado aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. La lectura española del proyecto preserva el nombre revelado de Dios como «Yahvé», evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la secuencia narrativa de wayyiqtol, la referencia precisa al Tetragrámaton y la decisión de traducir מֵעֶה de forma idiomática según el contexto del pez. No se requieren cambios respecto del criterio base; la versión española conserva esas decisiones con equivalentes naturales en español.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto para el nombre divino: «Yahvé».'
  - Se evita introducir «gran pez» porque el hebreo de este versículo no lo dice explícitamente.
  - «Vientre» refleja bien el campo semántico de מֵעֶה en este contexto, mientras que la nota preserva la alternativa literal «entrañas».
  - «Oró» es preferible a un calco como «pregonó» o a una paráfrasis más amplia, porque corresponde al sentido verbal del hitpael aquí.
