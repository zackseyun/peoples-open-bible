id: 1SA.25.7
reference: 1 Samuel 25:7
source:
  edition: WLC
  text: וְ/עַתָּ֣ה שָׁמַ֔עְתִּי כִּ֥י גֹזְזִ֖ים לָ֑/ךְ עַתָּ֗ה הָ/רֹעִ֤ים אֲשֶׁר לְ/ךָ֙ הָי֣וּ עִמָּ֔/נוּ לֹ֣א הֶכְלַמְנ֗וּ/ם וְ/לֹֽא נִפְקַ֤ד לָ/הֶם֙ מְא֔וּמָה כָּל יְמֵ֖י הֱיוֹתָ֥/ם בַּ/כַּרְמֶֽל־־־׃
translation:
  text: And now I have heard that you have shearers. Now your shepherds[a], who were with us, we did not mistreat, and nothing of theirs was missing all the days they were in Carmel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'we did not shame them.' The Hebrew can denote causing disgrace; in context it refers to not harming or abusing Nabal's shepherds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the present appeal; 'And now' preserves the Hebrew connective plus temporal transition.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Perfect used with present relevance in direct speech; English present perfect fits the sense that David has recently received this report.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces reported content after 'I have heard'; 'that' is the most natural English complementizer here.
- source_word: גֹזְזִים לָךְ
  chosen: you have shearers
  alternatives:
  - they are shearing for you
  - your sheep are being shorn
  lexicon: HALOT
  rationale: The participle 'shearing' with second-person dative idiomatically refers to Nabal's sheepshearing season. 'You have shearers' is concise and natural while preserving the event reference.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Second occurrence marks the immediate application of the report to David's request; retained for the rhetoric of the speech.
- source_word: הָרֹעִים אֲשֶׁר לְךָ
  chosen: your shepherds
  alternatives:
  - the shepherds who belong to you
  lexicon: HALOT
  rationale: Constructed naturally in English as a possessive while preserving the referent.
- source_word: הָיוּ עִמָּנוּ
  chosen: who were with us
  alternatives:
  - were among us
  - stayed with us
  lexicon: HALOT
  rationale: Simple relational statement; 'with us' best matches עִם without overinterpreting duration or lodging.
- source_word: לֹא הֶכְלַמְנוּם
  chosen: we did not mistreat
  alternatives:
  - we did not shame them
  - we did not insult them
  - we did not humiliate them
  lexicon: HALOT
  rationale: The Hiphil of כלם here conveys causing disgrace or harm. In this pastoral-protection context, 'mistreat' captures the practical sense better than the more literal but potentially misleading 'shame'.
- source_word: וְלֹא נִפְקַד לָהֶם מְאוּמָה
  chosen: and nothing of theirs was missing
  alternatives:
  - and not anything was lacking to them
  - and nothing was lost to them
  lexicon: HALOT
  rationale: נפקד in this passive/Niphal context means to be missing or unaccounted for. 'Nothing of theirs was missing' clearly expresses that no property was lost while under David's protection.
- source_word: כָּל יְמֵי הֱיוֹתָם
  chosen: all the days they were
  alternatives:
  - throughout the time they were
  - all the time they were
  lexicon: HALOT
  rationale: Keeps the temporal idiom close to the Hebrew while remaining idiomatic English.
- source_word: בַּכַּרְמֶל
  chosen: in Carmel
  alternatives:
  - at Carmel
  lexicon: HALOT
  rationale: Refers to the place-name Carmel in Judah, not the common noun 'orchard/vineyard.' 'In Carmel' is the most straightforward locative rendering.
