revisions:
- from: 'Así que sus siervos le dijeron: «Que busquen para mi señor el rey una joven virgen, y que ella esté delante del rey y sea su cuidadora[a], y que se acueste en tu seno[b], para que mi señor el rey se caliente».'
  to: 'Entonces sus siervos le dijeron: «Que busquen para mi señor el rey una joven virgen, y que esté delante del rey[a] y sea su cuidadora[b], y que se acueste en tu seno[c], para que mi señor el rey entre en calor».'
  rationale: La revisión mantiene el sentido del hebreo y la formulación principal del POB, pero añade la nota faltante sobre el modismo «estar delante del rey», corrige la nota de «cuidadora» para alinearla con las alternativas auditadas, elimina un pronombre innecesario y ajusta la cláusula final a un español más natural («entre en calor») sin cambiar el sentido.
