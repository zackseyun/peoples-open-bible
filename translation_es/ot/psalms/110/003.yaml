  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no incluye Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas clave respetan la filosofía de optimal equivalence y la cautela teológica documentada para el último colon.
