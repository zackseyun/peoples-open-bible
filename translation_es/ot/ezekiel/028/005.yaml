    reason: lexical_alternative
  - marker: c
    text: La palabra hebrea traducida aquí «riqueza» también puede significar «riquezas», «recursos» o, en algunos contextos, «fuerza/poder».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. La única reparación necesaria es corregir la nota [a] para que preserve alternativas reales al hebreo רְכֻלָּה sin duplicar la lectura adoptada en el cuerpo del versículo.
