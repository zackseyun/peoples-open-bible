translation:
  language: es
  text: Y estos odres de vino, que llenamos cuando eran nuevos, y he aquí, se han reventado[a]; y estas nuestras vestiduras y nuestras sandalias se han gastado por lo extremadamente largo del camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han abierto» o «se han partido»; el hebreo describe odres que se han rajado o reventado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la mucha cantidad del camino, mucho», es decir, por la gran longitud del viaje.
    reason: source_note
lexical_decisions:
- source_word: נֹאדוֹת הַיַּיִן
  english_pob_choice: wineskins
  chosen_spanish: odres de vino
  alternatives_spanish:
  - odres
  - pieles de vino
  - bolsas de vino
  lexicon: HALOT
  rationale: נֹאד designa un recipiente de piel para líquidos. En español, «odres» conserva el sentido material y tradicional sin introducir «botellas», que sería anacrónico. «De vino» explicita el contenido como en el hebreo.
- source_word: מִלֵּאנוּ
  english_pob_choice: we filled
  chosen_spanish: llenamos
  alternatives_spanish:
  - habíamos llenado
  - habíamos puesto
  lexicon: HALOT
  rationale: El verbo significa simplemente «llenar». El pretérito simple funciona bien en el discurso citado y evita sobrecargar la relación temporal.
- source_word: חֲדָשִׁים
  english_pob_choice: when they were new
  chosen_spanish: cuando eran nuevos
  alternatives_spanish:
  - nuevos
  - recién hechos
  lexicon: HALOT
  rationale: En español, «cuando eran nuevos» comunica de forma natural que el estado de novedad se refiere a los odres en el momento en que fueron llenados.
- source_word: וְהִנֵּה
  english_pob_choice: look
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y mira
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención. «He aquí» conserva esa fuerza demostrativa con registro solemne y bíblico, sin perder claridad.
- source_word: הִתְבַּקָּעוּ
  english_pob_choice: have burst
  chosen_spanish: se han reventado
  alternatives_spanish:
  - se han abierto
  - se han partido
  lexicon: HALOT
  rationale: El valor resultativo del verbo describe odres que se han abierto o roto por presión/uso. «Se han reventado» es natural para recipientes y mantiene la imagen concreta.
- source_word: שַׂלְמוֹתֵינוּ
  english_pob_choice: our garments
  chosen_spanish: nuestras vestiduras
  alternatives_spanish:
  - nuestras ropas
  - nuestras prendas
  lexicon: HALOT
  rationale: «Vestiduras» es más formal y acorde con el registro narrativo; conserva el sentido de ropa exterior sin reducirlo a una expresión demasiado coloquial.
- source_word: וּנְעָלֵינוּ
  english_pob_choice: our sandals
  chosen_spanish: nuestros sandalias
  alternatives_spanish:
  - nuestros zapatos
  - nuestros calzados
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a sandalias. Se prefiere ese término por precisión histórica; en la cadena «vestiduras y sandalias» se mantiene el paralelo del texto fuente.
- source_word: בָּלוּ
  english_pob_choice: have worn out
  chosen_spanish: se han gastado
  alternatives_spanish:
  - se han desgastado
  - se han envejecido
  lexicon: HALOT
  rationale: El verbo indica desgaste por uso. «Se han gastado» transmite con naturalidad el estado resultante de la caminata larga.
- source_word: מֵרֹב הַדֶּרֶךְ מְאֹד
  english_pob_choice: from the journey being very long
  chosen_spanish: por lo largo del camino
  alternatives_spanish:
  - a causa del largo camino
  - por lo muy largo del camino
  lexicon: HALOT
  rationale: La frase hebrea expresa causalidad debida a la gran extensión del viaje. «Por lo largo del camino» resume esa causa de manera idiomática en español, manteniendo el énfasis en la duración.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado varias veces en la cláusula final para reflejar con mayor directez la causalidad de מֵרֹב הַדֶּרֶךְ מְאֹד. La versión española sigue esa misma decisión de sentido: expresa la causa de manera natural («por lo largo del camino») sin perder el matiz de gran extensión del viaje. También se mantuvo la imagen concreta de los odres que se rompen, frente a una paráfrasis más abstracta.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Odres» conserva la terminología material del original y evita la domesticación a «botellas».
  - Se usó «vestiduras» y «sandalias» para respetar el registro narrativo y la precisión cultural del texto.
  - La causalidad final se formula de manera idiomática, pero sin borrar la idea de que el camino fue extraordinariamente largo.
