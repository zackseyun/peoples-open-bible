  to: El rey de Babilonia los golpeó y les dio muerte en Ribla, en la tierra de Hamat[a]. Así, Judá fue llevado al exilio[b] de su tierra.
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad: «les dio muerte» preserva mejor el segundo verbo sin sonar forzado; «de su tierra» evita sobretraducción; y la nota sobre la voz activa/pasiva se mueve al verbo final, donde corresponde.'
