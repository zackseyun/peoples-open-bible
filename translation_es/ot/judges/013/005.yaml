translation:
  language: es
  text: Porque he aquí, estás embarazada y darás a luz un hijo. Ninguna navaja de afeitar pasará sobre su cabeza, porque el niño será nazareo de Dios desde el vientre, y él comenzará a salvar[a] a Israel de la mano de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a librar». El verbo hebreo puede significar «salvar» o «librar», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he ahí
  lexicon: HALOT
  rationale: La partícula deíctica introduce un anuncio solemne. «He aquí» conserva ese énfasis de llamada de atención mejor que opciones más planas y mantiene un tono bíblico natural en español.
- source_word: הָרָה
  english_pob_choice: pregnant
  chosen_spanish: concebirás
  alternatives_spanish:
  - estás encinta
  - estarás embarazada
  lexicon: HALOT
  rationale: Aunque el hebreo describe un estado presente, el contexto inmediato es de anuncio de concepción y parto; en español, «concebirás y darás a luz» reproduce mejor la secuencia del original que una formulación estática. Se evita sobrecargar con una paráfrasis moderna.
- source_word: וְיֹלַדְתְּ בֵּן
  english_pob_choice: will bear a son
  chosen_spanish: darás a luz un hijo
  alternatives_spanish:
  - parirás un hijo
  - tendrás un hijo
  lexicon: HALOT
  rationale: La expresión hebrea apunta al nacimiento futuro. «Darás a luz un hijo» es claro y digno en español; conserva la relación directa entre concepción y parto sin diluir el verbo concreto.
- source_word: מוֹרָה
  english_pob_choice: razor
  chosen_spanish: navaja
  alternatives_spanish:
  - razor
  - hoja de afeitar
  lexicon: HALOT
  rationale: En el contexto nazareo, el objeto prohibido es una herramienta de corte para rasurar. «Navaja» comunica la idea de manera natural en español contemporáneo; «razor» sería un préstamo innecesario y «hoja de afeitar» puede sonar demasiado moderno o técnico.
- source_word: לֹא יַעֲלֶה עַל רֹאשׁוֹ
  english_pob_choice: shall come upon his head
  chosen_spanish: No subirá ... sobre su cabeza
  alternatives_spanish:
  - No tocará su cabeza
  - No será usada sobre su cabeza
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de «subir sobre» para reflejar el hebreo sin desdibujar la prohibición. En español, «no subirá navaja sobre su cabeza» mantiene la construcción idiomática y la fuerza legal del mandato.
- source_word: נְזִיר אֱלֹהִים
  english_pob_choice: a Nazirite of God
  chosen_spanish: nazareo de Dios
  alternatives_spanish:
  - nazir de Dios
  - uno consagrado a Dios
  lexicon: HALOT
  rationale: «Nazareo» es el término asentado en español para este voto/consecración técnica y preserva la especificidad institucional del hebreo. Se mantiene «de Dios» para reflejar el genitivo explícito y no generalizarlo a una simple consagración.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el hijo
  lexicon: HALOT
  rationale: En este contexto de promesa prenatal, «el niño» funciona de modo natural y no adelanta una edad mayor. Evita la ambigüedad de «muchacho», que puede sonar posterior al nacimiento.
- source_word: מִן הַבָּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el vientre materno
  lexicon: HALOT
  rationale: El hebreo enfatiza la consagración prenatal. «Desde el vientre» reproduce esa imagen con claridad y dignidad; «desde el seno materno» es posible, pero algo más explicativo.
- source_word: יָחֵל
  english_pob_choice: will begin
  chosen_spanish: comenzará
  alternatives_spanish:
  - empezará
  lexicon: HALOT
  rationale: El verbo marca el inicio, no la culminación, de la liberación. «Comenzará» preserva ese límite narrativo importante en el texto y evita sugerir que la obra quedará completada por completo.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to save
  chosen_spanish: a salvar
  alternatives_spanish:
  - a librar
  - a rescatar
  lexicon: HALOT
  rationale: Se conserva «salvar» como traducción básica del verbo, tal como en la POB inglesa. En español también deja abierta la posibilidad contextual de «librar/deliver», sin imponer una lectura más interpretativa.
- source_word: מִיַּד פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de la mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  - de manos de los filisteos
  lexicon: HALOT
  rationale: La expresión hebrea «mano» es un modismo de dominio o poder. «De la mano de» conserva la imagen y la conexión intertextual bíblica, aunque en español pueda leerse también como liberación de su control.
theological_decisions:
- issue: Consagración nazarea prenatal
  english_pob_reading: a Nazirite of God from the womb
  chosen_spanish_reading: nazareo de Dios desde el vientre
  alternative_spanish_readings:
  - uno consagrado a Dios desde el vientre
  - nazareo de Dios desde el nacimiento
  rationale: El hebreo usa el término técnico נְזִיר, por lo que la traducción principal conserva la institución específica. «Desde el vientre» mantiene la tensión teológica de una consagración anterior al nacimiento, sin convertirla en una formulación más general que perdería precisión.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Alcance de la liberación de Sansón
  english_pob_reading: he will begin to save Israel
  chosen_spanish_reading: él comenzará a salvar a Israel
  alternative_spanish_readings:
  - él salvará a Israel
  - él comenzará a librar a Israel
  rationale: 'El hebreo יָחֵל indica comienzo, no consumación. La redacción en español preserva esa limitación narrativa y teológica: Sansón inicia la liberación, pero no la completa. Esto evita sobretraducir el valor del verbo.'
  doctrine_reference: Translation philosophy §§1, 3
- issue: Término para el objeto prohibido sobre la cabeza
  english_pob_reading: No razor shall come upon his head
  chosen_spanish_reading: No subirá navaja sobre su cabeza
  alternative_spanish_readings:
  - No pasará navaja sobre su cabeza
  - No se usará navaja sobre su cabeza
  rationale: La imagen hebrea es literal y conviene conservarla. «Subirá» reproduce el movimiento vertical del original y deja intacta la fuerza del mandato nazareo. Se evita neutralizar la expresión con una equivalencia demasiado explicativa.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: La POB inglesa revisó 'you are pregnant' a 'you shall conceive' para reflejar con mayor precisión la secuencia del hebreo. En español se siguió esa corrección con «concebirás y darás a luz un hijo», evitando una formulación estática que adelantaría el estado como ya presente. También se respetó la decisión auditada de mantener el verbo como inicio de la liberación («comenzará a salvar»), no como liberación completa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí el hebreo usa אֱלֹהִים, no el tetragrámaton.
  - Se eligió «nazareo» como término técnico estable y no «nazir» o una paráfrasis general.
  - Se preservó «salvar» en lugar de «liberar/librar» para seguir la decisión auditada del POB inglés, dejando la alternativa semántica en la nota.
  - 'La puntuación sigue el flujo del anuncio en dos miembros: concepción/nacimiento y luego restricciones/propósito.'
  - Se evitó traducir «de la mano» como mera 'del poder' en el texto principal para conservar la imagen hebrea.
