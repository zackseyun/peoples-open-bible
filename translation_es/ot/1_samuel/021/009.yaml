translation:
  language: es
  text: 'Y David dijo a Ahimelec[a]: «¿No hay aquí, bajo tu mano, una lanza o una espada? Porque no tomé mi espada ni mis armas[b] en mi mano, porque el asunto del rey[c] era urgente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «bajo tu mano», un modismo que puede significar «a tu disposición» o «en tu posesión».'
    reason: lexical_alternative
  - marker: b
    text: O «mi espada y mi equipo»; el término hebreo puede referirse de manera amplia a implementos o equipo, y aquí probablemente a armas.
    reason: lexical_alternative
  - marker: c
    text: O «el negocio del rey» o «la orden del rey»; el hebreo «palabra/materia/asunto» es más amplio que una sola opción en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: WLC wayyiqtol narrativo
  rationale: Conservo la coordinación narrativa simple del hebreo sin sobrecargar el movimiento temporal; en español, «Y dijo» mantiene la fluidez y el enlace directo con la escena anterior.
- source_word: לַאֲחִימֶלֶךְ
  english_pob_choice: to Ahimelech
  chosen_spanish: a Ahimelec
  alternatives_spanish:
  - a Ahimeleq
  lexicon: Transliteración propia de nombres
  rationale: Uso la forma española usual del nombre, ajustando la terminación para la lectura en español, sin perder la identificación del personaje.
- source_word: וְאִין יֶשׁ
  english_pob_choice: Is there not
  chosen_spanish: ¿No hay
  alternatives_spanish:
  - ¿No existe
  - ¿No está
  lexicon: Construcción existencial negativa
  rationale: La doble estructura existencial hebrea se expresa de manera natural en español con una pregunta negativa simple. «¿No hay?» preserva la fuerza interrogativa y la búsqueda de disponibilidad.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT 6311
  rationale: «Aquí» es el equivalente locativo más natural y directo en español.
- source_word: תַּחַת יָדְךָ
  english_pob_choice: under your hand
  chosen_spanish: bajo tu mano
  alternatives_spanish:
  - a tu disposición
  - en tu poder
  - en tu posesión
  lexicon: HALOT 8478 + 3027
  rationale: Conservo el modismo corporal del hebreo, que en este contexto puede significar disponibilidad o posesión. «Bajo tu mano» mantiene la imagen sin cerrar del todo la tensión semántica.
- source_word: חֲנִית אוֹ חָרֶב
  english_pob_choice: a spear or a sword
  chosen_spanish: una lanza o una espada
  alternatives_spanish:
  - una jabalina o una espada
  lexicon: HALOT 2595 + 2719
  rationale: «Lanza» expresa bien חֲנִית en español bíblico y moderno; «espada» corresponde directamente a חָרֶב.
- source_word: גַם חַרְבִּי וְגַם כֵּלַי
  english_pob_choice: my sword or my weapons
  chosen_spanish: mi espada ni mis armas[b]
  alternatives_spanish:
  - mi espada y mis armas
  - mi espada y mi equipo
  lexicon: HALOT 2719 + 3627
  rationale: En contexto militar, כֵּלִים puede abarcar armas o equipo. Opto por «armas» para que el lector entienda el conjunto bélico sin exagerar hacia «equipo»; la nota conserva la amplitud del término hebreo. Además, en español el paralelismo «no tomé mi espada ni mis armas» suena natural y refleja la negación total.
- source_word: לֹא לָקַחְתִּי בְיָדִי
  english_pob_choice: I did not take ... in my hand
  chosen_spanish: no tomé ... en mi mano
  alternatives_spanish:
  - no llevé
  - no traje conmigo
  lexicon: HALOT 3947 + 3027
  rationale: Mantengo la idiomática concreta «en mi mano» para conservar la imagen hebrea, tal como hace la POB inglesa.
- source_word: דְבַר הַמֶּלֶךְ
  english_pob_choice: the king’s matter
  chosen_spanish: el asunto del rey
  alternatives_spanish:
  - el negocio del rey
  - la palabra del rey
  - la orden del rey
  lexicon: HALOT 1697
  rationale: «דָּבָר» aquí es más amplio que una mera orden verbal; «asunto» preserva esa amplitud y encaja con el contexto de una misión urgente.
- source_word: נָחוּץ
  english_pob_choice: urgent
  chosen_spanish: urgente
  alternatives_spanish:
  - apremiante
  - apresurado
  lexicon: HALOT 5169
  rationale: «Urgente» comunica bien la presión de tiempo que motiva la omisión de armas, sin añadir matices no presentes.
theological_decisions:
- issue: Preservación del modismo hebreo «bajo tu mano» frente a una equivalencia más interpretativa
  english_pob_reading: under your hand can mean at your disposal or in your possession
  chosen_spanish_reading: bajo tu mano, con nota de posible sentido de disponibilidad o posesión
  alternative_spanish_readings:
  - a tu disposición
  - en tu posesión
  - en tu poder
  rationale: La expresión hebrea tiene una carga idiomática concreta que no conviene diluir del todo. Mantenerla en el texto principal y explicarla en nota conserva la huella del original y permite al lector ver la tensión semántica.
  doctrine_reference: Principio de transparencia textual y fidelidad al modismo original
- issue: Alcance de כֵּלַי en contexto militar
  english_pob_reading: my weapons / my gear/equipment
  chosen_spanish_reading: mis armas
  alternative_spanish_readings:
  - mi equipo
  - mis utensilios
  rationale: El contexto de armas en la escena favorece una lectura bélica. «Armas» es lo bastante amplio para representar el conjunto sin forzar «equipo», pero la nota mantiene la posibilidad semántica más extensa del hebreo.
  doctrine_reference: Fidelidad léxica contextual sin borrar ambigüedad documentada
- issue: Amplitud de דְבַר הַמֶּלֶךְ
  english_pob_reading: the king’s matter / business / command
  chosen_spanish_reading: el asunto del rey
  alternative_spanish_readings:
  - el negocio del rey
  - la orden del rey
  - la palabra del rey
  rationale: «Asunto» conserva la amplitud de דבר y no restringe indebidamente la explicación de David a una simple orden verbal. Esto mantiene la ambigüedad documentada por la POB inglesa.
  doctrine_reference: Respeto por la polisemia del hebreo bíblico
- issue: Concordancia del nombre propio Ahimelech en español
  english_pob_reading: Ahimelech
  chosen_spanish_reading: Ahimelec
  alternative_spanish_readings:
  - Ahimeleq
  rationale: Se adopta la forma española comúnmente inteligible, adecuada para lectura eclesial, sin alterar la identidad del personaje.
  doctrine_reference: Convención onomástica española
- issue: Tensión entre literalidad y fluidez en la enumeración de armas
  english_pob_reading: my sword or my weapons
  chosen_spanish_reading: mi espada ni mis armas
  alternative_spanish_readings:
  - mi espada y mis armas
  - mi espada o mis armas
  rationale: Aunque el hebreo usa coordinación, en español la negación total se comunica de forma más natural con «ni... ni...». Esto no cambia el contenido; solo adapta la sintaxis para que la frase sea idiomática y clara.
  doctrine_reference: Equivalencia óptima en sintaxis negativa española
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios posteriores relevantes; la traducción mantiene la lectura óptima-equivalente con conservación de las ambigüedades documentadas en el original.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «armas» para כֵּלַי en el texto principal, con nota para preservar la amplitud del término.
  - Se preserva la imagen corporal «bajo tu mano» por tratarse de un modismo hebreo significativo.
  - Se evita traducir mecánicamente «דָּבָר» como «palabra» para no estrechar indebidamente el sentido contextual.
