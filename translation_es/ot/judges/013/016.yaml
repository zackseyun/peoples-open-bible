  rationale: La revisión recoloca correctamente la nota sobre «pan», restaura en el texto principal el complemento «a Yahvé» exigido por el hebreo, y mejora la naturalidad y fidelidad de la secuencia sacrificial con «preparas ... ofrécelo».
