translation:
  language: es
  text: Entró como un padre en la casa de sus hijos[a] en paz; afirmó sus pies con gran seguridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa de sus hijos» en sentido posesivo más idiomático, es decir, «la casa de sus hijos». El griego puede leerse de manera más formal («la casa de sus hijos») o más posesiva («la casa de sus hijos»), y el español aquí conserva esa ambigüedad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con gran seguridad» o «con gran firmeza». La cláusula puede expresar que afirmó sus pies de manera segura, es decir, que quedó firmemente establecido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - se introdujo
  - vino
  lexicon: BDAG
  rationale: El aoristo de entrada se expresa de forma natural y directa con «entró», manteniendo el sentido narrativo sin añadir matices innecesarios.
- source_word: ὡς πατὴρ
  english_pob_choice: like a father
  chosen_spanish: como un padre
  alternatives_spanish:
  - como padre
  - así como un padre
  lexicon: BDAG
  rationale: «Como un padre» conserva la comparación explícita de ὡς sin convertirla en identidad literal ni en una función más fuerte de la que el griego exige.
- source_word: οἶκον υἱῶν αὐτοῦ
  english_pob_choice: the house of his sons
  chosen_spanish: la casa de sus hijos
  alternatives_spanish:
  - la casa de sus hijos[a]
  - la casa de sus hijos varones
  - el hogar de sus hijos
  lexicon: BDAG
  rationale: «Casa» reproduce con cercanía οἶκον y mantiene la imagen concreta. «Sus hijos» es la forma más natural en español para υἱῶν en este contexto, sin forzar la especificación de ‘varones’ salvo que el contexto la requiera.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: BDAG
  rationale: «En paz» es la equivalencia idiomática más natural en español y preserva el valor de estado de la expresión sin paraphrasear.
- source_word: ἔστησεν τοὺς πόδας αὐτοῦ
  english_pob_choice: he planted his feet
  chosen_spanish: plantó sus pies
  alternatives_spanish:
  - puso sus pies
  - afirmó sus pies
  - estableció sus pies
  lexicon: BDAG
  rationale: La imagen corporal se conserva con «plantó sus pies», que refleja bien el efecto de firmeza/establecimiento que la revisión inglesa ya destacó para ἔστησεν, sin alejarse del gesto concreto.
- source_word: μετὰ ἀσφαλείας πολλῆς
  english_pob_choice: with great security
  chosen_spanish: con gran seguridad
  alternatives_spanish:
  - con mucha seguridad
  - con gran seguridad y firmeza
  - con mucha protección
  lexicon: BDAG
  rationale: «Seguridad» reproduce el campo semántico de ἀσφάλεια. «Con gran seguridad» mantiene la construcción nominal y el intensificador πολλῆς, a la vez que suena natural en español.
translation_notes:
  revision_awareness: La versión inglesa revisó la cláusula final de «set his feet» a «planted his feet» para expresar mejor el matiz de firmeza de ἔστησεν; el español adopta desde el inicio «plantó sus pies» para reflejar esa decisión revisada y conservar la imagen corporal. También se preserva la ambigüedad del sintagma οἶκον υἱῶν αὐτοῦ con una redacción que puede leerse de modo literal o posesivo sin perder naturalidad.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí una forma del nombre divino.
  - Se mantiene un registro digno y bíblico, pero con español natural.
  - «Hijos» se usa como equivalente más fluido de υἱῶν en este contexto, sin imponer una especificación doctrinal o de género que el verso no exige explícitamente.
