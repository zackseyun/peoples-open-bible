translation:
  language: es
  text: y un tercio estará en la puerta de Sur, y un tercio en la puerta detrás de los corredores[a]; y ustedes mantendrán vigilancia sobre la casa para impedir la intrusión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los guardias» o «los corredores reales»; el hebreo dice literalmente «los corredores».
    reason: lexical_alternative
  - marker: b
    text: El sentido del término hebreo traducido aquí como «para impedir la intrusión» es incierto; también puede entenderse como «para defensa» o «para impedir la entrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁלִשִׁית
  english_pob_choice: and a third
  chosen_spanish: y un tercio
  alternatives_spanish:
  - y la tercera parte
  - y el tercer grupo
  lexicon: HALOT
  rationale: El ordinal femenino con artículo funciona distributivamente en el contexto, como una de tres divisiones de vigilancia. En español, «un tercio» expresa con naturalidad esa distribución sin introducir una noción más técnica que el hebreo no exige.
- source_word: בְּשַׁעַר סוּר
  english_pob_choice: at the Sur Gate
  chosen_spanish: en la puerta de Sur
  alternatives_spanish:
  - en la puerta Sur
  - en la puerta de Súr
  lexicon: HALOT
  rationale: שַׁעַר es «puerta». סוּר se toma mejor como nombre propio del lugar, por eso se translitera como «Sur». Se usa «de Sur» para mantener claro que se trata de una puerta asociada a ese nombre.
- source_word: בַּשַּׁעַר אַחַר הָרָצִים
  english_pob_choice: at the gate behind the runners
  chosen_spanish: en la puerta detrás de los corredores
  alternatives_spanish:
  - en la puerta detrás de los corredores reales
  - en la puerta detrás de los guardias
  lexicon: HALOT
  rationale: אַחַר normalmente significa «detrás / después». הָרָצִים literalmente significa «los corredores» o «los que corren»; aunque en contexto real puede referirse a un cuerpo de guardia o mensajeros, el texto hebreo conserva la imagen literal, y el español «corredores» la preserva sin cerrar demasiado el sentido institucional.
- source_word: הָרָצִים
  english_pob_choice: the runners
  chosen_spanish: los corredores
  alternatives_spanish:
  - los guardias
  - los corredores reales
  - los mensajeros
  lexicon: HALOT
  rationale: Se conserva el valor literal del participio nominal de רוץ. La posible función de guardia o mensajería queda implícita por el contexto y no se fuerza en el texto principal.
- source_word: וּשְׁמַרְתֶּם אֶת מִשְׁמֶרֶת
  english_pob_choice: and you shall keep watch
  chosen_spanish: y ustedes guardarán la custodia
  alternatives_spanish:
  - y ustedes mantendrán la guardia
  - y ustedes harán la vigilancia
  lexicon: HALOT
  rationale: La construcción con el verbo שמר y el sustantivo cognado משמרת intensifica la idea de vigilancia. «Guardarán la custodia» reproduce esa fuerza en español sin caer en una repetición demasiado pesada.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - del palacio
  - del templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». Aunque el contexto puede sugerir el complejo real, la formulación más segura y fuente-conservadora es «la casa».
- source_word: מַסָּח
  english_pob_choice: to prevent intrusion
  chosen_spanish: para impedir la intrusión
  alternatives_spanish:
  - para defenderla
  - para impedir la entrada
  - como barricada
  lexicon: HALOT
  rationale: 'Este término es raro y su sentido preciso es incierto. La revisión inglesa optó por expresar la función de resguardo: impedir ingreso no autorizado. En español, «impedir la intrusión» conserva ese valor funcional sin imponer una imagen demasiado específica.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la frase final desde una imagen de «barricada» a la idea funcional de «impedir la intrusión», por considerarla más natural y exacta. También se ha mantenido la tensión lexical de הָרָצִים con una traducción literal en el texto principal y alternativas funcionales en nota.
  spanish_consistency_notes:
  - Se usó «Sur» como transliteración del nombre propio, coherente con el tratamiento de topónimos en el proyecto.
  - Se prefirió «corredores» para הָרָצִים, manteniendo visible la literalidad hebrea y dejando la explicación funcional en nota.
  - Se eligió «custodia» para מִשְׁמֶרֶת para reflejar el matiz de vigilancia continua sin introducir terminología eclesiástica.
  - No se reemplazó la referencia a «la casa» por «palacio», porque el hebreo no lo especifica de manera inequívoca.
