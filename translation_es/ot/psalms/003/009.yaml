review_pass:
  verdict: revise
  source_alignment_summary: 'La primera cláusula refleja bien לַיהוָה הַיְשׁוּעָה como pertenencia: «La salvación pertenece a Yahvé». La segunda cláusula preserva los elementos «sobre tu pueblo / tu bendición», pero el orden «sobre tu pueblo, tu bendición» suena demasiado elíptico y poco natural en español, y no comunica con suficiente claridad la relación predicativa de la cláusula nominal hebrea. El borrador además desajusta las notas: la nota [a] comenta una alternativa de la primera cláusula, mientras que la nota inglesa [a] preserva la ambigüedad declarativa/volitiva de la segunda cláusula; la nota [b] de «Selah» está anclada en «tu bendición» en vez de en «Selah».'
  spanish_quality_summary: El español es mayormente claro en la primera mitad, pero la segunda mitad resulta forzada y poco idiomática para lectura pública. Una formulación como «tu bendición sobre tu pueblo» conserva mejor la concisión nominal del hebreo y suena natural y digna en español. También conviene colocar la nota de «Selah» en «Selah[a]» y reservar otra nota para la ambigüedad de la cláusula nominal final.
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה, «salvación» para הַיְשׁוּעָה, «tu pueblo» para עַמְּךָ, «bendición» para בִרְכָתֶךָ y «Selah» como transliteración. No hay conflicto doctrinal; el ajuste es de sintaxis, legibilidad y ubicación/contenido de notas.
  issues:
  - severity: medium
    issue: 'La segunda cláusula española suena antinatural: «sobre tu pueblo, tu bendición».'
    rationale: Aunque intenta imitar la cláusula nominal hebrea, en español esa yuxtaposición queda demasiado abrupta y opaca. «Tu bendición sobre tu pueblo» conserva mejor la estructura sin añadir verbo ni modo.
  - severity: medium
    issue: La nota [a] está aplicada a la cláusula equivocada.
    rationale: La nota inglesa [a] documenta la ambigüedad del segundo miembro («your blessing be/is on your people»), no una alternativa relacional de «Salvation belongs to Yahweh».
  - severity: medium
    issue: La nota sobre «Selah» está anclada en el lugar equivocado.
    rationale: Si se incluye una nota cultural sobre «Selah», el marcador debe aparecer en «Selah», no en «tu bendición».
  revised_spanish_text: La salvación pertenece a Yahvé; tu bendición[a] sobre tu pueblo. Selah[b]
  revised_footnotes:
  - marker: a
    text: O bien, «Tu bendición está sobre tu pueblo». La cláusula hebrea no tiene verbo explícito y puede leerse como declaración o como expresión de deseo/oración.
    reason: alternative_reading
  - marker: b
    text: «Selah» probablemente es una indicación litúrgica o musical; su sentido preciso es incierto.
    reason: cultural_note
  revision_rationale: Se mantiene la fidelidad léxica al hebreo y al POB («Yahvé», «salvación», «bendición», «Selah»), pero se repara la sintaxis española de la segunda cláusula para que sea natural y legible sin introducir un verbo no explícito en el texto principal. También se corrigen los anclajes y contenidos de las notas para que reflejen la ambigüedad real del hebreo y la nota cultural sobre «Selah».
