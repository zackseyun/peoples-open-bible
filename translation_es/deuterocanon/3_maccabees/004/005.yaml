translation:
  language: es
  text: Pues un anciano[a] era conducido, lleno de canas, encorvado por la debilidad de sus pies que viene con la vejez, impulsado por el violento empuje de ser echado por tierra[b], obligado a avanzar apresuradamente[c], sin ningún respeto por la dignidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Era conducido» traduce el imperfecto pasivo ἤγετο y conserva la idea de una acción en curso y de movimiento impuesto; también podría verterse «era llevado» o «iba siendo conducido».
    reason: lexical_alternative
  - marker: b
    text: La frase griega es comprimida y difícil; también puede entenderse como una compulsión violenta con sentido de tropezar, caer o ser zarandeado.
    reason: lexical_alternative
  - marker: c
    text: O «haciendo su camino con marcha apresurada»; la idea puede ser también que lo forzaban a llevar un paso rápido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγετο
  english_pob_choice: was being led along
  chosen_spanish: era conducido
  alternatives_spanish:
  - era llevado
  - iba siendo conducido
  lexicon: LSJ
  rationale: El imperfecto pasivo expresa una acción en curso. «Era conducido» conserva el matiz de movimiento impuesto sin decidir demasiado sobre el agente. Frente a «era llevado», «conducido» suena más sobrio y admite la coerción del contexto.
- source_word: γέρων
  english_pob_choice: old man
  chosen_spanish: anciano
  alternatives_spanish:
  - hombre viejo
  - viejo
  lexicon: LSJ
  rationale: Aquí designa edad, no cargo. «Anciano» es natural en español bíblico y digno, sin perder el sentido de vejez del griego.
- source_word: πλήρης πολιᾶς
  english_pob_choice: full of gray hair
  chosen_spanish: lleno de canas
  alternatives_spanish:
  - de canas abundantes
  - canoso
  lexicon: LSJ
  rationale: La imagen visible de la vejez se expresa bien con «lleno de canas». Mantiene la viveza de πληρης + genitivo sin sonar artificial.
- source_word: πεπυκασμένος / ἐπικύφων
  english_pob_choice: bent over
  chosen_spanish: encorvado
  alternatives_spanish:
  - doblado
  - jorobado
  lexicon: LSJ
  rationale: Los dos participios describen una postura corporal comprimida y curvada. «Encorvado» recoge ambos sin redundancia excesiva y es idiomático en español.
- source_word: τὴν ἐκ τοῦ γήρως νωθρίτητα ποδῶν
  english_pob_choice: by the weakness in his feet that comes with age
  chosen_spanish: por la debilidad de sus pies que viene con la vejez
  alternatives_spanish:
  - por la torpeza de sus pies a causa de la vejez
  - por la flaqueza de sus pies por la edad
  lexicon: LSJ
  rationale: νωθρίτης puede ser lentitud, torpeza o debilidad; en contexto físico, «debilidad» comunica bien la incapacidad motriz. «Que viene con la vejez» preserva la relación causal del genitivo con ἐκ τοῦ γήρως.
- source_word: ἀνατροπῆς ὁρμῇ βιαίας
  english_pob_choice: driven by the violent force of being overthrown
  chosen_spanish: impulsado por la fuerza violenta de un derribo
  alternatives_spanish:
  - por el ímpetu violento de una caída
  - por la fuerza violenta de ser abatido
  lexicon: LSJ
  rationale: La secuencia griega es difícil y compacta. «Derribo» conserva la idea de caída/abatimiento violento sin introducir una precisión mayor de la que el griego garantiza. «Impulsado por» mantiene la compulsión del movimiento.
- source_word: ἁπάσης αἰδοῦς ἄνευ
  english_pob_choice: without any regard for dignity
  chosen_spanish: sin ningún respeto por la dignidad
  alternatives_spanish:
  - sin ninguna vergüenza
  - sin ningún pudor
  lexicon: LSJ
  rationale: αἰδώς puede ser vergüenza, pudor o sentido de lo digno. En este contexto, el énfasis es el trato irreverente hacia un anciano; por eso «dignidad» transmite mejor la fuerza social y moral del término.
- source_word: πρὸς ὀξειαν καταχρώμενος πορείαν
  english_pob_choice: making his way in hurried travel
  chosen_spanish: avanzando con prisa
  alternatives_spanish:
  - marchando con rapidez
  - forzando un paso rápido
  lexicon: LSJ
  rationale: La construcción sugiere un desplazamiento apremiado y rápido. «Avanzando con prisa» expresa el resultado de manera natural en español y evita una frase demasiado literal como «hacer uso de una marcha rápida».
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma en cuenta el audit trail inglés, especialmente la dificultad de ἀνατροπῆς ὁρμῇ βιαίας y de πρὸς ὀξειαν καταχρώμενος πορείαν. Se evita calcar el inglés cuando el español pide una formulación más natural, pero sin suavizar la imagen de vejez forzada y desplazamiento humillante.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto cuando no aplica aquí.
  - Se evitó «siervo» porque δοῦλος no aparece en este pasaje.
  - «Anciano» mantiene un registro bíblico comprensible sin archaísmo excesivo.
  - «Dignidad» se eligió como equivalente contextual de αἰδώς, en lugar de «vergüenza» o «pudor», para no estrechar el matiz social del pasaje.
