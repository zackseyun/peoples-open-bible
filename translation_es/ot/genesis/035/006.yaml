translation:
  language: es
  text: Así llegó Jacob a Luz[a] (es decir, Betel), que está en la tierra de Canaán, él y toda la gente que estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conserva tanto el nombre antiguo «Luz» como su identificación explicativa con «Betel».
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  - arribó
  lexicon: HALOT
  rationale: El hebreo וַיָּבֹא puede expresar llegada a un destino; en español, «llegó» comunica con naturalidad el movimiento culminado sin perder el valor narrativo de llegada/arribo.
- source_word: לוּזָה
  english_pob_choice: to Luz
  chosen_spanish: Luz
  alternatives_spanish:
  - Luzá
  - Luz (con marca direccional)
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. En español no se conserva la desinencia direccional, sino el topónimo base «Luz», como en el inglés auditado.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  english_pob_choice: which is in the land of Canaan
  chosen_spanish: que está en la tierra de Canaán
  alternatives_spanish:
  - que está en la tierra de Canaán
  - la cual está en la tierra de Canaán
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación de Luz. «Que está» mantiene la relación explicativa de forma clara y natural en español.
- source_word: הִוא בֵּית אֵל
  english_pob_choice: that is, Bethel
  chosen_spanish: (es decir, Betel)
  alternatives_spanish:
  - o sea, Betel
  - esto es, Betel
  lexicon: HALOT
  rationale: 'La secuencia funciona como aclaración appositiva: Luz es Betel. «Es decir» reproduce bien el valor identificador sin añadir interpretación extra.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - Jacobo
  lexicon: HALOT
  rationale: El pronombre hebreo retoma enfáticamente a Jacob antes de añadir el grupo que lo acompañaba. En español, «él» conserva esa referencia explícita sin sobrecargar la frase.
- source_word: וְכָל הָעָם אֲשֶׁר עִמּוֹ
  english_pob_choice: and all the people who were with him
  chosen_spanish: y todo el pueblo que estaba con él
  alternatives_spanish:
  - y toda la gente que estaba con él
  - y toda la compañía que iba con él
  lexicon: HALOT
  rationale: עָם aquí designa al grupo que acompañaba a Jacob. «Pueblo» mantiene el sustantivo colectivo del original; «que estaba con él» refleja el acompañamiento en estilo idiomático español.
translation_notes:
  revision_awareness: La versión inglesa auditada opta por conservar la identificación appositiva entre Luz y Betel y por separar con puntuación esa aclaración. La redacción española sigue ese mismo patrón, manteniendo el nombre antiguo y su equivalencia reconocida, sin fusionarlos ni omitir el detalle geográfico.
  spanish_consistency_notes:
  - Se emplea «Canaán» como topónimo bíblico estándar en español.
  - Se prefiere «Betel» como forma usual en español para el lugar identificado en el texto.
  - Se mantiene el orden narrativo simple del hebreo, sin expandir el verso con explicaciones devocionales.
  - «Pueblo» se usa aquí en sentido colectivo, no necesariamente étnico-nacional.
