id: REV.11.9
reference: Revelation 11:9
source:
  edition: SBLGNT
  text: καὶ βλέπουσιν ἐκ τῶν λαῶν καὶ φυλῶν καὶ γλωσσῶν καὶ ἐθνῶν τὸ πτῶμα αὐτῶν ἡμέρας τρεῖς ⸀καὶ ἥμισυ, καὶ τὰ πτώματα αὐτῶν οὐκ ⸀ἀφίουσιν τεθῆναι εἰς μνῆμα.
translation:
  text: And some from the peoples and tribes and languages and nations look at their dead bodies for three and a half days[a], and they do not allow them to be laid in a tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek first says 'their dead body' (singular) and then 'their bodies' (plural). The singular may present the two witnesses as a single corporate witness before shifting back to the individual bodies.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπουσιν
  chosen: look at
  alternatives:
  - gaze upon
  - see
  lexicon: BDAG
  rationale: Present tense is kept with a vivid, ongoing sense. 'Look at' is natural English and preserves the direct visual action better than the flatter 'see.'
- source_word: ἐκ τῶν λαῶν καὶ φυλῶν καὶ γλωσσῶν καὶ ἐθνῶν
  chosen: some from the peoples and tribes and languages and nations
  alternatives:
  - people from the peoples and tribes and languages and nations
  - those from the peoples and tribes and languages and nations
  lexicon: BDAG
  rationale: The construction with ἐκ naturally conveys a subset drawn from these groups rather than every individual in them. 'Some from' makes that partitive sense explicit in idiomatic English without overstating universality.
- source_word: λαῶν
  chosen: peoples
  alternatives:
  - peoples groups
  - peoples/nations
  lexicon: BDAG
  rationale: Plural 'peoples' preserves the distinct collective groups indicated by the Greek and fits Revelation's recurring formulaic listing.
- source_word: φυλῶν
  chosen: tribes
  alternatives:
  - clans
  lexicon: BDAG
  rationale: '''Tribes'' is the standard and contextually fitting rendering in Revelation''s ethnographic lists.'
- source_word: γλωσσῶν
  chosen: languages
  alternatives:
  - tongues
  lexicon: BDAG
  rationale: '''Languages'' communicates the meaning clearly in modern English; ''tongues'' is traditional but less natural here.'
- source_word: ἐθνῶν
  chosen: nations
  alternatives:
  - Gentiles
  - ethnic groups
  lexicon: BDAG
  rationale: In Revelation's stock sequence, 'nations' is the most idiomatic and established rendering. 'Gentiles' would be too narrow in this context.
- source_word: τὸ πτῶμα αὐτῶν
  chosen: their dead body
  alternatives:
  - their corpse
  lexicon: BDAG
  rationale: Although two witnesses are in view, the singular noun is present in the first clause. 'Their dead body' preserves the singular form of the Greek, likely treating the two as a unit in this moment of vision.
- source_word: ἡμέρας τρεῖς καὶ ἥμισυ
  chosen: for three and a half days
  alternatives:
  - three days and a half
  lexicon: BDAG
  rationale: This is the natural English expression for the accusative of duration. It preserves the apocalyptic time period without archaic phrasing.
- source_word: τὰ πτώματα αὐτῶν
  chosen: their bodies
  alternatives:
  - their corpses
  - their dead bodies
  lexicon: BDAG
  rationale: The second clause shifts to the plural in Greek. 'Bodies' is readable English; the death sense is already clear from context. The singular/plural variation is preserved across the verse.
- source_word: οὐκ ἀφίουσιν
  chosen: they do not allow
  alternatives:
  - they do not permit
  - they do not leave
  lexicon: BDAG
  rationale: Here ἀφίημι carries the sense of permitting rather than leaving or forgiving. 'Do not allow' is clear modern English.
- source_word: τεθῆναι εἰς μνῆμα
  chosen: to be laid in a tomb
  alternatives:
  - to be placed in a grave
  - to be buried
  lexicon: BDAG
  rationale: The infinitive plus εἰς μνῆμα is more specifically placement in a burial place than the broader 'buried.' 'Tomb' is a close and vivid rendering of μνῆμα.
