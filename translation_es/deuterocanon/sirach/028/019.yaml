revisions:
- from: Bienaventurado el que fue resguardado de ella[a], el que no pasó por su furor, el que no arrastró su yugo, y no fue atado en sus cadenas.
  to: Bienaventurado el que fue resguardado de ella[a], el que no pasó por su furor, el que no tiró de su yugo, y el que no fue atado en sus cadenas.
  rationale: Se corrige 'arrastró' por 'tiró de' para ajustarse mejor a εἵλκυσεν y a la decisión auditada en inglés ('drawn'). También se añade 'el que' en la última cláusula para mantener el paralelismo y la fluidez del español. Se conserva la personificación femenina con 'ella' y su nota, porque en español es natural y hace visible la referencia contextual del griego.
