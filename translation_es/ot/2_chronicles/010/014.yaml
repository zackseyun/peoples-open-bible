translation:
  language: es
  text: 'Les habló conforme al consejo de los jóvenes, diciendo: «Haré más pesado su yugo, y le añadiré más. Mi padre los disciplinó con látigos, pero yo con escorpiones[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posiblemente, «con látigos de escorpiones», es decir, látigos provistos de puntas agudas o barbas; el hebreo dice literalmente «con escorpiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: He spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  - les habló
  lexicon: HALOT
  rationale: דבר es el verbo normal de ‘hablar’. En español, «les habló» conserva la acción de decir sin volverla más interpretativa que el hebreo.
- source_word: כַּעֲצַת
  english_pob_choice: according to the advice of
  chosen_spanish: conforme al consejo de
  alternatives_spanish:
  - según el consejo de
  - de acuerdo con el consejo de
  lexicon: HALOT
  rationale: עֵצָה es ‘consejo/advice’. «Conforme al consejo de» mantiene la relación marcada por כ y suena natural en español bíblico contemporáneo.
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  lexicon: HALOT
  rationale: Aunque el hebreo se relaciona etimológicamente con ‘niños’, aquí designa a los consejeros más jóvenes de Roboam. «Los jóvenes» preserva el valor social del término sin sugerir niños literales.
- source_word: אַכְבִּיד
  english_pob_choice: I will make ... heavier
  chosen_spanish: haré más pesado
  alternatives_spanish:
  - haré pesado
  - aumentaré el peso de
  lexicon: HALOT
  rationale: El Hifil de כבד es causativo. «Haré más pesado» comunica la intensificación del yugo y conserva la imagen física del hebreo.
- source_word: עֻלְּכֶם
  english_pob_choice: your yoke
  chosen_spanish: tu yugo
  alternatives_spanish:
  - su yugo
  - el yugo de ustedes
  lexicon: HALOT
  rationale: עֹל se traduce literalmente ‘yugo’ y en sentido figurado alude a carga opresiva. Se mantiene la metáfora explícita en español.
- source_word: אֹסִיף עָלָיו
  english_pob_choice: I will add to it
  chosen_spanish: añadiré a él
  alternatives_spanish:
  - lo aumentaré
  - añadiré a tu carga
  lexicon: HALOT
  rationale: יסף con עַל significa ‘añadir/incrementar’. «Añadiré a él» conserva la referencia pronominal al yugo, tal como en el inglés auditado.
- source_word: יִסַּר
  english_pob_choice: disciplined
  chosen_spanish: disciplinó
  alternatives_spanish:
  - corrigió
  - castigó
  - amonestó
  lexicon: HALOT
  rationale: יסר puede abarcar disciplina con componente correctivo y punitivo. «Disciplinó» mantiene ese rango sin caer en un castellano demasiado arcaico.
- source_word: בַּשּׁוֹטִים
  english_pob_choice: with whips
  chosen_spanish: con látigos
  alternatives_spanish:
  - con azotes
  - con flagelos
  lexicon: HALOT
  rationale: שׁוֹט designa un látigo/azote. «Látigos» es claro y natural en español, y conserva la violencia de la imagen.
- source_word: בָּעֲקְרַבִּים
  english_pob_choice: with scorpions
  chosen_spanish: con escorpiones
  alternatives_spanish:
  - con látigos de puntas como escorpiones
  - con escorpión-látigos
  lexicon: HALOT
  rationale: Se conserva el término literal ‘escorpiones’, como en el texto hebreo y la decisión auditada inglesa. En español la imagen queda igualmente viva y deja abierta la posible lectura figurada de látigos punzantes.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la solución auditada en inglés, sin cambios revisionales en el pasaje; se conserva la metáfora del yugo y la imagen literal de ‘escorpiones’, dejando la posible lectura figurada en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo expresa el nombre divino; en este versículo no aparece.
  - Se evitó sustituir la metáfora de ‘yugo’ por ‘carga’ en el texto principal, para mantener la imagen del original.
  - «Látigos» y «escorpiones» reflejan la dicción concreta del hebreo; la nota aclara la posible lectura de instrumentos con púas.
