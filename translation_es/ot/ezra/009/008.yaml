- from: Pero ahora, por un breve momento, ha venido favor de Yahvé nuestro Dios, para dejarnos un remanente que escapó y para darnos un apoyo en su lugar santo[c][a], para que nuestro Dios nos ilumine los ojos[b] y nos dé un poco de revivificación en nuestra esclavitud.
  to: Pero ahora, por un breve momento, ha venido un favor de parte de Yahvé nuestro Dios, para dejarnos un remanente que ha escapado y para darnos una estaca[a] en su lugar santo, para que nuestro Dios alumbre nuestros ojos[b] y nos dé un poco de vida en nuestra esclavitud[c].
  rationale: Se corrige la principal desalineación léxica preservando la imagen concreta de יָתֵד con 'estaca' en el texto principal, dejando la explicación metafórica en nota. Se reubican y ordenan las notas en sus anclas correctas. También se mejora la naturalidad del español con 'ha venido un favor de parte de Yahvé', 'ha escapado', 'alumbre nuestros ojos' y 'un poco de vida', que reflejan fielmente el hebreo y el razonamiento del POB sin recurrir a formulaciones técnicas o abstractas.
