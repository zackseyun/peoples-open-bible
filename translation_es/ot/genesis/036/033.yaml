review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia narrativa hebrea: Bala murió, y Jobab hijo de Zérah/Zerah reinó en su lugar. También conserva bien el sentido sucesorio de תַּחְתָּיו como «en su lugar». Sin embargo, la nota al pie está mal anclada: la alternativa «de Bosra» corresponde a מִבָּצְרָה, no a «murió». Además, como el texto principal ya usa «de Bosra», la nota «O “de Bosra”» no preserva adecuadamente la alternativa del audit trail inglés; conviene poner en el texto «de Bozra» con nota «O “de Bosra”», o equivalente.'
  spanish_quality_summary: 'El español es claro y natural, pero la puntuación con comas alrededor de «hijo de Zérah» no es necesaria. Hay también una inconsistencia de transliteración: «Bosra» en el texto principal, mientras las alternativas incluyen «Bozra»; y «Zérah» parece una forma idiosincrática menos natural que «Zerah» para lectura e identificación. Se requiere un ajuste menor para legibilidad y coherencia.'
  glossary_alignment: No hay términos teológicos de proyecto en juego. Los nombres propios deben mantenerse de forma consistente. «Jobab» y «Bela» están bien. Para בָּצְרָה, conviene una transliteración española coherente; «Bozra» en el texto con nota alternativa «Bosra» preserva mejor el audit trail. Para זֶרַח, «Zerah» es más estable y ampliamente reconocible que «Zérah» en este contexto.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «murió» en vez de en la referencia a Bozrah/Bosra.
    rationale: La nota explica el valor de מִבָּצְרָה («from/of Bozrah»), por lo que debe aparecer en la expresión de lugar, no en וַיָּמָת.
  - severity: medium
    issue: La nota no conserva correctamente la alternativa léxica del audit trail inglés.
    rationale: Si el texto principal dice «de Bosra», la nota no puede decir «O “de Bosra”». Debe haber contraste real entre texto principal y alternativa, p. ej. «de Bozra[a]» con nota «O “de Bosra”».
  - severity: low
    issue: «Zérah» suena menos natural y menos consistente que «Zerah».
    rationale: No es un error de sentido, pero la tilde introduce una forma poco estándar en español bíblico contemporáneo. «Zerah» es claro y digno.
  - severity: low
    issue: Las comas alrededor de «hijo de Zerah» recargan innecesariamente la frase.
    rationale: 'En esta fórmula genealógica la construcción fluye mejor sin comas: «Jobab hijo de Zerah de Bozra…» o con una sola pausa mínima según estilo.'
  revised_spanish_text: Bela murió, y Jobab hijo de Zerah, de Bozra[a], reinó en su lugar.
  revised_footnotes:
  - marker: a
    text: O «de Bosra». La preposición hebrea puede indicar procedencia o asociación con la ciudad.
