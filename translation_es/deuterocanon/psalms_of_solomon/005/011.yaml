translation:
  language: es
  text: Tú alimentas a las aves y a los peces, al dar lluvia a los lugares desolados para que brote la hierba, para preparar pasto en el desierto para todo ser viviente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πετεινὰ
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves del cielo
  lexicon: LSJ
  rationale: πετεινὰ designa aves en general. «Aves» es natural en español y conserva la amplitud del griego sin añadir una imagen más específica de la que ofrece el texto.
- source_word: τρέφεις
  english_pob_choice: feed
  chosen_spanish: alimentas
  alternatives_spanish:
  - nutres
  - sustentas
  lexicon: BDAG
  rationale: τρέφω expresa dar alimento o sustento. «Alimentas» transmite bien la acción concreta de provisión divina y suena natural en español.
- source_word: ἐν τῷ διδόναι σὲ
  english_pob_choice: as you give
  chosen_spanish: al dar
  alternatives_spanish:
  - cuando das
  - por dar
  lexicon: BDAG
  rationale: El infinitivo articular indica medio o circunstancia. «Al dar» comunica esa relación de modo sobrio y mantiene la conexión causal entre la lluvia y la alimentación de las criaturas.
- source_word: ἐρήμοις / ἐν ἐρήμῳ
  english_pob_choice: the desolate places / the wilderness
  chosen_spanish: los lugares desolados / el desierto
  alternatives_spanish:
  - los parajes desolados
  - la tierra árida
  lexicon: LSJ
  rationale: El griego apunta a regiones áridas o deshabitadas. «Lugares desolados» y «desierto» conservan el contraste poético entre esterilidad y provisión sin forzar el español.
- source_word: εἰς ἀνατολὴν χλόης
  english_pob_choice: for the sprouting of grass
  chosen_spanish: para el brotar de la hierba
  alternatives_spanish:
  - para el nacimiento de la hierba
  - para el crecimiento de la hierba
  lexicon: LSJ
  rationale: ἀνατολή contiene la idea de «salida» o «levantarse», aplicada aquí a la vegetación que brota. «Brotar de la hierba» conserva la imagen de surgimiento vegetal y evita una paráfrasis excesiva.
- source_word: χορτάσματα
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - alimento
  - pasto
  lexicon: LSJ
  rationale: χορτάσματα puede referirse a alimento o forraje. «Forraje» mantiene la fuerza concreta de provisión nutritiva y refleja bien la elección inglesa de «fodder».
- source_word: παντὶ ζῶντι
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo lo que vive
  lexicon: BDAG
  rationale: La frase es inclusiva y general. «Todo ser viviente» comunica claramente el alcance universal de la providencia divina en un español natural.
translation_notes:
  revision_awareness: El texto español sigue el ajuste auditado del inglés hacia un infinitivo de propósito («to prepare fodder»), reflejado aquí con «para preparar forraje». También conserva la relación causal/temporal del infinitivo articular mediante «al dar», y mantiene la amplitud universal del cierre sin restringirlo a animales domésticos.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el hebreo subyacente no está en juego aquí y el pasaje describe la acción directa de Dios.
  - Se prefirió «aves» frente a «pájaros» por registro más sobrio y de tono bíblico.
  - «Desierto» y «lugares desolados» se usan como equivalentes contextuales para mantener la alternancia del griego sin uniformarlo artificialmente.
  - «Forraje» reproduce mejor la concreción de χορτάσματα que un genérico como «alimento», pero sin limitarse a ganado exclusivamente.
