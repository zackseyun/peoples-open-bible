translation:
  language: es
  text: Hallaron a un hombre egipcio en el campo y lo llevaron[a] a David. Le dieron pan, y comió[b], y le dieron agua para beber[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y lo tomaron y lo llevaron a David».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «él comió»; el hebreo no expresa un objeto directo.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «y le hicieron beber agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  english_pob_choice: They found
  chosen_spanish: Hallaron
  alternatives_spanish:
  - Encontraron
  - Y hallaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte naturalmente con pasado simple en español. «Hallaron» conserva bien el matiz de descubrimiento sin volver mecánica la coordinación.
- source_word: אִישׁ מִצְרִי
  english_pob_choice: an Egyptian man
  chosen_spanish: un hombre egipcio
  alternatives_spanish:
  - un egipcio
  - un hombre, un egipcio
  lexicon: HALOT
  rationale: 'Se preservan los dos elementos del hebreo: el sustantivo «hombre» y el adjetivo gentilicio «egipcio». «Un egipcio» sería más breve, pero pierde la explicitud de אִישׁ.'
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo/terreno
  lexicon: HALOT
  rationale: «Campo» comunica de forma natural el valor básico de שָׂדֶה en español. No se añade «abierto» porque el revision trail en inglés retiró esa expansión por mayor precisión.
- source_word: וַיִּקְחוּ אֹתוֹ אֶל דָּוִד
  english_pob_choice: and brought him to David
  chosen_spanish: y lo llevaron a David
  alternatives_spanish:
  - y lo tomaron y lo llevaron a David
  - y lo llevaron ante David
  lexicon: HALOT
  rationale: לקח con persona y destino puede ser «tomar/llevar». «Llevaron» es idiomático en español y conserva el movimiento hacia David sin introducir una escena de escolta más fuerte de la que el hebreo exige.
- source_word: וַיִּתְּנוּ לוֹ לֶחֶם
  english_pob_choice: They gave him bread
  chosen_spanish: Le dieron pan
  alternatives_spanish:
  - Le dieron alimento
  - Le dieron un pan
  lexicon: HALOT
  rationale: «Pan» respeta el valor literal de לֶחֶם. No se amplía a «alimento» porque el hebreo especifica pan, y la sencillez de la frase se conserva mejor así.
- source_word: וַיֹּאכַל
  english_pob_choice: and he ate
  chosen_spanish: él comió
  alternatives_spanish:
  - y comió
  - y él comió
  lexicon: HALOT
  rationale: El verbo hebreo carece de objeto explícito; en español puede quedar implícito. Se mantiene la tensión con la nota, sin forzar un complemento inexistente.
- source_word: וַיַּשְׁקֻהוּ מָיִם
  english_pob_choice: and they gave him water to drink
  chosen_spanish: y le dieron agua para beber
  alternatives_spanish:
  - y lo hicieron beber agua
  - y le dieron agua
  lexicon: HALOT
  rationale: El hifil de שׁקה expresa causación de beber. «Le dieron agua para beber» es natural en español y conserva el sentido causativo mejor que una simple entrega de agua.
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «in the field» sobre «in the open field» por mayor precisión léxica; el español sigue esa decisión con «en el campo». También se conservó la sencillez narrativa del hebreo en toda la oración, evitando expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en toda la obra, aunque este versículo no lo contiene.
  - Se usa «pan» para לֶחֶם cuando el contexto no obliga a una ampliación semántica.
  - Se usa «agua para beber» para reflejar el valor causativo de שׁקה sin sobreexplicar.
  - Se preserva el nombre propio «David» sin artículos ni ajustes litúrgicos.
