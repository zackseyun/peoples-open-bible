    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y el registro del borrador, pero se corrige חָלָל para reflejar mejor la evidencia fuente y la decisión léxica auditada: no solo alguien ''caído'', sino un cadáver resultante de muerte violenta, en contraste con ''el muerto'' como término general. Las notas se ajustan para mayor naturalidad y precisión en español.'
