review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: todos los egipcios cavaron alrededor del Nilo buscando agua para beber porque no podían beber del agua del Nilo. Mantiene correctamente «Nilo» para יְאֹר y la relación causal de כִּי. Sin embargo, «para obtener agua para beber» añade el verbo «obtener», que no está explícito en el hebreo y hace la frase más interpretativa de lo necesario.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en concisión y fidelidad formal. «Cavaron alrededor del Nilo en busca de agua para beber» suena más idiomático y evita la duplicación «para obtener... para beber». La nota al pie es adecuada y bien anclada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Nilo» para יְאֹר sigue la decisión documentada; no hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: Se añadió «obtener» en «para obtener agua para beber».
    rationale: El hebreo dice literalmente que cavaron alrededor del Nilo «agua para beber», es decir, cavaron buscando agua. «Obtener» no distorsiona gravemente el sentido, pero introduce una idea no expresada de manera explícita en el texto fuente y puede evitarse con una formulación española más ceñida.
  - severity: low
    issue: La construcción «para obtener agua para beber» es algo redundante en español.
    rationale: Aunque comprensible, la doble finalidad suena menos elegante que alternativas como «en busca de agua para beber» o «para hallar agua para beber», que conservan la intención del original con mejor fluidez.
  revised_spanish_text: Y todos los egipcios cavaron alrededor del Nilo en busca de agua para beber[a], porque no podían beber del agua del Nilo.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «el río» (ye''or); en Éxodo este término se refiere específicamente al Nilo.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de finalidad para eliminar una adición interpretativa («obtener») y mejorar la naturalidad del español sin perder el sentido del hebreo ni la decisión léxica documentada sobre יְאֹר.
