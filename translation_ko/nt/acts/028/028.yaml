id: ACT.28.28
reference: 'Acts 28:28'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'γνωστὸν οὖν ⸂ἔστω ὑμῖν⸃ ὅτι τοῖς ἔθνεσιν ἀπεστάλη ⸀τοῦτο τὸ σωτήριον τοῦ θεοῦ· αὐτοὶ καὶ ⸀ἀκούσονται.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/028.yaml
  text: Therefore let it be known to you that this salvation of God has been sent to the Gentiles[b][a]; they also will listen.
  footnotes:
  - marker: a
    text: "Or 'this salvation from God.' The Greek genitive can be understood in more than one closely related way."
    reason: lexical_alternative
  - marker: b
    text: "Or 'they too will hear.' The verb can mean either 'hear' or 'listen/respond,' depending on context."
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 여러분은 이 하나님의 구원이 이방인들에게 보내졌음을 아십시오. 그들은 들을 것입니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_korean: 이방인들에게
  alternatives_korean:
  - 뭇 민족들에게
  lexicon: BDAG
  rationale: '글로사리 기본값: ἔθνη→이방인들. 사도행전 종결의 핵심 명제로서 본 단어의 무게를 보존.'
- source_word: τὸ σωτήριον τοῦ θεοῦ
  english_pob_choice: this salvation of God
  chosen_korean: 이 하나님의 구원
  alternatives_korean:
  - 하나님께로부터 오는 이 구원
  lexicon: BDAG
  rationale: '글로사리: σωτηρία→구원. 본 절은 사도행전 신학의 결론적 명제.'
theological_decisions:
- issue: '사도행전 종결의 신학적 명제: 구원이 이방인들에게로'
  chosen_reading: 이 하나님의 구원이 이방인들에게 보내졌음을 아십시오
  alternative_readings:
  - 하나님의 구원이 이방인들에게 전달되었다
  rationale: '이사야 6:9-10 인용 직후의 결정적 결론. 이방인 선교의 신학적 정당성을 평면화하지 않고 강력한 명제로 보존한다. LXX 이사야 6장 인용 맥락에서 「주」(κύριος)는 본래 야훼를 가리키나, 28절 자체에서는 화자 바울이 「하나님」을 직접 호명하므로 「하나님의 구원」으로 그대로 옮긴다.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve Gentile inclusion force'
