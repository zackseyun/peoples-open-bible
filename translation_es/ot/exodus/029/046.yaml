translation:
  language: es
  text: Y sabrán que yo soy Yahvé, su Dios[a], que los saqué de la tierra de Egipto para habitar entre ellos[b]. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien los sacó de la tierra de Egipto para habitar entre ellos».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «en medio de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And they shall know
  chosen_spanish: Y sabrán
  alternatives_spanish:
  - Y conocerán
  lexicon: HALOT
  rationale: El imperfecto con waw consecutiva expresa aquí resultado futuro y solemne. En español, «sabrán» comunica bien esa certeza de reconocimiento pactal sin volverse pesado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio en español, siguiendo la decisión editorial del proyecto. «Yahvé» es la forma acostumbrada y legible en español bíblico académico y eclesial.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  lexicon: HALOT
  rationale: En este contexto de pacto, el sustantivo es singular en referencia al Dios de Israel. En español, «su Dios» preserva esa referencia sin introducir ambigüedad politeísta.
- source_word: אֲשֶׁר הוֹצֵאתִי אֹתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought them out from the land of Egypt
  chosen_spanish: que los saqué de la tierra de Egipto
  alternatives_spanish:
  - que los hice salir de la tierra de Egipto
  lexicon: HALOT
  rationale: «Sacar» reproduce con naturalidad la fórmula exódica hebrea הוציא. Mantiene el contenido histórico-redentor sin diluir la acción divina.
- source_word: לְשָׁכְנִי
  english_pob_choice: so that I might dwell
  chosen_spanish: para habitar
  alternatives_spanish:
  - para que yo habite
  - a fin de habitar
  lexicon: HALOT
  rationale: El infinitivo con ל aquí expresa finalidad. «Para habitar» es la forma más directa y natural en español; el sujeto implícito sigue siendo Dios por el contexto, como en la lectura inglesa.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «en su interior / en medio de ellos». «Entre ellos» es el equivalente español más idiomático y conserva la idea de presencia divina dentro de la comunidad.
- source_word: אֲנִי יְהוָה אֱלֹהֵיהֶם
  english_pob_choice: I am Yahweh their God
  chosen_spanish: Yo soy Yahvé, su Dios
  alternatives_spanish:
  - Yo, Yahvé, soy su Dios
  lexicon: HALOT
  rationale: Se mantiene la fórmula enfática de identidad y pacto. El orden español elegido suena natural y conserva la solemnidad del cierre.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La línea editorial del POB evita la sustitución por un título y conserva el nombre revelado. En español, «Yahvé» es la forma más estable y reconocible, mientras que «SEÑOR» ocultaría el nombre propio del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Finalidad del éxodo
  english_pob_reading: so that I might dwell among them
  chosen_spanish_reading: para habitar entre ellos
  alternative_spanish_readings:
  - para que yo habite entre ellos
  - para morar en medio de ellos
  rationale: 'El hebreo ל + infinitivo expresa propósito. La versión española conserva la finalidad redentora: el éxodo tiene como meta la presencia de Dios con su pueblo, no solo la liberación de Egipto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: Coincide con el último pase revisado sin cambios sustantivos; se mantiene la solución ya aceptada para el nombre divino, la finalidad del éxodo y la frase de presencia divina.
  spanish_consistency_notes:
  - Se preserva la fórmula pactal con repetición de «Yo soy Yahvé, su Dios».
  - «Sabrán» refleja el valor futuro/resultativo del verbo hebreo.
  - «Entre ellos» evita la rigidez literal de «en medio de ellos» sin perder el sentido idiomático.
  - No se usó «SEÑOR» para no ocultar el Tetragrámaton, conforme a la terminología del proyecto.
