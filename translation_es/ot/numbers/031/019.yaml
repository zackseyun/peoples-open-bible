  yaml_path: translation/ot/numbers/031/019.yaml
  text: And you[a], camp outside the camp for seven days. Everyone who has killed a person, and everyone who has touched one slain, shall purify yourselves on the third day and on the seventh day—you and your captives.
  footnotes:
