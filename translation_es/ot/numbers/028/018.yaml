review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: frase temporal, declaración de reunión sagrada y prohibición de trabajo ordinario. Sin embargo, ''En el primer día'' suena poco natural en español bíblico contemporáneo; ''El primer día'' o ''En el primer día'' no son equivalentes en naturalidad, y la forma sin preposición preserva mejor el valor temporal idiomático. Además, ''habrá una convocación santa'' es comprensible, pero ''habrá santa convocación'' suena más idiomático y litúrgicamente natural para מִקְרָא קֹדֶשׁ, conservando el matiz formal de reunión convocada.'
  spanish_quality_summary: 'La redacción actual es mayormente clara, pero tiene dos roces de naturalidad: ''En el primer día'' es un calco poco idiomático, y la nota a usa ''asamblea santa'' cuando el inglés documenta ''a sacred assembly''; en español suena mejor ''asamblea sagrada''. El resto es legible y digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Convocación' para מִקְרָא y 'trabajo ordinario' para מְלֶאכֶת עֲבֹדָה están dentro de la justificación documentada. Conviene ajustar solo la forma temporal y pulir la alternativa léxica de la nota.
  issues:
  - severity: medium
    issue: 'Calco temporal poco natural: ''En el primer día'''
    rationale: Aunque refleja la preposición hebrea, en español natural la expresión temporal aquí se dice mejor 'El primer día'. Mantiene el sentido sin añadir información contextual no explícita.
  - severity: low
    issue: Orden algo rígido en 'una convocación santa'
    rationale: Es inteligible, pero 'santa convocación' suena más natural y más cercano al registro cultual/formal del pasaje en español bíblico moderno.
  - severity: low
    issue: Nota alternativa 'asamblea santa' menos natural que 'asamblea sagrada'
    rationale: La nota inglesa dice 'a sacred assembly'. En español, 'asamblea sagrada' expresa mejor esa alternativa léxica sin sonar forzada.
  revised_spanish_text: El primer día habrá santa convocación[a]; no harán ningún trabajo ordinario[b].
