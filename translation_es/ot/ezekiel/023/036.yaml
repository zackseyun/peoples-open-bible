lexical_decisions:
- source_word: וַיֹּאמֶר / Then ... said
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma con waw-consecutiva avanza la narración; «Entonces» comunica secuencia de manera natural en español y conserva el valor discursivo sin volverlo mecánico.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé» como forma española del nombre divino, evitando la sustitución por un título.'
- source_word: בֶּן אָדָם / Son of man
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo de la humanidad
  lexicon: HALOT
  rationale: En Ezequiel es un apelativo fijo dirigido al profeta; «Hijo de hombre» conserva el idiomismo y la referencia tradicional del hebreo.
- source_word: הֲתִשְׁפּוֹט / will you judge
  english_pob_choice: will you judge
  chosen_spanish: ¿juzgarás?
  alternatives_spanish:
  - ¿vas a juzgar?
  - ¿juzgarías?
  lexicon: HALOT
  rationale: El imperfecto interrogativo encaja bien con una pregunta directa en futuro simple en español, preservando el tono de comisión profética.
- source_word: אָהֳלָה / Oholah
  english_pob_choice: Oholah
  chosen_spanish: Oholá
  alternatives_spanish:
  - Oholah
  lexicon: HALOT
  rationale: Se adapta la transliteración al español con acento gráfico para lectura pública; mantiene el nombre propio sin interpretarlo.
- source_word: אָהֳלִיבָה / Oholibah
  english_pob_choice: Oholibah
  chosen_spanish: Oholibá
  alternatives_spanish:
  - Oholibah
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio, ajustada a la ortografía española para facilitar pronunciación y lectura.
- source_word: וְהַגֵּד / Then declare
  english_pob_choice: Then declare
  chosen_spanish: Entonces declara
  alternatives_spanish:
  - Y declara
  - Haz saber
  lexicon: HALOT
  rationale: El imperativo profético se expresa con «declara», que comunica proclamación pública con suficiente fuerza; se conserva el enlace discursivo con «Entonces».
- source_word: לָהֶן / to them
  english_pob_choice: to them
  chosen_spanish: a ellas
  alternatives_spanish:
  - a ellas dos
  - les
  lexicon: HALOT
  rationale: El referente femenino plural está explícito en español con «a ellas», manteniendo la concordancia y la referencia a las dos figuras alegóricas.
- source_word: תוֹעֲבוֹתֵיהֶן / their abominations
  english_pob_choice: their abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus cosas abominables
  - sus actos detestables
  lexicon: HALOT
  rationale: «Abominaciones» es el equivalente profético estándar para תועבות y conserva la carga moral y cultual del hebreo.
theological_decisions:
