translation:
  language: es
  text: Inclina tu oído hacia mí; rápidamente, rescátame. Sé para mí una roca de refugio[a], una casa fortificada[b] para salvarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una roca fuerte». La expresión hebrea combina «roca» con un término de protección o fortaleza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una fortaleza» o «una casa de fortalezas». El hebreo conserva la imagen de «casa» mientras la describe como fuertemente fortificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Vuelve
  - Inclina hacia
  - Baja
  lexicon: HALOT
  rationale: El imperativo de נָטָה con 'tu oído' conserva la imagen de inclinarse para escuchar. 'Inclina' es natural en español y mantiene el gesto metafórico.
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu oído atento
  lexicon: HALOT
  rationale: Se conserva el singular concreto del hebreo. 'Oído' suena más digno y idiomático que 'oreja' en este contexto poético.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: apresúrate
  alternatives_spanish:
  - rápidamente
  - sin demora
  - de prisa
  lexicon: HALOT
  rationale: La idea adverbial de urgencia se expresa con un verbo exhortativo natural en español. 'Apresúrate' comunica prontitud sin perder el tono intenso del verso.
- source_word: הַצִּילֵנִי
  english_pob_choice: rescue me
  chosen_spanish: rescatarme
  alternatives_spanish:
  - líbrame
  - sálvame
  - delivrarme
  lexicon: HALOT
  rationale: '''Rescatar'' conserva bien el sentido de sacar a alguien de peligro inmediato. En la frase, la forma infinitiva depende de ''apresúrate'' y funciona con naturalidad en español.'
- source_word: לְצוּר מָעוֹז
  english_pob_choice: a rock of refuge
  chosen_spanish: una roca de refugio
  alternatives_spanish:
  - una roca fuerte
  - una roca de amparo
  - una roca de protección
  lexicon: HALOT
  rationale: Se mantiene la combinación 'roca' + sustantivo de protección para no diluir la textura hebrea. 'Refugio' refleja מָעוֹז como lugar o medio de protección.
- source_word: לְבֵית מְצוּדוֹת
  english_pob_choice: a fortified house
  chosen_spanish: una casa fortificada
  alternatives_spanish:
  - una casa de fortalezas
  - una fortaleza
  - una casa amurallada
  lexicon: HALOT
  rationale: Se conserva la imagen de 'casa' y se explicita su carácter defensivo. 'Casa fortificada' comunica bien la fuerza de מְצוּדוֹת sin borrar la metáfora doméstica.
- source_word: לְהוֹשִׁיעֵנִי
  english_pob_choice: to save me
  chosen_spanish: para salvarme
  alternatives_spanish:
  - para rescatarme
  - para librarme
  - a fin de salvarme
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito. 'Para salvarme' mantiene el vínculo con la petición anterior y la redundancia poética del paralelismo.
translation_notes:
  revision_awareness: El contexto de revisión y el control cruzado indican alta concordancia (agree). No se registraron revisiones aplicadas; la redacción española sigue de cerca la solución inglesa auditada, preservando la doble imagen de protección ('roca de refugio' / 'casa fortificada') y la urgencia del ruego.
  spanish_consistency_notes:
  - Se prefirió 'oído' sobre 'oreja' por registro poético y eclesial más amplio.
  - Se mantuvo 'casa fortificada' para respetar la metáfora de בית sin reducirla a 'fortaleza'.
  - Se optó por 'rescatar' en la primera petición y 'salvar' en la segunda para reflejar la distinción del audit trail inglés entre נצל y ישׁע.
