translation:
  language: es
  text: Las naciones verán tu rectitud[a], y todos los reyes tu gloria; y serás llamada por un nombre nuevo[b], que la boca de Yahvé designará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu vindicación» o «tu justicia» para «tu rectitud».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que la boca de Yahvé lo designará», donde «lo» se refiere al nombre nuevo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En Isaías, גוים suele abarcar a las naciones en sentido amplio. «Las naciones» conserva ese alcance internacional y evita restringirlo a un contraste étnico-religioso específico.
- source_word: צִדְקֵךְ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu vindicación
  - tu rectitud
  lexicon: HALOT
  rationale: El término admite justicia, rectitud o vindicación. En español, «tu justicia» mantiene la amplitud semántica y suena natural en el contexto de la restauración pública de Sion ante las naciones.
- source_word: כְּבוֹדֵךְ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: כבוד en este contexto profético se refiere a la manifestación pública del honor/restauración de Sion. «Gloria» conserva el registro bíblico y la resonancia teológica.
- source_word: וְקֹרָא לָךְ
  english_pob_choice: and you will be called
  chosen_spanish: y serás llamado[a]
  alternatives_spanish:
  - y te llamarán
  - y uno te llamará
  lexicon: HALOT
  rationale: El hebreo tiene una forma activa en tercera persona singular, pero en español la pasiva refleja es la manera más natural de expresar este giro de nombramiento. Conserva la idea de un llamado/nombramiento recibido sin imponer un sujeto humano explícito.
- source_word: שֵׁם חָדָשׁ
  english_pob_choice: a new name
  chosen_spanish: con un nombre nuevo
  alternatives_spanish:
  - un nombre nuevo
  - un nuevo nombre
  lexicon: HALOT
  rationale: La preposición en la construcción española hace natural «con un nombre nuevo» tras «serás llamado». Mantiene la idea de identidad conferida sin añadir contenido ajeno al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: Proyecto POB default / HALOT
  rationale: Se sigue el default del proyecto para el nombre divino en la traducción española. «Yahvé» preserva la referencia explícita al nombre propio del pacto, en lugar de sustituirlo por una máscara litúrgica.
- source_word: יִקֳּבֶנּוּ
  english_pob_choice: will designate
  chosen_spanish: designará
  alternatives_spanish:
  - nombrará
  - lo designará
  lexicon: HALOT
  rationale: El verbo puede abarcar nombrar/especificar/designar. En español, «designará» transmite la acción de asignar oficialmente el nombre y evita la redundancia de repetir «nombre» con un verbo demasiado literal.
theological_decisions:
- issue: Sentido de צִדְקֵךְ en el contexto de la restauración de Sion
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu vindicación
  - tu rectitud
  rationale: La escena no solo describe una cualidad moral abstracta, sino la restauración visible de la relación correcta de Sion ante las naciones. «Tu justicia» mantiene la amplitud del término hebreo sin cerrar la tensión entre justicia, rectitud y vindicación.
  doctrine_reference: Translation philosophy §5; decisión léxica análoga a la tensión justicia/vindicacion preservada en POB
- issue: Fórmula del nuevo nombre otorgado por Yahvé
  english_pob_reading: you will be called by a new name that the mouth of Yahweh will designate
  chosen_spanish_reading: serás llamado con un nombre nuevo, que la boca de Yahvé designará
  alternative_spanish_readings:
  - te llamarán con un nombre nuevo que la boca de Yahvé nombrará
  - será dado a ti un nombre nuevo que la boca de Yahvé designará
  rationale: El hebreo combina un verbo de llamado con una cláusula que atribuye el origen del nombre a la boca de Yahvé. La versión española conserva esa procedencia divina y el carácter de identidad nueva conferida por Dios.
  doctrine_reference: Translation philosophy §1 y §6
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la tensión léxica entre righteousness/justice/vindication y suaviza la sintaxis del nombramiento divino. La propuesta española sigue esa misma línea, preservando la amplitud semántica de צִדְקֵךְ y la procedencia del nombre en la boca de Yahvé, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al default del proyecto para el nombre divino.
  - «Justicia» conserva la amplitud de צִדְקֵךְ sin excluir la noción de vindicación.
  - Se evita «Cristo» u otra terminología ajena al versículo; no hay presencia de משיח en el texto.
  - La pasiva refleja «serás llamado» es la opción española más natural para la construcción de nombramiento.
  - El artículo y la preposición en «con un nombre nuevo» hacen fluida la relación con el verbo de llamado en español.
