translation:
  language: es
  text: Abram pasó por la tierra hasta el lugar de Siquem, hasta la encina[a] de Moreh. Y el cananeo[b] estaba entonces en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terebinto de Moreh»; el término hebreo designa un árbol grande, pero la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «los cananeos estaban entonces en la tierra». El hebreo usa un término étnico singular que puede funcionar colectivamente.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed through
  chosen_spanish: pasó por
  alternatives_spanish:
  - atravesó
  - pasó a través de
  - viajó por
  lexicon: HALOT
  rationale: וַיַּעֲבֹר narra el desplazamiento de Abram por la región; «pasó por» expresa bien el tránsito sin añadir detalles de ruta o intensidad que el hebreo no da.
- source_word: בָּאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la región
  lexicon: HALOT
  rationale: Con artículo, la expresión apunta a la tierra en cuestión dentro del relato. «La tierra» conserva la referencia territorial amplia sin especificar más de lo que el verso dice.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - a
  lexicon: HALOT
  rationale: La preposición marca límite de recorrido. «Hasta» reproduce de forma natural el valor de extensión/borde del hebreo.
- source_word: מְקוֹם שְׁכֶם
  english_pob_choice: the place of Shechem
  chosen_spanish: el lugar de Siquem
  alternatives_spanish:
  - el sitio de Siquem
  - el lugar junto a Siquem
  lexicon: HALOT
  rationale: מקום es un sustantivo genérico que aquí designa un lugar asociado con Siquem. «El lugar de Siquem» mantiene la relación nominal sin convertirlo en una identificación más precisa de la que el texto ofrece.
- source_word: אֵלֹן מוֹרֶה
  english_pob_choice: the oak of Moreh
  chosen_spanish: el encinar de More
  alternatives_spanish:
  - la encina de More
  - el terebinto de More
  - el gran árbol de More
  lexicon: HALOT
  rationale: אֵלוֹן designa un árbol grande; en español «encinar» funciona de manera natural para un sitio marcado por árboles de este tipo y evita fijar una especie exacta donde el hebreo es incierto. Se conserva «More» como transliteración del nombre propio.
- source_word: מוֹרֶה
  english_pob_choice: Moreh
  chosen_spanish: More
  alternatives_spanish:
  - Moreh
  - el Maestro/Divinador
  lexicon: HALOT
  rationale: Se translitera el nombre propio sin añadir una lectura apelativa incierta al texto principal.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: Now the Canaanite
  chosen_spanish: Y el cananeo
  alternatives_spanish:
  - Y los cananeos
  - Ahora bien, el cananeo
  lexicon: HALOT
  rationale: El hebreo usa un singular étnico con artículo, que puede funcionar colectivamente. «El cananeo» preserva esa forma; el contexto permite entender al grupo poblacional.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  - en ese momento
  lexicon: HALOT
  rationale: Adverbio temporal que sitúa la circunstancia en ese punto de la narración. «Entonces» es breve y fiel.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en aquella tierra
  lexicon: HALOT
  rationale: La repetición final mantiene el énfasis narrativo sobre la ocupación/estancia territorial. «En la tierra» conserva la fórmula hebrea con claridad en español.
theological_decisions:
- issue: Forma singular colectiva en וְהַכְּנַעֲנִי
  english_pob_reading: the Canaanite was then in the land
  chosen_spanish_reading: el cananeo estaba entonces en la tierra
  alternative_spanish_readings:
  - los cananeos estaban entonces en la tierra
  rationale: Se mantiene el singular porque refleja la forma hebrea con artículo y conserva el matiz colectivo implícito sin normalizarlo al plural.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Nombre del árbol en אֵלוֹן מוֹרֶה
  english_pob_reading: the oak of Moreh
  chosen_spanish_reading: el encinar de More
  alternative_spanish_readings:
  - la encina de More
  - el terebinto de More
  rationale: El hebreo refiere a un árbol grande, pero la especie exacta no es segura. «Encinar» comunica el elemento arbóreo/agrupación de árboles de forma idiomática en español sin afirmar más precisión botánica de la que la fuente permite.
  doctrine_reference: Translation philosophy §5 (lexical precision without over-interpretation)
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión menor que ajustó la relación de Shechem a «of Shechem» para reflejar más de cerca el hebreo «the place of Shechem». La versión española sigue esa precisión con «el lugar de Siquem». No se documentan cambios de sentido sustantivos en las demás unidades.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda; este versículo no lo requiere.
  - Se conserva el nombre propio «Abram» conforme al hebreo y al contexto patriarcal.
  - Se traduce el topónimo como «Siquem» según la forma española bíblica más establecida y readable.
  - «Tierra» se mantiene como equivalente narrativo de הארץ sin forzar «país» o «territorio» en un verso de recorrido.
  - La puntuación separa con comas las localizaciones para reproducir el ritmo del hebreo sin sobrecargar la frase.
