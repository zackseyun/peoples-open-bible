translation:
  language: es
  text: Él no ha dirigido palabras contra mí[a], y yo no le responderé con las palabras de ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha ordenado palabras contra mí»; el verbo hebreo puede significar poner en orden, disponer o movilizar palabras, de modo que también puede entenderse como «dirigir un argumento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no le responderé con los argumentos de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרַךְ
  english_pob_choice: has directed
  chosen_spanish: ha dirigido
  alternatives_spanish:
  - ha arreglado
  - ha ordenado
  - ha dispuesto
  - ha alineado
  lexicon: HALOT
  rationale: En este contexto de debate, el verbo expresa la acción de poner palabras en orden para encaminar un argumento hacia alguien. «Ha dirigido» conserva el sentido disputativo sin sonar tan literal o mecánico como «ha arreglado» o «ha ordenado».
- source_word: אֵלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - a mí
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: Aunque la preposición puede ser «a» o «hacia», el contexto forense y polémico favorece una relación adversativa. «Contra mí» reproduce bien la fuerza argumentativa del inglés POB.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - argumentos
  - discursos
  - expresiones
  lexicon: HALOT
  rationale: El término se refiere de manera general a dicho o discurso. «Palabras» es la equivalencia más directa en español y deja que el matiz polémico lo aporte el verbo.
- source_word: אִמְרֵיכֶם
  english_pob_choice: your words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - vuestros/ustedes palabras
  - sus dichos
  - sus argumentos
  lexicon: HALOT
  rationale: El posesivo en español se ajusta al referente inmediato de los interlocutores de Job. Se conserva la repetición léxica de «palabras» para mantener la correspondencia con el hebreo y con la revisión inglesa más reciente.
- source_word: אֲשִׁיבֶנּוּ
  english_pob_choice: I will not answer him
  chosen_spanish: no le responderé
  alternatives_spanish:
  - no le contestaré
  - no le daré respuesta
  - no le replicaré
  lexicon: HALOT
  rationale: El hifil de שוב aquí tiene el sentido de responder o replicar en una controversia. «Responderé» es natural en español y suficiente para mantener el tono de réplica judicial o debatiente.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo consonante y su sintaxis breve, tomando como guía la lectura inglesa auditada. Se evita traducir mecánicamente «sayings» por un equivalente más elevado que no estaba ya respaldado por la revisión final; se conserva la repetición de «palabras» y el matiz disputativo de עָרַךְ mediante una solución española natural.
  spanish_consistency_notes:
  - Se usó «palabras» en ambos miembros para reflejar la revisión inglesa final y la repetición del hebreo.
  - Se prefirió «contra mí» para captar el valor polémico de אֵלַי en este contexto.
  - No se introdujo terminología doctrinal; el versículo es de tono argumentativo y no requiere ajustes teológicos especiales.
