translation:
  language: es
  text: entonces tomarás el punzón[a] y se lo pasarás por la oreja y hasta la puerta, y él será tu esclavo permanentemente[b]. Y harás lo mismo con tu esclava.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrumento de perforar»; el hebreo se refiere a una herramienta puntiaguda usada para horadar.
    reason: lexical_alternative
  - marker: b
    text: O «para siempre» o «de por vida»; en este contexto legal, el hebreo también puede expresar una condición duradera dentro de ese marco, no necesariamente eternidad absoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּרְצֵעַ
  english_pob_choice: the awl
  chosen_spanish: el punzón
  alternatives_spanish:
  - el punzón de perforar
  - el awl
  lexicon: HALOT
  rationale: El término hebreo designa una herramienta puntiaguda para perforar o abrir un agujero. En español, «punzón» comunica la idea de instrumento perforador de forma natural y digna; «awl» no es transparente para lectores españoles. Se mantiene la precisión instrumental sin calco mecánico.
- source_word: וְנָתַתָּה בְאָזְנוֹ וּבַדֶּלֶת
  english_pob_choice: put it through his ear and into the door
  chosen_spanish: lo pondrás en su oreja y en la puerta
  alternatives_spanish:
  - lo pasarás por su oreja y en la puerta
  - lo pondrás a través de su oreja y en la puerta
  lexicon: HALOT
  rationale: El hebreo describe la colocación del instrumento en la oreja y en la puerta; en contexto legal, el sentido es el acto ritual de perforación. «Lo pondrás en su oreja y en la puerta» conserva la doble referencia del original y evita sobreexplicar más allá de la evidencia fuente.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En este contexto jurídico la condición vinculada y permanente es central. Siguiendo la decisión auditada del POB en inglés, «esclavo» preserva mejor la fuerza legal que «siervo», que suaviza indebidamente el término.
- source_word: עוֹלָם
  english_pob_choice: permanently
  chosen_spanish: para siempre
  alternatives_spanish:
  - permanentemente
  - de por vida
  lexicon: HALOT
  rationale: En hebreo legal, עוֹלָם señala duración indefinida o de por vida dentro del marco del pacto, no necesariamente eternidad metafísica. «Para siempre» es la forma española más natural y fiel a esa duración continua; la nota preserva la tensión con posibles restricciones legales del contexto más amplio.
- source_word: אֲמָתְךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: HALOT
  rationale: אָמָה corresponde a una mujer en condición servil o esclava. Para mantener la consistencia con עֶבֶד = «esclavo», se traduce «tu esclava» y no «sierva», que debilitaría la simetría lexical del versículo.
- source_word: וְאַף
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - También
  lexicon: HALOT
  rationale: La partícula añade la aplicación de la misma norma al caso femenino. En español, «Y» conserva la adición sin añadir énfasis interpretativo innecesario.
- source_word: תַּעֲשֶׂה כֵּן
  english_pob_choice: you shall do the same
  chosen_spanish: harás lo mismo
  alternatives_spanish:
  - harás así
  - procederás del mismo modo
  lexicon: HALOT
  rationale: La expresión es idiomática y manda reproducir el procedimiento en el caso correspondiente. «Harás lo mismo» es claro, natural y suficientemente formal en español.
theological_decisions:
- issue: Terminología de esclavitud en la ley israelita
  english_pob_reading: Use 'slave' / 'female slave' rather than 'servant'
  chosen_spanish_reading: Usar «esclavo» / «esclava» en lugar de «siervo»
  alternative_spanish_readings:
  - siervo/sierva
  - criado/criada
  - sirviente
  rationale: El rito descrito marca una dependencia legal permanente; «esclavo» conserva mejor esa fuerza social-jurídica que términos más suaves. Esta decisión sigue la filosofía POB documentada en inglés para δοῦλος y términos afines de estado vinculado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, contested terms table (equivalente funcional para esclavitud/servidumbre)
- issue: Alcance temporal de עוֹלָם en contexto legal
  english_pob_reading: '''permanently'' with footnote allowing ''for life'''
  chosen_spanish_reading: «para siempre» con nota sobre el posible matiz de «de por vida»
  alternative_spanish_readings:
  - permanentemente
  - de por vida
  - para toda la vida
  rationale: El hebreo de ley puede señalar duración continua dentro del marco social del mandamiento, sin afirmar necesariamente infinitud absoluta. En español, «para siempre» es idiomático y refleja bien la idea básica; la nota deja abierta la alternativa contextual de «de por vida», preservando la tensión documental.
  doctrine_reference: HALOT; contexto legal de Levítico 25 y paralelos del servidumbre jubilar
translation_notes:
  revision_awareness: La redacción inglesa más reciente osciló entre 'forever' y 'permanently' para עוֹלָם, y el expediente final corrigió de nuevo a 'permanently' por razones de contexto legal. La versión española adopta «para siempre» como equivalente idiomático principal, pero la nota c preserva explícitamente el matiz alternativo «de por vida» documentado por el contexto jurídico y la tensión auditable sobre la duración.
  spanish_consistency_notes:
  - 'Se mantiene la simetría lexical: עֶבֶד = «esclavo» y אֲמָה = «esclava».'
  - «Y» traduce el valor aditivo de וְאַף sin sobreinterpretar.
  - No se introduce «SEÑOR» ni otras convenciones de máscara divina, porque el versículo no contiene el Tetragrámaton.
  - Se evita «siervo» por su suavización semántica en un contexto de vínculo legal coercitivo.
  - La nota sobre עוֹלָם preserva la tensión entre «para siempre» y «de por vida» sin borrar la ambigüedad contextual.
