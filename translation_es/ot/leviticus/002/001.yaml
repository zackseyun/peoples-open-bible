  text: וְ/נֶ֗פֶשׁ כִּֽי תַקְרִ֞יב קָרְבַּ֤ן מִנְחָה֙ לַֽ/יהוָ֔ה סֹ֖לֶת יִהְיֶ֣ה קָרְבָּנ֑/וֹ וְ/יָצַ֤ק עָלֶ֨י/הָ֙ שֶׁ֔מֶן וְ/נָתַ֥ן עָלֶ֖י/הָ לְבֹנָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/002/001.yaml
  text: When a person presents a grain offering to Yahweh[a], his offering shall be of fine flour[b], and he shall pour oil on it and put frankincense on it.
  footnotes:
  - marker: a
    text: Or 'When anyone brings a grain offering to the LORD.' Hebrew נֶפֶשׁ literally means 'soul,' but here refers to an individual person.
    reason: lexical_alternative
  - marker: b
    text: '''Grain offering'' translates Hebrew מִנְחָה, a cereal offering made here of fine flour.'
    reason: cultural_note
