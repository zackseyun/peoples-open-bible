  revision_rationale: Se sustituye «la casa de Yahvé fue fundada» por «se echaron los cimientos de la casa de Yahvé» para reflejar con mayor naturalidad en español el valor constructivo de יֻסַּד. Se conserva la alternativa de «fue fundada» en nota, ya que sigue siendo una posibilidad léxica documentada por la auditoría inglesa. No se requieren otros cambios.
