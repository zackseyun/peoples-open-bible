translation:
  language: es
  text: 'Vivo yo —declara el Señor Yahvé—: ciertamente porque mi rebaño ha sido entregado al despojo[a] y mi rebaño ha sido puesto como alimento para toda bestia del campo, por cuanto no había pastor, y mis pastores no buscaron a mi rebaño, sino que los pastores se apacentaron a sí mismos[b] y no apacentaron a mi rebaño.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «presa» también es una traducción posible de «despojo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los pastores se pastorearon a sí mismos». El giro hebreo significa que cuidaron sus propios intereses en vez del rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֜נִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como que vivo yo
  - Por mi vida
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne. «Vivo yo» conserva la fuerza enfática y la cadencia profética en español sin añadir contenido ajeno.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: נְאֻם introduce una fórmula profética de declaración; «declara» la comunica bien en español. YHWH se rinde como «Yahvé» según el estándar del proyecto, y el compuesto אֲדֹנָי יְהוִה queda natural como «Señor Yahvé».
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - en verdad
  lexicon: HALOT
  rationale: En una fórmula de juramento, אִם לֹא funciona como aseveración enfática, no como condición. «Ciertamente» transmite bien esa afirmación contundente.
- source_word: יַעַן הֱיוֹת
  english_pob_choice: because ... has become
  chosen_spanish: porque ... ha sido entregado
  alternatives_spanish:
  - porque ... ha llegado a ser
  - por cuanto ... ha quedado
  lexicon: HALOT
  rationale: El infinitivo causal expresa la razón del juicio. En contexto, la idea no es solo que el rebaño «llegó a ser» despojo, sino que «ha sido entregado al despojo», lo cual refleja bien el pasivo de la situación y su sentido resultante.
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi rebaño de ovejas
  lexicon: HALOT
  rationale: En español bíblico «rebaño» es el equivalente natural y colectivo para צֹאן. Mantiene la imagen pastoral sin perder la unidad del grupo.
- source_word: לָבַז
  english_pob_choice: plunder
  chosen_spanish: al despojo
  alternatives_spanish:
  - presa
  - botín
  lexicon: HALOT
  rationale: El sustantivo denota algo tomado por la fuerza. «Al despojo» expresa bien la condición de haber sido saqueado y evita confundirlo con la metáfora de alimento en la cláusula siguiente.
- source_word: לְאָכְלָה
  english_pob_choice: food
  chosen_spanish: como alimento
  alternatives_spanish:
  - para alimento
  - para ser devorado
  lexicon: HALOT
  rationale: El sustantivo designa lo que se come. «Como alimento» conserva el paralelismo con el despojo y suena natural en español.
- source_word: לְכָל חַיַּת הַשָּׂדֶה
  english_pob_choice: for every wild beast of the field
  chosen_spanish: para toda bestia del campo
  alternatives_spanish:
  - para todo animal del campo
  - para toda fiera del campo
  lexicon: HALOT
  rationale: «Bestia del campo» mantiene el registro elevado del hebreo profético. «Toda» conserva el alcance distributivo de לְכָל.
- source_word: מֵאֵין רֹעֶה
  english_pob_choice: since there was no shepherd
  chosen_spanish: por cuanto no había pastor
  alternatives_spanish:
  - porque no había pastor
  - sin pastor
  lexicon: HALOT
  rationale: La frase introduce la circunstancia causal de la vulnerabilidad del rebaño. «Por cuanto no había pastor» preserva el tono causal y el registro bíblico sin sonar arcaico.
- source_word: דָרְשׁוּ
  english_pob_choice: did not seek
  chosen_spanish: no buscaron
  alternatives_spanish:
  - no buscaron diligentemente
  - no se interesaron por
  lexicon: HALOT
  rationale: דרשׁ suele significar «buscar/indagar». Aquí «buscaron» es la opción más directa y mantiene la responsabilidad pastoral de los encargados del rebaño.
- source_word: רֹעַי
  english_pob_choice: my shepherds
  chosen_spanish: mis pastores
  alternatives_spanish:
  - mis pastores de ovejas
  - los pastores míos
  lexicon: HALOT
  rationale: El poseído marca pertenencia y responsabilidad ante Dios. «Mis pastores» es natural y conserva la acusación de incumplimiento.
- source_word: וַיִּרְעוּ הָרֹעִים אוֹתָם
  english_pob_choice: the shepherds fed themselves
  chosen_spanish: los pastores se apacentaron a sí mismos
  alternatives_spanish:
  - los pastores se alimentaron a sí mismos
  - los pastores pastaron para sí
  lexicon: HALOT
  rationale: 'El hebreo usa un juego de verbo pastoral con valor reflexivo de aprovechamiento propio. «Se apacentaron a sí mismos» conserva el verbo raíz y deja visible la ironía: debían pastorear al rebaño, pero se pastorearon a sí mismos.'
- source_word: וְאֶת צֹאנִי לֹא רָעוּ
  english_pob_choice: and did not feed my flock
  chosen_spanish: y no apacentaron a mi rebaño
  alternatives_spanish:
  - y no pastorearon a mi rebaño
  - y no alimentaron a mi rebaño
  lexicon: HALOT
  rationale: רעה aquí mantiene el sentido pastoral de alimentar/cuidar. «Apacentaron» equilibra fidelidad lexical y naturalidad bíblica en español, y mantiene el contraste con la frase anterior.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en el título compuesto con אֲדֹנָי
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Yahvé
  rationale: El texto hebreo contiene el Tetragrama de manera explícita. Conforme a la práctica del proyecto, se rinde como «Yahvé» y no se oculta tras una sustitución genérica. En el compuesto con אֲדֹנָי, «Señor Yahvé» preserva tanto la reverencia como la visibilidad del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del reproche pastoral en los verbos de pastoreo
  english_pob_reading: the shepherds fed themselves and did not feed my flock
  chosen_spanish_reading: los pastores se apacentaron a sí mismos y no apacentaron a mi rebaño
  alternative_spanish_readings:
  - los pastores se alimentaron a sí mismos y no alimentaron a mi rebaño
  - los pastores pastaron para sí y no pastaron a mi rebaño
  rationale: La frase hebrea denuncia abuso de cargo y auto-beneficio, no solo omisión. La construcción reflexiva con «apacentaron a sí mismos» hace visible esa tensión sin suavizar el reproche.
  doctrine_reference: 'DOCTRINE.md: Pastoral imagery and accountability'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés para conservar la estructura de juramento, la causalidad de יַעַן, el contraste entre el autoapacentamiento de los pastores y su falta de cuidado del rebaño, y la visibilidad del nombre divino Yahvé. Se mantuvo la repetición de «mi rebaño» para reflejar el énfasis del hebreo. No se detectaron revisiones posteriores que alteren el sentido base del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «rebaño» de forma consistente para צֹאן en este contexto pastoral.
  - Se conserva «apacentaron» para reflejar el juego verbal del hebreo entre pastorear y aprovecharse del rebaño.
  - Las repeticiones de «mi rebaño» reflejan la insistencia del hebreo y no se reducen por estilo.
