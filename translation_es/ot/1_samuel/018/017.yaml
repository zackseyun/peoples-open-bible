  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad narrativa y naturalidad del español sin cambiar el sentido: se añadió una coma de aposición en «mi hija mayor, Merab»; se cambió «decía» por «dijo» para reflejar mejor la cláusula explicativa del hebreo; y se reformuló el volitivo con «Que mi mano no esté contra él...» para conservar la metáfora de «mano» en un español más idiomático. La terminología clave del proyecto, especialmente «Yahvé», se mantiene intacta.'
