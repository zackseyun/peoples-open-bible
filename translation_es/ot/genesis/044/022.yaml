translation:
  language: es
  text: 'Y dijimos a mi señor[a]: «El muchacho no puede dejar a su padre, porque si dejara a su padre, moriría».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y deja a su padre, y muere». El hebreo deja implícito el sujeto de «moriría»; por el contexto, se entiende que se refiere al padre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  english_pob_choice: And we said
  chosen_spanish: Y dijimos
  alternatives_spanish:
  - Entonces dijimos
  - Así que dijimos
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa. «Y dijimos» mantiene el flujo del relato sin añadir una interpretación temporal más fuerte que la del hebreo.
- source_word: אֶל אֲדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  - a mi señor, le hablo
  lexicon: HALOT
  rationale: La forma con sufijo 1cs es un tratamiento deferente a José. En español, «mi señor» conserva el tono cortesano mejor que «mi amo», que suena más servil en este contexto.
- source_word: לֹא יוּכַל
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no tiene poder para
  lexicon: HALOT
  rationale: יָכֹל expresa capacidad. «No puede» es la equivalencia natural y clara en español, y conserva la fuerza de incapacidad.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho joven
  lexicon: HALOT
  rationale: נער puede ser «muchacho», «joven» o «lad». Aquí el vínculo familiar y la dependencia hacia el padre favorecen «el muchacho», que es natural y conserva el matiz afectivo.
- source_word: לַעֲזֹב
  english_pob_choice: leave
  chosen_spanish: dejar
  alternatives_spanish:
  - abandonar
  - irse de
  lexicon: HALOT
  rationale: En este contexto עזב es dejar a alguien atrás o separarse de él. «Dejar» reproduce bien el sentido sin cargar la idea moral de «abandonar».
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - de su padre
  lexicon: HALOT
  rationale: El hebreo repite el poseedor para énfasis y claridad. En español, la repetición con «a su padre» mantiene la estructura y el énfasis relacional.
- source_word: וְעָזַב
  english_pob_choice: for if he should leave
  chosen_spanish: porque si deja
  alternatives_spanish:
  - y si deja
  - porque si dejara
  lexicon: HALOT
  rationale: 'Aunque formalmente es una forma verbal con waw, en el contexto funciona condicionalmente/causalmente tras la incapacidad: «porque si deja» refleja bien la relación lógica señalada en la revisión inglesa.'
- source_word: וָמֵת
  english_pob_choice: he would die
  chosen_spanish: morirá
  alternatives_spanish:
  - moriría
  - va a morir
  lexicon: HALOT
  rationale: 'El sujeto implícito se entiende por el contexto como el padre. En español, el futuro simple comunica con naturalidad la consecuencia prevista: «morirá».'
theological_decisions:
- issue: Sujeto implícito de «morirá»
  english_pob_reading: The Hebrew leaves the subject of 'would die' implicit; context indicates it refers to the father.
  chosen_spanish_reading: El sujeto de «morirá» queda implícito y se entiende por el contexto que es el padre.
  alternative_spanish_readings:
  - si él dejara a su padre, él moriría
  - si dejara a su padre, moriría
  rationale: Conviene no explicitar en el texto una glosa que el hebreo no expresa. La ambigüedad se resuelve contextualmente, y el español puede conservarla de forma natural.
  doctrine_reference: Principio de lectura contextual del sujeto implícito; fidelidad al hebreo sin añadir elementos no expresos.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que cambió la puntuación y la relación causal a «for if». En español se reflejó con «porque si» para conservar la conexión causal-condicional de forma natural y formal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se prefirió «mi señor» por coherencia con el trato deferente documentado en el inglés POB.
  - Se usó «muchacho» para נער, en línea con la lectura afectiva y familiar del pasaje.
  - La nota de pie conserva la alternativa literal del hebreo y aclara el sujeto implícito sin sobretraducir.
