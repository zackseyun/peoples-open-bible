revisions:
- from: Haré temblar a todas las naciones[a], y vendrán las riquezas de todas las naciones; y llenar&eacute; de gloria esta casa, ha dicho Yahvé de los Ejércitos.
  to: Haré temblar a todas las naciones[a], y vendrán los tesoros de todas las naciones, y llenaré de gloria esta casa, dice Yahvé de los Ejércitos.
  rationale: La revisión es menor y no doctrinalmente incierta. Ajusta el texto principal para reflejar mejor la decisión léxica auditada («tesoros»), corrige la fórmula profética a un presente idiomático («dice»), arregla la codificación y suaviza la puntuación, sin alterar el sentido establecido por la evidencia fuente.
