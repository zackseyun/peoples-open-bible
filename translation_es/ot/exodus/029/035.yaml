    issue: La nota dice «instalar u otorgar el oficio sacerdotal» en vez de una formulación más compacta como «ordenar o instalar en el sacerdocio».
    rationale: No afecta fidelidad ni claridad sustancial; es solo una posible mejora estilística, no necesaria para revisión.
