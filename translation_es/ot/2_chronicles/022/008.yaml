base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/008.yaml
  text: And it happened[a], when Jehu was executing judgment on the house of Ahab, that he found the officials of Judah and the sons of Ahaziah’s brothers, serving Ahaziah[b], and he killed them.
