translation:
  language: es
  text: Y el altar de bronce que Bezalel, hijo de Uri, hijo de Hur, había hecho, estaba allí delante del tabernáculo de Yahvé, y Salomón y la asamblea lo buscaron[a] allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Salomón y la asamblea buscaron allí a Yahvé»; el sufijo hebreo es ambiguo y también puede entenderse con referencia al altar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar de bronce
  - el altar de cobre
  lexicon: HALOT
  rationale: מִזְבַּח se traduce naturalmente como «altar». נְחֹשֶׁת, en contexto cultual, suele referir a un metal de tono cobrizo/bronzeado; «bronce» es la opción más estable en español bíblico contemporáneo y evita el matiz técnico menos natural de «cobre».
- source_word: בְּצַלְאֵל בֶּן אוּרִי בֶן חוּר
  english_pob_choice: Bezalel son of Uri, son of Hur
  chosen_spanish: Bezalel, hijo de Uri, hijo de Hur
  alternatives_spanish:
  - Bezalel, hijo de Uri, hijo de Hur
  - Bezalel, el hijo de Uri, el hijo de Hur
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; «hijo de» conserva la relación genealógica explícita del hebreo sin recargarla con fórmulas más rígidas que el español actual.
- source_word: שָׂם
  english_pob_choice: was there
  chosen_spanish: estaba allí
  alternatives_spanish:
  - había sido puesto allí
  - estaba puesto allí
  - estaba allí
  lexicon: HALOT
  rationale: El hebreo expresa un resultado locativo; en español, «estaba allí» comunica la presencia estable del altar sin introducir indebidamente un agente explícito.
- source_word: לִפְנֵי מִשְׁכַּן יְהוָה
  english_pob_choice: before the tabernacle of Yahweh
  chosen_spanish: delante del tabernáculo de Yahvé
  alternatives_spanish:
  - frente al tabernáculo de Yahvé
  - ante el tabernáculo de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי es espacial («delante de / ante»). «Tabernáculo» mantiene el término cultual reconocido, y «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: וַיִּדְרְשֵׁהוּ
  english_pob_choice: sought it there
  chosen_spanish: lo buscaron allí
  alternatives_spanish:
  - lo buscaron allí
  - lo consultaron allí
  - buscaron allí a Yahvé
  lexicon: HALOT
  rationale: דרשׁ puede significar «buscar» o «consultar/inquirir». El inglés POB preserva la ambigüedad del referente con «it»; en español, «lo buscaron allí» mantiene esa apertura sin forzar una lectura personal. No se explicita «a Yahvé» porque el hebreo no lo nombra de forma directa aquí.
- source_word: שְׁלֹמֹה וְהַקָּהָל
  english_pob_choice: Solomon and the assembly
  chosen_spanish: Salomón y la asamblea
  alternatives_spanish:
  - Salomón y la asamblea
  - Salomón y la congregación
  lexicon: HALOT
  rationale: קָהָל designa la comunidad reunida; «asamblea» es el equivalente más claro y menos eclesiástico que «congregación».
theological_decisions:
- issue: Referente del sufijo en וַיִּדְרְשֵׁהוּ
  english_pob_reading: The suffix is ambiguous; English POB preserved the alternative that the altar is sought, while noting the possibility of seeking the LORD.
  chosen_spanish_reading: «lo buscaron allí» conserva la ambigüedad del objeto sin convertirlo en una persona o en un objeto litúrgico determinado.
  alternative_spanish_readings:
  - «buscaron allí a Yahvé»
  - «lo consultaron allí»
  - «buscaron el altar allí»
  rationale: El hebreo permite leer el sufijo como referido al altar o, por uso bíblico, como objeto implícito de búsqueda religiosa. La opción española mantiene la tensión textual sin resolverla de antemano, en línea con la POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «sought him there» a «sought it there» para evitar un objeto personal explícito; la versión española sigue ese ajuste y conserva la ambigüedad referencial del sufijo hebreo mediante «lo buscaron allí», sin añadir un sujeto u objeto no expresado de forma directa en el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» conforme al criterio del proyecto.
  - «Bronce» se mantiene como término cultual normalizado en español para נְחֹשֶׁת.
  - «Asamblea» se prefiere a «congregación» por su mayor neutralidad y cercanía al sentido de קָהָל.
  - La nota al pie marca la posibilidad alternativa sin duplicar marcadores ni desplazar el sentido principal del texto.
