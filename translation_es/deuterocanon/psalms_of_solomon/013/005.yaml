translation:
  language: es
  text: Porque terrible[a] es la destrucción del pecador, y nada de todas estas cosas tocará al justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «espantosa»; el griego δεινή puede abarcar la idea de algo terrible, temible o severo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεινή
  english_pob_choice: dreadful
  chosen_spanish: terrible
  alternatives_spanish:
  - espantosa
  - temible
  - pavorosa
  lexicon: LSJ
  rationale: Expresa en español moderno la fuerza grave y alarmante del adjetivo sin sonar artificial. Mantiene el peso de juicio del contexto.
- source_word: καταστροφή
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - derrocamiento
  - desastre
  lexicon: LSJ
  rationale: «Destrucción» es la opción más clara y amplia para la idea de ruina o devastación. No restringe innecesariamente el sentido a un colapso militar o político.
- source_word: ἁμαρτωλοῦ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el hombre pecador
  - el impío
  - la persona pecadora
  lexicon: LSJ
  rationale: Es la manera natural de reproducir el sustantivo singular con su fuerza moral. Conserva el contraste con «el justo».
- source_word: ἅψεται
  english_pob_choice: will touch
  chosen_spanish: tocará
  alternatives_spanish:
  - afectará
  - alcanzará
  - vendrá sobre
  lexicon: LSJ
  rationale: «Tocar» conserva la imagen concreta del verbo griego y, en español, puede expresar que los males no alcanzarán al justo.
- source_word: δικαίου
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al hombre justo
  - al justificado
  lexicon: LSJ
  rationale: «El justo» es la forma más natural y fiel para una categoría moral singular representativa. Mantiene el paralelismo con «el pecador».
- source_word: οὐδὲν ἐκ πάντων τούτων
  english_pob_choice: none of all these things
  chosen_spanish: ninguna de todas estas cosas
  alternatives_spanish:
  - nada de todas estas cosas
  - ninguna de estas cosas
  - ni una sola de todas estas cosas
  lexicon: LSJ
  rationale: Incluye el matiz totalizador de πάντων («de todas»), que el audit trail señaló como importante. En español, «ninguna de todas estas cosas» preserva ese énfasis sin perder naturalidad.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión que corrigió la omisión de πάντων en la versión inglesa. Por eso la frase española conserva explícitamente «de todas estas cosas», para reflejar el énfasis totalizador del griego.
  spanish_consistency_notes:
  - Se mantuvo la simetría moral «pecador / justo», coherente con el contraste del verso.
  - Se usó «todas estas cosas» para reflejar el alcance total de οὐδὲν ἐκ πάντων τούτων.
  - El tono es sobrio y publicable, sin depender de calcos demasiado rígidos del inglés.
