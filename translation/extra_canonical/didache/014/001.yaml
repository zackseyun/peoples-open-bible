translation:
  text: 'But on the Lord’s own day, after you have gathered together, break bread and give thanks, after first confessing your transgressions, so that your sacrifice may be pure. But let no one who has a dispute with his companion come together with you until they are reconciled, so that your sacrifice may not be defiled. For this is what was spoken by the Lord: “In every place and time offer me a pure sacrifice, because I am a great King,” says the Lord, “and my name is marvelous among the nations.”'
