  text: רָעָ֞ב כִּֽי יִהְיֶ֣ה בָ/אָ֗רֶץ דֶּ֣בֶר כִּֽי יִֽ֠הְיֶה שִׁדָּפ֨וֹן וְ/יֵרָק֜וֹן אַרְבֶּ֤ה וְ/חָסִיל֙ כִּ֣י יִהְיֶ֔ה כִּ֧י יָֽצַר ל֛/וֹ אוֹיְבָ֖י/ו בְּ/אֶ֣רֶץ שְׁעָרָ֑י/ו כָּל נֶ֖גַע וְ/כָֽל מַחֲלָֽה־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/028.yaml
  text: If there is famine in the land[a], if there is plague, blight, mildew, locust, or caterpillar; if his enemies besiege him in the land of his gates[b]; whatever plague and whatever sickness there may be—
  footnotes:
  - marker: a
    text: Or 'devouring locust' for 'caterpillar'; the Hebrew term חָסִיל refers generally to a crop-devouring insect, and the exact species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the land of his gates,' with 'gates' standing for the cities or towns of the land.
    reason: cultural_note
