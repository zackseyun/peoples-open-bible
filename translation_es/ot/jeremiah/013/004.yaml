review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: tomar la prenda, ir a Perat/Perath y esconderla en una fisura de la roca. Sin embargo, la anotación está mal anclada: la nota sobre la identificación de Perat aparece en «cinturón[a]» en vez de en «Perat[a]». Además, el doble sistema de notas introduce redundancia no presente en el POB inglés. En lo léxico, «cinturón» es posible pero algo más moderno y rígido que el matiz de אֵזוֹר; «faja» funciona mejor en este contexto profético sin sobreinterpretar como «taparrabo».'
  spanish_quality_summary: El español es claro y digno, pero «sobre tus lomos» suena más tradicional que natural en español contemporáneo general; «en tu cintura» mantiene la referencia corporal con mejor legibilidad. «la peña» es aceptable, pero «la roca» se alinea más estrechamente con la decisión base y con una lectura más neutra y amplia. La puntuación y la fluidez son buenas.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión principal documentada es transliterar פְּרָתָה; en español conviene mantener «Perat» o «Perath» en el texto principal y conservar una sola nota con la alternativa «el Éufrates». La revisión propuesta usa «Perat[a]» y elimina la nota redundante.
  issues:
  - severity: high
    issue: La nota sobre Perat está anclada al término equivocado.
    rationale: La nota [a] explica la identificación de Perat con el Éufrates, pero en el borrador está colocada en «cinturón[a]» en lugar de en el topónimo. Esto incumple la disciplina de anclaje de notas.
  - severity: medium
    issue: Hay una nota redundante adicional sobre la transliteración de Perat.
    rationale: El POB inglés conserva una sola nota para la alternativa «Euphrates». La nota [b] repite información ya implícita en la decisión léxica y recarga innecesariamente el texto.
  - severity: medium
    issue: «sobre tus lomos» es menos natural que «en tu cintura».
    rationale: Aunque semánticamente defendible, «sobre tus lomos» suena más arcaizante en español general. «En tu cintura» comunica mejor el referente corporal sin pérdida sustancial.
  - severity: low
    issue: «cinturón» puede sonar demasiado moderno/estructurado para אֵזוֹר en este contexto.
    rationale: Dado que el POB inglés eligió «waistband» para evitar sobreespecificar, «faja» reproduce mejor una prenda ceñida a la cintura que «cinturón», sin ir tan lejos como «taparrabo».
  - severity: low
    issue: «la peña» se aparta innecesariamente de la opción base más neutra.
    rationale: «Peña» es válida, pero «la roca» corresponde más directamente a הַסָּלַע y armoniza mejor con «hendidura».
  revised_spanish_text: Toma la faja que compraste, que está en tu cintura, y levántate, ve a Perat[a], y escóndela allí, en la hendidura de la roca.
  revised_footnotes:
  - marker: a
    text: Perat es tradicionalmente identificado con el Éufrates; muchas traducciones, por tanto, leen «el Éufrates».
    reason: alternative_reading
  revision_rationale: 'Se corrige el anclaje de la nota para que recaiga sobre «Perat», se elimina la nota redundante, y se ajustan varias elecciones léxicas para mayor fidelidad y naturalidad: «faja» por אֵזוֹר, «en tu cintura» por עַל מָתְנֶיךָ y «la roca» por הַסָּלַע. También se concuerda el pronombre con el género de «faja» («escóndela»).'
