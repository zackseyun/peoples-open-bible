review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: sentido partitivo en וּמֵהֶם, responsabilidad delegada en מְמֻנִּים, y la serie de elementos bajo custodia. Sin embargo, se aparta de una decisión léxica importante del original y del rastro POB al traducir הַלְּבוֹנָה como «incienso» en vez de un término específico para frankincense/olíbano. También convierte en texto principal una alternativa que el inglés dejó como nota para כָּל כְּלֵי הַקֹּדֶשׁ.'
  spanish_quality_summary: 'El español es generalmente claro y natural. «Fueron puestos a cargo» y «flor de harina» funcionan bien. No obstante, la nota [a] está mal anclada: se coloca tras «utensilios» pero comenta una alternativa para toda la frase «todos los utensilios del santuario / todos los utensilios sagrados». Además, conviene ajustar el texto principal para reflejar mejor el valor de «holy vessels» sin absorber en el cuerpo una alternativa que el expediente inglés dejó en nota.'
  glossary_alignment: 'No hay términos del glosario principal comprometidos como Yahvé/Mesías. Sí hay una desviación léxica relevante: לְבוֹנָה debe conservarse como «olíbano» o, secundariamente, «frankincienso», no «incienso», porque el hebreo es específico. Para כְּלֵי הַקֹּדֶשׁ, «utensilios sagrados» alinea mejor con «holy vessels», dejando «del santuario» en nota como alternativa preservada del inglés.'
  issues:
