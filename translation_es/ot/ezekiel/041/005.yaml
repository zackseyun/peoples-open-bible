translation:
  language: es
  text: 'Entonces midió la pared de la casa: seis codos; y el ancho de las cámaras laterales[a] era de cuatro codos, alrededor de la casa por todos lados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cámara lateral» o «la estructura lateral». El término hebreo se refiere a los aposentos construidos a los lados del edificio del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción en la visión; "Entonces" conserva la secuencia narrativa natural en español sin perder el valor verbal simple de "midió".
- source_word: קִיר
  english_pob_choice: wall
  chosen_spanish: pared
  alternatives_spanish:
  - muro
  - pared de piedra
  lexicon: HALOT
  rationale: En este contexto arquitectónico, "pared" comunica con claridad la estructura del edificio. "Muro" también es posible, pero "pared" suena más natural en español sin alterar el sentido básico.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa/templo
  lexicon: HALOT
  rationale: Se conserva el término general "casa" como equivalente directo de בַּיִת, tal como la POB inglesa preserva "house". El contexto de la visión del templo deja claro el referente.
- source_word: שֵׁשׁ אַמּוֹת
  english_pob_choice: six cubits
  chosen_spanish: seis codos
  alternatives_spanish:
  - seis codos de longitud
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua "codos" para no convertir la medida. La frase es directa y fiel al hebreo.
- source_word: הַצֵּלָע
  english_pob_choice: the side chambers
  chosen_spanish: las cámaras laterales
  alternatives_spanish:
  - la cámara lateral
  - las habitaciones laterales
  - la estructura lateral
  lexicon: HALOT
  rationale: La POB inglesa revisada opta por el plural colectivo "side chambers". En español, "cámaras laterales" refleja bien la arquitectura del templo y preserva el sentido colectivo/surrounding del término sin singularizarlo indebidamente.
- source_word: אַרְבַּע אַמּוֹת
  english_pob_choice: four cubits
  chosen_spanish: cuatro codos
  alternatives_spanish:
  - cuatro codos de ancho
  lexicon: HALOT
  rationale: Se mantiene la medida antigua con la misma sencillez del hebreo y de la POB inglesa.
- source_word: סָבִיב סָבִיב לַבַּיִת סָבִיב
  english_pob_choice: all around the house on every side
  chosen_spanish: todo alrededor de la casa por todos lados
  alternatives_spanish:
  - alrededor de la casa por todos lados
  - rodeando la casa por todas partes
  lexicon: HALOT
  rationale: La repetición de סָבִיב intensifica la idea de circundación. "Todo alrededor... por todos lados" conserva esa fuerza enfática en un español natural.
translation_notes:
  revision_awareness: La redacción inglesa más reciente corrigió "side chamber" a "side chambers" para reflejar mejor el sentido colectivo del hebreo. La versión española sigue esa revisión con el plural "cámaras laterales" y conserva la estructura narrativa y dimensional del versículo.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" o sustituciones litúrgicas porque no aparece el tetragrama en este versículo.
  - Se mantuvo "codos" como unidad antigua, coherente con la práctica de la POB de no modernizar medidas.
  - Se eligió "cámaras laterales" en plural para reflejar el valor colectivo de הַצֵּלָע en contexto arquitectónico.
  - La puntuación con dos puntos y punto y coma reproduce con claridad la coordinación de dos medidas en el hebreo.
