  text: לֹ֣א דֻכְּא֔וּ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וְ/לֹ֣א יָרְא֗וּ וְ/לֹֽא הָלְכ֤וּ בְ/תֽוֹרָתִ/י֙ וּ/בְ/חֻקֹּתַ֔/י אֲשֶׁר נָתַ֥תִּי לִ/פְנֵי/כֶ֖ם וְ/לִ/פְנֵ֥י אֲבוֹתֵי/כֶֽם־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/010.yaml
  text: They have not been humbled to this day[a], and they have not feared[b], and they have not walked in my law and in my statutes that I set before them and before their fathers.
  footnotes:
