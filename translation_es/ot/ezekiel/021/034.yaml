translation:
  language: es
  text: mientras ven visiones falsas para ti y adivinan mentiras para ti[a], para ponerte sobre los cuellos de los impíos muertos[b], cuyo día ha llegado, en el tiempo del castigo del fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ven falsedad para ti y adivinan engaño para ti».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo difícil: literalmente, «sobre los cuellos de los impíos muertos»; posiblemente significa que te hagan caer entre los ya muertos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en el tiempo de la culpa del fin» o «en el tiempo de la iniquidad final».'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּחֲזוֹת
  english_pob_choice: while they see
  chosen_spanish: mientras ven
  alternatives_spanish:
  - cuando ven
  - al ver
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa simultaneidad/temporalidad. «Mientras ven» conserva el matiz durativo y suena natural en español.
- source_word: שָׁוְא
  english_pob_choice: false visions
  chosen_spanish: visiones falsas
  alternatives_spanish:
  - visiones vanas
  - falsedad
  - vaciedad
  lexicon: HALOT
  rationale: En contexto profético, שָׁוְא califica las visiones como engañosas, no solo «vacías». «Visiones falsas» mantiene el vínculo con חזה y el sentido de engaño.
- source_word: בִּקְסָם
  english_pob_choice: and divine
  chosen_spanish: y adivinan
  alternatives_spanish:
  - y practican adivinación
  - y mientras adivinan
  lexicon: HALOT
  rationale: קסם se refiere al acto de adivinar. «Adivinan» es la forma verbal más clara y concisa en español, preservando el paralelismo con «ven».
- source_word: כָּזָב
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedad
  - engaños
  lexicon: HALOT
  rationale: כָּזָב significa mentira/falsehood. «Mentiras» es idiomático en español y encaja con el contraste entre visiones falsas y adivinación falsa.
- source_word: לָתֵת אֹתָךְ
  english_pob_choice: to place you
  chosen_spanish: para ponerte
  alternatives_spanish:
  - para colocarte
  - para ponerte sobre
  lexicon: HALOT
  rationale: נתן con objeto y complemento direccional expresa poner/colocar. «Ponerte» es la opción más directa; se mantiene el complemento siguiente para no suavizar la imagen.
- source_word: אֶל צַוְּארֵי
  english_pob_choice: on the necks of
  chosen_spanish: sobre los cuellos de
  alternatives_spanish:
  - en los cuellos de
  - sobre las cervices de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo con «cuellos». «Sobre los cuellos de» reproduce la preposición y evita reinterpretar el giro oscuro.
- source_word: חַלְלֵי רְשָׁעִים
  english_pob_choice: the slain wicked
  chosen_spanish: los muertos de los impíos
  alternatives_spanish:
  - los muertos impíos
  - los caídos de los impíos
  - los muertos malvados
  lexicon: HALOT
  rationale: La cadena constructa es difícil. En español, «los muertos de los impíos» conserva la relación genitiva y evita borrar la dificultad; «impíos» refleja רְשָׁעִים.
- source_word: אֲשֶׁר בָּא יוֹמָם
  english_pob_choice: whose day has come
  chosen_spanish: cuyo día ha llegado
  alternatives_spanish:
  - a quienes les ha llegado su día
  - de quienes ha venido su día
  lexicon: HALOT
  rationale: La expresión profética idiomática se vierte de manera natural como llegada del día de juicio, manteniendo el lenguaje de «día».
- source_word: בְּעֵת עֲוֺן קֵץ
  english_pob_choice: at the time of the punishment of the end
  chosen_spanish: en el tiempo del castigo del fin
  alternatives_spanish:
  - en el tiempo de la culpa del fin
  - en el tiempo de la iniquidad del fin
  - en el tiempo del castigo final
  lexicon: HALOT
  rationale: Se conserva la dureza del sintagma con «castigo del fin», reflejando el cierre judicial de קֵץ. «Castigo» recoge el valor de consecuencia de עָוֺן en contexto de juicio, sin desdibujar la ambigüedad del hebreo.
theological_decisions:
- issue: Cómo reflejar עֲוֺן en un contexto de juicio final
  english_pob_reading: at the time of the punishment of the end
  chosen_spanish_reading: en el tiempo del castigo del fin
  alternative_spanish_readings:
  - en el tiempo de la iniquidad del fin
  - en el tiempo de la culpa del fin
  - en el tiempo del castigo final
  rationale: La frase hebrea es comprimida y admite varias lecturas. Se preserva la orientación judicial con «castigo» y se mantiene la referencia al fin con «del fin», evitando resolver demasiado la ambigüedad.
  doctrine_reference: Translation philosophy §3
- issue: Cómo tratar la imagen oscura de poner a alguien sobre los cuellos de los muertos
  english_pob_reading: to place you on the necks of the slain wicked
  chosen_spanish_reading: para ponerte sobre los cuellos de los muertos de los impíos
  alternative_spanish_readings:
  - para ponerte entre los muertos de los impíos
  - para colocarte entre los caídos impíos
  - para ponerte junto a los muertos impíos
  rationale: Se conserva la imagen concreta y su dificultad, porque el testimonio textual no justifica una paráfrasis que la resuelva por completo. La literalidad moderada permite que el lector perciba la tensión del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión más reciente ajustó la cláusula final para reflejar más de cerca בְּעֵת עֲוֺן קֵץ como una fórmula comprimida relacionada con juicio: de una paráfrasis más libre a «at the time of the punishment of the end». La presente versión española sigue esa decisión, manteniendo «del fin» y un matiz judicial con «castigo».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto para el nombre divino en este proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se mantiene «impíos» para רְשָׁעִים, evitando suavizar el término a «malvados» salvo que el contexto lo exigiera.
  - La imagen corporal de «cuellos» se conserva para respetar la dificultad del hebreo y la decisión inglesa de mantener la metáfora concreta.
