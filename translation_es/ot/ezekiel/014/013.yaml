    text: Literally, 'break its staff of bread,' a Hebrew idiom for cutting off the food supply.
    reason: lexical_alternative
  - marker: b
    text: Or 'people and animals.' The Hebrew reads 'man and beast,' a standard expression for all living inhabitants, human and animal alike.
