  to: Yo, Yahvé, he hablado; viene, y yo lo haré. No me detendré[a], ni tendré compasión, ni cederé[b]. Conforme a tus caminos y conforme a tus hechos te juzgarán[c], declara el Señor Yahvé.
  rationale: Se corrige la colocación de la nota [a] para que corresponda al verbo adecuado, se reemplaza «me arrepentiré» por «cederé» para reflejar mejor el valor de נָחַם en contexto de juicio sin sugerir arrepentimiento moral en Dios, y se alisa la puntuación final. Se conservan «Yahvé», «te juzgarán» y la estructura judicial del verso.
