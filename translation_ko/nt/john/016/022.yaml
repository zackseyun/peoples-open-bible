  text: So you also now have sorrow; but I will see you again[a], and your heart will rejoice, and no one will take your joy from you.
  footnotes:
  - marker: a
    text: Or, 'you will see me again.' The Greek here more literally reads, 'I will see you again,' which may emphasize Jesus' initiative in returning to his disciples.
    reason: alternative_reading
translation:
