lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Así dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética hebrea introduce un anuncio solemne. «Así dice» conserva el tono formal y el presente profético, de modo natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, manteniendo el Tetragrámaton visible en español como «Yahvé».
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español «ejércitos» comunica bien el título divino sin depender de un arcaísmo como «huestes»; preserva la amplitud de la imagen de poder y mando.
- source_word: שִׂימוּ לְבַבְכֶם
  english_pob_choice: Set your heart
  chosen_spanish: Pongan su corazón
  alternatives_spanish:
  - Pongan atención
  - Dirijan su corazón
  lexicon: HALOT
  rationale: El hebreo usa el modismo de poner el corazón en algo; en español, «poner el corazón» conserva la fuerza idiomática y el componente afectivo/cognitivo mejor que una mera paráfrasis como «consideren».
- source_word: עַל דַּרְכֵיכֶם
  english_pob_choice: on your ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - sobre sus caminos
  - en su proceder
  lexicon: HALOT
  rationale: «Caminos» traduce con fidelidad la metáfora de conducto/vida. La preposición «en» funciona naturalmente con el modismo español y evita una calca dura de «sobre».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del Dios del pacto según la norma del proyecto, en lugar de ocultarlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: El título expresa autoridad sobre fuerzas armadas/cósmicas. «Ejércitos» conserva esa amplitud sin introducir precisión no exigida por el hebreo.
  doctrine_reference: Uso tradicional del título divino con equivalencia semántica controlada
- issue: Modismo de לְבַבְכֶם
  english_pob_reading: Set your heart
  chosen_spanish_reading: Pongan su corazón
  alternative_spanish_readings:
  - Pongan atención
  - Dirijan su corazón
  rationale: No se reduce el hebreo a una exhortación meramente intelectual; se mantiene la dimensión volitiva y afectiva del «corazón» como centro de atención y decisión.
  doctrine_reference: Antropología bíblica del corazón como sede de intención y atención
translation_notes:
  revision_awareness: La revisión inglesa pasó de una traducción más idiomática («Consider your ways») a una que explicita el modismo hebreo («Set your heart on your ways»). En español se siguió esa línea al conservar el corazón y el movimiento idiomático, sin ocultar la metáfora con una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto.
  - «Ejércitos» se usa para צְבָאוֹת, evitando el masking con «SEÑOR».
  - «Pongan» conserva el plural imperativo del hebreo.
  - «Caminos» mantiene la metáfora moral de conducta/vida.
  - La nota al pie preserva la alternativa más literal del hebreo sin reemplazar el texto principal.
