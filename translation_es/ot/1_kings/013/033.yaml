revisions:
- from: Después de este hecho[a], Jeroboam no se volvió de su mal camino, sino que otra vez hizo sacerdotes de los lugares altos de entre todo el pueblo. Al que lo deseaba, lo instalaba[b], y llegó a ser uno de los sacerdotes de los lugares altos.
  to: Después de este hecho[a], Jeroboam no se apartó de su mal camino, sino que otra vez hizo sacerdotes de los lugares altos de entre todo el pueblo. A cualquiera que lo deseara, lo investía[b], y llegaba a ser uno de los sacerdotes de los lugares altos.
  rationale: 'Se ajustó la redacción para un español más natural sin perder las decisiones auditadas del POB: ''se apartó de su mal camino'' preserva la metáfora de שׁוּב mejor que el giro menos idiomático ''se volvió de''; ''A cualquiera que lo deseara'' expresa con claridad el participio genérico; y ''lo investía'' comunica mejor la idea de conferir oficio sacerdotal, manteniendo en nota el modismo literal ''llenar la mano''.'
  reviewer_model: gpt-5.4
