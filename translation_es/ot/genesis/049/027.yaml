translation:
  language: es
  text: Benjamín es un lobo voraz[a]; por la mañana devora la presa[d][c][b], y por la tarde reparte el botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Benjamín es un lobo que desgarra»; el hebreo subraya la imagen de desgarrar a la presa, por eso el texto principal la expresa de manera más idiomática en español.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo también puede entenderse más ampliamente como «botín» o «despojo».
    reason: lexical_alternative
  - marker: c
    text: «Botín» también puede traducirse como «despojo» o «presa de guerra».
    reason: lexical_alternative
  - marker: d
    text: 'O: «que desgarra su presa».'
    reason: previous_rendering
lexical_decisions:
- source_word: בִּנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: Nombre propio hebreo
  rationale: Se translitera el nombre propio al uso español estándar, conservando la identificación del personaje/tribu sin traducirlo.
- source_word: זְאֵב
  english_pob_choice: wolf
  chosen_spanish: lobo
  alternatives_spanish:
  - lobo depredador
  - lobo voraz
  lexicon: HALOT
  rationale: El sustantivo denota literalmente un lobo; en español, 'lobo' es suficiente y natural. La carga predatoria se expresa con el adjetivo siguiente, siguiendo la decisión inglesa de no sobrecargar el sustantivo.
- source_word: יִטְרָף
  english_pob_choice: tears / ravenous wolf (predatory force emphasized)
  chosen_spanish: feroz
  alternatives_spanish:
  - que desgarra
  - voraz
  - depredador
  lexicon: HALOT
  rationale: El verbo טרף aporta la imagen de desgarrar/acerbar la presa. Dado que el texto español fluye mejor con una caracterización adjetival previa, 'feroz' preserva la fuerza predatoria sin volver la frase torpe. La nota[a] mantiene la alternativa más literal ('que desgarra').
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: Equivalente temporal natural en español moderno, manteniendo el paralelismo con 'por la tarde'.
- source_word: יֹאכַל
  english_pob_choice: he devours
  chosen_spanish: devora
  alternatives_spanish:
  - come
  - consume
  lexicon: HALOT
  rationale: '''Devora'' comunica el matiz intensivo y depredador del verbo en este contexto poético, más claro que el simple ''come''.'
- source_word: עַד
  english_pob_choice: the prey
  chosen_spanish: la presa
  alternatives_spanish:
  - el botín
  - la caza
  lexicon: HALOT
  rationale: En paralelo con la imagen del lobo, עַד se entiende como lo cazado/atrapado. 'Presa' conserva la metáfora animal y evita adelantar demasiado el campo militar del segundo hemistiquio.
- source_word: וְלָעֶרֶב
  english_pob_choice: and in the evening
  chosen_spanish: y por la tarde
  alternatives_spanish:
  - y al anochecer
  - y en la tarde
  lexicon: HALOT
  rationale: '''Por la tarde'' es una equivalencia natural en español y mantiene el paralelismo temporal con ''por la mañana''.'
- source_word: יְחַלֵּק
  english_pob_choice: he divides
  chosen_spanish: reparte
  alternatives_spanish:
  - divide
  - aporta
  lexicon: HALOT
  rationale: '''Reparte'' expresa bien la acción de distribuir una porción o botín en español idiomático, sin perder el sentido de dividir/aportionar.'
- source_word: שָׁלָל
  english_pob_choice: the spoil
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  lexicon: HALOT
  rationale: '''Botín'' es el equivalente español más natural para el resultado de una victoria/conflicto y mantiene el matiz militar del término.'
theological_decisions:
- issue: Fuerza metafórica del dicho sobre Benjamín
  english_pob_reading: The verse is rendered as a vivid metaphor of predatory strength and victorious distribution of gains, without specifying a later historical referent in the main text.
  chosen_spanish_reading: Se conserva la metáfora vívida de fuerza depredadora y reparto victorioso de lo obtenido, sin añadir en el texto principal una referencia histórica posterior.
  alternative_spanish_readings:
  - 'Una lectura más histórica: caracterización tribal cumplida en la historia bélica de Benjamín.'
  - 'Una lectura más general: descripción poética de ferocidad y éxito.'
  rationale: El hebreo presenta poesía e imagen, no una afirmación doctrinal ni una identificación histórica explícita. La traducción mantiene la tensión interpretativa y deja la posible conexión histórica para notas o para el lector.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: en inglés se prefirió ''a ravenous wolf'' sobre ''a wolf that tears'' para una expresión más natural sin perder la fuerza predatoria. En español se aplica el mismo principio con ''lobo feroz'', mientras que las notas preservan la alternativa más literal y las posibilidades léxicas de ''presa'' / ''botín''.'
  spanish_consistency_notes:
  - Se mantiene 'Benjamín' como nombre propio transliterado.
  - Se evita 'SEÑOR' o equivalentes de máscara porque no aplica aquí.
  - '''presa'' y ''botín'' distinguen los dos hemistiquios: imagen animal primero, militar después.'
  - Se conserva el paralelismo temporal con 'por la mañana' / 'por la tarde'.
  - No se introduce una lectura histórica específica en el texto principal.
