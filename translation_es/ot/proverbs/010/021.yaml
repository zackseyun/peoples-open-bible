translation:
  language: es
  text: Los labios del justo apacientan[a] a muchos, pero los necios mueren por falta de entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nutren a muchos'; el verbo hebreo también puede significar 'pastorear' o 'apacentar'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por falta de corazón', donde 'corazón' en hebreo a menudo se refiere al entendimiento o al juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - la խոսa de
  - las palabras de
  lexicon: HALOT
  rationale: El hebreo presenta un constructo literal de 'labios de'. Mantener 'labios' conserva la imagen poética y la metonimia de la habla, sin volverlo demasiado explicativo.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - una persona justa
  lexicon: HALOT
  rationale: En español, 'el justo' funciona naturalmente como sustantivo genérico y preserva el valor representativo del hebreo sin añadir especificación innecesaria.
- source_word: יִרְעוּ
  english_pob_choice: feed
  chosen_spanish: apacientan
  alternatives_spanish:
  - alimentan
  - pastorean
  - nutren
  lexicon: HALOT
  rationale: El verbo רעה puede significar 'apacentar/pastorear/alimentar'. Con 'labios' como sujeto, 'apacientan' conserva mejor la metáfora pastoral del hebreo que 'alimentan', y en español bíblico sigue siendo comprensible.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a multitudes
  lexicon: HALOT
  rationale: El hebreo deja el objeto implícito como 'muchos'. 'A muchos' suena natural en español con el verbo elegido y mantiene la amplitud del texto.
- source_word: אֱוִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: '''Necios'' es un equivalente sapiencial sólido en español y comunica bien el matiz moral de אֱוִילִים, no solo la falta de inteligencia.'
- source_word: בַּחֲסַר לֵב
  english_pob_choice: for lack of sense
  chosen_spanish: por falta de entendimiento
  alternatives_spanish:
  - por falta de corazón
  - por falta de juicio
  - por falta de sentido
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'por/en falta de corazón', donde 'corazón' incluye entendimiento y juicio. 'Entendimiento' expone ese valor antropológico sin sonar forzado en español, y conserva la tensión semántica del original.
- source_word: יָמוּתוּ
  english_pob_choice: die
  chosen_spanish: mueren
  alternatives_spanish:
  - morirán
  - perecen
  lexicon: HALOT
  rationale: En proverbio, el presente gnómico es natural en español. 'Mueren' mantiene la fuerza sentenciosa y el sentido verbal básico del hebreo.
translation_notes:
  revision_awareness: El contexto muestra alta concordancia con la traducción inglesa auditada y sin revisiones aplicadas; la presente redacción sigue esa lectura estable, preservando la metáfora pastoral de רעה y la antropología sapiencial de 'corazón' como entendimiento.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda; este versículo no lo contiene.
  - '''Justo'' y ''necio'' se usan como sustantivos sapienciales naturales en español.'
  - La equivalencia 'por falta de entendimiento' explicita el hebreo 'sin corazón' sin perder el sentido sapiencial.
  - Se prefirió 'apacientan' frente a 'alimentan' para conservar la imagen pastoral del verbo hebreo.
