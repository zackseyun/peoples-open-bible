  spanish_consistency_notes:
  - Se mantuvo el pronombre femenino para la sabiduría, en continuidad con la personificación del contexto.
  - Se evitó un calco pesado de «pensar acerca de ella» a favor de una expresión española natural sin perder el contenido cognitivo.
  - «Libre de cuidados» conserva el campo semántico de ἀμέριμνος y armoniza con el estilo bíblico moderno y digno.
