translation:
  language: es
  text: 'Y Hananías dijo delante de los ojos de todo el pueblo[a], diciendo[b]: «Así dice Yahvé: De esta manera romperé el yugo de Nabucodonosor, rey de Babilonia, del cuello de todas las naciones, dentro de dos años». Entonces Jeremías el profeta se fue por su camino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ante todo el pueblo»; la expresión hebrea dice literalmente «delante de los ojos de todo el pueblo».'
    reason: lexical_alternative
  - marker: b
    text: «De esta manera» probablemente alude al acto simbólico de Hananías al quebrar el yugo.
    reason: cultural_note
lexical_decisions:
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a exposición pública. «Delante de los ojos de» conserva la imagen corporal de «eyes» y refleja bien la transparencia pública del acto.
- source_word: כֹּה ... אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética directa y el nombre divino explícito conforme al criterio del proyecto: Yahvé, no una sustitución reverencial.'
- source_word: כָּכָה
  english_pob_choice: In this way
  chosen_spanish: De esta manera
  alternatives_spanish:
  - Así
  - De este modo
  lexicon: HALOT
  rationale: La segunda deíctica no repite simplemente la fórmula profética; en el contexto apunta al acto simbólico de quebrar el yugo. «De esta manera» preserva esa distinción sin forzar el español.
- source_word: אֶשְׁבֹּר
  english_pob_choice: I will break
  chosen_spanish: romperé
  alternatives_spanish:
  - quebraré
  - haré pedazos
  lexicon: HALOT
  rationale: El verbo comunica ruptura concreta de un objeto físico. «Romperé» es natural en español y mantiene la fuerza de la imagen.
- source_word: עֹל
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - barra del yugo
  lexicon: HALOT
  rationale: «Yugo» es el equivalente estándar y conserva la metáfora política de sujeción.
- source_word: בְּעוֹד שְׁנָתַיִם יָמִים
  english_pob_choice: within two years
  chosen_spanish: dentro de dos años
  alternatives_spanish:
  - en dos años
  - en el término de dos años
  lexicon: HALOT
  rationale: La idiomática hebrea incluye «días», pero la intención es un límite temporal. «Dentro de dos años» expresa con naturalidad que el plazo no excederá ese tiempo.
- source_word: מֵעַל צַוַּאר
  english_pob_choice: from upon the neck of
  chosen_spanish: de sobre el cuello de
  alternatives_spanish:
  - del cuello de
  - de encima del cuello de
  lexicon: HALOT
  rationale: «De sobre el cuello de» mantiene la preposición compuesta y la imagen física del yugo apoyado sobre el cuello.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: En este marco internacional, גוים remite a entidades políticas/nacionales sujetas a Babilonia. «Naciones» respeta ese matiz.
- source_word: וַיֵּלֶךְ ... לְדַרְכּוֹ
  english_pob_choice: went his way
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - se fue
  - se retiró
  lexicon: HALOT
  rationale: La frase hebrea indica que se apartó y continuó su trayecto. «Siguió su camino» es natural y algo más formal que «se fue».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se mantiene el Tetragrámaton con la forma de uso del proyecto para el español: Yahvé. Esto evita la sustitución litúrgica y conserva la referencia explícita al nombre del pacto.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y sus revisiones: la preferencia por una traducción más literal de לְעֵינֵי y la simplificación de la clausula final a un español más formal. También se respetó la distinción entre las dos formas deícticas כֹּה / כָּכָה.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma española del nombre divino, conforme a la política del proyecto.
  - «Yugo» se conserva como imagen política concreta, no como metáfora explicativa.
  - Se traduce el final con verbo idiomático y sobrio («siguió su camino») sin añadir matices no presentes en el hebreo.
  - Se usa «naciones» para גוים por el contexto imperial internacional del pasaje.
