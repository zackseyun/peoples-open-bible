translation:
  language: es
  text: Qohelet buscó hallar palabras agradables[a], y escribir rectamente[b] palabras de verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'palabras deleitosas'.
    reason: lexical_alternative
