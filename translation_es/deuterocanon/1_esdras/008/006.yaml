base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/006.yaml
  text: In the seventh year of the reign of Artaxerxes[a], in the fifth month—they arrived at Jerusalem; for they had set out from Babylon on the new moon of the first month[c][b], and they came to Jerusalem according to the prosperity of the journey given to them by the Lord upon him.
  footnotes:
  - marker: a
    text: The Greek text here contains a difficult clause, 'this year was the second for the king,' which does not fit the context and is absent from the Hebrew parallel (Ezra 7:6–9). It is likely a textual corruption or displacement, so it is not represented in the main translation.
    reason: textual_variant
  - marker: b
    text: 'The Hebrew parallel focuses on Ezra in the singular: ''This Ezra went up from Babylon ... and the king granted him all his request, according to the hand of the LORD his God upon him'' (Ezra 7:6). The Greek of 1 Esdras here shifts to plural forms (''they arrived,'' ''given to them'').'
    reason: alternative_reading
  - marker: c
    text: Literally, 'upon him.' The sense is likely that the Lord's favor or hand was upon Ezra, as made explicit in the Hebrew parallel.
    reason: lexical_alternative
