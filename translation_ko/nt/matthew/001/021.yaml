lexical_decisions:
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ Ἰησοῦν
  english_pob_choice: you shall call his name Jesus
  chosen_korean: 그의 이름을 예수라 부르십시오
  alternatives_korean:
  - 그의 이름을 예수로 지으십시오
  lexicon: BDAG
  rationale: 셈어식 작명 정형 「이름을 …라 부르라」를 한국어로 보존하여, 23절의 임마누엘 인용과 어형을 맞춘다.
- source_word: αὐτὸς…σώσει
  english_pob_choice: he himself will save
  chosen_korean: 그분 자신이…구원하실 것입니다
  alternatives_korean:
  - 그가 구원할 것입니다
  lexicon: BDAG
  rationale: 강조 위치의 αὐτός를 한국어 「그분 자신이」로 옮겨 구원의 주체가 바로 이 아이라는 헬라어의 기독론적 무게를 살린다.
- source_word: σώσει
  english_pob_choice: will save
  chosen_korean: 구원하실 것입니다
  alternatives_korean:
  - 구하실 것입니다
  - 건지실 것입니다
  lexicon: BDAG
  rationale: 「예수(Ἰησοῦς ↔ Yeshua ↔ 야훼는 구원하신다)」의 어원 유희를 한국어에서도 「구원」으로 받아 어원적 연관을 살린다.
theological_decisions:
- issue: 이름 「예수」의 어원적 유희 — 「야훼는 구원하신다」
  chosen_reading: 그분 자신이…구원하실 것입니다
  alternative_readings:
  - 그가 구원할 것입니다
  rationale: 히브리어 예슈아(ישוע)는 「야훼는 구원하신다」를 함의하며, 마태의 22절-23절 인용 형식은 이 어원을 의도적으로 끌어온다. 한국어에서 어원 자체를 풀어쓰는 대신 본문 어휘에 충실히 「구원하실 것입니다」로 옮기고, 어원적 무게는 23절의 임마누엘 설명과 함께 자연스럽게 드러나도록 한다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not flatten Semitic wordplay'
