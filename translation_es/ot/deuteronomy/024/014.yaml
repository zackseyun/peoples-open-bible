translation:
  language: es
  text: No oprimirás al jornalero pobre y necesitado[a], sea uno de tus hermanos o uno de tus residentes forasteros que está en tu tierra, dentro de tus puertas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «defraudar» o «explotar» a un jornalero; el verbo hebreo incluye opresión económica.
    reason: lexical_alternative
  - marker: b
    text: «Dentro de tus puertas» es un modismo hebreo para la vida dentro de tus ciudades o del ámbito de tu jurisdicción.
    reason: cultural_note
lexical_decisions:
- source_word: תַעֲשֹׁק
  english_pob_choice: oppress
  chosen_spanish: oprimir
  alternatives_spanish:
  - defraudar
  - explotar
  lexicon: HALOT
  rationale: El verbo hebreo עָשַׁק abarca opresión económica y abuso injusto. «Oprimir» conserva esa fuerza moral amplia en español y no se limita solo al fraude o al robo de salarios.
- source_word: שָׂכִיר
  english_pob_choice: hired worker
  chosen_spanish: jornalero
  alternatives_spanish:
  - trabajador contratado
  - asalariado
  lexicon: HALOT
  rationale: El término designa a una persona contratada por jornal o salario. «Jornalero» comunica con naturalidad la relación laboral y el matiz económico del término hebreo.
- source_word: עָנִי וְאֶבְיוֹן
  english_pob_choice: poor and needy
  chosen_spanish: pobre y necesitado
  alternatives_spanish:
  - pobre y desvalido
  - afligido y necesitado
  lexicon: HALOT
  rationale: La pareja hebrea intensifica la vulnerabilidad económica. «Pobre y necesitado» mantiene la doble caracterización sin exagerar ni reinterpretar la situación.
- source_word: מֵאַחֶיךָ
  english_pob_choice: one of your brothers
  chosen_spanish: uno de tus hermanos
  alternatives_spanish:
  - tus hermanos
  - un compatriota
  lexicon: HALOT
  rationale: La traducción conserva el lenguaje de parentesco del pacto y refleja el singular implícito del hebreo, en línea con la decisión auditada en inglés.
- source_word: מִגֵּרְךָ
  english_pob_choice: one of your sojourners
  chosen_spanish: uno de tus forasteros
  alternatives_spanish:
  - uno de tus residentes extranjeros
  - uno de tus sojourners
  lexicon: HALOT
  rationale: Aunque «sojourner» es el equivalente técnico preferido en inglés, en español «forastero» comunica de forma comprensible la idea de un residente no nativo. Se evita «extranjero residente» por sonar más administrativo que bíblico; el contexto de protección legal queda preservado por la frase siguiente.
- source_word: בְּאַרְצְךָ
  english_pob_choice: who is in your land
  chosen_spanish: que está en tu tierra
  alternatives_spanish:
  - que vive en tu tierra
  - que está en tu país
  lexicon: HALOT
  rationale: Se mantiene la localización territorial del hebreo con una formulación natural en español. «Tierra» conserva el eco bíblico de la posesión y residencia dentro del territorio del pacto.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - dentro de tus ciudades
  - en tus puertas
  lexicon: HALOT
  rationale: La imagen literal de «puertas» conserva el hebraísmo legal y urbano; en español sugiere la jurisdicción comunitaria sin explicar demasiado el modismo en el texto principal.
theological_decisions:
- issue: Alcance del término de parentesco אַחֶיךָ en ley del pacto
  english_pob_reading: brothers
  chosen_spanish_reading: tus hermanos
  alternative_spanish_readings:
  - compatriotas
  - conciudadanos
  rationale: Se conserva el lenguaje de parentesco porque el hebreo es literal y covenantal. No se neutraliza a una categoría general para no borrar la carga relacional del mandato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento del גֵּר como categoría protegida dentro de Israel
  english_pob_reading: sojourners
  chosen_spanish_reading: forasteros
  alternative_spanish_readings:
  - residentes extranjeros
  - extranjeros residentes
  rationale: El hebreo nombra a un no nativo que vive dentro de la comunidad israelita y queda bajo su protección legal. «Forasteros» es menos técnico que «residente extranjero», pero más accesible en español; la cláusula territorial y la mención de las puertas preservan el sentido legal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada que mantuvo el sujeto singular del forastero («que está en tu tierra») y conserva la estructura del mandato negativo. Se optó por «forastero» en lugar de «sojourner» transliterado o «residente extranjero» para lograr una lectura pública clara sin perder la categoría social protegida por la ley.
  spanish_consistency_notes:
  - Se mantiene la traducción de YHWH como «Yahvé» en el proyecto, aunque este versículo no la contiene.
  - «Jornalero» y «oprimir» se usan con sentido económico-jurídico, coherente con el hebreo.
  - Se conserva el singular relacional («uno de tus hermanos», «uno de tus forasteros») para reflejar la sintaxis del texto fuente.
  - La imagen de «puertas» se deja en el cuerpo del texto y se explica en nota para no diluir el hebraísmo.
