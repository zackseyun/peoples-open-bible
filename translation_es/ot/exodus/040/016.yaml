  to: Y Moisés hizo conforme a todo lo que Yahvé le mandó; así hizo.
  rationale: Se reemplaza 'le había mandado' por 'le mandó' para seguir más de cerca el hebreo y la revisión auditada del POB en inglés, sin cambiar el sentido general. No se requieren notas al pie porque no hay ambigüedad nueva y el borrador español ya usa correctamente 'Yahvé' en el texto principal.
