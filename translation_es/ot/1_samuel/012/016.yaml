  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: marcador discursivo («Ahora pues»), doble imperativo de atención/observación, «esta gran cosa», el nombre divino «Yahvé» y la idea de un acto visible «ante sus ojos». Sin embargo, «manténganse firmes» puede sugerir firmeza moral o resistencia más que la instrucción concreta de ponerse/quedarse de pie para presenciar la señal; el hebreo הִתְיַצְּבוּ aquí se acerca más a «quédense de pie» o «permanezcan en su lugar».'
