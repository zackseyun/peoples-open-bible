translation:
  language: es
  text: Porque la ociosidad ha enseñado mucho mal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘gran mal’; la frase griega puede enfatizar tanto la cantidad ('mucho mal') como la magnitud o intensidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὴν
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - gran
  - mucho mal
  - gran mal
  lexicon: LSJ
  rationale: El adjetivo concuerda con κακίαν y en español 'mucho mal' expresa con naturalidad la idea de extensión/cantidad que el griego permite. 'Gran' desplazaría el matiz hacia intensidad y suena menos preciso aquí.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: LSJ
  rationale: En español, 'Porque' mantiene la conexión explicativa del contexto con una cadencia natural al inicio de la cláusula. 'Pues' también sería posible, pero 'Porque' suena más claro en estilo bíblico moderno.
- source_word: κακίαν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - vicio
  - maldad
  lexicon: LSJ
  rationale: '''Mal'' conserva el alcance moral amplio de κακία sin forzar una categorización más estrecha como ''vicio''. ''Maldad'' intensifica el tono, pero ''mal'' reproduce mejor la amplitud semántica del griego y la elección inglesa ''evil''.'
- source_word: ἐδίδαξεν
  english_pob_choice: has taught
  chosen_spanish: ha enseñado
  alternatives_spanish:
  - enseñó
  - ha instruido
  - ha producido
  lexicon: LSJ
  rationale: El perfecto español 'ha enseñado' transmite el valor proverbial y resultativo del aoristo griego en un enunciado general. 'Enseñó' sería posible, pero el perfecto suena más natural para una verdad general vigente.
- source_word: ἡ ἀργία
  english_pob_choice: idleness
  chosen_spanish: la ociosidad
  alternatives_spanish:
  - la idleness
  - la pereza
  - la holgazanería
  - la inactividad
  lexicon: LSJ
  rationale: '''Ociosidad'' es un equivalente natural en español para ἀργία y conserva el sentido de ausencia de ocupación o trabajo. ''Pereza'' moraliza más; ''inactividad'' es más neutral pero menos idiomática en este contexto.'
translation_notes:
  revision_awareness: El texto griego breve y el contexto de la POB inglesa coinciden en una lectura proverbial, sin revisiones aplicadas en el expediente. Se conserva la relación explicativa de γὰρ y la ambigüedad de ποσὸ/μέγεθος reflejada en la nota inglesa, ahora expresada de modo natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'pereza' porque tiende a cargar el término con una valoración moral más específica que ἀργία.
  - La puntuación con punto y coma no es necesaria; la cláusula breve funciona bien como sentencia proverbial en español.
