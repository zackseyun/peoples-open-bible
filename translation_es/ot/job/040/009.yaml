translation:
  language: es
  text: ¿O tienes un brazo como el de Dios[a], y puedes tronar con una voz como la suya?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Menos probable: «como el de un dios», si אֵל se entendiera de modo más genérico; el contexto favorece claramente «Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: Or do you have
  chosen_spanish: ¿O tienes tú... ?
  alternatives_spanish:
  - ¿Y si tienes... ?
  - ¿O si tienes... ?
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica de desafío. En español, «¿O tienes tú...?» reproduce mejor el giro continuativo/alternativo que un literal «y si».
- source_word: זְרוֹעַ
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - brazo
  - fuerza
  - poder
  lexicon: HALOT
  rationale: El hebreo usa la imagen corporal concreta. «Brazo» conserva la metáfora y su fuerza poética; «fuerza» o «poder» explicitan demasiado y pierden la imagen.
- source_word: כָּאֵל
  english_pob_choice: like God’s
  chosen_spanish: como el de Dios
  alternatives_spanish:
  - como Dios
  - como el de un dios
  lexicon: HALOT
  rationale: El contexto favorece la referencia al Dios verdadero, no a una deidad cualquiera. En español, «como el de Dios» expresa naturalmente la comparación del brazo sin forzar un posesivo literal.
- source_word: לָךְ
  english_pob_choice: do you have
  chosen_spanish: tienes tú
  alternatives_spanish:
  - tienes
  - hay para ti
  lexicon: HALOT
  rationale: El sentido existencial de posesión se vuelve idiomático con el verbo «tener». El pronombre explícito refuerza el tono retórico y enfático del hebreo.
- source_word: וּבְקוֹל
  english_pob_choice: and can you thunder with a voice
  chosen_spanish: y puedes tronar con una voz
  alternatives_spanish:
  - y con una voz
  - y puedes rugir con una voz
  lexicon: HALOT
  rationale: La preposición con «voz» es instrumental/asociativa. «Tronar con una voz» conserva el enlace con el verbo siguiente y mantiene el color teofánico del texto.
- source_word: כָּמֹהוּ
  english_pob_choice: like his
  chosen_spanish: como la suya
  alternatives_spanish:
  - como la de él
  - como la de Dios
  lexicon: HALOT
  rationale: En español, el pronombre posesivo femenino concuerda con «voz». Aunque el referente es Dios, la referencia queda clara por el contexto y por la nota textual.
- source_word: תַרְעֵם
  english_pob_choice: can you thunder
  chosen_spanish: puedes tronar
  alternatives_spanish:
  - puedes hacer tronar
  - puedes retumbar
  lexicon: HALOT
  rationale: El verbo causativo de רעם se traduce con el verbo natural español «tronar», que preserva el efecto acústico y la resonancia de tormenta del hebreo.
theological_decisions:
- issue: Referencia de אֵל en la comparación
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  rationale: El contexto inmediato es el discurso de Yahvé mismo, así que la comparación apunta al Dios verdadero. Traducir «Dios» mantiene la fuerza monoteísta del pasaje; la alternativa «un dios» queda como lectura menos probable.
  doctrine_reference: Primacía del sentido contextual del original; evitar una generalización politeísta no sustentada
translation_notes:
  revision_awareness: El texto base inglés ya había fijado la lectura principal y la nota alternativa sobre אֵל; no se identificaron revisiones aplicadas en el ciclo más reciente, y la versión española sigue esa misma decisión con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se preserva el paralelismo de las dos preguntas retóricas.
  - «Dios» se usa para אֵל por el contexto inmediato, no como máscara litúrgica.
  - «Brazo» y «tronar» mantienen la imaginería corporal y tormentosa del hebreo.
  - La concordancia de «la suya» se ajusta a «voz» en español sin perder la referencia al antecedente divino.
