base_translation:
  language: en
  yaml_path: translation/ot/judges/007/019.yaml
  text: So Gideon and the hundred men who were with him came to the edge of the camp at the beginning of the middle watch[a], just as they had posted the watchmen[c][b]; and they blew the trumpets and smashed the jars that were in their hands.
  footnotes:
  - marker: a
    text: Or 'the middle night watch' or 'the second watch.' The Hebrew refers to a division of the night.
    reason: lexical_alternative
  - marker: b
    text: Or 'they had just set the watchmen' or 'they had stationed the guards.' The Hebrew construction emphasizes the action of posting the watch.
    reason: lexical_alternative
  - marker: c
    text: Hebrew shofarot, traditionally 'trumpets,' more specifically horns used for signaling.
    reason: cultural_note
