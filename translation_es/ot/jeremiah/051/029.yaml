translation:
  language: es
  text: Y la tierra tiembla y se retuerce, porque han surgido los planes de Yahvé contra Babilonia, para hacer de la tierra de Babilonia una desolación, sin habitante.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּרְעַשׁ
  english_pob_choice: quakes
  chosen_spanish: tiembla
  alternatives_spanish:
  - se sacude
  - estremece
  lexicon: HALOT
  rationale: רעשׁ expresa una sacudida o temblor intenso en contexto de juicio cósmico. En español, «tiembla» comunica con naturalidad el movimiento violento de la tierra sin sonar demasiado técnico; «se sacude» también sería posible, pero «tiembla» fluye mejor con el paralelismo poético.
- source_word: וַתָּחֹל
  english_pob_choice: writhes
  chosen_spanish: se retuerce
  alternatives_spanish:
  - está en angustia
  - se estremece
  - está con dolores de parto
  lexicon: HALOT
  rationale: חול aquí sugiere convulsión o retorcimiento, incluso con matiz de dolor corporal/laboral. «Se retuerce» preserva esa imagen física y enérgica mejor que una formulación más abstracta.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: Aunque ארץ puede significar «tierra» o «país», el paralelismo con el temblor y el retorcerse favorece una lectura de amplitud cósmica. «La tierra» es el equivalente más natural en español.
- source_word: מַחְשְׁבוֹת
  english_pob_choice: plans
  chosen_spanish: los planes
  alternatives_spanish:
  - los propósitos
  - los pensamientos
  - los designios
  lexicon: HALOT
  rationale: מחשבות denota intenciones deliberadas. «Planes» conserva bien la idea de resolución intencional y resulta claro en español moderno; «designios» sería más solemne, pero menos directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el nombre propio revelado, evitando la sustitución por un título.
- source_word: לָשׂוּם
  english_pob_choice: to make
  chosen_spanish: para convertir
  alternatives_spanish:
  - para hacer
  - para poner
  - para tornar
  lexicon: HALOT
  rationale: En esta construcción con complemento predicativo, שׂוּם expresa transformar algo en otra cosa. «Convertir» comunica bien ese valor de cambio resultativo en español sin perder la fuerza de juicio.
- source_word: אֶרֶץ בָּבֶל
  english_pob_choice: the land of Babylon
  chosen_spanish: la tierra de Babilonia
  alternatives_spanish:
  - el territorio de Babilonia
  - la región de Babilonia
  lexicon: HALOT
  rationale: Aquí ארץ se refiere al territorio de Babilonia, no a la tierra en sentido cósmico. «La tierra de Babilonia» mantiene la relación genitiva y la solemnidad del hebreo.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: en desolación
  alternatives_spanish:
  - en ruina
  - en devastación
  lexicon: HALOT
  rationale: שׁמה en lenguaje profético de juicio indica devastación/desolación. «En desolación» reproduce el estado resultante sin añadir más matiz del que el hebreo exige.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin moradores
  - sin nadie que habite allí
  - sin habitantes
  lexicon: HALOT
  rationale: La expresión hebrea es breve y absoluta. «Sin habitante» conserva esa concisión; el singular reproduce mejor el golpe retórico del hebreo que un plural más general.
theological_decisions:
- issue: Nombre divino יהוה en un oráculo de juicio contra Babilonia
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio divino conforme al criterio del proyecto y al audit trail inglés. No se sustituye por «SEÑOR» porque eso ocultaría el nombre tetragramático sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de מַחְשְׁבוֹת en contexto de juicio
  english_pob_reading: plans
  chosen_spanish_reading: planes
  alternative_spanish_readings:
  - propósitos
  - designios
  - pensamientos
  rationale: En español «planes» expresa resolución intencional y acción determinada. Se evita «pensamientos» por sonar demasiado interior o mentalista en este contexto de decreto eficaz contra Babilonia.
  doctrine_reference: 'Jeremías profético: intención soberana de Yahvé en juicio'
translation_notes:
  revision_awareness: El texto inglés más reciente quedó sin cambios tras la última revisión; el presente borrador sigue esa lectura estable y no introduce variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יהוה.
  - 'Se conserva el paralelismo poético con dos verbos intensivos: «tiembla» / «se retuerce».'
  - «La tierra de Babilonia» distingue correctamente entre ארץ como territorio específico y «la tierra» del primer colon.
  - «Sin habitante» busca reproducir la concisión final del hebreo sin ampliar innecesariamente a una paráfrasis explicativa.
