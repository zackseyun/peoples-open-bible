translation:
  language: es
  text: Entonces Moisés subió, y Aarón, Nadab, Abiú y setenta de los ancianos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió al monte
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. En español, «subió» es natural y conserva el sentido direccional sin añadir «al monte», que el contexto ya sugiere pero el versículo no lo dice explícitamente.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: nombre propio
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְאַהֲרֹן
  english_pob_choice: and Aaron
  chosen_spanish: y también Aarón
  alternatives_spanish:
  - y Aarón
  lexicon: nombre propio
  rationale: Se conserva la coordinación y se deja claro que Aarón forma parte del grupo que subió, siguiendo la lista hebrea. «También» ayuda a reflejar la adición del nombre sin volver pesada la sintaxis española.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  lexicon: nombre propio
  rationale: Transliteración bíblica habitual en español.
- source_word: וַאֲבִיהוּא
  english_pob_choice: Abihu
  chosen_spanish: Abiú
  alternatives_spanish:
  - Abihú
  lexicon: nombre propio
  rationale: Se usa la forma española tradicional y reconocible «Abiú», que corresponde al nombre hebreo אביהוא.
- source_word: וְשִׁבְעִים
  english_pob_choice: and seventy
  chosen_spanish: y setenta
  alternatives_spanish:
  - con setenta
  lexicon: HALOT
  rationale: La coordinación numérica se expresa de modo directo en español como en el hebreo.
- source_word: מִזִּקְנֵי
  english_pob_choice: of the elders
  chosen_spanish: de los ancianos
  alternatives_spanish:
  - entre los ancianos
  - de entre los ancianos
  lexicon: HALOT
  rationale: 'El מן es partitivo: setenta seleccionados de entre los ancianos. En español, «de los ancianos» mantiene la relación partitiva de forma idiomática y fiel.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Nombre nacional estándar.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo una estructura simple: «Then Moses went up, and Aaron, Nadab, Abihu, and seventy of the elders of Israel.»; la revisión reciente añadió el segundo coordinante antes de Aarón para reflejar mejor la lista hebrea. La versión española conserva esa estructura de enumeración sin expandir el contexto.'
  spanish_consistency_notes:
  - Se mantiene «subió» en vez de «ascendió» para un registro moderno y claro.
  - Se conserva «ancianos» para זקני, sin sustituirlo por «líderes» o «notables».
  - Se usa «Abiú» como forma española establecida, no la transliteración más cruda.
