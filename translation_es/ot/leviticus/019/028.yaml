review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: prohíbe cortes en la carne por los muertos y una marca/tatuaje en el cuerpo, y preserva la autoidentificación divina con «Yahvé». También mantiene adecuadamente las dos notas léxicas del rastro inglés. Sin embargo, hay un problema de alineación menor pero real en «sobre ti», porque el hebreo בָּכֶם con נתן aquí se entiende mejor como puesta en el propio cuerpo, no meramente encima de uno; en español suena más natural y fiel «en ustedes/vosotros» o, con singular genérico, «en ti».'
  spanish_quality_summary: 'El español es claro y legible, pero mezcla un registro bíblico-natural con una construcción algo forzada: «ni pondrás sobre ti una marca tatuada». En español moderno y digno suena mejor «ni te harás una marca tatuada» o «ni pondrás en ti una marca tatuada». Además, como el texto ya venía en singular genérico («No harás... pondrás...»), conviene mantener coherencia y evitar el leve extrañamiento de «sobre ti».'
  glossary_alignment: «Yahvé» está correctamente alineado con la terminología del proyecto. «Carne» preserva bien בשר. «Marca tatuada» es defendible y sigue la decisión inglesa de evitar imponer un tecnicismo excesivo, aunque «tatuaje» quedaba como alternativa de nota. No hay conflicto con otras directrices léxicas del proyecto.
  issues:
  - severity: medium
    issue: La frase «ni pondrás sobre ti una marca tatuada» suena poco idiomática y no representa de la mejor manera la aplicación corporal del hebreo.
    rationale: Con נתן + ב en este contexto, la idea es aplicar o hacerse una marca en el cuerpo. «Sobre ti» es comprensible, pero menos natural y ligeramente menos preciso que «en ti» o una reformulación verbal idiomática como «te harás».
  - severity: low
    issue: La puntuación de las notas al pie incluye comillas y apóstrofes innecesarios al inicio y final del texto de nota.
    rationale: 'No afecta el sentido, pero conviene normalizar el estilo editorial: las notas deben presentarse sin comillas envolventes superfluas.'
