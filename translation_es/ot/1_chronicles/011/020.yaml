    rationale: La nota [a] trata de la expresión «los Tres», no del nombre «Abisai». Debe anclarse en «Tres» donde aparece la dificultad textual mencionada por el POB inglés.
  - severity: medium
    issue: Intercambio indebido de anclajes entre [b] y [c] respecto del POB inglés
    rationale: El POB inglés ancla la nota lexical alternativa de «blandió» y también una nota en «caídos/slain», mientras que la nota sobre «tuvo nombre» debe ir en esa frase. En el borrador, [c] quedó en «tuvo nombre» pero la nota inglesa [c] explicaba otra cosa. En español conviene reasignar marcadores ordenados y anclar cada nota a la frase pertinente.
  - severity: low
