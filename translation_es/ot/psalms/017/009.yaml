translation:
  language: es
  text: de los impíos que me devastan, mis enemigos mortales[a] me rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «mis enemigos contra mi vida me rodean». El hebreo incluye literalmente בְּנֶפֶשׁ, que puede describir enemigos que buscan la vida del salmista, no solo enemigos ''mortales''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פְּנֵי
  english_pob_choice: from
  chosen_spanish: por causa de
  alternatives_spanish:
  - de
  - desde
  - frente a
  lexicon: HALOT
  rationale: La expresión introduce el origen o motivo de la amenaza. En español, 'por causa de' comunica naturalmente esa procedencia hostil sin el calco poco fluido 'de delante de'.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  - los malhechores
  lexicon: HALOT
  rationale: '''Impíos'' conserva la categoría moral/religiosa del hebreo y es un equivalente bíblico transparente en español. ''Malvados'' sería posible, pero pierde algo del matiz de irreverencia ante Dios.'
- source_word: שַׁדּוּ/נִי
  english_pob_choice: devastate me
  chosen_spanish: me devastan
  alternatives_spanish:
  - me despojan
  - me destruyen
  - me arruinan
  lexicon: HALOT
  rationale: '''Devastar'' mantiene la fuerza de שׁדד, con violencia y ruina, y coincide bien con la elección inglesa auditada. ''Despojan'' es más concreto pero menos general; ''destruyen'' puede sonar más absoluto de lo que el contexto exige.'
- source_word: אֹיְבַ֥/י
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - mis rivales
  lexicon: HALOT
  rationale: '''Enemigos'' es la correspondencia directa y clara del sustantivo. ''Adversarios'' suaviza demasiado la hostilidad.'
- source_word: בְּ֝/נֶ֗פֶשׁ
  english_pob_choice: deadly
  chosen_spanish: mortales
  alternatives_spanish:
  - contra mi vida
  - de alma
  - con ansia
  lexicon: HALOT
  rationale: El hebreo literalmente alude a 'vida/alma' y señala enemistad contra la vida del salmista. 'Mortales' expresa el sentido idiomático de amenaza letal en español sin perder la fuerza; la alternativa literal se conserva mejor en nota.
- source_word: יַקִּ֥יפוּ עָלָֽ/י
  english_pob_choice: surround me
  chosen_spanish: me rodean
  alternatives_spanish:
  - me cercan
  - me circundan
  - me cercan por todos lados
  lexicon: HALOT
  rationale: '''Rodean'' es natural y fiel al sentido de encerrar/encircar. ''Cercan'' sería más literal y algo más intenso, pero ''rodean'' fluye mejor en español contemporáneo.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el audit trail inglés: mantiene la oposición entre los impíos y los enemigos del salmista, conserva la intensidad de שׁדד con ''devastan'', y refleja el valor idiomático de בְּנֶפֶשׁ mediante ''mortales'', dejando la opción literal en nota.'
  spanish_consistency_notes:
  - Se usó 'impíos' como equivalente estable de רְשָׁעִים, conforme al registro bíblico y al tono del verso.
  - '''Mortales'' se eligió para traducir el matiz idiomático de amenaza a la vida, no como afirmación sobre la condición ontológica de los enemigos.'
  - '''Rodean'' mantiene el sentido de окружar/encerrar sin introducir una metáfora adicional no presente en el hebreo.'
