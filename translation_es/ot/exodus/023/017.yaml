translation:
  language: es
  text: Tres veces en el año, todo varón[a] entre ustedes aparecerá ante el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo tu varón», es decir, todos los varones entre ustedes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: Three times
  chosen_spanish: Tres veces
  alternatives_spanish:
  - Tres ocasiones
  lexicon: HALOT
  rationale: La expresión hebrea indica frecuencia/ocasiones. «Tres veces» es la forma más natural en español y conserva el sentido idiomático sin añadir matices no presentes en el texto.
- source_word: בַּשָּׁנָה
  english_pob_choice: in the year
  chosen_spanish: en el año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: El hebreo con artículo apunta al ciclo anual. «En el año» reproduce con sobriedad la referencia temporal del original sin volverla más interpretativa de lo necesario.
- source_word: יֵרָאֶה
  english_pob_choice: shall appear
  chosen_spanish: se presentará
  alternatives_spanish:
  - aparecerá
  - será visto
  lexicon: HALOT
  rationale: En este contexto, el nifal de ראה funciona como comparecer ante una autoridad o deidad. «Se presentará» comunica en español la idea de comparecer ante Yahvé sin caer en la literalidad extraña de «será visto».
- source_word: כָּל זְכוּרְךָ
  english_pob_choice: every male among you
  chosen_spanish: todo varón entre ustedes
  alternatives_spanish:
  - todos los varones de ustedes
  - cada varón de ustedes
  lexicon: HALOT
  rationale: זָכָר se refiere específicamente al sexo masculino. «Varón» conserva esa especificidad. «Entre ustedes» refleja el alcance colectivo del sufijo de segunda persona plural implícito en el hebreo y evita una formulación posesiva demasiado rígida.
- source_word: אֶל פְּנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: La locución expresa comparecer en la presencia de alguien. «Ante» es la equivalencia española más concisa y reverente, y mantiene el valor relacional del hebreo.
- source_word: הָאָדֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: HALOT
  rationale: אדון es un título divino aquí. «Señor» es el equivalente natural y litúrgicamente inteligible en español, sin sustituirlo por una explicación menos reverente o más técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la decisión doctrinal del proyecto de transliterar el Nombre divino. En español, «Yahvé» es la forma adoptada como equivalente funcional de «Yahweh» en el texto inglés auditado, preservando el nombre personal de Dios en vez de sustituirlo por un título.
theological_decisions:
- issue: Colocación de título + Nombre divino en הָאָדֹן יְהוָה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahveh
  - el Señor Yahweh
  rationale: 'El hebreo combina un título con el Nombre divino. En español, «el Señor Yahvé» conserva ambas piezas: el título אדון y el nombre יְהוָה. Se evita la sustitución por «SEÑOR» o por una duplicación del título que ocultaría la forma del original.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «GOD» por «Yahweh» para reflejar יְהוָה, manteniendo «Lord» para הָאָדֹן. La presente redacción española refleja esa misma decisión al usar «Yahvé» para el Nombre divino y «Señor» para el título.
  spanish_consistency_notes:
  - Se mantiene la distinción entre el título divino «Señor» y el Nombre propio «Yahvé».
  - «Varón» conserva la especificidad masculina del hebreo.
  - «Ante» reproduce de forma natural la locución de comparecer en presencia de Dios.
  - El registro es sobrio y publicable, sin depender de la convención de sustitución «SEÑOR».
