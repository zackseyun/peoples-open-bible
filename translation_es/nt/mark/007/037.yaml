translation:
  language: es
  text: 'Y estaban completamente asombrados[a], diciendo: «Ha hecho todo[b] bien; incluso hace oír a los sordos y hablar a los mudos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «estaban asombrados en extremo»; el adverbio intensivo subraya la fuerza de la reacción.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «ha hecho todas las cosas bien»; esta forma puede evocar lenguaje bíblico sobre la obra de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπερπερισσῶς
  english_pob_choice: utterly
  chosen_spanish: completamente
  alternatives_spanish:
  - totalmente
  - sumamente
  - en extremo
  lexicon: BDAG
  rationale: El adverbio intensifica el asombro de modo superlativo. «Completamente» comunica esa fuerza en español natural sin cargar el texto con un calco forzado.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: estaban asombrados
  alternatives_spanish:
  - estaban atónitos
  - quedaron asombrados
  - se asombraban
  lexicon: BDAG
  rationale: El imperfecto expresa un estado o reacción en curso. «Estaban asombrados» conserva ese matiz mejor que un perfecto puntual y suena fluido en español.
- source_word: Καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - rectamente
  - de manera excelente
  lexicon: BDAG
  rationale: Aquí el adverbio evalúa la calidad de lo hecho por Jesús. «Bien» es el equivalente más directo y natural, y deja abierta la resonancia con lenguaje de evaluación divina sin explicitarla de más.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: El plural neutro tiene valor comprehensivo; en español, «todo» transmite el alcance global de la afirmación con mayor naturalidad que una frase más pesada.
- source_word: πεποίηκεν
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha hecho y dejado
  - ha realizado
  - ha obrado
  lexicon: BDAG
  rationale: El perfecto señala una acción completada con relevancia presente. «Ha hecho» es la correspondencia más sobria y exacta en el contexto evaluativo del dicho.
- source_word: κωφοὺς
  english_pob_choice: the deaf
  chosen_spanish: los sordos
  alternatives_spanish:
  - los que no oyen
  - personas sordas
  lexicon: BDAG
  rationale: En este contexto κωφός refiere a quienes no pueden oír. «Los sordos» funciona como sustantivo en español y mantiene el paralelismo con «los mudos».
- source_word: ποιεῖ ἀκούειν
  english_pob_choice: makes ... hear
  chosen_spanish: hace oír
  alternatives_spanish:
  - causa que oigan
  - les permite oír
  lexicon: BDAG
  rationale: La construcción causal de ποιέω con infinitivo se expresa de modo natural con «hace oír». Conserva la fuerza milagrosa sin sobreexplicar el mecanismo.
- source_word: ἀλάλους
  english_pob_choice: the mute
  chosen_spanish: los mudos
  alternatives_spanish:
  - los que no hablan
  - personas mudas
  lexicon: BDAG
  rationale: ἄλαλος designa incapacidad para hablar. «Los mudos» preserva la correspondencia formal y la paralela concisión del griego.
- source_word: λαλεῖν
  english_pob_choice: speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  lexicon: BDAG
  rationale: «Hablar» es el equivalente normal de λαλέω en este contexto de curación; suena más natural que «decir» y mantiene el contraste con «oír».
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - y
  - hasta
  lexicon: BDAG
  rationale: El segundo καί refuerza el alcance culminante de la afirmación. «Incluso» conserva esa intensificación de manera idiomática en español.
theological_decisions:
- issue: Posible alusión a Isaías 35:5–6 y eco de evaluación de la obra divina en «Ha hecho todo bien»
  english_pob_reading: Retain the crowd's statement in straightforward language without making the allusion explicit in the main text.
  chosen_spanish_reading: Mantener la declaración en español llano sin explicitar la alusión en el cuerpo del texto.
  alternative_spanish_readings:
  - «Ha hecho todas las cosas bien»
  - «Todo lo ha hecho bien»
  rationale: El griego permite una afirmación amplia que puede resonar con Isaías 35 y, a la vez, con lenguaje de valoración de la obra. La redacción española conserva esa tensión sin resolverla ni sobreinterpretarla.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del POB en inglés, especialmente el desplazamiento de «even» para modificar toda la cláusula y no solo «makes». En español, «incluso» se colocó antes de «hace oír» para reflejar esa coordinación natural sin aislar indebidamente el verbo.
  spanish_consistency_notes:
  - Se mantuvo «sordos» / «mudos» para conservar el paralelismo léxico con el griego y con el POB inglés.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este versículo ni responden a una decisión textual aquí.
  - «Todo» se prefirió a «todas las cosas» en el texto principal por fluidez, dejando la alternativa más literal en nota.
  - La puntuación con comillas angulares y dos puntos responde al español editorial estándar, manteniendo la unidad del discurso directo.
