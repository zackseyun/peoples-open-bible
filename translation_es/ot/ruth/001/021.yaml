    text: Or 'has borne witness against me.' The Hebrew verb can carry the sense of answering or testifying against someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'has done me harm.' The Hebrew expression speaks of calamity or adversity brought upon Naomi.
    reason: lexical_alternative
