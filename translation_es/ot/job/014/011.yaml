translation:
  language: es
  text: Como las aguas que desaparecen del mar[a], y un río se seca y queda seco,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como las aguas desaparecen del mar, y un río se seca y queda seco». El hebreo usa dos verbos relacionados para el río, intensificando la imagen de secamiento completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְלוּ
  english_pob_choice: disappear
  chosen_spanish: desaparecen
  alternatives_spanish:
  - se van
  - se agotan
  - desaparecen
  lexicon: HALOT
  rationale: El verbo expresa llegar a su fin o dejar de estar; «desaparecen» comunica bien esa pérdida de presencia sin sonar demasiado abrupto en español poético.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo es idiomático y en poesía se refleja naturalmente con «aguas».
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: del
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: La preposición marca separación/origen; «del» preserva la relación de procedencia en español natural.
- source_word: יָם
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - mar
  - lago
  lexicon: HALOT
  rationale: El valor léxico básico es «mar». Aunque el contexto pueda evocar un gran cuerpo de agua, se conserva el sentido más directo.
- source_word: נָהָר
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - río
  - arroyo
  lexicon: HALOT
  rationale: El sustantivo denota ordinariamente un río; «río» es la correspondencia más directa y clara.
- source_word: יֶחֱרַב
  english_pob_choice: dries up
  chosen_spanish: se seca
  alternatives_spanish:
  - se agosta
  - se yergue seco
  - se reseca
  lexicon: HALOT
  rationale: El verbo expresa volverse seco o árido. «Se seca» es la forma más natural para un río en español.
- source_word: וְיָבֵשׁ
  english_pob_choice: becomes dry
  chosen_spanish: se vuelve seco
  alternatives_spanish:
  - queda seco
  - se pone seco
  - se seca
  lexicon: HALOT
  rationale: Se conserva el segundo verbo como intensificación del primero, manteniendo la doble imagen de sequedad sin borrar la progresión poética.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés auditado: el segundo verbo no se interpretó como imagen vegetal («marchita») sino como sequedad real; por eso se optó por «se vuelve seco» para conservar la literalidad funcional y la intensificación poética.'
  spanish_consistency_notes:
  - Se mantuvo «aguas» en plural para reflejar el plural hebreo poético.
  - Se evitó «SEÑOR» o formulaciones tradicionales ajenas al texto, porque no aparece el Tetragrámaton ni un equivalente divino en este versículo.
  - La duplicación de sequedad se conservó con dos verbos distintos en español, siguiendo el énfasis del hebreo y del audit trail en inglés.
