id: MRK.10.1
reference: Mark 10:1
source:
  edition: SBLGNT
  text: Καὶ ἐκεῖθεν ἀναστὰς ἔρχεται εἰς τὰ ὅρια τῆς Ἰουδαίας ⸀καὶ πέραν τοῦ Ἰορδάνου, καὶ συμπορεύονται πάλιν ὄχλοι πρὸς αὐτόν, καὶ ὡς εἰώθει πάλιν ἐδίδασκεν αὐτούς.
translation:
  text: And from there[a], rising, he comes into the region of Judea and beyond the Jordan, and crowds gather to him again, and as was his custom[b], he again taught them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the Jordan.' The Greek can denote the region on the far side of the Jordan River.
    reason: lexical_alternative
  - marker: b
    text: The wording may be understood as either 'the region of Judea and beyond the Jordan' or 'the region of Judea beyond the Jordan.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: A straightforward spatial adverb marking departure from the previous location; 'from there' is natural and sufficiently formal.
- source_word: ἀναστὰς
  chosen: after rising
  alternatives:
  - having arisen
  - getting up
  lexicon: BDAG
  rationale: The aorist participle indicates antecedent action before the main verb. 'After rising' preserves the sequence without sounding archaic. It refers to getting up/departing, not resurrection.
- source_word: ἔρχεται
  chosen: he comes
  alternatives:
  - he goes
  - he arrives
  lexicon: BDAG
  rationale: Mark frequently uses the historical present for vivid narrative. 'He comes' preserves that feature better than shifting to a simple past, while English still reads naturally.
- source_word: τὰ ὅρια τῆς Ἰουδαίας
  chosen: the region of Judea
  alternatives:
  - the borders of Judea
  - the territory of Judea
  lexicon: BDAG
  rationale: ὅρια can mean borders/regions/territory. In this travel context, 'region of Judea' communicates destination idiomatically without implying a precise boundary line.
- source_word: καὶ πέραν τοῦ Ἰορδάνου
  chosen: and beyond the Jordan
  alternatives:
  - and across the Jordan
  lexicon: BDAG
  rationale: πέραν with the genitive denotes the area on the far side of the Jordan. 'Beyond the Jordan' is a standard and clear geographic rendering; 'across' is possible but slightly more interpretive regarding direction.
- source_word: συμπορεύονται
  chosen: gather
  alternatives:
  - go along together
  - travel together
  - come together
  lexicon: BDAG
  rationale: Literally the verb involves going together, but with ὄχλοι and πρὸς αὐτόν the sense is that crowds converge on Jesus. 'Gather' gives the idiomatic force in English without over-paraphrasing.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb appears twice in the verse and is preserved both times for Mark's repetitive style and the sense of recurring action.
- source_word: ὄχλοι
  chosen: crowds
  alternatives:
  - multitudes
  - people
  lexicon: BDAG
  rationale: '''Crowds'' is the most natural modern English equivalent and preserves the plural sense better than the more traditional but less current ''multitudes.'''
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With a motion/convergence verb, πρὸς naturally indicates movement toward a person. 'To him' is idiomatic in English.
- source_word: ὡς εἰώθει
  chosen: as he was accustomed
  alternatives:
  - as was his custom
  - as he usually did
  lexicon: BDAG
  rationale: The pluperfect-form verb εἴωθα functions idiomatically for customary action. 'As he was accustomed' preserves the habitual sense and links naturally to the repeated teaching ministry.
- source_word: ἐδίδασκεν αὐτούς
  chosen: he taught them
  alternatives:
  - he was teaching them
  lexicon: BDAG
  rationale: The imperfect denotes customary or ongoing past action. In English, 'he taught them' after 'as he was accustomed' adequately conveys repeated customary activity without awkwardness.
