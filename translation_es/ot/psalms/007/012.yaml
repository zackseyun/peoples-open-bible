translation:
  language: es
  text: Dios es un juez justo[a], y un Dios que se indigna cada día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios es un juez justo, y Dios se indigna cada día».
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: En este contexto salmódico, la forma plural hebrea tiene sentido singular y se refiere al único Dios verdadero; por eso se traduce como «Dios».
- source_word: שׁוֹפֵט
  english_pob_choice: is a judge
  chosen_spanish: es un juez
  alternatives_spanish:
  - juzga
  - es juez
  lexicon: HALOT
  rationale: El participio puede expresarse verbalmente o como predicado nominal. En español, «es un juez» reproduce bien la caracterización de Dios y mantiene la fluidez de la cláusula.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en sentido de rectitud
  lexicon: HALOT
  rationale: «Justo» comunica adecuadamente la conformidad moral y judicial del término; en español suena natural con «juez» y conserva la carga ética del hebreo.
- source_word: וְאֵל
  english_pob_choice: and a God
  chosen_spanish: y un Dios
  alternatives_spanish:
  - y un Dios poderoso
  - y El
  lexicon: HALOT
  rationale: Aunque אֵל puede matizar poder, aquí continúa la referencia al mismo Dios en paralelo con אֱלֹהִים. Por eso se mantiene «Dios» para preservar el paralelismo sin introducir un matiz no requerido.
- source_word: זֹעֵם
  english_pob_choice: is indignant
  chosen_spanish: se indigna
  alternatives_spanish:
  - está indignado
  - está airado
  lexicon: HALOT
  rationale: El participio expresa una disposición/acción continua de desaprobación divina. «Se indigna» conserva esa fuerza moral sin reducirla a una emoción pasajera.
- source_word: בְּכָל יוֹם
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: HALOT
  rationale: La expresión indica regularidad frecuente, no necesariamente duración continua durante un mismo día. «Cada día» es la equivalencia más natural y precisa en español.
theological_decisions:
- issue: Lenguaje de ira divina
  english_pob_reading: God is indignant every day
  chosen_spanish_reading: Dios ... se indigna cada día
  alternative_spanish_readings:
  - Dios ... está indignado cada día
  - Dios ... está airado cada día
  rationale: El hebreo atribuye de forma explícita una indignación continua a Dios. La traducción conserva esa tensión teológica sin suavizarla, usando un verbo natural en español.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el ajuste de la revisión inglesa final, conservando la conjunción y el paralelismo divino sin forzar una paráfrasis.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y גם para אֵל, porque el contexto mantiene la misma referencia divina.
  - «Justo» y «se indigna» preservan el tono jurídico-moral del versículo.
  - «Cada día» mantiene el valor distributivo de בְּכָל יוֹם.
