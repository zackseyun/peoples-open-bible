translation:
  language: es
  text: Pero si estás ante él[a], no temas en tu corazón; antes bien, habla según tus palabras, y él te tratará bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su presencia» o «delante de él»; la frase conserva la idea de comparecer ante una autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ στῇς
  english_pob_choice: if you stand
  chosen_spanish: si te pones
  alternatives_spanish:
  - si te presentas
  - si te mantienes en pie
  lexicon: LSJ
  rationale: El griego usa una condición con el aoristo subjuntivo de ἵστημι; en español, «ponerte» o «presentarte» expresa bien la acción de comparecer ante alguien. «Ponerte» evita la rigidez de un calco y conserva el sentido de comparecencia.
- source_word: ἐναντίον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: en su presencia
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: LSJ
  rationale: La expresión indica estar ante una persona. «En su presencia» es natural y mantiene el matiz de comparecer ante un superior o autoridad.
- source_word: μὴ φοβηθῇς τῇ καρδίᾳ σου
  english_pob_choice: do not be afraid in your heart
  chosen_spanish: no temas en tu corazón
  alternatives_spanish:
  - no tengas miedo en tu corazón
  - no te asustes interiormente
  lexicon: LSJ
  rationale: Se conserva la imagen del corazón como asiento interior del temor. «No temas en tu corazón» reproduce la fuerza idiomática sin volverlo abstracto.
- source_word: ἀνάγγειλον
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - declara
  - cuenta
  lexicon: LSJ
  rationale: 'Aunque el verbo puede sugerir «anunciar» o «informar», el contexto de instrucción directa favorece una orden simple y natural: «habla». Así se mantiene el tono claro y directo del pasaje.'
- source_word: κατὰ τὰ ῥήματά σου
  english_pob_choice: according to your words
  chosen_spanish: según tus palabras
  alternatives_spanish:
  - de acuerdo con tus palabras
  - conforme a tus palabras
  lexicon: LSJ
  rationale: La preposición con acusativo conserva la idea de conformidad. «Según tus palabras» es una equivalencia sobria y transparente. También deja visible la posible tensión interpretativa entre decir exactamente lo ya indicado y hablar en línea con ello.
- source_word: εὖ σε ποιήσει
  english_pob_choice: he will treat you well
  chosen_spanish: él te tratará bien
  alternatives_spanish:
  - él te hará bien
  - él actuará bien contigo
  lexicon: LSJ
  rationale: El giro ποιέω + adverbio + objeto personal expresa trato o conducta hacia alguien. «Te tratará bien» transmite el efecto favorable de manera natural en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego de Swete 1909 y el audit trail en inglés. Se refleja el cambio revisado en el POB inglés de «report» a «speak» con «habla», y se mantiene la alternativa de conformidad para κατὰ τὰ ῥήματά σου sin convertirla en una paráfrasis más libre.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando corresponda; en este versículo no aparece el nombre divino.
  - Se evitó «Cristo» y vocabulario doctrinal no pertinente.
  - «Corazón» se mantuvo por su valor antropológico semítico, coherente con el griego.
  - El tono es formal y bíblico, pero con español contemporáneo y publicable.
