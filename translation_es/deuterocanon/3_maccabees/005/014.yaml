translation:
  language: es
  text: Y cuando ya era casi la mitad de la sexta hora[a], el hombre encargado de las convocatorias, al ver a los convocados reunidos en masa, se acercó y dio una señal al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “casi la mitad de la sexta hora”. En el cómputo antiguo, esto equivale aproximadamente al mediodía.'
    reason: cultural_note
lexical_decisions:
- source_word: μεσούσης ... ἑκάτης ὥρας σχεδόν
  english_pob_choice: when it was already nearly the middle of the sixth hour
  chosen_spanish: ya era casi la mitad de la sexta hora
  alternatives_spanish:
  - ya estaba casi a la mitad de la sexta hora
  - era ya casi el mediodía
  lexicon: LSJ
  rationale: Conserva la referencia antigua a la “sexta hora” y el matiz de inmediatez de ἤδη y σχεδόν sin convertirlo explícitamente en una hora moderna en el texto principal.
- source_word: ὁ πρὸς ταῖς κλήσεσιν τεταγμένος
  english_pob_choice: the man appointed over the summonses
  chosen_spanish: el hombre encargado de los llamados
  alternatives_spanish:
  - el hombre nombrado sobre los llamados
  - el oficial encargado de las convocatorias
  lexicon: LSJ
  rationale: τεταγμένος expresa asignación u नियुक्तment; κλήσεις puede referirse a llamados/summonses. “Encargado de los llamados” mantiene la función administrativa sin introducir un cargo más específico de lo que el griego permite.
- source_word: ἀθρόους
  english_pob_choice: assembled in a mass
  chosen_spanish: reunidos en gran número
  alternatives_spanish:
  - reunidos en masa
  - aglomerados
  lexicon: LSJ
  rationale: ἀθρόους describe reunión compacta o en masa. En español, “en gran número” conserva la idea de abundancia de personas reunidas sin sonar demasiado duro o poco natural.
- source_word: τοὺς κλητούς
  english_pob_choice: those who had been summoned
  chosen_spanish: a los llamados
  alternatives_spanish:
  - a los que habían sido llamados
  - a los convocados
  lexicon: LSJ
  rationale: En este contexto administrativo, κλητοί son personas llamadas por autoridad. “Los llamados” es fiel y fluido; el relativo explicativo sería más explícito pero menos ágil.
- source_word: ἔνευσε
  english_pob_choice: signaled
  chosen_spanish: dio una señal
  alternatives_spanish:
  - hizo una seña
  - asintió
  lexicon: LSJ
  rationale: El verbo denota dar una señal, a menudo mediante gesto o asentimiento. “Dio una señal” es suficientemente amplio para no fijar indebidamente el tipo de gesto.
- source_word: προσελθὼν τὸν βασιλέα
  english_pob_choice: came up and signaled to the king
  chosen_spanish: se acercó y dio una señal al rey
  alternatives_spanish:
  - se acercó al rey y le dio una señal
  - habiéndose acercado al rey, dio una señal
  lexicon: LSJ
  rationale: El participio se vierte de manera natural en secuencia verbal en español. Se conserva el movimiento de acercarse antes de señalar.
translation_notes:
  revision_awareness: 'Se corrigió la dependencia entre la nota y el texto principal: el marcador [a] quedó insertado en la expresión temporal de la traducción, de modo que la nota cultural esté anclada correctamente y no sea flotante. También se mantuvo la referencia antigua a la sexta hora en vez de sustituirla por una hora moderna en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usa “llamados” para κλητοί y “encargado” para τεταγμένος, manteniendo el registro administrativo del pasaje.
  - La frase “dio una señal” preserva la neutralidad del gesto de ἔνευσε sin forzar “asintió” o “hizo una seña”.
  - La cronología antigua (“sexta hora”) se mantiene en el texto principal, con aclaración cultural en nota.
  - El rey aparece sin artículo en posición final, conforme al español natural y al énfasis del griego.
