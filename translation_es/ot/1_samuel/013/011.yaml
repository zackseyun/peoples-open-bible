translation:
  language: es
  text: 'Entonces Samuel dijo: «¿Qué has hecho?» Y Saúl dijo: «Porque vi que el pueblo se dispersaba de mí, y tú no habías llegado en el tiempo señalado[a], y los filisteos se estaban reuniendo[b] en Micmas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al tiempo señalado de los días», probablemente una referencia al período previamente acordado.'
    reason: lexical_alternative
  - marker: b
    text: O «se reunían».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה עָשִׂיתָ
  english_pob_choice: What have you done?
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué hiciste?
  lexicon: HALOT
  rationale: La pregunta de reprensión se expresa de manera natural en español con presente perfecto, que mantiene la fuerza de una acción cumplida con relevancia inmediata. «¿Qué hiciste?» también es posible, pero suena menos incisivo en este contexto.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal de Saúl. «Porque» reproduce de forma directa la relación causal sin añadir matices retóricos ajenos al hebreo.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - percibí
  - me di cuenta
  lexicon: HALOT
  rationale: El verbo de visión incluye aquí percepción y evaluación de la situación. «Vi» es suficientemente amplio y natural; no hace falta intensificarlo con una paráfrasis.
- source_word: נָפַץ הָעָם מֵעָלַי
  english_pob_choice: the people were scattering from me
  chosen_spanish: el pueblo se dispersaba de mí
  alternatives_spanish:
  - el pueblo se estaba dispersando de mí
  - el pueblo se apartaba de mí
  lexicon: HALOT
  rationale: «נָפַץ» comunica dispersión/desbandada. «Se dispersaba» preserva ese sentido y mantiene el enfoque en la pérdida de apoyo de Saúl. «De mí» conserva el centro relacional del texto; se evita suavizarlo como si fuera solo movimiento general.
- source_word: לֹא בָאתָ
  english_pob_choice: you had not come
  chosen_spanish: tú no habías llegado
  alternatives_spanish:
  - tú no viniste
  - no habías venido
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien la mirada retrospectiva de Saúl al episodio anterior. «Llegado» comunica de modo natural la llegada esperada del profeta en el punto acordado.
- source_word: לְמוֹעֵד הַיָּמִים
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - para la fecha señalada
  - en el plazo señalado
  - en el tiempo de los días señalados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y probablemente remite al período previamente fijado. «En el tiempo señalado» conserva la idea de un plazo/ocasión acordados sin forzar un calco opaco. Se evita «días señalados» como redacción principal por sonar menos natural en español.
- source_word: נֶאֱסָפִים
  english_pob_choice: were gathering
  chosen_spanish: se estaban reuniendo
  alternatives_spanish:
  - se reunían
  - estaban reuniéndose
  - se estaban juntando
  lexicon: HALOT
  rationale: El participio niphal describe una acción en desarrollo o un estado emergente. «Se estaban reuniendo» conserva la progresión y el carácter de amenaza inminente mejor que un pasado simple.
- source_word: מִכְמָשׂ
  english_pob_choice: Michmash
  chosen_spanish: Micmas
  alternatives_spanish:
  - Micmash
  lexicon: HALOT
  rationale: Se mantiene la transliteración habitual del topónimo en español bíblico. «Micmas» sigue la adaptación fonética más natural para lectores hispanos.
theological_decisions:
- issue: El peso de «YHWH» no aparece explícito en este versículo, pero el texto forma parte del relato donde la evaluación profética tiene autoridad divina.
  english_pob_reading: No explicit theological gloss in the English verse; the rebuke is direct speech within the narrative.
  chosen_spanish_reading: Sin glosa teológica explícita en el versículo; se conserva la reprensión directa del relato.
  alternative_spanish_readings:
  - Añadir una nota devocional sobre obediencia profética
  - Explicitar una lectura moralizante del error de Saúl
  rationale: No corresponde introducir una interpretación doctrinal que el versículo no formula. La fidelidad del draft exige dejar que la acusación de Samuel funcione narrativamente sin ampliarla.
  doctrine_reference: Principio de suficiencia textual y no sobreinterpretación narrativa
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del audit trail en inglés sin cambios textuales sustanciales. La revisión más reciente indica que no fueron necesarias modificaciones; se mantuvo la misma lectura óptima-equivalente y se trasladaron sus decisiones léxicas al español con ajuste natural de sintaxis.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque no aparece en este versículo.
  - Se conservó «pueblo»/«filisteos» con terminología bíblica estándar y sin sustituir por equivalentes menos precisos.
  - La puntuación española usa comillas angulares y mantiene el cierre narrativo con comillas simples de discurso directo dentro de la frase.
  - 'Las notas a y b reflejan las dos ambigüedades principales del hebreo: el período señalado y la posible traducción de נֶאֱסָפִים.'
