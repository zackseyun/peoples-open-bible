translation:
  language: es
  text: Subió humo de sus narices[a], y fuego que consume de su boca; las brasas ardieron de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su nariz»; también puede entenderse idiomáticamente como «de su ira», porque el hebreo para «nariz/narices» puede expresar enojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente. «Subió» es natural en español moderno y conserva la imagen concreta del humo que asciende sin recargar el estilo.
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo espeso
  - humo
  lexicon: HALOT
  rationale: «Humo» es el equivalente directo y sobrio; el contexto poético ya aporta intensidad sin necesidad de adjetivar.
- source_word: בְּאַפּוֹ
  english_pob_choice: from his nostrils
  chosen_spanish: de sus narices
  alternatives_spanish:
  - de su nariz
  - por sus narices
  - en su ira
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del texto hebreo. «Narices» reproduce con mayor fidelidad el plural expresivo y evita resolver la tensión idiomática hacia «ira», que en este verso permanece implícita.
- source_word: וְאֵשׁ
  english_pob_choice: and ... fire
  chosen_spanish: y fuego
  alternatives_spanish:
  - y fuego
  - y una llama
  lexicon: HALOT
  rationale: La conjunción y el sustantivo son directos; «fuego» mantiene el paralelismo con el humo y la boca.
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - desde su boca
  lexicon: HALOT
  rationale: «De su boca» comunica la fuente de la acción de manera natural en español y preserva el paralelismo con «de sus narices».
- source_word: תֹּאכֵל
  english_pob_choice: consuming
  chosen_spanish: consumidor
  alternatives_spanish:
  - devorador
  - que consume
  lexicon: HALOT
  rationale: La forma verbal femenina singular califica a «fuego». «Consumidor» funciona bien en español como adjetivo poético y conserva la fuerza de un fuego que devora.
- source_word: גֶּחָלִים
  english_pob_choice: coals
  chosen_spanish: brasas
  alternatives_spanish:
  - carbones
  - brasas ardientes
  lexicon: HALOT
  rationale: «Brasas» es un equivalente natural y visual en español bíblico actual. Mantiene la imagen de material encendido sin añadir más de lo que el hebreo dice.
- source_word: בָּעֲרוּ
  english_pob_choice: blazed
  chosen_spanish: se encendieron
  alternatives_spanish:
  - ardieron
  - llamearon
  lexicon: HALOT
  rationale: El verbo expresa prenderse/arder con intensidad. «Se encendieron» conserva el sentido de ignición y suena fluido en la construcción poética española.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - desde él
  lexicon: HALOT
  rationale: La preposición indica procedencia. «De él» mantiene el origen del fuego en la figura divina sin añadir interpretación.
theological_decisions:
- issue: Lenguaje antropomórfico para Dios en la teofanía
  english_pob_reading: 'Retain the bodily imagery literally: ''nostrils,'' ''mouth,'' and fire/smoke issuing from him.'
  chosen_spanish_reading: 'Mantener la imaginería corporal: «narices», «boca» y fuego/humo que salen de él.'
  alternative_spanish_readings:
  - Interpretar «narices» como «ira» y suavizar la imagen
  - Reformular en lenguaje abstracto sobre la indignación divina
  rationale: El verso es poético y teofánico. Conservar la imagen concreta preserva el paralelismo y la tensión teológica del texto, sin reducirla a una mera abstracción sobre la ira.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto coincide con la decisión inglesa de mantener la imaginería corporal y no resolver «nariz/narices» como «ira». No se requieren revisiones respecto al audit trail vigente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton.
  - Se conserva un registro poético y bíblico, pero con español moderno y claro.
  - «Narices» mantiene la tensión lexical del hebreo; la nota ofrece la alternativa idiomática sin desplazar la lectura principal.
