id: EST.7.9
reference: Esther 7:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חַ֠רְבוֹנָה אֶחָ֨ד מִן הַ/סָּרִיסִ֜ים לִ/פְנֵ֣י הַ/מֶּ֗לֶךְ גַּ֣ם הִנֵּה הָ/עֵ֣ץ אֲשֶׁר עָשָׂ֪ה הָמָ֟ן לְֽ/מָרְדֳּכַ֞י אֲשֶׁ֧ר דִּבֶּר ט֣וֹב עַל הַ/מֶּ֗לֶךְ עֹמֵד֙ בְּ/בֵ֣ית הָמָ֔ן גָּבֹ֖הַּ חֲמִשִּׁ֣ים אַמָּ֑ה וַ/יֹּ֥אמֶר הַ/מֶּ֖לֶךְ תְּלֻ֥/הוּ עָלָֽי/ו־־־־־׃
translation:
  text: Then Harbonah[a], one of the eunuchs before the king, said, “Also, behold, the gallows that Haman made for Mordecai, who spoke good for the king, is standing at Haman’s house, fifty cubits high.” And the king said[c][b], “Hang him on it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the tree/wood' (הָעֵץ); here it refers to an execution structure, traditionally rendered 'gallows.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who spoke well for the king' or 'who spoke in the king’s favor.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'Impale him on it'; the Hebrew terminology can refer more broadly to suspension on a wooden structure than to a later-style gallows.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַרְבוֹנָה
  chosen: Harbonah
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: הַסָּרִיסִים
  chosen: eunuchs
  alternatives:
  - officials
  - court officers
  lexicon: HALOT
  rationale: סָרִיס often denotes a eunuch in royal court contexts, though it can extend to court officials. In Esther's Persian court setting, 'eunuchs' is the more direct lexical rendering and matches the narrative setting.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  lexicon: HALOT
  rationale: A standard idiom for attendance in the royal presence. 'Before the king' is concise and natural while preserving the formal court sense.
- source_word: גַּם הִנֵּה
  chosen: Also, look—
  alternatives:
  - Moreover, behold
  - And indeed
  lexicon: HALOT
  rationale: The combination adds emphasis and draws attention to new information. 'Also, look—' preserves both additive force and deictic immediacy in readable modern English.
- source_word: הָעֵץ
  chosen: gallows
  alternatives:
  - tree
  - wooden stake
  - pole
  lexicon: HALOT
  rationale: Literally the noun means 'tree/wood,' but in Esther it refers to an execution device prepared for hanging/impalement. 'Gallows' is the conventional and contextually intelligible rendering in English, though the underlying Hebrew is broader than a modern gallows.
- source_word: עָשָׂה ... לְמָרְדֳּכַי
  chosen: made for Mordecai
  alternatives:
  - prepared for Mordecai
  lexicon: HALOT
  rationale: The verb is the common 'make/do.' 'Made for Mordecai' is straightforward and preserves the hostile purpose indicated by לְ.
- source_word: דִּבֶּר טוֹב עַל הַמֶּלֶךְ
  chosen: spoke good for the king
  alternatives:
  - spoke well for the king
  - spoke in the king’s favor
  - spoke good concerning the king
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic. Mordecai had spoken in a way beneficial to the king by exposing the plot. 'Spoke good for the king' stays close to the wording without overinterpreting, while still making sense in English.
- source_word: עֹמֵד
  chosen: is standing
  alternatives:
  - stands
  lexicon: HALOT
  rationale: The participle denotes a present state. 'Is standing' preserves the vividness of the Hebrew participle.
- source_word: בְּבֵית הָמָן
  chosen: at Haman’s house
  alternatives:
  - in Haman’s house
  - by Haman’s house
  lexicon: HALOT
  rationale: The phrase indicates location at Haman's residence/property. 'At Haman’s house' is idiomatic English and fits the likely sense of the structure being erected on his premises.
- source_word: גָּבֹהַּ חֲמִשִּׁים אַמָּה
  chosen: fifty cubits high
  alternatives:
  - seventy-five feet high
  - about twenty-three meters high
  lexicon: HALOT
  rationale: Retains the ancient unit in the main text for formal fidelity. Modern equivalents are interpretive and better suited to a note if needed.
- source_word: תְּלֻהוּ עָלָיו
  chosen: Hang him on it
  alternatives:
  - Hang him on that
  - Impale him on it
  lexicon: HALOT
  rationale: The imperative plus preposition refers back to the execution device. 'Hang him on it' is the most natural English rendering and aligns with the narrative's established terminology, though the ancient mode of execution may have involved impalement/staking more broadly.
