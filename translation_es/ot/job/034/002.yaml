- from: Oigan mis palabras[a], ustedes hombres sabios, y préstenme atención, ustedes que saben.
  to: Oigan mis palabras, hombres sabios, y préstenme oído[a], ustedes que saben.
  rationale: Se revisa para reflejar mejor el valor literal de הַאֲזִינוּ con una expresión española basada en «oído», en línea con la auditoría inglesa, y para trasladar la nota al pie al lugar léxicamente pertinente. También se aligera la redacción eliminando un «ustedes» innecesario sin alterar el sentido vocativo del original.
