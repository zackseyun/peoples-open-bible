translation:
  language: es
  text: Y cuando sieguen la cosecha de su tierra, no segarás completamente el borde[a] de tu campo, ni recogerás el rebusco de tu cosecha; lo dejarás para el pobre y para el residente extranjero[b]. Yo soy Yahvé vuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la esquina de tu campo’. El término hebreo puede referirse al borde, lado o esquina.
    reason: lexical_alternative
  - marker: b
    text: O ‘forastero’. El hebreo designa a una persona no israelita que vive entre Israel bajo sus protecciones sociales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקֻצְרְכֶם
  english_pob_choice: And when you reap
  chosen_spanish: Y cuando siegues
  alternatives_spanish:
  - Y cuando coseches
  - Y al segar
  lexicon: HALOT
  rationale: La forma con infinitivo constructo marca circunstancia temporal; en español, ‘Y cuando siegues’ conserva el valor legal-secuencial con buena naturalidad.
- source_word: קְצִיר אַרְצְכֶם
  english_pob_choice: the harvest of your land
  chosen_spanish: la cosecha de tu tierra
  alternatives_spanish:
  - la cosecha de vuestra tierra
  - la siega de tu tierra
  lexicon: HALOT
  rationale: קציר puede referir a la cosecha obtenida; ‘cosecha de tu tierra’ mantiene el sentido agrícola y el vínculo con la tierra sin sonar artificial.
- source_word: לֹא תְכַלֶּה
  english_pob_choice: you shall not completely reap
  chosen_spanish: no segarás completamente
  alternatives_spanish:
  - no terminarás de segar
  - no harás una siega completa
  lexicon: HALOT
  rationale: כלה en piel aquí prohíbe llevar la siega hasta el final; ‘no segarás completamente’ comunica bien la prohibición sin perder fuerza.
- source_word: פְּאַת שָׂדְךָ
  english_pob_choice: the edge of your field
  chosen_spanish: el borde de tu campo
  alternatives_spanish:
  - la esquina de tu campo
  - la orilla de tu campo
  lexicon: HALOT
  rationale: פאה puede ser ‘borde’, ‘lado’ o ‘esquina’. ‘Borde’ es claro en español moderno y conserva la amplitud semántica útil para esta ley agrícola.
- source_word: וְלֶקֶט קְצִירְךָ
  english_pob_choice: the gleanings of your harvest
  chosen_spanish: el rebusco de tu cosecha
  alternatives_spanish:
  - las espigas sueltas de tu cosecha
  - lo que quede de tu cosecha
  lexicon: HALOT
  rationale: לקט designa lo recogido después de la cosecha principal. ‘Rebusco’ es término español tradicional y preciso para este remanente agrícola; por eso se prefiere a una paráfrasis más extensa.
- source_word: לֹא תְלַקֵּט
  english_pob_choice: you shall not gather
  chosen_spanish: ni recogerás
  alternatives_spanish:
  - ni rebuscarás
  - ni juntarás
  lexicon: HALOT
  rationale: El verbo לקט significa recoger/gather lo remanente. ‘Ni recogerás’ evita una repetición pesada y mantiene la prohibición ligada al ‘rebusco’ ya nombrado.
- source_word: לֶעָנִי
  english_pob_choice: for the poor
  chosen_spanish: para el pobre
  alternatives_spanish:
  - para los pobres
  - para el necesitado
  lexicon: HALOT
  rationale: עני en este contexto social-jurídico designa al vulnerable económicamente; ‘el pobre’ es directo y fiel.
- source_word: וְלַגֵּר
  english_pob_choice: for the sojourner
  chosen_spanish: para el forastero
  alternatives_spanish:
  - para el residente extranjero
  - para el extranjero que reside entre ustedes
  lexicon: HALOT
  rationale: גֵּר es el no israelita que vive bajo la protección social de Israel. ‘Forastero’ es legible en español y evita cargar el texto con una expresión demasiado técnica.
- source_word: תַּעֲזֹב אֹתָם
  english_pob_choice: you shall leave them
  chosen_spanish: lo dejarás
  alternatives_spanish:
  - los dejarás
  - los abandonarás
  lexicon: HALOT
  rationale: עזב aquí significa dejar para otros, no abandonar afectivamente. En español, ‘lo dejarás’ suena natural y recoge la idea de dejarlo disponible para los necesitados.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el nombre divino: ‘Yahvé’, manteniendo el Tetragrámaton como nombre propio y no sustituyéndolo por una máscara litúrgica.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: El hebreo usa 2mp, pero en español bíblico puede emplearse el singular genérico singularizante en un mandato dirigido al pueblo. Aquí se conserva ‘tu’ para una lectura directa y solemne; si el marco editorial exige plural explícito, ‘vuestro Dios’ sería la alternativa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el nombre del pacto. Se evita la sustitución por ‘SEÑOR’ y se mantiene el nombre divino en forma española estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Meaning of גֵּר in Israel’s social law
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - residente extranjero
  - extranjero
  rationale: La ley protege a una persona no israelita integrada en la comunidad. ‘Forastero’ conserva la alteridad social sin introducir categorías modernas ajenas al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Number/person in אֱלֹהֵיכֶם
  english_pob_reading: your God
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - vuestro Dios
  rationale: Aunque el hebreo es plural, el español bíblico puede singularizar la dirección al pueblo como colectivo. Se registra la tensión para no borrar la forma original; ‘vuestro Dios’ queda como alternativa si la serie editorial privilegia el plural explícito.
  doctrine_reference: 'Gramática hebrea: sufijo 2mp; política de estilo bíblico en español'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al evitar una duplicación innecesaria de la cláusula temporal y al mantener una estructura más natural. En español, se preservó esa economía con ‘Y cuando siegues...’ al inicio, sin repetir después una segunda cláusula equivalente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ conforme al término base del proyecto para יְהוָה.
  - Se mantuvo ‘forastero’ como equivalente readable de גֵּר, con nota para la opción más técnica.
  - ‘Rebusco’ se eligió para לקט por su precisión agrícola y su registro bíblico natural en español.
  - Se singularizó ‘tu Dios’ por fluidez editorial, dejando registrada la tensión con el plural hebreo.
