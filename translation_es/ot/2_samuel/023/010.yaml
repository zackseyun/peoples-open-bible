base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/010.yaml
  text: He rose and struck down the Philistines until his hand grew weary and his hand clung to the sword[a]. And Yahweh brought about a great victory on that day[b], and the people returned after him only to strip the slain.
  footnotes:
  - marker: a
    text: Or 'a great deliverance' or 'a great salvation.' The Hebrew term can denote rescue broadly; here it refers to the LORD's decisive deliverance in battle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'only to strip,' that is, to strip the fallen of weapons and spoil after the battle.
    reason: cultural_note
