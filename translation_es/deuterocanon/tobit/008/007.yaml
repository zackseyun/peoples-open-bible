    issue: '''recibo a esta mi hermana'' suena antinatural y no comunica bien el contexto matrimonial de λαμβάνω'
    rationale: Aunque λαμβάνω es literalmente 'tomar/recibir', en español 'recibir a una mujer' no es una formulación clara para matrimonio. 'Tomo por esposa' preserva el marco con fidelidad y buena legibilidad.
