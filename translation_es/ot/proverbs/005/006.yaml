translation:
  language: es
  text: No sea que allane el camino de la vida[a]; sus sendas vacilan[b]; ella no lo sabe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tú no lo sabes», si la cláusula final se entiende como dirigida al oyente en vez de describir a la mujer.'
    reason: alternative_reading
  - marker: b
    text: 'O: «No sea que consideres el camino de la vida; sus caminos vagan». El hebreo de este versículo es compacto y se ha entendido de más de una manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח חַיִּים
  english_pob_choice: the path of life
  chosen_spanish: el camino de la vida
  alternatives_spanish:
  - la senda de la vida
  - la ruta de la vida
  lexicon: HALOT
  rationale: אֹרַח designa un camino o senda concreta, y חַיִּים especifica vida. «Camino de la vida» conserva la metáfora espacial y suena natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español, «para que no» expresa bien la prevención o finalidad negativa de פֶּן sin sonar arcaico; mantiene el tono exhortativo sapiencial.
- source_word: תְּפַלֵּס
  english_pob_choice: level
  chosen_spanish: allane
  alternatives_spanish:
  - enderece
  - pese
  - considere
  lexicon: HALOT
  rationale: El verbo פלס en piel puede significar hacer nivelado, recto o pesar. «Allanar» preserva la imagen del camino y la idea de hacerlo liso/recto sin perder el matiz metáforico.
- source_word: נָעוּ
  english_pob_choice: wander
  chosen_spanish: vacilan
  alternatives_spanish:
  - vagan
  - se desvían
  - titubean
  lexicon: HALOT
  rationale: El verbo comunica inestabilidad y movimiento errante. «Vacilan» comunica bien la oscilación y la falta de firmeza de las sendas.
- source_word: מַעְגְּלֹתֶיהָ
  english_pob_choice: her tracks
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus huellas
  - sus cursos
  lexicon: HALOT
  rationale: מַעְגָּלֹת puede referirse a sendas o trayectorias. «Sendas» mantiene el paralelismo con «camino» y evita repetir la misma palabra, preservando el doble juego de imágenes.
- source_word: לֹא תֵדָע
  english_pob_choice: she does not know it
  chosen_spanish: ella no lo sabe
  alternatives_spanish:
  - tú no lo sabes
  - no lo sabe
  lexicon: HALOT
  rationale: La lectura principal sigue al flujo del contexto que describe a la mujer en tercera persona femenina. «Lo» refiere de forma implícita al extravío o al camino, como en el inglés POB.
theological_decisions:
- issue: Sujeto del último miembro
  english_pob_reading: 'The verse continues to describe the forbidden woman: ''she does not know it.'''
  chosen_spanish_reading: 'El verso continúa describiendo a la mujer: «ella no lo sabe».'
  alternative_spanish_readings:
  - «tú no lo sabes»
  - «no lo sabes»
  rationale: El contexto inmediato de Proverbios 5:3–6 mantiene a la mujer en tercera persona femenina. Conservar esa lectura evita un cambio brusco de interlocutor y respeta la tensión textual documentada, dejando la alternativa en nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que añadió «should» tras «Lest she» por naturalidad formal. En español, ese matiz preventivo se ha expresado con «Para que no», manteniendo el valor de advertencia y la metáfora del camino.
  spanish_consistency_notes:
  - Se mantuvo «camino»/«sendas» para reflejar el paralelismo hebreo sin repetir exactamente el mismo sustantivo.
  - Se evitó «SEÑOR» o terminología eclesiástica no presente en el texto; no hay aquí nombres divinos ni cristológicos.
  - «Ella no lo sabe» conserva la tercera persona femenina del flujo contextual, con referencia implícita al extravío o al camino, conforme al POB inglés.
