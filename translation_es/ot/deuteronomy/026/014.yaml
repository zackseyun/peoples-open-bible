base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/026/014.yaml
  text: I have not eaten any of it while in mourning[a], and I have not removed any of it while unclean, and I have not given any of it for the dead. I have obeyed the voice of Yahweh my God[c][b]; I have done according to all that you commanded me.
