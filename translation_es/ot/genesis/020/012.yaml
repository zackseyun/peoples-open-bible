    rationale: Una raya o comas reflejan mejor la aposición explicativa del hebreo y del inglés POB; los dos puntos introducen un tono más esquemático que narrativo.
  - severity: low
    issue: El punto y coma antes de la cláusula final es innecesario
    rationale: 'La secuencia narrativa se lee con mayor naturalidad como una continuación simple: «...mi madre, y llegó a ser mi esposa».'
