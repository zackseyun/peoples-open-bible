    text: O «vivaces» o «robustas»; el adjetivo hebreo puede enfatizar fuerza y rapidez en el parto. Algunos intérpretes lo entienden más literalmente como «semejantes a animales», pero eso es menos claro en el español contemporáneo.
    reason: lexical_alternative
  revision_rationale: Se reemplaza la nota impropia sobre «Faraón» por la nota léxica requerida en «vigorosas», alineando el español con la evidencia y el audit trail inglés. También se suaviza la puntuación para mayor naturalidad en español sin alterar el sentido.
