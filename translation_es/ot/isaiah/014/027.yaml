translation:
  language: es
  text: Porque Yahvé de los ejércitos ha determinado[a]; ¿quién podrá anularlo? Su mano está extendida[b]; ¿quién la hará volver?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ha planeado» o «ha decidido». El hebreo expresa formar un propósito o plan.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Su mano está alzada». La imagen suele comunicar poder activo, a menudo en juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrama, siguiendo la política del proyecto de no sustituirlo por un título. En español, "Yahvé" es la forma más reconocible y reverente para este uso.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: El hebreo forma el título fijo "YHWH צְבָאוֹת". "De los ejércitos" comunica bien la amplitud del término sin volverlo demasiado técnico para el español bíblico actual.
- source_word: יָעָץ
  english_pob_choice: has purposed
  chosen_spanish: ha decidido
  alternatives_spanish:
  - ha planeado
  - ha determinado
  - ha aconsejado
  lexicon: HALOT
  rationale: El verbo expresa formar un propósito o plan. "Ha decidido" transmite la fuerza deliberativa en un español natural, aunque "ha planeado" y "ha determinado" siguen siendo posibles.
- source_word: יָפֵר
  english_pob_choice: can annul it
  chosen_spanish: anularlo
  alternatives_spanish:
  - frustrarlo
  - quebrantarlo
  - revocarlo
  lexicon: HALOT
  rationale: Se conserva la idea de invalidar o dejar sin efecto un propósito. "Anularlo" es preciso y mantiene la relación con la decisión anterior.
- source_word: יָדוֹ
  english_pob_choice: His hand
  chosen_spanish: Su mano
  alternatives_spanish:
  - Su brazo
  lexicon: HALOT
  rationale: Se mantiene la imagen antropomórfica del hebreo sin suavizarla. "Mano" es la correspondencia directa y más transparente.
- source_word: הַנְּטוּיָה
  english_pob_choice: is stretched out
  chosen_spanish: está extendida
  alternatives_spanish:
  - está tendida
  - está alzada
  - está extendida en juicio
  lexicon: HALOT
  rationale: La forma participial pasiva describe la mano como extendida en acción. "Está extendida" conserva la imagen con naturalidad en español; "está alzada" sería menos literal.
- source_word: יְשִׁיבֶנָּה
  english_pob_choice: can turn it back
  chosen_spanish: la hará volver
  alternatives_spanish:
  - la podrá hacer volver
  - la volverá atrás
  - la hará retroceder
  lexicon: HALOT
  rationale: El sufijo femenino retoma la mano extendida. "La hará volver" respeta la referencia pronominal y mantiene el paralelo con la pregunta retórica del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יהוה en un título compuesto
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: Se conserva el nombre divino en forma explícita, de acuerdo con la política del proyecto, y se vierte צְבָאוֹת de manera amplia como "de los ejércitos" para no limitar indebidamente el alcance del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor del verbo יָפֵר en la pregunta retórica
  english_pob_reading: can annul it?
  chosen_spanish_reading: ¿quién podrá anularlo?
  alternative_spanish_readings:
  - ¿quién podrá frustrarlo?
  - ¿quién podrá quebrantarlo?
  rationale: La pregunta retórica apunta a la imposibilidad de invalidar el propósito de Yahvé. "Anularlo" conserva la idea jurídica/declarativa de dejar sin efecto ese plan, sin borrar la tensión lexical entre quebrantar, frustrar y anular.
  doctrine_reference: 'HALOT: Hiphil of פרר'
translation_notes:
  revision_awareness: El audit trail inglés mantiene una solución de equivalencia óptima y no registra revisiones aplicadas; el cotejo final reporta alta concordancia. La versión española sigue esa lectura sin añadir matices no sustentados por el hebreo, conservando las dos preguntas retóricas y la imagen antropomórfica de la mano extendida.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrama, conforme a la política del proyecto.
  - «de los ejércitos» mantiene el título compuesto sin introducir una glosa explicativa dentro del texto principal.
  - Se preserva la estructura retórica del hebreo con dos preguntas consecutivas.
  - La puntuación española usa signos de interrogación de apertura y cierre y mantiene el paralelismo del verso.
