translation:
  language: es
  text: Y vio Simón que Juan su hijo era un hombre, y lo nombró comandante de todas las fuerzas; y vivía en Gazara[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gazara es la forma griega del sitio más conocido en español como Gezer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre ya hecho
  - un hombre maduro
  lexicon: LSJ
  rationale: La frase griega ὅτι ἀνὴρ ἐστίν señala que Juan había llegado a la condición de hombre adulto o de capacidad probada. «Un hombre» conserva de cerca la formulación y el sentido básico, sin añadir una paráfrasis interpretativa que el texto no exige.
- source_word: ἔθετο
  english_pob_choice: appointed
  chosen_spanish: lo nombró
  alternatives_spanish:
  - lo नियुक्तó
  - lo puso
  - lo estableció
  lexicon: LSJ
  rationale: En contexto de designación para un cargo, «lo nombró» expresa naturalmente la acción administrativa de asignar una función. Mantiene la fuerza de nombramiento sin el calco incómodo de «lo puso».
- source_word: ἡγούμενον
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - líder
  - jefe
  - gobernante militar
  lexicon: LSJ
  rationale: Con τῶν δυνάμεων πάσων, el participio indica jefatura militar. «Comandante» comunica esa responsabilidad de manera clara en español y conserva la fuerza militar del término.
- source_word: τῶν δυνάμεων πάσων
  english_pob_choice: over all the forces
  chosen_spanish: de todas las fuerzas
  alternatives_spanish:
  - sobre todas las fuerzas
  - de todas las tropas
  - sobre todas las tropas
  lexicon: LSJ
  rationale: «δυνάμεις» aquí se refiere a fuerzas militares. En español, «de todas las fuerzas» mantiene el alcance total del genitivo y su sentido militar sin forzar una construcción menos natural.
- source_word: ᾤκει
  english_pob_choice: he lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - residió
  - moró
  lexicon: LSJ
  rationale: El imperfecto de οἰκέω expresa residencia continuada. «Habitó» es una opción digna y bíblica en español, suficientemente clara para indicar permanencia en un lugar.
- source_word: ἐν Γαζάροις
  english_pob_choice: in Gazara
  chosen_spanish: en Gazara
  alternatives_spanish:
  - en Gezer
  lexicon: LSJ
  rationale: La forma griega es Γαζάροις, transliterada como «Gazara». Se conserva la forma del texto fuente en el cuerpo principal, siguiendo la preferencia editorial por las formas griegas; «Gezer» se preserva como variante histórica posible.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y concuerda con el audit trail inglés sin requerir cambios respecto del pasaje recibido. Se conservó la progresión narrativa: percepción de Simón, constatación de la adultez de Juan, su nombramiento militar y su residencia en Gazara.'
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reproducir la coordinación narrativa del griego.
  - Se evitó «Señor» u այլ terminología ajena porque no aparece el nombre divino ni lenguaje teológico relevante en este versículo.
  - Se eligió «comandante» por consistencia con el valor militar documentado de ἡγούμενον en el contexto.
  - La toponimia se dejó en forma griega transliterada en el texto principal, con nota para la equivalencia histórica.
