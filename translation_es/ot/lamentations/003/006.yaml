translation:
  language: es
  text: Me hizo habitar en tinieblas[a], como los muertos de antiguo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me hizo sentar en tinieblas, como los muertos de antiguo».'
