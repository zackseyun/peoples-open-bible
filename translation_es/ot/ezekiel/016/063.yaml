review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: propósito (''para que''), recuerdo y vergüenza, pérdida de toda base para hablar, causal ''a causa de tu vergüenza'', y conservación acertada de כפר con lenguaje de expiación. Sin embargo, hay dos puntos que requieren ajuste: (1) el marcador [a] está anclado en ''te avergüences'' pero su nota explica la alternativa de ''apertura de boca'', por lo que está mal ubicado; (2) ''ya más'' suena redundante y menos natural en español. Además, en אֲדֹנָי יְהוִה conviene evitar ''Señor Yahvé'', que duplica la idea de señorío y no suena idiomático; ''el Señor Dios, Yahvé'' preserva ambos elementos del hebreo y el nombre divino del proyecto.'
  spanish_quality_summary: 'El español es en general claro y digno, pero necesita una pequeña reparación de naturalidad y de anclaje de notas. ''No tengas ya más oportunidad'' debe simplificarse a ''no tengas más oportunidad'' o ''ya no tengas oportunidad''. También conviene ajustar la fórmula final a una expresión más eclesial y natural en español: ''declara el Señor Dios, Yahvé''.'
  glossary_alignment: Buena alineación con la terminología del proyecto en כפר -> 'expiación' y יהוה -> 'Yahvé'. La combinación אֲדֹנָי יְהוִה no debe quedar como 'Señor Yahvé' si eso produce español poco natural; 'Señor Dios, Yahvé' mantiene el valor de אֲדֹנָי + יהוה sin enmascarar el nombre divino.
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal anclado
    rationale: La nota [a] explica la alternativa para פִּתְחוֹן פֶּה ('apertura de boca'), pero en el borrador está colocada sobre 'te avergüences'. Eso rompe la correspondencia requerida entre texto y nota.
  - severity: low
    issue: '''ya más'' suena redundante'
    rationale: En español actual y natural, 'no tengas ya más oportunidad' es menos idiomático que 'ya no tengas oportunidad' o 'no tengas más oportunidad'.
  - severity: medium
    issue: Fórmula final 'el Señor Yahvé' poco idiomática
    rationale: Aunque preserva Yahvé, no representa con naturalidad אֲדֹנָי יְהוִה en español. 'El Señor Dios, Yahvé' conserva ambos componentes y suena mejor en lectura bíblica.
