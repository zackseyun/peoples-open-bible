revisions:
- from: Lo cavó, le quitó las piedras, y lo plantó con vides escogidas; edificó una torre en medio de él, y también cavó en él un lagar. Luego esperaba que produjera uvas, pero produjo uvas silvestres[a].
  to: La cavó, le quitó las piedras y la plantó con vides escogidas; edificó una torre en medio de ella, y también le labró un lagar. Luego esperaba que produjera uvas, pero produjo uvas silvestres[a].
  rationale: Se ajusta la redacción para reflejar mejor חָצֵב con «le labró un lagar» y para mejorar la naturalidad referencial en español con «ella» para la viña. Se conserva «uvas silvestres» porque sigue la decisión auditada del POB, pero se mantiene la nota para resguardar el matiz léxico de fruto malo o inútil.
