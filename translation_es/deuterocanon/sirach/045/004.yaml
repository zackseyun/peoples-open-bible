translation:
  language: es
  text: En su fidelidad y humildad[a], lo eligió de entre toda carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «En su fe y mansedumbre, lo santificó; lo eligió de entre toda carne». El testimonio hebreo no incluye el verbo explícito «lo santificó» que aparece en el griego, y el griego también permite la traducción alternativa «fe» en lugar de «fidelidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πίστει / באמונתו
  english_pob_choice: in his faithfulness
  chosen_spanish: en su fidelidad
  alternatives_spanish:
  - en su fe
  - por su fidelidad
  lexicon: HALOT; LXX πίστις
  rationale: «Fidelidad» comunica mejor en español la cualidad moral y relacional que el contexto atribuye a Moisés. Mantiene el matiz de confiabilidad/constancia que el audit trail inglés prefirió para el hebreo, y sigue siendo compatible con el griego πίστει. «Fe» se conserva como alternativa porque el paralelo griego la admite, pero en esta línea laudatoria suena menos precisa que una virtud estable.
- source_word: καὶ πραΰτητι / ובענותו
  english_pob_choice: and humility
  chosen_spanish: y humildad
  alternatives_spanish:
  - y mansedumbre
  - y suavidad
  lexicon: HALOT; LSJ
  rationale: «Humildad» es la opción más natural y digna en español para עֲנָוָה / πραΰτης en un elogio de carácter. «Mansedumbre» es una alternativa válida, pero en este contexto puede sonar más pasiva o estrechamente devocional; «humildad» preserva mejor el valor ético general.
- source_word: ἐξελέξατο / בחר בו
  english_pob_choice: he chose him
  chosen_spanish: lo eligió
  alternatives_spanish:
  - lo escogió
  - lo seleccionó
  lexicon: LSJ; HALOT
  rationale: «Eligió» es el verbo más directo y natural en español para בחר / ἐξελέξατο. Evita un registro administrativo («seleccionó») y mantiene la acción personal y deliberada del sujeto.
- source_word: ἐκ πάσης σαρκός / מכל בשר
  english_pob_choice: from all flesh
  chosen_spanish: de entre toda carne
  alternatives_spanish:
  - de entre toda la humanidad
  - de entre todos los mortales
  lexicon: LSJ; HALOT
  rationale: Se conserva el giro bíblico «carne» para reflejar literalmente σαρκός / בשר y mantener la amplitud universal del hebreo y del griego. «De entre» hace más natural en español la idea de selección desde un conjunto, sin borrar el idiomatismo bíblico.
theological_decisions:
- issue: πίστις / אֱמוּנָה en una alabanza de Moisés
  english_pob_reading: faithfulness, with footnoted alternative faith
  chosen_spanish_reading: fidelidad, con la alternativa «fe» en nota
  alternative_spanish_readings:
  - fe
  - confianza
  rationale: El hebreo prioriza una cualidad de carácter y lealtad; por eso «fidelidad» es la base del texto. La tradición griega permite «fe», y conviene preservar esa tensión sin resolverla silenciosamente. La nota explica que ambas lecturas están sustentadas por los testigos y que la opción española responde al matiz laudatorio del contexto.
  doctrine_reference: 'DOCTRINE.md: contested terms for πίστις; preserve tension rather than flattening it.'
translation_notes:
  revision_awareness: Redacción revisada a partir del hebreo de Kahana y del paralelo griego de Swete. Se preservó la tensión entre «fe» y «fidelidad» en una nota, y no se incorporó «lo santificó» al texto principal porque el testimonio hebreo disponible no lo expresa explícitamente.
  spanish_consistency_notes:
  - Se mantuvo «carne» para reflejar el hebreo בשר y el griego σαρκός, evitando «humanidad» como paráfrasis interpretativa.
  - Se eligió «fidelidad» como equivalente principal de אֱמוּנָה / πίστις en este elogio de Moisés, conforme al valor ético del contexto.
  - El orden español sigue una sintaxis natural sin perder el paralelismo de virtudes y la acción divina de elección.
