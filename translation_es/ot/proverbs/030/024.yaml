translation:
  language: es
  text: 'Cuatro son pequeños en la tierra, pero son sumamente sabios[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente, «sabios, hechos sabios»: una expresión enfática que significa «muy sabios» o «sumamente sabios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה
  english_pob_choice: Four
  chosen_spanish: Cuatro
  alternatives_spanish:
  - Hay cuatro
  - Son cuatro
  lexicon: HALOT
  rationale: El hebreo abre con un numeral absoluto y conciso. «Cuatro» conserva ese estilo proverbial breve, sin añadir una cópula innecesaria.
- source_word: קְטַנֵּי אָרֶץ
  english_pob_choice: small on the earth
  chosen_spanish: pequeños en la tierra
  alternatives_spanish:
  - los más pequeños de la tierra
  - pequeños sobre la tierra
  - pequeños de la tierra
  lexicon: HALOT
  rationale: La construcción hebrea expresa pequeñez en relación con la tierra/land, no necesariamente el superlativo ni una especificación zoológica explícita. «Pequeños en la tierra» mantiene la amplitud semántica y evita adelantar «criaturas» sin base textual directa.
- source_word: וְהֵמָּה
  english_pob_choice: yet they
  chosen_spanish: y, sin embargo, son
  alternatives_spanish:
  - pero son
  - y ellos son
  lexicon: HALOT
  rationale: El hebreo usa una conjunción con pronombre independiente que introduce contraste enfático. En español, «y, sin embargo,» comunica mejor esa tensión que un simple «y».
- source_word: חֲכָמִים
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - expertos
  lexicon: HALOT
  rationale: En literatura sapiencial, חכם corresponde de manera natural a «sabio». Es la opción más fiel y también la más idiomática en español bíblico contemporáneo.
- source_word: מְחֻכָּמִים
  english_pob_choice: exceedingly wise
  chosen_spanish: sumamente sabios
  alternatives_spanish:
  - muy sabios
  - extraordinariamente sabios
  - sabios, hechos sabios
  lexicon: HALOT
  rationale: 'El Pual participa con fuerza intensificadora y el inglés audit trail lo entiende como duplicación enfática: «wise, made wise». En español, «sumamente sabios» preserva la intensificación sin sonar mecánico, y mantiene la tensión lexical de una sabiduría reiterada/intensificada.'
translation_notes:
  revision_awareness: El texto en inglés fue revisado y quedó sin cambios sustantivos en el pase más reciente; la versión española sigue de cerca la lectura auditada, especialmente en el paralelismo entre pequeñez y sabiduría intensificada.
  spanish_consistency_notes:
  - Se mantiene «sabios» para חכם en coherencia con la terminología sapiencial del libro.
  - «En la tierra» conserva la referencia amplia de ארץ sin forzar «criaturas» en el cuerpo del texto.
  - La puntuación con coma después de «Cuatro» y la pausa antes de «y, sin embargo» busca reflejar el giro retórico del hebreo.
