  to: 'Di: «Así dice el Señor Yahvé: ¿Prosperará? ¿No arrancará[a] sus raíces y cortará su fruto, de modo que se seque? Todas las hojas tiernas de su brote se secarán. Y no con un brazo fuerte[b] ni con mucha gente será levantada de sus raíces».


    [a] O “arrancará de raíz”; el verbo hebreo también puede enfatizar el desarraigar o arrancar por completo.

