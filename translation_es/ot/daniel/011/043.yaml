translation:
  language: es
  text: Y gobernará sobre los tesoros[a] de oro y de plata, y sobre todas las cosas preciosas de Egipto; y los libios y los cusitas[b] irán en su séquito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los tesoros de oro y de plata»; el hebreo puede sugerir también bienes guardados o escondidos.
    reason: lexical_alternative
  - marker: b
    text: O «los libios y los cusitas irán siguiendo sus pasos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁל
  english_pob_choice: And he will rule over
  chosen_spanish: Y dominará sobre
  alternatives_spanish:
  - Y gobernará sobre
  - Y tendrá dominio sobre
  lexicon: HALOT
  rationale: מָשַׁל expresa ejercer dominio o autoridad. «Dominará sobre» conserva el sentido de gobierno sin sonar rígido, y funciona bien con el marco profético del versículo.
- source_word: בְּמִכְמַנֵּי
  english_pob_choice: the treasures of
  chosen_spanish: los tesoros
  alternatives_spanish:
  - los tesoros ocultos
  - los depósitos escondidos
  lexicon: HALOT
  rationale: El contexto y la revisión inglesa favorecen «tesoros» como expresión natural y fiel. Aunque el hebreo puede implicar bienes guardados o escondidos, en español «tesoros» comunica adecuadamente el valor acumulado sin añadir una glosa innecesaria al texto principal.
- source_word: הַזָּהָב וְהַכֶּסֶף
  english_pob_choice: gold and silver
  chosen_spanish: de oro y de plata
  alternatives_spanish:
  - de oro y plata
  lexicon: HALOT
  rationale: Son términos materiales directos. La repetición de la preposición mantiene claridad y fluidez en español bíblico moderno.
- source_word: וּבְכֹל חֲמֻדוֹת מִצְרָיִם
  english_pob_choice: and over all the precious things of Egypt
  chosen_spanish: y sobre todas las cosas preciadas de Egipto
  alternatives_spanish:
  - y sobre todos los tesoros de Egipto
  - y sobre todas las cosas deseables de Egipto
  lexicon: HALOT
  rationale: חֲמֻדוֹת denota cosas deseables o valiosas. «Cosas preciadas» preserva esa amplitud mejor que limitarlo a «tesoros», y evita estrechar el término a un valor solo monetario.
- source_word: לֻבִים
  english_pob_choice: Libyans
  chosen_spanish: los libios
  alternatives_spanish:
  - los lubim
  lexicon: HALOT
  rationale: El etnónimo se entiende naturalmente como libios en español. Esto mantiene inteligibilidad sin perder el referente histórico-geográfico.
- source_word: כֻשִׁים
  english_pob_choice: Cushites
  chosen_spanish: los cusitas
  alternatives_spanish:
  - los etíopes
  lexicon: HALOT
  rationale: «Cusitas» preserva el término histórico-geográfico de Cus/Kush y evita trasladarlo de manera anacrónica a una identidad nacional moderna.
- source_word: בְּמִצְעָדָיו
  english_pob_choice: will be in his train
  chosen_spanish: irán en su séquito
  alternatives_spanish:
  - seguirán sus pasos
  - irán tras él
  lexicon: HALOT
  rationale: La imagen apunta a acompañamiento en marcha o cortejo. «Séquito» comunica bien la idea de ir con él como parte de su comitiva, y suena natural en español sin perder la metáfora de seguirlo.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «treasures» en lugar de «hidden stores» para מִכְמַנֵּי, y mantiene el resto del verso en línea con el audit trail de alta concordancia. En español se conserva esa decisión con «tesoros», mientras que se traduce con naturalidad «in his train» como «en su séquito».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «cusitas» para conservar el referente histórico de כּוּשׁ sin sustituirlo por una denominación moderna potencialmente imprecisa.
  - La puntuación coordina las dos proposiciones principales y conserva la progresión de dominio → posesión → acompañamiento.
