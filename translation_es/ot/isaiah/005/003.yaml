- from: Y ahora, habitante de Jerusalén y hombre de Judá[a], juzgad, por favor, entre mí y mi viña.
  to: Y ahora, habitante de Jerusalén y hombre de Judá[a], juzguen, por favor, entre mí y mi viña.
  rationale: Se cambia solo 'juzgad' por 'juzguen' para ajustarse al español neutral latinoamericano y mantener de forma natural el imperativo plural hebreo dirigido a una audiencia colectiva. Se conserva el singular representativo en el vocativo y su nota explicativa.
