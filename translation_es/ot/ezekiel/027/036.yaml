    text: Or 'whistle at you.' The Hebrew verb can denote whistling or hissing; here it conveys a reaction of astonishment or derision.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have become terrors' / 'an object of terror.' The Hebrew noun is plural in form but may function collectively.
    reason: lexical_alternative
