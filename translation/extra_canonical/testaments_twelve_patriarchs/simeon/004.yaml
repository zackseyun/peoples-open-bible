theological_decisions:
- issue: πνεῦμα θεοῦ in Joseph
  chosen_reading: the Spirit of God was in him
  alternative_readings:
  - a spirit of God was in him
  - God's spirit was in him
  rationale: The phrase in this ethical-narrative context most naturally denotes divine indwelling or empowerment rather than merely a disposition. Capitalization signals that reading while remaining faithful to the Greek wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Anthropological language ψυχή
  chosen_reading: soul
  alternative_readings:
  - life
  - self
  rationale: The chapter repeatedly uses ψυχή alongside body, mind, and spirit in a moral-psychological catalogue. Preserving 'soul' maintains the text's conceptual texture rather than flattening it into generic modern psychology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
