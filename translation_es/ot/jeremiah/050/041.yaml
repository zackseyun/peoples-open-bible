review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: anuncio de atención, venida desde el norte, distinción entre «pueblo» y «nación», pluralidad de reyes y procedencia desde regiones extremas. Sin embargo, dos elementos no preservan óptimamente el sentido ni la distribución de notas del expediente inglés: «¡Miren!» baja demasiado el registro frente a הִנֵּה / ''Behold'', y la nota [b] está anclada en «del norte» aunque su contenido corresponde a «desde las partes más remotas de la tierra». Además, «serán despertados» suena menos natural y menos militar que el sentido de movilización/arreglo pasivo de יֵעֹרוּ.'
  spanish_quality_summary: El español es mayormente claro, pero «¡Miren!» resulta coloquial para un oráculo profético; «He aquí» o «Miren» sin exclamación serían más sobrios, y aquí conviene «He aquí». «Una nación grande» es comprensible pero menos idiomático que «una gran nación». «Serán movilizados» comunica mejor el valor contextual que «serán despertados». También conviene corregir la colocación de la nota al sintagma pertinente.
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. Las decisiones «pueblo» para עַם y «nación» para גּוֹי están bien alineadas con la racionalidad documentada. La principal mejora léxica es representar יֵעֹרוּ como «serán movilizados» y mantener la alternativa «serán despertados / despertarán» en nota.
  issues:
  - severity: medium
    issue: Registro de הִנֵּה como «¡Miren!»
    rationale: Aunque posible, suena más coloquial que el tono profético elevado del hebreo y del POB inglés («Behold»). «He aquí» preserva mejor dignidad y atención discursiva.
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado
    rationale: El contenido de la nota [b] explica מִיַּרְכְּתֵי אָרֶץ («las partes más remotas/confines de la tierra»), no «del norte». Debe moverse al sintagma final.
  - severity: medium
    issue: «serán despertados» no expresa con suficiente naturalidad la movilización pasiva de יֵעֹרוּ
    rationale: En contexto militar/profético, el verbo apunta a ser incitados o movilizados para la acción. «Serán movilizados» comunica mejor el sentido principal en español natural.
  - severity: low
    issue: «una nación grande» es menos idiomático que «una gran nación»
    rationale: La posposición refleja el orden hebreo, pero en español bíblico natural la anteposición del adjetivo aquí suena mejor sin pérdida semántica.
  revised_spanish_text: He aquí[a], viene un pueblo del norte, y una gran nación y muchos reyes serán movilizados[b] desde las partes más remotas de la tierra.
  revised_footnotes:
