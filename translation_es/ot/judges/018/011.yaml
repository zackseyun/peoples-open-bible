translation:
  language: es
  text: Así partieron de allí seiscientos hombres del clan[a] de los danitas, de Zora y de Estaol, ceñidos[b] con armas de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "de la familia de los danitas"; el término hebreo se refiere a una subdivisión de parentesco dentro de la tribu, por eso "clan" expresa mejor el sentido aquí.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, "ceñidos con armas de guerra".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se pusieron en camino
  lexicon: HALOT
  rationale: El verbo narrativo expresa desplazamiento y salida de un lugar. En español, «salieron» es natural y fiel al movimiento de partida sin volverlo excesivamente literal o arcaico.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - desde allí
  lexicon: HALOT
  rationale: La referencia locativa es simple; «de allí» reproduce con claridad el deíctico del hebreo y fluye bien en español narrativo.
- source_word: מִמִּשְׁפַּחַת הַדָּנִי
  english_pob_choice: from the clan of the Danites
  chosen_spanish: de la familia de los danitas
  alternatives_spanish:
  - del clan de los danitas
  - de la tribu de Dan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede señalar una subdivisión de parentesco. En español, «familia» conserva esa idea sin imponer de manera obligatoria el tecnicismo «clan», aunque ese matiz queda indicado en la nota.
- source_word: מִצָּרְעָה וּמֵאֶשְׁתָּאֹל
  english_pob_choice: from Zorah and from Eshtaol
  chosen_spanish: de Zora y de Estaol
  alternatives_spanish:
  - desde Zora y desde Estaol
  - de Zorah y de Eshtaol
  lexicon: HALOT
  rationale: Son topónimos, por lo que se transliteran en español. Se conserva la repetición de la preposición para reflejar la estructura hebrea.
- source_word: שֵׁשׁ מֵא֣וֹת אִ֔ישׁ
  english_pob_choice: six hundred men
  chosen_spanish: seiscientos hombres
  alternatives_spanish:
  - seiscientos varones
  - seiscientas personas
  lexicon: HALOT
  rationale: Con un numeral, אִישׁ designa varones contados en un contexto militar. «Hombres» comunica de forma natural y precisa el grupo armado.
- source_word: חָגוּר
  english_pob_choice: armed
  chosen_spanish: ceñidos
  alternatives_spanish:
  - ceñidos con
  - armados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ceñido(s)». Mantener «ceñidos» preserva la imagen concreta del original; la frase siguiente aclara el equipamiento bélico.
- source_word: כְּלֵי מִלְחָמָה
  english_pob_choice: weapons of war
  chosen_spanish: armas de guerra
  alternatives_spanish:
  - armamento de guerra
  - armas para la guerra
  lexicon: HALOT
  rationale: En contexto militar, כְּלִי refiere al equipo o implementos bélicos. «Armas de guerra» es una equivalencia clara y digna que mantiene el sentido sin sonar forzada.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el consenso del audit trail inglés. La principal decisión interpretativa es conservar la imagen de «ceñidos» en vez de sustituirla por «armados» en el cuerpo del texto, trasladando la explicación al nivel de nota para no perder la tensión lexical del original.
  spanish_consistency_notes:
  - Se usa «danitas» para el etnónimo conforme al nombre tribal bíblico.
  - Se mantienen preposiciones repetidas ante cada topónimo para reflejar el paralelismo hebreo.
  - «Armas de guerra» conserva el valor militar amplio de כְּלֵי מִלְחָמָה sin reducirlo a armas de mano exclusivamente.
