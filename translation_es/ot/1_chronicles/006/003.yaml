  glossary_alignment: 'No intervienen términos teológicos del glosario principal. La principal cuestión de alineación es onomástica: «Coat» es una forma bíblica española estable y aceptable para קְהָת; «Amram», «Izhar» y «Uzziel» son adecuados. «Hebrón» debería ajustarse a «Hebron» para reflejar mejor que es antropónimo, no el topónimo castellanizado.'
