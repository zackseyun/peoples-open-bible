review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: queja colectiva de toda la comunidad de Israel contra Moisés y Aarón en el desierto. Sin embargo, hay un problema en la nota al pie: presenta «los hijos de Israel» como alternativa/tradicional cuando esa expresión ya está en el texto principal. Además, conviene alinear mejor la nota con el rastro inglés, que ofrece «los israelitas» y «tradicionalmente, los hijos de Israel» como alternativas al inglés principal, no al español ya elegido.'
  spanish_quality_summary: El español es claro y natural. «Murmuró», «congregación» y «contra» funcionan bien en registro bíblico moderno. «En el desierto» es aceptable y muy idiomático en español para מִדְבָּר, aunque el inglés POB use «wilderness». La única reparación necesaria es la formulación de la nota para evitar redundancia y confusión.
  glossary_alignment: No aparecen términos del glosario principal como Yahvé/Mesías. La decisión «los hijos de Israel» respeta la política de mantener la forma masculina del hebreo. «Murmuró» corresponde adecuadamente a וילונו. «Desierto» es una excepción contextual razonable frente a «wilderness», bien justificada para claridad idiomática en español.
  issues:
  - severity: medium
    issue: La nota al pie es internamente incoherente con el texto principal.
    rationale: El texto principal ya dice «los hijos de Israel[a]», pero la nota dice «O “los israelitas”; tradicionalmente, “los hijos de Israel”». Eso hace que una de las supuestas alternativas repita exactamente la lectura principal, creando confusión sobre qué está alternando la nota.
  - severity: low
    issue: La nota no reproduce con precisión la función de alternativa léxica del rastro inglés.
    rationale: El inglés principal usa «sons of Israel» y anota «Or ‘the Israelites’ or traditionally ‘the children of Israel.’». En español, si el texto principal ya conserva «los hijos de Israel», la nota debe señalar de manera limpia la alternativa legible «los israelitas», no reetiquetar como tradicional la misma forma ya escogida.
  revised_spanish_text: Y toda la congregación de los hijos de Israel[a] murmuró contra Moisés y contra Aarón en el desierto.
  revised_footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al criterio del POB de mantener «los hijos de Israel». Solo se corrige la nota al pie para que funcione realmente como alternativa léxica y no repita/confunda la lectura principal.
