translation:
  language: es
  text: Sin embargo, no me has invocado[a], Jacob, porque te has cansado de mí[b], Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me has llamado». El verbo hebreo puede traducirse simplemente «llamar», pero en contextos de oración o adoración suele significar «invocar» o «llamar a».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te has cansado conmigo». La preposición hebrea permite una alternativa cercana, aunque «de mí» es el sentido más natural en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: Yet ... not
  chosen_spanish: Sin embargo, no
  alternatives_spanish:
  - Y no
  - Pero no
  lexicon: HALOT
  rationale: La conjunción con negación introduce contraste con el contexto anterior. «Sin embargo» reproduce bien el giro adversativo en español natural sin perder la reprensión.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El marcador de objeto directo con pronombre de 1.ª persona singular se expresa naturalmente como «me» en español.
- source_word: קָרָאתָ
  english_pob_choice: have not called on
  chosen_spanish: has llamado
  alternatives_spanish:
  - has invocado
  - has clamado a
  lexicon: HALOT
  rationale: El verbo קרא puede significar «llamar» y, en contexto de relación con Dios, «llamar a/llamar en oración». En español, «llamar» conserva esa amplitud; la nota explica la posible lectura devocional sin forzar una paráfrasis.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: HALOT
  rationale: Nombre propio en vocativo, mantenido como «Jacob» para seguir la forma usual y el paralelismo con «Israel».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la acusación anterior; «porque» es la forma clara y natural en español.
- source_word: יָגַעְתָּ
  english_pob_choice: have grown weary
  chosen_spanish: te has cansado
  alternatives_spanish:
  - te has fatigado
  - has quedado hastiado
  lexicon: HALOT
  rationale: יָגַע expresa cansancio o agotamiento. «Te has cansado» es idiomático en español y conserva el matiz de desgaste.
- source_word: בִּי
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - conmigo
  - en mí
  lexicon: HALOT
  rationale: La preposición permite la idea de cansarse «de» alguien; «de mí» es la lectura más natural en este contexto. La alternativa «conmigo» quedaría más cercana a una construcción instrumental, menos probable aquí.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio usado como segundo vocativo para intensificar la reprensión al pueblo del pacto.
theological_decisions:
- issue: Alcance de קרא con Dios
  english_pob_reading: The verse rebukes Israel for failing to invoke God and for becoming weary in relation to him.
  chosen_spanish_reading: El verso reprende a Israel por no llamar a Dios y por cansarse de él.
  alternative_spanish_readings:
  - por no invocarlo
  - por no clamar a él
  rationale: La forma española «llamar» conserva la amplitud del verbo hebreo; en contexto de oración, la nota aclara la lectura de invocación. Así se mantiene la tensión lexical sin imponer un solo valor.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación de cansancio con Dios
  english_pob_reading: The verse means Israel did not call because God had become burdensome to them
  chosen_spanish_reading: Israel no se volvió a Dios porque se cansó de él.
  alternative_spanish_readings:
  - Israel no lo llamó porque él se volvió una carga
  - Israel lo llamó, pero Dios se cansó de ellos
  rationale: La sintaxis favorece tomar a Israel como sujeto de ambos verbos. «Cansarse de mí» preserva el juicio directo del texto sin convertir la frase en una explicación teológica más amplia que la del hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo de Isaías 43:22 y el auditorio inglés sin cambios sustanciales. Se mantiene la lectura adversativa y la doble dirección de la reprensión: falta de invocación y cansancio respecto de Yahvé.'
  spanish_consistency_notes:
  - Se conserva el paralelismo vocativo «Jacob ... Israel».
  - «Sin embargo» corresponde al giro adversativo de וְלֹא.
  - Se evita «SEÑOR» para respetar la política del proyecto sobre el nombre divino cuando no aparece explícitamente en este versículo.
  - La nota de «llamar» preserva la tensión entre llamado general e invocación cultual.
  - «De mí» refleja la relación marcada por בִּי sin añadir matiz doctrinal externo.
