translation:
  language: es
  text: Ellos enseñaron en Judá[a], y el libro de la ley de Yahvé estaba con ellos[c]; recorrieron todas las ciudades de Judá y enseñaron en medio del pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rollo de la ley de Yahvé». El término hebreo puede designar un documento escrito en forma de rollo.
    reason: lexical_alternative
  - marker: b
    text: O «y enseñaron al pueblo». El hebreo, más literalmente, dice «enseñaron en/entre el pueblo».
    reason: lexical_alternative
  - marker: c
    text: 'O «y el libro de la ley de Yahvé con ellos». El hebreo presenta una cláusula elíptica: «y con ellos (estaba) el libro...».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְלַמְּדוּ
  english_pob_choice: They taught
  chosen_spanish: enseñaron
  alternatives_spanish:
  - instruyeron
  - dieron enseñanza
  lexicon: HALOT
  rationale: El verbo piel de למד expresa enseñar o instruir. «Enseñaron» es natural en español y conserva el paralelo con el segundo uso del verbo en la misma versículo.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - por Judá
  - a través de Judá
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. En español, «en Judá» mantiene la simplicidad del original; el matiz distributivo lo aporta la cláusula posterior sobre recorrer las ciudades.
- source_word: וְעִמָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - y con ellos
  - junto con ellos
  lexicon: HALOT
  rationale: 'La frase expresa acompañamiento posesivo: el libro estaba con ellos mientras enseñaban. «Con ellos» es directo y fiel al hebreo.'
- source_word: סֵפֶר תּוֹרַת יְהוָה
  english_pob_choice: the Book of the Law of Yahweh
  chosen_spanish: el libro de la ley de Yahvé
  alternatives_spanish:
  - el rollo de la ley de Yahvé
  - el libro de la instrucción de Yahvé
  lexicon: HALOT
  rationale: סֵפֶר suele referirse a un libro o documento escrito; en este contexto, «libro» es el equivalente más transparente. תּוֹרָה aquí designa la ley/cuerpo normativo de la alianza, por lo que «ley» comunica mejor el alcance del término en español bíblico sin borrar su trasfondo de instrucción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma adoptada por el proyecto, en vez de sustituirlo por un título. «Yahvé» reproduce el criterio doctrinal indicado para el Tetragrámaton.
- source_word: וַיָּסֹבּוּ
  english_pob_choice: they went around
  chosen_spanish: recorrieron
  alternatives_spanish:
  - anduvieron por
  - fueron de un lugar a otro por
  lexicon: HALOT
  rationale: El verbo סבב en este contexto narrativo expresa moverse de un lugar a otro. «Recorrieron» transmite bien el desplazamiento itinerante sin sonar mecánico en español.
- source_word: בְּכָל עָרֵי יְהוּדָה
  english_pob_choice: through all the cities of Judah
  chosen_spanish: todas las ciudades de Judá
  alternatives_spanish:
  - por todas las ciudades de Judá
  - a través de todas las ciudades de Judá
  lexicon: HALOT
  rationale: Con el verbo de movimiento, la idea distributiva ya está implícita; en español puede expresarse de forma natural como «todas las ciudades de Judá». El matiz de recorrido se sostiene por «recorrieron».
- source_word: וַיְלַמְּדוּ בָּעָם
  english_pob_choice: and taught among the people
  chosen_spanish: y enseñaron al pueblo
  alternatives_spanish:
  - y enseñaron entre el pueblo
  - y enseñaron entre la gente
  lexicon: HALOT
  rationale: El hebreo usa ב con עָם, que puede indicar presencia dentro del grupo; sin embargo, en español bíblico y contemporáneo «enseñaron al pueblo» comunica con claridad la acción educativa sin forzar una construcción extraña. La alternativa «entre el pueblo» preservaría más literalmente el matiz preposicional, pero suena menos idiomática.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton directamente. Siguiendo la norma del proyecto, se mantiene el nombre propio divino como «Yahvé», evitando la sustitución por un título y preservando el valor covenantal del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de תּוֹרָה en la expresión 'Book of the Law'
  english_pob_reading: the Book of the Law of Yahweh
  chosen_spanish_reading: el libro de la ley de Yahvé
  alternative_spanish_readings:
  - el libro de la instrucción de Yahvé
  - el rollo de la ley de Yahvé
  rationale: Aunque תּוֹרָה puede significar 'instrucción', en esta fórmula fija con 'libro' el sentido jurídico-covenantal domina. «Ley» refleja ese alcance mejor que una traducción más general, sin negar el trasfondo de enseñanza.
  doctrine_reference: 'DOCTRINE.md: terms of Torah / Law in covenant context'
- issue: Valor de la preposición בָּעָם
  english_pob_reading: taught among the people
  chosen_spanish_reading: enseñaron al pueblo
  alternative_spanish_readings:
  - enseñaron entre el pueblo
  - enseñaron en medio del pueblo
  rationale: El hebreo puede leerse como actividad ejercida dentro del grupo. En español, la frase directa «al pueblo» es la más clara y natural; el posible matiz locativo queda suficientemente cubierto por el verbo de recorrido y el contexto de ciudades.
  doctrine_reference: 'DOCTRINE.md: preserve prepositional force when possible, but prioritize intelligible equivalence'
translation_notes:
  revision_awareness: Se revisó el antecedente inglés de 'with the Book of the Law of the LORD with them' a la forma más natural 'and the Book of the Law of the LORD was with them'. Para el español, la sintaxis elíptica hebrea se conserva de manera idiomática como 'el libro de la ley de Yahvé estaba con ellos', evitando duplicación innecesaria y reflejando la relación de acompañamiento.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se prefirió 'ley' en 'libro de la ley' por el valor normativo del contexto, sin perder el trasfondo de instrucción.
  - '''Enseñaron'' se usó en ambos casos de למד para conservar la repetición verbal del hebreo.'
  - La primera cláusula se tradujo con 'en Judá' y la segunda con 'recorrieron... todas las ciudades de Judá' para preservar el contraste entre ubicación general y recorrido distributivo.
