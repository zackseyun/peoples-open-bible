    rationale: Esto rompe la fidelidad y la legibilidad en la lengua meta. מִקְנֵה צֹאן debe verterse en español como «rebaños» o equivalente.
  - severity: medium
    issue: «rebaños» para וּמִקְנֵה בָקָר es menos preciso en este contexto.
    rationale: Aunque puede funcionar como colectivo, el hebreo especifica ganado bovino; «ganado vacuno» comunica mejor la distinción frente a צֹאן.
  - severity: low
    issue: La nota [a] en el inglés POB trata de una alternativa de «envied him / were jealous of him», pero el borrador español trasladó notas léxicas a otros términos.
    rationale: No es obligatorio replicar exactamente la misma distribución si el español requiere otras aclaraciones, pero conviene conservar al menos la alternativa relevante de קנא cuando el inglés la preservó.
