translation:
  language: es
  text: y que toda la tierra que posean[a] les quede exenta de tributo; y que los caldeos dejen las aldeas de los judíos que ocupan;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la tierra que poseen quede exenta de tributo».
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - región
  - país
  lexicon: LSJ
  rationale: En este contexto administrativo y fiscal, χώρα abarca la tierra o extensión controlada. «Tierra» es natural en español y no restringe indebidamente a una unidad política moderna.
- source_word: κρατήσουσιν
  english_pob_choice: they hold
  chosen_spanish: posean
  alternatives_spanish:
  - posean y controlen
  - tengan
  - mantengan
  lexicon: LSJ
  rationale: El verbo expresa posesión/control efectivo. «Posean» conserva la idea de tenencia sin sugerir necesariamente conquista ilegal, y funciona bien en la cláusula relativa.
- source_word: ἀφορολόγητον
  english_pob_choice: tax-free
  chosen_spanish: exenta de tributo
  alternatives_spanish:
  - libre de impuestos
  - sin tributo
  - exenta de impuestos
  lexicon: LSJ
  rationale: El griego denota exención fiscal o de tributo. En español, «tributo» conserva mejor el matiz antiguo-administrativo que solo «impuestos», y mantiene la amplitud del término.
- source_word: ὑπάρχειν
  english_pob_choice: should be
  chosen_spanish: les quede
  alternatives_spanish:
  - sea
  - deba ser
  - permanezca
  lexicon: LSJ
  rationale: La construcción decretal pide una formulación natural en español. «Les quede» comunica el estado legal resultante de la exención sin endurecer el giro con un calco.
- source_word: Χαλδαῖοι
  english_pob_choice: Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: LSJ
  rationale: El texto griego nombra explícitamente a los Χαλδαῖοι. «Caldeos» es la correspondencia directa y debe conservarse frente a una ampliación interpretativa como «babilonios».
- source_word: ἀφίουσι
  english_pob_choice: should leave
  chosen_spanish: dejen
  alternatives_spanish:
  - abandonen
  - suelten
  - cedan
  lexicon: LSJ
  rationale: Aquí ἀφίημι significa retirarse de la posesión o dejar libre un lugar. «Dejen» es la opción más clara y no añade fuerza indebida.
- source_word: κώμας
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - villas
  - pueblos
  - caseríos
  lexicon: LSJ
  rationale: κώμη designa una aldea o asentamiento rural. «Aldeas» es fiel y evita la posible sobrerrestricción de «pueblos» en español contemporáneo.
- source_word: διακρατοῦσιν
  english_pob_choice: they occupy
  chosen_spanish: ocupan
  alternatives_spanish:
  - mantienen ocupadas
  - tienen ocupadas
  - controlan
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de retener/ocupar por la fuerza o de hecho. «Ocupan» preserva ese valor y encaja con la relación entre los caldeos y las aldeas de los judíos.
translation_notes:
  revision_awareness: He seguido de cerca el texto griego de Swete y el audit trail inglés, manteniendo la estructura decretal y la doble petición coordinada. La principal decisión interpretativa fue renderizar ἀφορολόγητον como una exención de tributo en español, conservando el matiz fiscal y administrativo del original. También preferí «aldeas» para κώμας y «ocupan» para διακρατοῦσιν para reflejar la ocupación continua indicada por el griego.
  spanish_consistency_notes:
  - Se mantuvo «caldeos» para Χαλδαῖοι por fidelidad directa al griego.
  - Se eligió «tributo» como término amplio y administrativamente neutro para ἀφορολόγητον, en armonía con el contexto persa/helenístico.
  - La formulación «les quede exenta» traduce el valor jurídico del infinitivo ὑπάρχειν en una construcción natural para español.
  - No se introdujo terminología eclesiástica ni interpretaciones históricas adicionales que el griego no exija.
