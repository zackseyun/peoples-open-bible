translation:
  language: es
  text: Y ahora, nuestro Dios, te damos gracias y alabamos el nombre de tu gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La partícula temporal-discursiva introduce la respuesta inmediata en la oración. «Y ahora» conserva mejor el valor conjuntivo del waw que un simple «Ahora», a la vez que suena natural en español.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Oh, nuestro Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona plural indica posesión relacional. «Nuestro Dios» expresa el vocativo implícito sin añadir una partícula devocional que el hebreo no exige.
- source_word: מוֹדִים אֲנַחְנוּ לָךְ
  english_pob_choice: we give thanks to you
  chosen_spanish: te damos gracias
  alternatives_spanish:
  - te agradecemos
  - te confesamos
  lexicon: HALOT
  rationale: La forma hifil de ידה en contexto de adoración se entiende bien como acción de gracias. «Te damos gracias» preserva el sentido de gratitud cultual y la relación directa del dativo pronominal.
- source_word: וּמְהַלְלִים
  english_pob_choice: and praise
  chosen_spanish: y alabamos
  alternatives_spanish:
  - y te alabamos
  - y extollamos
  lexicon: HALOT
  rationale: הלל en este contexto expresa alabanza. «Alabamos» mantiene el paralelismo con «damos gracias» sin volver la frase demasiado literal o rígida; el sujeto implícito de la oración ya está claro por la primera persona plural.
- source_word: לְשֵׁם
  english_pob_choice: your ... name
  chosen_spanish: el nombre de
  alternatives_spanish:
  - a tu nombre
  - por el nombre de
  lexicon: HALOT
  rationale: 'La construcción con לְשֵׁם en fórmulas de alabanza se vierte de manera idiomática en español como objeto de la acción: «el nombre de». Esto conserva la estructura del hebreo sin forzar un calco poco natural.'
- source_word: תִּפְאַרְתֶּךָ
  english_pob_choice: the name of your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu esplendor
  - tu hermosura
  lexicon: HALOT
  rationale: El sustantivo puede abarcar gloria, esplendor y belleza majestuosa. En español, «tu gloria» comunica la fuerza semántica con claridad; al colocarlo dentro de «el nombre de tu gloria» se refleja la construcción hebrea sin introducir un adjetivo interpretativo.
theological_decisions:
- issue: Relación entre «nombre» y la gloria de Dios
  english_pob_reading: praise the name of your glory
  chosen_spanish_reading: alabamos el nombre de tu gloria
  alternative_spanish_readings:
  - alabamos tu glorioso nombre
  - alabamos el nombre de tu esplendor
  rationale: Se conserva el lenguaje bíblico del «nombre», que no es meramente una etiqueta sino la manifestación de la reputación y honra reveladas de Dios. «El nombre de tu gloria» mantiene esa densidad sin convertirlo en una simple paráfrasis devocional.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Tratamiento del discurso de oración sin arcaísmo litúrgico
  english_pob_reading: our God
  chosen_spanish_reading: nuestro Dios
  alternative_spanish_readings:
  - oh, nuestro Dios
  rationale: El texto es oración, pero el hebreo no exige añadir un vocativo arcaico. «Nuestro Dios» conserva la cercanía reverente de la invocación con español actual y claro.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió una forma más cercana a la construcción hebrea literal ('the name of your glory') en lugar de una paráfrasis adjetival ('your glorious name'). La versión española sigue esa misma dirección al optar por 'el nombre de tu gloria'.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el hebreo aquí usa אֱלֹהֵינוּ y no el tetragrámaton.
  - Se conserva un registro reverente y contemporáneo, apropiado para lectura eclesial amplia.
  - La primera persona plural explícita queda bien representada por «damos gracias» y «alabamos», con sujeto elíptico natural en español.
