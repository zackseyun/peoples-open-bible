    reason: lexical_alternative
  - marker: b
    text: O «languidecerán».
    reason: lexical_alternative
  revision_rationale: Se reemplazó «se entristecerán» por «harán duelo» para reflejar con más fidelidad el valor de אבל como duelo/luto. Se ajustó «languidecerán» a «se consumirán» para dar una representación principal más fuerte y natural del hebreo אֻמְלָלוּ, manteniendo «languidecerán» como alternativa en nota según la auditoría inglesa.
