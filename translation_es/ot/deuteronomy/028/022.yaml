    text: O «consunción» para la idea de «enfermedad consumidora»; el hebreo denota una dolencia debilitante que va consumiendo a la persona.
    reason: lexical_alternative
  - marker: b
    text: O «y estas te perseguirán»; el verbo hebreo está en plural y se refiere a las calamidades enumeradas antes.
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación obligatoria del marcador de nota, y se refuerza חַרְחֻר con «calor abrasador», que preserva mejor la fuerza del hebreo y del audit trail inglés («burning heat»). Se mantiene «tizón y añublo» como pareja agrícola válida y de tono bíblico legible.
