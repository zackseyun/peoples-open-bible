translation:
  language: es
  text: Entonces el rey se puso de pie en su lugar e hizo el pacto delante de Yahvé, para andar tras Yahvé y guardar sus mandamientos, sus testimonios y sus estatutos, con todo su corazón y con toda su alma, para cumplir las palabras del pacto que estaban escritas en este libro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más históricamente, «en este rollo». El término hebreo puede referirse a un documento escrito en forma de rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד הַמֶּלֶךְ עַל עָמְדוֹ
  english_pob_choice: Then the king stood in his place
  chosen_spanish: Entonces el rey se puso en su lugar
  alternatives_spanish:
  - Entonces el rey estuvo de pie en su puesto
  - Entonces el rey tomó su puesto
  lexicon: HALOT
  rationale: עמד expresa estar de pie; la frase idiomática עַל עָמְדוֹ se entiende como estar en su puesto o lugar designado. ‘Se puso en su lugar’ conserva la idea idiomática sin forzar una descripción demasiado técnica o ceremonial.
- source_word: וַיִּכְרֹת אֶת־הַבְּרִית
  english_pob_choice: made the covenant
  chosen_spanish: hizo el pacto
  alternatives_spanish:
  - selló el pacto
  - concertó el pacto
  - cortó el pacto
  lexicon: HALOT
  rationale: כרת ברית es el giro convencional para ‘hacer/contraer un pacto’. ‘Hizo el pacto’ es natural en español y conserva el acto solemne. ‘Cortó’ preserva más literalmente la metáfora hebrea, pero suena menos natural aquí.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La fórmula marca una acción solemne en la presencia divina. Se mantiene ‘Yahvé’ por la convención del proyecto para el nombre divino.
- source_word: לָלֶכֶת אַחֲרֵי יְהוָה
  english_pob_choice: to walk after Yahweh
  chosen_spanish: para andar tras Yahvé
  alternatives_spanish:
  - para seguir a Yahvé
  - para caminar detrás de Yahvé
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de ‘andar tras’ para mantener la metáfora de fidelidad y seguimiento pactal, que tiene resonancia deuteronómica.
- source_word: וְלִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: y guardar
  alternatives_spanish:
  - y observar
  - y custodiar
  lexicon: HALOT
  rationale: En contexto legal-pactual, שמר es ‘guardar/observar’. ‘Guardar’ es el equivalente español más asentado y mantiene el sentido de obediencia.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: מִצְוָה designa obligaciones mandadas. ‘Mandamientos’ conserva el registro pactal y legal.
- source_word: עֵדְוֺתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus preceptos-testimonio
  - sus estipulaciones testimoniales
  lexicon: HALOT
  rationale: Se conserva ‘testimonios’ para reflejar la terminología específica del texto y no nivelar el término con los otros dos miembros del trío legal.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus preceptos
  lexicon: HALOT
  rationale: חֻקִּים son disposiciones fijadas. ‘Estatutos’ es la equivalencia española tradicional y precisa en contextos legales.
- source_word: בְּכָל לְבָבוֹ וּבְכָל נַפְשׁוֹ
  english_pob_choice: with all his heart and with all his soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - con todo su corazón y con todo su ser
  - con todo su corazón y con toda su vida
  lexicon: HALOT
  rationale: Se preserva la fórmula covenantal y deuteronómica con ‘corazón’ y ‘alma’, evitando una paráfrasis que borraría su peso intertextual.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to carry out
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para hacer
  - para llevar a cabo
  lexicon: HALOT
  rationale: Aquí עשה rige ‘las palabras del pacto’ en el sentido de obedecerlas/ejecutarlas. ‘Cumplir’ comunica bien esa realización obediente en español.
- source_word: דִּבְרֵי הַבְּרִית
  english_pob_choice: the words of the covenant
  chosen_spanish: las palabras del pacto
  alternatives_spanish:
  - los términos del pacto
  - las estipulaciones del pacto
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente ‘palabras del pacto’. Se conserva esa forma para no sustituirla por una interpretación más técnica que el texto no exige.
- source_word: הַכְּתוּבִים עַל הַסֵּפֶר הַזֶּה
  english_pob_choice: that were written in this book
  chosen_spanish: las cuales estaban escritas en este libro
  alternatives_spanish:
  - escritas en este rollo
  - escritas en este libro/rollo
  lexicon: HALOT
  rationale: Se mantiene ‘libro’ como en la lectura principal inglesa, aunque el término hebreo puede abarcar un documento enrollado. La relativa ‘las cuales’ conserva la referencia al contenido escrito.
theological_decisions:
- issue: Render the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El nombre divino aparece explícitamente en el hebreo. En la política terminológica del proyecto, se vierte como ‘Yahvé’ en vez de ocultarlo con una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Mantener la metáfora de lealtad pactal en לָלֶכֶת אַחֲרֵי יְהוָה
  english_pob_reading: to walk after Yahweh
  chosen_spanish_reading: para andar tras Yahvé
  alternative_spanish_readings:
  - para seguir a Yahvé
  - para vivir siguiendo a Yahvé
  rationale: La metáfora de ‘andar tras’ conserva la textura pactal y de seguimiento fiel, sin reducirla a una mera adhesión abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el expediente auditado en inglés. Se conserva la estructura paralela de acciones y el trío legal ‘mandamientos, testimonios y estatutos’; se mantiene el nombre divino como Yahvé y la imagen covenantal de ‘andar tras’. No se introdujeron revisiones mayores respecto al sentido acordado en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para יְהוָה.
  - 'Se preservó la triada legal con términos diferenciados: mandamientos / testimonios / estatutos.'
  - Se mantuvo el paralelismo verbal con ‘para’ y las series coordinadas del hebreo.
  - Se evitó ‘Cristo’, ‘SEÑOR’ y otras sustituciones no presentes en el hebreo ni requeridas por el contexto.
  - Se conservó ‘libro’ en el texto principal y se indicó en nota la alternativa ‘rollo’ por el valor documental de ספר.
