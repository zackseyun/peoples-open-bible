review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ἔγνω como adquisición de noticia («se enteró»), αὐτὸς como énfasis («él mismo»), πᾶν τὸ στράτευμα αὐτοῦ como totalidad del contingente, y πέραν τοῦ Ἰορδάνη como movimiento «al otro lado del Jordán». Sin embargo, τῇ ἡμέρᾳ τῶν σαββάτων no debe mantenerse en el texto principal con el calco «en el día de los sábados»; el propio rastro POB inglés documenta que es un modismo que debe expresarse como «en el día de reposo / en sábado / en el día de sábado», con la literalidad reservada a nota.'
  spanish_quality_summary: 'La frase principal es mayormente clara, pero «en el día de los sábados» suena antinatural y poco legible en español eclesial general. Además, con sujeto compuesto («él mismo y todo su ejército»), el verbo final debe ir en plural: «vinieron» o «fueron», no «pasó». También «vino al otro lado del Jordán» reproduce mejor ἦλθεν que «pasó», que introduce un matiz no explicitado por el verbo principal.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas clave son adecuadas salvo la de τῇ ἡμέρᾳ τῶν σαββάτων, donde debe priorizarse la claridad española del modismo en el texto principal y dejar la forma literal en nota. «Bacquides» es una forma española aceptable para Βακχίδης.
  issues:
  - severity: high
    issue: Calco antinatural de τῇ ἡμέρᾳ τῶν σαββάτων como «en el día de los sábados» en el texto principal
    rationale: El griego usa un modismo con plural idiomático para el sábado singular. El inglés POB ya lo resolvió como sentido, no como literalidad principal. En español, el calco resulta torpe y oscurece el sentido.
  - severity: high
    issue: Discordancia verbal en «él mismo y todo su ejército pasó»
    rationale: El sujeto coordinado exige verbo en plural en español. La construcción actual es gramaticalmente incorrecta.
  - severity: medium
    issue: «Pasó» no reproduce tan bien ἦλθεν como «vino/fue/llegó»
    rationale: El verbo griego es «vino/llegó», mientras que el cruce del río queda expresado por πέραν. «Pasó» desplaza parte del sentido al verbo español y puede sonar más interpretativo.
  revised_spanish_text: Y Bacquides se enteró de ello el día de reposo[a], y él mismo y todo su ejército vinieron al otro lado del Jordán[b].
  revised_footnotes:
  - marker: a
    text: La expresión griega dice literalmente «en el día de los sábados», un giro idiomático que aquí significa «el día de reposo» o «el sábado».
    reason: lexical_alternative
  - marker: b
    text: El griego πέραν τοῦ Ἰορδάνη puede significar «al otro lado del Jordán» o «más allá del Jordán»; aquí se opta por la primera opción por ser más neutral y natural en español.
    reason: alternative_reading
  revision_rationale: Se corrige el modismo sabático para que el texto principal exprese el sentido natural en español, dejando la literalidad griega en nota. También se corrige la concordancia verbal del sujeto compuesto y se sustituye «pasó» por «vinieron» para reflejar mejor ἦλθεν, manteniendo «al otro lado del Jordán» según la decisión auditada en inglés.
