revisions:
- from: Y los hijos de Israel hicieron así, tal como Josué había mandado, y tomaron doce piedras[a] de en medio del Jordán[b], tal como Yahvé había hablado a Josué, según el número de las tribus de los hijos de Israel; y las llevaron con ellos al lugar de alojamiento[c] y las dejaron allí.
  to: Y los hijos de Israel hicieron así, tal como Josué había mandado, y cargaron doce piedras de en medio del Jordán[a], tal como Yahvé había hablado a Josué, según el número de las tribus de los hijos de Israel; y las llevaron con ellos al lugar de alojamiento[b] y las pusieron allí.
  rationale: Se elimina la nota espuria sobre «doce piedras». Se cambia «tomaron» por «cargaron» para reflejar mejor וַיִּשְׂאוּ y el audit trail inglés. Se cambia «las dejaron allí» por «las pusieron allí» para representar con más precisión la acción de depositar las piedras. Se conservan «Yahvé», «los hijos de Israel» y «lugar de alojamiento» por fidelidad al proyecto y al hebreo.
  reviewer_model: gpt-5.4
