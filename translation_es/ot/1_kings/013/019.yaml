translation:
  language: es
  text: Así que volvió con él y comió pan en su casa y bebió agua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «comió pan», una expresión que puede significar tomar una comida; se conserva la formulación más literal porque «pan» y «agua» son temáticamente importantes en el relato circundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: went back
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio media vuelta y volvió
  lexicon: HALOT
  rationale: שׁוּב expresa volver o regresar en una acción narrativa completada. «Volvió» es natural y fiel, y conserva el movimiento de retorno sin añadir matices innecesarios.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañándolo
  lexicon: HALOT
  rationale: La preposición con sufijo de tercera persona masculina singular se rinde de forma directa como «con él».
- source_word: וַיֹּאכַל לֶחֶם
  english_pob_choice: ate bread
  chosen_spanish: comió pan
  alternatives_spanish:
  - comió un pan
  - tomó pan
  lexicon: HALOT
  rationale: El hebreo dice literalmente «comió pan». En español, «comió pan» conserva la concreción léxica y el eco temático de la prohibición narrativa, sin forzar una paráfrasis general como «comió una comida».
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su vivienda
  lexicon: HALOT
  rationale: La expresión es locativa y simple; «en su casa» es clara, natural y corresponde al hebreo sin ampliarlo.
- source_word: וַיֵּשְׁתְּ מָיִם
  english_pob_choice: drank water
  chosen_spanish: bebió agua
  alternatives_spanish:
  - tomó agua
  - bebió del agua
  lexicon: HALOT
  rationale: La frase verbal se traduce de forma directa. Mantener «agua» preserva la repetición concreta del elemento mencionado en el relato, como hizo la traducción inglesa al retener la materialidad de «water».
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo y con el razonamiento auditado en inglés: se mantiene la literalidad concreta de «pan» y «agua», sin cambiar a una paráfrasis general, y no se detectan revisiones textuales relevantes en la fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se conserva un español claro y digno, evitando calcos innecesarios.
  - La puntuación sigue el flujo narrativo del hebreo con comas coordinadas.
