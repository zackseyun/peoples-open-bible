translation:
  language: es
  text: Y el rey ordenó a Mardoqueo servir en la corte[a], y le dio regalos por causa de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en palacio». El griego dice literalmente «en la corte», refiriéndose al servicio dentro del ámbito real o del recinto palaciego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: ἐπέταξεν expresa una orden con autoridad real. «Ordenó» reproduce bien ese valor directivo en español moderno y mantiene un tono natural y sobrio; «mandó» es posible, pero puede sonar más coloquial o más duro según el contexto.
- source_word: θεραπεύειν
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - atender
  - ministeriar
  lexicon: LSJ
  rationale: En el contexto de la corte, θεραπεύειν se refiere a prestar servicio o asistencia. «Servir» conserva el sentido amplio sin introducir un matiz religioso que «ministeriar» sí tendría; «atender» puede ser demasiado estrecho.
- source_word: ἐν τῇ αὐλῇ
  english_pob_choice: in the court
  chosen_spanish: en la corte
  alternatives_spanish:
  - en el palacio
  - ante la corte
  lexicon: LSJ
  rationale: αὐλή puede significar corte, patio o recinto palaciego. Aquí el contexto apunta al ámbito real de servicio, y «en la corte» preserva el sentido locativo con naturalidad en español. La nota explica la alternativa más literal «en la corte» frente a «en palacio» como interpretación más amplia.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - presentes
  - recompensas
  lexicon: LSJ
  rationale: δόματα significa dones o regalos. «Dones» mantiene la neutralidad del sustantivo y encaja con un registro bíblico digno; «recompensas» explicitaría una motivación que el sustantivo por sí mismo no exige.
- source_word: περὶ τούτων
  english_pob_choice: on account of these things
  chosen_spanish: por causa de estas cosas
  alternatives_spanish:
  - a causa de esto
  - por estas cosas
  - con respecto a estas cosas
  lexicon: BDAG
  rationale: La frase señala motivo u ocasión. «Por causa de estas cosas» conserva el plural del demostrativo y refleja la relación causal de manera bastante literal, sin forzar un sentido más interpretativo.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete (LXX 1909) y coincide con la línea de la POB en inglés: verbo de autoridad para ἐπέταξεν, servicio para θεραπεύειν, locativo de corte para αὐλή, y una expresión causal para περὶ τούτων. Se conserva la relación entre el nombramiento y los dones sin añadir contenido que no esté en el griego.'
  spanish_consistency_notes:
  - Se prefirió «corte» para αὐλή por coherencia con el contexto regio y con la nota alternativa, evitando «ministeriar» u otras formas con carga eclesiástica.
  - «Dones» mantiene la simetría con el inglés POB «gifts» y permite una lectura más literal que «recompensas».
  - «Por causa de estas cosas» refleja el valor causal de περὶ τούτων y preserva el plural del demostrativo.
