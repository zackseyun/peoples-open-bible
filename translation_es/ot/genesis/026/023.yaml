lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  lexicon: HALOT
  rationale: עלה en contexto narrativo de desplazamiento puede conservar el matiz direccional de ‘subir’ sin forzar una paráfrasis; en español, ‘subió’ mantiene la idiomaticidad y la posible noción de elevación indicada por el audit trail en inglés.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: La expresión adverbial señala salida del lugar anterior; ‘desde allí’ es natural en español y reproduce con claridad la referencia deíctica.
- source_word: בְּאֵר שָׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beerseba
  - Beer-Seba
  lexicon: HALOT
  rationale: Se trata de un topónimo, por lo que se translitera. ‘Beerseba’ es la forma usual y legible en español bíblico contemporáneo.
