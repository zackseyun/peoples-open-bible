translation:
  language: es
  text: Y he aquí[a], ellos nos están pagando así al venir a expulsarnos de tu posesión, que tú nos diste como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y mira». El hebreo introduce una apelación enfática de atención; «he aquí» preserva mejor el registro solemne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y behold
  lexicon: HALOT
  rationale: La expresión introduce un giro de atención enfática. «Y he aquí» conserva el tono solemne y exhortativo del hebreo sin caer en un calco poco natural en español.
- source_word: הֵם
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - esos
  lexicon: HALOT
  rationale: Se mantiene el pronombre independiente para conservar el énfasis sobre los agresores en la queja de Josafat.
- source_word: גֹּמְלִים עָלֵינוּ
  english_pob_choice: are repaying us
  chosen_spanish: nos están pagando
  alternatives_spanish:
  - nos están retribuyendo
  - nos están recompensando
  - nos están haciendo pagar
  lexicon: HALOT
  rationale: El verbo expresa retribución o devolución de trato. «Nos están pagando» reproduce la idea de reciprocidad irónica en un español natural; el contexto deja claro que es un pago hostil, no benévolo.
- source_word: לָבוֹא
  english_pob_choice: by coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - al venir
  - por venir
  - cuando vienen
  lexicon: HALOT
  rationale: El infinitivo indica el medio por el cual se produce esa retribución. «Viniendo» funciona como complemento de medio en español y conserva la relación con lo anterior.
- source_word: לְגָרְשֵׁנוּ
  english_pob_choice: to drive us out
  chosen_spanish: a expulsarnos
  alternatives_spanish:
  - a echarnos
  - a desterrarnos
  - a sacarnos
  lexicon: HALOT
  rationale: «Expulsar» transmite con fuerza el verbo de echar fuera en un contexto territorial y militar. Se prefiere una forma directa y clara para el lector moderno.
- source_word: מִיְּרֻשָּׁתְךָ
  english_pob_choice: of your possession
  chosen_spanish: de tu posesión
  alternatives_spanish:
  - de tu herencia
  - de tu heredad
  - de tu posesión heredada
  lexicon: HALOT
  rationale: «Posesión» preserva la distinción entre la pertenencia última de la tierra a Dios y el hecho de que fue otorgada a Israel. «Herencia» queda reservada para la cláusula siguiente, donde aparece explícitamente la idea de heredar.
- source_word: אֲשֶׁר הֽוֹרַשְׁתָּנוּ
  english_pob_choice: which you gave us as an inheritance
  chosen_spanish: que tú nos diste como herencia
  alternatives_spanish:
  - que tú nos hiciste heredar
  - que tú nos hiciste poseer
  - que tú nos concediste como herencia
  lexicon: HALOT
  rationale: El hiphil de ירש tiene la fuerza de hacer heredar o hacer poseer. «Nos diste como herencia» comunica bien el sentido teológico y evita una formulación demasiado técnica.
theological_decisions:
- issue: Distinción entre la posesión de Dios y la herencia de Israel
  english_pob_reading: of your possession, which you gave us as an inheritance
  chosen_spanish_reading: de tu posesión, que tú nos diste como herencia
  alternative_spanish_readings:
  - de tu herencia, que tú nos hiciste heredar
  - de tu posesión, que nos hiciste poseer
  rationale: 'La redacción conserva dos ideas distintas: la tierra pertenece en último término a Dios («tu posesión») y, a la vez, fue concedida a Israel como herencia. No se fusionan ambos términos en una sola noción para no borrar esa tensión textual.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión inglesa movió «And look» a «And behold» por registro más formal; el español sigue esa misma decisión estilística con «Y he aquí», manteniendo la fuerza enfática y el tono elevado del texto final.
  spanish_consistency_notes:
  - Se mantiene «posesión» para מִיְּרֻשָּׁתְךָ y «herencia» para la cláusula de הוֹרַשְׁתָּנוּ, preservando la distinción semántica.
  - Se usa «expulsar» para גרש por su valor directo en contexto territorial.
  - La nota textual/lexical está anclada con [a] en el texto principal, sin notas sin anclaje.
