  text: כִּ֩י עָשֹׂ֨ה נַעֲשֶׂ֜ה אֶֽת כָּל הַ/דָּבָ֣ר אֲשֶׁר יָצָ֣א מִ/פִּ֗י/נוּ לְ/קַטֵּ֞ר לִ/מְלֶ֣כֶת הַ/שָּׁמַיִם֮ וְ/הַסֵּֽיךְ לָ֣/הּ נְסָכִים֒ כַּ/אֲשֶׁ֨ר עָשִׂ֜ינוּ אֲנַ֤חְנוּ וַ/אֲבֹתֵ֨י/נוּ֙ מְלָכֵ֣י/נוּ וְ/שָׂרֵ֔י/נוּ בְּ/עָרֵ֣י יְהוּדָ֔ה וּ/בְ/חֻצ֖וֹת יְרוּשָׁלִָ֑ם וַ/נִּֽשְׂבַּֽע לֶ֨חֶם֙ וַ/נִּֽהְיֶ֣ה טוֹבִ֔ים וְ/רָעָ֖ה לֹ֥א רָאִֽינוּ־־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/017.yaml
  text: 'But we will surely do every word that has gone out from our mouth: to burn incense to the Queen of Heaven and to pour out drink offerings to her[a], just as we and our fathers, our kings and our officials, did in the cities of Judah and in the streets of Jerusalem; then we had plenty of bread, were well[b], and saw no disaster.'
  footnotes:
