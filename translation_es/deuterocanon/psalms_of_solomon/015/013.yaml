translation:
  language: es
  text: Porque los pecados asolarán[a] las casas de los pecadores, y los pecadores perecerán en el día del juicio de Yahvé para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «devastarán» o «desolarán».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «por el siglo»; aquí se vierte «para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - culpas
  - transgresiones
  lexicon: BDAG
  rationale: El plural refiere a actos o cargas de pecado concretos; «pecados» es el equivalente más directo y natural en español, manteniendo la fuerza moral del término.
- source_word: ἐξερημώσουσιν
  english_pob_choice: will lay waste
  chosen_spanish: asolarán
  alternatives_spanish:
  - devastarán
  - desolarán
  lexicon: LSJ
  rationale: El verbo expresa arrasar o dejar en ruina. «Asolarán» conserva la severidad del original y su registro solemne sin sonar forzado.
- source_word: οἴκους
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - familias
  lexicon: LSJ
  rationale: El sentido básico es «casas». «Casas» mantiene la literalidad del sustantivo y evita ampliar indebidamente a «hogares» o «familias».
- source_word: ἁμαρτωλῶν
  english_pob_choice: of sinners
  chosen_spanish: de los pecadores
  alternatives_spanish:
  - de los malvados
  - de los impíos
  lexicon: BDAG
  rationale: La forma genitiva es directa y el paralelismo con la segunda mitad del versículo pide conservar «pecadores» para mantener la repetición retórica.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: BDAG
  rationale: El verbo indica ruina o destrucción final. «Perecerán» es idiomático en español y conserva el tono judicial sin especificar el modo de destrucción.
- source_word: ἐν ἡμέρᾳ κρίσεως Κυρίου
  english_pob_choice: on the day of the Lord’s judgment
  chosen_spanish: en el día del juicio del Señor
  alternatives_spanish:
  - el día del juicio de Yahvé
  - el día del juicio del Señor
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva de manera natural en español. Aquí «Señor» refleja el griego Κυρίου en una fórmula de juicio establecida, sin necesidad de introducir el nombre divino en una cita/grupo de frase no explícitamente marcada por el texto griego como יהוה.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por el siglo
  lexicon: BDAG
  rationale: En este contexto judicial la expresión comunica duración indefinida y finalidad. «Para siempre» es claro en español y reproduce la fuerza del giro sin volverlo arcaico.
theological_decisions:
- issue: Alcance de «para siempre» (εἰς τὸν αἰῶνα)
  english_pob_reading: Modifica a «will perish», dando «will perish forever».
  chosen_spanish_reading: Modifica a «perecerán», dando «perecerán ... para siempre».
  alternative_spanish_readings:
  - Podría entenderse como intensificación global del juicio.
  - Una versión más literal sería «por el siglo».
  rationale: La colocación final del sintagma tras la cláusula de perecer favorece entender que califica la perdición de los pecadores, no el día del juicio mismo. «Para siempre» expresa esa relación de forma clara y fiel.
  doctrine_reference: escatología/jucio final
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que movió «forever» para que acompañe más directamente a «will perish», evitando sugerir que modifica «the day of the Lord’s judgment».
  spanish_consistency_notes:
  - Se conserva el paralelismo repetido «pecados / pecadores», coherente con el griego.
  - «Señor» se usa para Κυρίου en la fórmula fija de juicio; no se introduce «Yahvé» porque el texto base griego no escribe el nombre divino explícito.
  - «Asolarán» y «perecerán» mantienen un registro solemne y auditivamente equivalente al tono judicial del original.
