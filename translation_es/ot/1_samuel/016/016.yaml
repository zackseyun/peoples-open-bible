translation:
  language: es
  text: Por favor, que nuestro señor diga a sus siervos que están delante de usted que busquen a un hombre que sepa tocar la lira; y cuando un espíritu dañino de parte de Dios esté sobre usted[a], él tocará con su mano, y le irá bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu malo de parte de Dios». El hebreo también puede entenderse como «un espíritu malo o dañino de Dios» o «de parte de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our lord
  chosen_spanish: nuestro señor
  alternatives_spanish:
  - nuestro amo
  lexicon: HALOT
  rationale: En este contexto cortesano se trata de un título de respeto para Saúl. "Señor" conserva la relación jerárquica sin introducir una formulación eclesiástica indebida; "amo" sería más fuerte de lo que el registro cortesano sugiere.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: El inglés POB eligió "servants" para un contexto de atención oficial al rey. En español, "siervos" transmite mejor el registro de subordinación respetuosa que "servidores"; "esclavos" sería lexicalmente más fuerte de lo que el contexto inmediato exige.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de usted
  alternatives_spanish:
  - en su presencia
  - ante usted
  lexicon: HALOT
  rationale: La imagen espacial hebrea se conserva con una expresión natural en español. "Delante de usted" mantiene la idea de estar en la presencia del rey sin sonar arcaico.
- source_word: יְבַקְשׁוּ אִישׁ
  english_pob_choice: they should seek out a man
  chosen_spanish: busquen a un hombre
  alternatives_spanish:
  - busquen un hombre
  - busquen a un hombre adecuado
  lexicon: HALOT
  rationale: El verbo expresa una búsqueda intencional. En español, el imperativo de cortesía/propuesta "busquen" reproduce bien la sugerencia de los siervos; "a un hombre" conserva el objeto singular del hebreo.
- source_word: יֹדֵעַ מְנַגֵּן
  english_pob_choice: who knows how to play
  chosen_spanish: que sepa tocar
  alternatives_spanish:
  - hábil para tocar
  - experto en tocar
  lexicon: HALOT
  rationale: La construcción participial indica competencia. "Que sepa tocar" es idiomático en español y conserva la habilidad aprendida sin añadir más de lo que el texto afirma.
- source_word: בַּכִּנּוֹר
  english_pob_choice: lyre
  chosen_spanish: el arpa
  alternatives_spanish:
  - la lira
  - el laúd
  lexicon: HALOT
  rationale: Aunque el término original se refiere con precisión a un instrumento de cuerdas tipo lira, en español bíblico "arpa" es la designación más reconocible y musicalmente natural; se mantiene como equivalente funcional, no mecánico.
- source_word: רוּחַ אֱלֹהִים רָעָה
  english_pob_choice: a harmful spirit from God
  chosen_spanish: un espíritu dañino de parte de Dios
  alternatives_spanish:
  - un espíritu malo de parte de Dios
  - un espíritu perjudicial de parte de Dios
  lexicon: HALOT
  rationale: 'Se preserva la tensión teológica: el espíritu procede de Dios, pero se describe como dañino. "Dañino" refleja el énfasis en el efecto adverso sin intensificar innecesariamente el juicio moral; "de parte de Dios" evita una lectura que atribuya maldad a Dios mismo.'
- source_word: עָלֶיךָ
  english_pob_choice: is upon you
  chosen_spanish: esté sobre usted
  alternatives_spanish:
  - venga sobre usted
  - caiga sobre usted
  lexicon: HALOT
  rationale: La preposición con רוח indica una presencia opresiva o envolvente. "Esté sobre usted" mantiene la imagen hebrea con un español natural y sobrio.
- source_word: וְנִגֵּן בְּיָדוֹ
  english_pob_choice: he will play with his hand
  chosen_spanish: él tocará con su mano
  alternatives_spanish:
  - tocará con su mano
  - hará música con su mano
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto "con su mano" para no diluir la imagen instrumental. En español, "tocar" funciona bien con instrumentos de cuerdas y evita una paráfrasis excesiva.
- source_word: וְטוֹב לָךְ
  english_pob_choice: it will be well for you
  chosen_spanish: le irá bien
  alternatives_spanish:
  - todo irá bien para usted
  - le hará bien
  lexicon: HALOT
  rationale: La expresión hebrea es resultativa y amplia. "Le irá bien" suena natural en español y conserva el sentido de alivio/beneficio sin reducirlo solo a mejoría emocional.
theological_decisions:
- issue: Cómo preservar la atribución divina sin resolver la tensión de רוּחַ אֱלֹהִים רָעָה
  english_pob_reading: a harmful spirit from God
  chosen_spanish_reading: un espíritu dañino de parte de Dios
  alternative_spanish_readings:
  - un espíritu malo de parte de Dios
  - un espíritu perjudicial de parte de Dios
  rationale: 'La frase hebrea mantiene simultáneamente dos afirmaciones: el origen o procedencia divina y el carácter dañino del espíritu. El español conserva ambas sin atenuar la tensión mediante explicaciones doctrinales dentro del texto. "De parte de Dios" retiene la fuente; "dañino" comunica el efecto adverso y evita sobrecargar el pasaje con una moralización innecesaria.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El inglés POB pasó de "an evil spirit from God" a "a harmful spirit from God" en una revisión posterior para reflejar mejor רָעָה sin intensificar indebidamente la carga moral. La versión española sigue esa revisión y conserva la atribución divina sin suavizar el sentido adverso del espíritu.
  spanish_consistency_notes:
  - Se usa "Yahvé" como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo "siervos" para el registro cortesano; no se sustituyó por "esclavos" porque el contexto no exige la fuerza lexical de δοῦλος.
  - '"Arpa" se eligió como equivalente funcional aceptable en español bíblico, aunque el término hebreo corresponde con más precisión a un instrumento de cuerdas tipo lira.'
  - La puntuación conserva una sola cláusula temporal extensa, acorde con la sintaxis hebrea del versículo.
