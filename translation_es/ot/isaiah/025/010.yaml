translation:
  language: es
  text: Porque la mano de Yahvé descansará sobre este monte, y Moab será hollado en su lugar[a], como es hollada la paja en el agua de un estercolero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Moab será hollado debajo de él / debajo de ella»; el antecedente del pronombre hebreo es incierto.
    reason: alternative_reading
  - marker: b
    text: «Estercolero» también puede entenderse como «muladar» o «pozo de estiércol»; el término hebreo probablemente se refiere a un lugar inmundo asociado con estiércol.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o motivo del juicio prometido; «Porque» conserva el valor explicativo de forma natural en español.
- source_word: תָנ֥וּחַ
  english_pob_choice: will rest
  chosen_spanish: descansará
  alternatives_spanish:
  - reposará
  - se asentará
  lexicon: HALOT
  rationale: נוח transmite la imagen de algo que se posa o permanece. «Descansará» preserva la metáfora de la mano divina que se posa sobre el monte sin perder naturalidad en español.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahweh
  - la mano del Yahvé
  lexicon: HALOT
  rationale: Mantiene la metáfora hebrea de acción/poder divino. Se usa «Yahvé» según el estándar del proyecto para יְהוָה.
- source_word: בָּהָר הַזֶּה
  english_pob_choice: on this mountain
  chosen_spanish: sobre este monte
  alternatives_spanish:
  - sobre esta montaña
  - en este monte
  lexicon: HALOT
  rationale: «Monte» es una opción bíblica y natural en español para el referente sagrado del contexto. «Sobre» conserva la imagen locativa del hebreo.
- source_word: וְנָדוֹשׁ
  english_pob_choice: and ... will be trampled down
  chosen_spanish: será hollado
  alternatives_spanish:
  - será pisoteado
  - será trillado
  lexicon: HALOT
  rationale: דושׁ implica pisar/trillar. «Hollado» comunica humillación y violencia con registro bíblico sobrio, sin imponer una imagen agrícola excesiva en español.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pueblo sin adaptación.
- source_word: תַּחְתָּיו
  english_pob_choice: in its place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - debajo de él
  - bajo él
  - donde está
  lexicon: HALOT
  rationale: El sufijo es ambiguo en hebreo. «En su lugar» preserva la tensión sin forzar un antecedente específico, siguiendo la decisión auditada del POB inglés.
- source_word: כְּהִדּוּשׁ
  english_pob_choice: as ... is trampled down
  chosen_spanish: como es hollada
  alternatives_spanish:
  - como es trillada
  - como es pisoteada
  lexicon: HALOT
  rationale: Mantiene la repetición del mismo campo verbal que en la cláusula anterior para conservar el paralelismo y la fuerza imagética del hebreo.
- source_word: מַתְבֵּן
  english_pob_choice: straw
  chosen_spanish: la paja
  alternatives_spanish:
  - la paja cortada
  - el rastrojo
  lexicon: HALOT
  rationale: El término designa material vegetal seco para el símil. «Paja» es la equivalencia más clara y directa en español.
- source_word: בְּמֵי
  english_pob_choice: in the water of
  chosen_spanish: en el agua de
  alternatives_spanish:
  - en las aguas de
  - dentro del agua de
  lexicon: HALOT
  rationale: Sigue de cerca la construcción hebrea y conserva la imagen de un medio líquido impuro asociado al lugar descrito.
- source_word: מַדְמֵנָה
  english_pob_choice: a dung pit
  chosen_spanish: un estercolero
  alternatives_spanish:
  - un basurero de estiércol
  - un pozo de estiércol
  - un muladar
  lexicon: HALOT
  rationale: El término alude a un lugar inmundo ligado al estiércol. «Estercolero» comunica bien el desprecio y la suciedad del símil con un registro bíblico entendible.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se adopta la forma propia del proyecto para el Tetragrámaton, manteniendo el nombre del pacto y evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronombre ambiguo en תַּחְתָּיו
  english_pob_reading: Moab will be trampled down in its place
  chosen_spanish_reading: Moab será hollado en su lugar
  alternative_spanish_readings:
  - Moab será hollado debajo de él
  - Moab será hollado debajo de ella
  rationale: La referencia del sufijo no es segura. La redacción española conserva la ambigüedad sin resolverla, en línea con la decisión auditada del texto inglés.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Imágenes de juicio humillante y degradante
  english_pob_reading: as straw is trampled down in the water of a dung pit
  chosen_spanish_reading: como es hollada la paja en el agua de un estercolero
  alternative_spanish_readings:
  - como se trilla la paja en el agua de un muladar
  - como es pisoteada la paja en el agua de un pozo de estiércol
  rationale: La comparación debe conservar su aspereza y carácter degradante. «Estercolero» transmite la inmundicia del sitio sin suavizar la fuerza del juicio.
  doctrine_reference: Isaiah 25:10 imagery of humiliating judgment
translation_notes:
  revision_awareness: Se revisó el pasaje contra el paquete fuente hebreo (WLC), la morfología y el audit trail inglés. No hubo cambios en la última pasada revisada del POB inglés; la versión española conserva la ambigüedad del pronombre y la imaginería ofensiva del símil sin resolver tensiones textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Monte» se usa para el referente sagrado con naturalidad bíblica en español.
  - Se conserva la repetición de la raíz verbal mediante «hollado / hollada» para reflejar el paralelismo hebreo.
  - La nota a pie de página marca la ambigüedad del sufijo en תַּחְתָּיו sin sobreinterpretarlo.
  - El léxico de deshonra del símil final se mantiene fuerte pero publicable mediante «estercolero».
