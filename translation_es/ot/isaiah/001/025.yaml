translation:
  language: es
  text: Volveré mi mano contra ti[a], y quitaré tus escorias como con lejía[b], y quitaré toda tu aleación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sobre ti’. El hebreo ‘volver mi mano sobre/contra’ puede introducir acción punitiva o intervención purificadora. Aquí la imagen de refinación favorece el sentido de juicio con propósito de limpieza.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo alude a un álcali usado para limpiar o refinar; algunos traducen ‘con álcali’ o ‘como con jabón’.
    reason: lexical_alternative
  - marker: c
    text: O ‘tu estaño’ o ‘tus metales viles’; el hebreo puede referirse específicamente al estaño o, de manera más general, a metal inferior mezclado en una aleación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  english_pob_choice: I will turn
  chosen_spanish: volveré
  alternatives_spanish:
  - pondré de nuevo
  - volveré a extender
  lexicon: HALOT
  rationale: El hebreo en hiphil con ‘mi mano’ expresa el movimiento de volver/dirigir la mano hacia alguien, no ‘restaurar’ en este contexto. ‘Volveré’ comunica el giro de acción con naturalidad en español y mantiene la fuerza judicial del pasaje.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  - mi juicio
  lexicon: HALOT
  rationale: Se conserva la metáfora antropomórfica de la acción divina. ‘Mi mano’ permite mantener el idiomatismo bíblico sin sustituirlo por una abstracción.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - hacia ti
  lexicon: HALOT
  rationale: En este giro idiomático de juicio, ‘contra ti’ expresa mejor el valor adversativo que ‘sobre ti’, aunque el hebreo permita ambas ideas según contexto.
- source_word: וְאֶצְרֹף
  english_pob_choice: I will smelt away
  chosen_spanish: fundiré
  alternatives_spanish:
  - refinaré
  - depuraré
  lexicon: HALOT
  rationale: צָרַף es lenguaje metalúrgico. ‘Fundiré’ mantiene la imagen concreta del proceso de metal y, en español, permite entender la eliminación de impurezas sin perder el carácter forense/purificador.
- source_word: כַּבֹּר
  english_pob_choice: as with lye
  chosen_spanish: como con lejía
  alternatives_spanish:
  - como con álcali
  - como con jabón
  lexicon: HALOT
  rationale: El término apunta a una sustancia alcalina usada para limpiar o refinar. ‘Lejía’ es un equivalente moderno y comprensible que conserva la función limpiadora del símil.
- source_word: סִיגָיִךְ
  english_pob_choice: your dross
  chosen_spanish: tus escorias
  alternatives_spanish:
  - tus impurezas
  - tu escoria
  lexicon: HALOT
  rationale: סיגים designa los residuos impuros del metal. ‘Escorias’ preserva la imagen metalúrgica y resulta natural en español, sin convertirlo en una paráfrasis moral general.
- source_word: וְאָסִירָה
  english_pob_choice: and remove
  chosen_spanish: quitaré
  alternatives_spanish:
  - eliminaré
  - retiraré
  lexicon: HALOT
  rationale: El verbo en hiphil expresa retirar o apartar. ‘Quitaré’ es directo, claro y adecuado al paralelismo del versículo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - toda la
  lexicon: HALOT
  rationale: Se ajusta al sustantivo femenino implícito en español (‘aleación’). Mantiene la totalidad del hebreo.
- source_word: בְּדִילָיִךְ
  english_pob_choice: your alloy
  chosen_spanish: tu aleación
  alternatives_spanish:
  - tu estaño
  - tus metales viles
  lexicon: HALOT
  rationale: בדיל puede referirse a estaño o, más ampliamente en este contexto, a metal inferior mezclado con el precioso. ‘Aleación’ comunica de forma natural la idea de metal mezclado/adulterante y conserva el paralelo con ‘escorias’.
theological_decisions:
- issue: Tensión entre juicio y purificación
  english_pob_reading: Judgment expressed as purifying discipline
  chosen_spanish_reading: Juicio expresado como disciplina purificadora
  alternative_spanish_readings:
  - Juicio meramente destructivo
  - Acción meramente restauradora
  rationale: 'La versión española preserva la doble fuerza del texto: la mano se vuelve ‘contra ti’, pero el lenguaje es de fundición y limpieza. No se diluye la severidad ni se reduce a castigo puro; queda la tensión entre juicio y purificación.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones en el paquete de auditoría; el pasaje se mantiene alineado con la última pasada, sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se conserva la metáfora metalúrgica (‘fundir’, ‘escorias’, ‘aleación’) para respetar la imagen profética sin moralizarla.
  - Se prefirió ‘contra ti’ por la fuerza idiomática del hebreo, pero se dejó en nota la alternativa ‘sobre ti’ para no perder la ambigüedad documentada.
