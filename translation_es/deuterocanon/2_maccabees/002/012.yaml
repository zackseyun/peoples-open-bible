translation:
  language: es
  text: Como nos explicaron que no habían encontrado fuego, sino agua espesa[a], les ordenó, después de sacar un poco[b], que la trajeran. Luego, cuando se trajeron las cosas para los sacrificios, Nehemías ordenó a los sacerdotes rociar el agua sobre la madera y sobre lo que estaba puesto encima[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como «agua densa» o «líquido espeso». El griego es inusual y parece conservar el carácter extraño de la sustancia.
    reason: lexical_alternative
  - marker: b
    text: El participio traducido «después de sacar un poco» es difícil y poco común en esta forma; la idea es que debían tomar parte del líquido y traerlo.
    reason: textual_variant
  - marker: c
    text: 'También puede traducirse: «verter el agua sobre la madera y sobre lo que estaba puesto encima».'
    reason: alternative_reading
lexical_decisions:
- source_word: διεσάφησαν
  english_pob_choice: explained
  chosen_spanish: nos explicaron
  alternatives_spanish:
  - nos dieron a entender
  - nos informaron claramente
  lexicon: LSJ
  rationale: El verbo comunica una explicación clara y detallada. «Nos explicaron» mantiene el valor de aclaración sin volverlo más solemne de lo que exige el griego.
- source_word: μὴ εὑρηκέναι πῦρ ἀλλὰ ὕδωρ παχύ
  english_pob_choice: they had found not fire but thick water
  chosen_spanish: que no habían encontrado fuego, sino agua espesa
  alternatives_spanish:
  - que no habían hallado fuego, sino agua densa
  - que no habían encontrado fuego, sino líquido espeso
  lexicon: LSJ
  rationale: Conservo la extrañeza de ὕδωρ παχύ con «agua espesa», que suena natural en español y mantiene la tensión del texto. «Densa» o «líquido espeso» son posibles, pero «agua espesa» preserva mejor el contraste narrativo con fuego.
- source_word: ἀποβλίψαντας
  english_pob_choice: after drawing some out
  chosen_spanish: después de sacar un poco
  alternatives_spanish:
  - después de sacar algo de ella
  - después de extraer un poco
  lexicon: LSJ
  rationale: La forma es rara y el sentido exacto no es completamente seguro. «Sacar un poco» mantiene la acción de tomar parte del líquido sin precisar de más.
- source_word: φέρειν
  english_pob_choice: to bring it
  chosen_spanish: que la trajeran
  alternatives_spanish:
  - que la llevaran
  - que la presentaran
  lexicon: LSJ
  rationale: El infinitivo de mandato se vierte naturalmente con una subordinada final/mandato en español. «La» retoma el líquido implícito.
- source_word: ἀνηνέχθη τὰ τῶν θυσιῶν
  english_pob_choice: the things for the sacrifices had been brought forward
  chosen_spanish: cuando fueron traídas las cosas para los sacrificios
  alternatives_spanish:
  - cuando se trajeron las cosas para los sacrificios
  - cuando fueron llevados los elementos del sacrificio
  lexicon: LSJ
  rationale: La frase es elíptica; «las cosas para los sacrificios» conserva su amplitud sin reducirla indebidamente a una sola pieza del ritual. El pasivo mantiene el movimiento hacia adelante del contexto.
- source_word: ἐκέλευσεν τοὺς ἱερεῖς
  english_pob_choice: Nehemiah ordered the priests
  chosen_spanish: Nehemías ordenó a los sacerdotes
  alternatives_spanish:
  - Nehemías mandó a los sacerdotes
  - Nehemías dio orden a los sacerdotes
  lexicon: LSJ
  rationale: «Ordenó» reproduce bien el valor de ἐκέλευσεν y es plenamente idiomático en español.
- source_word: ἐπιρᾶναι
  english_pob_choice: to sprinkle
  chosen_spanish: rociar
  alternatives_spanish:
  - esparcir
  - verter
  lexicon: LSJ
  rationale: En contexto ritual, el verbo indica aplicar el líquido sobre algo. «Rociar» conserva la idea de dispersión/aplicación líquida y es más natural que una glosa demasiado técnica.
- source_word: τῷ ὕδατι
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - esa agua
  - el líquido
  lexicon: LSJ
  rationale: Se mantiene el referente simple del texto. No hace falta añadir determinantes interpretativos.
- source_word: τά τε ξύλα καὶ τὰ ἐπικείμενα
  english_pob_choice: both the wood and what was laid upon it
  chosen_spanish: la madera y sobre lo que estaba puesto encima
  alternatives_spanish:
  - la madera y lo que estaba sobre ella
  - la leña y lo que había sido colocado encima
  lexicon: LSJ
  rationale: «ξύλα» puede ser madera o leña; aquí «madera» funciona en español y conserva la referencia material. «τὰ ἐπικείμενα» es amplio; «lo que estaba puesto encima» mantiene esa amplitud sin cerrarla prematuramente.
- source_word: Νεεμίας
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Neemías
  lexicon: Standard transliteration
  rationale: Se usa la transliteración española habitual del nombre propio.
theological_decisions:
- issue: La sustancia hallada en lugar del fuego
  english_pob_reading: thick water
  chosen_spanish_reading: agua espesa
  alternative_spanish_readings:
  - agua densa
  - líquido espeso
  rationale: La rareza del sintagma se preserva sin suavizarla. «Agua espesa» deja visible la tensión textual y evita interpretar el pasaje como si fuera agua normal.
  doctrine_reference: Translation philosophy §1, §3
- issue: El acto ritual sobre la madera y lo colocado encima
  english_pob_reading: sprinkle the water on both the wood and what was laid upon it
  chosen_spanish_reading: rociar el agua sobre la madera y sobre lo que estaba puesto encima
  alternative_spanish_readings:
  - verter el agua sobre la madera y sobre lo que estaba puesto encima
  - esparcir el agua sobre la madera y sobre lo puesto encima
  rationale: El griego permite un gesto ritual de aplicación del agua; «rociar» comunica bien esa acción sin convertirla en una interpretación doctrinal. Se conserva además la amplitud de «lo que estaba puesto encima».
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés: la solución española conserva la rareza de ὕδωρ παχύ, mantiene la ambigüedad de τὰ τῶν θυσιῶν y refleja la alternativa ritual de ἐπιρᾶναι sin sobreinterpretación. No se introdujeron cambios frente al último pase auditado, porque el acuerdo cruzado señaló solo cuestiones menores.'
  spanish_consistency_notes:
  - Se mantiene «Nehemías» para el nombre propio, conforme al uso español habitual.
  - Se evita «SEÑOR» porque no hay aquí el nombre divino.
  - Se conserva una sintaxis bíblica clara pero moderna, sin calcos innecesarios.
  - «Rociar» se eligió por equilibrio entre naturalidad española y fuerza ritual del griego.
