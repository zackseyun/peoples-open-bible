translation:
  language: es
  text: Escucha[a], hijo mío, y no me desprecies; al final entenderás mis palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego suministrado para este versículo presenta una frase completamente distinta: «El que es lavado de un cuerpo muerto y luego vuelve a tocarlo—¿qué ha ganado con su lavado?». Esto sugiere un desajuste mayor de alineación versicular o de tradición textual; el texto principal sigue el testimonio hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: שמע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  - Oíd
  lexicon: HALOT
  rationale: El imperativo pide atención receptiva. «Escucha» es natural en español y conserva el matiz de oír con atención sin volverlo una paráfrasis más fuerte como «obedece».
- source_word: בני
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío, querido
  lexicon: HALOT
  rationale: El vocativo masculino singular se conserva de manera directa. «Hijo mío» suena más fluido y reverente en español que el orden literal «mi hijo».
- source_word: תבוז
  english_pob_choice: despise
  chosen_spanish: desprecies
  alternatives_spanish:
  - desdenes
  - menosprecies
  - desprecies
  lexicon: HALOT
  rationale: El valor de בזה en este contexto es tratar con desdén/contempto. «Desprecies» mantiene la fuerza admonitoria sin exagerar el tono.
- source_word: ובאחרית
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en el fin
  - a la postre
  - en el final
  lexicon: HALOT
  rationale: La referencia apunta al desenlace o resultado. «Al final» es idiomático y conserva la orientación temporal/resultativa del hebreo.
- source_word: תשיג
  english_pob_choice: will understand
  chosen_spanish: entenderás
  alternatives_spanish:
  - comprenderás
  - alcanzarás
  - llegarás a entender
  lexicon: HALOT
  rationale: Con «mis palabras», el verbo expresa llegar a captar su sentido. La revisión inglesa optó por «understand» para un equivalente más natural; «entenderás» mantiene esa naturalidad en español.
- source_word: אמרי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis palabras
  - mis enseñanzas
  lexicon: HALOT
  rationale: אמרי son palabras o dichos pronunciados. «Mis palabras» es claro, sobrio y suficiente; «mis enseñanzas» introduciría interpretación adicional.
theological_decisions:
- issue: Desajuste entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek parallel in the audit trail is a wholly different saying and is preserved as a textual-variant note.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado; el paralelo griego del expediente refleja un dicho completamente distinto y se preserva como nota de variante textual.
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - Armonizar ambos testimonios en una paráfrasis común
  rationale: En Sirácides, cuando el hebreo está disponible, la política del proyecto da primacía al hebreo. Dado que aquí el griego no es una simple variante verbal sino otra sentencia, el texto español debe seguir el hebreo y dejar constancia explícita de la divergencia.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del expediente inglés: se prefirió «understand»/«entenderás» frente a un equivalente más literal como «grasp»/«captar», por ser más natural y ajustado al contexto de אמרי sin perder la relación con el sentido de la exhortación.'
  spanish_consistency_notes:
  - Se mantiene «hijo mío» para conservar el vocativo filial masculino singular.
  - Se evita «obedecer» para שמע, porque el hebreo aquí pide atención auditiva/intelectual más que obediencia explícita.
  - La nota de pie marca la divergencia textual sin desplazar el texto principal hebreo.
