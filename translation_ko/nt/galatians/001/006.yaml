id: GAL.1.6
reference: Galatians 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Θαυμάζω ὅτι οὕτως ταχέως μετατίθεσθε ἀπὸ τοῦ καλέσαντος ὑμᾶς ἐν χάριτι Χριστοῦ εἰς ἕτερον εὐαγγέλιον,
base_translation:
  language: en
  yaml_path: translation/nt/galatians/001/006.yaml
  text: I am astonished that you are so quickly deserting the one who called you in the grace of Messiah for a different gospel[c][b][a],
  footnotes:
  - marker: a
    text: 'Or ''by the grace of the Messiah.'' The preposition may express sphere or means.'
    reason: alternative_reading
  - marker: b
    text: 'Greek ''Christ''; translated ''Messiah'' here because the term functions as a title.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''to another gospel.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 메시아[a]의 은혜로 여러분을 부르신 분에게서 이렇게 빨리 떠나 다른 복음[b]으로 옮겨가는 것이 놀랍습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 「메시아」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「또 다른 복음」. 7절에서 바울은 그것이 사실은 「다른」 복음이 아니라고 곧바로 정정한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαυμάζω
  english_pob_choice: I am astonished
  chosen_korean: 놀랍습니다
  alternatives_korean:
  - 나는 놀랍니다
  - 이상하게 여깁니다
  lexicon: BDAG
  rationale: 바울의 책망 어조를 합쇼체 종결로 살린다. 인사 직후의 충격을 약화시키지 않는다.
- source_word: μετατίθεσθε
  english_pob_choice: deserting
  chosen_korean: 옮겨가다
  alternatives_korean:
  - 떠나가다
  - 변절하다
  lexicon: BDAG
  rationale: 이동·전향의 의미를 가지면서도 책망의 강도를 살린다.
- source_word: ἐν χάριτι Χριστοῦ
  english_pob_choice: in the grace of Messiah
  chosen_korean: 메시아의 은혜로
  alternatives_korean:
  - 메시아의 은혜 안에서
  - 메시아의 은혜를 통해
  lexicon: BDAG
  rationale: ἐν은 영역·수단 양쪽으로 풀이 가능. 본문은 부르심의 매개로서 「은혜로」가 자연스럽다.
