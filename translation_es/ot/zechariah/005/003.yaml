    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de esto según ella … de eso según ella», probablemente una referencia a lo que aparece en cada lado del rollo volante.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el principal problema semántico de נִקָּה con «será removido», que en español expresa mejor la fuerza judicial punitiva sin sugerir inocencia. También restaura la referencia contrastiva a los dos lados del rollo, en línea con la explicación contextual del hebreo elíptico y el audit trail del POB. Se añade la nota sobre «tierra/país» para preservar la alternativa semántica de אֶרֶץ. Los marcadores de nota se normalizan en orden único. Se mantiene «todo el que jura» sin añadir «en falso», porque eso no está explícito en el hebreo de este versículo.
