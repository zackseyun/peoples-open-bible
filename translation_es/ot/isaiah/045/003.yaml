translation:
  language: es
  text: Y te daré los tesoros de la oscuridad[a] y las riquezas ocultas de lugares secretos[b], para que sepas que yo soy Yahvé[c], el que te llama por tu nombre, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los tesoros ocultos en la oscuridad», por «los tesoros de la oscuridad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las riquezas ocultas en lugares secretos», por «las riquezas ocultas de lugares secretos».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene el nombre divino YHWH, tradicionalmente representado como «el SEÑOR»; también puede transliterarse «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y te daré
  alternatives_spanish:
  - Y te daré
  - Y yo te daré
  lexicon: HALOT
  rationale: El perfecto profético hebreo con ו consecutiva expresa una promesa futura; en español, el futuro simple comunica con naturalidad ese valor promisorio sin perder la fuerza oracular.
- source_word: אוֹצְרוֹת חֹשֶׁךְ
  english_pob_choice: the treasures of darkness
  chosen_spanish: los tesoros de la oscuridad
  alternatives_spanish:
  - tesoros en la oscuridad
  - tesoros ocultos en la oscuridad
  lexicon: HALOT
  rationale: Se conserva la imagen del constructo hebreo de modo literal y claro. 'De la oscuridad' mantiene la metáfora sin convertirla de antemano en una explicación interpretativa.
- source_word: וּמַטְמֻנֵי מִסְתָּרִים
  english_pob_choice: hidden riches of secret places
  chosen_spanish: las riquezas ocultas de lugares secretos
  alternatives_spanish:
  - los tesoros de lugares secretos
  - las riquezas escondidas de lugares ocultos
  lexicon: HALOT
  rationale: מַטְמֻנִים comunica bienes escondidos o atesorados; 'riquezas ocultas' conserva ese valor material. 'Lugares secretos' refleja מִסְתָּרִים y preserva el paralelismo poético sin reducir la expresión a un simple duplicado de 'tesoros'.
- source_word: לְמַעַן תֵּדַע
  english_pob_choice: so that you may know
  chosen_spanish: para que sepas
  alternatives_spanish:
  - para que conozcas
  - a fin de que sepas
  lexicon: HALOT
  rationale: La cláusula final expresa propósito. 'Para que sepas' es natural y mantiene el sentido de finalidad, con un registro digno y directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto en español: transliterar el nombre divino como ''Yahvé'', evitando la sustitución por un título. Esta forma es reconocible en español bíblico y conserva el nombre personal del pacto.'
- source_word: הַקּוֹרֵא בְשִׁמְךָ
  english_pob_choice: the one who calls you by name
  chosen_spanish: el que te llama por tu nombre
  alternatives_spanish:
  - el que te llama por nombre
  - el que invoca tu nombre
  lexicon: HALOT
  rationale: La construcción participial identifica a Yahvé como quien llama específicamente a Ciro. 'Por tu nombre' reproduce con precisión בְשִׁמְךָ y evita perder la referencia personal.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La forma posesiva de relación de pacto se expresa de manera idiomática y transparente en español como 'el Dios de Israel'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se adopta 'Yahvé' según la convención del proyecto, preservando el nombre propio de Dios en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de los 'tesoros' y 'riquezas'
  english_pob_reading: material wealth concealed in dark/secret places
  chosen_spanish_reading: riquezas materiales ocultas en lugares oscuros o secretos
  alternative_spanish_readings:
  - tesoros espirituales
  - riquezas simbólicas de la oscuridad
  rationale: El contexto inmediato de la promesa a Ciro favorece bienes concretos y no una espiritualización. La traducción mantiene la imaginería material y la doble expresión poética sin suavizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Relación entre 'llama' y el nombre propio
  english_pob_reading: the one who calls you by name
  chosen_spanish_reading: el que te llama por tu nombre
  alternative_spanish_readings:
  - el que te llama por nombre
  - el que te nombra
  rationale: La frase expresa elección y conocimiento personal, no solo vocación general. 'Por tu nombre' conserva la especificidad del hebreo y la carga relacional del contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión auditada del inglés: añade artículos donde ayudan a la fluidez, conserva la doble imagen de ''tesoros'' y ''riquezas'', y refleja la decisión final de ''calls you by name'' como una fórmula natural y precisa en español. Se adoptó la transliteración española normativa ''Yahvé'' como equivalente del inglés auditado ''Yahweh''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para el nombre divino, conforme al criterio del proyecto.
  - '''tesoros'' y ''riquezas'' se conservan como dos miembros paralelos, sin fusionarlos en una sola imagen.'
  - '''por tu nombre'' preserva la relación personal del hebreo בְשִׁמְךָ y evita una simplificación impersonal.'
  - El registro es bíblico y claro, sin arcaísmos innecesarios, pero sin perder solemnidad.
