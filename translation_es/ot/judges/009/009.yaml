review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en varios puntos: «el olivo» refleja bien הַזַּיִת en contexto de fábula; «mi aceite» sigue la revisión auditada del POB; y la estructura retórica general de la pregunta se conserva. Sin embargo, se aparta de una decisión clave del source/audit trail al poner «Dios» en el texto principal donde el POB inglés, por primacía del hebreo plural אֱלֹהִים y su contexto, eligió «gods / dioses» y relegó «God / Dios» a nota. Además, «ondular sobre los árboles» no transmite bien el matiz de moverse/ejercer preeminencia en la fábula; suena físico pero poco idiomático para el contexto. También «¿Dejaré de producir...?» es comprensible, pero «¿He de dejar de producir...?» o similar suena más natural como pregunta retórica deliberativa en español bíblico moderno.'
  spanish_quality_summary: 'El español es generalmente legible y digno, pero hay dos problemas de naturalidad/fidelidad: «Dios y los hombres» introduce una lectura tradicional contra la principal documentada; y «a ondular sobre los árboles» resulta poco natural e imagísticamente impreciso. La puntuación y el registro son adecuados. Conviene ajustar la pregunta retórica para que suene menos a simple futuro predictivo y más a deliberación: «¿He de dejar... y ponerme a mecerme sobre los árboles?» o equivalente.'
  glossary_alignment: No hay conflicto con glosario mayor salvo la decisión teológica sobre אֱלֹהִים, donde debe mantenerse «dioses» en el texto principal conforme al audit trail y dejar «Dios» como alternativa en nota. El resto («Dios»/«Yahvé», «Mesías», etc.) no aplica aquí. «Mi aceite» es aceptable por la revisión documentada, con nota que preserve el hebreo figurado «mi gordura / riqueza».
  issues:
  - severity: high
    issue: El texto principal usa «Dios» para אֱלֹהִים.
    rationale: El POB inglés y la decisión teológica documentada prefieren «gods / dioses» en el texto principal por la forma plural hebrea, el verbo plural y el contexto de fábula; «God / Dios» debe quedar como alternativa en nota, no al revés.
  - severity: medium
    issue: «a ondular sobre los árboles» no refleja bien לָנוּעַ en contexto.
    rationale: «Ondular» suena poco idiomático aplicado a un árbol que rehúsa reinar. El sentido irónico de vaivén/preeminencia se expresa mejor con «mecerme» o «balancearme», idealmente manteniendo «sobre los árboles».
  - severity: medium
    issue: «¿Dejaré de producir...? y me iré...?» suena menos natural como pregunta retórica deliberativa.
    rationale: El hebreo tiene fuerza retórica. En español, «¿He de dejar de producir... y ponerme a...?» o «¿Voy a dejar...? » comunica mejor la deliberación que un futuro simple.
  - severity: low
    issue: La nota a sobre el orden de palabras no es necesaria.
    rationale: «Les dijo el olivo» no preserva una alternativa significativa de sentido; no hace falta gastar un marcador en una simple permutación sintáctica española.
  revised_spanish_text: 'Pero el olivo les dijo: «¿He de dejar de producir mi aceite[a], por el cual son honrados los dioses[b] y los hombres, y ponerme a mecerme sobre los árboles?»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «mi gordura» o «mi riqueza»; aquí se refiere al rico rendimiento del olivo, especialmente a su aceite.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios y los hombres». El hebreo tiene la forma plural אֱלֹהִים; muchos entienden aquí «dioses», mientras que otros lo toman como referencia al Dios verdadero por el uso del aceite en el culto.'
    reason: alternative_reading
  revision_rationale: 'Se corrige la decisión principal sobre אֱלֹהִים para alinearla con la evidencia hebrea y el audit trail del POB: «los dioses» en el texto principal y «Dios» en nota. Se mejora la naturalidad y el tono retórico con «¿He de dejar de producir...?» y se reemplaza «ondular» por «mecerme», que conserva mejor la imagen arbórea y el matiz irónico de לָנוּעַ. Se elimina la nota innecesaria sobre el orden de palabras y se conservan solo notas significativas y ancladas.'
