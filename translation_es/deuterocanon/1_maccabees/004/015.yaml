revisions:
- from: Pero todos los de la retaguardia cayeron[a] a espada, y los persiguieron hasta Gazara y hasta las llanuras de Judea, y Azoto[b] y Jamnia[b], y cayeron de ellos unos tres mil[c].
  to: Pero todos los de la retaguardia cayeron a espada, y los persiguieron hasta Gazara[a] y hasta las llanuras de Judea, Azoto[b] y Jamnia[b], y de ellos cayeron unos tres mil[c].
  rationale: La revisión corrige la sintaxis de la cadena de lugares para que «hasta» gobierne naturalmente toda la serie, elimina una nota innecesaria sobre un literalismo griego poco útil, separa las notas geográficas de forma más limpia y mejora la naturalidad del recuento final sin apartarse del sentido del original ni de las decisiones léxicas auditadas.
