revisions:
- from: 'Entonces Jonatán dijo al muchacho que llevaba sus armas[a]: «Ven, crucemos[b] al destacamento[c] de estos incircuncisos[d]. Quizá Yahvé actuará por nosotros, porque Yahvé no tiene impedimento para salvar por muchos o por pocos».'
  to: 'Entonces Jonatán dijo al muchacho que llevaba sus armas[a]: «Ven, crucemos al otro lado, al destacamento[b] de estos incircuncisos[c]. Quizá Yahvé actuará por nosotros, porque nada puede impedir que Yahvé salve por muchos o por pocos».'
  rationale: 'La revisión mantiene el contenido del borrador, pero mejora dos puntos clave: añade «al otro lado» para reflejar mejor וְנַעְבְּרָה, y sustituye «Yahvé no tiene impedimento para salvar» por «nada puede impedir que Yahvé salve», que es más natural en español y preserva fielmente el sentido de ausencia de restricción. Se eliminó la nota sobre «crucemos/pasemos» porque dejó de ser necesaria tras la mejora del texto principal.'
