  yaml_path: translation/ot/numbers/032/017.yaml
  text: But we ourselves will arm ourselves quickly before the sons of Israel[a], until we have brought them to their place[b]; and our little ones will remain in the fortified cities because of the inhabitants of the land.
  footnotes:
