translation:
  language: es
  text: porque si confiesas con tu boca que Jesús es Señor[a], y crees en tu corazón que Dios lo levantó de entre los muertos, serás salvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “confesar a Jesús como Señor”. La frase griega κύριον Ἰησοῦν puede verterse más compactamente, pero el texto principal explicita el contenido de la confesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la relación causal o explicativa entre esta afirmación y el contexto anterior; 'porque' es la opción natural y fiel en español.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - en caso de que
  lexicon: BDAG
  rationale: Condicional simple y directo, adecuado a las subjuntivas del griego y natural en español.
- source_word: ὁμολογήσῃς
  english_pob_choice: confess
  chosen_spanish: confieses
  alternatives_spanish:
  - reconozcas
  - declares
  lexicon: BDAG
  rationale: '''Confesar'' conserva el sentido público y verbal de reconocer una verdad o lealtad; evita debilitar el matiz confesional.'
- source_word: ἐν τῷ στόματί σου
  english_pob_choice: with your mouth
  chosen_spanish: con tu boca
  alternatives_spanish:
  - con tus labios
  - en tu boca
  lexicon: BDAG
  rationale: Equivale de manera idiomática al instrumento de la confesión verbal, sin calcar una preposición menos natural en español.
- source_word: κύριον Ἰησοῦν
  english_pob_choice: that Jesus is Lord
  chosen_spanish: que Jesús es Señor
  alternatives_spanish:
  - Jesús como Señor
  - que Jesús es el Señor
  lexicon: BDAG
  rationale: La frase griega expresa el contenido de la confesión; 'Señor' mantiene el valor de κύριος como título. Se evita imponer 'el Señor' como formulación fija cuando el griego presenta la confesión de la señoría de Jesús.
- source_word: πιστεύσῃς
  english_pob_choice: believe
  chosen_spanish: crees
  alternatives_spanish:
  - confías
  - tienes fe
  lexicon: BDAG
  rationale: '''Creer'' es el equivalente más directo y natural para πιστεύω en esta cláusula; ''tienes fe'' sería más interpretativo.'
- source_word: ἐν τῇ καρδίᾳ σου
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - con tu corazón
  lexicon: BDAG
  rationale: Mantiene el sentido bíblico de convicción interior y no meramente emocional.
- source_word: ὁ θεὸς αὐτὸν ἤγειρεν
  english_pob_choice: God raised him
  chosen_spanish: Dios lo levantó
  alternatives_spanish:
  - Dios lo resucitó
  - Dios lo levantó de entre los muertos
  lexicon: BDAG
  rationale: '''Levantar'' reproduce el verbo ἐγείρω con su sentido básico de hacer levantar/despertar; el contexto de la resurrección queda explícito por la frase siguiente, y el pronombre ''lo'' remite a Jesús.'
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: '''De entre los muertos'' expresa mejor la referencia a la resurrección desde el grupo de los muertos y sigue el uso español bíblico claro sin perder precisión.'
- source_word: σωθήσῃ
  english_pob_choice: you will be saved
  chosen_spanish: serás salvo
  alternatives_spanish:
  - serás rescatado
  - serás salvado
  lexicon: BDAG
  rationale: '''Serás salvo'' preserva el registro soteriológico tradicional y directo, fiel al futuro pasivo de σῴζω en este contexto paulino.'
theological_decisions:
- issue: Título cristológico κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - amo
  - maestro
  rationale: En Romanos 10:9, κύριος funciona como título confesional con fuerte peso bíblico y cristológico. 'Señor' conserva esa densidad y evita reducirlo a un simple 'maestro'.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Forma de la confesión κύριον Ἰησοῦν
  english_pob_reading: that Jesus is Lord
  chosen_spanish_reading: que Jesús es Señor
  alternative_spanish_readings:
  - Jesús como Señor
  - que Jesús es el Señor
  rationale: La construcción en español expresa el contenido confesional de modo explícito, como hace el inglés POB. Se evita una formulación que pudiera sonar más nominal que predicativa o que cierre indebidamente la ambigüedad del griego.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; translate titles'
- issue: Soteriología de σωθήσῃ
  english_pob_reading: you will be saved
  chosen_spanish_reading: serás salvo
  alternative_spanish_readings:
  - serás rescatado
  - serás librado
  rationale: El contexto de Romanos 10 es salvación en sentido pleno; 'serás salvo' conserva el lenguaje doctrinal sin añadir explicaciones ajenas al texto.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy: do not import doctrinal claims beyond the text'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del control cruzado y conserva las decisiones del POB inglés: causal ''porque'', condicional ''si'', confesión verbal pública, contenido cristológico explícito y el futuro pasivo de salvación. No se registraron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó 'Jesús' para Ἰησοῦς y 'Dios' para θεός, conforme a los valores por defecto del proyecto.
  - '''Señor'' se reservó para κύριος como título cristológico, sin sustituirlo por ''SEÑOR''.'
  - '''Serás salvo'' mantiene el registro soteriológico tradicional sin expandir el verbo griego.'
  - '''De entre los muertos'' expresa con precisión la resurrección y es idiomático en español bíblico.'
  - La nota al pie a marca la alternativa confesional documentada sin duplicar la ambigüedad en el cuerpo del texto.
