translation:
  language: es
  text: En los tesoros de la sabiduría hay dichos[a] de conocimiento,[b] pero la piedad[c] es una abominación para el pecador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «parábolas» o «proverbios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de entendimiento».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «reverencia a Dios». El hebreo conservado en Kahana para este lugar dice aproximadamente: «Él se alegrará en ella y ella se alegrará en él, y no lo abandones para siempre jamás», y no coincide con el griego; por eso la traducción principal sigue aquí el testimonio griego.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐν θησαυροῖς
  english_pob_choice: In the treasures of
  chosen_spanish: en los tesoros de
  alternatives_spanish:
  - entre los tesoros de
  - dentro de los tesoros de
  lexicon: LSJ
  rationale: θησαυροῖς se rinde de forma natural por «tesoros», conservando la imagen de abundancia y depósito valioso. La preposición ἐν admite «en» con un español fluido y fiel.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - prudencia
  lexicon: LSJ
  rationale: 'El genitivo funciona de modo descriptivo: los tesoros pertenecen a la sabiduría o consisten en ella. «Sabiduría» es la equivalencia más directa y reconocible en español bíblico.'
- source_word: παραβολαὶ
  english_pob_choice: sayings
  chosen_spanish: dichos
  alternatives_spanish:
  - parábolas
  - proverbios
  - sentencias
  lexicon: LSJ
  rationale: En literatura sapiencial, παραβολαί puede abarcar dichos proverbiales. «Dichos» evita restringir prematuramente el término al uso evangélico de «parábolas» y suena natural en español.
- source_word: ἐπιστήμης
  english_pob_choice: insightful
  chosen_spanish: de conocimiento
  alternatives_spanish:
  - de entendimiento
  - sabios
  - con discernimiento
  lexicon: LSJ
  rationale: El griego califica los dichos como relacionados con el conocimiento. En español, una construcción nominal («dichos de conocimiento») preserva esa relación sin forzar un adjetivo moderno que podría sonar interpretativo.
- source_word: βδέλυγμα
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo abominable
  - algo detestable
  lexicon: LSJ
  rationale: «Abominación» conserva la fuerza moral y religiosa del término, ampliamente atestiguada en el lenguaje bíblico.
- source_word: ἁμαρτωλῷ
  english_pob_choice: to a sinner
  chosen_spanish: para el pecador
  alternatives_spanish:
  - a un pecador
  - ante el pecador
  lexicon: LSJ
  rationale: El dativo expresa aquí la perspectiva del pecador. «Para el pecador» comunica bien que la piedad resulta repulsiva desde su orientación moral.
- source_word: θεοσέβεια
  english_pob_choice: godliness
  chosen_spanish: la piedad para con Dios
  alternatives_spanish:
  - la piedad
  - la reverencia a Dios
  - la devoción a Dios
  lexicon: LSJ
  rationale: θεοσέβεια denota reverencia o piedad dirigida a Dios. Añadir «para con Dios» evita una posible ambigüedad en español y mantiene el sentido religioso-ético del término.
theological_decisions:
- issue: Desajuste entre el hebreo conservado y el paralelo griego para Sirácides 1:24
  english_pob_reading: The English audit trail notes that the extant Cairo Geniza Hebrew line in Kahana is a major mismatch and that the Greek parallel is the usable basis for the verse text, with the Hebrew discrepancy preserved in a footnote.
  chosen_spanish_reading: Se traduce el verso según el testimonio griego, y se señala en nota la divergencia del hebreo conservado.
  alternative_spanish_readings:
  - Traducir el hebreo extenso y relegar el griego a nota
  - Harmonizar ambos testimonios en una sola redacción
  rationale: El material fuente indica un desajuste importante entre el hebreo y el griego. Para no borrar la tensión documental, la línea principal sigue el griego y la nota preserva la variante hebrea tal como exige la transparencia editorial del proyecto.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva y desde el griego donde no; preservar honestamente la incertidumbre textual'
- issue: Valor semántico de θεοσέβεια
  english_pob_reading: The English POB renders θεοσέβεια as 'godliness,' with 'piety' as an alternative.
  chosen_spanish_reading: «la piedad para con Dios»
  alternative_spanish_readings:
  - la piedad
  - la devoción a Dios
  - la reverencia a Dios
  rationale: En español, «piedad» puede sonar demasiado general; la expansión «para con Dios» explicita el objeto del término sin introducir doctrina ajena al texto. Así se preserva el matiz ético-religioso de θεοσέβεια.
  doctrine_reference: LSJ / uso bíblico sapiencial de θεοσέβεια
translation_notes:
  revision_awareness: La revisión disponible en el expediente cambió un borrador previo que seguía el griego y sustituyó la frase por una redacción basada en el hebreo conservado. Dado que el paquete fuente marca ese hebreo como major_mismatch frente a Sirácides 1:24, esta versión española vuelve a anclarse en el paralelo griego y documenta la discrepancia textual en nota, en coherencia con el auditable source trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiere; aquí no aparece el nombre divino.
  - «Piedad para con Dios» evita el término eclesiástico más cargado y mantiene el matiz del griego.
  - «Dichos» se prefiere a «parábolas» para no importar el sentido narrativo de los Evangelios.
  - La nota textual explica la tensión hebreo/griego sin intentar armonizarla en el cuerpo del verso.
