review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja con bastante fidelidad la secuencia y el contenido del griego: «Y entonces», «enviará a los ángeles», «reunirá», «los escogidos», «de los cuatro vientos» y el merismo «desde el extremo de la tierra hasta el extremo del cielo». No añade el posesivo inexistente en griego y preserva bien la imaginería apocalíptica. La única desviación relevante está en la nota a, donde «electos» no es la mejor alternativa tradicional para ἐκλεκτούς en español bíblico; «elegidos» o «los elegidos» corresponde mejor.'
  spanish_quality_summary: La redacción principal es natural, clara y digna en español eclesial contemporáneo. «Escogidos» funciona bien y «extremo» evita arcaísmo innecesario. La puntuación y el flujo son correctos. La nota b suena algo forzada con «de toda dirección»; en español más natural debe decir «de todas las direcciones» o «de toda dirección» pero mejor la primera. Las notas necesitan un pequeño ajuste de idiomaticidad y de terminología tradicional.
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. La decisión «escogidos» para ἐκλεκτούς es defendible y coherente con la filosofía POB. Sin embargo, la alternativa tradicional documentada en la nota no debe ser «los electos», ya que en español bíblico y teológico tradicional la forma normal es «los elegidos» o, menos probablemente, «los electos» en registros muy marcados. Conviene armonizar la nota con el uso español más reconocible.
  issues:
  - severity: medium
    issue: Nota a usa «los electos» como alternativa tradicional
    rationale: Aunque reproduce de cerca el inglés «the elect», en español bíblico general «los elegidos» es mucho más natural, comprensible y tradicional que «los electos», que suena administrativo o poco idiomático.
  - severity: low
    issue: 'Nota b contiene una formulación poco natural: «de toda dirección»'
    rationale: El sentido es correcto, pero en español fluido conviene «de todas las direcciones» o «de todos los rumbos». Así se preserva mejor la inteligibilidad de la nota cultural.
  revised_spanish_text: Y entonces enviará a los ángeles y reunirá a los escogidos[a] de los cuatro vientos[b], desde el extremo de la tierra hasta el extremo del cielo[c].
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, «los elegidos».
    reason: lexical_alternative
  - marker: b
    text: «Los cuatro vientos» es un modismo que significa de todas las direcciones, es decir, de todos los lugares.
    reason: cultural_note
  - marker: c
    text: 'Algunas traducciones vierten la última frase de manera más interpretativa: «desde el extremo más lejano de la tierra hasta el extremo más lejano del cielo» o «de un extremo del cielo al otro».'
    reason: alternative_reading
  revision_rationale: 'La traducción principal es sólida y fiel al griego y al expediente inglés. Solo requiere una reparación menor en las notas: sustituir «los electos» por «los elegidos» como alternativa tradicional española más natural para ἐκλεκτούς, y mejorar la naturalidad de la explicación del modismo «los cuatro vientos».'
