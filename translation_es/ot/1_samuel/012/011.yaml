translation:
  language: es
  text: Yahvé envió a Jerubaal[a], a Bedán[b], a Jefté y a Samuel, y los libró de la mano de sus enemigos que los rodeaban, y ustedes vivieron seguros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jerubaal es otro nombre de Gedeón (véanse Jueces 6:32; 7:1).
    reason: cross_reference
  - marker: b
    text: 'Hebreo: «Bedán». La identidad es incierta; algunos intérpretes entienden que se refiere a Barac o, menos comúnmente, a Abdón.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, conservando la referencia explícita al nombre propio del pacto y evitando el reemplazo por una convención de máscara.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שׁלח aquí significa simplemente enviar; «envió» es natural en español y no añade matices innecesarios.
- source_word: יְרֻבַּעַל
  english_pob_choice: Jerubbaal
  chosen_spanish: Jerubaal
  alternatives_spanish:
  - Jerobaal
  - Gedeón
  lexicon: HALOT
  rationale: Se conserva el nombre fuente en forma transliterada española. No se sustituye por Gedeón en el texto principal, porque el hebreo dice Jerubbaal y la identificación se documenta aparte.
- source_word: בְּדָן
  english_pob_choice: Bedan
  chosen_spanish: Bedán
  alternatives_spanish:
  - Barac
  - Abdón
  lexicon: HALOT
  rationale: Se mantiene el nombre tal como aparece en el texto consonántico. La incertidumbre de identidad se refleja en nota, no mediante emendación en el cuerpo del texto.
- source_word: יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: Jefté
  alternatives_spanish:
  - Jefta
  lexicon: HALOT
  rationale: Se usa la transliteración española común y reconocible del nombre propio.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: וַיַּצֵּל
  english_pob_choice: delivered
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: HALOT
  rationale: נצל expresa librar o rescatar de peligro. «Los libró» conserva bien la fuerza de liberación y encaja con el giro idiomático siguiente.
- source_word: מִיַּד אֹיְבֵיכֶם
  english_pob_choice: from the hand of your enemies
  chosen_spanish: de la mano de sus enemigos
  alternatives_spanish:
  - del poder de sus enemigos
  - de las manos de sus enemigos
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «la mano» como poder/control. En español, «de la mano de» es claro y auditable.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: de alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: La idea espacial de enemigos circundantes se expresa de forma directa y sobria.
- source_word: וַתֵּשְׁבוּ
  english_pob_choice: you lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaron
  - se establecieron
  lexicon: HALOT
  rationale: ישׁב aquí indica una condición estable de residencia/vida. «Vivieron» es natural y evita arcaísmo, manteniendo el resultado de vivir en paz.
- source_word: בֶּטַח
  english_pob_choice: in safety
  chosen_spanish: seguros
  alternatives_spanish:
  - en seguridad
  - con seguridad
  lexicon: HALOT
  rationale: בטח expresa estado de seguridad frente a amenaza. «Seguros» comunica el estado resultante con fluidez en español.
theological_decisions:
- issue: Identidad de Jerubbaal
  english_pob_reading: Jerubbaal is retained in the main text; a footnote identifies him as Gideon.
  chosen_spanish_reading: Jerubaal se mantiene en el cuerpo del texto; la nota lo identifica como Gedeón.
  alternative_spanish_readings:
  - Gedeón en el texto principal
  rationale: Se preserva la forma textual recibida y la tensión onomástica, sin armonizar silenciosamente con el nombre más conocido. La nota permite la identificación tradicional sin borrar el dato del hebreo.
  doctrine_reference: 'Translation philosophy: primacía del texto fuente y preservación de tensiones documentadas.'
- issue: Identidad incierta de Bedán
  english_pob_reading: Hebrew 'Bedan.' The identity is uncertain; some interpreters understand this as Barak or, less commonly, Abdon.
  chosen_spanish_reading: Bedán se deja en el texto principal con nota sobre la identidad incierta.
  alternative_spanish_readings:
  - Barac
  - Abdón
  rationale: El texto hebreo conserva Bedán; traducirlo como otro juez resolvería indebidamente una dificultad que el testimonio fuente no resuelve. La nota mantiene las alternativas interpretativas.
  doctrine_reference: 'Translation philosophy: original-language primacy over harmonization; preserve textual ambiguity where the source does.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión del inglés auditado que sustituyó «so that» por una simple coordinación con «and», evitando en español una estructura final que no está en el hebreo. También se reflejó la opción revisada de preservar la coordinación de acciones: envío, liberación y vida segura, sin añadir causalidad extra.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió «los libró» para mantener la fuerza de rescate/liberación del verbo נצל.
  - Se conservó la metáfora hebrea de «la mano» en vez de reemplazarla por una abstracción más interpretativa.
  - Los nombres propios se transliteran de modo natural para el español, evitando sustituciones por identidades interpretativas en el texto principal.
  - 'La secuencia verbal final mantiene la coordinación sencilla del hebreo: envió, libró y vivieron seguros.'
