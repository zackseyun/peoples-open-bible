    text: O «intercede ... en favor de tus siervos».
    reason: lexical_alternative
  revision_rationale: 'Se hace un ajuste menor de naturalidad en español: «pedir un rey para nosotros» expresa con más fluidez el infinitivo hebreo con לָנוּ sin alterar el sentido ni el énfasis confesional. Se conserva la nota léxica alternativa porque el sentido intercesor de הִתְפַּלֵּל sigue siendo pertinente.'
