    text: Or 'like an angel of God'; the Hebrew phrase could also be understood more broadly as 'like a messenger of God.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to hear the good and the evil,' an idiom for discerning or judging between good and evil.
    reason: lexical_alternative
