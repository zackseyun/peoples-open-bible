translation:
  language: es
  text: Y vivió Kenán ochocientos cuarenta años después de engendrar[a] a Mahalalel, y engendró[a] hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «procrear» / «procreó» en ambas ocurrencias del verbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En las genealogías de Génesis, חיה en wayyiqtol introduce la duración de vida; en español, «vivió» comunica de manera natural esa fórmula sin perder el valor temporal.
- source_word: קֵינָן
  english_pob_choice: Kenan
  chosen_spanish: Kenán
  alternatives_spanish:
  - Cainán
  lexicon: Transliteración hebrea estándar
  rationale: Se sigue la forma hebrea קֵינָן, con acento gráfico para la pronunciación española. «Cainán» responde más bien a la tradición griega/latina.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición temporal se vierte de forma directa y natural en español como relación de posterioridad.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: de haber engendrado a
  alternatives_spanish:
  - de haber engendrado
  - después de haber sido padre de
  lexicon: HALOT
  rationale: El verbo ילד en hifil con sujeto masculino expresa engendrar/fecundar como padre. «Engendrar» conserva ese sentido más fielmente que un giro más general como «ser padre de».
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  lexicon: Transliteración hebrea estándar
  rationale: Se mantiene la transliteración del nombre propio según la forma hebrea, sin depender de la tradición griega.
- source_word: אַרְבָּעִים שָׁנָה וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  english_pob_choice: eight hundred and forty years
  chosen_spanish: ochocientos cuarenta años
  alternatives_spanish:
  - cuarenta años y ochocientos años
  - ochocientos y cuarenta años
  lexicon: HALOT
  rationale: El hebreo suma los números en un orden que en español se expresa naturalmente como total único, preservando el total cronológico de la fórmula.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y engendró hijos
  - y fue padre de
  lexicon: HALOT
  rationale: Se mantiene la repetición lexical con הוֹלִידוֹ mediante «engendró», evitando suavizar el verbo con un giro menos preciso.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: Aunque el hebreo distingue sexos, en español «hijos e hijas» es la formulación natural y fiel para señalar la descendencia masculina y femenina.
translation_notes:
  revision_awareness: La redacción sigue la fórmula genealógica hebrea con orden natural en español, tomando en cuenta la revisión inglesa que ya consolidó «lived eight hundred and forty years after he fathered Mahalalel» para evitar una interrupción sintáctica. No se requieren notas textuales ni variantes adicionales para este versículo.
  spanish_consistency_notes:
  - Se conserva la transliteración hebrea «Kenán» para ajustarse a la forma מקורית del texto hebreo.
  - Se usa «engendró» de manera consistente para ambos usos del verbo ילד en este versículo.
  - Se mantiene el plural explícito «hijos e hijas» para reproducir el paralelismo del hebreo.
