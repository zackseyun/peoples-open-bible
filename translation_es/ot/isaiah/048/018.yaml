review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la sintaxis contrafactual y el paralelismo poético del hebreo: לוא + perfecto se vierte naturalmente con «¡Ojalá hubieras...!», y ויהי se expresa correctamente con «habría sido». «Prestado atención», «mandamientos», «paz», «como un río» y «como las olas del mar» conservan fielmente el sentido fuente. Sin embargo, en וְצִדְקָתְךָ el inglés POB auditado eligió explícitamente «righteousness» en el texto principal, dejando «justice» como alternativa en nota. El borrador invierte esa decisión en español al poner «tu justicia» en el texto y «tu rectitud» en nota, lo cual no preserva la decisión léxico-teológica documentada.'
  spanish_quality_summary: El español es claro, natural y digno. No hay calcos torpes, y el ritmo poético funciona bien. La única reparación necesaria es alinear mejor «צדקה» con la decisión auditada y ajustar las notas para que reflejen alternativas reales del expediente inglés, evitando introducir notas sobre «paz» que no están sustentadas por el audit trail. «Tu rectitud» suena bien en español bíblico moderno como equivalente principal de «righteousness».
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «mandamientos», «paz», «río», «olas del mar». El punto a corregir es צדקה / δικαιοσύνη: por defecto del proyecto y por la rationale auditada, aquí debe privilegiarse «rectitud» o una forma equivalente de «righteousness» en el texto principal, no «justicia», dejando «justicia» como alternativa en nota.'
  issues:
  - severity: medium
    issue: El texto principal usa «tu justicia» para וְצִדְקָתְךָ
    rationale: El expediente inglés escogió «your righteousness» en el texto principal por el vínculo moral-covenantal con la obediencia a los mandamientos. En español, «tu rectitud» preserva mejor esa decisión; «tu justicia» debe quedar como alternativa si se desea nota.
  - severity: medium
    issue: Las notas al pie no siguen las alternativas preservadas por el audit trail
    rationale: La nota [a] sobre «tu bienestar»/«tu plenitud» para «paz» no corresponde a ninguna nota inglesa ni resuelve una ambigüedad nueva en español. En cambio, sí debe preservarse la alternativa de הִקְשַׁבְתָּ («escuchado»/«hecho caso») y la alternativa de צִדְקָה («justicia»).
  - severity: low
    issue: La colocación de marcadores puede alinearse mejor con los términos anotados
    rationale: 'Si se mantienen notas, conviene anclarlas exactamente en las palabras relevantes: una en «prestado atención» y otra en «rectitud», siguiendo la disciplina de notas del proyecto.'
