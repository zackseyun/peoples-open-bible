translation:
  language: es
  text: Por tanto[a], mientras algunos se compadecían de su vejez,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «las cosas de su vejez», una expresión elíptica para las condiciones o rasgos propios de la edad avanzada.'
