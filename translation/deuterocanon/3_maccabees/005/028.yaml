id: 3MA.5.28
reference: 3 Maccabees 5:28
source:
  edition: lxx-swete-1909
  text: τοῦτο δὲ ἡ ἐνέργεια τοῦ πάντα δεσποτεύοντος θεοῦ, τῶν πρὶν αὐτῷ μεμηχανημένων λήθην κατὰ διάνοιαν ἐντεθεικότος.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: minor_mismatch
translation:
  text: But this was the working of God[a], who rules over all, having implanted in the minds of those who had previously plotted against them a forgetfulness of their purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having put forgetfulness into their mind.' The Greek pictures God as placing forgetfulness within those who had been plotting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέργεια
  chosen: working
  alternatives:
  - operation
  - effect
  - activity
  lexicon: LSJ
  rationale: ἐνέργεια denotes active working or operative power. 'Working' is natural English and preserves the sense of effective action without sounding overly technical.
- source_word: τοῦ πάντα δεσποτεύοντος θεοῦ
  chosen: of God, who rules over all
  alternatives:
  - of the God who is master of all
  - of God, sovereign over all
  lexicon: LSJ
  rationale: δεσποτεύω conveys exercising lordship/mastery. 'Rules over all' communicates universal sovereignty in readable English while avoiding the harsher English connotations of 'despot' that would mislead modern readers.
- source_word: τῶν πρὶν αὐτῷ μεμηχανημένων
  chosen: of those who had previously plotted against them
  alternatives:
  - of those who had previously contrived against them
  - of those who had earlier devised schemes against him
  lexicon: LSJ
  rationale: μεμηχανημένων from μηχανάομαι means to devise, contrive, or plot. The dative αὐτῷ in context is best understood collectively/distributively with reference to the Jewish people previously targeted; English idiom prefers the explicit plural 'them.' 'Plotted against' captures hostile intentionality.
- source_word: λήθην
  chosen: a forgetfulness
  alternatives:
  - forgetfulness
  - oblivion
  lexicon: LSJ
  rationale: λήθη is forgetfulness or oblivion. With ἐντεθεικότος, the image is of God placing forgetfulness into their minds; 'a forgetfulness' preserves that implanted quality.
- source_word: κατὰ διάνοιαν
  chosen: in the minds
  alternatives:
  - in mind
  - in their understanding
  - in their thought
  lexicon: LSJ
  rationale: διάνοια refers to mind, understanding, or thought. In this idiom, 'in the minds' gives clear English sense for the internal seat of intention and memory.
- source_word: ἐντεθεικότος
  lemma: ἐντίθημι
  chosen: having implanted
  alternatives:
  - having placed
  - having put into
  lexicon: LSJ
  rationale: The participle from ἐντίθημι means to put in or implant. 'Having implanted' best reflects the inward placement of forgetfulness into the mind and fits the elevated narrative tone.
