revisions:
- from: 'Entonces dijo[a]: «¿Qué es este monumento que veo?». Y los hombres de la ciudad le respondieron[b]: «Es la tumba del hombre de Dios que vino de Judá y proclamó estas cosas que tú has hecho contra el altar de Betel».'
  to: 'Entonces dijo[a]: «¿Qué es este monumento que veo?» Y los hombres de la ciudad le dijeron: «Es la tumba del hombre de Dios que vino de Judá y proclamó[b] estas cosas que has hecho contra el altar de Betel».'
  rationale: Se corrige la puntuación del diálogo según el uso normal del español, se simplifica «le respondieron» a «le dijeron» para reflejar más directamente el hebreo, se elimina el «tú» innecesario para mayor naturalidad, y se ajusta la nota b para conservar mejor las alternativas léxicas auditadas del POB inglés.
