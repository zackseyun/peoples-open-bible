translation:
  language: es
  text: 'Miqueas le dijo: «Quédate conmigo, y sé para mí un padre y un sacerdote; y yo te daré diez piezas de plata[a] al año, un conjunto de ropa[b] y tu sustento». Entonces el levita fue[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «diez plata»; la unidad no se especifica, por lo que «piezas de plata» mantiene la indefinición.
    reason: lexical_alternative
  - marker: b
    text: 'O: «una asignación de ropa».'
    reason: lexical_alternative
  - marker: c
    text: 'O simplemente: «el levita fue»; el verbo hebreo es «fue», aunque en contexto puede implicar que entró en la casa de Miqueas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָה
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Vive
  lexicon: HALOT
  rationale: El imperativo pide que el levita resida con Miqueas; «quédate» suena natural en español y conserva la idea de permanecer con él sin añadir matices.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  lexicon: HALOT
  rationale: Expresa de manera directa la cercanía y asociación personales del hebreo.
- source_word: לְאָב
  english_pob_choice: a father
  chosen_spanish: un padre
  alternatives_spanish:
  - padre
  lexicon: HALOT
  rationale: Se mantiene la metáfora honorífica y relacional del texto, sin sustituirla por un término eclesiástico posterior.
- source_word: וּלְכֹהֵן
  english_pob_choice: and a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - sacerdote
  lexicon: HALOT
  rationale: כהן se traduce de forma directa como «sacerdote»; el artículo indefinido mantiene el paralelismo con «un padre».
- source_word: עֲשֶׂרֶת כֶּסֶף
  english_pob_choice: ten pieces of silver
  chosen_spanish: diez piezas de plata
  alternatives_spanish:
  - diez monedas de plata
  - diez siclos de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «diez plata», sin especificar unidad; «piezas de plata» preserva esa indefinición mejor que «siclos».
- source_word: לַיָּמִים
  english_pob_choice: a year
  chosen_spanish: al año
  alternatives_spanish:
  - por año
  - anualmente
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una remuneración anual; «al año» es claro y fiel en español.
- source_word: וְעֵרֶךְ בְּגָדִים
  english_pob_choice: a set of clothes
  chosen_spanish: un juego de ropa
  alternatives_spanish:
  - una provisión de ropa
  - una muda de ropa
  lexicon: HALOT
  rationale: La frase puede entenderse como provisión/valuación de prendas; «un juego de ropa» comunica de manera concreta y natural la idea de un conjunto provisto.
- source_word: וּמִחְיָתֶךָ
  english_pob_choice: your living
  chosen_spanish: tu sustento
  alternatives_spanish:
  - tu mantenimiento
  - tu manutención
  - tu sustento y vida
  lexicon: HALOT
  rationale: מִחְיָה es sustento/medio de vida; «tu sustento» conserva el sentido amplio de provisión, sin restringirlo solo a alimento.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went in
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - entró
  - se fue a vivir con él
  lexicon: HALOT
  rationale: Aquí el verbo básico es «ir/irse». Se evita añadir la idea de «entró» o «fue a vivir con él» en el texto principal, porque el hebreo solo dice que el levita fue.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita
  lexicon: HALOT
  rationale: Se conserva el título/gentilicio conocido del personaje sin transliteración innecesaria.
theological_decisions:
- issue: El uso honorífico de «padre» en un contexto de culto ilícito
  english_pob_reading: Retain 'father' literally
  chosen_spanish_reading: Mantener «un padre» literalmente
  alternative_spanish_readings:
  - un consejero
  - un patrón
  - un padre espiritual
  rationale: La metáfora familiar está explícita en el hebreo. Mantenerla evita suavizar el trasfondo religioso irregular y no introduce terminología eclesiástica ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: La unidad de la plata no está especificada
  english_pob_reading: Do not specify 'shekels' in the main text
  chosen_spanish_reading: No especificar «siclos» en el texto principal
  alternative_spanish_readings:
  - diez siclos de plata
  rationale: El hebreo no nombra una unidad. Preservar la indefinición respeta la primacía del original y evita completar el dato con una suposición tradicional.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La versión española se ajusta al audit trail inglés: conserva la metáfora de «padre», evita especificar una unidad monetaria inexistente en el hebreo, y refleja el verbo final como un simple «irse» sin sobreinterpretar el movimiento.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Sacerdote» se mantiene para כֹהֵן, acorde con el uso técnico del texto.
  - «Levita» conserva el título étnico-religioso del personaje.
  - La cláusula final se traduce de forma sobria para no añadir una inferencia narrativa que el hebreo no expresa explícitamente.
