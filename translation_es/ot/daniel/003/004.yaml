translation:
  language: es
  text: 'Y el heraldo[a] gritó con fuerza[b]: «A ustedes se les proclama, oh pueblos, naciones y lenguas:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Heraldo» traduce un proclamador oficial en un contexto público o cortesano.
    reason: lexical_alternative
  - marker: b
    text: O «en voz alta». El arameo literalmente alude a fuerza o vigor, aquí con el sentido de volumen o intensidad de la voz.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרוֹזָא
  english_pob_choice: the herald
  chosen_spanish: el heraldo
  alternatives_spanish:
  - el pregonero
  - el anunciador
  lexicon: HALOT
  rationale: Designa a un proclamador oficial en un contexto cortesano. «Heraldo» conserva ese matiz formal mejor que «pregonero», y evita la pérdida de registro.
- source_word: קָרֵא
  english_pob_choice: cried
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - proclamó
  - llamó en voz alta
  lexicon: HALOT
  rationale: El verbo expresa una llamada pública y sonora. «Gritó» comunica bien la acción audible sin volverla demasiado técnica; la proyección de la voz queda reforzada por la frase siguiente.
- source_word: בְחָיִל
  english_pob_choice: aloud
  chosen_spanish: con fuerza
  alternatives_spanish:
  - en voz alta
  - con poder
  - fuertemente
  lexicon: HALOT
  rationale: El arameo literalmente remite a «fuerza/mayor vigor». En español, «con fuerza» mantiene esa base semántica y deja abierta la nota de volumen o intensidad, como en el audit trail inglés.
- source_word: לְכוֹן
  english_pob_choice: To you
  chosen_spanish: A ustedes
  alternatives_spanish:
  - Para ustedes
  - A vosotros
  lexicon: HALOT
  rationale: Marca el dativo plural de dirección. «A ustedes» es natural y neutral para español latinoamericano, conservando el plural sin una calca arcaizante.
- source_word: אָמְרִין
  english_pob_choice: it is proclaimed
  chosen_spanish: se les proclama
  alternatives_spanish:
  - se dice
  - se anuncia
  - se les dice
  lexicon: HALOT
  rationale: La forma aramea funciona como fórmula impersonal oficial. «Se les proclama» reproduce mejor la voz impersonal y el carácter de decreto público que una traducción literal con sujeto explícito.
- source_word: עַמְמַיָּא
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - pueblos y etnias
  lexicon: HALOT
  rationale: El plural distingue grupos colectivos y étnicos. «Pueblos» preserva esa pluralidad distributiva en español y suena más natural que repetir «gentes» o reducirlo a «personas».
- source_word: אֻמַּיָּא
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - naciones-tribus
  - tribus
  - pueblos
  lexicon: HALOT
  rationale: Conviene mantener la diferenciación del segundo término dentro de la enumeración triádica. «Naciones» es la equivalencia más estable y evita fusionarlo con el anterior.
- source_word: לִשָּׁנַיָּא
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: HALOT
  rationale: «Lenguas» conserva la literalidad semítica y la fórmula imperial de Daniel. Aunque «idiomas» sería más explicativo, «lenguas» mantiene la cadencia del listado y la resonancia bíblica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego/aramaico no; se ajusta al audit trail inglés que interpreta la frase como una proclamación oficial impersonal y mantiene la triple enumeración. Se integró el vocativo con «oh» para reflejar la dirección a los oyentes, y se evitó una calca como «ellas están diciendo».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se mantuvo la tripla enumeración «pueblos, naciones y lenguas» para conservar el paralelismo del texto fuente.
  - Se usó español latinoamericano neutral y la fórmula impersonal «se les proclama» para reflejar el valor oficial del arameo.
