  text: וְ/אָשִׁ֤יבָה שֹׁפְטַ֨יִ/ךְ֙ כְּ/בָ/רִ֣אשֹׁנָ֔ה וְ/יֹעֲצַ֖יִ/ךְ כְּ/בַ/תְּחִלָּ֑ה אַחֲרֵי כֵ֗ן יִקָּ֤רֵא לָ/ךְ֙ עִ֣יר הַ/צֶּ֔דֶק קִרְיָ֖ה נֶאֱמָנָֽה־׃
