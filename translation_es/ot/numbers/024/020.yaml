translation:
  language: es
  text: 'Entonces vio a Amalec y pronunció su discurso[a] y dijo: «Amalec fue el primero[b] de las naciones, pero su fin es destrucción total[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pronunció su oráculo» o «pronunció su proverbio»; el término hebreo puede designar un dicho poético, proverbio, burla u oráculo.
    reason: lexical_alternative
  - marker: b
    text: O «el más destacado de las naciones»; la frase hebrea puede indicar prioridad en el tiempo o preeminencia.
    reason: lexical_alternative
  - marker: c
    text: O «su fin es perecer» o «su postrer fin es destrucción»; la expresión hebrea es concisa y destaca una ruina completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא אֶת עֲמָלֵק
  english_pob_choice: Then he saw Amalek
  chosen_spanish: Entonces vio a Amalec
  alternatives_spanish:
  - Y vio a Amalec
  - Luego vio a Amalec
  lexicon: HALOT
  rationale: El verbo ראה se traduce de forma directa como «ver». «Entonces» conserva el avance narrativo del waw consecutivo sin volver la frase pesada.
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  english_pob_choice: took up his discourse
  chosen_spanish: levantó su discurso
  alternatives_spanish:
  - levantó su oráculo
  - pronunció su proverbio
  lexicon: HALOT
  rationale: מָשָׁל puede abarcar dicho poético, proverbio, taunt o pieza oracular. «Discurso» mantiene la amplitud semántica y suena natural en español, mientras «levantó» refleja la expresión idiomática de iniciar una declaración solemne.
- source_word: רֵאשִׁית גּוֹיִם
  english_pob_choice: the first of the nations
  chosen_spanish: el primero de las naciones
  alternatives_spanish:
  - el primero entre las naciones
  - el más destacado de las naciones
  lexicon: HALOT
  rationale: «Primero» preserva la ambigüedad hebrea entre prioridad temporal y preeminencia, como en la POB en inglés. Se evita resolver la frase hacia «entre» o «más destacado» sin necesidad del contexto.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: HALOT
  rationale: Se translitera al español bíblico habitual «Amalec», más natural para lectores de español y fiel al nombre propio hebreo.
- source_word: וְאַחֲרִיתוֹ
  english_pob_choice: but his end
  chosen_spanish: pero su fin
  alternatives_spanish:
  - pero su postrer fin
  - pero su destino final
  lexicon: HALOT
  rationale: אַחֲרִית expresa fin, desenlace o resultado final. «Su fin» es la forma más directa y natural en español, manteniendo la oposición con la primera cláusula.
- source_word: עֲדֵי אֹבֵד
  english_pob_choice: is utter destruction
  chosen_spanish: es destrucción total
  alternatives_spanish:
  - es ruina total
  - es destrucción completa
  - es puro perecer
  lexicon: HALOT
  rationale: La expresión hebrea es breve y enfática. «Destrucción total» comunica la idea de ruina completa sin añadir temporalidades o matices que el texto no expresa explícitamente.
theological_decisions:
- issue: Ambigüedad de רֵאשִׁית גּוֹיִם respecto a prioridad temporal o preeminencia
  english_pob_reading: Preserve the Hebrew ambiguity between temporal priority and preeminence rather than resolving it.
  chosen_spanish_reading: Preservar la ambigüedad entre prioridad temporal y preeminencia con «el primero de las naciones».
  alternative_spanish_readings:
  - Amalec fue el primero entre las naciones
  - Amalec fue el más destacado de las naciones
  - Amalec fue la primera de las naciones
  rationale: El hebreo no obliga a decidir entre «primero en tiempo» o «primero en rango». La redacción española mantiene esa tensión sin imponer una conclusión histórica o teológica no explícita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el análisis comparado quedó en alto acuerdo y no se requirieron ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Amalec» como nombre propio transliterado de forma estándar en español bíblico.
  - Se evita «SEÑOR» o máscaras similares porque el verso no contiene el Tetragrámaton ni una sustitución divina.
  - «Destrucción total» conserva el tono enfático del hebreo sin sobre-interpretar la duración del final.
  - La secuencia narrativa se expresa con «Entonces» para reflejar el waw consecutivo de forma natural en español.
