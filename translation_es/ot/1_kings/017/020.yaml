translation:
  language: es
  text: 'Entonces él clamó a Yahvé y dijo: «¡Oh Yahvé, mi Dios! ¿Acaso también has hecho daño[a] a la viuda con quien me estoy hospedando[b], al hacer morir a su hijo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «has hecho mal a la viuda»; el verbo hebreo puede significar causar daño, traer calamidad o tratar mal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con quien estoy de paso»; el hebreo sugiere residir como huésped o dependiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - invocó
  - clamó a gritos
  lexicon: HALOT
  rationale: En este contexto de oración urgente a Yahvé, קרא con אֶל no es un simple 'decir'; expresa una apelación intensa. 'Clamó' comunica mejor la intensidad y sigue siendo natural en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino revelado en el hebreo, siguiendo la convención del POB en español. No se sustituye por un título ocultador.
- source_word: יְהוָה אֱלֹהָי
  english_pob_choice: O LORD my God
  chosen_spanish: ¡Oh Yahvé, mi Dios!
  alternatives_spanish:
  - Yahvé, mi Dios
  - ¡Oh Yahvé, Dios mío!
  lexicon: HALOT
  rationale: La forma vocativa se refleja con '¡Oh...!' para conservar el tono de súplica directa. 'Mi Dios' reproduce el posesivo del hebreo con claridad y dignidad.
- source_word: הֲגַם
  english_pob_choice: also
  chosen_spanish: acaso también
  alternatives_spanish:
  - también
  - ¿también acaso?
  lexicon: HALOT
  rationale: 'La partícula interrogativa-aditiva expresa sorpresa o conmoción: ''acaso también'' conserva ese matiz interrogativo y acumulativo mejor que un simple ''también''.'
- source_word: עַל הָאַלְמָנָה
  english_pob_choice: on the widow
  chosen_spanish: a la viuda
  alternatives_spanish:
  - sobre la viuda
  - contra la viuda
  lexicon: HALOT
  rationale: Con הֵרַע / הֲרֵעֹתָ, עַל introduce al afectado por la calamidad. En español, 'hacer daño a' expresa de modo natural el daño dirigido a alguien.
- source_word: מִתְגּוֹרֵר עִמָּהּ
  english_pob_choice: with whom I am staying
  chosen_spanish: con la cual yo estoy residiendo
  alternatives_spanish:
  - con quien estoy alojado
  - con quien yo estoy viviendo
  lexicon: HALOT
  rationale: גור en hitpael implica morar como huésped o dependiente. 'Estoy residiendo' conserva mejor la relación temporal/de acogida que un simple 'vivo', sin perder inteligibilidad.
- source_word: הֲרֵעוֹתָ
  english_pob_choice: have you also brought harm
  chosen_spanish: has hecho daño
  alternatives_spanish:
  - has causado mal
  - has afligido
  - has tratado mal
  lexicon: HALOT
  rationale: El hiphil de רעע puede denotar causar daño o calamidad; 'has hecho daño' comunica el sentido causal sin cargar de inmediato una acusación de mal moral absoluto.
- source_word: לְהָמִית
  english_pob_choice: by causing ... to die
  chosen_spanish: al hacer morir
  alternatives_spanish:
  - al matarlo
  - al causarle la muerte
  lexicon: HALOT
  rationale: La forma infinitiva expresa el medio o resultado del daño. 'Al hacer morir' preserva la causalidad del hebreo con un español sobrio y directo.
- source_word: בְּנָהּ
  english_pob_choice: her son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo varón
  - a su hijo
  lexicon: HALOT
  rationale: בן es 'hijo/son'; el contexto narrativo identifica al niño de la viuda, por lo que 'su hijo' es claro y fiel, sin añadir más de lo necesario.
theological_decisions:
- issue: Si la frase atribuye a Dios mal moral o calamidad/harm permitida o causada en sentido judicial/narrativo
  english_pob_reading: have you also brought harm on the widow ... by causing her son to die
  chosen_spanish_reading: ¿acaso también has hecho daño a la viuda ... al hacer morir a su hijo?
  alternative_spanish_readings:
  - ¿acaso también has hecho mal a la viuda ... al matarle a su hijo?
  - ¿acaso también has afligido a la viuda ... al dejar morir a su hijo?
  rationale: 'Se conserva la tensión del hebreo: Elijah atribuye el hecho a Yahvé, pero la traducción evita convertir automáticamente רעע en una acusación de maldad moral. ''Hacer daño'' mantiene abierta la carga de calamidad/daño sin resolverla artificialmente.'
  doctrine_reference: Preservar la tensión teológica del original; primacía del hebreo sobre la tradición de atenuación.
translation_notes:
  revision_awareness: Se incorporó explícitamente la lectura vocativa con «¡Oh Yahvé, mi Dios!», en línea con la revisión más reciente del testimonio inglés. También se mantuvo la tensión léxica de הֲרֵעוֹתָ con una formulación española que no resuelve prematuramente la cuestión teológica.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se eligió «clamó» para el verbo de oración urgente, no un simple «dijo».
  - Se preserva la ambigüedad de רעע con «hacer daño» y se explicita en nota.
  - Se conserva el matiz de residencia temporal con «estoy residiendo».
