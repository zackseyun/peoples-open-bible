translation:
  language: es
  text: Los quebrantarás[b] con cetro de hierro[a]; como vasija de alfarero los harás pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cetro» también puede traducirse «vara»; el término hebreo puede denotar un símbolo de autoridad o un instrumento de disciplina.
    reason: lexical_alternative
  - marker: b
    text: 'O, siguiendo una tradición textual alternativa reflejada en algunas versiones antiguas y evocada en Apocalipsis: «los pastorearás con cetro de hierro[a]» o «los gobernarás con cetro de hierro[a]».'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּרֹעֵם
  english_pob_choice: you will break them
  chosen_spanish: los quebrantarás
  alternatives_spanish:
  - los romperás
  - los pastorearás
  - los gobernarás
  lexicon: HALOT, BDB
  rationale: El puntaje masorético y el paralelismo con el segundo hemistiquio favorecen una imagen de destrucción. En español, «quebrantar» comunica con naturalidad la violencia del verbo sin perder el matiz de juicio; «pastorear» o «gobernar» reflejan la tradición alternativa, pero no la lectura principal adoptada aquí.
- source_word: בְּשֵׁבֶט
  english_pob_choice: with an iron scepter
  chosen_spanish: con vara de hierro
  alternatives_spanish:
  - con cetro de hierro
  - con bastón de hierro
  - con vara
  lexicon: HALOT, BDB
  rationale: שֵׁבֶט puede significar vara, bastón o cetro. En español, «vara de hierro» conserva la ambigüedad entre instrumento de disciplina y símbolo de autoridad, mientras que «cetro» sonarían más interpretativo y menos transparente al hebreo.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: HALOT, BDB
  rationale: Término material directo; «hierro» mantiene la fuerza y severidad del símbolo.
- source_word: כִּכְלִי
  english_pob_choice: like a potter’s vessel
  chosen_spanish: como vasija de alfarero
  alternatives_spanish:
  - como recipiente de alfarero
  - como vaso de alfarero
  lexicon: HALOT, BDB
  rationale: כְּלִי es amplio, pero en combinación con יוֹצֵר la imagen natural en español es la de una vasija hecha por el alfarero. «Vasija» preserva mejor la referencia a fragilidad y quebranto que opciones más genéricas.
- source_word: יוֹצֵר
  english_pob_choice: potter’s
  chosen_spanish: de alfarero
  alternatives_spanish:
  - del alfarero
  lexicon: HALOT, BDB
  rationale: יוֹצֵר denota aquí al alfarero; la construcción posesiva española «de alfarero» es breve y idiomática, y evita sobrecargar la línea.
- source_word: תְּנַפְּצֵם
  english_pob_choice: you will shatter them
  chosen_spanish: los harás pedazos
  alternatives_spanish:
  - los destrozarás
  - los harás añicos
  - los romperás en pedazos
  lexicon: HALOT, BDB
  rationale: El verbo expresa destrucción violenta. «Harás pedazos» es natural, enérgico y mantiene el paralelo imagístico con la vasija quebrada.
theological_decisions:
- issue: 'Sentido del primer verbo: juicio destructivo o gobierno pastoral/real'
  english_pob_reading: 'destructive judgment: ''You will break them'''
  chosen_spanish_reading: 'juicio destructivo: «los quebrantarás»'
  alternative_spanish_readings:
  - 'gobierno pastoral: «los pastorearás»'
  - 'gobierno real: «los gobernarás»'
  rationale: La vocalización masorética y el paralelismo con «como vasija de alfarero los harás pedazos» favorecen una lectura de juicio. Se conserva la alternativa tradicional en el aparato implícito mediante la nota, en lugar de adoptarla en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de שֵׁבֶט en contexto real
  english_pob_reading: staff of authority or instrument of discipline
  chosen_spanish_reading: vara de autoridad o de disciplina
  alternative_spanish_readings:
  - cetro
  - bastón
  rationale: En un salmo real, שֵׁבֶט puede funcionar como símbolo de autoridad y como instrumento de disciplina. «Vara de hierro» permite que el español conserve esa tensión sin cerrarla innecesariamente con una sola etiqueta.
  doctrine_reference: Psalm 2 royal imagery; HALOT/BDB lexical range
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios y mantuvo alto grado de acuerdo con la propuesta previa. La redacción española intenta reflejar ese estado estable, conservando la lectura principal de destrucción y la alternativa textual en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto; aquí no aparece porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «vasija de alfarero» por su transparencia y por la conexión inmediata con la imagen de fragilidad del segundo hemistiquio.
  - Se evitó «cetro» en el texto principal para no fijar una interpretación más específica que la del hebreo, aunque sigue siendo una alternativa válida en la nota lexical implícita del registro.
