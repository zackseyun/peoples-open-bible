translation:
  language: es
  text: Si, pues, un anciano despreció torturas hasta la muerte por causa de la piedad[a], con toda seguridad la razón piadosa gobierna las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por amor de la piedad». El giro griego puede entenderse con matiz de finalidad además de causalidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γέρων
  english_pob_choice: an old man
  chosen_spanish: un anciano
  alternatives_spanish:
  - un hombre viejo
  - un viejo
  lexicon: LSJ
  rationale: El griego designa a un varón de edad avanzada. «Anciano» conserva la referencia masculina singular y suena natural en español bíblico sin cargar el texto con una aspereza innecesaria.
- source_word: τῶν μέχρι θανάτου βασάνων
  english_pob_choice: tortures even to the point of death
  chosen_spanish: torturas hasta la muerte
  alternatives_spanish:
  - tormentos hasta la muerte
  - torturas incluso hasta la muerte
  lexicon: LSJ
  rationale: βάσανοι aquí son tormentos físicos severos; «torturas» refleja mejor esa fuerza. La frase «hasta la muerte» reproduce el alcance de μέχρι θανάτου de forma natural y fiel.
- source_word: περιεφρόνησεν
  english_pob_choice: despised
  chosen_spanish: despreció
  alternatives_spanish:
  - menospreció
  - desdeñó
  - consideró insignificantes
  lexicon: LSJ
  rationale: El verbo expresa desprecio o tener en poco. «Despreció» mantiene la fuerza retórica de que los tormentos fueron tenidos por cosa menor frente a la fidelidad a Dios.
- source_word: διʼ εὐσέβειαν
  english_pob_choice: because of piety
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - a causa de la piedad
  - por amor de la piedad
  - por reverencia hacia Dios
  lexicon: LSJ
  rationale: εὐσέβεια en 4 Macabeos tiene el sentido de devoción reverente a Dios. «Por causa de» conserva el valor causal de διά y mantiene la conexión con la razón por la que soportó las torturas.
- source_word: ὁμολογουμένως
  english_pob_choice: surely
  chosen_spanish: con toda seguridad
  alternatives_spanish:
  - ciertamente
  - sin duda
  - admitidamente
  lexicon: LSJ
  rationale: El adverbio introduce una conclusión aceptada o evidente. «Con toda seguridad» transmite bien esa inferencia enfática en español contemporáneo.
- source_word: ἡγεμὼν
  english_pob_choice: ruler
  chosen_spanish: señor
  alternatives_spanish:
  - ruler
  - gobernante
  - dueño
  lexicon: LSJ
  rationale: En el contexto filosófico, el término indica dominio o autoridad sobre los impulsos internos. «Señor de» expresa esa soberanía interior con naturalidad en español, sin restringirlo a un cargo político.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de los impulsos
  - de las emociones
  - de los deseos
  lexicon: LSJ
  rationale: πάθη es un término técnico en 4 Macabeos para las pasiones o impulsos desordenados. «Pasiones» preserva ese sentido filosófico mejor que opciones más modernas como «emociones».
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: pious reason
  chosen_spanish: el razonamiento piadoso
  alternatives_spanish:
  - la razón piadosa
  - la razón devota
  - el juicio piadoso
  lexicon: LSJ
  rationale: La expresión es programática en 4 Macabeos y une la dimensión racional con la devoción a Dios. «Razonamiento piadoso» conserva el matiz de actividad racional y mantiene la relación con εὐσέβεια.
theological_decisions:
- issue: Valor de ὁ εὐσεβὴς λογισμός como concepto central del libro
  english_pob_reading: pious reason
  chosen_spanish_reading: el razonamiento piadoso
  alternative_spanish_readings:
  - la razón piadosa
  - la razón devota
  - la razón ordenada por la piedad
  rationale: 'La frase sintetiza la tesis de 4 Macabeos: la razón, orientada por la devoción reverente a Dios, gobierna las pasiones. «Razonamiento piadoso» preserva tanto la dimensión intelectual como la moral-religiosa sin introducir vocabulario doctrinal posterior.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Fuerza causal o final de διʼ εὐσέβειαν
  english_pob_reading: because of piety
  chosen_spanish_reading: por causa de la piedad
  alternative_spanish_readings:
  - a causa de la piedad
  - por la piedad
  - por amor a la piedad
  rationale: 'El griego admite un matiz causal y también uno final. Aquí se conserva el valor causal principal: el anciano despreció las torturas debido a su devoción reverente; la posible lectura final queda implícita sin forzarla.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El inglés auditado está en acuerdo alto y no muestra revisiones aplicadas. La redacción española sigue directamente el texto griego y conserva las decisiones léxicas y teológicas documentadas, especialmente la tensión causal/final de διʼ εὐσέβειαν y el término programático λογισμός.
  spanish_consistency_notes:
  - Se mantuvo «piedad» para εὐσέβεια, conforme al uso interno del libro, sin sustituirlo por fórmulas eclesiásticas más tradicionales.
  - Se tradujo πάθη como «pasiones» para conservar el sentido técnico filosófico de 4 Macabeos.
  - Se evitó «Cristo/SEÑOR» u otra terminología ajena al pasaje, ya que no aparece en el original.
  - «Razonamiento piadoso» busca mantener la relación transparente entre λογισμός y la ética de la devoción a Dios.
