review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: David y la gente con él lloran hasta quedar exhaustos. También conserva la repetición de בכה mediante ''lloraron ... llorar''. Sin embargo, la construcción ''alzaron su voz'' en español suena menos natural que la opción idiomática plena ''alzaron la voz'', y el pie actual no funciona como alternativa porque repite esencialmente la misma forma. Además, ''el pueblo'' puede entenderse como una población civil más que como la gente que acompañaba a David; ''la gente'' conserva mejor la amplitud de עָם sin inducir ese matiz.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste pequeño para sonar natural en español bíblico moderno. 'Alzaron la voz' es la expresión idiomática estable. 'La gente que estaba con él' mejora la legibilidad y evita una posible lectura de 'pueblo' como colectividad nacional o ciudad. El resto del verso fluye bien y mantiene tono sobrio.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión sobre עָם debe seguir el criterio auditado: no estrechar a ''hombres'' o ''tropas''. ''La gente'' cumple mejor que ''el pueblo'' en este contexto narrativo. La nota léxica debe preservar la alternativa más literal ''levantaron su voz''.'
  issues:
  - severity: medium
    issue: '''alzaron su voz'' no es la formulación más natural en español'
    rationale: El hebreo tiene el modismo נָשָׂא + קול. En español, la expresión idiomática correspondiente es 'alzar la voz'. Mantener 'su voz' aquí suena calcado y menos elegante.
  - severity: medium
    issue: La nota al pie actual no aporta una verdadera alternativa
    rationale: Dice 'alzaron su voz y lloraron', que prácticamente repite la redacción principal. Si el texto principal se corrige a 'alzaron la voz', la nota puede conservar la alternativa más literal 'levantaron su voz y lloraron'.
  - severity: low
    issue: '''el pueblo'' puede inducir un matiz demasiado específico'
    rationale: Aunque עָם puede traducirse 'pueblo', aquí el sentido es la gente que estaba con David. 'La gente' evita sugerir una nación o población civil y sigue siendo amplio como el hebreo.
  revised_spanish_text: Entonces David y la gente que estaba con él alzaron la voz[a] y lloraron hasta que no les quedó fuerza para llorar.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «levantaron su voz y lloraron».
    reason: lexical_alternative
