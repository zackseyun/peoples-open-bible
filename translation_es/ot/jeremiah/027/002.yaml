translation:
  language: es
  text: 'Así me dijo Yahvé: «Hazte ligaduras y barras de yugo[a], y ponlas sobre tu cuello».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ligaduras y barras de yugo»; algunas traducciones simplifican a «correas y yugos».'
