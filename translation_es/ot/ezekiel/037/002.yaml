translation:
  language: es
  text: Y me hizo pasar entre ellos[a], todo en derredor; y he aquí, había muchísimos sobre la superficie del valle, y he aquí[b], estaban muy secos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hizo pasar sobre ellos todo en derredor». El hebreo puede expresarse de manera más formal, pero el texto principal comunica el sentido espacial más probable en español natural.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «sobre la faz del valle».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱבִירַנִי
  english_pob_choice: he led me around
  chosen_spanish: me hizo pasar alrededor
  alternatives_spanish:
  - me condujo alrededor
  - me llevó alrededor
  - me hizo pasar
  lexicon: HALOT
  rationale: El Hifil de עבר expresa causa de pasar o mover. En español, "me hizo pasar alrededor" conserva mejor la causalidad que "me condujo" y mantiene el matiz visionario sin sonar forzado.
- source_word: עֲלֵיהֶם
  english_pob_choice: among them
  chosen_spanish: alrededor de ellos
  alternatives_spanish:
  - entre ellos
  - sobre ellos
  - junto a ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "sobre/encima de ellos", el contexto de movimiento entre los huesos en la visión favorece una relación espacial de rodearlos. "Alrededor de ellos" comunica bien esa ubicación sin sugerir elevación física.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo en derredor
  alternatives_spanish:
  - alrededor y alrededor
  - por todas partes
  - en derredor
  lexicon: HALOT
  rationale: La duplicación intensifica el movimiento circular. "Todo en derredor" conserva la fuerza enfática con un registro natural y digno en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  - y vi
  lexicon: HALOT
  rationale: La partícula introduce una percepción vívida en la visión profética. "Y he aquí" preserva ese golpe retórico tradicional y claro en español bíblico.
- source_word: רַבּוֹת מְאֹד
  english_pob_choice: very many
  chosen_spanish: muchísimos
  alternatives_spanish:
  - muy muchos
  - en grandísima cantidad
  - muchos en extremo
  lexicon: HALOT
  rationale: El adjetivo plural intensificado refiere a los huesos implícitos. "Muchísimos" transmite la abundancia de manera natural y fiel a la intensificación hebrea.
- source_word: עַל־פְּנֵי הַבִּקְעָה
  english_pob_choice: on the surface of the valley
  chosen_spanish: sobre la superficie del valle
  alternatives_spanish:
  - sobre el פני del valle
  - en la cara del valle
  - extendidos por el valle
  lexicon: HALOT
  rationale: '"Sobre la superficie del valle" mantiene la imagen idiomática de "sobre la faz/cara de" sin volverlo opaco en español. Se eligió "superficie" para conservar el valor visual del hebreo.'
- source_word: יְבֵשׁוֹת מְאֹד
  english_pob_choice: very dry
  chosen_spanish: muy secos
  alternatives_spanish:
  - extremadamente secos
  - completamente secos
  - secos en gran manera
  lexicon: HALOT
  rationale: El adjetivo con intensificador describe el estado de los huesos. "Muy secos" es exacto, sobrio y mantiene la sencillez del hebreo y del POB inglés.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente permanece sin cambios; este borrador sigue el estado de alta concordancia y conserva las dos notas léxicas principales: el causativo de עבר y el hebraísmo de עַל־פְּנֵי.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como término de política general, aunque este versículo no lo contiene.
  - Se evitó "SEÑOR" y "Cristo" por no corresponder al texto.
  - Se conservó el paralelismo repetitivo de "y he aquí" para reflejar la cadencia visionaria del hebreo.
  - '"Huesos" queda implícito en el versículo anterior, como en el inglés POB; no se añadió para no exceder el texto fuente.'
