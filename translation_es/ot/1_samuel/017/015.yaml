translation:
  language: es
  text: Ahora David iba y venía[a] de junto a Saúl para pastorear el rebaño de su padre en Belén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «David iba y volvía de Saúl para apacentar el rebaño de su padre en Belén».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹלֵךְ וָשָׁב
  english_pob_choice: went back and forth
  chosen_spanish: iba y venía
  alternatives_spanish:
  - iba y retornaba
  - andaba de ida y vuelta
  lexicon: HALOT
  rationale: La pareja verbal expresa movimiento repetido o habitual; en español, «iba y venía» comunica de forma natural esa iteración sin perder el carácter narrativo continuo del hebreo.
- source_word: מֵעַל שָׁאוּל
  english_pob_choice: from Saul
  chosen_spanish: de junto a Saúl
  alternatives_spanish:
  - de Saúl
  - de la presencia de Saúl
  lexicon: HALOT
  rationale: La idea literal de salir de sobre/desde Saúl se entiende aquí como separación de su esfera o compañía. «De junto a Saúl» conserva mejor la proximidad relacional que un simple «de Saúl».
- source_word: לִרְעוֹת
  english_pob_choice: to shepherd
  chosen_spanish: pastorear
  alternatives_spanish:
  - apacentar
  - cuidar como pastor
  lexicon: HALOT
  rationale: El infinitivo de רעה tiene fuerza pastoral concreta. «Pastorear» mantiene el verbo de oficio y su sentido de cuidar un rebaño.
- source_word: צֹאן
  english_pob_choice: flock
  chosen_spanish: rebaño
  alternatives_spanish:
  - ganado menor
  - manada de ovejas
  lexicon: HALOT
  rationale: צֹאן nombra al conjunto de animales de pastoreo; «rebaño» es el equivalente colectivo más natural en español en este contexto.
- source_word: אָבִיו
  english_pob_choice: his father's
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su papá
  lexicon: HALOT
  rationale: El constructo posesivo se expresa con claridad y dignidad en español mediante «de su padre».
- source_word: בֵּית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Betlehem
  lexicon: HALOT
  rationale: El topónimo tradicional castellano «Belén» es el equivalente normal y reconocible de בֵּית לָחֶם; evita una transliteración innecesaria.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de WLC y la solución inglesa auditada: conserva el valor iterativo de הֹלֵךְ וָשָׁב, entiende מֵעַל שָׁאוּל como separación de la esfera de Saúl, y mantiene el oficio pastoral con un verbo español natural. La elección de «Belén» sigue el tratamiento de nombres propios del proyecto.'
  spanish_consistency_notes:
  - Se prefirió «pastorear» a una perífrasis más general para mantener la precisión verbal de לִרְעוֹת.
  - «De junto a Saúl» intenta reflejar la relación espacial/servicial implícita en מֵעַל sin sobreinterpretarla.
  - No se añadió mayúscula a «pastorear» porque no se trata del Espíritu ni de un nombre propio.
