    reason: cross_reference
  - marker: c
    text: Or 'her steppe' or 'her desert.' The Hebrew term refers to an arid plain.
    reason: lexical_alternative
  - marker: d
    text: Or 'and the voice of singing.'
    reason: lexical_alternative
