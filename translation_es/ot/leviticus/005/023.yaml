base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/023.yaml
  text: And it shall be[a], when he sins and becomes guilty, that he shall restore what he took by robbery, or what he extorted, or the deposit that was entrusted to him, or the lost thing that he found[c][b],
  footnotes:
  - marker: a
    text: Or 'if he sins and incurs guilt.' The Hebrew legal formula can be rendered either 'when' or 'if,' and וְאָשֵׁם may be expressed as 'becomes guilty' or 'incurs guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what he obtained by oppression' or 'what he defrauded.' The Hebrew term can denote oppressive or fraudulent seizure of another's property.
    reason: lexical_alternative
  - marker: c
    text: Or 'the lost property he found.'
    reason: lexical_alternative
