translation:
  language: es
  text: 'Y había cuatro hombres con una afección de la piel[a] a la entrada de la puerta, y se dijeron unos a otros: «¿Por qué estamos sentados aquí hasta que muramos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «leprosos». El hebreo se refiere a una condición asociada con צָרַעַת y no necesariamente idéntica a la lepra moderna (enfermedad de Hansen).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעָ֧ה
  english_pob_choice: Now there were four
  chosen_spanish: Y había cuatro
  alternatives_spanish:
  - Ahora había cuatro
  - Y eran cuatro
  lexicon: HALOT
  rationale: El waw introduce una nueva escena; en español, «Y había cuatro» conserva la transición narrativa de manera natural sin añadir énfasis innecesario.
- source_word: אֲנָשִׁ֛ים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: HALOT
  rationale: El sustantivo es masculino plural y designa a cuatro varones concretos del relato. «Hombres» mantiene la precisión de género y el tono narrativo.
- source_word: הָי֥וּ
  english_pob_choice: there were
  chosen_spanish: había
  alternatives_spanish:
  - eran
  - existían
  lexicon: HALOT
  rationale: El valor existencial de היה en este contexto se expresa con naturalidad en español mediante «había».
- source_word: מְצֹרָעִ֖ים
  english_pob_choice: with a skin disease
  chosen_spanish: con una afección de la piel
  alternatives_spanish:
  - con lepra
  - leprosos
  - con una enfermedad de la piel
  lexicon: HALOT
  rationale: Sigo la decisión del POB inglés de no equiparar automáticamente צָרַעַת con la lepra moderna. «Afección de la piel» conserva la referencia a una condición cutánea sin imponer una identificación médica inexacta.
- source_word: פֶּ֣תַח הַ/שָּׁ֑עַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - en la entrada de la puerta
  - a la entrada del portón
  - junto a la entrada de la puerta
  lexicon: HALOT
  rationale: El constructo significa «apertura/entrada de la puerta». «Puerta» funciona aquí como equivalente español natural de «gate» y mantiene la claridad del lugar.
- source_word: וַ/יֹּֽאמְרוּ֙ אִ֣ישׁ אֶל רֵעֵ֔/הוּ
  english_pob_choice: and they said to one another
  chosen_spanish: y se decían unos a otros
  alternatives_spanish:
  - y dijeron el uno al otro
  - y cada uno dijo a su compañero
  lexicon: HALOT
  rationale: La expresión distributiva singular se vierte con una forma idiomática española que expresa reciprocidad sin perder el matiz colectivo.
- source_word: מָ֗ה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Qué?
  - ¿A qué?
  lexicon: HALOT
  rationale: En esta pregunta retórica, מָה funciona idiomáticamente como «por qué», no como un «qué» literal.
- source_word: יֹשְׁבִ֥ים
  english_pob_choice: are we sitting
  chosen_spanish: estamos sentados
  alternatives_spanish:
  - estamos aquí sentados
  - permanecemos sentados
  lexicon: HALOT
  rationale: El participio expresa una acción o estado en curso; «estamos sentados» conserva la imagen de inactividad que motiva la pregunta.
- source_word: פֹּ֖ה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: HALOT
  rationale: Adverbio locativo simple; «aquí» es la equivalencia natural en español.
- source_word: עַד מָֽתְנוּ
  english_pob_choice: until we die
  chosen_spanish: hasta morir
  alternatives_spanish:
  - hasta que muramos
  - hasta que nos muramos
  lexicon: HALOT
  rationale: La frase expresa el límite de permanecer allí. En español, «hasta morir» es conciso y fiel al sentido del hebreo, manteniendo la tensión dramática.
translation_notes:
  revision_awareness: Se siguió de cerca el estado revisado del POB inglés, que mantiene la lectura óptima-equivalente sin cambios y conserva la nota lexical sobre צָרַעַת. La versión española reproduce esa decisión auditada y la adapta al registro natural del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la distinción entre una afección cutánea general y la lepra moderna, siguiendo la nota inglesa.
  - La puntuación y el registro buscan ser bíblicos y legibles en español latinoamericano sin calcos innecesarios.
