revisions:
- from: Por tanto[a], mirad, vienen días, declara Yahvé, cuando a este lugar ya no se le llamará más Topet[b] ni el Valle de Ben-hinom, sino el Valle de la Matanza.
  to: Por tanto, he aquí, vienen días, declara Yahvé, cuando a este lugar ya no se llamará Topet[a] o el Valle de Ben-hinom[b], sino el Valle de la Matanza.
  rationale: Se sustituyó 'mirad' por 'he aquí' para reflejar mejor הִנֵּה en un registro profético impersonal; se simplificó 'ya no se le llamará más' a 'ya no se llamará' para evitar redundancia; se añadió la nota cultural sobre Ben-hinom/Gehena conforme al rastro auditado; y se eliminó la nota estilística innecesaria sobre 'Por tanto'. Se mantuvo 'Yahvé', 'Topet' y 'Valle de la Matanza' por fidelidad y buena legibilidad en español.
