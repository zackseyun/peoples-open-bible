translation:
  language: es
  text: Entonces la hija de Faraón bajó a bañarse al Nilo, mientras sus muchachas andaban a lo largo de la orilla del Nilo. Vio la canasta en medio[a] de los juncos[c], y envió a su sirvienta[b] y la tomó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, 'entre los juncos'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'su sirvienta'; tradicionalmente, algunos traducen 'su brazo'.
    reason: alternative_reading
  - marker: c
    text: El hebreo usa el mismo término que en Génesis 6–9 para el 'arca' de Noé.
    reason: cross_reference
lexical_decisions:
- source_word: וַתֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: ירד expresa movimiento hacia abajo. En español, 'bajó' es natural y conserva la dirección sin sonar forzado.
- source_word: בַּת פַּרְעֹה
  english_pob_choice: Pharaoh’s daughter
  chosen_spanish: la hija de Faraón
  alternatives_spanish:
  - la hija del faraón
  lexicon: HALOT
  rationale: El hebreo es una construcción de relación. 'La hija de Faraón' mantiene el valor transparente y evita una formulación demasiado modernizada que borre el matiz del título/nombre.
- source_word: לִרְחֹץ
  english_pob_choice: to bathe
  chosen_spanish: a bañarse
  alternatives_spanish:
  - a lavarse
  - a bañarse
  lexicon: HALOT
  rationale: En este contexto junto al Nilo, רחץ indica bañarse más naturalmente que lavarse. Se usa el infinitivo pronominal español para reflejar la acción personal.
- source_word: עַל הַיְאֹר
  english_pob_choice: at the Nile
  chosen_spanish: al Nilo
  alternatives_spanish:
  - junto al Nilo
  - en el Nilo
  lexicon: HALOT
  rationale: La preposición עַל aquí es locativa. 'Al Nilo' comunica destino/localización de manera idiomática en español.
- source_word: וְנַעֲרֹתֶיהָ
  english_pob_choice: her young women
  chosen_spanish: sus muchachas
  alternatives_spanish:
  - sus jóvenes
  - sus doncellas
  - sus acompañantes
  lexicon: HALOT
  rationale: נערות refiere a jóvenes mujeres. 'Muchachas' conserva edad y género con naturalidad en español moderno.
- source_word: הֹלְכֹת
  english_pob_choice: were walking
  chosen_spanish: andaban
  alternatives_spanish:
  - iban caminando
  - caminaban
  lexicon: HALOT
  rationale: El participio expresa acción en curso de fondo. 'Andaban' suena natural y conserva el aspecto durativo sin añadir más de lo debido.
- source_word: עַל יַד הַיְאֹר
  english_pob_choice: along the bank of the Nile
  chosen_spanish: a lo largo de la orilla del Nilo
  alternatives_spanish:
  - junto a la orilla del Nilo
  - por la orilla del Nilo
  lexicon: HALOT
  rationale: La expresión idiomática 'junto a la mano de' indica proximidad/borde. 'A lo largo de la orilla del Nilo' explicita la imagen espacial de manera clara y fiel.
- source_word: הַתֵּבָה
  english_pob_choice: the basket
  chosen_spanish: la canasta
  alternatives_spanish:
  - la cesta
  - el arca
  - la caja
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'basket', en español 'canasta' es una equivalencia natural para תבה en este contexto de un recipiente pequeño entre los juncos. Se conserva la nota intertextual sobre el posible vínculo con el arca de Noé en una nota aparte.
- source_word: בְּתוֹךְ הַסּוּף
  english_pob_choice: in the midst of the reeds
  chosen_spanish: en medio de los juncos
  alternatives_spanish:
  - entre los juncos
  - en medio de los juncos
  - entre las cañas
  lexicon: HALOT
  rationale: סוּף puede referir juncos/reeds/rushes. 'Juncos' es una opción idiomática y clara en español; mantiene la imagen botánica sin exceso de especificidad.
- source_word: וַתִּשְׁלַח
  english_pob_choice: she sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - extendió
  lexicon: HALOT
  rationale: שלח normalmente significa enviar. 'Envió' preserva ese valor básico y evita una lectura corporal no apoyada por la sintaxis inmediata.
- source_word: אֲמָתָהּ
  english_pob_choice: her servant girl
  chosen_spanish: su sirvienta
  alternatives_spanish:
  - su criada
  - su esclava
  - su muchacha
  lexicon: HALOT
  rationale: El contexto favorece la lectura de una sirvienta femenina. 'Sirvienta' es transparente y no introduce una nota de clase más fuerte que la requerida por el pasaje.
- source_word: וַתִּקָּחֶהָ
  english_pob_choice: and took it
  chosen_spanish: y la tomó
  alternatives_spanish:
  - y la recogió
  - y la llevó
  - y la agarró
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la canasta. 'La tomó' es la forma más directa y fiel en español.
theological_decisions:
- issue: תֵּבָה en la historia de Moisés y posible eco con el arca de Noé
  english_pob_reading: basket
  chosen_spanish_reading: canasta
  alternative_spanish_readings:
  - arca
  - caja
  rationale: El objeto en contexto es pequeño y está entre juncos; 'canasta' comunica mejor el referente inmediato. La afinidad léxica con el arca de Noé se conserva en la nota, sin forzar el sentido principal del versículo.
  doctrine_reference: intertextualidad bíblica / fidelidad semántica
- issue: אֲמָתָהּ y la posible lectura tradicional 'su brazo'
  english_pob_reading: her servant girl
  chosen_spanish_reading: su sirvienta
  alternative_spanish_readings:
  - su brazo
  - su esclava
  rationale: La lectura con 'sirvienta' encaja con el verbo 'envió' y con la sintaxis. La alternativa tradicional 'su brazo' queda documentada como posibilidad de lectura, pero no se incorpora al texto principal por no ser la preferible aquí.
  doctrine_reference: crítica textual / sintaxis hebrea
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió 'servant girl' sobre 'female servant' por naturalidad. Para el español se adoptó 'sirvienta' por ser la forma más idiomática y clara, manteniendo la lectura servicial femenina y la estructura verbal de envío. También se preservó la decisión auditada de no traducir תבה como 'arca' en el cuerpo principal, aunque se deja constancia del vínculo léxico en la nota.
  spanish_consistency_notes:
  - Se mantuvo 'Faraón' como forma estable del título/nombre en la narrativa.
  - Se usó 'Nilo' sin artículo, de acuerdo con el uso idiomático en español.
  - Se conservó la distinción entre el movimiento de las muchachas y la acción puntual de la hija de Faraón.
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
