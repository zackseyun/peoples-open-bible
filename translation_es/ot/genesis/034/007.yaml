    text: '''In Israel'' likely refers here to Jacob/Israel’s family or covenant community, not yet the later nation in its full historical sense.'
    reason: cultural_note
  - marker: c
    text: Or 'for this should not be done.' The Hebrew expresses a general norm about what is unacceptable.
    reason: alternative_reading
