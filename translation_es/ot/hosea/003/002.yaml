translation:
  language: es
  text: Entonces la compré para mí por quince siclos de plata y un homer y un létec de cebada[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un létec probablemente era una medida seca equivalente a la mitad de un homer.
    reason: cultural_note
  - marker: b
    text: O «por quince piezas de plata». El hebreo dice literalmente «quince plata», con la unidad monetaria entendida por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶכְּרֶהָ
  english_pob_choice: I bought her
  chosen_spanish: la compré
  alternatives_spanish:
  - la adquirí
  - la compré para mí
  lexicon: HALOT
  rationale: El verbo en este contexto indica adquisición mediante pago. En español, «compré» es natural y fiel; se conserva el matiz de transacción explícita del precio que sigue.
- source_word: לִּי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - para mí, para mi propio provecho
  lexicon: HALOT
  rationale: El dativo expresa beneficio o interés personal. «Para mí» comunica bien el sentido reflexivo sin sobrecargar el español.
- source_word: בַּחֲמִשָּׁה עָשָׂר כָּסֶף
  english_pob_choice: for fifteen shekels of silver
  chosen_spanish: por quince siclos de plata
  alternatives_spanish:
  - por quince piezas de plata
  - por quince siclos de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «quince plata», con la unidad monetaria implícita. Siguiendo la decisión inglesa de explicitar la unidad, «siclos de plata» es la forma más clara y directa en español bíblico.
- source_word: חֹמֶר
  english_pob_choice: a homer
  chosen_spanish: un homer
  alternatives_spanish:
  - un homer-medida
  - una medida de homer
  lexicon: HALOT
  rationale: Se translitera el término de medida antiguo para no imponer una equivalencia moderna incierta y para mantener la forma lexical del texto fuente.
- source_word: שְׂעֹרִים
  english_pob_choice: of barley
  chosen_spanish: de cebada
  alternatives_spanish:
  - de cebada
  - de grano de cebada
  lexicon: HALOT
  rationale: La referencia al cereal es directa y se traduce de forma estándar por «cebada».
- source_word: לֵתֶךְ
  english_pob_choice: a lethech
  chosen_spanish: un letéj
  alternatives_spanish:
  - un letec
  - un letéj
  lexicon: HALOT
  rationale: Se translitera el nombre de la medida antigua. En español, «letéj» conserva mejor la aproximación fonética y evita sustituir el término por una equivalencia interpretativa.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al explicitar la unidad monetaria como «siclos de plata» y al mantener separados los dos términos de medida de grano, sin repetir innecesariamente «de cebada» tras «homer». También se preservó la transliteración de las medidas antiguas para respetar la forma del hebreo y la nota cultural asociada al lethech.
  spanish_consistency_notes:
  - Se mantiene «compré» para el verbo de adquisición, en paralelo con la decisión inglesa «I bought her».
  - Se usa «para mí» para reflejar el dativo de interés personal sin introducir una paráfrasis mayor.
  - Las medidas antiguas «homer» y «letéj» se transliteran de forma consistente con la práctica del POB en unidades antiguas.
  - «Cebada» corresponde directamente a שְׂעֹרִים y evita duplicar el cereal después de cada medida, siguiendo la revisión auditada.
