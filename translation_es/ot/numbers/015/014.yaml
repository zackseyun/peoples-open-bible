    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador porque representa bien el hebreo y la auditoría inglesa. Solo se corrige el anclaje de la nota al pie para que recaiga sobre 'ofrenda de alimento', que es el término realmente explicado por la nota.
