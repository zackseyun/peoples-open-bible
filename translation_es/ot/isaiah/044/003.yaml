base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/003.yaml
  text: For I will pour water on the thirsty land[a], and streams on the dry ground; I will pour out my Spirit on your offspring[c][b], and my blessing on your descendants.
  footnotes:
  - marker: a
    text: Or 'the thirsty'; the Hebrew adjective can stand substantivally, but the parallel with 'dry ground' favors understanding the image as thirsty land.
    reason: alternative_reading
  - marker: b
    text: Or 'flowing waters' for 'streams'; the Hebrew term is literally 'things flowing.'
    reason: lexical_alternative
  - marker: c
    text: '''My Spirit'' could also be rendered ''my breath'' or ''my wind,'' but here the context of divine blessing on future generations favors ''Spirit.'''
    reason: lexical_alternative
