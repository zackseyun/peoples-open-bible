translation:
  language: es
  text: Hacer acepción de personas[a] no es bueno[c]; pero por un bocado de pan[b] un hombre transgrede.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «reconocer rostros», un modismo que significa mostrar parcialidad o favoritismo.'
    reason: lexical_alternative
  - marker: b
    text: O «por un pedazo de pan»; el punto es que una persona puede cometer una falta por algo muy pequeño.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «un hombre» en sentido proverbial genérico.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֵּר פָּנִים
  english_pob_choice: to show partiality
  chosen_spanish: hacer acepción de personas
  alternatives_spanish:
  - mostrar parcialidad
  - mostrar favoritismo
  - reconocer rostros
  lexicon: HALOT
  rationale: El hebreo es un modismo literal, “reconocer rostros”, con el sentido ético de favorecer indebidamente a alguien. En español, “hacer acepción de personas” comunica con claridad esa parcialidad sin perder el peso moral del proverbio y conserva una formulación bíblica natural.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es correcto
  - no es bueno en absoluto
  lexicon: HALOT
  rationale: La evaluación hebrea es amplia y moral; “no es bueno” reproduce bien esa valoración sin estrecharla a un matiz legalista.
- source_word: וְעַל
  english_pob_choice: yet for
  chosen_spanish: pero por
  alternatives_spanish:
  - y por
  - aun por
  - sin embargo, por
  lexicon: HALOT
  rationale: 'La partícula introduce un contraste: aun con el principio anterior, se puede delinquir por una ganancia mínima. En español, “pero por” expresa con naturalidad ese giro adversativo y causal.'
- source_word: פַּת לֶחֶם
  english_pob_choice: a piece of bread
  chosen_spanish: un bocado de pan
  alternatives_spanish:
  - una migaja de pan
  - un pedazo de pan
  - un morso de pan
  lexicon: HALOT
  rationale: La expresión apunta a una porción mínima de alimento. “Un bocado de pan” conserva la idea de pequeñez y suena idiomático en español, de modo equivalente al inglés auditado.
- source_word: יִפְשַׁע
  english_pob_choice: will transgress
  chosen_spanish: transgrede
  alternatives_spanish:
  - peca
  - comete una falta
  - se rebela
  lexicon: HALOT
  rationale: El verbo tiene fuerza de transgresión o quebrantamiento moral. “Transgrede” mantiene ese peso ético-jurídico mejor que verbos más débiles como “pecca” o más genéricos como “hace mal”.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: El sustantivo hebreo está en masculino singular y funciona proverbialmente de modo genérico. Se conserva “un hombre” para reflejar con precisión la forma del original y su valor representativo.
theological_decisions:
- issue: Forma proverbial masculina genérica
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  rationale: El hebreo usa גבר en singular masculino como tipo representativo. Se mantiene la forma masculina en español para no neutralizar innecesariamente la estructura del original, dejando claro por el contexto que tiene valor genérico.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto inglés POB fue revisado y quedó sin cambios; la versión española sigue su misma decisión exegética y su movimiento proverbial: una prohibición general seguida de una motivación mínima y concreta.'
  spanish_consistency_notes:
  - Se preserva la equivalencia de “show partiality” con una expresión bíblica estable en español.
  - “Un bocado de pan” mantiene la pequeñez del incentivo, como en el audit trail inglés.
  - Se conserva “un hombre” por la forma masculina genérica del hebreo.
  - La puntuación reproduce la oposición proverbial con punto y coma, natural en español bíblico moderno.
