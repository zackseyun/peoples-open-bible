translation:
  language: es
  text: Que Yahvé te bendiga desde Sion[a][b][c], hacedor de cielos y tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Yahvé te bendiga desde Sion''; el verbo hebreo también puede entenderse como imperfecto simple: ''Yahvé te bendecirá'', pero en este contexto de bendición es mejor verlo como un deseo: ''Que ... te bendiga''.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: ''hacedor de cielos y tierra'', un título que identifica a Yahvé como Creador de todo lo existente.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''el que hizo cielos y tierra''.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְבָרֶכְךָ
  english_pob_choice: May ... bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendiga Yahvé
  - que te bendiga
  - Yahvé te bendiga
  lexicon: HALOT
  rationale: El imperfecto piel con sufijo de 2ms funciona aquí como bendición/ deseo en contexto litúrgico. En español, la forma optativa breve 'te bendiga' transmite mejor ese valor benedictorio que un futuro simple, sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como transliteración establecida en este proyecto. 'Yahvé' respeta el Tetragrámaton y evita la sustitución por un título.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sion
  alternatives_spanish:
  - de Sion
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición expresa origen/procedencia. 'Desde Sion' suena natural en español y conserva la imagen de bendición que procede de Sion.
- source_word: עֹשֵׂה
  english_pob_choice: maker of
  chosen_spanish: hacedor de
  alternatives_spanish:
  - creador de
  - el que hizo
  - el que hace
  lexicon: HALOT
  rationale: El participio qal funciona como apelativo descriptivo del Señor. 'Hacedor de' mantiene el valor atributivo y la relación directa con el título divino, sin convertirlo innecesariamente en una oración relativa.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: cielos
  alternatives_spanish:
  - cielo
  - los cielos
  lexicon: HALOT
  rationale: En español bíblico 'cielos' conserva mejor el plural hebreo y el merismo tradicional con 'tierra'. Aunque el inglés usó 'heaven' como singular colectivo, en español el plural resulta más natural y más cercano al hebreo.
- source_word: וָאָרֶץ
  english_pob_choice: and earth
  chosen_spanish: y tierra
  alternatives_spanish:
  - y la tierra
  - y el mundo
  lexicon: HALOT
  rationale: Con 'cielos' forma el par fijo de la creación. 'Tierra' reproduce el merismo cosmológico sin añadir artículo innecesario.
theological_decisions:
- issue: Force of the opening imperfect in a benediction
  english_pob_reading: 'optative/jussive: ''May the LORD bless you'''
  chosen_spanish_reading: 'optativo: ''Yahvé te bendiga'''
  alternative_spanish_readings:
  - Yahvé te bendecirá
  - Que Yahvé te bendiga
  rationale: El contexto final del salmo es una bendición litúrgica, no una simple predicción. El subjuntivo presente español expresa bien el valor desiderativo/benedictorio del imperfecto hebreo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense over tradition where needed'
- issue: Rendering the creator title in apposition
  english_pob_reading: maker of heaven and earth / who made heaven and earth
  chosen_spanish_reading: hacedor de cielos y tierra
  alternative_spanish_readings:
  - creador de cielos y tierra
  - el que hizo cielos y tierra
  rationale: El participio hebreo identifica a Yahvé como creador en aposición. 'Hacedor de' conserva el tono nominal y la relación directa con el título divino, sin forzar una subordinada relativa. La forma plural 'cielos' refleja mejor el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense over tradition where needed'
translation_notes:
  revision_awareness: La redacción sigue el último paso de revisión del POB en inglés, que prefirió una forma nominal ('maker of') para el participio עֹשֵׂה y mantuvo el valor benedictorio del imperfecto inicial. En español se conserva esa equivalencia óptima con 'hacedor de' y subjuntivo optativo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Sion'' se conserva sin tilde por la forma usual del topónimo bíblico en español.'
  - '''cielos y tierra'' reproduce el merismo creacional y evita la parálisis del singular inglés ''heaven''.'
  - Se mantiene la tensión interpretativa sobre el imperfecto hebreo mediante nota, no en el texto principal.
