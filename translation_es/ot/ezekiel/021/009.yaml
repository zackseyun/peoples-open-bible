translation:
  language: es
  text: Porque cortaré de ti tanto al justo como al impío[a], por eso mi espada saldrá de su vaina contra toda carne[b], desde el sur hasta el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he cortado». El perfecto hebreo puede leerse como acción ya realizada o como acción futura segura en contexto profético.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda carne», expresión común para todos los seres humanos mortales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La expresión introduce la causa del juicio. «Porque» es natural en español y conserva la relación causal sin volver el estilo arcaico.
- source_word: הִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: he cortado
  alternatives_spanish:
  - cortaré
  - he de cortar
  - estoy por cortar
  lexicon: HALOT
  rationale: El perfecto hebreo puede leerse como acción completa o como futuro cierto en contexto profético. Aquí se mantiene la tensión con un perfecto profético en español, reflejando la posibilidad documentada de lectura consumada y la certeza del acto.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de en medio de ti
  - de tu interior
  lexicon: HALOT
  rationale: La preposición expresa origen/salida desde la entidad femenina singular dirigida por el profeta. «De ti» es directo y fiel; «de en medio de ti» añade interpretación no obligatoria.
- source_word: צַדִּיק וְרָשָׁע
  english_pob_choice: both the righteous and the wicked
  chosen_spanish: al justo y al impío
  alternatives_spanish:
  - al justo y al malvado
  - al justo y al perverso
  lexicon: HALOT
  rationale: El par funciona como merismo para abarcar por completo a la población bajo juicio. «Justo» e «impío» son equivalentes bíblicos claros en español y conservan la polaridad moral del hebreo.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por lo tanto
  - así que
  lexicon: HALOT
  rationale: Marca consecuencia inmediata. «Por eso» suena natural en español moderno y conserva la fuerza inferencial del texto.
- source_word: תֵּצֵא חַרְבִּי
  english_pob_choice: my sword will go out
  chosen_spanish: mi espada saldrá
  alternatives_spanish:
  - mi espada saldrá fuera
  - mi espada se desenvainará
  lexicon: HALOT
  rationale: El hebreo dice literalmente que la espada «saldrá». En español, «saldrá» mantiene la imagen personificada; no se reemplaza por una forma más interpretativa como «se desenvainará».
- source_word: מִתַּעְרָהּ
  english_pob_choice: from its sheath
  chosen_spanish: de su vaina
  alternatives_spanish:
  - de su funda
  - de su cinto
  lexicon: HALOT
  rationale: «Vaina» es el término natural y preciso para el receptáculo de una espada en español; preserva la imagen concreta del hebreo.
- source_word: אֶל כָּל בָּשָׂר
  english_pob_choice: against all flesh
  chosen_spanish: contra toda carne
  alternatives_spanish:
  - contra todo ser humano
  - contra toda la humanidad
  lexicon: HALOT
  rationale: Se conserva el giro bíblico «toda carne» para no borrar la expresión idiomática que alude a la humanidad mortal en general. «Contra» refleja el carácter hostil de la espada.
- source_word: מִנֶּגֶב צָפוֹן
  english_pob_choice: from south to north
  chosen_spanish: desde el sur hasta el norte
  alternatives_spanish:
  - del Néguev hasta el norte
  - desde el mediodía hasta el norte
  lexicon: HALOT
  rationale: El par direccional expresa amplitud geográfica total. «Desde el sur hasta el norte» es claro en español y conserva el sentido merístico sin imponer el nombre propio «Néguev».
theological_decisions:
- issue: Alcance del juicio sobre «el justo y el impío»
  english_pob_reading: Retain the plain wording that the coming sword affects both the righteous and the wicked in the land.
  chosen_spanish_reading: Mantener el enunciado directo de que la espada alcanza al justo y al impío.
  alternative_spanish_readings:
  - Suavizarlo para indicar solo juicio temporal aparente
  - Limitarlo a una condena final
  rationale: El versículo describe un juicio histórico que irrumpe sobre la tierra sin distinguir personas en su efecto inmediato. La traducción debe conservar esa tensión y no resolverla con aclaraciones teológicas ajenas al hebreo.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue de alta concordancia y no requirió correcciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - Se conserva «carne» para reflejar el hebraísmo de universalidad humana, no se lo sustituye por una paráfrasis.
  - Se evita «desenvainará» para no perder la metáfora verbal del hebreo.
  - Se usa un perfecto profético en la primera cláusula para respetar la ambigüedad aspectual documentada.
