translation:
  language: es
  text: 'y de la tribu de Aser: Mashal[a] con sus pastizales, y Abdón con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mashal» sigue la forma de Crónicas; el paralelo en Josué 21:30 suele leerse «Mishal».
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  english_pob_choice: and from the tribe of
  chosen_spanish: y de la tribu de
  alternatives_spanish:
  - y de la estirpe de
  - y del clan de
  lexicon: HALOT
  rationale: מַטֶּה en listas de repartición tribal designa una tribu; en español, «tribu» comunica mejor esa unidad étnico-territorial que opciones más literales pero menos naturales.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: Se usa la forma española bíblica tradicional «Aser», más asentada en español que la transliteración inglesa, sin cambiar el referente propio.
- source_word: אֶת מָשָׁל
  english_pob_choice: Mashal
  chosen_spanish: Masal
  alternatives_spanish:
  - Mashal
  - Mishal
  lexicon: HALOT
  rationale: El hebreo masorético de Crónicas respalda una vocalización aproximada «Masal»; se conserva la distinción frente al paralelo de Josué 21:30, que suele aparecer como «Mishal». La elección intenta reflejar la forma de Crónicas sin normalizarla por el paralelo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus terrenos de pasto
  alternatives_spanish:
  - sus pastizales
  - sus terrenos de pastoreo
  - sus campos de alrededor
  lexicon: HALOT
  rationale: מִגְרָשׁ alude al terreno abierto vinculado a la ciudad, especialmente en listas levíticas; «terrenos de pasto» expresa bien la función pastoral y evita un calco como «suburbios», poco natural en español.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdón
  - Abdón
  lexicon: HALOT
  rationale: 'Nombre propio hebreo transliterado a la forma española habitual con acento ortográfico: «Abdón».'
theological_decisions:
- issue: Valor de מִגְרָשׁ en listas de ciudades levíticas
  english_pob_reading: its pasturelands
  chosen_spanish_reading: sus terrenos de pasto
  alternative_spanish_readings:
  - sus terrenos comunes
  - sus alrededores
  - sus pastizales
  rationale: 'No hay carga doctrinal, pero sí una decisión semántica importante: el término designa un espacio funcional ligado al sostén de la ciudad/ciudad levítica. «Terrenos de pasto» mantiene esa función sin introducir una lectura urbana ajena al contexto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el testimonio hebreo de Crónicas y el audit trail inglés: se mantuvo la distinción de la forma del topónimo respecto del paralelo de Josué, y se tradujo מִגְרָשׁ con un equivalente funcional natural en español.'
  spanish_consistency_notes:
  - Se prefirió «Aser» y «Abdón» por conformidad con el uso bíblico español y la claridad para lectores de iglesia.
  - Se evitó «suburbios» porque en español moderno sugiere un sentido urbano moderno distinto del hebreo.
  - La preposición compuesta «y de» reproduce el valor conjuntivo y de procedencia de וּ/מִ/ sin forzar la sintaxis.
