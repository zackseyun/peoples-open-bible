  text: Πάντῃ δὲ ὅπου προσέπιπτεν τοῦτο τὸ πρόσταγμα, δημοτελὴς συνίστατο τοῖς ἔθνεσιν εὐωχία μετὰ ἀλαλαγμῶν καὶ χαρᾶς, ὡς ἂν τῆς προκατεσκιρωμένης αὐτοῖς πάλαι κατὰ διάνοιαν, μετὰ παρρησίας νῦν ἐκφαινομένης ἀπεχθείας.
