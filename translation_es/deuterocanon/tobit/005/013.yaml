translation:
  language: es
  text: 'para saber tu linaje y tu nombre. Pero él dijo[a]: «Yo soy Azarías, hijo del gran Ananías, de tus hermanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tus parientes» / «de tus familiares»; el griego «de tus hermanos» puede funcionar aquí como término más amplio de parentesco.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνῶναι
  english_pob_choice: to learn
  chosen_spanish: saber
  alternatives_spanish:
  - conocer
  - averiguar
  - reconocer
  lexicon: BDAG
  rationale: El infinitivo expresa obtener información identificadora. En español, «saber» comunica de manera natural ese acto de adquirir conocimiento sin cargar una inferencia adicional.
- source_word: γένος
  english_pob_choice: family line
  chosen_spanish: linaje
  alternatives_spanish:
  - familia
  - estirpe
  - clan
  lexicon: LSJ
  rationale: Aquí γένος apunta a ascendencia o pertenencia genealógica. «Linaje» conserva el valor genealógico de forma clara y sobria en español actual.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  lexicon: LSJ
  rationale: Es el equivalente directo y no requiere ampliación.
- source_word: Ἐγὼ Ἀζαρίας
  english_pob_choice: I am Azarias
  chosen_spanish: Yo soy Azarías
  alternatives_spanish:
  - Soy Azarías
  lexicon: transliteration from Greek form
  rationale: Se mantiene la forma griega del nombre, siguiendo el texto fuente. En español, «Yo soy» reproduce con naturalidad la identificación directa del hablante.
- source_word: Ἀνανίου
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Anania
  lexicon: transliteration from Greek form
  rationale: El genitivo identifica al padre o antepasado con la forma griega del nombre. «Ananías» respeta esa forma fuente y es reconocible en español.
- source_word: τοῦ μεγάλου
  english_pob_choice: the great
  chosen_spanish: el gran
  alternatives_spanish:
  - el grande
  - el mayor
  - el distinguido
  lexicon: LSJ
  rationale: El adjetivo literalmente significa «grande». En español, «el gran» suena más natural ante un nombre propio y conserva la valoración honorífica sin añadir una interpretación como «el mayor».
- source_word: τῶν ἀδελφῶν σου
  english_pob_choice: of your brothers
  chosen_spanish: de tus hermanos
  alternatives_spanish:
  - de tus parientes
  - de tus familiares
  - de entre tus hermanos
  lexicon: BDAG
  rationale: Se conserva el plural masculino «hermanos», porque el griego lo usa así y el contexto puede abarcar un sentido de parentesco más amplio. No se resuelve en el texto principal hacia «parientes» para no borrar la tensión lexical; esa amplitud queda sugerida por el contexto y por la nota.
theological_decisions:
- issue: ἀδελφῶν como término de parentesco amplio
  english_pob_reading: brothers with a note allowing kinship sense
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - parientes
  - familiares
  - de tu mismo pueblo
  rationale: El texto griego conserva el masculino plural y el contexto de Tobit favorece una lectura de parentesco/afinidad dentro del pueblo o la familia. Mantener «hermanos» respeta la forma de la fuente, y la nota aclara la posible amplitud semántica sin ocultarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió no añadir «uno de» y dejar τῶν ἀδελφῶν σου más cerca de la forma del griego. En español se evita también añadir una cuantificación interpretativa; «de tus hermanos» conserva esa relación partitiva/afiliativa sin sobreexplicar.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, conforme al criterio del proyecto; aquí no interviene.
  - Se conserva la transliteración griega de los nombres propios como Azarías y Ananías, en vez de normalizarlos a formas hebreas.
  - Se mantiene «hermanos» por fidelidad al griego, con nota para la posible amplitud de parentesco.
  - La puntuación y comillas siguen el uso editorial moderno en español.
