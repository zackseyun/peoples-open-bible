translation:
  language: es
  text: En aquel tiempo Alcimo[a] fue herido, y sus obras quedaron impedidas; su boca quedó tapada, y quedó paralizado, y ya no podía pronunciar palabra ni dar órdenes acerca de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su casa» en el sentido de su casa-hogar o su casa-familia; el griego οἶκος puede referirse al conjunto doméstico y no solo al edificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήγη
  english_pob_choice: was struck down
  chosen_spanish: fue derribado
  alternatives_spanish:
  - fue golpeado
  - fue abatido
  - fue herido
  lexicon: LSJ
  rationale: El griego puede expresar un golpe o una aflicción que deja sin fuerzas. «Fue derribado» conserva la idea de caída súbita e incapacidad, sin obligar a precisar si se trata de golpe físico, castigo o aflicción médica.
- source_word: ἐνεποδίσθη
  english_pob_choice: were hindered
  chosen_spanish: quedaron impedidas
  alternatives_spanish:
  - fueron estorbadas
  - fueron obstaculizadas
  - quedaron detenidas
  lexicon: LSJ
  rationale: La pasiva indica que sus actividades quedaron frenadas. En español, «quedaron impedidas» mantiene el valor de interrupción sin exagerar la finalización.
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus actividades
  - sus empresas
  lexicon: LSJ
  rationale: ἔργα es amplio y aquí puede referirse a sus acciones o gestiones. «Obras» sigue de cerca el griego y funciona en español bíblico, aunque mantiene cierta amplitud semántica.
- source_word: ἀπεφράγη τὸ στόμα αὐτοῦ
  english_pob_choice: his mouth was stopped up
  chosen_spanish: su boca fue cerrada
  alternatives_spanish:
  - su boca fue tapada
  - su boca fue obstruida
  - su boca fue sellada
  lexicon: LSJ
  rationale: El verbo transmite la imagen de una abertura bloqueada. «Fue cerrada» reproduce la metáfora con naturalidad en español; «tapada» o «obstruida» serían más literales, pero menos elegantes en este contexto.
- source_word: παρελύθη
  english_pob_choice: he was paralyzed
  chosen_spanish: quedó paralizado
  alternatives_spanish:
  - quedó incapacitado
  - quedó debilitado
  - fue paralizado
  lexicon: LSJ
  rationale: El verbo suele denotar parálisis o grave invalidez. «Quedó paralizado» comunica bien la condición resultante sin añadir explicaciones médicas que el texto no da.
- source_word: οὐκ ἠδύνατο ἔτι λαλῆσαι λόγον
  english_pob_choice: he could no longer speak a word
  chosen_spanish: ya no podía hablar palabra
  alternatives_spanish:
  - ya no podía decir ni una palabra
  - no podía hablar más
  - ya no podía pronunciar palabra
  lexicon: LSJ
  rationale: La expresión idiomática se refleja bien con «hablar palabra», que conserva la fuerza de la negación total. «Ya no» recoge ἔτι en su valor temporal.
- source_word: ἐντείλασθαι
  english_pob_choice: give orders
  chosen_spanish: dar órdenes
  alternatives_spanish:
  - mandar
  - dar instrucciones
  - encargar
  lexicon: LSJ
  rationale: El infinitivo medio apunta a ordenar o instruir. «Dar órdenes» es claro y natural en español contemporáneo, y encaja con el ámbito doméstico-administrativo del contexto.
- source_word: περὶ τοῦ οἴκου αὐτοῦ
  english_pob_choice: concerning his house
  chosen_spanish: acerca de su casa
  alternatives_spanish:
  - acerca de su hogar
  - acerca de su familia
  - acerca de su casa/household
  lexicon: LSJ
  rationale: οἶκος puede significar casa, hogar o casa en sentido de casa-familia. «Acerca de su casa» conserva la palabra griega básica y deja oír también el posible sentido de linaje o administración doméstica.
theological_decisions:
- issue: Naturaleza de la aflicción de Alcimo
  english_pob_reading: Rendered as a severe disabling affliction without specifying divine causation beyond the text.
  chosen_spanish_reading: Se presenta como una incapacidad grave y repentina, sin definir si fue juicio divino o un cuadro médico específico.
  alternative_spanish_readings:
  - Presentarla explícitamente como juicio de Dios
  - Describirla como un derrame o ataque médico
  rationale: 'El griego enumera efectos devastadores, pero no nombra al agente ni precisa diagnóstico. La traducción mantiene esa tensión: severidad real, pero sin resolver lo que el texto no resuelve.'
  doctrine_reference: Preservar la tensión interpretativa sin añadir causalidad externa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan estrechamente; no se introdujeron cambios sustantivos respecto del sentido ya validado. Se mantuvo la ambigüedad de οἶκος y la cautela sobre la causa de la aflicción.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - «Obras» se conservó para ἔργα por cercanía formal, aunque en español puede sonar más amplio que «actividades»; se deja esa amplitud deliberadamente.
  - «Casa» se mantiene como equivalente básico de οἶκος, con nota para su posible sentido de hogar/hogar-familia.
