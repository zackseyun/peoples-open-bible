translation:
  language: es
  text: Y hace ricos todos los corazones, y no se acuerda ni del rey ni del sátrapa; y hace hablar de talentos[a] a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hace que todos hablen en sumas de dinero". La expresión griega usa "talentos" en sentido monetario, no en el sentido moderno de capacidades naturales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας καρδίας
  english_pob_choice: all hearts
  chosen_spanish: a todos los corazones
  alternatives_spanish:
  - todos los corazones
  - cada corazón
  lexicon: LSJ
  rationale: Conservo el plural con valor distributivo, que en español suena más natural como 'a todos los corazones'. 'Corazones' mantiene la imagen antropológica del griego sin reducirla a 'personas'.
- source_word: ποιεῖ πλουσίας
  english_pob_choice: makes ... rich
  chosen_spanish: hace ricos
  alternatives_spanish:
  - enriquece
  - hace ... ricos
  lexicon: LSJ
  rationale: '''Hace ricos'' refleja con claridad la construcción causativa del griego y conserva el paralelismo con el segundo ''hace''. ''Enriquece'' sería posible, pero menos transparente para la repetición verbal del texto.'
- source_word: οὐ μέμνηται
  english_pob_choice: remembers neither
  chosen_spanish: no se acuerda ni de
  alternatives_spanish:
  - no recuerda ni a
  - no toma en cuenta ni a
  lexicon: LSJ
  rationale: El griego apunta literalmente a 'recordar/tener presente'. En español, 'no se acuerda ni de' preserva la imagen mental y el tono de desatención o desprecio implícito, sin intensificarlo artificialmente.
- source_word: βασιλέα οὐδὲ σατράπην
  english_pob_choice: king nor satrap
  chosen_spanish: del rey ni del sátrapa
  alternatives_spanish:
  - del rey ni del satrapa
  - del rey ni del gobernador
  lexicon: LSJ
  rationale: '''Sátrapa'' conserva el color histórico persa de σατράπης; no se generaliza a ''gobernador'' porque eso borra la especificidad del término. El ajuste con ''del'' responde al régimen idiomático de ''acordarse de''.'
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  lexicon: LSJ
  rationale: Aunque el griego es neutro plural, el contexto exige en español un sujeto impersonal natural. 'Todo' conserva la amplitud del término sin forzar una lectura demasiado abstracta.
- source_word: διὰ ταλάντων
  english_pob_choice: in terms of talents
  chosen_spanish: en términos de talentos
  alternatives_spanish:
  - por talentos
  - en dinero
  - en sumas de dinero
  lexicon: LSJ
  rationale: Mantengo 'talentos' como medida monetaria antigua, no como 'habilidades'. 'En términos de talentos' deja claro que se trata de discurso monetario y sigue de cerca la imagen griega.
- source_word: ποιεῖ λαλεῖν
  english_pob_choice: makes ... speak
  chosen_spanish: hace que ... hable
  alternatives_spanish:
  - hace ... hablar
  - causa que ... hable
  lexicon: LSJ
  rationale: La estructura causativa se reproduce con naturalidad en español mediante 'hace que ... hable'. Esto conserva el dinamismo del griego y la repetición de 'hace'.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: The implied subject is treated as the same feminine referent from the surrounding argument (wine), without naming it in the verse itself.
  chosen_spanish_reading: Se conserva un sujeto implícito o resumido por 'hace', sin introducir explícitamente 'vino' en el versículo.
  alternative_spanish_readings:
  - Y el vino hace ricos a todos los corazones...
  - Él hace ricos a todos los corazones...
  rationale: El griego continúa una línea argumental previa sin repetir el sujeto. En español conviene mantener esa elipsis en vez de suplir el referente, para no sobreexplicar ni añadir una glosa al texto.
  doctrine_reference: Principio de fidelidad al flujo discursivo del texto fuente sin ampliación interpretativa innecesaria.
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente al mantener un sujeto no explicitado de manera que la frase siga siendo natural en español, y reflejé el ajuste de 'everything' con 'todo' para respetar mejor πάντα. También mantuve la lectura monetaria de 'talentos', como en el aparato inglés revisado.
  spanish_consistency_notes:
  - Usé 'Yahvé' como norma del proyecto no aplica aquí porque el versículo no contiene el nombre divino.
  - '''Sátrapa'' se conserva por precisión histórica y no se sustituye por ''gobernador''.'
  - '''Talentos'' se mantiene con nota para evitar la lectura moderna de ''aptitudes''.'
