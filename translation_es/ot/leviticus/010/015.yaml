  text: They shall bring the thigh of the contribution and the breast of the wave offering[a], along with the food offerings of the fat portions, to wave as a wave offering before Yahweh; and it shall be for you and for your sons with you as a permanent statute[d][c][b], just as Yahweh commanded.
