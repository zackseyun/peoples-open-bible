  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La decisión sobre מִתְרַפֶּה como «flojo» es aceptable, aunque «negligente» también sería posible. La metáfora «hermano de» debe conservarse. Para לְבַעַל מַשְׁחִית, el inglés usa «master of destruction», pero en español conviene una equivalencia funcional más natural: «uno dado a la destrucción», con nota que preserve la alternativa «destructor».'
