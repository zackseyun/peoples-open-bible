review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: prohibición futura para los hijos de Israel, acercamiento al lugar sagrado, consecuencia de llevar/cargar pecado y morir. Sin embargo, ''tabernáculo de reunión'' se aparta innecesariamente del término preferido y documentado ''tent of meeting'' / ''tienda de reunión'', y falta la nota léxica correspondiente a ''cargar con pecado'', que el rastro inglés preserva como expresión sacerdotal/legal con alternativa aclaratoria.'
  spanish_quality_summary: El español es claro y eclesialmente legible. 'Los hijos de Israel' y 'no se acercarán más' funcionan bien. No obstante, 'tabernáculo de reunión' suena más tradicional que transparente frente al hebreo אֹהֶל מוֹעֵד; 'tienda de reunión' es más fiel y sigue siendo natural. También conviene ajustar la nota al estilo del proyecto y añadir una nota en 'pecado' para evitar ambigüedad en español sobre el sentido de responsabilidad/culpa.
  glossary_alignment: 'Sin términos del glosario mayor en conflicto. La principal desalineación es terminológica local: אֹהֶל מוֹעֵד está documentado en el English POB como ''tent of meeting'', por lo que en español conviene ''tienda de reunión'' en vez de ''tabernáculo de reunión'' salvo razón contextual fuerte, que aquí no aparece.'
  issues:
  - severity: medium
    issue: '"tabernáculo de reunión" en lugar de "tienda de reunión"'
    rationale: El hebreo אֹהֶל מוֹעֵד significa literalmente 'tienda de reunión'. El English POB documenta preferencia por la forma transparente frente a la tradicional 'tabernacle'. En español, 'tabernáculo' añade tradición no exigida por este verso y reduce la transparencia formal.
  - severity: medium
    issue: Falta nota para "carguen con pecado"
    rationale: 'El rastro inglés preserva una nota importante: ''bear sin'' puede entenderse como ''incurrir en culpa'' o asumir responsabilidad legal. En español, ''cargar con pecado'' puede sonar idiomático pero también ambiguo; una nota mantiene la racionalidad léxica y teológica del proyecto.'
  - severity: low
    issue: La nota [a] puede pulirse estilísticamente
    rationale: 'Conviene usar comillas españolas simples y una redacción más natural: ''los israelitas'' como alternativa, manteniendo la explicación corporativa.'
  revised_spanish_text: Y los hijos de Israel[a] no se acercarán más a la tienda de reunión, para no cargar con pecado[b] y morir.
