translation:
  language: es
  text: E hicieron para el pectoral cadenas trenzadas[a], trabajadas como cuerdas, de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cadenas de trabajo retorcido» o «cadenas de trabajo cordado». El hebreo describe cadenas hechas con un patrón trenzado o semejante a una cuerda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: And they made
  chosen_spanish: E hicieron
  alternatives_spanish:
  - Y hicieron
  - Y fabricaron
  lexicon: HALOT
  rationale: עשה en narración de acciones concretas se rinde de forma natural con «hacer»; «hicieron» conserva la sencillez del verbo base sin forzar un tecnicismo.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: En contexto de una pieza fijada al pectoral, «sobre» preserva la relación de colocación/adhesión sin perder naturalidad en español.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral del juicio
  - la pieza pectoral
  lexicon: HALOT
  rationale: חֹשֶׁן designa aquí la pieza sacerdotal del atuendo; «pectoral» es la forma clara y bíblica en español. No se añade «del juicio» porque ese complemento no aparece en el verso mismo.
- source_word: שַׁרְשְׁרֹת
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - cadenillas
  - eslabones
  lexicon: HALOT
  rationale: El plural indica cadenas; «cadenas» mantiene el sentido directo y evita una especificación no exigida por el hebreo.
- source_word: גַּבְלֻת
  english_pob_choice: braided
  chosen_spanish: trenzado
  alternatives_spanish:
  - trenzadas
  - entrelazado
  - retorcido
  lexicon: HALOT
  rationale: El término describe la forma trabajada de las cadenas. «Trenzado» comunica bien la idea de una hechura entrelazada o cordada sin imponer un solo matiz técnico.
- source_word: מַעֲשֵׂה עֲבֹת
  english_pob_choice: work, like cords
  chosen_spanish: trabajo trenzado, como cuerdas
  alternatives_spanish:
  - obra de cuerdas
  - trabajo de cordones
  - obra retorcida
  lexicon: HALOT
  rationale: La expresión une la idea de manufactura con la forma de cuerda/cordón. «Trabajo trenzado, como cuerdas» conserva ambas partes y refleja la comparación del hebreo que la POB inglesa también deja explícita.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro limpio
  lexicon: HALOT
  rationale: La frase material estándar se rinde de manera natural con «oro puro», sin perder el valor cualitativo de טָהוֹר.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene «chains of braided work, like cords, of pure gold» y una nota de alternativas léxicas para גַּבְלֻת / מַעֲשֵׂה עֲבֹת. La redacción española preserva esa tensión descriptiva con «trabajo trenzado, como cuerdas», sin resolverla demasiado hacia un solo tecnicismo.
  spanish_consistency_notes:
  - Se mantiene el verbo narrativo simple «hicieron» para coherencia con el registro bíblico directo.
  - «Pectoral» sigue la terminología tabernacular ya asentada en español y evita una expansión interpretativa.
  - «Oro puro» conserva la calificación de pureza material sin introducir valor doctrinal adicional.
