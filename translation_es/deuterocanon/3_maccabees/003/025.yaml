    issue: «a nosotros» suena poco idiomático en español en un decreto de comparecencia/traslado
    rationale: ἀποστεῖλαι πρὸς ἡμᾶς significa enviarlos hacia la presencia o jurisdicción del emisor. «Ante nosotros» o «a nuestra presencia» transmite mejor el registro administrativo en español.
  - severity: medium
    issue: «pozo irreparable» es una combinación poco natural en español
    rationale: Aunque βόθρος puede traducirse literalmente, en este contexto punitivo «fosa» suena más natural y mantiene la imagen de destrucción y deshonra. Además, «irremediable» encaja mejor que «irreparable» con un destino funesto.
  - severity: low
    issue: «con cadenas de hierro» podría afinarse a «en cadenas de hierro»
    rationale: El griego usa ἐν δεσμοῖς σιδηροῖς; «en cadenas de hierro» refleja mejor la idea de estar sujetos dentro de esas ligaduras, aunque la redacción actual no es errónea.
