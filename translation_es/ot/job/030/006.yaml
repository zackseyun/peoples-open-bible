translation:
  language: es
  text: En las quebradas de los wadis habitan[a], en agujeros del polvo y entre las peñas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las hondonadas de los wadis habitan»; el hebreo נְחָלִים puede referirse a wadis, cauces torrenciales o valles, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en agujeros de la tierra y en los peñascos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲרוּץ
  english_pob_choice: in the gullies
  chosen_spanish: en las hondonadas
  alternatives_spanish:
  - en las quebradas
  - en las hondonadas erosionadas
  - en las barrancas
  lexicon: HALOT
  rationale: עָרוּץ describe un cauce o corte profundo, a menudo erosionado por el agua. En español, «hondonadas» comunica bien la idea de una depresión abierta sin sonar demasiado técnico ni demasiado rústico.
- source_word: נְחָלִים
  english_pob_choice: of the wadis
  chosen_spanish: de los wadis
  alternatives_spanish:
  - de los cauces
  - de los torrentes
  - de los valles
  lexicon: HALOT
  rationale: נחל suele referirse a un wadi o curso estacional de agua. Conservé «wadis» porque el término ya es preciso y evita perder el matiz geográfico del texto hebreo.
- source_word: לִשְׁכֹּן
  english_pob_choice: they dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - viven
  - moran
  - se establecen
  lexicon: HALOT
  rationale: La construcción infinitiva funciona como expresión de habitación en el contexto. «Habitan» mantiene el sentido de residencia y suena natural en español.
- source_word: חֹרֵי
  english_pob_choice: holes of
  chosen_spanish: agujeros de
  alternatives_spanish:
  - hoyos de
  - cuevas de
  - huecos de
  lexicon: HALOT
  rationale: חֹרֵי procede de חור, «hoyo/agujero». «Agujeros» conserva la imagen áspera y degradada que el verso presenta.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - la tierra
  - el suelo
  - el barro seco
  lexicon: HALOT
  rationale: עָפָר puede significar polvo o tierra suelta. «Polvo» reproduce mejor la humillación y desolación de la escena, igual que en la opción inglesa.
- source_word: וְכֵפִים
  english_pob_choice: and among the rocks
  chosen_spanish: entre las peñas
  alternatives_spanish:
  - entre las rocas
  - entre los riscos
  - y entre las peñas
  lexicon: HALOT
  rationale: כֵפִים son rocas o peñascos. «Peñas» da una imagen viva y compacta en español; la preposición locativa ya está implícita en el contexto.
translation_notes:
  revision_awareness: La versión española sigue de cerca el pasaje hebreo y el audit trail inglés, manteniendo el paralelismo locativo y las imágenes de pobreza/aspereza. Se optó por un español natural sin borrar la tensión léxica entre «wadis», «hondonadas», «agujeros» y «peñas».
  spanish_consistency_notes:
  - Se mantuvo «wadis» para conservar la referencia geográfica específica del hebreo.
  - «Polvo» se usó para עָפָר en consonancia con la imagen de degradación.
  - «Peñas» traduce כֵפִים con un matiz más idiomático que «rocas», sin perder el sentido.
  - Las notas de pie preservan las alternativas relevantes que el audit trail inglés documenta.
