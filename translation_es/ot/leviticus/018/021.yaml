translation:
  language: es
  text: Y no darás de tu descendencia[a] para que pase a Molec[b], ni profanarás el nombre de tu Dios. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de tus hijos». El hebreo literalmente dice: «de tu semilla».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, a un rito asociado con Molec; muchos entienden esto como sacrificio infantil, a menudo descrito en otras partes como hacer que los hijos pasen «por el fuego».
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִזַּרְעֲךָ
  english_pob_choice: any of your offspring
  chosen_spanish: de tu descendencia
  alternatives_spanish:
  - de tus hijos
  - de tu semilla
  - de tu prole
  lexicon: HALOT
  rationale: זרע literalmente es 'semilla', pero aquí funciona de manera partitiva y legal para referirse a la descendencia. 'Descendencia' mantiene ese valor amplio y natural en español sin restringirlo sólo a hijos menores ni perder la relación genealógica.
- source_word: תִתֵּן
  english_pob_choice: you shall not give
  chosen_spanish: no darás
  alternatives_spanish:
  - no debes dar
  - no entregarás
  lexicon: HALOT
  rationale: נתן es el verbo común 'dar'. En español, el futuro con valor prohibitivo conserva bien la fuerza legal del hebreo y suena digno y publicable.
- source_word: לְהַעֲבִיר
  english_pob_choice: to pass through
  chosen_spanish: para hacerla pasar
  alternatives_spanish:
  - para pasarla
  - para hacer pasar
  lexicon: HALOT
  rationale: 'El hiphil de עבר expresa causación: ''hacer pasar''. En español conviene explicitar la causación con ''hacerla pasar'' para reflejar el verbo hebreo sin forzar una interpretación más amplia en el texto principal.'
- source_word: לַמֹּלֶךְ
  english_pob_choice: to Molech
  chosen_spanish: a Molec
  alternatives_spanish:
  - a Molech
  - al Moloc
  lexicon: HALOT
  rationale: Se conserva el nombre propio del destinatario del rito. 'Molec' mantiene la forma tradicional española más cercana al hebreo y evita una paráfrasis interpretativa.
- source_word: תְחַלֵּל
  english_pob_choice: you shall not profane
  chosen_spanish: ni profanarás
  alternatives_spanish:
  - ni contaminarás
  - ni deshonrarás
  lexicon: HALOT
  rationale: חלל en piel suele significar 'profanar/desecrar'. 'Profanar' conserva el registro jurídico-covenantal y la gravedad del acto respecto del nombre divino.
- source_word: שֵׁם אֱלֹהֶיךָ
  english_pob_choice: the name of your God
  chosen_spanish: el nombre de tu Dios
  alternatives_spanish:
  - el nombre de tu Dios y
  - el nombre de tu Dios
  lexicon: HALOT
  rationale: La construcción se traduce de forma formal y natural, preservando el peso teológico de 'nombre' como reputación y manifestación del Dios del pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política terminológica del proyecto pide 'Yahvé' para el Tetragrámaton. Se mantiene el nombre divino personal y no una sustitución como 'Señor'.
theological_decisions:
- issue: Sentido del rito asociado con Molec
  english_pob_reading: Preserve the idiom 'to pass through to Molech' without explicitly stating 'fire' in the main text.
  chosen_spanish_reading: Conservar la alusión ritual con 'hacerla pasar a Molec' sin añadir 'al fuego' en el texto principal.
  alternative_spanish_readings:
  - darla en sacrificio a Molec
  - hacerla pasar por el fuego a Molec
  rationale: El hebreo dice literalmente 'dar ... para hacer pasar a Molec'. El contexto canónico suele asociarlo con sacrificio infantil y con el fuego, pero este versículo por sí solo no lo menciona. Por fidelidad auditada, la traducción principal conserva la tensión sin resolverla por completo.
  doctrine_reference: 'Translation philosophy: primacía del original y preservación de tensiones textuales'
- issue: Valor de זרע en la prohibición
  english_pob_reading: Use 'offspring' rather than the more specific 'children' in the main text.
  chosen_spanish_reading: Usar 'descendencia' en lugar de 'hijos' en el texto principal.
  alternative_spanish_readings:
  - hijos
  - semilla
  rationale: זרע es más amplio que una categoría etaria específica. 'Descendencia' transmite bien el alcance familiar y legal, y deja abierta la posibilidad de la glosa alternativa 'hijos' sin imponerla como única lectura.
  doctrine_reference: 'Translation philosophy 5: consistencia de términos clave con excepciones documentadas'
- issue: Nombre divino al final del versículo
  english_pob_reading: I am Yahweh.
  chosen_spanish_reading: Yo soy Yahvé.
  alternative_spanish_readings:
  - Yo soy el SEÑOR
  - Yo soy Yahweh
  rationale: La política del proyecto pide traducir יְהוָה como 'Yahvé'. En una fórmula de autoidentificación, esa forma preserva mejor el nombre personal revelado que una sustitución por título.
  doctrine_reference: Política terminológica del proyecto sobre יהוה
translation_notes:
  revision_awareness: 'Se siguió el último ajuste del audit trail inglés: ''pass through'' en lugar de una formulación más explicativa como ''make them pass over''. Por eso el español conserva una estructura causal breve (''hacerla pasar'') y no añade ''al fuego'' en el texto principal. También se respetó la decisión terminológica del proyecto para יהוה: ''Yahvé''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para יהוה, conforme a la política del proyecto.
  - '''Molec'' se mantuvo como nombre propio y no se reemplazó por una glosa interpretativa en el cuerpo del texto.'
  - '''Profanarás el nombre de tu Dios'' conserva el paralelismo formal con el hebreo y el tono jurídico del mandato.'
  - Se eligió el singular 'la' en 'hacerla pasar' porque el referente implícito es la descendencia/semilla mencionada anteriormente.
