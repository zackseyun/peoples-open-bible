translation:
  language: es
  text: 'Porque su madre se ha prostituido[a]; la que los concibió[b] ha actuado vergonzosamente[c]. Porque dijo: «Iré tras mis amantes, los que me dan mi pan y mi agua, mi lana y mi lino en bruto, mi aceite y mi bebida[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha hecho de prostituta»; el hebreo usa imaginería sexual explícita para la infidelidad de pacto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la que los concibió», en eco poético con «su madre».
    reason: lexical_alternative
  - marker: c
    text: O «ha obrado vergonzosamente» o posiblemente «los ha avergonzado».
    reason: lexical_alternative
  - marker: d
    text: O «mis bebidas» o «mi provisión de bebida».
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנְתָה
  english_pob_choice: has prostituted herself
  chosen_spanish: se ha prostituido
  alternatives_spanish:
  - ha sido infiel
  - ha actuado como prostituta
  lexicon: HALOT
  rationale: El hebreo זנה conserva una carga sexual explícita que, en el contexto profético, representa infidelidad de pacto. «Se ha prostituido» preserva esa fuerza y evita suavizarla demasiado con «ha sido infiel».
- source_word: אִמָּם
  english_pob_choice: their mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de ellos
  - la madre de sus hijos
  lexicon: HALOT
  rationale: La forma con sufijo de 3ª plural se refiere naturalmente a «su madre» en español, manteniendo el paralelismo poético con la siguiente línea.
- source_word: הֹבִישָׁה
  english_pob_choice: has acted shamefully
  chosen_spanish: ha actuado vergonzosamente
  alternatives_spanish:
  - los ha puesto en vergüenza
  - ha hecho algo vergonzoso
  lexicon: HALOT
  rationale: El hifil de בוש puede expresar causar vergüenza o comportarse vergonzosamente. En este paralelismo con sujeto femenino singular, «ha actuado vergonzosamente» sigue bien la fuerza conductual del verbo.
- source_word: הוֹרָתָם
  english_pob_choice: she who conceived them
  chosen_spanish: la que los concibió
  alternatives_spanish:
  - su concebidora
  - la que quedó encinta de ellos
  - su madre
  lexicon: HALOT
  rationale: El participio/relativo de הרה apunta a concebir. «La que los concibió» conserva el matiz verbal y el eco poético de «su madre» sin reducirlo a una simple repetición.
- source_word: אֵלְכָה אַחֲרֵי
  english_pob_choice: I will go after
  chosen_spanish: Iré tras
  alternatives_spanish:
  - seguiré tras
  - iré detrás de
  lexicon: HALOT
  rationale: La expresión es idiomática para dirigirse a un objeto deseado o ilícito. «Iré tras» suena natural en español y mantiene el movimiento metafórico.
- source_word: מְאַהֲבַי
  english_pob_choice: my lovers
  chosen_spanish: mis amantes
  alternatives_spanish:
  - mis amados
  - quienes me aman
  lexicon: HALOT
  rationale: En Oseas, el término designa relaciones ilícitas dentro de la metáfora matrimonial. «Mis amantes» preserva el valor sexual y retórico mejor que opciones suavizadas.
- source_word: נֹתְנֵי
  english_pob_choice: those who give me
  chosen_spanish: los que me dan
  alternatives_spanish:
  - quienes me dan
  - dadores de
  lexicon: HALOT
  rationale: El participio funciona sustantivamente y describe a los amantes como proveedores. «Los que me dan» es claro y sigue el orden semántico del hebreo.
- source_word: לַחְמִי וּמֵימַי
  english_pob_choice: my bread and my water
  chosen_spanish: mi pan y mi agua
  alternatives_spanish:
  - mi alimento y mi agua
  - mi pan y agua
  lexicon: HALOT
  rationale: «Pan» y «agua» conservan la concreción del sustento básico. Mantener el par exacto respeta la imaginería de provisión cotidiana.
- source_word: צַמְרִי וּפִשְׁתִּי
  english_pob_choice: my wool and my flax
  chosen_spanish: mi lana y mi lino
  alternatives_spanish:
  - mi lana y mi fibra de lino
  - mi lana y mi cáñamo
  lexicon: HALOT
  rationale: Aunque פשתים se refiere propiamente al lino producido de la planta del lino, en español bíblico «lino» es la equivalencia más natural y tradicional para la tela/material resultante; «lana y mi lino» comunica correctamente el par textil. No se usa «flax» en español porque no es idiomático en este contexto.
- source_word: שַׁמְנִי
  english_pob_choice: my oil
  chosen_spanish: mi aceite
  alternatives_spanish:
  - mi aceite de oliva
  - mi grasa
  lexicon: HALOT
  rationale: «Aceite» es suficiente y fiel al hebreo sin añadir «de oliva», que no está explícito. En español común, la palabra comunica bien el bien de provisión.
- source_word: שִׁקּוּיָי
  english_pob_choice: my drink
  chosen_spanish: mi bebida
  alternatives_spanish:
  - mis bebidas
  - mi bebida-suministro
  lexicon: HALOT
  rationale: El sustantivo puede referirse a bebida o provisión para beber. «Mi bebida» transmite la idea de suministro de bebida de forma natural en español.
theological_decisions:
- issue: Metáfora matrimonial y sexual de infidelidad de pacto
  english_pob_reading: Retain the sexualized metaphor explicitly with 'has prostituted herself' and 'my lovers.'
  chosen_spanish_reading: Mantener la metáfora sexual explícita con «se ha prostituido» y «mis amantes».
  alternative_spanish_readings:
  - «ha sido infiel» y «los que me aman»
  - «se ha desviado» y «mis amados»
  rationale: Oseas usa deliberadamente imaginería matrimonial y sexual para describir la infidelidad idolátrica de Israel. La traducción española debe conservar ese filo retórico y teológico, sin suavizarlo hacia una mera falta abstracta de lealtad.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Participio relativo en הוֹרָתָם y paralelismo poético
  english_pob_reading: '''she who conceived them,'' echoing ''their mother'' in poetic parallelism.'
  chosen_spanish_reading: «la que los concibió», en eco con «su madre».
  alternative_spanish_readings:
  - «su madre»
  - «la que quedó encinta de ellos»
  rationale: El hebreo conserva una repetición poética que el español puede reflejar sin redundancia plana. «La que los concibió» mantiene el paralelo y el matiz de concepción.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no requieren revisiones sustantivas; se preserva la fuerza sexual del verbo זנה, el paralelismo entre «su madre» y «la que los concibió», y la lista concreta de provisiones sin generalizar innecesariamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - «Mis amantes» conserva el valor metafórico y sexual documentado por el POB inglés.
  - «Mi pan y mi agua» sigue la concreción del sustento, y «mi lana y mi lino» respeta el par textil sin sobreexplicar.
  - No se introduce terminología eclesiástica ajena al hebreo ni se suaviza la acusación profética.
