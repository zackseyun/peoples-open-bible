theological_decisions:
- issue: Referent and gender of the pronouns αὐτῆς / αὐτήν
  chosen_reading: Preserve the feminine pronoun in English as 'her' rather than resolving it to 'the city' in the main text.
  alternative_readings:
  - resolve to 'the city' for immediate clarity
  - use neuter 'it' for smoother English
  rationale: This is not a doctrinal dispute but an interpretive and stylistic decision. The immediate context points to Jerusalem, and Greek commonly personifies cities with feminine pronouns. Preserving 'her' keeps the source-text texture and avoids importing an explicit noun not present in this verse, while a footnote can clarify the referent.
  doctrine_reference: Translation philosophy §§1, 3, 6
