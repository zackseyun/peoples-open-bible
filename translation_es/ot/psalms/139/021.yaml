translation:
  language: es
  text: ¿No odio[a] a los que te odian, Yahvé[b], y contiendo con los que se levantan contra ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aborrezco'. El hebreo repite el verbo de odio en ambos miembros; 'odio' conserva esa transparencia léxica, aunque 'aborrezco' también es posible en español.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'YHWH'. Se usa 'Yahvé' como transliteración del nombre divino, en lugar de sustituirlo por un título.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Do I not
  chosen_spanish: ¿No… yo…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es así que…?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación se expresa de forma natural en español con una pregunta retórica que espera asentimiento. Se mantiene el tono enfático sin convertirlo en una simple aseveración.
- source_word: מְשַׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - tus odiadores
  - los que te aborrecen
  lexicon: HALOT
  rationale: El participio con sufijo de segunda persona masculina singular se vierte como un sustantivo verbal natural en español. 'Odiar' conserva la fuerza léxica y la repetición con el verbo del miembro siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, usando la transliteración 'Yahvé' en el texto principal en vez de sustituirlo por un título.
- source_word: אֶשְׂנָא
  english_pob_choice: hate
  chosen_spanish: odio
  alternatives_spanish:
  - aborrezco
  - detesto
  lexicon: HALOT
  rationale: Se conserva el mismo campo léxico que en el sustantivo participial anterior para reflejar la transparencia verbal y la intensidad poética del hebreo.
- source_word: וּבִתְקוֹמְמֶיךָ
  english_pob_choice: those who rise up against you
  chosen_spanish: los que se levantan contra ti
  alternatives_spanish:
  - los que se sublevan contra ti
  - tus adversarios
  lexicon: HALOT
  rationale: El idioma español admite con naturalidad la imagen de 'levantarse contra' para el movimiento hostil del hebreo, preservando la metáfora de oposición activa.
- source_word: אֶתְקוֹטָט
  english_pob_choice: strive with
  chosen_spanish: me irrito
  alternatives_spanish:
  - contiendo con
  - me enfrento con
  - litigo con
  lexicon: HALOT
  rationale: La forma rara y reflexiva se entiende en el audit trail como contienda hostil más que mera emoción. En español, 'me irrito' comunica la reacción hostil y mantiene el paralelismo afectivo con 'odio', aunque reconoce la tensión entre hostilidad interna y confrontación activa.
theological_decisions:
- issue: Lenguaje fuerte de enemistad hacia los enemigos de Dios
  english_pob_reading: Retain the strong language of 'hate' and 'strive with' as covenantal alignment with God rather than soften it into generic disapproval.
  chosen_spanish_reading: Conservar 'odio' y 'me irrito' como lenguaje fuerte de alineación pactual con Yahvé, sin suavizarlo a mera desaprobación.
  alternative_spanish_readings:
  - me opongo a los que se oponen a ti
  - rechazo a los que te rechazan
  - entro en contienda con los que se levantan contra ti
  rationale: El hebreo usa vocabulario explícito de odio y una segunda forma fuerte en paralelo. La traducción mantiene esa tensión sin resolverla moralmente ni diluirla en términos más generales.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés revisó el segundo miembro desde 'loathe' a 'strive with' para acercarlo al verbo raro de contienda. En español se optó por 'me irrito' para conservar el matiz hostil de la línea y el paralelismo semántico con el primer hemistiquio, sin convertirlo en una fórmula jurídica ni en mera emoción descontextualizada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición léxica de 'odiar/odio' para reflejar el paralelismo del hebreo.
  - '''Los que se levantan contra ti'' traduce la imagen de oposición activa de la raíz de תְקוֹמְמֶיךָ.'
  - El segundo verbo se entiende como hostilidad activa; el español elegido busca naturalidad sin perder esa tensión.
