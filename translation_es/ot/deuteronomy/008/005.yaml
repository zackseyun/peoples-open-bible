translation:
  language: es
  text: Así que reconoce en tu corazón que[a], así como un hombre disciplina a su hijo, Yahvé tu Dios te disciplina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corrige' o 'castiga'; el verbo hebreo puede abarcar tanto el castigo correctivo como la instrucción formativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: So know
  chosen_spanish: Así que sabe
  alternatives_spanish:
  - Y sabrás
  - Y conocerás
  lexicon: HALOT
  rationale: La forma con וְ funciona aquí como exhortación/resultativa. En español, 'Así que sabe' comunica la conclusión que debe asumirse, manteniendo el tono de llamado a reconocer algo interiormente.
- source_word: עִם לְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - con tu corazón
  - dentro de tu corazón
  lexicon: HALOT
  rationale: El hebreo expresa reconocimiento interno. 'En tu corazón' es la equivalencia española natural para esa interioridad, más idiomática que una traducción literal con 'con'.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que debe saberse, no una explicación causal principal. 'Que' mantiene la función completiva de manera clara en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: HALOT
  rationale: Marca comparación entre la disciplina humana y la de Yahvé. 'Así como' conserva la simetría comparativa y suena natural en español.
- source_word: יְיַסֵּר / מְיַסְּרֶךָּ
  english_pob_choice: disciplines
  chosen_spanish: disciplina
  alternatives_spanish:
  - castiga
  - corrige
  - forma
  lexicon: HALOT
  rationale: '''Disciplina'' preserva el doble valor del verbo hebreo: corrección y formación. Evita estrechar el sentido solo a castigo o solo a instrucción.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - un padre
  lexicon: HALOT
  rationale: El hebreo dice explícitamente 'un hombre'. Se conserva el término masculino concreto, ya que el símil depende de esa formulación.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo varón
  - a su niño
  lexicon: HALOT
  rationale: '''Ben'' significa ''hijo''. ''A su hijo'' respeta el paralelo paterno-filial y mantiene la concreción del término hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. No se sustituye por un título enmascarado, preservando el nombre propio divino.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  - tu Señor
  lexicon: HALOT
  rationale: La construcción de pacto se vierte con el posesivo directo y el sustantivo 'Dios', que en español es natural y fiel al hebreo.
theological_decisions:
- issue: Naturaleza de la disciplina divina
  english_pob_reading: disciplines
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - castiga
  - corrige
  - corrige y forma
  rationale: El hebreo יסר abarca corrección, instrucción y, a veces, castigo. 'Disciplina' preserva esa amplitud sin reducirla a una sola dimensión ni diluir su fuerza.
  doctrine_reference: Translation philosophy §3, §5
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción sigue la política doctrinal del proyecto para el Tetragrámaton, manteniendo el nombre pactual revelado a Israel en lugar de sustituirlo por un título.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. No se observan revisiones aplicadas en el registro más reciente, y el consenso de revisión indica alta concordancia, por lo que no se introducen cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'disciplina' para el verbo יסר, por su amplitud semántica en el contexto comparativo padre-hijo.
  - Se usa 'tu corazón' como equivalente idiomático de עִם לְבָבֶךָ, sin volverlo meramente emocional.
  - El registro mantiene un tono bíblico claro y moderno, sin arcaísmos innecesarios.
