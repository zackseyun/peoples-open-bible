translation:
  language: es
  text: Después de esto[a], Absalón se hizo de una carroza y caballos[b], y cincuenta hombres que corrían delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se procuró» o «se proveyó de». El verbo hebreo puede significar tanto hacer como obtener o proveerse para sí.
    reason: lexical_alternative
  - marker: b
    text: Los cincuenta hombres que corrían delante de él formaban una escolta de estilo real, lo que señalaba la autoexaltación pública de Absalón.
    reason: cultural_note
lexical_decisions:
- source_word: וַֽיְהִי מֵאַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Y aconteció después de esto
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea marca secuencia temporal. «Después de esto» conserva la relación temporal de manera natural en español sin sobrerreproducir la fórmula.
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: made for himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - se hizo para sí
  - se procuró
  lexicon: HALOT
  rationale: El verbo עשה con לֹו puede expresar hacer/proveerse para sí. En este contexto, con objetos que no se fabrican literalmente por la persona, «se hizo» transmite la acción de equiparse o hacerse de ellos, manteniendo la tensión lexical sin sonar forzado.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma española estándar del nombre propio bíblico, ya naturalizada en lectura eclesial y bíblica.
- source_word: מֶרְכָּבָה
  english_pob_choice: a chariot
  chosen_spanish: un carro
  alternatives_spanish:
  - un carro de guerra
  - un carruaje
  lexicon: HALOT
  rationale: El término denota un carro/carro de guerra. «Carro» es fiel y más natural en español bíblico contemporáneo; «carro de guerra» añade una precisión interpretativa que el versículo no explicita.
- source_word: וְסֻסִים
  english_pob_choice: and horses
  chosen_spanish: y caballos
  alternatives_spanish:
  - y cabalgaduras
  lexicon: HALOT
  rationale: La coordinación simple en hebreo pide una coordinación simple en español. «Caballos» es la correspondencia directa y clara.
- source_word: וַחֲמִשִּׁים אִישׁ
  english_pob_choice: and fifty men
  chosen_spanish: y cincuenta hombres
  alternatives_spanish:
  - y cincuenta personas
  - y cincuenta varones
  lexicon: HALOT
  rationale: La expresión de conteo con אִישׁ se vierte normalmente como «hombres»; aquí además el contexto de escolta pública hace natural esa elección.
- source_word: רָצִים
  english_pob_choice: running
  chosen_spanish: que corrían
  alternatives_spanish:
  - corriendo
  - que iban corriendo
  lexicon: HALOT
  rationale: El participio describe la acción de acompañamiento delante de Absalón. «Que corrían» conserva el valor verbal y la imagen dinámica del original.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en frente de él
  lexicon: HALOT
  rationale: «Delante de él» es la forma más natural y precisa en español para la ubicación frontal en una procesión o escolta.
theological_decisions:
- issue: Tensión entre «hacer» y «procurarse/equiparse» en וַיַּעַשׂ לוֹ
  english_pob_reading: made for himself
  chosen_spanish_reading: se hizo
  alternative_spanish_readings:
  - se procuró
  - se equipó con
  rationale: El hebreo admite tanto la idea de hacer como la de procurarse. La versión española mantiene «se hizo» para no perder la literalidad básica ni resolver unilateralmente la ambigüedad. La elección deja abierta la implicación de autoexaltación sin introducirla en exceso en la redacción principal.
  doctrine_reference: Principio POB de equivalencia óptima y preservación de tensiones léxicas cuando el texto las permite.
- issue: Implicación política de la escolta de cincuenta corredores
  english_pob_reading: Render descriptively without making the implied royal pretension explicit in the main text.
  chosen_spanish_reading: Traducir descriptivamente sin explicitar en el cuerpo principal la pretensión real implícita.
  alternative_spanish_readings:
  - Absalón montó una comitiva de tipo real para sí
  - Absalón se rodeó de un séquito real
  rationale: El hebreo narra los hechos; la insinuación de ambición real surge del conjunto de signos (carro, caballos, corredores). La traducción principal debe dejar que esa lectura emerja del contexto, no imponerla como comentario.
  doctrine_reference: 'Principio POB: no importar interpretaciones doctrinales o históricas que el versículo no formule de manera explícita.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión en inglés: la preferencia final por «made for himself» frente a «acquired for himself», así como la decisión de mantener una redacción descriptiva sin explicitar la pretensión real en el texto principal. La versión española sigue esa misma lógica, conservando la ambigüedad útil de עשה con לֹו y la imagen cortesana de la escolta.'
  spanish_consistency_notes:
  - Se mantuvo «Absalón» como forma española estable del nombre propio.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el Tetragrámaton en este versículo.
  - «Carro» se eligió por fidelidad y naturalidad; no se sobreespecificó como «carro de guerra» en el texto principal.
  - «Delante de él» conserva la escena procesional sin añadir interpretación.
  - La nota cultural explica el trasfondo real de la escolta sin cargar el texto principal con esa inferencia.
