translation:
  language: es
  text: 'Y dijo Samuel: «¿Se complace Yahvé en holocaustos y sacrificios, tanto como en obedecer[a] la voz de Yahvé? He aquí, obedecer es mejor que el sacrificio, y escuchar que la grosura de carneros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «oír/escuchar»; en este contexto el verbo suele llevar el sentido de oír con obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵפֶץ
  english_pob_choice: delight
  chosen_spanish: se complace
  alternatives_spanish:
  - tiene deleite
  - se deleita
  lexicon: HALOT
  rationale: El interrogativo expresa placer o agrado de Yahvé frente a los sacrificios; «se complace» mantiene el matiz afectivo con naturalidad en español y evita una formulación más seca como «desea».
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el nombre divino se vierte como «Yahvé» y no se enmascara con un título. Aquí el texto hebreo usa el nombre propio de Dios.
- source_word: בְּעֹלוֹת וּזְבָחִים
  english_pob_choice: in burnt offerings and sacrifices
  chosen_spanish: en holocaustos y sacrificios
  alternatives_spanish:
  - con holocaustos y sacrificios
  - en ofrendas quemadas y sacrificios
  lexicon: HALOT
  rationale: Las categorías sacrificiales se mantienen distintas. «Holocaustos» conserva el sentido técnico de עֹלוֹת como ofrendas enteramente quemadas; «sacrificios» traduce זְבָחִים de manera directa.
- source_word: כִּשְׁמֹעַ בְּק֣וֹל יְהוָה
  english_pob_choice: as much as in obeying the voice of Yahweh
  chosen_spanish: tanto como en obedecer la voz de Yahvé
  alternatives_spanish:
  - tanto como en escuchar la voz de Yahvé
  - comparado con obedecer la voz de Yahvé
  lexicon: HALOT
  rationale: El infinitivo de שׁמע aquí tiene fuerza de obediencia responsiva, no mera audición. «Obedecer» expresa mejor ese valor pactal, mientras «la voz de Yahvé» preserva la imagen hebrea de su mandato hablado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La fórmula exhorta a prestar atención solemne a la sentencia siguiente. «He aquí» es formal y bíblicamente reconocible en español, sin perder claridad.
- source_word: שְׁמֹעַ
  english_pob_choice: to obey
  chosen_spanish: obedecer
  alternatives_spanish:
  - oír
  - escuchar
  lexicon: HALOT
  rationale: El paralelismo exige mantener en la cláusula principal el mismo valor obediencial que ya aparece en la primera mitad del versículo. En español, el infinitivo «obedecer» comunica con precisión la fuerza ética del hebreo.
- source_word: מִזֶּבַח טוֹב
  english_pob_choice: is better than sacrifice
  chosen_spanish: es mejor que el sacrificio
  alternatives_spanish:
  - es mejor que un sacrificio
  - vale más que el sacrificio
  lexicon: HALOT
  rationale: La construcción comparativa con טוב se expresa naturalmente como superioridad. El singular genérico «el sacrificio» reproduce bien el contraste proverbial sin añadir especificaciones innecesarias.
- source_word: לְהַקְשִׁיב
  english_pob_choice: to listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - prestar atención
  - atender
  lexicon: HALOT
  rationale: קָשַׁב implica oír con atención. Como שׁמע ya se tradujo con «obedecer», «escuchar» mantiene el paralelismo poético y distingue los dos verbos sin forzar la sintaxis.
- source_word: מֵחֵלֶב אֵילִים
  english_pob_choice: than the fat of rams
  chosen_spanish: que la grosura de carneros
  alternatives_spanish:
  - que el sebo de carneros
  - que la grasa de carneros
  lexicon: HALOT
  rationale: חֵלֶב designa la grasa selecta, especialmente la porción sacrificial mejor reservada. «Grosura» es un término bíblico y comprensible en español para conservar el matiz culto y ritual, sin reducirlo a un sentido meramente culinario.
theological_decisions:
- issue: La tensión entre rito sacrificial y obediencia a la voz de Dios
  english_pob_reading: Use 'obey' for שׁמע in the main comparison and 'listen' for הקשׁיב in the parallel line.
  chosen_spanish_reading: Usar «obedecer» en la comparación principal y «escuchar» en la línea paralela.
  alternative_spanish_readings:
  - Usar «oír»/«escuchar» en ambas líneas para repetir más literalmente el campo semántico
  - Usar «prestar atención» en la segunda línea
  rationale: El sentido teológico del versículo no es que el oír físico supere al sacrificio, sino que la obediencia a la palabra de Yahvé tiene prioridad sobre el culto ritual. La distinción entre «obedecer» y «escuchar» conserva el paralelismo poético y hace explícita la fuerza ética del hebreo sin borrar la tensión entre culto y sumisión.
  doctrine_reference: 1 Samuel 15:22; filosofía de traducción del POB sobre equivalencia óptima y prioridad del sentido covenantal
- issue: Referencia directa al nombre divino
  english_pob_reading: Use 'the LORD' in English as a doctrinal default.
  chosen_spanish_reading: Usar «Yahvé» en el texto principal.
  alternative_spanish_readings:
  - Usar «el Señor»
  - Usar «Jehová»
  rationale: La política española del proyecto exige no velar el tetragrámaton con un título genérico. Aquí la fuente hebrea contiene יהוה de manera explícita, por lo que «Yahvé» es la decisión consistente con el texto y con la terminología del proyecto.
  doctrine_reference: Norma terminológica del proyecto para יהוה / YHWH
- issue: Cómo reflejar el contraste entre holocausto, sacrificio y obediencia
  english_pob_reading: Maintain distinct sacrificial categories and the superiority claim.
  chosen_spanish_reading: Mantener «holocaustos», «sacrificios» y la cláusula comparativa «es mejor que»
  alternative_spanish_readings:
  - Unificar en «ofrendas»
  - Parafrasear como «agrada más obedecer que sacrificar»
  rationale: El texto enumera categorías cultuales concretas y formula una máxima comparativa. La traducción debe conservar esas distinciones y la estructura sapiencial/profética, porque la fuerza del versículo depende justamente de oponer ritual a obediencia.
  doctrine_reference: 1 Samuel 15:22; preservación de la fuerza profética del contraste ritual-obediencia
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que elevó «Behold» por registro más formal. Por eso se eligió «He aquí» en español, de tono solemne y bíblico. También se conservó la decisión revisada de diferenciar el valor obediencial de שׁמע frente a לְהַקְשִׁיב, sin diluir el contraste profético del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva el paralelismo semántico entre «obedecer» y «escuchar» para reflejar שׁמע / הקשׁיב sin homogeneizarlos.
  - «Holocaustos» y «sacrificios» se distinguen para respetar las categorías cultuales del hebreo.
  - El registro general es formal y bíblico, pero con sintaxis clara para lectores actuales.
  - La puntuación y el uso de comillas angulares siguen la norma editorial del español.
