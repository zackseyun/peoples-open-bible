revisions:
- from: Ahora[a], Yahvé, Dios de Israel, confirma tu palabra que has hablado a tu siervo David.
  to: Ahora, Yahvé, Dios de Israel, sea confirmada tu palabra[a] que hablaste a tu siervo David.
  rationale: Se corrige el verbo principal para reflejar el nifal/jusivo hebreo y la decisión auditada «be confirmed». Se mantiene «tu palabra» por fidelidad léxica, con una nota que conserva las alternativas principales del POB inglés. También se simplifica «que has hablado» a «que hablaste» para mayor naturalidad y sobriedad en español bíblico moderno.
