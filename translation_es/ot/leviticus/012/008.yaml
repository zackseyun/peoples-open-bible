  yaml_path: translation/ot/leviticus/012/008.yaml
  text: But if she cannot afford a lamb[a], then she shall take two turtledoves or two young pigeons, one for a burnt offering and one for a sin offering; and the priest shall make atonement for her, and she shall be clean.
