    rationale: La auditoría inglesa ya corrigió explícitamente esa adición porque no está en el hebreo. Mantenerla en español sobretraduce el contraste implícito.
  - severity: medium
    issue: «Para que coman ... y beban ...» desplaza el valor del infinitivo hacia finalidad.
    rationale: En contexto, el hebreo expresa el destino/consecuencia de los hombres sobre la muralla bajo asedio; en español conviene algo más directo como «que comerán ... y beberán ...».
  - severity: low
    issue: «Sobre la muralla» es entendible pero menos natural que «en la muralla» en este contexto.
    rationale: No afecta gravemente el sentido, pero una leve mejora estilística aumenta la fluidez sin perder literalidad.
