translation:
  language: es
  text: Cuando los hombres de Israel vieron que estaban en aprietos, porque el pueblo estaba bajo mucha presión, el pueblo se escondió en cuevas, en matorrales[a], entre peñas, en fortalezas[b] y en hoyos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre espinos»; el término hebreo es raro y puede referirse específicamente a maleza espinosa.
    reason: lexical_alternative
  - marker: b
    text: O «en refugios subterráneos», «en cámaras subterráneas» o «en hoyos»; el término hebreo es incierto y puede referirse a escondites subterráneos.
    reason: lexical_alternative
  - marker: c
    text: O «en cisternas»; el hebreo también puede referirse a excavaciones usadas para almacenar agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en forma singular con sentido colectivo, y el verbo plural confirma la referencia distributiva. «Los hombres de Israel» conserva el matiz masculino/colectivo que el POB inglés preserva, sin forzar una literalidad incómoda con «cada hombre de Israel».
- source_word: רָאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - advirtieron
  - reconocieron
  lexicon: HALOT
  rationale: El sentido básico es perceptivo/visual. «Vieron» respeta el verbo hebreo y deja que la cláusula siguiente explique qué comprendieron acerca de su situación.
- source_word: כִּי צַר לוֹ
  english_pob_choice: that they were in trouble
  chosen_spanish: que estaban en aprieto
  alternatives_spanish:
  - que estaban en angustia
  - que estaban en dificultad
  lexicon: HALOT
  rationale: La construcción es comprimida y en hebreo presenta una tensión de sujeto singular con sentido colectivo. «En aprieto» transmite la idea de angustia o estrechez militar sin introducir una paráfrasis más fuerte que el texto.
- source_word: כִּי נִגַּשׂ הָעָם
  english_pob_choice: because the people were hard pressed
  chosen_spanish: porque el pueblo estaba apretado
  alternatives_spanish:
  - porque el pueblo era oprimido
  - porque el pueblo estaba oprimido
  lexicon: HALOT
  rationale: נגשׂ en esta forma expresa presión, acoso o ser apretado. «Estaba apretado» refleja con naturalidad el efecto de presión sobre el grupo y mantiene la imagen de compresión que el inglés expresó con «hard pressed».
- source_word: וַיִּתְחַבְּאוּ
  english_pob_choice: hid themselves
  chosen_spanish: se escondió
  alternatives_spanish:
  - se ocultó
  - se puso a salvo escondiéndose
  lexicon: HALOT
  rationale: El hitpael es reflexivo. Aunque el sujeto es colectivo, en español puede sonar más natural el verbo singular con valor colectivo («el pueblo se escondió»), y la forma mantiene el acto deliberado de ocultarse.
- source_word: בַּמְּעָרוֹת
  english_pob_choice: in caves
  chosen_spanish: en cuevas
  alternatives_spanish:
  - en cavernas
  lexicon: HALOT
  rationale: מְעָרָה significa de manera directa «cueva». La forma plural española sigue el plural hebreo y es idiomática.
- source_word: וּבַחֲוָחִים
  english_pob_choice: in thickets
  chosen_spanish: en matorrales[a]
  alternatives_spanish:
  - entre espinos
  - en zarzas
  lexicon: HALOT
  rationale: El término es raro y probablemente designa maleza espinosa o monte bajo. «Matorrales» es suficientemente amplio y natural en español; la nota preserva la alternativa específica de espinos por la incertidumbre léxica.
- source_word: וּבַסְּלָעִים
  english_pob_choice: among rocks
  chosen_spanish: entre peñas
  alternatives_spanish:
  - entre rocas
  - entre riscos
  lexicon: HALOT
  rationale: סֶלַע apunta a roca, peña o risco. «Entre peñas» conserva la imagen de refugio entre formaciones rocosas y suena más natural que una repetición literal de «rocas».
- source_word: וּבַצְּרִחִים
  english_pob_choice: in strongholds
  chosen_spanish: en fortalezas[c]
  alternatives_spanish:
  - en refugios subterráneos
  - en fosos
  - en cámaras subterráneas
  lexicon: HALOT
  rationale: La tradición auditada en inglés revisó «cellars» a «strongholds» por mayor precisión léxica. En español, «fortalezas» es la opción más prudente para un término difícil y raro, sin fijar indebidamente una imagen de sótanos o cámaras subterráneas que el hebreo no garantiza.
- source_word: וּבַבֹּרוֹת
  english_pob_choice: in pits
  chosen_spanish: en pozos
  alternatives_spanish:
  - en cisternas
  - en hoyos
  lexicon: HALOT
  rationale: בּוֹר puede significar pozo, cisterna o foso. Dado que el contexto describe escondites, «pozos» es una opción amplia y comprensible en español; la alternativa «cisternas» queda disponible por la polisemia del término.
theological_decisions:
- issue: Tensión del singular hebreo con sujeto colectivo en «כִּי צַר לוֹ» / «וַיִּתְחַבְּאוּ הָעָם»
  english_pob_reading: the men of Israel... they were in trouble... the people hid themselves
  chosen_spanish_reading: los hombres de Israel vieron que estaban en aprieto... el pueblo se escondió
  alternative_spanish_readings:
  - los hombres de Israel vieron que él estaba en aprieto...
  - el pueblo se escondió
  rationale: El hebreo combina un singular idiomático con referentes colectivos. El español mantiene el sentido colectivo con pluralidad semántica («estaban») donde hace falta, y usa un sujeto colectivo singular en la oración final para fluidez. Así no se borra la tensión textual, pero tampoco se vuelve ininteligible.
  doctrine_reference: Observación gramatical y semántica del texto hebreo; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra alta concordancia con una revisión menor: se sustituyó ‘cellars’ por ‘strongholds’ para צְרִחִים/בַּצְּרִחִים. La versión española sigue esa revisión y evita fijar un valor demasiado específico para el término raro, optando por «fortalezas» y consignando alternativas léxicas en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «hombres de Israel» para reflejar el sustantivo singular colectivo del hebreo y su concordancia con el verbo plural.
  - Se prefirió un español natural y publicable sin perder la lista de escondites ni la incertidumbre léxica de los términos raros.
  - Las notas a, b y c quedan ancladas en el texto exactamente donde corresponde cada alternativa.
