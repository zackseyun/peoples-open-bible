translation:
  language: es
  text: Tú lo herirás con la vara, y librarás su vida[a] del Seol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma». El hebreo néfesh puede significar «vida», «ser» o «alma», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «la tumba».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשֵּׁבֶט
  english_pob_choice: with the rod
  chosen_spanish: con la vara
  alternatives_spanish:
  - con la vara
  - con un bastón
  lexicon: HALOT
  rationale: שֵׁבֶט puede significar vara, bastón o cetro. En este contexto de disciplina, «vara» conserva el instrumento concreto y su fuerza disciplinaria sin suavizar el hebreo.
- source_word: תַּכֶּנּוּ
  english_pob_choice: you shall strike him
  chosen_spanish: lo herirás
  alternatives_spanish:
  - lo golpearás
  - lo castigarás
  lexicon: HALOT
  rationale: El verbo expresa una acción física de golpear o herir. «Herir» mantiene la literalidad básica del acto señalado por el hebreo y evita introducir el matiz interpretativo de «castigar».
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse a vida, ser, alma o persona según el contexto. Aquí, por el paralelo con «del Seol», «su vida» comunica mejor la idea de preservarlo de la muerte sin fijar una antropología más estrecha de la que exige el texto.
- source_word: מִשְּׁאוֹל
  english_pob_choice: from Sheol
  chosen_spanish: del Seol
  alternatives_spanish:
  - de la tumba
  - del reino de los muertos
  lexicon: HALOT
  rationale: Se conserva «Seol» para retener el término hebreo y su carga conceptual propia, en lugar de reducirlo de entrada a una paráfrasis como «tumba».
- source_word: תַּצִּיל
  english_pob_choice: you will deliver
  chosen_spanish: librarás
  alternatives_spanish:
  - rescatarás
  - salvarás
  lexicon: HALOT
  rationale: El Hifil de נצל significa librar, rescatar o entregar. «Librarás» encaja bien con «del Seol» y mantiene un tono solemne sin cargar el verso con un matiz doctrinal más específico que el hebreo.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en relación con Seol
  english_pob_reading: his life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - su ser
  rationale: El proverbio habla de preservar al hijo de un camino que conduce a la muerte. Traducir נַפְשׁוֹ como «su vida» conserva el sentido idiomático del hebreo y evita resolver de manera innecesaria la tensión entre vida, alma y persona.
  doctrine_reference: Preservar la tensión léxica sin imponer una doctrina antropológica simplificada.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo masorético y coincide con el criterio auditado en la POB inglesa: conservar «Seol», mantener la imagen concreta de la vara y traducir נֶפֶשׁ por «vida» en este contexto. No se detectaron revisiones pendientes en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino, aunque este verso no lo contiene.
  - Se eligió «vara» en vez de «bastón» como término principal por su naturalidad en español y por el paralelismo disciplinario del contexto.
  - Se conservó «Seol» con nota explicativa para evitar neutralizar el término hebreo.
  - La puntuación y el orden sintáctico buscan una lectura natural en español sin alejarse del paralelismo del hebreo.
