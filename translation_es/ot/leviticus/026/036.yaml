translation:
  language: es
  text: En cuanto a los que queden de ustedes, yo traeré desfallecimiento a sus corazones en las tierras de sus enemigos; y el sonido de una hoja arrastrada[a] los perseguirá; huirán como si huyeran de la espada, y caerán sin que nadie los persiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de una hoja llevada por el viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָרִים בָּכֶם
  english_pob_choice: those of you who remain
  chosen_spanish: los que de ustedes queden
  alternatives_spanish:
  - los sobrevivientes entre ustedes
  - los que queden entre ustedes
  lexicon: HALOT
  rationale: El participio expresa a los que quedan después del juicio; en español, «los que de ustedes queden» conserva la dirección a Israel y evita una formulación demasiado técnica o poco natural.
- source_word: וְהֵבֵאתִי
  english_pob_choice: I will bring
  chosen_spanish: yo pondré
  alternatives_spanish:
  - yo traeré
  - yo haré venir
  lexicon: HALOT
  rationale: El hifil de בוא tiene sentido causativo. Aquí, con el objeto interno «desmayo», «poner» comunica bien la acción divina de introducir ese estado sin perder la agencia de Yahvé.
- source_word: מֹרֶךְ
  english_pob_choice: faintness
  chosen_spanish: desmayo
  alternatives_spanish:
  - desfallecimiento
  - temor
  - pavor
  lexicon: HALOT
  rationale: El sustantivo designa una debilidad interna, una desintegración del valor. «Desmayo» conserva la idea de colapso anímico y físico mejor que «temor» a secas.
- source_word: בִּלְבָבָם
  english_pob_choice: into their hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - dentro de sus corazones
  - en su interior
  lexicon: HALOT
  rationale: El hebreo usa una localización interna; en español, con «poner», «en sus corazones» es natural y mantiene la imagen sin forzar una construcción literal.
- source_word: בְּאַרְצֹת אֹיְבֵיהֶם
  english_pob_choice: in the lands of their enemies
  chosen_spanish: en la tierra de sus enemigos
  alternatives_spanish:
  - en las tierras de sus enemigos
  - en los territorios de sus enemigos
  lexicon: HALOT
  rationale: El plural hebreo puede reflejar dispersión, pero en español la singular colectiva «la tierra» es más fluida y sigue expresando la idea de estar dentro del ámbito enemigo.
- source_word: וְרָדַף אֹתָם
  english_pob_choice: will pursue them
  chosen_spanish: los perseguirá
  alternatives_spanish:
  - los acosará
  - los seguirá
  lexicon: HALOT
  rationale: «Perseguir» es la correspondencia directa de רדף y conserva el tono de amenaza judicial.
- source_word: קוֹל עָלֶה נִדָּף
  english_pob_choice: the sound of a driven leaf
  chosen_spanish: el sonido de una hoja impulsada
  alternatives_spanish:
  - el sonido de una hoja llevada por el viento
  - el sonido de una hoja arremolinada
  lexicon: HALOT
  rationale: «Hoja impulsada» conserva el pasivo de נדף sin decidir de manera obligatoria el agente, aunque el viento está implícito. Esto mantiene la tensión lexical documentada por la tradición POB.
- source_word: וְנָסוּ
  english_pob_choice: they will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - saldrán huyendo
  - escaparán
  lexicon: HALOT
  rationale: «Huir» es el equivalente natural de נוס y mantiene el registro solemne del juicio.
- source_word: מְנֻסַת חֶרֶב
  english_pob_choice: as from the sword
  chosen_spanish: como ante la espada
  alternatives_spanish:
  - como si huyeran de la espada
  - como huyendo de la espada
  lexicon: HALOT
  rationale: La construcción indica modo o comparación. «Como ante la espada» comunica el temor y la huida sin recargar la frase.
- source_word: וְנָפְלוּ
  english_pob_choice: they will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - caerán al suelo
  lexicon: HALOT
  rationale: נפל es amplio; «caerán» conserva la tersura y la ambigüedad del hebreo, dejando abierta la caída física y la ruina.
- source_word: וְאֵין רֹדֵף
  english_pob_choice: when no one is pursuing
  chosen_spanish: sin que nadie los persiga
  alternatives_spanish:
  - aunque nadie los persiga
  - no habiendo perseguidor
  lexicon: HALOT
  rationale: 'La cláusula final subraya la ironía: el pánico es tan intenso que caen sin perseguidor real. «Sin que nadie los persiga» expresa esa idea en español natural.'
theological_decisions:
- issue: Agencia divina en el terror interior
  english_pob_reading: psychological terror and panic sent by God in exile
  chosen_spanish_reading: desmayo interior provocado por Yahvé que produce pánico y huida
  alternative_spanish_readings:
  - solo miedo psicológico
  - simple amenaza militar externa
  rationale: El verbo en primera persona muestra que Yahvé causa el estado interior; la traducción conserva esa causalidad divina y el efecto psicológico descrito por el texto, sin reducirlo a una mera figura militar.
  doctrine_reference: Levítico 26:36; filosofía de traducción POB §1, §3
- issue: La imagen de la hoja
  english_pob_reading: the sound of a driven leaf
  chosen_spanish_reading: el sonido de una hoja impulsada, sin precisar en el texto el agente
  alternative_spanish_readings:
  - el sonido de una hoja movida por el viento
  - el sonido de una hoja arrastrada
  rationale: El hebreo destaca que la hoja es «empujada/impulsada»; la POB en inglés preserva una alternativa interpretativa. En español, se mantiene la misma apertura, sin borrar la posible referencia al viento.
  doctrine_reference: Levítico 26:36; decisión léxica documentada en POB
- issue: Comparación con la espada
  english_pob_reading: they will flee as from the sword
  chosen_spanish_reading: huirán como ante la espada
  alternative_spanish_readings:
  - huirán como de la espada
  - huirán como si huyeran de la espada
  rationale: La frase expresa modo comparativo, no necesariamente una espada presente. «Como ante la espada» conserva la imagen de terror ante una amenaza mortal y evita añadir elementos no explicitados.
  doctrine_reference: Levítico 26:36
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que simplificó la comparación al decir «as from the sword». La versión española refleja esa misma naturalidad con «como ante la espada», manteniendo además la alternativa lexical para קוֹל עָלֶה נִדָּף documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en la traducción cuando el hebreo subyacente es el nombre divino.
  - 'Se mantiene el tono de juicio y amenaza con verbos directos: «poner», «perseguir», «huir», «caer».'
  - No se traduce automáticamente el plural hebreo de «tierras» en un plural obligatorio español, porque la singular colectiva resulta más idiomática y no altera el sentido.
  - La nota [a] debe anclarse en «hoja impulsada» o en la frase completa si se prefiere reflejar la alternativa interpretativa del sonido de la hoja.
