translation_notes:
  revision_awareness: Se atendió la revisión más reciente del inglés POB, que prefirió «method» sobre «device» y ajustó la sintaxis a una forma más natural. En español se adoptó «manera» y se mantuvo la fuerza del movimiento verbal con «arrastrar mi razón», evitando residuos del inglés y conservando la tensión interpretativa del vocativo griego.
  spanish_consistency_notes:
  - Se evitó el calco del inglés «Your method» y cualquier residuo léxico inglés en la línea principal.
  - Se mantuvo «carne» para σάρξ y «articulaciones» para ἄρθρα, conforme al criterio léxico del proyecto.
  - La puntuación y el estilo buscan una prosa bíblica moderna, digna y publicable en español neutro.
