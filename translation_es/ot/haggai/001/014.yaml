revisions:
- from: Y Yahvé[a] despertó el espíritu de Zorobabel, hijo de Sealtiel, gobernador de Judá, y el espíritu de Josué, hijo de Josadac, el sumo sacerdote, y el espíritu de todo el remanente del pueblo; y vinieron y hicieron obra en la casa de Yahvé de los Ejércitos, su Dios.
  to: Y Yahvé despertó el espíritu de Zorobabel, hijo de Sealtiel, gobernador de Judá, y el espíritu de Josué, hijo de Josadac, el sumo sacerdote, y el espíritu de todo el remanente del pueblo; y vinieron e hicieron el trabajo en la casa de Yahvé de los Ejércitos[a], su Dios.
  rationale: Se reubica la nota al título completo «Yahvé de los Ejércitos», que es donde pertenece la alternativa tradicional. Además, se sustituye «hicieron obra» por «hicieron el trabajo» para mantener la cercanía al hebreo y mejorar la naturalidad en español.
