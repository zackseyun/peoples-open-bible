    rationale: Cada nota debe anclarse en la palabra o frase pertinente. La nota sobre אֱמֶת debe ir en 'verdad'; la nota sobre סְמוּכִים debe ir en la expresión de firmeza.
  - severity: medium
    issue: La nota a conserva el inglés 'upheld'.
    rationale: Las notas del proyecto en español deben ser plenamente legibles en español; aquí corresponde 'sostenidos' o 'afirmados', no una glosa inglesa sin traducir.
  - severity: low
    issue: '''Para siempre y para siempre'' preserva la repetición pero suena poco idiomático en español.'
    rationale: La pareja hebrea intensifica permanencia; en español una forma más natural como 'para siempre jamás' conserva el énfasis sin rigidez.
  revised_spanish_text: Están firmes[a] para siempre jamás, hechos en verdad[b] y rectitud.
