theological_decisions:
- issue: Divine name/title rendering for ה'
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The Hebrew witness writes ה', and the Greek parallel has αὐτοῦ rather than an explicit κύριος in the second colon, but the first-colon/preceding context in the Masada excerpt mentions אדני. Given project policy for divine-name renderings and the conventional Sirach usage, 'the Lord' is retained in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD); Translation philosophy §2'
- issue: Handling the Hebrew-Greek mismatch in the first colon
  chosen_reading: The sun rises and shines on everything revealed
  alternative_readings:
  - The sun, giving light, looks upon everything
  - The sun shines on all things
  rationale: Zone 1 Hebrew is primary and supplies the phrase 'on all that is revealed/visible,' while the Greek parallel emphasizes illumination and surveying. The chosen rendering keeps the Hebrew base while allowing the Greek to inform the participle's nuance. Because source validation is marked minor_mismatch and Masada appears to preserve a shorter/different reading, the wording should not be treated as text-critically certain.
  doctrine_reference: 'PHILOSOPHY.md: Original-language primacy and transparency principles'
