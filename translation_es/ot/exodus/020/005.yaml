translation:
  language: es
  text: No te inclinarás ante ellos ni los servirás[a], porque yo, Yahvé tu Dios, soy un Dios celoso, que visita la iniquidad de los padres sobre los hijos, sobre la tercera y la cuarta generación de los que me odian[d][c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te postrarás ante ellos»; el verbo hebreo se refiere a inclinarse o postrarse en señal de reverencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni los adorarás»; aquí el verbo «servir» puede referirse al servicio cultual ofrecido a ídolos.'
    reason: lexical_alternative
  - marker: c
    text: La fórmula hebrea dice literalmente «visitando la iniquidad de los padres sobre los hijos». Se conserva el modismo hebreo; compárese Deuteronomio 24:16 y Ezequiel 18 para enseñanzas relacionadas sobre la responsabilidad individual.
    reason: cross_reference
  - marker: d
    text: 'O: «sobre la tercera y la cuarta generación de los que me odian».'
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  english_pob_choice: bow down
  chosen_spanish: te inclinarás
  alternatives_spanish:
  - te postrarás
  - adorarás
  lexicon: HALOT
  rationale: El verbo hebreo expresa el gesto físico de inclinarse o postrarse en señal de reverencia. «Te inclinarás» conserva esa acción concreta sin resolverla demasiado pronto como «adorarás», y mantiene la distinción con el siguiente verbo.
- source_word: תָעָבְדֵם
  english_pob_choice: serve them
  chosen_spanish: los servirás
  alternatives_spanish:
  - los adorarás
  - estarás esclavizado a ellos
  lexicon: HALOT
  rationale: עבד suele significar «servir». En contexto idolátrico puede implicar servicio cultual, pero «servir» preserva la diferencia léxica con el verbo anterior y conserva la amplitud religiosa del mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino revelado en el texto hebreo, conforme a la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu divinidad
  lexicon: HALOT
  rationale: La construcción posesiva de segunda persona singular se expresa naturalmente como «tu Dios», en un tono de pacto directo.
- source_word: אֵל קַנָּא
  english_pob_choice: a jealous God
  chosen_spanish: un Dios celoso
  alternatives_spanish:
  - un Dios celoso por su honor
  - un Dios celoso/ardoroso
  lexicon: HALOT
  rationale: «Celoso» es la equivalencia estable y más precisa en este contexto de exclusividad del pacto. «Celoso por su honor» explicaría el matiz, pero añade interpretación; «ardoroso» debilita la fuerza relacional del término.
- source_word: פֹּקֵד
  english_pob_choice: visiting
  chosen_spanish: que visita
  alternatives_spanish:
  - que castiga
  - que toma en cuenta
  lexicon: HALOT
  rationale: «Que visita» preserva el modismo hebreo de intervención judicial activa sin especificar un mecanismo más estrecho de lo que el hebreo exige.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - el pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y la amplitud semántica de עון mejor que «culpa» o «pecado».
- source_word: אָבֹת
  english_pob_choice: fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de los antepasados
  - de los progenitores
  lexicon: HALOT
  rationale: El hebreo es masculino plural y la fórmula del pacto conserva la referencia generacional a «padres»; se evita neutralizarla sin necesidad textual.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: sobre los hijos
  alternatives_spanish:
  - sobre los niños
  - sobre la descendencia
  lexicon: HALOT
  rationale: «Hijos» reproduce el paralelismo hebreo con «padres» y mantiene la relación generacional. «Descendencia» es posible, pero menos literal.
- source_word: שִׁלֵּשִׁים וְעַל רִבֵּעִים
  english_pob_choice: on the third and on the fourth generations
  chosen_spanish: hasta la tercera y la cuarta generación
  alternatives_spanish:
  - a la tercera y a la cuarta generación
  - sobre la tercera y la cuarta generación
  lexicon: HALOT
  rationale: Los numerales funcionan elípticamente como generaciones sucesivas. En español, «hasta la tercera y la cuarta generación» comunica con claridad el alcance sin perder el ritmo de la secuencia.
- source_word: לְשֹׂנְאָי
  english_pob_choice: of those who hate me
  chosen_spanish: de los que me odian
  alternatives_spanish:
  - de los que me aborrecen
  - de mis enemigos
  lexicon: HALOT
  rationale: La forma participial se traduce de manera directa como «de los que me odian», preservando el matiz relacional y la dependencia sintáctica del cierre.
theological_decisions:
- issue: Cómo expresar la exclusividad pactal de Dios frente a la idolatría
  english_pob_reading: You shall not bow down to them or serve them
  chosen_spanish_reading: No te inclinarás ante ellos ni los servirás
  alternative_spanish_readings:
  - No te postrarás ante ellos ni los adorarás
  - No te inclinarás ante ellos ni les rendirás culto
  rationale: La pareja verbal se conserva sin colapsar ambos mandatos en una sola noción de «adorar». Así se mantiene la tensión entre el acto corporal de reverencia y el servicio cultual que el hebreo distingue.
  doctrine_reference: Translation philosophy §3
- issue: Cómo traducir la autodescripción divina de קַנָּא
  english_pob_reading: I... am a jealous God
  chosen_spanish_reading: soy un Dios celoso
  alternative_spanish_readings:
  - soy un Dios celoso por mi honor
  - soy un Dios celoso en el pacto
  rationale: «Celoso» comunica la exclusividad legítima de Yahvé en el contexto del pacto y de la prohibición de la idolatría. Otras paráfrasis explican el matiz, pero suavizan la fuerza del término.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Cómo expresar la retribución intergeneracional sin resolverla doctrinalmente de forma excesiva
  english_pob_reading: visiting the iniquity of fathers on children, on the third and on the fourth generations of those who hate me
  chosen_spanish_reading: que visita la iniquidad de los padres sobre los hijos, hasta la tercera y la cuarta generación de los que me odian
  alternative_spanish_readings:
  - que castiga a los hijos por los pecados de los padres hasta la tercera y la cuarta generación
  - que toma en cuenta la iniquidad de los padres sobre los hijos
  rationale: Se preserva el modismo hebreo de «visitar la iniquidad» para no convertir el texto en una formulación doctrinal más cerrada de lo que dice. Así queda abierta la relación canónica con textos como Deuteronomio 24:16 y Ezequiel 18.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios (pass_count 2; high_agreement). No hubo revisiones aplicadas al texto base, así que esta redacción sigue de cerca el consenso del audit trail inglés y el hebreo WLC.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme a la terminología del proyecto.
  - Se conserva la distinción entre «inclinarse» y «servir» para reflejar dos verbos hebreos distintos.
  - «Dios celoso» traduce el valor de exclusividad pactal sin suavizarlo en un término más débil.
  - «Visita la iniquidad» preserva el hebraísmo y evita una paráfrasis doctrinalmente más cerrada.
  - Se usa «hijos» para אָבֹת/בָּנִים en una fórmula generacional masculina y paralela.
  - Las notas mantienen alternativas relevantes donde el español puede crear ambigüedad o donde el inglés POB ya preservó una opción textual.
