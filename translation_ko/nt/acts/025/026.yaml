source:
  edition: SBLGNT
  text: 'περὶ οὗ ἀσφαλές τι γράψαι τῷ κυρίῳ οὐκ ἔχω· διὸ προήγαγον αὐτὸν ἐφ’ ὑμῶν καὶ μάλιστα ἐπὶ σοῦ, βασιλεῦ Ἀγρίππα, ὅπως τῆς ἀνακρίσεως γενομένης σχῶ τί ⸀γράψω·'
base_translation:
  language: en
  yaml_path: translation/nt/acts/025/026.yaml
  text: Concerning him I have nothing definite to write to my lord[a]. Therefore I have brought him before you all, and especially before you, King Agrippa, so that, after the examination has taken place[b], I may have something to write.
  footnotes:
  - marker: a
    text: "Or, more explicitly, 'to the emperor.' The Greek says 'to my lord,' using the standard title κύριος in this imperial context."
    reason: alternative_reading
  - marker: b
    text: "'Examination' can also be rendered 'hearing' or 'inquiry,' referring to the judicial investigation of Paul's case."
    reason: lexical_alternative
translation:
  language: ko
  text: 그에 관해 저는 주(主)이신 분께[a] 확실한 것을 써 드릴 것이 없습니다. 그래서 저는 그를 여러분 모두 앞에, 특별히 아그립바 왕 앞에 끌어내었습니다. 이는 신문이 이루어진 후에 제가 무엇을 쓸 수 있게 되기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 더 명시적으로는 「황제께」. 헬라어는 「내 주께」라고 하며, 이 황실 문맥에서 표준 칭호 κύριος를 사용한다.
    reason: alternative_reading
lexical_decisions:
- source_word: τῷ κυρίῳ
  english_pob_choice: my lord
  chosen_korean: 주(主)이신 분께
  alternatives_korean:
  - 황제께
  - 내 주께
  lexicon: BDAG
  rationale: 여기 κύριος는 로마 황제를 가리키는 정치적 칭호이지 예수를 가리키는 신학적 칭호가 아니다. 「주(主)이신 분께」로 그 정치적 칭호성을 살리되 신학적 「주」와 구별하기 위해 한자 병기.
theological_decisions:
- issue: 베스도의 입에서 나온 κύριος를 예수의 「주」와 구분
  chosen_reading: 주(主)이신 분
  alternative_readings:
  - 주
  - 황제
  rationale: 본 절의 κύριος는 로마 황제에 대한 정치적 칭호이므로 예수에 대한 「주(主)」와 구분되어야 한다. 한자 병기와 각주를 통해 황제 칭호임을 분명히 한다.
  doctrine_reference: 'DOCTRINE.md: Distinguish political vs. theological titles'
