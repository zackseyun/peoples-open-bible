translation:
  language: es
  text: En aquel día levantaré el refugio[a] caído de David, y cerraré sus brechas[b]; levantaré sus ruinas y lo reedificaré como en los días de antaño[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tienda de David'; tradicionalmente, 'el tabernáculo de David'. La imagen hebrea es la de un refugio temporal, usado aquí de modo metafórico para la casa o dinastía caída de David.
    reason: lexical_alternative
  - marker: b
    text: O 'cerrar sus aberturas' o 'reparar sus grietas'.
    reason: lexical_alternative
  - marker: c
    text: '''Como en los días de antaño'' alude a tiempos antiguos o de antes, no necesariamente a la eternidad en sentido abstracto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética fija se conserva con una expresión natural en español que mantiene el registro escatológico sin añadir precisión temporal no presente en el hebreo.
- source_word: אָקִים
  english_pob_choice: I will raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - restauraré
  - estableceré
  lexicon: HALOT
  rationale: El hiphil de קום conserva la imagen concreta de hacer levantar o poner en pie; 'levantaré' mantiene ese valor y armoniza con la repetición del verbo en el versículo.
- source_word: סֻכַּת דָּוִיד
  english_pob_choice: the shelter of David
  chosen_spanish: la tienda caída de David
  alternatives_spanish:
  - la tienda de David
  - el tabernáculo de David
  - la casa de David
  lexicon: HALOT
  rationale: סֻכָּה es una estructura frágil de refugio; 'tienda' comunica esa imagen en español. Se añadió 'caída' para reflejar הַנֹּפֶלֶת y preservar el estado ruinoso descrito por el hebreo.
- source_word: הַנֹּפֶלֶת
  english_pob_choice: fallen
  chosen_spanish: caída
  alternatives_spanish:
  - que cae
  - derrumbada
  lexicon: HALOT
  rationale: El participio funciona aquí como rasgo descriptivo del refugio de David en ruina. 'Caída' es una equivalencia natural y breve en español, sin perder la idea de colapso.
- source_word: וְגָדַרְתִּי
  english_pob_choice: I will wall up
  chosen_spanish: cerraré
  alternatives_spanish:
  - amurallaré
  - taparé
  - repararé
  lexicon: HALOT
  rationale: גדר tiene el campo de cercar, cerrar o levantar un muro. En español, 'cerraré sus brechas' transmite el sentido de clausurar las aberturas de manera idiomática y sin perder la imagen de restauración.
- source_word: פִּרְצֵיהֶן
  english_pob_choice: its breaches
  chosen_spanish: sus brechas
  alternatives_spanish:
  - sus grietas
  - sus aberturas
  - sus roturas
  lexicon: HALOT
  rationale: '''Brechas'' es el término español más adecuado para daños estructurales o rupturas en una muralla o construcción, y mantiene la metáfora arquitectónica del hebreo.'
- source_word: וַהֲרִסֹתָיו
  english_pob_choice: its ruins
  chosen_spanish: sus ruinas
  alternatives_spanish:
  - sus escombros
  - sus restos demolidos
  lexicon: HALOT
  rationale: El sustantivo denota estados o lugares derruidos; 'ruinas' es la opción natural en español y conserva la imagen de restauración.
- source_word: וּבְנִיתִיהָ
  english_pob_choice: and rebuild it
  chosen_spanish: la reedificaré
  alternatives_spanish:
  - la reconstruiré
  - la edificaré de nuevo
  - la volveré a construir
  lexicon: HALOT
  rationale: El verbo base es 'construir', pero el contexto de ruina y restauración favorece en español un compuesto claro como 'reedificar'. El sufijo femenino se mantiene con 'la' para respetar el referente estructural.
- source_word: כִּימֵי עוֹלָם
  english_pob_choice: as in the days of old
  chosen_spanish: como en los días de antaño
  alternatives_spanish:
  - como en los días de antiguo
  - como en los días de los tiempos antiguos
  - como en los días de antes
  lexicon: HALOT
  rationale: עולם aquí señala antigüedad o larga duración, no eternidad abstracta. 'Días de antaño' comunica bien esa referencia a tiempos antiguos en un español digno y natural.
theological_decisions:
- issue: Referente de 'la tienda de David'
  english_pob_reading: A metaphor for the Davidic dynasty/kingdom in a humbled, collapsed state, expressed with the concrete image of a fragile shelter.
  chosen_spanish_reading: Una metáfora de la dinastía o reino davídico en estado abatido y derrumbado, expresada con la imagen concreta de una tienda frágil.
  alternative_spanish_readings:
  - Una tienda literal asociada con David
  - Un símbolo general de Israel sin foco davídico
  rationale: Se conserva la tensión del hebreo entre imagen concreta y sentido histórico-teológico. 'Tienda' evita resolver prematuramente la frase en una paráfrasis doctrinal como 'casa de David' y mantiene el foco davídico.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del expediente inglés y conserva sus decisiones principales: imagen de refugio temporal para סֻכָּה, valor de restauración para אָקִים, y referencia retrospectiva de כִּימֵי עוֹלָם. No se registraron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el hebreo lo exigiría explícitamente; este versículo no contiene el nombre divino.
  - Se evitó 'Cristo' y 'SEÑOR' porque el texto no contiene esas formas ni una cita directa de κύριος.
  - Se mantuvo el lenguaje arquitectónico de ruina/restauración para no diluir la metáfora del verso.
  - '''Tienda'' conserva mejor la fragilidad de סֻכָּה que ''tabernáculo'' en español actual, aunque se documenta la alternativa tradicional.'
