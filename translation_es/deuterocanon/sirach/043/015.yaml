review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: Dios da fuerza a la nube/nubes con el fin de lanzar granizo. Sin embargo, no sigue fielmente la decisión auditada del POB inglés sobre el testigo primario hebreo, que prefiere singular (''the cloud'') y conserva el plural griego como variante en nota. Además, falta en español la nota textual sobre Masada/Cairo Geniza presente en el rastro de auditoría inglés.'
  spanish_quality_summary: El español es claro y natural. 'Por su poder da fuerza...' suena bien, y 'para arrojar piedras de granizo' es inteligible y digno. No obstante, 'piedras de granizo' resulta algo pesado; 'granizo' es más idiomático en español y preserva el sentido. Conviene también reflejar mejor en notas la base textual sin sobrecargar el verso.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas generales son sólidas. La principal desalineación es textual: el proyecto auditado privilegia el hebreo singular para לענן, mientras el borrador adopta el plural en el texto principal.'
  issues:
  - severity: medium
    issue: El texto principal usa plural ('las nubes') donde el POB auditado documenta preferencia por el singular hebreo.
    rationale: La evidencia fuente primaria hebrea tiene לענן, singular; el inglés conserva esa prioridad en nota y traducción auditada, aunque hubo una revisión intermedia. El español debe seguir el testigo primario y trasladar el plural griego a nota.
  - severity: medium
    issue: Falta la nota textual sobre el fragmento de Masada y la continuación de Cairo Geniza.
    rationale: El English POB conserva una nota de variante textual significativa; el español debe preservarla porque afecta la justificación de la línea completa y del motivo del granizo.
  - severity: low
    issue: '''Piedras de granizo'' es correcto pero menos natural que ''granizo''.'
    rationale: Aunque literal, en español bíblico natural 'arrojar granizo' comunica bien la imagen sin rigidez. La concreción de 'stones of hail' puede mantenerse suficientemente en nota o en la decisión léxica, pero no es necesario forzarla en el texto.
  revised_spanish_text: Por su poder da fuerza a la nube[a][b], para arrojar granizo.
  revised_footnotes:
