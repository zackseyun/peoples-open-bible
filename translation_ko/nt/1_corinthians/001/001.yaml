translation:
  language: ko
  text: 하나님의 뜻으로 메시아 예수의 부르심받은 사도가 된 바울과, 형제 소스데네가,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κλητὸς ἀπόστολος
  english_pob_choice: a called apostle
  chosen_korean: 부르심받은 사도
  alternatives_korean:
  - 부르심을 받은 사도
  - 부름받은 사도
  lexicon: BDAG
  rationale: κλητός는 사도직을 수식하는 형용사로 부르심의 사실 자체를 강조한다. 한국어로 「부르심받은 사도」가 가장 직접적이다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: Χριστός는 칭호이므로 「메시아」로 옮긴다. 한국 전통의 「그리스도」는 음역으로 굳어져 칭호성이 가려진다.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_korean: 하나님의 뜻으로
  alternatives_korean:
  - 하나님의 뜻을 따라
  lexicon: BDAG
  rationale: διά + 속격은 수단/매개를 가리킨다.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: our brother
  chosen_korean: 형제
  alternatives_korean:
  - 그 형제
  lexicon: BDAG
  rationale: 관사형 ὁ ἀδελφός는 한국어에서 「형제」로 자연스럽게 옮긴다.
