review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: mandato de escuchar, promesa de hablar con el padre, regreso de Ragues, celebración/arreglo del matrimonio, negativa enfática de Ragüel a darla a otro hombre en violación de la ley de Moisés, y prioridad hereditaria de Tobías. Sin embargo, hay varios puntos de formulación española que no reflejan bien el matiz o resultan poco naturales: «hagamos la boda» no expresa bien el valor idiomático de ποιήσωμεν τὸν γάμον; «no le dará en absoluto a otro hombre» omite el objeto femenino explícito en español y suena torpe; «incurrirá en muerte» es poco idiomático para ὀφειλέσει θάνατον; y «más que a cualquier otro hombre» mezcla mal la comparación con el infinitivo «recibir».'
  spanish_quality_summary: La legibilidad es aceptable, pero el texto suena algo calcado en varios lugares. En español bíblico claro y moderno, conviene decir «arreglaremos/concertaremos el matrimonio», «no se la dará a otro hombre», «quedará sujeto a muerte» o «incurrirá en pena de muerte», y «antes que cualquier otro hombre». También es preferible «su padre» frente a «el padre de ella» por naturalidad. La nota al pie está bien orientada, pero la redacción «responsable de muerte» puede mejorarse.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión sobre «ley de Moisés» está bien alineada con la justificación inglesa. «Herencia» y «te corresponde» también están bien. El ajuste principal es estilístico-lexical, no de glosario.
  issues:
  - severity: medium
    issue: «hagamos la boda» para ποιήσωμεν τὸν γάμον
    rationale: Aunque cercano a la forma griega, en español suena poco natural y puede sugerir simplemente celebrar una fiesta. El sentido contextual es arreglar/llevar a cabo el matrimonio.
  - severity: medium
    issue: «no le dará en absoluto a otro hombre»
    rationale: 'La negación enfática está bien intentada, pero la frase es torpe y omite en español el pronombre objeto directo femenino que aclara «darla en matrimonio»: «no se la dará a otro hombre».'
  - severity: medium
    issue: «incurrirá en muerte»
    rationale: Es una expresión poco idiomática en español actual. El griego expresa responsabilidad legal o pena de muerte; «quedará sujeto a muerte» o «incurrirá en pena de muerte» comunica mejor ese valor.
  - severity: low
    issue: «el padre de ella»
    rationale: No es incorrecto, pero «su padre» es más natural y plenamente fiel en español.
  - severity: medium
    issue: «más que a cualquier otro hombre»
    rationale: La comparación queda mal ensamblada con «te corresponde recibir». El sentido es prioridad frente a cualquier otro pretendiente; «antes que cualquier otro hombre» o «más que a ningún otro hombre» funciona mejor.
  - severity: low
    issue: Nota al pie con «responsable de muerte»
    rationale: La explicación es correcta, pero «responsable de muerte» no suena natural; conviene «quedaría sujeto a muerte» o «incurriría en pena de muerte».
