translation:
  language: es
  text: Multiplicaste a sus hijos[a] como las estrellas de los cielos[b], y los introdujiste en la tierra que habías dicho a sus padres que entrarían para poseerla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hijos varones' o 'su descendencia'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''como las estrellas de los cielos'', con eco de la promesa hecha a los patriarcas.'
    reason: cross_reference
  - marker: c
    text: O 'tomar posesión de ella'; el verbo también puede traducirse 'heredar' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: HALOT
  rationale: בנים puede significar 'hijos' en sentido amplio de descendencia. 'Sus hijos' conserva la relación familiar y es natural en español; 'su descendencia' es más explícito pero menos directo.
- source_word: הִרְבִּיתָ
  english_pob_choice: you multiplied
  chosen_spanish: multiplicaste
  alternatives_spanish:
  - hiciste muchos
  - aumentaste
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer numerosos. 'Multiplicaste' reproduce bien la acción divina y el paralelismo bíblico.
- source_word: כְּכֹכְבֵי הַשָּׁמָיִם
  english_pob_choice: like the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas de los cielos
  lexicon: HALOT
  rationale: Se conserva la imagen y la resonancia del lenguaje de promesa a los patriarcas. 'De los cielos' mantiene más de cerca el hebreo, aunque 'del cielo' sería más idiomático.
- source_word: וַתְּבִיאֵם
  english_pob_choice: you brought them
  chosen_spanish: los introdujiste
  alternatives_spanish:
  - los trajiste
  - los hiciste entrar
  lexicon: HALOT
  rationale: El hifil de בוא implica hacer entrar o introducir. 'Introdujiste' expresa bien el movimiento hacia el interior de la tierra prometida sin perder la dirección causal.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: En español, 'introducir en' ya comunica el destino; repetir 'a la tierra' sería menos fluido.
- source_word: אֲשֶׁר אָמַרְתָּ לַאֲבֹתֵיהֶם
  english_pob_choice: that you had told their fathers
  chosen_spanish: que habías dicho a sus padres
  alternatives_spanish:
  - que habías prometido a sus padres
  - que habías hablado a sus padres
  lexicon: HALOT
  rationale: אָמַר puede ser 'decir' o 'prometer' según el contexto. Aquí conviene mantener la amplitud de 'habías dicho' para no añadir una especificación que el texto no exige.
- source_word: לָבוֹא
  english_pob_choice: to enter
  chosen_spanish: que entrarían
  alternatives_spanish:
  - para entrar
  - a entrar
  lexicon: HALOT
  rationale: El infinitivo expresa el contenido de lo dicho respecto a la tierra. 'Que entrarían' hace la frase natural en español y preserva la idea de acceso a la heredad.
- source_word: לָרָשֶׁת
  english_pob_choice: and possess
  chosen_spanish: a poseerla
  alternatives_spanish:
  - y poseerla
  - a tomar posesión de ella
  - a heredarla
  lexicon: HALOT
  rationale: ירשׁ puede rendirse como 'poseer', 'tomar posesión' o 'heredar' según contexto. 'Poseerla' es breve y mantiene la idea de ocupación y tenencia de la tierra sin introducir matices ajenos.
theological_decisions:
- issue: Eco de la promesa a los patriarcas
  english_pob_reading: Retained the allusive wording 'like the stars of the heavens' and 'their fathers' to preserve the connection to God's covenant promise without expanding it interpretively.
  chosen_spanish_reading: Conservé 'como las estrellas de los cielos' y 'sus padres' para mantener la alusión a la promesa pactal sin explicarla de más.
  alternative_spanish_readings:
  - como las estrellas del cielo
  - sus antepasados
  rationale: El versículo rehecha la fidelidad de Dios al lenguaje de la promesa. Mantener esa resonancia en español ayuda a conservar la carga teológica e intertextual del pasaje.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés; no se detectaron revisiones posteriores que exijan ajuste adicional.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió 'sus hijos' para בנים por su naturalidad y amplitud semántica.
  - '''Poseerla'' evita sobretraducir ירשׁ como ''heredar'' cuando el contexto inmediato enfatiza la entrada y ocupación de la tierra.'
