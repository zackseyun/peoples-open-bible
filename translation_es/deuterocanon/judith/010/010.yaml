translation:
  language: es
  text: Y así lo hicieron. Entonces salió Judit, ella y su criada con ella; y los hombres de la ciudad la estuvieron observando hasta que bajó del monte, hasta que atravesó el valle[a], y ya no pudieron verla.
  philosophy: optimal-equivalence
  footnotes:
