review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: condición introductoria, animal del rebaño, posesivo en «su ofrenda», especificación de hembra y requisito de integridad. Sin embargo, dos elecciones principales debilitan la fidelidad: «para el pecado» para לְחַטָּאת suena impropio en español y no preserva bien la categoría sacrificial que el POB inglés mantuvo como lectura principal; además, la nota al pie está mal anclada en «cordero» en lugar de la expresión correspondiente a חַטָּאת.'
  spanish_quality_summary: El texto es legible, pero «para el pecado» resulta poco natural y ambiguo en español eclesial, pudiendo sugerir finalidad moral en vez de nombre de sacrificio. También hay inconsistencia verbal entre «presenta» y «ofrecerá» donde el hebreo repite «traer». Una formulación más natural y fiel sería «como su ofrenda por el pecado» o «como su ofrenda para la ofrenda por el pecado»; la primera es claramente mejor en español.
  glossary_alignment: 'No hay conflicto con términos proyectuales mayores como Yahvé, Mesías, etc. La decisión clave es חַטָּאת: el proyecto inglés documentó «sin offering» con nota alternativa «purification offering». En español, la mejor alineación es «ofrenda por el pecado» en el texto principal, con nota que preserve «ofrenda de purificación» como alternativa. «Para el pecado» se aparta innecesariamente de la racionalidad auditada.'
  issues:
  - severity: high
    issue: «para el pecado» no comunica bien חַטָּאת como categoría sacrificial
    rationale: Aunque el hebreo permite matiz semántico, en este contexto levítico la palabra nombra el sacrificio; en español «para el pecado» suena antinatural y menos preciso que «ofrenda por el pecado», que además coincide mejor con la decisión principal del POB inglés.
  - severity: medium
    issue: La nota al pie está anclada en «cordero[a]» en vez de la expresión correspondiente a חַטָּאת
    rationale: El marcador debe aparecer sobre la palabra o frase relevante. La nota explica el término sacrificial, no el animal.
  - severity: low
    issue: Variación verbal innecesaria entre «presenta» y «ofrecerá»
    rationale: El hebreo repite el mismo verbo «traer». En español puede variarse, pero aquí «trae ... traerá» o «presenta ... presentará» preserva mejor la repetición estructural de la instrucción.
  revised_spanish_text: Y si trae un cordero como su ofrenda por el pecado[a], traerá una hembra sin defecto.
