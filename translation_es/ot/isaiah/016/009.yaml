  to: Por tanto, yo lloro con el llanto de Jazer por la vid de Sibmá; te empapo[a] con mis lágrimas, Hesbón y Elealé[b], porque sobre tu fruto de verano y sobre tu cosecha ha caído el grito de guerra.
