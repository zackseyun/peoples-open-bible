    text: 'O: «Solo que no arrancaré todo el reino».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige únicamente el punto principal de fidelidad y legibilidad: עַבְדִּי se traduce «mi siervo» en este contexto davídico, en consonancia con el source evidence, el POB inglés y el uso bíblico natural en español. Se pule además la nota alternativa para que suene más idiomática.'
