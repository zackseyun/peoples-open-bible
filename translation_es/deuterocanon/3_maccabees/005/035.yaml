translation:
  language: es
  text: Y los judíos, al oír lo que vino de parte del rey, estaban alabando al Dios manifiesto, el Señor, el Rey de los que gobiernan[a], porque habían obtenido de él esta ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «el Rey de reyes». El griego dice literalmente «el Rey de los que gobiernan».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ τε Ἰουδαῖοι
  english_pob_choice: And the Jews
  chosen_spanish: Y los judíos
  alternatives_spanish:
  - Y los judíos, también
  - Y los judíos entonces
  lexicon: LSJ
  rationale: Se conserva la referencia étnica/religiosa directa sin añadir matices innecesarios. El artículo definido reproduce bien el sujeto colectivo del griego.
- source_word: τὰ παρὰ τοῦ βασιλέως
  english_pob_choice: what came from the king
  chosen_spanish: lo que vino del rey
  alternatives_spanish:
  - las cosas procedentes del rey
  - el mensaje del rey
  - lo que procedía del rey
  lexicon: LSJ
  rationale: El neutro plural con παρά es amplio; 'lo que vino del rey' mantiene esa amplitud sin concretarlo indebidamente como decreto formal.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - habiendo oído
  lexicon: LSJ
  rationale: La construcción participial temporal se expresa de forma natural en español con 'al oír', manteniendo la secuencia sin sobrerregularizarla.
- source_word: τὸν ἐπιφανῆ θεὸν
  english_pob_choice: the manifest God
  chosen_spanish: a Dios, el manifiesto
  alternatives_spanish:
  - al Dios manifiesto
  - al Dios revelado
  - a Dios, el que se manifestó
  lexicon: LSJ
  rationale: Se preserva el adjetivo ἐπιφανῆ con fuerza de manifestación visible/activa. En español, 'el manifiesto' puede sonar menos natural aislado, por eso se integra en la apposición con coma. La elección conserva la tensión entre nombre divino y cualidad revelada.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - el Dueño
  lexicon: 'DOCTRINE.md Contested terms: κύριος → Lord'
  rationale: Se traduce κύριος como 'Señor', que es el equivalente reverencial estándar en el español bíblico y corresponde al valor doctrinal fijado para κύριος.
- source_word: Βασιλέα τῶν βασιλευόντων
  english_pob_choice: the King of kings / the King of those who rule
  chosen_spanish: el Rey de los que gobiernan
  alternatives_spanish:
  - el Rey de reyes
  - el Rey de los gobernantes
  lexicon: LSJ
  rationale: Se conserva el participio griego βασιλευόντων con 'los que gobiernan', evitando imponer de entrada la fórmula idiomática 'Rey de reyes'. La lectura tradicional se deja implícitamente reconocible, pero el texto principal sigue más de cerca la forma griega.
- source_word: ᾔνουν
  english_pob_choice: were praising
  chosen_spanish: estaban alabando
  alternatives_spanish:
  - alababan
  - seguían alabando
  lexicon: LSJ
  rationale: El imperfecto expresa acción en curso o reiterada. 'Estaban alabando' conserva ese aspecto progresivo y suena natural en español.
- source_word: τῆσδε τῆς βοηθείας
  english_pob_choice: this help
  chosen_spanish: esta ayuda
  alternatives_spanish:
  - este auxilio
  - esta asistencia
  - esta liberación
  lexicon: LSJ
  rationale: βοήθεια significa ayuda/auxilio. 'Ayuda' es la opción más directa y no añade una interpretación más fuerte como 'liberación'.
- source_word: τετευχότες
  english_pob_choice: they had obtained
  chosen_spanish: habían obtenido
  alternatives_spanish:
  - habían recibido
  - habiendo obtenido
  - habían alcanzado
  lexicon: LSJ
  rationale: El participio perfecto expresa una obtención ya realizada con resultado presente. 'Habían obtenido' reproduce bien ese sentido consumado.
theological_decisions:
- issue: Traducción de κύριος en una cadena de títulos divinos
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Amo
  - el Maestro
  rationale: En un contexto doxológico aplicado a Dios, 'Señor' conserva la reverencia y la equivalencia establecida para κύριος sin rebajar el tono teológico.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Tratamiento de Βασιλέα τῶν βασιλευόντων
  english_pob_reading: the King of kings / the King of those who rule
  chosen_spanish_reading: el Rey de los que gobiernan
  alternative_spanish_readings:
  - el Rey de reyes
  rationale: El griego usa un participio ('los que gobiernan/reinan'), no el sustantivo 'reyes'. El español principal conserva esa forma para no nivelar la tensión textual; la lectura idiomática queda como alternativa tradicional implícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El contexto inglés revisó una formulación más literal ('the King of those who rule') hacia la forma idiomática 'King of kings'. En español, se optó deliberadamente por mantener el valor participial del griego en el texto principal ('el Rey de los que gobiernan') y conservar la expresión tradicional en nota, para respetar la tensión léxica documentada sin perder legibilidad.
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος conforme al estándar doctrinal del proyecto.
  - Se evitó 'Cristo' porque el pasaje no contiene Χριστός/Μεσías.
  - '''Ayuda'' traduce βοήθεια sin cargarlo con ''liberación'' en el texto principal.'
  - La nota mantiene la alternativa idiomática 'Rey de reyes' porque el inglés POB y la revisión la documentan como lectura natural, aunque el texto principal conserve la forma más cercana al griego.
