    issue: La nota [a] está anclada a «estatutos», pero en la auditoría inglesa la alternativa corresponde a וַיָּשֻׁבוּ («se volvieron» / «se arrepintieron»).
    rationale: Esto altera la evidencia documentada y oculta una decisión teológica significativa sobre si el verbo implica arrepentimiento.
  - severity: high
    issue: La nota [c] está anclada a «obras», pero la alternativa «por medio de mis siervos los profetas» corresponde a «que yo mandé a mis siervos los profetas».
    rationale: La ubicación actual induce al lector a pensar que la nota explica «obras» en vez de la cláusula verbal relevante.
  - severity: medium
    issue: Falta puntuación explicativa en «mis siervos los profetas».
    rationale: En español, «mis siervos, los profetas» evita una lectura momentáneamente ambigua y mejora la naturalidad sin apartarse del hebreo.
  - severity: medium
    issue: «Así ha hecho con nosotros» es posible, pero menos natural que «así ha tratado con nosotros».
    rationale: El hebreo עָשָׂה אִתָּנוּ en este contexto de retribución suele expresarse mejor en español como trato recibido; esto también sigue mejor la rationale inglesa de ‘dealt with us’.
