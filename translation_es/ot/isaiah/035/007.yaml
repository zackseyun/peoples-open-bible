review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: transformación del desierto en agua abundante y vegetación de humedal, con buena correspondencia para שָׁרָב, צִמָּאוֹן, מַבּוּעֵי מָיִם, תַנִּים, חָצִיר, קָנֶה y גֹמֶא. También preserva las tres notas alternativas del POB. Sin embargo, hay pequeños problemas de forma y precisión: la nota a usa «miraje», que es incorrecto en español estándar; y «donde se recuestan» suena algo doméstico para animales salvajes, mientras que «donde se echan» refleja mejor רבץ.'
  spanish_quality_summary: El español es claro y digno, ampliamente legible en contexto eclesial. «El arenal ardiente», «la tierra sedienta» y «manantiales de agua» son naturales. «Guarida de chacales» funciona bien. La principal mejora estilística es reemplazar «se recuestan» por «se echan», que es más idiomático y vívido para fauna del desierto. También conviene corregir la alternativa léxica «miraje» a «espejismo» para español estándar neutral.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas clave son coherentes con el razonamiento documentado del POB, salvo la alternativa española «miraje», que debe ajustarse a «espejismo».
  issues:
  - severity: medium
    issue: La nota a usa «miraje».
    rationale: «Miraje» no es la opción estándar ni la más clara en español neutral; «espejismo» expresa mejor la alternativa documentada para שָׁרָב.
  - severity: low
    issue: «Donde se recuestan» suena menos natural para chacales que «donde se echan».
    rationale: רבץ describe el echarse o tenderse de animales; «se echan» conserva mejor la imagen salvaje y evita un matiz demasiado doméstico.
  - severity: low
    issue: La lista de alternativas léxicas incluye «la miraje».
    rationale: Además del problema léxico, el género es incorrecto. Aunque está fuera del texto bíblico principal, conviene corregirlo por fidelidad y calidad editorial.
