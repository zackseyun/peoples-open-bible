review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: guardar el mandamiento, propósito de fortalecerse, entrar y poseer la tierra. También preserva correctamente el singular colectivo de כָּל הַמִּצְוָה mediante «todo el mandamiento». Sin embargo, «que ustedes cruzan» no expresa con suficiente claridad עֹבְרִים en este contexto de cruce hacia la tierra; en español natural y fiel conviene «van a cruzar para entrar» o similar, para evitar la impresión de un cruce genérico. Además, la nota [b] sobre «hoy» no corresponde a una alternativa significativa preservada por el audit trail inglés y recarga innecesariamente el texto.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero hay algunos detalles mejorables. «Así que guarden» es natural, aunque «Por tanto, guarden» suena algo más digno; no es obligatorio cambiarlo. La secuencia «entren y posean la tierra que ustedes cruzan para poseerla» resulta algo áspera e incluso ambigua en español, porque parece que se cruza la tierra misma, no el río o el umbral hacia ella. También conviene simplificar las notas para que respondan a verdaderas necesidades léxicas del pasaje.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. «Mandamiento», «tierra» y «posean» concuerdan bien con el rastro léxico del POB. «Se fortalezcan» es aceptable para חזק y preserva la amplitud indicada en la nota inglesa. No aparece terminología sensible como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La cláusula «que ustedes cruzan» suena ambigua y poco idiomática en español.
    rationale: אֲשֶׁר אַתֶּם עֹבְרִים שָׁמָּה describe el cruce hacia la tierra, no que la tierra sea el objeto directo de «cruzar». En español, «la tierra que ustedes cruzan» puede malentenderse como atravesar la tierra. Una redacción como «la tierra a la que van a cruzar para tomar posesión» o «la tierra que van a cruzar para poseer» transmite mejor el sentido direccional.
  - severity: low
    issue: La nota [b] sobre «hoy» no está justificada por el audit trail inglés.
    rationale: El inglés no conserva una nota sobre «today», y en español «hoy» no crea una ambigüedad nueva que requiera explicación. Mantener esa nota añade peso sin necesidad.
  - severity: low
    issue: La cadena de marcadores [a][b][c] no está bien distribuida según relevancia real.
    rationale: La nota sobre el singular colectivo y la alternativa de חזק sí aportan valor; la de «hoy» no. Conviene dejar solo las notas verdaderamente útiles.
  revised_spanish_text: Así que guarden[a] todo el mandamiento que hoy les estoy mandando, para que se fortalezcan[b], entren y posean[c] la tierra a la que van a cruzar para poseerla.
