  language: en
  yaml_path: translation/ot/1_samuel/028/001.yaml
  text: Now in those days the Philistines gathered their forces for war[a], to fight against Israel. And Achish said to David, “You surely know that you and your men must go out with me in the camp.”
  footnotes:
