translation:
  language: es
  text: Y les daré un solo corazón[a] y un solo camino[b], para que me teman todos sus días, para su bien y para el bien de sus hijos después de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un corazón indiviso». El hebreo dice literalmente «un corazón».
    reason: lexical_alternative
  - marker: b
    text: O «una senda». El hebreo «camino» puede referirse en sentido figurado a un modo de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y daré
  alternatives_spanish:
  - Y les daré
  - Y concederé
  lexicon: HALOT
  rationale: El imperfecto con ו consecutivo en discurso profético expresa promesa futura; en español, el futuro simple comunica bien esa promesa. "Dar" conserva el sentido básico de נתן sin añadir matices no presentes en el hebreo.
- source_word: לֵב אֶחָד
  english_pob_choice: one heart
  chosen_spanish: un solo corazón
  alternatives_spanish:
  - un corazón unido
  - un corazón indiviso
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal del hebreo. "Un solo corazón" conserva la imagen y deja abierta la tensión entre unidad interior y lealtad íntegra, sin resolverla con una paráfrasis interpretativa.
- source_word: וְדֶרֶךְ אֶחָד
  english_pob_choice: one way
  chosen_spanish: un solo camino
  alternatives_spanish:
  - un solo modo de vida
  - una sola senda
  lexicon: HALOT
  rationale: '"Camino" reproduce el valor literal y figurado de דרך. "Un solo camino" es natural en español y permite la lectura moral o de conducta sin perder la metáfora.'
- source_word: לְיִרְאָה אֹתִי
  english_pob_choice: so that they may fear me
  chosen_spanish: para que me teman
  alternatives_spanish:
  - para temerme
  - para que me reverencien
  lexicon: HALOT
  rationale: La preposición ל con infinitivo indica propósito. "Temerme" conserva el idioma bíblico de ירא; en este contexto conviene no sustituirlo por un término más explicativo que reduzca la fuerza reverencial del verbo.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all their days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - siempre
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es "todos los días"; "todos sus días" suena natural en español y expresa duración continua a lo largo de la vida.
- source_word: לְטוֹב לָהֶם
  english_pob_choice: for their good
  chosen_spanish: para su bien
  alternatives_spanish:
  - para su beneficio
  - para su provecho
  lexicon: HALOT
  rationale: La preposición ל con טוב marca beneficio o resultado favorable. "Para su bien" es una equivalencia breve y fiel, sin desplazar el sentido hacia una interpretación más amplia de bienestar.
- source_word: וְלִבְנֵיהֶם אַחֲרֵיהֶם
  english_pob_choice: and for the good of their children after them
  chosen_spanish: y para el bien de sus hijos después de ellos
  alternatives_spanish:
  - y para el bien de sus descendientes después de ellos
  - y para sus hijos después de ellos
  lexicon: HALOT
  rationale: בנים aquí se traduce de forma directa como "hijos". Se conserva "después de ellos" para reflejar la continuidad generacional explícita del hebreo sin ampliar innecesariamente a "descendientes".
theological_decisions:
- issue: Sentido de "un solo corazón y un solo camino"
  english_pob_reading: A covenant promise of unified inner disposition and shared manner of life oriented toward reverent obedience to God.
  chosen_spanish_reading: Una promesa de pacto que reúne una disposición interior unificada y un modo de vida concorde, orientados a la obediencia reverente a Dios.
  alternative_spanish_readings:
  - principalmente unidad comunitaria entre el pueblo
  - principalmente integridad personal o devoción indivisa
  rationale: La traducción conserva las imágenes metafóricas "corazón" y "camino" para no cerrar la amplitud teológica del texto. Así se mantiene la tensión entre unidad interior, conducta compartida y dimensión comunitaria.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Sentido de "teman" en relación con Dios
  english_pob_reading: Reverential fear toward God within covenant relationship.
  chosen_spanish_reading: Temor reverente dentro de la relación del pacto.
  alternative_spanish_readings:
  - terror o pavor
  - solo respeto
  rationale: En Jeremías, ירא con Dios como objeto suele implicar reverencia obediente, no mera angustia. "Teman" preserva el término bíblico y evita tanto endurecerlo como diluirlo en un simple respeto.
  doctrine_reference: Jeremiah covenant restoration context; reverent fear in biblical usage.
translation_notes:
  revision_awareness: 'El texto en inglés de la POB fue revisado y quedó sin cambios en el último pase (latest_revision_pass: unchanged=true); la presente versión española sigue ese mismo estado textual sin introducir revisiones adicionales respecto del audit trail recibido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - Se usa «camino» y no «sendero» para conservar la correspondencia bíblica habitual de דרך con alcance literal y figurado.
  - «Teman» se conserva sin glosa en el cuerpo para respetar el lenguaje bíblico, y la nota doctrinal aclara la reverencia implícita.
  - «Hijos» traduce בנים de manera directa; no se amplía a «descendientes» en el texto principal.
  - La puntuación sigue el uso moderno del español y mantiene la paralelía del hebreo mediante dos miembros coordinados con «y».
