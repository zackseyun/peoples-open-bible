translation:
  language: es
  text: Él volverá a compadecerse de nosotros[a]; someterá nuestras iniquidades. Él arrojará todos sus pecados en lo profundo del mar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: "El hebreo cambia bruscamente de tercera persona a segunda persona: literalmente, 'tú arrojarás'. Algunos testigos y traducciones antiguas lo suavizan a 'y él arrojará'. Aquí se mantiene la tercera persona para seguir la decisión revisada del POB inglés."
    reason: alternative_reading
  - marker: b
    text: "El hebreo dice literalmente 'sus pecados'. Muchos traductores armonizan con 'nuestros pecados' por paralelismo con 'nuestras iniquidades', pero el POB inglés conserva la lectura recibida y la tensión del pronombre final."
    reason: textual_variant
lexical_decisions:
- source_word: יָשׁוּב
  english_pob_choice: again
  chosen_spanish: volverá a
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: 'El hebreo expresa la idea de repetición: ‘volverá a compadecerse’. En español, ‘volverá a’ comunica esa reiteración de forma natural sin añadir contenido no presente en el texto.'
- source_word: יְרַחֲמֵנוּ
  english_pob_choice: have compassion on us
  chosen_spanish: compadecerse de nosotros
  alternatives_spanish:
  - tener misericordia de nosotros
  - apiadarse de nosotros
  lexicon: HALOT
  rationale: רחם expresa compasión entrañable. ‘Compadecerse de nosotros’ conserva ese matiz afectivo mejor que una fórmula más fija, y sigue siendo clara en español bíblico contemporáneo.
- source_word: יִכְבֹּשׁ
  english_pob_choice: subdue
  chosen_spanish: someterá
  alternatives_spanish:
  - subyugará
  - pondrá bajo dominio
  lexicon: HALOT
  rationale: כבש implica someter o poner bajo control. ‘Someterá’ mantiene la fuerza de conquista sobre las iniquidades sin sonar excesivamente militar en español.
- source_word: עֲוֺנֹתֵינוּ
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestros pecados
  - nuestra culpa
  lexicon: HALOT
  rationale: Se conserva ‘iniquidades’ para mantener la distinción léxica frente al ‘pecados’ final del versículo. Esto preserva el contraste del hebreo entre עון y חטאת.
- source_word: וְתַשְׁלִיךְ
  english_pob_choice: He will cast
  chosen_spanish: Él arrojará
  alternatives_spanish:
  - Él echará
  - Él lanzará
  lexicon: HALOT
  rationale: Aunque la forma hebrea presenta una irregularidad/persona discutida en la tradición, la revisión del POB inglés opta por mantener la tercera persona. ‘Arrojará’ expresa bien el acto de echar lejos y es natural en español.
- source_word: בִּמְצֻלוֹת יָם
  english_pob_choice: into the depths of the sea
  chosen_spanish: en lo profundo del mar
  alternatives_spanish:
  - en las profundidades del mar
  - en las honduras del mar
  lexicon: HALOT
  rationale: La expresión hebrea es una imagen de profundidad marítima. ‘En lo profundo del mar’ es idiomático en español y conserva la sensación de remoción total.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todos los
  lexicon: HALOT
  rationale: ‘Todos’ reproduce el alcance totalizador del hebreo y se integra de manera fluida con el sustantivo siguiente.
- source_word: חַטֹּאותָם
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - los pecados de ellos
  - sus faltas
  lexicon: HALOT
  rationale: Se sigue la lectura retenida por el POB inglés (‘their sins’), aunque en español ‘sus pecados’ evita una construcción pesada. El posesivo ‘sus’ mantiene la referencia plural sin forzar una aclaración innecesaria.
theological_decisions:
- issue: Cambio de personas y sufijos posesivos en el versículo
  english_pob_reading: Retains the Hebrew shifts, including the final third-person plural suffix ('their sins').
  chosen_spanish_reading: 'Mantiene los cambios reales del hebreo: tercera persona al inicio, luego tercera persona también en el verbo final, y posesivo plural en ‘sus pecados’.'
  alternative_spanish_readings:
  - Él volverá a compadecerse de nosotros; someterá nuestras iniquidades; y arrojará todos nuestros pecados en lo profundo del mar.
  rationale: La tradición revisada del POB decidió no armonizar de manera excesiva las referencias pronominales. En español se conserva la lectura recibida del texto base y la rareza del verso queda visible sin necesidad de suavizarla en exceso.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que cambió la solución del verbo final de una lectura con segunda persona a tercera persona (‘He will cast’). La versión española sigue esa decisión revisada y además conserva la referencia plural final como ‘sus pecados’, reflejando la lectura hebrea tal como está en el texto masorético.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto hebreo lo requiere explícitamente; este versículo no lo contiene.
  - Se mantiene la distinción entre ‘iniquidades’ y ‘pecados’ para reflejar עון / חטאת.
  - Se evita ‘misericordia’ como calco automático; ‘compadecerse’ comunica mejor el matiz afectivo de רחם.
  - Se elige un español bíblico moderno y claro, sin arcaísmos innecesarios.
