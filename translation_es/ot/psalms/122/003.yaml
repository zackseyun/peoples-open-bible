lexical_decisions:
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: nombre propio estándar
  rationale: Es un nombre propio; en español bíblico se normaliza como «Jerusalén».
- source_word: הַבְּנוּיָה
  english_pob_choice: built
  chosen_spanish: edificada
  alternatives_spanish:
  - construida
  - levantada
  lexicon: HALOT
  rationale: El participio pasivo de בנה expresa el estado resultante de una ciudad ya construida. «Edificada» conserva ese matiz de obra concluida y suena natural en español bíblico.
- source_word: כְּעִיר
  english_pob_choice: like a city
  chosen_spanish: como una ciudad
  alternatives_spanish:
  - cual ciudad
  lexicon: HALOT
  rationale: La כ comparativa pide una equivalencia directa; «como una ciudad» mantiene la comparación sin sobreinterpretarla.
- source_word: שֶׁחֻבְּרָה
  english_pob_choice: joined together
  chosen_spanish: unida
  alternatives_spanish:
  - junta
  - ligada
  - compactamente unida
  lexicon: HALOT
  rationale: La forma pasiva de חבר expresa estar conectada o unida. En español, «unida» es fiel y no fuerza una imagen demasiado técnica.
- source_word: לָּהּ
  english_pob_choice: within itself
  chosen_spanish: en sí misma
  alternatives_spanish:
  - para sí
  - a sí misma
  lexicon: HALOT
  rationale: El sufijo retoma a la ciudad/Jerusalén y señala cohesión interna. «En sí misma» transmite esa unidad interna de manera clara y natural.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: en sí misma
  alternatives_spanish:
  - juntamente
  - toda junta
  - como una
  lexicon: HALOT
  rationale: יַחְדָּו refuerza la idea de conjunto/unidad. En español se integra en la expresión «unida en sí misma», evitando redundancia mecánica pero preservando la intensificación semántica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que elevó la idea de unidad interna y la formulación más natural de יַחְדָּו; por eso el español evita una expresión rígida y conserva la cohesión interna en una frase breve y publicable.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio estándar en español.
  - «Edificada» conserva el valor resultativo del participio hebreo.
  - La unidad interna del verso se expresa con «unida en sí misma», procurando reflejar tanto שֶׁחֻבְּרָה como יַחְדָּו sin duplicación pesada.
  - No se introdujo vocabulario doctrinal ajeno al verso.
