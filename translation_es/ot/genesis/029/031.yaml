translation:
  language: es
  text: Cuando Yahvé vio que Lea no era amada[a], le abrió la matriz, pero Raquel era estéril.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'odiada' o 'menos amada', reflejando el sentido comparativo que el término puede tener en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton, conforme al criterio POB de no sustituirlo por un título. 'Yahvé' es la forma estable y legible en español para el nombre revelado de Dios.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - tomó nota de
  lexicon: HALOT
  rationale: El verbo hebreo expresa percepción directa; 'vio' reproduce con naturalidad la narración y evita sobreinterpretar el matiz.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Yahvé vio, por lo que 'que' es la solución sintáctica más precisa en español.
- source_word: שְׂנוּאָה
  english_pob_choice: unloved
  chosen_spanish: odiada
  alternatives_spanish:
  - no amada
  - menos amada
  - rechazada
  lexicon: HALOT
  rationale: La forma pasiva de שׂנא conserva su fuerza semántica de 'odiada'. Aunque el contexto narrativo puede admitir una lectura comparativa, el texto hebreo es más fuerte que 'no amada'; por eso se mantiene la tensión con 'odiada' y se ofrece la alternativa comparativa en nota.
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Lía
  lexicon: Standard transliteration
  rationale: Se usa la transliteración estándar en español para el nombre propio.
- source_word: וַיִּפְתַּח אֶת רַחְמָהּ
  english_pob_choice: he opened her womb
  chosen_spanish: le abrió el vientre
  alternatives_spanish:
  - le abrió su matriz
  - le permitió concebir
  - la hizo fecunda
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal concreta del hebreo. 'Vientre' comunica de modo natural en español la imagen de רֶחֶם sin volverla abstracta ni suavizarla en exceso.
- source_word: רַחְמָהּ
  english_pob_choice: her womb
  chosen_spanish: el vientre
  alternatives_spanish:
  - la matriz
  - el seno materno
  lexicon: HALOT
  rationale: 'El sustantivo hebreo con sufijo posesivo se vierte con artículo y pronombre implícito en el verbo español: ''le abrió el vientre''. Esto mantiene claridad idiomática y fidelidad metafórica.'
- source_word: וְרָחֵל
  english_pob_choice: but Rachel
  chosen_spanish: pero Raquel
  alternatives_spanish:
  - y Raquel
  lexicon: Contextual discourse marker
  rationale: Aunque ו puede ser 'y', el contraste con la fertilidad de Lea y la esterilidad de Raquel es discursivamente central; 'pero' expresa mejor esa oposición en español.
- source_word: עֲקָרָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barrena
  - sin hijos
  lexicon: HALOT
  rationale: '''Estéril'' es un equivalente natural y digno en español para la condición de infertilidad/barrenness. Se evita una formulación arcaizante y se conserva la antítesis con la fecundidad concedida a Lea.'
theological_decisions:
- issue: Cómo renderizar שְׂנוּאָה sin borrar la tensión entre el sentido fuerte del hebreo y la posible lectura comparativa del contexto
  english_pob_reading: Leah was unloved, with a footnote allowing 'loved less'
  chosen_spanish_reading: Lea era odiada, con nota para 'menos amada'
  alternative_spanish_readings:
  - Lea era no amada
  - Lea era menos amada
  rationale: El hebreo participial pasivo de שׂנא tiene un sentido directo de 'odiada'. La tradición de suavizarlo a 'no amada' reduce la fuerza del texto. Para preservar la tensión textual y a la vez reconocer la posible lectura comparativa, se deja 'odiada' en el texto principal y se documenta la alternativa 'menos amada' en nota.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el giro revisado del POB inglés, que pasó de 'hated' a 'unloved' por naturalidad contextual, pero aquí se decidió mantener en español la fuerza semántica primaria de שׂנוּאָה ('odiada') para no diluir la tensión léxica del hebreo; se preserva la alternativa comparativa en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino del tetragrámaton, conforme al estándar POB en español.
  - Se mantiene un registro sobrio y publicable, sin calcos innecesarios.
  - '''Vientre'' conserva la imagen hebrea de forma clara en español y evita una paráfrasis más interpretativa.'
  - El contraste adversativo con Raquel se expresa con 'pero' para reflejar la relación discursiva del original.
