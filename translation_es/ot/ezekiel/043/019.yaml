translation:
  language: es
  text: Y darás a los sacerdotes levitas que son de la descendencia de Sadoc[a], los que se acercan a mí para ministrarme —declara el Señor Yahvé—, un toro[b] del ganado, para ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «descendientes de Sadoc». El hebreo dice literalmente «de la descendencia de Sadoc».
    reason: lexical_alternative
  - marker: b
    text: O «un novillo» o «un toro del hato». El hebreo usa una expresión que literalmente dice «un toro, hijo del ganado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall give
  chosen_spanish: Y darás
  alternatives_spanish:
  - Y deberás dar
  - Entonces darás
  lexicon: HALOT
  rationale: La forma hebrea funciona aquí como mandato/instrucción. «Darás» conserva el valor directivo en español natural; el prefijo «Y» mantiene la conexión discursiva.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - el sacerdocio levítico
  lexicon: HALOT
  rationale: La expresión identifica sacerdotes pertenecientes al orden levítico. «Sacerdotes levitas» es breve, idiomático y mantiene ambos elementos sin sugerir que sean simplemente levitas en general.
- source_word: אֲשֶׁר הֵם מִזֶּרַע צָדוֹק
  english_pob_choice: who are from the offspring of Zadok
  chosen_spanish: que son de la descendencia de Zadoc
  alternatives_spanish:
  - que son de la simiente de Zadoc
  - que son descendientes de Zadoc
  lexicon: HALOT
  rationale: «Descendencia» comunica bien la relación genealógica de זֶרַע sin volverlo arcaico; «de Zadoc» mantiene el vínculo nominal directo. Se usa «Zadoc» como forma española usual del nombre.
- source_word: הַקְּרֹבִים אֵלַי
  english_pob_choice: who draw near to me
  chosen_spanish: los que se acercan a mí
  alternatives_spanish:
  - los que se aproximan a mí
  - los que se allegan a mí
  lexicon: HALOT
  rationale: En contexto sacerdotal, קרב tiene sentido cultual de acercarse para servicio. «Se acercan a mí» preserva el gesto y su naturalidad en español; «alegarse» sonaría más tradicional pero menos claro.
- source_word: לְשָׁרְתֵנִי
  english_pob_choice: to minister to me
  chosen_spanish: para ministrarme
  alternatives_spanish:
  - para servirme
  - para ejercer su ministerio ante mí
  lexicon: HALOT
  rationale: El verbo שׁרת apunta a servicio litúrgico/oficial. «Ministrarme» conserva ese matiz cultual mejor que el genérico «servirme», y evita añadir contenido no explicitado por el hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». Con אֲדֹנָי precediendo, «Señor Yahvé» reproduce la doble referencia sin ocultar el nombre divino ni producir un calco extraño.'
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: a bull from the herd
  chosen_spanish: un toro de entre el ganado
  alternatives_spanish:
  - un toro del ganado
  - un novillo
  lexicon: HALOT
  rationale: La hebraiza literal sería «toro hijo de ganado», pero el inglés POB ya documenta la equivalencia idiomática. «De entre el ganado» conserva el sentido de procedencia/selección y suena natural en español de registro bíblico.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para sacrificio por el pecado
  lexicon: HALOT
  rationale: חַטָּאת en contexto sacrificial designa la ofrenda por el pecado, no el pecado abstracto. «Ofrenda por el pecado» es claro y fiel; se prefiere «para» para reflejar la finalidad del animal ofrecido.
theological_decisions:
- issue: Título divino en אֲדֹנָי יְהוִה
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: declara el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  rationale: Se conserva el nombre propio divino como «Yahvé» según la pauta del proyecto. La combinación con אֲדֹנָי se expresa con «Señor Yahvé» para reflejar ambos elementos sin sustituir el Tetragrámaton por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que corrigió la antigua literalidad de «a bull, a son of the herd» a la forma idiomática «a bull from the herd». En español se adopta una solución igualmente idiomática y auditable: «un toro de entre el ganado», manteniendo el valor semántico sin calco innecesario.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה conforme a la pauta del proyecto.
  - «Sacerdotes levitas» conserva el matiz de pertenencia levítica sin ampliar indebidamente el grupo.
  - «Ministrarme» se mantiene para reflejar servicio sacerdotal/cultual, no servicio genérico.
  - Se conserva la tensión lexical entre la lectura literal de פַּר בֶּן בָּקָר y su equivalencia idiomática mediante nota.
  - «Ofrenda por el pecado» sigue la terminología sacrificial estándar y evita una paráfrasis moralizante.
