base_translation:
  language: en
  yaml_path: translation/ot/exodus/001/022.yaml
  text: Then Pharaoh commanded all his people[a], saying, “Every son who is born you must throw into the Nile[c][b], but every daughter you must let live.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river.'' In Exodus this term commonly refers specifically to the Nile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Every boy who is born.' Hebrew 'son' can function generically for a male child in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'and every daughter'; the conjunction is rendered 'but' in English to show the contrast in Pharaoh's decree.
    reason: lexical_alternative
