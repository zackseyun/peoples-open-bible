translation:
  language: es
  text: Haremos para ti adornos[a] de oro, con tachuelas[b] de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cadenas de oro' o 'hileras de oro'; el término hebreo probablemente se refiere a algún tipo de adorno o pieza de joyería, pero la forma exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O 'cuentas de plata' o 'lentejuelas de plata'; el hebreo se refiere a pequeños elementos decorativos de plata.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרֵי
  english_pob_choice: ornaments
  chosen_spanish: adornos
  alternatives_spanish:
  - ornamentos
  - joyas
  - cadenas
  - hileras
  lexicon: HALOT
  rationale: El término hebreo apunta a una pieza o disposición ornamental de joyería, pero su forma exacta es incierta. 'Adornos' comunica bien la función estética sin comprometerse con un objeto específico que el hebreo no define con certeza.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: 'Es el nombre usual del metal y en español suena natural en una construcción adjetival de material: ''adornos de oro''.'
- source_word: נַעֲשֶׂה
  english_pob_choice: we will make
  chosen_spanish: Haremos
  alternatives_spanish:
  - Haremos para ti
  - Vamos a hacer
  - Que hagamos
  lexicon: HALOT
  rationale: La forma verbal de 1.ª persona plural expresa una acción volitiva o futura. En español, 'Haremos' conserva el valor directo y fluido sin convertirlo innecesariamente en exhortación.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - por ti
  lexicon: HALOT
  rationale: El sufijo de 2.ª persona femenina singular indica destinataria femenina. 'Para ti' expresa con naturalidad el beneficio/destino de los adornos.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Valor comitativo simple; 'con' mantiene la relación entre los adornos de oro y los elementos de plata.
- source_word: נְקֻדּוֹת
  english_pob_choice: studs
  chosen_spanish: engastes
  alternatives_spanish:
  - puntos
  - gránulos
  - adornos
  - tachones
  lexicon: HALOT
  rationale: El sustantivo puede referirse a pequeñas marcas o elementos decorativos. En un contexto de joyería, 'engastes' es una opción española idiomática para pequeños elementos aplicados o incrustados, sin fijar indebidamente la forma exacta; se deja abierta la ambigüedad léxica que la nota recoge.
- source_word: הַכָּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - plata
  - plateados
  lexicon: HALOT
  rationale: El hebreo nombra el metal, y en español 'de plata' funciona de modo natural como complemento de material para los engastes.
translation_notes:
  revision_awareness: La revisión reciente no introdujo cambios sustanciales; el acuerdo del control cruzado fue alto y el texto base se mantuvo estable. La presente versión sigue el sentido del original hebreo y la decisión léxica auditada de la POB en inglés, adaptándola a un español natural sin perder la ambigüedad reconocida del léxico.
  spanish_consistency_notes:
  - Se conserva un registro neutral y bíblico, sin recurrir a 'SEÑOR' ni a terminología eclesiástica ajena al verso.
  - '''Adornos'' evita concretar demasiado el posible objeto hebreo, mientras que la nota preserva las alternativas documentadas.'
  - '''Engastes'' busca un equivalente español legible para un elemento ornamental pequeño; la nota mantiene abiertas otras posibilidades léxicas.'
  - La estructura en futuro plural respeta el valor de נַעֲשֶׂה y la destinataria femenina queda explícita en 'para ti'.
