translation:
  language: es
  text: Entonces el rey Roboam envió a Adoram[a], que estaba a cargo del trabajo forzado, y todo Israel lo apedreó con piedras[b], y murió. Y el rey Roboam se apresuró[c] a subir al carro para huir a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Adoram»; algunos pasajes relacionados usan la forma «Adoniram».'
    reason: alternative_reading
  - marker: b
    text: 'O simplemente: «lo apedreó»; el hebreo dice explícitamente: «lo apedreó con piedras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se dio prisa». El hebreo dice más literalmente: «se fortaleció para subir al carro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol de שלח expresa la acción narrativa simple de enviar; «envió» es natural y fiel en español.
- source_word: אֲדֹרָם
  english_pob_choice: Adoram
  chosen_spanish: Adoram
  alternatives_spanish:
  - Adoniram
  lexicon: HALOT
  rationale: El texto hebreo aquí lee Adoram; se conserva esa forma en el texto principal y se registra la variante nominal relacionada en la nota.
- source_word: אֲשֶׁר עַל הַמַּס
  english_pob_choice: who was over the forced labor
  chosen_spanish: que estaba sobre el trabajo forzado
  alternatives_spanish:
  - que estaba sobre la leva
  - que estaba sobre la labor forzada
  - encargado del trabajo forzado
  lexicon: HALOT
  rationale: מַס en este contexto no es «tributo» monetario sino trabajo obligatorio impuesto por el Estado. «Trabajo forzado» comunica bien esa fuerza coercitiva en español.
- source_word: הַמַּס
  english_pob_choice: forced labor
  chosen_spanish: trabajo forzado
  alternatives_spanish:
  - leva
  - corvea
  - labor forzada
  lexicon: HALOT
  rationale: Se evita «tributo» o «impuesto» porque oscurecerían el sentido del término en este pasaje.
- source_word: וַיִּרְגְּמוּ ... אֶבֶן
  english_pob_choice: stoned him with stones
  chosen_spanish: lo apedreó con piedras
  alternatives_spanish:
  - lo lapidó
  - lo apedreó
  lexicon: HALOT
  rationale: El hebreo repite la idea de piedra; en español «apedreó con piedras» conserva esa concreción sin sonar excesivamente pesado.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el pueblo de Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene la designación colectiva del relato, que aquí señala al conjunto político de las tribus del norte.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y así murió
  lexicon: HALOT
  rationale: Continuación narrativa directa y sencilla del resultado de la lapidación.
- source_word: הִתְאַמֵּץ
  english_pob_choice: made haste
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se esforzó
  - hizo esfuerzo
  - se fortaleció
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse más literalmente como «se fortaleció / se esforzó», el contexto pide la idea de actuar con urgencia para escapar; «se apresuró» sigue la revisión auditada del POB inglés.
- source_word: לַעֲלוֹת בַּמֶּרְכָּבָה
  english_pob_choice: to get up into the chariot
  chosen_spanish: a subir al carro
  alternatives_spanish:
  - a montar el carro
  - a subir en el carro
  lexicon: HALOT
  rationale: «Carro» es el equivalente natural de מֶרְכָּבָה en español bíblico; «subir al carro» conserva la imagen de montarlo.
- source_word: לָנוּס יְרוּשָׁלָם
  english_pob_choice: to flee to Jerusalem
  chosen_spanish: para huir a Jerusalén
  alternatives_spanish:
  - para escapar a Jerusalén
  lexicon: HALOT
  rationale: נוּס denota huida; «huir» refleja mejor esa urgencia que un simple «irse» o «salir».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB inglés que cambió «but» por «and» para seguir mejor la secuencia hebrea, y que prefirió «made haste» para הִתְאַמֵּץ. La redacción española adopta esa lectura contextual sin traducir mecánicamente el inglés previo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece.
  - Se mantiene «Adoram» en el cuerpo y se deja la variante nominal en nota, siguiendo el audit trail.
  - Se conserva la fuerza de «trabajo forzado» para מַס, evitando términos eclesiásticos o tradicionales no motivados por el hebreo.
  - «Carro» se usa como equivalente bíblico natural de מֶרְכָּבָה; no se traduce como «carroza» porque esa opción sería menos común en español bíblico actual.
