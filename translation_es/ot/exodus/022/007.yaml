  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del audit trail inglés: conserva «Dios» en el texto principal con nota para «jueces», mantiene la imagen de «poner la mano», y representa adecuadamente el marco legal. Sin embargo, «para determinar» añade una finalidad explícita que el hebreo no expresa directamente; el texto dice más literalmente que el dueño de la casa se acerca a Dios para ver/establecer si no ha metido la mano en la propiedad de su prójimo.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor fidelidad y naturalidad forense. «Se presentará ante Dios» es aceptable, pero «se acercará a Dios» refleja mejor el verbo קרב y el audit trail. «Para determinar» suena explicativo. «Los bienes de su prójimo» es comprensible, aunque «la propiedad de su prójimo» alinea mejor con la decisión inglesa documentada.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» para אֱלֹהִים está correctamente preservado en el texto principal con nota alternativa. No aparecen términos sensibles adicionales del glosario general.
  issues:
  - severity: medium
    issue: «para determinar» sobretraduce la construcción final de la cláusula
    rationale: El hebreo usa אִם לֹא para introducir el contenido a dilucidar, no una finalidad explícita equivalente a «para determinar». La formulación española interpreta y expande el texto.
  - severity: low
    issue: «se presentará ante Dios» es algo más interpretativo que «se acercará a Dios»
    rationale: וְנִקְרַב significa literalmente «se acercará/comparecerá». «Se presentará» funciona en contexto legal, pero se aleja un poco de la imagen verbal que el audit trail quiso preservar.
  - severity: low
    issue: «los bienes de su prójimo» es válido, pero «la propiedad de su prójimo» alinea mejor con la decisión léxica auditada
    rationale: El inglés eligió «property» para reflejar el alcance amplio de בִּמְלֶאכֶת רֵעֵהוּ. «Bienes» puede sonar algo más concreto o inventariable que la noción más amplia de propiedad/asunto encomendado.
  revised_spanish_text: Si el ladrón no es hallado[a], el dueño de la casa se acercará a Dios para ver si no ha puesto su mano sobre la propiedad de su prójimo.
