    text: O, más tradicionalmente, «habitó como extranjera en la tierra de los filisteos por siete años».
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'ella y su casa' por 'ella y los de su casa' para evitar la ambigüedad de una casa física y reflejar mejor el sentido doméstico de בֵּיתָהּ. También se ajustó 'residente extranjera' a 'extranjera residente', que conserva el matiz de גור con mejor fluidez en español. La nota se mantuvo como alternativa tradicional para el verbo de residencia.
