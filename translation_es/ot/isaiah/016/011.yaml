revisions:
- from: Por eso mis entrañas por Moab[g] gimen como un arpa, y mi ser íntimo por Quir-heres.
  to: Por eso mis entrañas gimen como un arpa[a] por Moab, y mi ser íntimo por Quir-heres[b].
  rationale: Se reordenó la frase ligeramente para mayor naturalidad en español sin alterar el sentido. Se corrigió la secuencia de marcadores, se ajustó la nota léxica para reflejar mejor la alternativa inglesa «lyre», y se añadió la nota toponímica que forma parte del rastro auditado del POB.
  reviewer_model: gpt-5.4
