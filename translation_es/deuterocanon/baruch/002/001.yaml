translation:
  language: es
  text: Y Yahvé ha confirmado[a] su palabra que habló contra nosotros, contra nuestros jueces que juzgaron a Israel, y contra nuestros reyes y contra nuestros gobernantes[b], y contra el pueblo de Israel y de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ha establecido» o «ha cumplido». El verbo griego puede significar hacer que una palabra «se mantenga», es decir, confirmarla o llevarla a efecto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los hombres de Israel y de Judá». El griego usa aquí un término humano singular de modo colectivo y comprimido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  english_pob_choice: has confirmed
  chosen_spanish: ha confirmado
  alternatives_spanish:
  - ha establecido
  - ha cumplido
  - ha hecho valer
  lexicon: BDAG
  rationale: El verbo griego puede expresar hacer que una palabra «se mantenga» o entre en efecto. «Ha confirmado» conserva la idea de hacer firme la palabra y sigue de cerca la decisión inglesa, sin perder la fuerza de ejecución judicial que el contexto exige.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: En el proyecto, el nombre divino se vierte como «Yahvé» cuando el griego κύριος refleja el nombre sagrado en contexto bíblico. Aquí la referencia al juicio pronunciado por Dios justifica mantener la identificación con el nombre divino, no solo un título general.
- source_word: τὸν λόγον αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su decreto
  - su sentencia
  lexicon: BDAG
  rationale: «Palabra» preserva la amplitud bíblica de λόγος y evita estrecharlo demasiado a «decreto» o «sentencia», aunque el contexto sea de juicio.
- source_word: ἐφ᾽ ἡμᾶς
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - respecto de nosotros
  lexicon: BDAG
  rationale: El contexto de retribución y juicio favorece la lectura adversativa «contra». En español, «contra nosotros» expresa con claridad que la palabra fue pronunciada en sentido de amenaza o condena.
- source_word: δικαστάς
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - gobernantes
  lexicon: BDAG
  rationale: El término denota de manera directa a quienes juzgan. «Jueces» conserva la distinción frente a «gobernantes», que aparece después como ἄρχοντας.
- source_word: τοὺς δικάσαντας τὸν Ἰσραήλ
  english_pob_choice: who judged Israel
  chosen_spanish: que juzgaron a Israel
  alternatives_spanish:
  - que gobernaron a Israel
  - que administraron justicia en Israel
  lexicon: BDAG
  rationale: La forma participial explica la función de los jueces. «Que juzgaron a Israel» es fiel y natural en español bíblico.
- source_word: τοὺς ἄρχοντας
  english_pob_choice: our rulers
  chosen_spanish: nuestros gobernantes
  alternatives_spanish:
  - nuestros jefes
  - nuestros príncipes
  lexicon: BDAG
  rationale: Ἄρχοντες designa autoridades políticas o dirigentes. «Gobernantes» comunica bien la función sin la carga arcaica de «príncipes».
- source_word: ἄνθρωπον Ἰσραὴλ καὶ Ἰούδα
  english_pob_choice: the people of Israel and Judah
  chosen_spanish: el pueblo de Israel y de Judá
  alternatives_spanish:
  - los hombres de Israel y de Judá
  - toda la gente de Israel y de Judá
  lexicon: BDAG
  rationale: Aunque el griego usa ἄνθρωπον en singular, el sentido es colectivo. La opción «el pueblo de Israel y de Judá» comunica ese valor natural en español y corresponde a la revisión inglesa más reciente, mientras la nota conserva la posibilidad alternativa más literal.
theological_decisions:
- issue: Fuerza de la palabra divina en contexto de juicio
  english_pob_reading: The verse states that the Lord has enacted the judgment he previously spoke.
  chosen_spanish_reading: El versículo afirma que Yahvé ha confirmado la palabra ya pronunciada, es decir, la ha hecho efectiva en juicio.
  alternative_spanish_readings:
  - Yahvé ha establecido su palabra en un sentido general.
  - Yahvé ha simplemente reafirmado lo que dijo.
  rationale: La lista de destinatarios (nosotros, jueces, reyes, gobernantes, pueblo) muestra que la palabra está en vigor como juicio ejecutado, no solo como confirmación abstracta. «Ha confirmado» mantiene la tensión entre fidelidad a la palabra y ejecución del juicio sin añadir contenido extrabíblico.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor colectivo de ἄνθρωπον
  english_pob_reading: the people of Israel and Judah
  chosen_spanish_reading: el pueblo de Israel y de Judá
  alternative_spanish_readings:
  - los hombres de Israel y de Judá
  - todos en Israel y en Judá
  rationale: El griego usa una forma masculina singular, pero en una construcción colectiva. En español, «el pueblo» expresa mejor el valor global del pasaje y evita una rigidez que podría oscurecer el sentido. La nota preserva la alternativa más literal para auditoría.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa más reciente pasó de «the men of Israel and Judah» a «the people of Israel and Judah» para reflejar mejor el sentido colectivo de ἄνθρωπον. En español se adoptó esa dirección por naturalidad y claridad, mientras la nota conserva la alternativa más literal. Para ἔστησεν se siguió la solución revisada «ha confirmado», que equilibra precisión semántica y fluidez. También se mantuvo la distinción entre δικαστάς y ἄρχοντας con «jueces» y «gobernantes».
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para κύριος cuando remite al nombre divino.
  - Se preservó «su palabra» para λόγος, sin reducirlo a «sentencia», porque el texto conserva la amplitud de una palabra pronunciada por Dios.
  - Se distinguieron cuidadosamente «jueces» y «gobernantes» para respetar la lista griega.
  - Se evitó traducir ἄνθρωπον mecánicamente como «hombres» en el texto principal, dado su valor colectivo en este contexto.
