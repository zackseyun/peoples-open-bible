  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, etc. La decisión «siervos» para עֲבָדֶיהָ es coherente con la justificación contextual documentada. Se preserva adecuadamente el valor literal de וַתַּהֲפֹךְ con «se volvió».
