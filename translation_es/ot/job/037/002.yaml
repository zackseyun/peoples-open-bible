translation:
  language: es
  text: Escuchen, escuchen[a] el temblor[b] de su voz, y el estruendo[c] que sale de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oigan, oigan». El hebreo usa un imperativo seguido de un infinitivo absoluto para intensificar la orden.
    reason: lexical_alternative
  - marker: b
    text: O «la agitación» o «el furor» de su voz. El hebreo puede denotar temblor, agitación o furia; aquí «temblor» capta bien la imaginería de tormenta.
    reason: lexical_alternative
  - marker: c
    text: O «el murmullo» o «el sonido» que sale de su boca.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ שָׁמוֹעַ
  english_pob_choice: Listen, listen
  chosen_spanish: Escuchen, escuchen
  alternatives_spanish:
  - Oigan, oigan
  - Escuchen atentamente
  - Oigan con atención
  lexicon: HALOT
  rationale: El imperativo más infinitivo absoluto intensifica la exhortación. En español, la repetición directa «Escuchen, escuchen» conserva esa fuerza enfática sin añadir explicación interpretativa.
- source_word: בְּרֹגֶז
  english_pob_choice: the trembling of
  chosen_spanish: el temblor de
  alternatives_spanish:
  - la agitación de
  - el estremecimiento de
  - el furor de
  lexicon: HALOT
  rationale: רֹגֶז puede denotar temblor, agitación o furor. En este contexto poético de tormenta, «temblor» transmite el carácter vibrante e inquietante del sonido sin cerrar demasiado el sentido hacia ira personal.
- source_word: קֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  lexicon: HALOT
  rationale: קוֹל normalmente significa «voz» o «sonido». Se conserva «voz» para mantener la imagen antropomórfica del texto y la relación con «su boca» en la línea siguiente.
- source_word: וְהֶגֶה
  english_pob_choice: the rumbling
  chosen_spanish: el estruendo
  alternatives_spanish:
  - el murmullo
  - el sonido
  - el retumbo
  lexicon: HALOT
  rationale: הֶגֶה señala un sonido bajo, murmullo o gemido; en este marco de tormenta, «estruendo» comunica mejor el efecto acústico poderoso del trueno en español.
- source_word: מִפִּיו יֵצֵא
  english_pob_choice: that comes from his mouth
  chosen_spanish: que sale de su boca
  alternatives_spanish:
  - que sale de su boca
  - que proviene de su boca
  - que viene de su boca
  lexicon: HALOT
  rationale: יצא significa «salir» o «venir». «Que sale de su boca» preserva la expresión concreta y antropomórfica del hebreo, y suena natural en español.
theological_decisions:
- issue: Lenguaje antropomórfico para la voz divina en la imaginería de tormenta
  english_pob_reading: Retain 'his voice' and 'his mouth' as stated in the Hebrew poetic imagery
  chosen_spanish_reading: Conservar «su voz» y «su boca» tal como aparecen en la imaginería hebrea
  alternative_spanish_readings:
  - Neutralizar como «el sonido» o «el trueno»
  - Despersonalizar la referencia divina
  rationale: El hebreo presenta la tormenta como palabra/voz de Dios. Mantener la personificación evita aplanar el valor literario y teológico del pasaje.
  doctrine_reference: Poética bíblica; transparencia textual; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente optó por reproducir con mayor literalidad la repetición enfática («Listen, listen») y simplificar «comes out from» a «comes from». La versión española sigue ese mismo impulso: conserva la repetición imperativa y usa una salida verbal natural («sale de su boca») sin perder la transparencia al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «su» para la referencia a Dios, en línea con la imaginería del texto y sin sustituirla por una abstracción impersonal.
  - Se evita «SEÑOR» porque el pasaje no contiene יהוה explícito; la traducción sigue la metáfora de la voz divina en el contexto poético.
  - «Estruendo» se usa como equivalente contextual de הֶגֶה en un marco de tormenta, pero el pie mantiene la alternativa de «murmullo/sonido» para no borrar la tensión semántica.
