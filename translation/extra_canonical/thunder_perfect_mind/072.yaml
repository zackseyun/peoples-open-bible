  lexicon: Greek loanword ἄγγελος via Coptic
  rationale: Standard rendering of plural “angels”; “messengers” possible but cultic
    context suggests celestial beings.
- source_word: ⲛ̄ⲧⲁⲩⲧⲁⲟⲩⲟ
  chosen: those who are first
  alternatives:
  - the first ones
  - the prime ones
  lexicon: Uncertain segmentation; cf. Coptic ⲧⲁⲟⲩⲟ (first) with relative plural ⲛ̄ⲧⲁⲩ-
  rationale: Read as relative plural “who are” + “first”; aligns with known Thunder
    motif of “the first ones.” Marked as tentative.
- source_word: ϩⲙ̄ ⲡⲗⲟⲅⲟⲥ
  chosen: within the Word
  alternatives:
  - inside the word
  - within the Logos
  lexicon: Greek λόγος via Coptic
  rationale: Preposition ϩⲙ̄ indicates interiority; capitalized “Word” preserves possible
