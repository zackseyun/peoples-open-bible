translation:
  language: es
  text: Porque mi alma está llena de calamidades, y mi vida se acerca al Seol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro» o «al reino de los muertos». El término hebreo es «Seol».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El valor causal de כִּי en este contexto introduce la explicación del estado del salmista. En español, «Porque» conserva esa relación y suena natural al iniciar una queja poética.
- source_word: שָׂבְעָה
  english_pob_choice: is full
  chosen_spanish: está harta
  alternatives_spanish:
  - está llena
  - está saciada
  lexicon: HALOT
  rationale: El verbo expresa estar lleno o saciado. Con «males» en un lamento, «está harta» comunica bien la saturación extrema sin perder la imagen de plenitud desbordante.
- source_word: בְרָעוֹת
  english_pob_choice: of troubles
  chosen_spanish: de males
  alternatives_spanish:
  - de calamidades
  - de angustias
  - de desgracias
  lexicon: HALOT
  rationale: רָעוֹת puede referirse a males, desgracias o calamidades. Aquí el sentido es de aflicciones que abruman al orante, no de maldad moral; por eso «males» mantiene amplitud semántica y el tono del hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. Se eligió «mi alma» para preservar el paralelismo con «mi vida» en el segundo hemistiquio y reflejar la distinción léxica del hebreo.
- source_word: וְחַיַּי
  english_pob_choice: and my life
  chosen_spanish: y mi vida
  alternatives_spanish:
  - y mis vidas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, funciona como sustantivo singular abstracto. «Mi vida» es la equivalencia natural y fiel en español.
- source_word: לִשְׁאוֹל
  english_pob_choice: to Sheol
  chosen_spanish: a Sheol
  alternatives_spanish:
  - al sepulcro
  - al reino de los muertos
  - a la tumba
  lexicon: HALOT
  rationale: Se conserva «Sheol» como término hebreo técnico para el lugar de los muertos. Esto evita reducir prematuramente el concepto a «sepulcro» o «tumba» y mantiene el mundo conceptual del texto.
- source_word: הִגִּיעוּ
  english_pob_choice: draws near
  chosen_spanish: se acerca
  alternatives_spanish:
  - ha llegado
  - alcanza
  lexicon: HALOT
  rationale: El verbo puede expresar llegar o alcanzar; con לְ y Sheol, el sentido poético es de aproximación inminente. «Se acerca» reproduce bien esa cercanía sin afirmar llegada consumada.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: Se conserva el término hebreo porque designa el ámbito de los muertos en la imaginería bíblica y porque la traducción inglesa audita esta decisión para evitar una equivalencia doctrinal más estrecha de lo que el texto requiere.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como de alta concordancia, sin enmiendas aplicadas.'
  spanish_consistency_notes:
  - Se mantuvo «Sheol» sin reemplazarlo por un equivalente doctrinal cerrado, en línea con el audit trail inglés.
  - Se usó «alma» para נַפְשִׁי y «vida» para חַיַּי para respetar el paralelismo poético.
  - «males» conserva la amplitud semántica de רָעוֹת y evita restringir el sentido a maldad moral.
  - La puntuación con coma refleja la bisemia poética en dos hemistiquios breves.
