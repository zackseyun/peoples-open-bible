translation:
  language: es
  text: 'Y de los hijos de Bebai: Joannes[a], Ananías, Zabdos y Emathis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos nombres pueden corresponder a formas hebreas distintas en el paralelo masorético aproximado, pero 1 Esdras se traduce aquí desde el testimonio griego, que preserva los nombres como Joannes, Ananías, Zabdos y Emathis.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν Βηβαί
  english_pob_choice: And from the sons of Bebai
  chosen_spanish: Y de los hijos de Bebai
  alternatives_spanish:
  - Y de la familia de Bebai
  - Y de los descendientes de Bebai
  lexicon: LSJ
  rationale: ἐκ expresa procedencia o pertenencia dentro de un grupo listado; en un registro genealógico, «de los hijos de» conserva la estructura formal de la fuente y es natural en español bíblico. Mantengo «hijos» como equivalente directo de υἱῶν en este contexto de lista.
- source_word: Ἰωάννης
  english_pob_choice: Joannes
  chosen_spanish: Juan
  alternatives_spanish:
  - Joanes
  - Johanan
  lexicon: LSJ
  rationale: En español bíblico y eclesial, el nombre griego Ἰωάννης se normaliza naturalmente como «Juan». Aunque la transliteración estricta sería posible, el nombre establecido en español comunica mejor sin alterar el referente personal.
- source_word: Ἁνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Hananías
  - Ananías
  lexicon: LSJ
  rationale: La forma griega se representa de manera estándar en español como «Ananías». Esta transliteración conserva la forma griega sin desplazar innecesariamente la tradición onomástica hispana.
- source_word: Ζάβδος
  english_pob_choice: Zabdos
  chosen_spanish: Zabdos
  alternatives_spanish:
  - Zabdós
  - Zabdus
  lexicon: LSJ
  rationale: El nombre propio griego Ζάβδος se conserva por transliteración. «Zabdos» sigue de cerca la forma de Swete y evita imponer una identificación hebrea no explicitada por el testimonio principal.
- source_word: Ἐμαθίς
  english_pob_choice: Emathis
  chosen_spanish: Ematis
  alternatives_spanish:
  - Ematis
  - Emathis
  lexicon: LSJ
  rationale: Se translitera el nombre griego como «Ematis», una forma más fluida en español que sigue de cerca la secuencia consonántica y vocálica del original sin añadir una equivalencia no atestiguada.
translation_notes:
  revision_awareness: El texto griego coincide de forma alta con el contexto auditado en inglés; la única tensión relevante es onomástica, porque el testimonio griego conserva formas propias que no deben forzarse a equivalentes hebreos ni a calcos del inglés. Se optó por una normalización española de nombres ampliamente asentados cuando no compromete la fuente, y por transliteración conservadora donde el nombre es menos estable.
  spanish_consistency_notes:
  - Se mantiene la preposición de pertenencia «de los hijos de» para reflejar ἐκ τῶν υἱῶν.
  - 'Los nombres propios se tratan de forma consistente con el uso bíblico español: «Juan» y «Ananías» para formas asentadas, «Zabdos» y «Ematis» para conservar la particularidad del griego.'
  - No se introduce ninguna armonización con el paralelo hebreo en el cuerpo del texto; esa tensión queda reservada a la nota.
