translation:
  language: es
  text: Y los hijos de Benjamín se reunieron desde las ciudades para ir a Gibeá, para salir a la guerra contra los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con los hijos de Israel». En este contexto de combate, la relación es adversativa: «contra los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El nifal de אסף expresa reunirse o congregarse. «Se reunieron» comunica bien esa acción en español moderno sin perder el matiz colectivo.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de parentesco/truiba con «hijos de», como hace la POB inglesa, para no aplanar la expresión a una forma etnónima.
- source_word: מִן הֶעָרִים
  english_pob_choice: from the cities
  chosen_spanish: de las ciudades
  alternatives_spanish:
  - desde las ciudades
  - de los poblados
  lexicon: HALOT
  rationale: La preposición indica origen; «de las ciudades» mantiene la referencia a centros poblados y suena natural en español.
- source_word: הַגִּבְעָתָה
  english_pob_choice: to Gibeah
  chosen_spanish: en Gibeá
  alternatives_spanish:
  - a Gibeá
  - hacia Gibeá
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar. En español, con un verbo de reunión ya explicitado, «en Gibeá» comunica el punto de encuentro sin sonar forzado; se conserva el nombre propio en forma usual española.
- source_word: לָצֵאת
  english_pob_choice: to go out
  chosen_spanish: para salir
  alternatives_spanish:
  - para marchar
  - para ir
  lexicon: HALOT
  rationale: El infinitivo expresa salida con finalidad. «Para salir» es la correspondencia más directa y transparente en español.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la guerra
  alternatives_spanish:
  - para la guerra
  - al combate
  lexicon: HALOT
  rationale: El sustantivo מלחמה puede ser «guerra» o «combate»; aquí el contexto militar amplio y la construcción con salir favorecen «a la guerra» como equivalente claro y fiel.
- source_word: עִם בְּנֵי יִשְׂרָאֵל
  english_pob_choice: against the sons of Israel
  chosen_spanish: contra los hijos de Israel
  alternatives_spanish:
  - con los hijos de Israel
  - contra los israelitas
  lexicon: HALOT
  rationale: Aunque עִם suele significar «con», en contexto bélico tiene valor adversativo. Se vierte «contra» para reflejar esa fuerza contextual, conservando la frase hebrea «hijos de Israel».
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en su sentido y sus dos notas léxicas: conserva el idiomático «sons of» y toma עִם como adversativo en contexto bélico. La versión española sigue esas decisiones, ajustando la sintaxis para que el movimiento hacia el lugar y el propósito militar resulten naturales en español.'
  spanish_consistency_notes:
  - Se mantiene «hijos de» para reflejar el idiomático tribal hebreo y la terminología habitual de la serie.
  - Se usa «Gibeá» como forma española del topónimo.
  - Se conserva «contra» para el valor adversativo de עִם en contexto de guerra.
  - «Se reunieron» evita un calco pesado y conserva el matiz colectivo del nifal.
