  text: וְ/לִ/בְנֵ֣י לֵוִ֔י הִנֵּ֥ה נָתַ֛תִּי כָּל מַֽעֲשֵׂ֥ר בְּ/יִשְׂרָאֵ֖ל לְ/נַחֲלָ֑ה חֵ֤לֶף עֲבֹֽדָתָ/ם֙ אֲשֶׁר הֵ֣ם עֹֽבְדִ֔ים אֶת עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/021.yaml
  text: And to the sons of Levi[a], behold, I have given every tithe in Israel as an inheritance, in return for the service that they perform[c][b], the service of the tent of meeting.
  footnotes:
