translation:
  language: es
  text: Para que haga una matanza[a], está afilada; para que tenga un destello[b], está pulida. ¿O nos alegraremos? El cetro de mi hijo[c] desprecia todo árbol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo intensifica la acción con una construcción equivalente a «hacer una matanza» o, más literalmente, «matar una matanza». Se procura conservar esa fuerza enfática sin suavizarla.
    reason: lexical_alternative
  - marker: b
    text: El hebreo es elíptico; puede entenderse como un resplandor o destello del arma ya pulida. La traducción evita añadir una comparación explícita que no está formulada en el texto.
    reason: lexical_alternative
  - marker: c
    text: El hebreo de la cláusula final es difícil. «Mi hijo» sigue el Texto Masorético; algunos intérpretes lo entienden más ampliamente como Judá o mi pueblo, y «todo árbol» también puede referirse a toda madera, vara o arma de madera.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: La partícula expresa finalidad/resulto; «para que» comunica con naturalidad ese valor en español y mantiene el sentido de propósito en ambas cláusulas.
- source_word: טְבֹחַ טֶבַח
  english_pob_choice: slaughter a slaughter
  chosen_spanish: mate una matanza
  alternatives_spanish:
  - haga una matanza
  - masacre una matanza
  lexicon: HALOT
  rationale: La construcción infinitivo + sustantivo cognado intensifica la acción. «Mate una matanza» conserva la fuerza enfática sin caer en un calco torpe; «matanza» preserva el sustantivo de la imagen.
- source_word: הוּחַדָּה
  english_pob_choice: it is sharpened
  chosen_spanish: está afilada
  alternatives_spanish:
  - ha sido afilada
  - está aguzada
  lexicon: HALOT
  rationale: Se refiere a la espada en el contexto inmediato. El pasivo resultativo en español se expresa bien con «está afilada», que suena natural y conserva el estado resultante.
- source_word: הֱיֵה לָהּ בָרָק
  english_pob_choice: it may have a flash
  chosen_spanish: tenga un destello
  alternatives_spanish:
  - brille
  - tenga un resplandor
  lexicon: HALOT
  rationale: La expresión es elíptica y describe el brillo/relámpago del arma tras ser pulida. «Tenga un destello» evita añadir explícitamente la comparación con «rayo» o «relámpago», a la vez que mantiene la imagen luminosa.
- source_word: מֹרָטָּה
  english_pob_choice: it is polished
  chosen_spanish: está pulida
  alternatives_spanish:
  - está bruñida
  - está bruñida y pulida
  lexicon: HALOT
  rationale: Para una hoja o arma, «pulida» es claro y fiel. «Bruñida» es posible, pero menos común para lectores generales.
- source_word: אוֹ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O bien
  - ¿O bien
  lexicon: HALOT
  rationale: La partícula introduce un giro retórico abrupto. Mantener «¿O» conserva esa transición sin resolver de antemano la sintaxis difícil.
- source_word: נָשִׂישׂ
  english_pob_choice: shall we rejoice
  chosen_spanish: nos alegraremos
  alternatives_spanish:
  - nos regocijaremos
  - nos gozaremos
  lexicon: HALOT
  rationale: La forma puede entenderse como primera persona plural con matiz deliberativo/interrogativo. La pregunta «¿nos alegraremos?» mantiene el tono retórico e irónico del contexto.
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón de mando
  lexicon: HALOT
  rationale: En este contexto real/judicial, «cetro» transmite mejor la idea de autoridad que «vara» o «bastón».
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo amado
  - mi muchacho
  lexicon: HALOT
  rationale: La lectura consonántica apunta a «mi hijo». «Mi hijo» es la traducción más directa y deja abierta la dificultad contextual sin resolverla indebidamente.
- source_word: מֹאֶסֶת
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - rechaza
  - desdeña
  lexicon: HALOT
  rationale: El participio expresa rechazo con desprecio. «Desprecia» conserva ese matiz mejor que un simple «rechaza».
- source_word: כָּל עֵץ
  english_pob_choice: every tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - toda madera
  - todo madero
  lexicon: HALOT
  rationale: La expresión literal se conserva como imagen concreta. «Todo árbol» mantiene la ambigüedad hebrea entre árbol y madera, que la nota puede aclarar si hace falta.
theological_decisions:
- issue: 'La frase final extremadamente difícil: si se debe resolver o conservar la ambigüedad del MT'
  english_pob_reading: The scepter of my son despises every tree.
  chosen_spanish_reading: El cetro de mi hijo desprecia todo árbol.
  alternative_spanish_readings:
  - La vara de mi hijo rechaza toda madera.
  - El cetro de mi hijo desprecia todo madero.
  rationale: No hay una cuestión doctrinal que obligue a armonizar la línea. Como en la POB inglesa, la decisión es conservar de cerca la dificultad del texto masorético y documentar la posible lectura de «árbol/madera» sin suprimir la tensión.
  doctrine_reference: Principios de traducción de POB §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del tramo en inglés, que prefirió una formulación más cercana al hebreo en la cláusula de brillo/pulido («have a flash») y mantuvo la dureza del final. La versión española refleja esa misma cautela: evita desarrollar la imagen más allá de lo expresado y conserva la opacidad sintáctica del cierre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la POB española cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje; no aplica aquí.
  - Se opta por un registro moderno y digno, con vocabulario bíblico transparente pero no arcaizante.
  - «Todo árbol» conserva la posible referencia amplia a madera/árbol sin decidirla en el cuerpo principal.
  - La puntuación reproduce el giro interrogativo y la segmentación retórica del hebreo con fluidez en español.
