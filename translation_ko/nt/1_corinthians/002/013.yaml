translation:
  language: ko
  text: 우리가 또한 이것들을 말하는데, 인간의 지혜가 가르치는 말로 하지 않고 영이 가르치는 말로 합니다. 영적인 것을 영적인 자들에게 해석해 주는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διδακτοῖς πνεύματος
  english_pob_choice: taught by the Spirit
  chosen_korean: 영이 가르치는 말
  alternatives_korean:
  - 영에게서 배운 말
  lexicon: BDAG
  rationale: 형용사 διδακτός(가르침받은)를 자연스러운 능동 표현으로.
- source_word: πνευματικοῖς πνευματικὰ συγκρίνοντες
  english_pob_choice: interpreting spiritual things to spiritual people
  chosen_korean: 영적인 것을 영적인 자들에게 해석해 주는
  alternatives_korean:
  - 영적인 것을 영적인 것과 비교하는
  lexicon: BDAG
  rationale: συγκρίνω는 「짝지어 비교하다/해석하다」 양의. 본문 흐름은 14절의 「영적으로 분별된다」로 이어지므로 「해석해 주는」을 채택하고 각주로 대안 표시 가능.
