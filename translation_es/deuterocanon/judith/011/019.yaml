review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del griego: conducción por Judea, llegada frente a Jerusalén, colocación del carro en medio de la ciudad, imagen de ovejas sin pastor, modismo del perro que no gruñe, conocimiento previo/información recibida, y envío para informar. Sin embargo, hay un problema gramatical importante en la concordancia de género en «fui enviado», pues Judith habla en primera persona femenina y el griego ἀπεστάλην no marca género; el español sí debe marcarlo como «fui enviada». Además, puede mejorarse «los llevarás» a «los arrearás» para conservar mejor el matiz de ἄξεις αὐτούς dentro del símil pastoral y acercarse al audit trail inglés (''drive them'').'
  spanish_quality_summary: El texto es mayormente claro y natural en español neutro y mantiene un tono digno. «Por en medio de Judea» y «frente a Jerusalén» son aceptables. «Ni siquiera un perro gruñirá con su lengua» suena algo extraño, pero la rareza está justificada por la explicitud del griego y por la nota cultural. La corrección necesaria es «fui enviada». También «los arrearás» mejora la viveza y precisión de la imagen pastoril sin sonar arcaico ni rebuscado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. «Conocimiento previo» para πρόγνωσις concuerda bien con la decisión lexical y teológica documentada, evitando una carga técnica como «presciencia».
  issues:
  - severity: high
    issue: Concordancia de género en «fui enviado»
    rationale: Judith es mujer; en español el participio debe concordar con la hablante. El griego no fuerza género aquí, pero el español sí. Mantener masculino produce una lectura incorrecta y poco cuidada.
  - severity: medium
    issue: «los llevarás» debilita el matiz de ἄξεις αὐτούς en el símil de rebaño
    rationale: El contexto «como ovejas sin pastor» favorece un verbo como «arrearás» o «conducirás» más que el genérico «llevarás». «Arrearás» preserva mejor la imagen de mover un rebaño delante de uno.
  revised_spanish_text: Y te conduciré por en medio de Judea hasta que llegues frente a Jerusalén[a], y pondré tu carro en medio de ella, y los arrearás como ovejas sin pastor, y ni siquiera un perro gruñirá con su lengua contra ti[b]; porque estas cosas me fueron dichas según mi conocimiento previo[c], y me las comunicaron, y fui enviada para anunciártelas.
  revised_footnotes:
  - marker: a
    text: O «delante de Jerusalén» / «frente a Jerusalén» para ἀπέναντι.
    reason: alternative_reading
  - marker: b
    text: El griego dice literalmente «ni siquiera un perro gruñirá con su lengua contra ti», un modismo que expresa ausencia total de resistencia.
    reason: cultural_note
  - marker: c
    text: Aquí «conocimiento previo» probablemente significa conocimiento adelantado o información previa, no necesariamente un concepto teológico técnico.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia de género de la hablante a «fui enviada», cambio necesario para fidelidad y buen español. También se ajusta «los llevarás» a «los arrearás» para reflejar mejor el valor contextual de ἄξεις dentro de la imagen de ovejas sin pastor y alinearse más estrechamente con la decisión lexical auditada.
