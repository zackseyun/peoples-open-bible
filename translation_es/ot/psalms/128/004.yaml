translation:
  language: es
  text: He aquí, así será bendecido el hombre[a] que teme a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombre»; la forma masculina funciona aquí de manera proverbial para la persona caracterizada por temer a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Mira, pues!
  lexicon: HALOT
  rationale: El marcador hebreo introduce una llamada de atención enfática. En español, «¡Mira!» comunica la fuerza exhortativa y poética sin sonar arcaico como «he aquí» ni demasiado explicativo.
- source_word: כִי כֵן
  english_pob_choice: thus
  chosen_spanish: Así
  alternatives_spanish:
  - de este modo
  - ciertamente así
  - pues así
  lexicon: HALOT
  rationale: La combinación refuerza el resultado o modo de la bendición. «Así» conserva la concisión proverbial del hebreo y del inglés POB sin añadir partículas interpretativas innecesarias.
- source_word: יְבֹרַךְ
  english_pob_choice: shall ... be blessed
  chosen_spanish: será bendecido
  alternatives_spanish:
  - será bendita
  - quedará bendecido
  - será objeto de bendición
  lexicon: HALOT
  rationale: El pasivo indica recepción de bendición. «Será bendecido» mantiene la voz pasiva y el tono declarativo del proverbio, en línea con la lectura POB.
- source_word: גָּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  - uno
  lexicon: HALOT
  rationale: El sustantivo es masculino gramatical y funciona de manera proverbial para la persona descrita. «El hombre» preserva esa forma sin neutralizarla; en español resulta natural y fiel.
- source_word: יְרֵא יְהוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: que teme a Yahvé
  alternatives_spanish:
  - que reverencia a Yahvé
  - temeroso de Yahvé
  - que está en temor de Yahvé
  lexicon: HALOT
  rationale: El participio describe la característica definitoria del hombre. «Teme a Yahvé» conserva el idioma sapiencial y de pacto; «reverencia» suavizaría el matiz bíblico de temor reverente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino, manteniendo la forma propia «Yahvé» en vez de sustituirla por un título o una mascarización tipográfica.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide conservar el Nombre divino en español; «Yahvé» expresa la misma decisión teológica y textual que el inglés POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Masculino genérico de גָּבֶר
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el varón
  - uno
  rationale: El hebreo presenta una forma masculina con valor proverbial. Se mantiene esa marca sin neutralizarla, siguiendo la filosofía de precisión de género cuando el original así lo hace.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El pasaje concuerda plenamente con la traducción inglesa auditada: la interjección enfática, el adverbio de modo/resultados, el pasivo de bendición, el masculino proverbial y el Nombre divino se conservan sin cambios sustanciales. No se documentaron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como forma principal del Nombre divino, conforme al estándar del proyecto.
  - Se mantuvo el masculino «el hombre» porque el hebreo usa גָּבֶר con fuerza proverbial y gramaticalmente masculina.
  - «Así» y «será bendecido» conservan la concisión y el tono sapiencial del original.
  - La nota al pie aclara la fuerza proverbial sin neutralizar el sujeto del texto.
