translation:
  language: es
  text: De otro modo, el vengador de la sangre podría perseguir al homicida, porque su corazón se enciende[a], y alcanzarlo porque el camino es largo, y quitarle la vida, aunque no merecía la pena de muerte, pues no lo había aborrecido antes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «porque su corazón se enciende». El hebreo usa una imagen idiomática de ira inflamada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde ayer y anteayer», un modismo hebreo que significa «antes» o «previamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: otherwise
  chosen_spanish: para que no
  alternatives_spanish:
  - de otro modo
  - si no
  lexicon: HALOT
  rationale: En este contexto legal preventivo, la idea es evitar un resultado; «para que no» expresa bien la finalidad negativa en español natural, sin perder el matiz exhortativo de la advertencia.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de la sangre
  alternatives_spanish:
  - el redentor de la sangre
  - el vengador de sangre
  lexicon: HALOT
  rationale: La expresión legal hebrea se mantiene como término técnico. «Vengador de la sangre» conserva el rol jurídico-familiar y evita suavizarlo con «redentor», que en español sería más ambiguo.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  - el que mató
  lexicon: HALOT
  rationale: Aquí la referencia es al que causó una muerte sin odio previo ni sentencia de muerte, por lo que «homicida» comunica mejor la distinción legal que «asesino».
- source_word: כִּי יֵחַם לְבָבוֹ
  english_pob_choice: because his heart is hot
  chosen_spanish: porque su corazón se enciende
  alternatives_spanish:
  - porque su corazón está caliente
  - porque su corazón arde
  - porque se enfurece
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática del corazón «caliente», pero en español «se enciende» transmite el mismo cuadro de ira inflamada con mayor naturalidad y dignidad literaria.
- source_word: וְהִשִּׂיגוֹ
  english_pob_choice: and overtake him
  chosen_spanish: y lo alcance
  alternatives_spanish:
  - y lo alcance y atrape
  - y lo dé alcance
  - y lo tome
  lexicon: HALOT
  rationale: «Alcance» reproduce el verbo de persecución y evita una paráfrasis excesiva.
- source_word: כִּי יִרְבֶּה הַדֶּרֶךְ
  english_pob_choice: because the way is long
  chosen_spanish: porque el camino es largo
  alternatives_spanish:
  - porque la distancia es grande
  - porque el viaje es largo
  lexicon: HALOT
  rationale: «Camino» es una traducción directa y natural de הַדֶּרֶךְ en este contexto de desplazamiento a la ciudad de refugio.
- source_word: וְהִכָּהוּ נָפֶשׁ
  english_pob_choice: and strike him dead
  chosen_spanish: y le quite la vida
  alternatives_spanish:
  - y lo hiera mortalmente
  - y lo mate
  - y le dé muerte
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática para una acción mortal. «Le quite la vida» comunica el resultado fatal en español sobrio, sin perder la fuerza del acto.
- source_word: מִשְׁפַּט מָוֶת
  english_pob_choice: did not deserve the death penalty
  chosen_spanish: merecía la pena de muerte
  alternatives_spanish:
  - tenía sentencia de muerte
  - estaba sujeto a la pena de muerte
  - era digno de muerte
  lexicon: HALOT
  rationale: «מִשְׁפַּט» aquí tiene fuerza jurídica. La forma negativa «no merecía la pena de muerte» refleja la decisión inglesa revisada y conserva la idea de responsabilidad legal, no solo de merecimiento moral.
- source_word: מִתְּמֹל שִׁלְשֹׁם
  english_pob_choice: previously
  chosen_spanish: antes
  alternatives_spanish:
  - previamente
  - desde ayer y anteayer
  - en tiempos pasados
  lexicon: HALOT
  rationale: El modismo hebreo expresa tiempo anterior. En español, «antes» es la opción más breve y natural en esta cláusula legal; evita una glosa innecesaria en el texto principal.
theological_decisions:
- issue: Término legal de sangre y venganza en el contexto del refugio
  english_pob_reading: the avenger of blood may pursue the manslayer
  chosen_spanish_reading: el vengador de la sangre no persiga al homicida
  alternative_spanish_readings:
  - el vengador de la sangre persiga al homicida
  - el pariente vengador persiga al homicida
  rationale: 'Se conserva la estructura legal y la tensión del caso: existe un perseguidor legítimo según la institución de la venganza de sangre, pero el versículo la limita. No se atenúa con una formulación más general como «pariente», porque el título técnico es importante.'
  doctrine_reference: Números 35:19-27; Josué 20:3-6
- issue: Responsabilidad legal frente a culpabilidad moral
  english_pob_reading: though he did not deserve the death penalty
  chosen_spanish_reading: aunque no merecía la pena de muerte
  alternative_spanish_readings:
  - aunque no tenía sentencia de muerte
  - aunque no era digno de muerte
  rationale: 'La frase busca reproducir la tensión jurídica del hebreo: el homicida accidental no está bajo pena capital, aunque el caso sigue siendo grave. «Pena de muerte» en español moderno comunica con claridad la consecuencia legal sin diluirla.'
  doctrine_reference: Deuteronomio 19:4-13; Éxodo 21:12-14
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión inglesa que prefirió «did not deserve the death penalty» frente a «had no sentence of death». En español se refleja esa decisión con «no merecía la pena de muerte», mientras se mantiene la precisión jurídica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - «Vengador de la sangre» conserva el término técnico legal del pasaje.
  - «Homicida» se usa para el matiz legal de muerte no premeditada; no se traduce con «asesino».
  - La imagen de «su corazón se enciende» preserva la intensidad idiomática sin caer en un calco áspero.
  - La cláusula final se formula en negativo jurídico («no merecía la pena de muerte») para mantener la relación entre ley y culpabilidad del caso.
