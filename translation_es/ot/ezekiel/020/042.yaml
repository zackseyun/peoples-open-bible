translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé[a], cuando los haga entrar en la tierra de Israel, en la tierra por la cual alcé mi mano para dársela a sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «la tierra que juré dar a sus padres». El hebreo dice literalmente: «la tierra por la cual alcé mi mano para dársela a sus padres», un gesto de juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y conocerán
  - Y sabrán
  lexicon: HALOT
  rationale: El futuro con valor consecutivo expresa el resultado de la acción divina anterior. «Entonces» conserva la fuerza inferencial/temporal del hebreo sin volverlo rígidamente literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino en español: «Yahvé», preservando el nombre pactual del texto original.'
- source_word: בַּהֲבִיאִי
  english_pob_choice: when I bring
  chosen_spanish: cuando los haga entrar
  alternatives_spanish:
  - cuando los traiga
  - al hacerlos entrar
  lexicon: HALOT
  rationale: La construcción con infinitivo y ב expresa circunstancia temporal. En español, «cuando los haga entrar» comunica con naturalidad el momento de reconocimiento sin perder el sentido causal-temporal.
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - la tierra israelita
  lexicon: HALOT
  rationale: Aunque אַדְמָה puede ser «suelo» o «tierra cultivable», aquí funciona como designación territorial; «la tierra de Israel» reproduce bien el alcance contextual.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea con «tierra» para mantener el paralelismo y la referencia al territorio prometido.
- source_word: נָשָׂאתִי אֶת־יָדִי
  english_pob_choice: I lifted up my hand
  chosen_spanish: alcé mi mano
  alternatives_spanish:
  - levanté mi mano
  - juré
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de juramento con una formulación natural en español. «Alcé mi mano» conserva la transparencia del hebreo y permite que el sentido de juramento se note sin explicarlo en el cuerpo del texto.
- source_word: לָתֵת אוֹתָהּ
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para entregarla
  - para concederla
  lexicon: HALOT
  rationale: El infinitivo de נתן se vierte con el verbo simple «dar», que en español comunica con claridad la promesa de concesión territorial.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a vuestros padres». En español, el referente plural colectivo del pasaje se expresa de modo fluido con «a sus padres», conservando el vínculo generacional.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el español del proyecto lo vierte como «Yahvé» para preservar la identidad del nombre del pacto y evitar el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Mantenimiento del modismo de juramento en נָשָׂאתִי אֶת־יָדִי
  english_pob_reading: Retain the literal idiom 'I lifted up my hand' in the main text
  chosen_spanish_reading: Conservar «alcé mi mano» en el texto principal
  alternative_spanish_readings:
  - juré
  - levanté mi mano en juramento
  rationale: La expresión hebrea es un gesto idiomático de juramento. Mantener la imagen en el texto principal preserva la transparencia al hebreo; el sentido de promesa solemne queda disponible en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: Coincide con el audit trail inglés de alta concordancia; no se aplicaron revisiones posteriores relevantes. Se conserva la imagen idiomática del juramento y el nombre divino según la terminología española del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conservó la repetición de «tierra» para אַדְמַת יִשְׂרָאֵל / הָאָרֶץ, evitando uniformarla con «país» o «suelo».
  - «Alcé mi mano» conserva la metáfora de juramento; la nota explica su valor idiomático.
  - El posesivo «sus» refleja el referente colectivo de la promesa a los padres ancestrales.
