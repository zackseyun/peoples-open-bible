review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: inferencia (''Por tanto''), fórmula profética, juramento divino, énfasis asseverativo, ''mi juramento'' / ''mi pacto'', y la imagen retributiva de ponerlos sobre su cabeza. También mantiene correctamente el plural final conforme a la revisión auditada en inglés. La principal desviación es de estilo y puntuación en la fórmula de juramento, donde ''¡Vivo yo!'' introduce una exclamación menos natural para este contexto que la fórmula declarativa española tradicional y clara.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero suena algo trabado por la puntuación alrededor de las cláusulas relativas y por la exclamación tras 'Vivo yo'. Una leve normalización mejora la fluidez sin perder solemnidad. 'Pacto' es inteligible, pero en este contexto profético 'alianza' suena más bíblico y natural para בְּרִית que 'pacto', sin alterar el sentido.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: יְהוָה se preserva como ''Yahvé''; אָלָה se rinde adecuadamente como ''juramento'' con nota alternativa sobre maldición; no hay conflictos con otras entradas del glosario. Recomiendo ''el Señor Yahvé'' mantenerlo, y ajustar ''mi pacto'' a ''mi alianza'' por naturalidad bíblica en español, aunque ''pacto'' no es incorrecto.'
  issues:
  - severity: medium
    issue: Fórmula de juramento '¡Vivo yo![a]'
    rationale: El hebreo חַי אָנִי es fórmula solemne de autojuramento, no una exclamación emotiva. En español bíblico y natural funciona mejor 'Tan cierto como que vivo[a],' o 'Vivo yo[a],' sin signos de exclamación.
  - severity: low
    issue: Puntuación con comas en las relativas
    rationale: Las comas en 'mi juramento, que él menospreció, y mi pacto, que quebrantó' hacen la línea más pesada. Sin comas, la relación restrictiva fluye mejor y sigue fiel al hebreo.
  - severity: low
    issue: '''mi pacto'' puede sonar menos natural que ''mi alianza'''
    rationale: Aunque 'pacto' es válido, 'alianza' suele corresponder mejor a בְּרִית en español bíblico de lectura amplia y mantiene mejor el registro eclesial sin pérdida semántica.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: Tan cierto como que vivo[a], ciertamente mi juramento que él menospreció y mi alianza que quebrantó, los pondré sobre su propia cabeza.'
  revised_footnotes:
  - marker: a
    text: 'O también: “mi juramento con maldición”; el hebreo puede designar un juramento que lleva una sanción de maldición por su violación.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido fuente y la terminología clave, pero se corrige la fórmula de juramento para un español más natural y solemne, se aligera la puntuación, y se sustituye 'pacto' por 'alianza' por mejor legibilidad bíblica en español general.
