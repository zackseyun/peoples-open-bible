review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido básico del hebreo y del paralelo griego: tienda, cercanía a la Sabiduría personificada y alojamiento en un buen lugar. Sin embargo, ''extiende su tienda'' no refleja tan bien el modismo de armar/plantar la tienda como וְנוֹטֶה אָהֳלוֹ en este contexto. El resto del versículo está mayormente alineado con la evidencia fuente.'
  spanish_quality_summary: El español es claro y legible, pero 'extiende su tienda' suena algo menos natural y menos idiomático que 'planta su tienda' o 'arma su tienda' para contexto de campamento. 'Se hospeda en un buen alojamiento' es comprensible, aunque algo redundante; 'se aloja en una buena morada' fluye mejor y conserva la imagen de habitación.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Se conserva correctamente la personificación femenina con 'ella'. La imaginería concreta de tienda/alojamiento se mantiene. La nota sobre 'mano' está bien justificada como alternativa literal.
  issues:
  - severity: medium
    issue: Verbo inicial 'extiende su tienda'
    rationale: Aunque נטה puede significar 'extender', con אהל en este contexto la idea es montar o plantar la tienda. En español bíblico-natural, 'planta su tienda' comunica mejor la acción idiomática de acampar.
  - severity: low
    issue: Sintagma 'se hospeda en un buen alojamiento'
    rationale: Es entendible, pero resulta algo tautológico en español. 'Se aloja en una buena morada' o 'se hospeda en una buena morada' suena más natural y preserva mejor la imagen de lugar de habitación.
  revised_spanish_text: Él planta su tienda junto a ella[a], y se aloja en una buena morada[b].
