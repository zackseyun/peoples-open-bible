translation:
  language: es
  text: Y los varales eran tan largos que se veían los extremos de los varales desde el Lugar Santo, delante del santuario interior[a], pero no se veían desde afuera; y allí están hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante del Lugar Santísimo». El hebreo usa un término para el recinto interior del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲרִכוּ
  english_pob_choice: were so long
  chosen_spanish: eran tan largos
  alternatives_spanish:
  - se alargaron
  - estaban tan largos
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de la longitud de los varales más que el acto de alargarlos. En español, "eran tan largos" conserva ese sentido resultativo y suena natural en la descripción narrativa.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: los varales
  alternatives_spanish:
  - las varas
  - los postes
  lexicon: HALOT
  rationale: Para los varales del arca, "varales" comunica con precisión la función de transporte y mantiene un registro bíblico reconocible en español. "Varas" sería posible, pero puede sonar más genérico.
- source_word: וַיֵּרָאוּ רָאשֵׁי הַבַּדִּים
  english_pob_choice: the ends of the poles were seen
  chosen_spanish: se veían las extremidades de los varales
  alternatives_spanish:
  - se veían las puntas de los varales
  - eran visibles los extremos de los varales
  lexicon: HALOT
  rationale: רָאשֵׁי literalmente es "cabezas", pero en este contexto el equivalente natural en español es "extremidades" o "extremos". "Se veían" reproduce el matiz pasivo de la forma hebrea sin forzar una construcción pesada.
- source_word: מִן הַקֹּדֶשׁ
  english_pob_choice: from the Holy Place
  chosen_spanish: desde el Lugar Santo
  alternatives_spanish:
  - desde el Santo Lugar
  - desde el santuario
  lexicon: HALOT
  rationale: En la arquitectura del templo, הַקֹּדֶשׁ designa el recinto exterior del santuario, no el lugar santísimo. "Lugar Santo" preserva esa distinción técnica y resulta claro en español.
- source_word: עַל פְּנֵי הַדְּבִיר
  english_pob_choice: before the inner sanctuary
  chosen_spanish: delante del santuario interior
  alternatives_spanish:
  - en frente del santuario interior
  - delante del Lugar Santísimo
  lexicon: HALOT
  rationale: עַל פְּנֵי se rinde naturalmente con "delante de". Para דְּבִיר, "santuario interior" expresa con precisión la referencia espacial y evita imponer de entrada una equivalencia más interpretativa.
- source_word: וְלֹא יֵרָאוּ הַחוּצָה
  english_pob_choice: but they could not be seen from outside
  chosen_spanish: pero no se veían desde afuera
  alternatives_spanish:
  - pero no eran visibles desde afuera
  - pero no podían verse desde afuera
  lexicon: HALOT
  rationale: La contraposición con la visibilidad desde el Lugar Santo pide una formulación simple y directa. "No se veían desde afuera" comunica bien la negación sin agregar fuerza modal innecesaria.
- source_word: וַיִּהְיוּ שָׁם עַד הַיּוֹם הַזֶּה
  english_pob_choice: and they are there to this day
  chosen_spanish: y allí han estado hasta hoy
  alternatives_spanish:
  - y están allí hasta hoy
  - y permanecieron allí hasta hoy
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de continuidad hasta el momento del narrador. "Han estado" conserva esa perspectiva sin sonar artificial en español moderno.
theological_decisions:
- issue: Identificación arquitectónica de הַקֹּדֶשׁ y הַדְּבִיר
  english_pob_reading: Holy Place / inner sanctuary
  chosen_spanish_reading: Lugar Santo / santuario interior
  alternative_spanish_readings:
  - Lugar Santo / Lugar Santísimo
  - santuario / santuario interior
  rationale: Se preserva la distinción espacial del templo sin cerrar la lectura a una equivalencia más interpretativa como "Lugar Santísimo" en el cuerpo del verso. El término "santuario interior" mantiene la relación con el hebreo דְּבִיר y deja abierta la nota explicativa.
  doctrine_reference: 1 Reyes 6–8; distinción entre el lugar santo y el espacio interior del templo
- issue: Visibilidad de los varales como señal cultual
  english_pob_reading: the ends of the poles were seen ... but they could not be seen from outside
  chosen_spanish_reading: se veían ... pero no se veían desde afuera
  alternative_spanish_readings:
  - eran visibles ... pero no eran visibles desde afuera
  - podían verse ... pero no podían verse desde afuera
  rationale: 'La formulación mantiene la tensión textual: visibles desde el Lugar Santo, invisibles desde afuera. No se suaviza ni se interpreta simbólicamente más allá de lo que el verso afirma.'
  doctrine_reference: Éxodo 25:14–15; 1 Reyes 8:8
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta la revisión del POB inglés que prefirió una afirmación directa de visibilidad ('were seen') en vez de una modal ('could be seen'). Por eso el español usa "se veían" para reflejar con naturalidad la pasiva/resultativa del hebreo. También conserva la nota de alternativa para la identificación de דְּבִיר, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usó "varales" para coherencia con el objeto cultual del arca y con el registro bíblico tradicional en español.
  - '"Lugar Santo" se mantiene como término técnico para הַקֹּדֶשׁ; no se sustituyó por un genérico menos preciso.'
  - Se evitó "SEÑOR" u otra adaptación no pertinente, porque aquí no aparece el nombre divino.
  - La puntuación reproduce el paralelismo y la cláusula final idiomática del hebreo sin añadir contenido interpretativo.
