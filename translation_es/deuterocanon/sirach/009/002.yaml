review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la decisión base del POB de seguir el sentido aclarado por el griego para אַל תַּקְנֶא como prohibición de cederse/entregarse, y conserva la imaginería de 'alma' y 'alturas'. Sin embargo, la cláusula final introduce 'no' ('para que ella no pise'), que invierte la forma del infinitivo de resultado/permiso presente en el hebreo y en el inglés auditado ('to let her tread'). La advertencia debe expresar evitar dar lugar a que ella pise, no una finalidad negativa añadida en el texto principal.
  spanish_quality_summary: El español es claro y digno, pero la secuencia 'para que ella no pise' suena más interpretativa y menos fiel a la construcción fuente que una formulación como 'para dejarla pisar'. El resto del verso es legible y natural. Las notas son útiles, aunque la nota griega debe corresponder al texto sin el 'no' añadido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'alma', 'mujer' y 'alturas' concuerdan con las decisiones léxicas documentadas. La principal corrección es sintáctico-semántica en לְהַדְרִיכָהּ / ἐπιβῆναι αὐτήν.
  issues:
  - severity: high
    issue: 'Se añadió una negación en la cláusula final: ''para que ella no pise''.'
    rationale: Ni el hebreo לְהַדְרִיכָהּ עַל בָּמוֹתֶיךָ ni el griego ἐπιβῆναι αὐτὴν ἐπὶ τὴν ἰσχύν σου contienen negación. El inglés POB auditado también dice 'to let her tread'. La negación convierte la imagen en una paráfrasis preventiva en vez de conservar la formulación fuente.
  - severity: medium
    issue: La nota a cita el griego con una redacción dependiente del 'no' añadido en español.
    rationale: La nota debe reflejar el griego como 'para que ella pise tu fuerza' o equivalente, no acomodarse a una negación ausente en la fuente.
  revised_spanish_text: No entregues tu alma a una mujer[a][b], para dejarla pisar tus alturas.
  revised_footnotes:
  - marker: a
    text: 'El griego dice: «No entregues tu alma a una mujer, para que ella pise tu fuerza». Este testimonio aclara la metáfora como una advertencia contra ceder la propia fortaleza o posición.'
    reason: alternative_reading
  - marker: b
    text: «Tus alturas» puede ser una expresión figurada para la posición, dignidad o fuerza de una persona; el hebreo conserva esa imagen.
    reason: lexical_alternative
  revision_rationale: Se elimina la negación añadida y se reformula la cláusula final como 'para dejarla pisar', que preserva mejor el infinitivo de la fuente y la imaginería concreta documentada por el POB, sin volver el español forzado.
