translation:
  language: es
  text: 'Y Jeroboam dijo en su corazón[a]: «Ahora el reino volverá a la casa de David».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para sí». El hebreo dice literalmente «en su corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Y ... dijo» conserva ese flujo narrativo en español natural sin añadir una interpretación temporal más fuerte que la del hebreo.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  lexicon: Convención onomástica bíblica
  rationale: Los nombres propios se transliteran según la convención bíblica del español, manteniendo identificación clara y continuidad intertextual.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en su corazón» y comunica pensamiento interior. Se conserva la imagen antropológica del hebreo, que en español es clara y fiel.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - As&iacute;
  lexicon: HALOT
  rationale: Marca inmediatez y urgencia. «Ahora» es breve, natural y transmite bien la fuerza temporal del original.
- source_word: תָּשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - dará la vuelta
  lexicon: HALOT
  rationale: De שוב, con sentido de retorno. «Volverá» es la opción más natural en español para el futuro del contexto político de la monarquía.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la monarquía
  - el dominio real
  lexicon: HALOT
  rationale: Aquí designa la entidad política. «El reino» es la equivalencia más directa y comprensible en español contemporáneo.
- source_word: לְבֵית דָּוִד
  english_pob_choice: to the house of David
  chosen_spanish: a la casa de David
  alternatives_spanish:
  - a la dinastía de David
  - a la casa davídica
  lexicon: HALOT
  rationale: «Casa de David» es la expresión bíblica estable para la línea dinástica davídica. Se mantiene la formulación tradicional-bíblica sin volverla interpretativa de más.
theological_decisions:
- issue: 'Idioma hebreo de pensamiento interior: בְּלִבּוֹ'
  english_pob_reading: in his heart
  chosen_spanish_reading: en su corazón
  alternative_spanish_readings:
  - para sí
  - dentro de sí
  rationale: No se trata de una cuestión doctrinal, sino de conservar el modo bíblico de expresar pensamiento interno. «En su corazón» preserva la textura literaria y la imagen del original sin oscurecer el sentido.
  doctrine_reference: Principio de equivalencia óptima; preservar imagen fuente cuando es inteligible en español.
translation_notes:
  revision_awareness: El contexto de auditoría inglesa no introdujo cambios sustantivos en la revisión más reciente; se mantiene la lectura estable de la frase idiomática interna y la referencia dinástica a la casa de David.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en este proyecto cuando aparezca, pero este versículo no lo contiene.
  - Se conserva «casa de David» como expresión dinástica bíblica estable.
  - Se evita «Cristo» u այլ terminología no presente en el texto.
  - La puntuación reproduce el ritmo narrativo con comillas españolas y nota al pie anclada en la expresión idiomática.
