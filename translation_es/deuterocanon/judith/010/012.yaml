base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/010/012.yaml
  text: And they seized her and asked her[a], “Who are you, and where are you coming from, and where are you going?” And she said, “I am a daughter of the Hebrews, and I am fleeing from before them[c][b], because they are about to be given over to you for consumption.”
