translation:
  language: es
  text: Espinos crecerán sobre sus palacios, ortigas y zarzas en sus fortalezas; y se convertirá en guarida de chacales[b], en pastizal para avestruces[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «para avestruces». El hebreo dice literalmente «para hijas del avestruz», una expresión idiomática que significa avestruces.
    reason: lexical_alternative
  - marker: b
    text: «Chacales» es el sentido más probable aquí; versiones antiguas a menudo traducen «dragones».
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָלְתָה
  english_pob_choice: will grow over
  chosen_spanish: subirán
  alternatives_spanish:
  - crecerán sobre
  - brotarán sobre
  - se alzarán sobre
  lexicon: HALOT
  rationale: El hebreo expresa el avance de vegetación invasora sobre estructuras en ruinas. En español, «subirán» conserva el movimiento hacia arriba y sobre las edificaciones sin volver la frase pesada o poco natural.
- source_word: אַרְמְנֹתֶיהָ
  english_pob_choice: her palaces
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus alcázares
  - sus castillos
  - sus fortalezas
  lexicon: HALOT
  rationale: ארמון se refiere a residencias palaciegas o edificios principales. «Palacios» es la equivalencia más clara y estándar en español.
- source_word: סִירִים
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  - cardos
  lexicon: HALOT
  rationale: El término es general para crecimiento espinoso. «Espinos» conserva el campo semántico y funciona bien en la imagen de desolación.
- source_word: קִמּוֹשׂ
  english_pob_choice: nettles
  chosen_spanish: ortigas
  alternatives_spanish:
  - malezas
  - cardos
  - hierbas nocivas
  lexicon: HALOT
  rationale: Designa una planta silvestre dañina asociada con ruina y abandono. «Ortigas» reproduce la fuerza concreta del término y sugiere crecimiento indeseable.
- source_word: וָחוֹחַ
  english_pob_choice: brambles
  chosen_spanish: zarzas
  alternatives_spanish:
  - moras espinosas
  - brenas
  - espinos
  lexicon: HALOT
  rationale: Como «espinos» ya vierte סירים, «zarzas» diferencia el segundo elemento y mantiene la idea de matorral espinoso invasor.
- source_word: בְּמִבְצָרֶיהָ
  english_pob_choice: in her fortresses
  chosen_spanish: en sus fortalezas
  alternatives_spanish:
  - en sus fortalezas amuralladas
  - en sus baluartes
  - en sus plazas fuertes
  lexicon: HALOT
  rationale: מבצר designa lugares fortificados. «Fortalezas» es natural y comunica bien el contraste entre defensas humanas y abandono.
- source_word: וְהָיְתָה
  english_pob_choice: and she will become
  chosen_spanish: y se convertirá
  alternatives_spanish:
  - y será
  - y llegará a ser
  lexicon: HALOT
  rationale: El femenino singular vuelve a la ciudad o tierra personificada. «Se convertirá» expresa con claridad la transformación en estado de ruina poblada por animales.
- source_word: נְוֵה
  english_pob_choice: a haunt
  chosen_spanish: guarida
  alternatives_spanish:
  - morada
  - habitación
  - refugio
  lexicon: HALOT
  rationale: El sustantivo puede significar morada o lugar de estancia. En contexto de desolación, «guarida» preserva la idea de albergue para animales salvajes y evita repetir la imagen de pastizal.
- source_word: תַנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - lobos salvajes
  - canes salvajes
  lexicon: HALOT
  rationale: En contextos proféticos de ruina, el sentido más probable es «chacales». Se evita «dragones», que sería engañoso para el lector moderno.
- source_word: חָצִיר
  english_pob_choice: a pasture
  chosen_spanish: pastizal
  alternatives_spanish:
  - pasto
  - pradera
  - herbazal
  lexicon: HALOT
  rationale: Aquí el término apunta a terreno cubierto de hierba o pasto. «Pastizal» comunica el lugar alimenticio para animales y mantiene la paralela imagen de ruina habitada.
- source_word: לִבְנוֹת יַעֲנָה
  english_pob_choice: for ostriches
  chosen_spanish: para avestruces
  alternatives_spanish:
  - para hijas del avestruz
  - para avestruces jóvenes
  - para las hijas del avestruz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijas del avestruz», pero el sentido idiomático es simplemente «avestruces». Como el audit trail inglés optó por la equivalencia zoológica, el español sigue esa decisión para mayor naturalidad, sin necesidad de mantener el giro literal en el texto principal.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que ajustó la última frase de una traducción literal a una equivalencia natural («for ostriches»). La presente versión española sigue esa decisión, optando por la lectura zoológica natural en el texto principal, pero conserva en nota la literalidad hebrea para auditoría.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando el texto lo requiera; en este versículo no aparece.
  - 'Se usa lenguaje concreto y no eclesiástico para imágenes de desolación: «guarida», «pastizal», «avestruces».'
  - «Espinos / ortigas / zarzas» preserva la tríada vegetal del hebreo sin sobreinterpretarla.
  - La personificación femenina implícita en el hebreo se refleja con «sus» y «se convertirá», sin añadir elementos ajenos al texto.
