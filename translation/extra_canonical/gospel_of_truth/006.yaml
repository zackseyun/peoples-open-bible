  - Deception (impersonal)
  rationale: Gospel of Truth consistently treats Error as an active, suffering power
    whose emptiness and dissolution are narrated. Preserving personification keeps
    the theological contrast with Truth/Gnosis sharp.
- issue: Revelatory metaphor of mouth/tongue
  chosen_reading: Translate literally (Truth as Father’s mouth; Holy Spirit as his
    tongue)
  alternative_readings:
  - Paraphrase as "Truth is the Father’s expression; the Spirit is his utterance"
  rationale: The text’s revelatory mechanics are couched in corporeal speech metaphors.
    Literal rendering maintains the contemplative texture and Trinitarian economy
    implied.
