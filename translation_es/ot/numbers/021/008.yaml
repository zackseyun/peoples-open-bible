translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Hazte una serpiente ardiente y ponla sobre un asta, y sucederá que todo el que sea mordido, cuando la mire, vivirá».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serafín»; el término hebreo puede significar «ser ardiente» y aquí se refiere a la serpiente mortal.
    reason: lexical_alternative
  - marker: b
    text: O «estandarte» o «poste de señal».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino, preservando el tetragrámaton en forma reconocible y evitando la sustitución litúrgica por «SEÑOR».
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: Make for yourself
  chosen_spanish: Hazte
  alternatives_spanish:
  - Haz para ti
  - Haz para ti mismo
  lexicon: HALOT
  rationale: El imperativo con pronombre dativo se expresa de manera natural en español con «hazte», que conserva la idea de acción dirigida a Moisés sin recargarla innecesariamente.
- source_word: שָׂרָף
  english_pob_choice: fiery serpent
  chosen_spanish: serpiente ardiente
  alternatives_spanish:
  - serafín
  - serpiente de fuego
  - serpiente venenosa
  lexicon: HALOT
  rationale: «Serpiente ardiente» conserva la imagen léxica del hebreo y la conexión con el contexto de las serpientes mortales, sin importar la asociación angelical de «serafín».
- source_word: וְשִׂים אֹתֹו עַל נֵס
  english_pob_choice: set it on a pole
  chosen_spanish: ponla sobre un asta
  alternatives_spanish:
  - colócala sobre una bandera
  - ponla sobre un estandarte
  - ponla sobre un poste
  lexicon: HALOT
  rationale: «Asta» expresa de forma concreta el objeto elevado sobre el que se coloca la serpiente; evita «estandarte» o «bandera», que podrían sugerir una lectura militar demasiado marcada para este contexto.
- source_word: הַנָּשׁוּךְ
  english_pob_choice: who is bitten
  chosen_spanish: todo el que sea mordido
  alternatives_spanish:
  - el mordido
  - todo el que haya sido mordido
  lexicon: HALOT
  rationale: 'La forma participial pasiva con artículo se vierte como condición general e idiomática en español: «todo el que sea mordido».'
- source_word: וְרָאָה אֹתוֹ
  english_pob_choice: when he looks at it
  chosen_spanish: cuando la mire
  alternatives_spanish:
  - cuando la vea
  - y la mire
  lexicon: HALOT
  rationale: «Mirar» comunica mejor la acción intencional requerida para sanar que «ver», que podría sonar pasivo. Se mantiene el valor condicional del hebreo con «cuando».
- source_word: וָחָי
  english_pob_choice: shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá y quedará con vida
  - seguirá vivo
  lexicon: HALOT
  rationale: La consecuencia directa se expresa de modo sobrio y claro con el futuro simple español, manteniendo la promesa de vida.
theological_decisions:
- issue: Sentido de שָׂרָף en el contexto narrativo
  english_pob_reading: Rendered as 'fiery serpent' in the main text.
  chosen_spanish_reading: «serpiente ardiente»
  alternative_spanish_readings:
  - «serafín»
  - «serpiente venenosa»
  rationale: La escena trata de una imagen de serpiente relacionada con el castigo de las mordeduras; «serpiente ardiente» conserva la imaginería del término hebreo y evita el desplazamiento hacia el ser celestial de «serafín».
  doctrine_reference: Numeri 21:6-9; cf. Isaías 6:2-6
- issue: Función del objeto elevado (נֵס)
  english_pob_reading: pole
  chosen_spanish_reading: «asta»
  alternative_spanish_readings:
  - «poste»
  - «estandarte»
  - «bandera»
  rationale: El objeto funciona como soporte visible para la serpiente. «Asta» mantiene la concreción del referente y deja abierta la posibilidad de un soporte/señal sin imponer una forma más específica de la que el hebreo exige.
  doctrine_reference: Números 21:8
translation_notes:
  revision_awareness: Se mantuvo el acuerdo alto del audit trail inglés sin cambios sustantivos; la redacción española sigue la misma resolución léxica y teológica, adaptada a un español natural y publicable.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como forma principal para el nombre divino, conforme al estándar del proyecto.
  - «Serpiente ardiente» reproduce la decisión del inglés POB «fiery serpent» sin introducir la lectura angelical de «serafín».
  - «Asta» traduce con claridad el soporte elevado del hebreo נֵס, mientras la nota preserva las alternativas léxicas relevantes.
  - La secuencia condicional se mantuvo con «todo el que sea mordido, cuando la mire, vivirá», reflejando el valor general de la construcción hebrea.
