translation:
  language: es
  text: Y Judá tomó una esposa para Er, su primogénito, y su nombre era Tamar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - consiguió
  - obtuvo
  - arregló
  lexicon: HALOT
  rationale: לָקַח en este contexto expresa la acción de tomar/obtener una esposa para el hijo. En español, «tomó» conserva la construcción narrativa sin añadir una paráfrasis más interpretativa como «arregló».
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer como esposa
  lexicon: HALOT
  rationale: Aquí אִשָּׁה no es «mujer» en sentido general, sino la pareja marital dada a Er. «Esposa» comunica de forma natural y fiel la relación matrimonial implícita.
- source_word: לְעֵר
  english_pob_choice: for Er
  chosen_spanish: para Er
  alternatives_spanish:
  - a Er
  - en favor de Er
  lexicon: HALOT
  rationale: La preposición לְ marca aquí el destinatario/beneficiario de la acción de Judá. «Para Er» reproduce bien esa relación en español.
- source_word: בְּכוֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo mayor
  - su primer hijo
  lexicon: HALOT
  rationale: בְּכוֹר conserva un matiz técnico de primogenitura. «Primogénito» es el equivalente español más preciso y mantiene la carga familiar e inheritaria del término.
- source_word: וּשְׁמָהּ
  english_pob_choice: and her name was
  chosen_spanish: y el nombre de ella era
  alternatives_spanish:
  - y su nombre era
  - y se llamaba
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se vierte de manera clara y directa. «El nombre de ella era» conserva el referente femenino sin necesidad de estilizarlo más allá del hebreo.
- source_word: תָּמָר
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  lexicon: Conventional transliteration of proper names
  rationale: Los nombres propios se transliteran por convención; «Tamar» mantiene continuidad con el uso bíblico en español y no requiere adaptación semántica.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto fuente y la traducción inglesa, sin revisiones aplicadas ni notas textuales; por ello el español sigue de cerca la sintaxis hebrea y la lectura estable del pasaje.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene el nombre propio «Tamar» sin cambios para coherencia onomástica.
  - Se elige un registro narrativo sobrio y publicable, sin añadir explicación del arreglo matrimonial que el hebreo solo sugiere implícitamente.
