base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/001/013.yaml
  text: Your eyes are too pure to look on evil[a], and you cannot gaze at wrongdoing[c][b]. Why then do you look on the treacherous and keep silent when the wicked swallows up one more righteous than he?
  footnotes:
  - marker: a
    text: Or 'to see evil'; the Hebrew idiom is literally 'too pure of eyes from seeing evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'misery,' 'trouble,' or 'mischief' for 'wrongdoing.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the wicked swallows up one more righteous than he'—a comparative statement, not necessarily a claim of absolute righteousness.
    reason: lexical_alternative
