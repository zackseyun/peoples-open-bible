id: ACT.17.26
reference: Acts 17:26
source:
  edition: SBLGNT
  text: ἐποίησέν τε ἐξ ⸀ἑνὸς πᾶν ἔθνος ἀνθρώπων κατοικεῖν ἐπὶ ⸂παντὸς προσώπου⸃ τῆς γῆς, ὁρίσας προστεταγμένους καιροὺς καὶ τὰς ὁροθεσίας τῆς κατοικίας αὐτῶν,
translation:
  text: And he made from one man every nation of mankind to live on the whole face of the earth[a], having determined their appointed times and the boundaries of their dwelling place[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'from one blood' instead of 'from one.' The main text follows the SBLGNT reading 'from one,' with 'man' supplied in English for clarity.
    reason: textual_variant
  - marker: b
    text: Or 'the times set for them' for 'their appointed times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησέν
  chosen: he made
  alternatives:
  - he created
  - he caused
  lexicon: BDAG
  rationale: ποιέω here is broad and idiomatic; 'made' is natural English and preserves the sense of bringing about humanity's common origin and distribution without over-specifying creation ex nihilo.
- source_word: τε
  chosen: And
  alternatives:
  - and also
  - indeed
  lexicon: BDAG
  rationale: τέ is a connective particle linking this clause to the preceding argument. English typically omits or smooths it; 'And' preserves the connection in readable form.
- source_word: ἐξ ἑνὸς
  chosen: from one man
  alternatives:
  - from one
  - from one ancestor
  - from one blood
  lexicon: BDAG
  rationale: The text reads simply 'from one.' Because ἄνθρωπος appears immediately after in a genitive construction and the sense is humanity's common origin, 'from one man' makes the implied referent explicit in idiomatic English. 'Blood' reflects a later textual tradition, not the SBLGNT reading, so it is not adopted in the main text.
- source_word: πᾶν ἔθνος ἀνθρώπων
  chosen: every nation of mankind
  alternatives:
  - every nation of men
  - every people-group of humanity
  - the whole human race
  lexicon: BDAG
  rationale: ἔθνος is best rendered 'nation' here, referring to distinct peoples. ἀνθρώπων is a genitive of the larger class, indicating these are human nations. 'Mankind' conveys humanity collectively in a gender-accurate way consistent with the source's representative sense.
- source_word: κατοικεῖν
  chosen: to live
  alternatives:
  - to dwell
  - to inhabit
  lexicon: BDAG
  rationale: The infinitive expresses purpose/result. 'To live' is clear modern English; 'dwell' is more formal but less natural. The habitation nuance is retained by the following geographic phrase.
- source_word: ἐπὶ παντὸς προσώπου τῆς γῆς
  chosen: on the whole face of the earth
  alternatives:
  - over the whole face of the earth
  - upon all the surface of the earth
  lexicon: BDAG
  rationale: πρόσωπον in this idiom means 'face' or 'surface.' Preserving 'face of the earth' reflects the biblical idiom while remaining intelligible. 'Whole' renders παντός in context.
- source_word: ὁρίσας
  chosen: having determined
  alternatives:
  - having appointed
  - having fixed
  lexicon: BDAG
  rationale: The participle denotes God's prior or accompanying act of setting limits. 'Having determined' captures the sovereign delimiting sense without sounding overly technical.
- source_word: προστεταγμένους καιρούς
  chosen: their appointed times
  alternatives:
  - the times set for them
  - fixed seasons
  lexicon: BDAG
  rationale: καιροί are significant periods or seasons rather than mere chronological moments. προστεταγμένους adds the sense of being ordered/appointed beforehand. 'Their appointed times' is concise and natural, with 'their' supplied from the context of the nations.
- source_word: ὁροθεσίας
  chosen: the boundaries
  alternatives:
  - the limits
  - the borderlines
  lexicon: BDAG
  rationale: ὁροθεσία refers to boundary-setting. 'Boundaries' is the most natural English equivalent and fits the geographic context.
- source_word: τῆς κατοικίας αὐτῶν
  chosen: of their dwelling place
  alternatives:
  - of where they live
  - of their habitation
  lexicon: BDAG
  rationale: κατοικία denotes habitation or dwelling place. Singular in Greek can function collectively; singular English preserves the formal structure while naturally referring to each nation's allotted habitation.
