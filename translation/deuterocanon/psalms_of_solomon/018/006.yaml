id: PSS.18.6
reference: Psalms of Solomon 18:6
source:
  edition: lxx-swete-1909
  text: καθαρίσαι ὁ θεὸς Ἰσραὴλ εἰς ἡμέραν ἐλέους ἐν εὐλογίᾳ, εἰς ἡμέραν ἐκλογῆς ἐν ἀνάξει χριστοῦ αὐτοῦ.
  language: Greek
  pages:
  - 810
  validation: swete_direct
translation:
  text: May God purify Israel for a day of mercy in blessing[e][d][c][b][a], for a day of choosing in the raising up of his Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek leaves the object of “purify” unstated; “us” is supplied from the corporate Israel context.
    reason: alternative_reading
  - marker: b
    text: Or “for a day of election.”
    reason: lexical_alternative
  - marker: c
    text: Or “in the exaltation of his Messiah.”
    reason: lexical_alternative
  - marker: d
    text: A manuscript variant reflected in Swete’s apparatus has a finite verb (“may cleanse”), which is close in sense to the prayer-like rendering adopted here.
    reason: textual_variant
  - marker: e
    text: Or 'May the God of Israel purify us'.
    reason: previous_rendering
lexical_decisions:
- source_word: καθαρίσαι
  chosen: purify
  alternatives:
  - cleanse
  - make clean
  lexicon: LSJ
  rationale: The verb denotes cleansing or purification. “Purify” reads naturally in English while preserving the religious and moral force of the Greek. Although the form is an infinitive in Swete’s text, in this poetic prayer context it carries a jussive/prayer-like force, hence “May … purify.”
- source_word: ὁ θεὸς Ἰσραήλ
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: LSJ
  rationale: This is the standard biblical expression for God as identified with Israel. “The God of Israel” is the clearest and most natural English rendering.
- source_word: εἰς ἡμέραν ἐλέους
  chosen: for a day of mercy
  alternatives:
  - for the day of mercy
  - unto a day of mercy
  lexicon: LSJ
  rationale: εἰς here is best taken prospectively, expressing preparation for or orientation toward a coming day. “For a day of mercy” preserves that forward-looking sense.
- source_word: ἐν εὐλογίᾳ
  chosen: in blessing
  alternatives:
  - with blessing
  - by blessing
  lexicon: LSJ
  rationale: The phrase likely expresses the manner or accompanying circumstance of that day. “In blessing” stays close to the Greek while remaining intelligible.
- source_word: εἰς ἡμέραν ἐκλογῆς
  chosen: for a day of choosing
  alternatives:
  - for a day of election
  - for the day of selection
  lexicon: LSJ
  rationale: ἐκλογή can be rendered “election,” but in contemporary English that wording can sound political. “Choosing” preserves the idea of divine selection in more transparent modern English.
- source_word: ἐν ἀνάξει
  chosen: in the raising up
  alternatives:
  - in the exaltation
  - in the bringing forth
  lexicon: LSJ
  rationale: The noun suggests upward movement or elevation. “In the raising up” best preserves the concrete verbal force without prematurely narrowing it to purely royal exaltation.
- source_word: χριστοῦ αὐτοῦ
  chosen: his Messiah
  alternatives:
  - his Christ
  lexicon: LSJ
  rationale: Per project doctrine, Χριστός is rendered “Messiah” when functioning as a title. That best preserves the Jewish messianic sense in this context.
