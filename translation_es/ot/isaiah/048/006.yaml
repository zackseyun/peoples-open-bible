review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: «Has oído; mira todo esto… Desde ahora te hago oír cosas nuevas…». Conserva adecuadamente el valor causativo de הִשְׁמַעְתִּיךָ y la nota léxica sobre נְצֻרוֹת. Sin embargo, «¿Y no lo declararás?» introduce un matiz más futurizado que el inglés auditado y no representa de la mejor manera la pregunta retórica hebrea; en español suena más natural y fiel «¿Y no lo declararás?» o mejor aún «¿Y no lo vas a declarar?» pero la opción más bíblicamente digna y directa es «¿Y no lo declararás?»; aun así, el problema principal está en la última cláusula: «que no has conocido» es comprensible pero menos idiomática que «que no conocías» o «que no habías conocido». Dado el perfecto hebreo con perspectiva de ignorancia previa, conviene una formulación más natural en español.'
  spanish_quality_summary: El texto es claro y legible, con buen registro eclesial moderno. «Mira todo esto» y «te hago oír» funcionan bien. La frase «cosas reservadas que no has conocido» resulta algo rígida; en español bíblico-natural suena mejor «cosas reservadas que no conocías». También conviene ajustar la puntuación y el flujo sin alterar el contenido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «cosas reservadas» para נְצֻרוֹת es defendible y está bien respaldada por la nota.
  issues:
  - severity: medium
    issue: 'Última cláusula poco idiomática en español: «que no has conocido»'
    rationale: Aunque reproduce de cerca el perfecto inglés, en español aplicado a «cosas» suena más natural «que no conocías» o «que no habías conocido». Esto comunica mejor la ignorancia previa que el hebreo expresa.
  - severity: low
    issue: La pregunta retórica con futuro puede sentirse algo dura
    rationale: «¿Y no lo declararás?» es entendible, pero el hebreo הֲלוֹא תַגִּידוּ tiene fuerza retórica más que simple futuridad. No es un error grave, pero merece revisión de estilo si se retoca el verso.
  revised_spanish_text: Has oído; mira todo esto. ¿Y no lo declararás? Desde ahora te hago oír cosas nuevas[a], cosas reservadas que no conocías.
  revised_footnotes:
  - marker: a
    text: O «cosas guardadas en reserva» / «cosas custodiadas». El hebreo sugiere asuntos retenidos hasta el momento oportuno para darlos a conocer.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene casi todo el borrador porque es fiel y claro. Solo se ajusta la última cláusula a un español más natural y bíblicamente fluido: «que no conocías» expresa mejor la ignorancia previa de estas realidades sin perder el sentido del hebreo. No se requiere adjudicación adicional.'
