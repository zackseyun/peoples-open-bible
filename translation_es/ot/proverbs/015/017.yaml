translation:
  language: es
  text: Mejor es una comida de verduras donde hay amor que un buey cebado[a] con odio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un buey de establo»; la expresión hebrea puede enfatizar el engorde en establo o la condición resultante de estar cebado.
    reason: lexical_alternative
  - marker: b
    text: Lit. «y odio en ello», probablemente refiriéndose a la comida o al ambiente del hogar marcado por el odio.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: En este proverbio comparativo, טוֹב introduce una evaluación de preferencia. «Mejor es» conserva el valor comparativo de forma natural en español y mantiene el equilibrio del paralelismo.
- source_word: אֲרֻחַת
  english_pob_choice: a meal of
  chosen_spanish: una comida de
  alternatives_spanish:
  - una ración de
  - un banquete de
  lexicon: HALOT
  rationale: El sustantivo señala una comida/porción de alimento, no solo el ingrediente. «Una comida de» reproduce con claridad el escenario doméstico sin sobrecargar el verso.
- source_word: יָרָק
  english_pob_choice: vegetables
  chosen_spanish: verduras
  alternatives_spanish:
  - hortalizas
  - verdes
  lexicon: HALOT
  rationale: El término abarca plantas comestibles verdes en general. «Verduras» es la opción más natural y comprensible en español actual, sin estrechar el campo semántico a «hierbas».
- source_word: וְאַהֲבָה שָׁם
  english_pob_choice: where there is love
  chosen_spanish: donde hay amor
  alternatives_spanish:
  - y allí hay amor
  - con amor allí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y amor allí». En español, «donde hay amor» expresa de forma idiomática la cualidad del entorno o del hogar asociado a la comida, manteniendo el valor locativo de שָׁם.
- source_word: מִשּׁוֹר אָבוּס
  english_pob_choice: than a fattened ox
  chosen_spanish: que un buey engordado
  alternatives_spanish:
  - que un buey cebado
  - que un buey de establo
  lexicon: HALOT
  rationale: שׁוֹר es «buey» y אָבוּס describe un animal engordado o cebado. «Buey engordado» comunica la idea de abundancia/lujo con buena naturalidad en español, sin perder la imagen animal concreta.
- source_word: וְשִׂנְאָה בּוֹ
  english_pob_choice: with hatred
  chosen_spanish: con odio
  alternatives_spanish:
  - y odio en él
  - con odio en ello
  - con odio allí
  lexicon: HALOT
  rationale: La expresión hebrea añade la idea de presencia de odio en el contexto del banquete o del hogar. Como el texto hebreo es compacto y el inglés POB decidió simplificar en la revisión, «con odio» preserva el contraste sin introducir una referencia pronominal innecesaria en el español principal.
theological_decisions:
- issue: El contraste sabio entre frugalidad con amor y abundancia con odio
  english_pob_reading: A meal of vegetables with love is preferable to a fattened ox marked by hatred.
  chosen_spanish_reading: Una comida sencilla con amor vale más que la abundancia de un buey engordado con odio.
  alternative_spanish_readings:
  - La sencillez con amor es mejor que la abundancia con odio.
  - Mejor es poco con amor que mucho con odio.
  rationale: 'El proverbio no enseña que la comida vegetal sea intrínsecamente superior, sino que la calidad relacional del hogar supera la riqueza material. La traducción conserva esa tensión sapiencial: el valor está en el amor frente al odio, no en el alimento en sí.'
  doctrine_reference: Sabiduría bíblica; cf. Prov 15:16-17
- issue: La fuerza de אָבוּס como animal alimentado/engordado
  english_pob_reading: fattened ox
  chosen_spanish_reading: buey engordado
  alternative_spanish_readings:
  - buey cebado
  - buey de establo
  rationale: Se conserva la imagen concreta de un animal de alto valor y gran abundancia, sin convertirla en una paráfrasis. La redacción evita borrar la tensión entre riqueza externa y miseria relacional.
  doctrine_reference: Sabiduría bíblica; contraste entre prosperidad y paz relacional
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que suprimió «in it» por innecesario en inglés, pero el hebreo sigue permitiendo la lectura más compacta «with hatred». La versión española mantiene esa concisión y no reinstala un pronombre explícito que el texto final inglés ya dejó de usar.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera; este verso no contiene el nombre divino.
  - Se mantiene «amor/odio» como contraste relacional, no como comentario moral abstracto.
  - «Buey» conserva mejor la imagen sapiencial de un animal valioso que «toro» o «res» en este contexto.
  - El paralelismo se preserva con una comparación breve y directa, acorde con el hebreo.
  - No se introduce lenguaje eclesiástico innecesario; el registro es sapiencial y natural en español.
