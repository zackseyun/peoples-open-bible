  to: Dios[a], los arrogantes se han levantado contra mí, y una banda de hombres despiadados ha buscado mi vida[b]; no te han puesto delante de ellos[c].
  rationale: Se corrigió la nota defectuosa sobre עָרִיצִים eliminando una falsa nota de literalidad y se alineó el texto principal con la decisión inglesa «ruthless men» mediante «hombres despiadados», que además suena más natural y digno en español bíblico. También se añadió la alternativa documentada para el cierre («delante de sus ojos») con su explicación, preservando mejor el audit trail y la inteligibilidad del español.
