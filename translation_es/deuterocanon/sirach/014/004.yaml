revisions:
- from: El que se priva a sí mismo, para otro acumula[a], y un extraño se deleitará en sus bienes.
  to: El que se priva a sí mismo acumula para otro, y un extraño[a] se deleitará en sus bienes.
  rationale: 'Se reubica la nota al pie al término que realmente comenta («un extraño») y se ajusta el orden de palabras a un español más natural: «acumula para otro». No se altera el sentido ni la decisión de conservar el singular hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:53:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: quien se priva de sus propios bienes termina acumulando para otro, y otro disfrutará de esos bienes. También preserva correctamente el singular hebreo זָר con valor genérico, en consonancia con la revisión inglesa. Sin embargo, el anclaje de la nota al pie está mal ubicado: la nota trata de «un extraño», pero el marcador [a] aparece en «acumula».'
  spanish_quality_summary: El español es claro y digno, pero «para otro acumula» suena algo invertido y menos natural que «acumula para otro». Además, la nota debe anclarse en «un extraño[a]», no en el verbo anterior. «Se deleitará en sus bienes» es aceptable y readable; «bienes» corresponde bien a וּבְטוֹבָתוֹ.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son fieles: «se priva a sí mismo» para מוֹנֵעַ לְנַפְשׁוֹ, «acumula para otro» para יִקְבֹּץ לְאַחֵר, «sus bienes» para וּבְטוֹבָתוֹ, y «un extraño» para זָר en singular genérico.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal anclado
    rationale: La nota explica la elección de «un extraño» singular frente al plural del griego, pero el marcador [a] está colocado tras «acumula», lo cual no corresponde al contenido de la nota.
  - severity: low
    issue: Orden de palabras algo forzado en «para otro acumula»
    rationale: Aunque comprensible, en español natural suena mejor «acumula para otro», que mantiene el mismo sentido sin rigidez innecesaria.
  revised_spanish_text: El que se priva a sí mismo acumula para otro, y un extraño[a] se deleitará en sus bienes.
  revised_footnotes:
  - marker: a
    text: El hebreo tiene el singular «extraño»; el paralelo griego expresa la idea en plural («otros»). Se conserva aquí el singular por la base hebrea, con valor genérico.
    reason: alternative_reading
  revision_rationale: 'Se reubica la nota al pie al término que realmente comenta («un extraño») y se ajusta el orden de palabras a un español más natural: «acumula para otro». No se altera el sentido ni la decisión de conservar el singular hebreo.'
