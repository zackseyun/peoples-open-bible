- source_word: בְאֵרוֹת
  english_pob_choice: Beeroth
  chosen_spanish: Beerot
  alternatives_spanish:
  - pozos
  - Beeroth
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar; por eso se translitera en vez de traducir el sustantivo subyacente 'pozos'. La forma española se adapta a la ortografía y acentuación del idioma sin alterar el referente.
translation_notes:
