    text: O ‘será salvado’ o ‘será preservado’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘en uno’; probablemente significa ‘en un solo momento’ o ‘de repente’.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad general del borrador, pero se corrige la expresión final para reflejar mejor el hebreo בְאֶחָת y la revisión inglesa auditada 'at once' sin intensificación innecesaria. 'De inmediato' es más natural en español y deja la explicación más literal o debatida en la nota.
