revisions:
- from: 'Pero Moisés dijo[a]: «No sería correcto hacer así, porque sacrificaríamos a Yahvé nuestro Dios lo que es detestable para los egipcios. Si sacrificáramos lo que es detestable para los egipcios delante de sus ojos, ¿no nos apedrearían?»'
  to: 'Pero Moisés dijo[a]: «No sería correcto hacer eso, porque sacrificaríamos a Yahvé nuestro Dios lo que es detestable para los egipcios. Si sacrificamos lo que es detestable para los egipcios delante de sus ojos, ¿no nos apedrearían?»'
  rationale: 'Se hizo una reparación menor de naturalidad en español: «hacer eso» en lugar de «hacer así». También se afinó la cláusula condicional a «Si sacrificamos» para una lectura más fluida y fiel a la condición vívida del hebreo, manteniendo intacto el sentido hipotético y la pregunta retórica.'
