translation:
  language: es
  text: Pero el levita mismo hará el servicio de la tienda de reunión, y ellos llevarán su iniquidad[a]. Es un estatuto perpetuo por todas sus generaciones, y entre los hijos de Israel[b] no heredarán heredad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevarán su culpa». El modismo hebreo también puede denotar culpa, iniquidad o la responsabilidad/consecuencias asociadas con ella.
    reason: lexical_alternative
  - marker: b
    text: O «entre los israelitas». El hebreo dice «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no heredarán heredad», repetición hebrea que enfatiza la negación de la porción tribal de tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַד
  english_pob_choice: shall do the service
  chosen_spanish: hará el servicio
  alternatives_spanish:
  - servirá
  - cumplirá el servicio
  lexicon: HALOT
  rationale: El hebreo expresa acción obligatoria en contexto legal-instruccional. «Hará el servicio» conserva la fuerza prescriptiva y el sentido cultual sin sonar artificial en español.
- source_word: הַלֵּוִי הוּא
  english_pob_choice: the Levite himself
  chosen_spanish: el levita mismo
  alternatives_spanish:
  - el levita, él mismo
  - el levita solo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Mismo» comunica esa insistencia de forma natural en español, sin añadir una exclusividad que el contexto no exige.
- source_word: עֲבֹדַת אֹהֶל מוֹעֵד
  english_pob_choice: the service of the tent of meeting
  chosen_spanish: el servicio de la tienda de reunión
  alternatives_spanish:
  - la obra de la tienda de reunión
  - el ministerio de la tienda de reunión
  lexicon: HALOT
  rationale: עֲבֹדָה aquí es servicio/duty cultual. «Tienda de reunión» mantiene el término técnico para אֹהֶל מוֹעֵד, y «servicio» evita una paráfrasis excesiva.
- source_word: וְהֵם יִשְׂאוּ עֲוֺנָם
  english_pob_choice: and they shall bear their iniquity
  chosen_spanish: y ellos llevarán su iniquidad
  alternatives_spanish:
  - y ellos cargarán con su culpa
  - y ellos asumirán la consecuencia de su pecado
  lexicon: HALOT
  rationale: נשא עון es un idiomático jurídico-cultual. «Llevarán su iniquidad» conserva la tensión del hebreo y la posible ambigüedad entre culpa, carga y responsabilidad.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - un estatuto permanente
  - un estatuto eterno
  lexicon: HALOT
  rationale: La expresión designa una disposición legal duradera dentro del orden pactal. «Estatuto perpetuo» es una fórmula bíblica clara y fiel, y mantiene la duratividad del hebreo.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para todas sus generaciones
  alternatives_spanish:
  - por todas sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: El modismo señala vigencia continua a través de las generaciones sucesivas. «Para todas sus generaciones» suena natural en español y conserva la idea de continuidad.
- source_word: וּבְתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - en medio de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo, como en el inglés auditado, sin neutralizarla. «Entre» expresa bien el valor relacional de בתוך en este contexto.
- source_word: לֹא יִנְחֲלוּ נַחֲלָה
  english_pob_choice: they shall not inherit an inheritance
  chosen_spanish: no heredarán heredad
  alternatives_spanish:
  - no recibirán herencia
  - no tendrán heredad
  lexicon: HALOT
  rationale: El hebreo usa verbo y sustantivo de la misma raíz para énfasis. «Heredarán heredad» preserva esa repetición formal y el peso jurídico del texto, aunque suene poco corriente.
theological_decisions:
- issue: Lenguaje legal-cultual sobre la responsabilidad de los levitas
  english_pob_reading: The verse is translated in legal-cultic terms without softening the idiom 'bear their iniquity.'
  chosen_spanish_reading: El versículo se vierte en términos legales y cultuales, sin suavizar el giro «llevarán su iniquidad».
  alternative_spanish_readings:
  - «cargarán con su culpa»
  - «sufrirán el castigo por su pecado»
  rationale: El texto comunica responsabilidad pactal asociada al servicio levítico. Mantener el modismo evita restringir indebidamente si la idea principal es culpa, carga o consecuencia.
  doctrine_reference: Translation philosophy §3, §6
- issue: Expresión masculina plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: among the sons of Israel
  chosen_spanish_reading: entre los hijos de Israel
  alternative_spanish_readings:
  - entre los israelitas
  - entre los hijos de Israel
  rationale: Se conserva la forma masculina del hebreo por fidelidad gramatical y por la política de precisión de género, sin perder inteligibilidad en español.
  doctrine_reference: Translation philosophy §4
- issue: Repetición cognada final «heredar heredad»
  english_pob_reading: they shall not inherit an inheritance
  chosen_spanish_reading: no heredarán heredad
  alternative_spanish_readings:
  - no recibirán herencia
  - no tendrán heredad
  rationale: La repetición del hebreo enfatiza la exclusión de la porción tribal de tierra. Mantenerla en español preserva el relieve retórico y jurídico del original.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir una formulación más natural para el valor verbal prescriptivo (equivalente a English 'shall do the service'), sin perder el tono legal-cultual ni suavizar el modismo sobre cargar la iniquidad. También conserva el cierre repetitivo del hebreo como recurso de énfasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general cuando corresponda; en este versículo no aparece el nombre divino.
  - Se conserva «tienda de reunión» para אֹהֶל מוֹעֵד, conforme al término técnico del proyecto.
  - Se mantiene el singular «iniquidad» para reflejar el sufijo plural del hebreo sin explicitarlo innecesariamente.
  - Se preserva la repetición cognada final («heredarán heredad») por fidelidad retórica y jurídica al hebreo.
