translation:
  language: es
  text: Y no introduzcas una abominación en tu casa, no sea que llegues a ser dedicado a destrucción[a] como ella. Ciertamente la detestarás y ciertamente la aborrecerás, porque es dedicada a destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el ban»; tradicionalmente, «maldita». El hebreo חֵרֶם designa algo apartado para destrucción bajo juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָבִיא
  english_pob_choice: bring
  chosen_spanish: introduzcas
  alternatives_spanish:
  - metas
  - lleves
  - introduzcas en
  lexicon: HALOT
  rationale: El verbo causativo expresa llevar o hacer entrar algo en la casa; en español, en prohibición directa, 'introduzcas' comunica con naturalidad la acción de introducir algo en el ámbito doméstico sin perder la fuerza del mandato.
- source_word: תֽוֹעֵבָה
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa detestable
  - objeto detestable
  lexicon: HALOT
  rationale: '''Abominación'' preserva la fuerza cultual y moral del término, especialmente en Deuteronomio, mejor que una expresión más suave como ''cosa detestable''.'
- source_word: בֵּיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu hogar
  - tu casa / tu hogar
  lexicon: HALOT
  rationale: '''Casa'' conserva la imagen concreta del lugar al que no debe entrar el objeto prohibido y coincide con el registro sobrio del hebreo.'
- source_word: וְהָיִיתָ חֵרֶם כָּמֹהוּ
  english_pob_choice: lest you become devoted to destruction like it
  chosen_spanish: para que no llegues a ser herem como ella
  alternatives_spanish:
  - para que no quedes bajo el ban como ella
  - para que no seas devotado a destrucción como ella
  lexicon: HALOT
  rationale: Se conserva el término técnico 'herem' para mantener la tensión lexical y teológica documentada por POB. La construcción final se vierte con 'para que no' para reflejar la fuerza de advertencia del hebreo. Se usa 'ella' para concordar con 'abominación' (femenino) y con el antecedente inmediato.
- source_word: חֵרֶם
  english_pob_choice: devoted to destruction
  chosen_spanish: herem
  alternatives_spanish:
  - devotado a destrucción
  - bajo el ban
  - consagrado a destrucción
  lexicon: HALOT
  rationale: Dado que el dossier inglés ya documenta la tensión entre 'under the ban', 'accursed' y 'devoted to destruction', se preserva el término transliterado 'herem' en el cuerpo principal para no borrar esa carga conceptual. La explicación queda explicitada en la nota.
- source_word: שַׁקֵּץ תְּשַׁקְּצֶנּוּ
  english_pob_choice: You shall surely detest it
  chosen_spanish: Ciertamente la detestarás
  alternatives_spanish:
  - La detestarás sin falta
  - La detestarás con toda certeza
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la obligación. 'Ciertamente' comunica bien esa intensificación en español sin exagerar más allá del hebreo.
- source_word: וְתַעֵב תְּתַעֲבֶנּוּ
  english_pob_choice: and surely abhor it
  chosen_spanish: y ciertamente la aborrecerás
  alternatives_spanish:
  - y ciertamente la abominarás
  - y la aborrecerás sin falta
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el verbo previo usando otro término fuerte y natural en español. 'Aborrecer' conserva mejor la segunda cola del paralelismo que repetir 'detestar'.
- source_word: כִּי חֵרֶם הוּא
  english_pob_choice: for it is devoted to destruction
  chosen_spanish: porque es herem
  alternatives_spanish:
  - porque está bajo el ban
  - porque está dedicado a destrucción
  lexicon: HALOT
  rationale: El cierre repite el término técnico para sostener la relación léxica del versículo. La nota aclara el sentido semántico y evita perder el valor de término especializado.
theological_decisions:
- issue: Cómo rendir חֵרֶם sin diluir su sentido de juicio divino
  english_pob_reading: devoted to destruction / under the ban / accursed
  chosen_spanish_reading: herem
  alternative_spanish_readings:
  - bajo el ban
  - consagrado a destrucción
  - maldito
  rationale: El texto habla de un objeto idólatra que, si se introduce en la casa, comunica su propio estado de juicio al israelita. Mantener 'herem' en el texto principal conserva la tensión del concepto bíblico y evita reducirlo a 'maldito', que no expresa con suficiente precisión la idea de algo apartado para destrucción bajo juicio divino.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Fuerza de la advertencia expresada por la secuencia verbal final
  english_pob_reading: lest you become ... You shall surely detest it and surely abhor it
  chosen_spanish_reading: para que no llegues a ser ... Ciertamente la detestarás y ciertamente la aborrecerás
  alternative_spanish_readings:
  - no sea que llegues a ser ... La detestarás sin falta y la aborrecerás sin falta
  - para que no seas ... La detestarás con certeza y la aborrecerás con certeza
  rationale: El hebreo usa una advertencia preventiva seguida de énfasis verbal. 'Para que no' reproduce la fuerza precautoria, mientras que 'ciertamente' refleja adecuadamente el infinitivo absoluto sin convertirlo en una hipérbole innecesaria.
  doctrine_reference: Translation philosophy §3 (warning and modality)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se prefirió una advertencia con valor preventivo (''para que no'') en vez de una simple consecuencia, y se reflejó la intensidad del hebreo final con ''ciertamente'' en lugar de un adverbio más fuerte que exceda el original. También se conservó la repetición del término técnico para mantener la coherencia auditada del versículo.'
  spanish_consistency_notes:
  - Se usa 'abominación' para תועבה, coherente con el valor cultual y moral del término en Deuteronomio.
  - Se preserva 'herem' como término técnico en el texto principal para no aplanar la tensión lexical/theológica documentada por la POB.
  - La nota explica la alternativa tradicional 'bajo el ban' sin introducir un reemplazo no auditado en el cuerpo del texto.
  - 'Se mantiene el paralelismo verbal con dos expresiones fuertes en español: ''detestar'' y ''aborrecer''.'
