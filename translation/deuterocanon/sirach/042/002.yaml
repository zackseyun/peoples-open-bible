translation:
  text: about the law of the Most High and the statute[b][a], and about a judgment that vindicates the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a judgment to justify the wicked' or 'a judgment that declares the wicked righteous.' The Hebrew להצדיק and the Greek parallel δικαιῶσαι are forensic terms.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew witness is slightly terse here; the Greek parallel reads 'about the law of the Most High and the covenant, and about a judgment to justify the ungodly.' The Hebrew has 'statute' where the Greek has 'covenant.'
    reason: alternative_reading
lexical_decisions:
- source_word: תורת עליון
  chosen: the law of the Most High
  alternatives:
  - the instruction of the Most High
  lexicon: HALOT
  rationale: תורה can mean both 'instruction' and 'law.' In this paired legal context with חוק, 'law' best preserves the juridical sense, while 'Most High' straightforwardly renders עליון.
- source_word: חוק
  chosen: the statute
  alternatives:
  - the decree
  - the ordinance
  lexicon: HALOT
  rationale: חוק commonly denotes a fixed statute or prescribed ordinance. 'Statute' keeps the legal register and distinguishes it from תורה.
- source_word: מצדיק
  chosen: vindicates
  alternatives:
  - declares righteous
  - justifies
  lexicon: HALOT
  rationale: The Hiphil of צדק here has a forensic sense. 'Vindicates' communicates legal acquittal in accessible English. 'Justifies' is possible but in English carries heavier later theological associations that the Hebrew here does not require.
- source_word: להצדיק רשע
  chosen: that vindicates the wicked
  alternatives:
  - to declare a wicked man righteous
  - to justify the wicked
  lexicon: HALOT
  rationale: The Hebrew infinitive phrase is concise and forensic. The Greek parallel περὶ κρίματος δικαιῶσαι τὸν ἀσεβῆ confirms a judicial sense. 'The wicked' is a natural collective rendering of רשע in context.
- source_word: ועל
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: The repeated preposition structures a list of matters. 'About' is idiomatic modern English and preserves the catalog style without over-formalizing.
- source_word: רשע
  chosen: the wicked
  alternatives:
  - the ungodly
  - a wicked person
  lexicon: HALOT
  rationale: The Greek ἀσεβῆ supports the sense 'wicked/ungodly.' 'The wicked' works well as a generic singular/collective in English and avoids unnecessary gendering.
