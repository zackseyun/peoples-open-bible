  - severity: medium
    issue: '''en su carro'' puede resultar ambiguo'
    rationale: En español contemporáneo amplio, 'carro' suele entenderse como automóvil. Dado el contexto histórico y el hebreo רכב, 'carro de guerra' comunica mejor el referente sin sobreinterpretar indebidamente.
