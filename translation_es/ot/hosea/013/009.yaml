  - severity: low
    issue: La formulación de la nota («O:») suena poco natural y algo confusa.
    rationale: En español de lectura bíblica clara conviene introducir la alternativa directamente y de forma completa, sin una etiqueta abreviada torpe que no ayuda a distinguir las lecturas.
