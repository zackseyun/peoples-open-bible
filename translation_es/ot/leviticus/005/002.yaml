translation:
  language: es
  text: O si alguna persona toca cualquier cosa inmunda—ya sea el cadáver de un animal silvestre inmundo, o el cadáver de ganado inmundo, o el cadáver de una criatura inmunda que pulula—y le está oculto[a], y él está inmundo y se hace culpable[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él no se da cuenta de ello»; literalmente, «le está oculto».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, incurre en culpa legal por la impureza una vez que el hecho le aplica; no se afirma que tocar el cadáver sea necesariamente un mal moral en el mismo sentido que un pecado deliberado.
    reason: theological_note
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - alguien
  lexicon: HALOT
  rationale: En lenguaje legal hebreo, נֶפֶשׁ suele designar a un individuo/persona, no al alma inmaterial. 'Persona' es natural en español moderno y conserva el alcance jurídico del sujeto.
- source_word: תִּגַּע בְּ
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - entra en contacto con
  - roza
  lexicon: HALOT
  rationale: נגע con ב indica contacto físico. 'Toca' es directo, claro y suficientemente formal en este contexto legal.
- source_word: כָל דָּבָר טָמֵא
  english_pob_choice: any unclean thing
  chosen_spanish: cualquier cosa inmunda
  alternatives_spanish:
  - cualquier cosa impura
  - algo inmundo
  lexicon: HALOT
  rationale: דָּבָר es amplio ('cosa, asunto'). 'Cualquier cosa inmunda' reproduce bien la generalidad seguida por los ejemplos concretos.
- source_word: נִבְלַת
  english_pob_choice: the carcass of
  chosen_spanish: el cadáver de
  alternatives_spanish:
  - la carroña de
  - el cuerpo muerto de
  lexicon: HALOT
  rationale: En este marco de pureza ritual, נְבֵלָה refiere al cuerpo muerto de un animal. 'Cadáver' es el término español más natural y preciso aquí; 'carroña' introduciría una carga distinta.
- source_word: חַיָּה טְמֵאָה
  english_pob_choice: an unclean wild animal
  chosen_spanish: un animal silvestre inmundo
  alternatives_spanish:
  - una bestia inmunda
  - un animal del campo inmundo
  lexicon: HALOT
  rationale: חַיָּה contrasta con בְּהֵמָה y señala animales no domesticados. 'Silvestre' comunica bien esa distinción en español.
- source_word: בְּהֵמָה טְמֵאָה
  english_pob_choice: unclean livestock
  chosen_spanish: ganado inmundo
  alternatives_spanish:
  - animal doméstico inmundo
  - ganado impuro
  lexicon: HALOT
  rationale: בְּהֵמָה alude a animales domésticos/quadrúpedos. 'Ganado' es breve y bíblicamente reconocible en español, y mantiene el contraste con 'animal silvestre'.
- source_word: שֶׁרֶץ טָמֵא
  english_pob_choice: an unclean swarming creature
  chosen_spanish: un animal que se arrastra inmundo
  alternatives_spanish:
  - una criatura que se arrastra inmunda
  - un ser que pulula inmundo
  lexicon: HALOT
  rationale: שֶׁרֶץ designa pequeñas criaturas que se mueven arrastrándose o pululando. 'Animal que se arrastra' mantiene la categoría de manera comprensible en español, aunque la expresión no sea idéntica a la taxonomía moderna.
- source_word: וְנֶעְלַם מִמֶּנּוּ
  english_pob_choice: it is hidden from him
  chosen_spanish: le queda oculto
  alternatives_spanish:
  - él no se da cuenta
  - le pasa inadvertido
  lexicon: HALOT
  rationale: El niphal de עלם expresa que el hecho queda oculto o no percibido por la persona. 'Le queda oculto' conserva la perspectiva hebrea y sugiere la falta de conciencia del hecho.
- source_word: וְהוּא טָמֵא
  english_pob_choice: and he is unclean
  chosen_spanish: y él está inmundo
  alternatives_spanish:
  - y permanece inmundo
  - y sigue inmundo
  lexicon: HALOT
  rationale: La cláusula expresa el estado resultante de impureza ritual. 'Está inmundo' mantiene la coordinación del hebreo y evita sobreinterpretar la relación lógica.
- source_word: וְאָשֵׁם
  english_pob_choice: and becomes guilty
  chosen_spanish: y se hace culpable
  alternatives_spanish:
  - y incurre en culpa
  - y queda culpable
  lexicon: HALOT
  rationale: אָשֵׁם en este contexto legal denota responsabilidad/culpa adquirida. 'Se hace culpable' refleja ese paso de condición tras la impureza.
theological_decisions:
- issue: Impureza ritual versus pecado moral
  english_pob_reading: Render טָמֵא/טְמֵאָה as 'unclean' rather than 'defiled' or 'sinful.'
  chosen_spanish_reading: Traducir טָמֵא/טְמֵאָה como 'inmundo', no como 'defiled', ni como 'pecaminoso'.
  alternative_spanish_readings:
  - impuro
  - contaminado
  rationale: El pasaje trata de impureza ritual por contacto con cadáveres, no de maldad moral intrínseca. 'Inmundo' es un término bíblico claro en español; se evita 'pecaminoso' para no intensificar indebidamente el sentido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Coordenadas lógicas de la culpa
  english_pob_reading: and becomes guilty
  chosen_spanish_reading: y se hace culpable
  alternative_spanish_readings:
  - e incurre en culpa
  - y queda culpable
  rationale: אָשֵׁם señala responsabilidad legal o culpa incurrida. 'Se hace culpable' mantiene esa progresión sin convertir el enunciado en una acusación moral más fuerte de la que el texto exige.
  doctrine_reference: Translation philosophy §2, §3
- issue: Referencia del sujeto genérico
  english_pob_reading: Use 'person' for נֶפֶשׁ but retain 'him/he' in the subsequent clauses.
  chosen_spanish_reading: Usar 'persona' para נֶפֶשׁ y conservar 'él/le' en las cláusulas siguientes.
  alternative_spanish_readings:
  - usar construcción impersonal
  - repetir 'la persona' en todo el versículo
  rationale: '''Persona'' comunica el sujeto legal genérico, mientras que los pronombres masculinos del hebreo se reflejan con ''él/le'' sin forzar una reformulación ajena al texto.'
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; la concordancia general fue alta y el pasaje quedó estable. La versión española sigue ese estado estable, manteniendo las decisiones léxicas y teológicas documentadas en el rastro auditado.
  spanish_consistency_notes:
  - Se mantiene 'inmundo' como equivalente principal de טָמֵא/טְמֵאָה para conservar la categoría ritual bíblica.
  - Se traduce נִבְלָה con 'cadáver' en lugar de 'carroña' para evitar una connotación más peyorativa de la necesaria.
  - 'Se conserva la coordinación del hebreo con ''y'' para reflejar la secuencia legal: contacto, ocultamiento, estado de impureza y culpa.'
  - La formulación 'se hace culpable' sigue la lectura legal de אָשֵׁם y evita intensificar el juicio moral más allá del contexto de pureza.
