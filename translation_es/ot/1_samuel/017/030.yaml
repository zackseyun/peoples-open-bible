translation:
  language: es
  text: Entonces se apartó de él hacia otro y dijo lo mismo; y el pueblo le respondió como antes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el pueblo le respondió una palabra como la primera palabra»; es decir, le dieron la misma respuesta que antes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּב
  english_pob_choice: turned away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se volvió
  - giró
  lexicon: HALOT
  rationale: El verbo expresa un cambio físico de dirección desde el interlocutor anterior. «Se apartó» conserva el movimiento y la separación implícita en el contexto, con una naturalidad más fluida en español que una traducción más literal.
- source_word: מֵאֶצְלוֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - desde junto a él
  lexicon: HALOT
  rationale: La frase hebrea señala el punto de partida espacial junto a Eliab. «De él» mantiene la referencia directa y el español lo entiende con claridad sin sobrecargar la línea.
- source_word: אֶל מוּל אַחֵר
  english_pob_choice: toward another
  chosen_spanish: hacia otro
  alternatives_spanish:
  - a otro
  - hacia otra persona
  lexicon: HALOT
  rationale: מּוּל añade dirección o orientación hacia enfrente. «Hacia otro» preserva ese matiz direccional y sigue siendo idiomático en español.
- source_word: וַיֹּאמֶר כַּדָּבָר הַזֶּה
  english_pob_choice: said the same thing
  chosen_spanish: dijo la misma cosa
  alternatives_spanish:
  - dijo lo mismo
  - pronunció la misma palabra
  lexicon: HALOT
  rationale: כַּדָּבָר הַזֶּה remite al contenido repetido de la intervención anterior. «La misma cosa» reproduce con bastante literalidad la repetición de contenido; aunque menos elegante que «lo mismo», evita perder la fuerza semántica de דָּבָר como asunto o contenido dicho.
- source_word: וַיְשִׁבֻהוּ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - le dio respuesta
  lexicon: HALOT
  rationale: El hiphil de שוב puede funcionar como ‘responder’ en el sentido de devolver una réplica. «Le respondió» es la forma natural y fiel en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los presentes
  lexicon: HALOT
  rationale: En este contexto militar, הָעָם designa al grupo reunido. «El pueblo» conserva el sustantivo colectivo del hebreo y funciona bien en español bíblico actual.
- source_word: דָּבָר כַּדָּבָר הָרִאשׁוֹן
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - con la misma respuesta de antes
  - como la primera vez
  lexicon: HALOT
  rationale: La expresión literal habla de ‘una palabra como la primera palabra’, es decir, una respuesta repetida. «Como antes» comunica con naturalidad la equivalencia de respuesta que el texto subraya.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo WLC y coincide con la línea general del POB inglés auditado. Se conserva la repetición de sentido mediante «la misma cosa» y se explicita en nota la formulación literal de דָּבָר כַּדָּבָר הָרִאשׁוֹן, equivalente al pie inglés «a word like the first word».
  spanish_consistency_notes:
  - Se mantiene el tratamiento de אַחֵר como «otro» sin introducir especificación inexistente en el hebreo.
  - Se usa «pueblo» para הָעָם por coherencia con el colectivo presente en el pasaje, aunque «gente» o «presentes» serían posibles en español.
  - 'La nota reproduce la tensión entre literalidad y sentido: ‘palabra’ frente a ‘respuesta’, sin eliminarla.'
