review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la secuencia general del versículo, la falta de percepción y el cierre narrativo. Sin embargo, se aparta de la decisión auditada del POB en un punto importante: אֶל קִרְבֶּנָה en este contexto onírico fue resuelto deliberadamente como ''into their bellies'' para explicitar la imagen de vacas tragadas que entran en el interior de las otras vacas. ''En su interior'' debilita esa concreción contextual y contradice la razón léxica documentada. Además, el añadido ''cuando'' no corresponde al hebreo y no es necesario en español para resolver ambigüedad aquí.'
  spanish_quality_summary: 'El español es claro y fluido, pero ''Y cuando habían entrado...'' suena algo más interpretativo y pesado de lo necesario. Una redacción secuencial simple es más fiel y natural: ''Y entraron en su vientre...''. ''No se notó'' es aceptable, aunque ''no se supo'' o ''no era evidente'' serían también posibles; no requiere cambio obligatorio. El conjunto mejora si se mantiene la repetición hebrea con un término corporal claro y natural en español.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. La cuestión léxica central es קֶרֶב: en este contexto debe reflejar el interior corporal de las vacas, en línea con la decisión POB ''their bellies''. En español, ''vientre'' o ''vientres'' preserva mejor la imagen que ''interior''.'
  issues:
  - severity: high
    issue: '''en su interior'' no preserva la decisión contextual del POB para קֶרֶב'
    rationale: La auditoría inglesa documenta explícitamente que, en el contexto del sueño, la imagen debe hacerse concreta como 'bellies'. El español del borrador vuelve a una formulación más abstracta y por eso pierde fuerza imagética y se aleja de la justificación léxica aprobada.
  - severity: medium
    issue: El añadido 'cuando' introduce una subordinación temporal no presente en el hebreo
    rationale: Aunque puede sonar natural, el hebreo presenta secuencia narrativa simple. Aquí no hace falta reestructurar la cláusula; además, el historial de revisión inglesa terminó prefiriendo la forma simple sin 'when'.
  - severity: low
    issue: La nota al pie justifica evitar precisión anatómica, en tensión con la evidencia contextual
    rationale: La nota actual explica precisamente una opción que el expediente inglés descartó para este versículo. Conviene revisarla para reflejar que el español explicita la imagen del sueño por contexto.
  revised_spanish_text: Y entraron en su vientre[a], pero no se notó que habían entrado en su vientre, y su aspecto era malo, como al principio. Entonces desperté.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ''a su interior / en medio de ellas''. En el contexto del sueño, ''vientre'' hace explícita la imagen de que las vacas comidas habían entrado en el interior de las otras.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la expresión clave para alinearla con la decisión léxica documentada del POB: en este contexto, קֶרֶב debe expresarse de manera corporal concreta. También se elimina ''cuando'' para seguir más de cerca la secuencia narrativa hebrea. El resto del versículo se conserva porque es fiel y natural en español.'
