translation:
  language: es
  text: Un corredor corre al encuentro de otro corredor[a], y un mensajero al encuentro de otro mensajero, para decirle al rey de Babilonia que su ciudad ha sido capturada de extremo a extremo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Un corredor corre al encuentro de otro corredor, y un mensajero al encuentro de otro mensajero». El hebreo usa participios repetidos para dar sensación de urgencia y rápida sucesión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su ciudad ha sido tomada desde un extremo». La expresión hebrea puede indicar captura comenzando en una extremidad, aunque en contexto probablemente implica la caída de la ciudad de extremo a extremo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָץ / יָרוּץ
  english_pob_choice: Runner runs to meet runner
  chosen_spanish: Un corredor corre a encontrarse con otro corredor
  alternatives_spanish:
  - Un corredor corre hacia otro corredor
  - Corredor tras corredor corre al encuentro
  lexicon: HALOT
  rationale: El hebreo combina un participio nominal con un verbo de la misma raíz para crear rapidez y sucesión. En español, repetir la idea con «corre a encontrarse con» conserva la vivacidad sin sonar mecánico.
- source_word: לִקְרַאת
  english_pob_choice: meets / to meet
  chosen_spanish: a encontrarse con
  alternatives_spanish:
  - a encontrar
  - para encontrarse con
  lexicon: HALOT
  rationale: La expresión preposicional indica movimiento hacia un encuentro. «A encontrarse con» comunica bien esa direccionalidad en español natural.
- source_word: וּמַגִּיד ... מַגִּיד
  english_pob_choice: messenger ... messenger
  chosen_spanish: un mensajero ... otro mensajero
  alternatives_spanish:
  - un heraldo ... otro heraldo
  - uno que anuncia ... otro que anuncia
  lexicon: HALOT
  rationale: מַגִּיד es uno que anuncia o comunica noticias. «Mensajero» mantiene claridad y el tono de transmisión urgente de noticias.
- source_word: לְהַגִּיד
  english_pob_choice: to tell
  chosen_spanish: para decir
  alternatives_spanish:
  - para informar
  - para anunciar
  lexicon: HALOT
  rationale: «Para decir» es una solución directa y natural en español para el infinitivo final de propósito, sin cargar un matiz más técnico que el texto no exige.
- source_word: לְמֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey babilonio
  lexicon: HALOT
  rationale: El genitivo se conserva de manera transparente con «de Babilonia», manteniendo el destinatario de la noticia.
- source_word: נִלְכְּדָה
  english_pob_choice: has been captured
  chosen_spanish: ha sido capturada
  alternatives_spanish:
  - ha sido tomada
  - está capturada
  lexicon: HALOT
  rationale: El nifal de לכד expresa captura pasiva consumada. «Ha sido capturada» reproduce con fidelidad el hecho completado.
- source_word: עִירוֹ
  english_pob_choice: his city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - la ciudad de él
  - su capital
  lexicon: HALOT
  rationale: El sufijo pronominal debe conservarse; en español, «su ciudad» transmite la posesión de manera natural y directa.
- source_word: מִקָּצֶה
  english_pob_choice: from end to end
  chosen_spanish: de extremo a extremo
  alternatives_spanish:
  - desde un extremo
  - por completo
  lexicon: HALOT
  rationale: La expresión hebrea indica extensión desde un extremo. «De extremo a extremo» conserva el valor totalizante sin perder la posible imagen espacial.
translation_notes:
  revision_awareness: La revisión más reciente reforzó la literalidad del primer miembro al explicitar el verbo de movimiento («runs to meet») y mantuvo la estructura elíptica del segundo. La versión española conserva esa duplicación vivaz con dos miembros paralelos de corredor/mensajero, y retiene el cierre totalizante de «from end to end» como «de extremo a extremo».
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio geográfico y «rey de Babilonia» como genitivo transparente, sin sustituirlo por fórmulas eclesiásticas tradicionales.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni un equivalente directo en la forma dada.
  - «Mensajero» se usa por claridad narrativa; no se introduce «heraldo» en el texto principal para no endurecer el registro.
  - La pasiva compuesta «ha sido capturada» conserva mejor el valor de evento completado que una simple pasiva presente.
