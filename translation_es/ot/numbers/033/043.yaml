  text: Salieron de Punón y acamparon en Obot.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en camino
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa el avance al abandonar un campamento. En español, «salieron» comunica de forma natural ese movimiento de partida sin volverlo pesado o arcaizante.
- source_word: מִפּוּנֹן
  english_pob_choice: from Punon
  chosen_spanish: de Punón
  alternatives_spanish:
  - desde Punón
  lexicon: HALOT
  rationale: La preposición מִן indica origen o punto de partida. «De Punón» conserva ese valor de procedencia y mantiene el nombre propio transliterado según la política del proyecto.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en este contexto denota establecer campamento. «Acamparon» es claro y fiel; evita el tono más antiguo de «acamparon/encamparon» y preserva el sentido itinerante.
- source_word: בְּאֹבֹת
  english_pob_choice: at Oboth
  chosen_spanish: en Obot
  alternatives_spanish:
  - en Obot
  - a Obot
  lexicon: HALOT
  rationale: La preposición בְּ con un lugar de parada se puede rendir naturalmente en español con «en». El nombre propio se translitera como «Obot», ajustado a la ortografía española.
translation_notes:
  revision_awareness: 'El inglés POB optó por una equivalencia óptima muy estable: ''set out'' / ''camped'' / nombres transliterados. No hubo revisiones ni notas textuales; el español sigue esa misma línea sin añadir matices no presentes en el hebreo.'
  spanish_consistency_notes:
  - He mantenido la terminología narrativa de itinerario breve y sobria, en paralelo al patrón repetido de Números 33.
  - 'Los nombres propios se transliteran de manera consistente: Punón, Obot.'
  - No se usaron notas al pie porque el hebreo y el audit trail no presentan variantes ni tensiones léxicas relevantes en este versículo.
