translation:
  language: es
  text: Pero Absalón huyó y fue a Guesur[a], y estuvo allí tres años[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y Absalón fue a Guesur». La conjunción hebrea puede traducirse aquí como «y» o «pero» según el matiz narrativo.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y estuvo allí tres años»; también puede entenderse como «y permaneció allí tres años».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  english_pob_choice: But Absalom
  chosen_spanish: Pero Absalón
  alternatives_spanish:
  - Y Absalón
  lexicon: no entry number invented; narrative waw
  rationale: En contexto narrativo, ו puede marcar contraste o simple continuidad. «Pero» refleja la leve contraposición/resumen que ya asumió la POB en inglés; «Absalón» mantiene el nombre propio transliterado de forma estándar en español.
- source_word: בָּרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió corriendo
  lexicon: HALOT
  rationale: ברח expresa huida. «Huyó» es natural en español bíblico moderno y conserva la fuerza de fuga sin añadir matiz innecesario.
- source_word: וַ/יֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: הלך en secuencia narrativa se rinde con un verbo simple de movimiento. «Fue» mantiene la linealidad del relato y el paralelismo con el hebreo.
- source_word: גְּשׁוּר
  english_pob_choice: Geshur
  chosen_spanish: Guesur
  alternatives_spanish:
  - Geshur
  lexicon: topónimo bíblico
  rationale: Se adapta el topónimo a la fonética española con una grafía natural. «Guesur» evita una pronunciación marcadamente inglesa y sigue siendo reconocible.
- source_word: וַ/יְהִי שָׁם
  english_pob_choice: and he was there
  chosen_spanish: y estuvo allí
  alternatives_spanish:
  - y estaba allí
  - y permaneció allí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y fue/estuvo allí». «Estuvo allí» conserva la brevedad y el valor durativo del contexto sin forzar una paráfrasis.
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: three years
  chosen_spanish: tres años
  alternatives_spanish:
  - durante tres años
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma directa y estándar en español.
translation_notes:
  revision_awareness: La redacción española sigue el packet hebreo y la solución auditada en inglés, manteniendo el contraste narrativo posible de ו y la literalidad sobria de וַיְהִי שָׁם. Se corrigió la validación anterior anclando cada nota al texto con [a] y [b].
  spanish_consistency_notes:
  - 'Se conserva el nombre propio con transliteración española consistente: Absalón, Guesur.'
  - Se evita uniformar ו como «y» cuando el contexto permite contraste; aquí «pero» es compatible con la POB en inglés.
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
