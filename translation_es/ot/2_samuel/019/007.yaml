translation:
  language: es
  text: amar a los que te odian y odiar a los que te aman. Porque has dejado claro hoy[a] que comandantes y siervos no significan nada para ti; porque sé hoy que, si Absalón estuviera vivo y todos nosotros estuviéramos muertos hoy[b], entonces eso sería correcto ante tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «has declarado hoy que no hay para ti comandantes ni siervos». El modismo hebreo significa que no cuentan para nada en tu estimación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¡si Absalón estuviera vivo y todos nosotros estuviéramos muertos hoy!». La formulación de Joab es una acusación contrafactual aguda, no un reporte literal de las palabras de David.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - amar a
  - querer
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la acción que se le atribuye a David; en español, un infinitivo simple mantiene la fuerza verbal sin añadir una paráfrasis innecesaria.
- source_word: שֹׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - tus enemigos
  - los que te aborrecen
  lexicon: HALOT
  rationale: El participio sustantivado conserva el matiz verbal de 'odiar' mejor que el más interpretativo 'enemigos'.
- source_word: וְלִשְׂנֹא
  english_pob_choice: and to hate
  chosen_spanish: y odiar
  alternatives_spanish:
  - y a odiar
  - y odiándolos
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el infinitivo anterior y la simetría retórica del hebreo.
- source_word: אֹהֲבֶיךָ
  english_pob_choice: those who love you
  chosen_spanish: los que te aman
  alternatives_spanish:
  - tus amigos
  - tus partidarios
  lexicon: HALOT
  rationale: La forma participial también es sustantiva; 'los que te aman' preserva el contraste léxico con 'los que te odian'.
- source_word: הִגַּדְתָּ
  english_pob_choice: you have made it clear
  chosen_spanish: has dejado claro
  alternatives_spanish:
  - has declarado
  - has dicho
  lexicon: HALOT
  rationale: En este contexto Joab no solo informa de una declaración verbal, sino que reprende una conducta que ha mostrado públicamente una postura; 'has dejado claro' comunica bien ese valor idiomático.
- source_word: שָׂרִים
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - príncipes
  - oficiales
  lexicon: HALOT
  rationale: El contexto es militar y político; 'comandantes' reproduce la referencia concreta mejor que opciones más amplias o arcaizantes.
- source_word: וַעֲבָדִים
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - esclavos
  - sirvientes
  lexicon: HALOT
  rationale: Aquí el término no apunta primariamente a esclavitud chattel, sino a personas en servicio real; 'servidores' es natural en español y conserva el sentido funcional.
- source_word: אֵין לְךָ שָׂרִים וַעֲבָדִים
  english_pob_choice: your commanders and servants mean nothing to you
  chosen_spanish: comandantes y servidores no significan nada para ti
  alternatives_spanish:
  - no tienes comandantes ni servidores
  - no hay para ti comandantes ni servidores
  lexicon: HALOT
  rationale: 'Se conserva el carácter idiomático: no se afirma inexistencia ontológica, sino desprecio práctico o irrelevancia en la estimación de David.'
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - conozco
  lexicon: HALOT
  rationale: El perfecto hebreo funciona con fuerza presente en el discurso; 'sé' es el equivalente más natural y directo.
- source_word: לֹא אַבְשָׁלוֹם חַי וְכֻלָּנוּ הַיּוֹם מֵתִים
  english_pob_choice: if Absalom were alive and all of us were dead today
  chosen_spanish: si Absalón estuviera vivo y todos nosotros estuviéramos muertos hoy
  alternatives_spanish:
  - si solo Absalón estuviera vivo y todos nosotros muertos hoy
  - si Absalón viviera y todos nosotros muriéramos hoy
  lexicon: HALOT
  rationale: Aunque la cláusula va introducida por כי, el contexto exige un valor contrafactual; el subjuntivo imperfecto expresa bien la acusación implícita sin suavizarla.
- source_word: יָשָׁר בְּעֵינֶיךָ
  english_pob_choice: it would be right in your eyes
  chosen_spanish: sería recto a tus ojos
  alternatives_spanish:
  - sería justo a tus ojos
  - te parecería bien
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de lo 'recto' ante la valoración de alguien; 'a tus ojos' mantiene el idiomático bĕ-ʿênêkha con su color moral.
theological_decisions:
- issue: Valor contrafactual de la cláusula con כִּי y el tono acusatorio de Joab
  english_pob_reading: Or, 'if only Absalom were alive and all of us were dead today.' Joab's wording is a sharp counterfactual accusation, not a literal report of David's words.
  chosen_spanish_reading: si Absalón estuviera vivo y todos nosotros estuviéramos muertos hoy
  alternative_spanish_readings:
  - si solo Absalón estuviera vivo y todos nosotros muertos hoy
  - ¡ojalá Absalón estuviera vivo y todos nosotros muertos hoy!
  rationale: La traducción debe mantener el valor de reproche y la lógica contrafactual sin convertir la frase en una cita literal o atenuarla con una lectura meramente optativa.
  doctrine_reference: Hermenéutica del discurso narrativo; valor pragmático del contrafactual en contexto
- issue: Idiomática 'no significan nada para ti' frente a una forma más literal de inexistencia
  english_pob_reading: your commanders and servants mean nothing to you
  chosen_spanish_reading: comandantes y servidores no significan nada para ti
  alternative_spanish_readings:
  - no hay para ti comandantes ni servidores
  - tus comandantes y servidores no cuentan para ti
  rationale: 'Se preserva la tensión del hebreo: no se trata de negar que existan, sino de afirmar que, en la práctica, carecen de peso en la consideración del rey.'
  doctrine_reference: Semántica bíblica y uso idiomático del hebreo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que eliminó el posesivo explícito antes de 'commanders and servants' para acercarse mejor al hebreo. En español se reflejó esa misma ausencia mediante 'comandantes y servidores', sin 'tus'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando el texto lo exige; aquí no aparece el tetragrámaton.
  - Se prefirió 'comandantes' para שָׂרִים y 'servidores' para עֲבָדִים por el contexto cortesano-militar.
  - Se mantuvo el paralelismo verbal con infinitivos en la primera mitad del versículo.
  - La puntuación conserva el tono de reproche y la estructura causal del hebreo con 'Porque'.
