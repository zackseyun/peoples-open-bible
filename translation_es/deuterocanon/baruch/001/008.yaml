translation:
  language: es
  text: cuando recibió[a] los vasos[b] de la casa de Yahvé que habían sido sacados del templo, para devolverlos[c] a la tierra de Judá, el día diez de Siván —vasos de plata que Sedequías hijo de Josías, rey de Judá, había hecho—
  philosophy: optimal-equivalence
  footnotes:
