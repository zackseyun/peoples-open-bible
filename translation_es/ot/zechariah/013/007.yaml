base_translation:
  language: en
  yaml_path: translation/ot/zechariah/013/007.yaml
  text: Awake[a], O sword, against my shepherd, against the man who is my companion, declares Yahweh of Armies. Strike the shepherd, and the sheep will be scattered[c][b]; and I will turn my hand against the little ones.
  footnotes:
  - marker: a
    text: Or 'against the man who is my associate,' or possibly 'against the man who is my equal.' The Hebrew term denotes one closely associated with another.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will turn my hand upon/toward the little ones.' The idiom may imply action against them, or more generally renewed dealing with them.
    reason: alternative_reading
