base_translation:
  language: en
  yaml_path: translation/ot/hosea/013/015.yaml
  text: Though he may flourish among brothers[a], an east wind will come—the wind of Yahweh, rising from the wilderness—and his spring will dry up, and his fountain will be dried up[c][b]; it will plunder the treasury of every precious vessel.
  footnotes:
  - marker: a
    text: 'Or ''For he is fruitful among brothers.'' The Hebrew can be rendered more formally, but the context favors a concessive sense: despite Ephraim''s prosperity, judgment is coming.'
    reason: lexical_alternative
  - marker: b
    text: '''The wind of the LORD'' could also be rendered ''the breath of the LORD,'' but here ''wind'' fits the parallel with ''east wind'' and ''rising from the wilderness.'''
    reason: alternative_reading
  - marker: c
    text: Or 'he will plunder the treasury of every precious object.' The Hebrew subject may be understood as the east wind or, less likely, the personified Ephraim/attacker.
    reason: alternative_reading
