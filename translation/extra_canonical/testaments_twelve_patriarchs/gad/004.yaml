translation:
  text: Therefore guard yourselves[a], my children, from hatred, because it works lawlessness even against the Lord himself. For it does not want to hear the words of his commandments concerning love of one's neighbor, and it sins against God. For if a brother falls, it is eager at once to report it to everyone, and it hastens that he may be judged and punished and die. And if it is some slave, it brings accusations against him before his master, and in every distress it rejoices over him, if perhaps he may be put to death. For hatred works together with envy also against those who prosper; hearing of their success and seeing it, it is always weakened. Just as love would even make the dead alive and would call back those under sentence of death, so also hatred wants to kill the living, and it does not want those who have sinned only a little to live. For the spirit of hatred, through faintheartedness, works together with Satan in everything for the death of men; but the spirit of love, through longsuffering[c][b], works together with the law of God for the salvation of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it informs on him to his master.' The Greek expression can suggest hostile denunciation before an authority.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'those who have sinned only a little' may also be rendered 'those who have sinned in a small matter.'
    reason: lexical_alternative
  - marker: c
    text: '''Faintheartedness'' translates a term that can also suggest smallness of soul, discouragement, or cowardice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μῖσος
  chosen: hatred
  alternatives:
  - hate
  lexicon: LSJ
  rationale: Abstract noun retained as 'hatred' to preserve Gad's vice-theme as a governing power rather than a momentary feeling.
- source_word: ἀνομίαν ποιεῖ
  chosen: works lawlessness
  alternatives:
  - does lawlessness
  - commits lawlessness
  lexicon: LSJ
  rationale: The idiom literally means 'does lawlessness,' but 'works lawlessness' preserves the active, productive sense and the moral force of the vice.
- source_word: Κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Standard rendering for κύριος in a divine reference, matching project doctrine.
- source_word: λόγων ἐντολῶν
  chosen: the words of his commandments
  alternatives:
  - the commandments' words
  - his command-words
  lexicon: LSJ
  rationale: Keeps both nouns visible rather than collapsing to simply 'his commandments,' since the Greek stresses refusal to hear the spoken instruction.
- source_word: ἀγάπης τοῦ πλησίον
  chosen: love of one’s neighbor
  alternatives:
  - love for the neighbor
  - neighbor-love
  lexicon: LSJ
  rationale: Preserves the ethical command's object clearly and echoes biblical love-of-neighbor language without over-paraphrase.
- source_word: σπουδάζει
  chosen: is eager
  alternatives:
  - makes haste
  - is zealous
  lexicon: LSJ
  rationale: Conveys the vice's active readiness in context of malicious reporting.
- source_word: ἀναγγεῖλαι τοῖς πᾶσι
  chosen: to report it to everyone
  alternatives:
  - to announce it to all
  lexicon: LSJ
  rationale: Idiomatic English for public disclosure of another's fall, preserving the breadth of πᾶσι.
- source_word: κριθεὶς καὶ κολασθεὶς
  chosen: be judged and punished
  alternatives:
  - be condemned and chastised
  lexicon: LSJ
  rationale: Straightforward judicial sequence in readable English.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  lexicon: LSJ
  rationale: Per project doctrine, 'slave' is preferred where bonded status before a master is explicit and socially salient.
- source_word: συμβαλεῖ αὐτὸν πρὸς τὸν κύριον αὐτοῦ
  chosen: it brings accusations against him before his master
  alternatives:
  - it sets him against his master
  - it informs on him to his master
  lexicon: LSJ
  rationale: The context is hostile denunciation leading to punishment; this rendering makes the adversarial sense explicit without straying far from the Greek.
- source_word: ἐπιχαίρει
  chosen: rejoices over him
  alternatives:
  - gloats over him
  lexicon: LSJ
  rationale: Retains the morally ugly delight in another's suffering; 'gloats' was possible but slightly more interpretive.
- source_word: φθόνῳ συνεργεῖ τὸ μῖσος
  chosen: hatred works together with envy
  alternatives:
  - hatred cooperates with envy
  lexicon: LSJ
  rationale: Preserves the personified alliance of vices, important to the chapter's moral psychology.
- source_word: εὐπραγούντων
  chosen: those who prosper
  alternatives:
  - those who do well
  - the successful
  lexicon: LSJ
  rationale: Captures both good fortune and successful condition in context of envy.
- source_word: ἐν προκοπῇ
  chosen: their success
  alternatives:
  - their progress
  - advancement
  lexicon: LSJ
  rationale: Contextually refers to others' advancement, which hatred cannot bear to hear or see.
- source_word: ἀσθενεῖ
  chosen: is always weakened
  alternatives:
  - grows sick
  - is enfeebled
  lexicon: LSJ
  rationale: Keeps the metaphor of inner wasting without over-literalizing into physical illness.
- source_word: θέλει ζωοποιῆσαι
  chosen: would even make the dead alive
  alternatives:
  - wants to give life to the dead
  - desires to revive the dead
  lexicon: LSJ
  rationale: The volitional θέλει is preserved with 'would,' expressing love's disposition rather than asserting a literal miracle.
- source_word: ἀνακαλέσασθαι
  chosen: would call back
  alternatives:
  - would recall
  - would summon back
  lexicon: LSJ
  rationale: Fits the parallel image of restoring those already under sentence of death.
- source_word: τοὺς ἐν ὀλίγῳ ἁμαρτήσαντας
  chosen: those who have sinned only a little
  alternatives:
  - those who have sinned in a small matter
  - those who have committed a minor sin
  lexicon: LSJ
  rationale: 'Preserves the comparative moral point: hatred shows no mercy even for slight offense.'
- source_word: ὀλιγοψυχίας
  chosen: faintheartedness
  alternatives:
  - smallness of soul
  - cowardice
  - despondency
  lexicon: LSJ
  rationale: A difficult term; 'faintheartedness' best captures diminished soul-strength that enables hatred's alliance with Satan.
- source_word: μακροθυμίᾳ
  chosen: longsuffering
  alternatives:
  - patience
  - forbearance
  lexicon: LSJ
  rationale: Chosen for elevated ethical register and to preserve the virtue's weight in paraenetic literature.
- source_word: τῷ νόμῳ τοῦ Θεοῦ
  chosen: the law of God
  alternatives:
  - God's law
  lexicon: LSJ
  rationale: Formal phrasing suits the testamentary exhortation and keeps the dative construction's object clear.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: LSJ
  rationale: Retains the strong soteriological term in contrast with 'death of men' in the preceding clause.
