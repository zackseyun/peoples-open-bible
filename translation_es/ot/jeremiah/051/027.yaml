review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la secuencia imperativa y los referentes del hebreo, y conserva bien los nombres propios y la imagen final. Sin embargo, hay desajustes importantes con el sentido documentado del POB en dos puntos: «en la tierra» debilita el valor contextual de בָּאָרֶץ como «en la tierra/el país» en sentido regional-militar, y sobre todo «den aviso contra ella de los reinos...» no comunica bien הַשְׁמִיעוּ עָלֶיהָ מַמְלְכוֹת, que en contexto significa convocar/proclamar/summonar a esos reinos contra Babilonia. También «shofar» se aparta sin necesidad de la decisión inglesa «trumpet» y resulta menos natural para lectura bíblica general en español.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta cierta rigidez y una construcción poco idiomática en «den aviso contra ella de los reinos...». «Toquen el shofar» suena marcado y menos ampliamente legible que «toquen la trompeta». «Traigan caballos» es aceptable, aunque «hagan avanzar caballos» o «hagan subir caballos» sería más cercano; no obstante puede mantenerse por naturalidad. La puntuación y el registro general son adecuados.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales necesitan mejor alineación con el expediente inglés: שׁוֹפָר debe seguir normalmente «trompeta» salvo razón fuerte; הַשְׁמִיעוּ debe reflejar convocatoria militar, no mero aviso. «Mariscal» para טִפְסָר es aceptable con nota. «Consagren naciones contra ella» está bien y preserva la nota de guerra sacral.'
  issues:
  - severity: medium
    issue: «en la tierra» para בָּאָרֶץ
    rationale: Aunque posible, en este contexto militar el expediente inglés favorece «in the land» como región/territorio, no «tierra» en sentido amplio. «En el país» o «en la tierra» con nota sería mejor; para español bíblico general «en el país» suena más contextual.
  - severity: high
    issue: «den aviso contra ella de los reinos...» no refleja bien הַשְׁמִיעוּ עָלֶיהָ מַמְלְכוֹת
    rationale: 'La construcción española es poco natural y cambia la fuerza del mandato. El hebreo, según la auditoría, introduce a los reinos como fuerzas convocadas: «convoquen contra ella a los reinos...» o «hagan oír contra ella a los reinos...».'
  - severity: medium
    issue: «shofar» reduce la legibilidad y se aparta de la decisión POB documentada
    rationale: El expediente eligió «blow a trumpet», no una transliteración cultural. En español eclesial amplio, «trompeta» es más natural y suficiente para el valor de señal bélica.
  - severity: low
    issue: Orden de notas b/c/d no corresponde limpiamente a sus anclajes semánticos
    rationale: La nota sobre «Consagren naciones...» no está anclada en esa frase, y la nota de «langostas erizadas» queda bien, pero conviene alinear marcadores con sus palabras pertinentes para evitar confusión.
