translation:
  language: es
  text: Pero si el sacerdote lo examina, y he aquí, la infección no se ha extendido en la prenda, o en la urdimbre, o en la trama[a], o en cualquier artículo de cuero,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en el tejido" para la parte transversal del tejido; tanto "trama" como esta alternativa se refieren a los hilos cruzados en una tela tejida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: Conserva la continuidad condicional del procedimiento ritual y el matiz de contraste que aporta el inglés "But if". En español, "Pero si" suena natural y mantiene esa transición.
- source_word: יִרְאֶה
  english_pob_choice: examines
  chosen_spanish: examina
  alternatives_spanish:
  - ve
  - mira
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "ve", en un contexto sacerdotal de inspección ritual "examina" transmite mejor la acción oficial de evaluación sin perder fidelidad al sentido.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: '"Sacerdote" es el equivalente directo y claro en español para el funcionario ritual del pasaje.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: Mantiene el marcador discursivo que llama la atención sobre el resultado de la inspección, en una forma idiomática y reverente en español bíblico.
- source_word: לֹא פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no se ha propagado
  - no ha avanzado
  lexicon: HALOT
  rationale: '"Extenderse" comunica con naturalidad la idea de propagación de una afección o mancha; preserva la imagen del crecimiento del daño sin introducir una interpretación médica excesiva.'
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la afección
  - la plaga
  - la mancha
  lexicon: HALOT
  rationale: Sigue la decisión inglesa de usar un término accesible que evita el arcaísmo de "plaga" y no precisa una diagnosis moderna; "infección" funciona bien en español para el estado afectado del texto.
- source_word: בַּבֶּגֶד
  english_pob_choice: in the garment
  chosen_spanish: en la prenda
  alternatives_spanish:
  - en el vestido
  - en la ropa
  lexicon: HALOT
  rationale: '"Prenda" es natural en español para el objeto textil general del pasaje y evita la posible restricción de "vestido".'
- source_word: בַשְּׁתִי
  english_pob_choice: in the warp
  chosen_spanish: en la urdimbre
  alternatives_spanish:
  - en el tejido longitudinal
  - en la trama longitudinal
  lexicon: HALOT
  rationale: Término técnico textil preciso para los hilos longitudinales; preserva la exactitud del original y del audit trail inglés.
- source_word: בָעֵרֶב
  english_pob_choice: in the woof
  chosen_spanish: en la trama
  alternatives_spanish:
  - en la trama transversal
  - en la weft
  lexicon: HALOT
  rationale: '"Trama" es el término técnico español más corriente para los hilos transversales. Aunque el inglés POB conserva "woof" con nota alternativa, en español "trama" comunica la misma relación técnica con mayor claridad.'
- source_word: בְּכָל כְּלִי עוֹר
  english_pob_choice: in any article of leather
  chosen_spanish: en cualquier artículo de cuero
  alternatives_spanish:
  - en cualquier objeto de cuero
  - en cualquier utensilio de cuero
  lexicon: HALOT
  rationale: '"Artículo de cuero" sigue de cerca el valor general de כְּלִי como objeto manufacturado y traduce עוֹר con el material más natural en español moderno. "Cuero" resulta más idiomático que "piel" en este contexto de objetos hechos.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el testimonio hebreo y con la traducción inglesa auditada; no se detectaron revisiones aplicadas en el registro de origen, y la versión española sigue esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa "sacerdote" por tratarse de la función ritual de inspección descrita en Levítico.
  - 'Los tecnicismos textiles se conservaron con equivalentes españoles estándar: "urdimbre" y "trama".'
  - '"Infección" refleja la decisión inglesa de evitar "plaga" como término demasiado amplio o arcaico.'
