lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. En español, «Y ... dijo» conserva esa progresión de forma natural y sobria, sin sobrecargar el tono narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino del Tetragrámaton: «Yahvé» mantiene el nombre propio en lugar de sustituirlo por un título. «SEÑOR» ocultaría el nombre; «Jehová» no corresponde al estándar del proyecto.'
- source_word: הֲהֵיטֵב
  english_pob_choice: Is it right
  chosen_spanish: ¿Es correcto...?
  alternatives_spanish:
  - ¿Haces bien...?
  - ¿Es bueno...?
  - ¿Es apropiado...?
  lexicon: HALOT
  rationale: La forma interrogativa con הֵיטֵב expresa evaluación de conveniencia o rectitud moral. «¿Es correcto...?» comunica esa fuerza valorativa en español natural y fiel.
- source_word: חָרָה
  english_pob_choice: to be angry
  chosen_spanish: enojes
  alternatives_spanish:
  - airarte
  - enfadarte
  - ponerte airado
  lexicon: HALOT
  rationale: En este giro idiomático חרה significa ira. «Enojes» transmite el sentido idiomático de manera clara y contemporánea; «airarte» es posible, pero menos neutral en el habla amplia.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: El ל con sufijo de 2.ª persona marca al destinatario implicado en la pregunta. En español, el dativo/clítico «te» hace la frase idiomática y conserva la referencia directa a la persona interpelada.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título. «Yahvé» preserva esa distinción y sigue la convención del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la pregunta הֲהֵיטֵב חָרָה לָךְ
  english_pob_reading: 'A question of moral/propriety evaluation: ''Is it right for you to be angry?'''
  chosen_spanish_reading: 'Una pregunta de evaluación moral/propiamente dicha: «¿Es correcto que te enojes?»'
  alternative_spanish_readings:
  - ¿Haces bien en enojarte?
  - ¿Es bueno que te enojes?
  - ¿Es apropiado que te enojes?
  rationale: La pregunta no solo constata emoción, sino que evalúa si la ira de Jonás es justificable o adecuada. «¿Es correcto...?» conserva la censura implícita sin añadir contenido ajeno al hebreo.
  doctrine_reference: 'DOCTRINE.md: Idioms and evaluative questions — propriety/rightness questions'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ningún cambio sustantivo en la revisión más reciente; se mantiene la solución óptima ya aprobada, con una nota de alternativa formal equivalente para el matiz de הֲהֵיטֵב.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se traduce la pregunta con un adjetivo evaluativo («correcto») para reflejar el juicio implícito del hebreo.
  - «Enojes» se usa por naturalidad moderna; no introduce un matiz más fuerte que el de la ira idiomática del original.
  - La nota al pie preserva la alternativa más formal que el audito inglés también documenta.
