translation:
  language: es
  text: Cuando la asna[a] vio al ángel[b] de Yahvé, se echó debajo de Balaam. Entonces Balaam se enojó y golpeó a la asna con su bastón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la asna», es decir, una hembra de asno; el texto principal conserva ese matiz de sexo con «asna».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «el mensajero de Yahvé»; aquí se prefiere «ángel» porque el contexto describe un ser sobrenatural.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  english_pob_choice: the donkey
  chosen_spanish: la asna
  alternatives_spanish:
  - la burra
  - la hembra del asno
  - el asno
  lexicon: HALOT
  rationale: אָתוֹן designa específicamente una hembra de asno. En español, «asna» conserva esa precisión de sexo y sigue siendo comprensible en un registro bíblico digno; «burra» es más coloquial, y «la hembra del asno» resulta explicativo pero pesado.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yahveh
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «mensajero» o «ángel». En este contexto narrativo se trata de un ser sobrenatural, por lo que «ángel» comunica mejor el sentido. El nombre divino se vierte «Yahvé» según el criterio terminológico del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio divino «Yahvé», conforme al estándar del proyecto y a la decisión teológica documentada en la fuente inglesa.
- source_word: וַתִּרְבַּץ
  english_pob_choice: she lay down
  chosen_spanish: se echó
  alternatives_spanish:
  - se tendió
  - se acostó
  - se agachó
  lexicon: HALOT
  rationale: רבץ puede expresar echarse, echarse al suelo o encogerse/reclinarse. «Se echó» es natural en español y transmite bien la caída de la asna bajo su jinete sin imponer una imagen demasiado específica.
- source_word: תַּחַת בִּלְעָם
  english_pob_choice: under Balaam
  chosen_spanish: debajo de Balaam
  alternatives_spanish:
  - bajo Balaam
  - debajo de él
  lexicon: HALOT
  rationale: תחת indica posición inferior o debajo. «Debajo de Balaam» mantiene la relación espacial de forma clara en español, y evita introducir ambigüedad sobre el movimiento del animal.
- source_word: וַיִּחַר אַף בִּלְעָם
  english_pob_choice: Then Balaam became angry
  chosen_spanish: Entonces Balaam se enojó
  alternatives_spanish:
  - Entonces se encendió la ira de Balaam
  - Entonces Balaam se enfureció
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente alude al ardor de la ira. «Se enojó» conserva el sentido sin forzar una imagen demasiado literal; «se enfureció» intensifica más de lo que el contexto exige.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - pegó
  - hirió
  - azotó
  lexicon: HALOT
  rationale: נכה es un verbo amplio de golpear/pegar. Aquí no hay indicio de lesión grave; «golpeó» es directo y natural en español. «Azotó» podría sugerir un instrumento distinto o una violencia más técnica.
- source_word: בַּמַּקֵּל
  english_pob_choice: with his staff
  chosen_spanish: con su bastón
  alternatives_spanish:
  - con su vara
  - con su palo
  - con su cayado
  lexicon: HALOT
  rationale: מַקֵּל puede designar bastón, vara o palo. «Bastón» funciona bien en español contemporáneo para un objeto de viaje o apoyo. Se evita «cayado» por su matiz pastoral más específico.
theological_decisions:
- issue: Nombre divino יְהוָה en una frase con מַלְאַךְ
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  rationale: Se mantiene el nombre propio divino «Yahvé» en la combinación genitiva porque el texto hebreo nombra directamente a יְהוָה. Aunque «mensajero» es posible léxicamente, el contexto narrativo favorece «ángel» como ser sobrenatural.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La fuente inglesa no registra cambios recientes ni revisiones aplicadas para este versículo; el pasaje muestra acuerdo alto en la auditoría y se conserva su lectura principal sin modificaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en línea con el estándar del proyecto.
  - Se prefirió «asna» para reflejar el femenino explícito de אָתוֹן, aunque el inglés usa «donkey» en el texto principal.
  - «Ángel» se conserva por el contexto sobrenatural; no se rebaja a «mensajero» en el texto principal.
  - «Se echó» y «debajo de» conservan la escena con naturalidad española sin perder la relación espacial del hebreo.
