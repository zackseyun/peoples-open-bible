translation:
  language: es
  text: Aún los chacales ofrecen el pecho[a]; amamantan a sus crías. La hija de mi pueblo se ha vuelto cruel[b], como las avestruces en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como ‘monstruos marinos’ o ‘dragones’ para תנין; aquí se prefiere ‘chacales’ porque el verso describe el amamantamiento de sus crías, lo cual encaja mejor con una comparación de animales terrestres.
    reason: lexical_alternative
  - marker: b
    text: O ‘como búhos en el desierto’; el hebreo עֲנִים se entiende tradicionalmente como ‘avestruces’, especialmente a la luz de Job 39:13–17.
    reason: lexical_alternative
lexical_decisions:
- source_word: תנין
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - monstruos marinos
  - dragones
  lexicon: HALOT
  rationale: El contexto de amamantar y el contraste con criaturas terrestres favorecen un animal del desierto/tierra; ‘chacales’ conserva la decisión léxica de la POB inglesa y funciona naturalmente en español.
- source_word: חָלְצוּ שַׁד
  english_pob_choice: offer the breast
  chosen_spanish: ofrecen el pecho
  alternatives_spanish:
  - sacan el pecho
  - desnudan el pecho
  lexicon: HALOT
  rationale: La imagen concreta es la de presentar/exponer el pecho para lactar. ‘Ofrecen el pecho’ suena natural en español y mantiene la idea de dar de mamar sin volverla más explícita de lo que exige el hebreo.
- source_word: הֵינִיקוּ
  english_pob_choice: they nurse
  chosen_spanish: amamantan
  alternatives_spanish:
  - dan de mamar
  - crían
  lexicon: HALOT
  rationale: El hiphil expresa hacer succionar o dar de mamar. ‘Amamantan’ es claro y conserva el acto materno de alimentar a las crías.
- source_word: גּוּרֵיהֶן
  english_pob_choice: their young
  chosen_spanish: sus crías
  alternatives_spanish:
  - sus jóvenes
  - sus cachorros
  lexicon: HALOT
  rationale: ‘Crías’ es amplio y natural para animales en poesía bíblica, sin especificar una especie concreta más allá de lo que el hebreo permite.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo querido
  - la hija de mi nación
  lexicon: HALOT
  rationale: Se conserva la personificación poética del colectivo como ‘hija’, que transmite el tono afectivo y profético del hebreo.
- source_word: לְאַכְזָר
  english_pob_choice: has become cruel
  chosen_spanish: se ha vuelto cruel
  alternatives_spanish:
  - es cruel
  - ha llegado a ser cruel
  lexicon: HALOT
  rationale: El lamed con adjetivo expresa un estado resultante; ‘se ha vuelto cruel’ comunica bien la idea de deterioro o cambio de condición.
- source_word: עֲנִים
  english_pob_choice: ostriches
  chosen_spanish: avestruces
  alternatives_spanish:
  - búhos
  - lechuzas
  lexicon: HALOT
  rationale: La tradición léxica y el paralelo con Job 39:13–17 apoyan ‘avestruces’. En español es la opción más reconocible y coherente con el trasfondo poético.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: ‘Desierto’ comunica bien el entorno árido del contraste, aunque ‘wilderness’ podría ser ‘desierto’ o ‘yermo’; aquí la elección preserva la imagen de un lugar inhóspito y seco.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido estabilizado por la última revisión inglesa: ‘offer the breast’ se refleja en ‘ofrecen el pecho’, evitando un calco áspero, y se mantiene la preferencia por ‘jackals’/‘ostriches’ con apoyo contextual y léxico.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del versículo porque no aparece el nombre divino en el hebreo de esta línea.
  - ‘cruel’ se tradujo con el matiz de cambio de estado (‘se ha vuelto cruel’) para respetar la construcción hebrea.
  - Se evitó ‘siempre/ahora’ u otros añadidos interpretativos que no están en el texto fuente.
