id: 1JN.5.1
reference: 1 John 5:1
source:
  edition: SBLGNT
  text: Πᾶς ὁ πιστεύων ὅτι Ἰησοῦς ἐστιν ὁ χριστὸς ἐκ τοῦ θεοῦ γεγέννηται, καὶ πᾶς ὁ ἀγαπῶν τὸν γεννήσαντα ἀγαπᾷ ⸀καὶ τὸν γεγεννημένον ἐξ αὐτοῦ.
translation:
  text: Everyone who believes that Jesus is the Messiah has been born of God[b][a], and everyone who loves the one who fathered him also loves the one born of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or, 'the one who begot him ... the one begotten of him.' The Greek uses forms of the same verb throughout this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ πιστεύων
  chosen: Everyone who believes
  alternatives:
  - Whoever believes
  - Every one who believes
  lexicon: BDAG
  rationale: The articular present participle has a generic, substantival force. 'Everyone who believes' is natural modern English and preserves the ongoing/generic sense without unnecessary stiffness.
- source_word: ὅτι Ἰησοῦς ἐστιν ὁ χριστός
  chosen: that Jesus is the Messiah
  alternatives:
  - that Jesus is the Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like designation. Per doctrine, title usage is translated as 'Messiah' to preserve the Hebraic messianic sense.
- source_word: ἐκ τοῦ θεοῦ γεγέννηται
  chosen: has been born of God
  alternatives:
  - has been begotten by God
  - is born of God
  lexicon: BDAG
  rationale: The perfect passive indicates a completed act with abiding result. 'Has been born of God' preserves Johannine new-birth language in idiomatic English better than the more wooden 'begotten,' while retaining the divine source marked by ἐκ.
- source_word: πᾶς ὁ ἀγαπῶν
  chosen: everyone who loves
  alternatives:
  - everyone loving
  - whoever loves
  lexicon: BDAG
  rationale: Again, the articular present participle is generic/substantival. 'Everyone who loves' is clear and consistent with the first clause.
- source_word: τὸν γεννήσαντα
  chosen: the one who fathered him
  alternatives:
  - the one who begot him
  - the Father
  - the one who gave him birth
  lexicon: BDAG
  rationale: The aorist participle of γεννάω here refers to God as the begetter. Because the paired phrase later uses 'the one born of him,' rendering this term with explicit paternal force helps preserve the relational parallel in English. 'The Father' would be interpretive beyond the lexical form; 'gave him birth' would suggest maternal imagery not intended by the masculine participle and context.
- source_word: ἀγαπᾷ
  chosen: also loves
  alternatives:
  - loves also
  lexicon: BDAG
  rationale: καί before the object naturally yields the sense 'also loves' in English, linking love for God with love for the one begotten by him.
- source_word: τὸν γεγεννημένον ἐξ αὐτοῦ
  chosen: the one born of him
  alternatives:
  - his child
  - the one begotten of him
  lexicon: BDAG
  rationale: The perfect passive participle parallels γεγέννηται earlier and refers to the person generated from God. 'The one born of him' keeps the verbal connection visible; 'his child' is smoother but less formally tied to the Greek wording.
- source_word: ἐξ αὐτοῦ
  chosen: of him
  alternatives:
  - from him
  lexicon: BDAG
  rationale: Both are possible for ἐκ/ἐξ. 'Of him' fits established Johannine English ('born of God') and preserves the conceptual parallel with the earlier clause.
