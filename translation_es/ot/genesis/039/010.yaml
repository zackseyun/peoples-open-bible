translation:
  language: es
  text: Y sucedió[a] que, como ella le hablaba a Yosef día tras día, él no le hizo caso, para acostarse junto a ella ni para estar con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acostarse con ella». El hebreo puede llevar un sentido sexual; «acostarse junto a ella» preserva el matiz literal mientras permite que «estar con ella» conserve su propio peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo desarrollo en la historia. «Y sucedió» conserva esa función discursiva sin sonar arcaico, y es natural en español bíblico contemporáneo.
- source_word: כְּדַבְּרָהּ
  english_pob_choice: as she spoke
  chosen_spanish: como ella le hablaba
  alternatives_spanish:
  - cuando ella le hablaba
  - mientras ella le hablaba
  lexicon: HALOT
  rationale: El valor temporal de la construcción se puede expresar bien con «como» en español bíblico; el contexto de insistencia se completa con «día tras día».
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: Yosef
  alternatives_spanish:
  - José
  lexicon: convención onomástica del proyecto
  rationale: Se conserva la transliteración directa del nombre hebreo, conforme a la práctica del proyecto y al auditable vínculo con la forma מקור.
- source_word: יוֹם יוֹם
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - todos los días
  lexicon: HALOT
  rationale: La repetición expresa insistencia continua. «Día tras día» reproduce esa fuerza iterativa con buena naturalidad en español.
- source_word: שָׁמַע אֵלֶיהָ
  english_pob_choice: did not listen to her
  chosen_spanish: no la escuchó
  alternatives_spanish:
  - no le hizo caso
  - no la atendió
  lexicon: HALOT
  rationale: שמַע con אֶל puede significar oír/escuchar y también atender o obedecer según el contexto. Aquí «no la escuchó» mantiene la relación verbal básica y deja clara la negativa a acceder a su petición.
- source_word: לִשְׁכַּב אֶצְלָהּ
  english_pob_choice: to lie beside her
  chosen_spanish: para acostarse junto a ella
  alternatives_spanish:
  - para yacer junto a ella
  - para dormir junto a ella
  - para acostarse con ella
  lexicon: HALOT
  rationale: Se elige una traducción espacialmente literal que preserve la diferenciación que el POB inglés hace entre este miembro y el siguiente. «Acostarse junto a ella» evita colapsar de entrada el posible matiz sexual y mantiene la tensión lexical del hebreo.
- source_word: לִהְיוֹת עִמָּהּ
  english_pob_choice: to be with her
  chosen_spanish: para estar con ella
  alternatives_spanish:
  - para permanecer con ella
  - para acompañarla
  lexicon: HALOT
  rationale: היה עם tiene el sentido amplio de estar con alguien. «Para estar con ella» conserva esa amplitud y la coordinación con la frase anterior, sin forzar una equivalencia exclusivamente sexual.
theological_decisions:
- issue: El posible matiz sexual de «acostarse junto a ella» frente a «estar con ella»
  english_pob_reading: The Hebrew can carry a sexual sense; 'to lie beside her' preserves the wording while allowing the following phrase, 'to be with her,' to retain its own force.
  chosen_spanish_reading: «Acostarse junto a ella» conserva el valor más literal y espacial de la primera cláusula, mientras «para estar con ella» mantiene la amplitud de la segunda.
  alternative_spanish_readings:
  - «acostarse con ella» y «estar con ella»
  - «yacer con ella» y «permanecer con ella»
  rationale: El hebreo distingue dos expresiones relacionadas pero no idénticas. La primera puede insinuar contacto sexual, pero el paralelo posterior amplía la negativa más allá del acto mismo. La redacción española mantiene esa tensión en lugar de fusionarla.
  doctrine_reference: Génesis 39:10; observación lexical sobre שׁכב y היה עם en contexto narrativo
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y el pass más reciente, que no requirió cambios. La versión española sigue de cerca las decisiones léxicas ya justificadas para וַיְהִי, כְּדַבְּרָהּ, יוֹם יוֹם, שָׁמַע אֵלֶיהָ, לִשְׁכַּב אֶצְלָהּ y לִהְיוֹת עִמָּהּ, manteniendo la distinción entre las dos últimas cláusulas.
  spanish_consistency_notes:
  - Se usa «Yosef» conforme a la convención del proyecto para nombres hebreos.
  - Se mantiene un español moderno y digno, sin calcos excesivamente duros.
  - La nota[a] se ancla en «acostarse junto a ella» para reflejar la alternativa léxica documentada.
  - No se introduce vocabulario teológico ajeno al pasaje; la tensión semántica del hebreo queda preservada.
