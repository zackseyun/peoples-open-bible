    rationale: En el borrador, [b] aparece tras ‘Nilo’, pero la nota explica la alternativa de toda la expresión ‘todo lo sembrado por el Nilo’. Conviene mover el marcador a ‘sembrado’ o al sintagma completo para evitar ambigüedad.
