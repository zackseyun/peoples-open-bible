id: NUM.7.2
reference: Numbers 7:2
source:
  edition: WLC
  text: וַ/יַּקְרִ֨יבוּ֙ נְשִׂיאֵ֣י יִשְׂרָאֵ֔ל רָאשֵׁ֖י בֵּ֣ית אֲבֹתָ֑/ם הֵ֚ם נְשִׂיאֵ֣י הַ/מַּטֹּ֔ת הֵ֥ם הָ/עֹמְדִ֖ים עַל הַ/פְּקֻדִֽים־׃
translation:
  text: Then the leaders of Israel[a], the heads of their fathers’ houses, brought offerings. They were the leaders of the tribes[c][b]; they were the ones standing over those who were counted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented' instead of 'brought offerings'; the Hebrew verb literally means 'brought near' and in this context refers to presenting dedication gifts.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family units or clans within Israel.'
    reason: cultural_note
  - marker: c
    text: Or 'they were those in charge of the counted men' / 'the mustered men.' The Hebrew expression refers to those overseeing the census-registered group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  chosen: brought offerings
  alternatives:
  - presented
  - brought near
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present, especially in sacrificial/dedication contexts. Because the immediate context in Numbers 7 concerns dedication gifts, 'brought offerings' makes the implied object explicit in natural English without over-paraphrasing. 'Presented' is possible, but 'brought offerings' better preserves the cultic/dedication sense.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the chiefs of Israel
  - the princes of Israel
  lexicon: HALOT
  rationale: נָשִׂיא denotes a lifted-up person, i.e., leader/chieftain. 'Leaders' is clear modern English and avoids the archaic or potentially misleading 'princes,' since these are tribal heads rather than royal sons.
- source_word: רָאשֵׁי בֵּית אֲבֹתָם
  chosen: the heads of their fathers’ houses
  alternatives:
  - the heads of their ancestral houses
  - the heads of their family houses
  lexicon: HALOT
  rationale: This phrase is a standard clan/kinship designation. 'Fathers’ houses' is a fairly literal rendering that preserves the patriarchal household structure of the Hebrew. 'Ancestral houses' is smoother but slightly interpretive; the chosen rendering keeps the source texture.
- source_word: הֵם נְשִׂיאֵי הַמַּטֹּת
  chosen: They were the leaders of the tribes
  alternatives:
  - They were the chiefs of the staffs/tribes
  - They were the leaders of the tribal groups
  lexicon: HALOT
  rationale: מַטּוֹת literally means 'staffs,' but in this context it is the conventional term for tribes. Rendering it as 'tribes' communicates the social-political referent rather than the metaphorical image.
- source_word: הֵם הָעֹמְדִים
  chosen: they were the ones standing over
  alternatives:
  - they were the ones in charge of
  - they were those who stood over
  lexicon: HALOT
  rationale: The participle of עמד with עַל can denote standing over, attending to, or being in charge of. The chosen wording preserves the concrete metaphor while still making sense in English. A more idiomatic 'in charge of' is possible but less formally transparent.
- source_word: הַפְּקֻדִים
  chosen: those who were counted
  alternatives:
  - the enrolled men
  - the mustered men
  - the numbered ones
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense, this refers to those registered or counted in the census. 'Those who were counted' is transparent and broad enough to preserve the census/mustering background. 'Mustered men' is plausible but imports a military nuance more explicitly than the Hebrew requires in this verse.
