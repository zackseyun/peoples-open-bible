translation:
  language: es
  text: 'Pero él dijo[a]: «Más bien, bienaventurados los que oyen la palabra de Dios y la guardan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En verdad, bienaventurados…» o «Sí, más bien, bienaventurados…». La partícula griega puede afirmar y a la vez redirigir el énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς δὲ εἶπεν
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: BDAG
  rationale: δὲ es una transición suave con matiz adversativo; «Pero» conserva la corrección/contraste con la bienaventuranza anterior. El pronombre explícito «él» refleja αὐτός sin sobrecargar el español, y «dijo» mantiene la forma directa de εἶπεν.
- source_word: Μενοῦν
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Más aún
  - Antes bien
  - Sí, más bien
  lexicon: BDAG
  rationale: La partícula expresa una respuesta correctiva o de mayor énfasis. «Más bien» comunica la redirección sin convertirla en negación frontal. «Antes bien» sería posible, pero suena más marcadamente literario; «Más aún» puede debilitar el matiz correctivo.
- source_word: μακάριοι
  english_pob_choice: blessed
  chosen_spanish: dichosos
  alternatives_spanish:
  - benditos
  - bienaventurados
  lexicon: BDAG
  rationale: En este contexto de dichos de Jesús, «dichosos» comunica bien el estado favorable declarado por Dios y suena natural en español actual. «Bienaventurados» es tradicional pero más marcado eclesiásticamente; «benditos» puede sonar menos idiomático aquí.
- source_word: οἱ ἀκούοντες
  english_pob_choice: those who hear
  chosen_spanish: los que oyen
  alternatives_spanish:
  - los que escuchan
  - quienes oyen
  lexicon: BDAG
  rationale: El participio presente sustantivado describe una clase caracterizada por oír. «Los que oyen» conserva esa cualidad habitual y es directo en español. «Escuchan» podría sugerir más atención deliberada, pero no es necesario aquí.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra que procede de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» es la expresión natural y fiel para λόγος en este contexto, con el peso bíblico adecuado. «Mensaje» estrecha el campo semántico; «palabra que procede de Dios» es más explicativa de lo que pide el texto.
- source_word: φυλάσσοντες
  english_pob_choice: keep it
  chosen_spanish: la guardan
  alternatives_spanish:
  - la obedecen
  - la observan
  - la conservan
  lexicon: BDAG
  rationale: φυλάσσω puede implicar guardar, vigilar, conservar y también mantener en práctica. Aquí el complemento inmediato es la palabra de Dios, por lo que «la guardan» conserva tanto la idea de custodia como la de fidelidad práctica. «Obedecen» reduce demasiado el verbo; «conservan» no comunica bien la respuesta activa.
theological_decisions:
- issue: Fuerza de la respuesta de Jesús a la bienaventuranza anterior
  english_pob_reading: Jesus redirects the focus from biological relation to the true blessedness of hearing and keeping God's word, without denying that his mother was blessed.
  chosen_spanish_reading: Jesús redirige el énfasis desde el vínculo biológico hacia la verdadera dicha de oír y guardar la palabra de Dios, sin negar la bendición implícita de la declaración anterior.
  alternative_spanish_readings:
  - Jesús rechaza por completo la declaración anterior
  - Jesús simplemente añade otra bendición sin corrección
  rationale: 'La partícula Μενοῦν sostiene una respuesta correctiva o de reorientación. «Más bien» permite conservar la tensión: no es una negación total, pero sí un desplazamiento del fundamento de la dicha. Esto evita resolver artificialmente el matiz del texto.'
  doctrine_reference: Preservar la tensión teológica del pasaje en vez de simplificarla.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés: se conservó el matiz correctivo de Μενοῦν, el valor plural sustantivado de οἱ ἀκούοντες, y el sentido amplio de φυλάσσοντες. No se introdujeron ampliaciones interpretativas ni se suavizó la tensión retórica.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto no contiene κύριος ni una alusión directa al nombre divino.
  - Se prefirió «dichosos» sobre «bienaventurados» para un español contemporáneo y claramente bíblico.
  - «La guardan» preserva el objeto implícito en español sin añadirlo de forma innecesaria.
