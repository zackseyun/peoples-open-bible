review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: los filisteos oyen del encuentro en Mizpa, sus gobernantes suben contra Israel, e Israel oye y teme por causa de los filisteos. También preserva adecuadamente «los hijos de Israel», «gobernantes de los filisteos» y «contra Israel». Sin embargo, el aparato de notas no sigue el rastro auditado: la nota sobre «Mizpa» está anclada incorrectamente también en otros lugares, y falta una nota distinta para «los gobernantes de los filisteos / los señores de los filisteos», que el inglés sí conserva.'
  spanish_quality_summary: 'El español es en general claro y natural, pero presenta un problema formal importante: el marcador de nota «[o]» se reutiliza dos veces y además queda incrustado de forma errónea en «lo[o]yeron», lo que daña seriamente la legibilidad. Conviene también mejorar el orden verbal a «los gobernantes de los filisteos subieron» para un español más fluido sin perder fidelidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «filisteos», «los hijos de Israel», «Mizpa» y «gobernantes» son compatibles con el expediente inglés. Debe añadirse la alternativa léxica documentada para סַרְנֵי פְלִשְׁתִּים como «los señores de los filisteos» en una nota separada.
  issues:
  - severity: high
    issue: Marcador de nota reutilizado e insertado de forma incorrecta
    rationale: El mismo marcador «o» aparece dos veces para asuntos distintos y una vez rompe la palabra «oyeron» como «lo[o]yeron». Las instrucciones exigen marcadores únicos y anclados correctamente en el texto.
  - severity: medium
    issue: Falta la nota léxica para «los gobernantes de los filisteos»
    rationale: 'El audit trail inglés conserva una alternativa significativa: «the lords of the Philistines». Debe preservarse en español como nota tipo «los señores de los filisteos».'
  - severity: low
    issue: Orden verbal algo forzado en «subieron los gobernantes...»
    rationale: Aunque no es incorrecto, «los gobernantes de los filisteos subieron contra Israel» suena más natural en español moderno y mantiene el mismo sentido narrativo.
  revised_spanish_text: Cuando los filisteos oyeron que los hijos de Israel se habían reunido en Mizpa[a], los gobernantes de los filisteos[b] subieron contra Israel. Cuando los hijos de Israel lo oyeron, tuvieron miedo a causa de los filisteos.
  revised_footnotes:
