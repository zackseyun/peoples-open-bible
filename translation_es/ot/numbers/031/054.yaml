revisions:
- from: Entonces Moisés y Eleazar el sacerdote tomaron el oro de los comandantes de los millares y de los centenares[a], y lo llevaron a la tienda del encuentro, como memorial para los hijos de Israel delante de Yahvé.
  to: Entonces Moisés y Eleazar el sacerdote tomaron el oro de los comandantes de los millares y de los centenares[a], y lo llevaron a la tienda de reunión, como memorial para los hijos de Israel delante de Yahvé.
