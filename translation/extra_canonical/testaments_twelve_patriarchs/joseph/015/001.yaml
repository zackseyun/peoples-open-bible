translation:
  text: '4[15:5]. For she wanted to see me in sinful desire, but I was unaware of
    all these things.


    5. And I said to her, “This is not the custom among the Egyptians, to take what
    belongs to others before proof is given.”


    6. So I said this concerning the exchange. But the boy ought to be kept confined.


    1[15:6]. And after twenty-four days the Ishmaelites came, for they had heard that
    Jacob my father was mourning greatly for me. And when they came they said to me,'
