  text: 「내가 너희에게 아버지가 되고, 너희는 내게 아들과 딸이 되리라, 전능하신 주께서 말씀하신다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 삼하 7:8, 14의 다윗 언약 약속을 신자 공동체에 확장한 인용. 「전능하신 주」(κύριος παντοκράτωρ)는 LXX에서 흔히 「만군의 야훼」(יהוה צבאות)를 번역한다.
    reason: cross_reference
