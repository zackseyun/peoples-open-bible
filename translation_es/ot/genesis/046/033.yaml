lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y sucederá que, cuando
  alternatives_spanish:
  - Y cuando
  - Y será que, cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una contingencia futura; en español, “Y sucederá que, cuando” conserva el valor temporal sin sonar forzado ni excesivamente literal.
- source_word: יִקְרָא לָכֶם
  english_pob_choice: calls you
  chosen_spanish: los llame
  alternatives_spanish:
  - los convoque
  - los llame a ustedes
  lexicon: HALOT
  rationale: קרא con ל puede significar llamar o convocar. “Los llame” es natural en español y mantiene el tono de la escena de corte sin añadir formalidad innecesaria.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: standard proper noun
  rationale: En español bíblico, “Faraón” es el nombre/título tradicional y claro para el lector, equivalente al inglés auditado.
- source_word: וְאָמַר
  english_pob_choice: and says
  chosen_spanish: y diga
  alternatives_spanish:
  - y dirá
  - y les diga
  lexicon: HALOT
  rationale: Aunque la forma hebrea sigue una secuencia futura, el subjuntivo español en una cláusula temporal futura expresa mejor la relación “cuando... diga”.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Cuál es
  alternatives_spanish:
  - ¿Qué es
  - ¿Qué
  lexicon: HALOT
  rationale: La pregunta busca identificar la clase de ocupación. “¿Cuál es su oficio?” fluye naturalmente en español y preserva el sentido interrogativo.
- source_word: מַּעֲשֵׂיכֶם
  english_pob_choice: your occupation
  chosen_spanish: su oficio
  alternatives_spanish:
  - su trabajo
  - su ocupación
  - su labor
  lexicon: HALOT
  rationale: El sustantivo puede referirse a trabajo/ocupación. “Oficio” comunica bien la línea de actividad o sustento en español, con un registro sobrio y bíblicamente adecuado.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue esa lectura estable, sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el título “Faraón” de manera consistente con el uso bíblico estándar en español.
  - Se evita “SEÑOR” u այլ masking porque no hay aquí el nombre divino.
  - “Oficio” se eligió por claridad idiomática; no introduce una interpretación doctrinal nueva.
