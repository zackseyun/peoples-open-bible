translation:
  language: es
  text: 'Entonces Josué dijo al pueblo: «Ustedes son testigos contra ustedes mismos[a] de que han escogido para ustedes mismos a Yahvé, para servirle». Y dijeron: «Somos testigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes son testigos de ustedes mismos», es decir, sus propias palabras dan testimonio de su elección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia natural del relato en español sin perder el valor de continuación.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto de asamblea pactal, «el pueblo» es la forma más natural y precisa en español para el hebreo עָם.
- source_word: עֵדִים אַתֶּם בָּכֶם
  english_pob_choice: You are witnesses against yourselves
  chosen_spanish: Ustedes son testigos contra ustedes mismos
  alternatives_spanish:
  - Ustedes son testigos para ustedes mismos
  - Ustedes son testigos entre ustedes mismos
  lexicon: HALOT
  rationale: La preposición בְּ con esta expresión idiomática, en contexto legal/pactual, tiene fuerza autoacusatoria. «Contra ustedes mismos» reproduce esa carga mejor que una lectura meramente recíproca o reflexiva.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: 'Introduce el contenido del testimonio: son testigos de que hicieron esta elección. En español, «de que» enlaza de modo natural con «testigos».'
- source_word: בְּחַרְתֶּם לָכֶם
  english_pob_choice: you have chosen ... for yourselves
  chosen_spanish: han escogido ... para ustedes mismos
  alternatives_spanish:
  - han elegido ... para ustedes mismos
  - escogieron ... para ustedes mismos
  lexicon: HALOT
  rationale: בחר expresa «escoger/eligir»; «han escogido» mantiene el valor resultativo pertinente al contexto. «Para ustedes mismos» conserva el énfasis reflexivo de לָכֶם.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración; en español de registro bíblico amplio, «Yahvé» es la forma preferida del proyecto, en lugar de sustituirlo por un título.
- source_word: לַעֲבֹד אוֹת֑וֹ
  english_pob_choice: to serve him
  chosen_spanish: para servirle
  alternatives_spanish:
  - para servirlo
  - para adorarlo y servirle
  lexicon: HALOT
  rationale: עבד tiene un sentido amplio de servicio/lealtad cultual. «Servirle» preserva esa amplitud sin reducirlo solo a «adorar».
- source_word: וַיֹּאמְרוּ עֵדִים
  english_pob_choice: And they said, “We are witnesses.”
  chosen_spanish: 'Y ellos respondieron: «Somos testigos».'
  alternatives_spanish:
  - 'Y dijeron: «Somos testigos».'
  - «Somos testigos», respondieron ellos.
  lexicon: HALOT
  rationale: La respuesta hebrea es elíptica. «Respondieron» hace explícito el carácter de réplica dialogal sin añadir contenido doctrinal; «Somos testigos» completa el sentido implícito.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio en español como «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título o por una forma tradicional menos auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de עֵדִים אַתֶּם בָּכֶם
  english_pob_reading: witnesses against yourselves
  chosen_spanish_reading: testigos contra ustedes mismos
  alternative_spanish_readings:
  - testigos para ustedes mismos
  - testigos de ustedes mismos
  rationale: 'La frase funciona en un marco pactual y jurídico: su propia declaración los vincula como testimonio contra ellos. Mantener esa tensión evita suavizar el alcance de su respuesta.'
  doctrine_reference: HALOT; contexto de pacto en Josué 24
translation_notes:
  revision_awareness: 'Alineado con el análisis fuente-primera del hebreo masorético y con el audit trail inglés: se preservan la secuencia narrativa, el valor autoacusatorio de la frase idiomática y el nombre divino como Yahvé. No se detectaron revisiones aplicadas en el contexto inglés; por tanto, no se incorporan variantes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Testigos» se conserva en ambas réplicas para reflejar la repetición enfática del hebreo.
  - El registro es bíblico moderno, sin depender de fórmulas eclesiásticas tradicionales como sustituto del nombre divino.
