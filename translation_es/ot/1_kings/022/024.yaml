translation:
  language: es
  text: 'Entonces se acercó Zedequías hijo de Quenaaná, golpeó a Miqueas en la mejilla y dijo[a]: «¿Por qué camino salió de mí el Espíritu de Yahvé para hablarte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por cuál camino salió de mí el espíritu de Yahvé para hablarte?»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: El verbo narra un movimiento de acercamiento físico y confrontacional. «Se acercó» suena natural en español y conserva la tensión de la escena sin añadir matices no presentes en el hebreo.
- source_word: צִדְקִיָּהוּ בֶן כְּנַעֲנָה
  english_pob_choice: Zedekiah son of Chenaanah
  chosen_spanish: Zedequías hijo de Quenaaná
  alternatives_spanish:
  - Sedequías hijo de Cananá
  - Zedequías hijo de Canaaná
  lexicon: Nombres propios transcritos
  rationale: Se translitera el nombre propio y se mantiene la construcción patronímica «hijo de». «Quenaaná» refleja de modo más directo la forma hebrea del nombre que una adaptación tradicional.
- source_word: וַיַּכֶּה ... עַל הַלֶּחִי
  english_pob_choice: struck Micaiah on the cheek
  chosen_spanish: golpeó a Miqueas en la mejilla
  alternatives_spanish:
  - abofeteó a Miqueas en la mejilla
  - pegó a Miqueas en la mejilla
  lexicon: HALOT
  rationale: נכה es un verbo amplio para «golpear»; en este contexto puede implicar una bofetada, pero «golpeó» es más neutral y fiel al valor básico del verbo. «Mejilla» traduce bien לֶחִי y suena natural en español.
- source_word: אֵי זֶה
  english_pob_choice: Which way
  chosen_spanish: ¿Por qué camino?
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Por cuál camino?
  lexicon: HALOT
  rationale: La frase interroga sarcásticamente por la ruta o modo por el cual el Espíritu habría pasado de uno a otro. «¿Por qué camino?» conserva la imagen espacial y el tono burlón mejor que un simple «¿de qué manera?».
- source_word: עָבַר
  english_pob_choice: pass
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - se fue
  lexicon: HALOT
  rationale: '«Pasó» mantiene el movimiento de tránsito expresado por עבר. En español permite conservar la fuerza del desafío: el Espíritu habría «pasado» de Zedequías a Miqueas.'
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el Espíritu de Yahveh
  lexicon: HALOT
  rationale: En este contexto profético se trata del Espíritu divino, no de viento ni de aliento. Se capitaliza «Espíritu» por la referencia personal/divina, y se usa «Yahvé» según el criterio del proyecto para el Tetragrámaton.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - alejándose de mí
  lexicon: HALOT
  rationale: La expresión marca el punto de origen o separación. «De mí» es breve y exacto; evita añadir una interpretación más explícita de alejamiento que el hebreo no exige.
- source_word: לְדַבֵּר אֹתָךְ
  english_pob_choice: to speak to you
  chosen_spanish: para hablarte
  alternatives_spanish:
  - para hablar contigo
  - a fin de hablarte
  lexicon: HALOT
  rationale: El hebreo expresa el propósito de hablar a Miqueas. En español, «para hablarte» es idiomático y reproduce la dirección del acto verbal sin sobrecargar la frase.
theological_decisions:
- issue: רוּחַ יְהוָה como entidad divina en un dicho sarcástico
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el espíritu de Yahvé
  rationale: La escena no describe viento ni mera disposición interior, sino el Espíritu divino en una burla profética. Traducirlo con mayúscula preserva la referencia personal/divina y mantiene la carga teológica del pasaje sin añadir explicación interpretativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantenimiento del tono desafiante de la pregunta
  english_pob_reading: Which way did the Spirit of Yahweh pass from me to speak to you?
  chosen_spanish_reading: ¿Por qué camino pasó el Espíritu de Yahvé de mí para hablarte?
  alternative_spanish_readings:
  - ¿Por cuál camino pasó el Espíritu de Yahvé de mí para hablarte?
  - ¿De qué manera pasó el Espíritu de Yahvé de mí para hablarte?
  rationale: La frase hebrea funciona como reto irónico. «¿Por qué camino?» conserva esa ironía sin suavizarla ni convertirla en una pregunta meramente informativa.
  doctrine_reference: 1 Reyes 22:24; contexto profético de confrontación
translation_notes:
  revision_awareness: Coincide con el tramo revisado más reciente y con el acuerdo alto del control cruzado; no se registraron cambios en la última pasada. La redacción española sigue la lectura inglesa auditada, pero vuelve al hebreo para sostener el matiz espacial e irónico de אֵי זֶה עָבַר רוּחַ יְהוָה.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton, en línea con la política del proyecto.
  - Se capitaliza «Espíritu» por referencia al Espíritu divino en contexto profético.
  - «Miqueas» mantiene la forma habitual española del nombre; «Zedequías» y «Quenaaná» siguen transliteración consistente.
  - La pregunta se traduce con tono de desafío y no como una simple consulta neutral.
