translation:
  language: es
  text: Envía su palabra, y las derrite; hace soplar[a] su viento, y las aguas fluyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su espíritu" o "su aliento" para "su viento". La palabra hebrea puede abarcar esos sentidos, pero "viento" encaja mejor con la imagen meteorológica del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  english_pob_choice: sends out
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: HALOT
  rationale: El hebreo qal imperfecto expresa acción verbal concreta y eficaz. En español, "envía" transmite bien la idea de mandar/sacar una palabra con fuerza activa, sin sonar forzado. "Manda" es posible, pero puede sonar más general; "despacha" es más marcado y menos natural aquí.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mandato
  - su mensaje
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o mandato. Siguiendo el contexto poético de Dios actuando por medio de su palabra, "su palabra" conserva la imagen y permite que la fuerza de comando quede implícita sin sobreexplicar.
- source_word: וַיְמְסֵם
  english_pob_choice: and melts them
  chosen_spanish: y las derrite
  alternatives_spanish:
  - y las hace derretirse
  - y las funde
  lexicon: HALOT
  rationale: El verbo indica que causa el derretimiento de un plural femenino implícito por el contexto meteorológico. "Las derrite" es natural en español y mantiene la brevedad poética. "Las hace derretirse" explicita la causación, pero resulta más pesada; "funde" es posible, aunque menos inmediato para el lector moderno.
- source_word: יַשֵּׁב
  english_pob_choice: he makes ... blow
  chosen_spanish: hace soplar
  alternatives_spanish:
  - hace que sople
  - causa que sople
  - hace ventar
  lexicon: HALOT
  rationale: 'El hiphil de נשׁב tiene valor causativo: hacer soplar. "Hace soplar" conserva ese sentido de manera idiomática en español. "Hace que sople" también sería válido, pero es más analítico; "hace ventar" es menos transparente en registro bíblico.'
- source_word: רוּחוֹ
  english_pob_choice: his wind
  chosen_spanish: su viento
  alternatives_spanish:
  - su espíritu
  - su aliento
  lexicon: HALOT
  rationale: En este contexto de clima y deshielo, el sentido inmediato es meteorológico. "Su viento" mantiene la imagen principal. Se preservan "su espíritu" y "su aliento" como alternativas semánticas porque רוּחַ puede abarcar esos matices en hebreo.
- source_word: יִזְּלוּ
  english_pob_choice: flow
  chosen_spanish: fluyen
  alternatives_spanish:
  - corren
  - manan
  - gotéan
  lexicon: HALOT
  rationale: El verbo describe el movimiento de aguas que comienzan a correr o deslizarse. "Fluyen" es amplio, solemne y adecuado al paralelismo poético. "Corren" sería más concreto; "manan" y "gotéan" restringen demasiado la imagen.
- source_word: מָיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - agua
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo se conserva naturalmente como "las aguas" en español, especialmente en lenguaje poético. Esto mantiene el paralelismo con el plural verbal y el tono elevado del versículo.
theological_decisions:
- issue: Sentido de רוּחוֹ en relación con la agencia divina
  english_pob_reading: his wind
  chosen_spanish_reading: su viento
  alternative_spanish_readings:
  - su espíritu
  - su aliento
  rationale: 'El versículo presenta a Dios actuando sobre el clima: envía su palabra, derrite, hace soplar su viento y las aguas fluyen. En ese marco, "viento" es el sentido más directo. Se conservan las otras posibilidades porque רוּחַ tiene un campo semántico más amplio y la traducción no debe borrar esa tensión lexical.'
  doctrine_reference: Mantener la prioridad del contexto inmediato y preservar la amplitud semántica del hebreo sin forzar una lectura pneumatológica.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail inglés; la versión inglesa más reciente quedó sin cambios, con acuerdo alto entre revisores. La redacción española sigue ese mismo perfil estable y no introduce expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" no aplicable aquí porque el texto no contiene el nombre divino explícito en esta forma; la agencia se expresa por los sufijos posesivos y la poesía del verso.
  - Se conserva el plural poético "las aguas" para reflejar el hebreo מָיִם y el paralelismo con el verbo plural.
  - '"Su viento" se usa como opción principal, con nota para las alternativas semánticas de רוּחַ.'
