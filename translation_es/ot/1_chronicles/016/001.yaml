translation:
  language: es
  text: Así trajeron el arca de Dios y la colocaron en medio[a] de la tienda que David había levantado para ella, y ofrecieron holocaustos y sacrificios de paz[b] delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “dentro de la tienda” o “en el interior de la tienda”; la expresión hebrea puede indicar estar dentro de algo, aunque literalmente dice “en medio de la tienda”.
    reason: lexical_alternative
  - marker: b
    text: O “sacrificios de comunión” u “ofrendas de bienestar” para “sacrificios de paz”.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן הָאֱלֹהִים / ark of God
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del pacto de Dios
  lexicon: HALOT
  rationale: El hebreo dice simplemente “arca de Dios”, sin añadir la fórmula más desarrollada “del pacto”. En español, “el arca de Dios” preserva con transparencia esa expresión exacta sin importar información no presente en el texto.
- source_word: וַיַּצִּיגוּ אֹתוֹ
  english_pob_choice: set it
  chosen_spanish: la colocaron
  alternatives_spanish:
  - la pusieron
  - la establecieron
  lexicon: HALOT
  rationale: En este contexto narrativo, יצג expresa poner algo en una posición determinada. “Colocaron” comunica bien la acción de situar el arca sin sonar mecánico ni introducir una connotación técnica innecesaria.
- source_word: בְּתוֹךְ הָאֹהֶל
  english_pob_choice: in the midst of the tent
  chosen_spanish: en medio de la tienda
  alternatives_spanish:
  - dentro de la tienda
  - en el interior de la tienda
  lexicon: HALOT
  rationale: La expresión hebrea puede indicar estar “en medio de” o, más ampliamente, “dentro de”. Siguiendo el audit trail de la POB en inglés, se conserva la idea espacial concreta con “en medio de”, que en español es natural y mantiene la tensión lexical con la alternativa más general.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la carpa
  - el tabernáculo
  lexicon: HALOT
  rationale: El sustantivo hebreo es el común “tienda/tent”. “Tabernáculo” introduciría asociaciones cultuales posteriores que el versículo no explicita. “Tienda” es el equivalente más fiel y claro en español.
- source_word: נָטָה ל֖וֹ דָּוִיד
  english_pob_choice: that David had pitched for it
  chosen_spanish: que David había levantado para ella
  alternatives_spanish:
  - que David había tendido para ella
  - que David había armado para ella
  lexicon: HALOT
  rationale: Con lenguaje de tienda, נָטָה significa tender o levantar una tienda. “Había levantado” es una solución natural en español para un montaje de tienda, y “para ella” mantiene el valor final del pronombre לֹו como referencia al arca.
- source_word: וַיַּקְרִיבוּ
  english_pob_choice: they offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - trajeron
  lexicon: HALOT
  rationale: En contexto sacrificial, קרב en hifil significa ofrecer o presentar una ofrenda. “Ofrecieron” es la forma española estándar y clara para este acto cultual.
- source_word: עֹל֥וֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente consumidas
  lexicon: HALOT
  rationale: En español bíblico, “holocaustos” es el término tradicional y preciso para la ofrenda totalmente quemada. Aunque “ofrendas quemadas” sería más transparente, “holocaustos” preserva el valor cultual reconocido del término.
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - sacrificios de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: La POB inglesa preserva la categoría cultual “peace offerings” y su alternativa “fellowship offerings/of offerings of well-being”. En español, “sacrificios de paz” conserva el nombre tradicional sin borrar el matiz relacional de šelamim; se podría usar “de comunión” o “de bienestar”, pero serían más interpretativos.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en presencia de Dios
  lexicon: HALOT
  rationale: La expresión literalmente apunta a estar “ante la faz/presencia de Dios”. “Delante de Dios” es natural en español y mantiene la formalidad cultual sin expandir el sentido más de lo que el hebreo exige.
theological_decisions:
- issue: Identificación de la tienda
  english_pob_reading: Translate הָאֹהֶל as 'the tent,' not 'the tabernacle.'
  chosen_spanish_reading: Traducir הָאֹהֶל como “la tienda”, no como “el tabernáculo”.
  alternative_spanish_readings:
  - el tabernáculo
  - la carpa sagrada
  rationale: El hebreo usa el sustantivo común para una tienda y dice que David la había levantado para el arca. “Tabernáculo” podría sugerir el tabernáculo mosaico, una identificación que el versículo no declara. “Tienda” conserva la precisión del texto y evita sobreinterpretación.
  doctrine_reference: Translation philosophy §1
- issue: Terminología sacrificial
  english_pob_reading: Retain specific cultic terms 'burnt offerings' and 'peace offerings' rather than flattening them into generic sacrifices.
  chosen_spanish_reading: 'Conservar términos cultuales específicos: “holocaustos” y “sacrificios de paz”.'
  alternative_spanish_readings:
  - sacrificios
  - ofrendas
  rationale: El versículo describe actos rituales concretos y no un simple ofrecimiento genérico. Mantener los tipos de sacrificio preserva la especificidad litúrgica y teológica del pasaje sin mezclar categorías.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La versión española sigue el mismo juicio de la POB inglesa: conservar el valor concreto de בְּתוֹךְ con una solución formal pero natural (“en medio de”), evitar importar “tabernáculo” donde el hebreo dice “tienda”, y mantener la distinción entre holocaustos y šelamim. También se respetó la referencia pronominal del arca en el sintagma final “para ella”.'
  spanish_consistency_notes:
  - Se mantiene “Dios” para אֱלֹהִים y no se introduce “SEÑOR”.
  - Se usa “tienda” de manera consistente para הָאֹהֶל en este versículo.
  - Se conserva el registro cultual con “holocaustos” y “sacrificios de paz”, evitando un término genérico que borraría la distinción del hebreo.
  - El pronombre final se resuelve como femenino singular en español (“para ella”), por concordancia con “el arca”.
