translation:
  language: es
  text: Un día él llegó allí[a], se desvió y entró en el aposento alto, y se acostó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «y se durmió allí». El verbo hebreo puede denotar echarse o dormir, y el contexto no exige el sentido más específico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: One day
  chosen_spanish: Un día
  alternatives_spanish:
  - Y sucedió un día
  - Entonces un día
  lexicon: HALOT
  rationale: El hebreo introduce una ocasión narrativa; «Un día» reproduce ese valor temporal de manera natural en español sin cargar la frase con una fórmula más pesada.
- source_word: וַיָּבֹא שָׁמָּה
  english_pob_choice: he came there
  chosen_spanish: llegó allí
  alternatives_spanish:
  - vino allí
  - fue allí
  lexicon: HALOT
  rationale: בוא puede expresar venir/llegar; «llegó allí» conserva el movimiento hacia ese lugar y mantiene el deíctico de שָׁמָּה («allí»).
- source_word: וַיָּסַר
  english_pob_choice: turned aside
  chosen_spanish: se desvió
  alternatives_spanish:
  - se apartó
  - torció hacia
  lexicon: HALOT
  rationale: סור aquí indica apartarse del trayecto principal para entrar en un lugar determinado; «se desvió» preserva esa idea de apartarse/torcer hacia un destino concreto.
- source_word: אֶל הָעֲלִיָּה
  english_pob_choice: into the upper room
  chosen_spanish: hacia el aposento alto
  alternatives_spanish:
  - al aposento alto
  - al cuarto de arriba
  - al cuarto alto
  lexicon: HALOT
  rationale: עֲלִיָּה designa una estancia superior; «aposento alto» es un equivalente español claro y tradicional, y «hacia» refleja adecuadamente אֶל sin forzar un matiz de entrada más fuerte que el hebreo.
- source_word: וַיִּשְׁכַּב שָׁמָּה
  english_pob_choice: and lay down there
  chosen_spanish: se acostó allí
  alternatives_spanish:
  - y se tendió allí
  - y durmió allí
  - y se acostó allá
  lexicon: HALOT
  rationale: שׁכב puede significar echarse/acostarse o dormir según el contexto; aquí el contexto inmediato no obliga a «dormir». «Se acostó allí» conserva la acción básica sin especificar más de lo que el hebreo exige.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español y manteniendo la alternativa léxica documentada para שׁכב, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se preserva la repetición de «allí» para reflejar שָׁמָּה... שָׁמָּה y el efecto de localización del hebreo.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay nombres divinos en este versículo.
  - «Aposento alto» mantiene la imagen arquitectónica de עֲלִיָּה sin introducir una paráfrasis excesiva.
