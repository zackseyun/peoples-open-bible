base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/002.yaml
  text: 'Son of man[a], raise a lament over Pharaoh king of Egypt, and say to him: You were like a young lion among the nations, but you were like the monster in the seas; you burst forth in your rivers, and muddied the waters with your feet[c][b], and fouled their rivers.'
  footnotes:
  - marker: a
    text: Or 'You were likened to a young lion among the nations.' The Hebrew verb may be read passively rather than reflexively.
    reason: alternative_reading
  - marker: b
    text: Hebrew tannin/tannim in this context likely refers to a great aquatic creature; possible renderings include 'dragon' or 'sea monster.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you trampled their rivers.' The Hebrew verb emphasizes trampling; 'fouled' brings out the effect in the water imagery.
    reason: lexical_alternative
