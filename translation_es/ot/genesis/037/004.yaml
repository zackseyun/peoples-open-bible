translation:
  language: es
  text: Cuando sus hermanos vieron que su padre lo amó más que a todos sus hermanos,[a] lo odiaron y no pudieron hablarle en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no pudieron hablarle en términos amistosos». Lit. «no pudieron hablarle en paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vieron
  alternatives_spanish:
  - Y vieron
  - Al ver
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; en español, ‘Cuando’ conserva la relación temporal entre la percepción de los hermanos y la reacción que sigue.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - los hermanos de él
  - sus hermanos varones
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina plural se refiere a los hermanos de José; ‘sus hermanos’ es natural y fiel en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que vieron, no una causa independiente; ‘que’ mantiene la sintaxis hebrea y la relación perceptiva.
- source_word: אָהַב
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  - favorecía
  lexicon: HALOT
  rationale: El verbo básico es ‘amar’; el imperfecto narrativo en español puede reflejarse con ‘amaba’. La idea de preferencia queda aportada por la comparación, no por sustituir el verbo.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ellos
  lexicon: HALOT
  rationale: 'Aunque el sufijo es plural, en español el posesivo singular ‘su padre’ resulta natural porque el referente está claro en el contexto: el padre de los hermanos.'
- source_word: מִכָּל אֶחָיו
  english_pob_choice: more than all his brothers
  chosen_spanish: más que a todos sus hermanos
  alternatives_spanish:
  - más que a ninguno de sus hermanos
  - más que a todos los demás
  lexicon: HALOT
  rationale: La construcción comparativa con מן + כָּל se expresa de forma idiomática con ‘más que a todos’. Se conserva la comparación explícita sin añadir ‘otros’.
- source_word: וַיִּשְׂנְאוּ
  english_pob_choice: they hated
  chosen_spanish: lo odiaron
  alternatives_spanish:
  - lo aborrecieron
  - comenzaron a odiarlo
  lexicon: HALOT
  rationale: שׂנא expresa odio fuerte; ‘odiar’ comunica bien la fuerza del término. Se mantiene la referencia directa a José con ‘lo’.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: and could not
  chosen_spanish: y no podían
  alternatives_spanish:
  - y no pudieron
  - y eran incapaces de
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad resultante de la hostilidad. En español, ‘no podían’ reproduce esa imposibilidad continua y narrativa.
- source_word: דַּבְּרוֹ
  english_pob_choice: speak ... to him
  chosen_spanish: hablarle
  alternatives_spanish:
  - hablar con él
  - dirigirse a él
  lexicon: HALOT
  rationale: El infinitivo con sufijo pronominal requiere una solución verbal en español; ‘hablarle’ comunica directamente la relación interpersonal sin añadir elementos ajenos.
- source_word: לְשָׁלֹם
  english_pob_choice: peaceably
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con cordialidad
  - en buenos términos
  lexicon: HALOT
  rationale: שָׁלוֹם aquí denota trato amistoso o en paz. ‘En paz’ conserva la imagen semítica y la opción alternativa de hablar ‘en paz’ con alguien.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo WLC y el audit trail inglés. No se adoptaron revisiones textuales ni cambios de sentido: la traducción conserva la secuencia narrativa, la comparación explícita y la tensión lexical entre ‘hablarle en paz’ y ‘hablarle en términos amistosos’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se mantuvo el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota [a] preserva la ambigüedad del hebreo לְשָׁלֹם sin forzar una sola paráfrasis.
