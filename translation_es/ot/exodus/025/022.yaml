    text: Or 'atonement cover.' The Hebrew term refers to the gold cover of the ark; traditionally, 'mercy seat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the Israelites' or 'to the sons of Israel.' The Hebrew is literally 'to/for the sons of Israel.'
    reason: lexical_alternative
