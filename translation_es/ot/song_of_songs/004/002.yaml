  to: Tus dientes son como un rebaño de ovejas esquiladas que salen del lavado, todas ellas con mellizos[a], y no hay entre ellas ninguna que haya perdido su cría[b].
  rationale: Se corrige la formulación de מַתְאִימוֹת para evitar un presente progresivo demasiado concreto («pariendo») y se usa «con mellizos», que preserva mejor la imagen de pares completos. Se mejora la naturalidad de «suben del lavado» a «salen del lavado». Se reemplaza la nota [a] por una nota correctamente anclada a la cláusula final, siguiendo la función de la nota inglesa, y se deja la nota sobre la imaginería de pares en [a].
