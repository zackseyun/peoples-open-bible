translation:
  language: es
  text: Y el rey tomó la mitad de las fuerzas que habían sido dejadas atrás y salió de Antioquía, la ciudad de su reino[a], en el año ciento cuarenta y siete[b]; y cruzó el río Éufrates y viajaba por las regiones altas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad real de su reino». La frase griega puede funcionar en aposición para identificar Antioquía como la ciudad real o capital de su reino.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el año ciento cuarenta y siete de la era seléucida.
    reason: cultural_note
  - marker: c
    text: 'O: «las provincias altas» o «las regiones del interior». La expresión griega probablemente alude a los territorios al este del Éufrates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - recibió
  lexicon: BDAG
  rationale: En este contexto militar, el verbo expresa que el rey asumió o tomó consigo la parte restante de las fuerzas. 'Tomó' es natural en español y conserva la acción sin añadir matices no requeridos.
- source_word: τὰς ἡμίσεις τῶν δυνάμεων
  english_pob_choice: half of the forces
  chosen_spanish: la mitad de las fuerzas
  alternatives_spanish:
  - la mitad del ejército
  - la mitad de las tropas
  lexicon: LSJ
  rationale: '''Fuerzas'' conserva el sentido militar amplio de δυνάμεις. ''La mitad'' refleja el valor distributivo de la expresión de modo idiomático en español.'
- source_word: τὰς καταλειφθείσας
  english_pob_choice: that had been left behind
  chosen_spanish: que habían quedado atrás
  alternatives_spanish:
  - que habían sido dejadas
  - que quedaron
  lexicon: BDAG
  rationale: La participio indica las fuerzas previamente dejadas. 'Habían quedado atrás' comunica bien la idea de permanencia remanente y evita una construcción demasiado pesada.
- source_word: ἀπῆρεν
  english_pob_choice: departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: '''Salió'' funciona bien con la idea de dejar Antioquía en una narración de viaje. Es más natural que un calco formal y mantiene el movimiento narrativo.'
- source_word: ἀπὸ Ἀντιοχίας, ἀπὸ πόλεως βασιλείας αὐτοῦ
  english_pob_choice: from Antioch, the city of his kingdom
  chosen_spanish: de Antioquía, la ciudad de su reino
  alternatives_spanish:
  - de Antioquía, la ciudad real de su reino
  - de Antioquía, la ciudad capital de su reino
  lexicon: LSJ
  rationale: 'El griego puede entenderse en aposición: Antioquía es la ciudad de su reino. En español, la aposición con coma reproduce bien esa relación sin introducir ''capital'' como interpretación explícita.'
- source_word: ἔτους ἑβδόμου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred forty-seventh year
  chosen_spanish: en el año ciento cuarenta y siete
  alternatives_spanish:
  - en el año 147
  - en el año ciento cuarenta y siete de la era seléucida
  lexicon: LSJ
  rationale: La forma numérica se vierte de manera estándar y clara en español. El texto no menciona explícitamente la era seléucida, por lo que esa aclaración se reserva para nota si se desea contextualizar.
- source_word: διεπέρασεν
  english_pob_choice: crossed
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - atravesó
  lexicon: BDAG
  rationale: El verbo se refiere al cruce del Éufrates; 'cruzó' es la equivalencia directa y natural.
- source_word: τὸν Εὐφράτην ποταμόν
  english_pob_choice: the Euphrates River
  chosen_spanish: el río Éufrates
  alternatives_spanish:
  - el Éufrates
  - el río de Éufrates
  lexicon: LSJ
  rationale: '''Río Éufrates'' es el orden natural en español y preserva el nombre propio con claridad.'
- source_word: διεπορεύετο
  english_pob_choice: traveled through
  chosen_spanish: recorrió
  alternatives_spanish:
  - viajó por
  - anduvo por
  lexicon: BDAG
  rationale: El imperfecto denota avance continuo por una región. 'Recorrió' ofrece una solución breve y narrativa, adecuada al contexto.
- source_word: τὰς ἐπάνω χώρας
  english_pob_choice: the upper regions
  chosen_spanish: las regiones altas
  alternatives_spanish:
  - las regiones superiores
  - las provincias altas
  - las regiones del interior
  lexicon: LSJ
  rationale: La expresión puede referirse a territorios 'altos' o 'del interior' al este del Éufrates. 'Regiones altas' mantiene la cercanía al griego sin cerrar prematuramente la referencia geográfica.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail inglés: usa una formulación natural para ''half of the forces'' y trata ''the city of his kingdom'' como aposición mediante coma, evitando una traducción más rígida. También conserva el valor geográfico de ''upper regions'' sin explicitar más de lo que el griego y el inglés auditado permiten.'
  spanish_consistency_notes:
  - Se mantuvo 'Éufrates' como nombre propio y 'Yahvé' no aplica en este versículo.
  - '''Fuerzas'' conserva el registro militar amplio de δυνάμεις; no se redujo a ''tropas'' por preferencia estilística.'
  - Se usó una forma numérica transparente para el año, coherente con el estilo bíblico moderno en español.
  - Las notas [a], [b] y [c] están ancladas en el texto para evitar marcadores huérfanos.
