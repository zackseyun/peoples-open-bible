review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura disputativa, el nombre divino Yahvé, el contraste entre Esaú y Jacob, y la nota sobre los perfectos hebreos. Sin embargo, hay un desajuste de tiempo verbal en «¿No era Esaú hermano de Jacob?» frente al valor más natural y documentado de הֲלוֹא ... como pregunta retórica sobre un hecho establecido: en español suena más fiel «¿No fue Esaú hermano de Jacob?» o «¿No es...?» según enfoque. Dado el paralelismo con «amé», «fue» encaja mejor aquí.'
  spanish_quality_summary: El español es claro y digno, pero «¿No era Esaú hermano de Jacob?» suena menos natural y algo impreciso en este contexto argumentativo. Además, conviene añadir la coma vocativa/apositiva en «Esaú, hermano de Jacob» para mejorar la fluidez y evitar aspereza. El resto del texto está bien logrado.
  glossary_alignment: Se respeta correctamente Yahvé para יְהוָה. No hay conflictos con la terminología del proyecto. «Amado/amé» preserva adecuadamente אהב sin sobreinterpretar elección. «Declara Yahvé» es apropiado para נְאֻם יְהוָה.
  issues:
  - severity: medium
    issue: Tiempo verbal de «¿No era Esaú hermano de Jacob?»
    rationale: Aunque el hebreo permite una pregunta retórica sobre un hecho reconocido, «era» en español puede sonar como trasfondo descriptivo más que como afirmación retórica puntual. «¿No fue Esaú, hermano de Jacob?» reproduce mejor la fuerza argumentativa y se alinea con la alternativa documentada en inglés («Was not»).
  - severity: low
    issue: Puntuación en la aposición «Esaú hermano de Jacob»
    rationale: En español, «Esaú, hermano de Jacob» fluye mejor como identificación incidental dentro de la pregunta retórica.
  revised_spanish_text: '“Yo los he amado”, dice Yahvé. Pero ustedes dicen[a]: “¿Cómo nos has amado?” “¿No fue Esaú, hermano de Jacob?”, declara Yahvé. “Sin embargo, amé a Jacob,”'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: “Yo los amé … ¿Cómo nos amaste? … ¿No amé yo a Jacob?”. Los perfectos hebreos pueden verterse con pasado simple en español.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la pregunta retórica sobre Esaú para expresar con mayor fidelidad y naturalidad el argumento del hebreo en español. También se mejora la puntuación de la aposición. Se conserva la nota léxica, con una ligera mejora estilística en «verterse».
