  yaml_path: translation/ot/joshua/022/031.yaml
  text: And Phinehas son of Eleazar the priest said to the sons of Reuben[a], and to the sons of Gad, and to the sons of Manasseh, “Today we know that Yahweh is among us, because you have not acted unfaithfully against Yahweh in this matter[c][b]. Then you have delivered the sons of Israel from the hand of Yahweh.”
  footnotes:
