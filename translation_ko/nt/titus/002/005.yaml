id: TIT.2.5
reference: Titus 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σώφρονας, ἁγνάς, ⸀οἰκουργούς, ἀγαθάς, ὑποτασσομένας τοῖς ἰδίοις ἀνδράσιν, ἵνα μὴ ὁ λόγος τοῦ θεοῦ βλασφημῆται.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/005.yaml
  text: self-controlled[a], pure, working at home, kind, being subject to their own husbands[c][b], so that the word of God may not be slandered.
  footnotes:
  - marker: a
    text: Or 'busy at home' or 'keepers at home.' The Greek term is rare and refers to engagement in household work.
    reason: lexical_alternative
  - marker: b
    text: Or 'submitting to their own husbands.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may not be reviled' or more literally 'blasphemed.'
    reason: lexical_alternative
translation:
  language: ko
  text: 신중하고 정결하며, 집안일에 힘쓰고[a] 선하며, 자기 남편에게 복종하도록[b] 말입니다. 그리하여 하나님의 말씀이 모독받지[c] 않게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「집안에서 일하는」, 「집안을 지키는」. 헬라어 어휘는 드물며, 가정의 살림에 종사함을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기 남편에게 자신을 복종시키는」. 중간태로 자발적 자기복종의 어감을 가진다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「비난받지」, 더 문자적으로 「모독받지」. 헬라어 βλασφημέω는 강한 모독·중상의 어감.
    reason: lexical_alternative
lexical_decisions:
- source_word: σώφρονας
  english_pob_choice: self-controlled
  chosen_korean: 신중하고
  alternatives_korean:
  - 분별 있고
  - 절제하고
  lexicon: BDAG
  rationale: 1:8, 2:2와 일관되게 「신중하고」로 옮긴다.
- source_word: ἁγνάς
  english_pob_choice: pure
  chosen_korean: 정결하며
  alternatives_korean:
  - 순결하며
  - 깨끗하며
  lexicon: BDAG
  rationale: ἁγνός는 도덕적·성적 정결. 「정결」이 정립된 한국어 어휘.
- source_word: οἰκουργούς
  english_pob_choice: working at home
  chosen_korean: 집안일에 힘쓰고
  alternatives_korean:
  - 집안에서 일하는
  - 가정을 돌보는
  lexicon: BDAG
  rationale: οἰκουργός(또는 οἰκουρός 이문)는 「집안의 일을 하는·집을 지키는」. 자연스러운 한국어 「집안일에 힘쓰다」.
- source_word: ἀγαθάς
  english_pob_choice: kind
  chosen_korean: 선하며
  alternatives_korean:
  - 친절하며
  - 좋으며
  lexicon: BDAG
  rationale: ἀγαθός는 「선한·좋은」. 본 문맥에서는 친절·인자의 어감을 포함하지만 일반적 「선하다」가 가장 포괄적.
- source_word: ὑποτασσομένας τοῖς ἰδίοις ἀνδράσιν
  english_pob_choice: being subject to their own husbands
  chosen_korean: 자기 남편에게 복종하도록
  alternatives_korean:
  - 자기 남편에게 순종하도록
  - 자기 남편에게 자신을 복종시키도록
  lexicon: BDAG
  rationale: ὑποτάσσομαι(중간태)는 자발적 복종. ἴδιος는 「자기 자신의」를 강조. 「자기 남편에게 복종하도록」이 표준 한국어 등가어.
- source_word: ἵνα μὴ ὁ λόγος τοῦ θεοῦ βλασφημῆται
  english_pob_choice: so that the word of God may not be slandered
  chosen_korean: 하나님의 말씀이 모독받지 않게 하려는 것입니다
  alternatives_korean:
  - 하나님의 말씀이 비방받지 않게 하려는 것입니다
  - 하나님의 말씀이 욕을 먹지 않게 하려는 것입니다
  lexicon: BDAG
  rationale: βλασφημέω는 한국어 「모독·비방」 모두 가능. 본문에서는 거룩한 말씀에 대한 모독의 무게를 살려 「모독받다」를 택한다.
