    text: 또는 「예수를 믿는 자」, 「예수의 신실하심에 속한 자」. 3:22와 동일한 πίστις 속격의 모호성을 보존한다.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸν ἐκ πίστεως Ἰησοῦ
  english_pob_choice: the one who has faith in Jesus
  chosen_korean: 예수의 믿음에 속한 자
  alternatives_korean:
