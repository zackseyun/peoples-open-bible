revisions:
- from: ¿Y quién como tu pueblo Israel, una sola nación en la tierra, a la cual fue Dios[a] a redimir para sí un pueblo, para darte un nombre por grandes y temibles obras, al expulsar naciones de delante de tu pueblo[b], al que rescataste de Egipto?
  to: ¿Y quién como tu pueblo Israel, una sola nación en la tierra, por la cual Dios fue a redimir para sí un pueblo, para hacerte un nombre por grandes y temibles obras[a], expulsando naciones de delante de tu pueblo[b], al que redimiste de Egipto?
  rationale: Se reubica la nota [a] sobre la frase correcta, se ajusta 'para darte un nombre' a 'para hacerte un nombre' para reflejar el modismo reflexivo del hebreo, se suaviza la construcción relativa para un español más natural sin perder 'Dios fue', y se armoniza פדה con 'redimiste' en la cláusula final.
  reviewer_model: gpt-5.4
