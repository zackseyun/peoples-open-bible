review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la estructura y el sentido del hebreo: llegada a un pueblo confiado/seguro, descripción de una tierra amplia, afirmación de que Dios la ha dado, y clausula de abundancia. Sin embargo, «en su mano» suena incorrecto e introduce ambigüedad de persona/número frente a בְּיֶדְכֶם; en español natural debe ser «en sus manos» o una reformulación idiomática equivalente. También «Cuando vayan, llegarán» es comprensible pero menos preciso que una formulación centrada en la llegada, dado כְּבֹאֲכֶם תָּבֹאוּ.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita un ajuste idiomático importante en «Dios la ha entregado en su mano». Además, «la tierra es ancha» es entendible, aunque «la tierra es amplia» suena más natural en español bíblico contemporáneo sin perder el valor del hebraísmo. El resto fluye bien.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: אֱלֹהִים se traduce correctamente como «Dios». No aparecen Yahvé, Mesías, Espíritu, etc. La decisión sobre el idiomático בְּיֶדְכֶם debe favorecer español natural sin perder la imagen; aquí corresponde apartarse del singular inglés y usar «en sus manos» por fidelidad idiomática al español.'
  issues:
  - severity: high
    issue: «porque Dios la ha entregado en su mano»
    rationale: Aunque el hebreo usa singular idiomático «en vuestra mano», en español «en su mano» con sujeto plural previo («vayan/llegarán») suena discordante y puede entenderse como singular de cortesía o referirse a otra persona. «En sus manos» preserva el sentido y la naturalidad.
  - severity: medium
    issue: «Cuando vayan, llegarán»
    rationale: La construcción española es algo torpe y menos centrada en el momento de arribo. Dado el hebreo כְּבֹאֲכֶם תָּבֹאוּ y la nota inglesa, «Cuando lleguen» o «Al llegar» comunica mejor la fuerza temporal sin duplicación innecesaria.
  - severity: low
    issue: «la tierra es ancha»
    rationale: Es aceptable, pero «amplia» o «espaciosa» suena más natural para territorio en español general. No es error de sentido, sino mejora de estilo.
