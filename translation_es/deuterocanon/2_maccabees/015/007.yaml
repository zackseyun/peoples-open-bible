translation:
  language: es
  text: Pero Macabeo seguía confiando continuamente, con plena esperanza, en que obtendría ayuda de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ Μακκαβαῖος
  english_pob_choice: But Maccabeus
  chosen_spanish: Pero Judas Macabeo
  alternatives_spanish:
  - Y Macabeo
  - Mas Macabeo
  lexicon: LSJ
  rationale: δέ es aquí adversativo o transicional; «Pero» conserva el contraste con el temor mencionado antes. Se explicita «Judas» para identificar al Macabeo principal en español lector, sin perder el apellido/título «Macabeo».
- source_word: ἦν ἀδιαλείπτως πεποιθώς
  english_pob_choice: was continually confident
  chosen_spanish: estaba continuamente confiado
  alternatives_spanish:
  - estaba incesantemente confiado
  - seguía firmemente confiado
  lexicon: BDAG/LSJ
  rationale: ἀδιαλείπτως expresa continuidad; «continuamente» la mantiene de modo natural. πεποιθώς, participio perfecto de πείθω en sentido intransitivo, expresa confianza asentada; «confiado» conserva ese estado sin introducir una idea más intensa de la que el griego exige.
- source_word: μετὰ πάσης ἐλπίδος
  english_pob_choice: with full hope
  chosen_spanish: con plena esperanza
  alternatives_spanish:
  - con toda esperanza
  - con completa esperanza
  lexicon: LSJ
  rationale: La frase intensifica la confianza y literalmente dice «con toda esperanza». «Plena esperanza» reproduce esa totalidad con buen español, evitando una construcción demasiado rígida.
- source_word: ἀντιλήμψεως
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - asistencia
  - socorro
  lexicon: BDAG/LSJ
  rationale: ἀντίλημψις puede significar ayuda, apoyo o asistencia. «Ayuda» es la opción más amplia y natural en español; no se especifica «liberación» porque el término griego no obliga a ese alcance.
- source_word: τεύξεσθαι
  english_pob_choice: he would obtain
  chosen_spanish: obtendría
  alternatives_spanish:
  - recibiría
  - alcanzaría
  lexicon: BDAG/LSJ
  rationale: τεύγχανω con genitivo suele significar obtener o recibir. «Obtendría» preserva la idea de llegar a poseer la ayuda divina, con una construcción fluida en español.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - de parte de Yahvé
  lexicon: BDAG/LSJ
  rationale: En este contexto judío-griego κύριος refiere a Dios. Siguiendo la convención del proyecto, se usa «Yahvé» en el texto principal en lugar de «Señor», manteniendo la referencia al nombre divino.
theological_decisions:
- issue: Renderizado de κύριος en un contexto judío deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: La guía del proyecto pide «Yahvé» para יהוה / YHWH y no un ocultamiento por «SEÑOR». Aunque el griego dice κύριος, aquí funciona como referencia al Dios de Israel, por lo que «Yahvé» comunica mejor la identidad divina sin perder el sentido del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος / divine name'
- issue: Intensidad de la expectativa expresada por πάσης ἐλπίδος
  english_pob_reading: with full hope
  chosen_spanish_reading: con plena esperanza
  alternative_spanish_readings:
  - con toda esperanza
  - con esperanza completa
  rationale: El griego intensifica la confianza sin introducir una doctrina distinta. «Plena esperanza» conserva la totalidad de la expectativa y suena natural en español; no se reduce a una mera actitud emocional.
  doctrine_reference: LSJ; contexto narrativo de confianza en ayuda divina
translation_notes:
  revision_awareness: 'La traducción sigue de cerca la lectura auditada del POB inglés, pero ajusta dos puntos para el español y el proyecto: mantiene la continuidad de ἀδιαλείπτως πεποιθώς con una construcción natural («estaba continuamente confiado») y reemplaza la forma inglesa «from the Lord» por «de Yahvé» conforme al criterio terminológico del proyecto para el nombre divino en español. No se añaden notas porque el verso no presenta una variante textual significativa en el paquete fuente.'
  spanish_consistency_notes:
  - Se evita «Señor» como máscara convencional para el nombre divino, siguiendo el estándar del proyecto.
  - «Con plena esperanza» preserva la fuerza totalizante de πάσης ἐλπίδος sin calco duro.
  - «Confiado» se usa para πεποιθώς en su valor de estado de confianza asentada, no como simple optimismo pasajero.
