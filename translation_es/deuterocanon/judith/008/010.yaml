review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: Judith envía a su asistente doméstica, quien está a cargo de sus pertenencias, para hacer venir a dos ancianos de la ciudad. Sin embargo, ἐκάλεσεν en este contexto se expresa mejor con un matiz de hacer comparecer (''mandó llamar'' o ''convocó'') que con el más genérico ''llamó''. Además, la transliteración española de Χαβρεὶν / Χαρμεῖν como ''Cabrín y Carmín'' se aparta innecesariamente del rastro auditado en inglés y de una representación más transparente del griego.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse en precisión y naturalidad bíblica. 'Criada' funciona, aunque hoy puede sonar algo marcado regionalmente; aun así es aceptable con nota. 'Mandó llamar' suena más natural que 'llamó' en una escena donde ella envía a su asistente para traer a los ancianos. Los nombres conviene ajustarlos a una transliteración más cercana y reconocible.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La decisión 'ancianos' para πρεσβυτέρους es adecuada. 'Criada' para ἅβρα es defendible con la nota léxica existente. El principal ajuste es estilístico-lexical en ἐκάλεσεν y de transliteración onomástica.
  issues:
  - severity: medium
    issue: '''llamó'' debilita el sentido contextual de ἐκάλεσεν'
    rationale: Aunque literalmente posible, aquí Judith primero envía a su asistente y luego hace venir a los ancianos; en español 'mandó llamar' o 'convocó' refleja mejor la acción mediada y el matiz formal que el inglés POB documentó como 'summoned'.
  - severity: medium
    issue: Transliteración 'Cabrín y Carmín' poco transparente respecto al griego y al rastro POB
    rationale: Los nombres griegos Χαβρεὶν / Χαρμεῖν están auditados en inglés como Chabris / Charmis. 'Cabrín y Carmín' introduce una adaptación no justificada que oscurece la relación con la forma fuente. Una forma como 'Jabrís y Jarmís' preserva mejor el valor fonético en español sin calcar el inglés.
  - severity: low
    issue: La nota alternativa con 'doncella' puede sugerir juventud/virginidad más que servicio doméstico
    rationale: No invalida el borrador, pero entre las alternativas 'sirvienta' o 'asistente' explican mejor ἅβρα que 'doncella'.
  revised_spanish_text: Y ella envió a su criada[a], la que estaba encargada de todos sus bienes, y mandó llamar a Jabrís y a Jarmís, los ancianos de su ciudad.
