  text: זְכֹ֤ר יְהוָ֨ה לִ/בְנֵ֬י אֱד֗וֹם אֵת֮ י֤וֹם יְֽרוּשָׁ֫לִָ֥ם הָ֭/אֹ֣מְרִים עָ֤רוּ עָ֑רוּ עַ֝֗ד הַ/יְס֥וֹד בָּֽ/הּ׀׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/137/007.yaml
  text: Remember[a], O Yahweh, against the sons of Edom the day of Jerusalem, those who were saying, “Lay it bare, lay it bare[b], down to its foundation!”
  footnotes:
  - marker: a
    text: Or 'the day Jerusalem fell'—literally, 'the day of Jerusalem,' referring to the time of the city's calamity.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lay it bare, lay it bare' or 'Raze it, raze it.' The Hebrew verb emphasizes stripping/exposing the city completely.
    reason: lexical_alternative
