translation:
  language: es
  text: Él sella la mano de todo hombre[a][b], para que todos los hombres conozcan su obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sella por completo la mano de todo hombre». La expresión hebrea probablemente significa que Dios detiene el trabajo ordinario de los seres humanos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo hombre» / «todos los hombres»; la expresión es genérica para la humanidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - en la mano
  - sobre la mano
  lexicon: HALOT
  rationale: El hebreo con ב + יָד es una expresión difícil; el POB inglés la vertió de forma idiomática con el objeto directo 'the hand'. En español, 'sella la mano' conserva la metáfora sin forzar una construcción extraña como 'en la mano'.
- source_word: כָּל אָדָם
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - todo ser humano
  lexicon: HALOT
  rationale: אָדָם es singular genérico. 'Todo hombre' mantiene el paralelismo con la segunda mitad y reproduce la fuerza representativa del hebreo, con sentido inclusivo dentro del uso genérico.
- source_word: יַחְתּוֹם
  english_pob_choice: he seals
  chosen_spanish: sella
  alternatives_spanish:
  - sella por completo
  - pone un sello
  lexicon: HALOT
  rationale: El qal de חתם significa 'sellar'. 'Sella' es breve, fiel y suficientemente literal; 'pone un sello' explicita más de lo que exige el texto.
- source_word: לָדַעַת
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... conozcan
  alternatives_spanish:
  - para conocer
  - a fin de que ... sepan
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad. 'Para que ... conozcan' transmite esa finalidad en español natural y conserva el valor de resultado/propósito.
- source_word: כָּל אַנְשֵׁי
  english_pob_choice: all men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todas las personas
  - toda la humanidad
  lexicon: HALOT
  rationale: Aunque אַנְשֵׁי es morfológicamente masculino plural, el hebreo funciona de manera colectiva. 'Todos los hombres' conserva la correspondencia formal con el POB inglés revisado y mantiene el paralelismo con 'todo hombre'.
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - lo que ha hecho
  lexicon: HALOT
  rationale: מַעֲשֶׂה con sufijo puede referirse a la actividad/obra de Dios en sentido amplio. 'Su obra' es una equivalencia natural en español y preserva el alcance general del término mejor que 'su trabajo'.
theological_decisions:
- issue: Referente del sujeto implícito y del sufijo posesivo
  english_pob_reading: The subject and possessive refer to God.
  chosen_spanish_reading: El sujeto implícito y el posesivo se refieren a Dios.
  alternative_spanish_readings:
  - El sujeto podría referirse de manera impersonal al invierno o a la tormenta
  - El posesivo podría entenderse como una referencia menos definida
  rationale: En el discurso de Eliú, el contexto inmediato trata de la acción soberana de Dios sobre la creación y el trabajo humano. Por eso, 'Él' y 'su' deben leerse como referencias a Dios, no como agentes impersonales.
  doctrine_reference: Providencia divina; soberanía de Dios sobre el trabajo y la creación
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del POB inglés, que ajustó 'all people' a 'all men' para corresponder más de cerca con el hebreo y mantener el paralelismo con 'every man'. La versión española conserva ese paralelismo con 'todo hombre / todos los hombres' y mantiene la ambigüedad productiva de la imagen de 'sellar la mano'.
  spanish_consistency_notes:
  - Se usa 'Dios' como referente del sujeto implícito, conforme al contexto de Job 37 y al audit trail inglés.
  - '''Obra'' conserva el campo semántico amplio de מַעֲשֶׂה sin reducirlo a una acción puntual.'
  - Las notas a pie de página preservan la alternativa lexical documentada en el POB inglés y añaden una aclaración sobre el valor genérico de la expresión hebrea.
