    issue: «me habló» para וַיֹּאמֶר אֵלַי
    rationale: Aunque es natural en español, desplaza el verbo simple «dijo» a una formulación más interpretativa. Dado que el hebreo usa אמר y el discurso directo sigue de inmediato, «me dijo» preserva mejor la forma y el sentido, además de alinearse con el audit trail inglés.
  - severity: low
