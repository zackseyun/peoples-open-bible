translation:
  language: es
  text: Él les dio las tierras de las naciones[a], y ellos heredaron la labor de los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tomaron posesión de la labor de los pueblos'. El hebreo puede enfatizar tanto la labor misma como aquello que se obtuvo mediante esa labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He gave
  chosen_spanish: Él les dio
  alternatives_spanish:
  - Y él les dio
  - Les dio
  lexicon: HALOT
  rationale: El wayyiqtol de נתן expresa acción pasada consecutiva; en español se puede omitir la conjunción narrativa inicial sin perder el sentido. Conservé el sujeto explícito para dar claridad y fluidez natural.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: HALOT
  rationale: Es el complemento indirecto de tercera persona plural; 'les' es la forma más natural en español para 'to them' en este contexto.
- source_word: אַרְצוֹת גּוֹיִם
  english_pob_choice: the lands of the nations
  chosen_spanish: las tierras de las naciones
  alternatives_spanish:
  - los territorios de las naciones
  - las tierras de los pueblos
  lexicon: HALOT
  rationale: '''Tierras'' preserva el plural de אַרְצוֹת. ''Naciones'' mantiene el matiz político/étnico del hebreo en este contexto territorial mejor que ''gentiles''.'
- source_word: וַעֲמַל
  english_pob_choice: the labor
  chosen_spanish: el trabajo
  alternatives_spanish:
  - el afán
  - la labor
  - la fatiga
  lexicon: HALOT
  rationale: עָמָל puede denotar trabajo/toil y también lo obtenido por ese trabajo. 'Trabajo' mantiene el vínculo léxico de manera comprensible en español, sin cerrar indebidamente la ambigüedad.
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los clanes
  lexicon: HALOT
  rationale: '''Pueblos'' evita la repetición de ''naciones'' y conserva el sentido colectivo de לְאֻמִּים.'
- source_word: יִירָשׁוּ
  english_pob_choice: they inherited
  chosen_spanish: heredaron
  alternatives_spanish:
  - tomaron posesión de
  - poseyeron
  lexicon: HALOT
  rationale: '''Heredaron'' reproduce el valor de ירש con su matiz de posesión recibida por don, no solo conquistada. Mantiene la resonancia covenantal del verbo.'
theological_decisions:
- issue: Matiz de posesión recibida por don en ירש
  english_pob_reading: they inherited
  chosen_spanish_reading: heredaron
  alternative_spanish_readings:
  - tomaron posesión de
  - poseyeron
  rationale: El contexto atribuye a Dios la acción de dar las tierras; por eso 'heredaron' comunica mejor que la posesión fue recibida como don divino. A la vez, no pierde la idea de ocupación efectiva del territorio.
  doctrine_reference: Salmos 105:44; traducción por equivalencia óptima; nuancia de herencia/covenant
translation_notes:
  revision_awareness: La revisión inglesa reciente no cambió el texto; se conserva la decisión de leer וַעֲמַל de forma ambigua entre 'labor/trabajo' y el resultado de ese trabajo. La versión española mantiene esa tensión sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparece el nombre divino; aquí el versículo no lo contiene.
  - Se prefirió 'heredaron' frente a 'tomaron posesión' para conservar la dimensión de don en el verbo hebreo.
  - '''Naciones'' y ''pueblos'' se alternan para reflejar la variación léxica del hebreo sin forzar sinonimia exacta.'
