    text: «Salir y entrar» es un modismo hebreo para desempeñar las propias responsabilidades, especialmente en el liderazgo público.
    reason: cultural_note
  revision_rationale: Se ajusta עַבְדְּךָ a 'tu siervo' para seguir la decisión léxica documentada para este contexto oracional; se elimina la nota innecesaria en 'Y ahora'; se conserva la autodescripción humilde con nota alternativa; y se añade la nota requerida para el modismo 'salir y entrar', mientras 'cómo' mejora la correspondencia y fluidez del español.
