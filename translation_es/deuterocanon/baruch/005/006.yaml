translation:
  language: es
  text: Pues salieron de ti a pie, siendo llevados por enemigos; pero Dios los trae[a] a ti, llevados[b] con gloria, como sobre un trono real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los introduce»; el verbo griego puede entenderse literalmente como «traer adentro» o «hacer entrar», aquí en el contexto del retorno del exilio.
    reason: lexical_alternative
  - marker: b
    text: O «alzados» o «portados»; la imagen contrasta su salida a pie con un retorno honrado y exaltado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se fueron
  lexicon: LSJ
  rationale: El verbo simple de salida preserva el movimiento desde Sión/Jerusalén sin añadir matiz interpretativo. «Salieron» es natural y fiel.
- source_word: παρὰ σοῦ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu presencia
  - lejos de ti
  lexicon: LSJ
  rationale: Conserva la dirección de separación y el tono de habla a Jerusalén personificada, sin sobreexplicar.
- source_word: πεζοὶ
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - caminando
  - como peatones
  lexicon: LSJ
  rationale: Equivale de manera idiomática en español al contraste con el regreso honroso y elevado.
- source_word: ἀγόμενοι ὑπʼ ἐχθρῶν
  english_pob_choice: being led away by enemies
  chosen_spanish: siendo llevados por enemigos
  alternatives_spanish:
  - siendo conducidos por enemigos
  - arrastrados por enemigos
  lexicon: LSJ
  rationale: La construcción pasiva expresa cautiverio o traslado forzado bajo control hostil. «Llevados» mantiene esa fuerza sin añadir violencia no explícita.
- source_word: εἰσάγει
  english_pob_choice: brings them
  chosen_spanish: los trae
  alternatives_spanish:
  - los introduce
  - los conduce
  lexicon: LSJ
  rationale: El verbo literalmente tiene el sentido de llevar/adentrar, pero en el contexto del retorno a Jerusalén «trae» comunica bien la acción divina de restitución. Se evita «de vuelta» porque no está explícito.
- source_word: αἰρομένους
  english_pob_choice: carried
  chosen_spanish: llevados
  alternatives_spanish:
  - transportados
  - alzados
  lexicon: LSJ
  rationale: La participio contrasta con «a pie» y sugiere ser portados con honor. «Llevados» es claro y cercano al griego; en nota se conserva la alternativa de elevación/honor.
- source_word: μετὰ δόξης
  english_pob_choice: with glory
  chosen_spanish: con gloria
  alternatives_spanish:
  - en gloria
  - con esplendor
  lexicon: LSJ
  rationale: Mantiene el valor honorífico y teológico de δόξα sin diluirlo en una paráfrasis.
- source_word: ὡς θρόνον βασιλείας
  english_pob_choice: as on a royal throne
  chosen_spanish: como un trono real
  alternatives_spanish:
  - como un trono de realeza
  - como un trono de reino
  lexicon: LSJ
  rationale: La frase es comprimida en griego y conserva una imagen comparativa de exaltación real. «Como un trono real» mantiene la metáfora sin expandirla en exceso.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: LSJ
  rationale: Correspondencia estándar para θεός en este contexto narrativo y teológico.
theological_decisions:
- issue: Reversión del exilio y de la humillación
  english_pob_reading: They left on foot under enemy control, but God brings them to Jerusalem in honored restoration.
  chosen_spanish_reading: Salieron a pie bajo control enemigo, pero Dios los trae en una restauración honrosa.
  alternative_spanish_readings:
  - Dios los introduce a ti en restauración
  - Dios los conduce de regreso con honra
  rationale: La versión española conserva el contraste entre salida humillante y retorno exaltado, sin añadir un «regreso» que el texto griego no expresa de forma explícita.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen de transporte exaltado
  english_pob_reading: The simile is preserved rather than interpreted away.
  chosen_spanish_reading: 'La comparación se conserva: son llevados con gloria como un trono real.'
  alternative_spanish_readings:
  - alzados con gloria como un trono real
  - portados con gloria como un trono de realeza
  rationale: Se mantiene la tensión poética del texto, evitando convertir la imagen en explicación prosaica.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente en inglés eliminó «back» porque no está explícito en el griego; por eso el español evita añadir «de vuelta» y conserva simplemente «los trae a ti».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por una fórmula reverencial menos transparente.
  - «A pie» conserva el contraste con el transporte honorífico del final.
  - «Con gloria» y «trono real» preservan la imaginería de honra sin reinterpretarla.
  - Se evita introducir «de regreso» o «de vuelta» porque el audit trail inglés señaló que esa noción no está explícita en el griego.
