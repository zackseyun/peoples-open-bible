base_translation:
  language: en
  yaml_path: translation/ot/genesis/022/011.yaml
  text: But the angel of Yahweh called to him from heaven and said[a], “Abraham, Abraham!” And he said[b], “Here I am.”
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.” The Hebrew word מַלְאָךְ can mean either “messenger” or “angel”; here the heavenly setting favors “angel.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the heavens”; rendered “from heaven” as standard English idiom.
    reason: lexical_alternative
