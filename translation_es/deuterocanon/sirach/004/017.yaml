translation:
  language: es
  text: Y hasta que su corazón se llene de mí[a], volveré y lo haré feliz[b], y le revelaré mis secretos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «hasta que confíe su alma» / «hasta que entregue su alma» y «lo probará en sus ordenanzas», lo cual refleja una línea más plena sobre la prueba de la Sabiduría antes de su regreso favorable.'
    reason: alternative_reading
  - marker: b
    text: O «bendecirlo» o «declararlo feliz» para «lo haré feliz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד עֵת
  english_pob_choice: And until
  chosen_spanish: Y hasta que
  alternatives_spanish:
  - Hasta que
  - Y hasta el tiempo en que
  lexicon: HALOT
  rationale: La expresión marca un límite temporal. «Y hasta que» conserva la conjunción inicial y el valor temporal sin recargar la frase.
- source_word: יִמָּלֵא לִבּוֹ בִּי
  english_pob_choice: his heart is filled with me
  chosen_spanish: su corazón se llene de mí
  alternatives_spanish:
  - su corazón esté lleno de mí
  - su corazón confíe en mí
  - su corazón se satisfaga en mí
  lexicon: HALOT
  rationale: Mantiene la imagen literal del corazón lleno «de mí», tal como exige el hebreo. Se evita transformar de inmediato la metáfora en «confíe», aunque ese matiz esté sugerido por el paralelo griego.
- source_word: אָשׁוּב
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - daré la vuelta
  - volveré de nuevo
  lexicon: HALOT
  rationale: «Volveré» es la forma más natural en español y conserva la idea de retorno/volver atrás del verbo שוב.
- source_word: אֲאַשְּׁרֶנּוֹ
  english_pob_choice: make him happy
  chosen_spanish: lo haré feliz
  alternatives_spanish:
  - lo bendeciré
  - lo declararé feliz
  - lo haré dichoso
  lexicon: HALOT
  rationale: El verbo expresa hacer o declarar dichoso/feliz. «Lo haré feliz» transmite bien el cambio favorable sin imponer de entrada un sentido técnico de bendición que el contexto inmediato no exige.
- source_word: וְגָלִיתִי לוֹ
  english_pob_choice: I will reveal to him
  chosen_spanish: le revelaré
  alternatives_spanish:
  - le descubriré
  - le manifestaré
  lexicon: HALOT
  rationale: «Revelaré» comunica de manera clara y fiel la idea de descubrir algo oculto.
- source_word: מִסְתָּרִי
  english_pob_choice: my secrets
  chosen_spanish: mis secretos
  alternatives_spanish:
  - mis cosas ocultas
  - mi secreto
  - mis consejos ocultos
  lexicon: HALOT
  rationale: «Secretos» refleja bien el plural de sentido de דברים/misterios ocultos y evita volver la frase más técnica de lo que pide el hebreo.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego más amplio, que añade un motivo de prueba y temor ausente en esta línea hebrea
  english_pob_reading: The English POB follows the Hebrew main line and notes the fuller Greek parallel in a footnote.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado; la nota recoge el paralelo griego con su motivo de prueba, temor y confianza interior.
  alternative_spanish_readings:
  - Incluir en el texto principal el lenguaje griego de prueba y temor.
  - Omitir toda referencia al paralelo griego.
  rationale: Dado que el hebreo está disponible y es alto en confianza, debe gobernar el texto principal. Sin embargo, el griego aporta una línea más completa sobre la pedagogía de la Sabiduría, y esa tensión debe quedar visible en nota.
  doctrine_reference: Principio de primacía del hebreo cuando Sirácida se conserva en hebreo; uso del paralelo griego como control y ampliación contextual.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje hebreo principal y el paralelo griego de Sirácida 4:17 para no importar cláusulas ajenas al texto hebreo; la redacción española refleja la línea hebrea con una nota que preserva la tensión interpretativa del griego.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita en la voz femenina del contexto sin añadirla en el versículo, conforme al texto fuente.
  - Se usa español neutro y eclesialmente legible, evitando arcaísmos innecesarios.
  - 'Se conserva la primera persona singular de la voz sapiencial: «mí», «volveré», «le revelaré».'
