translation:
  language: es
  text: Podrán comer cualquier animal[a] que tenga la pezuña hendida, completamente dividida, y que rumie[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que divide la pezuña y hace una hendidura en las pezuñas»; el hebreo usa dos expresiones emparentadas para especificar una pezuña verdaderamente dividida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que hace subir el alimento masticado»; es decir, rumia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - cualquiera
  lexicon: HALOT
  rationale: El hebreo introduce la clase de animales permitidos de manera distributiva. «Cualquier» comunica bien esa inclusión general en español moderno sin perder el valor legal de la frase.
- source_word: מַפְרֶסֶת פַּרְסָה
  english_pob_choice: has a split hoof
  chosen_spanish: tiene la pezuña hendida
  alternatives_spanish:
  - parte la pezuña
  - divide la pezuña
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente la de una pezuña dividida. «Tiene la pezuña hendida» es natural en español y conserva el rasgo físico exigido por el texto.
- source_word: וְשֹׁסַעַת שֶׁסַע פְּרָסֹת
  english_pob_choice: completely divided
  chosen_spanish: completamente dividida
  alternatives_spanish:
  - y partida en dos
  - y hendida de manera total
  lexicon: HALOT
  rationale: La segunda expresión intensifica y precisa la primera. «Completamente dividida» mantiene esa fuerza enfática sin añadir una paráfrasis innecesaria.
- source_word: מַעֲלַת גֵּרָה
  english_pob_choice: chews the cud
  chosen_spanish: rumia
  alternatives_spanish:
  - mastica el bolo
  - vuelve a traer el alimento
  lexicon: HALOT
  rationale: El hebreo significa literalmente «hace subir el alimento masticado»; en español, «rumia» es la equivalencia natural y fiel para ese comportamiento alimentario.
- source_word: בַּבְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: En este contexto legal de clasificación alimentaria, el término abarca animales terrestres en general. «Animal» es suficientemente amplio y claro en español.
- source_word: אֹתָהּ תֹּאכֵלוּ
  english_pob_choice: You may eat
  chosen_spanish: Podrán comer
  alternatives_spanish:
  - Podrán comerlo
  - Podrán comer ese
  lexicon: HALOT
  rationale: La forma verbal expresa permiso dentro de una ley alimentaria. «Podrán comer» comunica bien esa autorización en español contemporáneo.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una equivalencia óptima con dos notas léxicas: la primera sobre la duplicación enfática de la imagen de la pezuña y la segunda sobre el giro idiomático de «bring up cud». La versión española sigue esa misma línea, conservando la distinción entre la pezuña hendida y la rumia, sin suavizar la tensión léxica del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene el registro legal y clasificatorio del pasaje con verbos de permiso («Podrán comer»).
  - «Rumia» evita una paráfrasis más larga y conserva el valor técnico del hebreo en un español natural.
  - La segunda cláusula de la pezuña conserva la intensificación semántica del original mediante «completamente dividida».
