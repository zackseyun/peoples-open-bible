review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: la tierra produce pan en la superficie y debajo su interior es trastornado. Sin embargo, ''se revuelve'' no representa con suficiente precisión נֶהְפַּךְ (''es vuelto/volteado/puesto al revés/levantado''), y sugiere agitación interna más que remoción o trastorno del subsuelo. Además, la nota al pie ancla en ''tierra'' pero la variante afecta la cláusula final; conviene mantener la ambigüedad de כְּמוֹ אֵשׁ con una redacción más natural y mejor anclada.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'se revuelve como fuego' suena poco natural y algo ambiguo en español moderno eclesial. 'Es removida como por fuego' o 'queda trastornada como por fuego' comunica mejor la imagen minera del contexto. También es preferible anclar la nota en la frase final, no en 'tierra'.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'La tierra' y 'el pan' concuerdan bien con las decisiones del POB. La principal corrección léxica es llevar נֶהְפַּךְ a una opción española más fiel al valor de volteamiento/remoción.
  issues:
  - severity: medium
    issue: '''se revuelve'' para נֶהְפַּךְ es demasiado débil o impreciso'
    rationale: El verbo hebreo en nifal expresa ser vuelto, trastornado o removido, no simplemente agitarse. En el contexto minero de Job 28, conviene una forma como 'es removida' o 'queda trastornada'.
  - severity: medium
    issue: La frase 'como fuego' en el texto principal queda poco idiomática con 'se revuelve'
    rationale: La combinación actual produce una imagen difícil en español. La ambigüedad del hebreo debe preservarse, pero con una construcción que suene natural, por ejemplo 'como por fuego' con nota de alternativa 'como fuego'.
  - severity: low
    issue: La nota al pie está anclada en 'tierra' en vez de la comparación final
    rationale: La variante documentada afecta la cláusula 'como por fuego / como fuego', no el sustantivo inicial. El anclaje debe aparecer junto a la frase relevante para mayor claridad editorial.
  revised_spanish_text: En cuanto a la tierra, de ella sale el pan, pero por debajo de ella es removida como por fuego[a].
  revised_footnotes:
  - marker: a
    text: 'O: «y por debajo de ella es removida como fuego». El hebreo puede describir ya sea la manera («como por fuego») o una simple semejanza («como fuego»).'
    reason: lexical_alternative
