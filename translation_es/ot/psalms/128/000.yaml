review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: encabezado de salmo, bienaventuranza para todos los que temen a Yahvé y caminan en sus caminos. También mantiene correctamente el nombre divino como «Yahvé». Sin embargo, «Cántico de ascenso» no refleja bien la fórmula estable שִׁיר הַמַּעֲלוֹת, que en español bíblico se entiende mejor como «Cántico de las subidas» o «Cántico de ascensos».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos problemas de calidad: (1) «ascenso» en singular suena impropio para esta superscripción y debilita la naturalidad; (2) el marcador de nota [a] está colocado sobre «Bienaventurado» mientras la nota ofrece como alternativa toda la cláusula «Dichoso todo el que teme a Yahvé», por lo que conviene anclarlo al sintagma completo inicial. Además, «Bienaventurado» en singular masculino genérico es menos natural aquí que «Dichoso es todo el que» o «Bienaventurado es todo el que».'
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. Para אַשְׁרֵי, la nota léxica está bien orientada, aunque «dichoso» sería más natural en español contemporáneo; «bienaventurado» sigue siendo aceptable si se mantiene la nota. La principal desviación es la superscripción.
  issues:
  - severity: medium
    issue: Superscripción «Cántico de ascenso»
    rationale: שִׁיר הַמַּעֲלוֹת es una fórmula tradicional de encabezado plural/constructa; «de ascenso» en singular no suena idiomático ni representa bien la expresión. «Cántico de las subidas» refleja mejor la forma hebrea y es más reconocible.
  - severity: low
    issue: Anclaje de la nota léxica
    rationale: La nota sobre אַשְׁרֵי ofrece una alternativa para toda la expresión inicial, no solo para la palabra aislada. En español conviene ubicar [a] después de «todo el que» o tras la cláusula inicial para mayor precisión editorial.
  - severity: low
    issue: Fluidez de «Bienaventurado todo el que»
    rationale: Aunque comprensible, en español suena más natural «Bienaventurado es todo el que» o «Dichoso es todo el que». Dado el registro buscado, se puede conservar «Bienaventurado» con una mínima reparación sintáctica.
  revised_spanish_text: Cántico de las subidas. Bienaventurado es todo el que[a] teme a Yahvé, el que anda en sus caminos.
  revised_footnotes:
  - marker: a
    text: O «Dichoso es todo el que teme a Yahvé». El hebreo אַשְׁרֵי puede denotar un estado de florecimiento o de bienaventuranza.
    reason: lexical_alternative
  revision_rationale: Se corrige la superscripción para reflejar mejor la fórmula hebrea estable שִׁיר הַמַּעֲלוֹת y se ajusta levemente la sintaxis a un español más natural y digno. También se reubica la nota para que su alcance corresponda mejor a la alternativa ofrecida.
