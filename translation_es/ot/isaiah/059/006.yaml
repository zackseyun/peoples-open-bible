translation:
  language: es
  text: Sus tejidos no llegarán a ser vestidura[a], ni se cubrirán con sus obras; sus obras son obras de maldad[b], y actos de violencia están en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus telarañas». El hebreo se refiere a algo tejido o hilado; «tejidos» preserva la metáfora sin especificarla demasiado.
    reason: lexical_alternative
  - marker: b
    text: O «obras de iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּרֵי/הֶם
  english_pob_choice: their webs
  chosen_spanish: sus telas
  alternatives_spanish:
  - sus telarañas
  - sus redes tejidas
  - sus hilos tejidos
  lexicon: HALOT
  rationale: El término hebreo alude a algo tejido o hilado. En español, «telas» conserva la imagen de algo tejido sin volverla demasiado específica. «Telarañas» sería posible, pero añade una precisión zoológica que el hebreo no exige en este verso.
- source_word: לְבֶגֶד
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestidura
  - un vestido
  lexicon: HALOT
  rationale: 'Aquí el sentido es funcional: algo que sirva como cobertura. «Ropa» suena natural en español moderno y mantiene la idea general sin imponer un artículo o prenda concreta.'
- source_word: יִתְכַּסּוּ
  english_pob_choice: will they cover themselves
  chosen_spanish: se cubrirán
  alternatives_spanish:
  - se vestirán
  - se taparán
  - se cubrirán a sí mismos
  lexicon: HALOT
  rationale: La forma refleja una acción recíproca/reflexiva. En español, «se cubrirán» expresa bien la idea sin recargar la frase con un reflexivo redundante.
- source_word: בְּמַעֲשֵׂיהֶם
  english_pob_choice: with their deeds
  chosen_spanish: con sus obras
  alternatives_spanish:
  - por sus obras
  - mediante sus obras
  - con sus hechos
  lexicon: HALOT
  rationale: 'La preposición expresa medio/instrumento: pretenden cubrirse por medio de lo que hacen. «Obras» mantiene la repetición del sustantivo hebreo y suena sobrio en español bíblico contemporáneo.'
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus actos
  - sus trabajos
  lexicon: HALOT
  rationale: La repetición enfática del hebreo se preserva con «sus obras». En español, esta elección mantiene el paralelismo y el énfasis retórico.
- source_word: מַעֲשֵׂי אָוֶן
  english_pob_choice: works of wickedness
  chosen_spanish: obras de maldad
  alternatives_spanish:
  - obras de iniquidad
  - obras de perversidad
  - obras malas
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, iniquidad o perversión. «Maldad» comunica con claridad la carga moral negativa sin endurecer innecesariamente el tono con un término más técnico.
- source_word: וּפֹעַל חָמָס
  english_pob_choice: deeds of violence
  chosen_spanish: actos de violencia
  alternatives_spanish:
  - obra de violencia
  - hechos de violencia
  - acciones violentas
  lexicon: HALOT
  rationale: פֹעַל indica acción o producto de una acción, y חָמָס denota violencia/agravio. «Actos de violencia» conserva el plural del contexto inglés revisado y refleja bien el paralelismo del hebreo.
- source_word: בְּכַפֵּי/הֶם
  english_pob_choice: is in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus palmas
  - en sus manos está
  - los tienen en sus manos
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de la mano/palma como lugar de posesión o responsabilidad. «En sus manos» es la equivalencia idiomática más natural en español y mantiene la acusación implícita.
- source_word: לֹא יִהְיוּ
  english_pob_choice: will not become
  chosen_spanish: no se convertirán
  alternatives_spanish:
  - no serán
  - no llegarán a ser
  - no servirán como
  lexicon: HALOT
  rationale: 'El sentido no es mera existencia, sino transformación funcional: no llegarán a funcionar como ropa. «No se convertirán» reproduce bien esa idea de cambio de estado.'
theological_decisions:
- issue: Metáfora del tejido como cobertura moral insuficiente
  english_pob_reading: Retain the concrete imagery of webs/clothing/covering while allowing the moral implication to emerge from context rather than making it explicit in translation.
  chosen_spanish_reading: Conservar la imagen concreta de telas/ropa/cubrirse sin explicitar que se trata de encubrimiento moral.
  alternative_spanish_readings:
  - Parafrasear como incapacidad de ocultarse con sus malas obras
  - Explicitar que sus obras no pueden cubrir su culpa
  rationale: El hebreo presenta una imagen material muy marcada. En español conviene mantenerla para no perder la fuerza retórica ni añadir una explicación que el texto no formula directamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Pluralidad del último miembro y paralelo acusatorio
  english_pob_reading: '...and deeds of violence are in their hands.'
  chosen_spanish_reading: '...y en sus manos hay actos de violencia.'
  alternative_spanish_readings:
  - '...y la violencia está en sus manos'
  - '...y la obra de violencia está en sus manos'
  rationale: El hebreo pluraliza el cierre con un sustantivo de acción en plural implícito en el contexto de la repetición. El español en plural preserva mejor el paralelismo con el resto del verso y evita singularizar indebidamente la acusación.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: conserva la imagen de las webs/telas, mantiene la repetición de מַעֲשֵׂיהֶם con un mismo sustantivo en español, y refleja el cierre pluralizado «actos de violencia» en lugar de un singular. También se evita una paráfrasis explicativa de la cobertura moral para respetar la metáfora hebrea.'
  spanish_consistency_notes:
  - Se mantuvo «obras» para מַעֲשִׂים/מַעֲשֵׂיהֶם con el fin de conservar la repetición retórica del hebreo.
  - «Maldad» se eligió para אָוֶן por claridad contemporánea, sin borrar su posible matiz de iniquidad.
  - «Actos de violencia» conserva el plural y la dureza del cierre; evita suavizar חָמָס como simple «daño».
  - Se usó puntuación española estándar y un registro bíblico sobrio, moderno y publicable.
