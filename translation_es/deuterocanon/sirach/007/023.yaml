  source_alignment_summary: 'El borrador sigue bien el hebreo principal y conserva la variante griega en nota, pero no preserva del todo dos decisiones clave del expediente inglés: בָּנִים se entendió específicamente como «sons», y נָשִׁים es plural («wives»). En español, «hijos» puede pasar, pero «consigue para ellos esposa» introduce un singular que debilita la correspondencia distributiva del plural hebreo.'
  spanish_quality_summary: El español es claro y legible, pero «consigue para ellos esposa» suena algo torpe y menos natural que una formulación distributiva. «Disciplínalos» refleja mejor el valor de יסר según la decisión POB que «corrígelos», que estrecha el sentido a corrección puntual.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Sí conviene alinearse mejor con las decisiones léxicas auditadas: «sons» → «hijos» es aceptable en español, pero debe quedar claro por contexto; «discipline» → mejor «disciplínalos»; «get wives for them» → mejor «consígueles esposas» para mantener el plural y la fuerza de arreglo matrimonial.'
  issues:
  - severity: medium
    issue: «Corrígelos» atenúa y estrecha el sentido de יַסֵּר
    rationale: La decisión inglesa auditada escogió «discipline» para preservar corrección formativa y entrenamiento. «Corrígelos» en español suena más puntual y menos abarcador que «disciplínalos».
  - severity: medium
    issue: «consigue para ellos esposa» cambia el plural hebreo נָשִׁים a singular
    rationale: Aunque el singular representativo puede ocurrir en español, aquí el hebreo plural y la traducción inglesa «wives» se reproducen mejor con una formulación distributiva como «consígueles esposas».
  - severity: low
    issue: La nota textual usa «hijos» para el griego donde el inglés distingue «children»
    rationale: No es un error grave, pero la nota podría reflejar mejor la diferencia entre el hebreo «sons» y el griego «children» mediante «hijos» en el texto principal y «hijos/niños» no es necesario. Dado el uso normal en español, se puede mantener «hijos» en la nota para fluidez, pero el núcleo del ajuste está en el cuerpo del versículo.
  revised_spanish_text: ¿Tienes hijos? Disciplínalos[a], y consígueles esposas en su juventud.
  revised_footnotes:
