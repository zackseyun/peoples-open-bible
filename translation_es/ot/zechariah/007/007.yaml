translation:
  language: es
  text: ¿No son estas las palabras que Yahvé proclamó por medio de los profetas anteriores[a], cuando Jerusalén estaba habitada y en calma[b], con sus ciudades circundantes, y el Neguev y la Sefela[c] estaban habitados?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los profetas anteriores». La expresión hebrea dice literalmente «por la mano de los profetas anteriores» y expresa mediación o instrumentación.
    reason: lexical_alternative
  - marker: b
    text: O «en seguridad» para «en calma». El término hebreo puede incluir quietud segura o prosperidad sin perturbación.
    reason: lexical_alternative
  - marker: c
    text: La Sefela es la región occidental de colinas bajas de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Are ... not
  chosen_spanish: ¿No son estas...
  alternatives_spanish:
  - ¿No son estas las...
  - ¿No eran estas...
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera afirmación; en español, '¿No son estas...?' conserva el énfasis interrogativo y la fuerza retórica sin volver la frase forzada.
- source_word: אֶת הַדְּבָרִים
  english_pob_choice: these ... words
  chosen_spanish: estas las palabras
  alternatives_spanish:
  - estas palabras
  - las palabras
  lexicon: HALOT
  rationale: El hebreo señala palabras ya conocidas y específicas. 'Estas las palabras' conserva la deixis de 'these' y la referencia a un mensaje previo.
- source_word: קָרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - anunció
  - clamó
  - declaró
  lexicon: HALOT
  rationale: En el contexto de Yahvé hablando por medio de profetas, 'proclamó' expresa anuncio público y autoridad; evita el calco de 'llamó'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el Nombre divino. 'Yahvé' mantiene la referencia directa al Tetragrámaton, en lugar de la sustitución litúrgica 'SEÑOR'.
- source_word: בְּיַד הַנְּבִיאִים הָרִאשֹׁנִים
  english_pob_choice: by the former prophets
  chosen_spanish: por medio de los profetas anteriores
  alternatives_spanish:
  - por los profetas anteriores
  - a través de los profetas anteriores
  - por mano de los profetas anteriores
  lexicon: HALOT
  rationale: La idiomática hebrea 'por la mano de' expresa mediación/instrumentalidad. En español, 'por medio de' comunica esa agencia de manera natural y auditable.
- source_word: בִּהְיוֹת
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - mientras
  - en el tiempo en que
  lexicon: HALOT
  rationale: El infinitivo constructo con ב señala circunstancia temporal; 'cuando' reproduce el valor temporal de forma clara y sobria.
- source_word: יְרוּשָׁלִַם יֹשֶׁבֶת
  english_pob_choice: Jerusalem was inhabited
  chosen_spanish: Jerusalén estaba habitada
  alternatives_spanish:
  - Jerusalén estaba poblada
  - Jerusalén era habitada
  lexicon: HALOT
  rationale: El participio de ישב aplicado a una ciudad indica que estaba poblada/habitada. 'Estaba habitada' es idiomático y conserva la imagen de ciudad asentada.
- source_word: וּשְׁלֵוָה
  english_pob_choice: at ease
  chosen_spanish: en calma
  alternatives_spanish:
  - en seguridad
  - tranquila
  - en paz
  lexicon: HALOT
  rationale: El término puede abarcar quietud, seguridad y bienestar sin forzar prosperidad. 'En calma' comunica la quietud y estabilidad del contexto con buena naturalidad en español.
- source_word: וְעָרֶיהָ סְבִיבֹתֶיהָ
  english_pob_choice: with her surrounding cities
  chosen_spanish: con sus ciudades circundantes
  alternatives_spanish:
  - y sus ciudades alrededor
  - con las ciudades que la rodeaban
  lexicon: HALOT
  rationale: La expresión indica las ciudades alrededor de Jerusalén. 'Circundantes' preserva el matiz espacial y suena natural en registro bíblico contemporáneo.
- source_word: וְהַנֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: el Neguev
  alternatives_spanish:
  - el sur
  - la tierra del sur
  lexicon: HALOT
  rationale: Aquí funciona como región geográfica, no solo como dirección. 'Neguev' conserva el nombre propio regional.
- source_word: וְהַשְּׁפֵלָה
  english_pob_choice: the Shephelah
  chosen_spanish: la Sefela
  alternatives_spanish:
  - la llanura baja
  - los montes bajos
  lexicon: HALOT
  rationale: Es una región histórica concreta de Judá. 'Sefela' conserva la designación geográfica precisa mejor que una paráfrasis genérica.
- source_word: יֹשֵׁב
  english_pob_choice: inhabited
  chosen_spanish: estaban habitados
  alternatives_spanish:
  - estaban poblados
  - estaban ocupados
  lexicon: HALOT
  rationale: El participio singular se usa colectivamente para las regiones mencionadas. 'Estaban habitados' mantiene el paralelo con Jerusalén y refleja el estado de asentamiento.
theological_decisions:
- issue: Nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La fuente hebrea usa explícitamente יהוה. El criterio del proyecto pide reflejar el Nombre divino sin ocultarlo tras una sustitución litúrgica; 'Yahvé' es la forma española de uso reverente coherente con el audit trail.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Estatus del último predicado
  english_pob_reading: the Negev and the Shephelah were inhabited
  chosen_spanish_reading: el Neguev y la Sefela estaban habitados
  alternative_spanish_readings:
  - el Neguev y la Sefela estaban poblados
  - el Neguev y la Sefela eran habitados
  rationale: El hebreo final también predica el estado de asentamiento sobre las regiones, no solo sobre Jerusalén. Se mantiene el predicado con plural neutro en español para no perder esa observación.
  doctrine_reference: Gramática del sujeto compuesto y fidelidad aspectual al participio hebreo
translation_notes:
  revision_awareness: La base inglesa fue revisada para hacer explícito el verbo 'were' antes de 'inhabited' en la cláusula final. La versión española también expresa claramente ese predicado con 'estaban habitados', manteniendo el paralelismo con la cláusula anterior y la simetría del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה según la política del proyecto.
  - Se conserva el nombre geográfico 'Neguev' y la forma tradicional 'Sefela' para regiones históricas.
  - '''Profetas anteriores'' refleja el valor temporal de הָרִאשֹׁנִים sin introducir una categoría canónica ajena al contexto.'
  - '''En calma'' traduce שְׁלֵוָה con una opción natural en español, sin imponer ''seguro'' como único matiz.'
