review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: explicación introductoria, identificación de los cuatro porteros levitas, y su responsabilidad sobre las cámaras y los depósitos de la casa de Dios. Sin embargo, hay un desajuste importante en la ubicación de la nota sobre בֶאֱמוּנָה: el hebreo expresa la idea de fidelidad/confiabilidad al inicio, pero la nota [a] está anclada a «valientes», lo que induce a leer la alternativa como si modificara גִּבֹּרֵי en vez de בֶאֱמוּנָה.'
  spanish_quality_summary: El español es claro y natural, con registro bíblico legible. «Porteros», «cámaras» y «la casa de Dios» funcionan bien. No obstante, para preservar mejor el sentido de confianza administrativa de בֶאֱמוּנָה y evitar una nota mal anclada, conviene mover la marca al verbo de responsabilidad. Además, «tesoros» como alternativa de «almacenes» es menos preciso que «tesorerías», que corresponde mejor al inglés auditado «treasuries».
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. «Dios» y «la casa de Dios» están bien. No hay nombres divinos ni títulos mesiánicos en juego. La revisión propuesta mantiene la terminología y mejora la correspondencia léxica con el expediente inglés.
  issues:
  - severity: high
    issue: La nota sobre בֶאֱמוּנָה está anclada a «valientes[a]».
    rationale: La alternativa «en fidelidad / fielmente» corresponde al sustantivo hebreo בֶאֱמוּנָה, no a גִּבֹּרֵי («valientes/mighty»). Tal como está, la nota distorsiona la relación semántica del texto fuente.
  - severity: medium
    issue: La nota c usa «tesoros» en lugar de «tesorerías».
    rationale: El expediente inglés conserva «treasuries» como alternativa para אֹצְרוֹת. En español, «tesorerías» o «depósitos de tesoros» refleja mejor un lugar de resguardo que «tesoros», que sugiere el contenido y no el espacio.
  - severity: low
    issue: «Valientes porteros» es aceptable, pero algo menos natural que «porteros valientes».
    rationale: No es un error de fidelidad, pero el orden nominal adjetival mejora la fluidez en español. Aun así, se puede mantener para no rehacer más de lo necesario.
  revised_spanish_text: Porque estos cuatro valientes porteros, que eran levitas, estaban encargados[a] de las cámaras y de los almacenes[b] de la casa de Dios.
  revised_footnotes:
  - marker: a
    text: O «en fidelidad» / «fielmente»; el hebreo enfatiza la confiabilidad o la fidelidad con que estos cuatro porteros desempeñaban su oficio.
    reason: lexical_alternative
  - marker: b
    text: O «tesorerías».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre בֶאֱמוּנָה para que recaiga sobre la expresión verbal que comunica la idea de encargo confiado, en vez de sobre «valientes». También se ajusta la alternativa de אֹצְרוֹת a «tesorerías», más fiel al expediente auditado y más precisa en español.
