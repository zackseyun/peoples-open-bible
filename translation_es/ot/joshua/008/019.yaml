review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva en general la secuencia narrativa y las decisiones léxicas principales del hebreo: el grupo emboscado se pone en acción, entra en la ciudad, la captura y la incendia. También conserva bien la nota alternativa sobre כִּנְטוֹת יָדוֹ. Sin embargo, hay un desajuste importante en וַיָּרֻצוּ, que está en plural y debe reflejarse como «corrieron», no «corrió».'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. «La emboscada» funciona aceptablemente como colectivo en español, y «prendieron fuego a la ciudad» es idiomático. No obstante, la concordancia verbal singular en «corrió» crea una aspereza innecesaria después del antecedente colectivo y contradice el cambio deliberado del hebreo al plural. Ajustarlo mejora tanto fidelidad como fluidez.
  glossary_alignment: No hay términos del glosario teológico principal en este versículo. Las decisiones léxicas son mayormente consistentes con el expediente inglés. La única corrección necesaria es alinear וַיָּרֻצוּ con un verbo plural en español.
  issues:
  - severity: medium
    issue: «corrió» no refleja el plural hebreo וַיָּרֻצוּ
    rationale: Aunque «la emboscada» puede tratarse como colectivo, el hebreo cambia de singular colectivo a plural verbal para los miembros de la fuerza. «Corrieron» preserva mejor ese matiz y suena más natural antes de «entraron».
  - severity: low
    issue: La rationale léxica defiende un singular colectivo que el texto mismo no sostiene después
    rationale: La explicación de «corrió» apela a un posible singular colectivo, pero la misma oración continúa con plurales («entraron», «la capturaron»). Esto hace inconsistente la estrategia estilística.
  revised_spanish_text: Entonces la emboscada se levantó rápidamente de su lugar y corrieron en cuanto él extendió su mano[a]; entraron en la ciudad, la capturaron y rápidamente prendieron fuego a la ciudad.
  revised_footnotes:
  - marker: a
    text: O «cuando él extendió su mano». La construcción hebrea marca el momento de la señal de Josué y puede verterse con uno u otro matiz temporal.
    reason: alternative_reading
  revision_rationale: Se corrige «corrió» a «corrieron» para reflejar el plural hebreo וַיָּרֻצוּ y mantener coherencia con los verbos plurales que siguen. Se conserva el resto del texto, incluida la nota, con una leve mejora de redacción en la glosa explicativa.
