base_translation:
  language: en
  yaml_path: translation/ot/ezra/002/068.yaml
  text: And some of the heads of the fathers’ houses[a], when they came to the house of Yahweh that is in Jerusalem, gave freewill offerings for the house of God[c][b], to set it up on its foundation.
  footnotes:
  - marker: a
    text: Or, 'family heads.' The Hebrew literally refers to 'the heads of the fathers’ houses,' an Israelite clan-based social unit.
    reason: lexical_alternative
  - marker: b
    text: Or, 'offered willingly.' The verb emphasizes voluntary giving.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to establish it in its place' or 'on its site.' The Hebrew may refer either to the temple’s foundation or to its fixed location.
    reason: alternative_reading
