translation:
  language: es
  text: Forraje y vara y cargas para un asno; pan y disciplina y trabajo para un esclavo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirviente doméstico»; el griego οἰκέτῃ se refiere específicamente a un esclavo o sirviente de la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  english_pob_choice: Fodder
  chosen_spanish: Forraje
  alternatives_spanish:
  - alimento
  - pienso
  lexicon: LSJ
  rationale: El griego se refiere a comida para animales; en español, «forraje» conserva ese valor concreto y suena natural en este proverbio sobre un asno. «Alimento» sería más general y menos preciso en este contexto.
- source_word: ῥάβδος
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cayado
  - bastón
  - garrote
  lexicon: LSJ
  rationale: En un dicho de control/corrección, ῥάβδος apunta a un instrumento de disciplina, no a un bastón de caminante. «Vara» mantiene la imagen de corrección con buena naturalidad en español.
- source_word: φορτία
  english_pob_choice: loads
  chosen_spanish: cargas
  alternatives_spanish:
  - bultos
  - pesos
  - fardos
  lexicon: LSJ
  rationale: El término designa cosas que lleva una bestia de carga. «Cargas» conserva la idea de peso llevado por el asno y resulta idiomático en español.
- source_word: ὄνῳ
  english_pob_choice: for a donkey
  chosen_spanish: para un asno
  alternatives_spanish:
  - para un burro
  - a un asno
  lexicon: LSJ
  rationale: La relación del dativo es de referencia/uso. «Para un asno» suena natural y mantiene el animal de carga del proverbio. «Asno» es más digno y bíblico que «burro», sin perder claridad.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: LSJ
  rationale: El griego dice literalmente «pan». Aunque pueda funcionar metonímicamente por comida, «pan» conserva la concreción del original y el paralelismo con los otros sustantivos.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - formación
  lexicon: LSJ
  rationale: En unión con la vara, el término tiene fuerza correctiva y formativa. «Disciplina» recoge ambas dimensiones sin reducirlo solo a castigo o solo a enseñanza.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - tarea
  - obra
  lexicon: LSJ
  rationale: Es un término amplio para actividad o labor asignada. «Trabajo» es la opción más directa y comprensible en español.
- source_word: οἰκέτῃ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  - criado
  lexicon: LSJ
  rationale: El término griego se refiere específicamente a un esclavo o sirviente doméstico, y la política del proyecto favorece no atenuar el estatus ligado con «esclavo». Aunque el matiz doméstico existe, no es necesario explicitarlo en el cuerpo del verso.
theological_decisions:
- issue: Cómo traducir οἰκέτῃ sin suavizar la condición social del trabajador doméstico
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente doméstico
  rationale: La frase presenta una analogía entre provisión/disciplina y el estatus social de un trabajador subordinado. Traducir con «esclavo» preserva la realidad social del término griego y evita diluirla con un vocablo más suave.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; términos de servidumbre esclava se mantienen cuando el contexto lo exige.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por ello, la versión española sigue de cerca las decisiones léxicas ya validadas, manteniendo el paralelismo proverbial y el contraste entre los dos miembros del versículo.
  spanish_consistency_notes:
  - Se mantiene «asno» para reflejar el animal de carga del proverbio con registro bíblico natural.
  - Se usa «esclavo» en armonía con la política del proyecto para οἰκέτῃ, y la nota aclara el matiz doméstico.
  - 'Se conservan sustantivos concretos y paralelos: forraje / vara / cargas; pan / disciplina / trabajo.'
