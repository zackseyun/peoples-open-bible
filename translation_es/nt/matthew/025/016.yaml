translation:
  language: es
  text: El que había recibido los cinco talentos fue y trabajó con ellos[a][b], y ganó otros cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se fue y trabajó con ellos»; el griego describe un uso activo del dinero para producir ganancia.
    reason: lexical_alternative
  - marker: b
    text: Un talento era una gran unidad de dinero, no una capacidad natural.
    reason: cultural_note
lexical_decisions:
- source_word: πορευθεὶς
  english_pob_choice: went and worked with them
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - habiendo ido
  - fue de inmediato
  lexicon: BDAG
  rationale: El participio puede expresarse de forma natural en español con un verbo finito. «Fue» conserva la secuencia narrativa sin introducir un matiz de rapidez que no está explícito en el texto griego.
- source_word: ὁ τὰ πέντε τάλαντα λαβὼν
  english_pob_choice: the one who had received the five talents
  chosen_spanish: el que había recibido los cinco talentos
  alternatives_spanish:
  - aquel que había recibido los cinco talentos
  - el hombre que había recibido los cinco talentos
  lexicon: BDAG
  rationale: La construcción articular participial identifica al siervo por lo que recibió. «El que había recibido» es natural en español y preserva ese valor referencial sin añadir una especificación innecesaria.
- source_word: τάλαντα
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talentos monetarios
  - grandes sumas de dinero
  lexicon: BDAG
  rationale: «Talentos» conserva el término tradicional de la parábola y, como en el inglés POB, mantiene el valor monetario del término sin reinterpretarlo como capacidad personal.
- source_word: ἠργάσατο ἐν αὐτοῖς
  english_pob_choice: worked with them
  chosen_spanish: trabajó con ellos
  alternatives_spanish:
  - negoció con ellos
  - hizo negocio con ellos
  - operó con ellos
  lexicon: BDAG
  rationale: El griego expresa uso activo de los talentos para producir ganancia. «Trabajó con ellos» sigue de cerca la fuerza verbal sin imponer más específicamente la idea de comercio, que el texto griego permite pero no exige en esta forma.
- source_word: ἐκέρδησεν
  english_pob_choice: gained
  chosen_spanish: ganó
  alternatives_spanish:
  - obtuvo
  - sacó ganancia
  - logró
  lexicon: BDAG
  rationale: «Ganó» reproduce de manera directa el sentido de obtener beneficio o provecho. En español es claro, idiomático y mantiene el resultado económico del verbo.
- source_word: ἄλλα πέντε
  english_pob_choice: another five
  chosen_spanish: otros cinco
  alternatives_spanish:
  - cinco más
  - otros cinco talentos
  lexicon: BDAG
  rationale: «Otros cinco» preserva el valor aditivo del original. Evita repetir el sustantivo cuando el griego también lo omite y suena natural en español.
translation_notes:
  revision_awareness: La redacción sigue el sentido más reciente del testimonio inglés POB, que suaviza la especificación de «traded» y prefiere una expresión más directa del uso activo de los talentos. En español se evita añadir «de inmediato» o una noción comercial más precisa de la que el griego forma básica exige.
  spanish_consistency_notes:
  - Se mantiene «talentos» como término técnico de la parábola, coherente con la tradición POB en inglés y con la distinción frente al sentido moderno de aptitud.
  - Se conserva el referente masculino genérico con «el que», acorde con la construcción griega articular participial.
  - La opción «trabajó con ellos» busca equilibrio entre literalidad y naturalidad; la nota a admite la alternativa más directa.
  - «Ganó otros cinco» respeta el cierre numérico del verso sin ampliar el contenido.
