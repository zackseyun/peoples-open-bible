  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido griego general: mantiene la doble pregunta inicial, el exilio en tierra enemiga, el envejecimiento en tierra ajena y la contaminación/asociación con los muertos. También conserva la ambigüedad teológica de συνεμιάνθης τοῖς νεκροῖς mediante nota. Sin embargo, «¿Qué es, Israel?» suena poco natural en español y no transmite con claridad el uso idiomático lamentativo de τί ἐστιν, aunque la nota sí lo explica.'
  spanish_quality_summary: 'El español es mayormente claro y digno. «Has envejecido en tierra extranjera; te has contaminado con los muertos» funciona bien. La principal debilidad es la primera cláusula: «¿Qué es, Israel?» resulta forzada y poco idiomática en español bíblico actual. Una formulación como «¿Qué te pasa, Israel?» preserva mejor el lamento y la inteligibilidad. También conviene añadir «la» en «en la tierra de tus enemigos» para mayor naturalidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Contaminado» es aceptable para συνεμιάνθης, aunque «manchado» o «hecho impuro» serían alternativas; la decisión actual está respaldada por la nota. La revisión propuesta ajusta solo idiomaticidad y fluidez, no terminología doctrinal.
  issues:
  - severity: medium
    issue: La expresión «¿Qué es, Israel?» es demasiado literal y poco natural en español.
    rationale: τί ἐστιν aquí es idiomático y lamentativo. Aunque el inglés conservó «What is it» con nota, en español «¿Qué es?» no funciona igual y puede sonar incompleto o confuso. «¿Qué te pasa, Israel?» comunica mejor la fuerza del original sin sobreparáfrasis.
  - severity: low
    issue: «en tierra de tus enemigos» puede mejorarse a «en la tierra de tus enemigos».
    rationale: La omisión del artículo no es incorrecta, pero suena algo más abrupta. Con artículo, la frase resulta más natural y sigue reflejando ἐν γῇ τῶν ἐχθρῶν.
