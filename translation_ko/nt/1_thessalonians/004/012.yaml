  text: ἵνα περιπατῆτε εὐσχημόνως πρὸς τοὺς ἔξω καὶ μηδενὸς χρείαν ἔχητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/012.yaml
  text: so that you may walk properly before outsiders and have need of nothing[a].
  footnotes:
  - marker: a
    text: Or, 'have need of no one.' The phrase may emphasize not being dependent on others.
    reason: alternative_reading
translation:
  language: ko
  text: 그리하여 여러분이 바깥 사람들 앞에서 단정하게 행하고 누구에게도 부족함이 없도록[a] 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「누구에게도 의존하지 않도록」. 본 구절은 타인에게 의지하지 않는 자립을 강조할 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐσχημόνως
  english_pob_choice: properly
  chosen_korean: 단정하게
  alternatives_korean:
  - 품위 있게
  - 합당하게
  lexicon: BDAG
  rationale: εὐσχημόνως는 「외적으로 보기에 합당함·품위 있음」. 「단정하게」가 자연스럽다.
- source_word: τοὺς ἔξω
  english_pob_choice: outsiders
  chosen_korean: 바깥 사람들
  alternatives_korean:
  - 외인들
  - 신앙 공동체 바깥의 사람들
  lexicon: BDAG
  rationale: 「바깥 사람들」이 한국어로 가장 직접적이며 본문 구조를 보존한다.
- source_word: μηδενὸς χρείαν ἔχητε
  english_pob_choice: have need of nothing
  chosen_korean: 누구에게도 부족함이 없도록
  alternatives_korean:
  - 아무것도 필요로 하지 않도록
  - 누구의 도움도 필요로 하지 않도록
  lexicon: BDAG
  rationale: μηδενός는 중성·남성 모두 가능. 본문은 두 의미가 함께 가능하므로 「누구에게도 부족함이 없다」로 둘 다 열어두고, 「누구에게도 의존하지 않음」을 각주로 살린다.
