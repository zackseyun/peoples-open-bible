    reason: lexical_alternative
  - marker: c
    text: Las «puertas» eran los lugares públicos de reunión de una ciudad, asociados con la vida cívica, el juicio y la seguridad.
    reason: cultural_note
  revision_rationale: 'La revisión corrige problemas de naturalidad y precisión sin apartarse del análisis fuente-POB: 1) reemplaza «justicias» por «actos justos» para transmitir adecuadamente צִדְקוֹת como hechos concretos de justicia/liberación; 2) cambia «Desde el sonido de» por «Del sonido de» para una sintaxis española más idiomática; 3) mejora «lugares de agua» a «abrevaderos»; y 4) ajusta el cierre a «bajó a las puertas», que fluye mejor en español manteniendo el sentido del hebreo y del POB inglés.'
