translation:
  language: es
  text: Y sus posesiones y sus asentamientos fueron Betel y sus aldeas[b], y al oriente Naarán[a], y al occidente Gezer y sus aldeas, y Siquem y sus aldeas, hasta Ayyah[c] y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Naarán es traducido por algunos como 'Naara', basado en una tradición relacionada de nombre de lugar en otra parte.
    reason: alternative_reading
  - marker: b
    text: Hebreo 'aldeas hijas' es un modismo para pueblos o aldeas dependientes de una ciudad principal.
    reason: cultural_note
  - marker: c
    text: El texto hebreo lee 'Ayyah'; algunas versiones antiguas y otros testigos reflejan 'Gaza'.
    reason: textual_variant
lexical_decisions:
- source_word: אֲחֻזָּתָם
  english_pob_choice: their holdings
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus propiedades
  - sus bienes
  - sus posesiones territoriales
  lexicon: HALOT
  rationale: En este contexto de límites territoriales, el término apunta a bienes o tenencias de tierra. 'Posesiones' comunica la idea sin forzar un tecnicismo jurídico y mantiene la relación con la lista geográfica que sigue.
- source_word: מֹשְׁבוֹתָם
  english_pob_choice: settlements
  chosen_spanish: sus lugares de habitación
  alternatives_spanish:
  - sus asentamientos
  - sus moradas
  - sus poblados
  lexicon: HALOT
  rationale: La expresión hebrea designa sitios habitados. 'Lugares de habitación' preserva el sentido básico y suena natural en español, sin reducirlo demasiado a un término moderno como 'asentamientos'.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en su forma usual en español, 'Betel', que es clara y ampliamente reconocible.
- source_word: בְנֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus pueblos dependientes
  - sus ciudades hijas
  - sus poblados satélites
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática para aldeas o poblados subordinados a una ciudad principal. En español, 'sus aldeas' comunica bien la relación sin sonar artificioso; el matiz literal de 'hijas' se conserva en la nota.
- source_word: לַמִּזְרָח
  english_pob_choice: to the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  lexicon: HALOT
  rationale: '''Al oriente'' es una formulación digna y clara para la dirección territorial. Evita una repetición excesiva de ''este'' y encaja bien en listas de fronteras.'
- source_word: נַעֲרָן
  english_pob_choice: Naaran
  chosen_spanish: Naarán
  alternatives_spanish:
  - Naaran
  - Naarah
  lexicon: HALOT
  rationale: Se translitera el nombre propio según la forma del texto masorético. Se mantiene la posibilidad alternativa de otra tradición en nota.
- source_word: לַמַּעֲרָב
  english_pob_choice: to the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - al oeste
  - hacia el occidente
  lexicon: HALOT
  rationale: '''Al occidente'' es paralelo a ''al oriente'' y funciona bien en una descripción territorial.'
- source_word: גֶּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Gézer
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración estándar.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Shequem
  lexicon: HALOT
  rationale: '''Siquem'' es la forma española tradicional y clara para este topónimo bíblico.'
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - as far as
  lexicon: HALOT
  rationale: En un listado de extensión territorial, 'hasta' expresa con precisión el límite alcanzado.
- source_word: עַיָּה
  english_pob_choice: Ayyah
  chosen_spanish: Ayyah
  alternatives_spanish:
  - Aía
  - Ayya
  lexicon: HALOT
  rationale: Se sigue la transliteración del texto hebreo masorético. La variante textual se reserva para nota, no para el cuerpo principal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto masorético y el audit trail inglés, conservando la secuencia territorial y las notas sobre el modismo de 'hijas' y la variante textual de Ayyah/Gaza. No se detectaron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se usó 'Betel' como forma española estándar para בֵּית אֵל, y 'Siquem' para שְׁכֶם.
  - Se mantuvo la secuencia direccional 'al oriente / al occidente' para reflejar el paralelismo del hebreo.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque este versículo es topográfico y no contiene el Tetragrámaton.
  - Las notas conservan la tensión entre una traducción natural ('aldeas') y el modismo literal ('hijas') sin borrarlo.
