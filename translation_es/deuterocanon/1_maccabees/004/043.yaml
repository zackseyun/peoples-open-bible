translation:
  language: es
  text: Y purificaron el santuario, y llevaron las piedras de la impureza a un lugar inmundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκαθάρισαν
  english_pob_choice: cleansed
  chosen_spanish: limpiaron
  alternatives_spanish:
  - purificaron
  - limpiaron ritualmente
  lexicon: BDAG
  rationale: El verbo expresa dejar algo limpio en sentido cultual. En español, «limpiaron» es natural y no pierde el contexto de restauración sagrada; «purificaron» sería posible, pero suena más interpretativo y menos concreto para esta frase narrativa.
- source_word: τὰ ἅγια
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - las cosas santas
  lexicon: LSJ
  rationale: En este contexto de rededicación del templo, el plural neutro apunta al ámbito sagrado del templo. «Santuario» comunica con claridad ese espacio sagrado en español sin forzar una lectura demasiado literal de «las cosas santas».
- source_word: ἦραν
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - removieron
  - se llevaron
  - transportaron
  lexicon: BDAG
  rationale: El verbo describe la acción de quitar y trasladar las piedras. «Llevaron» conserva la imagen concreta del traslado y funciona bien en español narrativo; «removieron» podría sonar más abstracto y menos físico.
- source_word: τοὺς λίθους τοῦ μιασμοῦ
  english_pob_choice: the stones of defilement
  chosen_spanish: las piedras de la profanación
  alternatives_spanish:
  - las piedras contaminadas
  - las piedras de impureza
  - las piedras profanadas
  lexicon: LSJ
  rationale: El genitivo indica piedras asociadas con contaminación ritual. «Profanación» mantiene el peso cultual del término mejor que un simple «contaminación», y en español evita reducirlo a suciedad material. Se conserva la relación con la deshonra del altar o área sagrada.
- source_word: εἰς τόπον ἀκάθαρτον
  english_pob_choice: to an unclean place
  chosen_spanish: a un lugar impuro
  alternatives_spanish:
  - a un lugar inmundo
  - a un lugar contaminado
  - a un lugar ritualmente impuro
  lexicon: BDAG
  rationale: Ἀκάθαρτος es lenguaje de impureza ritual. «Lugar impuro» preserva el registro cultual en español de forma natural y clara; «ritualmente impuro» explicita el matiz, pero añade una glosa que el griego no trae de forma expresa.
theological_decisions:
- issue: Lenguaje de pureza cultual en la restauración del templo
  english_pob_reading: Render purity language explicitly ('cleansed,' 'defilement,' 'unclean place')
  chosen_spanish_reading: Mantener visible el lenguaje de limpieza/profanación/impureza sin suavizarlo
  alternative_spanish_readings:
  - limpiaron el santuario y llevaron las piedras sucias a un lugar sucio
  - purificaron el santuario y retiraron las piedras contaminadas
  rationale: La escena trata de la restauración del santuario después de una profanación, así que conviene conservar el contraste entre limpieza sagrada e impureza ritual. «Profanación» e «impuro» mantienen ese peso teológico mejor que fórmulas meramente higiénicas.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; claridad moderna sin aplanar el peso cultual'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y la lectura auditada en inglés POB, sin introducir glosas innecesarias ni perder el campo semántico de pureza ritual.
  spanish_consistency_notes:
  - Se usa «santuario» para τὰ ἅγια en sentido templario, coherente con el contexto de rededicación.
  - Se conserva un campo léxico de pureza ritual con «limpiaron», «profanación» e «impuro», alineado con la intención auditada del POB inglés.
  - «Llevaron» mantiene el movimiento físico de ἦραν sin introducir matices no atestiguados.
