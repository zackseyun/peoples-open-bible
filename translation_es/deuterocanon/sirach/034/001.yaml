translation:
  language: es
  text: Las esperanzas[a] vacías y falsas son para un hombre insensato, y los sueños dan alas a los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «vanas y engañosas esperanzas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεναὶ
  english_pob_choice: empty
  chosen_spanish: vacías
  alternatives_spanish:
  - vanas
  - inútiles
  lexicon: LSJ
  rationale: κενός expresa vaciedad o falta de contenido; 'vacías' conserva la imagen con naturalidad en español y corresponde al valor básico de 'empty' en el audit trail.
- source_word: ψευδεῖς
  english_pob_choice: 'false'
  chosen_spanish: falsas
  alternatives_spanish:
  - engañosas
  - mentirosas
  lexicon: LSJ
  rationale: ψευδής significa 'falso' o 'no verdadero'. 'Falsas' mantiene el paralelo con 'vacías' y no añade la idea de agente engañador que no está explícita en el griego.
- source_word: ἐλπίδες
  english_pob_choice: hopes
  chosen_spanish: esperanzas
  alternatives_spanish:
  - expectativas
  lexicon: LSJ
  rationale: El sustantivo denota 'esperanzas'; 'esperanzas' es la correspondencia directa y proverbialmente natural en español.
- source_word: ἀσυνέτῳ
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - sin entendimiento
  - falto de discernimiento
  lexicon: LSJ
  rationale: ἀσύνετος apunta a falta de entendimiento o discernimiento. 'Insensato' comunica bien esa carencia sapiencial en español, sin confundirlo con ἄφρων, que aparece en la segunda cola.
- source_word: ἀνδρί
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: LSJ
  rationale: El dativo singular masculino se conserva con 'hombre' para respetar la forma proverbial y la marca de género del original, siguiendo la preferencia del proyecto por no neutralizar sin razón textual.
- source_word: ἐνύπνια
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - sueños oníricos
  - visiones de sueño
  lexicon: LSJ
  rationale: El término básico es 'sueños'; no hace falta ampliar a 'visiones' porque el texto habla de sueños como fenómeno de la noche en sentido sapiencial.
- source_word: ἀναπτεροῦσιν
  english_pob_choice: give wings to
  chosen_spanish: dan alas a
  alternatives_spanish:
  - hacen volar a
  - levantan
  lexicon: LSJ
  rationale: La metáfora de 'dar alas' reproduce con fidelidad el verbo de 'alzar/emplumar' y sugiere que los sueños arrebatan o transportan a los necios, como en el audit trail inglés.
- source_word: ἄφρονας
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fatuos
  - tontos
  lexicon: LSJ
  rationale: ἄφρων es un término sapiencial para quien carece de juicio. 'Necios' conserva ese registro bíblico-sapiencial en español y evita debilitar el contraste con 'insensato'.
theological_decisions:
- issue: 'Dos términos sapienciales distintos para la falta de juicio: ἀσύνετος y ἄφρων'
  english_pob_reading: senseless ... fools
  chosen_spanish_reading: insensato ... necios
  alternative_spanish_readings:
  - sin entendimiento ... tontos
  - falto de discernimiento ... necios
  rationale: 'El griego emplea dos vocablos emparentados pero no idénticos. Se los distingue en español con ''insensato'' y ''necios'' para no borrar la tensión semántica: uno resalta falta de discernimiento, el otro la figura sapiencial del necio.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 4
- issue: Imagen de los sueños que 'dan alas'
  english_pob_reading: dreams give wings to fools
  chosen_spanish_reading: los sueños dan alas a los necios
  alternative_spanish_readings:
  - los sueños hacen volar a los necios
  - los sueños levantan a los necios
  rationale: Se conserva la imagen metafórica sin explicitar demasiado su aplicación. En la tradición sapiencial, la imagen sugiere que los sueños impulsan o arrastran al necio fuera de la realidad.
  doctrine_reference: DOCTRINE.md §Poetic imagery and figurative language
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del inglés POB en su forma más reciente, que prefirió 'are for' para el dativo; en español se resolvió naturalmente con 'son para'. No se añadieron elementos explicativos que no estén sostenidos por el griego. La nota alternativa recoge el matiz posible de ψευδεῖς como 'engañosas', pero el texto principal mantiene la pareja más directa 'vacías y falsas'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otro equivalente no pertinente; el versículo no contiene el nombre divino.
  - Se mantuvo el paralelismo de dos miembros con ritmo sapiencial claro en español.
  - Se conservó la distinción entre 'insensato' y 'necios' para reflejar los dos términos griegos diferentes.
  - Se prefirió un registro bíblico contemporáneo y digno, sin arcaísmos innecesarios.
