translation:
  language: es
  text: Di a los que la encalan con blanqueo que caerá. Habrá una lluvia torrencial[b], y ustedes, oh piedras de granizo, caerán[a], y un viento de tormenta la romperá en pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ustedes, piedras de granizo, caerán», dirigiéndose directamente a las piedras de granizo para dar un efecto vívido.'
    reason: lexical_alternative
  - marker: b
    text: O «una lluvia desbordante».
    reason: lexical_alternative
lexical_decisions:
- source_word: טָחֵי תָפֵל
  english_pob_choice: those who plaster with whitewash
  chosen_spanish: los que revocan con cal
  alternatives_spanish:
  - los que recubren con cal
  - los que enlucen con cal
  - los que tapan con blanqueo
  lexicon: HALOT
  rationale: טָחֵי es participio de טוח, con idea de recubrir/aplicar un revestimiento. Para español, 'revocan con cal' conserva la imagen de un recubrimiento superficial y prepara el tono de engaño del contexto; 'cal' funciona bien como equivalente de 'whitewash' sin sonar arcaico. Evito 'blanqueo' por sonar más abstracto y menos material.
- source_word: וְיִפֹּל
  english_pob_choice: that it will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - y caerá
  - que caerá
  lexicon: HALOT
  rationale: El hebreo introduce el contenido del mensaje profético; en español, 'caerá' sin sujeto expreso mantiene la referencia contextual a la pared del discurso inmediato. No añado 'se' ni 'la' para no forzar un antecedente fuera del versículo, aunque la referencia contextual es clara.
- source_word: גֶּשֶׁם שׁוֹטֵף
  english_pob_choice: a flooding rain
  chosen_spanish: una lluvia torrencial
  alternatives_spanish:
  - una lluvia desbordante
  - una lluvia inundante
  - una lluvia arrasadora
  lexicon: HALOT
  rationale: שׁוֹטֵף expresa una lluvia que desborda o arrasa. 'Torrencial' es natural en español y conserva la fuerza destructiva; 'inundante' suena menos idiomático.
- source_word: אַבְנֵי אֶלְגָּבִישׁ
  english_pob_choice: hailstones
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - granizos
  - bolas de granizo
  - piedras de hielo
  lexicon: HALOT
  rationale: Aunque el POB inglés usa 'hailstones', en español 'piedras de granizo' mantiene la literalidad y la imagen poética de אבנים ('piedras') sin perder inteligibilidad. 'Granizos' sería más breve, pero diluye la metáfora de piedras.
- source_word: וְאַתֵּנָה
  english_pob_choice: and you, O hailstones
  chosen_spanish: y ustedes, oh piedras de granizo
  alternatives_spanish:
  - y ustedes, oh granizos
  - y vosotros, oh piedras de granizo
  - y ustedes, piedras de granizo
  lexicon: HALOT
  rationale: El pronombre femenino plural intensifica la apostrofación directa; en español 'ustedes' comunica esa dirección personal sin regionalizar con 'vosotros'. Conservo el vocativo 'oh' para reflejar el efecto retórico del hebreo.
- source_word: תִּפֹּלְנָה
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - caerán sobre la pared
  - van a caer
  lexicon: HALOT
  rationale: La forma plural femenina pide concordancia con 'piedras de granizo'. Mantengo el verbo simple 'caerán' para no añadir objeto explícito que el hebreo no expresa aquí.
- source_word: רוּחַ סְעָרוֹת
  english_pob_choice: a storm wind
  chosen_spanish: un viento de tormenta
  alternatives_spanish:
  - un viento tempestuoso
  - un viento huracanado
  - un viento de tempestad
  lexicon: HALOT
  rationale: '''סְעָרוֹת'' denota tormenta/torbellino violento. ''Viento de tormenta'' es cercano al inglés revisado y natural en español; conserva el carácter devastador sin exceder el alcance léxico.'
- source_word: תְּבַקֵּעַ
  english_pob_choice: will break it apart
  chosen_spanish: la romperá en pedazos
  alternatives_spanish:
  - la partirá
  - la quebrará
  - la desgarrará
  lexicon: HALOT
  rationale: בקע en piel puede expresar partir, dividir, romper abriendo. 'Romperá en pedazos' comunica la violencia de la fractura y resulta claro en español; 'partirá' sería más literal pero menos expresivo.
theological_decisions:
- issue: Referencia implícita de 'caerá' y 'la romperá' a la pared del contexto inmediato
  english_pob_reading: 'The English POB makes the wall implicit: ''that it will fall'' and ''will break it apart.'''
  chosen_spanish_reading: La traducción mantiene la referencia implícita a la pared sin explicitarla con un sustantivo añadido.
  alternative_spanish_readings:
  - caerá la pared
  - la pared caerá
  - la derribará
  rationale: El hebreo depende del contexto de los versículos vecinos; añadir 'pared' puede ayudar al lector, pero también introduce una explicitación no presente en el versículo. La solución elegida conserva la economía del original y la conexión con el discurso previo.
  doctrine_reference: Principio de transparencia textual y contexto inmediato en la profecía bíblica
translation_notes:
  revision_awareness: La base inglesa revisada pasó de 'whitewash it' a 'whitewash', de 'windstorm' a 'storm wind', y de 'break it open' a 'break it apart'. La versión española sigue esa revisión evitando añadir un objeto explícito tras 'revocan', manteniendo el viento como 'viento de tormenta' y expresando la fractura con una construcción natural que conserva el valor de ruptura de בקע.
  spanish_consistency_notes:
  - Uso 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Mantengo 'caerán' para concordar con el plural femenino de 'piedras de granizo'.
  - Evito 'SEÑOR' y no introduzco terminología eclesiástica no requerida por el hebreo.
  - '''Oh'' se usa solo por valor vocativo-retórico, no como arcaísmo general.'
