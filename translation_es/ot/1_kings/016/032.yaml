translation:
  language: es
  text: Él levantó un altar para Baal en la casa de Baal[a], que había construido en Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Baal». El hebreo dice literalmente «la casa de Baal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: He set up
  chosen_spanish: Él levantó
  alternatives_spanish:
  - Él puso
  - Él erigió
  - Él estableció
  lexicon: HALOT
  rationale: El verbo hebreo en esta forma expresa hacer que algo quede en pie o quede establecido. En español, «levantó» comunica bien la acción concreta aplicada a un altar y conserva la imagen de alzar/instalar sin sonar demasiado técnica.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un ara
  - un sacrificio
  lexicon: HALOT
  rationale: Es el equivalente directo y normal de מִזְבֵּחַ en este contexto sacrificial.
- source_word: לַבָּעַל
  english_pob_choice: for Baal
  chosen_spanish: para Baal
  alternatives_spanish:
  - a Baal
  - en honor de Baal
  lexicon: HALOT
  rationale: La preposición ל aquí marca dedicación o destino. «Para Baal» es natural en español y conserva la idea de un altar dedicado a él.
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  - el santuario de Baal
  lexicon: HALOT
  rationale: Se conserva la forma hebrea literal «casa de Baal» para mantener transparencia con el texto fuente. En español «casa» puede sonar menos cultual que «templo», pero refleja con fidelidad la construcción hebrea.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: which he had built
  chosen_spanish: que había construido
  alternatives_spanish:
  - que construyó
  - que edificó
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto en español aclara que la construcción de la casa precede a la acción de levantar el altar, como en el audit trail inglés.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: Es el topónimo estándar de שֹׁמְרוֹן y la preposición indica ubicación.
theological_decisions:
- issue: Mantener «casa de Baal» en vez de «templo de Baal»
  english_pob_reading: the house of Baal
  chosen_spanish_reading: la casa de Baal
  alternative_spanish_readings:
  - el templo de Baal
  - el santuario de Baal
  rationale: La elección preserva la transparencia al hebreo literal, que el POB inglés también privilegia. Aunque «templo» interpreta la función del edificio, «casa» deja visible la metáfora nominal del original.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no se registraron revisiones aplicadas; el consenso de revisión fue de alta concordancia y sin cambios.'
  spanish_consistency_notes:
  - Se mantiene «Baal» como nombre propio conforme al texto fuente y al audit trail inglés.
  - Se usa un estilo moderno y digno, con sintaxis natural en español y sin sustituir la transparencia léxica requerida.
  - La nota al pie conserva la alternativa interpretativa documentada en inglés, adaptada al español.
