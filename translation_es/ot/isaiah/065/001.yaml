base_translation:
  language: en
  yaml_path: translation/ot/isaiah/065/001.yaml
  text: I let myself be sought by those who did not ask[a]; I let myself be found by those who did not seek me. I said, ‘Here I am[b], here I am,’ to a nation that did not call on my name.
  footnotes:
  - marker: a
    text: Or, more literally, 'I was sought ... I was found.' The Hebrew Niphal forms can be read as simple passives, though the context suggests God's self-disclosure to those not seeking him.
    reason: lexical_alternative
  - marker: b
    text: Paul cites this verse in Romans 10:20 with reference to the Gentiles; therefore 'nation' here may be understood in that broader canonical sense.
    reason: cross_reference
