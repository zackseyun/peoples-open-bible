translation:
  language: es
  text: ¿No he sido enviado contra ti por Yahvé Dios? Porque mi guerra es junto al Éufrates[a], y ahora Yahvé está conmigo, y Yahvé está conmigo, apremiándome[b]. Apártate, y no te opongas a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el Éufrates' o 'por el Éufrates'. La frase griega sitúa el escenario de la campaña; el paralelo hebreo nombra Carquemis junto al Éufrates.
    reason: lexical_alternative
  - marker: b
    text: O 'apresurándome' o 'acelerándome'. El participio griego indica que Yahvé impulsa activamente la campaña hacia adelante.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Was I not
  chosen_spanish: ¿No he sido enviado?
  alternatives_spanish:
  - ¿Acaso no he sido enviado?
  - ¿No fui enviado?
  lexicon: BDAG
  rationale: La pregunta retórica espera una respuesta afirmativa; en español, la pasiva perfecta expresa con naturalidad la comisión divina sin perder el matiz retórico.
- source_word: πρὸς σὲ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: BDAG
  rationale: En contexto militar, la preposición adquiere fuerza adversativa; 'contra ti' reproduce esa oposición de manera clara y fiel.
- source_word: ἐξαπέσταλμαι
  english_pob_choice: was sent
  chosen_spanish: he sido enviado
  alternatives_spanish:
  - fui enviado
  - he sido mandado
  lexicon: BDAG
  rationale: El perfecto pasivo griego puede leerse con énfasis en el envío ya realizado y vigente; la pasiva española conserva la iniciativa divina sin volverlo una formulación pesada.
- source_word: ὑπὸ Κυρίου τοῦ θεοῦ
  english_pob_choice: by the Lord God
  chosen_spanish: por Yahvé, el Dios
  alternatives_spanish:
  - por el Señor Dios
  - por Yahvé Dios
  lexicon: BDAG
  rationale: Se usa 'Yahvé' por la política del proyecto para יהוה. 'el Dios' conserva el artículo griego y evita suavizar la forma del texto; se mantiene la tensión de un hablante que reivindica autoridad divina.
- source_word: ἐπὶ γὰρ τοῦ Εὐφράτου
  english_pob_choice: on the Euphrates
  chosen_spanish: en el Éufrates
  alternatives_spanish:
  - junto al Éufrates
  - junto al río Éufrates
  lexicon: BDAG
  rationale: La frase sitúa el teatro de la campaña. 'En el Éufrates' es una solución natural en español para indicar localización militar/geográfica sin forzar un calco preposicional.
- source_word: ὁ πόλεμός μού ἐστιν
  english_pob_choice: my war is
  chosen_spanish: mi guerra está
  alternatives_spanish:
  - mi guerra es
  - estoy en guerra
  lexicon: BDAG
  rationale: La copulativa española con 'está' evita asperezas y comunica que el conflicto/campaña pertenece a Neco; se preserva el énfasis posesivo del original.
- source_word: μετʼ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  lexicon: BDAG
  rationale: '''Conmigo'' mantiene la fórmula repetida de apoyo divino sin introducir una glosa interpretativa.'
- source_word: ἐπισπεύδων
  english_pob_choice: urging me on
  chosen_spanish: urgéndome
  alternatives_spanish:
  - apremiándome
  - acelerándome
  lexicon: LSJ
  rationale: El participio expresa impulso activo hacia adelante. 'Urgéndome' conserva la idea de presión/impulso con un español sobrio; se prefiere sobre una paráfrasis más libre.
- source_word: ἀπόστηθι
  english_pob_choice: Stand aside
  chosen_spanish: Apártate
  alternatives_spanish:
  - Retírate
  - Hazte a un lado
  lexicon: BDAG
  rationale: Imperativo breve y directo para cesar la interferencia; 'Apártate' es idiomático y conserva el valor exhortativo.
- source_word: μὴ ἐναντίου τῷ κυρίῳ
  english_pob_choice: do not oppose the Lord
  chosen_spanish: no te pongas contra Yahvé
  alternatives_spanish:
  - no te opongas a Yahvé
  - no vayas contra Yahvé
  lexicon: LSJ
  rationale: La expresión griega tiene fuerza adversativa personal; 'ponerse contra' transmite bien la idea de resistencia activa. Se mantiene 'Yahvé' para conservar el referente divino sin enmascararlo.
theological_decisions:
- issue: Referencia de κύριος en el discurso de Neco
  english_pob_reading: Render both occurrences as 'the Lord,' presenting Neco as claiming divine authorization without specifying covenantal identity beyond the Greek wording.
  chosen_spanish_reading: Traducir ambas ocurrencias como 'Yahvé', presentando a Neco como alguien que reclama autorización divina sin resolver la identidad del hablante o del dios invocado más allá del griego.
  alternative_spanish_readings:
  - '''el Señor'''
  - '''un dios'''
  rationale: El texto griego usa Κυρίου τοῦ θεοῦ / Κύριος, y la tradición paralela sugiere una reivindicación de autoridad divina. La traducción debe conservar esa afirmación y su tensión, no rebajarla ni explicarla de más.
  doctrine_reference: 'DOCTRINE.md: יהוה → Yahvé; κύριος → mantener la tensión teológica cuando el contexto lo exige'
translation_notes:
  revision_awareness: Revisado contra el testigo griego principal y el paralelo hebreo aproximado; no hubo cambios en la última pasada del proyecto, y la versión española conserva la tensión teológica y las alternativas léxicas documentadas en el auditrail inglés.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para יהוה según la política del proyecto.
  - '''el Dios'' mantiene el artículo del griego en ὑπὸ Κυρίου τοῦ θεοῦ; no se normaliza a una fórmula más tradicional.'
  - '''contra ti'' y ''ponerse contra'' preservan el valor adversativo de πρός y ἐναντίου en contexto militar.'
  - La nota de 'Éufrates' conserva la ambigüedad locativa documentada en el inglés POB y el paralelo hebreo.
