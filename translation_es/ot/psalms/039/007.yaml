  text: אַךְ בְּ/צֶ֤לֶם יִֽתְהַלֶּךְ אִ֗ישׁ אַךְ הֶ֥בֶל יֶהֱמָי֑וּ/ן יִ֝צְבֹּ֗ר וְֽ/לֹא יֵדַ֥ע מִי אֹסְפָֽ/ם־׀־־־־׃
