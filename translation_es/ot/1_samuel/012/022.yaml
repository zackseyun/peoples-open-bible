revisions:
- from: Porque Yahvé no abandonará a su pueblo[a], por amor de su gran nombre[b], porque Yahvé se ha complacido en haceros para sí un pueblo.
  to: Porque Yahvé no abandonará a su pueblo[a], por amor de su gran nombre[b], porque Yahvé se ha complacido en hacerlos su pueblo.
  rationale: 'Se ajusta la cláusula final a un español más natural y al sentido auditado del POB: «hacerlos su pueblo» expresa bien לַעֲשׂוֹת אֶתְכֶם לוֹ לְעָם sin el calco pesado «para sí un pueblo». También se normaliza el pronombre a una forma más neutral latinoamericana y se corrigen las notas para que cada marcador corresponda solo a su segmento textual.'
  reviewer_model: gpt-5.4
