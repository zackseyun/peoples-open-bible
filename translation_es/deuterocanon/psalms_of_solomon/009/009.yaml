review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: ὁ ποιῶν… / καὶ ὁ ποιῶν…, mantiene el contraste δικαιοσύνην / ἀδικίαν, refleja θησαυρίζει con una imagen adecuada y conserva la responsabilidad personal de αἴτιος. Sin embargo, «en destrucción» suena poco natural en español y no preserva bien la tersura inteligible del original; conviene una formulación más idiomática que siga dejando abierto el matiz de ἐν ἀπωλείᾳ.'
  spanish_quality_summary: La mayor parte del español es clara y digna. «El que hace justicia… atesora vida… con Yahvé» funciona bien. El problema principal es «responsable de su alma en destrucción», que resulta forzado y difícil de entender en español eclesial general. También el pie de nota a) no aporta alternativa real, porque repite «justicia».
  glossary_alignment: 'Buen alineamiento general con los términos del proyecto: «Yahvé» es correcto; «alma» para ψυχή está bien con nota; «justicia / injusticia» mantiene el contraste. No hay conflicto terminológico mayor, pero la nota a) debe corregirse para ofrecer una alternativa real («rectitud»).'
  issues:
  - severity: medium
    issue: La frase «responsable de su alma en destrucción» es poco idiomática en español.
    rationale: Aunque intenta seguir de cerca αἴτιος τῆς ψυχῆς ἐν ἀπωλείᾳ, en español la construcción con «responsable de… en destrucción» suena opaca. «Responsable de su alma para destrucción» aprovecha una alternativa ya documentada y comunica mejor la relación sin sobreinterpretar.
  - severity: low
    issue: La nota [a] repite el mismo término del texto.
    rationale: Si el texto principal dice «justicia», una nota que diga «O «justicia»» no ofrece información útil. Debe registrar una alternativa léxica real, como «rectitud».
  revised_spanish_text: El que hace justicia[a] atesora vida para sí con Yahvé[b], y el que hace injusticia es él mismo responsable de su alma[c] para destrucción[d].
