translation:
  language: es
  text: 'Y muchos pueblos vendrán y dirán[a]: «Vengan, subamos al monte de Yahvé, a la casa del Dios de Jacob, para que nos enseñe sus caminos y caminemos por sus sendas». Porque de Sion saldrá la instrucción[b], y de Jerusalén la palabra de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘irán’ o ‘caminarán’; el verbo hebreo literalmente significa ‘ir/caminar’, pero aquí describe a los pueblos moviéndose hacia Sion.
    reason: lexical_alternative
  - marker: b
    text: ‘Instrucción’ traduce el hebreo torá, que también puede verterse como ‘ley’ o ‘enseñanza’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכ֞וּ
  english_pob_choice: will come
  chosen_spanish: irán
  alternatives_spanish:
  - vendrán
  - caminarán
  lexicon: HALOT
  rationale: El hebreo הָלַךְ puede significar ‘ir/caminar’, y en este contexto describe el movimiento de los pueblos hacia Sion. En español, ‘irán’ conserva el desplazamiento sin sonar forzado; ‘vendrán’ introduciría una perspectiva demasiado dependiente del punto de vista del narrador.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos de gentes
  lexicon: HALOT
  rationale: ‘עַמִּים’ expresa pueblos/etnias en plural. ‘Muchos pueblos’ preserva esa amplitud mejor que ‘naciones’, que en español puede sonar más político o moderno.
- source_word: לְכוּ וְנַעֲלֶה
  english_pob_choice: Come, let us go up
  chosen_spanish: Vengan, subamos
  alternatives_spanish:
  - Vengan, ascendamos
  - Vengan, y subamos
  lexicon: HALOT
  rationale: La exhortación mantiene el llamado a la peregrinación. ‘Subamos’ conserva la idiomática bíblica de ascender a Jerusalén, y ‘Vengan’ funciona de forma natural en español imperativo plural.
- source_word: הַר יְהוָה
  english_pob_choice: the mountain of Yahweh
  chosen_spanish: el monte de Yahvé
  alternatives_spanish:
  - la montaña de Yahvé
  - el monte de Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la norma del proyecto: ‘Yahvé’. ‘Monte’ es la forma natural y digna en español para הַר en este contexto poético y cultual.'
- source_word: בֵּית אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the house of the God of Jacob
  chosen_spanish: la casa del Dios de Jacob
  alternatives_spanish:
  - el templo del Dios de Jacob
  - la casa del Dios de Israel
  lexicon: HALOT
  rationale: ‘Casa’ reproduce el hebreo בַּיִת y conserva la resonancia original. Aunque alude al templo, no conviene sustituirla por ‘templo’ sin necesidad textual.
- source_word: וְיֹרֵנוּ
  english_pob_choice: that he may teach us
  chosen_spanish: él nos enseñará
  alternatives_spanish:
  - él nos instruirá
  - que él nos enseñe
  lexicon: HALOT
  rationale: El verbo ירה en este contexto expresa enseñanza/instrucción. En español, ‘nos enseñará’ suena natural y comunica la idea sin perder el sentido de guía doctrinal o ética.
- source_word: מִדְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus vías
  - sus sendas
  lexicon: HALOT
  rationale: ‘Caminos’ es una equivalencia estable en español para ‘ways’ cuando se refiere al modo de obrar de Dios. Aquí evita una construcción artificial como ‘de sus caminos’.
- source_word: וְנֵלְכָה בְּאֹרְחֹתָיו
  english_pob_choice: and that we may walk in his paths
  chosen_spanish: y andaremos por sus sendas
  alternatives_spanish:
  - y caminaremos por sus sendas
  - y viviremos conforme a sus sendas
  lexicon: HALOT
  rationale: ‘Andaremos’ conserva el paralelismo con ‘caminos/sendas’ y expresa conducta continua. ‘Por’ es natural para un sendero/itinerario; ‘sendas’ mantiene el paralelismo poético con ‘caminos’.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la invitación y la esperanza universal. ‘Porque’ funciona claramente en español para una cláusula causal explicativa.
- source_word: תּוֹרָה
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: 'Se sigue la decisión del POB en inglés: תּוֹרָה aquí no se reduce a código legal, sino que abarca enseñanza divina. ‘Instrucción’ comunica ese rango sin importar un sentido técnico posterior ajeno al contexto.'
- source_word: תֵּצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - irá a salir
  - emanará
  lexicon: HALOT
  rationale: יצא es ‘salir’. ‘Saldrá’ es la forma más directa y elegante en español para el movimiento desde Sion.
- source_word: וּדְבַר יְהוָה
  english_pob_choice: and the word of Yahweh
  chosen_spanish: y la palabra de Yahvé
  alternatives_spanish:
  - y el mensaje de Yahvé
  - y la palabra del Señor
  lexicon: HALOT
  rationale: ‘Palabra’ preserva el paralelo profético y el registro bíblico. Se mantiene ‘Yahvé’ conforme al criterio del proyecto, en lugar de la sustitución tradicional por ‘Señor’.
- source_word: מִירוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: ‘De Jerusalén’ reproduce de manera natural la procedencia expresada por מִן y encaja bien en el paralelismo con ‘de Sion’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. El proyecto pide preservarlo con un nombre propio transparente, y en español ‘Yahvé’ es la forma normativa elegida para mantener la referencia explícita al nombre del pacto, sin enmascararlo como ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de תּוֹרָה en un contexto escatológico universal
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: ‘Instrucción’ evita restringir תּוֹרָה a legislación jurídica. En Isaías 2:3 el énfasis es el flujo de enseñanza divina desde Sion para guiar a los pueblos en sus caminos.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Implicación ética de ‘caminar’ en sus sendas
  english_pob_reading: that we may walk in his paths
  chosen_spanish_reading: y andaremos por sus sendas
  alternative_spanish_readings:
  - y caminaremos por sus sendas
  - y viviremos según sus sendas
  rationale: La metáfora hebrea de caminar expresa conducta y obediencia. ‘Andaremos por sus sendas’ mantiene ese valor ético sin convertirlo en una paráfrasis moralizante.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB inglés en el punto semántico de תּוֹרָה, evitando reducirla a ‘ley’ y manteniendo el valor más amplio de ‘instruction/instrucción’. También conserva la estructura poética y la progresión: movimiento de los pueblos, invitación a la peregrinación, enseñanza divina, y salida universal de la instrucción y la palabra de Yahvé desde Sion y Jerusalén.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, conforme a la política del proyecto.
  - Se preserva el paralelismo ‘caminos/sendas’ para reflejar el hebreo דרכים / ארחות.
  - ‘Instrucción’ se mantiene como término técnico de traducción para תּוֹרָה en este contexto.
  - El tono es bíblico pero idiomático en español, evitando calcos como ‘montaña’ o ‘ascender’ donde ‘monte’ y ‘subamos’ son más naturales.
