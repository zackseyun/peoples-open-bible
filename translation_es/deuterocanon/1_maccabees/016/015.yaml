translation:
  language: es
  text: Y el hijo de Abubús los recibió en la fortaleza llamada Dok, con engaño[a], que había construido, y les preparó un gran banquete[b]; y dejó allí hombres escondidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de manera engañosa»; el griego μετὰ δόλου mantiene el sustantivo «engaño», no solo un adverbio de modo.
    reason: lexical_alternative
  - marker: b
    text: O «les preparó una gran bebida festiva»; la expresión griega πότον μέγαν se centra literalmente en la bebida, aunque el contexto permite «banquete».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεδέξατο
  english_pob_choice: welcomed
  chosen_spanish: los recibió
  alternatives_spanish:
  - los acogió
  - los dio la bienvenida
  lexicon: LSJ
  rationale: El verbo expresa recibir con hospitalidad; en español, «los recibió» conserva esa idea sin volverla demasiado moderna o interpretativa. Dado que el contexto inmediato añade «con engaño», no conviene suavizar el matiz de acogida que prepara la traición.
- source_word: ὁ τοῦ Ἀβουβον
  english_pob_choice: the son of Abubus
  chosen_spanish: el hijo de Abubús
  alternatives_spanish:
  - el de Abubús
  - Abubús, su hijo
  lexicon: LSJ
  rationale: La frase griega es patronímica y no da el nombre personal aquí; por eso se mantiene la designación relacional. «Abubús» reproduce el nombre propio de forma readable en español y sigue el patrón del contexto narrativo.
- source_word: εἰς τὸ ὀχύρωματιν
  english_pob_choice: into the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en el fuerte
  - en la plaza fortificada
  lexicon: LSJ
  rationale: El término designa un lugar fortificado; «fortaleza» es natural en español y suficientemente general para no sobreespecificar la estructura. Aunque el griego dice «a/into», en español la preposición «en» resulta idiomática para el destino dentro de un recinto.
- source_word: τὸ καλούμενον Δὼκ
  english_pob_choice: called Dok
  chosen_spanish: llamada Dok
  alternatives_spanish:
  - nombrada Dok
  lexicon: LSJ
  rationale: La fórmula participial de denominación se vierte de manera directa con «llamada». Se conserva «Dok» como transliteración estándar del topónimo.
- source_word: μετὰ δόλου
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con dolo
  - traidoramente
  - con fraude
  lexicon: LSJ
  rationale: «Engaño» expresa bien la intención fraudulenta de la frase y es más natural que un calco técnico como «dolo». Mantiene el sustantivo griego y la fuerza moral de la acción sin añadir una glosa innecesaria.
- source_word: ὃ ᾠκοδόμησεν
  english_pob_choice: which he had built
  chosen_spanish: la cual había construido
  alternatives_spanish:
  - que había construido
  - la que construyó
  lexicon: LSJ
  rationale: Se conserva el antecedente femenino implícito de «fortaleza». El pluscuamperfecto español refleja que la construcción precedía a la recepción, como en el inglés auditado.
- source_word: ἐποίησεν αὐτοῖς πότον μέγαν
  english_pob_choice: he gave them a great banquet
  chosen_spanish: les preparó un gran banquete
  alternatives_spanish:
  - les hizo un gran banquete
  - les preparó un gran festín
  - les dio un gran banquete
  lexicon: LSJ
  rationale: El griego enfatiza literalmente una bebida/banquete abundante; el inglés POB optó por «banquet» con nota. En español, «gran banquete» comunica el evento de hospitalidad solemne, y «les preparó» refleja el carácter intencional de la acción sin negar el trasfondo de bebida.
- source_word: ἐνέκρυψεν ἐκεῖ ἄνδρας
  english_pob_choice: he had men hidden there
  chosen_spanish: escondió allí hombres
  alternatives_spanish:
  - hizo ocultar allí a hombres
  - ocultó allí a hombres
  - mandó esconder allí hombres
  lexicon: LSJ
  rationale: La construcción muestra que hombres fueron colocados ocultamente allí para la emboscada. «Escondió allí hombres» es breve y fiel; aunque el español podría explicitar el objeto con «a», se mantiene una formulación directa que preserva el paralelismo narrativo.
theological_decisions:
- issue: Hospitalidad usada como instrumento de traición
  english_pob_reading: welcomed them ... with deceit ... and he gave them a great banquet
  chosen_spanish_reading: los recibió ... con engaño ... les preparó un gran banquete
  alternative_spanish_readings:
  - los acogió ... con traición ... les dio un gran festín
  - los recibió ... de manera engañosa ... les dio un gran banquete
  rationale: 'La tensión del pasaje no es solo narrativa sino moral: la recepción amistosa está coordinada con el engaño. Se conserva esa tensión sin suavizarla ni convertirla en una reinterpretación devocional.'
  doctrine_reference: Ética bíblica sobre engaño y traición; lectura narrativa del libro de 1 Macabeos
translation_notes:
  revision_awareness: Se revisó a la luz del audit trail inglés y del griego de Swete. No se detectaron cambios de sentido mayores respecto del texto fuente; la única tensión léxica relevante es πότον μέγαν, donde el inglés optó por «banquet» con nota, y el español conserva esa decisión con una nota equivalente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el tetragrámaton ni κύριος con función de sustitución divina.
  - Se prefirió «escondió allí hombres» frente a una perífrasis más explicativa para conservar el ritmo narrativo del griego.
  - «Dok» se dejó sin adaptar fonéticamente para mantener la correspondencia con la transliteración estándar del topónimo.
