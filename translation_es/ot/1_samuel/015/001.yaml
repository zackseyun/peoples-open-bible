  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» en ambas ocurrencias; משׁח -> «ungirte»; מֶלֶךְ -> «rey»; שׁמע -> «escucha». La decisión de no calcar לְקוֹל דִּבְרֵי y de mantener una nota alternativa coincide con la auditoría inglesa y con la legibilidad del español.'
