translation:
  text: And in the eleventh jubilee, Jared took for himself a wife whose name was
    Baraka, the daughter of Rasuyal,[a] a daughter of his father's brother, in the
    fourth week of this jubilee. And she bore him a son in the fifth week, in the
    fourth year of the jubilee, and he called his name Enoch.
  philosophy: optimal-equivalence
  footnotes:
