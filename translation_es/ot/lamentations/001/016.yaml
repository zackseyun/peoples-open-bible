  to: Por estas cosas estoy llorando; mi ojo, mi ojo corre con agua, porque el consolador que restaura mi alma[a] está lejos de mí. Mis hijos han quedado desolados, porque el enemigo ha prevalecido.
  rationale: Se ajusta la imagen de יֹרְדָה מַיִם a una expresión española más fiel y poética («corre con agua») sin explicitar «lágrimas». También se simplifica רָחַק מִמֶּנִּי a «está lejos de mí», que preserva mejor la distancia/ausencia presente del consolador. Se mantiene «alma» con nota alternativa, en línea con la auditoría inglesa revisada.
