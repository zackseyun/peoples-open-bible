  text: כָּל יְמֵ֞י אֲשֶׁ֨ר הַ/נֶּ֥גַע בּ֛/וֹ יִטְמָ֖א טָמֵ֣א ה֑וּא בָּדָ֣ד יֵשֵׁ֔ב מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה מוֹשָׁבֽ/וֹ־׃ס
