    text: O «porción» para traducir נַחֲלָה en las dos apariciones de este versículo.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor de naturalidad española añadiendo 'le' con el complemento indirecto anticipado ('a la tribu de Leví'). No cambia el sentido, pero mejora la fluidez y la corrección idiomática. Se conserva el resto porque es fiel al hebreo, a la auditoría inglesa del POB y a la terminología del proyecto.
