base_translation:
  language: en
  yaml_path: translation/ot/joshua/011/001.yaml
  text: When Jabin king of Hazor heard of it[a], he sent to Jobab king of Madon, and to the king of Shimron[c][b], and to the king of Achshaph.
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened, when Jabin king of Hazor heard.' The Hebrew narrative formula is rendered idiomatically here as 'When ... heard of it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'heard'; 'of it' is implied from the preceding context.
    reason: cross_reference
  - marker: c
    text: Some identify 'Shimron' here with 'Shimron-meron' mentioned in Joshua 12:20.
    reason: alternative_reading
