- from: Entonces descendió hacia el oeste hasta el límite de los jafletitas[a], hasta el límite de Bet-horón de Abajo, y hasta Gezer; y sus salidas[b] estaban hacia el mar.
  to: Entonces descendió hacia el oeste hasta el límite de los jafletitas[a], hasta el límite de Bet-horón de Abajo, y hasta Gezer; y sus salidas[b] daban al mar.
  rationale: 'Se corrigió la cláusula final para reflejar mejor el valor concreto de יָמָּה en este contexto de deslinde: no solo dirección hacia el oeste, sino terminación en el mar. «Daban al mar» suena natural en español y conserva la idea técnica de que las extremidades de la frontera llegaban al mar. Se mantuvo «sus salidas» con nota explicativa para respetar la huella léxica del hebreo y del expediente POB.'
