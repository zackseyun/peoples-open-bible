lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo דבר introduce aquí un acto de habla narrativa y, en español, «habló» conserva bien ese valor verbal distinto de la fórmula introductoria final con לֵאמֹר. «Dijo» también sería posible, pero «habló» refleja mejor la idea de comunicación formal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte conforme al estándar POB en español como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español para משה.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva funciona como fórmula introductoria de discurso. «Diciendo» reproduce de manera idiomática y cercana la estructura hebrea, sin añadir contenido ajeno.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, no un título genérico. La traducción española sigue la decisión POB de conservar el nombre propio divino con «Yahvé», manteniendo la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el último repaso del tramo en inglés: no se registraron cambios aplicados y el veredicto de revisión fue de alta concordancia. La versión española sigue la misma lectura de flujo narrativo y del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política española POB para יְהוָה.
  - Se usa «Moisés» y no una transliteración cruda, por ser el exónimo estándar en español.
  - La fórmula «habló... diciendo» reproduce el arranque narrativo sin sobretraducir ni fusionar los dos verbos hebreos.
