    rationale: El texto principal dice «naves», pero la nota afirma como alternativa «de sus barcos» y luego dice que el hebreo literalmente dice «de sus naves». La formulación debe presentar «barcos» como alternativa y «naves» como la redacción principal/literal.
  revised_spanish_text: Y descenderán de sus naves[a] todos los que toman el remo; los marineros, todos los marineros del mar[b], estarán en tierra.
