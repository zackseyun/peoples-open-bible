translation:
  language: es
  text: Toma a los levitas en lugar de todo primogénito entre los hijos de Israel[a], y el ganado de los levitas en lugar de su ganado; y los levitas serán míos[b]. Yo soy Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los israelitas». El hebreo dice literalmente «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «me pertenecerán».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Toma para ti
  lexicon: HALOT
  rationale: El imperativo de לקח aquí ordena a Moisés tomar o designar a los levitas como sustitutos. «Toma» es natural en español y conserva el tono directo del mandato sin añadir paráfrasis.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los leviitas
  lexicon: HALOT
  rationale: Se conserva el nombre tribal usual en español bíblico. «Levitas» es claro, reconocido y fiel al referente histórico y cultual.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: En este contexto de sustitución cultual, תחת expresa reemplazo, no posición espacial. «En lugar de» comunica bien la equivalencia sustitutiva en español.
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo el primogénito
  lexicon: HALOT
  rationale: El valor distributivo de כל con un singular se vierte con «todo». «Primogénito» refleja el sustantivo hebreo y preserva la fuerza colectiva/distributiva.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: «Entre» preserva el matiz partitivo de ב. Se mantiene «hijos de Israel» para reflejar el hebreo de manera transparente, sin imponer una glosa más interpretativa.
- source_word: בֶּהֱמַת הַלְוִיִּם
  english_pob_choice: the livestock of the Levites
  chosen_spanish: el ganado de los levitas
  alternatives_spanish:
  - los animales de los levitas
  - la hacienda de los levitas
  lexicon: HALOT
  rationale: בהמה designa aquí animales domésticos/ganado. «Ganado» es un término español natural y suficientemente amplio para el sentido colectivo del hebreo.
- source_word: בְּהֶמְתָּם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su hacienda
  - sus animales
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural remite al conjunto correspondiente de Israel. «Su ganado» preserva el paralelo semántico con la primera mitad del versículo y mantiene el sentido colectivo.
- source_word: וְהָיוּ לִי
  english_pob_choice: shall be mine
  chosen_spanish: serán míos
  alternatives_spanish:
  - me pertenecerán
  - serán para mí
  lexicon: HALOT
  rationale: La frase expresa posesión pactal. «Serán míos» es solemne, conciso y fiel a la relación de pertenencia establecida en el contexto.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy Yahweh
  - Yo soy el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto: יְהוָה se traduce «Yahvé». La fórmula funciona como autoidentificación divina y cierre autoritativo del mandato.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la norma del proyecto, se preserva el nombre propio divino como «Yahvé», evitando el sustituto litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de sustitución en תַּחַת
  english_pob_reading: in place of
  chosen_spanish_reading: en lugar de
  alternative_spanish_readings:
  - en vez de
  - en sustitución de
  rationale: 'El contexto cultual habla de intercambio representativo: los levitas ocupan el lugar de los primogénitos. «En lugar de» conserva esa tensión de sustitución sin volverla excesivamente técnica.'
  doctrine_reference: HALOT / contexto cultual de sustitución en Números 3
- issue: Pertenencia pactal de los levitas
  english_pob_reading: shall be mine
  chosen_spanish_reading: serán míos
  alternative_spanish_readings:
  - me pertenecerán
  - serán para mí
  rationale: La frase declara pertenencia exclusiva de los levitas a Yahvé dentro del orden del culto. «Serán míos» comunica posesión sin reducir el matiz teológico a mera propiedad civil.
  doctrine_reference: Contexto sacerdotal y de consagración en Números 3
translation_notes:
  revision_awareness: 'La versión inglesa auditada está en alta concordancia y no requirió revisiones recientes: el último paso de revisión indicó que no había cambios necesarios. La presente redacción española sigue esa lectura estable, incorporando solo las decisiones necesarias para la norma española del proyecto sobre el nombre divino y la expresión de sustitución.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - 'Se conserva la estructura paralela del hebreo: mandato, dos frases de sustitución y cierre de autoidentificación divina.'
  - «Levitas» y «hijos de Israel» se usan en forma transparente y uniforme, evitando sustituciones interpretativas no justificadas.
