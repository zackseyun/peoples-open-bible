translation:
  language: es
  text: Pero él se demoraba, de modo que los hombres[a] agarraron firmemente su mano, la mano de su esposa y las manos de sus dos hijas, por la compasión de Yahvé para con él[b]; y lo sacaron y lo pusieron fuera de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los visitantes angelicales; el hebreo dice ‘los hombres’.
    reason: alternative_reading
  - marker: b
    text: 'O: «su mano, y la mano de su esposa, y las manos de sus dos hijas»; el hebreo repite ‘mano’ con cada complemento.'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְמַהְמָהּ
  english_pob_choice: he lingered
  chosen_spanish: él se demoraba
  alternatives_spanish:
  - él se retrasaba
  - él se detenía
  - él tardaba
  lexicon: HALOT
  rationale: El verbo expresa demora o dilación en una situación urgente. ‘Se demoraba’ es natural en español y conserva la idea narrativa de retraso sin convertirla en incertidumbre mental.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los ángeles
  - los mensajeros
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘los hombres’. Aunque el contexto identifica a estos visitantes como seres angelicales, el texto de este versículo conserva esa designación narrativa; por eso se mantiene en el cuerpo principal.
- source_word: וַיַּחֲזִקוּ
  english_pob_choice: seized
  chosen_spanish: se aferraron de
  alternatives_spanish:
  - agarraron
  - tomaron firmemente
  - se apoderaron de
  lexicon: HALOT
  rationale: La forma transmite acción fuerte y urgente. ‘Se aferraron de’ en español comunica un asimiento firme y rescatador sin sonar excesivamente violento.
- source_word: בְּיָדוֹ ... וּבְיַד אִשְׁתּוֹ ... וּבְיַד שְׁתֵּי בְנֹתָיו
  english_pob_choice: his hand, his wife’s hand, and the hands of his two daughters
  chosen_spanish: su mano, la mano de su esposa y las manos de sus dos hijas
  alternatives_spanish:
  - la mano de él, la mano de su esposa y las manos de sus dos hijas
  - su mano, la de su esposa y las de sus dos hijas
  lexicon: HALOT
  rationale: El hebreo repite ‘mano’ con cada complemento. El español conserva esa repetición de manera clara y fluida, sin forzar un plural colectivo que debilite la concreción del texto.
- source_word: בְּחֶמְלַת יְהוָה עָלָיו
  english_pob_choice: because of Yahweh’s compassion for him
  chosen_spanish: por la compasión de Yahvé para con él
  alternatives_spanish:
  - por la misericordia de Yahvé para con él
  - porque Yahvé tuvo compasión de él
  lexicon: HALOT
  rationale: חֶמְלָה expresa compasión o piedad. ‘Compasión’ preserva bien ese matiz afectivo; la construcción ‘para con él’ mantiene el sentido relacional del hebreo y evita interpretar de más.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Proyecto POB
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniéndolo visible en el texto principal en lugar de reemplazarlo por una convención de máscara.
- source_word: וַיֹּצִאֻהוּ
  english_pob_choice: they brought him out
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo trajeron fuera
  - lo condujeron fuera
  lexicon: HALOT
  rationale: El causativo de יצא se expresa con naturalidad como ‘sacar’ en español. ‘Lo sacaron’ es breve, claro y fiel al movimiento de salida forzada o asistida.
- source_word: וַיַּנִּחֻהוּ
  english_pob_choice: set him
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo dejaron
  - lo colocaron
  lexicon: HALOT
  rationale: El verbo puede implicar poner o hacer que quede en cierto lugar. ‘Lo pusieron fuera de la ciudad’ comunica el resultado espacial sin añadir la idea de abandono que podría sugerir ‘lo dejaron’.
- source_word: מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - al exterior de la ciudad
  - más allá de la ciudad
  lexicon: HALOT
  rationale: La expresión denota ubicación exterior respecto de la ciudad. ‘Fuera de la ciudad’ es la equivalencia española más directa y natural.
theological_decisions:
- issue: Identidad de los rescatadores
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - los ángeles
  - los mensajeros
  rationale: Aunque el contexto más amplio identifica a estos personajes como visitantes angelicales, el versículo mismo usa la designación ‘los hombres’. La traducción conserva esa tensión textual en el cuerpo principal y no inserta la identificación interpretativa dentro del versículo.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión narrativa; no resolver en traducción lo que el hebreo deja expresado de forma más general.
translation_notes:
  revision_awareness: 'El audit trail inglés mantuvo ‘the men’ en el texto principal y solo aclaró en nota que se trata de visitantes angelicales. También revisó la frase de las manos para conservar la repetición hebrea con un español más natural. La presente versión sigue esa línea: conserva ‘los hombres’ en el cuerpo, mantiene la estructura de ‘mano’ repetida y evita armonizar de más la escena o suavizar la urgencia del verbo.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según el estándar del proyecto para יהוה.
  - Se eligió ‘compasión’ para חֶמְלָה, evitando ‘misericordia’ en el texto principal porque ‘compasión’ refleja con precisión la lectura causal del hebreo.
  - La secuencia verbal ‘se demoraba... se aferraron... lo sacaron y lo pusieron’ conserva la progresión narrativa rápida del hebreo.
  - La nota b preserva la alternativa estructural de la frase de las manos, ya que el español puede leerse de forma más literal o más natural sin alterar el sentido.
