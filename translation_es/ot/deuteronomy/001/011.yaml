translation:
  language: es
  text: Que Yahvé[a], el Dios de sus padres, los haga mil veces tan numerosos como ahora son, y los bendiga[b], tal como les ha prometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios de sus antepasados». El hebreo dice literalmente «el Dios de sus padres».
    reason: lexical_alternative
  - marker: b
    text: O «tal como les ha hablado» o «tal como les ha dicho». El hebreo literalmente dice «tal como les ha hablado».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragramatón; la POB inglesa lo translitera como nombre propio. En español se adopta la forma establecida por el proyecto, «Yahvé», para conservar el nombre personal del pacto y no sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «Dios de sus padres». Se conserva ese enlace pactual e histórico; «padres» mantiene con fidelidad la forma masculina del hebreo y evita neutralizar el término sin necesidad.
- source_word: יֹסֵף עֲלֵיכֶם
  english_pob_choice: make you / add to you
  chosen_spanish: los haga
  alternatives_spanish:
  - los aumente
  - les añada
  lexicon: HALOT
  rationale: El valor básico es de aumentar, añadir. En español, «los haga» funciona de modo natural junto con «mil veces más», conservando la idea de incremento sin forzar un calco poco idiomático.
- source_word: כָּכֶם אֶלֶף פְּעָמִים
  english_pob_choice: a thousand times as many as you are
  chosen_spanish: mil veces más de lo que son
  alternatives_spanish:
  - mil veces como ustedes son
  - mil veces tantas veces como ustedes
  lexicon: HALOT
  rationale: La frase expresa comparación cuantitativa hiperbólica. «Mil veces más de lo que son» comunica la magnitud del hebreo de manera clara en español y mantiene el sentido de multiplicación numérica.
- source_word: וִיבָרֵךְ אֶתְכֶם
  english_pob_choice: and bless you
  chosen_spanish: y los bendiga
  alternatives_spanish:
  - y los bendiga el Señor
  - y que los bendiga
  lexicon: HALOT
  rationale: Se conserva el tono volitivo de bendición. En español, el presente de subjuntivo «los bendiga» expresa bien la petición/augurio implícito en la forma hebrea.
- source_word: כַּאֲשֶׁר דִּבֶּר לָכֶם
  english_pob_choice: just as he has spoken to you
  chosen_spanish: así como les ha hablado
  alternatives_spanish:
  - así como les ha prometido
  - tal como les dijo
  lexicon: HALOT
  rationale: דבר significa literalmente «hablar/decir». Se mantiene «ha hablado» para seguir de cerca el verbo hebreo; «prometido» es interpretativo y no se impone en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB documenta que יְהוָה se vierte como nombre propio. En español se sigue esa misma decisión con «Yahvé», preservando el nombre del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje ancestral de אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_reading: the God of your fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de sus antepasados
  rationale: Se mantiene la referencia patriarcal explícita del hebreo. Aunque «antepasados» es posible, «padres» conserva mejor la formulación del texto y la conexión pactual histórica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La POB inglesa revisó «add to you» hacia una formulación más natural («make you») y «has spoken to you» hacia «has promised you», pero el hebreo sigue diciendo «añada/incremente» y «ha hablado». En español se conserva esa tensión: el texto principal mantiene el sentido hebreo con una sintaxis natural, y las notas registran la alternativa interpretativa de promesa. También se respeta la lectura pactual de YHWH como nombre propio.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «padres» para אֱלֹהֵי אֲבֹתֵיכֶם por fidelidad al hebreo y consistencia con el lenguaje pactual.
  - «Los haga» expresa el aumento esperado por יֹסֵף sin perder naturalidad en español.
  - El subjuntivo «bendiga» refleja adecuadamente el tono optativo de la bendición.
  - No se introduce «Cristo», «SEÑOR» ni una paráfrasis doctrinal ajena al versículo.
