lexical_decisions:
- source_word: וּלְעוֹג
  english_pob_choice: and Og
  chosen_spanish: y a Og
  alternatives_spanish:
  - y Og
  - y para Og
  lexicon: HALOT
  rationale: El prefijo ל con el nombre propio conserva aquí fuerza de complemento indirecto u objeto beneficiario heredado del contexto anterior. En español, la preposición «a» expresa de manera natural ese valor sin volver la frase pesada; se mantiene además la conjunción «y» para continuar la serie litánica.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: «Rey» es la equivalencia directa y digna para el sustantivo hebreo. Se omite el artículo por economía estilística en una enumeración, aunque la noción está implícita.
- source_word: הַבָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - el Basán
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma española usual «Basán». Aunque el hebreo lleva artículo, en español el nombre propio normalmente no lo requiere.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Aquí el hebreo expresa duración indefinida dentro del refrán. En español el componente verbal ya está cubierto por la cópula «es», así que «para siempre» comunica con naturalidad la idea temporal sin añadir un verbo no explícito.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor firme
  alternatives_spanish:
  - su amor constante
  - su amor leal
  - su misericordia
  lexicon: HALOT
  rationale: חֶסֶד en este salmo tiene un peso de amor leal y duradero. «Amor firme» preserva la idea de constancia y fidelidad del término sin caer en el arcaísmo de «misericordia» ni estrecharlo solo a un matiz sentimental.
theological_decisions:
- issue: Cómo renderizar חֶסֶד en el refrán de Salmo 136
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor firme
  alternative_spanish_readings:
  - amor leal
  - amor constante
  - misericordia
  rationale: El refrán subraya la permanencia y fidelidad del amor de Yahvé. «Amor firme» conserva esa carga teológica de lealtad pactal y duración sin perder claridad en español contemporáneo.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Tratamiento del indirecto implícito con ל ante nombre propio
  english_pob_reading: and to Og
  chosen_spanish_reading: y a Og
  alternative_spanish_readings:
  - y Og
  - y para Og
  rationale: La pauta hebrea puede entenderse como un complemento regido por la secuencia narrativa anterior. En español, la preposición «a» mantiene esa relación sin forzar un calco poco natural.
  doctrine_reference: Syntactic transparency; source-bound equivalence
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa; no hay revisiones aplicadas. Se preserva la alternancia litánica del Salmo 136 y la solución de חֶסֶד como término de amor leal y perdurable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; en este versículo no aparece el tetragrámaton.
  - «Basán» mantiene la transliteración coherente con la serie de topónimos bíblicos.
  - «amor firme» se deja como equivalencia consistente para חֶסֶד en este contexto doxológico.
