translation:
  language: es
  text: Muy justamente[a]; porque había cometido muchos pecados contra el altar, cuyo fuego y cuyas cenizas eran sagrados, encontró la muerte en cenizas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Muy rectamente». La apertura griega intensifica que su destino fue merecido.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «en ceniza recibió la muerte», probablemente en eco de sus pecados contra el altar y sus cenizas sagradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάνυ δικαίως
  english_pob_choice: Very justly
  chosen_spanish: Muy justamente
  alternatives_spanish:
  - Muy rectamente
  - Muy con razón
  - Muy بحق
  lexicon: LSJ
  rationale: La combinación adverbial intensifica la justicia del desenlace. «Muy justamente» conserva πάνυ («muy, en gran manera») y δικαίως («justamente, con justicia») de forma natural en español, sin diluir la afirmación de merecimiento.
- source_word: συνετέλεσεν
  english_pob_choice: had committed
  chosen_spanish: había cometido
  alternatives_spanish:
  - había perpetrado
  - había realizado
  - había consumado
  lexicon: LSJ
  rationale: En la construcción con ἁμαρτήματα, el verbo expresa la ejecución de actos pecaminosos. «Había cometido» es la equivalencia más idiomática y fiel al valor moral del texto.
- source_word: πολλὰ ... ἁμαρτήματα
  english_pob_choice: many sins
  chosen_spanish: muchos pecados
  alternatives_spanish:
  - muchas faltas
  - muchas ofensas
  - muchos actos pecaminosos
  lexicon: LSJ
  rationale: ἁμαρτήματα mantiene fuerza religiosa y moral; «pecados» conserva mejor ese peso que opciones más débiles como «faltas» u «ofensas».
- source_word: περὶ τὸν βωμόν
  english_pob_choice: against the altar
  chosen_spanish: contra el altar
  alternatives_spanish:
  - respecto del altar
  - en torno al altar
  - acerca del altar
  lexicon: LSJ
  rationale: En este contexto de sacrilegio, περί con acusativo no indica simple referencia temática, sino acción dirigida contra el altar. «Contra el altar» reproduce esa fuerza de oposición.
- source_word: ἁγνὸν
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - puros
  - limpios
  - consagrados
  lexicon: LSJ
  rationale: El adjetivo ἁγνός en este marco cultual apunta a santidad/consagración más que a mera limpieza física. Se vierte en plural concordado con «fuego y ceniza» como «eran santos» para mantener la relación sintáctica y el sentido sacro.
- source_word: σποδός
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - residuo de ceniza
  lexicon: LSJ
  rationale: La referencia griega es a una sustancia colectiva. En español, el singular «ceniza» suele funcionar naturalmente para el material; se conserva la imagen de la ceniza del altar sin forzar el plural.
- source_word: ἐν σποδῷ
  english_pob_choice: in ashes
  chosen_spanish: en ceniza
  alternatives_spanish:
  - entre cenizas
  - en medio de cenizas
  - con ceniza
  lexicon: LSJ
  rationale: 'La expresión preserva el juego imagístico con σποδός y el contraste irónico del castigo: recibió la muerte en la misma sustancia vinculada al altar.'
- source_word: τὸν θάνατον ἐκομίσατο
  english_pob_choice: he met his death
  chosen_spanish: recibió la muerte
  alternatives_spanish:
  - sufrió la muerte
  - encontró la muerte
  - murió
  lexicon: LSJ
  rationale: κομίζομαι puede significar recibir o obtener para sí. «Recibió la muerte» mantiene la literalidad y el tono retributivo del griego, mejor que suavizarlo con «murió».
theological_decisions:
- issue: Estado sagrado del fuego y la ceniza del altar
  english_pob_reading: whose fire and ashes were holy
  chosen_spanish_reading: cuyo fuego y ceniza eran santos
  alternative_spanish_readings:
  - cuyo fuego y cenizas eran santos
  - cuyo fuego era santo y cuya ceniza era santa
  - cuyo fuego y ceniza eran puros
  rationale: El griego usa un solo predicado adjetival con dos sujetos coordinados. Mantener «eran santos» preserva la sintaxis compacta y la lectura cultual de ἁγνός como consagrado/santo, no meramente higiénico.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor retributivo del desenlace
  english_pob_reading: the fate was deserved
  chosen_spanish_reading: recibió la muerte
  alternative_spanish_readings:
  - mereció la muerte
  - sufrió una muerte merecida
  - halló la muerte
  rationale: La frase final no solo narra un deceso, sino que presenta una retribución acorde con sus pecados contra el altar. «Recibió la muerte» deja abierta esa carga retributiva sin explicitar más de lo que el griego dice.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre literalidad y naturalidad: se mantuvo la estructura causal del griego, la oposición contra el altar, la santidad cultual de fuego y ceniza, y el giro final «recibió la muerte» para conservar la resonancia retributiva. No se requirieron revisiones textuales adicionales respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «pecados» para ἁμαρτήματα por su fuerza moral-religiosa, coherente con el registro POB.
  - Se prefirió «santos» en lugar de «puros» para ἁγνός dentro del contexto cultual del altar.
  - Se conservó la imagen de «ceniza»/«en ceniza» para reflejar el posible juego verbal con σποδός.
