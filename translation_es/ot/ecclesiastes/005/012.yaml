translation:
  language: es
  text: 'Hay un mal grave que he visto debajo del sol: riqueza guardada por su dueño para su daño[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para su dueño, para su daño»; el hebreo permite representar las preposiciones de manera ligeramente distinta sin alterar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial se expresa de forma natural en español con «Hay», conservando la estructura introductoria sin sobrecargarla.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - cosa mala
  - evil
  lexicon: HALOT
  rationale: En Eclesiastés, el término suele señalar algo gravemente malo o dañino. «Maldad» mantiene el peso moral y experiencial mejor que un «mal» más genérico.
- source_word: חוֹלָה
  english_pob_choice: grievous
  chosen_spanish: dolorosa
  alternatives_spanish:
  - gravísima
  - penosa
  - enfermiza
  lexicon: HALOT
  rationale: El hebreo intensifica la idea de רָעָה con una imagen ligada a enfermedad o aflicción. «Dolorosa» comunica esa carga de sufrimiento de manera idiomática en español, sin literalismo forzado.
- source_word: רָאִיתִי
  english_pob_choice: that I have seen
  chosen_spanish: que he visto
  alternatives_spanish:
  - que vi
  lexicon: HALOT
  rationale: El perfecto expresa una observación personal del hablante. «Que he visto» conserva bien el testimonio directo y su naturalidad en español.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  lexicon: HALOT
  rationale: Se mantiene la fórmula característica de Eclesiastés. «Debajo del sol» es plenamente comprensible en español y preserva el registro tradicional del libro.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  lexicon: HALOT
  rationale: «Riqueza» comunica el valor abstracto del sustantivo con claridad moderna y evita el matiz algo arcaico de «riquezas».
- source_word: שָׁמוּר
  english_pob_choice: kept
  chosen_spanish: guardada
  alternatives_spanish:
  - reservada
  - conservada
  - custodiada
  lexicon: HALOT
  rationale: El participio pasivo indica riqueza retenida o conservada. «Guardada» es breve y natural en español, y permite sugerir la idea de acumulación sin añadir más de lo que dice el texto.
- source_word: לִבְעָלָיו
  english_pob_choice: by its owner
  chosen_spanish: por su dueño
  alternatives_spanish:
  - por su propietario
  - para su dueño
  - de su dueño
  lexicon: HALOT
  rationale: בעל aquí es «dueño/poseedor». La preposición puede reflejar relación o agencia; «por su dueño» funciona bien en español como forma causal/instrumental de la custodia.
- source_word: לְרָעָתוֹ
  english_pob_choice: to his harm
  chosen_spanish: para su propio daño
  alternatives_spanish:
  - para su daño
  - en su daño
  - para su perjuicio
  lexicon: HALOT
  rationale: La frase expresa resultado perjudicial para el poseedor. «Para su propio daño» hace explícito el referente pronominal y mantiene el valor de consecuencia negativa que el contexto exige.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido y la valoración del audit trail inglés: una observación sapiencial sobre una riqueza retenida que termina perjudicando a su propietario. No se detectaron revisiones posteriores que exigieran ajustar el contenido.'
  spanish_consistency_notes:
  - Se mantiene la fórmula de Eclesiastés «debajo del sol» para coherencia interna del libro.
  - «Dios» no aparece en este versículo; no se aplican decisiones teológicas sobre el tetragrámaton.
  - Se prefirió «dueño» sobre «propietario» por naturalidad y porque refleja bien בעל en este contexto.
  - La nota al pie conserva la alternativa sintáctica sobre las preposiciones hebreas, como en el audit trail inglés.
