translation:
  language: es
  text: No odiarás a tu hermano en tu corazón. Ciertamente reprenderás[a] a tu prójimo, y no incurrirás en pecado por causa de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «cargarás con culpa por su causa» o «participarás en su pecado». La expresión hebrea es idiomática y puede referirse a volverse culpable por no confrontar el mal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׂנָא
  english_pob_choice: hate
  chosen_spanish: odiarás
  alternatives_spanish:
  - aborrecerás
  - tendrás odio contra
  lexicon: HALOT
  rationale: El hebreo שׂנא expresa odio real, no mera antipatía. «Odiar» conserva la fuerza moral de la prohibición sin suavizarla.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu correligionario
  lexicon: HALOT
  rationale: «Hermano» reproduce el término de parentesco y mantiene su resonancia comunitaria y de pacto, como en la decisión inglesa.
- source_word: בִּלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de ti
  - en lo íntimo de tu ser
  lexicon: HALOT
  rationale: «Corazón» es el equivalente natural y fiel para לֵבָב en español bíblico y moderno, preservando la interioridad del mandato.
- source_word: הוֹכֵחַ תּוֹכִיחַ
  english_pob_choice: you shall surely rebuke
  chosen_spanish: reprenderás ciertamente
  alternatives_spanish:
  - reprenderás sin falta
  - reprenderás de veras
  - corregirás con firmeza
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la obligación. «Ciertamente» conserva ese énfasis; «reprender» refleja mejor el contexto ético-jurídico que un simple «corregir».
- source_word: עֲמִיתֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  - tu semejante
  lexicon: HALOT
  rationale: «Prójimo» expresa de forma natural el miembro de la comunidad con quien uno tiene responsabilidad ética. Aunque «neighbor» en inglés se tradujo como «neighbor», en español «prójimo» evita una lectura excesivamente geográfica de «vecino».
- source_word: תִשָּׂא עָלָיו חֵטְא
  english_pob_choice: bear sin because of him
  chosen_spanish: cargarás sobre él pecado
  alternatives_spanish:
  - llevarás culpa por causa de él
  - incurrirás en culpa por causa de él
  - participarás en su pecado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede implicar culpabilidad derivada de no confrontar el mal. «Cargarás sobre él pecado» mantiene la imagen verbal de נשׂא y deja visible la tensión interpretativa, sin resolverla de manera demasiado explicativa.
theological_decisions:
- issue: Alcance de la obligación de reprender y la culpa resultante
  english_pob_reading: The Hebrew expression is idiomatic and may refer to becoming culpable by failing to confront wrongdoing.
  chosen_spanish_reading: La frase conserva la idea de que el silencio ante el mal puede hacer culpable al que no reprende.
  alternative_spanish_readings:
  - podrías incurrir en culpa por su causa
  - podrías compartir su pecado
  - podrías hacerte responsable de su falta
  rationale: Se mantiene la tensión idiomática del hebreo sin cerrar la interpretación a una sola formulación doctrinal. La traducción principal deja abierta la relación causal entre la omisión y la culpa.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2
- issue: Alcance comunitario de «hermano» y «prójimo»
  english_pob_reading: Retain the masculine singular relational terms 'brother' and 'neighbor' rather than neutralizing them.
  chosen_spanish_reading: Se conservan los términos relacionales masculinos singulares sin neutralizarlos.
  alternative_spanish_readings:
  - tu semejante
  - tu compatriota
  - tu hermano de comunidad
  rationale: La forma singular masculina del hebreo tiene fuerza representativa. En español, «hermano» y «prójimo» preservan esa forma sin diluir el mandato en lenguaje neutro abstracto.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail inglés y no introduce revisiones sustanciales respecto del análisis base; se mantiene la tensión idiomática de חֵטְא y el énfasis intensivo de הוֹכֵחַ תּוֹכִיחַ.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término estándar del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» y también «Cristo», porque el versículo no los requiere.
  - «Prójimo» se eligió por naturalidad bíblica en español y para evitar restringir el sentido a mera vecindad física.
  - «Odiar» y «reprender» mantienen la fuerza ética del texto sin suavizarla.
