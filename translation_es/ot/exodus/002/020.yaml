translation:
  language: es
  text: 'Y él dijo a sus hijas[a]: «¿Dónde está él, pues? ¿Por qué dejaron al hombre? Llámenlo, para que coma pan[b]».'
  philosophy: optimal-equivalence
  footnotes:
