id: EXO.23.11
reference: Exodus 23:11
source:
  edition: WLC
  text: וְ/הַ/שְּׁבִיעִ֞ת תִּשְׁמְטֶ֣/נָּה וּ/נְטַשְׁתָּ֗/הּ וְ/אָֽכְלוּ֙ אֶבְיֹנֵ֣י עַמֶּ֔/ךָ וְ/יִתְרָ֕/ם תֹּאכַ֖ל חַיַּ֣ת הַ/שָּׂדֶ֑ה כֵּֽן תַּעֲשֶׂ֥ה לְ/כַרְמְ/ךָ֖ לְ/זֵיתֶֽ/ךָ־׃
translation:
  text: But in the seventh year you shall let it rest and leave it alone[a], so that the poor of your people may eat; and what they leave, the wild animals of the field may eat[b]. You shall do the same with your vineyard and your olive grove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall release it and abandon it'; the Hebrew verbs emphasize ceasing normal cultivation and leaving the land uncultivated in the seventh year.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the beast of the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁבִיעִת
  chosen: But in the seventh year
  alternatives:
  - and the seventh
  lexicon: HALOT
  rationale: Temporal phrase introducing contrast with the previous six years. 'But in the seventh year' brings out the conjunction plus ordinal in natural English while preserving the sabbatical-year reference.
- source_word: תִּשְׁמְטֶנָּה
  chosen: you shall let it rest
  alternatives:
  - you shall release it
  - you shall let it drop
  lexicon: HALOT
  rationale: From שׁמט, here referring to releasing the land from cultivation in the seventh year. 'Let it rest' communicates the agricultural sense more clearly in context than the more literal but less idiomatic 'let it drop/release it.' The feminine suffix refers back to the land from the previous verse.
- source_word: וּנְטַשְׁתָּהּ
  chosen: and leave it alone
  alternatives:
  - and abandon it
  - and let it lie fallow
  lexicon: HALOT
  rationale: נטשׁ can mean leave, forsake, abandon. In this legal-agricultural context, 'leave it alone' expresses cessation of normal use without overstating permanent abandonment. 'Lie fallow' is possible but somewhat more interpretive and technical.
- source_word: אֶבְיֹנֵי עַמֶּךָ
  chosen: the poor of your people
  alternatives:
  - the needy among your people
  lexicon: HALOT
  rationale: אביון denotes the poor/needy. 'The poor of your people' is a natural rendering that preserves the possessive relationship and social concern of the law.
- source_word: וְיִתְרָם
  chosen: what they leave
  alternatives:
  - their remainder
  - what is left of it
  lexicon: HALOT
  rationale: From יתר, 'remainder' or 'what remains.' With the 3mp suffix, the sense is what remains after the poor have eaten. 'What they leave' makes the referent explicit and reads naturally in English.
- source_word: תֹּאכַל חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field may eat
  alternatives:
  - the beasts of the field shall eat
  lexicon: HALOT
  rationale: חית השדה is a standard expression for wild animals. 'Wild animals of the field' is contemporary and clear; 'beasts' is more traditional but less natural in modern English. 'May eat' reflects the permissive/result sense in context.
- source_word: כֵּן תַּעֲשֶׂה
  chosen: You shall do the same
  alternatives:
  - thus you shall do
  - so shall you do
  lexicon: HALOT
  rationale: A straightforward legal instruction applying the same rule to what follows. 'Do the same' is idiomatic and preserves the directive force.
- source_word: לְכַרְמְךָ
  chosen: with your vineyard
  alternatives:
  - for your vineyard
  lexicon: HALOT
  rationale: Refers to the vineyard as another sphere to which the sabbatical principle applies. 'With' fits English idiom after 'do the same.'
- source_word: לְזֵיתֶךָ
  chosen: your olive grove
  alternatives:
  - your olive orchard
  - your olive trees
  lexicon: HALOT
  rationale: זית can denote olive(s) collectively; in this agricultural law, 'olive grove' best conveys the cultivated planting parallel to 'vineyard.' 'Olive trees' is possible but less collective; 'oliveyard' is archaic.
