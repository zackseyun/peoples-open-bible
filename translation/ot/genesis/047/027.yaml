id: GEN.47.27
reference: Genesis 47:27
source:
  edition: WLC
  text: וַ/יֵּ֧שֶׁב יִשְׂרָאֵ֛ל בְּ/אֶ֥רֶץ מִצְרַ֖יִם בְּ/אֶ֣רֶץ גֹּ֑שֶׁן וַ/יֵּאָחֲז֣וּ בָ֔/הּ וַ/יִּפְר֥וּ וַ/יִּרְבּ֖וּ מְאֹֽד׃
translation:
  text: So Israel settled in the land of Egypt[a], in the land of Goshen, and they gained possessions in it and were fruitful and multiplied greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they gained possessions in it,' 'they were established in it,' or more literally 'they were held/settled in it.' The Hebrew verb can suggest securing a holding or becoming firmly established in the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: settled
  alternatives:
  - lived
  - dwelt
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, or settle. In this narrative context, 'settled' best captures established residence rather than mere temporary presence, while remaining natural English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the name 'Israel.' In context this can refer corporately to Jacob's household, but the singular verb favors the named subject as Israel/Jacob representing the family. Retaining 'Israel' preserves the source wording and the representative sense.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes 'land,' and preserving it reflects the Hebrew wording and the territorial emphasis of the narrative.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  lexicon: HALOT
  rationale: As with the previous phrase, retaining 'land' mirrors the Hebrew construction and highlights Goshen as a defined region within Egypt.
- source_word: וַיֵּאָחֲזוּ בָהּ
  chosen: they acquired property in it
  alternatives:
  - they gained possessions in it
  - they took hold in it
  - they were established in it
  lexicon: HALOT
  rationale: 'The Niphal of אחז here conveys becoming established by obtaining holdings/possession in the land. ''Acquired property in it'' expresses the likely sense in context: they did not merely reside there but came to hold property or secure tenure there. This also fits the following growth language.'
- source_word: וַיִּפְרוּ
  chosen: were fruitful
  alternatives:
  - became fruitful
  - increased fruitfully
  lexicon: HALOT
  rationale: This verb echoes the recurring Genesis theme of fruitfulness. 'Were fruitful' preserves that intertextual resonance and remains idiomatic.
- source_word: וַיִּרְבּוּ
  chosen: multiplied
  alternatives:
  - became numerous
  - increased
  lexicon: HALOT
  rationale: The verb רבה in this collocation with פרה is conventionally and accurately rendered 'multiplied,' preserving the familiar Genesis blessing language.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: '''Greatly'' is a natural modern English adverb that conveys the intensifying force without sounding archaic.'
