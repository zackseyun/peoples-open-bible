translation:
  language: es
  text: Yahvé se dará a conocer a Egipto[a], y Egipto conocerá a Yahvé en aquel día; y servirán[b] con sacrificio y ofrenda, y harán votos[c] a Yahvé y los cumplirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé será conocido por Egipto». El verbo hebreo puede entenderse de manera más pasiva, pero la redacción principal destaca la autorrevelación divina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «adorarán con sacrificio y ofrenda». El verbo hebreo puede significar «servir», pero aquí se trata de un contexto de culto sacrificial.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «harán votos, votos»; es una expresión enfática que subraya que harán votos a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹדַע יְהוָה לְמִצְרַיִם
  english_pob_choice: will make himself known to Egypt
  chosen_spanish: se dará a conocer a Egipto
  alternatives_spanish:
  - será conocido por Egipto
  - se hará conocido para Egipto
  lexicon: HALOT
  rationale: El nifal de ידע admite sentido pasivo o reflexivo. En español, "se dará a conocer" comunica bien la auto-revelación divina y conserva la agencia de Yahvé sin volverlo inorgánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton conforme al criterio POB, usando la transliteración establecida "Yahvé" en lugar de sustituirlo por un título.
- source_word: לְמִצְרַיִם
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - para Egipto
  - por Egipto
  lexicon: HALOT
  rationale: La preposición con נודע marca aquí al destinatario de la auto-revelación. En español, "a Egipto" es natural y conserva esa dirección relacional.
- source_word: וְיָדְעוּ מִצְרַיִם אֶת יְהוָה
  english_pob_choice: and Egypt will know Yahweh
  chosen_spanish: y Egipto conocerá a Yahvé
  alternatives_spanish:
  - y los egipcios conocerán a Yahvé
  lexicon: HALOT
  rationale: מִצְרַיִם funciona como entidad colectiva. Mantener "Egipto" en singular preserva el paralelismo del versículo y la fuerza corporativa del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se expresa de modo idiomático en español como "en aquel día".
- source_word: וְעָבְדוּ
  english_pob_choice: they will serve / they will worship
  chosen_spanish: servirán
  alternatives_spanish:
  - adorarán
  - darán culto
  lexicon: HALOT
  rationale: El contexto sacrificial justifica el matiz cultual, pero el verbo hebreo conserva el valor de "servir". Se opta por "servirán" y se deja la claridad cultual en la frase siguiente.
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - sacrificio ofrecido
  - víctima
  lexicon: HALOT
  rationale: En contexto sacrificial, "sacrificio" es el equivalente claro y fiel.
- source_word: וּמִנְחָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda vegetal
  - oblación
  lexicon: HALOT
  rationale: מִנְחָה puede abarcar presente/ofrenda y, en ciertos contextos, ofrenda cereal. Aquí, para no forzar una especificación no explícita, "ofrenda" conserva el sentido amplio.
- source_word: וְנָדְרוּ נֵדֶר
  english_pob_choice: they will vow vows
  chosen_spanish: harán votos
  alternatives_spanish:
  - votarán votos
  - harán un voto
  lexicon: HALOT
  rationale: El hebreo usa una construcción enfática de cognado. En español, "harán votos" conserva la fuerza de hacer votos sin sonar redundante de forma artificial.
- source_word: וְשִׁלֵּמוּ
  english_pob_choice: and fulfill them
  chosen_spanish: y los cumplirán
  alternatives_spanish:
  - y los pagarán
  - y los realizarán
  lexicon: HALOT
  rationale: שלם con votos significa cumplir/pagar lo prometido. "Los cumplirán" transmite bien la idea de ejecutar lo prometido en voto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Se mantiene la transliteración "Yahvé" para preservar la referencia personal y pactal, conforme al criterio POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cultic sense of עבד in relation to sacrifice
  english_pob_reading: they will serve with sacrifice and offering
  chosen_spanish_reading: servirán con sacrificio y ofrenda
  alternative_spanish_readings:
  - adorarán con sacrificio y ofrenda
  - darán culto con sacrificio y ofrenda
  rationale: El contexto de sacrificio, ofrenda y votos exige un sentido cultual. "Servirán" conserva la raíz semántica de עבד sin perder la referencia al culto sacrificial.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y una revisión reciente que prefirió "serve" para עָבְדוּ, sin cambiar el resto del versículo. La presente propuesta sigue esa corrección de forma más literal en español con "servirán", pero mantiene la nota de sentido cultual porque el contexto inmediato de sacrificio, ofrenda, votos y cumplimiento indica adoración sacrificial.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para el Tetragrámaton, conforme al estándar POB en español.
  - Se conserva el singular corporativo "Egipto" para מִצְרַיִם, evitando una pluralización que debilite el paralelismo.
  - '"Ofrenda" se usa en sentido amplio para מִנְחָה, sin precisar indebidamente "ofrenda vegetal".'
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde cada alternativa o precisión léxica.
