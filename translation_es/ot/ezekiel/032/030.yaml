    text: Hebrew 'their terror from their might,' that is, the terror they inspired because of their military strength.
    reason: lexical_alternative
  - marker: c
    text: '''Uncircumcised'' is retained as a literal covenantal term of shame in Ezekiel''s judgment language.'
    reason: cultural_note
