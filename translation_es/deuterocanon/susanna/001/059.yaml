- from: 'Entonces Daniel le dijo: «Tú también has mentido con justicia contra tu propia cabeza; porque el ángel de Dios está al lado, con la espada para partirte en dos, para que os destruya».[a]'
  to: 'Entonces Daniel le dijo: «Tú también has mentido bien contra tu propia cabeza; porque el ángel de Dios está al lado, con la espada para partirte en dos, para que los destruya[a]».'
  rationale: Se reemplaza «con justicia» por «bien» para conservar la ironía de Ὀρθῶς en un español más natural y menos equívoco. Se cambia «os destruya» por «los destruya» para ajustarse al español neutral latinoamericano, sin perder el plural griego, que queda explicitado en la nota. También se mueve el anclaje de la nota al segmento plural relevante.
