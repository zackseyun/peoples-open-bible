- from: Así, todos los días de Adán, que vivió, fueron novecientos treinta años[a]; y murió.
  to: En total, los días de Adán[a] que vivió fueron novecientos treinta años, y murió.
  rationale: Se conserva plenamente el contenido fuente y la decisión auditada sobre אָדָם como nombre propio, pero se corrige la puntuación y se suaviza el orden para un español más natural. «En total» comunica bien el valor resumidor de la fórmula genealógica; la eliminación de las comas parentéticas evita una lectura torpe; y la sustitución del punto y coma por una coma preserva mejor la sencillez solemne de «y murió».
