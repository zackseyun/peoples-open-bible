    text: Or 'casting out' or 'hurling out'; the Hebrew verb evokes the action of a sling.
    reason: lexical_alternative
  - marker: b
    text: Or 'the inhabitants of the earth,' if the phrase is taken more broadly.
    reason: alternative_reading
  - marker: c
    text: The final clause is difficult. Or 'so that they may feel it' or 'so that they may find themselves caught.'
    reason: alternative_reading
