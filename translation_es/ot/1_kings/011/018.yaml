review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa, los topónimos y la referencia a Faraón, pero falla en un punto clave: «le dijo el pan» no comunica en español el sentido idiomático de וְלֶחֶם אָמַר לוֹ, que según el rastro auditado significa que Faraón ordenó/asignó provisiones. También «llegaron a Egipto» puede mantenerse, pero «fueron a Egipto» refleja mejor la repetición de «vinieron/fueron» en la cadena narrativa y evita variar innecesariamente el movimiento.'
  spanish_quality_summary: El texto es mayormente legible, pero «le dijo el pan» es antinatural y opaco para un lector hispano; la nota no basta para rescatar una redacción principal que resulta casi ininteligible. «Tomaron hombres con ellos de Parán» es aceptable aunque algo rígido; se puede conservar por fidelidad. «Tierra» es comprensible, pero «tierras» o «tierra» depende del matiz; «tierra» singular sigue siendo defendible.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Los nombres propios «Madián», «Parán», «Egipto» y «Faraón» están bien. La principal decisión léxica que debe alinearse con la auditoría inglesa es traducir el modismo hebreo por un español idiomático como «le asignó alimento» o equivalente, no por un calco literal en el texto principal.
  issues:
  - severity: high
    issue: «le dijo el pan» no preserva el sentido del hebreo idiomático
    rationale: La auditoría inglesa documenta que וְלֶחֶם אָמַר לוֹ significa que Faraón ordenó o asignó provisiones. El calco literal en español no es natural ni inteligible y no cumple la filosofía de equivalencia óptima.
  - severity: medium
    issue: Variación innecesaria de verbo de movimiento en «llegaron a Egipto»
    rationale: El hebreo repite וַיָּבֹאוּ en la secuencia. «Fueron/vinieron» mantendría mejor la repetición narrativa; «llegaron» no es incorrecto, pero introduce una variación no motivada.
  - severity: low
    issue: Puntuación mejorable antes de la última serie verbal
    rationale: El punto y coma no es necesario; una simple coma mantiene mejor la continuidad de la cadena narrativa hebrea.
  revised_spanish_text: Se levantaron de Madián y fueron a Parán, y tomaron hombres con ellos de Parán, y fueron a Egipto, a Faraón, rey de Egipto, y él le dio una casa, le asignó alimento[a], y le dio tierra.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y pan le dijo». La expresión indica que Faraón ordenó o asignó provisiones para él.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el único problema sustancial de fidelidad y legibilidad: el modismo hebreo sobre el pan no debe quedar como calco literal en el texto principal, sino expresarse como provisión asignada, conservando el literal en nota. También se ajusta «llegaron» a «fueron» para reflejar mejor la repetición narrativa hebrea y se suaviza la puntuación para una lectura más natural en español.'
