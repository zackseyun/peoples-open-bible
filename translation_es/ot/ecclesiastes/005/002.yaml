translation:
  language: es
  text: Porque un sueño llega con mucha preocupación[a], y la voz del necio con muchas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mucha ocupación/actividad»; también puede entenderse «por mucha ocupación».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación o fundamento para la advertencia precedente. «Porque» conserva esa relación causal/explanatoria de manera natural en español.
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - arriba
  lexicon: HALOT
  rationale: En el proverbio, el perfecto hebreo funciona de modo gnómico; «llega» expresa una verdad general sin forzar un matiz demasiado literal de movimiento.
- source_word: הַחֲלוֹם
  english_pob_choice: a dream
  chosen_spanish: un sueño
  alternatives_spanish:
  - el sueño
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí el sustantivo funciona de forma genérica/proverbial. En español, el indefinido suena más natural para una observación general.
- source_word: בְּרֹב
  english_pob_choice: with much
  chosen_spanish: con mucha
  alternatives_spanish:
  - por mucha
  - a causa de mucha
  lexicon: HALOT
  rationale: La preposición ב con רֹב expresa acompañamiento en abundancia; «con mucha» preserva esa asociación sin sobreespecificar el matiz causal.
- source_word: עִנְיָן
  english_pob_choice: preoccupation
  chosen_spanish: ocupación
  alternatives_spanish:
  - quehacer
  - actividad
  - preocupación
  lexicon: HALOT
  rationale: En Eclesiastés, el término puede referirse al asunto, tarea o ocupación que absorbe la mente. «Ocupación» mantiene la idea de estar ocupado y deja abierta la relación con la actividad mental o laboral.
- source_word: וְקוֹל
  english_pob_choice: and a fool’s voice
  chosen_spanish: y la voz del necio
  alternatives_spanish:
  - y la voz de un necio
  - y el sonido del necio
  lexicon: HALOT
  rationale: La construcción hebrea apunta a la voz caracterizada por el necio. «La voz del necio» es natural en español y conserva la imagen sapiencial.
- source_word: כְּסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  lexicon: HALOT
  rationale: «Necio» es el término sapiencial tradicional en español y expresa mejor la categoría moral del libro que equivalentes coloquiales o psicológicos.
- source_word: בְּרֹב דְּבָרִים
  english_pob_choice: with many words
  chosen_spanish: con muchas palabras
  alternatives_spanish:
  - por muchas palabras
  - en muchas palabras
  lexicon: HALOT
  rationale: 'La construcción paralela del segundo hemistiquio se vierte de modo simétrico: la voz del necio se caracteriza por el exceso verbal. «Con muchas palabras» preserva la concisión proverbial.'
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético provisto y el auditor textual inglés con acuerdo alto. Se conservó la lectura proverbial y la paralela de los dos hemistiquios, sin añadir interpretaciones más allá de lo que el hebreo y la auditoría respaldan.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se prefirió «necio» para כְּסִיל, en continuidad con la terminología sapiencial bíblica en español.
  - Se mantuvo una estructura sintáctica paralela entre los dos miembros del versículo para reflejar el hebreo.
  - El pie de nota marca la alternativa léxica principal para עִנְיָן, ya que el español «ocupación» puede abarcar tanto trabajo como asunto que ocupa la mente.
