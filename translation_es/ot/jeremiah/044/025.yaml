translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, Dios de Israel: «Ustedes y sus esposas hablaron con sus bocas[a] y lo cumplieron con sus manos, diciendo: “Sin falta cumpliremos nuestros votos que hemos hecho, para quemar incienso a la Reina del Cielo y derramarle libaciones”. Adelante, confirmen sus votos y cumplan sus votos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablaron con su boca». El hebreo conserva el contraste concreto boca/mano para señalar lo dicho y lo ejecutado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Ciertamente confirmen sus votos y ciertamente cumplan sus votos». El hebreo usa infinitivo absoluto + verbo finito dos veces para énfasis; en contexto, el tono es irónico/judicial, no aprobatorio.'
    reason: theological_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrama, siguiendo el criterio POB de no sustituirlo por una convención de título. En español, 'Yahvé' es la forma más transparente y reconocible dentro del registro bíblico actual.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Hosts'' en inglés puede sonar arcaico; en español, ''de los ejércitos'' comunica el título divino con naturalidad y sin perder el sentido de poderío celestial y militar.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como 'Dios de Israel', manteniendo el vínculo pactual y identificador del título.
- source_word: אַתֶּם וּנְשֵׁיכֶם
  english_pob_choice: You and your wives
  chosen_spanish: ustedes y sus esposas
  alternatives_spanish:
  - ustedes y sus mujeres
  lexicon: HALOT
  rationale: En este contexto de juramentos domésticos, 'esposas' es más preciso que 'mujeres'. Mantiene el referente relacional sin introducir una generalización innecesaria.
- source_word: וַתְּדַבֵּרְנָה בְּפִיכֶם
  english_pob_choice: have spoken with your mouths
  chosen_spanish: hablaron con su boca
  alternatives_spanish:
  - hablaron con sus bocas
  - hablaron de su propia boca
  lexicon: HALOT
  rationale: Se conserva el giro concreto hebreo boca/habla. Para evitar una construcción demasiado pesada, se usa singular colectivo en español ('su boca') con referente plural inclusivo del grupo, manteniendo el contraste idiomático sin forzar una literalidad extraña.
- source_word: וּבִידֵיכֶם מִלֵּאתֶם
  english_pob_choice: fulfilled it with your hands
  chosen_spanish: cumplieron con su mano
  alternatives_spanish:
  - cumplieron con sus manos
  - lo realizaron con sus manos
  - lo llevaron a cabo con sus manos
  lexicon: HALOT
  rationale: El hebreo contrapone boca y mano para señalar palabra y ejecución. 'Cumplieron' transmite el sentido de llevar a término; 'con su mano' preserva el valor concreto del instrumento. Se evita 'llenaron' por no ser transparente en español.
- source_word: עָשֹׂה נַעֲשֶׂה
  english_pob_choice: We will surely perform
  chosen_spanish: Seguro cumpliremos
  alternatives_spanish:
  - Seguramente haremos
  - Sin duda realizaremos
  - Ciertamente cumpliremos
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito expresa énfasis. En español, 'Seguro' reproduce el refuerzo sin sonar mecánico. 'Cumpliremos' se adapta al objeto 'votos', que en español se 'cumplen' de modo natural.
- source_word: נְדָרֵינוּ אֲשֶׁר נָדַרְנוּ
  english_pob_choice: our vows that we have vowed
  chosen_spanish: nuestros votos que hemos votado
  alternatives_spanish:
  - nuestros votos que hemos hecho
  - nuestros votos que hemos prometido
  - nuestros votos que hemos jurado
  lexicon: HALOT
  rationale: Se conserva el paralelismo sustantivo + verbo. 'Votos' es la forma estable en español para נדרים. 'Hemos votado' refleja aquí el cognado con el verbo 'votar' en el sentido antiguo de hacer voto, no el sufragio moderno.
- source_word: לְקַטֵּר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer humear incienso
  lexicon: HALOT
  rationale: '''Quemar incienso'' es la equivalencia cultual más clara y estable en español bíblico contemporáneo.'
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  english_pob_choice: to the Queen of Heaven
  chosen_spanish: a la Reina del Cielo
  alternatives_spanish:
  - a la reina de los cielos
  - a la Reina de los Cielos
  lexicon: HALOT
  rationale: Se conserva el título idolátrico tradicionalmente identificado en Jeremías. 'Reina del Cielo' es la forma más idiomática y reconocible en español.
- source_word: וּלְהַסֵּךְ לָהּ נְסָכִים
  english_pob_choice: and to pour out drink offerings to her
  chosen_spanish: y derramarle libaciones
  alternatives_spanish:
  - y derramarle ofrendas de bebida
  - y verterle libaciones
  lexicon: HALOT
  rationale: '''Libaciones'' mantiene el término cultual preciso; el dativo enclítico ''le'' expresa con naturalidad el destinatario femenino. Se evita ''ofrendas de bebida'' por ser más explicativo que el hebreo.'
- source_word: הָקֵים תָּקִימְנָה
  english_pob_choice: Go ahead, confirm
  chosen_spanish: Ahora, confirmen
  alternatives_spanish:
  - Confirmen de una vez
  - Vayan adelante, confirmen
  - Pues bien, confirmen
  lexicon: HALOT
  rationale: Se conserva el imperativo/volitivo con valor irónico o judicial, sin suavizar la tensión del contexto. 'Ahora' funciona como concesión retórica equivalente a 'Go ahead' en la POB inglesa.
- source_word: וְעָשֹׂה תַעֲשֶׂינָה
  english_pob_choice: and perform
  chosen_spanish: y cumplan
  alternatives_spanish:
  - y hagan
  - y ejecuten
  - y realicen
  lexicon: HALOT
  rationale: En relación con votos, 'cumplan' es la opción más natural y exacta en español, manteniendo el énfasis de la duplicación verbal.
- source_word: נִדְרֵיכֶם
  english_pob_choice: your vows
  chosen_spanish: sus votos
  alternatives_spanish:
  - sus promesas votivas
  - sus juramentos
  lexicon: HALOT
  rationale: '''Votos'' es el equivalente más directo y consistente de נדרים en todo el versículo. Se mantiene la referencia plural de segunda persona con posesivo de cortesía/neutralidad narrativa.'
theological_decisions:
- issue: 'Valor del mandato final: ironía judicial o aprobación'
  english_pob_reading: 'An ironic/judicial imperative: ''Go ahead, confirm your vows and perform your vows.'''
  chosen_spanish_reading: 'Mandato concesivo e irónico: ''Ahora, confirmen sus votos y cumplan sus votos''.'
  alternative_spanish_readings:
  - Un mandato aprobatorio literal
  - Una simple predicción de cumplimiento
  rationale: El contexto condena el culto a la Reina del Cielo; por eso, el imperativo no debe leerse como autorización divina, sino como concesión irónica/judicial. El español conserva esa tensión con una formulación sobria que no suaviza el juicio.
  doctrine_reference: Preservar la tensión teológica del texto; no convertir una ironía profética en aprobación moral.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió 'perform' para los votos por mayor cercanía al hebreo. En español, 'cumplan' mantiene mejor la colocación natural con 'votos' y conserva la fuerza del verbo repetido sin perder la consistencia semántica con el auditable cambio revisado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el tetragrama y 'Dios de Israel' para אֱלֹהֵי יִשְׂרָאֵל.
  - Se tradujo נדרים de forma uniforme como 'votos'.
  - Se preservó la imagen boca/mano como contraste entre palabra y ejecución.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino, siguiendo el marco del proyecto.
  - Se conservó el título 'Reina del Cielo' por ser la designación estable del pasaje.
