  text: כִּֽי הִנֵּ֤ה הָֽלְכוּ֙ מִ/שֹּׁ֔ד מִצְרַ֥יִם תְּקַבְּצֵ֖/ם מֹ֣ף תְּקַבְּרֵ֑/ם מַחְמַ֣ד לְ/כַסְפָּ֗/ם קִמּוֹשׂ֙ יִֽירָשֵׁ֔/ם ח֖וֹחַ בְּ/אָהֳלֵי/הֶֽם־׃
