  revision_rationale: La revisión conserva el sentido del hebreo y del POB auditado, pero reemplaza «gritar» por «decir» para un español más natural en contexto infantil y menos sobreinterpretativo. Además, restaura la alternativa léxica de קְרֹא mediante una nota, tal como hace el POB inglés, y mantiene la nota contextual sobre «el muchacho».
