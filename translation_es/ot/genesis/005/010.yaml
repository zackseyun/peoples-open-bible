translation:
  language: es
  text: Y Enosh vivió ochocientos quince años después de haber engendrado a Kenán[a][b][c], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engendró», forma más tradicional; aquí se prefiere «haber engendrado» por la construcción española con «después de».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Kenán»; formas tradicionales influidas por el griego suelen leer «Cainán» o «Cainan».
    reason: alternative_reading
  - marker: c
    text: 'O: «Y Enosh vivió, después de haber engendrado a Kenán, ochocientos quince años».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió
  lexicon: HALOT
  rationale: En la fórmula genealógica de Génesis, el perfecto narrativo de חיה se expresa naturalmente en español con «vivió». «Estuvo vivo» sería más literal pero menos idiomático.
- source_word: אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  lexicon: convención onomástica española basada en el hebreo
  rationale: Se adapta el nombre propio a una forma reconocible en español bíblico y cercana al hebreo. «Enosh» es más transliterada, pero «Enós» es más estable y legible en castellano.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La relación temporal exige una expresión natural en español; «después de» reproduce con claridad el valor temporal de la preposición.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado a
  alternatives_spanish:
  - haber padreado a
  - haber sido padre de
  - haber engendrado
  lexicon: HALOT
  rationale: El Hifil de ילד en contextos genealógicos indica engendrar/fathered. En español, «engendrar» conserva la fuerza genealógica y evita suavizar el verbo con «tener» o «ser padre de». Se usa infinitivo compuesto por dependencia de la preposición temporal.
- source_word: אֶת קֵינָן
  english_pob_choice: Kenan
  chosen_spanish: Cainán
  alternatives_spanish:
  - Kenan
  - Cainan
  lexicon: convención de nombres bíblicos
  rationale: El texto hebreo apunta a קֵינָן; en español, «Cainán» mantiene una forma bíblica tradicional cercana al hebreo y al mismo tiempo distingue la lectura de tradiciones griegas con «Cainan».
- source_word: חֲמֵשׁ עֶשְׂרֵה ... וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  english_pob_choice: eight hundred and fifteen years
  chosen_spanish: ochocientos quince años
  alternatives_spanish:
  - ochocientos y quince años
  - quince años y ochocientos años
  lexicon: HALOT
  rationale: El hebreo expresa 800 + 15 años. En español, la suma se vierte de modo natural como «ochocientos quince años», preservando el total sin forzar el orden semítico.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo genealógico con «engendró», que en español conserva la relación causal y genealógica con suficiente dignidad y precisión.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - varones y mujeres
  lexicon: HALOT
  rationale: Aunque el hebreo distingue literalmente «hijos» e «hijas», en español bíblico «hijos e hijas» expresa bien la descendencia de ambos sexos sin perder naturalidad. «Sons and daughters» se vierte con el par español convencional.
theological_decisions:
- issue: Nombre divino no presente en el versículo pero continuidad terminológica del proyecto
  english_pob_reading: The English audit trail uses source-based terminology and does not mask the divine name here.
  chosen_spanish_reading: No se introduce ningún equivalente divino porque el versículo no contiene referencia a Dios o a Yahvé.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay decisión teológica específica en este versículo; se evita añadir vocabulario interpretativo ajeno al texto.
  doctrine_reference: Principio de transparencia textual del POB
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que reordenó la cláusula para mayor naturalidad: el español sigue esa misma solución sintáctica, conectando «vivió» directamente con la duración («ochocientos quince años») y dejando la frase temporal subordinada después, sin perder el orden factual del hebreo.'
  spanish_consistency_notes:
  - Se preserva el valor genealógico del verbo con «engendró/engendrado» en vez de opciones más débiles como «tuvo» o más arcaicas como «engendró» en sentido tradicional exclusivamente.
  - Se eligió «Enós» como forma española legible, pero se conserva la nota sobre la variante «Cainán/Cainan» para reflejar la tensión de tradición frente al hebreo.
  - La suma numérica se expresa de forma natural en español, manteniendo el total exacto del hebreo.
  - Se usa puntuación española y una estructura fluida, sin perder la secuencia verbal del texto fuente.
