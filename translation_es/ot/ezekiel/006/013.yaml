review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general y la mayoría de las relaciones espaciales del hebreo, y usa correctamente «Yahvé». Sin embargo, hay varios desajustes con la evidencia fuente y con la auditoría inglesa: (1) la nota [a] está anclada a «Yahvé» pero explica גִּלּוּלִים, por lo que el marcador está en el lugar equivocado; (2) «sus muertos caigan» introduce «caigan», que no está en el hebreo ni en el POB inglés; el texto habla de «sus muertos/caídos» estando entre sus ídolos, no de un acto de caer; (3) «encina» no sigue la decisión auditada que favorece «terebinto» para אֵלָה; (4) «el lugar donde» debilita el sentido colectivo/plural reflejado en la auditoría («the places where») tras una serie distributiva de sitios; y (5) «un olor agradable» es aceptable, pero «un aroma agradable» suena más natural y más cercano al giro cultual documentado.'
  spanish_quality_summary: 'El español es mayormente legible y digno, pero tiene algunos puntos poco naturales o menos precisos: «sus muertos caigan» suena forzado; «sobre todo collado alto» es comprensible, aunque «en todo collado alto» fluye mejor; «encina espesa» mezcla tradición con menor precisión botánica que «terebinto frondoso»; y el cierre con dos puntos más «el lugar donde» resulta pesado. Una revisión menor mejora fidelidad y claridad sin cambiar el sentido global.'
  glossary_alignment: Buena alineación en «Yahvé», «ídolos» y la preservación del matiz peyorativo en nota. No obstante, el proyecto documentó אֵלָה como «terebinto», y aquí «encina» se aparta sin necesidad suficiente. También conviene mantener la nota lexical sobre גִּלּוּלִים anclada a «ídolos», no al nombre divino.
  issues:
  - severity: high
    issue: Marcador de nota mal anclado
    rationale: La nota [a] explica el término hebreo גִּלּוּלִים («ídolos» con matiz despectivo), pero en el borrador está colocada junto a «Yahvé». Esto desinforma al lector y rompe la disciplina de anclaje requerida.
  - severity: high
    issue: «caigan» agrega una acción no presente en el hebreo
    rationale: בִּהְיוֹת חַלְלֵיהֶם describe la circunstancia de que sus muertos/yacentes están entre sus ídolos; no dice «cuando caigan». Añadir «caigan» altera la imagen y el aspecto verbal.
  - severity: medium
    issue: «encina» no sigue la decisión lexical auditada para אֵלָה
    rationale: La auditoría inglesa documenta que אֵלָה se entiende mejor como «terebinto». «Encina» es más tradicional que preciso y aquí no hay razón suficiente para apartarse.
  - severity: medium
    issue: «el lugar donde» reduce indebidamente el sentido distributivo/colectivo
    rationale: Después de una lista plural de lugares de culto, el singular español suena más estrecho que el sentido colectivo reflejado por la auditoría. «Los lugares donde» representa mejor la función del hebreo en contexto.
  - severity: low
    issue: «un olor agradable» es menos idiomático que «un aroma agradable»
    rationale: Ambas opciones son posibles, pero «aroma» encaja mejor con el giro sacrificial y con el español bíblico moderno y natural.
  revised_spanish_text: 'Entonces sabrán que yo soy Yahvé, cuando sus muertos estén en medio de sus ídolos[a], alrededor de sus altares, en todo collado alto, en todas las cumbres de los montes, y debajo de todo árbol frondoso y debajo de todo terebinto frondoso: los lugares donde ofrecieron allí un aroma agradable a todos sus ídolos.'
  revised_footnotes:
