revisions:
- from: No temas[a], porque no serás avergonzada; y no te humilles, porque no serás deshonrada. Porque olvidarás la vergüenza de tu juventud[b], y no recordarás más el oprobio de tu viudez.
  to: No temas[a], porque no serás avergonzada[b]; y no seas humillada, porque no serás deshonrada. Porque olvidarás la vergüenza de tu juventud, y no recordarás más el oprobio de tu viudez.
  rationale: Se cambió «no te humilles» por «no seas humillada» para reflejar que la destinataria no debe/padecerá humillación, no que deba evitar humillarse a sí misma. Se reubicó la nota [b] en «no serás avergonzada» y se corrigió su contenido para que represente una alternativa léxica real, en línea con el expediente inglés. El resto del verso se conserva por ser fiel, claro y natural en español.
  reviewer_model: gpt-5.4
