translation:
  text: |-
    1. For the last waters that you saw, which were blacker than all those before them—these are for the whole world.[a]
    
    2. For the Most High made division from the beginning, because he alone knows what is going to happen.
    
    3. For the evil deeds of impiety that were going to come into his sight, he foresaw six kinds;[b]
    
    4. and the good works of the righteous, which were going to be accomplished before him, he likewise foresaw six kinds, besides what he is going to do at the consummation of the age.
    
    5. Therefore the black waters are not counted with the black, nor the bright with the bright.
