translation:
  language: es
  text: '¿O piensas que no hay dolor, ni aun para los ángeles ante el Poderoso, porque Sion fue entregada de esta manera, y porque, mira, las naciones se jactan en su corazón, y se reúnen ante sus ídolos y dicen: «La que por tanto tiempo pisoteó a otros es pisoteada; la que sometió a otros, ella misma ha sido sometida»?'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: grief / pain
  english_pob_choice: grief
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - aflicción
  - pesar
  lexicon: No lexicon entry number invented; decision based on source semantics in context
  rationale: El contexto es de lamento cósmico por la entrega de Sion; en español, 'dolor' comunica con naturalidad una pena intensa y general sin añadir una matización psicológica excesiva. 'Grief' en el inglés POB puede abarcar duelo/pena; 'dolor' conserva esa amplitud.
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Omnipotente
  lexicon: No lexicon entry number invented; preserving divine epithet
  rationale: '''El Poderoso'' refleja el epíteto divino sin sustituirlo por una fórmula litúrgica más tradicional que podría oscurecer el matiz de potencia soberana.'
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: No lexicon entry number invented; established biblical toponym
  rationale: '''Sion'' es una forma bíblica plenamente reconocible en español y se ajusta al uso común en traducciones bíblicas formales.'
- source_word: boast in their hearts
  english_pob_choice: boast in their hearts
  chosen_spanish: se jactan en su corazón
  alternatives_spanish:
  - se glorían en su corazón
  - se vanaglorian en su corazón
  lexicon: No lexicon entry number invented; semantic parallel with inner boast
  rationale: '''Jactarse'' expresa bien la arrogancia interior atribuida a las naciones, manteniendo el carácter interno (''en su corazón'') sin suavizarlo.'
- source_word: gather before their idols
  english_pob_choice: gather before their idols
  chosen_spanish: se reúnen ante sus ídolos
  alternatives_spanish:
  - se congregan ante sus ídolos
  - se juntan ante sus ídolos
  lexicon: No lexicon entry number invented; reflects verbal participle chain in Syriac
  rationale: La revisión auditada corrige una lectura nominal errónea; 'se reúnen' preserva la acción verbal continua y el paralelismo con 'se jactan' y 'dicen'.
- source_word: trampled others / subjected others
  english_pob_choice: She who long trampled others is trampled down; she who brought others into subjection has herself been subjected
  chosen_spanish: La que durante mucho tiempo pisoteó a otros, es pisoteada; la que sometió a otros, ella misma ha sido sometida
  alternatives_spanish:
  - La que por largo tiempo aplastó a otros, es aplastada; la que puso a otros bajo dominio, ella misma ha sido puesta bajo dominio
  - La que oprimió a otros, es oprimida; la que sujetó a otros, ella misma ha sido sujeta
  lexicon: No lexicon entry number invented; idiomatic mirror construction
  rationale: '''Pisotear'' conserva la imagen corporal del texto y el paralelismo verbal. ''Someter'' y ''ser sometida'' mantienen la relación causa-efecto sin exagerar ni moralizar más allá del original.'
theological_decisions:
- issue: ¿Hay dolor incluso para los ángeles ante el Poderoso?
  english_pob_reading: Or do you think there is no grief, even for the angels before the Mighty One...
  chosen_spanish_reading: ¿O piensas que no hay dolor, ni siquiera para los ángeles ante el Poderoso...?
  alternative_spanish_readings:
  - ¿O crees que no hay pena, ni siquiera para los ángeles delante del Poderoso...
  - ¿O piensas que ni aun los ángeles ante el Poderoso sienten pesar...
  rationale: Se conserva la afirmación extraordinaria del texto sobre el sufrimiento celestial ante la caída de Sion, sin rebajarla a mera observación humana. 'Ante el Poderoso' mantiene la escena de presencia divina.
  doctrine_reference: Angelology / divine judgment lament
- issue: ¿'Las naciones' o 'las multitudes' ante sus ídolos?
  english_pob_reading: the nations boast in their hearts, and they gather before their idols
  chosen_spanish_reading: las naciones se jactan en su corazón, y se reúnen ante sus ídolos
  alternative_spanish_readings:
  - las multitudes se jactan en su corazón, y se reúnen ante sus ídolos
  - las naciones se glorían en su corazón, y se congregan ante sus ídolos
  rationale: La corrección auditada favorece 'las naciones' como sujeto verbal; no se adopta 'multitudes' porque esa opción seguiría una lectura descartada por el equipo de revisión. La referencia a ídolos se mantiene explícita, conforme al contraste entre el Dios verdadero y los ídolos.
  doctrine_reference: Idolatry / nations
translation_notes:
  revision_awareness: La revisión auditada corrigió una lectura anterior de 'and the throngs before their idols say' a 'and they gather before their idols and say', al entender el siríaco knšyn como participio verbal. La versión española refleja esa decisión con 'se reúnen' y mantiene el sujeto 'las naciones' en concordancia con el flujo verbal del texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; aquí el texto usa 'el Poderoso', por lo que no corresponde sustituirlo.
  - Se mantiene 'Sion' como forma bíblica estable en español.
  - Se conserva el paralelismo retórico del verso con dos cláusulas coordinadas y una cita final directa.
  - No se introduce 'Cristo', 'Señor' ni otras fórmulas eclesiales no presentes en el original.
