translation:
  language: es
  text: 'Estas son las personas que Nabucodonosor llevó cautivas[a]: en el séptimo año, 3.023 judeanos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘exilió’ o ‘deportó’ para traducir ‘llevó cautivas’.
    reason: lexical_alternative
  - marker: b
    text: ‘Judeanos’ enfatiza personas del reino/provincia de Judá; tradicionalmente, ‘judíos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הָעָם
  english_pob_choice: These are the people
  chosen_spanish: Estos son los habitantes
  alternatives_spanish:
  - Este es el pueblo
  - Estas son las personas
  lexicon: HALOT
  rationale: La construcción hebrea es singular en forma, pero introduce un resumen colectivo seguido de una lista numérica. En español, 'Estos son...' suena natural para una enumeración, y 'habitantes' conserva el sentido de población/people sin imponer una lectura eclesiástica o étnica más fuerte de la necesaria.
- source_word: הֶגְלָה
  english_pob_choice: carried away captive
  chosen_spanish: llevó cautivos
  alternatives_spanish:
  - exilió
  - deportó
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar el traslado forzado al exilio. 'Llevó cautivos' conserva la fuerza concreta de captura y traslado, y encaja bien con el contexto histórico. 'Exilió' y 'deportó' son posibles, pero son menos concretos o menos tradicionales en este pasaje.
- source_word: בִּשְׁנַת שֶׁבַע
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - en año siete
  lexicon: HALOT
  rationale: La expresión ordinal es la equivalente natural en español y mantiene el valor cronológico del hebreo.
- source_word: יְהוּדִים
  english_pob_choice: Judeans
  chosen_spanish: judeanos
  alternatives_spanish:
  - judíos
  - hombres de Judá
  lexicon: HALOT
  rationale: En este contexto exílico-histórico, el término apunta a personas de Judá más que al sentido religioso posterior de 'judíos'. 'Judeanos' preserva mejor la referencia geográfico-étnica documentada por el POB en inglés.
- source_word: שְׁלֹשֶׁת אֲלָפִים וְעֶשְׂרִים וּשְׁלֹשָׁה
  english_pob_choice: 3,023
  chosen_spanish: '3.023'
  alternatives_spanish:
  - tres mil veintitrés
  lexicon: HALOT
  rationale: La cifra hebrea es aditiva y no presenta ambigüedad; el uso de numerales mejora la legibilidad en español en un registro de lista censal. Se adopta la convención decimal española con punto como separador de miles.
theological_decisions:
- issue: Término étnico-histórico para יְהוּדִים
  english_pob_reading: '''Judeans'' emphasizes people from the kingdom/province of Judah; traditionally ''Jews.'''
  chosen_spanish_reading: '''judeanos'' enfatiza el vínculo con Judá como territorio/pueblo del exilio, no un sentido religioso posterior.'
  alternative_spanish_readings:
  - '''judíos'''
  - '''hombres de Judá'''
  rationale: No hay carga doctrinal directa, pero sí una precisión histórico-semántica importante. 'Judeanos' evita proyectar sobre el texto el desarrollo posterior del término 'judíos' y sigue el criterio auditado del POB.
  doctrine_reference: Precisión histórico-semántica; contexto del exilio de Judá.
translation_notes:
  revision_awareness: Se siguió el juicio de alta concordancia del audit trail inglés (agreement 0.98) sin cambios sustantivos. Se ajustó el español para sonar natural y mantener la distinción histórico-lexical de 'judeanos', la idea de traslado forzado en 'llevó cautivos' y la cifra en formato legible para español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el Tetragrámaton aparece; aquí no ocurre.
  - Se usa 'judeanos' de forma consistente con el criterio POB para יְהוּדִים en contextos exílicos.
  - La cifra se presenta con separador de miles propio del español.
  - El registro es sobrio y narrativo-listado, acorde con una nota histórica de enumeración.
