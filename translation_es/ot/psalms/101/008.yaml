translation:
  language: es
  text: Mañana tras mañana destruiré[a] a todos los impíos del país[b], para eliminar de la ciudad de Yahvé a todos los que practican la iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede expresarse como «haré perecer» o «pondré fin a».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea אֶרֶץ puede significar «tierra» o «mundo». Aquí se traduce «país» porque el marco real del salmo apunta al territorio bajo gobierno, aunque «tierra» o «mundo» son posibilidades léxicas en otros contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַבְּקָרִים
  english_pob_choice: Morning by morning
  chosen_spanish: Mañana tras mañana
  alternatives_spanish:
  - Cada mañana
  - Mañana por mañana
  lexicon: HALOT
  rationale: La forma plural distributiva pide una idea iterativa; en español, «mañana tras mañana» comunica esa repetición con naturalidad y mantiene el énfasis de acción continua.
- source_word: אַצְמִית
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - daré muerte
  - haré cesar
  - acabaré con
  lexicon: HALOT
  rationale: El hiphil de צמת expresa hacer perecer o destruir. «Destruiré» es directo y conserva el peso judicial del verbo sin añadir matices no sustentados.
- source_word: כָּל רִשְׁעֵי אָרֶץ
  english_pob_choice: all the wicked of the land
  chosen_spanish: a todos los impíos de la tierra
  alternatives_spanish:
  - a todos los malvados de la tierra
  - a todos los impíos del país
  - a todos los impíos del mundo
  lexicon: HALOT
  rationale: '«רִשְׁעֵי» funciona como sustantivo: los impíos. «Tierra» mantiene la ambigüedad lexical de אָרֶץ sin imponer «mundo», y encaja bien con el contexto real y territorial del salmo.'
- source_word: לְהַכְרִית
  english_pob_choice: cutting off
  chosen_spanish: para eliminar
  alternatives_spanish:
  - para cortar
  - para extirpar
  - para apartar
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa propósito. «Eliminar» comunica la fuerza de כרת en este contexto de expulsión/jucio, sin sonar artificial en español. Se conserva la relación de finalidad con el verbo anterior.
- source_word: מֵעִיר יְהוָה
  english_pob_choice: from the city of Yahweh
  chosen_spanish: de la ciudad de Yahvé
  alternatives_spanish:
  - de la ciudad de Yahweh
  - de la ciudad del Yahvé
  - de la ciudad del Señor
  lexicon: HALOT
  rationale: La estructura constructa se vierte naturalmente como «ciudad de Yahvé». Se mantiene el nombre divino según la convención del proyecto, y «de» preserva la relación posesiva/relacional del hebreo.
- source_word: כָּל פֹּעֲלֵי אָוֶן
  english_pob_choice: all workers of iniquity
  chosen_spanish: a todos los que hacen iniquidad
  alternatives_spanish:
  - a todos los obradores de iniquidad
  - a todos los trabajadores de iniquidad
  - a todos los hacedores de maldad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los que trabajan/hacen iniquidad». «Los que hacen iniquidad» conserva el paralelismo verbal y evita una frase arcaizante, mientras mantiene la fuerza moral del original.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - mundo
  rationale: El inglés POB opta por «land» por el marco real y administrativo del salmo. En español, «tierra» conserva mejor la amplitud semántica de אָרֶץ y deja abierta la misma tensión contextual entre territorio concreto y ámbito más amplio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. La convención española del proyecto es transliterar como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con la última revisión auditada: no hubo cambios de contenido doctrinal ni textuales en el pass más reciente, y la cruz de control informó acuerdo alto (1.0). La versión española conserva la lectura de Yahvé, la iteración distributiva de לַבְּקָרִים y la tensión lexical de אֶרֶץ sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Iniquidad» se conserva para אָוֶן para mantener la red semántica moral del hebreo y el eco con el inglés auditado.
  - Se mantiene una sintaxis solemne y pública, adecuada para un salmo real/judicial.
  - Los marcadores de nota se aplican solo donde hay una alternativa lexical relevante en el texto.
