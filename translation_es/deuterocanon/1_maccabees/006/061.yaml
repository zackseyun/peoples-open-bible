revisions:
- from: Y el rey y los gobernantes les juraron esto[a]; luego salió de la fortaleza[b].
  to: Y el rey y los gobernantes les juraron esto[a]; entonces él salió de la fortaleza[b].
  rationale: Se introduce 'él' para que el singular de ἐξῆλθεν quede claro y natural en español, sin borrar la particularidad del texto griego. También se pule la nota [a] para mejorar la idiomaticidad y precisión.
