translation:
  language: es
  text: 'Y engastaron en él cuatro hileras de piedras: la primera hilera fue un rubí[a], un topacio y una esmeralda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de estas gemas es incierta; «rubí», «topacio» y «esmeralda» siguen traducciones tradicionales. Entre las alternativas posibles están «cornalina» para el rubí, «crisólito» para el topacio y otra piedra verde o brillante para la esmeralda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַלְאוּ
  english_pob_choice: they mounted
  chosen_spanish: llenaron
  alternatives_spanish:
  - montaron
  - pusieron
  - engastaron
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'llenaron', y en español esa forma conserva bien la imagen de colocar las piedras en sus alojamientos. 'Montaron' o 'engastaron' serían más interpretativas; aquí se prefiere mantener la fuerza verbal del original con un español natural.
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en ella
  lexicon: HALOT
  rationale: El sufijo pronominal remite al pectoral. En español, el sintagma más natural para la colocación de las piedras es 'en él', aunque la imagen física pueda sugerir 'sobre él'.
- source_word: אַרְבָּעָה טוּרֵי אָבֶן
  english_pob_choice: four rows of stones
  chosen_spanish: cuatro hileras de piedras
  alternatives_spanish:
  - cuatro filas de piedras
  - cuatro órdenes de piedras
  lexicon: HALOT
  rationale: '''טוּרֵי'' designa filas o hileras; ''hilera'' expresa bien la disposición lineal y es idiomática en español. ''Piedras'' conserva el valor colectivo del sustantivo.'
- source_word: טוּר
  english_pob_choice: row
  chosen_spanish: hilera
  alternatives_spanish:
  - fila
  - orden
  lexicon: HALOT
  rationale: Se elige 'hilera' para mantener la imagen de una disposición lineal de piedras y evitar una abstracción excesiva.
- source_word: אֹדֶם
  english_pob_choice: ruby
  chosen_spanish: rubí
  alternatives_spanish:
  - cornalina
  - piedra roja
  lexicon: HALOT
  rationale: La identificación exacta de la gema es incierta. 'Rubí' sigue la traducción tradicional y es clara para el lector hispano; la incertidumbre se preserva en nota.
- source_word: פִּטְדָה
  english_pob_choice: topaz
  chosen_spanish: topacio
  alternatives_spanish:
  - crisólito
  lexicon: HALOT
  rationale: '''Topacio'' es el equivalente tradicional en español. Dado que la identificación precisa es incierta, se mantiene la forma tradicional y se documenta la alternativa.'
- source_word: בָרֶקֶת
  english_pob_choice: emerald
  chosen_spanish: esmeralda
  alternatives_spanish:
  - piedra verde brillante
  - malacita
  lexicon: HALOT
  rationale: '''Esmeralda'' corresponde a la versión tradicional y natural en español. La nota preserva la posibilidad de una piedra verde o reluciente, reflejando la incertidumbre léxica del término.'
- source_word: הַטּוּר הָאֶחָד
  english_pob_choice: the first row was
  chosen_spanish: la primera hilera fue
  alternatives_spanish:
  - la hilera primera fue
  - la primera fila fue
  lexicon: HALOT
  rationale: El hebreo introduce la primera hilera de las cuatro y luego enumera sus piedras. En español es necesario suplir 'fue' para que la enumeración resulte clara y natural.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en una lista de cuatro hileras de piedras, de las cuales solo se nombra la primera con tres gemas. Se preserva la enumeración y la incertidumbre léxica de las piedras preciosas sin introducir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - 'Se mantuvo el orden del hebreo: afirmación de colocación, cantidad de hileras y luego la identificación de la primera.'
  - '''Hilera'' se usa consistentemente para טוּר, en armonía con la disposición en serie de las piedras.'
  - No se expandió 'en él' a 'sobre el pectoral' para no añadir un referente no presente en el verso; el contexto lo suple.
  - Se preservó la nota de incertidumbre de las gemas, como en el audit trail inglés.
