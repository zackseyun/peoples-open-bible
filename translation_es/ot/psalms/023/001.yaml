- from: Salmo de David[a]. Yahvé es mi pastor[c][b]; no me faltará.
  to: Salmo de David[a]. Yahvé es mi pastor[b]; nada me faltará[c].
  rationale: Se ajusta la última cláusula a «nada me faltará» para expresar de manera natural y completa el sentido de אֶחְסָר en español, manteniendo la fuerza futura y evitando una elipsis menos precisa. También se afina la nota c para ofrecer una alternativa verbal más cercana al original.
