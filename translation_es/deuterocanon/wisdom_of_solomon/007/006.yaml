translation:
  language: es
  text: Pero hay una sola entrada[a] a la vida para todos, y una salida también igual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la misma entrada a la vida para todos, y la misma salida». El griego empareja «entrada» y «salida» como una metáfora equilibrada del comienzo y el fin de la vida humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: μία
  english_pob_choice: one
  chosen_spanish: una sola
  alternatives_spanish:
  - una
  - única
  lexicon: LSJ
  rationale: μία subraya singularidad y unidad. «Una sola» conserva la idea de unicidad con naturalidad en español y refuerza el paralelismo del verso.
- source_word: πάντων
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - de todos
  - común para todos
  lexicon: LSJ
  rationale: La frase genitiva expresa universalidad. «Para todos» es la formulación más natural en español y mantiene que la entrada a la vida es común a toda la humanidad.
- source_word: εἴσοδος
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - entrar
  - acceso
  lexicon: LSJ
  rationale: εἴσοδος significa «entrada» o «ingreso». «Entrada» preserva la metáfora en paralelo con ἔξοδος y suena idiomático en español.
- source_word: εἰς τὸν βίον
  english_pob_choice: into life
  chosen_spanish: en la vida
  alternatives_spanish:
  - a la vida
  - en esta vida
  lexicon: LSJ
  rationale: βίος puede referirse a la vida terrenal o al curso de la vida. «En la vida» conserva la imagen sin explicitar nacimiento, y evita una paráfrasis más interpretativa.
- source_word: ἔξοδός
  english_pob_choice: departure
  chosen_spanish: salida
  alternatives_spanish:
  - partida
  - salida de la vida
  lexicon: LSJ
  rationale: 'ἔξοδος es el correlato de εἴσοδος: literalmente «salida» o «partida». «Salida» preserva el paralelismo formal del griego y deja implícita la muerte sin nombrarla directamente.'
- source_word: ἴση
  english_pob_choice: equal
  chosen_spanish: igual
  alternatives_spanish:
  - la misma
  - semejante
  lexicon: LSJ
  rationale: ἴση expresa igualdad o equivalencia. «Igual» mantiene la simetría del verso y reproduce el juicio de balance del original.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: δὲ introduce un leve contraste. «Pero» comunica bien el giro retórico desde la descripción precedente hacia esta afirmación universal.
theological_decisions:
- issue: Si explicitar nacimiento y muerte en la traducción
  english_pob_reading: Retain the metaphorical wording 'entrance into life' and 'departure' in the main text
  chosen_spanish_reading: Conservar «entrada en la vida» y «salida igual» sin decir explícitamente «nacimiento» y «muerte»
  alternative_spanish_readings:
  - Hay un solo nacimiento para todos, y una muerte igual
  - Todos tienen la misma entrada a la vida y la misma salida
  rationale: El griego usa las metáforas emparejadas εἴσοδος / ἔξοδος, no los términos explícitos para nacimiento y muerte. Mantener la metáfora respeta la forma del texto y su énfasis en la condición humana común, sin añadir interpretación no dicha.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control textual y no requiere revisión adicional; la redacción española sigue de cerca el griego Swete 1909 y el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otro término no pertinente, ya que aquí no aparece el nombre divino.
  - Se eligió «entrada/salida» para preservar el paralelismo εἴσοδος/ἔξοδος, en vez de explicitar «nacimiento/muerte».
  - «Para todos» mantiene la universalidad del genitivo πάντων con una formulación natural en español.
  - «En la vida» conserva el valor de βίος como vida humana terrenal sin añadir «mundo» ni otra interpretación.
