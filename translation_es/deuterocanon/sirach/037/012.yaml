translation:
  language: es
  text: No consultes con tu suegro[a], y no reveles un secreto a una persona celosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego en Swete difiere notablemente aquí: habla, más bien, de acompañarse de un hombre piadoso que sabes que guarda los mandamientos. El texto hebreo conservado, en cambio, advierte contra consultar al suegro y contra revelar un secreto a una persona celosa.'
    reason: textual_variant
lexical_decisions:
- source_word: אל תועץ
  english_pob_choice: Do not consult
  chosen_spanish: No consultes
  alternatives_spanish:
  - No tomes consejo
  - No te aconsejes
  lexicon: HALOT
  rationale: El imperativo negativo pide una prohibición de buscar consejo. «Consultar» es natural en español y conserva el matiz de acudir a otro para consejo sin volverlo demasiado libre.
- source_word: חמיך
  english_pob_choice: your father-in-law
  chosen_spanish: tu suegro
  alternatives_spanish:
  - tu padre político
  - tu padre de tu esposa
  lexicon: HALOT
  rationale: El hebreo designa específicamente al suegro; «suegro» es la equivalencia directa y clara en español moderno. «Tu padre político» es más técnico y menos natural.
- source_word: וממקנא
  english_pob_choice: from one who is jealous
  chosen_spanish: de quien tiene celos
  alternatives_spanish:
  - de un envidioso
  - de un celoso
  lexicon: HALOT
  rationale: La construcción con מן y מקנא expresa a la persona caracterizada por los celos/envidia. «Celos» conserva la ambigüedad semántica de la raíz mejor que una sola opción demasiado estrecha; «de quien tiene celos» suena natural y mantiene el referente humano.
- source_word: העלים סוד
  english_pob_choice: conceal a secret
  chosen_spanish: ocultes un secreto
  alternatives_spanish:
  - encubras un secreto
  - guardes un secreto
  lexicon: HALOT
  rationale: El idioma hebreo indica ocultar o mantener en reserva un secreto. «Ocultar» reproduce bien la acción de no revelarlo; el subjuntivo negativo español refleja adecuadamente la prohibición.
theological_decisions:
- issue: Base textual hebrea frente al paralelo griego muy divergente
  english_pob_reading: Translate the extant Hebrew clause structure directly, while allowing the Greek parallel to confirm the verse's advisory context rather than replace the Hebrew wording.
  chosen_spanish_reading: Se sigue la advertencia hebrea sobre a quién no consultar y ante quién no revelar un secreto, sin sustituirla por la exhortación griega a acompañarse de un hombre piadoso.
  alternative_spanish_readings:
  - «Más bien, acompáñate de un hombre piadoso que guarda los mandamientos»
  - «Antes bien, frecuenta a un hombre piadoso...»
  rationale: En Sirácides, el testimonio hebreo conservado tiene prioridad cuando es legible, y aquí la versión griega preservada en Swete difiere sustancialmente. Por fidelidad auditada, el español sigue el hebreo y deja constancia de la variante griega sin armonizarla en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como control de consistencia, no como reemplazo automático'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa registrada, que cambió «hide» por «conceal» por un registro más formal. En español se refleja con «ocultes», que mantiene ese registro sobrio sin perder el sentido de la prohibición.
  spanish_consistency_notes:
  - Se evitó «Señor» o vocabulario litúrgico ajeno porque el versículo no contiene lenguaje divino.
  - Se mantuvo el tono proverbial y admonitorio del hebreo sin introducir explicación interpretativa en el cuerpo del texto.
  - «Celos» conserva la amplitud semántica de מקנא, útil en español para no reducir la ambivalencia entre celos y envidia.
