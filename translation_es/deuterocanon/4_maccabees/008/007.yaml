revisions:
- from: Por tanto, crean en mí[a], y recibirán puestos de autoridad[b] sobre mis asuntos, si renuncian a la ordenanza ancestral de su manera de vivir.
  to: Por tanto, créanme[a], y recibirán puestos de autoridad[b] sobre mis asuntos, si renuncian a la ordenanza ancestral de su modo de vida.
