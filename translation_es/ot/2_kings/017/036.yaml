base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/036.yaml
  text: But Yahweh[a], who brought you up from the land of Egypt with great power and with an outstretched arm—you shall fear him, and to him you shall bow down[b], and to him you shall sacrifice.
  footnotes:
  - marker: a
    text: Or 'Rather, the LORD ... him you shall fear.' The Hebrew opening is contrastive, setting the LORD over against other gods.
    reason: alternative_reading
  - marker: b
    text: '''Fear'' here carries the sense of reverent awe and covenant loyalty, not merely terror.'
    reason: lexical_alternative
