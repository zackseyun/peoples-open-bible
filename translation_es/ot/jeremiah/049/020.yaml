base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/020.yaml
  text: 'Therefore hear the counsel of Yahweh that he has planned against Edom[a], and his thoughts that he has devised against the inhabitants of Teman: Surely the little ones of the flock will drag them away[b]; surely he will make their pasture desolate over them.'
  footnotes:
  - marker: a
    text: Or 'the youngest of the flock' or 'the least of the flock.' The phrase likely functions metaphorically for the weakest or least significant attackers, but the flock imagery is retained in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'their habitation' or 'their fold' for 'their pasture.' The Hebrew noun can refer to a dwelling place or pastureland; the main text preserves the flock imagery of the verse.
    reason: lexical_alternative
