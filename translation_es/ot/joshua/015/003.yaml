translation:
  language: es
  text: Entonces salió hacia el sur, hasta la subida de Akrabim[a], pasó a Zin, subió desde el sur hasta Cades-barnea, pasó a Hesrón, subió a Adar y giró hacia Karka[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akrabim probablemente significa «escorpiones»; en el texto principal se translitera porque aquí funciona como nombre de lugar.
    reason: lexical_alternative
  - marker: b
    text: O «hacia Karkaa»; la grafía española del nombre del lugar no es segura.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then it went out
  chosen_spanish: Entonces salió
  alternatives_spanish:
  - Y salió
  - Luego salió
  lexicon: HALOT
  rationale: En un itinerario de límites, יצא describe el avance de la línea fronteriza. «Salió» conserva la imagen de movimiento sin forzar una explicación interpretativa. «Entonces» reproduce la secuencia narrativa del waw de manera natural en español.
- source_word: אֶל מִנֶּגֶב
  english_pob_choice: southward
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - del lado sur
  lexicon: HALOT
  rationale: La frase expresa dirección en una descripción geográfica. «Hacia el sur» es claro y fluido en español, y mantiene el sentido direccional sin convertir la expresión en una localización estática.
- source_word: לְמַעֲלֵה עַקְרַבִּים
  english_pob_choice: to the ascent of Akrabbim
  chosen_spanish: hasta la subida de Akrabim
  alternatives_spanish:
  - hasta el paso de Akrabim
  - hasta la subida de los escorpiones
  lexicon: HALOT
  rationale: מַעֲלֶה designa una subida o paso elevado; «subida» es transparente en español. Se translitera עַקְרַבִּים como «Akrabim» porque funciona aquí como nombre propio de lugar. La nota preserva el valor léxico posible de «escorpiones» sin sustituir el topónimo en el texto principal.
- source_word: וְעָבַר
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - pasó por
  lexicon: HALOT
  rationale: En fórmulas de límites, עבר indica que la línea sigue más allá o a través de un punto. «Pasó» es breve y natural; en un caso concreto «pasó por» ayuda a sonar idiomático en español sin perder el movimiento.
- source_word: צִנָה
  english_pob_choice: to Zin
  chosen_spanish: a Zin
  alternatives_spanish:
  - hasta Zin
  - hacia Zin
  lexicon: HALOT
  rationale: Zin es un topónimo. En español, con el verbo de movimiento ya expresado, «a Zin» transmite correctamente el destino o punto de referencia del recorrido del límite.
- source_word: וְעָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - continuó subiendo
  lexicon: HALOT
  rationale: עלה en descripciones geográficas suele indicar ascenso físico o movimiento hacia una zona más alta. «Subió» es la opción más directa y comprensible en español.
- source_word: מִנֶּגֶב לְקָדֵשׁ בַּרְנֵעַ
  english_pob_choice: from the south to Kadesh-barnea
  chosen_spanish: desde el sur hasta Cades-barnea
  alternatives_spanish:
  - desde el sur hacia Cades-barnea
  - por el sur de Cades-barnea
  lexicon: HALOT
  rationale: Siguiendo la revisión del POB en inglés, מִנֶּגֶב aquí debe reflejarse como procedencia direccional, no como una ubicación fija. «Desde el sur hasta Cades-barnea» preserva esa relación de movimiento. Se usa «Cades-barnea» como forma española común y legible del topónimo.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hesrón
  alternatives_spanish:
  - Hezrón
  - Hezron
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. «Hesrón» conserva la forma reconocible en español y evita una transliteración excesivamente inglesa.
- source_word: אַדָּרָה
  english_pob_choice: to Addar
  chosen_spanish: a Adar
  alternatives_spanish:
  - hasta Adar
  - a Addar
  lexicon: HALOT
  rationale: Topónimo propio. «Adar» mantiene la forma más transparente en español; el movimiento ya lo expresa el verbo «subió». La nota preserva la posibilidad de una grafía alternativa en la tradición textual/inglesa.
- source_word: וְנָסַב
  english_pob_choice: and turned
  chosen_spanish: y giró
  alternatives_spanish:
  - y volvió
  - y se curvó
  lexicon: HALOT
  rationale: נסב en este contexto de frontera indica cambio de dirección o curva del límite. «Giró» comunica bien esa idea en español moderno sin añadir matices no requeridos.
- source_word: הַקַּרְקָעָה
  english_pob_choice: toward Karka
  chosen_spanish: hacia Karka
  alternatives_spanish:
  - a Karka
  - hacia Karkaa
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar, pero su forma exacta en español no es segura. «Karka» sigue la elección del POB inglés para una grafía funcional; la nota conserva la variante «Karkaa» como alternativa reconocida.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés que corrigió la relación de מִנֶּגֶב en «from the south to Kadesh-barnea» para evitar interpretar el giro como una localización estática al sur de Cades-barnea. También conserva la cautela del POB respecto a los topónimos Akrabbim y Karka/Karkaa, manteniendo transliteración en el texto y nota explicativa donde existe ambigüedad lexical o gráfica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - Se prefirieron verbos de movimiento simples («salió», «pasó», «subió», «giró») para reflejar un itinerario fronterizo sin sobreparáfrasis.
  - Los topónimos se adaptaron a una ortografía española legible cuando existe forma estable en uso; donde la forma es incierta, se conservó transliteración funcional con nota.
  - No se añadió capitalización devocional innecesaria; se siguió el estilo geográfico y narrativo del pasaje.
