    rationale: Aunque intenta reflejar מֵעַל, en español narrativo «bajó del carro» comunica bien el desmontar sin rigidez innecesaria. «Descendió de encima» resulta pesado.
  - severity: low
    issue: La nota sobre Yahvé es redundante para este versículo.
    rationale: No es errónea, pero no es necesaria si no se están anotando todos los nombres divinos sistemáticamente. Puede mantenerse o simplificarse; no afecta la fidelidad.
