translation:
  language: es
  text: Y Absalón, a quien ungimos como rey sobre nosotros, murió en la batalla. Así que ahora, ¿por qué guardan silencio sobre hacer volver al rey?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘¿por qué siguen guardando silencio sobre restaurar al rey?’
    reason: alternativa_léxica para reflejar la nota inglesa sobre ‘restoring the king’ y el matiz durativo de ‘keep silent’.
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  english_pob_choice: And Absalom
  chosen_spanish: Y Absalón
  alternatives_spanish:
  - Pero Absalón
  - Ahora Absalón
  lexicon: HALOT
  rationale: La waw inicial continúa el discurso reportado; en español, “Y” conserva esa conexión sin añadir contraste no marcado por el hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  - quien
  lexicon: HALOT
  rationale: El relativo introduce a una persona en función de objeto del verbo precedente; “a quien” preserva con precisión esa relación.
- source_word: מָשַׁחְנוּ עָלֵינוּ
  english_pob_choice: we anointed over us
  chosen_spanish: ungimos sobre nosotros
  alternatives_spanish:
  - hicimos rey sobre nosotros
  - ungimos para nosotros
  lexicon: HALOT
  rationale: מָשַׁח conserva su fuerza de “ungir”, importante para el acto de instalación real. “Sobre nosotros” reproduce עָלֵינוּ en el marco de realeza/autoridad; “hicimos rey” interpretaría en vez de traducir.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  - está muerto
  lexicon: HALOT
  rationale: El qatal narra un evento concluido en estilo narrativo; “murió” es natural en español y mantiene la referencia a un hecho consumado.
- source_word: בַּ/מִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en guerra
  - en combate
  lexicon: HALOT
  rationale: “La batalla” refleja bien el artículo hebreo y el contexto bélico concreto de la muerte de Absalón.
- source_word: וְ/עַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La expresión introduce la conclusión práctica derivada del hecho previo; “Así que” expresa mejor la inferencia que un simple “Y” en español.
- source_word: לָ/מָה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - para qué
  lexicon: HALOT
  rationale: Interrogativo causal directo; “por qué” es la equivalencia estándar y más clara.
- source_word: מַחֲרִשִׁ֖ים
  english_pob_choice: are you silent
  chosen_spanish: están ustedes callados
  alternatives_spanish:
  - se mantienen callados
  - callan
  lexicon: HALOT
  rationale: La idea es silencio/inacción verbal; “están ustedes callados” conserva el carácter de falta de respuesta sin volverlo demasiado interpretativo.
- source_word: לְ/הָשִׁ֥יב
  english_pob_choice: about bringing ... back
  chosen_spanish: para traer de vuelta
  alternatives_spanish:
  - para restaurar
  - para hacer volver
  lexicon: HALOT
  rationale: שׁוּב en Hiphil significa hacer volver/traer de vuelta. En español, la construcción final resulta más natural con “para traer de vuelta” que con una paráfrasis más abstracta.
- source_word: אֶת הַ/מֶּלֶךְ
  english_pob_choice: the king back
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey de vuelta
  - al rey otra vez
  lexicon: HALOT
  rationale: El objeto directo es “el rey” (David); en español, el movimiento de retorno ya queda marcado por “traer de vuelta”, por lo que “al rey” basta y evita redundancia.
theological_decisions:
- issue: Conservar el verbo de unción real aplicado a Absalón
  english_pob_reading: anointed
  chosen_spanish_reading: ungimos
  alternative_spanish_readings:
  - hicimos rey
  - coronamos
  rationale: Aunque Absalón es un usurpador, el hebreo usa el verbo técnico de unción. Mantener “ungimos” preserva la tensión narrativa y evita suavizar el lenguaje político-sacral del texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La versión inglesa revisada cambió “has died” por “died” para sonar más natural en narrativa formal; la redacción española ya usa el pretérito perfecto simple “murió”, de modo que queda alineada con esa revisión sin necesidad de nota adicional.
  spanish_consistency_notes:
  - Se mantiene “Absalón” como forma estable del nombre propio.
  - Se usa “Yahvé” solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - “Ungimos” conserva el valor técnico de מָשַׁח y evita sustituirlo por “hicimos rey”.
  - “El rey” se conserva como referencia a David sin añadir su nombre, respetando el framing político del hebreo.
