translation:
  language: es
  text: Así se preparó[a] el servicio, y los sacerdotes se colocaron en sus puestos[b], y los levitas según sus divisiones[c], conforme al mandato del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue establecido» o «quedó listo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su estar/lugar de estar»; es decir, en sus posiciones asignadas.
    reason: lexical_alternative
  - marker: c
    text: O «conforme a sus divisiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכּוֹן
  english_pob_choice: was prepared
  chosen_spanish: se preparó
  alternatives_spanish:
  - fue establecido
  - se puso en orden
  - quedó listo
  lexicon: HALOT
  rationale: כּוֹן en este contexto cultual expresa que la labor quedó dispuesta o lista para ejecutarse. «Se preparó» conserva esa idea de disposición previa sin sonar artificial en español.
- source_word: הָעֲבוֹדָה
  english_pob_choice: the service
  chosen_spanish: el servicio
  alternatives_spanish:
  - la labor
  - el servicio ritual
  - el ministerio cultual
  lexicon: HALOT
  rationale: En contexto del templo, עֲבוֹדָה designa el servicio sagrado. «El servicio» mantiene el valor cultual y es natural en español; «labor» sería demasiado amplio.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se colocaron
  alternatives_spanish:
  - se pusieron de pie
  - tomaron su lugar
  - estuvieron
  lexicon: HALOT
  rationale: El verbo base es «estar de pie», pero el sentido funcional aquí es ocupar la posición asignada para el servicio. «Se colocaron» comunica esa colocación ordenada sin perder el dato literal.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros sacerdotales
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente español estándar para כֹּהֲנִים en contexto levítico/templo.
- source_word: עַל עָמְדָם
  english_pob_choice: at their stations
  chosen_spanish: en sus puestos
  alternatives_spanish:
  - en su lugar
  - en su puesto asignado
  - en su estación
  lexicon: HALOT
  rationale: La expresión hebrea alude literalmente a su lugar de estar/posición. «En sus puestos» es una solución idiomática clara que conserva la idea de asignación.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas del templo
  lexicon: HALOT
  rationale: Nombre tribal/cultual estándar; «levitas» es la forma natural en español.
- source_word: עַל מַחְלְקוֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - conforme a sus divisiones
  - en sus divisiones
  - por sus grupos
  lexicon: HALOT
  rationale: מַחְלְקוֹת se refiere a divisiones o grupos organizados. «Según sus divisiones» conserva la estructura organizativa y refleja bien el sentido distributivo del hebreo.
- source_word: כְּמִצְוַת
  english_pob_choice: according to the command
  chosen_spanish: conforme al mandato
  alternatives_spanish:
  - según el mandato
  - de acuerdo con la orden
  - según la orden
  lexicon: HALOT
  rationale: Aquí מִצְוָה apunta a una orden específica del rey. «Mandato» suena más preciso y digno en español que «mandamiento», que podría sugerir un sentido más general o religioso.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: del rey
  alternatives_spanish:
  - del monarca
  lexicon: HALOT
  rationale: Referencia directa al soberano mencionado en el contexto; «rey» es la traducción natural y suficiente.
theological_decisions:
- issue: Naturaleza de עֲבוֹדָה en un contexto de culto
  english_pob_reading: the service
  chosen_spanish_reading: el servicio
  alternative_spanish_readings:
  - el servicio ritual
  - la liturgia
  - la labor
  rationale: La acción descrita es preparación para el culto pascual del templo. «El servicio» preserva la referencia sagrada sin introducir terminología eclesiástica posterior que no está en el hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomas de ubicación para sacerdotes y levitas
  english_pob_reading: at their stations ... by their divisions
  chosen_spanish_reading: en sus puestos ... según sus divisiones
  alternative_spanish_readings:
  - en su lugar ... conforme a sus divisiones
  - en sus puestos asignados ... por sus grupos
  rationale: El hebreo resalta organización y orden del servicio, no solo localización física. La formulación elegida mantiene esa estructura y evita diluir la coordinación cultual del texto.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el hebreo y la POB inglesa; no se registraron revisiones posteriores en el expediente. La versión española mantiene ese equilibrio y solo adapta las expresiones idiomáticas necesarias para que el español suene natural sin perder la correspondencia léxica.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrama.
  - «Mandato» se usa para מִצְוָה por tratarse de una orden real concreta, no de un precepto general.
  - «Servicio» se mantiene como término cultual para עֲבוֹדָה, coherente con el contexto del templo.
  - Las expresiones de posición («en sus puestos») y de organización («según sus divisiones») reflejan el orden ritual del texto sin sobreexplicar.
