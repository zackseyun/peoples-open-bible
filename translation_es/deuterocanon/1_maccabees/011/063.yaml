- from: Y Jonatán oyó que los comandantes de Demetrio habían llegado a Cedes de Galilea con mucha tropa[a], con la intención de quitarlo de su cargo.
  to: Y Jonatán oyó que los comandantes de Demetrio habían llegado a Quedes en Galilea con una gran fuerza[a], con la intención de removerlo de su cargo.
  rationale: Se ajusta «Cedes de Galilea» a «Quedes en Galilea» para una identificación toponímica más natural; «con mucha tropa» a «con una gran fuerza[a]» para reflejar mejor el alcance de δύναμις con registro más digno; y «quitarlo de su cargo» a «removerlo de su cargo» para expresar con mayor precisión la idea de apartarlo de su puesto u oficio. No se requiere adjudicación adicional.
