translation:
  language: es
  text: Así los dispersaré como rastrojo arrastrado por el viento del desierto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como rastrojo que pasa ante el viento del desierto».'
    reason: Preserva la alternativa más literal para עוֹבֵר y לְרוּחַ sin perder la lectura más natural en el texto principal.
lexical_decisions:
- source_word: וַאֲפִיצֵם
  english_pob_choice: So I will scatter them
  chosen_spanish: Así los dispersaré
  alternatives_spanish:
  - Y los dispersaré
  - Entonces los dispersaré
  lexicon: HALOT
  rationale: El verbo en hifil con sujeto de primera persona expresa acción causativa de dispersar. «Dispersaré» conserva el sentido de esparcir/arrojar lejos; «Así» refleja bien el valor consecutivo del waw en un español natural y profético.
- source_word: כְּקַשׁ
  english_pob_choice: like stubble
  chosen_spanish: como paja
  alternatives_spanish:
  - como rastrojo
  - como tamo
  lexicon: HALOT
  rationale: 'קַשׁ puede designar restos secos de cereal: paja, rastrojo o residuo vegetal liviano. «Paja» comunica con claridad la imagen de algo seco, liviano y fácilmente arrastrado por el viento, sin forzar una equivalencia técnica excesiva.'
- source_word: עוֹבֵר
  english_pob_choice: blown away / passing away
  chosen_spanish: arrastrada
  alternatives_spanish:
  - que pasa
  - que va pasando
  - llevada
  lexicon: HALOT
  rationale: El participio qal de עבר aporta la idea de algo que pasa o se desplaza. En español, «arrastrada» integra de manera natural la acción del viento sobre la paja, preservando el movimiento sin convertirlo en una paráfrasis libre.
- source_word: לְרוּחַ
  english_pob_choice: by the wind
  chosen_spanish: ante el viento
  alternatives_spanish:
  - por el viento
  - al viento
  - frente al viento
  lexicon: HALOT
  rationale: La preposición ל con רוּחַ en esta imagen puede entenderse como estar expuesto a o delante del viento. «Ante el viento» mantiene la fuerza imagética y evita introducir una causalidad demasiado explícita si se prefiere leer el movimiento como exposición al soplo.
- source_word: מִדְבָּר
  english_pob_choice: wilderness / desert
  chosen_spanish: del desierto
  alternatives_spanish:
  - del yermo
  - de la wilderness
  lexicon: HALOT
  rationale: מִדְבָּר admite «desierto» o «despoblado/wilderness». «Desierto» es transparente y fiel para el lector español; además, conserva el trasfondo de aridez y viento fuerte que da intensidad a la imagen.
translation_notes:
  revision_awareness: El contexto inglés reciente ajustó la imagen desde «chaff» a «stubble/stubble blown away» para acercarse más a קַשׁ. En español, se optó por «paja» como término natural y comprensible, manteniendo la nota alternativa para reflejar que el hebreo admite también «rastrojo» o un residuo vegetal seco semejante. La decisión conserva la dinámica de dispersión por el viento del desierto sin depender mecánicamente de la redacción inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra el tetragrámaton; aquí no aparece.
  - Se mantiene un registro profético sobrio y directo, sin añadidos explicativos.
  - La imagen del viento se conserva sin imponer una interpretación doctrinal adicional.
