revisions:
- from: 'Entonces David dijo a Aquis: «Si ahora he hallado favor[a] ante tus ojos, que me den un lugar en una de las ciudades de la campiña, para que habite allí[b]. ¿Por qué ha de vivir tu esclavo en la ciudad real contigo[c]?»'
  to: 'Entonces David dijo a Aquis: «Si ahora he hallado favor[a] ante tus ojos, que me den un lugar en una de las ciudades de la campiña, para que habite allí[b]. ¿Por qué ha de vivir tu siervo contigo en la ciudad real[c]?»'
  rationale: Se reemplaza «tu esclavo» por «tu siervo» para seguir la decisión contextual auditada del POB sobre עַבְדְּךָ como fórmula cortesana deferente. También se corrige la nota [a] para incluir «ahora», y se mejora levemente el orden del complemento final para un español más natural.
