base_translation:
  language: en
  yaml_path: translation/ot/genesis/011/031.yaml
  text: Terah took Abram his son[a], Lot the son of Haran, his grandson, and Sarai his daughter-in-law, the wife of Abram his son, and they went out with them from Ur of the Chaldeans to go to the land of Canaan[c][b]. They came as far as Haran and settled there.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lot son of Haran, son of his son''; that is, Lot was Terah''s grandson.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and they came to Haran and lived there.' The Hebrew more literally says, 'and they came as far as Haran and settled there.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and they went out with them'.
    reason: previous_rendering
