lexical_decisions:
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: declarar
  alternatives_spanish:
  - proclamar
  - dar a conocer
  - decir
  lexicon: HALOT
  rationale: El infinitivo constructo expresa propósito respecto del contexto anterior. «Declarar» conserva el tono formal y público de la acción mejor que «decir», y evita una paráfrasis excesiva.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que se declara, no una causa. En español, «que» reproduce con naturalidad esa función subordinante.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - upright
  lexicon: HALOT
  rationale: «Recto» transmite la idea moral de integridad y corrección con buena naturalidad en español. Se evita «justo» como primera opción porque puede inclinarse más hacia lo judicial que hacia la rectitud general del carácter divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino y no una sustitución titulada. En español, la forma de proyecto para YHWH es «Yahvé», que preserva el nombre revelado y evita el ocultamiento litúrgico.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: HALOT
  rationale: La metáfora concreta de Dios como roca se conserva mejor con «mi roca». «Peña» es posible, pero «roca» resulta más clara y ampliamente comprensible en español moderno.
- source_word: וְלֹא
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe
  - y no está
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula negada sin verbo explícito; en español, «no hay» comunica de forma natural la ausencia de la cualidad mencionada.
- source_word: עַוְלָתָה
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia
  - maldad
  - torcedura
  lexicon: HALOT
  rationale: Aunque el inglés POB prioriza «unrighteousness», en español «injusticia» expresa mejor el matiz jurídico-moral del término y conserva la alternativa indicada en la nota inglesa. Se evita «maldad» por ser demasiado general.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La preposición española «en» reproduce la localización moral del hebreo y suena idiomática al afirmar que no existe injusticia en Dios.
theological_decisions:
- issue: Cómo expresar el Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La pauta del proyecto exige no sustituir el nombre divino por un título. «Yahvé» mantiene el nombre propio de Dios con claridad para el lector hispano y sigue la decisión doctrinal del texto inglés de no enmascarar יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor moral de עַוְלָתָה en una afirmación sobre el carácter de Dios
  english_pob_reading: there is no unrighteousness in him
  chosen_spanish_reading: no hay en él injusticia
  alternative_spanish_readings:
  - no hay en él injusticia
  - no hay en él maldad
  - no hay en él torcedura
  rationale: El hebreo puede leerse con fuerza judicial y moral. «Injusticia» conserva ese alcance y hace explícita la alternativa que el inglés anotó como «injustice». No se atenúa la afirmación a un mero defecto ético general.
  doctrine_reference: HALOT; nota de alternativa léxica del POB inglés
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión pendiente relevante; por eso se mantiene la línea semántica del inglés POB, con adaptación al español y preservación de la alternativa léxica de עַוְלָתָה en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología base del proyecto.
  - Se conserva la imagen concreta «mi roca» en lugar de una interpretación como «refugio».
  - La negación final se formula como cláusula natural en español («no hay en él injusticia») sin perder la fuerza del hebreo.
  - La nota a pie de página se ancla en «injusticia» para reflejar la alternativa léxica documentada en el texto inglés.
