translation:
  language: es
  text: Entonces los hijos de Benjamín salieron de Gibeá y derribaron[a] a veintidós mil hombres de Israel aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salieron de Gibeá y mataron a veintidós mil hombres de Israel aquel día».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron fuera
  - salieron de
  lexicon: HALOT
  rationale: El wayyiqtol de יצא expresa salida en secuencia narrativa. En español, «salieron de Gibeá» conserva la direccionalidad y suena natural en un contexto militar sin añadir matices ajenos.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Se preserva la expresión de parentesco y pertenencia tribal del hebreo, como hace el POB inglés. «Hijos de Benjamín» mantiene la textura fuente y es inteligible en español bíblico.
- source_word: מִן הַגִּבְעָה
  english_pob_choice: from Gibeah
  chosen_spanish: de Gibeá
  alternatives_spanish:
  - desde Gibeá
  - desde la ciudad de Gibeá
  lexicon: HALOT
  rationale: La preposición de origen se rinde de forma directa con «de». Se conserva el nombre propio en forma española normalizada «Gibeá».
- source_word: וַיַּשְׁחִיתוּ
  english_pob_choice: struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - mataron
  - destruyeron
  - hirieron mortalmente
  lexicon: HALOT
  rationale: El verbo hebreo puede tener el sentido de arruinar/destruir, pero aquí está coordinado con un conteo de bajas. «Derribaron» comunica el abatimiento letal en combate sin reducirlo a un simple «mataron» ni ampliar injustificadamente a «destruyeron».
- source_word: בְיִשְׂרָאֵל
  english_pob_choice: of Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - contra Israel
  - entre Israel
  lexicon: HALOT
  rationale: La preposición ב en este contexto marca el ámbito/población afectada por la acción. «En Israel» permite mantener la construcción breve del hebreo y evita reinterpretar el sintagma como objeto directo no marcado.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» reproduce bien la referencia anafórica y el tono narrativo. Es una fórmula natural y fiel al valor temporal del hebreo.
- source_word: שְׁנַיִם וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-two thousand
  chosen_spanish: veintidós mil
  alternatives_spanish:
  - 22 mil
  lexicon: HALOT
  rationale: Se usa la forma estándar en español para el número compuesto, sin alterar el valor numérico del original.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - soldados
  lexicon: HALOT
  rationale: Tras el numeral, el hebreo singular funciona colectivamente. En español, «hombres» expresa de manera natural la referencia a combatientes sin introducir la especificidad militar de «soldados».
theological_decisions:
- issue: Valor de בְ/יִשְׂרָאֵל en un contexto de guerra
  english_pob_reading: of Israel
  chosen_spanish_reading: en Israel
  alternative_spanish_readings:
  - contra Israel
  - sobre Israel
  rationale: No se documenta aquí una lectura teológica especial; el punto es sintáctico-semántico. Se evita forzar el sintagma a «contra Israel» porque el hebreo ya comunica el efecto hostil por el verbo y el contexto narrativo, mientras que «en Israel» conserva la relación interna de la construcción.
  doctrine_reference: Ninguna; decisión de sintaxis y semántica narrativa.
translation_notes:
  revision_awareness: La revisión inglesa eliminó una expansión innecesaria equivalente a «to the ground»; por eso el español evita cualquier añadido como «a tierra» o «al suelo» y se limita a la acción de abatir y al recuento de bajas. Se mantuvo el registro formal y la economía del texto revisado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el hebreo lo exija; este versículo no lo contiene.
  - «Benjamín» y «Gibeá» siguen la normalización española coherente con el proyecto.
  - Se evitó «SEÑOR» y también una paráfrasis militar excesiva; el verbo «derribaron» mantiene la fuerza lexical sin salir del campo semántico del combate.
  - La nota alternativa refleja el matiz entre «salieron» y «mataron» que el POB inglés documenta en su pie de nota.
