translation:
  language: es
  text: Y Jerusalén estaba deshabitada como un desierto; no había quien entrara ni saliera de ella[a], y el santuario era pisoteado, y los hijos de extranjeros estaban en la ciudadela[b], un alojamiento para los gentiles; y el deleite fue quitado de Jacob, y la flauta y el arpa cesaron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego γενημάτων es inusual aquí; literalmente puede referirse a «lo nacido», «la descendencia» o «los nacidos en ella». En contexto, la frase describe la ausencia de habitantes o de tránsito en la ciudad.
    reason: lexical_alternative
  - marker: b
    text: «Ciudadela» traduce ἄκρα; también puede dejarse como «Acra», el nombre de la fortaleza de Jerusalén.
    reason: alternative_reading
  - marker: c
    text: «Arpa» también puede expresarse como «lira»; el griego κινύρα nombra un instrumento de cuerdas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀοίκητος
  english_pob_choice: uninhabited
  chosen_spanish: deshabitada
  alternatives_spanish:
  - sin habitantes
  - inhabitada no estaba
  lexicon: LSJ
  rationale: El griego expresa ausencia de habitantes; «deshabitada» comunica esa idea con naturalidad en español y evita sobrecargar el verso con una abstracción como «desolada», ya sugerida por la comparación siguiente.
- source_word: ὡς ἔρημος
  english_pob_choice: like a wilderness
  chosen_spanish: como un desierto
  alternatives_spanish:
  - como un desierto agreste
  - como un yermo
  lexicon: LSJ
  rationale: ἔρημος puede significar desierto o lugar desierto/inhóspito. «Como un desierto» es claro y conservador en español; la imagen de ruina y abandono queda dentro del paralelo con «deshabitada».
- source_word: ὁ εἰσπορευόμενος καὶ ἐκπορευόμενος
  english_pob_choice: no one was entering or going out
  chosen_spanish: no había quien entrara ni saliera
  alternatives_spanish:
  - nadie entraba ni salía
  - no había quien fuese entrando y saliendo
  lexicon: LSJ
  rationale: La pareja verbal es una fórmula idiomática para tráfico normal de personas. La forma elegida suena natural en español y mantiene la imagen de ciudad vaciada.
- source_word: ἐκ τῶν γενημάτων αὐτῆς
  english_pob_choice: from her offspring
  chosen_spanish: de sus habitantes
  alternatives_spanish:
  - de los nacidos en ella
  - de su prole
  lexicon: LSJ
  rationale: El audit trail inglés reconoce que el griego transmitido es extraño; la revisión posterior favorece el sentido contextual. En español, «de sus habitantes» comunica mejor la idea sin perder la referencia a la ciudad y evita una literalidad opaca.
- source_word: ἁγίασμα
  english_pob_choice: sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: LSJ
  rationale: «Santuario» es el equivalente natural y fiel para el lugar sagrado aquí mencionado.
- source_word: καταπατούμενον
  english_pob_choice: was being trampled down
  chosen_spanish: era pisoteado
  alternatives_spanish:
  - era hollado
  - era aplastado bajo los pies
  lexicon: LSJ
  rationale: El verbo denota pisotear/tramplear. «Era pisoteado» conserva el sentido físico y la connotación de profanación sin convertirla en una interpretación demasiado libre.
- source_word: υἱοὶ ἀλλογενῶν
  english_pob_choice: sons of foreigners
  chosen_spanish: los hijos de extranjeros
  alternatives_spanish:
  - hijos de forasteros
  - los hijos de gente extranjera
  lexicon: LSJ
  rationale: Se mantiene la literalidad de la construcción griega. «Extranjeros» es transparente en español y conserva la fuerza de alteridad del original.
- source_word: ἄκρα
  english_pob_choice: citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la acrópolis
  - el Acra
  lexicon: LSJ
  rationale: En 1 Macabeos el término remite a la fortaleza de Jerusalén. «Ciudadela» es una traducción clara; la forma histórica «Acra» se preserva como alternativa en la nota.
- source_word: κατάλυμα
  english_pob_choice: a lodging place
  chosen_spanish: una morada
  alternatives_spanish:
  - un alojamiento
  - un lugar de estancia
  lexicon: LSJ
  rationale: El sustantivo puede ser lugar de alojamiento o estancia. «Morada» funciona en español bíblico sin sonar arcaico en exceso y permite que la frase resulte fluida.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: for the Gentiles
  chosen_spanish: para los gentiles
  alternatives_spanish:
  - entre las naciones
  - para las naciones
  lexicon: LSJ
  rationale: La revisión inglesa optó por «Gentiles» como el equivalente más natural en este contexto de oposición judíos/gentiles. En español, «gentiles» mantiene esa carga histórica y religiosa.
- source_word: τέρψις
  english_pob_choice: delight
  chosen_spanish: el deleite
  alternatives_spanish:
  - la alegría
  - el gozo
  lexicon: LSJ
  rationale: τέρψις apunta a deleite/placer más que a χαρά. «Deleite» conserva esa nota y suena apropiado dentro del lamento poético.
- source_word: ἐξῆρθη
  english_pob_choice: was taken away
  chosen_spanish: fue quitado
  alternatives_spanish:
  - fue removido
  - se apartó
  lexicon: LSJ
  rationale: El sentido es de remoción o desaparición. «Fue quitado» es directo y mantiene la pasiva de resultado.
- source_word: αὐλὸς
  english_pob_choice: flute
  chosen_spanish: la flauta
  alternatives_spanish:
  - el flautín
  - el pipe
  lexicon: LSJ
  rationale: «Flauta» es el equivalente moderno más claro para el instrumento mencionado.
- source_word: κινύρα
  english_pob_choice: harp
  chosen_spanish: la cítara
  alternatives_spanish:
  - el arpa
  - la lira
  lexicon: LSJ
  rationale: Aunque el inglés POB usó «harp» y anotó que también puede ser «lyre», en español «cítara» o «lira» se ajustan bien al instrumento de cuerdas. «Cítara» ofrece una designación musical comprensible y evita la sobrelectura de «arpa».
theological_decisions:
- issue: Cómo reflejar ἔθνεσιν en un contexto de ocupación y oposición identitaria
  english_pob_reading: for the Gentiles
  chosen_spanish_reading: para los gentiles
  alternative_spanish_readings:
  - entre las naciones
  - para las naciones
  rationale: El término no es meramente geográfico; contrasta a los ocupantes con Israel. «Gentiles» preserva esa carga histórica y la oposición implícita del contexto macabeo, alineándose con la revisión inglesa.
  doctrine_reference: Transparencia histórica y lexical; mantener la oposición judíos/gentiles cuando el contexto la exige.
- issue: Cómo tratar la frase difícil ἐκ τῶν γενημάτων αὐτῆς
  english_pob_reading: from her offspring
  chosen_spanish_reading: de sus habitantes
  alternative_spanish_readings:
  - de los nacidos en ella
  - de su prole
  rationale: La revisión del inglés reconoce que la frase busca expresar la vaciedad de Jerusalén más que una genealogía estricta. En español, «de sus habitantes» comunica el sentido contextual con claridad, sin negar la rareza del griego subyacente.
  doctrine_reference: Prioridad del sentido contextual con respeto al testimonio textual transmitido.
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail en dos puntos: adopta el sentido contextual de γενημάτων como «sus habitantes» en lugar de una literalidad opaca, y vierte ἔθνεσιν como «gentiles». En un punto musical, se prefiere «cítara» como equivalente español de κινύρα, manteniendo la nota alternativa de «lira».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo; no aparece ningún tetragrámaton aquí.
  - «Gentiles» se usa de manera consistente para ἔθνεσιν cuando el contexto contrapone a Israel con pueblos no judíos.
  - Se conservó el paralelismo poético del griego con cláusulas coordinadas y verbo pasivo en la parte final.
