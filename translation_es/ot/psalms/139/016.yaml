  text: גָּלְמִ֤/י רָ֘א֤וּ עֵינֶ֗י/ךָ וְ/עַֽל סִפְרְ/ךָ֮ כֻּלָּ֪/ם יִכָּ֫תֵ֥בוּ יָמִ֥ים יֻצָּ֑רוּ ו/לא אֶחָ֣ד בָּ/הֶֽם׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/139/016.yaml
  text: Your eyes saw my unformed substance[a], and in your book they all were written—the days that were formed[c][b], when not one of them yet existed.
  footnotes:
  - marker: a
    text: Or 'my embryo' / 'my unfinished form.' The Hebrew word refers to something not yet fully formed.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them were written in your book; the days were fashioned for me.' The Hebrew syntax is compressed and difficult.
    reason: alternative_reading
  - marker: c
    text: '''Were formed'' could also be rendered ''were fashioned''; some translations use ''were ordained,'' but that is more interpretive than the basic Hebrew verb.'
    reason: lexical_alternative
