translation:
  language: es
  text: Haré con ellos un pacto eterno[a], que no me apartaré de ellos para hacerles bien. Y pondré el temor de mí[b] en su corazón, para que no se aparten de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pacto perpetuo' o 'pacto perdurable'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'mi temor'; es decir, temor dirigido hacia mí.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרַתִּי
  english_pob_choice: I will make
  chosen_spanish: Haré
  alternatives_spanish:
  - Haré un pacto
  - Estableceré
  lexicon: HALOT
  rationale: El hebreo usa el modismo de 'cortar' un pacto; en español, 'haré un pacto' comunica de forma natural ese acto pactal sin perder el valor verbal de iniciativa divina. 'Estableceré' es posible, pero 'haré' sigue más de cerca la decisión inglesa auditada y mantiene la fuerza idiomática.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perdurable
  - un pacto perpetuo
  lexicon: HALOT
  rationale: '''Pacto'' traduce mejor ברית que ''alianza'' en este contexto profético-jurídico. ''Eterno'' conserva bien el alcance duradero de עוֹלָם, y en español suena más natural que una construcción demasiado técnica.'
- source_word: אֲשֶׁר לֹא אָשׁוּב מֵאַחֲרֵיהֶם
  english_pob_choice: that I will not turn away from them
  chosen_spanish: de que no me apartaré de tras ellos
  alternatives_spanish:
  - de que no volveré atrás de ellos
  - de que no me apartaré de ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'no volveré de ir detrás de ellos', es decir, no me retiraré de seguirlos/acompañarlos para obrar a su favor. Se conserva la tensión del giro 'de tras ellos' para no borrar el trasfondo idiomático, aunque el español no reproduzca el hebreo de forma mecánica.
- source_word: לְהֵיטִיבִי אוֹתָם
  english_pob_choice: to do them good
  chosen_spanish: para hacerles bien
  alternatives_spanish:
  - para beneficiarlos
  - para hacerles el bien
  lexicon: HALOT
  rationale: '''Hacerles bien'' es un equivalente natural y fiel de la finalidad benévola expresada por היטיב. Mantiene el matiz relacional y evita una formulación demasiado abstracta.'
- source_word: יִרְאָתִי
  english_pob_choice: the fear of me
  chosen_spanish: mi temor[b]
  alternatives_spanish:
  - el temor de mí
  - el temor hacia mí
  lexicon: HALOT
  rationale: Con el sufijo de primera persona, el hebreo permite una expresión compacta que puede sonar en español como 'mi temor'. Sin embargo, para no perder la dirección objetiva hacia Dios, se añade la nota explicativa. Se conserva la tensión entre una lectura formal y la interpretación reverente ya documentada en inglés.
- source_word: בִּלְבָבָם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  - en lo íntimo de ellos
  lexicon: HALOT
  rationale: '''Corazón'' transmite el centro interior de voluntad y disposición en antropología hebrea. El singular colectivo en español es idiomático y fiel.'
- source_word: לְבִלְתִּי סוּר מֵעָלָי
  english_pob_choice: so that they will not turn away from me
  chosen_spanish: para que no se aparten de mí
  alternatives_spanish:
  - a fin de que no se desvíen de mí
  - para no apartarse de mí
  lexicon: HALOT
  rationale: '''Apartarse de mí'' expresa bien el valor del verbo סור y enlaza con el contraste del versículo entre la acción fiel de Yahvé y la perseverancia del pueblo. Se mantiene la finalidad/preventiva del hebreo.'
theological_decisions:
- issue: Duración del pacto
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto eterno
  alternative_spanish_readings:
  - pacto perpetuo
  - pacto perdurable
  rationale: Se conserva la permanencia indefinida del pacto sin resolver en la traducción debates sistemáticos posteriores. 'Eterno' es la forma más natural y solemne en español para este uso.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin suavizarla'
- issue: Naturaleza del temor dado por Dios
  english_pob_reading: the fear of me
  chosen_spanish_reading: mi temor[b]
  alternative_spanish_readings:
  - el temor de mí
  - temor reverente hacia mí
  rationale: La frase no describe el temor de Dios hacia sí mismo, sino un temor reverente implantado por Dios en el interior humano. La nota preserva la lectura lexical y evita que 'mi temor' se entienda como posesivo subjetivo.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: No apartarse de tras ellos
  english_pob_reading: that I will not turn away from them
  chosen_spanish_reading: de que no me apartaré de tras ellos
  alternative_spanish_readings:
  - de que no volveré atrás de ellos
  - de que no me retiraré de ellos
  rationale: Se deja visible el eco idiomático del hebreo 'de detrás de ellos' para no borrar el valor del texto fuente. La construcción es menos fluida que una paráfrasis, pero conserva la tensión documental del original.
  doctrine_reference: Principio de trazabilidad textual y respeto a la imagen verbal original
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en la revisión más reciente. No hubo revisiones aplicadas; por tanto, la versión española se alinea con la lectura estable: pacto eterno, no apartarse de ellos para hacerles bien, y el temor de Dios puesto en el corazón para impedir apartarse de él.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en el cuerpo del texto, conforme a la norma del proyecto, aunque este versículo no lo explicite en el hebreo citado por la fuente.
  - Se usa 'pacto' para ברית por consistencia con el uso bíblico y con la equivalencia formal/optimal auditada.
  - Se conserva el campo semántico de 'temor' con nota explicativa para evitar una lectura psicológica o posesiva errónea.
  - La frase 'de tras ellos' refleja la fuente hebrea de manera visible; si la línea editorial priorizara máxima naturalidad, podría reemplazarse por 'de ellos' sin cambiar el sentido general.
