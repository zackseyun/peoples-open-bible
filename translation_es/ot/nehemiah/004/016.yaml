translation:
  language: es
  text: 'También en aquel tiempo dije al pueblo: «Que cada hombre y su siervo pasen la noche dentro de Jerusalén, y que sean para nosotros guardia[a] de noche y trabajadores de día[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vigilancia» o «turno de guardia»; el hebreo מִשְׁמָר puede referirse a guardia, custodia o servicio de vigilancia.
    reason: lexical_alternative
  - marker: b
    text: O «para trabajo de día»; el hebreo dice literalmente «y el día trabajo», con un sustantivo abstracto en paralelo con «guardia».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: La partícula aditiva conserva la conexión con la instrucción anterior; «También» es natural en español y mantiene el valor enlazador sin subir el tono.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal es idiomática; «en aquel tiempo» refleja bien el matiz de contexto histórico sin sonar forzado.
- source_word: אָמַרְתִּי לָעָם
  english_pob_choice: I said to the people
  chosen_spanish: dije al pueblo
  alternatives_spanish:
  - les dije al pueblo
  - hablé al pueblo
  lexicon: HALOT
  rationale: אָמַר es «decir». «Dije al pueblo» mantiene la sencillez del hebreo y el sujeto explícito de primera persona.
- source_word: אִישׁ וְנַעֲרוֹ
  english_pob_choice: each man and his servant
  chosen_spanish: cada hombre y su siervo
  alternatives_spanish:
  - cada hombre y su servidor
  - cada hombre y su criado
  - cada hombre y su sirviente
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en sentido distributivo y נַעַר con un rango amplio (joven/siervo/acompañante). «Siervo» conserva la relación subordinada, pero en español no se puede imponer con certeza el matiz de edad; por eso se evita «joven».
- source_word: יָלִינוּ
  english_pob_choice: spend the night
  chosen_spanish: pasen la noche
  alternatives_spanish:
  - alojen
  - permanezcan la noche
  - duerman
  lexicon: HALOT
  rationale: El verbo לון/לין alude a alojarse o pasar la noche. «Pasen la noche» suena natural y refleja la permanencia nocturna requerida.
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  english_pob_choice: within Jerusalem
  chosen_spanish: dentro de Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - dentro de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: בְּתוֹךְ marca ubicación interna. «Dentro de Jerusalén» expresa el límite espacial de manera clara y fiel.
- source_word: וְהָיוּ לָנוּ
  english_pob_choice: and let them be for us
  chosen_spanish: y que sean para nosotros
  alternatives_spanish:
  - y serán para nosotros
  - para que sean para nosotros
  lexicon: HALOT
  rationale: En contexto, la forma verbal expresa coordinación volitiva/resultativa. «Que sean para nosotros» reproduce bien el valor exhortativo del mandato.
- source_word: הַלַּיְלָה מִשְׁמָר
  english_pob_choice: a guard for us by night
  chosen_spanish: una guardia de noche
  alternatives_spanish:
  - un guardia de noche
  - vigilia nocturna
  - custodia de noche
  lexicon: HALOT
  rationale: מִשְׁמָר puede ser guardia, custodia o turno de vigilancia. «Guardia de noche» conserva la función protectora y mantiene el paralelismo con el día.
- source_word: וְהַיּוֹם מְלָאכָה
  english_pob_choice: workers by day
  chosen_spanish: trabajo de día
  alternatives_spanish:
  - labor de día
  - obra de día
  - que trabajen de día
  lexicon: HALOT
  rationale: מְלָאכָה significa trabajo/labor. En español, el sustantivo abstracto «trabajo de día» sigue de cerca la forma hebrea y el paralelismo con «guardia de noche»; no se fuerza aquí una reinterpretación como personas-obreros.
theological_decisions:
- issue: Valor volitivo de וְהָיוּ
  english_pob_reading: and let them be for us
  chosen_spanish_reading: y que sean para nosotros
  alternative_spanish_readings:
  - y serán para nosotros
  - para que sean para nosotros
  rationale: La coordinación hebrea funciona como exhortación/resultado en contexto. El español con subjuntivo comunica mejor la intención del mandato sin debilitar la relación sintáctica del original.
  doctrine_reference: Gramática verbal del hebreo bíblico; sentido imperativo en discurso directivo.
- issue: Relación entre guardia nocturna y trabajo diurno
  english_pob_reading: a guard for us by night and workers by day
  chosen_spanish_reading: una guardia de noche y trabajo de día
  alternative_spanish_readings:
  - una vigilia de noche y labor de día
  - una guardia nocturna y trabajo diurno
  rationale: 'El hebreo presenta dos sustantivos en paralelo: vigilancia nocturna y trabajo diurno. Mantener ambos como sustantivos evita añadir interpretaciones no exigidas por el texto.'
  doctrine_reference: Paralelismo poético-prosaico hebreo; coherencia semántica de מִשְׁמָר y מְלָאכָה.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una formulación más interpretativa («each man and his young servant», «so that they may be») a una más cercana al hebreo («each man and his servant», «and let them be»). La redacción española sigue ese ajuste: evita especificar juventud en נַעַר, conserva el mandato coordinado con subjuntivo, y mantiene el paralelismo sustantivo entre vigilancia nocturna y trabajo diurno.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo/Mesías» porque no hay vocabulario mesiánico.
  - «Siervo» se usa por la fuerza subordinada de נַעַר en este contexto laboral y de guardia, sin imponer el matiz de edad.
  - «Guardia» y «trabajo» conservan el paralelismo nominal del hebreo; las notas ofrecen alternativas lexicológicas sin alterar el texto principal.
