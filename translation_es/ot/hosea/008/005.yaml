translation:
  language: es
  text: Él ha rechazado tu becerro[a], Samaria; mi ira arde contra ellos. ¿Hasta cuándo no podrán ser inocentes[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu becerro te ha rechazado, Samaria». La sintaxis hebrea permite leer al becerro como sujeto del verbo inicial, aunque el texto principal toma a Dios como sujeto implícito.'
    reason: alternative_reading
  - marker: b
    text: «Inocentes» también puede traducirse «puros» o «limpios». El término hebreo puede tener matices tanto morales como cultuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha repudiado
  lexicon: HALOT
  rationale: El verbo expresa rechazo o repudio. «Ha rechazado» conserva el valor fuerte del verbo sin volverlo más técnico de lo necesario y permite mantener la lectura principal del audit trail.
- source_word: עֶגְלֵךְ
  english_pob_choice: your calf
  chosen_spanish: tu becerro
  alternatives_spanish:
  - tu ternero
  - tu becerro-idolo
  lexicon: HALOT
  rationale: «Becerro» reproduce el sustantivo base en un español bíblico claro. Se evita expandir a «ídolo» en el texto principal para no interpretar más de lo que exige la forma hebrea.
- source_word: שֹׁמְרוֹן
  english_pob_choice: O Samaria
  chosen_spanish: oh Samaria
  alternatives_spanish:
  - Samaria
  lexicon: HALOT
  rationale: Se preserva el valor vocativo de la dirección profética con una interjección natural en español.
- source_word: חָרָה אַפִּי
  english_pob_choice: my anger burns
  chosen_spanish: mi ira arde
  alternatives_spanish:
  - mi ira se enciende
  - mi enojo arde
  lexicon: HALOT
  rationale: La imagen hebrea del ardor de la nariz/ira se conserva con un equivalente natural en español. «Ira» mantiene el registro profético y «arde» reproduce la metáfora.
- source_word: בָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: La preposición se entiende direccionalmente con el verbo de ira. «Contra ellos» es la forma más natural y fiel al sentido contextual.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo?
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar del clamor temporal profético.
- source_word: לֹא יוּכְלוּ
  english_pob_choice: will they be incapable of
  chosen_spanish: no podrán
  alternatives_spanish:
  - no serán capaces de
  - no podrán llegar a
  lexicon: HALOT
  rationale: En este contexto interrogativo, la incapacidad continuada puede expresarse en español de manera más natural con «no podrán», que conserva la idea de imposibilidad persistente.
- source_word: נִקָּיֹן
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - pureza
  - limpieza
  lexicon: HALOT
  rationale: «Inocencia» recoge la dimensión moral principal señalada por el audit trail y funciona bien en español contemporáneo, sin perder del todo el trasfondo cultual.
theological_decisions:
- issue: Sujeto de זָנַח
  english_pob_reading: 'Implicit subject is God: ''He has rejected your calf'''
  chosen_spanish_reading: 'Sujeto implícito: Dios — «Él ha rechazado tu becerro»'
  alternative_spanish_readings:
  - «Tu becerro te ha rechazado, oh Samaria»
  rationale: La gramática hebrea permite ambas lecturas. Se mantiene la lectura principal del POB porque el contexto inmediato de denuncia divina y la cláusula siguiente sobre la ira de Dios favorecen que el sujeto implícito sea Dios.
  doctrine_reference: Lectura profética del rechazo divino de la idolatría
- issue: Valor de נִקָּיֹן
  english_pob_reading: '''Innocence'' may also be rendered ''purity'' or ''cleanness.'' The Hebrew term can carry both moral and cultic overtones.'
  chosen_spanish_reading: «Inocencia» con posible trasfondo de pureza/limpieza
  alternative_spanish_readings:
  - pureza
  - limpieza
  - purificación
  rationale: «Inocencia» expresa mejor el estado de estar libre de culpa en este reproche profético, pero se reconoce que el término hebreo también puede abarcar matices cultuales de pureza o limpieza.
  doctrine_reference: Pureza moral y cultual en el lenguaje profético
translation_notes:
  revision_awareness: 'Revisión más reciente: acuerdo alto; no se introdujeron cambios respecto del último pase revisado. La presente redacción conserva la lectura principal auditada y refleja las alternativas relevantes en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero en este versículo no aparece el nombre divino explícito en el hebreo; por eso la traducción usa solo el sujeto implícito «Él».
  - Se eligió «oh Samaria» para reproducir el vocativo profético con naturalidad en español.
  - Se preservó la metáfora de la ira como ardor en lugar de suavizarla a una simple expresión de enojo.
  - El plural de «ellos» sigue la lectura del audit trail, que entiende la referencia como el pueblo asociado con la idolatría, no solo a la ciudad en singular.
