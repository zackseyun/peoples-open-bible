base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/031.yaml
  text: Then a wind went out from Yahweh and drove quail in from the sea[a], and let them fall beside the camp, about a day’s journey on this side and a day’s journey on that side, all around the camp[b], and about two cubits above the surface of the ground.
  footnotes:
  - marker: a
    text: Or 'a spirit went out from the LORD'; here the context strongly favors 'wind' because it carries the quail from the sea.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'about two cubits above the face of the ground.' The clause may describe the height at which the quail were spread or flew, rather than their depth on the ground.
    reason: alternative_reading
