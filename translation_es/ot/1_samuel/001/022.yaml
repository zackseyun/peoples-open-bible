translation:
  language: es
  text: 'Pero Ana no subió, porque dijo a su marido: «No lo llevaré hasta que el niño sea destetado; entonces lo traeré, para que se presente ante Yahvé[a] y permanezca allí para siempre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posible interpretación o tradición textual: «y yo me presentaré ante Yahvé, y él permanecerá allí para siempre».'
    reason: alternative_reading
  - marker: b
    text: «Para siempre» aquí alude a la dedicación permanente de Samuel al servicio de Yahvé, es decir, durante el resto de su vida.
    reason: cultural_note
lexical_decisions:
- source_word: וְחַנָּה לֹא עָלָתָה
  english_pob_choice: But Hannah did not go up
  chosen_spanish: Pero Ana no subió
  alternatives_spanish:
  - Pero Ana no fue
  - Pero Ana no subió al santuario
  lexicon: HALOT
  rationale: עלה conserva en español la imagen direccional de ‘subir’; en el contexto del santuario en Silo, ‘subió’ mantiene el giro bíblico sin explicitar más de lo que el texto dice.
- source_word: כִּי אָמְרָה
  english_pob_choice: for she said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - porque había dicho
  lexicon: HALOT
  rationale: La conjunción introduce la razón de su ausencia; ‘porque’ expresa con claridad la relación causal en un español natural y fiel al hebreo.
- source_word: לְאִישָׁהּ
  english_pob_choice: to her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: Aquí אִישׁ con sufijo designa claramente al marido. ‘Marido’ es preciso y sobrio en español bíblico contemporáneo.
- source_word: עַד יִגָּמֵל הַנַּעַר
  english_pob_choice: Not until the boy is weaned
  chosen_spanish: Hasta que el niño sea destetado
  alternatives_spanish:
  - Hasta que el muchacho sea destetado
  - No lo traeré sino cuando el niño sea destetado
  lexicon: HALOT
  rationale: El hebreo marca límite temporal; ‘hasta que’ preserva esa fuerza. ‘Destetado’ es el equivalente español más directo de גמל en este contexto.
- source_word: וַהֲבִאֹתִיו
  english_pob_choice: I will bring him
  chosen_spanish: lo traeré
  alternatives_spanish:
  - lo llevaré
  - entonces lo traeré
  lexicon: HALOT
  rationale: El verbo expresa la acción de llevar al niño al santuario. ‘Lo traeré’ sigue bien la secuencia voluntativa del hebreo y suena natural en la cita directa.
- source_word: וְנִרְאָה אֶת פְּנֵי יְהוָה
  english_pob_choice: so that he may appear before Yahweh
  chosen_spanish: para que aparezca delante de Yahvé
  alternatives_spanish:
  - y aparezca ante Yahvé
  - para que se presente ante Yahvé
  lexicon: HALOT
  rationale: נראה en esta construcción idiomática se entiende como ‘aparecer delante de’. ‘Delante de Yahvé’ conserva la referencia al nombre divino según la política terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma española adoptada por el proyecto, en vez de sustituirlo por un título.
- source_word: וְיָשַׁב שָׁם
  english_pob_choice: and remain there
  chosen_spanish: y permanezca allí
  alternatives_spanish:
  - y se quede allí
  - y habite allí
  lexicon: HALOT
  rationale: ישב puede significar ‘permanecer’ en un contexto de residencia estable. ‘Permanezca’ conserva la idea de estancia continua con registro digno.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - de por vida
  - perpetuamente
  lexicon: HALOT
  rationale: עולם indica duración indefinida y permanente; ‘para siempre’ es la forma más natural y compacta en español, sin perder la fuerza de la dedicación permanente.
theological_decisions:
- issue: Sujeto de ‘aparezca delante de Yahvé’ y de ‘permanezca allí’
  english_pob_reading: The subject is Samuel ('he may appear... and remain there'), not Hannah.
  chosen_spanish_reading: 'El sujeto se entiende como el niño: ‘para que aparezca delante de Yahvé y permanezca allí’.'
  alternative_spanish_readings:
  - que yo aparezca delante de Yahvé y permanezca allí
  - para que yo aparezca delante de Yahvé, y él permanezca allí
  rationale: La secuencia española, igual que la inglesa, sigue naturalmente desde ‘lo traeré’ hacia el niño como sujeto de los verbos siguientes. Se conserva la lectura principal sin borrar la tensión textual documentada.
  doctrine_reference: Mantener la tensión textual/documental cuando existe una posible construal alternativa; no resolverla por armonización excesiva.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se refleja la fuerza temporal de עַד con «hasta que», se usa «permanezca» para וְיָשַׁב, y se mantiene la lectura principal en la que el niño es el sujeto de ‘aparezca’ y ‘permanezca’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme a la terminología del proyecto.
  - Se evita ‘SEÑOR’ como sustitución del nombre divino.
  - ‘Destetado’ se conserva por fidelidad léxica a גמל.
  - ‘Marido’ se prefiere a ‘esposo’ por ser el equivalente más neutro y directamente contextual.
