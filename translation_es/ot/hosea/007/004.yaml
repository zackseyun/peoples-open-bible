translation:
  language: es
  text: Todos ellos son adúlteros[a], como un horno encendido por un panadero[b][c], que deja de avivarlo desde el amasado de la masa hasta su fermentación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ardiente» en lugar de «encendido». El participio hebreo puede subrayar el calor activo del horno.
    reason: lexical_alternative
  - marker: b
    text: O «que deja de atizarlo» o «que cesa de atenderlo». El verbo hebreo es difícil en este contexto y puede referirse a que el panadero pausa su cuidado del horno.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que fermenta» o «hasta que leuda». El hebreo probablemente alude al proceso de fermentación o leudado de la masa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Ellos todos
  lexicon: HALOT
  rationale: La forma hebrea es distributiva y enfática; «Todos ellos» conserva esa fuerza de manera natural en español.
- source_word: מְנָאֲפִים
  english_pob_choice: adulterers
  chosen_spanish: adúlteros
  alternatives_spanish:
  - personas adúlteras
  - los que cometen adulterio
  lexicon: HALOT
  rationale: El participio funciona sustantivamente en plural. «Adúlteros» mantiene el cargo moral directo y evita una expansión interpretativa.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Es la partícula comparativa normal; «como» es la opción más natural y fiel en español.
- source_word: תַנּוּר
  english_pob_choice: oven
  chosen_spanish: horno
  alternatives_spanish:
  - horno de pan
  - horno doméstico
  lexicon: HALOT
  rationale: En el contexto de panadería doméstica, «horno» comunica el cuadro con claridad y funciona bien en español actual.
- source_word: בֹּעֵרָה
  english_pob_choice: heated
  chosen_spanish: encendido
  alternatives_spanish:
  - caliente
  - ardiente
  - en llamas
  lexicon: HALOT
  rationale: La forma participial puede enfatizar el calor activo del horno. «Encendido» preserva la imagen de un horno activado/caliente sin exigir llamas visibles.
- source_word: מֵאֹפֶה
  english_pob_choice: by a baker
  chosen_spanish: por un panadero
  alternatives_spanish:
  - de un panadero
  - a cargo de un panadero
  lexicon: HALOT
  rationale: El contexto de cocción favorece una relación de agencia. «Por un panadero» es idiomático y conserva la imagen doméstica.
- source_word: יִשְׁבּוֹת
  english_pob_choice: stops
  chosen_spanish: deja de
  alternatives_spanish:
  - cesa de
  - se detiene
  lexicon: HALOT
  rationale: El verbo indica cesación de una acción; «deja de» es claro y mantiene la idea de una pausa en el proceso.
- source_word: מֵעִיר
  english_pob_choice: stirring
  chosen_spanish: revolver
  alternatives_spanish:
  - avivar
  - atizar
  - remover
  lexicon: HALOT
  rationale: El verbo es difícil en este contexto; la escena del horno sugiere la acción de atenderlo. «Revolver» conserva la idea de movimiento/tending sin fijar de más el detalle técnico.
- source_word: מִלּוּשׁ
  english_pob_choice: from the kneading
  chosen_spanish: desde que se amasa
  alternatives_spanish:
  - desde el amasado
  - a partir del amasado
  lexicon: HALOT
  rationale: La preposición marca punto de partida temporal. «Desde que se amasa» expresa con fluidez el comienzo del proceso en español.
- source_word: בָּצֵק
  english_pob_choice: the dough
  chosen_spanish: la masa
  alternatives_spanish:
  - la masa de pan
  - la masa preparada
  lexicon: HALOT
  rationale: «Masa» es el equivalente natural de dough y encaja bien en el campo semántico de la panadería.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - hasta el punto de
  lexicon: HALOT
  rationale: Marca el límite temporal del proceso; «hasta» reproduce con precisión la relación de duración.
- source_word: חֻמְצָתוֹ
  english_pob_choice: its leavening
  chosen_spanish: su fermentación
  alternatives_spanish:
  - su leudado
  - su levado
  - su leudamiento
  lexicon: HALOT
  rationale: El sustantivo apunta al proceso de fermentación/leudado. «Fermentación» es claro y fiel, sin forzar la imagen más interpretativa de «subida».
theological_decisions:
- issue: Si «adúlteros» debe explicitar adulterio espiritual o de pacto
  english_pob_reading: Retain 'adulterers' in the main text without expansion
  chosen_spanish_reading: Mantener «adúlteros» sin ampliar en el texto principal
  alternative_spanish_readings:
  - adúlteros, es decir, infieles al pacto
  - gente adúltera
  rationale: Oseas sí usa el lenguaje de adulterio con carga de infidelidad de pacto, pero el versículo emplea el término llano. Mantenerlo preserva la tensión teológica sin resolverla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo el símil doméstico del horno y evitando resolver de antemano la tensión profética de adulterio literal/covenantal. No se adoptaron cambios previos en la revisión más reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino por la norma del proyecto cuando el Tetragrámaton sea pertinente en el contexto inmediato; aquí no se requiere.
  - Se prefirió «masa» y «fermentación» para un español natural y técnicamente claro en el símil de panadería.
  - Los marcadores de nota [a], [b] y [c] están anclados directamente en el texto principal y corresponden uno a uno con sus notas.
