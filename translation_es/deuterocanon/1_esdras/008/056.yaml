revisions:
- from: Y con ellos[a], de entre sus hermanos, diez hombres. Y les pesé[b] la plata, el oro y los vasos sagrados de la casa de nuestro Señor, que el rey, sus consejeros, los nobles y todo Israel habían dado como ofrenda.
  to: Y con ellos, de entre sus hermanos[a], diez hombres. Y les pesé[b] la plata y el oro y los vasos sagrados de la casa de nuestro Señor, que el rey, sus consejeros, los nobles y todo Israel habían dado como regalo.
  rationale: Se corrige la nota [a] para reflejar la alternativa léxica documentada en la auditoría inglesa, se ajusta 'como ofrenda' a 'como regalo' para seguir mejor el valor de ἐδωρήσατο, y se suaviza la coordinación nominal con 'la plata y el oro'. No se requiere adjudicación adicional.
