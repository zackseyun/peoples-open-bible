translation:
  language: es
  text: Y los cielos[a] sobre tu cabeza serán de bronce, y la tierra debajo de ti, de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el cielo sobre tu cabeza será de cobre, y la tierra debajo de ti, de hierro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - llegarán a ser
  lexicon: HALOT
  rationale: El hebreo expresa una condición/resultación futura en un contexto de maldición pactal. En español, el futuro simple mantiene ese valor profético y solemne sin añadir matiz procesual innecesario.
- source_word: שָׁמֶיךָ
  english_pob_choice: the heavens above your head
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos sobre tu cabeza
  lexicon: HALOT
  rationale: שָׁמַיִם puede ser 'cielos' o 'cielo'. Se conserva el plural bíblico natural en español, y la relación espacial se explicita con la frase siguiente, como en el inglés auditado.
- source_word: אֲשֶׁר עַל רֹאשְׁךָ
  english_pob_choice: above your head
  chosen_spanish: sobre tu cabeza
  alternatives_spanish:
  - encima de tu cabeza
  - que están sobre tu cabeza
  lexicon: HALOT
  rationale: La relativa hebrea se vuelve una expresión espacial idiomática en español. 'Sobre tu cabeza' conserva la imagen vertical sin recargar la oración.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: En este contexto de dureza e improductividad, 'bronce' sigue la decisión del POB inglés y armoniza con el paralelismo con 'hierro'. Se mantiene la alternativa semántica 'cobre' como nota textual.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y la tierra/la nación
  - y el suelo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ contrasta con los cielos y el término español más natural es 'tierra'. 'La tierra' conserva el alcance amplio del hebreo y el paralelismo cósmico.
- source_word: אֲשֶׁר תַּחְתֶּיךָ
  english_pob_choice: beneath you
  chosen_spanish: debajo de ti
  alternatives_spanish:
  - bajo ti
  - que está debajo de ti
  lexicon: HALOT
  rationale: La expresión espacial se vierte de manera directa y natural. 'Debajo de ti' preserva la simetría con 'sobre tu cabeza'.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: de hierro
  alternatives_spanish:
  - de hierro forjado
  lexicon: HALOT
  rationale: Es el metal estándar del hebreo; se mantiene la imagen de dureza y esterilidad del juicio sin explicitarla en el texto principal.
theological_decisions:
- issue: Imagen metafórica de maldición pactal
  english_pob_reading: Retain the literal metal imagery ('bronze' and 'iron') without explicating the implied drought and hardness in the main text.
  chosen_spanish_reading: Conservar la imagen literal de metales ('bronce' y 'hierro') sin explicar en el cuerpo del verso la sequedad o dureza implícitas.
  alternative_spanish_readings:
  - Parafrasear como cielo endurecido por la sequía y tierra estéril
  rationale: El hebreo presenta una imagen viva de maldición del pacto. La traducción española preserva esa fuerza figurativa para no debilitar el efecto del texto ni sobreinterpretarlo.
  doctrine_reference: Principio de equivalencia óptima; mantener la imagen fuente sin paráfrasis excedente.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece anclado en el texto español junto a ''los cielos''. La redacción sigue el auditorial inglés y el hebreo, manteniendo la imagen metálica y la estructura espacial.'
  spanish_consistency_notes:
  - Se prefirió 'cielos' en plural para reflejar el hebreo שָׁמַיִם y la dicción bíblica natural en español.
  - Se usó 'tierra' en lugar de 'suelo' o 'suelo de la tierra' para conservar el paralelismo cósmico con 'cielos'.
  - Se mantuvo 'bronce' como término principal, con nota de alternativa 'cobre' por la ambigüedad léxica de נְחֹשֶׁת.
