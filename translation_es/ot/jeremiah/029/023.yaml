translation:
  language: es
  text: porque han cometido un acto vergonzoso[a] en Israel[b], y han cometido adulterio con las esposas de sus prójimos, y han hablado en mi nombre una mentira que no les mandé. Y yo soy el que sabe y el testigo[c], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo נְבָלָה puede traducirse también como «una cosa vergonzosa», «una vileza» o «una necedad»; aquí se conserva el matiz de escándalo moral.
    reason: lexical_alternative
  - marker: b
    text: O «entre Israel». El hebreo con ב puede entenderse locativamente como «en Israel» o con sentido distributivo/comunitario.
    reason: lexical_alternative
  - marker: c
    text: 'O «yo sé, y soy testigo». El hebreo es enfático: «Y yo, yo soy el que sabe y es testigo» o «yo soy el que sabe y testigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La construcción causal introduce el motivo del juicio anterior. «Porque» expresa de forma natural y fiel la relación causal en español.
- source_word: עָשׂוּ נְבָלָה
  english_pob_choice: have committed a disgraceful act
  chosen_spanish: han cometido una acción vergonzosa
  alternatives_spanish:
  - han cometido una acción infame
  - han hecho una cosa vergonzosa
  - han cometido una vileza
  lexicon: HALOT
  rationale: נְבָלָה denota un acto moralmente escandaloso y vergonzoso. «Acción vergonzosa» conserva el reproche moral sin volverlo excesivamente interpretativo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: El preposición ב aquí es locativa. «En Israel» es la forma más directa y natural en español.
- source_word: וַיְנַאֲפוּ
  english_pob_choice: have committed adultery
  chosen_spanish: han cometido adulterio
  alternatives_spanish:
  - han sido adúlteros
  - han adulterado
  lexicon: HALOT
  rationale: El verbo נאף significa específicamente adulterio. «Han cometido adulterio» mantiene la fuerza léxica y la acusación concreta.
- source_word: אֶת נְשֵׁי רֵעֵיהֶם
  english_pob_choice: with their neighbors’ wives
  chosen_spanish: con las esposas de sus vecinos
  alternatives_spanish:
  - con las mujeres de sus prójimos
  - con las esposas de sus compañeros
  lexicon: HALOT
  rationale: En español, la construcción natural con «cometer adulterio» requiere «con». «Vecinos» comunica bien la idea de compañeros de comunidad cercana que tiene רֵעַ en este contexto.
- source_word: וַיְדַבְּרוּ דָבָר
  english_pob_choice: have spoken
  chosen_spanish: han hablado
  alternatives_spanish:
  - han dicho una palabra
  - han pronunciado palabras
  lexicon: HALOT
  rationale: La construcción hebrea intensifica el acto de hablar, pero en español la redundancia literal sería áspera. «Han hablado» preserva el hecho verbal sin forzar una calca.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - con mi nombre
  lexicon: HALOT
  rationale: Es la fórmula habitual de autoridad y representación profética. «En mi nombre» es la equivalencia natural y fiel.
- source_word: שֶׁקֶר
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - falsedad
  - engañó
  lexicon: HALOT
  rationale: 'La acusación es concreta: una declaración falsa atribuida a Yahvé. «Una mentira» es clara y directa en español.'
- source_word: אֲשֶׁר לֹא צִוִּיתִם
  english_pob_choice: that I did not command them
  chosen_spanish: que no les mandé
  alternatives_spanish:
  - que yo no les ordené
  - que no les había mandado
  lexicon: HALOT
  rationale: «Mandar» expresa bien la comisión divina en español y evita una formalidad innecesaria. El sentido es falta de autorización profética.
- source_word: וְאָנֹכִי הוּא יֹדֵעַ וָעֵד
  english_pob_choice: And I am the one who knows and am a witness
  chosen_spanish: Y yo soy el que sabe y soy testigo
  alternatives_spanish:
  - Y yo mismo sé y soy testigo
  - Y yo, yo sé y doy testimonio
  lexicon: HALOT
  rationale: La frase hebrea es enfática; «yo soy el que sabe» conserva el relieve de אָנֹכִי הוּא y «soy testigo» mantiene el tono forense. Se evita «doy testimonio» porque el hebreo dice «testigo», no el acto de testificar.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la terminología base del proyecto. «Declara» reproduce la fórmula profética solemne y legible en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología del proyecto, se conserva el nombre propio divino como «Yahvé» y no se lo enmascara con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of נְבָלָה
  english_pob_reading: a disgraceful act
  chosen_spanish_reading: una acción vergonzosa
  alternative_spanish_readings:
  - una vileza
  - una acción deshonrosa
  - una cosa vergonzosa
  rationale: El término hebreo señala una acción moralmente infame y socialmente escandalosa. «Acción vergonzosa» conserva esa carga sin exagerar ni suavizar el juicio.
  doctrine_reference: HALOT entry נְבָלָה; contextual moral outrage in prophetic speech
- issue: Forensic self-witness formula
  english_pob_reading: I am the one who knows and am a witness
  chosen_spanish_reading: yo soy el que sabe y soy testigo
  alternative_spanish_readings:
  - yo sé y soy testigo
  - yo mismo sé y doy testimonio
  rationale: El hebreo presenta una autoafirmación enfática de conocimiento y testimonio. La traducción conserva el paralelismo y la solemnidad judicial sin añadir contenido no explícito.
  doctrine_reference: Prophetic judicial formula; emphasis in אָנֹכִי הוּא
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del POB inglés: mantiene «disgraceful act» como base semántica para נְבָלָה, conserva la acusación concreta de adulterio, y refleja la autodeclaración enfática final con un español forense equivalente. También conserva la decisión doctrinal del proyecto de traducir יְהוָה como «Yahvé» en lugar de «SEÑOR».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la norma del proyecto para יְהוָה.
  - Se eligió «adulterio» para וַיְנַאֲפוּ, manteniendo la fuerza legal y moral del verbo.
  - «En mi nombre» conserva la fórmula profética de autoridad sin ampliaciones interpretativas.
  - La cláusula final mantiene el paralelo entre conocimiento y testimonio, con un orden natural en español.
  - Las notas a pie distinguen alternativas léxicas reales sin duplicar marcadores.
