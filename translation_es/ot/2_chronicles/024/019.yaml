translation:
  language: es
  text: Sin embargo, él envió profetas entre ellos para hacerlos volver a Yahvé; y ellos dieron testimonio contra ellos[a], pero no quisieron escuchar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los advirtieron». El verbo hebreo puede llevar el sentido de advertencia solemne, pero aquí también tiene el matiz de dar testimonio contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַ֤ח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo básico de enviar se expresa de forma natural con «envió», que conserva el tono narrativo y no añade matices de autoridad o urgencia no exigidos por el hebreo.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - a ellos
  - en medio de ellos
  lexicon: HALOT
  rationale: «Entre ellos» transmite bien la idea de introducir a los profetas dentro del grupo, no solo dirigirles un mensaje a distancia.
- source_word: נְבִאִים
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - profetas de Dios
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable en español para נְבִאִים, sin añadir una glosa que el hebreo no explicita aquí.
- source_word: לַהֲשִׁיבָם
  english_pob_choice: to bring them back
  chosen_spanish: para hacerlos volver
  alternatives_spanish:
  - para devolverlos
  - para volverlos
  lexicon: HALOT
  rationale: El hifil de שוב tiene fuerza causativa; «hacerlos volver» conserva mejor esa causalidad que un simple «volver» o una paráfrasis más abstracta.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - al Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto. «A Yahvé» expresa de manera directa el movimiento de retorno al Dios del pacto sin recurrir al ocultamiento con «Señor».
- source_word: וַיָּעִידוּ
  english_pob_choice: they testified against
  chosen_spanish: dieron testimonio contra
  alternatives_spanish:
  - advirtieron a
  - amonestaron a
  - testificaron contra
  lexicon: HALOT
  rationale: La decisión inglesa preserva el matiz forense/covenantal de עוד en hifil. En español, «dieron testimonio contra» mantiene ese peso judicial; «advirtieron» suavizaría demasiado el matiz.
- source_word: בָם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - a ellos
  - entre ellos
  lexicon: HALOT
  rationale: 'En combinación con el verbo de testimonio, la preposición se entiende mejor como adversativa/forense: los profetas testificaron contra el pueblo por su infidelidad.'
- source_word: וְלֹא הֶאֱזִינוּ
  english_pob_choice: but they would not listen
  chosen_spanish: pero no quisieron escuchar
  alternatives_spanish:
  - pero no escucharon
  - pero no prestaron atención
  lexicon: HALOT
  rationale: «No quisieron escuchar» refleja mejor la voluntad resistente implícita en el contexto que un simple fallo pasivo de audición o atención.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, conservando el nombre propio de Dios en la forma española establecida. «Yahvé» evita la sustitución reverencial que borraría la distinción textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the prophetic witness verb וַיָּעִידוּ
  english_pob_reading: they testified against them
  chosen_spanish_reading: dieron testimonio contra ellos
  alternative_spanish_readings:
  - los advirtieron
  - los amonestaron
  rationale: La elección conserva el peso de testimonio profético en un contexto de reprensión del pacto. «Dieron testimonio contra ellos» expresa más claramente la dimensión judicial que «los advirtieron».
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia (1.0) y sin cambios requeridos en la última pasada; por eso no se introducen reajustes textuales ni variantes de revisión.
  spanish_consistency_notes:
  - Se mantiene la distinción entre el nombre divino «Yahvé» y el uso común de títulos.
  - «Dar testimonio contra» conserva coherencia con la lectura forense ya documentada para el verbo hebreo.
  - La construcción «hacerlos volver» sigue el patrón causativo del hifil y evita una simplificación a «volver» sin agente.
