translation:
  language: es
  text: 'Entonces les diréis: «Las aguas del Jordán fueron cortadas[a] delante del arca del pacto de Yahvé. Cuando cruzó[b] el Jordán, las aguas del Jordán fueron cortadas». Y estas piedras serán un memorial[c] para los hijos de Israel para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fueron cortadas» mantiene la imagen hebrea de interrumpir o seccionar el flujo de las aguas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «en su pasar/cruzar», refiriéndose al arca del pacto.
    reason: lexical_alternative
  - marker: c
    text: O «monumento conmemorativo». «Memorial» conserva mejor la función bíblica de señal permanente de recuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרְתוּ
  english_pob_choice: were cut off
  chosen_spanish: fueron cortadas
  alternatives_spanish:
  - fueron detenidas
  - fueron separadas
  lexicon: HALOT
  rationale: El niphal de כרת expresa aquí la interrupción del flujo de las aguas. En español, «fueron cortadas» conserva la imagen verbal y la repetición del verso sin explicar de más.
- source_word: מֵימֵי / מֵי
  english_pob_choice: the waters of
  chosen_spanish: las aguas de
  alternatives_spanish:
  - el agua de
  - las aguas del
  lexicon: HALOT
  rationale: El plural constructo se refleja naturalmente como «las aguas de», preservando el hebreo y el sentido del río como corriente.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  lexicon: HALOT
  rationale: «Delante de» expresa bien la idea espacial de ocurrir ante la presencia del arca, sin volverlo demasiado formal ni teológico en exceso.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahveh
  - el arca del convenio de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el título completo y el nombre divino en la forma POB «Yahvé». «Pacto» conserva el valor bíblico-covenantal mejor que «convenio».
- source_word: בְּעָבְרוֹ
  english_pob_choice: when it crossed over
  chosen_spanish: cuando ella cruzó
  alternatives_spanish:
  - cuando cruzó
  - en su cruzar
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere al arca; en español, «ella» evita ambigüedad y respeta el antecedente gramatical femenino de «arca». «Cruzó» reproduce el movimiento por el Jordán sin añadir matices.
- source_word: וְהָיוּ
  english_pob_choice: And ... shall be
  chosen_spanish: Y ... serán
  alternatives_spanish:
  - Así ... serán
  - Entonces ... serán
  lexicon: HALOT
  rationale: La waw aquí introduce la consecuencia prevista en la instrucción; «Y» conserva la coordinación formal del hebreo y la lectura profética del resultado.
- source_word: הָאֲבָנִים הָאֵלֶּה
  english_pob_choice: these stones
  chosen_spanish: estas piedras
  alternatives_spanish:
  - esas piedras
  - estas mismas piedras
  lexicon: HALOT
  rationale: «Piedras» es el equivalente directo y natural en español. La demostrativa «estas» mantiene la referencia inmediata del texto.
- source_word: לְזִכָּרוֹן
  english_pob_choice: a memorial
  chosen_spanish: un memorial
  alternatives_spanish:
  - un recuerdo
  - un recordatorio
  lexicon: HALOT
  rationale: «Memorial» expresa un objeto o signo con función conmemorativa duradera; «recordatorio» sería demasiado débil para este contexto ritual.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los niños de Israel
  - para los israelitas
  lexicon: HALOT
  rationale: Se conserva el valor lexical de בנים con «hijos», que en español comunica el vínculo genealógico y no neutraliza el masculino plural del hebreo.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es la forma más natural en español para este idiomático de duración continua y preserva el alcance permanente del señalamiento.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la convención editorial del proyecto para el Tetragrámaton, preservando el nombre propio del Dios del pacto en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rasgo masculino explícito en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: for the sons of Israel
  chosen_spanish_reading: para los hijos de Israel
  alternative_spanish_readings:
  - para el pueblo de Israel
  - para los israelitas
  rationale: El hebreo es explícitamente masculino plural constructo; se evita una neutralización que borre la forma léxica presente en el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor conmemorativo de לְזִכָּרוֹן
  english_pob_reading: a memorial
  chosen_spanish_reading: un memorial
  alternative_spanish_readings:
  - un recuerdo
  - un recordatorio
  rationale: El término apunta a un signo duradero de memoria comunitaria, no solo a un acto mental. «Memorial» sostiene mejor ese peso ritual e histórico.
  doctrine_reference: 'DOCTRINE.md Lexical precision: commemorative objects'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del contexto inglés: conserva «crossed over» como «cruzó», cambia el cierre coordinado a «Y estas piedras serán...» en vez de una inferencia más explicativa, y mantiene el final como «para siempre», equivalente natural de עַד עוֹלָם. Se evitó copiar mecánicamente el inglés al sostener la sintaxis española, pero sin perder la repetición intencional de «las aguas del Jordán fueron cortadas».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - Se mantiene «pacto» para בְּרִית por su carga covenantal bíblica.
  - «Memorial» se reserva para el objeto/signo conmemorativo, no para simple recuerdo mental.
  - Se eligió «hijos de Israel» para conservar el masculino plural del hebreo.
  - La repetición de «las aguas del Jordán fueron cortadas» se preserva para reflejar la estructura enfática del versículo.
