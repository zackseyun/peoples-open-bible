  text: וְ/שָׂ֥ם לָ/הּ֙ עֲלִילֹ֣ת דְּבָרִ֔ים וְ/הוֹצִ֥יא עָלֶ֖י/הָ שֵׁ֣ם רָ֑ע וְ/אָמַ֗ר אֶת הָ/אִשָּׁ֤ה הַ/זֹּאת֙ לָקַ֔חְתִּי וָ/אֶקְרַ֣ב אֵלֶ֔י/הָ וְ/לֹא מָצָ֥אתִי לָ֖/הּ בְּתוּלִֽים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/022/014.yaml
  text: and he charges her with false accusations and brings a bad name upon her[a], saying, ‘I took this woman, and when I came near to her[d][c][b], I did not find evidence of virginity in her.’
  footnotes:
  - marker: a
    text: Or 'false charges.' The Hebrew phrase is idiomatic and refers to defamatory accusations.
    reason: lexical_alternative
  - marker: b
    text: Literally 'brings a bad name upon her'; that is, defames her.
    reason: lexical_alternative
  - marker: c
    text: Or 'when I went in to her,' a Hebrew euphemism for sexual relations.
    reason: lexical_alternative
  - marker: d
    text: Literally 'I did not find virginity for her.' In context this refers to evidence or tokens of virginity, as explained in the following verses.
    reason: cross_reference
