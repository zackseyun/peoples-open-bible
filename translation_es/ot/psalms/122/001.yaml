translation:
  language: es
  text: 'Cántico de las Subidas[a]. De David. Me alegré[b] cuando me dijeron: «Vayamos a la casa de Yahvé[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Encabezado hebreo: «Cántico de las Subidas», probablemente una colección litúrgica o de peregrinación; también puede entenderse como «un cántico de ascensos» o «un cántico de subidas».'
    reason: cultural_note
  - marker: b
    text: 'O: «Me regocijé»; también, «Me alegré cuando me decían» o «Estaba alegre cuando me dijeron».'
    reason: lexical_alternative
  - marker: c
    text: Aquí se conserva «Yahvé» para el nombre divino יְהוָה; la traducción tradicional «SEÑOR» también es posible, pero no se usa como sustituto en este proyecto.
    reason: theological_note
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Salmo
  lexicon: HALOT
  rationale: En un encabezado poético, «cántico» comunica con naturalidad el género de una composición para ser cantada, sin añadir la carga interpretativa de «salmo». Mantiene la idea básica de un poema cantado.
- source_word: הַמַּעֲלוֹת
  english_pob_choice: Ascents
  chosen_spanish: las Subidas
  alternatives_spanish:
  - las Ascensiones
  - los Subirales
  lexicon: HALOT
  rationale: La expresión fija שִׁיר הַמַּעֲלוֹת se entiende tradicionalmente como un título de colección o peregrinación. «Subidas» conserva la imagen verbal sin forzar una explicación en el texto principal.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: '«De David» preserva la ambigüedad del prefijo ל en los títulos de salmos: autoría, dedicación o asociación. Es la forma más sobria y fiel en español.'
- source_word: שָׂמַחְתִּי
  english_pob_choice: I rejoiced
  chosen_spanish: Me alegré
  alternatives_spanish:
  - Me regocijé
  - Estuve contento
  lexicon: HALOT
  rationale: El verbo expresa alegría personal en pasado. «Me alegré» es natural en español y mantiene el valor emocional del hebreo sin sobretraducirlo.
- source_word: בְּאֹמְרִים
  english_pob_choice: when they said
  chosen_spanish: cuando me dijeron
  alternatives_spanish:
  - al decirme
  - cuando decían
  lexicon: HALOT
  rationale: La construcción temporal con ב se vierte de modo idiomático como «cuando». El complemento implícito de la primera persona se expresa naturalmente con «me dijeron».
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En español, el clítico dativo «me» evita redundancia y reproduce el destinatario del dicho. La idea de dirección hacia la persona queda clara por el verbo de habla.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - la casa de YHWH
  lexicon: HALOT
  rationale: Se conserva el término del proyecto para el nombre divino, «Yahvé», en lugar de la sustitución tradicional «SEÑOR». «Casa» expresa con fidelidad בֵּית en el giro constructo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La consigna del proyecto pide «Yahvé» para el Tetragrámaton. Se mantiene esa forma en el texto principal por coherencia doctrinal y auditabilidad.
- source_word: נֵלֵךְ
  english_pob_choice: Let us go
  chosen_spanish: iremos
  alternatives_spanish:
  - vamos
  - vayamos
  lexicon: HALOT
  rationale: En este contexto, la primera persona plural imperfecta funciona como invitación o resolución compartida. En español, «iremos» conserva bien el movimiento colectivo hacia la casa de Yahvé, aunque la fuerza exhortativa quede implícita en la cita directa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la norma del proyecto para el español, se traduce con «Yahvé» para preservar el nombre del pacto y evitar el masking litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de נֵלֵךְ en la cita
  english_pob_reading: Let us go
  chosen_spanish_reading: iremos
  alternative_spanish_readings:
  - vayamos
  - vamos
  rationale: Aunque el inglés POB explicita una invitación con «Let us go», el hebreo admite un matiz de resolución compartida además de exhortación. «Iremos» conserva el plural inclusivo sin imponer un modo más fuerte de lo que el hebreo exige.
  doctrine_reference: Hebrew verbal nuance in direct discourse
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y ninguna revisión aplicada en la última pasada. La decisión principal relevante para el español es mantener el Tetragrámaton como «Yahvé» y expresar la primera persona plural de נֵלֵךְ con un español natural que conserve la invitación colectiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה en todo el texto y en la nota.
  - «Cántico de las Subidas» conserva la estructura del título hebreo sin convertirlo en paráfrasis.
  - Se usa puntuación española con comillas angulares no requeridas; se opta por comillas dobles rectas solo por consistencia de registro de datos.
  - Las notas a pie de página cubren alternativas lexicales donde el inglés POB también las documentó.
