translation:
  language: es
  text: 'Y así sucedía[a] año tras año: cada vez que subía a la casa de Yahvé[b], Peniná la provocaba, y ella lloraba y no comía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «él hacía así año tras año». El verbo hebreo está literalmente en singular masculino («él hacía»), a menudo entendido de Elcaná; sin embargo, la cláusula también puede funcionar idiomáticamente para resumir la situación recurrente.
    reason: alternative_reading
  - marker: b
    text: O, «en la casa de Yahvé». La preposición hebrea es literalmente «en», aunque en español con un verbo de movimiento suele decirse «a la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Así
  - Y de este modo
  lexicon: HALOT
  rationale: La combinación introduce el patrón repetido de la escena. «Y así» conserva la conexión narrativa y suena natural en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: it happened
  chosen_spanish: sucedía
  alternatives_spanish:
  - ocurría
  - pasaba
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal singular con valor resumidor/habitual. «Sucedía» transmite el valor iterativo sin forzar un sujeto explícito en español.
- source_word: שָׁנָה בְשָׁנָה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año después de año
  - cada año
  lexicon: HALOT
  rationale: Expresa la repetición anual de manera idiomática y fiel al valor distributivo del hebreo.
- source_word: מִדֵּי עֲלֹתָהּ
  english_pob_choice: whenever she went up
  chosen_spanish: cada vez que subía
  alternatives_spanish:
  - siempre que subía
  - cuando subía
  lexicon: HALOT
  rationale: מִדֵּי + infinitivo señala ocasiones repetidas; «cada vez que» reproduce esa reiteración con claridad. «Subía» mantiene el movimiento hacia el santuario y el femenino singular del sufijo apunta a Ana.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - a la casa de Yahweh
  - a la casa del SEÑOR
  lexicon: HALOT
  rationale: El contexto con verbo de movimiento pide destino en español («a»), aunque el hebreo use בְּ. Se mantiene «casa de Yahvé» conforme al criterio del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio del pacto, sin sustituirlo por una máscara litúrgica.
- source_word: תַּכְעִסֶנָּה
  english_pob_choice: would provoke her
  chosen_spanish: la provocaba
  alternatives_spanish:
  - la irritaba
  - la vexaba
  lexicon: HALOT
  rationale: El Hifil de כעס aquí indica provocar/irritar con intención hostil. En español, el imperfecto simple mantiene el valor habitual narrativo y «provocaba» es claro y fiel.
- source_word: וַתִּבְכֶּה
  english_pob_choice: and she would weep
  chosen_spanish: y ella lloraba
  alternatives_spanish:
  - y lloraba
  - y se echaba a llorar
  lexicon: HALOT
  rationale: La forma wayyiqtol en este contexto resume una conducta repetida. «Lloraba» conserva el hábito narrativo; se añade el pronombre para claridad referencial.
- source_word: וְלֹא תֹאכַל
  english_pob_choice: and not eat
  chosen_spanish: y no comía
  alternatives_spanish:
  - y no comía nada
  - y no se alimentaba
  lexicon: HALOT
  rationale: Continúa la secuencia de efectos habituales. El imperfecto español mantiene el matiz repetido y conciso del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el nombre propio del Dios de Israel. La forma «Yahvé» sigue la convención del proyecto y evita reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó «it would happen» por un pretérito más directo y eliminó un segundo «so» antes de la acción de Peninnah. En español se reflejó esa dirección con «Y así sucedía año tras año» y una secuencia simple: «Peniná la provocaba».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Peniná» sigue la forma española usual del nombre de Peninnah.
  - 'Se preserva el valor habitual/iterativo del verso con imperfectos en español: «sucedía», «subía», «provocaba», «lloraba», «comía».'
  - La nota [a] explica la ambigüedad del sujeto implícito del verbo hebreo.
  - La nota [b] conserva la diferencia entre la preposición hebrea y la naturalidad del español con verbos de movimiento.
