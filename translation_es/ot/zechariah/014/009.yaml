revisions:
- from: Yahvé será rey sobre toda la tierra[a]. En aquel día Yahvé será uno[b], y su nombre uno.
  to: Yahvé será rey sobre toda la tierra. En aquel día Yahvé será uno[a], y su nombre uno[b].
  rationale: Se conserva intacto el texto principal salvo el reanclaje de las notas, porque la traducción base es fiel y natural. Se elimina la nota errónea sobre «solo rey» y se restauran las alternativas léxicas documentadas para ambas ocurrencias de אֶחָד, alineando el español con la evidencia hebrea y el audit trail inglés.
