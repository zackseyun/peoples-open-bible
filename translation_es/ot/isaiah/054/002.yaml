translation:
  language: es
  text: Ensancha el lugar de tu tienda, y extiéndanse las cortinas de tus moradas; no te detengas[a]. Alarga tus cuerdas[b], y refuerza tus estacas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te restrinjas» o «no escatimes».'
    reason: lexical_alternative
  - marker: b
    text: «Cuerdas» se refiere a las sogas o cordones de una tienda; «estacas» son las clavijas o estacas de tienda que se clavan en el suelo.
    reason: cultural_note
lexical_decisions:
- source_word: הַרְחִיבִי
  english_pob_choice: Enlarge
  chosen_spanish: Ensancha
  alternatives_spanish:
  - Haz más ancho
  - Amplía
  lexicon: HALOT
  rationale: El imperativo causativo femenino singular de רחב pide una acción de expansión. «Ensancha» conserva la fuerza exhortativa y suena natural en español sin perder el tono poético.
- source_word: מְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el espacio
  - el sitio
  lexicon: HALOT
  rationale: El sustantivo se refiere a un lugar/espacio concreto. «El lugar» mantiene el paralelismo con «tu tienda» y evita abstraer la imagen.
- source_word: אָהֳלֵךְ
  english_pob_choice: your tent
  chosen_spanish: tu tienda
  alternatives_spanish:
  - tu tabernáculo
  - tu tienda de campaña
  lexicon: HALOT
  rationale: «Tienda» es el equivalente más natural para אָהֶל en español bíblico y conserva la metáfora de habitación ampliable sin caer en un registro excesivamente eclesiástico.
- source_word: וִירִיעוֹת
  english_pob_choice: the curtains
  chosen_spanish: las cortinas
  alternatives_spanish:
  - los lienzos
  - las telas colgantes
  lexicon: HALOT
  rationale: En el contexto de una tienda, יריעות son las cubiertas o cortinas de tela. «Cortinas» es breve y comprensible en español, y el contexto ya aclara su sentido tentario.
- source_word: מִשְׁכְּנוֹתַיִךְ
  english_pob_choice: your dwellings
  chosen_spanish: tus moradas
  alternatives_spanish:
  - tus habitaciones
  - tus viviendas
  lexicon: HALOT
  rationale: El plural de משכן puede significar «moradas» o «lugares de habitación». «Moradas» conserva dignidad poética y mantiene el plural del hebreo mejor que una singularización.
- source_word: יַטּוּ
  english_pob_choice: be stretched out
  chosen_spanish: extiéndanse
  alternatives_spanish:
  - se desplieguen
  - se alarguen
  lexicon: HALOT
  rationale: 'El verbo נטה en esta construcción jussiva expresa extender o tender. La forma reflexiva en español funciona bien como pasiva natural: «extiéndanse».'
- source_word: אַל תַּחְשֹׂכִי
  english_pob_choice: do not hold back
  chosen_spanish: no te detengas
  alternatives_spanish:
  - no te restrinjas
  - no escatimes
  lexicon: HALOT
  rationale: חשׂך en prohibiciones puede expresar retener, escatimar o restringir. En este contexto de preparación expansiva, «no te detengas» comunica bien la exhortación sin añadir más de lo que el hebreo exige.
- source_word: הַאֲרִיכִי
  english_pob_choice: Lengthen
  chosen_spanish: Alarga
  alternatives_spanish:
  - Prolonga
  - Extiende
  lexicon: HALOT
  rationale: El imperativo causativo de ארך pide hacer largo algo. «Alarga» es directo y suficientemente literal para el español.
- source_word: מֵיתָרַיִךְ
  english_pob_choice: your cords
  chosen_spanish: tus cuerdas
  alternatives_spanish:
  - tus cordeles
  - tus sogas
  lexicon: HALOT
  rationale: El sustantivo designa las cuerdas de una tienda. «Cuerdas» conserva la imagen concreta y es la opción más transparente para lectores hispanohablantes.
- source_word: וִיתֵדֹתַיִךְ
  english_pob_choice: your stakes
  chosen_spanish: tus estacas
  alternatives_spanish:
  - tus clavijas
  - tus piquetas
  lexicon: HALOT
  rationale: יתד puede ser estaca o clavo/estaca de tienda. «Estacas» mantiene una imagen robusta y funciona bien junto con «cuerdas» en español.
- source_word: חַזֵּקִי
  english_pob_choice: strengthen
  chosen_spanish: refuerza
  alternatives_spanish:
  - fortalece
  - asegura
  lexicon: HALOT
  rationale: El piel imperativo de חזק implica hacer fuerte o firme. «Refuerza» expresa bien la acción de asegurar las estacas en una construcción/toldo de tienda.
theological_decisions:
- issue: Metáfora de la tienda como imagen de restauración de Sion
  english_pob_reading: Retain the tent/dwelling metaphor literally rather than interpret it as population growth or restoration in the main text.
  chosen_spanish_reading: Mantener literalmente la imagen de la tienda y las moradas, sin explicitar en el texto principal que se trata de crecimiento de población o restauración nacional.
  alternative_spanish_readings:
  - Amplía tu hogar
  - Haz espacio para más habitantes
  rationale: El hebreo presenta imperativos concretos de ampliación de una tienda. Seguir la imagen preserva la fuerza profética y deja que su alcance teológico emerja por el contexto, no por paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Revisión sin cambios sustanciales respecto del análisis auditado: se conserva la metáfora de la tienda, el paralelismo entre cuerdas y estacas, y la fuerza exhortativa de los imperativos. La formulación española prioriza claridad natural sin perder el valor concreto del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tratamiento en segunda persona singular femenina («tu», «te», imperativos en femenino) para reflejar el destinatario colectivo personificado en Sion.
  - «Moradas» preserva el plural del hebreo משכנות sin recurrir a un tecnicismo litúrgico.
  - Los pares «cuerdas/estacas» siguen la imaginería de la tienda y evitan neutralizaciones abstractas.
