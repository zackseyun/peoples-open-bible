translation:
  text: |-
    1. So then, do not be eager in greed to corrupt your deeds, or by empty words to deceive your souls. For if, in purity of heart, you keep silence, you will understand how to hold fast the will of God and to cast away the will of Beliar.
    
    2. The sun and the moon and the stars do not alter their appointed order; so you also must not alter the law of God through the disorder of your deeds.
    
    3. The nations, having gone astray and having forsaken the Lord, altered their order, and gave heed to wood and stone, to spirits of deceit.
    
    4. But you, my children, must not be so. Rather, know in the firmament, on the earth, and in the sea, and in all created things, the Lord who made all things, so that you may not become like Sodom, which changed the order of its nature.
    
    5. In the same way also the Watchers changed the order of their nature, and the Lord cursed them at the time of the flood; because of them he made the earth desolate and without fruit.
