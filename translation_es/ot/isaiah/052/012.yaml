translation:
  language: es
  text: Porque no saldrán con prisa, ni irán en fuga[a]; porque Yahvé va delante de ustedes, y el Dios de Israel es su retaguardia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en huida» / «huyendo» / «como fugitivos».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el Dios de Israel los va recogiendo por detrás»; es decir, protege su retaguardia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחִפָּזוֹן
  english_pob_choice: in haste
  chosen_spanish: con prisa
  alternatives_spanish:
  - apuradamente
  - de prisa
  - con premura
  lexicon: HALOT
  rationale: חִפָּזוֹן expresa salida apresurada o precipitada. 'Con prisa' comunica bien la idea en español natural y conserva el contraste con una salida ordenada y protegida, sin añadir el matiz emocional de pánico que no es necesario en el hebreo.
- source_word: תֵּצֵאוּ
  english_pob_choice: you will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán fuera
  - partirán
  - saldrán afuera
  lexicon: HALOT
  rationale: יצא significa literalmente 'salir'. 'Saldrán' mantiene la imagen concreta de movimiento hacia fuera y funciona mejor en español que una perífrasis más pesada.
- source_word: וּבִמְנוּסָה
  english_pob_choice: in flight
  chosen_spanish: en fuga
  alternatives_spanish:
  - huyendo
  - en huida
  - en escape
  lexicon: HALOT
  rationale: מְנוּסָה denota huida o fuga. 'En fuga' es breve y fiel al campo semántico de escapar precipitadamente; además mantiene el paralelismo con 'con prisa'.
- source_word: תֵלֵכוּן
  english_pob_choice: you will go
  chosen_spanish: irán
  alternatives_spanish:
  - caminarán
  - proseguirán
  - marcharán
  lexicon: HALOT
  rationale: הלך puede ser 'ir' o 'caminar'. Aquí 'irán' conserva el paralelismo con 'saldrán' y evita un tono demasiado literal o arcaizante.
- source_word: הֹלֵךְ לִפְנֵיכֶם
  english_pob_choice: is going before you
  chosen_spanish: va delante de ustedes
  alternatives_spanish:
  - va al frente de ustedes
  - camina delante de ustedes
  - va por delante de ustedes
  lexicon: HALOT
  rationale: El participio expresa acción continua o segura. 'Va delante de ustedes' es natural en español, preserva la imagen de liderazgo divino y evita perder la fuerza dinámica del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El POB en inglés usa la transliteración del nombre divino; en español, la forma establecida y legible en este proyecto es 'Yahvé'. Mantiene el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: וּמְאַסִּפְכֶם
  english_pob_choice: is your rear guard
  chosen_spanish: es su retaguardia
  alternatives_spanish:
  - los cubre por detrás
  - va recogiendo por detrás de ustedes
  - es el que los protege por la espalda
  lexicon: HALOT
  rationale: 'אסף en este contexto tiene un sentido protector militar/procesional: cubrir la parte trasera o cerrar la marcha. ''Retaguardia'' es la manera más clara y digna de expresar esa función en español, sin volverlo demasiado explicativo.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción constructa es directa. 'El Dios de Israel' preserva la identidad pactual y el vínculo con el pueblo, tal como en el inglés POB.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión doctrinal del POB preserva el nombre divino en lugar de ocultarlo con un sustituto. En español, 'Yahvé' es la forma adoptada por este proyecto para mantener esa misma transparencia y legibilidad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Función de וּמְאַסִּפְכֶם
  english_pob_reading: is your rear guard
  chosen_spanish_reading: es su retaguardia
  alternative_spanish_readings:
  - los protege por detrás
  - va cerrando la marcha
  rationale: La lectura no es solo espacial sino protectora. 'Retaguardia' conserva la idea militar/procesional de cobertura trasera sin perder la sobriedad del texto profético.
  doctrine_reference: HALOT; English POB lexical note on military/processional sense
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: la decisión clave es mantener la oposición semántica entre salida apresurada/huida y salida guiada por Yahvé. La diferencia principal es de terminología española: el nombre divino se vierte como ''Yahvé'', y ''rear guard'' se expresa como ''retaguardia'' para conservar naturalidad y precisión.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en conformidad con la política del proyecto en español.
  - Se conserva el paralelismo verbal ('saldrán' // 'irán') y la imagen de protección ('va delante de ustedes' // 'es su retaguardia').
  - '''Fuga'' y ''retaguardia'' se usan en sentido funcional, no para introducir dramatización adicional.'
  - El tono es formal y publicable, sin depender de fórmulas tradicionales que oculten el nombre divino.
