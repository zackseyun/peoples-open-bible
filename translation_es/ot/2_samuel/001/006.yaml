translation:
  language: es
  text: 'Y el joven que le informó dijo[a]: «Yo me hallaba por casualidad[b] en el monte Gilboa, y he aquí, Saúl estaba apoyado sobre su lanza, y he aquí, los carros[c] y los jinetes lo iban alcanzando[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el joven que le daba el informe». El hebreo presenta al mensajero por su función de comunicar la noticia.
    reason: lexical_alternative
  - marker: b
    text: O «yo estaba por casualidad en el monte Gilboa». El hebreo intensifica la idea de presencia accidental.
    reason: lexical_alternative
  - marker: c
    text: O «la fuerza de carros y los jinetes» o «los carros y la caballería».
    reason: lexical_alternative
  - marker: d
    text: O «lo habían alcanzado» o «lo estaban presionando de cerca». El hebreo puede expresar tanto que lo alcanzaron como que se le venían cerrando encima.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  lexicon: HALOT
  rationale: נַעַר aquí designa al mensajero como joven varón; «el joven» conserva el sentido básico y evita importar la relación de servicio que no está explícita en el contexto inmediato.
- source_word: הַמַּגִּיד לוֹ
  english_pob_choice: who told him
  chosen_spanish: que le daba el informe
  alternatives_spanish:
  - que le informó
  - que le contó
  lexicon: HALOT
  rationale: 'El participio de נגד funciona como rasgo identificador del joven: es el que comunica la noticia. «Le daba el informe» mantiene el carácter narrativo y el vínculo con David sin sonar demasiado técnico o burocrático.'
- source_word: נִקְרֹא נִקְרֵיתִי
  english_pob_choice: I happened to be
  chosen_spanish: me encontré por casualidad
  alternatives_spanish:
  - me hallé por casualidad
  - me tocó estar
  lexicon: HALOT
  rationale: La construcción intensiva con קרה expresa encuentro accidental/presencia fortuita. «Me encontré por casualidad» comunica la idiomática de forma natural en español y evita sugerir una acción deliberada.
- source_word: בְּהַר הַגִּלְבֹּעַ
  english_pob_choice: on Mount Gilboa
  chosen_spanish: en el monte Gilboa
  alternatives_spanish:
  - sobre el monte Gilboa
  - en la sierra de Gilboa
  lexicon: HALOT
  rationale: En español narrativo bíblico, «en el monte Gilboa» expresa el lugar del hallazgo de manera clara; «montes» o «sierra» serían más interpretativos aquí.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y, he aquí
  alternatives_spanish:
  - y mira
  - y, mira
  lexicon: HALOT
  rationale: La partícula exige un marcador discursivo que preserve el énfasis de sorpresa/atención. «He aquí» es reverente y fiel al tono de escena vívida; se conserva en ambas apariciones para reproducir la cadencia hebrea.
- source_word: נִשְׁעָן
  english_pob_choice: was leaning on
  chosen_spanish: estaba apoyado sobre
  alternatives_spanish:
  - se apoyaba sobre
  - reposaba sobre
  lexicon: HALOT
  rationale: El participio niphal indica postura de apoyo físico. «Estaba apoyado sobre» es el equivalente más natural y preciso en español para describir la posición de Saúl.
- source_word: חֲנִיתוֹ
  english_pob_choice: his spear
  chosen_spanish: su lanza
  alternatives_spanish:
  - su lanza de guerra
  - su pica
  lexicon: HALOT
  rationale: חֲנִית puede abarcar lanza o arma arrojadiza; «lanza» es el término español más transparente y amplio para este contexto militar.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - la carrocería
  lexicon: HALOT
  rationale: רֶכֶב alude al cuerpo/carga de carros de guerra; «los carros» es la forma breve y comprensible que mantiene la imagen militar sin sobreexplicar.
- source_word: בַעֲלֵי הַפָּרָשִׁים
  english_pob_choice: the horsemen
  chosen_spanish: los jinetes
  alternatives_spanish:
  - la caballería
  - los montados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para los hombres montados. «Jinetes» es natural en español y conserva el enfoque en las personas que montan, no en la unidad abstracta.
- source_word: הִדְבִּקֻהוּ
  english_pob_choice: were closing in on him
  chosen_spanish: lo iban alcanzando
  alternatives_spanish:
  - lo alcanzaban
  - lo perseguían de cerca
  - lo iban persiguiendo
  lexicon: HALOT
  rationale: El Hiphil de דבק expresa alcanzar, pegarse a, acercarse estrechamente. «Lo iban alcanzando» preserva la progresión dinámica y la idea de persecución inminente mejor que un pasado simple.
translation_notes:
  revision_awareness: La versión sigue de cerca el pasaje hebreo y el trazado auditado en inglés. Se mantuvieron los dos marcadores de הִנֵּה, la construcción de encuentro casual con נקרא נקרֵיתי, y la progresión aspectual de הִדְבִּקוּהוּ como proceso de acercamiento, no como captura ya concluida.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «joven» y «jinetes» por ser términos naturales y suficientemente precisos en este contexto narrativo militar.
  - Se mantuvo la repetición de «he aquí» para reflejar el ritmo del hebreo y la atención súbita del relato.
