translation:
  language: es
  text: Entonces Jacob besó a Raquel[a], y alzó su voz y lloró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jacob saludó a Raquel con un beso». El verbo hebreo normalmente significa «besó», pero en este contexto también puede tener el matiz de un saludo familiar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשַּׁק
  english_pob_choice: kissed
  chosen_spanish: besó
  alternatives_spanish:
  - saludó con un beso
  lexicon: HALOT
  rationale: El verbo hebreo נשק en qal significa normalmente 'besar'. En este contexto narrativo, el sentido más directo y natural en español es 'besó'. La alternativa 'saludó con un beso' conserva la posible función social del gesto, pero atenúa el valor literal que el texto permite y que la POB inglesa mantuvo como sentido principal.
- source_word: לְרָחֵל
  english_pob_choice: Rachel
  chosen_spanish: a Raquel
  alternatives_spanish:
  - a Rachel
  lexicon: HALOT
  rationale: El complemento con ל expresa el objeto indirecto del beso; en español se expresa naturalmente con 'a'. Se usa 'Raquel' por la forma bíblica tradicional y clara en español, equivalente al nombre propio transliterado en la POB inglesa.
- source_word: וַיִּשָּׂא אֶת־קֹלוֹ
  english_pob_choice: lifted up his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para emitir la voz con intensidad, a menudo en llanto o habla fuerte. 'Alzó su voz' conserva el color idiomático del hebreo y corresponde bien a la elección inglesa de mantener 'lifted up his voice'.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - se puso a llorar
  lexicon: HALOT
  rationale: בכה significa 'llorar/lloró'. En español, 'lloró' es claro, natural y suficientemente solemne. 'Sollozó' sería más específico de un tipo de llanto que el hebreo no exige; 'se puso a llorar' añade una perífrasis no necesaria.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: Hebrew waw-consecutive usage
  rationale: La waw consecutiva avanza la narración. 'Entonces' comunica mejor la secuencia en español moderno que una repetición inicial de 'Y', manteniendo la progresión narrativa de la POB inglesa.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético de Génesis 29:11 y coincide en sentido con la POB inglesa: secuencia narrativa, beso literal, modismo de la voz alzada y llanto. No hay revisiones textuales relevantes registradas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico «Raquel» para uniformidad con el uso español estándar.
  - Se conserva el paralelismo narrativo breve del hebreo con una sola oración coordinada.
  - La nota al pie se ancla en «Raquel[a]» para preservar la alternativa lexical documentada sin recargar el texto principal.
