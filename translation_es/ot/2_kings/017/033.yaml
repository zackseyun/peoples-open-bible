translation:
  language: es
  text: Temían a Yahvé[a], pero servían a sus propios dioses, conforme a la costumbre de las naciones de las cuales habían sido exiliados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Temían a Yahvé y servían a sus dioses». La conjunción hebrea es simplemente «y»; el contraste se explicita en español por claridad contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma transliterada, conforme al criterio POB. "Yahvé" evita la sustitución por un título y mantiene la referencia personal del nombre revelado a Israel.
- source_word: הָיוּ יְרֵאִים
  english_pob_choice: they feared
  chosen_spanish: temían
  alternatives_spanish:
  - estaban temiendo
  - reverenciaban
  lexicon: HALOT
  rationale: La construcción expresa una acción habitual o continua. En español, "temían" comunica de modo natural el temor reverente hacia Yahvé sin volverlo rígido o excesivamente analítico.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their own gods
  chosen_spanish: sus propios dioses
  alternatives_spanish:
  - sus dioses
  - los dioses de ellos
  lexicon: HALOT
  rationale: El sufijo posesivo se refleja con "sus propios" para conservar el contraste explícito con Yahvé, como en el audit trail inglés, sin añadir contenido ajeno al hebreo.
- source_word: הָיוּ עֹבְדִים
  english_pob_choice: they served
  chosen_spanish: servían
  alternatives_spanish:
  - estaban sirviendo
  - adoraban
  lexicon: HALOT
  rationale: עבד con referencia a deidades puede abarcar servicio religioso. "Servían" mantiene la cercanía léxica con el hebreo y preserva el paralelismo con "temían".
- source_word: כְּמִשְׁפַּט
  english_pob_choice: according to the custom
  chosen_spanish: conforme a la costumbre
  alternatives_spanish:
  - según la práctica
  - según la manera
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט se refiere a una práctica establecida, no a un juicio legal. "Conforme a la costumbre" suena natural en español y conserva el matiz de conducta habitual.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, גּוֹיִם apunta a los pueblos de origen de los exiliados. "Las naciones" es la opción más directa y neutral en español.
- source_word: אֲשֶׁר הִגְלוּ אֹתָם מִשָּׁם
  english_pob_choice: from which they had been exiled
  chosen_spanish: de donde habían sido exiliados
  alternatives_spanish:
  - de donde habían sido deportados
  - de donde los habían llevado cautivos
  lexicon: HALOT
  rationale: Se conserva el sentido pasivo natural del hebreo. "Exiliados" refleja bien el contexto histórico y evita introducir una formulación más interpretativa que el texto no exige.
theological_decisions:
- issue: Relación entre el temor a Yahvé y el servicio a otros dioses
  english_pob_reading: Render the clauses with 'but' to highlight the inconsistency described in context.
  chosen_spanish_reading: Usar "pero" para destacar la incongruencia entre temer a Yahvé y servir a otros dioses.
  alternative_spanish_readings:
  - y
  - aunque
  rationale: Aunque el hebreo emplea una conjunción simple equivalente a "y", el contexto describe sincretismo e incoherencia religiosa. "Pero" comunica esa tensión de forma clara en español sin negar la forma del original, siguiendo la equivalencia óptima del POB inglés.
  doctrine_reference: 'Translation philosophy: preserve the source sense in readable modern Spanish without suavizing the tension in the verse.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio auditado del POB inglés. No hubo revisiones aplicadas en el contexto inglés; se conserva la tensión entre el temor a Yahvé y el servicio a los dioses propios, explicitando la oposición con "pero" en español por claridad contextual.
  spanish_consistency_notes:
  - Se usó "Yahvé" consistentemente para יְהוָה, conforme al estándar del proyecto.
  - '"Temían" y "servían" mantienen un paralelismo verbal sobrio y natural en español.'
  - '"Sus propios dioses" conserva el contraste posesivo sin sobreinterpretar el hebreo.'
  - '"Conforme a la costumbre" evita un calco rígido de מִשְׁפָּט y resulta idiomático.'
  - La nota al pie marca la alternativa literal con "y" para no perder la ambigüedad/construcción del hebreo.
