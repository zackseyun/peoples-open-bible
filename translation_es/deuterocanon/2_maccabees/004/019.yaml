revisions:
- from: Jasón, el hombre vil, envió como embajadores antioquianos desde Jerusalén[a], llevando trescientas dracmas de plata para el sacrificio a Heracles; pero los que las llevaban pidieron que no se usaran para sacrificio.
  to: Jasón, el hombre vil, envió delegados antioquianos desde Jerusalén[a], llevando trescientas dracmas de plata para el sacrificio a Heracles; pero los que las llevaban pidieron que no se usaran para sacrificio.
  rationale: Se reemplaza «como embajadores antioquianos» por «delegados antioquianos» para reflejar mejor θεωρούς Ἀντιοχέας en español natural, evitar una sobrelectura diplomática moderna, y conservar el sentido de enviados oficiales. Se mantiene el resto porque transmite fielmente el griego y el rastro de auditoría inglés.
