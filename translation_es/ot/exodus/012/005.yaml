- from: Tu cordero será sin defecto[a], macho de un año; lo tomaréis de las ovejas o de las cabras.
  to: El cordero será para ustedes sin defecto[a], macho de un año; lo tomarán de entre las ovejas o de entre las cabras.
  rationale: Se corrige la discordancia entre «tu» y «tomaréis» usando una formulación que refleja mejor el destinatario plural del hebreo y su singular genérico para el animal. También se pule la nota léxica con «cabrito», más natural y precisa en español bíblico. El resto del contenido se mantiene fiel al hebreo y al razonamiento del POB inglés.
