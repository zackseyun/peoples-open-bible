review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: acción hostil contra los dos ancianos, convicción legal por las propias palabras de ellos, carácter forense de «falsos testigos» y justicia retributiva en la cláusula final. Sin embargo, «los había dejado convictos» suena poco natural y algo calcado; además, «por su propia boca» funciona, pero «por sus propias palabras» o «por boca de ellos mismos» comunica mejor en español actual el valor de ἐκ τοῦ στόματος αὐτῶν en este contexto judicial.'
  spanish_quality_summary: La redacción es clara y mayormente fiel, pero necesita un ajuste menor de naturalidad y registro. «Había dejado convictos» no es una formulación española amplia ni elegante para lectura bíblica; «había probado» o «había dejado en evidencia» sería más idiomático, y «había probado… que eran falsos testigos» preserva bien el matiz forense sin sonar forzado. El resto del verso lee con dignidad y claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ancianos», «Daniel», «falsos testigos» y la formulación retributiva están alineados con el expediente inglés y con el contexto. La única corrección recomendada es estilístico-lexical en la representación de συνέστησεν.
  issues:
  - severity: medium
    issue: «los había dejado convictos» es poco natural en español bíblico general
    rationale: Aunque intenta reflejar «had convicted», la expresión suena calcada y puede resultar extraña o regional. «Había probado…» transmite mejor la constatación legal de culpabilidad basada en su propio testimonio.
  - severity: low
    issue: «por su propia boca» puede afinarse
    rationale: La frase es comprensible, pero en español actual «por sus propias palabras» suena más natural y mantiene el sentido de que su propio testimonio los condenó.
  revised_spanish_text: Y se levantaron contra los dos ancianos, porque Daniel había probado, por sus propias palabras, que eran falsos testigos, y les hicieron lo mismo que ellos habían planeado maliciosamente hacer.
  revision_rationale: Se reemplaza «los había dejado convictos» por «había probado… que eran falsos testigos» para conservar el sentido forense de συνέστησεν en un español más natural y ampliamente legible. También se ajusta «por su propia boca» a «por sus propias palabras» para expresar con mayor claridad el valor testimonial de ἐκ τοῦ στόματος αὐτῶν sin perder la fuerza jurídica. No se requieren notas nuevas.
