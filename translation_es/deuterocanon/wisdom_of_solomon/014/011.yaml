translation:
  language: es
  text: Por tanto, habrá también una visita sobre los ídolos de las naciones[a], porque entre las criaturas de Dios llegaron a ser una abominación, y tropiezo para las almas de los hombres[b], y una trampa para los pies de los insensatos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «habrá también visita sobre los ídolos de las naciones».'
    reason: lexical_alternative
  - marker: b
    text: Aquí «los hombres» significa seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Por eso
  lexicon: LSJ
  rationale: Expresa con naturalidad la inferencia causal del griego y conserva el enlace argumentativo con el contexto anterior.
- source_word: ἐν εἰδώλοις ἐθνῶν
  english_pob_choice: upon the idols of the nations
  chosen_spanish: sobre los ídolos de las naciones
  alternatives_spanish:
  - contra los ídolos de las naciones
  - respecto de los ídolos de las naciones
  lexicon: LSJ
  rationale: El giro preposicional español 'sobre' comunica bien el matiz de juicio que recae sobre el objeto, sin añadir una interpretación que el texto no exige. 'De las naciones' conserva el genitivo sin forzarlo a 'gentiles'.
- source_word: ἐπισκοπὴ ἔσται
  english_pob_choice: there will also be a visitation
  chosen_spanish: habrá también una visita de juicio
  alternatives_spanish:
  - habrá también una visita
  - habrá también una inspección
  - vendrá también un juicio
  lexicon: LSJ
  rationale: ἐπισκοπή puede significar visita/inspección con sentido judicial. 'Visita de juicio' mantiene la cercanía lexical a 'visitation' y hace explícita la fuerza punitiva indicada por el contexto.
- source_word: ἐν κτίσματι θεοῦ
  english_pob_choice: among God’s creatures
  chosen_spanish: entre las criaturas de Dios
  alternatives_spanish:
  - en la creación de Dios
  - dentro de la creación de Dios
  lexicon: LSJ
  rationale: '''Creaturas'' / ''criaturas'' expresa con claridad el campo de lo creado y se ajusta mejor al valor contextual de κτίσμα que una abstracción como ''creación''. ''Entre'' refleja el ἐν de manera idiomática en español.'
- source_word: εἰς βδέλυγμα ἐγενήθησαν
  english_pob_choice: they became an abomination
  chosen_spanish: se volvieron abominación
  alternatives_spanish:
  - se hicieron abominación
  - llegaron a ser una abominación
  - se volvieron detestables
  lexicon: LSJ
  rationale: '''Abominación'' conserva la fuerza religiosa y moral de βδέλυγμα. ''Se volvieron'' expresa el cambio de estado sin alejarse del verbo griego.'
- source_word: σκάνδαλα
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - escándalo
  - obstáculo
  lexicon: LSJ
  rationale: En español, 'tropiezo' transmite bien la metáfora de caída moral y evita una repetición pesada si se mantiene el singular colectivo. 'Piedra de tropiezo' queda como alternativa más explícita.
- source_word: ψυχαῖς ἀνθρώπων
  english_pob_choice: to the souls of men
  chosen_spanish: para las almas de los hombres
  alternatives_spanish:
  - para las almas humanas
  - para las personas
  lexicon: LSJ
  rationale: '''Almas'' preserva la dimensión interior y moral de ψυχή. ''Hombres'' refleja el genérico humano del POB inglés; se mantiene como formulación tradicional y comprensible, con alternativa inclusiva posible en nota.'
- source_word: παγίδα ποσὶν ἀφρόνων
  english_pob_choice: a snare for the feet of fools
  chosen_spanish: una trampa para los pies de los insensatos
  alternatives_spanish:
  - una red para los pies de los necios
  - un lazo para los pies de los insensatos
  lexicon: LSJ
  rationale: '''Trampa'' comunica naturalmente παγίς en español, y ''para los pies'' conserva la imagen concreta de atrapamiento. ''Insensatos'' refleja el valor sapiencial de ἄφρων sin reducirlo a mera falta intelectual.'
theological_decisions:
- issue: Valor de ἐπισκοπή en un contexto de juicio
  english_pob_reading: there will also be a visitation upon the idols of the nations
  chosen_spanish_reading: habrá también una visita de juicio sobre los ídolos de las naciones
  alternative_spanish_readings:
  - habrá también una visita sobre los ídolos de las naciones
  - habrá también una inspección judicial sobre los ídolos de las naciones
  rationale: La palabra griega admite 'visita' o 'visitation', pero aquí el contexto inmediato describe abominación, tropiezo y trampa, de modo que la visita tiene sentido punitivo. La formulación elegida conserva la base léxica y aclara la función judicial.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar el genérico humano de ἀνθρώπων
  english_pob_reading: men here means human beings generally
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  - los seres humanos
  rationale: El griego usa un plural genérico para la humanidad. En el texto principal se mantiene 'los hombres' por continuidad con la tradición bíblica y por fidelidad al alcance genérico; el sentido inclusivo queda resguardado por el contexto y puede explicitarse en nota.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El griego de referencia y el texto inglés auditado coinciden en el sentido general. Tomé como base la revisión más reciente del POB inglés: conservar ''visitation'' como ''visita de juicio'' en lugar de un juicio directo, mantener el matiz locativo de ἐν κτίσματι θεοῦ con ''entre las criaturas de Dios'', y reflejar la imagen concreta de ''feet'' con una solución natural en español. No se introdujeron lecturas textuales alternativas fuera de las documentadas en el audit trail.'
  spanish_consistency_notes:
  - Se preservó 'Yahvé' en línea con los defaults del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió 'ídolos de las naciones' para conservar el referente idolátrico sin convertirlo en un comentario interpretativo sobre 'gentiles'.
  - '''Abominación'', ''tropiezo'' y ''trampa'' mantienen el tono sapiencial y moral del pasaje sin suavizar la dureza del griego.'
  - Se evitó 'Cristo' o terminología cristológica porque no pertenece al léxico del versículo.
  - La nota sobre 'los hombres' resuelve la posible ambigüedad de género en español sin alterar el texto principal.
