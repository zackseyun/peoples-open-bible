translation:
  language: es
  text: Reclínate[c] como[a] un hombre bien criado, y no engullas[b], no sea que te vuelvas repugnante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “como un hombre distinguido” o “como un hombre escogido”. La frase hebrea es algo incierta en su matiz, aunque el sentido general apunta a una conducta cortés y refinada.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego de Swete no corresponde a esta línea hebrea en Sirácides 31:19, lo que indica una discrepancia a nivel de la tradición textual del versículo.
    reason: textual_variant
  - marker: c
    text: Reclinarse era la postura habitual en las comidas formales del mundo mediterráneo antiguo.
    reason: cultural_note
lexical_decisions:
- source_word: הסב
  english_pob_choice: Recline
  chosen_spanish: Recuéstate
  alternatives_spanish:
  - Recuéstate a la mesa
  - Reclínate
  - Siéntate a la mesa
  lexicon: HALOT
  rationale: En contexto de banquete, el verbo expresa la postura de comer reclinado, no solo 'sentarse'. En español, 'recuéstate' comunica mejor esa postura antigua y mantiene el tono concreto de la instrucción.
- source_word: כאיש אשר נבחר
  english_pob_choice: like a well-bred man
  chosen_spanish: como un hombre bien criado
  alternatives_spanish:
  - como un hombre distinguido
  - como un hombre escogido
  - como un hombre de refinamiento
  lexicon: HALOT
  rationale: La frase apunta a porte selecto y conducta adecuada en la mesa. 'Bien criado' refleja ese matiz social y ético en un español natural, sin convertirlo en un sentido más teológico de 'escogido' que aquí no es seguro.
- source_word: תעט
  english_pob_choice: gobble
  chosen_spanish: engullas
  alternatives_spanish:
  - tragues con avidez
  - devoraras
  - gobiernes
  lexicon: HALOT
  rationale: El contexto condena comer con avidez y mala educación. 'Engullas' conserva la fuerza verbal y la idea de comer demasiado rápido, sin añadir elementos ajenos.
- source_word: תגעל
  english_pob_choice: you become disgusting
  chosen_spanish: te vuelvas repugnante
  alternatives_spanish:
  - te hagas repulsivo
  - te vuelvas despreciable
  - cause disgusto
  lexicon: HALOT
  rationale: La idea es el resultado social de la mala conducta a la mesa. 'Te vuelvas repugnante' transmite ese efecto de manera idiomática en español, manteniendo la dureza del hebreo.
translation_notes:
  revision_awareness: 'Este borrador sigue la línea revisada del audit trail inglés: ''well-bred man'' y el verbo breve ''gobble'' se trasladan a un español natural (''hombre bien criado'', ''engullas'') sin perder el matiz de etiqueta social y la amonestación contra comer con avidez. También se conserva la nota de discrepancia entre la tradición hebrea y el paralelo griego, por ser un dato textual relevante del expediente.'
  spanish_consistency_notes:
  - Se ha mantenido un registro sobrio y publication-readable, evitando giros arcaicos innecesarios.
  - '''Bien criado'' funciona aquí como equivalente contextual de conducta refinada, no como juicio moral amplio.'
  - Se conservan corchetes de notas solo donde hay observaciones textuales o culturales explícitas.
  - La forma verbal en subjuntivo ('engullas') encaja con la cláusula final de advertencia ('no sea que').
