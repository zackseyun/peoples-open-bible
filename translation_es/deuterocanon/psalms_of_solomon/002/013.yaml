translation:
  language: es
  text: Hicieron de los hijos de Jerusalén una burla, como prostitutas[b] dentro de ella; todo el que pasaba entraba en pleno día[a][c]; los escarnecían con sus obras de iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «delante del sol», es decir, abiertamente o en público.
    reason: lexical_alternative
  - marker: b
    text: O «en lugar de prostitutas»; el griego puede leerse más literalmente así, pero el contexto favorece una comparación de humillación.
    reason: alternative_reading
  - marker: c
    text: O «abiertamente, a plena luz del día».
    reason: previous_rendering
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - pusieron
  - convirtieron
  lexicon: LSJ
  rationale: El griego expresa que los convirtieron en objeto de escarnio; en español, «hicieron de» comunica ese cambio de estado de manera natural y fiel sin perder la fuerza del verbo.
- source_word: τοὺς υἱοὺς Ἱερουσαλήμ
  english_pob_choice: the sons of Jerusalem
  chosen_spanish: los hijos de Jerusalén
  alternatives_spanish:
  - los hijos varones de Jerusalén
  - la gente de Jerusalén
  lexicon: LSJ
  rationale: Se conserva el plural masculino y la metáfora filial del original. «Hijos» es el equivalente más directo y preserva la forma fuente.
- source_word: εἰς ἐμπαιγμόν
  english_pob_choice: a mockery
  chosen_spanish: una burla
  alternatives_spanish:
  - un escarnio
  - objeto de burla
  lexicon: LSJ
  rationale: La expresión indica humillación pública y ridículo; «burla» funciona de forma natural en español y mantiene el sentido de desprecio público.
- source_word: ἀντὶ πορνῶν
  english_pob_choice: like prostitutes / as prostitutes
  chosen_spanish: como prostitutas
  alternatives_spanish:
  - en lugar de prostitutas
  - como si fueran prostitutas
  lexicon: LSJ
  rationale: Aunque ἀντί puede significar «en lugar de», el contexto favorece la lectura comparativa de humillación pública. «Como prostitutas» transmite mejor el paralelismo deshonroso.
- source_word: πᾶς ὁ πορευόμενος εἰσεπορεύετο
  english_pob_choice: everyone passing by would enter
  chosen_spanish: todo el que pasaba entraba
  alternatives_spanish:
  - cada transeúnte entraba
  - todos los que pasaban entraban
  lexicon: LSJ
  rationale: Se mantiene la iteración y el movimiento repetido del griego con una frase natural en español. «Pasaba» y «entraba» reproducen el contraste del original sin calco pesado.
- source_word: κατέναντι τοῦ ἡλίου
  english_pob_choice: in broad daylight
  chosen_spanish: en pleno día
  alternatives_spanish:
  - a la luz del sol
  - abiertamente, a plena luz del día
  lexicon: LSJ
  rationale: El griego dice literalmente «frente al sol», con valor idiomático de publicidad. «En pleno día» expresa el mismo sentido de manera idiomática y clara en español.
- source_word: ἐνέπαιζον
  english_pob_choice: mocked them
  chosen_spanish: los escarnecían
  alternatives_spanish:
  - los burlaban
  - se burlaban de ellos
  lexicon: LSJ
  rationale: El verbo implica mofa y desprecio. «Escarnecer» conserva mejor la intensidad del insulto público que una simple «burla» y encaja con el tono del pasaje.
- source_word: ταῖς ἀνομίαις αὐτῶν
  english_pob_choice: with their lawless deeds
  chosen_spanish: con sus obras de iniquidad
  alternatives_spanish:
  - con sus actos de maldad
  - por sus obras impías
  lexicon: LSJ
  rationale: ἀνομία combina la idea de impiedad y transgresión; «iniquidad» preserva la fuerza moral y legal del término. «Obras de iniquidad» conserva el enlace instrumental del griego.
theological_decisions:
- issue: Sentido de ἀντὶ πορνῶν
  english_pob_reading: 'Comparative humiliation: ''like prostitutes'' rather than a strict ''instead of prostitutes.'''
  chosen_spanish_reading: 'Lectura comparativa de humillación: «como prostitutas» más que «en lugar de prostitutas».'
  alternative_spanish_readings:
  - «en lugar de prostitutas»
  - «como si fueran prostitutas»
  rationale: La construcción griega puede sugerir sustitución, pero el contexto describe vergüenza pública y deshonra. La traducción evita fijar una relación lógica más fuerte de la que exige el pasaje y conserva la tensión interpretativa documentada.
  doctrine_reference: Principio de fidelidad al sentido contextual; manejo prudente de ambigüedad léxica.
- issue: Valor de κατέναντι τοῦ ἡλίου
  english_pob_reading: Idiomatic 'in broad daylight' / openly, publicly.
  chosen_spanish_reading: 'Valor idiomático: «en pleno día».'
  alternative_spanish_readings:
  - «frente al sol»
  - «a plena luz del día»
  rationale: La expresión literal es transparente, pero en español la solución idiomática comunica mejor la idea de exposición pública sin perder el trasfondo figurado del original.
  doctrine_reference: Principio de equivalencia óptima con conservación de imagen semítica/poética cuando es inteligible.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que ajustó la lectura inglesa de κατέναντι τοῦ ἡλίου a ‘in broad daylight’ y evitó una doble glosa. Por eso el español usa una sola expresión idiomática, ‘en pleno día’, y no duplica ‘abiertamente’ junto con la frase temporal. También reflejo la revisión que prefirió un enunciado más directo para εἰς ἐμπαιγμόν y una formulación más clara para ἐνέπαιζον.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este verso no contiene el nombre divino.
  - «Hijos de Jerusalén» preserva el masculino plural del griego; no se neutraliza a «personas» o «gente».
  - «Obras de iniquidad» conserva el tono moral fuerte de ἀνομία sin suavizarlo a mero ‘errores’ o ‘faltas’.
  - Se evita traducir ἀντί de forma rígidamente literal cuando el contexto exige una comparación deshonrosa más natural en español.
