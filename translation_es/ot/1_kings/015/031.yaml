revisions:
- from: En cuanto al resto de los hechos de Nadab[a], y todo lo que hizo, ¿no está escrito en el libro de los anales de los reyes de Israel?
  to: Y el resto de los hechos de Nadab[a], y todo lo que hizo, ¿no están escritos en el libro de los anales de los reyes de Israel?
  rationale: Se ajusta la apertura a una fórmula narrativa más natural y cercana al hebreo repetitivo de Reyes («Y el resto de…»), y se corrige la concordancia al plural («¿no están escritos…?») para reflejar mejor הֵם כְּתוּבִים y el antecedente plural «hechos». Se conserva «anales» con la nota alternativa «crónicas», conforme a la justificación léxica documentada.
