translation:
  language: es
  text: El que retiene su vara aborrece a su hijo[a], pero el que lo ama busca con diligencia la disciplina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escatima su vara». El verbo hebreo puede expresar «retener» o «ahorrar», pero «retiene» comunica mejor en español actual la idea de no usarla.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «busca temprano disciplina». La expresión significa buscarla con empeño, es decir, con diligencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹשֵׂךְ
  english_pob_choice: withholds
  chosen_spanish: retiene
  alternatives_spanish:
  - se abstiene de usar
  - escatima
  - guarda
  lexicon: HALOT
  rationale: El participio expresa la idea de contener o no dar uso a algo. «Retiene» conserva ese sentido activo y natural en español, sin suavizar la fuerza del proverbio.
- source_word: שִׁבְטוֹ
  english_pob_choice: his rod
  chosen_spanish: su vara
  alternatives_spanish:
  - su cayado
  - su bastón
  - su vara disciplinaria
  lexicon: HALOT
  rationale: שֵׁבֶט puede significar vara, bastón o cetro; en contexto familiar de disciplina, «vara» es el equivalente claro y concreto en español. Mantiene la imagen corporal del texto.
- source_word: שׂוֹנֵא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - rechaza
  - detesta
  lexicon: HALOT
  rationale: El verbo expresa odio real y fuerte. «Aborrece» comunica esa intensidad en un registro bíblico y digno, preservando el antítesis tajante del proverbio.
- source_word: בְנ֑וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo varón
  - su hijo propio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su hijo». En español, «hijo» es la forma natural y conserva la referencia filial sin añadir una marca innecesaria.
- source_word: וְאֹהֲבוֹ
  english_pob_choice: whoever loves him
  chosen_spanish: el que lo ama
  alternatives_spanish:
  - quien lo ama
  - pero el que lo ama
  - el que ama a ese hijo
  lexicon: HALOT
  rationale: La construcción participial se vierte de modo idiomático en español. «Lo» retoma al hijo mencionado, manteniendo la relación directa del texto.
- source_word: שִׁחֲרוֹ
  english_pob_choice: diligently seeks
  chosen_spanish: busca con diligencia
  alternatives_spanish:
  - busca temprano
  - se afana en buscar
  - procura con empeño
  lexicon: HALOT
  rationale: El piʿel de שׁחר literalmente se relaciona con buscar temprano, pero el sentido idiomático es de búsqueda diligente o empeñosa. «Busca con diligencia» preserva ese valor sin forzar una traducción temporal literal.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la corrección
  - la instrucción
  - la formación
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר incluye corrección formativa y disciplina moral. «La disciplina» conserva el alcance correctivo sin reducirlo a castigo físico בלבד ni diluirlo en instrucción general.
theological_decisions:
- issue: Mantener la imagen concreta de la vara y la disciplina parental
  english_pob_reading: Retain the concrete image 'rod' and the direct statement about discipline without paraphrastic mitigation.
  chosen_spanish_reading: Conservar «vara» y «disciplina» sin convertir el proverbio en una generalidad sobre guía o corrección abstracta.
  alternative_spanish_readings:
  - Quien no corrige a su hijo lo daña
  - Quien ahorra castigo a su hijo lo ama
  rationale: El hebreo usa explícitamente שֵׁבֶט («vara») y contrapone amor con disciplina activa. La traducción debe preservar esa tensión y no resolverla mediante una paráfrasis que atenúe la imagen concreta. Al mismo tiempo, «disciplina» evita reducir el verso a mero castigo corporal.
  doctrine_reference: 'Translation philosophy: primacía del texto original; preservar tensiones teológicas; no sustituir la imaginería del texto por debates posteriores.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó «for him» por no estar en el hebreo. Por eso el español mantiene solo «busca con diligencia la disciplina», sin añadir complemento dativo inexistente. También se preservó la tensión entre la imagen concreta de la vara y el alcance más amplio de «disciplina».
  spanish_consistency_notes:
  - Se emplea «vara» para שֵׁבֶט, coherente con el valor concreto en contexto de disciplina familiar.
  - Se usa «disciplina» para מוּסָר, evitando tanto una reducción a castigo como una abstracción excesiva.
  - «Aborrece» mantiene el paralelismo fuerte de «hates»; no se suaviza a «desprecia» o «no ama».
  - Las notas al pie marcan alternativas reales del hebreo y la idiomaticidad del giro verbal de שׁחר.
