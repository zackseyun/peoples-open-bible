translation:
  language: es
  text: 'Golpeen sus rejas de arado en espadas[a], y sus podaderas en lanzas; diga[b] el débil: «Soy un guerrero»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta imagen invierte deliberadamente la de Isaías 2:4 y Miqueas 4:3, donde las armas se convierten en instrumentos de labranza.
    reason: cross_reference
  - marker: b
    text: 'O: «que diga». El hebreo tiene fuerza exhortativa después de la serie de imperativos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Soy fuerte», «Soy poderoso». El hebreo גִּבּוֹר puede denotar un hombre fuerte, poderoso o guerrero; aquí el contexto militar favorece «guerrero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּתּוּ
  english_pob_choice: Beat
  chosen_spanish: Forjad
  alternatives_spanish:
  - Golpead
  - Martillad
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural de כתת, con la imagen concreta de golpear o triturar. En español, «forjad» comunica bien el proceso de transformar herramientas en armas y conserva la intensidad verbal sin sonar demasiado arcaico.
- source_word: אִתֵּיכֶם
  english_pob_choice: your plowshares
  chosen_spanish: vuestras rejas
  alternatives_spanish:
  - vuestras rejas de arado
  - vuestros arados
  lexicon: HALOT
  rationale: El término designa implementos de arado. «Rejas» es un equivalente natural y bíblicamente reconocible en español; mantiene la referencia agrícola y permite captar la inversión imagística con Isaías y Miqueas.
- source_word: לַחֲרָבוֹת
  english_pob_choice: into swords
  chosen_spanish: en espadas
  alternatives_spanish:
  - en sables
  - para espadas
  lexicon: HALOT
  rationale: La preposición con ל expresa resultado o transformación. «En espadas» es la forma más directa y natural en español para expresar el cambio de un objeto a otro.
- source_word: וּמַזְמְרֹתֵיכֶם
  english_pob_choice: and your pruning hooks
  chosen_spanish: y vuestras podaderas
  alternatives_spanish:
  - y vuestras hoces de podar
  - y vuestros cuchillos de poda
  lexicon: HALOT
  rationale: El sustantivo nombra una herramienta de poda agrícola. «Podaderas» es claro en español moderno y conserva el campo semántico de una herramienta de corte usada en la agricultura.
- source_word: לִרְמָחִים
  english_pob_choice: into spears
  chosen_spanish: en lanzas
  alternatives_spanish:
  - en picas
  - en jabalinas
  lexicon: HALOT
  rationale: רמח denota una lanza o venablo. «Lanzas» es el equivalente más natural y comprensible en español contemporáneo.
- source_word: הַחַלָּשׁ
  english_pob_choice: the weak
  chosen_spanish: el débil
  alternatives_spanish:
  - el flaco
  - el enfermo
  - el impotente
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado significa el que carece de fuerza. «El débil» preserva el valor genérico y evita añadir matices no presentes en el hebreo.
- source_word: יֹאמַר
  english_pob_choice: let ... say
  chosen_spanish: diga
  alternatives_spanish:
  - que diga
  - dirá
  lexicon: HALOT
  rationale: Tras la secuencia imperativa, el verbo tiene fuerza exhortativa/jusiva. «Diga» reproduce esa invitación o mandato indirecto sin sobreexplicarlo.
- source_word: גִּבּוֹר
  english_pob_choice: a warrior
  chosen_spanish: Valiente
  alternatives_spanish:
  - guerrero
  - hombre valiente
  - poderoso
  lexicon: HALOT
  rationale: גבור puede significar guerrero, hombre valiente o fuerte. En este contexto militar, «valiente» conserva la autoafirmación breve del hebreo y funciona bien dentro de la cita directa; la alternativa «guerrero» se reserva para notas como posible lectura.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - yo soy
  - yo
  lexicon: HALOT
  rationale: El pronombre explícito intensifica la declaración. En español, «soy» dentro de la cita reproduce la predicación completa de modo natural; la inversión con «Valiente soy» mantiene el énfasis enfático del original.
theological_decisions:
- issue: Reversión intertextual del lenguaje de paz
  english_pob_reading: Render the verse as a deliberate call to arm for judgment, echoing and reversing Isaiah 2:4/Micah 4:3.
  chosen_spanish_reading: Mantener en el texto principal la inversión de herramientas agrícolas en armas para hacer visible la ironía profética y el contexto de juicio.
  alternative_spanish_readings:
  - Atenuar la imagen y traducirla de manera menos reconocible
  - Reformular como una exhortación general a la violencia sin el eco intertextual
  rationale: El hebreo evoca claramente el giro de Isaías y Miqueas, pero al revés. Conservar las herramientas agrícolas y las armas en el texto principal preserva esa tensión teológica y literaria sin resolverla ni suavizarla.
  doctrine_reference: Principio de primacía del original; preservar la tensión intertextual y profética.
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés y no introduce cambios sustantivos respecto de la lectura base: conserva la inversión imagística, el valor exhortativo de יֹאמַר y la ambigüedad léxica de גִּבּוֹר mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefieren equivalentes agrícolas y militares concretos para mantener la intertextualidad visible.
  - «Valiente soy» conserva la concisión del hebreo y evita resolver de antemano la gama semántica de גִּבּוֹר.
