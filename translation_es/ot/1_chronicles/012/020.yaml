review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del audit trail inglés: el idiomático נָפְלוּ עַל se refleja adecuadamente como cambio de bando; la secuencia temporal, el no ayudar a los filisteos, y la razón dada por los jefes filisteos también están presentes. Sin embargo, hay ajustes necesarios para una representación más fiel y natural del español: «para la guerra» suena rígido; «lo enviaron lejos» no expresa bien la idea de despedir/despachar; y «él puede pasarse» suena menos idiomático aquí que una forma de posibilidad/aprehensión como «podría pasarse».'
  spanish_quality_summary: 'El texto es mayormente claro, pero tiene varios giros poco naturales o algo calcados: «para la guerra», «tomar consejo» y «lo enviaron lejos». Además, la puntuación alrededor de «diciendo» mejora sin dos puntos tras [b]. Un ajuste menor produce un español más fluido y digno sin perder precisión.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Manasés», «David», «filisteos» y «Saúl» están bien. La decisión de traducir נפל על como «se pasaron a» está bien alineada con la rationale documentada. Para אֲדֹנָיו conviene «amo» en este contexto, en línea con el audit trail inglés («master») y para evitar resonancias honoríficas menos precisas de «señor».
  issues:
  - severity: medium
    issue: «para la guerra» suena poco natural en español bíblico moderno
    rationale: לַמִּלְחָמָה aquí expresa finalidad bélica; en español «a la batalla» o «para pelear» comunica mejor el sentido sin rigidez calca.
  - severity: medium
    issue: «lo enviaron lejos» no refleja bien שִׁלְּחֻהוּ
    rationale: El hebreo aquí indica despachar/despedir a David de la campaña, no necesariamente enviarlo a un lugar lejano. «Lo despidieron» o «lo enviaron de vuelta» es más fiel.
  - severity: medium
    issue: «su señor Saúl» es menos preciso que «su amo Saúl»
    rationale: El audit trail inglés justificó «master» para el contexto de lealtad/patronazgo y para evitar sobretonos teológicos. En español «amo» reproduce mejor esa relación personal-política.
  - severity: low
    issue: «él puede pasarse» es menos natural que una forma potencial/aprehensiva
    rationale: 'יִפּוֹל en discurso directo expresa temor de posibilidad: «podría pasarse» suena mejor en español y conserva la fuerza modal.'
  - severity: low
    issue: «después de tomar consejo» es comprensible pero algo calco
    rationale: «Después de deliberar» expresa בְעֵצָה con más naturalidad en español contemporáneo, manteniendo el tono formal.
  revised_spanish_text: 'Algunos de Manasés también se pasaron a David cuando vino con los filisteos contra Saúl a la batalla[a], aunque no los ayudaron, porque los señores de los filisteos, después de deliberar, lo despidieron, diciendo[b]: «A costa de nuestras cabezas, podría pasarse a su amo Saúl».'
  revised_footnotes:
