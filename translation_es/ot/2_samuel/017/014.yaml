translation:
  language: es
  text: 'Entonces Absalón y todos los hombres de Israel dijeron[a]: «El consejo de Husai el arquita es mejor que el consejo de Ahitofel». Porque Yahvé había determinado frustrar[b] el buen consejo de Ahitofel, para que Yahvé trajera calamidad[c] sobre Absalón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dijo». El hebreo tiene forma singular en la apertura, pero el sujeto colectivo («Absalón y todos los hombres de Israel») justifica la declaración conjunta en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había mandado frustrar». El hebreo צִוָּה suele significar «mandar», pero aquí describe la determinación eficaz de Yahvé respecto al consejo de Ahitofel.'
    reason: lexical_alternative
  - marker: c
    text: «Calamidad» traduce un término hebreo que también puede significar «mal» o «desastre»; aquí se refiere a la ruina o daño que vendría sobre Absalón en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y dijo
  - Y dijeron
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» conserva el movimiento secuencial sin sonar mecánico. El plural verbal refleja la lectura colectiva del sujeto compuesto en el contexto.
- source_word: וְכָל אִישׁ יִשְׂרָאֵל
  english_pob_choice: and all the men of Israel
  chosen_spanish: todo hombre de Israel
  alternatives_spanish:
  - todos los hombres de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la fuerza formal del hebreo, donde אִישׁ es singular pero colectivo. «Todo hombre de Israel» preserva el giro idiomático y el matiz de género del texto fuente.
- source_word: טוֹבָה
  english_pob_choice: is better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es bueno
  - era mejor
  lexicon: HALOT
  rationale: En una comparación directa, el adjetivo funciona como comparativo. «Es mejor» es la forma natural y fiel en español.
- source_word: עֲצַת
  english_pob_choice: the counsel of
  chosen_spanish: el consejo de
  alternatives_spanish:
  - la सलाह de
  - el plan de
  lexicon: HALOT
  rationale: «Consejo» conserva tanto la idea de asesoramiento como la de estrategia política. En este contexto cortesano, resulta más preciso que «consejo» en sentido meramente personal o «plan».
- source_word: חוּשַׁי הָאַרְכִּי
  english_pob_choice: Hushai the Archite
  chosen_spanish: Husai el arquita
  alternatives_spanish:
  - Husai el arkita
  - Husai de Arquí
  lexicon: HALOT
  rationale: «Arquita» es la forma castellana más transparente para el gentilicio/título. Se conserva la transliteración del nombre propio sin adaptación excesiva.
- source_word: וַיהוָה
  english_pob_choice: For Yahweh
  chosen_spanish: Porque Yahvé
  alternatives_spanish:
  - Yahvé
  - Y el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al estándar del proyecto. «Porque» expresa la relación explicativa del inciso causal con la frase anterior.
- source_word: צִוָּה
  english_pob_choice: had ordained
  chosen_spanish: había determinado
  alternatives_spanish:
  - había mandado
  - había ordenado
  lexicon: HALOT
  rationale: Aunque el verbo suele significar «mandar», aquí el contexto providencial pide una expresión que no suene a mero mandato humano. «Había determinado» comunica la decisión eficaz de Yahvé sin perder la tensión del texto.
- source_word: לְהָפֵר
  english_pob_choice: to frustrate
  chosen_spanish: frustrar
  alternatives_spanish:
  - anular
  - desbaratar
  lexicon: HALOT
  rationale: El hifil de פרר expresa invalidar o hacer ineficaz un consejo. «Frustrar» capta bien el sentido estratégico de volverlo inoperante.
- source_word: עֲצַת אֲחִיתֹפֶל הַטּוֹבָה
  english_pob_choice: the good counsel of Ahithophel
  chosen_spanish: el buen consejo de Ahitofel
  alternatives_spanish:
  - el consejo bueno de Ahitofel
  - el consejo eficaz de Ahitofel
  lexicon: HALOT
  rationale: Se conserva el adjetivo «buen» para reflejar de cerca el hebreo, dejando que el contexto explique su valor funcional. La posición adjetival es natural en español y reproduce el énfasis del original.
- source_word: לְבַעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: HALOT
  rationale: La expresión introduce propósito o resultado. «Para» permite una construcción fluida con el infinitivo siguiente y mantiene el sentido final.
- source_word: הָבִיא
  english_pob_choice: might bring
  chosen_spanish: traer
  alternatives_spanish:
  - hacer venir
  - llevar
  lexicon: HALOT
  rationale: El infinitivo final en español se expresa con naturalidad como «traer» en la construcción «para traer». Así se conserva el resultado buscado por Yahvé en el contexto narrativo.
- source_word: הָרָעָה
  english_pob_choice: disaster
  chosen_spanish: desgracia
  alternatives_spanish:
  - mal
  - calamidad
  - desastre
  lexicon: HALOT
  rationale: En este contexto judicial, el término no designa mal moral en Dios sino ruina sobre Absalón. «Desgracia» comunica un golpe adverso o calamidad sin cargar el texto con una implicación ética indebida.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la convención del proyecto en español es «Yahvé». Se evita la sustitución por una máscara litúrgica para preservar la transparencia del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Divine agency in צִוָּה לְהָפֵר
  english_pob_reading: the LORD had ordained to frustrate
  chosen_spanish_reading: Yahvé había determinado frustrar
  alternative_spanish_readings:
  - Yahvé había mandado frustrar
  - Yahvé había ordenado anular
  rationale: La frase afirma la soberanía eficaz de Yahvé sobre el fracaso del consejo de Ahitofel. «Había determinado» conserva esa agencia providencial sin reducirla a un mandato humano literal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
- issue: Meaning of הָרָעָה in context of judgment
  english_pob_reading: disaster
  chosen_spanish_reading: desgracia
  alternative_spanish_readings:
  - calamidad
  - desastre
  - mal
  rationale: Aquí el sustantivo apunta a una aflicción judicial sobre Absalón, no a mal moral atribuido a Dios. «Desgracia» comunica daño o ruina en un registro digno y suficientemente amplio.
  doctrine_reference: DOCTRINE.md Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios necesarios tras la comparación de auditoría y la verificación cruzada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva «consejo» para עֵצָה/עֲצָה por su alcance estratégico en contexto real.
  - «Desgracia» evita sugerir que Dios produce mal moral; mantiene la tensión teológica del original.
  - La construcción «todo hombre de Israel» mantiene la literalidad funcional del hebreo sin perder legibilidad en español.
