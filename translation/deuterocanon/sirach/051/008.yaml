  parallel_sources:
  - edition: lxx-swete-1909
    text: καὶ ἐμνήσθην τοῦ ἐλέους σου, Κύριε, καὶ τῆς ἐργασίας σου τῆς ἀπ᾽ αἰῶνος, ὅτι ἐξέλῃ τοὺς ὑπομένοντάς σε καὶ σώζεις αὐτοὺς ἐκ χειρὸς ἐθνῶν.
