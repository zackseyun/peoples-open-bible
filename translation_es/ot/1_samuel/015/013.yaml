    text: Or “Blessed are you of the LORD.” The Hebrew blessing formula can be rendered more literally this way, but “by the LORD” better communicates the sense in contemporary English.
    reason: lexical_alternative
  - marker: b
    text: Or “I have fulfilled” or “I have performed” the word of the LORD.
    reason: lexical_alternative
