  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la imaginería del hebreo, pero no preserva plenamente la decisión auditada del POB para יֶחֶרְדוּ. El contexto y la nota inglesa favorecen el matiz de movimiento implícito: no solo ''temblarán'', sino ''vendrán temblando''. El resto de los elementos principales —ave/paloma, Egipto/Asiria, reasentamiento, y el nombre divino Yahvé— están bien alineados con la fuente.'
  spanish_quality_summary: El español es claro y digno, pero 'desde Egipto' / 'desde la tierra de Asiria' suena algo menos natural aquí que 'de Egipto' / 'de la tierra de Asiria'. Además, 'los estableceré en sus casas' es comprensible, pero 'los haré habitar en sus casas' expresa con más precisión la causatividad de וְהוֹשַׁבְתִּים y suena natural en registro bíblico moderno.
  glossary_alignment: Se alinea correctamente con el glosario del proyecto en 'Yahvé'. No hay otros términos doctrinales conflictivos. La principal desalineación es con la decisión lexical auditada para יֶחֶרְדוּ ('will come trembling'), que conviene reflejar en español como 'Vendrán temblando'.
  issues:
  - severity: medium
    issue: יֶחֶרְדוּ se tradujo como 'Temblarán' en vez de reflejar el matiz auditado de movimiento
    rationale: La evidencia y la auditoría inglesa indican que, en este contexto con imaginería de aves desde Egipto/Asiria, el verbo probablemente incluye aproximación/movimiento además del temblor. 'Vendrán temblando' preserva mejor esa decisión sin sobretraducir.
  - severity: low
    issue: '''desde Egipto'' / ''desde la tierra de Asiria'' es menos idiomático que ''de Egipto'' / ''de la tierra de Asiria'''
    rationale: Ambas opciones son posibles, pero con un verbo de venir el español bíblico-natural suele preferir 'de' para procedencia.
  - severity: low
    issue: '''los estableceré en sus casas'' es algo menos preciso que una formulación más explícitamente causativa'
    rationale: Aunque 'establecer' puede funcionar, 'los haré habitar en sus casas' o 'los asentaré en sus hogares' refleja mejor el hiphil de ישב y la idea de restauración habitacional.
  revised_spanish_text: Vendrán temblando como un ave de Egipto[a], y como una paloma de la tierra de Asiria; y los haré habitar en sus casas, declara Yahvé.
