review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura prohibitiva y el sentido general del hebreo: advertencia directa al malvado para que no ataque la morada del justo ni arruine su lugar de reposo. Sin embargo, introduce un cambio de número en צַדִּיק al traducir ''de los justos'' en vez de un singular genérico (''del justo''), y la nota [a] también pluraliza indebidamente. Además, en español ''acechar la morada'' puede sonar menos natural que ''acechar junto a'' o ''ponerse al acecho contra'', pero el ajuste mínimo más fiel y claro es mantener el objeto y corregir el número.'
  spanish_quality_summary: El español es claro y digno, pero 'oh malvado' debe escribirse con la interjección vocativa española 'oh' sin problema; el punto principal de calidad es evitar el plural 'los justos', que en este contexto debilita la referencia singular del proverbio. La nota [b] necesita pulirse tipográficamente y sin comillas innecesarias.
  glossary_alignment: 'No hay términos teológicos de glosario mayor en juego. ''Malvado'', ''morada'' y ''lugar de reposo'' son aceptables. La decisión clave es alinear צַדִּיק con singular: ''del justo'', no ''de los justos''.'
  issues:
  - severity: medium
    issue: צַדִּיק está en singular, pero el borrador dice 'de los justos'.
    rationale: El hebreo se refiere al justo en singular genérico. El plural cambia ligeramente la imagen y se aparta de la decisión léxica inglesa auditada ('of the righteous' como singular de clase en inglés, no plural real en español).
  - severity: medium
    issue: 'La nota [a] también pluraliza: ''la casa de los justos''.'
    rationale: La alternativa léxica debe preservar el mismo número y referente del texto fuente.
  - severity: low
    issue: La nota [b] tiene redacción y puntuación poco naturales en español.
    rationale: 'Conviene normalizarla como ''Hebreo: "su lugar de echarse" o "su lugar de reposo".'' sin comillas y apóstrofos redundantes.'
  revised_spanish_text: No aceches, oh malvado[a], la morada del justo; no devastes su lugar de reposo[b].
  revised_footnotes:
  - marker: a
    text: O 'No embosques la casa del justo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''su lugar de echarse'' o ''su lugar de reposo''.'
    reason: lexical_alternative
  revision_rationale: Se corrige el plural a singular en el referente del justo para ajustarse al hebreo y a la lógica del proverbio, y se armonizan las notas con ese singular. También se pule la redacción de la nota [b] para un español más limpio y natural, sin cambiar el contenido.
