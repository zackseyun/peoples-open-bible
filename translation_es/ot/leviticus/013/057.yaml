review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: recurrencia de la afección, listado de prenda/urdimbre/trama/objeto de cuero, caracterización como algo que se extiende, y mandato de quemar el objeto afectado. Sin embargo, la redacción final duplica innecesariamente el mandato de quemar y crea una sintaxis menos fiel al hebreo, donde hay un solo verbo principal seguido de una cláusula relativa: ''quemarás ... lo que tiene la afección''.'
  spanish_quality_summary: 'El español es mayormente claro y natural, con buenos equivalentes técnicos como ''urdimbre'' y ''trama''. No obstante, ''la quemarás en el fuego: quemarás...'' resulta torpe y redundante; además, ''dentro de él'' suena poco idiomático aquí. Conviene simplificar a una sola instrucción fluida y legal. También es preferible anclar la nota [b] directamente en ''lesión'' o en la frase relevante, no solo en ''erupción'', ya que la nota explica נגע más que פֹּרַחַת.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Prenda', 'urdimbre', 'trama' y 'objeto de cuero' se alinean bien con el análisis lexical. 'Lesión' para נגע es defendible en español y está documentado. La mejora principal es sintáctica, no terminológica.
  issues:
  - severity: medium
    issue: Duplicación del mandato de quemar
    rationale: 'El hebreo tiene una sola instrucción principal, בָּאֵשׁ תִּשְׂרְפֶנּוּ, seguida por el objeto especificado mediante cláusula relativa. ''la quemarás en el fuego: quemarás...'' introduce repetición no presente en la fuente y reduce la claridad.'
  - severity: medium
    issue: Referencia pronominal confusa en 'la quemarás'
    rationale: El antecedente de 'la' no queda claro, porque el hebreo finalmente apunta al objeto afectado ('lo que tenga la lesión'), no específicamente a 'erupción' ni a una entidad femenina singular.
  - severity: low
    issue: Expresión poco natural 'dentro de él'
    rationale: Para אֲשֶׁר בּוֹ, en español legal/narrativo suena más natural 'en él' o 'que tenga ... en él' que 'dentro de él' en este contexto de prenda u objeto.
  - severity: low
    issue: Anclaje de la nota técnica sobre נגע
    rationale: La nota [b] explica נגע, pero en el borrador el marcador aparece sobre 'erupción', que traduce פֹּרַחַת. Es más preciso anclarla en 'lesión'.
  revised_spanish_text: Pero si vuelve a aparecer en la prenda[a], o en la urdimbre, o en la trama, o en cualquier objeto de cuero, es una erupción que se extiende; quemarás en el fuego aquello que tenga la lesión[b] en él.
  revised_footnotes:
