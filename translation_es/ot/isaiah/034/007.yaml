revisions:
- from: Los[r] animales salvajes caerán con ellos[a], y los becerros con los poderosos; su tierra será empapada[b] con sangre, y su polvo será enriquecido con sebo.
  to: Los bueyes salvajes[a] caerán con ellos, y los toros jóvenes con los poderosos[b]; su tierra será empapada con sangre, y su polvo será enriquecido con grasa.
  rationale: Se ajusta רְאֵמִים a «bueyes salvajes» para conservar la referencia a un bovino fuerte, en línea con el expediente inglés, manteniendo la alternativa zoológica en nota. Se cambia «becerros» por «toros jóvenes» para reflejar mejor פָּרִים. Se reubica la nota [b] a «los poderosos», donde corresponde la ambigüedad de אַבִּירִים. Se elimina la nota [r] por redundante. También se prefiere «grasa» por mayor claridad panhispánica, sin alterar el sentido.
