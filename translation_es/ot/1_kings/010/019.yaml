revisions:
- from: El trono tenía seis gradas[a], y el trono tenía un remate redondeado en su parte posterior, y brazos a uno y otro lado, junto al lugar de sentarse[b], y dos leones de pie junto a los brazos.
  to: El trono tenía seis escalones, y el trono tenía un remate redondeado[a] en su parte posterior, y apoyabrazos a uno y otro lado, junto al asiento[b], y dos leones de pie junto a los apoyabrazos.
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda al elemento superior redondeado, no a 'seis escalones'. También se mejoró la precisión léxica con 'apoyabrazos' para יָדֹת y la naturalidad del español con 'asiento' en el texto principal, preservando el literal en nota. 'Escalones' sustituye a 'gradas' por mayor naturalidad en este contexto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: seis escalones/gradas para el trono, un elemento superior redondeado en la parte trasera, elementos laterales junto al asiento, y dos leones junto a esos elementos. Sin embargo, la nota [a] está mal anclada: el texto base marca [a] en ''six steps'', pero la nota explica una alternativa para ''rounded top ... behind it''. Además, ''brazos'' para יָדֹת es menos preciso que ''apoyabrazos'' en contexto de mobiliario, y ''lugar de sentarse'' suena más torpe que el sentido contextual ''asiento'', aunque la nota puede preservar el literal.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos problemas de calidad: (1) la nota [a] no corresponde al segmento marcado en el texto; (2) ''brazos'' puede sonar anatómico o ambiguo, mientras que ''apoyabrazos'' comunica mejor el referente del trono. ''Gradas'' es posible, pero ''escalones'' es más natural para un trono. ''Lugar de sentarse'' resulta poco idiomático en el cuerpo del texto; conviene usar ''asiento'' y conservar el literal en nota.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La revisión propuesta mantiene fidelidad al hebreo y a las decisiones léxicas auditadas en inglés, especialmente al preferir una equivalencia funcional clara para יָדֹת ('apoyabrazos') y al preservar en nota el literal de מְקוֹם הַשָּׁבֶת.
  issues:
  - severity: high
    issue: La nota [a] está anclada al segmento equivocado.
    rationale: En el texto español [a] aparece tras 'gradas', pero la nota habla de la alternativa para 'רֹאשׁ עָגֹל ... מֵאַחֲרָיו' ('una parte superior redonda detrás de él'). Esto desalinea evidencia, traducción y nota.
  - severity: medium
    issue: '''Brazos'' es menos preciso que ''apoyabrazos'' para יָדֹת en contexto de trono.'
    rationale: La decisión inglesa documenta específicamente 'armrests'. En español, 'brazos' puede entenderse, pero es más ambiguo y menos natural para una descripción de mobiliario.
  - severity: medium
    issue: '''Junto al lugar de sentarse'' es demasiado literal y poco natural en el texto principal.'
    rationale: El hebreo literal puede preservarse en nota. En el cuerpo del texto, 'junto al asiento' transmite el sentido contextual con mejor español, en línea con la filosofía de equivalencia óptima.
  - severity: low
    issue: '''Gradas'' es aceptable, pero ''escalones'' encaja mejor con un trono individual.'
    rationale: '''Gradas'' puede evocar graderíos o escalinatas; ''escalones'' es más concreto y natural para la estructura descrita.'
  revised_spanish_text: El trono tenía seis escalones, y el trono tenía un remate redondeado[a] en su parte posterior, y apoyabrazos a uno y otro lado, junto al asiento[b], y dos leones de pie junto a los apoyabrazos.
  revised_footnotes:
