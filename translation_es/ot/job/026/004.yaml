translation:
  language: es
  text: ¿A quién has declarado palabras, y de quién ha salido de ti el aliento[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El hebreo נִשְׁמַת puede significar «aliento» o, en algunos contextos, «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת מִי
  english_pob_choice: to whom
  chosen_spanish: ¿A quién
  alternatives_spanish:
  - ¿a quién
  - ¿para quién
  lexicon: HALOT
  rationale: La partícula אֶת con interrogativo introduce al destinatario o referente de la acción; en español, «¿a quién» conserva la fuerza retórica y la relación directa que el inglés POB expresó con «to whom».
- source_word: הִגַּדְתָּ
  english_pob_choice: have you declared
  chosen_spanish: has declarado
  alternatives_spanish:
  - has dicho
  - has anunciado
  - has hablado
  lexicon: HALOT
  rationale: El verbo hifil de נגד significa «declarar, decir, hacer saber». «Has declarado» mantiene el tono elevado del poema y el matiz de comunicación explícita.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: El sustantivo plural designa palabras o expresiones pronunciadas; «palabras» es el equivalente más directo y natural en español.
- source_word: וְנִשְׁמַת
  english_pob_choice: breath
  chosen_spanish: el aliento
  alternatives_spanish:
  - el espíritu
  - la respiración
  lexicon: HALOT
  rationale: נשמה puede significar «aliento» o, según el contexto, «espíritu». Aquí el paralelismo con «ha salido de ti» favorece una imagen concreta de aliento que procede de alguien.
- source_word: מִי
  english_pob_choice: whose
  chosen_spanish: de ti
  alternatives_spanish:
  - de quién
  - cuyo
  lexicon: HALOT
  rationale: El hebreo plantea posesión/origen con valor interrogativo. En español, la estructura más clara y fiel al flujo poético es «de ti», completada por la pregunta inicial «¿A quién...?» para conservar el sentido global de procedencia.
- source_word: יָצְאָה מִמֶּךָּ
  english_pob_choice: has come out from you
  chosen_spanish: ha salido de ti
  alternatives_spanish:
  - ha salido de parte de ti
  - ha procedido de ti
  - ha venido de ti
  lexicon: HALOT
  rationale: יצא significa «salir, proceder». «Ha salido de ti» reproduce la metáfora concreta del texto y se ajusta de forma natural al español.
theological_decisions:
- issue: 'נִשְׁמַת: «aliento» vs. «espíritu»'
  english_pob_reading: Or 'whose spirit came from you?' The Hebrew noun can mean 'breath' or, in some contexts, 'spirit.'
  chosen_spanish_reading: «aliento» en el texto principal, con posibilidad de «espíritu» como alternativa
  alternative_spanish_readings:
  - ¿y de quién ha salido tu espíritu?
  - ¿y de quién ha salido el espíritu de ti?
  rationale: El hebreo admite ambas posibilidades. El contexto imagina algo que sale de una persona de manera concreta; por eso «aliento» preserva mejor la imagen verbal, sin negar el sentido ampliado de «espíritu» que la nota mantiene abierto.
  doctrine_reference: Lexicografía de נשמה; poesía sapiencial de Job
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión auditada, sin cambios de sentido necesarios. Se conservó la pregunta retórica y la ambigüedad lexical de נִשְׁמַת mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y terminología doctrinal ajena al contexto.
  - Se mantuvo un registro poético sobrio y transparente, sin añadir interpretación no sustentada por el hebreo.
