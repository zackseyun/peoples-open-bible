translation:
  language: es
  text: Y después de bajar al pie del monte, ataron a Ajior y lo dejaron tendido[a] al pie del monte, y se fueron a su señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrojado abajo». El participio griego subraya que Ajior quedó en la condición de haber sido echado abajo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδύσαντες
  english_pob_choice: after going down
  chosen_spanish: después de bajar
  alternatives_spanish:
  - después de descender
  - tras bajar
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa de movimiento hacia abajo. «Después de bajar» conserva la secuencia narrativa y suena natural en español sin perder el valor espacial.
- source_word: ὑποκάτω τοῦ ὄρους
  english_pob_choice: below the mountain
  chosen_spanish: debajo del monte
  alternatives_spanish:
  - bajo el monte
  - por debajo del monte
  lexicon: LSJ
  rationale: La expresión señala una posición inferior respecto al monte. «Debajo del monte» comunica con claridad la ubicación sin introducir una imagen topográfica extraña en español.
- source_word: ἔδησαν
  english_pob_choice: they bound
  chosen_spanish: ataron
  alternatives_spanish:
  - amarraron
  - lo sujetaron
  lexicon: LSJ
  rationale: δέω es «atar/bind». En español, «ataron» mantiene la fuerza física de la acción y es más natural que un calco más solemne.
- source_word: ἀφῆκαν
  english_pob_choice: left
  chosen_spanish: lo dejaron
  alternatives_spanish:
  - lo abandonaron
  - lo soltaron
  lexicon: LSJ
  rationale: Aquí no se trata de liberarlo, sino de dejarlo en cierto estado y lugar. «Lo dejaron» preserva esa función narrativa en unión con el participio siguiente.
- source_word: ἐρριμμένον
  english_pob_choice: lying / thrown down
  chosen_spanish: tendido
  alternatives_spanish:
  - arrojado
  - echado
  lexicon: LSJ
  rationale: El participio perfecto/pasivo de ῥίπτω conserva la idea de haber sido echado o arrojado. «Tendido» evita una repetición dura de «arrojado» y, en contexto, comunica la condición en que quedó Achior sin borrar la violencia implícita.
- source_word: ὑπὸ τὴν ῥίζαν τοῦ ὄρους
  english_pob_choice: at the foot of the mountain
  chosen_spanish: al pie del monte
  alternatives_spanish:
  - a la base del monte
  - debajo de la raíz del monte
  lexicon: LSJ
  rationale: ῥίζα es literalmente «raíz», pero en uso topográfico indica la base o pie de una montaña. «Al pie del monte» es el equivalente idiomático más transparente en español.
- source_word: ἀπῴχοντο
  english_pob_choice: they went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - se marcharon
  - se apartaron
  lexicon: LSJ
  rationale: La forma narra su partida. «Se fueron» es natural y directa, y mantiene el movimiento de salida sin añadir énfasis no presente en el griego.
- source_word: πρὸς τὸν κύριον αὐτῶν
  english_pob_choice: to their lord
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su señor/mando
  - a su amo
  lexicon: LSJ
  rationale: κύριος aquí designa un superior humano. «Señor» preserva la continuidad léxica con el griego y evita una traducción que sobrecargue el texto con «amo» si el contexto militar/político no exige esa dureza.
- source_word: τὸν Ἀχιὼρ
  english_pob_choice: Achior
  chosen_spanish: Ajior
  alternatives_spanish:
  - Achior
  - Ajior
  lexicon: Transliteration
  rationale: Se adopta una transliteración española coherente y legible. «Ajior» refleja mejor la adaptación fonética habitual del nombre en español y evita una grafía demasiado dependiente del inglés.
theological_decisions:
- issue: κύριος referido a un superior humano, no a Dios
  english_pob_reading: their lord
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su jefe
  rationale: El contexto muestra que κύριος alude a un superior humano dentro de la acción narrativa, no al título divino. «Su señor» conserva la ambigüedad léxica del griego sin capitalización teológica indebida.
  doctrine_reference: 'DOCTRINE.md: términos contestados para κύριος; distinguir títulos divinos y usos humanos'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «thrown down» a «lying» para ἐρριμμένον, buscando una solución más natural sin perder el matiz de haber sido echado. La versión española adopta una vía intermedia con «tendido», que conserva la condición resultante y evita una expresión demasiado literal o demasiado suave.
  spanish_consistency_notes:
  - Se mantiene «monte» en vez de «montaña» para coherencia con un registro bíblico sobrio y por la correspondencia con el topónimo narrativo.
  - «Señor» se usa en minúscula porque el referente es humano, no divino.
  - La transliteración «Ajior» se usa de manera consistente con una adaptación española legible.
