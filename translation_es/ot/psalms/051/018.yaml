revisions:
- from: Porque no te deleitas en sacrificio[a], o yo lo daría; no te complacen los holocaustos.
  to: Porque no te deleitas en sacrificio[a]; si no, lo daría; no te complace el holocausto.
  rationale: Se corrige el número de עוֹלָה a singular («el holocausto»), se ajusta la concordancia verbal y se mejora la naturalidad española de וְאֶתֵּנָה con «si no, lo daría», sin perder la implicación condicional/contrastiva documentada en la auditoría inglesa.
