translation:
  language: es
  text: Mis lomos fueron aplastados por la noticia[a]; mis rodillas cedieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: "por lo que oí" o "al oírlo".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "mis rodillas se paralizaron" o "mis rodillas se desplomaron".'
    reason: lexical_alternative
lexical_decisions:
- source_word: συντριβὴ
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron quebrados
  - fueron destrozados
  - quedaron aplastados
  lexicon: BDAG
  rationale: El sustantivo expresa ruptura o aplastamiento con fuerza corporal. En español, "aplastados" comunica bien el impacto físico sin forzar un tecnicismo. Mantengo el plural concordando con "mis lomos" y el pasado narrativo del contexto.
- source_word: ὀσφύς
  english_pob_choice: loins
  chosen_spanish: lomos
  alternatives_spanish:
  - riñones
  - cintura
  - caderas
  lexicon: BDAG
  rationale: '"Lomos" es el equivalente corporal más cercano y conserva la intensidad del lenguaje bíblico. "Cintura" o "caderas" suavizan o desvían el sentido; "riñones" sería demasiado interpretativo.'
- source_word: ἀπὸ ἀκοῆς
  english_pob_choice: from the report
  chosen_spanish: por el informe
  alternatives_spanish:
  - por la noticia
  - al oírlo
  - a causa de lo que oí
  lexicon: BDAG
  rationale: La construcción indica causa por algo oído. "Por el informe" sigue de cerca el valor causal y mantiene una forma natural en español. "Noticia" es posible, pero "informe" conserva más literalmente la idea de lo escuchado.
- source_word: παρελύθη
  english_pob_choice: gave way
  chosen_spanish: cedieron
  alternatives_spanish:
  - se paralizaron
  - se desplomaron
  - flaquearon
  lexicon: BDAG
  rationale: Con "rodillas" como sujeto, "cedieron" expresa adecuadamente la falla corporal sin afirmar más de lo que el texto dice. "Paralizaron" sería demasiado fuerte; "desplomaron" es más gráfico pero menos exacto.
- source_word: γόνατά
  english_pob_choice: knees
  chosen_spanish: rodillas
  alternatives_spanish:
  - piernas
  - muslos
  lexicon: BDAG
  rationale: Equivalente léxico directo y natural en español.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo sin cambios la lectura narrativa en pasado; por eso el español usa pasado simple («fueron aplastados», «cedieron») para reflejar el aoristo y conservar la secuencia del lamento.
  spanish_consistency_notes:
  - Se evita "SEÑOR" y toda sustitución del nombre divino porque el versículo no lo contiene.
  - Se escogió un registro bíblico sobrio, pero con español natural, evitando calcos innecesarios.
  - Las notas al pie están ancladas en los términos clave del texto para que cada marcador aparezca exactamente en el cuerpo español.
