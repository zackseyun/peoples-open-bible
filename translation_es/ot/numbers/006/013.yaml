translation:
  language: es
  text: 'Y esta es la ley del nazareo: el día en que se cumplan los días de su separación[a], será llevado[b] a la entrada de la tienda de reunión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Separación» también puede entenderse como «voto de nazareo» o «período de consagración».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «lo traerá a la entrada de la tienda de reunión». El hebreo usa una forma activa; el sujeto no está explícito en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Ahora esta es
  - Esta es
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una disposición legal. «Y esta es» conserva el enlace con lo anterior y el tono formal del texto jurídico.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción para
  - la regulación de
  lexicon: HALOT
  rationale: En contexto sacerdotal/legal, תּוֹרָה designa una norma o prescripción. «Ley» reproduce bien ese valor formal en español.
- source_word: הַנָּזִיר
  english_pob_choice: the Nazirite
  chosen_spanish: el nazareo
  alternatives_spanish:
  - el consagrado por nazareato
  - el que está bajo voto de nazareo
  lexicon: HALOT
  rationale: En español bíblico, «nazareo» es el término técnico más transparente para נָזִיר. Mantiene la categoría institucional sin explicarla en exceso.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - cuando
  - en el día
  lexicon: HALOT
  rationale: La estructura temporal hebrea se expresa de forma natural en español con «el día en que», conservando el matiz formal sin sonar forzado.
- source_word: מְלֹאת
  english_pob_choice: are completed
  chosen_spanish: se cumplan
  alternatives_spanish:
  - se completen
  - lleguen a su término
  lexicon: HALOT
  rationale: El infinitivo constructo de מלא expresa cumplimiento o completitud. «Se cumplan» transmite con naturalidad la idea del período completado.
- source_word: יְמֵי נִזְרוֹ
  english_pob_choice: the days of his separation
  chosen_spanish: los días de su separación
  alternatives_spanish:
  - los días de su voto de nazareo
  - el período de su consagración
  lexicon: HALOT
  rationale: «Separación» refleja el núcleo léxico de נזר y preserva la tensión del pasaje entre apartamiento ritual y estado consagrado. La alternativa «voto de nazareo» es posible, pero más interpretativa.
- source_word: יָבִיא אֹתוֹ
  english_pob_choice: he shall be brought
  chosen_spanish: será presentado
  alternatives_spanish:
  - será llevado
  - lo presentará
  lexicon: HALOT
  rationale: Aunque la forma hebrea es activa, el sujeto no está explícito y en español la pasiva refleja mejor el procedimiento ritual. «Será presentado» mantiene el foco en la persona del nazareo sin imponer un sujeto no expresado.
- source_word: אֶל פֶּתַח
  english_pob_choice: to the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - a la puerta
  - al acceso
  lexicon: HALOT
  rationale: פֶּתַח se refiere a una entrada o acceso. «A la entrada» es natural en español y encaja bien con el espacio sagrado.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce la designación tradicional del santuario portátil y conserva la correspondencia terminológica del Pentateuco.
theological_decisions:
- issue: Terminología de נָזִיר en Números 6
  english_pob_reading: Render with 'Nazirite' and 'separation' language
  chosen_spanish_reading: Render con «nazareo» y «separación»
  alternative_spanish_readings:
  - Render con «nazareo» y «consagración»
  - Render con «voto de nazareo» en todo el pasaje
  rationale: El pasaje nombra una institución específica de Israel. «Nazareo» preserva la categoría técnica, mientras que «separación» conserva el énfasis lexical y teológico del capítulo en estar apartado para Yahvé.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Voz de יָבִיא אֹתוֹ
  english_pob_reading: Use English passive 'he shall be brought'
  chosen_spanish_reading: Usar la pasiva «será presentado»
  alternative_spanish_readings:
  - Usar el activo «lo traerá»
  - Usar «será llevado»
  rationale: La forma hebrea es activa, pero el sujeto no se expresa. La pasiva española mantiene la fuerza procedimental del rito y evita introducir un sujeto implícito que el texto no nombra. «Presentado» añade el matiz cultual adecuado al contexto del santuario.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con el audit trail inglés: se mantiene la fórmula legal introductoria, la terminología técnica de nazareo y la solución pasiva para יָבִיא אֹתוֹ por la ausencia de sujeto explícito. No se detectaron revisiones posteriores que requirieran ajustes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de una sustitución reverencial abreviada cuando corresponda; en este versículo no aparece el nombre divino explícito.
  - Se conserva «nazareo» como término técnico consistente con Números 6.
  - «Tienda de reunión» mantiene la terminología estable del Pentateuco para אֹהֶל מוֹעֵד.
  - La pasiva «será presentado» evita un sujeto no explícito y armoniza con el uso cultual del contexto.
