translation:
  language: es
  text: Ahora, en el cuarto año de Joacim hijo de Josías, rey de Judá, esta palabra[a] vino a Jeremías de parte de Yahvé, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Palabra» traduce el hebreo דָּבָר. En este contexto profético, también puede implicar «mensaje» o «asunto», pero «palabra» preserva mejor la fórmula revelatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo marco temporal; «Ahora» cumple la función discursiva de transición de manera natural en español moderno sin la rigidez de un calco arcaizante.
- source_word: בַּשָּׁנָה הָרְבִיעִת
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  lexicon: HALOT
  rationale: La expresión temporal es directa; «en el cuarto año» conserva la sencillez y la relación cronológica del hebreo.
- source_word: לִיהוֹיָקִים בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: of Jehoiakim son of Josiah
  chosen_spanish: de Joacim hijo de Josías
  alternatives_spanish:
  - de Joacim, hijo de Josías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios en forma española usual. La relación de filiación se expresa con «hijo de» sin añadir más de lo que el hebreo exige.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  lexicon: HALOT
  rationale: Título real estándar y transparente en español; no hay motivo contextual para variar la formulación.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este asunto
  - este mensaje
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «mensaje». En la fórmula profética, «palabra» preserva mejor el eco de revelación divina y la correspondencia con el uso bíblico del término.
- source_word: אֶל יִרְמְיָהוּ
  english_pob_choice: came to Jeremiah
  chosen_spanish: vino a Jeremías
  alternatives_spanish:
  - llegó a Jeremías
  lexicon: HALOT
  rationale: El hebreo usa la construcción de movimiento/arribo hacia la persona del profeta; «vino a Jeremías» mantiene la imagen verbal sin forzar una paráfrasis.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme a la convención del proyecto, y «de parte de» expresa claramente el origen o procedencia de la palabra profética.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - que decía,
  lexicon: HALOT
  rationale: La partícula introductoria conserva la apertura de discurso directo. «Diciendo» es natural en español bíblico contemporáneo y prepara la cita siguiente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La convención española del proyecto pide «Yahvé» en el texto principal para preservar el nombre de pacto, evitando el reemplazo litúrgico por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor semántico de דָּבָר en fórmula profética
  english_pob_reading: this word
  chosen_spanish_reading: esta palabra
  alternative_spanish_readings:
  - este asunto
  - este mensaje
  rationale: En un enunciado profético, דָּבָר conserva el peso de «palabra» como acto de revelación. Traducirlo por «mensaje» o «asunto» atenúa ese valor y no es necesario aquí.
  doctrine_reference: Uso profético de דָּבָר en los libros proféticos
- issue: Relación de procedencia con מֵאֵת
  english_pob_reading: from Yahweh
  chosen_spanish_reading: de parte de Yahvé
  alternative_spanish_readings:
  - de Yahvé
  - procedente de Yahvé
  rationale: La preposición hebrea marca procedencia/origen. «De parte de Yahvé» conserva esa idea y resulta idiomática en español para una comunicación profética.
  doctrine_reference: Fórmula profética de procedencia divina
translation_notes:
  revision_awareness: Se revisó el expediente inglés y no se aplicaron revisiones posteriores; el texto inglés quedó en acuerdo alto y la decisión principal afecta solo la convención del nombre divino en español. Se mantuvo la sintaxis profética básica del hebreo sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la norma del proyecto para יהוה.
  - Se evita «Cristo» y cualquier terminología cristológica, pues no aparece en el versículo.
  - «Palabra» se mantiene para דָּבָר por su valor profético; no se suaviza a «mensaje» en el texto principal.
  - «de parte de» expresa procedencia sin perder la relación fuente-efecto del hebreo מֵאֵת.
