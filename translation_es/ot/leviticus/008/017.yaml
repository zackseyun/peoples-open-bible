- from: Pero el toro[a], junto con su piel, su carne y su estiércol, lo quemó con fuego[b] fuera del campamento, tal como Yahvé había mandado a Moisés.
  to: Pero el toro, junto con su cuero[a], su carne y su estiércol[b], lo quemó con fuego fuera del campamento, tal como Yahvé había mandado a Moisés.
  rationale: Se corrige el anclaje de la nota [b] para que corresponda al término hebreo פִּרְשׁוֹ ('su estiércol'). Además, se ajusta 'su piel' a 'su cuero' para que la nota [a] vuelva a ser una alternativa real y refleje mejor la distinción del expediente inglés entre 'hide' y 'skin', manteniendo un español natural en contexto sacrificial.
