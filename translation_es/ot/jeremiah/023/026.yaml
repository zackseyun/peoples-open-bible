  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y del POB inglés: mantiene «corazón», conserva la fuerza verbal de «profetizan falsedad» y expresa el paralelismo con «y que profetizan el engaño de su propio corazón». Sin embargo, la explicitación de הֲיֵשׁ como «estará» suena menos natural en español en esta pregunta elíptica y puede sugerir un matiz de futuro no marcado en el original. Una solución más idiomática y fiel alipsis-hebreo/explicitación-POB es «seguirá habiendo esto».'
  spanish_quality_summary: El texto es comprensible y digno, pero «¿Hasta cuándo estará en el corazón de los profetas...?» resulta algo forzado en español. La revisión mejora la fluidez y la naturalidad sin perder la sobriedad ni el tono profético. También conviene ajustar la nota [b], porque la traducción principal ya conserva la fuerza verbal; la alternativa compacta más relevante es «falsos profetas».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Corazón» para לֵב y «profetizan falsedad» para נִבְּאֵי הַשָּׁקֶר están bien alineados con las decisiones documentadas. No aparecen términos sensibles del glosario mayor que requieran intervención.
  issues:
