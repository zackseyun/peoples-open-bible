translation:
  language: es
  text: Y no sabía que había gorriones[a] en la pared; y, mientras mis ojos estaban abiertos, los gorriones dejaron caer excremento caliente en mis ojos, y se formaron velos blancos[b] en mis ojos. Entonces fui a los médicos, pero no me ayudaron. Pero Achiacar me sustentó hasta que fui a Elymais.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aves pequeñas»; στρουθία puede referirse de modo más general a pájaros pequeños, aunque «gorriones» es el sentido más probable.
    reason: lexical_alternative
  - marker: b
    text: El griego habla de «velos blancos» u «opacidades blancas» en los ojos; a menudo se entiende como una afección tipo catarata, pero el texto no da un diagnóstico médico preciso.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρουθία
  english_pob_choice: sparrows
  chosen_spanish: gorriones
  alternatives_spanish:
  - pajaritos
  - aves pequeñas
  lexicon: LSJ
  rationale: στρουθίον puede referirse a gorriones o, de manera más general, a aves pequeñas. En español, «gorriones» es la opción más natural y específica, y conserva la identificación probable sin suavizarla demasiado.
- source_word: ἐν τῷ τοίχῳ
  english_pob_choice: in the wall
  chosen_spanish: en la pared
  alternatives_spanish:
  - en el muro
  - en la tapia
  lexicon: LSJ
  rationale: La preposición griega dice literalmente «en la pared». «Pared» es la forma más idiomática y clara en español, sin desplazar el sentido hacia otra ubicación interpretativa.
- source_word: ἀνεῳγότων
  english_pob_choice: were open
  chosen_spanish: estaban abiertos
  alternatives_spanish:
  - habían sido abiertos
  - se habían abierto
  lexicon: LSJ
  rationale: La construcción con genitivo absoluto se vierte de manera natural como «mientras mis ojos estaban abiertos», preservando el valor temporal sin forzar la sintaxis española.
- source_word: ἀφώδευσαν
  english_pob_choice: dropped ... dung
  chosen_spanish: soltaron excremento
  alternatives_spanish:
  - defecaron
  - desecharon estiércol
  lexicon: LSJ
  rationale: El verbo es crudo y corporal. «Soltaron excremento» conserva la fuerza concreta del griego en un español entendible, sin volverlo excesivamente técnico como «defecaron».
- source_word: θερμὰ
  english_pob_choice: warm
  chosen_spanish: caliente
  alternatives_spanish:
  - tibio
  - cálido
  lexicon: LSJ
  rationale: En este contexto, el adjetivo modifica de forma muy inmediata la sustancia que cae en los ojos; «caliente» comunica mejor la impresión física que «tibio».
- source_word: λευκώματα
  english_pob_choice: white films
  chosen_spanish: manchas blancas
  alternatives_spanish:
  - opacidades blancas
  - velos blancos
  - cataratas
  lexicon: LSJ
  rationale: El griego describe una opacidad/blanqueamiento ocular visible, pero no da un diagnóstico moderno preciso. «Manchas blancas» conserva el resultado perceptible sin imponer una etiqueta médica más exacta de lo que el texto autoriza.
- source_word: ἰατρούς
  english_pob_choice: physicians
  chosen_spanish: médicos
  alternatives_spanish:
  - facultativos
  - doctores
  lexicon: LSJ
  rationale: «Médicos» es el equivalente natural y digno en español moderno; mantiene el tono narrativo sin cargarlo con un registro demasiado técnico o demasiado coloquial.
- source_word: οὐκ ὠφέλησάν με
  english_pob_choice: they did not help me
  chosen_spanish: no me ayudaron
  alternatives_spanish:
  - no me fueron de provecho
  - no me beneficiaron
  lexicon: LSJ
  rationale: La frase expresa falta de provecho. «No me ayudaron» es la formulación más clara y fluida en español, y conserva el sentido idiomático de la expresión griega.
- source_word: ἔτρεφέν με
  english_pob_choice: supported me
  chosen_spanish: me sustentó
  alternatives_spanish:
  - me alimentó
  - me mantuvo
  - me proveyó
  lexicon: LSJ
  rationale: τρέφω puede significar alimentar, sostener o mantener. En este contexto de dependencia prolongada, «me sustentó» transmite la provisión continua mejor que una simple referencia a comida.
- source_word: Ἐλυμαΐδα
  english_pob_choice: Elymais
  chosen_spanish: Ecbátana
  alternatives_spanish:
  - Elymais
  - Elimaida
  lexicon: LSJ
  rationale: 'La forma griega del versículo dice Ἐλυμαΐδα, y la tradición textual auditada en este registro la translitera como «Elymais»; en español, la forma recibida es «Ecbátana» solo si el testimonio base lo exigiera. Aquí, por fidelidad al testimonio griego y al audit trail en inglés, se conserva el nombre de lugar con transliteración estándar: «Elymais».'
theological_decisions:
- issue: Descripción médica del problema ocular de Tobit
  english_pob_reading: white films formed on my eyes
  chosen_spanish_reading: se formaron manchas blancas en mis ojos
  alternative_spanish_readings:
  - se formaron opacidades blancas en mis ojos
  - se me formó una nube blanca en los ojos
  - se me formaron cataratas
  rationale: El texto describe una afección visible, pero no exige una identificación clínica moderna. Traducir descriptivamente evita imponer un diagnóstico que el griego no formula explícitamente.
  doctrine_reference: Principio de primacía del texto original y cautela frente a sobreinterpretación médica.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail en inglés y la alta concordancia del control cruzado; no se detectaron revisiones aplicadas en esta pasada. La elección española mantiene la concreción corporal del relato y evita importar un diagnóstico médico más específico que el del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino, aunque este versículo no lo contiene.
  - Se usa un español bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - La transliteración de nombres propios y la terminología médica siguen el sentido documentado del griego, no una armonización confesional posterior.
