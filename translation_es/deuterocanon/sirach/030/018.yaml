revisions:
- from: Dulces manjares derramados sobre una boca cerrada son como una ofrenda[a] puesta delante de un ídolo[b].
  to: Manjares selectos derramados ante una boca cerrada son como una ofrenda puesta delante de un ídolo[a][b].
  rationale: 'Se ajusta el español para que suene natural y fiel al proverbio (''ante una boca cerrada''), se evita el matiz indebido de ''dulces'', y se restauran las notas conforme al audit trail inglés: una para el carácter despectivo de גלול y otra para la variante griega. No hace falta una nota sobre תנופה, porque la decisión de traducirla de forma general como ''ofrenda'' ya queda adecuadamente en el texto y en la documentación léxica.'
