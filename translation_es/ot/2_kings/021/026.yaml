    issue: '''reinó'' debilita el matiz de acceso al trono de וַיִּמְלֹךְ'
    rationale: En las fórmulas de sucesión de Reyes, el verbo marca que el hijo accedió al trono, no primariamente el desarrollo de todo su reinado. 'Reinó en su lugar' es comprensible, pero menos preciso que 'llegó a ser rey en su lugar'.
  revised_spanish_text: Y lo sepultaron en su sepulcro[a], en el jardín de Uzá, y Josías, su hijo, llegó a ser rey en su lugar.
