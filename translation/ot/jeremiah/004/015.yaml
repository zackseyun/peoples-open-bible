id: JER.4.15
reference: Jeremiah 4:15
source:
  edition: WLC
  text: כִּ֛י ק֥וֹל מַגִּ֖יד מִ/דָּ֑ן וּ/מַשְׁמִ֥יעַ אָ֖וֶן מֵ/הַ֥ר אֶפְרָֽיִם׃
translation:
  text: For a voice is declaring from Dan[b][a], and proclaiming disaster from the hill country of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity' or 'trouble'; the Hebrew word can also mean 'wickedness' in other contexts.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from Mount Ephraim'; the expression likely refers to the hill country region of Ephraim.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the surrounding warning. 'For' preserves the connective force better than a more emphatic adverbial rendering.
- source_word: קוֹל
  chosen: a voice
  alternatives:
  - a sound
  - a report
  lexicon: HALOT
  rationale: The noun literally denotes 'voice/sound.' In context it is the sound of an announcement, but 'voice' keeps the vividness of the Hebrew while remaining natural in English.
- source_word: מַגִּיד
  chosen: is declaring
  alternatives:
  - announces
  - is reporting
  - tells
  lexicon: HALOT
  rationale: The participle gives an ongoing or vivid present sense. 'Is declaring' preserves the participial immediacy and the formal tone of prophetic announcement.
- source_word: מִדָּן
  chosen: from Dan
  lexicon: HALOT
  rationale: Dan is a place name and is transliterated according to the translation philosophy for personal and place names. It likely marks the northern point from which the invading report comes.
- source_word: וּמַשְׁמִיעַ
  chosen: and proclaiming
  alternatives:
  - and making heard
  - and announcing
  - and sounding
  lexicon: HALOT
  rationale: From שמע in the causative sense, 'causing to hear' or 'making heard.' 'Proclaiming' communicates public announcement idiomatically while matching the parallelism with 'declaring.'
- source_word: אָוֶן
  chosen: disaster
  alternatives:
  - trouble
  - calamity
  - wickedness
  lexicon: HALOT
  rationale: Although the noun can mean 'iniquity' or 'trouble,' in prophetic judgment contexts it often denotes ruin or calamity. Here the parallel with an approaching military threat favors 'disaster' over the moral sense 'wickedness.'
- source_word: מֵהַר אֶפְרָיִם
  chosen: from the hill country of Ephraim
  alternatives:
  - from Mount Ephraim
  - from the mountains of Ephraim
  lexicon: HALOT
  rationale: The singular 'mountain/hill country' with Ephraim is a geographic expression commonly rendered 'hill country of Ephraim.' This is more idiomatic in English than the more wooden 'Mount Ephraim' and better reflects the regional sense.
