translation:
  language: es
  text: los registrados de la tribu de Isacar fueron cincuenta y cuatro mil cuatrocientos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su número» o «los contados». El término hebreo de censo se refiere a los inscritos o contados.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - su número
  - los registrados
  - los enrolados
  lexicon: HALOT
  rationale: En el contexto censal de Números 1, פְּקֻדֵי/הֶם se refiere al total de los integrantes inscritos o contados. 'Los contados' reproduce de manera natural y breve la idea de un grupo contabilizado sin añadir 'varones' ni interpretar más de lo que el hebreo dice aquí.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - para la tribu de
  - por tribu de
  lexicon: HALOT
  rationale: La construcción hebrea לְמַטֵּה en esta fórmula de censo identifica pertenencia tribal. En español, 'de la tribu de' expresa de forma idiomática esa afiliación sin perder el sentido relacional del hebreo.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio en forma transliterada española normalizada. 'Isacar' es la forma más asentada en español bíblico y corresponde al mismo nombre hebreo.
- source_word: אַרְבָּעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: fifty-four thousand four hundred
  chosen_spanish: cincuenta y cuatro mil cuatrocientos
  alternatives_spanish:
  - cuatro y cincuenta mil y cuatrocientos
  lexicon: HALOT
  rationale: El orden numérico hebreo se vierte al orden natural del español para mantener claridad y legibilidad, preservando exactamente la cifra del texto fuente.
translation_notes:
  revision_awareness: 'El texto sigue el equivalente inglés auditado sin cambios sustantivos: mantiene la fórmula censal, el sentido tribal de לְמַטֵּה y la cifra exacta. No se detectaron revisiones textuales que afecten esta línea.'
  spanish_consistency_notes:
  - Se usa 'Isacar' como forma bíblica estándar en español.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - '''Los contados'' mantiene el matiz censal sin introducir ''hombres'' que no están explícitos en el hebreo de esta cláusula.'
  - La puntuación y el orden numérico siguen el uso normal del español moderno.
