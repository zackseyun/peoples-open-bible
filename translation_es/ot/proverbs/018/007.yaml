translation:
  language: es
  text: La boca del necio es su ruina[a], y sus labios son un lazo[b] para su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ruina» también puede entenderse como «destrucción».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su alma»; aquí probablemente significa «su vida» o «él mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca de
  - habla
  - boca y habla
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la boca de». En español, «boca» conserva la imagen concreta y funciona de manera natural en el proverbio. «Habla» explicita el sentido, pero pierde la fuerza imagística del paralelismo con «labios».
- source_word: כְסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  lexicon: HALOT
  rationale: En Proverbios, este término sapiencial describe no solo falta de inteligencia, sino una postura moral desacertada. «Necio» preserva mejor ese valor que «tonto».
- source_word: מְחִתָּה
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - derrumbe
  - perdición
  lexicon: HALOT
  rationale: El sustantivo puede significar ruina o destrucción. «Ruina» reproduce bien la relación con la boca del necio y su resultado funesto, con un tono natural en español.
- source_word: לוֹ
  english_pob_choice: his / to him
  chosen_spanish: su
  alternatives_spanish:
  - para él
  - para sí
  lexicon: HALOT
  rationale: 'Aunque el hebreo expresa «para él / a él», el español requiere una formulación posesiva natural: «su ruina». Esto mantiene la relación personal sin volverla pesada.'
- source_word: וּשְׂפָתָיו
  english_pob_choice: and his lips
  chosen_spanish: y sus labios
  alternatives_spanish:
  - y su habla
  - y su lenguaje
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta de «labios», que enlaza con «boca» en paralelismo poético. «Habla» sería más explicativo, pero menos fiel a la imagen.
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  - un cepo
  lexicon: HALOT
  rationale: Aunque «lazo» y «cepo» son posibles, «trampa» comunica con claridad en español contemporáneo la figura de un dispositivo que captura y perjudica. El hebreo admite esta imagen de captura, y el contexto de Proverbios favorece una formulación inteligible.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  - su ser
  lexicon: HALOT
  rationale: Como en el audit trail inglés, aquí נֶפֶשׁ probablemente significa «vida» o «persona», no «alma» en sentido posterior y técnico. «Su vida» comunica bien la idea sin introducir una antropología ajena al proverbio.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura aprobada del POB inglés, sin cambios de sentido relevantes. Se mantuvo el paralelismo concreto «boca / labios» y la ambigüedad de נֶפֶשׁ se resolvió como «vida», con nota explicativa en la nota al pie.
  spanish_consistency_notes:
  - Se unificó el término sapiencial «fool» como «necio», coherente con el registro bíblico de Proverbios.
  - Se prefirió «ruina» sobre «destrucción» por naturalidad estilística, preservando la alternativa en nota.
  - Se tradujo נֶפֶשׁ como «vida» para evitar la sobrelectura de «alma» en un proverbio de sentido práctico.
  - Se mantuvo el paralelismo de imágenes corporales («boca», «labios») para respetar la poética hebrea.
