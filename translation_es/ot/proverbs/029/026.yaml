translation:
  language: es
  text: Muchos buscan el rostro[a] de un gobernante, pero de Yahvé viene la justicia[c] para un hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el favor de un gobernante». Literalmente: «el rostro de un gobernante».'
    reason: lexical_alternative
  - marker: b
    text: «Un hombre» es un singular genérico en hebreo, con referencia a cualquier persona en general.
    reason: cultural_note
  - marker: c
    text: 'O: «el juicio» o «la decisión legal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  - Muchas personas
  lexicon: HALOT
  rationale: El cuantificador hebreo expresa pluralidad amplia y proverbial. «Muchos» conserva la concisión y el tono sentencioso del original.
- source_word: מְבַקְשִׁים
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - están buscando
  - procuran
  lexicon: HALOT
  rationale: El participio tiene valor genérico y habitual. «Buscan» expresa esa acción general de manera natural en español.
- source_word: פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - el favor de
  - la presencia de
  lexicon: HALOT
  rationale: La imagen literal de «rostro» preserva la metáfora hebrea. En contexto, alude a buscar acceso o favor ante alguien poderoso; la nota recoge la alternativa idiomática.
- source_word: מוֹשֵׁל
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un gobernante
  - un jefe
  - un soberano
  lexicon: HALOT
  rationale: El término designa a quien ejerce autoridad. «Gobernante» es amplio, claro y adecuado para un proverbio de alcance general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el Tetragrámaton sin sustituirlo por una máscara tradicional.
- source_word: מִשְׁפַּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la decisión legal
  - la vindicación
  lexicon: HALOT
  rationale: En este contexto puede referirse a la justicia o al veredicto justo que recibe una persona. «La justicia» comunica bien el sentido general en español sin estrecharlo indebidamente.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - al hombre
  lexicon: HALOT
  rationale: El sustantivo es gramaticalmente masculino pero con fuerza genérica. «Un hombre» mantiene la forma del hebreo y la referencia representativa a cualquier persona.
theological_decisions:
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la política del proyecto, se conserva el nombre divino en español en vez de reemplazarlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de מִשְׁפַּט en el segundo hemistiquio
  english_pob_reading: justice / judgment / legal decision
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - el juicio
  - la decisión legal
  - la vindicación
  rationale: El hebreo admite una gama semántica entre justicia, juicio y decisión legal. «La justicia» es suficientemente amplia y mantiene la tensión interpretativa sin decidirla en exceso.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Valor genérico de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - el hombre
  rationale: El masculino singular funciona de manera representativa y no exclusiva. Se conserva la forma del hebreo; la nota aclara que el sentido es genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El auditor en inglés revisó la segunda mitad desde una formulación más literal («la justicia de un hombre») hacia una más natural («la justicia para un hombre»). En español se optó por una solución igualmente natural, «la justicia para un hombre», sin perder la relación entre el don/resultado que viene de Yahvé y la persona genérica beneficiaria. También se preservó la metáfora de «el rostro» en el primer hemistiquio, con nota sobre el valor idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, coherente con el criterio del proyecto.
  - Se mantiene «rostro» en el texto principal para conservar la imagen hebrea, y la nota ofrece la lectura idiomática.
  - «Un hombre» funciona como genérico; la nota evita una lectura restringida a varones.
  - «Justicia» se mantiene amplia para no cerrar indebidamente el campo semántico de מִשְׁפַּט.
