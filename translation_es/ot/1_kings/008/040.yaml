review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: finalidad («para que»), temor reverente a Dios («te teman»), duración («todos los días que vivan»), y la referencia al don de la tierra a los padres. Sin embargo, en el punto clave עַל־פְּנֵי הָאֲדָמָה / הָאֲדָמָה, el borrador opta por «sobre la faz de la tierra», que en español tiende a leerse como ‘earth’ de alcance global. El expediente inglés justificó explícitamente «land» por el contexto pactal inmediato («que tú diste a nuestros padres»). En español conviene preservar esa referencia más territorial con «tierra» pero evitando una lectura demasiado universal mediante una formulación como «sobre la faz de la tierra que tú diste...».'
  spanish_quality_summary: El español es claro y digno, pero «ellos» es innecesario y algo pesado; «para que te teman» suena más natural. La frase «sobre la faz de la tierra» es comprensible, aunque un poco solemne; sigue siendo aceptable por su valor idiomático bíblico. Las notas actuales son útiles, pero la nota a debe alinearse mejor con la decisión contextual del inglés, destacando que aquí «tierra» se entiende como la tierra dada a Israel, no la tierra en general.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Teman» respeta la decisión teológica para ירא. «Padres» conserva bien לַאֲבֹתֵינוּ frente a «antepasados». La única desalineación relevante es contextual-lexical: el inglés auditado favorece ‘land’ por el contexto, mientras que la redacción y nota españolas actuales dejan demasiado abierta la lectura ‘earth’.'
  issues:
  - severity: medium
    issue: «Sobre la faz de la tierra» puede sugerir alcance universal más que territorial
    rationale: El expediente inglés documenta que הָאֲדָמָה aquí debe leerse como «land» por la cláusula «que tú diste a nuestros padres». En español, «la tierra» es posible, pero la nota debe limitar mejor la ambigüedad y la redacción debe mantener claramente el vínculo con la tierra dada.
  - severity: low
    issue: Uso innecesario de «ellos»
    rationale: El sujeto explícito no está exigido en español y hace la frase menos fluida. «Para que te teman» conserva mejor la naturalidad sin pérdida de sentido.
