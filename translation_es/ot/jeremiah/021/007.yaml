translation:
  language: es
  text: Y después de eso, declara Yahvé, pondré en manos de Nabucodonosor[a], rey de Babilonia, a Sedequías, rey de Judá, a sus siervos, al pueblo y a los que quedaron en esta ciudad después de la peste, de la espada y del hambre, y en manos de sus enemigos y de los que buscan su vida; y él los herirá al filo de la espada. No los perdonará ni tendrá piedad ni compasión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: נְבוּכַדְרֶאצַּר (Nebuchadrezzar); la forma española tradicional es Nabucodonosor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: And after that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y después
  - Luego de eso
  lexicon: HALOT
  rationale: Expresa la transición temporal inmediata con naturalidad en español y conserva el valor secuencial del hebreo sin añadir interpretación.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética breve y solemne, y sigue el criterio del proyecto de renderizar el Nombre divino como 'Yahvé'.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: entregaré
  alternatives_spanish:
  - daré
  - pondré en manos de
  lexicon: HALOT
  rationale: En este contexto de juicio, 'entregaré' comunica mejor la idea de poner a alguien bajo poder ajeno; evita una literalidad menos idiomática que 'daré'.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española usual y ampliamente reconocible.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus oficiales
  lexicon: HALOT
  rationale: '''Siervos'' conserva el sentido amplio del término hebreo y evita restringir indebidamente el grupo a funcionarios de corte.'
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  lexicon: HALOT
  rationale: Reproduce de forma directa el sustantivo colectivo en su sentido más natural en español bíblico.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: those left
  chosen_spanish: los que quedaron
  alternatives_spanish:
  - los sobrevivientes
  - el remanente
  lexicon: HALOT
  rationale: '''Los que quedaron'' refleja el participio sin cargar el término con la connotación técnica de ''remanente'', que el contexto inmediato no exige.'
- source_word: מִן הַדֶּבֶר מִן הַחֶרֶב וּמִן הָרָעָב
  english_pob_choice: from the plague, from the sword, and from the famine
  chosen_spanish: de la peste, de la espada y del hambre
  alternatives_spanish:
  - de la peste, de la espada y de la hambruna
  - de la plaga, de la espada y del hambre
  lexicon: HALOT
  rationale: Conserva la triple serie de calamidades con un español claro y reverente; 'peste' es el equivalente más natural aquí para el juicio mortífero del término hebreo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'mano', en español 'en manos de' comunica con fluidez la idea de quedar bajo poder/control ajeno y preserva la imagen idiomática.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrézar
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y reconocible; la variante más próxima al hebreo se preserva en la nota.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de ellos
  lexicon: HALOT
  rationale: Traducción directa y natural del posesivo plural.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: those seeking their life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que procuran matarlos
  - los que buscan quitarles la vida
  lexicon: HALOT
  rationale: Conserva el hebraísmo 'buscar la vida' sin perder claridad en español; 'vida' mantiene la fuerza idiomática de נֶפֶשׁ en este contexto.
- source_word: וְהִכָּם
  english_pob_choice: and he will strike them down
  chosen_spanish: y él los herirá
  alternatives_spanish:
  - y los golpeará
  - y los matará
  lexicon: HALOT
  rationale: El sujeto singular sigue siendo Nabucodonosor por el contexto inmediato; 'herirá' permite enlazar naturalmente con la siguiente expresión bélica sin duplicar el resultado.
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - con la espada
  lexicon: HALOT
  rationale: Equivalente español idiomático que conserva la imagen de muerte violenta mediante espada.
- source_word: לֹא יָחוּס
  english_pob_choice: He will not spare them
  chosen_spanish: No los perdonará
  alternatives_spanish:
  - No tendrá compasión de ellos
  - No los tendrá por inocentes
  lexicon: HALOT
  rationale: '''Perdonará'' expresa con naturalidad la ausencia de indulgencia/clemencia; se mantiene la serie final de negativas sin suavizar el juicio.'
- source_word: וְלֹא יַחְמֹל
  english_pob_choice: or have pity
  chosen_spanish: ni tendrá piedad
  alternatives_spanish:
  - ni se compadecerá
  - ni se apiadará
  lexicon: HALOT
  rationale: Distingue este verbo del anterior y conserva la acumulación semántica de falta de misericordia.
- source_word: וְלֹא יְרַחֵם
  english_pob_choice: or compassion
  chosen_spanish: ni compasión
  alternatives_spanish:
  - ni misericordia
  - ni se compadecerá
  lexicon: HALOT
  rationale: Mantiene la tercera pieza de la tríada de rechazo, con un sustantivo que en español funciona bien como cierre paralelo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto sin máscara litúrgica; 'Yahvé' es la forma española establecida en este registro.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cadena de juicio y agente singular en la frase final
  english_pob_reading: and he will strike them down with the edge of the sword. He will not spare them or have pity or compassion.
  chosen_spanish_reading: y él los herirá a filo de espada. No los perdonará ni tendrá piedad ni compasión.
  alternative_spanish_readings:
  - y los matará con la espada. No se compadecerá de ellos ni los perdonará.
  - y los herirá con la espada. No mostrará piedad ni misericordia.
  rationale: Se conserva el sujeto singular implícito en el contexto inmediato y la triple negativa del hebreo, evitando reducir la acumulación a una sola palabra de misericordia.
  doctrine_reference: Hermenéutica del juicio profético en Jeremías 21:7
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios sustanciales en el último pase; el principal punto auditable sigue siendo la forma del nombre propio babilónico (Nebuchadrezzar/Nabucodonosor) y la conservación de la tríada final de negaciones.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según el estándar del proyecto.
  - Se prefirió 'Sedequías' frente a transliteraciones menos naturales en español.
  - Se conservaron las tres calamidades y las tres negaciones finales en orden paralelo.
  - 'Se evitó ''remanente'' para הַנִּשְׁאָרִים porque aquí el sentido inmediato es descriptivo: ''los que quedaron''.'
  - La nota al pie marca únicamente la variante onomástica documentada por el audit trail inglés.
