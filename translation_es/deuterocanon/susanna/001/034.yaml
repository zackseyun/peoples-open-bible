translation:
  language: es
  text: Entonces los ancianos y jueces se levantaron y pusieron sus manos sobre su cabeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστάντες
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: BDAG
  rationale: El participio aoristo introduce la siguiente acción narrativa. En español, «se levantaron» comunica de forma natural la acción física y el avance secuencial sin volver la frase pesada.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los mayores
  lexicon: BDAG
  rationale: Aquí el término designa a líderes reconocidos de la comunidad en un contexto judicial. «Ancianos» conserva ese valor funcional y es la opción más transparente en español.
- source_word: κριταὶ
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - árbitros
  lexicon: BDAG
  rationale: El sustantivo señala a quienes ejercen función judicial. «Jueces» es la correspondencia directa y clara en español.
- source_word: ἐπέθηκαν
  english_pob_choice: laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron las manos
  lexicon: BDAG
  rationale: Con «manos» el verbo expresa un acto físico concreto. «Pusieron» conserva la sencillez del gesto sin introducir connotaciones litúrgicas no presentes en el texto.
- source_word: τὰς χεῖρας αὐτῶν
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: BDAG
  rationale: Es la manera natural de expresar el posesivo en español y mantiene la referencia directa a las manos de los sujetos.
- source_word: ἐπὶ τῆς κεφαλῆς αὐτῆς
  english_pob_choice: on her head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: «Sobre» reproduce bien la relación espacial del griego y es idiomático en español para este gesto.
theological_decisions:
- issue: Si el gesto de imponer las manos debe sonar ritual o estrictamente judicial
  english_pob_reading: 'a literal judicial gesture: ''laid their hands on her head'''
  chosen_spanish_reading: 'un gesto corporal y judicial literal: «pusieron sus manos sobre su cabeza»'
  alternative_spanish_readings:
  - impusieron las manos sobre su cabeza
  - colocaron sus manos sobre su cabeza
  rationale: El griego describe una acción física dentro de un procedimiento legal. «Pusieron sus manos» mantiene el carácter concreto del acto y evita sugerir de antemano un uso sacramental o eclesial posterior.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se detectan revisiones aplicadas ni cambios textuales pendientes. La versión española sigue la lectura directa del participio narrativo, los roles judiciales y el gesto físico sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantiene «ancianos» para οἱ πρεσβύτεροι por su valor de liderazgo comunitario, no meramente edad cronológica.
  - Se conserva la sencillez de la acción verbal («se levantaron», «pusieron») para reflejar la secuencia narrativa.
  - No se introduce el lenguaje técnico de «imposición de manos», porque el contexto inmediato es judicial y no litúrgico.
