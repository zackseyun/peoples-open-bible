translation:
  language: es
  text: 'Una copia de la carta que Sisinnes[a], el gobernador de Siria y Fenicia, y Satrabuzanes, y sus asociados, los gobernantes de Siria y Fenicia, escribieron y enviaron al rey Darío: Saludos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego presenta un pequeño cambio gramatical entre el singular («escribía») y el plural («enviaron»). La traducción lo resuelve con una acción colectiva en plural para que la carta suene natural en español.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Una copia
  alternatives_spanish:
  - Copia
  - Transcripción
  lexicon: LSJ
  rationale: ἀντίγραφον designa una copia o transcripción de un documento. «Una copia» es natural en español moderno y conserva el sentido documental.
- source_word: ἐπιστολῆς
  english_pob_choice: of the letter
  chosen_spanish: de la carta
  alternatives_spanish:
  - de la carta
  - del documento
  lexicon: LSJ
  rationale: 'ἐπιστολή es el término normal para una carta. El genitivo depende de ἀντίγραφον: «una copia de la carta».'
- source_word: ἧς ἔγραφεν ... καὶ ἀπέστειλαν
  english_pob_choice: that ... wrote and sent
  chosen_spanish: que ... escribieron y enviaron
  alternatives_spanish:
  - que ... habían escrito y enviado
  - que ... estaban escribiendo y enviaron
  lexicon: LSJ
  rationale: 'El griego pasa de singular a plural, pero el sentido es colectivo: los funcionarios nombrados redactaron y despacharon la carta. En español se suaviza como acción coordinada en plural, manteniendo el valor documental.'
- source_word: Σισίννης
  english_pob_choice: Sisinnes
  chosen_spanish: Sisinnes
  alternatives_spanish:
  - Sisines
  lexicon: LSJ
  rationale: Los nombres propios se transliteran siguiendo la forma griega; «Sisinnes» refleja directamente la grafía del original.
- source_word: ὁ ἔπαρχος
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el gobernador provincial
  lexicon: LSJ
  rationale: ἔπαρχος denota un funcionario con autoridad sobre una región. «Gobernador» es la equivalencia más clara y accesible en este contexto administrativo.
- source_word: Συρίας καὶ Φοινίκης
  english_pob_choice: of Syria and Phoenicia
  chosen_spanish: de Siria y Fenicia
  alternatives_spanish:
  - sobre Siria y Fenicia
  - de la región de Siria y Fenicia
  lexicon: LSJ
  rationale: Los genitivos señalan la jurisdicción del gobernador y el ámbito regional asociado. «De Siria y Fenicia» es breve e idiomático en español.
- source_word: Σαθραβουζάνης
  english_pob_choice: Sathrabuzanes
  chosen_spanish: Sathrabuzanes
  alternatives_spanish:
  - Satrabuzanes
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente del griego, manteniéndolo cercano a la forma fuente.
- source_word: οἱ συνέταιροι
  english_pob_choice: their associates
  chosen_spanish: sus asociados
  alternatives_spanish:
  - sus compañeros
  - sus colegas
  - sus socios
  lexicon: LSJ
  rationale: συνέταιροι puede significar asociados o compañeros. En una carta oficial, «sus asociados» transmite bien la idea de colaboradores administrativos sin cargar el texto de matices amistosos.
- source_word: ἡγεμόνες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los gobernadores
  - los líderes
  lexicon: LSJ
  rationale: ἡγεμόνες es un término amplio para dirigentes o gobernantes. Se evita repetir «gobernador» y se conserva la autoridad oficial con «gobernantes».
- source_word: Βασιλεῖ Δαρείῳ
  english_pob_choice: to King Darius
  chosen_spanish: al rey Darío
  alternatives_spanish:
  - para el rey Darío
  - al rey Dario
  lexicon: LSJ
  rationale: El dativo marca al destinatario de la carta. «Al rey Darío» hace explícita la dirección epistolar y conserva el título real.
- source_word: χαίρειν
  english_pob_choice: Greetings
  chosen_spanish: Saludos
  alternatives_spanish:
  - Salud
  - Que le vaya bien
  lexicon: LSJ
  rationale: χαίρειν es la fórmula epistolar estándar. «Saludos» es la forma natural y breve en español para preservar la salutación sin literalidad forzada.
translation_notes:
  revision_awareness: El texto griego base y el testimonio paralelo muestran alta concordancia; no se requiere una revisión sustancial. Se mantuvo la lectura documental del encabezado de la carta y se normalizó en español la oscilación singular/plural del verbo sin ocultar el dato textual.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el hebreo lo requiere; aquí no aparece ningún tetragrámaton ni equivalente.
  - Se prefirió «carta» sobre «epístola» por el género documental del pasaje y la naturalidad en español.
  - Los nombres propios quedaron transliterados de forma conservadora para mantener trazabilidad con el griego.
  - «Gobernador» y «gobernantes» se diferenciaron para evitar repetición y reflejar el matiz administrativo de ἔπαρχος y ἡγεμόνες.
