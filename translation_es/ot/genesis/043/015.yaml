revisions:
- from: Así que los hombres tomaron este regalo[a], y tomaron el doble del dinero en su mano[b], y a Benjamín. Luego se levantaron, descendieron a Egipto[c] y se pusieron delante de José.
  to: Así que los hombres tomaron este regalo[a], y tomaron el doble del dinero en su mano[b], y a Benjamín. Luego se levantaron, descendieron a Egipto[c] y estuvieron ante José.
  rationale: Se corrige la nota [a] para que describa con precisión el término hebreo fuente y no el equivalente español elegido. Además, se reemplaza 'se pusieron delante de José' por 'estuvieron ante José', que suena más natural en español bíblico moderno y representa mejor la formalidad de aparecer en presencia de José sin sobreinterpretar el verbo hebreo.
