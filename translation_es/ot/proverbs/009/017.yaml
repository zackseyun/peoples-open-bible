  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: agua robada como dulce y pan asociado con lo oculto como agradable. Sin embargo, en español ''de secreto'' suena poco natural y no comunica con claridad la construcción compacta hebrea. Además, la nota al pie está anclada en ''dulces'' aunque trata la segunda cláusula.'
  spanish_quality_summary: La frase es generalmente clara y digna, pero 'Las aguas robadas' y sobre todo 'el pan de secreto' resultan algo forzados en español eclesial natural. 'Agua robada' funciona mejor como nombre de masa, en línea con el análisis fuente. La nota debe moverse al segundo miembro para corresponder a la variación léxica explicada.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La revisión propuesta mantiene la fuerza léxica de גְּנוּבִים como 'robada' y de לֶחֶם como 'pan', y representa סְתָרִים con una opción española más idiomática sin añadir una acción no explícita.
  issues:
