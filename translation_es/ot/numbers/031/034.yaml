lexical_decisions:
- source_word: וַ/חֲמֹרִים
  english_pob_choice: and ... donkeys
  chosen_spanish: y ... asnos
  alternatives_spanish:
  - y ... burros
  - y ... jumentos
  lexicon: HALOT
  rationale: El sustantivo hebreo חֲמֹרִים designa el animal doméstico de carga; en español bíblico y moderno, 'asnos' mantiene el referente con un registro sobrio y fiel. Conservo la conjunción inicial 'y' porque continúa la lista de botín/censo del contexto inmediato, igual que en el análisis inglés.
- source_word: אֶחָד וְ/שִׁשִּׁים אָלֶף
  english_pob_choice: 61,000
  chosen_spanish: '61.000'
  alternatives_spanish:
  - sesenta y un mil
  lexicon: HALOT
  rationale: La secuencia hebrea expresa literalmente 'uno y sesenta mil', valor numérico estándar de 61,000. En español, el formato con cifra es claro y natural en una lista de recuento, y conserva exactamente la cantidad sin añadir paráfrasis.
