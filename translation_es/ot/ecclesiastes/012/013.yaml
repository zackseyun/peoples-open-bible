review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo: «El fin del asunto», «teme a Dios» y «guarda sus mandamientos» representan fielmente סוֹף דָּבָר, יְרָא y שְׁמוֹר. Sin embargo, «cuando todo ha sido oído» suena poco natural en español bíblico moderno y puede mejorarse sin perder la pasiva/elipsis. La cláusula final כִּי זֶה כָּל הָאָדָם está preservada en su ambigüedad, pero «el todo del hombre» resulta demasiado calcado y opaco en español; conviene una formulación más natural que mantenga la literalidad relativa y deje las opciones interpretativas en nota.'
  spanish_quality_summary: 'El texto es comprensible, pero presenta dos problemas de naturalidad: «ha sido oído» y especialmente «el todo del hombre». En español general y eclesial, «esto es el todo del hombre» suena forzado y poco inteligible. Una redacción como «porque esto es todo del ser humano» conserva la tersura y evita introducir «deber» en el texto principal, mientras la nota puede explicar la literalidad hebrea y las alternativas.'
  glossary_alignment: 'No hay conflicto con los términos base del proyecto: אֱלֹהִים se traduce correctamente como «Dios». No intervienen aquí Yahvé, Mesías/Cristo, espíritu, carne, gracia, etc. En אָדָם, el borrador conserva la apertura interpretativa, pero «hombre» en esta construcción concreta empeora la claridad en español; «ser humano» refleja mejor la fuerza representativa sin imponer una glosa doctrinal.'
  issues:
  - severity: medium
    issue: «cuando todo ha sido oído» es poco natural en español
    rationale: Aunque formalmente fiel a נִשְׁמָע, en español suena rígido. «cuando todo se ha oído» conserva bien el sentido pasivo/impersonal y mejora la legibilidad.
  - severity: high
    issue: «esto es el todo del hombre» es un calco opaco
    rationale: La frase no suena idiomática ni clara en español contemporáneo. El hebreo es deliberadamente terso, pero la traducción no debe volverse ininteligible. Se puede mantener la apertura semántica con «esto es todo del ser humano» y reservar la literalidad y opciones interpretativas para la nota.
  - severity: medium
    issue: La nota actual prioriza una literalidad española igualmente poco natural
    rationale: La nota repite «el todo del hombre», que no ayuda al lector hispano. Debe explicar que el hebreo literalmente dice «todo/el todo del hombre» y añadir las alternativas interpretativas relevantes, incluida «el deber total del ser humano».
  revised_spanish_text: 'El fin del asunto, cuando todo se ha oído: teme a Dios y guarda sus mandamientos, porque esto es todo del ser humano[a].'
