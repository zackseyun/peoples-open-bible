    issue: «Congregaos» para הִקָּבְצוּ
    rationale: 'Aunque posible, «congregarse» en español puede sonar más institucional o cultual. «Reuníos» comunica con mayor naturalidad el imperativo niphal reflexivo/colectivo ‘júntense’. '
  - severity: high
    issue: La nota al pie propone «Poneos en pie» como alternativa
    rationale: Esa alternativa no está respaldada por הִקָּבְצוּ, cuyo sentido es reunirse/juntarse, no ponerse de pie. La nota debe ajustarse a una alternativa real como «Reuníos» / «Oíd».
  - severity: low
    issue: Desajuste menor entre la justificación léxica y la mejor opción española
    rationale: La explicación del valor reflexivo/colectivo es buena, pero la opción elegida en el texto no es la más natural ni la más precisa en español actual.
