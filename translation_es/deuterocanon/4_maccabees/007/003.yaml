revisions:
- from: De ningún modo desvió los timones[a] de la piedad, hasta que navegó hacia el puerto de la victoria sobre la muerte.
  to: De ningún modo desvió los timones[a] de la piedad, hasta que entró navegando en el puerto de la victoria sobre la muerte.
  rationale: Se ajusta «hacia el puerto» a «entró navegando en el puerto» para conservar mejor la idea de arribo efectivo presente en la metáfora y en la decisión auditada inglesa («into the harbor»). Se mantiene «timones» y «piedad» por fidelidad y buena inteligibilidad. Se corrige la nota al pie para que el español sea natural y la puntuación sea correcta, preservando la alternativa interpretativa documentada.
