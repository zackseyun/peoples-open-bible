translation:
  language: es
  text: Porque no es fácil actuar impíamente contra las leyes divinas[a]; pero el tiempo siguiente[b] aclarará estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obrar con impiedad contra las leyes divinas». El verbo griego puede denotar acción irreverente o impía.
    reason: lexical_alternative
  - marker: b
    text: O «el tiempo siguiente revelará esto».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσεβεῖν
  english_pob_choice: to act wickedly
  chosen_spanish: actuar impíamente
  alternatives_spanish:
  - portarse perversamente
  - obrar con impiedad
  - ser impío
  lexicon: BDAG / LSJ
  rationale: El infinitivo griego expresa conducta impía o irreverente, no solo una disposición interna. «Actuar impíamente» mantiene el matiz religioso y la idea de acción concreta, como hace la opción inglesa «to act wickedly», sin desdibujar el carácter cultual y moral del verbo.
- source_word: θείους
  english_pob_choice: divine
  chosen_spanish: divinas
  alternatives_spanish:
  - santas
  - sagradas
  - de Dios
  lexicon: LSJ
  rationale: En este contexto judío, el adjetivo apunta a lo perteneciente a Dios. «Divinas» es el equivalente más directo y conserva el vínculo con la expresión inglesa «divine laws», sin reemplazarla por una fórmula explicativa más larga.
- source_word: νόμους
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - mandamientos
  - normas
  - ley
  lexicon: LSJ
  rationale: El plural griego es explícito, así que conviene conservarlo en plural. «Leyes» reproduce mejor esa forma que «mandamientos», que sería más interpretativa, y resulta natural en español.
- source_word: οὐ ῥᾴδιον
  english_pob_choice: is not easy
  chosen_spanish: no es fácil
  alternatives_spanish:
  - es difícil
  - no es cosa ligera
  - no es poca cosa
  lexicon: LSJ
  rationale: La expresión idiomática significa literalmente que algo «no es fácil». «No es fácil» es la formulación más directa y mantiene el tono sobrio del griego y de la edición inglesa.
- source_word: ὁ ἀκόλουθος καιρός
  english_pob_choice: the time that follows
  chosen_spanish: el tiempo que sigue
  alternatives_spanish:
  - el tiempo venidero
  - el tiempo siguiente
  - el tiempo que vendrá
  lexicon: LSJ
  rationale: ἀκόλουθος significa «siguiente» o «que sigue». «El tiempo que sigue» conserva el orden temporal sin cargarlo innecesariamente con matices escatológicos que el griego no exige.
- source_word: δηλώσει
  english_pob_choice: will make these things clear
  chosen_spanish: hará claras estas cosas
  alternatives_spanish:
  - las revelará
  - las mostrará
  - hará evidente esto
  lexicon: BDAG
  rationale: El verbo significa hacer claro, mostrar o revelar. «Harán claras estas cosas» expresa el valor explicativo y futuro del verbo con un español natural y digno, cercano a la intención de la traducción inglesa.
theological_decisions:
- issue: Gravedad de la impiedad contra la ley de Dios
  english_pob_reading: 'A general moral-theological principle: violating God''s laws is not a trivial or consequence-free matter, and subsequent events will expose that reality.'
  chosen_spanish_reading: Una afirmación general de que obrar contra las leyes de Dios no es algo trivial, y que el tiempo siguiente pondrá esa realidad en claro.
  alternative_spanish_readings:
  - Una simple observación de que actuar impíamente es difícil de realizar
  - Un aviso implícito de juicio divino que será revelado más adelante
  rationale: El griego puede leerse como una afirmación práctica («no es fácil») o como una advertencia moral más fuerte. La formulación española conserva la seriedad del dicho sin añadir un juicio explícito que el texto no enuncia; la segunda mitad deja que el desarrollo posterior haga visible el sentido de la afirmación.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no se requieren cambios respecto del sentido base. La redacción española conserva la lectura óptima-equivalente del inglés auditado y refleja el griego sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el griego usa θεῖος / νόμοι, así que corresponde «divinas/leyes» sin introducir el nombre divino.
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene.
  - «Impíamente» preserva mejor el tono religioso que una simple paráfrasis moral.
  - La segunda cláusula usa futuro («hará claras») para reflejar δηλώσει y mantener el valor de revelación futura.
