translation:
  language: es
  text: Pero Yahvé endureció el corazón de Faraón[a], y él no los escuchó, tal como Yahvé había dicho a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo firme el corazón de Faraón» o «fortaleció el corazón de Faraón». El verbo hebreo significa más literalmente «hacer fuerte/firme», pero en este contexto alude a la resistencia obstinada de Faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - fortaleció
  - hizo firme
  lexicon: HALOT
  rationale: El verbo חזק significa literalmente fortalecer o hacer firme. En este contexto reiterado de Éxodo, aplicado al corazón de Faraón, expresa resistencia obstinada; por eso «endureció» comunica mejor el efecto narrativo y teológico en español sin perder la agencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: לֵב פַּרְעֹה
  english_pob_choice: Pharaoh's heart
  chosen_spanish: el corazón de Faraón
  alternatives_spanish:
  - el corazón del faraón
  lexicon: HALOT
  rationale: La construcción hebrea se vierte de modo natural con posesión en español. «Corazón» mantiene el valor antropológico hebreo como centro de voluntad y disposición, sin expandirlo en el texto principal.
- source_word: שָׁמַע אֲלֵהֶם
  english_pob_choice: did not listen to them
  chosen_spanish: no los escuchó
  alternatives_spanish:
  - no les hizo caso
  - no los obedeció
  lexicon: HALOT
  rationale: שׁמע con אֶל suele significar oír/escuchar en sentido de prestar atención. «No los escuchó» preserva ese sentido relacional en español; «obedeció» sería más específico de lo que el hebreo exige.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  english_pob_choice: just as Yahweh had spoken to Moses
  chosen_spanish: tal como Yahvé había dicho a Moisés
  alternatives_spanish:
  - tal como Yahvé había hablado a Moisés
  - como Yahvé había dicho a Moisés
  lexicon: HALOT
  rationale: La cláusula marca cumplimiento de una palabra previa de Dios. «Tal como» conserva la función comparativa/confirmatoria de כַּאֲשֶׁר, y «había dicho» es una formulación natural en español para el hebreo דִּבֶּר en este contexto.
theological_decisions:
- issue: Agencia divina en el endurecimiento del corazón de Faraón
  english_pob_reading: But Yahweh hardened Pharaoh's heart
  chosen_spanish_reading: Pero Yahvé endureció el corazón de Faraón
  alternative_spanish_readings:
  - Pero Yahvé hizo firme el corazón de Faraón
  - Pero Yahvé fortaleció el corazón de Faraón
  rationale: Se preserva la agencia directa de Yahvé sobre el sujeto verbal, como en el hebreo, sin convertir la frase en una paráfrasis permisiva. «Endureció» es la forma más idiomática en español para este motivo narrativo, mientras que las alternativas se conservan porque el verbo base literal significa fortalecer/hacer firme.
  doctrine_reference: 'Éxodo 9:12; traducción POB: preservar la tensión teológica sin suavizarla'
- issue: Valor del término «corazón» en antropología hebrea
  english_pob_reading: Pharaoh's heart
  chosen_spanish_reading: el corazón de Faraón
  alternative_spanish_readings:
  - la mente de Faraón
  - la voluntad de Faraón
  rationale: Se mantiene «corazón» para respetar el campo semántico bíblico del hebreo, que incluye voluntad, pensamiento y disposición. Sustituirlo por «mente» o «voluntad» resolvería indebidamente la riqueza del término.
  doctrine_reference: Antropología bíblica hebrea; Éxodo 9:12
- issue: Cumplimiento de la palabra divina
  english_pob_reading: just as Yahweh had spoken to Moses
  chosen_spanish_reading: tal como Yahvé había dicho a Moisés
  alternative_spanish_readings:
  - como Yahvé había dicho a Moisés
  - tal como Yahvé había hablado a Moisés
  rationale: La frase final funciona como sello de cumplimiento narrativo. La traducción elegida conserva ese matiz sin añadir interpretación, y mantiene a Moisés como destinatario explícito tal como en el hebreo.
  doctrine_reference: Éxodo 9:12; fidelidad de la palabra de Yahvé
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con el texto fuente y la auditoría inglesa. Por eso se mantiene una formulación española directa, con la misma tensión lexical que el POB en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, de acuerdo con el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se mantiene el término «corazón» por su valor antropológico hebreo.
  - «No los escuchó» conserva el sentido relacional de שׁמע sin convertirlo en una explicación.
  - La nota de pie de página acompaña la alternativa léxica principal y no introduce una lectura doctrinal distinta.
