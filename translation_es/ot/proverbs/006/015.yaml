translation:
  language: es
  text: Por tanto, su desastre vendrá[a] súbitamente; en un instante será quebrantado, y no habrá cura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su calamidad vendrá» / «su ruina vendrá».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no habrá remedio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La frase hebrea introduce consecuencia lógica. «Por tanto» conserva el valor inferencial con un registro natural y sobrio en español.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: súbitamente
  alternatives_spanish:
  - repentinamente
  - de improviso
  lexicon: HALOT
  rationale: El adverbio expresa irrupción repentina. «Súbitamente» mantiene ese sentido con tono literario claro.
- source_word: יָבֹוא אֵידוֹ
  english_pob_choice: his disaster will come
  chosen_spanish: su desastre vendrá
  alternatives_spanish:
  - vendrá su calamidad
  - vendrá su ruina
  lexicon: HALOT
  rationale: אֵיד denota calamidad, desastre o ruina. «Desastre» es transparente en español y conserva el campo semántico de juicio/ruina sin sobreinterpretar.
- source_word: פֶּתַע
  english_pob_choice: in an instant
  chosen_spanish: en un instante
  alternatives_spanish:
  - de pronto
  - al instante
  lexicon: HALOT
  rationale: El segundo término intensifica la rapidez del evento. «En un instante» preserva esa intensificación poética sin repetir el mismo adverbio que la primera cláusula.
- source_word: יִשָּׁבֵר
  english_pob_choice: he will be broken
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será quebrado
  - será hecho pedazos
  lexicon: HALOT
  rationale: El niphal comunica ser roto o destruido. «Quebrantado» es una opción reverente y fiel que abarca tanto quiebre físico como ruina personal.
- source_word: וְאֵין מַרְפֵּא
  english_pob_choice: and there will be no healing
  chosen_spanish: y no habrá sanidad
  alternatives_spanish:
  - y no habrá remedio
  - y no tendrá cura
  lexicon: HALOT
  rationale: מַרְפֵּא puede significar sanidad, cura o remedio. «Sanidad» conserva la metáfora de restauración y funciona bien en español bíblico contemporáneo; «remedio» queda como alternativa válida si se desea subrayar la imposibilidad de reparación.
translation_notes:
  revision_awareness: El texto inglés POB usa dos adverbios de repentina irrupción («suddenly» / «in an instant») y separa claramente אֵיד de מַרְפֵּא con alternativas léxicas en nota. La versión española conserva esa doble aceleración con dos expresiones distintas y mantiene la distinción entre «desastre» y «sanidad», dejando alternativas en notas para reflejar el audit trail.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos cláusulas breves con una intensificación temporal en la segunda.
  - Se evita sustituir «Yahvé» o términos cristológicos, pues no aparecen en el versículo.
  - «Quebrantado» conserva mejor la pasiva/resultativa del hebreo que una paráfrasis como «arruinado» en este contexto.
  - La nota sobre «sanidad» preserva la alternativa «remedio» sin imponerla en el texto principal.
