translation:
  language: es
  text: Y mientras estaban allí, cerca de Jerusalén, apareció un jinete[b], yendo delante de ellos[a], vestido de blanco y blandiendo una armadura de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «precediéndolos» para «yendo delante de ellos». El participio griego puede indicar simplemente ir por delante, aunque en el contexto también puede sugerir guía.
    reason: lexical_alternative
  - marker: b
    text: El texto no identifica explícitamente al jinete; la descripción puede sugerir una figura celestial o angélica, pero el griego no lo afirma.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτόθι
  english_pob_choice: while they were there
  chosen_spanish: Y mientras estaban allí
  alternatives_spanish:
  - Allí estaban
  - Y estando allí
  lexicon: LSJ
  rationale: El adverbio sitúa la acción en el mismo lugar ya mencionado; en español, una cláusula temporal-locativa con "mientras" conserva la idea de presencia simultánea sin forzar una calca.
- source_word: πρὸς τοῖς Ἱεροσολύμοις
  english_pob_choice: near Jerusalem
  chosen_spanish: cerca de Jerusalén
  alternatives_spanish:
  - junto a Jerusalén
  - alrededor de Jerusalén
  lexicon: LSJ
  rationale: La preposición con el dativo expresa proximidad espacial. "Cerca de Jerusalén" es la opción más natural en español y mantiene la relación local sin exagerar dirección ni contacto directo.
- source_word: ὄντων
  english_pob_choice: while they were
  chosen_spanish: mientras estaban
  alternatives_spanish:
  - cuando estaban
  - estando
  lexicon: BDAG
  rationale: El genitivo absoluto funciona como trasfondo temporal. "Mientras estaban" reproduce bien esa función en español y suena fluido en prosa narrativa.
- source_word: ἐφάνη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se mostró
  - fue visto
  lexicon: BDAG
  rationale: El verbo introduce una manifestación repentina o visionaria. "Apareció" conserva ese valor narrativo sin añadir identificación teológica.
- source_word: προηγούμενος αὐτῶν
  english_pob_choice: going before them
  chosen_spanish: yendo delante de ellos
  alternatives_spanish:
  - guiándolos
  - precediéndolos
  lexicon: LSJ
  rationale: El participio indica ir por delante del grupo. "Yendo delante de ellos" refleja el movimiento sin convertirlo explícitamente en mandato o liderazgo, como deja abierto el griego.
- source_word: ἔφιππος
  english_pob_choice: a horseman
  chosen_spanish: un jinete
  alternatives_spanish:
  - un hombre a caballo
  - un montado
  lexicon: LSJ
  rationale: En español, "jinete" transmite de forma natural la figura montada. Es más idiomático que una perífrasis literal y conserva la imagen visual.
- source_word: ἐν λευκῇ ἐσθῆτι
  english_pob_choice: clothed in white
  chosen_spanish: vestido de blanco
  alternatives_spanish:
  - con vestiduras blancas
  - cubierto de blanco
  lexicon: BDAG
  rationale: La expresión describe la vestimenta. "Vestido de blanco" es una equivalencia natural en español y mantiene el contraste visual sin precisar indebidamente el tipo de prenda.
- source_word: πανοπλίαν χρυσῆν
  english_pob_choice: golden armor
  chosen_spanish: una armadura de oro
  alternatives_spanish:
  - una panoplia de oro
  - armadura dorada
  lexicon: LSJ
  rationale: πανοπλία alude al equipo completo de guerra. "Armadura de oro" comunica el sentido con claridad; "dorada" podría sonar menos literal respecto del genitivo/adjetivo griego. Se evita "panoplia" por su rareza en español general.
- source_word: κραδαίνων
  english_pob_choice: brandishing
  chosen_spanish: blandiendo
  alternatives_spanish:
  - agitando
  - meneando
  lexicon: BDAG
  rationale: El participio expresa un gesto vivo y armado. "Blandiendo" reproduce bien la acción de manejar o agitar con fuerza un objeto bélico, más cercano al tono dramático del contexto.
theological_decisions:
- issue: Identidad del jinete aparecido
  english_pob_reading: Render the figure descriptively without identifying him beyond the Greek wording.
  chosen_spanish_reading: Describir la figura sin identificarla más allá de lo que dice el griego.
  alternative_spanish_readings:
  - un ángel
  - un jinete celestial
  - un mensajero divino
  rationale: El texto griego no nombra explícitamente al personaje; la versión española debe conservar esa apertura interpretativa. Así se preserva la tensión teológica y narrativa sin importar una identificación que el pasaje no formula.
  doctrine_reference: Preservar la tensión interpretativa; no resolver más allá del texto fuente.
translation_notes:
  revision_awareness: Se mantuvo sin cambios la lectura auditada del inglés POB en la última pasada; la redacción española sigue de cerca el griego y conserva la ambigüedad sobre la identidad del jinete.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «jinete» para ἔφιππος por naturalidad en español, sin perder el sentido de figura montada.
  - Se evitó "Cristo"/"Mesías" porque el pasaje no contiene esos términos.
  - Se mantuvo la imagen bélica de «armadura de oro» y el gesto de «blandiendo» para reproducir el tono visual del griego.
