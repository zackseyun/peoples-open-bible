base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/010.yaml
  text: Yet in spite of all this[a], her treacherous sister Judah did not return to me with all her heart, but only in falsehood[b], declares Yahweh.
  footnotes:
