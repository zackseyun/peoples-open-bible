translation:
  language: es
  text: Yahvé también pasó por alto su transgresión[a], y exaltó su cuerno para siempre; le dio un decreto de reinado[b], y estableció su trono en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el Señor quitó sus pecados». El hebreo dice más literalmente: «pasó por alto su transgresión».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «y le dio un pacto de reyes, y un trono de gloria en Israel». El hebreo dice «un decreto de reinado» y «estableció su trono en Jerusalén».'
    reason: alternative_reading
lexical_decisions:
- source_word: יהוה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según el criterio del proyecto; en español, «Yahvé» mantiene la referencia al tetragrámaton sin sustituirlo por un título genérico.
- source_word: העביר
  english_pob_choice: passed over
  chosen_spanish: pasó por alto
  alternatives_spanish:
  - remitió
  - quitó
  - perdonó
  lexicon: HALOT
  rationale: La imagen hebrea de «hacer pasar» o «pasar por alto» se preserva mejor con esta expresión, que evita reducir el verbo a una mera paráfrasis teológica.
- source_word: פשעו
  english_pob_choice: his transgression
  chosen_spanish: su transgresión
  alternatives_spanish:
  - su pecado
  - su rebelión
  - su ofensa
  lexicon: HALOT
  rationale: «Transgresión» reproduce bien el matiz de פשע como infracción o rebeldía, más preciso que el término general «pecado».
- source_word: וירם
  english_pob_choice: and exalted
  chosen_spanish: y exaltó
  alternatives_spanish:
  - y levantó
  - y enalteció
  lexicon: HALOT
  rationale: «Exaltó» comunica adecuadamente el ensalzamiento de honor y rango en el contexto real.
- source_word: קרנו
  english_pob_choice: his horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su fuerza
  - su poder
  lexicon: HALOT
  rationale: Se conserva la metáfora bíblica de «cuerno», que en este contexto expresa fuerza, honor y poder regio; no se la aplana en el texto principal.
- source_word: לעולם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: HALOT
  rationale: Es la equivalencia española natural para el sentido de permanencia duradera del hebreo.
- source_word: חוק ממלכת
  english_pob_choice: a decree/statute of kingship
  chosen_spanish: un decreto de realeza
  alternatives_spanish:
  - una estatuto de realeza
  - un decreto real
  - una ley de realeza
  lexicon: HALOT
  rationale: El hebreo habla de un «חוק» ligado a la realeza; «decreto de realeza» suena natural en español y retiene el matiz normativo sin importar la redacción griega de «pacto de reyes» como texto principal.
- source_word: וכסאו הכין
  english_pob_choice: and established his throne
  chosen_spanish: y estableció su trono
  alternatives_spanish:
  - y afirmó su trono
  - y preparó su trono
  lexicon: HALOT
  rationale: «Estableció» es idiomático y conserva la idea de hacer firme o consolidar el trono.
- source_word: עד ירושלים
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - así como Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo literal puede sugerir «hasta», el contexto y la revisión auditada apoyan una lectura idiomática de ubicación; «en Jerusalén» es más natural y fiel al sentido final del verso.
theological_decisions:
- issue: Remisión divina de la falta de David
  english_pob_reading: The LORD also passed over his transgression.
  chosen_spanish_reading: Yahvé también pasó por alto su transgresión.
  alternative_spanish_readings:
  - Yahvé también perdonó su transgresión.
  - Yahvé también remitió su transgresión.
  rationale: La traducción principal conserva la imagen verbal del hebreo sin resolverla prematuramente en una formulación doctrinal más explícita. Así se mantiene la tensión entre la metáfora de «pasar por alto» y el sentido de perdón/remisión reconocido por el contexto y el paralelo griego.
  doctrine_reference: Primacía del idioma original; preservar la tensión lexical-teológica del texto.
- issue: Término para la concesión real
  english_pob_reading: he gave him a decree of kingship.
  chosen_spanish_reading: le dio un decreto de realeza.
  alternative_spanish_readings:
  - le dio un estatuto de realeza.
  - le dio un pacto de reyes.
  rationale: Se sigue el hebreo conservado como testigo principal, que habla de un חוק ligado a la monarquía. Se evita importar al texto principal la formulación griega de «covenant of kings», pero se reconoce la alternativa donde el lector la pueda rastrear.
  doctrine_reference: Primacía del testimonio hebreo con reconocimiento del paralelo griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada más reciente que prefirió «decreto de realeza» y «en Jerusalén» por mayor naturalidad en español, manteniendo el anclaje al hebreo y registrando el paralelo griego en nota. También se respetó el hallazgo del control cruzado de que hay una leve divergencia entre el hebreo conservado y el griego en la cláusula de concesión real.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conserva «transgresión» para פשע en lugar de suavizarlo a «pecado».
  - Se preserva la metáfora de «cuerno» en el texto principal por su valor bíblico.
  - Se usa «decreto de realeza» para reflejar el hebreo, con la variante griega consignada en nota.
  - Se traduce el cierre como «en Jerusalén» siguiendo la lectura revisada y natural en español.
