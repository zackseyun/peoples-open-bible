translation:
  language: es
  text: 'Midió el lado sur: quinientas cañas con la caña de medir[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y versiones antiguas leen «codos» en lugar de «cañas» en este contexto de medida; el Texto Masorético dice «cañas».
    reason: textual_variant
lexical_decisions:
- source_word: ר֥וּחַ הַ/דָּר֖וֹם
  english_pob_choice: the south side
  chosen_spanish: el lado sur
  alternatives_spanish:
  - la parte sur
  - el costado sur
  - la dirección sur
  lexicon: HALOT
  rationale: En este contexto arquitectónico de medición, רוּחַ no se refiere al viento sino a la orientación o costado del conjunto. «Lado sur» comunica de manera natural la idea de una medida de la fachada o límite meridional sin perder el valor direccional del hebreo.
- source_word: מָדָ֑ד
  english_pob_choice: He measured
  chosen_spanish: Midió
  alternatives_spanish:
  - Él midió
  - Midió de nuevo
  - Tomó la medida
  lexicon: HALOT
  rationale: El verbo מדד significa medir. En español, el sujeto puede mantenerse implícito tras la oración anterior; por eso «Midió» conserva fluidez sin añadir elementos no expresados en el hebreo.
- source_word: חֲמֵשׁ מֵא֥וֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientas
  alternatives_spanish:
  - quinientos
  lexicon: HALOT
  rationale: El numeral concuerda con el sustantivo femenino implícito en «cañas»; por eso se usa «quinientas» en vez de la forma masculina.
- source_word: קָנִ֖ים
  english_pob_choice: reeds
  chosen_spanish: cañas
  alternatives_spanish:
  - cañas de medir
  - juncos
  lexicon: HALOT
  rationale: קָנֶה significa «caña» o «cañaveral», y en Ezequiel funciona como unidad de medida. «Cañas» conserva el término hebreo concreto que la POB inglesa también preserva con «reeds».
- source_word: בִּ/קְנֵ֥ה הַ/מִּדָּֽה
  english_pob_choice: by the measuring reed
  chosen_spanish: según la caña de medir
  alternatives_spanish:
  - por la caña de medir
  - con la caña de medir
  - conforme a la caña de medir
  lexicon: HALOT
  rationale: 'La preposición ב aquí es instrumental/estándar: la medición se realiza con esa vara patrón. «Según la caña de medir» expresa bien el valor normativo del instrumento sin sonar forzado en español. Se evita «regla» porque no refleja la imagen léxica de קנה.'
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés mantiene el texto sin cambios; no se registran modificaciones aplicadas y hay alto acuerdo entre revisiones.
  spanish_consistency_notes:
  - Se mantiene el paralelismo del expediente inglés entre la medida y el instrumento de medición.
  - Se conserva «cañas» para reflejar el hebreo קָנִים, con nota de variante textual donde el POB inglés ya documenta la alternativa de «codos».
  - La omisión explícita del sujeto en español sigue el sujeto retomado del contexto inmediato, equivalente al «He» suplido en la traducción inglesa.
