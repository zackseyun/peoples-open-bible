revisions:
- from: Él ha rechazado tu becerro[a], oh Samaria; mi ira arde contra ellos. ¿Hasta cuándo no podrán tener inocencia[b]?
  to: Él ha rechazado tu becerro[a], Samaria; mi ira arde contra ellos. ¿Hasta cuándo no podrán ser inocentes[b]?
