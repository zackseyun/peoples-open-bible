translation:
  language: es
  text: Y almacenaron armas y provisiones, y después de reunir los despojos de Jerusalén[a] los depositaron allí, y se convirtió en un gran lazo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los despojos desde Jerusalén» o «los despojos procedentes de Jerusalén». El genitivo griego puede entenderse de ambas maneras.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέθεντο
  english_pob_choice: stored up
  chosen_spanish: almacenaron
  alternatives_spanish:
  - guardaron
  - acopiaron
  - depositaron
  lexicon: LSJ
  rationale: El contexto militar sugiere acumulación ordenada de suministros; «almacenaron» comunica mejor la idea de guardar provisiones para uso posterior que un simple «pusieron». Se evita repetir «depositaron» para reservarlo al segundo verbo griego.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas de guerra
  - armas y equipo
  lexicon: LSJ
  rationale: «Armas» es el equivalente natural y directo en español para el conjunto de armas militares, con claridad contemporánea y sin añadir precisión no presente en el griego.
- source_word: τροφήν
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - víveres
  - sustento
  lexicon: LSJ
  rationale: En un contexto de acopio militar, «provisiones» conserva la idea de alimentos/suministros almacenados para una guarnición mejor que «alimentos», que en español puede sonar demasiado general o doméstico.
- source_word: συναγαγόντες
  english_pob_choice: after gathering
  chosen_spanish: después de reunir
  alternatives_spanish:
  - habiendo reunido
  - tras reunir
  - al reunir
  lexicon: LSJ
  rationale: La forma participial anterior a la acción principal queda bien expresada en español con una secuencia temporal explícita; «después de reunir» mantiene el orden narrativo sin sobretraducción.
- source_word: τὰ σκῦλα
  english_pob_choice: the spoils
  chosen_spanish: los despojos
  alternatives_spanish:
  - el botín
  - el saqueo
  - los despojos de guerra
  lexicon: LSJ
  rationale: «Despojos» conserva el sentido de bienes tomados por fuerza y mantiene el registro bíblico; evita «botín», que en español moderno puede sonar más coloquial.
- source_word: Ἰερουσαλήμ
  english_pob_choice: of Jerusalem / from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - procedentes de Jerusalén
  lexicon: LSJ
  rationale: El genitivo puede entenderse como origen o pertenencia. «De Jerusalén» preserva la ambigüedad útil que el inglés POB documentó, sin forzar una sola relación sintáctica.
- source_word: ἀπέθεντο
  english_pob_choice: they deposited
  chosen_spanish: depositaron
  alternatives_spanish:
  - guardaron
  - dejaron
  - pusieron
  lexicon: LSJ
  rationale: El verbo indica colocar en un lugar determinado; «depositaron» distingue esta acción de la acumulación previa y refleja una ubicación deliberada de lo reunido.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: LSJ
  rationale: «Allí» es la referencia locativa natural en español y remite al lugar fortificado mencionado en el versículo anterior.
- source_word: παγίδα
  english_pob_choice: snare
  chosen_spanish: trampa
  alternatives_spanish:
  - lazo
  - snare
  lexicon: LSJ
  rationale: «Trampa» transmite con naturalidad la metáfora de peligro y captura. Aunque «snare» puede sugerir un matiz más bíblico en inglés, en español «trampa» es más idiomático sin perder la fuerza figurada.
theological_decisions:
- issue: Fuerza metafórica de μεγάλην παγίδα
  english_pob_reading: it became a great snare
  chosen_spanish_reading: se convirtió en una gran trampa
  alternative_spanish_readings:
  - llegó a ser una gran trampa
  - se volvió una gran trampa
  - se convirtió en un gran lazo
  rationale: No se aclara quién queda atrapado, para no resolver la tensión interpretativa que el contexto inmediato desarrollará. «Gran trampa» mantiene la imagen de peligro y captura sin exceder el alcance del griego.
  doctrine_reference: Preservar la tensión interpretativa y la imagen metafórica sin explicitar más de lo que el texto dice.
translation_notes:
  revision_awareness: El texto inglés auditado ya había fijado «stored up», «provisions», «after gathering», «deposited» y «great snare», con nota sobre la ambigüedad de τὰ σκῦλα Ἰερουσαλήμ. La versión española conserva esa ambigüedad en «de Jerusalén» y evita una paráfrasis que resuelva el genitivo. No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se mantiene «armas» y no «armamento» para no introducir colectivización no explícita.
  - «Provisiones» se usa en sentido militar/logístico, coherente con el contexto de almacenamiento.
  - La alternancia verbal «almacenaron» / «depositaron» reproduce la distinción entre preparar reservas y colocarlas en un lugar.
  - «Trampa» se eligió por claridad idiomática; la nota conserva la alternativa «despojos de Jerusalén» para reflejar la ambigüedad del griego.
