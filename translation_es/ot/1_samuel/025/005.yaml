translation:
  language: es
  text: 'Entonces David envió[a] a diez jóvenes, y David dijo a los jóvenes: «Suban a Carmel, vayan a Nabal y salúdenlo en mi nombre, deseándole paz[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «diez siervos»; נְעָרִים puede referirse a jóvenes o a servidores, pero aquí se ha preferido «jóvenes» por ser el sentido léxico más directo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O, «pregúntenle por su bienestar»; es decir, háganle un saludo de paz e inquieran por su paz o bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שלח en narración expresa la acción simple de enviar. «Envió» conserva el valor básico y suena natural en español bíblico actual.
- source_word: עֲשָׂרָה נְעָרִים
  english_pob_choice: ten young men
  chosen_spanish: diez jóvenes
  alternatives_spanish:
  - diez muchachos
  - diez siervos
  - diez jóvenes servidores
  lexicon: HALOT
  rationale: נְעָרִים designa aquí a hombres jóvenes; no se explicita su condición social. «Jóvenes» preserva el sentido léxico sin imponer «siervos».
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Subid
  alternatives_spanish:
  - Suban
  - Sube
  lexicon: HALOT
  rationale: עלה en instrucción de viaje se vierte naturalmente como «subir/ir». Se conserva el imperativo plural y la imagen direccional.
- source_word: כַרְמֶלָה
  english_pob_choice: to Carmel
  chosen_spanish: a Carmel
  alternatives_spanish:
  - hacia Carmel
  - para Carmel
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar; «a Carmel» comunica bien la dirección en español.
- source_word: וּבָאתֶם אֶל נָבָל
  english_pob_choice: and go to Nabal
  chosen_spanish: y id a Nabal
  alternatives_spanish:
  - y venid a Nabal
  - y llegad a Nabal
  lexicon: HALOT
  rationale: Aunque literalmente es «venir», en una orden dada por David a sus mensajeros el español natural es «id a Nabal». Mantiene la perspectiva narrativa sin perder el movimiento.
- source_word: וּשְׁאֶלְתֶּם לוֹ
  english_pob_choice: greet him
  chosen_spanish: saludadlo
  alternatives_spanish:
  - preguntadle
  - inquirid por él
  - acedle un saludo
  lexicon: HALOT
  rationale: שאל con ל introduce una fórmula de saludo/inquirir por bienestar. En español, «saludadlo» recoge el acto pragmático que completa la expresión con לְשָׁלוֹם.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - en representación mía
  - de parte mía
  lexicon: HALOT
  rationale: La expresión es directa y transparente; «en mi nombre» conserva el giro hebreo y su fuerza representativa.
- source_word: לְשָׁלוֹם
  english_pob_choice: with peace
  chosen_spanish: con paz
  alternatives_spanish:
  - por su paz
  - preguntando por su bienestar
  - con bienestar
  lexicon: HALOT
  rationale: El sustantivo שָׁלוֹם funciona aquí como saludo de paz y bienestar. «Con paz» mantiene el término clave sin diluirlo; el sentido de bienestar queda implícito en el contexto del saludo.
theological_decisions:
- issue: Sentido de לְשָׁלוֹם como saludo de bienestar o paz
  english_pob_reading: greet him in my name with peace
  chosen_spanish_reading: saludadlo en mi nombre con paz
  alternative_spanish_readings:
  - preguntad por su bienestar en mi nombre
  - saludadlo en mi nombre deseándole paz
  rationale: La frase no describe solo un contenido abstracto de paz, sino una fórmula de saludo. «Con paz» preserva el lenguaje del texto y evita reducirlo a mera pregunta, aunque el matiz de bienestar sigue presente.
  doctrine_reference: Uso contextual de שָׁלוֹם en fórmulas de saludo; no implica doctrina específica.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió entender לְשָׁלוֹם como fórmula de saludo («with peace») y no como una simple pregunta por el bienestar. Por eso el español usa «saludadlo... con paz», manteniendo el mismo ajuste interpretativo sin perder el trasfondo de bienestar. También se conserva la estructura narrativa simple y el paralelismo de las dos acciones mandadas por David.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «Nabal» como nombre propio sin explicación adicional.
  - Se preserva el plural imperativo de segunda persona («Subid», «id») para reflejar el خطاب dirigido a los mensajeros.
  - «Con paz» conserva el término shalom como saludo; no se sustituye por una paráfrasis más larga en el texto principal.
