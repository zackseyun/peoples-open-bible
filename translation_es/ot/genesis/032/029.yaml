revisions:
- from: 'Y dijo[a]: «No se dirá más tu nombre Jacob, sino Israel, porque has luchado con Dios y con hombres[b], y has prevalecido».'
  to: 'Y dijo[a]: «Tu nombre ya no será Jacob, sino Israel, porque has luchado con Dios y con hombres[b], y has prevalecido».'
  rationale: Se ajusta la fórmula de renombramiento para reflejar mejor el valor de יֵאָמֵר en contexto. «Tu nombre ya no será Jacob» es más natural y fiel en español que «No se dirá más tu nombre Jacob», mientras preserva la solemnidad y el sentido del hebreo. Se mantienen las notas porque siguen siendo pertinentes y están correctamente ancladas.
