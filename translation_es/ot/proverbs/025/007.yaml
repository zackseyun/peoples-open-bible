  text: כִּ֤י ט֥וֹב אֲמָר לְ/ךָ֗ עֲֽלֵ֫ה הֵ֥נָּה מֵֽ֭/הַשְׁפִּ֣ילְ/ךָ לִ/פְנֵ֣י נָדִ֑יב אֲשֶׁ֖ר רָא֣וּ עֵינֶֽי/ךָ־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/025/007.yaml
  text: For it is better that it be said to you[b][a], “Come up here,” than that you be humbled before a nobleman whom your eyes have seen.
  footnotes:
  - marker: a
    text: Or, more literally, “than your being made low.” The Hebrew verb can emphasize being lowered in rank or place, with the social shame implied by the setting.
    reason: lexical_alternative
  - marker: b
    text: “Whom your eyes have seen” is a vivid Hebrew expression; some translations simplify it to “whom you have seen.”
    reason: lexical_alternative
