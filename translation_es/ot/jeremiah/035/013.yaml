revisions:
- from: 'Así dice Yahvé de los ejércitos, el Dios de Israel: “Vayan y digan a los hombres de Judá y a los habitantes de Jerusalén: ‘¿No aceptarán instrucción[a] y escucharán mis palabras? —declara Yahvé—’”.'
  to: 'Así dice Yahvé de los ejércitos, el Dios de Israel: «Ve y di a los hombres de Judá y a los habitantes de Jerusalén: “¿No aceptarán instrucción[a] y escucharán mis palabras?, declara Yahvé”».'
  rationale: Se corrige el mandato a singular (‘Ve y di’) para ajustarlo al hebreo. Se simplifica la puntuación del discurso directo para hacerla más natural en español, conservando la fórmula profética de cierre. Se mantiene ‘instrucción’ con nota léxica alineada con las alternativas documentadas en inglés.
