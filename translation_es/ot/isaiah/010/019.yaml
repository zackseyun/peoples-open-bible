translation:
  language: es
  text: Y los árboles restantes de su bosque serán pocos en número[a], y un muchacho[b] podrá anotarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el remanente de los árboles de su bosque será un número, y un muchacho los escribirá». El hebreo usa «número» de manera idiomática para decir «tan pocos que se pueden contar».'
    reason: lexical_alternative
  - marker: b
    text: «Muchacho» traduce un término hebreo masculino singular (naʿar), que según el contexto también puede significar «niño», «joven» o «joven varón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאָר
  english_pob_choice: And the remaining
  chosen_spanish: Y los restantes
  alternatives_spanish:
  - Y el remanente
  - Y lo que quede
  lexicon: HALOT
  rationale: שְׁאָר expresa lo que queda o permanece. En este contexto se trata de árboles, así que 'los restantes' conserva la idea de supervivencia sin introducir un matiz técnico de 'remanente' que en español suele asociarse a un grupo humano o teológico.
- source_word: עֵץ
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - madera
  - árbol
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona colectivamente dentro de la imagen del bosque. En español, el plural 'árboles' comunica naturalmente el conjunto de ejemplares que quedan.
- source_word: יַעְרוֹ
  english_pob_choice: his forest
  chosen_spanish: su bosque
  alternatives_spanish:
  - su bosque
  - el bosque de él
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva con 'su'. En español, 'su bosque' es la forma natural y mantiene la referencia posesiva sin forzar una construcción menos idiomática.
- source_word: מִסְפָּר
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - tan pocos
  - de número escaso
  - contables
  lexicon: HALOT
  rationale: מִסְפָּר significa literalmente 'número', pero aquí funciona idiomáticamente con el sentido de cantidad reducida. 'Pocos en número' refleja la fuerza formal de la expresión y mantiene la tensión entre número y escasez.
- source_word: וְ/נַעַר
  english_pob_choice: a boy
  chosen_spanish: un muchacho
  alternatives_spanish:
  - un niño
  - un joven
  lexicon: HALOT
  rationale: נַעַר puede significar niño, muchacho o joven según el contexto. 'Muchacho' es suficientemente amplio y conserva el rasgo masculino sin sonar demasiado infantil ni demasiado adulto.
- source_word: יִכְתְּבֵם
  english_pob_choice: can write them down
  chosen_spanish: podrá escribirlos
  alternatives_spanish:
  - los escribirá
  - podrá anotarlos
  - los podrá escribir
  lexicon: HALOT
  rationale: El verbo hebreo dice literalmente 'escribirá/los escribirá', con la implicación de que serán tan pocos que hasta un muchacho puede hacerlo. 'Podrá escribirlos' conserva la idea de capacidad implícita en el contexto, mientras sigue cerca de la forma verbal.
translation_notes:
  revision_awareness: El texto español sigue la revisión final del audit trail inglés, que prefirió 'few in number' sobre una paráfrasis como 'tan pocos', para reflejar con más precisión el valor formal de מִסְפָּר sin perder la idea idiomática de contabilidad. También conserva la nota sobre la ambigüedad de נַעַר.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto no aplicable aquí, ya que el versículo no contiene el Tetragrámaton.
  - '''Bosque'' mantiene la imagen concreta del hebreo y evita abstraerla.'
  - La nota [a] preserva la alternativa idiomática donde 'número' significa cantidad escasa.
  - La nota [b] conserva la ambigüedad de נַעַר sin endurecerla a 'niño' o 'joven' exclusivamente.
