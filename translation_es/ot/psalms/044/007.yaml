translation:
  language: es
  text: Porque no confío[a] en mi arco, y mi espada no me salva[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo también puede entenderse con matiz futuro: «Porque no confiaré en mi arco».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «mi espada no me da victoria» o «mi espada no me libra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. «Porque» conserva con naturalidad el valor explicativo del hebreo sin volver la línea más pesada en español.
- source_word: בְקַשְׁתִּי
  english_pob_choice: my bow
  chosen_spanish: mi arco
  alternatives_spanish:
  - mi arco de guerra
  - mi arco
  lexicon: HALOT
  rationale: קֶשֶׁת designa un arco como arma. En español, «arco» comunica el instrumento bélico de forma natural; no se añade «de guerra» porque el contexto ya lo especifica.
- source_word: אֶבְטָח
  english_pob_choice: I do not trust
  chosen_spanish: no confío
  alternatives_spanish:
  - no confiaré
  - no dependo
  lexicon: HALOT
  rationale: El verbo בטח expresa confiar o apoyarse en algo. «No confío» reproduce bien la idea de dependencia y mantiene el tono gnómico del verso; «no dependería» sería más interpretativo.
- source_word: וְחַרְבִּי
  english_pob_choice: and my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - y mi espada
  lexicon: HALOT
  rationale: חֶרֶב es «espada». En español, la coordinación ya queda implícita en la segunda cláusula; por eso se conserva el sentido sin forzar un «y» si la sintaxis fluye mejor así. Se mantiene el posesivo para reflejar el sufijo de primera persona.
- source_word: תוֹשִׁיעֵנִי
  english_pob_choice: does not save me
  chosen_spanish: no me salva
  alternatives_spanish:
  - no me salvará
  - no me da victoria
  - no me libra
  lexicon: HALOT
  rationale: El hiphil de ישׁע puede significar salvar, librar o dar victoria. «No me salva» preserva el campo semántico amplio y la dependencia de Dios, sin reducir el verbo a victoria militar únicamente.
theological_decisions:
- issue: Sentido de ישׁע en contexto militar
  english_pob_reading: Rendered as 'save me' rather than narrowing to 'give me victory.'
  chosen_spanish_reading: «no me salva» en lugar de limitarlo a «no me da victoria»
  alternative_spanish_readings:
  - no me da victoria
  - no me libra
  rationale: El salmo habla de guerra, por lo que «dar victoria» es posible; sin embargo, «salva» conserva el alcance más amplio del verbo hebreo y la dependencia del pueblo en Yahvé, sin restringir el verso a éxito bélico.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Tensión temporal del imperfecto hebreo
  english_pob_reading: The Hebrew imperfects can be read with a future-like nuance.
  chosen_spanish_reading: 'Presente gnómico: «no confío… no me salva»'
  alternative_spanish_readings:
  - no confiaré… no me salvará
  - no confiaré… no me salva
  rationale: El imperfecto hebreo permite una lectura con matiz futuro, pero en poesía este verso expresa una postura habitual o general. El presente español conserva esa fuerza proverbial sin introducir una cronología que el contexto no exige.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios requeridos y el acuerdo con la revisión fue alto. Se mantuvo la decisión auditada de traducir ישׁע con un verbo amplio de salvación/liberación, sin estrecharlo a victoria militar.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino en este proyecto, aunque este verso no lo menciona explícitamente.
  - «Arco» y «espada» conservan el paralelismo bélico del hebreo.
  - Se prefirió un presente español natural para reflejar el imperfecto hebreo en lectura gnómica, como permite el audit trail inglés.
