id: 1TI.1.16
reference: 1 Timothy 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ διὰ τοῦτο ἠλεήθην, ἵνα ἐν ἐμοὶ πρώτῳ ἐνδείξηται ⸂Χριστὸς Ἰησοῦς⸃ τὴν ⸀ἅπασαν μακροθυμίαν, πρὸς ὑποτύπωσιν τῶν μελλόντων πιστεύειν ἐπ’ αὐτῷ εἰς ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/016.yaml
  text: But for this reason I received mercy[a], so that in me, as the foremost[d][c][b], Messiah Jesus might display all his patience as a pattern for those who were going to believe in him for eternal life.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either 'Messiah' or 'Christ'; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'those who would believe in him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all his forbearance' or 'all his longsuffering.'
    reason: lexical_alternative
  - marker: d
    text: Or 'those who were going to believe'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 바로 이 일을 위해 내가 자비를 입었습니다[a]. 곧 으뜸인 나에게 메시아 예수께서 그분의 온갖 오래 참으심[c]을 보이시어, 그분을 믿어 영생을 얻을 자들[d]의 본보기로 삼으시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 본 번역은 칭호 의미를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: c
    text: 또는 「온갖 관용」 「온갖 오래 참음」. μακροθυμία는 분노를 거두고 오래 참는 신적 인내.
    reason: lexical_alternative
  - marker: d
    text: 또는 「장차 그분을 믿게 될 자들」.
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_korean: 바로 이 일을 위해
  alternatives_korean:
  - 이 때문에
  - 그러므로
  lexicon: BDAG
  rationale: 목적 어감을 살리기 위해 「위해」를 명시한다.
- source_word: ἐν ἐμοὶ πρώτῳ
  english_pob_choice: in me, as the foremost
  chosen_korean: 으뜸인 나에게
  alternatives_korean:
  - 죄인 중 으뜸인 내 안에
  - 첫째 가는 나에게
  lexicon: BDAG
  rationale: 15절 πρῶτος와의 연결을 살려 「으뜸」으로 일관한다.
- source_word: ἐνδείξηται
  english_pob_choice: might display
  chosen_korean: 보이시어
  alternatives_korean:
  - 나타내시어
  - 드러내시어
  lexicon: BDAG
  rationale: ἐνδείκνυμι의 「공적으로 드러내 보이다」 어감을 「보이시어」로 옮긴다.
- source_word: τὴν ἅπασαν μακροθυμίαν
  english_pob_choice: all his patience
  chosen_korean: 그분의 온갖 오래 참으심
  alternatives_korean:
  - 모든 인내
  - 온전한 오래 참음
  lexicon: BDAG
  rationale: μακροθυμία는 분노를 거두고 오래 참는 신적 인내. 「오래 참으심」이 신학 어휘로 정립되어 있다.
- source_word: πρὸς ὑποτύπωσιν
  english_pob_choice: as a pattern
  chosen_korean: 본보기로
  alternatives_korean:
  - 모형으로
  - 표본으로
  lexicon: BDAG
  rationale: ὑποτύπωσις는 후대 모방의 본을 가리키므로 「본보기」가 자연스럽다.
- source_word: τῶν μελλόντων πιστεύειν
  english_pob_choice: those who were going to believe
  chosen_korean: 믿어 영생을 얻을 자들
  alternatives_korean:
  - 장차 믿게 될 자들
  lexicon: BDAG
  rationale: μέλλω + 부정사의 미래 의도를 「~할 자들」로 옮기되, 이어지는 εἰς ζωὴν αἰώνιον과 묶어 한국어 어순 흐름을 살린다.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분을
  alternatives_korean:
  - 그분에게
  - 그분 위에
  lexicon: BDAG
  rationale: πιστεύω + ἐπί + 여격은 한국어로 「~을 믿다」가 자연스럽다.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: for eternal life
  chosen_korean: 영생을 얻을
  alternatives_korean:
  - 영원한 생명에 이르도록
  - 영생에 이르는
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「영생」을 사용.
