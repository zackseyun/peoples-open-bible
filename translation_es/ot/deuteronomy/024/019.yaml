review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: caso legal de cosecha, olvido de una gavilla, prohibición de volver por ella, provisión para las tres categorías vulnerables, y propósito de bendición por parte de Yahvé. También conserva correctamente el nombre divino como «Yahvé». Sin embargo, no preserva del todo el rastro léxico auditado de la POB en dos puntos: el inglés mantuvo una nota alternativa para «the fatherless», pero el español puso «huérfano» en el texto principal y luego produjo una nota defectuosa; además, la expresión final «en toda obra de tus manos» suena menos natural que una formulación española que conserve mejor el modismo hebreo.'
  spanish_quality_summary: El español es en general claro y digno, con buenas elecciones como «siegues», «gavilla» y «para que Yahvé tu Dios te bendiga». No obstante, la nota [b] contiene un error evidente («padreless») y por eso no es publicable. En el texto principal, «extranjero residente» es comprensible pero algo técnico; «forastero residente» o «residente extranjero» no mejoran claramente. La frase «en toda obra de tus manos» es entendible, pero «en toda la obra de tus manos» o «en todo el trabajo de tus manos» fluye mejor en español bíblico moderno.
  glossary_alignment: 'Se alinea bien con el glosario del proyecto en «Yahvé», «Dios», y la preservación contextual de categorías sociales vulnerables. La decisión sobre גֵּר como «extranjero residente» es aceptable y defendible. La principal desalineación está en לַיָּתוֹם: aunque «huérfano» puede ser válido en español, la auditoría inglesa marcó explícitamente «fatherless» como elección principal y «orphan» como alternativa; en español conviene reflejar esa razón de forma más fiel con «el que no tiene padre» en el texto o, si se mantiene «huérfano», al menos con una nota correcta y justificada. Aquí la mejor reparación es usar «el que no tiene padre[b]» con nota alternativa «O: “el huérfano”».'
  issues:
  - severity: high
    issue: La nota [b] es defectuosa y contiene el anglicismo/error «padreless».
    rationale: Esto rompe la legibilidad, no refleja adecuadamente la nota inglesa, y deja mal documentada la decisión léxica para לַיָּתוֹם.
  - severity: medium
    issue: El texto principal usa «el huérfano» donde la POB inglesa eligió «the fatherless» como matiz principal.
    rationale: Aunque «huérfano» es natural en español, la auditoría documentó una preferencia semántica específica que conviene preservar mejor, especialmente al tratarse de una tríada legal estable.
  - severity: low
    issue: «En toda obra de tus manos» es algo rígido en español.
    rationale: 'Añadir el artículo mejora la naturalidad sin perder la imagen hebrea: «en toda la obra de tus manos».'
  revised_spanish_text: Cuando siegues tu cosecha en tu campo y olvides una gavilla en el campo, no volverás para tomarla. Será para el extranjero residente[a], para el que no tiene padre[b] y para la viuda, para que Yahvé tu Dios te bendiga en toda la obra de tus manos.
  revised_footnotes:
