translation:
  language: es
  text: Derramo delante de él mi queja[a]; declaro delante de él mi angustia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi meditación» / «mi reflexión» para שִׂיחִי; en este lamento, el sentido probablemente es la queja pronunciada, no la reflexión interior.
    reason: lexical_alternative
  - marker: b
    text: O «mi aflicción» / «mi tribulación» para «mi angustia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁפֹּךְ
  english_pob_choice: I pour out
  chosen_spanish: Vierto
  alternatives_spanish:
  - Derramo
  - Vierto afuera
  lexicon: HALOT
  rationale: שפך en este contexto de lamento expresa una acción intensa y desbordada. «Vierto» conserva la imagen de derramar el contenido del corazón ante Dios sin sonar mecánico en español. Se evita «spillo» por no ser idiomático aquí.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión hebrea indica posición relacional y espacial. «Delante de él» preserva la repetición paralela del hebreo y es natural en español bíblico moderno; «ante él» sería igualmente posible, pero menos conversacional.
- source_word: שִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi lamento
  - mi meditación
  - mi reflexión
  lexicon: HALOT
  rationale: En este salmo de lamentación, el sentido probable es una queja o lamento expresado verbalmente, no una meditación interior. «Mi queja» refleja bien la audibilidad del reclamo; se conserva la tensión con las alternativas contemplativas documentadas en el audit trail.
- source_word: צָרָתִי
  english_pob_choice: my distress
  chosen_spanish: mi angustia
  alternatives_spanish:
  - mi aflicción
  - mi afán
  - mi problema
  lexicon: HALOT
  rationale: צָרָה denota presión, estrechez, aflicción o angustia. «Angustia» comunica la carga emocional y existencial del término con buena naturalidad en español. «Aflicción» es una alternativa válida, más formal y algo más amplia.
- source_word: אַגִּיד
  english_pob_choice: I declare
  chosen_spanish: declaro
  alternatives_spanish:
  - digo
  - hago saber
  - revelo
  lexicon: HALOT
  rationale: El causativo de נגד implica hacer saber o declarar. «Declaro» conserva el tono deliberado y testimonial del hebreo. «Hago saber» sería más explicativo, pero menos fluido.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran un paralelismo directo: una primera cola con הִפְעַל de נגד y una segunda cola con el mismo complemento locativo. No hubo revisiones pendientes en el pasaje inglés; por eso la propuesta mantiene la estructura paralela y no introduce expansiones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de «delante de él ... delante de él» para reflejar לְפָנָיו repetido en ambos miembros.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton; el pronombre «él» sigue la referencia al destinatario del lamento.
  - Se usa «queja» como equivalente principal de שִׂיחִי, con nota de alternativa contemplativa para preservar la tensión lexical documentada.
  - Se usa «angustia» como equivalente principal de צָרָתִי, con nota de alternativas más literales o más generales.
