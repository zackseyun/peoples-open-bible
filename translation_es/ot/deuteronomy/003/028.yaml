base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/028.yaml
  text: But commission Joshua[a], and strengthen him and encourage him, for he will cross over before this people[c][b], and he will cause them to inherit the land that you will see.
  footnotes:
  - marker: a
    text: Or 'command Joshua' or 'charge Joshua.' The Hebrew verb can denote giving a formal charge; 'commission' highlights the official entrusting of leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'make him courageous.' The paired verbs 'strengthen' and 'encourage' render a common Hebrew exhortation to firmness and courage.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''he will give them the land as an inheritance.'' The Hebrew verb is causative: Joshua will be the agent through whom the people come to possess their inheritance.'
    reason: lexical_alternative
