revisions:
- from: Tenemos una hermana[a] pequeña, y no tiene pechos. ¿Qué haremos por nuestra hermana en el día cuando se hable de ella?
  to: Tenemos una hermana pequeña, y no tiene pechos. ¿Qué haremos por nuestra hermana el día en que sea pedida en matrimonio[a]?
  rationale: 'Se corrige la última cláusula para seguir la decisión principal auditada por la POB inglesa: el sentido contextual más probable es matrimonial (''spoken for''), mientras que la lectura más amplia (''spoken about'') se conserva en nota. También se mueve el marcador de nota al segmento pertinente y se mejora la naturalidad del español con ''el día en que''.'
  reviewer_model: gpt-5.4
