  text: לֹֽא יַשְׁאִ֤ירוּ מִמֶּ֨/נּוּ֙ עַד בֹּ֔קֶר וְ/עֶ֖צֶם לֹ֣א יִשְׁבְּרוּ ב֑/וֹ כְּ/כָל חֻקַּ֥ת הַ/פֶּ֖סַח יַעֲשׂ֥וּ אֹתֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/012.yaml
  text: They shall leave none of it until morning[a], and they shall not break a bone of it[b]; according to all the statute of the Passover they shall keep it.
