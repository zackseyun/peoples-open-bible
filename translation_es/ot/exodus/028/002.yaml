    issue: '''Vestiduras'' es algo más elevado que el inglés ''garments'', pero sigue siendo apropiado.'
    rationale: No distorsiona el sentido y encaja bien en contexto cultual; no hace falta revisión.
  - severity: low
    issue: '''Belleza'' podría percibirse como ligeramente menos majestuoso que ''esplendor''.'
    rationale: Sin embargo, el hebreo תפארת admite 'belleza', y la nota ya preserva la alternativa 'esplendor'.
