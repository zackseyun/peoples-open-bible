translation:
  language: es
  text: 'Yo dije: «Ciertamente me temerás; aceptarás la corrección. Entonces no sería cortada su morada[a], conforme a todo lo que había decretado contra ella». Pero, en cambio, se levantaron temprano[b]; corrompieron todos sus hechos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, posiblemente: «Entonces no sería cortada su morada, a pesar de todo lo que había decretado contra ella».'
    reason: alternative_reading
  - marker: b
    text: «Se levantaron temprano» es un modismo hebreo que puede implicar diligencia o persistencia.
    reason: cultural_note
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Yo pensé
  lexicon: HALOT
  rationale: אָמַרְתִּי es el perfecto 1cs de אמר; «Yo dije» conserva el marco directo de habla divina. «Yo pensé» es posible solo como giro interpretativo, pero atenúa la inmediatez del discurso.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - solo
  - en verdad
  lexicon: HALOT
  rationale: Aquí אַךְ introduce expectativa afirmativa, no limitación. «Ciertamente» reproduce bien el tono de seguridad y expectativa.
- source_word: תִּירְאִי אוֹתִי
  english_pob_choice: you will fear me
  chosen_spanish: me temerás
  alternatives_spanish:
  - me reverenciarás
  lexicon: HALOT
  rationale: ירא con referencia a Dios suele implicar temor reverente, pero «temer» es la forma más directa y fiel al valor lexical del verbo; «reverenciar» suaviza demasiado el término.
- source_word: תִּקְחִי מוּסָר
  english_pob_choice: you will accept correction
  chosen_spanish: aceptarás la corrección
  alternatives_spanish:
  - recibirás instrucción
  - tomarás disciplina
  lexicon: HALOT
  rationale: לקח + מוסר expresa recibir/aceptar disciplina o corrección. «Aceptarás la corrección» suena natural en español y conserva el sentido moral-disciplinario.
- source_word: וְלֹא יִכָּרֵת
  english_pob_choice: would not be cut off
  chosen_spanish: no sería cortada
  alternatives_spanish:
  - no sería destruida
  - no sería removida
  lexicon: HALOT
  rationale: El nifal de כרת mantiene la imagen de ser «cortada», importante para la noción de juicio de pacto. En español, «sería cortada» preserva esa fuerza; el sujeto implícito se hace explícito con «su morada».
- source_word: מְעוֹנָהּ
  english_pob_choice: her dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su residencia
  lexicon: HALOT
  rationale: מְעוֹן denota lugar de morada/habitación. «Morada» es claro, digno y fiel al campo semántico del término; el sufijo femenino se mantiene con «su» por el contexto de Jerusalén personificada.
- source_word: כֹּל אֲשֶׁר פָּקַדְתִּי עָלֶיהָ
  english_pob_choice: according to all that I had appointed against her
  chosen_spanish: conforme a todo lo que había decretado contra ella
  alternatives_spanish:
  - según todo lo que había puesto sobre ella
  - de acuerdo con todo lo que había visitado sobre ella
  lexicon: HALOT
  rationale: פּקד admite matices de designar, encomendar, visitar o castigar. En este contexto judicial, «decretado» comunica la idea de juicio previamente determinado sin forzar un valor más específico de castigo consumado. «Contra ella» preserva la dirección adversativa del hebreo.
- source_word: אָכֵן
  english_pob_choice: But instead
  chosen_spanish: Pero, en cambio
  alternatives_spanish:
  - sin embargo
  - ciertamente
  lexicon: HALOT
  rationale: Aunque אָכֵן suele ser «ciertamente/en verdad», aquí marca el giro brusco hacia la realidad opuesta a la expectativa; «Pero, en cambio» hace explícito ese contraste en español.
- source_word: הִשְׁכִּימוּ
  english_pob_choice: they rose early
  chosen_spanish: se levantaron temprano
  alternatives_spanish:
  - se apresuraron
  - se levantaron de madrugada
  lexicon: HALOT
  rationale: El hiphil de שׁכם literalmente es «levantarse temprano». «Se levantaron temprano» mantiene la imagen idiomática; el matiz de diligencia o prisa queda en el contexto, como en el inglés POB.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: they corrupted
  chosen_spanish: corrompieron
  alternatives_spanish:
  - arruinaron
  - obraron corruptamente
  lexicon: HALOT
  rationale: El hiphil de שׁחת puede significar corromper, arruinar o echar a perder. «Corrompieron» conserva el sentido moral transitivo con «todos sus hechos».
- source_word: כֹּל עֲלִילוֹתָם
  english_pob_choice: all their deeds
  chosen_spanish: todos sus hechos
  alternatives_spanish:
  - todas sus acciones
  - todas sus prácticas
  lexicon: HALOT
  rationale: עֲלִילוֹת alude a hechos/acciones, a menudo con carga moral. «Hechos» es conciso y mantiene el valor evaluativo sin añadir interpretación.
theological_decisions:
- issue: Referente femenino singular en «su morada» y el cambio posterior a plural
  english_pob_reading: The verse addresses Jerusalem/Zion personified as a woman, then shifts to the people collectively in the plural.
  chosen_spanish_reading: El verso trata a Jerusalén/Sion como mujer personificada y luego pasa al pueblo en plural.
  alternative_spanish_readings:
  - El femenino podría referirse de modo general a la nación sin personificación explícita.
  rationale: El sufijo femenino de מְעוֹנָהּ encaja naturalmente con una ciudad personificada. Conservar «su morada» evita borrar ese rasgo retórico, y el plural final se deja intacto para reflejar la transición al colectivo.
  doctrine_reference: Personificación profética; juicio corporativo de la comunidad del pacto.
- issue: 'Sentido de la cláusula sobre el juicio: «conforme a todo lo que había decretado contra ella»'
  english_pob_reading: 'The clause is rendered as part of the unrealized result: had she feared and accepted correction, her dwelling would not have been cut off in accordance with the judgments appointed against her.'
  chosen_spanish_reading: 'La cláusula se entiende como parte del resultado no realizado: si hubiera temido y aceptado corrección, su morada no habría sido cortada conforme a los decretos de juicio contra ella.'
  alternative_spanish_readings:
  - 'La cláusula puede leerse de modo concesivo: «a pesar de todo lo que había decretado contra ella».'
  rationale: El hebreo es comprimido y admite más de una relación sintáctica. La redacción elegida sigue el flujo de expectativa frustrada y juicio rechazado sin borrar la tensión interpretativa; la alternativa concesiva queda disponible en nota.
  doctrine_reference: Sintaxis profética ambigua; juicio divino y respuesta humana en el marco del pacto.
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente del texto inglés: se conservó la coma/pausa lógica antes de la cláusula adversativa («Pero, en cambio»), y no se introdujeron cambios sustantivos respecto del sentido del POB inglés. También se reflejó la tensión interpretativa del hebreo en la cláusula sobre «todo lo que había decretado contra ella», manteniendo la alternativa concesiva en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino en traducciones donde corresponda, pero en este versículo el texto hebreo no contiene יהוה.
  - Se mantuvo «corrección» para מוסר y «morada» para מְעוֹן, siguiendo un registro bíblico claro sin recurrir a formulaciones eclesiásticas más tradicionales sin necesidad.
  - Se preservó el contraste adversativo de אָכֵן con «Pero, en cambio», en lugar de suavizarlo con una mera equivalencia adverbial.
  - Se evitó traducir «corrompieron» como una construcción intransitiva para conservar la transitividad del verbo con «todos sus hechos».
