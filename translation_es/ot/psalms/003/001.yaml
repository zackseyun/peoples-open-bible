translation:
  language: es
  text: Salmo de David[a], cuando huyó de Absalón, su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: En los encabezados de los salmos, מִזְמוֹר funciona como etiqueta de género poético-musical. «Salmo» es el equivalente establecido y más preciso en español bíblico para conservar el valor canónico del término.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: El hebreo ל permite autoría, dedicación o asociación. «De David» preserva mejor esa ambigüedad que resolverla en una sola dirección, y suena natural en español.
- source_word: בְּבָרְחוֹ
  english_pob_choice: when he fled
  chosen_spanish: cuando huyó
  alternatives_spanish:
  - en su huida
  - durante su huida
  lexicon: HALOT
  rationale: La construcción temporal con ב más infinitivo con sufijo se expresa de forma idiomática en español con una subordinada temporal. «Cuando huyó» conserva el valor temporal sin sobrecargar el texto.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de delante de
  alternatives_spanish:
  - de
  - lejos de
  - de la presencia de
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «de delante de / de la presencia de». En este contexto de fuga, «de delante de» mantiene mejor la imagen espacial del original que un simple «de».
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Nombre propio bíblico estándar
  rationale: Se adopta la forma tradicional y ampliamente reconocible en español bíblico, sin perder la referencia al nombre propio hebreo.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal se vierte de manera directa y natural como «su hijo», manteniendo la relación filial explícita del encabezado.
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: Retain the ambiguous 'of David' rather than specifying authorship.
  chosen_spanish_reading: Mantener «de David» sin cerrar si indica autoría, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: Los encabezados de los salmos pueden señalar varias relaciones con David. El hebreo no obliga a una sola lectura, así que la traducción conserva esa tensión en vez de convertir el encabezado en una afirmación más fuerte de autoría.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés: mantener la ambigüedad de לְדָוִד, traducir temporalmente בְּבָרְחוֹ como una subordinada natural en español, y conservar el valor espacial de מִפְּנֵי sin aplanarlo a un simple «de».'
  spanish_consistency_notes:
  - Se usa «Salmo» para מִזְמוֹר como término de género.
  - Se mantiene «de David» para reflejar la ambigüedad del hebreo y la decisión auditada en inglés.
  - Se conserva el nombre propio bíblico estándar «Absalón» en español.
  - La nota al pie está anclada en «de David» para reflejar la alternativa interpretativa del encabezado.
