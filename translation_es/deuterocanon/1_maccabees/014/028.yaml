translation:
  language: es
  text: 'En Saramel[a], en una gran asamblea de los sacerdotes, del pueblo, de los jefes de la nación y de los ancianos del país[b], se nos hizo saber:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En Saramel». Con un nombre de lugar, la preposición griega puede verterse legítimamente de ambas maneras.
    reason: lexical_alternative
  - marker: b
    text: O «jefes de la nación ... ancianos de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Σαραμέλ
  english_pob_choice: At Saramel
  chosen_spanish: En Saramel
  alternatives_spanish:
  - En Saramel
  lexicon: LSJ
  rationale: Con un nombre de lugar, ἐν puede expresarse naturalmente en español como «en»; aquí conserva el valor locativo del encabezado. Se translitera el topónimo sin intentar identificarlo ni traducirlo.
- source_word: συναγωγῆς μεγάλης
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran reunión
  - una gran congregación
  lexicon: LSJ
  rationale: συναγωγή aquí designa una reunión pública de personas, no un edificio religioso. «Asamblea» conserva el sentido formal y colectivo; «gran» refleja mejor la solemnidad que una mera medida de tamaño.
- source_word: τῶν ἱερέων καὶ λαοῦ καὶ ἀρχόντων ἔθνους καὶ τῶν πρεσβυτέρων τῆς χώρας
  english_pob_choice: of the priests and the people and the leaders of the nation and the elders of the country
  chosen_spanish: de los sacerdotes, del pueblo, de los jefes de la nación y de los ancianos del país
  alternatives_spanish:
  - de los sacerdotes, del pueblo, de los líderes de la nación y de los ancianos de la tierra
  - de los sacerdotes, del pueblo, de los gobernantes de la nación y de los ancianos del territorio
  lexicon: LSJ
  rationale: Se conserva la cadena genitiva con grupos coordinados y se evita suavizar el alcance de ἀρχόντων. «Jefes» mantiene una ambigüedad útil entre liderazgo y autoridad, mientras «ancianos» traduce πρεσβυτέρων de forma directa. «País» es una equivalencia natural de χώρα en este contexto nacional/territorial.
- source_word: ἐγνώσθη ἡμῖν
  english_pob_choice: it was made known to us
  chosen_spanish: se nos hizo saber
  alternatives_spanish:
  - nos fue dado a conocer
  - llegó a conocerse entre nosotros
  lexicon: LSJ
  rationale: El pasivo aoristo de γινώσκω funciona aquí como fórmula de comunicación oficial. «Se nos hizo saber» preserva el matiz pasivo e impersonal y suena más natural en español que una calca como «fue conocido por nosotros».
translation_notes:
  revision_awareness: Se siguió el consenso alto del auditor inglés; no se requirieron cambios de revisión. La versión española conserva la sintaxis formal del encabezado y las alternativas léxicas relevantes sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - «Asamblea» se usa en sentido de reunión pública; no implica una institución eclesiástica posterior.
  - «Jefes» y «país» reflejan el registro amplio y territorial del griego sin forzar una terminología más técnica de autoridad o nación.
