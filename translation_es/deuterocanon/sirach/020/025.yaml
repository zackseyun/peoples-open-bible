translation:
  language: es
  text: Mejor es un ladrón que quien persiste en mentir[a]; pero ambos heredarán destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Un ladrón es preferible a quien persiste en mentir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετὸν
  english_pob_choice: is preferable
  chosen_spanish: Mejor es
  alternatives_spanish:
  - es preferible
  - es de escoger
  - es más digno de ser elegido
  lexicon: LSJ
  rationale: El adjetivo expresa que algo es preferible o más escogible. En español, la fórmula proverbial «Mejor es» comunica con naturalidad ese valor comparativo sin perder la fuerza sentenciosa.
- source_word: κλέπτης
  english_pob_choice: a thief
  chosen_spanish: un ladrón
  alternatives_spanish:
  - un ladrón
  - un ratero
  lexicon: LSJ
  rationale: κλέπτης designa ordinariamente a un ladrón, no necesariamente a un asaltante violento. «Ladrón» es el equivalente directo y adecuado en español.
- source_word: ἐνδελεχίζων
  english_pob_choice: one who persists
  chosen_spanish: uno que persiste
  alternatives_spanish:
  - uno que continúa
  - uno que se mantiene
  - uno que practica continuamente
  lexicon: LSJ
  rationale: El participio transmite acción continua o habitual. «Persiste» conserva bien esa duratividad y suena natural en una construcción proverbial.
- source_word: ψεύδει
  english_pob_choice: in lying
  chosen_spanish: en la mentira
  alternatives_spanish:
  - en mentir
  - en falsedad
  - en el engaño
  lexicon: LSJ
  rationale: El dativo con el participio señala la esfera o práctica en la que se persiste. «En la mentira» reproduce esa idea de modo idiomático en español.
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: LSJ
  rationale: Es un dual inclusivo simple. «Ambos» es claro, breve y plenamente fiel.
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: Aquí ἀπώλεια denota el desenlace de ruina o destrucción. «Destrucción» conserva el peso del término sin cargarlo con un matiz técnico ajeno.
- source_word: κληρονομήσουσιν
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán como herencia
  - obtendrán
  - tomarán como porción
  lexicon: LSJ
  rationale: 'El verbo significa literalmente «heredarán». Mantener «heredarán» preserva la ironía proverbial: lo que les tocará en herencia será destrucción.'
theological_decisions:
- issue: Comparación moral entre el ladrón y el mentiroso habitual
  english_pob_reading: The verse states that a thief is preferable to a habitual liar, without excusing theft; both still face destruction.
  chosen_spanish_reading: El versículo afirma que un ladrón es preferible a quien vive en la mentira, sin excusar el robo; ambos, sin embargo, heredarán destrucción.
  alternative_spanish_readings:
  - El versículo podría entenderse como una hipérbole sapiencial que subraya el carácter especialmente destructivo de la mentira persistente.
  rationale: El griego hace una comparación real («mejor es un ladrón»), pero la segunda cláusula impide leerlo como aprobación moral del robo. La traducción conserva esa tensión y no la resuelve artificialmente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; el texto sigue el acuerdo alto del control cruzado y conserva la comparación proverbial y el cierre irónico sobre la herencia de destrucción.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - Se conserva el léxico proverbial sobrio y directo, sin introducir terminología eclesiástica añadida.
  - «Destrucción» se usa de forma consistente para ἀπώλεια, evitando intensificarlo a «perdición» salvo contexto doctrinal explícito.
