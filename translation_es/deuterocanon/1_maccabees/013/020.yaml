translation:
  language: es
  text: Y después de estas cosas, Trifón vino para entrar en la ciudad y destruirla, y cercó el camino que lleva a Adora[a]; y Simón y su campamento marcharon frente a él[b] en todo lugar adonde iba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bloqueó el camino a Adora». El griego dice literalmente que «cercó el camino a Adora», lo cual puede describir una maniobra militar destinada a cortar el acceso.
    reason: lexical_alternative
  - marker: b
    text: O «marcharon junto a él» o «avanzaron en oposición a él». El verbo griego sugiere que la fuerza de Simón ajustaba su marcha a la de Trifón de un lugar a otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - más tarde
  lexicon: LSJ
  rationale: Conserva la transición temporal del griego sin suavizarla en exceso. En español suena natural y mantiene la secuencia narrativa.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: LSJ
  rationale: «Vino» reproduce el movimiento narrativo básico del verbo y funciona bien en este contexto histórico.
- source_word: τοῦ ἐμβατεῦσαι
  english_pob_choice: to enter
  chosen_spanish: para entrar
  alternatives_spanish:
  - para invadir
  - para marchar dentro de
  lexicon: LSJ
  rationale: La infinitiva con artículo expresa propósito. «Entrar» sigue de cerca el valor léxico documentado en el audit trail; la intención hostil queda aclarada por el contexto inmediato, sin añadir una intensificación no explicitada por la forma verbal.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: LSJ
  rationale: Traducción directa y natural del objeto directo.
- source_word: ἐκτρῖψαι αὐτήν
  english_pob_choice: wipe it out
  chosen_spanish: destruirla
  alternatives_spanish:
  - arrasarla
  - aniquilarla
  lexicon: LSJ
  rationale: En español, «destruirla» comunica la fuerza de ἐκτρίβω en este contexto bélico sin sonar demasiado idiomático o más violento de lo que la frase exige.
- source_word: ἐκύκλωσεν ὁδὸν τὴν εἰς Ἄδωρά
  english_pob_choice: he encircled the road to Adora
  chosen_spanish: cercó el camino que lleva a Adora
  alternatives_spanish:
  - encircó el camino hacia Adora
  - bloqueó el camino a Adora
  lexicon: LSJ
  rationale: «Cercó» conserva la imagen militar de rodear/encerrar. «Camino que lleva a Adora» hace explícito el valor direccional de τὴν εἰς Ἄδωρά y mantiene la relación con el topónimo sin sobreinterpretar el efecto como mero bloqueo.
- source_word: Ἄδωρά
  english_pob_choice: Adora
  chosen_spanish: Adora
  alternatives_spanish:
  - Adorá
  - Adoraim
  lexicon: LSJ
  rationale: Se translitera el nombre propio de lugar según el uso del proyecto.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su ejército
  - su campamento militar
  lexicon: LSJ
  rationale: «Campamento» preserva el sentido de παρεμβολή como fuerza acampada y resulta natural en español; «campamento militar» añade una especificación no necesaria.
- source_word: ἀντιπαρῆγεν αὐτῷ
  english_pob_choice: marched opposite him
  chosen_spanish: marchaban en oposición a él
  alternatives_spanish:
  - marchaban frente a él
  - avanzaban en paralelo a él
  lexicon: LSJ
  rationale: La idea del verbo compuesto es de movimiento correspondiente/opuesto al suyo. «En oposición a él» preserva la relación táctica sin forzar un sentido demasiado específico de combate directo.
- source_word: εἰς πάντα τόπον οὗ ἐπορεύετο
  english_pob_choice: to every place where he went
  chosen_spanish: en todo lugar adonde iba
  alternatives_spanish:
  - a todo lugar adonde iba
  - a cada lugar donde iba
  lexicon: LSJ
  rationale: Expresa la repetición de la contramarcha con una construcción fluida en español. «Adonde iba» conserva el matiz de desplazamiento local.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «marched opposite him» frente a una opción más general. La redacción española busca reflejar esa contramarcha militar sin perder la literalidad controlada del griego ni convertirla en paráfrasis.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se transliteró el nombre propio Trifón de forma consistente con el griego y el uso español habitual.
  - Se evitó sustituir el vocabulario militar por términos eclesiásticos o suavizados; el registro es histórico y bélico.
  - Se conservó la tensión semántica entre rodear/cercar y bloquear mediante nota al pie, siguiendo el audit trail inglés.
