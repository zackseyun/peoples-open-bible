- from: Por tanto, me desprecio a mí mismo[a], y me arrepiento en polvo y ceniza.
  to: Por tanto, me desprecio[a], y me arrepiento en polvo y ceniza.
  rationale: Se mantiene intacta la lectura principal de la POB, pero se corrige la nota para alinearla mejor con las alternativas documentadas en inglés y con el rango semántico del hebreo. También se simplifica «me desprecio a mí mismo» a «me desprecio», que en español expresa naturalmente el reflexivo sin sobrecargar el verso, mientras la nota sigue preservando que el objeto es implícito en hebreo.
