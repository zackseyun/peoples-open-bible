translation:
  language: es
  text: 'y acerca de los diez cuernos que estaban sobre su cabeza[a], y del otro cuerno que subió, delante del cual cayeron tres: aquel cuerno que tenía ojos y una boca que hablaba grandes cosas, y cuyo aspecto era mayor que el de sus compañeros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una boca que hablaba cosas jactanciosas» o «que emitía grandes jactancias».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַרְנַיָּא עֲשַׂר
  english_pob_choice: the ten horns
  chosen_spanish: los diez cuernos
  alternatives_spanish:
  - los diez cuernos
  lexicon: HALOT
  rationale: El arameo presenta un plural con numeral y mantiene la imagen simbólica de los cuernos; en español, «cuernos» conserva ese símbolo sin interpretarlo ni suavizarlo.
- source_word: בְרֵאשַׁהּ
  english_pob_choice: on its head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: La preposición con «cabeza» se vierte de modo natural en español con «sobre», manteniendo la ubicación espacial clara y fiel al original.
- source_word: אָחֳרִי
  english_pob_choice: the other horn
  chosen_spanish: el otro cuerno
  alternatives_spanish:
  - otro cuerno
  - el posterior cuerno
  lexicon: HALOT
  rationale: «Otro» reproduce la oposición con los diez anteriores sin añadir una matiz temporal que el contexto no exige de forma explícita.
- source_word: סִלְקַת
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - subió
  - apareció
  - se levantó
  lexicon: HALOT
  rationale: «Subió» conserva la imagen de ascenso propia de Daniel y resulta natural en español para la emergencia del cuerno.
- source_word: וְנפלו מִן קדמיה תְּלָת
  english_pob_choice: before which three fell
  chosen_spanish: delante del cual cayeron tres
  alternatives_spanish:
  - y tres cayeron delante de él
  - ante el cual cayeron tres
  lexicon: HALOT
  rationale: La cláusula relativa se conserva con un referente singular («del cual») para el cuerno; «delante de» refleja bien la idea de caída en su presencia.
- source_word: וְקַרְנָא דִכֵּן
  english_pob_choice: the horn that
  chosen_spanish: de aquel cuerno que
  alternatives_spanish:
  - de ese cuerno que
  - de aquel cuerno
  lexicon: HALOT
  rationale: La forma resumptiva se vierte con «de aquel cuerno que» para mantener la referencia al cuerno específico que se sigue describiendo.
- source_word: וְעַיְנִין לַהּ
  english_pob_choice: had eyes
  chosen_spanish: tenía ojos
  alternatives_spanish:
  - con ojos
  - que tenía ojos
  lexicon: HALOT
  rationale: «Tenía ojos» es una equivalencia directa y fluida que preserva el rasgo visual simbólico sin sobreinterpretarlo.
- source_word: וְפֻם מְמַלִּל רַבְרְבָן
  english_pob_choice: a mouth speaking great things
  chosen_spanish: una boca que hablaba grandes cosas
  alternatives_spanish:
  - una boca que hablaba cosas grandes
  - una boca que pronunciaba grandes cosas
  lexicon: HALOT
  rationale: Se mantiene la literalidad de «grandes cosas», porque el arameo no dice explícitamente «jactancias»; así se preserva la tensión léxica documentada por la tradición auditada.
- source_word: וְחֶזְוַהּ
  english_pob_choice: whose appearance
  chosen_spanish: cuyo aspecto
  alternatives_spanish:
  - cuya apariencia
  - cuyo parecer
  lexicon: HALOT
  rationale: «Aspecto» es una opción natural en español para el rasgo visible del cuerno, con un registro sobrio y bíblico.
- source_word: רַב מִן חַבְרָתַהּ
  english_pob_choice: was greater than that of its companions
  chosen_spanish: era más grande que el de sus compañeros
  alternatives_spanish:
  - era mayor que el de sus compañeros
  - era más prominente que el de sus compañeros
  lexicon: HALOT
  rationale: «Más grande» reproduce la comparación de רַב con una equivalencia directa; «compañeros» conserva la relación del conjunto sin reducirla a tamaño físico exclusivamente.
theological_decisions:
- issue: 'Cómo traducir רַבְרְבָן: literalidad frente a interpretación de jactancia'
  english_pob_reading: great things, with a footnote offering boastful things / uttering great boasts
  chosen_spanish_reading: grandes cosas, con nota que admite «cosas jactanciosas» o «grandes jactancias»
  alternative_spanish_readings:
  - cosas jactanciosas
  - grandes jactancias
  - jactancias
  rationale: La lectura principal preserva el enunciado literal del arameo y no resuelve de antemano el matiz valorativo. La nota conserva la alternativa interpretativa porque el contexto sugiere arrogancia, pero el texto base no la explicita en la misma forma.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto español sigue de cerca el pasaje arameo y el criterio óptimo-equivalente del registro inglés auditado. No se introdujeron cambios respecto del sentido base documentado; se preservó la alternativa lexical de רַבְרְבָן en nota para no cerrar indebidamente la tensión semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - «Cuerno» se mantiene de manera consistente como símbolo político-visionario.
  - «Grandes cosas» conserva la literalidad del arameo y la posibilidad interpretativa de jactancia en nota.
  - Se prefiere «compañeros» para reflejar la comparación relacional sin forzar una connotación ética que no está en la forma básica del texto.
