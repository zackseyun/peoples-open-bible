    text: 'O: «que son impuros». El hebreo dice más literalmente: «que no son limpios».'
    reason: lexical_alternative
  revision_rationale: Se corrige el último sintagma para reflejar mejor עַל הָאֲדָמָה en este contexto (‘sobre el suelo’), y se repara la nota al pie para que preserve la alternativa léxica auditada (‘impuros’) y su formulación más literal (‘que no son limpios’).
