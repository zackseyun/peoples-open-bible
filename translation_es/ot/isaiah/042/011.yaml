  to: Que alcen su voz[a] el desierto y sus ciudades, las aldeas donde habita Quedar; canten con júbilo los habitantes de Sela; griten desde las cumbres de los montes.
  rationale: Se ajusta la exhortación inicial a una forma más natural en español ('Que alcen su voz') y se corrige el plural espacial del hebreo en la última frase ('desde las cumbres de los montes'). Se conserva la nota léxica sobre Sela/la roca y el resto del contenido fiel al original.
