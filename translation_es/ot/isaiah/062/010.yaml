revisions:
- from: Pasen, pasen por las puertas; preparen el camino para el pueblo. Levanten, levanten la calzada; quítenle las piedras[a][b]. Levanten una señal sobre los pueblos[c].
  to: Pasen, pasen por las puertas; despejen el camino para el pueblo[a]. Alcen, alcen la calzada[b]; quítenle las piedras. Levanten un estandarte[c] sobre los pueblos.
  rationale: 'La revisión alinea el español con las decisiones léxicas auditadas del POB inglés: פַּנּוּ דֶּרֶךְ se expresa como «despejen el camino» en el texto principal, dejando «preparen» como alternativa; סֹלּוּ סֹלּוּ conserva la imagen de elevar/construir la vía con «Alcen, alcen la calzada»; y נֵס se traduce «estandarte» con «señal» como alternativa. También se corrigen los anclajes de las notas para que correspondan exactamente a las palabras o frases pertinentes.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:23:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura imperativa, la repetición retórica, y la distinción entre «el pueblo» y «los pueblos». Sin embargo, se aparta del énfasis léxico auditado en dos puntos clave: פַּנּוּ דֶּרֶךְ fue documentado como «clear the way», no «prepare the way», y סֹלּוּ סֹלּוּ הַמְסִלָּה se expresa mejor como construir/alzar la calzada, no simplemente «levanten» sin objeto semántico claro. Además, la nota a/c está desanclada respecto al sentido correcto: la alternativa de «Raise a standard» corresponde a נֵס, no a «stones».'
  spanish_quality_summary: El español es legible y digno, pero hay detalles de naturalidad y precisión mejorables. «Preparen el camino» introduce una opción que en el POB inglés quedó solo como alternativa, mientras que «despejen el camino» refleja mejor el hebreo y la decisión auditada. «Levanten, levanten la calzada» es comprensible, pero menos idiomático que «Alcen, alcen la calzada» o «Construyan...». «Quítenle las piedras» es natural, aunque «quítenle las piedras» requiere referente claro; con «la calzada» inmediatamente antes funciona bien.
  glossary_alignment: No hay conflicto con terminología doctrinal principal del proyecto. Se mantiene correctamente «el pueblo» frente a «los pueblos». Para נֵס, «señal» es posible, pero «estandarte» comunica mejor la función pública/convocante y armoniza con la alternativa documentada en inglés. La revisión conserva el plural «pueblos» y evita añadir «naciones» al texto principal.
  issues:
  - severity: medium
    issue: «preparen el camino» en el texto principal
    rationale: La auditoría inglesa eligió «clear the way» para פַּנּוּ דֶּרֶךְ, dejando «prepare the way» solo como alternativa. En español, «despejen el camino» refleja mejor el sentido principal documentado.
  - severity: medium
    issue: Verbo principal para סֹלּוּ סֹלּוּ
    rationale: «Levanten, levanten la calzada» no suena tan natural ni tan específico en español como una formulación que exprese construir/alzar una vía. «Alcen, alcen la calzada» mantiene la imagen de elevar la vía y es más directo.
  - severity: high
    issue: Desajuste de notas al pie respecto a los anclajes y sentidos
    rationale: La nota [c] del inglés corresponde a «Raise a standard» como alternativa a «banner», pero en el borrador se ancla en «pueblos[c]» en vez de en «señal/estandarte». Además, la nota [a] repite exactamente el texto principal en lugar de ofrecer una alternativa real si se conserva «preparen».
  - severity: low
    issue: «señal» para נֵס puede resultar demasiado genérico
    rationale: Aunque es léxicamente posible, «estandarte» comunica mejor la imagen de una enseña levantada ante los pueblos, y coincide con la alternativa preservada en la auditoría inglesa.
  revised_spanish_text: Pasen, pasen por las puertas; despejen el camino para el pueblo[a]. Alcen, alcen la calzada[b]; quítenle las piedras. Levanten un estandarte[c] sobre los pueblos.
  revised_footnotes:
  - marker: a
    text: 'O: «preparen el camino para el pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'La traducción tradicional suele decir: «Allanen, allanen la calzada».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Levanten una señal sobre los pueblos».'
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea el español con las decisiones léxicas auditadas del POB inglés: פַּנּוּ דֶּרֶךְ se expresa como «despejen el camino» en el texto principal, dejando «preparen» como alternativa; סֹלּוּ סֹלּוּ conserva la imagen de elevar/construir la vía con «Alcen, alcen la calzada»; y נֵס se traduce «estandarte» con «señal» como alternativa. También se corrigen los anclajes de las notas para que correspondan exactamente a las palabras o frases pertinentes.'
