id: 1CLEM.15
reference: 1 Clement 15
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Τοίνυν κολληθῶμεν τοῖς μετ᾽ εὐσεβείας εἰρηνεύουσιν, καὶ μὴ τοῖς μεθ᾽ ὑποκρίσεως βουλομένοις εἰρήνην. 2. λέγει γάρ που· Οὗτος ὁ λαὸς τοῖς χείλεσιν με τιμᾷ, ἡ δὲ καρδία αὐτῶν πόρρω ἀπέστιν ἀπ᾽ ἐμοῦ. 3. καὶ πάλιν· Τῷ στόματι αὐτῶν εὐλογοῦσαν, τῇ δὲ καρδίᾳ αὐτῶν κατηρῶντο. 4. καὶ πάλιν λέγει· Ἠγάπησαν αὐτὸν τῷ στόματι αὐτῶν καὶ τῇ γλώσσῃ αὐτῶν ἐψεύσαντο αὐτόν, ἡ δὲ καρδία αὐτῶν οὐκ εὐθεῖα μετ᾽ αὐτοῦ, οὐδὲ ἐπιστώθησαν ἐν τῇ διαθήκῃ αὐτοῦ. 5. διὰ τοῦτο ἄλαλα γενηθήτω τὰ χείλη τὰ δόλια τὰ λαλοῦντα κατὰ τοῦ δικαίου ἀνομίαν. καὶ πάλιν· Ἐξολεθρευθῆσαν κύριος πάντα τὰ χείλη τὰ δόλια, γλῶσσαν μεγαλοῤῥήμονα, τοὺς εἰπόντας· Τὴν γλῶσσαν ἡμῶν μεγαλυνοῦμεν, τὰ χείλη ἡμῶν παρ᾽ ἡμῖν ἐστιν· τίς ἡμῶν κύριός ἐστιν; 6. ἀπὸ τῆς ταλαιπωρίας τῶν πτωχῶν καὶ τοῦ στεναγμοῦ τῶν πενήτων νῦν ἀναστήσομαι, λέγει κύριος· θήσομαι ἐν σωτηρίῳ. 7. παρρησιάσομαι ἐν αὐτῷ.
  language: Greek
  pages:
  - 281
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: Therefore let us join ourselves to those who live in peace with godliness[a], and not to those who desire peace with hypocrisy. For somewhere it says, “This people honors me with their lips, but their heart is far from me.” And again, “With their mouth they were blessing, but with their heart they were cursing.” And again it says, “They loved him with their mouth, and with their tongue they lied to him; but their heart was not upright with him, nor were they faithful in his covenant.” Because of this, let the deceitful lips that speak lawlessness against the righteous become mute. And again, “May the Lord destroy all deceitful lips, the boastful tongue, those who say, ‘We will make our tongue great; our lips are our own; who is lord over us?’” “‘Because of the misery of the poor and because of the groaning of the needy, now I will arise,’ says the Lord. ‘I will set him in safety[b][c][d][e]; I will speak openly in him.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us cling to those who live at peace with godliness.'
    reason: lexical_alternative
    anchor_ref: '15:1'
  - marker: e
    text: '''Were found faithful'' may also be rendered ''were steadfast'' or ''proved trustworthy.'''
    reason: lexical_alternative
    anchor_ref: '15:4'
  - marker: d
    text: The wording echoes Psalmic imprecations against deceitful and arrogant speech.
    reason: cross_reference
    anchor_ref: '15:5'
  - marker: c
    text: The final clause is difficult. It may also be understood as 'I will act boldly in him' or, less likely, with a different nuance of the prepositional phrase.
    reason: alternative_reading
    anchor_ref: '15:7'
  - marker: b
    text: Or 'make peace with godliness, and not to those who want peace with hypocrisy'.
    reason: previous_rendering
lexical_decisions:
- source_word: κολληθῶμεν
  chosen: let us join ourselves
  alternatives:
  - let us cling
  - let us attach ourselves
  lexicon: BDAG
  rationale: Retains the exhortational force and sense of deliberate attachment or alignment, while reading naturally in English paraenesis.
- source_word: μετ᾽ εὐσεβείας εἰρηνεύουσιν
  chosen: make peace with godliness
  alternatives:
  - live in peace with piety
  - are at peace in a godly way
  lexicon: BDAG
  rationale: Preserves both the peace-making sense of the verb and the moral-religious quality conveyed by εὐσέβεια, avoiding a flatter 'peaceably'.
- source_word: μεθ᾽ ὑποκρίσεως βουλομένοις εἰρήνην
  chosen: those who want peace with hypocrisy
  alternatives:
  - those desiring peace hypocritically
  - those who wish for peace in pretense
  lexicon: BDAG
  rationale: Keeps the contrast with genuine godly peace. 'With hypocrisy' reflects the instrumental/associative force without overexplaining.
- source_word: πόρρω ἀπέστιν
  chosen: is far away
  alternatives:
  - is far off
  - stands far removed
  lexicon: BDAG
  rationale: Simple modern English that preserves the scriptural cadence and relational distance.
- source_word: κατηρῶντο
  chosen: they were cursing
  alternatives:
  - they cursed
  - they were calling down curses
  lexicon: BDAG
  rationale: Imperfect sense is preserved as ongoing or characteristic action, matching the rhetorical contrast with outward blessing.
- source_word: ἐψεύσαντο αὐτόν
  chosen: they lied to him
  alternatives:
  - they dealt falsely with him
  - they were false to him
  lexicon: BDAG
  rationale: Direct and transparent rendering of the verbal idea; the object 'him' is retained explicitly.
- source_word: οὐκ εὐθεῖα
  chosen: was not upright
  alternatives:
  - was not straight
  - was not true
  lexicon: BDAG
  rationale: '''Upright'' best conveys moral straightness in idiomatic English without losing the ethical nuance.'
- source_word: ἐπιστώθησαν
  chosen: were found faithful
  alternatives:
  - were steadfast
  - were trustworthy
  lexicon: BDAG
  rationale: Connects naturally with covenant language and preserves the faithfulness/trustworthiness sense rather than mere intellectual belief.
- source_word: διαθήκῃ
  chosen: covenant
  alternatives:
  - agreement
  - testament
  lexicon: BDAG
  rationale: '''Covenant'' is theologically and scripturally appropriate in this citation context.'
- source_word: ἄλαλα γενηθήτω
  chosen: let ... become mute
  alternatives:
  - let ... be silenced
  - let ... become speechless
  lexicon: BDAG
  rationale: Preserves the imprecatory tone and vividness of the Greek.
- source_word: δόλια
  chosen: deceitful
  alternatives:
  - treacherous
  - 'false'
  lexicon: BDAG
  rationale: Matches the repeated theme of duplicitous speech.
- source_word: ἀνομίαν
  chosen: lawlessness
  alternatives:
  - wickedness
  - injustice
  lexicon: BDAG
  rationale: Keeps the strong biblical sense of conduct opposed to God's order, rather than a generic moral term.
- source_word: μεγαλοῤῥήμονα
  chosen: boastful
  alternatives:
  - great-speaking
  - arrogant
  lexicon: BDAG
  rationale: Idiomatic English for inflated, self-exalting speech; preserves the rhetorical force.
- source_word: Τὴν γλῶσσαν ἡμῶν μεγαλυνοῦμεν
  chosen: We will make our tongue great
  alternatives:
  - We will magnify our tongue
  - We will exalt our speech
  lexicon: BDAG
  rationale: A relatively literal rendering preserves the audacity and poetic texture of the quotation.
- source_word: τίς ἡμῶν κύριός ἐστιν
  chosen: who is lord over us?
  alternatives:
  - who is our master?
  - who is our lord?
  lexicon: BDAG
  rationale: The phrase expresses defiant refusal of authority. 'Lord over us' makes that force explicit in English.
- source_word: ταλαιπωρίας
  chosen: misery
  alternatives:
  - affliction
  - wretchedness
  lexicon: BDAG
  rationale: Conveys severe suffering in accessible English.
- source_word: πενήτων
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: BDAG
  rationale: Differentiates from πτωχῶν while preserving the parallelism of the citation.
- source_word: θήσομαι ἐν σωτηρίῳ
  chosen: I will set him in safety
  alternatives:
  - I will place him in salvation
  - I will appoint him for deliverance
  lexicon: BDAG
  rationale: Best reflects the protective sense in context and reads naturally in English.
- source_word: παρρησιάσομαι ἐν αὐτῷ
  chosen: I will speak openly in him
  alternatives:
  - I will act boldly in him
  - I will deal confidently in him
  lexicon: BDAG
  rationale: The verb carries the sense of open, bold speech. The phrase is difficult; this rendering stays close to the Greek while remaining intelligible.
theological_decisions:
- issue: Rendering of covenantal citation language from the Psalms
  chosen_reading: Preserve the scriptural quotation texture and covenant terminology ('covenant,' 'Lord') rather than smoothing into generic moral discourse.
  alternative_readings:
  - Use less marked terms such as 'agreement' or 'master'
  - Paraphrase the citations into contemporary idiom
  rationale: The chapter's paraenesis depends on the authority and cadence of Israel's Scriptures. Maintaining that texture is central to the ecclesial and theological force of Clement's argument.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; DOCTRINE.md: consistency of key terms, κύριος → Lord, διαθήκη → covenant'
- issue: Sense of ἐπιστώθησαν in 'nor were they found faithful in his covenant'
  chosen_reading: faithful
  alternative_readings:
  - steadfast
  - trustworthy
  rationale: In covenant context, 'faithful' best preserves the relational and theological dimension, not merely reliability in an abstract sense.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; consistency of key terms'
- issue: Difficult final clause παρρησιάσομαι ἐν αὐτῷ
  chosen_reading: I will speak openly in him
  alternative_readings:
  - I will act boldly in him
  - I will speak plainly against him
  rationale: The Greek is terse and somewhat difficult. The chosen rendering stays close to the verbal sense of παρρησιάζομαι ('speak boldly/openly') and avoids overresolving the referent or prepositional nuance.
  doctrine_reference: 'DOCTRINE.md: preserve ambiguity rather than resolve it'
