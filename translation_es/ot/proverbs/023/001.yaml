review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: cláusula situacional (''Cuando''), contexto de comida (''a comer''), compañía de una figura de autoridad, y exhortación intensificada a prestar atención a ''lo que está delante de ti''. Sin embargo, ''gobernante'' puede sonar más político-administrativo que el más amplio y proverbial מוֹשֵׁל, y la nota al pie tiene una puntuación/estilo inicial poco natural en español.'
  spanish_quality_summary: 'El español es claro y legible, con tono digno y natural. La frase principal funciona bien. Conviene ajustar ''gobernante'' a ''ruler''/''muévelo'' español más proverbial como ''mandatario'' o ''príncipe'' o mejor ''el que gobierna''; pero para legibilidad y amplitud, ''un mandatario'' resulta menos ideal que ''un gobernante''. Aun así, la mejor reparación mínima es mantener naturalidad pero pulir a ''un gobernante'' no es error grave. La mejora más clara es la nota: quitar comillas sobrantes y formularla con español editorial natural. También puede preferirse ''está ante ti'' o ''tienes delante'', pero el texto actual es aceptable. Dado que se pidió reparar pequeñas cosas, propongo un ajuste leve hacia una formulación más idiomática y proverbial.'
  glossary_alignment: No hay términos del glosario teológico principal implicados. La elección 'gobernante' no viola el glosario, pero para מוֹשֵׁל en Proverbios puede sonar algo moderno-burocrática; 'mandatario' también introduce matiz político. 'Ruler' se preserva mejor en español con 'gobernante' o 'el que gobierna'; por brevedad y claridad, se puede conservar 'gobernante'.
  issues:
  - severity: low
    issue: Nota al pie con formato poco natural
    rationale: 'La nota comienza con comillas y dos puntos (''O: «...»'') de manera poco idiomática para una nota editorial en español. Debe normalizarse a ''O bien:'' o equivalente.'
  - severity: low
    issue: Posible matiz demasiado moderno en 'gobernante'
    rationale: 'מוֹשֵׁל es amplio: alguien que ejerce autoridad. ''Gobernante'' es aceptable, pero en un proverbio puede sonar administrativo. No obstante, no distorsiona el sentido y no exige rechazo.'
  revised_spanish_text: Cuando te sientes a comer con un gobernante[a], considera bien lo que tienes delante de ti.
  revised_footnotes:
