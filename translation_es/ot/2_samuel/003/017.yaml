translation:
  language: es
  text: 'Ahora Abner había hablado con los ancianos de Israel[a], diciendo: «Tanto ayer como anteayer, ustedes estaban buscando a David para ser rey sobre ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «tanto ayer como anteayer». El hebreo es un modismo temporal que alude al pasado reciente o a un período anterior en curso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/דְבַר ... הָיָה עִם
  english_pob_choice: had spoken with
  chosen_spanish: había hablado con
  alternatives_spanish:
  - estaba en conversación con
  - había tratado con
  lexicon: HALOT
  rationale: La expresión hebrea comunica una acción de comunicación o consulta; en español, «había hablado con» conserva la relación interpersonal de עִם sin sonar artificial.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los mayores de Israel
  lexicon: HALOT
  rationale: En contextos tribales y políticos, זקנים designa a los dirigentes reconocidos. «Ancianos» mantiene ese valor institucional sin reducirlo a una mera referencia a edad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce de forma natural la introducción de discurso directo y conserva el enlace sintáctico hebreo.
- source_word: גַּם תְּמוֹל גַּם שִׁלְשֹׁם
  english_pob_choice: Both yesterday and the day before
  chosen_spanish: Tanto ayer como anteayer
  alternatives_spanish:
  - ayer y anteayer
  - desde hace tiempo
  lexicon: HALOT
  rationale: Se conserva la idiomaticidad temporal del hebreo con una equivalencia cercana y clara en español. «Anteayer» corresponde a שִׁלְשֹׁם, y «tanto... como...» refleja el paralelismo enfático de גַּם... גַּם....
- source_word: הֱיִיתֶם מְבַקְשִׁים
  english_pob_choice: you were seeking
  chosen_spanish: ustedes estaban buscando
  alternatives_spanish:
  - ustedes buscaban
  - ustedes han estado buscando
  lexicon: HALOT
  rationale: El perfecto + participio expresa acción durativa en el pasado. «Estaban buscando» comunica ese aspecto continuo de manera natural en español.
- source_word: אֶת דָּוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: En español se marca el objeto personal con la a personal. El marcador אֶת no se traduce, pero sí se refleja la función sintáctica.
- source_word: לְמֶלֶךְ עֲלֵיכֶם
  english_pob_choice: to be king over you
  chosen_spanish: para que fuera rey sobre ustedes
  alternatives_spanish:
  - como rey sobre ustedes
  - para ser rey sobre ustedes
  lexicon: HALOT
  rationale: La construcción final expresa propósito o designación. «Para que fuera rey sobre ustedes» comunica con precisión el valor resultativo/teleológico de לְמֶלֶךְ y mantiene el sentido de gobierno personal.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del texto inglés POB, que reemplazó una paráfrasis temporal más libre por la forma más literal «both yesterday and the day before». Por eso se optó por «Tanto ayer como anteayer», manteniendo la fuerza idiomática hebrea sin volverla opaca.
  spanish_consistency_notes:
  - Se mantiene «ancianos de Israel» como término de liderazgo tribal, coherente con el uso POB de זקנים.
  - Se conserva «rey sobre ustedes» como fórmula de gobierno, en paralelo con la lectura inglesa auditada.
  - Se evita una traducción mecánica del modismo temporal; la nota aclara la literalidad hebrea sin perder naturalidad española.
  - El pronombre de segunda persona plural se normaliza como «ustedes» en español latinoamericano contemporáneo.
