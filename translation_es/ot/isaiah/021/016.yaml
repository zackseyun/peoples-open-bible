translation:
  language: es
  text: 'Porque así me dijo el Señor: Dentro de un año, como los años de un jornalero, toda la gloria[a] de Kedar llegará a su fin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esplendor/riqueza». El hebreo כְּבוֹד puede denotar gloria, honor, esplendor o abundancia material.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor soberano
  - el Dueño
  lexicon: HALOT
  rationale: El hebreo usa אֲדֹנָי como título divino, no el nombre del pacto YHWH. En español, 'el Señor' conserva el valor titular y el registro natural de la fórmula profética sin reemplazarlo por una forma de nombre propio.
- source_word: בְּעוֹד שָׁנָה
  english_pob_choice: Within a year
  chosen_spanish: Dentro de un año
  alternatives_spanish:
  - En un año todavía
  - En el plazo de un año
  lexicon: HALOT
  rationale: La expresión señala el tiempo que falta hasta el cumplimiento; 'Dentro de un año' mantiene esa proximidad temporal en un español idiomático.
- source_word: כִּשְׁנֵי שָׂכִיר
  english_pob_choice: like the years of a hired worker
  chosen_spanish: como los años de un jornalero
  alternatives_spanish:
  - como los años de un trabajador asalariado
  - como cuenta los años un jornalero
  lexicon: HALOT
  rationale: La comparación conserva la idea de un periodo exacto, contado con cuidado. 'Jornalero' reproduce bien la figura de un trabajador contratado por día o por salario, con fuerza similar a 'hired worker'.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - riqueza
  - honra
  lexicon: HALOT
  rationale: '''Gloria'' corresponde al sentido amplio que el inglés POB preserva, aunque el término también puede abarcar esplendor o abundancia material. Mantiene la tensión semántica sin reducirla demasiado.'
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Cedar
  alternatives_spanish:
  - Qedar
  - Cedar
  lexicon: HALOT
  rationale: Nombre propio de la tribu/región árabe; se translitera al español como 'Cedar', siguiendo la práctica de nombres propios y la forma tradicional en castellano bíblico.
- source_word: וְכָלָה
  english_pob_choice: will come to an end
  chosen_spanish: llegará a su fin
  alternatives_spanish:
  - será consumida
  - acabará
  lexicon: HALOT
  rationale: El verbo expresa consumación o agotamiento; 'llegará a su fin' comunica con naturalidad el término completo del esplendor de Cedar.
theological_decisions:
- issue: Tratamiento del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Dueño
  rationale: El texto hebreo presenta el título divino אֲדֹנָי. La traducción no usa una convención de máscara tipográfica para YHWH, porque aquí no aparece el Tetragrama. 'El Señor' conserva la referencia reverente y el carácter de discurso divino directo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for YHWH'
- issue: Sentido de כְּבוֹד en un contexto de juicio contra Kedar
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - esplendor
  - riqueza
  - honra
  - abundancia
  rationale: 'El POB inglés deja abierta la amplitud semántica con una nota: gloria, honor, esplendor o abundancia material. En español, ''gloria'' preserva la amplitud principal; la nota explica la posibilidad de un matiz de esplendor/riqueza sin cerrar indebidamente el sentido.'
  doctrine_reference: HALOT; nota lexical del POB inglés sobre כְּבוֹד
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y el paquete hebreo; no se detectaron cambios editoriales posteriores relevantes, y la versión española sigue el mismo trazado de decisiones léxicas y teológicas.
  spanish_consistency_notes:
  - Se mantuvo 'el Señor' para אֲדֹנָי, reservado como título y no como sustituto del nombre YHWH.
  - Se transliteró el nombre propio Kedar como 'Cedar' en forma castellana usual, sin traducirlo.
  - Se preservó la ambigüedad de כְּבוֹד con nota, para no perder el posible matiz de riqueza/esplendor.
  - La estructura sigue el tono profético formal del original sin calcos innecesarios.
