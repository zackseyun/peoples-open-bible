review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: los sobrevivientes/remanentes oirán, temerán y no repetirán un mal de este tipo dentro de la comunidad. Sin embargo, «cosa mala como esta» invierte el orden y suena menos natural en español que una formulación que exprese con claridad el valor comparativo de כ: «una cosa mala como esta» o mejor «una cosa mala semejante». Además, la nota [b] introduce una alternativa innecesariamente amplia; el inglés POB no preserva esa nota para לא יספו/לעשות עוד, mientras que sí preserva alternativas para הַנִּשְׁאָרִים, כַּדָּבָר הָרָע הַזֶּה y בְּקִרְבֶּךָ.'
  spanish_quality_summary: 'El texto es claro y bastante legible, pero requiere un ajuste menor de naturalidad y puntuación ortográfica: «oirán» debe llevar tilde («oirán» no; correcto: «oirán»? En español estándar es «oirán» sin tilde? No, el verbo es «oírán» no existe; correcto: «oirán» según RAE no lleva tilde por ser diptongo ortográfico? Mejor evitar duda usando otra forma? No, la forma normativa es «oirán» sin tilde). La frase «cosa mala como esta» suena algo forzada; «una cosa mala como esta» o «algo malo como esto» mejora, pero por fidelidad a דבר conviene mantener «cosa». El resto mantiene tono digno y comprensible.'
  glossary_alignment: No hay términos del glosario mayor en juego. La conservación del singular corporativo en «en medio de ti» está alineada con la decisión auditada. «Temerán» corresponde bien a וְיִרָאוּ. «Los que queden» es aceptable para הַנִּשְׁאָרִים, aunque «los que queden»/«los que hayan quedado» sigue siendo matiz estilístico.
  issues:
  - severity: medium
    issue: «cosa mala como esta» suena poco natural y no refleja del modo más claro el comparativo hebreo.
    rationale: כַּדָּבָר הָרָע הַזֶּה significa literalmente algo como «como esta cosa mala / una cosa mala de este tipo». En español, «hacer cosa mala como esta» queda tosco; «hacer de nuevo una cosa mala como esta» conserva mejor sentido y legibilidad.
  - severity: low
    issue: La nota [b] no corresponde a una nota preservada en el inglés POB y es prescindible.
    rationale: El inglés auditado no incluyó nota para וְלֹא יֹסִפוּ לַעֲשׂוֹת עוֹד; añadirla no es incorrecto, pero no aporta una ambigüedad nueva necesaria en español y recarga el aparato.
  revised_spanish_text: Y los que queden[a] oirán y temerán, y no volverán a hacer una cosa mala como esta[b] en medio de ti[c].
  revised_footnotes:
  - marker: a
    text: O «los restantes» o «los que hayan quedado».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como esta cosa mala», es decir, una acción mala de este tipo.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo en singular, dirigiéndose a Israel como un todo: «en medio de ti».'
    reason: lexical_alternative
  revision_rationale: Se simplifica el aparato de notas para alinearlo con el audit trail inglés y se mejora la naturalidad de la frase comparativa sin perder fidelidad al hebreo. Se conserva el singular corporativo «ti» por la decisión teológica/documental ya establecida.
