review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea general, mantiene correctamente Yahvé para יְהוָה, conserva la distinción ritual entre carne y sangre, y traduce adecuadamente la cláusula final como «y comerás la carne», conforme a la revisión inglesa final. Sin embargo, el verbo inicial וְעָשִׂיתָ con עֹלֹתֶיךָ en contexto sacrificial se expresa de manera más fiel y natural en español como «ofrecerás» que como «harás», ya que «harás tus holocaustos» suena poco idiomático y oscurece el sentido cultual idiomático documentado en el expediente inglés.
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Y harás tus holocaustos» resulta forzado y poco natural para lectores hispanohablantes. «Ofrecerás tus holocaustos» mejora mucho la legibilidad sin apartarse del sentido fuente. El resto del versículo fluye bien en español bíblico moderno.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «carne», «sangre» y «sacrificios». «Holocaustos» es aceptable como término técnico tradicional para עֹלֹתֶיךָ. La principal desalineación está en privilegiar «harás» frente al sentido cultual establecido de וְעָשִׂיתָ; debe ajustarse a «ofrecerás», dejando «harás» como alternativa en nota si se desea preservar la literalidad.
  issues:
  - severity: medium
    issue: «harás tus holocaustos» es poco idiomático en español
    rationale: Aunque וְעָשִׂיתָ literalmente es «harás», con עֹלֹתֶיךָ en contexto sacrificial significa realizar/ofrecer el sacrificio. En español, «hacer holocaustos» suena extraño y menos fiel al uso cultual que «ofrecer holocaustos».
  - severity: low
    issue: La nota al pie prioriza una formulación menos natural que el texto principal debería evitar
    rationale: 'La nota explica correctamente la alternativa «ofrecerás», pero esa forma es precisamente la mejor opción para el texto principal. Conviene invertir la prioridad: texto principal idiomático y nota para la literalidad hebrea «harás».'
  revised_spanish_text: Y ofrecerás tus holocaustos[a], la carne y la sangre, sobre el altar de Yahvé tu Dios; y la sangre de tus sacrificios será derramada sobre el altar de Yahvé tu Dios, y comerás la carne.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «y harás tus holocaustos»; en contexto sacrificial, el verbo también puede expresarse más naturalmente como «ofrecerás».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «harás» por «ofrecerás» para reflejar el sentido idiomático sacrificial de וְעָשִׂיתָ con עֹלֹתֶיךָ y mejorar la naturalidad en español. Se conserva una nota para la literalidad hebrea «harás». No se requieren otros cambios.
