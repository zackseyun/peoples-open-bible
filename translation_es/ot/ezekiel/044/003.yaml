    rationale: El hebreo יֵשֶׁב בּוֹ y el POB inglés 'he may sit in it' señalan de forma más explícita el lugar referido, la puerta/área de la puerta. 'Allí' es entendible, pero pierde algo de precisión procedimental del original.
  revised_spanish_text: En cuanto al príncipe[a], porque él es el príncipe, podrá sentarse en ella para comer pan delante de Yahvé. Entrará por el camino del pórtico de la puerta, y saldrá por el mismo camino.
