translation:
  language: es
  text: Y vi entre los simples; discerní entre los jóvenes a un muchacho carente de juicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «falto de corazón», un modismo que indica falta de juicio o de entendimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: and I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Entonces vi
  lexicon: HALOT
  rationale: El wayyiqtol narra una observación consecutiva en pasado. «Y vi» conserva la secuencia y la sencillez del verbo ראה sin añadir matices no presentes en el hebreo.
- source_word: בַּפְּתָאיִם
  english_pob_choice: among the simple
  chosen_spanish: entre los simples
  alternatives_spanish:
  - entre los ingenuos
  - entre los inexpertos
  lexicon: HALOT
  rationale: פְּתָאיִם designa a los simples o ingenuos, especialmente en el marco sapiencial. «Simples» conserva la categoría bíblica y evita psicologizar el término.
- source_word: אָבִינָה
  english_pob_choice: I discerned
  chosen_spanish: discerní
  alternatives_spanish:
  - percibí
  - entendí
  lexicon: HALOT
  rationale: בין en este contexto tiene valor evaluativo y discernidor, distinto del mero ver. «Discerní» reproduce bien ese paso de observación a evaluación.
- source_word: בַּבָּנִים
  english_pob_choice: among the young men
  chosen_spanish: entre los jóvenes
  alternatives_spanish:
  - entre los muchachos
  - entre los hijos
  lexicon: HALOT
  rationale: Aunque literalmente dice «entre los hijos/los jóvenes varones», en español «entre los jóvenes» comunica con naturalidad el grupo masculino joven al que se refiere el contexto.
- source_word: נַעַר
  english_pob_choice: a youth
  chosen_spanish: un muchacho
  alternatives_spanish:
  - un joven
  - un muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde muchacho hasta joven. Aquí la figura parece tener edad suficiente para estar en la calle, pero todavía en una etapa vulnerable; «muchacho» resulta claro y natural en español.
- source_word: חֲסַר לֵב
  english_pob_choice: lacking sense
  chosen_spanish: carente de juicio
  alternatives_spanish:
  - sin entendimiento
  - falto de juicio
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «falto de corazón», pero en la sabiduría hebrea לֵב alude a la mente, el juicio o el discernimiento moral. «Carente de juicio» expresa el sentido idiomático sin borrar la imagen subyacente.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio sustancial; se mantiene la lectura óptima ya establecida, con ajuste mínimo de estilo en español para fluidez y claridad.
  spanish_consistency_notes:
  - Se preserva «simples» como término sapiencial técnico, en continuidad con la decisión inglesa.
  - Se evita traducir mecánicamente «heart» por «corazón» en el cuerpo del texto, porque el hebreo usa un modismo de juicio/entendimiento; esa tensión queda explicada en nota.
  - «Discerní» distingue adecuadamente la observación evaluativa de «vi».
  - 'El orden y la puntuación respetan la progresión retórica del hebreo: ver, discernir, describir.'
