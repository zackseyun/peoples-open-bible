revisions:
- from: 'Y sucedió[a], al ofrecerse la ofrenda vegetal, que se acercó Elías el profeta y dijo: «Yahvé, Dios de Abraham, de Isaac y de Israel, que hoy se sepa que tú eres Dios en Israel, y que yo soy tu esclavo[b], y que conforme a tu palabra he hecho todas estas cosas».'
  to: 'Y sucedió[a], al ofrecerse la ofrenda vegetal, que se acercó Elías el profeta y dijo: «Yahvé, Dios de Abraham, de Isaac y de Israel, que hoy se sepa que tú eres Dios en Israel, y que yo soy tu siervo, y que por tu palabra[b] he hecho todas estas cosas».'
  rationale: Se cambia «tu esclavo» por «tu siervo» para seguir la decisión contextual auditada para עַבְדֶּךָ y mantener mejor el registro profético en español. Se corrige la nota [b] para que ancle únicamente a «por tu palabra» y preserve las alternativas documentadas para וּבִדְבָרֶךָ. El resto del versículo puede mantenerse.
