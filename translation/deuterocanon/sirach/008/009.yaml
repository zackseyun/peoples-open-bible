translation:
  text: Do not boast over one who is dying[b][a]; remember that all of us are being gathered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'are being gathered in,' a traditional metaphor for death; alternatively, 'all of us will die.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel tradition for Sirach 8:9 differs substantially here and speaks instead about learning from the discourse of elders; the Hebrew Cairo Geniza witness is therefore followed as the primary text for this verse.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְהַלֵּל
  chosen: Do not rejoice
  alternatives:
  - Do not boast
  - Do not exult
  lexicon: HALOT
  rationale: The hitpael of הלל can mean 'boast oneself' or 'exult.' In this context, with עַל גֹּוֵעַ ('over one who is dying'), the sense is not self-praise but gloating/exulting over another's demise. 'Rejoice' gives clear modern English while preserving the prohibition against triumphing over another's death.
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - concerning
  lexicon: HALOT
  rationale: 'With the verb here, עַל naturally marks the object or occasion of the rejoicing/gloating. ''Over'' best captures the adversative nuance in English: rejoicing at another person''s dying.'
- source_word: גֹּוֵעַ
  chosen: one who is dying
  alternatives:
  - the dying man
  - one who is perishing
  - the dead
  lexicon: HALOT
  rationale: The participle from גוע denotes one in the process of expiring rather than someone already dead. 'One who is dying' preserves the participial, ongoing sense better than 'the dead.' The Greek parallel in Swete is substantially different here, so the Hebrew witness governs the translation.
- source_word: זְכֹר
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: HALOT
  rationale: A straightforward imperative. 'Remember' is idiomatic and preserves the moral exhortation.
- source_word: כֻּלָּנוּ
  chosen: all of us
  alternatives:
  - we all
  - all
  lexicon: HALOT
  rationale: The pronominal form is explicit and inclusive. 'All of us' keeps the personal force of the Hebrew.
- source_word: נֶאֱסָפִים
  chosen: are being gathered in
  alternatives:
  - are gathered
  - will be gathered
  - are being taken away
  lexicon: HALOT
  rationale: The niphal participle of אסף often functions as a euphemism for death ('be gathered [to one's people]'). Here, because no destination is stated, a more literal 'are being gathered in' preserves the metaphor and the solemnity without over-specifying. The present participial form also matches the Hebrew better than a simple future.
