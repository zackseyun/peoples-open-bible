review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro inglés: conserva la bienaventuranza, el singular genérico «el hombre», la escucha continua a la Sabiduría, la vigilancia diaria en las puertas y el paralelismo entre puertas/postes/entradas. No obstante, «guardando los postes» en español tiende a sonar como custodiar físicamente los postes más que como mantenerse vigilante junto a ellos, y «postes» sin «de las puertas» queda algo demasiado general para מְזוּזוֹת.'
  spanish_quality_summary: La redacción es clara y digna, pero puede mejorarse para sonar más natural y preciso en español eclesial general. «Velando a mis puertas» funciona, aunque «junto a» o «ante» sería un poco más idiomático; el problema principal es «guardando los postes de mis entradas», que resulta menos natural que «vigilando los postes de mis entradas» o «manteniéndose atento junto a los postes...».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente «el hombre» con nota inclusiva. La decisión sobre מְזוּזוֹת debe afinarse a «postes de mis entradas» o mejor «postes de mis puertas/entradas» con un verbo de vigilancia, para reflejar el hebreo sin ambigüedad excesiva.
  issues:
  - severity: medium
    issue: «guardando los postes» sugiere custodiar físicamente los postes
    rationale: לִשְׁמֹר aquí, en paralelo con לִשְׁקֹד, expresa vigilancia atenta/espera perseverante, no protección de objetos. En español, «guardar los postes» se entiende más naturalmente como proteger o conservar los postes.
  - severity: medium
    issue: «los postes» aislado suena demasiado general para מְזוּזוֹת
    rationale: Aunque léxicamente posible, en español común «postes» no activa de inmediato la imagen de jambas/postes de una puerta. Conviene mantener la concreción arquitectónica con un complemento más claro.
  - severity: low
    issue: «velando a mis puertas» es aceptable pero algo menos idiomático
    rationale: La construcción es comprensible, pero «junto a mis puertas» tras «velando» fluye mejor en español sin alterar el sentido.
  revised_spanish_text: Bienaventurado[a] el hombre que me escucha, velando junto a mis puertas día tras día, vigilando los postes de mis entradas.
  revised_footnotes:
  - marker: a
    text: El hebreo usa un singular masculino con fuerza genérica; se refiere representativamente a cualquier persona que escucha a la Sabiduría.
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y las decisiones principales del borrador, pero se ajusta la segunda mitad para reflejar mejor el valor de vigilancia perseverante en לִשְׁמֹר y para hacer más clara la imagen arquitectónica de מְזוּזוֹת en español. «Vigilando los postes de mis entradas» preserva el paralelismo con «velando» y evita la lectura de custodiar físicamente los postes. «Junto a mis puertas» mejora levemente la naturalidad de la locución.
