translation:
  language: es
  text: Y ahora, no dejen que Ezequías los engañe, ni que los desvíe de esta manera[a], ni le crean; porque ningún dios de ninguna nación o reino ha podido librar a su pueblo de mi mano y de la mano de mis padres[b]. ¡Cuánto menos[c] los librará su Dios de mi mano!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «los incite» o «los seduzca»; aquí se prefirió «los desvíe» para reflejar mejor el movimiento de apartar del camino expresado por el verbo hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de mi mano y de la mano de mis padres»; «mano» funciona aquí como metáfora de poder o control.'
    reason: cultural_note
  - marker: c
    text: O «ciertamente no», reflejando el modismo hebreo de conclusión negativa intensificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La frase introduce una exhortación inmediata y de tono discursivo. «Así que ahora» conserva el valor transicional y la urgencia retórica sin sonar rígido.
- source_word: יַשִּׁיא
  english_pob_choice: deceive
  chosen_spanish: engañe
  alternatives_spanish:
  - desvíe
  - seduzca
  lexicon: HALOT
  rationale: El verbo expresa llevar a otros al error o al engaño. «Engañe» es directo y natural en español; aquí se mantiene la fuerza de acusación del portavoz asirio.
- source_word: יַסִּית
  english_pob_choice: mislead
  chosen_spanish: desvíe
  alternatives_spanish:
  - incite
  - persuada
  lexicon: HALOT
  rationale: En este contexto el matiz es de apartar al pueblo del curso que sigue. «Desvíe» comunica la acción de apartar o torcer la dirección, cercana al sentido de la línea argumental del hebreo y de la revisión inglesa.
- source_word: כָּזֹאת
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: HALOT
  rationale: El demonstrativo alude a la forma concreta del discurso de Ezequías. «De esta manera» preserva el valor deíctico con naturalidad en español.
- source_word: תַּאֲמִינוּ ל/וֹ
  english_pob_choice: believe him
  chosen_spanish: le crean
  alternatives_spanish:
  - crean en él
  - confíen en él
  lexicon: HALOT
  rationale: El problema es aceptar como verdadero lo que él dice. «Le crean» es breve, fiel y adecuado al mandato negativo.
- source_word: לֹא יוּכַל
  english_pob_choice: has been able
  chosen_spanish: ha podido
  alternatives_spanish:
  - puede
  - pudo
  lexicon: HALOT
  rationale: Se conserva el valor de experiencia histórica acumulada que la traducción inglesa destaca con presente perfecto. «Ha podido» suena natural y refleja que ningún dios ha logrado hacerlo hasta ahora.
- source_word: כָּל אֱלֹהַ כָּל גּוֹי וּמַמְלָכָה
  english_pob_choice: no god of any nation or kingdom
  chosen_spanish: ningún dios de ninguna nación o reino
  alternatives_spanish:
  - ningún dios de ningún pueblo o reino
  - ningún dios de ninguna nación y reino
  lexicon: HALOT
  rationale: La construcción universal se conserva con «ningún dios de ninguna nación o reino». «Nación o reino» evita forzar la coordinación hebrea y mantiene el alcance total.
- source_word: לְהַצִּיל
  english_pob_choice: to deliver
  chosen_spanish: librar
  alternatives_spanish:
  - rescatar
  - salvar
  lexicon: HALOT
  rationale: En un contexto militar y de amenaza, «librar» comunica el acto de sacar de poder enemigo. Es cercano a la elección inglesa «deliver» y funciona bien con «de mi mano».
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su pueblo
  lexicon: HALOT
  rationale: Se conserva el sufijo posesivo singular y el sentido colectivo. «Su pueblo» es idiomático y adecuado para el referente de un dios/nación.
- source_word: מִיָּדִי וּמִיַּד אֲבוֹתָי
  english_pob_choice: from my hand and from the hand of my fathers
  chosen_spanish: de mi mano y de la mano de mis padres
  alternatives_spanish:
  - del poder de mi mano y del poder de mis padres
  - de mi poder y del poder de mis padres
  lexicon: HALOT
  rationale: Se mantiene «mano» para conservar la metáfora hebrea de poder/control, como en la auditoría inglesa. «Mis padres» refleja el sentido de antepasados o predecesores reales.
- source_word: אַף כִּי
  english_pob_choice: How much less
  chosen_spanish: ¡Cuánto menos!
  alternatives_spanish:
  - ¡Mucho menos!
  - ¡Con cuánta menos razón!
  lexicon: HALOT
  rationale: Se reproduce el giro idiomático de conclusión intensificada. «¡Cuánto menos!» es la forma más natural y fiel en español para este contraste argumentativo.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - sus dioses
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es plural morfológica, el referente aquí es singular: el Dios de Judá/Israel. «Su Dios» mantiene la singularidad referencial en un español natural.'
- source_word: לֹא יַצִּילוּ
  english_pob_choice: will deliver
  chosen_spanish: los librará
  alternatives_spanish:
  - los salvará
  - los rescatará
  lexicon: HALOT
  rationale: 'La negación y el contexto de amenaza requieren un futuro de resultado: «los librará» expresa la ironía desafiante del discurso y conserva la fuerza del hebreo.'
theological_decisions:
- issue: Referencia de אֱלֹהֵיכֶם
  english_pob_reading: singular 'your God' referring to the God of Judah/Israel
  chosen_spanish_reading: «su Dios» en singular referencial
  alternative_spanish_readings:
  - «vuestro Dios»
  - «sus dioses»
  rationale: Aunque la forma hebrea puede parecer plural, el contexto narrativo y la auditoría inglesa dejan claro que el hablante se refiere al Dios de Judá. Traducirlo como plural sería teológicamente incorrecto y rompería la referencia.
  doctrine_reference: Uso contextual de אֱלֹהִים para el Dios único de Israel; cf. monoteísmo del relato histórico
- issue: Valor del giro אַף כִּי
  english_pob_reading: How much less, intensified negative conclusion
  chosen_spanish_reading: «¡Cuánto menos!» como conclusión desafiante
  alternative_spanish_readings:
  - «¡Mucho menos!»
  - «¡Con cuánta menos razón!»
  rationale: 'La frase funciona como remate argumentativo despectivo: si ningún dios pudo, menos aún el Dios de Judá según la burla del hablante. La traducción conserva la ironía y la intensificación.'
  doctrine_reference: Uso idiomático comparativo/intensivo del hebreo bíblico
- issue: Metáfora de 'mano'
  english_pob_reading: hand meaning power or control
  chosen_spanish_reading: «mano» conservada como metáfora de poder
  alternative_spanish_readings:
  - «poder»
  - «autoridad»
  rationale: La metáfora está explícitamente auditada en inglés y es central para el tono de desafío. Mantener «mano» permite que el lector perciba el hebraísmo y su fuerza idiomática.
  doctrine_reference: Hebraísmo de poder/control en lenguaje de amenaza y liberación
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «persuade you like this» por «mislead you in this way» para acercarse más al hebreo. En español se reflejó esa corrección con «desvíe de esta manera», evitando una traducción más libre como «persuada».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el hebreo dice יהוה; aquí no aparece en el versículo.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se preserva la metáfora hebrea de «mano» en ambas ocurrencias para mantener la carga de poder y dominio.
  - Se usa registro bíblico moderno, claro y reverente, sin arcaísmos innecesarios.
