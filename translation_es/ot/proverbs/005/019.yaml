translation:
  language: es
  text: una cierva amorosa, una cabra montés[a] encantadora; sus pechos te satisfagan en todo tiempo; con su amor estés siempre embriagado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una íbice encantadora». El hebreo יַעֲלָה se refiere a una cabra montés o íbice salvaje.
    reason: lexical_alternative
  - marker: b
    text: O «estés siempre arrebatado por su amor». El verbo puede significar literalmente «desviarse», pero aquí se usa positivamente para ser cautivado por el amor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֶּלֶת אֲהָבִים
  english_pob_choice: a loving doe
  chosen_spanish: una cierva amante
  alternatives_spanish:
  - una cierva de amores
  - una cierva amada
  lexicon: HALOT
  rationale: אַיֶּלֶת designa una cierva; אֲהָבִים aporta la idea de amor/afecto como rasgo caracterizador. «Cierva amante» conserva la imagen animal y el matiz afectivo sin volverlo abstracto.
- source_word: וְיַעֲלַת חֵן
  english_pob_choice: a graceful mountain goat
  chosen_spanish: una cabra montés encantadora
  alternatives_spanish:
  - una cabra montés graciosa
  - una íbice encantadora
  lexicon: HALOT
  rationale: יַעֲלָה se refiere a una cabra montés/íbice; en español «cabra montés» es claro y natural. חֵן expresa gracia/encanto; «encantadora» conserva el efecto poético y relacional mejor que un calco rígido.
- source_word: דַּדֶּיהָ
  english_pob_choice: her breasts
  chosen_spanish: sus pechos
  alternatives_spanish:
  - sus senos
  - su pecho
  lexicon: HALOT
  rationale: El término es concreto y anatómico. «Pechos» es claro, digno y suficientemente explícito para el contexto marital-sexual del proverbio.
- source_word: יְרַוֻּךָ
  english_pob_choice: may ... satisfy you
  chosen_spanish: te satisfagan
  alternatives_spanish:
  - te llenen
  - te sacien
  lexicon: HALOT
  rationale: רוה expresa saciar, saturar, satisfacer abundantemente. «Satisfagan» mantiene la fuerza de plenitud sin exagerar ni suavizar indebidamente.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  lexicon: HALOT
  rationale: La expresión temporal es directa; «en todo tiempo» preserva el tono formal y la continuidad completa del hebreo.
- source_word: בְּאַהֲבָתָהּ
  english_pob_choice: with her love
  chosen_spanish: con su amor
  alternatives_spanish:
  - en su amor
  - por su amor
  lexicon: HALOT
  rationale: La preposición ב admite valor asociativo/instrumental. «Con su amor» es natural en español y mantiene el foco en la relación amorosa de la esposa.
- source_word: תִּשְׁגֶּה
  english_pob_choice: be intoxicated
  chosen_spanish: estés siempre embriagado
  alternatives_spanish:
  - te enloquezcas
  - te deleites en exceso
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «errar/desviarse», aquí el contexto es positivo y de ser arrebatado por el amor. «Embriagado» conserva esa fuerza de ser cautivado/transportado sin convertirlo en mera idea emocional.
- source_word: תָמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: HALOT
  rationale: Adverbio de duración continua. «Siempre» es la equivalencia más natural y directa en español.
theological_decisions:
- issue: Imágenes eróticas dentro de la sabiduría bíblica
  english_pob_reading: Retain the explicit marital-sexual imagery without euphemistic softening.
  chosen_spanish_reading: Mantener la imaginería matrimonial-sexual explícita sin suavizarla con eufemismos.
  alternative_spanish_readings:
  - Emplear términos más velados como «busto» o «afecto»
  - Reducir la concreción anatómica
  rationale: El contexto de Proverbios 5 contrasta la fidelidad con la adulterio y presenta el deleite conyugal como correcto. La traducción debe preservar la concreción del hebreo y no imponer una modestia ajena al pasaje.
  doctrine_reference: Principio de primacía del texto original; equivalencia óptima con claridad contemporánea.
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado: se preserva la imaginería erótica-marital, la metáfora animal y la fuerza positiva de שׁגה, sin suavizaciones no motivadas por el hebreo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se mantiene «cabra montés» como equivalente claro de יַעֲלָה, en línea con la alternativa lexical del audit trail.
  - Se usa registro bíblico moderno y digno, evitando arcaísmos innecesarios.
