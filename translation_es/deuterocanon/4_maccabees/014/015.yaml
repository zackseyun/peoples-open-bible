- from: Y aun entre las aves, algunas, al hacer sus nidos en las casas, protegen a sus polluelos[a].
  to: Y aun entre las aves, algunas, al hacer sus nidos sobre las casas, protegen a sus polluelos[a].
  rationale: Se cambia «en las casas» por «sobre las casas» para reflejar mejor κατὰ τὰς οἰκίας en combinación con ὀροφοποιοῦντα, evitando la falsa impresión de que las aves anidan dentro de las viviendas. Se conserva la nota alternativa sobre «las mansas» porque documenta adecuadamente el valor léxico de ἥμερα.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:52:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: entre las aves, algunas que anidan en relación con las casas protegen a sus crías. Sin embargo, «en las casas» debilita el matiz espacial de κατὰ τὰς οἰκίας + ὀροφοποιοῦντα, que apunta más naturalmente a anidar sobre/en la parte alta de las casas, no dentro de ellas. La nota alternativa preserva bien el valor de ἥμερα como «las mansas».'
  spanish_quality_summary: El español es claro y natural, pero «al hacer sus nidos en las casas» puede sonar impreciso o incluso sugerir interior de la vivienda. Una leve revisión a «sobre las casas» mejora la fidelidad sin perder legibilidad. «Y aun» es aceptable y digno; «polluelos» funciona bien para νεοττῶν.
  glossary_alignment: 'No hay términos teológicos del glosario mayor en juego. Las decisiones léxicas principales están bien encaminadas: πετεινῶν > «aves», προασπίζει > «protegen», νεοττῶν > «polluelos». La excepción necesaria es ajustar κατὰ τὰς οἰκίας a «sobre las casas» para alinearlo mejor con la evidencia griega y la revisión inglesa documentada.'
  issues:
  - severity: medium
    issue: «en las casas» para κατὰ τὰς οἰκίας / ὀροφοποιοῦντα
    rationale: La combinación sugiere nidificación asociada al techo o parte exterior alta de las casas. «En las casas» en español normalmente sugiere interior, lo que desplaza el cuadro descrito por el griego.
  - severity: low
    issue: La nota alternativa mantiene «las mansas», pero el texto principal no refleja en absoluto ese matiz
    rationale: No es un error, porque sigue la decisión auditada del inglés («some»), pero conviene conservar la alternativa tal como ya se hace en nota.
  revised_spanish_text: Y aun entre las aves, algunas, al hacer sus nidos sobre las casas, protegen a sus polluelos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «las mansas, que hacen sus nidos sobre las casas, protegen a sus polluelos».'
    reason: lexical_alternative
  revision_rationale: Se cambia «en las casas» por «sobre las casas» para reflejar mejor κατὰ τὰς οἰκίας en combinación con ὀροφοποιοῦντα, evitando la falsa impresión de que las aves anidan dentro de las viviendas. Se conserva la nota alternativa sobre «las mansas» porque documenta adecuadamente el valor léxico de ἥμερα.
