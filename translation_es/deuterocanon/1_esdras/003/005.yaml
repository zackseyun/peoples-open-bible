translation:
  language: es
  text: Que cada uno de nosotros diga una palabra que prevalezca[a]; y aquel cuya declaración resulte más sabia que la del otro, Darío el rey le dará grandes dones y grandes honores de victoria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «una palabra» sigue de cerca λόγον; también puede entenderse como «una declaración» o «un argumento». Se mantiene la forma más literal por la brevedad del desafío verbal.
    reason: lexical_alternative
  - marker: b
    text: «honores de victoria» intenta reflejar ἐπινίκια, que son honores o premios concedidos por la victoria y no simplemente otro tipo de don.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἴπωμεν
  english_pob_choice: Let ... speak
  chosen_spanish: Que cada uno de nosotros diga
  alternatives_spanish:
  - Que hable cada uno de nosotros
  - Digamos cada uno
  lexicon: LSJ
  rationale: El subjuntivo exhortativo griego se expresa naturalmente en español con «Que...». «Diga» conserva el valor de proponer una acción colectiva distribuida, sin perder la fuerza exhortativa.
- source_word: ἕκαστος ἡμῶν
  english_pob_choice: each of us
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - cada cual de nosotros
  - todos y cada uno de nosotros
  lexicon: LSJ
  rationale: Es la forma más idiomática y clara en español para el valor distributivo de ἕκαστος ἡμῶν.
- source_word: ἕνα λόγον
  english_pob_choice: one word
  chosen_spanish: una palabra
  alternatives_spanish:
  - una declaración
  - una frase
  - un dicho
  lexicon: LSJ
  rationale: «λόγον» puede ser «palabra», «declaración» o «argumento». Aquí, en el marco de un desafío verbal conciso, «una palabra» preserva la literalidad del griego y la brevedad del reto.
- source_word: ὃς ὑπερισχύσει
  english_pob_choice: that will prevail
  chosen_spanish: que prevalezca
  alternatives_spanish:
  - que venza
  - que resulte vencedor
  - que sea más fuerte
  lexicon: LSJ
  rationale: «ὑπερισχύσει» comunica la idea de imponerse o prevalecer. «Prevalezca» mantiene el matiz de competición verbal sin sobreinterpretarlo como combate físico.
- source_word: οὗ ἂν φανῇ
  english_pob_choice: whoever's ... is shown
  chosen_spanish: cualquiera cuya ... resulte
  alternatives_spanish:
  - quienquiera que ... sea mostrado
  - aquel cuya ... aparezca
  lexicon: LSJ
  rationale: La construcción indefinida con ἄν se vierte de modo natural con «cualquiera cuya...». «Resulte» refleja bien el pasivo de φανῇ como una evaluación que llega a hacerse evidente.
- source_word: τὸ ῥῆμα αὐτοῦ
  english_pob_choice: his statement
  chosen_spanish: su declaración
  alternatives_spanish:
  - su palabra
  - su dicho
  - su afirmación
  lexicon: LSJ
  rationale: Después de «una palabra», ῥῆμα aquí se refiere a lo dicho por cada concursante. «Declaración» distingue este término del anterior λόγος y suena natural en español formal.
- source_word: σοφώτερον
  english_pob_choice: wiser
  chosen_spanish: más sabia
  alternatives_spanish:
  - más sabia que
  - más prudente
  - más instruida
  lexicon: LSJ
  rationale: El comparativo de σοφός se traduce de forma directa como «más sabia», manteniendo el criterio de sabiduría del concurso.
- source_word: τοῦ ἑτέρου
  english_pob_choice: than the other's
  chosen_spanish: que la del otro
  alternatives_spanish:
  - que la del otro contendiente
  - que la del otro
  lexicon: LSJ
  rationale: La comparación entre dos participantes queda clara con «que la del otro», una solución breve y idiomática en español.
- source_word: δώσει αὐτῷ
  english_pob_choice: will give him
  chosen_spanish: le dará
  alternatives_spanish:
  - le concederá
  - le entregará
  lexicon: LSJ
  rationale: Verbo futuro simple y dativo indirecto expresados de manera directa y natural.
- source_word: δωρεὰς μεγάλας
  english_pob_choice: great gifts
  chosen_spanish: grandes regalos
  alternatives_spanish:
  - grandes dones
  - magníficos regalos
  lexicon: LSJ
  rationale: «δωρεάς» son obsequios o dones; «regalos» conserva la idea de presentes concretos y resulta claro para el lector moderno.
- source_word: ἐπινίκια μεγάλα
  english_pob_choice: great victory honors
  chosen_spanish: grandes honores de victoria
  alternatives_spanish:
  - grandes premios de victoria
  - grandes honores triunfales
  lexicon: LSJ
  rationale: «ἐπινίκια» designa honores o premios relacionados con la victoria. «Honores de victoria» conserva la distinción con respecto a «regalos» y mantiene el matiz honorífico.
translation_notes:
  revision_awareness: 'El texto griego presenta un reto competitivo de habla: cada participante ha de proponer «una palabra»/«un dicho» que sobresalga. La traducción española conserva la estructura comparativa y la distinción entre «regalos» y «honores de victoria», como en el audit trail inglés. No se adoptó la variante inglesa revisada de «whoever''s» porque el español puede expresar la indefinición con «cualquiera cuya...».'
  spanish_consistency_notes:
  - Se mantiene «Darío el rey» para corresponder al orden del griego Δαρεῖος ὁ βασιλεύς.
  - Se usa «prevalezca» para preservar la fuerza competitiva de ὑπερισχύσει sin volverlo demasiado interpretativo.
  - Se distingue «una palabra» de «su declaración» para reflejar la diferencia entre λόγος y ῥῆμα.
  - «Honores de victoria» conserva el valor honorífico de ἐπινίκια y evita fusionarlo con los regalos.
