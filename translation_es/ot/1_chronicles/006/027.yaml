translation:
  language: es
  text: hijo de Etán[a], hijo de Zimá, hijo de Simei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo genealógico puede omitir generaciones; por eso «hijo de» puede funcionar, en ciertos contextos, con el sentido más amplio de «descendiente de».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica, בֶּן se expresa de manera natural en español como «hijo de». Aunque a veces la fórmula puede abarcar una relación más amplia de descendencia, aquí la forma superficial del hebreo es la secuencia genealógica estándar, por lo que «hijo de» conserva mejor el valor del texto sin sobreinterpretarlo.
- source_word: אֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Etán
  alternatives_spanish:
  - Ethan
  lexicon: Convención onomástica bíblica en español
  rationale: Es nombre propio. «Etán» sigue la transliteración usual en español bíblico y mantiene la recognoscibilidad del personaje.
- source_word: זִמָּה
  english_pob_choice: Zimmah
  chosen_spanish: Zimá
  alternatives_spanish:
  - Zimma
  - Zimmah
  lexicon: Convención onomástica bíblica en español
  rationale: Aquí זִמָּה funciona como nombre propio, no como sustantivo común. «Zimá» reproduce la forma onomástica de manera natural en español y evita sugerir el significado léxico de la raíz en este contexto.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  - Simei
  lexicon: Convención onomástica bíblica en español
  rationale: Nombre propio hebreo en genealogía. «Simei» es una forma clara y plenamente usable en español; se evita una transliteración híbrida innecesaria.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requiere cambios textuales ni de sentido: la cadena genealógica se mantiene breve y directa, sin añadir información que el hebreo no expresa. Se conserva la cautela del inglés respecto a la posible elipsis genealógica mediante una nota.'
  spanish_consistency_notes:
  - Se mantuvo una solución genealógica breve y transparente.
  - Los nombres propios se adaptaron a formas españolas bíblicas reconocibles, sin traducir su sentido léxico.
  - No se introdujo mayúscula inicial en «hijo de» por tratarse de una construcción genealógica corriente en medio de la frase.
