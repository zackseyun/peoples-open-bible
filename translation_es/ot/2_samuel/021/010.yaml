  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca las decisiones del POB inglés: Rizpa toma la tela de duelo, la extiende sobre la roca, permanece allí desde el comienzo de la cosecha hasta que cae agua desde arriba, y ahuyenta aves y animales. Sin embargo, hay dos problemas de fidelidad/formato: (1) la nota [a] está anclada a «sayal», pero el contenido de la nota corresponde a la cláusula «hasta que se derramó agua...», por lo que el marcador está colocado en el lugar equivocado; (2) la nota [b] sobre «la roca» no está justificada por el expediente inglés ni por una ambigüedad española real que requiera nota, ya que el texto principal ya vierte bien el hebreo.'
