revisions:
- from: Y en aquel día se quitará su carga de sobre tu hombro, y su yugo de sobre tu cuello; y el yugo será quebrado por causa de la grasa[a].
  to: Y en aquel día se quitará su carga de tu hombro, y su yugo de tu cuello; y el yugo será quebrado por la gordura[a].
  rationale: Se revisa para mejorar la naturalidad del español y ajustar mejor la imagen léxica del hebreo. 'Por la gordura' conserva la literalidad de שָׁמֶן mejor que 'la grasa' en este contexto y evita introducir 'unción' en el texto principal. También se simplifican las preposiciones para una lectura más natural sin pérdida de sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:30:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: fórmula temporal profética, remoción de la carga/yugo y la cláusula final causal difícil. También preserva correctamente la nota de alternativa para שָׁמֶן. Sin embargo, en español la elección ''la grasa'' suena demasiado material y poco idiomática para el valor abstracto de שָׁמֶן aquí, donde el inglés auditado escogió ''fatness'' como imagen literal de lozanía/engrosamiento, no grasa física en sentido culinario.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'de sobre tu hombro / de sobre tu cuello' resulta algo rígido en español actual, y 'por causa de la grasa' es poco natural y puede desviar el sentido. 'Será roto por la gordura' conserva mejor la imagen literal tradicional y suena más bíblico-natural en español, sin importar la lectura teológica de 'unción'. También conviene simplificar a 'de tu hombro / de tu cuello' para mejor fluidez, siguiendo el ajuste ya hecho en inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Yugo' y 'carga' están bien. La decisión teológica de no poner 'unción' en el texto principal debe mantenerse. La mejor correspondencia española para 'because of fatness' aquí es 'por la gordura' más que 'por causa de la grasa', conservando literalidad e inteligibilidad.
  issues:
  - severity: medium
    issue: '''por causa de la grasa'' no refleja bien el valor de שָׁמֶן en este contexto'
    rationale: Aunque 'grasa' es literal a nivel léxico, en español suena concretamente física y culinaria. El contexto pide una imagen de gordura/engrosamiento o lozanía que rompe el yugo, paralela al inglés 'fatness'.
  - severity: low
    issue: '''de sobre tu hombro'' y ''de sobre tu cuello'' suenan acartonados'
    rationale: El hebreo usa מֵעַל, pero el inglés auditado ya simplificó la preposición por naturalidad. En español, 'de tu hombro' y 'de tu cuello' preservan el sentido sin rigidez innecesaria.
  revised_spanish_text: Y en aquel día se quitará su carga de tu hombro, y su yugo de tu cuello; y el yugo será quebrado por la gordura[a].
  revised_footnotes:
  - marker: a
    text: O «por causa del aceite»; tradicionalmente también se ha traducido «por causa de la unción».
    reason: alternative_reading
  revision_rationale: Se revisa para mejorar la naturalidad del español y ajustar mejor la imagen léxica del hebreo. 'Por la gordura' conserva la literalidad de שָׁמֶן mejor que 'la grasa' en este contexto y evita introducir 'unción' en el texto principal. También se simplifican las preposiciones para una lectura más natural sin pérdida de sentido.
