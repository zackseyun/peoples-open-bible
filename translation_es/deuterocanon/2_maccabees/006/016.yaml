translation:
  language: es
  text: Por eso nunca aparta de nosotros su misericordia; pero, al disciplinar con calamidad, no abandona a su propio pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Entonces
  lexicon: LSJ
  rationale: Conserva la inferencia causal del griego y suena natural en español contemporáneo sin perder el enlace lógico con el contexto anterior.
- source_word: οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún momento
  lexicon: LSJ
  rationale: Equivalente directo y idiomático de la negación temporal absoluta.
- source_word: τὸν ἔλεον
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - la misericordia
  - su compasión
  lexicon: LSJ
  rationale: ἔλεος aquí denota misericordia/compasión divina; el posesivo se sobreentiende por el contexto y el sujeto implícito, por lo que en español puede expresarse naturalmente como 'su misericordia'.
- source_word: ἀφʼ ἡμῶν ἀφίστησιν
  english_pob_choice: withdraws ... from us
  chosen_spanish: aparta ... de nosotros
  alternatives_spanish:
  - retira ... de nosotros
  - se aleja ... de nosotros
  lexicon: LSJ
  rationale: ἀφίστημι con ἀπό expresa apartar o retirar algo de una relación o cercanía. 'Aparta ... de nosotros' mantiene la acción verbal y el matiz relacional sin sonar forzado.
- source_word: παιδεύων
  english_pob_choice: while disciplining
  chosen_spanish: al disciplinar
  alternatives_spanish:
  - mientras disciplina
  - corrigiendo
  - castigando
  lexicon: LSJ
  rationale: En este contexto la idea es corrección formativa mediante sufrimiento, no mera instrucción. 'Al disciplinar' preserva el valor de disciplina/corrección sin suavizar la tensión teológica.
- source_word: μετὰ συμφορᾶς
  english_pob_choice: with calamity
  chosen_spanish: con calamidad
  alternatives_spanish:
  - con desgracia
  - mediante calamidad
  - en medio de la desgracia
  lexicon: LSJ
  rationale: συμφορά significa calamidad, desgracia o desastre. 'Con calamidad' reproduce la severidad del término y la asociación con el acto disciplinario.
- source_word: οὐκ ἐγκαταλείπει
  english_pob_choice: he does not abandon
  chosen_spanish: no abandona
  alternatives_spanish:
  - no desampara
  - no deja
  - no forsiga
  lexicon: LSJ
  rationale: ἐγκαταλείπω expresa abandonar o dejar desamparado. 'No abandona' es claro y fiel al sentido de no desertar a su pueblo.
- source_word: τὸν ἑαυτοῦ λαόν
  english_pob_choice: his own people
  chosen_spanish: a su propio pueblo
  alternatives_spanish:
  - a su pueblo
  - al pueblo que le pertenece
  lexicon: LSJ
  rationale: El reflexivo ἑαυτοῦ añade énfasis posesivo. 'Su propio pueblo' conserva ese énfasis mejor que 'su pueblo'.
theological_decisions:
- issue: Cómo rendir παιδεύων en relación con la acción divina
  english_pob_reading: while disciplining
  chosen_spanish_reading: al disciplinar
  alternative_spanish_readings:
  - mientras disciplina
  - corrigiendo
  - castigando
  rationale: El versículo presenta el sufrimiento como disciplina correctiva, no como abandono. 'Al disciplinar' mantiene esa tensión teológica y evita reducirlo a simple castigo retributivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Si hacer explícito el poseedor implícito en τὸν ἔλεον
  english_pob_reading: his mercy
  chosen_spanish_reading: su misericordia
  alternative_spanish_readings:
  - la misericordia
  rationale: Aunque el griego puede leerse literalmente como 'la misericordia', el contexto identifica a Dios como el poseedor implícito. En español, el posesivo explícito mejora la claridad sin añadir contenido ajeno al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y está alineado con el audit trail inglés; no se detectaron revisiones textuales relevantes en el paquete fuente, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo 'misericordia' para ἔλεος, en coherencia con la terminología POB para la compasión divina.
  - Se evitó 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino; el sujeto se entiende por contexto.
  - '''Pueblo'' conserva el valor colectivo de λαός y ''propio'' refleja el énfasis del reflexivo ἑαυτοῦ.'
