    rationale: El hebreo בְּפִיהֶם es plural («en sus bocas»). El borrador usa singular colectivo «en su boca», pero el audit trail inglés decidió preservar explícitamente la pluralidad y la imagen. En español «en sus bocas» sigue siendo comprensible y más fiel.
  - severity: medium
