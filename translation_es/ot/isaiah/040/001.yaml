translation:
  language: es
  text: Consuelen[a], consuelen a mi pueblo, dice[b] su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Consolad, consolad». El verbo hebreo puede traducirse como «consolar» o «dar consuelo».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «dirá»; aquí se traduce «dice» como introducción habitual del discurso profético en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲמוּ
  english_pob_choice: Comfort
  chosen_spanish: Consolad
  alternatives_spanish:
  - Comfortad
  - Alentad
  lexicon: HALOT
  rationale: El imperativo plural de נחם en este contexto convoca a dar consuelo al pueblo. En español, 'consolar' comunica mejor la acción de aliviar el dolor sin perder el tono directo del mandato.
- source_word: נַחֲמוּ נַחֲמוּ
  english_pob_choice: Comfort, comfort
  chosen_spanish: Consolad, consolad
  alternatives_spanish:
  - Consolad, sí, consolad
  - Consoladlos, consoladlos
  lexicon: HALOT
  rationale: La repetición retórica se conserva para reproducir el énfasis solemne y urgente del hebreo. No se añade objeto explícito porque el del v. siguiente o el contexto lo suple.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: '''Pueblo'' preserva la relación de pertenencia y el matiz de comunidad pactal mejor que ''gente'' o ''nación''. Mantiene el vínculo afectivo y teológico del posesivo.'
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - ha dicho
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfectiva, en el discurso profético funciona como introducción de cita. 'Dice' es natural en español y mantiene el valor formular de introducción de palabra divina.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El hebreo dirige la palabra a un destinatario plural implícito; en español, 'tu' puede funcionar como singular colectivo o literario en una fórmula breve, pero se conserva la referencia relacional a la deidad del pueblo. Como el inglés POB mantuvo 'your God', esta versión evita 'el Señor' y conserva 'Dios'.
theological_decisions:
- issue: Relación de pacto entre Dios y su pueblo
  english_pob_reading: '"Comfort my people... says your God" preserves the restored covenant relationship and divine tenderness.'
  chosen_spanish_reading: '"Consolad... a mi pueblo... dice tu Dios" mantiene la cercanía pactual y la voz directa de Dios.'
  alternative_spanish_readings:
  - '"Consolad, consolad a mi pueblo, dice vuestro Dios"'
  - '"Consolad, consolad a mi pueblo, dice su Dios"'
  rationale: El hebreo contrapone 'mi pueblo' con 'vuestro Dios', subrayando pertenencia mutua y consuelo restaurador. La redacción española conserva esa tensión sin añadir mediadores ni suavizar la autoridad del mandato.
  doctrine_reference: Isaías 40:1; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto hebreo recibido y con el audit trail inglés: se preserva la repetición imperativa, el posesivo de alianza y la fórmula profética introductoria. No se registran revisiones textuales relevantes en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa 'Consolad' para preservar el valor exhortativo plural del hebreo.
  - Se evita 'SEÑOR' porque el hebreo aquí usa אֱלֹהֵיכֶם, no el Tetragrámaton.
