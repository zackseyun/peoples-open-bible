translation:
  language: es
  text: 'Todo es lo mismo[a]; por eso digo: «Él destruye[b] tanto al íntegro como al impío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es una sola cosa». El hebreo expresa que el resultado es el mismo o que no hace diferencia en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «destruye tanto al íntegro como al impío», tomando el sujeto de manera más impersonal.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַת הִיא
  english_pob_choice: It is all one
  chosen_spanish: Es todo uno
  alternatives_spanish:
  - Es una sola cosa
  - Es lo mismo
  lexicon: HALOT
  rationale: La expresión hebrea comunica identidad de resultado o indiferencia práctica, no solo el número ‘uno’. «Es todo uno» conserva el sentido idiomático en un español natural y conciso.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - así que
  - por tanto
  lexicon: HALOT
  rationale: Marca la conclusión inferida del enunciado anterior. «Por eso» es claro, actual y mantiene la relación lógica sin sonar excesivamente formal.
- source_word: אָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - he dicho
  - dije
  lexicon: HALOT
  rationale: Aunque el perfecto hebreo permite valor pasado o perfecto, en contexto introduce la conclusión de Job de forma enunciativa. «Digo» mantiene esa fuerza discursiva; la alternativa pasada queda implícita en la nota.
- source_word: תָּם
  english_pob_choice: the blameless
  chosen_spanish: al íntegro
  alternatives_spanish:
  - al inocente
  - al justo
  - al perfecto
  lexicon: HALOT
  rationale: En Job, תָּם apunta a integridad, completitud moral o rectitud de carácter, no a impecabilidad sin pecado. «Íntegro» comunica bien esa cualidad en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al culpable
  - al perverso
  lexicon: HALOT
  rationale: La pareja con תָּם exige un término moral fuerte y estable. «Impío» es una opción natural en español bíblico y refleja la carga moral del término hebreo.
- source_word: הוּא מְכַלֶּה
  english_pob_choice: He destroys
  chosen_spanish: Él destruye
  alternatives_spanish:
  - lo destruye
  - destruye
  - se lleva a término
  lexicon: HALOT
  rationale: El pronombre masculino singular se entiende mejor como un sujeto personal en el contexto de Job, donde se habla de la acción soberana de Dios. «Destruye» recoge bien la fuerza de כלה en este contexto; la posibilidad impersonal se preserva en la nota.
theological_decisions:
- issue: Sujeto implícito de la acción destructora
  english_pob_reading: The subject is rendered personally as 'He,' referring to God in Job's speech.
  chosen_spanish_reading: 'Se mantiene un sujeto personal: «Él destruye», entendido de Dios en el discurso de Job.'
  alternative_spanish_readings:
  - «destruye»
  - «se destruye»
  - «lo destruye»
  rationale: En Job 9, el hablante reflexiona sobre el obrar de Dios; por eso el sujeto implícito se traduce de manera personal, sin suavizar la queja teológica del pasaje. A la vez, se conserva la tensión del hebreo al notar la lectura impersonal posible.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Valor de תָּם en el paralelismo
  english_pob_reading: the blameless
  chosen_spanish_reading: «al íntegro»
  alternative_spanish_readings:
  - «al inocente»
  - «al justo»
  - «al perfecto»
  rationale: «Íntegro» evita sugerir sin pecado absoluto y conserva el matiz de integridad moral que Job usa con frecuencia. Esto respeta la precisión conceptual del texto sapiencial.
  doctrine_reference: Semántica bíblica de integridad/rectitud
translation_notes:
  revision_awareness: Se revisó el registro más reciente y no se detectaron cambios pendientes; el inglés POB mantiene la lectura óptima y la variante impersonal en nota, y la versión española conserva ambas opciones con una redacción idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el sujeto personal sin introducirlo explícitamente en el versículo, para respetar la economía del hebreo.
  - Se usó «impío» como correlato natural de «íntegro» en registro bíblico español, sin recurrir a una formulación más moderna que debilitara el paralelismo.
  - No se sustituyó «destruye» por un eufemismo, porque el pasaje expresa un juicio fuerte y la ambigüedad del sujeto se conserva en la nota.
