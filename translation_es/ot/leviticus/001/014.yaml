review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, la categoría sacrificial («holocausto»), el nombre divino «Yahvé» y las dos clases de aves permitidas. Sin embargo, «para Yahvé» es menos directo que el valor normal de ל en este contexto de presentación cultual, y «de entre» suena innecesariamente selectivo frente al simple מִן repetido. Además, «tórtolos» es menos natural y menos ampliamente reconocible que «tórtolas» en español bíblico general.
  spanish_quality_summary: 'El texto es claro y digno, pero puede ganar naturalidad y fidelidad con pequeños ajustes: «a Yahvé» en vez de «para Yahvé», y «de las tórtolas o de los pichones de paloma» en vez de «de entre los tórtolos o de entre los pichones». Esto evita un matiz de selección no marcado en hebreo y mejora la inteligibilidad panhispánica.'
  glossary_alignment: Alinea correctamente יהוה como «Yahvé» y עֹלָה como «holocausto». No hay conflicto con la terminología principal del proyecto. La revisión propuesta mantiene esas decisiones y ajusta solo expresiones de mayor naturalidad y precisión contextual.
  issues:
  - severity: medium
    issue: «para Yahvé» debería revisarse a «a Yahvé»
    rationale: לַיהוָה en esta construcción de ofrenda/presentación se expresa más naturalmente en español como destinatario («a Yahvé») que como finalidad («para Yahvé»). Ambas son posibles, pero «a» refleja mejor la sintaxis inmediata del versículo.
  - severity: medium
    issue: «de entre» añade un matiz no necesario
    rationale: El hebreo repite מִן con sentido simple de procedencia/origen de la ofrenda. «De entre» puede sugerir selección dentro de un grupo de manera más marcada que el original. «De las ... o de los ...» basta y suena más natural.
  - severity: low
    issue: «tórtolos» es menos natural que «tórtolas»
    rationale: Aunque puede defenderse lexicalmente, «tórtolas» es la forma más reconocible y ampliamente usada para תֹּרִים en español bíblico contemporáneo. Mejora la legibilidad sin perder precisión.
  - severity: low
    issue: «pichones» solo puede resultar algo abierto en especie
    rationale: El hebreo especifica «hijos de la paloma», es decir, pichones de paloma/paloma joven. Añadir «de paloma» evita una leve ambigüedad en español y conserva el valor idiomático del original.
  revised_spanish_text: Y si su ofrenda a Yahvé es un holocausto de aves, presentará su ofrenda de las tórtolas o de los pichones de paloma.
  revision_rationale: 'La revisión conserva todas las decisiones principales correctas del borrador, pero ajusta preposición, fluidez y naturalidad léxica para reflejar mejor el hebreo y un español bíblico amplio: «a Yahvé» por destinatario cultual, «de las/de los» en vez de «de entre», «tórtolas» por uso más estándar, y «pichones de paloma» para explicitar la especie implícita en בְּנֵי הַיּוֹנָה.'
