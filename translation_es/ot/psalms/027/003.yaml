source:
  edition: WLC
  text: אִם תַּחֲנֶ֬ה עָלַ֨/י מַחֲנֶה֮ לֹֽא יִירָ֪א לִ֫בִּ֥/י אִם תָּק֣וּם עָ֭לַ/י מִלְחָמָ֑ה בְּ֝/זֹ֗את אֲנִ֣י בוֹטֵֽחַ־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/027/003.yaml
  text: Though an army encamps against me[a], my heart will not fear; though war rises against me[c][b], even then I will trust.
  footnotes:
  - marker: a
    text: Or 'If an army camps against me ... if war rises against me.' The Hebrew אִם can be rendered conditionally ('if') or concessively ('though'); here the concessive sense best fits the poetic context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'camp'; by context this refers to an armed encampment, hence 'army.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in this I am confident' or 'despite this I am confident.' The Hebrew may emphasize either trust or confidence in the face of the threat.
    reason: alternative_reading
