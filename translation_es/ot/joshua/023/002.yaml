revisions:
- from: 'Entonces Josué llamó a todo Israel: a sus ancianos[a], a sus cabezas[b], a sus jueces y a sus oficiales; y les dijo: «Yo estoy viejo[c]; he avanzado en años».'
  to: 'Entonces Josué llamó a todo Israel: a sus ancianos[a], a sus jefes[b], a sus jueces y a sus oficiales; y les dijo: «Yo soy viejo; he avanzado en años[c]».'
  rationale: Se revisa «cabezas» a «jefes» para mantener la inteligibilidad natural del español sin perder la literalidad hebrea, que queda preservada en nota. Se cambia «estoy viejo» por «soy viejo» para un registro más digno y estable. Se recoloca la nota del idiomático בָּאתִי בַּיָּמִים sobre la frase correspondiente «he avanzado en años».
  reviewer_model: gpt-5.4
