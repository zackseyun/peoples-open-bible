base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/024.yaml
  text: For I have given to the Levites as an inheritance the tithe of the children of Israel[a], which they offer to Yahweh as a contribution; therefore I have said to them, ‘Among the children of Israel they shall have no inheritance.’
  footnotes:
