translation:
  language: es
  text: para que se multipliquen tus días y los días de tus hijos varones[a] sobre la tierra que Yahvé juró a tus padres darles, como los días de los cielos sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y los días de tus hijos''. El hebreo dice ''tus hijos varones''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''mientras los cielos estén sobre la tierra''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa con naturalidad la finalidad/resultado del contexto, preservando el valor purposivo del hebreo sin volverlo más explicativo de lo que el texto permite.
- source_word: יִרְבּוּ
  english_pob_choice: may be multiplied
  chosen_spanish: se multipliquen
  alternatives_spanish:
  - aumenten
  - sean multiplicados
  lexicon: HALOT
  rationale: El verbo hebreo usa la idea de aumentar o multiplicarse; en español, la forma pronominal mantiene bien la imagen sin sonar rígida.
- source_word: יְמֵיכֶם
  english_pob_choice: your days
  chosen_spanish: tus días
  alternatives_spanish:
  - vuestros días
  - los días de ustedes
  lexicon: HALOT
  rationale: Conserva el sentido idiomático de duración de vida/tiempo. Se usa el singular de trato directo coherente con un discurso comunitario en español neutral, sin alterar el referente posesivo del hebreo.
- source_word: וִימֵי בְנֵיכֶם
  english_pob_choice: and the days of your sons
  chosen_spanish: y los días de tus hijos[a]
  alternatives_spanish:
  - y los días de tus hijos varones
  - y los días de tus hijos
  lexicon: HALOT
  rationale: בנים es literalmente masculino plural, pero en español 'hijos' puede incluir hijos varones con naturalidad y también funcionar representativamente. Se preserva la alternativa amplia en nota por la tensión lexical documentada en el POB inglés.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: En Deuteronomio el término apunta a la tierra prometida. 'Sobre la tierra' refleja היטב עַל y suena natural en español; 'tierra' evita la literalidad torpe de 'suelo'.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  english_pob_choice: that Yahweh swore
  chosen_spanish: que Yahvé juró
  alternatives_spanish:
  - que Yahvé prometió con juramento
  - que Yahvé prometió
  lexicon: HALOT
  rationale: El verbo נשבע lleva con fuerza el lenguaje de juramento de pacto; 'juró' es la forma más directa y auditable en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino, manteniendo el testimonio del texto hebreo en vez de ocultarlo con una sustitución litúrgica.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  - a tus patriarcas
  lexicon: HALOT
  rationale: '''Padres'' puede sonar algo más literal, pero ''padres'' en español moderno puede ser ambiguo; ''padres'' se mantiene aquí con valor de ancestros patriarcales en lenguaje de pacto. La elección conserva la referencia familiar-covenantal sin introducir una paráfrasis amplia.'
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: darles
  alternatives_spanish:
  - dársela
  - dárselas
  lexicon: HALOT
  rationale: El español exige la naturalización del complemento indirecto; 'darles' conserva el objeto implícito del hebreo sin añadirlo, siguiendo la revisión inglesa que eliminó la preposición redundante.
- source_word: כִּימֵי הַשָּׁמַיִם עַל הָאָרֶץ
  english_pob_choice: as the days of the heavens above the earth
  chosen_spanish: como los días de los cielos sobre la tierra[b]
  alternatives_spanish:
  - como los días del cielo sobre la tierra
  - como mientras los cielos estén sobre la tierra
  lexicon: HALOT
  rationale: Se preserva la imagen comparativa del hebreo en vez de reducirla a una paráfrasis temporal. 'Cielos' mantiene el plural formal del hebreo; se ofrece la lectura alternativa temporal en nota, como hizo el POB inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide no enmascararlo con 'SEÑOR'; 'Yahvé' preserva el nombre del pacto de forma transparente y auditable.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בְנֵיכֶם
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tus hijos, es decir, tus descendientes
  rationale: Aunque el hebreo es literalmente masculino plural, en español 'hijos' puede ser suficientemente fiel y natural para un plural familiar representativo. La nota mantiene abierta la alternativa lexical sin borrar la forma masculina del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Similitud final 'como los días de los cielos sobre la tierra'
  english_pob_reading: as the days of the heavens above the earth
  chosen_spanish_reading: como los días de los cielos sobre la tierra
  alternative_spanish_readings:
  - como mientras los cielos estén sobre la tierra
  - como los días que duran los cielos sobre la tierra
  rationale: Se conserva la tensión poética y espacial del hebreo. No se sustituye por una explicación temporal plana, porque el POB inglés también retuvo la imagen.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la preposición redundante en 'darles'. La presente redacción española sigue esa naturalización con 'darles' y mantiene el resto de la relación sintáctica y la imaginería del hebreo sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Tierra'' se usa para הָאֲדָמָה en contexto de pacto y posesión, no ''suelo''.'
  - La comparación final conserva 'cielos' en plural para reflejar la forma hebrea y la lectura auditada del inglés.
  - No se introdujo 'Cristo' ni terminología eclesiástica ajena al versículo.
