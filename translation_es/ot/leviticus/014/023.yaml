translation:
  language: es
  text: Y en el octavo día los traerá para su limpieza ritual[a] al sacerdote, a la entrada de la tienda de reunión, delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para su purificación”. El hebreo se refiere en este contexto al proceso de limpieza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: he shall bring
  chosen_spanish: lo traerá
  alternatives_spanish:
  - lo llevará
  - presentará
  lexicon: HALOT
  rationale: En hebreo legal la forma verbal funciona con fuerza normativa. En español, «lo traerá» conserva el valor directivo/futuro sin sonar rígido; «presentará» sería posible, pero menos concreto.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - estas cosas
  lexicon: HALOT
  rationale: Aunque el antecedente es plural, en español la referencia inmediata al conjunto ritual puede expresarse con singular neutro resumido («lo») sin perder el sentido colectivo; evita una discordancia innecesaria en una frase breve y cultual. «Los» también es viable si se quiere explicitar el plural.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: on the eighth day
  chosen_spanish: al octavo día
  alternatives_spanish:
  - en el octavo día
  - el octavo día
  lexicon: HALOT
  rationale: «Al octavo día» es una forma natural y precisa para el valor temporal del hebreo con ב. Mantiene el carácter de momento prescrito.
- source_word: לְטָהֳרָתוֹ
  english_pob_choice: for his cleansing
  chosen_spanish: para su purificación
  alternatives_spanish:
  - para su limpieza ritual
  - para su limpieza
  lexicon: HALOT
  rationale: El sustantivo señala el proceso ritual de quedar limpio/puroido en contexto cultual. «Purificación» es la equivalencia más fiel y transparente en español; se conserva la tensión entre proceso ritual y resultado sin imponer una lectura doctrinal ajena.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote-sacerdote
  - al sacerdote oficiando
  lexicon: HALOT
  rationale: En español bíblico moderno, «sacerdote» comunica correctamente la función cultual del hebreo כֹּהֵן. Se evita «cura» o fórmulas eclesiásticas posteriores.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la puerta de la tienda de reunión
  - a la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce con claridad אֹהֶל מוֹעֵד y es más natural en español que calcos más arcaizantes. «Entrada» mantiene el valor locativo del contexto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según el criterio POB en español: «Yahvé». «Delante de» conserva la fuerza espacial/ritual de לִפְנֵי mejor que una simple preposición abstracta.'
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política española del proyecto pide «Yahvé» para יְהוָה. Esto preserva el nombre propio del pacto y evita la sustitución por un título. «Yahweh» sería entendible, pero menos natural en español; «el SEÑOR» ocultaría el nombre.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Naturaleza de לְטָהֳרָתוֹ en contexto de impureza ritual
  english_pob_reading: for his cleansing
  chosen_spanish_reading: para su purificación
  alternative_spanish_readings:
  - para su limpieza ritual
  - para quedar limpio
  rationale: El contexto levítico es el de restauración ritual, no el de una purificación moral abstracta. «Purificación» preserva el proceso prescrito y deja abierta la lectura cultual correcta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve cultic sense without importing later doctrinal categories'
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del paquete fuente y con la revisión más reciente: no hay cambios relevantes en la lectura inglesa de base ni en la evaluación de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefiere «tienda de reunión» como equivalente estable de אֹהֶל מוֹעֵד.
  - «Sacerdote» se mantiene para כֹּהֵן, evitando terminología eclesiástica ajena al hebreo.
  - El segmento temporal se traduce de manera idiomática, sin perder el orden prescrito del rito.
