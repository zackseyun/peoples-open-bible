translation:
  language: es
  text: Florecerá abundantemente[a] y se alegrará —sí, con regocijo y gritos de júbilo. La gloria del Líbano le será dada[b], la majestad del Carmelo y Sarón. Ellos verán la gloria de Yahvé[c], la majestad de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «florecerá sin duda»; el hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: Líbano, Carmelo y Sarón son regiones famosas por su belleza natural y fertilidad; la imagen describe al desierto recibiendo su esplendor.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «YHWH», tradicionalmente traducido «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: פָּרֹחַ תִּפְרַח
  english_pob_choice: will blossom abundantly
  chosen_spanish: Florecerá abundantemente
  alternatives_spanish:
  - Florecerá con abundancia
  - Florecerá sin medida
  - Florecerá, sí, florecerá
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. En español, «florecerá abundantemente» comunica bien esa fuerza enfática sin caer en una repetición áspera.
- source_word: וְתָגֵל
  english_pob_choice: and rejoice
  chosen_spanish: y se alegrará
  alternatives_spanish:
  - y se regocijará
  - y exultará
  - y se gozará
  lexicon: HALOT
  rationale: גיל expresa alegría exuberante. «Se alegrará» es natural y digno en español, y conserva el movimiento paralelo con los términos siguientes de júbilo.
- source_word: אַף
  english_pob_choice: 'yes'
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - incluso
  - de hecho
  lexicon: HALOT
  rationale: Aquí funciona como partícula enfática. «Sí» reproduce en español el refuerzo idiomático que la POB inglesa resolvió con «yes».
- source_word: גִּילַת
  english_pob_choice: with rejoicing
  chosen_spanish: con regocijo
  alternatives_spanish:
  - con júbilo
  - con exultación
  - gozosamente
  lexicon: HALOT
  rationale: El sustantivo cognado con גיל refuerza la idea anterior. «Con regocijo» conserva esa repetición enfática y su registro poético.
- source_word: וְרַנֵּן
  english_pob_choice: and a shout of joy
  chosen_spanish: y gritos de júbilo
  alternatives_spanish:
  - y aclamaciones de júbilo
  - y cantos de alegría
  - y clamores de gozo
  lexicon: HALOT
  rationale: רנן puede aludir a gritos jubilantes o canto resonante. «Gritos de júbilo» comunica el carácter audible y celebrativo del paralelo hebreo.
- source_word: כְּבוֹד הַלְּבָנוֹן
  english_pob_choice: The glory of Lebanon
  chosen_spanish: La gloria del Líbano
  alternatives_spanish:
  - El esplendor del Líbano
  lexicon: HALOT
  rationale: «Gloria» mantiene el enlace léxico con la frase posterior «la gloria de Yahvé» y refleja bien el valor de כבוד en este contexto poético.
- source_word: נִתַּן לָהּ
  english_pob_choice: will be given to it
  chosen_spanish: será dada a ella
  alternatives_spanish:
  - le será dada
  - será otorgada a ella
  - le será concedida
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta/pasiva, en la profecía funciona con sentido futuro. «Será dada» respeta ese valor sin forzar un presente histórico.
- source_word: הֲדַר
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - esplendor
  - belleza
  - hermosura
  lexicon: HALOT
  rationale: «Majestad» distingue este término de כבוד («gloria») y conserva el tono elevado del paralelismo, tanto para la tierra como para Dios.
- source_word: הַכַּרְמֶל וְהַשָּׁרוֹן
  english_pob_choice: Carmel and Sharon
  chosen_spanish: el Carmelo y de Sarón
  alternatives_spanish:
  - Carmelo y Sarón
  - el Carmelo y el Sarón
  lexicon: HALOT
  rationale: Son nombres geográficos; en español bíblico se suelen transliterar. Se conserva el artículo con Carmelo y se coordina de forma natural con «de Sarón».
- source_word: הֵמָּה יִרְאוּ
  english_pob_choice: They will see
  chosen_spanish: Ellos verán
  alternatives_spanish:
  - Verán
  - Esos verán
  - Los verán
  lexicon: HALOT
  rationale: El plural explícito se preserva con «ellos». Esto mantiene la gramática hebrea y la transición poética desde la imagen de la tierra hacia sus beneficiarios humanos.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». «Gloria» mantiene el eco con «la gloria del Líbano» y la misma palabra clave del verso.'
- source_word: הֲדַר אֱלֹהֵינוּ
  english_pob_choice: the majesty of our God
  chosen_spanish: la majestad de nuestro Dios
  alternatives_spanish:
  - el esplendor de nuestro Dios
  - la hermosura de nuestro Dios
  lexicon: HALOT
  rationale: «Majestad» conserva la correspondencia con la primera mitad del verso y expresa con claridad la grandeza divina en registro reverente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español pide renderizar יְהוָה como «Yahvé» en el texto principal. Esto preserva el nombre del pacto sin la convención de ocultarlo bajo mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor poético de la serie de verbos y sustantivos de gozo
  english_pob_reading: and rejoice—yes, with rejoicing and a shout of joy
  chosen_spanish_reading: y se alegrará —sí, con regocijo y gritos de júbilo
  alternative_spanish_readings:
  - y exultará —sí, con exultación y aclamaciones
  - y se gozará —sí, con gozo y cantos
  rationale: Se conserva la acumulación hebrea sin nivelarla demasiado. La repetición de alegría, regocijo y júbilo mantiene la intensidad y evita borrar la tensión retórica del original.
  doctrine_reference: 'Poética hebrea: intensificación por paralelismo y cognados'
- issue: Referente de «ellos» en el cierre del verso
  english_pob_reading: They will see
  chosen_spanish_reading: Ellos verán
  alternative_spanish_readings:
  - Estos verán
  - Verán allí
  - Se verá
  rationale: El hebreo usa un pronombre plural explícito y un verbo plural. Mantener «ellos» evita suavizar la gramática y respeta la lectura que deja al verso un sujeto humano implícito.
  doctrine_reference: Sintaxis hebrea del texto masorético
translation_notes:
  revision_awareness: Se siguió el estado más reciente de revisión indicado como sin cambios y con alta coincidencia; no se incorporaron enmiendas posteriores porque el inglés auditado quedó estable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la norma del proyecto en español.
  - Se conservaron los sustantivos poéticos «gloria» y «majestad» para reflejar כבוד y הדר de forma consistente.
  - Se eligió «regocijo / júbilo» para sostener la intensificación y el paralelismo del hebreo.
  - Se preservó el plural explícito «ellos» al final del verso para no borrar la sintaxis del original.
