base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/006.yaml
  text: Will not all of these take up a taunt against him[a], with mockery and riddles about him, and say, “Woe to him who heaps up what is not his—how long?—and loads himself with pledged goods!”
  footnotes:
  - marker: a
    text: Or 'loads himself with thick clay.' The Hebrew term is rare and may carry a wordplay between debt taken in pledge and a heavy mass that burdens the one who gathers it.
    reason: lexical_alternative
