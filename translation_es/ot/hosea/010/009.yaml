translation:
  language: es
  text: Desde los días de Guibeá has pecado, oh, Israel; allí han permanecido[b]. ¿No los alcanzará la guerra contra los hijos de iniquidad en Guibeá[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La guerra contra los hijos de iniquidad en Guibeá no los alcanzó», o: «no los alcanzará». El hebreo de esta cláusula es difícil.'
    reason: alternative_reading
  - marker: b
    text: Guibeá recuerda el ultraje y la guerra civil de Jueces 19–21, que Oseas usa como paradigma de la corrupción arraigada de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: מִימֵי
  english_pob_choice: From the days of
  chosen_spanish: Desde los días de
  alternatives_spanish:
  - A partir de los días de
  - Desde el tiempo de
  lexicon: HALOT
  rationale: La preposición temporal מן con ימים señala un punto de inicio en el tiempo. «Desde los días de» conserva el valor histórico y suena natural en español bíblico moderno.
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gueba
  alternatives_spanish:
  - Gabaa
  - Gibeá
  lexicon: HALOT
  rationale: Se translitera el topónimo hebreo para mantener la referencia histórica a Gueba/Gibeah. «Gueba» refleja mejor la forma hebrea con adaptación española sencilla y legible.
- source_word: חָטָאתָ
  english_pob_choice: you have sinned
  chosen_spanish: has pecado
  alternatives_spanish:
  - has pecado contra Dios
  - has estado pecando
  lexicon: HALOT
  rationale: El perfecto 2ms expresa una acusación directa con relevancia presente. «Has pecado» preserva la fuerza del reproche profético sin añadir paráfrasis.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  - ¡oh, Israel!
  lexicon: HALOT
  rationale: Se mantiene el vocativo profético con «oh Israel», que es claro y solemne en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» reproduce de manera directa la referencia espacial.
- source_word: עָמָדוּ
  english_pob_choice: they have stood
  chosen_spanish: se han mantenido
  alternatives_spanish:
  - han estado en pie
  - han permanecido
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie/estar en pie», en contexto puede expresar persistencia en una misma postura o condición. «Se han mantenido» conserva ese sentido durativo sin perder claridad en español.
- source_word: לֹא תַשִּׂיגֵם
  english_pob_choice: Will not ... overtake them
  chosen_spanish: ¿No los alcanzará?
  alternatives_spanish:
  - ¿No los sobrevendrá?
  - ¿No los atrapará?
  lexicon: HALOT
  rationale: נשׂג en Hiphil suele significar «alcanzar, dar alcance, sobrepasar». La pregunta retórica española mantiene el valor de amenaza/jucio inminente que la POB inglesa marcó con interrogación.
- source_word: בַּגִּבְעָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Gueba
  alternatives_spanish:
  - en Gibeá
  - allí en Gueba
  lexicon: HALOT
  rationale: La preposición ב con topónimo se rinde naturalmente con «en». El lugar sigue siendo el de Gueba/Gibeah; el contexto ya sugiere la referencia histórica.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el combate
  - la batalla
  lexicon: HALOT
  rationale: El sustantivo admite tanto «guerra» como «batalla». «La guerra» es más amplia y mejor para el trasfondo de Jueces 19–21.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Con מלחמה, על marca el objetivo hostil. «Contra» expresa de forma clara la dirección del conflicto.
- source_word: בְּנֵי עַלְוָה
  english_pob_choice: the sons of injustice
  chosen_spanish: los hijos de iniquidad
  alternatives_spanish:
  - los hijos de injusticia
  - los hijos de maldad
  - los malvados
  lexicon: HALOT
  rationale: La expresión constructa conserva el giro idiomático hebreo y su carga moral. «Iniquidad» preserva mejor el tono profético y la resonancia tradicional del término sin neutralizarlo.
theological_decisions:
- issue: Interpretación de la cláusula difícil לֹא תַשִּׂיגֵם בַּגִּבְעָה מִלְחָמָה עַל בְּנֵי עַלְוָה
  english_pob_reading: 'Rendered as a rhetorical question: ''Will not war at Gibeah overtake them, against the children of iniquity?'''
  chosen_spanish_reading: 'Se mantiene como pregunta retórica: «¿No los alcanzará la guerra contra los hijos de iniquidad en Gueba?»'
  alternative_spanish_readings:
  - «La guerra contra los hijos de iniquidad en Gueba no los alcanzó»
  - «La guerra en Gueba contra los hijos de iniquidad no los alcanzará»
  rationale: El hebreo es sintácticamente difícil y admite varias lecturas. La pregunta retórica preserva el tono profético de advertencia y deja intacta la tensión textual, en vez de resolverla de manera más concluyente de lo que permite el hebreo.
  doctrine_reference: Principio POB de conservar la tensión textual y no forzar una resolución interpretativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó עָמָדוּ de 'remained' a 'stood' para mayor cercanía léxica, y reordenó la cláusula final hacia 'war against the sons of injustice overtake them in Gibeah'. La versión española conserva esa cercanía al verbo de postura con 'se han mantenido' y mantiene la ambigüedad interpretativa de la cláusula final mediante una pregunta retórica.
  spanish_consistency_notes:
  - Se usa «Gueba» como forma española breve del topónimo hebreo, manteniendo la identificación con Gibeah de la tradición inglesa.
  - Se conserva «hijos de iniquidad» para reflejar el giro idiomático y la carga moral del hebreo עַלְוָה.
  - La pregunta retórica en español busca reproducir la fuerza profética del inglés auditado sin resolver la sintaxis difícil del hebreo.
  - Se emplea «la guerra» por ser más natural que «combate» y por el trasfondo histórico de Jueces 19–21.
