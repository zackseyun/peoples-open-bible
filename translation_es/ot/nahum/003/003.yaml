translation:
  language: es
  text: Jinetes avanzando, y la espada fulgurante[a] y la lanza centelleante[b], y una multitud de muertos, y montones de cadáveres; y no hay fin para los cuerpos[c] — tropiezan sobre los cuerpos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la llama de la espada», conservando la imagen hebrea vívida de fuego o resplandor.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «el relámpago de la lanza», es decir, el brillo fulgurante del arma.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «sus cuerpos»; el sufijo puede referirse de modo colectivo a los caídos del escenario.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרָשׁ
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - jinete
  lexicon: HALOT
  rationale: El sustantivo hebreo está en singular, pero funciona colectivamente en una escena de batalla. En español, «jinetes» comunica naturalmente el grupo montado sin perder el valor colectivo.
- source_word: מַעֲלֶה
  english_pob_choice: charging
  chosen_spanish: avanzando
  alternatives_spanish:
  - cargando
  - arremetiendo
  lexicon: HALOT
  rationale: El verbo literalmente expresa «subir/venir arriba», y en contexto militar describe el movimiento de ataque. «Avanzando» mantiene la acción en curso con un español claro; «arremetiendo» sería más intenso pero menos neutro.
- source_word: לַהַב חֶרֶב
  english_pob_choice: the flashing sword
  chosen_spanish: la espada fulgurante
  alternatives_spanish:
  - la llama de la espada
  - la hoja relampagueante
  lexicon: HALOT
  rationale: לַהַב evoca llama/brillo. «Fulgurante» preserva el brillo vívido de la imagen sin convertirla en una paráfrasis excesiva.
- source_word: בְּרַק חֲנִית
  english_pob_choice: the gleaming spear
  chosen_spanish: la lanza centelleante
  alternatives_spanish:
  - la lanza relampagueante
  - la lanza brillante
  lexicon: HALOT
  rationale: בְּרַק sugiere resplandor o relámpago. «Centelleante» conserva la fuerza visual y resulta natural en español.
- source_word: רֹב חָלָל
  english_pob_choice: a multitude of slain
  chosen_spanish: una multitud de muertos
  alternatives_spanish:
  - muchos muertos
  - una multitud de cadáveres
  lexicon: HALOT
  rationale: חָלָל aquí se refiere a los caídos en batalla. «Muertos» es suficientemente directo; «cadáveres» aparece más adelante para evitar redundancia y para respetar el aumento de concreción en la secuencia.
- source_word: כֹבֶד פָּגֶר
  english_pob_choice: heaps of corpses
  chosen_spanish: montones de cadáveres
  alternatives_spanish:
  - una masa de cadáveres
  - un peso de cuerpos muertos
  lexicon: HALOT
  rationale: כֹבֶד aporta la idea de peso o gran masa. «Montones de cadáveres» transmite la acumulación abundante de forma idiomática en español.
- source_word: אֵין קֵצֶה לַגְּוִיָּה
  english_pob_choice: there is no end to the bodies
  chosen_spanish: no hay fin para los cuerpos
  alternatives_spanish:
  - no hay fin para los cadáveres
  - no se acaba la cantidad de cuerpos
  lexicon: HALOT
  rationale: La cláusula enfatiza la interminable cantidad de cuerpos. «Cuerpos» sigue el ajuste de la revisión inglesa y evita repetir «cadáveres» en exceso, sin ocultar el sentido mortuorio del hebreo.
- source_word: יכשלו
  english_pob_choice: they stumble
  chosen_spanish: tropiezan
  alternatives_spanish:
  - se tambalean
  - caen
  lexicon: HALOT
  rationale: El nifal de כשל expresa tropezar o ser hecho tropezar. «Tropiezan» es directo, claro y conserva la imagen física.
- source_word: בִּגְוִיָּתָם
  english_pob_choice: over the bodies
  chosen_spanish: sobre los cuerpos
  alternatives_spanish:
  - sobre los cadáveres
  - sobre sus cuerpos
  lexicon: HALOT
  rationale: El sufijo de 3mp puede referir de manera colectiva a los caídos. «Sobre los cuerpos» conserva la referencia general y sigue la corrección auditada en inglés hacia una forma menos posesiva y más lexical.
translation_notes:
  revision_awareness: La redacción sigue el contexto auditado en inglés, incluyendo la revisión final que prefirió «the bodies» en lugar de «their bodies» para el cierre. Por eso el español usa «los cuerpos» y evita un posesivo no explicitado por el hebreo. También mantiene la secuencia imagística de armas brillantes y la acumulación de muertos sin suavizarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» sólo cuando el texto lo requiriera; este versículo no lo contiene.
  - Se prefirió «jinetes» en plural colectivo para reflejar el singular hebreo con valor grupal.
  - 'Se mantuvo una cadena de imágenes concretas: arma brillante, multitud de muertos, montones de cadáveres, cuerpos, tropiezan sobre los cuerpos.'
  - No se introdujo terminología eclesiástica ajena al contexto bélico del hebreo.
