translation:
  language: es
  text: 'Entonces Israel dijo a José: «He aquí, estoy a punto de morir, pero Dios estará con ustedes[a] y los hará volver a la tierra de sus padres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa pronombres plurales en «con ustedes» y «los hará volver», de modo que la promesa no se limita a José individualmente, sino que incluye a su familia o descendencia.
    reason: lexical_alternative
  - marker: b
    text: «La tierra de sus padres» sigue de cerca el hebreo y conserva el eco de la tierra ancestral prometida a los patriarcas; también puede entenderse como «la tierra de sus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» conserva la secuencia de forma natural en español sin perder el valor narrativo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre del pacto «Israel», por lo que se preserva esa forma en lugar de armonizarla con «Jacob».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: «הִנֵּה» introduce atención enfática; «he aquí» mantiene bien esa fuerza deíctica con un registro digno y bíblico en español.
- source_word: אָנֹכִי מֵת
  english_pob_choice: I am about to die
  chosen_spanish: estoy a punto de morir
  alternatives_spanish:
  - voy a morir
  - estoy muriendo
  lexicon: HALOT
  rationale: La expresión apunta a una muerte inminente, no a una acción en curso ni a un estado ya consumado; «estoy a punto de morir» expresa esa cercanía con claridad.
- source_word: וְהָיָה אֱלֹהִים עִמָּכֶם
  english_pob_choice: but God will be with you
  chosen_spanish: pero Dios estará con ustedes
  alternatives_spanish:
  - y Dios estará con ustedes
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el contexto contrasta la muerte inminente de Jacob con la permanencia de Dios; en español, «pero» comunica mejor ese contraste sin añadir contenido ajeno al hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aquí el referente es el Dios único de Israel; «Dios» es la correspondencia natural y suficiente.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - contigo
  lexicon: HALOT
  rationale: El sufijo es plural, así que conviene conservar el alcance plural del pronombre en español; «ustedes» evita reducir la promesa a José individualmente.
- source_word: וְהֵשִׁיב אֶתְכֶם
  english_pob_choice: will bring you back
  chosen_spanish: los hará volver
  alternatives_spanish:
  - los devolverá
  - los hará regresar
  lexicon: HALOT
  rationale: 'El hifil de שוב tiene valor causativo: Dios hará que vuelvan. «Los hará volver» expresa bien esa causalidad en español y suena natural.'
- source_word: אֶל אֶרֶץ אֲבֹתֵיכֶם
  english_pob_choice: to the land of your fathers
  chosen_spanish: a la tierra de sus padres
  alternatives_spanish:
  - a la tierra de sus antepasados
  - a la tierra de sus padres y madres
  lexicon: HALOT
  rationale: «אֶרֶץ אֲבֹתֵיכֶם» alude a la tierra ancestral prometida; «sus padres» sigue de cerca la estructura hebrea y mantiene el eco patriarcal del texto.
theological_decisions:
- issue: Alcance plural de la promesa
  english_pob_reading: Retain the plural 'you' and translate the promise as extending beyond Joseph to his descendants/household.
  chosen_spanish_reading: Conservar el plural en «ustedes» y «los» para que la promesa abarque más que José solo, incluyendo a su casa o descendencia.
  alternative_spanish_readings:
  - Tratar el plural como un singular idiomático y usar «te»/«lo»
  - Hacer explícita la referencia a «José y su familia»
  rationale: El hebreo usa formas plurales en los complementos de «con ustedes» y «los hará volver». Mantener el plural respeta el texto y deja visible el horizonte familiar y covenantal de la promesa.
  doctrine_reference: Génesis 48:21; plural morfológico del hebreo; principios de fidelidad textual
- issue: Fuerza discursiva de la conjunción antes de «Dios estará con ustedes»
  english_pob_reading: Render as adversative 'but' in English.
  chosen_spanish_reading: Usar «pero» para reflejar el contraste entre la muerte de Jacob y la permanencia de Dios.
  alternative_spanish_readings:
  - Usar «y» como mera coordinación
  - Usar «sin embargo»
  rationale: 'Aunque la conjunción hebrea es simplemente coordinante, el contexto introduce una oposición natural: Jacob muere, pero Dios sigue con ellos. «Pero» comunica esa tensión de manera clara y fiel.'
  doctrine_reference: Filología bíblica; discurso narrativo del hebreo
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se adoptó un registro más formal para la fórmula de atención («He aquí») y una expresión de inminencia para la muerte («estoy a punto de morir»), manteniendo el contraste con la permanencia de Dios y el retorno a la tierra ancestral. Se evitó traducir mecánicamente la conjunción hebrea como mera «y» cuando el contexto pide contraste.'
  spanish_consistency_notes:
  - Se preserva «Israel» como nombre del pacto, no «Jacob».
  - Se mantiene el plural de segunda persona con «ustedes», acorde al hebreo.
  - Se usa «Dios» sin sustitución por una perífrasis tradicional que ocultaría el referente inmediato.
  - «He aquí» conserva el valor deíctico de הִנֵּה con registro bíblico sobrio.
