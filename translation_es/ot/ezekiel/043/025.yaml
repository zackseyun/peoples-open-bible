  - severity: medium
    issue: La nota [a] trata un asunto distinto del audit trail inglés y no documenta la alternativa relevante.
    rationale: El POB inglés usa una nota léxica para «a bull, a son of the herd», no para explicar עשה como «offer». Esa explicación ya queda bien cubierta en las decisiones léxicas internas; la nota pública debería servir a una ambigüedad o literalidad relevante para el lector.
  - severity: medium
