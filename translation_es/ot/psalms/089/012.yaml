revisions:
- from: Los cielos te pertenecen; la tierra también te pertenece[a]. El mundo y su plenitud[b]—tú los fundaste.
  to: Los cielos son tuyos; la tierra también es tuya. El mundo y su plenitud[a]—tú los fundaste.
  rationale: Se reemplaza «te pertenecen / te pertenece» por «son tuyos / es tuya» para reflejar con mayor naturalidad y fuerza poética la cláusula posesiva hebrea לְךָ, manteniendo el paralelismo del verso. Se conserva «su plenitud» por fidelidad al audit trail inglés y al valor nominal de מְלֹאָהּ, con nota aclaratoria para la lectura explicativa. No se requiere adjudicación adicional.
