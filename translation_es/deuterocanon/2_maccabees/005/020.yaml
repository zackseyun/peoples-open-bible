translation:
  language: es
  text: Por tanto, incluso el lugar mismo[a], después de participar en las desgracias de la nación, más tarde también participó en sus beneficios; y aunque había sido alcanzado por la ira del Todopoderoso, de nuevo fue restaurado con toda gloria en la reconciliación del gran Soberano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidades» para «desgracias»; el término griego denota adversidades graves sufridas junto con la nación.
    reason: lexical_alternative
  - marker: b
    text: O «el gran Señor» o «el gran Maestro» para «el gran Soberano»; δεσπότης enfatiza autoridad absoluta y se distingue de κύριος.
    reason: lexical_alternative
lexical_decisions:
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa la conclusión inferida del contexto previo con tono natural y digno en español.
- source_word: ὁ τόπος
  english_pob_choice: the place itself
  chosen_spanish: el mismo lugar
  alternatives_spanish:
  - el lugar mismo
  - el lugar
  lexicon: LSJ
  rationale: Conserva el énfasis del griego en el sitio concreto sin introducir una identificación más específica que el texto no explicita aquí.
- source_word: συμμετασχὼν
  english_pob_choice: after sharing in
  chosen_spanish: después de participar en
  alternatives_spanish:
  - habiendo participado en
  - tras compartir en
  lexicon: LSJ
  rationale: Mantiene la idea de participación conjunta y funciona con fluidez en español con el participio aoristo.
- source_word: τοῦ ἔθνους
  english_pob_choice: the nation's
  chosen_spanish: de la nación
  alternatives_spanish:
  - del pueblo
  - de la nación del pueblo
  lexicon: LSJ
  rationale: ἔθνος conserva aquí el sentido colectivo nacional; 'nación' evita diluir la referencia corporativa.
- source_word: δυσπετημάτων
  english_pob_choice: misfortunes
  chosen_spanish: desgracias
  alternatives_spanish:
  - calamidades
  - desventuras
  - males
  lexicon: LSJ
  rationale: El término indica adversidades graves; 'desgracias' preserva el contraste con los beneficios posteriores y suena natural en español bíblico moderno.
- source_word: ἐκοινώνησεν
  english_pob_choice: later also shared in its benefits
  chosen_spanish: más tarde también participó en sus beneficios
  alternatives_spanish:
  - más tarde también compartió sus beneficios
  - después también tuvo parte en sus beneficios
  lexicon: LSJ
  rationale: Reproduce el verbo de participación y mantiene el paralelismo con συμμετασχὼν, evitando un giro más interpretativo.
- source_word: καταληφθεὶς
  english_pob_choice: had been overtaken
  chosen_spanish: había sido alcanzado
  alternatives_spanish:
  - había sido tomado
  - había sido sorprendido
  lexicon: LSJ
  rationale: En español, 'alcanzado' puede expresar quedar bajo el alcance de una fuerza abstracta como la ira, sin perder el matiz de ser sobrevenido por ella.
- source_word: παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: LSJ
  rationale: '''Todopoderoso'' es el equivalente bíblico más claro y natural para παντοκράτωρ en español.'
- source_word: ὀργῇ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  lexicon: LSJ
  rationale: '''Ira'' conserva el registro solemne de juicio divino sin suavizar el término.'
- source_word: καταλλαγῇ
  english_pob_choice: reconciliation
  chosen_spanish: reconciliación
  alternatives_spanish:
  - restablecimiento del favor
  - apaciguamiento
  lexicon: LSJ
  rationale: La palabra española estándar transmite bien el cambio de enemistad a favor que sugiere el griego.
- source_word: μεγάλου δεσπότου
  english_pob_choice: the great Master
  chosen_spanish: el gran Dueño
  alternatives_spanish:
  - el gran Señor
  - el gran Soberano
  lexicon: LSJ
  rationale: '''Dueño'' mantiene la fuerza de δεσπότης como autoridad absoluta y propiedad, distinguiéndolo de κύριος; ''gran'' reproduce el adjetivo sin inflarlo.'
- source_word: ἐπανωρθώθη
  english_pob_choice: it was restored again
  chosen_spanish: fue restaurado
  alternatives_spanish:
  - fue restablecido
  - fue reparado de nuevo
  lexicon: LSJ
  rationale: '''Restaurado'' comunica la idea de ser devuelto a su condición anterior; el ''de nuevo'' queda absorbido por ''más tarde'' y ''de nuevo'' en la cláusula.'
- source_word: μετὰ πάσης δόξης
  english_pob_choice: with all glory
  chosen_spanish: con toda gloria
  alternatives_spanish:
  - con pleno esplendor
  - en toda gloria
  lexicon: LSJ
  rationale: Preserva la plenitud de πάσης y el matiz de honor/esplendor de δόξα en una formulación natural.
theological_decisions:
- issue: Distinguir los dos títulos divinos del final del versículo
  english_pob_reading: the Almighty ... the great Master
  chosen_spanish_reading: el Todopoderoso ... el gran Dueño
  alternative_spanish_readings:
  - el Todopoderoso ... el gran Señor
  - el Omnipotente ... el gran Soberano
  rationale: El griego usa παντοκράτωρ y δεσπότης, dos títulos distintos. Mantenerlos distintos en español evita aplanar la tensión entre la ira divina y la reconciliación divina y conserva la textura del original.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto griego y el audit trail inglés coinciden ampliamente, con observación menor sobre el matiz de los títulos divinos. Se ha preservado esa distinción en español.'
  spanish_consistency_notes:
  - Se mantuvo 'Todopoderoso' para παντοκράτωρ y 'Dueño' para δεσπότης, evitando uniformarlos como 'Señor'.
  - '''Participó'' se repite para reflejar el paralelismo entre συμμετασχὼν y ἐκοινώνησεν.'
  - '''Ira'' y ''reconciliación'' conservan el contraste teológico del pasaje.'
  - Se eligió 'desgracias' por naturalidad bíblica moderna, con nota alternativa a 'calamidades'.
