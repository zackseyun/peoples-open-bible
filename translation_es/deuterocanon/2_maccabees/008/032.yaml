  text: Pero mataron al comandante de los que estaban con Timoteo, un hombre totalmente vil, que había causado a los judíos mucha aflicción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φυλάρχην
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - jefe
  - caudillo
  - capitán
  lexicon: LSJ
  rationale: En este contexto militar, «comandante» comunica bien una autoridad subordinada sin sugerir la estructura tribal que el término puede tener en otros contextos.
- source_word: τῶν περὶ Τιμόθεον
  english_pob_choice: of those with Timothy
  chosen_spanish: de los que estaban con Timoteo
  alternatives_spanish:
  - de la gente de Timoteo
  - de los hombres de Timoteo
  - del grupo de Timoteo
  lexicon: LSJ
  rationale: La frase griega expresa pertenencia o asociación al grupo de Timoteo; «los que estaban con Timoteo» mantiene esa relación de manera natural en español.
- source_word: ἀνεῖλον
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - sacrificaron
  - slew
  lexicon: LSJ
  rationale: El aoristo de ἀναιρέω aquí indica muerte violenta; «mataron» es directo, claro y fiel al valor narrativo.
- source_word: ἀνυπόστατον
  english_pob_choice: utterly vile
  chosen_spanish: totalmente vil
  alternatives_spanish:
  - completamente despreciable
  - enteramente vil
  - absolutamente indigno
  lexicon: LSJ
  rationale: El adjetivo expresa bajeza moral fuerte. «Totalmente vil» conserva el juicio intensamente negativo sin suavizarlo ni moralizarlo de más.
- source_word: πολλὰ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - muchísimo
  - grandemente
  lexicon: LSJ
  rationale: Con ἐπιλελυπηκότα funciona de modo intensivo/adverbial; «mucho» reproduce bien esa intensificación en español.
- source_word: ἐπιλελυπηκότα
  english_pob_choice: had caused the Jews much distress
  chosen_spanish: había causado a los judíos mucho dolor
  alternatives_spanish:
  - había causado a los judíos mucha aflicción
  - había afligido mucho a los judíos
  - les había provocado mucho pesar
  lexicon: LSJ
  rationale: El participio perfecto comunica una acción pasada con efecto persistente. «Había causado ... mucho dolor» recoge el sentido de aflicción/sufrimiento sin forzar una paráfrasis excesiva.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que ajustó la relación sintáctica de la frase genitiva y reforzó el tono moral de ἀνυπόστατον. Aquí se refleja con una construcción natural en español y con un adjetivo de fuerte desaprobación moral.
  spanish_consistency_notes:
  - Se usa «judíos» en minúscula como gentilicio normal en español, siguiendo el referente étnico-histórico del pasaje.
  - Se mantiene el nombre propio «Timoteo» de forma estable y sin helenización.
  - No se introduce «Mesías», «SEÑOR» ni otros equivalentes teológicos no presentes en el versículo.
