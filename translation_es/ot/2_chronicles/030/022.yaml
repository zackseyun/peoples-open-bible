    reason: lexical_alternative
  - marker: b
    text: O «que tenían buena comprensión para Yahvé» o «que eran hábiles en lo relacionado con Yahvé».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sacrificios de paz»; también puede entenderse como «ofrendas de comunión» u «ofrendas de bienestar».'
    reason: lexical_alternative
  - marker: d
    text: El verbo también puede significar «confesando» o «alabando»; aquí probablemente expresa dar gracias en adoración.
    reason: lexical_alternative
  revision_rationale: Se cambió 'habló al corazón' por 'animó' para reflejar el sentido idiomático principal del hebreo y alinearse con la auditoría inglesa, dejando la literalidad en nota. Se añadió una nota para el matiz de 'en el servicio de Yahvé', porque el borrador había omitido ese matiz al usar solo 'para Yahvé'. También se reorganizó la frase temporal para que el español sea natural y fiel, y se suavizó la redundancia de 'sacrificando sacrificios' con 'ofreciendo sacrificios'.
