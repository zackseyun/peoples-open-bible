translation:
  language: es
  text: 'Y Hadad oyó en Egipto que David había yacido con sus padres[a] y que Joab, el comandante del ejército, había muerto[b]. Entonces Hadad dijo a Faraón: «Déjame partir, para que vaya a mi propia tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «había yacido con sus padres», un modismo acostumbrado para la muerte.'
    reason: lexical_alternative
  - marker: b
    text: O «estaba muerto» en lugar de «había muerto».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El hebreo שָׁמַע puede significar 'oír' y, en este contexto narrativo, recibir noticias. 'Oyó' conserva esa sencillez sin añadir una explicación no exigida por el texto.
- source_word: שָׁכַב ... עִם אֲבֹתָיו
  english_pob_choice: had lain down with his fathers
  chosen_spanish: había yacido con sus padres
  alternatives_spanish:
  - había dormido con sus padres
  - había muerto
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo funerario para la muerte. 'Había yacido con sus padres' preserva la imagen y la fórmula real de manera más cercana que reducirla a 'había muerto'.
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - murió
  lexicon: HALOT
  rationale: En español, dentro de la coordinación de noticias, 'había muerto' expresa naturalmente el estado resultante sin perder el valor verbal del hebreo. 'Estaba muerto' es posible, pero aquí suena menos narrativo.
- source_word: שַׂר הַצָּבָא
  english_pob_choice: the commander of the army
  chosen_spanish: el comandante del ejército
  alternatives_spanish:
  - el capitán del ejército
  - el jefe del ejército
  lexicon: HALOT
  rationale: שַׂר designa un jefe o comandante. 'Comandante del ejército' es claro en español moderno y mantiene el cargo militar sin arcaísmo.
- source_word: שַׁלְּחֵנִי
  english_pob_choice: Send me away
  chosen_spanish: Despídeme
  alternatives_spanish:
  - Déjame ir
  - Envíame lejos
  lexicon: HALOT
  rationale: En este contexto, la petición a Faraón es que lo deje salir de su corte. 'Despídeme' comunica la idea de liberar o dejar partir con buena naturalidad en español; el matiz de 'enviar' queda implícito en el contexto.
- source_word: וְאֵלֵךְ
  english_pob_choice: so that I may go
  chosen_spanish: para que yo vaya
  alternatives_spanish:
  - y vaya
  - a fin de que vaya
  lexicon: HALOT
  rationale: La cohortativa expresa finalidad o resultado deseado. 'Para que yo vaya' reproduce ese valor sin forzar una paráfrasis.
- source_word: אַרְצִי
  english_pob_choice: my own land
  chosen_spanish: mi propia tierra
  alternatives_spanish:
  - mi tierra
  - mi país
  lexicon: HALOT
  rationale: אֶרֶץ es 'tierra' o 'territorio'. 'Mi propia tierra' recoge el posesivo y la idea de pertenencia/hogar, más cercana al énfasis del texto que 'mi país'.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura inglesa auditada. Se mantuvo el modismo funerario de שָׁכַב עִם אֲבֹתָיו y se reflejó el valor resultativo de מֵת sin convertirlo en una simple repetición de 'murió'. No se reportan revisiones aplicadas en el archivo fuente.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'Faraón' por tratarse del nombre/título propio egipcio en el relato.
  - Se prefirió 'despídeme' para la petición, evitando 'déjame ir' por sonar menos cercano al verbo hebreo en contexto de audiencia real.
