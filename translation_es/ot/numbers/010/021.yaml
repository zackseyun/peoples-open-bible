revisions:
- from: Entonces los quenitas de Coat[a] partieron, llevando las cosas del santuario, y levantaron el tabernáculo antes de que ellos llegaran.
  to: Entonces los coatitas[a] partieron, llevando las cosas del santuario, y levantaron el tabernáculo antes de que llegaran.
  rationale: 'Se corrigió el error crítico de referente étnico/clánico: הַקְּהָתִים debe ser «los coatitas», no «los quenitas de Coat». Se mantuvo la nota léxica, ajustándola levemente para concordar con el texto corregido y aclarar que se trata de los objetos sagrados. También se mejoró la fluidez natural del español al omitir «ellos» en la cláusula final.'
