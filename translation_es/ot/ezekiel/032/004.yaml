    text: 'O: «Te abandonaré en la tierra». El verbo hebreo puede expresar dejar o abandonar, además de arrojar.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «saciaré de ti a las fieras de toda la tierra», es decir, quedarán saciadas al alimentarse de ti.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto para alinearlo mejor con el audit trail inglés y con el hebreo: se suaviza «superficie del campo» a «en campo abierto» para mayor naturalidad, y se reemplaza la nota erróneamente enfocada en las aves por una nota que preserve la literalidad de «de ti». En el texto principal, «con tu cuerpo» mantiene la idiomaticidad española y evita la explicitación más interpretativa de «tu carne», mientras la nota recoge el matiz literal hebreo.'
