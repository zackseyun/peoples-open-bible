review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura exclamativa de מַה, mantiene el plural de מִשְׁכְּנוֹתֶיךָ y conserva correctamente el nombre divino «Yahvé». Sin embargo, «encantadoras» introduce un matiz algo más ligero/estético que el hebreo יְדִידוֹת y que el POB inglés «lovely», cuyo campo semántico documentado incluye también «beloved/pleasant». Además, el título צְבָאוֹת se traduce mejor en este proyecto como «de las huestes» para corresponder más de cerca a «of hosts» y evitar el estrechamiento semántico de «ejércitos».
  spanish_quality_summary: La redacción es clara y poética, pero «encantadoras» puede sonar algo coloquial o liviano en registro bíblico. «Amables»/«hermosas» no son ideales aquí; «agradables» es más sobrio pero menos afectivo. La mejor mejora mínima es cambiar solo el título divino a «de las huestes» y conservar el resto, o bien también suavizar «encantadoras». Para una reparación pequeña y segura, se corrige el título y se retoca el adjetivo a «agradables», que está avalado por la nota léxica y suena más digno en español eclesial.
  glossary_alignment: «Yahvé» cumple la política terminológica. «Moradas» es una buena correspondencia de מִשְׁכְּנוֹתֶיךָ. El punto débil es «de los ejércitos», porque el glosario por defecto favorece equivalentes amplios para צְבָאוֹת; «de las huestes» preserva mejor el alcance del título. La nota alternativa debe seguir reflejando «amadas» como opción léxica.
  issues:
  - severity: medium
    issue: «de los ejércitos» estrecha el sentido de צְבָאוֹת
    rationale: El audit trail inglés escogió «of hosts» precisamente para mantener el título amplio y tradicional, abarcando huestes celestiales y fuerzas cósmicas, no solo ejércitos en sentido militar.
  - severity: low
    issue: «encantadoras» puede sonar demasiado ligero para יְדִידוֹת
    rationale: Aunque no es incorrecto, añade un matiz de encanto estético más moderno/coloquial. «Agradables» se ajusta mejor a la alternativa documentada y mantiene un registro más digno.
  revised_spanish_text: ¡Cuán agradables[a] son tus moradas, Yahvé de las huestes!
  revised_footnotes:
  - marker: a
    text: O «amadas» o «encantadoras».
    reason: lexical_alternative
  revision_rationale: Se ajusta «encantadoras» a «agradables» para un registro más sobrio y más cercano a las alternativas léxicas documentadas para יְדִידוֹת, y se cambia «de los ejércitos» a «de las huestes» para preservar mejor el alcance de צְבָאוֹת y alinearse con el razonamiento teológico/lexical del POB inglés.
