  text: οἴδαμεν γὰρ τὸν εἰπόντα· Ἐμοὶ ἐκδίκησις, ἐγὼ ⸀ἀνταποδώσω· καὶ πάλιν· ⸂Κρινεῖ κύριος⸃ τὸν λαὸν αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/010/030.yaml
  text: For we know the one who said[a], “Vengeance is mine; I will repay,” and again[b], “The Lord will judge his people.”
  footnotes:
  - marker: a
    text: Or, more literally, “Vengeance is mine.”
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Deuteronomy 32:35–36. In its original context, “judge” can include both punishment and vindication; here the warning context emphasizes divine judgment.
    reason: cross_reference
