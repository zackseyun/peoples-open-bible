translation:
  language: es
  text: No mandó a nadie a pecar[a], y no fortaleció a los mentirosos. Y no tiene misericordia de quien hace lo vano, ni de quien revela un secreto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «No mandó a un hombre a pecar, y no … hombres de falsedad». La segunda cláusula es difícil en el hebreo conservado; el griego dice: «y no dio a nadie permiso para pecar».'
    reason: textual_variant
lexical_decisions:
- source_word: καὶ οὐκ ἐνετείλατο / לֹא צִוָּה
  english_pob_choice: did not command
  chosen_spanish: no mandó
  alternatives_spanish:
  - no ordenó
  - no dio mandato
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego usan lenguaje de mandato/prohibición. En español, «mandó» transmite con naturalidad la acción de ordenar sin añadir matices ajenos.
- source_word: אֱנוֹשׁ / οὐδενί
  english_pob_choice: anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a alguien
  lexicon: HALOT; BDAG
  rationale: La combinación del hebreo indefinido con el griego οὐδενί pide un indefinido absoluto. «A nadie» conserva la universalidad y suena más idiomático que una paráfrasis.
- source_word: לַחֲטֹא / ἁμαρτάνειν
  english_pob_choice: to sin
  chosen_spanish: a pecar
  alternatives_spanish:
  - a cometer pecado
  - a hacer mal
  lexicon: HALOT; BDAG
  rationale: «Pecar» es el equivalente natural y preciso de ἁμαρτάνειν y חטא en contexto ético; mantiene el paralelismo con la segunda cola.
- source_word: וְלֹא הֶחֱלִים / οὐκ ἔδωκεν ἄνεσιν
  english_pob_choice: did not permit
  chosen_spanish: no fortaleció
  alternatives_spanish:
  - no dio permiso
  - no dio alivio
  lexicon: HALOT; LXX context
  rationale: Sigo aquí la revisión inglesa más reciente y su lectura de «strengthen liars», porque la forma hebrea transmitida es difícil y la línea siguiente del contexto hebreo habla de «los que mienten». «Fortaleció» refleja mejor esa posibilidad que «permitió», y preserva la tensión textual sin ocultarla.
- source_word: אַנְשֵׁי כָזָב
  english_pob_choice: liars
  chosen_spanish: a los mentirosos
  alternatives_spanish:
  - a los hombres de mentira
  - a los falsos
  lexicon: HALOT
  rationale: La expresión hebrea apunta con probabilidad a personas caracterizadas por la falsedad. «Mentirosos» comunica ese rasgo de forma clara y natural en español.
- source_word: עֹשֶׂה שָׁוְא
  english_pob_choice: one who does what is vain
  chosen_spanish: quien hace lo vano
  alternatives_spanish:
  - quien hace lo inútil
  - quien obra vanidad
  lexicon: HALOT
  rationale: שָׁוְא tiene el valor de vacío, falsedad o vanidad. «Lo vano» preserva el campo semántico sin convertirlo en una explicación excesiva.
- source_word: מְגַלֶּה סוֹד
  english_pob_choice: one who reveals a secret
  chosen_spanish: quien revela un secreto
  alternatives_spanish:
  - quien descubre un secreto
  - quien divulga un secreto
  lexicon: HALOT
  rationale: «Revela un secreto» es directo y fiel al hebreo, y mantiene el paralelismo con la línea anterior.
theological_decisions:
- issue: Cómo resolver la tensión entre el hebreo difícil y el griego más claro en la segunda cola
  english_pob_reading: The Hebrew is difficult in the second clause; the Greek reads, 'and he did not give anyone permission to sin.' A later revision instead reflected 'did not strengthen liars' from the Hebrew line.
  chosen_spanish_reading: La línea principal sigue la revisión más reciente y deja la segunda cola como una afirmación sobre «los mentirosos», sin forzar una lectura totalmente resuelta donde el hebreo es incierto.
  alternative_spanish_readings:
  - no dio permiso a nadie para pecar
  - no fortaleció a los mentirosos
  rationale: La base hebrea transmitida presenta una dificultad real, y el griego ofrece una interpretación distinta. Dado que la revisión inglesa reciente volvió a una lectura afín al hebreo («mentirosos»), el español conserva esa tensión en vez de uniformarla artificialmente. Así no se borra el problema textual ni se impone una armonización no demostrada.
  doctrine_reference: Principio de honestidad textual; prioridad de la evidencia original con preservación de incertidumbre.
translation_notes:
  revision_awareness: Tomé en cuenta la nota de revisión más reciente, que reintroduce la segunda línea sobre los mentirosos y la escena de no mostrar misericordia al que hace lo vano y al que revela un secreto. Por eso el español no sigue la lectura anterior de 'permitir pecar', sino que refleja la forma final del audit trail y el hebreo paralelo.
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca aquí como sustituto, sino porque este versículo no contiene el tetragrámaton; no hacía falta marcarlo.
  - Mantuve «pecar» para חטא y no «errar» o «faltar», porque el contexto moral es explícito.
  - Elegí «no fortaleció» para seguir la revisión final del POB inglés y no introducir una solución más fuerte de la que el aparato permite.
  - Conservé el paralelismo en dos miembros largos unidos por «y... y...», como en el hebreo y el griego.
