  timestamp: '2026-05-07T22:23:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: súplica a Yahvé para salvar y reunir a su pueblo de entre las naciones, con propósito de dar gracias a su santo nombre y gloriarse en su alabanza. Conserva correctamente Yahvé, nuestro Dios, el matiz final de propósito y la idea de dispersión entre las naciones.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero hay dos problemas de calidad: (1) «recógenos» suena poco natural y puede sugerir ‘recoger’ objetos o cadáveres más que reunir a un pueblo disperso; «reúnenos» o «júntanos» sería más idiomático, y «reúnenos» preserva mejor el contexto restaurativo. (2) Las notas al pie están mal ancladas: la nota [b] está colocada sobre «recógenos», pero su contenido trata de «gloriarnos/exultar en tu alabanza». También hay una errata en alternativas_spanish («Delivranos»), aunque eso no afecta el texto principal.'
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֵינוּ -> «nuestro Dios»; לְהוֹדוֹת -> «demos gracias»; לְהִשְׁתַּבֵּחַ -> «nos gloriemos». La única mejora terminológica recomendable es cambiar וְקַבְּצֵנוּ de «recógenos» a «reúnenos» para reflejar mejor קבץ en español bíblico natural.'
  issues:
  - severity: medium
    issue: «recógenos» no es la mejor opción para וְקַבְּצֵנוּ
    rationale: Aunque semánticamente posible, en español actual «recoger» no es la forma más natural para reunir a un pueblo disperso. «Reúnenos» transmite mejor el sentido de קבץ en contexto de exilio/restauración y suena más claro y eclesialmente legible.
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado
    rationale: El contenido de la nota [b] explica alternativas para «nos gloriemos en tu alabanza», no para «recógenos». Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante del texto.
  - severity: low
    issue: La nota [a] mezcla una alternativa extensa con el verso completo
    rationale: 'Es aceptable, pero más limpio sería limitar la alternativa al segmento léxico relevante («O: “Líbranos”»), ya que la nota nace de הוֹשִׁיעֵנוּ. No obstante, la forma actual todavía comunica la alternativa documentada.'
  revised_spanish_text: Sálvanos[a], Yahvé, nuestro Dios, y reúnenos de entre las naciones, para que demos gracias a tu santo nombre y nos gloriemos[b] en tu alabanza.
