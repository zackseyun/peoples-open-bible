source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Γρηγορεῖτε ὑπὲρ τῆς ζωῆς ὑμῶν· οἱ λύχνοι ὑμῶν μὴ σβεσθήτωσαν, καὶ αἱ ὀσφύες
    ὑμῶν μὴ ἐκλυέσθωσαν, ἀλλὰ γίνεσθε ἕτοιμοι· οὐ γὰρ οἴδατε τὴν ὥραν, ἐν ᾗ ὁ Κύριος
    ἡμῶν ἔρχεται. Πυκνῶς δὲ συναχθήσεσθε ζητοῦντες τὰ ἀνήκοντα ταῖς ψυχαῖς ὑμῶν· οὐ
    γὰρ ὠφελήσει ὑμᾶς ὁ πᾶς χρόνος τῆς πίστεως ὑμῶν, ἐὰν μὴ ἐν τῷ ἐσχάτῳ καιρῷ τελειωθῆτε.
    Ἐν γὰρ ταῖς ἐσχάταις ἡμέραις πληθυνθήσονται οἱ ψευδοπροφῆται καὶ οἱ φθορεῖς καὶ
    στραφήσονται τὰ πρόβατα εἰς λύκους καὶ ἡ ἀγάπη στραφήσεται εἰς μῖσος· αὐξανούσης
    γὰρ τῆς ἀνομίας, μισήσουσιν ἀλλήλους καὶ διώξουσι καὶ παραδώσουσι, καὶ τότε φανήσεται
    ὁ κοσμοπλάνος ὡς υἱὸς Θεοῦ καὶ ποιήσει σημεῖα καὶ τέρατα, καὶ ἡ γῆ παραδοθήσεται
    εἰς χεῖρας αὐτοῦ, καὶ ποιήσει ἀθέμιτα, ἃ οὐδέποτε γέγονεν ἐξ αἰῶνος. Τότε ἥξει
    ἡ κτίσις τῶν ἀνθρώπων εἰς τὴν πύρωσιν τῆς δοκιμασίας καὶ σκανδαλισθήσονται πολλοὶ
    καὶ ἀπολοῦνται, οἱ δὲ ὑπομείναντες ἐν τῇ πίστει αὐτῶν σωθήσονται ὑπ᾽ αὐτοῦ τοῦ
    καταθέματος. Καὶ τότε φανήσεται τὰ σημεῖα τῆς ἀληθείας· πρῶτον, σημεῖον ἐκπετάσεως
    ἐν οὐρανῷ, εἶτα σημεῖον φωνῆς σάλπιγγος καὶ τὸ τρίτον ἀνάστασις νεκρῶν· οὐ πάντων
    δέ, ἀλλ᾽ ὡς ἐρρέθη· Ἥξει ὁ Κύριος καὶ πάντες οἱ ἅγιοι μετ᾽ αὐτοῦ. Τότε ὄψεται
    ὁ κόσμος τὸν Κύριον ἐρχόμενον ἐπάνω τῶν νεφελῶν τοῦ οὐρανοῦ.
