translation:
  language: es
  text: Ahora el rey estaba sentado en la casa de invierno, en el noveno mes[a], con el brasero ardiendo delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el recipiente de fuego»; el término hebreo se refiere a un contenedor para brasas o fuego usado para dar calor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: Now the king
  chosen_spanish: Ahora el rey
  alternatives_spanish:
  - Y el rey
  lexicon: HALOT
  rationale: El ו narrativo se expresa naturalmente con «Ahora» para introducir la escena sin sonar forzado; «el rey» conserva la definitud del hebreo.
- source_word: יוֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio marca una acción en curso; en español, «estaba sentado» reproduce bien el valor durativo en el contexto narrativo.
- source_word: בֵּית הַחֹרֶף
  english_pob_choice: the winter house
  chosen_spanish: la casa de invierno
  alternatives_spanish:
  - la residencia de invierno
  - el palacio de invierno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de invierno», una expresión idiomática para la residencia estacional. «Casa de invierno» preserva la forma y evita sobreespecificar con «palacio».
- source_word: בַּחֹדֶשׁ הַתְּשִׁיעִי
  english_pob_choice: in the ninth month
  chosen_spanish: en el noveno mes
  alternatives_spanish:
  - durante el noveno mes
  lexicon: HALOT
  rationale: Es una frase temporal directa; «en el noveno mes» es natural y fiel a la construcción hebrea.
- source_word: וְאֶת
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Aquí introduce una circunstancia acompañante, no un objeto directo; «con» da bien la relación entre el rey y el brasero encendido.
- source_word: הָאָח
  english_pob_choice: the brazier
  chosen_spanish: el brasero
  alternatives_spanish:
  - el recipiente de fuego
  - el hogar
  lexicon: HALOT
  rationale: El término designa un recipiente portátil para carbón o fuego con fines de calor. «Brasero» es el equivalente preciso y natural en español.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  lexicon: HALOT
  rationale: La referencia espacial se expresa de forma clara y idiomática con «delante de él».
- source_word: מְבֹעָרֶת
  english_pob_choice: burning
  chosen_spanish: ardiendo
  alternatives_spanish:
  - encendido
  - en llamas
  lexicon: HALOT
  rationale: El participio pasivo describe el brasero/fuego en estado de combustión; «ardiendo» suena natural y conserva la imagen de calor activo.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios sustanciales; se mantuvo la misma escena y la misma ambigüedad léxica principal del objeto de calor, adaptada al español con una equivalencia natural.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» o «rey estaba sentado» en forma más rígida; la escena quedó en un español fluido pero cercano al hebreo.
  - «Brasero» mantiene la alternativa léxica señalada por el audit trail inglés; la nota explica la opción sin perder la posibilidad de leer «recipiente de fuego» como alternativa.
