translation:
  language: es
  text: Y Yahvé se enojó conmigo por lo que ustedes dijeron[a], y juró que yo no cruzaría el Jordán ni entraría en la buena tierra que Yahvé tu Dios te[b] da como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «por causa de ustedes». El hebreo dice literalmente: «por causa de sus palabras».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa segunda persona singular en esta cláusula («tu Dios te da»), aunque el discurso en el contexto inmediato también se dirige al pueblo en plural.
    reason: source_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el uso proyectual para el nombre divino, manteniendo el nombre propio en lugar de una sustitución reverencial.
- source_word: הִתְאַנֶּף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se غضó
  - estuvo airado
  - se enfureció
  lexicon: HALOT
  rationale: El hitpael expresa ira; en español, 'se enojó' comunica bien el estado sin intensificar más de lo que el hebreo exige.
- source_word: בִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  lexicon: HALOT
  rationale: Con verbos de enojo, 'conmigo' es natural en español y conserva la relación personal del objeto verbal.
- source_word: עַל דִּבְרֵיכֶם
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por sus palabras
  - a causa de sus palabras
  lexicon: HALOT
  rationale: El hebreo menciona literalmente 'sus palabras', pero el contexto permite una expresión más idiomática en español. Se conserva la referencia causal sin forzar una construcción pesada en el texto principal.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - tomó juramento
  lexicon: HALOT
  rationale: '''Juró'' es la forma más natural y directa en español para el verbo de juramento.'
- source_word: לְבִלְתִּי עָבְרִי אֶת הַיַּרְדֵּן
  english_pob_choice: that I would not cross the Jordan
  chosen_spanish: que yo no cruzaría el Jordán
  alternatives_spanish:
  - que no pasaría el Jordán
  - que no habría de cruzar el Jordán
  lexicon: HALOT
  rationale: '''Cruzar el Jordán'' preserva la imagen espacial del hebreo; el futuro en español transmite el contenido del juramento.'
- source_word: וּלְבִלְתִּי בֹא
  english_pob_choice: and that I would not enter
  chosen_spanish: ni entraría
  alternatives_spanish:
  - y que no entraría
  - ni iría
  lexicon: HALOT
  rationale: La coordinación negativa con 'ni' fluye bien en español y mantiene el paralelismo con el miembro anterior.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - la tierra agradable
  lexicon: HALOT
  rationale: Se conserva el adjetivo calificativo simple del hebreo. 'Tierra' suena más natural en español bíblico que 'país' o 'suelo' aquí.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te entrega
  lexicon: HALOT
  rationale: Aunque el participio puede sugerir acción en curso, en español 'te da' mantiene la fuerza presente y resulta más natural en esta cláusula relativa.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - en herencia
  lexicon: HALOT
  rationale: '''Herencia'' expresa bien el valor de posesión recibida por asignación divina y evita una formulación demasiado técnica.'
theological_decisions:
- issue: Relación causal entre la ira divina y las palabras del pueblo
  english_pob_reading: because of you
  chosen_spanish_reading: por causa de ustedes
  alternative_spanish_readings:
  - por sus palabras
  - a causa de sus palabras
  rationale: Se mantiene la tensión del hebreo al no diluir la causa. En el cuerpo se opta por una formulación idiomática que todavía deja abierta la referencia a lo dicho por el pueblo, sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión textual y la prioridad del hebreo sobre una explicación doctrinal simplificada.
- issue: Traducción del nombre divino en un contexto narrativo de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: Se conserva el nombre propio divino según la norma del proyecto, en lugar de ocultarlo tras un título reverencial.
  doctrine_reference: Uso consistente del Tetragrámaton en el texto principal.
translation_notes:
  revision_awareness: La redacción inglesa de referencia fue revisada desde «because of your words» a «because of you» para una mayor naturalidad idiomática; en español se optó por una solución intermedia («por causa de ustedes») que conserva la causalidad explícita y permite una nota que recuerda la literalidad hebrea de «sus palabras».
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה.
  - 'Se conserva el paralelismo de juramento con dos miembros negativos: no cruzar el Jordán y no entrar en la buena tierra.'
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Herencia'' traduce נַחֲלָה en forma comprensible y coherente con el tema de la tierra prometida.'
  - La nota sobre la segunda persona aclara la oscilación pronominal en español sin alterar el texto principal.
