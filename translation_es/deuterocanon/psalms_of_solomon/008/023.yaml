    reason: lexical_alternative
  - marker: b
    text: Lit. «como agua de impureza»; o, de forma más explicativa, «como agua de contaminación ritual».
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la frase colectiva πᾶν σοφὸν ἐν βουλῇ para que el español suene natural y legible sin perder la compresión del griego ni las alternativas documentadas. También se afina la nota b para distinguir mejor entre traducción literal y glosa explicativa.
