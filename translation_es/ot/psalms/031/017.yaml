translation:
  language: es
  text: Haz resplandecer tu rostro sobre tu siervo[a]; sálvame en tu amor fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por tu amor fiel» o «según tu amor fiel». El prefijo hebreo puede entenderse aquí en más de un sentido estrechamente relacionado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִירָה
  english_pob_choice: Make ... shine
  chosen_spanish: Haz resplandecer
  alternatives_spanish:
  - Haz brillar
  - Haz que resplandezca
  lexicon: HALOT
  rationale: 'El hiphil del verbo אור es causativo: una petición para que Dios haga brillar su rostro. «Haz resplandecer» conserva el valor causativo y suena natural en español moderno, sin perder la imagen idiomática.'
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu rostro». «Rostro» mantiene la imagen concreta y evita aplanarla a «presencia», que sería más interpretativa.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - hacia
  lexicon: HALOT
  rationale: La preposición expresa la dirección del favor divino hacia el siervo. «Sobre» reproduce bien esa orientación en español y conserva la imagen bíblica.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En el lenguaje de oración dirigido a Dios, el sentido relacional es «siervo». Aunque «esclavo» sería más fuerte léxicamente, aquí podría sonar excesivamente social y desviar la imagen devocional del salmo.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: La raíz ישׁע pide rescate o salvación. «Sálvame» es la forma más amplia y natural en español, y conserva tanto el sentido inmediato de auxilio como la resonancia teológica.
- source_word: בְחַסְדֶּךָ
  english_pob_choice: in your steadfast love
  chosen_spanish: en tu amor constante
  alternatives_spanish:
  - por tu amor constante
  - según tu amor constante
  - en tu misericordia
  lexicon: HALOT
  rationale: חסד tiene carga de lealtad pactual, benevolencia fiel y amor perseverante. «Amor constante» comunica esa fidelidad duradera en un español claro; «misericordia» es posible, pero atenúa el matiz de pacto.
theological_decisions:
- issue: Renderización de חסד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - misericordia
  - amor leal
  - bondad fiel
  rationale: El versículo apela a la fidelidad de alianza de Dios, no solo a compasión emocional. «Amor constante» intenta preservar esa lealtad sostenida y la estabilidad del favor divino.
  doctrine_reference: Consistencia de términos clave; traducción de חסד en el POB
- issue: Valor del prefijo בְ en בְחַסְדֶּךָ
  english_pob_reading: in your steadfast love
  chosen_spanish_reading: en tu amor constante
  alternative_spanish_readings:
  - por tu amor constante
  - según tu amor constante
  rationale: El hebreo permite una lectura instrumental o locativa. «En» mantiene abierta esa relación sin resolverla de modo demasiado restrictivo, como en el texto inglés auditado.
  doctrine_reference: Consistencia de términos clave; nota léxica del POB
translation_notes:
  revision_awareness: El texto inglés auditado no recibió revisiones en la última pasada; se mantiene el acuerdo alto entre controles. La versión española sigue de cerca el hebreo y conserva la imagen idiomática de «rostro» y la ambigüedad del prefijo בְ con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «siervo» para עבד en lenguaje orante dirigido a Dios.
  - Se evita «SEÑOR» como máscara y no aparece el nombre divino en este versículo; el pronombre posesivo mantiene la referencia implícita.
  - «Amor constante» se usa como equivalente español consistente para חסד en este contexto pactual.
  - La nota al pie marca explícitamente la alternativa preposicional, como en el texto inglés auditado.
