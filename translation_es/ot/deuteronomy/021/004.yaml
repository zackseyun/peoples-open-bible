translation:
  language: es
  text: Entonces los ancianos de aquella ciudad bajarán la novilla[a] a un arroyo perenne[b], que no es labrado ni sembrado, y allí, en el arroyo, le quebrarán el cuello a la novilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ternera”, “vaquilla”. El hebreo עֶגְלָה designa una hembra bovina joven; se eligió “novilla” por corresponder mejor al sentido de “heifer” en este contexto legal y ritual.
    reason: lexical_alternative
  - marker: b
    text: O “a un wadi perenne”, “a un barranco con cauce duradero”. El hebreo נַחַל אֵיתָן probablemente se refiere a un cauce o arroyo de carácter permanente o duradero, no simplemente a un terreno escabroso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרִדוּ
  english_pob_choice: shall bring ... down
  chosen_spanish: bajarán
  alternatives_spanish:
  - harán bajar
  - llevarán hacia abajo
  lexicon: HALOT
  rationale: El hebreo hiphil de ירד expresa causar el descenso. En español, con el contexto de traslado a un cauce más bajo, “bajarán” comunica de forma natural y fiel ese movimiento.
- source_word: זִקְנֵי הָעִיר הַהִוא
  english_pob_choice: the elders of that city
  chosen_spanish: los ancianos de aquella ciudad
  alternatives_spanish:
  - los ancianos de esa ciudad
  - los ancianos de aquella villa
  lexicon: HALOT
  rationale: “Ancianos” conserva el sentido de los líderes/jueces del pueblo en un contexto legal. “Aquella ciudad” refleja el demostrativo distante del hebreo y mantiene el tono legal sin sobreinterpretarlo.
- source_word: הָעֶגְלָה
  english_pob_choice: the heifer
  chosen_spanish: la ternera
  alternatives_spanish:
  - la novilla
  - la vaquilla
  lexicon: HALOT
  rationale: El término denota una bovina joven. “Ternera” es comprensible en español y conserva la idea de animal joven; “novilla” o “vaquilla” son posibles, pero pueden sonar más regionales o técnicos según el lector.
- source_word: אֶל נַחַל אֵיתָן
  english_pob_choice: to a perennial wadi
  chosen_spanish: a un wadi perenne
  alternatives_spanish:
  - a un cauce perenne
  - a un barranco perenne
  - a un valle con corriente perenne
  lexicon: HALOT
  rationale: Se mantiene “wadi” para conservar el término geográfico específico ya discernido por la POB; “perenne” traduce אֵיתָן como duradero/constante, evitando exagerar con “agua corriente” o restringir a una sola imagen topográfica.
- source_word: אֲשֶׁר לֹא יֵעָבֵד בּוֹ
  english_pob_choice: which is neither worked
  chosen_spanish: que no ha sido labrado
  alternatives_spanish:
  - que no es trabajado
  - que no ha sido cultivado
  lexicon: HALOT
  rationale: En este contexto agrícola, el pasivo de עבד se entiende como “labrado/cultivado”. “Labrado” es natural en español y se empareja bien con la cláusula siguiente.
- source_word: וְלֹא יִזָּרֵעַ
  english_pob_choice: nor sown
  chosen_spanish: ni sembrado
  alternatives_spanish:
  - ni plantado
  - ni sembrado en él
  lexicon: HALOT
  rationale: El pasivo de זרע corresponde claramente a la siembra. “Ni sembrado” es la contraparte idiomática de “no ha sido labrado” y preserva el paralelismo hebreo.
- source_word: וְעָרְפוּ
  english_pob_choice: they shall break the heifer’s neck
  chosen_spanish: quebrarán el cuello de la ternera
  alternatives_spanish:
  - desnucarán la ternera
  - romperán el cuello de la ternera
  lexicon: HALOT
  rationale: El verbo ritual indica quebrar la nuca/cuello desde atrás, no simplemente matar. “Quebrarán el cuello” conserva la acción específica; “desnucarán” sería más idiomático pero menos transparente para una traducción auditada.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; “allí” es claro y solemne en español.
- source_word: בַּנָּחַל
  english_pob_choice: in the wadi
  chosen_spanish: en el wadi
  alternatives_spanish:
  - en el cauce
  - en el barranco
  lexicon: HALOT
  rationale: Se conserva “wadi” en la repetición para mantener consistencia terminológica con la primera mención y con la decisión auditada de la POB.
theological_decisions:
- issue: Término geográfico נַחַל אֵיתָן y su posible sobre-interpretación
  english_pob_reading: perennial wadi / ravine with an ever-flowing stream
  chosen_spanish_reading: wadi perenne
  alternative_spanish_readings:
  - cauce perenne
  - barranco perenne
  - valle con corriente perenne
  rationale: 'La cuestión no es doctrinal sino hermenéutica: el hebreo describe un cauce natural con persistencia o duración, no necesariamente un “río” pleno. “Wadi perenne” conserva la ambigüedad controlada y la precisión geográfica sin imponer una imagen más fuerte de la que el texto exige.'
  doctrine_reference: None
- issue: Ritual legal de quebrar el cuello de la ternera
  english_pob_reading: they shall break the heifer’s neck
  chosen_spanish_reading: quebratarán el cuello de la ternera
  alternative_spanish_readings:
  - desnucarán la ternera
  - romperán el cuello de la ternera
  rationale: El hebreo describe una acción ritual específica dentro de un procedimiento expiatorio/legal. La traducción debe conservar la crudeza y particularidad del rito sin suavizarla con un verbo genérico de sacrificio.
  doctrine_reference: Deuteronomio 21:1-9
translation_notes:
  revision_awareness: La POB inglesa pasó de “wadi with running water” a “perennial wadi” para evitar precisar indebidamente el tipo de flujo. La versión española sigue esa revisión con “wadi perenne”, manteniendo la cautela semántica y la consistencia terminológica en la repetición de נַחַל.
  spanish_consistency_notes:
  - Se mantiene “wadi” de forma consistente para נַחַל, en lugar de alternar con “cauce”, “barranco” o “ravine”, porque la POB inglesa ya fijó esta decisión lexical.
  - Se usa “ancianos” para זִקְנֵי, no “viejos”, porque el contexto legal exige una función de liderazgo y no solo edad.
  - Se evita “SEÑOR” o equivalentes porque el versículo no contiene el tetragrámaton ni un título divino.
  - “No ha sido labrado ni sembrado” preserva el paralelismo pasivo del hebreo con dos negaciones coordinadas.
