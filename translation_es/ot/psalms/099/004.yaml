    rationale: El rationale inglés dice explícitamente que aquí conviene preservar la colocación «justice and righteousness» manteniendo ambos conceptos distintos. El borrador español afirma que «justicia y justicia» conserva el paralelismo, pero en realidad lo colapsa semánticamente.
  revised_spanish_text: La fuerza del Rey ama la justicia[a]; tú has establecido la rectitud[b]; has hecho justicia y rectitud en Jacob.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «El Rey poderoso ama la justicia». El hebreo inicial es comprimido y puede construirse de más de una manera.'
