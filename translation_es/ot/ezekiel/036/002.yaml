translation:
  language: es
  text: 'Así dice el Señor Yahvé: Porque el enemigo dijo contra ustedes: «¡Ajá!» y: «Las alturas antiguas[a] han llegado a ser nuestra posesión»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares altos antiguos han llegado a ser nuestra herencia»
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, «Señor» expresa אֲדֹנָי y «Yahvé» preserva el nombre propio divino según el estándar del proyecto, evitando la sustitución por «SEÑOR».
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la declaración divina; «Porque» es natural y conserva la fuerza causal del hebreo.
- source_word: הָאוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El artículo en hebreo favorece un referente definido; «el enemigo» refleja mejor la referencia concreta en el contexto.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - acerca de ustedes
  lexicon: HALOT
  rationale: En el discurso hostil, la preposición debe expresar oposición; «contra ustedes» conserva el matiz adversarial.
- source_word: הֶאָח
  english_pob_choice: Aha!
  chosen_spanish: ¡Ajá!
  alternatives_spanish:
  - ¡Ja!
  - ¡Ah!
  lexicon: HALOT
  rationale: Es una interjección de burla y triunfo malicioso. «¡Ajá!» es idiomático en español y mantiene el tono de mofa.
- source_word: בָּמוֹת עוֹלָם
  english_pob_choice: the everlasting heights
  chosen_spanish: las alturas eternas
  alternatives_spanish:
  - los lugares altos eternos
  - las alturas antiguas
  lexicon: HALOT
  rationale: La combinación comunica alturas de antigüedad/permanencia. «Alturas eternas» sigue de cerca la forma adoptada en la revisión inglesa, manteniendo la imagen elevada sin forzar «lugares altos» en el texto principal.
- source_word: לְמוֹרָשָׁה
  english_pob_choice: our possession
  chosen_spanish: nuestra posesión
  alternatives_spanish:
  - nuestra herencia
  - como posesión para nosotros
  lexicon: HALOT
  rationale: Designa algo adquirido como propiedad. «Nuestra posesión» reproduce bien la pretensión de apropiación del enemigo; «herencia» podría sugerir un derecho legítimo que el contexto no afirma.
- source_word: הָיְתָה לָּנוּ
  english_pob_choice: have become our possession
  chosen_spanish: han llegado a ser nuestra posesión
  alternatives_spanish:
  - se han vuelto nuestras
  - han pasado a ser nuestras
  lexicon: HALOT
  rationale: El hebreo expresa resultado de una toma de posesión. La formulación española conserva el valor resultativo y el sentido de apropiación colectiva.
theological_decisions:
- issue: Forma de rendir el nombre divino יְהוִה en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé el Señor
  rationale: Se preserva el nombre propio divino como «Yahvé» y se traduce אֲדֹנָי por «Señor». Esto evita ocultar el nombre revelado y mantiene la distinción del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó only el sintagma de בָּמוֹת עוֹלָם de 'ancient heights' a 'everlasting heights'. La versión española sigue esa preferencia semántica con «alturas eternas», sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el tono de amenaza y burla con «el enemigo» y «¡Ajá!».
  - «Alturas eternas» refleja la permanencia del sintagma hebreo sin convertirlo en una paráfrasis más explicativa.
