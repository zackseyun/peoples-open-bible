translation:
  language: es
  text: Porque él conoce a los hombres falsos; cuando ve la maldad[a], ¿no se fija en ella?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no la considera». La cláusula final en hebreo también puede leerse como una negación simple, pero el contexto favorece con fuerza una pregunta retórica: «¿no se fija en ella?»'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce el fundamento de la afirmación de Zofar. «Porque» expresa bien la relación argumentativa en español y mantiene el valor explicativo sin sobrecargar el énfasis.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Dios
  - él mismo
  lexicon: HALOT
  rationale: El referente es Dios en el contexto. «Él» conserva la referencia pronominal de forma natural; no hace falta repetir «Dios» en el texto principal.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - ha conocido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una verdad estable o habitual. «Conoce» comunica bien ese valor gnómico en español y suena más relacional que «sabe».
- source_word: מְתֵי שָׁוְא
  english_pob_choice: men of falsehood
  chosen_spanish: los hombres de falsedad
  alternatives_spanish:
  - los hombres mentirosos
  - los hombres vanos
  - los hombres inútiles
  lexicon: HALOT
  rationale: «מתי» funciona como «hombres/ personas de», y שָׁוְא puede abarcar falsedad, vacío o inutilidad. Se conserva la construcción de genitivo con «falsedad» para no perder la tensión semántica que el inglés POB también preserva.
- source_word: וַיַּרְא
  english_pob_choice: when he sees
  chosen_spanish: cuando ve
  alternatives_spanish:
  - y ve
  - pues ve
  lexicon: HALOT
  rationale: El waw consecutivo se vuelve naturalmente temporal en español en este contexto. «Cuando ve» encaja con la lógica de la oración y evita una secuencia demasiado literal.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la maldad
  - el mal
  - la perversidad
  lexicon: HALOT
  rationale: אָוֶן suele denotar iniquidad, maldad con carga moral y, a veces, la ruina derivada del mal. «Iniquidad» conserva ese peso moral y tiene un rango más cercano al término hebreo que «maldad».
- source_word: וְלֹא יִתְבּוֹנָן
  english_pob_choice: does he not take notice?
  chosen_spanish: ¿no la toma en cuenta?
  alternatives_spanish:
  - ¿no la considera?
  - ¿no la percibe?
  - y no la considera
  lexicon: HALOT
  rationale: 'Se adopta la lectura retórica favorecida por el contexto: si Dios ve la iniquidad, ciertamente la toma en cuenta. «Tomar en cuenta» es un equivalente idiomático moderno de atender/considerar cuidadosamente, y permite mantener el valor interrogativo del texto.'
theological_decisions:
- issue: Fuerza de la cláusula final וְלֹא יִתְבּוֹנָן
  english_pob_reading: 'Render as a rhetorical question: ''does he not take notice?'''
  chosen_spanish_reading: ¿no la toma en cuenta?
  alternative_spanish_readings:
  - y no la considera
  - ¿no la considera?
  - ¿no la percibe?
  rationale: En el argumento de Zofar, la secuencia afirma el conocimiento exhaustivo de Dios sobre el mal humano. La pregunta retórica mantiene esa lógica y evita una negación plana que sería gramaticalmente posible, pero menos coherente con el contexto inmediato.
  doctrine_reference: Preservar la tensión textual y contextual sin resolverla artificialmente; documentar la alternativa gramatical posible.
translation_notes:
  revision_awareness: El pasaje coincide con el estado de alta concordancia del auditoría inglesa; no se registraron revisiones aplicadas en la última pasada, y la decisión principal en español sigue la misma opción retórica para la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; en este versículo el referente divino se expresa por pronombre, así que no se introduce el nombre divino en el texto principal.
  - Se conserva el paralelismo semántico entre «conoce» / «ve» / «toma en cuenta» para reflejar la progresión del hebreo.
  - La opción «iniquidad» se usa para preservar la carga moral de אָוֶן sin diluirla en un término demasiado general.
