translation:
  language: es
  text: 'Y aconteció aquella noche que Yahvé le dijo: «Toma el toro de tu padre y el segundo toro, de siete años, y derriba el altar de Baal que pertenece a tu padre, y corta la Asera[a] que está sobre él[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el poste de Asera» o «el poste sagrado». El término hebreo puede designar un objeto cultual asociado con Asera.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que está sobre él». La frase puede indicar que la Asera estaba sobre el altar, encima de él o en estrecha asociación con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּלַּיְלָה הַהוּא
  english_pob_choice: And it happened that night
  chosen_spanish: Y aconteció aquella noche
  alternatives_spanish:
  - Y pasó aquella noche
  - Y sucedió aquella noche
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con una introducción natural en español. «Aconteció» mantiene el giro de transición sin caer en un calco torpe ni en un arcaísmo excesivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el tetragrámaton sin máscara litúrgica y es la forma base indicada para el español.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Lleva
  lexicon: HALOT
  rationale: El imperativo directo en hebreo pide un mandato simple y claro. «Toma» reproduce bien la fuerza ordenativa.
- source_word: פַּר הַשּׁוֹר
  english_pob_choice: your father’s bull
  chosen_spanish: el toro de tu padre
  alternatives_spanish:
  - el novillo de tu padre
  - el toro joven de tu padre
  lexicon: HALOT
  rationale: «פַּר» designa un toro/novillo; «toro» es claro en español y mantiene la concreción del animal. La relación posesiva se expresa de forma natural sin sobreexplicar el constructo.
- source_word: וּפַר הַשֵּׁנִי שֶׁבַע שָׁנִים
  english_pob_choice: the second bull, seven years old
  chosen_spanish: el segundo toro, de siete años
  alternatives_spanish:
  - y el segundo toro, de siete años
  - el otro toro, de siete años
  lexicon: HALOT
  rationale: Se conserva la adición de un segundo animal y la edad explícita. «De siete años» es idiomático y fiel al hebreo, sin forzar «siete años viejo».
- source_word: וְהָרַסְתָּ
  english_pob_choice: tear down
  chosen_spanish: derriba
  alternatives_spanish:
  - demuele
  - destruye
  lexicon: HALOT
  rationale: Para un altar, «derriba» transmite bien el mandato de desmantelar con fuerza y es natural en español. «Demuele» también sería posible, pero «derriba» conserva mejor la imagen concreta.
- source_word: מִזְבַּח הַבַּעַל
  english_pob_choice: the altar of Baal
  chosen_spanish: el altar de Baal
  alternatives_spanish:
  - el altar de Baalí
  - el altar perteneciente a Baal
  lexicon: HALOT
  rationale: La construcción se mantiene de forma directa y transparente. «Baal» se conserva como nombre propio del culto idólatra.
- source_word: אֲשֶׁר לְאָבִיךָ
  english_pob_choice: that belongs to your father
  chosen_spanish: que pertenece a tu padre
  alternatives_spanish:
  - que es de tu padre
  - que es propiedad de tu padre
  lexicon: HALOT
  rationale: La relación posesiva se vuelve explícita en español sin añadir matices ajenos. «Pertenece» refleja bien el sentido relacional del hebreo.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Asherah
  alternatives_spanish:
  - la Asera
  - el poste de Asherah
  lexicon: HALOT
  rationale: Se preserva el término cultual transliterado para no resolver indebidamente si se trata del objeto, símbolo o entidad asociada. En el texto español, «la Asherah» conserva la tensión documental del hebreo y del audit trail.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that is upon it
  chosen_spanish: que está sobre él
  alternatives_spanish:
  - que está encima de él
  - que está sobre eso
  lexicon: HALOT
  rationale: «Sobre él» sigue más de cerca la preposición hebrea que la opción interpretativa «junto a él». Se deja la relación espacial abierta, como permite el texto fuente.
- source_word: תִּכְרֹת
  english_pob_choice: cut down
  chosen_spanish: corta
  alternatives_spanish:
  - derriba
  - corta y tala
  lexicon: HALOT
  rationale: Para un objeto/culto de madera, «corta» es la forma verbal más directa y fiel. En español, el verbo puede abarcar tanto cortar como talar, sin cargar el texto de explicaciones.
theological_decisions:
- issue: Nombre divino יְהוָה en boca del narrador
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el compromiso del proyecto con la visibilidad del nombre divino. «Yahvé» evita el reemplazo litúrgico por «SEÑOR» y preserva la lectura auditable del tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de הָאֲשֵׁרָה
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Asherah
  alternative_spanish_readings:
  - el poste de Asherah
  - el poste sagrado
  rationale: El hebreo mantiene una ambigüedad entre objeto cultual, símbolo o posible referencia asociada a Asherah. Traducirlo como «la Asherah» conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se distingue entre el toro de su padre y el segundo toro, se conserva la edad explícita de siete años, y se refleja con mayor literalidad la relación espacial de la Asherah con el altar mediante «sobre él». También se evita resolver la ambigüedad cultual del término mediante un equivalente interpretativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Asherah» transliterado para conservar la ambigüedad cultual documentada.
  - «Toro» se emplea para פַּר en coherencia con un registro bíblico claro y natural.
  - La puntuación de cita directa sigue norma española con comillas angulares.
  - Las notas al pie usan marcadores únicos y aparecen solo donde el texto los ancla.
