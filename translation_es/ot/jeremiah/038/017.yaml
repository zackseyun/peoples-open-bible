translation:
  language: es
  text: 'Entonces Jeremías dijo a Sedequías: «Así dice Yahvé, el Dios de los ejércitos, el Dios de Israel: Si en verdad sales[a] a los oficiales del rey de Babilonia, conservarás la vida[b], y esta ciudad no será quemada con fuego; y tú y tu familia[c] vivirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si de veras sales». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu alma vivirá». Aquí נֶפֶשׁ se refiere a tu vida o a tu propia supervivencia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu casa». En este contexto se refiere a tu familia y dependientes, no solo al edificio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio en español, siguiendo la decisión auditable de la POB de no sustituirlo por un título. 'Yahvé' es la forma española establecida en el proyecto.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de las huestes
  - el SEÑOR de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene la estructura de constructo del hebreo ('Dios de...') sin colapsarla en la fórmula tradicional 'SEÑOR de los ejércitos'. 'Ejércitos' conserva el campo semántico de צְבָאוֹת y suena natural en español bíblico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Se traduce de manera directa la cadena de posesión/covenio, manteniendo la designación relacional del Dios del pacto con Israel.
- source_word: אִם יָצֹא תֵצֵא
  english_pob_choice: If you indeed go out
  chosen_spanish: Si en verdad sales
  alternatives_spanish:
  - Si ciertamente sales
  - Si sales de veras
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa énfasis. 'En verdad' comunica esa intensificación en español sin volverla mecánica.
- source_word: אֶל שָׂרֵי מֶלֶךְ בָּבֶל
  english_pob_choice: to the officials of the king of Babylon
  chosen_spanish: a los oficiales del rey de Babilonia
  alternatives_spanish:
  - a los príncipes del rey de Babilonia
  - a los comandantes del rey de Babilonia
  lexicon: HALOT
  rationale: '''Oficiales'' refleja bien שָׂרִים en este contexto de autoridades del reino y evita imponer una lectura exclusivamente militar o nobiliaria.'
- source_word: וְחָיְתָה נַפְשֶׁךָ
  english_pob_choice: your life will be spared
  chosen_spanish: tu vida será preservada
  alternatives_spanish:
  - tu alma vivirá
  - vivirás
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí denota la vida o la persona en peligro, no un 'alma' en sentido filosófico. 'Será preservada' reproduce el sentido pasivo de supervivencia y mantiene la claridad idiomática.
- source_word: לֹא תִשָּׂרֵף בָּאֵשׁ
  english_pob_choice: will not be burned with fire
  chosen_spanish: no será quemada con fuego
  alternatives_spanish:
  - no será incendiada
  - no arderá en fuego
  lexicon: HALOT
  rationale: Se conserva la imagen verbal del hebreo con una forma natural en español. 'Con fuego' preserva el complemento instrumental sin suavizar la expresión.
- source_word: וְחָיִתָה אַתָּה וּבֵיתֶךָ
  english_pob_choice: and you and your household will live
  chosen_spanish: y tú y tu casa vivirán
  alternatives_spanish:
  - y tú y tu familia vivirán
  - y tú y tu casa se salvarán
  lexicon: HALOT
  rationale: בַּיִת puede referir a la casa como unidad doméstica o familiar. Aquí se conserva 'casa' porque mantiene la ambigüedad semántica del hebreo y la POB documentó esa alternativa en nota.
- source_word: וַיֹּאמֶר יִרְמְיָהוּ אֶל צִדְקִיָּהוּ
  english_pob_choice: Then Jeremiah said to Zedekiah
  chosen_spanish: Entonces Jeremías dijo a Sedequías
  alternatives_spanish:
  - Y Jeremías dijo a Sedequías
  lexicon: BHS / HB
  rationale: Se usa 'Entonces' para reflejar el avance narrativo del waw consecutivo de manera natural en español, y 'Sedequías' mantiene la forma bíblica usual del nombre propio.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura teológica y textual del nombre divino sigue el Tetragrámaton en el hebreo. Se evita la sustitución por un título para preservar la forma nominal del pacto, como exige la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נֶפֶשׁ en contexto de supervivencia
  english_pob_reading: your life will be spared
  chosen_spanish_reading: tu vida será preservada
  alternative_spanish_readings:
  - tu alma vivirá
  - tú vivirás
  rationale: En este contexto נֶפֶשׁ apunta a la vida/supervivencia concreta de Sedequías. 'Vida será preservada' evita introducir una antropología ajena al pasaje y conserva la tensión semántica hebrea.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene la alineación de alto acuerdo con la POB inglesa y conserva las alternativas documentadas en las notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el proyecto.
  - Se traduce צְבָאוֹת como 'los ejércitos' para respetar la cadena constructa del hebreo.
  - Se usa 'oficiales' para שָׂרֵי conforme al contexto de autoridad en Babilonia.
  - Se conserva la distinción semántica de נֶפֶשׁ como vida/supervivencia, no como 'alma' filosófica.
  - Se mantiene 'casa' en el texto principal y se aclara en nota la posible extensión a familia/hogar.
