review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido del hebreo: destinatarios en dativo (''a los...''), gentilicios colectivos para Rubén y Gad, ''media tribu'' para חצי שבט, y ''dijo'' para אָמַר. También maneja bien לֵאמֹר al absorberlo en la puntuación y conservar la nota explicativa. Sin embargo, el español omite el segundo ''y'' antes de ''a los gaditas'', aunque el hebreo lo repite coordinadamente en cada miembro; además, la ancla de nota está colocada en ''rubenitas'' cuando la nota explica el לֵאמֹר final.'
  spanish_quality_summary: 'El texto es claro y natural en español bíblico moderno. ''Rubenitas'', ''gaditas'', ''media tribu de Manasés'' y ''Josué dijo'' son legibles y dignos. La mejora necesaria es estilística y de precisión estructural: repetir ''y'' en la coordinación para corresponder mejor al original y mover la marca de nota al lugar relevante, junto a la coma final o al verbo introductorio.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres propios ('Josué', 'Manasés') y gentilicios están bien. No aparecen términos sensibles del glosario mayor. La decisión de no traducir לֵאמֹר como 'diciendo' en el cuerpo del texto está bien sustentada, pero la nota debe anclarse donde corresponde.
  issues:
  - severity: medium
    issue: Falta el segundo 'y' antes de 'a los gaditas'.
    rationale: 'El hebreo coordina cada destinatario con וְ (''y''), y la POB inglesa conserva ''and to'' repetido. En español puede suavizarse, pero aquí la repetición mejora la fidelidad sin sonar antinatural: ''Y a los rubenitas, y a los gaditas, y a la media tribu de Manasés...''.'
  - severity: medium
    issue: La nota [a] está anclada en 'rubenitas', pero su contenido explica לֵאמֹר al final del versículo.
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase relevante. La nota no comenta 'rubenitas' sino el infinitivo introductorio 'diciendo', absorbido en la puntuación final.
  revised_spanish_text: Y a los rubenitas, y a los gaditas, y a la media tribu de Manasés, Josué dijo,[a]
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «diciendo». El término introduce el discurso de Josué, que continúa en el versículo siguiente.'
    reason: lexical_alternative
