id: ISA.52.1
reference: Isaiah 52:1
source:
  edition: WLC
  text: עוּרִ֥י עוּרִ֛י לִבְשִׁ֥י עֻזֵּ֖/ךְ צִיּ֑וֹן לִבְשִׁ֣י בִּגְדֵ֣י תִפְאַרְתֵּ֗/ךְ יְרוּשָׁלִַ֨ם֙ עִ֣יר הַ/קֹּ֔דֶשׁ כִּ֣י לֹ֥א יוֹסִ֛יף יָבֹא בָ֥/ךְ ע֖וֹד עָרֵ֥ל וְ/טָמֵֽא׀־׃
translation:
  text: Awake[a], awake; put on your strength, Zion; put on your beautiful garments, Jerusalem, the holy city[b]. For no longer shall the uncircumcised and the unclean enter you again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put on your garments of splendor.'
    reason: lexical_alternative
  - marker: b
    text: '''The uncircumcised and the unclean'' preserves the Hebrew covenant and purity language; the phrase may refer broadly to those excluded from Jerusalem''s holiness.'
    reason: cultural_note
lexical_decisions:
- source_word: עוּרִי עוּרִי
  chosen: Awake, awake
  alternatives:
  - Rouse yourself, rouse yourself
  - Wake up, wake up
  lexicon: HALOT
  rationale: Imperative feminine singular repeated for urgency and poetic emphasis. 'Awake' is idiomatic, dignified modern English and preserves the repetition.
- source_word: לִבְשִׁי עֻזֵּךְ
  chosen: put on your strength
  alternatives:
  - clothe yourself with strength
  - dress yourself in your strength
  lexicon: HALOT
  rationale: Literal imagery of clothing oneself with strength. 'Put on' preserves the metaphor naturally in English without over-paraphrase.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place/personified city name, in keeping with the policy to transliterate names.
- source_word: לִבְשִׁי בִּגְדֵי תִפְאַרְתֵּךְ
  chosen: put on your beautiful garments
  alternatives:
  - put on your garments of splendor
  - clothe yourself in your glorious clothes
  lexicon: HALOT
  rationale: בִּגְדֵי is 'garments/clothes'; תִפְאֶרֶת denotes beauty, splendor, adornment, glory. 'Beautiful garments' is readable modern English and fits the restoration imagery, while 'splendor' is preserved as an alternative.
- source_word: יְרוּשָׁלִַם עִיר הַקֹּדֶשׁ
  chosen: Jerusalem, holy city
  alternatives:
  - Jerusalem, the holy city
  lexicon: HALOT
  rationale: Appositional address. Omitting the article in English keeps the vocative force smooth; the sense remains definite.
- source_word: כִּי לֹא יוֹסִיף יָבֹא בָךְ עוֹד
  chosen: For no longer shall ... enter you again
  alternatives:
  - For he will not continue to come into you anymore
  - For never again shall ... come into you
  lexicon: HALOT
  rationale: 'The idiom יוֹסִיף + infinitive/finite verb conveys cessation: ''no longer'' or ''never again.'' With עוֹד, the sense is emphatically future cessation. ''No longer shall ... again'' preserves the Hebrew emphasis without sounding wooden.'
- source_word: יָבֹא בָךְ
  chosen: enter you
  alternatives:
  - come into you
  - enter into you
  lexicon: HALOT
  rationale: בוא + ב marks entry into the city. 'Enter you' is concise and idiomatic enough in elevated English; 'enter into you' is unnecessarily heavy.
- source_word: עָרֵל
  chosen: the uncircumcised
  alternatives:
  - the foreskinned
  - the uncircumcised one
  lexicon: HALOT
  rationale: Standard lexical sense. In this context it functions collectively for those outside covenant holiness, so the plural collective in English is appropriate.
- source_word: וְטָמֵא
  chosen: and the unclean
  alternatives:
  - and the impure
  lexicon: HALOT
  rationale: טָמֵא commonly denotes ritual or moral uncleanness depending on context. 'Unclean' preserves the broader biblical resonance and avoids prematurely narrowing the sense.
