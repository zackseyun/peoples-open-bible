translation:
  language: es
  text: Tú cubriste la tierra con tu sabiduría[a], y llenaste las alturas con canto de alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Tu nombre llegó a islas lejanas, y fuiste amado en tu paz». El griego refleja una forma textual sustancialmente distinta del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ארץ כסית
  english_pob_choice: You covered the earth
  chosen_spanish: Tú cubriste la tierra
  alternatives_spanish:
  - Tú vestiste la tierra
  - Tú cubriste la tierra por completo
  lexicon: HALOT
  rationale: כסה normalmente significa 'cubrir'; 'cubriste la tierra' conserva la imagen concreta y se ajusta bien al español natural.
- source_word: בחכמתך
  english_pob_choice: with your wisdom
  chosen_spanish: con tu sabiduría
  alternatives_spanish:
  - por tu sabiduría
  - mediante tu sabiduría
  lexicon: HALOT
  rationale: La preposición ב permite un valor instrumental; 'con tu sabiduría' suena natural en español y mantiene ese sentido.
- source_word: ותקלס
  english_pob_choice: you filled
  chosen_spanish: llenaste
  alternatives_spanish:
  - adornaste
  - hiciste resonar
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el paralelo griego difiere; 'llenaste' recoge mejor la imagen de completar/colmar los espacios altos con el canto sin forzar un sentido demasiado específico.
- source_word: במרום
  english_pob_choice: the heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - el alto
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: מרום puede referirse a alturas físicas o celestiales; 'las alturas' conserva la apertura poética del hebreo.
- source_word: שירה
  english_pob_choice: song of praise
  chosen_spanish: cántico de alabanza
  alternatives_spanish:
  - canción de alabanza
  - canto de alabanza
  - cántico
  lexicon: HALOT
  rationale: שירה significa 'canto/canción'; 'cántico de alabanza' expresa bien el matiz laudatorio sin perder dignidad bíblica.
theological_decisions:
- issue: Preferencia por el testimonio hebreo frente al paralelo griego divergente
  english_pob_reading: Main text follows the extant Hebrew witness while the Greek parallel is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, con la variante griega indicada en nota.
  alternative_spanish_readings:
  - 'Traducir según el griego: ''Tu nombre llegó a las islas lejanas, y fuiste amado en tu paz.'''
  rationale: En Sirácida, cuando el hebreo está disponible y es confiable, el proyecto prioriza ese testimonio. La nota conserva transparentemente la forma griega, que presenta un contenido sustancialmente distinto.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como control real'
- issue: Sentido poético de 'sabiduría' y 'cántico de alabanza'
  english_pob_reading: You covered the earth with your wisdom, and you filled the heights with song of praise.
  chosen_spanish_reading: La sabiduría y el canto se expresan como imágenes poéticas de difusión y plenitud.
  alternative_spanish_readings:
  - Leer el verso de forma más literal y menos poética.
  - Sustituir 'cántico de alabanza' por 'alabanza'.
  rationale: No hay base para suavizar la imaginería; el verso conserva una expansión de sabiduría y una plenitud sonora en lo alto. 'Cántico de alabanza' retiene esa doble dimensión.
  doctrine_reference: 'PHILOSOPHY.md: mantener la imaginería cuando el idioma receptor la admite'
translation_notes:
  revision_awareness: El borrador sigue la decisión revisada del POB inglés de traducir שירה como 'song of praise'; en español se optó por 'cántico de alabanza' para conservar la elevación poética y la claridad semántica. También se tomó en cuenta la divergencia textual entre el hebreo de Kahana y el paralelo griego de Swete, manteniendo el hebreo como texto principal y registrando la alternativa griega en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino explícito; aquí no aplica.
  - '''Sabiduría'' traduce בחכמתך de forma consistente con el proyecto.'
  - Se evitó 'SEÑOR' o una paráfrasis que ocultara la diferencia textual con el griego.
  - La nota al pie marca la divergencia textual con el paralelo griego y no introduce una reinterpretación doctrinal.
