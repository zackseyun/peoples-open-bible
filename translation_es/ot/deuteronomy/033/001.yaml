translation:
  language: es
  text: 'Esta es la bendición con la que Moisés[a], el hombre de Dios, bendijo a los hijos de Israel antes de su muerte:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel», expresión colectiva estándar para el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: Now this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Ahora esta
  - Esta
  lexicon: HALOT
  rationale: El hebreo introduce una nueva sección con la conjunción más el demostrativo. En español, «Y esta» conserva esa transición discursiva de forma natural y sin añadir contenido que el texto no tenga.
- source_word: הַבְּרָכָה
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la bendición ésta
  - esta bendición
  lexicon: HALOT
  rationale: El sustantivo designa una bendición formal o pronunciación de bendición. «La bendición» preserva el artículo definido y el valor nominal del hebreo.
- source_word: אֲשֶׁר בֵּרַךְ
  english_pob_choice: with which ... blessed
  chosen_spanish: con la que ... bendijo
  alternatives_spanish:
  - con la cual ... bendijo
  - que ... bendijo
  lexicon: HALOT
  rationale: La cláusula relativa modifica «la bendición». En español, «con la que Moisés... bendijo» expresa de modo natural el valor instrumental implícito en la construcción hebrea, sin ampliar el sentido.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: N/A
  rationale: Nombre propio bíblico establecido en español bíblico y plenamente inteligible para la lectura eclesial.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el siervo de Dios
  lexicon: HALOT
  rationale: Es un título hebreo reconocido para un profeta o mensajero comisionado por Dios. «El hombre de Dios» reproduce con fidelidad la forma y mantiene la transparencia del título sin sustituirlo por una expresión interpretativa.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel (colectivo)
  - al pueblo de Israel
  - a los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo («hijos de Israel»), en línea con la precisión léxica del original y con la práctica de no neutralizar el colectivo sin necesidad textual.
- source_word: לִפְנֵי מוֹתוֹ
  english_pob_choice: before his death
  chosen_spanish: antes de su muerte
  alternatives_spanish:
  - antes de morir
  - antes de que muriera
  lexicon: HALOT
  rationale: La construcción nominal temporal del hebreo se vierte de forma directa y formal como «antes de su muerte», manteniendo la equivalencia más cercana al original.
theological_decisions:
- issue: Conservar la forma masculina colectiva «hijos de Israel»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los israelitas
  - los hijos de Israel
  rationale: El texto hebreo usa el plural masculino constructo «hijos de». En español, esta forma conserva la huella del original y evita neutralizar el colectivo. Para evitar una lectura excesivamente restringida, la misma forma se deja explícita en el texto principal, sin cambiarla por un equivalente más genérico.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del audit trail, que indica que no hubo cambios necesarios en la revisión última y que existe alto grado de acuerdo entre los controles de calidad. No se introducen innovaciones textuales ni se altera ninguna decisión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como forma bíblica establecida en español.
  - Se conserva «hijos de Israel» para reflejar con precisión el hebreo masculino plural.
  - «Bendición» y «bendijo» reproducen la raíz léxica del original de forma consistente.
  - La puntuación con dos puntos al final refleja el arranque de sección que tiene el hebreo y coincide con la función discursiva de la frase.
