translation:
  language: es
  text: Y llevará a Sedequías a Babilonia, y allí permanecerá hasta que yo me ocupe de él[a], declara Yahvé. Si luchan contra los caldeos[b], no tendrán éxito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que yo lo visite»; el verbo hebreo también puede significar «hasta que yo lo castigue», según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: «Caldeos» designa aquí el poder babilónico.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  lexicon: HALOT
  rationale: Con el verbo causativo de movimiento, el destino es Babilonia; en español bíblico natural, 'a Babilonia' comunica la dirección sin cargar matices innecesarios.
- source_word: יוֹלִךְ
  english_pob_choice: he will take
  chosen_spanish: lo llevará
  alternatives_spanish:
  - lo traerá
  - lo conducirá
  lexicon: HALOT
  rationale: El hiphil de הלך expresa hacer ir / llevar. 'Lo llevará' conserva el movimiento forzado y suena natural en español sin precisar más de lo que exige el contexto de deportación.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Zedecías
  lexicon: convención onomástica
  rationale: Nombre propio transliterado conforme al uso bíblico estándar en español.
- source_word: וְשָׁם יִהְיֶה
  english_pob_choice: and there he will remain
  chosen_spanish: y allí permanecerá
  alternatives_spanish:
  - y allí estará
  - y allí se quedará
  lexicon: HALOT
  rationale: Literalmente dice 'y allí estará'; 'permanecerá' preserva la continuidad de la estancia en cautiverio con buena naturalidad en español.
- source_word: עַד פָּקְדִי אֹתוֹ
  english_pob_choice: until I attend to him
  chosen_spanish: hasta que yo me ocupe de él
  alternatives_spanish:
  - hasta que yo lo visite
  - hasta que yo trate con él
  - hasta que yo lo castigue
  lexicon: HALOT
  rationale: פּקד tiene un rango semántico amplio. 'Me ocupe de él' conserva esa amplitud y evita cerrar prematuramente si se trata de visita, intervención o juicio, tal como el audit trail inglés busca mantener la tensión teológica.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: fórmula profética
  rationale: 'Se mantiene la fórmula profética solemne con el nombre divino según el criterio del proyecto: Yahvé.'
- source_word: כִּי תִלָּחֲמוּ
  english_pob_choice: If you fight
  chosen_spanish: Si luchan
  alternatives_spanish:
  - Si combaten
  - Aunque luchen
  lexicon: HALOT
  rationale: El כִּי aquí funciona condicionalmente en contexto, no concesivamente. 'Luchan' expresa el combate de forma directa y moderna, con sujeto plural implícito colectivo.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo hebreo tradicional 'caldeos' en lugar de interpretar con 'babilonios', siguiendo el equivalente léxico directo.
- source_word: לֹא תַצְלִיחוּ
  english_pob_choice: you will not succeed
  chosen_spanish: no tendrán éxito
  alternatives_spanish:
  - no prosperarán
  - no prevalecerán
  lexicon: HALOT
  rationale: El hiphil de צלח puede significar prosperar/suceder. 'Tendrán éxito' comunica el fracaso del intento militar de manera clara en español, sin intensificar indebidamente hacia 'prevalecer'.
theological_decisions:
- issue: Alcance semántico de פקד en la palabra de Yahvé
  english_pob_reading: until I attend to him
  chosen_spanish_reading: hasta que yo me ocupe de él
  alternative_spanish_readings:
  - hasta que yo lo visite
  - hasta que yo lo castigue
  - hasta que yo intervenga con él
  rationale: El texto no obliga a decidir entre atención, visita o castigo. Se conserva la ambigüedad funcional para no resolver teológicamente lo que el hebreo deja abierto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Condicionalidad de כִּי en la advertencia final
  english_pob_reading: If you fight against the Chaldeans, you will not succeed.
  chosen_spanish_reading: Si luchan contra los caldeos, no tendrán éxito.
  alternative_spanish_readings:
  - Aunque luchen contra los caldeos, no tendrán éxito.
  - Porque lucharán contra los caldeos, no tendrán éxito.
  rationale: La revisión inglesa más reciente entiende כִּי aquí como condicional. La traducción española sigue esa lectura para no introducir una concesión que el contexto no exige.
  doctrine_reference: Revisión auditada 2026-04-23; decisión sintáctica contextual
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que cambió la cláusula de «though you fight» a «if you fight» para reflejar el valor condicional de כִּי en este contexto. También se mantuvo la decisión de preservar la amplitud semántica de פָּקַד sin estrecharla prematuramente a castigo o visita exclusiva.
  spanish_consistency_notes:
  - Se usó Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se prefirió 'caldeos' como etnónimo directo, con nota explicativa por su referencia histórica al poder babilónico.
  - La construcción verbal mantiene un futuro simple natural en español para el hebreo imperfectivo profético.
  - No se introdujeron términos eclesiásticos ajenos al hebreo; la sintaxis busca ser fiel y publicable en español contemporáneo.
