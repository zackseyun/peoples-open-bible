id: PS151.1.1
reference: Psalm 151 1:1
source:
  edition: lxx-swete-1909
  text: Μικρὸς ἤμην ἐν τοῖς ἀδελφοῖς μου, καὶ νεώτερος ἐν τῷ οἴκῳ τοῦ πατρός μου· ἔποιμαινον τὰ πρόβατα τοῦ πατρός μου.
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: I was small among my brothers[a], and the youngest in my father's house[b]; I was shepherding my father's sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'little among my brothers.' The Greek adjective can suggest smallness, youth, or low status.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I shepherded my father''s sheep.'' The Greek imperfect may emphasize ongoing past action: ''I was shepherding.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Μικρὸς
  chosen: small
  alternatives:
  - little
  - young
  - least
  lexicon: LSJ
  rationale: The adjective primarily denotes smallness/littleness. In this autobiographical context it can imply insignificance or youth, but 'small' preserves the literal sense without over-interpreting it as status ('least') or age alone ('young').
- source_word: ἐν τοῖς ἀδελφοῖς μου
  chosen: among my brothers
  alternatives:
  - among my brothers and sisters
  - among my siblings
  lexicon: LSJ
  rationale: ἀδελφοῖς is grammatically masculine plural and in David's family context refers to his male brothers. Per gender-accurate policy, 'brothers' is retained.
- source_word: νεώτερος
  chosen: younger
  alternatives:
  - youngest
  - more youthful
  lexicon: LSJ
  rationale: The comparative adjective means 'younger' or 'more youthful.' 'Youngest' would overstate the form, since the Greek comparative does not itself require a superlative sense here.
- source_word: ἐν τῷ οἴκῳ τοῦ πατρός μου
  chosen: in my father's house
  alternatives:
  - in my father's household
  lexicon: LSJ
  rationale: οἶκος can mean house or household. 'House' is kept in the main text as a natural rendering that also preserves the familial setting; 'household' remains a viable nuance but is not necessary here.
- source_word: ἔποιμαινον
  chosen: I was shepherding
  alternatives:
  - I shepherded
  - I was tending
  lexicon: LSJ
  rationale: The imperfect verb conveys ongoing past action. 'I was shepherding' preserves that aspect better than the simple past. 'Tending' is possible but loses the verbal link to shepherding imagery.
- source_word: τὰ πρόβατα
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: LSJ
  rationale: πρόβατα refers concretely to sheep. 'Flock' is smoother English but less specific than the Greek noun.
