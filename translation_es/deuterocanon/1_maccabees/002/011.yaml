review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: pérdida total del honor/esplendor y reversión de libertad a esclavitud. Mantiene correctamente κόσμος como «gloria» y δούλην como «esclava». Sin embargo, «llegó a ser esclava» añade un matiz aspectual no exigido por ἐγενήθη, y «estar libre» es menos preciso que «ser libre» o una formulación nominal en el contraste de estatus.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para sonar más directo y fiel al contraste de condición. «En lugar de ser libre[a], se volvió esclava» o «en vez de ser libre[a], llegó a ser esclava» serían aceptables; la opción más sobria y fiel aquí es «en lugar de ser libre[a], se volvió esclava». La nota al pie está bien formulada.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «gloria» para κόσμος en este contexto es defendible con nota alternativa; «esclava» respeta la política para δοῦλος/δούλη; no hay términos doctrinales conflictivos adicionales.'
  issues:
  - severity: medium
    issue: «estar libre» para ἐλευθέρας
    rationale: El griego contrasta estados/condiciones sociales personificados, no un estado circunstancial pasajero. En español, «ser libre» expresa mejor ese estatus que «estar libre».
  - severity: low
    issue: «llegó a ser» para ἐγενήθη
    rationale: Aunque no es incorrecto, introduce un matiz de proceso o desarrollo no necesario. «Se volvió» o «vino a ser» conservan mejor la simple transformación de condición.
  - severity: low
    issue: Alternativa «bondada» en decisiones léxicas
    rationale: Parece ser un error por «esclava»/«sierva»/«mujer esclava» o calco fallido de bondwoman. No afecta el texto bíblico, pero conviene corregirlo en el registro editorial.
  revised_spanish_text: Toda su gloria le fue quitada; en lugar de ser libre[a], se volvió esclava.
  revised_footnotes:
  - marker: a
    text: O «Todo su adorno/esplendor le fue quitado». Aquí κόσμος significa adorno o esplendor, no «mundo».
