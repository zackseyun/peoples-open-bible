  to: Pero cuando él ya había llegado allí con los guardias en la tesorería[a], el Soberano de los espíritus y de toda autoridad hizo una gran manifestación[b], de modo que todos los que se habían atrevido a entrar[c], sobrecogidos por el poder de Dios, fueron reducidos a debilidad y temor.
  rationale: Se ajusta γαζοφυλάκιον a 'tesorería' para reflejar mejor un lugar/depósito y mejorar la naturalidad del español en contexto. Se corrige la nota a para que la alternativa sea coherente con el texto principal. El resto del borrador es fiel y no requiere cambios sustanciales.
