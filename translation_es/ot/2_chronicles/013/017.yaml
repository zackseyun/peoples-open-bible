translation:
  language: es
  text: Abías y su pueblo les asestaron un gran golpe[a], y cayeron muertos quinientos mil hombres escogidos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un golpe severo» o «una gran matanza». La expresión hebrea dice literalmente «un gran golpe».
    reason: lexical_alternative
  - marker: b
    text: O «quinientos mil hombres escogidos de Israel» o «quinientos mil hombres seleccionados de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck
  chosen_spanish: derrotaron
  alternatives_spanish:
  - golpearon
  - hirieron
  - abatieron
  lexicon: HALOT
  rationale: En español, en un relato bélico, «derrotaron» comunica el resultado militar que el contexto inmediato aclara, sin perder la idea concreta de acción violenta. «Golpearon» suena demasiado físico y menos natural como resumen de victoria; «abatieron» sería posible, pero menos neutro.
- source_word: בָהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: HALOT
  rationale: El pronombre objeto directo en español recoge naturalmente el referente adversario ya mencionado. «Los» es la opción más fluida y fiel en este contexto.
- source_word: אֲבִיָּה וְעַמּוֹ
  english_pob_choice: Abijah and his people
  chosen_spanish: Abías y su pueblo
  alternatives_spanish:
  - Abías y su gente
  - Abías y su ejército
  lexicon: HALOT
  rationale: «Pueblo» mantiene la correspondencia con עַם y preserva el matiz amplio del hebreo, sin restringirlo innecesariamente a «ejército». «Gente» es más coloquial; «ejército» interpreta más de lo que el término dice.
- source_word: מַכָּה רַבָּה
  english_pob_choice: with a great blow
  chosen_spanish: con un gran golpe
  alternatives_spanish:
  - con una gran matanza
  - con un severo golpe
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «un gran golpe». «Gran golpe» conserva esa concreción y deja que la cláusula siguiente explicite las muertes. «Matanza» ya adelanta el resultado y borra la secuencia del hebreo.
- source_word: וַיִּפְּלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayeron abatidos
  - perecieron
  lexicon: HALOT
  rationale: «Cayeron» reproduce de forma natural el valor narrativo de «fell» en un reporte de batalla. La idea de muerte queda especificada por «muertos».
- source_word: חֲלָלִים
  english_pob_choice: slain
  chosen_spanish: muertos
  alternatives_spanish:
  - caídos
  - degollados
  - abatidos
  lexicon: HALOT
  rationale: En español, «cayeron muertos» es una construcción idiomática y clara para el resultado de batalla. «Slain» no tiene un equivalente único y directo; «muertos» evita sobrecargar el verso con una formulación arcaica.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - entre Israel
  lexicon: HALOT
  rationale: «De Israel» identifica el grupo de procedencia de los caídos de manera natural y concisa. Otras opciones suenan más analíticas sin aportar más fidelidad.
- source_word: חֲמֵשׁ מֵאוֹת אֶלֶף
  english_pob_choice: five hundred thousand
  chosen_spanish: quinientos mil
  alternatives_spanish:
  - quinientas mil
  - '500.000'
  lexicon: HALOT
  rationale: Es la equivalencia numeral directa y estándar en español.
- source_word: אִישׁ בָּחוּר
  english_pob_choice: chosen men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - hombres escogidos y valientes
  - hombres seleccionados
  - varones escogidos
  lexicon: HALOT
  rationale: «Escogidos» expresa bien בחור como seleccionados o de élite, y «hombres» recoge איש en este uso distributivo con el número. «Varones» sería más rígido; «valientes» introduce un rasgo no explicitado por el hebreo.
theological_decisions:
- issue: Cantidad elevada de bajas en combate
  english_pob_reading: Retain the stated number as given in the Hebrew text without reinterpretation.
  chosen_spanish_reading: Mantener la cifra tal como aparece en el hebreo, sin rebajarla ni convertirla en símbolo.
  alternative_spanish_readings:
  - tratarla como hipérbole narrativa
  - emendar el número
  - leerla como cifra de unidad militar
  rationale: El verso presenta el número de manera directa y el texto no ofrece una señal interna para reducirlo. La traducción debe reflejar el testimonio del pasaje y dejar las cuestiones histórico-críticas fuera del texto principal.
  doctrine_reference: Fidelidad textual y prudencia exegética en narrativas históricas.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el criterio del POB en inglés: conserva la secuencia «golpe» + «caídos muertos», y mantiene la cifra sin reinterpretación. Se ajustó el español para evitar un calco duro de «struck them» y para que la construcción final suene natural y pública en español.'
  spanish_consistency_notes:
  - Se conserva «Abías» como forma española del nombre.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - «Pueblo» traduce עַם con el matiz amplio de gente/seguidores, no necesariamente ejército formal.
  - La duplicación semántica «cayeron muertos» refleja el paralelismo hebreo entre el verbo de caída y el sustantivo de muertos en batalla.
