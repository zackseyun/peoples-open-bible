translation:
  language: es
  text: Por tanto, yo le daré su porción entre los muchos[a], y repartirá el botín con los fuertes, porque derramó su vida hasta la muerte y fue contado entre los transgresores[b]; sin embargo, llevó el pecado de muchos y intercede[c] por los transgresores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "le daré una parte con los muchos". El hebreo de la primera cláusula es compacto y admite más de una comprensión muy cercana.'
    reason: alternative_reading
  - marker: b
    text: 'O: "fue contado con los transgresores".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "hace intercesión por los transgresores". El verbo hebreo puede expresarse de manera más formal o más idiomática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  - Por consiguiente
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la conclusión o resultado que introduce el verso, manteniendo el valor discursivo causal/consecutivo del hebreo.
- source_word: אֲחַלֶּק לוֹ בָרַבִּים
  english_pob_choice: I will allot him a portion among the many
  chosen_spanish: le daré su porción entre los muchos
  alternatives_spanish:
  - le asignaré una porción entre los muchos
  - le repartiré una parte entre los muchos
  - le daré una parte con los muchos
  lexicon: HALOT
  rationale: El hebreo es compacto y admite más de una lectura cercana. 'Le daré su porción' conserva la idea de asignación/apartamiento y evita forzar una paráfrasis más interpretativa. 'Entre los muchos' mantiene רַבִּים sin resolver su alcance teológico.
- source_word: עֲצוּמִים
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los valientes
  - los robustos
  lexicon: HALOT
  rationale: En el paralelismo militar del verso, 'los fuertes' comunica bien el sentido de personas vigorosas o poderosas sin introducir matices ajenos.
- source_word: יְחַלֵּק שָׁלָל
  english_pob_choice: he will divide plunder
  chosen_spanish: repartirá el botín
  alternatives_spanish:
  - dividirá el botín
  - repartirá el despojo
  - distribuirá el botín
  lexicon: HALOT
  rationale: '''Botín'' es el equivalente español más natural para שָׁלָל en contexto bélico, y ''repartirá'' conserva la acción distributiva del verbo.'
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - en razón de que
  lexicon: HALOT
  rationale: Introduce de forma directa la base causal de la exaltación y comparte la claridad del inglés POB sin perder la relación lógica del hebreo.
- source_word: הֶעֱרָה לַמָּוֶת נַפְשׁוֹ
  english_pob_choice: he poured out his life to death
  chosen_spanish: derramó su vida hasta la muerte
  alternatives_spanish:
  - derramó su alma hasta la muerte
  - entregó su vida a la muerte
  - vertió su vida hasta la muerte
  lexicon: HALOT
  rationale: '''Derramó'' reproduce bien la imagen verbal de vaciar/verter. ''Vida'' comunica נֶפֶשׁ como la vida misma de la persona, y ''hasta la muerte'' mantiene el destino extremo sin suavizar la imagen.'
- source_word: וְאֶת פֹּשְׁעִים נִמְנָה
  english_pob_choice: and was numbered with transgressors
  chosen_spanish: y fue contado con los transgresores
  alternatives_spanish:
  - y fue enumerado con los transgresores
  - y fue considerado entre los transgresores
  - y fue contado entre los rebeldes
  lexicon: HALOT
  rationale: '''Fue contado'' es la forma española más natural para el pasivo de נמנה y preserva la idea de ser incluido en un grupo. ''Transgresores'' retiene el matiz moral-legal de פֹּשְׁעִים.'
- source_word: פֹּשְׁעִים
  english_pob_choice: transgressors
  chosen_spanish: transgresores
  alternatives_spanish:
  - rebeldes
  - ofensores
  - pecadores
  lexicon: HALOT
  rationale: '''Transgresores'' conserva la fuerza de פשע como rebelión o quebranto deliberado, sin reducirlo a pecado genérico.'
- source_word: וְהוּא
  english_pob_choice: yet he
  chosen_spanish: sin embargo,
  alternatives_spanish:
  - y él
  - pero él
  - con todo, él
  lexicon: HALOT
  rationale: En español conviene marcar la contraposición entre ser contado con transgresores y, a la vez, cargar con el pecado de muchos. 'Sin embargo' expresa bien ese giro adversativo.
- source_word: חֵטְא רַבִּים נָשָׂא
  english_pob_choice: he bore the sin of many
  chosen_spanish: llevó el pecado de muchos
  alternatives_spanish:
  - cargó con el pecado de muchos
  - soportó el pecado de muchos
  - llevó sobre sí el pecado de muchos
  lexicon: HALOT
  rationale: '''Llevó'' es un verbo natural para נָשָׂא cuando expresa carga representativa o sacrificial. ''Pecado'' mantiene el singular colectivo del hebreo y ''de muchos'' preserva רַבִּים sin ampliarlo.'
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - los muchos
  - multitudes
  lexicon: HALOT
  rationale: Se conserva la repetición de 'muchos' para reflejar el hebreo y no resolver el alcance del término con una equivalencia doctrinal ajena al texto.
- source_word: וְלַפֹּשְׁעִים יַפְגִּיעַ
  english_pob_choice: and intercedes for transgressors
  chosen_spanish: intercede por los transgresores
  alternatives_spanish:
  - intercede a favor de los transgresores
  - hace intercesión por los transgresores
  - ruega por los transgresores
  lexicon: HALOT
  rationale: El verbo puede expresar intercesión o súplica dirigida a favor de otros. En español, 'intercede por' es claro y fiel, y mantiene la posibilidad de una acción mediadora sin cerrarla en una sola fórmula teológica.
theological_decisions:
- issue: Alcance de רַבִּים ('many')
  english_pob_reading: Render as 'many' without resolving whether it is rhetorically equivalent to 'all' or a more limited group.
  chosen_spanish_reading: Traducir como 'muchos' sin decidir si equivale retóricamente a 'todos' o a un grupo más restringido.
  alternative_spanish_readings:
  - todos
  - la multitud
  - los muchos
  rationale: El hebreo dice 'muchos'. La traducción conserva ese término y evita introducir una conclusión doctrinal que el verso no explicita por sí mismo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Sentido sacrificial de נָשָׂא חֵטְא
  english_pob_reading: Render 'he bore the sin of many' with sacrificial/representative force preserved but not expanded.
  chosen_spanish_reading: Traducir 'llevó el pecado de muchos' conservando la fuerza representativa/sacrificial sin ampliarla.
  alternative_spanish_readings:
  - quitó el pecado de muchos
  - cargó con el pecado de muchos
  - sufrió por el pecado de muchos
  rationale: La expresión debe seguir siendo suficientemente abierta para conservar la densidad del hebreo y no reducirse a una sola formulación doctrinal posterior.
  doctrine_reference: Primacía del original; preservar la tensión teológica.
- issue: Valor de יַפְגִּיעַ
  english_pob_reading: Use present-like English 'intercedes for transgressors' to express the verb's petitionary sense.
  chosen_spanish_reading: Usar 'intercede por los transgresores' como forma natural y de valor presente/gnómico.
  alternative_spanish_readings:
  - hace intercesión por los transgresores
  - intercedió por los transgresores
  - ruega por los transgresores
  rationale: El hebreo permite una lectura de súplica/intercesión. El presente español conserva bien esa cualidad general y evita cerrar el sentido únicamente en pasado.
  doctrine_reference: Equivalencia óptima; mantener la tensión interpretativa.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: se conserva la estructura causal ''Por tanto... porque...'', se mantiene ''muchos'' sin universalizarlo, y se refleja la lectura mediadora final con ''intercede por''. Se ajustó la sintaxis española para sonar natural sin perder la compactación y la ambigüedad controlada del hebreo.'
  spanish_consistency_notes:
  - Se usa 'transgresores' de manera uniforme para פֹּשְׁעִים en ambas apariciones.
  - Se mantiene 'muchos' en la primera y la segunda mitad del verso para reflejar la repetición del hebreo.
  - '''Pecado'' se deja en singular colectivo como en el מקור hebreo.'
  - El registro es digno y contemporáneo, sin depender de fórmulas eclesiásticas tradicionales que oculten el término 'transgresores'.
