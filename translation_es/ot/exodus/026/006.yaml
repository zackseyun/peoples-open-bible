translation:
  language: es
  text: Harás cincuenta broches de oro[a], y unirás las cortinas una a otra con los broches, de modo que el tabernáculo sea uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «las cortinas, una mujer a su hermana». Es un modismo hebreo que indica que las cortinas debían unirse de manera correspondiente una a otra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás entonces
  lexicon: HALOT
  rationale: La forma verbal en secuencia tiene fuerza directiva. En español, «harás» conserva el mandato sin volverse artificioso; el inicio con «Y» es posible, pero aquí se omitió para una fluidez natural en el contexto de instrucciones.
- source_word: חֲמִשִּׁים קַרְסֵי זָהָב
  english_pob_choice: fifty gold clasps
  chosen_spanish: cincuenta broches de oro
  alternatives_spanish:
  - cincuenta clasps de oro
  - cincuenta ganchos de oro
  - cincuenta broches dorados
  lexicon: HALOT
  rationale: קֶרֶס designa un elemento de sujeción para unir las cortinas; «broches» comunica bien la función sin precisar de más la forma. «De oro» expresa el material de manera directa y fiel.
- source_word: וְחִבַּרְתָּ
  english_pob_choice: and join
  chosen_spanish: unirás
  alternatives_spanish:
  - juntarás
  - conectarás
  - enlazarás
  lexicon: HALOT
  rationale: חבר significa unir o conectar. «Unirás» es natural en español y conserva la idea de ensamblar las piezas del santuario.
- source_word: הַיְרִיעֹת
  english_pob_choice: the curtains
  chosen_spanish: las cortinas
  alternatives_spanish:
  - los paños
  - los lienzos
  - los paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה refiere a las cortinas o paños de lona del santuario. «Cortinas» es la opción más clara y estable para el lector español.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  english_pob_choice: to one another
  chosen_spanish: una a otra
  alternatives_spanish:
  - cada una con su hermana
  - de manera correspondiente
  - una con la otra
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal («mujer a su hermana») para expresar correspondencia entre objetos inanimados. «Una a otra» mantiene el sentido relacional sin introducir una expresión extraña en el cuerpo principal.
- source_word: בַּקְּרָסִים
  english_pob_choice: with the clasps
  chosen_spanish: con los broches
  alternatives_spanish:
  - por medio de los broches
  - mediante los broches
  - con las presillas
  lexicon: HALOT
  rationale: La preposición indica instrumento. «Con los broches» es la forma más natural en español para expresar el medio de unión.
- source_word: וְהָיָה הַמִּשְׁכָּן אֶחָד
  english_pob_choice: so that the tabernacle may be one
  chosen_spanish: de modo que el tabernáculo sea uno
  alternatives_spanish:
  - y el tabernáculo será uno
  - para que el tabernáculo sea uno
  - así el tabernáculo será uno
  lexicon: HALOT
  rationale: La cláusula expresa resultado. «De modo que» reproduce bien la relación resultativa; «sea uno» conserva la unidad/totalidad del tabernáculo sin suavizarla en exceso.
theological_decisions:
- issue: Renderización de מִשְׁכָּן
  english_pob_reading: tabernacle
  chosen_spanish_reading: tabernáculo
  alternative_spanish_readings:
  - morada
  - lugar de morada
  - habitación
  rationale: En Éxodo, מִשְׁכָּן es el término técnico del santuario portátil. «Tabernáculo» preserva ese valor técnico mejor que una paráfrasis más genérica.
  doctrine_reference: Exodus sanctuary terminology
- issue: Unidad del tabernáculo
  english_pob_reading: so that the tabernacle may be one
  chosen_spanish_reading: de modo que el tabernáculo sea uno
  alternative_spanish_readings:
  - para que el tabernáculo esté unido
  - y el tabernáculo quede unido
  rationale: «Sea uno» conserva la formulación concisa del hebreo y deja visible la idea de unidad estructural lograda por la unión de las cortinas, sin convertirla en una explicación interpretativa más amplia.
  doctrine_reference: Exodus 26:6 sanctuary construction
- issue: Tensión idiomática de אִשָּׁה אֶל אֲחֹתָהּ
  english_pob_reading: Literally, 'the curtains, each woman to her sister'—a Hebrew idiom meaning the curtains are to be joined correspondingly to one another.
  chosen_spanish_reading: una a otra
  alternative_spanish_readings:
  - cada una con su hermana
  - correspondientemente
  - de manera equivalente
  rationale: El español necesita resolver el modismo hebreo sin perder la correspondencia entre piezas. «Una a otra» comunica la relación mutua y evita una literalidad confusa en el texto principal.
  doctrine_reference: Hebrew idiom in Exodus 26:6
translation_notes:
  revision_awareness: El inglés POB fue revisado sin cambios y alcanzó alto acuerdo en la auditoría; esta versión española sigue esa lectura estable, manteniendo el valor técnico de los términos del tabernáculo y resolviendo en nota el modismo hebreo de correspondencia.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para מִשְׁכָּן según el uso técnico de Éxodo.
  - Se usa «broches» para קַרְסֵי, coherente con la función de unión, sin especificar más la forma.
  - Se conserva la relación resultativa con «de modo que» para reflejar la clausula final hebrea.
  - La nota reproduce el modismo literal para no borrar la tensión idiomática documentada en el POB inglés.
