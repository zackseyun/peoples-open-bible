translation:
  language: es
  text: y para el registro genealógico de todos sus pequeños[a], sus esposas, sus hijos y sus hijas, para toda la asamblea; porque en su fidelidad[b] se consagraron en santidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el registro genealógico de todos sus hijos». El verbo hebreo se refiere al ingreso en listas familiares o genealógicas.'
    reason: lexical_alternative
  - marker: b
    text: «Fidelidad» aquí probablemente significa confiabilidad o lealtad al cumplir deberes sagrados, no principalmente creencia interior.
    reason: lexical_alternative
  - marker: c
    text: 'O: «se consagraron como santos» o «se mantuvieron santos». El hebreo repite la idea de santidad con verbo y sustantivo para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהִתְיַחֵשׂ
  english_pob_choice: and for the enrollment
  chosen_spanish: y para el registro genealógico
  alternatives_spanish:
  - y para el enrolamiento
  - y para la inscripción genealógica
  lexicon: HALOT
  rationale: El hitpael de יחס en Crónicas alude al ingreso en listas familiares o genealógicas. En español, 'registro genealógico' conserva el sentido administrativo y la referencia a linaje; 'enrolamiento' sería menos natural aquí, y 'inscripción genealógica' es más pesada.
- source_word: בְּכָל טַפָּם
  english_pob_choice: of all their little ones
  chosen_spanish: de todos sus pequeños
  alternatives_spanish:
  - de todos sus hijos pequeños
  - de todos sus niños
  lexicon: HALOT
  rationale: טַף designa a los pequeños/niños de corta edad. 'Pequeños' preserva la especificidad léxica sin ampliar indebidamente a todo el hogar; 'hijos pequeños' añade una precisión no explícita en el hebreo.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: En esta enumeración doméstica, 'esposas' es la correspondencia idiomática y precisa. 'Mujeres' sería más amplio e impreciso en español.
- source_word: וּבְנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their sons, and their daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos, e hijas
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente varones y mujeres de la descendencia; en español, 'hijos y hijas' mantiene esa distinción. 'Descendientes' o 'hijos' sin más la borraría.
- source_word: לְכָל קָהָל
  english_pob_choice: for all the assembly
  chosen_spanish: para toda la asamblea
  alternatives_spanish:
  - para toda la congregación
  - para todo el pueblo reunido
  lexicon: HALOT
  rationale: קָהָל se refiere al cuerpo reunido. 'Asamblea' es la opción más directa y estable; 'congregación' sería posible, pero puede sonar más eclesial que el contexto permite.
- source_word: בֶאֱמוּנָתָם
  english_pob_choice: in their faithfulness
  chosen_spanish: en su fidelidad
  alternatives_spanish:
  - en su confianza
  - fielmente
  lexicon: HALOT
  rationale: אֱמוּנָה en este contexto cultual-administrativo expresa lealtad, fiabilidad y constancia en el cumplimiento de deberes sagrados. 'Fidelidad' conserva mejor esa fuerza que una lectura de fe interior.
- source_word: יִתְקַדְּשׁוּ קֹדֶשׁ
  english_pob_choice: they consecrated themselves as holy
  chosen_spanish: se consagraron como santos
  alternatives_spanish:
  - se santificaron como santos
  - se consagraron en santidad
  - se mantuvieron santos
  lexicon: HALOT
  rationale: El hitpael de קדש implica consagrarse/santificarse; el sustantivo קֹדֶשׁ refuerza la idea de santidad. 'Se consagraron como santos' mantiene ambas capas sin la dureza de 'santificaron' y sin borrar el énfasis repetido de la raíz.
theological_decisions:
- issue: Sentido de אֱמוּנָה en un contexto cultual y administrativo
  english_pob_reading: faithfulness/trustworthiness in carrying out sacred duties, not primarily inward belief
  chosen_spanish_reading: fidelidad en el desempeño de deberes sagrados, no principalmente fe interior
  alternative_spanish_readings:
  - fe
  - confianza religiosa interior
  rationale: El pasaje trata de registros y distribución sacerdotal; por eso אֱמוּנָה apunta a fiabilidad y lealtad práctica. Traducirlo como 'fe' podría introducir una categoría más devocional que la que exige el contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Doble expresión de santidad en יִתְקַדְּשׁוּ קֹדֶשׁ
  english_pob_reading: they consecrated themselves as holy / they kept themselves holy, with emphasis from verb + noun
  chosen_spanish_reading: se consagraron como santos, conservando el doble énfasis de verbo y sustantivo
  alternative_spanish_readings:
  - se santificaron
  - se mantuvieron santos
  - se consagraron en santidad
  rationale: La repetición hebrea refuerza la idea de santidad. 'Se consagraron como santos' permite reflejar esa intensificación sin reducirla a una sola noción ni borrar la tensión entre acción y estado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió 'consecrated themselves as holy' por ser más natural sin perder יתקדשו קדש. En español se adoptó una solución equivalente, manteniendo el registro genealógico, la enumeración doméstica y la noción de fidelidad cultual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' reservado para el tetragrámaton cuando aparezca; este versículo no lo contiene.
  - '''Asamblea'' se usa para קָהָל en sentido reunido/comunitario, evitando una sustitución automática por ''iglesia''.'
  - '''Santos'' se usa aquí en sentido de estado consagrado/holístico del hebreo, no como título técnico eclesial.'
