    text: O ‘según su fórmula’ o ‘según sus proporciones’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, esta mezcla sagrada de incienso no debía reproducirse para uso personal u ordinario.
    reason: cultural_note
