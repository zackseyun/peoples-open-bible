id: 2KI.23.11
reference: 2 Kings 23:11
source:
  edition: WLC
  text: וַ/יַּשְׁבֵּ֣ת אֶת הַ/סּוּסִ֗ים אֲשֶׁ֣ר נָתְנוּ֩ מַלְכֵ֨י יְהוּדָ֤ה לַ/שֶּׁ֨מֶשׁ֙ מִ/בֹּ֣א בֵית יְהוָ֔ה אֶל לִשְׁכַּת֙ נְתַן מֶ֣לֶךְ הַ/סָּרִ֔יס אֲשֶׁ֖ר בַּ/פַּרְוָרִ֑ים וְ/אֶת מַרְכְּב֥וֹת הַ/שֶּׁ֖מֶשׁ שָׂרַ֥ף בָּ/אֵֽשׁ־־־־־׃
translation:
  text: He removed the horses that the kings of Judah had dedicated to the sun[a], from the entrance of the house of Yahweh to the chamber of Nethan-melech the court official, which was in the precincts[b]; and he burned the chariots of the sun with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eunuch'; the Hebrew term can denote either a eunuch or a royal/court official.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'precincts' is rare and may refer to an outlying or peripheral part of the temple complex; alternatives include 'suburbs' or 'colonnades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבֵּת
  chosen: removed
  alternatives:
  - put an end to
  - did away with
  - caused to cease
  lexicon: HALOT
  rationale: The Hiphil of שׁבת here means to cause to cease or remove from use. In context of cultic objects/animals, 'removed' is idiomatic English and fits Josiah's reform actions better than the more abstract 'caused to cease.'
- source_word: הַסּוּסִים
  chosen: the horses
  lexicon: HALOT
  rationale: Straightforward plural noun. The article is preserved in sense, though natural English does not require special emphasis beyond 'the horses.'
- source_word: אֲשֶׁר נָתְנוּ מַלְכֵי יְהוּדָה לַשֶּׁמֶשׁ
  chosen: that the kings of Judah had dedicated to the sun
  alternatives:
  - that the kings of Judah had given to the sun
  - that the kings of Judah had set apart for the sun
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in a cultic context with horses and chariots associated with solar worship, 'dedicated to the sun' makes the religious function explicit without over-paraphrasing.
- source_word: לַשֶּׁמֶשׁ
  chosen: to the sun
  alternatives:
  - for the sun
  lexicon: HALOT
  rationale: The phrase indicates dedication to the solar deity/cult represented by 'the sun.' Lowercase 'sun' is appropriate because the Hebrew term itself is the common noun; the idolatrous sense is conveyed by context.
- source_word: מִבֹּא בֵית יְהוָה
  chosen: at the entrance to the house of the LORD
  alternatives:
  - from the entrance of the house of the LORD
  - at the entry of the house of the LORD
  lexicon: HALOT
  rationale: מִבּוֹא can denote entrance/entryway. The prepositional force in this compressed location phrase is best represented idiomatically as 'at the entrance to.' 'House of the LORD' preserves the temple designation and the mandated rendering of YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִשְׁכַּת
  chosen: by the chamber of
  alternatives:
  - to the chamber of
  - near the chamber of
  - the room of
  lexicon: HALOT
  rationale: לשכה denotes a chamber/room, often in temple or palace complexes. Given the sequence of location markers, 'by the chamber of' best conveys proximity in smooth English.
- source_word: נְתַן מֶלֶךְ
  chosen: Nethan-melech
  alternatives:
  - Nathan-melech
  lexicon: BDB/HALOT
  rationale: This is a personal name, so it is transliterated rather than translated, per project philosophy. 'Nethan-melech' follows a standard transliteration of the Masoretic pointing.
- source_word: הַסָּרִיס
  chosen: the court official
  alternatives:
  - the eunuch
  - the officer
  lexicon: HALOT
  rationale: סָרִיס can mean eunuch or, more broadly, a royal official/court officer. In many royal-administrative contexts the official sense is safer unless physical status is contextually important. 'Court official' communicates the role without asserting more than the text requires.
- source_word: בַּפַּרְוָרִים
  chosen: in the precincts
  alternatives:
  - in the suburbs
  - in the colonnades
  - in the outer court area
  lexicon: HALOT
  rationale: פַּרְוָרִים is a rare architectural/topographical term. Its exact referent is uncertain, likely an outlying or peripheral area of the temple complex. 'Precincts' is a clear, non-overconfident rendering; alternatives are worth preserving in a footnote because of the uncertainty.
- source_word: מַרְכְּבוֹת הַשֶּׁמֶשׁ
  chosen: the chariots of the sun
  alternatives:
  - the sun chariots
  lexicon: HALOT
  rationale: A literal rendering best preserves the cultic imagery and avoids interpretive flattening.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: he burned with fire
  alternatives:
  - he burned
  - he burned in the fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with/in the fire.' 'Burned with fire' preserves the emphasis, though in English it is somewhat formulaic; retaining it reflects the source wording.
