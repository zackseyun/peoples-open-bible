review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura imperativa y la imagen de restauración, pero no preserva plenamente dos matices del griego y del rastro auditado: στῆθι se expresa mejor como un llamado a ponerse de pie/levantarse que como «Ponte», y εἰς ἅπαξ no está anclado en el texto principal aunque sí se explica en nota. Además, «por el Señor» suena menos natural en español en esta posición final; «reunidos… por el Señor» es posible, pero «reunidos… por obra del Señor» o «reunidos… por el Señor» sin la coma mejora el flujo. La coma antes de «por el Señor» es innecesaria.'
  spanish_quality_summary: El texto es legible y digno, pero «Ponte, Jerusalén» suena algo coloquial y ambiguo en registro bíblico; «Ponte de pie» o «Levántate» es más claro. «En un alto» es aceptable, aunque «en una altura» suena algo más natural y concreto en español general. También conviene incorporar el sentido de εἰς ἅπαξ al texto principal, como «juntos», en lugar de dejarlo solo en nota.
  glossary_alignment: No hay conflicto serio con la terminología del proyecto. «Señor» para κύριος es defendible en fuente griega. «Hijos» para τέκνα y «reunidos» para συνηγμένα están bien. La principal mejora es estilística y de fidelidad de matiz, no de glosario.
  issues:
  - severity: medium
    issue: «Ponte» para στῆθι
    rationale: Aunque transmite la idea de colocarse, en español suena más coloquial y menos explícito que el imperativo de levantarse/ponerse en pie. «Ponte de pie» o «Levántate» representa mejor el mandato y el tono poético.
  - severity: medium
    issue: εἰς ἅπαξ no aparece en el texto principal
    rationale: La decisión léxica española elige «juntos», pero el borrador no lo incluye en la línea principal; solo aparece en la nota. Eso omite un elemento significativo del griego y del razonamiento documentado.
  - severity: low
    issue: Coma antes de «por el Señor»
    rationale: La coma separa innecesariamente el complemento agentivo y entorpece el ritmo. Sin coma, la frase fluye mejor.
  - severity: low
    issue: «En un alto» es aceptable pero algo marcado
    rationale: No es incorrecto, pero «en una altura» o «en un lugar alto» resulta más natural para un público amplio sin perder la concreción espacial.
  revised_spanish_text: Ponte de pie, Jerusalén, en una altura,[a] y ve a tus hijos reunidos[b] juntos desde oriente y occidente por el Señor.
  revised_footnotes:
  - marker: a
    text: O «en alto».
    reason: lexical_alternative
  - marker: b
    text: O «congregados» o «juntados»; la frase griega también puede sugerir «a la vez».
    reason: alternative_reading
  revision_rationale: Se ajusta στῆθι a un imperativo más claro y digno en español («Ponte de pie»), se hace explícito en el texto principal el valor de εἰς ἅπαξ con «juntos», se mejora la naturalidad de ἐφʼ ὑψηλοῦ con «en una altura», y se corrige la puntuación antes del complemento final.
