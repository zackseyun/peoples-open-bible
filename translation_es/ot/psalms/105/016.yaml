translation:
  language: es
  text: Llamó hambruna sobre la tierra[a]; quebró todo bastón de pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo suministro de pan»; literalmente, «todo bastón de pan», un hebraísmo para el suministro de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: He called for
  chosen_spanish: Llamó
  alternatives_spanish:
  - Mandó
  - Envió
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa que Dios hizo venir la hambruna. En español, «llamó» conserva bien la idea causal sin recargarla con una explicación que el hebreo no explicita.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambuna
  - escasez de alimento
  lexicon: HALOT
  rationale: El término hebreo designa una carencia severa de alimento. «Hambre» es natural en español y puede abarcar esa idea; «hambruna» sería más explícito, pero menos fiel al tono breve del hebreo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - en la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» conserva la preposición y el alcance territorial del hebreo. «País» sería más interpretativo y restringido.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo el
  lexicon: HALOT
  rationale: En la expresión constructa siguiente, «todo» comunica la totalidad de manera natural en español y corresponde al valor distributivo de כל.
- source_word: מַטֵּה לֶחֶם
  english_pob_choice: staff of bread
  chosen_spanish: sustento de pan
  alternatives_spanish:
  - bastón de pan
  - apoyo de pan
  - provisión de pan
  lexicon: HALOT
  rationale: 'El hebreo usa una metáfora idiomática: literalmente, «bastón/vara de pan», es decir, aquello que lo sostiene. En español, «sustento de pan» preserva la imagen de soporte y expresa con claridad la idea de provisión alimentaria sin sonar forzado.'
- source_word: שָׁבָר
  english_pob_choice: he broke
  chosen_spanish: quebró
  alternatives_spanish:
  - rompió
  - destruyó
  lexicon: HALOT
  rationale: El verbo básico es «romper/quebrar». «Quebró» mantiene la metáfora de la vara o sustento quebrado y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Agencia divina en la hambruna
  english_pob_reading: 'The subject is God acting in judgment/providence: ''He called for famine... he broke...'''
  chosen_spanish_reading: El sujeto implícito sigue siendo Dios, que hace venir el hambre y quiebra el sustento.
  alternative_spanish_readings:
  - Una lectura impersonal que solo describa la situación
  - Un giro pasivo que oculte la acción divina
  rationale: El salmo continúa la narración de los actos históricos de Yahvé. La traducción conserva esa agencia divina sin añadir palabras que no estén en el hebreo.
  doctrine_reference: Salmo histórico; providencia y juicio divino en la narración poética
translation_notes:
  revision_awareness: El inglés POB mantuvo la metáfora «staff of bread» en el texto principal y explicó en nota su sentido idiomático; esta versión española hace una equivalencia más natural con «sustento de pan», preservando la imagen de soporte y la claridad. No hay variantes textuales en el hebreo base, y la decisión principal es léxica/idiomática, no doctrinalmente conflictiva.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton en forma explícita; el contexto del salmo ya identifica la acción divina sin necesidad de máscara nominal aquí.
  - «Hambre» se usa como equivalente general de רָעָב; el contexto indica una hambruna, pero el español mantiene la brevedad poética.
  - «Sustento de pan» resuelve el hebraísmo מַטֵּה לֶחֶם de forma transparente y readable para audiencia eclesial amplia.
