theological_decisions:
- issue: Whether the verse implies God excuses female sexual sin
  chosen_reading: The verse states that God will not single out the daughters and daughters-in-law for punishment because the men are themselves participating in the same corrupt sexual and cultic practices.
  alternative_readings:
  - The verse could be read as a blanket refusal to punish the women regardless of the men's conduct.
  rationale: 'The causal clause introduced by כִּי explains the refusal: the men themselves are implicated. The translation preserves the moral indictment of all parties without importing a doctrinal claim that God overlooks sin.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of קְדֵשׁוֹת
  chosen_reading: cult prostitutes
  alternative_readings:
  - temple prostitutes
  - consecrated women
  rationale: The term is tied to illicit worship and sexual immorality. 'Cult prostitutes' preserves the cultic dimension without asserting more institutional detail than the Hebrew requires.
  doctrine_reference: Original-language primacy over translation tradition.
