translation:
  language: es
  text: Porque he aquí, te he hecho pequeño entre las naciones, despreciado entre los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre la humanidad». El hebreo usa אָדָם como término colectivo para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי הִנֵּה
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - Porque mira
  - Porque, he aquí
  - Pues he aquí
  lexicon: HALOT
  rationale: כִּי introduce la conexión explicativa/causal, por lo que «Porque» preserva el vínculo discursivo. הִנֵּה es deíctico y llama la atención; «he aquí» mantiene ese valor con registro formal y bíblico en español, sin oscurecer el movimiento del hebreo.
- source_word: קָטֹן
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - menor
  - insignificante
  - reducido
  lexicon: HALOT
  rationale: El adjetivo describe una condición de disminución o baja estatura social. «Pequeño» comunica bien el estado resultante en español bíblico actual. «Insignificante» intensifica demasiado la valoración; «menor» suena más relacional que descriptivo.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he hecho
  alternatives_spanish:
  - te he puesto
  - te he dado
  - te he establecido
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «dar», en esta construcción predicativa con קָטֹן el sentido idiomático es de hacer/causar un estado. «Te he hecho» conserva la fuerza resultativa sin forzar una traducción demasiado literal que sonaría poco natural en español.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  - entre las naciones de la tierra
  lexicon: HALOT
  rationale: גּוֹיִם aquí designa naciones en sentido amplio. «Entre las naciones» reproduce el campo semántico y la relación espacial/social del hebreo con buena naturalidad en español.
- source_word: בָּזוּי
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - tenido en desprecio
  - objeto de desprecio
  - desdeñado
  lexicon: HALOT
  rationale: El pasivo expresa ser tratado con desdén o desprecio. «Despreciado» es directo, claro y suficientemente fuerte para el valor del hebreo sin añadir matices no garantizados.
- source_word: בָּאָדָם
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre la humanidad
  - entre los seres humanos
  - entre la gente
  lexicon: HALOT
  rationale: Con ב y אדם en sentido colectivo, la frase indica la posición social dentro de la humanidad. Se conserva «los hombres» como equivalente representativo y transparente, manteniendo el paralelismo con «las naciones»; las alternativas más inclusivas se reservan como posibles lecturas contextuales.
theological_decisions:
- issue: Valor colectivo/genérico de אָדָם
  english_pob_reading: among men
  chosen_spanish_reading: entre los hombres
  alternative_spanish_readings:
  - entre la humanidad
  - entre los seres humanos
  rationale: El hebreo usa אָדָם de manera colectiva para la humanidad en general. La lectura principal mantiene el término representativo «los hombres» para reflejar la forma hebrea y el paralelismo del verso, mientras que las alternativas más inclusivas quedan reconocidas como equivalentes interpretativos.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El texto inglés POB pasó por una revisión que reforzó la formalidad de הִנֵּה con «behold». La presente versión española mantiene ese nivel de registro con «he aquí», y conserva la decisión auditada de traducir נְתַתִּיךָ de manera resultativa («te he hecho») en lugar de un calco literal de «dar».
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en otros pasajes; aquí no hay ocurrencia.
  - Se evita «Gentiles» porque גּוֹיִם aquí es un término amplio de naciones/peoples, no una oposición técnica a Israel.
  - Se conserva el paralelismo semántico entre «entre las naciones» y «entre los hombres» para reflejar la estructura hebrea.
  - El registro es formal pero claro, acorde con una Biblia pública de estilo eclesial amplio.
