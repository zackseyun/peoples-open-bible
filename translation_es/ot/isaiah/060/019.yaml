translation:
  language: es
  text: El sol ya no será para ti luz durante el día, ni la luna te dará luz para resplandor[a]; pero Yahvé[b] será para ti una luz eterna, y tu Dios tu gloria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para radiancia” en vez de “para resplandor”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “YHWH”; tradicionalmente se traduce “el SEÑOR”.'
    reason: alternative_reading
  - marker: c
    text: O “tu esplendor” o “tu belleza”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִהְיֶה לָּךְ עוֹד
  english_pob_choice: will no longer be for you
  chosen_spanish: ya no será para ti
  alternatives_spanish:
  - ya no te será
  - no será ya para ti
  lexicon: HALOT
  rationale: Expresa la negación, la idea de cesación y la relación dativa de forma natural en español sin perder el valor profético de cambio de מצב.
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: HALOT
  rationale: Equivalente directo y transparente del cuerpo celeste.
- source_word: לְאוֹר יוֹמָם
  english_pob_choice: a light by day
  chosen_spanish: una luz de día
  alternatives_spanish:
  - luz para el día
  - como luz de día
  lexicon: HALOT
  rationale: La frase expresa función/uso; 'una luz de día' conserva el carácter funcional y suena natural en español. Se evita forzar 'para' en el texto principal, aunque la noción de función permanece.
- source_word: וּלְנֹגַהּ
  english_pob_choice: for brightness
  chosen_spanish: para resplandor
  alternatives_spanish:
  - para brillo
  - para radiancia
  lexicon: HALOT
  rationale: נֹגַהּ denota brillo/resplandor/radiancia. 'Resplandor' preserva dignidad poética y mantiene la relación funcional con לְ.
- source_word: הַיָּרֵחַ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - el astro lunar
  lexicon: HALOT
  rationale: Equivalente directo y estándar.
- source_word: לֹא יָאִיר לָךְ
  english_pob_choice: nor will the moon give light to you
  chosen_spanish: ni la luna te dará luz
  alternatives_spanish:
  - ni la luna alumbrará para ti
  - ni la luna te iluminará
  lexicon: HALOT
  rationale: El hiphil de אור se expresa bien con 'dar luz' en español; conserva el paralelismo y la relación de beneficio/destino del dativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es usar 'Yahvé' en el texto principal, preservando el nombre divino en lugar de una sustitución titular.
- source_word: לְאוֹר עוֹלָם
  english_pob_choice: an everlasting light
  chosen_spanish: una luz eterna
  alternatives_spanish:
  - una luz para siempre
  - una luz perpetua
  lexicon: HALOT
  rationale: '''Luz eterna'' reproduce con naturalidad el valor durativo de עוֹלָם sin perder el tono poético-teológico.'
- source_word: וֵאלֹהַיִךְ
  english_pob_choice: and your God
  chosen_spanish: y tu Dios
  alternatives_spanish:
  - y tu propio Dios
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con sufijo femenino singular; mantiene la dirección de la promesa a Sion/ciudad personificada.
- source_word: לְתִפְאַרְתֵּךְ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu esplendor
  - tu hermosura
  lexicon: HALOT
  rationale: תִפְאֶרֶת puede abarcar gloria, esplendor o belleza. 'Gloria' encaja mejor con el paralelismo elevado del versículo y con la posibilidad de que Dios sea la fuente del honor de la ciudad.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton; el texto español debe conservar el nombre divino para mantener transparencia audit-able y coherencia con la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Prophetic imagery of sun and moon replaced by Yahweh as light
  english_pob_reading: Maintain the poetic-prophetic imagery without over-specifying whether it is literal, eschatological, or metaphorical
  chosen_spanish_reading: Conservar la imaginería profética sin precisar si la transformación es literal, escatológica o metafórica
  alternative_spanish_readings:
  - Interpretarlo solo como metáfora espiritual
  - Leerlo como transformación cósmica estrictamente literal
  rationale: 'La traducción mantiene la tensión del texto: Yahvé supera a los astros como fuente de luz, sin resolver el modo de cumplimiento.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó el valor funcional de לְאוֹר como 'a light' y de יָאִיר como 'give light to you'. La propuesta española refleja esa precisión con 'una luz de día' y 'te dará luz', sin perder el paralelismo poético del hebreo. También se mantiene la decisión teológica de conservar el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se mantiene el registro poético elevado con sintaxis clara y moderna.
  - '''Luz eterna'' preserva el valor durativo de עוֹלָם sin sobreexplicar la imagen.'
  - '''Tu gloria'' sigue la lectura alta del paralelismo y deja abierta la alternativa semántica de esplendor/hermosura.'
