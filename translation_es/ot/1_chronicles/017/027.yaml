  text: וְ/עַתָּ֗ה הוֹאַ֨לְתָּ֙ לְ/בָרֵךְ֙ אֶת בֵּ֣ית עַבְדְּ/ךָ֔ לִ/הְי֥וֹת לְ/עוֹלָ֖ם לְ/פָנֶ֑י/ךָ כִּֽי אַתָּ֤ה יְהוָה֙ בֵּרַ֔כְתָּ וּ/מְבֹרָ֖ךְ לְ/עוֹלָֽם־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/017/027.yaml
  text: And now[a], you have been pleased to bless the house of your servant, that it may be before you forever; for you, O Yahweh, have blessed it[c][b], and it is blessed forever.
  footnotes:
  - marker: a
    text: Or 'you have undertaken to bless' or 'you have consented to bless.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here likely carries dynastic force, not merely the physical dwelling.'
    reason: cultural_note
  - marker: c
    text: Or 'and may it be blessed forever.' The Hebrew can be taken by some as expressing a wish, though the form is more naturally read as a statement of enduring blessedness.
    reason: alternative_reading
