revisions:
- from: ¡Canta[a], mujer estéril, tú que no has dado a luz; estalla en cánticos y grita de gozo, tú que no has estado de parto. Porque los hijos de la desolada son más que los hijos de la casada, dice Yahvé.
  to: ¡Canta[a], mujer estéril, tú que no has dado a luz; estalla en cánticos y grita de gozo, tú que no has estado de parto. Porque los hijos de la desolada son más numerosos que los hijos de la casada, dice Yahvé.
  rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Se ajusta únicamente la comparación final a «son más numerosos que» para expresar de forma idiomática y precisa el comparativo hebreo, evitando una construcción española forzada.
