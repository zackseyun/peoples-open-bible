    text: Or, 'Give' / 'Do not withhold'; the Hebrew leaves the object implicit, referring to God's scattered people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the end of the earth'; English also commonly says 'from the ends of the earth.'
    reason: lexical_alternative
