translation:
  language: es
  text: 'Yahvé me dijo: «Diles: No suban ni peleen, porque yo no estoy en medio de ustedes[a]; no sea que sean derrotados ante sus enemigos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «porque yo no estoy en medio de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sea que caigan delante de sus enemigos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton en español con una forma reconocible y reverente. "Yahvé" comunica el nombre del pacto sin ocultarlo tras un título genérico.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - dijo
  lexicon: HALOT
  rationale: El verbo de habla narrativo se vierte de modo natural como "me dijo", manteniendo la introducción de discurso directo sin añadir matiz no presente.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: La referencia a Moisés como destinatario del mensaje se integra de forma idiomática en español con el clítico "me".
- source_word: אֱמֹר לָהֶם
  english_pob_choice: Tell them
  chosen_spanish: Diles
  alternatives_spanish:
  - Dílese
  - Diles a ellos
  - Di a ellos
  lexicon: HALOT
  rationale: El imperativo con objeto indirecto es más natural en español como "Diles". Conserva la fuerza directiva sin sobretraducir a una perífrasis menos fluida.
- source_word: לֹא תַעֲלוּ
  english_pob_choice: Do not go up
  chosen_spanish: No suban
  alternatives_spanish:
  - No asciendan
  - No vayan arriba
  lexicon: HALOT
  rationale: עלה suele significar "subir"; en este contexto militar-geográfico, "suban" conserva el movimiento ascendente y resulta claro en español.
- source_word: וְלֹא תִלָּחֲמוּ
  english_pob_choice: and do not fight
  chosen_spanish: ni peleen
  alternatives_spanish:
  - y no combatan
  - ni hagan guerra
  lexicon: HALOT
  rationale: En español, "pelear" comunica bien el sentido verbal de combatir en una advertencia breve. Se usa "ni" para coordinar con la prohibición anterior, reflejando la lectura natural del contexto.
- source_word: כִּי אֵינֶנִּי בְּקִרְבְּכֶם
  english_pob_choice: for I am not among you
  chosen_spanish: porque yo no estoy en medio de ustedes
  alternatives_spanish:
  - porque no estoy entre ustedes
  - porque no estoy en su medio
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de בקרבכם como "en medio de ustedes", que es más literal y más transparente que una simple paráfrasis. La nota aclara la alternativa "entre ustedes" para la misma idea.
- source_word: וְלֹא תִּנָּגְפוּ
  english_pob_choice: lest you be struck down
  chosen_spanish: para que no caigan
  alternatives_spanish:
  - no sea que sean derribados
  - para que no sean derrotados
  lexicon: HALOT
  rationale: נגף en este contexto expresa sufrir derrota/caída ante el enemigo. En español, una cláusula final negativa comunica mejor el valor preventivo de la advertencia que una traducción mecánica con futuro negativo.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  english_pob_choice: before your enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - ante sus enemigos
  - frente a sus enemigos
  lexicon: HALOT
  rationale: La expresión idiomática de derrota militar se conserva con "delante de sus enemigos", que mantiene la imagen hebrea y resulta natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en lugar de sustituirlo por un título. Esto sigue la línea auditable del POB y evita ocultar el dato del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la cláusula final וְלֹא תִּנָּגְפוּ
  english_pob_reading: 'Rendered as a warning consequence: ''lest you be struck down before your enemies'''
  chosen_spanish_reading: para que no caigan delante de sus enemigos
  alternative_spanish_readings:
  - para que no sean derrotados delante de sus enemigos
  - no sea que caigan delante de sus enemigos
  rationale: El hebreo presenta una advertencia ligada a la ausencia de Yahvé; en español, una finalidad negativa expresa mejor el efecto prevenido. "Caigan" conserva el carácter de derrota/abatimiento sin suavizar el aviso.
  doctrine_reference: Contextual-syntactic decision; no doctrinal harmonization
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que simplificó la coordinación a 'do not go up or fight'. En español se reflejó esa misma coordinación natural con 'No suban ni peleen', sin cambiar el sentido prohibitivo doble ni la relación causal-final del cierre.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" según el estándar del proyecto para יְהוָה.
  - 'Se tradujo בקרבכם con una imagen espacial explícita: "en medio de ustedes"; la nota ofrece la alternativa más literal.'
  - Se optó por una clausula final negativa ('para que no caigan') para preservar el valor de advertencia de וְלֹא תִּנָּגְפוּ.
  - Se usó "suban" para עלה en sentido militar-geográfico y "peleen" para לחם/Nifal en lenguaje natural de prohibición.
