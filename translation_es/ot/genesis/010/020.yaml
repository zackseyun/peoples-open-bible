translation:
  language: es
  text: Estos son los hijos de Cam[a], por sus clanes[b], por sus lenguas[c], en sus tierras, por sus naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Cam».
    reason: alternative_reading
  - marker: b
    text: O «según sus clanes ... según sus lenguas»; la preposición repetida marca clasificación por grupos.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «lenguas»; es decir, idiomas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  - Estos eran
  lexicon: HALOT
  rationale: El demostrativo introduce una afirmación identificadora de cierre; en español, "Estos son" conserva con naturalidad esa fuerza sin perder el valor resumitivo.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En genealogías hebreas, בְנֵי puede funcionar como "descendientes de"; sin embargo, "hijos de" reproduce el paralelismo genealógico con fidelidad y es plenamente inteligible en español bíblico actual.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Ham
  lexicon: HALOT
  rationale: Se emplea la forma tradicional española del nombre propio, conservando la identificación del personaje y la claridad para el lector en español.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: El לְ repetido en la serie funciona clasificatoriamente; "por sus clanes" refleja esa distribución taxonómica y evita reducir el término a "familias", que en español sería más amplio y menos técnico.
- source_word: לִלְשֹׁנֹתָם
  english_pob_choice: by their languages
  chosen_spanish: por sus lenguas
  alternatives_spanish:
  - según sus lenguas
  - por sus idiomas
  lexicon: HALOT
  rationale: Aunque literalmente significa "lenguas", aquí designa idiomas; "lenguas" preserva el color semítico y la fórmula del pasaje, mientras sigue siendo comprensible en español.
- source_word: בְּאַרְצֹתָם
  english_pob_choice: in their lands
  chosen_spanish: en sus tierras
  alternatives_spanish:
  - en sus países
  - en sus territorios
  lexicon: HALOT
  rationale: '"Tierras" es el equivalente natural de ארץ en este contexto y evita la carga moderna de "países"; mantiene el plural locativo del hebreo.'
- source_word: בְּגוֹיֵהֶם
  english_pob_choice: by their nations
  chosen_spanish: por sus naciones
  alternatives_spanish:
  - entre sus naciones
  - según sus naciones
  lexicon: HALOT
  rationale: Se conserva la preposición de clasificación que el POB inglés decidió enfatizar con "by"; "por sus naciones" refleja mejor el patrón estructural repetido que "en sus naciones" y mantiene la distinción entre clanes, lenguas, tierras y naciones.
translation_notes:
  revision_awareness: El inglés POB fue revisado para cerrar la serie con "by their nations" en lugar de "in their nations"; la versión española sigue esa lectura clasificatoria con "por sus naciones" y conserva el paralelismo con las demás frases del versículo. No se detectan tensiones doctrinales especiales en este versículo genealógico.
  spanish_consistency_notes:
  - Se mantuvo el patrón repetido de preposición clasificatoria con "por" para reflejar el valor distributivo del hebreo y la decisión revisada del POB inglés.
  - '"Cam" se adapta a la forma tradicional española del nombre propio, coherente con el uso bíblico en español.'
  - '"Lenguas" y "tierras" conservan el léxico concreto del hebreo sin modernizarlo en exceso a "idiomas" o "países".'
