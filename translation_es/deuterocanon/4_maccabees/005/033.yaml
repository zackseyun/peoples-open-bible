translation:
  language: es
  text: No me compadeceré tanto de mi propia vejez como para abolir la ley ancestral por mi propia acción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐχ οὕτως
  english_pob_choice: not so much
  chosen_spanish: no tendré tanta compasión
  alternatives_spanish:
  - no tanto
  - no me compadeceré de tal manera
  lexicon: BDAG
  rationale: 'La construcción con ὥστε expresa grado y resultado: no hasta el punto de... que. En español, «no tendré tanta compasión» conserva la idea de medida excesiva sin sonar artificial.'
- source_word: οἰκτειρήσω
  english_pob_choice: I will pity
  chosen_spanish: compasión
  alternatives_spanish:
  - piedad
  - lástima
  - me compadeceré
  lexicon: BDAG
  rationale: El verbo expresa piedad/compasión. En la frase española, «tener compasión» mantiene el matiz afectivo y evita reducir el sentido a una mera decisión práctica.
- source_word: τὸ ἐμαυτοῦ γῆρας
  english_pob_choice: my own old age
  chosen_spanish: mi propia vejez
  alternatives_spanish:
  - mi vejez
  - la vejez que es mía
  lexicon: LSJ
  rationale: γῆρας significa vejez. «Mi propia vejez» conserva el énfasis reflexivo de ἐμαυτοῦ y suena natural en español.
- source_word: ὥστε
  english_pob_choice: that I would
  chosen_spanish: como para
  alternatives_spanish:
  - de modo que
  - hasta el punto de que
  lexicon: BDAG
  rationale: Aquí ὥστε introduce el resultado límite de una compasión indebida. «Como para» reproduce bien la idea de medida excesiva que llevaría a la acción siguiente.
- source_word: με διʼ ἐμαυτοῦ
  english_pob_choice: by my own act
  chosen_spanish: por mi propia acción
  alternatives_spanish:
  - por mí mismo
  - por mi propia iniciativa
  - por mi propia cuenta
  lexicon: BDAG
  rationale: 'La frase subraya agencia personal: él mismo sería el medio de la acción. «Por mi propia acción» conserva ese énfasis sin sonar forzado.'
- source_word: τὸν πάτριον νόμον
  english_pob_choice: the ancestral law
  chosen_spanish: la ley ancestral
  alternatives_spanish:
  - la ley de mis padres
  - la ley heredada
  - la ley de los antepasados
  lexicon: BDAG
  rationale: πάτριος remite a lo perteneciente a los padres/antepasados. «Ley ancestral» preserva el vínculo con la herencia transmitida sin introducir terminología técnica ajena al griego.
- source_word: καταλῦσαι
  english_pob_choice: abolish
  chosen_spanish: abolir
  alternatives_spanish:
  - destruir
  - anular
  - derogar
  lexicon: BDAG
  rationale: En este contexto, καταλῦσαι expresa deshacer o invalidar la autoridad de la ley. «Abolir» comunica bien el sentido de dejarla sin efecto.
theological_decisions:
- issue: πάτριον νόμον en un contexto de martirio judío
  english_pob_reading: the ancestral law
  chosen_spanish_reading: la ley ancestral
  alternative_spanish_readings:
  - la ley de mis padres
  - la ley de los antepasados
  rationale: La expresión alude a la ley recibida por herencia dentro del pueblo judío. «Ley ancestral» conserva la dimensión de tradición recibida y el peso covenantal sin imponer una fórmula eclesiástica posterior.
  doctrine_reference: 'Translation philosophy: primacía del texto original; fidelidad lexical; claridad moderna en español.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; la revisión más reciente indicó que no se requerían cambios sustantivos. La versión española sigue esa estabilidad y solo ajusta la sintaxis para fluidez natural en español.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y digno propio de un texto bíblico.
  - Se evita 'Señor' u այլ masking de nombres divinos porque no aparece aquí.
  - '''Ley ancestral'' conserva el tono de herencia cultural y religiosa del original.'
  - '''Abolir'' se usa en sentido jurídico/autoridad, no físico.'
