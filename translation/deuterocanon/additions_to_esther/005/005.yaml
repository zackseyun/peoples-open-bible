translation:
  text: And often[a], by madness, she has made many of those appointed to positions of authority, trusted to manage affairs as friends, sharers in innocent blood, and has engulfed them in disasters beyond remedy[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek has a feminine singular subject ('she has made ... she has engulfed'), but the immediate referent is not explicitly named in this verse.
    reason: alternative_reading
  - marker: b
    text: Or 'participants in the blood of the innocent.' The expression refers to complicity in shedding innocent blood.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλάκις
  chosen: often
  alternatives:
  - many times
  - frequently
  lexicon: LSJ
  rationale: Adverb of repeated occurrence; 'often' is natural modern English and preserves the iterative force.
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - a great number of
  lexicon: LSJ
  rationale: Straightforward quantitative adjective; 'many' is the most direct rendering.
- source_word: τῶν ἐπʼ ἐξουσίας τεταγμένων
  chosen: those appointed to positions of authority
  alternatives:
  - those set over authority
  - those assigned to power
  lexicon: LSJ
  rationale: τεταγμένων conveys being appointed/assigned, and ἐξουσία denotes authority or official power. The phrase refers to officials placed in authority, not merely powerful people in general.
- source_word: τῶν πιστευθέντων
  chosen: trusted
  alternatives:
  - entrusted
  - those who were trusted
  lexicon: LSJ
  rationale: Passive participle from πιστεύω here means being trusted/entrusted. 'Trusted' works smoothly with the following infinitive phrase in English.
- source_word: χειρίζειν τὰ πράγματα
  chosen: to manage affairs
  alternatives:
  - to administer matters
  - to handle business
  lexicon: LSJ
  rationale: χειρίζειν is to handle/manage, and τὰ πράγματα refers broadly to affairs or matters of state. 'Manage affairs' is idiomatic and suitably broad.
- source_word: φίλων
  chosen: as friends
  alternatives:
  - of friends
  - friendly
  lexicon: LSJ
  rationale: The genitive is syntactically compressed in this difficult sentence; taken with the trusted officials, it indicates persons regarded as friends of the ruler. 'As friends' best conveys their relational standing in context.
- source_word: παρανοίᾳ
  chosen: by madness
  alternatives:
  - through derangement
  - by folly
  lexicon: LSJ
  rationale: παρανοία denotes madness or derangement. Instrumental 'by madness' reflects the dative and preserves the severe moral-psychological sense.
- source_word: μετόχους αἱμάτων ἀθώων
  chosen: sharers in innocent blood
  alternatives:
  - partners in innocent bloodshed
  - participants in the blood of the innocent
  lexicon: LSJ
  rationale: μετόχους means participants/sharers; αἱμάτων ἀθώων is a Hebraizing expression for bloodshed of innocents. 'Sharers in innocent blood' is compact and faithful.
- source_word: καταστῆσα
  chosen: has made
  alternatives:
  - having made
  - appointed as
  lexicon: LSJ
  rationale: Despite orthographic irregularity in the source line break, the participial form conveys causing someone to become something. In English, 'has made' best carries the causative force in the sentence.
- source_word: περιέβαλε
  chosen: has engulfed
  alternatives:
  - has surrounded
  - has overwhelmed
  lexicon: LSJ
  rationale: Literally 'threw around/clothed with,' but in context of συμφοραῖς it means to envelop or overwhelm with calamities. 'Has engulfed' is vivid without over-paraphrasing.
- source_word: συμφοραῖς ἀνηκέστοις
  chosen: in disasters beyond remedy
  alternatives:
  - with incurable calamities
  - in irreparable misfortunes
  lexicon: LSJ
  rationale: συμφοραί are disasters/calamities; ἀνήκεστος means not to be healed or remedied. 'Beyond remedy' is accessible modern English that preserves the finality.
