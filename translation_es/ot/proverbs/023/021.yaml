  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo y la línea del POB inglés: סֹבֵא = «borracho», זוֹלֵל = «glotón», קְרָעִים = «harapos», y la segunda cola conserva la metáfora de ser vestido de harapos por la somnolencia. La nota sobre נוּמָה preserva adecuadamente la alternativa léxica principal.'
  spanish_quality_summary: El español es claro y natural, pero «caerán en pobreza» suena menos idiomático en español bíblico actual que «llegarán a la pobreza» o «vendrán a pobreza». Además, la nota introduce alternativas («sueño» o «sopor») más amplias que la evidencia inglesa auditada, donde la alternativa documentada es específicamente «slumber»; conviene ceñirse más de cerca al rastro de auditoría y evitar expansión innecesaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El versículo no contiene términos sensibles del glosario principal. Las decisiones «borracho», «glotón», «harapos» y «somnolencia» son coherentes con el análisis léxico documentado.
  issues:
  - severity: medium
    issue: «Caerán en pobreza» es menos natural que la formulación española más idiomática para el resultado proverbial.
    rationale: El hebreo יִוָּרֵשׁ aquí expresa llegar a la pobreza/ser empobrecido. «Llegarán a la pobreza» comunica mejor ese resultado en español neutral y mantiene cercanía con «will come to poverty».
  - severity: low
    issue: La nota al pie amplía las alternativas léxicas más allá de lo documentado en el POB inglés.
    rationale: La auditoría inglesa solo preserva explícitamente la alternativa «slumber». Añadir «sueño» o «sopor» no es necesariamente erróneo, pero introduce expansión no requerida y puede desalinear la nota española del historial auditado.
  revised_spanish_text: Porque el borracho y el glotón llegarán a la pobreza[a], y la somnolencia vestirá de harapos a uno.
