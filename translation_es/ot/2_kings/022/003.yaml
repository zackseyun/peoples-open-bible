translation:
  language: es
  text: 'En el año decimoctavo del rey Josías, el rey envió a Safán, hijo de Azalías, hijo de Mesulam, el escriba, a la casa de Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now in / And it happened in
  chosen_spanish: En
  alternatives_spanish:
  - Ahora, en
  - Y sucedió en
  lexicon: HALOT
  rationale: En una fórmula narrativa de transición, el español natural y sobrio es iniciar con una frase temporal breve. ‘En’ conserva la apertura de marco temporal sin introducir una glosa innecesaria.
- source_word: בִּשְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eighteenth year
  chosen_spanish: en el año dieciocho
  alternatives_spanish:
  - en el decimoctavo año
  - cuando habían pasado dieciocho años
  lexicon: HALOT
  rationale: Es la fórmula regnal normal. ‘Año dieciocho’ suena más natural en español bíblico moderno que ‘decimoctavo año’, y preserva el dato cronológico con fidelidad.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  english_pob_choice: of King Josiah
  chosen_spanish: del rey Josías
  alternatives_spanish:
  - de Josías, el rey
  lexicon: HALOT
  rationale: La relación posesiva de reinado se expresa de forma idiomática con ‘del rey Josías’. Mantiene el valor regnal de la expresión hebrea sin calco forzado.
- source_word: שָׁלַח הַמֶּלֶךְ
  english_pob_choice: the king sent
  chosen_spanish: el rey envió
  alternatives_spanish:
  - el rey mandó
  lexicon: HALOT
  rationale: ‘Enviar’ reproduce bien la acción de comisión implícita en el hebreo, y es más preciso que ‘mandar’ para este contexto de delegación oficial.
- source_word: שָׁפָן
  english_pob_choice: Shaphan
  chosen_spanish: Safán
  alternatives_spanish:
  - Safán
  lexicon: Transliteración estándar del nombre propio
  rationale: Se adapta el nombre a la ortografía española usual para nombres bíblicos, manteniendo la identificación del personaje.
- source_word: בֶּן אֲצַלְיָהוּ בֶן מְשֻׁלָּם
  english_pob_choice: son of Azaliah, son of Meshullam
  chosen_spanish: hijo de Azalías, hijo de Mesulam
  alternatives_spanish:
  - hijo de Azalía, hijo de Mesulán
  lexicon: HALOT / onomástica bíblica
  rationale: Se conserva la cadena patronímica completa. Se usa la forma española tradicional y clara de los nombres propios sin alterar la relación genealógica.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el secretario real
  lexicon: HALOT
  rationale: ‘Escriba’ conserva el término lexical más directo y amplio del hebreo. Aunque puede implicar función administrativa, el contexto inmediato no exige especificar más.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se sigue el término POB para el nombre divino, ‘Yahvé’, y se conserva ‘casa’ frente a ‘templo’ para permanecer más cerca del hebreo בית, sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La tradición POB usa la transliteración del nombre divino. En español se ajusta a ‘Yahvé’, forma estable y reverente, evitando la sustitución por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'con este mensaje:'
  lexicon: HALOT
  rationale: ‘Diciendo:’ reproduce la función de introducción de discurso y prepara el contenido de la comisión en el versículo siguiente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה en contexto narrativo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La línea editorial POB evita reemplazarlo por un título. En español, ‘Yahvé’ comunica el nombre propio revelado a Israel y conserva la decisión teológica del original auditado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo cambios posteriores y fue aprobada con alto acuerdo. En esta rama española no se requieren notas de variante textual ni ajustes de revisión más allá de la adaptación onomástica y la decisión estable sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme al estándar doctrinal del proyecto.
  - Se conserva ‘casa’ en ‘casa de Yahvé’ para reflejar בֵּית sin sobrerinterpretar como ‘templo’.
  - Los nombres propios se adaptan a ortografía española habitual, sin afectar la genealogía ni el sentido.
  - No se añadieron notas al pie porque el versículo no presenta una variante de traducción adicional que requiera anclaje en el texto español.
