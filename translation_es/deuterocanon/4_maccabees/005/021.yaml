translation:
  language: es
  text: Pues por cada uno de los dos[a], la ley se enorgullece por igual[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por cada uno de ellos»; el griego ἑκατέρου se refiere específicamente a dos personas o elementos en vista.
    reason: lexical_alternative
  - marker: b
    text: O «la ley se gloria igualmente». El griego personifica la ley con un verbo de orgullo o exultación.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ἑκατέρου
  english_pob_choice: through each of them alike
  chosen_spanish: por cada uno de los dos
  alternatives_spanish:
  - por cualquiera de los dos
  - por cada uno de ellos
  lexicon: LSJ
  rationale: ἑκάτερος se refiere a cada uno de dos elementos o personas. En español, «por cada uno de los dos» conserva esa referencia dual y el valor distributivo del griego sin volverse oscuro.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Introduce la explicación del enunciado anterior; «porque» comunica bien la fuerza explicativa de γάρ en un español natural.
- source_word: ὡς ὁμοίως
  english_pob_choice: equally
  chosen_spanish: de igual manera
  alternatives_spanish:
  - igualmente
  - al mismo tiempo
  lexicon: LSJ
  rationale: La combinación intensifica la equivalencia. En esta cláusula se integra naturalmente con la expresión distributiva previa para mantener la idea de igualdad entre las dos opciones.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la norma
  lexicon: LSJ
  rationale: Aquí νόμος se refiere a la ley judía/Torá. «La ley» es la equivalencia transparente y estándar en español.
- source_word: ὑπερηφανεῖται
  english_pob_choice: takes pride
  chosen_spanish: se gloria
  alternatives_spanish:
  - se ufana
  - se enorgullece
  lexicon: LSJ
  rationale: El verbo personifica a la ley con una idea de jactancia o gloria. «Se gloria» conserva mejor esa personificación retórica que una formulación más abstracta.
theological_decisions:
- issue: Personificación de la ley
  english_pob_reading: the law takes pride
  chosen_spanish_reading: la ley se gloria
  alternative_spanish_readings:
  - la ley se enorgullece
  - la ley es honrada de igual manera
  rationale: El griego atribuye a la ley una acción personal. Mantener la personificación respeta el estilo retórico del pasaje y evita suavizarlo en exceso.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión reciente del inglés POB: se prefirió reflejar διʼ ἑκατέρου ... ὡς ὁμοίως con una formulación distributiva clara y natural, y se mantuvo la personificación de ὁ νόμος ὑπερηφανεῖται. La versión española sigue ese ajuste, evitando ''por cualquiera'' y preservando la imagen retórica de la ley que ''se gloria''.'
  spanish_consistency_notes:
  - «Ley» traduce νόμος de forma consistente con el uso judío/Torá del contexto.
  - Se preserva la referencia dual implícita en ἑκατέρου con «por cada uno de los dos».
  - La personificación de la ley se mantiene explícita, sin convertirla en una afirmación abstracta.
