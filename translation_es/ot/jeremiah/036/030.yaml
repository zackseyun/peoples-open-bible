  yaml_path: translation/ot/jeremiah/036/030.yaml
  text: 'Therefore this is what Yahweh says concerning Jehoiakim king of Judah: He will have no one to sit on the throne of David[a], and his dead body will be cast out to the heat by day and to the frost by night.'
  footnotes:
