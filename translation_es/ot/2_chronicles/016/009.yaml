translation:
  language: es
  text: Porque los ojos de Yahvé recorren toda la tierra para fortalecer a los que tienen el corazón totalmente entregado a él[a]. Has obrado neciamente en esto; porque desde ahora tendrás guerras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para mostrarse fuerte a favor de los que tienen el corazón íntegro hacia él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma explícita, conforme al criterio del proyecto, en vez de ocultarlo con un equivalente funcional. "Yahvé" es la forma española establecida en el POB para el Tetragrámaton.
- source_word: עֵינָיו
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - sus ojos
  lexicon: HALOT
  rationale: Conserva la imagen antropomórfica de la vigilancia divina de modo directo y natural en español.
- source_word: מְשֹׁטְטוֹת
  english_pob_choice: range throughout
  chosen_spanish: recorren
  alternatives_spanish:
  - andan por todas partes
  - rondan
  - van de un lado a otro
  lexicon: HALOT
  rationale: '"Recorren" transmite el movimiento activo y distribuido sobre toda la tierra sin sonar forzado en español; preserva la idea de búsqueda atenta.'
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: throughout all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra entera
  - por toda la tierra
  lexicon: HALOT
  rationale: '"Tierra" refleja el alcance universal del hebreo en esta afirmación proverbial, no solo una región local.'
- source_word: לְהִתְחַזֵּק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para mostrarse fuerte
  - para apoyarse con fuerza
  lexicon: HALOT
  rationale: En este contexto el infinitivo expresa el propósito benéfico de Yahvé respecto de personas leales; "fortalecer" comunica bien ese sentido sin perder la fuerza del original.
- source_word: עִם לְבָבָם שָׁלֵם אֵלָיו
  english_pob_choice: those whose heart is wholly toward him
  chosen_spanish: a los que tienen el corazón totalmente entregado a él
  alternatives_spanish:
  - a los de corazón íntegro hacia él
  - a los que tienen el corazón entero para él
  lexicon: HALOT
  rationale: '"Totamente entregado" expresa en español la lealtad indivisa de שָׁלֵם; evita sugerir perfección moral absoluta y conserva la orientación relacional "hacia él".'
- source_word: נִסְכַּלְתָּ
  english_pob_choice: You have acted foolishly
  chosen_spanish: Has obrado neciamente
  alternatives_spanish:
  - Has actuado foolishly
  - Has sido necio
  lexicon: HALOT
  rationale: '"Obrado neciamente" suena natural y conserva la reprensión profética. "Neciamente" mantiene el valor moral y sapiencial del verbo sin hacerlo más duro de lo que el hebreo exige.'
- source_word: עַל זֹאת
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - en esta cosa
  - en este asunto
  lexicon: HALOT
  rationale: Se refiere de forma breve y clara al acto recién mencionado, como hace el hebreo.
- source_word: מֵעַתָּה
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - en adelante
  lexicon: HALOT
  rationale: Equivale de manera idiomática y directa al adverbio temporal hebreo.
- source_word: יֵשׁ עִמְּךָ מִלְחָמוֹת
  english_pob_choice: you will have wars
  chosen_spanish: habrá guerras contigo
  alternatives_spanish:
  - tendrás guerras
  - estarás en guerra
  lexicon: HALOT
  rationale: La construcción existencial con עִם se vuelve naturalmente futura por el contexto temporal; "habrá guerras contigo" conserva la fuerza de juicio y la presencia continua del conflicto, sin introducir un sujeto implícito innecesario.
theological_decisions:
- issue: Sentido de שָׁלֵם al describir el corazón dirigido a Yahvé
  english_pob_reading: undivided or whole-hearted devotion, not sinless perfection
  chosen_spanish_reading: corazón totalmente entregado a él
  alternative_spanish_readings:
  - corazón íntegro hacia él
  - corazón completo para él
  rationale: El contexto apunta a lealtad de pacto y confianza en Yahvé, no a impecabilidad moral. "Totalmente entregado" comunica devoción indivisa sin borrar la tensión lexical entre integridad y perfección.
  doctrine_reference: Translation philosophy §3, §6
- issue: Alcance de הָאָרֶץ
  english_pob_reading: all the earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la región
  - toda la tierra entera
  rationale: El dicho tiene tono universal y sapiencial; limitarlo a un territorio local debilitaría la afirmación sobre la vigilancia de Yahvé sobre toda la creación.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se mantuvo la lectura y puntuación del POB en cuanto al sentido general, pero se ajustó la primera cláusula para un español más natural y se conservó la alternativa teológica documentada para שָׁלֵם mediante nota. No se introdujeron cambios de sentido frente al audit trail inglés.
  spanish_consistency_notes:
  - Se usa consistentemente "Yahvé" para el Tetragrámaton.
  - Se preserva el valor de alianza/lealtad de "corazón totalmente entregado" sin convertirlo en perfección sin pecado.
  - '"Guerras" conserva el plural intensivo del hebreo.'
  - La sintaxis mantiene dos oraciones principales separadas por punto y coma, coherentes con el tono reprochador del original.
