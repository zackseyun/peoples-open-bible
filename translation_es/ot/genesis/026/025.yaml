revisions:
- from: Así que edificó allí un altar y llamó[a] en el nombre de Yahvé, y plantó allí su tienda[b]. Y los siervos de Isaac cavaron allí un pozo.
  to: Así que edificó allí un altar e invocó[a] el nombre de Yahvé, y plantó allí su tienda[b]. Y los siervos de Isaac cavaron allí un pozo.
  rationale: Se corrige la expresión principal de וַיִּקְרָא בְּשֵׁם יְהוָה a «invocó el nombre de Yahvé», que es fiel al hebreo y natural en español. Se ajusta la nota [a] para preservar la alternativa relevante «proclamó». También se reemplaza la nota [b] por una que refleje el historial documentado de redacción previa, en vez de introducir una alternativa léxica no sustentada. El resto del verso puede mantenerse.
  reviewer_model: gpt-5.4
