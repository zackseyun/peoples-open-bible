translation:
  language: es
  text: La ley de Yahvé es perfecta[a], restaura el alma; el testimonio de Yahvé es confiable, hace sabio al simple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O revive el alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: HALOT
  rationale: En este contexto poético, תּוֹרָה designa la instrucción revelada de Yahvé con peso normativo y del pacto. «Ley» conserva esa fuerza tradicional y teológica en español; «instrucción» es posible, pero suena menos densa en el paralelismo del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino, no como un título sustituto. «Yahvé» preserva el nombre personal de Dios y sigue el criterio del proyecto para יְהוָה.
- source_word: תְּמִימָה
  english_pob_choice: perfect
  chosen_spanish: perfecta
  alternatives_spanish:
  - íntegra
  - completa
  - intachable
  lexicon: HALOT
  rationale: El adjetivo expresa plenitud, integridad y excelencia sin defecto. «Perfecta» comunica bien esa amplitud semántica en un registro natural y literario en español.
- source_word: מְשִׁיבַת
  english_pob_choice: restoring
  chosen_spanish: restaura
  alternatives_spanish:
  - devuelve
  - revive
  - reaviva
  lexicon: HALOT
  rationale: La forma de שוב expresa hacer volver o restaurar. «Restaura» reproduce con claridad esa idea de retorno/restablecimiento; «revive» es una alternativa válida, pero desplaza el énfasis hacia animación/vigor.
- source_word: נָפֶשׁ
  english_pob_choice: the soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  - la persona
  - el ser
  lexicon: HALOT
  rationale: נֶפֶשׁ abarca vida, aliento, ser y persona interior. «Alma» es concisa, tradicional y adecuada aquí para el efecto poético sin ampliar innecesariamente el sentido.
- source_word: עֵדוּת
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - decreto
  - testigo
  - evidencia
  lexicon: HALOT
  rationale: En la serie de términos para la revelación divina del Salmo 19, עֵדוּת remite al testimonio atestiguado de Yahvé. «Testimonio» es la correspondencia más directa y natural en español.
- source_word: נֶאֱמָנָה
  english_pob_choice: trustworthy
  chosen_spanish: confiable
  alternatives_spanish:
  - fiel
  - segura
  - digna de confianza
  lexicon: HALOT
  rationale: El término expresa firmeza y fiabilidad. «Confiable» suena natural en español moderno y comunica bien la idea; «fiel» o «segura» también serían posibles, pero con matices distintos.
- source_word: מַחְכִּימַת
  english_pob_choice: making ... wise
  chosen_spanish: hace sabio a
  alternatives_spanish:
  - da sabiduría a
  - vuelve sabio a
  lexicon: HALOT
  rationale: El participio indica causar sabiduría en alguien. «Hace sabio a» conserva esa relación causativa de forma directa y breve, sin añadir explicaciones ajenas al texto.
- source_word: פֶּתִי
  english_pob_choice: the simple
  chosen_spanish: el simple
  alternatives_spanish:
  - el ingenuo
  - el inexperto
  - el crédulo
  lexicon: HALOT
  rationale: פֶּתִי se refiere al ingenuo o inexperto, no necesariamente al moralmente perverso. «El simple» mantiene el uso sapiencial clásico y la brevedad poética del verso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La frase hebrea usa directamente el nombre del pacto. En español, «Yahvé» preserva el nombre propio divino sin sustituirlo por un título genérico, en coherencia con la política del POB y con el valor del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de מְשִׁיבַת נָפֶשׁ
  english_pob_reading: restoring the soul
  chosen_spanish_reading: restaura el alma
  alternative_spanish_readings:
  - revive el alma
  - reaviva el alma
  - devuelve el alma
  rationale: El hebreo enfatiza el acto de hacer volver/restablecer. «Restaura el alma» conserva ese núcleo sin cerrar la posible resonancia de renovación vital; «revive» es una alternativa fuerte, pero desplaza la imagen hacia vivificación.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como unchanged=true y cross_check_summary con acuerdo alto; no se documentaron cambios adicionales respecto del texto base en inglés.
  spanish_consistency_notes:
  - Se mantuvo Yahvé de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preservó el paralelismo poético con una estructura breve y coordinada en español.
  - «El simple» conserva el valor sapiencial de פֶּתִי sin introducir connotaciones negativas no necesarias.
  - El orden verbal «restaura... hace sabio» reproduce la causalidad del hebreo con naturalidad en español.
