theological_decisions:
- issue: Nature of divine action in the plague imagery
  chosen_reading: 'The verse states that God judicially directs events: the flame is restrained while the ungodly are nevertheless driven on by God''s judgment.'
  alternative_readings:
  - The phrase could be taken more loosely as providential circumstance rather than explicit judicial action.
  rationale: θεοῦ κρίσει is explicit and should not be softened into mere circumstance. At the same time, the translation avoids importing a fuller doctrine of causation beyond the verse's own judicial language.
  doctrine_reference: Preserve theological tension rather than resolve it.
