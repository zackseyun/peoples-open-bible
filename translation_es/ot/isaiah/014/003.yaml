  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: conserva la fórmula profética, el nombre divino «Yahvé», el descanso concedido, el dolor/turbación y la idea de labor opresiva impuesta. Sin embargo, hay dos puntos que requieren ajuste: «fuiste hecho servir» suena poco natural en español y «servidumbre» tiende a sobrecargar el sentido hacia esclavitud/estado servil más de lo que exige הָעֲבֹדָה הַקָּשָׁה en este contexto, donde el inglés auditado prefirió «hard service».'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «con que fuiste hecho servir» resulta calcada y poco idiomática. Una redacción como «con la que se te hizo servir» preserva mejor el pasivo coercitivo y suena natural. También «dura servidumbre» es comprensible, pero «duro servicio» refleja mejor la conexión léxica con עבד/עֻבַּד sin inclinarse innecesariamente a un estado de esclavitud.
  glossary_alignment: Correcto en «Yahvé». No hay conflictos con la terminología principal del proyecto. El ajuste recomendado de «duro servicio» mejora la alineación con la decisión inglesa documentada para הָעֲבֹדָה הַקָּשָׁה.
  issues:
  - severity: medium
    issue: «servidumbre» sobreinterpreta הָעֲבֹדָה הַקָּשָׁה
    rationale: Aunque el contexto es opresivo, la decisión inglesa auditada eligió «hard service» precisamente para no sobreinterpretar como esclavitud. En español, «servidumbre» suele sugerir un estado servil/esclavitud más marcado que «servicio» o «labor».
  - severity: medium
    issue: «con que fuiste hecho servir» es poco natural en español
    rationale: La frase intenta conservar la conexión verbal con «servicio», pero suena forzada y calcada. «Con la que se te hizo servir» mantiene la coerción pasiva y la relación léxica con servir, con mejor legibilidad.
  - severity: low
    issue: La nota [a] no refleja la alternativa inglesa documentada
    rationale: 'La nota inglesa ofrece «from your sorrow» como alternativa a «from your pain». La nota española dada («desde tu dolor») cambia la preposición, no el matiz léxico. Conviene reflejar la alternativa semántica: «de tu tristeza» o similar.'
  revised_spanish_text: Y será, en el día en que Yahvé te dé descanso de tu dolor[a] y de tu agitación, y del duro servicio con la que se te hizo servir[b].
