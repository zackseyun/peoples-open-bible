translation:
  language: es
  text: Sin pies, son llevados sobre hombros, mostrando ante la gente[a] su propia vergüenza; y aun los que los sirven[b] quedan avergonzados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de la gente» para τοῖς ἀνθρώποις; la dativa griega puede entenderse como el público ante quien se exhibe la vergüenza de los ídolos.
    reason: lexical_alternative
  - marker: b
    text: O «los que los adoran»; θεραπεύοντες puede incluir servicio religioso, además de atención o cuidado ordinarios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄνευ ποδῶν
  english_pob_choice: Without feet
  chosen_spanish: Sin pies
  alternatives_spanish:
  - Sin tener pies
  - Pieless / sin pies
  lexicon: LSJ
  rationale: La imagen es concreta y breve; en español, «sin pies» transmite la falta absoluta de pies con naturalidad y sin añadir matices no presentes en el griego.
- source_word: ἐπʼ ὤμοις φέρονται
  english_pob_choice: they are carried on shoulders
  chosen_spanish: son llevados sobre hombros
  alternatives_spanish:
  - son cargados sobre hombros
  - son portados sobre hombros
  lexicon: LSJ
  rationale: Se conserva la voz pasiva y la escena física de transportar ídolos. «Llevados sobre hombros» es natural y fiel al verbo de movimiento/carga.
- source_word: ἐνδεικνύμενοι
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - dando a mostrar
  - poniendo de manifiesto
  lexicon: LSJ
  rationale: El participio expresa el efecto visible de ser llevados así; «mostrando» comunica ese valor demostrativo sin sobreexplicar.
- source_word: τὴν ἑαυτῶν ἀτιμίαν
  english_pob_choice: their own disgrace
  chosen_spanish: su propia deshonra
  alternatives_spanish:
  - su propia vergüenza
  - su propia deshonra pública
  lexicon: LSJ
  rationale: ἀτιμία abarca deshonra/ignominia; «deshonra» mantiene la fuerza polemizante contra los ídolos. Se conserva el posesivo reflexivo «su propia».
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: ante la gente
  alternatives_spanish:
  - a la gente
  - delante de la gente
  lexicon: LSJ
  rationale: La dativa puede indicar el público ante quien se exhibe la deshonra. «Ante la gente» refleja bien esa lectura espacial/pública y evita el calco «a la gente».
- source_word: αἰσχύνονται
  english_pob_choice: are put to shame
  chosen_spanish: quedan avergonzados
  alternatives_spanish:
  - son puestos en vergüenza
  - se avergüenzan
  lexicon: LSJ
  rationale: El medio/pasivo expresa vergüenza causada por la situación. «Quedan avergonzados» conserva el resultado pasivo y suena natural en español.
- source_word: οἱ θεραπεύοντες αὐτά
  english_pob_choice: those who serve them
  chosen_spanish: los que los sirven
  alternatives_spanish:
  - los que los adoran
  - los que les prestan servicio
  lexicon: LSJ
  rationale: θεραπεύω puede significar servir, atender o rendir culto. «Los que los sirven» mantiene la amplitud del término, incluyendo el servicio culto sin forzar una sola interpretación.
theological_decisions:
- issue: Sentido cultual de θεραπεύοντες en un contexto antiidolátrico
  english_pob_reading: those who serve them
  chosen_spanish_reading: los que los sirven
  alternative_spanish_readings:
  - los que los adoran
  rationale: La frase denuncia tanto a quienes cargan y cuidan los ídolos como a quienes les rinden devoción. «Servir» preserva esa amplitud, evitando restringir el texto a una sola práctica religiosa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor público de τοῖς ἀνθρώποις
  english_pob_reading: to people
  chosen_spanish_reading: ante la gente
  alternative_spanish_readings:
  - a la gente
  - delante de la gente
  rationale: El griego puede leerse como el público ante quien se exhibe la vergüenza de los ídolos. La formulación elegida hace explícito ese matiz sin alterar el sentido base.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «men» por «people» para naturalizar τοῖς ἀνθρώποις. En español se reflejó esa decisión con «ante la gente», manteniendo la lectura pública y evitando un calco masculino innecesario.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y readable en español latinoamericano.
  - Se preservó la ambigüedad cultual de θεραπεύοντες mediante «sirven» y se explicó en nota.
  - La imagen de humillación pública se expresó con «deshonra» y «quedan avergonzados» sin intensificar más allá del griego.
  - Los marcadores [a] y [b] aparecen exactamente en el texto y están vinculados a notas correspondientes.
