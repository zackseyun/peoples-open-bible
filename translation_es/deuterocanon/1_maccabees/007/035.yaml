translation:
  language: es
  text: 'Y juró con ira[a], diciendo: «Si Judas y su campamento no son entregados ahora en mis manos, entonces, cuando yo vuelva en paz, ...»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El juramento queda inconcluso aquí porque la oración griega continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  lexicon: LSJ
  rationale: El aoristo de ὄμνυμι expresa el acto solemne de jurar. «Juró» es natural en español y conserva la fuerza formal del original.
- source_word: μετὰ θυμοῦ
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - enojado
  - con furia
  lexicon: LSJ
  rationale: La expresión indica el estado emocional del juramento. «Con ira» refleja mejor el matiz intenso de θυμός que un simple «enojado», sin exceder el peso del griego.
- source_word: παραδοθῇ
  english_pob_choice: are not delivered
  chosen_spanish: no son entregados
  alternatives_spanish:
  - no son puestos en manos de
  - no son entregados a
  lexicon: LSJ
  rationale: El pasivo de παραδίδωμι expresa ser puesto bajo el poder de otro. «Son entregados» preserva la imagen formal de ser puestos en manos enemigas.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su ejército
  - su hueste
  lexicon: LSJ
  rationale: παρεμβολή puede significar campamento o ejército acampado. «Campamento» sigue la referencia concreta y evita ampliar indebidamente el término.
- source_word: τὸ νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: LSJ
  rationale: El griego enfatiza inmediatez. «Ahora» es la opción más directa y transparente en español.
- source_word: εἰς χεῖράς μου
  english_pob_choice: into my hands
  chosen_spanish: en mis manos
  alternatives_spanish:
  - en mi poder
  - a mi poder
  lexicon: LSJ
  rationale: La locución idiomática conserva la imagen concreta de control o dominio. «En mis manos» mantiene la metáfora del griego con claridad en español.
- source_word: ἐπιστρέψω ἐν εἰρήνῃ
  english_pob_choice: if I return in peace
  chosen_spanish: si vuelvo en paz
  alternatives_spanish:
  - cuando vuelva en paz
  - si regreso en paz
  lexicon: LSJ
  rationale: La construcción condicional queda abierta en el versículo y continúa en el siguiente. «Si vuelvo en paz» conserva la forma incompleta sin forzar una conclusión que el griego no da aquí.
theological_decisions:
- issue: Juramento incompleto que continúa en el versículo siguiente
  english_pob_reading: Retain the sentence as an unfinished conditional clause ending with a comma
  chosen_spanish_reading: Conservar la cláusula como juramento inconcluso que queda abierta al final del versículo
  alternative_spanish_readings:
  - Completar la frase con la continuación del versículo siguiente
  - Cerrar el período como si el juramento terminara aquí
  rationale: El griego termina a mitad del juramento, y la continuación aparece en el versículo siguiente. La traducción española debe preservar esa apertura para no ocultar la forma del texto fuente.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original; transparencia textual'
- issue: Valor de θυμός en el contexto del juramento
  english_pob_reading: in anger
  chosen_spanish_reading: con ira
  alternative_spanish_readings:
  - con enojo
  - con furor
  rationale: «Ira» preserva el tono fuerte del término sin convertirlo en una intensificación innecesaria. Mantiene visible la tensión emocional del juramento.
  doctrine_reference: LSJ; uso contextual de θυμός
translation_notes:
  revision_awareness: 'Se corrigió la falta de anclaje de la nota al pie: el marcador [a] aparece ahora en el texto español junto a «mis manos» y la nota explica que el juramento continúa en el versículo siguiente, conforme al audit trail inglés y al griego.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este texto.
  - Se prefirió «campamento» para παρεμβολή por coherencia con el matiz militar concreto del griego.
  - Se conservó la apertura sintáctica del juramento para respetar la continuidad con 1 Macabeos 7:36.
