translation:
  language: es
  text: Sepan con certeza que Yahvé su Dios ya no[a] expulsará a estas naciones de delante de ustedes, sino que ellas serán para ustedes un lazo y una trampa, un azote[b] en sus costados y espinas en sus ojos, hasta que perezcan de sobre esta buena tierra que Yahvé su Dios les ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ya no seguirá expulsando». El hebreo לֹא יוֹסִיף + infinitivo expresa cese de una acción que venía ocurriendo.
    reason: alternative_reading
  - marker: b
    text: O «scourge/latigazo». El término hebreo es difícil; puede referirse a un instrumento de azote o a una aflicción dolorosa continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד֨וֹעַ֙ תֵּֽדְע֔וּ
  english_pob_choice: know for certain
  chosen_spanish: Sepan con certeza
  alternatives_spanish:
  - Sepan ciertamente
  - Sepan bien
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo ידע intensifica la afirmación. «Sepan con certeza» comunica esa fuerza enfática en español natural, sin volverla rígida ni arcaizante.
- source_word: לֹ֨א יוֹסִ֜יף
  english_pob_choice: will no longer drive out
  chosen_spanish: ya no expulsará
  alternatives_spanish:
  - ya no continuará expulsando
  - no volverá a expulsar
  lexicon: HALOT
  rationale: El hebreo con יסף + infinitivo expresa cese de una acción continuada. «Ya no expulsará» transmite ese corte en la acción divina de manera clara y fiel.
- source_word: לְהוֹרִישׁ
  english_pob_choice: to drive out
  chosen_spanish: expulsará
  alternatives_spanish:
  - desalojará
  - desposeerá
  lexicon: HALOT
  rationale: En contexto de conquista, הוֹרִישׁ comunica quitar a los pueblos de la tierra. «Expulsará» es idiomático en español y conserva la idea de removerlos de delante del pueblo.
- source_word: מִלִּפְנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La expresión espacial hebrea se mantiene de forma transparente con «de delante de ustedes», que refleja el valor idiomático sin perder claridad.
- source_word: לְפַח
  english_pob_choice: a trap
  chosen_spanish: un lazo
  alternatives_spanish:
  - una trampa
  - un cepo
  lexicon: HALOT
  rationale: פַּח suele designar una trampa o red para atrapar. En español, «lazo» conserva bien la imagen de captura y permite distinguirlo de מוֹקֵשׁ.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - un tropiezo
  lexicon: HALOT
  rationale: מוֹקֵשׁ puede ser una trampa que induce a la ruina. Dado que פַּח quedó como «lazo», «trampa» preserva la distinción léxica en el par hebreo.
- source_word: לְשֹׁטֵט בְּצִדֵּי/כֶם
  english_pob_choice: a scourge on your sides
  chosen_spanish: un azote en sus costados
  alternatives_spanish:
  - un látigo en sus costados
  - un azote sobre sus costados
  lexicon: HALOT
  rationale: El término es difícil y la tradición de la serie POB lo entiende como un instrumento o efecto de flagelación/aflicción. «Azote» conserva la fuerza de castigo y «costados» mantiene el cuerpo como lugar del daño.
- source_word: וְלִצְנִנִים בְּעֵינֵיכֶם
  english_pob_choice: thorns in your eyes
  chosen_spanish: espinas en sus ojos
  alternatives_spanish:
  - aguijones en sus ojos
  - pinchos en sus ojos
  lexicon: HALOT
  rationale: צְנִנִים expresa algo punzante e irritante. «Espinas» reproduce la imagen más natural en español y mantiene el paralelismo con el dolor persistente.
- source_word: עַד אֲבָדְכֶם
  english_pob_choice: until you perish
  chosen_spanish: hasta que perezcan
  alternatives_spanish:
  - hasta que sean destruidos
  - hasta su destrucción
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo marca el punto final del juicio. «Hasta que perezcan» es directo y fiel al desenlace amenazado.
- source_word: מֵעַל הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  english_pob_choice: from off this good land
  chosen_spanish: de sobre esta buena tierra
  alternatives_spanish:
  - de esta buena tierra
  - de encima de esta buena tierra
  lexicon: HALOT
  rationale: אֲדָמָה aquí es la tierra concedida por Dios, no solo suelo. «De sobre esta buena tierra» conserva mejor el matiz de מֵעַל y la dimensión de posesión/covenio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», como forma reverente y auditablemente vinculada al nombre divino revelado.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. La edición española debe preservarlo con una transliteración del nombre, no sustituirlo por un título ocultador.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carácter del juicio anunciado
  english_pob_reading: Covenantal judgment expressed as the LORD ceasing to drive out the nations, resulting in Israel's affliction and eventual perishing from the land
  chosen_spanish_reading: Juicio de pacto expresado como el cese de la expulsión de las naciones, seguido por aflicción continua e incluso la pérdida de la tierra
  alternative_spanish_readings:
  - predicción militar sin carga pactual
  - simple advertencia moral
  rationale: La advertencia liga la acción de Yahvé con la permanencia de Israel en la tierra dada. La traducción conserva esa tensión sin explicarla ni atenuarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se integró la revisión que prefería una forma más natural para שֹׁטֵט, adoptando «un azote» en lugar de una imagen más literal y pesada como «un látigo», y se mantuvo la lectura de cesación para לֹא יוֹסִיף de forma concisa.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en todo el texto.
  - Se mantuvo el contraste léxico entre «lazo» y «trampa» para reflejar פַּח y מוֹקֵשׁ.
  - «De delante de ustedes» y «de sobre esta buena tierra» preservan dos preposiciones espaciales distintas del hebreo.
  - La segunda persona plural se uniformó en «ustedes» para claridad y consistencia en español latinoamericano.
