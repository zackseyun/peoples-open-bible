  text: וַ/אֲנִ֞י הִנֵּ֧ה נְתַתִּ֣י/ךָ הַ/יּ֗וֹם לְ/עִ֨יר מִבְצָ֜ר וּ/לְ/עַמּ֥וּד בַּרְזֶ֛ל וּ/לְ/חֹמ֥וֹת נְחֹ֖שֶׁת עַל כָּל הָ/אָ֑רֶץ לְ/מַלְכֵ֤י יְהוּדָה֙ לְ/שָׂרֶ֔י/הָ לְ/כֹהֲנֶ֖י/הָ וּ/לְ/עַ֥ם הָ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/001/018.yaml
  text: And I—behold[a], I have made you today a fortified city, an iron pillar, and bronze walls against the whole land—against the kings of Judah, its officials, its priests[b], and the people of the land.
  footnotes:
  - marker: a
    text: Or 'I have set you today as a fortified city.' The Hebrew verb literally means 'given/set,' but here carries the sense of appointing or making Jeremiah into a fortified presence.
    reason: lexical_alternative
  - marker: b
    text: '''The people of the land'' can in some contexts mean the common people in contrast to rulers, but here it may also function more broadly for the populace as a whole.'
    reason: lexical_alternative
