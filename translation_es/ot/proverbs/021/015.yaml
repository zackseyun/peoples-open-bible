translation:
  language: es
  text: Hacer justicia es alegría para el justo[a], pero destrucción para los malhechores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «Hacer justicia es alegría para el justo, y destrucción para los malhechores». El hebreo מְחִתָּה puede denotar ruina, destrucción o dismayo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: El sustantivo expresa un estado de alegría/gusto. 'Alegría' suena natural en español y conserva el valor nominal del hebreo sin forzar una perífrasis verbal.
- source_word: לַצַּדִּיק
  english_pob_choice: to the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - al justo
  - para el justo creyente
  lexicon: HALOT
  rationale: El hebreo usa un singular sustantivado con valor representativo. 'El justo' mantiene esa fuerza; 'para' refleja bien la relación de beneficio/afectación que marca ל en este proverbio.
- source_word: עֲשׂוֹת
  english_pob_choice: doing
  chosen_spanish: hacer
  alternatives_spanish:
  - el hacer
  - practicar
  lexicon: HALOT
  rationale: El infinitivo constructo funciona sustantivamente. En español, 'hacer justicia' es una construcción clara y fiel, más natural que 'el hacer justicia' en un proverbio breve.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - lo recto
  lexicon: HALOT
  rationale: En sabiduría, מִשְׁפָּט puede referirse a justicia en sentido moral y jurídico. 'Justicia' preserva ese campo semántico y coincide con la decisión inglesa.
- source_word: וּמְחִתָּה
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - terror
  - dismay
  lexicon: HALOT
  rationale: El sustantivo admite varios matices, pero la revisión inglesa favorece 'destruction'. 'Destrucción' conserva el contraste fuerte del proverbio sin perder la amplitud de 'ruina/terror'.
- source_word: לְפֹעֲלֵי אָוֶן
  english_pob_choice: to evildoers
  chosen_spanish: para los que hacen maldad
  alternatives_spanish:
  - para los malhechores
  - para los que practican la iniquidad
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'para los que obran iniquidad/maldad'. 'Los que hacen maldad' conserva el participio plural y evita un tecnicismo eclesiástico que en español podría sonar más interpretativo que el hebreo.
- source_word: אָוֶן
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - iniquidad/daño
  lexicon: HALOT
  rationale: En esta colocación, אָוֶן tiene sentido moral negativo. 'Maldad' comunica bien la idea en español y hace visible la oposición con 'justicia'.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'a terror' por 'destruction' para acercarse más a מְחִתָּה. La versión española adopta 'destrucción' para alinearse con esa revisión y mantiene la estructura antitética del proverbio.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el nombre divino.
  - '''Justo'' se eligió como equivalente singular representativo de צַדִּיק.'
  - Se evitó 'siervo' u otro lenguaje eclesiástico no presente en el hebreo.
  - La nota al pie conserva la alternativa semántica principal de מְחִתָּה sin sobrecargar el texto principal.
