translation:
  language: es
  text: Porque yo te saqué de la tierra de Egipto, y de la casa de esclavitud[a] te redimí; y envié delante de ti a Moisés, Aarón y Miriam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de la casa de esclavos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la base o explicación del reclamo divino; en español, «Porque» conserva bien la relación argumentativa sin perder naturalidad.
- source_word: הֶעֱלִתִיךָ
  english_pob_choice: I brought you up
  chosen_spanish: te saqué
  alternatives_spanish:
  - te hice subir
  - te llevé arriba
  lexicon: HALOT
  rationale: El hebreo usa el Hifil de עלה, con sentido exódico convencional. En español, «te saqué» comunica con naturalidad la liberación desde Egipto, aunque el matiz literal de «subir» queda menos visible.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: «Tierra» reproduce bien אֶרֶץ y evita una construcción más pesada. «De la tierra de Egipto» es clara y fiel al formulario exódico.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de esclavos
  - de la casa de servidumbre
  - de la casa de esclavitud
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo y el valor de esclavitud/bondaje. «Casa de esclavitud» mantiene la fuerza lexical sin sustituirla por un término eclesiástico más tradicional.
- source_word: פְּדִיתִיךָ
  english_pob_choice: I redeemed you
  chosen_spanish: te redimí
  alternatives_spanish:
  - te rescaté
  - te libré
  lexicon: HALOT
  rationale: «Redimí» conserva el peso teológico y el vínculo con פדה mejor que un simple «rescaté». La forma verbal directa en español suena natural y solemne.
- source_word: וָאֶשְׁלַח
  english_pob_choice: and I sent
  chosen_spanish: y envié
  alternatives_spanish:
  - y mandé
  - y despaché
  lexicon: HALOT
  rationale: «Envié» es el equivalente más natural y fiel para שלח en este contexto narrativo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes de ti
  - por delante de ti
  lexicon: HALOT
  rationale: «Delante de ti» conserva la imagen espacial y la secuencia de liderazgo previa a Israel.
- source_word: אֶת מֹשֶׁה אַהֲרֹן וּמִרְיָם
  english_pob_choice: Moses, Aaron, and Miriam
  chosen_spanish: a Moisés, a Aarón y a Miriam
  alternatives_spanish:
  - a Moisés, Aarón y Miriam
  - a Moisés, a Aarón y Miriam
  lexicon: HALOT
  rationale: Se mantienen los nombres propios y la coordinación explícita. El artículo acusativo hebreo no se traduce; las preposiciones con «a» son naturales con objetos personales en español.
theological_decisions:
- issue: Relación entre liberación y redención en el éxodo
  english_pob_reading: I brought you up ... and I redeemed you
  chosen_spanish_reading: te saqué ... te redimí
  alternative_spanish_readings:
  - te liberé ... te redimí
  - te saqué ... te rescaté
  rationale: 'La combinación mantiene dos actos distintos: salida/liberación y redención. «Redimí» preserva el contenido teológico fuerte de פדה sin diluirlo en un verbo más general.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Valor de עֲבָדִים en la fórmula exódica
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de esclavos
  - casa de servidumbre
  - casa de esclavitud
  rationale: Se conserva el estado de esclavitud como realidad social concreta, evitando una atenuación doctrinal o estilística. La expresión es plenamente comprensible en español bíblico moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior del inglés POB que prefirió «house of slavery» sobre «house of slaves» por ser más natural. La versión española adopta esa misma dirección, pero la expresa de forma idiomática como «casa de esclavitud» para mantener claridad y fidelidad al valor léxico del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma en el proyecto, pero este versículo no contiene el Tetragrámaton explícito.
  - Se mantuvo «Moisés», «Aarón» y «Miriam» con grafía española estándar y sin adaptar el nombre de Miriam, siguiendo el texto fuente.
  - La construcción «te saqué ... te redimí» equilibra naturalidad y equivalencia formal, evitando un calco de «hice subir» que sonaría menos natural en español.
