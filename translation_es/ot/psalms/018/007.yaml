review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca el audit trail inglés: «En mi angustia», «invoco a Yahvé», «clamo pidiendo ayuda», «Él oye», «desde su templo» y «mi clamor delante de él llega a sus oídos» preservan correctamente los principales valores semánticos y el paralelismo. Sin embargo, la nota [a] no corresponde al contenido de la nota inglesa auditada: el inglés preserva como alternativa principal la lectura futura de los imperfectos («He will hear ... will come»), mientras que la nota española añade una alternativa lexical para אֶקְרָא («llamo a Yahvé») que no es la alternativa destacada en la evidencia auditada. Conviene ajustar esa nota para alinearla con el motivo documentado.'
  spanish_quality_summary: El español es natural, claro y digno. La sintaxis fluye bien y evita calcos rígidos. «Clamo pidiendo ayuda» es plenamente comprensible, aunque un poco más expansivo que el inglés; sigue siendo fiel al sentido del piel de שׁוע. «Llega a sus oídos» es idiomático y adecuado en español. La única reparación necesaria es documental y de fidelidad a la nota auditada, no de legibilidad del texto principal.
  glossary_alignment: 'La terminología del proyecto está bien respetada: יְהוָה se traduce correctamente como «Yahvé»; אֱלֹהַי como «mi Dios»; הֵיכָל como «templo» con alternativa en nota; no hay conflictos con otros términos doctrinales. No se detectan desviaciones de la política léxica del POB en el texto principal.'
  issues:
  - severity: medium
    issue: La nota [a] introduce una alternativa léxica («llamo a Yahvé») no preservada como nota en el audit trail inglés.
    rationale: La nota inglesa [a] documenta específicamente la posible lectura futura de los imperfectos hebreos. Aunque «llamo a» es una alternativa léxica válida para אֶקְרָא, aquí desplaza el foco de la nota auditada y mezcla dos asuntos distintos.
  - severity: low
    issue: La razón de la nota [a] figura como alternative_reading, pero su contenido mezcla lectura aspectual y variante de estilo.
    rationale: Para mantener trazabilidad clara con el POB inglés, la nota debe centrarse en la fuerza futura de los imperfectos, que es la alternativa realmente documentada.
  revised_spanish_text: En mi angustia invoco a Yahvé[a], y a mi Dios clamo pidiendo ayuda. Él oye mi voz desde su templo[b], y mi clamor delante de él llega a sus oídos.
  revised_footnotes:
  - marker: a
    text: 'O: «Él oirá mi voz desde su templo ... mi clamor delante de él llegará a sus oídos». Los imperfectos hebreos también pueden leerse con fuerza futura.'
    reason: alternative_reading
  - marker: b
    text: «Templo» también puede verterse «palacio» o «santuario»; el hebreo הֵיכָל puede designar la morada de un rey o la de Dios.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota [a] para que refleje con precisión la alternativa documentada en el audit trail inglés: la lectura futura de los imperfectos. También se simplifica levemente la nota [b] sin cambiar su contenido esencial.'
