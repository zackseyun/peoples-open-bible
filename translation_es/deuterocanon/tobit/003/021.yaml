translation:
  language: es
  text: No temas[a], muchacho, porque hemos llegado a ser pobres; tienes mucho, si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego del paquete fuente incluye una expansión amplia del contexto inmediato; aquí se traduce solo la unidad que corresponde al enunciado de 3:21 en la segmentación habitual.
    reason: textual_variant
lexical_decisions:
- source_word: μὴ φοβοῦ
  english_pob_choice: do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: LSJ
  rationale: Imperativo de prohibición directo y natural en español; 'temas' conserva el matiz bíblico de reverencia/temor sin sonar arcaico.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: muchacho
  alternatives_spanish:
  - niño
  - hijo
  lexicon: LSJ
  rationale: En el contexto narrativo, 'muchacho' comunica mejor la edad/condición del interlocutor masculino joven y suena natural en español bíblico contemporáneo.
- source_word: ἐπτωχεύσαμεν
  english_pob_choice: we have become poor
  chosen_spanish: hemos empobrecido
  alternatives_spanish:
  - nos hemos hecho pobres
  - hemos quedado pobres
  lexicon: LSJ
  rationale: El perfecto expresa un estado resultante; 'hemos empobrecido' mantiene la idea de volverse pobre sin sonar excesivamente literal.
- source_word: φοβηθῇς τὸν θεὸν
  english_pob_choice: if you fear God
  chosen_spanish: si temes a Dios
  alternatives_spanish:
  - si reverencias a Dios
  - si tienes temor de Dios
  lexicon: LSJ
  rationale: '''Temes a Dios'' preserva el lenguaje bíblico de reverencia y obediencia ligado al temor piadoso.'
- source_word: ἀποστῇς ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: turn away from every sin
  chosen_spanish: te apartas de todo pecado
  alternatives_spanish:
  - te alejas de todo pecado
  - te apartas de todo mal
  lexicon: LSJ
  rationale: '''Apartarse de'' refleja bien el sentido de separarse/retirarse de una conducta; ''pecado'' conserva la referencia moral exacta.'
- source_word: ποιήσῃς τὸ ἀρεστὸν ἐνώπιον αὐτοῦ
  english_pob_choice: do what is pleasing before him
  chosen_spanish: haces lo que le agrada delante de él
  alternatives_spanish:
  - haces lo agradable ante él
  - haces lo que es recto delante de él
  lexicon: LSJ
  rationale: '''Lo que le agrada'' respeta el valor de ἀρεστόν como lo que es aceptable/agradable a Dios, sin sustituirlo por ''recto'' y perder el matiz de agrado divino.'
theological_decisions:
- issue: Temor de Dios como condición de la promesa
  english_pob_reading: if you fear God and turn away from every sin and do what is pleasing before him
  chosen_spanish_reading: si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él
  alternative_spanish_readings:
  - si reverencias a Dios y te apartas de todo pecado y haces lo que es agradable delante de él
  - si tienes temor de Dios y te alejas de todo pecado y haces lo recto delante de él
  rationale: La frase mantiene el vínculo entre temor reverente, abandono del pecado y obediencia práctica, sin suavizar la exigencia moral del pasaje.
  doctrine_reference: Sabiduría/ética bíblica del temor de Yahvé; cf. Prov 1:7 y Tobit en su exhortación sapiencial.
translation_notes:
  revision_awareness: Se corrigió la falla anterior eliminando toda nota no anclada y manteniendo solo una nota textual con marcador presente en el texto. La redacción sigue el griego suministrado y la revisión inglesa que ajustó la cita al contenido exhortativo de Tobit 3:21.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός según el estándar del proyecto.
  - Se eligió 'te apartas de todo pecado' para conservar la fuerza totalizante de πάσης ἁμαρτίας.
  - Se evitó 'SEÑOR' porque el texto griego usa θεός y no κύριος en esta unidad.
  - La construcción principal permanece formal y bíblica, pero con sintaxis natural en español moderno.
