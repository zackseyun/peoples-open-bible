translation:
  language: es
  text: Plantarás viñas y las cultivarás[a], pero no beberás el vino ni lo recogerás, porque lo comerá el gusano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo almacenarás» o «lo guardarás». El verbo hebreo puede significar reunir, recoger o almacenar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - viñas de uva
  lexicon: HALOT
  rationale: El hebreo plural se refiere a plantaciones de vid; en español, «viñas» es natural, fiel y más directo que una expansión explicativa. «Viñedos» también sería posible, pero «viñas» conserva mejor la imagen concreta del texto.
- source_word: תִּטַּע
  english_pob_choice: you will plant
  chosen_spanish: plantarás
  alternatives_spanish:
  - sembrarás
  - plantarás tú
  lexicon: HALOT
  rationale: Es un imperfecto de segunda persona masculina singular con valor futuro en la secuencia de maldición. «Plantarás» expresa bien la acción futura sin añadir solemnidad arcaica innecesaria.
- source_word: וְעָבָדְתָּ
  english_pob_choice: and cultivate them
  chosen_spanish: y las cultivarás
  alternatives_spanish:
  - y las trabajarás
  - y las labrarás
  - y las atenderás
  lexicon: HALOT
  rationale: En contexto agrícola, עבד transmite la idea de trabajar o cultivar la tierra. «Cultivarás» conserva el sentido productivo y permite suplir el objeto implícito en español con el pronombre «las».
- source_word: יַיִן
  english_pob_choice: the wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: 'Aunque el hebreo puede aludir al producto de la viña, el español natural exige el artículo aquí: «el vino». Mantiene la referencia al resultado que no podrá disfrutarse.'
- source_word: לֹא תִשְׁתֶּה
  english_pob_choice: you will not drink
  chosen_spanish: no beberás
  alternatives_spanish:
  - no lo beberás
  - no tomarás
  lexicon: HALOT
  rationale: El verbo es la negación simple de beber. En español, el objeto ya queda claro por el contexto inmediato y por el paralelo con la viña y el vino.
- source_word: וְלֹא תֶאֱגֹר
  english_pob_choice: or gather it
  chosen_spanish: ni lo recogerás
  alternatives_spanish:
  - ni lo reunirás
  - ni lo almacenarás
  - ni lo guardarás
  lexicon: HALOT
  rationale: אגר puede significar reunir, recoger o almacenar. Aquí, «recogerás» funciona bien en el marco de una cosecha de viña y mantiene abierta la tensión de si se trata de recolectar o de asegurar/guardar la producción.
- source_word: תֹאכְלֶנּוּ
  english_pob_choice: will eat it
  chosen_spanish: lo comerá
  alternatives_spanish:
  - lo devorará
  - lo consumirá
  lexicon: HALOT
  rationale: El hebreo presenta al sujeto destructivo como agente que se come la cosecha. «Lo comerá» es la traslación directa y sobria; no intensifica más de lo que el texto exige.
- source_word: הַתּוֹלָעַת
  english_pob_choice: the worm
  chosen_spanish: el gusano
  alternatives_spanish:
  - el gusano
  - la larva
  - el insecto
  lexicon: HALOT
  rationale: El término hebreo denota una criatura larvaria o gusano destructivo. «Gusano» es el equivalente más amplio y literal en español; evita precisar una especie que el hebreo no especifica.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo consonántico-vocalizado de WLC y el criterio óptimo-equivalente del POB inglés. Se conservó la secuencia futura de maldición, se hizo explícito el objeto implícito en «las cultivarás», y se mantuvo la ambigüedad de אגר con una nota breve.
  spanish_consistency_notes:
  - Se usó «viñas» para כְּרָמִים, en línea con el sentido agrícola inmediato.
  - 'Se mantuvo el futuro de segunda persona singular en toda la serie verbal: plantarás, cultivarás, beberás, recogerás, comerá.'
  - «Gusano» traduce el sujeto destructivo de forma amplia y literal, sin especificarlo más allá del hebreo.
  - La nota textual/lexical se ancla en «recogerás» para reflejar la alternativa de ‘almacenar/guardar’ documentada en el audit trail inglés.
