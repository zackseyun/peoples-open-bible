revisions:
- from: 'Harán una lamentación sobre ti en su lamento[a], y te lamentarán, diciendo: «¿Quién como Tiro[b], silenciada en medio del mar?»'
  to: 'Levantarán sobre ti una lamentación en su lamento[b], y lamentarán por ti: «¿Quién como Tiro, silenciada[a] en medio del mar?»'
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a los elementos explicados. También se reemplazó «Harán una lamentación» por «Levantarán ... una lamentación», que refleja mejor el modismo נשא + קינה, y «te lamentarán» por «lamentarán por ti», que es más natural en español y conserva el sentido de קונן sobre alguien. No se requiere adjudicación adicional porque el problema es de anclaje y estilo, no de incertidumbre doctrinal o textual irresoluble.
