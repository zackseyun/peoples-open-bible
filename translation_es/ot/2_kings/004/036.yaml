review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la secuencia narrativa hebrea, conserva la repetición de «llamar», refleja correctamente «esta sunamita» y mantiene «tu hijo». Sin embargo, «Levanta a tu hijo» no expresa con suficiente fidelidad el imperativo שְׂאִי en este contexto, donde Eliseo le indica que tome o alce consigo a su hijo restaurado; «Toma a tu hijo» o «Alza a tu hijo» sería más fiel e idiomático. También «vino a él» suena algo calcado; «se acercó a él» o «vino hacia él» sería más natural, aunque no es un error grave.
  spanish_quality_summary: El español es claro y mayormente natural. «Entonces llamó…» y «Así que la llamó» funcionan, aunque la secuencia puede pulirse para más fluidez. El punto principal de calidad es evitar el matiz potencialmente confuso de «Levanta a tu hijo», que en español puede sonar a ponerlo de pie, no a tomarlo en brazos. «Giezi» es aceptable en tradición española.
  glossary_alignment: No hay términos del glosario mayor en este versículo. «Giezi» es una adaptación española razonable de Gehazi. «Sunamita» está bien elegido para el gentilicio femenino. La revisión propuesta mantiene la precisión léxica del hebreo y la claridad eclesial en español.
  issues:
  - severity: medium
    issue: «Levanta a tu hijo» para שְׂאִי
    rationale: נשא aquí significa tomar/alzar al hijo restaurado. En español, «levantar a tu hijo» puede entenderse como ayudarlo a ponerse de pie, lo que debilita o desvía la imagen del acto.
  - severity: low
    issue: «vino a él» suena algo literal
    rationale: Aunque refleja correctamente וַתָּבֹא אֵלָיו, en español narrativo «se acercó a él» suele sonar más natural sin pérdida de sentido.
  revised_spanish_text: 'Entonces llamó a Giezi y dijo[a]: «Llama a esta sunamita». Así que la llamó, y ella se acercó a él. Entonces dijo: «Toma a tu hijo».'
