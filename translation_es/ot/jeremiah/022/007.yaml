translation:
  language: es
  text: Y yo apartaré contra ti[a] destructores, cada uno con sus armas[b]; cortarán los mejores de tus cedros y los echarán al fuego[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «consagraré» o «designaré». El hebreo usa un verbo que normalmente se traduce «consagrar» o «hacer santo», aquí con el sentido de apartar agentes para juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada uno con sus herramientas/implementos». El término hebreo puede referirse de manera amplia a utensilios o equipo; en este contexto probablemente alude a armas o instrumentos de destrucción.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «sobre el fuego». En español, «al fuego» expresa con más naturalidad la idea pretendida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  english_pob_choice: I will set apart
  chosen_spanish: consagraré
  alternatives_spanish:
  - apartaré
  - designaré
  - consagraré
  lexicon: HALOT
  rationale: El hebreo usa el verbo קדשׁ, que normalmente significa “consagrar” o “hacer santo”, pero aquí funciona en un contexto de juicio para designar agentes para la tarea. “Consagraré” conserva la carga semántica cultual/técnica del verbo sin reducirlo a un simple “nombraré”; por eso se mantiene la tensión teológica señalada en el audit trail.
- source_word: מַשְׁחִתִים
  english_pob_choice: destroyers
  chosen_spanish: destructores
  alternatives_spanish:
  - los que destruyen
  - devastadores
  lexicon: HALOT
  rationale: El participio sustantivado de שׁחת denota agentes de destrucción. “Destructores” es natural en español y conserva el valor agentivo y el tono de juicio.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: En un contexto hostil, על expresa fuerza adversativa; “contra ti” transmite mejor esa oposición que un mero sentido espacial.
- source_word: אִישׁ וְכֵלָיו
  english_pob_choice: each with his weapons
  chosen_spanish: cada uno con sus armas
  alternatives_spanish:
  - cada hombre con sus herramientas
  - cada uno con sus implementos
  - un hombre con sus armas
  lexicon: HALOT
  rationale: La construcción distributiva pide un sujeto individualizado; “cada uno” comunica mejor esa distribución que una traducción más literal. כלי puede abarcar utensilios, instrumentos o armas; en este marco de destrucción, “armas” es una opción sobria y plausible, aunque no excluye la idea de instrumentos de derribo.
- source_word: וְכָרְתוּ
  english_pob_choice: they will cut down
  chosen_spanish: cortarán
  alternatives_spanish:
  - derribarán
  - taladrán
  lexicon: HALOT
  rationale: כרת aplicado a árboles significa talar/cortar. “Cortarán” es claro y fiel; “derribarán” es posible, pero “cortarán” mantiene mejor el verbo básico de tala.
- source_word: מִבְחַר
  english_pob_choice: the choicest of
  chosen_spanish: los mejores de
  alternatives_spanish:
  - lo mejor de
  - los más escogidos de
  - los escogidos de
  lexicon: HALOT
  rationale: מבחר indica lo selecto o escogido. “Los mejores de” conserva la idea de selección valiosa y suena natural en español; “los más escogidos” sería más literal pero menos fluido.
- source_word: אֲרָזֶיךָ
  english_pob_choice: your cedars
  chosen_spanish: tus cedros
  alternatives_spanish:
  - tus cedros
  - tus árboles de cedro
  lexicon: HALOT
  rationale: La forma plural con sufijo se traduce de manera directa por “tus cedros”. Se mantiene la concreción imagética del texto.
- source_word: וְהִפִּילוּ עַל הָאֵשׁ
  english_pob_choice: and cast them into the fire
  chosen_spanish: y los echarán al fuego
  alternatives_spanish:
  - y los arrojarán al fuego
  - y los pondrán sobre el fuego
  - y los echarán sobre el fuego
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente “hacer caer sobre el fuego”; en español, “echar al fuego” comunica de forma natural el resultado buscado. “Al fuego” evita el calco duro de “sobre el fuego” y conserva el sentido de destrucción final.
theological_decisions:
- issue: Lenguaje de consagración aplicado a instrumentos de juicio
  english_pob_reading: Render וְקִדַּשְׁתִּי as 'I will set apart' rather than a purely secular 'I will appoint.'
  chosen_spanish_reading: consagraré
  alternative_spanish_readings:
  - apartaré
  - designaré
  - nombraré
  rationale: 'Se mantiene la ironía teológica del hebreo: Yahvé usa lenguaje de santificación para poner aparte agentes de castigo. “Consagraré” conserva esa densidad sin sugerir que los destructores sean moralmente santos; la nota explica el valor funcional del verbo en este contexto.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Tomé como base el estado revisado más reciente del POB inglés, que sustituyó 'throw' por 'cast' para un registro más formal. En español no conviene forzar un calco con 'arrojar' si 'echar al fuego' comunica mejor la imagen y el resultado del hebreo; por eso se optó por una solución idiomática pero formal. Se preservó además la tensión teológica de קדשׁ mediante 'consagraré'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito en la primera persona divina sin introducir una traducción con 'SEÑOR'.
  - Se conserva el paralelismo de juicio en una sola oración coordinada, acorde con el hebreo.
  - No se suavizó el valor militar/destructivo de כלי; se dejó 'armas' por el contexto.
  - La elección de 'cedros' mantiene la concreción poética del texto, sin ampliar a 'árboles de cedro'.
