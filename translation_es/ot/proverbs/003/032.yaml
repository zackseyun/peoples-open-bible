translation:
  language: es
  text: Porque la persona torcida es una abominación para Yahvé, pero con los rectos está su consejo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su secreto»; el hebreo סוֹד puede significar consejo confidencial, secreto o intimidad de relación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa del proverbio anterior. En español, «Porque» conserva bien el valor causal/explanatorio sin sonar forzado.
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa detestable
  lexicon: HALOT
  rationale: «Abominación» mantiene el peso moral y covenantal del hebreo mejor que un adjetivo más suave. En español es una opción natural y reconocible en registro bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin enmascararlo como título. «Yahvé» es la forma coherente con la política editorial dada.
- source_word: נָלוֹז
  english_pob_choice: the crooked person
  chosen_spanish: el torcido
  alternatives_spanish:
  - el desviado
  - el perverso
  - el de conducta torcida
  lexicon: HALOT
  rationale: El hebreo describe a la persona moralmente torcida o desviada. «El torcido» conserva esa metáfora con brevedad; en español, el artículo sustantiva el rasgo como en el contraste sapiencial.
- source_word: וְאֶת
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mientras que
  lexicon: HALOT
  rationale: Aunque la forma es conjuntiva, el paralelo antitético exige un adversativo en español. «Pero» comunica claramente el contraste con los rectos.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - los honestos
  lexicon: HALOT
  rationale: «Rectos» conserva la imagen de alineación moral y el paralelismo con «torcido». Es más directo que «justos» para este contraste sapiencial.
- source_word: סוֹד
  english_pob_choice: his counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - su secreto
  - su intimidad
  - su confidencia
  lexicon: HALOT
  rationale: El sustantivo puede significar consejo confidencial, secreto o círculo íntimo. Siguiendo la revisión inglesa, «consejo» evita expandir el sentido, y el posesivo «su» mantiene la ambigüedad del hebreo entre el referente divino o el de la cláusula antecedente, según la lectura que se adopte.
theological_decisions:
- issue: Sentido de סוֹד en relación con los rectos
  english_pob_reading: his counsel is with the upright
  chosen_spanish_reading: con los rectos está su consejo
  alternative_spanish_readings:
  - su secreto está con los rectos
  - hay intimidad/consejo con los rectos
  rationale: 'La palabra hebrea admite consejo confidencial, secreto o relación íntima. La opción elegida sigue la revisión inglesa que redujo la expansión interpretativa, pero conserva la tensión: puede leerse como el consejo/propósito que pertenece a Yahvé y se da a los rectos, sin cerrar por completo la posibilidad de sentido relacional.'
  doctrine_reference: Preservar la ambigüedad lexical y la tensión teológica sin resolverla de forma dogmática
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «his intimate counsel» a «his counsel» para evitar expansión interpretativa. La traducción española sigue esa revisión y evita añadir «intimidad» en el texto principal, aunque la nota conserva la alternativa léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto.
  - Se usa «rectos» para conservar el paralelismo con «torcido».
  - Se traduce סוֹד de forma sobria como «consejo», dejando la alternativa «secreto» en nota.
  - El tono es sapiencial y bíblico sin calcos excesivamente literales.
