lexical_decisions:
- source_word: בְּנָיָ֨הוּ֙
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benayá
  - Benaías
  lexicon: HALOT
  rationale: Nombre propio; en español se adapta la transliteración para conservar identificación clara y fluidez, sin traducir el nombre.
- source_word: פִּרְעָתֹנִ֔י
  english_pob_choice: the Pirathonite
  chosen_spanish: el piratonita
  alternatives_spanish:
  - de Piratón
  - el de Piratón
  lexicon: HALOT
  rationale: Es un gentilicio derivado de Piratón; el sufijo español '-ita' comunica origen/adscripción de modo natural y mantiene la fuerza gentilicia del hebreo.
- source_word: הִדַּ֖י
  english_pob_choice: Hiddai
  chosen_spanish: Hidai
  alternatives_spanish:
  - Hiddai
  - Jidai
  lexicon: HALOT
  rationale: Nombre propio del texto masorético; se translitera en forma española directa, cercana a la grafía hebrea, sin adoptar la forma alternativa del paralelo de Crónicas.
- source_word: מִ/נַּ֥חֲלֵי
  english_pob_choice: from the wadis of
  chosen_spanish: de los wadis de
  alternatives_spanish:
  - de los arroyos de
  - de los barrancos de
  - de los valles de
  lexicon: HALOT
  rationale: נחל puede designar wadi, cauce torrencial o lecho de torrente; 'wadis' preserva ese sentido geográfico específico que el inglés POB ya distinguió.
- source_word: גָֽעַשׁ
  english_pob_choice: Gaash
  chosen_spanish: Gaas
  alternatives_spanish:
  - Gaas
  - Gaás
  lexicon: HALOT
  rationale: Nombre de lugar; se translitera sin traducir, ajustando la forma al uso español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el acuerdo con el control cruzado fue alto; por tanto, se mantiene la lectura base del Texto Masorético en Samuel, con una transliteración española directa y las notas mínimas necesarias para las alternativas léxicas y el paralelo de Crónicas.
  spanish_consistency_notes:
  - Se mantiene el criterio de transliterar nombres propios en vez de traducirlos.
  - Se conserva 'wadis' para nחל por fidelidad geográfica y coherencia con el audit trail en inglés.
  - La forma 'Hidai' sigue el MT de Samuel; la nota de paralelo evita borrar la variante de 1 Crónicas 11:32.
  - La puntuación con punto y coma refleja el cierre breve del listado nominal.
