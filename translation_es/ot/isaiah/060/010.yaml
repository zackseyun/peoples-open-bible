revisions:
- from: Los hijos de extranjeros[a] reedificarán tus muros, y sus reyes te servirán[b]; porque en mi ira te herí, pero en mi favor[c] he tenido compasión de ti[d].
  to: Los hijos de extranjeros[a] reedificarán tus muros, y sus reyes te ministrarán[b]; porque en mi ira te herí, pero en mi favor[c] he tenido compasión de ti[d].
  rationale: 'Se proponen ajustes menores para alinear mejor el español con el rastro auditado y mejorar la naturalidad: (1) ''te ministrarán'' preserva mejor el matiz de יְשָׁרְתוּנֶךְ documentado por el POB inglés; (2) se corrige la nota [b], que tenía un error de persona; (3) se corrige la formulación antinatural de la nota [d]; y (4) la nota [a] se simplifica para reflejar mejor la alternativa inglesa, ya que el texto principal ya contiene ''los hijos de extranjeros''.'
