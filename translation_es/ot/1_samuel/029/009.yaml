translation:
  language: es
  text: 'Achís respondió y dijo a David: «Sé que eres bueno ante mis ojos, como un ángel[a] de Dios. Pero los comandantes de los filisteos han dicho: “No debe subir con nosotros a la batalla”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero de Dios». El hebreo מַלְאָךְ puede significar «mensajero» o «ángel»; en esta expresión, «ángel de Dios» es la lectura más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה introduce una respuesta dentro del diálogo narrativo. En español, «respondió» conserva el giro formal sin sonar tan redundante como «respondió y dijo», aunque ese orden también es posible.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: אמר es el verbo narrativo estándar. «Dijo» mantiene la secuencia hebrea «respondió y dijo» de modo natural en español.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Conozco
  - He sabido
  lexicon: HALOT
  rationale: El perfecto expresa una evaluación asentada en el presente del discurso. «Sé» comunica bien esa certeza actual en español.
- source_word: טוֹב אַתָּה בְּעֵינַי
  english_pob_choice: you are good in my eyes
  chosen_spanish: eres bueno a mis ojos
  alternatives_spanish:
  - eres grato a mis ojos
  - me pareces bueno
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «a mis ojos», que en español es comprensible y deja abierta la amplitud evaluativa de טוֹב sin reducirla a mera moralidad o utilidad.
- source_word: כְּמַלְאַךְ אֱלֹהִים
  english_pob_choice: like an angel of God
  chosen_spanish: como un ángel de Dios
  alternatives_spanish:
  - como un mensajero de Dios
  lexicon: HALOT
  rationale: Se mantiene «ángel» porque, en esta expresión, es la lectura más natural del uso idiomático y la que mejor preserva la alta estima retórica de Achís. «Mensajero» queda como alternativa legítima por el rango semántico de מַלְאָךְ.
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula marca contraste concesivo entre el juicio de Achís y la decisión de los jefes filisteos. «Pero» es directo y suficientemente fuerte en español; en este contexto no exige un adversativo más pesado.
- source_word: שָׂרֵי פְלִשְׁתִּים
  english_pob_choice: the commanders of the Philistines
  chosen_spanish: los jefes de los filisteos
  alternatives_spanish:
  - los comandantes de los filisteos
  - los príncipes de los filisteos
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a líderes o oficiales de alto rango. «Jefes» es amplio y natural; «comandantes» explicita mejor el marco militar, mientras «príncipes» es más tradicional pero puede sonar menos preciso.
- source_word: לֹא יַעֲלֶה
  english_pob_choice: He must not go up
  chosen_spanish: No debe subir
  alternatives_spanish:
  - No puede subir
  - No ha de subir
  lexicon: HALOT
  rationale: Se conserva el verbo «subir» para reflejar עלה como movimiento militar de campaña. «Debe» transmite la fuerza de prohibición/decisión del discurso referido sin sobrecargarla con una modalización excesiva.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: HALOT
  rationale: Equivale de forma directa al preposicional hebreo y mantiene el carácter colectivo del enunciado.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: into battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - en la batalla
  - para la batalla
  lexicon: HALOT
  rationale: Con «subir» el español admite naturalmente «a la batalla», que conserva la idea de desplazamiento hacia el combate. «En la batalla» sería menos fiel al movimiento implícito en עלה.
theological_decisions:
- issue: Sentido de כְּמַלְאַךְ אֱלֹהִים
  english_pob_reading: Rendered as 'like an angel of God' as a simile of exceptional favor or trustworthiness, without implying any ontological claim about David.
  chosen_spanish_reading: «como un ángel de Dios» como símil de altísima estima, sin implicar una afirmación ontológica sobre David.
  alternative_spanish_readings:
  - como un mensajero de Dios
  rationale: La comparación es retórica y valorativa. Traducir «ángel» preserva el sentido más natural en esta expresión y mantiene la tensión interpretativa sin resolverla de forma doctrinal.
  doctrine_reference: Mantener la tensión léxica y teológica del original; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado del texto inglés, especialmente la lectura final de «into battle», pero la resuelve en español con «a la batalla» por la construcción natural con «subir». Se conservó la comparación «como un ángel de Dios» y el matiz concesivo de אַךְ con «pero».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se usa «SEÑOR», conforme al criterio del proyecto.
  - Se conserva el verbo militar «subir» para עלה, evitando neutralizar el matiz bélico del hebreo.
  - Se usa «ángel de Dios» en el texto principal y se deja «mensajero de Dios» en nota para preservar la alternativa semántica documentada.
  - La puntuación con comillas angulares y comillas internas sigue la norma tipográfica española y distingue bien el discurso directo dentro del discurso directo.
