translation:
  language: es
  text: Cantaré a Yahvé mientras viva; haré música a mi Dios mientras aún viva[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras todavía exista» o «mientras tenga ser». La expresión hebrea puede señalar continuidad de la existencia, no solo la duración biológica de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Quiero cantar
  - Cantaré yo
  lexicon: HALOT
  rationale: La forma cohortativa/volitiva de 1cs expresa intención resuelta de alabanza. En español, el futuro simple comunica naturalmente esa resolución sin añadir un matiz de ruego.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: El nombre divino se conserva transliterado como 'Yahvé' según la terminología del proyecto, manteniendo el Tetragrámaton visible en vez de sustituirlo por una máscara reverencial.
- source_word: בְּחַיָּי
  english_pob_choice: as long as I live
  chosen_spanish: mientras viva
  alternatives_spanish:
  - durante mi vida
  - todo el tiempo que viva
  lexicon: HALOT
  rationale: La expresión hebrea marca duración a lo largo de la vida; 'mientras viva' transmite esa temporalidad de forma natural y fiel en español.
- source_word: אֲזַמְּרָה
  english_pob_choice: I will make music
  chosen_spanish: haré música
  alternatives_spanish:
  - cantaré alabanzas
  - entonaré salmos
  lexicon: HALOT
  rationale: La raíz זמר puede referir al acto de hacer música o cantar alabanzas. 'Haré música' conserva la amplitud musical sin forzar el medio ni repetir innecesariamente el primer verbo.
- source_word: לֵאלֹהַי
  english_pob_choice: to my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - para mi Dios
  - a Dios, mi Dios
  lexicon: HALOT
  rationale: El sufijo de 1cs expresa posesión relacional; 'mi Dios' la mantiene claramente en español. El movimiento de ל se refleja con 'a' como complemento de dirección/objeto de la alabanza.
- source_word: בְּעוֹדִי
  english_pob_choice: while I still live
  chosen_spanish: mientras aún viva
  alternatives_spanish:
  - mientras todavía exista
  - mientras siga con vida
  lexicon: HALOT
  rationale: עוֹד con sufijo indica continuidad de la existencia y, en este contexto poético, funciona de modo paralelo a 'mientras viva'. 'Mientras aún viva' conserva ese paralelismo y suena natural.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la terminología del proyecto, se preserva el nombre propio divino como 'Yahvé' en lugar de ocultarlo tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción poética entre בְּחַיָּי y בְּעוֹדִי
  english_pob_reading: as long as I live / while I still live
  chosen_spanish_reading: mientras viva / mientras aún viva
  alternative_spanish_readings:
  - durante mi vida / mientras sigo viviendo
  - todo el tiempo que viva / mientras todavía exista
  rationale: Ambas cláusulas son paralelas pero no idénticas. Se mantiene una ligera variación en español para reflejar la repetición poética sin borrar la diferencia lexical entre חַיִּים ('vida/vivir') y עוֹד ('aún, todavía, continuar').
  doctrine_reference: Poética hebrea; mantenimiento de paralelismo y distinción léxica
translation_notes:
  revision_awareness: El borrador sigue el tramo final de la revisión inglesa que prefirió una formulación más natural para el segundo hemistiquio. En español, se adopta una solución igualmente natural pero se preserva la diferencia poética entre las dos cláusulas temporales mediante 'mientras viva' y 'mientras aún viva'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se evita 'Cristo' o lenguaje cristológico, pues el versículo no lo contiene.
  - '''Haré música'' conserva la amplitud semántica de זמר sin sobrecargar el texto con un equivalente exclusivamente vocal.'
  - Las dos notas al pie están ancladas en la frase temporal, donde surge la principal ambigüedad lexical en español.
