translation:
  language: es
  text: 'Y le dijeron: «Que el Dios de nuestros padres te conceda favor[a], y lleve tus empeños[b] a término para gloria[c] de los hijos de Israel y exaltación de Jerusalén». Y ella se postró ante Dios[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te conceda gracia» / «te conceda aceptación». La frase griega dice literalmente «te dé en favor», un giro idiomático para pedir recepción favorable o éxito.
    reason: lexical_alternative
  - marker: b
    text: O «tus planes» o «tus acciones». El término griego puede referirse ampliamente a los empeños, proyectos o curso de acción de una persona.
    reason: lexical_alternative
  - marker: c
    text: O «motivo de gloria» o «honra». El sustantivo griego puede denotar aquello que da motivo de orgullo o exultación; «gloria» sigue la revisión inglesa y suena más natural en esta bendición.
    reason: lexical_alternative
  - marker: d
    text: O «lo adoró» o «se prosternó ante Dios». El verbo griego expresa un acto de postración reverente.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  english_pob_choice: may ... grant
  chosen_spanish: que ... te conceda
  alternatives_spanish:
  - que ... te dé
  - que ... te otorgue
  lexicon: LSJ
  rationale: El optativo expresa un deseo o bendición; en español, «que ... te conceda» reproduce bien ese valor de petición benévola sin sonar mecánico.
- source_word: εἰς χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: LSJ
  rationale: En este contexto la expresión apunta a una recepción favorable o a éxito concedido. «Favor» conserva el matiz idiomático y sigue la decisión auditada en inglés.
- source_word: τελειῶσαι
  english_pob_choice: bring ... to completion
  chosen_spanish: lleve a cabo
  alternatives_spanish:
  - complete
  - cumpla
  - lleve a término
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa el logro pleno de la acción deseada. «Lleve a cabo» comunica realización efectiva y suena natural en español bíblico contemporáneo.
- source_word: τὰ ἐπιτηδεύματά σου
  english_pob_choice: your undertakings
  chosen_spanish: tus empresas
  alternatives_spanish:
  - tus planes
  - tus emprendimientos
  - tus ocupaciones
  lexicon: LSJ
  rationale: El término puede abarcar curso de acción, empeños o prácticas. Aquí se refiere a la misión concreta de Judith; «empresas» preserva amplitud y cierta elevación estilística.
- source_word: εἰς καύχημα
  english_pob_choice: for glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - para jactancia
  - para motivo de gloria
  - para honra
  lexicon: LSJ
  rationale: Aunque el griego admite el sentido de «gloria» o «motivo de gloria», el audit trail en inglés pasó de «boasting» a «glory» por naturalidad contextual. En español, «para gloria» refleja ese ajuste y evita una lectura de jactancia no buscada.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Jacob
  lexicon: LSJ
  rationale: Se conserva la forma masculina plural del original. «Hijos de Israel» es transparente y fiel al paralelismo hebraizante del texto.
- source_word: ὕψωμα
  english_pob_choice: the exaltation
  chosen_spanish: exaltación
  alternatives_spanish:
  - altura
  - honra
  - encumbramiento
  lexicon: LSJ
  rationale: El sustantivo denota elevación o engrandecimiento. «Exaltación» mantiene la metáfora de ser levantada en honor y encaja con Jerusalén.
- source_word: προσεκύνησεν
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - adoró
  - se inclinó
  - se arrodilló
  lexicon: LSJ
  rationale: El verbo describe un gesto corporal de reverencia. «Se postró» conserva la concreción física mejor que un equivalente más interpretativo como «adoró».
theological_decisions:
- issue: Matiz de καύχημα en la bendición
  english_pob_reading: for the glory of the sons of Israel and the exaltation of Jerusalem
  chosen_spanish_reading: para gloria de los hijos de Israel y exaltación de Jerusalén
  alternative_spanish_readings:
  - para motivo de gloria de los hijos de Israel y exaltación de Jerusalén
  - para la gloria de los israelitas y la honra de Jerusalén
  rationale: Se sigue la revisión inglesa que prefirió «glory» por ser más natural en una bendición. En español, «para gloria» mantiene esa fluidez sin borrar el trasfondo de honor público del término griego.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Renderización de προσκυνέω
  english_pob_reading: she bowed down to God
  chosen_spanish_reading: ella se postró ante Dios
  alternative_spanish_readings:
  - ella adoró a Dios
  - ella se inclinó ante Dios
  rationale: El texto narra el gesto reverente de forma concreta. «Se postró ante Dios» conserva la acción corporal y deja explícita la relación de reverencia sin sustituirla por una abstracción devocional.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa que cambió «boasting» por «glory» en καύχημα. La redacción española adopta ese ajuste y conserva el resto de las decisiones auditadas: favor, undertakings/empresas, exaltación y el gesto corporal de προσκυνέω.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Jerusalén» con mayúscula como nombre propio.
  - Se conserva el paralelismo hebraizante «los hijos de Israel» en lugar de una normalización a «los israelitas».
  - La puntuación española usa comillas angulares para el discurso directo y conserva el tono bíblico sobrio.
  - «Se postró» se eligió por claridad y fidelidad al gesto; no se reemplazó por «adoró» para no borrar la dimensión física del acto.
