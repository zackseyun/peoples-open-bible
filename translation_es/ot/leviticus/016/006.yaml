  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y las decisiones principales del audit trail inglés: «presentará» para וְהִקְרִיב, «toro» para פַּר, «ofrenda por el pecado» con nota alternativa para הַחַטָּאת, y «hará expiación» para וְכִפֶּר. Sin embargo, «por su casa» no preserva con suficiente claridad el sentido contextual de בֵּיתוֹ como unidad doméstica/familiar, mientras que el inglés auditado lo fijó como «his household».'
  spanish_quality_summary: El español es claro y digno, pero «que es para él; y hará...» suena algo rígido, y «por su casa» puede leerse como edificio. Una leve revisión mejora naturalidad y precisión semántica sin apartarse del hebreo. La puntuación también fluye mejor sin punto y coma.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. La nota sobre חַטָּאת está bien mantenida. La principal desalineación es con la decisión documentada de traducir בֵּיתוֹ como «household»; en español conviene «su familia» o «su casa» solo si una nota aclarara el sentido, pero aquí la mejor opción principal es «su familia» para evitar ambigüedad.
  issues:
  - severity: medium
    issue: «por su casa» para וּבְעַד בֵּיתוֹ
    rationale: Aunque «su casa» puede ser semíticamente amplio, en español moderno se entiende primero como edificio. El audit trail inglés decidió «his household» precisamente para evitar esa reducción. «Su familia» preserva mejor el referente humano en este contexto ritual.
  - severity: low
    issue: «que es para él»
    rationale: Es comprensible, pero «que es para sí» o «que le corresponde» sería más idiomático. Aun así, no es un error grave. Se puede conservar si se mejora el resto de la frase.
  - severity: low
    issue: Puntuación con punto y coma antes de «y hará expiación»
    rationale: No es incorrecta, pero una coma o simple coordinación fluye mejor en español bíblico moderno para esta instrucción ritual.
  revised_spanish_text: Aarón presentará el toro de la ofrenda por el pecado[a] que es para él, y hará expiación por sí mismo y por su familia.
  revised_footnotes:
