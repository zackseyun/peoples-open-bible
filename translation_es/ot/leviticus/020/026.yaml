translation:
  language: es
  text: Serán santos para mí[a], porque yo, Yahvé, soy santo, y los he separado de los pueblos para ser míos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las naciones». El hebreo עַמִּים puede significar «pueblos» o, en algunos contextos, «naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וִהְיִיתֶם
  english_pob_choice: You shall be
  chosen_spanish: ustedes serán
  alternatives_spanish:
  - ustedes deben ser
  - ustedes estarán
  lexicon: HALOT
  rationale: En este contexto legal y exhortativo, el hebreo expresa una obligación/resultado futuro. «Serán» conserva ese valor sin añadir una perífrasis más fuerte que el texto no exige.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - míos
  lexicon: HALOT
  rationale: La relación de pertenencia o destinación del ל con sufijo se expresa con naturalidad en español como «para mí» en la primera cláusula. Mantiene la orientación relacional del hebreo sin sonar mecánico.
- source_word: קְדֹשִׁים
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos y apartados
  - consagrados
  lexicon: HALOT
  rationale: «Santos» es el equivalente bíblico natural para קָדוֹשׁ/קְדֹשִׁים y conserva tanto la dimensión moral como la cultual. «Consagrados» o «apartados» estrecharían demasiado el campo semántico en este verso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» comunica claramente la fuerza causal en español moderno.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - apartado
  lexicon: HALOT
  rationale: Aplicado a Yahvé, «santo» es el término español más directo y teológicamente reconocido, preservando el vínculo entre la santidad divina y la exigida a Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, manteniendo el nombre propio divino en español como «Yahvé» y no sustituyéndolo por un título.
- source_word: וָאַבְדִּל
  english_pob_choice: I have separated
  chosen_spanish: los he separado
  alternatives_spanish:
  - los separé
  - los he apartado
  - los he puesto aparte
  lexicon: HALOT
  rationale: «Separado» reproduce el verbo בדל con claridad y distingue esta acción de קָדוֹשׁ. El perfecto con valor resultativo se vierte naturalmente con presente perfecto en español.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los he...
  alternatives_spanish:
  - a ustedes
  - los
  lexicon: HALOT
  rationale: El objeto directo plural masculino se expresa de forma natural con «los» en este contexto referencial, manteniendo la relación verbal sin sobrecargar la frase.
- source_word: מִן הָעַמִּים
  english_pob_choice: from the peoples
  chosen_spanish: de los pueblos
  alternatives_spanish:
  - de las naciones
  - de los demás pueblos
  lexicon: HALOT
  rationale: «Pueblos» sigue de cerca עַמִּים y preserva la alternativa léxica documentada frente a «naciones». En español, «pueblos» resulta amplio y fiel al contraste colectivo del hebreo.
- source_word: לִהְיוֹת לִי
  english_pob_choice: to be mine
  chosen_spanish: para ser míos
  alternatives_spanish:
  - para pertenecerme
  - para ser de mí
  lexicon: HALOT
  rationale: La finalidad de la separación divina se expresa de modo idiomático con «para ser míos», conservando el lenguaje de pertenencia pactual del hebreo sin diluirlo en una paráfrasis explicativa.
theological_decisions:
- issue: Mantener la distinción entre santidad y separación en el verso
  english_pob_reading: Use 'holy' and 'separated' together in the verse
  chosen_spanish_reading: Usar «santos» y «separado» juntos en el verso
  alternative_spanish_readings:
  - reducir todo a «apartados»
  - usar solo «consagrados»
  rationale: 'El hebreo emplea קָדוֹשׁ/קְדֹשִׁים y luego בדל con verbos distintos. Traducir ambos con una sola idea borraría la tensión lexical y teológica: la santidad requerida y la separación realizada por Yahvé.'
  doctrine_reference: Translation philosophy §§3, 5
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: Se conserva el nombre propio divino en la forma establecida por el proyecto, evitando la sustitución por un título y manteniendo la transparencia respecto del texto hebreo.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; el estado más reciente indica acuerdo alto y sin cambios necesarios. La redacción española sigue ese consenso y procura mantener la distinción léxica y teológica observada en el texto hebreo y en la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «santos» para קְדֹשִׁים y «separado» para וָאַבְדִּל para conservar la diferencia entre santidad y separación.
  - Se eligió «pueblos» para עַמִּים, dejando la alternativa «naciones» en nota.
  - Se mantuvo un español bíblico moderno y claro, sin reemplazar el lenguaje pactual de pertenencia («para ser míos").
