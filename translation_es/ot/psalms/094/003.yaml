translation:
  language: es
  text: ¿Hasta cuándo, Yahvé, los impíos, hasta cuándo se regocijarán[a] los impíos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «exultarán»; el hebreo expresa alegría exuberante, incluso triunfante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los malvados»; el hebreo designa a personas impías como clase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta cuándo durará?
  lexicon: HALOT
  rationale: Es la interrogativa idiomática de duración usada en lamento y protesta. En español, «¿Hasta cuándo?» reproduce con naturalidad la urgencia del clamor sin añadir contenido que no está en el hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los culpables
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa una clase de personas caracterizadas por su impiedad. «Impíos» es un equivalente bíblico claro en español y mantiene la referencia colectiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto pide conservar el nombre divino como «Yahvé» en español, no sustituirlo por un título. Esta forma es la más estable y legible en español bíblico contemporáneo.
- source_word: יַעֲלֹזוּ
  english_pob_choice: exult
  chosen_spanish: se jactarán
  alternatives_spanish:
  - exultarán
  - se regocijarán
  - triunfarán
  lexicon: HALOT
  rationale: El verbo expresa alegría exuberante, con matiz de triunfo ostentoso. En este contexto de protesta contra la prosperidad de los impíos, «se jactarán» comunica mejor ese orgullo celebratorio que un simple «se regocijarán».
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: Se preserva el nombre propio del pacto revelado en el hebreo, conforme a la convención del proyecto. No se reemplaza por un título, porque el versículo invoca directamente a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Fuerza semántica de יַעֲלֹזוּ en el lamento
  english_pob_reading: shall the wicked exult
  chosen_spanish_reading: se jactarán los impíos
  alternative_spanish_readings:
  - exultarán los impíos
  - se regocijarán los impíos
  - triunfarán los impíos
  rationale: La línea no describe solo alegría neutral, sino una celebración arrogante frente al sufrimiento ajeno. Por eso se eligió una opción española que mantenga la tensión de triunfo insolente señalada en la auditoría inglesa.
  doctrine_reference: SALMOS 94:3 contexto de lamentación y protesta
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó la puntuación para reflejar mejor el paralelismo hebreo, evitando una interrupción artificial. En español se mantiene ese paralelismo con dos preguntas coordinadas por repetición: «¿Hasta cuándo[a], Yahvé, los impíos[b], hasta cuándo se jactarán los impíos?».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se traduce רְשָׁעִים como «los impíos» para conservar el tono bíblico y la fuerza colectiva del término.
  - Se evita la sustitución por «el Señor» para no borrar el nombre propio divino.
  - La repetición de «¿hasta cuándo?» reproduce la duplicación enfática del hebreo.
  - La elección de «se jactarán» busca conservar el matiz de exultación triunfal y arrogante.
