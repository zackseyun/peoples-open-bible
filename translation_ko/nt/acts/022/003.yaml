source:
  edition: SBLGNT
  text: '⸀Ἐγώ εἰμι ἀνὴρ Ἰουδαῖος, γεγεννημένος ἐν Ταρσῷ τῆς Κιλικίας, ἀνατεθραμμένος δὲ ἐν τῇ πόλει ταύτῃ παρὰ τοὺς πόδας Γαμαλιήλ, πεπαιδευμένος κατὰ ἀκρίβειαν τοῦ πατρῴου νόμου, ζηλωτὴς ὑπάρχων τοῦ θεοῦ καθὼς πάντες ὑμεῖς ἐστε σήμερον,'
base_translation:
  language: en
  yaml_path: translation/nt/acts/022/003.yaml
  text: I am a Jewish man[a], born in Tarsus of Cilicia, but brought up in this city at the feet of Gamaliel, educated according to the strictness of the law of our fathers[b], being zealous for God just as all of you are today.
  footnotes:
  - marker: a
    text: "Literally, 'at the feet of Gamaliel,' an idiom for being trained under a teacher."
    reason: cultural_note
  - marker: b
    text: "Or 'the ancestral law.'"
    reason: lexical_alternative
translation:
  language: ko
  text: 저는 길리기아 다소에서 태어났으나 이 도성에서 자라 가말리엘의 발 아래에서[a] 우리 조상의 율법의 엄격함을 따라 교육받은 유대인입니다. 오늘 여러분 모두가 그러한 것처럼 저는 하나님께 대해 열심이 있는 사람이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「발 아래에서」는 한 스승 아래에서 배우는 것을 가리키는 관용 표현이다.
    reason: cultural_note
