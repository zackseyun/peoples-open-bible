translation:
  language: es
  text: Y de Tibjat[a] y de Cun[b], ciudades de Hadad-ezer, David tomó una cantidad muy grande de bronce; con él Salomón hizo el mar de bronce[c], las columnas y los utensilios de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el relato paralelo de 2 Samuel 8:8, el nombre de esta ciudad aparece como «Tebah».
    reason: textual_variant
  - marker: b
    text: En el relato paralelo de 2 Samuel 8:8, este lugar se llama «Berotai».
    reason: textual_variant
  - marker: c
    text: 'O: «el Mar de bronce»; se refiere a la gran pila del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/טִּבְחַת
  english_pob_choice: And from Tibhath
  chosen_spanish: Y de Tíbat
  alternatives_spanish:
  - Y de Tebah
  lexicon: HALOT
  rationale: La forma de Crónicas se translitera como Tíbat para reflejar el hebreo טִבְחַת. Mantengo la variante histórica de 2 Samuel 8:8 en nota, sin armonizar el texto principal.
- source_word: וּ/מִ/כּוּן
  english_pob_choice: and from Cun
  chosen_spanish: y de Cun
  alternatives_spanish:
  - y de Berotai
  lexicon: HALOT
  rationale: Conservo la forma de Crónicas, Cun, como transliteración directa. La lectura paralela de Samuel, Berotai, queda preservada como variante textual en nota.
- source_word: עָרֵי הֲדַדְעֶזֶר
  english_pob_choice: cities of Hadadezer
  chosen_spanish: ciudades de Hadad-ezer
  alternatives_spanish:
  - las ciudades de Hadad-ezer
  lexicon: HALOT
  rationale: La cadena constructa se expresa naturalmente en español con 'ciudades de'. Mantengo el nombre propio con guion para una lectura clara y respetuosa del hebreo.
- source_word: לָקַח דָּוִיד
  english_pob_choice: David took
  chosen_spanish: David tomó
  alternatives_spanish:
  - David capturó
  - David se llevó
  lexicon: HALOT
  rationale: לקח aquí puede abarcar tomar o apoderarse; 'tomó' es fiel y suficientemente amplio, sin añadir el matiz militar específico que no exige el hebreo.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: '''Bronce'' es la equivalencia usual en este contexto de objetos del templo y preserva la referencia metalúrgica más natural en español.'
- source_word: רַבָּה מְאֹד
  english_pob_choice: a very great amount of
  chosen_spanish: una cantidad muy grande de
  alternatives_spanish:
  - muchísimo bronce
  - una gran cantidad de
  lexicon: HALOT
  rationale: La expresión intensiva se vierte con una fórmula española transparente que conserva el énfasis en la abundancia sin sobretraducir.
- source_word: בָּהּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - con él
  - de eso
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo es femenino por 'bronce' en hebreo, en español 'bronce' es masculino; por eso el referente pronominal se ajusta a 'de él'. La relación instrumental/origen queda explícita y concuerda con la revisión inglesa que precisó 'from it'.
- source_word: עָשָׂה שְׁלֹמֹה
  english_pob_choice: Solomon made
  chosen_spanish: Salomón hizo
  alternatives_spanish:
  - Salomón fabricó
  - Salomón confeccionó
  lexicon: HALOT
  rationale: '''Hizo'' reproduce el verbo básico עָשָׂה sin forzar un término técnico. ''Fabricó'' sería posible, pero más interpretativo.'
- source_word: יָם הַנְּחֹשֶׁת
  english_pob_choice: the bronze sea
  chosen_spanish: el mar de bronce
  alternatives_spanish:
  - el mar de cobre
  - la gran pila de bronce
  lexicon: HALOT
  rationale: Conservo 'mar' para no aplanar el nombre tradicional del objeto del templo. En español el genitivo 'de bronce' hace el título claro y literal.
- source_word: הָעַמּוּדִים
  english_pob_choice: the pillars
  chosen_spanish: las columnas
  alternatives_spanish:
  - los pilares
  lexicon: HALOT
  rationale: '''Columnas'' es el término más natural en español para estas piezas del templo y evita una posible resonancia arquitectónica demasiado genérica de ''pilares''.'
- source_word: כְּלֵי הַנְּחֹשֶׁת
  english_pob_choice: the bronze articles
  chosen_spanish: los utensilios de bronce
  alternatives_spanish:
  - los objetos de bronce
  - los vasos de bronce
  lexicon: HALOT
  rationale: כְּלִים es amplio; en español 'utensilios' conserva la amplitud de objetos de uso sin limitar indebidamente a vasos o recipientes.
theological_decisions:
- issue: Referencia del 'mar de bronce' como objeto del templo
  english_pob_reading: Or 'the Sea of bronze'; this refers to the large basin in the temple.
  chosen_spanish_reading: el mar de bronce
  alternative_spanish_readings:
  - el Sea de bronce
  - la gran pila de bronce
  rationale: Mantengo la forma literal y tradicional del nombre del objeto, y dejo en nota que se trata del gran recipiente/basín del templo. Así no se pierde la imagen del hebreo ni su función cultual.
  doctrine_reference: 1 Reyes 7:23-26; 2 Crónicas 4:2-5
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la relación de 'with it' a 'from it' para reflejar con más precisión la preposición hebrea; la versión española ya expresa ese origen con 'de él'. No se requieren otros ajustes respecto del audit trail final.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene la transliteración de los topónimos de Crónicas en el texto principal y se documentan las variantes de 2 Samuel en notas.
  - '''Bronce'' se usa de manera consistente para נְחֹשֶׁת, y ''mar'' se preserva en la expresión cultual del objeto.'
  - La pronominalización española se adapta al género de 'bronce' en español sin alterar la relación semántica de origen indicada por el hebreo.
