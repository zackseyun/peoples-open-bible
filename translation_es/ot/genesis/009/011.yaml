translation:
  language: es
  text: 'Y estableceré mi pacto con ustedes: nunca más toda carne[b] será destruida[a] por las aguas del diluvio, y nunca más habrá diluvio para destruir la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será cortada»; el verbo hebreo significa literalmente «será cortada».
    reason: lexical_alternative
  - marker: b
    text: «Toda carne» se refiere en sentido amplio a los seres vivientes, no solo a la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - afirmaré
  - sostendré
  lexicon: HALOT
  rationale: El hifil de קום en contexto de pacto expresa la acción de establecer o ratificar. «Estableceré» conserva el registro solemne del pacto y suena natural en español bíblico moderno.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: En español, «pacto» comunica bien el término de relación vinculante del hebreo בְּרִית. «Alianza» podría sonar más eclesial o moderno, pero «pacto» mantiene mejor la continuidad bíblica y la carga jurídica.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - con todos ustedes
  lexicon: HALOT
  rationale: El hebreo se dirige en plural a los destinatarios. «Con ustedes» es natural en español neutral y preserva el plural sin sobreexplicarlo.
- source_word: יִכָּרֵת
  english_pob_choice: be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será destruida
  - será eliminada
  - será extirpada
  lexicon: HALOT
  rationale: La raíz כרת significa literalmente «cortar». En español, «será cortada» conserva la fuerza lexical y el vínculo con el hebreo, aunque el contexto del diluvio deja claro el sentido de destrucción.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda criatura viviente
  - toda humanidad
  - todo ser viviente
  lexicon: HALOT
  rationale: Se mantiene la expresión proverbial y amplia del hebreo. «Toda carne» o «toda carne» en español bíblico preserva la amplitud de referencia, no solo humana, y la POB inglesa documenta esa extensión.
- source_word: מִמֵּי הַמַּבּוּל
  english_pob_choice: by the waters of the flood
  chosen_spanish: por las aguas del diluvio
  alternatives_spanish:
  - a causa de las aguas del diluvio
  - por las aguas de la inundación
  lexicon: HALOT
  rationale: La preposición מִן con «aguas» expresa aquí la agencia/desencadenante del juicio. «Por las aguas del diluvio» refleja bien la construcción y mantiene el lenguaje tradicional de «diluvio».
- source_word: מַבּוּל
  english_pob_choice: flood
  chosen_spanish: diluvio
  alternatives_spanish:
  - inundación
  - cataclismo
  lexicon: HALOT
  rationale: En la narrativa de Noé, מַבּוּל se traduce con precisión y tradición bíblica como «diluvio». Es el término más transparente y reconocido para este evento específico.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para devastar
  lexicon: HALOT
  rationale: El infinitivo constructo expresa finalidad. «Para destruir» es una traducción directa y idiomática en español.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el mundo
  lexicon: HALOT
  rationale: En este contexto, «tierra» puede abarcar la tierra habitada o el mundo creado. Se evita «mundo» por ser más interpretativo; «la tierra» sigue de cerca el hebreo y su amplitud contextual.
theological_decisions:
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: '''All flesh'' refers broadly to living creatures, not only to humanity.'
  chosen_spanish_reading: «toda carne» se mantiene con alcance amplio, no limitado a los seres humanos.
  alternative_spanish_readings:
  - toda humanidad
  - toda criatura viviente
  rationale: El contexto del diluvio incluye a humanos y animales. Mantener «toda carne» preserva la amplitud del hebreo y evita estrechar indebidamente la promesa.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de לֹא יִכָּרֵת en el juicio del diluvio
  english_pob_reading: '''be cut off'' retained for lexical transparency, while the context makes the destructive sense clear.'
  chosen_spanish_reading: «será cortada» mantiene la metáfora verbal sin neutralizarla.
  alternative_spanish_readings:
  - será destruida
  - será eliminada
  rationale: La traducción literal conserva la tensión semántica del hebreo entre corte y destrucción. El contexto ya aclara que el resultado sería la aniquilación por aguas del diluvio.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Elección de «pacto» para בְּרִית
  english_pob_reading: '''my covenant'' preserves the standard covenant term in Genesis.'
  chosen_spanish_reading: «mi pacto» preserva el término bíblico estándar y su peso teológico.
  alternative_spanish_readings:
  - mi alianza
  - mi convenio
  rationale: «Pacto» es la forma más estable y reconocible para בְּרִית en español bíblico, y evita connotaciones modernas menos precisas.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantuvieron la transparencia léxica de יִכָּרֵת y el alcance amplio de כָּל בָּשָׂר, sin cambios de revisión pendientes según el registro más reciente.'
  spanish_consistency_notes:
  - Se usó «diluvio» de manera uniforme para מַבּוּל, acorde con la tradición narrativa de Noé y con el audit trail inglés.
  - Se eligió «toda carne» y no «toda humanidad» para no estrechar el alcance del hebreo.
  - Se conservó el paralelismo negativo con «nunca más» en ambas cláusulas, reflejando el doble וְלֹא del texto fuente.
  - La puntuación con dos puntos ayuda a reflejar la transición solemne entre la promesa del pacto y sus consecuencias.
