translation:
  language: es
  text: Eleazar murió y no tuvo hijos varones, sino solo hijas; y los hijos de Quis, sus hermanos[a], se casaron con ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sus hermanos» probablemente se refiere a parientes cercanos del mismo linaje, no necesariamente a hermanos de madre y padre.
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «las tomaron por mujeres» o «las tomaron como esposas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת / died
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT / uso castellano natural
  rationale: El hebreo מות expresa la muerte de forma directa. En español, «murió» es el equivalente más claro y natural, sin eufemismo añadido, y conserva la sobriedad genealógica del contexto.
- source_word: וְלֹא הָיוּ לוֹ בָּנִים / had no sons
  english_pob_choice: had no sons
  chosen_spanish: no tuvo hijos
  alternatives_spanish:
  - no tuvo hijos varones
  - no tuvo hijos
  lexicon: HALOT
  rationale: El POB inglés explicita «sons» por el contraste inmediato con «daughters». En español, «no tuvo hijos» funciona de modo idiomático y mantiene la negación de descendencia masculina disponible para la siguiente cláusula, sin perder el sentido genealógico del versículo.
- source_word: כִּי אִם בָּנוֹת / but only daughters
  english_pob_choice: but only daughters
  chosen_spanish: sino solo hijas
  alternatives_spanish:
  - pero solo hijas
  - excepto hijas
  lexicon: HALOT
  rationale: La construcción excepto/adversativa se expresa con naturalidad en español mediante «sino solo». «Hijas» evita forzar «hijas mujeres» y mantiene el contraste con «hijos» del miembro anterior.
- source_word: וַיִּשָּׂאוּם / married them
  english_pob_choice: married them
  chosen_spanish: las tomaron por mujeres
  alternatives_spanish:
  - se casaron con ellas
  - las tomaron como esposas
  lexicon: HALOT
  rationale: El verbo נשׂא con mujeres como objeto puede significar tomar en matrimonio. Para conservar esa forma verbal y el matiz genealógico del texto, se usa «las tomaron por mujeres», que es más literal que «se casaron con ellas» y más natural que una calca rígida.
- source_word: בְּנֵי קִישׁ / the sons of Kish
  english_pob_choice: the sons of Kish
  chosen_spanish: los hijos de Quis
  alternatives_spanish:
  - los hijos de Kish
  - los descendientes de Quis
  lexicon: Transliteración bíblica española usual
  rationale: Se adopta «Quis» como forma española habitual del nombre propio bíblico, manteniendo el paralelismo genealógico de Crónicas con un castellano legible.
- source_word: אֲחֵיהֶם / their brothers
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus consanguíneos
  lexicon: HALOT
  rationale: El hebreo usa «hermanos» literalmente, pero el contexto del POB advierte que puede referirse a parientes de clan, no necesariamente hermanos uterinos. En español se conserva «hermanos» para no borrar la relación textual, dejando implícita la posibilidad genealógica amplia del parentesco.
translation_notes:
  revision_awareness: El texto inglés POB no presenta cambios sustantivos respecto al pasaje base; se mantuvo la lectura genealógica y la nota cultural sobre «sus hermanos», ajustando la expresión española para una lectura fluida sin perder la literalidad subyacente.
  spanish_consistency_notes:
  - Se mantiene el registro genealógico sobrio propio de Crónicas.
  - Se conserva la distinción entre «hijos» y «hijas» según el contraste del hebreo.
  - «Tomaron por mujeres» refleja el valor matrimonial del verbo sin explicitar más de lo que el texto dice.
  - Se usó «Quis» como forma española estándar del nombre propio.
