translation:
  language: es
  text: Porque es un estatuto para Israel[a], una ordenanza del Dios de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el Dios de Jacob». El hebreo permite esa lectura más literal de la preposición ל, pero en el contexto la relación de procedencia o autoridad resulta más probable; por eso el texto principal dice «del Dios de Jacob».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón o fundamento de lo anterior; en español, 'Porque' expresa con naturalidad esa relación explicativa sin perder el valor causal del hebreo.
- source_word: חֹק
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - decreto
  - mandato fijado
  - prescripción
  lexicon: HALOT
  rationale: '''Estatuto'' conserva el matiz de algo establecido por autoridad y funciona bien en lenguaje bíblico contemporáneo en español, sin diluir el carácter legal-covenantal del término.'
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - para/to Israel
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: La preposición ל puede marcar destino o aplicación; 'para Israel' comunica de forma natural que la disposición rige para el pueblo del pacto.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - esto es
  - se trata de
  lexicon: HALOT
  rationale: El pronombre retoma la disposición mencionada; en español la cópula basta y evita introducir un sujeto artificial.
- source_word: מִשְׁפָּט
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - mandamiento
  - norma
  - decreto
  lexicon: HALOT
  rationale: '''Ordenanza'' preserva el registro formal y paralelo con ''estatuto''. Mantiene la idea de una disposición jurídica establecida, más que de juicio condenatorio.'
- source_word: לֵאלֹהֵי יַעֲקֹב
  english_pob_choice: of the God of Jacob
  chosen_spanish: del Dios de Jacob
  alternatives_spanish:
  - para el Dios de Jacob
  - del Dios de Jacob
  lexicon: HALOT
  rationale: En español, 'del Dios de Jacob' comunica mejor la relación de procedencia/autoridad que un más literal 'para el Dios de Jacob', que podría sonar ambiguo o beneficiario.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
theological_decisions:
- issue: Relación entre חֹק y מִשְׁפָּט
  english_pob_reading: Render both distinctly as 'statute' and 'ordinance'
  chosen_spanish_reading: Traducirlos distintamente como 'estatuto' y 'ordenanza'
  alternative_spanish_readings:
  - Usar dos sinónimos muy cercanos como 'decreto' y 'mandato'
  - Fusionar el paralelismo en una sola idea
  rationale: El hebreo presenta dos términos jurídicos relacionados en paralelismo poético. Distinguirlos en español ayuda a conservar la fuerza litúrgica y covenantal del verso sin sobreinterpretar una diferencia técnica excesiva.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Sentido de ל en לֵאלֹהֵי יַעֲקֹב
  english_pob_reading: 'Express as possessive/source relation: ''of the God of Jacob'''
  chosen_spanish_reading: 'Expresar una relación de pertenencia/origen: ''del Dios de Jacob'''
  alternative_spanish_readings:
  - '''para el Dios de Jacob'''
  - '''al Dios de Jacob'''
  rationale: Aunque una versión más formal podría dar 'para el Dios de Jacob', en español eso suena menos natural y puede sugerir destinatario. 'Del Dios de Jacob' comunica mejor que la ordenanza pertenece a, procede de, o está bajo la autoridad del Dios del pacto.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo de WLC y la decisión auditada en inglés POB de distinguir חֹק y מִשְׁפָּט. No se detectan revisiones previas que obliguen a ajustar la línea principal; se conserva el paralelismo jurídico y la relación de לֵאלֹהֵי יַעֲקֹב con una solución natural en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparece, pero en este versículo no está presente.
  - Se mantiene 'Jacob' como nombre propio estándar.
  - 'Se preserva el paralelismo legal con dos términos distintos: ''estatuto'' / ''ordenanza''.'
  - La nota al pie marca la alternativa de preposición sin introducir una lectura doctrinal extra.
