translation:
  language: es
  text: Entonces Ahías agarró la capa nueva[a] que llevaba puesta y la rasgó en doce pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaba sobre él». El hebreo dice literalmente: «que estaba sobre él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפֹּשׂ
  english_pob_choice: took hold of
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - tomó firmemente
  lexicon: HALOT
  rationale: El verbo expresa una acción física concreta de sujetar o tomar. En español, «tomó» comunica la acción de manera natural y directa; «agarró» es posible, pero suena menos sobrio en este contexto narrativo.
- source_word: שַׂלְמָה
  english_pob_choice: cloak
  chosen_spanish: capa
  alternatives_spanish:
  - manto
  - vestidura
  lexicon: HALOT
  rationale: La palabra designa una prenda exterior. «Capa» es un equivalente natural en español para una prenda externa que puede ser rasgada, sin perder el valor narrativo del acto.
- source_word: הַחֲדָשָׁה
  english_pob_choice: new
  chosen_spanish: nueva
  alternatives_spanish:
  - recién hecha
  - nueva de estrena
  lexicon: HALOT
  rationale: El adjetivo significa simplemente «nuevo/a». Se conserva porque el detalle de que la prenda era nueva forma parte del signo narrativo.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that was on him
  chosen_spanish: que llevaba puesta
  alternatives_spanish:
  - que estaba sobre él
  - que estaba sobre sí
  lexicon: HALOT
  rationale: La frase hebrea indica literalmente que la prenda estaba sobre él. «Que llevaba puesta» mantiene la idea de vestirla en español natural; las alternativas son más literales pero menos idiomáticas.
- source_word: וַיִּקְרָעֶהָ
  english_pob_choice: tore it
  chosen_spanish: la rasgó
  alternatives_spanish:
  - la desgarró
  - la rompió
  lexicon: HALOT
  rationale: El verbo significa rasgar o desgarrar una tela. «La rasgó» conserva el campo semántico textil y el gesto violento del signo profético.
- source_word: שְׁנֵים עָשָׂר קְרָעִים
  english_pob_choice: into twelve pieces
  chosen_spanish: en doce pedazos
  alternatives_spanish:
  - en doce trozos
  - en doce partes
  lexicon: HALOT
  rationale: La expresión describe el resultado de la acción con el número simbólico preservado. «Pedazos» transmite la fragmentación de forma clara y natural; «partes» es menos vívido, y «trozos» es posible pero algo más coloquial.
translation_notes:
  revision_awareness: La versión inglesa POB lee «took hold of… and tore it into twelve pieces» y anota la alternativa literal «which he was wearing / that was on him». La redacción española conserva el gesto físico, el adjetivo «nueva» y el número simbólico, y vierte la frase hebrea con una equivalencia natural («que llevaba puesta») apoyada por una nota que mantiene la opción más literal.
  spanish_consistency_notes:
  - Se mantiene «Ahías» para אֲחִיָּה.
  - Se usa «capa» como equivalente de una prenda exterior, coherente con el acto de rasgarla.
  - Se preserva el número «doce» y el resultado fragmentado del signo profético.
  - No se introduce terminología eclesiástica ajena al texto; el estilo es bíblico moderno, no arcaizante.
