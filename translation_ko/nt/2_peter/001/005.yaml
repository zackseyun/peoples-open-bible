  lexicon: BDAG
  rationale: ἐπιχορηγέω는 합창대에 풍성히 공급하던 어원에서 풍부한 보탬을 함의한다. 「더하여 공급하다」로 사슬의 보탬과 풍성함을 모두 전한다.
