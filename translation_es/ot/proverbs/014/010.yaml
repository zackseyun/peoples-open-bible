translation:
  language: es
  text: El corazón conoce la amargura de su alma[b], y ningún ajeno participa de su alegría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún ajeno se mezcla con su alegría» o «participa en su alegría». El verbo hebreo puede implicar involucrarse con algo o compartirlo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la amargura de su alma». «Alma» aquí se refiere al ser interior o a la vida, no necesariamente a una afirmación técnica sobre la constitución humana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: En Proverbios, לֵב suele designar el centro interior de la persona, sede de pensamiento y sentimiento. «Corazón» es el equivalente natural en español y conserva esa imagen antropológica sin volverla técnica.
- source_word: יֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - entiende
  - está al tanto de
  lexicon: HALOT
  rationale: ידע expresa aquí conocimiento íntimo y personal. «Conoce» comunica bien esa conciencia interna y suena natural en español.
- source_word: מָרַת
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargor
  - pena
  - dolor
  lexicon: HALOT
  rationale: El sustantivo derivado de מרר denota amargura en sentido emocional o experiencial. «Amargura» preserva la metáfora y mantiene la cercanía lexical con el hebreo.
- source_word: נַפְשׁוֹ
  english_pob_choice: its soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser interior
  - su interior
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o persona interior. Aquí apunta al ser interior en paralelo con «corazón». «Su alma» conserva esa referencia sin imponer una explicación más interpretativa.
- source_word: וּבְשִׂמְחָתוֹ
  english_pob_choice: and ... its joy
  chosen_spanish: de su alegría
  alternatives_spanish:
  - en su alegría
  - con su alegría
  - en su gozo
  lexicon: HALOT
  rationale: שִׂמְחָה significa gozo o alegría. En español, el giro «participa de su alegría» permite reflejar la preposición ב de manera idiomática y mantener la relación con el verbo siguiente.
- source_word: יִתְעָרַב
  english_pob_choice: shares in
  chosen_spanish: participa de
  alternatives_spanish:
  - se mezcla con
  - se involucra en
  - comparte
  lexicon: HALOT
  rationale: El hitpael de ערב puede expresar hacerse parte de algo o involucrarse con ello. «Participa de» comunica con claridad que el extraño no entra en la alegría interior ajena. La alternativa «se mezcla con» se preserva en nota por la ambigüedad lexical del hebreo.
- source_word: זָר
  english_pob_choice: stranger
  chosen_spanish: extraño
  alternatives_spanish:
  - forastero
  - ajeno
  - outsider
  lexicon: HALOT
  rationale: זָר aquí no señala ante todo a un extranjero étnico, sino a alguien ajeno a la experiencia interior de otro. «Extraño» es la equivalencia más directa y mantiene el contraste del proverbio.
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el hebreo WLC y el aparato auditado en inglés POB, manteniendo la tensión lexical entre el interior humano (''corazón'', ''alma'') y la imposibilidad de que el extraño participe de esa vivencia. Se adopta una equivalencia óptima: se evita una calca dura, pero se conserva la imagen poética y la ambigüedad legítima del hebreo. No se introdujeron cambios textuales respecto del pasaje auditado en inglés.'
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב y «alma» para נפש, en línea con la antropología poética del proverbio.
  - «Extraño» se emplea para זָר sin convertirlo en un etnónimo; el contexto es relacional e interior.
  - «Participa de» refleja el valor del verbo hitpael יִתְעָרַב sin borrar la alternativa de «mezclarse» indicada por la nota.
  - Se mantiene «amargura» para מָרַת, conservando la metáfora emocional del hebreo.
  - La puntuación sigue la sintaxis española natural sin desplazar la relación paralela del verso.
