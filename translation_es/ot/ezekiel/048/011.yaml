translation:
  language: es
  text: Será para los sacerdotes consagrados, de los hijos de Zadoc[a], quienes guardaron mi encargo[b] y no se extraviaron cuando los hijos de Israel se extraviaron[c], como se extraviaron los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los descendientes de Zadoc».'
    reason: lexical_alternative
  - marker: b
    text: «Guardaron mi encargo» refiere al cumplimiento fiel de una tarea confiada por Dios, especialmente en el servicio sacerdotal.
    reason: cultural_note
  - marker: c
    text: 'O: «cuando el pueblo de Israel se extravió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכֹּהֲנִים
  english_pob_choice: for the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - para los presbíteros
  - para los sacerdotes
  lexicon: HALOT
  rationale: El ל inicial marca destino o asignación dentro del reparto territorial; en español, «para» conserva esa función. «Sacerdotes» es el equivalente transparente y fiel al contexto cultual.
- source_word: הַמְקֻדָּשׁ
  english_pob_choice: who are consecrated
  chosen_spanish: consagrados
  alternatives_spanish:
  - santos
  - apartados
  - consagrados
  lexicon: HALOT
  rationale: El participio pasivo de קדשׁ pide una idea de consagración cultual. «Consagrados» mantiene la fuerza religiosa sin generalizarlo a «santos» ni volverlo más abstracto con «apartados».
- source_word: מִבְּנֵי צָדוֹק
  english_pob_choice: from the sons of Zadok
  chosen_spanish: de los hijos de Zadoc
  alternatives_spanish:
  - de entre los hijos de Zadoc
  - de los descendientes de Zadoc
  lexicon: HALOT
  rationale: La POB inglesa preserva el giro genealógico; en español, «hijos de Zadoc» mantiene la forma directa y bíblica. Se evita «descendientes» porque suaviza la construcción y pierde transparencia formal.
- source_word: שָׁמְרוּ מִשְׁמַרְתִּי
  english_pob_choice: kept my charge
  chosen_spanish: guardaron mi encargo
  alternatives_spanish:
  - guardaron mi encargo
  - cumplieron mi mandato
  - guardaron mi obligación
  lexicon: HALOT
  rationale: La expresión hebrea señala el cumplimiento fiel de una responsabilidad confiada. «Encargo» comunica mejor que «mandato» la idea de una tarea encomendada, y conserva el matiz de fidelidad cultual señalado en el audit trail.
- source_word: לֹא תָעוּ
  english_pob_choice: did not go astray
  chosen_spanish: no se extraviaron
  alternatives_spanish:
  - no se desviaron
  - no erraron
  - no se extraviaron
  lexicon: HALOT
  rationale: תעה aquí es desviación moral/cultual. «Extraviarse» reproduce bien la imagen de apartarse del camino correcto y funciona de manera natural en español.
- source_word: בִּתְעוֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: when the sons of Israel went astray
  chosen_spanish: cuando se extraviaron los hijos de Israel
  alternatives_spanish:
  - cuando se extraviaron los hijos de Israel
  - cuando el pueblo de Israel se extravió
  - en el extravío de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la referencia formal «hijos de Israel» en línea con la POB inglesa. La construcción temporal con «cuando» refleja bien el valor circunstancial del infinitivo constructo con בְּ.
- source_word: כַּאֲשֶׁר תָּעוּ הַלְוִיִּם
  english_pob_choice: as the Levites went astray
  chosen_spanish: como se extraviaron los levitas
  alternatives_spanish:
  - como se extraviaron los levitas
  - tal como se extraviaron los levitas
  - igual que se extraviaron los levitas
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduce comparación; «como» reproduce de forma natural esa relación. Se mantiene el contraste entre la fidelidad de los sacerdotes de Sadoc y el extravío de los levitas.
theological_decisions:
- issue: Distinción entre linaje sacerdotal y fidelidad cultual
  english_pob_reading: The verse distinguishes a subset of priests, the consecrated sons of Zadok, on the basis of covenantal/cultic faithfulness.
  chosen_spanish_reading: El versículo distingue a un grupo específico de sacerdotes, los consagrados hijos de Zadoc, por su fidelidad al encargo de Yahvé.
  alternative_spanish_readings:
  - El versículo exalta su mérito personal sin referencia al linaje.
  - El versículo describe solo una distribución territorial sin implicación cultual.
  rationale: La frase hebrea conserva tanto el linaje («hijos de Zadoc») como la fidelidad («guardaron mi encargo»). La traducción mantiene ambos ejes sin convertir el pasaje en una afirmación doctrinal posterior ni borrar la base cultual del reparto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: ajusta el orden para reflejar con naturalidad «los sacerdotes consagrados, de los hijos de Zadoc», y conserva el contraste final entre el extravío de Israel y el de los levitas sin añadir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí el hebreo solo contiene la forma posesiva «mi», por lo que no se introduce explícitamente.
  - Se mantiene «hijos de Israel» por transparencia formal, coherente con la POB inglesa.
  - «Levitas» se conserva como nombre propio del grupo sacerdotal/levítico, sin reinterpretarlo como un término genérico.
