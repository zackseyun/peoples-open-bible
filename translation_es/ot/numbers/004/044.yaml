lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: And ... were
  chosen_spanish: Y fueron
  alternatives_spanish:
  - Y estaban
  - Y resultaron
  lexicon: HALOT
  rationale: El waw-consecutivo con היה introduce el dato final del conteo; en español, «Y fueron» conserva esa secuencia narrativa y la copulación resultativa sin sobreexplicar.
- source_word: פְקֻדֵיהֶם
  english_pob_choice: those counted from them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los registrados de ellos
  - los enumerados de ellos
  - los contados entre ellos
  lexicon: HALOT
  rationale: En este contexto censal, el sustantivo derivado de פקד designa a los que fueron contados/registrados. «Los contados de ellos» mantiene la referencia al total sin añadir «hombres» ni interpretar más allá del hebreo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí corresponde a una subdivisión tribal; «clanes» refleja mejor la estructura censal que un simple «familias», y «por» reproduce bien la relación clasificatoria.
- source_word: שְׁלֹשֶׁת אֲלָפִים וּמָאתָיִם
  english_pob_choice: three thousand two hundred
  chosen_spanish: tres mil doscientos
  alternatives_spanish:
  - tres mil y doscientos
  lexicon: HALOT
  rationale: Es el total cardinal directo. El español moderno y bíblico estándar expresa naturalmente la cifra como «tres mil doscientos».
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo sin notas y con acuerdo alto en la revisión más reciente; no se detectaron tensiones textuales o teológicas que requirieran ampliar o corregir la formulación española.
  spanish_consistency_notes:
  - Se conservó el lenguaje censal objetivo del hebreo sin introducir especificaciones no presentes en el versículo.
  - «Clanes» se mantiene como término técnico coherente con el registro de Números para divisiones familiares/tribales.
  - La cifra se presenta en forma plenamente natural para español.
