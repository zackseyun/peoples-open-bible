review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura y la repetición de כפר aplicada a santuario, tienda, altar, sacerdotes y pueblo. Sin embargo, «el santuario del lugar santo» no corresponde bien a מִקְדַּשׁ הַקֹּדֶשׁ ni al inglés auditado «the Holy Sanctuary»; suena como una relación genitiva añadida y crea una idea distinta. También la nota [a] está anclada en «santuario» pero su contenido explica el verbo כפר, por lo que debe anclarse en la expresión verbal.
  spanish_quality_summary: El español es en general claro y digno. «Hará expiación» funciona bien en contexto cultual. «Tienda del Encuentro» y «todo el pueblo de la asamblea» son legibles. La principal dificultad de estilo y fidelidad está en «el santuario del lugar santo», que es poco natural y además más interpretativo/torpe que «el santuario santo».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de usar «expiación» para כפר es defendible y coherente con la nota. Se mantiene la repetición teológica del verbo. «Asamblea» sigue la preferencia auditada frente a «congregación».
  issues:
  - severity: high
    issue: «el santuario del lugar santo» no preserva fielmente מִקְדַּשׁ הַקֹּדֶשׁ
    rationale: La frase hebrea auditada se verte al inglés como «the Holy Sanctuary». El español actual introduce una construcción genitiva («santuario del lugar santo») que no suena natural y sugiere un santuario perteneciente a otro lugar santo, en vez de calificar al santuario mismo.
  - severity: medium
    issue: La nota [a] está anclada en el sustantivo equivocado
    rationale: El contenido de la nota trata sobre el verbo כפר («hacer expiación / purgar»), no sobre «santuario». Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: low
    issue: La alternativa «purgará» en la nota es menos natural que «hará purificación» o simplemente mantener la explicación
    rationale: Aunque comunica parte del sentido, «purgará» aislado puede sonar brusco en español bíblico moderno. Aun así, puede conservarse si se prefiere cercanía al inglés «purge».
  revised_spanish_text: Así[a] hará expiación por el santuario santo, por la Tienda del Encuentro y por el altar; hará expiación por los sacerdotes y por todo el pueblo de la asamblea[b].
