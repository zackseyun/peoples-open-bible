translation:
  language: es
  text: De día el sol no te golpeará[a], ni la luna de noche te dañará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hará daño». El verbo hebreo significa literalmente «golpear» o «herir», pero aquí puede implicar un efecto perjudicial.
    reason: lexical_alternative
  - marker: b
    text: La pareja «de día ... de noche» expresa protección total en todo momento; el sol y la luna pueden entenderse literalmente, figuradamente o de ambas maneras.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹמָם
  english_pob_choice: By day
  chosen_spanish: De día
  alternatives_spanish:
  - Durante el día
  - En el día
  lexicon: HALOT
  rationale: El adverbio temporal hebreo pide una expresión natural y breve en español. «De día» conserva el paralelismo con «de noche» y mantiene el valor adverbial sin añadir matiz innecesario.
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: HALOT
  rationale: Referencia nominal directa al sol; en español «el sol» es la forma más natural y fiel.
- source_word: יַכֶּכָּה
  english_pob_choice: will strike you
  chosen_spanish: te golpeará
  alternatives_spanish:
  - te herirá
  - te castigará
  - te golpeará con daño
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «golpear/pegar» del verbo נכה, evitando suavizarla demasiado con una paráfrasis como «dañar». «Golpeará» es más natural que «herirá» para la acción física literal, aunque en contexto el efecto puede ser dañoso.
- source_word: וְיָרֵחַ
  english_pob_choice: nor the moon
  chosen_spanish: ni la luna
  alternatives_spanish:
  - y la luna
  - ni la luna tampoco
  lexicon: HALOT
  rationale: La negación se extiende a la segunda cola; en español «ni la luna» reproduce mejor la función coordinada negativa que repetir una negación verbal.
- source_word: בַּלָּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: «De noche» es la correspondencia más idiomática y balancea bien con «de día», preservando la simetría poética.
theological_decisions:
- issue: Alcance de la protección prometida
  english_pob_reading: Retain the concrete imagery of sun and moon without specifying whether the sense is literal, metaphorical, or both.
  chosen_spanish_reading: Mantener la imagen concreta del sol y la luna sin resolver si el sentido es literal, figurado o ambos.
  alternative_spanish_readings:
  - Protección literal contra daños ambientales
  - Protección figurada total en todo momento
  - Posible alusión a temores antiguos asociados con la luna
  rationale: El hebreo usa un paralelismo de día/noche que sugiere protección completa; la traducción no debe cerrar la ambigüedad poética ni reemplazarla por una explicación. «El sol» y «la luna» se conservan como imágenes, dejando abierta su referencia exacta.
  doctrine_reference: Preservar la tensión teológica y poética en lugar de resolverla en el texto principal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la lectura inglesa auditada: verbo concreto («golpear») y paralelismo temporal («de día ... de noche») sin resolver la amplitud interpretativa. No hay revisiones aplicadas en el pasaje inglés, y no se detecta necesidad de ajustar la decisión principal.'
  spanish_consistency_notes:
  - Se mantiene el tú singular implícito del hebreo con «te».
  - Se conserva el paralelismo poético con «de día ... de noche».
  - No se sustituye «sol» o «luna» por un lenguaje explicativo, para no borrar la imagen bíblica.
  - La nota a aclara la tensión entre el golpe literal y el daño implícito; la nota b preserva el alcance merístico del versículo.
