translation:
  language: es
  text: 'Todos estos eran israelitas, desde los doce años de edad en adelante, aparte de los siervos varones y las siervas[a]: cuarenta y dos mil trescientos sesenta. Los siervos varones y las siervas de estos eran siete mil trescientos treinta y siete; y los cantores y las cantoras[b], doscientos cuarenta y cinco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de los esclavos y las esclavas». Los términos griegos pueden abarcar dependientes domésticos en condición subordinada; aquí el contexto es un total censal, no un énfasis en el estatus jurídico.
    reason: lexical_alternative
  - marker: b
    text: O «los cantores y las cantoras»; es decir, «los cantantes varones y las cantantes mujeres». El griego distingue ψάλται y ψαλτῳδοί, en vez de usar un solo término indiferenciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ πάντες
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Y todos estos
  - Ahora bien, todos estos
  lexicon: LSJ
  rationale: La frase resume al total de los enumerados; en español, «Todos estos» conserva la fuerza sumativa con naturalidad y sin cargar innecesariamente δέ.
- source_word: ἦσαν Ἰσραήλ
  english_pob_choice: were Israelites
  chosen_spanish: eran israelitas
  alternatives_spanish:
  - eran Israel
  - pertenecían a Israel
  lexicon: LSJ
  rationale: El griego literalmente dice «eran Israel», pero en contexto expresa identidad étnica/covenantal del grupo contado. «Israelitas» es el equivalente español idiomático y fiel al sentido.
- source_word: ἀπὸ δωδεκαετοῦς
  english_pob_choice: from twelve years old and upward
  chosen_spanish: desde los doce años de edad en adelante
  alternatives_spanish:
  - desde los doce años
  - de doce años para arriba
  lexicon: LSJ
  rationale: La expresión marca el umbral de edad para el censo. «En adelante» explicita el sentido inclusivo sin salir del marco del texto.
- source_word: χωρὶς παίδων καὶ παιδισκῶν
  english_pob_choice: apart from male and female servants
  chosen_spanish: aparte de los siervos varones y las siervas
  alternatives_spanish:
  - aparte de los esclavos y las esclavas
  - excluyendo a los muchachos y muchachas
  lexicon: LSJ
  rationale: En este contexto censal, la pareja con παιδίσκαι favorece dependientes domésticos más que hijos e hijas. «Siervos varones y siervas» conserva el contraste de género y evita imponer «esclavos» donde el pasaje enumera personas dependientes sin focalizar su condición legal.
- source_word: μυριάδες τέσσαρες δισχίλιοι τριακόσιοι ἑξήκοντα
  english_pob_choice: forty-two thousand three hundred sixty
  chosen_spanish: cuarenta y dos mil trescientos sesenta
  alternatives_spanish:
  - '42.360'
  - cuarenta y dos mil trescientos sesenta personas
  lexicon: LSJ
  rationale: Es el total numérico directo; en español conviene la cifra en palabras por el estilo bíblico de lectura pública.
- source_word: παῖδες τούτων καὶ παιδίσκαι
  english_pob_choice: Their male and female servants
  chosen_spanish: Sus siervos varones y sus siervas
  alternatives_spanish:
  - Sus esclavos y sus esclavas
  - Sus servidores y sus servidoras
  lexicon: LSJ
  rationale: «τούτων» remite a los contados; «sus» mantiene la relación posesiva. «Siervos/siervas» preserva la distinción social y sexual del griego, con una opción más solemne que «servidores».
- source_word: ἑπτακισχίλιοι τριακόσιοι τριάκοντα ἑπτά
  english_pob_choice: seven thousand three hundred thirty-seven
  chosen_spanish: siete mil trescientos treinta y siete
  alternatives_spanish:
  - '7.337'
  - siete mil trescientos treinta y siete personas
  lexicon: LSJ
  rationale: Número directo, mantenido en palabras por coherencia litúrgica y de lectura.
- source_word: ψάλται καὶ ψαλτῳδοί
  english_pob_choice: the singers and songstresses
  chosen_spanish: los cantores y las cantoras
  alternatives_spanish:
  - los cantores y las cantoras
  - los cantores y los cantores cantores
  - los cantores y las cantoras de canto
  lexicon: LSJ
  rationale: El griego distingue dos grupos; el español puede reflejar esa distinción con una pareja masculina/femenina transparente. «Cantores y cantoras» comunica la diferenciación sin perder naturalidad.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  english_pob_choice: two hundred forty-five
  chosen_spanish: doscientos cuarenta y cinco
  alternatives_spanish:
  - '245'
  - doscientos cuarenta y cinco personas
  lexicon: LSJ
  rationale: Renderización numérica directa y estándar.
theological_decisions:
- issue: Identidad covenantal expresada por ἦσαν Ἰσραήλ
  english_pob_reading: were Israelites
  chosen_spanish_reading: eran israelitas
  alternative_spanish_readings:
  - eran Israel
  rationale: No es una cuestión doctrinal controvertida, pero sí una expresión de identidad del pueblo del pacto. «Israelitas» mantiene la referencia comunitaria sin un giro literal poco natural en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Términos socialmente marcados παῖδες / παιδίσκαι
  english_pob_reading: male and female servants
  chosen_spanish_reading: siervos varones y siervas
  alternative_spanish_readings:
  - esclavos y esclavas
  - muchachos y muchachas
  rationale: El contexto es un recuento censal y no un debate sobre estatus legal; por eso se evita cargar el texto con «esclavos» como lectura principal. «Siervos/siervas» conserva la fuerza social del término y deja abierta la alternativa léxica más fuerte donde el contexto la requiera.
  doctrine_reference: DOCTRINE.md contested terms table for δοῦλος by analogy; translation philosophy §1, §6
- issue: Distinción entre ψάλται y ψαλτῳδοί
  english_pob_reading: the singers and songstresses
  chosen_spanish_reading: los cantores y las cantoras
  alternative_spanish_readings:
  - los cantores y los cantores cantores
  - los cantantes
  rationale: El POB inglés preserva la distinción de dos grupos. En español, «cantores y cantoras» conserva esa diferenciación con suficiente claridad para una lectura pública.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el inglés auditado; no se registraron revisiones aplicadas en el tramo más reciente, y el juicio de revisión indica cambios no necesarios. La versión española sigue de cerca el texto griego y mantiene las distinciones léxicas señaladas por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «israelitas» para la identidad del grupo, evitando el calco «era Israel» por falta de naturalidad en español.
  - Se conserva la distinción de género en los dependientes y en los músicos/cantores, porque el griego diferencia dos pares de términos.
  - Los números se dan en palabras, conforme al estilo bíblico de lectura continua.
  - Se usa «siervos/siervas» como opción intermedia entre «esclavos/as» y «servidores/as», con nota que preserva la alternativa fuerte documentada por el POB.
