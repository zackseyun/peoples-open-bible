translation:
  language: es
  text: Entró y cerró la puerta con los dos adentro[a], y oró a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerró la puerta sobre los dos», es decir, quedó él solo con el niño en la habitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: He went in
  chosen_spanish: Entró
  alternatives_spanish:
  - Fue adentro
  - Ingresó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא marca avance narrativo; en español, «entró» comunica de forma natural el ingreso al cuarto sin perder el valor secuencial del verbo.
- source_word: וַיִּסְגֹּר
  english_pob_choice: shut
  chosen_spanish: cerró
  alternatives_spanish:
  - aseguró
  - echó
  lexicon: HALOT
  rationale: סגר expresa cerrar/cegar; aquí, con «la puerta», «cerró» es la forma española más directa y fiel al gesto concreto.
- source_word: הַדֶּלֶת
  english_pob_choice: the door
  chosen_spanish: la puerta
  alternatives_spanish:
  - el portón
  lexicon: HALOT
  rationale: El sustantivo definido דֶּלֶת se traduce de manera directa por «la puerta».
- source_word: בְּעַד שְׁנֵיהֶם
  english_pob_choice: behind the two of them
  chosen_spanish: detrás de los dos
  alternatives_spanish:
  - sobre los dos
  - dejándolos solos dentro
  lexicon: HALOT
  rationale: La expresión indica que la puerta quedó cerrada de modo que ambos quedaron apartados del exterior; «detrás de los dos» conserva la idea espacial y evita sobreexplicar.
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: and prayed
  chosen_spanish: y oró
  alternatives_spanish:
  - y oró él
  - y se puso a orar
  lexicon: HALOT
  rationale: El hitpael de פלל aquí significa «orar». «Oró» es claro y reverente en español, sin añadir matices que el hebreo no exige.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según la norma del proyecto: יְהוָה se vierte «Yahvé», preservando el Tetragrámaton en vez de ocultarlo con «SEÑOR».'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y la política del proyecto pide conservarlo en español como «Yahvé» para hacer auditable la presencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés había preferido una equivalencia óptima con «went in», «shut», «behind the two of them» y «Yahweh». Para esta versión española se mantiene la misma estructura narrativa, pero se adapta a una formulación natural y auditable en español, conservando la alternativa espacial de בְּעַד en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una máscara litúrgica como «SEÑOR», conforme a la política del proyecto.
  - «Oró» traduce el valor verbal de וַיִּתְפַּלֵּל sin añadir contenido devocional extra.
  - 'La nota alternativa conserva la tensión lexical de בְּעַד: cierre «detrás de» versus cierre «sobre» como forma de encierro.'
