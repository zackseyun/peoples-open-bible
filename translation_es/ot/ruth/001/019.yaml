translation:
  language: es
  text: 'Así, las dos siguieron su camino hasta que llegaron a Belén. Y cuando llegaron a Belén[a], toda la ciudad se conmocionó por causa de ellas, y las mujeres dijeron: «¿Es esta Noemí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y dijeron» está en femenino plural, indicando que quienes hablan son mujeres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלַכְנָה
  english_pob_choice: went on
  chosen_spanish: siguieron andando
  alternatives_spanish:
  - siguieron
  - fueron andando
  - continuaron su camino
  lexicon: HALOT
  rationale: הלך en esta secuencia narrativa expresa continuación del viaje. «Siguieron andando» conserva el movimiento progresivo y suena natural en español sin perder la idea de continuidad.
- source_word: שְׁתֵּיהֶם
  english_pob_choice: the two of them
  chosen_spanish: las dos
  alternatives_spanish:
  - las dos juntas
  - ambas
  - las dos juntas
  lexicon: HALOT
  rationale: El hebreo marca explícitamente a la pareja como unidad. En español, «las dos» es claro y natural; el contexto ya identifica a Noemí y Rut.
- source_word: עַד בֹּאָ֖נָה
  english_pob_choice: until they came
  chosen_spanish: hasta llegar
  alternatives_spanish:
  - hasta que llegaron
  - hasta que vinieron
  lexicon: HALOT
  rationale: La construcción señala el punto final del trayecto. «Hasta llegar» mantiene la fuerza de meta del movimiento con fluidez española.
- source_word: בֵּית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: HALOT
  rationale: Es el topónimo bíblico en forma habitual del español. No se traduce como «casa de pan» porque el texto aquí funciona como nombre propio.
- source_word: וַיְהִי כְּבֹאָ֨נָה
  english_pob_choice: And when they came
  chosen_spanish: Y cuando llegaron
  alternatives_spanish:
  - Y sucedió que cuando llegaron
  - Y al llegar
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el siguiente hecho. «Y cuando llegaron» preserva el valor temporal sin sobrecargar la frase.
- source_word: וַתֵּהֹם
  english_pob_choice: was stirred
  chosen_spanish: se alborotó
  alternatives_spanish:
  - se agitó
  - se conmocionó
  - se estremeció
  lexicon: HALOT
  rationale: המם denota conmoción o agitación. «Se alborotó» comunica bien la reacción colectiva del pueblo sin exagerar hacia desorden violento.
- source_word: כָּל הָעִיר
  english_pob_choice: the whole town
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - todo el pueblo
  - toda la villa
  lexicon: HALOT
  rationale: Bethlehem es una localidad pequeña, pero el hebreo dice literalmente «toda la ciudad». En español bíblico «ciudad» conserva el registro del original.
- source_word: עֲלֵיהֶן
  english_pob_choice: because of them
  chosen_spanish: por causa de ellas
  alternatives_spanish:
  - a causa de ellas
  - por ellas
  lexicon: HALOT
  rationale: La preposición marca motivo o ocasión de la conmoción. «Por causa de ellas» es transparente y reproduce bien la relación causal.
- source_word: וַתֹּאמַרְנָה
  english_pob_choice: the women said
  chosen_spanish: las mujeres dijeron
  alternatives_spanish:
  - ellas dijeron
  lexicon: HALOT
  rationale: El verbo está en femenino plural, así que conviene explicitar que quienes hablan son mujeres. «Las mujeres dijeron» evita perder ese detalle gramatical.
- source_word: הֲזֹאת נָעֳמִי
  english_pob_choice: Is this Naomi?
  chosen_spanish: ¿Es esta Noemí?
  alternatives_spanish:
  - ¿Es Noemí esta?
  - ¿Será esta Noemí?
  lexicon: HALOT
  rationale: La interrogación expresa reconocimiento sorprendido. La versión directa «¿Es esta Noemí?» conserva la sobriedad del hebreo y el asombro implícito.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca en el texto español exactamente donde corresponde, en la cláusula de llegada a Belén. La nota se mantiene para preservar el dato gramatical femenino plural del hebreo que el POB inglés ya documenta.
  spanish_consistency_notes:
  - Se mantuvo «Belén» como topónimo, no la glosa «casa de pan».
  - Se usó «Noemí» para el nombre propio, con ortografía española estándar.
  - Se preservó el sujeto femenino plural explícito en «las mujeres dijeron».
  - Se evitó un calco rígido de «the whole town» con «ciudad» por fidelidad al hebreo y registro bíblico.
