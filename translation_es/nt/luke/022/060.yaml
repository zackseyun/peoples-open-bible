translation:
  language: es
  text: 'Pero Pedro dijo: «Hombre, no sé lo que dices». Y al instante, mientras todavía hablaba, cantó un gallo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gallo cantó».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca el giro narrativo y el contraste con la negación anterior. «Pero» es natural en español y conserva mejor la fuerza adversativa que un simple «Y».
- source_word: Ἄνθρωπε
  english_pob_choice: Man
  chosen_spanish: Varón
  alternatives_spanish:
  - Hombre
  - Señor
  lexicon: BDAG
  rationale: El vocativo se dirige a un varón concreto. «Varón» preserva la referencia masculina explícita sin sonar tan áspero como «Hombre» en español moderno; «Señor» sería más interpretativo.
- source_word: οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no conozco
  - no lo sé
  lexicon: BDAG
  rationale: Aunque la forma griega es literalmente «no sé», en español la negación directa con «no sé» comunica con fidelidad la negativa de Pedro. «No lo sé» añade un objeto explícito que el griego no tiene.
- source_word: ὃ λέγεις
  english_pob_choice: what you are saying
  chosen_spanish: lo que dices
  alternatives_spanish:
  - lo que estás diciendo
  - lo que hablas
  lexicon: BDAG
  rationale: El relativo con λέγεις se expresa de forma natural como «lo que dices». Mantiene la proximidad al griego sin volver demasiado interpretativo el contenido de la negación.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: BDAG
  rationale: Adverbio de inmediatez. «Al instante» suena natural y solemne en español bíblico contemporáneo.
- source_word: ἔτι λαλοῦντος αὐτοῦ
  english_pob_choice: while he was still speaking
  chosen_spanish: mientras él todavía hablaba
  alternatives_spanish:
  - mientras seguía hablando
  - cuando aún hablaba
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa simultaneidad. «Mientras él todavía hablaba» conserva el valor de ἔτι y el solapamiento temporal.
- source_word: ἐφώνησεν ἀλέκτωρ
  english_pob_choice: a rooster crowed
  chosen_spanish: cantó un gallo
  alternatives_spanish:
  - cacareó un gallo
  - cantó un gallo
  lexicon: BDAG
  rationale: El sustantivo ἀλέκτωρ denota al gallo. En español, la formulación idiomática y bíblica normal es «cantó un gallo»; «cacareó» no corresponde al sonido del gallo y «gallo cantó» sería menos natural.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego SBLGNT y el audit trail inglés, manteniendo la secuencia adversativa, la negación breve de Pedro y la marca temporal de inmediatez sin añadir elementos no presentes en la fuente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún término divino aquí; el vocativo es humano y masculino.
  - Se mantiene un registro bíblico contemporáneo, evitando calcos rígidos como «Y al punto» o «cock crowed».
  - La frase final conserva el sentido literal tradicional de «cantó un gallo», que en español comunica bien el evento sin requerir nota textual.
