translation:
  text: Do not say, "What do I need, and what good things will be mine from now on?"[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew witness here differs sharply: ''He did not know what was coming next, and he left it to another and died,'' or similar. The Greek parallel instead reads as an admonition, which is followed in the main text because the Hebrew appears textually mismatched at this point.'
    reason: textual_variant
lexical_decisions:
- source_word: לֹא יָדַע / μὴ εἴπῃς
  chosen: Do not say
  alternatives:
  - He did not know
  - Do not think
  lexicon: HALOT; LSJ
  rationale: 'The Hebrew in Kahana reads לֹא יָדַע (''he did not know''), followed by a difficult clause about what comes and leaving possessions to another before death. The Greek parallel, however, gives a coherent imperative matching the surrounding admonitory context: μὴ εἴπῃς, ''do not say.'' Because the task requires using the Greek parallel as actual translation input while translating from the most original witness available, and because the Hebrew here appears textually mismatched/corrupt (noted by ''minor_mismatch''), the main rendering follows the Greek sense, with the Hebrew difficulty preserved in a footnote.'
- source_word: Τίς ἐστίν μου χρεία
  chosen: What do I need
  alternatives:
  - What is my need
  - Who is my need
  lexicon: LSJ
  rationale: χρεία means 'need' or 'necessity.' English idiom favors 'What do I need' over the more wooden 'What is my need,' while preserving the self-satisfied rhetorical question.
- source_word: τίνα ... ἔσται μου τὰ ἀγαθά
  chosen: what good things will be mine
  alternatives:
  - what benefits will belong to me
  - what goods will I have
  lexicon: LSJ
  rationale: τὰ ἀγαθά can denote 'good things,' 'goods,' or 'benefits.' 'Good things' preserves the broad sense without narrowing it only to material property, fitting wisdom-language about prosperity.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - hereafter
  - from this time
  lexicon: LSJ
  rationale: A straightforward temporal phrase; 'from now on' is natural modern English and adequately formal.
