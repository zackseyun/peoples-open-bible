translation:
  language: es
  text: Porque Yahvé no pudo llevar[a] a este pueblo a la tierra que les juró, los masacró en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Por falta de capacidad de Yahvé para llevar a este pueblo a la tierra que les juró».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבִּלְתִּי
  english_pob_choice: Because ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Por falta de
  - Ya que ... no pudo
  lexicon: HALOT
  rationale: La construcción introduce aquí la explicación atribuida por las naciones; en español, «Porque ... no» reproduce de forma natural esa relación causal sin oscurecer la negación.
- source_word: יְכֹלֶת
  english_pob_choice: was able
  chosen_spanish: pudo
  alternatives_spanish:
  - era capaz de
  - tenía poder para
  lexicon: HALOT
  rationale: El hebreo expresa capacidad/posibilidad. «Pudo» es breve y fiel en español, y conserva la acusación de incapacidad atribuida a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio con la transliteración «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - llevar
  - hacer entrar
  lexicon: HALOT
  rationale: Con la meta expresa «a la tierra», «traer» funciona con naturalidad en español y conserva la idea de introducir al pueblo en el destino prometido.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a este pueblo de allí
  - a esta nación
  lexicon: HALOT
  rationale: «Pueblo» mantiene el singular colectivo del hebreo y evita el plural interpretativo «estas personas».
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra adentro
  - hasta la tierra
  lexicon: HALOT
  rationale: En español, con «traer» la preposición «a» expresa bien la llegada al destino; «la tierra» conserva el término bíblico sin añadir precisión no explicitada.
- source_word: אֲשֶׁר נִשְׁבַּע לָהֶם
  english_pob_choice: that he swore to them
  chosen_spanish: que les juró
  alternatives_spanish:
  - que les prometió con juramento
  - que les había jurado
  lexicon: HALOT
  rationale: El hebreo dice literalmente que les juró; no se añade «dar» porque la revisión inglesa retiró esa expansión al no estar explícita. «Juró» conserva el valor pactual del juramento.
- source_word: וַיִּשְׁחָטֵם
  english_pob_choice: he slaughtered them
  chosen_spanish: los degolló
  alternatives_spanish:
  - los mató
  - los masacró
  lexicon: HALOT
  rationale: שׁחט denota matar por degüello/sacrificio; «degolló» preserva esa fuerza violenta y concreta mejor que el más general «mató».
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/erial
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» suele poder verterse como «desierto», aquí es una opción clara y natural en español; se conserva el escenario del peregrinaje israelita.
theological_decisions:
- issue: La acusación implícita de incapacidad divina
  english_pob_reading: Because Yahweh was not able to bring this people into the land...
  chosen_spanish_reading: Porque Yahvé no pudo traer a este pueblo a la tierra...
  alternative_spanish_readings:
  - Porque Yahvé no era capaz de traer a este pueblo a la tierra...
  - Por falta de la capacidad de Yahvé para traer a este pueblo a la tierra...
  rationale: 'Se mantiene la tensión teológica del texto: no se corrige la acusación de incapacidad, porque el hebreo presenta precisamente lo que las naciones dirían. La traducción conserva esa afrenta sin resolverla.'
  doctrine_reference: Preservar la tensión teológica del discurso ajeno al pueblo de Yahvé.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «to give» por no estar explícito en el hebreo. Por eso el español no añade «dar» ni equivalente; se conserva simplemente «que les juró».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se evitó introducir «dar» o «prometer» en la cláusula del juramento, porque el texto hebreo y la revisión auditable no lo expresan de forma directa.
  - «Degolló» se eligió por su correspondencia más concreta con שׁחט, evitando suavizar la imagen.
