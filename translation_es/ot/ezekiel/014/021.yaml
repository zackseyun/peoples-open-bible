translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: ¿Cuánto más cuando yo envíe mis cuatro juicios severos[a] contra Jerusalén—espada, hambruna, bestias feroces y peste[b]—para eliminar de ella a seres humanos y animales?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mis cuatro juicios malos’. El adjetivo hebreo puede significar ‘malo’, ‘dañino’ o ‘funesto’ en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘pestilencia’ para ‘peste’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino יְהֹוִה. En español, 'Señor Yahvé' preserva ambos elementos sin ocultar el nombre propio y evita la duplicación artificial 'Señor Señor'.
- source_word: אַף כִּי
  english_pob_choice: How much more when
  chosen_spanish: ¿Cuánto más cuando
  alternatives_spanish:
  - aun cuando
  - y mucho más cuando
  - cuánto más si
  lexicon: HALOT
  rationale: La fuerza aquí es a fortiori, enlazada con el contexto inmediato. '¿Cuánto más cuando' comunica bien esa lógica retórica en español natural.
- source_word: אַרְבַּעַת שְׁפָטַי הָרָעִים
  english_pob_choice: my four severe judgments
  chosen_spanish: mis cuatro juicios severos
  alternatives_spanish:
  - mis cuatro juicios peligrosos
  - mis cuatro juicios malos
  - mis cuatro juicios desastrosos
  lexicon: HALOT
  rationale: שְׁפָטִים mantiene la idea de actos judiciales/punitivos de Dios; הָרָעִים expresa calamidad o severidad, no mal moral en Dios. 'Severos' conserva la dureza del juicio sin sonar moralmente problemático.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - la espada
  - guerra
  lexicon: HALOT
  rationale: Se conserva el término concreto de juicio. 'Espada' es el equivalente directo y mantiene el valor profético tradicional sin abstraerlo a 'guerra'.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  lexicon: HALOT
  rationale: En español bíblico, 'hambre' comunica el efecto de la calamidad de manera natural y clara; 'famine' sería menos idiomático. El sentido abarca escasez grave de alimentos.
- source_word: חַיָּה רָעָה
  english_pob_choice: wild beasts
  chosen_spanish: bestias feroces
  alternatives_spanish:
  - animales salvajes
  - bestias salvajes
  - bestias malas
  lexicon: HALOT
  rationale: La frase describe animales peligrosos y depredadores. 'Bestias feroces' conserva el tono amenazante y evita sugerir maldad moral.
- source_word: דֶבֶר
  english_pob_choice: plague
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - plaga
  lexicon: HALOT
  rationale: '''Peste'' es natural en español y adecuado para la lista de juicios. ''Pestilencia'' sería más arcaizante; ''plaga'' podría confundirse con otras plagas más generales.'
- source_word: שִׁלַּחְתִּי
  english_pob_choice: I send
  chosen_spanish: yo envíe
  alternatives_spanish:
  - yo envié
  - yo he enviado
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en este discurso profético funciona como declaración prospectiva/solemne. El subjuntivo tras 'cuando' reproduce adecuadamente ese valor.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para exterminar
  alternatives_spanish:
  - para cortar de raíz
  - para destruir
  - para arrancar
  lexicon: HALOT
  rationale: '''Cortar off'' se expresa en español con una fórmula verbal que transmita eliminación total. ''Exterminar'' mantiene la fuerza del idiomático hebreo en este contexto de juicio, sin perder legibilidad.'
- source_word: אָדָם וּבְהֵמָה
  english_pob_choice: man and beast
  chosen_spanish: a hombre y bestia
  alternatives_spanish:
  - al ser humano y al ganado
  - a personas y animales
  - a hombre y animal
  lexicon: HALOT
  rationale: En esta fórmula fija de juicio, 'hombre y bestia' o 'a hombre y bestia' reproduce la pareja inclusiva humano-animal. Se mantiene la concreción del hebreo sin generalizarla excesivamente.
theological_decisions:
- issue: Nombre divino יְהוָה dentro del título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor
  rationale: La política del proyecto para YHWH es no ocultar el nombre divino. 'Yahvé' hace visible el Tetragrama y conserva el valor covenantal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: ‘juicios severos’ no debe sonar a mal moral en Dios
  english_pob_reading: my four severe judgments
  chosen_spanish_reading: mis cuatro juicios severos
  alternative_spanish_readings:
  - mis cuatro juicios malos
  - mis cuatro juicios desastrosos
  rationale: El hebreo usa un adjetivo de calamidad/daño respecto de los juicios, no de maldad ética en Dios. 'Severos' evita esa confusión y conserva el peso judicial.
  doctrine_reference: Principio semántico de שְׁפָטִים en textos de juicio profético
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que prefirió ''severe judgments'' sobre ''disastrous judgments''. La redacción española sigue ese ajuste y mantiene la misma cautela interpretativa: el adjetivo describe la intensidad/calamidad del juicio, no una cualidad moral de Dios.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - 'Se mantiene una secuencia de términos concretos de juicio: espada, hambre, bestias feroces y peste.'
  - '''Hombre y bestia'' conserva la fórmula inclusiva del hebreo sin modernizarla excesivamente.'
  - El subjuntivo 'envíe' refleja el valor prospectivo del perfecto profético en un marco de oración dependiente de 'cuando'.
