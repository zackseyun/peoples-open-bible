id: 2KI.19.25
reference: 2 Kings 19:25
source:
  edition: WLC
  text: הֲ/לֹֽא שָׁמַ֤עְתָּ לְ/מֵֽ/רָחוֹק֙ אֹתָ֣/הּ עָשִׂ֔יתִי לְ/מִ֥/ימֵי קֶ֖דֶם וִֽ/יצַרְתִּ֑י/הָ עַתָּ֣ה הֲבֵיאתִ֗י/הָ וּ/תְהִ֗י לַ/הְשׁ֛וֹת גַּלִּ֥ים נִצִּ֖ים עָרִ֥ים בְּצֻרֽוֹת־׃
translation:
  text: Have you not heard? Long ago I made it[a]; from days of old I formed it. Now I have brought it to pass[c][b], that you should lay waste fortified cities into heaps of ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from afar''; the Hebrew expression can be read spatially, but here likely has a temporal sense: ''long ago.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I fashioned it.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'heaps, ruins'; the Hebrew phrase is difficult and may also be rendered 'standing heaps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Have you not indeed
  - Did you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Have you not' preserves the interrogative force and natural English idiom.
- source_word: שָׁמַעְתָּ
  lemma: שׁמע
  chosen: heard
  alternatives:
  - listened
  - come to hear
  lexicon: HALOT
  rationale: The verb שׁמע here refers to receiving report or knowledge. 'Heard' is the standard and most natural rendering in this rhetorical question.
- source_word: לְמֵרָחוֹק
  chosen: Long ago
  alternatives:
  - from afar
  - from long ago
  lexicon: HALOT
  rationale: Although literally 'from afar,' in temporal context with 'from days of old' it idiomatically points to remote time rather than spatial distance. 'Long ago' best captures the temporal sense in English.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this
  - that
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the plan or event God ordained. English requires a neutral pronoun here.
- source_word: עָשִׂיתִי
  chosen: I made
  alternatives:
  - I did
  - I accomplished
  lexicon: HALOT
  rationale: עשה is broad, but 'made' fits the parallel with 'formed' and preserves the imagery of divine planning and execution.
- source_word: לִימֵי קֶדֶם
  chosen: from days of old
  alternatives:
  - in ancient days
  - from ancient times
  lexicon: HALOT
  rationale: This phrase emphasizes antiquity. 'From days of old' is clear, elevated without being archaic, and pairs well with the previous temporal phrase.
- source_word: וִיצַרְתִּיהָ
  chosen: I formed it
  alternatives:
  - I fashioned it
  - I planned it
  lexicon: HALOT
  rationale: יצר often conveys forming or shaping. 'Formed' preserves the crafting nuance and the parallelism with 'made.' 'Planned' is interpretive and therefore kept as an alternative only.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - But now
  - at this time
  lexicon: HALOT
  rationale: Marks the transition from ancient divine intention to present realization.
- source_word: הֲבֵיאתִיהָ
  chosen: I have brought it to pass
  alternatives:
  - I have brought it
  - I have caused it to happen
  lexicon: HALOT
  rationale: The idiomatic sense in context is not mere movement but realization of a prior plan. 'Brought it to pass' communicates fulfillment while remaining close to the Hebrew sense.
- source_word: וּתְהִי
  chosen: that you should be
  alternatives:
  - and it came to be that you were
  - so that you might be
  lexicon: HALOT
  rationale: Following the preceding clause, this expresses result/purpose with reference to the Assyrian king. Rendering it with 'that you should be' gives the intended force in smooth English.
- source_word: לַהְשׁוֹת
  chosen: lay waste
  alternatives:
  - devastate
  - desolate
  lexicon: HALOT
  rationale: The infinitive conveys causing desolation. 'Lay waste' is idiomatic, vivid, and suitable for military destruction.
- source_word: גַּלִּים נִצִּים
  chosen: heaps of ruins
  alternatives:
  - standing heaps
  - ruinous mounds
  - piles
  lexicon: HALOT
  rationale: The phrase is difficult; it refers to heaps or mounds resulting from destruction. 'Heaps of ruins' communicates the image clearly in context. 'Standing heaps' is more literal but less intelligible in modern English.
- source_word: עָרִים בְּצֻרוֹת
  chosen: fortified cities
  alternatives:
  - walled cities
  - strong cities
  lexicon: HALOT
  rationale: The phrase denotes defended urban centers. 'Fortified cities' is the standard, accurate rendering.
