    issue: «vara de caña» debilita la imagen de apoyo implícita en מִשְׁעֶנֶת
    rationale: El sustantivo hebreo se refiere a un soporte o bastón en que uno se apoya. «Vara» en español puede perder esa función, mientras que «bastón de caña» la conserva mejor y sigue siendo natural.
  - severity: low
    issue: La nota al pie no ofrece una alternativa real al texto principal
    rationale: La nota dice «O “una vara de caña”» cuando esa misma expresión ya aparece en el texto. Conviene ajustar el texto principal o la nota para que la alternativa sea auténtica y útil.
