review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en los puntos principales: חַיִּים = «vida», עָשִׂיתָ עִמָּדִי con sentido benefactivo, פְקֻדָּתְךָ como cuidado/atención preservadora, y רוּחִי = «mi espíritu» con alternativa «aliento». Sin embargo, la colocación de las notas [a][b] en «amor leal» no corresponde al origen de las alternativas en el texto fuente: la nota sobre «visita/vigilancia» pertenece a «tu cuidado», y la nota sobre «aliento» pertenece a «mi espíritu».'
  spanish_quality_summary: El español es claro y natural. «Tú me has dado vida y amor leal» suena bien, aunque «me has concedido» sería un poco más elevado; no es necesario cambiarlo. La reparación necesaria es de anclaje de notas, no de legibilidad. La nota «tu visita» suena menos natural que «tu visitación» como equivalente formal de פְקֻדָּה, y conviene ajustarla para reflejar mejor el audit trail inglés.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay nombres divinos ni términos cristológicos implicados; רוּחַ se traduce contextualmente como «espíritu» con alternativa «aliento»; חֶסֶד como «amor leal» es una decisión defendible y fiel al rationale teológico del POB.'
  issues:
  - severity: medium
    issue: Las notas [a][b] están ancladas a «amor leal» en vez de a los términos correspondientes.
    rationale: La nota a explica una alternativa de פְקֻדָּתְךָ («tu cuidado»), y la nota b explica una alternativa de רוּחִי («mi espíritu»). Dejarlas sobre «amor leal» confunde al lector y no preserva con precisión el audit trail.
  - severity: low
    issue: La nota alternativa usa «tu visita» donde el audit trail inglés conserva formalmente «your visitation».
    rationale: «Visita» es posible, pero «visitación» refleja mejor la alternativa léxica más formal/documentada para פְקֻדָּה en este contexto y evita sugerir una visita casual.
  revised_spanish_text: Tú me has dado vida y amor leal, y tu cuidado[a] ha preservado mi espíritu[b].
  revised_footnotes:
  - marker: a
    text: O «tu visitación» o «tu vigilancia» ha preservado mi espíritu.
    reason: lexical_alternative
  - marker: b
    text: O «aliento».
    reason: lexical_alternative
