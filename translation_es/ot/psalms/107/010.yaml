translation:
  language: es
  text: Algunos se sentaban en tinieblas y sombra profunda[a], prisioneros en aflicción y hierros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sombra de la muerte» para צַלְמָוֶת, una traducción tradicional; el hebreo probablemente se refiere más ampliamente a una oscuridad o penumbra profunda.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי
  english_pob_choice: Some sat
  chosen_spanish: Los que habitan
  alternatives_spanish:
  - Algunos se sentaron
  - Los que estaban sentados
  lexicon: HALOT
  rationale: El participio describe a personas que se hallan en una condición o lugar. En español, "los que habitan" comunica de manera natural la idea de personas situadas en esa realidad, sin forzar una imagen demasiado literal de estar sentados.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tiniebla
  lexicon: HALOT
  rationale: '"Tinieblas" conserva el registro poético y bíblico del hebreo חֹשֶׁךְ. Aunque "oscuridad" sería más llano, "tinieblas" comunica bien la fuerza literaria del paralelismo.'
- source_word: צַלְמָוֶת
  english_pob_choice: deep shadow
  chosen_spanish: sombra profunda
  alternatives_spanish:
  - sombra de muerte
  - oscuridad profunda
  - la sombra de la muerte
  lexicon: HALOT
  rationale: La POB inglesa evita imponer "muerte" como elemento explícito y entiende el hebreo como una imagen de oscuridad intensa. "Sombra profunda" mantiene ese sentido y conserva la tensión con la lectura tradicional.
- source_word: אֲסִירֵי
  english_pob_choice: prisoners
  chosen_spanish: prisioneros
  alternatives_spanish:
  - cautivos
  - encarcelados
  - presos
  lexicon: HALOT
  rationale: El constructo plural se refiere a personas encarceladas o retenidas. "Prisioneros" es claro, fiel y natural en español.
- source_word: עֳנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - opresión
  - pobreza
  lexicon: HALOT
  rationale: En este contexto, junto con prisión e hierros, el término apunta al estado general de sufrimiento. "Aflicción" reproduce esa amplitud sin restringirlo solo a pobreza material.
- source_word: בַרְזֶל
  english_pob_choice: irons
  chosen_spanish: hierros
  alternatives_spanish:
  - grilletes
  - cadenas de hierro
  - hierro
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo/metonímico para elementos de hierro que sujetan. "Hierros" permite expresar esa referencia a ataduras de hierro con naturalidad y sin exagerar la imagen.
theological_decisions:
- issue: Sentido de צַלְמָוֶת
  english_pob_reading: deep shadow rather than the traditional 'shadow of death'
  chosen_spanish_reading: sombra profunda en vez de 'sombra de muerte'
  alternative_spanish_readings:
  - sombra de muerte
  - oscuridad mortal
  rationale: La POB documenta que el hebreo probablemente alude más ampliamente a una oscuridad o penumbra intensa, no necesariamente a la muerte misma. La traducción española sigue esa decisión y preserva la alternativa tradicional en nota.
  doctrine_reference: Poética bíblica y semántica léxica de צַלְמָוֶת
translation_notes:
  revision_awareness: El texto sigue la lectura auditada de la POB inglesa con acuerdo alto y sin revisiones aplicadas; se mantiene la decisión léxica principal sobre צַלְמָוֶת y la estructura paralela del versículo.
  spanish_consistency_notes:
  - Se prefirió el plural poético "tinieblas" para חֹשֶׁךְ y la combinación "sombra profunda" para צַלְמָוֶת, preservando el paralelismo sin introducir una aclaración interpretativa excesiva.
  - '"Hierros" mantiene el valor colectivo de בַרְזֶל en contexto de cautiverio.'
  - No se usó "SEÑOR" ni terminología confesional ajena al texto, pues este versículo no contiene el nombre divino.
