translation:
  language: es
  text: Y tomé su pecado, el becerro que habían hecho, y lo quemé con fuego; luego lo quebré, moliéndolo bien hasta que quedó tan fino como polvo, y eché su polvo en el arroyo[a] que baja de la montaña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el torrente» o «el cauce estacional»; el hebreo נחל puede referirse a un arroyo, un torrente o un cauce estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאתְכֶם
  english_pob_choice: your sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su cosa pecaminosa
  - su ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto, el sustantivo identifica el becerro con el pecado del pueblo, no con una ofrenda. «Su pecado» conserva esa ecuación fuerte en español sin suavizarla.
- source_word: הָעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el becerro de oro
  lexicon: HALOT
  rationale: El referente es el episodio del becerro de oro; «becerro» es claro y natural en español bíblico. No se añadió «de oro» para no introducir un elemento no expreso en este versículo.
- source_word: וָאֶשְׂרֹף אֹתוֹ בָּאֵשׁ
  english_pob_choice: burned it with fire
  chosen_spanish: lo quemé con fuego
  alternatives_spanish:
  - lo quemé en el fuego
  - lo quemé con las llamas
  lexicon: HALOT
  rationale: «Con fuego» reproduce la fuerza concreta del hebreo y resulta idiomático en español, manteniendo el énfasis material del acto.
- source_word: וָאֶכֹּת אֹתוֹ
  english_pob_choice: I crushed it
  chosen_spanish: lo quebré
  alternatives_spanish:
  - lo machaqué
  - lo trituré
  - lo golpeé
  lexicon: HALOT
  rationale: El verbo va seguido por el matiz de moler hasta polvo; «lo quebré» comunica el acto inicial de pulverizar sin sonar técnico o redundante.
- source_word: טָחוֹן הֵיטֵב
  english_pob_choice: grinding it thoroughly
  chosen_spanish: moliéndolo muy bien
  alternatives_spanish:
  - moliéndolo completamente
  - triturándolo bien
  lexicon: HALOT
  rationale: La idea es intensiva y de proceso. «Moliéndolo muy bien» preserva la insistencia del hebreo y se integra naturalmente con la secuencia verbal en español.
- source_word: עַד אֲשֶׁר דַּק לְעָפָר
  english_pob_choice: until it was as fine as dust
  chosen_spanish: hasta que quedó tan fino como polvo
  alternatives_spanish:
  - hasta que quedó reducido a polvo
  - hasta que era fino como polvo
  lexicon: HALOT
  rationale: La comparación expresa el grado de pulverización. «Tan fino como polvo» reproduce esa comparación de manera clara en español moderno.
- source_word: עֲפָרוֹ
  english_pob_choice: its dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su polvo fino
  - su polvo molido
  lexicon: HALOT
  rationale: «Polvo» enlaza con la comparación anterior y conserva el resultado material del pulverizado; no se restringe a «ceniza», que sería más específico de lo que el hebreo exige.
- source_word: הַנַּחַל
  english_pob_choice: the stream
  chosen_spanish: el arroyo
  alternatives_spanish:
  - el torrente
  - el río pequeño
  - el arroyo/cañada
  lexicon: HALOT
  rationale: נחל puede abarcar arroyo, torrente o cauce estacional. «Arroyo» es una opción natural en español y mantiene la amplitud del término sin requerir explicación técnica.
- source_word: הַיֹּרֵד מִן הָהָר
  english_pob_choice: that comes down from the mountain
  chosen_spanish: que baja de la montaña
  alternatives_spanish:
  - que desciende de la montaña
  - que viene bajando de la montaña
  lexicon: HALOT
  rationale: La forma participial describe el flujo continuo. «Que baja de la montaña» es natural y conserva el movimiento descendente del hebreo.
theological_decisions:
- issue: Identificación del becerro como el pecado del pueblo
  english_pob_reading: 'The main text preserves the Hebrew''s direct equation of the idol with Israel''s sin: ''your sin, the calf that you had made.'''
  chosen_spanish_reading: 'El texto principal conserva la identificación directa: «su pecado, el becerro que habíais hecho».'
  alternative_spanish_readings:
  - «su cosa pecaminosa, el becerro que habíais hecho»
  rationale: La construcción hebrea es intencionalmente severa. Mantener «su pecado» en español preserva esa carga teológica sin convertirla en una paráfrasis más suave.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; por tanto, el español se alineó con ese estado estable, manteniendo la fuerza del hebreo y la decisión lexical central sobre חַטַּאתְכֶם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva «pecado» para חַטַּאתְכֶם, evitando suavizar la identificación del ídolo con el pecado de Israel.
  - «Arroyo» se usa como equivalente amplio de נחל, consistente con el rango semántico señalado por la nota inglesa.
  - La secuencia verbal en español conserva el progresivo de quemar, quebrar/moler y arrojar, sin añadir elementos interpretativos no presentes en el hebreo.
