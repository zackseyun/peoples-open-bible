translation:
  language: es
  text: para el vigésimo primero[a], Hothir; sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para uno y veinte, Hothir». El hebreo conserva la secuencia de suertes de este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אֶחָד וְ/עֶשְׂרִים
  english_pob_choice: for the twenty-first
  chosen_spanish: para el vigésimo primero
  alternatives_spanish:
  - para uno y veinte
  - para el lote veintiuno
  lexicon: HALOT
  rationale: La secuencia numérica en este contexto indica el orden del lote asignado. En español, «vigésimo primero» comunica de modo natural ese valor ordinal sin introducir una paráfrasis excesiva. Se evita «lote» en el texto principal porque no aparece explícitamente en el hebreo de este versículo, aunque el contexto lo sugiere.
- source_word: לְ/הוֹתִ֔יר
  english_pob_choice: Hothir
  chosen_spanish: Hotir
  alternatives_spanish:
  - Hotir
  - Hotir; para
  lexicon: HALOT
  rationale: Se trata de un nombre propio. Se translitera al español como Hotir, manteniendo la forma breve y legible. El prefijo לְ se integra en la construcción española «para el vigésimo primero» y no se repite ante el nombre.
- source_word: בָּנָ֥י/ו
  english_pob_choice: his sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  - sus hijos varones
  lexicon: HALOT
  rationale: El hebreo בָּנָיו denota literalmente «sus hijos/varones». En una lista genealógica, «hijos varones» preserva la referencia masculina de forma clara en español, sin perder naturalidad. «Hijos» también es posible, pero puede sonar algo más general.
- source_word: וְ/אֶחָ֖י/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos
  - y sus parientes
  lexicon: HALOT
  rationale: Se conserva el parentesco literal «hermanos». Aunque el contexto de registros puede ampliar el sentido a miembros del clan, el hebreo usa el término familiar directo y no hay razón suficiente para sustituirlo por un equivalente más amplio.
- source_word: שְׁנֵ֥ים עָשָֽׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: 'El número funciona como cierre del grupo asignado. En español, la forma más natural es dejarlo en aposición: «sus hijos varones y sus hermanos, doce». No se añade un verbo copulativo porque el hebreo tampoco lo expresa aquí.'
translation_notes:
  revision_awareness: Se siguió el estado final del auditor inglés, que mantiene alta concordancia y no requiere revisiones adicionales. La única decisión sensible es la forma de expresar el ordinal numérico en español, manteniendo el valor de asignación por sorteo sin añadir vocabulario no expresado.
  spanish_consistency_notes:
  - Se usa «Hotir» como transliteración uniforme del nombre propio.
  - Se mantuvo «sus hermanos» para conservar el parentesco literal del hebreo.
  - La nota al pie preserva la tensión entre la lectura literal numérica y la equivalencia idiomática ordinal.
  - No se introdujo terminología eclesiástica ni interpretativa ajena al texto.
