revisions:
- from: ¡Mira![a] El fuego descendió del cielo y consumió a los dos primeros capitanes de cincuenta y a sus cincuentenas. Pero ahora[b], que mi vida sea preciosa a tus ojos.
  to: Mira, el fuego descendió del cielo y consumió a los dos primeros capitanes de cincuenta y a sus grupos de cincuenta[a]. Pero ahora, que mi vida[b] sea preciosa a tus ojos.
  rationale: Se corrige el anclaje de la nota [a] para que explique la expresión hebrea וְאֶת חֲמִשֵּׁיהֶם, se reemplaza «sus cincuentenas» por «sus grupos de cincuenta» para mejorar claridad y naturalidad, y se mueve la nota sobre «vida» al término correspondiente. También se suaviza la apertura con «Mira,» para un español más fluido sin perder la fuerza deíctica de הִנֵּה.
  reviewer_model: gpt-5.4
