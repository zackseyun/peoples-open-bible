translation:
  language: es
  text: Ciertamente[a], tú vuelves atrás el filo de su espada, y no lo has hecho mantenerse firme[b] en batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despuntas el filo de su espada». El hebreo dice literalmente «vuelves atrás el filo de su espada», expresando el efecto de inutilizarla.
    reason: lexical_alternative
  - marker: b
    text: O «no lo has sostenido en batalla» o «no lo has hecho mantenerse en pie en batalla».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Además
  - También
  - Seguro
  lexicon: HALOT
  rationale: אַף aquí funciona como partícula enfática, reforzando el lamento. «Ciertamente» comunica bien ese énfasis en español sin sonar artificial.
- source_word: תָּשִׁיב
  english_pob_choice: you turn back
  chosen_spanish: tú vuelves atrás
  alternatives_spanish:
  - tú haces volver
  - tú apartas
  - tú haces retroceder
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver o volver atrás. «Vuelves atrás» conserva la imagen verbal y evita reducirla de entrada a una interpretación como «despuntar».
- source_word: צוּר
  english_pob_choice: the edge
  chosen_spanish: el filo
  alternatives_spanish:
  - la punta
  - la agudeza
  - el borde
  lexicon: HALOT
  rationale: En esta construcción con «su espada», צוּר no es «roca» sino una referencia a la parte cortante. «Filo» es la opción natural en español para esa función.
- source_word: חַרְבּוֹ
  english_pob_choice: of his sword
  chosen_spanish: de su espada
  alternatives_spanish:
  - de la espada de él
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva explícita del hebreo en una forma natural en español.
- source_word: הֲקֵימֹתוֹ
  english_pob_choice: you have not made him stand
  chosen_spanish: no lo has hecho mantenerse
  alternatives_spanish:
  - no lo has sostenido
  - no lo has hecho estar firme
  - no lo has establecido
  lexicon: HALOT
  rationale: El hifil de קום puede significar hacer estar en pie, sostener o establecer. En contexto militar, «hacer mantenerse» conserva la imagen concreta de resistir en combate sin resolverla en una interpretación más abstracta.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en la batalla
  - en guerra
  lexicon: HALOT
  rationale: «En batalla» es natural y fiel al contexto bélico; evita sobreespecificar con un artículo que el español puede omitir.
theological_decisions:
- issue: Atribución directa a Dios de la derrota militar del rey
  english_pob_reading: Retain the direct second-person address to God without softening.
  chosen_spanish_reading: Mantener el «tú» dirigido a Dios, sin impersonalizar ni suavizar la agencia divina.
  alternative_spanish_readings:
  - Se volvió atrás el filo de su espada
  - Su espada fue embotada
  rationale: El salmo atribuye explícitamente a Dios la reversión de la fuerza militar del rey. La traducción debe conservar esa tensión teológica en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas [a] y [b] exactamente en el texto español. Se mantuvo la agencia divina directa y se conservó la imagen concreta del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el «tú» dirigido en el verso, conforme al registro de lamento del salmo.
  - «Batalla» conserva el campo semántico militar y evita una abstracción excesiva.
  - Se prefirió «filo» por claridad idiomática, pero se documenta la alternativa más cercana al hebreo en la nota [b].
