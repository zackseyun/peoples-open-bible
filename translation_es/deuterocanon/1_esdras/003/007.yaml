revisions:
- from: Y se sentará en segundo lugar junto a Darío[a], a causa de su sabiduría, y será llamado pariente de Darío[b].
  to: Y será sentado segundo después de Darío[a], a causa de su sabiduría, y será llamado pariente de Darío[b].
  rationale: Se corrige el núcleo semántico de δεύτερος Δαρείου para expresar rango relativo («segundo después de Darío») en vez de proximidad espacial («junto a Darío»). También se ajusta la nota [a] para que preserve la alternativa documentada en el POB inglés. Se mantiene «pariente» para συγγενής, que es natural y fiel en español.
