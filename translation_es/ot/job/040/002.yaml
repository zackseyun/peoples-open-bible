revisions:
- from: ¿Acaso el que contiende con el Todopoderoso lo corregirá? El que discute con Dios[a] que responda esto[b].
  to: ¿Acaso el que contiende con el Todopoderoso lo corregirá? El que discute con Dios[a] que responda a esto[b].
  rationale: 'La traducción solo necesita una reparación menor para mejorar la naturalidad en español y alinear mejor las notas con el expediente inglés: se cambia «que responda esto» por «que responda a esto» y se amplían las notas para preservar los matices alternativos documentados.'
