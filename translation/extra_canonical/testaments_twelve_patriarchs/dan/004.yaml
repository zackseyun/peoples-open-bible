  text: IV. Οὐκοῦν σύνετε¹ τὴν δύναμιν τοῦ θυμοῦ² ὅτι³ *ματαία ἐστίν⁴. 2. Ἐν γὰρ λόγῳ παροξύνεται⁵ πρῶτον εἶτα⁶ *ἐν ἔργοις⁷ †δυναμοῖ⁸ τὸν ὀργιζόμενον⁹, καὶ¹⁰ ἐν *ζημίαις πικραῖς διαταράσσει τὸ διαβούλιον αὐτοῦ¹¹, καὶ οὕτως διεγείρει ἐν θυμῷ μεγάλῳ τὴν ψυχὴν αὐτοῦ. 3. Ὅτε¹² οὖν λαλεῖ τις *καθ᾽ ὑμῶν¹³, ⌈ὑμεῖς⌉¹ μὴ¹⁴ *κινεῖσθε εἰς ὀργήν¹⁵, καὶ ἐὰν τις¹⁶ ἐπαινέσῃ¹⁷ ὑμᾶς ὡς¹⁸ ἁγίους¹⁹, μὴ ἐπαίρεσθε²⁰· μήτε²¹ μεταβάλλεσθε²² ⌈μήτε⌉¹ εἰς τέρψιν μήτε εἰς ἀηδίαν²³. 4. Πρῶτον γὰρ²⁴ τέρπει²⁵ τὴν ἀκοήν, καὶ οὕτως²⁶ ὀξύνει τὸν νοῦν²⁷ *τοῦ νοῆσαι²⁸ τὸ †ἐρεθισθέν²⁹, καὶ³⁰ θυμωθεὶς νομίζει³¹ δικαίως ὀργίζεσθαι³². 5. Ἐὰν δὲ³³ *ζημίᾳ ἢ ἀπωλείᾳ τινὶ περιπέσητε³⁴, τέκνα³⁵, ⌈μὴ ἐκθροεῖσθε³⁶⌉. ὅτι ⌈αὐτὸ⌉¹ τὸ πνεῦμα³⁷ *ποιεῖ ἐπιθυμῆσαι³⁸ τοῦ ἀπολλυμένου³⁹ ἵνα *θυμῷ πέσῃ διὰ τοῦ πάθους⁴⁰. 6. Καὶ⁴¹ ἐὰν ζημιωθῆτε ἑκουσίως *ἢ ἀκουσίως⁴² *μὴ λυπεῖσθε⁴³· ἀπὸ γὰρ λύπης⁴⁴ ἐγείρεται⁴⁵ καὶ⁴⁶ θυμός⁴⁷ ⌈μετὰ ψεύδους⁷⌉. 7. *Ἔστι δὲ διπρόσωπον κακὸν ὁ θυμὸς μετὰ ψεύδους⁴⁸, καὶ συναίρονται⁴⁹ ἀλλήλοις ἵνα ταράξωσι⁵⁰ *τὴν καρδίαν⁵¹· ταρασσομένης δὲ τῆς ψυχῆς συνεχῶς, ἀφίσταται ὁ⁵² Κύριος ἀπ᾽ αὐτῆς καὶ κυριεύει αὐτῆς ὁ Βελίαρ.
