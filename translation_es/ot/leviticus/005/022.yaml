    issue: '''el hombre'' para הָאָדָם'
    rationale: Aunque el hebreo es masculino genérico, el expediente auditado del POB inglés ya revisó a 'a person'. En español, 'una persona' preserva mejor el sentido genérico legal y evita una formulación menos natural.
  - severity: medium
    issue: Notas mal ancladas en el texto
    rationale: La nota [a] explica 'lo niega', alternativa de וְכִחֶשׁ, por lo que debe anclarse en 'miente...' y no en 'jura en falso'. La nota [b] sobre el sentido genérico debe anclarse en 'persona'.
  - severity: low
    issue: '''acerca de cualquiera de todas las cosas'' suena pesado'
    rationale: Se puede conservar el sentido resumitivo-distributivo con una formulación más natural en español sin perder fidelidad.
