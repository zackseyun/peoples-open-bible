  yaml_path: translation/deuterocanon/sirach/030/028.yaml
  text: Years of a glad heart are better than delicacies[b][a], and his food will agree with him.
  footnotes:
  - marker: a
    text: Hebrew literally, 'Years of a good heart instead of delicacies, and his food will go up upon him.' The sense of the second line is that simple food is healthful or digestible for the cheerful person.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel in Swete at this reference reads a different saying about not giving authority over yourself or your possessions to son, wife, brother, or friend. The Hebrew witness here therefore reflects a substantially different textual tradition.
