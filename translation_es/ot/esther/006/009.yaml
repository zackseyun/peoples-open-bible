translation:
  language: es
  text: 'Y sean entregados la vestidura y el caballo en manos de uno de los más nobles dignatarios[a] del rey, y vistan al hombre que el rey desea honrar, y lo lleven en el caballo por la plaza pública[b] de la ciudad, y proclamen delante de él: «Así se hará al hombre que el rey desea honrar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de los príncipes del rey» o «uno de sus más nobles oficiales»; פַּרְתְּמִים es un préstamo persa que designa altos dignatarios de la corte.
    reason: lexical_alternative
  - marker: b
    text: Hebreo רְחוֹב designa una plaza amplia o un espacio público abierto en la ciudad, no necesariamente una calle en el sentido moderno.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתוֹן
  english_pob_choice: let ... be given
  chosen_spanish: y sea dado
  alternatives_spanish:
  - y sea entregado
  - y se dé
  lexicon: HALOT
  rationale: La forma impersonal/pasiva del hebreo introduce una instrucción ceremonial. «Sea dado» conserva la directividad formal sin añadir matices ajenos; «entregado» sería posible, pero en español puede sonar más administrativo que narrativo.
- source_word: הַלְּבוּשׁ
  english_pob_choice: the robe
  chosen_spanish: el vestido
  alternatives_spanish:
  - la ropa
  - la vestidura
  - el manto
  lexicon: HALOT
  rationale: En este contexto de corte persa, el artículo con sustantivo singular apunta a una prenda concreta de honor. «Vestido» expresa la pieza de vestir sin forzar «manto» si el texto no lo especifica. «Vestidura» sería más solemne, pero menos natural.
- source_word: הַסּוּס
  english_pob_choice: the horse
  chosen_spanish: el caballo
  alternatives_spanish:
  - el corcel
  lexicon: HALOT
  rationale: Equivalencia directa del sustantivo. «Caballo» es la opción más transparente; «corcel» añade color literario no exigido por el hebreo.
- source_word: אִישׁ מִשָּׂרֵי הַמֶּלֶךְ הַפַּרְתְּמִים
  english_pob_choice: one of the king’s most noble officials
  chosen_spanish: uno de los más nobles oficiales del rey
  alternatives_spanish:
  - uno de los príncipes del rey
  - uno de los más nobles dignatarios del rey
  - uno de los oficiales principales del rey
  lexicon: HALOT
  rationale: El hebreo combina אִישׁ con la expresión de rango cortesano. «Oficiales» mantiene la función administrativa; «más nobles» refleja el superlativo implícito del grupo פַּרְתְּמִים. «Príncipes» es posible, pero en español sugiere filiación real o aristocrática hereditaria con más fuerza de la que exige el contexto.
- source_word: וְהִלְבִּישׁוּ
  english_pob_choice: let them clothe
  chosen_spanish: y vistan
  alternatives_spanish:
  - y lo vistan
  - y lo adornen con
  - y le pongan
  lexicon: HALOT
  rationale: El causativo de לבשׁ pide una acción realizada sobre el hombre. «Vistan» mantiene la orden ceremonial en español y evita redundancia con el objeto ya mencionado.
- source_word: הָאִישׁ אֲשֶׁר הַמֶּלֶךְ חָפֵץ בִּיקָרוֹ
  english_pob_choice: the man whom the king delights to honor
  chosen_spanish: el hombre que el rey desea honrar
  alternatives_spanish:
  - el hombre a quien el rey quiere honrar
  - el hombre en quien el rey se deleita para honrarlo
  - el hombre que el rey se complace en honrar
  lexicon: HALOT
  rationale: חָפֵץ expresa deseo/delicia; יָקָר aquí se entiende como honor. En español, «desea honrar» conserva la intención real y suena natural. «Se deleita en honrar» es posible, pero puede sonar más interpretativo.
- source_word: וְהִרְכִּיבֻהוּ
  english_pob_choice: let them lead him on the horse
  chosen_spanish: y lo conduzcan montado en el caballo
  alternatives_spanish:
  - y lo hagan montar en el caballo
  - y lo lleven sobre el caballo
  - y lo monten en el caballo
  lexicon: HALOT
  rationale: El hifil de רכב indica hacerlo ir montado. «Conduzcan montado» preserva la idea procesional y el resultado de ir sobre el caballo, alineándose con la revisión inglesa que prefirió «lead him on the horse».
- source_word: בִּרְחוֹב הָעִיר
  english_pob_choice: through the open square of the city
  chosen_spanish: por la plaza abierta de la ciudad
  alternatives_spanish:
  - por la plaza pública de la ciudad
  - por el espacio abierto de la ciudad
  - por la plaza mayor de la ciudad
  lexicon: HALOT
  rationale: רְחוֹב designa un lugar amplio y público, no simplemente una calle. «Plaza abierta» conserva ese matiz ceremonial y evita reducirlo a una vía urbana moderna.
- source_word: וְקָרְאוּ לְפָנָיו
  english_pob_choice: and proclaim before him
  chosen_spanish: y proclamen delante de él
  alternatives_spanish:
  - y anuncien delante de él
  - y clamen delante de él
  - y proclamen ante él
  lexicon: HALOT
  rationale: קרא con לְפָנָיו aquí es fórmula de heraldo. «Proclamen delante de él» transmite la proclamación pública y la escena procesional.
- source_word: כָּכָה יֵעָשֶׂה
  english_pob_choice: Thus shall it be done
  chosen_spanish: Así se hará
  alternatives_spanish:
  - Así se procederá
  - Esto se hará
  lexicon: HALOT
  rationale: La fórmula es breve y solemne. «Así se hará» conserva el tono declarativo y ceremonial del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino y del trasfondo real en este versículo
  english_pob_reading: No hay referencia directa al nombre divino; el texto es una orden de corte persa.
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica adicional; el versículo se mantiene como discurso cortesano de honor.
  alternative_spanish_readings:
  - Añadir una referencia implícita a la providencia divina
  - Cristianizar el tono del anuncio
  rationale: El hebreo no menciona a Dios en este versículo. La traducción debe respetar la escena narrativa sin añadir inferencias devocionales que el texto no expresa explícitamente.
  doctrine_reference: Principio de suficiencia textual y no adición al sentido del versículo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió un giro más directo para וְנָתוֹן, intensificó ‘most noble’ y ajustó el movimiento procesional a ‘lead him on the horse’. La versión española sigue esa dirección, pero conserva la formulación ceremonial propia del hebreo.
  spanish_consistency_notes:
  - Se mantiene «rey» y no se añade ningún título dinástico no presente en el hebreo.
  - «Más nobles oficiales» conserva el rango cortesano sin imponer una traducción rígida como «príncipes».
  - «Plaza abierta» resguarda el valor cultural de רְחוֹב y evita el sentido moderno de «calle».
  - La orden verbal se presenta en un registro solemne y público, acorde con la fórmula repetida del verso.
