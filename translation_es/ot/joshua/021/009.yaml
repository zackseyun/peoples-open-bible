  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Se preserva adecuadamente «hijos de Judá / hijos de Simeón» conforme a la decisión documentada de no neutralizar la filiación tribal. La revisión propuesta mejora estilo sin alterar las decisiones léxicas clave.
