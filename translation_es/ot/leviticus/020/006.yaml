translation:
  language: es
  text: Y la persona que se vuelva a los médiums y a los espiritistas[a], para prostituirse tras ellos[b], yo pondré mi rostro contra esa persona y la eliminaré[c] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que tienen espíritus familiares» para «médiums»; el término hebreo se refiere a practicantes que consultan a los muertos o a los espíritus.
    reason: lexical_alternative
  - marker: b
    text: O «para ir tras ellos como prostituyéndose», una metáfora de infidelidad al pacto mediante práctica espiritual ilícita.
    reason: lexical_alternative
  - marker: c
    text: Lit. «la cortaré». «Cortar» es una fórmula jurídica estándar; el texto no especifica aquí el modo exacto del juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  english_pob_choice: the person
  chosen_spanish: la persona
  alternatives_spanish:
  - el alma
  - la vida
  lexicon: HALOT
  rationale: En el contexto legal de Levítico, נֶפֶשׁ designa al individuo responsable, no principalmente al alma inmortal. «La persona» es natural en español y conserva el sentido judicial.
- source_word: תִּפְנֶה
  english_pob_choice: turns to
  chosen_spanish: se vuelva a
  alternatives_spanish:
  - se vuelva hacia
  - consulte a
  lexicon: HALOT
  rationale: El verbo פנה conserva la imagen de dirigirse hacia alguien. «Se vuelva a» mantiene esa dirección y suena idiomático en español sin perder la metáfora.
- source_word: הָאֹבֹת
  english_pob_choice: the mediums
  chosen_spanish: los médiums
  alternatives_spanish:
  - los que tienen espíritus familiares
  - los nigromantes
  - los evocadores de muertos
  lexicon: HALOT
  rationale: «Médiums» comunica bien al lector moderno la idea de practicantes que median en consulta espiritual o con los muertos. Se conserva la nota para no borrar la gama semántica del hebreo.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: the spiritists
  chosen_spanish: los espiritistas
  alternatives_spanish:
  - los adivinos
  - los hechiceros
  - los videntes
  lexicon: HALOT
  rationale: El término se distingue del anterior y apunta a un conocedor/consultor de prácticas ocultas. «Espiritistas» mantiene la relación con consulta espiritual y diferencia el par hebreo.
- source_word: לִזְנוֹת אַחֲרֵיהֶם
  english_pob_choice: to prostitute himself after them
  chosen_spanish: para prostituirse tras ellos
  alternatives_spanish:
  - para entregarse a la prostitución tras ellos
  - para ser infiel siguiéndolos
  - para prostituirse siguiéndolos
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual de זנה porque el hebreo la usa para subrayar infidelidad covenantal y gravedad teológica. «Tras ellos» reproduce el matiz direccional de אַחֲרֵי.
- source_word: וְנָתַתִּי אֶת פָּנַי
  english_pob_choice: I will set my face against
  chosen_spanish: yo pondré mi rostro contra
  alternatives_spanish:
  - yo volveré mi rostro contra
  - yo me opondré a
  lexicon: HALOT
  rationale: «Poner mi rostro contra» preserva la imagen hebrea de oposición judicial divina. Se evita sustituirla por una abstracción que borre la fuerza idiomática del original.
- source_word: וְהִכְרַתִּי אֹתוֹ
  english_pob_choice: and cut him off
  chosen_spanish: y la cortaré
  alternatives_spanish:
  - y lo cortaré
  - y lo excluiré
  - y lo arrancaré
  lexicon: HALOT
  rationale: Se mantiene la fórmula legal «cortar» para כרת, sin especificar el modo exacto del juicio. Se eligió el femenino concordando con «la persona»; el objeto implícito retoma esa referencia.
- source_word: מִקֶּרֶב עַמּוֹ
  english_pob_choice: from among his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de en medio de su pueblo
  - de entre sus gentes
  lexicon: HALOT
  rationale: «De entre su pueblo» es una fórmula natural y legalmente clara en español, conservando el matiz comunitario de exclusión/jucio.
theological_decisions:
- issue: Conservación de la metáfora de prostitución para la infidelidad espiritual
  english_pob_reading: to prostitute himself after them
  chosen_spanish_reading: para prostituirse tras ellos
  alternative_spanish_readings:
  - para ser infiel siguiéndolos
  - para entregarse a ellos
  rationale: El hebreo usa זנה, una metáfora sexual aplicada a la infidelidad religiosa. Traducirla de forma literal conserva el peso covenantal y evita suavizar el pecado en una fórmula genérica.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance de la sanción 'cut off'
  english_pob_reading: and cut him off
  chosen_spanish_reading: y la cortaré
  alternative_spanish_readings:
  - y lo excluiré
  - y la destruiré
  rationale: La expresión כרת en este marco legal es deliberadamente abierta. Mantener «cortar» preserva la severidad judicial sin resolver si el acto implica muerte, exclusión o juicio divino de otro tipo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se conservan las imágenes legales y metafóricas claves: נֶפֶשׁ como «persona», פנה como «se vuelva a», זנה como «prostituirse», y כרת como «cortar». No se observan revisiones previas aplicadas en el paquete fuente; el estado más reciente indicó que no eran necesarios cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferente del Tetragrámaton en el proyecto, pero este versículo no lo contiene explícitamente.
  - Se mantiene el par diferenciado «médiums / espiritistas» para reproducir la distinción hebrea entre אוֹב y יִדְּעֹנִי.
  - Se conserva la concordancia femenina en «la cortaré» por referirse a «la persona».
  - Se evita reemplazar la fórmula legal de juicio por una interpretación más específica que el hebreo no explicita.
