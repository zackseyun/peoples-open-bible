    issue: «la vida de su animal» suena poco natural en español proverbial
    rationale: Aunque es una equivalencia literal de נֶפֶשׁ, en español no expresa con la misma claridad el sentido contextual de atender al estado y bienestar del animal.
  - severity: low
    issue: La nota usa «la vida/el ser» con barra poco estilística
    rationale: Conviene formular la alternativa con puntuación más natural y añadir «alma» solo como posibilidad léxica, aclarando que aquí se refiere al bienestar del animal.
  revised_spanish_text: El justo conoce[a] las necesidades de su animal, pero la compasión de los malvados es cruel.
