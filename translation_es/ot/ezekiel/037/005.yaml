translation:
  language: es
  text: 'Así dice el Señor Dios, Yahvé, a estos huesos: Miren[a]: yo hago entrar en ustedes aliento, y vivirán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo רוּחַ también puede significar ‘espíritu’ o ‘viento’. Aquí ‘aliento’ encaja con la imagen inmediata de huesos que reciben vida, pero la ambigüedad más amplia sigue siendo importante en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Entonces
  lexicon: HALOT
  rationale: La fórmula profética introductoria se vierte de forma natural con 'Así', que conserva el tono solemne y performativo sin forzar un calco innecesario.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En la fórmula profética, el verbo funciona con valor actual y declarativo; 'dice' reproduce mejor el presente performativo que 'dijo'.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la norma del proyecto, y 'Señor' traduce אֲדֹנָי. En español, 'el Señor Yahvé' mantiene ambos elementos del título compuesto sin ocultar el nombre del pacto.
- source_word: לָעֲצָמוֹת הָאֵלֶּה
  english_pob_choice: to these bones
  chosen_spanish: a estos huesos
  alternatives_spanish:
  - para estos huesos
  - sobre estos huesos
  lexicon: HALOT
  rationale: El hebreo dirige la palabra a los huesos; en español, 'a estos huesos' expresa de manera natural el destinatario del discurso.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: '''He aquí'' preserva la fuerza de atención y la solemnidad de la interjección profética; se mantiene como fórmula literaria comprensible en español bíblico contemporáneo.'
- source_word: מֵבִיא
  english_pob_choice: am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio con הִנֵּה y אֲנִי comunica inminencia/acción en curso. En español, 'traigo' comunica esa presencia activa de modo más natural que una perífrasis demasiado pesada.
- source_word: בָכֶם
  english_pob_choice: into you
  chosen_spanish: dentro de ustedes
  alternatives_spanish:
  - en ustedes
  - a ustedes
  lexicon: HALOT
  rationale: Con un verbo de movimiento y en el contexto de impartir vida, 'dentro de ustedes' expresa con claridad la inserción del aliento en los huesos; evita ambigüedad de 'en' sin perder el sentido.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - viento
  - soplo
  lexicon: HALOT
  rationale: '''Aliento'' captura la imagen inmediata de vida impartida a huesos sin vida y conserva la ambigüedad de רוּחַ entre respiración, viento y espíritu. Se evita fijar prematuramente el sentido en una sola acepción.'
- source_word: וִחְיִיתֶם
  english_pob_choice: and you shall live
  chosen_spanish: y vivirán
  alternatives_spanish:
  - y vivirán ustedes
  - y ustedes vivirán
  - y volverán a vivir
  lexicon: HALOT
  rationale: La forma verbal apunta a resultado futuro de restauración; 'vivirán' es conciso y solemne en español, y el contexto ya determina a quién se refiere.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: Se sigue la directriz del proyecto de no enmascarar el Tetragrámaton. En una combinación como אֲדֹנָי יְהוִה, 'el Señor Yahvé' preserva tanto el título reverencial como el nombre propio del pacto sin duplicación incómoda.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Campo semántico de רוּחַ
  english_pob_reading: breath
  chosen_spanish_reading: aliento
  alternative_spanish_readings:
  - espíritu
  - viento
  rationale: 'El contexto inmediato es la animación de huesos muertos, por lo que ''aliento'' es la opción más fiel a la imagen concreta. A la vez, se conserva la tensión teológica: en el capítulo, רוּחַ puede resonar también con ''espíritu'' y ''viento''.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; se siguió la lectura ya acordada sin introducir ajustes nuevos. La decisión principal de adaptación al español fue mantener la tensión semántica de רוּחַ y preservar el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se evitó traducir 'רוּחַ' mecánicamente como 'espíritu' para no borrar la imagen de vida impartida a los huesos; 'aliento' conserva la concreción requerida.
  - La fórmula profética se naturalizó en español con 'Así dice' y 'He aquí', evitando arcaísmos innecesarios pero conservando solemnidad.
