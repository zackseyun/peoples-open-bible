translation:
  language: es
  text: Entonces estos hombres llegaron de común acuerdo[a] y encontraron a Daniel pidiendo y suplicando delante de su Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegaron juntos» o «llegaron tumultuosamente». El verbo arameo probablemente comunica que estos hombres se reunieron en concierto, con un propósito coordinado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «orando y haciendo súplica delante de su Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Entonces, en seguida
  lexicon: HALOT
  rationale: Adverbio temporal arameo que introduce la secuencia narrativa; «Entonces» es natural en español y conserva la progresión del relato.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - aquellos hombres
  - esos hombres
  lexicon: HALOT
  rationale: El demostrativo más el plural común se reflejan con «estos hombres», que en español remite al grupo inmediato de los conspiradores ya mencionados.
- source_word: הַרְגִּשׁוּ
  english_pob_choice: came by agreement
  chosen_spanish: llegaron de común acuerdo
  alternatives_spanish:
  - vinieron juntos
  - se reunieron de común acuerdo
  - llegaron concertadamente
  lexicon: HALOT
  rationale: El verbo arameo sugiere acción concertada o coordinada; «de común acuerdo» preserva la idea de concertación sin imponer una lectura excesivamente libre. «Llegaron» mantiene el movimiento narrativo del contexto.
- source_word: וְהַשְׁכַּחוּ
  english_pob_choice: and found
  chosen_spanish: y encontraron
  alternatives_spanish:
  - y descubrieron
  lexicon: HALOT
  rationale: Verbo narrativo directo; «encontraron» es el equivalente más natural y preciso en español.
- source_word: לְדָנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - Daniel
  lexicon: HALOT
  rationale: Nombre propio estándar; en español se requiere la preposición personal «a» ante objeto directo animado.
- source_word: בָּעֵא
  english_pob_choice: petitioning
  chosen_spanish: orando
  alternatives_spanish:
  - suplicando
  - pidiendo
  lexicon: HALOT
  rationale: Este participio denota hacer una petición en un marco de oración. «Orando» captura el sentido devocional y verbalmente natural; se complementa con «suplicando» para conservar la intensidad de la acción.
- source_word: וּמִתְחַנַּן
  english_pob_choice: and pleading before his God
  chosen_spanish: y suplicando
  alternatives_spanish:
  - y haciendo súplica
  - y rogando
  - y implorando
  lexicon: HALOT
  rationale: El participio intensivo/reflexivo expresa ruego ferviente. «Suplicando» conserva el matiz de imploración reverente sin añadir un objeto no explícito, en consonancia con la revisión inglesa que eliminó «for favor».
- source_word: קֳדָם
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: Preposición espacial/relacional; «delante de» funciona bien en español para la escena de oración y evita la rigidez de un calco.
- source_word: אֱלָהֵהּ
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: Sufijo posesivo de tercera persona singular; «su Dios» expresa de forma clara y natural la relación personal de Daniel con Dios.
theological_decisions:
- issue: 'Lenguaje de oración: petitioning / pleading without importar terminología técnica posterior'
  english_pob_reading: petitioning and pleading before his God
  chosen_spanish_reading: orando y suplicando delante de su Dios
  alternative_spanish_readings:
  - orando y haciendo súplica delante de su Dios
  - pidiendo y suplicando delante de su Dios
  rationale: El arameo describe la actividad de Daniel con dos participios de oración/imploración. En español, «orando» y «suplicando» preservan el sentido devocional y la intensidad del ruego, sin añadir un objeto como «favor» que el texto revisado en inglés ya retiró por no estar explícito.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tensión léxica entre 'orar' y 'suplicar' para reflejar ambos participios arameos
  english_pob_reading: petitioning and pleading
  chosen_spanish_reading: orando y suplicando
  alternative_spanish_readings:
  - pidiendo y suplicando
  - orando y haciendo súplica
  rationale: El par español evita reducir el pasaje a una sola noción. «Orando» cubre la acción religiosa general; «suplicando» retiene el matiz de insistencia fervorosa del segundo participio.
  doctrine_reference: HALOT; Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y toma en cuenta la revisión del POB en inglés que eliminó «for favor» porque no hay un objeto explícito en el original. Por eso la versión española evita añadir equivalentes como «favor» o «misericordia» y conserva el paralelismo de dos acciones de oración/imploración.
  spanish_consistency_notes:
  - Se conserva «Dios» en minúscula por tratarse de un nombre común con posesivo, no del tetragrama.
  - «Delante de su Dios» refleja mejor la escena de oración que una fórmula más técnica como «ante» en registro bíblico, aunque ambas son posibles.
  - «De común acuerdo» mantiene la idea de acción concertada sin perder naturalidad en español.
  - Se usa «suplicando» para no aplastar el segundo participio arameo en un mero sinónimo de «orando».
