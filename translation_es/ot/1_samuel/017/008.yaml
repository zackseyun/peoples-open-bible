translation:
  language: es
  text: 'Se puso de pie y clamó a las líneas de batalla de Israel, y les dijo: «¿Por qué salen a alinearse[a] para la batalla? ¿No soy yo el filisteo, y no son ustedes esclavos de Saúl? Escojan para ustedes un hombre, y que baje hacia mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a disponerse para la batalla» o «a formarse para la batalla». La expresión hebrea se refiere literalmente a ordenarse o alinearse para el combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: He stood
  chosen_spanish: Se puso de pie
  alternatives_spanish:
  - Se paró
  - Estuvo de pie
  lexicon: HALOT
  rationale: El hebreo narra la postura de desafío. En español, «se puso de pie» comunica bien la acción sin sonar rígido; conserva la idea de erguirse para hablar públicamente.
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: HALOT
  rationale: Aquí el verbo introduce una alocución pública dirigida al frente enemigo. «Llamó» mantiene el valor de convocatoria/voz dirigida; el contexto y la frase siguiente ya muestran que se trata de un grito desafiante.
- source_word: מַעַרְכֹ֣ת יִשְׂרָאֵל
  english_pob_choice: the battle lines of Israel
  chosen_spanish: las líneas de batalla de Israel
  alternatives_spanish:
  - las filas de batalla de Israel
  - los ejércitos de Israel
  lexicon: HALOT
  rationale: מַעַרְכוֹת se refiere a formaciones ordenadas para combate. «Líneas de batalla» conserva la imagen militar concreta mejor que «ejércitos».
- source_word: לָמָּה תֵצְא֖וּ
  english_pob_choice: Why do you come out
  chosen_spanish: ¿Por qué salen
  alternatives_spanish:
  - ¿Por qué están saliendo
  - ¿Por qué salen ustedes
  lexicon: HALOT
  rationale: La pregunta retórica apunta al movimiento de avanzar desde el campamento o la línea. «Salen» es natural en español y mantiene el valor direccional del hebreo.
- source_word: לַעֲרֹךְ מִלְחָמָה
  english_pob_choice: to array yourselves for battle
  chosen_spanish: a ordenarse para la batalla
  alternatives_spanish:
  - a alinearse para la batalla
  - a disponerse para la guerra
  - a formarse para la batalla
  lexicon: HALOT
  rationale: ערך con מלחמה expresa ordenar o disponer tropas. «Ordenarse para la batalla» conserva esa organización militar sin perder claridad en español.
- source_word: הֲלוֹא אָנֹכִי הַפְּלִשְׁתִּי
  english_pob_choice: Am I not the Philistine
  chosen_spanish: ¿No soy yo el filisteo
  alternatives_spanish:
  - ¿Acaso no soy yo el filisteo
  - ¿No soy yo el filisteo por excelencia
  lexicon: HALOT
  rationale: El artículo definido destaca la identidad representativa de Goliat como campeón filisteo. «El filisteo» mantiene esa fuerza en español y conserva el tono desafiante.
- source_word: עֲבָדִ֣ים לְשָׁאוּל
  english_pob_choice: slaves of Saul
  chosen_spanish: esclavos de Saúl
  alternatives_spanish:
  - siervos de Saúl
  - criados de Saúl
  lexicon: HALOT
  rationale: El contexto es un insulto humillante. «Esclavos» preserva mejor la fuerza degradante que «siervos», que en español puede sonar más honorable o eclesial.
- source_word: בְּרוּ לָכֶם אִישׁ
  english_pob_choice: Choose a man for yourselves
  chosen_spanish: Escojan para ustedes un hombre
  alternatives_spanish:
  - Elijan para ustedes un hombre
  - Busquen para ustedes un hombre
  lexicon: HALOT
  rationale: בְּרוּ exige escoger o elegir. «Escojan» es claro y directo; «un hombre» retiene el singular masculino del hebreo.
- source_word: וְיֵרֵד אֵלָי
  english_pob_choice: and let him come down to me
  chosen_spanish: y que baje hacia mí
  alternatives_spanish:
  - y que descienda hacia mí
  - y que venga hacia mí desde arriba
  lexicon: HALOT
  rationale: El hebreo usa ירד con valor direccional. «Baje hacia mí» conserva el movimiento descendente y suena natural en el discurso directo.
theological_decisions:
- issue: עֲבָדִים como insulto social y político
  english_pob_reading: slaves of Saul
  chosen_spanish_reading: esclavos de Saúl
  alternative_spanish_readings:
  - siervos de Saúl
  rationale: La POB inglesa restauró «slaves» por la fuerza despectiva del término en la burla de Goliat. En español, «esclavos» comunica esa humillación con la misma carga social.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento de δοῦλος por analogía de estatus ligado
- issue: La partícula retórica הֲלוֹא
  english_pob_reading: Am I not ... and are you not ...?
  chosen_spanish_reading: ¿No soy yo ...? ... ¿y no son ustedes ...?
  alternative_spanish_readings:
  - ¿Acaso no soy yo ...? ... ¿y no son ustedes ...?
  rationale: La forma interrogativa retórica debe conservar la provocación y la expectativa de asentimiento. En español, la doble pregunta mantiene el paralelo del hebreo.
  doctrine_reference: Principios POB de equivalencia óptima y preservación de tono retórico
- issue: אִישׁ en contexto de duelo representativo
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - un guerrero
  - un combatiente
  rationale: El hebreo usa un sustantivo masculino singular, y el contexto es la designación de un representante para combate singular. No se neutraliza el género.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que restituyó «slaves of Saul» frente a «servants of Saul», y se mantuvo la elección despectiva en español como «esclavos». También se reflejó el ajuste a una formulación más cercana a ערך con «ordenarse para la batalla», evitando una paraphrase excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «filisteo» con artículo definido para reproducir la fuerza representativa del hebreo.
  - «Esclavos» se eligió por la carga insultante del contexto bélico.
  - Se preservó el singular masculino «un hombre» para no neutralizar אִישׁ.
