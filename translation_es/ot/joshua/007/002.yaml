    rationale: Aunque fiel al plural hebreo, «Subid» es marcadamente peninsular y desentona con la pauta de español neutral latinoamericano/broadly church-readable del proyecto. «Suban» preserva el mandato plural con mejor adecuación estilística.
  - severity: low
    issue: «Desde Jericó» es menos natural que «de Jericó» en este contexto
    rationale: Ambas opciones son fieles a מִן, pero «de Jericó» suena más idiomático en narrativa española sin cambiar el sentido.
