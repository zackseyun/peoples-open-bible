translation:
  language: es
  text: 'Entonces los jefes[a] de los filisteos se reunieron para ofrecer un gran sacrificio a Dagón, su dios, y para celebrar, y dijeron[b]: «Nuestro dios ha entregado a Sansón nuestro enemigo en nuestras manos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los señores de los filisteos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en nuestra mano», un modismo que significa en nuestro poder o control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  english_pob_choice: rulers
  chosen_spanish: jefes
  alternatives_spanish:
  - gobernantes
  - señores
  lexicon: HALOT
  rationale: סֶרֶן designa a los principales oficiales o autoridades filisteas. En español, «jefes» comunica bien su función dirigente sin sonar arcaico; «gobernantes» sería más explícito, pero menos natural aquí.
- source_word: נֶאֱסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El nifal de אסף expresa venir juntos como grupo. «Se reunieron» conserva el valor colectivo con un registro claro y digno.
- source_word: לִזְבֹּחַ זֶבַח גָּדוֹל
  english_pob_choice: to offer a great sacrifice
  chosen_spanish: para ofrecer un gran sacrificio
  alternatives_spanish:
  - para sacrificar un gran sacrificio
  - para hacer un gran sacrificio
  lexicon: HALOT
  rationale: La construcción infinitiva con sustantivo cognado intensifica el acto sacrificial. En español, «ofrecer un gran sacrificio» transmite esa idea sin una repetición forzada.
- source_word: לְדָגוֹן אֱלֹהֵיהֶם
  english_pob_choice: to Dagon their god
  chosen_spanish: a Dagón, su dios
  alternatives_spanish:
  - a Dagón, el dios de ellos
  - a Dagón, su deidad
  lexicon: HALOT
  rationale: El hebreo presenta a Dagón como el destinatario del sacrificio y lo identifica con un sintagma en aposición. «Su dios» mantiene la relación posesiva y el referente singular del contexto.
- source_word: וּלְשִׂמְחָה
  english_pob_choice: and to celebrate
  chosen_spanish: y para celebrar
  alternatives_spanish:
  - y para regocijarse
  - y para festejar
  lexicon: HALOT
  rationale: שִׂמְחָה puede referirse a alegría o festividad. Aquí el contexto es una celebración pública de victoria, por lo que «celebrar» comunica mejor la finalidad del gesto.
- source_word: נָתַן ... בְּיָדֵנוּ
  english_pob_choice: has given ... into our hand
  chosen_spanish: ha entregado ... en nuestra mano
  alternatives_spanish:
  - ha dado ... en nuestra mano
  - ha puesto ... en nuestras manos
  lexicon: HALOT
  rationale: El giro נתן ביד expresa entregar a alguien al control de otro. «Ha entregado ... en nuestra mano» conserva la imagen hebrea y el sentido de dominio o control.
- source_word: אֵת שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Sansón
  - Samson
  lexicon: Transliteration convention
  rationale: Se usa la forma tradicional española del nombre propio, claramente reconocible para el lector bíblico en español.
- source_word: אוֹיְבֵינוּ
  english_pob_choice: our enemy
  chosen_spanish: nuestro enemigo
  alternatives_spanish:
  - nuestro adversario
  - el que nos es hostil
  lexicon: HALOT
  rationale: Aunque la forma es plural morfológicamente, aquí funciona con Sansón como referente singular. «Nuestro enemigo» respeta el sentido contextual y suena natural en español.
theological_decisions:
- issue: Renderizar אֱלֹהֵיהֶם / אֱלֹהֵינוּ en un contexto pagano
  english_pob_reading: god / Our god
  chosen_spanish_reading: su dios / nuestro dios
  alternative_spanish_readings:
  - sus dioses / nuestros dioses
  - Dios / nuestro Dios
  rationale: En este versículo el referente inmediato es Dagón, una deidad concreta de los filisteos. Mantener el singular evita introducir una pluralidad que el contexto no requiere, y conserva la ironía del discurso pagano.
  doctrine_reference: Monoteísmo bíblico y uso contextual de términos de deidad en narración histórica
translation_notes:
  revision_awareness: Se siguió la lectura revisada del audit trail inglés al omitir una pausa innecesaria tras «Sansón»; la redacción española conserva la misma estructura y sentido, con adaptación natural del orden y de los modismos hebreos.
  spanish_consistency_notes:
  - Se mantiene «Dagón» como transliteración del nombre divino filisteo y «Sansón» como forma española tradicional del antropónimo.
  - Se conservan en singular los referentes a la deidad filistea por la sintaxis y el contexto inmediato.
  - «En nuestra mano» reproduce el hebraísmo con una nota aclaratoria para lectura natural en español.
