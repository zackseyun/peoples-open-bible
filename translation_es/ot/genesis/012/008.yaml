revisions:
- from: Desde allí se trasladó a la región montañosa[a], al oriente de Betel, y levantó su tienda, con Betel al occidente y Hai al oriente[b]. Allí edificó un altar a Yahvé y llamó invocando el nombre de Yahvé.
  to: Desde allí se trasladó a la región montañosa al oriente de Betel y levantó su tienda, con Betel al occidente y Hai al oriente. Allí edificó un altar a Yahvé[a] e invocó[b] el nombre de Yahvé.
  rationale: 'Se elimina una nota inadecuada sobre «región montañosa» y se traslada la nota de alternativa al lugar donde el hebreo realmente presenta tensión interpretativa: וַיִּקְרָא בְּשֵׁם יְהוָה. También se reemplaza «llamó invocando» por «e invocó el nombre de Yahvé», que es más idiomático en español y fiel al sentido principal preservando la alternativa «proclamó» en nota.'
  reviewer_model: gpt-5.4
