translation:
  language: es
  text: Él está lleno de humedad delante del sol[a], y sus brotes se extienden sobre su jardín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Delante del sol» puede significar «frente al sol» o «bajo la luz del sol», no necesariamente «antes del amanecer».
    reason: lexical_alternative
  - marker: b
    text: O «su brote sale sobre su jardín». El sustantivo hebreo singular para crecimiento tierno puede entenderse en sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָטֹב
  english_pob_choice: full of moisture
  chosen_spanish: lleno de humedad
  alternatives_spanish:
  - húmedo
  - empapado
  - fresco
  lexicon: HALOT
  rationale: El adjetivo expresa la condición de estar húmedo o bien provisto de humedad. «Lleno de humedad» conserva la imagen concreta sin convertirla en una interpretación más libre como «fresco» o «frondoso».
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: Él
  alternatives_spanish:
  - ello
  - eso
  lexicon: HALOT
  rationale: Se mantiene el pronombre personal masculino, porque el hebreo conserva lenguaje personal en una descripción personificada. Aunque el referente es vegetal, la personificación forma parte de la imagen poética.
- source_word: לִפְנֵי שָׁמֶשׁ
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - antes del sol
  - bajo la luz del sol
  - en presencia del sol
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «antes/delante del sol». En español, «delante del sol» mantiene la espacialidad y la ambigüedad del original mejor que una solución temporal como «antes del amanecer».
- source_word: וְעַל
  english_pob_choice: and ... over
  chosen_spanish: y ... sobre
  alternatives_spanish:
  - y ... encima de
  - y ... upon
  lexicon: HALOT
  rationale: Se conserva la relación espacial de על con una preposición natural en español, sin perder el movimiento expansivo del segundo hemistiquio.
- source_word: גַּנָּתוֹ
  english_pob_choice: his garden
  chosen_spanish: su jardín
  alternatives_spanish:
  - su huerto
  - su jardín-plot
  lexicon: HALOT
  rationale: «Jardín» es la forma más natural en español y reproduce el posesivo de tercera persona singular.
- source_word: יֹנַקְתּוֹ
  english_pob_choice: his shoots
  chosen_spanish: sus brotes
  alternatives_spanish:
  - sus retoños
  - sus vástagos
  - sus renuevos
  lexicon: HALOT
  rationale: El sustantivo alude a crecimiento tierno que brota. «Brotes» es claro, moderno y suficientemente cercano al campo semántico de «shoots/sprouts».
- source_word: תֵצֵא
  english_pob_choice: spread out
  chosen_spanish: se extienden
  alternatives_spanish:
  - sale
  - brota
  - se esparce
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «salir/ir afuera», el contexto vegetativo apunta a crecimiento que se despliega sobre el jardín. «Se extienden» expresa ese movimiento sin violentar la imagen.
translation_notes:
  revision_awareness: El draft corrige el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español y que toda nota esté anclada a una forma del versículo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético con dos miembros breves.
  - Se evita traducir mecánicamente «before the sun» como una referencia temporal cerrada.
  - «Brotes» y «se extienden» conservan la imagen vegetal colectiva sugerida por el hebreo singular con sentido colectivo.
