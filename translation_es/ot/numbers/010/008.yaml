review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayor parte del contenido: «los hijos de Aarón, los sacerdotes», «trompetas» y «ordenanza permanente» reflejan bien el hebreo. Sin embargo, no preserva fielmente la revisión auditada del inglés POB en וְהָיוּ לָכֶם, porque el texto fuente usa verbo plural y el inglés final corrigió explícitamente «this shall be» a «they shall be». En español, «y esto será» reintroduce el singular resumidor que la auditoría descartó. También «por sus generaciones» es comprensible, pero «a través de sus generaciones» o «por todas sus generaciones» expresa mejor לְדֹרֹתֵיכֶם en español natural.'
  spanish_quality_summary: 'El español es legible y digno, pero tiene dos defectos formales: se reutiliza el marcador [a] para dos lugares distintos en el texto, lo cual incumple la disciplina de notas; y «esto será» suena algo menos ajustado que una formulación plural más cercana al hebreo. «Ordenanza permanente» es buena opción; «por sus generaciones» puede mejorarse en naturalidad bíblica moderna.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Aarón», «sacerdotes», «trompetas» y «ordenanza permanente» son adecuados. La principal desviación es de alineación auditada y sintáctica, no de glosario.
  issues:
  - severity: high
    issue: «y esto será para ustedes» no refleja la corrección auditada del plural en וְהָיוּ לָכֶם
    rationale: El inglés POB final cambió de «this shall be» a «they shall be» para respetar el plural verbal del hebreo. El español draft vuelve al singular conceptual sin necesidad.
  - severity: medium
    issue: El marcador de nota [a] se usa dos veces en el texto para una sola nota
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas distintas dentro del mismo registro.
  - severity: low
    issue: «por sus generaciones» es menos natural y menos pleno que otras opciones para לְדֹרֹתֵיכֶם
    rationale: La frase hebrea expresa vigencia continua a lo largo de las generaciones; «a través de sus generaciones» suena más claro en español contemporáneo y conserva el sentido.
  revised_spanish_text: Y los hijos de Aarón, los sacerdotes, tocarán las trompetas; y serán para ustedes una ordenanza permanente[a] a través de sus generaciones.
  revised_footnotes:
  - marker: a
    text: O «perpetua» o «para siempre».
    reason: lexical_alternative
  revision_rationale: Se cambió «y esto será» por «y serán» para reflejar con mayor fidelidad el plural del hebreo y la revisión final del inglés POB. Se eliminó la reutilización incorrecta del marcador de nota y se dejó la nota solo sobre «permanente», donde realmente corresponde la alternativa léxica de עוֹלָם. Se ajustó «por sus generaciones» a «a través de sus generaciones» para expresar mejor la continuidad de לְדֹרֹתֵיכֶם en español natural.
