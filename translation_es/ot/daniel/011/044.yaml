revisions:
- from: Pero noticias[a] del oriente y del norte lo atemorizarán, y saldrá con gran furor para destruir y para dedicar a la destrucción[b] a muchos.
  to: Pero noticias[a] del oriente y del norte lo alarmarán, y saldrá con gran furor para destruir y para consagrar[b] a muchos a la destrucción.
  rationale: 'La revisión hace dos reparaciones pequeñas: ajusta יְבַהֲלֻהוּ a «lo alarmarán», más cercano al valor del hebreo y a la decisión auditada en inglés, y cambia «dedicar a la destrucción» por «consagrar a muchos a la destrucción», que preserva mejor la distinción de חרם frente a שׁמד en un español más natural y claro. También se depura la nota para evitar el anglicismo «ban».'
  reviewer_model: gpt-5.4
