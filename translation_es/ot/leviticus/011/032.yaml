translation:
  language: es
  text: 'Y todo aquello sobre lo que caiga alguno de ellos cuando estén muertos quedará impuro: cualquier objeto de madera, o prenda, o piel, o arpillera, cualquier objeto con el que se haga trabajo; será puesto en el agua[a], y quedará impuro hasta la tarde; entonces quedará limpio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será introducido en el agua». El hebreo literalmente dice: «será traído al agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And everything
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y cualquier cosa
  - Y todo cuanto
  lexicon: HALOT
  rationale: כֹּל con la conjunción expresa totalidad. «Todo» preserva el alcance global con español natural y sobrio.
- source_word: אֲשֶׁר יִפֹּל עָלָיו מֵהֶם
  english_pob_choice: on which any of them falls
  chosen_spanish: que caiga sobre ello
  alternatives_spanish:
  - sobre el cual caiga alguno de ellos
  - en el que caiga alguno de ellos
  lexicon: HALOT
  rationale: El relativo describe el objeto contaminado por contacto. «Caiga sobre ello» conserva la relación de contacto; el singular pronominal encaja con «todo» como antecedente colectivo.
- source_word: בְּמֹתָם
  english_pob_choice: when they are dead
  chosen_spanish: cuando mueran
  alternatives_spanish:
  - al morir
  - cuando estén muertos
  lexicon: HALOT
  rationale: El contexto habla de los cuerpos muertos de las criaturas impuras. «Cuando mueran» es idiomático y mantiene la referencia temporal del hebreo.
- source_word: יִטְמָא
  english_pob_choice: shall become unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - se volverá impuro
  - será impuro
  lexicon: HALOT
  rationale: El verbo expresa el estado resultante de impureza ritual. «Quedará» comunica bien ese estado resultante en español sin añadir causa moral.
- source_word: מִכָּל כְּלִי עֵץ
  english_pob_choice: any wooden vessel
  chosen_spanish: cualquier recipiente de madera
  alternatives_spanish:
  - cualquier utensilio de madera
  - cualquier vasija de madera
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para recipiente/utensilio/implemento. «Recipiente» funciona bien aquí por la lista de materiales y el contexto de inmersión.
- source_word: בֶגֶד
  english_pob_choice: garment
  chosen_spanish: vestido
  alternatives_spanish:
  - prenda
  - ropa
  lexicon: HALOT
  rationale: En este inventario legal, «vestido» expresa una prenda de vestir con dignidad y claridad; «prenda» sería posible, pero algo más general.
- source_word: עוֹר
  english_pob_choice: skin
  chosen_spanish: cuero
  alternatives_spanish:
  - piel
  - piel curtida
  lexicon: HALOT
  rationale: Aunque el término básico es «piel», en una lista de materiales trabajados para recipientes/objetos, «cuero» comunica mejor el material utilizable sin forzar procesamiento explícito.
- source_word: שָׂק
  english_pob_choice: sackcloth
  chosen_spanish: saco
  alternatives_spanish:
  - arpillera
  - saco de tela áspera
  lexicon: HALOT
  rationale: El hebreo puede referir al material o al saco mismo. Aquí «saco» evita introducir una equivalencia demasiado específica y sigue la amplitud del inventario.
- source_word: כָּל כְּלִי אֲשֶׁר יֵעָשֶׂה מְלָאכָה בָּהֶם
  english_pob_choice: any vessel with which work is done
  chosen_spanish: cualquier recipiente que se haga para cualquier trabajo
  alternatives_spanish:
  - cualquier utensilio con que se hace trabajo
  - cualquier implemento usado para trabajo
  lexicon: HALOT
  rationale: La cláusula amplia la lista a cualquier objeto funcional hecho con esos materiales. «Que se haga para cualquier trabajo» refleja la pasiva hebrea y preserva la generalidad de מְלָאכָה.
- source_word: בַּמַּיִם יוּבָא
  english_pob_choice: It shall be put into the water
  chosen_spanish: se pondrá en el agua
  alternatives_spanish:
  - se meterá en el agua
  - será llevado al agua
  lexicon: HALOT
  rationale: El Hifil de בוא literalmente es «ser traído/introducido». En español, «se pondrá en el agua» transmite de forma natural la acción de introducirlo en agua.
- source_word: וְטָמֵא עַד הָעֶרֶב
  english_pob_choice: and it shall be unclean until the evening
  chosen_spanish: y quedará impuro hasta la tarde
  alternatives_spanish:
  - y estará impuro hasta la tarde
  - y permanecerá impuro hasta la tarde
  lexicon: HALOT
  rationale: Se conserva la duración temporal de la impureza ritual. «Hasta la tarde» mantiene el valor literal del hebreo y es comprensible en español bíblico contemporáneo.
- source_word: וְטָהֵר
  english_pob_choice: then it shall be clean
  chosen_spanish: entonces quedará limpio
  alternatives_spanish:
  - y quedará limpio
  - entonces será limpio
  lexicon: HALOT
  rationale: El final marca la restauración al estado limpio después del lavamiento y el tiempo. «Entonces» explicita la secuencia temporal sin añadir contenido.
theological_decisions:
- issue: Lenguaje de pureza ritual
  english_pob_reading: Render טמא/טהר as 'unclean/clean' in ritual-legal sense without importing moral guilt language.
  chosen_spanish_reading: Traducir טמא/טהר como «impuro/limpio» en sentido ritual-legal, sin introducir culpa moral.
  alternative_spanish_readings:
  - inmundo/limpio
  - contaminado/limpio
  rationale: El contexto de Levítico trata el estado ritual, no necesariamente culpa ética. «Impuro» es claro y sobrio en español; «limpio» mantiene el par tradicional sin convertirlo en categoría moral.
  doctrine_reference: Teología de la pureza levítica; fidelidad semántica al texto legal.
translation_notes:
  revision_awareness: Ajusté la cláusula final para que el marcador de nota [a] aparezca exactamente en el texto principal, corrigiendo el problema de validación anterior. Se mantuvo la estructura legal y la secuencia temporal del hebreo, con una única nota léxica anclada.
  spanish_consistency_notes:
  - Se mantuvo el contraste ritual impuro/limpio, no moral.
  - «Tarde» traduce el hebreo הָעֶרֶב de manera natural y reverente en español.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una construcción más idiomática.
  - El marcador [a] está anclado exactamente en la frase relevante del texto principal.
