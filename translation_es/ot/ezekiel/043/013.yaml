translation:
  language: es
  text: 'Y estas son las medidas del altar en codos (es decir, el codo de un codo y un palmo): su canal[a] será de un codo, y de un codo su ancho, y su borde en su reborde alrededor será de un palmo[c][b]. Y esto será la base del altar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un codo, un codo y un palmo», es decir, el codo más largo usado para estas medidas.'
    reason: cultural_note
  - marker: b
    text: O «trinchera» o «base» para «canal» (hebreo חֵיק); el rasgo arquitectónico exacto es incierto.
    reason: lexical_alternative
  - marker: c
    text: O «esto es la altura/estructura posterior del altar» para «Y esto será la base del altar» (hebreo גַּב).
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹת
  english_pob_choice: measurements
  chosen_spanish: medidas
  alternatives_spanish:
  - dimensiones
  lexicon: HALOT
  rationale: En este contexto técnico de arquitectura, el término hebreo se refiere a las medidas especificadas de una estructura. «Medidas» es natural en español y conserva el valor de dato constructivo.
- source_word: בָּאַמּוֹת אַמָּה אַמָּה וָטֹפַח
  english_pob_choice: in cubits (the cubit being a cubit and a handbreadth)
  chosen_spanish: en codos (el codo siendo un codo y un palmo)
  alternatives_spanish:
  - por codos (cada codo un codo y un palmo)
  - en codos, cada codo midiendo un codo y un palmo
  lexicon: HALOT
  rationale: 'La frase explica la unidad usada: un codo mayor, compuesto por un codo más un palmo. La versión entre paréntesis conserva el carácter explicativo sin perder claridad en español.'
- source_word: חֵיק
  english_pob_choice: gutter
  chosen_spanish: hondo
  alternatives_spanish:
  - base
  - trinchera
  - hueco
  lexicon: HALOT
  rationale: El término es difícil y el referente arquitectónico exacto es incierto. «Hondo» intenta reflejar la idea de una parte rebajada o cavidad del altar sin decidir excesivamente por una forma arquitectónica no asegurada. Se conserva la ambigüedad documentada en la nota.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - ancho
  lexicon: HALOT
  rationale: Es el término dimensional estándar. «Ancho» es claro y fluido en español moderno.
- source_word: גְּבוּלָהּ
  english_pob_choice: border
  chosen_spanish: borde
  alternatives_spanish:
  - ribete
  - orla
  - límite
  lexicon: HALOT
  rationale: Designa un margen o límite externo. «Borde» funciona bien con el contexto de medición y con la siguiente mención de la «orilla/borde».
- source_word: שְׂפָתָהּ
  english_pob_choice: rim
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - labio
  - orla
  lexicon: HALOT
  rationale: Literalmente es «labio», pero en español arquitectónico «borde» resulta más natural y comprensible para la arista exterior de la estructura.
- source_word: זֶרֶת
  english_pob_choice: span
  chosen_spanish: un palmo
  alternatives_spanish:
  - un palmo de mano
  - un codo menor
  lexicon: HALOT
  rationale: La unidad pequeña de medida se expresa bien como «palmo» en español. Mantiene la idea de una medida manual breve y comprensible.
- source_word: גַּב
  english_pob_choice: base
  chosen_spanish: base
  alternatives_spanish:
  - altura
  - espalda
  - elevación
  lexicon: HALOT
  rationale: En este pasaje, el término se refiere a la estructura inferior o levantada del altar. «Base» sigue de cerca la decisión del POB inglés y encaja en el flujo descriptivo.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: Es la designación estándar del objeto descrito en la visión del templo.
theological_decisions:
- issue: Términos arquitectónicos raros con referente incierto
  english_pob_reading: Render the terms in clear architectural English without over-specifying beyond the Hebrew
  chosen_spanish_reading: Traducir en español claro y arquitectónico sin precisar más de lo que permite el hebreo
  alternative_spanish_readings:
  - usar solo equivalentes tradicionales aunque oscurezcan el sentido
  - explicar el referente en el texto principal con mayor detalle interpretativo
  rationale: El pasaje es descriptivo y las palabras clave son raras o de referente incierto. La traducción preserva los datos de medida y mantiene la ambigüedad documentada mediante notas, sin forzar una identificación arquitectónica que el hebreo no asegura.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último paso de revisión del texto inglés: no se requieren cambios sustantivos; se preservan las decisiones auditadas y las ambigüedades técnicas del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Codo» y «palmo» se usan como unidades de medida bíblicas claras en español.
  - Se conserva la tensión lexical de חֵיק y גַּב mediante una traducción sobria y notas alternativas.
  - La duplicación de «borde» en la cláusula refleja la construcción difícil del hebreo y la distinción entre גבול y שְׂפָתָהּ.
