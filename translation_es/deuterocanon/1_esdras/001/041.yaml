translation:
  language: es
  text: Y reinó en su lugar Jehoiaquim, su hijo; pues cuando fue designado[a], tenía ocho años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice que «tenía ocho años» cuando fue designado. Otras tradiciones bíblicas difieren sobre el rey o la edad al acceder; esta traducción conserva la redacción griega de 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a reinar
  - gobernó como rey
  lexicon: BDAG
  rationale: El aoristo de βασιλεύω en narrativa histórica se expresa naturalmente con «reinó», que comunica sucesión real sin añadir énfasis no presente en el griego.
- source_word: ἀντ᾽ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: BDAG
  rationale: La frase marca sustitución en el trono. «En su lugar» es idiomático en español y conserva el valor de reemplazo.
- source_word: Ἰωακεὶμ
  english_pob_choice: Jehoiakim
  chosen_spanish: Jehoiaquim
  alternatives_spanish:
  - Joacim
  lexicon: LSJ
  rationale: El nombre corresponde al regnal hebreo habitual Jehoiakim; en español bíblico la forma «Jehoiaquim» es clara y reconocible, sin perder el vínculo con el nombre hebreo subyacente.
- source_word: ὁ υἱὸς αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  lexicon: BDAG
  rationale: Designación filial directa; no requiere expansión ni aclaración.
- source_word: ἀνεδείχθη
  english_pob_choice: was appointed
  chosen_spanish: fue designado
  alternatives_spanish:
  - fue proclamado
  - fue hecho rey
  lexicon: BDAG
  rationale: El pasivo de ἀναδείκνυμι aquí indica instalación o designación formal. «Fue designado» reproduce bien ese valor sin introducir una interpretación más específica que la del griego.
- source_word: ἐτῶν ὀκτώ
  english_pob_choice: eight years old
  chosen_spanish: tenía ocho años
  alternatives_spanish:
  - era de ocho años
  - contaba ocho años
  lexicon: BDAG
  rationale: La fórmula de edad se expresa de modo natural en español con «tenía ocho años», que conserva el dato cronológico de manera clara y publication-readable.
theological_decisions:
- issue: Notice of accession age and the preservation of a possibly difficult historical detail
  english_pob_reading: Retain the Greek text's plain statement 'he was eight years old' in the main text.
  chosen_spanish_reading: Mantener en el texto principal que tenía ocho años al ser designado.
  alternative_spanish_readings:
  - armonizar la cifra con otra tradición textual
  - omitir el dato de la edad
  rationale: La traducción debe seguir la primacía del griego en 1 Esdras y no armonizar con tradiciones paralelas. La transparencia exige preservar el dato tal como aparece en la fuente, aun cuando resulte históricamente tenso.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto español. No se introdujeron notas sueltas; el contenido mantiene la lectura griega de 1 Esdras sin armonización.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología predeterminada del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Jehoiaquim» mantiene la forma bíblica habitual en español para el nombre regio.
  - «Fue designado» evita una paráfrasis excesiva y conserva la instalación formal implícita en ἀνεδείχθη.
