revisions:
- from: ¡Cómo ha sido quebrantada! ¡Aullad! ¡Cómo Moab ha vuelto la espalda avergonzada! Moab se ha convertido en objeto de burla y en horror[a] para todos los que la rodean[b].
  to: ¡Cómo ha sido quebrantada! ¡Lamenten! ¡Cómo Moab volvió[b] la espalda, avergonzada! Moab se ha convertido en objeto de burla y en horror[a] para todos los que la rodean.
  rationale: Se reemplaza 'Aullad' por 'Lamenten' para un español más natural y eclesialmente legible, se mejora levemente el orden de la cláusula exclamativa, y se reubica la nota [b] al giro idiomático que realmente explica. Se conserva 'quebrantada', 'objeto de burla' y 'horror' por fidelidad al hebreo y al rastro auditado.
