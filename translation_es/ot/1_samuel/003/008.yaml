revisions:
- from: 'Yahvé llamó a Samuel por tercera vez. Entonces él se levantó y fue a Elí, y dijo: «Aquí estoy, porque me has llamado». Entonces Elí comprendió que Yahvé estaba llamando al muchacho.'
  to: 'Yahvé llamó a Samuel por tercera vez. Entonces se levantó y fue a Elí y dijo: «Aquí estoy, porque me llamaste». Entonces Elí comprendió que Yahvé estaba llamando al muchacho.'
  rationale: 'La revisión mantiene plenamente el sentido del hebreo y las decisiones léxicas auditadas, pero ajusta el español a un registro más natural y ampliamente legible: se elimina el pronombre sujeto no enfático, se sustituye el perfecto compuesto por pretérito simple en la respuesta de Samuel, y se aligera la puntuación de la cadena narrativa.'
