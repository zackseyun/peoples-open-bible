revisions:
- from: Los que salgan de entre ustedes reconstruirán las ruinas antiguas; ustedes levantarán los cimientos de generación en generación, y se les llamará reparadores de la brecha[a], restauradores de sendas para habitar[b].
  to: Los de entre ustedes reconstruirán las ruinas antiguas; levantarás los cimientos de generación en generación[a], y se te llamará reparador de la brecha, restaurador de sendas para habitar[b].
  rationale: Se eliminó la idea no atestiguada de 'salgan'; se ajustaron los títulos al singular para reflejar los participios hebreos y la personificación del destinatario; se corrigió la ubicación de las notas para que correspondan a los segmentos explicados; y se mantuvo un español natural y digno alineado con el POB.
