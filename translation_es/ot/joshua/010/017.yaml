translation:
  language: es
  text: 'Y se le informó a Josué[a], diciendo: «Los cinco reyes han sido hallados escondidos en la cueva en Makeda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad es: «fueron hallados escondiéndose en la cueva en Makeda». El participio hebreo admite un matiz más verbal («escondiéndose») o más estativo («escondidos»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le dijo
  - se le dio aviso
  lexicon: HALOT
  rationale: La forma pasiva narrativa comunica que llegó una noticia a Josué sin añadir un sujeto explícito. «Se le informó» conserva ese valor informativo y suena natural en español actual.
- source_word: לִיהוֹשֻׁעַ
  english_pob_choice: to Joshua
  chosen_spanish: a Josué
  alternatives_spanish:
  - para Josué
  lexicon: HALOT
  rationale: Es el complemento indirecto del reporte. Se usa el nombre propio castellano tradicionalmente reconocido en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  lexicon: HALOT
  rationale: Mantiene la introducción formular del contenido citado sin sobreinterpretarla.
- source_word: נִמְצְאוּ
  english_pob_choice: have been found
  chosen_spanish: han sido hallados
  alternatives_spanish:
  - fueron hallados
  - han sido encontrados
  lexicon: HALOT
  rationale: El pasivo de מצא se conserva con valor perfectivo. «Han sido hallados» refleja el hallazgo reciente y funciona bien con la frase participial siguiente.
- source_word: חֲמֵשֶׁת הַמְּלָכִים
  english_pob_choice: the five kings
  chosen_spanish: los cinco reyes
  alternatives_spanish:
  - los cinco monarcas
  lexicon: HALOT
  rationale: Numeral más sustantivo definido se traduce de manera directa. «Reyes» es el equivalente natural y suficiente.
- source_word: נֶחְבְּאִים
  english_pob_choice: hidden
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultos
  - escondiéndose
  lexicon: HALOT
  rationale: La partícula participial puede entenderse como estado («escondidos») o como acción («escondiéndose»). Se conserva el valor de estado, coherente con la revisión inglesa que suprimió la coma para ligar el participio a «found».
- source_word: בַּמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - dentro de la cueva
  lexicon: HALOT
  rationale: La preposición y el sustantivo se expresan de forma directa y natural en español.
- source_word: בְּמַקֵּדָה
  english_pob_choice: at Makkedah
  chosen_spanish: en Makeda
  alternatives_spanish:
  - en Makkedá
  lexicon: HALOT
  rationale: Se translitera el topónimo con una forma castellana clara y breve. «En» conserva la asociación locativa con el lugar nombrado.
translation_notes:
  revision_awareness: La base inglesa revisada eliminó la coma después de «found» para que «hidden» modifique naturalmente a «the five kings»; el español sigue esa misma relación sintáctica al unir «han sido hallados escondidos» sin pausa intermedia.
  spanish_consistency_notes:
  - Se mantiene «Josué» como forma castellana del nombre, coherente con el uso bíblico estándar en español.
  - Se evita «SEÑOR» y cualquier término teológico no presente en el versículo.
  - «Makeda» se conserva como topónimo transliterado, sin adaptar a una forma interpretativa.
  - La construcción pasiva refleja el reporte recibido sin convertirlo en voz activa no sustentada por el hebreo.
