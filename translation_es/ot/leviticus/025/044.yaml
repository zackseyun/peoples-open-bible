translation:
  language: es
  text: En cuanto a tu esclavo[a] y tu esclava[b] que puedan pertenecerles[c], de las naciones que están alrededor de ustedes[d], de ellos podrán comprar un esclavo y una esclava.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tu siervo’; el hebreo distingue aquí el término masculino, y el contexto de compra y posesión favorece ‘esclavo’.
    reason: lexical_alternative
  - marker: b
    text: O ‘tu sierva’; el hebreo distingue aquí el término femenino, y el contexto legal de adquisición favorece ‘esclava’.
    reason: lexical_alternative
  - marker: c
    text: O ‘que serán suyos’. El hebreo expresa pertenencia o posesión legal, no solo compañía.
    reason: lexical_alternative
  - marker: d
    text: ‘Naciones’ se refiere a los pueblos no israelitas alrededor de Israel; también puede entenderse como ‘de entre los pueblos que están alrededor de ustedes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your male slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: עֶבֶד en este contexto legal de compra y posesión expresa un estatus de esclavitud, no solo de servicio. En español, 'esclavo' conserva esa fuerza. No añadí 'varón' porque el masculino ya está marcado por el sufijo y el contraste con la forma femenina siguiente.
- source_word: אֲמָתְךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sirvienta
  - tu criada
  - tu sierva
  lexicon: HALOT
  rationale: אָמָה es el correlato femenino de עֶבֶד en esta cláusula. 'Esclava' mantiene la distinción léxica y el carácter jurídico de la relación de propiedad/purchase. 'Sierva' o 'criada' suavizarían el peso legal del pasaje.
- source_word: אֲשֶׁר יִהְיוּ לָךְ
  english_pob_choice: who may belong to you
  chosen_spanish: que estarán contigo
  alternatives_spanish:
  - que te pertenecerán
  - que podrán ser tuyos
  - que llegarán a ser tuyos
  lexicon: HALOT
  rationale: El hebreo indica personas que pasarán a estar en tu posesión o relación de pertenencia. Opté por una formulación menos pesada en español para evitar una repetición forzada de 'ser tuyos', pero sin eliminar la idea de incorporación a tu ámbito. 'Estarán contigo' conserva la cercanía contextual, aunque es más suave que la literalidad posesiva; por eso esta elección queda acompañada por el contexto legal de compra en la frase siguiente.
- source_word: מֵאֵת הַגּוֹיִם
  english_pob_choice: from the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los pueblos
  - de entre las naciones
  - de los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' reproduce bien גּוֹיִם en este marco legal de Israel frente a los pueblos no israelitas. Evita ''gentiles'', que suena demasiado neotestamentario, y mantiene el tono descriptivo del hebreo.'
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  english_pob_choice: that are around you
  chosen_spanish: que están alrededor de ustedes
  alternatives_spanish:
  - que los rodean
  - que están a su alrededor
  - circundantes
  lexicon: HALOT
  rationale: La cláusula relativa señala cercanía geográfica. 'Alrededor de ustedes' es natural en español y preserva el sentido espacial sin añadir matices no presentes en el hebreo.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - a partir de ellos
  lexicon: HALOT
  rationale: El pronombre retoma a las naciones circundantes como fuente de adquisición. 'De ellos' es breve y fiel, y encaja con el verbo de compra que sigue.
- source_word: תִּקְנוּ
  english_pob_choice: you may buy
  chosen_spanish: comprarán
  alternatives_spanish:
  - podrán comprar
  - comprarán para ustedes
  - podrán adquirir
  lexicon: HALOT
  rationale: Aunque la POB inglesa opta por un valor permisivo ('may buy'), el hebreo puede leerse en una construcción legal normativa. En español, 'comprarán' transmite la instrucción establecida por la ley sin necesidad de un auxiliar permisivo que sonaría menos natural. La autorización queda implícita por el contexto legislativo.
- source_word: עֶבֶד וְאָמָה
  english_pob_choice: a male slave and a female slave
  chosen_spanish: esclavo y esclava
  alternatives_spanish:
  - un esclavo y una esclava
  - siervo y sierva
  - esclavo, varón y mujer
  lexicon: HALOT
  rationale: 'El par hebreo es distributivo y genérico: un esclavo masculino y una esclava femenina. En español, el binomio simple ''esclavo y esclava'' reproduce esa distinción sin sobrecargar la frase.'
theological_decisions:
- issue: Terminología de esclavitud en una ley de adquisición
  english_pob_reading: Use 'slave' rather than 'servant' for עֶבֶד/אָמָה in this verse.
  chosen_spanish_reading: Usar 'esclavo/esclava' y no 'siervo/sierva'.
  alternative_spanish_readings:
  - siervo/sierva
  - sirviente/sirvienta
  rationale: La compra explícita y la posesión legal están en el centro del pasaje; 'esclavo' comunica mejor ese estatus que 'siervo', que en español puede sonar más voluntario o doméstico. Esto conserva la tensión léxica y jurídica del texto original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contenedores léxicos de estatus vinculado
- issue: Valor de תִּקְנוּ en contexto legal
  english_pob_reading: Render as permissive 'you may buy.'
  chosen_spanish_reading: 'Traducir con un futuro normativo: ''comprarán''.'
  alternative_spanish_readings:
  - podrán comprar
  - pueden comprar
  - comprarás/comprarán
  rationale: El hebreo en legislación puede funcionar como norma general. En español, el futuro simple expresa adecuadamente obligación o prescripción en textos legales. Así se evita una perifrases demasiado interpretativa y se mantiene el carácter regulativo del mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvo la decisión de ''slave'' frente a ''servant'' por el contexto de compra/posesión, y se reflejó la referencia a las naciones circundantes. La única divergencia principal es la normalización del valor verbal de תִּקְנוּ en español como futuro normativo (''comprarán'') en lugar de un permisivo explícito; se juzgó más natural y suficientemente fiel para una ley casuística hebrea.'
  spanish_consistency_notes:
  - Se mantuvo el par masculino/femenino con 'esclavo / esclava' para respetar la distinción léxica del hebreo.
  - Se usó 'naciones' para גּוֹיִם, en coherencia con el registro legal de Levítico.
  - No se introdujo 'Yahvé' porque este versículo no contiene el tetragrámaton.
  - La puntuación y el orden sintáctico buscan legibilidad pública sin borrar la estructura condicional/relativa del hebreo.
