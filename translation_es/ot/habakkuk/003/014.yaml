    text: O 'la cabeza de sus aldeas' / 'la cabeza de sus hordas'; el término hebreo es difícil, y muchos lo entienden de manera más general como las bandas o los jefes del enemigo.
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación del marcador de nota para que recaiga sobre el término realmente ambiguo ('sus guerreros'), en línea con el hebreo פְּרָזָיו y con la auditoría inglesa. También se ajusta 'bastones' a 'varas' para una dicción bíblica más natural y apropiada al contexto marcial, sin cambiar el sentido base ni la decisión léxica documentada.
