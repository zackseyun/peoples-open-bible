translation:
  language: es
  text: Y en segundo lugar, ¿a quién he de servir? ¿No ha de ser ante su hijo[a]? Como serví ante tu padre, así estaré ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ante su hijo ... ante tu padre ... ante ti», un modismo cortesano para servir en presencia de, o bajo la autoridad de, un rey.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַשֵּׁנִית
  english_pob_choice: And secondly
  chosen_spanish: Y en segundo lugar
  alternatives_spanish:
  - Y secondly
  - Y en la segunda ocasión
  - Y en segundo término
  lexicon: HALOT
  rationale: La forma hebrea funciona como marcador discursivo ordinal. «En segundo lugar» conserva el valor adverbial sin sonar mecánico en español.
- source_word: לְמִי ... אֶעֱבֹד
  english_pob_choice: whom should I serve
  chosen_spanish: ¿a quién he de servir?
  alternatives_spanish:
  - ¿a quién serviré?
  - ¿a quién debo servir?
  - ¿a quién he de trabajar?
  lexicon: HALOT
  rationale: עבד en este contexto cortesano expresa servicio/lealtad. «He de servir» mantiene el matiz voluntario y la pregunta retórica en un español natural y reverente.
- source_word: הֲלוֹא
  english_pob_choice: Should it not be
  chosen_spanish: ¿No es...?
  alternatives_spanish:
  - ¿No sería...?
  - ¿Acaso no es...?
  - ¿No ha de ser...?
  lexicon: HALOT
  rationale: La partícula introduce una respuesta esperada afirmativa. En español, una interrogación negativa breve comunica bien esa fuerza retórica.
- source_word: לִפְנֵי בְנוֹ
  english_pob_choice: before his son
  chosen_spanish: antes de su hijo
  alternatives_spanish:
  - en presencia de su hijo
  - delante de su hijo
  - ante su hijo
  lexicon: HALOT
  rationale: El hebreo literal es «ante/en presencia de», pero en español «antes de» aquí permite preservar la repetición de לִפְנֵי sin perder la idea de servicio en la corte. Se conserva la tensión idiomática en nota.
- source_word: כַּאֲשֶׁר עָבַדְתִּי לִפְנֵי אָבִיךָ
  english_pob_choice: As I served before your father
  chosen_spanish: Como he servido antes de tu padre
  alternatives_spanish:
  - Así como serví delante de tu padre
  - Como he servido en presencia de tu padre
  - Tal como serví ante tu padre
  lexicon: HALOT
  rationale: Se conserva el paralelo con el mismo valor idiomático de לִפְנֵי. «He servido» refleja la experiencia previa de lealtad/servicio al padre del interlocutor.
- source_word: כֵּן אֶהְיֶה לְפָנֶיךָ
  english_pob_choice: so I will be before you
  chosen_spanish: así estaré antes de ti
  alternatives_spanish:
  - así seré delante de ti
  - así estaré en tu presencia
  - así te serviré
  lexicon: HALOT
  rationale: El hebreo cambia de עבד a היה; por eso se evita repetir «serviré» y se mantiene el verbo «estaré/seré» para preservar el cambio formal del original.
theological_decisions:
- issue: Servicio cortesano expresado con עבד en un contexto político
  english_pob_reading: serve / be before you as a courtly idiom
  chosen_spanish_reading: servir / estar antes de ti como modismo cortesano
  alternative_spanish_readings:
  - servirte
  - estar a tu servicio
  - servir en tu presencia
  rationale: No se espiritualiza ni se aplana el verbo. Se mantiene el sentido de lealtad y atención en la corte, evitando traducirlo como un simple acto religioso.
  doctrine_reference: N/A
- issue: Expresión idiomática לִפְנֵי ('before/in the presence of')
  english_pob_reading: before his son / before your father / before you
  chosen_spanish_reading: antes de su hijo / antes de tu padre / antes de ti
  alternative_spanish_readings:
  - delante de su hijo / delante de tu padre / delante de ti
  - en presencia de su hijo / en presencia de tu padre / en tu presencia
  - ante su hijo / ante tu padre / ante ti
  rationale: Se preserva la repetición del mismo elemento hebreo en las tres frases. «Antes de» permite una redacción fluida en español y deja visible la cualidad idiomática mediante la nota.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada restableció explícitamente «before his son» para reflejar la repetición de לִפְנֵי. La redacción española conserva esa repetición semántica con «antes de» en las tres ocurrencias, manteniendo el paralelismo y la tonalidad cortesana del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Servir» se mantiene por la fuerza leal/cortesana de עבד en este contexto.
  - La alternancia entre «he servido» y «estaré» refleja el cambio verbal hebreo entre עבד y היה.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el pasaje.
