translation:
  language: es
  text: 'Entonces él me llamó en voz alta y me habló[a], diciendo: «Mira, los que salen hacia la tierra del norte han dado reposo a mi Espíritu en la tierra del norte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «han dado reposo a mi espíritu»; la expresión puede llevar además la idea de que la ira o el desagrado judicial de Dios se han apaciguado en el norte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  english_pob_choice: called out
  chosen_spanish: me llamó
  alternatives_spanish:
  - me gritó
  - me convocó
  lexicon: HALOT
  rationale: El verbo admite la idea de llamar en voz alta. En español, «me llamó» conserva la acción audible y directa sin introducir un matiz excesivamente emocional que no exige el contexto.
- source_word: וַיְדַבֵּר אֵלַי לֵאמֹר
  english_pob_choice: spoke to me, saying
  chosen_spanish: y me habló, diciendo
  alternatives_spanish:
  - y me dijo, diciendo
  - y habló conmigo, diciendo
  lexicon: HALOT
  rationale: La fórmula de habla se mantiene de modo formal y claro. «Me habló, diciendo» preserva la estructura solemne del hebreo sin volverla rígida.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  lexicon: HALOT
  rationale: El imperativo busca captar la atención. «Mira» es natural en español y conserva el valor exhortativo inmediato.
- source_word: הַיֹּצְאִים
  english_pob_choice: those going out
  chosen_spanish: los que salen
  alternatives_spanish:
  - los que iban saliendo
  - los que salían
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o característica. «Los que salen» mantiene esa apertura aspectual mejor que una forma plenamente pasada.
- source_word: אֶל אֶרֶץ צָפוֹן
  english_pob_choice: to the land of the north
  chosen_spanish: hacia la tierra del norte
  alternatives_spanish:
  - a la tierra del norte
  - a la región del norte
  lexicon: HALOT
  rationale: «Hacia» reproduce el sentido direccional de אֶל. «Tierra del norte» conserva la expresión geográfica sin normalizarla excesivamente.
- source_word: הֵנִיחוּ
  english_pob_choice: have set ... at rest
  chosen_spanish: han dado reposo
  alternatives_spanish:
  - han puesto en reposo
  - han hecho reposar
  - han quietado
  lexicon: HALOT
  rationale: El causativo de נוח/הניח se puede expresar como dar reposo o hacer reposar. «Han dado reposo» suena natural en español y retiene el valor de causar descanso/quietud.
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  lexicon: HALOT
  rationale: Se conserva la mayúscula por tratarse de la referencia divina en el contexto profético, siguiendo la decisión inglesa de mantener la carga teológica sin resolverla como mera emoción.
- source_word: בְּאֶרֶץ צָפוֹן
  english_pob_choice: in the land of the north
  chosen_spanish: en la tierra del norte
  alternatives_spanish:
  - en la tierra del norte
  lexicon: HALOT
  rationale: Se mantiene la repetición final para respetar el énfasis retórico del hebreo y la correspondencia con la frase previa.
theological_decisions:
- issue: Sentido de רוּחִי en «han dado reposo a mi Espíritu»
  english_pob_reading: A reference to God's own Spirit/disposition being caused to rest, likely in the sense that divine wrath or judicial activity has been satisfied in the north.
  chosen_spanish_reading: Una referencia al Espíritu de Dios o a su disposición/impulso en reposo; el texto no obliga a reducirlo a «ira», aunque esa resonancia queda abierta.
  alternative_spanish_readings:
  - mi espíritu
  - mi ira
  - mi aliento
  rationale: La ambigüedad hebrea se conserva en el texto principal. «Mi Espíritu» respeta la forma pronominal y la gravedad teológica; la posible resonancia de quietud judicial se documenta sin imponerse en la línea principal.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla de forma dogmática.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo WLC y el auditorial inglés POB con concordancia alta; se mantiene la repetición de «en la tierra del norte» y la ambigüedad de רוּחִי documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva «Espíritu» con mayúscula por el contexto divino, alineado con la decisión inglesa de no banalizar רוּחַ.
  - «Tierra del norte» reproduce la fórmula geográfica repetida sin convertirla en un modismo distinto.
  - La puntuación conserva la fórmula profética con comillas españolas y la nota al pie ligada al verbo/expresión relevante.
