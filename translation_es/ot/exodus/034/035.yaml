translation:
  language: es
  text: Y los hijos de Israel vieron el rostro de Moisés[a], que la piel del rostro de Moisés resplandecía[b]; y Moisés volvía a poner el velo sobre su rostro hasta que entraba a hablar con él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; también puede traducirse «los israelitas».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo significa «resplandecer» o «emitir rayos»; la traducción tradicional «tenía cuernos» refleja una antigua mala interpretación.
    reason: lexical_alternative
  - marker: c
    text: «Con él» se refiere a Yahvé por el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la expresión familiar literal del hebreo. En español, «hijos de Israel» mantiene la transparencia del sintagma original sin recurrir de entrada a una generalización como «israelitas».
- source_word: פְּנֵי מֹשֶׁה
  english_pob_choice: Moses’ face
  chosen_spanish: el rostro de Moisés
  alternatives_spanish:
  - la cara de Moisés
  - el rostro de Moisés
  lexicon: HALOT
  rationale: «Rostro» es natural y digno en español bíblico; además conserva el foco concreto del hebreo en la parte visible de Moisés. «Cara» sería posible, pero menos elevado en este contexto.
- source_word: קָרַן
  english_pob_choice: shone
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - irradiaba
  - resplandecía
  lexicon: HALOT
  rationale: El verbo hebreo expresa emitir rayos o brillar. «Resplandecía» comunica bien esa luminosidad y evita la falsa lectura tradicional de «tener cuernos».
- source_word: עוֹר פְּנֵי מֹשֶׁה
  english_pob_choice: the skin of Moses’ face
  chosen_spanish: la piel del rostro de Moisés
  alternatives_spanish:
  - la piel de su rostro
  - la piel del rostro de Moisés
  lexicon: HALOT
  rationale: «עוֹר» significa «piel», no solo «rostro». Mantener «la piel del rostro de Moisés» preserva la precisión del hebreo y la relación entre la piel y el resplandor.
- source_word: וְהֵשִׁיב
  english_pob_choice: would put back
  chosen_spanish: volvía a poner
  alternatives_spanish:
  - ponía de nuevo
  - volvía a colocar
  - volvía a poner
  lexicon: HALOT
  rationale: 'El sentido es iterativo: Moisés repetidamente colocaba el velo otra vez después de hablar. «Volvía a poner» expresa bien esa acción repetida en español.'
- source_word: הַמַּסְוֶה
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - el velo
  - la cobertura
  - la máscara
  lexicon: HALOT
  rationale: «Velo» es el término más establecido y adecuado para el cubrimiento del rostro; «máscara» sería anacrónico y engañoso.
- source_word: עַל פָּנָיו
  english_pob_choice: over his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - sobre su cara
  - encima de su rostro
  lexicon: HALOT
  rationale: «Sobre su rostro» reproduce la función del velo como cobertura y mantiene el registro bíblico sin rigidez innecesaria.
- source_word: עַד בֹּאוֹ
  english_pob_choice: until he went in
  chosen_spanish: hasta que entraba
  alternatives_spanish:
  - hasta que entraba
  - hasta que iba a entrar
  - hasta que se metía
  lexicon: HALOT
  rationale: El límite temporal del hebreo se expresa con naturalidad en español mediante «hasta que entraba». El imperfecto refleja la repetición habitual en la narración.
- source_word: לְדַבֵּר אִתּוֹ
  english_pob_choice: to speak with him
  chosen_spanish: para hablar con él
  alternatives_spanish:
  - para hablar con él
  - para hablar con Yahvé
  - para conversar con él
  lexicon: HALOT
  rationale: Conservo el pronombre porque el hebreo también lo hace. El referente es Yahvé por el contexto inmediato, pero no se inserta explícitamente en el cuerpo del versículo.
theological_decisions:
- issue: Referente de «con él»
  english_pob_reading: The pronoun refers to the LORD, but the main text retains the pronoun rather than substituting the divine name.
  chosen_spanish_reading: El pronombre se conserva; se entiende que se refiere a Yahvé por el contexto inmediato, sin reemplazarlo en el texto principal.
  alternative_spanish_readings:
  - para hablar con Yahvé
  - para hablar con el Señor
  rationale: El hebreo usa un pronombre, y la traducción debe respetar esa forma. El contexto de los vv. 34–35 identifica al interlocutor como Yahvé, pero no es necesario explicitarlo en el verso principal.
  doctrine_reference: Principio de transparencia textual y fidelidad al pronombre del original
- issue: Sentido de קָרַן
  english_pob_reading: The Hebrew verb means 'shone' or 'sent out rays'; the traditional rendering 'was horned' reflects an old misunderstanding of the term.
  chosen_spanish_reading: Se traduce como «resplandecía», no como una forma de «tener cuernos».
  alternative_spanish_readings:
  - brillaba
  - irradiaba
  - tenía cuernos
  rationale: La elección evita perpetuar la interpretación errónea derivada de una antigua confusión del término hebreo. «Resplandecía» expresa el valor semántico luminoso del verbo.
  doctrine_reference: HALOT; nota lexical sobre קָרַן
- issue: Tiempo verbal de la acción de Israel
  english_pob_reading: The English audit trail settled on a simple past 'saw' rather than habitual 'would see'.
  chosen_spanish_reading: «Vieron» en pretérito simple.
  alternative_spanish_readings:
  - veían
  - solían ver
  rationale: El hebreo narrativo avanza con una secuencia de acciones completadas; en español, el pretérito simple transmite mejor esa progresión que un habitual.
  doctrine_reference: Principio de correspondencia narrativa en prosa hebrea
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail inglés, que prefirió un pretérito simple para la acción de ver («saw») y mantuvo la acción repetida de poner el velo como habitual. La versión española refleja esa misma distinción: «vieron» para la observación de Israel y «volvía a poner» para la acción reiterada de Moisés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino cuando la referencia es explícita en la nota, pero no se sustituye el pronombre del texto principal.
  - «Rostro» se usa de forma consistente para פָּנִים/פָּנֵי en esta unidad.
  - «Velo» se conserva para הַמַּסְוֶה por consistencia terminológica.
  - La combinación «vieron» / «volvía a poner» distingue acción puntual narrativa y acción repetida habitual, respectivamente.
  - Se evita «hornado» o «tenía cuernos», que no corresponden al sentido lexical del hebreo.
