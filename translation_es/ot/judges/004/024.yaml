base_translation:
  language: en
  yaml_path: translation/ot/judges/004/024.yaml
  text: And the hand of the sons of Israel went on[a], growing stronger against Jabin king of Canaan[c][b], until they cut off Jabin king of Canaan.
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “became stronger against” or “grew more severe against.” The Hebrew expression combines “went” with an intensifying form meaning increasing pressure.
    reason: lexical_alternative
  - marker: c
    text: “Cut off” here means they destroyed or removed him decisively.
    reason: lexical_alternative
