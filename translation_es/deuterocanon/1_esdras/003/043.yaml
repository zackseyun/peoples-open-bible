translation:
  language: es
  text: Un hombre deja a su propio padre[a], que lo crió, y su propio país, y se aferra a su propia esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘abandona’ o ‘desampara’ para ἐγκαταλείπει; el verbo griego puede ser más fuerte, pero aquí probablemente describe el dejar padre y patria para unirse a su esposa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Un ser humano
  lexicon: BDAG
  rationale: El griego usa ἄνθρωπος en una construcción singular genérica. Como en el contexto aparecen ‘padre’ y ‘esposa’, la referencia representativa masculina se conserva en español con ‘un hombre’, sin neutralizar el género del enunciado.
- source_word: τὸν ἑαυτοῦ πατέρα
  english_pob_choice: his own father
  chosen_spanish: a su propio padre
  alternatives_spanish:
  - a su padre
  lexicon: BDAG
  rationale: ἑαυτοῦ añade posesión reflexiva enfática. ‘Su propio padre’ reproduce mejor ese énfasis que el simple ‘su padre’.
- source_word: ἐγκαταλείπει
  english_pob_choice: leaves
  chosen_spanish: deja
  alternatives_spanish:
  - abandona
  - desampara
  - fuerza de 'deja' como 'abandona'
  lexicon: BDAG
  rationale: El verbo puede ser más fuerte (‘abandonar, forsake’), pero aquí el movimiento hacia el matrimonio sugiere ‘deja’ como español natural y fiel, sin cargar de más el matiz de culpa.
- source_word: ὃς ἐξέθρεψεν αὐτόν
  english_pob_choice: who raised him
  chosen_spanish: que lo crió
  alternatives_spanish:
  - que lo educó
  - que lo alimentó / lo nutrió
  lexicon: BDAG
  rationale: ἐκτρέφω expresa criar o sacar adelante a un hijo. ‘Lo crió’ es la forma más natural en español y conserva el sentido parental.
- source_word: τὴν ἰδίαν χώραν
  english_pob_choice: his own country
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su propio país
  - su patria
  lexicon: BDAG
  rationale: χώρα puede significar tierra, región o país. ‘Tierra’ mantiene la amplitud del término y suena más flexible que ‘país’ o ‘patria’.
- source_word: πρὸς τὴν ἰδίαν γυναῖκα
  english_pob_choice: to his own wife
  chosen_spanish: a su propia esposa
  alternatives_spanish:
  - a su propia mujer
  lexicon: BDAG
  rationale: γυνή aquí se refiere claramente al vínculo marital. ‘Esposa’ evita ambigüedad en español, aunque ‘mujer’ seguiría siendo una alternativa literal.
- source_word: κολλᾶται
  english_pob_choice: clings
  chosen_spanish: se aferra
  alternatives_spanish:
  - se une estrechamente
  - se apega
  - se adhiere
  lexicon: BDAG
  rationale: κολλάω expresa adherirse con fuerza. ‘Se aferra’ comunica bien la intensidad de la unión, sin sonar demasiado técnica o eclesiástica.
theological_decisions:
- issue: Tono de separación en ἐγκαταλείπει
  english_pob_reading: leaves
  chosen_spanish_reading: deja
  alternative_spanish_readings:
  - abandona
  - desampara
  rationale: La frase describe el traslado relacional propio del matrimonio, no necesariamente una denuncia moral. ‘Deja’ preserva esa tensión, mientras que ‘abandona’ podría sugerir una condena más fuerte de la que el contexto inmediato exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Imagen de unión matrimonial en κολλᾶται
  english_pob_reading: clings
  chosen_spanish_reading: se aferra
  alternative_spanish_readings:
  - se une
  - se liga estrechamente
  rationale: El verbo griego transmite adhesión intensa. ‘Se aferra’ conserva la fuerza de la imagen relacional, manteniendo la tensión entre separación de origen y unión matrimonial.
  doctrine_reference: DOCTRINE.md §Lexical fidelity
- issue: Masculino genérico representativo
  english_pob_reading: A man
  chosen_spanish_reading: Un hombre
  alternative_spanish_readings:
  - Una persona
  rationale: El griego presenta un sujeto masculino singular genérico. La formulación en español conserva esa forma representativa sin neutralizarla, coherente con la política de fidelidad de género del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete LXX 1909 y mantiene la lectura de alto acuerdo del audit trail inglés. No se detectaron revisiones aplicadas en el contexto, así que no hay cambios textuales adicionales respecto del sentido base: hombre/father/country/wife/clings quedan reflejados con equivalentes españoles directos y naturales.'
  spanish_consistency_notes:
  - Se usó ‘tierra’ para χώρα por amplitud semántica y naturalidad en español.
  - Se prefirió ‘esposa’ para γυνή en este contexto marital, aunque ‘mujer’ es posible en un registro más literal.
  - ‘Se aferra’ intenta conservar la intensidad de κολλᾶται sin introducir una formulación eclesiástica ajena al griego.
