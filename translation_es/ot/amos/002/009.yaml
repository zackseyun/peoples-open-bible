translation:
  language: es
  text: Sin embargo, yo destruí al amorreo[a] delante de ellos, cuya altura era como la altura de los cedros, y era fuerte como los robles[b]; destruí su fruto arriba y sus raíces abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los amorreos»; el hebreo usa el singular «el amorreo» como colectivo para el pueblo.
    reason: lexical_alternative
  - marker: b
    text: «Fruto» y «raíces» continúan la imagen del árbol y comunican destrucción total, de arriba abajo.
    reason: cultural_note
lexical_decisions:
- source_word: וְאָנֹכִי
  english_pob_choice: Yet I
  chosen_spanish: Sin embargo, yo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: La conjunción inicial y el pronombre enfático introducen contraste y énfasis. «Sin embargo, yo» transmite mejor ese giro adversativo que un simple «Y yo», y mantiene la fuerza retórica del hebreo.
- source_word: הִשְׁמַדְתִּי
  english_pob_choice: destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - aniquilé
  - exterminé
  lexicon: HALOT
  rationale: El verbo hifil de שׁמד expresa causar destrucción o borrar del mapa. «Destruí» es fuerte, natural en español y no sobrecarga más allá del texto.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorite
  chosen_spanish: al amorreo
  alternatives_spanish:
  - al amorreo, en singular colectivo
  - a los amorreos
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo. En español, «amorreo» funciona como etnónimo singular y permite mantener la personificación del pueblo como una sola figura.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - de delante de ellos
  - en presencia de ellos
  lexicon: HALOT
  rationale: La locución idiomática hebrea expresa remoción de su presencia. «Delante de ellos» reproduce bien la imagen espacial sin sonar forzado.
- source_word: כְּגֹבַהּ אֲרָזִים גָּבְהוֹ
  english_pob_choice: whose height was like the height of cedars
  chosen_spanish: cuya altura era como la altura de los cedros
  alternatives_spanish:
  - cuya estatura era como la de los cedros
  - tan alto como los cedros
  lexicon: HALOT
  rationale: El hebreo repite la idea de altura; conviene conservar esa doble referencia para no diluir el paralelismo. «Altura» y no «estatura» refleja mejor el sustantivo del texto.
- source_word: וְחָסֹן הוּא כָּאַלּוֹנִים
  english_pob_choice: and he was strong like the oaks
  chosen_spanish: y era fuerte como los encinos
  alternatives_spanish:
  - y era robusto como los encinos
  - y era fuerte como los robles
  lexicon: HALOT
  rationale: חָסֹן denota fuerza/robustez. «Fuerte» es claro y fiel. Para אַלּוֹנִים, «encinos» es una opción natural en español latinoamericano para el árbol del pasaje; «robles» también es posible, pero puede sonar menos cercano a la flora común en algunos registros hispanos.
- source_word: וָאַשְׁמִיד
  english_pob_choice: I destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - arrasé
  - aniquilé
  lexicon: HALOT
  rationale: El verbo se repite para intensificar el paralelismo. Mantener «destruí» conserva la repetición retórica y la equivalencia semántica.
- source_word: פִּרְיוֹ מִמַּעַל
  english_pob_choice: his fruit above
  chosen_spanish: su fruto de arriba
  alternatives_spanish:
  - su fruto superior
  - su fruto desde arriba
  lexicon: HALOT
  rationale: Se preserva la metáfora arbórea literal del hebreo. «Fruto» se mantiene en el texto principal porque la imagen es explícita y no debe interpretarse prematuramente como descendencia.
- source_word: וְשָׁרָשָׁיו מִתָּחַת
  english_pob_choice: and his roots beneath
  chosen_spanish: y sus raíces de abajo
  alternatives_spanish:
  - y sus raíces debajo
  - y sus raíces desde abajo
  lexicon: HALOT
  rationale: La expresión completa el contraste «arriba/abajo» del árbol. «De abajo» conserva la simetría con «de arriba» y la imagen total de destrucción.
theological_decisions:
- issue: Singular colectivo para el Amorreo
  english_pob_reading: Retain singular pronouns ('the Amorite ... he ... his') as a collective personification of the people.
  chosen_spanish_reading: Mantener el singular colectivo («al amorreo ... era ... su»), entendido como personificación del pueblo.
  alternative_spanish_readings:
  - 'Pluralizar: «a los amorreos ... eran ... sus»'
  - 'Reformular sin personificación: «al pueblo amorreo»'
  rationale: El hebreo usa formas singulares para un colectivo, y el inglés POB conservó esa elección. El español puede hacer lo mismo sin perder claridad, manteniendo la imagen retórica de un solo árbol grande derribado.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Metáfora arbórea de juicio total
  english_pob_reading: '''Fruit'' and ''roots'' continue the tree imagery and imply total destruction from top to bottom.'
  chosen_spanish_reading: Conservar «fruto» y «raíces» como metáfora completa de destrucción total, de arriba abajo.
  alternative_spanish_readings:
  - Interpretar «fruto» como «descendencia» en el texto principal
  - 'Parafrasear: «lo destruí por completo»'
  rationale: El hebreo presenta una imagen vegetal explícita. En español conviene retenerla para no suavizar la fuerza poética ni ocultar la continuidad entre copa y raíces; el sentido de destrucción total queda implícito en la imagen misma.
  doctrine_reference: Poética bíblica y consistencia metafórica del texto fuente
translation_notes:
  revision_awareness: El contexto inglés indica agreement alto y ningún cambio aplicado en la última pasada; por eso la versión española sigue de cerca la decisión auditada de conservar el singular colectivo, la doble imagen de altura y la metáfora de árbol completa, sin introducir paráfrasis interpretativas nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aplica.
  - «Amorreo» se mantiene en singular colectivo para alinearse con el hebreo y con la elección auditada en inglés.
  - «Encinos» se eligió como equivalente natural de אַלּוֹנִים en español latinoamericano; puede variar regionalmente, pero conserva la referencia arbórea.
  - La repetición de «destruí» imita la repetición verbal del hebreo y del inglés POB.
