translation:
  language: es
  text: Estos hombres mataron a sus jóvenes varones con la espada alrededor del santo templo, y no tuvieron compasión de joven varón ni de virgen, de anciano ni de menor[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «no perdonaron a joven varón ni a virgen, a anciano ni a menor».'
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo suministrado para este lugar es sólo aproximado y refleja una redacción distinta; aquí el griego describe específicamente la matanza alrededor del templo.
    reason: cross_reference
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - Estos
  - Ellos
  lexicon: LSJ
  rationale: El demostrativo remite a los invasores ya mencionados. Añadir "hombres" hace explícito el referente en español sin introducir contenido nuevo indebido.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - asesinaron
  lexicon: LSJ
  rationale: El verbo pide un pasado narrativo directo. "Mataron" es natural y fiel; "asesinaron" añade una valoración no exigida por el griego.
- source_word: τοὺς νεανίσκους αὐτῶν
  english_pob_choice: their young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus jóvenes varones
  - sus muchachos
  lexicon: LSJ
  rationale: νεανίσκος se refiere a jóvenes varones, pero el listado posterior ya distingue sexo y edad en categorías paralelas. "Sus jóvenes" evita una redundancia torpe y sigue siendo compatible con el sentido del contexto, aunque reconoce cierta amplitud en el griego.
- source_word: ἐν ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: LSJ
  rationale: La ῥομφαία es un arma cortante/espada de combate. "Con la espada" conserva el instrumento de muerte de forma clara y bíblica en español.
- source_word: περικύκλῳ
  english_pob_choice: around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: LSJ
  rationale: El adverbio indica circunferencia o entorno. "Alrededor" es la opción más natural y precisa en español moderno.
- source_word: τοῦ ἁγίου ἱεροῦ
  english_pob_choice: the holy temple
  chosen_spanish: del santo templo
  alternatives_spanish:
  - del templo santo
  - del templo sagrado
  lexicon: LSJ
  rationale: ἱερόν designa el templo o su recinto; ἁγίου aporta la cualidad de santidad. "Santo templo" mantiene esa combinación sin sustituirla por un término más interpretativo.
- source_word: οὐκ ἐφείσαντο
  english_pob_choice: they showed no mercy to
  chosen_spanish: no tuvieron compasión de
  alternatives_spanish:
  - no perdonaron a
  - no se apiadaron de
  lexicon: LSJ
  rationale: El verbo puede traducirse como "perdonar" o "ahorrar" en el sentido de no dañar; en este contexto de matanza, "no tuvieron compasión de" expresa con claridad la negativa a mostrar clemencia sin forzar una formulación demasiado literal.
- source_word: νεανίσκου
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - joven varón
  - muchacho
  lexicon: LSJ
  rationale: En la serie distributiva singular, el español necesita una forma breve y paralela. "Joven" mantiene la categoría etaria y funciona bien junto a los demás términos.
- source_word: παρθένου
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - muchacha virgen
  lexicon: LSJ
  rationale: παρθένος aquí es un término social/descriptivo. "Virgen" es la traducción más directa y conserva la fuerza lexical del original.
- source_word: πρεσβύτου
  english_pob_choice: old man
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - hombre viejo
  lexicon: LSJ
  rationale: En esta lista de edades, el término no parece de oficio sino de edad avanzada. "Viejo" es el equivalente breve y directo; "anciano" sería igualmente posible pero más estilizado.
- source_word: νεωτέρου
  english_pob_choice: youth
  chosen_spanish: joven
  alternatives_spanish:
  - más joven
  - joven menor
  lexicon: LSJ
  rationale: El comparativo sustantivado puede abarcar a una persona más joven o a la juventud menor en general. "Joven" mantiene el paralelismo y evita introducir una distinción que el español no exige aquí.
theological_decisions:
- issue: Relación con el paralelo hebreo/MT proporcionado
  english_pob_reading: Translate the Greek massacre description directly, while noting that the supplied MT parallel aligns only approximately and reflects a different verse context.
  chosen_spanish_reading: Traducir directamente la descripción griega de la matanza, sin importar el contenido distinto del paralelo hebreo.
  alternative_spanish_readings:
  - Ajustar el verso al lenguaje del paralelo hebreo sobre líderes, pueblo y profanación de la casa de Yahvé.
  - Hacer una traducción híbrida que combine ambos testimonios.
  rationale: La fuente primaria aquí es el griego de Swete; el paralelo hebreo es sólo una verificación aproximada. Introducir su contenido distinto alteraría el versículo en vez de aclararlo.
  doctrine_reference: 'PHILOSOPHY.md: para deuterocanónicos, el texto base es la LXX; los paralelos semíticos son auxiliares, no sustitutos.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto en el punto clave de περικύκλῳ, preferiendo «alrededor»/«around» frente a una forma más pesada. También conserva la lectura griega primaria y evita armonizar con el paralelo hebreo aproximado.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantuvo un registro narrativo sobrio y directo, acorde con el estilo POB.
  - 'Se prefirieron equivalentes claros y actuales: «mataron», «compasión», «alrededor», sin arcaísmos innecesarios.'
  - La serie final conserva el paralelismo del original griego sin sobreinterpretar las categorías de edad y sexo.
