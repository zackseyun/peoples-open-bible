translation:
  language: es
  text: Y ahora[a], he aquí el rey que ustedes han elegido, a quien han pedido; y he aquí que Yahvé ha puesto un rey sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Yahvé les ha dado un rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene la transición discursiva del hebreo con el valor conjuntivo de ו más עתה. En español, «Y ahora» conserva mejor la continuidad retórica que simplemente «Ahora».
- source_word: הִנֵּה
  english_pob_choice: here is
  chosen_spanish: he aquí
  alternatives_spanish:
  - aquí está
  - miren
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre lo que sigue. «He aquí» es una solución formal y fiel, adecuada para un anuncio solemne; evita la tonalidad demasiado coloquial de otras opciones.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se trata del rey específico ya solicitado por el pueblo, por lo que el artículo definido se conserva naturalmente en español.
- source_word: אֲשֶׁר בְּחַרְתֶּם
  english_pob_choice: whom you have chosen
  chosen_spanish: que ustedes han elegido
  alternatives_spanish:
  - que ustedes escogieron
  - al que ustedes han elegido
  lexicon: HALOT
  rationale: בחר expresa elegir/seleccionar; «han elegido» refleja el tiempo perfecto del hebreo y su carácter de acción completada. Se prefiere «que» por fluidez en español, sin perder el referente personal.
- source_word: אֲשֶׁר שְׁאֶלְתֶּם
  english_pob_choice: for whom you have asked
  chosen_spanish: por quien han pedido
  alternatives_spanish:
  - a quien han pedido
  - por quien han solicitado
  lexicon: HALOT
  rationale: שׁאל aquí significa pedir o solicitar. «Por quien han pedido» conserva la relación preposicional marcada por la petición en español y evita una perífrasis innecesaria. Se respeta la intensidad narrativa de 1 Samuel 8 y 12.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y miren
  - y aquí
  lexicon: HALOT
  rationale: La segunda aparición de הִנֵּה vuelve a introducir una conclusión llamativa. «Y he aquí que» conserva el énfasis y la solemnidad del hebreo con un registro publicable en español bíblico contemporáneo.
- source_word: נָתַן יְהוָה
  english_pob_choice: the LORD has set
  chosen_spanish: Yahvé ha puesto
  alternatives_spanish:
  - Yahvé ha dado
  - Yahvé ha establecido
  lexicon: HALOT
  rationale: נתן con עַל y un rey implica colocar/poner en posición de autoridad. «Ha puesto» transmite bien el sentido de instalación sobre el pueblo, sin perder la cercanía al verbo de base. Se usa Yahvé por la política terminológica del proyecto para יְהוָה.
- source_word: עֲלֵיכֶם
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - encima de ustedes
  - por encima de ustedes
  lexicon: HALOT
  rationale: La preposición עַל con un gobernante expresa autoridad sobre el pueblo. «Sobre ustedes» es el equivalente español natural y preserva la idea de dominio/régimen.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'En español, después de «ha puesto», el artículo indefinido expresa mejor la función instaladora del texto: Yahvé ha puesto a un rey sobre ellos. Sin embargo, por la referencia inmediata a un rey concreto, se mantiene el sustantivo en forma simple y clara.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme a la política del proyecto, se conserva el nombre divino en transliteración, y en español la forma establecida es «Yahvé». Se evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó por una revisión que prefirió una formulación más formal para la segunda cláusula de הִנֵּה y ajustó la relación de la petición a una frase preposicional más natural. La redacción española sigue esa orientación formal, pero adapta la sintaxis a un español bíblico fluido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con la política terminológica del proyecto para el Tetragrama.
  - Se usa «he aquí» para ambas ocurrencias de הִנֵּה, evitando una mezcla estilística innecesaria.
  - «Ustedes» conserva un registro neutral y reverente, apto para lectura pública.
  - «Puesto» refleja mejor el valor de instalación/gobierno de נתן con עַל que un simple «dio» en la cláusula principal.
