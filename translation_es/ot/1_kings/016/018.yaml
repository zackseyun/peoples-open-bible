  text: וַ/יְהִ֞י כִּ/רְא֤וֹת זִמְרִי֙ כִּֽי נִלְכְּדָ֣ה הָ/עִ֔יר וַ/יָּבֹ֖א אֶל אַרְמ֣וֹן בֵּית הַ/מֶּ֑לֶךְ וַ/יִּשְׂרֹ֨ף עָלָ֧י/ו אֶת בֵּֽית מֶ֛לֶךְ בָּ/אֵ֖שׁ וַ/יָּמֹֽת־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/016/018.yaml
  text: And when Zimri saw that the city had been captured[a], he went into the citadel of the king’s house and burned the king’s house over himself with fire[b], and died.
  footnotes:
  - marker: a
    text: Or 'fortress' or 'palace' for 'citadel'; the Hebrew אַרְמוֹן can refer to a fortified royal structure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'burned the king’s house over himself with fire,' describing Zimri’s self-destruction by setting the royal residence ablaze around himself.
    reason: cultural_note
