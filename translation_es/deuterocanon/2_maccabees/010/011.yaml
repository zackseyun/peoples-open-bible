translation:
  language: es
  text: Pero, arremetiendo contra los enemigos como leones, abatieron a once mil[a] de ellos, y a mil seiscientos jinetes; y obligaron a todos a huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «mil además de diez mil»; y luego, «seiscientos además de mil» para la caballería.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λεόντινων
  english_pob_choice: like lions
  chosen_spanish: como leones
  alternatives_spanish:
  - leoninos
  - a manera de leones
  lexicon: LSJ
  rationale: El griego expresa una comparación vigorosa; «como leones» conserva la imagen sin volverla artificial en español.
- source_word: ἐντινάξαντες
  english_pob_choice: springing at
  chosen_spanish: arremetiendo
  alternatives_spanish:
  - lanzándose contra
  - saltando sobre
  - hiriendo contra
  lexicon: LSJ
  rationale: La forma participial sugiere un movimiento súbito y agresivo contra el enemigo. «Arremetiendo» comunica bien ese ímpetu en español bíblico moderno.
- source_word: κατέστρωσαν
  english_pob_choice: laid low
  chosen_spanish: abatieron
  alternatives_spanish:
  - derribaron
  - acribillaron
  - tumbaron
  lexicon: LSJ
  rationale: En contexto bélico, el verbo indica abatir o derribar al enemigo. «Abatieron» mantiene la fuerza narrativa y encaja con el registro.
- source_word: χιλίους πρὸς τοῖς μυρίοις
  english_pob_choice: eleven thousand
  chosen_spanish: once mil
  alternatives_spanish:
  - diez mil más mil
  - a mil de diez mil
  - once mil en total
  lexicon: LSJ
  rationale: El giro griego es aditivo, literalmente «mil además de diez mil». En español, «once mil» transmite el total con claridad y fidelidad semántica.
- source_word: ἱππεῖς
  english_pob_choice: cavalry
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - soldados de a caballo
  - caballeros
  lexicon: LSJ
  rationale: Aunque el inglés eligió un término militar colectivo, el griego literalmente nombra a los montados. «Jinetes» conserva el referente humano y bélico de manera natural.
- source_word: ἑξακοσίους πρὸς χιλίοις
  english_pob_choice: one thousand six hundred
  chosen_spanish: mil seiscientos
  alternatives_spanish:
  - seiscientos además de mil
  - mil y seiscientos
  - mil seiscientos jinetes
  lexicon: LSJ
  rationale: Como en el caso anterior, el griego usa una suma idiomática. «Mil seiscientos» es la forma natural y exacta en español.
- source_word: ἠνάγκασαν φεύγειν
  english_pob_choice: forced them all to flee
  chosen_spanish: obligaron a todos a huir
  alternatives_spanish:
  - los forzaron a huir
  - los compelieron a huir
  - los hicieron huir
  lexicon: LSJ
  rationale: La construcción causativa indica que hicieron tomar la fuga al enemigo. «Obligaron a todos a huir» conserva el sentido y el alcance total del sujeto griego.
translation_notes:
  revision_awareness: El contexto inglés fue revisado para preferir cifras formales («one thousand six hundred») y mantener el valor aditivo del griego en la nota. La versión española sigue esa misma lógica, pero naturaliza los números en la línea principal como totals de lectura fluida.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología litúrgica ajena porque el versículo no contiene el nombre divino.
  - Se preserva la imagen leonina y el tono bélico sin suavizar la violencia del pasaje.
  - «Jinetes» se eligió frente a «caballería» para reflejar el sustantivo personal griego ἱππεῖς, aunque el sentido militar colectivo queda implícito.
