translation:
  language: es
  text: Y se cumplieron siete días después de que Yahvé hirió al Nilo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y siete días pasaron después de que Yahvé hirió al Nilo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Nilo»; a veces se vierte de manera más general como «el río».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵא
  english_pob_choice: were fulfilled
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - pasaron
  - fueron completados
  - se cumplieron plenamente
  lexicon: HALOT
  rationale: El niphal de מלא aquí expresa la plenitud o cumplimiento de un periodo de tiempo. «Se cumplieron» mantiene ese valor resultativo y suena natural en español, sin perder la idea de que el periodo quedó completo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - siete jornadas
  lexicon: HALOT
  rationale: La construcción numérica es directa; «siete días» comunica con claridad el lapso temporal sin añadir matices no presentes en el hebreo.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  lexicon: HALOT
  rationale: La preposición temporal indica posterioridad. «Después de» es natural y fiel al valor básico del término.
- source_word: הַכּוֹת
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - azotó
  - hirió con golpes
  lexicon: HALOT
  rationale: El infinitivo constructo de נכה en este contexto de juicio/plaga puede expresarse en español con un verbo fuerte y sobrio. «Hirió» conserva la fuerza del acto divino sin volverse demasiado coloquial ni suavizar el golpe/judgment.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino en forma transliterada, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma elegida para el texto principal en español.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo. «El Nilo» comunica el referente concreto con precisión; se conserva la alternativa más general en nota.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La elección de «Yahvé» preserva el nombre propio revelado a Israel y evita la sustitución por un título, siguiendo el criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de וַיִּמָּלֵא en relación con el tiempo
  english_pob_reading: were fulfilled
  chosen_spanish_reading: se cumplieron
  alternative_spanish_readings:
  - pasaron
  - fueron completados
  rationale: La forma verbal no solo indica transcurso, sino culminación de un periodo. «Se cumplieron» conserva esa idea de término/plenitud sin imponer una paráfrasis explicativa.
  doctrine_reference: Principio de equivalencia óptima y fidelidad al valor aspectual del hebreo
translation_notes:
  revision_awareness: El auditable inglés POB pasó de «were completed» a «were fulfilled» para reflejar mejor וַיִּמָּלֵא. La versión española sigue esa revisión con «se cumplieron», manteniendo el sentido de tiempo completado. También conserva la especificidad de «the Nile» como «el Nilo» y el nombre divino «Yahvé» conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto para el nombre divino.
  - «El Nilo» evita ambigüedad en un contexto egipcio donde יְאֹר designa específicamente ese río.
  - El verbo «se cumplieron» conserva el valor de cierre temporal sin forzar una traducción demasiado literal de la construcción hebrea.
