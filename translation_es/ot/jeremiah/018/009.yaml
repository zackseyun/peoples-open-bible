translation:
  language: es
  text: Y en otro momento puedo hablar acerca de una nación y acerca de un reino[a], para edificar y para plantar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y en un momento hablo acerca de una nación y acerca de un reino, para edificar y para plantar». El hebreo usa el lenguaje de «momento» para enmarcar las declaraciones de Dios en los vv. 7–10.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רֶגַע
  english_pob_choice: And at another moment
  chosen_spanish: Y en otro momento
  alternatives_spanish:
  - Y en un instante
  - Y en un momento
  - Y de repente
  lexicon: HALOT
  rationale: רֶגַע expresa un momento o instante. En este contexto contrastivo con la cláusula anterior, “en otro momento” conserva la idea temporal y el paralelismo sin sonar forzado en español.
- source_word: אֲדַבֵּר
  english_pob_choice: I may speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - puede que hable
  - hablo
  - declararé
  lexicon: HALOT
  rationale: El verbo hebreo está en imperfecto dentro de un marco profético de escenario. En español, el futuro simple funciona bien para expresar la acción en ese marco sin añadir una duda ajena al texto; se mantiene “hablar” como verbo base.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  - contra
  lexicon: HALOT
  rationale: Con דבר על, el sentido es hablar con referencia a algo. “Acerca de” es natural y preciso en español; evita introducir la idea de hostilidad que tendría “contra”.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: גּוֹי suele designar una entidad política o colectiva. “Nación” preserva mejor la pareja con “reino” y el alcance corporativo del pasaje.
- source_word: מַמְלָכָה
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio real
  - realeza
  lexicon: HALOT
  rationale: מַמְלָכָה se refiere a un reino. “Reino” es la equivalencia clara y estándar en español.
- source_word: לִ/בְנֹת
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - para reconstruir
  - para establecer
  lexicon: HALOT
  rationale: בנה significa literalmente “construir/edificar”. “Edificar” conserva el verbo de construcción y suena digno en el registro bíblico español, sin convertirlo en una paráfrasis interpretativa.
- source_word: וְ/לִ/נְטֹעַ
  english_pob_choice: and to plant
  chosen_spanish: y para plantar
  alternatives_spanish:
  - y para sembrar
  - y para establecer
  lexicon: HALOT
  rationale: נטע significa literalmente “plantar”. “Plantar” preserva la imagen agrícola contrastada con “edificar”; no se añadió objeto porque el hebreo no lo expresa explícitamente.
theological_decisions:
- issue: Condicionalidad divina en lenguaje profético
  english_pob_reading: I may speak concerning a nation and concerning a kingdom, to build and to plant.
  chosen_spanish_reading: hablaré acerca de una nación y acerca de un reino, para edificar y para plantar.
  alternative_spanish_readings:
  - puede que hable acerca de una nación y acerca de un reino, para edificar y para plantar
  - hablo acerca de una nación y acerca de un reino, para edificar y para plantar
  rationale: Jeremías 18:7–10 presenta declaraciones de principio con fuerza situacional. El futuro simple en español mantiene el marco profético y la afirmación divina sin resolver artificialmente la tensión entre anuncio y respuesta humana.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El contexto auditado en inglés revisó una adición no presente en el hebreo; por eso el español no añade ningún objeto explícito a “plantar”. La redacción final mantiene el paralelismo temporal y verbal del hebreo con un español natural.
  spanish_consistency_notes:
  - Se usó “Yahvé” como forma estándar del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se preservó la pareja “edificar / plantar” como imagen literal, sin convertirla en “establecer” o “restaurar”.
  - 'Se evitó traducir mecánicamente desde el inglés: el español usa un futuro simple y una preposición natural (“acerca de”) para reflejar el hebreo y no solo la redacción inglesa.'
