translation:
  language: es
  text: No sobrevendrá[a] ningún mal al justo, pero los impíos están llenos de mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no le ocurrirá ningún mal al justo». El hebreo puede denotar daño, desgracia o calamidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «llenos de calamidad». La última palabra puede referirse al mal moral o al desastre sufrido, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְאֻנֶּה
  english_pob_choice: will happen
  chosen_spanish: sobrevendrá
  alternatives_spanish:
  - le acontecerá
  - le sucederá
  - le sobrevendrá
  lexicon: HALOT
  rationale: El verbo en esta forma pasiva expresa que algo le ocurre o le llega a alguien. «Sobrevendrá» conserva ese sentido de acontecimiento que cae sobre una persona, sin introducir agencia explícita ni suavizar la afirmación.
- source_word: לַצַּדִּיק
  english_pob_choice: to the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al hombre justo
  - al justo persona
  lexicon: HALOT
  rationale: צַדִּיק en literatura sapiencial se refiere al justo en sentido moral y relacional. «Justo» es la opción más natural y fiel en español, y mantiene el paralelismo con «impíos».
- source_word: כָּל אָוֶן
  english_pob_choice: harm
  chosen_spanish: ningún mal
  alternatives_spanish:
  - ninguna calamidad
  - ningún daño
  - ninguna desgracia
  lexicon: HALOT
  rationale: אָוֶן puede abarcar daño, calamidad o miseria adversa. Dado el paralelismo con la segunda línea y la amplitud semántica, «mal» es una solución breve y amplia; el «ningún» refuerza la negación total del proverbio.
- source_word: וּרְשָׁעִים
  english_pob_choice: but the wicked
  chosen_spanish: pero los impíos
  alternatives_spanish:
  - y los impíos
  - pero los malvados
  - y los malvados
  lexicon: HALOT
  rationale: La waw tiene valor adversativo en el paralelismo antitético. «Impíos» preserva el contraste moral tradicional de רשעים y su tono bíblico, sin reducirlo a mera maldad conductual.
- source_word: מָלְאוּ
  english_pob_choice: are filled
  chosen_spanish: están llenos
  alternatives_spanish:
  - han quedado llenos
  - se han llenado
  - están colmados
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante. «Están llenos» comunica ese estado de manera natural en español y mantiene la fuerza proverbial.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: de mal
  alternatives_spanish:
  - de maldad
  - de calamidad
  - de desgracia
  lexicon: HALOT
  rationale: En este contexto, la POB inglesa optó por «evil» para reflejar más directamente רָע y mantener el contraste con el justo. En español, «mal» preserva esa amplitud entre mal moral y mal adverso; la construcción «llenos de mal» es idiomática y fiel.
theological_decisions:
- issue: Lenguaje absoluto sobre el justo
  english_pob_reading: Render the statement straightforwardly as a wisdom generalization without softening or systematizing it.
  chosen_spanish_reading: 'La declaración se mantiene como una generalización sapiencial directa: no se suaviza a «en general» ni se añade un límite interpretativo.'
  alternative_spanish_readings:
  - No le vendrá ningún mal al justo, en sentido último.
  - Ningún mal definitivo sobrevendrá al justo.
  rationale: El hebreo presenta una formulación breve y absoluta. La traducción debe conservar esa fuerza proverbial sin introducir calificadores teológicos que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica de la sabiduría bíblica sin resolverla artificialmente.
- issue: Rָע como mal moral o adversidad
  english_pob_reading: The final word can refer either to moral evil or to disastrous trouble, depending on context.
  chosen_spanish_reading: «Mal» deja abierta la tensión entre mal moral y mal adverso, sin cerrarla prematuramente.
  alternative_spanish_readings:
  - «Calamidad» interpreta רָע como desastre o desgracia.
  - «Maldad» lo restringe al plano moral.
  rationale: La segunda cola del proverbio admite una ambigüedad real que conviene no eliminar. «Mal» permite que el lector perciba tanto el sentido moral como el experiencial, tal como lo hace el hebreo en este contexto.
  doctrine_reference: Mantener la ambigüedad léxica documentada por el texto fuente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió reflejar רָע con mayor cercanía semántica al optar por «evil» en inglés. En español, «mal» conserva esa amplitud y evita estrechar indebidamente el campo semántico. Se mantuvo la estructura antitética del proverbio y la negación enfática del primer hemistiquio.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando corresponda al Tetragrámaton; en este versículo no aparece.
  - «Justo» y «impíos» mantienen el paralelismo moral sapiencial habitual.
  - Se prefirió una solución idiomática breve, sin añadir notas doctrinales al texto principal.
  - Las notas a y b se anclan en palabras del texto para reflejar las alternativas léxicas reales documentadas por el audit trail.
