lexical_decisions:
- source_word: βαρύνῃς
  english_pob_choice: make your hand heavy
  chosen_spanish: hagas pesada
  alternatives_spanish:
  - pongas pesada
  - oprimas
  - cargues pesadamente
  lexicon: BDAG
  rationale: El griego expresa la idea de volver pesada la mano; en español, 'hagas pesada tu mano' conserva la imagen concreta y el tono formal sin sonar forzado.
- source_word: χεῖρά
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - golpe
  - brazo
  lexicon: BDAG
  rationale: Se mantiene la imagen corporal de 'mano', que en lenguaje bíblico conserva el sentido de acción o poder ejercido sobre alguien.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - contra nosotros
  - encima de nosotros
  lexicon: BDAG
  rationale: '''Sobre nosotros'' conserva la metáfora de peso y presión sin restringir prematuramente el matiz a hostilidad explícita.'
- source_word: ἵνα μὴ
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - no sea que
  lexicon: BDAG
  rationale: En español, 'para que no' comunica la finalidad negativa del giro griego con naturalidad y solemnidad; 'no sea que' es una alternativa posible pero menos directa.
- source_word: διʼ ἀνάγκην
  english_pob_choice: under compulsion
  chosen_spanish: por necesidad
  alternatives_spanish:
  - bajo compulsión
  - forzados
  - por presión
  lexicon: BDAG
  rationale: '''ἀνάγκη'' expresa necesidad o constricción; ''por necesidad'' mantiene la ambigüedad entre necesidad y presión externa, sin introducir un matiz psicológico ajeno al texto.'
- source_word: ἁμάρτωμεν
  english_pob_choice: we sin
  chosen_spanish: pequemos
  alternatives_spanish:
  - pecaremos
  - caigamos en pecado
  lexicon: BDAG
  rationale: El subjuntivo con 'para que no' se vierte naturalmente como 'pequemos'; mantiene la relación dependiente del ruego y la acción de faltar a Dios.
theological_decisions:
- issue: Relación entre presión divina y pecado humano
  english_pob_reading: Do not make your hand heavy upon us, lest we sin under compulsion.
  chosen_spanish_reading: No hagas pesada tu mano sobre nosotros, para que no pequemos por necesidad.
  alternative_spanish_readings:
  - No hagas pesada tu mano sobre nosotros, no sea que pequemos por necesidad.
  - No hagas pesada tu mano sobre nosotros, para que no pequemos bajo presión.
  rationale: 'El texto presenta una tensión teológica: la comunidad pide que Yahvé no los oprima de tal modo que el resultado sea el pecado. La traducción conserva esa tensión sin suavizarla ni convertirla en una simple petición de alivio general.'
  doctrine_reference: Sal 38:2; Sal 90:8; Stg 1:13-15
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más literal del inglés POB: ''make your hand heavy'' y ''lest''. En español se optó por una fórmula equivalente y natural (''hagas pesada tu mano'' / ''para que no''), manteniendo la imagen de la mano pesada y la cláusula de prevención sin perder el matiz de constricción de ἀνάγκη.'
  spanish_consistency_notes:
  - Se conserva el registro solemne y bíblico, evitando reemplazar 'mano' por una abstracción como 'poder'.
  - '''Por necesidad'' mantiene el campo semántico de ἀνάγκη sin decidir entre ''necesidad'' y ''presión'', ambas posibles en el contexto.'
  - Se usa 'pequemos' para reflejar el subjuntivo dependiente del ruego y no una afirmación indicativa.
