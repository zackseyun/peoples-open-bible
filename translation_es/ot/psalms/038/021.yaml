translation:
  language: es
  text: Y los que pagan mal por bien se me oponen[a], porque yo persigo lo bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «se me oponen en pago de mi perseguir lo bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מְשַׁלְּמֵי
  english_pob_choice: those who repay
  chosen_spanish: los que pagan
  alternatives_spanish:
  - los que retribuyen
  - los que recompensan
  lexicon: HALOT
  rationale: El participio de שלם expresa la idea de devolver o corresponder en pago. «Pagan» comunica bien la reciprocidad y es natural en español.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - daño
  lexicon: HALOT
  rationale: En la antítesis «mal por bien», «mal» conserva la fuerza moral y mantiene una correspondencia idiomática clara con «bien».
- source_word: תַּ֣חַת
  english_pob_choice: for / in return for
  chosen_spanish: por
  alternatives_spanish:
  - en pago de
  - a cambio de
  - en lugar de
  lexicon: HALOT
  rationale: Aquí la preposición marca intercambio o retribución. «Por» reproduce de forma breve y natural la relación de correspondencia en español.
- source_word: טוֹבָ֑ה
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - beneficio
  - lo bueno
  lexicon: HALOT
  rationale: «Bien» es el correlato natural de «mal» en español y conserva la oposición del hebreo sin sobreexplicar la naturaleza del acto bueno.
- source_word: יִ֝שְׂטְנ֗וּ/נִי
  english_pob_choice: oppose me
  chosen_spanish: me son adversarios
  alternatives_spanish:
  - me se oponen
  - me adversan
  - me contradicen
  lexicon: HALOT
  rationale: El verbo de שטן comunica la idea de adversidad u oposición. «Me son adversarios» preserva el valor relacional y evita reducirlo solo a un gesto puntual de oposición.
- source_word: רדופ/י
  english_pob_choice: I pursue
  chosen_spanish: yo sigo
  alternatives_spanish:
  - yo persigo
  - yo busco con empeño
  - yo voy tras
  lexicon: HALOT
  rationale: Aunque el verbo base es «perseguir», aquí el objeto es «lo bueno»; «seguir» en español fluye de modo natural y puede expresar perseverancia en lo recto. Se mantiene una nota para la lectura más literal.
- source_word: טוֹב
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  lexicon: HALOT
  rationale: La forma adjetival funciona sustantivamente. «Lo bueno» hace explícito el objeto de la acción sin perder la concisión del hebreo.
theological_decisions:
- issue: Sentido causal o de retribución de תַּחַת en la segunda cláusula
  english_pob_reading: because I pursue what is good
  chosen_spanish_reading: porque yo sigo lo bueno
  alternative_spanish_readings:
  - en pago de mi seguir lo bueno
  - a causa de que persigo lo bueno
  - en retorno por mi perseguir el bien
  rationale: El hebreo permite una lectura retributiva («en retorno por») y una lectura causal. Para el texto principal se adopta la causal, ya que en español expresa con mayor claridad por qué actúan como adversarios, sin borrar la tensión del hebreo ni la alternativa más literal.
  doctrine_reference: Translation philosophy §6 (legibilidad moderna con fidelidad al sentido)
- issue: Valor de שטן como oposición adversarial
  english_pob_reading: oppose me
  chosen_spanish_reading: me son adversarios
  alternative_spanish_readings:
  - me acusan
  - me atacan
  - me hacen oposición
  rationale: Se evita estrechar el verbo a un sentido judicial («acusan») o emocional («odian»). La formulación conserva la idea de hostilidad/oposición relacional que documenta el hebreo.
  doctrine_reference: HALOT s.v. שטן; principio de no sobreespecificar el sentido
- issue: Preferencia por «mal/bien» frente a «maldad/bondad»
  english_pob_reading: evil for good
  chosen_spanish_reading: mal por bien
  alternative_spanish_readings:
  - maldad por bondad
  - daño por beneficio
  rationale: El paralelismo antitético del verso es más directo y memorable con «mal por bien». Mantiene el contraste moral sin introducir matices que el hebreo no exige.
  doctrine_reference: Poética hebrea y equivalencia óptima
translation_notes:
  revision_awareness: 'La versión española sigue el mismo juicio de la POB inglesa: la segunda cláusula de תַּחַת se entiende mejor como causal en la traducción corriente, aunque queda disponible una lectura más literal de retribución en la nota. No se introdujeron cambios respecto del último pase registrado.'
  spanish_consistency_notes:
  - Se mantiene «bien/lo bueno» como correlato de «evil/good» para conservar el paralelismo.
  - «Me son adversarios» refleja oposición hostil sin convertir el verbo en término judicial.
  - La nota marca la alternativa más literal sin duplicar el sentido principal en el cuerpo del texto.
  - Se prefirió «seguir» para una lectura fluida, pero la nota preserva la conexión con «pursue» del audit trail inglés.
