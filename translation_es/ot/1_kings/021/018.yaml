    issue: Relativo locativo «adonde ha bajado»
    rationale: El hebreo אֲשֶׁר יָרַד שָׁם fue auditado como «where he has gone down». En español, después de «está en la viña», «donde ha bajado» comunica mejor el vínculo locativo y suena más natural que «adonde ha bajado», que enfatiza dirección hacia un destino ya alcanzado y queda algo rígido en esta construcción.
  revised_spanish_text: Levántate[a], desciende al encuentro de Acab, rey de Israel, que está en Samaria. Mira, está en la viña de Nabot, donde ha bajado para tomar posesión de ella.
