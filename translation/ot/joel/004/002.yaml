id: JOL.4.2
reference: Joel 4:2
source:
  edition: WLC
  text: וְ/קִבַּצְתִּי֙ אֶת כָּל הַ/גּוֹיִ֔ם וְ/ה֣וֹרַדְתִּ֔י/ם אֶל עֵ֖מֶק יְהֽוֹשָׁפָ֑ט וְ/נִשְׁפַּטְתִּ֨י עִמָּ֜/ם שָׁ֗ם עַל עַמִּ֨/י וְ/נַחֲלָתִ֤/י יִשְׂרָאֵל֙ אֲשֶׁ֣ר פִּזְּר֣וּ בַ/גּוֹיִ֔ם וְ/אֶת אַרְצִ֖/י חִלֵּֽקוּ־־־־־׃
translation:
  text: I will gather all the nations and bring them down to the Valley of Jehoshaphat[a], and there I will enter into judgment with them on behalf of my people and my inheritance, Israel[b], whom they scattered among the nations and divided up my land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of my people and my inheritance, Israel' or 'concerning my people and my inheritance, Israel.' The Hebrew preposition can be understood in more than one closely related judicial sense.
    reason: alternative_reading
  - marker: b
    text: '''The Valley of Jehoshaphat'' is a place name; the name itself may echo the idea ''the LORD judges.'''
    reason: cultural_note
lexical_decisions:
- source_word: קִבַּצְתִּי
  chosen: I will gather
  alternatives:
  - I will assemble
  lexicon: HALOT
  rationale: The verb קבץ commonly means to gather or assemble. 'Gather' is the most natural modern English rendering and fits the prophetic context of summoning nations for judgment.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign peoples/nations collectively, not specifically 'Gentiles' in a later technical sense. 'Nations' is the clearest contextual rendering.
- source_word: הוֹרַדְתִּים
  chosen: bring them down
  alternatives:
  - cause them to go down
  - lead them down
  lexicon: HALOT
  rationale: The Hiphil of ירד is causative, 'cause to go down.' 'Bring them down' preserves the causative sense while remaining idiomatic in English.
- source_word: עֵמֶק יְהוֹשָׁפָט
  chosen: the Valley of Jehoshaphat
  alternatives:
  - the valley of Yahweh judges
  - the Valley of the LORD judges
  lexicon: HALOT
  rationale: As a proper place name, it is transliterated per translation philosophy. The name's meaning may be theologically suggestive, but the text presents it as a toponym.
- source_word: וְנִשְׁפַּטְתִּי עִמָּם
  chosen: I will enter into judgment with them
  alternatives:
  - I will judge them there
  - I will contend with them there in judgment
  lexicon: HALOT
  rationale: The Niphal of שפט with עִם can convey entering into judgment/legal contention with someone, not merely pronouncing a verdict. 'Enter into judgment with them' preserves the juridical nuance better than the simpler 'judge them.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: A straightforward locative adverb referring to the Valley of Jehoshaphat.
- source_word: עַל עַמִּי וְנַחֲלָתִי יִשְׂרָאֵל
  lemma: עַל
  chosen: on behalf of my people and my inheritance, Israel
  alternatives:
  - because of my people and my inheritance, Israel
  - concerning my people and my inheritance, Israel
  lexicon: HALOT
  rationale: The preposition עַל here introduces the grounds or cause of the judgment. 'On behalf of' communicates that the nations are judged because of what they did to God's people, while preserving the relational force of the phrase. 'My inheritance' reflects נַחֲלָה, a covenantal possession term, and 'Israel' appositionally identifies the people.
- source_word: פִּזְּרוּ
  chosen: they scattered
  alternatives:
  - they dispersed
  lexicon: HALOT
  rationale: פזר means to scatter or disperse. 'Scattered' is vivid and standard in exile/judgment contexts.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: Here again גּוֹיִם refers to the nations among whom Israel was dispersed. 'Among the nations' is contextually and stylistically preferable.
- source_word: אַרְצִי
  chosen: my land
  alternatives:
  - my country
  lexicon: HALOT
  rationale: אֶרֶץ here refers specifically to the land belonging to the LORD in covenantal context. 'My land' preserves both the territorial and theological sense.
- source_word: חִלֵּקוּ
  chosen: divided up
  alternatives:
  - divided
  - apportioned
  lexicon: HALOT
  rationale: חלק in the Piel means to divide or apportion. 'Divided up' is idiomatic and conveys the concrete act of partitioning the land.
