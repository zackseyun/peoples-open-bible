    text: O, más formalmente, «al lugar del cual te hablé».
    reason: lexical_alternative
  - marker: b
    text: «Mi ángel» también podría traducirse «mi mensajero»; el hebreo permite ambos sentidos, aunque «ángel» encaja mejor en este contexto.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite el verbo פקד: literalmente, «en el día de mi visitar, visitaré sobre ellos su pecado».'
    reason: lexical_alternative
  revision_rationale: Se corrige un calco no idiomático («he hablado a ti») por una formulación natural y fiel al hebreo («al lugar del que te hablé»), y se restaura la nota [a] del expediente inglés. También se normalizan los marcadores para que aparezcan en orden y anclados correctamente en el texto.
