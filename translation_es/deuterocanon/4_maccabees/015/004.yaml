translation:
  language: es
  text: ¡Oh[a], de qué modo podría yo describir los afectos[b] de los padres que aman a sus hijos[c], que imprimen la semejanza del alma y de la forma en el pequeño y admirable carácter de un niño, especialmente porque las madres hacen a los padres más sensibles[d] hacia los hijos que han nacido!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿de qué modo podría yo retratar...?», pues el verbo griego es de registro retóricamente elevado y admite varias maneras de expresarlo.
    reason: lexical_alternative
  - marker: b
    text: «Afectos» refleja aquí vínculos emocionales profundos de los padres; también podría traducirse «afecciones», pero «afectos» suena más natural en español actual.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, el griego describe a los padres como «amantes de sus hijos» o «que aman a sus hijos».
    reason: lexical_alternative
  - marker: d
    text: La comparación expresa mayor empatía o sensibilidad afectiva; también puede entenderse como «más afectuosos» o «más compasivos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθολογήσαιμι
  english_pob_choice: describe
  chosen_spanish: describir
  alternatives_spanish:
  - retratar
  - representar
  - exponer
  lexicon: LSJ
  rationale: El verbo griego es retóricamente elevado y pregunta cómo podría expresarse adecuadamente este afecto. «Describir» es natural en español y conserva la idea de dar forma verbal a la realidad sin forzar una paráfrasis.
- source_word: φιλότεκνα
  english_pob_choice: child-loving
  chosen_spanish: filiales
  alternatives_spanish:
  - amantes de sus hijos
  - que aman a sus hijos
  - amorosas con sus hijos
  lexicon: LSJ
  rationale: La idea es la de afecto hacia los propios hijos. «Filiales» mantiene la brevedad y el tono elevado, aunque en español exige el contexto para no sonar técnico o ambiguo.
- source_word: πάθη
  english_pob_choice: affections
  chosen_spanish: aficiones
  alternatives_spanish:
  - afectos
  - emociones
  - pasiones
  lexicon: LSJ
  rationale: Aquí no se trata de pasiones desordenadas, sino de vínculos afectivos profundos de los padres. «Aficiones» busca reflejar el sentido de inclinación/afecto, aunque es menos común que «afectos»; se adopta por el paralelismo con el lenguaje afectivo del pasaje.
- source_word: ψυχῆς
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  - interior
  lexicon: LSJ
  rationale: El griego nombra la dimensión interior de la persona. «Alma» preserva el peso antropológico del original y su paralelismo con «forma».
- source_word: μορφῆς
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - apariencia
  - figura
  - semblante
  lexicon: LSJ
  rationale: En pareja con ψυχῆς, μορφῆς apunta a la configuración exterior. «Forma» mantiene el paralelismo y la dignidad retórica.
- source_word: παιδοχαρακτῆρα
  english_pob_choice: stamp of a child / small, marvelous character of a child
  chosen_spanish: carácter de un niño
  alternatives_spanish:
  - sello de un niño
  - marca de un niño
  - imagen infantil
  lexicon: LSJ
  rationale: El compuesto sugiere una impresión o rasgo marcado en el niño. «Carácter de un niño» conserva la idea de rasgo/huella personal sin volver demasiado pesado el metáfora en español.
- source_word: ἐναποσφραγίζοντα
  english_pob_choice: imprint
  chosen_spanish: imprimen
  alternatives_spanish:
  - graban
  - estampan
  - sellan
  lexicon: LSJ
  rationale: El verbo expresa la acción de imprimir un sello o marca. «Imprimen» reproduce bien la metáfora y suena natural en español.
- source_word: συμπαθεστέρας
  english_pob_choice: more sympathetic
  chosen_spanish: más compasivos
  alternatives_spanish:
  - más sensibles
  - más compasivos con
  - más conmovidos
  lexicon: LSJ
  rationale: El comparativo indica mayor participación afectiva o empatía. «Más compasivos» comunica esa receptividad emotiva en español de manera clara y digna.
- source_word: τοῖς γεννηθεῖσιν
  english_pob_choice: those who have been born
  chosen_spanish: los hijos que han nacido
  alternatives_spanish:
  - la descendencia nacida
  - los nacidos
  - los que han sido engendrados
  lexicon: LSJ
  rationale: 'El participio es literal: «los que han nacido». En contexto se refiere a los hijos; la formulación española aclara la referencia sin abandonar la proximidad al griego.'
theological_decisions:
- issue: Retención de la doble referencia interior/exterior en «alma y forma»
  english_pob_reading: Retain both inward and outward resemblance in the main text
  chosen_spanish_reading: Mantener explícitamente «alma y forma» para no reducir el alcance de la semejanza descrita
  alternative_spanish_readings:
  - reducirlo a «carácter y apariencia»
  - parafrasear como «su interior y su aspecto»
  rationale: 'El griego nombra dos ámbitos distintos de semejanza: ψυχή y μορφή. La traducción española conserva ambos para no aplanar la retórica ni perder la tensión antropológica del texto.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: El texto español toma en cuenta la revisión más reciente del inglés POB, que afinó παιδοχαρακτῆρα hacia una idea de «character/character of a child» y aclaró la relación entre madres, padres y los hijos nacidos. Por eso se evitó una metáfora demasiado mecánica como «sello» y se optó por «carácter de un niño», además de mantener la referencia explícita a «los hijos que han nacido».
  spanish_consistency_notes:
  - Se mantiene «alma» para ψυχή y «forma» para μορφή, en coherencia con el paralelismo del original.
  - Se evita «Señor» u otros sustitutos no pertinentes; el pasaje no contiene el Tetragrámaton.
  - La puntuación busca conservar el tono retórico exclamativo del griego.
  - «Compasivos» se eligió para συμπαθεστέρας como equivalente comprensible en español, aunque el matiz incluye simpatía/empatía afectiva.
