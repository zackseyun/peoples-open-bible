translation:
  language: es
  text: No violaré mi pacto[b][a], ni cambiaré lo que ha salido de mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «profanaré mi pacto» o «romperé mi pacto».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la salida de mis labios»; es decir, lo que he hablado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחַלֵּל
  english_pob_choice: violate
  chosen_spanish: profanaré
  alternatives_spanish:
  - violaré
  - romperé
  lexicon: HALOT
  rationale: El piel de חלל aquí expresa tratar el pacto como algo profanado o deshonrado. En español, «profanaré» conserva esa carga de desacralización y mantiene la seriedad del término pactal. «Violaré» y «romperé» son posibles, pero «profanaré» refleja mejor la opción léxica abierta en el audit trail inglés.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: בְּרִית es el término bíblico estándar de pacto; en español, «pacto» es claro y natural para lectores eclesiales amplios. «Alianza» también sería posible, pero «pacto» mantiene mejor la concreción del término hebreo sin introducir un matiz diplomático moderno.
- source_word: מוֹצָא שְׂפָתַי
  english_pob_choice: what has gone out from my lips
  chosen_spanish: lo que ha salido de mis labios
  alternatives_spanish:
  - la salida de mis labios
  - lo que mis labios han pronunciado
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «la salida de mis labios», un modismo para la palabra pronunciada. «Lo que ha salido de mis labios» preserva la imagen original y suena natural en español. La alternativa más interpretativa «lo que mis labios han pronunciado» es válida, pero pierde un poco la metáfora del movimiento de salida.
- source_word: אֲשַׁנֶּה
  english_pob_choice: alter
  chosen_spanish: cambiaré
  alternatives_spanish:
  - alteraré
  - modificaré
  lexicon: HALOT
  rationale: שנה en piel significa cambiar o alterar. En español, «cambiaré» es la forma más natural y directa, y conserva el paralelismo con la primera cláusula sin sobrecargar el estilo.
- source_word: לֹא ... לֹא
  english_pob_choice: I will not ... or alter ...
  chosen_spanish: No ... ni ...
  alternatives_spanish:
  - No ... y no ...
  - No ... tampoco ...
  lexicon: HALOT
  rationale: La doble negación enfatiza dos rechazos paralelos. En español, «No ... ni ...» reproduce con claridad ese paralelismo y mantiene fluidez literaria.
theological_decisions:
- issue: Lenguaje de compromiso divino y fidelidad al pacto
  english_pob_reading: Retain covenantal and promissory language without expanding into doctrinal paraphrase about divine immutability.
  chosen_spanish_reading: Conservar el lenguaje concreto del pacto y de la palabra pronunciada, sin convertir el versículo en una paráfrasis doctrinal sobre la inmutabilidad divina.
  alternative_spanish_readings:
  - No quebrantaré mi promesa
  - No traicionaré mi pacto
  rationale: El verso habla específicamente del pacto de Yahvé y de lo que ha salido de sus labios. La redacción española conserva esa concreción y evita reemplazarla por formulaciones más generales o teológicas que no están expresadas de forma explícita en el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el último repaso del expediente: no se registraron cambios posteriores y la evaluación de revisión indicó acuerdo alto; por tanto, esta redacción mantiene intacta la decisión óptima ya establecida en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece un sustituto nominal del nombre divino, sino habla directa en primera persona.
  - Se mantiene el paralelismo hebreo entre el pacto y la palabra pronunciada, evitando suavizar la segunda cola en una formulación doctrinal general.
  - «Pacto» se conserva como término bíblico principal para בְּרִית, en coherencia con la terminología POB y con la claridad para lectores de español.
