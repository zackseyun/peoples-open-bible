translation:
  language: es
  text: 'Los hijos de Madián: Efa, Efer, Hanoc[a], Abida y Eldaa. Todos estos fueron hijos de Quetura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Hanoc; tradicionalmente, en algunas Biblias españolas aparece como «Enoc».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: El constructo plural de בֵּן se traduce de manera natural y fiel como 'hijos de' en español genealógico. No se conserva una conjunción inicial explícita porque, en español, el encabezado de una lista así se lee con más claridad sin 'y'.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico la forma usual y más reconocible es 'Madián'. Mantiene el referente histórico-geográfico sin añadir interpretación.
- source_word: עֵיפָה
  english_pob_choice: Ephah
  chosen_spanish: Efa
  alternatives_spanish:
  - Efa
  - Eifah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con forma breve y estándar 'Efa', más natural para la lectura bíblica en español que una transliteración más rígida.
- source_word: וָעֵפֶר
  english_pob_choice: Epher
  chosen_spanish: Efer
  alternatives_spanish:
  - Efer
  - Epher
  lexicon: HALOT
  rationale: Nombre propio; se mantiene una transliteración directa y fonéticamente cercana en español. La conjunción hebrea queda absorbida por la enumeración española.
- source_word: וַחֲנוֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoq
  alternatives_spanish:
  - Hanoq
  - Hanoch
  - Enoc
  lexicon: HALOT
  rationale: El texto hebreo presenta חֲנוֹךְ, que en una genealogía se representa mejor directamente como nombre propio hebreo transliterado. Se evita 'Enoc' porque esa forma tradicional española puede ocultar la forma precisa del nombre en esta lista. Se usa 'q' para reflejar la oclusiva final del nombre hebreo de modo auditable.
- source_word: וַאֲבִידָע
  english_pob_choice: Abida
  chosen_spanish: Abida
  alternatives_spanish:
  - Abida
  - Abidá
  lexicon: HALOT
  rationale: Nombre propio; la forma ya es suficientemente natural en español y coincide con la tradición transliterada común.
- source_word: וְאֶלְדָּעָה
  english_pob_choice: and Eldaah
  chosen_spanish: y Eldaá
  alternatives_spanish:
  - y Eldaá
  - Eldaá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la vocal final para reflejar el hebreo y se mantiene la conjunción 'y' antes del último elemento de la serie, como exige el español.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos estos
  - Todos ellos
  lexicon: HALOT
  rationale: La frase resumidora se vierte de manera directa y natural. 'Todos estos' mantiene el demostrativo proximal del hebreo sin añadir sustantivos no presentes.
- source_word: בְּנֵי קְטוּרָה
  english_pob_choice: were the sons of Keturah
  chosen_spanish: fueron hijos de Queturá
  alternatives_spanish:
  - fueron hijos de Queturá
  - eran hijos de Queturá
  - eran los hijos de Queturá
  lexicon: HALOT
  rationale: El hebreo identifica a los nombrados como descendientes de Queturá; en español, 'fueron hijos de' comunica con claridad la relación genealógica sin añadir una frase posesiva innecesaria. Se usa 'Queturá' como transliteración española estable del nombre propio.
- source_word: קְטוּרָה
  english_pob_choice: Keturah
  chosen_spanish: Queturá
  alternatives_spanish:
  - Queturá
  - Keturá
  lexicon: HALOT
  rationale: Nombre propio transliterado con ortografía española 'Qu-' para representar el sonido velar inicial de manera natural en español. La acentuación final ayuda a la pronunciación y lectura pública.
theological_decisions:
- issue: Tratamiento de nombres propios genealógicos sin sustitución por formas tradicionales que oscurecen el hebreo
  english_pob_reading: Hanoch is retained instead of the traditional English 'Enoch' because the Hebrew form is best represented directly in a genealogical list.
  chosen_spanish_reading: Hanoq se conserva como transliteración directa del hebreo en esta lista genealógica, en vez de sustituirlo por Enoc.
  alternative_spanish_readings:
  - Enoc
  - Hanoch
  rationale: No hay tensión doctrinal, pero sí una decisión de fidelidad onomástica. La forma tradicional 'Enoc' es conocida en español, pero aquí podría desdibujar la correspondencia con el hebreo de esta genealogía. La transliteración directa mantiene la trazabilidad del nombre sin alterar el contenido.
  doctrine_reference: Principio de fidelidad onomástica y transparencia textual
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no requieren cambios textuales adicionales. La principal decisión de revisión es la adaptación onomástica al español, preservando la lista genealógica y la conclusión resumidora sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo el orden genealógico del hebreo y el cierre resumidor 'Todos estos fueron hijos de Queturá'.
  - Se prefirió transliteración española consistente para los nombres propios, evitando traducciones o equivalencias tradicionales cuando podían ocultar el hebreo subyacente.
  - La puntuación de lista con dos puntos después de 'Madián' sigue el patrón del texto inglés POB y ayuda a la lectura pública en español.
  - Se usó 'y' solo antes del último elemento de la serie, conforme al estilo natural del español.
  - La nota al pie se ancla solo en Hanoq, donde el inglés POB documenta una alternativa tradicional relevante.
