  text: 여러분이 내 안에 거하고 내 말이 여러분 안에 거하면, 무엇이든 원하는 대로 구하십시오. 그러면 여러분에게 이루어질 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내 안에 머무르고… 내 말이 여러분 안에 머무르면」. μένω는 「거하다·머무르다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「여러분이 바라는 것은 무엇이든」.
    reason: lexical_alternative
