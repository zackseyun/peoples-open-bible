translation:
  language: es
  text: Y se preparan para venir y apoderarse[a] de la fortaleza en la que nos hemos refugiado; y Timoteo dirige su campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomar la fortaleza antes que nosotros» u «ocupar primero la fortaleza». El verbo griego enfatiza una toma preventiva o anticipada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτοιμάζοντές
  english_pob_choice: are preparing
  chosen_spanish: se preparan
  alternatives_spanish:
  - se están preparando
  - se alistan
  - se disponen
  lexicon: LSJ
  rationale: El participio presente con εἰσιν expresa una acción en curso; «se preparan» comunica esa progresividad de modo natural en español sin volver el texto pesado.
- source_word: προκαταλαβέσθαι
  english_pob_choice: to seize
  chosen_spanish: tomar por asalto
  alternatives_spanish:
  - apoderarse de
  - tomar antes
  - ocupar primero
  lexicon: LSJ
  rationale: El compuesto tiene un matiz de toma preemptiva y hostil. «Tomar por asalto» conserva la fuerza militar y evita una expresión demasiado neutra; la preempción queda implícita por el contexto sin añadir una glosa innecesaria al texto principal.
- source_word: τὸ ὀχύρωμα
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fortificación
  - el recinto fortificado
  - el bastión
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. «Fortaleza» es un equivalente natural en español bíblico y comunica bien la idea de refugio defensivo.
- source_word: εἰς ὃ κατεφύγομεν
  english_pob_choice: into which we have fled
  chosen_spanish: a la que hemos huido
  alternatives_spanish:
  - a la que huimos
  - donde nos refugiamos
  - adonde hemos huido
  lexicon: LSJ
  rationale: καταφεύγω expresa huir buscando refugio. «A la que hemos huido» mantiene la relación de dirección y el valor de acción completa con relevancia presente, cercano al audit trail inglés.
- source_word: ἡγεῖται
  english_pob_choice: is leading
  chosen_spanish: va al frente de
  alternatives_spanish:
  - lidera
  - manda
  - está al frente de
  lexicon: LSJ
  rationale: El verbo puede significar conducir o mandar. «Va al frente de» preserva la imagen de liderazgo militar sin forzar un término jerárquico más técnico de lo que exige el griego.
- source_word: τῆς παρεμβολῆς
  english_pob_choice: their camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su campamento militar
  - su ejército
  - su encampamento
  lexicon: LSJ
  rationale: παρεμβολή puede significar campamento o fuerza acampada. «Campamento» es la opción más directa y clara en español; el contexto bélico ya señala su carácter hostil.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés revisado: conserva el presente progresivo de la preparación, omite una expansión interpretativa explícita sobre «antes que nosotros», y mantiene el sentido militar de la toma y del campamento sin sobretraducir.'
  spanish_consistency_notes:
  - 'Se usa una terminología militar transparente y uniforme: «fortaleza», «tomar por asalto», «campamento».'
  - No se introducen términos eclesiásticos ajenos al contexto; el verso describe movimiento militar y asedio.
  - El sujeto plural implícito se mantiene con verbos españoles en tercera plural para reflejar el griego.
