translation:
  language: es
  text: Si has corrido con hombres de a pie y te han cansado, ¿cómo competirás con los caballos? Y si en tierra de paz estás seguro, ¿qué harás en la espesura del Jordán?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el orgullo del Jordán» o «la crecida del Jordán». La expresión hebrea גְּאוֹן הַיַּרְדֵּן es debatida; puede aludir a la vegetación densa a lo largo del Jordán o, de manera más literal, a su «orgullo/majestad».
    reason: alternative_reading
lexical_decisions:
- source_word: רַגְלִים
  english_pob_choice: footmen
  chosen_spanish: los de a pie
  alternatives_spanish:
  - infantería
  - hombres de a pie
  lexicon: HALOT
  rationale: La imagen contrasta corredores a pie con caballos. «Los de a pie» conserva el contraste natural en español sin forzar un tecnicismo militar.
- source_word: רַצְתָּה
  english_pob_choice: have run
  chosen_spanish: has corrido
  alternatives_spanish:
  - corriste
  lexicon: HALOT
  rationale: El perfecto compuesto español funciona bien en la protasis condicional y mantiene la idea de una acción completada que sirve de base a la pregunta retórica.
- source_word: וַיַּלְאוּךָ
  english_pob_choice: have wearied you
  chosen_spanish: te han cansado
  alternatives_spanish:
  - te han fatigado
  - te han agotado
  lexicon: HALOT
  rationale: «Cansar» expresa de forma natural el efecto de la fatiga provocada por la carrera, sin perder el sentido de desgaste del hebreo.
- source_word: תְּתַחֲרֶה
  english_pob_choice: will you compete
  chosen_spanish: competirás
  alternatives_spanish:
  - contenderás
  - correrás a la par
  lexicon: HALOT
  rationale: El verbo apunta a entrar en una competencia o desafío. «Competirás» conserva el sentido general y la fuerza retórica de la pregunta.
- source_word: בְאֶרֶץ שָׁלוֹם
  english_pob_choice: in a land of peace
  chosen_spanish: en tierra de paz
  alternatives_spanish:
  - en una tierra de paz
  - en una tierra pacífica
  lexicon: HALOT
  rationale: Se mantiene la construcción concreta «tierra de paz», que refleja bien el hebreo y sugiere un entorno sin amenaza.
- source_word: בוֹטֵחַ
  english_pob_choice: you are secure
  chosen_spanish: estás seguro
  alternatives_spanish:
  - vives seguro
  - confías
  lexicon: HALOT
  rationale: 'Aquí el sentido es situacional: sentirse a salvo o en seguridad, no una afirmación doctrinal sobre confianza religiosa. «Estás seguro» conserva esa lectura.'
- source_word: גְּאוֹן הַיַּרְדֵּן
  english_pob_choice: the thicket of the Jordan
  chosen_spanish: la espesura del Jordán
  alternatives_spanish:
  - el orgullo del Jordán
  - el oleaje del Jordán
  - la crecida del Jordán
  lexicon: HALOT
  rationale: La expresión es debatida. En español, «espesura» comunica la idea contextual de vegetación densa y peligrosa junto al Jordán, mientras el pie de nota preserva las alternativas literales debatidas.
theological_decisions:
- issue: Sentido de בוֹטֵחַ
  english_pob_reading: situational security rather than explicit trust in God
  chosen_spanish_reading: seguridad circunstancial, no confianza religiosa explícita
  alternative_spanish_readings:
  - confías
  - te apoyas en Dios
  rationale: El contexto contrasta dificultades crecientes; el punto no es una exhortación directa a la fe, sino la facilidad relativa de una situación segura. Por eso se usa «estás seguro».
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Interpretación de גְּאוֹן הַיַּרְדֵּן
  english_pob_reading: a dangerous Jordan thicket/brushland
  chosen_spanish_reading: una espesura peligrosa junto al Jordán
  alternative_spanish_readings:
  - el orgullo del Jordán
  - la crecida del Jordán
  rationale: El hebreo admite varias soluciones. La lectura contextual de maleza/espesura es la más transparente para el lector moderno, sin negar las alternativas literales que siguen siendo posibles.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción española sigue el último pass revisado del POB: «wearied you» pasó a un registro más formal y cercano al léxico base, y «are secure» sustituyó a una formulación más interpretativa. Por eso el español usa «te han cansado» y «estás seguro», manteniendo ese equilibrio entre naturalidad y cercanía al hebreo.'
  spanish_consistency_notes:
  - Se preservó el contraste retórico entre correr con hombres a pie y competir con caballos.
  - «Espesura del Jordán» evita cerrar indebidamente la ambigüedad de גְּאוֹן הַיַּרְדֵּן en el cuerpo principal.
  - «Estás seguro» se eligió por el valor situacional de בוֹטֵחַ en este contexto.
  - No se introdujo lenguaje teológico adicional que el hebreo no exige.
