revisions:
- from: Y tu justicia[a], oh Dios, llega hasta las alturas[b]—tú que has hecho grandes cosas. Oh Dios, ¿quién como tú?
  to: Y tu rectitud[a], oh, Dios, llega hasta las alturas[b]—tú que has hecho grandes cosas. Oh, Dios, ¿quién como tú?
  rationale: Se revisa 'justicia' a 'rectitud' para seguir la decisión principal documentada por el POB para צדקה en este contexto de alabanza al carácter de Dios, dejando 'justicia' como alternativa léxica. También se ajusta la puntuación del vocativo a un español más natural y se alinea la nota sobre עַד מָרוֹם con la alternativa preservada por el expediente inglés ('hasta el cielo') junto con la explicación literal.
