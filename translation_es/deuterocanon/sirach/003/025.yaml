translation:
  language: es
  text: Un corazón pesado[a][b] caerá en ruina al final, y quien ama las cosas buenas será guiado por ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: “un corazón duro será afligido al final”.'
    reason: alternative_reading
  - marker: b
    text: 'O “apestará”: el verbo hebreo es más literalmente “heder” o “volverse podrido”, aquí con sentido de desenlace desastroso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב כָּבֵד
  english_pob_choice: a heavy heart
  chosen_spanish: un corazón pesado
  alternatives_spanish:
  - un corazón duro
  - un corazón obstinado
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea principal de “pesado” en lugar de sustituirla por una equivalencia interpretativa más tradicional. En español, “corazón pesado” comunica una interioridad cargada o desordenada sin borrar la base léxica del hebreo.
- source_word: תִּבְאַשׁ
  english_pob_choice: will come to ruin
  chosen_spanish: caerá en ruina
  alternatives_spanish:
  - se volverá fétido
  - se pudrirá
  - le irá mal
  lexicon: HALOT
  rationale: El hebreo tiene el valor literal de “hedir / volverse fétido”, pero el contexto proverbial sobre el desenlace exige una lectura idiomática. “Caerá en ruina” conserva el resultado desastroso sin perder la dureza del término original.
- source_word: אַחֲרִיתוֹ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en su fin
  - al último
  lexicon: HALOT
  rationale: La expresión hebrea señala el desenlace o la última परिणación; “al final” es natural en español y mantiene el sentido de outcome.
- source_word: וְאֹוהֵב טוֹבוֹת
  english_pob_choice: and one who loves good things
  chosen_spanish: y quien ama las cosas buenas
  alternatives_spanish:
  - y el que ama las bendiciones
  - y quien ama los bienes
  - y quien ama los placeres
  lexicon: HALOT
  rationale: “Cosas buenas” conserva la amplitud de טוֹבוֹת sin cerrar prematuramente el campo semántico a “bendiciones” o “placeres”. La construcción con “quien” mantiene el sujeto proverbial genérico.
- source_word: יִנְהַג בָּהֶם
  english_pob_choice: will be led by them
  chosen_spanish: será llevado por ellas
  alternatives_spanish:
  - será guiado por ellas
  - se conducirá en ellas
  - caminará en ellas
  lexicon: HALOT
  rationale: Se sigue de cerca la revisión inglesa más reciente (“will be led by them”). “Ser llevado por ellas” preserva la idea de dirección ejercida por las cosas amadas y evita suavizar el verbo.
theological_decisions:
- issue: Hebreo principal frente al paralelo griego con 'corazón duro'
  english_pob_reading: Translate the Hebrew main witness as 'a heavy heart' in the main text, with the Greek parallel preserved as an alternative.
  chosen_spanish_reading: Traducir el testimonio hebreo principal como “un corazón pesado” en el texto, con la alternativa “corazón duro” indicada en nota.
  alternative_spanish_readings:
  - un corazón duro
  - un corazón obstinado
  rationale: La base del pasaje es el hebreo conservado; el griego ofrece un paralelo interpretativo que no debe borrar la tensión textual. La nota mantiene visible la posibilidad de una lectura distinta sin desplazar el hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sujeto proverbial genérico
  english_pob_reading: Use 'one who' rather than a masculine pronoun.
  chosen_spanish_reading: Usar “quien” en lugar de un pronombre masculino.
  alternative_spanish_readings:
  - el que ama las cosas buenas
  - él que ama las cosas buenas
  rationale: El proverbio es general, no específicamente masculino. “Quien” conserva la fuerza proverbial y la neutralidad referencial en español.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se mantuvo el giro más directo equivalente a “will be led by them”, reflejándolo en español como “será llevado por ellas”, y se conservó la preferencia por el testimonio hebreo en el sintagma inicial.'
  spanish_consistency_notes:
  - Se usa “corazón” para לֵב siguiendo el valor antropológico habitual en español bíblico, pero con el adjetivo “pesado” para no perder la imagen hebrea.
  - Se evita “SEÑOR” u otra terminología de sustitución, pues el versículo no contiene el Tetragrámaton.
  - “Llevado por ellas” mantiene el sujeto genérico y la relación causal con las cosas amadas, en coherencia con el audit trail inglés.
