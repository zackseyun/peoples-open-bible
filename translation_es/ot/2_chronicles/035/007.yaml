  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para Pascua, pueblo y posesiones son adecuadas. Se recomienda cambiar «ganado menor» en el texto principal a una expresión más natural, manteniendo la alternativa en nota si se desea, y sustituir «reses vacunas» por «ganado vacuno».
