revisions:
- from: Y será como una señal sobre tu mano y como frontales[a][b] entre tus ojos, porque con mano poderosa Yahvé nos sacó de Egipto.
  to: Y será una señal en tu mano y frontales[a] entre tus ojos[b], porque con mano poderosa Yahvé nos sacó de Egipto.
  rationale: Se ajusta la sintaxis para que el español suene natural y siga mejor la relación nominal del original («señal ... y frontales»), se cambia «sobre tu mano» a «en tu mano» por claridad idiomática sin alterar la referencia a «mano», y se ordenan las notas para reflejar mejor el rastro del POB inglés.
