translation:
  language: es
  text: Las obras de Dios son todas buenas[a], y para toda necesidad provee en su tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Las obras del Señor son todas buenas». El testimonio hebreo aquí lee «Dios» en lugar de «el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: מעשה / τὰ ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - obras realizadas
  lexicon: HALOT; LXX ἔργον
  rationale: «Obras» conserva el sentido colectivo de actos o acciones de Dios y corresponde naturalmente al plural griego τὰ ἔργα. En español suena más idiomático que un calco como «trabajos».
- source_word: אל / Κυρίου
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El testimonio hebreo lee אל, un título divino genérico, por lo que «Dios» refleja mejor la fuente principal. Se mantiene la posibilidad griega de «del Señor» en nota, sin reemplazar el hebreo en el texto principal.
- source_word: טובים / ἀγαθά
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenos
  - beneficiosas
  lexicon: HALOT; LSJ
  rationale: En español concuerda con «obras» y comunica la afirmación simple de bondad del verso sin cargarla con matices de utilidad o excelencia que el texto no explicita.
- source_word: לכל צורך / πᾶσαν χρείαν
  english_pob_choice: for every need
  chosen_spanish: para toda necesidad
  alternatives_spanish:
  - para cada necesidad
  - para toda necesidad que haya
  lexicon: HALOT; LSJ
  rationale: «Necesidad» reproduce bien el campo semántico de צורך / χρεία y «toda» preserva la amplitud distributiva del original.
- source_word: בעתו / ἐν ὥρᾳ αὐτῆς
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - a su debido tiempo
  lexicon: HALOT; LSJ
  rationale: «En su tiempo» sigue de cerca la relación con la necesidad mencionada y conserva la idea de oportunidad sin volverla una paráfrasis explicativa.
- source_word: יספיק / χορηγήσει
  english_pob_choice: provides
  chosen_spanish: provee
  alternatives_spanish:
  - suple
  - proporciona
  - hará suficiente
  lexicon: HALOT; LSJ
  rationale: El verbo hebreo puede expresar «satisfacer/proveer suficientemente», y el griego apoya el sentido activo de suministrar. «Provee» es natural en español y conserva el presente general del texto.
theological_decisions:
- issue: Título divino en la primera colon
  english_pob_reading: The works of God are all good
  chosen_spanish_reading: Las obras de Dios son todas buenas
  alternative_spanish_readings:
  - Las obras del Señor son todas buenas
  rationale: La decisión sigue el hebreo, que lee אל («Dios»), mientras que la tradición griega paralela usa Κυρίου («del Señor»). En la lectura principal se privilegia el testimonio hebreo, y la alternativa griega queda documentada como variante de título divino sin alterar el contenido doctrinal del versículo.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; contested divine-title rendering from Hebrew vs. Greek parallel.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que cambió «will provide» por «provides» para reflejar mejor el imperfecto hebreo como afirmación general presente. La versión española usa también presente («provee») y conserva la nota sobre la variante griega del título divino.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara convencional porque el hebreo base aquí no contiene el Tetragrama, sino אל; por eso el texto principal dice «Dios».
  - «Obras» se mantuvo en plural para reflejar el colectivo del hebreo y el plural griego.
  - «En su tiempo» conserva la referencia temporal ligada a la necesidad misma, sin añadir interpretación.
  - «Provee» mantiene el valor de suministro suficiente y el sentido general presente del verbo, en línea con la revisión del POB en inglés.
