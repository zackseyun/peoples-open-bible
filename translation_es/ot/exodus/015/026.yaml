translation:
  language: es
  text: 'Y dijo[a]: «Si escuchas atentamente la voz de Yahvé tu Dios, y haces lo recto ante sus ojos, y prestas oído a sus mandamientos, y guardas todos sus estatutos, no pondré sobre ti ninguna de las enfermedades que puse sobre Egipto, porque yo soy Yahvé, tu sanador».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque yo soy Yahvé, el que te sana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמ֨וֹעַ תִּשְׁמַ֜ע
  english_pob_choice: diligently listen
  chosen_spanish: escuchas atentamente
  alternatives_spanish:
  - escuchas diligentemente
  - oyes con atención
  - escuchas con empeño
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la idea verbal. En español, «escuchas atentamente» conserva la fuerza de atención sostenida sin volverlo una paráfrasis excesiva como «obedeces».
- source_word: לְ/ק֣וֹל
  english_pob_choice: to the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - lo que dice
  lexicon: HALOT
  rationale: קוֹל significa literalmente «voz». Mantener «voz» preserva la imagen hebrea y la relación formal con la expresión «la voz de Yahvé».
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», que conserva el Tetragrámaton sin sustituirlo por una convención de ocultamiento.'
- source_word: אֱלֹהֶ֗י/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el que te pertenece en pacto
  lexicon: HALOT
  rationale: Es la designación de pacto en segunda persona singular. «Tu Dios» es la forma natural y fiel en español.
- source_word: וְ/הַ/יָּשָׁ֤ר בְּ/עֵינָי/ו֙
  english_pob_choice: what is right in his eyes
  chosen_spanish: haces lo recto ante sus ojos
  alternatives_spanish:
  - haces lo justo a sus ojos
  - haces lo derecho en sus ojos
  lexicon: HALOT
  rationale: יַשָׁר expresa lo recto/upright. En español, «lo recto ante sus ojos» mantiene el idiomatismo hebreo y el valor moral de la expresión.
- source_word: וְ/הַֽאֲזַנְתָּ֙
  english_pob_choice: give ear
  chosen_spanish: prestas oído
  alternatives_spanish:
  - das oído
  - atiendes
  lexicon: HALOT
  rationale: El hifil de אזן añade la idea de escuchar con atención. «Prestas oído» conserva la distinción respecto de שׁמע y es idiomático en español.
- source_word: לְ/מִצְוֺתָ֔י/ו
  english_pob_choice: to his commandments
  chosen_spanish: a sus mandamientos
  alternatives_spanish:
  - a sus órdenes
  - a sus preceptos
  lexicon: HALOT
  rationale: מִצְוֹת son mandamientos/órdenes. «Mandamientos» es claro, bíblico y adecuado al contexto de alianza.
- source_word: וְ/שָׁמַרְתָּ֖
  english_pob_choice: keep
  chosen_spanish: guardas
  alternatives_spanish:
  - obedeces
  - observas
  lexicon: HALOT
  rationale: שׁמר en contextos legales puede ser «guardar/observar». «Guardas» conserva la idea de custodia obediente y combina bien con «estatutos».
- source_word: כָּל חֻקָּ֑י/ו
  english_pob_choice: all his statutes
  chosen_spanish: todos sus estatutos
  alternatives_spanish:
  - todas sus leyes
  - todos sus decretos
  lexicon: HALOT
  rationale: חֻקִּים son estatutos o prescripciones fijas. «Estatutos» es un equivalente preciso y estable en español bíblico.
- source_word: כָּֽל הַ/מַּֽחֲלָ֞ה
  english_pob_choice: none of the diseases
  chosen_spanish: ninguna de las enfermedades
  alternatives_spanish:
  - ninguna de las dolencias
  - ninguna de las plagas
  lexicon: HALOT
  rationale: El singular colectivo con כָּל se expresa naturalmente como plural/singular en español. «Enfermedades» conserva el vínculo con las plagas de Egipto sin reducir el alcance a una sola afección.
- source_word: שַׂ֤מְתִּי ... לֹא אָשִׂ֣ים עָלֶ֔י/ךָ
  english_pob_choice: I put ... I will put ... on you
  chosen_spanish: puse ... pondré sobre ti
  alternatives_spanish:
  - coloqué ... colocaré sobre ti
  - infligí ... infligiré sobre ti
  lexicon: HALOT
  rationale: שׂים literalmente es «poner/colocar». «Puse/pondré sobre ti» mantiene la repetición verbal del hebreo y evita una interpretación más interpretativa como «infligir».
- source_word: בְ/מִצְרַ֨יִם֙
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - a Egipto
  - sobre Egipto
  lexicon: HALOT
  rationale: El topónimo se traduce normalmente como «Egipto» en español.
- source_word: כִּ֛י אֲנִ֥י יְהוָ֖ה רֹפְאֶֽ/ךָ
  english_pob_choice: for I am Yahweh, your healer
  chosen_spanish: porque yo soy Yahvé, tu sanador
  alternatives_spanish:
  - porque yo soy Yahvé, el que te sana
  - porque yo soy Yahvé, tu médico
  lexicon: HALOT
  rationale: 'רֹפֵא puede funcionar como participio nominal: «sanador» o verbalmente «el que sana». «Tu sanador» preserva la fuerza nominal del hebreo y el tono identitario del cierre.'
theological_decisions:
- issue: Nombre divino en el verso
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente יהוה. La forma española del proyecto es «Yahvé», no la sustitución por «SEÑOR», para mantener visible el nombre de pacto revelado en el original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de la promesa sobre enfermedades
  english_pob_reading: A covenantal conditional promise not to place on Israel the diseases placed on Egypt, contingent on obedient listening.
  chosen_spanish_reading: Una promesa condicional de pacto de no poner sobre Israel las enfermedades puestas sobre Egipto, condicionada a escuchar, obedecer y guardar.
  alternative_spanish_readings:
  - Una garantía universal de sanidad física individual en toda circunstancia
  - Una afirmación meramente espiritual sin referencia histórica
  rationale: El propio verso la presenta como condicional y ligada al juicio histórico sobre Egipto. La traducción no amplía indebidamente la promesa ni la reduce a una metáfora.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §3
- issue: Valor de רֹפְאֶךָ
  english_pob_reading: your healer
  chosen_spanish_reading: tu sanador
  alternative_spanish_readings:
  - el que te sana
  - tu médico
  rationale: El participio hebreo puede leerse de modo nominal o verbal. «Tu sanador» conserva la forma nominal y el paralelismo con el nombre divino; la alternativa verbal queda implicada sin cerrar la ambigüedad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el trazado auditado en inglés. No se introdujeron cambios respecto al criterio óptimo-equivalente ya aprobado; se preservó la repetición verbal de שׂים, la distinción entre שׁמע y אזן, y la ambigüedad nominal/verbal de רֹפְאֶךָ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «mandamientos» y «estatutos» como terminología bíblica estable.
  - Se conserva «sanador» para רֹפְאֶךָ, con nota que permite la lectura verbal alternativa.
  - La estructura condicional del versículo queda explícita en español mediante «Si... no pondré...».
