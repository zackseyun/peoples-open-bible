  to: Y por las brechas saldrán ustedes[a], cada mujer directamente delante de ella[b], y serán arrojadas hacia Harmon —declara Yahvé.
  rationale: Se conserva toda la exégesis del borrador, pero se corrige la naturalidad de 'rectamente delante de ella' a 'directamente delante de ella' y se recupera mejor la segunda persona del discurso con 'saldrán ustedes'. No se requieren cambios doctrinales ni nuevas notas; es una reparación menor de estilo y fidelidad discursiva.
