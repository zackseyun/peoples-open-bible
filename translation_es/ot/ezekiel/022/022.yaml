translation:
  language: es
  text: Como se funde la plata en medio de un horno, así serán fundidos en medio de ella[a]; y sabrán que yo, Yahvé, he derramado mi ira sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de ella»; el pronombre femenino singular se refiere a la ciudad (Jerusalén) en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהִתּוּךְ
  english_pob_choice: As ... is melted
  chosen_spanish: Como se funde
  alternatives_spanish:
  - Así como se derrite
  - Como el fundir de
  lexicon: HALOT
  rationale: 'El hebreo abre con una comparación: «como/según el fundir». En español, «Como se funde» conserva la imagen pasiva y el valor comparativo sin sonar forzado.'
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - plata
  - el metal plata
  lexicon: HALOT
  rationale: El sustantivo designa literalmente la plata; en español «la plata» es natural y mantiene la imagen de refinación metálica.
- source_word: בְּתוֹךְ כּוּר
  english_pob_choice: in the midst of a furnace
  chosen_spanish: en medio de un horno
  alternatives_spanish:
  - dentro de un horno
  - en un horno de fundición
  lexicon: HALOT
  rationale: כּוּר puede referirse a un horno de fundición. «En medio de un horno» conserva el paralelismo con el hebreo y el espacio cerrado de juicio, como en el POB inglés.
- source_word: תֻּתְּכוּ
  english_pob_choice: you will be melted
  chosen_spanish: seréis fundidos
  alternatives_spanish:
  - seréis derretidos
  - seréis refinados por fundición
  lexicon: HALOT
  rationale: El verbo pasivo mantiene la metáfora de fundición/juzgamiento. «Fundidos» es más fiel al campo semántico metalúrgico que «derretidos», aunque ambos son posibles.
- source_word: בְתוֹכָהּ
  english_pob_choice: in the midst of it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la ciudad mencionada en el contexto inmediato (Jerusalén). En español conviene explicitar el antecedente con «ella» para que la referencia sea clara.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you will know
  chosen_spanish: y sabréis
  alternatives_spanish:
  - y conoceréis
  - y reconoceréis
  lexicon: HALOT
  rationale: La fórmula profética de reconocimiento se expresa de modo natural con «sabréis», que conserva el valor de conocimiento resultante del juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», en lugar de sustituirlo por un título como «Señor».'
- source_word: שָׁפַכְתִּי
  english_pob_choice: have poured out
  chosen_spanish: he derramado
  alternatives_spanish:
  - he vertido
  - he desahogado
  lexicon: HALOT
  rationale: El verbo hebreo se usa para derramar una realidad violenta; en español, «he derramado» reproduce bien la imagen de juicio consumado.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi ira
  - mi cólera
  lexicon: HALOT
  rationale: חֵמָה expresa ardor de ira y juicio. «Furor» conserva mejor la intensidad que «ira» en español bíblico contemporáneo.
- source_word: עֲלֵיכֶם
  english_pob_choice: on you
  chosen_spanish: sobre vosotros
  alternatives_spanish:
  - contra vosotros
  - sobre ustedes
  lexicon: HALOT
  rationale: La preposición עַל en contexto de juicio puede ser «sobre/contra». Se conserva «sobre» para reflejar el texto, con tratamiento bíblico plural «vosotros» acorde al registro del POB.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La convención española del proyecto es transliterarlo como «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metáfora de fundición como juicio
  english_pob_reading: As silver is melted ... so you will be melted ...
  chosen_spanish_reading: Como se funde la plata ... así seréis fundidos ...
  alternative_spanish_readings:
  - Como se derrite la plata ... así seréis derretidos ...
  - Como se refina la plata ... así seréis refinados ...
  rationale: El hebreo compara el castigo de Jerusalén con el proceso de fundición de la plata. «Fundir/fundidos» mantiene la imagen metalúrgica sin suavizarla ni convertirla en una mera refinación espiritual.
  doctrine_reference: Lexical theology of prophetic judgment imagery
translation_notes:
  revision_awareness: 'El borrador sigue el análisis del POB inglés y su nota textual: el pronombre femenino singular de «en medio de ella» remite a la ciudad inmediata (Jerusalén). No se introdujeron cambios respecto del pasaje fuente; se mantuvo la metáfora metalúrgica y la convención del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conserva el campo semántico de fundición con «funde/fundidos» para reflejar el hebreo y el inglés auditado.
  - Se mantiene «vosotros» por consistencia con el registro bíblico plural del proyecto.
  - «furor» se eligió para preservar la intensidad de חֲמָה sin atenuarla.
