review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: cláusula temporal inicial, imagen de la red, símil de aves y acción divina de abatir/corregir. Sin embargo, la nota [a] no corresponde al audit trail inglés: allí la alternativa documentada pertenece a אַיְסִרֵם (''castenar/castigar/disciplinar''), no a כַּאֲשֶׁר יֵלֵכוּ. Además, ''Como ellos van'' suena poco natural en español; conviene una formulación temporal más idiomática que mantenga el aspecto progresivo. La cláusula final difícil está aceptablemente conservada con ambigüedad.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Como ellos van' resulta forzado; 'Mientras van' o 'Cuando vayan' sería más natural, y el primero preserva mejor el matiz de proceso. El resto del verso fluye bien. 'Los corregiré' es comprensible, aunque un poco más suave que 'castenar'; no obstante, puede mantenerse si se documenta la alternativa punitiva/correctiva en nota. La puntuación y el registro son adecuados.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave son razonables: ''mi red'', ''las aves de los cielos'', ''los haré descender''. La principal corrección de alineación es reubicar la nota léxica para אַיְסִרֵם y no para la cláusula inicial. También conviene mantener la ambigüedad de כְּשֵׁמַע לַעֲדָתָם con una nota final.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a la cláusula equivocada
    rationale: El audit trail inglés asigna la nota a אַיְסִרֵם ('I will chasten/discipline/punish them'), no a 'As they go'. El borrador cambia indebidamente la documentación textual.
  - severity: medium
    issue: '''Como ellos van'' suena poco idiomático en español'
    rationale: Aunque intenta conservar el sentido progresivo, en español neutro eclesial resulta torpe. 'Mientras van' preserva mejor el valor temporal en curso de כַּאֲשֶׁר יֵלֵכוּ.
  - severity: medium
    issue: Falta nota léxica para 'Los corregiré'
    rationale: Dado que el inglés preserva una alternativa importante para אַיְסִרֵם, el español también debe documentar que puede significar 'castigar' o 'castenar/discplinar', especialmente porque 'corregiré' puede sonar más suave.
  revised_spanish_text: Mientras van, yo tenderé mi red sobre ellos; como las aves de los cielos, los haré descender. Los corregiré[a] según el informe de su asamblea[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Los castigaré» o «Los disciplinaré». El verbo hebreo puede denotar disciplina correctiva o castigo punitivo.'
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula es difícil. También puede entenderse: «según lo que se proclamó en su asamblea» o «como lo ha oído su asamblea».'
    reason: alternative_reading
  revision_rationale: Se corrigió la ubicación de la nota para alinearla con el audit trail inglés y con el hebreo אַיְסִרֵם. También se reemplazó 'Como ellos van' por 'Mientras van' para lograr un español más natural sin perder el matiz temporal/progresivo. Se mantuvo la ambigüedad de la cláusula final con una nota adecuada.
