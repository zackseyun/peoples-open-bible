translation:
  language: es
  text: También podrán comprar a los hijos de los forasteros residentes que habitan con ustedes[a], y de sus familias que están con ustedes, a quienes ellos engendraron en la tierra de ustedes; y serán para ustedes una posesión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los descendientes de los forasteros residentes que habitan con ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como una posesión»; aquí el sentido legal es que llegan a ser propiedad heredable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: You may also
  chosen_spanish: También podrán
  alternatives_spanish:
  - Y también podrán
  - Además, podrán
  lexicon: HALOT
  rationale: La partícula añade otra fuente permitida de adquisición en continuidad con el versículo anterior. «También podrán» mantiene la fuerza permisiva del plural verbal y suena natural en español.
- source_word: מִבְּנֵי
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - de entre los hijos de
  - de los descendientes de
  lexicon: HALOT
  rationale: «Hijos de» conserva la forma hebrea de manera transparente. En este contexto legal, puede abarcar descendencia, pero sin perder la relación genealógica explícita del texto.
- source_word: הַתּוֹשָׁבִים הַגָּרִים עִמָּכֶם
  english_pob_choice: the sojourners who reside with you
  chosen_spanish: los forasteros residentes que habitan con ustedes
  alternatives_spanish:
  - los forasteros que residen con ustedes
  - los residentes extranjeros que viven entre ustedes
  lexicon: HALOT
  rationale: El par de términos describe a no israelitas que viven entre el pueblo. «Forasteros residentes» conserva el matiz legal/social de residentes no nativos, y «habitan con ustedes» expresa el participio de modo natural en español.
- source_word: מֵהֶם תִּקְנוּ
  english_pob_choice: you may also buy from
  chosen_spanish: podrán comprar de
  alternatives_spanish:
  - podrán adquirir de
  - podrán comprar entre
  lexicon: HALOT
  rationale: קנה en este contexto legal y comercial significa «comprar/adquirir». «Podrán comprar de» reproduce la permisividad jurídica y evita suavizar la transacción.
- source_word: וּמִמִּשְׁפַּחְתָּם
  english_pob_choice: and from their families
  chosen_spanish: y de sus familias
  alternatives_spanish:
  - y de sus clanes
  - y también de sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede abarcar familia o clan. «Familias» es la opción más clara en español y encaja con el ámbito doméstico-jurídico del pasaje.
- source_word: אֲשֶׁר עִמָּכֶם
  english_pob_choice: who are with you
  chosen_spanish: que habitan con ustedes
  alternatives_spanish:
  - que están con ustedes
  - que viven entre ustedes
  lexicon: HALOT
  rationale: El relativo especifica que esas familias están presentes entre Israel. «Que habitan con ustedes» integra esa idea con fluidez y mantiene el sentido de convivencia local.
- source_word: אֲשֶׁר הוֹלִידוּ בְּאַרְצְכֶם
  english_pob_choice: whom they have fathered in your land
  chosen_spanish: a quienes ellos engendraron en su tierra
  alternatives_spanish:
  - a quienes ellos engendraron en su país
  - a quienes ellos tuvieron en su tierra
  lexicon: HALOT
  rationale: הוליד en hiphil tiene la fuerza de engendrar/ser padre de. «Engendraron» preserva el vínculo de descendencia sin volver el español artificial, y «su tierra» conserva el referente territorial del grupo mencionado.
- source_word: וְהָיוּ לָכֶם לַאֲחֻזָּה
  english_pob_choice: and they shall become your possession
  chosen_spanish: y llegarán a ser para ustedes una posesión
  alternatives_spanish:
  - y serán para ustedes una posesión
  - y llegarán a ser su posesión
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión/tenencia, con fuerte sentido legal. «Una posesión» sigue de cerca el valor formal del término y evita un giro más interpretativo como «propiedad».
theological_decisions:
- issue: Lenguaje de compra y posesión en la legislación de santidad
  english_pob_reading: Use direct ownership language ('buy,' 'possession') rather than softened terms.
  chosen_spanish_reading: Mantener lenguaje directo de compra y posesión ('comprar', 'posesión') sin eufemismos.
  alternative_spanish_readings:
  - adquirir
  - servos
  - tenencia
  rationale: El hebreo expresa una relación jurídica real de compra y pertenencia. La traducción española no debe diluir ese hecho con términos más suaves que oculten la dureza legal del pasaje.
  doctrine_reference: Principios de traducción POB; Levítico 25:44-46 en su marco legal
- issue: Alcance de בני / hijos en contexto genealógico-jurídico
  english_pob_reading: '''sons of'' preserves the Hebrew form while remaining understandable; broader ''descendants'' is possible but less formally transparent.'
  chosen_spanish_reading: «hijos de» como forma principal, con sentido genealógico amplio según el contexto.
  alternative_spanish_readings:
  - descendientes de
  - linaje de
  rationale: En español, «hijos de» conserva la transparencia formal del hebreo y sigue siendo inteligible en un marco legal. El sentido puede incluir descendencia sin sustituir el vocablo base.
  doctrine_reference: Transparencia formal del texto fuente; HALOT
- issue: Naturaleza de אֲחֻזָּה
  english_pob_reading: '''possession'' rather than ''property'' to reflect the formal sense of holding/possession.'
  chosen_spanish_reading: «posesión» como equivalente principal.
  alternative_spanish_readings:
  - propiedad
  - tenencia
  rationale: «Posesión» refleja mejor el valor léxico de אֲחֻזָּה y mantiene un registro más cercano al término formal, sin perder la implicación jurídica de pertenencia.
  doctrine_reference: Revisión inglesa aprobada; HALOT
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefirió «possession» frente a «property» para reflejar mejor אֲחֻזָּה. En español seguí esa misma corrección con «posesión», y mantuve el resto del versículo cercano al hebreo, sin suavizar el lenguaje de compra y pertenencia.
  spanish_consistency_notes:
  - Usé «Yahvé» como forma estándar cuando no aparece explícitamente en este versículo, sin añadirlo aquí.
  - Conservé «hijos de» para la transparencia genealógica y «posesión» para אֲחֻזָּה, coherente con el criterio POB.
  - Mantuve un registro legal claro y directo, apropiado para la legislación de Levítico.
  - Elegí «forasteros residentes» para reflejar el valor social/jurídico de los términos hebreos sin adoptar una fórmula eclesiástica tradicional.
