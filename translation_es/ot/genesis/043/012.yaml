translation:
  language: es
  text: Lleven dinero doble en su mano, y lleven de regreso en su mano el dinero que fue devuelto en la boca de sus sacos[a]; quizá fue un error.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la boca de sus sacos», es decir, en la abertura de sus sacos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «devuelvan en su mano».'
    reason: previous_rendering
lexical_decisions:
- source_word: כֶסֶף מִשְׁנֶה
  english_pob_choice: double money
  chosen_spanish: dinero duplicado
  alternatives_spanish:
  - doble dinero
  - una segunda cantidad de dinero
  lexicon: HALOT
  rationale: מִשְׁנֶה con כֶסֶף expresa una cantidad duplicada. 'Dinero duplicado' conserva la idea cuantitativa sin forzar una precisión matemática que el hebreo no explicita.
- source_word: קְחוּ בְיֶדְכֶם
  english_pob_choice: Take ... in your hand
  chosen_spanish: Tomad ... en vuestra mano
  alternatives_spanish:
  - Llevad ... con vosotros
  - Tomad ... con vosotros
  lexicon: HALOT
  rationale: El hebreo usa la imagen concreta de 'mano' para posesión y transporte. Mantener 'en vuestra mano' preserva esa concreción y el paralelismo con la segunda mitad del versículo.
- source_word: הַכֶּסֶף הַמּוּשָׁב
  english_pob_choice: the money that was returned
  chosen_spanish: el dinero que fue devuelto
  alternatives_spanish:
  - el dinero que fue retornado
  - el dinero que fue puesto de vuelta
  lexicon: HALOT
  rationale: El participio pasivo de שוב comunica algo que fue hecho volver. 'Fue devuelto' es natural en español y conserva el sentido pasivo sin añadir matices no presentes en el hebreo.
- source_word: בְּפִי אַמְתְּחֹתֵיכֶם
  english_pob_choice: in the mouth of your sacks
  chosen_spanish: en la boca de vuestros costales
  alternatives_spanish:
  - en la abertura de vuestros costales
  - en la boca de vuestros sacos
  lexicon: HALOT
  rationale: '''Boca'' reproduce la metáfora hebrea para la abertura del recipiente. ''Costales'' comunica bien la imagen en español bíblico y cotidiano; la alternativa más idiomática queda implícita por el contexto.'
- source_word: תָּשִׁיבוּ
  english_pob_choice: take back / return
  chosen_spanish: llevad de vuelta
  alternatives_spanish:
  - devolved
  - traed de vuelta
  lexicon: HALOT
  rationale: El hiphil de שוב implica hacer volver o traer de regreso. 'Llevad de vuelta' comunica el movimiento de retorno de manera natural en español y evita una construcción menos fluida como 'retornad en vuestra mano'.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - puede ser que
  lexicon: HALOT
  rationale: '''Quizá'' conserva el registro sobrio y la incertidumbre del hebreo.'
- source_word: מִשְׁגֶּה
  english_pob_choice: a mistake
  chosen_spanish: un error
  alternatives_spanish:
  - una equivocación
  - un descuido
  lexicon: HALOT
  rationale: El sustantivo designa una falla o error. 'Error' es la opción más directa y sobria en español, sin insinuar culpa moral.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'carry back in your hand' a 'take back in your hand' para ajustarse mejor al hebreo, y de 'was put back' a 'was returned' para reflejar con mayor naturalidad el participio pasivo. La redacción española sigue esa revisión final, manteniendo el paralelismo de 'en vuestra mano' y el carácter pasivo de 'fue devuelto'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''costales'' refleja adecuadamente אַמְתְּחֹתֵיכֶם; no se usa ''sacos'' en el texto principal para conservar la imagen tradicional y la concordancia con ''boca''.'
  - '''dinero duplicado'' se eligió por fidelidad semántica; ''doble dinero'' queda como alternativa válida, pero ''duplicado'' evita ambigüedad sobre si se trata de una suma exactamente doble o de una cantidad adicional equivalente.'
