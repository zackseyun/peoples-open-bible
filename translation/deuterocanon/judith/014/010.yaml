theological_decisions:
- issue: Rendering πιστεύω/πίστις-family language in a conversion context
  chosen_reading: he believed in God greatly
  alternative_readings:
  - he trusted God greatly
  - he had great faith in God
  rationale: Per doctrine, the default rendering for πίστις is 'faith,' with alternatives preserved where relevant. Here the verb denotes strong belief/trust in Israel's God following the witnessed deliverance. 'Believed in God greatly' keeps the lexical connection to faith language without importing later doctrinal formulations.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy items 1 and 3'
- issue: Incorporation into Israel
  chosen_reading: was joined to the house of Israel
  alternative_readings:
  - was added to the house of Israel
  rationale: The text states Achior's incorporation into Israel after belief and circumcision. 'Was joined' communicates communal incorporation without adding later covenantal or proselyte-technical terminology not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy items 1 and 6'
