    issue: «Así dirán» no expresa bien el mandato de כֹּה תֹאמְרוּן
    rationale: El hebreo y la POB inglesa mandan a los mensajeros lo que deben decir. «Así dirán» en español suena a predicción, no a instrucción. Debe ser «Así dirán a los hombres...» o más naturalmente «Esto dirán...»/«Así les dirán...» con valor imperativo indirecto claro.
  - severity: high
    issue: «salvación» en el texto principal debilita la decisión léxica auditada para תְּשׁוּעָה
    rationale: La auditoría inglesa escogió «deliverance» precisamente para comunicar rescate militar sin los sobretonos doctrinales que «salvación» puede activar en lenguaje bíblico español. En este contexto, «liberación» o «rescate» es más fiel a la rationale documentada.
  - severity: medium
