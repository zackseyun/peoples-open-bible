revisions:
- from: Los sabios quedan avergonzados; se espantan y son capturados[a]. Miren, han rechazado la palabra de Yahvé; ¿qué sabiduría tienen, pues?
  to: Los sabios quedan avergonzados; quedan consternados y son capturados[a]. Miren, han rechazado la palabra de Yahvé; así que, ¿qué sabiduría tienen?
  rationale: Se ajusta «se espantan» a «quedan consternados» para reflejar mejor חַתּוּ; se mejora la pregunta retórica final con «así que» para expresar con naturalidad el valor inferencial; y se amplía la nota léxica para incluir «atrapados», en línea con las alternativas documentadas. No hace falta adjudicación adicional.
