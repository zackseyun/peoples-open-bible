translation:
  language: es
  text: y eran bautizados por él en el río Jordán[a], confesando sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «fueron bautizados»; el imperfecto griego puede enfatizar una acción continua o repetida: «eran bautizados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβαπτίζοντο
  english_pob_choice: were being baptized
  chosen_spanish: eran bautizados
  alternatives_spanish:
  - eran sumergidos
  - fueron bautizados
  lexicon: BDAG
  rationale: El imperfecto pasivo griego señala acción en curso o repetida; en español, «eran bautizados» conserva esa duración. Se mantiene «bautizados» como término ritual establecido, sin añadir una explicación de modo que el griego no explicita aquí.
- source_word: ἐν τῷ Ἰορδάνῃ ποταμῷ
  english_pob_choice: in the Jordan River
  chosen_spanish: en el río Jordán
  alternatives_spanish:
  - en el Jordán
  - en el río del Jordán
  lexicon: BDAG
  rationale: La construcción locativa con ἐν y el sustantivo ποταμῷ indican ubicación en un río. «Río Jordán» es natural en español y preserva la referencia explícita a ποταμός.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  - a manos de él
  lexicon: BDAG
  rationale: La preposición ὑπό con genitivo marca agencia personal. «Por él» reproduce el valor del pronombre sin introducir el antecedente fuera del texto de este versículo; el referente inmediato sigue siendo Juan por el contexto narrativo.
- source_word: ἐξομολογούμενοι
  english_pob_choice: confessing
  chosen_spanish: confesando
  alternatives_spanish:
  - reconociendo
  - declarando abiertamente
  lexicon: BDAG
  rationale: El participio contemporáneo expresa acción concomitante con el bautismo y aquí implica admisión verbal de culpa. «Confesando» es la equivalencia más directa e idiomática en español en este contexto de arrepentimiento.
- source_word: τὰς ἁμαρτίας αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - los pecados de ellos
  lexicon: BDAG
  rationale: «Pecados» preserva el sentido plural concreto de ἁμαρτίας y mantiene la fuerza moral/religiosa del término. El posesivo «sus» refleja αὐτῶν de manera natural en español.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - además
  lexicon: BDAG
  rationale: La simple conjunción narrativa se conserva como «y», sin añadir matiz discursivo no exigido por el griego.
theological_decisions:
- issue: Modo del bautismo
  english_pob_reading: Retain 'baptized' rather than specifying mode such as 'immersed.'
  chosen_spanish_reading: Conservar «bautizados» sin especificar el modo.
  alternative_spanish_readings:
  - sumergidos
  - lavados
  rationale: El versículo afirma que fueron bautizados en el Jordán, pero no define el modo. «Bautizados» evita una conclusión denominacional no explicitada por el griego, manteniendo la fuerza del término ritual.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del control cruzado es alto y coincide con la solución base. Se mantuvo la lectura verbal en imperfecto y la terminología ritual sin expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva el término técnico «bautizados» en lugar de «sumergidos» para no imponer una lectura modal.
  - «Río Jordán» expresa con naturalidad el valor locativo de ἐν τῷ Ἰορδάνῃ ποταμῷ y la presencia explícita de ποταμός.
  - El participio se traduce con gerundio («confesando») para reflejar simultaneidad con la acción principal.
  - No se añade el antecedente «Juan» en el texto principal para mantener la forma pronominal del griego; el referente queda claro por el contexto inmediato.
