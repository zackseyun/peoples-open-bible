translation:
  language: es
  text: Entonces se reunieron los sátrapas, los prefectos, los gobernadores, los consejeros, los tesoreros, los jueces, los magistrados y todos los funcionarios de las provincias, para la dedicación de la imagen[a] que había erigido el rey Nabucodonosor, y estaban de pie ante la imagen[a] que había erigido Nabucodonosor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estatua» para «imagen» (arameo צַלְמָא); el término puede denotar una imagen física o una figura monumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  lexicon: HALOT
  rationale: Marcador discursivo que introduce la secuencia narrativa; «Entonces» mantiene el orden temporal natural en español sin añadir interpretación.
- source_word: מִתְכַּנְּשִׁין
  english_pob_choice: were assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  lexicon: HALOT
  rationale: El participio arameo expresa reunión colectiva; «se reunieron» comunica bien la acción en español y evita una pasiva rígida.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  - autoridades persas
  lexicon: HALOT
  rationale: Título administrativo persa específico; la transliteración tradicional en español conserva la precisión histórica y la lista oficial.
- source_word: סִגְנַיָּא
  english_pob_choice: prefects
  chosen_spanish: prefectos
  alternatives_spanish:
  - delegados
  - funcionarios
  lexicon: HALOT
  rationale: Equivalente administrativo breve y reconocible que conserva la distinción de rango dentro de la enumeración.
- source_word: וּפַחֲוָתָא
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - virreyes
  - regentes provinciales
  lexicon: HALOT
  rationale: Título gubernativo distinto de «sátrapas»; «gobernadores» es claro y fiel al contexto imperial.
- source_word: אֲדַרְגָּזְרַיָּא
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - consultores
  lexicon: HALOT
  rationale: El oficio exacto es algo incierto, pero la función de asesoría es segura; «consejeros» conserva esa amplitud sin sobreafirmar.
- source_word: גְדָבְרַיָּא
  english_pob_choice: treasurers
  chosen_spanish: tesoreros
  alternatives_spanish:
  - oficiales del tesoro
  - administradores financieros
  lexicon: HALOT
  rationale: Designa oficiales del tesoro; «tesoreros» es la forma más directa y natural en español.
- source_word: דְּתָבְרַיָּא
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - funcionarios judiciales
  - magistrados judiciales
  lexicon: HALOT
  rationale: La función judicial es la más probable en contexto; «jueces» es el equivalente más claro.
- source_word: תִּפְתָּיֵא
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - juristas
  - autoridades
  lexicon: HALOT
  rationale: Otro cargo legal-administrativo; «magistrados» preserva el matiz oficial y distingue esta categoría de los «jueces».
- source_word: כֹל שִׁלְטֹנֵי מְדִינָתָא
  english_pob_choice: all the officials of the provinces
  chosen_spanish: todos los funcionarios de las provincias
  alternatives_spanish:
  - todos los gobernantes de las provincias
  - todas las autoridades de las provincias
  lexicon: HALOT
  rationale: La expresión resume la totalidad de los cargos provinciales; «funcionarios» es inclusivo y fluido en español, sin perder la referencia administrativa.
- source_word: לַחֲנֻכַּת
  english_pob_choice: for the dedication of
  chosen_spanish: para la dedicación de
  alternatives_spanish:
  - para la inauguración de
  - para la consagración de
  lexicon: HALOT
  rationale: «Dedicación» corresponde de forma directa al acto ceremonial descrito y evita añadir connotaciones cultuales no explícitas.
- source_word: צַלְמָא
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - estatua
  - figura
  lexicon: HALOT
  rationale: El término puede abarcar una imagen o figura monumental; «imagen» conserva la correspondencia léxica del contexto narrativo.
- source_word: הֲקֵים
  english_pob_choice: had set up
  chosen_spanish: había levantado
  alternatives_spanish:
  - había erigido
  - había puesto en pie
  lexicon: HALOT
  rationale: El verbo implica erigir/colocar en pie; «había levantado» suena natural en español y mantiene la idea de instalación previa.
- source_word: וְקָאמִין לָקֳבֵל
  english_pob_choice: and they stood before
  chosen_spanish: y se pusieron de pie delante de
  alternatives_spanish:
  - y estuvieron de pie ante
  - y se quedaron delante de
  lexicon: HALOT
  rationale: La frase indica posición ceremonial frente a la imagen; «se pusieron de pie delante de» expresa con claridad la postura y la relación espacial.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor el rey
  lexicon: HALOT
  rationale: Orden natural del español para el título real; mantiene el nombre propio y la referencia al monarca.
translation_notes:
  revision_awareness: La revisión previa no introdujo cambios; este borrador mantiene plena concordancia con el texto arameo y con la solución inglesa auditada, ajustando solo la formulación para un español natural y fiel.
  spanish_consistency_notes:
  - Se conserva «sátrapas» como título técnico, en paralelo con la lista de cargos administrativos.
  - «Imagen» mantiene la ambigüedad lexical documentada del arameo צַלְמָא, sin forzar «estatua» en el texto principal.
  - «Había levantado» refleja el valor de erigir/instalar del verbo, coherente con la repetición del versículo.
  - La enumeración de cargos sigue el paralelismo y la amplitud del original, sin simplificarla a un genérico único.
