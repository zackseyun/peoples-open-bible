    text: Or 'strengthened the heart of Pharaoh.' The Hebrew verb literally means 'made strong/firm,' though in Exodus this expression commonly carries the sense 'hardened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boldly' or 'with uplifted hand.' The Hebrew idiom is literally 'with a raised hand.'
    reason: lexical_alternative
