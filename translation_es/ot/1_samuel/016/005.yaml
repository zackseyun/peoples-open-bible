revisions:
- from: 'Él dijo[a]: «Paz. He venido a sacrificar a Yahvé. Consagraos, y venid conmigo al sacrificio». Y consagró a Isaí y a sus hijos, y los llamó al sacrificio.'
  to: 'Él dijo[a]: «Paz. He venido a sacrificar a Yahvé. Conságrense, y vengan conmigo al sacrificio». Y consagró a Isaí y a sus hijos, y los invitó al sacrificio.'
  rationale: Se ajusta el texto a español neutral latinoamericano reemplazando las formas peninsulares por «Conságrense» y «vengan». También se cambia «los llamó al sacrificio» por «los invitó al sacrificio» para reflejar mejor el valor contextual de קרא + ל en la auditoría inglesa y en el contexto sacrificial. Se conserva el resto porque es fiel al hebreo y a las decisiones léxicas y teológicas documentadas.
