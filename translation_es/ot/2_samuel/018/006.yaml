translation:
  language: es
  text: Así que las tropas salieron al campo para salir al encuentro de Israel[a], y la batalla tuvo lugar en el bosque de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo “el pueblo”; aquí el término se refiere a la fuerza de combate de David, por eso se traduce “las tropas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: the troops
  chosen_spanish: las tropas
  alternatives_spanish:
  - el pueblo
  - el ejército
  - los hombres
  lexicon: HALOT
  rationale: Aunque el sustantivo básico significa “pueblo”, en este contexto militar designa a la fuerza de combate de David. “Las tropas” transmite ese sentido contextual con naturalidad en español sin perder el valor colectivo del hebreo.
- source_word: הַשָּׂדֶה
  english_pob_choice: into the field
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - a la llanura
  - al terreno abierto
  lexicon: HALOT
  rationale: Con יצא, el español natural usa “salieron al campo”. “Campo” conserva la idea de espacio abierto/batalla del hebreo sin sonar forzado.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para enfrentar
  alternatives_spanish:
  - para encontrarse con
  - para salir al encuentro de
  - contra
  lexicon: HALOT
  rationale: En contexto bélico, la idea de “ir al encuentro” implica confrontación. “Para enfrentar” expresa esa relación hostil de modo claro en español, manteniendo la tensión del original.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio del texto hebreo. Aunque el referente son las fuerzas alineadas con Absalón, el hebreo dice literalmente “Israel”.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: HALOT
  rationale: Aquí el sustantivo nombra el enfrentamiento concreto narrado en el versículo. “Batalla” es la equivalencia más precisa y natural para el español.
- source_word: וַתְּהִי
  english_pob_choice: took place
  chosen_spanish: tuvo lugar
  alternatives_spanish:
  - fue
  - sucedió
  - ocurrió
  lexicon: HALOT
  rationale: El verbo hebreo es simple (“ser/acontecer”), pero en español la construcción idiomática para un evento es “tuvo lugar”. Conserva el valor eventivo sin excesiva literalidad.
- source_word: בְּיַעַר אֶפְרָיִם
  english_pob_choice: in the forest of Ephraim
  chosen_spanish: en el bosque de Efraín
  alternatives_spanish:
  - en el bosque de Ephraim
  - en la selva de Efraín
  - en el monte/bosque de Efraín
  lexicon: HALOT
  rationale: יַעַר puede ser “bosque” o “selva”; “bosque” es más neutral y claro en español. Se mantiene el topónimo “Efraín” para reproducir la forma del nombre en castellano bíblico común.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; se mantiene la solución auditada con adaptación natural al español y sin introducir ajustes textuales no documentados.
  spanish_consistency_notes:
  - Se preserva el nombre divino/mesiánico no relevante en este versículo; no se requieren convenciones especiales.
  - “Batalla” y “bosque” siguen la preferencia semántica del expediente inglés para el evento y el lugar, respectivamente.
  - La nota al pie conserva la alternativa lexical documentada para הָעָם sin expandirla más allá del alcance del texto.
