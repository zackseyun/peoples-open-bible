id: ROM.3.21
reference: Romans 3:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Νυνὶ δὲ χωρὶς νόμου δικαιοσύνη θεοῦ πεφανέρωται, μαρτυρουμένη ὑπὸ τοῦ νόμου καὶ τῶν προφητῶν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/021.yaml
  text: But now[a], apart from the law, the righteousness of God has been revealed, attested by the Law and the Prophets[c][b],
  footnotes:
  - marker: a
    text: Or 'the justice of God.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'righteousness from God.'
    reason: alternative_reading
  - marker: c
    text: That is, the Scriptures; compare 'the Law and the Prophets' as a designation for the Old Testament witness.
    reason: cross_reference
translation:
  language: ko
  text: 그러나 이제는 율법과는 별개로 하나님의 의가 나타났으니, 율법과 예언자들이 그것을 증언합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χωρὶς νόμου
  english_pob_choice: apart from the law
  chosen_korean: 율법과는 별개로
  alternatives_korean:
  - 율법 없이
  - 율법을 떠나
  lexicon: BDAG
  rationale: 바울의 핵심적 「분리」 강조를 「~과는 별개로」로 명료하게 옮긴다.
- source_word: δικαιοσύνη θεοῦ
  english_pob_choice: righteousness of God
  chosen_korean: 하나님의 의
  alternatives_korean:
  - 하나님으로부터의 의
  - 하나님의 정의
  lexicon: BDAG
  rationale: 1:17과 일관되게 「하나님의 의」를 유지한다. 속격의 모호성(주격적/근원적)은 한국어 「의」로 보존.
- source_word: νόμου καὶ τῶν προφητῶν
  english_pob_choice: Law and the Prophets
  chosen_korean: 율법과 예언자들
  alternatives_korean:
  - 율법서와 예언서
  - 구약 정경
  lexicon: BDAG
  rationale: 구약 전체를 가리키는 표준 표현을 직역으로 보존한다.
theological_decisions:
- issue: 3:21 「이제는 ... 율법과는 별개로 하나님의 의가 나타났다」 — 단락 전체의 신학적 전환점
  chosen_reading: 이제는 율법과는 별개로 하나님의 의가 나타났으니
  alternative_readings:
  - 이제는 율법 없이 ...
  - 이제는 율법을 떠나서 ...
  rationale: 3:21-26 단락은 바울 칭의론의 정점이다. 「이제는」(Νυνὶ δέ)의 종말론적 무게, 「하나님의 의」, 「율법과는 별개로」를 모두 직역으로 보존해 바울의 신학적 전환의 충격을 살린다.
  doctrine_reference: DOCTRINE.md §1+§5 — central justification block
