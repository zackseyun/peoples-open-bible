translation:
  language: es
  text: y dio su tierra como herencia[a], porque su amor leal[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para una herencia» o «como posesión». El hebreo נַחֲלָה puede expresar una porción asignada o heredada.'
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce el hebreo חֶסֶד, un término que a menudo denota amor fiel y comprometido dentro del pacto; otras posibilidades incluyen «misericordia», «amor constante» o «fidelidad de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: and gave
  chosen_spanish: y dio
  alternatives_spanish:
  - y él dio
  - y entregó
  lexicon: HALOT
  rationale: El verbo qal perfecto 3ms de נתן con waw consecutiva se expresa de forma natural en español con pasado simple coordinado. 'Y dio' conserva la secuencia narrativa/litúrgica del salmo sin añadir sujeto explícito innecesario.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: אֶרֶץ con sufijo posesivo alude a la tierra perteneciente a los pueblos/culturas derrotados en el contexto. 'Tierra' es la correspondencia más directa y bíblicamente estable en español; 'país' suena demasiado moderno y 'territorio' atenúa el matiz de posesión pactal.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia[a]
  alternatives_spanish:
  - por herencia
  - como posesión
  lexicon: HALOT
  rationale: נַחֲלָה denota una porción asignada/heredada, a menudo en lenguaje de tierra pactal. 'Como herencia' comunica bien ese sentido en español; se mantiene la nota para la alternativa 'para una herencia / como posesión' porque la palabra puede cargar un matiz de allotment distributivo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este estribillo la partícula introduce la base o razón de la acción celebrada. 'Porque' expresa con claridad la relación causal en español, aunque el tono litúrgico también admitiría 'pues'.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: לְעוֹלָם significa literalmente 'para siempre'. En español, el predicado natural se completa con 'es su amor leal' sin forzar el verbo 'durar'; la permanencia queda expresada de manera idiomática con 'para siempre'.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal[b]
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד es un término de alto peso teológico, que en este contexto de memoria histórica resalta lealtad pactal y amor constante. 'Amor leal' preserva esa tensión sin reducirlo a 'misericordia' ni volverlo demasiado técnico; se incluye una nota por la riqueza semántica del término.
theological_decisions:
- issue: Renderización de חֶסֶד en el estribillo de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal ... para siempre
  alternative_spanish_readings:
  - su misericordia ... para siempre
  - su fidelidad de pacto ... para siempre
  - su amor constante ... para siempre
  rationale: El salmo celebra actos históricos de Yahvé como expresión de su lealtad duradera al pacto. 'Amor leal' mantiene juntas la dimensión afectiva y la constancia comprometida, sin volverse arcaico ni reducir el término a una sola idea como 'misericordia'.
  doctrine_reference: Salmo 136; traducción de חֶסֶד como término covenantal de lealtad amorosa
- issue: Relación entre la acción de dar la tierra y el lenguaje de herencia
  english_pob_reading: gave their land as an inheritance
  chosen_spanish_reading: dio su tierra como herencia
  alternative_spanish_readings:
  - dio su tierra por herencia
  - dio su tierra como posesión
  rationale: La frase conserva el don divino de la tierra y su asignación ordenada como herencia. 'Herencia' respeta el trasfondo de reparto pactal sin diluir el sentido histórico ni convertirlo en simple propiedad.
  doctrine_reference: Land promise and covenant allotment language in the Psalms
translation_notes:
  revision_awareness: El texto coincide con la lectura inglesa auditada sin cambios sustantivos; se mantuvo la equivalencia óptima del estribillo, preservando el matiz pactal de חֶסֶד y el sentido de allotment/herencia de נַחֲלָה.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto cuando corresponda al Tetragrámaton en el contexto general del Salterio, pero este versículo no lo expresa de forma explícita en la línea hebrea dada.
  - Se evitó 'SEÑOR' como sustituto del nombre divino en el texto español base.
  - '''Herencia'' y ''amor leal'' mantienen consistencia con la terminología POB para lenguaje pactal y חֶסֶד.'
  - La puntuación sigue el ritmo poético español y conserva la coordinación del hebreo con una sola cláusula causal final.
