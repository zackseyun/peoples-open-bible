- source_word: זְרַֽחְיָ֔ה
  english_pob_choice: Zerahiah
  chosen_spanish: Zeraquías
  alternatives_spanish:
  - Zeracías
  - Zerahías
  lexicon: HALOT
  rationale: Nombre propio hebreo. Opto por «Zeraquías» para conservar una transliteración bíblica legible en español y reflejar la secuencia consonántica del nombre sin forzar una forma castellana ajena al patrón onomástico bíblico.
- source_word: מְרָיֽוֹת
  english_pob_choice: Meraioth
  chosen_spanish: Meraiot
  alternatives_spanish:
  - Merayot
  - Meraioth
