    text: Or 'he will give thunder and rain.' The Hebrew verb is literally 'give,' but in English 'send' is the more natural rendering for weather.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'voices and rain'; in this context 'voices' refers to thunder.
    reason: lexical_alternative
