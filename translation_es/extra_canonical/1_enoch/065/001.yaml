translation:
  language: es
  text: En aquellos días, Noé vio que la tierra[a] se había hundido, y que su destrucción estaba cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión traducida «se había hundido» es difícil en el testimonio etiópico y también puede sugerir que la tierra había cedido, se había derrumbado o había sido sacudida violentamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula temporal apocalíptica estable. «En aquellos días» conserva el registro solemne y narrativo del original, como el inglés POB.
- source_word: ርእየ
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - contempló
  - miró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico de visión es directo en español. «Vio» mantiene claridad y evita un tono arcaizante o interpretativo.
- source_word: ምድረ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el alcance es global/cósmico, pero en español «la tierra» comunica naturalmente tanto el planeta como la tierra en sentido amplio sin volverlo demasiado técnico.
- source_word: ከመ፡ አጽነነት
  english_pob_choice: had sunk down
  chosen_spanish: se había hundido
  alternatives_spanish:
  - se había subsedido
  - se había derrumbado
  - había sido sacudida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es difícil y puede indicar hundimiento, colapso o conmoción violenta. «Se había hundido» conserva la imagen física sin cerrar indebidamente la ambigüedad documentada.
- source_word: ወከመ ቅሩብ ሐጕላ
  english_pob_choice: and that its destruction was near
  chosen_spanish: y que su destrucción estaba cerca
  alternatives_spanish:
  - y que su ruina estaba cerca
  - y que su fin estaba cerca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Destrucción» mantiene el sentido de calamidad inminente ligado a la tierra mencionada; «estaba cerca» traduce con naturalidad la proximidad expresada por ቅሩብ.
theological_decisions:
- issue: 'La condición de la tierra: deterioro físico o corrupción moral'
  english_pob_reading: 'physical destabilization: ''the earth had sunk down'''
  chosen_spanish_reading: 'desestabilización física: «la tierra se había hundido»'
  alternative_spanish_readings:
  - la tierra estaba corrompida
  - la tierra había sido sacudida
  rationale: El ge'ez presenta algo que Noé «vio», y el contexto apunta a una imagen de cataclismo inminente más que a un resumen moral. Conviene preservar esa tensión apocalíptica sin moralizar el versículo.
  doctrine_reference: Preservar la imaginería apocalíptica y la ambigüedad lexical documentada
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje auditado del inglés POB y mantiene la misma decisión principal: lectura de desestabilización física de la tierra, con ambigüedad léxica preservada en nota. No se introdujeron revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «la tierra» se conserva por coherencia con el registro cósmico del pasaje.
  - La nota al pie usa un solo marcador y coincide exactamente con el anclaje en el texto.
