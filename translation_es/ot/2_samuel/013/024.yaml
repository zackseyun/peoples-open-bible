translation:
  language: es
  text: 'Entonces Absalón vino al rey y le dijo[a]: «Por favor, mira: tu siervo tiene esquiladores. Por favor, que el rey y sus siervos vayan con tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esquiladores de ovejas». El hebreo dice simplemente «esquiladores», pero el contexto más amplio trata de la esquila de ovejas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Luego ... fue
  - Y vino
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; «Entonces» mantiene la progresión. «Fue al rey» es natural en español y conserva el movimiento hacia la presencia real sin forzar un calco.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Nombre propio estándar
  rationale: En español bíblico es habitual la forma «Absalón», ampliamente reconocible y establecida.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  lexicon: HALOT
  rationale: El hebreo usa el título «el rey», no el nombre propio. «Al rey» reproduce la referencia formal y breve del texto.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo
  - y habló
  lexicon: HALOT
  rationale: En español, con complemento de destinatario explícito, «le dijo» suena natural y conserva la escena de audiencia.
- source_word: הִנֵּה נָא
  english_pob_choice: Please look
  chosen_spanish: Por favor, mira
  alternatives_spanish:
  - Mira, por favor
  - Mira ahora, por favor
  - Mira, te ruego
  lexicon: HALOT
  rationale: «הִנֵּה» aporta deíxis/llamado de atención y «נָא» añade ruego cortés. «Por favor, mira» comunica ambas fuerzas de modo idiomático y reverente.
- source_word: גֹזְזִים
  english_pob_choice: shearers
  chosen_spanish: esquiladores
  alternatives_spanish:
  - cortadores de lana
  - ovejeros que esquilan
  lexicon: HALOT
  rationale: El participio nombra a quienes realizan la esquila. «Esquiladores» es preciso y mantiene la referencia sin añadir «ovejas» que no aparece explícitamente en esta cláusula.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: Absalón habla con deferencia ante el rey. En español bíblico, «tu siervo» conserva el registro cortesano y la auto-referencia subordinada del hebreo.
- source_word: יֵלֶךְ נָא
  english_pob_choice: Please let ... go
  chosen_spanish: por favor, que ... vaya
  alternatives_spanish:
  - por favor, deje que ... vaya
  - que ... vaya, por favor
  lexicon: HALOT
  rationale: El jussivo expresa petición respetuosa. «Que ... vaya» transmite la solicitud sin introducir un tono autoritario o meramente permisivo.
- source_word: וַעֲבָדָיו
  english_pob_choice: and his servants
  chosen_spanish: y sus siervos
  alternatives_spanish:
  - y sus servidores
  - y sus criados
  lexicon: HALOT
  rationale: Se conserva la familia léxica de עבד con «siervos», evitando suavizarla a «servidores» o «criados». En el contexto cortesano puede incluir el séquito del rey.
- source_word: עִם עַבְדֶּךָ
  english_pob_choice: with your servant
  chosen_spanish: con tu siervo
  alternatives_spanish:
  - con tu servidor
  - conmigo
  lexicon: HALOT
  rationale: Se mantiene la auto-designación deferente de Absalón. «Conmigo» borraría el matiz social visible en el hebreo.
theological_decisions:
- issue: Registro deferente de 'tu siervo' frente al rey
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu servidor
  - yo
  rationale: No hay una cuestión doctrinal mayor, pero sí un matiz social-teológico del discurso cortesano. «Tu siervo» preserva la humillación retórica y la etiqueta real presentes en el texto.
  doctrine_reference: No aplica; registro sociolingüístico del relato histórico
- issue: ¿Añadir 'ovejas' a 'esquiladores'?
  english_pob_reading: shearers
  chosen_spanish_reading: esquiladores
  alternative_spanish_readings:
  - esquiladores de ovejas
  - ovejeros que esquilan
  rationale: El hebreo dice simplemente «esquiladores». Aunque el contexto amplio implica ovejas, la traducción principal no debe introducir un sustantivo no expresado en esta cláusula. La nota textual puede señalar la implicación contextual.
  doctrine_reference: No aplica; decisión lexical basada en el texto y su contexto narrativo
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «Please» antes de «look» para reflejar mejor הִנֵּה נָא. En español se reflejó esa revisión con «Por favor, mira», manteniendo además la forma reverente de la petición. Se conservó la preferencia por el título «el rey» y el registro deferente de «tu siervo».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «siervo» para עבד por el valor deferente y cortesano visible en el contexto; no se optó por «esclavo» porque aquí el matiz principal es de autosubordinación respetuosa ante el rey.
  - «Esquiladores» evita sobreespecificar con «ovejas» dentro del texto principal, pero la nota deja visible la alternativa contextual.
  - El estilo busca ser bíblico y moderno a la vez, sin depender de la cadencia tradicional de Reina-Valera.
