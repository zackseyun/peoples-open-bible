revisions:
- from: Y sucederá que, así como Yahvé se alegró sobre ustedes para hacerles bien y multiplicarlos, así Yahvé se alegrará sobre ustedes para destruirlos y aniquilarlos[a]; y serán arrancados de la tierra que van a entrar a poseer[b].
  to: Y sucederá que, así como Yahvé se alegró por ustedes para hacerles bien y multiplicarlos, así Yahvé se alegrará por ustedes para destruirlos y aniquilarlos; y serán arrancados de la tierra en la cual estás[a] por entrar para poseerla.
  rationale: Se corrigió el calco poco natural 'sobre ustedes' por 'por ustedes', se eliminó una nota teológica innecesaria y se restituyó la nota relevante sobre el singular hebreo en la cláusula final. También se ajustó la cláusula de entrada/posesión para que el español suene natural y a la vez preserve el cambio intencional del hebreo al singular colectivo.
