id: PSS.4.23
reference: Psalms of Solomon 4:23
source:
  edition: lxx-swete-1909
  text: ὅτι ἠρήμωσεν οἴκους πολλοὺς ἀνθρώπων ἐν ἀτιμίᾳ, καὶ ἐσκόρπισεν ἐπιθυμίᾳ.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: For he has laid waste many people’s households in disgrace[b][a], and scattered them by lust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by desire' or 'by passion.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'houses'; the sense may include whole households or families.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρήμωσεν
  chosen: has laid waste
  alternatives:
  - has made desolate
  - has ruined
  lexicon: BDAG
  rationale: The verb denotes devastating or desolating rather than merely damaging. 'Has laid waste' preserves the severity while remaining natural English.
- source_word: οἴκους
  chosen: households
  alternatives:
  - houses
  - homes
  lexicon: BDAG
  rationale: Although literally 'houses,' in context the sense likely extends to family households rather than buildings alone. 'Households' communicates the social unit harmed.
- source_word: ἀνθρώπων
  chosen: people’s
  alternatives:
  - men’s
  - human beings’
  lexicon: BDAG
  rationale: The noun can be generic. 'People’s' reflects that broader human sense in idiomatic English without forcing a specifically male reading where the verse itself does not require it.
- source_word: ἐν ἀτιμίᾳ
  chosen: in disgrace
  alternatives:
  - in dishonor
  - shamefully
  lexicon: BDAG
  rationale: The phrase conveys dishonor or shame. 'In disgrace' preserves the moral and social dimension with clear contemporary English.
- source_word: ἐσκόρπισεν
  chosen: scattered
  alternatives:
  - dispersed
  - drove apart
  lexicon: BDAG
  rationale: The verb's core image is scattering or dispersing. 'Scattered' is the most direct and transparent rendering.
- source_word: ἐπιθυμίᾳ
  chosen: lust
  alternatives:
  - desire
  - passion
  lexicon: BDAG
  rationale: While the noun can mean 'desire' broadly, the surrounding dishonor language gives it a morally negative sense here. 'Lust' best conveys that likely force, while the broader option is preserved in a footnote.
