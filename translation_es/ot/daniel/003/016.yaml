translation:
  language: es
  text: 'Sadrac[a], Mesac y Abed-nego respondieron y dijeron al rey Nabucodonosor: «No necesitamos responderte sobre este asunto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No estamos ansiosos por responderte en este asunto», conservando un sentido más literal del modismo arameo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנוֹ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: HALOT
  rationale: El verbo arameo introduce la respuesta formal de los tres jóvenes. En español, «respondieron» conserva el valor narrativo y evita una repetición rígida de «contestaron y dijeron» que podría sonar más pesada; aun así, «contestaron» queda como alternativa válida.
- source_word: וְאָמְרִין
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaron
  - y dijeron
  lexicon: HALOT
  rationale: Se mantiene la fórmula bíblica de doble verbo, reflejando el patrón fuente 'answered and said' sin fundirlo en un solo verbo.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - al rey
  lexicon: HALOT
  rationale: El sustantivo lleva sentido definido. En español, la forma natural y fiel es «al rey»; el nombre propio que sigue identifica a ese rey como Nabucodonosor.
- source_word: נְבוּכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico. Se conserva la forma tradicional inteligible para lectores hispanohablantes.
- source_word: לָא חַשְׁחִין אֲנַחְנָה
  english_pob_choice: We have no need
  chosen_spanish: No necesitamos
  alternatives_spanish:
  - No tenemos necesidad de
  - No tenemos por qué
  lexicon: HALOT
  rationale: La expresión aramea es idiomática y puede sugerir falta de necesidad u obligación de responder. «No necesitamos» comunica con claridad el sentido principal sin introducir una paráfrasis más interpretativa. Se preserva, sin embargo, la posibilidad de una lectura más literal en nota.
- source_word: עַל דְּנָה
  english_pob_choice: concerning this
  chosen_spanish: sobre este
  alternatives_spanish:
  - sobre este
  - acerca de este
  - respecto de este
  lexicon: HALOT
  rationale: La preposición con el demostrativo apunta al asunto discutido. «Sobre este asunto» es natural en español y conserva la referencia contextual.
- source_word: פִּתְגָם
  english_pob_choice: matter
  chosen_spanish: asunto
  alternatives_spanish:
  - asunto
  - materia
  - tema
  lexicon: HALOT
  rationale: En este contexto no se trata de un 'decreto' sino del punto litigioso o la cuestión planteada. «Asunto» transmite bien ese valor.
- source_word: לַהֲתָבוּתָךְ
  english_pob_choice: to answer you
  chosen_spanish: responderte
  alternatives_spanish:
  - responderte
  - darte respuesta
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa la acción de volver respuesta al rey. «Responderte» es conciso y reproduce directamente el valor verbal en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más directa de la respuesta («answer you») y ajustó el orden al rey Nebucodonosor. La versión española sigue esa línea de claridad y tono formal, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma española estándar del nombre propio.
  - Se conserva la fórmula narrativa doble «respondieron y dijeron» por fidelidad al paralelismo del arameo.
  - «No necesitamos» prioriza claridad; la nota recoge la alternativa más literal del modismo.
  - El registro es sobrio y bíblico, pero en español moderno natural.
