translation:
  language: es
  text: Llegó a cierto lugar y pasó allí la noche[a], porque se había puesto el sol. Tomó una de las piedras del lugar y la puso bajo su cabeza[c][b], y se acostó en aquel lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «el lugar» en la primera mención; se vierte como «cierto lugar» para sonar natural en español sin perder que el sitio tiene peso narrativo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Tomó algunas de las piedras del lugar». El hebreo puede entenderse como partitivo desde un sustantivo plural, aunque el contexto suele leerse como una sola piedra usada de apoyo.'
    reason: alternative_reading
  - marker: c
    text: «Bajo su cabeza» traduce una expresión hebrea que designa el lugar de la cabeza o una cabecera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְגַּע
  english_pob_choice: came to
  chosen_spanish: Llegó a
  alternatives_spanish:
  - Se encontró con
  - Arribó a
  - Alcanzó
  lexicon: HALOT
  rationale: En este contexto de viaje con בַּמָּקוֹם, el verbo expresa llegada o alcance a un sitio, no un encuentro personal. «Llegó a» suena natural en español y conserva el movimiento narrativo sin cargar el matiz de casualidad o de encuentro interpersonal.
- source_word: בַּמָּקוֹם
  english_pob_choice: a certain place
  chosen_spanish: un cierto lugar
  alternatives_spanish:
  - el lugar
  - un lugar
  lexicon: HALOT
  rationale: Aunque el hebreo tiene artículo, en español de primera mención conviene una expresión indefinida. «Un cierto lugar» preserva la marcación narrativa del sitio como significativo, como hace el inglés POB con «a certain place».
- source_word: וַיָּלֶן
  english_pob_choice: spent the night
  chosen_spanish: pasó allí la noche
  alternatives_spanish:
  - se alojó
  - pernoctó
  - se quedó esa noche
  lexicon: HALOT
  rationale: לון denota quedarse durante la noche. «Pasó allí la noche» es idiomático en español moderno y mantiene el sentido de permanencia nocturna sin volverlo demasiado literario.
- source_word: כִּי בָא הַשֶּׁמֶשׁ
  english_pob_choice: because the sun had set
  chosen_spanish: porque se había puesto el sol
  alternatives_spanish:
  - porque el sol se había puesto
  - pues el sol había caído
  - porque había oscurecido
  lexicon: HALOT
  rationale: La expresión es un modismo de puesta del sol. «Se había puesto el sol» reproduce bien el valor temporal-causal en español y conserva la imagen hebrea mejor que una paráfrasis genérica.
- source_word: וַיִּקַּח מֵאַבְנֵי הַמָּקוֹם
  english_pob_choice: He took one of the stones of the place
  chosen_spanish: Tomó una de las piedras del lugar
  alternatives_spanish:
  - Tomó algunas de las piedras del lugar
  - Tomó de las piedras del lugar
  - Tomó una piedra del lugar
  lexicon: HALOT
  rationale: El מן partitivo con plural puede entenderse como «una de» o «algunas de». Siguiendo la lectura contextual del objeto singular que sirve de apoyo para la cabeza, «una de las piedras» conserva la fuerza partitiva sin forzar el plural.
- source_word: מְרַאֲשֹׁתָיו
  english_pob_choice: under his head
  chosen_spanish: bajo su cabeza
  alternatives_spanish:
  - a la cabecera
  - como cabezal
  - en la cabecera
  lexicon: HALOT
  rationale: El término alude al lugar de la cabeza o a un apoyo para ella. «Bajo su cabeza» comunica de manera natural la función de la piedra como descanso/cabecera, manteniendo la relación espacial básica que el inglés expresa con «under his head».
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se tendió
  - se recostó
  - se echó
  lexicon: HALOT
  rationale: El verbo describe el acto de tenderse para dormir. «Se acostó» es una forma clara y natural en español; no avanza indebidamente al resultado de dormir, y transmite la acción inmediata.
- source_word: בַּמָּקוֹם הַהוּא
  english_pob_choice: in that place
  chosen_spanish: en aquel lugar
  alternatives_spanish:
  - allí
  - en ese lugar
  - en aquel mismo lugar
  lexicon: HALOT
  rationale: La repetición del sintagma subraya la importancia del sitio. «En aquel lugar» conserva la deixis y el énfasis narrativo mejor que simplemente «allí».
