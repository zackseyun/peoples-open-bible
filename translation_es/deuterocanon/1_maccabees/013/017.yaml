base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/013/017.yaml
  text: And Simon recognized that they were speaking deceitfully to him[a], yet he sent the money and the boys[b], lest he stir up great hostility against the people.
  footnotes:
  - marker: a
    text: Or 'the silver.' The Greek ἀργύριον can denote silver as metal or money/payment silver.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the people' or 'with the people.' The Greek phrase πρὸς τὸν λαόν is relationally flexible; the translation takes it as hostility arising among the populace.
    reason: alternative_reading
