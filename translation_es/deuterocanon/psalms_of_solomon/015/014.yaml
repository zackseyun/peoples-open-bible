lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal futura/prospectiva. «Cuando» es la forma natural y directa en español; «siempre que» o «cada vez que» sugerirían iteración que el contexto no exige.
- source_word: ἐπισκέπτηται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - visita
  - venga sobre
  - atienda
  lexicon: BDAG
  rationale: El verbo griego puede expresar visita o intervención intencional. «Visite» conserva esa imagen bíblica sin fijar de antemano si el matiz es benévolo o punitivo.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: LSJ
  rationale: Aunque γῆ puede significar «tierra» o «país», el contexto es amplio y no localiza una región concreta. «La tierra» refleja bien el alcance general del original.
- source_word: ἐν κρίματι αὐτοῦ
  english_pob_choice: with his judgment
  chosen_spanish: con su juicio
  alternatives_spanish:
  - en su juicio
  - con su sentencia
  lexicon: BDAG
  rationale: κρίμα denota juicio o decisión judicial. «Con su juicio» reproduce de forma natural el valor instrumental/asociativo de ἐν + dativo y mantiene el tono solemne y forense del texto.
translation_notes:
  revision_awareness: El inglés auditado revisó «in his judgment» a «with his judgment» por naturalidad; la versión española sigue esa naturalidad con «con su juicio», sin perder la idea judicial de κρίμα.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al criterio del proyecto.
  - Se traduce κρίμα como «juicio» para conservar el campo jurídico sin recurrir a formulaciones eclesiásticas más interpretativas.
  - Se usa «la tierra» para γῆ por el alcance general del verso, evitando «el país» que estrecharía indebidamente el referente.
