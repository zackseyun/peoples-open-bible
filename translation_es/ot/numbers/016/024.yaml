translation:
  language: es
  text: 'Habla a la congregación, diciendo: «Aléjense[a] de los alrededores de la morada[b] de Coré, Datán y Abiram».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Apártense de los alrededores de la morada de Coré, Datán y Abiram». El verbo hebreo dice literalmente «suban», pero aquí funciona como una orden de retirarse.
    reason: lexical_alternative
  - marker: b
    text: «Morada» traduce el hebreo מִשְׁכָּן en el sentido de habitación o zona de tiendas, no necesariamente el tabernáculo sagrado.
    reason: cultural_note
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige tu palabra a
  lexicon: HALOT
  rationale: El imperativo piel de דבר pide una orden directa de comunicación. «Habla» conserva la fuerza imperativa y resulta natural en español bíblico sin volverse arcaico.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: עֵדָה nombra al conjunto reunido del pueblo. «Congregación» mantiene el sentido colectivo y covenantal que documenta la POB en inglés.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decir
  - así
  lexicon: HALOT
  rationale: Es la fórmula quotativa normal. «Diciendo» preserva la relación sintáctica con la cita sin añadir interpretación.
- source_word: הֵעָלוּ
  english_pob_choice: Move away
  chosen_spanish: Aparétense
  alternatives_spanish:
  - Retírense
  - Aljénguense
  lexicon: HALOT
  rationale: Aunque el verbo básico es עלה, aquí funciona como mandato de retirarse de la zona. La POB en inglés opta por el sentido contextual de alejamiento; «Aparétense» expresa ese valor sin perder el tono imperativo.
- source_word: מִסָּבִיב
  english_pob_choice: from around
  chosen_spanish: de alrededor
  alternatives_spanish:
  - de la cercanía de
  - de en torno a
  lexicon: HALOT
  rationale: La expresión indica separación del contorno inmediato. «De alrededor» refleja bien el hebreo y se integra con naturalidad al español.
- source_word: לְמִשְׁכַּן
  english_pob_choice: the dwelling
  chosen_spanish: la morada
  alternatives_spanish:
  - la vivienda
  - el lugar donde habitaban
  lexicon: HALOT
  rationale: Aquí מִשְׁכָּן no debe leerse como el tabernáculo sagrado sino como el lugar de residencia de Coré, Datán y Abiram. «Morada» conserva el valor de habitación/domicilio y evita una asociación cultual indebida.
- source_word: קֹרַח דָּתָן וַאֲבִירָם
  english_pob_choice: Korah, Dathan, and Abiram
  chosen_spanish: Coré, Datán y Abiram
  alternatives_spanish:
  - Korah, Datan y Abiram
  lexicon: Nombres propios bíblicos estándar
  rationale: 'Se transliteran con la forma castellana usual en Biblia en español: Coré, Datán y Abiram.'
theological_decisions:
- issue: Sentido de מִשְׁכָּן en este versículo
  english_pob_reading: Rendered as 'dwelling' rather than 'tabernacle'
  chosen_spanish_reading: «morada» en vez de «tabernáculo»
  alternative_spanish_readings:
  - tabernáculo
  - tienda
  rationale: El contexto apunta a la residencia o zona de tiendas de Coré, Datán y Abiram, no al santuario central. Traducir «tabernáculo» introduciría un matiz cultual no exigido por el texto.
  doctrine_reference: Primacía del contexto léxico sobre la tradición de traducción; evitar sobrerreferencia cultual donde el hebreo no la impone.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una traducción más literal («Go up from around») por una más natural y contextual («Move away from around»). La versión española sigue esa decisión revisada, manteniendo la literalidad funcional del hebreo sin forzar un calco.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene el tono de mandato directo y la estructura quotativa hebrea sin añadir expansión explicativa en el texto principal.
  - Se evita «tabernáculo» para מִשְׁכָּן porque el referente no es el santuario, conforme al auditoría inglesa.
