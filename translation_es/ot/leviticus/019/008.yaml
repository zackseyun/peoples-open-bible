translation:
  language: es
  text: Quien lo coma cargará con su culpa[a], porque ha profanado lo consagrado a Yahvé[b], y esa persona[c] será cortada[d] de su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevará su iniquidad». El hebreo puede expresar culpabilidad y las consecuencias de ella.
    reason: lexical_alternative
  - marker: b
    text: «Lo consagrado a Yahvé» se refiere a aquello apartado para él; aquí, en el contexto, al alimento sacrificial.
    reason: cultural_note
  - marker: c
    text: O «esa alma». El hebreo dice «alma», un giro legal que se refiere a la persona.
    reason: lexical_alternative
  - marker: d
    text: «Será cortada» es una fórmula de sanción de pacto; aquí el texto no especifica si significa muerte, expulsión o juicio divino directo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֹכְלָיו
  english_pob_choice: Whoever eats it
  chosen_spanish: Quien lo coma
  alternatives_spanish:
  - El que lo coma
  - Quienquiera que lo coma
  lexicon: HALOT
  rationale: El participio con sufijo funciona de manera genérica para cualquier persona que coma el sacrificio. «Quien lo coma» conserva esa fuerza general y suena natural en español.
- source_word: עֲוֺנוֹ יִשָּׂא
  english_pob_choice: shall bear his iniquity
  chosen_spanish: cargará con su culpa
  alternatives_spanish:
  - llevará su iniquidad
  - cargará con su iniquidad
  - llevará su culpa
  lexicon: HALOT
  rationale: La idiomática hebrea expresa responsabilidad y sus consecuencias. «Cargará con su culpa» mantiene el peso legal y moral sin sonar tan rígido como un calco literal.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la sanción; «porque» es la forma más clara y directa en español contemporáneo.
- source_word: קֹדֶשׁ יְהוָה
  english_pob_choice: the holy thing of Yahweh
  chosen_spanish: lo consagrado a Yahvé
  alternatives_spanish:
  - la cosa santa de Yahvé
  - lo santo de Yahvé
  - la ofrenda consagrada a Yahvé
  lexicon: HALOT
  rationale: El hebreo alude a algo puesto aparte para Yahvé, aquí el alimento sacrificial del contexto inmediato. «Lo consagrado a Yahvé» preserva la referencia sin especificar más de lo que el verso dice explícitamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin enmascararlo con mayúsculas sustitutorias.
- source_word: חִלֵּל
  english_pob_choice: has profaned
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha desacralizado
  - ha contaminado
  - ha deshonrado
  lexicon: HALOT
  rationale: El verbo en piel expresa tratar como común lo que es santo. «Ha profanado» es la equivalencia bíblica habitual y precisa.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será apartada
  - será eliminada
  - será cortada de en medio
  lexicon: HALOT
  rationale: La fórmula de pena de pacto se conserva como «será cortada» para no resolver de antemano si implica muerte, expulsión o juicio divino directo.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - esa alma
  - ese individuo
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede decir literalmente «alma», en lenguaje legal designa al individuo. «Esa persona» transmite mejor el sentido jurídico en español.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - de entre su gente
  - de su comunidad
  lexicon: HALOT
  rationale: El sufijo concuerda con נֶפֶשׁ en hebreo, pero el referente es el infractor genérico. «De su pueblo» conserva la fórmula bíblica y su alcance comunitario.
theological_decisions:
- issue: Alcance de la pena de «cortar»
  english_pob_reading: Retain the formula 'shall be cut off' without specifying the mechanism.
  chosen_spanish_reading: Conservar «será cortada» sin precisar el mecanismo de la sanción.
  alternative_spanish_readings:
  - será ejecutada
  - será expulsada
  - será apartada por juicio divino
  rationale: La fórmula hebrea es una sanción de pacto teológicamente cargada, pero el verso no especifica si se trata de muerte, expulsión o juicio directo de Dios. La traducción preserva esa tensión en lugar de resolverla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it).
- issue: Referencia de «lo consagrado a Yahvé»
  english_pob_reading: '''The holy thing of the LORD'' refers to what has been consecrated to the LORD, here the sacrificial meat.'
  chosen_spanish_reading: «Lo consagrado a Yahvé» se entiende como aquello apartado para él, aquí el alimento sacrificial del contexto inmediato.
  alternative_spanish_readings:
  - la ofrenda consagrada a Yahvé
  - la cosa santa de Yahvé
  rationale: El verso no nombra de nuevo el tipo de alimento, pero el contexto inmediato lo hace claro. La traducción mantiene la referencia amplia sin sobreinterpretarla.
  doctrine_reference: Contexto legal-sacrificial de Levítico 19:5-8.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada en inglés, sin cambios de revisión pendientes; se mantiene la fórmula jurídica de «cortar» y la referencia cultual a lo consagrado a Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Culpa/iniquidad» se resuelve en español como «culpa» en el texto principal para dar fluidez, conservando la alternativa literal en nota.
  - «Será cortada» mantiene la ambigüedad jurídica del hebreo sin especificar el modo de sanción.
