review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: ''bajó'', ''a bañarse'', las jóvenes caminando junto al Nilo, la cesta/canasta entre los juncos, y el envío de una sirvienta para tomarla. También preserva correctamente la decisión clave de leer אֲמָתָהּ como ''sirvienta'' y no ''brazo''. Sin embargo, la distribución de notas no refleja con fidelidad el rastro inglés: la nota de alternativa ''entre los juncos'' está anclada en ''juncos'' en vez de en ''en medio de'', y la nota sobre ''su sirvienta / su brazo'' debe anclarse en ''su sirvienta'', no en ''la tomó''.'
  spanish_quality_summary: 'El español es claro y natural, pero conviene un pequeño ajuste de anclaje de notas y una leve mejora de estilo. ''Sus muchachas'' funciona, aunque ''sus jóvenes'' sería menos coloquial; no es necesario cambiarlo. ''Canasta'' es entendible, pero ''cesta'' suena algo más bíblico-natural en este contexto; aun así, no es obligatorio. La oración principal es plenamente legible. El problema principal es técnico-editorial: las notas están colocadas en lugares equívocos.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto en este versículo. Las decisiones 'Nilo', 'sirvienta' para אֲמָתָהּ, y una nota separada para el vínculo intertextual de תבה con el arca de Noé concuerdan con el expediente inglés. La elección 'canasta' es aceptable, aunque 'cesta' podría alinearse mejor con un registro más neutro y menos regional.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'la tomó' en vez de en 'su sirvienta'.
    rationale: La nota explica la lectura de אֲמָתָהּ ('su sirvienta' / tradicionalmente 'su brazo'), no el verbo 'la tomó'. Debe aparecer en el sintagma correspondiente para preservar la lógica del aparato.
  - severity: low
    issue: La nota [a] está colocada después de 'juncos' en vez de sobre la expresión 'en medio de los juncos'.
    rationale: La alternativa 'entre los juncos' corresponde a toda la locución בְּתוֹךְ הַסּוּף, no solo al sustantivo 'juncos'. El anclaje actual puede inducir a pensar que la variante afecta solo al nombre botánico.
  - severity: low
    issue: 'La formulación de la nota [a] es poco natural en español editorial (''O: ...'').'
    rationale: En español bíblico contemporáneo suele leerse mejor 'O bien, ...' o simplemente 'O,' que el formato actual con comillas redundantes.
  revised_spanish_text: Entonces la hija de Faraón bajó a bañarse al Nilo, mientras sus muchachas andaban a lo largo de la orilla del Nilo. Vio la canasta en medio[a] de los juncos[c], y envió a su sirvienta[b] y la tomó.
  revised_footnotes:
