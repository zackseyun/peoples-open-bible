  verdict: revise
  source_alignment_summary: El borrador español capta bien el sentido general del griego y preserva el contraste imagístico entre «boca» y «lengua», en línea con el POB en inglés. Sin embargo, «han caído a la boca de la espada» no es una construcción natural ni fiel al valor instrumental/causal de ἐν aquí; suena direccional («hacia») en vez de «por/mediante». Conviene ajustar la preposición para conservar la literalidad sin sacrificar el español.
  spanish_quality_summary: La frase es mayormente clara, pero «a la boca de la espada» resulta poco idiomática y tropieza en lectura pública. «Por la boca de la espada» mantiene la metáfora y mejora notablemente la naturalidad. El resto del versículo es legible y digno en español eclesial neutral.
  glossary_alignment: No hay términos del glosario mayor implicados aparte de la preservación de la imaginería corporal. El borrador acierta al mantener «lengua» en vez de abstraer a «habla» o «palabras».
