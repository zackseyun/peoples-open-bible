review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: pregunta retórica causal, sujeto singular genérico («el malvado»), desprecio hacia Dios, modismo interno «dice en su corazón», y la decisión importante de mantener la segunda persona en לֹא תִדְרֹשׁ. También conserva correctamente la nota alternativa de tercera persona. Sin embargo, la cláusula final española «No pedirás cuentas» suena menos natural y algo ambigua en registro bíblico; conviene ajustarla para expresar con más claridad el matiz judicial de דרשׁ.'
  spanish_quality_summary: 'El español es claro y legible. «¿Por qué el malvado desprecia a Dios?» y «Dice en su corazón» funcionan bien. La principal mejora necesaria es estilística y semántica en la cita: «No exigirás cuentas» comunica con más precisión y naturalidad el sentido de requerir/investigar judicialmente que «No pedirás cuentas». La nota al pie también debe armonizarse con esa mejora.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: אֱלֹהִים = «Dios» es correcto; no aparece Yahvé ni otros términos sensibles del glosario. La elección «el malvado» para רָשָׁע es aceptable en español. La preservación de la segunda persona en la última cláusula coincide con la decisión teológica documentada por el POB.'
  issues:
  - severity: medium
    issue: «No pedirás cuentas» es menos idiomático y preciso que otras opciones posibles.
    rationale: Aunque es comprensible, en español bíblico y general «exigir cuentas» o «pedir cuentas a alguien» suelen requerir un complemento explícito para sonar plenamente natural. Aquí el hebreo deja implícito el objeto, y «No exigirás cuentas» transmite mejor la fuerza judicial de דרשׁ sin necesidad de expandir demasiado el texto.
  - severity: low
    issue: La nota al pie debe reflejar la redacción principal revisada.
    rationale: Si se mejora el verbo principal, la nota alternativa debe mantener coherencia léxica y estilo con el texto revisado.
