translation:
  language: es
  text: Mi pueblo está inclinado a apartarse de mí[a]; aunque llaman al Altísimo, él no los levanta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Apartarse» traduce un término hebreo que a menudo se vierte como «apostasía» o «rebeldía» persistente.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Todos juntos no lo exaltan» o «Nadie en absoluto lo exalta». El hebreo de la cláusula final es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: Mi pueblo
  alternatives_spanish:
  - Mi nación
  lexicon: HALOT
  rationale: עַם designa aquí el pueblo del pacto; en español, «pueblo» conserva mejor ese matiz relacional que «nación». El sufijo de primera persona exige «mi».
- source_word: תְלוּאִים
  english_pob_choice: are bent on
  chosen_spanish: está inclinado a
  alternatives_spanish:
  - están colgados de
  - están en suspenso
  - dependen de
  lexicon: HALOT
  rationale: El participio de תלא es difícil; la imagen básica sugiere estar colgado, inclinado o fijo hacia algo. En este contexto profético, «está inclinado a» comunica una orientación persistente y obstinada sin volverlo demasiado literal en español.
- source_word: לִמְשׁוּבָתִי
  english_pob_choice: turning away from me
  chosen_spanish: apartarse de mí
  alternatives_spanish:
  - mi apartamiento
  - apostasía
  - retroceder de mí
  lexicon: HALOT
  rationale: מְשׁוּבָה suele expresar apostasía o retroceso. Con el sufijo de primera persona, la expresión es sintácticamente difícil; en español, «apartarse de mí» aclara la orientación relacional del alejamiento sin perder la fuerza profética del término.
- source_word: וְאֶל־עַל
  english_pob_choice: though they call to the Most High
  chosen_spanish: aunque llaman al Altísimo
  alternatives_spanish:
  - y al Altísimo llaman
  - aunque claman al Altísimo
  lexicon: HALOT
  rationale: La construcción אֶל־עַל se entiende convencionalmente como «al Altísimo». Se usa «aunque» para reflejar el contraste concesivo con la segunda cola del versículo.
- source_word: יִקְרָאֻהוּ
  english_pob_choice: they call to
  chosen_spanish: llaman a
  alternatives_spanish:
  - claman a
  - invocan a
  lexicon: HALOT
  rationale: El verbo en 3 plural con sufijo 3 masculino singular significa que ellos lo llaman/invocan. En español, «llaman a» mantiene la naturalidad y el objeto implícito en «al Altísimo».
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: יַחַד tiene valor colectivo; «juntos» conserva esa fuerza adverbial y el sentido corporativo.
- source_word: לֹא יְרוֹמֵם
  english_pob_choice: he does not lift them up
  chosen_spanish: no lo exalta
  alternatives_spanish:
  - no los levanta
  - no lo levanta
  - nadie lo exalta
  lexicon: HALOT
  rationale: רוּם puede significar levantar o exaltar. Siguiendo la lectura contextual principal del texto inglés auditado, se mantiene la idea de exaltación/levantamiento. En español, el pronombre singular «lo» se refiere al Altísimo, mientras que la sintaxis del hebreo sigue siendo difícil y queda abierta a lectura alternativa.
theological_decisions:
- issue: Sentido del colon final יַחַד לֹא יְרוֹמֵם
  english_pob_reading: 'The subject is the Most High: despite their calling, he does not lift them up.'
  chosen_spanish_reading: El Altísimo no responde elevándolos/exaltándolos, a pesar de que lo llaman.
  alternative_spanish_readings:
  - Todos juntos no lo exalten.
  - Nadie en absoluto lo exalta.
  rationale: El hebreo es comprimido y puede leerse tanto como no-respuesta divina como falta de exaltación humana. Se conserva la tensión permitiendo que el verso quede abierto, en vez de resolverla de manera dogmática.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto sigue de cerca el expediente inglés POB y conserva la dificultad reconocida en el hebreo final, sin eliminar la ambigüedad textual ni imponer una solución única. No hubo revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa «Altísimo» para אֶל־עַל, en continuidad con la decisión inglesa auditada.
  - Se evita «SEÑOR» para el nombre divino porque aquí no aparece el tetragrámaton; el referente es una designación de Dios como el Altísimo.
  - Se mantiene el tono profético con «apartarse de mí» en lugar de un eufemismo más débil.
  - El pronombre «lo» en la cláusula final sigue la lectura principal auditada; la nota conserva la alternativa permitida por el hebreo.
