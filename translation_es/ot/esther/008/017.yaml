revisions:
- from: Y en toda provincia y en toda ciudad, dondequiera que llegaba la palabra del rey y su decreto, había alegría y gozo para los judíos, banquete y día bueno. Y muchos de los pueblos de la tierra se estaban haciendo judíos[a], porque había caído sobre ellos el temor de los judíos.
  to: Y en toda provincia y en toda ciudad, dondequiera que llegaba la palabra del rey y su decreto, había alegría y gozo para los judíos, banquete y un buen día[a]. Y muchos de entre los pueblos de la tierra se hacían judíos[b], porque había caído sobre ellos el temor de los judíos.
  rationale: 'La revisión hace dos ajustes menores pero importantes: mejora la naturalidad española de יוֹם טוֹב con ''un buen día'' y añade la nota lexical correspondiente, y simplifica ''se estaban haciendo judíos'' a ''se hacían judíos'' sin perder la tensión procesual del hebreo. También se pule la nota alternativa para que suene más natural en español. No cambia el sentido global ni la decisión teológica auditada.'
