translation:
  language: es
  text: 'Entonces Saúl había tomado el reinado sobre Israel, y combatió por todos lados contra todos sus enemigos: contra Moab, contra los amonitas, contra Edom, contra los reyes de Zobá y contra los filisteos. Adondequiera que se dirigía, infligía castigo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los condenaba»; el verbo hebreo puede significar declarar culpable, y aquí probablemente alude a una derrota punitiva infligida a sus enemigos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד הַמְּלוּכָה
  english_pob_choice: had taken the kingship
  chosen_spanish: había tomado la realeza
  alternatives_spanish:
  - había conquistado el reino
  - había tomado el reino
  - había asumido el trono
  lexicon: HALOT
  rationale: לָכַד conserva la idea de tomar o apoderarse de algo; en este contexto no se sugiere usurpación ilegítima, sino el establecimiento firme del poder real. 'Realeza' comunica mejor en español el sentido institucional de מְלוּכָה que 'reino', que puede sonar más territorial que funcional.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingship
  chosen_spanish: la realeza
  alternatives_spanish:
  - el reinado
  - la monarquía
  - el reino
  lexicon: HALOT
  rationale: Se eligió un sustantivo abstracto para reflejar el cargo/autoridad real. 'Realeza' mantiene dignidad y evita reducir el término a territorio; 'reinado' también sería posible, pero aquí 'realeza' conserva mejor el matiz institucional.
- source_word: וַיִּלָּחֶם
  english_pob_choice: he fought
  chosen_spanish: combatió
  alternatives_spanish:
  - peleó
  - luchó
  - hizo guerra
  lexicon: HALOT
  rationale: El verbo narrativo expresa acción bélica continua o reiterada. 'Combatió' es formal, natural y suficientemente amplio para no estrechar indebidamente el alcance de la guerra descrita.
- source_word: סָבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - en derredor
  - a su alrededor
  - en todas direcciones
  lexicon: HALOT
  rationale: La expresión idiomática del hebreo indica amplitud geográfica de las campañas. 'Por todos lados' es idiomático en español y conserva la idea distributiva sin sonar forzado.
- source_word: בְּכָל אֹיְבָיו
  english_pob_choice: against all his enemies
  chosen_spanish: contra todos sus enemigos
  alternatives_spanish:
  - frente a todos sus enemigos
  - en contra de todos sus enemigos
  lexicon: HALOT
  rationale: El ב con לחם marca al oponente de guerra; en español la preposición 'contra' expresa mejor ese valor bélico que un calco con 'con' o 'en'.
- source_word: בְּמוֹאָב ... וּבִבְנֵי עַמּוֹן ... וּבֶאֱדוֹם ... וּבְמַלְכֵי צוֹבָה ... וּבַפְּלִשְׁתִּים
  english_pob_choice: against Moab, against the Ammonites, against Edom, against the kings of Zobah, and against the Philistines
  chosen_spanish: contra Moab, contra los amonitas, contra Edom, contra los reyes de Zobá y contra los filisteos
  alternatives_spanish:
  - contra los hijos de Amón
  - contra los pueblos de Amón
  lexicon: HALOT
  rationale: Se conserva la lista de enemigos con paralelismo claro. 'Amonitas' traduce de manera natural 'hijos de Amón'; se mantiene el plural 'reyes de Zobá' como en el hebreo, en vez de suavizarlo a singular.
- source_word: וּבְמַלְכֵי צוֹבָה
  english_pob_choice: against the kings of Zobah
  chosen_spanish: contra los reyes de Zobá
  alternatives_spanish:
  - contra el rey de Zobá
  lexicon: HALOT
  rationale: El plural hebreo se preserva por fidelidad al texto. 'Zobá' conserva la transliteración habitual en español para el topónimo.
- source_word: וּבְכֹל אֲשֶׁר יִפְנֶה
  english_pob_choice: Wherever he turned
  chosen_spanish: Dondequiera que se volvía
  alternatives_spanish:
  - adondequiera que se dirigía
  - en cualquier lugar al que se volvía
  lexicon: HALOT
  rationale: La construcción distributiva se expresa de forma natural con 'dondequiera que'. 'Se volvía' mantiene el movimiento direccional del verbo פנה sin sobreinterpretarlo.
- source_word: יַרְשִׁיעַ
  english_pob_choice: he inflicted punishment
  chosen_spanish: infligía castigo
  alternatives_spanish:
  - lo condenaba
  - traía castigo
  - imponía castigo
  lexicon: HALOT
  rationale: 'Se conserva la tensión lexical del hebreo: el verbo puede significar declarar culpable o tratar como culpable, y en este contexto militar apunta a derrota punitiva. ''Infligía castigo'' mantiene el sentido de sanción/represalia sin cerrar indebidamente el matiz judicial.'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión final del inglés POB, que pasó de ''secured'' a ''taken'' para לָכַד y de ''brought punishment'' a ''inflicted punishment'' para יַרְשִׁיעַ. Se preservó la misma dirección interpretativa: una toma firme de la realeza y una acción militar punitiva, sin suavizar el verbo hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el Tetragrámaton aquí.
  - Se preservó el plural 'reyes de Zobá' conforme al hebreo.
  - La lista de pueblos/enemigos se tradujo con preposición repetida 'contra' para reproducir el paralelismo bélico.
  - '''Realeza'' se eligió como equivalente abstracto de מְלוּכָה para evitar reducir el término a un simple territorio.'
