  language: en
  yaml_path: translation/ot/2_kings/010/015.yaml
  text: He went on from there and found Jehonadab the son of Rechab coming to meet him[a]. He greeted him and said to him, “Is your heart upright, as my heart is with your heart?” Jehonadab said, “It is, it is.” Then he said, “Give me your hand.” So he gave him his hand[c][b], and he took him up to himself into the chariot.
  footnotes:
