translation:
  language: es
  text: Mi pueblo consulta a su pedazo de madera[a], y su vara le anuncia; porque un espíritu de prostitución[b] los ha extraviado, y se prostituyeron[c], apartándose de debajo de su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «su madera» o, más interpretativamente, «su ídolo de madera». El hebreo es literalmente «su madera», probablemente un singular colectivo para un objeto cultual de madera usado en adivinación.
    reason: lexical_alternative
  - marker: b
    text: O «un espíritu de prostituciones» o «un espíritu de infidelidad». El hebreo mantiene explícita la metáfora de prostitución.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «apartándose de debajo de su Dios», un modismo para abandonar la lealtad y la autoridad debidas a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: Mi pueblo
  alternatives_spanish:
  - Mi nación
  lexicon: HALOT
  rationale: עַם aquí designa al pueblo del pacto; el sufijo de primera persona exige una relación posesiva directa. «Mi pueblo» conserva la voz divina y la relación pactual sin añadir interpretación.
- source_word: בְּעֵצוֹ
  english_pob_choice: their piece of wood
  chosen_spanish: su pedazo de madera
  alternatives_spanish:
  - su madera
  - su ídolo de madera
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente concreta y algo burlona; «pedazo de madera» preserva ese golpe retórico mejor que una paráfrasis más interpretativa. El posesivo se mantiene de forma distributiva para concordar con el colectivo «mi pueblo».
- source_word: יִשְׁאַל
  english_pob_choice: consult
  chosen_spanish: consulta
  alternatives_spanish:
  - pregunta
  - inquiere
  lexicon: HALOT
  rationale: שׁאל significa «preguntar/inquirir», pero en un contexto de adivinación el español «consultar» es natural y comunica mejor el acto de buscar guía en un objeto.
- source_word: וּמַקְלוֹ
  english_pob_choice: their staff
  chosen_spanish: su vara
  alternatives_spanish:
  - su bastón
  - su palo
  lexicon: HALOT
  rationale: מַקֵּל es «vara/bastón». «Vara» conserva la concreción y el posible uso ritual del objeto; «bastón» sería válido, pero aquí «vara» suena más neutro y cercano al hebreo.
- source_word: יַגִּיד לוֹ
  english_pob_choice: tells them
  chosen_spanish: le anuncia
  alternatives_spanish:
  - les dice
  - le declara
  lexicon: HALOT
  rationale: נגד en hifil es «declarar/hacer saber». En español, «anuncia» mantiene la idea de dar respuesta oracular; se usa singular por el paralelismo con la vara, sin perder el sentido colectivo del destinatario.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la conducta descrita; «porque» expresa con claridad la relación causal en español.
- source_word: רוּחַ זְנוּנִים
  english_pob_choice: a spirit of whoredom
  chosen_spanish: un espíritu de prostituciones
  alternatives_spanish:
  - un espíritu de prostitución
  - un espíritu de infidelidad
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual y profética. «Prostituciones» suena menos abstracto que «prostitución» y refleja el plural hebreo; evita suavizar la fuerza del texto, aunque en español sea una forma poco común.
- source_word: הִתְעָה
  english_pob_choice: has led them astray
  chosen_spanish: los ha extraviado
  alternatives_spanish:
  - los ha desviado
  - los ha hecho errar
  lexicon: HALOT
  rationale: תעה en hifil puede ser «hacer errar/causar desvío». «Extraviado» recoge tanto la idea de desorientación como la de apartarse del camino correcto.
- source_word: וַיִּזְנוּ
  english_pob_choice: they have played the whore
  chosen_spanish: han practicado la prostitución
  alternatives_spanish:
  - han fornicado
  - se han prostituido
  - han sido infieles
  lexicon: HALOT
  rationale: זנה es el verbo profético clave para inmoralidad sexual usada como metáfora de idolatría. «Han practicado la prostitución» mantiene la fuerza del verbo sin recurrir a una locución demasiado arcaica, aunque conserva claramente el tono escandaloso.
- source_word: מִתַּחַת אֱלֹהֵיהֶם
  english_pob_choice: departing from under their God
  chosen_spanish: apartándose de debajo de su Dios
  alternatives_spanish:
  - de debajo de su Dios
  - alejándose de su Dios
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente «de debajo de». «Apartándose de debajo de su Dios» conserva la imagen de salir de su cobertura/autoridad pactual sin borrar el giro hebreo.'
theological_decisions:
- issue: Metáfora sexual profética para la idolatría
  english_pob_reading: Retain explicit prostitution/whoredom language in the main text
  chosen_spanish_reading: Conservar el lenguaje explícito de prostitución en el texto principal
  alternative_spanish_readings:
  - usar «infidelidad» o «idolatría»
  - suavizar con «desviación»
  rationale: Oseas usa deliberadamente una metáfora sexual fuerte para expresar la apostasía del pueblo. Suavizarla en español reduciría la fuerza retórica y teológica del pasaje.
  doctrine_reference: Poética profética; fidelidad lexical al paralelo hebreo
- issue: Construcción idiomática «de debajo de»
  english_pob_reading: Literally 'from under their God,' an idiom for departing from the proper allegiance and authority of their God
  chosen_spanish_reading: Mantener «apartándose de debajo de su Dios» como imagen idiomática
  alternative_spanish_readings:
  - «apartándose de su Dios»
  - «saliendo de su autoridad»
  rationale: La imagen hebrea comunica salida de la cobertura, autoridad y lealtad debidas. El español conserva el giro para no borrar la metáfora, aun si requiere una frase menos usual.
  doctrine_reference: Alianza/pacto; autoridad y lealtad a Dios
translation_notes:
  revision_awareness: Se revisó el pasaje con atención al lenguaje profético de Oseas, manteniendo la metáfora sexual explícita, la imagen concreta de la madera y la vara, y el modismo hebreo final. La redacción sigue la línea de la POB inglesa en preservar tensiones léxicas sin suavizarlas indebidamente.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהֵיהֶם en coherencia con el resto del proyecto.
  - Se eligió «prostitución/prostituciones» para reflejar זְנוּנִים y no sustituirlo por un término más abstracto.
  - Se conservó la estructura posesiva distributiva («su» en objetos singulares) para reflejar el colectivo hebreo.
  - Se usó puntuación moderna en español y se colocaron las notas únicamente en los puntos donde el texto principal admite una alternativa lexical real.
