base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/050.yaml
  text: Then Ahaziah son of Ahab said to Jehoshaphat[b][a], “Let my servants go with your servants in the ships,” but Jehoshaphat was not willing.
  footnotes:
  - marker: a
    text: Or, “on the ships.” The Hebrew preposition can be rendered either way in English with seafaring contexts.
    reason: lexical_alternative
  - marker: b
    text: Or, “but Jehoshaphat refused.” The Hebrew more literally says he “was not willing.”
    reason: lexical_alternative
