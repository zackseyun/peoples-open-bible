translation:
  language: es
  text: 'Y les dijo a sus hombres[a]: «¡Lejos de mí, ante Yahvé, hacer esta cosa a mi señor, al ungido de Yahvé, extender mi mano contra él, porque él es el ungido de Yahvé!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «¡Yahvé me libre de hacer esto!». El modismo hebreo expresa fuerte repulsión ante tal acto en relación con Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי מֵיְהוָה
  english_pob_choice: Far be it from me, from Yahweh
  chosen_spanish: ¡Lejos de mí, de parte de Yahvé!
  alternatives_spanish:
  - ¡Guárdeme Yahvé de esto!
  - ¡Lejos de mí por causa de Yahvé!
  lexicon: HALOT
  rationale: La fórmula hebrea expresa repulsión/prohibición idiomática, no solo negación. «Lejos de mí» comunica bien esa aborrecimiento solemne en español; «de parte de Yahvé» preserva la relación con el nombre divino sin convertirlo en una simple muletilla tradicional.
- source_word: אִם אֶעֱשֶׂה
  english_pob_choice: that I should do
  chosen_spanish: hacer
  alternatives_spanish:
  - que yo hiciera
  - si hiciera
  lexicon: HALOT
  rationale: Después de חָלִילָה, el hebreo funciona como repudio enfático. En español, el infinitivo tras «lejos de mí» resulta natural y mantiene el valor de rechazo de la construcción sin sobrecargarla con un condicional literal.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este acto
  - este hecho
  lexicon: HALOT
  rationale: דָבָר es amplio; «cosa» preserva esa generalidad mejor que «acto», que ya interpreta más específicamente la acción.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - contra mi señor
  lexicon: HALOT
  rationale: Se mantiene el tratamiento respetuoso que David da a Saúl. La idea hostil se expresa después con «contra él», por lo que no hace falta cargar «mi señor» con un matiz adversativo.
- source_word: לִמְשִׁיחַ יְהוָה
  english_pob_choice: the LORD’s anointed
  chosen_spanish: al ungido de Yahvé
  alternatives_spanish:
  - al Mesías de Yahvé
  - al ungido del SEÑOR
  lexicon: HALOT
  rationale: En este contexto real de Saúl, «ungido» conserva el sentido histórico-sacral sin introducir una lectura cristológica anacrónica. Se evita «Mesías» en el cuerpo principal porque en español suele evocar más fuertemente el uso posterior y puede oscurecer el contexto inmediato.
- source_word: לִשְׁלֹחַ יָדִי בּוֹ
  english_pob_choice: to stretch out my hand against him
  chosen_spanish: para extender mi mano contra él
  alternatives_spanish:
  - para alzar mi mano contra él
  - para ponerle la mano encima
  lexicon: HALOT
  rationale: La imagen corporal del hebreo se conserva con «extender mi mano». El complemento «contra él» explicita la dirección hostil que en español conviene dejar clara.
- source_word: כִּי מְשִׁיחַ יְהוָה הוּא
  english_pob_choice: for he is Yahweh’s anointed
  chosen_spanish: porque él es el ungido de Yahvé
  alternatives_spanish:
  - pues él es el ungido de Yahvé
  lexicon: HALOT
  rationale: כִּי introduce la razón de la negativa. La repetición de «ungido de Yahvé» reproduce el énfasis del hebreo y la lógica de la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yavé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no la sustitución litúrgica «Señor».'
theological_decisions:
- issue: Título real-sacral de מְשִׁיחַ aplicado a Saúl
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el ungido del Señor
  rationale: El texto subraya la inviolabilidad de Saúl por haber sido apartado por Yahvé para la realeza. Traducirlo como «Mesías» en la línea principal puede inducir una lectura cristológica que el contexto no exige; «ungido» mantiene la dignidad teológica y la referencia histórica.
  doctrine_reference: Translation philosophy §2; principio de evitar anacronismo cristológico en títulos reales del AT
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado, que ajustó la idiomaticidad de חָלִילָה לִּי מֵיְהוָה hacia una fórmula más literal respecto al vínculo con Yahweh y afinó el infinitivo de לִשְׁלֹחַ. La versión española conserva esos dos ajustes: «de parte de Yahvé» y «para extender mi mano».'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה.
  - Se mantuvo «ungido de Yahvé» en ambas ocurrencias de מְשִׁיחַ para reproducir el énfasis del verso.
  - «a sus hombres[a]» ancla la nota textual/lexical sobre el destinatario del discurso.
  - «ungido de Yahvé[b]» ancla la nota sobre la posible alternativa «Mesías» sin introducirla en el texto principal.
