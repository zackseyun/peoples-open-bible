base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/012/001.yaml
  text: And he ordered that she be brought in where his silver was kept[b][a], and he directed that food be set before her from his own provisions and that she drink from his wine.
  footnotes:
  - marker: a
    text: Or 'his silver vessels.' The Greek term can denote silver articles generally; in this banquet setting it likely refers to tableware or serving vessels.
    reason: lexical_alternative
  - marker: b
    text: Or 'that a table be spread for her from his delicacies.' The Greek verb and noun together can be rendered more formally as laying out his prepared dishes.
    reason: lexical_alternative
