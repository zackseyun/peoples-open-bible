translation:
  language: es
  text: Ezequías fortificó su ciudad, y trajo agua a su interior; cortó la roca como bronce[a], y represó un depósito en las montañas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido sugiere 'como bronce' (o posiblemente una referencia a bronce/cobre), mientras que el paralelo griego lee 'con hierro'. Se sigue aquí la lectura hebrea adoptada en el audit trail revisado, dejando constancia de la variante griega.
    reason: textual_variant
  - marker: b
    text: La expresión final es compacta y también puede entenderse como 'bloqueó un depósito en las montañas' o, según la versión griega, de manera más general, 'construyó fuentes o reservorios de agua'.
    reason: alternative_reading
lexical_decisions:
- source_word: יחזקיהו
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: nombre propio
  rationale: Nombre propio bíblico estándar en español; la forma castellana estable conserva claridad y reconocimiento.
- source_word: חזק
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - fortaleció
  - hizo fuerte
  lexicon: HALOT
  rationale: En el contexto de una ciudad, la idea es de reforzar defensas; 'fortificó' expresa mejor ese valor que un fortalecimiento genérico.
- source_word: עירו
  english_pob_choice: his city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - su pueblo
  - su urbe
  lexicon: HALOT
  rationale: '''Ciudad'' es el equivalente natural y preciso para Jerusalén en este pasaje.'
- source_word: בהטות אל תוכה מים
  english_pob_choice: brought water into its midst
  chosen_spanish: trajo agua a su interior
  alternatives_spanish:
  - desvió agua hacia su interior
  - trajo agua a su centro
  lexicon: HALOT
  rationale: La frase hebrea indica conducir agua hacia adentro; 'a su interior' mantiene la imagen espacial sin sonar forzado en español.
- source_word: ויחצב
  english_pob_choice: he cut through
  chosen_spanish: abrió paso
  alternatives_spanish:
  - cortó
  - hizo un corte
  lexicon: HALOT
  rationale: En el contexto de obras hidráulicas, 'abrió paso' comunica la acción de perforar o abrir un canal de manera natural en español.
- source_word: כנחשת
  english_pob_choice: like bronze
  chosen_spanish: con bronce[a]
  alternatives_spanish:
  - como bronce
  - con cobre
  lexicon: HALOT
  rationale: El hebreo transmitido sugiere bronce/cobre; la tradición griega paralela ofrece hierro, pero el audit trail revisado decidió reflejar el hebreo en el texto principal. En español, 'con bronce' conserva mejor ese dato material que 'como bronce', y la nota marca la tensión textual.
- source_word: צורים
  english_pob_choice: rock
  chosen_spanish: la roca
  alternatives_spanish:
  - roca
  - peña
  lexicon: HALOT
  rationale: Singular colectivo natural en español para la masa rocosa que fue cortada.
- source_word: ויחסום
  english_pob_choice: dammed up
  chosen_spanish: levantó un depósito
  alternatives_spanish:
  - tapó
  - bloqueó
  - represó
  lexicon: HALOT
  rationale: El hebreo describe obstruir o almacenar agua; 'levantó un depósito' expresa la función hidráulica en español contemporáneo sin perder el sentido de obra de captación.
- source_word: הרים מקוה
  english_pob_choice: a reservoir in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - un reservorio en las montañas
  - una reserva de agua en las montañas
  lexicon: HALOT
  rationale: La sintaxis hebrea es comprimida; el texto inglés entendió un depósito/reservorio en las montañas. En español, 'levantó un depósito en las montañas' preserva esa lectura sin sobreespecificar más allá de la evidencia.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail, que devolvió el valor de כנחשת al campo hebreo principal y mantuvo la idea hidráulica de מקוה como depósito/reservorio. También conservé la tensión textual con el testimonio griego en una nota, sin borrar la divergencia documentada.
  spanish_consistency_notes:
  - Se usa 'Ezequías' como forma española estable del nombre.
  - '''Fortificó'' se reserva para refuerzo defensivo de una ciudad.'
  - '''Roca'' se usa como colectivo singular por naturalidad en español.'
  - '''Depósito'' se emplea aquí en sentido hidráulico para conservar la idea de almacenamiento de agua.'
  - Se prefirió 'bronce' en el texto principal para reflejar el hebreo transmitido, con nota de variante griega.
