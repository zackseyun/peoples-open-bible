translation:
  language: es
  text: Pero un hombre siempre tiene temor[a]; a quien conoces como guardador del mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de la Guenizá de El Cairo aquí dice algo muy diferente, aproximadamente: «Pero un hombre siempre tiene temor; a quien conoces como guardador del mandamiento». El testimonio hebreo en este versículo parece estar textualmente alterado; la lectura griega paralela ofrece un dicho sapiencial coherente.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀρχὴ παντὸς ἔργου
  english_pob_choice: the beginning of every work
  chosen_spanish: el comienzo de toda obra
  alternatives_spanish:
  - el principio de toda obra
  - el comienzo de todo trabajo
  lexicon: BDAG / uso sapiencial
  rationale: «ἀρχή» en este dicho sapiencial expresa el inicio o punto de partida; «comienzo» suena natural en español y conserva la idea temporal. «ἔργον» puede ser «obra» o «trabajo»; «obra» mantiene mejor el tono proverbial y la amplitud del término sin volverlo demasiado técnico.
- source_word: λόγος
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un dicho
  - una expresión
  - un consejo
  lexicon: BDAG
  rationale: «λόγος» puede ser palabra, dicho o discurso. Aquí, por el paralelismo con «consejo», «una palabra» conserva la forma breve y proverbial sin interpretar de más.
- source_word: πρὸ πάσης πράξεως
  english_pob_choice: before every deed
  chosen_spanish: antes de toda acción
  alternatives_spanish:
  - antes de toda obra
  - antes de cualquier hecho
  lexicon: BDAG
  rationale: «πρὸ» indica anterioridad temporal; «πράξις» es acción o acto. «Acción» es claro y natural en español, y evita repetir «obra» de la primera cola.
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - deliberación
  - plan
  - propósito
  lexicon: BDAG
  rationale: «βουλή» en literatura sapiencial suele referirse a consejo, deliberación o plan pensado. «Consejo» conserva esa noción de reflexión previa y funciona bien como paralelo de «palabra».
theological_decisions:
- issue: Conflicto entre el hebreo transmitido y el paralelo griego
  english_pob_reading: The coherent Greek reading is used as the main text while the Hebrew witness is acknowledged as disturbed/corrupt here.
  chosen_spanish_reading: Se traduce la lectura griega coherente como texto principal, sin forzar el hebreo transmitido de esta sección.
  alternative_spanish_readings:
  - 'Una traducción del hebreo conservado: «Pero un hombre siempre teme; a quien conoces guarda el mandamiento».'
  rationale: El paquete fuente marca el hebreo con «major_mismatch» y ofrece un paralelo griego sintácticamente claro y proverbial. En una edición transparente como POB, conviene seguir el griego como base de traducción principal aquí, manteniendo la diferencia textual como trasfondo de la decisión.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácides, traducir del hebreo cuando se conserve y del griego cuando el hebreo esté ausente o textualmente disturbado; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La revisión previa fue descartada porque seguía el hebreo transmitido y no el paralelo griego coherente. Esta versión corrige eso y alinea el texto español con la lectura griega principal del expediente auditado.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y sapiencial, apto para publicación.
  - Se evitó «Señor» u otras fórmulas no pertinentes, porque no aparecen en este versículo.
  - Se usó «consejo» como equivalente estándar de βουλή, sin cargarlo de sentido eclesiástico.
  - «Obra» y «acción» distinguen bien los dos miembros del paralelismo sin crear redundancia excesiva.
