revisions:
- from: Tus palabras fueron halladas[a], y yo las comí; y tus palabras llegaron a ser para mí gozo y alegría de mi corazón, porque tu nombre es invocado sobre mí, Yahvé, Dios de los ejércitos.
  to: Tus palabras fueron halladas, y yo las comí; y tus palabras fueron para mí gozo y alegría de mi corazón, porque tu nombre es llamado sobre mí[a], Yahvé, Dios de las huestes.
  rationale: Se corrige el modismo hebreo para conservar el verbo «llamar» en vez de introducir «invocar», y se mantiene la alternativa idiomática en nota, como en la auditoría inglesa. También se ajusta אֱלֹהֵי צְבָאוֹת a «Dios de las huestes», más fiel al racional léxico documentado, y se alisa la sintaxis española con «fueron para mí».
  reviewer_model: gpt-5.4
