translation:
  language: es
  text: Yahvé tu Dios circuncidará tu corazón[a] y el corazón de tu descendencia[b], para que ames a Yahvé tu Dios con todo tu corazón y con toda tu alma[c], para que vivas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''circuncidará tu corazón''; una metáfora de transformación interior y devoción de pacto.'
    reason: cultural_note
  - marker: b
    text: O 'el corazón de tus descendientes'.
    reason: lexical_alternative
  - marker: c
    text: O 'con toda tu vida' o 'con todo tu ser'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָל
  english_pob_choice: will circumcise
  chosen_spanish: circuncidará
  alternatives_spanish:
  - cortará
  - extirpará el prepucio de
  lexicon: HALOT
  rationale: El verbo מול conserva su imagen pactal de la circuncisión; en español, 'circuncidará' mantiene la metáfora sin diluirla en una paráfrasis. Aunque aplicado al corazón es figurado, el gesto ritual sigue siendo el trasfondo teológico del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton en forma transliterada, conforme a la convención del proyecto. 'Yahvé' evita la sustitución por un título y hace audible la continuidad con el texto hebreo.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva directa del hebreo se rinde de manera natural y precisa con 'tu Dios'.
- source_word: לְבָבְךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: En Deuteronomio, לֵבָב designa el centro interior de la persona, incluyendo voluntad y afectos. 'Corazón' es el equivalente español estable y suficientemente amplio.
- source_word: לְבַב זַרְעֶךָ
  english_pob_choice: the heart of your offspring
  chosen_spanish: el corazón de tu descendencia
  alternatives_spanish:
  - el corazón de tus descendientes
  - el corazón de tu semilla
  lexicon: HALOT
  rationale: זֶרַע puede significar 'descendencia', 'descendientes' o 'simiente'. 'Descendencia' conserva el sentido colectivo y es idiomática en español bíblico contemporáneo.
- source_word: לְאַהֲבָה
  english_pob_choice: so that you may love
  chosen_spanish: para que ames
  alternatives_spanish:
  - para amar
  - a fin de que ames
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. 'Para que ames' comunica la finalidad de modo natural en español y preserva el impulso teleológico de la cláusula.
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo el corazón
  - con tu corazón entero
  lexicon: HALOT
  rationale: La fórmula pactal se mantiene de forma directa y reconocible, sin perder el alcance total de la devoción requerida.
- source_word: וּבְכָל נַפְשְׁךָ
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda tu alma
  alternatives_spanish:
  - y con toda tu vida
  - y con todo tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede abarcar alma, vida o ser. 'Alma' preserva la correspondencia tradicional de la fórmula deuteronómica y su resonancia teológica, mientras la nota reconoce la amplitud semántica.
- source_word: לְמַעַן חַיֶּיךָ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivas
  alternatives_spanish:
  - a fin de que vivas
  - para tu vida
  lexicon: HALOT
  rationale: La finalidad/resultadode לְמַעַן se expresa con 'para que'. 'Vivas' reproduce de manera natural el resultado prometido sin sobreinterpretar el hebreo.
theological_decisions:
- issue: Metáfora de la circuncisión del corazón
  english_pob_reading: Retained the metaphor 'circumcise your heart' in the main text.
  chosen_spanish_reading: Se mantiene la metáfora 'circuncidará tu corazón' en el texto principal.
  alternative_spanish_readings:
  - cambiará tu corazón
  - purificará tu corazón
  rationale: El hebreo usa una imagen de pacto y transformación interior. Conservarla evita borrar la relación entre signo ritual e interioridad renovada.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de נֶפֶשׁ en la fórmula de amor
  english_pob_reading: Rendered נֶפֶשׁ as 'soul' in the main text.
  chosen_spanish_reading: Se rinde נֶפֶשׁ como 'alma' en la fórmula principal.
  alternative_spanish_readings:
  - vida
  - ser
  rationale: Aunque el término puede abarcar vida o ser, en esta fórmula fija la pareja 'corazón/alma' es natural en español y conserva el peso totalizador del mandamiento.
  doctrine_reference: Translation philosophy §§3, 5, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el texto concordó plenamente con el control cruzado; por eso la presente redacción sigue de cerca el consenso del POB en inglés, ajustándolo a una sintaxis española natural sin perder la metáfora central ni la amplitud semántica de זֶרַע y נֶפֶשׁ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma uniforme para el tetragrámaton.
  - Se conserva 'tu corazón' / 'tu alma' como equivalentes principales de לֵבָב / נֶפֶשׁ.
  - '''Descendencia'' evita el calco ''semilla'' y suena natural en español bíblico contemporáneo.'
  - La nota [b] explica la metáfora sin reemplazarla en el texto principal.
