  revision_rationale: La revisión corrige el anclaje incorrecto de la nota sobre Sirión, mejora la naturalidad del español con «Hace que Líbano salte», y alinea mejor el segundo símil con la decisión léxica auditada al añadir el matiz de «salvaje» presente en רְאֵמִים. Se mantiene la estructura poética y la transliteración de «Sirión».
