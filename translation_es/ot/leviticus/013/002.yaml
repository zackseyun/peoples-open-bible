    text: Tradicionalmente, «una infección de lepra» o «una enfermedad de lepra». El hebreo צָרָעַת designa una categoría más amplia de afección cutánea y no debe identificarse automáticamente con la lepra moderna (enfermedad de Hansen).
    reason: alternative_reading
  revision_rationale: Se corrigió la ubicación de la nota para que explique el término correspondiente a צָרָעַת/«lepra», se eliminó una nota léxica redundante, y se ajustó «uno de sus hijos, los sacerdotes» a «uno de sus hijos sacerdotes» para reflejar con más naturalidad y precisión el hebreo en español.
