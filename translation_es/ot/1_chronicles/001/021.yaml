- source_word: דִּקְלָה
  english_pob_choice: Diklah
  chosen_spanish: Dikla
  alternatives_spanish:
  - Dikla
  - Diklah
  lexicon: nombre propio hebreo
  rationale: El hebreo termina en -ה, pero en español la forma del nombre suele quedar más natural y transparente como Dikla. La variante inglesa auditada conserva una h final transliterada; en español, esa h final no aporta pronunciación y puede omitirse sin perder identificación del nombre.
- source_word: וְ/אֶת ... וְ/אֶת ... וְ/אֶת
  english_pob_choice: '[simple coordination expressed as a list with ''and'' before the final item]'
  chosen_spanish: lista simple con "y" antes del último elemento
  alternatives_spanish:
