  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: dicho interior/colectivo, razonamiento errado, brevedad y aflicción de la vida, ausencia de remedio al final de la vida humana, y falta de precedente de regreso desde Hades. Sin embargo, dos decisiones no preservan del todo el matiz auditado: la nota [a] no corresponde al inglés POB ni al participio ὁ ἀναλύσας, y «nadie ha sido conocido que haya regresado» suena poco natural en español para ἐγνώσθη con fuerza gnómica.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero puede mejorar en naturalidad. «Dolorosa» es defendible, aunque «penosa» o «dolorosa» ambas sirven; no exige cambio. Lo que sí conviene reparar es la cláusula final, para evitar un giro extraño, y sustituir la nota [a] por la alternativa documentada sobre «el que salió/liberado de Hades».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Hades» se preserva correctamente. No intervienen Yahvé/Mesías/etc. La expresión genérica «la vida de un hombre» sigue la auditoría inglesa, aunque en español suena algo menos natural; puede mantenerse por fidelidad al singular genérico documentado.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa lexical documentada en el inglés POB.
    rationale: 'La nota inglesa [a] explica ὁ ἀναλύσας como alternativa más literal: «no one has been known who was released from Hades». El borrador español pone «pensando dentro de sí», que además se ancla a «entre sí» y no al segmento problemático del griego.'
  - severity: medium
    issue: La cláusula «nadie ha sido conocido que haya regresado de Hades» es poco idiomática en español.
    rationale: Aunque reproduce de cerca el inglés, en español suena forzada. Un giro como «nadie ha sido conocido por regresar de Hades» o «no se ha conocido a nadie que haya regresado de Hades» comunica mejor la fuerza de ἐγνώσθη sin perder el sentido.
  revised_spanish_text: 'Porque se dijeron entre sí, razonando equivocadamente: «Nuestra vida es corta y dolorosa, y no hay remedio al final de la vida de un hombre[a], y no se ha conocido a nadie que haya regresado de Hades[b]».'
  revised_footnotes:
