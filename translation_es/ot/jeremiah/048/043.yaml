  source_alignment_summary: El borrador conserva bien la tríada de juicio פַּחַד / פַחַת / פָח, el vocativo representativo «habitante de Moab» y el nombre divino «Yahvé». Sin embargo, la sintaxis española actual («¡Terror, la fosa y la trampa sobre ti, habitante de Moab!, declara Yahvé») resulta forzada y puntuada de manera poco natural, y no expresa con claridad el valor predicativo de עָלֶיךָ ('están/sobre ti').
  spanish_quality_summary: 'La elección léxica es mayormente adecuada y legible, pero la frase necesita reparación sintáctica y de puntuación para sonar natural en español bíblico moderno. También conviene afinar la nota alternativa de פַּחַד: «Temor» refleja mejor el registro que «Miedo».'
  glossary_alignment: Alinea correctamente «Yahvé» para יְהוָה. La tríada puede mantenerse como «terror, la fosa y la trampa», aunque «lazo» sería una alternativa más tradicional para פָח; «trampa» sigue siendo aceptable. «Habitante de Moab» respeta bien יוֹשֵׁב מוֹאָב.
  issues:
  - severity: high
    issue: Sintaxis española incompleta y puntuación impropia
    rationale: El hebreo permite una cláusula nominal elíptica, pero en español «¡Terror, la fosa y la trampa sobre ti...!» suena truncado. Debe explicitarse «están sobre ti» o equivalente. Además, los signos de exclamación no están justificados por el original ni por el estilo del proyecto.
  - severity: medium
    issue: Nota alternativa poco precisa en registro
    rationale: La nota «Miedo» es entendible, pero «Temor» se ajusta mejor al tono solemne y a la alternativa inglesa 'Fear'.
