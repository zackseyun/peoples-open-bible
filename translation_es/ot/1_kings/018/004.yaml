translation:
  language: es
  text: Ahora bien, cuando Jezabel estaba destruyendo[a] a los profetas de Yahvé, Abdías tomó a cien profetas y los escondió, cincuenta hombres por cueva[b], y les proveyó de pan y agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba eliminando»; más literalmente, «estaba cortando» a los profetas de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cincuenta hombres en una cueva»; el hebreo probablemente indica grupos de cincuenta, posiblemente en cuevas separadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בְּהַכְרִית
  english_pob_choice: Now when ... was cutting off
  chosen_spanish: cuando ... estaba exterminando
  alternatives_spanish:
  - cuando ... estaba cortando off
  - cuando ... estaba destruyendo
  lexicon: HALOT
  rationale: La construcción temporal con וַיְהִי + infinitivo se vierte naturalmente con «cuando». El verbo הִכְרִית, aunque literalmente conserva la imagen de «cortar», en este contexto expresa eliminación violenta; «exterminando» comunica ese sentido sin perder la intensidad del acto.
- source_word: אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  alternatives_spanish:
  - Jezebel
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico asentado en español como «Jezabel». Mantiene inteligibilidad y consonancia con el uso bíblico hispano sin afectar el contenido.
- source_word: נְבִיאֵי יְהוָה
  english_pob_choice: the prophets of Yahweh
  chosen_spanish: los profetas de Yahvé
  alternatives_spanish:
  - los profetas de Yahweh
  - los profetas del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto. La cadena constructa se expresa de modo directo y natural en español.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - se llevó
  lexicon: HALOT
  rationale: לקח aquí introduce la acción de Obadías al hacerse cargo de los profetas. «Tomó» es la equivalencia más directa y neutra en español.
- source_word: עֹבַדְיָהוּ
  english_pob_choice: Obadiah
  chosen_spanish: Abdías
  alternatives_spanish:
  - Obadías
  lexicon: Convención onomástica bíblica
  rationale: En español bíblico el nombre se usa normalmente como «Abdías». Es la forma tradicional y plenamente reconocible.
- source_word: מֵאָה נְבִאִים
  english_pob_choice: a hundred prophets
  chosen_spanish: cien profetas
  alternatives_spanish:
  - cien profetas
  lexicon: HALOT
  rationale: Se mantiene el numeral y el sustantivo de forma literal y clara. No requiere explicación adicional en español.
- source_word: וַיַּחְבִּיאֵם
  english_pob_choice: hid them
  chosen_spanish: los escondió
  alternatives_spanish:
  - los ocultó
  lexicon: HALOT
  rationale: חבא en causativo significa ocultar/esconder. «Escondió» es natural en español y conserva la acción concreta.
- source_word: חֲמִשִּׁים אִישׁ בַּמְּעָרָה
  english_pob_choice: fifty men to a cave
  chosen_spanish: cincuenta hombres por cueva
  alternatives_spanish:
  - cincuenta hombres en una cueva
  - cincuenta hombres a una cueva
  lexicon: HALOT
  rationale: El hebreo sugiere distribución por grupos de cincuenta, no necesariamente todos en una sola cueva. «Por cueva» conserva el valor distributivo y refleja la precisión revisada en el audit trail.
- source_word: וְכִלְכְּלָם
  english_pob_choice: provided them with
  chosen_spanish: les dio
  alternatives_spanish:
  - los sustentó con
  - les proveyó
  lexicon: HALOT
  rationale: El verbo כלכל implica sustentar o proveer para su mantenimiento. Como se especifican pan y agua, «les dio» comunica provisión efectiva en un español natural, sin limitar indebidamente el sentido de sustento continuo.
- source_word: לֶחֶם וָמָיִם
  english_pob_choice: bread and water
  chosen_spanish: pan y agua
  alternatives_spanish:
  - alimento y agua
  lexicon: HALOT
  rationale: Se conserva la expresión concreta y sencilla del hebreo. «Pan y agua» reproduce la fórmula bíblica de manera directa.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español, la forma del proyecto es «Yahvé», preservando el nombre de pacto sin ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del verbo הִכְרִית en el contexto de persecución
  english_pob_reading: was cutting off / was destroying
  chosen_spanish_reading: estaba exterminando
  alternative_spanish_readings:
  - estaba cortando off
  - estaba destruyendo
  - estaba eliminando
  rationale: El contexto no es meramente administrativo sino de persecución mortal contra los profetas. «Exterminando» preserva la violencia implícita del hebreo y la tensión del texto sin suavizarla.
  doctrine_reference: Principio de equivalencia léxica conservando la intensidad contextual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrige la formulación para reflejar mejor la distribución «cincuenta hombres por cueva» en vez de una sola cueva o una formulación menos precisa. También se respetó la decisión del proyecto de usar «Yahvé» para el Tetragrámaton.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» en coherencia con la norma del proyecto.
  - Se usó «Abdías» por ser la forma bíblica estable en español.
  - Se evitó «SEÑOR» para no ocultar el nombre divino presente en el hebreo.
  - La nota sobre las cuevas preserva la ambigüedad distributiva documentada en el audit trail.
