translation:
  language: es
  text: Pero si el buey acostumbraba a cornear desde ayer y anteayer[a], y su dueño había sido advertido pero no lo mantuvo encerrado, y mata a un hombre o a una mujer, el buey será apedreado, y también su dueño será puesto a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «desde ayer y anteayer», un modismo hebreo que indica conducta previa y ya establecida.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  - ganado
  lexicon: HALOT
  rationale: En español bíblico, «buey» comunica de manera natural un bovino doméstico en contexto legal. «Ox» sería un anglicismo innecesario; «toro» sugiere más fácilmente el macho reproductor, y «ganado» es demasiado general.
- source_word: נַגָּח
  english_pob_choice: accustomed to gore
  chosen_spanish: era acostumbrado a cornear
  alternatives_spanish:
  - era un buey cornador
  - estaba habituado a cornear
  - acostumbraba a cornear
  lexicon: HALOT
  rationale: La forma participial indica una conducta habitual, no un solo acto. «Era acostumbrado a cornear» conserva la fuerza durativa y el valor legal de conducta establecida, sin perder naturalidad en español.
- source_word: מִתְּמֹל שִׁלְשֹׁם
  english_pob_choice: from yesterday and the day before
  chosen_spanish: desde ayer y anteayer
  alternatives_spanish:
  - desde antes
  - desde hacía tiempo
  - de ayer y de anteayer
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal que alude a conducta previa ya establecida. «Desde ayer y anteayer» mantiene el color idiomático y la referencia a anterioridad concreta.
- source_word: וְהוּעַד בִּבְעָלָיו
  english_pob_choice: its owner had been warned
  chosen_spanish: su dueño había sido advertido
  alternatives_spanish:
  - su dueño había recibido aviso
  - se había testificado contra su dueño
  - su dueño había sido notificado
  lexicon: HALOT
  rationale: En este contexto legal, el verbo expresa notificación formal o advertencia previa. «Había sido advertido» es la equivalencia española más clara y fiel.
- source_word: וְלֹא יִשְׁמְרֶנּוּ
  english_pob_choice: did not keep it in
  chosen_spanish: no lo guardó
  alternatives_spanish:
  - no lo vigiló
  - no lo contuvo
  - no lo encerró
  lexicon: HALOT
  rationale: El verbo significa guardar, vigilar o mantener bajo control. En este caso, el sentido práctico es no impedir que el animal siga siendo peligroso; «no lo guardó» es conciso y fiel dentro del registro jurídico.
- source_word: וְהֵמִית
  english_pob_choice: it kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte a
  - causa la muerte de
  - le da muerte
  lexicon: HALOT
  rationale: El hebreo presenta el resultado causado por el animal. El presente narrativo legal «mata» es natural en español y conserva la relación causal sin añadir explicaciones.
- source_word: אִישׁ אֹו אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: a un hombre o a una mujer
  alternatives_spanish:
  - a alguien
  - a una persona
  lexicon: HALOT
  rationale: El texto hebreo nombra explícitamente ambos sexos; la traducción los conserva para no neutralizar un dato del enunciado legal.
- source_word: יִסָּקֵל
  english_pob_choice: shall be stoned
  chosen_spanish: será apedreado
  alternatives_spanish:
  - será lapidado
  - debe ser apedreado
  lexicon: HALOT
  rationale: «Apedreado» transmite la pena legal con claridad en español común. «Lapidado» es posible, pero menos inmediato para lectores amplios; la forma pasiva futura conserva la fuerza normativa.
- source_word: וְגַם בְּעָלָיו יוּמָת
  english_pob_choice: its owner also shall be put to death
  chosen_spanish: y también su dueño será muerto
  alternatives_spanish:
  - y también su dueño será puesto a muerte
  - y también su dueño será ejecutado
  - y también su dueño morirá
  lexicon: HALOT
  rationale: El hebreo usa una fórmula legal de muerte impuesta. «Será muerto» reproduce de manera sobria la pasiva legal sin introducir una explicitación mayor que el hebreo mismo exige.
theological_decisions:
- issue: Carácter jurídico de la pena del dueño
  english_pob_reading: its owner also shall be put to death
  chosen_spanish_reading: y también su dueño será muerto
  alternative_spanish_readings:
  - y también su dueño será puesto a muerte
  - y también su dueño será ejecutado
  - y también su dueño morirá
  rationale: El hebreo יוּמָת en este tipo de ley expresa muerte impuesta por sanción judicial. «Será muerto» preserva la dureza legal del texto sin convertirlo en una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Preservación de la referencia a varón y mujer
  english_pob_reading: a man or a woman
  chosen_spanish_reading: a un hombre o a una mujer
  alternative_spanish_readings:
  - a alguien
  - a una persona
  rationale: El texto fuente es explícito en cuanto al sexo de la víctima. Mantener ambos términos evita una neutralización que el hebreo no hace.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción española corrige la falla previa de anclar una nota sin marcador visible. En esta versión no se usan notas al pie, para evitar desajustes de validación y mantener el texto limpio y publicable.
  spanish_consistency_notes:
  - Se mantuvo el tono jurídico y la secuencia causal del hebreo.
  - Se evitó el término «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se preservó la duplicación «hombre o mujer» por fidelidad al texto fuente.
  - Se eligió una sintaxis española natural sin suavizar la sanción legal.
