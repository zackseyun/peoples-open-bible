  - Suavizar el final para que parezca una oración cerrada
  rationale: El testimonio griego preservado termina con 'y por la misma ...'; por fidelidad textual, la versión española debe reflejar esa interrupción sin suplir material ajeno al testimonio.
  doctrine_reference: Principio de crítica textual y fidelidad al testimonio manuscrito
- issue: Relación del relativo femenino ἐν ᾗ
  english_pob_reading: in which
  chosen_spanish_reading: en la cual
  alternative_spanish_readings:
