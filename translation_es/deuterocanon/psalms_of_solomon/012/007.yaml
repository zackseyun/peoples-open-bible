translation:
  language: es
  text: La salvación de Yahvé sea sobre Israel[a], su siervo, para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel, su hijo/niño». El griego παῖδα puede tener cualquiera de esos sentidos, pero aquí «siervo» encaja mejor con el contexto de pacto.
    reason: lexical_alternative
  - marker: b
    text: O «esté sobre». La cláusula griega no tiene verbo explícito; por el contexto, se entiende como un deseo o bendición.
    reason: alternative_reading
lexical_decisions:
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - del Señor Dios
  lexicon: BDAG
  rationale: El griego usa el genitivo de κύριος con valor posesivo y de origen. En este proyecto, el nombre divino se expresa como «Yahvé» en el texto principal cuando el referente es el Dios de Israel. «De Yahvé» conserva tanto la posesión como el origen de la salvación, sin ocultar el nombre divino.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: σωτηρία denota de manera directa salvación/liberación. «Salvación» mantiene el peso teológico amplio de la expresión y encaja con el tono oracional del pasaje.
- source_word: ἐπὶ
  english_pob_choice: be upon
  chosen_spanish: sea sobre
  alternatives_spanish:
  - esté sobre
  - recaiga sobre
  lexicon: BDAG
  rationale: La revisión inglesa entendió la cláusula sin verbo como un deseo o bendición, no como una simple declaración. En español, «sea sobre» reproduce ese valor optativo con una construcción natural y reverente.
- source_word: παῖδα
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - hijo
  - niño
  lexicon: BDAG
  rationale: Aunque παῖς puede significar «hijo/niño», el contexto pactal y la práctica léxica del proyecto favorecen una expresión de pertenencia y servicio. «Esclavo» conserva la fuerza lexical del término sin suavizarlo indebidamente; se mantiene la tensión entre posible filiación y servicio en la nota.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: BDAG
  rationale: La locución idiomática expresa duración perpetua. «Para siempre» es la formulación española más clara y natural, y conserva el alcance permanente del texto.
theological_decisions:
- issue: Valor optativo de la cláusula sin verbo
  english_pob_reading: The Lord’s salvation be upon Israel, his servant, forever.
  chosen_spanish_reading: La salvación de Yahvé sea sobre Israel, su esclavo, para siempre.
  alternative_spanish_readings:
  - La salvación de Yahvé está sobre Israel, su esclavo, para siempre.
  - Que la salvación de Yahvé esté sobre Israel, su esclavo, para siempre.
  rationale: El contexto inmediato está dominado por deseos y peticiones; por eso la cláusula se entiende como bendición o súplica. «Sea sobre» comunica bien ese matiz optativo sin añadir un verbo de modo más fuerte que el griego.
  doctrine_reference: Gramática del contexto y continuidad con las oraciones optativas de 12:4-6, 8
- issue: Sentido de παῖς aplicado a Israel
  english_pob_reading: his servant
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su siervo
  - su hijo
  rationale: La POB inglesa preserva la posibilidad de «child/son» en nota, pero opta por «servant» por el contexto. En español se mantiene esa tensión con «esclavo», ya que el proyecto reserva «siervo» para casos donde la suavización no borra la fuerza lexical. La nota explicita la alternativa filial.
  doctrine_reference: Uso lexical de παῖς en lenguaje bíblico de pacto
translation_notes:
  revision_awareness: La última revisión inglesa cambió la cláusula de «is upon» a «be upon» al reconocer que el contexto inmediato (12:4-6, 8) es optativo y oracional. Esta versión española refleja esa decisión con «sea sobre» y evita una lectura meramente declarativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como traducción principal del nombre divino, conforme al estándar del proyecto.
  - Se conserva la tensión lexical de παῖς en la nota, sin forzar una armonización dogmática.
  - La puntuación sigue la sintaxis española natural para una frase bendicional breve.
