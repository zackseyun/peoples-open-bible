translation:
  language: es
  text: Las fuerzas del torrente[a] serán barridas de delante de él y quebrantadas, y también el príncipe[b] del pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «brazos del torrente»; probablemente es un modismo para fuerzas militares o poder armado.
    reason: lexical_alternative
  - marker: b
    text: O «el líder del pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְרֹעוֹת
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - brazos
  - armas
  lexicon: HALOT
  rationale: El hebreo dice literalmente "brazos", pero en este contexto militar-político la referencia probablemente es a fuerza armada o poder bélico. "Fuerzas" comunica el sentido probable en español sin perder la imagen subyacente, que queda señalada en la nota.
- source_word: הַשֶּׁטֶף
  english_pob_choice: flood-like
  chosen_spanish: del torrente
  alternatives_spanish:
  - del diluvio
  - del flujo impetuoso
  lexicon: HALOT
  rationale: La construcción es idiomática y combina una imagen de desbordamiento con las "fuerzas". "Torrente" conserva la idea de aguas impetuosas y permite una expresión natural en español.
- source_word: יִשָּׁטְפוּ
  english_pob_choice: will be swept away
  chosen_spanish: serán arrasadas
  alternatives_spanish:
  - serán barridas
  - serán inundadas
  lexicon: HALOT
  rationale: El nifal expresa ser llevadas/arrastradas por una fuerza superior. "Serán arrasadas" transmite la idea de ser deshechas o barridas por el torrente, manteniendo el matiz pasivo.
- source_word: מִלְּפָנָיו
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  lexicon: HALOT
  rationale: La frase conserva el sentido espacial de retirada o expulsión desde la posición frontal frente al personaje. "De delante de él" es claro y bastante literal en español.
- source_word: וְיִשָּׁבֵרוּ
  english_pob_choice: and be broken
  chosen_spanish: y quebrantadas
  alternatives_spanish:
  - y serán quebradas
  - y serán rotas
  lexicon: HALOT
  rationale: שבר en nifal puede expresar ser roto, quebrado o destrozado. "Quebrantadas" funciona bien en español bíblico y conserva la idea de destrucción sin precisar más de lo que el hebreo obliga.
- source_word: נְגִיד
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - gobernante
  lexicon: HALOT
  rationale: '"Príncipe" es una equivalencia tradicional y adecuada para נְגִיד en Daniel, sin imponer por sí sola una identificación histórica específica.'
- source_word: בְּרִית
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: Aunque el inglés POB usa "covenant", en español bíblico "pacto" suele ser la forma más natural y estable para este campo semántico. Mantiene la referencia al compromiso vinculante sin añadir una interpretación doctrinal.
theological_decisions:
- issue: Identidad del "príncipe del pacto"
  english_pob_reading: Render the phrase transparently without identifying the figure in translation.
  chosen_spanish_reading: Traducir el título de manera transparente sin identificar al personaje en el texto.
  alternative_spanish_readings:
  - Onias III, el sumo sacerdote
  - un gobernante del pacto más en general
  - una figura mesiánica
  rationale: El hebreo no especifica la identidad histórica del personaje. La traducción debe preservar esa indeterminación y dejar la interpretación a la exégesis, sin resolverla de antemano.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una identificación.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el borrador sigue de cerca la lectura auditada del texto hebreo y la decisión inglesa de mantener el título transparente sin identificar al personaje.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino ni una cita directa del tetragrámaton.
  - Se prefirió «pacto» para בְּרִית por ser el término bíblico más natural en español.
  - 'Se mantuvo el orden y la progresión verbal del hebreo: arrastradas/quebrantadas, y luego el príncipe del pacto.'
  - La nota sobre «brazos del torrente» conserva la tensión entre la imagen literal y el sentido militar idiomático.
