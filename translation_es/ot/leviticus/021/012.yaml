translation:
  language: es
  text: Y no saldrá del santuario, ni profanará el santuario de su Dios, porque la consagración[a] del aceite de la unción de su Dios está sobre él. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'la corona del aceite de la unción de su Dios está sobre él'. El término hebreo puede significar 'corona' o 'consagración'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַמִּקְדָּשׁ
  english_pob_choice: from the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del lugar santo
  - del recinto sagrado
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un lugar santo, un santuario. En español, 'santuario' conserva el valor cultual y suena natural en legislación sacerdotal. La preposición inicial se integra en 'del' para mantener la relación con el verbo de salida.
- source_word: לֹא יֵצֵא
  english_pob_choice: he shall not go out
  chosen_spanish: no saldrá
  alternatives_spanish:
  - no debe salir
  - no se irá
  lexicon: HALOT
  rationale: יָצָא en qal significa 'salir'. 'No saldrá' conserva la fuerza legal del imperfecto y suena natural en español jurídico-bíblico.
- source_word: וְלֹא יְחַלֵּל
  english_pob_choice: nor shall he profane
  chosen_spanish: ni profanará
  alternatives_spanish:
  - ni mancillará
  - ni deshonrará
  lexicon: HALOT
  rationale: En contextos de santidad sacerdotal, חלל en piel expresa profanar/desecrar lo santo. 'Profanar' mantiene el registro cultual y la oposición entre santo y profano.
- source_word: אֵת מִקְדַּשׁ אֱלֹהָיו
  english_pob_choice: the sanctuary of his God
  chosen_spanish: el santuario de su Dios
  alternatives_spanish:
  - el lugar santo de su Dios
  lexicon: HALOT
  rationale: La repetición de 'santuario' refleja el hebreo y preserva el énfasis legal. 'Su Dios' transmite el sufijo posesivo sin alterar la referencia cultual.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la prohibición. 'Porque' expresa con claridad la relación causal en español moderno.
- source_word: נֵזֶר
  english_pob_choice: the consecration
  chosen_spanish: la consagración
  alternatives_spanish:
  - la corona
  - la dedicación
  lexicon: HALOT
  rationale: En este contexto sacerdotal, נֵזֶר puede aludir al estado de consagración señalado por el aceite, más que a una corona literal. 'Consagración' comunica mejor el sentido teológico y evita una imagen material engañosa.
- source_word: שֶׁמֶן מִשְׁחַת אֱלֹהָיו
  english_pob_choice: the anointing oil of his God
  chosen_spanish: el aceite de la unción de su Dios
  alternatives_spanish:
  - el aceite para la unción de su Dios
  - el aceite ungente de su Dios
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma transparente. 'Aceite de la unción' conserva ambos elementos del hebreo, y en español mantiene la referencia ritual al óleo consagratorio.
- source_word: עָלָיו
  english_pob_choice: is upon him
  chosen_spanish: está sobre él
  alternatives_spanish:
  - recae sobre él
  - permanece sobre él
  lexicon: HALOT
  rationale: La imagen de estar 'sobre él' expresa el estado continuo de consagración. 'Está sobre él' es idiomático en español y mantiene la solemnidad del original.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé.
  alternatives_spanish:
  - Yo soy el Yahvé.
  - Yo soy el SEÑOR.
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según la pauta del proyecto. La fórmula final conserva el sello de autoridad legal y divina del texto.
theological_decisions:
- issue: Sentido de נֵזֶר en relación con el estado del sumo sacerdote
  english_pob_reading: Rendered as 'the consecration' rather than a literal 'crown.'
  chosen_spanish_reading: '''la consagración'' en lugar de una corona literal'
  alternative_spanish_readings:
  - '''la corona del aceite de la unción de su Dios está sobre él'''
  - '''la dedicación del aceite de la unción de su Dios está sobre él'''
  rationale: 'Aunque נֵזֶר puede significar ''corona'' o ''diadema'', aquí el contexto explica por qué el sacerdote no debe salir ni profanar el santuario: lleva sobre sí un estado de consagración conferido por el aceite de la unción. ''Consagración'' comunica esa función teológica sin forzar una imagen física de corona.'
  doctrine_reference: Holiness and consecration in priestly legislation; lexical range of נֵזֶר in priestly contexts
translation_notes:
  revision_awareness: El texto inglés POB fue revisado sin cambios y la evaluación cruzada indicó alta concordancia. La decisión española sigue la misma lectura principal (consagración) y preserva la alternativa lexical en nota, manteniendo el equilibrio entre fidelidad literal y claridad cultual.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Santuario'' se conserva en ambas apariciones para reflejar la repetición hebrea.'
  - '''Profanará'' mantiene el registro de santidad sacerdotal y evita suavizar la advertencia.'
  - La nota al pie preserva la tensión lexical de נֵזֶר sin imponer una sola imagen interpretativa.
