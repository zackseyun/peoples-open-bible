translation:
  language: es
  text: 'Y si la ira del rey se enciende, y te dice[a]: «¿Por qué se acercaron tanto a la ciudad para luchar? ¿No sabían qué dispararían desde lo alto de la muralla?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «qué arrojarían desde lo alto de la muralla». El verbo hebreo puede referirse de manera más amplia a lanzar proyectiles, aunque «dispararían» encaja mejor con su sentido militar más común.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Ahora bien, si
  - Y sucederá que si
  lexicon: HALOT
  rationale: La construcción introduce una situación condicional en el discurso de Joab. «Y si» conserva la conexión narrativa del waw y la fuerza condicional de אִם en un español natural.
- source_word: תַּעֲלֶה חֲמַת הַמֶּלֶךְ
  english_pob_choice: the king’s anger rises
  chosen_spanish: la ira del rey se enciende
  alternatives_spanish:
  - la ira del rey sube
  - la furia del rey se enciende
  - la ira del rey se levanta
  lexicon: HALOT
  rationale: חֵמָה expresa calor, furor o ira. «Se enciende» comunica bien la imagen de aumento/ascenso implícita en עלה y suena natural en español moderno.
- source_word: וְאָמַר לְךָ
  english_pob_choice: and he says to you
  chosen_spanish: y te dice
  alternatives_spanish:
  - y te dirá
  - y te dice a ti
  lexicon: HALOT
  rationale: En una secuencia condicional proyectada, el presente español funciona de modo idiomático. «Te dice» mantiene la vividez del discurso directo sin volverlo rígidamente futuro.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: Interrogativo estándar y natural en español para expresar la pregunta de reproche.
- source_word: נִגַּשְׁתֶּם אֶל הָעִיר
  english_pob_choice: did you go so near the city
  chosen_spanish: se acercaron tanto a la ciudad
  alternatives_spanish:
  - se acercaron a la ciudad
  - llegaron tan cerca de la ciudad
  lexicon: HALOT
  rationale: נגשׁ significa acercarse o ponerse cerca. «Se acercaron tanto» reproduce el matiz de reproche por proximidad excesiva sin forzar un calco.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para luchar
  alternatives_spanish:
  - para combatir
  - para pelear
  lexicon: HALOT
  rationale: La finalidad de la acción es bélica; «luchar» es claro y directo en español contemporáneo, y encaja con el registro narrativo.
- source_word: הֲלוֹא יְדַעְתֶּם
  english_pob_choice: Did you not know
  chosen_spanish: ¿No sabían
  alternatives_spanish:
  - ¿Acaso no sabían?
  - ¿No lo sabían?
  lexicon: HALOT
  rationale: La partícula interrogativa negativa espera una respuesta afirmativa. En español, «¿No sabían?» conserva el reproche retórico de forma natural.
- source_word: אֵת אֲשֶׁר יֹרוּ
  english_pob_choice: what they would shoot
  chosen_spanish: qué arrojarían
  alternatives_spanish:
  - qué dispararían
  - qué lanzarían
  lexicon: HALOT
  rationale: ירה en contexto de asedio puede abarcar disparar o lanzar proyectiles. «Arrojarían» preserva la amplitud semántica que la nota inglesa documenta, sin fijar indebidamente solo el sentido de arma de proyectil.
- source_word: מֵעַל הַחוֹמָה
  english_pob_choice: from the wall
  chosen_spanish: desde arriba de la muralla
  alternatives_spanish:
  - desde la muralla
  - desde lo alto de la muralla
  lexicon: HALOT
  rationale: מֵעַל significa «desde sobre/por encima de». «Desde arriba de la muralla» explicita la relación espacial y mantiene el cuadro militar del texto.
translation_notes:
  revision_awareness: Se incorporó la nota léxica con anclaje explícito [a] en el texto principal para resolver la validación anterior. La redacción sigue el sentido condicional y militar del hebreo, con la misma decisión auditada sobre ירה que admite un sentido más amplio que «disparar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «muralla» para הַחוֹמָה por claridad contextual en español; «muro» sería posible, pero «muralla» expresa mejor el contexto de asedio.
  - «Luchar» traduce לְהִלָּחֵם de forma natural y sin perder el valor bélico del infinitivo de propósito.
  - La pregunta retórica negativa se tradujo con «¿No sabían?» para conservar el matiz de reproche previsto por הֲלוֹא.
