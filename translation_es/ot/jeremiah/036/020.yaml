revisions:
- from: Entonces fueron al rey en el patio, y depositaron el rollo en la cámara de Elisama[a] el escriba, y dieron a conocer todas las palabras en oídos del rey[b].
  to: Entonces fueron al rey en el patio, y depositaron el rollo en la cámara de Elisama el escriba[a], y le informaron todas las palabras al oído del rey[b].
  rationale: Se corrigió el anclaje de la nota sobre «escriba», se reemplazó «dieron a conocer» por «le informaron» para reflejar mejor el registro formal de וַיַּגִּידוּ, y se evitó el calco defectuoso «en oídos del rey» mediante «al oído del rey» con una nota que preserva y explica el hebraísmo literal. Así el texto queda más fiel al sentido del original y más natural en español.
