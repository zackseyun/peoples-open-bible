translation:
  language: es
  text: ¡Alaben a Yahvé[a], todas las naciones; exáltenlo, todos los pueblos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Alaben a Yahvé» o «Alaben al SEÑOR»; el nombre divino es YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַֽלְלוּ
  english_pob_choice: Praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Den alabanza a
  - Alaben a
  lexicon: HALOT
  rationale: Imperativo plural de הלל. En español, «alaben» conserva el llamado directo a la alabanza y suena natural y digno en registro bíblico.
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo nombra explícitamente el Tetragrámaton. Conforme al criterio del proyecto, se usa «Yahvé» en el texto principal para no ocultar el nombre divino.
- source_word: כָּל גּוֹיִם
  english_pob_choice: all nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: גּוֹיִם suele referirse a naciones o pueblos-estado; «naciones» mantiene bien la amplitud universal del mandato y la distinción poética respecto de אֻמִּים.
- source_word: שַׁבְּחוּהוּ
  english_pob_choice: extol him
  chosen_spanish: exáltenlo
  alternatives_spanish:
  - alábenlo
  - ensálcenlo
  lexicon: HALOT
  rationale: El segundo imperativo usa un verbo distinto, con matiz de ensalzar/elogiar. «Exáltenlo» preserva esa variación léxica sin perder naturalidad en español.
- source_word: כָּל הָאֻמִּים
  english_pob_choice: all peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los grupos étnicos
  lexicon: HALOT
  rationale: אֻמִּים denota pueblos o grupos humanos; «pueblos» mantiene el paralelismo con «naciones» y deja una leve distinción semántica.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El hebreo usa directamente יְהוָה. La política española del proyecto establece «Yahvé» como forma principal, para reflejar el nombre de pacto sin la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El auditor inglés registró alta concordancia, sin cambios requeridos en la última revisión. La versión española sigue la misma lectura textual y conserva la paralelismo poético con dos imperativos distintos.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «naciones» y «pueblos» para reflejar גּוֹיִם / אֻמִּים.
  - Se evitó calcar «Hallelujah» porque el hebreo aquí es un imperativo directo, no una transliteración litúrgica.
  - Se usó «Yahvé» en el cuerpo del texto y se explicó la alternativa tradicional en nota para transparencia auditable.
