translation:
  language: es
  text: Si se levanta un testigo malicioso contra un hombre para testificar contra él acerca de rebelión[b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testigo falso». La expresión hebrea literalmente dice «testigo de violencia/daño», y puede designar a un acusador malicioso en un tribunal.
    reason: lexical_alternative
  - marker: b
    text: O «rebeldía» o «apostasía». El término hebreo puede referirse a una desviación o defección grave; aquí se traduce como «rebelión» para reflejar mejor su fuerza en este contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Si en verdad
  lexicon: HALOT
  rationale: En esta formulación legal casuística, el sentido condicional se mantiene mejor con «Si», que suena natural en español jurídico y refleja el valor de caso hipotético del hebreo.
- source_word: יָקוּם
  english_pob_choice: rises up
  chosen_spanish: se levanta
  alternatives_spanish:
  - surge
  - se pone en pie
  lexicon: HALOT
  rationale: קוּם conserva la imagen concreta de ponerse en pie o aparecer formalmente; «se levanta» mantiene esa fuerza verbal sin sonar forzado en español.
- source_word: עֵד חָמָס
  english_pob_choice: a malicious witness
  chosen_spanish: un testigo malicioso
  alternatives_spanish:
  - un testigo falso
  - un testigo violento
  - un testigo perverso
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a un «testigo de violencia/daño». «Malicioso» comunica la intención dañina en un contexto judicial y evita identificar prematuramente el término con la falsedad explícita, que aparece en la acusación misma.
- source_word: בְּאִישׁ
  english_pob_choice: against a man
  chosen_spanish: contra un hombre
  alternatives_spanish:
  - contra una persona
  - contra alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino del hebreo אִישׁ, como lenguaje representativo legal. «Hombre» es el equivalente más directo y natural en español formal.
- source_word: לַעֲנוֹת
  english_pob_choice: to testify
  chosen_spanish: para acusarlo
  alternatives_spanish:
  - para testificar contra él
  - para declarar contra él
  lexicon: HALOT
  rationale: En este contexto forense, ענה se refiere a la declaración en juicio. Dado que el complemento siguiente indica hostilidad («contra él» implícito en el argumento), «acusar» captura la función acusatoria de la testificación sin perder el marco judicial.
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: lo
  alternatives_spanish:
  - contra él
  - acerca de él
  lexicon: HALOT
  rationale: El pronombre enclítico español dentro de «acusarlo» conserva el objeto directo/indirecto de la acción y evita una repetición pesada, manteniendo la referencia al acusado.
- source_word: סָרָה
  english_pob_choice: rebellion
  chosen_spanish: rebelión
  alternatives_spanish:
  - apostasía
  - desviación
  - rebeldía
  lexicon: HALOT
  rationale: La revisión inglesa más reciente favorece «rebellion» para captar mejor la fuerza de סָרָה como desviación o defección seria. «Rebelión» es la opción española más cercana y de uso bíblico claro; «apostasía» se reserva para un matiz más específicamente religioso que el contexto inmediato no exige.
theological_decisions:
- issue: Carácter legal y acusatorio de la cláusula final
  english_pob_reading: to testify against him of rebellion
  chosen_spanish_reading: para acusarlo de rebelión
  alternative_spanish_readings:
  - para testificar contra él de rebelión
  - para denunciarlo de rebelión
  rationale: El hebreo presenta una acusación formal en un contexto judicial. «Acusarlo de rebelión» comunica el acto acusatorio con claridad en español sin abandonar el marco legal del versículo.
  doctrine_reference: Deuteronomio 19:16; contexto jurídico de falsos testimonios
- issue: Mantenimiento del masculino singular representativo
  english_pob_reading: against a man
  chosen_spanish_reading: contra un hombre
  alternative_spanish_readings:
  - contra una persona
  - contra alguien
  rationale: Se conserva el singular masculino del hebreo אִישׁ, siguiendo la política de no neutralizar el lenguaje representativo cuando el texto legal lo usa de forma estándar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La base inglesa pasó de «wrongdoing» a «rebellion» en la revisión más reciente para reflejar mejor סָרָה. La redacción española sigue esa decisión revisada y evita suavizar el valor acusatorio del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se usa «rebelión» en línea con la revisión inglesa más reciente y con el rango semántico de סָרָה en contexto judicial.
  - Se evita «falso testigo» como texto principal porque el hebreo destaca primero la cualidad dañina/maliciosa del testigo, no solo la falsedad de su declaración.
