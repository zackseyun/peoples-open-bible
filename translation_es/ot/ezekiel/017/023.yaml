translation:
  language: es
  text: En el monte alto de Israel lo plantaré[a], y echará ramas y dará fruto, y llegará a ser un cedro majestuoso. Bajo él habitarán aves de toda clase[b]; a la sombra de sus ramas habitarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo trasplantaré». El verbo hebreo puede enfatizar poner un brote en un nuevo lugar.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «toda ave, toda ala»; una forma poética de decir aves de toda clase.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהַר מְרוֹם יִשְׂרָאֵל
  english_pob_choice: On the high mountain of Israel
  chosen_spanish: En el monte alto de Israel
  alternatives_spanish:
  - En la montaña elevada de Israel
  - En el monte encumbrado de Israel
  lexicon: HALOT
  rationale: מְרוֹם expresa altura/elevación; 'monte alto' conserva la imagen exaltada con español natural y digno. 'Monte' mantiene el registro bíblico sin volverse arcaizante.
- source_word: אֶשְׁתֳּלֶנּוּ
  english_pob_choice: I will plant it
  chosen_spanish: lo plantaré
  alternatives_spanish:
  - lo trasplantaré
  - lo estableceré
  lexicon: HALOT
  rationale: El verbo שתל puede sugerir plantar o trasplantar. En el texto principal, 'lo plantaré' comunica la acción de establecer la planta sin sobreespecificar el movimiento implícito; 'trasplantaré' queda como alternativa posible.
- source_word: וְנָשָׂא עָנָף
  english_pob_choice: and it will put forth boughs
  chosen_spanish: echará ramas
  alternatives_spanish:
  - brotará ramas
  - sacará ramas
  lexicon: HALOT
  rationale: La imagen arbórea pide un verbo de crecimiento natural en español. 'Echará ramas' es idiomático y conserva el sentido de desarrollo visible del árbol.
- source_word: וְעָשָׂה פֶרִי
  english_pob_choice: and bear fruit
  chosen_spanish: dará fruto
  alternatives_spanish:
  - producirá fruto
  - fructificará
  lexicon: HALOT
  rationale: '''Dar fruto'' es una equivalencia natural y fiel para la colocation hebrea; mantiene la metáfora agrícola sin tecnicismo innecesario.'
- source_word: וְהָיָה לְאֶרֶז אַדִּיר
  english_pob_choice: and become a majestic cedar
  chosen_spanish: y llegará a ser un cedro majestuoso
  alternatives_spanish:
  - y se volverá un cedro majestuoso
  - y será un cedro imponente
  lexicon: HALOT
  rationale: אַדִּיר comunica majestad/magnificencia. 'Cedro majestuoso' conserva el tono elevado y la imagen profética de grandeza arbórea.
- source_word: וְשָׁכְנוּ תַחְתָּיו
  english_pob_choice: Under it every bird of every kind will dwell
  chosen_spanish: Bajo él habitarán toda ave de toda especie
  alternatives_spanish:
  - Bajo él morará toda ave de toda clase
  - Bajo él se refugiarán toda ave de toda especie
  lexicon: HALOT
  rationale: שׁכן implica habitar/establecerse. 'Habitarán' mantiene el registro profético. 'Toda ave de toda especie' refleja el hebreo כֹּל צִפּוֹר כָּל כָּנָף sin borrar su amplitud poética.
- source_word: כֹּל צִפּוֹר כָּל כָּנָף
  english_pob_choice: every bird of every kind
  chosen_spanish: toda ave de toda especie
  alternatives_spanish:
  - cada ave de toda clase
  - toda ave, toda ala
  lexicon: HALOT
  rationale: La expresión es literalmente muy amplia y poética. 'Toda ave de toda especie' conserva la generalidad distributiva y evita una calca extraña como 'ave de toda ala'.
- source_word: בְּצֵל דָּלִיּוֹתָיו
  english_pob_choice: in the shade of its branches
  chosen_spanish: a la sombra de sus ramas
  alternatives_spanish:
  - a la sombra de sus ramas colgantes
  - bajo la sombra de sus boughs
  lexicon: HALOT
  rationale: דָּלִיּוֹת son ramas extendidas/colgantes; 'ramas' es el término más claro en español. 'A la sombra' reproduce el valor de refugio y cobijo.
theological_decisions:
- issue: Alcance de la imagen de las aves
  english_pob_reading: Retain the broad image 'every bird of every wing/kind' without specifying nations or peoples in the main text.
  chosen_spanish_reading: Mantener 'toda ave de toda especie' sin identificar en el cuerpo del versículo a las aves con naciones o pueblos.
  alternative_spanish_readings:
  - Interpretar explícitamente las aves como las naciones acogidas bajo el reino restaurado
  - traducir de forma interpretativa como 'todas las naciones'
  rationale: El contexto profético puede sugerir una aplicación amplia, pero el verso mismo presenta la imagen arbórea. Para no importar una interpretación no expresada de manera explícita en la línea, se conserva la metáfora abierta.
  doctrine_reference: Principio de contención exegética y fidelidad imagética del texto profético
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'branches' → 'boughs' en la primera cláusula y simplificó luego la idiomática 'every bird of every wing' a 'every bird of every kind'. En español se conservó el contraste léxico mediante 'echará ramas' y 'sus ramas' al final, y se optó por una solución natural ('toda ave de toda especie') que mantiene la amplitud poética del hebreo sin calca innecesaria.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma para el Tetragrámaton en el proyecto; este versículo no lo contiene.
  - Se evitó 'Cristo/Mesías' porque el pasaje es arbóreo y no presenta ese título.
  - '''Habitarán'' conserva el registro profético de שׁכן.'
  - '''Toda ave de toda especie'' preserva la fuerza distributiva del hebreo sin convertirla en una paráfrasis doctrinal.'
