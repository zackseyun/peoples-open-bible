translation:
  language: es
  text: 'Así me dijo Yahvé: «Ve y cómprate un cinturón de lino[a], y póntelo en tu cintura; pero no lo metas en agua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «faja», «cinto» o posiblemente «taparrabos de lino». El hebreo אֵזוֹר se refiere a una prenda que se lleva alrededor de la cintura.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» conserva el nombre del pacto y evita la sustitución por un título genérico. «Yahveh» es una variante gráfica posible, pero menos asentada en el español bíblico del proyecto.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus ... said
  chosen_spanish: Así dijo
  alternatives_spanish:
  - Esto dijo
  - De este modo dijo
  lexicon: HALOT
  rationale: La fórmula profética se expresa con una construcción breve y solemne en español. «Así dijo» mantiene el tono formal sin volverlo arcaizante.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: El destinatario del discurso es directo; «a mí» reproduce con naturalidad el complemento de dirección del habla divina.
- source_word: הָלוֹךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la orden. «Ve» comunica el mandato con claridad y concisión en español.
- source_word: וְקָנִיתָ לְּךָ
  english_pob_choice: buy yourself
  chosen_spanish: cómprate
  alternatives_spanish:
  - consíguete
  - adquiere para ti
  lexicon: HALOT
  rationale: «Cómprate» conserva el valor comercial del verbo y el matiz reflexivo de לְךָ. «Consíguete» sería más libre y «adquiere para ti» más pesado.
- source_word: אֵזוֹר
  english_pob_choice: waistband
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - cinto
  - cinturón de cintura
  - banda
  lexicon: HALOT
  rationale: El término hebreo designa una prenda para la cintura. «Cinturón» es la opción más natural y comprensible en español moderno; no precisa indebidamente el tipo de prenda más allá de lo que el contexto exige.
- source_word: פִּשְׁתִּים
  english_pob_choice: linen
  chosen_spanish: de lino
  alternatives_spanish:
  - de lino fino
  - de lino tejido
  - de lino
  lexicon: HALOT
  rationale: La materia prima se expresa de forma directa con «de lino», que es el equivalente natural para una prenda hecha de esa fibra.
- source_word: וְשַׂמְתּוֹ עַל מָתְנֶיךָ
  english_pob_choice: put it on your waist
  chosen_spanish: ponlo sobre tus lomos
  alternatives_spanish:
  - ponlo sobre tu cintura
  - colócalo en tu cintura
  lexicon: HALOT
  rationale: «Lomos» mantiene con mayor fidelidad la imagen corporal del hebreo מָתְנַיִם, que puede abarcar cintura/riñones/lomos. Aunque «cintura» es más común, «lomos» preserva mejor la textura del original sin oscurecer el sentido en un contexto bíblico.
- source_word: וּבַמַּיִם לֹא תְבִאֵהוּ
  english_pob_choice: but do not put it in water
  chosen_spanish: pero no lo metas en agua
  alternatives_spanish:
  - pero no lo pongas en agua
  - pero no lo sumerjas en agua
  lexicon: HALOT
  rationale: El verbo causativo de בוא expresa hacer entrar. «Meter en agua» es una equivalencia natural y fiel, más directa que «sumergir», que añade un grado interpretativo mayor.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio divino en vez de sustituirlo por un título. Esto sigue la línea del POB en inglés y la convención establecida para el español del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Imagen de la prenda: אֵזוֹר como cintura/loins'
  english_pob_reading: waistband
  chosen_spanish_reading: cinturón
  alternative_spanish_readings:
  - faja
  - cinto
  - lomo/lomos
  rationale: 'No hay un compromiso doctrinal, pero sí una decisión de fidelidad léxica: el español debe comunicar la prenda sin imponer la lectura específica de «lienzo» o «pañal». «Cinturón» es suficientemente amplio y claro en la versión principal, mientras que la nota preserva la gama semántica.'
  doctrine_reference: DOCTRINE.md Lexical transparency / contested garment terms
translation_notes:
  revision_awareness: He revisado el precedente inglés y el paquete hebreo; la traducción española sigue la misma línea de equivalencia óptima y conserva la tensión lexical de אֵזוֹר con una nota, sin añadir contenido interpretativo ajeno al texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se usa «lino» para פִּשְׁתִּים, conforme al uso común para una prenda hecha de esa fibra.
  - Se preserva la imagen corporal del hebreo con «lomos», aunque la nota aclara que la prenda se lleva en la cintura.
  - La negación final se traduce de modo directo («no lo metas en agua») para reflejar el causativo hebreo sin sobrerinterpretación.
