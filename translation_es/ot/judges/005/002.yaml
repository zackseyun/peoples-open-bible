translation:
  language: es
  text: Cuando se soltaron los cabellos[a] en Israel, cuando el pueblo se ofreció voluntariamente, ¡bendigan a Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los cabellos colgaban sueltos en Israel»; o «cuando se emprendieron actos de venganza en Israel». El hebreo de la primera línea es difícil, y la expresión puede evocar líderes que se adelantan, guerreros con el cabello suelto o actos decisivos de venganza.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/פְרֹעַ
  english_pob_choice: When locks were loosed
  chosen_spanish: Cuando se soltaron los mechones
  alternatives_spanish:
  - cuando se soltaron las melenas
  - cuando se dejaron sueltos los cabellos
  - cuando se aflojaron los cabellos
  lexicon: HALOT
  rationale: El hebreo es oscuro y puede aludir a cabello suelto, a acción de liderazgo o a otra imagen poética. En español, «se soltaron los mechones» conserva la imagen física que la revisión inglesa quiso recuperar, sin cerrar indebidamente el sentido.
- source_word: פְּרָעוֹת
  english_pob_choice: locks
  chosen_spanish: mechones
  alternatives_spanish:
  - cabellos
  - melenas
  - guedejas
  lexicon: HALOT
  rationale: El plural del sustantivo es debatido; «mechones» comunica una imagen concreta y neutral para el lector español, manteniendo la ambigüedad sobre si se trata de cabello literal o de una metáfora funcional.
- source_word: בְּ/יִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - entre Israel
  lexicon: HALOT
  rationale: Corresponde al valor locativo directo del sintagma.
- source_word: בְּ/הִתְנַדֵּב
  english_pob_choice: when ... volunteered
  chosen_spanish: cuando el pueblo se ofreció voluntariamente
  alternatives_spanish:
  - cuando el pueblo voluntariamente se ofreció
  - cuando el pueblo quiso ofrecerse
  lexicon: HALOT
  rationale: El hitpael de נדב expresa ofrecimiento libre y voluntario. «Se ofreció voluntariamente» conserva el matiz de autoentrega sin hacerlo más interpretativo que el hebreo.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto colectivo, «el pueblo» es la equivalencia más natural y bíblicamente clara en español.
- source_word: בָּרֲכ֖וּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - bendecid
  - alaben
  - bendigan ustedes
  lexicon: HALOT
  rationale: El imperativo plural de ברך se traduce con el verbo básico «bendecir». En español, el mandato plural flota entre formas con y sin sujeto explícito; aquí se conserva la fuerza exhortativa con «bendigan».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», en vez de sustituirlo por un título.'
theological_decisions:
- issue: Interpretación del inicio oscuro del versículo
  english_pob_reading: The verse praises God for leadership arising in Israel and for the people's willing response.
  chosen_spanish_reading: El versículo alaba a Dios por una escena en Israel que involucra cabello suelto o una imagen equivalente de acción decisiva, junto con la disposición voluntaria del pueblo.
  alternative_spanish_readings:
  - El versículo se refiere a líderes que tomaron la iniciativa en Israel
  - El versículo alude a cabellos sueltos de guerreros
  - El versículo puede aludir a actos de venganza en Israel
  rationale: El hebreo permite varias lecturas y la POB inglesa mantuvo la tensión textual al preferir una imagen concreta pero con nota. En español conviene no resolver la ambigüedad como si fuera segura; por eso el texto principal conserva la imagen de los mechones y deja abierta la interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés POB, que volvió a una imagen más cercana al hebreo («locks were loosed») tras una versión interpretativa («leaders took the lead»). En español se reflejó esa preferencia manteniendo la ambigüedad y evitando una paráfrasis que cierre el sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se evita «Señor» como sustituto del Nombre divino.
  - «Pueblo» conserva el valor colectivo de עָם sin especificar militarmente más de lo necesario.
  - La puntuación y el orden de los hemistiquios siguen un tono poético y litúrgico en español.
