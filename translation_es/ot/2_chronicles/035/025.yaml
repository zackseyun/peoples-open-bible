revisions:
- from: Y Jeremías se lamentó por Josías[a], y todos los cantores y cantoras hablaron de Josías en sus lamentaciones hasta hoy. Y las establecieron por estatuto en Israel; y he aquí, están escritas en las Lamentaciones.
  to: Y Jeremías se lamentó por Josías, y todos los cantores y cantoras hablaron de Josías en sus lamentaciones hasta hoy. Y las establecieron como estatuto en Israel; y he aquí, están escritas en las Lamentaciones[a].
  rationale: Se corrigió el problema principal trasladando la nota [a] al sintagma que realmente comenta, «las Lamentaciones». Además, se cambió «por estatuto» por «como estatuto» para un español más natural y fiel al sentido de práctica establecida.
