revisions:
- from: Y los cielos declaran su justicia[a], porque Dios mismo es juez. Selah
  to: Y los cielos declaran su rectitud[a], porque Dios mismo es juez. Selah
  rationale: Se corrige únicamente צִדְקוֹ para que el español refleje la decisión principal documentada de la POB inglesa (‘his righteousness’) sin perder la alternativa contextual ‘justice’. ‘Su rectitud’ comunica mejor en español la dimensión moral y no solo forense del término, mientras que ‘su justicia’ queda preservado en la nota como alternativa legítima. No se requieren otros cambios.
