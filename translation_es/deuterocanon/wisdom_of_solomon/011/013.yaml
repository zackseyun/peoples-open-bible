    issue: 'Expresión pronominal algo rígida: ''aquellos mismos'''
    rationale: Aunque transmite el contraste de αὐτούς, en español queda más natural explicitar 'aquellos mismos' dentro de una construcción más fluida. El borrador actual es comprensible, pero no es la formulación más clara ni más digna.
  - severity: low
    issue: 'Nota al pie con giro algo poco idiomático: ''se dieron cuenta del Señor'''
    rationale: Como alternativa léxica se entiende, pero en español suena más natural 'llegaron a darse cuenta del Señor' o 'percibieron al Señor'. Conviene pulirla sin cambiar la intención documentada de percepción/reconocimiento.
  revised_spanish_text: Porque cuando oyeron que aquellos mismos estaban siendo beneficiados por medio de sus propios castigos[a], reconocieron al Señor.
