  from: For it will last about
  to: For it will have a duration like
  rationale: The Latin 'sicut' means 'like' or 'as', not 'about' (approximately). In apocalyptic literature, a 'week of years' (a heptad) is a precise, determined theological time period. Translating 'sicut' as 'about' introduces a quantitative approximation that undermines the author's exact apocalyptic determinism. Additionally, 'Spatium ... habebit' is literally 'it will have a duration/space', which is more precise than 'it will last'.
