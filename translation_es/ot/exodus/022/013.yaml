translation:
  language: es
  text: Y si un hombre toma prestado de su prójimo, y se lastima[a] o muere, si su dueño no está con lo prestado, ciertamente hará restitución[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se quiebra» o «es quebrado». El hebreo puede referirse al daño de un objeto prestado o a la lesión de un animal prestado.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de cierto pagará»; es decir, deberá hacer plena restitución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora si
  lexicon: HALOT
  rationale: La partícula introduce un caso condicional dentro de una sección legal. En español, «Y si» conserva el enlace discursivo de ו sin sonar forzado.
- source_word: יִשְׁאַל
  english_pob_choice: borrows
  chosen_spanish: toma prestado
  alternatives_spanish:
  - pide
  - solicita
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo expresa la acción de recibir algo en préstamo; «toma prestado» comunica mejor el sentido transaccional que «pide» o «solicita».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico en lenguaje casuístico. «Un hombre» mantiene esa forma sin neutralizarla.
- source_word: מֵעִם רֵעֵהוּ
  english_pob_choice: from his neighbor
  chosen_spanish: de su prójimo
  alternatives_spanish:
  - de su vecino
  - de su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o prójimo. En lenguaje de pacto y ley, «prójimo» es una opción fiel y natural en español, sin perder la referencia a un miembro de la misma comunidad.
- source_word: וְנִשְׁבַּר
  english_pob_choice: it is injured
  chosen_spanish: es quebrado
  alternatives_spanish:
  - se rompe
  - es dañado
  lexicon: HALOT
  rationale: La forma pasiva significa literalmente «es quebrado». Dado que el texto puede referirse a un objeto prestado o a un animal, «es quebrado» conserva la literalidad y la amplitud semántica; la nota explica la alternativa interpretativa.
- source_word: אוֹ מֵת
  english_pob_choice: or dies
  chosen_spanish: o muere
  alternatives_spanish:
  - o está muerto
  - o fallece
  lexicon: HALOT
  rationale: «O muere» reproduce de manera directa la condición legal afectante al bien o animal prestado.
- source_word: בְּעָלָיו
  english_pob_choice: its owner
  chosen_spanish: su dueño
  alternatives_spanish:
  - el dueño
  - su propietario
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural en apariencia, funciona idiomáticamente en singular. «Su dueño» es claro y natural en español.
- source_word: אֵין עִמּוֹ
  english_pob_choice: is not with it
  chosen_spanish: no está con él
  alternatives_spanish:
  - no está con eso
  - está ausente
  lexicon: HALOT
  rationale: El referente pronominal es el bien o animal prestado, pero en español «con él» permite una referencia natural al objeto/animal sin forzar la concordancia; la nota preserva la ambigüedad contextual del hebreo.
- source_word: שַׁלֵּם יְשַׁלֵּם
  english_pob_choice: he shall surely make restitution
  chosen_spanish: ciertamente hará restitución
  alternatives_spanish:
  - sin duda pagará en pleno
  - ciertamente pagará
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la obligación. «Ciertamente hará restitución» conserva la fuerza legal y evita reducir el término a un simple «pagar».
translation_notes:
  revision_awareness: Se siguió el giro formal del último pase en inglés, manteniendo la obligación legal intensificada con «ciertamente hará restitución». También se preservó la alternativa léxica documentada para וְנִשְׁבַּר mediante una nota que deja abierta la referencia a objeto o animal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «prójimo» para רֵעַ por su adecuación en contexto legal-covenantal, en lugar de «amigo» o «vecino».
  - «Restitución» se conservó para reflejar el sentido jurídico de compensación plena, no solo de pago monetario.
  - La referencia pronominal de «él» en la nota se deja deliberadamente abierta para respetar la ambigüedad del hebreo entre objeto y animal.
