translation:
  language: es
  text: para expulsar a los pecadores de la herencia[a], para hacer pedazos la soberbia del pecador[b] como vasijas de alfarero[d], para aplastar toda su sustancia[c] con una vara de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredad» para «herencia».
    reason: lexical_alternative
  - marker: b
    text: 'El singular del griego puede funcionar como singular representativo: «del pecador».'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «sus posesiones» o «todo su sostén».
    reason: lexical_alternative
  - marker: d
    text: O «como vasos de alfarero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῶσαι
  english_pob_choice: to drive ... out
  chosen_spanish: expulsar
  alternatives_spanish:
  - echar fuera
  - arrojar fuera
  lexicon: BDAG
  rationale: El verbo expresa una remoción enérgica. «Expulsar» comunica bien la fuerza expulsiva en español moderno y conserva el movimiento de sacar a alguien de un ámbito.
- source_word: κληρονομίας
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la posesión heredada
  lexicon: BDAG
  rationale: «Herencia» es la opción natural en español y mantiene el posible sentido pactal/territorial de κληρονομία sin forzar una paráfrasis.
- source_word: ἐκτρῖψαι
  english_pob_choice: to wipe out
  chosen_spanish: borrar
  alternatives_spanish:
  - destruir
  - aniquilar
  - hacer pedazos
  lexicon: BDAG
  rationale: En este contexto la idea es la de eliminar o hacer desaparecer la soberbia; «borrar» preserva la fuerza de erradicación del inglés POB y suena menos mecánico que un verbo puramente físico, aunque la imagen de quebranto sigue activa por la comparación cerámica.
- source_word: ὑπερηφανίαν
  english_pob_choice: the pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la altivez
  lexicon: BDAG
  rationale: «Soberbia» comunica mejor el matiz negativo de autoexaltación arrogante que el español a veces asocia con «orgullo».
- source_word: ἁμαρτωλοῦ
  english_pob_choice: of the sinner
  chosen_spanish: del pecador
  alternatives_spanish:
  - del culpable
  - del impío
  lexicon: BDAG
  rationale: Se conserva el singular representativo del griego. «Del pecador» mantiene esa forma sin convertirla en plural ni suavizar la carga moral.
- source_word: σκεύη κεραμέως
  english_pob_choice: like a potter's vessels
  chosen_spanish: como vasos de alfarero
  alternatives_spanish:
  - como vasijas de alfarero
  - como vasijas del alfarero
  lexicon: BDAG
  rationale: «Vasos de alfarero» reproduce la imagen concreta de recipientes frágiles hechos por el alfarero y resulta más natural que un calco rígido.
- source_word: ῥάβδῳ σιδηρᾷ
  english_pob_choice: with an iron rod
  chosen_spanish: con vara de hierro
  alternatives_spanish:
  - con cetro de hierro
  - con bastón de hierro
  lexicon: BDAG
  rationale: «Vara de hierro» preserva el orden y el valor imagético tradicional del instrumento de juicio, sin introducir un término más interpretativo como «cetro».
- source_word: συντρίψαι
  english_pob_choice: to crush
  chosen_spanish: aplastar
  alternatives_spanish:
  - quebrantar
  - hacer pedazos
  - triturar
  lexicon: BDAG
  rationale: El verbo denota ruptura violenta. «Aplastar» transmite bien la contundencia del golpe con la vara de hierro y evita repetir el campo semántico de «borrar».
- source_word: πᾶσαν ὑπόστασιν αὐτῶν
  english_pob_choice: all their substance
  chosen_spanish: toda su sustancia
  alternatives_spanish:
  - todo su patrimonio
  - todo su sostén
  - toda su existencia
  lexicon: BDAG
  rationale: '«Sustancia» conserva la amplitud de ὑπόστασις tal como la refleja el inglés POB: bienes, base de apoyo o aquello que los sostiene. No se estrecha a «patrimonio» ni se espiritualiza como «existencia».'
theological_decisions:
- issue: Singular representativo en «del pecador»
  english_pob_reading: '''Of the sinner'' is singular in Greek and may function as a representative singular.'
  chosen_spanish_reading: 'Se mantiene el singular: «del pecador».'
  alternative_spanish_readings:
  - de los pecadores
  - del impío
  rationale: El griego singular puede tener valor representativo; conservarlo evita aplanar el matiz colectivo/ejemplar que el POB documenta.
  doctrine_reference: No aplica una doctrina específica; se trata de una decisión de número y representación textual.
- issue: Alcance de ὑπόστασις
  english_pob_reading: '''All their substance'' may also be understood as ''their whole standing'' or ''their possessions.'''
  chosen_spanish_reading: «Toda su sustancia» mantiene la amplitud sin cerrarla a un solo referente.
  alternative_spanish_readings:
  - todo su patrimonio
  - todo su sostén
  - toda su condición
  rationale: El término es semánticamente amplio. La redacción elegida permite leer bienes, base material o sostén sin decidir de más.
  doctrine_reference: No aplica una doctrina específica; es una decisión semántica abierta.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente mantuvo el singular de «sinner», conservó «substance» para ὑπόστασιν y prefirió una formulación más natural en la comparación con el alfarero. La versión española sigue esas decisiones: mantiene el singular representativo, conserva una opción amplia para ὑπόστασις y usa una comparación cerámica natural en español sin perder la imagen de fragilidad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el pasaje lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Herencia» se emplea como equivalente principal de κληρονομία, con «heredad» como alternativa anotada.
  - «Soberbia» se reserva para ὑπερηφανία por su matiz más claramente negativo que «orgullo».
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
