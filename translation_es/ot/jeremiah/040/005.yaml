translation:
  language: es
  text: 'Pero como todavía no había vuelto[a], le dijo: «Vuelve a Gedalías hijo de Ahicam, hijo de Safán, a quien el rey de Babilonia ha puesto sobre las ciudades de Judá, y vive con él entre el pueblo; o ve adonde te parezca bien ir». Entonces el capitán de la guardia le dio provisiones[b] y un presente[c], y lo dejó ir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo al comienzo del versículo es difícil; también puede entenderse: «Mientras todavía no había vuelto, “Vuelve a Gedalías…”».'
    reason: alternative_reading
  - marker: b
    text: O «raciones» para «provisiones».
    reason: lexical_alternative
  - marker: c
    text: O «regalo», «asignación» o «porción» para «presente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹדֶנּוּ לֹא יָשׁוּב
  english_pob_choice: But since he still had not gone back
  chosen_spanish: Pero como todavía no había vuelto
  alternatives_spanish:
  - Y todavía no había regresado
  - Pero aún no se había vuelto
  lexicon: HALOT
  rationale: La cláusula hebrea es difícil y el contexto narrativo indica una falta de retorno previa al mandato. «Como todavía no había vuelto» conserva la relación temporal y causal que la POB inglesa resolvió con un giro fluido en pluperfecto.
- source_word: וְשֻׁבָה
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuélvete
  lexicon: HALOT
  rationale: Es el imperativo de שוב. «Vuelve» es natural en español y mantiene la dirección de movimiento pedida en el contexto.
- source_word: אֶל גְּדַלְיָה בֶן אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: to Gedaliah son of Ahikam, son of Shaphan
  chosen_spanish: a Gedalías hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - a Gedalías, hijo de Ahicam, hijo de Safán
  - a Gedalías el hijo de Ahicam, hijo de Safán
  lexicon: HALOT
  rationale: Se transliteran los nombres según el criterio del proyecto, con filiación rendida de forma clara y readable en español.
- source_word: אֲשֶׁר הִפְקִיד מֶלֶךְ בָּבֶל בְּעָרֵי יְהוּדָה
  english_pob_choice: whom the king of Babylon has appointed over the cities of Judah
  chosen_spanish: a quien el rey de Babilonia ha puesto sobre las ciudades de Judá
  alternatives_spanish:
  - a quien el rey de Babilonia nombró sobre las ciudades de Judá
  - a quien el rey de Babilonia ha designado sobre las ciudades de Judá
  lexicon: HALOT
  rationale: הִפְקִיד expresa poner a alguien en un cargo o responsabilidad. «Ha puesto sobre» conserva la idea de autoridad administrativa sobre las ciudades, como en la POB inglesa.
- source_word: וְשֵׁב אִתּוֹ בְּתוֹךְ הָעָם
  english_pob_choice: and live with him among the people
  chosen_spanish: y vive con él entre el pueblo
  alternatives_spanish:
  - y mora con él en medio del pueblo
  - y permanece con él entre el pueblo
  lexicon: HALOT
  rationale: ישב aquí implica residir o vivir. «Vive con él entre el pueblo» es idiomático en español y mantiene la cercanía comunitaria del hebreo.
- source_word: אוֹ אֶל כָּל הַיָּשָׁר בְּעֵינֶיךָ לָלֶכֶת לֵךְ
  english_pob_choice: or go wherever it seems right in your eyes to go
  chosen_spanish: o ve adonde te parezca recto ir
  alternatives_spanish:
  - o ve adonde te parezca bien ir
  - o ve a donde tú creas mejor
  lexicon: HALOT
  rationale: La expresión idiomática «recto/derecho en tus ojos» se conserva con «te parezca recto», sin borrarla en una paráfrasis demasiado libre. «Adonde te parezca recto ir» preserva la tensión semántica entre evaluación moral/práctica y dirección de movimiento.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de la guardia
  - el comandante de la guardia
  lexicon: HALOT
  rationale: Es el título oficial tradicionalmente asociado con Nebuzaradán en Jeremías. «Capitán de la guardia» reproduce bien el rango sin recurrir a una glosa más pesada.
- source_word: אֲרֻחָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - raciones
  - alimentos para el camino
  lexicon: HALOT
  rationale: El sustantivo designa lo necesario para el viaje o el sustento. «Provisiones» es natural y suficientemente amplio en español.
- source_word: וּמַשְׂאֵת
  english_pob_choice: a gift
  chosen_spanish: un presente
  alternatives_spanish:
  - un regalo
  - una porción
  - una dádiva
  lexicon: HALOT
  rationale: El término puede abarcar regalo, porción o suministro adicional. «Un presente» mantiene la amplitud del don dado al despedirlo y evita reducirlo innecesariamente a un simple obsequio moderno.
- source_word: וַיְשַׁלְּחֵהוּ
  english_pob_choice: and sent him away
  chosen_spanish: y lo despidió
  alternatives_spanish:
  - y lo envió
  - y lo dejó ir
  lexicon: HALOT
  rationale: El verbo implica enviar/relevar/despedir. «Lo despidió» comunica la acción de liberarlo y dejarlo partir en español actual sin perder la iniciativa de la autoridad.
theological_decisions:
- issue: La expresión temporal inicial es sintácticamente ambigua y podría leerse como una cláusula de fondo o como una instrucción ligada al estado previo del personaje.
  english_pob_reading: But since he still had not gone back
  chosen_spanish_reading: Pero como todavía no había vuelto
  alternative_spanish_readings:
  - Mientras todavía no había vuelto
  - Y todavía no había vuelto
  rationale: No hay una decisión doctrinal, pero sí una tensión textual/sintáctica que conviene preservar con una redacción que siga el flujo narrativo sin cerrar indebidamente la ambigüedad. La forma elegida refleja el valor de antecedencia que la POB inglesa destacó en su nota.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el pass más reciente sin cambios necesarios, con alta concordancia entre el texto fuente hebreo y el audit trail inglés. No se aplicaron revisiones posteriores adicionales.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Gedalías», «Ahicam» y «Safán» como transliteraciones consistentes y lectura natural para español.
  - «Capitán de la guardia» se conserva como título técnico en línea con el historial auditado de POB.
  - Se preservó la ambigüedad inicial mediante nota, en vez de resolverla de forma excesivamente interpretativa.
  - Se eligió «presente» en el texto principal y se dejó abierta la alternativa «porción/asignación» en nota para no perder la amplitud semántica de מַשְׂאֵת.
