id: 1TI.2.7
reference: 1 Timothy 2:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς ὃ ἐτέθην ἐγὼ κῆρυξ καὶ ἀπόστολος— ἀλήθειαν ⸀λέγω, οὐ ψεύδομαι— διδάσκαλος ἐθνῶν ἐν πίστει καὶ ἀληθείᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/007.yaml
  text: For this I was appointed a herald and an apostle—I am telling the truth[c][b][a]; I am not lying—a teacher of the Gentiles in faith and truth.
  footnotes:
  - marker: a
    text: Or 'for which I was appointed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a teacher of the nations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in faithfulness and truth.'
    reason: alternative_reading
translation:
  language: ko
  text: 이 일을 위하여 나는 선포자와 사도로 세움을 받았으며—내가 진실을 말합니다, 거짓말이 아닙니다—믿음과 진리 안에서 이방인[b]의 교사가 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 또는 「민족들의 교사」. 헬라어 ἔθνη는 「민족·이방 민족」을 폭넓게 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ ἐτέθην
  english_pob_choice: For this I was appointed
  chosen_korean: 이 일을 위하여 ~ 세움을 받았으며
  alternatives_korean:
  - 이를 위해 ~ 임명되었으며
  - 이 일에 ~ 임직되었으며
  lexicon: BDAG
  rationale: τίθημι의 「세우다·임명하다」를 「세움을 받았으며」로 자연스럽게 옮긴다.
- source_word: κῆρυξ
  english_pob_choice: herald
  chosen_korean: 선포자
  alternatives_korean:
  - 전령
  - 사자(使者)
  lexicon: BDAG
  rationale: 복음 선포의 역할을 가리키므로 「선포자」가 자연스럽다. 「전령」은 일반어로 무게가 약하다.
- source_word: ἀπόστολος
  english_pob_choice: an apostle
  chosen_korean: 사도
  alternatives_korean: []
  lexicon: BDAG
  rationale: 1:1과 일관.
- source_word: ἀλήθειαν λέγω, οὐ ψεύδομαι
  english_pob_choice: I am telling the truth; I am not lying
  chosen_korean: 내가 진실을 말합니다, 거짓말이 아닙니다
  alternatives_korean:
  - 진리를 말합니다, 거짓이 아닙니다
  lexicon: BDAG
  rationale: 자기 변호의 정형구. 「진실」과 「거짓말」의 짝이 한국어로 가장 자연스럽다.
- source_word: διδάσκαλος ἐθνῶν
  english_pob_choice: a teacher of the Gentiles
  chosen_korean: 이방인의 교사
  alternatives_korean:
  - 민족들의 교사
  - 열방의 교사
  lexicon: BDAG
  rationale: 한국 신학 정립 어휘 「이방인」.
- source_word: ἐν πίστει καὶ ἀληθείᾳ
  english_pob_choice: in faith and truth
  chosen_korean: 믿음과 진리 안에서
  alternatives_korean:
  - 믿음과 진실 안에서
  - 신실함과 진리 안에서
  lexicon: BDAG
  rationale: πίστις는 본 절에서 「믿음」이 자연스럽고, 사역의 영역적 자질을 가리킨다.
