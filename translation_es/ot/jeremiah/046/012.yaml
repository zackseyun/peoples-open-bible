translation:
  language: es
  text: Las naciones han oído tu vergüenza[a], y tu clamor ha llenado la tierra; porque un guerrero ha tropezado contra otro guerrero; ambos han caído juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el país'. El hebreo אֶרֶץ puede significar tanto 'tierra' como 'país'; aquí se prefiere 'tierra' porque la cláusula anterior habla de 'las naciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  - han escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción ya consumada con efecto presente; en español, el pretérito perfecto compuesto 'han oído' mantiene esa actualidad del reporte que ya se difundió.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los pueblos
  lexicon: HALOT
  rationale: '''Naciones'' conserva el alcance colectivo internacional del texto y concuerda con la lectura del contexto profético sobre el escándalo divulgado ampliamente.'
- source_word: קְלוֹנֵךְ
  english_pob_choice: your shame
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu deshonra
  - tu oprobio
  lexicon: HALOT
  rationale: '''קלון'' expresa vergüenza pública, deshonra o humillación. ''Vergüenza'' es la opción más directa y natural en español, sin perder la carga pública del término.'
- source_word: וְצִוְחָתֵךְ
  english_pob_choice: and your cry
  chosen_spanish: y tu clamor
  alternatives_spanish:
  - y tu grito
  - y tu alarido
  lexicon: HALOT
  rationale: '''צוחה'' es un grito de angustia o auxilio. ''Clamor'' conserva el tono de lamentación/angustia y resulta más elevado que ''grito'' en un contexto profético.'
- source_word: מָלְאָה הָאָרֶץ
  english_pob_choice: has filled the earth
  chosen_spanish: ha llenado la tierra
  alternatives_spanish:
  - ha llenado la tierra entera
  - ha llenado el país
  lexicon: HALOT
  rationale: Se mantiene 'la tierra' para reproducir el alcance amplio del hebreo. Aquí 'tierra' suena natural en español y conserva la contraposición con 'las naciones'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la difusión del oprobio y del clamor. 'Porque' es la equivalencia causal más clara y sobria en español.
- source_word: גִבּוֹר
  english_pob_choice: warrior
  chosen_spanish: guerrero
  alternatives_spanish:
  - hombre valiente
  - combatiente
  lexicon: HALOT
  rationale: '''גבור'' en este marco militar designa a un combatiente fuerte. ''Guerrero'' comunica bien la escena de batalla sin recurrir al giro tradicional ''hombre poderoso'', menos preciso en español contemporáneo.'
- source_word: בְּגִבּוֹר
  english_pob_choice: against warrior
  chosen_spanish: contra guerrero
  alternatives_spanish:
  - frente a guerrero
  - sobre guerrero
  lexicon: HALOT
  rationale: La preposición con כשל expresa choque o tropiezo en confrontación; 'contra' refleja ese movimiento de colisión entre combatientes.
- source_word: כָּשָׁלוּ
  english_pob_choice: has stumbled
  chosen_spanish: ha tropezado
  alternatives_spanish:
  - ha vacilado
  - ha caído
  lexicon: HALOT
  rationale: El verbo indica tropezar, tambalear o fallar. 'Ha tropezado' preserva la idea de desmoronamiento previo a la caída final.
- source_word: יַחְדָּיו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - al mismo tiempo
  lexicon: HALOT
  rationale: '''יַחְדָּיו'' marca simultaneidad; ''juntos'' es natural en español y mantiene el sentido de acción conjunta.'
- source_word: נָפְל֥וּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han sucumbido
  lexicon: HALOT
  rationale: Se conserva el perfecto compuesto para la misma línea temporal del versículo y para expresar el resultado consumado de la derrota.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos juntos
  lexicon: HALOT
  rationale: La forma dual enfatiza que fueron dos combatientes. 'Los dos' conserva esa explicitud de manera natural y evita un español recargado.
theological_decisions:
- issue: Alcance de 'הָאָרֶץ'
  english_pob_reading: earth is preferred here because the previous clause speaks of 'the nations.'
  chosen_spanish_reading: '''la tierra'' se mantiene con alcance amplio, no restringido al territorio local'
  alternative_spanish_readings:
  - '''el país'''
  - '''la tierra entera'''
  rationale: La secuencia 'las naciones... la tierra' sugiere difusión internacional del rumor y del clamor. 'La tierra' conserva ese alcance global sin forzar una paráfrasis explicativa.
  doctrine_reference: No doctrinal; decisión semántica y contextual basada en el paralelismo del versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado final del POB inglés, sin revisar cambios adicionales: se conserva el paralelismo ''warrior ... warrior'' y la distinción entre tropezar y caer. La única nota necesaria en español es la alternativa de alcance para אֶרֶץ.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - '''Las naciones'' y ''la tierra'' mantienen el contraste semántico del hebreo y del audit trail inglés.'
  - Se prefirió vocabulario contemporáneo ('vergüenza', 'clamor', 'guerrero') sin perder el registro profético.
