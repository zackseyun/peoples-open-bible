translation:
  language: es
  text: Yahvé les envió a todos sus siervos, los profetas, levantándose temprano y enviándolos[a]; pero ustedes no escucharon, ni inclinaron su oído para oír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levantándose temprano y enviando»; es un modismo que expresa el envío reiterado y diligente de los profetas.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁלַח / וְשָׁלֹחַ
  english_pob_choice: And ... sent / rising early and sending them
  chosen_spanish: les envió ... levantándose temprano y enviándolos
  alternatives_spanish:
  - les había enviado ... levantándose temprano y enviándolos
  - les envió ... insistentemente enviándolos
  lexicon: HALOT
  rationale: El perfecto con waw se vierte naturalmente en pasado simple en español. La segunda expresión reproduce el giro idiomático hebreo de acción reiterada y diligente sin suavizarlo en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: usar «Yahvé» en el texto principal, conservando el referente del Tetragrámaton y evitando la convención de máscara litúrgica.'
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El sufijo de 2mp se expresa de forma natural en español con objeto indirecto plural. «Les» mantiene fluidez y evita repetición innecesaria en la frase.
- source_word: כָּל עֲבָדָיו
  english_pob_choice: all his servants
  chosen_spanish: todos sus siervos
  alternatives_spanish:
  - todos sus esclavos
  - todos sus servidores
  lexicon: HALOT
  rationale: Aunque עבד puede rendirse como «esclavo», en la expresión profética sobre enviados de Dios funciona como designación de comisión y fidelidad. En español «siervos» conserva esa relación sin introducir la dureza social de «esclavos».
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: HALOT
  rationale: Término técnico estable del texto; la aposición explicita qué tipo de siervos son.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: but you did not listen
  chosen_spanish: pero ustedes no escucharon
  alternatives_spanish:
  - pero ustedes no oyeron
  - pero ustedes no prestaron oído
  lexicon: HALOT
  rationale: Aquí שׁמע implica respuesta obediente al mensaje profético. «Escuchar» comunica mejor esa dimensión que «oír» en español.
- source_word: וְלֹא הִטִּיתֶם אֶת אָזְנְכֶם
  english_pob_choice: nor did you incline your ear
  chosen_spanish: ni inclinaron su oído
  alternatives_spanish:
  - ni prestaron su oído
  - ni volvieron su oído
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de atención receptiva. «Inclinar el oído» suena natural en español bíblico contemporáneo y mantiene la imagen.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para atender
  lexicon: HALOT
  rationale: Completa el paralelismo con el verbo de percepción auditiva en español. El contexto ya carga el sentido de obediencia, por lo que «oír» es suficiente y preciso.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto profético de juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión confesional y auditada del proyecto de no ocultar el Nombre divino. En Jeremías, el uso directo de Yahvé preserva la voz del pacto que envía a sus profetas y acusa la desobediencia del pueblo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de שׁמע en la amonestación profética
  english_pob_reading: did not listen
  chosen_spanish_reading: no escucharon
  alternative_spanish_readings:
  - no oyeron
  - no prestaron atención
  rationale: El contexto no trata de mera percepción auditiva, sino de respuesta obediente al mensaje de los profetas. «Escuchar» conserva esa tensión sin convertirla en una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md: Verbs of hearing in prophetic rebuke contexts'
- issue: Valor de עבד en la fórmula 'his servants the prophets'
  english_pob_reading: all his servants the prophets
  chosen_spanish_reading: todos sus siervos los profetas
  alternative_spanish_readings:
  - todos sus esclavos los profetas
  - todos sus servidores los profetas
  rationale: La expresión hebrea identifica a los profetas como agentes comisionados por Dios. «Siervos» comunica relación y misión sin perder la carga de dependencia y obediencia.
  doctrine_reference: 'DOCTRINE.md: δοῦλος/עבד lexical force and contextual honorific use'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustanciales. Se ha conservado la decisión auditada de reflejar el modismo hebreo de ''levantarse temprano y enviar'' y el Nombre divino como Yahvé, ajustando la redacción al español natural sin perder el paralelismo del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene «siervos» para עֲבָדָיו por la función honorífica/profética del pasaje.
  - '«Escucharon» e «inclinaron su oído» conservan la doble amonestación del hebreo: falta de respuesta y falta de atención receptiva.'
  - La nota al pie marca el modismo hebreo sin desactivar su fuerza repetitiva.
