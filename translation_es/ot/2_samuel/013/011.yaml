translation:
  language: es
  text: 'Cuando ella le acercó la comida para que comiera[a], él la sujetó y le dijo: «Ven, acuéstate conmigo, hermana mía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando ella se acercó a él para comer». El verbo hebreo puede significar tanto que Tamar se acercó como que le acercó la comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגֵּשׁ
  english_pob_choice: she brought it near
  chosen_spanish: se lo acercó
  alternatives_spanish:
  - se acercó
  - se le acercó
  lexicon: HALOT
  rationale: El hebreo נגשׁ puede significar tanto 'acercarse' como 'hacer llegar / acercar'. Dado el contexto de servir comida y el complemento final 'para que comiera', 'se lo acercó' conserva la ambigüedad funcional sin perder la acción concreta.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: se lo
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El pronombre dativo está integrado en el giro español con 'se lo', que refleja la dirección hacia él y el objeto implícito de la comida.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para que comiera
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa naturalmente en español con subjuntivo final. 'Para que comiera' mantiene la finalidad y la referencia al acto de comer.
- source_word: וַיַּחֲזֶק בָּהּ
  english_pob_choice: he seized her
  chosen_spanish: él la asió
  alternatives_spanish:
  - él la agarró
  - él la sujetó con fuerza
  lexicon: HALOT
  rationale: חזק con ב expresa tomar o sujetar con firmeza; en este contexto coercitivo, 'asió' comunica la fuerza del acto sin añadir un nivel interpretativo mayor que 'agarró'.
- source_word: וַיֹּאמֶר לָהּ
  english_pob_choice: and said to her
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo a ella
  lexicon: HALOT
  rationale: Fórmula narrativa estándar; 'le dijo' es la construcción natural en español.
- source_word: בּוֹאִי
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  lexicon: HALOT
  rationale: Imperativo femenino singular de בוא. 'Ven' conserva la inmediatez y la brevedad del mandato.
- source_word: שִׁכְבִי עִמִּי
  english_pob_choice: lie with me
  chosen_spanish: acuéstate conmigo
  alternatives_spanish:
  - duérmete conmigo
  - ten relaciones conmigo
  lexicon: HALOT
  rationale: שׁכב con עִם es un eufemismo sexual reconocido. 'Acuéstate conmigo' es claro en español y conserva la gravedad del imperativo sin volverlo coloquial.
- source_word: אֲחוֹתִי
  english_pob_choice: my sister
  chosen_spanish: hermana mía
  alternatives_spanish:
  - mi hermana
  lexicon: HALOT
  rationale: El vocativo posesivo debe mantenerse porque intensifica el horror narrativo y el carácter incestuoso del abuso.
theological_decisions:
- issue: Mantener la fuerza coercitiva del acto sin suavizarla
  english_pob_reading: he seized her
  chosen_spanish_reading: él la asió
  alternative_spanish_readings:
  - él la agarró
  - él la sujetó con fuerza
  rationale: La escena exige una traducción que preserve la violencia implícita en el hebreo. 'Asió' comunica aprehensión firme y evita tanto la suavización como la sobreexplicación.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Conservar el eufemismo sexual reconocido sin trivializarlo
  english_pob_reading: lie with me
  chosen_spanish_reading: acuéstate conmigo
  alternative_spanish_readings:
  - duérmete conmigo
  - ten relaciones conmigo
  rationale: El hebreo usa un modismo sexual. 'Acuéstate conmigo' mantiene la referencia sexual de forma directa pero no vulgar, en línea con la gravedad del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Retener el parentesco explícito en el discurso
  english_pob_reading: my sister
  chosen_spanish_reading: hermana mía
  alternative_spanish_readings:
  - mi hermana
  rationale: La mención de parentesco no es decorativa; intensifica la transgresión moral y narrativa. Debe permanecer explícita en español.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditable inglés de POB. Se conserva la ambigüedad de וַתַּגֵּשׁ mediante una nota alternativa en español, y se mantiene la fuerza coercitiva y sexual del resto de la escena sin suavización ni añadido interpretativo.
  spanish_consistency_notes:
  - Se usa 'hermana mía' como vocativo para reflejar el paralelismo con el inglés POB y la intensidad narrativa.
  - Se prefiere 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'siervo' u otras lecturas atenuantes; el pasaje demanda un español directo y preciso.
  - La puntuación de cita se ajusta al español y al registro bíblico moderno.
