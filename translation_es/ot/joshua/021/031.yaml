  text: Helqat con sus pastizales, y Rehob con sus pastizales—cuatro ciudades.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חֶלְקָת
  english_pob_choice: Helkath
  chosen_spanish: Helcat
  alternatives_spanish:
  - Helqat
  - Helcath
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera para preservar la referencia geográfica. Se adapta la grafía a una forma legible en español sin añadir traducción al nombre.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus terrenos comunes
  - sus alrededores
  lexicon: HALOT
  rationale: El término designa el terreno asociado a la ciudad para uso abierto o de pastoreo. 'Pastizales' comunica bien la función del lugar en español moderno y mantiene el matiz de tierra anexa apta para pastoreo, sin recurrir a 'suburbios' ni a una paráfrasis más vaga.
- source_word: רְחֹב
  english_pob_choice: Rehob
  chosen_spanish: Rehob
  alternatives_spanish:
  - Rejob
  - Rejób
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene transliterado. La forma 'Rehob' es transparente y reconocible en español bíblico.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro pueblos
  - cuatro urbes
  lexicon: HALOT
  rationale: La frase numérica resume el total de la lista. 'Ciudades' corresponde al uso normal de עִיר en listas de repartición territorial y es más fiel que 'pueblos' en este contexto.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: with ... and ... with ...
  chosen_spanish: con ... y ... con ...
  alternatives_spanish:
  - — ... y ...
  - junto con ... y ...
  lexicon: Hebrew grammar
  rationale: Los marcadores de objeto no se traducen literalmente, pero en esta enumeración la relación de pertenencia entre cada ciudad y su terreno anexo queda bien expresada con 'con'. En español resulta natural y conserva la estructura listada del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el reparto sintáctico del original, reflejando la lista de dos ciudades con sus terrenos anexos y el total final de cuatro ciudades. No se requiere aparato de variantes ni nota textual en este versículo, y la elección léxica principal gira en torno a topónimos y al sentido funcional de מִגְרָשׁ.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios sin traducirlos.
  - Se usa 'pastizales' para מִגְרָשׁ en este contexto de ciudades levíticas, coherente con el valor de terreno anexo para pastoreo.
  - La puntuación con dos puntos antes de 'cuatro ciudades' refleja el cierre resumitivo del hebreo.
