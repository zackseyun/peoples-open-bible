review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue el rastro de auditoría en los puntos principales: el optativo de מִי יִתֵּן, «de Sion», «Yahvé», el modismo שׁוּב שְׁבוּת como restauración amplia, y la distinción entre los dos verbos finales de gozo. Sin embargo, «las fortunas de su pueblo» suena poco natural y ambiguo en español actual, donde puede sugerir riquezas materiales más que situación/condición restaurada.'
  spanish_quality_summary: 'El texto es legible y digno, pero necesita un ajuste idiomático para un español eclesial natural. «¡Oh, que ... viniera!» funciona, aunque «¡Oh, que ... viniera!» es algo literario; no es problemático. El punto principal a corregir es «restaure las fortunas», que resulta forzado en español. La nota también debe pulirse para sonar natural: «haga volver la cautividad» es demasiado calcado; mejor «haga volver a los cautivos» o conservar la explicación de que es una literalidad del modismo.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; no hay conflictos con otros términos clave. La decisión de mantener «salvación» para יְשׁוּעַת y «Jacob/Israel» es fiel. La excepción recomendada es sustituir «fortunas» por «situación» o «bienestar» para respetar el sentido idiomático documentado sin introducir una connotación española inadecuada.'
  issues:
