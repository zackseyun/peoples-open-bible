    issue: La nota [b] está anclada en el lugar equivocado.
    rationale: El texto principal marca [b] en «roto», pero la nota ofrece una alternativa para «de los cazadores» / «de los que ponen lazos», no para נִשְׁבָּר. Esto rompe la disciplina de notas y puede confundir al lector.
  - severity: medium
