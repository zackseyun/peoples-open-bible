  glossary_alignment: No hay conflictos con la terminología del proyecto. Los topónimos «Laquis» y «Azeca» son apropiados; «ejército», «Judá» y «ciudades fortificadas» concuerdan con el audit trail y con un español bíblico moderno y natural.
