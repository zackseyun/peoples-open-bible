translation:
  language: es
  text: 'Y seis brazos saldrán de sus lados: tres brazos del candelabro de uno de sus lados[a], y tres brazos del candelabro del otro lado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tres brazos del candelabro del otro lado».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִים
  english_pob_choice: branches
  chosen_spanish: brazos
  alternatives_spanish:
  - ramas
  - varas
  - caños
  lexicon: HALOT
  rationale: En el contexto del candelabro del tabernáculo, קָנִים no son cañas vegetales sino las prolongaciones que salen del cuerpo central. «Brazos» comunica bien esa función física en español y mantiene la imagen de piezas que se extienden lateralmente.
- source_word: יֹצְאִים
  english_pob_choice: shall come out
  chosen_spanish: saldrán
  alternatives_spanish:
  - salen
  - saldrán hacia afuera
  - se proyectarán
  lexicon: HALOT
  rationale: El participio describe los brazos como saliendo del centro. «Saldrán» conserva el valor descriptivo/instructivo del hebreo en un español natural y solemne.
- source_word: מִצִּדֶּיהָ
  english_pob_choice: from its sides
  chosen_spanish: de sus lados
  alternatives_spanish:
  - de sus costados
  - de sus costados laterales
  - de sus lados exteriores
  lexicon: HALOT
  rationale: La forma plural con sufijo femenino singular se refiere a los lados del objeto. «De sus lados» es directo, claro y fiel a la descripción espacial.
- source_word: קְנֵי מְנֹרָה
  english_pob_choice: branches of the lampstand
  chosen_spanish: brazos del candelabro
  alternatives_spanish:
  - ramas del candelabro
  - brazos de la menorá
  - ramas de la menorá
  lexicon: HALOT
  rationale: La construcción especifica que los קנים pertenecen a la מְנֹרָה. «Candelabro» comunica el objeto cultual en español; «brazos» preserva la imagen de los elementos laterales sin recurrir a un calco extraído del inglés.
- source_word: מְנֹרָה
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lampadario
  - menorá
  - lámpara
  lexicon: HALOT
  rationale: En español bíblico, «candelabro» es la designación más clara y reconocible para este objeto. Se evita transliterar «menorá» como forma principal porque el término común transmite mejor el referente cultual en una traducción pública.
- source_word: הָאֶחָד
  english_pob_choice: its one side
  chosen_spanish: su un lado
  alternatives_spanish:
  - su primer lado
  - su lado uno
  - el un lado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el uno» en contraste con «el segundo/otro». «Su un lado» mantiene la simetría formal y la oposición interna del texto, aunque suene algo más marcado que una reformulación interpretativa.
- source_word: הַשֵּׁנִי
  english_pob_choice: its other side
  chosen_spanish: su otro lado
  alternatives_spanish:
  - su segundo lado
  - el otro lado
  - su lado segundo
  lexicon: HALOT
  rationale: «Otro lado» refleja bien el contraste hebreo entre el primer lado y el lado opuesto. Se evita «segundo lado» porque en español suena menos natural y puede sugerir orden numérico más que oposición espacial.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo WLC y toma como apoyo el audit trail inglés, pero no depende mecánicamente de él. Se conservó la duplicación estructural del hebreo (tres brazos... y tres brazos...), la oposición de lados, y la imagen cultual de la מְנֹרָה; se ajustó la última cláusula a un español fluido sin perder la correspondencia semántica.
  spanish_consistency_notes:
  - Se usó «candelabro» como equivalente principal de מְנֹרָה, en coherencia con un español bíblico claro y público.
  - Se eligió «brazos» para קנים por su naturalidad descriptiva en español; no se introdujo un tecnicismo innecesario.
  - La nota al pie preserva la alternativa de lado opuesto que el audit trail inglés marcó como variante léxica.
  - No hubo decisiones teológicas distintivas en este versículo, solo precisión descriptiva y espacial.
