translation:
  language: es
  text: Beberás de ella y la agotarás, y roerás sus fragmentos[a], y te arrancarás los pechos; porque yo he hablado, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiestos»; el hebreo se refiere a los trozos rotos de un vaso de barro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁתִית אֹתָהּ
  english_pob_choice: You will drink it
  chosen_spanish: Beberás de ella
  alternatives_spanish:
  - La beberás
  - Beberás esa copa
  lexicon: HALOT
  rationale: El verbo en profecía funciona con valor futuro; el objeto femenino singular se entiende por el contexto de la copa. «Beberás de ella» conserva la imagen sin añadir una glosa innecesaria.
- source_word: וּמָצִית
  english_pob_choice: and drain it dry
  chosen_spanish: y la agotarás
  alternatives_spanish:
  - y la chuparás hasta vaciarla
  - y la exprimirás hasta vaciarla
  lexicon: HALOT
  rationale: La idea es consumir completamente el contenido, hasta el fondo. «Agotarás» en español comunica bien la plenitud del vaciamiento sin sonar demasiado mecánico o rebuscado.
- source_word: חֲרָשֶׂיהָ
  english_pob_choice: its shards
  chosen_spanish: sus pedazos
  alternatives_spanish:
  - sus fragmentos
  - sus tiestos
  lexicon: HALOT
  rationale: La palabra hebrea se refiere a los trozos rotos de un recipiente de barro. «Pedazos» mantiene la imagen, y el marcador de nota preserva la alternativa más técnica de «tiestos»/«fragmentos».
- source_word: תְּגָרֵמִי
  english_pob_choice: you will gnaw
  chosen_spanish: roerás
  alternatives_spanish:
  - masticarás
  - morderás
  lexicon: HALOT
  rationale: El matiz es el de roer algo duro o áspero, acorde con los fragmentos del vaso. «Roerás» conserva el carácter violento de la imagen.
- source_word: וְשָׁדַיִךְ תְּנַתֵּקִי
  english_pob_choice: and tear off your breasts
  chosen_spanish: y te arrancarás los pechos
  alternatives_spanish:
  - y te desgarrarás los pechos
  - y te arrancarás tus pechos
  lexicon: HALOT
  rationale: נתק implica arrancar/rasgar con fuerza. En español, «pechos» es claro y digno en este registro; se mantiene la crudeza del juicio sin suavizarla.
- source_word: כִּי אֲנִי דִבַּרְתִּי
  english_pob_choice: for I have spoken
  chosen_spanish: porque yo he hablado
  alternatives_spanish:
  - pues yo he hablado
  - porque he hablado yo
  lexicon: HALOT
  rationale: La fórmula profética afirma la certeza de la sentencia. «Porque yo he hablado» conserva el énfasis del sujeto divino, como en el hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: YHWH se rinde como «Yahvé» según el criterio del proyecto, y אֲדֹנָי se traduce «Señor». La fórmula profética נְאֻם se expresa naturalmente con «declara».
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El proyecto español pide transliterar YHWH como «Yahvé» en el texto principal, no ocultarlo con un equivalente funcional. Mantener «Señor» para אֲדֹנָי conserva el título y evita aplanar la combinación de títulos divinos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imaginería de juicio corporal extrema
  english_pob_reading: tear off your breasts
  chosen_spanish_reading: te arrancarás los pechos
  alternative_spanish_readings:
  - te desgarrarás los pechos
  - te arrancarás los pechos
  rationale: Se preserva la violencia retórica del oráculo sin eufemizarla. El hebreo presenta una imagen deliberadamente chocante de juicio; la traducción no la suaviza.
  doctrine_reference: Ezequiel 23:34; imagen profética de castigo
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la secuencia verbal, la imagen de vaciar la copa, la referencia a los fragmentos del recipiente y la fórmula profética final sin cambios de fondo. No se documentan revisiones posteriores que alteren la decisión léxica o teológica, por lo que el borrador español sigue de cerca esas elecciones con terminología propia del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH conforme al criterio del proyecto.
  - Se conserva el tono profético directo y la violencia imagética del hebreo.
  - «Beberás de ella» y «la agotarás» reflejan dos verbos hebreos distintos sin fusionarlos.
  - La nota conserva la alternativa léxica para חֲרָשֶׂיהָ sin introducir tecnicismos innecesarios en el texto principal.
