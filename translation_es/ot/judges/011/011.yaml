base_translation:
  language: en
  yaml_path: translation/ot/judges/011/011.yaml
  text: So Jephthah went with the elders of Gilead[a], and the people made him head and commander over them[b]. And Jephthah spoke all his words before Yahweh at Mizpah.
  footnotes:
  - marker: a
    text: Or 'the people appointed him head and ruler over them.' The Hebrew term rendered 'commander' can also mean 'ruler' or 'captain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jephthah repeated all his terms before the LORD at Mizpah.' The Hebrew literally says 'spoke all his words.'
    reason: alternative_reading
