    reason: lexical_alternative
  - marker: b
    text: O 'propiedad de sepultura'. El hebreo incluye la idea de una tenencia o posesión, no solo de un lugar físico para cavar una tumba.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'mi muerto'. El hebreo usa un modismo singular para un difunto familiar, sin nombrarlo aquí.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, 'de delante de mí'.
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la naturalidad del español sin perder el matiz del hebreo ni el razonamiento documentado en el audit trail. 'Sitio de sepultura' funciona mejor en el texto principal y la nota preserva el matiz de propiedad de אֲחֻזַּת קֶבֶר. 'Fuera de mi vista' expresa de manera idiomática el sentido contextual de מִלְּפָנַי, mientras la nota conserva la literalidad. También se reubica la nota del primer sintagma para que abarque correctamente el par 'forastero y residente temporal'.
