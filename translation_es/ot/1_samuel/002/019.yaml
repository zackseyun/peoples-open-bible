translation:
  language: es
  text: Y su madre le hacía un manto pequeño[a] y se lo llevaba de año en año[b], cuando subía con su marido para ofrecer el sacrificio anual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «túnica exterior» o «capa». Heb. מְעִיל se refiere a una prenda exterior; «manto» encaja bien aquí por el probable contexto del santuario.
    reason: lexical_alternative
  - marker: b
    text: Heb. «de días a días», un modismo que significa «de año en año» o «año tras año».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  - capa
  - robe
  lexicon: HALOT
  rationale: מְעִיל designa una prenda exterior. En español, 'túnica' comunica una vestidura amplia y apropiada al contexto cultual; 'manto' o 'capa' también son posibles, pero 'túnica' fluye mejor en español actual sin perder la referencia a una prenda exterior.
- source_word: קָטֹן
  english_pob_choice: small
  chosen_spanish: pequeña
  alternatives_spanish:
  - chica
  - de tamaño pequeño
  lexicon: HALOT
  rationale: El adjetivo indica el tamaño de la prenda para un niño. 'Pequeña' es natural, claro y fiel al matiz de tamaño.
- source_word: תַּעֲשֶׂה
  english_pob_choice: would make
  chosen_spanish: le hacía
  alternatives_spanish:
  - le hacía regularmente
  - le hacía costumbre
  lexicon: HALOT
  rationale: El imperfecto narrativo expresa una acción habitual en el pasado. 'Le hacía' transmite bien la costumbre repetida sin forzar una paráfrasis.
- source_word: וְהַעַלְתָה לּוֹ
  english_pob_choice: and bring it up to him
  chosen_spanish: y se la llevaba
  alternatives_spanish:
  - y se la subía
  - y se la llevaba hasta allí
  lexicon: HALOT
  rationale: El verbo עלה conserva la idea de 'subir' en contexto de peregrinación al santuario. En español, 'se la llevaba' comunica de forma natural el acto de llevar la prenda, mientras que el contexto inmediato de 'subía' preserva la dirección cultual.
- source_word: מִיָּמִים יָמִימָה
  english_pob_choice: from year to year
  chosen_spanish: de año en año
  alternatives_spanish:
  - año tras año
  - cada año
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de repetición anual. 'De año en año' mantiene el valor idiomático en español y refleja la decisión del POB inglés de no traducir literalmente 'días'.
- source_word: בַּעֲלוֹתָהּ
  english_pob_choice: when she went up
  chosen_spanish: cuando subía
  alternatives_spanish:
  - cuando ascendía
  - cuando iba subiendo
  lexicon: HALOT
  rationale: '''Subía'' conserva el lenguaje de ascenso a un lugar santo. ''Ascendía'' sería correcto pero menos natural; ''iba subiendo'' agrega aspecto progresivo innecesario.'
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto relacional, el sustantivo significa 'husband'. 'Marido' es plenamente válido y natural en español bíblico contemporáneo.
- source_word: לִזְבֹּחַ
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para sacrificar
  - para inmolar
  lexicon: HALOT
  rationale: Aunque el verbo base puede ser 'sacrificar', 'ofrecer' suena más natural en español cuando va seguido de 'sacrificio', sin perder el sentido cultual.
- source_word: זֶבַח הַיָּמִים
  english_pob_choice: the yearly sacrifice
  chosen_spanish: el sacrificio anual
  alternatives_spanish:
  - el sacrificio de cada año
  - la ofrenda anual
  lexicon: HALOT
  rationale: La frase alude a una celebración sacrificial que se repetía cada año. 'Sacrificio anual' es una equivalencia clara y sobria; 'ofrenda anual' sería posible, pero 'sacrificio' retiene mejor זֶבַח.
theological_decisions:
- issue: Preservar el matiz cultual de 'subir' sin convertirlo en una simple acción de traslado
  english_pob_reading: '''bring it up to him'' and ''when she went up'' preserve both the physical movement and the sanctuary/pilgrimage nuance.'
  chosen_spanish_reading: '''se la llevaba'' junto con ''cuando subía'' mantiene el hecho de llevar la prenda y el lenguaje de ascenso al santuario.'
  alternative_spanish_readings:
  - '''se la subía'' y ''cuando ascendía'''
  - '''se la llevaba'' y ''cuando iba al santuario'''
  rationale: El hebreo repite la raíz עלה para la acción de subir y para la subida ritual. En español conviene evitar una repetición torpe, pero sin perder la señal cultual del texto. La combinación elegida conserva ambos planos.
  doctrine_reference: Narrative cultic setting; sanctuary pilgrimage language
- issue: Mantener la referencia al sacrificio anual como práctica litúrgica recurrente
  english_pob_reading: '''the yearly sacrifice'' reflects a recurring annual sacrificial observance.'
  chosen_spanish_reading: '''el sacrificio anual'' comunica una observancia repetida cada año, sin especificar más de lo que el hebreo dice.'
  alternative_spanish_readings:
  - '''la ofrenda anual'''
  - '''el sacrificio de cada año'''
  rationale: El texto hebreo no desarrolla el rito; solo lo identifica como el sacrificio de los días/año recurrente. 'Sacrificio anual' preserva esa precisión sin ampliar indebidamente el contenido.
  doctrine_reference: 1 Samuel narrative; annual pilgrimage sacrifice
translation_notes:
  revision_awareness: The English POB text and notes show no applied revisions and a high-agreement review. This Spanish draft follows that stable reading, preserving the annual-interval idiom and the cultic ascent language without adding interpretive expansion.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Marido'' se usa por el contexto relacional de אִישָׁהּ; no se eligió ''esposo'' para mantener un registro bíblico sobrio y natural.'
  - La elección de 'túnica' frente a 'manto/capa' es estilística y contextual, no doctrinal.
  - La construcción 'de año en año' evita el calco literal 'de días a días' y transmite el modismo con claridad.
