translation:
  language: es
  text: Y si viene a verme[a], habla falsedad; su corazón acumula iniquidad para sí; cuando sale[c], la dice.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ver»; el objeto «me» está implícito por el contexto y se expresa en español para que la frase sea natural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la vaciedad / el engaño». שׁוא puede abarcar no solo falsedad, sino también vaciedad o engaño.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «afuera» o «al exterior». El español puede expresar el movimiento con «sale» sin repetir de manera redundante «afuera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y aunque
  lexicon: HALOT
  rationale: Conserva el valor condicional y la conexión con el versículo anterior. En español, «Y si» suena natural y preserva la continuidad discursiva.
- source_word: בָּא
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene a
  - entra
  - visita
  lexicon: HALOT
  rationale: El sentido básico de בוא es «venir». Aquí expresa la llegada del visitante hostil; «viene» mantiene la simplicidad del hebreo sin sobreespecificar.
- source_word: לִרְאוֹת
  english_pob_choice: to see me
  chosen_spanish: a verme
  alternatives_spanish:
  - a ver
  - a visitarme
  - a mirarme
  lexicon: HALOT
  rationale: El objeto directo implícito es el salmista, como en el audit trail inglés. «A verme» expresa la idea natural de «venir a verme» sin añadir contenido ajeno.
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - vanidad
  - engaño
  - vaciedad
  lexicon: HALOT
  rationale: En este contexto de habla hostil, el término apunta a discurso falso o engañoso. «Falsedad» conserva el campo semántico sin cerrar innecesariamente la tensión entre falsedad, vaciedad y engaño.
- source_word: יְדַבֵּר
  english_pob_choice: he speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia
  - se expresa
  lexicon: HALOT
  rationale: «Habla» corresponde de forma directa a דבר y permite la repetición verbal del versículo en español.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su mente
  - su ser interior
  lexicon: HALOT
  rationale: Se mantiene el antropologismo hebreo «corazón» para el centro interior de pensamiento e intención.
- source_word: יִקְבָּץ
  english_pob_choice: gathers
  chosen_spanish: acumula
  alternatives_spanish:
  - reúne
  - junta
  - amontona
  lexicon: HALOT
  rationale: En este contexto no se trata de reunir cosas físicas, sino de amasar interiormente maldad. «Acumula» comunica mejor la idea de almacenamiento progresivo.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - mal
  - dolor / desgracia
  lexicon: HALOT
  rationale: אָוֶן puede ser maldad, iniquidad o desgracia. Aquí el paralelismo con habla maliciosa favorece una carga moral; «iniquidad» preserva esa fuerza ética y no diluye el término.
- source_word: לוֹ
  english_pob_choice: to itself
  chosen_spanish: para sí
  alternatives_spanish:
  - en sí
  - dentro de sí
  - para él
  lexicon: HALOT
  rationale: 'La frase refleja el carácter reflexivo/idiomático del hebreo: el corazón acumula internamente. «Para sí» es natural en español y conserva la dirección hacia el interior.'
- source_word: יֵצֵא
  english_pob_choice: he goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - se va
  - sale al exterior
  lexicon: HALOT
  rationale: El verbo פשוט יצא se traduce con el español directo «sale». El movimiento exterior está ya implicado por el complemento siguiente.
- source_word: לַחוּץ
  english_pob_choice: to the street
  chosen_spanish: afuera
  alternatives_spanish:
  - al exterior
  - a la calle
  - fuera
  lexicon: HALOT
  rationale: El hebreo dice literalmente «al exterior / afuera». Frente al inglés, el español puede mantener la referencia sin concretarla como «la calle», que sería más interpretativa. «Afuera» conserva el contraste interior/exterior del versículo.
- source_word: יְדַבֵּר
  english_pob_choice: he speaks it
  chosen_spanish: la habla
  alternatives_spanish:
  - la dice
  - habla de eso
  - lo repite
  lexicon: HALOT
  rationale: El segundo verbo retoma el contenido maligno acumulado. «La habla» conserva el pronombre implícito y la repetición verbal; aunque algo menos usual, es fiel al paralelismo y mantiene la relación con «falsedad»/«iniquidad».
theological_decisions:
- issue: Tensión entre «falsedad», «vaciedad» y «engaño» para שָׁוְא
  english_pob_reading: falsehood, with a note that the term can also mean vanity / deceit
  chosen_spanish_reading: falsedad, con posibilidad contextual de vaciedad o engaño
  alternative_spanish_readings:
  - vanidad
  - engaño
  - vaciedad
  rationale: No se borra la amplitud semántica del hebreo. «Falsedad» funciona mejor en el flujo del verso, pero la nota preserva que שׁוא puede abarcar vaciedad o engaño, como indicó el audit trail inglés.
  doctrine_reference: HALOT / usage context
- issue: Relación entre el corazón interior y la maldad acumulada
  english_pob_reading: his heart gathers wickedness to itself
  chosen_spanish_reading: su corazón acumula iniquidad para sí
  alternative_spanish_readings:
  - su corazón reúne maldad para sí
  - su corazón amontona mal para sí
  rationale: 'Se conserva la antropología bíblica del «corazón» como centro interior de intención, pensamiento y voluntad. No se suaviza el juicio moral del texto: el interior del enemigo almacena iniquidad antes de expresarla públicamente.'
  doctrine_reference: Antropología bíblica del corazón en el AT
- issue: Imagen espacial de לַחוּץ
  english_pob_reading: to the street / outside
  chosen_spanish_reading: afuera
  alternative_spanish_readings:
  - a la calle
  - al exterior
  - fuera
  rationale: El punto teológico-literario es el contraste entre interior y exterior, no una calle específica. «Afuera» conserva el alcance público del dicho sin añadir un lugar no exigido por el hebreo.
  doctrine_reference: Contexto poético y semántica del espacio público
translation_notes:
  revision_awareness: Se siguió de cerca el pasaje fuente hebreo y el audit trail inglés. No hubo revisiones aplicadas en el pass más reciente; el acuerdo de revisión fue alto. La presente redacción preserva la repetición verbal y el contraste interior/exterior sin introducir una imagen más específica que el hebreo no exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «corazón» para לִבּוֹ por consistencia con la antropología bíblica del AT.
  - «Afuera» conserva la fuerza espacial del hebreo sin depender de una calle concreta.
  - Se evita traducir mecánicamente desde el inglés «to the street»; el español sigue el valor fuente de «afuera/exterior».
