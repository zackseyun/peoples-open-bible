  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tu herencia» y «tu muerte» son adecuados. «Distribuye» conserva bien el matiz práctico/legal de διάδος. El ajuste propuesto afecta solo a naturalidad y precisión sintáctica del arranque temporal.
