translation:
  language: es
  text: 'Y le dijo a Jeroboam[a]: «Toma para ti diez pedazos, porque así dice Yahvé, el Dios de Israel: “Mira, estoy rasgando el reino de la mano de Salomón, y te daré diez tribus”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez pedazos rasgados». El sustantivo hebreo se refiere a fragmentos producidos por un desgarro, en consonancia con el gesto simbólico de Ahías con el manto.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: Toma para ti
  alternatives_spanish:
  - Toma
  - Toma para ti
  lexicon: HALOT
  rationale: קַח es un imperativo directo de ‘tomar’; לְךָ añade una matiz reflexivo/personal. ‘Toma para ti’ conserva ese valor sin sonar forzado en español.
- source_word: קְרָעִים
  english_pob_choice: pieces
  chosen_spanish: pedazos
  alternatives_spanish:
  - pedazos
  - partes
  - trozos
  lexicon: HALOT
  rationale: El sustantivo deriva de קרע, ‘rasgar/romper’. ‘Pedazos’ comunica bien en español la idea de fragmentos producidos por un desgarro y mantiene la referencia al acto simbólico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma auditada y transparente. ‘Yahvé’ sigue el estándar del proyecto y evita la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: 'La construcción constructa se vierte de forma natural y directa: identifica a Yahvé como el Dios pactal de Israel.'
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Mira, estoy
  alternatives_spanish:
  - Mira, estoy
  - He aquí, estoy
  lexicon: HALOT
  rationale: La partícula deíctica pide una llamada de atención con presencia inmediata. ‘Mira’ conserva la vivacidad sin depender de un arcaísmo.
- source_word: קֹרֵעַ
  english_pob_choice: tearing
  chosen_spanish: arrancando
  alternatives_spanish:
  - rasgando
  - arrancando
  lexicon: HALOT
  rationale: El participio expresa acción vívida e inminente. En este contexto político, ‘arrancando’ comunica el despojo del reino con fuerza idiomática y conserva la imagen de separación violenta.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino
  lexicon: HALOT
  rationale: ‘Reino’ es el equivalente directo y suficiente para la entidad política designada por el hebreo.
- source_word: מִיַּד שְׁלֹמֹה
  english_pob_choice: out of the hand of Solomon
  chosen_spanish: de la mano de Salomón
  alternatives_spanish:
  - de la mano de Salomón
  - de Salomón
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de ‘mano’ para expresar posesión y poder. En español, ‘de la mano de’ resulta natural y mantiene el matiz político de despojo.
- source_word: וְנָתַתִּי לְךָ
  english_pob_choice: and I will give you
  chosen_spanish: y te daré
  alternatives_spanish:
  - y te daré
  - y te lo daré
  lexicon: HALOT
  rationale: La forma verbal futura con objeto indirecto se vierte de manera idiomática en español, sin añadir elementos no presentes en el hebreo.
- source_word: עֲשָׂרָה הַשְּׁבָטִים
  english_pob_choice: ten tribes
  chosen_spanish: diez tribus
  alternatives_spanish:
  - diez tribus
  - las diez tribus
  lexicon: HALOT
  rationale: Con numerales, el español normalmente omite el artículo. ‘Diez tribus’ reproduce bien la referencia a las unidades tribales prometidas.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se mantiene la decisión doctrinal del POB de representar el Tetragrámaton con el nombre propio de Dios, no con una sustitución titulada. En español, ‘Yahvé’ es la forma estándar del proyecto y es claramente reconocible para la audiencia bíblica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del participio קֹרֵעַ en el anuncio profético
  english_pob_reading: I am tearing
  chosen_spanish_reading: estoy arrancando
  alternative_spanish_readings:
  - estoy rasgando
  - voy a arrancar
  rationale: El hebreo presenta una acción vívida e inminente. ‘Estoy arrancando’ preserva el aspecto progresivo y el efecto de despojo divino del reino, sin convertirlo en un futuro meramente abstracto.
  doctrine_reference: Doctrina de la profecía narrativa y del despojo judicial del reino
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo masorético y toma en cuenta el archivo inglés POB: conserva el nombre divino como Yahvé/Yahweh, mantiene la metáfora de la ‘mano’ para expresar poder/posesión, y refleja el valor profético vivo del participio con una construcción progresiva natural en español. Se evitó una traducción demasiado literal de ‘pieces’ para no perder la conexión con el acto simbólico de desgarrar.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma consistente del nombre divino en todo el texto.
  - Se conserva el registro profético solemne pero natural en español.
  - ‘Toma para ti’ y ‘de la mano de’ mantienen la transparencia semítica sin sonar rígidos.
  - La nota al pie está anclada en ‘pedazos’ para preservar la alternativa lexical documentada.
