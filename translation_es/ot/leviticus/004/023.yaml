translation:
  language: es
  text: o si se le da a conocer su pecado, el que ha cometido[a], entonces traerá como su ofrenda un cabrito macho sin defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más formal: «si se le da a conocer su pecado que ha cometido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: HALOT
  rationale: Conserva la conjunción disyuntiva simple del caso legal. Aquí ‘o’ es natural en español y no requiere la forma eufónica ‘u’.
- source_word: הוֹדַע אֵלָיו
  english_pob_choice: is made known to him
  chosen_spanish: se le da a conocer
  alternatives_spanish:
  - se le informa
  - llega a saberlo
  lexicon: HALOT
  rationale: 'Mantiene la fuerza pasiva/causativa-passiva del hebreo: la conciencia del pecado le llega desde fuera o por reconocimiento oficial, no solo un descubrimiento interno.'
- source_word: חַטָּאתוֹ
  english_pob_choice: the sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - el pecado
  - su ofensa
  lexicon: HALOT
  rationale: En este contexto, חטאת se refiere al acto pecaminoso, no a la ofrenda. El posesivo ‘su’ está implícito por el contexto y ayuda a preservar la referencia personal sin forzar la lectura de ‘ofrenda’.
- source_word: אֲשֶׁר חָטָא בָּהּ
  english_pob_choice: that he has committed
  chosen_spanish: que ha cometido
  alternatives_spanish:
  - en que pecó
  - que cometió
  lexicon: HALOT
  rationale: La cláusula relativa identifica el pecado concreto. ‘Ha cometido’ es idiomático en español y reproduce la concreción verbal del hebreo sin sobrecargar la preposición instrumental/local implícita en בָּהּ.
- source_word: וְהֵבִיא
  english_pob_choice: then he shall bring
  chosen_spanish: entonces traerá
  alternatives_spanish:
  - y traerá
  - deberá traer
  lexicon: HALOT
  rationale: El waw consecutivo en este material jurídico expresa consecuencia normativa. ‘Entonces traerá’ conserva el valor prescriptivo de la respuesta ritual.
- source_word: קָרְבָּנוֹ
  english_pob_choice: as his offering
  chosen_spanish: como su ofrenda
  alternatives_spanish:
  - su ofrenda
  - como sacrificio
  lexicon: HALOT
  rationale: ‘Ofrenda’ expresa adecuadamente קרבן como don presentado a Dios; ‘como su ofrenda’ reproduce la relación sintáctica del hebreo con naturalidad en español.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de cabras
  - un cabrío
  lexicon: HALOT
  rationale: La combinación denota un macho de la especie caprina. ‘Macho cabrío’ es claro, natural y preserva el valor zoológico y sacrificial sin diluir la especificidad.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: macho
  alternatives_spanish:
  - varón
  lexicon: HALOT
  rationale: El hebreo especifica el sexo del animal; en español, ‘macho’ es el correlato normal para ganado/animales y evita antropomorfismo.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: El idioma sacrificial español usa ‘sin defecto’ para el animal apto para la ofrenda. Conserva la idea de integridad física requerida por el texto.
theological_decisions:
- issue: Referencia de חַטָּאת en esta cláusula
  english_pob_reading: sin/offense, not sin offering
  chosen_spanish_reading: pecado/ofensa, no ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - sacrificio por el pecado
  rationale: La relativa ‘que ha cometido’ muestra que el referente es el acto pecaminoso. La ofrenda aparece aparte en קָרְבָּנוֹ; traducir aquí ‘ofrenda por el pecado’ mezclaría dos referentes que el hebreo distingue.
  doctrine_reference: Levítico 4:23; cf. el uso distinto de חטאת y קרבן en el versículo
- issue: Valor normativo de וְהֵבִיא en contexto legal
  english_pob_reading: then he shall bring
  chosen_spanish_reading: entonces traerá
  alternative_spanish_readings:
  - y traerá
  - deberá traer
  rationale: El hebreo legal formula una respuesta obligatoria al conocimiento del pecado. ‘Entonces traerá’ comunica el carácter consecuente y prescriptivo sin añadir una obligación ajena al flujo del texto.
  doctrine_reference: Levítico 4:23-24, formulación casuística del rito expiatorio
translation_notes:
  revision_awareness: La revisión inglesa más reciente permaneció sin cambios y recibió alta concordancia; por eso esta propuesta sigue de cerca el trazado semántico auditado, priorizando equivalencias naturales en español cuando el hebreo lo permite. No se introducen lecturas alternativas adicionales porque el registro base ya resuelve la ambigüedad principal de חַטָּאת como pecado, no como ofrenda.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Mantengo ‘ofrenda’ para קָרְבָּן y ‘macho cabrío’ para שְׂעִיר עִזִּים, en línea con la terminología sacrificial del proyecto.
  - Conservo una sintaxis breve y jurídica, acorde con el género casuístico de Levítico.
