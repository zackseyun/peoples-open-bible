  text: 먹고 마시는 자가 몸을 분별하지 못한다면, 그는 자신에 대한 심판을 먹고 마시는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「몸」 대신 「주의 몸」으로 읽는다.
    reason: textual_variant
  - marker: b
    text: 「몸을 분별한다」(διακρίνων τὸ σῶμα)는 주의 몸(성찬의 떡)을 분별하는 것일 수도 있고, 회중으로서의 그리스도의 몸을 분별하는 것일 수도 있으며, 두 의미가 함께 있을 수도 있다. 본문은 결정하지 않는다.
    reason: alternative_reading
