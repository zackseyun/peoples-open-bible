translation:
  language: es
  text: Porque Joab y todo Israel[a] habían permanecido allí seis meses, hasta que eliminó[b] a todo varón en Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Todo Israel» probablemente se refiere al contingente de guerra israelita con Joab, no necesariamente a cada individuo de la nación.
    reason: cultural_note
  - marker: b
    text: O «cortó de raíz», «destruyó» o «exterminó» a todo varón. El verbo hebreo significa literalmente «cortar» o «cortar de en medio», un modismo para eliminar una población.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una explicación o trasfondo de la afirmación anterior; en español, «Porque» conserva bien ese valor causal/explicativo sin forzar una paráfrasis.
- source_word: שֵׁשֶׁת חֳדָשִׁים
  english_pob_choice: six months
  chosen_spanish: seis meses
  alternatives_spanish:
  - por seis meses
  lexicon: HALOT
  rationale: La construcción numeral + sustantivo se vierte de forma natural como «seis meses». El sentido de duración queda bien expresado por el verbo «habían permanecido».
- source_word: יָשַׁב
  english_pob_choice: had remained
  chosen_spanish: habían permanecido
  alternatives_spanish:
  - habían estado
  - habían vivido
  - habían residido
  lexicon: HALOT
  rationale: En este contexto militar, «permanecer» comunica presencia continuada sin sugerir asentamiento estable o residencia fija.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene la fórmula colectiva del hebreo. «Todo Israel» reproduce la expresión bíblica y permite la misma posible referencia al contingente israelita con Joab, no necesariamente a cada individuo de la nación.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: HALOT
  rationale: «Hasta que» expresa de manera natural el límite temporal introducido por עַד.
- source_word: הִכְרִית
  english_pob_choice: he had cut off
  chosen_spanish: había exterminado
  alternatives_spanish:
  - había destruido
  - había eliminado
  - había cortado
  lexicon: HALOT
  rationale: Aunque el valor literal del verbo es «cortar», en español «exterminar» comunica la fuerza del idiomático hebreo en un contexto de eliminación total. Se conserva la severidad sin perder inteligibilidad.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todos los varones
  - todo macho
  lexicon: HALOT
  rationale: זָכָר denota «macho/varón»; en este contexto humano, «varón» evita ambigüedad biológica y conserva el matiz de sexo masculino sin importar una edad no especificada.
- source_word: בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: en Edom
  alternatives_spanish:
  - dentro de Edom
  - entre los edomitas
  lexicon: HALOT
  rationale: El prefijo ב es locativo aquí; «en Edom» refleja de forma directa el lugar de la acción.
theological_decisions:
- issue: Alcance de «todo Israel»
  english_pob_reading: ‘All Israel’ likely refers to the Israelite fighting force with Joab, not necessarily every individual in the nation.
  chosen_spanish_reading: «Todo Israel» se mantiene como expresión colectiva, probablemente referida al contingente de guerra con Joab, no a cada israelita individual.
  alternative_spanish_readings:
  - «todo el pueblo de Israel»
  - «los israelitas con Joab»
  rationale: La traducción conserva la ambigüedad histórica y colectiva del hebreo, tal como la nota inglesa la documenta, sin resolverla de manera excesiva en el texto principal.
  doctrine_reference: Nota cultural-histórica, no doctrinal
- issue: Verbo de eliminación total
  english_pob_reading: The Hebrew verb literally means 'cut off,' an idiom for eliminating a population.
  chosen_spanish_reading: Se vierte con «exterminado» en el texto principal, manteniendo en nota el valor literal de «cortar».
  alternative_spanish_readings:
  - «cortado»
  - «destruido»
  - «eliminado»
  rationale: El español necesita un verbo natural que exprese la eliminación total. La nota preserva la tensión con el hebreo literal para que el lector vea la base idiomática del término.
  doctrine_reference: Nota lexical con impacto interpretativo
translation_notes:
  revision_awareness: El texto coincide con el sentido general del registro inglés auditado y con el control de calidad más reciente, que no requirió cambios. La única decisión principal para el español fue cómo equilibrar la literalidad del verbo hebreo con una formulación natural en español; se optó por un equivalente fuerte en el texto y una nota que conserva el valor literal. También se mantuvo la ambigüedad histórica de «todo Israel» tal como está documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Israel» como nombre colectivo sin expandirlo innecesariamente.
  - La puntuación y el orden reflejan un español publicable y fiel al paralelismo temporal del hebreo.
