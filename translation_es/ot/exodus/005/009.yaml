translation:
  language: es
  text: Que el trabajo sea pesado para los hombres[a], para que trabajen en él y no presten atención a palabras de mentira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los varones». El hebreo dice literalmente «los hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְבַּד
  english_pob_choice: be heavy
  chosen_spanish: sea pesada
  alternatives_spanish:
  - sea gravosa
  - sea cargada
  - se haga pesada
  lexicon: HALOT
  rationale: El verbo qal imperfecto con הָעֲבֹדָה como sujeto expresa que la carga debe resultar pesada. En español, «sea pesada» conserva la imagen y la fuerza directiva sin introducir una causalidad no explícita en la forma hebrea.
- source_word: הָעֲבֹדָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - el labor
  - el servicio
  lexicon: HALOT
  rationale: En este contexto de servidumbre forzada, «obra» comunica la tarea concreta y el peso del trabajo impuesto. «Trabajo» sería igualmente posible, pero «obra» mantiene un matiz más amplio y formal, adecuado al registro.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: La preposición presenta la carga como algo que recae encima de los hombres. «Sobre» preserva mejor la imagen física del peso que «en».
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los trabajadores
  lexicon: HALOT
  rationale: El hebreo dice específicamente «los hombres». Se conserva esa referencia sin generalizarla a «los trabajadores», porque el texto marca el grupo masculino sometido al trabajo forzado.
- source_word: וְיַעֲשׂוּ בָהּ
  english_pob_choice: so that they may labor at it
  chosen_spanish: para que trabajen en ella
  alternatives_spanish:
  - para que hagan su tarea
  - para que laboren en ella
  - y trabajen en ella
  lexicon: HALOT
  rationale: וְיַעֲשׂוּ con el pronombre femenino singular remite a la obra. En español, «trabajen en ella» comunica la idea de ocuparse en la tarea sin sonar forzado; «laboren» es posible, pero menos natural.
- source_word: וְאַל יִשְׁעוּ
  english_pob_choice: and not pay attention to
  chosen_spanish: y no presten atención a
  alternatives_spanish:
  - y no atiendan a
  - y no hagan caso de
  - y no se fijen en
  lexicon: HALOT
  rationale: שעה puede significar mirar a, atender, prestar atención. «No presten atención a» expresa bien la negativa a dar consideración al mensaje, conservando la ambigüedad de orientación/atención que el hebreo permite.
- source_word: בְּדִבְרֵי שָׁקֶר
  english_pob_choice: lying words
  chosen_spanish: palabras de mentira
  alternatives_spanish:
  - palabras falsas
  - palabras engañosas
  - palabras de engaño
  lexicon: HALOT
  rationale: La construcción «palabras de mentira» mantiene el sustantivo hebreo דִּבְרֵי con el genitivo שָׁקֶר. Se evita suavizarlo a una expresión más interpretativa como «engañosas», para conservar el juicio despectivo de Faraón.
theological_decisions:
- issue: Tratamiento de la carga de trabajo como mandato opresivo
  english_pob_reading: Let the work be heavy on the men
  chosen_spanish_reading: Sea pesada la obra sobre los hombres
  alternative_spanish_readings:
  - Que la obra sea pesada sobre los hombres
  - Sea gravosa la obra sobre los hombres
  rationale: No hay una cuestión doctrinal propiamente dicha, pero sí una decisión de tono y fuerza imperativa. Se mantiene el carácter opresivo del mandato de Faraón sin atenuarlo con paráfrasis explicativas.
  doctrine_reference: Exodo 5:9; contexto narrativo de esclavitud e imposición de cargas
- issue: Valor de יִשְׁעוּ como atender o considerar el mensaje
  english_pob_reading: not pay attention to lying words
  chosen_spanish_reading: no presten atención a palabras de mentira
  alternative_spanish_readings:
  - no hagan caso de palabras falsas
  - no atiendan a palabras engañosas
  - no se fijen en palabras de mentira
  rationale: 'La expresión hebrea admite varias matizaciones: mirar hacia, atender, considerar. Se conserva una formulación abierta pero clara, sin decidir prematuramente entre ''creer'', ''obedecer'' o ''mirar'', porque el texto se limita al acto de prestar atención.'
  doctrine_reference: Exodo 5:9; nota lexical sobre שעה
- issue: Caracterización de las palabras como mentira
  english_pob_reading: lying words
  chosen_spanish_reading: palabras de mentira
  alternative_spanish_readings:
  - palabras falsas
  - palabras engañosas
  rationale: El hebreo שָׁקֶר denota falsedad/engaño. «Palabras de mentira» retiene el valor nominal del sustantivo y su tono despreciativo, sin borrar la tensión entre mentira objetiva y descalificación retórica.
  doctrine_reference: Exodo 5:9; nota lexical sobre שקר
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó «be made heavy» por «be heavy» para acercarse más al hebreo. La redacción española sigue esa dirección: no introduce un agente explícito y conserva el imperativo/ jussivo de carga pesada. El resto del contenido inglés se mantuvo estable, y la propuesta española sigue de cerca el texto hebreo con una sola nota léxica necesaria.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero este versículo no lo contiene.
  - Se usa «obra» para עֲבֹדָה en consonancia con el contexto de labor forzada; en otros contextos el proyecto puede preferir «trabajo» o «servicio».
  - Se conserva «los hombres» por fidelidad al hebreo, con nota alternativa para lectores que prefieran una generalización contextual.
  - «Palabras de mentira» preserva la estructura nominal del hebreo y el tono descalificador de Faraón.
