    issue: Marcador de nota reutilizado indebidamente en «horror[a]».
    rationale: Las instrucciones exigen que cada marcador sea único y que toda nota tenga anclaje correspondiente en el texto. Aquí la única nota explica «el bastón del pan», pero el mismo [a] se repite en «horror» sin una segunda nota distinta.
  - severity: low
