review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: saludo tranquilizador, exhortación a no temer, referencia al Dios de ellos y de su padre, don de un tesoro en los sacos, afirmación de que su plata llegó al mayordomo, y salida de Simeón hacia ellos. Sin embargo, faltó preservar una alternativa léxica documentada por el POB para ''silver/money'', y una nota de saludo fue añadida sin respaldo directo del rastro auditado inglés.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''Paz para ustedes'' y ''No teman'' funcionan bien. No obstante, ''costales'' es regional; ''sacos'' es más ampliamente neutro y sigue bien el contexto antiguo. ''Entonces les sacó a Simeón'' es entendible, pero ''Entonces sacó a Simeón y se lo llevó a ellos'' sería demasiado expansivo; basta con ''Entonces sacó a Simeón y lo llevó ante ellos'' o mejor, más cercano, ''Entonces sacó a Simeón para llevárselo'' no. La formulación más natural y fiel es ''Entonces sacó a Simeón y lo llevó ante ellos'' pero añade ''lo llevó''. Más ceñido y natural: ''Entonces sacó a Simeón para presentárselo'' añade interpretación. Por eso conviene ''Entonces sacó a Simeón ante ellos'' tampoco suena natural. La mejor reparación mínima es mantener ''Entonces les sacó a Simeón'', que en español bíblico es aceptable, mientras se corrigen los puntos más claros.'
  glossary_alignment: No hay conflicto con términos de proyecto mayores. 'Dios' está bien. No aparece Yahvé ni Mesías. La decisión de 'plata' conserva el hebreo concreto; debe añadirse la alternativa 'dinero' en nota, como en el POB inglés. 'Sacos' alinea mejor con la decisión auditada 'sacks' que el más regional 'costales'.
  issues:
  - severity: medium
    issue: Falta la nota alternativa para כַּסְפְּכֶם ('plata' / 'dinero').
    rationale: El POB inglés preserva explícitamente la alternativa 'Your money came to me' con explicación sobre 'silver' como dinero. El español debe conservar esa alternativa significativa.
  - severity: low
    issue: La nota [a] sobre 'Paz' no corresponde a la nota auditada inglesa y no preserva una alternativa léxica concreta.
    rationale: La nota inglesa [a] está ligada a מַטְמוֹן ('hidden treasure'), no a 'He said' ni a שָׁלוֹם. La nota española añadida sobre saludo/bendición no está mal como comentario, pero no forma parte del rastro que debe preservarse.
  - severity: low
    issue: '''Costales'' es comprensible pero regional.'
    rationale: Para español neutral latinoamericano y lectura eclesial amplia, 'sacos' es más universal y además se alinea mejor con la decisión inglesa 'sacks'.
  revised_spanish_text: 'Él dijo: «Paz para ustedes. No teman. Su Dios y el Dios de su padre les ha dado un tesoro[a] en sus sacos. Su plata[b] ha llegado a mí». Entonces les sacó a Simeón.'
  revised_footnotes:
