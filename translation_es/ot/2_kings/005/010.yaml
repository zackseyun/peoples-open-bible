    text: Or 'your flesh will return to you.' The Hebrew idiom expresses restoration to a former healthy condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be cleansed.' The verb can denote becoming clean or pure, with both physical and ritual overtones.
    reason: lexical_alternative
