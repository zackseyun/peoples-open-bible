id: 1TI.3.4
reference: 1 Timothy 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ ἰδίου οἴκου καλῶς προϊστάμενον, τέκνα ἔχοντα ἐν ὑποταγῇ μετὰ πάσης σεμνότητος·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/004.yaml
  text: managing his own household well[a], having his children in submission with all dignity[c][b];
  footnotes:
  - marker: a
    text: Or 'leading his own household well' or 'ruling his own house well.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having children who are submissive' or 'keeping his children under control.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'with all dignity' may describe the manner of the children's submission or the overall manner of his household management.
    reason: alternative_reading
translation:
  language: ko
  text: 자기 집을 잘 다스리고[a], 온전한 단정함 가운데서 자녀들을 순종하게 두는 사람[b][c]이어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기 집안을 잘 이끌고」 「자기 가정을 잘 통솔하고」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「순종하는 자녀들을 두는」 「자녀들을 다잡는」.
    reason: lexical_alternative
  - marker: c
    text: 「온전한 단정함 가운데서」는 자녀들의 순종의 방식을 가리킬 수도, 가정 관리 전체의 방식을 가리킬 수도 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ ἰδίου οἴκου καλῶς προϊστάμενον
  english_pob_choice: managing his own household well
  chosen_korean: 자기 집을 잘 다스리고
  alternatives_korean:
  - 자기 가정을 잘 이끌고
  - 자기 집안을 잘 관리하고
  lexicon: BDAG
  rationale: προΐστημι는 「앞에 서서 이끌다·다스리다·돌보다」의 폭. 5절(교회를 「돌보다」)과 어휘 호응을 위해 「다스리고」 사용.
- source_word: τέκνα ἔχοντα ἐν ὑποταγῇ
  english_pob_choice: having his children in submission
  chosen_korean: 자녀들을 순종하게 두는
  alternatives_korean:
  - 순종 가운데 자녀들을 두는
  - 자녀들로 하여금 순종하게 하는
  lexicon: BDAG
  rationale: ὑποταγή는 2:11과 일관 「순종」. ἔχω + ἐν의 상태 유지를 「~하게 두는」으로 옮긴다.
- source_word: μετὰ πάσης σεμνότητος
  english_pob_choice: with all dignity
  chosen_korean: 온전한 단정함 가운데서
  alternatives_korean:
  - 모든 위엄을 갖추고
  - 온갖 정중함과 함께
  lexicon: BDAG
  rationale: 2:2 σεμνότης와 일관 「단정함」. 수식 범위(자녀의 태도/가장의 태도)는 모호하게 둔다.
