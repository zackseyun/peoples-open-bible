revisions:
- from: No trabajarán para el vacío[a], ni darán a luz para la calamidad, porque son descendencia de los bendecidos por Yahvé, y sus descendientes con ellos.
  to: No trabajarán en vano, ni darán a luz para la calamidad[a], porque ellos son la descendencia de los bendecidos por Yahvé, y sus descendientes con ellos.
  rationale: Se reemplaza «para el vacío» por «en vano» para lograr una equivalencia española natural y fiel al sentido de labor inútil de לָרִיק. Se conserva «calamidad» con nota por las alternativas léxicas documentadas para בֶּהָלָה. Se añade «ellos» para reflejar con más claridad el pronombre enfático הֵמָּה sin volver la frase artificiosa. No se requieren cambios doctrinales; «Yahvé» permanece correcto.
