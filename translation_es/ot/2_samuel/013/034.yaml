translation:
  language: es
  text: Pero Absalón huyó[a]. Y el joven que estaba vigilando[b] alzó los ojos[c] y vio, y he aquí que muchas personas venían por el camino detrás de él[d], desde el lado de la montaña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escapó». El verbo hebreo puede expresar huida o escape; se eligió «huyó» por su fuerza narrativa y su naturalidad en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el centinela» o «el vigilante». El hebreo combina la idea de un joven/ayudante con la de vigilar; se preservan ambos rasgos sin fijar un cargo más técnico de lo que exige el texto.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «alzó sus ojos», un modismo que significa que miró hacia arriba o levantó la vista.'
    reason: lexical_alternative
  - marker: d
    text: 'La frase hebrea es condensada y algo ambigua: también puede entenderse como «desde el camino detrás de él, desde la ladera de la montaña».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - fue huyendo
  lexicon: HALOT
  rationale: ברח expresa huida o escape. En español, 'huyó' comunica bien la acción narrativa con naturalidad y sin perder fuerza. 'Escapó' sería posible, pero puede sonar más interpretativo; 'fue huyendo' es más perifrástico de lo necesario.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: convención onomástica española
  rationale: Se conserva el nombre propio en transliteración habitual del español bíblico. 'Absalón' es la forma más reconocible y natural para lectores de español.
- source_word: הַנַּעַר הַצֹּפֶה
  english_pob_choice: the young man who was watching
  chosen_spanish: el joven que estaba vigilando
  alternatives_spanish:
  - el muchacho que estaba vigilando
  - el centinela
  - el joven vigilante
  lexicon: HALOT
  rationale: נַעַר + צֹפֶה combina 'joven/ayudante' con la idea de vigilar o hacer de atalaya. 'El joven que estaba vigilando' conserva ambos elementos sin sobreespecificar un cargo formal. 'Centinela' o 'vigilante' son posibles, pero estrechan la referencia más de lo que exige el hebreo.
- source_word: וַיִּשָּׂא ... אֶת עֵינוֹ
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - miró hacia arriba
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. 'Alzó los ojos' conserva el color del original y es natural en español bíblico; 'miró hacia arriba' suena más explicativo que idiomático.
- source_word: וַיַּרְא וְהִנֵּה
  english_pob_choice: saw, and behold
  chosen_spanish: vio, y he aquí
  alternatives_spanish:
  - vio, y he aquí que
  - vio, y mira
  lexicon: HALOT
  rationale: '''He aquí'' reproduce bien la función discursiva de הִנֵּה, marcando sorpresa o atención inmediata. Se mantiene la cadencia narrativa sin calcar de manera pesada.'
- source_word: עַם רַב
  english_pob_choice: many people
  chosen_spanish: mucha gente
  alternatives_spanish:
  - mucha gente
  - un gran pueblo
  - una gran multitud
  lexicon: HALOT
  rationale: עַם puede referirse a un conjunto de personas; con רַב, la idea es de cantidad. 'Mucha gente' es natural en español y evita sugerir un matiz institucional o ceremonioso no explícito en el hebreo.
- source_word: הֹלְכִים
  english_pob_choice: were coming
  chosen_spanish: venía
  alternatives_spanish:
  - iban
  - estaban viniendo
  - se acercaban
  lexicon: HALOT
  rationale: Desde la perspectiva del vigilante, el grupo se aproxima. 'Venía' en plural impersonal/ colectivo se adapta bien al español narrativo y refleja el sentido de movimiento hacia el observador.
- source_word: מִדֶּרֶךְ אַחֲרָיו
  english_pob_choice: by the road behind him
  chosen_spanish: por el camino detrás de él
  alternatives_spanish:
  - desde el camino detrás de él
  - por la ruta detrás de él
  - por el camino tras él
  lexicon: HALOT
  rationale: La relación espacial es compacta y algo ambigua en hebreo. 'Por el camino detrás de él' conserva la cercanía al texto y deja abierta la referencia exacta del 'él', como hace el hebreo.
- source_word: מִצַּד הָהָר
  english_pob_choice: from the side of the mountain
  chosen_spanish: desde el lado de la montaña
  alternatives_spanish:
  - desde la ladera del monte
  - desde el costado de la montaña
  lexicon: HALOT
  rationale: צַד es 'lado' y הָר puede ser 'monte/montaña'. 'Desde el lado de la montaña' es fiel y comprensible; 'ladera' sería más idiomático pero algo más interpretativo.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto hebreo y la auditoría inglesa; no se registraron revisiones sustantivas en la pasada más reciente. La versión española conserva la fuerza narrativa de la huida, el modismo de 'alzó los ojos' y la ambigüedad espacial de la cola final sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usó 'Absalón' como forma española estándar del nombre propio.
  - Se prefirió un registro bíblico moderno y digno, evitando calcos excesivamente rígidos en las expresiones idiomáticas.
