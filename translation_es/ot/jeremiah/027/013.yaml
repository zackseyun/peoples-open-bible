review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo, la tríada de juicio y el uso de Yahvé. Sin embargo, la decisión principal sobre תָמוּתוּ ... אַתָּה וְעַמֶּךָ no es fiel al sentido suavizado y documentado en la auditoría POB: el hebreo cambia de singular a plural para dirigirse al rey junto con su pueblo, y en español ''morirás tú y tu pueblo'' suena gramaticalmente discordante y sugiere singular real para ambos. La traducción debe acomodar el sentido como ''morirán tú y tu pueblo'' o mejor una formulación natural equivalente. También falta preservar en nota la alternativa léxica de דֶּבֶר (''plaga'') que sí mantiene el POB inglés.'
  spanish_quality_summary: 'La redacción es clara y digna en general, pero ''morirás tú y tu pueblo'' resulta poco natural y puede distraer al lector. El resto del versículo fluye bien: ''por la espada, por el hambre y por la peste'' y ''que no servirá al rey de Babilonia'' son legibles y adecuados. ''Como Yahvé ha hablado acerca de la nación'' es aceptable, aunque ''ha dicho sobre/con respecto a'' también sería posible; no requiere cambio.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; גּוֹי → ''nación''; דֶּבֶר → ''peste'' es aceptable en español actual. No obstante, la nota existente sobre ''[a]'' no corresponde a una alternativa preservada por el POB inglés y desvía la atención de la verdadera dificultad; conviene reemplazarla por la alternativa léxica ''plaga'' para ''peste''.'
  issues:
  - severity: high
    issue: Concordancia y sentido en 'morirás tú y tu pueblo'
    rationale: El hebreo usa verbo plural con pronombre singular explícito para dirigirse al rey junto con su pueblo. El POB inglés ya lo suaviza como 'you and your people die'. En español, 'morirás tú y tu pueblo' no preserva bien ese sentido colectivo y suena incorrecto; debe repararse a una formulación natural como 'morirán tú y tu pueblo'.
  - severity: medium
    issue: La nota [a] no preserva la alternativa relevante del POB auditado
    rationale: La nota inglesa documenta la alternativa 'plague' para דֶּבֶר. La nota española actual trata la oscilación singular/plural, pero esa cuestión debe resolverse en el texto, no en nota. Debe sustituirse por una nota léxica sobre 'peste/plaga'.
  revised_spanish_text: ¿Por qué morirán tú y tu pueblo por la espada, por el hambre y por la peste[a], como Yahvé ha hablado acerca de la nación que no servirá al rey de Babilonia?
  revised_footnotes:
  - marker: a
    text: O 'plaga'. El término hebreo דֶּבֶר comúnmente denota una enfermedad epidémica en contextos de juicio.
    reason: lexical_alternative
  revision_rationale: Se corrige la formulación verbal para reflejar de manera natural en español que la advertencia se dirige al rey junto con su pueblo, preservando el sentido del plural hebreo sin la discordancia de 'morirás tú y tu pueblo'. También se reemplaza la nota por la alternativa léxica documentada en la auditoría inglesa para דֶּבֶר, manteniendo la práctica de notas del proyecto. No se requieren cambios doctrinales ni adjudicación adicional.
