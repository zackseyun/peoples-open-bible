    rationale: Puede resultar algo confusa, porque «armadura» en español suele entenderse como conjunto; basta con indicar que el hebreo puede referirse más ampliamente a armas o equipo militar.
  revised_spanish_text: Pusieron su armadura[a] en la casa de las Ashtarot[b], y fijaron[c] su cuerpo a la muralla de Bet-seán.
