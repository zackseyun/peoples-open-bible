translation:
  language: es
  text: Desde el cielo hiciste oír el juicio[a][b]; la tierra[c] temió y quedó quieta[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Desde los cielos hiciste oír el juicio" o "Desde el cielo hiciste que se oyera el juicio".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "hiciste que se oyera el juicio".'
    reason: lexical_alternative
  - marker: c
    text: '"La tierra" también puede traducirse "el país", pero el contraste entre cielo y tierra favorece aquí el sentido más amplio.'
    reason: lexical_alternative
  - marker: d
    text: 'O: "estuvo quieta" o "estuvo en calma".'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁמַיִם
  english_pob_choice: From heaven
  chosen_spanish: Desde los cielos
  alternatives_spanish:
  - Desde el cielo
  - Desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa מִן con valor de origen, así que conviene expresar procedencia. Se eligió el plural 'los cielos' porque el español permite conservar mejor el matiz poético del original sin volverlo en una fórmula demasiado doctrinal o eclesiástica; además, mantiene el contraste cielo-tierra que POB destaca.
- source_word: הִשְׁמַעְתָּ
  english_pob_choice: you made ... heard
  chosen_spanish: hiciste oír
  alternatives_spanish:
  - hiciste escuchar
  - hiciste que se oyera
  - proclamaste
  lexicon: HALOT
  rationale: 'El hifil de שׁמע es causativo: no solo ''hablaste'', sino que causaste que algo fuera oído. ''Hiciste oír'' preserva esa fuerza causativa de manera natural en español y evita una paráfrasis más interpretativa como ''proclamaste''.'
- source_word: דִּין
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la justicia
  - la sentencia
  - la decisión judicial
  lexicon: HALOT
  rationale: '''Juicio'' es el equivalente más natural en español para la decisión o acto judicial divino en este contexto. Mantiene el énfasis en una acción de Dios que se hace oír, no solo en una cualidad abstracta.'
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el país
  lexicon: HALOT
  rationale: Aunque 'la tierra' puede ser más local en otros pasajes, aquí el paralelo cósmico con 'los cielos' favorece un alcance amplio. En español, 'la tierra' comunica bien ese contraste sin sonar forzado.
- source_word: יָרְאָה
  english_pob_choice: feared
  chosen_spanish: tuvo temor
  alternatives_spanish:
  - temió
  - se llenó de temor
  - estuvo atemorizada
  lexicon: HALOT
  rationale: '''Tuvo temor'' conserva el sentido básico de ירא sin introducir una interpretación demasiado intensa o demasiado débil. En poesía española resulta más fluido que un simple ''temió'' y mantiene el tono solemne.'
- source_word: וְשָׁקָטָה
  english_pob_choice: and was quiet
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - estuvo quieta
  - quedó en silencio
  - estuvo en calma
  lexicon: HALOT
  rationale: '''Shāqāṭ'' expresa quietud, reposo, cesación de agitación. ''Guardó silencio'' reproduce en español la idea de cese y quietud con una imagen natural y poética; se prefiere sobre ''estuvo quieta'' para evitar que la frase suene demasiado plana.'
theological_decisions:
- issue: Alcance de אֶרֶץ en paralelo con los cielos
  english_pob_reading: the earth as the world in general
  chosen_spanish_reading: la tierra como el ámbito creado en contraste con los cielos
  alternative_spanish_readings:
  - la tierra como el mundo en general
  - la tierra como la nación o el país
  rationale: La oposición 'cielos/tierra' en la poesía hebrea suele ser cósmica. El español 'la tierra' conserva ese contraste sin restringirlo a un territorio nacional ni añadir una precisión que el hebreo no exige.
  doctrine_reference: Psalm 76:9; poesía hebrea de contraste cielo-tierra
- issue: Valor del verbo final שׁקט en relación con temor
  english_pob_reading: the earth feared and was quiet
  chosen_spanish_reading: la tierra tuvo temor y guardó silencio
  alternative_spanish_readings:
  - la tierra temió y estuvo quieta
  - la tierra tuvo temor y quedó en calma
  rationale: El hebreo presenta una secuencia breve de respuesta a la revelación del juicio divino. 'Guardó silencio' comunica la cesación y la calma resultante, sin perder el contraste con el temor precedente.
  doctrine_reference: Psalm 76:9; respuesta de la creación ante el juicio divino
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto principal con marcadores visibles. La redacción mantiene la fuerza causativa de הִשְׁמַעְתָּ y el paralelismo poético cielo-tierra sin recurrir a un lenguaje eclesiástico opaco.
  spanish_consistency_notes:
  - Se usó 'cielos' en plural para mantener el registro poético y el contraste con 'la tierra'.
  - '''Juicio'' conserva el valor forense del hebreo דִּין.'
  - '''Guardó silencio'' se eligió por naturalidad poética, aunque ''estuvo quieta'' sigue siendo una alternativa válida.'
