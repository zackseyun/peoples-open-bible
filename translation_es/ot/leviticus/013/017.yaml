translation:
  language: es
  text: Y el sacerdote lo examinará, y he aquí, la mancha[a] se ha vuelto blanca; entonces el sacerdote declarará limpia[b] la mancha; está limpia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la infección», «la lesión» o «la afección». El hebreo negaʿ se refiere al área visible afectada bajo inspección sacerdotal, sin especificar un diagnóstico médico moderno.
    reason: lexical_alternative
  - marker: b
    text: O «declarará limpia la mancha». El sacerdote emite un veredicto ritual de pureza; no se dice que cure la condición.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «limpio es él/ello». El pronombre es masculino singular; el español expresa el veredicto con referencia a la mancha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  english_pob_choice: examines it
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En contexto de legislación de pureza, el verbo no expresa mera visión sino una inspección sacerdotal. «Examinará» preserva ese valor procedimental y suena natural en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-ritual
  - el ministro sacerdotal
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente claro y estándar en español para כֹּהֵן en Levítico. Mantiene la referencia al funcionario autorizado para inspeccionar y dictaminar.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y ved
  lexicon: HALOT
  rationale: «Y he aquí» conserva el marcador discursivo de atención y sorpresa/confirmación del resultado observado, con registro bíblico sobrio en español.
- source_word: נֶהְפַּךְ
  english_pob_choice: has turned
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha cambiado
  - ha pasado a ser
  lexicon: HALOT
  rationale: El nifal indica cambio de estado; «se ha vuelto» comunica bien el cambio de color sin perder la fuerza resultativa.
- source_word: הַנֶּגַע
  english_pob_choice: the diseased spot
  chosen_spanish: la mancha
  alternatives_spanish:
  - la lesión
  - la afección
  - la plaga
  lexicon: HALOT
  rationale: Nֶגַע en este contexto designa la marca visible bajo inspección sacerdotal. «Mancha» es una opción más neutral y natural en español, y evita introducir una diagnosis médica moderna que el hebreo no especifica.
- source_word: לְלָבָן
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - de color blanco
  - al blanco
  lexicon: HALOT
  rationale: Color directo y transparente; el cambio a blanco es el dato observable que fundamenta el veredicto de pureza.
- source_word: וְטִהַר
  english_pob_choice: shall pronounce ... clean
  chosen_spanish: declarará limpia
  alternatives_spanish:
  - proclamará limpia
  - la juzgará limpia
  lexicon: HALOT
  rationale: En el marco ritual, el sacerdote no cura la lesión sino que emite un veredicto de pureza. «Declarará limpia» expresa con claridad esa función judicial/ritual, de acuerdo con la lectura auditada en inglés.
- source_word: טָהוֹר הוּא
  english_pob_choice: it is clean
  chosen_spanish: limpia es
  alternatives_spanish:
  - es limpia
  - está limpia
  lexicon: HALOT
  rationale: La cláusula hebrea es breve y enfática. «Limpia es» mantiene la formulación sentenciosa del veredicto y deja claro que el objeto del juicio ritual es la mancha/caso.
theological_decisions:
- issue: Función del sacerdote en la legislación de pureza
  english_pob_reading: The priest pronounces the spot clean rather than personally cleansing it.
  chosen_spanish_reading: El sacerdote declara limpia la mancha, en vez de limpiarla él mismo.
  alternative_spanish_readings:
  - El sacerdote limpia la mancha
  - El sacerdote la purifica
  rationale: El verbo טהר puede traducirse como «limpiar/purificar» o como «declarar limpio» según el contexto. Aquí, como en la lectura inglesa auditada, el sacerdote actúa como inspector y juez ritual, no como sanador. La formulación española evita atribuirle una acción no expresada por el texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia del pronombre final masculino singular
  english_pob_reading: 'Hebrew: ''clean is it/he.'' The pronoun is masculine singular; English renders the verdict with reference to the spot.'
  chosen_spanish_reading: «Limpia es» conserva el veredicto breve sin forzar un sujeto explícito.
  alternative_spanish_readings:
  - «Él es limpio»
  - «Es limpia la mancha»
  rationale: El hebreo final tiene pronombre masculino singular, lo cual puede señalar formalmente al ‘nגע’ o al caso inspeccionado. En español, mantener la brevedad del veredicto evita decidir demasiado explícitamente un antecedente que el hebreo deja en tensión, mientras el contexto sigue refiriéndolo a la mancha.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se tomó como base la última revisión inglesa que ajustó el orden y la capitalización para una formulación formal más natural. En español se mantuvo esa fluidez sin calcar el inglés, pero conservando el mismo flujo: inspección del sacerdote, observación del cambio de color, declaración ritual de pureza y veredicto final breve.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros pasajes del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «sacerdote» para כֹּהֵן por ser el término estable y transparente en español bíblico.
  - «Mancha» se eligió por claridad contextual; en notas queda abierta la gama léxica de נֶגַע.
  - Se preservó la distinción entre inspección y declaración ritual, conforme al audit trail en inglés.
