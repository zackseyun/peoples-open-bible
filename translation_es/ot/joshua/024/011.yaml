translation:
  language: es
  text: Entonces cruzaron el Jordán y llegaron a Jericó[a], y los hombres de Jericó combatieron contra ustedes —los amorreos, los perizitas, los cananeos, los hititas, los girgaseos, los heveos y los jebuseos— y yo los entregué en manos de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dueños de Jericó» o «los señores de Jericó». La expresión hebrea significa literalmente «amos/poseedores de Jericó» y puede referirse a los hombres de la ciudad en general o, más específicamente, a sus personajes principales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַבְרוּ
  english_pob_choice: you crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: HALOT
  rationale: עבר en este contexto describe el cruce del Jordán. «Cruzar» es natural en español y conserva el movimiento concreto del relato.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Como nombre propio bíblico, «el Jordán» es la forma más natural y fiel. Añadir «río» explicita, pero no es necesario.
- source_word: וַתָּבֹאוּ אֶל יְרִיחוֹ
  english_pob_choice: came to Jericho
  chosen_spanish: llegaron a Jericó
  alternatives_spanish:
  - vinieron a Jericó
  - entraron en Jericó
  lexicon: HALOT
  rationale: אֶל con בוא suele expresar llegada o acceso. «Llegaron a Jericó» evita sobredeterminar una entrada física que el hebreo no exige.
- source_word: וַיִּלָּחֲמוּ בָכֶם
  english_pob_choice: fought against you
  chosen_spanish: combatieron contra ustedes
  alternatives_spanish:
  - lucharon contra ustedes
  - pelearon contra ustedes
  lexicon: HALOT
  rationale: לחם con ב marca hostilidad. «Combatieron contra ustedes» es claro, digno y conserva el sentido adversativo.
- source_word: בַּעֲלֵי יְרִיחוֹ
  english_pob_choice: the men of Jericho
  chosen_spanish: los hombres de Jericó
  alternatives_spanish:
  - los dueños de Jericó
  - los señores de Jericó
  lexicon: HALOT
  rationale: Aunque בַּעֲלֵי literalmente puede sugerir «dueños/señores», el audit trail en inglés revisó la opción hacia «men of Jericho» por mayor precisión. En español, «los hombres de Jericó» refleja mejor la lectura colectiva sin cargar una jerarquía no garantizada por el texto.
- source_word: הָאֱמֹרִי וְהַפְּרִזִּי וְהַכְּנַעֲנִי וְהַחִתִּי וְהַגִּרְגָּשִׁי הַחִוִּי וְהַיְבוּסִי
  english_pob_choice: the Amorites, the Perizzites, the Canaanites, the Hittites, the Girgashites, the Hivites, and the Jebusites
  chosen_spanish: los amorreos, los perizitas, los cananeos, los hititas, los gergeseos, los heveos y los jebuseos
  alternatives_spanish:
  - los amorreos, los ferezeos, los cananeos, los hititas, los gergeseos, los heveos y los jebuseos
  lexicon: HALOT
  rationale: Los etnónimos hebreos se expresan en español como plurales de pueblos. «Perizitas» sigue la forma estándar de la tradición lexicográfica española; «gergeseos» mantiene la referencia al pueblo llamado Girgashites.
- source_word: וָאֶתֵּן אוֹתָם בְּיֶדְכֶם
  english_pob_choice: I gave them into your hand
  chosen_spanish: yo los entregué en manos de ustedes
  alternatives_spanish:
  - los di en sus manos
  - los puse en manos de ustedes
  lexicon: HALOT
  rationale: נתן + ביד es un modismo de entrega/poder. «Entregué en manos de ustedes» preserva la imagen bíblica y la atribución directa a Yahvé sin sonar forzado en español.
theological_decisions:
- issue: Atribución divina de la victoria
  english_pob_reading: 'The verse explicitly attributes victory to God: ''I gave them into your hand.'''
  chosen_spanish_reading: 'El verso mantiene la atribución directa a Dios: «yo los entregué en manos de ustedes».'
  alternative_spanish_readings:
  - los dejé caer en su poder
  - los puse bajo su dominio
  rationale: Conviene conservar el sujeto en primera persona divina y el modismo de entrega, porque el texto no habla solo de permiso providencial sino de una acción atribuida directamente a Yahvé.
  doctrine_reference: Soberanía divina en la historia; lenguaje de conquista en el AT
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditable, que corrigió la antigua opción «leaders of Jericho» por «men of Jericho» por mayor precisión lexical. El español adopta esa lectura y evita sobrerrepresentar una jerarquía no explícita en el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo subyacente lo exige; aquí el verso está en discurso divino, pero no nombra explícitamente el tetragrámaton, así que no fue necesario añadirlo.
  - Se mantuvo el trato directo en segunda persona plural («ustedes») como equivalente funcional del hebreo.
  - Los nombres de pueblos se presentaron en plural español para conservar el valor colectivo del texto.
  - «Entregué en manos de ustedes» preserva el idiomatismo bíblico sin reemplazarlo por una paráfrasis abstracta.
