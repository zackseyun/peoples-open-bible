base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/001/017.yaml
  text: They imported from Egypt a chariot for six hundred shekels of silver[a], and a horse for one hundred fifty[c][b]; and so they exported them to all the kings of the Hittites and the kings of Aram.
  footnotes:
  - marker: a
    text: Or, more literally, 'They brought up and brought out from Egypt.' The Hebrew uses ordinary motion verbs in a trade context; 'imported'/'exported' renders the commercial sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'by their hand,' an idiom meaning 'through them' or 'through their agents.'
    reason: lexical_alternative
