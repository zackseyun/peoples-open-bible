revisions:
- from: Entonces tomarás[a] de sus manos y las quemarás en el altar, sobre el holocausto, como aroma agradable delante de Yahvé. Es una ofrenda encendida[b] para Yahvé.
  to: Entonces los tomarás de sus manos y los quemarás en el altar, sobre el holocausto, como aroma agradable delante de Yahvé. Es una ofrenda hecha por fuego[a] para Yahvé.
  rationale: Se añadió el objeto directo explícito «los» para reflejar fielmente אֹתָם y producir una oración española completa. Se eliminó la nota innecesaria sobre «de sus manos» porque ese sentido ya debe estar en el texto principal. Se cambió «ofrenda encendida» por «ofrenda hecha por fuego» para alinearse mejor con אִשֶּׁה y con la decisión lexical final del POB en inglés, conservando «ofrenda de fuego» como alternativa en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual del hebreo: tomar de sus manos, quemar sobre el altar y sobre el holocausto, como aroma agradable delante de Yahvé. También preserva correctamente el nombre divino como «Yahvé». Sin embargo, omite el pronombre objeto «them» después de «tomarás», lo que en español deja incompleta la acción, y la nota [a] intenta suplir algo que debe ir en el texto principal. Además, «ofrenda encendida» no refleja con suficiente precisión el cultismo אִשֶּׁה, especialmente dado que el rastro auditado en inglés fue revisado a «offering made by fire».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Entonces tomarás de sus manos» suena elíptico e impropio porque falta el objeto directo explícito. «Las quemarás» funciona si se recupera ese antecedente. «Sobre el holocausto» es aceptable, aunque «encima del holocausto» haría más explícita la superposición; no es necesario cambiarlo. «Ofrenda encendida» suena menos natural y menos exacto que «ofrenda hecha por fuego».
  glossary_alignment: 'Alineación buena con «Yahvé» para יְהוָה. No hay conflicto con otros términos del glosario. La principal desviación terminológica está en אִשֶּׁה: el proyecto inglés auditado terminó en «offering made by fire», por lo que el español debe reflejar explícitamente el componente de fuego en vez de una formulación más libre como «ofrenda encendida».'
  issues:
  - severity: high
    issue: Falta el objeto directo después de «tomarás»
    rationale: וְלָקַחְתָּ אֹתָם מִיָּדָם exige «los tomarás de sus manos» o equivalente. El texto actual omite «a ellos/los», dejando incompleta la sintaxis y perdiendo el referente explícito del hebreo.
  - severity: medium
    issue: La nota [a] compensa indebidamente una omisión del texto principal
    rationale: «De sus manos» no es una alternativa secundaria sino parte del sentido principal. La nota no debe suplir información que pertenece al texto bíblico traducido.
  - severity: medium
    issue: «Ofrenda encendida» no representa con suficiente fidelidad אִשֶּׁה
    rationale: Aunque comprensible, no es la opción más precisa ni la más apoyada por el rastro auditado. «Ofrenda hecha por fuego» preserva mejor el valor cultual tradicional y coincide con la revisión inglesa final.
  revised_spanish_text: Entonces los tomarás de sus manos y los quemarás en el altar, sobre el holocausto, como aroma agradable delante de Yahvé. Es una ofrenda hecha por fuego[a] para Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «ofrenda de fuego».'
    reason: lexical_alternative
  revision_rationale: Se añadió el objeto directo explícito «los» para reflejar fielmente אֹתָם y producir una oración española completa. Se eliminó la nota innecesaria sobre «de sus manos» porque ese sentido ya debe estar en el texto principal. Se cambió «ofrenda encendida» por «ofrenda hecha por fuego» para alinearse mejor con אִשֶּׁה y con la decisión lexical final del POB en inglés, conservando «ofrenda de fuego» como alternativa en nota.
