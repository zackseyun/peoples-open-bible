lexical_decisions:
- source_word: דָּרַךְ
  english_pob_choice: bent
  chosen_spanish: tensó
  alternatives_spanish:
  - dobló
  - armó
  - estiró
  lexicon: HALOT
  rationale: En contexto con 'arco', el verbo describe prepararlo para disparar. En español, 'tensó' transmite de modo natural la acción física de poner el arco bajo tensión, conservando la imagen original mejor que un calco literal.
- source_word: קַשְׁתּוֹ
  english_pob_choice: his bow
  chosen_spanish: su arco
  alternatives_spanish:
  - su arco de guerra
  - su arco
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se refleja con 'su'. 'Arco' es el equivalente directo y suficiente en español; no hay motivo para añadir especificación militar que el hebreo no exige.
- source_word: וַיַּצִּיבֵנִי
  english_pob_choice: and set me up
  chosen_spanish: y me puso
  alternatives_spanish:
  - y me colocó
  - y me estableció
  - y me situó
  lexicon: HALOT
  rationale: יצב implica poner, colocar o fijar. 'Me puso' es breve y fiel; el contexto hostil permite entender que fui colocado de manera intencional como objetivo, sin forzar una expresión idiomática menos natural en español.
- source_word: כַּמַּטָּרָא
  english_pob_choice: as a target
  chosen_spanish: como blanco
  alternatives_spanish:
  - como target
  - como diana
  - como objetivo
  lexicon: HALOT
  rationale: La partícula comparativa כ pide una comparación explícita. 'Blanco' expresa bien la idea de meta o objetivo de tiro y mantiene la imagen bélica; 'diana' suena más moderno o específico del tiro deportivo.
- source_word: לַחֵץ
  english_pob_choice: for the arrow
  chosen_spanish: para la flecha
  alternatives_spanish:
  - para el flechazo
  - para una flecha
  - de flecha
  lexicon: HALOT
  rationale: El singular con ל puede indicar relación o propósito. En español, 'para la flecha' conserva el paralelismo y la singularidad del hebreo, sin introducir plural ni alterar la imagen.
translation_notes:
  revision_awareness: 'El texto concuerda con el audit trail inglés y con la evidencia hebrea: el verbo de preparar el arco se vierte de manera idiomática como ''tensó'', y la imagen de objetivo se conserva con ''blanco''. No se documentaron revisiones posteriores que alteren la lectura.'
  spanish_consistency_notes:
  - Se mantiene 'arco' y 'flecha' de manera consistente con el campo semántico de combate a distancia.
  - '''Blanco'' se usa en sentido de objetivo, no racial ni cromático; el pie de nota evita ambigüedad.'
  - El tono es sobrio y publicable, sin depender de formulaciones tradicionales no requeridas por el hebreo.
