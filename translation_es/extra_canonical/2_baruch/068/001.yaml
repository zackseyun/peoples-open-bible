translation:
  language: es
  text: 'Y las duodécimas aguas brillantes que viste—esta es la palabra:'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܡ̈ܝܐ ܢܗܝܪ̈ܐ
  english_pob_choice: bright waters
  chosen_spanish: aguas brillantes
  alternatives_spanish:
  - aguas radiantes
  - aguas claras
  lexicon: Payne Smith
  rationale: Mantiene el adjetivo unido al sustantivo y conserva la imagen simbólica de las aguas contrastadas por su cualidad luminosa.
- source_word: ܬܘܠܬܝܢ / duodécimas
  english_pob_choice: twelfth
  chosen_spanish: duodécimas
  alternatives_spanish:
  - doceavas
  - la duodécima
  lexicon: Uso contextual del ordinal en español
  rationale: El ordinal modifica a 'aguas' en una enumeración visionaria; 'duodécimas' preserva la referencia ordinal sin convertirla en una paráfrasis más libre.
- source_word: ܗܕܐ ܗܝ ܡܠܬܐ
  english_pob_choice: this is the word
  chosen_spanish: esta es la palabra
  alternatives_spanish:
  - ésta es la palabra
  - éste es el sentido
  - esta es la interpretación
  lexicon: Payne Smith
  rationale: La fórmula siríaca introduce la explicación del símbolo. 'Palabra' conserva la lectura establecida por el audit trail y evita sustituirla por una glosa interpretativa no exigida por el texto.
theological_decisions:
- issue: Función de la fórmula interpretativa
  english_pob_reading: this is the word
  chosen_spanish_reading: esta es la palabra
  alternative_spanish_readings:
  - esta es la interpretación
  - este es el sentido
  rationale: El siríaco usa una fórmula de identificación/exégesis, no una expansión doctrinal. En español conviene mantener la formulación breve y abierta, como en el registro inglés revisado, para no cerrar el alcance semántico del término.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail, que corrigió la antigua fórmula identificativa 'these are they' a 'this is the word'. La traducción española refleja esa corrección y mantiene el adjetivo 'brillantes' unido a 'aguas'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones no presentes, porque el verso no contiene el nombre divino.
  - Se mantuvo un estilo sobrio y oracional, acorde con una sección interpretativa de visión apocalíptica.
  - '''Palabra'' se conserva como traducción de la fórmula de interpretación, no como el Logos joánico ni como un título técnico adicional.'
