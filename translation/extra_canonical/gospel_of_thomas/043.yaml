translation:
  text: 'His disciples said to him[1], "Who are you, that you say these things to
    us?"


    "From what I say to you, you do not know who I am. But you have become like the
    Jews, for they love the tree but hate its fruit[2], and they love the fruit but
    hate the tree."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:41:16Z'
  footnotes:
  - marker: '1'
    text: The negative present tense ⲛ̄ⲧⲉⲧⲛ̄ⲉⲓⲙⲉ ⲁⲛ can be read as a statement ('you
      do not know') or a rhetorical question ('do you not know?'). Both fit the context
      of Jesus rebuking their lack of understanding.
    reason: textual_variant
  - marker: '2'
    text: 'The Coptic text places ''they love'' and ''they hate'' side by side without
      a conjunction (asyndeton: ⲥⲉⲙⲉ ⲙ̄ⲡϣⲏⲛ ⲥⲉⲙⲟⲥⲧⲉ ⲙ̄ⲡⲉϥⲕⲁⲣⲡⲟⲥ), emphasizing the
      contradiction. ''But'' has been supplied in English for clarity.'
    reason: register_note
lexical_decisions:
- source_word: ⲉⲓⲙⲉ
  chosen: know
  rationale: Coptic 'ⲉⲓⲙⲉ' means 'to know' or 'to understand'. In the context of recognizing
    identity ('who I am'), 'know' is the most natural English equivalent.
  lexicon: Crum 77a
- source_word: ϣⲱⲡⲉ
  chosen: become
  rationale: The perfect tense 'ⲁⲧⲉⲧⲛ̄ϣⲱⲡⲉ' indicates a change of state, 'you have
    become'.
  lexicon: Crum 584b
- source_word: ϣⲏⲛ
  chosen: tree
  rationale: Standard Coptic term for 'tree'.
  lexicon: Crum 571a
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  rationale: Standard Coptic term for 'hate', contrasting directly with 'ⲙⲉ' (love).
  lexicon: Crum 183a
theological_decisions:
- issue: Statement vs. Question in Jesus's reply
  chosen_reading: Statement ('you do not know who I am')
  rationale: While often translated as a question, reading it as a declarative statement
    formally aligns with the Coptic syntax and flows naturally into the subsequent
    contrast ('But you have become...').
drafter_notes: 'This saying echoes the Synoptic tradition regarding trees and their
  fruit (e.g., Matthew 12:33, Luke 6:43) but introduces a uniquely Thomasine paradox:
  the separation of the tree from its fruit, representing the disciples'' failure
  to connect Jesus''s words (the fruit) with his identity (the tree). The translation
  preserves the sharp, declarative tone of the Coptic.'
