translation:
  language: es
  text: En cuanto a ti, irás a tus padres[a] en paz; serás sepultado a una buena vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tus antepasados». El hebreo dice literalmente «a tus padres», un modismo para morir y unirse a las generaciones previas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: As for you
  chosen_spanish: En cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: El pronombre independiente con la conjunción introduce un giro enfático o de tópico. «En cuanto a ti» reproduce mejor ese contraste discursivo en español que un simple «y tú».
- source_word: תָּב֥וֹא
  english_pob_choice: you will go
  chosen_spanish: irás
  alternatives_spanish:
  - vendrás
  lexicon: HALOT
  rationale: En esta fórmula idiomática de muerte, el movimiento hacia «tus padres» se expresa naturalmente en español con «irás», que conserva el valor direccional sin sonar forzado.
- source_word: אֶל אֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  lexicon: HALOT
  rationale: Se conserva el hebraísmo familiar del texto literal. «Padres» mantiene la imagen heredada del original; «antepasados» explicita el sentido idiomático, pero pierde la forma del hebreo.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - en bienestar
  lexicon: HALOT
  rationale: «En paz» es la equivalencia natural de שָׁלוֹם en una fórmula funeraria y mantiene tanto la paz como la idea de ausencia de violencia o juicio abrupto.
- source_word: תִּקָּבֵר
  english_pob_choice: you will be buried
  chosen_spanish: serás sepultado
  alternatives_spanish:
  - serás enterrado
  lexicon: HALOT
  rationale: El nifal de קבר pide voz pasiva en español. «Sepultado» conserva dignidad y precisión; «enterrado» es posible, pero menos formal.
- source_word: בְּשֵׂיבָה טוֹבָה
  english_pob_choice: at a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - en una buena ancianidad
  - en avanzada edad y con bienestar
  lexicon: HALOT
  rationale: La expresión hebrea describe vejez avanzada con valoración positiva. «En buena vejez» conserva la estructura y el matiz favorable sin añadir una paráfrasis excesiva.
theological_decisions:
- issue: Sentido de «irás a tus padres»
  english_pob_reading: An idiom for Abram's death and joining prior generations, without specifying a detailed doctrine of the afterlife beyond the text.
  chosen_spanish_reading: Un giro idiomático para la muerte de Abram y su reunión con la generación anterior, sin definir más allá del texto la condición postmortem.
  alternative_spanish_readings:
  - Una referencia concreta al entierro con los antepasados
  - Una afirmación más fuerte de comunión consciente con los antepasados después de la muerte
  rationale: La expresión no debe reducirse solo al lugar del entierro, ni ampliarse a una doctrina detallada del estado intermedio. La traducción conserva la tensión del hebreo y evita resolver lo que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje mantiene el acuerdo alto del cotejo más reciente y la formulación debe permanecer estable salvo ajustes de idioma español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se conserva «padres» como reflejo del hebraísmo, con nota para la alternativa idiomática «antepasados».
  - Se usa «sepultado» para mantener registro digno y pasivo acorde con el hebreo.
  - «En buena vejez» conserva la estructura breve del original sin convertirla en una paráfrasis amplia.
