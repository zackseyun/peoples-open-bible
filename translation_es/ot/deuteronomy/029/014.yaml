translation:
  language: es
  text: sino con los que hoy están aquí con nosotros, de pie ante Yahvé nuestro Dios, y con los que no están aquí con nosotros hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con quienes no están aquí con nosotros hoy». El pasaje puede referirse a israelitas ausentes de la asamblea, a generaciones futuras, o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: El hebreo introduce una continuación contrastiva tras la negación de que el pacto fue solo con los presentes inmediatos. En español, «sino» comunica mejor ese contraste restrictivo que un simple causal.
- source_word: אֶת אֲשֶׁר
  english_pob_choice: with whoever
  chosen_spanish: con los que
  alternatives_spanish:
  - con quien
  - con cualquiera que
  lexicon: HALOT
  rationale: La construcción hebrea marca a las personas incluidas en la relación pactal. En español, el plural distributivo «los que» conserva la referencia a personas y resulta natural en una formulación inclusiva colectiva.
- source_word: יֶשְׁנוֹ
  english_pob_choice: is
  chosen_spanish: están
  alternatives_spanish:
  - es
  - se encuentra
  lexicon: HALOT
  rationale: Con פֹּה, el sentido es de presencia/existencia. En español, «están» expresa de manera natural la presencia física en la asamblea sin añadir interpretación excesiva.
- source_word: פֹּה עִמָּנוּ
  english_pob_choice: here with us
  chosen_spanish: aquí con nosotros
  alternatives_spanish:
  - aquí entre nosotros
  - aquí en medio de nosotros
  lexicon: HALOT
  rationale: La preposición עִם conserva la relación de compañía; «aquí con nosotros» mantiene la presencia compartida en un registro claro y bíblico sin calcar el inglés.
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: en pie
  alternatives_spanish:
  - de pie
  - estando de pie
  lexicon: HALOT
  rationale: El participio concreto se traduce literalmente. «En pie» es una expresión natural en español y preserva la imagen corporal de estar de pie delante de Dios.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente moderno más directo y mantiene la repetición enfática del hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» expresa bien el valor espacial y ceremonial del hebreo. Aquí ayuda además a enlazar con la postura de estar «en pie».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término editorial del proyecto para el nombre divino, en lugar de sustituirlo por «SEÑOR».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: La forma posesiva del hebreo se vierte de modo directo y litúrgicamente comprensible.
- source_word: וְאֵת אֲשֶׁר אֵינֶנּוּ
  english_pob_choice: and with whoever is not
  chosen_spanish: y con los que no están
  alternatives_spanish:
  - y con quienes no están
  - y con los que no se hallan
  lexicon: HALOT
  rationale: La segunda cláusula repite la primera estructura y debe conservar su amplitud. «Los que no están» mantiene la ausencia/presencia sin resolver si se trata de ausentes, descendientes futuros o ambos.
theological_decisions:
- issue: Alcance de los participantes del pacto en «los que no están aquí con nosotros hoy»
  english_pob_reading: Render the phrase straightforwardly without specifying whether it refers to absent Israelites, future generations, or both.
  chosen_spanish_reading: Traducir la frase de forma abierta, sin precisar a cuál grupo alude.
  alternative_spanish_readings:
  - los que están ausentes de esta asamblea
  - los que aún no han nacido
  - unos y otros
  rationale: El hebreo conserva deliberadamente la amplitud del referente. La traducción española debe preservar esa tensión interpretativa sin cerrar una opción no explicitada en el texto.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la auditoría inglesa; no hubo revisiones aplicadas en la última pasada, por lo que esta versión sigue de cerca la lectura estable del POB y preserva la ambigüedad del referente final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la repetición de «hoy» para reflejar el énfasis del hebreo.
  - Se traduce la presencia física con «aquí con nosotros» y «en pie delante de» para no diluir la imagen concreta del texto.
