  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: mantiene la estructura condicional y contrastiva («Pero si»), expresa adecuadamente שׁוּב con «se aparta» en sentido de volverse del pecado, conserva «todos sus pecados que ha cometido», y transmite con claridad la secuencia de guardar los estatutos y hacer lo justo/recto. La intensificación de חָיֹה יִחְיֶה queda bien representada por «ciertamente vivirá», y «no morirá» corresponde de manera directa a לֹא יָמוּת.'
