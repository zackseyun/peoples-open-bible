translation:
  language: es
  text: En vano herí a sus hijos[a]; no aceptaron corrección[b]. Su espada devoró a sus profetas, como un león destructor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “sus hijos varones”; el hebreo es literalmente masculino plural: “sus hijos”.'
    reason: lexical_alternative
  - marker: b
    text: O “disciplina” o “instrucción” para “corrección”; el hebreo musar puede abarcar tanto disciplina correctiva como enseñanza moral.
    reason: lexical_alternative
  - marker: c
    text: O “como un león rapaz” o “como un león que destruye”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשָּׁוְא
  english_pob_choice: In vain
  chosen_spanish: En vano
  alternatives_spanish:
  - Para nada
  - Sin resultado
  lexicon: HALOT
  rationale: El adverbio español “en vano” reproduce bien la idea de futilidad o falta de resultado del hebreo con לַשָּׁוְא, y es natural en español bíblico contemporáneo.
- source_word: הִכֵּ֣יתִי
  english_pob_choice: I struck
  chosen_spanish: herí
  alternatives_spanish:
  - golpeé
  - castigué
  - hice herir
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede significar “golpear/abatir”, en este contexto de juicio disciplinario “herí” comunica la acción divina sin forzar una lectura de muerte y mantiene la severidad del original.
- source_word: בְּנֵי/כֶם
  english_pob_choice: your sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus hijos/ustedes, hijos varones”. En español, “hijos” puede funcionar de modo genérico y natural en un contexto profético; se conserva la referencia filial sin endurecer innecesariamente el masculino.
- source_word: מוּסָר
  english_pob_choice: correction
  chosen_spanish: corrección
  alternatives_spanish:
  - disciplina
  - amonestación
  - instrucción
  lexicon: HALOT
  rationale: “Corrección” recoge bien el sentido remedial y disciplinario de מוּסָר, y encaja con el paralelismo con el golpe anterior.
- source_word: לֹא לָקָחוּ
  english_pob_choice: they accepted no
  chosen_spanish: no aceptaron
  alternatives_spanish:
  - no recibieron
  - no tomaron
  lexicon: HALOT
  rationale: En combinación con מוּסָר, לקח expresa recibir o aceptar. “No aceptaron” preserva la negativa voluntaria implícita en el contexto.
- source_word: אָכְלָה
  english_pob_choice: devoured
  chosen_spanish: devoró
  alternatives_spanish:
  - consumió
  - se tragó
  lexicon: HALOT
  rationale: El verbo de “comer” aplicado a la espada es metafórico; “devoró” mantiene la imagen violenta y personificada que el hebreo exige.
- source_word: חַרְבְּ/כֶם
  english_pob_choice: Your sword
  chosen_spanish: Vuestra espada
  alternatives_spanish:
  - su espada
  - la espada de ustedes
  lexicon: HALOT
  rationale: Se conserva el posesivo plural del hebreo. “Vuestra espada” comunica la responsabilidad de la violencia atribuida al propio pueblo.
- source_word: נְבִיאֵי/כֶם
  english_pob_choice: your prophets
  chosen_spanish: vuestros profetas
  alternatives_spanish:
  - sus profetas
  - los profetas de ustedes
  lexicon: HALOT
  rationale: 'El posesivo se mantiene para reflejar la ironía profética: la violencia del pueblo alcanza a “vuestros profetas”.'
- source_word: כְּ/אַרְיֵה מַשְׁחִית
  english_pob_choice: like a destroying lion
  chosen_spanish: como un león destructor
  alternatives_spanish:
  - como un león que destruye
  - como un león rapaz
  lexicon: HALOT
  rationale: “León destructor” conserva el participio hebreo מַשְׁחִית con una expresión breve y natural en español, sin introducir la carga interpretativa de “rapaz” o “rugiente”.
theological_decisions:
- issue: Naturaleza del castigo divino y valor de מוּסָר
  english_pob_reading: The striking was meant as corrective discipline, but it produced no repentance/acceptance of correction.
  chosen_spanish_reading: El golpe divino se entiende como corrección, pero no hubo aceptación de esa corrección.
  alternative_spanish_readings:
  - El castigo divino fue disciplina, pero no la recibieron.
  - Los hirió para instruirlos, pero no aprendieron.
  rationale: El contexto muestra un acto de juicio con intención correctiva; “corrección” mantiene abierta la tensión entre castigo y disciplina sin suavizarla.
  doctrine_reference: Jeremías 2:30; cf. Proverbios 3:11-12
- issue: Sentido de “sus hijos” frente a “vuestros hijos”
  english_pob_reading: The Hebrew literally says 'your sons,' though it can represent the people broadly.
  chosen_spanish_reading: “Sus hijos” funciona como equivalente natural del hebreo sin perder la referencia colectiva.
  alternative_spanish_readings:
  - “Sus hijos varones”
  - “Vuestros hijos”
  rationale: En español, el posesivo de segunda persona puede sonar menos directo según el flujo del verso; “sus hijos” mantiene la referencia al pueblo interpelado y permite lectura pública más fluida, mientras la nota conserva el dato literal del hebreo.
  doctrine_reference: Uso pronominal y semántica colectiva del hebreo bíblico
translation_notes:
  revision_awareness: La auditoría inglesa reciente indica alta conformidad y sin cambios aplicados en la última revisión; este borrador sigue esa lectura estable y conserva las alternativas principales en notas.
  spanish_consistency_notes:
  - Se mantiene una equivalencia óptima con estilo bíblico moderno y digno.
  - Se conserva la imagen bélica y la ironía profética sin suavizar el juicio.
  - Se usó “Yahvé” solo cuando el texto fuente lo exigiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se mantuvo el posesivo plural para reflejar la responsabilidad colectiva del pueblo.
  - Las notas distinguen entre alternativas léxicas reales del hebreo y opciones estilísticas del español.
