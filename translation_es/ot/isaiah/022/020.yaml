translation:
  language: es
  text: Y sucederá en aquel día que llamaré a mi siervo Eliaquim, hijo de Hilcías.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convocaré». El verbo hebreo puede implicar llamar a alguien para designación o encargo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula profética de futuro. «Sucederá» conserva el valor de evento futuro sin sonar arcaico; «acontecerá» también sería válido, pero menos natural en español bíblico moderno.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se expresa de forma natural en español con «en aquel día», manteniendo la referencia deíctica y el tono profético.
- source_word: וְקָרָאתִי
  english_pob_choice: I will call
  chosen_spanish: llamaré
  alternatives_spanish:
  - convocaré
  - llamaré para encargar
  lexicon: HALOT
  rationale: El verbo קרא con ל puede significar llamar o convocar para designación. «Llamaré» preserva la amplitud del hebreo sin introducir de antemano un matiz administrativo más específico.
- source_word: לְעַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aunque עבד puede abarcar esclavo/siervo, aquí el contexto cortesano y de comisión favorece «siervo» como término bíblico transparente en español. «Esclavo» sería demasiado fuerte para este pasaje y «servidor» suaviza demasiado el vínculo de pertenencia.
- source_word: אֶלְיָקִים
  english_pob_choice: Eliakim
  chosen_spanish: Eliaquim
  alternatives_spanish:
  - Eliacim
  lexicon: Standard transliteration adapted to Spanish biblical usage
  rationale: Se adopta la forma usual en español bíblico, «Eliaquim», que refleja adecuadamente el nombre hebreo y es legible para lectores de iglesia.
- source_word: בֶּן חִלְקִיָּהוּ
  english_pob_choice: son of Hilkiah
  chosen_spanish: hijo de Hilcías
  alternatives_spanish:
  - hijo de Hilquías
  - hijo de Helcías
  lexicon: Standard patronymic rendering
  rationale: «Hijo de Hilcías» reproduce el patronímico con una forma castellana reconocible y estable. La transliteración más literal sería menos natural para la lectura pública.
theological_decisions:
- issue: Alcance de עבד aplicado a Eliaquim
  english_pob_reading: my servant
  chosen_spanish_reading: mi siervo
  alternative_spanish_readings:
  - mi esclavo
  - mi servidor
  rationale: El texto presenta a Eliaquim como persona comisionada o designada por Yahvé, no como énfasis en servidumbre social. «Siervo» conserva la relación de dependencia y comisión sin borrar el trasfondo de pertenencia al llamante.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se corrigió la falta del marcador de nota en el texto de traducción y se mantuvo la misma decisión léxica central: «llamaré» con nota para el matiz alternativo «convocaré».'
  spanish_consistency_notes:
  - Se mantuvo el estilo profético breve y solemne.
  - Se evitó calcar «y será» por ser menos natural en español moderno.
  - Se usó «Yahvé» implícitamente solo cuando el texto fuente lo requiere; aquí el versículo no contiene el nombre divino explícito, pero sí habla de la acción de Yahvé en contexto inmediato.
  - La puntuación española coloca la nota al final de la cláusula nominal completa.
