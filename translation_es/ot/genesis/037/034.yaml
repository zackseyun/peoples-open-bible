translation:
  language: es
  text: Entonces Jacob rasgó[a] su ropa, se puso tela áspera de duelo alrededor de su cintura, y guardó luto por su hijo muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alrededor de sus lomos». El hebreo se refiere literalmente a la zona de la cintura/lomos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַע
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: HALOT
  rationale: En contexto de duelo, קרע describe el gesto concreto de rasgar la ropa como señal de aflicción. «Rasgó» conserva la acción física y suena natural en español bíblico contemporáneo.
- source_word: שִׂמְלֹתָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  lexicon: HALOT
  rationale: שִׂמְלָה es un término amplio para vestidura o ropa. «Vestidos» mantiene un registro bíblico claro sin reducirlo a una sola prenda; «ropa» es más general pero menos solemne.
- source_word: שַׂק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco
  - paño áspero
  lexicon: HALOT
  rationale: El término hebreo designa la prenda de duelo hecha de tela áspera. En español, «cilicio» comunica la función de penitencia/duelo en tradición bíblica; «saco» podría sonar demasiado genérico. Se conserva la realidad cultural de la prenda, aunque con un término español tradicional.
- source_word: בְּמָתְנָיו
  english_pob_choice: around his waist
  chosen_spanish: alrededor de la cintura
  alternatives_spanish:
  - alrededor de los lomos
  - en la cintura
  lexicon: HALOT
  rationale: מָתְנַיִם se refiere a la zona de los lomos/cintura. «Alrededor de la cintura» expresa la ubicación de forma natural en español moderno, sin perder el sentido corporal del hebreo.
- source_word: וַיִּתְאַבֵּל
  english_pob_choice: mourned
  chosen_spanish: guardó luto
  alternatives_spanish:
  - hizo duelo
  - se lamentó
  lexicon: HALOT
  rationale: El hitpael de אבל indica entrar en estado de duelo. «Guardó luto» comunica ese estado de aflicción ritual/social de manera idiomática en español; «hizo duelo» es posible pero menos usual.
- source_word: עַל בְּנוֹ
  english_pob_choice: for his son
  chosen_spanish: por su hijo
  alternatives_spanish:
  - sobre su hijo
  lexicon: HALOT
  rationale: La preposición עַל en lenguaje de duelo puede expresar motivo o referencia afectiva. «Por su hijo» es el equivalente español más natural y mantiene la relación del duelo con el hijo.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por muchos días
  lexicon: HALOT
  rationale: La expresión significa literalmente «muchos días». «Muchos días» reproduce la duración sin añadir una construcción adverbial innecesaria.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo sin revisiones registradas; se mantiene la escena de duelo con sus tres acciones sucesivas: rasgar la ropa, ceñirse cilicio y guardar luto por muchos días.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Cilicio» se usa aquí por su vigencia en español bíblico y por la fuerza cultural del término de duelo; no se emplea como sinónimo genérico de penitencia ascética fuera de contexto.
  - La nota al pie refleja la alternativa espacial del hebreo sin alterar el texto principal.
