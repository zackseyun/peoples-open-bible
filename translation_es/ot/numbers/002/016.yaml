    rationale: Aunque es formalmente cercana al participio pasivo hebreo, en español suena rígida y menos clara que «los censados» o «los registrados». Dado el contexto de enumeración tribal, «censados» preserva mejor el sentido.
  - severity: low
    issue: «para el campamento de» puede simplificarse a «del campamento de»
    rationale: La preposición hebrea expresa pertenencia/relación al campamento. En español, «del campamento de Rubén» suena más natural sin pérdida de sentido organizativo.
  - severity: low
    issue: La nota b usa comillas inglesas simples innecesarias
    rationale: 'Conviene normalizar la puntuación española: «Literalmente: “y en segundo ellos saldrán”».'
