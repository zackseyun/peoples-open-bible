translation:
  language: es
  text: ¡Levántate[a], ve a Nínive, la gran ciudad, y clama contra ella[b], porque su maldad ha subido ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ponte en pie!». El hebreo usa un imperativo abrupto de comisión.
    reason: lexical_alternative
  - marker: b
    text: O «acerca de ella». La expresión hebrea puede renderizarse más generalmente, pero en este contexto probablemente lleva sentido de anuncio de juicio contra Nínive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֠וּם
  english_pob_choice: Arise
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Alzate!
  - ¡Ponte en pie!
  lexicon: HALOT
  rationale: El imperativo abrupto de קום conserva mejor en español la fuerza profética con «¡Levántate!», que suena natural y solemne sin volverse arcaico.
- source_word: לֵ֧ךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: HALOT
  rationale: El imperativo básico de הלך se expresa con «ve», el equivalente más directo y natural en español en una comisión inmediata.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se rinde con «a», que es la forma más idiomática para movimiento hacia un destino.
- source_word: נִֽינְוֵ֛ה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  lexicon: nombre propio
  rationale: Nombre propio transliterado según la convención española usual, manteniendo identificación clara y lectura pública fluida.
- source_word: הָעִיר הַגְּדוֹלָה
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - esa gran ciudad
  lexicon: HALOT
  rationale: «Gran ciudad» conserva la valoración de prominencia y tamaño sin forzar una calca menos natural como «ciudad grande».
- source_word: וּקְרָא
  english_pob_choice: cry out
  chosen_spanish: clama
  alternatives_spanish:
  - proclama
  - grita
  lexicon: HALOT
  rationale: En contexto profético, קרא implica una proclamación audible y urgente; «clama» preserva ese tono mejor que «proclama» y evita una palabra demasiado técnica.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - acerca de ella
  - a ella
  lexicon: HALOT
  rationale: La construcción con על en este marco judicial/profético lleva fuerza adversativa; «contra ella» reproduce esa orientación denunciatoria.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la comisión; «porque» es la correspondencia causal más clara y natural en español.
- source_word: עָלְתָה
  english_pob_choice: has come up
  chosen_spanish: ha subido
  alternatives_spanish:
  - ha ascendido
  - ha llegado
  lexicon: HALOT
  rationale: El perfecto de עלה conserva la imagen vertical de algo que asciende hasta Dios; «ha subido» mantiene esa metáfora con claridad en español.
- source_word: רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  - su maldad
  lexicon: HALOT
  rationale: Aunque el inglés eligió «evil», en español «maldad» expresa con naturalidad la acusación moral. Se evita «calamidad» porque el contexto habla de culpa y denuncia, no de desastre.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: hasta mí
  alternatives_spanish:
  - delante de mí
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: La expresión hebrea describe algo que llega al ámbito de atención y juicio divinos. «Hasta mí» preserva el movimiento de ascenso previo y su cumplimiento en la esfera divina; en español suena más natural que «antes de mí» y mantiene la idea sin sobreexplicarla.
theological_decisions:
- issue: Fuerza adversativa de וּקְרָא עָלֶיהָ
  english_pob_reading: A proclamation of judgment against Nineveh
  chosen_spanish_reading: Un clamor profético contra Nínive
  alternative_spanish_readings:
  - Un anuncio acerca de Nínive
  - Un llamado a Nínive
  rationale: La combinación de קרא con על en un encargo profético, unida a la cláusula causal sobre la maldad de Nínive, favorece una lectura de denuncia/jucio. «Contra ella» conserva esa tensión y evita neutralizar la comisión.
  doctrine_reference: Mantener la fuerza judicial del texto sin suavizarla; no borrar la tensión lexical de על con קרא.
- issue: Sentido de לְפָנַי en relación con Dios
  english_pob_reading: before me
  chosen_spanish_reading: hasta mí
  alternative_spanish_readings:
  - ante mí
  - en mi presencia
  rationale: La frase no solo indica localización, sino que algo ha entrado en la esfera de conocimiento y juicio de Yahvé. «Hasta mí» conserva el movimiento metafórico de ascenso y deja intacta la implicación relacional/judicial.
  doctrine_reference: Respetar la imaginería hebrea sin convertirla en una explicación doctrinal explícita.
translation_notes:
  revision_awareness: Se siguió el contexto fuente hebreo y el rastro auditado en inglés; no hubo revisiones aplicadas en el pasaje base, y la versión española refleja la misma lectura principal con ajuste idiomático natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiera, aunque en este versículo aparece la primera persona divina implícita más que el tetragrámaton explícito.
  - Se mantiene «Nínive» como nombre propio estándar en español.
  - Se preserva la imaginería vertical de עלה con «ha subido» para no perder la metáfora hebrea.
  - Se evita suavizar la comisión profética con verbos demasiado neutrales como «decir» o «anunciar».
