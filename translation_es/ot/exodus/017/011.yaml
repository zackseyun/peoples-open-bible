translation:
  language: es
  text: Y cada vez que Moisés alzaba su mano[a], Israel prevalecía; y cada vez que la bajaba[b], prevalecía Amalec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando Moisés levantaba su mano ... cuando la bajaba». La construcción hebrea puede traducirse más formalmente con «cuando», pero el contexto sugiere acciones repetidas durante la batalla; por eso aquí se usa «cada vez que».'
    reason: lexical_alternative
  - marker: b
    text: «Bajaba» traduce un verbo que también puede significar «hacía descansar» o «ponía abajo». El contraste con «alzaba su mano» favorece el sentido idiomático «bajaba».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And whenever
  chosen_spanish: Y sucedía que
  alternatives_spanish:
  - Y acontecía que
  - Y era que
  lexicon: HALOT
  rationale: La construcción hebrea introduce una situación repetida durante la batalla, no un solo evento. En español, 'Y sucedía que' comunica bien ese marco iterativo sin sonar rígido ni perder el valor narrativo del hebreo.
- source_word: כַאֲשֶׁר
  english_pob_choice: whenever
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: HALOT
  rationale: El valor es reiterativo dentro del contexto, pero en español 'cuando' con el imperfecto narrativo siguiente expresa naturalmente esa repetición. 'Cada vez que' sería más explícito, pero algo más explicativo que el hebreo.
- source_word: יָרִים
  english_pob_choice: raised
  chosen_spanish: alzaba
  alternatives_spanish:
  - levantaba
  - alzaba en alto
  lexicon: HALOT
  rationale: El verbo hifil de רום significa elevar/levantar. 'Alzaba' mantiene el movimiento de elevar la mano y suena natural en español bíblico contemporáneo; además, el imperfecto refleja la acción repetida.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mano'. Se conserva esa imagen corporal en español, sin sustituirla por 'brazo'.
- source_word: וְגָבַר
  english_pob_choice: prevailed
  chosen_spanish: prevalecía
  alternatives_spanish:
  - era más fuerte
  - se imponía
  lexicon: HALOT
  rationale: גבר expresa ser fuerte o prevalecer. 'Prevalecía' reproduce bien el resultado de la acción en un contexto militar y mantiene el matiz de superioridad sin exagerar a una derrota total.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio estándar del pueblo/nación.
- source_word: יָנִיחַ
  english_pob_choice: let down
  chosen_spanish: la bajaba
  alternatives_spanish:
  - la dejaba caer
  - la dejaba descansar
  - la apoyaba
  lexicon: HALOT
  rationale: El hifil de נוח puede significar hacer descansar o bajar. En contraste directo con 'alzaba su mano', 'la bajaba' es la manera más clara y natural de expresar el movimiento opuesto en español, sin perder la relación semántica con el verbo hebreo.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: HALOT
  rationale: Se adopta la forma española habitual del nombre propio bíblico, 'Amalec', manteniendo la identificación histórica/étnica del texto.
theological_decisions:
- issue: Repetición aspectual en la batalla
  english_pob_reading: whenever / whenever ... prevailed
  chosen_spanish_reading: 'sucedería/ocurría repetidamente: ''Y sucedía que, cuando...''; ''cuando... prevalecía'''
  alternative_spanish_readings:
  - Y cuando Moisés alzaba su mano, Israel prevalecía; y cuando la bajaba, Amalec prevalecía.
  - Cada vez que Moisés alzaba su mano, Israel prevalecía; y cada vez que la bajaba, Amalec prevalecía.
  rationale: El hebreo presenta una condición repetida, no un hecho único. La redacción española debe dejar visible esa recurrencia sin forzar una explicación interpretativa. El imperfecto narrativo y 'sucedía que' preservan el patrón alternante de la escena.
  doctrine_reference: Observación literaria/aspectual del texto hebreo; sin implicación doctrinal directa
- issue: Referencia explícita a la 'mano'
  english_pob_reading: his hand ... his hand
  chosen_spanish_reading: su mano ... la bajaba
  alternative_spanish_readings:
  - su mano ... su mano la bajaba
  - su brazo ... lo bajaba
  rationale: Se mantiene la 'mano' porque es el término del hebreo. En la segunda cláusula, el pronombre 'la' evita repetir innecesariamente el sustantivo y mantiene la fluidez del español, sin cambiar el referente.
  doctrine_reference: Fidelidad semántica al antropomorfismo/gesto corporal del texto
translation_notes:
  revision_awareness: 'Coincide con el juicio de alta concordancia del control previo: no se requirieron cambios de sentido ni ajustes textuales mayores. Se mantiene la lectura iterativa, la imagen de la mano y el valor contrastivo entre alzar/bajar.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - Se conserva el nombre 'Moisés' y 'Israel' como formas estándar españolas.
  - '''Amalec'' se prefiere sobre ''Amalek'' por consistencia con el español bíblico y la inteligibilidad pública.'
  - La puntuación mantiene la alternancia paralela del hebreo con dos cláusulas coordinadas por 'y'.
