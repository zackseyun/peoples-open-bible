  glossary_alignment: No hay conflicto con terminología teológica mayor. El pasaje no contiene nombres divinos ni términos doctrinales sensibles del glosario. La revisión propuesta sigue la filosofía POB de preservar ambigüedad léxica y gramatical donde el hebreo la mantiene.
