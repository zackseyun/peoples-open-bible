translation:
  language: es
  text: A Absalón le nacieron tres hijos y una hija, y su nombre era Tamar. Ella era una mujer hermosa en apariencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: "Ella era muy hermosa". El hebreo dice literalmente: "una mujer hermosa en apariencia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּלְדוּ
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - le fueron nacidos
  lexicon: HALOT
  rationale: El nifal de ילד expresa aquí nacimiento pasivo/resultativo. En español, la construcción natural y fiel es 'le nacieron', que conserva la relación de parentaje sin sonar forzada.
- source_word: לְאַבְשָׁלוֹם
  english_pob_choice: to Absalom
  chosen_spanish: a Absalón
  alternatives_spanish:
  - para Absalón
  lexicon: HALOT
  rationale: 'La preposición ל con ילד marca destinatario/parentaje: los hijos nacen ''a'' Absalón, es decir, de él como padre. ''A Absalón'' es la forma más directa y natural en español.'
- source_word: שְׁלוֹשָׁה בָנִים
  english_pob_choice: Three sons
  chosen_spanish: tres hijos
  alternatives_spanish:
  - tres varones
  - tres hijos varones
  lexicon: HALOT
  rationale: בנים significa literalmente 'hijos/varones hijos'. En español, para un contexto genealógico, 'hijos' comunica adecuadamente el dato sin sobrecargar, y el número ya preserva la pluralidad masculina implícita. Se evita 'varones' por sonar más interpretativo en este contexto.
- source_word: וּבַת אַחַת
  english_pob_choice: and one daughter
  chosen_spanish: y una hija
  alternatives_spanish:
  - y una sola hija
  lexicon: HALOT
  rationale: La expresión numérica es directa; 'una hija' mantiene la sencillez y naturalidad del original.
- source_word: וּשְׁמָהּ תָּמָר
  english_pob_choice: and her name was Tamar
  chosen_spanish: y su nombre era Tamar
  alternatives_spanish:
  - y se llamaba Tamar
  - y el nombre de ella era Tamar
  lexicon: HALOT
  rationale: El sufijo posesivo femenino remite a la hija mencionada. 'Su nombre era Tamar' conserva la forma semítica sin forzar una pasiva innecesaria.
- source_word: הִיא הָיְתָה
  english_pob_choice: She was
  chosen_spanish: Ella era
  alternatives_spanish:
  - Y ella era
  - Era
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis leve, pero en español 'Ella era' lo refleja de manera natural y sobria.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una dama
  lexicon: HALOT
  rationale: אִשָּׁה denota una mujer adulta; 'mujer' es la equivalencia simple y exacta.
- source_word: יְפַת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosa de apariencia
  alternatives_spanish:
  - hermosa de aspecto
  - muy hermosa
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'hermosa de apariencia/aspecto'. 'Hermosa de apariencia' preserva la forma y la tensión lexical, aunque en español suena marcada; se mantiene para no diluir el rasgo descriptivo. Se evita convertirlo sin más en 'muy hermosa' en el texto principal.
theological_decisions:
- issue: Referencia implícita del nombre femenino y continuidad narrativa
  english_pob_reading: and her name was Tamar ... She was a woman beautiful in appearance
  chosen_spanish_reading: y su nombre era Tamar ... Ella era una mujer hermosa de apariencia
  alternative_spanish_readings:
  - y se llamaba Tamar ... Era muy hermosa
  - y su nombre era Tamar ... Era una mujer hermosa
  rationale: 'No hay decisión doctrinal de fondo, pero sí una cuestión de fidelidad narrativa: el pronombre ''ella'' debe referirse a la hija recién mencionada, no a Absalón. La redacción española mantiene esa referencia sin ambigüedad.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se incorporó el ajuste de revisión del inglés POB que prioriza un orden más natural sin perder la literalidad subyacente. En español se optó por una frase fluida ('A Absalón le nacieron tres hijos y una hija...') que conserva el contenido y la relación sintáctica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Absalón' como transliteración estable del nombre propio.
  - Se usa 'hijos' para בנים en sentido genealógico, evitando un calco innecesario de 'varones'.
  - Se preserva la nota alternativa sobre יְפַת מַרְאֶה porque el español también permite una lectura más idiomática ('muy hermosa').
  - El texto evita 'SEÑOR' u այլ terminología no pertinente; no hay términos divinos en el versículo.
