translation:
  language: es
  text: Entonces Eliacim, hijo de Hilcías, que estaba encargado de la casa real[a], salió a él[b], junto con Sebná, el escriba[c], y Joaj, hijo de Asaf, el registrador[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que estaba sobre la casa». Esta expresión designa a un alto funcionario encargado de la administración del palacio.
    reason: cultural_note
  - marker: b
    text: O «salió a su encuentro».
    reason: lexical_alternative
  - marker: c
    text: O «secretario» para «el escriba».
    reason: lexical_alternative
  - marker: d
    text: O «cronista» para «el registrador».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió hacia él
  - fue hacia él
  lexicon: HALOT
  rationale: El wayyiqtol de יצא expresa salida/movimiento hacia el interlocutor; en español, "salió" es la equivalencia directa y natural. Añadir "hacia él" conserva el destino explícito de אֵלָיו, como en la POB inglesa con "to him".
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo marca dirección. "Hacia él" transmite bien el movimiento narrativo sin sonar rígido; "a él" también sería viable, pero aquí se conserva mejor la idea de acercamiento.
- source_word: אֶלְיָקִים
  english_pob_choice: Eliakim
  chosen_spanish: Eliacim
  alternatives_spanish:
  - Eliakim
  lexicon: transliteración tradicional hispana
  rationale: Se conserva el nombre propio, adaptado a la forma habitual en español bíblico. La grafía con c refleja pronunciación más natural para lectores hispanohablantes, sin alterar la identidad del nombre.
- source_word: בֶּן חִלְקִיָּהוּ
  english_pob_choice: son of Hilkiah
  chosen_spanish: hijo de Hilcías
  alternatives_spanish:
  - hijo de Hilquías
  lexicon: construcción filiativa nominal
  rationale: La filiación hebrea se mantiene de forma formal. "Hilcías" es una forma ampliamente reconocible en español bíblico; "Hilquías" es una alternativa más cercana fonéticamente al hebreo.
- source_word: אֲשֶׁר עַל הַבָּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba al frente del palacio
  - que estaba sobre el palacio
  lexicon: HALOT
  rationale: La POB inglesa preserva la imagen literal "over the household" y nota que es un alto oficial de administración real. En español, "sobre la casa" conserva el giro hebreo; se evita reemplazarlo por "palacio" en el texto principal para no borrar la metáfora institucional documentada.
- source_word: וְשֶׁבְנָא הַסֹּפֵר
  english_pob_choice: along with Shebna the scribe
  chosen_spanish: junto con Sebná, el escriba
  alternatives_spanish:
  - y Sebná, el escriba
  - junto con Sebna, el secretario
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y el título administrativo. "Escriba" reproduce el valor lexical directo de סֹפֵר, como en la POB inglesa; "secretario" queda como alternativa contextual, pero no sustituye el término base sin necesidad.
- source_word: וְיוֹאָח בֶּן אָסָף הַמַּזְכִּיר
  english_pob_choice: Joah son of Asaph, the recorder
  chosen_spanish: Joaj, hijo de Asaf, el registrador
  alternatives_spanish:
  - Joah, hijo de Asaf, el cronista
  - Joah, hijo de Asaf, el secretario
  lexicon: HALOT
  rationale: Se conserva la filiación y el cargo oficial. "Registrador" expresa el oficio de מַזְכִּיר como funcionario que lleva registro y hace memoria ante el rey; es más preciso que "cronista" para esta corte, aunque esa alternativa existe en la nota inglesa.
translation_notes:
  revision_awareness: 'La fuente inglesa revisada quedó sin cambios (latest_revision_pass: unchanged; cross-check: high_agreement). La redacción española sigue de cerca el hebreo y la POB inglesa, conservando el orden narrativo, los nombres propios y los cargos oficiales, con solo ajustes naturales de estilo en español.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente griego de κύριος que requiera decisión adicional.
  - Se usa "escriba" para סֹפֵר y "registrador" para הַמַּזְכִּיר, respetando la distinción administrativa del hebreo.
  - '"Sobre la casa" conserva la metáfora institucional de הַבָּיִת y se aclara en nota su sentido cortesano.'
  - 'Los nombres propios se hispanizan de forma consistente cuando existe forma tradicional reconocible: Eliacim, Hilcías, Sebná, Joaj, Asaf.'
