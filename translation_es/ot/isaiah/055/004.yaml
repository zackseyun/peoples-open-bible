translation:
  language: es
  text: He aquí[a], lo he puesto por testigo a los pueblos[b][c], líder y comandante para los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo he dado por testigo a los pueblos».'
    reason: lexical_alternative
  - marker: b
    text: El «lo» probablemente se refiere a David o al representante davídico en este contexto; algunos entienden aquí una referencia mesiánica.
    reason: alternative_reading
  - marker: c
    text: 'O: «naciones» en lugar de «pueblos» para לְאֻמִּים.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - Mira
  lexicon: HALOT
  rationale: La partícula discursiva exige atención enfática. En español, «¡Mira!» conserva la fuerza exhortativa y profética sin sonar arcaico como «¡He aquí!».
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  - testigo que da testimonio
  lexicon: HALOT
  rationale: El sustantivo designa una persona que da testimonio; «testigo» reproduce mejor esa fuerza personal que «testimonio».
- source_word: לְאוּמִּים
  english_pob_choice: to the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - para los pueblos
  lexicon: HALOT
  rationale: «Pueblos» conserva el plural étnico de לְאוּמִּים y sigue la elección auditada de la POB inglesa, evitando reducirlo a una sola categoría nacional.
- source_word: נְתַתִּיו
  english_pob_choice: I have made him
  chosen_spanish: Lo he puesto
  alternatives_spanish:
  - Lo he hecho
  - Lo he dado
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «he dado», en español «poner por testigo» expresa con naturalidad la construcción de predicado nominal y mantiene la idea de nombramiento/constitución sin forzar un calco.
- source_word: נָגִיד
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - gobernante
  lexicon: HALOT
  rationale: «Jefe» comunica autoridad de forma breve y natural en español. «Líder» es posible, pero algo más moderno y menos preciso en registro bíblico; «príncipe» podría inducir una lectura demasiado monárquica.
- source_word: וּמְצַוֶּה
  english_pob_choice: and commander
  chosen_spanish: y comandante
  alternatives_spanish:
  - y el que manda
  - y gobernante
  lexicon: HALOT
  rationale: El participio de צוה denota uno que ordena/da mandatos. «Comandante» mantiene la idea de autoridad directiva en paralelo con «jefe».
theological_decisions:
- issue: Referente del pronombre masculino implícito/retomado en la cláusula
  english_pob_reading: Retain the pronoun 'him' without specifying the referent in translation.
  chosen_spanish_reading: Mantener el referente implícito en la forma verbal y no explicitar si se trata de David, del representante davídico o del Mesías.
  alternative_spanish_readings:
  - David
  - el rey davídico
  - el Mesías
  rationale: El contexto inmediato apunta a la promesa davídica del versículo anterior, pero el hebreo conserva la ambigüedad pronominal. La traducción española no debe resolver doctrinalmente esa tensión.
  doctrine_reference: Preservar la tensión interpretativa del contexto davídico/mesiánico.
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo WLC con alta concordancia con la auditoría inglesa; no hay revisiones aplicadas en el expediente más reciente, así que la redacción española se mantiene estable y auditable.
  spanish_consistency_notes:
  - Se usó «pueblos» de manera consistente para לְאֻמִּים, en línea con la decisión inglesa POB.
  - Se evitó «SEÑOR» y no aparece el Tetragrámaton en este versículo.
  - La relación entre «jefe» y «comandante» conserva el paralelismo hebreo de נָגִיד / מְצַוֶּה.
  - La ambigüedad del referente se preserva sin añadir nombres propios que el hebreo no explicita.
