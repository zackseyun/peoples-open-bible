translation:
  language: es
  text: Oré por ella en mi juventud[a], y hallé mucho conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Antes del templo pedí por ella, y hasta el final la buscaré». El testimonio hebreo, en cambio, lee: «Oré en mi juventud, y hallé mucho conocimiento».'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתְפַּלֵּל תְּפִלָּה
  english_pob_choice: I prayed
  chosen_spanish: Oré una oración
  alternatives_spanish:
  - Oré
  - Hice oración
  - Recé una oración
  lexicon: HALOT
  rationale: El hebreo usa un acusativo cognado; en español, «oré una oración» conserva esa intensificación sin volverse tan poco natural como una traducción más literal. Mantiene el valor verbal de la raíz y la duplicación enfática.
- source_word: בִּנְעֻרוֹתָי
  english_pob_choice: in my youth
  chosen_spanish: en mi juventud
  alternatives_spanish:
  - cuando era joven
  - en mis años mozos
  lexicon: HALOT
  rationale: La expresión temporal del hebreo se refiere al período de juventud. «En mi juventud» es claro, digno y fiel, y evita un tono demasiado coloquial.
- source_word: וְהַרְבֵּה
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran medida
  - abundantemente
  lexicon: HALOT
  rationale: Con «conocimiento», el español natural pide un cuantificador directo. «Mucho» refleja la abundancia indicada por el hebreo sin añadir paráfrasis.
- source_word: מָצָאתִי
  english_pob_choice: I found
  chosen_spanish: hallé
  alternatives_spanish:
  - encontré
  - obtuve
  lexicon: HALOT
  rationale: «Hallé» conserva el sentido básico de encontrar y suena bien en registro bíblico español sin caer en arcaísmo excesivo. Evita reinterpretar el verbo como adquisición abstracta.
- source_word: דֵעָה
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría
  lexicon: HALOT
  rationale: El hebreo apunta a conocimiento/entendimiento, no directamente a otra palabra distinta como «sabiduría». «Conocimiento» preserva mejor la correspondencia léxica; «sabiduría» se reservaría para el término explícito cuando el contexto lo exija.
- source_word: ἕως ἐσχάτων ἐκζητήσω αὐτήν
  english_pob_choice: to the end I will seek her
  chosen_spanish: hasta el final la buscaré
  alternatives_spanish:
  - hasta el fin la buscaré
  - la buscaré hasta el final
  lexicon: BDAG
  rationale: Aunque el hebreo conservado no expresa este miembro, el paralelo griego introduce una búsqueda perseverante de un referente femenino. En español, «la buscaré» mantiene la referencia femenina implícita y evita reemplazarla por «sabiduría» sin necesidad textual explícita en esta línea.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text retains the Hebrew statement about prayer in youth and finding much knowledge, while incorporating the Greek's explicit feminine object as 'for her' to make the referent to wisdom clear.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: oración en la juventud y hallazgo de mucho conocimiento; a la vez, el verbo final en femenino implícito del paralelo griego queda reflejado en la traducción del versículo como una búsqueda de ella en la nota.'
  alternative_spanish_readings:
  - Oré en mi juventud, y hallé mucho conocimiento.
  - Antes del templo pedí por ella, y hasta el final la buscaré.
  rationale: La evidencia hebrea es la primaria y debe permanecer visible en el cuerpo del texto. El griego, sin embargo, aporta una variante importante de tradición textual con una referencia femenina coherente con el discurso sapiencial. En español conviene no fusionar ambas líneas de modo que una borre a la otra; por eso se prioriza el hebreo y se documenta la divergencia en nota.
  doctrine_reference: 'PHILOSOPHY.md: el hebreo de Sirácides es primario cuando se conserva; el griego paralelo se usa como input real. DOCTRINE.md: preservar la tensión textual sin resolverla en exceso.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente sin cambios sustantivos; se mantiene la prioridad del hebreo con la variante griega preservada como lectura alternativa documentada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término de proyecto cuando el texto lo requiera; aquí no aparece.
  - «Conocimiento» se mantiene para דֵעָה, sin sustituirlo por «sabiduría» en el cuerpo del texto.
  - La nota de variante conserva la tensión entre el hebreo y el paralelo griego, en lugar de armonizarlos por completo.
