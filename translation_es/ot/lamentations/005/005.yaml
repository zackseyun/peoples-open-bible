revisions:
- from: Con el [a]cuello[b] nos persiguieron; nos agotamos[c]; no se nos concede[d] descanso.
  to: Nos persiguen hasta el cuello[a]; estamos agotados[b]; no se nos concede descanso.
  rationale: 'La revisión corrige tres problemas principales: 1) reemplaza «con el cuello» por «hasta el cuello», que en español comunica mejor la presión extrema y el acoso cercano sin sonar instrumental; 2) devuelve a la persecución una formulación no activa en español, más acorde con el pasivo hebreo y con el inglés POB; 3) sustituye «nos agotamos» por «estamos agotados», que refleja mejor el estado resultante de יָגַעְנוּ. También se consolidan las notas para evitar redundancia y se mantiene la cláusula final, que ya era fiel y natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del verso: persecución, cansancio y falta de descanso. Sin embargo, varias decisiones no preservan con suficiente fidelidad el hebreo ni el rastro auditado en inglés. «Con el cuello» no corresponde bien al modismo עַל צַוָּארֵינוּ, que expresa presión hostil ''sobre/en el cuello'' o idiomáticamente ''pisándonos los talones''; además, el hebreo y el inglés POB mantienen la pasiva/resultativa en «we are pursued», mientras que «nos persiguieron» introduce un agente tácito y un pasado activo no señalado. «Nos agotamos» también cambia el estado resultativo «we are weary» a una acción reflexiva.'
  spanish_quality_summary: El texto actual suena comprensible, pero «Con el cuello nos persiguieron» es poco natural y puede sugerir un instrumento corporal en vez de un acoso pegado al cuello. Una formulación más clara y fiel es «Nos persiguen hasta el cuello[a]» o similar, junto con «estamos agotados[b]». La cláusula final «no se nos concede descanso» es digna y bien formada.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Sí hay que alinear mejor las decisiones léxicas con el expediente inglés: conservar la imagen concreta del cuello, la pasividad de נִרְדָּפְנוּ y el sentido estativo/resultativo de יָגַעְנוּ. La nota del inglés sobre la alternativa más literal debe simplificarse en español sin crear notas redundantes separadas para עַל y צַוָּארֵינוּ.'
  issues:
  - severity: high
    issue: «Con el cuello» traduce inadecuadamente עַל צַוָּארֵינוּ
    rationale: La preposición «con» en español suele indicar instrumento o acompañamiento, no presión hostil dirigida al cuello. El hebreo y la nota inglesa apuntan a una imagen de enemigos encima de ellos, no a 'con el cuello'.
  - severity: high
    issue: «nos persiguieron» cambia la voz y el aspecto de נִרְדָּפְנוּ
    rationale: El hebreo es pasivo/resultativo ('fuimos/éramos perseguidos', 'somos perseguidos' en equivalencia óptima), y el inglés POB escogió «we are pursued». El pretérito activo español introduce un sujeto implícito y desplaza la perspectiva.
  - severity: medium
    issue: «nos agotamos» no reproduce bien יָגַעְנוּ
    rationale: La forma española suena reflexiva/ingresiva ('llegamos a agotarnos') más que estativa. El contexto favorece «estamos agotados» o «estamos cansados», en línea con «we are weary».
  - severity: medium
    issue: Exceso de notas separadas para una sola imagen hebrea
    rationale: Las notas a y b fragmentan innecesariamente la unidad «at our necks / on our necks». Basta una nota léxica sobre toda la expresión, como en el expediente inglés.
  revised_spanish_text: Nos persiguen hasta el cuello[a]; estamos agotados[b]; no se nos concede descanso.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «sobre nuestros cuellos somos perseguidos». El hebreo conserva una imagen vívida de enemigos que los acosan de muy cerca, con presión directa.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final también puede traducirse «no se nos da descanso» o «no se nos otorga descanso».
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres problemas principales: 1) reemplaza «con el cuello» por «hasta el cuello», que en español comunica mejor la presión extrema y el acoso cercano sin sonar instrumental; 2) devuelve a la persecución una formulación no activa en español, más acorde con el pasivo hebreo y con el inglés POB; 3) sustituye «nos agotamos» por «estamos agotados», que refleja mejor el estado resultante de יָגַעְנוּ. También se consolidan las notas para evitar redundancia y se mantiene la cláusula final, que ya era fiel y natural.'
