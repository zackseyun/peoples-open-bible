translation:
  language: es
  text: Tomarán parte de la sangre y la pondrán sobre los dos postes de la puerta y sobre el dintel de las casas en las que la comerán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'donde la comen'. El imperfecto hebreo puede traducirse con matiz de futuro en este contexto instructivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  english_pob_choice: And they shall take
  chosen_spanish: Tomarán
  alternatives_spanish:
  - Y tomarán
  - Y deberán tomar
  lexicon: HALOT
  rationale: El perfecto con valor directivo en esta instrucción ritual se vierte naturalmente al futuro simple en español. Se omite la conjunción inicial para mantener fluidez, sin perder el carácter mandativo del contexto.
- source_word: מִן הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: de la sangre
  alternatives_spanish:
  - algo de la sangre
  - parte de la sangre
  lexicon: HALOT
  rationale: El מִן es partitivo, pero en español la idea queda bien expresada con una simple construcción de origen/partición ('de la sangre'). Añadir 'algo de' sería más explícito, pero menos natural en este rito específico.
- source_word: וְנָתְנוּ
  english_pob_choice: and put
  chosen_spanish: la pondrán
  alternatives_spanish:
  - la colocarán
  - la aplicarán
  lexicon: HALOT
  rationale: En este contexto ritual, נתן significa poner o colocar. 'Pondrán' es claro y directo; 'aplicarán' sería más interpretativo.
- source_word: עַל שְׁתֵּי הַמְּזוּזֹת
  english_pob_choice: on the two doorposts
  chosen_spanish: sobre los dos postes
  alternatives_spanish:
  - sobre los dos postes de la puerta
  - sobre los dos marcos laterales
  lexicon: HALOT
  rationale: מְזוּזוֹת nombra los postes verticales de la entrada. 'Postes' conserva la imagen arquitectónica; 'postes de la puerta' sería más explícito, pero menos conciso.
- source_word: וְעַל הַמַּשְׁקוֹף
  english_pob_choice: and on the lintel
  chosen_spanish: sobre el dintel
  alternatives_spanish:
  - sobre la viga superior
  - sobre el travesaño superior
  lexicon: HALOT
  rationale: מַשְׁקוֹף designa la pieza horizontal superior de la puerta. 'Dintel' es el equivalente arquitectónico más preciso y natural en español.
- source_word: עַל הַבָּתִּים
  english_pob_choice: of the houses
  chosen_spanish: de las casas
  alternatives_spanish:
  - sobre las casas
  lexicon: HALOT
  rationale: Aunque el hebreo usa עַל, la relación aquí identifica las casas cuyos accesos son marcados. En español, 'de las casas' expresa mejor esa pertenencia sin confusión.
- source_word: אֲשֶׁר יֹאכְלוּ אֹתוֹ בָהֶם
  english_pob_choice: in which they eat it
  chosen_spanish: en las que la comerán
  alternatives_spanish:
  - donde la comerán
  - en las cuales la comerán
  lexicon: HALOT
  rationale: La cláusula relativa modifica 'casas'. El imperfecto hebreo funciona con matiz futuro en este contexto instructivo; por eso 'comerán' conserva el valor directivo. Se usa 'la' porque el referente implícito es el cordero/pascua en el contexto inmediato.
translation_notes:
  revision_awareness: Se verificó el pasaje contra el texto hebreo consonántico-vocalizado y la audit trail inglesa. No hubo revisiones aplicadas en el pass más reciente; la redacción española mantiene el valor directivo del perfecto hebreo, el sentido partitivo de מִן y la terminología arquitectónica precisa para מְזוּזֹת y מַשְׁקוֹף.
  spanish_consistency_notes:
  - Se mantuvo 'sangre' sin añadir 'algo de' para no sobrerrepresentar el partitivo.
  - '''Dintel'' y ''postes'' preservan el léxico arquitectónico sin recurrir a perífrasis innecesarias.'
  - La cláusula relativa se ajustó a español natural, conservando el matiz futuro del verbo hebreo en contexto de instrucción.
