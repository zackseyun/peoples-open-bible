translation:
  language: es
  text: El sonido de guerra está en el país[a], y gran destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Un sonido de guerra en el país, y un gran estruendo». El sustantivo hebreo שֶׁבֶר puede llevar el sentido de «quebrantamiento», «estruendo» o «ruina», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: The sound of
  chosen_spanish: El sonido de
  alternatives_spanish:
  - Un sonido de
  - La voz de
  - El ruido de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, ruido o voz. En este contexto bélico, ‘el sonido de’ conserva bien la referencia auditiva sin personalizarla como ‘voz’ y suena natural en español.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - combate
  - guerra
  lexicon: HALOT
  rationale: מִלְחָמָה tiene un alcance amplio de guerra o batalla. ‘Guerra’ comunica mejor el alcance general del término y armoniza con la escena de devastación.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  - en la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, país o territorio. En español, ‘en la tierra’ conserva la amplitud territorial del hebreo y reproduce bien la forma breve del enunciado.
- source_word: וְשֶׁבֶר גָּדוֹל
  english_pob_choice: and great destruction
  chosen_spanish: y gran destrucción
  alternatives_spanish:
  - y gran ruina
  - y un gran quebrantamiento
  - y un gran derrumbe
  lexicon: HALOT
  rationale: שֶׁבֶר literalmente se relaciona con ‘quebrar’ o ‘fractura’, pero en contexto profético de juicio puede designar ruina o destrucción. ‘Gran destrucción’ transmite el efecto del juicio con naturalidad en español sin perder la severidad del hebreo.
