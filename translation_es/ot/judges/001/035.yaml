translation:
  language: es
  text: Pero los amorreos persistieron en habitar en el monte Heres, en Aijalón y en Saalbim; entonces la mano de la casa de José se volvió pesada[a], y quedaron sujetos a trabajos forzados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la mano de la casa de José prevaleció'; literalmente, 'se volvió pesada'. El hebreo puede expresar tanto aumento de fuerza como poder opresivo.
    reason: lexical_alternative
  - marker: b
    text: O 'fueron puestos a trabajos forzados' o 'se volvieron tributarios'. El hebreo refiere servicio laboral compulsorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹאֶל
  english_pob_choice: persisted
  chosen_spanish: persistieron
  alternatives_spanish:
  - se empeñaron
  - consintieron
  - se decidieron
  lexicon: HALOT
  rationale: El verbo puede expresar voluntad, determinación o consentimiento. En este contexto, con el infinitivo 'habitar', la idea es que los amorreos insistieron en permanecer allí; 'persistieron' conserva esa fuerza mejor que una mera concesión o inicio de acción.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular morfológico, funciona colectivamente para el pueblo. El plural español expresa naturalmente el grupo étnico, como en la lectura inglesa auditada.
- source_word: לָשֶׁבֶת
  english_pob_choice: in dwelling
  chosen_spanish: en habitar
  alternatives_spanish:
  - en morar
  - para habitar
  lexicon: HALOT
  rationale: El infinitivo complementa a וַיּוֹאֶל. En español, 'persistieron en habitar' comunica la acción continua sin sobrecargar el verso.
- source_word: בְּהַר חֶרֶס
  english_pob_choice: in Mount Heres
  chosen_spanish: en el monte Heres
  alternatives_spanish:
  - en el monte Jéres
  - en la región de Heres
  lexicon: HALOT
  rationale: Se mantiene el topónimo con una forma clara y natural. 'Monte' preserva הַר sin forzar una interpretación más específica que el texto no exige.
- source_word: בְּאַיָּלוֹן
  english_pob_choice: in Aijalon
  chosen_spanish: en Aijalón
  alternatives_spanish:
  - en Aijalón
  lexicon: HALOT
  rationale: Se usa la transliteración española estándar con ortografía natural para lectores bíblicos en español.
- source_word: וּבְשַׁעַלְבִים
  english_pob_choice: and in Shaalbim
  chosen_spanish: y en Saalbim
  alternatives_spanish:
  - y en Shaalbim
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración directa y una forma legible en español.
- source_word: וַתִּכְבַּד יַד
  english_pob_choice: the hand ... grew heavy
  chosen_spanish: la mano ... se volvió pesada
  alternatives_spanish:
  - la mano ... prevaleció
  - la mano ... se hizo fuerte
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de 'mano pesada', evitando borrar la metáfora. 'Se volvió pesada' refleja el crecimiento de poder/opresión sin introducir una interpretación ajena al hebreo.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la casa de José
  - la tribu de José
  lexicon: HALOT
  rationale: Se mantiene la expresión formal y transparente. 'Casa de José' conserva el paralelismo político-genealógico del hebreo.
- source_word: לָמַס
  english_pob_choice: subject to forced labor
  chosen_spanish: sujetos a trabajos forzados
  alternatives_spanish:
  - a trabajo obligatorio
  - a corvea
  lexicon: HALOT
  rationale: מַס refiere labor compulsoria o tributaria. 'Trabajos forzados' comunica con claridad la obligación de servicio sin reducirlo a mero tributo monetario.
theological_decisions:
- issue: Traducción del dominio de la 'mano' de la casa de José
  english_pob_reading: the hand of the house of Joseph grew heavy
  chosen_spanish_reading: la mano de la casa de José se volvió pesada
  alternative_spanish_readings:
  - la mano de la casa de José prevaleció
  - la mano de la casa de José se hizo fuerte
  rationale: La frase hebrea es idiomática y puede expresar fuerza creciente o poder opresivo. La versión española mantiene la metáfora y deja visible la tensión semántica, como en el audit trail inglés.
  doctrine_reference: Uso idiomático del lenguaje bíblico; no implica doctrina especial.
- issue: Naturaleza de לָמַס
  english_pob_reading: they became subject to forced labor
  chosen_spanish_reading: quedaron sujetos a trabajos forzados
  alternative_spanish_readings:
  - fueron puestos a trabajos forzados
  - se volvieron tributarios
  rationale: El término apunta a servicio laboral compulsorio. 'Sujetos a trabajos forzados' preserva la idea de sujeción coercitiva, evitando una reducción a tributo económico y manteniendo la tensión del texto.
  doctrine_reference: Ética bíblica del poder y servidumbre; sin implicación doctrinal específica.
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa auditada de alta concordancia, pero vuelve al hebreo para preservar la metáfora de 'mano pesada' y el valor de מַס como trabajo compulsorio. Se adopta una formulación española natural ('persistieron en habitar', 'sujetos a trabajos forzados') sin suavizar la tensión semántica documentada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el hebreo lo exige; este verso no contiene el Tetragrámaton.
  - '''Amorreos'' se mantiene en plural colectivo para reflejar el uso de pueblo/grupo.'
  - '''Casa de José'' conserva la expresión genealógico-política del texto.'
  - Se evita 'SEÑOR' o una paráfrasis interpretativa que desdibuje la imagen idiomática de la mano pesada.
