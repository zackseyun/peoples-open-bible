translation:
  language: es
  text: 'David dijo a su hijo Salomón: «Sé fuerte y valiente, y hazlo. No temas ni te desanimes, porque Yahvé Dios, mi Dios, está contigo. No te fallará ni te abandonará[a] hasta que haya terminado toda la obra del servicio de la casa de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te soltará»; el verbo hebreo puede sugerir no aflojar el apoyo o no dejar caer a alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Sé firme
  - Fortalécete
  lexicon: HALOT
  rationale: El imperativo exhorta a Solomón a afrontar con firmeza la tarea del templo. «Sé fuerte» es natural en español y conserva la fuerza directa del mandato.
- source_word: וֶאֱמַץ
  english_pob_choice: and courageous
  chosen_spanish: y valiente
  alternatives_spanish:
  - y sé valiente
  - y resuelto
  lexicon: HALOT
  rationale: אמץ intensifica la exhortación junto con חזק. «Valiente» recoge bien la idea de ánimo firme y resuelto sin sonar forzado; la coordinación con «sé fuerte» mantiene el paralelismo.
- source_word: וַעֲשֵׂה
  english_pob_choice: and do it
  chosen_spanish: y hazlo
  alternatives_spanish:
  - y actúa
  - y haz la obra
  lexicon: HALOT
  rationale: El contexto se refiere a la tarea encomendada, por lo que «hazlo» comunica la acción concreta con naturalidad, sin perder la referencia al encargo inmediato.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: HALOT
  rationale: Es el equivalente directo y solemne de la prohibición; conserva el tono bíblico de exhortación.
- source_word: וְאַל תֵּחָת
  english_pob_choice: or be dismayed
  chosen_spanish: ni te desanimes
  alternatives_spanish:
  - ni te desalientes
  - ni te aterres
  lexicon: HALOT
  rationale: חתת expresa quebranto del ánimo o desánimo ante la tarea. «Desanimes» comunica bien esa caída de valor en español actual; se evita hacerla demasiado física o extrema.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado en el texto hebreo, siguiendo la convención del proyecto. «Yahvé» es la forma principal en español del POB, no la sustitución por un título.
- source_word: אֱלֹהִים אֱלֹהַי
  english_pob_choice: God, my God
  chosen_spanish: Dios, mi Dios
  alternatives_spanish:
  - Dios, el Dios mío
  - el Dios, mi Dios
  lexicon: HALOT
  rationale: La secuencia apposicional conserva tanto la designación de Dios como la relación personal de David. En español, «Dios, mi Dios» reproduce esa repetición sin sobreexplicar.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con usted
  - estará contigo
  lexicon: HALOT
  rationale: La cláusula nominal se expresa naturalmente con verbo copulativo en español. «Está contigo» refleja la presencia asegurada sin añadir temporalidad no explícita.
- source_word: לֹא יַרְפְּךָ
  english_pob_choice: He will not fail you
  chosen_spanish: No te fallará
  alternatives_spanish:
  - No te soltará
  - No te dejará sin sostén
  lexicon: HALOT
  rationale: El verbo hebreo puede sugerir aflojar el apoyo o dejar caer. «No te fallará» mantiene la idea de no fallar en su sostén y funciona bien junto con la cláusula paralela.
- source_word: וְלֹא יַעַזְבֶךָּ
  english_pob_choice: or forsake you
  chosen_spanish: ni te abandonará
  alternatives_spanish:
  - ni te dejará
  - ni te desamparará
  lexicon: HALOT
  rationale: עזב en contexto de promesa/cuidado se expresa con «abandonar» en español contemporáneo, conservando el valor relacional de la negación.
- source_word: עַד לִכְלוֹת
  english_pob_choice: until ... is finished
  chosen_spanish: hasta que haya terminado
  alternatives_spanish:
  - hasta que se haya terminado
  - hasta acabar
  lexicon: HALOT
  rationale: El infinitivo marca el punto final de la ayuda divina. «Hasta que haya terminado» es fluido y conserva el sentido de culminación de la obra.
- source_word: כָּל מְלֶאכֶת עֲבוֹדַת בֵּית יְהוָה
  english_pob_choice: all the work for the service of the house of Yahweh
  chosen_spanish: toda la obra del servicio de la casa de Yahvé
  alternatives_spanish:
  - todo el trabajo del servicio de la casa de Yahvé
  - toda la obra para el servicio de la casa de Yahvé
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo compacto para no perder el vínculo entre «obra» y «servicio». «Casa de Yahvé» conserva la designación del templo sin sustituirla por una fórmula distinta.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo presenta el Tetragrámaton de forma explícita. Se conserva la transliteración reverente y auditable del nombre divino en español, conforme al estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Promesa de presencia y sostén divino
  english_pob_reading: He will not fail you or forsake you
  chosen_spanish_reading: No te fallará ni te abandonará
  alternative_spanish_readings:
  - No te soltará ni te abandonará
  - No te dejará ni te abandonará
  rationale: La pareja verbal hebrea combina idea de no aflojar el apoyo con la de no abandonar. El español elegido preserva la confianza pactal y la continuidad del sostén divino sin borrar la tensión semántica.
  doctrine_reference: Lexical-theological note on רפה / עזב in covenant reassurance
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: mantiene la exhortación en imperativo, conserva el nombre divino como Yahvé, y traduce la pareja verbal de seguridad divina con una solución española natural sin perder la tensión léxica documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el paralelismo exhortativo con «Sé fuerte y valiente».
  - «Casa de Yahvé» conserva la referencia cultual al templo sin sustituirla por una formulación eclesial posterior.
  - La nota al pie marca la alternativa léxica relevante en torno a יַרְפְּךָ.
