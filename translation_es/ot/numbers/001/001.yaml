translation:
  language: es
  text: 'Yahvé habló a Moisés en el desierto de Sinaí[a], en la tienda de reunión, el primer día del segundo mes, en el segundo año después de que salieron de la tierra de Egipto, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la tienda de reunión»; tradicionalmente, «el tabernáculo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio divino, no un título. En español se conserva como «Yahvé» para mantener la transparencia del Tetragrámaton, siguiendo el criterio POB de no ocultarlo con una sustitución devocional.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo introductorio de discurso en narrativa hebrea se vierte naturalmente como «habló». «Dijo» también sería posible, pero «habló» conserva mejor el arranque solemne de la fórmula narrativa y evita redundancia inmediata con «diciendo».
- source_word: בְּמִדְבַּר סִינַי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto del Sinaí
  - en la soledad de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «desierto/terreno despoblado»; aquí «desierto» es claro y bíblicamente natural en español. Se conserva «Sinaí» como nombre geográfico propio.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: El POB inglés eligió «tent of meeting» por transparencia frente a «tabernacle». En español, «tienda de reunión» reproduce el sentido literal y evita la tradicionalización de «tabernáculo», que no expresa tan directamente el hebreo.
- source_word: בְּאֶחָד לַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: on the first day of the second month
  chosen_spanish: el primer día del segundo mes
  alternatives_spanish:
  - el primero del segundo mes
  - a los primeros del segundo mes
  lexicon: HALOT
  rationale: La construcción temporal hebrea marca fecha calendárica. «El primer día del segundo mes» es la forma española más natural y precisa, manteniendo el valor idiomático del original.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - durante el segundo año
  lexicon: HALOT
  rationale: La frase temporal se conserva de manera directa. «En el segundo año» es la correspondencia simple y fiel al hebreo.
- source_word: לְצֵאתָם
  english_pob_choice: after they had come out
  chosen_spanish: después de que habían salido
  alternatives_spanish:
  - después de su salida
  - desde que salieron
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa relación temporal respecto del éxodo. «Después de que habían salido» mantiene el sentido retrospectivo del evento sin añadir interpretación excesiva.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Mizraim
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva «tierra» porque el hebreo lo incluye explícitamente. «Egipto» podría bastar en español, pero omitir «tierra» perdería una parte de la forma original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se vierte como gerundio español, que funciona de manera natural antes del contenido que sigue en el versículo siguiente.
theological_decisions:
- issue: Nombre divino יְהוָה frente a sustitución titulada
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB inglesa rechaza la sustitución por un título y conserva el nombre propio. En español, «Yahvé» es la forma estándar adoptada para reflejar ese mismo criterio de transparencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: אֹהֶל מוֹעֵד como expresión técnica
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tabernáculo
  - tienda del encuentro
  rationale: La traducción evita una equivalencia tradicional que opaca el hebreo. «Tienda de reunión» conserva el valor descriptivo del término técnico y sugiere el lugar de encuentro sin imponer una terminología eclesiástica heredada.
  doctrine_reference: POB lexical transparency principle
translation_notes:
  revision_awareness: No se detectaron cambios en la pasada de revisión más reciente; el consenso de auditoría reporta alta concordancia y sin cambios necesarios, por lo que la versión española sigue de cerca el texto fuente y la decisión léxica inglesa ya aprobada.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» de manera consistente con el estándar POB en español.
  - Se prefirió «tienda de reunión» para reflejar la transparencia del hebreo אֹהֶל מוֹעֵד, en paralelo al inglés «tent of meeting».
  - La secuencia temporal se mantuvo en un registro bíblico claro y moderno, sin añadir elementos interpretativos ajenos al hebreo.
