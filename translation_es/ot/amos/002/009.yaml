revisions:
- from: Sin embargo, yo destruí al amorreo[a] delante de ellos, cuya altura era como la altura de los cedros, y era fuerte como los encinos[b]; destruí su fruto de arriba y sus raíces de abajo.
  to: Sin embargo, yo destruí al amorreo[a] delante de ellos, cuya altura era como la altura de los cedros, y era fuerte como los robles[b]; destruí su fruto arriba y sus raíces abajo.
  rationale: La revisión conserva todas las decisiones exegéticas del original y del POB inglés, pero mejora la legibilidad panhispánica y la naturalidad del español. «Robles» evita el regionalismo de «encinos», y «arriba / abajo» expresa con más fluidez la imagen poética de destrucción total desde la copa hasta las raíces.
