translation:
  language: es
  text: Las palabras de Jehonadab[a], hijo de Recab, que mandó a sus hijos no beber vino, han sido cumplidas, y no han bebido vino hasta hoy, porque obedecieron el mandato de su padre. Pero yo les he hablado, levantándome temprano y hablando[b], y ustedes no me han escuchado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Jonadab' por 'Jehonadab'.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: ''levantándome temprano y hablando'', que expresa una acción persistente y diligente al dirigirse a ellos.'
    reason: cultural_note
lexical_decisions:
- source_word: הוּקַם
  english_pob_choice: have been upheld
  chosen_spanish: han sido cumplidas
  alternatives_spanish:
  - han sido establecidas
  - han sido mantenidas
  - han sido observadas
  lexicon: HALOT
  rationale: El pasivo de קום aquí expresa que las palabras/mandato han quedado en efecto y han sido atendidos. En español, 'han sido cumplidas' comunica bien la idea de que la instrucción de Jehonadab ha quedado realizada u observada sin perder la fuerza pasiva.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los mandatos de
  - los dichos de
  - las instrucciones de
  lexicon: HALOT
  rationale: דבר es amplio; 'palabras' sigue de cerca la forma hebrea y permite que la relativa explique el contenido normativo de esas palabras.
- source_word: יְהוֹנָדָב
  english_pob_choice: Jehonadab
  chosen_spanish: Jehonadab
  alternatives_spanish:
  - Jonadab
  lexicon: Transliteración hebrea
  rationale: Se conserva la transliteración más cercana a la forma hebrea יְהוֹנָדָב. Se mantiene la alternativa conocida 'Jonadab' en nota por su uso tradicional.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - instruyó
  - dio mandato a
  lexicon: HALOT
  rationale: צוה expresa una instrucción con autoridad. 'Mandó' es natural en español y conserva la fuerza directiva del padre.
- source_word: לְבִלְתִּי שְׁתוֹת יַיִן
  english_pob_choice: not to drink wine
  chosen_spanish: no beber vino
  alternatives_spanish:
  - abstenerse de beber vino
  - no tomar vino
  lexicon: HALOT
  rationale: La construcción expresa prohibición. 'No beber vino' es directo, claro y fiel, sin añadir una paráfrasis que suavice el mandato.
- source_word: וְלֹא שָׁתוּ
  english_pob_choice: and they have not drunk wine
  chosen_spanish: y no han bebido vino
  alternatives_spanish:
  - y no bebieron vino
  - y no han tomado vino
  lexicon: HALOT
  rationale: Se explicita 'vino' como objeto implícito en el verbo, siguiendo la claridad de la revisión inglesa. El perfecto compuesto ayuda a expresar la continuidad 'hasta hoy'.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y conserva el sentido de continuidad temporal hasta el presente.
- source_word: שָׁמְעוּ
  english_pob_choice: have obeyed
  chosen_spanish: obedecieron
  alternatives_spanish:
  - han obedecido
  - han escuchado
  lexicon: HALOT
  rationale: Con מִצְוַת, שמע lleva el sentido de obedecer. Aquí 'obedecieron' hace explícito el valor obediencial que el hebreo exige por el contexto.
- source_word: מִצְוַת אֲבִיהֶם
  english_pob_choice: the command of their father
  chosen_spanish: el mandato de su padre
  alternatives_spanish:
  - la orden de su padre
  - el mandato de su padre
  lexicon: HALOT
  rationale: El singular constructo apunta a una instrucción paternofilial concreta y colectiva. 'Mandato' mantiene el tono autoritativo sin sonar excesivamente técnico.
- source_word: וְאָ֨נֹכִ֜י
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Sin embargo, yo
  lexicon: HALOT
  rationale: El hebreo introduce contraste entre la obediencia recabita y la desobediencia del pueblo. 'Pero yo' conserva ese giro retórico de manera natural en español.
- source_word: דִּבַּרְתִּי אֲלֵי/כֶם
  english_pob_choice: have spoken to you
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les hablé
  - he hablado con ustedes
  lexicon: HALOT
  rationale: El perfecto compuesto expresa una acción repetida con alcance hasta el presente. Se prefiere 'les he hablado' como formulación directa y sobria.
- source_word: הַשְׁכֵּם וְדַבֵּר
  english_pob_choice: rising early and speaking
  chosen_spanish: madrugando y hablando
  alternatives_spanish:
  - levantándome temprano y hablando
  - de madrugada y hablando
  - insistentemente hablando
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de 'levantarse temprano' con un equivalente natural y breve. 'Madrugando y hablando' mantiene el valor de diligencia y persistencia sin expandir demasiado el giro.
- source_word: וְלֹא שְׁמַעְתֶּם אֵלָי
  english_pob_choice: and you have not listened to me
  chosen_spanish: y ustedes no me han escuchado
  alternatives_spanish:
  - y no me han obedecido
  - y no me escucharon
  lexicon: HALOT
  rationale: Aquí שמע con אֶל significa 'escuchar/atender'. 'No me han escuchado' conserva el paralelismo verbal con el hablar divino y deja visible la implicación de desobediencia.
theological_decisions:
- issue: Relación entre escuchar y obedecer en el cierre del verso
  english_pob_reading: and you have not listened to me
  chosen_spanish_reading: y ustedes no me han escuchado
  alternative_spanish_readings:
  - y ustedes no me han obedecido
  - y ustedes no me atendieron
  rationale: El hebreo usa שמע con אֶל, cuyo sentido básico es oír/escuchar, aunque el contexto implica rechazo obediencial. Se conserva 'escuchado' para no eliminar la tensión entre oír y obedecer, ya que el versículo contrapone la obediencia filial de los recabitas con la resistencia de Judá.
  doctrine_reference: 'Principio de traducción: preservar la tensión semántica cuando el texto bíblico la sostiene, sin resolverla con una equivalencia demasiado interpretativa.'
- issue: Referencia al nombre divino no presente en este versículo
  english_pob_reading: No explicit divine-name rendering issue in the verse
  chosen_spanish_reading: Sin ajuste especial; el verso no contiene יהוה
  rationale: No aparece YHWH en este versículo, por lo que no corresponde aplicar la convención 'Yahvé' aquí.
  doctrine_reference: Consistencia terminológica del proyecto POB español.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'have not drunk it' por 'have not drunk wine' para hacer explícito el objeto. En español se siguió ese ajuste con 'no han bebido vino'. También se mantuvo el paralelismo del cierre con 'les he hablado' / 'no me han escuchado', evitando convertirlo en una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Jehonadab se translitera de forma consistente y se anota la variante tradicional 'Jonadab'.
  - Se preserva 'vino' de manera explícita para seguir la precisión de la revisión inglesa y del hebreo.
  - '''Madrugando y hablando'' conserva la forma idiomática sin volverla una explicación excesiva.'
  - '''No me han escuchado'' mantiene el matiz de oír/atender y no lo reduce directamente a ''no me han obedecido''.'
