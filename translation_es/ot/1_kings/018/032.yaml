review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: conserva el sentido instrumental de «con las piedras», traduce בְּשֵׁם como «en el nombre de», mantiene «Yahvé» para יְהוָה, y expresa correctamente la zanja alrededor del altar. La única desalineación relevante está en כְּבֵית סָאתַיִם זֶרַע: el hebreo y la auditoría inglesa preservan el matiz comparativo/idiomático («como la capacidad/medida de dos seahs de semilla»), mientras que «de la capacidad de» suena más categórico y pierde el valor de comparación indicado por כְּ.'
  spanish_quality_summary: El español es claro y digno, pero una pequeña reparación mejora la naturalidad y la fidelidad. «Edificó» es aceptable, aunque «construyó» sería algo más natural; no es necesario cambiarlo. Sí conviene ajustar la frase de medida a «como de la capacidad...» o equivalente, y armonizar la nota con el nombre divino en español («Yahvé», no «Yahweh»).
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente en el texto; no hay otros términos doctrinales sensibles. La unidad antigua «seahs» se preserva de forma coherente con la auditoría. La nota al pie debe reflejar el texto español y la política del proyecto con «Yahvé».'
  issues:
  - severity: medium
    issue: La frase «de la capacidad de dos seahs de semilla» pierde el matiz comparativo de כְּבֵית
    rationale: El prefijo כְּ introduce comparación («como»). La auditoría inglesa corrigió precisamente hacia una formulación más literal. En español conviene reflejar ese valor para no volver la medida una descripción demasiado directa.
  - severity: low
    issue: La nota al pie está anclada en «Yahvé[a]», pero explica la medida de la zanja
    rationale: El anclaje no es ideal para legibilidad, aunque cumple técnicamente con la referencia de nota. Es preferible colocar la marca cerca de la frase de medida, que es lo que la nota comenta.
  - severity: low
    issue: La nota usa «Yahweh» implícitamente en el trasfondo inglés en vez de armonizar plenamente con el español del proyecto
    rationale: Aunque el texto de la nota no menciona el nombre divino, la revisión general debe mantener consistencia terminológica enteramente en español. La corrección propuesta deja todo armonizado y sitúa la nota donde corresponde.
  revised_spanish_text: Y con las piedras edificó un altar en el nombre de Yahvé, e hizo una zanja alrededor del altar, como de la capacidad de dos seahs de semilla[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «como la medida de dos seahs de semilla», un modismo que indica el tamaño o la capacidad de la zanja.'
    reason: cultural_note
  revision_rationale: Se ajusta únicamente la frase de medida para reflejar el valor comparativo de כְּ («como»), en línea con el hebreo y con la auditoría inglesa. También se reubica la nota al lugar pertinente, junto a la expresión idiomática que explica. El resto del versículo es fiel y natural, por lo que no requiere cambios mayores.
