review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura imprecatoria y el sentido de «vagar» y «pedir limosna», pero no preserva con suficiente fidelidad el valor de מִן en מֵחָרְבוֹתֵיהֶם. «En sus ruinas» cambia la relación de localización/origen a una lectura puramente locativa, mientras que la evidencia fuente y la auditoría inglesa prefieren «de/desde sus ruinas» con nota sobre la posible separación. Además, la nota actual sobre «hijos» no corresponde a una alternativa preservada en la auditoría inglesa y no resuelve la ambigüedad relevante del versículo.
  spanish_quality_summary: El español es claro y natural, con buen tono bíblico moderno. Sin embargo, «anden errantes» suena algo pesado; «anden vagando» o «vaguen» sería más idiomático. La reparación principal es ajustar la preposición para reflejar mejor el hebreo. La frase revisada mantiene dignidad y legibilidad.
  glossary_alignment: 'No hay conflictos con la terminología teológica global. Las decisiones léxicas principales son adecuadas: «sus hijos», «pidan limosna», «busquen». La desviación importante está en מֵחָרְבוֹתֵיהֶם, que debe representarse como «de sus ruinas» o similar, con nota que preserve la alternativa «lejos de/saliendo de sus ruinas».'
  issues:
  - severity: high
    issue: «en sus ruinas» no refleja bien מֵחָרְבוֹתֵיהֶם
    rationale: La preposición hebrea מִן aquí fue documentada en la auditoría inglesa como fuente o separación. «En» introduce localización y borra esa ambigüedad significativa.
  - severity: medium
    issue: La nota al pie actual trata «hijos» en lugar de la ambigüedad real del versículo
    rationale: La auditoría inglesa conserva una nota sobre el valor de la preposición («from/away from their ruins»), no sobre בנים. La nota española debería seguir la evidencia fuente relevante.
  - severity: low
    issue: «anden errantes» es menos idiomático que otras opciones españolas
    rationale: Aunque comprensible, la combinación suena algo calcada. «anden vagando» conserva mejor el movimiento continuo en español natural.
  revised_spanish_text: Que sus hijos anden vagando y pidan limosna; que busquen de sus ruinas[a].
  revised_footnotes:
  - marker: a
    text: O «que busquen lejos de sus ruinas», tomando la preposición como separación en vez de origen.
    reason: lexical_alternative
