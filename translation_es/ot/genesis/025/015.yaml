translation:
  language: es
  text: Hadad[a], Tema, Jetur, Nafish y Kedemah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tema» sigue la transliteración habitual del nombre hebreo תֵימָא; «Temah» es una alternativa de transliteración posible, pero no la forma elegida en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲדַד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Hadar
  lexicon: HALOT
  rationale: Nombre propio en una lista genealógica; se translitera. En español, ‘Hadad’ conserva la forma consonántica seguida por la POB en inglés y evita mezclarlo con la variante ‘Hadar’, que pertenece a otra tradición textual/genealógica.
- source_word: תֵימָא
  english_pob_choice: Tema
  chosen_spanish: Tema
  alternatives_spanish:
  - Temá
  lexicon: HALOT
  rationale: Nombre propio o etnónimo topográfico; se translitera. En español, ‘Tema’ es claro y cercano al hebreo. ‘Temá’ podría reflejar mejor el acento, pero ‘Tema’ mantiene la forma de nombre propio conocida sin añadir una vocalización no exigida por el texto.
- source_word: יְטוּר
  english_pob_choice: Jetur
  chosen_spanish: Jetur
  alternatives_spanish:
  - Yetur
  lexicon: HALOT
  rationale: Nombre propio; se translitera. Se adopta ‘Jetur’ por ser la forma más reconocible en español bíblico y porque la POB en inglés ya optó por una transliteración convencional equivalente.
- source_word: נָפִישׁ
  english_pob_choice: Naphish
  chosen_spanish: Nafish
  alternatives_spanish:
  - Nafis
  lexicon: HALOT
  rationale: Nombre propio; se translitera. En español, ‘Nafish’ conserva mejor la fricativa final representada por ש y evita una adaptación excesiva; ‘Nafis’ sería una simplificación fonética menos transparente.
- source_word: קֵדְמָה
  english_pob_choice: Kedemah
  chosen_spanish: Kedemá
  alternatives_spanish:
  - Kedemah
  lexicon: HALOT
  rationale: Nombre propio; se translitera. En español, ‘Kedemá’ refleja de forma más natural el acento final del nombre propio. Se preserva el valor de nombre sin traducirlo como ‘oriente’, que sería un falso sentido en esta lista de nombres.
- source_word: וְ / וָ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción coordina una lista simple de nombres. En español se usa ‘y’; no se requiere ‘e’ porque la siguiente palabra comienza con /i/ ni con hi- inicial sonora.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran acuerdo alto y no requieren revisión textual. La decisión principal en español fue ajustar solo la transliteración de los nombres para que el resultado sea publicable y natural sin perder transparencia respecto del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la lista nominal sin añadir conectores innecesarios ni traducir los nombres propios.
  - Se usó puntuación española estándar con coma serial y ‘y’ antes del último elemento.
  - ‘Kedemá’ se eligió por coherencia prosódica en español, aunque el inglés POB conserva ‘Kedemah’ como transliteración estándar.
