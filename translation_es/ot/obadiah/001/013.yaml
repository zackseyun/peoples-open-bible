revisions:
- from: No entres por la puerta de mi pueblo en el día de su desastre[a]; no mires su calamidad, aun tú, en el día de su desastre; y no alargues la mano contra sus bienes[b] en el día de su desastre.
  to: No entres por la puerta de mi pueblo en el día de su desastre; no mires[a] su calamidad, incluso tú, en el día de su desastre; y no pongas mano sobre sus bienes[b] en el día de su desastre.
  rationale: Se reubicó la nota [a] al verbo «mires», que es el lugar correcto según la evidencia y la auditoría inglesa. Se mejoró «aun tú» a «incluso tú» por naturalidad. Se cambió «no alargues la mano contra sus bienes» por «no pongas mano sobre sus bienes», que suena más idiomático en español y refleja mejor la idea de apoderarse de los bienes en contexto de saqueo.
  reviewer_model: gpt-5.4
