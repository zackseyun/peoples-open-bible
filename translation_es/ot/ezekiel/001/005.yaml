- from: 'Y desde su interior salía[a] la semejanza de cuatro seres vivientes. Y este era[b] su aspecto: tenían la semejanza de un hombre.'
  to: 'Y desde su interior salía la semejanza de cuatro seres vivientes[a]. Y este era su aspecto: tenían la semejanza de un hombre[b].'
  rationale: 'La traducción principal es sustancialmente fiel, pero las notas deben alinearse con el expediente inglés y con las decisiones fuente realmente significativas: la alternativa léxica de חַיּוֹת y la aclaración sobre דְּמוּת אָדָם. Se eliminó la nota sobre ‘salía’ porque no corresponde al aparato auditado principal de este versículo.'
