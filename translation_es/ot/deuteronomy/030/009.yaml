revisions:
- from: Yahvé tu Dios te hará abundar en toda la obra de tu mano[a], en el fruto de tu vientre, en el fruto de tu ganado y en el fruto de tu suelo, para bien; porque Yahvé volverá a gozarse sobre ti para bien[b], como se gozó sobre tus padres.
  to: Yahvé tu Dios te hará abundar en toda la obra de tu mano[a], en el fruto de tu vientre, en el fruto de tu ganado y en el fruto de tu suelo, para bien; porque Yahvé volverá a alegrarse por ti para bien[b], como se alegró por tus padres.
