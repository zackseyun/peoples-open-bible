translation:
  language: es
  text: Pesará sobre él como una piedra pesada[a], y no tardará en quitársela de encima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como una piedra de carga»; el paralelo griego dice «como una piedra fuerte de prueba», lo que sugiere tanto peso como una situación que pone a prueba.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּאֶבֶן
  english_pob_choice: like a ... stone
  chosen_spanish: como una piedra
  alternatives_spanish:
  - como una roca
  - como piedra
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación; en español, «como una piedra» reproduce la similitúd de manera natural y fiel al hebreo y al griego.
- source_word: מַשָּׂא
  english_pob_choice: heavy
  chosen_spanish: pesada
  alternatives_spanish:
  - de peso
  - gravosa
  - cargada
  lexicon: HALOT
  rationale: El sustantivo hebreo denota carga/peso. «Pesada» conserva la imagen de una piedra que oprime, sin forzar una expresión menos natural en español como «piedra de carga».
- source_word: תִּהְיֶה עָלָיו
  english_pob_choice: will be upon him
  chosen_spanish: será sobre él
  alternatives_spanish:
  - estará sobre él
  - pesará sobre él
  - reposará sobre él
  lexicon: HALOT
  rationale: La construcción verbal mantiene la idea de algo que recae sobre la persona. «Será sobre él» sigue de cerca la sintaxis de la imagen, y el contexto permite entender el peso figurado.
- source_word: וְלֹא יְאַחֵר
  english_pob_choice: he will not delay
  chosen_spanish: y no tardará
  alternatives_spanish:
  - y no demorará
  - y no se detendrá
  - y no vacilará
  lexicon: HALOT
  rationale: El verbo significa tardar/demorar. «No tardará» es una equivalencia directa y idiomática en español.
- source_word: לְהַשְׁלִיכָה
  english_pob_choice: to throw it off
  chosen_spanish: en quitársela de encima
  alternatives_spanish:
  - en arrojarla
  - en deshacerse de ella
  - en echarla lejos
  lexicon: HALOT
  rationale: El infinitivo indica arrojar/castigar fuera. En español, «quitársela de encima» comunica con claridad la acción de librarse de una carga, preservando la metáfora del peso.
theological_decisions:
- issue: Integrar la imagen hebrea de carga con la matización del paralelo griego de prueba/probación
  english_pob_reading: Retain the Hebrew burden image while incorporating the Greek clarification of testing/probation in the main text
  chosen_spanish_reading: Mantener la imagen de la carga/peso en el texto principal, sin añadir explícitamente «prueba» o «probar» en la línea principal
  alternative_spanish_readings:
  - como una piedra de prueba
  - como una piedra fuerte de probación
  - como una piedra de examen
  rationale: El hebreo conservado en la tradición base habla de una piedra de carga, y la revisión reciente corrigió una sobrerlectura de «testing». Dado que el paralelo griego sí sugiere firmeza/ensayo, esa nuance puede consignarse en nota, pero el texto principal no debe introducir un matiz ausente del hebreo directo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, usando el griego para matizar sin borrar la lectura principal.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que corrigió «heavy testing stone» a «heavy stone». Por eso el texto principal español refleja solo la imagen de peso/carga, y la dimensión de prueba del griego queda reservada para la nota, evitando sobreinterpretar מַשָּׂא.
  spanish_consistency_notes:
  - Se mantiene «piedra» en singular para seguir el simile del hebreo y del griego.
  - Se evita «SEÑOR» u otras fórmulas no presentes en el verso.
  - «Quitar de encima» es una equivalencia idiomática de לְהַשְׁלִיכָה que conserva la idea de remover una carga.
  - La nota distingue con claridad el peso hebreo y la matización del paralelo griego, sin fusionarlos indebidamente.
