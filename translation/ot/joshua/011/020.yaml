theological_decisions:
- issue: Divine agency in the hardening of the Canaanite kings/hearts
  chosen_reading: 'Explicitly retain God''s agency: ''it was from the LORD to harden their hearts'''
  alternative_readings:
  - it was the LORD's will that they be stubborn
  - the LORD allowed their hearts to be hardened
  rationale: The Hebrew directly attributes the hardening to the LORD. To weaken this to mere permission would import a theological softening not warranted by the text. The translation preserves the tension of divine sovereignty and human opposition without explanatory expansion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of חרם language
  chosen_reading: Use 'devote them to destruction' in the main text
  alternative_readings:
  - utterly destroy them
  - put them under the ban
  rationale: This preserves the covenantal/judicial force of חרם without reducing it to generic violence or obscuring it with less familiar jargon. The phrase also leaves visible the theological category of something devoted to God in judgment.
  doctrine_reference: 'Translation philosophy §1 and §5: original-language primacy and consistency of key terms.'
