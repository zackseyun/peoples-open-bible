review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido básico del griego: τύραννον = «el tirano», τιμωρηθῆναι = «sea castigado», πατρίδα = «la patria», καθαρισθῆναι = «sea purificada». También preserva bien la nota de amplitud semántica de καθαρισθῆναι.'
  spanish_quality_summary: El texto principal es fiel y natural, pero puede mejorarse ligeramente la fluidez y precisión de la nota al pie. «Purificada» es adecuado y de buen registro. La redacción principal no requiere cambio sustantivo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tirano», «patria» y «purificada» concuerdan con las decisiones léxicas auditadas. La nota alternativa debe mantenerse porque el inglés preserva «cleansed».
  issues:
  - severity: low
    issue: La nota al pie puede sonar un poco menos natural en español con «purificación en sentido ritual, moral o nacional».
    rationale: El inglés explica que el griego puede sugerir purificación «from defilement» en varios sentidos. En español, conviene expresar que la palabra puede implicar una purificación o limpieza en esos planos, con formulación más idiomática.
  - severity: low
    issue: 'Existe un artefacto no español en las decisiones léxicas internas: «sea очищada».'
    rationale: No afecta el texto bíblico publicado, pero confirma la necesidad de una pequeña limpieza editorial del registro. No requiere adjudicación compleja.
  revised_spanish_text: y que el tirano sea castigado y la patria sea purificada[a].
  revised_footnotes:
  - marker: a
    text: O «limpiada». El griego puede sugerir una purificación en sentido ritual, moral o nacional.
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente el texto principal porque ya es fiel, natural y acorde con el audit trail. Solo se ajusta levemente la nota al pie para que suene más idiomática en español y siga preservando la amplitud semántica de καθαρισθῆναι.
