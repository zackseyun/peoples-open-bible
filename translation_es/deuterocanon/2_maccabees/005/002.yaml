translation:
  language: es
  text: Y sucedió que por casi toda la ciudad, durante cuarenta días, se veían[a] jinetes que corrían por el aire, con vestiduras de oro y armados con lanzas en formación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparecían por el aire»; el griego φαίνεσθαι puede enfatizar la aparición o visibilidad además del hecho de ser vistos.
    reason: lexical_alternative
  - marker: b
    text: O «en filas» o «en compañías»; σπειρηδόν sugiere una disposición militar organizada, pero sin precisar una unidad concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG / LSJ
  rationale: La fórmula narrativa impersonal se vierte naturalmente con «sucedió», que conserva el carácter de evento reportado sin añadir interpretación.
- source_word: καθʼ ὅλην τὴν πόλιν σχεδὸν
  english_pob_choice: throughout nearly the whole city
  chosen_spanish: por casi toda la ciudad
  alternatives_spanish:
  - a través de casi toda la ciudad
  - por toda la ciudad, casi
  lexicon: LSJ
  rationale: «Por» comunica distribución a lo largo de la ciudad, y «casi toda» conserva la ligera restricción de σχεδόν.
- source_word: ἐφʼ ἡμέρας τεσσεράκοντα
  english_pob_choice: for forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  lexicon: LSJ
  rationale: En español «durante» expresa mejor la duración continua del período temporal.
- source_word: φαίνεσθαι
  english_pob_choice: were seen
  chosen_spanish: se veían
  alternatives_spanish:
  - aparecían
  - eran vistos
  lexicon: BDAG
  rationale: La forma pronominal refleja bien la percepción visual del pasaje sin decidir más de lo que el griego exige entre mera apariencia y visibilidad efectiva.
- source_word: διὰ τῶν ἀέρων
  english_pob_choice: through the air
  chosen_spanish: por el aire
  alternatives_spanish:
  - a través del aire
  - en el aire
  lexicon: LSJ
  rationale: «Por el aire» es una expresión natural en español y conserva la imagen de movimiento aéreo.
- source_word: τρέχοντας ἱππεῖς
  english_pob_choice: horsemen were seen running
  chosen_spanish: caballeros que corrían
  alternatives_spanish:
  - jinetes que corrían
  - caballería que corría
  lexicon: LSJ
  rationale: «Caballeros» aquí traduce ἱππεῖς como hombres montados; «que corrían» mantiene la participial griega y la rapidez del movimiento sin forzar un tecnicismo militar innecesario.
- source_word: διαχρύσους στολὰς ἔχοντας
  english_pob_choice: wearing golden garments
  chosen_spanish: con vestiduras de oro
  alternatives_spanish:
  - con vestiduras doradas
  - vistiendo vestiduras doradas
  lexicon: LSJ
  rationale: La construcción participial se vierte con «con vestiduras de oro», que preserva el efecto visual intenso del adjetivo διαχρύσους sin banalizarlo.
- source_word: λόγχας
  english_pob_choice: lances
  chosen_spanish: lanzas
  alternatives_spanish:
  - alabardas
  - picas
  lexicon: LSJ
  rationale: «Lanzas» es el equivalente español más directo y amplio para λόγχας.
- source_word: σπειρηδὸν
  english_pob_choice: in formation
  chosen_spanish: en formación
  alternatives_spanish:
  - en filas
  - en compañías
  - en escuadrones
  lexicon: LSJ
  rationale: «En formación» conserva la idea de orden militar sin sobreespecificar el tipo de unidad, en línea con la revisión inglesa más reciente.
- source_word: ἐξωπλισμένους
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados con armas
  - preparados para el combate
  lexicon: BDAG
  rationale: «Armados» es la equivalencia natural y breve para el participio de estar provistos de armas.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «in formation» frente a una traducción demasiado específica de σπειρηδόν. En español se siguió esa dirección con «en formación», y se mantuvo la ambigüedad de φαίνεσθαι con una nota alternativa. También se ajustó el ritmo para una lectura publicable y fiel al original griego.
  spanish_consistency_notes:
  - Se conserva el pasado narrativo impersonal con «sucedió».
  - «Caballeros» se usa aquí en sentido de hombres montados, no como título nobiliario.
  - «Vestiduras de oro» mantiene la imaginería resplandeciente del griego.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto y corresponden solo a esas alternativas.
