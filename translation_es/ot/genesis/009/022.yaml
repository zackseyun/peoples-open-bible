revisions:
- from: Y Cam[a], padre de Canaán, vio la desnudez de su padre y se lo contó a sus dos hermanos afuera.
  to: Y Cam[a], el padre de Canaán, vio la desnudez de su padre y se lo dijo a sus dos hermanos fuera.
  rationale: 'Se hacen ajustes menores para ceñirse mejor al hebreo y al rastro de auditoría en inglés: se añade «el» en la aposición, se sustituye «se lo contó» por «se lo dijo» para evitar una expansión más interpretativa, y se cambia «afuera» por «fuera» para un registro más digno y bíblicamente fluido. La nota se mantiene porque preserva correctamente la alternativa literal y la tensión interpretativa.'
