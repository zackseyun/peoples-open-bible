    text: O «mi culpa» o «mi pecado»; el hebreo עָוֹן puede denotar iniquidad, culpa o la carga/consecuencia de la culpa.
    reason: lexical_alternative
  revision_rationale: No hace falta cambiar el texto principal. Se revisan las notas para alinearlas con el expediente inglés, conservar las alternativas léxicas documentadas para עָוֹן y dejar en «tu nombre» la explicación cultural/teológica correspondiente.
