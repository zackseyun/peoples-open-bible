    issue: «las fortunas de su pueblo» es poco idiomático en español
    rationale: Aunque calca el inglés auditado, en español «fortunas» suele asociarse a riqueza o suerte individual. Para el modismo hebreo, «la situación de su pueblo» o «el bienestar de su pueblo» comunica mejor la reversión de la aflicción.
  - severity: low
    issue: La nota al pie usa una literalidad española algo rígida
    rationale: «Haga volver la cautividad de su pueblo» reproduce la estructura, pero no suena natural en español. Puede mantenerse como explicación más literal del modismo con una redacción más clara, por ejemplo «haga volver a los cautivos de su pueblo», añadiendo que se trata de un modismo hebreo.
  revised_spanish_text: ¡Oh[a], que la salvación de Israel viniera de Sion! Cuando Yahvé restaure la situación de su pueblo, Jacob se regocijará; Israel se alegrará.
