translation:
  language: es
  text: Mi paloma[a], mi perfecta[b], es la única; es la única de su madre, pura[c] para quien la dio a luz. Las hijas[d] la vieron y la llamaron dichosa; las reinas y las concubinas también la alabaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi amada'. El hebreo dice literalmente 'mi paloma' y conserva una imagen afectiva y poética.
    reason: lexical_alternative
  - marker: b
    text: O 'mi intachable' o 'mi sin defecto'. El hebreo puede expresar integridad, completitud o belleza sin mancha.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como 'selecta' o 'radiante'; el adjetivo hebreo admite una gama de matices además de la pureza.
    reason: lexical_alternative
  - marker: d
    text: '''Hijas'' puede referirse más ampliamente a jóvenes o doncellas en el lenguaje poético del libro.'
    reason: cultural_note
lexical_decisions:
- source_word: יוֹנָתִי
  english_pob_choice: my dove
  chosen_spanish: mi paloma
  alternatives_spanish:
  - mi querida
  - mi amada
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la paloma, que en Cantares funciona como metáfora afectiva y poética. 'Mi paloma' es natural en español y evita diluir el símil en un simple apelativo sentimental.
- source_word: תַמָּתִי
  english_pob_choice: my flawless one
  chosen_spanish: mi perfecta
  alternatives_spanish:
  - mi impecable
  - mi sin defecto
  lexicon: HALOT
  rationale: El hebreo expresa integridad/completitud y, en este contexto, belleza sin mancha. 'Perfecta' comunica bien esa plenitud en español sin volverlo excesivamente moralizante; se preserva así la tensión entre cualidad estética y moral posible.
- source_word: אַחַת הִיא
  english_pob_choice: is the only one
  chosen_spanish: es la única
  alternatives_spanish:
  - es una sola
  - es singular
  lexicon: HALOT
  rationale: La repetición enfatiza exclusividad y singularidad. 'La única' reproduce mejor esa fuerza que un mero 'una'.
- source_word: לְאִמָּהּ
  english_pob_choice: of her mother
  chosen_spanish: de su madre
  alternatives_spanish:
  - para su madre
  - junto a su madre
  lexicon: HALOT
  rationale: En español, la relación posesiva/relacional se expresa con 'de'. Conserva el sentido de pertenencia o procedencia señalado por el hebreo sin sobrecargar la frase.
- source_word: בָּרָה
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - elegida
  - radiante
  lexicon: HALOT
  rationale: '''Pura'' mantiene el valor básico del adjetivo y también deja abierta la posible connotación de selecta o resplandeciente, que el contexto poético puede sugerir. Se evita reducirlo a una sola interpretación secundaria.'
- source_word: לְיוֹלַדְתָּהּ
  english_pob_choice: to the one who bore her
  chosen_spanish: para la que la dio a luz
  alternatives_spanish:
  - para la que la alumbró
  - para su madre
  lexicon: HALOT
  rationale: La forma participial se refiere a la persona que la engendró/dio a luz. 'La que la dio a luz' es idiomático y claro en español; se usa 'para' siguiendo el valor relacional del ל hebreo en este contexto.
- source_word: בָנוֹת
  english_pob_choice: daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - las jóvenes
  - las doncellas
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal para mantener la dicción poética del texto. En Cantares puede abarcar jóvenes mujeres, pero el término 'hijas' respeta el vocabulario de la fuente.
- source_word: וַיְאַשְּׁרוּהָ
  english_pob_choice: called her blessed
  chosen_spanish: la felicitaron
  alternatives_spanish:
  - la llamaron bienaventurada
  - la declararon dichosa
  lexicon: HALOT
  rationale: El piel de אשר expresa declarar feliz o bienaventurada. En español, 'la felicitaron' transmite la aclamación positiva de forma comprensible y fluida; no se fuerza una formulación devocional que podría sonar más interpretativa.
- source_word: מְלָכ֥וֹת
  english_pob_choice: queens
  chosen_spanish: las reinas
  alternatives_spanish:
  - reinas
  lexicon: HALOT
  rationale: Traducción directa y transparente del plural.
- source_word: וּפִילַגְשִׁים
  english_pob_choice: and concubines also
  chosen_spanish: y las concubinas
  alternatives_spanish:
  - y también las concubinas
  lexicon: HALOT
  rationale: Se mantiene el paralelo con 'las reinas'. El 'también' se integra en la coordinación de la oración para no sobrecargarla, pero la idea de inclusión de ambos grupos permanece.
- source_word: וַיְהַלְלוּהָ
  english_pob_choice: praised her
  chosen_spanish: la alabaron
  alternatives_spanish:
  - la ensalzaron
  - la celebraron
  lexicon: HALOT
  rationale: '''Alabar'' es la equivalencia natural de הלל en este contexto. ''La alabaron'' conserva el tono poético y el objeto directo femenino.'
theological_decisions:
- issue: 'Sentido de בָּרָה: pureza moral, belleza selecta o brillo'
  english_pob_reading: pure / choice / radiant are possible nuances, with 'pure' chosen in the main text
  chosen_spanish_reading: pura en el texto principal, sin cerrar las otras resonancias
  alternative_spanish_readings:
  - elegida
  - radiante
  - selecta
  rationale: El hebreo admite un campo semántico más amplio que la pureza moral estricta. En español, 'pura' es el término base más fiel y comprensible, pero la nota lexical deja abierto que también puede sugerir selectez o resplandor.
  doctrine_reference: Poética bíblica; semántica léxica de HALOT para בָּרָה
- issue: 'Valor de אַחַת הִיא: no solo identidad numérica, sino singularidad exclusiva'
  english_pob_reading: is the only one
  chosen_spanish_reading: es la única
  alternative_spanish_readings:
  - es una sola
  - es singular
  rationale: La repetición en hebreo intensifica la exclusividad. 'La única' conserva esa fuerza sin necesidad de explicar demasiado, y evita una lectura meramente aritmética.
  doctrine_reference: Poética hebrea; uso enfático de singularidad en Cantares
- issue: 'וַיְאַשְּׁרוּהָ: bendecir vs felicitar vs declarar dichosa'
  english_pob_reading: called her blessed
  chosen_spanish_reading: la felicitaron
  alternative_spanish_readings:
  - la llamaron bienaventurada
  - la declararon dichosa
  rationale: '''Felicitar'' comunica la reacción pública admirativa del verso y su tono celebratorio. Se evita imponer un registro litúrgico que en español podría sonar menos natural en un poema de amor.'
  doctrine_reference: Registro poético de Cantar de los Cantares; semántica de אשר en piel
translation_notes:
  revision_awareness: Se revisó el texto a la luz del audit trail inglés y del subrayado morfológico hebreo. Se preservó la imagen de la paloma, la exclusividad de אַחַת הִיא, la relación materna de לְאִמָּהּ, y la amplitud semántica de בָּרָה sin nivelar las tensiones del original. No se aplicaron revisiones posteriores en el paquete fuente; el borrador refleja el estado de alta concordancia indicado.
  spanish_consistency_notes:
  - Se mantiene 'paloma' en sentido metafórico, no como domesticación a 'querida'.
  - '''La única'' reproduce la exclusividad enfática del hebreo mejor que una traducción meramente numérica.'
  - Se eligió 'felicitaron' para evitar una fórmula demasiado eclesiástica; la nota conserva la alternativa 'la llamaron bienaventurada'.
  - Los marcadores de nota se usan una sola vez y corresponden exactamente a los puntos de ambigüedad señalados en el texto.
