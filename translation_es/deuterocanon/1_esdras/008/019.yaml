translation:
  language: es
  text: Y yo, el rey Artajerjes, he dado órdenes a los tesoreros de Siria y de Fenicia, para que todo lo que Esdras, el sacerdote y lector de la ley de Dios Altísimo, les pida[a], se lo entreguen cuidadosamente, hasta cien talentos de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les envíe». El griego dice literalmente «envíe», pero en este contexto de suministro probablemente se refiere a enviar una solicitud o requisición.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξα
  english_pob_choice: have given orders
  chosen_spanish: he dado órdenes
  alternatives_spanish:
  - he mandado
  - he ordenado
  lexicon: BDAG
  rationale: El aoristo expresa una orden real ya emitida. «He dado órdenes» suena natural en español moderno y conserva el carácter autoritativo del rey sin endurecerlo innecesariamente.
- source_word: τοῖς γαζοφύλαξι
  english_pob_choice: treasurers
  chosen_spanish: los tesoreros
  alternatives_spanish:
  - los guardianes del tesoro
  - los oficiales del tesoro
  lexicon: LSJ
  rationale: El término designa funcionarios encargados del tesoro. «Tesoreros» transmite la función de manera clara y idiomática en español.
- source_word: ἐπιμελῶς
  english_pob_choice: carefully
  chosen_spanish: cuidadosamente
  alternatives_spanish:
  - diligentemente
  - con esmero
  lexicon: LSJ
  rationale: El adverbio comunica atención esmerada en la ejecución. «Cuidadosamente» conserva esa idea sin añadir matices de rapidez o rigidez.
- source_word: ἀποστείλῃ
  english_pob_choice: may send for
  chosen_spanish: les envíe
  alternatives_spanish:
  - les pida
  - les remita
  lexicon: BDAG
  rationale: En este contexto de provisión, el verbo puede implicar un envío de solicitud o requisición. El español «les envíe» mantiene la apertura del griego sin forzar explícitamente «pedir»; el contexto de la provisión real sustenta la interpretación.
- source_word: ἀναγνώστης
  english_pob_choice: reader
  chosen_spanish: lector
  alternatives_spanish:
  - escriba
  - lector público
  lexicon: LSJ
  rationale: La palabra griega significa literalmente «lector». Aunque otras tradiciones presentan a Esdras como escriba, este testimonio griego especifica «lector», y el español debe preservarlo.
- source_word: τοῦ νόμου τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: of the law of God Most High
  chosen_spanish: de la ley de Dios Altísimo
  alternatives_spanish:
  - de la ley del Dios Altísimo
  - de la ley de Dios el Altísimo
  lexicon: LSJ
  rationale: La construcción mantiene el título divino con la misma secuencia básica del griego. «Dios Altísimo» es natural en español y conserva la dignidad del título.
- source_word: ἕως ἀργυρίου τάλαντων ἑκατόν
  english_pob_choice: up to one hundred talents of silver
  chosen_spanish: hasta cien talentos de plata
  alternatives_spanish:
  - hasta un total de cien talentos de plata
  - hasta cien talentos de plata
  lexicon: LSJ
  rationale: ἕως marca un límite máximo. «Hasta» expresa con claridad el tope autorizado y «plata» reproduce el valor monetario del griego.
- source_word: ἰδοὺ
  english_pob_choice: omitted in English
  chosen_spanish: —
  alternatives_spanish:
  - he aquí
  - mirad
  lexicon: BDAG
  rationale: Como partícula discursiva de énfasis, puede quedar implícita en el tono real del enunciado español. No es necesario añadir una fórmula que sonaría más arcaica.
theological_decisions:
- issue: Título divino τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_reading: God Most High
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - Dios el Altísimo
  rationale: Se trata del título del Dios de Israel. «Dios Altísimo» mantiene la fuerza titulativa y evita una formulación demasiado pesada para el español contemporáneo.
  doctrine_reference: Translate divine titles with readable dignity; preserve title force.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el testimonio griego de 1 Esdras 8:19, usando el contexto de la auditoría inglesa solo como apoyo para decisiones ya justificadas por el original. Se preservan las particularidades del texto griego: los tesoreros de Siria y Fenicia, el título «lector» para Esdras y el límite de «cien talentos de plata».'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto fuente requiere el nombre divino, pero aquí el griego dice «Dios» y no exige reemplazo.
  - Se conserva «lector» para ἀναγνώστης, en lugar de armonizarlo con tradiciones paralelas que prefieren «escriba».
  - Se mantiene «cien talentos de plata» como límite monetario, sin convertirlo a una equivalencia moderna.
  - La fórmula «he dado órdenes» refleja el pasado de la decisión real sin añadir solemnidad arcaizante innecesaria.
