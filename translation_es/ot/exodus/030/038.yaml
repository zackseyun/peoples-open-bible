    text: 'O: «para disfrutar su aroma» / «para oler su fragancia». El infinitivo hebreo expresa la fabricación de ese incienso para olerlo o disfrutarlo personalmente.'
    reason: lexical_alternative
  - marker: b
    text: «Será cortado de entre su pueblo» es una fórmula legal estándar. Puede implicar muerte, expulsión o remoción divina, según el contexto.
    reason: alternative_reading
