review_pass:
  verdict: revise
  source_alignment_summary: El borrador acierta en συνάγαγε → «Reúne», ἐλέους → «misericordia» y χρηστότης → «bondad». Sin embargo, «la dispersión de Israel» suena demasiado abstracto en español para un objeto directo de «reúne» y no preserva bien el referente humano colectivo de διασπορά en este contexto imperativo. El inglés auditado terminó en «the dispersed of Israel», manteniendo nota literal para «the dispersion of Israel»; el español debe reflejar mejor ese equilibrio.
  spanish_quality_summary: «Reúne la dispersión de Israel» es gramaticalmente posible, pero poco natural y algo opaco para lectura eclesial general. «Reúne a los dispersos de Israel» comunica con claridad el sentido humano colectivo sin perder dignidad. También conviene añadir la nota que preserve la alternativa literal y otra para «bondad»/«benevolencia», manteniendo el rastro del audit trail.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. La cuestión principal es διασπορά: en español conviene priorizar una forma legible con referente humano («los dispersos») y conservar «la dispersión de Israel» en nota como alternativa literal. «Misericordia» y «bondad» están bien alineados.'
  issues:
  - severity: medium
    issue: «la dispersión de Israel» resulta demasiado abstracto en español
    rationale: Aunque διασπορά puede ser literalmente «dispersión», en esta oración el verbo «reúne» pide con más naturalidad un referente humano colectivo. La frase actual suena menos idiomática y puede dificultar la comprensión.
  - severity: medium
    issue: Falta una nota para preservar la alternativa literal en el lugar correcto tras cambiar a una formulación más natural
    rationale: El audit trail inglés conserva explícitamente la literalidad de διασπορά. Si el español adopta «los dispersos», debe retenerse esa alternativa en nota.
  - severity: low
    issue: La nota de «bondad» incluye «amabilidad», que aquí es menos precisa
    rationale: Para χρηστότης en este contexto, «benevolencia» o «bondad» reflejan mejor la cualidad moral benevolente que «amabilidad», que puede sonar demasiado superficial.
  revised_spanish_text: Reúne a los dispersos[a] de Israel con misericordia y bondad[b].
  revised_footnotes:
  - marker: a
    text: Literalmente, «la dispersión de Israel»; también puede entenderse como «el pueblo disperso de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «benevolencia» para «bondad».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «la dispersión de Israel» por «los dispersos de Israel» porque en español esta construcción expresa de forma más natural el referente humano colectivo de διασπορά con el verbo «reúne». La alternativa literal se conserva en nota para mantener el peso léxico e histórico del término griego. Se simplifica además la nota de χρηστότης para evitar una alternativa menos precisa en este contexto.
