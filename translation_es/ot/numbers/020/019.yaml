translation:
  language: es
  text: 'Y los hijos de Israel[a] le dijeron: «Subiremos por la calzada[b], y si yo y mi ganado bebemos tu agua, entonces pagaré su precio. Solo déjame pasar a pie[c], nada más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «por la carretera principal». El término hebreo se refiere a una vía elevada o camino principal.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «con mis pies pasaré», un modismo para indicar un simple tránsito por el país.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conserva la forma hebrea idiomática y evita sustituirla por un gentilicio más interpretativo. «Hijos» comunica bien la relación de pertenencia y mantiene la transparencia del original.
- source_word: בַּמְסִלָּה
  english_pob_choice: by the highway
  chosen_spanish: por la calzada
  alternatives_spanish:
  - por el camino principal
  - por la carretera
  lexicon: HALOT
  rationale: מְסִלָּה denota una vía elevada o carretera principal. «Calzada» en español conserva la idea de una vía establecida y digna, sin perder la referencia a una ruta principal.
- source_word: נַעֲלֶה
  english_pob_choice: we will go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - iremos subiendo
  - iremos
  lexicon: HALOT
  rationale: El verbo hebreo dice literalmente «subiremos». En español, «subiremos» preserva la imagen verbal sin forzar una perífrasis menos directa.
- source_word: מֵימֶיךָ
  english_pob_choice: your water
  chosen_spanish: tu agua
  alternatives_spanish:
  - tus aguas
  - agua de ti
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma plural idiomática, en español la forma natural y fiel es el singular colectivo «agua».
- source_word: נִשְׁתֶּה אֲנִי וּמִקְנַי
  english_pob_choice: I and my livestock drink
  chosen_spanish: yo y mi ganado bebemos
  alternatives_spanish:
  - mi ganado y yo bebemos
  - yo y mis animales bebemos
  lexicon: HALOT
  rationale: «Ganado» refleja bien מִקְנֶה y suena más natural en español bíblico que «animales». Mantengo la coordinación con «yo» para reflejar el hebreo, aunque el hablante representa al grupo.
- source_word: וְנָתַתִּי מִכְרָם
  english_pob_choice: then I will pay its price
  chosen_spanish: entonces pagaré su precio
  alternatives_spanish:
  - entonces daré su precio
  - entonces pagaré el precio
  lexicon: HALOT
  rationale: מִכְרָם se refiere al precio o compensación. «Pagaré su precio» expresa el valor transaccional de manera clara y fiel.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: HALOT
  rationale: Introduce la petición limitativa. «Solo» es natural en español y conserva el énfasis restrictivo del hebreo.
- source_word: אֵין דָּבָר
  english_pob_choice: nothing more
  chosen_spanish: nada más
  alternatives_spanish:
  - no hay nada más
  - ninguna otra cosa
  lexicon: HALOT
  rationale: Es una expresión idiomática de minimización. «Nada más» comunica el sentido con concisión y sin sobreexplicar.
- source_word: בְּרַגְלַי אֶעֱבֹרָה
  english_pob_choice: let me pass through on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - con mis pies
  - pasando a pie
  lexicon: HALOT
  rationale: La mención literal de los pies funciona como modismo de tránsito sencillo. «A pie» es la forma natural en español y conserva la idea de pasar sin carga ni hostilidad.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: conserva la ruta como vía principal («calzada») con un valor espacial natural en español, y mantiene la petición final breve y formal («Déjame pasar solo a pie, nada más»), sin borrar la tensión idiomática de «con los pies».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se prefirió «hijos de Israel» como equivalente transparente del hebreo, en línea con la decisión inglesa de mantener la forma idiomática.
  - «Ganado» traduce מִקְנֶה con un registro bíblico claro y amplio, sin reducirlo a «cattle».
  - La expresión final se mantuvo idiomática para no forzar una traducción literal que suene extraña en español.
