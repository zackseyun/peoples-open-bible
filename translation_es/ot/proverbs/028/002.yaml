base_translation:
  language: en
  yaml_path: translation/ot/proverbs/028/002.yaml
  text: Because of a land's transgression[a], its rulers are many, but by a man of understanding and knowledge[b], it endures long.
  footnotes:
  - marker: a
    text: Or, 'Because of a land's transgression, its princes are many; but by a man who understands and knows, it is prolonged.' The Hebrew of the second line is difficult; the sense is that wise understanding brings lasting stability.
    reason: alternative_reading
  - marker: b
    text: '''Man'' translates Hebrew adam, a singular generic term here referring representatively to a human leader or counselor, not necessarily excluding others by sex.'
    reason: lexical_alternative
