translation:
  language: es
  text: Y le mandó acampar frente a Judea[a]; y le mandó construir Kedrón[b] y fortificar las ciudades, y luchar contra el pueblo. Pero el rey estaba persiguiendo a Trifón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frente a Judea». La expresión griega es espacial y señala una posición opuesta o delante de Judea.
    reason: lexical_alternative
  - marker: b
    text: O «reconstruir Kedrón». El verbo griego no especifica por sí mismo si el lugar se estaba construyendo por primera vez o restaurando.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατο
  english_pob_choice: he commanded
  chosen_spanish: le mandó
  alternatives_spanish:
  - le ordenó
  - le comandó
  lexicon: BDAG
  rationale: El aoristo medio expresa una instrucción con autoridad. «Le mandó» conserva la fuerza directiva con naturalidad en español y evita el tono demasiado técnico de «comandó».
- source_word: παρεμβάλλειν
  english_pob_choice: to encamp
  chosen_spanish: acampar
  alternatives_spanish:
  - establecer campamento
  - hacer campamento
  lexicon: LSJ
  rationale: El verbo se usa en contexto militar y señala la acción de instalar el campamento. «Acampar» es la equivalencia más directa y clara en español moderno.
- source_word: κατὰ πρόσωπον τῆς Ἰουδαίας
  english_pob_choice: opposite Judea
  chosen_spanish: frente a Judea
  alternatives_spanish:
  - enfrente de Judea
  - opuesto a Judea
  - mirando hacia Judea
  lexicon: LSJ
  rationale: La frase es espacial, no necesariamente hostil. «Frente a» comunica la posición sin sobrecargar el sentido con oposición bélica que el griego no exige aquí.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - reconstruir
  - levantar
  lexicon: BDAG
  rationale: El verbo significa edificar/construir. «Construir» es transparente y no añade la idea de «reconstruir», que el texto griego no especifica.
- source_word: τὴν Κεδρὼν
  english_pob_choice: Kedron
  chosen_spanish: Kedrón
  alternatives_spanish:
  - Cedrón
  lexicon: transliteration
  rationale: Se conserva el nombre propio mediante transliteración. «Kedrón» refleja bien la forma griega Κεδρὼν y mantiene consistencia con la política del proyecto.
- source_word: ὀχυρῶσαι
  english_pob_choice: fortify
  chosen_spanish: fortificar
  alternatives_spanish:
  - hacer fuertes
  - reforzar
  lexicon: LSJ
  rationale: El verbo indica hacer una plaza fuerte o defensiva. «Fortificar» es el equivalente más preciso y natural en español militar.
- source_word: τὰς πόλεις
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las plazas
  lexicon: BDAG
  rationale: πόλις normalmente designa «ciudad». «Las ciudades» conserva el sentido básico sin desplazarlo a un registro más general o técnico.
- source_word: ὅπως πολεμῇ τὸν λαόν
  english_pob_choice: to fight against the people
  chosen_spanish: luchar contra el pueblo
  alternatives_spanish:
  - hacer guerra al pueblo
  - combatir al pueblo
  - luchar contra el pueblo
  lexicon: BDAG
  rationale: La construcción expresa finalidad, y πολεμέω aquí tiene valor hostil. «Luchar contra el pueblo» reproduce bien esa intención y suena natural en español.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: BDAG
  rationale: λαός se refiere al pueblo colectivo, aquí el pueblo judío. «El pueblo» es la equivalencia directa y evita imponer una lectura moderna de «nación».
- source_word: ἐδίωκε
  english_pob_choice: was pursuing
  chosen_spanish: estaba persiguiendo
  alternatives_spanish:
  - perseguía
  - seguía persiguiendo
  lexicon: BDAG
  rationale: El imperfecto marca acción continua en el pasado. «Estaba persiguiendo» conserva mejor ese aspecto que un perfecto simple.
- source_word: Τρύφωνα
  english_pob_choice: Tryphon
  chosen_spanish: Trifón
  alternatives_spanish:
  - Trifon
  lexicon: transliteration
  rationale: Se translitera el nombre propio al español común. «Trifón» es la forma más natural y legible para lectores hispanohablantes.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del texto inglés, que prefirió «build Kedron» en vez de «build up Kedron». Por eso el español usa «construir Kedrón» sin añadir «reconstruir» ni una expansión interpretativa. También se mantiene el valor espacial de κατὰ πρόσωπον y el aspecto imperfectivo de ἐδίωκε con una forma continua en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a יהוה; este versículo no lo contiene.
  - Se conserva la transliteración de nombres propios en forma hispana estándar.
  - Se evita introducir lenguaje litúrgico tradicional no motivado por el griego.
  - Se preserva la distinción entre posición espacial («frente a») y hostilidad explícita («contra») según la construcción de cada cláusula.
