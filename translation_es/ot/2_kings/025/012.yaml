  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Capitán de la guardia» sigue correctamente la decisión contextual para רַב טַבָּחִים. «Viñadores» y «agricultores» preservan bien los oficios. La revisión añade notas para mantener las alternativas léxicas documentadas en la POB inglesa.
