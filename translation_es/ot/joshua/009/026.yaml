- from: Así lo hizo con ellos, y los libró de la mano de los hijos de Israel, y no los mataron.
  to: Así lo hizo por ellos, y los libró de la mano de los hijos de Israel[a], y no los mataron.
  rationale: Se cambió 'con ellos' por 'por ellos' para reflejar mejor לָהֶם en este contexto de acción hecha en favor de los gabaonitas. Se mantuvo 'los hijos de Israel' por fidelidad al hebreo y a la política del proyecto, y se añadió la nota alternativa correspondiente.
