    reason: lexical_alternative
  - marker: c
    text: O 'todos los días'; el hebreo 'todos los días' es un modismo literal de continuidad duradera.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'estatutos fijos' a 'ordenanzas fijas' para reflejar mejor el contexto creacional y la decisión léxica documentada. Se cambió 'dice Yahvé' por 'declara Yahvé' para representar con más fidelidad la fórmula profética נְאֻם יְהוָה. También se limpió la nota b eliminando el anglicismo 'offspring' y manteniendo el sentido colectivo de זֶרַע.
