review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del hebreo: la apertura discursiva, «los nombres», «los hijos de Israel», el movimiento «a Egipto» y el acompañamiento «con Jacob». También preserva adecuadamente la nota alternativa sobre la conjunción inicial. Sin embargo, «cada uno con su casa» no representa con suficiente claridad la decisión léxica documentada para אִישׁ וּבֵיתוֹ, donde בַּיִת se entiende como unidad doméstica/familiar, no edificio.'
  spanish_quality_summary: El español es claro y digno, pero «cada uno con su casa» suena algo físico y menos natural en contexto genealógico/listado. «Cada hombre con su familia» sería claro pero pierde el matiz de household; «cada uno con su casa» conserva demasiado literalmente «casa». Una formulación como «cada uno con su familia» o mejor «cada hombre con su casa» sigue siendo ambigua. La opción más fiel y legible en español neutro es «cada uno con su casa» solo si se añade nota, pero el texto principal gana claridad con «cada uno con su familia»; aun así, para alinearse con el audit trail, lo más recomendable es «cada uno con los de su casa», que comunica household sin paráfrasis excesiva.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Hijos de Israel» está bien. No aparecen términos como Yahvé, Mesías, Espíritu, etc. La principal cuestión léxica es בַּיִת > «casa»/«hogar»/«familia»/«los de su casa»; por el rationale documentado, debe evitarse una lectura meramente arquitectónica.
  issues:
  - severity: medium
    issue: «cada uno con su casa» puede leerse como edificio, no como household
    rationale: El rationale inglés especifica que בַּיִת aquí se refiere al hogar/familia como unidad doméstica. En español moderno, «su casa» tiende a sonar más física que relacional en este contexto.
  - severity: low
    issue: La decisión léxica interna reconoce la posible insuficiencia de «casa» pero no la corrige en el texto
    rationale: El propio comentario del borrador admite que «casa» en español puede sonar más concreto que «household». Conviene ajustar el texto principal para evitar esa tensión.
  revised_spanish_text: Ahora bien, estos son los nombres de los hijos de Israel que vinieron a Egipto con Jacob[a], cada uno con los de su casa.
  revised_footnotes:
  - marker: a
    text: 'O: «Y estos son los nombres». La conjunción hebrea abre el texto enlazándolo con la narración anterior de Génesis.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la buena estructura general del borrador, pero se ajusta אִישׁ וּבֵיתוֹ a «cada uno con los de su casa» para expresar con naturalidad española la idea de household/unidad familiar, evitando que «su casa» se entienda principalmente como edificio. No se requieren más cambios.
