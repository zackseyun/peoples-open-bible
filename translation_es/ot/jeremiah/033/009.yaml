translation:
  language: es
  text: Y será para mí un nombre de gozo, de alabanza y de gloria delante de todas las naciones de la tierra, que oirán de todo el bien que yo hago. Y temerán y se estremecerán por todo el bien y por toda la paz[a] que yo le doy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda la prosperidad» o «todo el bienestar»; el hebreo shalom incluye paz, bienestar e integridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה לִּי
  english_pob_choice: And it will be to me
  chosen_spanish: Y será para mí
  alternatives_spanish:
  - Y ella será para mí
  - Y vendrá a ser para mí
  lexicon: HALOT
  rationale: El hebreo usa tercera persona femenina singular; el contexto personifica a la ciudad. En español, sin embargo, el verbo con sujeto implícito y el complemento 'para mí' permite una formulación natural y pública sin forzar el pronombre 'ella' donde no es necesario para la claridad del verso. Se conserva la referencia femenina al final con 'a ella'.
- source_word: לְשֵׁם שָׂשׂוֹן
  english_pob_choice: a name of joy
  chosen_spanish: un nombre de gozo
  alternatives_spanish:
  - un nombre de alegría
  - un nombre de regocijo
  lexicon: HALOT
  rationale: שֵׁם conserva la idea de reputación o nombre público; 'nombre de gozo' mantiene la imagen semítica y su valor de renombre. 'Gozo' suena más bíblico y solemne que 'alegría' en este contexto profético.
- source_word: לִתְהִלָּה וּלְתִפְאֶרֶת
  english_pob_choice: praise, and glory
  chosen_spanish: de alabanza y de gloria
  alternatives_spanish:
  - de alabanza y de esplendor
  - de elogio y de gloria
  lexicon: HALOT
  rationale: תְהִלָּה se rinde naturalmente como 'alabanza'. תִפְאֶרֶת puede ser 'gloria', 'esplendor' o 'belleza'; 'gloria' conserva el registro elevado y el sentido de honor público que el texto exige.
- source_word: לְכֹל גּוֹיֵי הָאָרֶץ
  english_pob_choice: before all the nations of the earth
  chosen_spanish: delante de todas las naciones de la tierra
  alternatives_spanish:
  - ante todas las naciones de la tierra
  - en presencia de todas las naciones de la tierra
  lexicon: HALOT
  rationale: El ל inicial expresa referencia/relación pública; 'delante de' reproduce bien la idea de visibilidad ante las naciones sin convertir la frase en un simple dativo. 'Delante de' es natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר יִשְׁמְעוּ
  english_pob_choice: which will hear of
  chosen_spanish: que oirán de
  alternatives_spanish:
  - que oirán
  - cuando oigan
  lexicon: HALOT
  rationale: El hebreo indica que las naciones oirán un informe acerca de la acción divina. 'Oirán de' mantiene esa noción de noticia/reportaje mejor que un simple 'oirán'.
- source_word: אֶת כָּל הַטּוֹבָה אֲשֶׁר אָנֹכִי עֹשֶׂה אֹתָם
  english_pob_choice: all the good that I am doing for them
  chosen_spanish: todo el bien que yo hago por ellas
  alternatives_spanish:
  - todo el bien que yo hago para ellas
  - toda la bondad que yo les hago
  lexicon: HALOT
  rationale: הַטּוֹבָה aquí denota el bien concreto que Dios realiza, no una cualidad abstracta. 'Hago por ellas' reproduce el sentido idiomático de hacer bien a alguien. 'Ellas' concuerda con 'las naciones' del verso, y evita oscurecer el antecedente.
- source_word: וּפָחֲדוּ וְרָגְזוּ
  english_pob_choice: And they will fear and tremble
  chosen_spanish: Y temerán y se estremecerán
  alternatives_spanish:
  - Y temerán y temblarán
  - Y tendrán miedo y se estremecerán
  lexicon: HALOT
  rationale: פחד es 'temer'; רגז aquí expresa sobresalto, temblor o agitación. 'Se estremecerán' comunica una reacción intensa, reverente y no necesariamente hostil.
- source_word: עַל כָּל הַטּוֹבָה
  english_pob_choice: because of all the good
  chosen_spanish: por todo el bien
  alternatives_spanish:
  - a causa de todo el bien
  - por causa de todo el bien
  lexicon: HALOT
  rationale: עַל tiene valor causal en el contexto; en español, 'por' funciona con naturalidad y conserva el motivo de la reacción.
- source_word: וְעַל כָּל הַשָּׁלוֹם
  english_pob_choice: because of all the peace
  chosen_spanish: y por toda la paz
  alternatives_spanish:
  - y a causa de toda la paz
  - y por todo el bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. Se eligió 'paz' como término base, preservando el valor más conocido y teológicamente cargado; el sentido amplio queda registrado en la nota.
- source_word: אֲשֶׁר אָנֹכִי עֹשֶׂה לָּהּ
  english_pob_choice: that I am bringing to her
  chosen_spanish: que yo estoy dando a ella
  alternatives_spanish:
  - que yo hago para ella
  - que yo le estoy dando
  lexicon: HALOT
  rationale: Con 'paz' en español, 'dar' expresa de forma natural el acto divino sin perder el sentido de provisión o concesión. Se conserva el referente femenino singular con 'a ella', siguiendo el hebreo.
theological_decisions:
- issue: Reacción de las naciones ante la restauración divina
  english_pob_reading: awed fear in response to divine blessing
  chosen_spanish_reading: temor y estremecimiento reverente ante el bien y la paz de Yahvé
  alternative_spanish_readings:
  - terror
  - agitación política
  - sorpresa admirativa
  rationale: El hebreo permite una reacción de temor real, pero el motivo inmediato es el bien y la paz que Dios concede. 'Temerán y se estremecerán' mantiene la tensión entre asombro reverente y temor sin reducirla a hostilidad o simple admiración.
  doctrine_reference: Preservar la tensión teológica sin suavizarla
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se evitó personificar en español con ''ella'' al inicio y se conservó la referencia femenina solo donde el hebreo la vuelve explícita; también se reflejó la opción revisada de ''which'' para las naciones mediante una cláusula relativa natural en español.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de 'SEÑOR' conforme al estándar del proyecto, aunque en este versículo el nombre divino no aparece explícitamente.
  - Se mantuvo 'paz' para שָׁלוֹם en el texto principal, dejando constancia de su amplitud semántica en la decisión léxica.
  - Se preservó el referente femenino singular final ('a ella') para reflejar לָּהּ y la personificación de Jerusalén, sin forzar una traducción literal inicial que sonara poco natural en español.
