translation:
  language: es
  text: 'Aquí estoy; testifiquen contra mí delante de Yahvé y delante de su ungido: ¿de quién he tomado un buey, o de quién he tomado un burro? ¿A quién he oprimido? ¿A quién he maltratado[a]? ¿De la mano de quién he tomado un soborno[b], para cerrar mis ojos por eso? Se lo restituiré a ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿A quién he hecho daño?» El verbo hebreo aquí es difícil; puede abarcar maltrato, abuso u opresión, y el contexto favorece una acusación amplia de trato injusto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «rescate» o «pago». En este contexto judicial, la idea es de un pago corrupto que inclina la justicia y permite apartar la vista del caso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Aquí estoy presente
  - Aquí me tienen
  lexicon: HALOT
  rationale: Expresa la auto-presentación inmediata y pública de Samuel en un registro natural del español, sin añadir solemnidad innecesaria ni perder la disponibilidad que comunica el hebreo.
- source_word: עֲנוּ בִי
  english_pob_choice: testify against me
  chosen_spanish: testifiquen contra mí
  alternatives_spanish:
  - respondan contra mí
  - den testimonio contra mí
  lexicon: HALOT
  rationale: En un contexto forense y público, el verbo pide una respuesta testimonial. 'Testifiquen contra mí' mantiene la fuerza jurídica mejor que una simple respuesta.
- source_word: נֶגֶד יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' conserva la idea de comparecencia pública ante la presencia divina; se usa Yahvé según el criterio del proyecto para el Nombre.'
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - el ungido de él
  lexicon: HALOT
  rationale: El contexto es monárquico-histórico, así que 'su ungido' conserva la referencia al rey investido sin importar un título mesiánico posterior.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - res
  lexicon: HALOT
  rationale: '''Buey'' es el equivalente natural en español para el animal mencionado en una acusación de apropiación de propiedad; es preciso y claro en registro bíblico.'
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: burro
  alternatives_spanish:
  - asno
  - pollino
  lexicon: HALOT
  rationale: '''Burro'' es comprensible y directo para lectores modernos; mantiene el valor del animal de carga sin el posible registro más arcaico de ''asno''.'
- source_word: עָשַׁקְתִּי
  english_pob_choice: have I oppressed
  chosen_spanish: he oprimido
  alternatives_spanish:
  - he explotado
  - he defraudado
  lexicon: HALOT
  rationale: La raíz suele implicar opresión o explotación de carácter económico/social. 'Oprimido' preserva esa amplitud moral y jurídica.
- source_word: רַצּוֹתִי
  english_pob_choice: have I mistreated
  chosen_spanish: he maltratado
  alternatives_spanish:
  - he agraviado
  - he hecho daño a
  lexicon: HALOT
  rationale: El verbo es difícil y, según el audit trail, señala trato duro o abusivo. 'Maltratado' distingue esta acusación de la anterior y no aplana la tensión lexical.
- source_word: כֹפֶר
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un rescate
  - una compensación
  lexicon: HALOT
  rationale: El contexto de 'esconder mis ojos' apunta a un pago corrupto que pervierte la justicia. 'Soborno' conserva ese sentido ético-jurídico.
- source_word: אַעְלִים עֵינַי בּוֹ
  english_pob_choice: so that I should hide my eyes with it
  chosen_spanish: para que yo esconda mis ojos con él
  alternatives_spanish:
  - para que yo haga la vista gorda por él
  - para pasar por alto el asunto con él
  lexicon: HALOT
  rationale: Se conserva la imaginería de los ojos y el nexo causal con el pago, siguiendo de cerca la estructura del hebreo y del inglés auditado.
- source_word: וְאָשִׁיב לָכֶם
  english_pob_choice: I will restore it to you
  chosen_spanish: Se lo restituiré a ustedes
  alternatives_spanish:
  - se lo devolveré
  - haré restitución a ustedes
  lexicon: HALOT
  rationale: '''Restituir'' comunica reparación formal además de simple devolución, acorde con el contexto legal de la declaración de inocencia.'
theological_decisions:
- issue: Render the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide usar 'Yahvé' como forma principal en español para el Tetragrámaton. Se evita el encubrimiento por 'SEÑOR' para mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH -> Yahvé'
- issue: Render מְשִׁיחוֹ in a royal-historical setting
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su consagrado
  rationale: Aunque la palabra está emparentada con 'Mesías', aquí designa al rey ungido por Yahvé. 'Su ungido' preserva la referencia histórica sin introducir una carga cristológica no requerida por el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate names'
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del POB en inglés, especialmente la preferencia por 'mistreated' frente a 'crushed' para רַצּוֹתִי y el ajuste de la cláusula causal del soborno. También conserva las decisiones estables del audit trail para el Nombre divino, el título real y la imaginería forense de la perícopa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el criterio terminológico del proyecto.
  - Se usa 'su ungido' y no 'Mesías' para evitar una lectura anacrónica del pasaje.
  - '''Soborno'' y ''restituir'' sostienen el marco jurídico-moral del discurso de Samuel.'
  - El texto conserva el paralelismo retórico y las preguntas sucesivas del hebreo sin suavizarlas.
