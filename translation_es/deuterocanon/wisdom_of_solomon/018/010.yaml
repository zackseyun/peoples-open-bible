translation:
  language: es
  text: Pero el grito discordante de los enemigos resonó[a], y el lamento lastimero por los niños que eran llorados se extendía por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el lamento lastimero de los niños que eran llorados se difundía por todas partes». La estructura griega οἰκτρά διεφέρετο θρηνουμένων παίδων admite una formulación ligeramente distinta en español sin cambiar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντήχει
  english_pob_choice: echoed back
  chosen_spanish: resonó de vuelta
  alternatives_spanish:
  - retumbó de vuelta
  - reverberó
  - hizo eco
  lexicon: LSJ
  rationale: El verbo griego expresa una resonancia de respuesta, no solo un sonido emitido. «Resonó de vuelta» conserva la idea de retorno acústico con español natural y digno.
- source_word: ἀσύμφωνος
  english_pob_choice: discordant
  chosen_spanish: discordante
  alternatives_spanish:
  - inarmónico
  - desafinado
  - desacorde
  lexicon: LSJ
  rationale: «Discordante» reproduce bien la falta de armonía literal y mantiene el matiz de desorden sonoro y emocional del contexto.
- source_word: ἐχθρῶν
  english_pob_choice: of enemies
  chosen_spanish: de los enemigos
  alternatives_spanish:
  - de enemigos
  - de los adversarios
  lexicon: LSJ
  rationale: El genitivo señala de quién procede el grito. Se explicita el artículo en español por fluidez, sin añadir especificación ajena al griego.
- source_word: βοή
  english_pob_choice: cry
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - alarido
  - voz
  lexicon: LSJ
  rationale: En español, «grito» transmite mejor la fuerza audible del término en este pasaje que «clamor», y encaja con el contraste con el lamento que sigue.
- source_word: οἰκτρά
  english_pob_choice: pitiful lament
  chosen_spanish: lamento lastimero
  alternatives_spanish:
  - lamento piteoso
  - lamento compasivo
  - llanto lastimero
  lexicon: LSJ
  rationale: El adjetivo neutro plural funciona casi adverbialmente junto con la cláusula siguiente. «Lamento lastimero» conserva la carga patética sin volver la frase forzada en español.
- source_word: διεφέρετο
  english_pob_choice: was carried abroad
  chosen_spanish: fue llevado por todas partes
  alternatives_spanish:
  - se extendió
  - fue difundido
  - se propagó
  lexicon: LSJ
  rationale: El imperfecto pasivo sugiere algo que circula o se difunde. «Fue llevado por todas partes» conserva la imagen de difusión sonora del original.
- source_word: θρηνουμένων
  english_pob_choice: being mourned
  chosen_spanish: que eran llorados
  alternatives_spanish:
  - que eran lamentados
  - llorados
  - plañidos
  lexicon: LSJ
  rationale: El participio pasivo con παίδων indica que los niños son el objeto del duelo. «Que eran llorados» mantiene esa relación y evita invertir la acción.
- source_word: παίδων
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los pequeños
  - los hijos varones
  lexicon: LSJ
  rationale: El griego usa el término amplio para «children». «Los niños» preserva esa amplitud y no estrecha el texto a «primogénitos» o «hijos varones» en la línea principal.
theological_decisions:
- issue: Si importar la especificación contextual de 'primogénitos' al verso
  english_pob_reading: children
  chosen_spanish_reading: los niños
  alternative_spanish_readings:
  - los primogénitos
  - los hijos primogénitos
  - los hijos varones
  rationale: Aunque el contexto general de Sabiduría 18 trata de los primogénitos de Egipto, este verso en sí habla de 'niños'. Se mantiene el valor léxico más amplio del griego y no se introduce una precisión narrativa que el versículo no enuncia.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el reajuste final del POB inglés que sustituyó 'sound' por 'lament' para reflejar mejor θρηνουμένων; por eso el español usa «lamento» y no un término más genérico. También se conservó la imagen de resonancia de ἀντήχει y la amplitud de παίδων sin estrecharla a 'primogénitos'.
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé» fuera de este verso porque no aparece ningún nombre divino en el texto griego.
  - Se evita «Cristo» o vocabulario eclesiástico tradicional porque el pasaje es narrativo-poético y no lo requiere.
  - 'La puntuación sigue el ritmo paralelo del griego: una cola para el grito de los enemigos y otra para el lamento de los niños.'
