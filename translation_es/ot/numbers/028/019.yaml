revisions:
- from: 'Y presentaréis una ofrenda encendida[a], un holocausto para Yahvé: dos toros, un carnero y siete corderos machos de un año; serán sin defecto para vosotros.'
  to: 'Y presentaréis una ofrenda de alimento[a], un holocausto para Yahvé: dos toros, un carnero y siete corderos machos de un año; serán sin defecto para vosotros.'
  rationale: Se revisa únicamente el término para אִשֶּׁה. «Ofrenda de alimento» preserva mejor la decisión principal del POB inglés y es más idiomático que «ofrenda encendida», mientras la nota conserva la alternativa «ofrenda por fuego» y explica el tecnicismo. Se mantiene el resto del versículo porque está sustancialmente alineado con el hebreo y con la terminología del proyecto.
