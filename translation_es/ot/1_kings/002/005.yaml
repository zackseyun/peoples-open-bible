base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/005.yaml
  text: 'And you also know what Joab son of Zeruiah did to me[a], what he did to the two commanders of the armies of Israel, to Abner son of Ner and to Amasa son of Jether: he killed them and put the blood of war in peace[b], and put the blood of war on the belt that was around his waist and on the sandals that were on his feet.'
  footnotes:
  - marker: a
    text: Or, more literally, "and set the blood of war in peace"; the Hebrew idiom means that Joab committed wartime bloodshed under peaceful conditions.
    reason: lexical_alternative
  - marker: b
    text: The imagery of blood on Joab's belt and sandals likely signifies bloodguilt visibly clinging to him because of these killings.
    reason: cultural_note
