review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y del POB inglés: mantiene el plural inicial, el giro al singular femenino, el mensajero humano, y la secuencia de preparación seductora antes de la llegada. Sin embargo, hay un problema de anclaje de nota: la marca [a] está puesta en «Y además», pero la nota trata de «se había pintado los ojos»/kohl. También conviene ajustar ligeramente la puntuación para que la cláusula final fluya mejor en español.'
  spanish_quality_summary: El texto es claro y mayormente natural en español eclesial moderno. «Enviaron por» y «a la que se había lavado» son comprensibles y fieles. «Y he aquí que vinieron» es aceptable, aunque algo solemne; no requiere cambio. La principal mejora necesaria es mover la nota al lugar correcto y suavizar la puntuación con raya o dos puntos tras «vinieron».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Mensajero» para מַלְאָךְ es correcto; no hay términos divinos clave en este versículo. La decisión de mantener el cambio plural/singular concuerda con la justificación documentada. La alternativa léxica sobre kohl debe conservarse, pero anclada en la frase ocular correspondiente.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Y además» aunque su contenido explica el verbo de maquillaje ocular.
    rationale: Las instrucciones requieren que cada nota aparezca en el punto pertinente del texto. Tal como está, el lector asociará erróneamente la nota con וְאַף כִּי en vez de כָּחַלְתְּ עֵינַיִךְ.
  - severity: low
    issue: La puntuación antes de la descripción de la mujer puede mejorarse.
    rationale: Después de «vinieron», una raya o dos puntos comunica mejor la relación explicativa de לַאֲשֶׁר que una simple coma y mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: 'Y además, enviaron por hombres que venían de lejos, a quienes se había enviado un mensajero; y he aquí que vinieron: a la que se había lavado, se había pintado[a] los ojos y se había adornado con joyas.'
  revised_footnotes:
  - marker: a
    text: 'O: «se había delineado los ojos con kohl». El verbo hebreo se refiere a aplicar un cosmético oscuro para los ojos.'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base por ser fiel al hebreo y al POB inglés, pero se corrige el anclaje de la nota para asociarla con el verbo de maquillaje ocular, y se ajusta la puntuación para una lectura más natural y precisa en español.
