review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: pregunta retórica sobre «esta casa», el modismo de la casa asociada al nombre divino, la percepción del pueblo, y la afirmación enfática de que Yahvé mismo ha visto. También preserva correctamente el nombre divino «Yahvé» y la nota léxica sobre פָּרִצִים. Sin embargo, hay pequeños desajustes de fidelidad y estilo: «que lleva mi nombre» suaviza el modismo más formulístico «sobre la cual es invocado mi nombre / que es llamada por mi nombre»; «a vuestros ojos» suena menos natural para un registro neutral latinoamericano; y «Yo mismo, sí» no transmite tan bien como «Aun yo mismo, miren» la combinación enfática גַּם אָנֹכִי + הִנֵּה.'
  spanish_quality_summary: 'El texto es claro y digno, pero tiene rasgos algo hispanizantes o menos naturales para el español neutral amplio: «vuestros» y «a vuestros ojos». Además, repetir la misma marca [a] en dos lugares distintos para una sola nota crea un problema formal según las reglas del proyecto. La frase final puede sonar más fluida y contundente en español con «Aun yo mismo, miren, lo he visto».'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה se traduce correctamente como «Yahvé»; הַבַּיִת הַזֶּה como «esta casa»; מְעָרַת/פָּרִצִים con una opción idiomática española respaldada por nota. La principal mejora recomendada es acercar נִקְרָא שְׁמִי עָלָיו a la formulación bíblica estándar en español: «sobre la cual es invocado mi nombre» o «que es llamada por mi nombre».'
  issues:
  - severity: medium
    issue: La misma marca de nota [a] aparece dos veces en el texto para una sola nota.
    rationale: Las reglas exigen marcadores únicos y no reutilizados para dos anclajes distintos en el mismo registro. La nota léxica corresponde a «cueva de ladrones», no también a «casa».
  - severity: medium
    issue: «Que lleva mi nombre» atenúa el modismo pactual/formulístico del hebreo נִקְרָא שְׁמִי עָלָיו.
    rationale: Aunque es comprensible, la frase hebrea en Jeremías tiene una formulación estable de pertenencia/consagración. «Sobre la cual es invocado mi nombre» preserva mejor la fórmula bíblica y su peso teológico.
  - severity: low
    issue: «A vuestros ojos» y el voseo/plural de España no encajan tan bien con el objetivo de español neutral latinoamericano.
    rationale: «Ante sus propios ojos» o «a sus ojos» comunica el mismo modismo de manera más natural y ampliamente legible.
  - severity: low
    issue: «Yo mismo, sí» no refleja con suficiente precisión la fuerza conjunta de גַּם אָנֹכִי + הִנֵּה.
    rationale: «Aun yo mismo, miren» o similar conserva mejor el énfasis y el marcador de atención sin sonar forzado.
