  to: 'Es un lazo para el hombre decir precipitadamente: «Es santo»[a], y sólo después considerar sus votos.'
  rationale: Se reemplaza «prometer precipitadamente» por «decir precipitadamente» para seguir mejor el hebreo y la revisión del English POB, preservando en nota la alternativa interpretativa relacionada con consagrar o dedicar algo santo. Esto mejora tanto la fidelidad como la naturalidad del español.
