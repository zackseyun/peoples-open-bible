translation:
  language: es
  text: Así, los dos coros de acción de gracias[a] tomaron su puesto en la casa de Dios, y yo, y la mitad de los funcionarios conmigo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «las dos acciones de gracias». Aquí el término designa a dos grupos o coros de acción de gracias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲמֹדְנָה
  english_pob_choice: took their stand
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - tomaron su puesto
  - se pusieron de pie
  lexicon: HALOT
  rationale: El verbo עמד aquí describe que los dos grupos quedaron colocados y listos dentro de la procesión. En español, «se detuvieron» comunica el hecho de ponerse en posición sin sonar tan rígido como un calco literal.
- source_word: שְׁתֵּי הַתּוֹדוֹת
  english_pob_choice: the two thanksgiving choirs
  chosen_spanish: las dos coros de acción de gracias
  alternatives_spanish:
  - las dos acciones de gracias
  - los dos coros de gratitud
  lexicon: HALOT
  rationale: El hebreo dice literalmente «las dos acciones de gracias», pero en este contexto de Nehemías 12 se refiere a dos grupos organizados para la alabanza. «Coros» preserva el carácter grupal y litúrgico, y «acción de gracias» mantiene el sentido básico del término.
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el templo de Dios
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea directa «casa de Dios», que es clara en español y mantiene el idioma del original. «En» reproduce naturalmente la preposición locativa.
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo mismo
  - y también yo
  lexicon: HALOT
  rationale: La coordinación con la primera persona se vierte de forma simple y directa, como en el hebreo.
- source_word: וַחֲצִי הַסְּגָנִים
  english_pob_choice: and half of the officials
  chosen_spanish: y la mitad de los funcionarios
  alternatives_spanish:
  - y la mitad de los gobernantes
  - y la mitad de los oficiales
  lexicon: HALOT
  rationale: סגנים alude a personas con autoridad administrativa. «Funcionarios» es un equivalente amplio y comprensible en español sin reducir indebidamente el alcance del término.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - junto a mí
  lexicon: HALOT
  rationale: El sufijo pronominal con la preposición se expresa de forma natural con «conmigo».
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Nehemías 12:40 y el rastro de decisiones de la POB en inglés. No se detectaron revisiones aplicadas en el expediente consultado.
  spanish_consistency_notes:
  - Se mantuvo la expresión «casa de Dios» en vez de sustituirla por una forma interpretativa como «templo», para conservar el idioma del hebreo.
  - La frase final queda con coma, reflejando que el versículo continúa la enumeración en el contexto inmediato.
