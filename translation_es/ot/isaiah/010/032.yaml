review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la escena: continuidad temporal, alto en Nob, gesto amenazante con la mano, y paralelismo topográfico hacia Sión/Jerusalén. Sin embargo, el expediente fuente presenta una tensión interna importante: el hebreo suministrado dice הר בית ציון (''monte de la casa de Sión''), mientras que la revisión inglesa cambió a ''daughter of Zion'' por una apelación a tradición/greigo. Dado que la instrucción exige partir primero de la evidencia fuente, el español no debe presentar ''hija de Sión'' en el texto principal como si fuera lectura del hebreo suministrado. También hay un desajuste de anclaje de nota: la nota [a] explica el verbo de agitar/blandir la mano, pero en el texto está puesta en ''Nob''.'
  spanish_quality_summary: El español es natural y digno. 'Todavía hoy' y 'se detendrá en Nob' son claros; 'sacudirá su mano contra' comunica bien el gesto hostil, aunque 'agitará' o 'blandirá' serían alternativas. La principal reparación es textual y de notas, no de fluidez. Además, conviene anclar la nota léxica al verbo, no al topónimo.
  glossary_alignment: No hay conflictos con la terminología mayor del proyecto. 'Sión', 'Jerusalén' y el sujeto singular implícito están bien manejados. La excepción crítica es que se adoptó 'hija de Sión' contra el hebreo base dado; si se desea preservar esa alternativa, debe ir en nota, no desplazar la lectura principal de 'casa de Sión'.
  issues:
  - severity: high
    issue: El texto principal usa 'la hija de Sión' donde el hebreo suministrado dice 'casa de Sión'.
    rationale: La evidencia fuente primaria en este registro es הר בית ציון. Aunque el rastro de auditoría inglés registra una revisión a 'daughter of Zion', la instrucción del proyecto exige trabajar primero desde la fuente original y usar el inglés como contexto auditado, no como base opaca. La lectura principal española debe preservar 'casa de Sión' y consignar la alternativa en nota si se desea.
  - severity: high
    issue: La nota [a] está anclada en 'Nob' pero explica el verbo de gesto amenazante.
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. La nota sobre 'hará ademán / blandirá' pertenece a 'sacudirá/agitará', no al topónimo Nob.
  - severity: medium
    issue: La redacción de la nota [b] presenta como decisión adoptada una revisión textual ajena a la forma hebrea mostrada.
    rationale: Para transparencia, la nota debe decir que el hebreo suministrado lee 'casa de Sión' y que algunas tradiciones/versiones suavizan o entienden la frase de otra manera, en vez de afirmar sin más una adopción principal contraria al texto fuente de este registro.
  revised_spanish_text: Todavía hoy se detendrá en Nob; sacudirá[a] su mano contra el monte de la casa de Sión[b], la colina de Jerusalén.
