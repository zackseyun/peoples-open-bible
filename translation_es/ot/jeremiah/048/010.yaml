translation:
  language: es
  text: Maldito[a] el que hace la obra de Yahvé negligentemente, y maldito el que aparta su espada de la sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con engaño». El hebreo רְמִיָּה puede denotar engaño o traición, pero en este contexto probablemente expresa laxitud o ejecución negligente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldito
  - Sea maldito
  lexicon: HALOT
  rationale: La forma hebrea es una maldición declarativa. «Maldito» expresa en español actual la fuerza imprecatoria sin volverla innecesariamente arcaica.
- source_word: עֹשֶׂה
  english_pob_choice: is the one who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - el que obra
  - quien hace
  lexicon: HALOT
  rationale: El participio funciona de manera genérica; «el que hace» conserva esa referencia a una persona caracterizada por esta acción.
- source_word: מְלֶאכֶת יְהוָה
  english_pob_choice: the work of Yahweh
  chosen_spanish: la obra de Yahvé
  alternatives_spanish:
  - la tarea de Yahvé
  - el trabajo de Yahvé
  lexicon: HALOT
  rationale: «מְלָאכָה» puede ser trabajo, tarea u obra. En español, «obra» suena más natural y mantiene el sentido de una labor encomendada por Yahvé en este contexto de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino según la convención POB en español. «Yahvé» evita la sustitución por un título y corresponde al Tetragrámaton.
- source_word: רְמִיָּה
  english_pob_choice: negligently
  chosen_spanish: negligentemente
  alternatives_spanish:
  - con engaño
  - traidoramente
  - con descuido
  lexicon: HALOT
  rationale: En este contexto la POB inglesa privilegia la idea de laxitud o descuido en la ejecución de la obra, aunque reconoce la alternativa semántica de engaño/traición. «Negligentemente» comunica ese matiz sin borrar la tensión léxica.
- source_word: מֹנֵעַ
  english_pob_choice: holds back
  chosen_spanish: retiene
  alternatives_spanish:
  - contiene
  - detiene
  - reprime
  lexicon: HALOT
  rationale: El participio expresa impedir o reservar algo. «Retiene» es conciso y fiel, y encaja bien con el complemento «su espada».
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - la espada de él
  lexicon: HALOT
  rationale: La forma pronominal hebrea se vierte de modo directo y natural en español.
- source_word: מִדָּם
  english_pob_choice: from blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - de derramamiento de sangre
  - de sangre derramada
  lexicon: HALOT
  rationale: 'La preposición hebrea con דָּם es muy literal: «de sangre». Se conserva la aspereza de la imagen, tal como hace la POB inglesa, sin suavizarla a «derramamiento de sangre».'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión sigue la política POB de transparentar el nombre del pacto en lugar de sustituirlo por un título. En español, «Yahvé» es la forma estándar del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantenimiento de la violencia judicial explícita
  english_pob_reading: retain the explicit language 'his sword from blood'
  chosen_spanish_reading: retener «su espada de sangre»
  alternative_spanish_readings:
  - su espada de derramamiento de sangre
  - su espada de matar
  rationale: La frase hebrea es deliberadamente cruda; la traducción no debe atenuarla. «De sangre» conserva la concisión y dureza del original, manteniendo la imagen de juicio sin parafrasearla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pass inglés, que quedó sin cambios tras la revisión y recibió acuerdo alto. Se conserva la decisión principal sobre רְמִיָּה como «negligentemente» y la imagen explícita de la espada y la sangre.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - «Maldito» mantiene el tono de imprecación breve y directo.
  - La sintaxis reproduce dos cláusulas coordinadas paralelas, como en el hebreo.
  - Se preserva la tensión entre lectura de negligencia y posible engaño mediante nota textual/lexical.
