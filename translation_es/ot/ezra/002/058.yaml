lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - El total de
  - Todos los
  lexicon: HALOT
  rationale: El cuantificador hebreo introduce la suma completa de los dos grupos que siguen. «Todos» comunica de forma natural y precisa esa totalidad en español.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los netinim
  alternatives_spanish:
  - los sirvientes del templo
  - los nethinim
  - los dados
  lexicon: HALOT
  rationale: Se preserva el término técnico postexílico como transliteración funcional para no perder la identidad de clase designada por el hebreo. Como el inglés POB explica su función con una nota, el español conserva el término especializado y lo puede aclarar en nota sin forzar una glosa interpretativa en el texto principal.
- source_word: וּבְנֵי
  english_pob_choice: and the sons of
  chosen_spanish: y los hijos de
  alternatives_spanish:
  - y los descendientes de
  - y los hijos
  lexicon: HALOT
  rationale: «Hijos de» reproduce con fidelidad la forma hebrea y funciona naturalmente como etiqueta de grupo o linaje.
- source_word: עַבְדֵי
  english_pob_choice: servants of
  chosen_spanish: siervos de
  alternatives_spanish:
  - esclavos de
  - servidores de
  lexicon: HALOT
  rationale: En esta lista genealógico-administrativa, el hebreo presenta una designación tradicional de un grupo vinculado al servicio de Salomón. «Siervos» mantiene el vínculo semántico con el campo de servicio sin cargar indebidamente el matiz social de esclavitud que aquí no es el foco.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon’s
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomó
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio para mantener legibilidad y reconocimiento inmediato.
- source_word: שְׁלֹשׁ מֵאוֹת תִּשְׁעִים וּשְׁנָיִם
  english_pob_choice: three hundred ninety-two
  chosen_spanish: trescientos noventa y dos
  alternatives_spanish:
  - trescientos y noventa y dos
  lexicon: HALOT
  rationale: La cifra cardinal se traslada de manera directa y normal en español moderno, sin añadir elementos no presentes en el hebreo.
theological_decisions:
- issue: Tratamiento de נְתִינִים como término técnico
  english_pob_reading: A technical term for a class assigned to temple service.
  chosen_spanish_reading: Término técnico para una clase asignada al servicio del templo.
  alternative_spanish_readings:
  - sirvientes del templo
  - nethinim
  rationale: 'La decisión conserva la tensión entre transliteración y explicación funcional: el texto principal mantiene la designación de grupo, mientras la nota puede explicarla. Así se evita sustituir el término histórico por una paráfrasis que borre su carácter técnico.'
  doctrine_reference: Ezra-Nehemiah historical terminology; lexical/administrative note, no doctrinal claim
translation_notes:
  revision_awareness: 'Se siguió el trazado del inglés POB sin cambios de revisión posteriores: la traducción inglesa más reciente permanece sin modificaciones y el consenso de auditoría fue de alta concordancia. La versión española conserva la misma estructura de lista y el mismo valor numérico, añadiendo solo una nota lexical necesaria para el término técnico נְתִינִים.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se evita «Cristo» porque no hay lenguaje mesiánico ni cristológico en el texto.
  - «Siervos» se emplea aquí por el contexto de grupo administrativo, no como sustituto general de δοῦλος en otros pasajes.
  - La nota sobre netinim preserva el valor técnico del término y evita una glosa excesiva en el cuerpo principal.
