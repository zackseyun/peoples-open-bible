revisions:
- from: El remanente de Jacob estará en medio de muchos pueblos como rocío de Yahvé[a], como lluvias sobre la hierba[b], que no esperan a un hombre ni aguardan a los hijos de hombre.
  to: El remanente de Jacob estará en medio de muchos pueblos como rocío de Yahvé[a], como chubascos sobre la hierba, que no esperan a un hombre ni aguardan a los seres humanos[b].
  rationale: 'Se hicieron reparaciones menores para mejorar fidelidad y español natural sin alterar el sentido: ‘chubascos’ refleja mejor רְבִיבִים; ‘los seres humanos’ evita un calco poco idiomático de בני אדם, preservado en nota; y se reubicó la nota [b] al lugar correcto.'
