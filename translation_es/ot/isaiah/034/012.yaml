translation:
  language: es
  text: A sus nobles[a] se los llamará, pero no habrá allí reino; y todos sus príncipes serán nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea es difícil; también podría entenderse: «Sus nobles llamarán, pero no habrá allí reino».'
    reason: alternative_reading
lexical_decisions:
- source_word: חֹרֶיהָ
  english_pob_choice: its nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus nobles
  - sus nobles principales
  - sus hombres nobles
  lexicon: HALOT
  rationale: El sustantivo se entiende mejor en el sentido social-político de nobles o aristócratas. En español, «nobles» conserva ese registro y evita una paráfrasis más explicativa que el hebreo no exige.
- source_word: וְאֵין שָׁם
  english_pob_choice: there is no ... there
  chosen_spanish: no habrá allí
  alternatives_spanish:
  - no hay allí
  - no existirá allí
  - allí no habrá
  lexicon: HALOT
  rationale: La negación locativa se conserva de forma natural en español con «allí». El futuro armoniza con el resto de la línea y mantiene el valor prospectivo del contexto.
- source_word: מְלוּכָה
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reino
  - monarquía
  - realeza
  lexicon: HALOT
  rationale: «Reino» es la equivalencia más natural y amplia para la idea de gobierno/orden real. «Monarquía» suena más técnico y «realeza» desplaza el foco.
- source_word: יִקְרָאוּ
  english_pob_choice: to proclaim / will call
  chosen_spanish: los llamarán
  alternatives_spanish:
  - proclamarán
  - los llamarán
  - los convocarán
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil; el audit trail inglés permite entender el verbo en relación con los nobles. En español, la lectura más sobria y cercana al texto es «los llamarán», dejando la tensión sin resolver del todo.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y todos
  - y cada uno de
  - y todos los
  lexicon: HALOT
  rationale: Conserva el cuantificador colectivo de modo directo y claro en español.
- source_word: שָׂרֶיהָ
  english_pob_choice: its princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus príncipes
  - sus gobernantes
  - sus jefes
  lexicon: HALOT
  rationale: «Príncipes» preserva el registro elevado y la correspondencia tradicional con שׂר, sin rebajar el tono político del verso.
- source_word: יִהְיוּ
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - serán
  - estarán
  - llegarán a ser
  lexicon: HALOT
  rationale: Verbo copulativo futuro simple, natural en español.
- source_word: אָפֶס
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada
  - sin valor
  - inexistencia
  lexicon: HALOT
  rationale: «Nada» reproduce con naturalidad el valor de inexistencia o nulidad total, sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Sintaxis difícil del primer colon
  english_pob_reading: The verse speaks of Edom's nobles in relation to the absence of any kingdom to proclaim or establish.
  chosen_spanish_reading: El verso presenta una escena de llamada a los nobles, seguida por la afirmación de que allí no habrá reino.
  alternative_spanish_readings:
  - Sus nobles proclamarán, pero no habrá allí reino.
  - A sus nobles se los llamará, pero no habrá allí reino.
  rationale: El hebreo es comprimido y ambiguo. La redacción española conserva esa dificultad sin forzar una explicación interpretativa. Se mantiene el enlace entre nobles y la ausencia de reino, como en el audit trail inglés.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de אָפֶס en el segundo colon
  english_pob_reading: its princes will be nothing
  chosen_spanish_reading: sus príncipes serán nada
  alternative_spanish_readings:
  - sus príncipes no serán nada
  - sus príncipes serán inexistentes
  - sus príncipes quedarán reducidos a nada
  rationale: La traducción literal «serán nada» conserva la fuerza de nulidad total. Aunque suene abrupta, refleja bien el juicio de desintegración política y no suaviza la tensión léxica del hebreo.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: Se sigue el ajuste del audit trail inglés que reordenó la primera cláusula para reflejar más de cerca el hebreo, manteniendo la dificultad sintáctica y la relación entre los nobles y la ausencia de reino. La segunda colon se conserva de forma directa como juicio de nulidad total.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «reino» para מְלוּכָה y «príncipes» para שָׂרִים/שָׂרֶיהָ, coherente con el registro político del pasaje.
  - Se evita resolver la ambigüedad de יִקְרָאוּ con una interpretación excesivamente específica; la nota recoge la alternativa documentada en el POB inglés.
