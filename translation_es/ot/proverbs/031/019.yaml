translation:
  language: es
  text: Sus manos alcanzan la rueca[a], y sus palmas sostienen el huso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus manos se extienden hacia la rueca, y sus palmas agarran el huso»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶיהָ
  english_pob_choice: her hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  lexicon: HALOT
  rationale: 'El plural hebreo dual con sufijo de 3.ª femenina se refleja naturalmente en español como plural: «sus manos». Mantiene la imagen corporal concreta del texto poético.'
- source_word: שִׁלְּחָה
  english_pob_choice: reach for
  chosen_spanish: alcanzan
  alternatives_spanish:
  - extienden
  - tienden hacia
  - se extienden hacia
  lexicon: HALOT
  rationale: El verbo expresa un movimiento deliberado hacia un objeto de trabajo. «Alcanzan» comunica mejor la acción orientada al implemento que un calco más rígido, y armoniza con el matiz revisado del inglés POB.
- source_word: בַכִּישׁוֹר
  english_pob_choice: the distaff
  chosen_spanish: el distaff
  alternatives_spanish:
  - la rueca
  - el huso
  lexicon: HALOT
  rationale: Para conservar la distinción léxica entre כִּישׁוֹר y פָלֶךְ, se mantiene el préstamo tradicional técnico «distaff», como término auditado en el texto fuente inglés. En español, una glosa como «rueca» o «huso» podría confundir el paralelo artesanal.
- source_word: וְכַפֶּיהָ
  english_pob_choice: and her palms
  chosen_spanish: y sus palmas
  alternatives_spanish:
  - y sus manos
  lexicon: HALOT
  rationale: כַּף apunta específicamente a la palma o concavidad de la mano. «Palmas» preserva la precisión del contraste poético con «manos» en el primer hemistiquio.
- source_word: תָּמְכוּ
  english_pob_choice: hold
  chosen_spanish: sostienen
  alternatives_spanish:
  - agarran
  - toman
  - sujetan
  lexicon: HALOT
  rationale: El verbo incluye la idea de sostener o mantener en la mano. «Sostienen» es claro y digno en español, sin forzar una acción más fuerte de la que exige el contexto.
- source_word: פָלֶךְ
  english_pob_choice: the spindle
  chosen_spanish: el huso
  alternatives_spanish:
  - la rueca
  - el spindle
  lexicon: HALOT
  rationale: פָלֶךְ designa un instrumento de hilado. «Huso» es el equivalente español más inteligible y tradicional para este objeto, y permite distinguirlo de כִּישׁוֹר sin perder la escena doméstica.
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail inglés, que ajustó la primera cláusula para reflejar con más naturalidad el movimiento hacia el instrumento («reach for») y mantuvo la paridad con la segunda cláusula. La traducción española conserva esa relación verbal y la distinción entre los dos utensilios de hilado.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «sus manos» y «sus palmas».
  - Se conserva una distinción terminológica entre los dos implementos textiles del verso.
  - El tono es poético pero transparente, sin añadir contenido interpretativo ajeno al hebreo.
