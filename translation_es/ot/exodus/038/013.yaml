lexical_decisions:
- source_word: וְ/לִ/פְאַת
  english_pob_choice: And for the ... side
  chosen_spanish: Y para el lado ...
  alternatives_spanish:
  - Y en el lado ...
  - Y para la parte ...
  - Y para el borde ...
  lexicon: HALOT
  rationale: פאה expresa un lado, borde o extremo. En este contexto de medidas del atrio, «lado» es la opción más natural y precisa en español. Conservé la función coordinante y descriptiva de la construcción con «Y para».
- source_word: קֵדְמָה
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - del oriente
  - del lado oriental
  - este
  lexicon: HALOT
  rationale: La palabra puede referirse al este o a la orientación delantera/oriental. Aquí la dirección ya queda aclarada por el miembro paralelo siguiente, así que «oriental» permite una formulación compacta y digna en español.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - orientalmente
  - hacia el nacimiento del sol
  lexicon: HALOT
  rationale: מזרח denota el lugar del amanecer. Dado que en español «oriente» es idiomático y conserva la imagen direccional, «hacia el oriente» mantiene el paralelo hebreo sin forzar una paráfrasis excesiva.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos de longitud
  lexicon: HALOT
  rationale: אַמָּה corresponde a la medida estándar «codo». En español bíblico actual, «codos» es claro y fiel en este tipo de registro de medidas.
translation_notes:
  revision_awareness: El inglés auditado pasó de «toward the sunrise» a «eastward» para evitar paráfrasis innecesaria. En español, mantuve esa concisión con «hacia el oriente», preservando el paralelismo direccional hebreo sin introducir una expansión interpretativa.
  spanish_consistency_notes:
  - Se usó «oriente/oriental» de manera consistente para el campo direccional del hebreo, evitando oscilar innecesariamente entre «este» y «oriente».
  - Se eligió «codos» para la medida lineal, coherente con el registro bíblico y con la práctica del proyecto en pasajes de dimensiones.
  - No hay decisiones teológicas explícitas en este versículo; el trabajo es בעיקרamente léxico y de estilo bíblico-medida.
