translation:
  language: es
  text: y muchos con trompetas[a], y gran gozo con voz[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es elíptico aquí y mantiene un estilo fragmentario de enumeración: literalmente, «y muchos por/con trompetas». La traducción española conserva esa brevedad sin perder la idea de celebración audible.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo (Esdras 3:10) describe con más detalle a sacerdotes con trompetas y a levitas con címbalos alabando a Yahvé. 1 Esdras aquí presenta una forma griega más condensada de esa escena.
    reason: cross_reference
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - muchos de ellos
  lexicon: LSJ
  rationale: El griego usa un adjetivo/substantivo elíptico que indica un gran número sin añadir un sustantivo explícito. «Muchos» conserva esa concisión en español sin sobreespecificar.
- source_word: διὰ σαλπίγγων
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - por trompetas
  - a través de trompetas
  - con el sonido de trompetas
  lexicon: LSJ
  rationale: διά con genitivo expresa instrumento o medio. En español, «con trompetas» comunica de manera natural la idea de acompañamiento instrumental y mantiene el tono breve del griego.
- source_word: χαρὰ μεγάλη
  english_pob_choice: great joy
  chosen_spanish: gran gozo
  alternatives_spanish:
  - gran alegría
  - mucho gozo
  lexicon: LSJ
  rationale: «Gozo» preserva el registro bíblico y la fuerza afectiva del sustantivo χαρά. «Gran gozo» refleja fielmente el adjetivo μεγάλη sin añadir matices no presentes.
- source_word: τῇ φωνῇ
  english_pob_choice: with the voice
  chosen_spanish: con la voz
  alternatives_spanish:
  - con una voz
  - con gritos
  - en voz
  lexicon: LSJ
  rationale: El griego dice literalmente «con/la voz», sin adjetivo de intensidad. «Con la voz» conserva esa sobriedad y sigue la revisión inglesa que retiró «loud» para no añadir un modificador ausente en el texto.
theological_decisions:
- issue: Expresión sonora de la alabanza sin expansión interpretativa
  english_pob_reading: great joy with the voice
  chosen_spanish_reading: gran gozo con la voz
  alternative_spanish_readings:
  - gran gozo con voz alta
  - gran alegría con alaridos
  rationale: El texto griego es fragmentario y elíptico; presenta celebración audible, pero no explicita el modo con un adjetivo. La traducción española conserva esa tensión entre gozo y expresión vocal sin precisar más de lo que el original permite.
  doctrine_reference: Principio de fidelidad al alcance semántico del texto fuente; paralelo contextual con Esdras 3:10 sin fusionarlo en la redacción principal
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «a loud voice» por «the voice» para ajustarse mejor al griego, que no lleva adjetivo. La redacción española sigue esa decisión y evita introducir «voz alta» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable del nombre divino en la nota de paralelo, conforme a la política del proyecto.
  - «Trompetas» y «voz» conservan el carácter auditivo de la escena sin añadir elementos ausentes en el griego.
  - No se introduce material narrativo del paralelo hebreo en el cuerpo del versículo, solo en la nota explicativa.
