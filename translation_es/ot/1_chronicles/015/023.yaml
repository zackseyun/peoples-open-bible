translation:
  language: es
  text: Berequías y Elcaná fueron porteros del arca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porteros junto al arca». El hebreo puede indicar asignación al servicio del arca o ubicación junto a ella.'
