translation:
  language: es
  text: Y este asunto se convirtió en pecado, y el pueblo fue ante el uno[a] hasta Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante el uno». La frase probablemente significa «ante uno de los becerros», refiriéndose a uno de los dos becerros que Jeroboam puso, especialmente el de Dan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: became
  chosen_spanish: se convirtió
  alternatives_spanish:
  - fue
  - llegó a ser
  lexicon: HALOT
  rationale: 'El hebreo con לְחַטָּאת expresa resultado: la acción quedó constituida como pecado. «Se convirtió» conserva ese valor de resultado mejor que un simple «fue».'
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: 'דבר es amplio: palabra, asunto, cosa. Aquí alude a la disposición cultual de Jeroboam como hecho concreto; «esta cosa» preserva la demostración sin explicitar más de lo que el hebreo dice.'
- source_word: לְחַטָּאת
  english_pob_choice: a sin
  chosen_spanish: en pecado
  alternatives_spanish:
  - como pecado
  - por pecado
  lexicon: HALOT
  rationale: En español, «se convirtió en pecado» comunica con naturalidad el valor resultativo del hebreo. Opté por «en pecado» para mantener el sustantivo y no suavizar la fuerza condenatoria del texto.
- source_word: וַיֵּלְכ֥וּ הָעָם
  english_pob_choice: the people went
  chosen_spanish: el pueblo iba
  alternatives_spanish:
  - el pueblo fue
  - el pueblo caminó
  lexicon: HALOT
  rationale: Aunque el verbo básico es «ir», en español «iba» fluye mejor con el complemento direccional y conserva el movimiento narrativo. «El pueblo» refleja הָעָם de modo colectivo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante del
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante del» es la forma más natural para conservar la imagen espacial de לפני sin convertirla de entrada en una paráfrasis de adoración.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: el uno
  alternatives_spanish:
  - el uno de ellos
  - el primero
  lexicon: HALOT
  rationale: El hebreo es elíptico y literalmente dice «el uno». Mantener «el uno» preserva la tensión textual; la nota aclara el referente probable.
- source_word: עַד דָּן
  english_pob_choice: as far as Dan
  chosen_spanish: hasta Dan
  alternatives_spanish:
  - así como hasta Dan
  - llegando hasta Dan
  lexicon: HALOT
  rationale: עַד marca alcance o extensión. «Hasta Dan» es idiomático en español y conserva el límite geográfico del recorrido.
theological_decisions:
- issue: Carácter de la acusación de pecado en el versículo
  english_pob_reading: The verse states that this cultic arrangement became sin, without specifying a later doctrinal category beyond the narrative's condemnation of idolatrous worship.
  chosen_spanish_reading: El versículo afirma que la disposición cultual se convirtió en pecado, sin desarrollar una categoría doctrinal más amplia.
  alternative_spanish_readings:
  - La disposición se volvió una ocasión de pecado
  - La disposición se volvió un pecado ofrenda
  rationale: חַטָּאת aquí encaja con la condena narrativa de idolatría. Mantengo el juicio del texto sin ampliarlo ni resolverlo con explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Preservar la tensión teológica; no importar desarrollos que el texto no explicita.
- issue: Referencia de 'el uno'
  english_pob_reading: '''the one'' refers to one of the two calves, most likely the one at Dan in light of the following phrase.'
  chosen_spanish_reading: «El uno» conserva la elipsis hebrea y apunta probablemente a uno de los dos becerros, especialmente el de Dan por el complemento final.
  alternative_spanish_readings:
  - 'Hacer explícito en el texto principal: ''el uno de los becerros'''
  - 'Leerlo como una construcción más libre: ''ante el becerro de Dan'''
  rationale: El hebreo es breve y algo duro; prefiero no completar la frase en el texto principal. La aclaración va en nota para respetar la primacía del original.
  doctrine_reference: Equivalencia óptima; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con la evaluación de concordancia moderada y con la solución previa, respetando la brevedad y la elipsis del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva «pecado» como sustantivo para לְחַטָּאת, sin desplazarlo a una explicación adjetival.
  - Se evita explicitar «becerro» en el texto principal para no resolver la elipsis hebrea.
  - La sintaxis española busca ser publicable y natural, pero sin borrar la aspereza deliberada del original.
