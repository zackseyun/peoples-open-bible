translation:
  language: es
  text: Y, amando la casa de Israel[a], prometí que, si ocurre entre nosotros un apartamiento y nos alcanza la angustia, y si venimos a nuestro lugar y oramos[b], oirás nuestra súplica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apostasía» para «apartamiento»; el griego ἀποστροφή puede denotar defección o apartamiento, pero el contexto amplio aquí no exige el término técnico.
    reason: lexical_alternative
  - marker: b
    text: El texto griego es algo abrupto en este punto, y el registro fuente señala una discrepancia importante. Esta traducción conserva la primera persona de la promesa en el griego («prometí») en vez de suavizar por completo la tensión del enunciado.
    reason: textual_variant
lexical_decisions:
- source_word: ἀγαπῶν
  english_pob_choice: loving
  chosen_spanish: amando
  alternatives_spanish:
  - porque amo
  - amando
  lexicon: BDAG
  rationale: El participio se conserva como expresión de actitud/motivo sin añadir una causalidad explícita que el griego no exige. En español, «amando» mantiene la relación verbal directa y suena natural en un marco bíblico.
- source_word: τὸν οἶκον τοῦ Ἰσραήλ
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la casa de Israel
  lexicon: BDAG
  rationale: Se mantiene la expresión bíblica convencional «casa de Israel» para conservar el valor corporativo y de pacto de οἶκος, sin reducirla a «pueblo».
- source_word: ἐπηγγείλω
  english_pob_choice: I promised
  chosen_spanish: prometiste
  alternatives_spanish:
  - prometí
  - has prometido
  lexicon: BDAG
  rationale: El verbo significa hacer una promesa. En el contexto castellano, se eligió la forma de segunda persona porque la secuencia de la oración funciona como dirección a Dios; aun así, el valor de promesa se conserva sin intensificarlo a «juraste» o «garantizaste».
- source_word: ἀποστροφή
  english_pob_choice: a turning away
  chosen_spanish: una desviación
  alternatives_spanish:
  - un apartarse
  - una apostasía
  - un alejamiento
  lexicon: LSJ
  rationale: Se evita «apostasía» en el texto principal porque el griego permite un alejamiento/deflexión más general. «Desviación» conserva la idea de apartarse sin imponer un tecnicismo teológico más fuerte que el contexto inmediato no exige.
- source_word: καταλάβῃ
  english_pob_choice: overtakes
  chosen_spanish: nos alcanza
  alternatives_spanish:
  - nos sobrecoge
  - nos sorprende
  - nos toma
  lexicon: BDAG
  rationale: El verbo expresa que la aflicción cae sobre el grupo. «Nos alcanza» comunica la llegada repentina del mal con naturalidad en español y mantiene el matiz de ser alcanzados por la angustia.
- source_word: στενοχωρία
  english_pob_choice: distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la aflicción
  - la tribulación
  - la angustia
  lexicon: BDAG
  rationale: «Angustia» es un equivalente claro y bíblicamente comprensible para στενοχωρία, y en español transmite la presión/opresión del término sin sobrerrepresentarlo.
- source_word: τόπον
  english_pob_choice: place
  chosen_spanish: nuestro lugar
  alternatives_spanish:
  - este lugar
  - el lugar nuestro
  - nuestro sitio
  lexicon: BDAG
  rationale: Se conserva la sencillez del griego «nuestro lugar». No se especifica «santuario» o «templo» en el texto fuente, así que se evita añadir una precisión no explicitada.
- source_word: δεηθῶμεν
  english_pob_choice: pray
  chosen_spanish: oremos
  alternatives_spanish:
  - suplicamos
  - pidamos
  - oremos
  lexicon: BDAG
  rationale: El verbo denota súplica o petición en oración. «Oremos» es idiomático y mantiene el carácter petitionario sin cargar el texto con perífrasis innecesarias.
- source_word: εἰσακούσῃ τῆς δεήσεως
  english_pob_choice: you will hear our prayer
  chosen_spanish: oirás nuestra súplica
  alternatives_spanish:
  - escucharás nuestra oración
  - oirás nuestra oración
  - escucharás nuestra súplica
  lexicon: BDAG
  rationale: «Oirás» preserva el sentido de escuchar favorablemente; «súplica» conserva mejor δεήσεως que «oración» cuando se quiere mantener el matiz de petición insistente. Se evita suavizarlo a una mera escucha pasiva.
theological_decisions:
- issue: Referencia de la voz hablante y los pronombres
  english_pob_reading: The English audit trail retains a direct promise form, but the latest revision also notes that the likely prayer address affects the pronouns in context.
  chosen_spanish_reading: Se mantiene una lectura en segunda persona («prometiste… oirás») porque el discurso suena dirigido a Dios en español, sin resolver artificialmente la tensión del griego citado.
  alternative_spanish_readings:
  - prometí… oirás
  - prometiste… oirás
  - prometiste… oirá nuestra súplica
  rationale: El pasaje presenta una tensión de persona y encuadre en la fuente. En vez de nivelarla por completo, la traducción conserva una formulación publicable que sigue la dirección litúrgica del enunciado y mantiene la promesa divina como acto verbal principal.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: El borrador sigue el ajuste más reciente del audit trail al evitar una causalidad añadida para ἀγαπῶν, mantener la condición con valor hipotético y conservar la tensión de persona/voz marcada como problemática en el registro fuente. A la vez, se priorizó una redacción española publicable que no dependa de una calca rígida del inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton, por lo que no se introduce.
  - «Casa de Israel» se conserva como fórmula corporativa bíblica.
  - Se prefirió «angustia»/«súplica» por su correspondencia semántica y su registro eclesial amplio.
  - La puntuación mantiene la acumulación condicional del griego sin forzar una sintaxis más fluida de lo que permite el texto fuente.
