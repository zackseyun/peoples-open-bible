translation:
  language: es
  text: Por la mañana, siembra tu semilla; y por la tarde, no dejes descansar tu mano[a], porque no sabes cuál de las dos tendrá éxito[b], esta o aquella, o si ambas por igual serán buenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «no dejes descansar tu mano», es decir, no suspendas el trabajo.'
    reason: cultural_note
  - marker: b
    text: O «prosperará».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Temprano
  lexicon: HALOT
  rationale: La frase temporal introduce la primera mitad del día. «Por la mañana» es natural en español y conserva la referencia temporal directa sin ampliar el sentido.
- source_word: זְרַע
  english_pob_choice: sow
  chosen_spanish: siembra
  alternatives_spanish:
  - planta
  - sembra
  lexicon: HALOT
  rationale: El verbo hebreo se refiere específicamente a sembrar semilla. «Siembra» mantiene la imagen agrícola y el vínculo con «semilla».
- source_word: אֶת זַרְעֶךָ
  english_pob_choice: your seed
  chosen_spanish: tu semilla
  alternatives_spanish:
  - tu simiente
  - tu grano
  lexicon: HALOT
  rationale: «Semilla» es la equivalencia más directa y clara en español moderno. Conserva la imagen concreta del texto y puede abarcar la aplicación sapiencial más amplia sin explicarla en el versículo.
- source_word: וְלָעֶרֶב
  english_pob_choice: and in the evening
  chosen_spanish: y por la tarde
  alternatives_spanish:
  - y en la tarde
  - y al atardecer
  lexicon: HALOT
  rationale: La coordinación con la primera frase debe mantenerse. «Por la tarde» comunica bien el paralelo temporal con «por la mañana» y suena natural en español.
- source_word: אַל תַּנַּח יָדֶךָ
  english_pob_choice: do not let your hand rest
  chosen_spanish: no dejes descansar tu mano
  alternatives_spanish:
  - no dejes quieta tu mano
  - no retires tu mano
  - no dejes de trabajar
  lexicon: HALOT
  rationale: El hebreo es un modismo para no cesar del trabajo. «No dejes descansar tu mano» conserva la imagen concreta y es comprensible en español, sin borrar la fuerza idiomática.
- source_word: כִּי אֵינְךָ יוֹדֵעַ
  english_pob_choice: for you do not know
  chosen_spanish: porque no sabes
  alternatives_spanish:
  - pues no sabes
  - ya que no sabes
  lexicon: HALOT
  rationale: La partícula introduce la razón del mandato. «Porque» expresa con claridad la relación causal en español.
- source_word: אֵי זֶה
  english_pob_choice: which
  chosen_spanish: cuál
  alternatives_spanish:
  - qué
  - cuál de los dos
  lexicon: HALOT
  rationale: Aquí la interrogación apunta a una de dos posibilidades. «Cuál» es la forma más natural en español para esa elección indeterminada.
- source_word: יִכְשָׁר
  english_pob_choice: will succeed
  chosen_spanish: tendrá éxito
  alternatives_spanish:
  - prosperará
  - saldrá bien
  - resultará bien
  lexicon: HALOT
  rationale: El verbo expresa que algo resulta eficaz o favorable. «Tendrá éxito» recoge bien la idea de que una de las acciones prosperará o dará buen resultado.
- source_word: הֲזֶה אוֹ זֶה
  english_pob_choice: this or that
  chosen_spanish: si esta o aquella
  alternatives_spanish:
  - esta o aquella
  - ésta o aquélla
  lexicon: HALOT
  rationale: La oposición demostrativa se conserva con «esta o aquella». El «si» refleja el encadenamiento interrogativo del contexto inmediato y la incertidumbre de cuál de las dos resultará bien.
- source_word: וְאִם שְׁנֵיהֶם כְּאֶחָד
  english_pob_choice: or whether both alike
  chosen_spanish: o si ambas por igual
  alternatives_spanish:
  - o si las dos igualmente
  - o si ambas juntas
  lexicon: HALOT
  rationale: La expresión hebrea añade la posibilidad de que las dos resulten del mismo modo. «Por igual» comunica bien כְּאֶחָד sin introducir una interpretación más fuerte que el texto.
- source_word: טוֹבִים
  english_pob_choice: will be good
  chosen_spanish: serán buenas
  alternatives_spanish:
  - serán buenas
  - resultarán buenas
  - serán provechosas
  lexicon: HALOT
  rationale: El adjetivo final describe un resultado favorable. «Buenas» es fiel al hebreo y deja abierta la amplitud del juicio positivo en contexto sapiencial.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Eclesiastés 11:6 y el audit trail inglés. Se mantuvo la estructura paralela de mañana/tarde, la imagen agrícola de sembrar semilla y el modismo de la mano que no descansa. No hubo revisiones textuales adicionales en el pass más reciente, y el cotejo indicó alta concordancia.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Semilla» se usa de forma consistente para זַרְעֶךָ, evitando una paráfrasis como «siembra» que perdería la imagen concreta.
  - «Por la mañana / por la tarde» conserva el paralelismo hebreo y suena natural en español.
  - «Tendrá éxito» mantiene la ambigüedad de resultado favorable sin reducirla a una sola noción teológica o moral.
