source:
  edition: WLC
  text: מַדּ֗וּעַ לֹֽא אֲכַלְתֶּ֤ם אֶת הַֽ/חַטָּאת֙ בִּ/מְק֣וֹם הַ/קֹּ֔דֶשׁ כִּ֛י קֹ֥דֶשׁ קָֽדָשִׁ֖ים הִ֑וא וְ/אֹתָ֣/הּ נָתַ֣ן לָ/כֶ֗ם לָ/שֵׂאת֙ אֶת עֲוֺ֣ן הָ/עֵדָ֔ה לְ/כַפֵּ֥ר עֲלֵי/הֶ֖ם לִ/פְנֵ֥י יְהוָֽה־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/017.yaml
  text: Why did you not eat the sin offering in the holy place? For it is most holy[a], and he has given it to you to bear the iniquity of the congregation, to make atonement for them before Yahweh.
  footnotes:
  - marker: a
    text: Or 'the purification offering.' The Hebrew term חַטָּאת can denote the offering associated with removing impurity as well as addressing sin.
    reason: lexical_alternative
