translation:
  language: es
  text: Entonces pusieron el arca de Dios sobre un carro nuevo de la casa de Abinadab, y Uza y Ahío guiaban[a] el carro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conducían el carro». El participio hebreo puede denotar guiar o conducir un vehículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְכִּיבוּ
  english_pob_choice: set
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron sobre
  lexicon: HALOT
  rationale: El verbo causativo expresa aquí hacer que el arca quede sobre el vehículo. En español, "pusieron" comunica la acción concreta con naturalidad y sin añadir matices ajenos; "colocaron" también es posible, pero suena un poco más formal.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios
  - el arca divina
  lexicon: HALOT
  rationale: '"Arca" es el término técnico y tradicional para אֲרוֹן en este contexto cultual. "De Dios" refleja el constructo hebreo de forma directa y natural en español.'
- source_word: עַל עֲגָלָה חֲדָשָׁה
  english_pob_choice: on a new cart
  chosen_spanish: sobre un carro nuevo
  alternatives_spanish:
  - sobre un carrito nuevo
  - sobre una carreta nueva
  lexicon: HALOT
  rationale: '"עֲגָלָה" puede referirse a carro/carreta/carroza según contexto; aquí, para el transporte del arca, "carro" suena natural y suficientemente amplio. "Nuevo" se conserva explícitamente.'
- source_word: מִבֵּית אֲבִינָדָב
  english_pob_choice: from the house of Abinadab
  chosen_spanish: desde la casa de Abinadab
  alternatives_spanish:
  - de la casa de Abinadab
  - de la casa de Abinadab
  lexicon: HALOT
  rationale: La preposición מִן con בֵּית indica origen. "Desde la casa de" conserva mejor el valor de procedencia del movimiento que una simple aposición posesiva.
- source_word: עֻזָּא
  english_pob_choice: Uzza
  chosen_spanish: Uza
  alternatives_spanish:
  - Uzzá
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio al español. "Uza" es una forma breve y reconocible en español bíblico; "Uzzá" refleja más de cerca la doble zeta semítica, pero aquí la forma breve es legible y común.
- source_word: אַחְיוֹ
  english_pob_choice: Ahio
  chosen_spanish: Ahío
  alternatives_spanish:
  - Ahió
  lexicon: standard transliteration
  rationale: Nombre propio transliterado. Se mantiene el hiato con acento gráfico para facilitar la lectura en español.
- source_word: נֹהֲגִים
  english_pob_choice: were guiding
  chosen_spanish: guiaban
  alternatives_spanish:
  - conducían
  - dirigían
  lexicon: HALOT
  rationale: El participio describe acción continua de conducir el vehículo. "Guiaban" comunica bien la actividad de control sin restringirla a la conducción de animales únicamente, y preserva la equivalencia funcional del inglés POB.
- source_word: בָּעֲגָלָה
  english_pob_choice: the cart
  chosen_spanish: el carro
  alternatives_spanish:
  - la carreta
  - la carroza
  lexicon: HALOT
  rationale: Con נהג, la preposición ב puede marcar el vehículo que se conduce. En español, el objeto directo explícito "el carro" refleja el sentido que el inglés POB ya hizo idiomático como "guiding the cart".
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/vocalizado del WLC y la solución óptima del POB inglés sin cambios de revisión pendientes; se mantuvo el sentido de procedencia, el objeto cultual y la acción continua de conducción con español natural.
  spanish_consistency_notes:
  - Se usa "arca" de manera consistente para אֲרוֹן en contexto cultual.
  - Se conserva "Dios" en lugar de una máscara litúrgica.
  - Los nombres propios se transliteran con forma española legible.
  - '"Guiaban" mantiene el aspecto progresivo del participio hebreo.'
  - '"Carro" traduce el vehículo de forma natural en este contexto narrativo.'
