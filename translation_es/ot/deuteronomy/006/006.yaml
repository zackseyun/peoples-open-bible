- from: Y estas palabras que yo te mando hoy estarán sobre tu corazón[a].
  to: Y estas palabras que yo te ordeno hoy estarán sobre tu corazón[a].
  rationale: Se reemplaza «te mando» por «te ordeno» para representar con mayor precisión y claridad el verbo hebreo צוה en contexto de mandato, evitando una posible lectura ambigua en español. Se conserva «estarán sobre tu corazón» con nota alternativa porque mantiene fielmente la imagen hebrea documentada en la auditoría inglesa.
  reviewer_model: gpt-5.4
