  yaml_path: translation/ot/isaiah/021/013.yaml
  text: 'An oracle concerning Arabia: In the forest in Arabia you will spend the night[c][b][a], O caravans of Dedanites.'
  footnotes:
  - marker: a
    text: Or 'A burden concerning Arabia'; Hebrew מַשָּׂא can also be rendered 'burden' or 'pronouncement' in prophetic headings.
    reason: lexical_alternative
  - marker: b
    text: Or 'In the thicket in Arabia.' The Hebrew יַעַר normally means 'forest/woodland,' but in this setting it may refer to scrub or brush country.
    reason: cultural_note
  - marker: c
    text: Hebrew אֹרְחוֹת literally can mean 'paths/ways,' but here likely refers to traveling companies, that is, caravans.
    reason: lexical_alternative
