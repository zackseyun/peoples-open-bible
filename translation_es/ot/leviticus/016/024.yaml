translation:
  language: es
  text: Lavará su cuerpo con agua en un lugar santo[a], se pondrá sus vestiduras, saldrá y ofrecerá su holocausto y el holocausto del pueblo, y hará expiación[c] por sí mismo y por el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''su carne'' en lugar de ''su cuerpo''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hará propiciación» o, en algunos contextos rituales, «purificará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחַץ
  english_pob_choice: He shall wash
  chosen_spanish: Lavará
  alternatives_spanish:
  - Y lavará
  - Se lavará
  lexicon: HALOT
  rationale: En una instrucción ritual, el imperfecto hebreo con valor modal se expresa naturalmente en futuro español. Se conserva la acción prescriptiva sin añadir sujeto explícito innecesario.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su cuerpo físico
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su carne', pero en este contexto de lavado ritual 'cuerpo' comunica mejor el sentido físico y sigue la decisión inglesa documentada, sin cargar 'carne' con posibles resonancias teológicas innecesarias aquí.
- source_word: בַמַּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: En español, con lavar es más idiomático 'con agua' que 'en agua', y mantiene la relación instrumental del hebreo con claridad.
- source_word: בְּמָקוֹם קָדוֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en el Lugar Santo
  - en un lugar sagrado
  lexicon: HALOT
  rationale: La ausencia del artículo en מקום favorece 'un lugar santo' en vez de 'el Lugar Santo', que podría sonar como el recinto técnico del santuario. Se conserva la ambigüedad espacial documentada.
- source_word: וְלָבַשׁ אֶת בְּגָדָיו
  english_pob_choice: put on his garments
  chosen_spanish: se pondrá sus vestiduras
  alternatives_spanish:
  - pondrá sobre sí sus vestiduras
  - se vestirá con sus vestiduras
  lexicon: HALOT
  rationale: '''Vestiduras'' mantiene el registro ritual/formal de ''garments'' mejor que ''ropa'' o ''vestidos''. La forma reflexiva es la más natural en español para ''put on''.'
- source_word: וְיָצָא
  english_pob_choice: come out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - se saldrá
  lexicon: HALOT
  rationale: Después de la acción en el lugar santo, 'saldrá' es la forma española más directa y natural; conserva el movimiento secuencial del texto.
- source_word: וְעָשָׂה
  english_pob_choice: offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: Con 'holocausto' como objeto, el verbo sacrificial adecuado en español es 'ofrecer'. Esto evita un calco demasiado literal de 'hacer' y conserva el idioma cultual.
- source_word: עֹלָתוֹ
  english_pob_choice: his burnt offering
  chosen_spanish: su holocausto
  alternatives_spanish:
  - su ofrenda quemada
  - su ofrenda ascendente
  lexicon: HALOT
  rationale: '''Holocausto'' es el término bíblico tradicional y claro para עלה en contexto sacrificial. Se evita una paráfrasis etimológica menos idiomática.'
- source_word: עֹלַת הָעָם
  english_pob_choice: the burnt offering of the people
  chosen_spanish: el holocausto del pueblo
  alternatives_spanish:
  - el holocausto del pueblo
  - la ofrenda quemada del pueblo
  lexicon: HALOT
  rationale: Se mantiene la relación genitiva del hebreo con una construcción natural en español, paralela a 'su holocausto'.
- source_word: וְכִפֶּר
  english_pob_choice: make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará expiación / hará propiciación
  - hará atonamiento
  lexicon: HALOT
  rationale: Se opta por 'expiación' para conservar una de las alternativas documentadas por el POB inglés y reflejar mejor la posible amplitud ritual de כפר en este contexto. Se evita 'atonamiento', poco natural en español bíblico.
- source_word: בַּעֲדוֹ וּבְעַד הָעָם
  english_pob_choice: for himself and for the people
  chosen_spanish: por sí mismo y por el pueblo
  alternatives_spanish:
  - en favor de sí mismo y en favor del pueblo
  - por él mismo y por el pueblo
  lexicon: HALOT
  rationale: '''Por'' expresa bien el sentido representativo/intercesor de בעד en español. ''Sí mismo'' reproduce la referencia reflexiva del hebreo con naturalidad.'
theological_decisions:
- issue: Cómo renderizar כפר en el marco ritual levítico
  english_pob_reading: make atonement
  chosen_spanish_reading: hará expiación
  alternative_spanish_readings:
  - hará atonamiento
  - hará propiciación
  - hará expiación
  rationale: La acción sacerdotal en Levítico 16 pertenece al lenguaje ritual de expiación. 'Hará expiación' preserva ese campo semántico sin comprometerse con una teoría específica de la expiación/atonement. La nota inglesa reconoce también 'make expiation' y 'purge' como alternativas léxicas.
  doctrine_reference: Translation philosophy §3, §6
- issue: Interpretación de בְּמָקוֹם קָדוֹשׁ
  english_pob_reading: in a holy place; not necessarily the inner sanctuary chamber
  chosen_spanish_reading: en un lugar santo, no necesariamente en el Lugar Santo técnico
  alternative_spanish_readings:
  - en el Lugar Santo
  - en un lugar sagrado
  rationale: Se evita fijar el término como designación técnica del recinto interior, porque el audit trail inglés advierte esa posible confusión. 'Lugar santo' preserva la indeterminación del hebreo.
  doctrine_reference: Source note on cultic space / lexical precision
translation_notes:
  revision_awareness: Se revisó el borrador con base en el paquete fuente y el audit trail inglés; no se detectaron cambios necesarios respecto de la lectura aprobada más reciente, por lo que la versión española conserva la misma decisión semántica y ritual.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en este enunciado.
  - Se usó 'holocausto' de forma consistente para עֹלָה, conforme al uso bíblico estándar y al paralelo inglés 'burnt offering'.
  - Se prefirió 'expiación' para כפר, manteniendo la tensión lexical señalada por el audit trail entre expiación y otras posibles matizaciones rituales.
  - El sintagma 'lugar santo' evita confundir el hebreo con el nombre técnico 'Lugar Santo' del santuario interior.
