revisions:
- from: Una espada contra los caldeos[a], declara Yahvé, contra los moradores de Babilonia, contra sus oficiales[b] y contra sus sabios.
  to: Una espada está contra los caldeos[a], declara Yahvé, y contra los habitantes de Babilonia, y contra sus oficiales[b], y contra sus sabios.
  rationale: 'Se hacen ajustes menores de idiomaticidad y legibilidad sin cambiar el sentido: se explicita la cópula implícita del hebreo, en línea con la decisión documentada en inglés, y se reemplaza «moradores» por «habitantes» como opción más natural en español neutral contemporáneo. Se conservan Yahvé y las notas léxicas existentes.'
