translation:
  language: es
  text: 'Entonces los hombres vinieron con las mujeres[a]. Todos los de corazón dispuesto trajeron broches, pendientes, anillos y adornos[b]: toda clase de joyas de oro. Y todo hombre que ofreció una ofrenda mecida de oro a Yahvé lo hizo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea «los hombres sobre/con las mujeres» es idiomática; probablemente significa que los hombres vinieron junto con las mujeres, o además de ellas.
    reason: alternative_reading
  - marker: b
    text: 'Los nombres precisos de algunas piezas de adorno son inciertos: «broches» también puede entenderse como «hebillas», «prendedores» o «anillos»; «pendientes» puede referirse a aretes o aros de nariz; «adornos» puede aludir a una clase específica de colgante o brazalete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: So ... came
  chosen_spanish: Así ... vinieron
  alternatives_spanish:
  - Y ... vinieron
  - Entonces ... vinieron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Así» preserva la secuencia con fluidez natural en español sin perder el valor discursivo.
- source_word: הָאֲנָשִׁים עַל הַנָּשִׁים
  english_pob_choice: the men came with the women
  chosen_spanish: los hombres vinieron con las mujeres
  alternatives_spanish:
  - los hombres vinieron junto con las mujeres
  - los hombres vinieron en adición a las mujeres
  lexicon: HALOT
  rationale: La preposición עַל aquí es idiomática y no debe leerse literalmente como espacial. «Con las mujeres» conserva la participación conjunta y evita una traducción extraña en español.
- source_word: כֹּל נְדִיב לֵב
  english_pob_choice: Everyone whose heart was willing
  chosen_spanish: Todo aquel cuyo corazón era voluntario
  alternatives_spanish:
  - Todo aquel de corazón voluntario
  - Toda persona de corazón dispuesto
  lexicon: HALOT
  rationale: El hebreo expresa una disposición interna; «cuyo corazón era voluntario» mantiene la imagen antropológica sin forzar un equivalente demasiado interpretativo.
- source_word: הֵבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - presentó
  - aportó
  lexicon: HALOT
  rationale: En contexto de ofrendas, «trajo» es la forma más directa y natural en español, manteniendo el acto de entrega sin sobrecargarlo.
- source_word: חָח
  english_pob_choice: brooches
  chosen_spanish: broches
  alternatives_spanish:
  - hebillas
  - prendedores
  - agujas
  lexicon: HALOT
  rationale: El objeto exacto es incierto; «broches» ofrece un equivalente moderno plausible y suficientemente amplio para no exagerar la precisión del término.
- source_word: נֶזֶם
  english_pob_choice: earrings
  chosen_spanish: zarcillos
  alternatives_spanish:
  - aretes
  - pendientes
  - anillos de nariz
  lexicon: HALOT
  rationale: El término puede referir a un aro para oreja o nariz. «Zarcillos» funciona como español bíblico amplio y mantiene la ambigüedad sin cerrar innecesariamente el sentido.
- source_word: טַבַּעַת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - sortijas
  lexicon: HALOT
  rationale: «Anillos» es el equivalente más neutral y directo para טַבַּעַת; evita precisar «anillo de sello» sin que el texto lo exija.
- source_word: כוּמָז
  english_pob_choice: ornaments
  chosen_spanish: adornos
  alternatives_spanish:
  - colgantes
  - piezas ornamentales
  - brazaletes
  lexicon: HALOT
  rationale: El término es raro y de identificación incierta; «adornos» preserva la vaguedad del hebreo mejor que una especificación falsa.
- source_word: כָּל כְּלִי זָהָב
  english_pob_choice: all kinds of gold jewelry
  chosen_spanish: toda clase de joyas de oro
  alternatives_spanish:
  - todo tipo de objeto de oro
  - toda clase de utensilios de oro
  - todas las piezas de oro
  lexicon: HALOT
  rationale: En este contexto, כְּלִי se refiere a objetos/artefactos valiosos, y la lista precedente es ornamental; «joyas de oro» comunica naturalmente el conjunto sin ampliar indebidamente el campo semántico.
- source_word: וְכָל אִישׁ
  english_pob_choice: And every man
  chosen_spanish: Y todo hombre
  alternatives_spanish:
  - y todo varón
  - y cada hombre
  lexicon: HALOT
  rationale: Se conserva el masculino singular del hebreo, acorde con la política de mantener la forma marcada cuando el texto la usa explícitamente.
- source_word: הֵנִיף
  english_pob_choice: presented
  chosen_spanish: ofreció
  alternatives_spanish:
  - meció
  - levantó
  lexicon: HALOT
  rationale: El verbo alude a una presentación ritual mediante elevación/meneo; «ofreció» es idiomático en español y queda especificado por «ofrenda mecida».
- source_word: תְּנוּפַת זָהָב
  english_pob_choice: a wave offering of gold
  chosen_spanish: una ofrenda mecida de oro
  alternatives_spanish:
  - una ofrenda alzada de oro
  - una ofrenda de balanceo de oro
  lexicon: HALOT
  rationale: «Ofrenda mecida» es la forma técnica más fiel y estable en español para תְּנוּפָה, preservando la especificidad cultual del término.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, en lugar de una sustitución por «Señor».'
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El hebreo presenta explícitamente el Tetragrámaton. El proyecto pide mantener el nombre divino en forma auditable; «Yahvé» es la solución establecida en español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Lectura de עַל הַנָּשִׁים en contexto
  english_pob_reading: the men came with the women
  chosen_spanish_reading: los hombres vinieron con las mujeres
  alternative_spanish_readings:
  - los hombres vinieron sobre las mujeres
  - los hombres vinieron en adición a las mujeres
  rationale: La expresión es idiomática y, en este contexto de aportes voluntarios, describe participación conjunta. La traducción literal «sobre» sería engañosa en español.
  doctrine_reference: HALOT / POB audit trail on idiomatic עַל
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés afinó el término para טַבַּעַת de «signet rings» a «rings», evitando una precisión excesiva no exigida por el hebreo. En esta versión española se reflejó esa cautela con «anillos». También se mantuvo la decisión de conservar el nombre divino como Yahvé y de traducir de forma idiomática la expresión hebrea sobre los hombres y las mujeres.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se preservó el masculino explícito de אִישׁ con «todo hombre».
  - Se evitó sobrerrepresentar la forma de טַבַּעַת; por eso se eligió «anillos» en vez de «anillos de sello».
  - «Ofrenda mecida» conserva el valor técnico de תְּנוּפָה sin volverlo opaco para el lector español.
  - Los términos de joyería se mantuvieron amplios cuando el hebreo es incierto, para no imponer identificaciones falsas.
