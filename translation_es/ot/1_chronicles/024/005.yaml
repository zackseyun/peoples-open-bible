    reason: lexical_alternative
  revision_rationale: Se ajusta «jefes» a «oficiales» para seguir mejor el valor de שָׂרִים y el audit trail inglés, evitando una expresión española torpe en «jefes de Dios». Se cambia «unos con otros» por «éstos con aquéllos» para preservar el matiz demostrativo de אֵלֶּה עִם אֵלֶּה. También se prefiere «por suertes» para reflejar con más transparencia el plural hebreo, manteniendo «por sorteo» como alternativa en nota.
