lexical_decisions:
- source_word: לַ/אֲבִיָּה
  english_pob_choice: for Abijah
  chosen_spanish: para Abías
  alternatives_spanish:
  - de Abías
  - perteneciente a Abías
  lexicon: HALOT
  rationale: La ל prefijada expresa asociación o pertenencia en esta lista de cabezas o representantes. En español, «para» conserva la relación funcional y el carácter elíptico del registro genealógico/listado sin añadir explicaciones no presentes en el hebreo.
- source_word: זִכְרִי
  english_pob_choice: Zichri
  chosen_spanish: Zicrí
  alternatives_spanish:
