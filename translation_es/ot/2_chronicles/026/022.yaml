translation:
  language: es
  text: Ahora, el resto de los hechos de Uzías[a], los primeros y los últimos, los escribió Isaías hijo de Amoz, el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las palabras de Uzías, los primeros y los últimos». Aquí «palabras» es una expresión hebrea de anales que significa los hechos o acontecimientos de su reinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora, lo restante de
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o permanece. En español, «el resto de» conserva el sentido de remanente y el prefijo conjuntivo puede reflejarse naturalmente como «Ahora» para marcar transición narrativa sin añadir contenido.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  lexicon: HALOT
  rationale: En esta fórmula cronística, דִּבְרֵי no se refiere principalmente a «palabras» sino al registro de acontecimientos o acciones de un rey. «Hechos» comunica bien ese valor historiográfico en español.
- source_word: עֻזִּיָּהוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzzías
  alternatives_spanish:
  - Uzías
  - Azarías
  lexicon: N/A
  rationale: El nombre hebreo עֻזִּיָּהוּ se vierte normalmente como «Uzzías» en español bíblico. Se conserva la forma propia del nombre presente en este versículo.
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרֹנִים
  english_pob_choice: first and last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - de los primeros a los últimos
  - los de antes y los de después
  lexicon: HALOT
  rationale: La expresión hebrea funciona como un modismo de totalidad temporal. «Los primeros y los últimos» mantiene de cerca la forma del original y su alcance total; en español sigue siendo comprensible.
- source_word: כָּתַב
  english_pob_choice: wrote
  chosen_spanish: los escribió
  alternatives_spanish:
  - escribió
  - los registró
  lexicon: HALOT
  rationale: El verbo פשוטamente significa «escribir». En español, el objeto implícito se aclara naturalmente como «los» para referirlo a los hechos/relatos mencionados, sin salir del sentido de escritura o registro.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaias
  lexicon: N/A
  rationale: Forma estándar en español del nombre del profeta.
- source_word: בֶן אָמ֖וֹץ
  english_pob_choice: son of Amoz
  chosen_spanish: hijo de Amoz
  alternatives_spanish:
  - descendiente de Amoz
  lexicon: N/A
  rationale: Patronímico directo y transparente.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  lexicon: HALOT
  rationale: El título definido identifica a Isaías por su oficio profético. «El profeta» es la traducción directa y suficiente; no se añade explícitamente «de Yahvé» porque el hebreo no lo expresa aquí.
theological_decisions:
- issue: Valor de דִּבְרֵי en una fórmula real de Crónicas
  english_pob_reading: Rendered as 'acts' rather than the more literal 'words'
  chosen_spanish_reading: «hechos» en lugar de «palabras»
  alternative_spanish_readings:
  - palabras
  - asuntos
  rationale: No es un punto doctrinal, pero sí interpretativo. En Crónicas, la fórmula alude al registro histórico de un reinado; «hechos» transmite mejor ese sentido sin ocultar que el hebreo dice literalmente «palabras».
  doctrine_reference: Translation philosophy §1, §5
- issue: Conjunction initial וְ
  english_pob_reading: Included as 'Now' rather than 'And'
  chosen_spanish_reading: «Ahora» al inicio de la oración
  alternative_spanish_readings:
  - Y
  - Entonces
  rationale: La conjunción hebrea puede reflejarse como transición narrativa. «Ahora» suena natural en español y conserva la función discursiva sin forzar una coordinación mecánica.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del POB inglés que prefirió «first and last» sobre «from first to last», por lo que aquí se mantuvo una correspondencia cercana con «los primeros y los últimos» en vez de una paráfrasis más expansiva. También se preservó el valor historiográfico de דִּבְרֵי con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene יהוה.
  - Se usó «el profeta» para הַנָּבִיא, coherente con la terminología del proyecto para títulos proféticos.
  - La puntuación sigue el español moderno y separa claramente la aposición final.
