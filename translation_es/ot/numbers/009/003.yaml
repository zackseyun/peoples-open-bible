revisions:
- from: El día catorce de este mes[a], entre las tardes, lo harán en su tiempo señalado; conforme a todas sus estatutos y conforme a todos sus preceptos lo harán.
  to: El día catorce de este mes[a], entre las tardes, la celebrarán en su tiempo señalado; conforme a todos sus estatutos y conforme a todas sus ordenanzas la celebrarán.
  rationale: Se revisa «lo harán» a «la celebrarán» para expresar de forma natural en español el sentido idiomático cultual de תעשו אתו con la Pascua como objeto, en línea con la decisión documentada del POB de ‘keep/observe it’. Se corrige la concordancia a «todos sus estatutos» y se sustituye «preceptos» por «ordenanzas» para reflejar mejor la distinción entre חֻקּוֹת y מִשְׁפָּטִים. Se conserva «entre las tardes» con nota, porque preserva la especificidad ritual del hebreo.
