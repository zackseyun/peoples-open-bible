  text: Again he sent a third captain of fifty with his fifty[a]. He went up and came, and the third captain of fifty knelt on his knees before Elijah and pleaded with him and said to him, “Man of God[b], please let my life and the life of these fifty servants of yours be precious in your sight.”
  footnotes:
