translation:
  language: es
  text: Y si te acercas[a], no incurras en culpa, no sea que pierdas tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego conservado para este versículo transmite una línea sustancialmente distinta: «En la mano de los artesanos, una obra será alabada, y el gobernante de un pueblo es sabio en su habla». El hebreo y el griego divergen marcadamente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם קָרַבְתָּ / ἐν χειρὶ τεχνιτῶν
  english_pob_choice: And if you draw near / In the hand of craftsmen
  chosen_spanish: Y si te acercas
  alternatives_spanish:
  - En la mano de los artesanos
  - En manos de los artesanos
  - Y si te aproximas
  lexicon: contextual source comparison
  rationale: El hebreo extenso de este registro y el griego conservan líneas completamente distintas; siguiendo el criterio auditado para Sirácida, la lectura hebrea se adopta como texto principal. קָרַבְתָּ se rinde naturalmente por «te acercas», conservando el movimiento físico implícito.
- source_word: לֹא תֶאְשָׁם
  english_pob_choice: do not incur guilt
  chosen_spanish: no incurrirás en culpa
  alternatives_spanish:
  - no te harás culpable
  - no pecarás
  - no quedarás culpable
  lexicon: Hebrew verb semantics in context
  rationale: La forma expresa la idea de quedar o resultar culpable; «incurrir en culpa» preserva la fuerza jurídica/moral sin endurecer innecesariamente el giro español.
- source_word: פֶּן תִּקַּח אֶת נִשְׁמָתֶךָ
  english_pob_choice: lest you lose your life
  chosen_spanish: para no perder tu vida
  alternatives_spanish:
  - no sea que te quite la vida
  - para que no tome tu vida
  - para no llevarse tu vida
  lexicon: Hebrew נשמה / life-breath semantics
  rationale: נִשְׁמָה puede significar aliento vital o vida. Dado el español bíblico actual, «tu vida» comunica bien el resultado temido y evita una formulación demasiado literal que sonaría extraña.
theological_decisions:
- issue: Divergence between Hebrew and Greek witnesses for Sirach 9:18
  english_pob_reading: Translate the extant Hebrew as the main line, while documenting the Greek as a significant alternative witness in the audit trail.
  chosen_spanish_reading: Se traduce el hebreo conservado como texto principal.
  alternative_spanish_readings:
  - En la mano de los artesanos, una obra será alabada, y el gobernante de un pueblo es sabio en su habla.
  rationale: 'El hebreo conservado y el griego ofrecen sentencias distintas; no se armonizan. La política del proyecto para Sirácida pide transparencia textual: el texto principal sigue el hebreo disponible, y la lectura griega queda registrada como testimonio alterno sin borrar la tensión documental.'
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives and from Greek where it does not; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal y que toda nota tenga anclaje visible. La línea principal ahora sigue la lectura hebrea conservada, coherente con la revisión más reciente del expediente.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y digno, apto para lectura eclesial.
  - Se evitó «SEÑOR» y otras convenciones de ocultamiento porque este versículo no contiene el tetragrámaton.
  - Se eligió «incurrir en culpa» para conservar el matiz de responsabilidad moral/jurídica.
  - No se incluyó una transliteración innecesaria de términos hebreos para no cargar el texto principal.
  - La nota al pie conserva la alternativa griega documentada en el expediente, ya que la divergencia textual es sustancial.
