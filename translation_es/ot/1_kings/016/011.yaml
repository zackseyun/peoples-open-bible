translation:
  language: es
  text: Y aconteció que, cuando comenzó a reinar, apenas se sentó en su trono, derribó a toda la casa de Baasa. No le dejó un solo varón[a], ni a sus parientes[b] ni a sus amigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «uno que orina contra una pared», un modismo grosero para «varón» o «macho».
    reason: lexical_alternative
  - marker: b
    text: O «sus vengadores» o «sus redentores»; el término hebreo se refiere a un pariente con obligaciones familiares.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente evento en secuencia. «Aconteció» conserva ese marcador narrativo con un registro natural y digno en español.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - cuando reinó
  lexicon: HALOT
  rationale: El contexto señala el inicio del reinado, no solo el lapso general de reinar. «Comenzó a reinar» expresa bien ese valor de accession o comienzo del reinado.
- source_word: כְשִׁבְתּוֹ עַל כִּסְאוֹ
  english_pob_choice: as soon as he sat on his throne
  chosen_spanish: al sentarse en su trono
  alternatives_spanish:
  - cuando se sentó en su trono
  - apenas se sentó en su trono
  lexicon: HALOT
  rationale: La construcción marca sucesión temporal inmediata. «Al sentarse» comunica la relación temporal sin sonar forzado en español, y mantiene la rapidez del hebreo.
- source_word: הִכָּה
  english_pob_choice: he struck down
  chosen_spanish: golpeó
  alternatives_spanish:
  - mató
  - hirió
  lexicon: HALOT
  rationale: En este contexto la acción es violenta y mortal. «Golpeó» conserva el sentido básico de נכה como golpear/abatir, pero es más natural en español que un calco literal; el contexto de exterminio deja claro el resultado letal.
- source_word: אֶת כָּל בֵּית בַּעְשָׁא
  english_pob_choice: all the house of Baasha
  chosen_spanish: toda la casa de Baasa
  alternatives_spanish:
  - toda la casa de Baasá
  - toda la dinastía de Baasa
  lexicon: HALOT
  rationale: «Casa» preserva el valor dinástico de בַּיִת en Reyes. Se mantiene el nombre como «Baasa» por consistencia castellana, sin alterar el sentido de linaje.
- source_word: לֹא הִשְׁאִיר ל֖וֹ
  english_pob_choice: He did not leave him
  chosen_spanish: No le dejó
  alternatives_spanish:
  - No le dejó sobreviviente alguno
  - No lo dejó
  lexicon: HALOT
  rationale: El hebreo expresa que no dejó ningún descendiente o resto vivo para Baasa. «No le dejó» mantiene la construcción dativa y deja que el complemento siguiente precise el alcance.
- source_word: מַשְׁתִּין בְּקִיר
  english_pob_choice: a single male
  chosen_spanish: un solo varón[b]
  alternatives_spanish:
  - ningún hombre
  - uno que orina contra la pared
  lexicon: HALOT
  rationale: Se conserva el referente humano masculino con una expresión clara y respetuosa en español. El idiomatismo hebreo se documenta en nota, porque su literalidad es una marca léxica importante que no conviene perder.
- source_word: וְגֹאֲלָיו
  english_pob_choice: his kinsmen
  chosen_spanish: ni a sus parientes
  alternatives_spanish:
  - ni a sus redentores
  - ni a sus vengadores de sangre
  lexicon: HALOT
  rationale: En este contexto, גֹאֲלִים alude a parientes con obligaciones familiares, no a un título técnico único. «Parientes» comunica la base familiar sin introducir una función legal más específica de la que el pasaje exige.
- source_word: וְרֵעֵהוּ
  english_pob_choice: his friends
  chosen_spanish: ni a sus amigos
  alternatives_spanish:
  - ni a sus compañeros
  - ni a sus allegados
  lexicon: HALOT
  rationale: «Amigos» es el equivalente más directo y transparente para רֵעַ en este contexto, y mantiene el contraste con los parientes.
theological_decisions:
- issue: Alcance de la destrucción de la casa de Baasa
  english_pob_reading: He did not leave him a single male, or any of his kinsmen or his friends.
  chosen_spanish_reading: No le dejó un solo varón, ni a sus parientes ni a sus amigos.
  alternative_spanish_readings:
  - No dejó con vida a ningún varón
  - No dejó descendiente ni allegado
  rationale: El versículo presenta la eliminación total de la línea y red de Baasa. La redacción española conserva esa amplitud sin suavizarla ni convertirla en una paráfrasis menos precisa.
  doctrine_reference: Historiografía deuteronomista; juicio divino sobre casas reales (1 Reyes)
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios; el pasaje presenta alto acuerdo en el flujo narrativo y en las decisiones léxicas clave, especialmente en el modismo מַשְׁתִּין בְּקִיר y en גֹאֲלָיו.
  spanish_consistency_notes:
  - Se usa «Baasa» para el nombre propio, coherente con una forma castellana breve y estable.
  - Se conserva «casa» para בַּיִת en sentido dinástico, evitando sustituirlo por «familia» o «dinastía» en el texto principal.
  - Se mantiene el patrón narrativo con «Y aconteció que», cercano al hebreo y publicable en español.
  - «Varón» se usa para reflejar el rasgo masculino del modismo hebreo sin caer en una expresión demasiado cruda en el cuerpo del texto.
