translation:
  language: es
  text: Y estos días serán para ellos en el mes de Adar[a], los días catorce y quince del mismo mes, con asamblea y alegría y gozo delante de Dios[b], por todas las generaciones para siempre, entre su pueblo, Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con reunión’ o ‘con convocación’; el griego συναγωγή aquí se refiere a una asamblea comunitaria, no específicamente a un edificio de sinagoga.
    reason: lexical_alternative
  - marker: b
    text: O ‘en la presencia de Dios’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - vendrán a ser
  lexicon: BDAG
  rationale: El futuro simple español comunica bien el valor futuro/decreto del griego y conserva el tono formal del pasaje festivo-legislativo.
- source_word: αἱ ἡμέραι αὗται
  english_pob_choice: these days
  chosen_spanish: estos días
  alternatives_spanish:
  - estos mismos días
  lexicon: BDAG
  rationale: La expresión demostrativa se vuelve de modo natural en español sin añadir énfasis innecesario.
- source_word: ἐν μηνὶ Ἀδάρ
  english_pob_choice: in the month of Adar
  chosen_spanish: en el mes de Adar
  alternatives_spanish:
  - durante el mes de Adar
  lexicon: BDAG
  rationale: Se conserva el nombre del mes por transliteración y la preposición temporal básica del original.
- source_word: τῇ τεσσαρεσκαιδεκάτῃ καὶ τῇ πεντεκαιδεκάτῃ
  english_pob_choice: on the fourteenth and on the fifteenth
  chosen_spanish: el día catorce y el día quince
  alternatives_spanish:
  - el catorce y el quince
  lexicon: BDAG
  rationale: En español, repetir 'el día' hace explícita la referencia calendárica y mantiene la formalidad del texto.
- source_word: τοῦ αὐτοῦ μηνός
  english_pob_choice: of the same month
  chosen_spanish: del mismo mes
  alternatives_spanish:
  - de ese mismo mes
  lexicon: BDAG
  rationale: Traducción directa y clara que remite a Adar sin sobrecargar la frase.
- source_word: μετὰ συναγωγῆς
  english_pob_choice: with assembly
  chosen_spanish: con asamblea
  alternatives_spanish:
  - con reunión
  - con congregación
  lexicon: BDAG
  rationale: '''Asamblea'' expresa el sentido de reunión comunitaria. Se evita ''sinagoga'' porque el griego aquí no nombra un edificio sino una convocatoria de personas.'
- source_word: χαρᾶς
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  lexicon: BDAG
  rationale: '''Alegría'' es el equivalente natural del sustantivo y mantiene bien el paralelo con el término siguiente.'
- source_word: εὐφροσύνης
  english_pob_choice: gladness
  chosen_spanish: gozo
  alternatives_spanish:
  - regocijo
  - contentamiento
  lexicon: BDAG
  rationale: Se elige 'gozo' para distinguirlo de 'alegría' y conservar un matiz festivo más solemne que 'merriment' o 'celebración'.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' reproduce la orientación explícita hacia Dios con un giro natural en español bíblico contemporáneo.'
- source_word: εἰς γενεὰς εἰς τὸν αἰῶνα
  english_pob_choice: throughout the generations forever
  chosen_spanish: por todas las generaciones para siempre
  alternatives_spanish:
  - de generación en generación para siempre
  - por generaciones para siempre
  lexicon: BDAG
  rationale: La doble expresión se conserva como continuidad generacional más duración absoluta, sin volverla rígidamente literal.
- source_word: ἐν τῷ λαῷ αὐτοῦ Ἰσραήλ
  english_pob_choice: among his people Israel
  chosen_spanish: entre su pueblo Israel
  alternatives_spanish:
  - en su pueblo Israel
  - entre el pueblo de Israel
  lexicon: BDAG
  rationale: '''Entre'' transmite bien la idea de pertenencia dentro de una colectividad. Se mantiene ''Israel'' como apposición identitaria del pueblo.'
theological_decisions:
- issue: Mantener la referencia explícita a Dios en una celebración comunitaria
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - en la presencia de Dios
  rationale: El griego incluye θεοῦ de manera explícita; por eso la celebración no se reduce a una mera festividad civil o étnica.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conservar la fuerza durativa de la fórmula temporal final
  english_pob_reading: throughout the generations forever
  chosen_spanish_reading: por todas las generaciones para siempre
  alternative_spanish_readings:
  - de generación en generación para siempre
  rationale: La fórmula combina continuidad histórica y permanencia absoluta. La redacción española conserva ambos elementos sin perder fluidez.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa presentan acuerdo alto y no requieren ajustes textuales; la versión española mantiene las decisiones léxicas clave del POB y conserva la doble valoración festiva (χαρᾶς / εὐφροσύνης), la orientación teológica explícita (ἐνώπιον τοῦ θεοῦ) y la fórmula temporal intensiva final.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el original dice θεοῦ, no κύριος.
  - Se conserva la distinción entre 'alegría' y 'gozo' para no colapsar χαρά y εὐφροσύνη en un solo término.
  - '''Asamblea'' refleja συναγωγή como reunión comunitaria, no como nombre institucional.'
  - La preposición 'delante de' mantiene una expresión bíblica natural sin borrar la alternativa semántica de 'en la presencia de'.
