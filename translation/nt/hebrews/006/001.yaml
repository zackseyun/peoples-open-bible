id: HEB.6.1
reference: Hebrews 6:1
source:
  edition: SBLGNT
  text: Διὸ ἀφέντες τὸν τῆς ἀρχῆς τοῦ Χριστοῦ λόγον ἐπὶ τὴν τελειότητα φερώμεθα, μὴ πάλιν θεμέλιον καταβαλλόμενοι μετανοίας ἀπὸ νεκρῶν ἔργων, καὶ πίστεως ἐπὶ θεόν,
translation:
  text: Therefore[a], leaving the elementary message about the Messiah, let us be carried on to maturity, not laying again a foundation of repentance from dead works and of faith toward God[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elementary message of the Messiah' or 'the basic teaching about the Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to perfection' or 'to completeness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'let us go on'; Greek more literally has a passive sense, 'let us be carried on' or 'borne along.'
    reason: lexical_alternative
  - marker: d
    text: Or 'faith in God.'
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Inferential conjunction introducing an exhortational conclusion from the preceding context; 'Therefore' is natural and sufficiently formal.
- source_word: ἀφέντες
  lemma: ἀφίημι
  chosen: leaving
  alternatives:
  - having left
  - setting aside
  lexicon: BDAG
  rationale: Aorist participle from ἀφίημι, here indicating moving on from elementary instruction rather than abandoning it absolutely. 'Leaving' preserves the participial force without overinterpreting.
- source_word: τὸν τῆς ἀρχῆς τοῦ Χριστοῦ λόγον
  chosen: the message about the beginning of the Messiah
  alternatives:
  - the elementary message of the Messiah
  - the word of the beginning about the Messiah
  - the basic teaching about the Messiah
  lexicon: BDAG
  rationale: λόγος here is best rendered 'message' or 'word/teaching.' The genitival chain is difficult; this rendering preserves that the reference is to initial instruction concerning the Messiah. 'Messiah' follows the doctrinal default for Χριστός as title.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here rather than a name-like designation; per doctrine, Χριστός is rendered 'Messiah' where context supports title sense.
- source_word: ἐπὶ τὴν τελειότητα
  chosen: to maturity
  alternatives:
  - to perfection
  - to completeness
  lexicon: BDAG
  rationale: τελειότης here refers to spiritual maturity/completeness rather than sinless perfection. 'Maturity' communicates the exhortational sense in context and avoids misleading absolutism.
- source_word: φερώμεθα
  chosen: let us be carried on
  alternatives:
  - let us go on
  - let us be borne along
  lexicon: BDAG
  rationale: Present passive/subjunctive form is more literally 'let us be carried/borne.' Retaining the passive preserves the nuance that progress is not framed as sheer self-propulsion. 'Carried on' remains readable English.
- source_word: μὴ πάλιν
  chosen: not ... again
  alternatives:
  - not once more
  - not repeatedly
  lexicon: BDAG
  rationale: Negated participial phrase indicating refusal to relay foundational matters another time.
- source_word: θεμέλιον καταβαλλόμενοι
  chosen: laying again a foundation
  alternatives:
  - placing again a foundation
  - founding again
  lexicon: BDAG
  rationale: Construction is metaphorical for establishing basic instruction. 'Laying a foundation' is idiomatic English and preserves the building metaphor.
- source_word: μετανοίας ἀπὸ νεκρῶν ἔργων
  chosen: a changed mind from dead works
  alternatives:
  - repentance from lifeless works
  - repentance from works that lead to death
  lexicon: BDAG
  rationale: Traditional and contextually apt rendering. 'Dead works' is compact and preserves the metaphorical force without narrowing the phrase to one interpretive option.
- source_word: πίστεως ἐπὶ θεόν
  chosen: faith toward God
  alternatives:
  - faith in God
  - trust in God
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine. With ἐπί + accusative, 'toward God' is somewhat more literal and preserves the directional nuance, though 'in God' is a viable idiomatic alternative.
