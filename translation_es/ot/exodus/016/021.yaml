- from: Y recogían[a] eso mañana tras mañana, cada uno según lo que podía comer; pero cuando el sol se calentaba, se derretía.
  to: Y lo recogieron mañana tras mañana[a], cada uno según lo que podía comer; pero cuando el sol calentaba, se derretía.
  rationale: Se cambió «eso» por «lo» para reflejar con naturalidad y fidelidad el pronombre objeto hebreo. Se sustituyó «recogían» por «recogieron» para ajustarse mejor a la secuencia narrativa del wayyiqtol hebreo, dejando la iteración en «mañana tras mañana». También se suavizó «cuando el sol se calentaba» a «cuando el sol calentaba» por mayor naturalidad en español sin pérdida de sentido.
