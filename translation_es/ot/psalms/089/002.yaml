    text: O «misericordias» o «actos de amor fiel». El hebreo חַסְדֵי puede denotar el amor de pacto de Yahvé expresado en actos repetidos de misericordia.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la representación principal de חַסְדֵי para alinearla con la evidencia fuente y la decisión lexical auditada del POB inglés. «Amor fiel» preserva mejor el sentido de amor pactual constante; la nota conserva la alternativa de «misericordias» y las manifestaciones concretas de ese amor. El resto del versículo se mantiene porque refleja fielmente el hebreo y lee bien en español.
