translation:
  language: es
  text: Si de veras se engrandecen contra mí[a] y usan mi deshonra como prueba contra mí[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se engrandecen» conserva la imagen del hebreo; también puede entenderse como «se hacen grandes» o «se exaltan» a costa de otro.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo hebreo tiene sentido forense: también puede traducirse «arguyen mi oprobio contra mí» o «establecen mi deshonra como prueba contra mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם אָמְנָם
  english_pob_choice: If indeed
  chosen_spanish: Si de veras
  alternatives_spanish:
  - Si en verdad
  - Si realmente
  - Si ciertamente
  lexicon: HALOT
  rationale: La combinación condicional + enfática pide en español una condición realzada. «Si de veras» conserva el valor de apertura condicional de אִם y la fuerza enfática de אָמְנָם sin volver la frase pesada.
- source_word: תַּגְדִּילוּ
  english_pob_choice: magnify yourselves
  chosen_spanish: se engrandecen
  alternatives_spanish:
  - se hacen grandes
  - se exaltan
  - se engrandecen a sí mismos
  lexicon: HALOT
  rationale: El verbo hiphil de גדל expresa hacerse grande o engrandecerse a costa de otro. «Se engrandecen» preserva la imagen verbal y la carga de superioridad hostil; el reflexivo explícito no es necesario en español.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - sobre mi persona
  - en mi contra
  lexicon: HALOT
  rationale: Con este uso, la preposición expresa oposición hostil, no simple ubicación. «Contra mí» es la opción natural y fiel en español.
- source_word: וְתוֹכִיחוּ
  english_pob_choice: prove
  chosen_spanish: prueban
  alternatives_spanish:
  - arguyen
  - demuestran
  - condenan
  - establecen como prueba
  lexicon: HALOT
  rationale: 'El hiphil de יכח tiene aquí sentido forense: sostener o establecer un caso contra alguien. «Prueban» reproduce esa fuerza judicial sin sobrecargar la frase; el objeto de prueba es la «deshonra» de Job.'
- source_word: חֶרְפָּתִי
  english_pob_choice: my disgrace
  chosen_spanish: mi deshonra
  alternatives_spanish:
  - mi oprobio
  - mi reproche
  - mi vergüenza
  lexicon: HALOT
  rationale: חֶרְפָּה puede ser reproche, vergüenza o deshonra. «Deshonra» comunica bien el deshonor social y moral que los amigos están usando contra Job, y suena más natural que «reproche» en español actual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «would» para reflejar mejor la condición directa del hebreo. Por eso la versión española mantiene una condicional simple («Si de veras...») sin añadir matices irreales o hipotéticos adicionales.
  spanish_consistency_notes:
  - Se mantuvo «mí» en ambos miembros para reflejar la repetición enfática de עָלַי.
  - Se evitó traducir mecánicamente «contra» en el segundo miembro como si fuera redundancia estilística; en español la repetición conserva la fuerza acusatoria del hebreo.
  - No se usó «SEÑOR», «Cristo» ni terminología no presente en el versículo.
