id: NUM.9.6
reference: Numbers 9:6
source:
  edition: WLC
  text: וַ/יְהִ֣י אֲנָשִׁ֗ים אֲשֶׁ֨ר הָי֤וּ טְמֵאִים֙ לְ/נֶ֣פֶשׁ אָדָ֔ם וְ/לֹא יָכְל֥וּ לַ/עֲשֹׂת הַ/פֶּ֖סַח בַּ/יּ֣וֹם הַ/ה֑וּא וַֽ/יִּקְרְב֞וּ לִ/פְנֵ֥י מֹשֶׁ֛ה וְ/לִ/פְנֵ֥י אַהֲרֹ֖ן בַּ/יּ֥וֹם הַ/הֽוּא־־׃
translation:
  text: Now there were men who were unclean because of a human corpse[a], so they could not keep the Passover on that day; and they came near before Moses and before Aaron on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'unclean for the נפש of a man,' an idiom for impurity caused by a human corpse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now there were
  alternatives:
  - And there were
  - It happened that there were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative circumstance. 'Now there were' is natural modern English and preserves the scene-setting function without overly wooden style.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - some men
  - people
  lexicon: HALOT
  rationale: The noun is specifically masculine plural, not a generic term for people. Per gender-accurate philosophy, 'men' best matches the source.
- source_word: טְמֵאִים לְנֶפֶשׁ אָדָם
  chosen: unclean because of a human corpse
  alternatives:
  - unclean by a dead body
  - defiled by a corpse
  - unclean for the soul/person of a man
  lexicon: HALOT
  rationale: This idiom refers to corpse impurity in priestly/ritual contexts. 'Because of a human corpse' communicates the ritual source of uncleanness clearly in contemporary English. 'Dead body' is possible, but 'corpse' is slightly more precise for the legal-ritual setting.
- source_word: וְלֹא יָכְלוּ
  chosen: so they could not
  alternatives:
  - and they were not able to
  - and they could not
  lexicon: HALOT
  rationale: The clause expresses resulting inability due to impurity. 'So they could not' makes the connection explicit in idiomatic English while remaining faithful to the sense.
- source_word: לַעֲשֹׂת הַפֶּסַח
  chosen: keep the Passover
  alternatives:
  - do the Passover
  - observe the Passover
  - celebrate the Passover
  lexicon: HALOT
  rationale: The Hebrew literally says 'do the Passover,' an idiom for observing/keeping it. 'Keep the Passover' is established, clear English that preserves the covenantal-observance sense better than the more festive 'celebrate.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On that day' preserves the preposition and the narrative emphasis.
- source_word: וַיִּקְרְבוּ לִפְנֵי
  chosen: and they came near before
  alternatives:
  - and they approached
  - and they presented themselves before
  lexicon: HALOT
  rationale: קרב means 'come near/approach.' Including 'before' reflects לִפְנֵי. This keeps the formal posture of appearing before Moses and Aaron without overinterpreting it as a legal petition, though that is implied by context.
- source_word: מֹשֶׁה ... אַהֲרֹן
  chosen: Moses ... Aaron
  rationale: Standard English transliterations of the personal names, in keeping with the translation philosophy to transliterate names.
