  language: en
  yaml_path: translation/ot/2_samuel/019/020.yaml
  text: And he said to the king[a], “Do not let my lord count me guilty, and do not remember how your servant did wrong on the day my lord the king went out from Jerusalem[b], so that the king should take it to heart.”
  footnotes:
