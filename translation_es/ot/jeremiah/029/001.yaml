base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/029/001.yaml
  text: Now these are the words of the letter that Jeremiah the prophet sent from Jerusalem to the remaining elders of the exiles[a], and to the priests, the prophets[d][c][b], and all the people whom Nebuchadnezzar had carried away from Jerusalem to Babylon.
  footnotes:
  - marker: a
    text: Or 'the words of the scroll.' The Hebrew סֵפֶר can denote a written document more broadly; 'letter' is chosen because Jeremiah sent it to specific recipients.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the elders of the exile.' The Hebrew may refer either to the remaining elders among the deported community or, more abstractly, to the exile community itself.
    reason: lexical_alternative
  - marker: c
    text: Or 'whom Nebuchadnezzar had exiled' / 'had deported.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew: ''Nebuchadnezzar''; some English traditions use ''Nebuchadrezzar'' in Jeremiah.'
    reason: lexical_alternative
