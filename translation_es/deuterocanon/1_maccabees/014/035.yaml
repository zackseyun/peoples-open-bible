translation:
  language: es
  text: Y el pueblo vio la fidelidad[a] de Simón y la gloria que se había propuesto realizar para su nación, y lo nombraron su líder y sumo sacerdote, porque había hecho todas estas cosas, y por la justicia[b] y la fidelidad[c] que había mantenido a su nación, y porque había procurado de toda manera exaltar a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fe»; πίστις puede denotar fidelidad o lealtad, además de fe.
    reason: lexical_alternative
  - marker: b
    text: O «rectitud»; δικαιοσύνη puede tener aquí un matiz cívico o ético.
    reason: lexical_alternative
  - marker: c
    text: O «fe»; la segunda πίστις también puede referirse a la fidelidad o confiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - confianza
  lexicon: BDAG
  rationale: En este contexto histórico-político, πίστις describe la lealtad comprobada de Simón. «Fidelidad» comunica mejor la idea de reliability/fidelity que «fe», sin perder la relación con el término griego. El inglés POB revisado ya favorece «faithfulness», y el español puede reflejar esa precisión de forma natural.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  lexicon: LSJ
  rationale: δόξα puede abarcar honor, renombre o gloria. «Gloria» conserva la amplitud del término y mantiene el registro elevado del pasaje, sin cerrar indebidamente el sentido.
- source_word: ἐβουλεύσατο ποιῆσαι
  english_pob_choice: had purposed to bring about
  chosen_spanish: había resuelto procurar
  alternatives_spanish:
  - había planeado hacer
  - había resuelto llevar a cabo
  lexicon: LSJ
  rationale: La construcción expresa intención deliberada orientada a la realización. «Había resuelto procurar» recoge tanto la decisión como el empeño por lograr el bien para la nación, con español natural y sin endurecer la frase.
- source_word: ἔθνει
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - comunidad nacional
  lexicon: LSJ
  rationale: Aquí ἔθνος designa la comunidad nacional de Simón. «Nación» preserva el matiz político-corporativo mejor que «pueblo» en esta primera ocurrencia.
- source_word: ἔθεντο
  english_pob_choice: appointed
  chosen_spanish: lo nombraron
  alternatives_spanish:
  - lo appointaron
  - lo establecieron
  lexicon: LSJ
  rationale: El verbo indica instalación formal en un cargo. En español, «lo nombraron» transmite con claridad esa investidura institucional.
- source_word: ἡγούμενον
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - gobernante
  - jefe
  lexicon: LSJ
  rationale: ἡγούμενος es un término amplio para quien conduce o gobierna. «Líder» es claro y no sobredetermina el alcance del cargo.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sacerdote principal
  lexicon: LSJ
  rationale: La equivalencia tradicional y precisa en contexto judío es «sumo sacerdote».
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB mantiene «righteousness», en este contexto la carga cívico-legal de δικαιοσύνη se expresa de forma más natural en español como «justicia». La alternativa «rectitud» queda implícitamente disponible, pero «justicia» comunica mejor el orden público y la conducta justa hacia la nación.
- source_word: συνετήρησεν
  english_pob_choice: had maintained
  chosen_spanish: había mantenido
  alternatives_spanish:
  - había preservado
  - había guardado
  lexicon: LSJ
  rationale: El verbo sugiere conservación continua. «Había mantenido» es natural y conserva la idea de continuidad respecto de la justicia y la fidelidad.
- source_word: ἐζήτησεν παντὶ τρόπῳ
  english_pob_choice: had sought in every way
  chosen_spanish: había procurado en toda forma
  alternatives_spanish:
  - había buscado por todos los medios
  - había intentado de todas las maneras
  lexicon: LSJ
  rationale: La frase enfatiza esfuerzo total. «En toda forma» reproduce bien la amplitud de παντὶ τρόπῳ en un español sobrio y publicable.
- source_word: ὑψῶσαι
  english_pob_choice: to exalt
  chosen_spanish: exaltar
  alternatives_spanish:
  - elevar
  - levantar
  lexicon: LSJ
  rationale: ὑψόω aquí significa elevar la condición o el honor del pueblo. «Exaltar» conserva el registro elevado y el sentido de promoción honorífica.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: LSJ
  rationale: λαός designa al pueblo como colectivo. «Pueblo» distingue esta segunda referencia de ἔθνος y mantiene la cohesión del miembro final del versículo.
theological_decisions:
- issue: Cómo reflejar πίστις en un elogio histórico de Simón
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  rationale: El contexto habla de una lealtad demostrada mediante hechos. «Fidelidad» expresa mejor esa confiabilidad que «fe» en español, y sigue la revisión del POB inglés que corrigió hacia faithfulness. No se trata de borrar la ambigüedad griega, sino de escoger el valor contextual más fuerte para este versículo.
  doctrine_reference: 'DOCTRINE.md: términos discutidos — πίστις permite faith / faithfulness según contexto; preservar la alternativa cuando importe'
- issue: Cómo traducir δικαιοσύνη en un marco político-histórico
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: Aquí δικαιοσύνη parece referirse a conducta justa y recta en favor de la nación. En español, «justicia» comunica mejor ese matiz cívico y relacional. Se mantiene la tensión con «rectitud» en la constancia del término griego, pero el texto principal prioriza la claridad contextual.
  doctrine_reference: 'DOCTRINE.md: términos discutidos — δικαιοσύνη puede ser righteousness/justice según contexto'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que cambió la primera y la segunda ocurrencia de πίστις de «faith» a «faithfulness». Por eso el español principal usa «fidelidad» en ambas posiciones. También conserva la distinción entre ἔθνος («nación») y λαός («pueblo»), y refleja el matiz cívico de δικαιοσύνη con «justicia», manteniendo la alternativa en nota.
  spanish_consistency_notes:
  - He mantenido «nación» para ἔθνος y «pueblo» para λαός para preservar la distinción del griego.
  - He usado «fidelidad» de manera consistente para las dos ocurrencias de πίστις, en línea con la revisión inglesa.
  - He optado por «sumo sacerdote» como equivalente estable de ἀρχιερεύς.
  - He evitado el calco «gloria»/«honor» sin explicación, manteniendo una traducción publicable y fiel al rango semántico del texto.
