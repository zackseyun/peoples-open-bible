  to: El pozo que cavaron los príncipes, que los nobles del pueblo excavaron con el cetro[a] del gobernante, con sus bastones. Y desde el desierto fueron a Matana.[b]
  rationale: Se añade la nota exigida para la alternativa significativa de בִּמְחֹקֵק, se mejora la naturalidad de la imagen poética con «excavaron», y se afina el instrumento de autoridad con «cetro». También se preserva en nota la elipsis hebrea de la cláusula final, conforme al audit trail inglés.
