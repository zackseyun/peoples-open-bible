translation:
  language: es
  text: Y serás expulsado de entre los hombres, y tu morada será con las bestias del campo. Te harán comer hierba como los bueyes, y serás empapado con el rocío del cielo, y siete tiempos[a] pasarán sobre ti, hasta que sepas que el Altísimo gobierna en el reino de los hombres y lo da a quien él quiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siete períodos»; muchos entienden esto como «siete años».'
    reason: alternative_reading
lexical_decisions:
- source_word: טָרְדִין
  english_pob_choice: you will be driven away
  chosen_spanish: te expulsarán
  alternatives_spanish:
  - te arrojarán
  - te echarán fuera
  lexicon: HALOT
  rationale: El arameo expresa una expulsión forzada; en español, "te expulsarán" conserva la fuerza activa e impersonal sin suavizarla. Evita volverlo meramente descriptivo.
- source_word: אֲנָשָׁא
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - la humanidad
  lexicon: HALOT
  rationale: Aquí el contraste es entre la vida humana y la vida animal, y más adelante aparece "el reino de los hombres". "Los hombres" mantiene ese contraste y la misma elección léxica del texto base.
- source_word: חֵיוַת בָּרָא
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: La expresión aramea es tradicionalmente zoológica y elevada. "Bestias del campo" conserva el tono y la imagen de vida salvaje fuera del ámbito humano.
- source_word: מְדֹרָךְ
  english_pob_choice: your dwelling
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu habitación
  - tu residencia
  lexicon: HALOT
  rationale: Se refiere al lugar donde habitarás. "Morada" es natural en español bíblico sin resultar arcaizante en exceso.
- source_word: וְעִשְׂבָּא
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - vegetación
  lexicon: HALOT
  rationale: En el contexto de un animal que pasta, "hierba" comunica bien la comida rústica sin estrechar el sentido más allá de lo que el arameo permite.
- source_word: כְתוֹרִין
  english_pob_choice: like oxen
  chosen_spanish: como los toros
  alternatives_spanish:
  - como bueyes
  - como ganado
  lexicon: HALOT
  rationale: El término remite a bovinos. "Toros" funciona como equivalente comprensible y fuerte en español; se mantiene la comparación animal sin forzar una especificación técnica que el contexto no exige.
- source_word: יְטַעֲמוּן
  english_pob_choice: you will be made to eat
  chosen_spanish: comerás
  alternatives_spanish:
  - te harán comer
  - serás obligado a comer
  lexicon: HALOT
  rationale: La forma causativa del arameo señala imposición, pero en español una pasiva perifrástica sería demasiado pesada. "Comerás" conserva la escena; la coerción queda implícita en el cuadro narrativo y en el contexto de humillación.
- source_word: מִטַּל שְׁמַיָּא
  english_pob_choice: with the dew of heaven
  chosen_spanish: con el rocío del cielo
  alternatives_spanish:
  - con el rocío de los cielos
  - por el rocío del cielo
  lexicon: HALOT
  rationale: '"Rocío del cielo" preserva el paralelismo con el arameo y su elevación. "Cielo" es una forma natural y reverente en español para שְׁמַיָּא.'
- source_word: מְצַבְּעִין
  english_pob_choice: you will be drenched
  chosen_spanish: serás empapado
  alternatives_spanish:
  - serás mojado
  - quedarás empapado
  lexicon: HALOT
  rationale: El verbo indica quedar humedecido o bañado por el rocío. "Serás empapado" mantiene la intensidad imagética sin introducir una lectura más fuerte de la que permite el texto.
- source_word: שִׁבְעָה עִדָּנִין
  english_pob_choice: seven times
  chosen_spanish: siete tiempos
  alternatives_spanish:
  - siete períodos
  - siete años
  lexicon: HALOT
  rationale: El arameo es más amplio que una unidad calendárica precisa. "Tiempos" conserva la ambigüedad original, evitando resolver interpretativamente el dato cronológico.
- source_word: יַחְלְפ֣וּן עֲלָ֑יךְ
  english_pob_choice: will pass over you
  chosen_spanish: pasarán sobre ti
  alternatives_spanish:
  - te sobrevendrán
  - correrán sobre ti
  lexicon: HALOT
  rationale: La imagen es de un lapso que transcurre encima del sujeto. "Pasarán sobre ti" reproduce esa noción con naturalidad en español.
- source_word: עַד דִּי תִנְדַּע
  english_pob_choice: until you know
  chosen_spanish: hasta que sepas
  alternatives_spanish:
  - hasta que reconozcas
  - hasta que entiendas
  lexicon: HALOT
  rationale: El verbo principal es "conocer", pero aquí implica reconocimiento experiencial. "Sepas" mantiene la cercanía al original y deja que el contexto complete el sentido.
- source_word: שַׁלִּיט עִלָּיָא
  english_pob_choice: the Most High rules
  chosen_spanish: el Altísimo gobierna
  alternatives_spanish:
  - el Altísimo reina
  - el Altísimo es soberano
  lexicon: HALOT
  rationale: '"Gobierna" comunica la acción soberana en un español claro y digno. "Altísimo" traduce bien el título arameo sin necesidad de expansión.'
- source_word: בְּמַלְכוּת אֲנָשָׁא
  english_pob_choice: in the kingdom of men
  chosen_spanish: en el reino de los hombres
  alternatives_spanish:
  - en el reino de la humanidad
  - sobre el reino de los hombres
  lexicon: HALOT
  rationale: Se conserva la estructura literal del giro arameo y la contraposición entre el gobierno divino y el ámbito humano. "Reino de los hombres" sigue la elección inglesa y mantiene el paralelismo interno.
- source_word: וּלְמַן דִּי יִצְבֵּא
  english_pob_choice: to whomever he wills
  chosen_spanish: a quien él quiere
  alternatives_spanish:
  - a quien él desea
  - a quien él decide
  lexicon: HALOT
  rationale: La voluntad divina es el punto central. "A quien él quiere" es idiomático en español y fiel al registro solemne del arameo.
- source_word: יִתְּנִנַּהּ
  english_pob_choice: gives it
  chosen_spanish: lo da
  alternatives_spanish:
  - se lo da
  - lo entrega
  lexicon: HALOT
  rationale: El pronombre retoma el reino/kingship mencionado antes. "Lo da" mantiene la economía del original y la idea de disposición soberana.
theological_decisions:
- issue: Duración de los "siete tiempos"
  english_pob_reading: seven times
  chosen_spanish_reading: siete tiempos
  alternative_spanish_readings:
  - siete períodos
  - siete años
  rationale: El arameo עִדָּנִין es más amplio que una medida cronológica precisa. La traducción conserva esa ambigüedad en lugar de resolverla como "años", que sería interpretativo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Contraste entre humanidad y bestias
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - la humanidad
  rationale: El texto contrasta el ámbito humano con el animal y luego vuelve a "el reino de los hombres". "Los hombres" preserva esa correspondencia y evita borrar el contraste genérico del original.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'La revisión más reciente no requirió cambios: el borrador anterior ya estaba en alto acuerdo con la auditoría inglesa y el cotejo externo confirmó concordancia total. Se mantuvo la ambigüedad de עִדָּנִין y la correspondencia entre "hombres" y "reino de los hombres".'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo para יהוה cuando aparezca; en este versículo no corresponde.
  - Se mantiene "Altísimo" para עִלָּיָא siguiendo el valor del título en Daniel.
  - '"Tiempos" conserva la indeterminación del arameo y evita fijar "años" sin base textual suficiente.'
  - La formulación "los hombres" se conserva por coherencia interna con el contraste humano/animal del versículo.
