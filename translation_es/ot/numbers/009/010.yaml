revisions:
- from: 'Habla a los hijos de Israel[a], diciendo: «Si alguien[b] está impuro por causa de un cadáver, o se encuentra en un camino lejano, ya sea entre ustedes o a través de sus generaciones[c], celebrará la Pascua para Yahvé».'
  to: 'Habla a los hijos de Israel[a], diciendo: «Si alguien[b] está impuro por causa de un cadáver[c], o está en un viaje lejano, ya sea entre ustedes o durante sus generaciones[d], celebrará la Pascua para Yahvé».'
  rationale: 'Se corrigen dos giros poco idiomáticos del borrador para ajustarlos mejor al sentido fuente y al precedente auditado del POB: «en un camino lejano» pasa a «en un viaje lejano», y «a través de sus generaciones» a «durante sus generaciones». Además, se añade una nota para explicar el modismo hebreo detrás de «impuro por causa de un cadáver», preservando una alternativa significativa presente en el POB inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mandato a Moisés, destinatario «los hijos de Israel», caso distributivo, impureza por cadáver, viaje lejano, vigencia para la comunidad presente y para las generaciones futuras, y referencia explícita a Yahvé. Sin embargo, hay dos ajustes importantes de fidelidad idiomática: בְדֶרֶךְ רְחֹקָה se expresa mejor como «de viaje lejos» o «en un viaje lejano» que «en un camino lejano», y לְדֹרֹתֵיכֶם no suena natural como «a través de sus generaciones»; debe ser «durante sus generaciones» o «por sus generaciones». También conviene reflejar la nota inglesa sobre el modismo de «impuro por un muerto/cadáver».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «se encuentra en un camino lejano» suena forzado y poco natural en contexto legal-ritual; sugiere ubicación en una carretera remota más que ausencia por viaje. «A través de sus generaciones» también es poco idiomático en español bíblico natural. El resto del verso fluye bien. «Celebrará la Pascua» es aceptable y legible, aunque «guardará/observará» también serían posibles.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: «Yahvé» está correctamente preservado; «hijos de Israel» mantiene la decisión de género del POB; «Pascua» es adecuado para פֶסַח. No hay conflicto doctrinal relevante. La única tensión menor es que «si alguien» neutraliza el masculino de אִישׁ אִישׁ en el texto principal; como el proyecto lo permite solo con explicación, la nota existente lo compensa suficientemente.'
  issues:
  - severity: medium
    issue: «en un camino lejano» para בְדֶרֶךְ רְחֹקָה
    rationale: Aunque más literal, en español suena poco natural y no comunica tan bien la idea contextual de estar ausente por viaje. El POB inglés auditado prefirió «on a distant journey» por esta razón.
  - severity: medium
    issue: «a través de sus generaciones» para לְדֹרֹתֵיכֶם
    rationale: Es comprensible pero poco idiomático en español. La expresión hebrea indica vigencia continuada a lo largo de las generaciones; «durante sus generaciones» o «por todas sus generaciones» lo expresa mejor.
  - severity: low
    issue: Falta una nota explícita sobre el modismo de impureza por cadáver
    rationale: El texto principal lo comunica bien, pero el POB inglés preserva la alternativa/explicación de que el hebreo dice literalmente algo como «impuro por una persona/alma» y en este contexto significa impureza por cadáver.
  revised_spanish_text: 'Habla a los hijos de Israel[a], diciendo: «Si alguien[b] está impuro por causa de un cadáver[c], o está en un viaje lejano, ya sea entre ustedes o durante sus generaciones[d], celebrará la Pascua para Yahvé».'
