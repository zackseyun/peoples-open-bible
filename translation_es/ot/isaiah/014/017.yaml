translation:
  language: es
  text: el que hizo del mundo un desierto y derribó sus ciudades, el que no dejó que sus prisioneros volvieran a casa[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no abrió la casa para sus prisioneros», o «que no abrió el camino a casa para sus prisioneros». El hebreo dice literalmente: «no abrió la casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - puso
  - volvió
  lexicon: HALOT
  rationale: El verbo hebreo en esta construcción introduce el resultado causado por el tirano; en español, 'hizo de' conserva ese valor causativo y suena natural junto con 'un desierto'.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitable
  - el orbe
  lexicon: HALOT
  rationale: תֵּבֵל designa el mundo habitado; 'el mundo' es la forma más clara y natural en español sin perder el alcance global del texto.
- source_word: כַּמִּדְבָּר
  english_pob_choice: like a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - como un desierto
  - como un yermo
  lexicon: HALOT
  rationale: El prefijo comparativo כ- queda bien expresado en la construcción 'hizo de ... un desierto'. En español esta formulación evita una literalidad forzada y mantiene la imagen de devastación.
- source_word: וְעָרָיו
  english_pob_choice: and its cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblaciones
  - sus urbes
  lexicon: HALOT
  rationale: El sufijo hebreo es formalmente masculino singular, pero el referente inmediato es 'el mundo'. 'Sus ciudades' conserva la referencia posesiva sin introducir una ambigüedad innecesaria en español.
- source_word: הָרָס
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - demolió
  - arrasó
  lexicon: HALOT
  rationale: El verbo comunica la acción concreta de derribar. 'Derribó' preserva esa fuerza física y se enlaza bien con 'ciudades'.
- source_word: אֲסִירָיו
  english_pob_choice: his prisoners
  chosen_spanish: sus prisioneros
  alternatives_spanish:
  - sus cautivos
  - sus encarcelados
  lexicon: HALOT
  rationale: El sustantivo se refiere a los apresados o encarcelados. 'Prisioneros' es claro y directo en el contexto de impedirles salir.
- source_word: לֹא פָתַח
  english_pob_choice: did not let ... go home
  chosen_spanish: no dejó que ... volvieran a casa
  alternatives_spanish:
  - no abrió
  - no los dejó salir
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'no abrió', el audit trail inglés documenta que la expresión apunta idiomáticamente a no permitir que regresaran. En español, 'no dejó que volvieran a casa' conserva el sentido idiomático sin borrar la literalidad subyacente, que se mantiene en la nota.
- source_word: בָּיְתָה
  english_pob_choice: home
  chosen_spanish: a casa
  alternatives_spanish:
  - a su casa
  - al hogar
  lexicon: HALOT
  rationale: La forma direccional señala movimiento hacia la casa. 'A casa' es el equivalente idiomático más natural en español para el valor de retorno al hogar.
translation_notes:
  revision_awareness: El texto sigue el último estado revisado del audit trail inglés, especialmente en la cláusula final, donde se adoptó el sentido idiomático de no permitir el regreso a casa en lugar de una literalidad que oscurecería el hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'prisioneros' para conservar la fuerza léxica de אֲסִירָיו.
  - Se tradujo תֵּבֵל como 'el mundo' para corresponder al alcance cósmico del pasaje.
  - La nota a pie de página preserva la alternativa más literal relacionada con 'abrir la casa', tal como exige la transparencia del proyecto.
