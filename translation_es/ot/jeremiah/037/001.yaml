translation:
  language: es
  text: Y el rey Sedequías, hijo de Josías, reinó en lugar de Conías[a], hijo de Joaquín, a quien Nabucodonosor[b], rey de Babilonia, había hecho rey en la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Conías; también conocido en otros lugares como Jeconías.
    reason: alternative_reading
  - marker: b
    text: La grafía hebrea refleja Nebuchadrezzar; en español bíblico es común Nabucodonosor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלָךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: El verbo hebreo narra la entronización o inicio del reinado. En español, «reinó» reproduce de manera natural y precisa la acción regnal sin añadir perífrasis innecesarias.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - Rey
  lexicon: HALOT
  rationale: Se conserva el título regio en español común y claro, concordando con el nombre propio y la estructura appositiva del hebreo.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: HALOT
  rationale: Se usa la forma española más reconocible y estable en contextos bíblicos; «Sedequías» mantiene la identidad del nombre propio sin transliteración excesiva.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  lexicon: HALOT
  rationale: La relación filial se expresa de forma directa y formal. «Josías» es la forma española estándar del nombre.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: En este contexto de sucesión real, la preposición marca reemplazo. «En lugar de» es la equivalencia española más natural y fiel.
- source_word: כָּנְיָהוּ
  english_pob_choice: Coniah
  chosen_spanish: Conías
  alternatives_spanish:
  - Jeconías
  - Conías
  lexicon: HALOT
  rationale: El hebreo presenta la forma קצרה/abreviada כָּנְיָהוּ; se refleja con «Conías» para respetar la forma base del original, preservando la tensión con la forma más conocida en otros pasajes.
- source_word: בֶּן יְהוֹיָקִים
  english_pob_choice: son of Jehoiakim
  chosen_spanish: hijo de Jehoiaquim
  alternatives_spanish:
  - hijo de Joaquim
  lexicon: HALOT
  rationale: Se conserva la filiación con la forma española tradicional del nombre, manteniendo claridad y continuidad bíblica.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - el cual
  - quien
  lexicon: HALOT
  rationale: El relativo introduce el complemento directo de «había hecho rey»; «a quien» es la forma más precisa en español.
- source_word: הִמְלִיךְ
  english_pob_choice: had made king
  chosen_spanish: había hecho rey
  alternatives_spanish:
  - había nombrado rey
  - había puesto como rey
  lexicon: HALOT
  rationale: El causativo de מלך se expresa directamente como «hacer rey». Se mantiene la forma compuesta para reflejar que la acción de Nabucodonosor antecede al reinado de Sedequías.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezer
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se adopta la forma española ampliamente establecida del nombre del rey babilonio para legibilidad. La grafía hebrea puede reflejar una forma más cercana a «Nebuchadrezzar», pero la tradición bíblica española usa «Nabucodonosor».
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera formal y transparente, conservando el título y el gentilicio geopolítico.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en la tierra de Judá
  - en Judá
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra», porque el hebreo no dice solo ubicación territorial sino la esfera geográfica de su reinado. «Judá» se mantiene como nombre propio estándar.
theological_decisions:
- issue: 'Nombre abreviado del rey depuesto: Conías frente a Jeconías'
  english_pob_reading: The English POB keeps the Hebrew form Coniah in the text and notes the broader identification with Jeconiah in a footnote.
  chosen_spanish_reading: Se mantiene «Conías» en el texto y se aclara en nota su identificación con Jeconías.
  alternative_spanish_readings:
  - Jeconías
  - Jeconías / Conías
  rationale: El hebreo usa aquí la forma corta כָּנְיָהוּ, y el proyecto prioriza la forma del original sobre la armonización con el nombre más familiar. La nota preserva la identificación histórica sin borrar la tensión documental.
  doctrine_reference: Onomástica bíblica y principio de primacía del original
translation_notes:
  revision_awareness: El contexto de revisión indica que no se requerían cambios adicionales; el borrador español sigue de cerca el texto hebreo y la decisión auditada en inglés, conservando la forma corta del nombre Conías y la relación temporal de la acción de Nabucodonosor.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene la terminología regnal con «rey/reinó» para concordar con el hebreo narrativo.
  - 'Se preserva la diferencia entre nombre propio y título: «Sedequías», «Josías», «Jehoiaquim», «Nabucodonosor».'
  - La nota a pie a) está anclada en «Conías» para reflejar la alternativa onomástica sin sobrecargar el texto principal.
  - La nota b) explica la diferencia entre la forma hebrea y la forma española establecida del nombre babilonio.
