review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: imperativo plural de agradecimiento, título «Dios del cielo» y la razón introducida por כִּי. También preserva bien la opción léxica para חֶסֶד como amor leal. Sin embargo, la redacción principal «porque para siempre es su amor leal» suena invertida y menos natural que una formulación verbal explícita, mientras que el inglés auditado sí hace explícita la duración: «endures forever».'
  spanish_quality_summary: 'La frase inicial «Den gracias al Dios del cielo» es clara y digna. El problema principal es la segunda mitad: «porque para siempre es su amor leal» resulta rígida y poco idiomática en español bíblico moderno. Una formulación como «porque su amor leal permanece para siempre» o «porque su amor leal es para siempre» mejora notablemente la legibilidad. Dado que la nota ya ofrece «permanece para siempre», conviene promover esa lectura al texto principal.'
  glossary_alignment: No hay conflicto con los términos de proyecto. No aparece el nombre divino. «Dios» y «cielo» son adecuados. «Amor leal» es una decisión defendible para חֶסֶד y está bien explicada. La nota léxica también preserva la alternativa de fidelidad/bondad de pacto.
  issues:
  - severity: medium
    issue: Redacción poco natural en «porque para siempre es su amor leal»
    rationale: Aunque comprensible, el orden y la predicación nominal suenan forzados en español. El hebreo permite una cláusula breve, pero el registro meta pide español claro y digno, no un calco rígido.
  - severity: low
    issue: La nota ofrece una formulación principal mejor que el texto
    rationale: La alternativa «su amor leal permanece para siempre» coincide mejor con la decisión inglesa auditada «endures forever» y con la naturalidad del español; por coherencia, debería usarse en el cuerpo del texto.
  revised_spanish_text: Den gracias al Dios[a] del cielo, porque su amor leal permanece para siempre.
  revised_footnotes:
  - marker: a
    text: 'O: «su amor leal es para siempre». El hebreo חֶסֶד puede abarcar amor leal, bondad de pacto y fidelidad duradera.'
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido léxico y teológico del borrador, pero se reemplaza la cláusula final por una formulación verbal natural en español que refleja mejor la decisión auditada «endures forever». La nota se ajusta para ofrecer una alternativa breve y seguir documentando el campo semántico de חֶסֶד sin duplicar el nuevo texto principal.
