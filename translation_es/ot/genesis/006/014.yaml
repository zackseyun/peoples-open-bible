  text: עֲשֵׂ֤ה לְ/ךָ֙ תֵּבַ֣ת עֲצֵי גֹ֔פֶר קִנִּ֖ים תַּֽעֲשֶׂ֣ה אֶת הַ/תֵּבָ֑ה וְ/כָֽפַרְתָּ֥ אֹתָ֛/הּ מִ/בַּ֥יִת וּ/מִ/ח֖וּץ בַּ/כֹּֽפֶר־־׃
