translation:
  language: es
  text: 'Se volvió[a], y me vio, y me llamó a mí, y yo dije: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «se volvió detrás de él»; la expresión significa que giró y miró hacia atrás.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן אַחֲרָיו
  english_pob_choice: He turned around
  chosen_spanish: Él se volvió[a]
  alternatives_spanish:
  - Él giró
  - Él se volvió hacia atrás
  lexicon: HALOT
  rationale: פּנה en este contexto narra un movimiento de giro o cambio de dirección. «Se volvió» es natural en español y conserva el sentido espacial de la expresión hebrea sin mantener una calca rígida.
- source_word: וַיִּרְאֵנִי
  english_pob_choice: and saw me
  chosen_spanish: me vio
  alternatives_spanish:
  - me miró
  - me contempló
  lexicon: HALOT
  rationale: ראה con sufijo de primera persona singular significa de forma directa «me vio». «Miró» sería posible, pero en español puede sonar menos precisa para una simple acción narrativa.
- source_word: וַיִּקְרָא אֵלַי
  english_pob_choice: and he called to me
  chosen_spanish: me llamó
  alternatives_spanish:
  - me llamó a gritos
  - me convocó
  lexicon: HALOT
  rationale: קרא con אֶל suele expresar llamar a alguien. En español, el orden natural permite «me llamó»; el contexto ya sugiere el destinatario sin necesidad de añadir «a mí».
- source_word: וָאֹמַר
  english_pob_choice: and I said
  chosen_spanish: y yo dije
  alternatives_spanish:
  - y respondí
  - y contesté
  lexicon: HALOT
  rationale: אָמַר normalmente se traduce con «decir». Se mantiene el verbo simple y directo, acorde con el relato.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Presente estoy
  - Estoy aquí
  lexicon: HALOT
  rationale: הנני es una fórmula de disponibilidad y respuesta de presencia. «Aquí estoy» reproduce bien su fuerza idiomática en español, con resonancia bíblica y sin sonar artificioso.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la torpeza de una calca literal («turned behind him») por «turned around». La redacción española sigue ese mismo principio de equivalencia óptima: evita la calca, pero conserva el sentido espacial del hebreo y la fluidez narrativa.'
  spanish_consistency_notes:
  - Se usa «Aquí estoy» para הִנֵּנִי, en línea con el uso bíblico de una respuesta de disponibilidad.
  - No se introduce terminología eclesiástica ajena al hebreo; el versículo es narrativo y no requiere vocabulario doctrinal específico.
  - La nota[a] se ancla en «se volvió» para reflejar la alternativa literal del hebreo sin cargar el texto principal con una construcción extraña.
