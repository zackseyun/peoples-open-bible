translation:
  language: es
  text: 'Y Jonatán llamó tras el muchacho: «¡Apresúrate! ¡Date prisa! ¡No te detengas[a]!» Entonces el muchacho de Jonatán recogió las flechas[b] y fue a su amo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «No te pares / no te quedes de pie». El sentido en contexto es «No te detengas».'
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea para «flechas» está escrita de una manera que puede parecer singular, pero el contexto claramente se refiere a las flechas que Jonatán había disparado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó en voz alta
  - gritó
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo expresa que Jonatán llama detrás del muchacho para darle una instrucción urgente. «Llamó» es natural y suficiente en español; «gritó» sería más fuerte de lo que exige el hebreo.
- source_word: אַחֲרֵי הַנַּעַר
  english_pob_choice: after the boy
  chosen_spanish: tras el muchacho
  alternatives_spanish:
  - después del muchacho
  - detrás del muchacho
  lexicon: HALOT
  rationale: La preposición con קרא indica que Jonatán lo llama desde atrás / tras él. «Tras el muchacho» conserva la dirección del llamado sin sonar forzado en español.
- source_word: מְהֵרָה
  english_pob_choice: Hurry!
  chosen_spanish: ¡Apresúrate!
  alternatives_spanish:
  - ¡Rápido!
  - ¡Apresúrate con rapidez!
  lexicon: HALOT
  rationale: Es una orden urgente. «¡Apresúrate!» transmite bien el imperativo y mantiene el tono enérgico del original.
- source_word: חוּשָׁה
  english_pob_choice: Be quick!
  chosen_spanish: ¡Date prisa!
  alternatives_spanish:
  - ¡Apresúrate!
  - ¡Muévete!
  lexicon: HALOT
  rationale: Se conserva la duplicación de urgencia del hebreo con una segunda orden distinta en español. «¡Date prisa!» evita repetir exactamente la primera exhortación y mantiene el refuerzo enfático.
- source_word: אַֽל תַּעֲמֹד
  english_pob_choice: Do not stop!
  chosen_spanish: ¡No te detengas!
  alternatives_spanish:
  - ¡No te quedes quieto!
  - ¡No te pares!
  lexicon: HALOT
  rationale: Literalmente es «no te pongas de pie / no te quedes parado», pero en contexto significa no dejar de avanzar. «¡No te detengas!» refleja el sentido idiomático que el POB inglés ya documentó.
- source_word: וַיְלַקֵּט
  english_pob_choice: gathered up
  chosen_spanish: recogió
  alternatives_spanish:
  - juntó
  - recabó
  lexicon: HALOT
  rationale: El verbo indica juntar o recoger lo que está disperso. «Recogió» es una opción natural en español y encaja con el acto de juntar las flechas.
- source_word: נַעַר יְהוֹנָתָן
  english_pob_choice: Jonathan’s boy
  chosen_spanish: el muchacho de Jonatán
  alternatives_spanish:
  - el siervo de Jonatán
  - el joven de Jonatán
  lexicon: HALOT
  rationale: נַעַר conserva el matiz de muchacho/joven asistente. «Muchacho de Jonatán» mantiene la referencia relacional y evita sobrecargar el texto con «siervo», que sería posible pero menos neutro aquí.
- source_word: החצי
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - las saetas
  - las puntas
  lexicon: HALOT
  rationale: 'Aunque la forma escrita puede parecer singular, el contexto exige plural: se trata de las flechas que Jonatán había disparado. En español debe expresarse claramente en plural.'
- source_word: אֶל אֲדֹנָיו
  english_pob_choice: to his master
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su dueño
  lexicon: HALOT
  rationale: El poseedor es el superior humano del muchacho. «Señor» comunica la relación de autoridad sin imponer el matiz esclavista que «amo» podría sugerir en español moderno.
translation_notes:
  revision_awareness: Basado en el hebreo masorético (WLC) y en el audit trail inglés del POB, sin cambios respecto al último pase revisado; se conserva la duplicación enfática de las dos órdenes urgentes y el valor contextual de «no te detengas».
  spanish_consistency_notes:
  - Se mantiene «Jonatán» en lugar de «Jonathan» para la forma hispanizada del nombre.
  - Se conserva el paralelismo urgente de dos imperativos consecutivos.
  - Se usa «flechas» en plural por exigencia del contexto narrativo.
  - Se evita «SEÑOR» como máscara teológica; aquí אֲדֹנָיו es un superior humano, por eso se traduce «su señor».
