translation:
  language: es
  text: Solo sé fuerte y muy valiente, teniendo cuidado de hacer conforme a toda la ley que Moisés, mi siervo, te mandó. No te apartes de ella ni a la derecha ni a la izquierda, para que obres con sabiduría[a] adondequiera que vayas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prosperes» o «tengas éxito» adondequiera que vayas.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Solo y
  lexicon: HALOT
  rationale: Preserva el matiz de restricción/enfasis inicial. En español, «Solo» transmite bien la exhortación exclusiva sin sonar forzado.
- source_word: חֲזַק וֶאֱמַץ
  english_pob_choice: be strong and very courageous
  chosen_spanish: sé fuerte y muy valiente
  alternatives_spanish:
  - sé fuerte y muy animoso
  - sé fuerte y resuelto
  - sé fuerte y audaz
  lexicon: HALOT
  rationale: La pareja verbal expresa firmeza más valentía. «Fuerte» y «valiente» son naturales en español y conservan la duplicidad exhortativa; «muy» refleja מְאֹד.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - sumamente
  lexicon: HALOT
  rationale: Intensificador normal y claro en español moderno, sin perder el énfasis fuerte del hebreo.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: being careful to do
  chosen_spanish: cuidando de actuar
  alternatives_spanish:
  - cuidando de hacer
  - cuidando de cumplir
  - velando por hacer
  lexicon: HALOT
  rationale: La secuencia infinitiva comunica vigilancia que desemboca en obediencia activa. «Cuidando de actuar» une la idea de guardar/observar con la de poner por obra, evitando una calca dura.
- source_word: כְּכָל הַתּוֹרָה
  english_pob_choice: according to all the law
  chosen_spanish: conforme a toda la ley
  alternatives_spanish:
  - según toda la ley
  - de acuerdo con toda la ley
  - conforme a toda la instrucción
  lexicon: HALOT
  rationale: En este contexto de mandato mosaico, «ley» comunica mejor el sentido legal/covenantal que «instrucción». «Toda» conserva la amplitud del hebreo.
- source_word: אֲשֶׁר צִוְּךָ מֹשֶׁה עַבְדִּי
  english_pob_choice: that Moses my servant commanded you
  chosen_spanish: que Moisés, mi siervo, te mandó
  alternatives_spanish:
  - que Moisés, mi siervo, te ordenó
  - que Moisés, mi siervo, te mandó
  lexicon: HALOT
  rationale: «Mi siervo» mantiene el título divino de Moisés. «Mandó» reproduce bien el peso de una orden de autoridad; el orden de los elementos sigue el hebreo sin sonar rígido.
- source_word: אַל תָּסוּר מִמֶּנּוּ יָמִין וּשְׂמֹאול
  english_pob_choice: Do not turn from it to the right or to the left
  chosen_spanish: No te apartes de ella ni a la derecha ni a la izquierda
  alternatives_spanish:
  - No te desvíes de ella ni a la derecha ni a la izquierda
  - No te apartes de ella ni hacia la derecha ni hacia la izquierda
  lexicon: HALOT
  rationale: El hebreo usa una imagen de desviación del camino. «Apartarse» transmite bien la idea de no desviarse del mandato; «ni a la derecha ni a la izquierda» conserva el paralelismo idiomático.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Marca propósito de manera natural y directa en español.
- source_word: תַּשְׂכִּיל
  english_pob_choice: you may act wisely
  chosen_spanish: obres con sabiduría
  alternatives_spanish:
  - actúes sabiamente
  - tengas éxito
  - prosperes
  lexicon: HALOT
  rationale: La raíz puede expresar actuar con prudencia y también éxito resultante. «Obres con sabiduría» mantiene el núcleo sapiencial sin borrar la alternativa de prosperidad documentada por la POB inglesa.
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  english_pob_choice: wherever you go
  chosen_spanish: en todo lo que emprendas
  alternatives_spanish:
  - dondequiera que vayas
  - en todo lo que vayas
  - en todo lugar donde vayas
  lexicon: HALOT
  rationale: El hebreo literalmente dice «en todo lo que vayas». Dado que en español la frase natural es más amplia y puede abarcar la vida entera, «en todo lo que emprendas» conserva el sentido de acción completa que el contexto sugiere; aun así, la nota preserva la alternativa de éxito/prosperidad y evita restringir el versículo a un simple desplazamiento físico.
theological_decisions:
- issue: 'Valor de תַּשְׂכִּיל: sabiduría prudente frente a prosperidad/éxito'
  english_pob_reading: you may act wisely, with a footnote preserving 'prosper'/'have success'
  chosen_spanish_reading: obres con sabiduría, con nota que preserva 'prosperes'/'tengas éxito'
  alternative_spanish_readings:
  - prosperes
  - tengas éxito
  - actúes sabiamente
  rationale: Se mantiene la lectura principal sapiencial para no convertir la promesa en una garantía material automática. La nota conserva la tensión semántica documentada por la POB inglesa entre prudencia y éxito.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de תּוֹרָה en contexto de pacto mosaico
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: Aquí la referencia es al mandato dado por Moisés dentro del marco del pacto; «ley» es el equivalente más preciso y reconocido en español. «Instrucción» sería más amplio, pero menos específico en este versículo.
  doctrine_reference: Covenantal/legal sense in Joshua 1:7.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés indicó high_agreement y no introdujo cambios; esta versión española sigue el mismo análisis lexical y teológico sin añadir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el nombre divino en el versículo.
  - Se conserva «ley» para תּוֹרָה por el contexto mosaico/covenantal.
  - «Mi siervo» traduce עַבְדִּי con el valor relacional divino, no como mero título honorífico.
  - La nota sobre תַּשְׂכִּיל preserva la alternativa de prosperidad/éxito sin reemplazar la lectura principal de sabiduría prudente.
  - La formulación final evita un calco excesivo de «wherever you go» y usa una expresión española más natural sin perder el alcance comprehensivo.
