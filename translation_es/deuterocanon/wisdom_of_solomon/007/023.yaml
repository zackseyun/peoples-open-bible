translation:
  language: es
  text: benévolo[a], firme, seguro, sin preocupación, omnipotente[b], que todo lo ve, y que atraviesa todos los espíritus inteligentes, puros[c], sumamente sutiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'humano' para φιλάνθρωπον.
    reason: lexical_alternative
  - marker: b
    text: O 'todopoderoso' para παντοδύναμον.
    reason: lexical_alternative
  - marker: c
    text: La frase 'que atraviesa todos los espíritus inteligentes, puros, sumamente sutiles' también puede entenderse como 'que permea todos los espíritus inteligentes, puros, sumamente sutiles'.
    reason: alternative_reading
lexical_decisions:
- source_word: φιλάνθρωπον
  english_pob_choice: humane
  chosen_spanish: humano
  alternatives_spanish:
  - benévolo
  - amante de los seres humanos
  - bondadoso
  lexicon: LSJ
  rationale: El adjetivo expresa benevolencia o amor por la humanidad. En español, 'humano' conserva esa cualidad compasiva sin expandir demasiado el sentido; 'benévolo' queda como alternativa explícita, pues también refleja bien la idea.
- source_word: βέβαιον
  english_pob_choice: steadfast
  chosen_spanish: firme
  alternatives_spanish:
  - estable
  - seguro
  - constante
  lexicon: LSJ
  rationale: En la serie de atributos, el valor es de estabilidad y confiabilidad. 'Firme' es natural en español y mantiene la idea de algo sólido y seguro.
- source_word: ἀσφαλές
  english_pob_choice: secure
  chosen_spanish: seguro
  alternatives_spanish:
  - a salvo
  - inseguro no
  lexicon: LSJ
  rationale: El término remite a seguridad y ausencia de peligro. 'Seguro' reproduce bien ese matiz y funciona de manera idiomática en la lista.
- source_word: ἀμέριμνον
  english_pob_choice: free from care
  chosen_spanish: libre de cuidado
  alternatives_spanish:
  - sin preocupación
  - libre de ansiedad
  - despreocupado
  lexicon: LSJ
  rationale: La frase griega habla de ausencia de preocupación o ansiedad. 'Libre de cuidado' sigue de cerca la estructura del inglés auditado y conserva la cualidad sin volverla coloquial.
- source_word: παντοδύναμον
  english_pob_choice: all-powerful
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - todo poderoso
  lexicon: LSJ
  rationale: El compuesto significa literalmente tener todo poder. 'Todopoderoso' es la equivalencia más natural en español y mantiene la fuerza lexical sin depender de una formulación más técnica.
- source_word: πανεπίσκοπον
  english_pob_choice: all-seeing
  chosen_spanish: que vigila todo
  alternatives_spanish:
  - que ve todo
  - omnividente
  - que observa todo
  lexicon: LSJ
  rationale: El POB inglés revisado optó por 'all-seeing' para mayor naturalidad. En español, 'que vigila todo' conserva la idea de supervisión activa sin reducir el sentido a simple visión física; 'que ve todo' queda como alternativa posible pero más estrecha.
- source_word: διὰ πάντων χωροῦν
  english_pob_choice: passing through all
  chosen_spanish: que atraviesa todos
  alternatives_spanish:
  - que penetra todo
  - que permea todo
  - que pasa por todo
  lexicon: LSJ
  rationale: La imagen griega sugiere movimiento a través de todo o penetración de todo. 'Que atraviesa todos' mantiene el gesto verbal visible y permite unirlo con la frase nominal siguiente.
- source_word: πνευμάτων
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - seres espirituales
  - alientos
  - aires
  lexicon: LSJ
  rationale: Aquí el contexto apunta a seres espirituales, no a viento o aliento. 'Espíritus' es la correspondencia directa y más fiel.
- source_word: νοερῶν
  english_pob_choice: intelligent
  chosen_spanish: inteligentes
  alternatives_spanish:
  - racionales
  - pensantes
  - dotados de entendimiento
  lexicon: LSJ
  rationale: El adjetivo se refiere a lo relacionado con la mente o el entendimiento. 'Inteligentes' es claro en español y preserva ese rasgo cognitivo.
- source_word: καθαρῶν
  english_pob_choice: pure
  chosen_spanish: puros
  alternatives_spanish:
  - limpios
  - sin mancha
  - inmaculados
  lexicon: LSJ
  rationale: '''Puros'' es la forma estándar y más natural en esta serie descriptiva elevada.'
- source_word: λεπτοτάτων
  english_pob_choice: most subtle
  chosen_spanish: muy sutiles
  alternatives_spanish:
  - finísimos
  - sumamente delicados
  - de máxima sutileza
  lexicon: LSJ
  rationale: Como superlativo, el término indica extrema finura o sutileza. 'Muy sutiles' conserva la cualidad conceptual en un español fluido; 'finísimos' también sería viable, pero puede sonar más físico que filosófico.
theological_decisions:
- issue: Cómo verter παντοδύναμον en un contexto sapiencial descriptivo
  english_pob_reading: all-powerful
  chosen_spanish_reading: todopoderoso
  alternative_spanish_readings:
  - omnipotente
  - todo poderoso
  rationale: El pasaje enumera atributos de la sabiduría. 'Todopoderoso' comunica el sentido inmediato sin forzar una lectura dogmática ajena al listado, aunque 'omnipotente' sigue siendo una alternativa doctrinalmente familiar.
  doctrine_reference: 'DOCTRINE.md: preserve source sense over translation tradition; readable modern Spanish.'
- issue: Cómo conservar la tensión de διὰ πάντων χωροῦν πνευμάτων νοερῶν καθαρῶν λεπτοτάτων
  english_pob_reading: '''passing through all intelligent, pure, most subtle spirits'''
  chosen_spanish_reading: '''que atraviesa todos los espíritus inteligentes, puros, muy sutiles'''
  alternative_spanish_readings:
  - '''que penetra todos los espíritus inteligentes, puros y muy sutiles'''
  - '''que permea todos los espíritus inteligentes, puros, muy sutiles'''
  rationale: La construcción puede sugerir paso a través de, penetración en, o permeación de esos espíritus. 'Que atraviesa' conserva la direccionalidad verbal y deja abierta la relación exacta, sin resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; optimal equivalence.'
translation_notes:
  revision_awareness: 'He seguido el último estado revisado del audit trail inglés: πανεπίσκοπον fue ajustado de una idea de ''overseeing all'' a ''all-seeing'' por mayor naturalidad; en español se ha preferido una formulación verbal (''que vigila todo'') que conserva la supervisión total sin reducirla a visión meramente óptica. También se ha preservado la ambigüedad de διὰ πάντων χωροῦν con una construcción que permite ''atravesar'' o, por nota, ''permear''.'
  spanish_consistency_notes:
  - Se mantiene 'espíritus' para πνευμάτων, conforme al contexto sapiencial y a la audit trail.
  - '''Todopoderoso'' se usa como equivalente natural de παντοδύναμον, pero se documenta la alternativa ''omnipotente'' por su cercanía teológica.'
  - Se conserva el tono enumerativo del griego con una serie de adjetivos breves y paralelos.
  - Los corchetes de nota aparecen solo donde hay alternativa lexical o de lectura textual en el texto español.
