lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: ὅτι introduce aquí la causa o explicación de la afirmación anterior. En español, «porque» comunica con naturalidad esa relación causal sin añadir matices ajenos al griego.
- source_word: κίνδυνός μου
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi peligro
  - mi peligro de muerte
  - mi riesgo
  lexicon: LSJ
  rationale: El audit trail inglés resuelve el giro idiomático por sentido, no literalmente. En español, «mi vida» expresa de manera natural que la persona está en peligro mortal, preservando el valor idiomático de κινδύνός μου sin perder claridad.
- source_word: ἐν χειρί μου
  english_pob_choice: is in my hand
  chosen_spanish: está en mi mano
  alternatives_spanish:
  - está a mi alcance
  - está en mi poder
  lexicon: LSJ
  rationale: La frase se mantiene como imagen concreta de la mano para conservar la metáfora del original. «Está en mi mano» es transparente en español y retiene la expresión idiomática que el inglés también preservó en parte.
translation_notes:
  revision_awareness: 'El texto fuente y el auditor inglés coinciden en una lectura idiomática estable: el griego dice literalmente «mi peligro está en mi mano», pero el sentido es que la vida del hablante está expuesta o en riesgo. No se requieren cambios respecto del audit trail inglés; la versión española mantiene esa equivalencia de sentido y la nota explicita el literal griego.'
  spanish_consistency_notes:
  - Se usa «vida» para reflejar el sentido idiomático de peligro mortal, siguiendo la decisión inglesa de equivalencia óptima.
  - Se conserva la imagen «en mi mano» en la traducción principal para no borrar la metáfora del griego.
  - La puntuación y el orden verbal son naturales en español bíblico contemporáneo sin sonar arcaicos.
