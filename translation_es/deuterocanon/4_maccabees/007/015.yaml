- from: ¡Oh, de vejez dichosa[a], y de canas venerables, y de vida conforme a la ley, a la cual un sello fiel de la muerte llevó a su cumplimiento!
  to: ¡Oh vejez dichosa[a], y canas venerables, y una vida conforme a la ley, que un sello fiel de la muerte llevó a su cumplimiento!
