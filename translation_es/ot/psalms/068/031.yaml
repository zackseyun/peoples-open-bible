translation:
  language: es
  text: Reprende a la bestia de los juncos[a], a la manada de toros entre los becerros de los pueblos, que pisa sobre piezas de plata[b]. Dispersa a los pueblos que se complacen en las guerras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bestia salvaje de los juncos»; posible referencia figurada a Egipto u otra potencia hostil.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de esta cláusula es difícil. También puede significar «sometiéndose con piezas de plata» o «postrándose con barras de plata», es decir, ofreciendo tributo.
    reason: alternative_reading
lexical_decisions:
- source_word: גְּעַר
  english_pob_choice: Rebuke
  chosen_spanish: Reprende
  alternatives_spanish:
  - Rebuke
  - Amonesta
  - Rechaza
  lexicon: HALOT
  rationale: El imperativo pide una reprensión enérgica de Dios contra una potencia hostil. «Reprende» conserva el valor de mandato fuerte y suena natural en español bíblico sin debilitar el matiz de dominio que tiene גער.
- source_word: חַיַּת קָנֶה
  english_pob_choice: the beast of the reeds
  chosen_spanish: la bestia de los juncos
  alternatives_spanish:
  - la bestia de los cañaverales
  - la bestia del pantano
  - la bestia salvaje de los juncos
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «bestia» + «juncos», como en la lectura inglesa, sin identificarla explícitamente en el texto principal. «Juncos» es natural en español y mantiene el posible trasfondo de un animal de pantano o de una potencia hostil.
- source_word: עֲדַת אַבִּירִים
  english_pob_choice: the herd of bulls
  chosen_spanish: el rebaño de toros
  alternatives_spanish:
  - la compañía de fuertes
  - la congregación de poderosos
  - el hato de toros
  lexicon: HALOT
  rationale: En este contexto de imaginería animal, la frase se entiende mejor como un colectivo de ganado bravo. «Rebaño» preserva el valor colectivo, y «toros» mantiene la fuerza de אַבִּירִים sin convertir la expresión en una abstracción de dignatarios.
- source_word: בְּעֶגְלֵי עַמִּים
  english_pob_choice: among the calves of the peoples
  chosen_spanish: entre los becerros de los pueblos
  alternatives_spanish:
  - con los becerros de los pueblos
  - entre los novillos de las naciones
  lexicon: HALOT
  rationale: La preposición se vierte en sentido locativo/asociativo con «entre», y «becerros» conserva la imagen bovina más joven. «Pueblos» sigue de cerca עַמִּים y evita estrechar indebidamente el sentido a «naciones».
- source_word: מִתְרַפֵּס
  english_pob_choice: trampling on
  chosen_spanish: que pisa sobre
  alternatives_spanish:
  - que se humilla ante
  - que se postra ante
  - que aplasta sobre
  lexicon: HALOT
  rationale: El verbo es difícil y admite la idea de postración o sometimiento. En el flujo poético del contexto de hostilidad, «que pisa sobre» preserva la imagen de acción violenta sin resolver demasiado el problema léxico. La alternativa de sumisión queda documentada en nota.
- source_word: בְּרַצֵּי כָסֶף
  english_pob_choice: on pieces of silver
  chosen_spanish: piezas de plata
  alternatives_spanish:
  - barras de plata
  - fragmentos de plata
  - con plata
  lexicon: HALOT
  rationale: רַצֵּי es oscuro; «piezas de plata» retiene el componente económico/metálico con cautela. En español, «plata» es más idiomático que «silver» literalizado, y evita precisar indebidamente la forma del objeto.
- source_word: בִּזַּר
  english_pob_choice: Scatter
  chosen_spanish: Dispersa
  alternatives_spanish:
  - Ha dispersado
  - Esparce
  - Desbarata
  lexicon: HALOT
  rationale: Aunque formalmente puede leerse como perfecto, el contexto poético funciona como ruego/mandato. «Dispersa» reproduce ese valor exhortativo en español y armoniza con el imperativo inicial.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos gentiles
  lexicon: HALOT
  rationale: «Pueblos» es el equivalente más directo y conserva el plural colectivo del hebreo sin cargarlo innecesariamente con matices políticos modernos.
- source_word: קְרָבוֹת יֶחְפָּצוּ
  english_pob_choice: who delight in wars
  chosen_spanish: que se complacen en las guerras
  alternatives_spanish:
  - que aman las guerras
  - que desean batallas
  - que toman placer en pelear
  lexicon: HALOT
  rationale: El verbo expresa gusto o deleite continuo, no sólo deseo momentáneo. «Se complacen» es natural y fiel; «las guerras» conserva el plural del hebreo y la fuerza moral de la cláusula.
theological_decisions:
- issue: Whether to identify the 'beast of the reeds' explicitly as Egypt or another historical power
  english_pob_reading: Retain the metaphor without explicit identification in the main text
  chosen_spanish_reading: Conservar la metáfora sin identificar explícitamente la potencia en el texto principal
  alternative_spanish_readings:
  - Entenderlo explícitamente como Egipto
  - Entenderlo como un imperio hostil genérico
  rationale: Aunque el trasfondo puede aludir a Egipto, el hebreo no lo nombra. La traducción principal mantiene la imagen abierta para no añadir una identificación histórica que el versículo no explicita.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether מִתְרַפֵּס describes hostile trampling or coerced submission
  english_pob_reading: Render the clause as hostile action in context, with submissive reading preserved in a footnote
  chosen_spanish_reading: Traducir la cláusula como acción hostil en el contexto, preservando la lectura de sumisión en nota
  alternative_spanish_readings:
  - que se somete con piezas de plata
  - que se postra con tributo de plata
  rationale: La forma es léxicamente difícil. En el marco de una súplica contra enemigos violentos, la lectura activa encaja mejor en la línea poética; aun así, la posibilidad de postración o tributo es lo bastante importante para dejarla documentada.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el estado indicó acuerdo alto y no hubo cambios aplicados; esta versión sigue esa lectura sin introducir novedades no atestiguadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» sólo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» por defecto en consonancia con la política del proyecto.
  - «Pueblos» se usa de manera consistente para עַמִּים.
  - Se conserva la imaginería animal y bélica sin resolverla excesivamente en paráfrasis.
  - Las notas preservan la ambigüedad léxica de מִתְרַפֵּס y de חַיַּת קָנֶה.
