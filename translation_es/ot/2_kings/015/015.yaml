translation:
  language: es
  text: En cuanto al resto de los hechos de Salum, y la conspiración[a] que conspiró, he aquí[b] que están escritos en el Libro de las Crónicas[c] de los Reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el complot que tramó». El hebreo usa una construcción de sustantivo y verbo de la misma raíz para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he aquí que están escritos»; esta expresión es una fórmula que remite a los registros reales.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el registro oficial o anales reales citados repetidamente en Reyes.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר en esta fórmula regia significa 'resto' o 'lo demás'. 'Ahora' conserva el valor discursivo de apertura narrativa de la fórmula inglesa sin añadir contenido nuevo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - palabras
  - asuntos
  - deeds
  lexicon: HALOT
  rationale: En este contexto de resúmenes regios, דִּבְרֵי se refiere a los actos o hechos registrados de un rey, no a 'palabras'. 'Hechos' es natural en español y mantiene el sentido de acciones públicas documentadas.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Sallum
  - Shallum
  lexicon: Convención onomástica española
  rationale: Se adapta el nombre propio a la forma castellana usual 'Salum', más fluida para lectores hispanos, sin alterar la identidad del personaje.
- source_word: וְקִשְׁרוֹ
  english_pob_choice: and the conspiracy
  chosen_spanish: y la conspiración
  alternatives_spanish:
  - y su conspiración
  - y el complot
  lexicon: HALOT
  rationale: קֶשֶׁר designa una conspiración política o trama. Se evita 'su' porque el texto hebreo, tal como fue revisado en la POB inglesa, no explicita posesión y la lectura más precisa es simplemente 'la conspiración'.
- source_word: אֲשֶׁר קָשָׁר
  english_pob_choice: that he conspired
  chosen_spanish: que conspiró
  alternatives_spanish:
  - que tramó
  - que maquinó
  lexicon: HALOT
  rationale: Se conserva la construcción cognada hebrea (sustantivo + verbo de la misma raíz) con 'conspiración... que conspiró', que refleja la intensificación del original sin suavizarla en paráfrasis.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - miren, están
  - son
  lexicon: HALOT
  rationale: '''He aquí'' reproduce la función deíctica y formularia de הִנָּם. ''Están'' corresponde al valor copulativo/presente del texto y evita una simplificación a ''son''.'
- source_word: כְּתֻבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: 'Participio pasivo de כתב: ''escritos'' conserva la imagen directa de un registro textual. ''Registrados'' se consideraría una alternativa interpretativa, pero ''escritos'' es más cercano al hebreo.'
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el Libro de las Crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de las crónicas
  lexicon: HALOT
  rationale: Se mantiene la fórmula tradicional del título archivístico. En español, 'en el Libro de las Crónicas' comunica el nombre del documento fuente de manera clara y natural.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los Reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los reyes de Israel
  lexicon: HALOT
  rationale: La lamed aquí marca relación pertenencia/titularidad del registro, no finalidad. 'De los Reyes de Israel' reproduce el valor genitivo del título documental.
translation_notes:
  revision_awareness: La POB inglesa fue revisada para reemplazar «his conspiracy» por «the conspiracy», ajustándose mejor al hebreo. Esta versión española sigue esa corrección, evita introducir posesión no explícita y conserva la construcción enfática del original con una duplicación cognada («conspiración... que conspiró»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se usa un nombre propio hispanizado («Salum») para coherencia con el registro bíblico en español.
  - Se conserva el título documental «Libro de las Crónicas» como fórmula estable, sin reinterpretarlo.
  - No hay tensiones teológicas explícitas en este versículo; el foco es lexical y formularia regia.
