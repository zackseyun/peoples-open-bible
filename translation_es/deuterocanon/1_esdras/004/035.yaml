translation:
  language: es
  text: ¿No es grande el que hace estas cosas? Y la verdad es grande, y más fuerte que todas las cosas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Is not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿Acaso no es... ?
  - ¿No será... ?
  lexicon: BDAG
  rationale: La pregunta retórica espera una respuesta afirmativa. En español, la inversión con «¿No es...?» conserva ese tono solemne y directo sin introducir una inferencia más fuerte que la del griego.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - excelso
  - poderoso
  lexicon: BDAG
  rationale: «Grande» reproduce de forma natural el valor de μεγας como magnitud o importancia, y mantiene el paralelo con «grande» aplicado a la verdad en la segunda mitad del verso.
- source_word: ὃς
  english_pob_choice: he who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - aquel que
  lexicon: BDAG
  rationale: El relativo sustantivado pide una forma natural en español. «El que» conserva el referente personal singular sin arcaísmo excesivo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - tales cosas
  - estas obras
  lexicon: BDAG
  rationale: El demostrativo plural se refleja con «estas cosas», que mantiene tanto el número como el enlace deíctico con las acciones ya mencionadas.
- source_word: ποιεῖ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  lexicon: BDAG
  rationale: En este contexto amplio, ποιεῖ puede expresarse con el verbo general «hacer»; así se preserva la sobriedad del griego y la referencia a las acciones descritas.
- source_word: ἡ ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la verdad misma
  lexicon: BDAG
  rationale: El artículo griego se refleja con «la verdad», que suena natural en español y conserva el carácter abstracto y personificado del enunciado sin convertirlo en un uso doctrinal más específico.
- source_word: μεγάλη
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - excelsa
  - muy grande
  lexicon: BDAG
  rationale: Se mantiene la repetición léxica de μέγας/μεγάλη con «grande», importante para reproducir el paralelismo retórico del verso.
- source_word: ἰσχυροτέρα
  english_pob_choice: stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más poderosa
  - más vigorosa
  lexicon: BDAG
  rationale: El comparativo expresa mayor fuerza; «más fuerte» es claro, idiomático y conserva el matiz comparativo sin elevar innecesariamente el registro.
- source_word: παρὰ πάντα
  english_pob_choice: than all things
  chosen_spanish: que todas las cosas
  alternatives_spanish:
  - que todo
  - que todo lo demás
  lexicon: BDAG
  rationale: La comparación universal se vierte de manera natural con «que todas las cosas». Aunque en español puede sonar algo más explícito que el griego, preserva el alcance total de πάντα y el contraste comparativo.
theological_decisions:
- issue: La verdad como afirmación abstracta y universal, sin cristologizarla
  english_pob_reading: truth
  chosen_spanish_reading: la verdad
  alternative_spanish_readings:
  - la verdad misma
  - la veracidad
  rationale: El griego presenta un elogio sapiencial de la verdad. «La verdad» conserva la abstracción y la amplitud del enunciado, sin introducir una lectura cristológica o una cualidad moral restringida que el texto no explicita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más formal en el sujeto personal implícito y en el comparativo universal, pero adapta la sintaxis a un español natural: «el que» para el relativo sustantivado y «más fuerte que todas las cosas» para mantener el alcance de πάντα sin calco rígido.'
  spanish_consistency_notes:
  - Se usa «verdad» y no «veracidad», para conservar el sentido abstracto y retórico.
  - Se mantiene la repetición de «grande» en ambas cláusulas como recurso estilístico y semántico.
  - Se evita «SEÑOR» u otra sustitución, pues no hay aquí el Tetragrámaton ni una cita directa de κύριος.
  - Se prefiere «el que» por fluidez y porque el registro del verso admite un español sobrio y bíblico sin arcaísmo extremo.
