base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/006.yaml
  text: Saul heard that David and the men who were with him had become known[a]. Now Saul was sitting at Gibeah, under the tamarisk tree on the height, with his spear in his hand[b], and all his servants were standing around him.
  footnotes:
  - marker: a
    text: Or, 'had been discovered' / 'had been found out.' The Hebrew verb can carry the sense that David's whereabouts became known.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'at Ramah' if בָּרָמָה is taken as the place name Ramah rather than the common noun 'the height.'
    reason: alternative_reading
