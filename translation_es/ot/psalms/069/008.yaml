translation:
  language: es
  text: Porque por causa de ti[a] he soportado oprobio; la vergüenza[b] ha cubierto mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Por tu causa he soportado oprobio.'
    reason: lexical_alternative
  - marker: b
    text: O 'la deshonra ha cubierto mi rostro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto causal/explanatorio, 'porque' comunica de forma natural la relación de causa que el texto hebreo introduce. No conviene duplicar la causalidad con una construcción pesada en español.
- source_word: עָלֶיךָ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - por tu causa
  - a causa de ti
  - por tu sake
  lexicon: HALOT
  rationale: La preposición עַל con sufijo aquí expresa motivo o referencia, no relación espacial. 'Por causa de ti' conserva bien el matiz causal y mantiene la referencia directa a la segunda persona sin sonar demasiado voluntativo.
- source_word: נָשָׂאתִי
  english_pob_choice: I have borne
  chosen_spanish: he cargado con
  alternatives_spanish:
  - he llevado
  - he soportado
  lexicon: HALOT
  rationale: נָשָׂא con un objeto de vergüenza o reproche conserva la imagen de 'cargar'. 'He cargado con' resulta idiomático en español y transmite la carga aflictiva del término sin perder la metáfora.
- source_word: חֶרְפָּה
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  - burla
  lexicon: HALOT
  rationale: '''Oprobio'' recoge con fuerza la dimensión de deshonra pública y reprensión implícita en חֶרְפָּה. En español bíblico actual es más preciso que ''reproche'' para este contexto de vergüenza social.'
- source_word: כִּסְּתָה
  english_pob_choice: has covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - cubrió
  - ha velado
  lexicon: HALOT
  rationale: El verbo כסה es literalmente 'cubrir'. 'Ha cubierto' mantiene la imagen concreta y el valor perfectivo relevante en el poema.
- source_word: כְלִמָּה
  english_pob_choice: disgrace
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - la deshonra
  - la humillación
  - el oprobio
  lexicon: HALOT
  rationale: כְלִמָּה expresa vergüenza, deshonra o humillación. 'Vergüenza' preserva bien el paralelismo con 'oprobio' y resulta transparente para el lector español sin perder el peso honorífico del hebreo.
- source_word: פָנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi semblante
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'mi rostro/cara', 'mi rostro' es más digno y natural en registro bíblico que 'mi cara', y conserva la imagen visible de vergüenza.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el sentido auditado del inglés POB. La única variación notable frente al inglés es el uso de 'oprobio' y 'vergüenza' para diferenciar con claridad los dos sustantivos del verso en español, manteniendo la doble idea de deshonra pública y vergüenza visible.
  spanish_consistency_notes:
  - Se mantiene la causalidad directa de כִּי / עָלֶיךָ sin introducir un giro interpretativo adicional.
  - 'Se conserva la metáfora de carga y cobertura: ''he cargado con'' y ''ha cubierto''.'
  - No se usan términos eclesiásticos no requeridos; el verso queda en registro poético-bíblico claro.
  - '''Rostro'' se prefiere a ''cara'' por coherencia con el tono solemne del salmo.'
