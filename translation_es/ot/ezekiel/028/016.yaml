  - severity: low
    issue: '''Se llenó tu interior'' puede sonar demasiado psicológico en español contemporáneo.'
    rationale: תוֹךְ aquí apunta al interior/medio del personaje o de su esfera; 'tu interior' es posible, pero 'tu interior' no es el mejor equivalente estilístico. Aun así, no impide la comprensión y no exige adjudicación compleja.
