translation:
  language: es
  text: No trabajarán en vano, ni darán a luz para la calamidad[a], porque ellos son la descendencia de los bendecidos por Yahvé, y sus descendientes con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el terror» o «para un desastre repentino». El término hebreo puede abarcar pánico, terror o calamidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִֽיגְעוּ
  english_pob_choice: will labor
  chosen_spanish: trabajarán
  alternatives_spanish:
  - labrarán
  - fatigarán
  - se esforzarán
  lexicon: HALOT
  rationale: יגע expresa esfuerzo o labor penosa. En español, «trabajarán» es natural y conserva la idea de actividad con esfuerzo sin añadir más matiz del que exige el contexto.
- source_word: לָרִיק
  english_pob_choice: for emptiness
  chosen_spanish: para el vacío
  alternatives_spanish:
  - en vano
  - para nada
  - para la nada
  lexicon: HALOT
  rationale: ריק comunica vaciedad, futilidad o resultado sin provecho. «Para el vacío» mantiene la imagen léxica de la POB en inglés y no borra la tensión entre literalidad e idiomatismo; «en vano» sería más idiomático pero menos pegado al hebreo.
- source_word: יֵלְדוּ
  english_pob_choice: bear children
  chosen_spanish: darán a luz
  alternatives_spanish:
  - tendrán hijos
  - parirán
  - engendrarán
  lexicon: HALOT
  rationale: ילד aquí se refiere a producir descendencia. En español, «darán a luz» conserva el acto de alumbrar hijos y suena más natural que un término masculino como «engendrarán».
- source_word: לַבֶּהָלָה
  english_pob_choice: for calamity
  chosen_spanish: para la calamidad
  alternatives_spanish:
  - para el terror
  - para el pánico
  - para el desastre súbito
  lexicon: HALOT
  rationale: בֶּהָלָה puede abarcar terror, pánico o ruina repentina. «Calamidad» recoge bien el resultado adverso general; la alternativa semántica se preserva en la nota textual.
- source_word: זֶרַע
  english_pob_choice: the offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  - prole
  lexicon: HALOT
  rationale: זֶרַע puede significar «simiente», pero aquí se refiere a hijos/descendientes. «Descendencia» evita la repetición mecánica y suena natural en español bíblico contemporáneo.
- source_word: בְּרוּכֵי יְהוָה
  english_pob_choice: those blessed by Yahweh
  chosen_spanish: los bendecidos por Yahvé
  alternatives_spanish:
  - los benditos de Yahvé
  - los que Yahvé ha bendecido
  lexicon: HALOT
  rationale: La construcción participial pasiva identifica a personas alcanzadas por la bendición divina. «Los bendecidos por Yahvé» refleja la voz pasiva y conserva el nombre divino según la terminología POB en español.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  - sí, ellos son
  lexicon: HALOT
  rationale: El pronombre es enfático, pero el español puede expresarlo de forma sobria con la cópula simple sin forzar énfasis artificial.
- source_word: וְצֶאֱצָאֵיהֶם
  english_pob_choice: and their descendants
  chosen_spanish: y sus descendientes
  alternatives_spanish:
  - y su prole
  - y su posteridad
  - y sus hijos
  lexicon: HALOT
  rationale: צֶאֱצָאִים designa descendientes o posteridad. «Descendientes» distingue este término de זֶרַע y mantiene la promesa generacional.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - a su lado
  lexicon: HALOT
  rationale: La frase indica continuidad y permanencia de la descendencia con el grupo original. «Con ellos» es la forma más directa y fiel.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La pauta del proyecto en español exige renderizar יְהוָה como «Yahvé» y no como un reemplazo titulado. En este verso no hay un cambio que requiera matizar con «Señor», porque el hebreo usa directamente el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בֶּהָלָה
  english_pob_reading: calamity, with note for terror/sudden disaster
  chosen_spanish_reading: calamidad, con nota sobre terror o desastre repentino
  alternative_spanish_readings:
  - terror
  - pánico
  - desastre súbito
  rationale: El español «calamidad» transmite bien el efecto final, pero puede perder la gama semántica de בֶּהָלָה. La nota preserva la tensión léxica documentada por la POB inglesa sin estrechar indebidamente el campo semántico.
  doctrine_reference: Lexical semantics per HALOT; no separate doctrinal issue
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la revisión más reciente y no requiere cambios sustantivos; se ha mantenido la decisión del nombre divino y la nota léxica sobre בֶּהָלָה, adaptándolas al español y a la terminología del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto en español.
  - Se evitó «SEÑOR» como sustituto del nombre divino para no ocultar el Tetragrama.
  - '«Descendencia» y «descendientes» distinguen dos lexemas hebreos distintos: זֶרַע y צֶאֱצָאִים.'
  - La nota al pie se ancló en «vacío» para conservar la alternativa léxica documentada sobre לָרִיק y la ampliación semántica de בֶּהָלָה.
