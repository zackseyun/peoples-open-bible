translation:
  language: es
  text: Ezequías comenzó a reinar[a] cuando tenía veinticinco años, y reinó veintinueve años en Jerusalén. El nombre de su madre fue Abía, hija de Zacarías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Comenzó a reinar» refleja el matiz ingresivo del primer מָלַךְ; no debe leerse como mera repetición de «reinó».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio. No se traduce el nombre; se adapta a la onomástica bíblica habitual en español, manteniendo la identidad histórica del rey.
- source_word: מָלַךְ
  english_pob_choice: became king / he reigned
  chosen_spanish: comenzó a reinar / reinó
  alternatives_spanish:
  - fue rey
  - llegó a ser rey
  lexicon: HALOT
  rationale: El primer מָלַךְ marca la entronización, por eso 'comenzó a reinar' conserva el matiz ingresivo. El segundo expresa la duración del ejercicio del reino, por eso 'reinó' es natural y fiel.
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: when he was twenty-five years old
  chosen_spanish: cuando tenía veinticinco años
  alternatives_spanish:
  - hijo de veinticinco años
  lexicon: HALOT
  rationale: Se vierte el modismo hebreo de edad en español idiomático. 'Tenía veinticinco años' comunica con claridad el sentido sin forzar una estructura semítica en español.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  english_pob_choice: twenty-nine years
  chosen_spanish: veintinueve años
  alternatives_spanish:
  - veintinueve años de duración
  lexicon: HALOT
  rationale: Es una cifra de duración del reinado; en español basta el cardinal con 'años' para conservar el valor temporal exacto.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa y el nombre de la ciudad se expresan de forma directa y natural en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre fue
  alternatives_spanish:
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: Se conserva la fórmula biográfica hebrea con una estructura española clara. 'Fue' evita una lectura demasiado genérica de estado continuo y funciona bien como introducción genealógica.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abía
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional del nombre, ampliamente reconocible en contextos bíblicos.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La relación genealógica es directa y debe mantenerse literal en español.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  lexicon: HALOT
  rationale: Se emplea la forma española estándar del nombre profético/personaje bíblico, más transparente para el lector que una transliteración rígida.
theological_decisions:
- issue: Accession formula and regnal formula in מָלַךְ
  english_pob_reading: Hezekiah became king ... and he reigned ...
  chosen_spanish_reading: Ezequías comenzó a reinar ... y reinó ...
  alternative_spanish_readings:
  - Ezequías fue rey ... y reinó ...
  - Ezequías llegó a ser rey ... y reinó ...
  rationale: 'No hay debate doctrinal explícito, pero sí un matiz histórico-lexical relevante: el verbo inicial no solo afirma realeza, sino entrada al trono. La redacción española preserva ese valor ingresivo sin perder naturalidad.'
  doctrine_reference: Historical narrative; no doctrinal distinction.
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y no presenta revisiones aplicadas. La versión española sigue de cerca la lectura del POB inglés, pero recupera con más claridad en español el matiz ingresivo del primer מָלַךְ mediante «comenzó a reinar», manteniendo el resto de la frase de manera plenamente alineada con el audit trail.
  spanish_consistency_notes:
  - Se usa «Ezequías» para el nombre propio, coherente con el uso bíblico español habitual.
  - Se mantiene «Jerusalén» con mayúscula y acentuación estándar.
  - 'Se conservan nombres propios genealógicos en formas españolas establecidas: Abías y Zacarías.'
  - La alternancia «comenzó a reinar / reinó» distingue acceso al trono y duración del reinado, evitando una simplificación que borraría el valor del hebreo.
  - No se introduce terminología eclesiástica ajena al texto; el verso sigue siendo una nota histórica y genealógica.
