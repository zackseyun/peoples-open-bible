translation:
  language: es
  text: los que confían en su riqueza y se jactan de la abundancia de sus riquezas—[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se glorían en la abundancia de sus riquezas».'
