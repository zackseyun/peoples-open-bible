translation:
  language: es
  text: para Malluchi[a], Jonatán; para Sebanías, José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Malluchi ... de Sebanías», si los nombres con ל se leen de manera más genealógica que representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ל/מלוכי
  english_pob_choice: for Malluchi
  chosen_spanish: para Malluchi
  alternatives_spanish:
  - de Malluchi
  - para Melicú
  lexicon: HALOT
  rationale: El prefijo ל en esta lista sacerdotal se entiende como marca de correspondencia o representación dentro del registro. En español, «para» conserva mejor esa relación funcional que un posesivo, sin perder la estructura del listado. Se translitera el nombre según la forma consonántica מלוכי como «Malluchi»; se evita normalizarlo a una forma más conocida sin base directa en el texto.
- source_word: יונתן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  - Jehonatán
  lexicon: HALOT
  rationale: El nombre אישי יוֹנָתָן se vierte con la forma castellana tradicional «Jonatán», que es natural y reconocible en español. Se conserva la identidad del nombre propio sin forzar la grafía inglesa.
- source_word: ל/שבניה
  english_pob_choice: for Shebaniah
  chosen_spanish: para Sebanías
  alternatives_spanish:
  - de Sebanías
  - para Sebanías
  lexicon: HALOT
  rationale: Se mantiene el valor relacional del ל prefijado con «para», como en el primer miembro del versículo. El nombre se translitera de forma castellana como «Sebanías», una adaptación natural del hebreo שְׁבַנְיָה, sin introducir una equivalencia interpretativa adicional.
- source_word: יוסף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Josef
  lexicon: HALOT
  rationale: El nombre יוֹסֵף se traduce con la forma española establecida «José», que es la más natural y ampliamente inteligible en español. Se evita una transliteración innecesariamente extranjera donde existe un equivalente onomástico asentado.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés coinciden estrechamente; no se detectan revisiones aplicadas ni divergencias textuales relevantes para esta línea. La única decisión sensible es cómo reflejar el prefijo ל en una lista nominal breve.
  spanish_consistency_notes:
  - Se conserva «para» para reflejar la función relacional del ל prefijado en ambos miembros de la frase.
  - 'Se usan formas españolas asentadas para los nombres bíblicos cuando existen equivalentes claros: Jonatán y José.'
  - La nota al pie mantiene la alternativa genealogizante documentada en el POB inglés sin imponerla en el texto principal.
