  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del hebreo: Eliab oye a David hablar con los hombres, su ira se enciende contra David, lo reprende por haber bajado, por haber dejado las pocas ovejas en el desierto, y lo acusa de presunción y de maldad interior, diciendo que vino a ver la batalla. Sin embargo, «¿Para qué bajaste aquí?» desplaza el valor de לָמָּה de causa/motivo («¿por qué?») a propósito/finalidad («¿para qué?»), y el hebreo no exige ese cambio; el tono despectivo ya está presente por contexto. También la nota [a] queda algo desalineada con el texto principal, porque el español elegido es «que David hablaba», mientras la nota ofrece alternativas sin explicar que el texto ya resolvió la construcción temporal de otro modo.'
