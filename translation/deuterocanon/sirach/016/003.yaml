id: SIR.16.3
reference: Sirach 16:3
source:
  edition: sefaria-ben-sira-kahana
  text: אַל תַּאֲמִין בְּחַיֵּיהֶם, וְאַל תִּבְטַח בְּעִקְבוֹתָם.<br><small>(ג)</small> כִּי לֹא תִהְיֶה לָהֶם, אַחֲרִית טוֹבָה.<br><small>(ג)</small> כִּי טוֹב אֶחָד עוֹשֶׂה רָצוֹן, מֵאָלֶף, וּמוֹת עֲרִירִי, מִמִּי שֶׁהָיוּ לוֹ, בָּנִים רַבִּים בְּעַוְלָה, וּמֵאַחֲרִית זָדוֹן.
  language: Hebrew
  pages:
