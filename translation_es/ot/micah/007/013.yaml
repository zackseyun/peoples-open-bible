    rationale: Usar «a causa del fruto de sus obras» en vez de «por el fruto de sus obras» hace más paralela la doble causalidad del verso y sigue mejor la rationale auditada.
  revised_spanish_text: Pero la tierra[a] será una desolación a causa de sus habitantes, a causa del fruto de sus obras[b].
  revised_footnotes:
