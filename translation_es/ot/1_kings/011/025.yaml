source:
  edition: WLC
  text: וַ/יְהִ֨י שָׂטָ֤ן לְ/יִשְׂרָאֵל֙ כָּל יְמֵ֣י שְׁלֹמֹ֔ה וְ/אֶת הָ/רָעָ֖ה אֲשֶׁ֣ר הֲדָ֑ד וַ/יָּ֨קָץ֙ בְּ/יִשְׂרָאֵ֔ל וַ/יִּמְלֹ֖ךְ עַל אֲרָֽם־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/011/025.yaml
  text: And he was an adversary to Israel all the days of Solomon[a], besides the trouble that Hadad caused. And he abhorred Israel and reigned over Aram.
  footnotes:
  - marker: a
    text: Or 'besides the evil/trouble that Hadad did.' The Hebrew phrase is elliptical and may mean that this adversary arose in addition to the harm caused by Hadad.
