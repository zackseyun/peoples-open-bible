  rationale: Se reubica la nota al sintagma correcto («casa de Bel») para reflejar la alternativa léxica documentada. Se ajusta «vamos a salir» a «salimos afuera» para una expresión más inmediata y natural. Se cambia «ponlo» por «colócalo» para mayor claridad en español, manteniendo la secuencia de acciones del griego.
