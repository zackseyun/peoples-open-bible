translation:
  language: es
  text: El rey Ciro de Persia los sacó por medio de Mithredat[a], el tesorero, y los contó uno por uno para entregárselos a Sesbasar[b], el príncipe de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a través de Mithredat el tesorero». El hebreo dice literalmente: «por la mano de Mithredat».'
    reason: lexical_alternative
  - marker: b
    text: O «el líder de Judá» o «el gobernador de Judá». El término hebreo puede referirse de manera más general a un jefe o gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵם
  english_pob_choice: brought them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los hizo sacar
  lexicon: HALOT
  rationale: 'El verbo hebreo en hifil expresa acción causativa: Ciro hizo que salieran o que fueran sacados. En español, ''los sacó'' conserva esa causalidad de forma natural y directa, y en este contexto se refiere a los objetos del versículo anterior.'
- source_word: עַל יַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomá de agencia o instrumentación. 'Por medio de' comunica la relación de intermediación de forma idiomática en español, sin perder el sentido de que Mithredat actuó como agente o intermediario.
- source_word: מִתְרְדָת
  english_pob_choice: Mithredath
  chosen_spanish: Mithredat
  alternatives_spanish:
  - Mitridat
  - Mitradat
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio por transliteración. 'Mithredat' respeta la convención cercana al hebreo y mantiene continuidad con la tradición de transliteración del nombre sin adaptar indebidamente el término.
- source_word: הַגִּזְבָּר
  english_pob_choice: the treasurer
  chosen_spanish: el tesorero
  alternatives_spanish:
  - el oficial del tesoro
  - el administrador del tesoro
  lexicon: HALOT
  rationale: El término designa a un funcionario vinculado al tesoro. 'Tesorero' es preciso, natural en español y suficientemente amplio para el cargo administrativo descrito.
- source_word: וַיִּסְפְּרֵם
  english_pob_choice: counted them out
  chosen_spanish: los contó uno por uno
  alternatives_spanish:
  - los contó
  - los enumeró
  lexicon: HALOT
  rationale: El verbo puede significar contar o enumerar; en este contexto administrativo sugiere un conteo detallado para entrega. 'Los contó uno por uno' preserva el matiz de inventario y distribución, equivalente al inglés auditado 'counted them out'.
- source_word: לְשֵׁשְׁבַּצַּר
  english_pob_choice: to Sheshbazzar
  chosen_spanish: a Sesbasar
  alternatives_spanish:
  - a Sheshbazar
  - a Sesbazar
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio al español. 'Sesbasar' es una adaptación sobria y legible, manteniendo el referente histórico sin introducir interpretación adicional.
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el jefe
  - el líder
  - el gobernador
  lexicon: HALOT
  rationale: נָשִׂיא puede referirse a un jefe, líder o príncipe. 'Príncipe' conserva la amplitud del término y evita imponer el título administrativo más específico 'gobernador', que no es el término hebreo usado aquí.
- source_word: לִיהוּדָה
  english_pob_choice: of Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - para Judá
  lexicon: HALOT
  rationale: La relación preposicional identifica a Sesbasar en conexión con Judá. 'De Judá' es la formulación española más natural en aposición con 'el príncipe' y mantiene la relación contextual sin sobrerregularla.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  english_pob_choice: King Cyrus of Persia
  chosen_spanish: El rey Ciro de Persia
  alternatives_spanish:
  - Ciro, rey de Persia
  - Ciro, rey persa
  lexicon: Convención histórica y sintaxis española
  rationale: Se sigue el orden natural del español para títulos reales, conservando la identificación completa del soberano. 'Ciro' es la forma establecida en español, y 'de Persia' mantiene la referencia geopolítica del hebreo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: se mantuvo el sentido causativo de וַיּוֹצִיאֵם, la idiomaticidad de עַל יַד con una equivalencia española natural, el conteo administrativo detallado de וַיִּסְפְּרֵם, y la amplitud semántica de הַנָּשִׂיא sin forzar un título administrativo más específico. No se registraron revisiones previas aplicadas en el pasaje.'
  spanish_consistency_notes:
  - Se usa 'Ciro' como forma histórica estándar en español.
  - Se conserva la transliteración de nombres propios para preservar trazabilidad con el hebreo.
  - '''Tesorero'' se mantiene como término administrativo claro y consistente con el contexto de inventario y custodia.'
  - '''Príncipe'' se usa por su amplitud semántica y por coherencia con la política terminológica del proyecto.'
