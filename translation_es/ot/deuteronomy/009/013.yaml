translation:
  language: es
  text: 'Entonces Yahvé me dijo, diciendo: «He visto a este pueblo, y he aquí[a] que es un pueblo de dura cerviz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vi a este pueblo, y ciertamente es un pueblo de dura cerviz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia con naturalidad en español y refleja el valor discursivo de avance.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrámaton según la norma del proyecto, evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El complemento indirecto con verbo de habla se expresa de forma natural en español como «me dijo»; «a mí» sería más enfático, pero no necesario aquí.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: Aunque la fórmula puede sonar redundante, el hebreo la incluye explícitamente; se conserva con «diciendo» para reflejar la marca de introducción del discurso.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - He contemplado
  - Vi
  lexicon: HALOT
  rationale: El perfecto expresa una evaluación ya establecida; «He visto» preserva ese valor de constatación presente en español.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» refleja bien la colectividad singular del hebreo y mantiene el demostrativo cercano «este».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y ciertamente
  lexicon: HALOT
  rationale: La partícula enfática se conserva con la fórmula bíblica «y he aquí», clara y solemne en español.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: Se mantiene el sustantivo colectivo singular del hebreo; en español la repetición con «pueblo» evita pluralizar indebidamente.
- source_word: קְשֵׁה עֹרֶף
  english_pob_choice: stiff-necked
  chosen_spanish: terco de cerviz
  alternatives_spanish:
  - duro de cerviz
  - obstinado
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de la cerviz dura, pero en un español más idiomático y menos calcado que «stiff-necked».
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - lo es
  lexicon: HALOT
  rationale: El predicado nominal singular se conserva en español sin pronombre explícito; el valor colectivo singular del hebreo queda reflejado por «es».
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Siguiendo la política del proyecto, se translitera el nombre divino para preservar la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del singular colectivo עַם con predicado singular
  english_pob_reading: it is a stiff-necked people
  chosen_spanish_reading: es un pueblo terco de cerviz
  alternative_spanish_readings:
  - son un pueblo terco de cerviz
  - son un pueblo obstinado
  rationale: El hebreo trata «pueblo» como singular colectivo y emplea un predicado singular. El español natural mantiene «es» para reflejar ese rasgo gramatical y discursivo.
  doctrine_reference: 'Gramática hebrea: singular colectivo con cópula singular'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto de traducción y manteniendo la fórmula de discurso explícita de לֵאמֹר, junto con el singular colectivo reflejado en «es».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la fórmula bíblica «y he aquí» para וְהִנֵּה.
  - «Cerviz» mantiene la imagen corporal del hebreo sin sustituirla por una abstracción más interpretativa.
  - El texto evita pluralizar el sujeto colectivo hebreo.
