  text: כִּ֣י הִנֵּ֣ה אָנֹכִ֡י מֵעִיר֩ וּ/מַעֲלֶ֨ה עַל בָּבֶ֜ל קְהַל גּוֹיִ֤ם גְּדֹלִים֙ מֵ/אֶ֣רֶץ צָפ֔וֹן וְ/עָ֣רְכוּ לָ֔/הּ מִ/שָּׁ֖ם תִּלָּכֵ֑ד חִצָּי/ו֙ כְּ/גִבּ֣וֹר מַשְׁכִּ֔יל לֹ֥א יָשׁ֖וּב רֵיקָֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/009.yaml
  text: For behold[a], I am stirring up and bringing against Babylon an assembly of great nations from the land of the north. They will array themselves against her; from there she will be captured. Their arrows are like those of a skilled warrior[b]; none returns empty-handed.
  footnotes:
  - marker: a
    text: Or 'Its arrows are like a skilled warrior who does not return empty'; the Hebrew comparison is compressed, and the exact relation between 'arrows' and 'skilled warrior' may be rendered more literally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from there,' likely referring to the place where the attacking nations draw up against Babylon.
    reason: cultural_note
