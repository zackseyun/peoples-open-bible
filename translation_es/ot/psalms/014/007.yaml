translation:
  language: es
  text: ¡Oh[a], que la salvación de Israel viniera de Sion! Cuando Yahvé restaure la situación de su pueblo, Jacob se regocijará; Israel se alegrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cuando Yahvé haga volver a los cautivos de su pueblo». El modismo hebreo a menudo significa restaurar la situación o revertir la aflicción de un pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that ... would come
  chosen_spanish: ¡Oh, que ... viniera!
  alternatives_spanish:
  - ¡Si tan solo ... viniera!
  - ¿Quién diera que ...?
  lexicon: HALOT
  rationale: El hebreo expresa un anhelo optativo, no una pregunta literal. En español, «¡Oh, que...!» reproduce bien ese deseo poético sin volverlo interrogativo ni demasiado libre.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: de Sion
  alternatives_spanish:
  - desde Sion
  lexicon: HALOT
  rationale: La preposición מן señala origen o procedencia. «De Sion» es natural en español y conserva el valor de fuente/origen del texto.
- source_word: יְשׁוּעַת יִשְׂרָאֵל
  english_pob_choice: Israel’s salvation
  chosen_spanish: la salvación de Israel
  alternatives_spanish:
  - la liberación de Israel
  - la salvación para Israel
  lexicon: HALOT
  rationale: El sintagma constructo admite «la salvación de Israel» o «de Israel». «Salvación» mantiene el alcance teológico amplio de יְשׁוּעָה mejor que un término más estrecho como «liberación».
- source_word: בְּשׁוּב
  english_pob_choice: When ... restores
  chosen_spanish: Cuando ... restaure
  alternatives_spanish:
  - Cuando ... devuelva
  - Cuando ... haga volver
  lexicon: HALOT
  rationale: Con שׁוב y el objeto idiomático siguiente, el sentido es restaurativo. «Restaure» suena natural en español bíblico contemporáneo y conserva la idea de reversión de la condición del pueblo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la convención del proyecto. «Yahvé» preserva el Tetragrámaton como nombre personal, en vez de sustituirlo por un título.
- source_word: שְׁבוּת עַמּוֹ
  english_pob_choice: the fortunes of his people
  chosen_spanish: las fortunas de su pueblo
  alternatives_spanish:
  - la cautividad de su pueblo
  - el estado de su pueblo
  lexicon: HALOT
  rationale: El hebreo es un modismo. En español, «fortunas» comunica el giro idiomático de restauración de la situación del pueblo; aunque suene algo más formal, evita reducirlo únicamente a una liberación física de cautiverio. La nota preserva la alternativa más literal.
- source_word: יָגֵל
  english_pob_choice: will rejoice
  chosen_spanish: se regocijará
  alternatives_spanish:
  - se alegrará
  - exultará
  lexicon: HALOT
  rationale: גיל expresa gozo exuberante. «Se regocijará» conserva mejor la intensidad poética que un simple «se alegrará».
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se conserva el nombre propio como designación poética del pueblo del pacto.
- source_word: יִשְׂמַח
  english_pob_choice: will be glad
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se gozará
  - estará contento
  lexicon: HALOT
  rationale: שמַח denota alegría y contentamiento. «Se alegrará» mantiene la paralelidad con el verbo anterior sin perder claridad en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se retiene el nombre propio como paralelo de «Jacob» y como designación colectiva del pueblo de Dios.
theological_decisions:
- issue: Cómo verter el modismo שׁוּב שְׁבוּת
  english_pob_reading: restores the fortunes of his people
  chosen_spanish_reading: restaure las fortunas de su pueblo
  alternative_spanish_readings:
  - devuelva la cautividad de su pueblo
  - restaure el bienestar de su pueblo
  rationale: El modismo puede entenderse literalmente como «hacer volver la cautividad», pero también como restaurar la condición favorable del pueblo. Dado que el salmo no exige un marco de exilio histórico específico, el texto principal conserva la lectura idiomática amplia; la nota permite la traducción más literal.
  doctrine_reference: 'Translation philosophy #1, #3, #6'
- issue: Uso del nombre divino en lugar de una sustitución reverencial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: El proyecto traduce el Tetragrámaton con el nombre propio divino, no con una sustitución tipográfica. Esto preserva la referencia directa al nombre revelado a Israel y evita oscurecer el dato del hebreo.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: se mantuvo la lectura optativa de מִי יִתֵּן, la traducción del nombre divino como Yahvé, y la interpretación idiomática de שׁוּב שְׁבוּת con nota para la alternativa más literal.'
  spanish_consistency_notes:
  - Se mantuvo «Sion» sin tilde, conforme al uso bíblico en español.
  - Se diferenciaron los dos verbos de alegría con «se regocijará» y «se alegrará» para conservar el paralelismo.
  - El nombre propio «Jacob» se preservó como designación poética del pueblo, en paralelo con «Israel».
