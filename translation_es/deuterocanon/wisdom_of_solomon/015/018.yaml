translation:
  language: es
  text: Hasta los animales más detestables[a] los veneran; porque, comparados por su necedad con los demás, son peores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los adoran» o «los reverencian». El verbo griego puede indicar reverencia religiosa en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ζῷα
  english_pob_choice: animals
  chosen_spanish: los animales
  alternatives_spanish:
  - las criaturas vivientes
  - las bestias
  lexicon: LSJ
  rationale: ζῷα designa animales o seres vivientes; en este contexto, 'animales' es la opción natural y clara para el lector español.
- source_word: τὰ ἔχθιστα
  english_pob_choice: the most hateful
  chosen_spanish: más detestables
  alternatives_spanish:
  - más odiosos
  - más aborrecibles
  - más detestados
  lexicon: LSJ
  rationale: El superlativo de ἐχθρός conserva una valoración fuertemente negativa. 'Detestables' comunica bien esa carga sin sonar excesivamente interpretativo.
- source_word: σέβονται
  english_pob_choice: they revere
  chosen_spanish: los reverencian
  alternatives_spanish:
  - los veneran
  - los adoran
  lexicon: BDAG
  rationale: σέβομαι puede abarcar reverencia religiosa u honor rendido. 'Reverenciar' mantiene esa amplitud mejor que 'adorar', que sería más específico y más fuerte de lo que exige el griego.
- source_word: ἀνοίᾳ
  english_pob_choice: in their foolishness
  chosen_spanish: en necedad
  alternatives_spanish:
  - por necedad
  - en su necedad
  - por insensatez
  lexicon: LSJ
  rationale: La idea es la esfera o modo de la comparación. 'En necedad' reproduce la construcción con naturalidad en español y conserva el matiz intelectual-moral de ἄνοια.
- source_word: συγκρινόμενα
  english_pob_choice: compared
  chosen_spanish: comparados
  alternatives_spanish:
  - siendo comparados
  - al ser comparados
  lexicon: LSJ
  rationale: El participio pasivo introduce la base de la evaluación. 'Comparados' es conciso y fiel, con buena fluidez en español.
- source_word: τῶν ἄλλων
  english_pob_choice: with the others
  chosen_spanish: con los demás
  alternatives_spanish:
  - con los otros
  - entre los demás
  lexicon: LSJ
  rationale: El genitivo comparativo se expresa de manera idiomática en español con 'con los demás', preservando la comparación implícita.
- source_word: χείρονα
  english_pob_choice: worse
  chosen_spanish: peores
  alternatives_spanish:
  - inferiores
  - más malos
  - más bajos
  lexicon: LSJ
  rationale: χείρων es el comparativo 'peor/más malo'. 'Peores' refleja directamente la comparación y resulta natural en español.
theological_decisions:
- issue: Fuerza religiosa de σέβονται
  english_pob_reading: they revere
  chosen_spanish_reading: los reverencian
  alternative_spanish_readings:
  - los veneran
  - los adoran
  rationale: La crítica es contra el honor religioso dado a animales. 'Reverenciar' mantiene el sentido cultual amplio del verbo sin imponer 'adorar', que en español suena más absoluto y doctrinalmente más específico.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original; equivalencia óptima con conservación de tensión lexical'
- issue: Matiz evaluativo de ἔχθιστα
  english_pob_reading: the most hateful
  chosen_spanish_reading: más detestables
  alternative_spanish_readings:
  - más odiosos
  - más aborrecibles
  rationale: Se conserva la evaluación intensamente negativa del superlativo sin suavizarla ni convertirla en una glosa interpretativa. 'Detestables' es comprensible y mantiene el tono del pasaje.
  doctrine_reference: 'DOCTRINE.md: no borrar el tono retórico del original'
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que ajustó la cláusula causal para reflejar con mayor cercanía la construcción griega. En español se reflejó ese orden lógico con «porque, comparados en necedad con los demás, son peores», evitando un giro posesivo artificial y manteniendo la relación causal/comparativa del original.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma general del proyecto cuando aparezca el tetragrámaton; en este versículo no aplica.
  - Se prefirió 'reverencian' por su amplitud semántica cultual, manteniendo la alternativa 'adoran' en nota para preservar la tensión lexical del griego.
  - Se usó 'necedad' para ἀνοία, en coherencia con el registro moral-intelectual del contexto.
  - Se mantuvo la comparación explícita con 'comparados... con los demás' para no diluir la sintaxis del participio griego.
