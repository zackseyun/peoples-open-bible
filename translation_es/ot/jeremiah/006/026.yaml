revisions:
- from: Hija de mi pueblo[a], cíñete de cilicio y revuélcate en ceniza; haz duelo[b] como por un hijo único, un lamento muy amargo, porque de repente vendrá sobre nosotros el destructor.
  to: Hija de mi pueblo[a], cíñete de cilicio y revuélcate[b] en cenizas; haz duelo como por un hijo único[c], un lamento muy amargo, porque de repente vendrá sobre nosotros el destructor.
  rationale: Se ajusta el español para mayor naturalidad ('cenizas'), se preserva en nota la alternativa léxica documentada para el acto físico de duelo en ceniza, y se reubica la nota de 'hijo único' al lugar semánticamente correcto. No se requieren cambios doctrinales ni estructurales.
