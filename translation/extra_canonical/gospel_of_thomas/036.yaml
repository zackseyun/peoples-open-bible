translation:
  text: Jesus said[a], Do not be anxious from morning until evening, and from evening
    until morning[c][b], about what you will put on yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb ϥⲓⲣⲟⲟⲩϣ can mean “be anxious,” “worry,” or in older idiom “take
      thought.” “Be anxious” is chosen for clarity and brevity.
    reason: lexical_alternative
  - marker: b
    text: POxy 655 for Logion 36 includes added elements (food, lilies, stature),
      aligning only in the clause about clothing; this draft follows the Nag Hammadi
      Coptic text.
    reason: textual_variant
  - marker: c
    text: In the phrase-joined print ⲡⲉ⟨ⲧ⟩ⲉ… shows an editorial supplementation of
      ⟨ⲧ⟩; Dilley’s normalized reading construes the sequence as headless relative
      ⲟⲩ ⲡⲉⲧⲉ– with future ⲛⲁ ϯⲛⲧⲟϥ ϩⲓⲱⲧ ⲛⲧⲱⲧⲛ.
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲙⲡⲣϥⲓⲣⲟⲟⲩϣ
  chosen: do not be anxious
  alternatives:
  - do not worry
  - take no thought
  lexicon: Crum; Layton
  rationale: Negative imperative with mpr- plus ⲥⲛⲁⲩ/ⲣⲟⲟⲩϣ field conveys being anxious
    or solicitous; "be anxious" is idiomatic and concise without introducing archaic
    tone.
- source_word: ϫⲓⲛϩⲧⲟⲟⲩⲉ ... ϣⲁⲣⲟⲩϩⲉ
  chosen: from morning until evening
  alternatives: []
  lexicon: Crum
  rationale: Straightforward temporal prepositional span; preserves Thomas’s parallelism.
- source_word: ϫⲓⲛϩⲓⲣⲟⲩϩⲉ ... ϣⲁϩⲧⲟⲟⲩⲉ
  chosen: from evening until morning
  alternatives: []
  lexicon: Crum
  rationale: Mirrors the first span; maintains symmetrical phrasing present in the
    Coptic.
- source_word: ⲟⲩ ⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁ–
  chosen: what you will
  alternatives:
  - that you are going to
  - the thing you will
  lexicon: Layton
  rationale: Headless relative with ⲟⲩ ⲡⲉⲧⲉ- introducing a clause functions as "what";
    future sense from ⲛⲁ + infinitive construction.
- source_word: ϯⲛⲧⲟϥ
  chosen: put on
  alternatives:
  - wear
  - clothe (yourselves)
  lexicon: Crum; Lambdin
  rationale: Idiomatic verb for putting on clothing; object is implicit in context;
    "put on" keeps the concrete action of the Coptic.
- source_word: ϩⲓⲱⲧⲛⲧⲱⲧⲛ
  chosen: upon yourselves
  alternatives:
  - on your bodies
  - on yourselves
  lexicon: Layton
  rationale: ϩⲓⲱⲧ + reflexive ⲧⲱⲧⲛ marks the reflexive sense; "upon yourselves" keeps
    the literal prepositional nuance.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives: []
  lexicon: Crum
  rationale: Standard coordinating conjunction; retains simple Thomasine parataxis.
textual_note: Dilley’s normalized text reads ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ ⲙⲡⲣϥⲓⲣⲟⲟⲩϣ ϫⲓⲛϩⲧⲟⲟⲩⲉ ϣⲁⲣⲟⲩϩⲉ
  ⲁⲩⲱ ϫⲓⲛϩⲓⲣⲟⲩϩⲉ ϣⲁϩⲧⲟⲟⲩⲉ ϫⲉ ⲟⲩ ⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛ ⲛⲁ ϯⲛⲧⲟϥ ϩⲓⲱⲧ ⲛⲧⲱⲧⲛ, with no lacunae.
  The phrase-joined print shows an editorial supplementation ⟨ⲧ⟩ in ⲡⲉ⟨ⲧ⟩ⲉ… and a
  different morphological segmentation (…ⲧⲁⲁϥ), but Dilley construes the sequence
  as a headless relative ⲟⲩ ⲡⲉⲧⲉ- plus the future construction ⲛⲁ ϯⲛⲧⲟϥ ϩⲓⲱⲧ ⲛⲧⲱⲧⲛ
  (“what you will put on yourselves”). Orthography reflects standard Sahidic; the
  reflexive ϩⲓⲱⲧ ⲧⲱⲧⲛ is split across lines in the codex (…ϩⲓⲱⲧ | ⲧⲏⲩⲧⲛ).
