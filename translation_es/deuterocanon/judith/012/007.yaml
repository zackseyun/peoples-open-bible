    text: O «cañada», «garganta» o «barranco». El término griego puede referirse a una depresión o paso estrecho del terreno.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego aquí pertenece a la misma raíz que más tarde se usa para «bautizar»; en este contexto se refiere a lavarse o bañarse, no al bautismo cristiano.
    reason: lexical_alternative
