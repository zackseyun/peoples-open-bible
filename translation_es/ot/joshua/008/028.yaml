translation:
  language: es
  text: Entonces Josué quemó Hai y la convirtió en un montículo[a] permanente, una desolación hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un montículo eterno»; el hebreo עוֹלָם puede indicar una duración muy larga o indefinida, a menudo vertida como «para siempre» o «eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹף
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - la incendió
  - la prendió fuego
  lexicon: HALOT
  rationale: El verbo hebreo indica quemar mediante fuego. En español, «quemó» es natural, directo y conserva la fuerza narrativa sin añadir matices no presentes en el texto.
- source_word: הָעָי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: nombre propio bíblico
  rationale: Se translitera el nombre propio según uso español habitual, «Hai», manteniendo la referencia geográfica sin traducir el topónimo.
- source_word: וַיְשִׂימֶהָ
  english_pob_choice: made it
  chosen_spanish: la convirtió en
  alternatives_spanish:
  - la hizo
  - la puso como
  lexicon: HALOT
  rationale: El verbo שׂים con sufijo femenino expresa el establecimiento de un nuevo estado o condición. «La convirtió en» comunica bien el resultado de la acción con el predicado siguiente.
- source_word: תֵּל
  english_pob_choice: mound
  chosen_spanish: monte
  alternatives_spanish:
  - mound
  - montículo
  - ruina
  lexicon: HALOT
  rationale: Aunque תֵּל puede ser «montículo» o «mound», en español «monte» transmite una elevación artificial o un gran montón de ruinas de forma comprensible y publicable. Se conserva el valor físico del término sin forzar un tecnicismo poco natural.
- source_word: עוֹלָם
  english_pob_choice: permanent
  chosen_spanish: permanente
  alternatives_spanish:
  - eterno
  - para siempre
  - duradero
  lexicon: HALOT
  rationale: Aquí עוֹלָם describe la permanencia histórica del estado arruinado, no necesariamente eternidad metafísica. «Permanente» evita exagerar el alcance y reproduce la decisión inglesa de una duración indefinida o sostenida.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una devastación
  - un desierto
  lexicon: HALOT
  rationale: El sustantivo expresa devastación o estado desolado. «Una desolación» conserva el sustantivo apposicional del hebreo y mantiene el paralelismo con «monte permanente».
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es un giro idiomático temporal que marca continuidad hasta el momento narrativo. «Hasta hoy» es la equivalencia española más natural y fiel.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente marcada sin cambios: la redacción inglesa final se mantuvo estable y el acuerdo de revisión fue alto. La versión española sigue la misma lectura: destrucción completa de Hai, establecimiento de un estado duradero y la fórmula temporal final.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Hai» en vez de «Ai» para coherencia con el español bíblico habitual.
  - Se conserva «Yahvé» en la serie terminológica del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Monte» se usa aquí como equivalente funcional de תֵּל dentro de la estructura apposicional del versículo; la nota recoge la alternativa más literal «eterno» para עוֹלָם.
  - 'La puntuación sigue el ritmo del hebreo: acción principal, resultado, y cláusula temporal final.'
