translation:
  text: Jesus said[a], Become passers-by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: Become those who pass by; be transient; be travelers. The underlying
      verb is a Greek loan meaning “to pass by.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ϣⲱⲡⲉ
  chosen: become
  alternatives:
  - come to be
  - come into being
  lexicon: Crum; Layton (grammar)
  rationale: 'ϣⲱⲡⲉ commonly means “become, come to be.” In the ϣⲱⲡⲉ ⲉⲣⲉ‑ clause it
    carries a jussive/imperatival force appropriate to a saying: “Become ….” Preserves
    Thomas’s terse diction.'
- source_word: ⲡⲁⲣⲁⲅⲉ (with ⲣ‑ infinitive)
  chosen: passers-by
  alternatives:
  - be passing by
  - those who pass by
  - travelers
  - be transient
  lexicon: Crum; Lambdin; Layton (grammar)
  rationale: ⲡⲁⲣⲁⲅⲉ (< Gk παρέρχεσθαι) means “to pass by.” The ⲣ‑infinitive can function
    nominally; with ⲉⲣⲉ ⲛⲧⲱⲧⲛ, the sense is “that you (pl.) be passing by.” Rendering
    as “passers-by” retains the terse, gnomic quality and reflects the plural addressees.
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said,
  lexicon: Layton (grammar)
  rationale: Standard Coptic speech-introduction; simple, formal rendering supports
    Thomas’s formulaic structure.
textual_note: Single-line saying with no lacunae in NH II,40. The codex writes ⲉⲧⲉⲧⲛⲣ̄ⲡⲁⲣⲁⲅⲉ,
  which Dilley normalizes to ⲉⲣⲉ ⲛⲧⲱⲧⲛ ⲣ‑ⲡⲁⲣⲁⲅⲉ. The manuscript’s ⲉⲧⲉⲧⲛ reflects an
  orthographic contraction/assimilation of the complementizer ⲉⲣⲉ and the independent
  pronoun ⲛⲧⲱⲧⲛ. The overlined r̄ marks the ⲣ‑ infinitive of the Greek loan ⲡⲁⲣⲁⲅⲉ
  (“pass by”). The address is explicitly second person plural, which the English plural
  “passers-by” reflects.
