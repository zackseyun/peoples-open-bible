translation:
  language: es
  text: ¿Por qué, cuando vine, no había ningún hombre[a]? Cuando llamé, no había nadie que respondiera. ¿Acaso se ha acortado mi mano para redimir, o no hay en mí poder para librar? He aquí[b], con mi reprensión seco el mar; convierto los ríos en desierto; sus peces hieden por falta de agua y mueren de sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no había nadie'. El hebreo dice literalmente 'no hombre' (אִישׁ), con un singular masculino usado aquí en sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: O 'Mira'. El hebreo introduce aquí una llamada de atención enfática antes de la demostración del poder divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe
  lexicon: HALOT
  rationale: Interrogación retórica natural en español que conserva la queja/investigación del hebreo sin expandirla innecesariamente.
- source_word: בָּאתִי
  english_pob_choice: I came
  chosen_spanish: cuando vine
  alternatives_spanish:
  - cuando llegué
  lexicon: HALOT
  rationale: El perfecto de בוא se expresa de forma simple y idiomática con 'vine'; 'llegué' es posible, pero 'vine' mantiene mejor el paralelismo inmediato del texto.
- source_word: וְאֵין אִישׁ
  english_pob_choice: was there no man
  chosen_spanish: no había ningún hombre
  alternatives_spanish:
  - no había nadie
  - no había persona alguna
  lexicon: HALOT
  rationale: Se conserva el sustantivo masculino singular אִישׁ con 'hombre', como en la decisión inglesa, evitando neutralizar sin razón textual.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: cuando llamé
  alternatives_spanish:
  - cuando clamé
  - cuando convoqué
  lexicon: HALOT
  rationale: '''Llamé'' reproduce el valor básico del verbo y deja abierta la ambigüedad entre llamada y convocatoria, tal como el hebreo.'
- source_word: וְאֵין עוֹנֶה
  english_pob_choice: was there no one to answer
  chosen_spanish: no había nadie que respondiera
  alternatives_spanish:
  - y no respondía nadie
  - no había quien contestara
  lexicon: HALOT
  rationale: El participio expresa al que responde; en español, una relativa con subjuntivo comunica con naturalidad la ausencia del respondiente.
- source_word: הֲקָצוֹר קָצְרָה יָדִי
  english_pob_choice: Is my hand really too short
  chosen_spanish: ¿Acaso se ha acortado mi mano
  alternatives_spanish:
  - ¿Es mi mano demasiado corta
  - ¿Se ha hecho corta mi mano
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal de incapacidad, que en hebreo es parte del efecto retórico, en vez de sustituirla de inmediato por una abstracción.
- source_word: מִפְּדוּת
  english_pob_choice: to redeem
  chosen_spanish: para redimir
  alternatives_spanish:
  - para rescatar
  - para liberar
  lexicon: HALOT
  rationale: פדות pertenece al campo de la redención; 'redimir' mantiene esa carga lexical y teológica mejor que una simplificación general.
- source_word: וְאִם אֵין בִּי כֹחַ לְהַצִּיל
  english_pob_choice: or is there no power in me to deliver
  chosen_spanish: o no hay en mí poder para librar
  alternatives_spanish:
  - o no tengo poder para salvar
  - o no hay en mí fuerza para rescatar
  lexicon: HALOT
  rationale: '''Poder'' traduce כֹחַ, y ''librar'' refleja היטב el sentido de הציל en contexto de rescate/liberación, sin estrecharlo a un solo matiz.'
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: '''Mira'' comunica el llamado de atención en español moderno y mantiene el valor deíctico sin el arcaísmo de ''he aquí''.'
- source_word: בְּגַעֲרָתִי
  english_pob_choice: by my rebuke
  chosen_spanish: con mi reprensión
  alternatives_spanish:
  - por mi reprensión
  - a causa de mi reprensión
  lexicon: HALOT
  rationale: גערה es una reprensión/amonestación fuerte; 'con' expresa adecuadamente el instrumento por el que actúa el juicio divino.
- source_word: אַחֲרִיב יָם
  english_pob_choice: I dry up the sea
  chosen_spanish: seco el mar
  alternatives_spanish:
  - hago secar el mar
  - agoto el mar
  lexicon: HALOT
  rationale: '''Seco'' es una traducción directa y vívida de la acción de secar/desolar el mar, acorde con el paralelismo de aguas que desaparecen.'
- source_word: אָשִׂים נְהָרוֹת מִדְבָּר
  english_pob_choice: I make rivers a wilderness
  chosen_spanish: convierto los ríos en desierto
  alternatives_spanish:
  - hago de los ríos un desierto
  - hago los ríos un desierto
  lexicon: HALOT
  rationale: '''Convertir en desierto'' expresa bien la transformación poética y resulta natural en español, manteniendo el contraste de agua frente a sequedad.'
- source_word: תִּבְאַשׁ דְּגָתָם
  english_pob_choice: their fish stink
  chosen_spanish: sus peces hieden
  alternatives_spanish:
  - sus peces apestan
  - sus peces se pudren
  lexicon: HALOT
  rationale: '''Hieden'' conserva el valor fuerte del verbo hebreo y el registro profético; ''apestan'' sería más coloquial.'
- source_word: מֵאֵין מַיִם
  english_pob_choice: for lack of water
  chosen_spanish: por falta de agua
  alternatives_spanish:
  - porque no hay agua
  - al no haber agua
  lexicon: HALOT
  rationale: La construcción causal privativa se expresa de forma clara y natural con 'por falta de agua'.
- source_word: וְתָמֹת בַּצָּמָא
  english_pob_choice: and die of thirst
  chosen_spanish: y mueren de sed
  alternatives_spanish:
  - y mueren de hambre de agua
  - y perecen de sed
  lexicon: HALOT
  rationale: '''Mueren de sed'' reproduce el sentido directo de la muerte causada por la falta de agua, con español natural y sobrio.'
theological_decisions:
- issue: Metáfora de la 'mano' de Yahvé
  english_pob_reading: Retained the metaphor 'my hand' rather than interpreting it abstractly as mere 'power' in the first clause.
  chosen_spanish_reading: Se conserva 'mi mano' y la imagen de que se haya 'acortado', en vez de reemplazarla por una abstracción como 'mi poder'.
  alternative_spanish_readings:
  - ¿Se ha debilitado mi poder para redimir?
  - ¿Es insuficiente mi poder para redimir?
  rationale: El hebreo usa imagen corporal para la capacidad efectiva de Dios; mantenerla preserva la fuerza retórica y no borra la tensión entre imagen y explicación posterior.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento del sustantivo masculino אִישׁ
  english_pob_reading: Rendered as 'man' in 'was there no man?'
  chosen_spanish_reading: Se tradujo con 'hombre', no con un genérico neutral.
  alternative_spanish_readings:
  - nadie
  - ninguna persona
  rationale: La forma hebrea es masculina singular y la tradición auditada en inglés la conserva; en español, 'hombre' mantiene ese valor sin necesidad de neutralizarlo.
  doctrine_reference: Translation philosophy §4
- issue: Campo semántico de פדות y הציל
  english_pob_reading: '''to redeem'' / ''deliver'''
  chosen_spanish_reading: '''redimir'' / ''librar'''
  alternative_spanish_readings:
  - rescatar
  - salvar
  rationale: '''Redimir'' conserva el peso teológico de פדות; ''librar'' expresa bien el verbo de rescate sin reducirlo a una sola categoría soteriológica.'
  doctrine_reference: Lexical policy on redemption/rescue language
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa, que prefirió 'no one to answer' y 'Behold' por registro más formal. En español mantuve esa dirección con una relativa natural ('nadie que respondiera') y una interjección de atención moderna ('Mira'), sin perder la fuerza deíctica del hebreo. También conservé la metáfora de la mano acortada y la cadena de imágenes de secar el mar, volver los ríos en desierto, peces que hieden y muerte por sed.
  spanish_consistency_notes:
  - Usé 'Yahvé' cuando el texto no lo requería explícitamente aquí, por tratarse de un dicho divino en primera persona sin mascaramiento de nombre.
  - Mantuve 'redimir' para פדות y 'librar' para הציל, siguiendo la distinción lexical auditada.
  - Elegí 'hombre' para אִישׁ en la primera cláusula y una formulación más natural en la segunda, coherente con el hebreo y con el registro español.
  - Evité 'SEÑOR' y 'Cristo'; no aplican a este versículo.
  - 'Conservé el paralelismo poético con verbos breves y fuertes: seco, convierto, hieden, mueren.'
