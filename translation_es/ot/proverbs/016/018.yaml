translation:
  language: es
  text: La arrogancia va antes de la ruina[a], y un espíritu altivo antes de la caída.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Antes de la destrucción está el orgullo, y antes del tropiezo, la altura de espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - antes que
  lexicon: HALOT
  rationale: 'En este proverbio, la preposición expresa prioridad temporal: algo ocurre y luego llega el resultado adverso. «Antes de» comunica con naturalidad esa relación en español sin perder el paralelismo.'
- source_word: שֶׁבֶר
  english_pob_choice: destruction
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - quebrantamiento
  - derrumbe
  lexicon: HALOT
  rationale: El sustantivo no describe una fractura literal, sino el colapso o la ruina que sobreviene. «Ruina» conserva la fuerza sapiencial del término y suena más natural en español que una calca rígida.
- source_word: גָּאוֹן
  english_pob_choice: pride
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - soberbia
  - majestad
  lexicon: HALOT
  rationale: Aquí el contexto es claramente negativo por el paralelo con ruina y caída. «Arrogancia» explicita esa valoración moral. Se evita «majestad», que sería apropiado en otros contextos pero no aquí.
- source_word: כִּשָּׁלוֹן
  english_pob_choice: a fall
  chosen_spanish: la caída
  alternatives_spanish:
  - el tropiezo
  - el derrumbe
  - la caída en desgracia
  lexicon: HALOT
  rationale: El término remite a tropiezo o caída. «La caída» es idiomática, breve y mantiene el paralelismo proverbial con «ruina».
- source_word: גֹּבַהּ רוּחַ
  english_pob_choice: a haughty spirit
  chosen_spanish: la altivez de espíritu
  alternatives_spanish:
  - un espíritu altivo
  - la soberbia de espíritu
  - la altura de espíritu
  lexicon: HALOT
  rationale: La construcción literal es «altura de espíritu», pero en español esa forma suena poco natural. «Altivez de espíritu» conserva la imagen interna de elevación y el matiz de soberbia, sin reducirlo a una mera actitud.
theological_decisions:
- issue: Valor moral negativo de גָּאוֹן y גֹּבַהּ רוּחַ
  english_pob_reading: Both expressions are rendered negatively as pride/arrogance rather than neutral majesty or elevated disposition.
  chosen_spanish_reading: 'Ambas expresiones se traducen con sentido negativo: «arrogancia» y «altivez de espíritu».'
  alternative_spanish_readings:
  - «orgullo» y «espíritu altivo»
  - «majestad» para גָּאוֹן en otros contextos
  rationale: El paralelismo sinónimo del proverbio vincula estas actitudes con ruina y caída, por lo que el sentido ético negativo es claro en este contexto. La traducción española debe reflejar esa valoración sin introducir una reinterpretación doctrinal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto auditado coincide en alto grado con la versión inglesa POB más reciente; no se requirieron revisiones sustantivas. Se mantuvo la lectura negativa de גָּאוֹן y גֹּבַהּ רוּחַ, y se optó por una equivalencia óptima en español para preservar paralelismo y naturalidad.
  spanish_consistency_notes:
  - Se conserva el paralelismo proverbial en dos miembros coordinados.
  - «Ruina» y «caída» mantienen la progresión semántica de destrucción y tropiezo.
  - «Altivez de espíritu» preserva la imagen de elevación interna sin volverla excesivamente técnica.
  - La nota al pie ofrece una alternativa más literal sin desplazar el texto principal.
