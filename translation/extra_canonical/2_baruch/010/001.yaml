    ܡܢ ܡܕܒܪܐ ܐ̈ܬܝ܆ ܘܫܐ̈ܕܐ


    # Source page p0223 (printed 119)

    ܘܝܕܘܥܐ ܡܢ ܥܒ̈ܕܐ.

    ܐܬܬܥܝܪܘ ܘܐܣܗܕܘ

    ܚܝ̈ܝܟܘܢ ܠܡܘܡܬܐ.

    ܘܣܒܘ ܒܗܘܢ ܐܪ̈ܒܥܬܐ

    ܘܐܡܪܘ ܒܫܡܝ ܕܐܢܬܘܢ

    ܦܠܚܝ̈ܢ ܠܐ ܬܙܥܘܢ ܬܘܒ.

    ܘܐܢܬ ܐܢܒܐ ܠܡܢܝ

    ܚܘܒܐ ܦܐܪ̈ܐ ܕܒ̈ܠܠܝܘܗܝ.

    ܐܝܟܢܐ ܒܨܝܪܝܢ ܚܠܝܡܘܬܐ

    ܕܡܙܘ̈ܢܝܟܝ. ܘܐܢܬ ܐܪܥܐ

    ܠܡܢܐ ܡܘܣܦܐܢܬܝ ܕܬܬܠܝܢ

    ܚܛܝ̈ܛܝܟܝ. ܕܠܐ ܬܘܒ

    ܡܬܩܒܠ ܡܢܟܝ ܒܨܝܪܘܬܝ.

    ܘܠܐ ܬܘܒ ܢܚܬ ܦܐܪ̈ܐ

    ܡܬܩܒܠܝܢ. ܘܐܢܬܘܢ

    ܡܥܝܢ̈ܐ ܐܝܟܘ ܠܒܟܘܢ.

    ܘܠܐ ܬܦܩܘܢ ܐܪ̈ܙܐ

    ܕܡܣܝܪܐ. ܘܐܢܬ ܝܡܡܐ

    ܐܝܟܘ ܢܘܗܪܟܘܢ ܕܠܚܫܟܘܢ.

    ܘܐܢܬ ܫܡܫܐ ܐܢܒܝ

    ܙܠܝ̈ܩܝܟ ܕܢܘܗܪܐ.

    ܠܡܢܐ ܓܝܪ ܗܘܝ ܠܝܠܝ

    ܢܘܗܪܐ ܐܢܘܢ ܕܡܘܬܐ

    ܕܐܝܟ ܗܟܢܐ. ܘܬܘܒ

    ܚܫܟܐ ܠܐ ܬܥܒܕܘܢ.

    ܘܒܬܪܘܬ ܟܘܟܒܐ ܠܐ

    ܢܨܡܚܘܢ ܘܠܝܡܐ ܢܗܪ

    ܠܐ ܬܪܟܢܘܢ ܕܬܒܘܢ. ܥܡܗܘܢ

    ܓܝܪ ܚܠܝܛܝܬܘܢ ܒܡܘܬܐ.

    ܘܚܕܝܬܘܢ ܥܡܗܘܢ ܕܠܝܬ ܠܗܘܢ

    ܟܐܒܐ. ܘܐܢܬܘܢ ܕܐܝܬ ܠܗܘܢ

    ܟܐܒܐ ܢܬܬܚܡܘܢ. ܠܡܢܐ

    ܓܝܪ ܚܕܝܢ ܒܘܪ̈ܟܐ ܘܡܒܪܟ

    ܒܬܘܠܬܝܐ. ܐܘ ܠܡܢܐ

    ܗܘܝ ܣܒܪܝܢ ܢܫܝ̈ܐ ܡ̈ܢܝ

    ܒܛܢܝ̈ܗܝܢ. ܐܘ ܐܢܫܐ

    ܕܡܘܠܕܝܢ ܠܡܢܐ ܗܘܝ

    ܡܣܒܪܝܢ. ܐܢܘܢ ܕܐܝܬ

    ܐܡܐ ܚܕܝܬܐ. ܘܒܢܝ̈ܗ

    ܐܬܬܒܝܘ. ܡܢ ܗܫܐ

    ܠܐ ܗܘܝ ܬܙܡܪܘܢ ܥܠ

    ܫܘܦܪܐ. ܘܠܐ ܬܚܬܘܢ'
