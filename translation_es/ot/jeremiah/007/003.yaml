translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel: Mejoren[a] sus caminos y sus hechos, y yo los dejaré habitar[b] en este lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Corrijan sus caminos y sus hechos''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''y yo los haré habitar en este lugar'', o ''y yo les permitiré permanecer en este lugar''.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se vierte con una equivalencia natural en español que conserva el tono solemne y la cadencia de mensajero sin sonar arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md contested terms: יְהוָה / YHWH'
  rationale: Se sigue el equivalente editorial del proyecto para el Nombre divino, manteniendo el nombre propio revelado en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hostes
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'ejércitos' comunica de forma clara el alcance del título divino y conserva la idea de poder y mando. 'Huestes' es más tradicional pero menos inmediato para lectores amplios.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La construcción posesiva es directa y la formulación tradicional es plenamente natural en español.
- source_word: הֵיטִיבוּ
  english_pob_choice: Make your ways and your deeds good
  chosen_spanish: Hagan bien
  alternatives_spanish:
  - Corrijan
  - Mejoren
  lexicon: HALOT
  rationale: El verbo hebreo tiene fuerza exhortativa de reforma moral. 'Hagan bien' es breve y fiel al imperativo; no resuelve en exceso si el matiz es 'enmendar' o 'mejorar'.
- source_word: דַרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su manera de vivir
  - sus sendas
  lexicon: HALOT
  rationale: '''Caminos'' conserva la metáfora bíblica para el modo de vida y es natural en español. El posesivo en tercera persona plural concuerda con el imperativo dirigido al pueblo.'
- source_word: וּמַעַלְלֵיכֶם
  english_pob_choice: and your deeds
  chosen_spanish: y sus hechos
  alternatives_spanish:
  - y sus obras
  - y sus acciones
  lexicon: HALOT
  rationale: '''Hechos'' mantiene el referente concreto de actos y conducta. Se evita ''obras'' por posibles asociaciones doctrinales no explícitas aquí.'
- source_word: וַאֲשַׁכְּנָה אֶתְכֶם
  english_pob_choice: and I will let you dwell
  chosen_spanish: y yo los haré habitar
  alternatives_spanish:
  - y yo les permitiré habitar
  - y yo los dejaré habitar
  lexicon: HALOT
  rationale: 'El verbo causativo admite tanto ''hacer habitar'' como ''permitir habitar''. Se eligió la forma más cercana al valor verbal y a la tensión preservada por la POB: la permanencia en el lugar depende de la respuesta obediente.'
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - en este lugar mismo
  lexicon: HALOT
  rationale: '''Lugar'' reproduce el sustantivo hebreo de modo claro y mantiene la referencia deliberadamente amplia del contexto sin restringirla a un solo referente geográfico.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto conforme al estándar del proyecto y se evita la sustitución reverencial por un título, para no ocultar el dato textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de הֵיטִיבוּ en exhortación profética
  english_pob_reading: Make your ways and your deeds good
  chosen_spanish_reading: Hagan bien sus caminos y sus hechos
  alternative_spanish_readings:
  - Corrijan sus caminos y sus hechos
  - Mejoren sus caminos y sus hechos
  rationale: Se conserva la tensión entre reforma moral concreta y fórmula profética breve. 'Hagan bien' evita decidir demasiado pronto entre 'enmendar' y 'mejorar', como también hace la POB al dejar abierto 'Amend'.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Valor de וַאֲשַׁכְּנָה אֶתְכֶם
  english_pob_reading: and I will let you dwell
  chosen_spanish_reading: y yo los haré habitar
  alternative_spanish_readings:
  - y yo les permitiré habitar
  - y yo los dejaré habitar
  rationale: La traducción mantiene el matiz causativo sin borrar la condición implícita de permanencia ligada al arrepentimiento. No se lo convierte en mera mudanza ni en permanencia automática.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre revisiones y no requería cambios sustanciales. La versión española conserva la fórmula profética, el Nombre divino como Yahvé, el título צְבָאוֹת con un equivalente claro en español y la ambigüedad teológica del verbo causativo final.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, coherente con el estándar del proyecto.
  - Se usó 'Dios' para אֱלֹהֵי יִשְׂרָאֵל sin añadir determinaciones interpretativas.
  - '''Caminos'' y ''hechos'' reflejan la metáfora moral y la conducta concreta del hebreo.'
  - No se introdujo 'SEÑOR' como sustituto del Nombre divino.
  - La puntuación reproduce una apertura profética seguida de exhortación y promesa final.
