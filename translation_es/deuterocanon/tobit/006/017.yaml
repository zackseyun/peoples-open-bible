translation:
  language: es
  text: Y cuando entres en la cámara nupcial[a], toma las cenizas del incienso y pon sobre ellas algo del corazón y del hígado del pez, y haz que salga humo con ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cenizas del incienso». La frase griega puede entenderse más literalmente de esta manera.
    reason: lexical_alternative
  - marker: b
    text: Es decir, producir humo con las cenizas al poner sobre ellas el corazón y el hígado del pez; el verbo es más específico que simplemente «quemar».
    reason: lexical_alternative
lexical_decisions:
- source_word: νυμφῶνα
  english_pob_choice: bridal chamber
  chosen_spanish: cámara nupcial
  alternatives_spanish:
  - alcoba nupcial
  - cuarto nupcial
  lexicon: LSJ
  rationale: νυμφῶνα se refiere al espacio destinado a la consumación matrimonial. «Cámara nupcial» conserva ese matiz y suena natural en español bíblico contemporáneo.
- source_word: λήμψῃ
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - toma en tus manos
  lexicon: BDAG
  rationale: Aquí el verbo tiene sentido práctico de tomar un objeto para usarlo; «toma» comunica la instrucción con claridad y sin añadir matiz indebido.
- source_word: τέφραν θυμιαμάτων
  english_pob_choice: the incense ashes
  chosen_spanish: las cenizas del incienso
  alternatives_spanish:
  - cenizas de incienso
  - las cenizas aromáticas
  lexicon: LSJ
  rationale: La frase griega puede entenderse de manera natural como cenizas producidas por el incienso. El español «las cenizas del incienso» mantiene esa relación genitiva sin forzarla.
- source_word: ἐπιθήσεις
  english_pob_choice: place on them
  chosen_spanish: pon sobre ellas
  alternatives_spanish:
  - coloca sobre ellas
  - échalas sobre ellas
  lexicon: BDAG
  rationale: El verbo expresa poner o colocar encima. En español, «pon sobre ellas» conserva la sencillez imperativa del original y el referente femenino plural de «cenizas».
- source_word: ἀπὸ τῆς καρδίας καὶ τοῦ ἥπατος τοῦ ἰχθύος
  english_pob_choice: some of the fish’s heart and liver
  chosen_spanish: algo del corazón y del hígado del pez
  alternatives_spanish:
  - una parte del corazón y del hígado del pez
  - del corazón y del hígado del pez
  lexicon: LSJ
  rationale: ἀπό tiene aquí valor partitivo. «Algo de» expresa bien que se toma una porción de esos órganos, sin precisar más de lo que el texto dice.
- source_word: καπνίσεις
  english_pob_choice: make smoke with them
  chosen_spanish: haz que salga humo con ellas
  alternatives_spanish:
  - ahúmalas
  - haz humo con ellas
  - produce humo con ellas
  lexicon: LSJ
  rationale: El verbo indica producir humo/fumigación, no solo quemar. «Haz que salga humo» conserva la acción concreta y evita interpretar el resultado ritual más allá del versículo.
theological_decisions:
- issue: Sentido ritual de καπνίσεις
  english_pob_reading: Render the action concretely as producing smoke rather than interpretively as exorcistic action.
  chosen_spanish_reading: Se traduce como una acción material de hacer salir humo, sin anticipar en el versículo un efecto exorcístico o medicinal.
  alternative_spanish_readings:
  - ahúmalas
  - quémalas como rito
  - fumiga con ellas
  rationale: El griego describe aquí el acto físico; el efecto se desarrolla en el contexto inmediato posterior. La traducción evita importar una interpretación que el versículo no explicita todavía.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete 1909 y el razonamiento auditado del inglés POB, sin cambios sustantivos respecto del último pase revisado: mantiene la equivalencia funcional de νυμφῶνα, el valor partitivo de ἀπό y la especificidad de καπνίσεις como producir humo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - «cámara nupcial» mantiene el registro bíblico sin recurrir a una calca inglesa.
  - Se conserva «incienso» y no se introduce terminología litúrgica posterior como «encensar» o «fumar», porque el griego describe una acción concreta de humo.
