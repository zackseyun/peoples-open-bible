review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: «montes», «desde sus cimientos», «las aguas», «peñas», «delante de tu rostro» y «a los que te temen» preservan correctamente la imaginería y las decisiones auditadas. La nota sobre «delante de tu rostro / en tu presencia» también sigue fielmente la justificación inglesa. Sin embargo, «pero a los que te temen, eres misericordioso» suena incompleto en español porque εὐιλατεύεις rige claramente αὐτοῖς; la relación benefactiva hacia ellos debe expresarse de forma natural y explícita.'
  spanish_quality_summary: El español es en general claro y digno, pero la última cláusula necesita reparación sintáctica. En español, «eres misericordioso» sin complemento después de «a los que te temen» queda abrupto; «les muestras gracia» o «eres benigno con ellos» expresa mejor la relación. Además, el anclaje de la nota [a] está puesto en «cera», cuando la alternativa comentada corresponde a «delante de tu rostro»; el marcador debe moverse al sintagma pertinente.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Montes»/«peñas» son aceptables en registro poético. «A los que te temen» conserva correctamente la carga teológica de φοβουμένοις. Para εὐιλατεύεις, «gracia» alinea mejor con la decisión inglesa «you are gracious» que «misericordioso», evitando estrechar innecesariamente el matiz de favor benevolente.
  issues:
  - severity: medium
    issue: La cláusula final no expresa bien el dativo αὐτοῖς.
    rationale: «Pero a los que te temen, eres misericordioso» es gramaticalmente forzada y omite en español una relación explícita de favor hacia esas personas. El griego y la auditoría inglesa requieren una formulación como «les muestras gracia» o equivalente.
  - severity: medium
    issue: La nota [a] está anclada en la palabra equivocada.
    rationale: La nota explica la alternativa a ἀπὸ προσώπου σου («delante de tu rostro» / «en tu presencia»), no a «como cera». El marcador debe aparecer junto a «delante de tu rostro» para cumplir la disciplina de notas.
  - severity: low
    issue: «Misericordioso» reduce un poco el matiz de εὐιλατεύεις.
    rationale: El verbo raro apunta a disposición favorable/graciosa; «misericordioso» es posible, pero «les muestras gracia» o «eres benigno con ellos» refleja mejor la decisión léxica documentada.
  revised_spanish_text: Porque los montes serán sacudidos desde sus cimientos junto con las aguas, y las peñas se derretirán como cera delante de tu rostro[a]; pero a los que te temen, les muestras gracia.
  revised_footnotes:
