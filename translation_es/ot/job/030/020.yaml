review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien el clamor y la falta de respuesta divina, pero se aparta innecesariamente del hebreo en עָמַדְתִּי al traducir «me detengo», que no corresponde al sentido básico de «estar de pie / ponerse de pie». También «miras hacia mí» es menos natural y menos preciso que «me miras» o «miras atentamente». La nota al pie mezcla alternativas para el primer verbo con matices del segundo, y no preserva con claridad la alternativa documentada en inglés para toda la segunda cláusula.
  spanish_quality_summary: El texto es generalmente legible y digno, pero «me detengo» suena interpretativo y algo extraño en contexto. «Tú solo miras hacia mí» es comprensible, aunque menos idiomático que «solo me miras». Una pequeña revisión mejora fidelidad y fluidez sin cambiar el tono poético.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto en este versículo. La elección de «Clamo» es adecuada. Conviene alinear mejor la alternativa temporal de עָמַדְתִּי y el matiz de התבונן con una nota más precisa.
  issues:
  - severity: high
    issue: «me detengo» para עָמַדְתִּי
    rationale: עמד significa «estar de pie / ponerse de pie / permanecer». «Me detengo» introduce la idea de parar o cesar movimiento, que no es la imagen del hebreo ni la decisión inglesa documentada.
  - severity: medium
    issue: «miras hacia mí» para וַתִּתְבֹּנֶן בִּי
    rationale: La frase es menos natural en español y diluye el objeto directo de la mirada. «Me miras» o «me miras atentamente» representa mejor el hebreo y el matiz inglés ‘look at me’.
  - severity: medium
    issue: Nota al pie mal enfocada
    rationale: 'La nota está anclada en «Clamo» pero incluye información sobre el sentido pasado y la mirada atenta de la segunda cláusula. La nota inglesa preserva una alternativa de lectura para la cláusula completa: «I stood, and you looked closely at me».'
  revised_spanish_text: Clamo a ti, pero no me respondes; estoy de pie[a], y tú solo me miras.
