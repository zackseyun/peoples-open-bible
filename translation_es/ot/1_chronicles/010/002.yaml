translation:
  language: es
  text: Y los filisteos persiguieron a Saúl y a sus hijos[a], y los filisteos abatieron a Jonatán, a Abinadab y a Malqui-shúa, los hijos de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «persiguieron de cerca a Saúl y a sus hijos». El verbo hebreo tiene literalmente la idea de «aferrarse» o «pegarse a», y aquí describe una persecución militar implacable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְבְּקוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - siguieron de cerca
  - acosaron
  - se pegaron a
  lexicon: HALOT
  rationale: El verbo hebreo דבק, con אַחֲרֵי en contexto militar, expresa una persecución insistente y cercana. ‘Persiguieron’ comunica bien la acción en español natural, sin perder la fuerza de la búsqueda implacable. No uso una forma más literal como ‘se pegaron a’ porque suena extraña en español y no transmite con claridad el sentido bélico.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: a
  alternatives_spanish:
  - tras
  - después de
  - en pos de
  lexicon: HALOT
  rationale: En español, la construcción natural con ‘perseguir’ es ‘persiguieron a’. Aunque el hebreo dice literalmente ‘después de’, la preposición se integra correctamente en la sintaxis española sin cambiar el sentido.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos varones
  lexicon: HALOT
  rationale: El hebreo especifica descendencia masculina, pero en español ‘sus hijos’ es la forma más natural y puede funcionar como equivalente contextual en una lista de varones ya identificados por nombre. El contexto inmediato confirma que se trata de hijos varones.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirieron de muerte
  alternatives_spanish:
  - mataron
  - derribaron
  - golpearon
  lexicon: HALOT
  rationale: נכה es amplio (‘golpear, herir, abatir’). En esta escena militar, el resultado narrativo implica muerte. ‘Hirieron de muerte’ preserva la fuerza del verbo sin volverlo meramente interpretativo como ‘mataron’, y suena natural en español bíblico contemporáneo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre del pueblo en su forma común en español bíblico. Se conserva la repetición del sujeto en ambas cláusulas, como en el hebreo, para mantener el énfasis narrativo.
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: HALOT
  rationale: Se usa la forma asentada en español bíblico para el nombre propio.
- source_word: אֲבִינָדָב
  english_pob_choice: Abinadab
  chosen_spanish: Abinadab
  alternatives_spanish:
  - Abinadab
  lexicon: HALOT
  rationale: Se conserva la transliteración habitual del nombre propio en español.
- source_word: מַלְכִּי שׁוּעַ
  english_pob_choice: Malchi-shua
  chosen_spanish: Malqui-shúa
  alternatives_spanish:
  - Malquishúa
  - Malchi-shua
  lexicon: HALOT
  rationale: La transliteración española normaliza la secuencia consonántica y acentúa la última sílaba para reflejar la pronunciación habitual en español. Se mantiene el guion porque el hebreo presenta un nombre compuesto.
- source_word: בְּנֵי שָׁאוּל
  english_pob_choice: the sons of Saul
  chosen_spanish: hijos de Saúl
  alternatives_spanish:
  - los hijos de Saúl
  - los hijos de Saúl
  lexicon: HALOT
  rationale: La frase final funciona como apposición identificadora. ‘Hijos de Saúl’ es conciso, natural y fiel al hebreo; se evita repetir ‘los’ para no recargar la frase. Se mantiene ‘Saúl’ con acento español.
translation_notes:
  revision_awareness: El audit trail inglés pasó de una forma más literal ('pressed hard after') a 'pursued' por naturalidad; la versión española sigue esa decisión, pero conserva la intensidad mediante el verbo de persecución y una nota que recuerda la fuerza literal de דבק. También se respetó la repetición de 'los filisteos' en ambas cláusulas y la identificación final 'hijos de Saúl'.
  spanish_consistency_notes:
  - Se usó ‘Jonatán’ y no ‘Jonathan’ para coherencia con el uso bíblico en español.
  - Se prefirió ‘Malqui-shúa’ como transliteración española clara y publicable.
  - Se conservó la repetición del sujeto ‘los filisteos’ para reflejar el hebreo y mantener énfasis narrativo.
  - No se reemplazó el nombre divino porque el versículo no contiene referencias directas a יהוה.
