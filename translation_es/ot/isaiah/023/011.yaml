    rationale: El texto principal ya dice «sus fortalezas», de modo que la nota «O “sus fortalezas”» no añade información. Debe conservar la información relevante de la alternativa inglesa («sus fortalezas/fortalezas de ella» frente a una posible explicitación del femenino), pero redactada de forma que sí explique el matiz del sufijo femenino singular.
  revised_spanish_text: Ha extendido su mano sobre el mar[a]; ha hecho temblar a los reinos. Yahvé ha ordenado acerca de Canaán[b], para destruir sus fortalezas[c].
