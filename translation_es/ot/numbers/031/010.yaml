    reason: lexical_alternative
  - marker: b
    text: 'También: «sus aldeas» o «sus recintos».'
    reason: lexical_alternative
  revision_rationale: Se cambia 'aldeas' por 'campamentos' para reflejar fielmente טִירֹתָם y alinearse con la decisión léxica documentada del POB, que distingue entre 'ciudades' y otra clase de habitación menos urbanizada. Se conserva 'en sus moradas' como una representación aceptable de בְּמוֹשְׁבֹתָם y se ajusta la nota b para que las alternativas correspondan al nuevo texto principal.
