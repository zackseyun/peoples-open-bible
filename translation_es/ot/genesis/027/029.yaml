revisions:
- from: ¡Que te sirvan pueblos, y naciones se postren ante ti. Sé dueño[a] de tus hermanos, y los hijos de tu madre se postren ante ti. Maldito el que te maldiga, y bendito el que te bendiga.
  to: ¡Que te sirvan pueblos, y naciones se postren[a] ante ti. Ten dominio sobre tus hermanos[b], y que los hijos de tu madre se postren ante ti. Malditos los que te maldigan, y benditos los que te bendigan.
  rationale: Se ajusta גביר a una expresión española más fiel y natural («ten dominio sobre») que evita el matiz impropio de posesión de «dueño». Se restaura la nota léxica del verbo de postración documentada en el English POB. Se pluraliza la fórmula final para reflejar mejor los participios plurales colectivos del hebreo y el paralelismo de bendición/maldición.
  reviewer_model: gpt-5.4
