translation:
  language: es
  text: Porque en el lugar donde lo han desterrado[a], allí morirá, y no volverá a ver esta tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo han llevado al destierro» / «lo han llevado al exilio». El verbo hebreo especifica hacer que alguien vaya al exilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón del mandato previo; en español, «Porque» comunica bien esa fuerza explicativa sin sonar rígido.
- source_word: בִּמְקוֹם אֲשֶׁר
  english_pob_choice: in the place where
  chosen_spanish: en el lugar adonde
  alternatives_spanish:
  - en el lugar donde
  - en el sitio donde
  lexicon: HALOT
  rationale: La construcción hebrea marca ubicación con dirección implícita hacia el lugar del exilio; «adonde» conserva mejor ese matiz que un simple «donde».
- source_word: הִגְלוּ אֹתוֹ
  english_pob_choice: they have exiled him
  chosen_spanish: lo hayan desterrado
  alternatives_spanish:
  - lo hayan exiliado
  - lo hayan llevado al destierro
  - lo hayan llevado en cautiverio
  lexicon: HALOT
  rationale: El verbo causativo expresa hacer entrar en exilio/destierro; «desterrar» comunica esa acción forzada con claridad. Se conserva el sujeto indefinido mediante la pasiva verbal impersonal en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: «Allí» mantiene la repetición enfática del hebreo y su referencia inmediata al lugar del destierro.
- source_word: יָמוּת
  english_pob_choice: he will die
  chosen_spanish: morirá
  alternatives_spanish:
  - va a morir
  - ha de morir
  lexicon: HALOT
  rationale: El futuro simple en español expresa de forma natural la certeza del evento en este contexto profético.
- source_word: וְאֶת־הָאָרֶץ הַזֹּאת
  english_pob_choice: and ... this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra de Judá
  - esta tierra
  lexicon: HALOT
  rationale: «אָרֶץ» aquí designa la tierra/patria concreta; en español «tierra» resulta natural y conserva el alcance territorial y nacional del término.
- source_word: לֹא יִרְאֶה עוֹד
  english_pob_choice: he will never see ... again
  chosen_spanish: no volverá a ver
  alternatives_spanish:
  - ya no verá
  - no verá más
  lexicon: HALOT
  rationale: La negación con עוֹד comunica permanencia; «no volverá a ver» expresa esa irreversibilidad de manera idiomática en español sin perder el énfasis final.
translation_notes:
  revision_awareness: Se tradujo directamente desde el hebreo WLC, usando el audit trail inglés como apoyo para decisiones léxicas y de matiz. No se detectaron revisiones textuales en el pasaje; la versión inglesa final también fue confirmada sin cambios.
  spanish_consistency_notes:
  - Se prefirió «desterrar/destierro» para reflejar el valor causativo del verbo hebreo, en continuidad con la nota léxica inglesa.
  - Se usó «tierra» para אָרֶץ siguiendo el sentido territorial del contexto real y nacional.
  - Se mantuvo el paralelismo de lugar + allí para reproducir el énfasis del hebreo.
