translation:
  language: es
  text: Pero ellos se rebelaron y entristecieron[a] a su Espíritu Santo; por eso él se volvió contra ellos como enemigo; él mismo luchó contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su espíritu santo» o, más literalmente, «el espíritu de su santidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Mas ellos
  lexicon: HALOT
  rationale: La conjunción adversativa introduce contraste con los actos salvadores previos; «Pero ellos» conserva esa oposición de manera natural en español y mantiene el sujeto explícito.
- source_word: מָרוּ
  english_pob_choice: rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - fueron rebeldes
  - desafiaron
  lexicon: HALOT
  rationale: El verbo מרה expresa rebeldía o desafío contra Dios; «se rebelaron» es la equivalencia directa y más idiomática en este contexto.
- source_word: וְעִצְּבוּ
  english_pob_choice: grieved
  chosen_spanish: entristecieron
  alternatives_spanish:
  - causaron dolor
  - afligieron
  lexicon: HALOT
  rationale: El piel de עצב puede significar causar dolor o tristeza. En relación con el Espíritu de Dios, «entristecieron» conserva el matiz personal-afectivo del texto sin sobreexplicar.
- source_word: אֶת רוּחַ קָדְשׁוֹ
  english_pob_choice: his Holy Spirit
  chosen_spanish: su Espíritu Santo
  alternatives_spanish:
  - su espíritu santo
  - el espíritu de su santidad
  lexicon: HALOT
  rationale: La frase hebrea admite una forma más literal («el espíritu de su santidad»), pero en este contexto el referente personal y la relación de ser entristecido favorecen «su Espíritu Santo», que en español comunica con claridad el peso teológico del pasaje.
- source_word: וַיֵּהָפֵךְ לָהֶם לְאוֹיֵב
  english_pob_choice: so he turned against them as an enemy
  chosen_spanish: por eso él se volvió contra ellos como enemigo
  alternatives_spanish:
  - entonces se volvió su enemigo
  - y se volvió contra ellos como enemigo
  lexicon: HALOT
  rationale: 'El hebreo expresa una inversión relacional: «se volvió contra ellos como enemigo». «Por eso» explicita la consecuencia lógica del contexto; «como enemigo» preserva el valor predicativo de לְאוֹיֵב sin añadir más de lo que el texto dice.'
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él de hecho
  lexicon: HALOT
  rationale: El pronombre es enfático; «él mismo» conserva esa fuerza y subraya que fue Dios quien actuó personalmente en juicio.
- source_word: נִלְחַם בָּם
  english_pob_choice: fought against them
  chosen_spanish: luchó contra ellos
  alternatives_spanish:
  - peleó contra ellos
  - combatió contra ellos
  lexicon: HALOT
  rationale: לָחַם con ב expresa combate contra un adversario. «Luchó contra ellos» es claro, natural y suficientemente fuerte para el paralelo final.
theological_decisions:
- issue: Cómo reflejar רוּחַ קָדְשׁוֹ sin borrar su posible lectura más literal
  english_pob_reading: his Holy Spirit; footnote offers 'his holy spirit' or 'the spirit of his holiness'
  chosen_spanish_reading: su Espíritu Santo
  alternative_spanish_readings:
  - su espíritu santo
  - el espíritu de su santidad
  rationale: La lectura del POB en inglés opta por el sentido personal y capitalizado. En español, «su Espíritu Santo» comunica esa lectura con naturalidad y sin ocultar que el hebreo también permite formulaciones más literales; por eso se conserva una nota con la alternativa.
  doctrine_reference: Translation philosophy §3; affirmaciones trinitarias implícitas del texto sin ampliarlas más allá del pasaje
- issue: Si el cambio a enemigo debe expresarse como estado o como giro relacional
  english_pob_reading: he turned against them as an enemy
  chosen_spanish_reading: se volvió contra ellos como enemigo
  alternative_spanish_readings:
  - se convirtió en su enemigo
  - se volvió su enemigo
  rationale: 'El hebreo usa un giro relacional: Dios pasa a estar en posición hostil frente a su pueblo. «Se volvió contra ellos como enemigo» mantiene esa reversión sin sugerir una ontología distinta ni suavizar el juicio.'
  doctrine_reference: Justicia divina y disciplina en el pacto
- issue: Cómo intensificar o no el sujeto divino final
  english_pob_reading: he himself fought against them
  chosen_spanish_reading: él mismo luchó contra ellos
  alternative_spanish_readings:
  - él luchó contra ellos
  - él mismo combatió contra ellos
  rationale: La presencia explícita del pronombre en hebreo es enfática. «Él mismo» lo refleja y evita que la acción se lea como impersonal o mediada.
  doctrine_reference: Énfasis retórico del hebreo; acciones directas de Yahvé
translation_notes:
  revision_awareness: Se siguió el último estado revisado del POB en inglés, que fija «turned against them as an enemy» y mantiene la lectura personal de «his Holy Spirit». La versión española conserva esa misma dirección semántica, pero ajusta el verbo y la sintaxis a un español natural y reverente.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas para reflejar la lectura personal adoptada por el POB en este contexto.
  - «Se rebelaron» y «luchó contra ellos» mantienen la fuerza verbal del hebreo sin suavizar el conflicto.
  - La nota conserva la alternativa literal para auditar la decisión sobre רוּחַ קָדְשׁוֹ.
  - No se introduce 'SEÑOR' ni 'Cristo'; el versículo no lo requiere.
