review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: asignación a los hijos de Aarón dentro de las familias coatitas de los hijos de Leví, con la razón de que a ellos les tocó el primer lote. Sin embargo, hay un problema de fidelidad léxica en la nota al pie y una mejora menor de naturalidad en la cláusula final.'
  spanish_quality_summary: El español es claro y ampliamente legible. «Fue para…» y «la primera suerte» son comprensibles, pero «porque para ellos fue la primera suerte» suena algo rígido; «porque a ellos les tocó la primera suerte» expresa el mismo sentido distributivo con mejor naturalidad. La nota «clan(es)» no es apta para texto publicado.
  glossary_alignment: No hay términos de glosario sensibles en este versículo que entren en conflicto con las pautas del proyecto. «Coatitas», «hijos de Aarón» e «hijos de Leví» están bien alineados. «Suerte» para גּוֹרָל es aceptable en este contexto de sorteo/asignación.
  issues:
  - severity: medium
    issue: La nota al pie usa «clan(es)», una forma editorial no publicable.
    rationale: El inglés preserva la alternativa «clans». En español debe darse una alternativa limpia y natural, p. ej. «O «de los clanes coatitas»». El uso de paréntesis dentro de la palabra no es adecuado para una edición bíblica final.
  - severity: low
    issue: 'La cláusula final suena forzada: «porque para ellos fue la primera suerte».'
    rationale: Aunque no es incorrecta, en español bíblico natural el valor de asignación de לָהֶם con גּוֹרָל se expresa mejor como «a ellos les tocó la primera suerte», sin perder el sentido del hebreo ni añadir contenido indebido.
  revised_spanish_text: Fue para los hijos de Aarón[a], de las familias de los coatitas, de los hijos de Leví, porque a ellos les tocó la primera suerte.
  revised_footnotes:
  - marker: a
    text: O «de los clanes coatitas».
    reason: lexical_alternative
