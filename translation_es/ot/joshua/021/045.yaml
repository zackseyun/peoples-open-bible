translation:
  language: es
  text: No cayó ni una sola palabra de toda la buena palabra que Yahvé había hablado a la casa de Israel[a]; todo se cumplió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''promesa'': «No cayó ni una sola promesa de toda la buena promesa que Yahvé había prometido a la casa de Israel; todo se cumplió.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: Not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No una
  - Ni una
  lexicon: HALOT
  rationale: La negación simple reproduce fielmente el arranque absoluto del hebreo. En español, 'No cayó ninguna palabra' ya transmite la fuerza de 'Not one...' sin añadir material innecesario.
- source_word: נָפַל
  english_pob_choice: failed
  chosen_spanish: cayó
  alternatives_spanish:
  - fracasó
  - falló
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'cayó', y el modismo con דָּבָר apunta a que ninguna declaración de Yahvé quedó en tierra o sin efecto. Mantener 'cayó' conserva la imagen verbal del original; el cumplimiento se explicita en la segunda mitad con 'se cumplió'.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - cosa
  - asunto
  - promesa
  lexicon: HALOT
  rationale: '''Palabra'' mantiene la conexión léxica con el verbo ''habló'' y evita convertir el sentido en una paráfrasis interpretativa. ''Promesa'' es una alternativa válida, pero no se adopta en el texto principal para no borrar la repetición del hebreo.'
- source_word: מִכֹּל
  english_pob_choice: from all
  chosen_spanish: de todo
  alternatives_spanish:
  - de entre todo
  - de todo lo
  lexicon: HALOT
  rationale: '''De todo'' expresa de manera natural la idea de separación desde el conjunto total. En español, ''de todo'' funciona bien con ''ninguna palabra'' y conserva el sentido distributivo del hebreo.'
- source_word: הַדָּבָר הַטּוֹב
  english_pob_choice: the good word
  chosen_spanish: la buena palabra
  alternatives_spanish:
  - la buena promesa
  - la buena cosa
  lexicon: HALOT
  rationale: La expresión hebrea es singular y calificativa. 'La buena palabra' reproduce el enlace con דָּבָר y deja visible la valoración positiva de lo dicho por Yahvé sin adelantar la lectura interpretativa de 'promesa'.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that ... had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja adecuadamente la referencia a una palabra previa ya pronunciada. 'Había hablado' conserva el énfasis en el acto de hablar, más cercano a דִּבֶּר que 'había dicho'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre propio del pacto, en lugar de sustituirlo por un título.'
- source_word: אֶל בֵּית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - a Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: '''Casa de Israel'' conserva la expresión formal del hebreo y su tono corporativo-covenantal. ''A la casa de Israel'' es la forma más directa y transparente en español.'
- source_word: הַכֹּל
  english_pob_choice: all of it
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo eso
  - el todo
  lexicon: HALOT
  rationale: Como resumén totalizador, 'todo' es la opción más natural en español y remite al conjunto de lo previamente dicho. El referente está claro por el contexto y la primera cláusula.
- source_word: בָּא
  english_pob_choice: came to pass
  chosen_spanish: se cumplió
  alternatives_spanish:
  - vino a pasar
  - aconteció
  - llegó a pasar
  lexicon: HALOT
  rationale: En este contexto, el verbo final expresa realización efectiva de lo dicho por Yahvé. 'Se cumplió' comunica con precisión el resultado sin perder el vínculo con la idea de llegada/ocurrencia del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה en un pasaje de cumplimiento de la palabra divina
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el proyecto pide 'Yahvé' como forma principal para preservar el nombre del pacto y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre 'palabra' y la lectura interpretativa 'promesa'
  english_pob_reading: word
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - promesa
  rationale: La repetición de דָּבָר y el verbo 'habló' sostienen 'palabra' como traducción principal. 'Promesa' capta bien el sentido teológico del cumplimiento, pero se reserva como alternativa porque introduce una inferencia más explícita que el hebreo no formula de modo directo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se encontraron cambios sustanciales en la lectura base. La decisión principal en español fue mantener la repetición de 'palabra'/'hablado' y la imagen verbal de 'cayó', dejando 'promesa' como alternativa documentada, tal como el audio textual inglés preserva esa tensión léxica.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se prefirió 'palabra' en lugar de 'promesa' para conservar la repetición de דָּבָר.
  - '''Se cumplió'' comunica el resultado de בָּא en contexto de realización de lo hablado.'
  - El estilo es sobrio y publicable, con sintaxis natural en español latinoamericano.
