translation:
  language: es
  text: Llamando desde el oriente a un ave de presa, desde una tierra lejana al hombre de mi propósito[a]. Sí, he hablado; sí, haré que se cumpla. Lo he formado; sí[b], lo haré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al hombre de mi consejo».
    reason: lexical_alternative
  - marker: b
    text: La figura llamada desde el oriente suele entenderse en el contexto amplio como Ciro, pero aquí no se nombra explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: קֹרֵא
  english_pob_choice: calling
  chosen_spanish: al que llama
  alternatives_spanish:
  - llamando
  - el que llama
  lexicon: HALOT
  rationale: El participio qal funciona aquí de manera verbal/descriptiva, por lo que «al que llama» mantiene la referencia participial sin forzar una perífrasis más dura en español.
- source_word: מִמִּזְרָח
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - desde el este
  - desde el lugar del nacimiento del sol
  lexicon: HALOT
  rationale: «Oriente» es una opción natural y digna en español bíblico para מִזְרָח, y conserva la referencia geográfica sin sonar mecánica.
- source_word: עַיִט
  english_pob_choice: a bird of prey
  chosen_spanish: un ave de presa
  alternatives_spanish:
  - un ave rapaz
  - un pájaro de presa
  lexicon: HALOT
  rationale: El sustantivo designa un ave depredadora en general, no una especie concreta; «ave de presa» conserva esa amplitud y evita especificar indebidamente.
- source_word: מֵאֶרֶץ מֶרְחָק
  english_pob_choice: from a distant land
  chosen_spanish: desde una tierra lejana
  alternatives_spanish:
  - desde un país lejano
  - desde una tierra distante
  lexicon: HALOT
  rationale: La expresión idiomática señala lejanía geográfica; «tierra lejana» es claro y fluido en español sin perder el énfasis espacial.
- source_word: אִישׁ עֲצָתוֹ
  english_pob_choice: the man of my purpose
  chosen_spanish: al hombre de mi propósito
  alternatives_spanish:
  - al hombre de mi consejo
  - al hombre que ejecuta mi plan
  lexicon: HALOT
  rationale: «Propósito» comunica bien la fuerza de עֵצָה como plan/intención. Mantengo la ambigüedad del hebreo sin nombrar al agente en la línea principal.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - en verdad
  - además
  lexicon: HALOT
  rationale: Aquí אַף intensifica y confirma la cláusula siguiente; «sí» reproduce brevemente ese valor enfático en español dentro de una secuencia retórica.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: yo he hablado
  alternatives_spanish:
  - hablé
  - yo hablé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un dicho ya emitido con vigencia actual; el pretérito perfecto compuesto español preserva bien esa fuerza.
- source_word: אֲבִיאֶנָּה
  english_pob_choice: I will bring it to pass
  chosen_spanish: yo lo haré venir a cumplimiento
  alternatives_spanish:
  - yo lo cumpliré
  - yo lo haré acontecer
  lexicon: HALOT
  rationale: La terminación femenina se refiere al dicho/propósito implícito; «hacer venir a cumplimiento» transmite el sentido causativo de realización sin perder solemnidad.
- source_word: יָצַרְתִּי
  english_pob_choice: I have formed it
  chosen_spanish: yo lo he formado
  alternatives_spanish:
  - yo lo he modelado
  - yo lo he determinado
  lexicon: HALOT
  rationale: «Formar» conserva la metáfora concreta del verbo y, en contexto profético, sugiere también preparación intencional.
- source_word: אֶעֱשֶׂנָּה
  english_pob_choice: I will do it
  chosen_spanish: yo lo haré
  alternatives_spanish:
  - yo lo llevaré a cabo
  - yo lo haré
  lexicon: HALOT
  rationale: En español, «hacerlo»/«lo haré» puede sonar más natural que repetir «hacerlo» tras «formar»; el referente sigue siendo el propósito o la obra implícita.
theological_decisions:
- issue: Identidad de la figura llamada desde el oriente
  english_pob_reading: Render the imagery directly without identifying the figure in the main text.
  chosen_spanish_reading: Conservar la imagen sin nombrar explícitamente al personaje en el cuerpo del versículo.
  alternative_spanish_readings:
  - Identificarlo como Ciro en la traducción principal
  - Explicitar que es un instrumento del juicio o del propósito divino
  rationale: El hebreo presenta una imagen y no nombra al personaje; la traducción principal debe dejar abierta la identificación interpretativa, como hace el POB en inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente de los sufijos femeninos en las cláusulas finales
  english_pob_reading: Use impersonal 'it' referring to God's spoken purpose/plan.
  chosen_spanish_reading: Usar «lo» para referirse al propósito o dicho divino implícito.
  alternative_spanish_readings:
  - usar «la» si se toma como referencia a una palabra o intención implícita de género femenino
  - hacer que el sufijo apunte al hombre llamado desde lejos
  rationale: En español, el clítico masculino singular «lo» es la mejor solución funcional para una entidad implícita no marcada y evita adjudicar el sufijo al varón mencionado antes.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios tras la revisión; la presente redacción española sigue esa línea estable y conserva la misma resolución interpretativa básica, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino explícito; en este versículo no aparece, así que no se introduce.
  - Se evita «Mesías/Cristo» porque el pasaje no contiene ese título.
  - Se conserva la tensión entre imagen y posible identificación histórica del agente, sin resolverla en la línea principal.
  - Se usa «propósito» para עֲצָה conforme a la decisión inglesa, sin sustituirlo por «consejo» en el texto principal.
  - Se prefieren pronombres clíticos de objeto directos («lo») para las formas causativas finales, por claridad y fluidez en español.
