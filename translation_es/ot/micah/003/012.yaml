translation:
  language: es
  text: Por tanto, por causa de ustedes, Sion será arada como un campo, y Jerusalén se convertirá en ruinas, y el monte de la casa[a] se convertirá en alturas boscosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''el monte del templo'' o ''la montaña del templo''. Hebreo: ''el monte de la casa''.'
    reason: lexical_alternative
  - marker: b
    text: O 'alturas de bosque' / 'alturas del bosque'. El hebreo probablemente describe el monte del templo volviéndose agreste y cubierto de vegetación.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Conserva la fuerza inferencial y judicial del adverbio profético sin volver el registro coloquial. 'Por tanto' suena natural en español bíblico moderno y mantiene la consecuencia del juicio.
- source_word: בִּגְלַלְכֶם
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - a causa de ustedes
  - por ustedes
  lexicon: HALOT
  rationale: Expresa con claridad la imputación causal a los destinatarios. 'Por causa de ustedes' preserva el señalamiento directo y evita suavizar la acusación.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en transliteración española estándar. 'Sion' es la forma más reconocible y asentada en español bíblico.
- source_word: שָׂדֶה
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - terreno
  - labrantío
  lexicon: HALOT
  rationale: '''Campo'' comunica con naturalidad la imagen agrícola del versículo. Conserva el contraste entre la ciudad y el terreno labrado.'
- source_word: תֵחָרֵשׁ
  english_pob_choice: will be plowed
  chosen_spanish: será arada
  alternatives_spanish:
  - será labrada
  - será removida
  lexicon: HALOT
  rationale: La pasiva del nifal se expresa con 'será arada', que reproduce la imagen agrícola de forma directa y clara en español.
- source_word: וִירוּשָׁלִַם
  english_pob_choice: and Jerusalem
  chosen_spanish: y Jerusalén
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar; la conjunción mantiene la secuencia acumulativa del oráculo.
- source_word: עִיִּין
  english_pob_choice: ruins
  chosen_spanish: ruinas
  alternatives_spanish:
  - montones de ruinas
  - escombros
  lexicon: HALOT
  rationale: El plural hebreo se entiende bien como estado de desolación. 'Ruinas' es la opción más clara y sobria en español.
- source_word: תִּהְיֶה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: '''Se convertirá'' transmite la transformación profetizada mejor que un simple ''será'', sin perder el carácter futuro.'
- source_word: וְהַר הַבַּיִת
  english_pob_choice: the mountain of the house
  chosen_spanish: el monte de la casa
  alternatives_spanish:
  - el monte del templo
  - el monte del santuario
  lexicon: HALOT
  rationale: Se conserva la literalidad de 'la casa' como designación del templo, tal como hizo la POB inglesa. 'Monte' evita una formulación más técnica y mantiene la conexión con el texto hebreo.
- source_word: לְבָמוֹת
  english_pob_choice: wooded heights
  chosen_spanish: alturas boscosas
  alternatives_spanish:
  - alturas de bosque
  - altos boscosos
  lexicon: HALOT
  rationale: La frase busca reflejar el resultado de desolación y maleza, no solo el sentido cultual de 'lugares altos'. 'Alturas boscosas' conserva la imagen topográfica y el matiz de sobrecrecimiento.
- source_word: יָעַר
  english_pob_choice: wooded
  chosen_spanish: boscosas
  alternatives_spanish:
  - forestales
  - cubiertas de bosque
  lexicon: HALOT
  rationale: '''Boscosas'' es el adjetivo natural para comunicar la idea de ''wooded'' sin volver la frase pesada. Mantiene la imagen de un lugar invadido por vegetación.'
theological_decisions:
- issue: Cómo traducir הַבַּיִת en la expresión del monte relacionado con el templo
  english_pob_reading: Retain the more literal 'the house' within 'the mountain of the house'
  chosen_spanish_reading: Conservar 'la casa' en 'el monte de la casa'
  alternative_spanish_readings:
  - el monte del templo
  - el monte del santuario
  rationale: El hebreo dice literalmente 'la casa', un modo habitual de referirse al templo. Mantener esa forma preserva la dicción profética y evita interpretar de antemano el referente en el texto principal, aunque el sentido sea claro.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo entender לְבָמוֹת en un contexto de juicio y desolación
  english_pob_reading: Render as 'wooded heights' in context
  chosen_spanish_reading: Traducir como 'alturas boscosas'
  alternative_spanish_readings:
  - lugares altos
  - alturas de bosque
  rationale: En este contexto, la imagen apunta al monte del templo convertido en terreno agreste y cubierto de vegetación. 'Alturas boscosas' conserva el giro topográfico sin cargar innecesariamente el término con un sentido cultual que el contexto aquí no exige.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; esta propuesta sigue esa línea de alta concordancia con el original y con la POB inglesa, manteniendo la literalidad donde el hebreo lo exige y una equivalencia óptima donde el español necesita fluidez.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la serie, pero en este versículo no aparece el tetragrámaton.
  - '''Sion'' y ''Jerusalén'' se transliteran de forma estándar en español.'
  - Se conserva la imagen agrícola y topográfica sin reemplazar 'la casa' por 'templo' en el texto principal.
  - '''Ruinas'' refleja el plural hebreo sin forzar una pluralidad perifrástica en español.'
