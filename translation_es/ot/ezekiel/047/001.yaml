translation:
  language: es
  text: Entonces me hizo volver a la entrada de la casa[a], y he aquí, agua salía de debajo del umbral de la casa hacia el oriente, porque el frente de la casa daba al oriente; y el agua descendía de debajo del lado derecho de la casa[b], al sur del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el templo' para 'la casa'; el hebreo dice literalmente 'la casa', refiriéndose al edificio del templo en la visión de Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''de debajo del hombro de la casa, el lado derecho''; ''hombro'' es un modismo para el costado de una estructura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשִׁבֵנִי
  english_pob_choice: Then he brought me back
  chosen_spanish: Entonces me hizo volver
  alternatives_spanish:
  - Entonces me llevó de regreso
  - Entonces me trajo de vuelta
  lexicon: HALOT
  rationale: 'El verbo en hifil expresa acción causativa: no solo ''volví'', sino ''me hizo volver''. ''Me hizo volver'' preserva esa causatividad con español natural y digno.'
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - entrada
  - portal
  - umbral
  lexicon: HALOT
  rationale: '''פֶּתַח'' designa la abertura o acceso. ''Entrada'' es claro y natural; ''umbral'' se reserva para ''מִפְתָּן'' más abajo.'
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la casa'. En la visión de Ezequiel se refiere al templo, pero el texto fuente conserva el término genérico; por eso se mantiene 'la casa' en el cuerpo principal.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y vi que
  alternatives_spanish:
  - y he aquí
  - y he aquí que
  lexicon: HALOT
  rationale: '''Y he aquí'' reproduce el efecto deíctico, pero en español moderno puede sonar forzado. ''Y vi que'' comunica la misma función narrativa de descubrimiento sin perder solemnidad.'
- source_word: מַיִם יֹצְאִים
  english_pob_choice: water was coming out
  chosen_spanish: aguas salían
  alternatives_spanish:
  - agua salía
  - aguas brotaban
  - agua brotaba
  lexicon: HALOT
  rationale: '''מַיִם'' es formalmente plural; ''aguas'' conserva mejor ese rasgo y el tono poético del pasaje. ''Salían'' refleja el participio de acción en curso.'
- source_word: מִתַּחַת מִפְתַּן
  english_pob_choice: from under the threshold
  chosen_spanish: de debajo del umbral
  alternatives_spanish:
  - desde debajo del umbral
  - de bajo el umbral
  lexicon: HALOT
  rationale: '''מִפְתָּן'' es ''umbral'' o ''dintel bajo/solera de entrada'' según contexto. ''De debajo del umbral'' es fiel y transparente.'
- source_word: קָדִימָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: '''Oriente'' es un equivalente natural y bíblicamente estable en español; mantiene la orientación direccional del adverbio.'
- source_word: כִּי פְנֵי הַבַּיִת קָדִים
  english_pob_choice: because the front of the house faced east
  chosen_spanish: porque la fachada de la casa daba al oriente
  alternatives_spanish:
  - porque el frente de la casa miraba al oriente
  - pues la parte delantera de la casa estaba al oriente
  lexicon: HALOT
  rationale: '''פנים'' aquí funciona como ''frente/fachada''. ''Daba al oriente'' comunica la orientación arquitectónica con fluidez en español.'
- source_word: יֹרְדִים
  english_pob_choice: was flowing down
  chosen_spanish: descendían
  alternatives_spanish:
  - bajaban
  - fluían hacia abajo
  lexicon: HALOT
  rationale: Para agua, 'descendían' conserva la dirección vertical del hebreo y evita la redundancia de una frase demasiado explicativa.
- source_word: מִכֶּתֶף הַבַּיִת הַיְמָנִית
  english_pob_choice: from under the right side of the house
  chosen_spanish: desde debajo del lado derecho de la casa
  alternatives_spanish:
  - desde debajo del costado derecho de la casa
  - desde debajo del flanco derecho de la casa
  lexicon: HALOT
  rationale: '''כָּתֵף'' literalmente es ''hombro'', pero en arquitectura/topografía designa el costado. ''Lado derecho'' comunica el sentido espacial sin introducir una metáfora corporal que aquí sería oscura.'
- source_word: מִנֶּגֶב לַמִּזְבֵּחַ
  english_pob_choice: from south of the altar
  chosen_spanish: desde el sur del altar
  alternatives_spanish:
  - al sur del altar
  - desde el lado sur del altar
  lexicon: HALOT
  rationale: '''נֶגֶב'' expresa dirección geográfica. ''Desde el sur del altar'' mantiene la relación espacial y el matiz de procedencia del flujo.'
theological_decisions:
- issue: Referencia a la 'casa' en la visión del templo
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa (entendida como el templo)
  rationale: Se preserva el término literal del hebreo, tal como hace la POB inglesa. Aunque el referente es el templo visionario, traducir directamente 'el templo' adelantaría una interpretación que el texto no formula en esa palabra.
  doctrine_reference: Fidelidad semántica al texto base; evitar interpretive overtranslation.
- issue: Dirección compuesta del agua respecto al altar y al lado derecho
  english_pob_reading: from under the right side of the house, from south of the altar
  chosen_spanish_reading: desde debajo del lado derecho de la casa, desde el sur del altar
  alternative_spanish_readings:
  - desde debajo del lado sur de la casa, al sur del altar
  - desde debajo del costado derecho de la casa, al sur del altar
  rationale: El hebreo distingue entre el costado derecho de la casa y la ubicación al sur del altar. Mantener ambas expresiones evita mezclar dos indicaciones espaciales distintas y conserva la tensión lexical que la POB inglesa también mantiene.
  doctrine_reference: Precisión espacial del texto profético; distinción entre lado derecho y orientación sur.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditor inglés: se mantiene la distinción entre ''right side'' y ''south of the altar'', evitando mezclar ambos elementos en una sola frase. También se conserva el valor deíctico de וְהִנֵּה con una solución española natural y se respeta el carácter literal de ''la casa''.'
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; no hay ajuste terminológico necesario para el nombre divino.'
  - Se eligió 'la casa' en el texto principal, con nota para 'el templo', siguiendo el patrón POB de no interpretar más de lo que el hebreo dice literalmente.
  - '''Oriente'' y ''sur'' mantienen un registro bíblico claro y evitan la ambigüedad de ''este''/''derecha'' sin explicación contextual.'
