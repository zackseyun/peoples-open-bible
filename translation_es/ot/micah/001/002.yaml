    issue: La expresión 'pueblos todos' suena invertida y algo acartonada en español contemporáneo.
    rationale: Aunque reproduce el énfasis hebreo, 'todos los pueblos' comunica el mismo sentido con mejor naturalidad y legibilidad eclesial amplia.
  - severity: low
