    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido «ídolos» es fuertemente peyorativo y puede tener el sentido de algo inmundo o despreciable.
    reason: lexical_alternative
  revision_rationale: La revisión restituye la distinción auditada entre «imágenes» y «ídolos», elimina la interpretación añadida de «falsos dioses», añade la nota sobre Merodac/Marduk presente en la auditoría inglesa, y mejora la naturalidad española de חַת / חַתּוּ con «está/están consternado(s)». Se mantienen Bel y Merodac como transliteraciones y el resto de la estructura proclamatoria del hebreo.
