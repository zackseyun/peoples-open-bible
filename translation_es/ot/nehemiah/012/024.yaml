base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/024.yaml
  text: And the heads of the Levites were Hashabiah[a], Sherebiah, and Jeshua son of Kadmiel, with their brothers opposite them, to praise and to give thanks according to the command of David the man of God[b], watch corresponding to watch.
  footnotes:
