translation:
  language: es
  text: Y partió él mismo y toda su fuerza[a] en marcha, para ir delante del rey Nabucodonosor y cubrir toda la faz de la tierra[b] hacia el occidente, con sus carros, sus jinetes y sus soldados de a pie escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todo su ejército”. El griego δύναμις puede significar “fuerza” o “poder”, pero aquí el contexto militar favorece el sentido de fuerza armada.
    reason: lexical_alternative
  - marker: b
    text: O “del país”. El griego γῆ puede significar “tierra” o “país/territorio”; aquí “país” encaja bien con el contexto de una campaña militar hacia el occidente, aunque se conserva “tierra” en el texto por la imagen de “la faz de la tierra”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió de campaña
  lexicon: BDAG
  rationale: El griego literalmente significa “salió”, y en este contexto militar introduce el inicio de una expedición. “Salió” mantiene la base verbal sin sobreinterpretar; el contexto de marcha ya da el matiz de campaña.
- source_word: πᾶσα ἡ δύναμις αὐτοῦ
  english_pob_choice: all his force
  chosen_spanish: toda su fuerza
  alternatives_spanish:
  - todo su ejército
  - todo su poder
  lexicon: BDAG
  rationale: δύναμις puede ser “poder” o “fuerza”, pero aquí el entorno bélico favorece una referencia militar. “Fuerza” conserva amplitud y evita reducirlo a “ejército”, que estrecha un poco más el sentido.
- source_word: εἰς πορείαν
  english_pob_choice: on the march
  chosen_spanish: en marcha
  alternatives_spanish:
  - para marchar
  - en campaña
  lexicon: LSJ
  rationale: La expresión señala desplazamiento militar. “En marcha” es natural en español y conserva la imagen idiomática de un ejército que se pone en movimiento.
- source_word: τοῦ προελθεῖν
  english_pob_choice: to go before
  chosen_spanish: para ir delante
  alternatives_spanish:
  - para preceder
  - para avanzar delante
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. “Ir delante” reproduce con claridad el valor de προελθεῖν sin cargarlo con una explicación interpretativa adicional.
- source_word: καλύψαι πᾶν τὸ πρόσωπον τῆς γῆς
  english_pob_choice: to cover the whole face of the land
  chosen_spanish: cubrir toda la faz de la tierra
  alternatives_spanish:
  - cubrir toda la superficie de la tierra
  - cubrir toda la faz del país
  lexicon: LSJ
  rationale: “Faz” preserva la imagen del rostro/superficie del griego πρόσωπον, y “tierra” mantiene abierta la posibilidad semántica de γῆ. Se conserva así la tensión entre “tierra” y “territorio” que el POB inglés anotó.
- source_word: πρὸς δυσμαῖς
  english_pob_choice: toward the west
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - occidentalmente
  lexicon: LSJ
  rationale: El griego indica dirección. “Occidente” es claro, digno y fiel; evita la redundancia de una perífrasis demasiado moderna sin perder naturalidad.
- source_word: ἅρμασι
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: BDAG
  rationale: En español bíblico “carros” es el término más transparente y natural para ἅρματα. Se evita añadir “de guerra” porque el contexto ya es marcadamente militar.
- source_word: ἱππεῦσι
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - soldados montados
  lexicon: BDAG
  rationale: ἱππεῖς son combatientes a caballo. “Jinetes” es fiel y entendido en español, y preserva la imagen concreta mejor que el colectivo “caballería”.
- source_word: πεζοῖς ἐπιλέκτοις
  english_pob_choice: chosen foot soldiers
  chosen_spanish: escogidos soldados de a pie
  alternatives_spanish:
  - infantería escogida
  - soldados de a pie selectos
  lexicon: BDAG
  rationale: πεζοῖς pide un referente de infantería o tropas a pie, y ἐπιλέκτοις añade la idea de seleccionados. “Escogidos soldados de a pie” conserva ambos componentes sin importar un tecnicismo militar moderno.
translation_notes:
  revision_awareness: Se siguió el último estado de revisión indicado como sin cambios necesarios; el borrador español refleja la lectura aprobada del texto griego sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantuvo Yahvé/Jesús/Mesías según el estándar del proyecto, aunque este versículo no contiene esos términos.
  - Se evitó “SEÑOR” porque el versículo no contiene el tetragrámaton ni un κύριος con función divina.
  - Se prefirió “jinetes” y “soldados de a pie” por transparencia léxica y legibilidad eclesial en español.
  - La tensión semántica de γῆ se preservó en nota, no en una paráfrasis interpretativa del texto principal.
