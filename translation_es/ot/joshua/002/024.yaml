translation:
  language: es
  text: 'Y le dijeron a Josué: «Yahvé ha entregado toda la tierra en nuestras manos, y de hecho todos los habitantes de la tierra se han derretido[a] delante de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han perdido el ánimo» o «se han deshecho». El hebreo conserva la imagen de que el valor se derrite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y les dijeron
  alternatives_spanish:
  - Entonces les dijeron
  - Y dijeron
  lexicon: HALOT
  rationale: El waw narrativo se vierte naturalmente con «y» en español para conservar el hilo narrativo sin forzar una secuencia temporal explícita. «Les dijeron» expresa con claridad el destinatario en contexto (Josué).
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural con «a» en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: standard proper name convention
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: כִּי
  english_pob_choice: that / as statement content
  chosen_spanish: que
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo dicho, por lo que «que» es la solución más natural y fiel al valor subordinante básico sin añadir énfasis no exigido.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: ha entregado
  alternatives_spanish:
  - ha dado
  - entregó
  lexicon: HALOT
  rationale: En el contexto idiomático «dar en la mano» implica entregar o poner bajo control. «Ha entregado» conserva esa fuerza de cesión y su matiz de acción divina completada con relevancia presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: Tetragrammaton convention
  rationale: Se preserva el nombre divino como «Yahvé», conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: בְּיָדֵנוּ
  english_pob_choice: into our hands
  chosen_spanish: en nuestras manos
  alternatives_spanish:
  - en nuestras manos
  - bajo nuestro poder
  lexicon: HALOT
  rationale: La imagen concreta de posesión/control se mantiene con «en nuestras manos», una fórmula idiomática en español que conserva la metáfora hebrea sin volverla abstracta.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la región
  lexicon: HALOT
  rationale: Se mantiene la amplitud del hebreo sin especificar más allá del texto. «Tierra» reproduce bien el referente territorial del pasaje.
- source_word: וְגַם
  english_pob_choice: and indeed
  chosen_spanish: y, de hecho,
  alternatives_spanish:
  - y, de hecho,
  - y además
  - y también
  lexicon: HALOT
  rationale: La construcción añade énfasis al segundo miembro; «de hecho» conserva la intensificación sin exagerarla.
- source_word: נָמֹגוּ
  english_pob_choice: have melted away
  chosen_spanish: se han derretido[a]
  alternatives_spanish:
  - se han derretido
  - han perdido el ánimo
  - se han deshecho
  lexicon: HALOT
  rationale: Se preserva la metáfora corporal de «derretirse» para no perder la imagen verbal hebrea. Se añade una nota porque el sentido figurado apunta a abatimiento o pérdida de valor, no a derretimiento literal.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes de la tierra
  - los moradores de la tierra
  lexicon: HALOT
  rationale: La expresión constructa se vierte con un sustantivo natural en español. Se repite «toda/todos» para reflejar el énfasis totalizador del hebreo.
- source_word: מִפָּנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - delante de nosotros
  - ante nuestra presencia
  lexicon: HALOT
  rationale: «Delante de nosotros» comunica la presencia amenazante o la retirada ante ellos, manteniendo la relación espacial del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se conserva el nombre propio del pacto en vez de ocultarlo tras un título. Esto sigue la política del proyecto para el Tetragrammaton y evita una sustitución tradicional menos transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de 'all the land'
  english_pob_reading: all the land
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra
  - toda la región
  rationale: No se añade explícitamente 'Canaán' para no sobre-especificar lo que el hebreo no dice. El contexto narrativo define el alcance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
- issue: Metáfora de נָמֹגוּ
  english_pob_reading: have melted away
  chosen_spanish_reading: se han derretido
  alternative_spanish_readings:
  - han perdido el ánimo
  - se han deshecho
  rationale: Se mantiene la imagen metafórica, como en el inglés POB, para no borrar la tensión entre literalidad e interpretación figurada. La nota aclara el sentido figurado sin sustituirlo en el texto principal.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tension'
translation_notes:
  revision_awareness: El inglés POB pasó de 'Surely the LORD has given...' a 'The LORD has given...' para no forzar un énfasis no requerido por כִּי. En español, esa economía se refleja con «que» como introductor del discurso reportado, sin añadir adverbios de énfasis extra. También se preservó la metáfora de נָמֹגוּ en lugar de neutralizarla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'Josué' como forma española establecida del nombre propio.
  - Se conserva la metáfora de 'derretirse' para נָמֹגוּ con nota explicativa, siguiendo la línea del POB inglés.
  - No se introduce 'Señor' ni otras sustituciones litúrgicas.
  - La frase 'en nuestras manos' conserva el idiom hebreo de control/posesión, aunque el inglés POB use 'into our hands'.
