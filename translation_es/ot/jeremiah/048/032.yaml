translation:
  language: es
  text: Con el llanto de Jazer lloro por ti[a], vid de Sibma; tus sarmientos[b] cruzaron el mar; llegaron hasta Jazer[c]. Sobre tu fruto de verano y sobre tu vendimia ha caído el destructor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Más que el llanto de Jazer lloro por ti»; la preposición inicial puede tener matiz comparativo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tus brotes» o «tus sarmientos». Se eligió el término vitícola más preciso para el contexto.'
    reason: lexical_alternative
  - marker: c
    text: La revisión auditada entiende que el segundo nombre es Jazer, no «el mar de Jazer».
    reason: textual_variant
lexical_decisions:
- source_word: מִבְּכִי
  english_pob_choice: With the weeping of
  chosen_spanish: Con el llanto de
  alternatives_spanish:
  - Más que el llanto de
  - Desde el llanto de
  lexicon: HALOT
  rationale: El prefijo מִ con בְּכִי admite una relación comparativa o asociativa difícil. «Con el llanto de» conserva la unión poética con Jazer sin decidir de modo excesivo la fuerza comparativa, y suena natural en español.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Yazer
  lexicon: Nombre propio
  rationale: Es un topónimo; se translitera para mantener la referencia geográfica del texto fuente.
- source_word: אֶבְכֶּה לָּךְ
  english_pob_choice: I weep for you
  chosen_spanish: lloro por ti
  alternatives_spanish:
  - lloraré por ti
  - me lamento por ti
  lexicon: HALOT
  rationale: El imperfecto hebreo puede tener fuerza modal o futura, pero en un lamento poético el presente español expresa mejor la acción de duelo del hablante. «Por ti» refleja el valor de לְ como objeto de lamentación.
- source_word: הַגֶּפֶן שִׂבְמָה
  english_pob_choice: vine of Sibmah
  chosen_spanish: vid de Sibma
  alternatives_spanish:
  - vid de Sibmah
  - la vid de Sibma
  - oh vid de Sibma
  lexicon: HALOT
  rationale: El hebreo usa una imagen vitícola en vocativo/aposición. «Vid» es natural y fiel; se omite el artículo para conservar el tono de invocación poética sin perder la imagen.
- source_word: נְטִישֹׁתַיִךְ
  english_pob_choice: your branches
  chosen_spanish: tus sarmientos
  alternatives_spanish:
  - tus ramas
  - tus brotes
  - tus pámpanos
  lexicon: HALOT
  rationale: El término describe los retoños o extensiones de la vid. «Sarmientos» mantiene con precisión la metáfora vitícola y es más específico que «ramas»; «brotes» o «pámpanos» también son posibles, pero menos precisos según el contexto.
- source_word: עָבְרוּ יָם
  english_pob_choice: crossed the sea
  chosen_spanish: cruzaron el mar
  alternatives_spanish:
  - cruzaron el mar abierto
  - pasaron el mar
  lexicon: HALOT
  rationale: El hebreo presenta la expansión de la vid más allá de lo normal. «Cruzar el mar» conserva la imagen de sobrepasar límites geográficos de forma concisa y poética.
- source_word: עַד יָם יַעְזֵר נָגָעוּ
  english_pob_choice: they reached as far as Jazer
  chosen_spanish: llegaron hasta Jazer
  alternatives_spanish:
  - llegaron hasta el mar de Jazer
  - alcanzaron hasta Jazer
  lexicon: HALOT
  rationale: La revisión inglesa reciente entiende que el segundo יַעְזֵר es el topónimo, no «mar de Jazer». En español, «llegaron hasta Jazer» refleja esa decisión revisada y evita introducir una construcción no sustentada por la forma hebrea recibida.
- source_word: קֵיצֵךְ
  english_pob_choice: summer fruit
  chosen_spanish: tu fruto de verano
  alternatives_spanish:
  - tu fruta de verano
  - tu cosecha de verano
  - tu fruto estival
  lexicon: HALOT
  rationale: קֵיץ alude al fruto/verano maduro de temporada. «Fruto de verano» mantiene la imagen agrícola con un español claro y digno.
- source_word: בְּצִירֵךְ
  english_pob_choice: grape harvest
  chosen_spanish: tu vendimia
  alternatives_spanish:
  - tu cosecha de uvas
  - tu cosecha
  - tu vendimia de uvas
  lexicon: HALOT
  rationale: El término se refiere específicamente a la recolección de uvas. «Vendimia» es el equivalente más preciso y natural en español para este contexto vitícola.
- source_word: שֹׁדֵד
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el devastador
  - el saqueador
  - el asolador
  lexicon: HALOT
  rationale: El participio designa al agente de ruina y devastación. «Destructor» comunica el juicio con claridad; «devastador» o «asolador» son cercanos, pero «destructor» funciona bien en español contemporáneo sin perder fuerza.
- source_word: נָפָל
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - ha descendido
  - ha venido sobre
  - ha recaído
  lexicon: HALOT
  rationale: Con עַל, el verbo expresa la irrupción súbita de calamidad sobre la cosecha. «Ha caído» conserva la metáfora de una desgracia que desciende sobre el fruto.
theological_decisions:
- issue: Lectura difícil de מִבְּכִי יַעְזֵר
  english_pob_reading: With the weeping of Jazer I weep for you
  chosen_spanish_reading: Con el llanto de Jazer lloro por ti
  alternative_spanish_readings:
  - Más que el llanto de Jazer lloro por ti
  - Desde el llanto de Jazer lloro por ti
  rationale: 'Se preserva la ambigüedad reconocida por el POB inglés: puede ser comparativa o asociativa. La forma española elegida no decide la comparación de manera explícita y mantiene la tensión poética del hebreo.'
  doctrine_reference: Translation philosophy §1, §3
- issue: ¿Emendar o mantener la imagen de la expansión hasta Jazer?
  english_pob_reading: they reached as far as Jazer
  chosen_spanish_reading: llegaron hasta Jazer
  alternative_spanish_readings:
  - llegaron hasta el mar de Jazer
  - se extendieron hasta Jazer
  rationale: Se sigue la revisión inglesa más reciente que corrige la frase para reflejar el texto hebreo de manera más exacta. No se introduce «mar de Jazer» en el texto principal porque la revisión auditada lo descarta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada más reciente del inglés POB: la segunda ocurrencia de יַעְזֵר se entiende como el topónimo Jazer y no como «mar de Jazer». También se preservó la ambigüedad inicial de מִבְּכִי con una formulación española que no la resuelve de forma excesiva.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto para el nombre divino, aunque este versículo no lo contiene.
  - Se usó «vid/vendimia/sarmientos» para conservar el campo semántico vitícola del hebreo.
  - «Destructor» se mantuvo para שֹׁדֵד siguiendo el valor de agente de ruina del contexto de juicio.
