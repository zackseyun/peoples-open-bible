translation:
  language: es
  text: Solo las mujeres, los niños pequeños, el ganado y todo lo que haya en la ciudad—todo su botín—podrás tomar como botín para ti; y podrás comer[a] el botín de tus enemigos, que Yahvé tu Dios te ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «podrás aprovechar el botín de tus enemigos». El verbo hebreo es literalmente «comer» y puede extenderse a usar o consumir lo que se toma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  lexicon: HALOT
  rationale: Marca una excepción restrictiva respecto de la instrucción previa. 'Solo' es natural en español y conserva el valor limitativo de רַק.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - las féminas
  lexicon: HALOT
  rationale: El sustantivo apunta de forma directa a mujeres; 'las mujeres' es la equivalencia más clara y no introduce una relación matrimonial que el hebreo no exige.
- source_word: הַטַּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los dependientes
  lexicon: HALOT
  rationale: טַף suele referirse a los pequeños o dependientes. 'Niños pequeños' preserva mejor la idea de edad temprana que el más general 'niños'.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - las reses
  lexicon: HALOT
  rationale: En un contexto de botín de guerra, la referencia es a animales domesticados como propiedad. 'Ganado' es natural en español y mantiene ese valor colectivo.
- source_word: וְכֹל אֲשֶׁר יִהְיֶה בָעִיר
  english_pob_choice: and everything that is in the city
  chosen_spanish: y todo lo que haya en la ciudad
  alternatives_spanish:
  - y todo lo que esté en la ciudad
  - y todo lo que hubiera en la ciudad
  lexicon: HALOT
  rationale: La expresión abarca de manera totalizante todo lo presente en la ciudad. 'Lo que haya' conserva la amplitud y suena natural en español.
- source_word: כָּל שְׁלָלָהּ
  english_pob_choice: all its spoil
  chosen_spanish: todo su botín
  alternatives_spanish:
  - todo su despojo
  - todo su saqueo
  lexicon: HALOT
  rationale: שָׁלָל es el botín tomado en guerra. 'Botín' es el equivalente más claro y estable en español, y evita un arcaísmo innecesario.
- source_word: תָּבֹז לָךְ
  english_pob_choice: you may take as plunder for yourself
  chosen_spanish: podrás tomarlo para ti
  alternatives_spanish:
  - podrás saquearlo para ti
  - te será permitido tomarlo como botín
  lexicon: HALOT
  rationale: El verbo expresa tomar como botín/plunder. Dado el antecedente inmediato 'todo su botín', la formulación española puede ser más fluida con 'tomarlo para ti' sin perder la autorización implícita del contexto legal.
- source_word: וְאָכַלְתָּ אֶת שְׁלַל אֹיְבֶיךָ
  english_pob_choice: and you may eat the spoil of your enemies
  chosen_spanish: y comerás el botín de tus enemigos
  alternatives_spanish:
  - y podrás comer el botín de tus enemigos
  - y disfrutarás del botín de tus enemigos
  lexicon: HALOT
  rationale: אָכַל es literalmente 'comer'. Se mantiene 'comerás' para conservar la metáfora hebrea y la instrucción directa, tal como el audit trail inglés retuvo 'eat' por exactitud léxica.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los enemigos tuyos
  - los que te adversan
  lexicon: HALOT
  rationale: Corresponde de manera directa al plural con sufijo de segunda persona. 'Tus enemigos' es claro y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el nombre divino: ''Yahvé''. Así se preserva el Tetragrámaton sin máscara litúrgica.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios personal
  lexicon: HALOT
  rationale: Fórmula pactual directa y estándar; 'tu Dios' conserva la relación de pacto y la segunda persona singular.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֶיךָ לָךְ
  english_pob_choice: which Yahweh your God has given you
  chosen_spanish: que Yahvé tu Dios te ha dado
  alternatives_spanish:
  - que Yahvé tu Dios te dio
  - que Yahvé tu Dios te ha entregado
  lexicon: HALOT
  rationale: El perfecto expresa una dádiva ya otorgada en relación con la instrucción. El presente perfecto español comunica bien ese estado concedido por Dios.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. En español se mantiene la decisión del proyecto de transliterarlo como 'Yahvé', evitando el reemplazo por un título que oculta el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor modal de תָּבֹז y אָכַלְתָּ en una instrucción legal
  english_pob_reading: permissive 'you may' / literal 'eat'
  chosen_spanish_reading: 'futuro injuntivo: ''podrás tomarlo para ti'' / ''comerás el botín'''
  alternative_spanish_readings:
  - podrás saquearlo para ti
  - podrás comer el botín de tus enemigos
  - tomarás para ti
  rationale: El hebreo presenta la acción autorizada en un contexto normativo. En español, la mezcla de 'podrás' con 'comerás' conserva tanto la autorización contextual como la literalidad del verbo אָכַל, sin forzar un mero indicativo narrativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'consume' a 'eat' para acercarse más al verbo hebreo אָכַל. En esta versión española se mantiene 'comerás' para reflejar con precisión esa decisión revisada y, al mismo tiempo, se ajusta 'take as plunder' a una formulación más natural en español sin perder el sentido de botín permitido por el texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se mantiene 'botín' para שָׁלָל por coherencia interna con el campo semántico de guerra y despojo.
  - Se conserva la literalidad de 'comerás' para אָכַל, evitando neutralizar la imagen hebrea.
  - Se emplea 'ganado' para הַבְּהֵמָה por ser un término natural en español para animales domésticos como propiedad.
