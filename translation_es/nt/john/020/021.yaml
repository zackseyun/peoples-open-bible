review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y la auditoría inglesa en la mayoría de los puntos: mantiene la continuación narrativa de οὖν, la repetición de πάλιν, el perfecto de ἀπέσταλκέν con «ha enviado», el título «el Padre», y la comparación de misión sin sobreinterpretarla. También traduce naturalmente πέμπω con presente simple español. Sin embargo, la nota alternativa para Εἰρήνη ὑμῖν no preserva correctamente la alternativa inglesa documentada: «Paz con ustedes» no corresponde bien al valor tradicional «Peace be with you».'
  spanish_quality_summary: 'El texto principal suena claro, natural y digno en español general. «Entonces Jesús les dijo otra vez» y «Como el Padre me ha enviado, así también yo los envío a ustedes» son fluidos y fieles. La única reparación necesaria es la nota al saludo, para que la alternativa tradicional sea idiomática y teológicamente/litúrgicamente reconocible en español: «La paz sea con ustedes» o «Paz sea con ustedes».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «el Padre» y el registro general están alineados. No intervienen aquí términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal a corregir es lexical/estilística en la nota de «Paz».
  issues:
  - severity: medium
    issue: La nota alternativa «Paz con ustedes» no representa adecuadamente la alternativa tradicional documentada.
    rationale: El inglés auditado preserva «Peace be with you» como alternativa más tradicional. En español eclesial y natural, eso se expresa como «La paz sea con ustedes» o «Paz sea con ustedes», no «Paz con ustedes», que suena truncado y menos idiomático.
  revised_spanish_text: 'Entonces Jesús les dijo otra vez[a]: «Paz a ustedes. Como el Padre me ha enviado, así también yo los envío a ustedes».'
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, «La paz sea con ustedes».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y suena natural en español. Solo se corrige la nota para reflejar con precisión la alternativa tradicional documentada en la auditoría inglesa y para usar una formulación española idiomática y ampliamente reconocible.
