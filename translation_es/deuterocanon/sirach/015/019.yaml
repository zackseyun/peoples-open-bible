translation:
  language: es
  text: Los ojos de Dios[a] ven sus obras, y él conoce toda obra de un hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego difiere en la primera cláusula: ''sus ojos están sobre los que le temen'', aunque coincide en el sentido de que Dios conoce plenamente las obras humanas.'
    reason: alternative_reading
  - marker: b
    text: O 'de una persona'. El hebreo dice אִישׁ, forma masculina singular que suele usarse de manera genérica en la literatura sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי / οἱ ὀφθαλμοί
  english_pob_choice: The eyes of
  chosen_spanish: Los ojos de
  alternatives_spanish:
  - La mirada de
  - El ojo de
  lexicon: HALOT; LXX ὀφθαλμοί
  rationale: Conserva la imagen antropomórfica del hebreo y del paralelo griego sin volverla abstracta. En español, el plural 'los ojos de' suena natural y mantiene la fuerza poética del texto sapiencial.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Fuerte
  lexicon: HALOT
  rationale: אֵל aquí funciona como título divino común; 'Dios' es el equivalente más natural y fiel en español. No hay nombre del pacto en el hebreo, así que no corresponde 'Yahvé' ni una sustitución por 'el Señor'.
- source_word: יִרְאוּ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - miran
  - contemplan
  lexicon: HALOT
  rationale: El hebreo expresa ver de manera simple y directa. 'Ven' comunica la acción con naturalidad en español y conserva el sentido inmediato del primer cola.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: Se mantiene el sustantivo de campo semántico concreto ('obras') para preservar el vínculo léxico con מעשה. 'Obras' suena más natural en español bíblico que una repetición pesada de 'hechos'.
- source_word: יַכִּיר
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - reconoce
  - discierne
  lexicon: HALOT
  rationale: Aunque el verbo puede llevar la idea de reconocer o discernir, en este contexto sapiencial 'conoce' es la forma más directa y natural en español. Evita una construcción más dura sin perder la noción de conocimiento pleno.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo y cada
  lexicon: HALOT
  rationale: 'Con un sustantivo singular, ''todo'' reproduce bien el alcance distributivo del hebreo y resulta idiomático en español: ''todo hecho''.'
- source_word: מִפְעַל
  english_pob_choice: deed
  chosen_spanish: hecho
  alternatives_spanish:
  - obra
  - acción
  lexicon: HALOT
  rationale: '''Hecho'' expresa aquello que una persona realiza sin cargar innecesariamente el tono moral de ''deed'' en inglés. Se evita repetir ''obras'' para que el paralelismo español no resulte mecánico.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un ser humano
  lexicon: HALOT
  rationale: Se conserva el masculino singular del hebreo, que en sabiduría funciona de manera representativa. 'De un hombre' refleja la forma del texto fuente y la decisión del POB inglés de no neutralizarla en el cuerpo principal.
theological_decisions:
- issue: Imagen antropomórfica de la percepción divina
  english_pob_reading: Retain 'The eyes of God' literally.
  chosen_spanish_reading: Mantener 'Los ojos de Dios' literalmente.
  alternative_spanish_readings:
  - Dios ve
  - La mirada de Dios
  rationale: El hebreo y el griego usan lenguaje concreto y antropomórfico. Traducirlo literalmente conserva la fuerza poética y evita suavizar el texto con una abstracción innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Masculino genérico en אִישׁ
  english_pob_reading: Render אִישׁ as 'a man' in the main text.
  chosen_spanish_reading: Renderizar אִישׁ como 'un hombre' en el texto principal.
  alternative_spanish_readings:
  - una persona
  - un ser humano
  rationale: La forma hebrea es masculina singular y el POB inglés la conservó. En español, 'de un hombre' mantiene esa huella formal; puede entenderse genéricamente dentro del estilo sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El POB inglés ajustó יַכִּיר de 'recognizes' a 'knows' por naturalidad y directitud; el español sigue ese último criterio con 'conoce'. También se preservó la diferencia entre el hebreo ('sus obras') y la segunda cola ('todo hecho de un hombre'), en lugar de homogeneizar ambas mitades con una sola traducción.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el hebreo no contiene el nombre del pacto, sino אֵל.
  - Se mantuvo el plural concreto 'ojos' para conservar el antropomorfismo poético.
  - '''Obras'' y ''hecho'' se diferenciaron para reflejar la variación léxica del original.'
  - El masculino genérico de אִישׁ se conservó en la línea principal, con alternativa inclusiva en nota.
