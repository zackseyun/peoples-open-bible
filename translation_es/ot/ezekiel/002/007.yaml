translation:
  language: es
  text: Les hablarás mis palabras[a], ya sea que escuchen o que se nieguen, porque son rebeldes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ya sea que oigan o que dejen de atender'. El hebreo contrapone la respuesta con la negativa a prestar atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ
  english_pob_choice: You shall speak
  chosen_spanish: Y hablarás
  alternatives_spanish:
  - Y dirás
  - Y comunicarás
  lexicon: HALOT
  rationale: El verbo דִּבֵּר aquí funciona como mandato profético; el futuro exhortativo español expresa bien la comisión sin volver la frase rígida.
- source_word: אֶת דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi mensaje
  - mis dichos
  lexicon: HALOT
  rationale: Se conserva el plural concreto de דְּבָרַי como 'mis palabras', evitando suavizarlo a una sola idea interpretativa como 'mensaje'.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - para ellos
  lexicon: HALOT
  rationale: La preposición direccional se rinde de manera natural en español con 'a ellos'.
- source_word: אִם יִשְׁמְעוּ וְאִם יֶחְדָּלוּ
  english_pob_choice: whether they listen or whether they refuse
  chosen_spanish: si oyen o si se abstienen
  alternatives_spanish:
  - si escuchan o si dejan de hacerlo
  - si oyen o si rehúsan
  lexicon: HALOT
  rationale: Se mantiene la oposición idiomática hebrea entre responder y dejar de responder. 'Oír' conserva el valor básico de שׁמע, mientras que 'se abstienen' refleja el matiz de יֶחְדָּלוּ como cesar o desistir, sin convertirlo directamente en 'obedecer'.
- source_word: מְרִי הֵמָּה
  english_pob_choice: they are rebellious
  chosen_spanish: son rebeldes
  alternatives_spanish:
  - son rebeldía
  - son gente rebelde
  lexicon: HALOT
  rationale: מְרִי expresa rebeldía/rebeldía; el predicado 'son rebeldes' es idiomático y fiel sin añadir 'casa' que no aparece en este versículo.
theological_decisions:
- issue: Cómo preservar la tensión de שׁמע entre oír, escuchar y obedecer
  english_pob_reading: listen
  chosen_spanish_reading: oyen
  alternative_spanish_readings:
  - escuchan
  - obedecen
  rationale: Como el contraste inmediato es con 'cesar/abstenerse', 'oyen' conserva el sentido básico de percepción auditiva y deja abierta la implicación de respuesta sin resolverla en obediencia explícita.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; este borrador sigue la decisión auditiva del original hebreo y el audit trail inglés, manteniendo la tensión de respuesta/no respuesta.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando aparece el Tetragrámaton, pero este versículo no lo contiene.
  - '''Palabras'' conserva el plural hebreo de דְּבָרַי.'
  - '''Rebeldes'' traduce מְרִי sin expandirlo a ''casa rebelde'', porque aquí no aparece בית/house.'
