translation:
  language: es
  text: Escucha mi clamor[a], oh, Dios; atiende a mi oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi grito resonante» o «mi súplica». El sustantivo hebreo puede designar un clamor fuerte y, en algunos contextos, un grito jubiloso o un canto; aquí, por tratarse de una oración de petición, se prefiere «clamor».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha, por favor
  lexicon: HALOT
  rationale: Es un imperativo directo dirigido a Dios. «Escucha» conserva la metáfora auditiva con naturalidad en español y funciona bien en el lenguaje de oración.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh Dios!
  lexicon: HALOT
  rationale: Es vocativo en dirección directa. En español, «oh Dios» comunica la invocación sin cambiar el sentido.
- source_word: רִנָּתִי
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi canto
  - mi plegaria
  lexicon: HALOT
  rationale: El sustantivo puede abarcar un clamor/clamor resonante, un grito o incluso canto según contexto. Aquí, en paralelo con «mi oración» y dentro de una súplica urgente, «clamor» expresa bien el pedido apremiante sin reducirlo a una sola nota emocional.
- source_word: הַקְשִׁיבָה
  english_pob_choice: listen to
  chosen_spanish: atiende a
  alternatives_spanish:
  - escucha atentamente
  - presta oído a
  - pon atención a
  lexicon: HALOT
  rationale: El verbo pide una atención especial y refuerza el primer imperativo. «Atiende a» conserva esa intensificación de manera natural en español moderno.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi súplica
  lexicon: HALOT
  rationale: Es el término estándar para oración. «Mi oración» mantiene la correspondencia más directa y el paralelismo con la primera mitad del versículo.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión; la traducción española sigue esa lectura estable y conserva el paralelismo imperativo + vocativo + petición, atendiendo a la ambigüedad lexical de רִנָּה sin desdibujar el tono de súplica.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en vocativo, con «oh» para marcar la invocación.
  - «Clamor» se eligió para reflejar la amplitud semántica de רִנָּתִי sin imponer «canto» en un contexto de petición.
  - «Atiende a» conserva la intensificación del segundo imperativo mejor que una repetición simple de «escucha».
