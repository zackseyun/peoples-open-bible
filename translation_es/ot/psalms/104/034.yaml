translation:
  language: es
  text: Que mi meditación le sea agradable[a]; yo me alegraré en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que mi meditación le sea dulce» o «le sea aceptable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶעֱרַב
  english_pob_choice: be pleasing
  chosen_spanish: sea agradable
  alternatives_spanish:
  - sea dulce
  - sea aceptable
  lexicon: HALOT
  rationale: En este contexto de oración y alabanza, ערב expresa que la meditación del salmista resulte grata para Dios. «Sea agradable» conserva esa fuerza de aceptación favorable sin sonar forzado en español.
- source_word: עָלָיו
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La preposición con ערב apunta al destinatario ante quien algo resulta placentero o aceptable. «Ante él» comunica bien la orientación relacional hacia Dios y evita una literalidad menos natural.
- source_word: שִׂיחִי
  english_pob_choice: my meditation
  chosen_spanish: mi meditación
  alternatives_spanish:
  - mi reflexión
  - mi musing
  - mi queja
  lexicon: HALOT
  rationale: שיח puede significar meditación, conversación interior o discurso. Aquí el contexto devocional favorece «meditación»; «queja» se descarta por el tono de este salmo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis poético. En español se puede conservar de forma natural con «yo», sin sobrecargar la línea con «yo mismo».
- source_word: אֶשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: me alegraré
  alternatives_spanish:
  - me regocijaré
  - me alegraré profundamente
  lexicon: HALOT
  rationale: El imperfecto expresa una resolución o disposición futura. «Me alegraré» comunica bien ese matiz en español moderno y mantiene el paralelismo poético.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el Señor
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé». La preposición ב se traduce naturalmente con «en», indicando la esfera o el objeto del gozo.'
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. En la política española del proyecto, se mantiene el Nombre divino como «Yahvé» para no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el consenso del audit trail inglés, con la única adaptación necesaria al estándar español del proyecto para el Nombre divino. No se detectaron revisiones pendientes en el registro fuente.
  spanish_consistency_notes:
  - Se mantuvo el orden poético natural del español sin añadir contenido ajeno al hebreo.
  - «Yahvé» se usa de forma consistente con el estándar del proyecto para יהוה.
  - La nota textual conserva las alternativas léxicas relevantes que el audit trail inglés documenta para ערב.
