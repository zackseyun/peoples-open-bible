translation:
  language: es
  text: 'Los hijos de Tola: Uzzi[a], Refaías, Jeriel, Jahmai, Ibsam y Samuel, jefes[b] de sus casas paternas, pertenecientes a Tola, hombres valerosos[c] según sus generaciones[d]. Su número en los días de David era veintidós mil seiscientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría transliterarse 'Uzi'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'cabezas' o 'líderes' de sus casas paternas.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea también puede traducirse 'guerreros poderosos' o 'hombres valientes'.
    reason: lexical_alternative
  - marker: d
    text: O 'por sus generaciones' o 'en sus genealogías'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, בנים se refiere de forma natural a una línea filial; 'Los hijos de' conserva la estructura y es idiomático en español bíblico actual.
- source_word: תוֹלָע
  english_pob_choice: Tola
  chosen_spanish: Tola
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: עֻזִּי
  english_pob_choice: Uzzi
  chosen_spanish: Uzzi
  alternatives_spanish:
  - Uzi
  lexicon: HALOT
  rationale: Nombre propio. Se conserva una transliteración transparente y cercana al hebreo.
- source_word: רְפָיָה
  english_pob_choice: Rephaiah
  chosen_spanish: Refaías
  alternatives_spanish:
  - Refaía
  - Rafaías
  lexicon: HALOT
  rationale: Nombre propio; se adopta una transliteración española más natural, manteniendo la base consonántica y la vocalización aproximada.
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  lexicon: HALOT
  rationale: Literalmente es 'cabezas', pero en este contexto genealógico/clánico 'jefes' comunica con claridad la función de cabeza de casa paterna sin perder el valor de autoridad del término.
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: of their fathers’ houses
  chosen_spanish: de las casas paternas
  alternatives_spanish:
  - de sus casas de padres
  - de sus casas ancestrales
  lexicon: HALOT
  rationale: בית אבות designa la unidad familiar/clánica. 'Casas paternas' conserva el sentido técnico y es comprensible en español.
- source_word: לְתוֹלָע
  english_pob_choice: belonging to Tola
  chosen_spanish: de Tola
  alternatives_spanish:
  - pertenecientes a Tola
  - ligados a Tola
  lexicon: HALOT
  rationale: La relación de pertenencia al linaje de Tola se expresa de forma simple y natural con 'de Tola', sin añadir interpretación extra.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - hombres valerosos
  - guerreros poderosos
  - hombres poderosos de valor
  lexicon: HALOT
  rationale: La expresión hebrea puede denotar fuerza, capacidad y valor guerrero. En español, 'hombres poderosos' mantiene la fuerza del original y evita una ampliación demasiado militar si bien el contexto puede incluirla.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - según sus genealogías
  lexicon: HALOT
  rationale: תולדות aquí señala la línea genealógica; 'según sus generaciones' preserva el lenguaje del original y el matiz genealógico.
- source_word: מִסְפָּרָם
  english_pob_choice: Their number
  chosen_spanish: Su número
  alternatives_spanish:
  - El número de ellos
  - La cantidad de ellos
  lexicon: HALOT
  rationale: Término censal directo.
- source_word: בִּימֵי דָוִיד
  english_pob_choice: in the days of David
  chosen_spanish: en los días de David
  alternatives_spanish:
  - durante los días de David
  - en tiempos de David
  lexicon: HALOT
  rationale: Se conserva la forma temporal hebrea casi literalmente, como en el inglés POB.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף וְשֵׁשׁ מֵאוֹת
  english_pob_choice: twenty-two thousand six hundred
  chosen_spanish: veintidós mil seiscientos
  lexicon: HALOT
  rationale: Equivalencia numérica estándar en español.
theological_decisions:
- issue: Término de estatus clánico en רָאשִׁים / לְבֵית אֲבוֹתָם
  english_pob_reading: heads of their fathers’ houses
  chosen_spanish_reading: jefes de las casas paternas
  alternative_spanish_readings:
  - cabezas de las casas paternas
  - líderes de las casas paternas
  rationale: La frase describe jefatura familiar/clánica, no necesariamente oficio civil. 'Jefes' comunica autoridad sin desplazar el marco genealógico.
  doctrine_reference: Genealogías tribales y organización familiar en Israel (cf. uso de בית־אב en listas genealógicas).
- issue: Valor semántico de גִּבּוֹרֵי חַיִל
  english_pob_reading: mighty men of valor
  chosen_spanish_reading: hombres poderosos
  alternative_spanish_readings:
  - hombres valerosos
  - guerreros poderosos
  - hombres poderosos de valor
  rationale: El hebreo admite una gama entre fuerza, capacidad y valentía militar. Dado el registro genealógico-censal, 'hombres poderosos' mantiene amplitud semántica sin sobreespecificar el aspecto militar.
  doctrine_reference: Léxico de valentía/capacidad en relatos y listas de Israel (cf. גבור חיל).
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto mediante marcadores visibles [a], [b] y [c]. Se mantuvo el alcance genealógico del versículo y se preservó la ambigüedad relevante de רָאשִׁים y גִּבּוֹרֵי חַיִל en notas de pie.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se conserva el tono genealógico y censal del pasaje sin añadir glosas interpretativas al cuerpo del texto.
  - Se mantiene una transliteración consistente de nombres propios, con adaptación española cuando mejora la lectura sin perder transparencia.
