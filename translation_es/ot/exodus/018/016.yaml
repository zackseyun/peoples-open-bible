    reason: lexical_alternative
  - marker: b
    text: Hebrew 'between a man and his neighbor,' a representative singular expression.
    reason: cultural_note
  - marker: c
    text: Or 'his instructions' for 'his laws.' The Hebrew term can denote instruction more broadly, though here it is used in a legal setting.
    reason: lexical_alternative
