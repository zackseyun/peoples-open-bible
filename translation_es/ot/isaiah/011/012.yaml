revisions:
- from: Él alzará una bandera para las naciones[a], y reunirá a los desterrados de Israel[b]; juntará a los dispersos de Judá[c] desde los cuatro confines de la tierra.
  to: Él alzará una bandera para las naciones[a], y reunirá a los desterrados de Israel[b]; reunirá a los dispersos de Judá[c] desde los cuatro confines de la tierra[d].
  rationale: Se ajusta la redacción para un registro más natural y digno en español («reunirá» en ambas cláusulas), se corrige la nota sobre «desterrados» para que conserve una alternativa léxica real, y se añade la nota cultural documentada sobre «las cuatro alas de la tierra». También se mantiene una nota aclaratoria útil sobre el plural femenino de «los dispersos de Judá», anclada correctamente en el texto.
