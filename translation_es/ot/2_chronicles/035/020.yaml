base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/020.yaml
  text: After all this[a], when Josiah had prepared the house, Neco king of Egypt went up to fight at Carchemish on the Euphrates[b], and Josiah went out to meet him.
  footnotes:
