base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/041/003.yaml
  text: And Ishmael struck down all the Judeans who were with Gedaliah at Mizpah[c][b][a], and the Chaldeans who were found there—the men of war.
  footnotes:
  - marker: a
    text: Or 'the Jews.' The Hebrew term can denote the people of Judah/Judea; in this context 'Judeans' highlights the historical-geographical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the men of war'; that is, the fighting men or soldiers.
    reason: lexical_alternative
