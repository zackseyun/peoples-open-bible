translation:
  language: es
  text: 'Y Moisés mandó a los hijos de Israel conforme a la palabra de Yahvé[a], diciendo: «La tribu de los hijos de José tiene razón[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «por la boca de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habla correctamente» o «está en lo correcto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó con autoridad
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato con autoridad. En español, «mandó» comunica esa fuerza de manera natural y directa, sin perder la idea de mandato formal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea transparente. «Hijos de Israel» refleja el idioma original mejor que una simplificación a «israelitas».
- source_word: עַל פִּי יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «por la boca de Yahvé». «Conforme a la palabra de Yahvé» mantiene la idea de autoridad divina de forma idiomática en español sin ocultar el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión del POB de traducir el Tetragrámaton como el nombre propio «Yahvé», evitando la sustitución por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula estándar que introduce el discurso directo; «diciendo» preserva la relación sintáctica del hebreo.
- source_word: כֵּן
  english_pob_choice: rightly / is right
  chosen_spanish: tiene razón
  alternatives_spanish:
  - está en lo correcto
  - habla correctamente
  - es correcto
  lexicon: HALOT
  rationale: El contexto afirma que la petición o planteamiento de los hijos de José es correcto. «Tiene razón» expresa con naturalidad el valor evaluativo de כֵּן, sin perder la afirmación de corrección.
- source_word: מַטֵּה בְנֵי יוֹסֵף
  english_pob_choice: the tribe of the sons of Joseph
  chosen_spanish: la tribu de los hijos de José
  alternatives_spanish:
  - la tribu de José
  - la tribu de los descendientes de José
  lexicon: HALOT
  rationale: En contexto tribal, מַטֵּה significa «tribu» y no «vara». Se conserva la estructura genealógica «hijos de José» para mantener la correspondencia formal con el hebreo.
- source_word: דֹּבְרִים
  english_pob_choice: is right
  chosen_spanish: tiene razón
  alternatives_spanish:
  - habla correctamente
  - está en lo correcto
  - dice verdad
  lexicon: HALOT
  rationale: El participio de דבר conserva una idea de hablar, pero el auditorial inglés ya decidió que el sentido aquí es evaluativo, no meramente verbal. En español, «tiene razón» comunica ese juicio con naturalidad y sin forzar una construcción extraña.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide preservar el nombre divino revelado en el texto hebreo. «Yahvé» mantiene la referencia directa al Tetragrámaton y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Valor de כֵּן en la respuesta final
  english_pob_reading: The tribe of the sons of Joseph is right.
  chosen_spanish_reading: La tribu de los hijos de José tiene razón.
  alternative_spanish_readings:
  - La tribu de los hijos de José habla correctamente.
  - La tribu de los hijos de José está en lo correcto.
  rationale: El hebreo afirma la corrección de la intervención de la tribu, y la revisión inglesa priorizó una lectura directa y natural. «Tiene razón» conserva el juicio positivo sin introducir ambigüedad verbal innecesaria.
  doctrine_reference: Notas léxicas de HALOT para כֵּן y דֹּבְרִים
translation_notes:
  revision_awareness: La última revisión inglesa cambió «is speaking rightly» por «is right» para hacer más natural y directa la traducción de דֹּבְרִים en este contexto. La versión española sigue esa decisión final con «tiene razón», manteniendo el sentido evaluativo de la afirmación sobre la tribu de José.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «hijos de Israel» y «hijos de José» para mantener la transparencia formal del hebreo.
  - «Tiene razón» refleja la evaluación final del texto, no una descripción del acto de hablar en sí.
  - La puntuación introduce discurso directo de forma natural en español, respetando el valor de לֵאמֹר.
