revisions:
- from: El que trabaja la tierra levantará su montón de grano[a]; y el que agrada a los grandes atonará por la injusticia.
  to: El que trabaja la tierra levantará su montón de grano[a], y el que agrada a los grandes hará expiación por la injusticia.
  rationale: Se reemplaza 'atonará' por 'hará expiación por' para expresar de manera natural y fiel en español la fuerza expiatoria de ἐξιλάσεται, conforme a la justificación léxica y teológica del POB. También se ajusta levemente la nota para que la alternativa refleje mejor ἀδικίαν y se normaliza la puntuación.
