translation:
  language: es
  text: 'La voz de Yahvé clama a la ciudad, y la sabiduría sana ve tu nombre[a]: oigan la vara y a quien la designó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la sabiduría ve tu nombre», o «y es sabiduría sana temer tu nombre». El hebreo de esta cláusula es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֤וֹל יְהוָה֙
  english_pob_choice: The voice of Yahweh / the LORD
  chosen_spanish: La voz de Yahvé
  alternatives_spanish:
  - La voz de Yahvé clama
  - La voz del Yahvé
  lexicon: HALOT
  rationale: קול significa 'voz' y se conserva la personificación del texto. Se usa 'Yahvé' como equivalencia española directa del nombre divino, siguiendo el criterio del proyecto, en lugar de la máscara 'SEÑOR'.
- source_word: לָ/עִ֣יר
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - contra la ciudad
  - en la ciudad
  lexicon: HALOT
  rationale: La preposición ל admite dirección u objeto indirecto; 'a la ciudad' es la lectura más directa y no añade una interpretación de juicio que el hebreo no exige por sí mismo.
- source_word: יִקְרָ֔א
  english_pob_choice: cries out
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - llama
  lexicon: HALOT
  rationale: קרא puede ser 'llamar' o 'clamar'. 'Clama' conserva la urgencia profética y funciona bien con 'la voz de Yahvé' sin volverlo demasiado prosaico.
- source_word: וְ/תוּשִׁיָּ֖ה
  english_pob_choice: sound wisdom
  chosen_spanish: la sabiduría sana
  alternatives_spanish:
  - la sabiduría
  - la sabiduría sólida
  - la prudente sabiduría
  lexicon: HALOT
  rationale: תושיה tiene el matiz de sabiduría sólida, práctica o eficaz. 'Sabiduría sana' intenta reproducir ese valor de solidez/cordura sin reducirlo a un término genérico.
- source_word: יִרְאֶ֣ה
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - teme
  - mira
  - tiene reverencia por
  lexicon: HALOT
  rationale: La vocalización masorética permite entender 'ver'. Se preserva esa lectura, que además concuerda con la revisión más reciente del POB, aunque el hebreo sigue siendo difícil.
- source_word: שְׁמֶ֑/ךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu nombre revelado
  lexicon: HALOT
  rationale: Se mantiene literalmente 'nombre', porque en español bíblico también puede expresar identidad y autoridad sin explicitar más de la cuenta.
- source_word: שִׁמְע֥וּ
  english_pob_choice: hear
  chosen_spanish: oíd
  alternatives_spanish:
  - escuchad
  - oigan
  lexicon: HALOT
  rationale: Es imperativo plural. 'Oíd' conserva el tono exhortativo y poético del hebreo; aunque suena más solemne, sigue siendo claro en español bíblico contemporáneo.
- source_word: מַטֶּ֖ה
  english_pob_choice: the rod
  chosen_spanish: la vara
  alternatives_spanish:
  - el cayado
  - el cetro
  - la vara de disciplina
  lexicon: HALOT
  rationale: מַטֶּה puede ser vara, bastón o cetro. 'Vara' es natural en español y, en un contexto de admonición/juicio, mantiene la idea de instrumento de corrección.
- source_word: וּ/מִ֥י
  english_pob_choice: and him who
  chosen_spanish: y a quien
  alternatives_spanish:
  - y quien
  - y al que
  lexicon: HALOT
  rationale: La forma מי funciona aquí como relativo/indefinido. 'A quien' produce una construcción más natural en español y conserva el enlace con el objeto directo 'la vara'.
- source_word: יְעָדָֽ/הּ
  english_pob_choice: appointed it
  chosen_spanish: la ha designado
  alternatives_spanish:
  - la ha nombrado
  - la ha señalado
  - la ha dispuesto
  lexicon: HALOT
  rationale: יעד significa 'designar, fijar, destinar'. 'Ha designado' es fiel y evita restringir prematuramente el referente, que en el hebreo sigue siendo discutido.
theological_decisions:
- issue: Cláusula difícil וְתוּשִׁיָּה יִרְאֶה שְׁמֶךָ
  english_pob_reading: and sound wisdom sees your name
  chosen_spanish_reading: y la sabiduría sana ve tu nombre
  alternative_spanish_readings:
  - y la sabiduría ve tu nombre
  - y es sabiduría sana ver tu nombre
  - y quien es sabio verá tu nombre
  rationale: Se mantiene la lectura de 've' para reflejar la revisión más reciente del POB y la vocalización masorética, pero se conserva en nota la ambigüedad del hebreo. No se fuerza una paráfrasis que elimine la dificultad textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente desde 'fears your name' a 'sees your name' para reflejar יִרְאֶה más directamente. Esta versión española sigue esa revisión y mantiene la tensión del hemistiquio difícil con una nota alternativa, sin resolverla de forma interpretativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino conforme al estándar del proyecto en español.
  - Se mantuvo 'sabiduría sana' para תושיה, evitando reducirlo a 'sabiduría' sin calificador.
  - Se preservó la lectura de 've' en vez de introducir 'teme' o 'reverencia', ya que el hebreo y la revisión POB favorecen la visibilidad de יִרְאֶה.
  - '''Vara'' se eligió por claridad y por su posible carga disciplinaria en contexto profético.'
