review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: queja temporal («¿Hasta cuándo?»), petición de que Dios aparte su mirada, y de que conceda un respiro por un instante brevísimo. Sin embargo, «ni me soltarás» no expresa con suficiente naturalidad en español el sentido de רפה en hifil aquí («dejar en paz / dejarme tranquilo / desistir de mí»). Además, «me trague mi saliva» suena innecesariamente forzado; el español natural es «trague saliva» o «me trague la saliva».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos tropiezos de naturalidad: «ni me soltarás» suena físico y algo brusco, y «me trague mi saliva» resulta redundante y poco idiomático. Una revisión menor mejora fidelidad y legibilidad sin perder la aspereza de Job.'
  glossary_alignment: No hay términos del glosario mayor comprometidos en este versículo. La decisión sobre «saliva» es aceptable como equivalente digno y comprensible del modismo hebreo, especialmente si la nota explica la alternativa más literal y el valor idiomático.
  issues:
  - severity: medium
    issue: «ni me soltarás» es poco natural y semánticamente estrecho
    rationale: תַרְפֵּנִי en este contexto significa desistir, dejar en paz, aflojar el acoso o soltar el control, no meramente ‘soltar’ físicamente. «Me dejarás en paz» comunica mejor el paralelismo con «apartarás tu mirada» y coincide con la justificación léxica auditada.
  - severity: low
    issue: «me trague mi saliva» es una construcción poco idiomática
    rationale: Aunque comprensible, en español suena forzada. «Trague saliva» mantiene el sentido corporal y el modismo de un instante brevísimo con mejor fluidez.
  - severity: low
    issue: La nota usa «rostro» donde la decisión principal habla de «mirada»
    rationale: No es erróneo, pero «gaze»/שׁעה se relaciona más directamente con la mirada. Conviene alinear la alternativa con «vuelvas tu mirada» para mayor precisión.
  revised_spanish_text: ¿Hasta cuándo no apartarás tu mirada de mí[a], ni me dejarás en paz hasta que trague saliva?
