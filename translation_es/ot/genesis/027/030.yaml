translation:
  language: es
  text: Y aconteció que, tan pronto como Isaac terminó de bendecir a Jacob, y Jacob acababa de salir[a] de la presencia de Isaac su padre, Esaú su hermano vino de cazar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apenas había salido». El hebreo usa un infinitivo absoluto con el verbo finito («salir salió») para intensificar la inmediatez de la salida de Jacob.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vino de su cacería» o «vino de la caza». El hebreo puede referirse a la actividad de cazar o a la presa obtenida; aquí el contexto favorece la idea de que Esaú regresaba de cazar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: Como fórmula narrativa de secuencia, ‘aconteció’ conserva el valor introductorio del wayyiqtol sin sonar arcaico en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as soon as
  chosen_spanish: cuando
  alternatives_spanish:
  - tan pronto como
  - así que
  lexicon: HALOT
  rationale: En español, ‘cuando’ con el pretérito perfecto/pluscuamperfecto transmite la simultaneidad inmediata del contexto sin forzar una construcción pesada.
- source_word: כִּלָּה
  english_pob_choice: had finished
  chosen_spanish: terminó de
  alternatives_spanish:
  - acabó de
  - concluyó de
  lexicon: HALOT
  rationale: El hebreo marca completitud del acto de bendecir; ‘terminó de’ expresa claramente esa conclusión verbal en español natural.
- source_word: לְבָרֵךְ
  english_pob_choice: blessing
  chosen_spanish: bendecir
  alternatives_spanish:
  - dar la bendición
  - bendición
  lexicon: HALOT
  rationale: El infinitivo con כלה pide un verbo en español; ‘bendecir’ preserva el proceso verbal y evita sustantivar innecesariamente.
- source_word: אַךְ
  english_pob_choice: barely / just
  chosen_spanish: apenas
  alternatives_spanish:
  - recién
  - solo
  lexicon: HALOT
  rationale: El intensificador אַךְ, unido a la repetición verbal de יצא, enfatiza la inmediatez del salir; ‘apenas’ recoge bien esa cercanía temporal.
- source_word: יָצֹא יָצָא
  english_pob_choice: had just gone out
  chosen_spanish: había salido
  alternatives_spanish:
  - había apenas salido
  - acababa de salir
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica la acción ya completada. En español, el pluscuamperfecto con ‘apenas’ en la oración completa comunica la rapidez sin forzar una duplicación poco natural.
- source_word: מֵאֵת פְּנֵי
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de ante la presencia de
  lexicon: HALOT
  rationale: ‘De la presencia de’ conserva la relación personal y espacial del hebreo de forma idiomática en español.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - de su padre
  - su padre
  lexicon: HALOT
  rationale: El posesivo español fluye mejor con la aposición ‘Isaac, su padre’, manteniendo la referencia familiar explícita.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  - de su hermano
  lexicon: HALOT
  rationale: La relación fraterna está explícita en el hebreo y en el contexto narrativo; ‘su hermano’ la conserva de manera directa.
- source_word: בָּא
  english_pob_choice: came in
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: Dado el contraste espacial con ‘había salido’, ‘entró’ comunica el movimiento hacia el interior implícito en el contexto.
- source_word: מִצֵּידוֹ
  english_pob_choice: from his hunting
  chosen_spanish: de su caza
  alternatives_spanish:
  - de la caza
  - desde su caza
  lexicon: HALOT
  rationale: ציד puede referir a la actividad de cazar o a la presa; aquí el contexto favorece la actividad. ‘De su caza’ preserva esa referencia sin añadir elementos ajenos.
theological_decisions:
- issue: Secuencia narrativa rápida sin suavizar la tensión del hebreo
  english_pob_reading: 'The English POB keeps the rapid sequence: Isaac finished blessing Jacob, Jacob had just gone out, and Esau came in from hunting.'
  chosen_spanish_reading: El español mantiene la sucesión inmediata con ‘cuando...’, ‘apenas’ y ‘entró’, sin diluir la rapidez del cambio de escena.
  alternative_spanish_readings:
  - Y sucedió que, después de bendecir...
  - Tan pronto como Isaac terminó...
  rationale: 'No hay una doctrina en juego, pero sí una tensión literaria: el hebreo subraya lo repentino del giro. La traducción debe conservar esa inmediatez para sostener el efecto narrativo.'
  doctrine_reference: Narrative fidelity / discourse structure
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió ‘had just gone out’ sobre ‘had barely gone out’ y simplificó la sintaxis temporal. El español refleja esa decisión con ‘apenas había salido’, manteniendo la inmediatez sin recurrir a una construcción redundante.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un español natural y bíblicamente digno, sin arcaísmos innecesarios.
  - Se conservaron las relaciones familiares explícitas (‘su padre’, ‘su hermano’) como parte de la tensión narrativa.
  - ‘Caza’ se usó para ציד en el sentido de actividad, no como ‘presa’, porque el contexto describe el regreso de Esaú.
