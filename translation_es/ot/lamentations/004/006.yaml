review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: compara la עָוֹן de ''la hija de mi pueblo'' con el pecado de Sodoma, conserva la súbita ruina ''en un momento'' y mantiene la dificultad de la cláusula final con nota. Sin embargo, dos decisiones no reflejan de la mejor manera el expediente POB: 1) הַהֲפוּכָה se acerca más a ''derribada/trastornada/arruinada'' que a ''destruida'', y el audit trail valora específicamente el eco intertextual de ''overthrown''; 2) la nota [a] no preserva bien la alternativa inglesa, porque cambia ''la hija de mi pueblo'' por ''mi pueblo'' en vez de ofrecer la alternativa sobre עָוֹן/culpa.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse. 'Se ha vuelto mayor' funciona, aunque 'ha llegado a ser mayor' o 'ha sido mayor' serían opciones; no requiere cambio. 'No se alzaron manos contra ella' es legible, pero sugiere agresión humana directa más que la formulación inglesa revisada 'no hands were laid on her'; 'no se pusieron manos sobre ella' sería demasiado literal y raro. La solución actual es aceptable si la nota conserva la ambigüedad, pero conviene mejorar la nota y el verbo de la ruina de Sodoma.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. ''Iniquidad'', ''pecado'' y ''la hija de mi pueblo'' están alineados con el rationale documentado. El único desajuste importante es léxico-estilístico en הַהֲפוּכָה: para respetar el rationale POB, conviene ''arrasada/derribada/trastornada'' mejor que ''destruida''; aquí ''arrasada'' o ''derribada'' suenan más naturales que ''trastornada''.'
  issues:
  - severity: medium
    issue: La nota [a] no reproduce la alternativa auditada sobre עָוֹן.
    rationale: El POB inglés ofrece como alternativa 'the guilt of the daughter of my people', no 'la culpa de mi pueblo'. La nota española elimina la personificación 'la hija de mi pueblo' y por eso no preserva fielmente la alternativa lexical-documental.
  - severity: medium
    issue: '''Que fue destruida'' debilita el eco de הַהֲפוּכָה / ''overthrown''.'
    rationale: El expediente inglés justifica 'overthrown' por su vínculo intertextual con la ruina de Sodoma en Génesis. 'Destruida' comunica el sentido general, pero pierde parte de ese matiz. Una opción como 'arrasada' o 'derribada' preserva mejor la fuerza sin sonar mecánica.
  revised_spanish_text: Porque la iniquidad de la hija de mi pueblo se ha vuelto mayor que el pecado de Sodoma[a], que fue arrasada en un momento[b], y no se alzaron manos contra ella.
  revised_footnotes:
