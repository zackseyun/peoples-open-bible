id: JOS.9.27
reference: Joshua 9:27
source:
  edition: WLC
  text: וַ/יִּתְּנֵ֨/ם יְהוֹשֻׁ֜עַ בַּ/יּ֣וֹם הַ/ה֗וּא חֹטְבֵ֥י עֵצִ֛ים וְ/שֹׁ֥אֲבֵי מַ֖יִם לָֽ/עֵדָ֑ה וּ/לְ/מִזְבַּ֤ח יְהוָה֙ עַד הַ/יּ֣וֹם הַ/זֶּ֔ה אֶל הַ/מָּק֖וֹם אֲשֶׁ֥ר יִבְחָֽר־־׃פ
translation:
  text: So Joshua made them woodcutters and water carriers on that day for the congregation and for the altar of Yahweh[a], to this day, in the place that he would choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drawers of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵם
  chosen: made them
  alternatives:
  - appointed them
  - gave them
  lexicon: HALOT
  rationale: The verb נתן literally means 'gave/put,' but in this construction with predicate participles it idiomatically means Joshua assigned or made them into a class of laborers. 'Made them' is concise and natural English while preserving the causative sense.
- source_word: חֹטְבֵי עֵצִים
  chosen: woodcutters
  alternatives:
  - cutters of wood
  - hewers of wood
  lexicon: HALOT
  rationale: A participial expression meaning those who cut wood. 'Woodcutters' is readable modern English; 'hewers of wood' is traditional but archaic.
- source_word: וְשֹׁאֲבֵי מַיִם
  chosen: water carriers
  alternatives:
  - drawers of water
  - water drawers
  lexicon: HALOT
  rationale: The participle from שאב refers to drawing water. In context the labor role is in view, and 'water carriers' communicates the service function in contemporary English. The more literal traditional rendering 'drawers of water' is preserved in a footnote as a lexical alternative.
- source_word: לָעֵדָה
  chosen: for the congregation
  alternatives:
  - for the assembly
  - for the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community of Israel. 'Congregation' preserves the corporate, quasi-cultic sense better than the broader 'community.'
- source_word: וּלְמִזְבַּח יְהוָה
  chosen: and for the altar of the LORD
  alternatives:
  - and for the LORD's altar
  lexicon: HALOT
  rationale: This phrase indicates service connected specifically to sacrificial worship. 'The altar of the LORD' is transparent and preserves the genitival relation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This idiom marks the continuing state from the narrated event up to the writer's present. 'To this day' is the standard natural English equivalent.
- source_word: אֶל הַמָּקוֹם אֲשֶׁר יִבְחָר
  chosen: at the place that he would choose
  alternatives:
  - for the place that he would choose
  - at the place that he chooses
  lexicon: HALOT
  rationale: The phrase points to the central sanctuary location chosen by the LORD. Although אֶל often means 'to,' in this context after 'for the altar of the LORD' it functions with reference to service at that chosen place. 'Would choose' reflects the yiqtol in narrative perspective, looking ahead from Joshua's time.
