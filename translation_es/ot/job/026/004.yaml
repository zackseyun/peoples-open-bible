- from: ¿A quién has declarado palabras[a], y de quién ha salido el aliento[b] de ti?
  to: ¿A quién has declarado palabras, y de quién ha salido de ti el aliento[a]?
  rationale: Se corrige la segunda mitad para preservar el interrogativo posesivo/originario «de quién» presente en מִי y evitar que el verso pierda una de sus dos preguntas retóricas. Se elimina la nota innecesaria sobre «palabras» y se mantiene la nota léxica necesaria sobre «aliento/espíritu», conforme al rastro auditado inglés.
