  rationale: 'Se revisa para restaurar una decisión léxica significativa del audit trail: la distinción entre חֹזֶה y נָבִיא mediante ''vidente'' frente a ''profeta'', con nota explicativa. También se mejora ligeramente la naturalidad del español con ''colocó'' y una enumeración más fluida, sin alterar el sentido fuente ni la teología del pasaje.'
