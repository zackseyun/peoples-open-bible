review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: la hormiga prepara su comida en verano y junta reservas en tiempo de cosecha. Las decisiones léxicas principales («prepara», «su alimento», «recoge», «sus provisiones») siguen de cerca el análisis fuente y el rastro auditado en inglés. La única desviación relevante es de estilo/idiomaticidad en la colocación de las notas y en «en la siega», que es comprensible pero menos natural y amplio que «en la cosecha / al tiempo de la cosecha» para בַּקָּצִיר.'
  spanish_quality_summary: 'El español es claro y digno, pero puede pulirse para mayor naturalidad y mejor correspondencia con las notas. «En verano» suena más idiomático que «en el verano» en este tipo de proverbio general. Además, la nota [b] en inglés ofrece una alternativa completa para el verbo («stores up») y no para «harvest»; en español conviene anclarla al verbo «recoge» y formularla como «O: “acopia su alimento en la cosecha”».'
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Las decisiones léxicas concuerdan con la filosofía del proyecto: «alimento» para לַחְמָהּ como sentido más amplio que «pan», y «provisiones»/reservas para מַאֲכָלָהּ. Se recomienda «cosecha» frente a «siega» por legibilidad general, sin pérdida de fidelidad.'
  issues:
