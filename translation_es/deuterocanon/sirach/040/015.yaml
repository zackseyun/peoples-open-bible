translation:
  language: es
  text: La descendencia de la violencia[a] no quedará sin castigo, porque la raíz del impío está sobre un peñasco escarpado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Los descendientes de los impíos no multiplicarán ramas, y raíces impuras están sobre una roca agudamente cortada». Esto apoya la imagen de un crecimiento corrupto, pero difiere del hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: La frase final es difícil en hebreo. Literalmente evoca un «diente» de roca, es decir, una protuberancia rocosa aguda o un peñasco abrupto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוצר
  english_pob_choice: offspring
  chosen_spanish: la descendencia
  alternatives_spanish:
  - los hijos
  - la progenie
  - lo que brota
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego apuntan a una imagen de lo producido o engendrado por la violencia/impiedad. En español, «descendencia» comunica bien la idea de linaje o producto derivado sin volverla demasiado literal o biológica.
- source_word: מחמס
  english_pob_choice: of violence
  chosen_spanish: de la violencia
  alternatives_spanish:
  - de injusticia
  - del abuso
  - de la maldad
  lexicon: HALOT
  rationale: חמס tiene un rango de violencia, injusticia y rapiña. «Violencia» conserva la fuerza moral y social del término y mantiene la construcción genitiva del hebreo.
- source_word: לא ינקה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no será absuelto
  - no escapará
  - no quedará inocente
  lexicon: HALOT
  rationale: La negación de נקה expresa que no será declarado limpio ni exento de culpa. En español, «no quedará sin castigo» transmite la consecuencia judicial de manera clara y natural.
- source_word: חנף
  english_pob_choice: the godless
  chosen_spanish: el impío
  alternatives_spanish:
  - el profano
  - el irreverente
  - el hipócrita
  lexicon: HALOT
  rationale: El paralelo griego usa ἀσεβῶν y ἀκάθαρτοι, que refuerzan la idea de impiedad más que de mera hipocresía. «Impío» es el equivalente español más fiel y suficientemente tradicional sin perder precisión.
- source_word: על שן תלע
  english_pob_choice: on a jagged crag
  chosen_spanish: sobre una peña aguda
  alternatives_spanish:
  - sobre un peñasco cortante
  - sobre una roca afilada
  - en una peña escarpada
  lexicon: HALOT
  rationale: 'La expresión hebrea es difícil: literalmente evoca una «dentadura/tooth» de roca, es decir, una protuberancia aguda. «Peña aguda» conserva la imagen de aspereza y filo, y permite que el lector perciba el valor metafórico sin forzar una traducción demasiado técnica.'
theological_decisions:
- issue: Preferencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the first colon from the Hebrew as 'The offspring of violence will not go unpunished,' while allowing the Greek to inform the imagery and confirm the general warning about wicked lineage.
  chosen_spanish_reading: Traducir el primer hemistiquio desde el hebreo como «La descendencia de la violencia no quedará sin castigo», dejando que el griego sustente, en nota, la imagen de los brotes/ramas y la raíz impura.
  alternative_spanish_readings:
  - Los hijos del impío no multiplicarán ramas
  - La progenie de los impíos no prosperará
  rationale: 'La política textual del proyecto da prioridad al hebreo preservado en Sirácida cuando existe. El griego no se ignora: se reconoce como paralelo valioso que aclara la metáfora de crecimiento corrupto, pero no sustituye la lectura hebrea principal.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácida conserva testimonio hebreo; usar el griego paralelo como apoyo real'
- issue: Valor semántico de חנף en el segundo hemistiquio
  english_pob_reading: the root of the godless is on a jagged crag
  chosen_spanish_reading: la raíz del impío está sobre una peña aguda
  alternative_spanish_readings:
  - la raíz del impío está sobre una roca cortante
  - la raíz del profano está sobre una peña escarpada
  - la raíz del hipócrita está sobre una roca afilada
  rationale: Entre las opciones españolas, «impío» recoge mejor el peso religioso-moral del término y armoniza con el paralelo griego ἀσεβῶν. «Hipócrita» sería posible en otros contextos, pero aquí estrecha indebidamente el sentido.
  doctrine_reference: HALOT; Sirácida 40:15 paralelo griego
- issue: Tratamiento de la imagen final difícil del hebreo
  english_pob_reading: The final phrase is difficult Hebrew. Literally, it evokes a 'tooth' of rock—that is, a sharp rocky projection or crag.
  chosen_spanish_reading: «peña aguda» con nota explicativa sobre la imagen de una protuberancia rocosa cortante
  alternative_spanish_readings:
  - peñasco cortante
  - roca afilada
  - prominencia rocosa aguda
  rationale: La frase hebrea resulta oscura; una equivalencia demasiado literal («diente de roca») sería poco comprensible en español. La solución elegida mantiene la imagen de aspereza y filo, mientras la nota preserva la tensión lexicográfica.
  doctrine_reference: HALOT; nota textual del POB en inglés
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios necesarios, pero el control cruzado externo señaló issues mayores. Por eso se mantiene la primacía del hebreo conservado, se integra el apoyo del paralelo griego en nota, y se ajusta la formulación española para que suene natural sin perder la tensión léxica del original.
  spanish_consistency_notes:
  - Se mantiene «impío» para חנף, en línea con el paralelo griego ἀσεβῶν y con el registro bíblico español.
  - Se evita «SEÑOR» porque no aparece aquí el tetragrámaton ni una cita directa de κύριος.
  - «Peña aguda» conserva la dureza de la imagen sin imponer una solución interpretativa excesiva.
  - La nota a desplaza el paralelo griego a apoyo contextual, no a texto principal, conforme a la prioridad del hebreo en Sirácida cuando está disponible.
