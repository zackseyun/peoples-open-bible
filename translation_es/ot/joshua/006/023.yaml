translation:
  language: es
  text: Así que los jóvenes, los espías, entraron y sacaron a Rahab, a su padre, a su madre, a sus hermanos y a todos los que le pertenecían[a]. Sacaron todas sus familias[b] y los colocaron fuera del campamento de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo lo que le pertenecía'. La expresión hebrea puede ser más amplia que personas solamente, aunque en el contexto probablemente se refiere sobre todo a los miembros de su casa.
    reason: lexical_alternative
  - marker: b
    text: O 'sus clanes' o 'sus parientes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los servidores
  lexicon: HALOT
  rationale: נַעַר designa con frecuencia a un varón joven; en este contexto se refiere a los dos enviados israelitas. 'Los jóvenes' conserva el valor léxico sin forzar una lectura servil.
- source_word: הַמְרַגְּלִים
  english_pob_choice: the spies
  chosen_spanish: los espías
  alternatives_spanish:
  - los que habían espiado
  - los exploradores
  lexicon: HALOT
  rationale: El participio identifica a esos jóvenes por su función. 'Los espías' es directo, formal y fiel al sentido identificador del hebreo.
- source_word: וַיֹּצִיאוּ / הוֹצִיאוּ
  english_pob_choice: brought out
  chosen_spanish: sacaron
  alternatives_spanish:
  - trajeron fuera
  - extrajeron
  lexicon: HALOT
  rationale: יצא en hifil significa hacer salir o sacar. 'Sacaron' reproduce bien el verbo repetido en español sin sonar artificial.
- source_word: כָּל אֲשֶׁר לָהּ
  english_pob_choice: all who belonged to her
  chosen_spanish: todo lo que le pertenecía
  alternatives_spanish:
  - todos los que le pertenecían
  - todo lo que era suyo
  lexicon: HALOT
  rationale: La expresión hebrea puede ser amplia. 'Todo lo que le pertenecía' mantiene esa amplitud y deja abierta la referencia, que puede incluir personas y no solo posesiones.
- source_word: מִשְׁפְּחוֹתֶיהָ
  english_pob_choice: her families
  chosen_spanish: sus familias
  alternatives_spanish:
  - sus clanes
  - sus parientes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede aludir a grupos de parentesco extensos. 'Sus familias' conserva la pluralidad y el alcance social del término sin cargarlo demasiado técnicamente.
- source_word: וַיַּנִּיחוּם
  english_pob_choice: placed them
  chosen_spanish: las colocaron
  alternatives_spanish:
  - las pusieron
  - las dejaron
  lexicon: HALOT
  rationale: El verbo indica poner o situar deliberadamente. 'Las colocaron' comunica una ubicación intencional, acorde con el contexto narrativo.
- source_word: מִחוּץ לְמַחֲנֵה יִשְׂרָאֵל
  english_pob_choice: outside the camp of Israel
  chosen_spanish: fuera del campamento de Israel
  alternatives_spanish:
  - fuera de la campamento de Israel
  - fuera del campamento israelita
  lexicon: HALOT
  rationale: La formulación española más natural y fiel es 'fuera del campamento de Israel', manteniendo el marco espacial sin añadir una explicación que el texto no da.
theological_decisions:
- issue: Razón de que Rahab y su casa quedaran fuera del campamento
  english_pob_reading: Render the spatial statement without importing an explanation.
  chosen_spanish_reading: Traducir la ubicación espacial sin añadir la razón.
  alternative_spanish_readings:
  - separación ritual temporal
  - custodia protectora
  - cuarentena antes de incorporarlos a Israel
  rationale: El hebreo solo dice que fueron colocados fuera del campamento de Israel. Para respetar la tensión narrativa y no interpretar de más, el texto español evita explicar el motivo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB, que prefirió 'the spies' frente a una paráfrasis más explicativa. En español, por eso se mantiene una denominación directa y formal ('los espías') y no se añade 'que habían espiado la tierra', ya que el hebreo aquí solo los identifica por su oficio/rol.
  spanish_consistency_notes:
  - He usado 'Yahvé' solo cuando corresponde al nombre divino; aquí no aparece.
  - '''Espías'' se mantiene como sustantivo identificador, no como verbo perifrástico.'
  - '''Familias'' conserva la pluralidad de מִשְׁפְּחוֹתֶיהָ sin convertirla en una sola casa o familia nuclear.'
  - '''Campamento de Israel'' preserva la imagen histórica y militar del hebreo.'
  - No se ha añadido explicación teológica sobre pureza, custodia o incorporación; el versículo solo informa la ubicación.
