review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: el mensajero se adelanta, informa a Juan en Gazara, comunica la muerte del padre y de los hermanos, y añade el intento contra Juan. Sin embargo, «lo informó a Juan» es poco idiomático y además introduce un objeto «lo» no presente en el original. También «que también había enviado a matarte» queda elíptico de manera demasiado abrupta en español; conviene explicitar el sujeto implícito con «a alguien» o reestructurar la frase, manteniendo la nota sobre la elipsis griega.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero contiene giros poco naturales para un español bíblico fluido: «lo informó a Juan» suena incorrecto o calcado; «habían perecido» es aceptable, aunque «habían muerto» sería más común, pero puede conservarse por cercanía semántica al matiz del griego. La última cláusula necesita una formulación más idiomática sin perder la elipsis documentada.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones léxicas son en general coherentes, salvo que ἀπήγγειλεν se expresa mejor con «le informó» o «le dio aviso», y Ἀπέσταλκεν requiere una solución española más natural que preserve la elipsis o la aclare con nota.
  issues:
  - severity: medium
    issue: «lo informó a Juan» es poco idiomático y añade un objeto no sustentado por el griego.
    rationale: ἀπήγγειλεν Ἰωάννῃ significa «informó a Juan / le informó a Juan», no «lo informó a Juan». El pronombre «lo» sugiere un complemento directo explícito ausente en el original y suena incorrecto en español estándar.
  - severity: medium
    issue: La cláusula «y que también había enviado a matarte» suena incompleta en español.
    rationale: Aunque el griego deja implícito el objeto de «enviar», el español sin objeto expreso produce una elipsis más áspera que la del original. Una solución como «había enviado a alguien para matarte también» mantiene fidelidad y legibilidad, con nota aclaratoria.
  - severity: low
    issue: La nota al pie depende del inglés POB más que del resultado español revisado.
    rationale: 'La nota debe explicar directamente la decisión española: el griego omite el objeto de «enviar»; el español añade un mínimo («a alguien») para claridad idiomática.'
  revised_spanish_text: Y, adelantándose corriendo, le informó a Juan en Gazara que su padre y sus hermanos habían perecido[a], y que había enviado a alguien para matarte también.
