id: 2SA.11.12
reference: 2 Samuel 11:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל אוּרִיָּ֗ה שֵׁ֥ב בָּ/זֶ֛ה גַּם הַ/יּ֖וֹם וּ/מָחָ֣ר אֲשַׁלְּחֶ֑/ךָּ וַ/יֵּ֨שֶׁב אוּרִיָּ֧ה בִ/ירוּשָׁלִַ֛ם בַּ/יּ֥וֹם הַ/ה֖וּא וּ/מִֽ/מָּחֳרָֽת־־׃
translation:
  text: Then David said to Uriah[a], “Stay here today also, and tomorrow I will send you away.” So Uriah stayed in Jerusalem that day and the next day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and on the following day.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'and said' is possible but less idiomatic here.
- source_word: שֵׁב
  chosen: Stay
  alternatives:
  - Remain
  - Sit
  - Dwell
  lexicon: HALOT
  rationale: Imperative of ישׁב in this context means to remain/stay in a place temporarily. 'Stay' is the most natural English command here.
- source_word: בָּזֶה
  chosen: here
  alternatives:
  - in this place
  - in this
  lexicon: HALOT
  rationale: The phrase שֵׁב בָּזֶה is idiomatic for remaining in the present location. 'Here' captures the sense in clear modern English.
- source_word: גַּם הַיּוֹם
  lemma: גַּם
  chosen: today also
  alternatives:
  - also today
  - this day also
  lexicon: HALOT
  rationale: The adverb גַּם adds 'also/as well' to 'today.' 'Today also' preserves the emphasis and reads naturally.
- source_word: וּמָחָר
  chosen: and tomorrow
  alternatives:
  - until tomorrow
  - tomorrow
  lexicon: HALOT
  rationale: 'The conjunction links a second time reference to the command and promise. The sense is not ''until tomorrow'' but an additional temporal point: ''and tomorrow.'''
- source_word: אֲשַׁלְּחֶךָּ
  chosen: I will send you off
  alternatives:
  - I will send you
  - I will dismiss you
  lexicon: HALOT
  rationale: שׁלח commonly means to send. 'Send you off' fits the context of dispatching Uriah away from Jerusalem and sounds natural in English.
- source_word: וַיֵּשֶׁב
  chosen: So ... stayed
  alternatives:
  - And ... stayed
  - remained
  - dwelt
  lexicon: HALOT
  rationale: 'Narrative consequence is in view: David spoke, so Uriah stayed. ''Stayed'' matches the earlier imperative and keeps lexical consistency with ישׁב in this context.'
- source_word: בִּירוּשָׁלִַם
  lemma: בְּ
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with the preposition בְּ.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are possible; 'that day' is smoother in English while preserving the temporal reference.
- source_word: וּמִמָּחֳרָת
  chosen: and the next day
  alternatives:
  - and on the following day
  - and on the morrow
  lexicon: HALOT
  rationale: מִמָּחֳרָת refers to the following day. 'The next day' is clear modern English and avoids archaic 'morrow.'
