translation:
  language: es
  text: Y le dieron setenta piezas de plata de la casa de Baal-berit[a]; y con ellas Abimelec contrató a hombres sin valor y temerarios[c][b], y lo siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del templo de Baal-berit'. El hebreo dice 'casa', que en un contexto cultual puede referirse a un santuario o templo.
    reason: lexical_alternative
  - marker: b
    text: O 'setenta siclos de plata'. El hebreo dice literalmente 'setenta plata', una cantidad monetaria expresada por peso.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'vacíos y temerarios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעִים כֶּסֶף
  english_pob_choice: seventy pieces of silver
  chosen_spanish: setenta piezas de plata
  alternatives_spanish:
  - setenta siclos de plata
  - setenta monedas de plata
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente 'plata' y, por extensión, dinero en metal precioso. 'Piezas de plata' preserva el valor monetario sin añadir 'siclos', que no aparece explícitamente en el hebreo.
- source_word: מִבֵּית בַּעַל בְּרִית
  english_pob_choice: from the house of Baal-berith
  chosen_spanish: de la casa de Baal-berit
  alternatives_spanish:
  - del templo de Baal-berit
  - de la casa de Baal del pacto
  lexicon: HALOT
  rationale: בית se mantiene como 'casa' para conservar la imagen del hebreo. En contexto cultual puede referirse a un santuario o templo; el nombre se translitera como Baal-berit, siguiendo la decisión de no traducir nombres propios cultuales.
- source_word: וַיִּשְׂכֹּר בָּהֶם
  english_pob_choice: and with them ... hired
  chosen_spanish: y con ellas Abimelec contrató
  alternatives_spanish:
  - y los contrató con ellas
  - y con ese dinero Abimelec alquiló
  lexicon: HALOT
  rationale: El pronombre בָהֶם retoma la plata como medio de contratación; en español, 'con ellas' explica naturalmente el instrumento y evita una estructura menos clara.
- source_word: אֲנָשִׁים רֵיקִים
  english_pob_choice: worthless men
  chosen_spanish: hombres inútiles
  alternatives_spanish:
  - hombres sin valor
  - hombres vacíos
  lexicon: HALOT
  rationale: רֵיקִים literalmente es 'vacíos', pero aquí funciona como caracterización social y moral. 'Inútiles' comunica la falta de provecho/persona valiosa sin sonar excesivamente idiomático o duro en español.
- source_word: וּפֹחֲזִים
  english_pob_choice: reckless
  chosen_spanish: temerarios
  alternatives_spanish:
  - imprudentes
  - desenfrenados
  lexicon: HALOT
  rationale: El término describe a personas impulsivas, sin freno y poco confiables. 'Temerarios' conserva el matiz de audacia imprudente y se acopla bien a 'hombres inútiles'.
- source_word: וַיֵּלְכוּ אַחֲרָיו
  english_pob_choice: and they followed him
  chosen_spanish: y ellos lo siguieron
  alternatives_spanish:
  - y fueron tras él
  - y lo acompañaron
  lexicon: HALOT
  rationale: El hebreo idiomático 'fueron tras él' puede sonar más literal, pero 'lo siguieron' expresa con claridad que se adhirieron a Abimelec como sus seguidores.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo externo reporta alta concordancia; esta versión sigue el sentido del hebreo WLC y el mismo conjunto de decisiones léxicas del audit trail inglés, adaptadas a un español natural y publicable.
  spanish_consistency_notes:
  - Se conserva 'Baal-berit' como transliteración consistente del nombre cultual.
  - '''Plata'' se usa para כֶּסֶף sin sobreespecificar ''siclos'' en el texto principal.'
  - 'El orden de los elementos sigue el hebreo: donación, procedencia cultual, contratación, caracterización de los hombres y seguimiento.'
  - Se mantiene el tono narrativo sobrio y directo propio de Jueces.
