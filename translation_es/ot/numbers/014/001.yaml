revisions:
- from: Entonces toda la congregación levantó su voz y clamó[a], y el pueblo lloró aquella noche.
  to: Entonces toda la congregación levantó la voz y clamaron[a], y el pueblo lloró aquella noche.
  rationale: Se corrige parcialmente la expresión idiomática y la nota, preservando ‘congregación’ y ‘pueblo’. Se mantiene ‘levantó la voz’ como giro bíblico natural con sujeto colectivo singular, pero se deja ‘clamaron’ para reflejar mejor la acción comunal explícita en el hebreo. La nota se limpia estilísticamente y conserva la alternativa literal documentada.
