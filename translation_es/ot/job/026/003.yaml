translation:
  language: es
  text: ¡Cómo has aconsejado a uno sin sabiduría[a], y has dado a conocer sabiduría sensata en abundancia!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué consejo has dado a uno sin sabiduría, y cuánta sabiduría sensata has dado a conocer!». El hebreo inicial puede traducirse como «cómo» o «qué»; el texto principal usa el exclamativo «cómo» para reflejar la ironía de Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cómo...!
  alternatives_spanish:
  - ¡Qué...!
  - ¿Qué...?
  lexicon: HALOT
  rationale: En este contexto exclamativo e irónico, «Cómo» reproduce mejor la sorpresa y la reprensión del verso que un simple «qué».
- source_word: יָּעַצְתָּ
  english_pob_choice: you have counseled
  chosen_spanish: has aconsejado
  alternatives_spanish:
  - has dado consejo
  - has aconsejado
  lexicon: HALOT
  rationale: «Aconsejado» conserva el sentido verbal de יעץ y encaja con el tono formal de la literatura sapiencial.
- source_word: לְלֹא חָכְמָה
  english_pob_choice: one without wisdom
  chosen_spanish: a uno sin sabiduría
  alternatives_spanish:
  - a alguien sin sabiduría
  - a uno que no tiene sabiduría
  lexicon: HALOT
  rationale: La construcción hebrea apunta a una persona carente de sabiduría; «a uno sin sabiduría» mantiene la referencia indefinida y la ironía del verso.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente normal en el campo semántico de חָכְמָה y es el término más natural en español bíblico contemporáneo.
- source_word: וְתוּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: sabiduría sólida
  alternatives_spanish:
  - sabiduría práctica
  - sabiduría firme
  - entendimiento sólido
  lexicon: HALOT
  rationale: Tûšiyyāh en contexto sapiencial expresa eficacia, solidez y juicio acertado. «Sabiduría sólida» preserva esa fuerza sin reducirla a mera «practicidad».
- source_word: לָרֹב
  english_pob_choice: abundantly
  chosen_spanish: abundantemente
  alternatives_spanish:
  - en abundancia
  - muy abundantemente
  lexicon: HALOT
  rationale: «Abundantemente» reproduce la intensificación del hebreo y coincide con el giro final de la traducción inglesa revisada.
- source_word: הוֹדָעְתָּ
  english_pob_choice: made known
  chosen_spanish: has dado a conocer
  alternatives_spanish:
  - has hecho saber
  - has revelado
  lexicon: HALOT
  rationale: La forma causativa de ידע se expresa con naturalidad en español mediante «dar a conocer», que mantiene la idea de hacer saber públicamente.
theological_decisions:
- issue: Tono irónico de reproche en la pregunta inicial
  english_pob_reading: How you have counseled one without wisdom...
  chosen_spanish_reading: ¡Cómo has aconsejado a uno sin sabiduría...!
  alternative_spanish_readings:
  - ¡Qué consejo has dado a uno sin sabiduría...!
  - ¿Cómo has aconsejado a uno sin sabiduría...?
  rationale: El hebreo funciona como exclamación retórica, no como pregunta informativa. La exclamación en español conserva mejor la ironía de Job.
  doctrine_reference: Job 26:3; contexto literario de discurso sapiencial e irónico
- issue: Valor de תושיה como sabiduría eficaz o sólida
  english_pob_reading: sound wisdom
  chosen_spanish_reading: sabiduría sólida
  alternative_spanish_readings:
  - sabiduría práctica
  - prudencia eficaz
  - entendimiento sólido
  rationale: No conviene aplanar תושיה a un término demasiado general. «Sabiduría sólida» conserva la idea de juicio firme y eficaz sin añadir un matiz doctrinal ajeno.
  doctrine_reference: Job 26:3; uso sapiencial de תושיה en literatura de sabiduría
translation_notes:
  revision_awareness: La versión española se ajusta al pasaje revisado del inglés POB, especialmente al cierre «abundantemente» y a la elección de una expresión natural para תושיה. Se evitó una traducción mecánica de «what» y se priorizó la fuerza exclamativa del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה y se distinguió de «sabiduría sólida» para תושיה, siguiendo la distinción léxica del original.
  - Se usó «Yahvé» como término de referencia general del proyecto, pero este verso no lo contiene.
  - La nota al pie está anclada explícitamente en «sabiduría» con el marcador [a], sin notas huérfanas.
