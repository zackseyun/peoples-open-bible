translation:
  language: es
  text: Un cesto[a] tenía higos muy buenos, como higos tempranos[b], y un cesto tenía higos muy malos, que no podían comerse[c] por su mal estado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'canasta', 'canasto' o 'cesta'.
    reason: lexical_alternative
  - marker: b
    text: O 'como los primeros higos de la cosecha' o 'como higos de las primicias'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo, literalmente: ''que no podían comerse por su mal''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוּד
  english_pob_choice: basket
  chosen_spanish: cesto
  alternatives_spanish:
  - canasta
  - canasto
  - cesta
  lexicon: HALOT
  rationale: En el contexto de la visión de Jeremías, el recipiente contiene higos y funciona como contenedor portátil; 'cesto' comunica bien esa imagen en español sin sugerir un recipiente de cocina como 'olla' o 'jarra'.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno / un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: HALOT
  rationale: 'El numeral simplemente marca cada recipiente: ''un cesto ... y un cesto'' reproduce la repetición del hebreo de forma natural en español.'
- source_word: תְּאֵנִים
  english_pob_choice: figs
  chosen_spanish: higos
  alternatives_spanish:
  - higos
  lexicon: HALOT
  rationale: Es el fruto nombrado en el texto; 'higos' es el equivalente directo y transparente en español.
- source_word: טֹבוֹת מְאֹד
  english_pob_choice: very good
  chosen_spanish: muy buenos
  alternatives_spanish:
  - sumamente buenos
  - excesivamente buenos
  lexicon: HALOT
  rationale: Conserva el intensificador y el juicio positivo de la visión en una formulación natural para el español actual.
- source_word: כִּתְאֵנֵי הַבַּכֻּרוֹת
  english_pob_choice: like first-ripe figs
  chosen_spanish: como los higos de las primicias
  alternatives_spanish:
  - como higos tempranos
  - como los primeros higos de la cosecha
  lexicon: HALOT
  rationale: '''בַּכֻּרוֹת'' puede referirse a higos tempranos o a la primera cosecha; ''de las primicias'' mantiene la idea de los primeros frutos, que el POB inglés dejó abierta con nota de alternativa.'
- source_word: רָעוֹת מְאֹד
  english_pob_choice: very bad
  chosen_spanish: muy malos
  alternatives_spanish:
  - sumamente malos
  - muy ruines
  lexicon: HALOT
  rationale: Mantiene el contraste frontal con 'muy buenos' y evita sobreinterpretar el tipo de maldad del fruto.
- source_word: אֲשֶׁר לֹא תֵאָכַלְנָה מֵרֹעַ
  english_pob_choice: which could not be eaten because of their badness
  chosen_spanish: que no podían comerse por su maldad
  alternatives_spanish:
  - que no se podían comer por estar dañados
  - que eran inservibles para comer por su mal estado
  lexicon: HALOT
  rationale: Refleja la fuerza causal del hebreo ('por su maldad') sin agregar una especificación no explicitada como 'podredumbre' o 'descomposición'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y también recoge la revisión inglesa que prefirió expresar más directamente la causalidad de מֵרֹעַ ('por su maldad') en vez de una paráfrasis más libre.
  spanish_consistency_notes:
  - Se preservó la repetición paralela 'un cesto ... y un cesto' para reflejar la estructura del hebreo.
  - Se usó 'higos' de manera consistente para תְּאֵנִים.
  - '''Maldad'' traduce de forma literal el sustantivo causal hebreo en la cláusula final, manteniendo la tensión semántica sin suavizarla.'
