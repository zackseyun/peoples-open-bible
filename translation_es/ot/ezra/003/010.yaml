revisions:
- from: Cuando los constructores echaron los cimientos del templo de Yahvé[a], colocaron a los sacerdotes, vestidos con sus ornamentos, con trompetas, y a los levitas, hijos de Asaf, con címbalos, para alabar a Yahvé, conforme a las instrucciones de David, rey de Israel.
  to: Cuando los constructores echaron los cimientos del templo de Yahvé[a], colocaron a los sacerdotes, vestidos con sus vestiduras sacerdotales, con trompetas, y a los levitas, hijos de Asaf, con címbalos, para alabar a Yahvé, conforme a las instrucciones de David, rey de Israel.
  rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Solo se ajusta «ornamentos» a «vestiduras sacerdotales» para reflejar mejor el sentido de מְלֻבָּשִׁים en contexto cultual y evitar una ambigüedad léxica en español. El resto de la formulación, incluida la nota sobre «por la mano de David», puede mantenerse.
