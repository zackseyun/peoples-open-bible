lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - Pues bien
  lexicon: HALOT
  rationale: Introduce la base o motivo del contexto de alabanza con una conexión natural en español. 'Pues' conserva bien el valor explicativo/causal sin sonar demasiado pesado.
- source_word: בָּחַר
  english_pob_choice: has chosen
  chosen_spanish: ha escogido
  alternatives_spanish:
  - escogió
  - ha elegido
  - eligió
  lexicon: HALOT
  rationale: El verbo expresa escoger/seleccionar. 'Ha escogido' comunica una acción divina realizada con efecto vigente, de manera natural en español.
- source_word: ל֣וֹ
  english_pob_choice: for himself
  chosen_spanish: para sí mismo
  alternatives_spanish:
  - para él
  - para sí
  - en favor de sí mismo
  lexicon: HALOT
  rationale: La preposición con sufijo señala pertenencia o ventaja. 'Para sí mismo' hace explícito el matiz reflexivo y posesivo que el español necesita para no sonar ambiguo.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yah
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo tiene la forma corta del nombre divino. En la línea del proyecto, se usa 'Yahvé' como forma principal en español para el nombre divino, preservando la referencia al nombre propio sin masking litúrgico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio y sujeto paralelo a Jacob; se conserva sin explicación añadida para mantener la simetría poética.
- source_word: סְגֻלָּה
  english_pob_choice: treasured possession
  chosen_spanish: posesión preciosa
  alternatives_spanish:
  - posesión valiosa
  - tesoro especial
  - propiedad preciada
  lexicon: HALOT
  rationale: '''סְגֻלָּה'' denota una posesión privada y especialmente apreciada. ''Posesión preciosa'' conserva el valor relacional y de pertenencia sin caer en un giro arcaico o demasiado técnico.'
theological_decisions:
- issue: Cómo representar la forma corta del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yah
  - el SEÑOR
  rationale: El audit trail inglés preserva 'Yah' en una revisión, pero el estándar del proyecto para el nombre divino es 'Yahvé' en el texto principal. Esto mantiene transparencia y legibilidad, y evita el ocultamiento del nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB pasó de 'the LORD' a 'Yah' en una revisión reciente para reflejar con mayor precisión יָהּ. La redacción española mantiene esa precisión nominal con 'Yahvé' según la convención del proyecto, y conserva la nota sobre la forma corta del nombre divino.
  spanish_consistency_notes:
  - Se mantiene la distinción entre Jacob e Israel como paralelismo poético, sin armonizarlos.
  - '''posesión preciosa'' busca reflejar el valor especial de סְגֻלָּה sin exagerar el tono.'
  - La nota al pie ancla la forma corta divina del hebreo y preserva la transparencia textual.
