  - severity: low
    issue: «un derramador de sangre» es menos natural que una cláusula relativa
    rationale: Aunque es defendible léxicamente, en español actual suena más forzado. «Uno que derrama sangre» o «que derrama sangre» conserva el sentido participial y mejora la fluidez sin perder precisión.
