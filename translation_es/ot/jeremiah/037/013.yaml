translation:
  language: es
  text: 'Y cuando estaba en la Puerta de Benjamín, allí había un jefe de la guardia, cuyo nombre era Irija[a], hijo de Selemías, hijo de Hananías; y prendió al profeta Jeremías, diciendo: «Tú te estás pasando a los caldeos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Irijías». La forma española aquí sigue una transliteración adaptada al castellano, no la grafía inglesa.
    reason: lexical_alternative
  - marker: b
    text: O «estás desertando a los caldeos», «estás defeccionando a los caldeos» o «te estás yendo con los caldeos». El hebreo dice literalmente «estás cayendo a los caldeos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁעַר בִּנְיָמִן
  english_pob_choice: at the Benjamin Gate
  chosen_spanish: en la Puerta de Benjamín
  alternatives_spanish:
  - en la puerta de Benjamín
  - en la Puerta de Benjamín
  lexicon: HALOT
  rationale: ‘שער’ con nombre propio de lugar designa una puerta urbana. En español, ‘Puerta de Benjamín’ conserva el topónimo tradicional sin volverlo más explicativo de lo que permite el hebreo.
- source_word: בַּעַל פְּקִדֻת
  english_pob_choice: captain of the guard
  chosen_spanish: jefe de la guardia
  alternatives_spanish:
  - capitán de la guardia
  - oficial encargado
  - comandante de la guardia
  lexicon: HALOT
  rationale: La expresión apunta a alguien con autoridad sobre la guardia. ‘Jefe de la guardia’ comunica la función de mando con naturalidad en español y evita imponer un rango militar más preciso de lo que exige el hebreo.
- source_word: יִרְאִיָּה
  english_pob_choice: Irijah
  chosen_spanish: Irijías
  alternatives_spanish:
  - Irijías
  - Irija
  lexicon: Transliteración propia a partir del hebreo
  rationale: Se adapta el nombre al patrón fonético usual del español bíblico, manteniendo la identidad del nombre hebreo. ‘Irijías’ es una transliteración más inteligible que una forma inglesa sin ajuste.
- source_word: וַיִּתְפֹּשׂ
  english_pob_choice: seized
  chosen_spanish: prendió
  alternatives_spanish:
  - se apoderó de
  - agarró
  - arrestó
  lexicon: HALOT
  rationale: El verbo expresa una toma por la fuerza. ‘Prendió’ conserva el acto hostil y físico sin añadir necesariamente el tecnicismo jurídico de ‘arrestó’.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: el profeta Jeremías
  alternatives_spanish:
  - Jeremías el profeta
  - el profeta Jeremías
  lexicon: Uso appositivo común en español
  rationale: Se preserva la aposición con un orden natural en español, sin perder la identificación del personaje profético.
- source_word: אֶל הַכַּשְׂדִּים אַתָּה נֹפֵל
  english_pob_choice: You are deserting to the Chaldeans
  chosen_spanish: Tú te estás pasando a los caldeos
  alternatives_spanish:
  - Tú estás desertando hacia los caldeos
  - Tú te estás pasando a los caldeos
  - Tú te estás yendo con los caldeos
  lexicon: HALOT
  rationale: El hebreo usa la imagen de ‘caer hacia’ un grupo contrario; en español, ‘te estás pasando a’ reproduce la idea de cambiar de bando sin forzar un matiz técnico único. ‘Caldeos’ mantiene el etnónimo-político del texto fuente.
theological_decisions:
- issue: Idiomatización de נפל אֶל en contexto político-militar
  english_pob_reading: You are deserting to the Chaldeans / defecting / going over
  chosen_spanish_reading: Tú te estás pasando a los caldeos
  alternative_spanish_readings:
  - Tú estás desertando a los caldeos
  - Tú te estás yendo con los caldeos
  - Tú estás defecionando a los caldeos
  rationale: 'No hay un problema doctrinal aquí, pero sí una tensión lexical importante: el hebreo literalmente dice ‘caer a’. En español se conserva el sentido de cambio de lealtad sin ocultar la acusación hostil del texto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo y coincide con el audit trail en los elementos clave: Puerta de Benjamín, cargo de guardia, captura de Jeremías y la acusación de pasarse a los caldeos. Se ha ajustado el castellano para que suene publicable sin perder la imagen idiomática de נפל אֶל ni la fuerza hostil de וַיִּתְפֹּשׂ.'
  spanish_consistency_notes:
  - Se mantuvo ‘caldeos’ conforme al POB inglés y al etnónimo del hebreo, en vez de sustituirlo por ‘babilonios’.
  - Se eligió una transliteración castellanizada para el nombre אישי, evitando una forma inglesa sin adaptación.
  - ‘Prendió’ y ‘se pasó a’ conservan la acción forzosa y la acusación de deserción sin sobreformalizar el registro.
