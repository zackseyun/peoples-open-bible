    issue: La nota [a] contradice el sentido léxico documentado de ἠρημωμένον.
    rationale: 'El borrador dice: ''O: profanado para devastado'', pero ''profanado'' corresponde a βεβηλωμένον, no a ἠρημωμένον. Además, la explicación habla de ''desolación y ruina'', no de profanación, creando incoherencia interna.'
  - severity: medium
    issue: La nota [b] está anclada en 'montañas' pero el expediente inglés reserva la nota para παστοφόρια.
    rationale: El aparato inglés explica la incertidumbre arquitectónica de las cámaras/dependencias del templo. La nota española actual comenta 'matorral', que no necesita nota según el expediente y desplaza una información cultural más importante.
  - severity: medium
    issue: '''Cámaras'' no es la opción más natural en español para παστοφόρια en este contexto.'
    rationale: Aunque semánticamente posible, en español bíblico general 'dependencias' o 'habitaciones' suena más claro para cuartos asociados al templo sin sobreespecificar su función.
  - severity: low
    issue: Espaciado tipográfico antes de los marcadores de nota.
    rationale: En español se lee mejor 'santuario[a]' y 'dependencias[b]' que con espacio antes del marcador.
