translation:
  language: es
  text: Que veas a los hijos de tus hijos[a]. Paz[b] sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «hijos a/para tus hijos»; es decir, «nietos» o «los hijos de tus hijos».
    reason: lexical_alternative
  - marker: b
    text: «Paz» traduce shalom, que también puede incluir bienestar, plenitud e integridad floreciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/רְאֵה
  english_pob_choice: May you see
  chosen_spanish: ¡Ojalá veas!
  alternatives_spanish:
  - Que veas
  - Que puedas ver
  lexicon: HALOT
  rationale: La forma hebrea funciona aquí como una bendición/deseo, no como simple mandato. En español, «¡Ojalá veas!» comunica bien ese tono optativo y evita sonar áspero o puramente imperativo.
- source_word: בָנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos/varones», el contexto idiomático apunta a descendencia de la siguiente generación. «Hijos» mantiene la referencia familiar y combina naturalmente con la frase siguiente.
- source_word: לְ/בָנֶי/ךָ
  english_pob_choice: your children's
  chosen_spanish: de tus hijos
  alternatives_spanish:
  - de tus hijos y nietos
  - de tus descendientes
  lexicon: HALOT
  rationale: La construcción hebrea expresa la relación «hijos a tus hijos», es decir, nietos o «hijos de tus hijos». En español, «de tus hijos» conserva la imagen literal y deja clara la idea generacional cuando se lee con «hijos de tus hijos».
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - prosperidad
  lexicon: HALOT
  rationale: «Paz» es la traducción más directa de shalom y preserva su valor bíblico amplio. Las alternativas explican aspectos reales del término, pero en el texto principal «Paz» es la forma más sobria y reconocible.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - para
  lexicon: HALOT
  rationale: «Sobre» reproduce de forma natural la imagen de una bendición que reposa o se extiende encima de Israel. «En» o «para» suavizan esa imagen y la vuelven menos concreta.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio sin reinterpretarlo. El texto hebreo se refiere a Israel en su sentido histórico y pactual.
theological_decisions:
- issue: Sentido de la bendición final
  english_pob_reading: Retain 'Israel' as the covenant people in the psalm's plain sense, without expanding it interpretively in translation.
  chosen_spanish_reading: Conservar «Israel» como el pueblo del pacto, sin ampliar el sentido en la traducción.
  alternative_spanish_readings:
  - la comunidad creyente en general
  - la iglesia tipológicamente
  rationale: El hebreo nombra explícitamente a Israel. La traducción debe respetar ese referente histórico-pactual y no introducir una aplicación posterior en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy: primacía del idioma original; preservar la tensión teológica en lugar de resolverla en la traducción.'
translation_notes:
  revision_awareness: El texto sigue la última revisión del audit trail, que no reporta cambios necesarios y muestra alto acuerdo general; se mantiene la equivalencia óptima con una solución española natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se conserva el nombre divino no aplicable en este versículo.
  - Se mantiene «Israel» sin expansión tipológica en el texto principal.
  - La nota de «shalom» preserva su amplitud semántica sin reemplazar «paz» en el versículo.
  - La formulación optativa «¡Ojalá veas!» reproduce el tono benedictorio de la forma verbal hebrea.
