translation:
  language: es
  text: Así, todos los hombres de Israel se reunieron junto a la ciudad, como un solo hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un solo hombre, unidos»; un modismo que recalca unidad total de acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסֵף
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  - fueron reunidos
  lexicon: HALOT
  rationale: El nifal de אסף expresa una reunión colectiva. En español, «se reunieron» comunica con naturalidad la acción conjunta sin forzar una pasiva artificial.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - todo Israel
  - todos los varones de Israel
  - toda la gente de Israel
  lexicon: HALOT
  rationale: אִישׁ con כָּל en este contexto militar apunta al grupo masculino convocado para la acción; «hombres» conserva ese alcance y evita suavizar el rasgo distributivo del hebreo.
- source_word: אֶל הָעִיר
  english_pob_choice: to the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - hacia la ciudad
  - contra la ciudad
  lexicon: HALOT
  rationale: La revisión inglesa corrigió el matiz hacia una localización de reunión, no un movimiento hostil explícito. En español, «en la ciudad» refleja bien el lugar de convergencia y evita añadir una hostilidad que el hebreo no marca de forma directa.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como un hombre
  - igual que un solo hombre
  - como si fueran uno
  lexicon: HALOT
  rationale: Es un modismo de unidad plena en la acción. «Como un solo hombre» conserva la imagen masculina y la idea de unanimidad compacta.
- source_word: חֲבֵרִים
  english_pob_choice: united
  chosen_spanish: unidos
  alternatives_spanish:
  - juntos
  - en solidaridad
  - ligados entre sí
  lexicon: HALOT
  rationale: El término añade la idea de estar cohesionados o enlazados. «Unidos» reproduce de manera breve y clara esa fuerza adverbial en el contexto.
translation_notes:
  revision_awareness: La redacción sigue el ajuste auditado del inglés POB, que pasó de una lectura hostil a una locativa en אֶל הָעִיר. También conserva el modismo final con una equivalencia natural en español, sin diluir la intensidad colectiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene «hombres de Israel» para conservar el rasgo militar y masculino del sustantivo אִישׁ en este versículo.
  - Se evita «SEÑOR» o terminología cultual innecesaria, ya que el versículo no contiene el nombre divino ni un título teológico relevante.
  - La coordinación «se reunieron... unidos» reproduce la secuencia hebrea de reunión y cohesión sin añadir eventos no presentes en el texto.
