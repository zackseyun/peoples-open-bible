translation:
  language: es
  text: Entonces Salomón despertó, y he aquí, era un sueño. Y vino a Jerusalén y se puso delante del arca del pacto de Yahvé, y ofreció holocaustos y hizo sacrificios de paz[a], e hizo un banquete para todos sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios de comunión»; el hebreo שְׁלָמִים también puede destacar la participación compartida en la comida sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַץ
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - despertó del sueño
  lexicon: HALOT
  rationale: El verbo expresa el paso de dormir a estar despierto. «Despertó» mantiene la secuencia narrativa breve y natural en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  - en eso
  lexicon: HALOT
  rationale: La partícula introduce sorpresa o toma de conciencia súbita. «He aquí» conserva ese efecto y funciona bien en registro bíblico.
- source_word: חֲלוֹם
  english_pob_choice: it was a dream
  chosen_spanish: era un sueño
  alternatives_spanish:
  - fue un sueño
  - era sueño
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sueño» en contexto de descubrimiento. «Era un sueño» hace explícita la comprensión de Salomón sin añadir contenido.
- source_word: וַיָּבֹא יְרוּשָׁלִַם
  english_pob_choice: he came to Jerusalem
  chosen_spanish: vino a Jerusalén
  alternatives_spanish:
  - llegó a Jerusalén
  - fue a Jerusalén
  - regresó a Jerusalén
  lexicon: HALOT
  rationale: «Vino a» reproduce el valor básico de בוא con movimiento hacia un lugar. Evita «regresó», que sería interpretativo.
- source_word: וַיַּעֲמֹד לִפְנֵי
  english_pob_choice: stood before
  chosen_spanish: se puso delante de
  alternatives_spanish:
  - estuvo delante de
  - se presentó ante
  - se puso en presencia de
  lexicon: HALOT
  rationale: La locución marca comparecencia ante una presencia sagrada. «Se puso delante de» suena natural y conserva el gesto de presentarse.
- source_word: אֲרוֹן בְּרִית אֲדֹנָי
  english_pob_choice: the ark of the covenant of the LORD
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto del Señor
  - el arca del pacto de Yahvé Dios
  lexicon: HALOT
  rationale: La serie constructa se mantiene con claridad como «arca del pacto». Se usa «Yahvé» conforme a la terminología del proyecto para el nombre divino, en lugar de una sustitución por mayúsculas u otro título.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: «Holocaustos» es el equivalente tradicional y preciso para ofrendas completamente consumidas por el fuego; evita una perífrasis más pesada.
- source_word: וַיַּעַל
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en sacrificio
  - subió
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo denota la presentación de las víctimas sobre el altar. «Ofreció» es idiomático en español y conserva la acción ritual.
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de paz
  - sacrificios de comunión
  - ofrendas de comunión
  lexicon: HALOT
  rationale: Se conserva la categoría sacrificial con un equivalente transparente. «Sacrificios de paz» refleja la designación tradicional sin borrar la posible nota de comunión/fellowship.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - un festín
  - una fiesta
  lexicon: HALOT
  rationale: El término alude a una comida celebrativa abundante. «Banquete» comunica bien el carácter oficial y festivo en español contemporáneo.
- source_word: לְכָל עֲבָדָיו
  english_pob_choice: for all his servants
  chosen_spanish: para todos sus siervos
  alternatives_spanish:
  - para todos sus servidores
  - para todos sus servidores/funcionarios
  - para todos sus servidores y siervos
  lexicon: HALOT
  rationale: עֲבָדָיו puede abarcar servidores ligados al rey. Se prefiere «siervos» para mantener la fuerza léxica de δοῦλος/עבד cuando el contexto permite esa amplitud, sin imponer «funcionarios».
theological_decisions:
- issue: Representación del nombre divino en el sintagma del arca del pacto
  english_pob_reading: the ark of the covenant of the LORD
  chosen_spanish_reading: el arca del pacto de Yahvé
  alternative_spanish_readings:
  - el arca del pacto del Señor
  - el arca del pacto de YHWH
  rationale: El texto hebreo del pasaje usa una forma con referencia al nombre divino en un contexto de pacto. Conforme a la convención del proyecto, se traduce con «Yahvé» en el texto principal, evitando el ocultamiento por una forma de título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail inglés, sin introducir revisiones posteriores ni cambios de sentido no atestiguados. Se conserva la secuencia narrativa, la referencia cultual y la decisión del proyecto de traducir el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la política del proyecto para el nombre divino.
  - Se usa «siervos» en sentido amplio de personal al servicio del rey, coherente con el contexto y con la decisión léxica preferida.
  - «Sacrificios de paz» conserva la categoría sacrificial y deja abierta la nota de comunión indicada por la tradición de traducción alternativa.
