review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura tripartita del hebreo y conserva correctamente «mis estatutos», «su ganado», «su campo» y la transliteración técnica «shaatnez» con nota explicativa. Sin embargo, la cláusula final «no caerá sobre ustedes» no representa fielmente יַעֲלֶה עָלֶיךָ («no subirá sobre ti / no vendrá sobre ti») ni la decisión inglesa auditada «shall not come upon you»; en español sugiere caída física, no uso o colocación de la prenda.
  spanish_quality_summary: El español es generalmente claro y legible, pero la última cláusula suena poco natural y semánticamente desviada. Además, conviene mantener la cohesión de tratamiento en plural formal y una formulación idiomática digna. «No se pondrá sobre ustedes» conserva mejor la imagen del original y evita el sentido impropio de «caer».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La transliteración «shaatnez» y la nota léxica están bien manejadas. «Estatutos» y «guardarán» concuerdan con las decisiones POB. La única corrección necesaria es la expresión de יַעֲלֶה עָלֶיךָ.
  issues:
  - severity: medium
    issue: «no caerá sobre ustedes» traduce de manera inadecuada יַעֲלֶה עָלֶיךָ
    rationale: El hebreo literalmente expresa que la prenda no «subirá sobre» la persona; el inglés auditado eligió «shall not come upon you» para conservar la imagen idiomática. «Caerá sobre» introduce una imagen distinta y puede malentenderse como accidente físico, no como prohibición de vestirla o ponérsela.
  - severity: low
    issue: La cláusula final puede sonar torpe en español formal
    rationale: Aunque comprensible, «una prenda de material mezclado, shaatnez, no caerá sobre ustedes» no es idiomático en español bíblico moderno. Una leve reparación mejora la dignidad y legibilidad sin apartarse del original.
  revised_spanish_text: Ustedes guardarán mis estatutos. No aparearán su ganado con dos clases distintas; no sembrarán su campo con dos clases de semilla; y una prenda de material mezclado, shaatnez[a], no se pondrá sobre ustedes.
  revised_footnotes:
  - marker: a
    text: Hebreo shaatnez es un término técnico para una tela mezclada prohibida; tradicionalmente se entiende como una mezcla de lana y lino. Compárese Deuteronomio 22:11.
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la cláusula final para representar mejor יַעֲלֶה עָלֶיךָ y la decisión inglesa auditada, evitando el sentido impropio de «caerá sobre». El resto del borrador es fiel y natural.
