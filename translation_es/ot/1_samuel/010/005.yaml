translation:
  language: es
  text: Después de eso, llegarás a Guibeat-ha-Elohim[a], donde está la guarnición filistea[b]. Y cuando entres allí, en la ciudad, te encontrarás con un grupo de profetas que descienden del lugar alto, con arpa, pandero, flauta y lira delante de ellos[c], y estarán profetizando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el collado de Dios' o 'Gabaa de Dios'; el hebreo puede entenderse como nombre de lugar o como título descriptivo del sitio.
    reason: alternative_reading
  - marker: b
    text: O 'puesto filisteo' o 'prefectos filisteos'; el término hebreo puede referirse a un destacamento militar o a funcionarios, aunque el contexto favorece una guarnición.
    reason: alternative_reading
  - marker: c
    text: 'La identificación exacta de los instrumentos es incierta: ''arpa'' (נֵבֶל) también podría ser ''laúd'', y ''flauta'' también podría ser ''flauta de caña'' o ''tubo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבְעַת הָאֱלֹהִים
  english_pob_choice: Gibeath-ha-Elohim
  chosen_spanish: Gibeat-ha-Elohim
  alternatives_spanish:
  - el collado de Dios
  - Gabaa de Dios
  lexicon: HALOT
  rationale: Se conserva como nombre de lugar transliterado, siguiendo la decisión auditable del POB en inglés de tratar la expresión como topónimo probable y no como frase descriptiva. Se adapta mínimamente a la ortografía española sin traducir el nombre.
- source_word: נְצִבֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: la guarnición filistea
  alternatives_spanish:
  - el puesto filisteo
  - los prefectos filisteos
  - la avanzada filistea
  lexicon: HALOT
  rationale: El contexto narrativo favorece un destacamento militar estacionado; por eso 'guarnición' reproduce bien la lectura principal del POB. Se evita 'prefectos' como sentido más administrativo, que el contexto no exige.
- source_word: וִיהִי כְבֹאֲךָ שָׁם הָעִיר
  english_pob_choice: And when you enter there, into the city
  chosen_spanish: Y cuando entres allí, en la ciudad
  alternatives_spanish:
  - Y sucederá que, cuando llegues allí a la ciudad
  - Y cuando llegues allí, a la ciudad
  lexicon: HALOT
  rationale: Se reproduce la fuerza temporal de la fórmula narrativa hebrea en un español natural. 'En la ciudad' conserva la apposición de הָעִיר sin volverla rígida o redundante.
- source_word: וּפָגַעְתָּ
  english_pob_choice: you will meet
  chosen_spanish: te encontrarás con
  alternatives_spanish:
  - encontrarás
  - te toparás con
  lexicon: HALOT
  rationale: '''Encontrarse con'' expresa el encuentro no previsto sin sonar mecánico. Mantiene la dirección del hebreo, que aquí implica un hallazgo/encuentro al pasar.'
- source_word: חֶבֶל נְבִיאִים
  english_pob_choice: a band of prophets
  chosen_spanish: un grupo de profetas
  alternatives_spanish:
  - una banda de profetas
  - una compañía de profetas
  lexicon: HALOT
  rationale: '''Grupo'' es más natural en español actual que ''banda'' o ''compañía'', y conserva la idea de un conjunto organizado de profetas sin añadir matices militares o litúrgicos indebidos.'
- source_word: יֹרְדִים מֵהַבָּמָה
  english_pob_choice: coming down from the high place
  chosen_spanish: que desciende del lugar alto
  alternatives_spanish:
  - que baja del lugar alto
  - que venía bajando del lugar alto
  - que desciende del alto lugar
  lexicon: HALOT
  rationale: '''Lugar alto'' conserva el sentido cultual de במה sin sustituirlo por una paráfrasis más interpretativa. Se usa ''desciende'' para mantener el valor direccional del participio, aunque en español también podría naturalizarse con ''baja''.'
- source_word: נֵבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - laúd
  lexicon: HALOT
  rationale: El inglés POB ya marca una equivalencia aproximada para un instrumento antiguo incierto; en español 'arpa' es la aproximación más clara y comprensible, aunque no sea identificación técnica segura. La incertidumbre se preserva en nota.
- source_word: תֹף
  english_pob_choice: tambourine
  chosen_spanish: pandero
  alternatives_spanish:
  - tambor
  - pandereta
  lexicon: HALOT
  rationale: '''Pandero'' es el equivalente bíblico y musical más natural en español para un instrumento de percusión portátil. ''Pandereta'' podría sonar demasiado moderna o folklórica.'
- source_word: חָלִיל
  english_pob_choice: flute
  chosen_spanish: flauta
  alternatives_spanish:
  - pífano
  - tubo
  lexicon: HALOT
  rationale: '''Flauta'' es la opción más clara y accesible en español. El POB reconoce la posibilidad de ''pipe''; en español eso se anota como alternativa léxica sin alterar el texto principal.'
- source_word: כִנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  - cítara
  lexicon: HALOT
  rationale: '''Lira'' distingue mejor este instrumento del נֵבֶל, evitando que ambos queden como ''arpa'' en español. Sigue la decisión del POB de diferenciar los dos instrumentos de cuerda.'
- source_word: וְהֵמָּה מִתְנַבְּאִים
  english_pob_choice: and they will be prophesying
  chosen_spanish: y estarán profetizando
  alternatives_spanish:
  - y profetizarán
  - y estarán en estado profético
  - y hablarán proféticamente
  lexicon: HALOT
  rationale: Se conserva el valor verbal de la raíz נבא sin especificar más de lo que el hebreo exige. 'Estarán profetizando' mantiene la apertura interpretativa del POB respecto de la modalidad exacta del fenómeno.
theological_decisions:
- issue: Naturaleza de la actividad profética
  english_pob_reading: Rendered as 'prophesying' without specifying ecstatic behavior
  chosen_spanish_reading: '''estarán profetizando'' sin precisar si es éxtasis, alabanza inspirada o discurso profético'
  alternative_spanish_readings:
  - estarán en un estado profético
  - estarán hablando proféticamente
  - estarán en éxtasis profético
  rationale: El hebreo describe actividad profética, pero no obliga a definir su mecanismo interno. El español conserva esa tensión teológica y fenomenológica, evitando resolverla con una explicación no explicitada por el texto.
  doctrine_reference: Preservar la tensión interpretativa del texto sin sobreexplicación.
translation_notes:
  revision_awareness: No se observaron cambios relevantes respecto del estado más reciente del POB en inglés; la presente redacción sigue la evaluación de alta concordancia y mantiene las decisiones léxicas y teológicas auditadas, adaptándolas al español con criterios de naturalidad y fidelidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo donde corresponda al Tetragrámaton; en este versículo no aparece.
  - Se evita 'Señor' como sustituto convencional porque el texto no contiene el nombre divino explícito.
  - '''Lugar alto'' conserva el término cultual sin sustituirlo por una glosa interpretativa más amplia.'
  - Se diferencia 'arpa' y 'lira' para no colapsar dos instrumentos distintos en un solo equivalente español.
