translation:
  language: es
  text: Y cuando la llevaban para ser ejecutada, Dios suscitó el espíritu santo[a] de un muchacho llamado Daniel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Espíritu Santo». El griego dice literalmente «el espíritu, el santo», y la capitalización en español es una decisión interpretativa.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπαγομένης
  english_pob_choice: was being led away
  chosen_spanish: era llevada
  alternatives_spanish:
  - era conducida
  - era llevada aparte
  - era arrastrada
  lexicon: LSJ
  rationale: El participio pasivo expresa movimiento impuesto sobre Susana. «Era llevada» conserva la pasividad y suena natural en español; «conducida» sería posible, pero sugiere menos el contexto de custodia hacia la ejecución.
- source_word: ἀπολέσθαι
  english_pob_choice: to be put to death
  chosen_spanish: ser ejecutada
  alternatives_spanish:
  - morir
  - perecer
  - ser destruida
  lexicon: LSJ
  rationale: En este contexto judicial, el infinitivo apunta a la ejecución inminente. «Ser ejecutada» comunica ese resultado con claridad y evita diluir el sentido en un simple «morir».
- source_word: ἐξήγειρεν
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - movió
  - levantó
  lexicon: LSJ
  rationale: El verbo significa suscitar, despertar o espolear. «Despertó» conserva la imagen de activación divina y es idiomático en español; «incitó» sería más fuerte y menos neutral.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the holy spirit
  chosen_spanish: el espíritu santo
  alternatives_spanish:
  - el Espíritu Santo
  - el espíritu sagrado
  - el santo espíritu
  lexicon: LSJ
  rationale: El griego dice literalmente «el espíritu, el santo». Se mantiene en minúsculas para no imponer de antemano la identificación técnica posterior con una designación plenamente titulada; aun así, «espíritu santo» conserva la fuerza divina de la expresión.
- source_word: παιδαρίου νεωτέρου
  english_pob_choice: young boy
  chosen_spanish: muchacho joven
  alternatives_spanish:
  - niño joven
  - jovencito
  - muchacho más joven
  lexicon: LSJ
  rationale: La combinación refuerza la juventud de Daniel. «Muchacho joven» reproduce ese doble énfasis sin sonar forzado; «niño» sería demasiado estrecho, y «jovencito» puede sonar demasiado coloquial.
- source_word: ᾧ ὄνομα Δανιήλ
  english_pob_choice: whose name was Daniel
  chosen_spanish: llamado Daniel
  alternatives_spanish:
  - cuyo nombre era Daniel
  - de nombre Daniel
  - llamado Daniel
  lexicon: LSJ
  rationale: La fórmula griega semítica permite una adaptación idiomática. «Llamado Daniel» es breve, natural y fiel al contenido nominativo; el nombre propio se conserva sin carga explicativa añadida.
theological_decisions:
- issue: Capitalización y alcance de τὸ πνεῦμα τὸ ἅγιον
  english_pob_reading: 'the holy spirit / alternative: the Holy Spirit'
  chosen_spanish_reading: el espíritu santo
  alternative_spanish_readings:
  - el Espíritu Santo
  rationale: La audit trail inglesa preserva la tensión entre una lectura de espíritu divino que actúa aquí y la posible lectura titulada. En español se elige minúscula para no cerrar la ambigüedad del griego ni importar automáticamente la formulación doctrinal posterior; la mayúscula queda como alternativa legítima.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas en lugar de resolverlas indebidamente.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «a younger boy» a «a young boy» para reflejar mejor παιδαρίου νεωτέρου. La redacción española evita una duplicación pesada y conserva el matiz de juventud con «muchacho joven». También se respeta la cautela del inglés respecto de τὸ πνεῦμα τὸ ἅγιον, manteniendo la tensión entre lectura descriptiva y lectura titulada.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al criterio del proyecto.
  - Se usa «espíritu santo» en minúscula en el texto principal para preservar la ambigüedad controlada del original.
  - Se evita «Cristo» porque no aparece en este versículo ni en la unidad contextual dada.
  - Se mantiene un registro neutral y reverente, apto para lectura eclesial amplia.
