  yaml_path: translation/deuterocanon/3_maccabees/004/015.yaml
  text: So the registration of these people was carried out with bitter urgency and zealous exertion[a], from the rising of the sun to its setting[c][b], reaching no completion for forty days.
  footnotes:
  - marker: a
    text: Or 'enrollment' or 'census' for 'registration'; the Greek refers to an official administrative listing.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the risings of the sun to the settings,' an idiom for continual labor throughout the day.
    reason: cultural_note
  - marker: c
    text: The Greek expression means that the process did not come to completion even after forty days.
    reason: lexical_alternative
