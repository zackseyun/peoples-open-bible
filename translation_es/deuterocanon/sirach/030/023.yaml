translation:
  language: es
  text: No entregues tu alma a la tristeza[a][b], ni tropieces en tu iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo לדין es difícil. El paralelo griego apoya el sentido de «tristeza» o «aflicción»; una lectura más literal a partir de las consonantes hebreas podría sugerir «juicio».
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio griego aquí es considerablemente más amplio: «Ama tu alma y consuela tu corazón, y aleja de ti la tristeza; porque la tristeza ha matado a muchos, y no hay provecho en ella». El texto hebreo conservado es más breve.'
    reason: alternative_reading
lexical_decisions:
- source_word: אל תתן / Do not give ... over
  english_pob_choice: Do not give ... over
  chosen_spanish: No entregues ...
  alternatives_spanish:
  - No des ...
  - No abandones ...
  - No te rindas a ...
  lexicon: HALOT
  rationale: El hebreo con נתן + complemento expresa ceder o entregar algo a una condición. «Entregues» conserva la idea de cederse a una fuerza dañina sin volver la frase pesada en español.
- source_word: לדין
  english_pob_choice: to grief
  chosen_spanish: al duelo
  alternatives_spanish:
  - a la tristeza
  - al dolor
  - al juicio
  lexicon: HALOT
  rationale: El testimonio griego apoya el campo semántico de λύπη, y el contexto exhortativo pide una afección negativa más que un sentido jurídico. «Duelo» comunica bien un pesar serio en español; se deja constancia de que el hebreo es difícil y que «juicio» sigue siendo una posibilidad literal menos probable.
- source_word: נפשך
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  - tu persona
  lexicon: HALOT
  rationale: נפש corresponde naturalmente a «alma» en español bíblico y conserva el paralelo antropológico con ψυχή. «Tu alma» es claro y digno para lectores eclesiales.
- source_word: ואל תכשל
  english_pob_choice: and do not stumble
  chosen_spanish: ni tropieces
  alternatives_spanish:
  - ni caigas
  - ni te desvíes
  - ni vaciles
  lexicon: HALOT
  rationale: «Tropezar» mantiene la metáfora moral de כשל y suena natural en español. Se usa «ni» para coordinar de forma idiomática con la negación anterior.
- source_word: בעונך
  english_pob_choice: in your iniquity
  chosen_spanish: en tu iniquidad
  alternatives_spanish:
  - por tu culpa
  - en tu pecado
  - en tu maldad
  lexicon: HALOT
  rationale: «Iniquidad» preserva la fuerza moral y forense de עון y coincide con la terminología bíblica española tradicional sin depender de una sustitución eclesiástica no motivada.
theological_decisions:
- issue: Si seguir el hebreo breve o expandir con el griego más largo
  english_pob_reading: A concise translation of the Hebrew line, with the Greek used to clarify the difficult term לדין as grief/sorrow rather than expanded into the longer Greek text.
  chosen_spanish_reading: Una traducción concisa del hebreo, dejando que el griego aclare el término difícil sin expandir el versículo a la forma más larga.
  alternative_spanish_readings:
  - «Ama tu alma y consuela tu corazón, y aleja de ti el duelo; porque el duelo ha matado a muchos, y no hay beneficio en él»
  - Traducir literalmente el hebreo como «juicio»
  rationale: La política del proyecto para Sirácida da prioridad al hebreo donde se conserva, usando el paralelo griego como apoyo interpretativo. Por eso el texto principal sigue la línea breve hebrea, pero la nota reconoce la tensión léxica de לדין y la lectura griega de duelo/tristeza.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input.'
translation_notes:
  revision_awareness: El texto sigue la línea hebrea conservada y no incorpora la expansión del testimonio griego, pero la decisión léxica sobre לדין se apoya explícitamente en ese paralelo. Se mantiene la tensión entre la posible lectura literal «juicio» y el sentido contextual de «duelo/tristeza».
  spanish_consistency_notes:
  - Se conserva «alma» para נפש y «iniquidad» para עון para mantener coherencia con el registro bíblico del proyecto.
  - Se evita «SEÑOR» u otra sustitución cultual porque no aparece el tetragrámaton en este verso.
  - La coordinación negativa «ni» en la segunda cola resulta más natural que repetir «y no» en español moderno, sin alterar el sentido.
