translation:
  language: es
  text: Los hombres malos no entienden la justicia, pero los que buscan a Yahvé entienden todas las cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘entienden todo’; en contexto se trata de un discernimiento moral amplio, especialmente respecto de la justicia, no de conocer todo sin límite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי רָע
  english_pob_choice: Evil men
  chosen_spanish: los hombres malos
  alternatives_spanish:
  - hombres de maldad
  - personas malas
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘hombres de mal’. En español, ‘los hombres malos’ conserva el sustantivo masculino plural y la fuerza moral del contraste, con una naturalidad mayor que una calca como ‘hombres de maldad’.
- source_word: יָבִינוּ
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - disciernen
  - comprenden
  lexicon: HALOT
  rationale: בין expresa aquí comprensión/discernimiento. ‘Entienden’ funciona en ambos miembros del versículo y evita introducir un matiz más técnico de ‘discernir’ que el contexto no exige de forma exclusiva.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo recto
  lexicon: HALOT
  rationale: En literatura sapiencial, מִשְׁפָּט puede abarcar orden justo y rectitud práctica, no solo una sentencia legal. ‘La justicia’ comunica bien ese alcance ético y mantiene la tensión contrastiva con ‘los hombres malos’.
- source_word: מְבַקְשֵׁי יְהוָה
  english_pob_choice: those who seek Yahweh
  chosen_spanish: los que buscan a Yahvé
  alternatives_spanish:
  - los buscadores de Yahvé
  - los que buscan al SEÑOR
  lexicon: HALOT
  rationale: El participio indica una clase de personas caracterizada por buscar a YHWH. ‘Los que buscan a Yahvé’ es idiomático en español y preserva el nombre divino según la política del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino, no la sustitución por un título, conforme a la convención del proyecto y al valor auditable del tetragrámaton.
- source_word: כֹל
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo en general
  lexicon: HALOT
  rationale: כֹל funciona aquí como generalización sapiencial. ‘Todas las cosas’ refleja mejor el alcance amplio del hebreo que un simple ‘todo’, sin convertir el proverbio en una afirmación de omnisciencia literal.
theological_decisions:
- issue: Alcance de ‘entienden todas las cosas’
  english_pob_reading: A proverbial statement about comprehensive moral discernment, not literal omniscience.
  chosen_spanish_reading: Una afirmación proverbial sobre discernimiento amplio y moral, no sobre saberlo todo de manera absoluta.
  alternative_spanish_readings:
  - conocimiento literal de todas las cosas
  - omnisciencia
  rationale: El paralelismo contrasta la incapacidad de los malos para captar la justicia con la comprensión amplia de quienes buscan a Yahvé. La formulación española conserva esa amplitud sin borrar la tensión sapiencial del hebreo.
  doctrine_reference: Preservar la tensión teológica del proverbio; no añadir una afirmación doctrinal que el texto no hace.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y la decisión revisada del POB en inglés de traducir כֹל con una forma más formal que ‘everything’ (‘all things’), manteniendo el sentido proverbial de discernimiento amplio. También conserva la política del proyecto para יְהוָה como ‘Yahvé’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה en coherencia con el proyecto.
  - ‘La justicia’ se usa en sentido sapiencial-ético, no meramente forense.
  - ‘Entienden’ se repite en ambos cola para preservar el paralelismo.
  - La nota al pie marca la amplitud proverbial de ‘todas las cosas’ sin eliminar la posibilidad alternativa de ‘disciernen’.
