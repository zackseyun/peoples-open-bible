  to: Entonces se rasurará[a], pero no rasurará el parche escamoso[b]; y el sacerdote lo aislará por siete días, una segunda vez.
  rationale: Se ajusta solo la cláusula de aislamiento para que el español sea natural y no sugiera erróneamente que se aísla la lesión misma. El pronombre «lo» retoma a la persona afectada implícita en la instrucción procedural, preservando el sentido levítico de observación separada por parte del sacerdote.
