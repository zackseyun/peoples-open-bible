translation:
  language: es
  text: Y muchos la desearon, pero ningún hombre la conoció[a] todos los días de su vida, desde el día en que murió Manasés, su esposo, y fue añadido a su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más explícita: «ningún hombre tuvo relaciones con ella». El griego dice literalmente: «ningún hombre la conoció», usando un eufemismo sexual.'
    reason: lexical_alternative
  - marker: b
    text: O «fue reunido con su pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεθύμησαν
  english_pob_choice: desired
  chosen_spanish: la desearon
  alternatives_spanish:
  - la codiciaron
  - la desearon intensamente
  lexicon: BDAG
  rationale: El verbo expresa un deseo fuerte. En español, «desear» conserva la amplitud semántica sin forzar de entrada un matiz más crudo que el griego no explicita en la forma verbal misma.
- source_word: οὐκ ἔγνω ἀνὴρ αὐτήν
  english_pob_choice: no man knew her
  chosen_spanish: ningún hombre la conoció
  alternatives_spanish:
  - ningún hombre tuvo relaciones con ella
  - ningún hombre yació con ella
  lexicon: BDAG
  rationale: Se mantiene la eufemia bíblica del griego («conocer»), que preserva el registro literario y deja visible la tensión idiomática documentada por la POB inglesa.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - ningún hombre
  lexicon: BDAG
  rationale: Aquí el sentido es genérico e indefinido, por lo que «hombre» reproduce bien el valor de «no man» sin convertirlo en «esposo».
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς αὐτῆς
  english_pob_choice: all the days of her life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - por el resto de su vida
  lexicon: BDAG
  rationale: Es un modismo solemne y bien asentado; la traducción literal resulta natural en español y conserva el ritmo del original.
- source_word: ἀφʼ ἧς ἡμέρας
  english_pob_choice: from the day when
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde que
  - a partir del día en que
  lexicon: BDAG
  rationale: «Desde el día en que» expresa con claridad el punto de inicio de la viudez y sigue de cerca la estructura griega.
- source_word: ἀπέθανεν Μανασσῆς ὁ ἀνὴρ αὐτῆς
  english_pob_choice: Manasseh her husband died
  chosen_spanish: murió Manasés, su esposo
  alternatives_spanish:
  - falleció Manasés, su esposo
  - murió Manasés, su marido
  lexicon: BDAG
  rationale: «Esposo» refleja el vínculo explícito del contexto («su marido/esposo») y evita una posible ambigüedad en español entre el hombre genérico y el cónyuge.
- source_word: καὶ προσετέθη πρὸς τὸν λαὸν αὐτοῦ
  english_pob_choice: and was added to his people
  chosen_spanish: y fue añadido a su pueblo
  alternatives_spanish:
  - y fue reunido con su pueblo
  - y fue agregado a su pueblo
  lexicon: BDAG
  rationale: Se conserva la literalidad del idiomismo funerario, siguiendo la decisión inglesa de no resolverlo con una paráfrasis más interpretativa. En español, «añadido» mantiene la extrañeza del original.
- source_word: Μανασσῆς
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: Standard biblical transliteration
  rationale: «Manasés» es la transliteración bíblica estándar en español.
theological_decisions:
- issue: Eufemismo sexual en οὐκ ἔγνω ἀνὴρ αὐτήν
  english_pob_reading: Retain the euphemistic expression 'no man knew her' in the main text.
  chosen_spanish_reading: Mantener «ningún hombre la conoció» en el texto principal.
  alternative_spanish_readings:
  - ningún hombre tuvo relaciones con ella
  - ningún hombre yació con ella
  rationale: La POB inglesa preserva el eufemismo en vez de explicitarlo. La versión española hace lo mismo para no borrar el registro bíblico ni resolver la tensión léxica que el griego presenta.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source register and documented lexical tension.'
- issue: Idiomismo funerario πρὸς τὸν λαὸν αὐτοῦ
  english_pob_reading: Render literally as 'was added to his people.'
  chosen_spanish_reading: Traducir literalmente «fue añadido a su pueblo».
  alternative_spanish_readings:
  - fue reunido con su pueblo
  rationale: La formulación literal conserva la resonancia bíblica e impide imponer una explicación doctrinal más cerrada sobre el estado de los muertos.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete con alta concordancia y sin revisiones aplicadas en el control inglés. La redacción española conserva los dos puntos de tensión documentados por la POB: el eufemismo sexual de «conocer» y el idiomismo funerario de «ser añadido a su pueblo».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefiere «Mesías» para Χριστός cuando corresponda; aquí no aplica.
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando calcos innecesarios salvo donde la literalidad preserva una tensión léxica significativa.
  - «Esposo» se usa aquí por el contexto conyugal explícito; no se fuerza el término genérico «hombre» donde el griego ya identifica a Manasés como marido.
