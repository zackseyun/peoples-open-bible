translation:
  language: es
  text: También presentó[a] a Eleazar; y, después de presentar el libro santo y dar la contraseña[b], «Ayuda de Dios», él mismo, encabezando la primera compañía[c], se enfrentó con Nicanor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo hizo avanzar» o «lo llevó ante ellos», según se entienda παραγαγών.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la consigna» o «la señal», para σύνθημα. La frase «Ayuda de Dios» también puede entenderse como «Auxilio de Dios» o «Dios ayuda».'
    reason: lexical_alternative
  - marker: c
    text: «Primera compañía» traduce un término militar que también podría rendirse como «primera cohorte» o «primer destacamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγαγὼν
  english_pob_choice: after bringing forward
  chosen_spanish: después de sacar a la vista
  alternatives_spanish:
  - después de presentar
  - tras poner al frente
  lexicon: LSJ
  rationale: El participio aoristo introduce una acción previa a la principal. En español, «sacar a la vista» comunica con naturalidad la idea de poner el libro en evidencia o ante los presentes, sin perder el valor preparatorio del griego.
- source_word: τὴν ἱερὰν βίβλον
  english_pob_choice: the holy book
  chosen_spanish: el libro santo
  alternatives_spanish:
  - el libro sagrado
  - el santo libro
  lexicon: LSJ
  rationale: βίβλος se rinde mejor como «libro» en español, y ἱεράν añade la cualidad religiosa. «Libro santo» conserva esa carga sin imponer que se trate de un rollo, que el griego no especifica de manera necesaria.
- source_word: σύνθημα
  english_pob_choice: watchword
  chosen_spanish: la contraseña
  alternatives_spanish:
  - la consigna
  - la señal
  lexicon: LSJ
  rationale: En contexto militar, σύνθημα puede ser contraseña, señal o palabra convenida. «Contraseña» transmite bien la función operativa del término en español, aunque pierde algo del tono ceremonial de «watchword»; por eso se mantiene la alternativa en nota implícita en la selección léxica.
- source_word: θεοῦ Βοηθείας
  english_pob_choice: God’s Help
  chosen_spanish: «Ayuda de Dios»
  alternatives_spanish:
  - «Dios ayuda»
  - «el auxilio de Dios»
  lexicon: LSJ
  rationale: La frase griega es comprimida y puede entenderse de más de una manera. «Ayuda de Dios» conserva la estructura genitiva de forma breve y natural en español; también deja abierta la posibilidad de leerla como lema o fórmula de ayuda divina.
- source_word: τῆς πρώτης σπείρης
  english_pob_choice: the first company
  chosen_spanish: la primera compañía
  alternatives_spanish:
  - la primera cohorte
  - la primera banda
  lexicon: LSJ
  rationale: σπεῖρα designa una unidad militar. «Compañía» ofrece una equivalencia clara y legible en español moderno, evitando una precisión romana excesiva que «cohorte» podría sugerir en un contexto helenístico.
- source_word: προηγούμενος
  english_pob_choice: led
  chosen_spanish: encabezando
  alternatives_spanish:
  - guiando
  - yendo delante de
  lexicon: LSJ
  rationale: El participio expresa que va al frente de la unidad. «Encabezando» conserva el matiz de liderazgo desde la vanguardia y se ajusta bien al encadenamiento narrativo del pasaje.
- source_word: συνέβαλε τῷ Νικάνορι
  english_pob_choice: engaged Nicanor
  chosen_spanish: se enfrentó con Nicanor
  alternatives_spanish:
  - entabló combate con Nicanor
  - luchó contra Nicanor
  lexicon: LSJ
  rationale: συμβάλλω con dativo en relato militar significa entrar en combate o trabarse con el enemigo. «Se enfrentó con» es idiomático en español y conserva el contacto bélico sin volver demasiado interpretativo el verbo.
theological_decisions:
- issue: Sujeto implícito de la cadena verbal
  english_pob_reading: The implied subject is Judas, continuing from the prior context, with Eleazar as the person brought in or presented.
  chosen_spanish_reading: El sujeto implícito se mantiene como Judas, de modo que él es quien lleva a Eleazar, presenta el libro santo, da la contraseña, encabeza la primera compañía y se enfrenta a Nicanor.
  alternative_spanish_readings:
  - Eleazar podría leerse como más central en las acciones posteriores, aunque la sintaxis lo hace menos probable.
  rationale: El griego nombra a Eleazar en acusativo tras ἔτι δὲ καὶ, mientras que los participios y el verbo principal continúan la acción del sujeto narrativo anterior. La versión española preserva esa continuidad sin introducir un sujeto nuevo.
  doctrine_reference: Sintaxis narrativa y continuidad del sujeto en contexto bélico-histórico
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, que no requirió cambios de última revisión. La versión española sigue la decisión óptima-equivalente del POB, manteniendo el orden participial y la ambigüedad comprimida de la fórmula griega de la contraseña.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino יהוה en el texto fuente.
  - Se eligió «libro santo» en lugar de «scroll» o «rollo» para no sobreespecificar el soporte material.
  - Se prefirió «contraseña» por contexto militar, pero se dejó abierta la alternativa de «consigna» o «señal».
  - Se mantuvo un registro narrativo sobrio y bíblico, sin calcado excesivo del inglés.
