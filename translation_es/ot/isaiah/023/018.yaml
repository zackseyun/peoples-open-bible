    reason: lexical_alternative
  - marker: b
    text: O 'vestido duradero', 'vestido de gala' o 'amplia cobertura'. La frase final es difícil, especialmente el adjetivo 'duradero/escogido/antiguo'.
    reason: lexical_alternative
