    issue: Ambigüedad en «lo fortificaron para guardar Bethsura»
    rationale: El griego distingue entre fortificar «eso/ese lugar» y proteger Bethsura; la frase española actual puede sugerir que fortificaron Bethsura misma. Añadir un referente explícito como «la ciudadela» preserva mejor la relación sintáctica y estratégica.
  - severity: low
