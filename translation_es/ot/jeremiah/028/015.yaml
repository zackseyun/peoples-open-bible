translation:
  language: es
  text: 'Entonces Jeremías el profeta dijo a Hananías el profeta: «Escucha, por favor, Hananías: Yahvé no te ha enviado[a], y tú has hecho que este pueblo confíe en una mentira[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el SEÑOR no te ha enviado».
    reason: lexical_alternative
  - marker: b
    text: O «has hecho que este pueblo confíe sobre una mentira».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo pide avance secuencial; «Entonces» conserva la progresión natural en español sin perder el valor discursivo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Se mantiene el título definido en aposición para Jeremías y Hananías, preservando la identificación explícita y la ironía del texto.
- source_word: שְׁמַע נָא
  english_pob_choice: Listen, please
  chosen_spanish: Escucha, por favor
  alternatives_spanish:
  - Escucha ahora
  - Oye, por favor
  lexicon: HALOT
  rationale: El imperativo más la partícula de cortesía/urgencia נָא se refleja mejor con una petición imperativa natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino, manteniendo la forma auditable «Yahvé» en vez de una sustitución litúrgica.
- source_word: לֹא שְׁלָחֲךָ
  english_pob_choice: has not sent you
  chosen_spanish: no te ha enviado
  alternatives_spanish:
  - no te envió
  - no te envía
  lexicon: HALOT
  rationale: 'El perfecto español expresa la vigencia presente de la acusación: Jeremías niega la comisión divina actual de Hananías.'
- source_word: הִבְטַחְתָּ
  english_pob_choice: you have made ... trust
  chosen_spanish: has hecho que ... confíe
  alternatives_spanish:
  - has causado que ... confíe
  - has hecho confiar a ...
  lexicon: HALOT
  rationale: El hifil de בטח es causativo; en español conviene explicitar la causación con una construcción natural y no sólo «asegurar».
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - estas personas
  - esta gente
  lexicon: HALOT
  rationale: Se conserva el singular colectivo profético «pueblo», con el demostrativo cercano «este».
- source_word: עַל שָׁקֶר
  english_pob_choice: in a lie
  chosen_spanish: en una mentira
  alternatives_spanish:
  - sobre una mentira
  - con falsedad
  lexicon: HALOT
  rationale: La combinación con el causativo de בטח apunta al objeto/basede la confianza mal colocada; «en una mentira» conserva el sustantivo concreto y el sentido idiomático.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal y editorial de no ocultar el Tetragrámaton con una mayúscula convencional, sino reflejar el Nombre propio del pacto de manera transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Ironía profética del doble título «el profeta»
  english_pob_reading: the prophet ... the prophet
  chosen_spanish_reading: el profeta ... el profeta
  alternative_spanish_readings:
  - profeta ... profeta
  rationale: La repetición del título se conserva para dejar visible que Hananías se presenta como profeta, aunque el v. 15 lo desautoriza; no se suaviza la tensión retórica.
  doctrine_reference: Contexto literario de Jeremías 28
translation_notes:
  revision_awareness: El paquete inglés indica alta concordancia y sin cambios en la última revisión; esta versión española sigue la misma lectura base, manteniendo el Nombre divino, la fuerza causativa de הִבְטַחְתָּ y el valor idiomático de עַל שָׁקֶר sin introducir nuevas decisiones textuales.
  spanish_consistency_notes:
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - Se conserva «el profeta» para ambos sustantivos definidos.
  - «este pueblo» mantiene el singular colectivo de הָעָם הַזֶּה.
  - La nota a pie de página sobre la primera mención del Nombre divino ofrece la alternativa tradicional sin adoptarla en el texto principal.
