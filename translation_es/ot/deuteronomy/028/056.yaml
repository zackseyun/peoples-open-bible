    text: 'Hebraísmo: «tener el ojo malo contra» significa mirar con hostilidad, resentimiento o mezquindad egoísta.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el hombre de su seno»; expresión íntima para su marido.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] en el modismo que realmente explica, se fortalece la cláusula verbal a «no se ha atrevido a poner» para reflejar mejor el sentido auditado de extrema delicadeza, y se sustituye «el hombre de su seno» por «el esposo de su abrazo» para conservar la intimidad marital con mejor naturalidad en español. Los demás elementos se mantienen por fidelidad al hebreo y al POB.
