translation:
  language: es
  text: Con él ungirás la tienda de reunión y el arca del testimonio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, ‘el arca del pacto’; el hebreo aquí dice ‘el testimonio’.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - deberás ungir
  - has de ungir
  lexicon: HALOT
  rationale: El hebreo expresa aquí una instrucción cultual en secuencia; en español, el futuro con valor imperativo preserva bien ese tono. ‘Ungir’ mantiene el sentido ritual preciso de משׁח mejor que ‘consagrar’ o ‘untar’.
- source_word: בּוֹ
  english_pob_choice: with it
  chosen_spanish: Con ella
  alternatives_spanish:
  - Con eso
  - Con este óleo
  lexicon: HALOT
  rationale: El sufijo masculino singular remite al aceite de la unción mencionado en el contexto inmediato. ‘Con ella’ es natural en español para referirse al sustantivo implícito ‘la unción’ o ‘la [cosa] usada para ungir’, sin perder el valor instrumental.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: ‘Tienda de reunión’ es la equivalencia más estable y fiel para אֹהֶל מוֹעֵד. Evita una paráfrasis más libre y conserva el nombre cultual reconocido del tabernáculo.
- source_word: אֲרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - el arca sagrada
  lexicon: HALOT
  rationale: En el contexto del santuario, ‘arca’ es la traducción más precisa y reconocible para אֲרוֹן. ‘Cofre’ sería demasiado general y menos adecuado en registro bíblico.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del testimonio pactal
  - del pacto
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘testimonio’, no ‘pacto’. Se conserva ese término para respetar la elección léxica del מקור y la tensión con la formulación más tradicional ‘arca del pacto’.
theological_decisions:
- issue: אֲרוֹן הָעֵדֻת frente a la tradición de ‘arca del pacto’
  english_pob_reading: the ark of the testimony
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  - el arca del testimonio
  rationale: La fuente hebrea usa ‘testimonio’ de forma explícita; por eso se evita sustituirlo por el título tradicional ‘pacto’. Mantener ‘testimonio’ preserva la primacía del texto original y la precisión cultual.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; consistency of key terms.'
translation_notes:
  revision_awareness: El texto inglés auditado fue estable y solo recibió una corrección de puntuación final; no hubo cambios sustantivos de contenido. La versión española refleja esa misma estabilidad textual y añade la nota alternativa únicamente donde el hebreo difiere de la formulación tradicional.
  spanish_consistency_notes:
  - Se mantiene ‘tienda de reunión’ como equivalente estable de אֹהֶל מוֹעֵד.
  - Se conserva ‘testimonio’ para הָעֵדֻת y se deja constancia de la lectura tradicional alternativa.
  - El pronombre instrumental se vierte de manera natural en español con ‘Con ella’, sin explicitar un referente inexistente en el texto inmediato.
