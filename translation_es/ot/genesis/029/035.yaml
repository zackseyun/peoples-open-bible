translation:
  language: es
  text: 'Y concibió otra vez y dio a luz un hijo[a], y dijo: «Esta vez alabaré a Yahvé». Por eso le puso por nombre Judá. Entonces dejó de dar a luz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Judá suena al verbo hebreo para «alabar» o «dar gracias».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - se embarazó
  lexicon: HALOT
  rationale: הרה expresa la acción de concebir/quedar embarazada. «Concibió» es natural, sobrio y fiel al registro narrativo.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: HALOT
  rationale: En esta secuencia de nacimientos, עוֹד marca repetición. «Otra vez» conserva bien la continuidad narrativa en español.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: ילד con בן es la fórmula normal de parto/nacimiento. «Dar a luz» comunica claramente el evento sin sonar arcaico.
- source_word: הַפַּעַם
  english_pob_choice: This time
  chosen_spanish: Esta vez
  alternatives_spanish:
  - Ahora sí
  - En esta ocasión
  lexicon: HALOT
  rationale: La expresión señala la ocasión presente frente a los nacimientos anteriores. «Esta vez» mantiene el valor deíctico sin añadir emoción no explícita.
- source_word: אוֹדֶה
  english_pob_choice: I will praise
  chosen_spanish: alabaré
  alternatives_spanish:
  - daré gracias
  - celebraré
  lexicon: HALOT
  rationale: El hifil de ידה puede expresar alabanza y también acción de gracias. En este contexto de nombramiento, «alabaré» preserva el paralelismo con Judá y la resonancia verbal del nombre, sin perder el matiz de agradecimiento implícito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre divino propio «Yahvé», siguiendo el criterio del proyecto y evitando la sustitución por un título.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula introduce la consecuencia del dicho anterior. «Por eso» es claro, fluido y suficientemente causal.
- source_word: קָרְאָה שְׁמוֹ
  english_pob_choice: she named him
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  - nombró
  lexicon: HALOT
  rationale: El hebreo literalmente dice «llamó su nombre», pero el español bíblico natural y exacto es «poner por nombre»; evita la rigidez de un calco y conserva el acto nominativo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma usual en español bíblico «Judá», manteniendo la relación audible con la raíz de alabanza/acción de gracias.
- source_word: וַתַּעֲמֹד מִלֶּדֶת
  english_pob_choice: Then she stopped bearing children
  chosen_spanish: Luego dejó de dar a luz hijos
  alternatives_spanish:
  - Entonces cesó de tener hijos
  - Luego dejó de parir
  lexicon: HALOT
  rationale: עמד + מן + infinitivo indica cesar una actividad. «Dejó de dar a luz hijos» conserva el sentido de cese del parto y refleja el añadido contextual de «children» en la auditoría inglesa.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton directamente. Se preserva el nombre propio de Dios como «Yahvé», en lugar de sustituirlo por un título o una forma tradicional distinta, para mantener la transparencia textual y la consistencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Juego de palabras entre el nombre de Judá y la alabanza
  english_pob_reading: Judah sounds like the Hebrew verb for 'praise' or 'give thanks.'
  chosen_spanish_reading: Se mantiene la resonancia entre «alabaré» y «Judá».
  alternative_spanish_readings:
  - El nombre significa alabanza
  - Judá suena a gracias
  rationale: El hebreo usa el verbo ידה y el nombre יהודה para crear una relación audible. En español, «alabaré» y «Judá» preservan la asociación sin sobreexplicar ni convertirla en una etimología más fuerte que la del texto.
  doctrine_reference: POB lexical-note practice on naming puns and etymological resonance
translation_notes:
  revision_awareness: La auditoría inglesa revisó la última cláusula para explicitar «children»; por eso el español evita un simple «cesó de dar a luz» y conserva el complemento «hijos» para reflejar con mayor completitud el cierre del ciclo reproductivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se elige «Judá» como forma española usual del nombre propio.
  - Se prefiere un español bíblico moderno y claro, sin calcos innecesarios.
  - La nota al pie se ancla en «hijo[a]» para conservar la observación etimológica sin cargar el flujo principal.
