review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del audit trail inglés: conserva las dos fiestas, «primicias», el plural de מַעֲשֶׂיךָ, la cláusula de la siembra en el campo, y la referencia temporal al fin/salida del año. Sin embargo, «cuando recoges tus labores del campo» suena poco natural en español y debilita la idea de recoger el fruto/producto de esas labores. También conviene ajustar «al fin del año» a una forma más idiomática y digna: «al final del año».'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible. «Fiesta de la Cosecha» y «primicias» funcionan bien. La principal dificultad estilística está en «recoges tus labores del campo», que en español normalmente se entiende como las tareas mismas, no su resultado. Un pequeño ajuste mejora mucho la naturalidad sin apartarse del racional léxico documentado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección de «Fiesta», «Cosecha», «primicias» y «Recolección» es compatible con el audit trail. Se mantiene correctamente el plural de מַעֲשֶׂיךָ, pero en la segunda ocurrencia debe expresarse de modo más idiomático en español para preservar el sentido contextual del fruto de las labores.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «cuando recoges tus labores del campo»'
    rationale: Aunque «labores» refleja el plural hebreo, en español esa frase sugiere que se recogen las tareas mismas, no sus resultados agrícolas. El contexto exige una formulación que mantenga la conexión con el trabajo humano pero suene natural al hablar de cosecha.
  - severity: low
    issue: «al fin del año» es menos idiomático que «al final del año»
    rationale: La forma actual no es incorrecta, pero «al final del año» comunica mejor el sentido temporal de בְּצֵאת הַשָּׁנָה en español contemporáneo y digno.
  - severity: low
    issue: La nota cultural usa «recogimiento»
    rationale: «Recogimiento» en español suele asociarse con actitud interior o devoción, no con cosecha. «recolección» o «recogida» encaja mejor con el sentido agrícola.
