translation:
  language: es
  text: Si hiciera pasar animales salvajes peligrosos por la tierra[a], y la dejaran sin hijos[b], y llegara a ser una desolación, sin que nadie pasara por ella a causa de los animales,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fieras salvajes»; literalmente, «un animal malo/dañino», una expresión colectiva para animales salvajes peligrosos.
    reason: lexical_alternative
  - marker: b
    text: O «la privaran de sus hijos». El hebreo personifica la tierra como privada de sus habitantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֽוּ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supongamos que
  - Si yo llegara a
  lexicon: HALOT
  rationale: Introduce una condición hipotética en la secuencia de juicio. «Si» es el equivalente natural y fiel en español.
- source_word: חַיָּה רָעָה
  english_pob_choice: dangerous wild animals
  chosen_spanish: animales salvajes dañinos
  alternatives_spanish:
  - fieras dañinas
  - animales salvajes peligrosos
  - bestias salvajes
  lexicon: HALOT
  rationale: La expresión hebrea es una singular colectiva que alude a animales salvajes como clase, con matiz de daño o amenaza. «Animales salvajes dañinos» conserva ese valor colectivo y el peligro sin recurrir a un calco arcaico.
- source_word: אַעֲבִיר
  english_pob_choice: I cause ... to pass through
  chosen_spanish: hiciera pasar
  alternatives_spanish:
  - hiciera atravesar
  - enviara
  - hiciera transitar
  lexicon: HALOT
  rationale: 'El hifil de עבר expresa causación: Dios hace que los animales pasen por la tierra. «Hiciera pasar» conserva la agencia divina y la imagen verbal.'
- source_word: בָּאָרֶץ
  english_pob_choice: through the land
  chosen_spanish: por la tierra
  alternatives_spanish:
  - por la tierra
  - a través de la tierra
  - en la tierra
  lexicon: HALOT
  rationale: Con el verbo de movimiento, «por la tierra» comunica el recorrido territorial de manera natural en español.
- source_word: וְשִׁכְּלָתָּהּ
  english_pob_choice: and they bereave it
  chosen_spanish: y la dejaran desolada
  alternatives_spanish:
  - y la privaran de sus hijos
  - y la dejaran sin habitantes
  - y la hicieran quedar sin hijos
  lexicon: HALOT
  rationale: El verbo significa propiamente causar despojo/bereavement; aplicado a la tierra, personifica el territorio como privado de sus pobladores. En español, «la dejaran desolada» mantiene el efecto sin forzar una personificación poco natural. La alternativa literal se preserva en la nota.
- source_word: וְהָיְתָה שְׁמָמָה
  english_pob_choice: and it becomes a desolation
  chosen_spanish: y ella llegara a ser una desolación
  alternatives_spanish:
  - y se volviera una desolación
  - y quedara desolada
  - y se hiciera desolación
  lexicon: HALOT
  rationale: «שְׁמָמָה» es el término profético estándar para «desolación». Se conserva el sustantivo para respetar la estructura hebrea y el tono de juicio.
- source_word: מִבְּלִי עוֹבֵר
  english_pob_choice: without anyone passing through
  chosen_spanish: sin que nadie pasara por ella
  alternatives_spanish:
  - sin pasar nadie
  - sin ningún transeúnte
  - sin que pasara nadie
  lexicon: HALOT
  rationale: Expresa el resultado de interrupción total del tránsito. «Nadie» traduce bien el participio indefinido en español natural.
- source_word: מִפְּנֵי הַחַיָּה
  english_pob_choice: because of the animals
  chosen_spanish: a causa de los animales
  alternatives_spanish:
  - por causa de los animales
  - debido a los animales
  - por los animales
  lexicon: HALOT
  rationale: מִפְּנֵי aquí indica causa o razón. «A causa de» es idiomático y mantiene la relación causal documentada por la auditoría inglesa.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: 'Retain explicit divine causation: ''If I cause dangerous wild animals to pass through the land'''
  chosen_spanish_reading: Si yo hiciera pasar animales salvajes dañinos por la tierra
  alternative_spanish_readings:
  - Si enviara animales salvajes a la tierra
  - Si permitiera que animales salvajes dañinos pasaran por la tierra
  rationale: 'Se conserva la causalidad explícita del hifil: Dios actúa como agente del juicio. «Hiciera pasar» evita diluir la acción en mera अनुमति o permiso.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de concordancia con la auditoría inglesa; no se registran revisiones aplicadas en el historial reciente, y la presente redacción mantiene la agencia divina, el valor colectivo de חַיָּה רָעָה y la personificación de la tierra sin suavizar el juicio.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para בָּאָרֶץ, coherente con el registro profético.
  - Se evitó «SEÑOR» o perífrasis devocionales; el versículo no contiene el Tetragrámaton.
  - Se preservó el sustantivo «desolación» para שְׁמָמָה, en línea con el uso profético.
  - «Animales salvajes» evita un singular arcaico innecesario y conserva el valor colectivo del hebreo.
