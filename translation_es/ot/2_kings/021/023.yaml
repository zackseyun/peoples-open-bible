translation:
  language: es
  text: Y los servidores de Amón conspiraron contra él y dieron muerte al rey en su propia casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tramaron contra él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  english_pob_choice: conspired
  chosen_spanish: conspiraron
  alternatives_spanish:
  - tramaron
  - formaron una conspiración
  lexicon: HALOT
  rationale: קשר en este contexto político denota una conspiración o complot contra el rey. En español, «conspiraron» conserva esa fuerza política y narrativa con naturalidad.
- source_word: עַבְדֵי אָמוֹן
  english_pob_choice: Amon’s servants
  chosen_spanish: los siervos de Amón
  alternatives_spanish:
  - los servidores de Amón
  - los oficiales de Amón
  lexicon: HALOT
  rationale: עבדים puede referirse a servidores o funcionarios de la corte. «Siervos» mantiene la relación de dependencia expresada por el constructo sin introducir una identificación más específica que el hebreo no exige.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - contra Amón
  lexicon: HALOT
  rationale: Con lenguaje de conspiración, על expresa hostilidad dirigida al rey. «Contra él» sigue de cerca la referencia pronominal del hebreo, con Amón ya establecido en el contexto.
- source_word: וַיָּמִיתוּ
  english_pob_choice: put ... to death
  chosen_spanish: dieron muerte
  alternatives_spanish:
  - mataron
  - hicieron morir
  lexicon: HALOT
  rationale: El causativo de מות puede reflejarse como «dar muerte» en español, una forma que conserva el matiz causativo sin sonar forzada.
- source_word: אֶת־הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey Amón
  lexicon: HALOT
  rationale: El hebreo usa el título definido. «Al rey» respeta esa formulación narrativa; el referente personal queda claro por el contexto inmediato.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su propia casa
  alternatives_spanish:
  - en su casa
  - en la casa en que él estaba
  lexicon: HALOT
  rationale: בית con sufijo pronominal es «su casa». «Propia» transmite la intimidad y la violencia del hecho, de modo similar al matiz del inglés POB.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo WLC y el audit trail inglés: mantiene el sujeto plural de «los siervos de Amón», el valor político de קשר como conspiración y el matiz causativo de מות. No se requieren cambios textuales adicionales respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se prefiere «Amón» para el nombre propio, siguiendo la transliteración habitual del rey de Judá en español bíblico.
  - «Dieron muerte» conserva el matiz causativo de וַיָּמִיתוּ mejor que un simple «mataron» en este contexto narrativo.
  - Se mantiene el referente pronominal «contra él» para no introducir el nombre donde el hebreo usa pronombre; el antecedente está claro en la oración.
  - La nota al pie recoge la alternativa léxica principal preservada por el POB inglés.
