    text: 'Literalmente: "no llega". La imagen sugiere que no aterriza ni surte efecto.'
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea mejor el español con el original y con las decisiones léxicas auditadas del POB: se adopta ''gorrión'' para כַּצִּפּוֹר en el texto principal, se mueve la alternativa zoológica al segundo ave (''golondrina''/''vencejo'') donde realmente corresponde, y se conservan las notas explicativas sobre ''sin causa'' y el literal ''no llega''. El resultado sigue siendo natural en español y mantiene la fuerza proverbial del versículo.'
