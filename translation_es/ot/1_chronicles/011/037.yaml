lexical_decisions:
- source_word: חֶצְרוֹ
  english_pob_choice: Hezro
  chosen_spanish: Hezro
  alternatives_spanish:
  - Hezrai
  lexicon: Transliteración propia del nombre hebreo en Crónicas
  rationale: Se conserva la forma breve y distintiva del nombre propio que refleja el testimonio de Crónicas; no se armoniza con la forma paralela de Samuel porque el texto fuente dado preserva Hezro.
- source_word: הַכַּרְמְלִי
  english_pob_choice: the Carmelite
  chosen_spanish: el de Carmel
  alternatives_spanish:
  - el carmelita
  - el hombre de Carmel
  lexicon: HALOT
  rationale: 'El hebreo con artículo es un gentilicio: una persona perteneciente a Carmel. En español, ''el de Carmel'' evita la posible asociación con la orden religiosa posterior y conserva con claridad la referencia geográfica.'
- source_word: נַעֲרַי
  english_pob_choice: Naarai
  chosen_spanish: Naarai
  lexicon: Transliteración propia del nombre hebreo
  rationale: Nombre propio; se mantiene la transliteración directa, que es la opción más fiel y reconocible en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas y de nombres, בן expresa la relación filial de manera natural. 'Hijo de' es la equivalencia española más directa y legible.
- source_word: אֶזְבָּי
  english_pob_choice: Ezbai
  chosen_spanish: Ezbai
  lexicon: Transliteración propia del nombre hebreo
  rationale: Se conserva el nombre propio en transliteración para reflejar el texto hebreo sin añadir interpretación.
