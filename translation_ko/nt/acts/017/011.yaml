  yaml_path: translation/nt/acts/017/011.yaml
  text: Now these were more noble-minded than those in Thessalonica[a], for they received the word with all eagerness[b], examining the Scriptures daily to see whether these things were so.
  footnotes:
  - marker: a
    text: Or 'more noble.' The Greek may refer either to a more commendable disposition or, less likely here, to higher social standing.
